# Guru Model Configuration
# Consumed by: guru/model.py, guru/retriever.py

[provider]
# Backend: "llamacpp" | "ollama" | "anthropic" | "openai"
name = "llamacpp"
model = "Qwen3.5-27B-UD-Q4_K_XL.gguf"

# llamacpp server base URL
llamacpp_url = "http://127.0.0.1:8080"

# Ollama base URL (used when name = "ollama")
# ollama_url = "http://localhost:11434"

# Max tokens to generate per response.
# Set high enough for thinking models to complete reasoning before answering.
max_tokens = 2048

# HTTP timeout (seconds) for chat completions. Generous for thinking models
# that may spend minutes on reasoning before emitting the answer.
timeout = 1200

[retrieval]
# Number of chunks to retrieve via vector search
top_k = 10

# Minimum similarity threshold for vector results (0-1, cosine)
min_similarity = 0.50

# Tradition diversity: max chunks per tradition in the merged result set.
# 0 = no cap
max_per_tradition = 3

[ranking]
# Final score = vector_weight * cosine_sim
#             + graph_weight  * max(tier_weight, graph_score)
#             + diversity_bonus_if_new_tradition
# Weights should sum to ~1.0 but are not normalized.
vector_weight = 0.7
graph_weight  = 0.3

# Edge tier weights for re-ranking retrieved chunks
tier_verified  = 1.0
tier_proposed  = 0.7
tier_inferred  = 0.4

# Diversity bonus applied to chunks from under-represented traditions
diversity_boost = 0.1
