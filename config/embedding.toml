# Guru Embedding Configuration
# Consumed by: scripts/embed_corpus.py
#
# Vectors are stored in data/guru.db::chunk_embeddings (float32 BLOBs,
# cosine-similarity queries via scripts/vector_store.py). There is no
# separate vector store to configure — this file only pins the model.

[model]
# Provider: "ollama" | "sentence_transformers" | "api"
# ollama/nomic-embed-text is the pinned canonical embedding model for v2
# corpus exports. Switching this requires a full re-embed (embed_corpus.py
# --reindex) and bumps the model tag in corpus_metadata.embedding_model.
provider = "ollama"
model_name = "nomic-embed-text"
dimensions = 768

# sentence_transformers fallback (used when provider = "sentence_transformers")
# model_name = "all-MiniLM-L6-v2"
# dimensions = 384

[processing]
# Batch size for embedding calls
batch_size = 32

# Seconds to wait between API calls (rate limiting)
delay = 0.0
