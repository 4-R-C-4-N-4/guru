[content]
body = "Him who is their partisan and cleverly aids them in their plot for getting the ship out of the captain's hands into their own whether by force or persuasion, they compliment with the name of sailor, pilot, able seaman, and abuse the other sort of man, whom they call a good-for-nothing; but that the true pilot must pay attention to the year and seasons and sky and stars and winds, and whatever else belongs to his art, if he intends to be really qualified for the command of a ship, and that he must and will be the steerer, whether other people like or not-the possibility of this union of authority with the steerer's art has never seriously entered into their thoughts or been made part of their calling.\n\nNow in vessels which are in a state of mutiny and by sailors who are mutineers, how will the true pilot be regarded?\n\nWill he not be called by them a prater, a star-gazer, a good-for-nothing?\n\nOf course, said Adeimantus.\n\nThen you will hardly need, I said, to hear the interpretation of the figure, which describes the true philosopher in his relation to the State; for you understand already.\n\nCertainly.\n\nThen suppose you now take this parable to the gentleman who is surprised at finding that philosophers have no honour in their cities; explain it to him and try to convince him that their having honour would be far more extraordinary.\n\nI will.\n\nSay to him, that, in deeming the best votaries of philosophy to be useless to the rest of the world, he is right; but also tell him to attribute their uselessness to the fault of those who will not use them, and not to themselves.\n\nThe pilot should not humbly beg the sailors to be commanded by him--that is not the order of nature; neither are `the wise to go to the doors of the rich'--the ingenious author of this saying told a lie--but the truth is, that, when a man is ill, whether he be rich or poor, to the physician he must go, and he who wants to be governed, to him who is able to govern.\n\nThe ruler who is good for anything ought not to beg his subjects to be ruled by him; although the present governors of mankind are of a different stamp; they may be justly compared to the mutinous sailors, and the true helmsmen to those who are called by them good-for-nothings and star-gazers.\n\nPrecisely so, he said.\n\nFor these reasons, and among men like these, philosophy, the noblest pursuit of all, is not likely to be much esteemed by those of the opposite faction; not that the greatest and most lasting injury is done to her by her opponents, but by her own professing followers, the same of whom you suppose the accuser to say, that the greater number of them are arrant rogues, and the best are useless; in which opinion I agreed.\n\nYes.\n\nAnd the reason why the good are useless has now been explained?\n\nTrue.\n\nThen shall we proceed to show that the corruption of the majority is also unavoidable, and that this is not to be laid to the charge of philosophy any more than the other?\n\nBy all means.\n\nAnd let us ask and answer in turn, first going back to the description of the gentle and noble nature.\n\nTruth, as you will remember, was his leader, whom he followed always and in all things; failing in this, he was an impostor, and had no part or lot in true philosophy.\n\nYes, that was said.\n\nWell, and is not this one quality, to mention no others, greatly at variance with present notions of him?\n\nCertainly, he said."

