[content]
body = "SOCRATES - ADEIMANTUS Here Adeimantus interposed and said: To these statements, Socrates, no one can offer a reply; but when you talk in this way, a strange feeling passes over the minds of your hearers: They fancy that they are led astray a little at each step in the argument, owing to their own want of skill in asking and answering questions; these littles accumulate, and at the end of the discussion they are found to have sustained a mighty overthrow and all their former notions appear to be turned upside down.\n\nAnd as unskilful players of draughts are at last shut up by their more skilful adversaries and have no piece to move, so they too find themselves shut up at last; for they have nothing to say in this new game of which words are the counters; and yet all the time they are in the right.\n\nThe observation is suggested to me by what is now occurring.\n\nFor any one of us might say, that although in words he is not able to meet you at each step of the argument, he sees as a fact that the votaries of philosophy, when they carry on the study, not only in youth as a part of education, but as the pursuit of their maturer years, most of them become strange monsters, not to say utter rogues, and that those who may be considered the best of them are made useless to the world by the very study which you extol.\n\nWell, and do you think that those who say so are wrong?\n\nI cannot tell, he replied; but I should like to know what is your opinion.\n\nHear my answer; I am of opinion that they are quite right.\n\nThen how can you be justified in saying that cities will not cease from evil until philosophers rule in them, when philosophers are acknowledged by us to be of no use to them?\n\nYou ask a question, I said, to which a reply can only be given in a parable.\n\nYes, Socrates; and that is a way of speaking to which you are not at all accustomed, I suppose.\n\nI perceive, I said, that you are vastly amused at having plunged me into such a hopeless discussion; but now hear the parable, and then you will be still more amused at the meagreness of my imagination: for the manner in which the best men are treated in their own States is so grievous that no single thing on earth is comparable to it; and therefore, if I am to plead their cause, I must have recourse to fiction, and put together a figure made up of many things, like the fabulous unions of goats and stags which are found in pictures.\n\nImagine then a fleet or a ship in which there is a captain who is taller and stronger than any of the crew, but he is a little deaf and has a similar infirmity in sight, and his knowledge of navigation is not much better.\n\nThe sailors are quarrelling with one another about the steering-- every one is of opinion that he has a right to steer, though he has never learned the art of navigation and cannot tell who taught him or when he learned, and will further assert that it cannot be taught, and they are ready to cut in pieces any one who says the contrary.\n\nThey throng about the captain, begging and praying him to commit the helm to them; and if at any time they do not prevail, but others are preferred to them, they kill the others or throw them overboard, and having first chained up the noble captain's senses with drink or some narcotic drug, they mutiny and take possession of the ship and make free with the stores; thus, eating and drinking, they proceed on their voyage in such a manner as might be expected of them."

