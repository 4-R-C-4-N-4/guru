[content]
body = "Then, Adeimantus, I said, the worthy disciples of philosophy will be but a small remnant: perchance some noble and well-educated person, detained by exile in her service, who in the absence of corrupting influences remains devoted to her; or some lofty soul born in a mean city, the politics of which he contemns and neglects; and there may be a gifted few who leave the arts, which they justly despise, and come to her;--or peradventure there are some who are restrained by our friend Theages' bridle; for everything in the life of Theages conspired to divert him from philosophy; but ill-health kept him away from politics.\n\nMy own case of the internal sign is hardly worth mentioning, for rarely, if ever, has such a monitor been given to any other man.\n\nThose who belong to this small class have tasted how sweet and blessed a possession philosophy is, and have also seen enough of the madness of the multitude; and they know that no politician is honest, nor is there any champion of justice at whose side they may fight and be saved.\n\nSuch an one may be compared to a man who has fallen among wild beasts-- he will not join in the wickedness of his fellows, but neither is he able singly to resist all their fierce natures, and therefore seeing that he would be of no use to the State or to his friends, and reflecting that he would have to throw away his life without doing any good either to himself or others, he holds his peace, and goes his own way.\n\nHe is like one who, in the storm of dust and sleet which the driving wind hurries along, retires under the shelter of a wall; and seeing the rest of mankind full of wickedness, he is content, if only he can live his own life and be pure from evil or unrighteousness, and depart in peace and good-will, with bright hopes.\n\nYes, he said, and he will have done a great work before he departs.\n\nA great work--yes; but not the greatest, unless he find a State suitable to him; for in a State which is suitable to him, he will have a larger growth and be the saviour of his country, as well as of himself.\n\nThe causes why philosophy is in such an evil name have now been sufficiently explained: the injustice of the charges against her has been shown-is there anything more which you wish to say?\n\nNothing more on that subject, he replied; but I should like to know which of the governments now existing is in your opinion the one adapted to her.\n\nNot any of them, I said; and that is precisely the accusation which I bring against them--not one of them is worthy of the philosophic nature, and hence that nature is warped and estranged;--as the exotic seed which is sown in a foreign land becomes denaturalized, and is wont to be overpowered and to lose itself in the new soil, even so this growth of philosophy, instead of persisting, degenerates and receives another character.\n\nBut if philosophy ever finds in the State that perfection which she herself is, then will be seen that she is in truth divine, and that all other things, whether natures of men or institutions, are but human;--and now, I know that you are going to ask, what that State is.\n\nNo, he said; there you are wrong, for I was going to ask another question-- whether it is the State of which.\n\nwe are the founders and inventors, or some other?\n\nYes, I replied, ours in most respects; but you may remember my saying before, that some living authority would always be required in the State having the same idea of the constitution which guided you when as legislator you were laying down the laws.\n\nThat was said, he replied."

