[content]
body = "There is reason in supposing that the finest natures, when under alien conditions, receive more injury than the inferior, because the contrast is greater.\n\nCertainly.\n\nAnd may we not say, Adeimantus, that the most gifted minds, when they are ill-educated, become pre-eminently bad?\n\nDo not great crimes and the spirit of pure evil spring out of a fulness of nature ruined by education rather than from any inferiority, whereas weak natures are scarcely capable of any very great good or very great evil?\n\nThere I think that you are right.\n\nAnd our philosopher follows the same analogy-he is like a plant which, having proper nurture, must necessarily grow and mature into all virtue, but, if sown and planted in an alien soil, becomes the most noxious of all weeds, unless he be preserved by some divine power.\n\nDo you really think, as people so often say, that our youth are corrupted by Sophists, or that private teachers of the art corrupt them in any degree worth speaking of?\n\nAre not the public who say these things the greatest of all Sophists?\n\nAnd do they not educate to perfection young and old, men and women alike, and fashion them after their own hearts?\n\nWhen is this accomplished?\n\nhe said.\n\nWhen they meet together, and the world sits down at an assembly, or in a court of law, or a theatre, or a camp, or in any other popular resort, and there is a great uproar, and they praise some things which are being said or done, and blame other things, equally exaggerating both, shouting and clapping their hands, and the echo of the rocks and the place in which they are assembled redoubles the sound of the praise or blame--at such a time will not a young man's heart, as they say, leap within him?\n\nWill any private training enable him to stand firm against the overwhelming flood of popular opinion?\n\nor will he be carried away by the stream?\n\nWill he not have the notions of good and evil which the public in general have--he will do as they do, and as they are, such will he be?\n\nYes, Socrates; necessity will compel him.\n\nAnd yet, I said, there is a still greater necessity, which has not been mentioned.\n\nWhat is that?\n\nThe gentle force of attainder or confiscation or death which, as you are aware, these new Sophists and educators who are the public, apply when their words are powerless.\n\nIndeed they do; and in right good earnest.\n\nNow what opinion of any other Sophist, or of any private person, can be expected to overcome in such an unequal contest?\n\nNone, he replied.\n\nNo, indeed, I said, even to make the attempt is a great piece of folly; there neither is, nor has been, nor is ever likely to be, any different type of character which has had no other training in virtue but that which is supplied by public opinion--I speak, my friend, of human virtue only; what is more than human, as the proverb says, is not included: for I would not have you ignorant that, in the present evil state of governments, whatever is saved and comes to good is saved by the power of God, as we may truly say.\n\nI quite assent, he replied.\n\nThen let me crave your assent also to a further observation.\n\nWhat are you going to say?\n\nWhy, that all those mercenary individuals, whom the many call Sophists and whom they deem to be their adversaries, do, in fact, teach nothing but the opinion of the many, that is to say, the opinions of their assemblies; and this is their wisdom."

