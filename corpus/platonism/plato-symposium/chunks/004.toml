[content]
body = "Socrates took his place on the couch, and supped with the rest; and then libations were offered, and after a hymn had been sung to the god, and there had been the usual ceremonies, they were about to commence drinking, when Pausanias said, And now, my friends, how can we drink with least injury to ourselves?\n\nI can assure you that I feel severely the effect of yesterday's potations, and must have time to recover; and I suspect that most of you are in the same predicament, for you were of the party yesterday.\n\nConsider then: How can the drinking be made easiest?\n\nI entirely agree, said Aristophanes, that we should, by all means, avoid hard drinking, for I was myself one of those who were yesterday drowned in drink.\n\nI think that you are right, said Eryximachus, the son of Acumenus; but I should still like to hear one other person speak: Is Agathon able to drink hard?\n\nI am not equal to it, said Agathon.\n\nThen, the Eryximachus, the weak heads like myself, Aristodemus, Phaedrus, and others who never can drink, are fortunate in finding that the stronger ones are not in a drinking mood.\n\n(I do not include Socrates, who is able either to drink or to abstain, and will not mind, whichever we do.) Well, as of none of the company seem disposed to drink much, I may be forgiven for saying, as a physician, that drinking deep is a bad practice, which I never follow, if I can help, and certainly do not recommend to another, least of all to any one who still feels the effects of yesterday's carouse.\n\nI always do what you advise, and especially what you prescribe as a physician, rejoined Phaedrus the Myrrhinusian, and the rest of the company, if they are wise, will do the same.\n\nIt was agreed that drinking was not to be the order of the day, but that they were all to drink only so much as they pleased.\n\nThen, said Eryximachus, as you are all agreed that drinking is to be voluntary, and that there is to be no compulsion, I move, in the next place, that the flute-girl, who has just made her appearance, be told to go away and play to herself, or, if she likes, to the women who are within.\n\nTo-day let us have conversation instead; and, if you will allow me, I will tell you what sort of conversation.\n\nThis proposal having been accepted, Eryximachus proceeded as follows:- I will begin, he said, after the manner of Melanippe in Euripides, Not mine the word which I am about to speak, but that of Phaedrus.\n\nFor often he says to me in an indignant tone: \"What a strange thing it is, Eryximachus, that, whereas other gods have poems and hymns made in their honour, the great and glorious god, Love, has no encomiast among all the poets who are so many.\n\nThere are the worthy sophists too-the excellent Prodicus for example, who have descanted in prose on the virtues of Heracles and other heroes; and, what is still more extraordinary, I have met with a philosophical work in which the utility of salt has been made the theme of an eloquent discourse; and many other like things have had a like honour bestowed upon them.\n\nAnd only to think that there should have been an eager interest created about them, and yet that to this day no one has ever dared worthily to hymn Love's praises!"

