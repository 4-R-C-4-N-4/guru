[content]
body = "to which you would find no difficulty in replying, of a son or daughter: and the answer would be right.\n\nVery true, said Agathon.\n\nAnd you would say the same of a mother?\n\nHe assented.\n\nYet let me ask you one more question in order to illustrate my meaning: Is not a brother to be regarded essentially as a brother of something?\n\nCertainly, he replied.\n\nThat is, of a brother or sister?\n\nYes, he said.\n\nAnd now, said Socrates, I will ask about Love:-Is Love of something or of nothing?\n\nOf something, surely, he replied.\n\nKeep in mind what this is, and tell me what I want to know-whether Love desires that of which love is.\n\nYes, surely.\n\nAnd does he possess, or does he not possess, that which he loves and desires?\n\nProbably not, I should say.\n\nNay, replied Socrates, I would have you consider whether \"necessarily\" is not rather the word.\n\nThe inference that he who desires something is in want of something, and that he who desires nothing is in want of nothing, is in my judgment, Agathon absolutely and necessarily true.\n\nWhat do you think?\n\nI agree with you, said Agathon.\n\nVery good.\n\nWould he who is great, desire to be great, or he who is strong, desire to be strong?\n\nThat would be inconsistent with our previous admissions.\n\nTrue.\n\nFor he who is anything cannot want to be that which he is?\n\nVery true.\n\nAnd yet, added Socrates, if a man being strong desired to be strong, or being swift desired to be swift, or being healthy desired to be healthy, in that case he might be thought to desire something which he already has or is.\n\nI give the example in order that we may avoid misconception.\n\nFor the possessors of these qualities, Agathon, must be supposed to have their respective advantages at the time, whether they choose or not; and who can desire that which he has?\n\nTherefore when a person says, I am well and wish to be well, or I am rich and wish to be rich, and I desire simply to have what I have-to him we shall reply: \"You, my friend, having wealth and health and strength, want to have the continuance of them; for at this moment, whether you choose or no, you have them.\n\nAnd when you say, I desire that which I have and nothing else, is not your meaning that you want to have what you now have in the future?\n\n\"He must agree with us-must he not?\n\nHe must, replied Agathon.\n\nThen, said Socrates, he desires that what he has at present may be preserved to him in the future, which is equivalent to saying that he desires something which is non-existent to him, and which as yet he has not got.\n\nVery true, he said.\n\nThen he and every one who desires, desires that which he has not already, and which is future and not present, and which he has not, and is not, and of which he is in want;-these are the sort of things which love and desire seek?\n\nVery true, he said.\n\nThen now, said Socrates, let us recapitulate the argument.\n\nFirst, is not love of something, and of something too which is wanting to a man?\n\nYes, he replied.\n\nRemember further what you said in your speech, or if you do not remember I will remind you: you said that the love of the beautiful set in order the empire of the gods, for that of deformed things there is no love-did you not say something of that kind?\n\nYes, said Agathon.\n\nYes, my friend, and the remark was a just one.\n\nAnd if this is true, Love is the love of beauty and not of deformity?\n\nHe assented.\n\nAnd the admission has been already made that Love is of something which a man wants and has not?"

