[content]
body = "The course of the seasons is also full of both these principles; and when, as I was saying, the elements of hot and cold, moist and dry, attain the harmonious love of one another and blend in temperance and harmony, they bring to men, animals, and plants health and plenty, and do them no harm; whereas the wanton love, getting the upper hand and affecting the seasons of the year, is very destructive and injurious, being the source of pestilence, and bringing many other kinds of diseases on animals and plants; for hoar-frost and hail and blight spring from the excesses and disorders of these elements of love, which to know in relation to the revolutions of the heavenly bodies and the seasons of the year is termed astronomy.\n\nFurthermore all sacrifices and the whole province of divination, which is the art of communion between gods and men-these, I say, are concerned with the preservation of the good and the cure of the evil love.\n\nFor all manner of impiety is likely to ensue if, instead of accepting and honouring and reverencing the harmonious love in all his actions, a man honours the other love, whether in his feelings towards gods or parents, towards the living or the dead.\n\nWherefore the business of divination is to see to these loves and to heal them, and divination is the peacemaker of gods and men, working by a knowledge of the religious or irreligious tendencies which exist in human loves.\n\nSuch is the great and mighty, or rather omnipotent force of love in general.\n\nAnd the love, more especially, which is concerned with the good, and which is perfected in company with temperance and justice, whether among gods or men, has the greatest power, and is the source of all our happiness and harmony, and makes us friends with the gods who are above us, and with one another.\n\nI dare say that I too have omitted several things which might be said in praise of Love, but this was not intentional, and you, Aristophanes, may now supply the omission or take some other line of commendation; for I perceive that you are rid of the hiccough.\n\nYes, said Aristophanes, who followed, the hiccough is gone; not, however, until I applied the sneezing; and I wonder whether the harmony of the body has a love of such noises and ticklings, for I no sooner applied the sneezing than I was cured.\n\nEryximachus said: Beware, friend Aristophanes, although you are going to speak, you are making fun of me; and I shall have to watch and see whether I cannot have a laugh at your expense, when you might speak in peace.\n\nYou are right, said Aristophanes, laughing.\n\nI will unsay my words; but do you please not to watch me, as I fear that in the speech which I am about to make, instead of others laughing with me, which is to the manner born of our muse and would be all the better, I shall only be laughed at by them.\n\nDo you expect to shoot your bolt and escape, Aristophanes?\n\nWell, perhaps if you are very careful and bear in mind that you will be called to account, I may be induced to let you off.\n\nAristophanes professed to open another vein of discourse; he had a mind to praise Love in another way, unlike that either of Pausanias or Eryximachus.\n\nMankind; he said, judging by their neglect of him, have never, as I think, at all understood the power of Love."

