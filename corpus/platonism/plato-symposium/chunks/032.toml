[content]
body = "In the prosecution of this design, when I next went to him, I sent away the attendant who usually accompanied me (I will confess the whole truth, and beg you to listen; and if I speak falsely, do you, Socrates, expose the falsehood).\n\nWell, he and I were alone together, and I thought that when there was nobody with us, I should hear him speak the language which lovers use to their loves when they are by themselves, and I was delighted.\n\nNothing of the sort; he conversed as usual, and spent the day with me and then went away.\n\nAfterwards I challenged him to the palaestra; and he wrestled and closed with me, several times when there was no one present; I fancied that I might succeed in this manner.\n\nNot a bit; I made no way with him.\n\nLastly, as I had failed hitherto, I thought that I must take stronger measures and attack him boldly, and, as I had begun, not give him up, but see how matters stood between him and me.\n\nSo I invited him to sup with me, just as if he were a fair youth, and I a designing lover.\n\nHe was not easily persuaded to come; he did, however, after a while accept the invitation, and when he came the first time, he wanted to go away at once as soon as supper was over, and I had not the face to detain him.\n\nThe second time, still in pursuance of my design, after we had supped, I went on conversing far into the night, and when he wanted to go away, I pretended that the hour was late and that he had much better remain.\n\nSo he lay down on the couch next to me, the same on which he had supped, and there was no one but ourselves sleeping in the apartment.\n\nAll this may be told without shame to any one.\n\nBut what follows I could hardly tell you if I were sober.\n\nYet as the proverb says, \"In vino veritas,\" whether with boys, or without them; and therefore I must speak.\n\nNor, again, should I be justified in concealing the lofty actions of Socrates when I come to praise him.\n\nMoreover I have felt the serpent's sting; and he who has suffered, as they say, is willing to tell his fellow-sufferers only, as they alone will be likely to understand him, and will not be extreme in judging of the sayings or doings which have been wrung from his agony.\n\nFor I have been bitten by a more than viper's tooth; I have known in my soul, or in my heart, or in some other part, that worst of pangs, more violent in ingenuous youth than any serpent's tooth, the pang of philosophy, which will make a man say or do anything.\n\nAnd you whom I see around me, Phaedrus and Agathon and Eryximachus and Pausanias and Aristodemus and Aristophanes, all of you, and I need not say Socrates himself, have had experience of the same madness and passion in your longing after wisdom.\n\nTherefore listen and excuse my doings then and my sayings now.\n\nBut let the attendants and other profane and unmannered persons close up the doors of their ears.\n\nWhen the lamp was put out and the servants had gone away, I thought that I must be plain with him and have no more ambiguity.\n\nSo I gave him a shake, and I said: \"Socrates, are you asleep?\" \"No,\" he said.\n\n\"Do you know what I am meditating?\n\n\"What are you meditating?\" he said.\n\n\"I think,\" I replied, \"that of all the lovers whom I have ever had you are the only one who is worthy of me, and you appear to be too modest to speak."

