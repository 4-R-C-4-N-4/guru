[content]
body = "Yet at a festival he was the only person who had any real powers of enjoyment; though not willing to drink, he could if compelled beat us all at that,-wonderful to relate!\n\nno human being had ever seen Socrates drunk; and his powers, if I am not mistaken, will be tested before long.\n\nHis fortitude in enduring cold was also surprising.\n\nThere was a severe frost, for the winter in that region is really tremendous, and everybody else either remained indoors, or if they went out had on an amazing quantity of clothes, and were well shod, and had their feet swathed in felt and fleeces: in the midst of this, Socrates with his bare feet on the ice and in his ordinary dress marched better than the other soldiers who had shoes, and they looked daggers at him because he seemed to despise them.\n\nI have told you one tale, and now I must tell you another, which is worth hearing, 'Of the doings and sufferings of the enduring man', while he was on the expedition.\n\nOne morning he was thinking about something which he could not resolve; he would not give it up, but continued thinking from early dawn until noon-there he stood fixed in thought; and at noon attention was drawn to him, and the rumour ran through the wondering crowd that Socrates had been standing and thinking about something ever since the break of day.\n\nAt last, in the evening after supper, some Ionians out of curiosity (I should explain that this was not in winter but in summer), brought out their mats and slept in the open air that they might watch him and see whether he would stand all night.\n\nThere he stood until the following morning; and with the return of light he offered up a prayer to the sun, and went his way.\n\nI will also tell, if you please-and indeed I am bound to tell of his courage in battle; for who but he saved my life?\n\nNow this was the engagement in which I received the prize of valour: for I was wounded and he would not leave me, but he rescued me and my arms; and he ought to have received the prize of valour which the generals wanted to confer on me partly on account of my rank, and I told them so, (this, again Socrates will not impeach or deny), but he was more eager than the generals that I and not he should have the prize.\n\nThere was another occasion on which his behaviour was very remarkable-in the flight of the army after the battle of Delium, where he served among the heavy-armed-I had a better opportunity of seeing him than at Potidaea, for I was myself on horseback, and therefore comparatively out of danger.\n\nHe and Laches were retreating, for the troops were in flight, and I met them and told them not to be discouraged, and promised to remain with them; and there you might see him, Aristophanes, as you describe, just as he is in the streets of Athens, stalking like a and rolling his eyes, calmly contemplating enemies as well as friends, and making very intelligible to anybody, even from a distance, that whoever attacked him would be likely to meet with a stout resistance; and in this way he and his companion escaped-for this is the sort of man who is never touched in war; those only are pursued who are running away headlong.\n\nI particularly observed how superior he was to Laches in presence of mind.\n\nMany are the marvels which I might narrate in praise of Socrates; most of his ways might perhaps be paralleled in another man, but his absolute unlikeness to any human being that is or ever has been is perfectly astonishing."

