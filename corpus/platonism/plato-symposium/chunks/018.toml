[content]
body = "In the first place he is a poet (and here, like Eryximachus, I magnify my art), and he is also the source of poesy in others, which he could not be if he were not himself a poet.\n\nAnd at the touch of him every one becomes a poet, even though he had no music in him before; this also is a proof that Love is a good poet and accomplished in all the fine arts; for no one can give to another that which he has not himself, or teach that of which he has no knowledge.\n\nWho will deny that the creation of the animals is his doing?\n\nAre they not all the works his wisdom, born and begotten of him?\n\nAnd as to the artists, do we not know that he only of them whom love inspires has the light of fame?-he whom Love touches riot walks in darkness.\n\nThe arts of medicine and archery and divination were discovered by Apollo, under the guidance of love and desire; so that he too is a disciple of Love.\n\nAlso the melody of the Muses, the metallurgy of Hephaestus, the weaving of Athene, the empire of Zeus over gods and men, are all due to Love, who was the inventor of them.\n\nAnd so Love set in order the empire of the gods-the love of beauty, as is evident, for with deformity Love has no concern.\n\nIn the days of old, as I began by saying, dreadful deeds were done among the gods, for they were ruled by Necessity; but now since the birth of Love, and from the Love of the beautiful, has sprung every good in heaven and earth.\n\nTherefore, Phaedrus, I say of Love that he is the fairest and best in himself, and the cause of what is fairest and best in all other things.\n\nAnd there comes into my mind a line of poetry in which he is said to be the god who Gives peace on earth and calms the stormy deep, Who stills the winds and bids the sufferer sleep.\n\nThis is he who empties men of disaffection and fills them with affection, who makes them to meet together at banquets such as these: in sacrifices, feasts, dances, he is our lord-who sends courtesy and sends away discourtesy, who gives kindness ever and never gives unkindness; the friend of the good, the wonder of the wise, the amazement of the gods; desired by those who have no part in him, and precious to those who have the better part in him; parent of delicacy, luxury, desire, fondness, softness, grace; regardful of the good, regardless of the evil: in every word, work, wish, fear-saviour, pilot, comrade, helper; glory of gods and men, leader best and brightest: in whose footsteps let every man follow, sweetly singing in his honour and joining in that sweet strain with which love charms the souls of gods and men.\n\nSuch is the speech, Phaedrus, half-playful, yet having a certain measure of seriousness, which, according to my ability, I dedicate to the god.\n\nWhen Agathon had done speaking, Aristodemus said that there was a general cheer; the young man was thought to have spoken in a manner worthy of himself, and of the god.\n\nAnd Socrates, looking at Eryximachus, said: Tell me, son of Acumenus, was there not reason in my fears?\n\nand was I not a true prophet when I said that Agathon would make a wonderful oration, and that I should be in a strait?\n\nThe part of the prophecy which concerns Agathon, replied Eryximachus, appears to me to be true; but, not the other part-that you will be in a strait."

