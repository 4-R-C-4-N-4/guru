[content]
body = "But, as I was saying at first, the truth as I imagine is, that whether such practices are honourable or whether they are dishonourable is not a simple question; they are honourable to him who follows them honourably, dishonourable to him who follows them dishonourably.\n\nThere is dishonour in yielding to the evil, or in an evil manner; but there is honour in yielding to the good, or in an honourable manner.\n\nEvil is the vulgar lover who loves the body rather than the soul, inasmuch as he is not even stable, because he loves a thing which is in itself unstable, and therefore when the bloom of youth which he was desiring is over, he takes wing and flies away, in spite of all his words and promises; whereas the love of the noble disposition is life-long, for it becomes one with the everlasting.\n\nThe custom of our country would have both of them proven well and truly, and would have us yield to the one sort of lover and avoid the other, and therefore encourages some to pursue, and others to fly; testing both the lover and beloved in contests and trials, until they show to which of the two classes they respectively belong.\n\nAnd this is the reason why, in the first place, a hasty attachment is held to be dishonourable, because time is the true test of this as of most other things; and secondly there is a dishonour in being overcome by the love of money, or of wealth, or of political power, whether a man is frightened into surrender by the loss of them, or, having experienced the benefits of money and political corruption, is unable to rise above the seductions of them.\n\nFor none of these things are of a permanent or lasting nature; not to mention that no generous friendship ever sprang from them.\n\nThere remains, then, only one way of honourable attachment which custom allows in the beloved, and this is the way of virtue; for as we admitted that any service which the lover does to him is not to be accounted flattery or a dishonour to himself, so the beloved has one way only of voluntary service which is not dishonourable, and this is virtuous service.\n\nFor we have a custom, and according to our custom any one who does service to another under the idea that he will be improved by him either in wisdom, or, in some other particular of virtue-such a voluntary service, I say, is not to be regarded as a dishonour, and is not open to the charge of flattery.\n\nAnd these two customs, one the love of youth, and the other the practice of philosophy and virtue in general, ought to meet in one, and then the beloved may honourably indulge the lover.\n\nFor when the lover and beloved come together, having each of them a law, and the lover thinks that he is right in doing any service which he can to his gracious loving one; and the other that he is right in showing any kindness which he can to him who is making him wise and good; the one capable of communicating wisdom and virtue, the other seeking to acquire them with a view to education and wisdom, when the two laws of love are fulfilled and meet in one-then, and then only, may the beloved yield with honour to the lover.\n\nNor when love is of this disinterested sort is there any disgrace in being deceived, but in every other case there is equal disgrace in being or not being deceived.\n\nFor he who is gracious to his lover under the impression that he is rich, and is disappointed of his gains because he turns out to be poor, is disgraced all the same: for he has done his best to show that he would give himself up to any one's \"uses base\" for the sake of money; but this is not honourable."

