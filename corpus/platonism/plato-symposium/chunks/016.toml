[content]
body = "Indeed, I am not going to attack you, said Eryximachus, for I thought your speech charming, and did I not know that Agathon and Socrates are masters in the art of love, I should be really afraid that they would have nothing to say, after the world of things which have been said already.\n\nBut, for all that, I am not without hopes.\n\nSocrates said: You played your part well, Eryximachus; but if you were as I am now, or rather as I shall be when Agathon has spoken, you would, indeed, be in a great strait.\n\nYou want to cast a spell over me, Socrates, said Agathon, in the hope that I may be disconcerted at the expectation raised among the audience that I shall speak well.\n\nI should be strangely forgetful, Agathon replied Socrates, of the courage and magnanimity which you showed when your own compositions were about to be exhibited, and you came upon the stage with the actors and faced the vast theatre altogether undismayed, if I thought that your nerves could be fluttered at a small party of friends.\n\nDo you think, Socrates, said Agathon, that my head is so full of the theatre as not to know how much more formidable to a man of sense a few good judges are than many fools?\n\nNay, replied Socrates, I should be very wrong in attributing to you, Agathon, that or any other want of refinement.\n\nAnd I am quite aware that if you happened to meet with any whom you thought wise, you would care for their opinion much more than for that of the many.\n\nBut then we, having been a part of the foolish many in the theatre, cannot be regarded as the select wise; though I know that if you chanced to be in the presence, not of one of ourselves, but of some really wise man, you would be ashamed of disgracing yourself before him-would you not?\n\nYes, said Agathon.\n\nBut before the many you would not be ashamed, if you thought that you were doing something disgraceful in their presence?\n\nHere Phaedrus interrupted them, saying: not answer him, my dear Agathon; for if he can only get a partner with whom he can talk, especially a good-looking one, he will no longer care about the completion of our plan.\n\nNow I love to hear him talk; but just at present I must not forget the encomium on Love which I ought to receive from him and from every one.\n\nWhen you and he have paid your tribute to the god, then you may talk.\n\nVery good, Phaedrus, said Agathon; I see no reason why I should not proceed with my speech, as I shall have many other opportunities of conversing with Socrates.\n\nLet me say first how I ought to speak, and then speak:- The previous speakers, instead of praising the god Love, or unfolding his nature, appear to have congratulated mankind on the benefits which he confers upon them.\n\nBut I would rather praise the god first, and then speak of his gifts; this is always the right way of praising everything.\n\nMay I say without impiety or offence, that of all the blessed gods he is the most blessed because he is the fairest and best?\n\nAnd he is the fairest: for, in the first place, he is the youngest, and of his youth he is himself the witness, fleeing out of the way of age, who is swift enough, swifter truly than most of us like:-Love hates him and will not come near him; but youth and love live and move together-like to like, as the proverb says."

