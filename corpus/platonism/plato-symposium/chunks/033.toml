[content]
body = "Now I feel that I should be a fool to refuse you this or any other favour, and therefore I come to lay at your feet all that I have and all that my friends have, in the hope that you will assist me in the way of virtue, which I desire above all things, and in which I believe that you can help me better than any one else.\n\nAnd I should certainly have more reason to be ashamed of what wise men would say if I were to refuse a favour to such as you, than of what the world who are mostly fools, would say of me if I granted it.\" To these words he replied in the ironical manner which is so characteristic of him: \"Alcibiades, my friend, you have indeed an elevated aim if what you say is true, and if there really is in me any power by which you may become better; truly you must see in me some rare beauty of a kind infinitely higher than any which I see in you.\n\nAnd therefore, if you mean to share with me and to exchange beauty for beauty, you will have greatly the advantage of me; you will gain true beauty in return for appearance-like Diomede, gold in exchange for brass.\n\nBut look again, sweet friend, and see whether you are not deceived in me.\n\nThe mind begins to grow critical when the bodily eye fails, and it will be a long time before you get old.\" Hearing this, I said: \"I have told you my purpose, which is quite serious, and do you consider what you think best for you and me.\" \"That is good,\" he said; \"at some other time then we will consider and act as seems best about this and about other matters.\" Whereupon, I fancied that was smitten, and that the words which I had uttered like arrows had wounded him, and so without waiting to hear more I got up, and throwing my coat about him crept under his threadbare cloak, as the time of year was winter, and there I lay during the whole night having this wonderful monster in my arms.\n\nThis again, Socrates, will not be denied by you.\n\nAnd yet, notwithstanding all, he was so superior to my solicitations, so contemptuous and derisive and disdainful of my beauty-which really, as I fancied, had some attractions-hear, O judges; for judges you shall be of the haughty virtue of Socrates-nothing more happened, but in the morning when I awoke (let all the gods and goddesses be my witnesses) I arose as from the couch of a father or an elder brother.\n\nWhat do you suppose must have been my feelings, after this rejection, at the thought of my own dishonour?\n\nAnd yet I could not help wondering at his natural temperance and self-restraint and manliness.\n\nI never imagined that I could have met with a man such as he is in wisdom and endurance.\n\nAnd therefore I could not be angry with him or renounce his company, any more than I could hope to win him.\n\nFor I well knew that if Ajax could not be wounded by steel, much less he by money; and my only chance of captivating him by my personal attractions had faded.\n\nSo I was at my wit's end; no one was ever more hopelessly enslaved by another.\n\nAll this happened before he and I went on the expedition to Potidaea; there we messed together, and I had the opportunity of observing his extraordinary power of sustaining fatigue.\n\nHis endurance was simply marvellous when, being cut off from our supplies, we were compelled to go without food-on such occasions, which often happen in time of war, he was superior not only to me but to everybody; there was no one to be compared to him."

