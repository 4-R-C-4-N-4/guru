[content]
body = "When we hear any other speaker, even very good one, he produces absolutely no effect upon us, or not much, whereas the mere fragments of you and your words, even at second-hand, and however imperfectly repeated, amaze and possess the souls of every man, woman, and child who comes within hearing of them.\n\nAnd if I were not, afraid that you would think me hopelessly drunk, I would have sworn as well as spoken to the influence which they have always had and still have over me.\n\nFor my heart leaps within me more than that of any Corybantian reveller, and my eyes rain tears when I hear them.\n\nAnd I observe that many others are affected in the same manner.\n\nI have heard Pericles and other great orators, and I thought that they spoke well, but I never had any similar feeling; my soul was not stirred by them, nor was I angry at the thought of my own slavish state.\n\nBut this Marsyas has often brought me to such pass, that I have felt as if I could hardly endure the life which I am leading (this, Socrates, you will admit); and I am conscious that if I did not shut my ears against him, and fly as from the voice of the siren, my fate would be like that of others,-he would transfix me, and I should grow old sitting at his feet.\n\nFor he makes me confess that I ought not to live as I do, neglecting the wants of my own soul, and busying myself with the concerns of the Athenians; therefore I hold my ears and tear myself away from him.\n\nAnd he is the only person who ever made me ashamed, which you might think not to be in my nature, and there is no one else who does the same.\n\nFor I know that I cannot answer him or say that I ought not to do as he bids, but when I leave his presence the love of popularity gets the better of me.\n\nAnd therefore I run away and fly from him, and when I see him I am ashamed of what I have confessed to him.\n\nMany a time have I wished that he were dead, and yet I know that I should be much more sorry than glad, if he were to die: so that am at my wit's end.\n\nAnd this is what I and many others have suffered, from the flute-playing of this satyr.\n\nYet hear me once more while I show you how exact the image is, and.\n\nhow marvellous his power.\n\nFor let me tell you; none of you know him; but I will reveal him to you; having begun, I must go on.\n\nSee you how fond he is of the fair?\n\nHe is always with them and is always being smitten by them, and then again he knows nothing and is ignorant of all thing such is the appearance which he puts on.\n\nIs he not like a Silenus in this?\n\nTo be sure he is: his outer mask is the carved head of the Silenus; but, O my companions in drink, when he is opened, what temperance there is residing within!\n\nKnow you that beauty and wealth and honour, at which the many wonder, are of no account with him, and are utterly despised by him: he regards not at all the persons who are gifted with them; mankind are nothing to him; all his life is spent in mocking and flouting at them.\n\nBut when I opened him, and looked within at his serious purpose, I saw in him divine and golden images of such fascinating beauty that I was ready to do in a moment whatever Socrates commanded: they may have escaped the observation of others, but I saw them.\n\nNow I fancied that he was seriously enamoured of my beauty, and I thought that I should therefore have a grand opportunity of hearing him tell what he knew, for I had a wonderful opinion of the attractions of my youth."

