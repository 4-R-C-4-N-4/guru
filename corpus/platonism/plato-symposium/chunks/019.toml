[content]
body = "Why, my dear friend, said Socrates, must not I or any one be in a strait who has to speak after he has heard such a rich and varied discourse?\n\nI am especially struck with the beauty of the concluding words-who could listen to them without amazement?\n\nWhen I reflected on the immeasurable inferiority of my own powers, I was ready to run away for shame, if there had been a possibility of escape.\n\nFor I was reminded of Gorgias, and at the end of his speech I fancied that Agathon was shaking at me the Gorginian or Gorgonian head of the great master of rhetoric, which was simply to turn me and my speech, into stone, as Homer says, and strike me dumb.\n\nAnd then I perceived how foolish I had been in consenting to take my turn with you in praising love, and saying that I too was a master of the art, when I really had no conception how anything ought to be praised.\n\nFor in my simplicity I imagined that the topics of praise should be true, and that this being presupposed, out of the true the speaker was to choose the best and set them forth in the best manner.\n\nAnd I felt quite proud, thinking that I knew the nature of true praise, and should speak well.\n\nWhereas I now see that the intention was to attribute to Love every species of greatness and glory, whether really belonging to him not, without regard to truth or falsehood-that was no matter; for the original, proposal seems to have been not that each of you should really praise Love, but only that you should appear to praise him.\n\nAnd so you attribute to Love every imaginable form of praise which can be gathered anywhere; and you say that \"he is all this,\" and \"the cause of all that,\" making him appear the fairest and best of all to those who know him not, for you cannot impose upon those who know him.\n\nAnd a noble and solemn hymn of praise have you rehearsed.\n\nBut as I misunderstood the nature of the praise when I said that I would take my turn, I must beg to be absolved from the promise which I made in ignorance, and which (as Euripides would say) was a promise of the lips and not of the mind.\n\nFarewell then to such a strain: for I do not praise in that way; no, indeed, I cannot.\n\nBut if you like to here the truth about love, I am ready to speak in my own manner, though I will not make myself ridiculous by entering into any rivalry with you.\n\nSay then, Phaedrus, whether you would like, to have the truth about love, spoken in any words and in any order which may happen to come into my mind at the time.\n\nWill that be agreeable to you?\n\nAristodemus said that Phaedrus and the company bid him speak in any manner which he thought best.\n\nThen, he added, let me have your permission first to ask Agathon a few more questions, in order that I may take his admissions as the premisses of my discourse.\n\nI grant the permission, said Phaedrus: put your questions.\n\nSocrates then proceeded as follows:- In the magnificent oration which you have just uttered, I think that you were right, my dear Agathon, in proposing to speak of the nature of Love first and afterwards of his works-that is a way of beginning which I very much approve.\n\nAnd as you have spoken so eloquently of his nature, may I ask you further, Whether love is the love of something or of nothing?\n\nAnd here I must explain myself: I do not want you to say that love is the love of a father or the love of a mother-that would be ridiculous; but to answer as you would, if I asked is a father a father of something?"

