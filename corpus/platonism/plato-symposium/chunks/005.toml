[content]
body = "So entirely has this great deity been neglected.\" Now in this Phaedrus seems to me to be quite right, and therefore I want to offer him a contribution; also I think that at the present moment we who are here assembled cannot do better than honour the.\n\ngod Love.\n\nIf you agree with me, there will be no lack of conversation; for I mean to propose that each of us in turn, going from left to right, shall make a speech in honour of Love.\n\nLet him give us the best which he can; and Phaedrus, because he is sitting first on the left hand, and because he is the father of the thought, shall begin.\n\nNo one will vote against you, Eryximachus, said Socrates.\n\nHow can I oppose your motion, who profess to understand nothing but matters of love; nor, I presume, will Agathon and Pausanias; and there can be no doubt of Aristophanes, whose whole concern is with Dionysus and Aphrodite; nor will any one disagree of those whom I, see around me.\n\nThe proposal, as I am aware, may seem rather hard upon us whose place is last; but we shall be contented if we hear some good speeches first.\n\nLet Phaedrus begin the praise of Love, and good luck to him.\n\nAll the company expressed their assent, and desired him to do as Socrates bade him.\n\nAristodemus did not recollect all that was said, nor do I recollect all that he related to me; but I will tell you what I thought most worthy of remembrance, and what the chief speakers said.\n\nPhaedrus began by affirming that love is a mighty god, and wonderful among gods and men, but especially wonderful in his birth.\n\nFor he is the eldest of the gods, which is an honour to him; and a proof of his claim to this honour is, that of his parents there is no memorial; neither poet nor prose-writer has ever affirmed that he had any.\n\nAs Hesiod says: First Chaos came, and then broad-bosomed Earth, The everlasting seat of all that is, And Love.\n\nIn other words, after Chaos, the Earth and Love, these two, came into being.\n\nAlso Parmenides sings of Generation: First in the train of gods, he fashioned Love.\n\nAnd Acusilaus agrees with Hesiod.\n\nThus numerous are the witnesses who acknowledge Love to be the eldest of the gods.\n\nAnd not only is he the eldest, he is also the source of the greatest benefits to us.\n\nFor I know not any greater blessing to a young man who is beginning life than a virtuous lover or to the lover than a beloved youth.\n\nFor the principle which ought to be the guide of men who would nobly live at principle, I say, neither kindred, nor honour, nor wealth, nor any other motive is able to implant so well as love.\n\nOf what am I speaking?\n\nOf the sense of honour and dishonour, without which neither states nor individuals ever do any good or great work.\n\nAnd I say that a lover who is detected in doing any dishonourable act, or submitting through cowardice when any dishonour is done to him by another, will be more pained at being detected by his beloved than at being seen by his father, or by his companions, or by any one else.\n\nThe beloved too, when he is found in any disgraceful situation, has the same feeling about his lover.\n\nAnd if there were only some way of contriving that a state or an army should be made up of lovers and their loves, they would be the very best governors of their own city, abstaining from all dishonour, and emulating one another in honour; and when fighting at each other's side, although a mere handful, they would overcome the world."

