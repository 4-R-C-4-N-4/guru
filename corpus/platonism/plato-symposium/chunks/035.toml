[content]
body = "You may imagine Brasidas and others to have been like Achilles; or you may imagine Nestor and Antenor to have been like Perides; and the same may be said of other famous men, but of this strange being you will never be able to find any likeness, however remote, either among men who now are or who ever have been-other than that which I have already suggested of Silenus and the satyrs; and they represent in a figure not only himself, but his words.\n\nFor, although I forgot to mention this to you before, his words are like the images of Silenus which open; they are ridiculous when you first hear them; he clothes himself in language that is like the skin of the wanton satyr-for his talk is of pack-asses and smiths and cobblers and curriers, and he is always repeating the same things in the same words, so that any ignorant or inexperienced person might feel disposed to laugh at him; but he who opens the bust and sees what is within will find that they are the only words which have a meaning in them, and also the most divine, abounding in fair images of virtue, and of the widest comprehension, or rather extending to the whole duty of a good and honourable man.\n\nThis, friends, is my praise of Socrates.\n\nI have added my blame of him for his ill-treatment of me; and he has ill-treated not only me, but Charmides the son of Glaucon, and Euthydemus the son of Diocles, and many others in the same way-beginning as their lover he has ended by making them pay their addresses to him.\n\nWherefore I say to you, Agathon, \"Be no deceived by him; learn from me: and take warning, and do not be a fool and learn by experience, as the proverb says.\" When Alcibiades had finished, there was a laugh at his outspokenness; for he seemed to be still in love with Socrates.\n\nYou are sober, Alcibiades, said Socrates, or you would never have gone so far about to hide the purpose of your satyr's praises, for all this long story is only an ingenious circumlocution, of which the point comes in by the way at the end; you want to get up a quarrel between me and Agathon, and your notion-is that I ought to love you and nobody else, and that you and you only ought to love Agathon.\n\nBut the plot of this Satyric or Silenic drama has been detected, and you must not allow him, Agathon, to set us at variance.\n\nI believe you are right, said Agathon, and I am disposed to think that his intention in placing himself between you and me was only to divide us; but he shall gain nothing by that move; for I will go and lie on the couch next to you.\n\nYes, yes, replied Socrates, by all means come here and lie on the couch below me.\n\nAlas, said Alcibiades, how I am fooled by this man; he is determined to get the better of me at every turn.\n\nI do beseech you, allow Agathon to lie between us.\n\nCertainly not, said Socrates, as you praised me, and I in turn ought to praise my neighbour on the right, he will be out of order in praising me again when he ought rather to be praised by me, and I must entreat you to consent to this, and not be jealous, for I have a great desire to praise the youth.\n\nHurrah!\n\ncried Agathon, I will rise instantly, that I may be praised by Socrates.\n\nThe usual way, said Alcibiades; where Socrates is, no one else has any chance with the fair; and now how readily has he invented a specious reason for attracting Agathon to himself."

