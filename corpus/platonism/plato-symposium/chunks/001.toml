[content]
body = "SYMPOSIUM by Plato 360 BC translated by Benjamin Jowett New York, C.\n\nScribner's sons [1871] PERSONS OF THE DIALOGUE: APOLLODORUS, who repeats to his companion the dialogue which he had heard from Aristodemus, and had already once narrated to Glaucon; PHAEDRUS; PAUSANIAS; ERYXIMACHUS; ARISTOPHANES; AGATHON; SOCRATES; ALCIBIADES; A TROOP OF REVELLERS.\n\nScene: The House of Agathon.\n\nConcerning the things about which you ask to be informed I believe that I am not ill-prepared with an answer.\n\nFor the day before yesterday I was coming from my own home at Phalerum to the city, and one of my acquaintance, who had caught a sight of me from behind, hind, out playfully in the distance, said: Apollodorus, O thou Phalerian man, halt!\n\nSo I did as I was bid; and then he said, I was looking for you, Apollodorus, only just now, that I might ask you about the speeches in praise of love, which were delivered by Socrates, Alcibiades, and others, at Agathon's supper.\n\nPhoenix, the son of Philip, told another person who told me of them; his narrative was very indistinct, but he said that you knew, and I wish that you would give me an account of them.\n\nWho, if not you, should be the reporter of the words of your friend?\n\nAnd first tell me, he said, were you present at this meeting?\n\nYour informant, Glaucon, I said, must have been very indistinct indeed, if you imagine that the occasion was recent; or that I could have been of the party.\n\nWhy, yes, he replied, I thought so.\n\nImpossible: I said.\n\nAre you ignorant that for many years Agathon has not resided at Athens; and not three have elapsed since I became acquainted with Socrates, and have made it my daily business to know all that he says and does.\n\nThere was a time when I was running about the world, fancying myself to be well employed, but I was really a most wretched thing, no better than you are now.\n\nI thought that I ought to do anything rather than be a philosopher.\n\nWell, he said, jesting apart, tell me when the meeting occurred.\n\nIn our boyhood, I replied, when Agathon won the prize with his first tragedy, on the day after that on which he and his chorus offered the sacrifice of victory.\n\nThen it must have been a long while ago, he said; and who told you-did Socrates?\n\nNo indeed, I replied, but the same person who told Phoenix;-he was a little fellow, who never wore any shoes Aristodemus, of the deme of Cydathenaeum.\n\nHe had been at Agathon's feast; and I think that in those days there was no one who was a more devoted admirer of Socrates.\n\nMoreover, I have asked Socrates about the truth of some parts of his narrative, and he confirmed them.\n\nThen, said Glaucon, let us have the tale over again; is not the road to Athens just made for conversation?\n\nAnd so we walked, and talked of the discourses on love; and therefore, as I said at first, I am not ill-prepared to comply with your request, and will have another rehearsal of them if you like.\n\nFor to speak or to hear others speak of philosophy always gives me the greatest pleasure, to say nothing of the profit."

