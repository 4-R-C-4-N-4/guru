[content]
body = "All creation or passage of non-being into being is poetry or making, and the processes of all art are creative; and the masters of arts are all poets or makers.\" \"Very true.\" \"Still,\" she said, \"you know that they are not called poets, but have other names; only that portion of the art which is separated off from the rest, and is concerned with music and metre, is termed poetry, and they who possess poetry in this sense of the word are called poets.\" \"Very true,\" I said.\n\n\"And the same holds of love.\n\nFor you may say generally that all desire of good and happiness is only the great and subtle power of love; but they who are drawn towards him by any other path, whether the path of money-making or gymnastics or philosophy, are not called lovers -the name of the whole is appropriated to those whose affection takes one form only-they alone are said to love, or to be lovers.\" \"I dare say,\" I replied, \"that you are right.\" \"Yes,\" she added, \"and you hear people say that lovers are seeking for their other half; but I say that they are seeking neither for the half of themselves, nor for the whole, unless the half or the whole be also a good.\n\nAnd they will cut off their own hands and feet and cast them away, if they are evil; for they love not what is their own, unless perchance there be some one who calls what belongs to him the good, and what belongs to another the evil.\n\nFor there is nothing which men love but the good.\n\nIs there anything?\" \"Certainly, I should say, that there is nothing.\" \"Then,\" she said, \"the simple truth is, that men love the good.\" \"Yes,\" I said.\n\n\"To which must be added that they love the possession of the good?\n\n\"Yes, that must be added.\" \"And not only the possession, but the everlasting possession of the good?\" \"That must be added too.\" \"Then love,\" she said, \"may be described generally as the love of the everlasting possession of the good?\" \"That is most true.\" \"Then if this be the nature of love, can you tell me further,\" she said, \"what is the manner of the pursuit?\n\nwhat are they doing who show all this eagerness and heat which is called love?\n\nand what is the object which they have in view?\n\nAnswer me.\" \"Nay, Diotima,\" I replied, \"if I had known, I should not have wondered at your wisdom, neither should I have come to learn from you about this very matter.\" \"Well,\" she said, \"I will teach you:-The object which they have in view is birth in beauty, whether of body or, soul.\" \"I do not understand you,\" I said; \"the oracle requires an explanation.\" \"I will make my meaning dearer,\" she replied.\n\n\"I mean to say, that all men are bringing to the birth in their bodies and in their souls.\n\nThere is a certain age at which human nature is desirous of procreation-procreation which must be in beauty and not in deformity; and this procreation is the union of man and woman, and is a divine thing; for conception and generation are an immortal principle in the mortal creature, and in the inharmonious they can never be.\n\nBut the deformed is always inharmonious with the divine, and the beautiful harmonious.\n\nBeauty, then, is the destiny or goddess of parturition who presides at birth, and therefore, when approaching beauty, the conceiving power is propitious, and diffusive, and benign, and begets and bears fruit: at the sight of ugliness she frowns and contracts and has a sense of pain, and turns away, and shrivels up, and not without a pang refrains from conception."

