[content]
body = "So he gave a turn to the face and pulled the skin from the sides all over that which in our language is called the belly, like the purses which draw in, and he made one mouth at the centre, which he fastened in a knot (the same which is called the navel); he also moulded the breast and took out most of the wrinkles, much as a shoemaker might smooth leather upon a last; he left a few, however, in the region of the belly and navel, as a memorial of the primeval state.\n\nAfter the division the two parts of man, each desiring his other half, came together, and throwing their arms about one another, entwined in mutual embraces, longing to grow into one, they were on the point of dying from hunger and self-neglect, because they did not like to do anything apart; and when one of the halves died and the other survived, the survivor sought another mate, man or woman as we call them, being the sections of entire men or women, and clung to that.\n\nThey were being destroyed, when Zeus in pity of them invented a new plan: he turned the parts of generation round to the front, for this had not been always their position and they sowed the seed no longer as hitherto like grasshoppers in the ground, but in one another; and after the transposition the male generated in the female in order that by the mutual embraces of man and woman they might breed, and the race might continue; or if man came to man they might be satisfied, and rest, and go their ways to the business of life: so ancient is the desire of one another which is implanted in us, reuniting our original nature, making one of two, and healing the state of man.\n\nEach of us when separated, having one side only, like a flat fish, is but the indenture of a man, and he is always looking for his other half.\n\nMen who are a section of that double nature which was once called Androgynous are lovers of women; adulterers are generally of this breed, and also adulterous women who lust after men: the women who are a section of the woman do not care for men, but have female attachments; the female companions are of this sort.\n\nBut they who are a section of the male follow the male, and while they are young, being slices of the original man, they hang about men and embrace them, and they are themselves the best of boys and youths, because they have the most manly nature.\n\nSome indeed assert that they are shameless, but this is not true; for they do not act thus from any want of shame, but because they are valiant and manly, and have a manly countenance, and they embrace that which is like them.\n\nAnd these when they grow up become our statesmen, and these only, which is a great proof of the truth of what I am saving.\n\nWhen they reach manhood they are loves of youth, and are not naturally inclined to marry or beget children,-if at all, they do so only in obedience to the law; but they are satisfied if they may be allowed to live with one another unwedded; and such a nature is prone to love and ready to return love, always embracing that which is akin to him.\n\nAnd when one of them meets with his other half, the actual half of himself, whether he be a lover of youth or a lover of another sort, the pair are lost in an amazement of love and friendship and intimacy, and would not be out of the other's sight, as I may say, even for a moment: these are the people who pass their whole lives together; yet they could not explain what they desire of one another."

