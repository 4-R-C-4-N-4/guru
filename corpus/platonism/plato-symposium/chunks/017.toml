[content]
body = "Many things were said by Phaedrus about Love in which I agree with him; but I cannot agree that he is older than Iapetus and Kronos:-not so; I maintain him to be the youngest of the gods, and youthful ever.\n\nThe ancient doings among the gods of which Hesiod and Parmenides spoke, if the tradition of them be true, were done of Necessity and not Love; had Love been in those days, there would have been no chaining or mutilation of the gods, or other violence, but peace and sweetness, as there is now in heaven, since the rule of Love began.\n\nLove is young and also tender; he ought to have a poet like Homer to describe his tenderness, as Homer says of Ate, that she is a goddess and tender: Her feet are tender, for she sets her steps, Not on the ground but on the heads of men: herein is an excellent proof of her tenderness that,-she walks not upon the hard but upon the soft.\n\nLet us adduce a similar proof of the tenderness of Love; for he walks not upon the earth, nor yet upon skulls of men, which are not so very soft, but in the hearts and souls of both god, and men, which are of all things the softest: in them he walks and dwells and makes his home.\n\nNot in every soul without exception, for Where there is hardness he departs, where there is softness there he dwells; and nestling always with his feet and in all manner of ways in the softest of soft places, how can he be other than the softest of all things?\n\nOf a truth he is the tenderest as well as the youngest, and also he is of flexile form; for if he were hard and without flexure he could not enfold all things, or wind his way into and out of every soul of man undiscovered.\n\nAnd a proof of his flexibility and symmetry of form is his grace, which is universally admitted to be in an especial manner the attribute of Love; ungrace and love are always at war with one another.\n\nThe fairness of his complexion is revealed by his habitation among the flowers; for he dwells not amid bloomless or fading beauties, whether of body or soul or aught else, but in the place of flowers and scents, there he sits and abides.\n\nConcerning the beauty of the god I have said enough; and yet there remains much more which I might say.\n\nOf his virtue I have now to speak: his greatest glory is that he can neither do nor suffer wrong to or from any god or any man; for he suffers not by force if he suffers; force comes not near him, neither when he acts does he act by force.\n\nFor all men in all things serve him of their own free will, and where there is voluntary agreement, there, as the laws which are the lords of the city say, is justice.\n\nAnd not only is he just but exceedingly temperate, for Temperance is the acknowledged ruler of the pleasures and desires, and no pleasure ever masters Love; he is their master and they are his servants; and if he conquers them he must be temperate indeed.\n\nAs to courage, even the God of War is no match for him; he is the captive and Love is the lord, for love, the love of Aphrodite, masters him, as the tale runs; and the master is stronger than the servant.\n\nAnd if he conquers the bravest of all others, he must be himself the bravest.\n\nOf his courage and justice and temperance I have spoken, but I have yet to speak of his wisdom-and according to the measure of my ability I must try to do my best."

