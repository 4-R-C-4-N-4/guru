[content]
body = "Thereupon he was led in by the people who were with him; and as he was being led, intending to crown Agathon, he took the ribands from his own head and held them in front of his eyes; he was thus prevented from seeing Socrates, who made way for him, and Alcibiades took the vacant place between Agathon and Socrates, and in taking the place he embraced Agathon and crowned him.\n\nTake off his sandals, said Agathon, and let him make a third on the same couch.\n\nBy all means; but who makes the third partner in our revels?\n\nsaid Alcibiades, turning round and starting up as he caught sight of Socrates.\n\nBy Heracles, he said, what is this?\n\nhere is Socrates always lying in wait for me, and always, as his way is, coming out at all sorts of unsuspected places: and now, what have you to say for yourself, and why are you lying here, where I perceive that you have contrived to find a place, not by a joker or lover of jokes, like Aristophanes, but by the fairest of the company?\n\nSocrates turned to Agathon and said: I must ask you to protect me, Agathon; for the passion of this man has grown quite a serious matter to me.\n\nSince I became his admirer I have never been allowed to speak to any other fair one, or so much as to look at them.\n\nIf I do, he goes wild with envy and jealousy, and not only abuses me but can hardly keep his hands off me, and at this moment he may do me some harm.\n\nPlease to see to this, and either reconcile me to him, or, if he attempts violence, protect me, as I am in bodily fear of his mad and passionate attempts.\n\nThere can never be reconciliation between you and me, said Alcibiades; but for the present I will defer your chastisement.\n\nAnd I must beg you, Agathoron, to give me back some of the ribands that I may crown the marvellous head of this universal despot-I would not have him complain of me for crowning you, and neglecting him, who in conversation is the conqueror of all mankind; and this not only once, as you were the day before yesterday, but always.\n\nWhereupon, taking some of the ribands, he crowned Socrates, and again reclined.\n\nThen he said: You seem, my friends, to be sober, which is a thing not to be endured; you must drink-for that was the agreement under which I was admitted-and I elect myself master of the feast until you are well drunk.\n\nLet us have a large goblet, Agathon, or rather, he said, addressing the attendant, bring me that wine-cooler.\n\nThe wine-cooler which had caught his eye was a vessel holding more than two quarts-this he filled and emptied, and bade the attendant fill it again for Socrates.\n\nObserve, my friends, said Alcibiades, that this ingenious trick of mine will have no effect on Socrates, for he can drink any quantity of wine and not be at all nearer being drunk.\n\nSocrates drank the cup which the attendant filled for him.\n\nEryximachus said!\n\nWhat is this Alcibiades?\n\nAre we to have neither conversation nor singing over our cups; but simply to drink as if we were thirsty?\n\nAlcibiades replied: Hail, worthy son of a most wise and worthy sire!\n\nThe same to you, said Eryximachus; but what shall we do?\n\nThat I leave to you, said Alcibiades.\n\nThe wise physician skilled our wounds to heal shall prescribe and we will obey.\n\nWhat do you want?"

