[content]
body = "For the intense yearning which each of them has towards the other does not appear to be the desire of lover's intercourse, but of something else which the soul of either evidently desires and cannot tell, and of which she has only a dark and doubtful presentiment.\n\nSuppose Hephaestus, with his instruments, to come to the pair who are lying side, by side and to say to them, \"What do you people want of one another?\" they would be unable to explain.\n\nAnd suppose further, that when he saw their perplexity he said: \"Do you desire to be wholly one; always day and night to be in one another's company?\n\nfor if this is what you desire, I am ready to melt you into one and let you grow together, so that being two you shall become one, and while you live a common life as if you were a single man, and after your death in the world below still be one departed soul instead of two-I ask whether this is what you lovingly desire, and whether you are satisfied to attain this?\"-there is not a man of them who when he heard the proposal would deny or would not acknowledge that this meeting and melting into one another, this becoming one instead of two, was the very expression of his ancient need.\n\nAnd the reason is that human nature was originally one and we were a whole, and the desire and pursuit of the whole is called love.\n\nThere was a time, I say, when we were one, but now because of the wickedness of mankind God has dispersed us, as the Arcadians were dispersed into villages by the Lacedaemonians.\n\nAnd if we are not obedient to the gods, there is a danger that we shall be split up again and go about in basso-relievo, like the profile figures having only half a nose which are sculptured on monuments, and that we shall be like tallies.\n\nWherefore let us exhort all men to piety, that we may avoid evil, and obtain the good, of which Love is to us the lord and minister; and let no one oppose him-he is the enemy of the gods who oppose him.\n\nFor if we are friends of the God and at peace with him we shall find our own true loves, which rarely happens in this world at present.\n\nI am serious, and therefore I must beg Eryximachus not to make fun or to find any allusion in what I am saying to Pausanias and Agathon, who, as I suspect, are both of the manly nature, and belong to the class which I have been describing.\n\nBut my words have a wider application-they include men and women everywhere; and I believe that if our loves were perfectly accomplished, and each one returning to his primeval nature had his original true love, then our race would be happy.\n\nAnd if this would be best of all, the best in the next degree and under present circumstances must be the nearest approach to such an union; and that will be the attainment of a congenial love.\n\nWherefore, if we would praise him who has given to us the benefit, we must praise the god Love, who is our greatest benefactor, both leading us in this life back to our own nature, and giving us high hopes for the future, for he promises that if we are pious, he will restore us to our original state, and heal us and make us happy and blessed.\n\nThis, Eryximachus, is my discourse of love, which, although different to yours, I must beg you to leave unassailed by the shafts of your ridicule, in order that each may have his turn; each, or rather either, for Agathon and Socrates are the only ones left."

