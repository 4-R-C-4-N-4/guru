[content]
body = "True, he said.\n\nThen Love wants and has not beauty?\n\nCertainly, he replied.\n\nAnd would you call that beautiful which wants and does not possess beauty?\n\nCertainly not.\n\nThen would you still say that love is beautiful?\n\nAgathon replied: I fear that I did not understand what I was saying.\n\nYou made a very good speech, Agathon, replied Socrates; but there is yet one small question which I would fain ask:-Is not the good also the beautiful?\n\nYes.\n\nThen in wanting the beautiful, love wants also the good?\n\nI cannot refute you, Socrates, said Agathon:-Let us assume that what you say is true.\n\nSay rather, beloved Agathon, that you cannot refute the truth; for Socrates is easily refuted.\n\nAnd now, taking my leave of you, I would rehearse a tale of love which I heard from Diotima of Mantineia, a woman wise in this and in many other kinds of knowledge, who in the days of old, when the Athenians offered sacrifice before the coming of the plague, delayed the disease ten years.\n\nShe was my instructress in the art of love, and I shall repeat to you what she said to me, beginning with the admissions made by Agathon, which are nearly if not quite the same which I made to the wise woman when she questioned me-I think that this will be the easiest way, and I shall take both parts myself as well as I can.\n\nAs you, Agathon, suggested, I must speak first of the being and nature of Love, and then of his works.\n\nFirst I said to her in nearly the same words which he used to me, that Love was a mighty god, and likewise fair and she proved to me as I proved to him that, by my own showing, Love was neither fair nor good.\n\n\"What do you mean, Diotima,\" I said, \"is love then evil and foul?\" \"Hush,\" she cried; \"must that be foul which is not fair?\" \"Certainly,\" I said.\n\n\"And is that which is not wise, ignorant?\n\ndo you not see that there is a mean between wisdom and ignorance?\" \"And what may that be?\" I said.\n\n\"Right opinion,\" she replied; \"which, as you know, being incapable of giving a reason, is not knowledge (for how can knowledge be devoid of reason?\n\nnor again, ignorance, for neither can ignorance attain the truth), but is clearly something which is a mean between ignorance and wisdom.\" \"Quite true,\" I replied.\n\n\"Do not then insist,\" she said, \"that what is not fair is of necessity foul, or what is not good evil; or infer that because love is not fair and good he is therefore foul and evil; for he is in a mean between them.\" \"Well,\" I said, \"Love is surely admitted by all to be a great god.\" \"By those who know or by those who do not know?\" \"By all.\" \"And how, Socrates,\" she said with a smile, \"can Love be acknowledged to be a great god by those who say that he is not a god at all?\" \"And who are they?\" I said.\n\n\"You and I are two of them,\" she replied.\n\n\"How can that be?\" I said.\n\n\"It is quite intelligible,\" she replied; \"for you yourself would acknowledge that the gods are happy and fair of course you would-would to say that any god was not?\" \"Certainly not,\" I replied."

