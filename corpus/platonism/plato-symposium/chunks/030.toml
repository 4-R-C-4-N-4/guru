[content]
body = "Well, said Eryximachus, before you appeared we had passed a resolution that each one of us in turn should make a speech in praise of love, and as good a one as he could: the turn was passed round from left to right; and as all of us have spoken, and you have not spoken but have well drunken, you ought to speak, and then impose upon Socrates any task which you please, and he on his right hand neighbour, and so on.\n\nThat is good, Eryximachus, said Alcibiades; and yet the comparison, of a drunken man's speech with those of sober men is hardly fair; and I should like to know, sweet friend, whether you really believe-what Socrates was just now saying; for I can assure you that the very reverse is the fact, and that if I praise any one but himself in his presence, whether God or man, he will hardly keep his hands off me.\n\nFor shame, said Socrates.\n\nHold your tongue, said Alcibiades, for by Poseidon, there is no one else whom I will praise when you are-of the company.\n\nWell then, said Eryximachus, if you like praise Socrates.\n\nWhat do you think, Eryximachus-?\n\nsaid Alcibiades: shall I attack him: and inflict the punishment before you all?\n\nWhat are you about?\n\nsaid Socrates; are you going to raise a laugh at my expense?\n\nIs that the meaning of your praise?\n\nI am going to speak the truth, if you will permit me.\n\nI not only permit, but exhort you to speak the truth.\n\nThen I will begin at once, said Alcibiades, and if I say anything which is not true, you may interrupt me if you will, and say \"that is a lie,\" though my intention is to speak the truth.\n\nBut you must not wonder if I speak any how as things come into my mind; for the fluent and orderly enumeration of all your singularities is not a task which is easy to a man in my condition.\n\nAnd now, my boys, I shall praise Socrates in a figure which will appear to him to be a caricature, and yet I speak, not to make fun of him, but only for the truth's sake.\n\nI say, that he is exactly like the busts of Silenus, which are set up in the statuaries, shops, holding pipes and flutes in their mouths; and they are made to open in the middle, and have images of gods inside them.\n\nI say also that hit is like Marsyas the satyr.\n\nYou yourself will not deny, Socrates, that your face is like that of a satyr.\n\nAye, and there is a resemblance in other points too.\n\nFor example, you are a bully, as I can prove by witnesses, if you will not confess.\n\nAnd are you not a flute-player?\n\nThat you are, and a performer far more wonderful than Marsyas.\n\nHe indeed with instruments used to charm the souls of men by the powers of his breath, and the players of his music do so still: for the melodies of Olympus are derived from Marsyas who taught them, and these, whether they are played by a great master or by a miserable flute-girl, have a power which no others have; they alone possess the soul and reveal the wants of those who have need of gods and mysteries, because they are divine.\n\nBut you produce the same effect with your words only, and do not require the flute; that is the difference between you and him."

