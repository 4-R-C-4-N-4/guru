[content]
body = "Now here and in Lacedaemon the rules about love are perplexing, but in most cities they are simple and easily intelligible; in Elis and Boeotia, and in countries having no gifts of eloquence, they are very straightforward; the law is simply in favour of these connexions, and no one, whether young or old, has anything to say to their discredit; the reason being, as I suppose, that they are men of few words in those parts, and therefore the lovers do not like the trouble of pleading their suit.\n\nIn Ionia and other places, and generally in countries which are subject to the barbarians, the custom is held to be dishonourable; loves of youths share the evil repute in which philosophy and gymnastics are held because they are inimical to tyranny; for the interests of rulers require that their subjects should be poor in spirit and that there should be no strong bond of friendship or society among them, which love, above all other motives, is likely to inspire, as our Athenian tyrants-learned by experience; for the love of Aristogeiton and the constancy of Harmodius had strength which undid their power.\n\nAnd, therefore, the ill-repute into which these attachments have fallen is to be ascribed to the evil condition of those who make them to be ill-reputed; that is to say, to the self-seeking of the governors and the cowardice of the governed; on the other hand, the indiscriminate honour which is given to them in some countries is attributable to the laziness of those who hold this opinion of them.\n\nIn our own country a far better principle prevails, but, as I was saying, the explanation of it is rather perplexing.\n\nFor, observe that open loves are held to be more honourable than secret ones, and that the love of the noblest and highest, even if their persons are less beautiful than others, is especially honourable.\n\nConsider, too, how great is the encouragement which all the world gives to the lover; neither is he supposed to be doing anything dishonourable; but if he succeeds he is praised, and if he fail he is blamed.\n\nAnd in the pursuit of his love the custom of mankind allows him to do many strange things, which philosophy would bitterly censure if they were done from any motive of interest, or wish for office or power.\n\nHe may pray, and entreat, and supplicate, and swear, and lie on a mat at the door, and endure a slavery worse than that of any slave-in any other case friends and enemies would be equally ready to prevent him, but now there is no friend who will be ashamed of him and admonish him, and no enemy will charge him with meanness or flattery; the actions of a lover have a grace which ennobles them; and custom has decided that they are highly commendable and that there no loss of character in them; and, what is strangest of all, he only may swear and forswear himself (so men say), and the gods will forgive his transgression, for there is no such thing as a lover's oath.\n\nSuch is the entire liberty which gods and men have allowed the lover, according to the custom which prevails in our part of the world.\n\nFrom this point of view a man fairly argues in Athens to love and to be loved is held to be a very honourable thing.\n\nBut when parents forbid their sons to talk with their lovers, and place them under a tutor's care, who is appointed to see to these things, and their companions and equals cast in their teeth anything of the sort which they may observe, and their elders refuse to silence the reprovers and do not rebuke them-any one who reflects on all this will, on the contrary, think that we hold these practices to be most disgraceful."

