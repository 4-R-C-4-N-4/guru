[content]
body = "But when I hear another strain, especially that of you rich men and traders, such conversation displeases me; and I pity you who are my companions, because you think that you are doing something when in reality you are doing nothing.\n\nAnd I dare say that you pity me in return, whom you regard as an unhappy creature, and very probably you are right.\n\nBut I certainly know of you what you only think of me-there is the difference.\n\nCompanion.\n\nI see, Apollodorus, that you are just the same-always speaking evil of yourself, and of others; and I do believe that you pity all mankind, with the exception of Socrates, yourself first of all, true in this to your old name, which, however deserved I know how you acquired, of Apollodorus the madman; for you are always raging against yourself and everybody but Socrates.\n\nApollodorus.\n\nYes, friend, and the reason why I am said to be mad, and out of my wits, is just because I have these notions of myself and you; no other evidence is required.\n\nCom.\n\nNo more of that, Apollodorus; but let me renew my request that you would repeat the conversation.\n\nApoll.\n\nWell, the tale of love was on this wise:-But perhaps I had better begin at the beginning, and endeavour to give you the exact words of Aristodemus: He said that he met Socrates fresh from the bath and sandalled; and as the sight of the sandals was unusual, he asked him whither he was going that he had been converted into such a beau:- To a banquet at Agathon's, he replied, whose invitation to his sacrifice of victory I refused yesterday, fearing a crowd, but promising that I would come to-day instead; and so I have put on my finery, because he is such a fine man.\n\nWhat say you to going with me unasked?\n\nI will do as you bid me, I replied.\n\nFollow then, he said, and let us demolish the proverb: To the feasts of inferior men the good unbidden go; instead of which our proverb will run:- To the feasts of the good the good unbidden go; and this alteration may be supported by the authority of Homer himself, who not only demolishes but literally outrages the proverb.\n\nFor, after picturing Agamemnon as the most valiant of men, he makes Menelaus, who is but a fainthearted warrior, come unbidden to the banquet of Agamemnon, who is feasting and offering sacrifices, not the better to the worse, but the worse to the better.\n\nI rather fear, Socrates, said Aristodemus, lest this may still be my case; and that, like Menelaus in Homer, I shall be the inferior person, who To the leasts of the wise unbidden goes.\n\nBut I shall say that I was bidden of you, and then you will have to make an excuse.\n\nTwo going together, he replied, in Homeric fashion, one or other of them may invent an excuse by the way.\n\nThis was the style of their conversation as they went along.\n\nSocrates dropped behind in a fit of abstraction, and desired Aristodemus, who was waiting, to go on before him.\n\nWhen he reached the house of Agathon he found the doors wide open, and a comical thing happened.\n\nA servant coming out met him, and led him at once into the banqueting-hall in which the guests were reclining, for the banquet was about to begin."

