[content]
body = "Marvel not then at the love which all men have of their offspring; for that universal love and interest is for the sake of immortality.\" I was astonished at her words, and said: \"Is this really true, O thou wise Diotima?\" And she answered with all the authority of an accomplished sophist: \"Of that, Socrates, you may be assured;-think only of the ambition of men, and you will wonder at the senselessness of their ways, unless you consider how they are stirred by the love of an immortality of fame.\n\nThey are ready to run all risks greater far than they would have for their children, and to spend money and undergo any sort of toil, and even to die, for the sake of leaving behind them a name which shall be eternal.\n\nDo you imagine that Alcestis would have died to save Admetus, or Achilles to avenge Patroclus, or your own Codrus in order to preserve the kingdom for his sons, if they had not imagined that the memory of their virtues, which still survives among us, would be immortal?\n\nNay,\" she said, \"I am persuaded that all men do all things, and the better they are the more they do them, in hope of the glorious fame of immortal virtue; for they desire the immortal.\n\n\"Those who are pregnant in the body only, betake themselves to women and beget children-this is the character of their love; their offspring, as they hope, will preserve their memory and giving them the blessedness and immortality which they desire in the future.\n\nBut souls which are pregnant-for there certainly are men who are more creative in their souls than in their bodies conceive that which is proper for the soul to conceive or contain.\n\nAnd what are these conceptions?-wisdom and virtue in general.\n\nAnd such creators are poets and all artists who are deserving of the name inventor.\n\nBut the greatest and fairest sort of wisdom by far is that which is concerned with the ordering of states and families, and which is called temperance and justice.\n\nAnd he who in youth has the seed of these implanted in him and is himself inspired, when he comes to maturity desires to beget and generate.\n\nHe wanders about seeking beauty that he may beget offspring-for in deformity he will beget nothing-and naturally embraces the beautiful rather than the deformed body; above all when he finds fair and noble and well-nurtured soul, he embraces the two in one person, and to such an one he is full of speech about virtue and the nature and pursuits of a good man; and he tries to educate him; and at the touch of the beautiful which is ever present to his memory, even when absent, he brings forth that which he had conceived long before, and in company with him tends that which he brings forth; and they are married by a far nearer tie and have a closer friendship than those who beget mortal children, for the children who are their common offspring are fairer and more immortal.\n\nWho, when he thinks of Homer and Hesiod and other great poets, would not rather have their children than ordinary human ones?\n\nWho would not emulate them in the creation of children such as theirs, which have preserved their memory and given them everlasting glory?\n\nOr who would not have such children as Lycurgus left behind him to be the saviours, not only of Lacedaemon, but of Hellas, as one may say?\n\nThere is Solon, too, who is the revered father of Athenian laws; and many others there are in many other places, both among hellenes and barbarians, who have given to the world many noble works, and have been the parents of virtue of every kind; and many temples have been raised in their honour for the sake of children such as theirs; which were never raised in honour of any one, for the sake of his mortal children."

