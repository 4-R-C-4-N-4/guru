[content]
body = "Now, when they should be implanted in bodies by necessity, and be always gaining or losing some part of their bodily substance, then in the first place it would be necessary that they should all have in them one and the same faculty of sensation, arising out of irresistible impressions; in the second place, they must have love, in which pleasure and pain mingle; also fear and anger, and the feelings which are akin or opposite to them; if they conquered these they would live righteously, and if they were conquered by them, unrighteously.\n\nHe who lived well during his appointed time was to return and dwell in his native star, and there he would have a blessed and congenial existence.\n\nBut if he failed in attaining this, at the second birth he would pass into a woman, and if, when in that state of being, he did not desist from evil, he would continually be changed into some brute who resembled him in the evil nature which he had acquired, and would not cease from his toils and transformations until he followed the revolution of the same and the like within him, and overcame by the help of reason the turbulent and irrational mob of later accretions, made up of fire and air and water and earth, and returned to the form of his first and better state.\n\nHaving given all these laws to his creatures, that he might be guiltless of future evil in any of them, the creator sowed some of them in the earth, and some in the moon, and some in the other instruments of time; and when he had sown them he committed to the younger gods the fashioning of their mortal bodies, and desired them to furnish what was still lacking to the human soul, and having made all the suitable additions, to rule over them, and to pilot the mortal animal in the best and wisest manner which they could, and avert from him all but self-inflicted evils.\n\nWhen the creator had made all these ordinances he remained in his own accustomed nature, and his children heard and were obedient to their father's word, and receiving from him the immortal principle of a mortal creature, in imitation of their own creator they borrowed portions of fire, and earth, and water, and air from the world, which were hereafter to be restored-these they took and welded them together, not with the indissoluble chains by which they were themselves bound, but with little pegs too small to be visible, making up out of all the four elements each separate body, and fastening the courses of the immortal soul in a body which was in a state of perpetual influx and efflux.\n\nNow these courses, detained as in a vast river, neither overcame nor were overcome; but were hurrying and hurried to and fro, so that the whole animal was moved and progressed, irregularly however and irrationally and anyhow, in all the six directions of motion, wandering backwards and forwards, and right and left, and up and down, and in all the six directions.\n\nFor great as was the advancing and retiring flood which provided nourishment, the affections produced by external contact caused still greater tumult-when the body of any one met and came into collision with some external fire, or with the solid earth or the gliding waters, or was caught in the tempest borne on the air, and the motions produced by any of these impulses were carried through the body to the soul.\n\nAll such motions have consequently received the general name of \"sensations,\" which they still retain.\n\nAnd they did in fact at that time create a very great and mighty movement; uniting with the ever flowing stream in stirring up and violently shaking the courses of the soul, they completely stopped the revolution of the same by their opposing current, and hindered it from predominating and advancing; and they so disturbed the nature of the other or diverse, that the three double intervals [i.e."

