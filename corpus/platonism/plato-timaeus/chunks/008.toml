[content]
body = "First then, in my judgment, we must make a distinction and ask, What is that which always is and has no becoming; and what is that which is always becoming and never is?\n\nThat which is apprehended by intelligence and reason is always in the same state; but that which is conceived by opinion with the help of sensation and without reason, is always in a process of becoming and perishing and never really is.\n\nNow everything that becomes or is created must of necessity be created by some cause, for without a cause nothing can be created.\n\nThe work of the creator, whenever he looks to the unchangeable and fashions the form and nature of his work after an unchangeable pattern, must necessarily be made fair and perfect; but when he looks to the created only, and uses a created pattern, it is not fair or perfect.\n\nWas the heaven then or the world, whether called by this or by any other more appropriate name-assuming the name, I am asking a question which has to be asked at the beginning of an enquiry about anything-was the world, I say, always in existence and without beginning?\n\nor created, and had it a beginning?\n\nCreated, I reply, being visible and tangible and having a body, and therefore sensible; and all sensible things are apprehended by opinion and sense and are in a process of creation and created.\n\nNow that which is created must, as we affirm, of necessity be created by a cause.\n\nBut the father and maker of all this universe is past finding out; and even if we found him, to tell of him to all men would be impossible.\n\nAnd there is still a question to be asked about him: Which of the patterns had the artificer in view when he made the world-the pattern of the unchangeable, or of that which is created?\n\nIf the world be indeed fair and the artificer good, it is manifest that he must have looked to that which is eternal; but if what cannot be said without blasphemy is true, then to the created pattern.\n\nEvery one will see that he must have looked to, the eternal; for the world is the fairest of creations and he is the best of causes.\n\nAnd having been created in this way, the world has been framed in the likeness of that which is apprehended by reason and mind and is unchangeable, and must therefore of necessity, if this is admitted, be a copy of something.\n\nNow it is all-important that the beginning of everything should be according to nature.\n\nAnd in speaking of the copy and the original we may assume that words are akin to the matter which they describe; when they relate to the lasting and permanent and intelligible, they ought to be lasting and unalterable, and, as far as their nature allows, irrefutable and immovable-nothing less.\n\nBut when they express only the copy or likeness and not the eternal things themselves, they need only be likely and analogous to the real words.\n\nAs being is to becoming, so is truth to belief.\n\nIf then, Socrates, amid the many opinions about the gods and the generation of the universe, we are not able to give notions which are altogether and in every respect exact and consistent with one another, do not be surprised.\n\nEnough, if we adduce probabilities as likely as any others; for we must remember that I who am the speaker, and you who are the judges, are only mortal men, and we ought to accept the tale which is probable and enquire no further.\n\nSoc.\n\nExcellent, Timaeus; and we will do precisely as you bid us.\n\nThe prelude is charming, and is already accepted by us-may we beg of you to proceed to the strain?\n\nTim.\n\nLet me tell you then why the creator made this world of generation.\n\nHe was good, and the good can never have any jealousy of anything."

