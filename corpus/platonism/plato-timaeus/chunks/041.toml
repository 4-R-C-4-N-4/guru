[content]
body = "Let us once more consider the phenomena of respiration, and enquire into the causes which have made it what it is.\n\nThey are as follows:-Seeing that there is no such thing as a vacuum into which any of those things which are moved can enter, and the breath is carried from us into the external air, the next point is, as will be dear to every one, that it does not go into a vacant space, but pushes its neighbour out of its place, and that which is thrust out in turn drives out its neighbour; and in this everything of necessity at last comes round to that place from whence the breath came forth, and enters in there, and following the breath, fills up the vacant space; and this goes on like the rotation of a wheel, because there can be no such thing as a vacuum.\n\nWherefore also the breast and the lungs, when they emit the breath, are replenished by the air which surrounds the body and which enters in through the pores of the flesh and is driven round in a circle; and again, the air which is sent away and passes out through the body forces the breath inwards through the passage of the mouth and the nostrils.\n\nNow the origin of this movement may be supposed to be as follows.\n\nIn the interior of every animal the hottest part is that which is around the blood and veins; it is in a manner on internal fountain of fire, which we compare to the network of a creel, being woven all of fire and extended through the centre of the body, while the-outer parts are composed of air.\n\nNow we must admit that heat naturally proceeds outward to its own place and to its kindred element; and as there are two exits for the heat, the out through the body, and the other through the mouth and nostrils, when it moves towards the one, it drives round the air at the other, and that which is driven round falls into the fire and becomes warm, and that which goes forth is cooled.\n\nBut when the heat changes its place, and the particles at the other exit grow warmer, the hotter air inclining in that direction and carried towards its native element, fire, pushes round the air at the other; and this being affected in the same way and communicating the same impulse, a circular motion swaying to and from is produced by the double process, which we call inspiration and expiration.\n\nThe phenomena of medical cupping-glasses and of the swallowing of drink and of the projection of bodies, whether discharged in the air or bowled along the ground, are to be investigated on a similar principle; and swift and slow sounds, which appear to be high and low, and are sometimes discordant on account of their inequality, and then again harmonical on account of the equality of the motion which they excite in us.\n\nFor when the motions of the antecedent swifter sounds begin to pause and the two are equalised, the slower sounds overtake the swifter and then propel them.\n\nWhen they overtake them they do not intrude a new and discordant motion, but introduce the beginnings of a slower, which answers to the swifter as it dies away, thus producing a single mixed expression out of high and low, whence arises a pleasure which even the unwise feel, and which to the wise becomes a higher sort of delight, being an imitation of divine harmony in mortal motions."

