[content]
body = "The proof of this is, that when there is any obstruction to the respiration, and a man draws in his breath by force, then no smell filters through, but the air without the smell alone penetrates.\n\nWherefore the varieties of smell have no name, and they have not many, or definite and simple kinds; but they are distinguished only painful and pleasant, the one sort irritating and disturbing the whole cavity which is situated between the head and the navel, the other having a soothing influence, and restoring this same region to an agreeable and natural condition.\n\nIn considering the third kind of sense, hearing, we must speak of the causes in which it originates.\n\nWe may in general assume sound to be a blow which passes through the ears, and is transmitted by means of the air, the brain, and the blood, to the soul, and that hearing is the vibration of this blow, which begins in the head and ends in the region of the liver.\n\nThe sound which moves swiftly is acute, and the sound which moves slowly is grave, and that which is regular is equable and smooth, and the reverse is harsh.\n\nA great body of sound is loud, and a small body of sound the reverse.\n\nRespecting the harmonies of sound I must hereafter speak.\n\nThere is a fourth class of sensible things, having many intricate varieties, which must now be distinguished.\n\nThey are called by the general name of colours, and are a flame which emanates from every sort of body, and has particles corresponding to the sense of sight.\n\nI have spoken already, in what has preceded, of the causes which generate sight, and in this place it will be natural and suitable to give a rational theory of colours.\n\nOf the particles coming from other bodies which fall upon the sight, some are smaller and some are larger, and some are equal to the parts of the sight itself.\n\nThose which are equal are imperceptible, and we call them transparent.\n\nThe larger produce contraction, the smaller dilation, in the sight, exercising a power akin to that of hot and cold bodies on the flesh, or of astringent bodies on the tongue, or of those heating bodies which we termed pungent.\n\nWhite and black are similar effects of contraction and dilation in another sphere, and for this reason have a different appearance.\n\nWherefore, we ought to term white that which dilates the visual ray, and the opposite of this is black.\n\nThere is also a swifter motion of a different sort of fire which strikes and dilates the ray of sight until it reaches the eyes, forcing a way through their passages and melting them, and eliciting from them a union of fire and water which we call tears, being itself an opposite fire which comes to them from an opposite direction-the inner fire flashes forth like lightning, and the outer finds a way in and is extinguished in the moisture, and all sorts of colours are generated by the mixture.\n\nThis affection is termed dazzling, and the object which produces it is called bright and flashing.\n\nThere is another sort of fire which is intermediate, and which reaches and mingles with the moisture of the eye without flashing; and in this, the fire mingling with the ray of the moisture, produces a colour like blood, to which we give the name of red.\n\nA bright hue mingled with red and white gives the colour called auburn.\n\nThe law of proportion, however, according to which the several colours are formed, even if a man knew he would be foolish in telling, for he could not give any necessary reason, nor indeed any tolerable or probable explanation of them.\n\nAgain, red, when mingled with black and white, becomes purple, but it becomes umber when the colours are burnt as well as mingled and the black is more thoroughly mixed with them."

