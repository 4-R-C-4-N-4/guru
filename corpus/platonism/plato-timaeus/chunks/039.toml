[content]
body = "The fleshy nature was not therefore wholly dried up, but a large sort of peel was parted off and remained over, which is now called the skin.\n\nThis met and grew by the help of the cerebral moisture, and became the circular envelopment of the head.\n\nAnd the moisture, rising up under the sutures, watered and closed in the skin upon the crown, forming a sort of knot.\n\nThe diversity of the sutures was caused by the power of the courses of the soul and of the food, and the more these struggled against one another the more numerous they became, and fewer if the struggle were less violent.\n\nThis skin the divine power pierced all round with fire, and out of the punctures which were thus made the moisture issued forth, and the liquid and heat which was pure came away, and a mixed part which was composed of the same material as the skin, and had a fineness equal to the punctures, was borne up by its own impulse and extended far outside the head, but being too slow to escape, was thrust back by the external air, and rolled up underneath the skin, where it took root.\n\nThus the hair sprang up in the skin, being akin to it because it is like threads of leather, but rendered harder and closer through the pressure of the cold, by which each hair, while in process of separation from the skin, is compressed and cooled.\n\nWherefore the creator formed the head hairy, making use of the causes which I have mentioned, and reflecting also that instead of flesh the brain needed the hair to be a light covering or guard, which would give shade in summer and shelter in winter, and at the same time would not impede our quickness of perception.\n\nFrom the combination of sinew, skin, and bone, in the structure of the finger, there arises a triple compound, which, when dried up, takes the form of one hard skin partaking of all three natures, and was fabricated by these second causes, but designed by mind which is the principal cause with an eye to the future.\n\nFor our creators well knew that women and other animals would some day be framed out of men, and they further knew that many animals would require the use of nails for many purposes; wherefore they fashioned in men at their first creation the rudiments of nails.\n\nFor this purpose and for these reasons they caused skin, hair, and nails to grow at the extremities of the limbs.\n\nAnd now that all the parts and members of the mortal animal had come together, since its life of necessity consisted of fire and breath, and it therefore wasted away by dissolution and depletion, the gods contrived the following remedy: They mingled a nature akin to that of man with other forms and perceptions, and thus created another kind of animal.\n\nThese are the trees and plants and seeds which have been improved by cultivation and are now domesticated among us; anciently there were only the will kinds, which are older than the cultivated.\n\nFor everything that partakes of life may be truly called a living being, and the animal of which we are now speaking partakes of the third kind of soul, which is said to be seated between the midriff and the navel, having no part in opinion or reason or mind, but only in feelings of pleasure and pain and the desires which accompany them.\n\nFor this nature is always in a passive state, revolving in and about itself, repelling the motion from without and using its own, and accordingly is not endowed by nature with the power of observing or reflecting on its own concerns.\n\nWherefore it lives and does not differ from a living being, but is fixed and rooted in the same spot, having no power of self-motion.\n\nNow after the superior powers had created all these natures to be food for us who are of the inferior nature, they cut various channels through the body as through a garden, that it might be watered as from a running stream."

