[content]
body = "And now I will endeavour to speak of the affections of particular parts, and the causes and agents of them, as far as I am able.\n\nIn the first place let us set forth what was omitted when we were speaking of juices, concerning the affections peculiar to the tongue.\n\nThese too, like most of the other affections, appear to be caused by certain contractions and dilations, but they have besides more of roughness and smoothness than is found in other affections; for whenever earthy particles enter into the small veins which are the testing of the tongue, reaching to the heart, and fall upon the moist, delicate portions of flesh-when, as they are dissolved, they contract and dry up the little veins, they are astringent if they are rougher, but if not so rough, then only harsh.\n\nThose of them which are of an abstergent nature, and purge the whole surface of the tongue, if they do it in excess, and so encroach as to consume some part of the flesh itself, like potash and soda, are all termed bitter.\n\nBut the particles which are deficient in the alkaline quality, and which cleanse only moderately, are called salt, and having no bitterness or roughness, are regarded as rather agreeable than otherwise.\n\nBodies which share in and are made smooth by the heat of the mouth, and which are inflamed, and again in turn inflame that which heats them, and which are so light that they are carried upwards to the sensations of the head, and cut all that comes in their way, by reason of these qualities in them, are all termed pungent.\n\nBut when these same particles, refined by putrefaction, enter into the narrow veins, and are duly proportioned to the particles of earth and air which are there, they set them whirling about one another, and while they are in a whirl cause them to dash against and enter into one another, and so form hollows surrounding the particles that enter-which watery vessels of air (for a film of moisture, sometimes earthy, sometimes pure, is spread around the air) are hollow spheres of water; and those of them which are pure, are transparent, and are called bubbles, while those composed of the earthy liquid, which is in a state of general agitation and effervescence, are said to boil or ferment-of all these affections the cause is termed acid.\n\nAnd there is the opposite affection arising from an opposite cause, when the mass of entering particles, immersed in the moisture of the mouth, is congenial to the tongue, and smooths and oils over the roughness, and relaxes the parts which are unnaturally contracted, and contracts the parts which are relaxed, and disposes them all according to their nature-that sort of remedy of violent affections is pleasant and agreeable to every man, and has the name sweet.\n\nBut enough of this.\n\nThe faculty of smell does not admit of differences of kind; for all smells are of a half formed nature, and no element is so proportioned as to have any smell.\n\nThe veins about the nose are too narrow to admit earth and water, and too wide to detain fire and air; and for this reason no one ever perceives the smell of any of them; but smells always proceed from bodies that are damp, or putrefying, or liquefying, or evaporating, and are perceptible only in the intermediate state, when water is changing into air and air into water; and all of them are either vapor or mist.\n\nThat which is passing out of air into water is mist, and that which is passing from water into air is vapour; and hence all smells are thinner than water and thicker than air."

