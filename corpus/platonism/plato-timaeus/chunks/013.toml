[content]
body = "They are all parts of time, and the past and future are created species of time, which we unconsciously but wrongly transfer to the eternal essence; for we say that he \"was,\" he \"is,\" he \"will be,\" but the truth is that \"is\" alone is properly attributed to him, and that \"was\" and \"will be\" only to be spoken of becoming in time, for they are motions, but that which is immovably the same cannot become older or younger by time, nor ever did or has become, or hereafter will be, older or younger, nor is subject at all to any of those states which affect moving and sensible things and of which generation is the cause.\n\nThese are the forms of time, which imitates eternity and revolves according to a law of number.\n\nMoreover, when we say that what has become is become and what becomes is becoming, and that what will become is about to become and that the non-existent is non-existent-all these are inaccurate modes of expression.\n\nBut perhaps this whole subject will be more suitably discussed on some other occasion.\n\nTime, then, and the heaven came into being at the same instant in order that, having been created together, if ever there was to be a dissolution of them, they might be dissolved together.\n\nIt was framed after the pattern of the eternal nature, that it might resemble this as far as was possible; for the pattern exists from eternity, and the created heaven has been, and is, and will be, in all time.\n\nSuch was the mind and thought of God in the creation of time.\n\nThe sun and moon and five other stars, which are called the planets, were created by him in order to distinguish and preserve the numbers of time; and when he had made-their several bodies, he placed them in the orbits in which the circle of the other was revolving-in seven orbits seven stars.\n\nFirst, there was the moon in the orbit nearest the earth, and next the sun, in the second orbit above the earth; then came the morning star and the star sacred to Hermes, moving in orbits which have an equal swiftness with the sun, but in an opposite direction; and this is the reason why the sun and Hermes and Lucifer overtake and are overtaken by each other.\n\nTo enumerate the places which he assigned to the other stars, and to give all the reasons why he assigned them, although a secondary matter, would give more trouble than the primary.\n\nThese things at some future time, when we are at leisure, may have the consideration which they deserve, but not at present.\n\nNow, when all the stars which were necessary to the creation of time had attained a motion suitable to them,-and had become living creatures having bodies fastened by vital chains, and learnt their appointed task, moving in the motion of the diverse, which is diagonal, and passes through and is governed by the motion of the same, they revolved, some in a larger and some in a lesser orbit-those which had the lesser orbit revolving faster, and those which had the larger more slowly.\n\nNow by reason of the motion of the same, those which revolved fastest appeared to be overtaken by those which moved slower although they really overtook them; for the motion of the same made them all turn in a spiral, and, because some went one way and some another, that which receded most slowly from the sphere of the same, which was the swiftest, appeared to follow it most nearly.\n\nThat there might be some visible measure of their relative swiftness and slowness as they proceeded in their eight courses, God lighted a fire, which we now call the sun, in the second from the earth of these orbits, that it might give light to the whole of heaven, and that the animals, as many as nature intended, might participate in number, learning arithmetic from the revolution of the same and the like."

