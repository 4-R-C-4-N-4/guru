[content]
body = "He, however, who raises the question whether they are to be truly regarded as one or five, takes up a more reasonable position.\n\nArguing from probabilities, I am of opinion that they are one; another, regarding the question from another point of view, will be of another mind.\n\nBut, leaving this enquiry, let us proceed to distribute the elementary forms, which have now been created in idea, among the four elements.\n\nTo earth, then, let us assign the cubical form; for earth is the most immoveable of the four and the most plastic of all bodies, and that which has the most stable bases must of necessity be of such a nature.\n\nNow, of the triangles which we assumed at first, that which has two equal sides is by nature more firmly based than that which has unequal sides; and of the compound figures which are formed out of either, the plane equilateral quadrangle has necessarily, a more stable basis than the equilateral triangle, both in the whole and in the parts.\n\nWherefore, in assigning this figure to earth, we adhere to probability; and to water we assign that one of the remaining forms which is the least moveable; and the most moveable of them to fire; and to air that which is intermediate.\n\nAlso we assign the smallest body to fire, and the greatest to water, and the intermediate in size to air; and, again, the acutest body to fire, and the next in acuteness to, air, and the third to water.\n\nOf all these elements, that which has the fewest bases must necessarily be the most moveable, for it must be the acutest and most penetrating in every way, and also the lightest as being composed of the smallest number of similar particles: and the second body has similar properties in a second degree, and the third body in the third degree.\n\nLet it be agreed, then, both according to strict reason and according to probability, that the pyramid is the solid which is the original element and seed of fire; and let us assign the element which was next in the order of generation to air, and the third to water.\n\nWe must imagine all these to be so small that no single particle of any of the four kinds is seen by us on account of their smallness: but when many of them are collected together their aggregates are seen.\n\nAnd the ratios of their numbers, motions, and other properties, everywhere God, as far as necessity allowed or gave consent, has exactly perfected, and harmonised in due proportion.\n\nFrom all that we have just been saying about the elements or kinds, the most probable conclusion is as follows:-earth, when meeting with fire and dissolved by its sharpness, whether the dissolution take place in the fire itself or perhaps in some mass of air or water, is borne hither and thither, until its parts, meeting together and mutually harmonising, again become earth; for they can never take any other form.\n\nBut water, when divided by fire or by air, on reforming, may become one part fire and two parts air; and a single volume of air divided becomes two of fire.\n\nAgain, when a small body of fire is contained in a larger body of air or water or earth, and both are moving, and the fire struggling is overcome and broken up, then two volumes of fire form one volume of air; and when air is overcome and cut up into small pieces, two and a half parts of air are condensed into one part of water.\n\nLet us consider the matter in another way.\n\nWhen one of the other elements is fastened upon by fire, and is cut by the sharpness of its angles and sides, it coalesces with the fire, and then ceases to be cut by them any longer.\n\nFor no element which is one and the same with itself can be changed by or change another of the same kind and in the same state."

