[content]
body = "Truly, as is often said, the lessons of our childhood make wonderful impression on our memories; for I am not sure that I could remember all the discourse of yesterday, but I should be much surprised if I forgot any of these things which I have heard very long ago.\n\nI listened at the time with childlike interest to the old man's narrative; he was very ready to teach me, and I asked him again and again to repeat his words, so that like an indelible picture they were branded into my mind.\n\nAs soon as the day broke, I rehearsed them as he spoke them to my companions, that they, as well as myself, might have something to say.\n\nAnd now, Socrates, to make an end my preface, I am ready to tell you the whole tale.\n\nI will give you not only the general heads, but the particulars, as they were told to me.\n\nThe city and citizens, which you yesterday described to us in fiction, we will now transfer to the world of reality.\n\nIt shall be the ancient city of Athens, and we will suppose that the citizens whom you imagined, were our veritable ancestors, of whom the priest spoke; they will perfectly harmonise, and there will be no inconsistency in saying that the citizens of your republic are these ancient Athenians.\n\nLet us divide the subject among us, and all endeavour according to our ability gracefully to execute the task which you have imposed upon us.\n\nConsider then, Socrates, if this narrative is suited to the purpose, or whether we should seek for some other instead.\n\nSoc.\n\nAnd what other, Critias, can we find that will be better than this, which is natural and suitable to the festival of the goddess, and has the very great advantage of being a fact and not a fiction?\n\nHow or where shall we find another if we abandon this?\n\nWe cannot, and therefore you must tell the tale, and good luck to you; and I in return for my yesterday's discourse will now rest and be a listener.\n\nCrit.\n\nLet me proceed to explain to you, Socrates, the order in which we have arranged our entertainment.\n\nOur intention is, that Timaeus, who is the most of an astronomer amongst us, and has made the nature of the universe his special study, should speak first, beginning with the generation of the world and going down to the creation of man; next, I am to receive the men whom he has created of whom some will have profited by the excellent education which you have given them; and then, in accordance with the tale of Solon, and equally with his law, we will bring them into court and make them citizens, as if they were those very Athenians whom the sacred Egyptian record has recovered from oblivion, and thenceforward we will speak of them as Athenians and fellow-citizens.\n\nSoc.\n\nI see that I shall receive in my turn a perfect and splendid feast of reason.\n\nAnd now, Timaeus, you, I suppose, should speak next, after duly calling upon the Gods.\n\nTim.\n\nAll men, Socrates, who have any degree of right feeling, at the beginning of every enterprise, whether small or great, always call upon God.\n\nAnd we, too, who are going to discourse of the nature of the universe, how created or how existing without creation, if we be not altogether out of our wits, must invoke the aid of Gods and Goddesses and pray that our words may be acceptable to them and consistent with themselves.\n\nLet this, then, be our invocation of the Gods, to which I add an exhortation of myself to speak in such manner as will be most intelligible to you, and will most accord with my own intent."

