[content]
body = "There are, for example, first, flame; and secondly, those emanations of flame which do not burn but only give light to the eyes; thirdly, the remains of fire, which are seen in red-hot embers after the flame has been extinguished.\n\nThere are similar differences in the air; of which the brightest part is called the aether, and the most turbid sort mist and darkness; and there are various other nameless kinds which arise from the inequality of the triangles.\n\nWater, again, admits in the first place of a division into two kinds; the one liquid and the other fusile.\n\nThe liquid kind is composed of the small and unequal particles of water; and moves itself and is moved by other bodies owing to the want of uniformity and the shape of its particles; whereas the fusile kind, being formed of large and uniform particles, is more stable than the other, and is heavy and compact by reason of its uniformity.\n\nBut when fire gets in and dissolves the particles and destroys the uniformity, it has greater mobility, and becoming fluid is thrust forth by the neighbouring air and spreads upon the earth; and this dissolution of the solid masses is called melting, and their spreading out upon the earth flowing.\n\nAgain, when the fire goes out of the fusile substance, it does not pass into vacuum, but into the neighbouring air; and the air which is displaced forces together the liquid and still moveable mass into the place which was occupied by the fire, and unites it with itself.\n\nThus compressed the mass resumes its equability, and is again at unity with itself, because the fire which was the author of the inequality has retreated; and this departure of the fire is called cooling, and the coming together which follows upon it is termed congealment.\n\nOf all the kinds termed fusile, that which is the densest and is formed out of the finest and most uniform parts is that most precious possession called gold, which is hardened by filtration through rock; this is unique in kind, and has both a glittering and a yellow colour.\n\nA shoot of gold, which is so dense as to be very hard, and takes a black colour, is termed adamant.\n\nThere is also another kind which has parts nearly like gold, and of which there are several species; it is denser than gold, and it contains a small and fine portion of earth, and is therefore harder, yet also lighter because of the great interstices which it has within itself; and this substance, which is one of the bright and denser kinds of water, when solidified is called copper.\n\nThere is an alloy of earth mingled with it, which, when the two parts grow old and are disunited, shows itself separately and is called rust.\n\nThe remaining phenomena of the same kind there will be no difficulty in reasoning out by the method of probabilities.\n\nA man may sometimes set aside meditations about eternal things, and for recreation turn to consider the truths of generation which are probable only; he will thus gain a pleasure not to be repented of, and secure for himself while he lives a wise and moderate pastime.\n\nLet us grant ourselves this indulgence, and go through the probabilities relating to the same subjects which follow next in order."

