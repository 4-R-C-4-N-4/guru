[content]
body = "Wherefore of all modes of purifying and reuniting the body the best is gymnastic; the next best is a surging motion, as in sailing or any other mode of conveyance which is not fatiguing; the third sort of motion may be of use in a case of extreme necessity, but in any other will be adopted by no man of sense: I mean the purgative treatment of physicians; for diseases unless they are very dangerous should not be irritated by medicines, since every form of disease is in a manner akin to the living being, whose complex frame has an appointed term of life.\n\nFor not the whole race only, but each individual-barring inevitable accidents-comes into the world having a fixed span, and the triangles in us are originally framed with power to last for a certain time, beyond which no man prolong his life.\n\nAnd this holds also of the constitution of diseases; if any one regardless of the appointed time tries to subdue them by medicine, he only aggravates and multiplies them.\n\nWherefore we ought always to manage them by regimen, as far as a man can spare the time, and not provoke a disagreeable enemy by medicines.\n\nEnough of the composite animal, and of the body which is a part of him, and of the manner in which a man may train and be trained by himself so as to live most according to reason: and we must above and before all provide that the element which is to train him shall be the fairest and best adapted to that purpose.\n\nA minute discussion of this subject would be a serious task; but if, as before, I am to give only an outline, the subject may not unfitly be summed up as follows.\n\nI have often remarked that there are three kinds of soul located within us, having each of them motions, and I must now repeat in the fewest words possible, that one part, if remaining inactive and ceasing from its natural motion, must necessarily become very weak, but that which is trained and exercised, very strong.\n\nWherefore we should take care that the movements of the different parts of the soul should be in due proportion.\n\nAnd we should consider that God gave the sovereign part of the human soul to be the divinity of each one, being that part which, as we say, dwells at the top of the body, inasmuch as we are a plant not of an earthly but of a heavenly growth, raises us from earth to our kindred who are in heaven.\n\nAnd in this we say truly; for the divine power suspended the head and root of us from that place where the generation of the soul first began, and thus made the whole body upright.\n\nWhen a man is always occupied with the cravings of desire and ambition, and is eagerly striving to satisfy them, all his thoughts must be mortal, and, as far as it is possible altogether to become such, he must be mortal every whit, because he has cherished his mortal part.\n\nBut he who has been earnest in the love of knowledge and of true wisdom, and has exercised his intellect more than any other part of him, must have thoughts immortal and divine, if he attain truth, and in so far as human nature is capable of sharing in immortality, he must altogether be immortal; and since he is ever cherishing the divine power, and has the divinity within him in perfect order, he will be perfectly happy.\n\nNow there is only one way of taking care of things, and this is to give to each the food and motion which are natural to it.\n\nAnd the motions which are naturally akin to the divine principle within us are the thoughts and revolutions of the universe."

