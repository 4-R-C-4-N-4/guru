[content]
body = "Thus then, and for this reason the night and the day were created, being the period of the one most intelligent revolution.\n\nAnd the month is accomplished when the moon has completed her orbit and overtaken the sun, and the year when the sun has completed his own orbit.\n\nMankind, with hardly an exception, have not remarked the periods of the other stars, and they have no name for them, and do not measure them against one another by the help of number, and hence they can scarcely be said to know that their wanderings, being infinite in number and admirable for their variety, make up time.\n\nAnd yet there is no difficulty in seeing that the perfect number of time fulfils the perfect year when all the eight revolutions, having their relative degrees of swiftness, are accomplished together and attain their completion at the same time, measured by the rotation of the same and equally moving.\n\nAfter this manner, and for these reasons, came into being such of the stars as in their heavenly progress received reversals of motion, to the end that the created heaven might imitate the eternal nature, and be as like as possible to the perfect and intelligible animal.\n\nThus far and until the birth of time the created universe was made in the likeness of the original, but inasmuch as all animals were not yet comprehended therein, it was still unlike.\n\nWhat remained, the creator then proceeded to fashion after the nature of the pattern.\n\nNow as in the ideal animal the mind perceives ideas or species of a certain nature and number, he thought that this created animal ought to have species of a like nature and number.\n\nThere are four such; one of them is the heavenly race of the gods; another, the race of birds whose way is in the air; the third, the watery species; and the fourth, the pedestrian and land creatures.\n\nOf the heavenly and divine, he created the greater part out of fire, that they might be the brightest of all things and fairest to behold, and he fashioned them after the likeness of the universe in the figure of a circle, and made them follow the intelligent motion of the supreme, distributing them over the whole circumference of heaven, which was to be a true cosmos or glorious world spangled with them all over.\n\nAnd he gave to each of them two movements: the first, a movement on the same spot after the same manner, whereby they ever continue to think consistently the same thoughts about the same things; the second, a forward movement, in which they are controlled by the revolution of the same and the like; but by the other five motions they were unaffected, in order that each of them might attain the highest perfection.\n\nAnd for this reason the fixed stars were created, to be divine and eternal animals, ever-abiding and revolving after the same manner and on the same spot; and the other stars which reverse their motion and are subject to deviations of this kind, were created in the manner already described.\n\nThe earth, which is our nurse, clinging around the pole which is extended through the universe, he framed to be the guardian and artificer of night and day, first and eldest of gods that are in the interior of heaven.\n\nVain would be the attempt to tell all the figures of them circling as in dance, and their juxtapositions, and the return of them in their revolutions upon themselves, and their approximations, and to say which of these deities in their conjunctions meet, and which of them are in opposition, and in what order they get behind and before one another, and when they are severally eclipsed to our sight and again reappear, sending terrors and intimations of the future to those who cannot calculate their movements-to attempt to tell of all this without a visible representation of the heavenly system would be labour in vain.\n\nEnough on this head; and now let what we have said about the nature of the created and visible gods have an end."

