[content]
body = "But much the safest plan is to speak of them as follows:-Anything which we see to be continually changing, as, for example, fire, we must not call \"this\" or \"that,\" but rather say that it is \"of such a nature\"; nor let us speak of water as \"this\"; but always as \"such\"; nor must we imply that there is any stability in any of those things which we indicate by the use of the words \"this\" and \"that,\" supposing ourselves to signify something thereby; for they are too volatile to be detained in any such expressions as \"this,\" or \"that,\" or \"relative to this,\" or any other mode of speaking which represents them as permanent.\n\nWe ought not to apply \"this\" to any of them, but rather the word \"such\"; which expresses the similar principle circulating in each and all of them; for example, that should be called \"fire\" which is of such a nature always, and so of everything that has generation.\n\nThat in which the elements severally grow up, and appear, and decay, is alone to be called by the name \"this\" or \"that\"; but that which is of a certain nature, hot or white, or anything which admits of opposite equalities, and all things that are compounded of them, ought not to be so denominated.\n\nLet me make another attempt to explain my meaning more clearly.\n\nSuppose a person to make all kinds of figures of gold and to be always transmuting one form into all the rest-somebody points to one of them and asks what it is.\n\nBy far the safest and truest answer is, That is gold; and not to call the triangle or any other figures which are formed in the gold \"these,\" as though they had existence, since they are in process of change while he is making the assertion; but if the questioner be willing to take the safe and indefinite expression, \"such,\" we should be satisfied.\n\nAnd the same argument applies to the universal nature which receives all bodies-that must be always called the same; for, while receiving all things, she never departs at all from her own nature, and never in any way, or at any time, assumes a form like that of any of the things which enter into her; she is the natural recipient of all impressions, and is stirred and informed by them, and appears different from time to time by reason of them.\n\nBut the forms which enter into and go out of her are the likenesses of real existences modelled after their patterns in wonderful and inexplicable manner, which we will hereafter investigate.\n\nFor the present we have only to conceive of three natures: first, that which is in process of generation; secondly, that in which the generation takes place; and thirdly, that of which the thing generated is a resemblance.\n\nAnd we may liken the receiving principle to a mother, and the source or spring to a father, and the intermediate nature to a child; and may remark further, that if the model is to take every variety of form, then the matter in which the model is fashioned will not be duly prepared, unless it is formless, and free from the impress of any of these shapes which it is hereafter to receive from without.\n\nFor if the matter were like any of the supervening forms, then whenever any opposite or entirely different nature was stamped upon its surface, it would take the impression badly, because it would intrude its own shape.\n\nWherefore, that which is to receive all forms should have no form; as in making perfumes they first contrive that the liquid substance which is to receive the scent shall be as inodorous as possible; or as those who wish to impress figures on soft substances do not allow any previous impression to remain, but begin by making the surface as even and smooth as possible."

