[content]
body = "Water which is mingled with fire, so much as is fine and liquid (being so called by reason of its motion and the way in which it rolls along the ground), and soft, because its bases give way are less stable than those of earth, when separated from fire and air and isolated, becomes more uniform, and by their retirement is compressed into itself; and if the condensation be very great, the water above the earth becomes hail, but on the earth, ice; and that which is congealed in a less degree and is only half solid, when above the earth is called snow, and when upon the earth, and condensed from dew, hoarfrost.\n\nThen, again, there are the numerous kinds of water which have been mingled with one another, and are distilled through plants which grow in the earth; and this whole class is called by the name of juices or saps.\n\nThe unequal admixture of these fluids creates a variety of species; most of them are nameless, but four which are of a fiery nature are clearly distinguished and have names.\n\nFirst there is wine, which warms the soul as well as the body: secondly, there is the oily nature, which is smooth and divides the visual ray, and for this reason is bright and shining and of a glistening appearance, including pitch, the juice of the castor berry, oil itself, and other things of a like kind: thirdly, there is the class of substances which expand the contracted parts of the mouth, until they return to their natural state, and by reason of this property create sweetness;-these are included under the general name of honey: and, lastly, there is a frothy nature, which differs from all juices, having a burning quality which dissolves the flesh; it is called opos (a vegetable acid).\n\nAs to the kinds of earth, that which is filtered through water passes into stone in the following manner:-The water which mixes with the earth and is broken up in the process changes into air, and taking this form mounts into its own place.\n\nBut as there is no surrounding vacuum it thrusts away the neighbouring air, and this being rendered heavy, and, when it is displaced, having been poured around the mass of earth, forcibly compresses it and drives it into the vacant space whence the new air had come up; and the earth when compressed by the air into an indissoluble union with water becomes rock.\n\nThe fairer sort is that which is made up of equal and similar parts and is transparent; that which has the opposite qualities is inferior.\n\nBut when all the watery part is suddenly drawn out by fire, a more brittle substance is formed, to which we give the name of pottery.\n\nSometimes also moisture may remain, and the earth which has been fused by fire becomes, when cool, a certain stone of a black colour.\n\nA like separation of the water which had been copiously mingled with them may occur in two substances composed of finer particles of earth and of a briny nature; out of either of them a half solid body is then formed, soluble in water-the one, soda, which is used for purging away oil and earth, and other, salt, which harmonizes so well in combinations pleasing to the palate, and is, as the law testifies, a substance dear to the gods.\n\nThe compounds of earth and water are not soluble by water, but by fire only, and for this reason:-Neither fire nor air melt masses of earth; for their particles, being smaller than the interstices in its structure, have plenty of room to move without forcing their way, and so they leave the earth unmelted and undissolved; but particles of water, which are larger, force a passage, and dissolve and melt the earth."

