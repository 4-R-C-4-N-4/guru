[content]
body = "And therefore yesterday when I saw that you wanted me to describe the formation of the State, I readily assented, being very well aware, that, if you only would, none were better qualified to carry the discussion further, and that when you had engaged our city in a suitable war, you of all men living could best exhibit her playing a fitting part.\n\nWhen I had completed my task, I in return imposed this other task upon you.\n\nYou conferred together and agreed to entertain me to-day, as I had entertained you, with a feast of discourse.\n\nHere am I in festive array, and no man can be more ready for the promised banquet.\n\nHer.\n\nAnd we too, Socrates, as Timaeus says, will not be wanting in enthusiasm; and there is no excuse for not complying with your request.\n\nAs soon as we arrived yesterday at the guest-chamber of Critias, with whom we are staying, or rather on our way thither, we talked the matter over, and he told us an ancient tradition, which I wish, Critias, that you would repeat to Socrates, so that he may help us to judge whether it will satisfy his requirements or not.\n\nCrit.\n\nI will, if Timaeus, who is our other partner, approves.\n\nTim.\n\nI quite approve.\n\nCrit.\n\nThen listen, Socrates, to a tale which, though strange, is certainly true, having been attested by Solon, who was the wisest of the seven sages.\n\nHe was a relative and a dear friend of my great-grandfather, Dropides, as he himself says in many passages of his poems; and he told the story to Critias, my grandfather, who remembered and repeated it to us.\n\nThere were of old, he said, great and marvellous actions of the Athenian city, which have passed into oblivion through lapse of time and the destruction of mankind, and one in particular, greater than all the rest.\n\nThis we will now rehearse.\n\nIt will be a fitting monument of our gratitude to you, and a hymn of praise true and worthy of the goddess, on this her day of festival.\n\nSoc.\n\nVery good.\n\nAnd what is this ancient famous action of the Athenians, which Critias declared, on the authority of Solon, to be not a mere legend, but an actual fact?\n\nCrit.\n\nI will tell an old-world story which I heard from an aged man; for Critias, at the time of telling it, was as he said, nearly ninety years of age, and I was about ten.\n\nNow the day was that day of the Apaturia which is called the Registration of Youth, at which, according to custom, our parents gave prizes for recitations, and the poems of several poets were recited by us boys, and many of us sang the poems of Solon, which at that time had not gone out of fashion.\n\nOne of our tribe, either because he thought so or to please Critias, said that in his judgment Solon was not only the wisest of men, but also the noblest of poets.\n\nThe old man, as I very well remember, brightened up at hearing this and said, smiling: Yes, Amynander, if Solon had only, like other poets, made poetry the business of his life, and had completed the tale which he brought with him from Egypt, and had not been compelled, by reason of the factions and troubles which he found stirring in his own country when he came home, to attend to other matters, in my opinion he would have been as famous as Homer or Hesiod, or any poet.\n\nAnd what was the tale about, Critias?\n\nsaid Amynander."

