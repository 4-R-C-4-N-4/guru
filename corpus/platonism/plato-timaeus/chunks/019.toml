[content]
body = "But they are not so, for they are incapable of reason or intellect; the only being which can properly have mind is the invisible soul, whereas fire and water, and earth and air, are all of them visible bodies.\n\nThe lover of intellect and knowledge ought to explore causes of intelligent nature first of all, and, secondly, of those things which, being moved by others, are compelled to move others.\n\nAnd this is what we too must do.\n\nBoth kinds of causes should be acknowledged by us, but a distinction should be made between those which are endowed with mind and are the workers of things fair and good, and those which are deprived of intelligence and always produce chance effects without order or design.\n\nOf the second or co-operative causes of sight, which help to give to the eyes the power which they now possess, enough has been said.\n\nI will therefore now proceed to speak of the higher use and purpose for which God has given them to us.\n\nThe sight in my opinion is the source of the greatest benefit to us, for had we never seen the stars, and the sun, and the heaven, none of the words which we have spoken about the universe would ever have been uttered.\n\nBut now the sight of day and night, and the months and the revolutions of the years, have created number, and have given us a conception of time, and the power of enquiring about the nature of the universe; and from this source we have derived philosophy, than which no greater good ever was or will be given by the gods to mortal man.\n\nThis is the greatest boon of sight: and of the lesser benefits why should I speak?\n\neven the ordinary man if he were deprived of them would bewail his loss, but in vain.\n\nThus much let me say however: God invented and gave us sight to the end that we might behold the courses of intelligence in the heaven, and apply them to the courses of our own intelligence which are akin to them, the unperturbed to the perturbed; and that we, learning them and partaking of the natural truth of reason, might imitate the absolutely unerring courses of God and regulate our own vagaries.\n\nThe same may be affirmed of speech and hearing: they have been given by the gods to the same end and for a like reason.\n\nFor this is the principal end of speech, whereto it most contributes.\n\nMoreover, so much of music as is adapted to the sound of the voice and to the sense of hearing is granted to us for the sake of harmony; and harmony, which has motions akin to the revolutions of our souls, is not regarded by the intelligent votary of the Muses as given by them with a view to irrational pleasure, which is deemed to be the purpose of it in our day, but as meant to correct any discord which may have arisen in the courses of the soul, and to be our ally in bringing her into harmony and agreement with herself; and rhythm too was given by them for the same reason, on account of the irregular and graceless ways which prevail among mankind generally, and to help us against them.\n\nThus far in what we have been saying, with small exception, the works of intelligence have been set forth; and now we must place by the side of them in our discourse the things which come into being through necessity-for the creation is mixed, being made up of necessity and mind.\n\nMind, the ruling power, persuaded necessity to bring the greater part of created things to perfection, and thus and after this manner in the beginning, when the influence of reason got the better of necessity, the universe was created.\n\nBut if a person will truly tell of the way in which the work was accomplished, he must include the other influence of the variable cause as well.\n\nWherefore, we must return again and find another suitable beginning, as about the former matters, so also about these."

