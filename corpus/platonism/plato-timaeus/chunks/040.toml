[content]
body = "In the first place, they cut two hidden channels or veins down the back where the skin and the flesh join, which answered severally to the right and left side of the body.\n\nThese they let down along the backbone, so as to have the marrow of generation between them, where it was most likely to flourish, and in order that the stream coming down from above might flow freely to the other parts, and equalise the irrigation.\n\nIn the next place, they divided the veins about the head, and interlacing them, they sent them in opposite directions; those coming from the right side they sent to the left of the body, and those from the left they diverted towards the right, so that they and the skin might together form a bond which should fasten the head to the body, since the crown of the head was not encircled by sinews; and also in order that the sensations from both sides might be distributed over the whole body.\n\nAnd next, they ordered the water-courses of the body in a manner which I will describe, and which will be more easily understood if we begin by admitting that all things which have lesser parts retain the greater, but the greater cannot retain the lesser.\n\nNow of all natures fire has the smallest parts, and therefore penetrates through earth and water and air and their compounds, nor can anything hold it.\n\nAnd a similar principle applies to the human belly; for when meats and drinks enter it, it holds them, but it cannot hold air and fire, because the particles of which they consist are smaller than its own structure.\n\nThese elements, therefore, God employed for the sake of distributing moisture from the belly into the veins, weaving together network of fire and air like a weel, having at the entrance two lesser weels; further he constructed one of these with two openings, and from the lesser weels he extended cords reaching all round to the extremities of the network.\n\nAll the interior of the net he made of fire, but the lesser weels and their cavity, of air.\n\nThe network he took and spread over the newly-formed animal in the following manner:-He let the lesser weels pass into the mouth; there were two of them, and one he let down by the air-pipes into the lungs, the other by the side of the air-pipes into the belly.\n\nThe former he divided into two branches, both of which he made to meet at the channels of the nose, so that when the way through the mouth did not act, the streams of the mouth as well were replenished through the nose.\n\nWith the other cavity (i.e.\n\nof the greater weel) he enveloped the hollow parts of the body, and at one time he made all this to flow into the lesser weels, quite gently, for they are composed of air, and at another time he caused the lesser weels to flow back again; and the net he made to find a way in and out through the pores of the body, and the rays of fire which are bound fast within followed the passage of the air either way, never at any time ceasing so long as the mortal being holds together.\n\nThis process, as we affirm, the name-giver named inspiration and expiration.\n\nAnd all this movement, active as well as passive, takes place in order that the body, being watered and cooled, may receive nourishment and life; for when the respiration is going in and out, and the fire, which is fast bound within, follows it, and ever and anon moving to and fro, enters through the belly and reaches the meat and drink, it dissolves them, and dividing them into small portions and guiding them through the passages where it goes, pumps them as from a fountain into the channels of the veins, and makes the stream of the veins flow through the body as through a conduit."

