[content]
body = "To which end we must consider the nature of fire, and water, and air, and earth, such as they were prior to the creation of the heaven, and what was happening to them in this previous state; for no one has as yet explained the manner of their generation, but we speak of fire and the rest of them, whatever they mean, as though men knew their natures, and we maintain them to be the first principles and letters or elements of the whole, when they cannot reasonably be compared by a man of any sense even to syllables or first compounds.\n\nAnd let me say thus much: I will not now speak of the first principle or principles of all things, or by whatever name they are to be called, for this reason-because it is difficult to set forth my opinion according to the method of discussion which we are at present employing.\n\nDo not imagine, any more than I can bring myself to imagine, that I should be right in undertaking so great and difficult a task.\n\nRemembering what I said at first about probability, I will do my best to give as probable an explanation as any other-or rather, more probable; and I will first go back to the beginning and try to speak of each thing and of all.\n\nOnce more, then, at the commencement of my discourse, I call upon God, and beg him to be our saviour out of a strange and unwonted enquiry, and to bring us to the haven of probability.\n\nSo now let us begin again.\n\nThis new beginning of our discussion of the universe requires a fuller division than the former; for then we made two classes, now a third must be revealed.\n\nThe two sufficed for the former discussion: one, which we assumed, was a pattern intelligible and always the same; and the second was only the imitation of the pattern, generated and visible.\n\nThere is also a third kind which we did not distinguish at the time, conceiving that the two would be enough.\n\nBut now the argument seems to require that we should set forth in words another kind, which is difficult of explanation and dimly seen.\n\nWhat nature are we to attribute to this new kind of being?\n\nWe reply, that it is the receptacle, and in a manner the nurse, of all generation.\n\nI have spoken the truth; but I must express myself in clearer language, and this will be an arduous task for many reasons, and in particular because I must first raise questions concerning fire and the other elements, and determine what each of them is; for to say, with any probability or certitude, which of them should be called water rather than fire, and which should be called any of them rather than all or some one of them, is a difficult matter.\n\nHow, then, shall we settle this point, and what questions about the elements may be fairly raised?\n\nIn the first place, we see that what we just now called water, by condensation, I suppose, becomes stone and earth; and this same element, when melted and dispersed, passes into vapour and air.\n\nAir, again, when inflamed, becomes fire; and again fire, when condensed and extinguished, passes once more into the form of air; and once more, air, when collected and condensed, produces cloud and mist; and from these, when still more compressed, comes flowing water, and from water comes earth and stones once more; and thus generation appears to be transmitted from one to the other in a circle.\n\nThus, then, as the several elements never present themselves in the same form, how can any one have the assurance to assert positively that any of them, whatever it may be, is one thing rather than another?\n\nNo one can."

