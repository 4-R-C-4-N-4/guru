[content]
body = "Thus far I have been speaking of the fourth and last kind of madness, which is imputed to him who, when he sees the beauty of earth, is transported with the recollection of the true beauty; he would like to fly away, but he cannot; he is like a bird fluttering and looking upward and careless of the world below; and he is therefore thought to be mad.\n\nAnd I have shown this of all inspirations to be the noblest and highest and the offspring of the highest to him who has or shares in it, and that he who loves the beautiful is called a lover because he partakes of it.\n\nFor, as has been already said, every soul of man has in the way of nature beheld true being; this was the condition of her passing into the form of man.\n\nBut all souls do not easily recall the things of the other world; they may have seen them for a short time only, or they may have been unfortunate in their earthly lot, and, having had their hearts turned to unrighteousness through some corrupting influence, they may have lost the memory of the holy things which once they saw.\n\nFew only retain an adequate remembrance of them; and they, when they behold here any image of that other world, are rapt in amazement; but they are ignorant of what this rapture means, because they do not clearly perceive.\n\nFor there is no light of justice or temperance or any of the higher ideas which are precious to souls in the earthly copies of them: they are seen through a glass dimly; and there are few who, going to the images, behold in them the realities, and these only with difficulty.\n\nThere was a time when with the rest of the happy band they saw beauty shining in brightness-we philosophers following in the train of Zeus, others in company with other gods; and then we beheld the beatific vision and were initiated into a mystery which may be truly called most blessed, celebrated by us in our state of innocence, before we had any experience of evils to come, when we were admitted to the sight of apparitions innocent and simple and calm and happy, which we beheld shining impure light, pure ourselves and not yet enshrined in that living tomb which we carry about, now that we are imprisoned in the body, like an oyster in his shell.\n\nLet me linger over the memory of scenes which have passed away.\n\nBut of beauty, I repeat again that we saw her there shining in company with the celestial forms; and coming to earth we find her here too, shining in clearness through the clearest aperture of sense.\n\nFor sight is the most piercing of our bodily senses; though not by that is wisdom seen; her loveliness would have been transporting if there had been a visible image of her, and the other ideas, if they had visible counterparts, would be equally lovely.\n\nBut this is the privilege of beauty, that being the loveliest she is also the most palpable to sight.\n\nNow he who is not newly initiated or who has become corrupted, does not easily rise out of this world to the sight of true beauty in the other; he looks only at her earthly namesake, and instead of being awed at the sight of her, he is given over to pleasure, and like a brutish beast he rushes on to enjoy and beget; he consorts with wantonness, and is not afraid or ashamed of pursuing pleasure in violation of nature."

