[content]
body = "Zeus, the mighty lord, holding the reins of a winged chariot, leads the way in heaven, ordering all and taking care of all; and there follows him the array of gods and demigods, marshalled in eleven bands; Hestia alone abides at home in the house of heaven; of the rest they who are reckoned among the princely twelve march in their appointed order.\n\nThey see many blessed sights in the inner heaven, and there are many ways to and fro, along which the blessed gods are passing, every one doing his own work; he may follow who will and can, for jealousy has no place in the celestial choir.\n\nBut when they go to banquet and festival, then they move up the steep to the top of the vault of heaven.\n\nThe chariots of the gods in even poise, obeying the rein, glide rapidly; but the others labour, for the vicious steed goes heavily, weighing down the charioteer to the earth when his steed has not been thoroughly trained:-and this is the hour of agony and extremest conflict for the soul.\n\nFor the immortals, when they are at the end of their course, go forth and stand upon the outside of heaven, and the revolution of the spheres carries them round, and they behold the things beyond.\n\nBut of the heaven which is above the heavens, what earthly poet ever did or ever will sing worthily?\n\nIt is such as I will describe; for I must dare to speak the truth, when truth is my theme.\n\nThere abides the very being with which true knowledge is concerned; the colourless, formless, intangible essence, visible only to mind, the pilot of the soul.\n\nThe divine intelligence, being nurtured upon mind and pure knowledge, and the intelligence of every soul which is capable of receiving the food proper to it, rejoices at beholding reality, and once more gazing upon truth, is replenished and made glad, until the revolution of the worlds brings her round again to the same place.\n\nIn the revolution she beholds justice, and temperance, and knowledge absolute, not in the form of generation or of relation, which men call existence, but knowledge absolute in existence absolute; and beholding the other true existences in like manner, and feasting upon them, she passes down into the interior of the heavens and returns home; and there the charioteer putting up his horses at the stall, gives them ambrosia to eat and nectar to drink.\n\nSuch is the life of the gods; but of other souls, that which follows God best and is likest to him lifts the head of the charioteer into the outer world, and is carried round in the revolution, troubled indeed by the steeds, and with difficulty beholding true being; while another only rises and falls, and sees, and again fails to see by reason of the unruliness of the steeds.\n\nThe rest of the souls are also longing after the upper world and they all follow, but not being strong enough they are carried round below the surface, plunging, treading on one another, each striving to be first; and there is confusion and perspiration and the extremity of effort; and many of them are lamed or have their wings broken through the ill-driving of the charioteers; and all of them after a fruitless toil, not having attained to the mysteries of true being, go away, and feed upon opinion.\n\nThe reason why the souls exhibit this exceeding eagerness to behold the plain of truth is that pasturage is found there, which is suited to the highest part of the soul; and the wing on which the soul soars is nourished with this."

