[content]
body = "I quite admit, Socrates, that the art of rhetoric which these men teach and of which they write is such as you describe-there I agree with you.\n\nBut I still want to know where and how the true art of rhetoric and persuasion is to be acquired.\n\nSoc.\n\nThe perfection which is required of the finished orator is, or rather must be, like the perfection of anything else; partly given by nature, but may also be assisted by art.\n\nIf you have the natural power and add to it knowledge and practice, you will be a distinguished speaker; if you fall short in either of these, you will be to that extent defective.\n\nBut the art, as far as there is an art, of rhetoric does not lie in the direction of Lysias or Thrasymachus.\n\nPhaedr.\n\nIn what direction then?\n\nSoc.\n\nI conceive Pericles to have been the most accomplished of rhetoricians.\n\nPhaedr.\n\nWhat of that?\n\nSoc.\n\nAll the great arts require discussion and high speculation about the truths of nature; hence come loftiness of thought and completeness of execution.\n\nAnd this, as I conceive, was the quality which, in addition to his natural gifts, Pericles acquired from his intercourse with Anaxagoras whom he happened to know.\n\nHe was thus imbued with the higher philosophy, and attained the knowledge of Mind and the negative of Mind, which were favourite themes of Anaxagoras, and applied what suited his purpose to the art of speaking.\n\nPhaedr.\n\nExplain.\n\nSoc.\n\nRhetoric is like medicine.\n\nPhaedr.\n\nHow so?\n\nSoc.\n\nWhy, because medicine has to define the nature of the body and rhetoric of the soul-if we would proceed, not empirically but scientifically, in the one case to impart health and strength by giving medicine and food in the other to implant the conviction or virtue which you desire, by the right application of words and training.\n\nPhaedr.\n\nThere, Socrates, I suspect that you are right.\n\nSoc.\n\nAnd do you think that you can know the nature of the soul intelligently without knowing the nature of the whole?\n\nPhaedr.\n\nHippocrates the Asclepiad says that the nature even of the body can only be understood as a whole.\n\nSoc.\n\nYes, friend, and he was right:-still, we ought not to be content with the name of Hippocrates, but to examine and see whether his argument agrees with his conception of nature.\n\nPhaedr.\n\nI agree.\n\nSoc.\n\nThen consider what truth as well as Hippocrates says about this or about any other nature.\n\nOught we not to consider first whether that which we wish to learn and to teach is a simple or multiform thing, and if simple, then to enquire what power it has of acting or being acted upon in relation to other things, and if multiform, then to number the forms; and see first in the case of one of them, and then in.\n\ncase of all of them, what is that power of acting or being acted upon which makes each and all of them to be what they are?\n\nPhaedr.\n\nYou may very likely be right, Socrates.\n\nSoc.\n\nThe method which proceeds without analysis is like the groping of a blind man.\n\nYet, surely, he who is an artist ought not to admit of a comparison with the blind, or deaf.\n\nThe rhetorician, who teaches his pupil to speak scientifically, will particularly set forth the nature of that being to which he addresses his speeches; and this, I conceive, to be the soul.\n\nPhaedr.\n\nCertainly.\n\nSoc.\n\nHis whole effort is directed to the soul; for in that he seeks to produce conviction.\n\nPhaedr.\n\nYes.\n\nSoc."

