[content]
body = "And now they live again in the grasshoppers; and this is the return which the Muses make to them-they neither hunger, nor thirst, but from the hour of their birth are always singing, and never eating or drinking; and when they die they go and inform the Muses in heaven who honours them on earth.\n\nThey win the love of Terpsichore for the dancers by their report of them; of Erato for the lovers, and of the other Muses for those who do them honour, according to the several ways of honouring them of Calliope the eldest Muse and of Urania who is next to her, for the philosophers, of whose music the grasshoppers make report to them; for these are the Muses who are chiefly concerned with heaven and thought, divine as well as human, and they have the sweetest utterance.\n\nFor many reasons, then, we ought always to talk and not to sleep at mid-day.\n\nPhaedr.\n\nLet us talk.\n\nSoc.\n\nShall we discuss the rules of writing and speech as we were proposing?\n\nPhaedr.\n\nVery good.\n\nSoc.\n\nIn good speaking should not the mind of the speaker know the truth of the matter about which he is going to speak?\n\nPhaedr.\n\nAnd yet, Socrates, I have heard that he who would be an orator has nothing to do with true justice, but only with that which is likely to be approved by the many who sit in judgment; nor with the truly good or honourable, but only with opinion about them, and that from opinion comes persuasion, and not from the truth.\n\nSoc.\n\nThe words of the wise are not to be set aside; for there is probably something in them; and therefore the meaning of this saying is not hastily to be dismissed.\n\nPhaedr.\n\nVery true.\n\nSoc.\n\nLet us put the matter thus:-Suppose that I persuaded you to buy a horse and go to the wars.\n\nNeither of us knew what a horse was like, but I knew that you believed a horse to be of tame animals the one which has the longest ears.\n\nPhaedr.\n\nThat would be ridiculous.\n\nSoc.\n\nThere is something more ridiculous coming:-Suppose, further, that in sober earnest I, having persuaded you of this, went and composed a speech in honour of an ass, whom I entitled a horse beginning: \"A noble animal and a most useful possession, especially in war, and you may get on his back and fight, and he will carry baggage or anything.\" Phaedr.\n\nHow ridiculous!\n\nSoc.\n\nRidiculous!\n\nYes; but is not even a ridiculous friend better than a cunning enemy?\n\nPhaedr.\n\nCertainly.\n\nSoc.\n\nAnd when the orator instead of putting an ass in the place of a horse puts good for evil being himself as ignorant of their true nature as the city on which he imposes is ignorant; and having studied the notions of the multitude, falsely persuades them not about \"the shadow of an ass,\" which he confounds with a horse, but about good which he confounds with evily-what will be the harvest which rhetoric will be likely to gather after the sowing of that seed?\n\nPhaedr.\n\nThe reverse of good.\n\nSoc.\n\nBut perhaps rhetoric has been getting too roughly handled by us, and she might answer: What amazing nonsense you are talking!\n\nAs if I forced any man to learn to speak in ignorance of the truth!\n\nWhatever my advice may be worth, I should have told him to arrive at the truth first, and then come to me.\n\nAt the same time I boldly assert that mere knowledge of the truth will not give you the art of persuasion.\n\nPhaedr.\n\nThere is reason in the lady's defence of herself.\n\nSoc.\n\nQuite true; if only the other arguments which remain to be brought up bear her witness that she is an art at all."

