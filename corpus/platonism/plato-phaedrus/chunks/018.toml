[content]
body = "But he whose initiation is recent, and who has been the spectator of many glories in the other world, is amazed when he sees any one having a godlike face or form, which is the expression of divine beauty; and at first a shudder runs through him, and again the old awe steals over him; then looking upon the face of his beloved as of a god he reverences him, and if he were not afraid of being thought a downright madman, he would sacrifice to his beloved as to the image of a god; then while he gazes on him there is a sort of reaction, and the shudder passes into an unusual heat and perspiration; for, as he receives the effluence of beauty through the eyes, the wing moistens and he warms.\n\nAnd as he warms, the parts out of which the wing grew, and which had been hitherto closed and rigid, and had prevented the wing from shooting forth, are melted, and as nourishment streams upon him, the lower end of the wings begins to swell and grow from the root upwards; and the growth extends under the whole soul-for once the whole was winged.\n\nDuring this process the whole soul is all in a state of ebullition and effervescence,-which may be compared to the irritation and uneasiness in the gums at the time of cutting teeth,-bubbles up, and has a feeling of uneasiness and tickling; but when in like manner the soul is beginning to grow wings, the beauty of the beloved meets her eye and she receives the sensible warm motion of particles which flow towards her, therefore called emotion (imeros), and is refreshed and warmed by them, and then she ceases from her pain with joy.\n\nBut when she is parted from her beloved and her moisture fails, then the orifices of the passage out of which the wing shoots dry up and close, and intercept the germ of the wing; which, being shut up with the emotion, throbbing as with the pulsations of an artery, pricks the aperture which is nearest, until at length the entire soul is pierced and maddened and pained, and at the recollection of beauty is again delighted.\n\nAnd from both of them together the soul is oppressed at the strangeness of her condition, and is in a great strait and excitement, and in her madness can neither sleep by night nor abide in her place by day.\n\nAnd wherever she thinks that she will behold the beautiful one, thither in her desire she runs.\n\nAnd when she has seen him, and bathed herself in the waters of beauty, her constraint is loosened, and she is refreshed, and has no more pangs and pains; and this is the sweetest of all pleasures at the time, and is the reason why the soul of the lover will never forsake his beautiful one, whom he esteems above all; he has forgotten mother and brethren and companions, and he thinks nothing of the neglect and loss of his property; the rules and proprieties of life, on which he formerly prided himself, he now despises, and is ready to sleep like a servant, wherever he is allowed, as near as he can to his desired one, who is the object of his worship, and the physician who can alone assuage the greatness of his pain.\n\nAnd this state, my dear imaginary youth to whom I am talking, is by men called love, and among the gods has a name at which you, in your simplicity, may be inclined to mock; there are two lines in the apocryphal writings of Homer in which the name occurs.\n\nOne of them is rather outrageous, and not altogether metrical.\n\nThey are as follows: Mortals call him fluttering love, But the immortals call him winged one, Because the growing of wings is a necessity to him."

