[content]
body = "And I bethink me of an ancient purgation of mythological error which was devised, not by Homer, for he never had the wit to discover why he was blind, but by Stesichorus, who was a philosopher and knew the reason why; and therefore, when he lost his eyes, for that was the penalty which was inflicted upon him for reviling the lovely Helen, he at once purged himself.\n\nAnd the purgation was a recantation, which began thus,- False is that word of mine-the truth is that thou didst not embark in ships, nor ever go to the walls of Troy; and when he had completed his poem, which is called \"the recantation,\" immediately his sight returned to him.\n\nNow I will be wiser than either Stesichorus or Homer, in that I am going to make my recantation for reviling love before I suffer; and this I will attempt, not as before, veiled and ashamed, but with forehead bold and bare.\n\nPhaedr.\n\nNothing could be more agreeable to me than to hear you say so.\n\nSoc.\n\nOnly think, my good Phaedrus, what an utter want of delicacy was shown in the two discourses; I mean, in my own and in that which you recited out of the book.\n\nWould not any one who was himself of a noble and gentle nature, and who loved or ever had loved a nature like his own, when we tell of the petty causes of lovers' jealousies, and of their exceeding animosities, and of the injuries which they do to their beloved, have imagined that our ideas of love were taken from some haunt of sailors to which good manners were unknown-he would certainly never have admitted the justice of our censure?\n\nPhaedr.\n\nI dare say not, Socrates.\n\nSoc.\n\nTherefore, because I blush at the thought of this person, and also because I am afraid of Love himself, I desire to wash the brine out of my ears with water from the spring; and I would counsel Lysias not to delay, but to write another discourse, which shall prove that ceteris paribus the lover ought to be accepted rather than the non-lover.\n\nPhaedr.\n\nBe assured that he shall.\n\nYou shall speak the praises of the lover, and Lysias shall be compelled by me to write another discourse on the same theme.\n\nSoc.\n\nYou will be true to your nature in that, and therefore I believe you.\n\nPhaedr.\n\nSpeak, and fear not.\n\nSoc.\n\nBut where is the fair youth whom I was addressing before, and who ought to listen now; lest, if he hear me not, he should accept a non-lover before he knows what he is doing?\n\nPhaedr.\n\nHe is close at hand, and always at your service.\n\nSoc.\n\nKnow then, fair youth, that the former discourse was the word of Phaedrus, the son of Vain Man, who dwells in the city of Myrrhina (Myrrhinusius).\n\nAnd this which I am about to utter is the recantation of Stesichorus the son of Godly Man (Euphemus), who comes from the town of Desire (Himera), and is to the following effect: \"I told a lie when I said\" that the beloved ought to accept the non-lover when he might have the lover, because the one is sane, and the other mad.\n\nIt might be so if madness were simply an evil; but there is also a madness which is a divine gift, and the source of the chiefest blessings granted to men."

