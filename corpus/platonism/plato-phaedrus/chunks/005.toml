[content]
body = "Many lovers too have loved the person of a youth before they knew his character or his belongings; so that when their passion has passed away, there is no knowing whether they will continue to be his friends; whereas, in the case of non-lovers who were always friends, the friendship is not lessened by the favours granted; but the recollection of these remains with them, and is an earnest of good things to come.\n\nFurther, I say that you are likely to be improved by me, whereas the lover will spoil you.\n\nFor they praise your words and actions in a wrong way; partly, because they are afraid of offending you, and also, their judgment is weakened by passion.\n\nSuch are the feats which love exhibits; he makes things painful to the disappointed which give no pain to others; he compels the successful lover to praise what ought not to give him pleasure, and therefore the beloved is to be pitied rather than envied.\n\nBut if you listen to me, in the first place, I, in my intercourse with you, shall not merely regard present enjoyment, but also future advantage, being not mastered by love, but my own master; nor for small causes taking violent dislikes, but even when the cause is great, slowly laying up little wrath-unintentional offences I shall forgive, and intentional ones I shall try to prevent; and these are the marks of a friendship which will last.\n\nDo you think that a lover only can be a firm friend?\n\nreflect:-if this were true, we should set small value on sons, or fathers, or mothers; nor should we ever have loyal friends, for our love of them arises not from passion, but from other associations.\n\nFurther, if we ought to shower favours on those who are the most eager suitors,-on that principle, we ought always to do good, not to the most virtuous, but to the most needy; for they are the persons who will be most relieved, and will therefore be the most grateful; and when you make a feast you should invite not your friend, but the beggar and the empty soul; for they will love you, and attend you, and come about your doors, and will be the best pleased, and the most grateful, and will invoke many a blessing on your head.\n\nYet surely you ought not to be granting favours to those who besiege you with prayer, but to those who are best able to reward you; nor to the lover only, but to those who are worthy of love; nor to those who will enjoy the bloom of your youth, but to those who will share their possessions with you in age; nor to those who, having succeeded, will glory in their success to others, but to those who will be modest and tell no tales; nor to those who care about you for a moment only, but to those who will continue your friends through life; nor to those who, when their passion is over, will pick a quarrel with you, but rather to those who, when the charm of youth has left you, will show their own virtue.\n\nRemember what I have said; and consider yet this further point: friends admonish the lover under the idea that his way of life is bad, but no one of his kindred ever yet censured the non-lover, or thought that he was ill-advised about his own interests.\n\n\"Perhaps you will ask me whether I propose that you should indulge every non-lover.\n\nTo which I reply that not even the lover would advise you to indulge all lovers, for the indiscriminate favour is less esteemed by the rational recipient, and less easily hidden by him who would escape the censure of the world.\n\nNow love ought to be for the advantage of both parties, and for the injury of neither."

