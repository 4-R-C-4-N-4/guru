[content]
body = "Once upon a time there was a fair boy, or, more properly speaking, a youth; he was very fair and had a great many lovers; and there was one special cunning one, who had persuaded the youth that he did not love him, but he really loved him all the same; and one day when he was paying his addresses to him, he used this very argument-that he ought to accept the non-lover rather than the lover; his words were as follows:- \"All good counsel begins in the same way; a man should know what he is advising about, or his counsel will all come to nought.\n\nBut people imagine that they know about the nature of things, when they don't know about them, and, not having come to an understanding at first because they think that they know, they end, as might be expected, in contradicting one another and themselves.\n\nNow you and I must not be guilty of this fundamental error which we condemn in others; but as our question is whether the lover or non-lover is to be preferred, let us first of all agree in defining the nature and power of love, and then, keeping our eyes upon the definition and to this appealing, let us further enquire whether love brings advantage or disadvantage.\n\n\"Every one sees that love is a desire, and we know also that non-lovers desire the beautiful and good.\n\nNow in what way is the lover to be distinguished from the non-lover?\n\nLet us note that in every one of us there are two guiding and ruling principles which lead us whither they will; one is the natural desire of pleasure, the other is an acquired opinion which aspires after the best; and these two are sometimes in harmony and then again at war, and sometimes the one, sometimes the other conquers.\n\nWhen opinion by the help of reason leads us to the best, the conquering principle is called temperance; but when desire, which is devoid of reason, rules in us and drags us to pleasure, that power of misrule is called excess.\n\nNow excess has many names, and many members, and many forms, and any of these forms when very marked gives a name, neither honourable nor creditable, to the bearer of the name.\n\nThe desire of eating, for example, which gets the better of the higher reason and the other desires, is called gluttony, and he who is possessed by it is called a glutton-I the tyrannical desire of drink, which inclines the possessor of the desire to drink, has a name which is only too obvious, and there can be as little doubt by what name any other appetite of the same family would be called;-it will be the name of that which happens to be eluminant.\n\nAnd now I think that you will perceive the drift of my discourse; but as every spoken word is in a manner plainer than the unspoken, I had better say further that the irrational desire which overcomes the tendency of opinion towards right, and is led away to the enjoyment of beauty, and especially of personal beauty, by the desires which are her own kindred-that supreme desire, I say, which by leading conquers and by the force of passion is reinforced, from this very force, receiving a name, is called love.\" And now, dear Phaedrus, I shall pause for an instant to ask whether you do not think me, as I appear to myself, inspired?\n\nPhaedr.\n\nYes, Socrates, you seem to have a very unusual flow of words.\n\nSoc.\n\nListen to me, then, in silence; for surely the place is holy; so that you must not wonder, if, as I proceed, I appear to be in a divine fury, for already I am getting into dithyrambics.\n\nPhaedr.\n\nNothing can be truer.\n\nSoc.\n\nThe responsibility rests with you."

