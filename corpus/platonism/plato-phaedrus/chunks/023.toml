[content]
body = "Why, he begins in this manner: \"Be it enacted by the senate, the people, or both, on the motion of a certain person,\" who is our author; and so putting on a serious face, he proceeds to display his own wisdom to his admirers in what is often a long and tedious composition.\n\nNow what is that sort of thing but a regular piece of authorship?\n\nPhaedr.\n\nTrue.\n\nSoc.\n\nAnd if the law is finally approved, then the author leaves the theatre in high delight; but if the law is rejected and he is done out of his speech-making, and not thought good enough to write, then he and his party are in mourning.\n\nPhaedr.\n\nVery true.\n\nSoc.\n\nSo far are they from despising, or rather so highly do they value the practice of writing.\n\nPhaedr.\n\nNo doubt.\n\nSoc.\n\nAnd when the king or orator has the power, as Lycurgus or Solon or Darius had, of attaining an immortality or authorship in a state, is he not thought by posterity, when they see his compositions, and does he not think himself, while he is yet alive, to be a god?\n\nPhaedr.\n\nVery true.\n\nSoc.\n\nThen do you think that any one of this class, however ill-disposed, would reproach Lysias with being an author?\n\nPhaedr.\n\nNot upon your view; for according to you he would be casting a slur upon his own favourite pursuit.\n\nSoc.\n\nAny one may see that there is no disgrace in the mere fact of writing.\n\nPhaedr.\n\nCertainly not.\n\nSoc.\n\nThe disgrace begins when a man writes not well, but badly.\n\nPhaedr.\n\nClearly.\n\nSoc.\n\nAnd what is well and what is badly-need we ask Lysias, or any other poet or orator, who ever wrote or will write either a political or any other work, in metre or out of metre, poet or prose writer, to teach us this?\n\nPhaedr.\n\nNeed we?\n\nFor what should a man live if not for the pleasures of discourse?\n\nSurely not for the sake of bodily pleasures, which almost always have previous pain as a condition of them, and therefore are rightly called slavish.\n\nSoc.\n\nThere is time enough.\n\nAnd I believe that the grasshoppers chirruping after their manner in the heat of the sun over our heads are talking to one another and looking down at us.\n\nWhat would they say if they saw that we, like the many, are not conversing, but slumbering at mid-day, lulled by their voices, too indolent to think?\n\nWould they not have a right to laugh at us?\n\nThey might imagine that we were slaves, who, coming to rest at a place of resort of theirs, like sheep lie asleep at noon around the well.\n\nBut if they see us discoursing, and like Odysseus sailing past them, deaf to their siren voices, they may perhaps, out of respect, give us of the gifts which they receive from the gods that they may impart them to men.\n\nPhaedr.\n\nWhat gifts do you mean?\n\nI never heard of any.\n\nSoc.\n\nA lover of music like yourself ought surely to have heard the story of the grasshoppers, who are said to have been human beings in an age before the Muses.\n\nAnd when the Muses came and song appeared they were ravished with delight; and singing always, never thought of eating and drinking, until at last in their forgetfulness they died."

