[content]
body = "I thought that you were only halfway and were going to make a similar speech about all the advantages of accepting the non-lover.\n\nWhy do you not proceed?\n\nSoc.\n\nDoes not your simplicity observe that I have got out of dithyrambics into heroics, when only uttering a censure on the lover?\n\nAnd if I am to add the praises of the non-lover, what will become of me?\n\nDo you not perceive that I am already overtaken by the Nymphs to whom you have mischievously exposed me?\n\nAnd therefore will only add that the non-lover has all the advantages in which the lover is accused of being deficient.\n\nAnd now I will say no more; there has been enough of both of them.\n\nLeaving the tale to its fate, I will cross the river and make the best of my way home, lest a worse thing be inflicted upon me by you.\n\nPhaedr.\n\nNot yet, Socrates; not until the heat of the day has passed; do you not see that the hour is almost noon?\n\nthere is the midday sun standing still, as people say, in the meridian.\n\nLet us rather stay and talk over what has been said, and then return in the cool.\n\nSoc.\n\nYour love of discourse, Phaedrus, is superhuman, simply marvellous, and I do not believe that there is any one of your contemporaries who has either made or in one way or another has compelled others to make an equal number of speeches.\n\nI would except Simmias the Theban, but all the rest are far behind you.\n\nAnd now, I do verily believe that you have been the cause of another.\n\nPhaedr.\n\nThat is good news.\n\nBut what do you mean?\n\nSoc.\n\nI mean to say that as I was about to cross the stream the usual sign was given to me,-that sign which always forbids, but never bids, me to do anything which I am going to do; and I thought that I heard a voice saying in my car that I had been guilty of impiety, and.\n\nthat I must not go away until I had made an atonement.\n\nNow I am a diviner, though not a very good one, but I have enough religion for my own use, as you might say of a bad writer-his writing is good enough for him; and I am beginning to see that I was in error.\n\nO my friend, how prophetic is the human soul!\n\nAt the time I had a sort of misgiving, and, like Ibycus, \"I was troubled; I feared that I might be buying honour from men at the price of sinning against the gods.\" Now I recognize my error.\n\nPhaedr.\n\nWhat error?\n\nSoc.\n\nThat was a dreadful speech which you brought with you, and you made me utter one as bad.\n\nPhaedr.\n\nHow so?\n\nSoc.\n\nIt was foolish, I say,-to a certain extent, impious; can anything be more dreadful?\n\nPhaedr.\n\nNothing, if the speech was really such as you describe.\n\nSoc.\n\nWell, and is not Eros the son of Aphrodite, and a god?\n\nPhaedr.\n\nSo men say.\n\nSoc.\n\nBut that was not acknowledged by Lysias in his speech, nor by you in that other speech which you by a charm drew from my lips.\n\nFor if love be, as he surely is, a divinity, he cannot be evil.\n\nYet this was the error of both the speeches.\n\nThere was also a simplicity about them which was refreshing; having no truth or honesty in them, nevertheless they pretended to be something, hoping to succeed in deceiving the manikins of earth and gain celebrity among them.\n\nWherefore I must have a purgation."

