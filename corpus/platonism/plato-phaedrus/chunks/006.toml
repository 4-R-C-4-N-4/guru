[content]
body = "\"I believe that I have said enough; but if there is anything more which you desire or which in your opinion needs to be supplied, ask and I will answer.\" Now, Socrates, what do you think?\n\nIs not the discourse excellent, more especially in the matter of the language?\n\nSoc.\n\nYes, quite admirable; the effect on me was ravishing.\n\nAnd this I owe to you, Phaedrus, for I observed you while reading to be in an ecstasy, and thinking that you are more experienced in these matters than I am, I followed your example, and, like you, my divine darling, I became inspired with a phrenzy.\n\nPhaedr.\n\nIndeed, you are pleased to be merry.\n\nSoc.\n\nDo you mean that I am not in earnest?\n\nPhaedr.\n\nNow don't talk in that way, Socrates, but let me have your real opinion; I adjure you, by Zeus, the god of friendship, to tell me whether you think that any Hellene could have said more or spoken better on the same subject.\n\nSoc.\n\nWell, but are you and I expected to praise the sentiments of the author, or only the clearness, and roundness, and finish, and tournure of the language?\n\nAs to the first I willingly submit to your better judgment, for I am not worthy to form an opinion, having only attended to the rhetorical manner; and I was doubting whether this could have been defended even by Lysias himself; I thought, though I speak under correction, that he repeated himself two or three times, either from want of words or from want of pains; and also, he appeared to me ostentatiously to exult in showing how well he could say the same thing in two or three ways.\n\nPhaedr.\n\nNonsense, Socrates; what you call repetition was the especial merit of the speech; for he omitted no topic of which the subject rightly allowed, and I do not think that any one could have spoken better or more exhaustively.\n\nSoc.\n\nThere I cannot go along with you.\n\nAncient sages, men and women, who have spoken and written of these things, would rise up in judgment against me, if out of complaisance I assented to you.\n\nPhaedr.\n\nWho are they, and where did you hear anything better than this?\n\nSoc.\n\nI am sure that I must have heard; but at this moment I do not remember from whom; perhaps from Sappho the fair, or Anacreon the wise; or, possibly, from a prose writer.\n\nWhy do I say so?\n\nWhy, because I perceive that my bosom is full, and that I could make another speech as good as that of Lysias, and different.\n\nNow I am certain that this is not an invention of my own, who am well aware that I know nothing, and therefore I can only infer that I have been filled through the cars, like a pitcher, from the waters of another, though I have actually forgotten in my stupidity who was my informant.\n\nPhaedr.\n\nThat is grand:-but never mind where you beard the discourse or from whom; let that be a mystery not to be divulged even at my earnest desire.\n\nOnly, as you say, promise to make another and better oration, equal in length and entirely new, on the same subject; and I, like the nine Archons, will promise to set up a golden image at Delphi, not only of myself, but of you, and as large as life.\n\nSoc.\n\nYou are a dear golden ass if you suppose me to mean that Lysias has altogether missed the mark, and that I can make a speech from which all his arguments are to be excluded.\n\nThe worst of authors will say something which is to the point."

