[content]
body = "Phaedr.\n\nIf trying would avail, then I might; but at the moment I can think of nothing.\n\nSoc.\n\nSuppose I tell you something which somebody who knows told me.\n\nPhaedr.\n\nCertainly.\n\nSoc.\n\nMay not \"the wolf,\" as the proverb says, claim a hearing\"?\n\nPhaedr.\n\nDo you say what can be said for him.\n\nSoc.\n\nHe will argue that is no use in putting a solemn face on these matters, or in going round and round, until you arrive at first principles; for, as I said at first, when the question is of justice and good, or is a question in which men are concerned who are just and good, either by nature or habit, he who would be a skilful rhetorician has; no need of truth-for that in courts of law men literally care nothing about truth, but only about conviction: and this is based on probability, to which who would be a skilful orator should therefore give his whole attention.\n\nAnd they say also that there are cases in which the actual facts, if they are improbable, ought to be withheld, and only the probabilities should be told either in accusation or defence, and that always in speaking, the orator should keep probability in view, and say good-bye to the truth.\n\nAnd the observance, of this principle throughout a speech furnishes the whole art.\n\nPhaedr.\n\nThat is what the professors of rhetoric do actually say, Socrates.\n\nI have not forgotten that we have quite briefly touched upon this matter already; with them the point is all-important.\n\nSoc.\n\nI dare say that you are familiar with Tisias.\n\nDoes he not define probability to be that which the many think?\n\nPhaedr.\n\nCertainly, he does.\n\nSoc.\n\nI believe that he has a clever and ingenious case of this sort:-He supposes a feeble and valiant man to have assaulted a strong and cowardly one, and to have robbed him of his coat or of something or other; he is brought into court, and then Tisias says that both parties should tell lies: the coward should say that he was assaulted by more men than one; the other should prove that they were alone, and should argue thus: \"How could a weak man like me have assaulted a strong man like him?\" The complainant will not like to confess his own cowardice, and will therefore invent some other lie which his adversary will thus gain an opportunity of refuting.\n\nAnd there are other devices of the same kind which have a place in the system.\n\nAm I not right, Phaedrus?\n\nPhaedr.\n\nCertainly.\n\nSoc.\n\nBless me, what a wonderfully mysterious art is this which Tisias or some other gentleman, in whatever name or country he rejoices, has discovered.\n\nShall we say a word to him or not?\n\nPhaedr.\n\nWhat shall we say to him?\n\nSoc.\n\nLet us tell him that, before he appeared, you and I were saying that the probability of which he speaks was engendered in the minds of the many by the likeness of the truth, and we had just been affirming that he who knew the truth would always know best how to discover the resemblances of the truth.\n\nIf he has anything else to say about the art of speaking we should like to hear him; but if not, we are satisfied with our own view, that unless a man estimates the various characters of his heaters and is able to divide all things into classes and to comprehend them under single ideas he will never be a skilful rhetorician even within the limits of human power."

