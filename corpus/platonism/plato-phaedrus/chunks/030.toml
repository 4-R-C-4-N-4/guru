[content]
body = "Give an example.\n\nSoc.\n\nI will.\n\nSuppose a person to come to your friend Eryximachus, or to his father Acumenus, and to say to him: \"I know how to apply drugs which shall have either a heating or a cooling effect, and I can give a vomit and also a purge, and all that sort of thing; and knowing all this, as I do, I claim to be a physician and to make physicians by imparting this knowledge to others,\"-what do you suppose that they would say?\n\nPhaedr.\n\nThey would be sure to ask him whether he knew \"to whom\" he would give his medicines, and \"when,\" and \"how much.\" Soc.\n\nAnd suppose that he were to reply: \"No; I know nothing of all that; I expect the patient who consults me to be able to do these things for himself\"?\n\nPhaedr.\n\nThey would say in reply that he is a madman or pedant who fancies that he is a physician because he has read something in a book, or has stumbled on a prescription or two, although he has no real understanding of the art of medicine.\n\nSoc.\n\nAnd suppose a person were to come to Sophocles or Euripides and say that he knows how to make a very long speech about a small matter, and a short speech about a great matter, and also a sorrowful speech, or a terrible, or threatening speech, or any other kind of speech, and in teaching this fancies that he is teaching the art of tragedy-?\n\nPhaedr.\n\nThey too would surely laugh at him if he fancies that tragedy is anything but the arranging of these elements in a manner which will be suitable to one another and to the whole.\n\nSoc.\n\nBut I do not suppose that they would be rude or abusive to him: Would they not treat him as a musician would a man who thinks that he is a harmonist because he knows how to pitch the highest and lowest notes; happening to meet such an one he would not say to him savagely, \"Fool, you are mad!\" But like a musician, in a gentle and harmonious tone of voice, he would answer: \"My good friend, he who would be a harmonist must certainly know this, and yet he may understand nothing of harmony if he has not got beyond your stage of knowledge, for you only know the preliminaries of harmony and not harmony itself.\" Phaedr.\n\nVery true.\n\nSoc.\n\nAnd will not Sophocles say to the display of the would-be tragedian, that this is not tragedy but the preliminaries of tragedy?\n\nand will not Acumenus say the same of medicine to the would-be physician?\n\nPhaedr.\n\nQuite true.\n\nSoc.\n\nAnd if Adrastus the mellifluous or Pericles heard of these wonderful arts, brachylogies and eikonologies and all the hard names which we have been endeavouring to draw into the light of day, what would they say?\n\nInstead of losing temper and applying uncomplimentary epithets, as you and I have been doing, to the authors of such an imaginary art, their superior wisdom would rather censure us, as well as them.\n\n\"Have a little patience, Phaedrus and Socrates, they would say; you should not be in such a passion with those who from some want of dialectical skill are unable to define the nature of rhetoric, and consequently suppose that they have found the art in the preliminary conditions of it, and when these have been taught by them to others, fancy that the whole art of rhetoric has been taught by them; but as to using the several instruments of the art effectively, or making the composition a whole,-an application of it such as this is they regard as an easy thing which their disciples may make for themselves.\" Phaedr."

