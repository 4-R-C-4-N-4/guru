[content]
body = "The two speeches, as you may remember, were unlike-I the one argued that the lover and the other that the non-lover ought to be accepted.\n\nPhaedr.\n\nAnd right manfully.\n\nSoc.\n\nYou should rather say \"madly\"; and madness was the argument of them, for, as I said, \"love is a madness.\" Phaedr.\n\nYes.\n\nSoc.\n\nAnd of madness there were two kinds; one produced by human infirmity, the other was a divine release of the soul from the yoke of custom and convention.\n\nPhaedr.\n\nTrue.\n\nSoc.\n\nThe divine madness was subdivided into four kinds, prophetic, initiatory, poetic, erotic, having four gods presiding over them; the first was the inspiration of Apollo, the second that of Dionysus, the third that of the Muses, the fourth that of Aphrodite and Eros.\n\nIn the description of the last kind of madness, which was also said to be the best, we spoke of the affection of love in a figure, into which we introduced a tolerably credible and possibly true though partly erring myth, which was also a hymn in honour of Love, who is your lord and also mine, Phaedrus, and the guardian of fair children, and to him we sung the hymn in measured and solemn strain.\n\nPhaedr.\n\nI know that I had great pleasure in listening to you.\n\nSoc.\n\nLet us take this instance and note how the transition was made from blame to praise.\n\nPhaedr.\n\nWhat do you mean?\n\nSoc.\n\nI mean to say that the composition was mostly playful.\n\nYet in these chance fancies of the hour were involved two principles of which we should be too glad to have a clearer description if art could give us one.\n\nPhaedr.\n\nWhat are they?\n\nSoc.\n\nFirst, the comprehension of scattered particulars in one idea; as in our definition of love, which whether true or false certainly gave clearness and consistency to the discourse, the speaker should define his several notions and so make his meaning clear.\n\nPhaedr.\n\nWhat is the other principle, Socrates?\n\nSoc.\n\nThe second principle is that of division into species according to the natural formation, where the joint is, not breaking any part as a bad carver might.\n\nJust as our two discourses, alike assumed, first of all, a single form of unreason; and then, as the body which from being one becomes double and may be divided into a left side and right side, each having parts right and left of the same name-after this manner the speaker proceeded to divide the parts of the left side and did not desist until he found in them an evil or left-handed love which he justly reviled; and the other discourse leading us to the madness which lay on the right side, found another love, also having the same name, but divine, which the speaker held up before us and applauded and affirmed to be the author of the greatest benefits.\n\nPhaedr.\n\nMost true.\n\nSoc.\n\nI am myself a great lover of these processes of division and generalization; they help me to speak and to think.\n\nAnd if I find any man who is able to see \"a One and Many\" in nature, him I follow, and \"walk in his footsteps as if he were a god.\" And those who have this art, I have hitherto been in the habit of calling dialecticians; but God knows whether the name is right or not.\n\nAnd I should like to know what name you would give to your or to Lysias' disciples, and whether this may not be that famous art of rhetoric which Thrasymachus and others teach and practise?\n\nSkilful speakers they are, and impart their skill to any who is willing to make kings of them and to bring gifts to them.\n\nPhaedr."

