[content]
body = "But hear what follows, and Perhaps the fit may be averted; all is in their hands above.\n\nI will go on talking to my youth.\n\nListen: Thus, my friend, we have declared and defined the nature of the subject.\n\nKeeping the definition in view, let us now enquire what advantage or disadvantage is likely to ensue from the lover or the non-lover to him who accepts their advances.\n\nHe who is the victim of his passions and the slave of pleasure will of course desire to make his beloved as agreeable to himself as possible.\n\nNow to him who has a mind discased anything is agreeable which is not opposed to him, but that which is equal or superior is hateful to him, and therefore the lover Will not brook any superiority or equality on the part of his beloved; he is always employed in reducing him to inferiority.\n\nAnd the ignorant is the inferior of the wise, the coward of the brave, the slow of speech of the speaker, the dull of the clever.\n\nThese, and not these only, are the mental defects of the beloved;-defects which, when implanted by nature, are necessarily a delight to the lover, and when not implanted, he must contrive to implant them in him, if he would not be deprived of his fleeting joy.\n\nAnd therefore he cannot help being jealous, and will debar his beloved from the advantages of society which would make a man of him, and especially from that society which would have given him wisdom, and thereby he cannot fail to do him great harm.\n\nThat is to say, in his excessive fear lest he should come to be despised in his eyes he will be compelled to banish from him divine philosophy; and there is no greater injury which he can inflict upon him than this.\n\nHe will contrive that his beloved shall be wholly ignorant, and in everything shall look to him; he is to be the delight of the lover's heart, and a curse to himself.\n\nVerily, a lover is a profitable guardian and associate for him in all that relates to his mind.\n\nLet us next see how his master, whose law of life is pleasure and not good, will keep and train the body of his servant.\n\nWill he not choose a beloved who is delicate rather than sturdy and strong?\n\nOne brought up in shady bowers and not in the bright sun, a stranger to manly exercises and the sweat of toil, accustomed only to a soft and luxurious diet, instead of the hues of health having the colours of paint and ornament, and the rest of a piece?-such a life as any one can imagine and which I need not detail at length.\n\nBut I may sum up all that I have to say in a word, and pass on.\n\nSuch a person in war, or in any of the great crises of life, will be the anxiety of his friends and also of his lover, and certainly not the terror of his enemies; which nobody can deny.\n\nAnd now let us tell what advantage or disadvantage the beloved will receive from the guardianship and society of his lover in the matter of his property; this is the next point to be considered.\n\nThe lover will be the first to see what, indeed, will be sufficiently evident to all men, that he desires above all things to deprive his beloved of his dearest and best and holiest possessions, father, mother, kindred, friends, of all whom he thinks may be hinderers or reprovers of their most sweet converse; he will even cast a jealous eye upon his gold and silver or other property, because these make him a less easy prey, and when caught less manageable; hence he is of necessity displeased at his possession of them and rejoices at their loss; and he would like him to be wifeless, childless, homeless, as well; and the longer the better, for the longer he is all this, the longer he will enjoy him."

