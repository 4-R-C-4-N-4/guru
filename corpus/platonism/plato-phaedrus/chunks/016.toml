[content]
body = "And there is a law of Destiny, that the soul which attains any vision of truth in company with a god is preserved from harm until the next period, and if attaining always is always unharmed.\n\nBut when she is unable to follow, and fails to behold the truth, and through some ill-hap sinks beneath the double load of forgetfulness and vice, and her wings fall from her and she drops to the ground, then the law ordains that this soul shall at her first birth pass, not into any other animal, but only into man; and the soul which has seen most of truth shall come to the birth as a philosopher, or artist, or some musical and loving nature; that which has seen truth in the second degree shall be some righteous king or warrior chief; the soul which is of the third class shall be a politician, or economist, or trader; the fourth shall be lover of gymnastic toils, or a physician; the fifth shall lead the life of a prophet or hierophant; to the sixth the character of poet or some other imitative artist will be assigned; to the seventh the life of an artisan or husbandman; to the eighth that of a sophist or demagogue; to the ninth that of a tyrant-all these are states of probation, in which he who does righteously improves, and he who does unrighteously, improves, and he who does unrighteously, deteriorates his lot.\n\nTen thousand years must elapse before the soul of each one can return to the place from whence she came, for she cannot grow her wings in less; only the soul of a philosopher, guileless and true, or the soul of a lover, who is not devoid of philosophy, may acquire wings in the third of the recurring periods of a thousand years; he is distinguished from the ordinary good man who gains wings in three thousand years:-and they who choose this life three times in succession have wings given them, and go away at the end of three thousand years.\n\nBut the others receive judgment when they have completed their first life, and after the judgment they go, some of them to the houses of correction which are under the earth, and are punished; others to some place in heaven whither they are lightly borne by justice, and there they live in a manner worthy of the life which they led here when in the form of men.\n\nAnd at the end of the first thousand years the good souls and also the evil souls both come to draw lots and choose their second life, and they may take any which they please.\n\nThe soul of a man may pass into the life of a beast, or from the beast return again into the man.\n\nBut the soul which has never seen the truth will not pass into the human form.\n\nFor a man must have intelligence of universals, and be able to proceed from the many particulars of sense to one conception of reason;-this is the recollection of those things which our soul once saw while following God-when regardless of that which we now call being she raised her head up towards the true being.\n\nAnd therefore the mind of the philosopher alone has wings; and this is just, for he is always, according to the measure of his abilities, clinging in recollection to those things in which God abides, and in beholding which He is what He is.\n\nAnd he who employs aright these memories is ever being initiated into perfect mysteries and alone becomes truly perfect.\n\nBut, as he forgets earthly interests and is rapt in the divine, the vulgar deem him mad, and rebuke him; they do not see that he is inspired."

