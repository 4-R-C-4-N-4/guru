[content]
body = "But when the lover of discourse begged that he would repeat the tale, he gave himself airs and said, \"No I cannot,\" as if he were indisposed; although, if the hearer had refused, he would sooner or later have been compelled by him to listen whether he would or no.\n\nTherefore, Phaedrus, bid him do at once what he will soon do whether bidden or not.\n\nPhaedr.\n\nI see that you will not let me off until I speak in some fashion or other; verily therefore my best plan is to speak as I best can.\n\nSoc.\n\nA very true remark, that of yours.\n\nPhaedr.\n\nI will do as I say; but believe me, Socrates, I did not learn the very words-O no; nevertheless I have a general notion of what he said, and will give you a summary of the points in which the lover differed from the non-lover.\n\nLet me begin at the beginning.\n\nSoc.\n\nYes, my sweet one; but you must first of all show what you have in your left hand under your cloak, for that roll, as I suspect, is the actual discourse.\n\nNow, much as I love you, I would not have you suppose that I am going to have your memory exercised at my expense, if you have Lysias himself here.\n\nPhaedr.\n\nEnough; I see that I have no hope of practising my art upon you.\n\nBut if I am to read, where would you please to sit?\n\nSoc.\n\nLet us turn aside and go by the Ilissus; we will sit down at some quiet spot.\n\nPhaedr.\n\nI am fortunate in not having my sandals, and as you never have any, I think that we may go along the brook and cool our feet in the water; this will be the easiest way, and at midday and in the summer is far from being unpleasant.\n\nSoc.\n\nLead on, and look out for a place in which we can sit down.\n\nPhaedr.\n\nDo you see the tallest plane-tree in the distance?\n\nSoc.\n\nYes.\n\nPhaedr.\n\nThere are shade and gentle breezes, and grass on which we may either sit or lie down.\n\nSoc.\n\nMove forward.\n\nPhaedr.\n\nI should like to know, Socrates, whether the place is not somewhere here at which Boreas is said to have carried off Orithyia from the banks of the Ilissus?\n\nSoc.\n\nSuch is the tradition.\n\nPhaedr.\n\nAnd is this the exact spot?\n\nThe little stream is delightfully clear and bright; I can fancy that there might be maidens playing near.\n\nSoc.\n\nI believe that the spot is not exactly here, but about a quarter of a mile lower down, where you cross to the temple of Artemis, and there is, I think, some sort of an altar of Boreas at the place.\n\nPhaedr.\n\nI have never noticed it; but I beseech you to tell me, Socrates, do you believe this tale?\n\nSoc.\n\nThe wise are doubtful, and I should not be singular if, like them, I too doubted.\n\nI might have a rational explanation that Orithyia was playing with Pharmacia, when a northern gust carried her over the neighbouring rocks; and this being the manner of her death, she was said to have been carried away by Boreas.\n\nThere is a discrepancy, however, about the locality; according to another version of the story she was taken from Areopagus, and not from this place.\n\nNow I quite acknowledge that these allegories are very nice, but he is not to be envied who has to invent them; much labour and ingenuity will be required of him; and when he has once begun, he must go on and rehabilitate Hippocentaurs and chimeras dire."

