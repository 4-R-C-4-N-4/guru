[content]
body = "To the debatable, clearly; for if not, do you think that love would have allowed you to say as you did, that he is an evil both to the lover and the beloved, and also the greatest possible good?\n\nSoc.\n\nCapital.\n\nBut will you tell me whether I defined love at the beginning of my speech?\n\nfor, having been in an ecstasy, I cannot well remember.\n\nPhaedr.\n\nYes, indeed; that you did, and no mistake.\n\nSoc.\n\nThen I perceive that the Nymphs of Achelous and Pan the son of Hermes, who inspired me, were far better rhetoricians than Lysias the son of Cephalus.\n\nAlas!\n\nhow inferior to them he is!\n\nBut perhaps I am mistaken; and Lysias at the commencement of his lover's speech did insist on our supposing love to be something or other which he fancied him to be, and according to this model he fashioned and framed the remainder of his discourse.\n\nSuppose we read his beginning over again: Phaedr.\n\nIf you please; but you will not find what you want.\n\nSoc, Read, that I may have his exact words.\n\nPhaedr.\n\n\"You know how matters stand with and how, as I conceive, they might be arranged for our common interest; and I maintain I ought not to fail in my suit because I am not your lover, for lovers repent of the kindnesses which they have shown, when their love is over.\" Soc.\n\nHere he appears to have done just the reverse of what he ought; for he has begun at the end, and is swimming on his back through the flood to the place of starting.\n\nHis address to the fair youth begins where the lover would have ended.\n\nAm I not right, sweet Phaedrus?\n\nPhaedr.\n\nYes, indeed, Socrates; he does begin at the end.\n\nSoc.\n\nThen as to the other topics-are they not thrown down anyhow?\n\nIs there any principle in them?\n\nWhy should the next topic follow next in order, or any other topic?\n\nI cannot help fancying in my ignorance that he wrote off boldly just what came into his head, but I dare say that you would recognize a rhetorical necessity in the succession of the several parts of the composition?\n\nPhaedr.\n\nYou have too good an opinion of me if you think that I have any such insight into his principles of composition.\n\nSoc.\n\nAt any rate, you will allow that every discourse ought to be a living creature, having a body of its own and a head and feet; there should be a middle, beginning, and end, adapted to one another and to the whole?\n\nPhaedr.\n\nCertainly.\n\nSoc.\n\nCan this be said of the discourse of Lysias?\n\nSee whether you can find any more connexion in his words than in the epitaph which is said by some to have been inscribed on the grave of Midas the Phrygian.\n\nPhaedr.\n\nWhat is there remarkable in the epitaph?\n\nSoc.\n\nIt is as follows:- I am a maiden of bronze and lie on the tomb of Midas; So long as water flows and tall trees grow, So long here on this spot by his sad tomb abiding, I shall declare to passers-by that Midas sleeps below.\n\nNow in this rhyme whether a line comes first or comes last, as you will perceive, makes no difference.\n\nPhaedr.\n\nYou are making fun of that oration of ours.\n\nSoc.\n\nWell, I will say no more about your friend's speech lest I should give offence to you; although I think that it might furnish many other examples of what a man ought rather to avoid.\n\nBut I will proceed to the other speech, which, as I think, is also suggestive to students of rhetoric.\n\nPhaedr.\n\nIn what way?\n\nSoc."

