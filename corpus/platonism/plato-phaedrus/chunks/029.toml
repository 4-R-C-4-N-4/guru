[content]
body = "Yes, they are royal men; but their art is not the same with the art of those whom you call, and rightly, in my opinion, dialecticians:-Still we are in the dark about rhetoric.\n\nSoc.\n\nWhat do you mean?\n\nThe remains of it, if there be anything remaining which can be brought under rules of art, must be a fine thing; and, at any rate, is not to be despised by you and me.\n\nBut how much is left?\n\nPhaedr.\n\nThere is a great deal surely to be found in books of rhetoric?\n\nSoc.\n\nYes; thank you for reminding me:-There is the exordium, showing how the speech should begin, if I remember rightly; that is what you mean-the niceties of the art?\n\nPhaedr.\n\nYes.\n\nSoc.\n\nThen follows the statement of facts, and upon that witnesses; thirdly, proofs; fourthly, probabilities are to come; the great Byzantian word-maker also speaks, if I am not mistaken, of confirmation and further confirmation.\n\nPhaedr.\n\nYou mean the excellent Theodorus.\n\nSoc.\n\nYes; and he tells how refutation or further refutation is to be managed, whether in accusation or defence.\n\nI ought also to mention the illustrious Parian, Evenus, who first invented insinuations and indirect praises; and also indirect censures, which according to some he put into verse to help the memory.\n\nBut shall I \"to dumb forgetfulness consign\" Tisias and Gorgias, who are not ignorant that probability is superior to truth, and who by: force of argument make the little appear great and the great little, disguise the new in old fashions and the old in new fashions, and have discovered forms for everything, either short or going on to infinity.\n\nI remember Prodicus laughing when I told him of this; he said that he had himself discovered the true rule of art, which was to be neither long nor short, but of a convenient length.\n\nPhaedr.\n\nWell done, Prodicus!\n\nSoc.\n\nThen there is Hippias the Elean stranger, who probably agrees with him.\n\nPhaedr.\n\nYes.\n\nSoc.\n\nAnd there is also Polus, who has treasuries of diplasiology, and gnomology, and eikonology, and who teaches in them the names of which Licymnius made him a present; they were to give a polish.\n\nPhaedr.\n\nHad not Protagoras something of the same sort?\n\nSoc.\n\nYes, rules of correct diction and many other fine precepts; for the \"sorrows of a poor old man,\" or any other pathetic case, no one is better than the Chalcedonian giant; he can put a whole company of people into a passion and out of one again by his mighty magic, and is first-rate at inventing or disposing of any sort of calumny on any grounds or none.\n\nAll of them agree in asserting that a speech should end in a recapitulation, though they do not all agree to use the same word.\n\nPhaedr.\n\nYou mean that there should be a summing up of the arguments in order to remind the hearers of them.\n\nSoc.\n\nI have now said all that I have to say of the art of rhetoric: have you anything to add?\n\nPhaedr.\n\nNot much; nothing very important.\n\nSoc.\n\nLeave the unimportant and let us bring the really important question into the light of day, which is: What power has this art of rhetoric, and when?\n\nPhaedr.\n\nA very great power in public meetings.\n\nSoc.\n\nIt has.\n\nBut I should like to know whether you have the same feeling as I have about the rhetoricians?\n\nTo me there seem to be a great many holes in their web.\n\nPhaedr."

