[content]
body = "Then clearly, Thrasymachus or any one else who teaches rhetoric in earnest will give an exact description of the nature of the soul; which will enable us to see whether she be single and same, or, like the body, multiform.\n\nThat is what we should call showing the nature of the soul.\n\nPhaedr.\n\nExactly.\n\nSoc.\n\nHe will explain, secondly, the mode in which she acts or is acted upon.\n\nPhaedr.\n\nTrue.\n\nSoc.\n\nThirdly, having classified men and speeches, and their kinds and affections, and adapted them to one another, he will tell the reasons of his arrangement, and show why one soul is persuaded by a particular form of argument, and another not.\n\nPhaedr.\n\nYou have hit upon a very good way.\n\nSoc.\n\nYes, that is the true and only way in which any subject can be set forth or treated by rules of art, whether in speaking or writing.\n\nBut the writers of the present day, at whose feet you have sat, craftily, conceal the nature of the soul which they know quite well.\n\nNor, until they adopt our method of reading and writing, can we admit that they write by rules of art?\n\nPhaedr.\n\nWhat is our method?\n\nSoc.\n\nI cannot give you the exact details; but I should like to tell you generally, as far as is in my power, how a man ought to proceed according to rules of art.\n\nPhaedr.\n\nLet me hear.\n\nSoc.\n\nOratory is the art of enchanting the soul, and therefore he who would be an orator has to learn the differences of human souls-they are so many and of such a nature, and from them come the differences between man and man.\n\nHaving proceeded thus far in his analysis, he will next divide speeches into their different classes:-\"Such and such persons,\" he will say, are affected by this or that kind of speech in this or that way,\" and he will tell you why.\n\nThe pupil must have a good theoretical notion of them first, and then he must have experience of them in actual life, and be able to follow them with all his senses about him, or he will never get beyond the precepts of his masters.\n\nBut when he understands what persons are persuaded by what arguments, and sees the person about whom he was speaking in the abstract actually before him, and knows that it is he, and can say to himself, \"This is the man or this is the character who ought to have a certain argument applied to him in order to convince him of a certain opinion\"; -he who knows all this, and knows also when he should speak and when he should refrain, and when he should use pithy sayings, pathetic appeals, sensational effects, and all the other modes of speech which he has learned;-when, I say, he knows the times and seasons of all these things, then, and not till then, he is a perfect master of his art; but if he fail in any of these points, whether in speaking or teaching or writing them, and yet declares that he speaks by rules of art, he who says \"I don't believe you\" has the better of him.\n\nWell, the teacher will say, is this, and Socrates, your account of the so-called art of rhetoric, or am I to look for another?\n\nPhaedr.\n\nHe must take this, Socrates for there is no possibility of another, and yet the creation of such an art is not easy.\n\nSoc.\n\nVery true; and therefore let us consider this matter in every light, and see whether we cannot find a shorter and easier road; there is no use in taking a long rough round-about way if there be a shorter and easier one.\n\nAnd I wish that you would try and remember whether you have heard from Lysias or any one else anything which might be of service to us."

