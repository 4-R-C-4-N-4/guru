[content]
body = "Gorgons and winged steeds flow in apace, and numberless other inconceivable and portentous natures.\n\nAnd if he is sceptical about them, and would fain reduce them one after another to the rules of probability, this sort of crude philosophy will take up a great deal of time.\n\nNow I have no leisure for such enquiries; shall I tell you why?\n\nI must first know myself, as the Delphian inscription says; to be curious about that which is not my concern, while I am still in ignorance of my own self, would be ridiculous.\n\nAnd therefore I bid farewell to all this; the common opinion is enough for me.\n\nFor, as I was saying, I want to know not about this, but about myself: am I a monster more complicated and swollen with passion than the serpent Typho, or a creature of a gentler and simpler sort, to whom Nature has given a diviner and lowlier destiny?\n\nBut let me ask you, friend: have we not reached the plane-tree to which you were conducting us?\n\nPhaedr.\n\nYes, this is the tree.\n\nSoc.\n\nBy Here, a fair resting-place, full of summer sounds and scents.\n\nHere is this lofty and spreading plane-tree, and the agnus cast us high and clustering, in the fullest blossom and the greatest fragrance; and the stream which flows beneath the plane-tree is deliciously cold to the feet.\n\nJudging from the ornaments and images, this must be a spot sacred to Achelous and the Nymphs.\n\nHow delightful is the breeze:-so very sweet; and there is a sound in the air shrill and summerlike which makes answer to the chorus of the cicadae.\n\nBut the greatest charm of all is the grass, like a pillow gently sloping to the head.\n\nMy dear Phaedrus, you have been an admirable guide.\n\nPhaedr.\n\nWhat an incomprehensible being you are, Socrates: when you are in the country, as you say, you really are like some stranger who is led about by a guide.\n\nDo you ever cross the border?\n\nI rather think that you never venture even outside the gates.\n\nSoc.\n\nVery true, my good friend; and I hope that you will excuse me when you hear the reason, which is, that I am a lover of knowledge, and the men who dwell in the city are my teachers, and not the trees or the country.\n\nThough I do indeed believe that you have found a spell with which to draw me out of the city into the country, like a hungry cow before whom a bough or a bunch of fruit is waved.\n\nFor only hold up before me in like manner a book, and you may lead me all round Attica, and over the wide world.\n\nAnd now having arrived, I intend to lie down, and do you choose any posture in which you can read best.\n\nBegin.\n\nPhaedr.\n\nListen.\n\nYou know how matters stand with me; and how, as I conceive, this affair may be arranged for the advantage of both of us.\n\nAnd I maintain that I ought not to fail in my suit, because I am not your lover: for lovers repent of the kindnesses which they have shown when their passion ceases, but to the non-lovers who are free and not under any compulsion, no time of repentance ever comes; for they confer their benefits according to the measure of their ability, in the way which is most conducive to their own interest.\n\nThen again, lovers consider how by reason of their love they have neglected their own concerns and rendered service to others: and when to these benefits conferred they add on the troubles which they have endured, they think that they have long ago made to the beloved a very ample return."

