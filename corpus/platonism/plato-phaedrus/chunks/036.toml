[content]
body = "Then he will not seriously incline to \"write\" his thoughts \"in water\" with pen and ink, sowing words which can neither speak for themselves nor teach the truth adequately to others?\n\nPhaedr.\n\nNo, that is not likely.\n\nSoc.\n\nNo, that is not likely-in the garden of letters he will sow and plant, but only for the sake of recreation and amusement; he will write them down as memorials to be treasured against the forgetfulness of old age, by himself, or by any other old man who is treading the same path.\n\nHe will rejoice in beholding their tender growth; and while others are refreshing their souls with banqueting and the like, this will be the pastime in which his days are spent.\n\nPhaedr.\n\nA pastime, Socrates, as noble as the other is ignoble, the pastime of a man who can be amused by serious talk, and can discourse merrily about justice and the like.\n\nSoc.\n\nTrue, Phaedrus.\n\nBut nobler far is the serious pursuit of the dialectician, who, finding a congenial soul, by the help of science sows and plants therein words which are able to help themselves and him who planted them, and are not unfruitful, but have in them a seed which others brought up in different soils render immortal, making the possessors of it happy to the utmost extent of human happiness.\n\nPhaedr.\n\nFar nobler, certainly.\n\nSoc.\n\nAnd now, Phaedrus, having agreed upon the premises we decide about the conclusion.\n\nPhaedr.\n\nAbout what conclusion?\n\nSoc.\n\nAbout Lysias, whom we censured, and his art of writing, and his discourses, and the rhetorical skill or want of skill which was shown in them-these are the questions which we sought to determine, and they brought us to this point.\n\nAnd I think that we are now pretty well informed about the nature of art and its opposite.\n\nPhaedr.\n\nYes, I think with you; but I wish that you would repeat what was said.\n\nSoc.\n\nUntil a man knows the truth of the several particulars of which he is writing or speaking, and is able to define them as they are, and having defined them again to divide them until they can be no longer divided, and until in like manner he is able to discern the nature of the soul, and discover the different modes of discourse which are adapted to different natures, and to arrange and dispose them in such a way that the simple form of speech may be addressed to the simpler nature, and the complex and composite to the more complex nature-until he has accomplished all this, he will be unable to handle arguments according to rules of art, as far as their nature allows them to be subjected to art, either for the purpose of teaching or persuading;-such is the view which is implied in the whole preceding argument.\n\nPhaedr.\n\nYes, that was our view, certainly.\n\nSoc.\n\nSecondly, as to the censure which was passed on the speaking or writing of discourses, and how they might be rightly or wrongly censured-did not our previous argument show?- Phaedr.\n\nShow what?\n\nSoc.\n\nThat whether Lysias or any other writer that ever was or will be, whether private man or statesman, proposes laws and so becomes the author of a political treatise, fancying that there is any great certainty and clearness in his performance, the fact of his so writing is only a disgrace to him, whatever men may say.\n\nFor not to know the nature of justice and injustice, and good and evil, and not to be able to distinguish the dream from the reality, cannot in truth be otherwise than disgraceful to him, even though he have the applause of the whole world.\n\nPhaedr.\n\nCertainly.\n\nSoc."

