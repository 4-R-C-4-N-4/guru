[content]
body = "I might compare him to a person who began by maintaining generally that mind is the cause of the actions of Socrates, but who, when he endeavored to explain the causes of my several actions in detail, went on to show that I sit here because my body is made up of bones and muscles; and the bones, as he would say, are hard and have ligaments which divide them, and the muscles are elastic, and they cover the bones, which have also a covering or environment of flesh and skin which contains them; and as the bones are lifted at their joints by the contraction or relaxation of the muscles, I am able to bend my limbs, and this is why I am sitting here in a curved posture: that is what he would say, and he would have a similar explanation of my talking to you, which he would attribute to sound, and air, and hearing, and he would assign ten thousand other causes of the same sort, forgetting to mention the true cause, which is that the Athenians have thought fit to condemn me, and accordingly I have thought it better and more right to remain here and undergo my sentence; for I am inclined to think that these muscles and bones of mine would have gone off to Megara or Boeotia-by the dog of Egypt they would, if they had been guided only by their own idea of what was best, and if I had not chosen as the better and nobler part, instead of playing truant and running away, to undergo any punishment which the State inflicts.\n\nThere is surely a strange confusion of causes and conditions in all this.\n\nIt may be said, indeed, that without bones and muscles and the other parts of the body I cannot execute my purposes.\n\nBut to say that I do as I do because of them, and that this is the way in which mind acts, and not from the choice of the best, is a very careless and idle mode of speaking.\n\nI wonder that they cannot distinguish the cause from the condition, which the many, feeling about in the dark, are always mistaking and misnaming.\n\nAnd thus one man makes a vortex all round and steadies the earth by the heaven; another gives the air as a support to the earth, which is a sort of broad trough.\n\nAny power which in disposing them as they are disposes them for the best never enters into their minds, nor do they imagine that there is any superhuman strength in that; they rather expect to find another Atlas of the world who is stronger and more everlasting and more containing than the good is, and are clearly of opinion that the obligatory and containing power of the good is as nothing; and yet this is the principle which I would fain learn if anyone would teach me.\n\nBut as I have failed either to discover myself or to learn of anyone else, the nature of the best, I will exhibit to you, if you like, what I have found to be the second best mode of inquiring into the cause.\n\nI should very much like to hear that, he replied.\n\nSocrates proceeded: I thought that as I had failed in the contemplation of true existence, I ought to be careful that I did not lose the eye of my soul; as people may injure their bodily eye by observing and gazing on the sun during an eclipse, unless they take the precaution of only looking at the image reflected in the water, or in some similar medium.\n\nThat occurred to me, and I was afraid that my soul might be blinded altogether if I looked at things with my eyes or tried by the help of the senses to apprehend them.\n\nAnd I thought that I had better have recourse to ideas, and seek in them the truth of existence."

