[content]
body = "And some burst forth again on the opposite side, and some on the same side, and some wind round the earth with one or many folds, like the coils of a serpent, and descend as far as they can, but always return and fall into the lake.\n\nThe rivers on either side can descend only to the center and no further, for to the rivers on both sides the opposite side is a precipice.\n\nNow these rivers are many, and mighty, and diverse, and there are four principal ones, of which the greatest and outermost is that called Oceanus, which flows round the earth in a circle; and in the opposite direction flows Acheron, which passes under the earth through desert places, into the Acherusian Lake: this is the lake to the shores of which the souls of the many go when they are dead, and after waiting an appointed time, which is to some a longer and to some a shorter time, they are sent back again to be born as animals.\n\nThe third river rises between the two, and near the place of rising pours into a vast region of fire, and forms a lake larger than the Mediterranean Sea, boiling with water and mud; and proceeding muddy and turbid, and winding about the earth, comes, among other places, to the extremities of the Acherusian Lake, but mingles not with the waters of the lake, and after making many coils about the earth plunges into Tartarus at a deeper level.\n\nThis is that Pyriphlegethon, as the stream is called, which throws up jets of fire in all sorts of places.\n\nThe fourth river goes out on the opposite side, and falls first of all into a wild and savage region, which is all of a dark-blue color, like lapis lazuli; and this is that river which is called the Stygian River, and falls into and forms the Lake Styx, and after falling into the lake and receiving strange powers in the waters, passes under the earth, winding round in the opposite direction to Pyriphlegethon, and meeting in the Acherusian Lake from the opposite side.\n\nAnd the water of this river too mingles with no other, but flows round in a circle and falls into Tartarus over against Pyriphlegethon, and the name of this river, as the poet says, is Cocytus.\n\nSuch is the name of the other world; and when the dead arrive at the place to which the genius of each severally conveys them, first of all they have sentence passed upon them, as they have lived well and piously or not.\n\nAnd those who appear to have lived neither well nor ill, go to the river Acheron, and mount such conveyances as they can get, and are carried in them to the lake, and there they dwell and are purified of their evil deeds, and suffer the penalty of the wrongs which they have done to others, and are absolved, and receive the rewards of their good deeds according to their deserts.\n\nBut those who appear to be incurable by reason of the greatness of their crimes-who have committed many and terrible deeds of sacrilege, murders foul and violent, or the like-such are hurled into Tartarus, which is their suitable destiny, and they never come out."

