[content]
body = "For any man, who is not devoid of natural feeling, has reason to fear, if he has no knowledge or proof of the soul's immortality.\n\nThat is what I suppose you to say, Cebes, which I designedly repeat, in order that nothing may escape us, and that you may, if you wish, add or subtract anything.\n\nBut, said Cebes, as far as I can see at present, I have nothing to add or subtract; you have expressed my meaning.\n\nSocrates paused awhile, and seemed to be absorbed in reflection.\n\nAt length he said: This is a very serious inquiry which you are raising, Cebes, involving the whole question of generation and corruption, about which I will, if you like, give you my own experience; and you can apply this, if you think that anything which I say will avail towards the solution of your difficulty.\n\nI should very much like, said Cebes, to hear what you have to say.\n\nThen I will tell you, said Socrates.\n\nWhen I was young, Cebes, I had a prodigious desire to know that department of philosophy which is called Natural Science; this appeared to me to have lofty aims, as being the science which has to do with the causes of things, and which teaches why a thing is, and is created and destroyed; and I was always agitating myself with the consideration of such questions as these: Is the growth of animals the result of some decay which the hot and cold principle contracts, as some have said?\n\nIs the blood the element with which we think, or the air, or the fire?\n\nor perhaps nothing of this sort-but the brain may be the originating power of the perceptions of hearing and sight and smell, and memory and opinion may come from them, and science may be based on memory and opinion when no longer in motion, but at rest.\n\nAnd then I went on to examine the decay of them, and then to the things of heaven and earth, and at last I concluded that I was wholly incapable of these inquiries, as I will satisfactorily prove to you.\n\nFor I was fascinated by them to such a degree that my eyes grew blind to things that I had seemed to myself, and also to others, to know quite well; and I forgot what I had before thought to be self-evident, that the growth of man is the result of eating and drinking; for when by the digestion of food flesh is added to flesh and bone to bone, and whenever there is an aggregation of congenial elements, the lesser bulk becomes larger and the small man greater.\n\nWas not that a reasonable notion?\n\nYes, said Cebes, I think so.\n\nWell; but let me tell you something more.\n\nThere was a time when I thought that I understood the meaning of greater and less pretty well; and when I saw a great man standing by a little one I fancied that one was taller than the other by a head; or one horse would appear to be greater than another horse: and still more clearly did I seem to perceive that ten is two more than eight, and that two cubits are more than one, because two is twice one.\n\nAnd what is now your notion of such matters?\n\nsaid Cebes.\n\nI should be far enough from imagining, he replied, that I knew the cause of any of them, indeed I should, for I cannot satisfy myself that when one is added to one, the one to which the addition is made becomes two, or that the two units added together make two by reason of the addition."

