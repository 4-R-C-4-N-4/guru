[content]
body = "Socrates replied: And have you, Cebes and Simmias, who are acquainted with Philolaus, never heard him speak of this?\n\nI never understood him, Socrates.\n\nMy words, too, are only an echo; but I am very willing to say what I have heard: and indeed, as I am going to another place, I ought to be thinking and talking of the nature of the pilgrimage which I am about to make.\n\nWhat can I do better in the interval between this and the setting of the sun?\n\nThen tell me, Socrates, why is suicide held not to be right?\n\nas I have certainly heard Philolaus affirm when he was staying with us at Thebes: and there are others who say the same, although none of them has ever made me understand him.\n\nBut do your best, replied Socrates, and the day may come when you will understand.\n\nI suppose that you wonder why, as most things which are evil may be accidentally good, this is to be the only exception (for may not death, too, be better than life in some cases?), and why, when a man is better dead, he is not permitted to be his own benefactor, but must wait for the hand of another.\n\nBy Jupiter!\n\nyes, indeed, said Cebes, laughing, and speaking in his native Doric.\n\nI admit the appearance of inconsistency, replied Socrates, but there may not be any real inconsistency after all in this.\n\nThere is a doctrine uttered in secret that man is a prisoner who has no right to open the door of his prison and run away; this is a great mystery which I do not quite understand.\n\nYet I, too, believe that the gods are our guardians, and that we are a possession of theirs.\n\nDo you not agree?\n\nYes, I agree to that, said Cebes.\n\nAnd if one of your own possessions, an ox or an ass, for example took the liberty of putting himself out of the way when you had given no intimation of your wish that he should die, would you not be angry with him, and would you not punish him if you could?\n\nCertainly, replied Cebes.\n\nThen there may be reason in saying that a man should wait, and not take his own life until God summons him, as he is now summoning me.\n\nYes, Socrates, said Cebes, there is surely reason in that.\n\nAnd yet how can you reconcile this seemingly true belief that God is our guardian and we his possessions, with that willingness to die which we were attributing to the philosopher?\n\nThat the wisest of men should be willing to leave this service in which they are ruled by the gods who are the best of rulers is not reasonable, for surely no wise man thinks that when set at liberty he can take better care of himself than the gods take of him.\n\nA fool may perhaps think this-he may argue that he had better run away from his master, not considering that his duty is to remain to the end, and not to run away from the good, and that there is no sense in his running away.\n\nBut the wise man will want to be ever with him who is better than himself.\n\nNow this, Socrates, is the reverse of what was just now said; for upon this view the wise man should sorrow and the fool rejoice at passing out of life.\n\nThe earnestness of Cebes seemed to please Socrates.\n\nHere, said he, turning to us, is a man who is always inquiring, and is not to be convinced all in a moment, nor by every argument.\n\nAnd in this case, added Simmias, his objection does appear to me to have some force.\n\nFor what can be the meaning of a truly wise man wanting to fly away and lightly leave a master who is better than himself?"

