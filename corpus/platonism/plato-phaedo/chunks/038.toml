[content]
body = "But we who live in these hollows are deceived into the notion that we are dwelling above on the surface of the earth; which is just as if a creature who was at the bottom of the sea were to fancy that he was on the surface of the water, and that the sea was the heaven through which he saw the sun and the other stars-he having never come to the surface by reason of his feebleness and sluggishness, and having never lifted up his head and seen, nor ever heard from one who had seen, this region which is so much purer and fairer than his own.\n\nNow this is exactly our case: for we are dwelling in a hollow of the earth, and fancy that we are on the surface; and the air we call the heaven, and in this we imagine that the stars move.\n\nBut this is also owing to our feebleness and sluggishness, which prevent our reaching the surface of the air: for if any man could arrive at the exterior limit, or take the wings of a bird and fly upward, like a fish who puts his head out and sees this world, he would see a world beyond; and, if the nature of man could sustain the sight, he would acknowledge that this was the place of the true heaven and the true light and the true stars.\n\nFor this earth, and the stones, and the entire region which surrounds us, are spoilt and corroded, like the things in the sea which are corroded by the brine; for in the sea too there is hardly any noble or perfect growth, but clefts only, and sand, and an endless slough of mud: and even the shore is not to be compared to the fairer sights of this world.\n\nAnd greater far is the superiority of the other.\n\nNow of that upper earth which is under the heaven, I can tell you a charming tale, Simmias, which is well worth hearing.\n\nAnd we, Socrates, replied Simmias, shall be charmed to listen.\n\nThe tale, my friend, he said, is as follows: In the first place, the earth, when looked at from above, is like one of those balls which have leather coverings in twelve pieces, and is of divers colors, of which the colors which painters use on earth are only a sample.\n\nBut there the whole earth is made up of them, and they are brighter far and clearer than ours; there is a purple of wonderful luster, also the radiance of gold, and the white which is in the earth is whiter than any chalk or snow.\n\nOf these and other colors the earth is made up, and they are more in number and fairer than the eye of man has ever seen; and the very hollows (of which I was speaking) filled with air and water are seen like light flashing amid the other colors, and have a color of their own, which gives a sort of unity to the variety of earth.\n\nAnd in this fair region everything that grows-trees, and flowers, and fruits-is in a like degree fairer than any here; and there are hills, and stones in them in a like degree smoother, and more transparent, and fairer in color than our highly valued emeralds and sardonyxes and jaspers, and other gems, which are but minute fragments of them: for there all the stones are like our precious stones, and fairer still.\n\nThe reason of this is that they are pure, and not, like our precious stones, infected or corroded by the corrupt briny elements which coagulate among us, and which breed foulness and disease both in earth and stones, as well as in animals and plants.\n\nThey are the jewels of the upper earth, which also shines with gold and silver and the like, and they are visible to sight and large and abundant and found in every region of the earth, and blessed is he who sees them."

