[content]
body = "They are temperate because they are intemperate-which may seem to be a contradiction, but is nevertheless the sort of thing which happens with this foolish temperance.\n\nFor there are pleasures which they must have, and are afraid of losing; and therefore they abstain from one class of pleasures because they are overcome by another: and whereas intemperance is defined as \"being under the dominion of pleasure,\" they overcome only because they are overcome by pleasure.\n\nAnd that is what I mean by saying that they are temperate through intemperance.\n\nThat appears to be true.\n\nYet the exchange of one fear or pleasure or pain for another fear or pleasure or pain, which are measured like coins, the greater with the less, is not the exchange of virtue.\n\nO my dear Simmias, is there not one true coin for which all things ought to exchange?-and that is wisdom; and only in exchange for this, and in company with this, is anything truly bought or sold, whether courage or temperance or justice.\n\nAnd is not all true virtue the companion of wisdom, no matter what fears or pleasures or other similar goods or evils may or may not attend her?\n\nBut the virtue which is made up of these goods, when they are severed from wisdom and exchanged with one another, is a shadow of virtue only, nor is there any freedom or health or truth in her; but in the true exchange there is a purging away of all these things, and temperance, and justice, and courage, and wisdom herself are a purgation of them.\n\nAnd I conceive that the founders of the mysteries had a real meaning and were not mere triflers when they intimated in a figure long ago that he who passes unsanctified and uninitiated into the world below will live in a slough, but that he who arrives there after initiation and purification will dwell with the gods.\n\nFor \"many,\" as they say in the mysteries, \"are the thyrsus bearers, but few are the mystics,\"-meaning, as I interpret the words, the true philosophers.\n\nIn the number of whom I have been seeking, according to my ability, to find a place during my whole life; whether I have sought in a right way or not, and whether I have succeeded or not, I shall truly know in a little while, if God will, when I myself arrive in the other world: that is my belief.\n\nAnd now, Simmias and Cebes, I have answered those who charge me with not grieving or repining at parting from you and my masters in this world; and I am right in not repining, for I believe that I shall find other masters and friends who are as good in the world below.\n\nBut all men cannot believe this, and I shall be glad if my words have any more success with you than with the judges of the Athenians.\n\nCebes answered: I agree, Socrates, in the greater part of what you say.\n\nBut in what relates to the soul, men are apt to be incredulous; they fear that when she leaves the body her place may be nowhere, and that on the very day of death she may be destroyed and perish-immediately on her release from the body, issuing forth like smoke or air and vanishing away into nothingness.\n\nFor if she could only hold together and be herself after she was released from the evils of the body, there would be good reason to hope, Socrates, that what you say is true.\n\nBut much persuasion and many arguments are required in order to prove that when the man is dead the soul yet exists, and has any force of intelligence.\n\nTrue, Cebes, said Socrates; and shall I suggest that we talk a little of the probabilities of these things?\n\nI am sure, said Cebes, that I should gready like to know your opinion about them."

