[content]
body = "Those again who have committed crimes, which, although great, are not unpardonable-who in a moment of anger, for example, have done violence to a father or mother, and have repented for the remainder of their lives, or who have taken the life of another under like extenuating circumstances-these are plunged into Tartarus, the pains of which they are compelled to undergo for a year, but at the end of the year the wave casts them forth-mere homicides by way of Cocytus, parricides and matricides by Pyriphlegethon-and they are borne to the Acherusian Lake, and there they lift up their voices and call upon the victims whom they have slain or wronged, to have pity on them, and to receive them, and to let them come out of the river into the lake.\n\nAnd if they prevail, then they come forth and cease from their troubles; but if not, they are carried back again into Tartarus and from thence into the rivers unceasingly, until they obtain mercy from those whom they have wronged: for that is the sentence inflicted upon them by their judges.\n\nThose also who are remarkable for having led holy lives are released from this earthly prison, and go to their pure home which is above, and dwell in the purer earth; and those who have duly purified themselves with philosophy live henceforth altogether without the body, in mansions fairer far than these, which may not be described, and of which the time would fail me to tell.\n\nWherefore, Simmias, seeing all these things, what ought not we to do in order to obtain virtue and wisdom in this life?\n\nFair is the prize, and the hope great.\n\nI do not mean to affirm that the description which I have given of the soul and her mansions is exactly true-a man of sense ought hardly to say that.\n\nBut I do say that, inasmuch as the soul is shown to be immortal, he may venture to think, not improperly or unworthily, that something of the kind is true.\n\nThe venture is a glorious one, and he ought to comfort himself with words like these, which is the reason why lengthen out the tale.\n\nWherefore, I say, let a man be of good cheer about his soul, who has cast away the pleasures and ornaments of the body as alien to him, and rather hurtful in their effects, and has followed after the pleasures of knowledge in this life; who has adorned the soul in her own proper jewels, which are temperance, and justice, and courage, and nobility, and truth-in these arrayed she is ready to go on her journey to the world below, when her time comes.\n\nYou, Simmias and Cebes, and all other men, will depart at some time or other.\n\nMe already, as the tragic poet would say, the voice of fate calls.\n\nSoon I must drink the poison; and I think that I had better repair to the bath first, in order that the women may not have the trouble of washing my body after I am dead.\n\nWhen he had done speaking, Crito said: And have you any commands for us, Socrates-anything to say about your children, or any other matter in which we can serve you?\n\nNothing particular, he said: only, as I have always told you, I would have you look to yourselves; that is a service which you may always be doing to me and mine as well as to yourselves.\n\nAnd you need not make professions; for if you take no thought for yourselves, and walk not according to the precepts which I have given you, not now for the first time, the warmth of your professions will be of no avail.\n\nWe will do our best, said Crito.\n\nBut in what way would you have us bury you?"

