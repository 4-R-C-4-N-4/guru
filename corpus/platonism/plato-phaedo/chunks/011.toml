[content]
body = "That is clear, he replied.\n\nThen the inference is, that our souls are in the world below?\n\nThat is true.\n\nAnd one of the two processes or generations is visible-for surely the act of dying is visible?\n\nSurely, he said.\n\nAnd may not the other be inferred as the complement of nature, who is not to be supposed to go on one leg only?\n\nAnd if not, a corresponding process of generation in death must also be assigned to her?\n\nCertainly, he replied.\n\nAnd what is that process?\n\nRevival.\n\nAnd revival, if there be such a thing, is the birth of the dead into the world of the living?\n\nQuite true.\n\nThen there is a new way in which we arrive at the inference that the living come from the dead, just as the dead come from the living; and if this is true, then the souls of the dead must be in some place out of which they come again.\n\nAnd this, as I think, has been satisfactorily proved.\n\nYes, Socrates, he said; all this seems to flow necessarily out of our previous admissions.\n\nAnd that these admissions are not unfair, Cebes, he said, may be shown, as I think, in this way: If generation were in a straight line only, and there were no compensation or circle in nature, no turn or return into one another, then you know that all things would at last have the same form and pass into the same state, and there would be no more generation of them.\n\nWhat do you mean?\n\nhe said.\n\nA simple thing enough, which I will illustrate by the case of sleep, he replied.\n\nYou know that if there were no compensation of sleeping and waking, the story of the sleeping Endymion would in the end have no meaning, because all other things would be asleep, too, and he would not be thought of.\n\nOr if there were composition only, and no division of substances, then the chaos of Anaxagoras would come again.\n\nAnd in like manner, my dear Cebes, if all things which partook of life were to die, and after they were dead remained in the form of death, and did not come to life again, all would at last die, and nothing would be alive-how could this be otherwise?\n\nFor if the living spring from any others who are not the dead, and they die, must not all things at last be swallowed up in death?\n\nThere is no escape from that, Socrates, said Cebes; and I think that what you say is entirely true.\n\nYes, he said, Cebes, I entirely think so, too; and we are not walking in a vain imagination; but I am confident in the belief that there truly is such a thing as living again, and that the living spring from the dead, and that the souls of the dead are in existence, and that the good souls have a better portion than the evil.\n\nCebes added: Your favorite doctrine, Socrates, that knowledge is simply recollection, if true, also necessarily implies a previous time in which we learned that which we now recollect.\n\nBut this would be impossible unless our soul was in some place before existing in the human form; here, then, is another argument of the soul's immortality.\n\nBut tell me, Cebes, said Simmias, interposing, what proofs are given of this doctrine of recollection?\n\nI am not very sure at this moment that I remember them.\n\nOne excellent proof, said Cebes, is afforded by questions.\n\nIf you put a question to a person in a right way, he will give a true answer of himself; but how could he do this unless there were knowledge and right reason already in him?\n\nAnd this is most clearly shown when he is taken to a diagram or to anything of that sort."

