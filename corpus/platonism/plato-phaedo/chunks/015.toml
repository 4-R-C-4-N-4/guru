[content]
body = "For admitting that she may be generated and created in some other place, and may have existed before entering the human body, why after having entered in and gone out again may she not herself be destroyed and come to an end?\n\nVery true, Simmias, said Cebes; that our soul existed before we were born was the first half of the argument, and this appears to have been proven; that the soul will exist after death as well as before birth is the other half of which the proof is still wanting, and has to be supplied.\n\nBut that proof, Simmias and Cebes, has been already given, said Socrates, if you put the two arguments together-I mean this and the former one, in which we admitted that everything living is born of the dead.\n\nFor if the soul existed before birth, and in coming to life and being born can be born only from death and dying, must she not after death continue to exist, since she has to be born again?\n\nsurely the proof which you desire has been already furnished.\n\nStill I suspect that you and Simmias would be glad to probe the argument further; like children, you are haunted with a fear that when the soul leaves the body, the wind may really blow her away and scatter her; especially if a man should happen to die in stormy weather and not when the sky is calm.\n\nCebes answered with a smile: Then, Socrates, you must argue us out of our fears-and yet, strictly speaking, they are not our fears, but there is a child within us to whom death is a sort of hobgoblin; him too we must persuade not to be afraid when he is alone with him in the dark.\n\nSocrates said: Let the voice of the charmer be applied daily until you have charmed him away.\n\nAnd where shall we find a good charmer of our fears, Socrates, when you are gone?\n\nHellas, he replied, is a large place, Cebes, and has many good men, and there are barbarous races not a few: seek for him among them all, far and wide, sparing neither pains nor money; for there is no better way of using your money.\n\nAnd you must not forget to seek for him among yourselves too; for he is nowhere more likely to be found.\n\nThe search, replied Cebes, shall certainly be made.\n\nAnd now, if you please, let us return to the point of the argument at which we digressed.\n\nBy all means, replied Socrates; what else should I please?\n\nVery good, he said.\n\nMust we not, said Socrates, ask ourselves some question of this sort?-What is that which, as we imagine, is liable to be scattered away, and about which we fear?\n\nand what again is that about which we have no fear?\n\nAnd then we may proceed to inquire whether that which suffers dispersion is or is not of the nature of soul-our hopes and fears as to our own souls will turn upon that.\n\nThat is true, he said.\n\nNow the compound or composite may be supposed to be naturally capable of being dissolved in like manner as of being compounded; but that which is uncompounded, and that only, must be, if anything is, indissoluble.\n\nYes; that is what I should imagine, said Cebes.\n\nAnd the uncompounded may be assumed to be the same and unchanging, where the compound is always changing and never the same?\n\nThat I also think, he said.\n\nThen now let us return to the previous discussion.\n\nIs that idea or essence, which in the dialectical process we define as essence of true existence-whether essence of equality, beauty, or anything else: are these essences, I say, liable at times to some degree of change?"

