[content]
body = "I thought that in going to the other world he could not be without a divine call, and that he would be happy, if any man ever was, when he arrived there, and therefore I did not pity him as might seem natural at such a time.\n\nBut neither could I feel the pleasure which I usually felt in philosophical discourse (for philosophy was the theme of which we spoke).\n\nI was pleased, and I was also pained, because I knew that he was soon to die, and this strange mixture of feeling was shared by us all; we were laughing and weeping by turns, especially the excitable Apollodorus-you know the sort of man?\n\nEch.\n\nYes.\n\nPhaed.\n\nHe was quite overcome; and I myself and all of us were greatly moved.\n\nEch.\n\nWho were present?\n\nPhaed.\n\nOf native Athenians there were, besides Apollodorus, Critobulus and his father Crito, Hermogenes, Epigenes, Aeschines, and Antisthenes; likewise Ctesippus of the deme of Paeania, Menexenus, and some others; but Plato, if I am not mistaken, was ill.\n\nEch.\n\nWere there any strangers?\n\nPhaed.\n\nYes, there were; Simmias the Theban, and Cebes, and Phaedondes; Euclid and Terpison, who came from Megara.\n\nEch.\n\nAnd was Aristippus there, and Cleombrotus?\n\nPhaed.\n\nNo, they were said to be in Aegina.\n\nEch.\n\nAnyone else?\n\nPhaed.\n\nI think that these were about all.\n\nEch.\n\nAnd what was the discourse of which you spoke?\n\nPhaed.\n\nI will begin at the beginning, and endeavor to repeat the entire conversation.\n\nYou must understand that we had been previously in the habit of assembling early in the morning at the court in which the trial was held, and which is not far from the prison.\n\nThere we remained talking with one another until the opening of the prison doors (for they were not opened very early), and then went in and generally passed the day with Socrates.\n\nOn the last morning the meeting was earlier than usual; this was owing to our having heard on the previous evening that the sacred ship had arrived from Delos, and therefore we agreed to meet very early at the accustomed place.\n\nOn our going to the prison, the jailer who answered the door, instead of admitting us, came out and bade us wait and he would call us.\n\n\"For the Eleven,\" he said, \"are now with Socrates; they are taking off his chains, and giving orders that he is to die to-day.\" He soon returned and said that we might come in.\n\nOn entering we found Socrates just released from chains, and Xanthippe, whom you know, sitting by him, and holding his child in her arms.\n\nWhen she saw us she uttered a cry and said, as women will: \"O Socrates, this is the last time that either you will converse with your friends, or they with you.\" Socrates turned to Crito and said: \"Crito, let someone take her home.\" Some of Crito's people accordingly led her away, crying out and beating herself.\n\nAnd when she was gone, Socrates, sitting up on the couch, began to bend and rub his leg, saying, as he rubbed: \"How singular is the thing called pleasure, and how curiously related to pain, which might be thought to be the opposite of it; for they never come to a man together, and yet he who pursues either of them is generally compelled to take the other."

