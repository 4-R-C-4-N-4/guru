[content]
body = "They are two, and yet they grow together out of one head or stem; and I cannot help thinking that if Aesop had noticed them, he would have made a fable about God trying to reconcile their strife, and when he could not, he fastened their heads together; and this is the reason why when one comes the other follows, as I find in my own case pleasure comes following after the pain in my leg, which was caused by the chain.\" Upon this Cebes said: I am very glad indeed, Socrates, that you mentioned the name of Aesop.\n\nFor that reminds me of a question which has been asked by others, and was asked of me only the day before yesterday by Evenus the poet, and as he will be sure to ask again, you may as well tell me what I should say to him, if you would like him to have an answer.\n\nHe wanted to know why you who never before wrote a line of poetry, now that you are in prison are putting Aesop into verse, and also composing that hymn in honor of Apollo.\n\nTell him, Cebes, he replied, that I had no idea of rivalling him or his poems; which is the truth, for I knew that I could not do that.\n\nBut I wanted to see whether I could purge away a scruple which I felt about certain dreams.\n\nIn the course of my life I have often had intimations in dreams \"that I should make music.\" The same dream came to me sometimes in one form, and sometimes in another, but always saying the same or nearly the same words: Make and cultivate music, said the dream.\n\nAnd hitherto I had imagined that this was only intended to exhort and encourage me in the study of philosophy, which has always been the pursuit of my life, and is the noblest and best of music.\n\nThe dream was bidding me to do what I was already doing, in the same way that the competitor in a race is bidden by the spectators to run when he is already running.\n\nBut I was not certain of this, as the dream might have meant music in the popular sense of the word, and being under sentence of death, and the festival giving me a respite, I thought that I should be safer if I satisfied the scruple, and, in obedience to the dream, composed a few verses before I departed.\n\nAnd first I made a hymn in honor of the god of the festival, and then considering that a poet, if he is really to be a poet or maker, should not only put words together but make stories, and as I have no invention, I took some fables of esop, which I had ready at hand and knew, and turned them into verse.\n\nTell Evenus this, and bid him be of good cheer; that I would have him come after me if he be a wise man, and not tarry; and that to-day I am likely to be going, for the Athenians say that I must.\n\nSimmias said: What a message for such a man!\n\nhaving been a frequent companion of his, I should say that, as far as I know him, he will never take your advice unless he is obliged.\n\nWhy, said Socrates,-is not Evenus a philosopher?\n\nI think that he is, said Simmias.\n\nThen he, or any man who has the spirit of philosophy, will be willing to die, though he will not take his own life, for that is held not to be right.\n\nHere he changed his position, and put his legs off the couch on to the ground, and during the rest of the conversation he remained sitting.\n\nWhy do you say, inquired Cebes, that a man ought not to take his own life, but that the philosopher will be ready to follow the dying?"

