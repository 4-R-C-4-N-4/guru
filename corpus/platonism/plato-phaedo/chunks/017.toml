[content]
body = "Then reflect, Cebes: is not the conclusion of the whole matter this?-that the soul is in the very likeness of the divine, and immortal, and intelligible, and uniform, and indissoluble, and unchangeable; and the body is in the very likeness of the human, and mortal, and unintelligible, and multiform, and dissoluble, and changeable.\n\nCan this, my dear Cebes, be denied?\n\nNo, indeed.\n\nBut if this is true, then is not the body liable to speedy dissolution?\n\nand is not the soul almost or altogether indissoluble?\n\nCertainly.\n\nAnd do you further observe, that after a man is dead, the body, which is the visible part of man, and has a visible framework, which is called a corpse, and which would naturally be dissolved and decomposed and dissipated, is not dissolved or decomposed at once, but may remain for a good while, if the constitution be sound at the time of death, and the season of the year favorable?\n\nFor the body when shrunk and embalmed, as is the custom in Egypt, may remain almost entire through infinite ages; and even in decay, still there are some portions, such as the bones and ligaments, which are practically indestructible.\n\nYou allow that?\n\nYes.\n\nAnd are we to suppose that the soul, which is invisible, in passing to the true Hades, which like her is invisible, and pure, and noble, and on her way to the good and wise God, whither, if God will, my soul is also soon to go-that the soul, I repeat, if this be her nature and origin, is blown away and perishes immediately on quitting the body as the many say?\n\nThat can never be, dear Simmias and Cebes.\n\nThe truth rather is that the soul which is pure at departing draws after her no bodily taint, having never voluntarily had connection with the body, which she is ever avoiding, herself gathered into herself (for such abstraction has been the study of her life).\n\nAnd what does this mean but that she has been a true disciple of philosophy and has practised how to die easily?\n\nAnd is not philosophy the practice of death?\n\nCertainly.\n\nThat soul, I say, herself invisible, departs to the invisible worldto the divine and immortal and rational: thither arriving, she lives in bliss and is released from the error and folly of men, their fears and wild passions and all other human ills, and forever dwells, as they say of the initiated, in company with the gods.\n\nIs not this true, Cebes?\n\nYes, said Cebes, beyond a doubt.\n\nBut the soul which has been polluted, and is impure at the time of her departure, and is the companion and servant of the body always, and is in love with and fascinated by the body and by the desires and pleasures of the body, until she is led to believe that the truth only exists in a bodily form, which a man may touch and see and taste and use for the purposes of his lusts-the soul, I mean, accustomed to hate and fear and avoid the intellectual principle, which to the bodily eye is dark and invisible, and can be attained only by philosophy-do you suppose that such a soul as this will depart pure and unalloyed?\n\nThat is impossible, he replied.\n\nShe is engrossed by the corporeal, which the continual association and constant care of the body have made natural to her.\n\nVery true."

