body = "PHAEDO by Plato 360 BC translated by Benjamin Jowett New York, C.\n\nScribner's Sons, [1871] PERSONS OF THE DIALOGUE PHAEDO, who is the narrator of the dialogue to ECHECRATES of Phlius SOCRATES APOLLODORUS SIMMIAS CEBES CRITO ATTENDANT OF THE PRISON PHAEDO SCENE: The Prison of Socrates PLACE OF THE NARRATION: Phlius Echecrates.\n\nWere you yourself, Phaedo, in the prison with Socrates on the day when he drank the poison?\n\nPhaedo.\n\nYes, Echecrates, I was.\n\nEch.\n\nI wish that you would tell me about his death.\n\nWhat did he say in his last hours?\n\nWe were informed that he died by taking poison, but no one knew anything more; for no Phliasian ever goes to Athens now, and a long time has elapsed since any Athenian found his way to Phlius, and therefore we had no clear account.\n\nPhaed.\n\nDid you not hear of the proceedings at the trial?\n\nEch.\n\nYes; someone told us about the trial, and we could not understand why, having been condemned, he was put to death, as appeared, not at the time, but long afterwards.\n\nWhat was the reason of this?\n\nPhaed.\n\nAn accident, Echecrates.\n\nThe reason was that the stern of the ship which the Athenians send to Delos happened to have been crowned on the day before he was tried.\n\nEch.\n\nWhat is this ship?\n\nPhaed.\n\nThis is the ship in which, as the Athenians say, Theseus went to Crete when he took with him the fourteen youths, and was the saviour of them and of himself.\n\nAnd they were said to have vowed to Apollo at the time, that if they were saved they would make an annual pilgrimage to Delos.\n\nNow this custom still continues, and the whole period of the voyage to and from Delos, beginning when the priest of Apollo crowns the stern of the ship, is a holy season, during which the city is not allowed to be polluted by public executions; and often, when the vessel is detained by adverse winds, there may be a very considerable delay.\n\nAs I was saying, the ship was crowned on the day before the trial, and this was the reason why Socrates lay in prison and was not put to death until long after he was condemned.\n\nEch.\n\nWhat was the manner of his death, Phaedo?\n\nWhat was said or done?\n\nAnd which of his friends had he with him?\n\nOr were they not allowed by the authorities to be present?\n\nAnd did he die alone?\n\nPhaed.\n\nNo; there were several of his friends with him.\n\nEch.\n\nIf you have nothing to do, I wish that you would tell me what passed, as exactly as you can.\n\nPhaed.\n\nI have nothing to do, and will try to gratify your wish.\n\nFor to me, too, there is no greater pleasure than to have Socrates brought to my recollection, whether I speak myself or hear another speak of him.\n\nEch.\n\nYou will have listeners who are of the same mind with you, and I hope that you will be as exact as you can.\n\nPhaed.\n\nI remember the strange feeling which came over me at being with him.\n\nFor I could hardly believe that I was present at the death of a friend, and therefore I did not pity him, Echecrates; his mien and his language were so noble and fearless in the hour of death that to me he appeared blessed."

