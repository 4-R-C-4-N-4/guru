[content]
body = "The reason why I say this is that I want you to agree with me in thinking, not only that absolute greatness will never be great and also small, but that greatness in us or in the concrete will never admit the small or admit of being exceeded: instead of this, one of two things will happen-either the greater will fly or retire before the opposite, which is the less, or at the advance of the less will cease to exist; but will not, if allowing or admitting smallness, be changed by that; even as I, having received and admitted smallness when compared with Simmias, remain just as I was, and am the same small person.\n\nAnd as the idea of greatness cannot condescend ever to be or become small, in like manner the smallness in us cannot be or become great; nor can any other opposite which remains the same ever be or become its own opposite, but either passes away or perishes in the change.\n\nThat, replied Cebes, is quite my notion.\n\nOne of the company, though I do not exactly remember which of them, on hearing this, said: By Heaven, is not this the direct contrary of what was admitted before-that out of the greater came the less and out of the less the greater, and that opposites are simply generated from opposites; whereas now this seems to be utterly denied.\n\nSocrates inclined his head to the speaker and listened.\n\nI like your courage, he said, in reminding us of this.\n\nBut you do not observe that there is a difference in the two cases.\n\nFor then we were speaking of opposites in the concrete, and now of the essential opposite which, as is affirmed, neither in us nor in nature can ever be at variance with itself: then, my friend, we were speaking of things in which opposites are inherent and which are called after them, but now about the opposites which are inherent in them and which give their name to them; these essential opposites will never, as we maintain, admit of generation into or out of one another.\n\nAt the same time, turning to Cebes, he said: Were you at all disconcerted, Cebes, at our friend's objection?\n\nThat was not my feeling, said Cebes; and yet I cannot deny that I am apt to be disconcerted.\n\nThen we are agreed after all, said Socrates, that the opposite will never in any case be opposed to itself?\n\nTo that we are quite agreed, he replied.\n\nYet once more let me ask you to consider the question from another point of view, and see whether you agree with me: There is a thing which you term heat, and another thing which you term cold?\n\nCertainly.\n\nBut are they the same as fire and snow?\n\nMost assuredly not.\n\nHeat is not the same as fire, nor is cold the same as snow?\n\nNo.\n\nAnd yet you will surely admit that when snow, as before said, is under the influence of heat, they will not remain snow and heat; but at the advance of the heat the snow will either retire or perish?\n\nVery true, he replied.\n\nAnd the fire too at the advance of the cold will either retire or perish; and when the fire is under the influence of the cold, they will not remain, as before, fire and cold.\n\nThat is true, he said.\n\nAnd in some cases the name of the idea is not confined to the idea; but anything else which, not being the idea, exists only in the form of the idea, may also lay claim to it.\n\nI will try to make this clearer by an example: The odd number is always called by the name of odd?\n\nVery true.\n\nBut is this the only thing which is called odd?"

