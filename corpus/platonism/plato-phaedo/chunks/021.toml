[content]
body = "For when I consider the matter either alone or with Cebes, the argument does certainly appear to me, Socrates, to be not sufficient.\n\nSocrates answered: I dare say, my friend, that you may be right, but I should like to know in what respect the argument is not sufficient.\n\nIn this respect, replied Simmias: Might not a person use the same argument about harmony and the lyre-might he not say that harmony is a thing invisible, incorporeal, fair, divine, abiding in the lyre which is harmonized, but that the lyre and the strings are matter and material, composite, earthy, and akin to mortality?\n\nAnd when someone breaks the lyre, or cuts and rends the strings, then he who takes this view would argue as you do, and on the same analogy, that the harmony survives and has not perished; for you cannot imagine, as we would say, that the lyre without the strings, and the broken strings themselves, remain, and yet that the harmony, which is of heavenly and immortal nature and kindred, has perished-and perished too before the mortal.\n\nThe harmony, he would say, certainly exists somewhere, and the wood and strings will decay before that decays.\n\nFor I suspect, Socrates, that the notion of the soul which we are all of us inclined to entertain, would also be yours, and that you too would conceive the body to be strung up, and held together, by the elements of hot and cold, wet and dry, and the like, and that the soul is the harmony or due proportionate admixture of them.\n\nAnd, if this is true, the inference clearly is that when the strings of the body are unduly loosened or overstrained through disorder or other injury, then the soul, though most divine, like other harmonies of music or of the works of art, of course perishes at once, although the material remains of the body may last for a considerable time, until they are either decayed or burnt.\n\nNow if anyone maintained that the soul, being the harmony of the elements of the body, first perishes in that which is called death, how shall we answer him?\n\nSocrates looked round at us as his manner was, and said, with a smile: Simmias has reason on his side; and why does not some one of you who is abler than myself answer him?\n\nfor there is force in his attack upon me.\n\nBut perhaps, before we answer him, we had better also hear what Cebes has to say against the argument-this will give us time for reflection, and when both of them have spoken, we may either assent to them if their words appear to be in consonance with the truth, or if not, we may take up the other side, and argue with them.\n\nPlease to tell me then, Cebes, he said, what was the difficulty which troubled you?\n\nCebes said: I will tell you.\n\nMy feeling is that the argument is still in the same position, and open to the same objections which were urged before; for I am ready to admit that the existence of the soul before entering into the bodily form has been very ingeniously, and, as I may be allowed to say, quite sufficiently proven; but the existence of the soul after death is still, in my judgment, unproven.\n\nNow my objection is not the same as that of Simmias; for I am not disposed to deny that the soul is stronger and more lasting than the body, being of opinion that in all such respects the soul very far excels the body.\n\nWell, then, says the argument to me, why do you remain unconvinced?\n\nWhen you see that the weaker is still in existence after the man is dead, will you not admit that the more lasting must also survive during the same period of time?"

