[content]
body = "Are there not other things which have their own name, and yet are called odd, because, although not the same as oddness, they are never without oddness?-that is what I mean to ask-whether numbers such as the number three are not of the class of odd.\n\nAnd there are many other examples: would you not say, for example, that three may be called by its proper name, and also be called odd, which is not the same with three?\n\nand this may be said not only of three but also of five, and every alternate number-each of them without being oddness is odd, and in the same way two and four, and the whole series of alternate numbers, has every number even, without being evenness.\n\nDo you admit that?\n\nYes, he said, how can I deny that?\n\nThen now mark the point at which I am aiming: not only do essential opposites exclude one another, but also concrete things, which, although not in themselves opposed, contain opposites; these, I say, also reject the idea which is opposed to that which is contained in them, and at the advance of that they either perish or withdraw.\n\nThere is the number three for example; will not that endure annihilation or anything sooner than be converted into an even number, remaining three?\n\nVery true, said Cebes.\n\nAnd yet, he said, the number two is certainly not opposed to the number three?\n\nIt is not.\n\nThen not only do opposite ideas repel the advance of one another, but also there are other things which repel the approach of opposites.\n\nThat is quite true, he said.\n\nSuppose, he said, that we endeavor, if possible, to determine what these are.\n\nBy all means.\n\nAre they not, Cebes, such as compel the things of which they have possession, not only to take their own form, but also the form of some opposite?\n\nWhat do you mean?\n\nI mean, as I was just now saying, and have no need to repeat to you, that those things which are possessed by the number three must not only be three in number, but must also be odd.\n\nQuite true.\n\nAnd on this oddness, of which the number three has the impress, the opposite idea will never intrude?\n\nNo.\n\nAnd this impress was given by the odd principle?\n\nYes.\n\nAnd to the odd is opposed the even?\n\nTrue.\n\nThen the idea of the even number will never arrive at three?\n\nNo.\n\nThen three has no part in the even?\n\nNone.\n\nThen the triad or number three is uneven?\n\nVery true.\n\nTo return then to my distinction of natures which are not opposites, and yet do not admit opposites: as, in this instance, three, although not opposed to the even, does not any the more admit of the even, but always brings the opposite into play on the other side; or as two does not receive the odd, or fire the cold-from these examples (and there are many more of them) perhaps you may be able to arrive at the general conclusion that not only opposites will not receive opposites, but also that nothing which brings the opposite will admit the opposite of that which it brings in that to which it is brought.\n\nAnd here let me recapitulate-for there is no harm in repetition.\n\nThe number five will not admit the nature of the even, any more than ten, which is the double of five, will admit the nature of the odd-the double, though not strictly opposed to the odd, rejects the odd altogether.\n\nNor again will parts in the ratio of 3:2, nor any fraction in which there is a half, nor again in which there is a third, admit the notion of the whole, although they are not opposed to the whole.\n\nYou will agree to that?\n\nYes, he said, I entirely agree and go along with you in that."

