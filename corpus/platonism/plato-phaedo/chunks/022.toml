[content]
body = "Now I, like Simmias, must employ a figure; and I shall ask you to consider whether the figure is to the point.\n\nThe parallel which I will suppose is that of an old weaver, who dies, and after his death somebody says: He is not dead, he must be alive; and he appeals to the coat which he himself wove and wore, and which is still whole and undecayed.\n\nAnd then he proceeds to ask of someone who is incredulous, whether a man lasts longer, or the coat which is in use and wear; and when he is answered that a man lasts far longer, thinks that he has thus certainly demonstrated the survival of the man, who is the more lasting, because the less lasting remains.\n\nBut that, Simmias, as I would beg you to observe, is not the truth; everyone sees that he who talks thus is talking nonsense.\n\nFor the truth is that this weaver, having worn and woven many such coats, though he outlived several of them, was himself outlived by the last; but this is surely very far from proving that a man is slighter and weaker than a coat.\n\nNow the relation of the body to the soul may be expressed in a similar figure; for you may say with reason that the soul is lasting, and the body weak and short-lived in comparison.\n\nAnd every soul may be said to wear out many bodies, especially in the course of a long life.\n\nFor if while the man is alive the body deliquesces and decays, and yet the soul always weaves her garment anew and repairs the waste, then of course, when the soul perishes, she must have on her last garment, and this only will survive her; but then again when the soul is dead the body will at last show its native weakness, and soon pass into decay.\n\nAnd therefore this is an argument on which I would rather not rely as proving that the soul exists after death.\n\nFor suppose that we grant even more than you affirm as within the range of possibility, and besides acknowledging that the soul existed before birth admit also that after death the souls of some are existing still, and will exist, and will be born and die again and again, and that there is a natural strength in the soul which will hold out and be born many times-for all this, we may be still inclined to think that she will weary in the labors of successive births, and may at last succumb in one of her deaths and utterly perish; and this death and dissolution of the body which brings destruction to the soul may be unknown to any of us, for no one of us can have had any experience of it: and if this be true, then I say that he who is confident in death has but a foolish confidence, unless he is able to prove that the soul is altogether immortal and imperishable.\n\nBut if he is not able to prove this, he who is about to die will always have reason to fear that when the body is disunited, the soul also may utterly perish.\n\nAll of us, as we afterwards remarked to one another, had an unpleasant feeling at hearing them say this.\n\nWhen we had been so firmly convinced before, now to have our faith shaken seemed to introduce a confusion and uncertainty, not only into the previous argument, but into any future one; either we were not good judges, or there were no real grounds of belief.\n\nEch.\n\nThere I feel with you-indeed I do, Phaedo, and when you were speaking, I was beginning to ask myself the same question: What argument can I ever trust again?\n\nFor what could be more convincing than the argument of Socrates, which has now fallen into discredit?\n\nThat the soul is a harmony is a doctrine which has always had a wonderful attraction for me, and, when mentioned, came back to me at once, as my own original conviction."

