[content]
body = "And yet from these equals, although differing from the idea of equality, you conceived and attained that idea?\n\nVery true, he said.\n\nWhich might be like, or might be unlike them?\n\nYes.\n\nBut that makes no difference; whenever from seeing one thing you conceived another, whether like or unlike, there must surely have been an act of recollection?\n\nVery true.\n\nBut what would you say of equal portions of wood and stone, or other material equals?\n\nand what is the impression produced by them?\n\nAre they equals in the same sense as absolute equality?\n\nor do they fall short of this in a measure?\n\nYes, he said, in a very great measure, too.\n\nAnd must we not allow that when I or anyone look at any object, and perceive that the object aims at being some other thing, but falls short of, and cannot attain to it-he who makes this observation must have had previous knowledge of that to which, as he says, the other, although similar, was inferior?\n\nCertainly.\n\nAnd has not this been our case in the matter of equals and of absolute equality?\n\nPrecisely.\n\nThen we must have known absolute equality previously to the time when we first saw the material equals, and reflected that all these apparent equals aim at this absolute equality, but fall short of it?\n\nThat is true.\n\nAnd we recognize also that this absolute equality has only been known, and can only be known, through the medium of sight or touch, or of some other sense.\n\nAnd this I would affirm of all such conceptions.\n\nYes, Socrates, as far as the argument is concerned, one of them is the same as the other.\n\nAnd from the senses, then, is derived the knowledge that all sensible things aim at an idea of equality of which they fall short-is not that true?\n\nYes.\n\nThen before we began to see or hear or perceive in any way, we must have had a knowledge of absolute equality, or we could not have referred to that the equals which are derived from the senses-for to that they all aspire, and of that they fall short?\n\nThat, Socrates, is certainly to be inferred from the previous statements.\n\nAnd did we not see and hear and acquire our other senses as soon as we were born?\n\nCertainly.\n\nThen we must have acquired the knowledge of the ideal equal at some time previous to this?\n\nYes.\n\nThat is to say, before we were born, I suppose?\n\nTrue.\n\nAnd if we acquired this knowledge before we were born, and were born having it, then we also knew before we were born and at the instant of birth not only equal or the greater or the less, but all other ideas; for we are not speaking only of equality absolute, but of beauty, goodness, justice, holiness, and all which we stamp with the name of essence in the dialectical process, when we ask and answer questions.\n\nOf all this we may certainly affirm that we acquired the knowledge before birth?\n\nThat is true.\n\nBut if, after having acquired, we have not forgotten that which we acquired, then we must always have been born with knowledge, and shall always continue to know as long as life lasts-for knowing is the acquiring and retaining knowledge and not forgetting.\n\nIs not forgetting, Simmias, just the losing of knowledge?\n\nQuite true, Socrates.\n\nBut if the knowledge which we acquired before birth was lost by us at birth, and afterwards by the use of the senses we recovered that which we previously knew, will not that which we call learning be a process of recovering our knowledge, and may not this be rightly termed recollection by us?\n\nVery true."

