[content]
body = "And I rather imagine that Cebes is referring to you; he thinks that you are too ready to leave us, and too ready to leave the gods who, as you acknowledge, are our good rulers.\n\nYes, replied Socrates; there is reason in that.\n\nAnd this indictment you think that I ought to answer as if I were in court?\n\nThat is what we should like, said Simmias.\n\nThen I must try to make a better impression upon you than I did when defending myself before the judges.\n\nFor I am quite ready to acknowledge, Simmias and Cebes, that I ought to be grieved at death, if I were not persuaded that I am going to other gods who are wise and good (of this I am as certain as I can be of anything of the sort) and to men departed (though I am not so certain of this), who are better than those whom I leave behind; and therefore I do not grieve as I might have done, for I have good hope that there is yet something remaining for the dead, and, as has been said of old, some far better thing for the good than for the evil.\n\nBut do you mean to take away your thoughts with you, Socrates?\n\nsaid Simmias.\n\nWill you not communicate them to us?-the benefit is one in which we too may hope to share.\n\nMoreover, if you succeed in convincing us, that will be an answer to the charge against yourself.\n\nI will do my best, replied Socrates.\n\nBut you must first let me hear what Crito wants; he was going to say something to me.\n\nOnly this, Socrates, replied Crito: the attendant who is to give you the poison has been telling me that you are not to talk much, and he wants me to let you know this; for that by talking heat is increased, and this interferes with the action of the poison; those who excite themselves are sometimes obliged to drink the poison two or three times.\n\nThen, said Socrates, let him mind his business and be prepared to give the poison two or three times, if necessary; that is all.\n\nI was almost certain that you would say that, replied Crito; but I was obliged to satisfy him.\n\nNever mind him, he said.\n\nAnd now I will make answer to you, O my judges, and show that he who has lived as a true philosopher has reason to be of good cheer when he is about to die, and that after death he may hope to receive the greatest good in the other world.\n\nAnd how this may be, Simmias and Cebes, I will endeavor to explain.\n\nFor I deem that the true disciple of philosophy is likely to be misunderstood by other men; they do not perceive that he is ever pursuing death and dying; and if this is true, why, having had the desire of death all his life long, should he repine at the arrival of that which he has been always pursuing and desiring?\n\nSimmias laughed and said: Though not in a laughing humor, I swear that I cannot help laughing when I think what the wicked world will say when they hear this.\n\nThey will say that this is very true, and our people at home will agree with them in saying that the life which philosophers desire is truly death, and that they have found them out to be deserving of the death which they desire.\n\nAnd they are right, Simmias, in saying this, with the exception of the words \"They have found them out\"; for they have not found out what is the nature of this death which the true philosopher desires, or how he deserves or desires death.\n\nBut let us leave them and have a word with ourselves: Do we believe that there is such a thing as death?\n\nTo be sure, replied Simmias.\n\nAnd is this anything but the separation of soul and body?"

