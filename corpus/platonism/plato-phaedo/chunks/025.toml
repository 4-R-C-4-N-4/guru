[content]
body = "And I would ask you to be thinking of the truth and not of Socrates: agree with me, if I seem to you to be speaking the truth; or if not, withstand me might and main, that I may not deceive you as well as myself in my enthusiasm, and, like the bee, leave my sting in you before I die.\n\nAnd now let us proceed, he said.\n\nAnd first of all let me be sure that I have in my mind what you were saying.\n\nSimmias, if I remember rightly, has fears and misgivings whether the soul, being in the form of harmony, although a fairer and diviner thing than the body, may not perish first.\n\nOn the other hand, Cebes appeared to grant that the soul was more lasting than the body, but he said that no one could know whether the soul, after having worn out many bodies, might not perish herself and leave her last body behind her; and that this is death, which is the destruction not of the body but of the soul, for in the body the work of destruction is ever going on.\n\nAre not these, Simmias and Cebes, the points which we have to consider?\n\nThey both agreed to this statement of them.\n\nHe proceeded: And did you deny the force of the whole preceding argument, or of a part only?\n\nOf a part only, they replied.\n\nAnd what did you think, he said, of that part of the argument in which we said that knowledge was recollection only, and inferred from this that the soul must have previously existed somewhere else before she was enclosed in the body?\n\nCebes said that he had been wonderfully impressed by that part of the argument, and that his conviction remained unshaken.\n\nSimmias agreed, and added that he himself could hardly imagine the possibility of his ever thinking differently about that.\n\nBut, rejoined Socrates, you will have to think differently, my Theban friend, if you still maintain that harmony is a compound, and that the soul is a harmony which is made out of strings set in the frame of the body; for you will surely never allow yourself to say that a harmony is prior to the elements which compose the harmony.\n\nNo, Socrates, that is impossible.\n\nBut do you not see that you are saying this when you say that the soul existed before she took the form and body of man, and was made up of elements which as yet had no existence?\n\nFor harmony is not a sort of thing like the soul, as you suppose; but first the lyre, and the strings, and the sounds exist in a state of discord, and then harmony is made last of all, and perishes first.\n\nAnd how can such a notion of the soul as this agree with the other?\n\nNot at all, replied Simmias.\n\nAnd yet, he said, there surely ought to be harmony when harmony is the theme of discourse.\n\nThere ought, replied Simmias.\n\nBut there is no harmony, he said, in the two propositions that knowledge is recollection, and that the soul is a harmony.\n\nWhich of them, then, will you retain?\n\nI think, he replied, that I have a much stronger faith, Socrates, in the first of the two, which has been fully demonstrated to me, than in the latter, which has not been demonstrated at all, but rests only on probable and plausible grounds; and I know too well that these arguments from probabilities are impostors, and unless great caution is observed in the use of them they are apt to be deceptive-in geometry, and in other things too.\n\nBut the doctrine of knowledge and recollection has been proven to me on trustworthy grounds; and the proof was that the soul must have existed before she came into the body, because to her belongs the essence of which the very name implies existence."

