[content]
body = "In any way that you like; only you must get hold of me, and take care that I do not walk away from you.\n\nThen he turned to us, and added with a smile: I cannot make Crito believe that I am the same Socrates who have been talking and conducting the argument; he fancies that I am the other Socrates whom he will soon see, a dead body-and he asks, How shall he bury me?\n\nAnd though I have spoken many words in the endeavor to show that when I have drunk the poison I shall leave you and go to the joys of the blessed-these words of mine, with which I comforted you and myself, have had, I perceive, no effect upon Crito.\n\nAnd therefore I want you to be surety for me now, as he was surety for me at the trial: but let the promise be of another sort; for he was my surety to the judges that I would remain, but you must be my surety to him that I shall not remain, but go away and depart; and then he will suffer less at my death, and not be grieved when he sees my body being burned or buried.\n\nI would not have him sorrow at my hard lot, or say at the burial, Thus we lay out Socrates, or, Thus we follow him to the grave or bury him; for false words are not only evil in themselves, but they infect the soul with evil.\n\nBe of good cheer, then, my dear Crito, and say that you are burying my body only, and do with that as is usual, and as you think best.\n\nWhen he had spoken these words, he arose and went into the bath chamber with Crito, who bade us wait; and we waited, talking and thinking of the subject of discourse, and also of the greatness of our sorrow; he was like a father of whom we were being bereaved, and we were about to pass the rest of our lives as orphans.\n\nWhen he had taken the bath his children were brought to him-(he had two young sons and an elder one); and the women of his family also came, and he talked to them and gave them a few directions in the presence of Crito; and he then dismissed them and returned to us.\n\nNow the hour of sunset was near, for a good deal of time had passed while he was within.\n\nWhen he came out, he sat down with us again after his bath, but not much was said.\n\nSoon the jailer, who was the servant of the Eleven, entered and stood by him, saying: To you, Socrates, whom I know to be the noblest and gentlest and best of all who ever came to this place, I will not impute the angry feelings of other men, who rage and swear at me when, in obedience to the authorities, I bid them drink the poison-indeed, I am sure that you will not be angry with me; for others, as you are aware, and not I, are the guilty cause.\n\nAnd so fare you well, and try to bear lightly what must needs be; you know my errand.\n\nThen bursting into tears he turned away and went out.\n\nSocrates looked at him and said: I return your good wishes, and will do as you bid.\n\nThen, turning to us, he said, How charming the man is: since I have been in prison he has always been coming to see me, and at times he would talk to me, and was as good as could be to me, and now see how generously he sorrows for me.\n\nBut we must do as he says, Crito; let the cup be brought, if the poison is prepared: if not, let the attendant prepare some."

