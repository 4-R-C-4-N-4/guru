[content]
body = "No other proof is needed, he said; for if the immortal, being eternal, is liable to perish, then nothing is imperishable.\n\nYes, replied Socrates, all men will agree that God, and the essential form of life, and the immortal in general, will never perish.\n\nYes, all men, he said-that is true; and what is more, gods, if I am not mistaken, as well as men.\n\nSeeing then that the immortal is indestructible, must not the soul, if she is immortal, be also imperishable?\n\nMost certainly.\n\nThen when death attacks a man, the mortal portion of him may be supposed to die, but the immortal goes out of the way of death and is preserved safe and sound?\n\nTrue.\n\nThen, Cebes, beyond question the soul is immortal and imperishable, and our souls will truly exist in another world!\n\nI am convinced, Socrates, said Cebes, and have nothing more to object; but if my friend Simmias, or anyone else, has any further objection, he had better speak out, and not keep silence, since I do not know how there can ever be a more fitting time to which he can defer the discussion, if there is anything which he wants to say or have said.\n\nBut I have nothing more to say, replied Simmias; nor do I see any room for uncertainty, except that which arises necessarily out of the greatness of the subject and the feebleness of man, and which I cannot help feeling.\n\nYes, Simmias, replied Socrates, that is well said: and more than that, first principles, even if they appear certain, should be carefully considered; and when they are satisfactorily ascertained, then, with a sort of hesitating confidence in human reason, you may, I think, follow the course of the argument; and if this is clear, there will be no need for any further inquiry.\n\nThat, he said, is true.\n\nBut then, O my friends, he said, if the soul is really immortal, what care should be taken of her, not only in respect of the portion of time which is called life, but of eternity!\n\nAnd the danger of neglecting her from this point of view does indeed appear to be awful.\n\nIf death had only been the end of all, the wicked would have had a good bargain in dying, for they would have been happily quit not only of their body, but of their own evil together with their souls.\n\nBut now, as the soul plainly appears to be immortal, there is no release or salvation from evil except the attainment of the highest virtue and wisdom.\n\nFor the soul when on her progress to the world below takes nothing with her but nurture and education; which are indeed said greatly to benefit or greatly to injure the departed, at the very beginning of its pilgrimage in the other world.\n\nFor after death, as they say, the genius of each individual, to whom he belonged in life, leads him to a certain place in which the dead are gathered together for judgment, whence they go into the world below, following the guide who is appointed to conduct them from this world to the other: and when they have there received their due and remained their time, another guide brings them back again after many revolutions of ages.\n\nNow this journey to the other world is not, as Aeschylus says in the \"Telephus,\" a single and straight path-no guide would be wanted for that, and no one could miss a single path; but there are many partings of the road, and windings, as I must infer from the rites and sacrifices which are offered to the gods below in places where three ways meet on earth."

