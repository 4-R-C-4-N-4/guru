[content]
body = "I dare say that the simile is not perfect-for I am very far from admitting that he who contemplates existence through the medium of ideas, sees them only \"through a glass darkly,\" any more than he who sees them in their working and effects.\n\nHowever, this was the method which I adopted: I first assumed some principle which I judged to be the strongest, and then I affirmed as true whatever seemed to agree with this, whether relating to the cause or to anything else; and that which disagreed I regarded as untrue.\n\nBut I should like to explain my meaning clearly, as I do not think that you understand me.\n\nNo, indeed, replied Cebes, not very well.\n\nThere is nothing new, he said, in what I am about to tell you; but only what I have been always and everywhere repeating in the previous discussion and on other occasions: I want to show you the nature of that cause which has occupied my thoughts, and I shall have to go back to those familiar words which are in the mouth of everyone, and first of all assume that there is an absolute beauty and goodness and greatness, and the like; grant me this, and I hope to be able to show you the nature of the cause, and to prove the immortality of the soul.\n\nCebes said: You may proceed at once with the proof, as I readily grant you this.\n\nWell, he said, then I should like to know whether you agree with me in the next step; for I cannot help thinking that if there be anything beautiful other than absolute beauty, that can only be beautiful in as far as it partakes of absolute beauty-and this I should say of everything.\n\nDo you agree in this notion of the cause?\n\nYes, he said, I agree.\n\nHe proceeded: I know nothing and can understand nothing of any other of those wise causes which are alleged; and if a person says to me that the bloom of color, or form, or anything else of that sort is a source of beauty, I leave all that, which is only confusing to me, and simply and singly, and perhaps foolishly, hold and am assured in my own mind that nothing makes a thing beautiful but the presence and participation of beauty in whatever way or manner obtained; for as to the manner I am uncertain, but I stoutly contend that by beauty all beautiful things become beautiful.\n\nThat appears to me to be the only safe answer that I can give, either to myself or to any other, and to that I cling, in the persuasion that I shall never be overthrown, and that I may safely answer to myself or any other that by beauty beautiful things become beautiful.\n\nDo you not agree to that?\n\nYes, I agree.\n\nAnd that by greatness only great things become great and greater greater, and by smallness the less becomes less.\n\nTrue.\n\nThen if a person remarks that A is taller by a head than B, and B less by a head than A, you would refuse to admit this, and would stoutly contend that what you mean is only that the greater is greater by, and by reason of, greatness, and the less is less only by, or by reason of, smallness; and thus you would avoid the danger of saying that the greater is greater and the less by the measure of the head, which is the same in both, and would also avoid the monstrous absurdity of supposing that the greater man is greater by reason of the head, which is small.\n\nWould you not be afraid of that?\n\nIndeed, I should, said Cebes, laughing.\n\nIn like manner you would be afraid to say that ten exceeded eight by, and by reason of, two; but would say by, and by reason of, number; or that two cubits exceed one cubit not by a half, but by magnitude?-that is what you would say, for there is the same danger in both cases."

