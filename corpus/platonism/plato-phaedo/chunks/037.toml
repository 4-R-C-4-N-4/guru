[content]
body = "The wise and orderly soul is conscious of her situation and follows in the path; but the soul which desires the body, and which, as I was relating before, has long been fluttering about the lifeless frame and the world of sight, is after many struggles and many sufferings hardly and with violence carried away by her attendant genius, and when she arrives at the place where the other souls are gathered, if she be impure and have done impure deeds, or been concerned in foul murders or other crimes which are the brothers of these, and the works of brothers in crime-from that soul everyone flees and turns away; no one will be her companion, no one her guide, but alone she wanders in extremity of evil until certain times are fulfilled, and when they are fulfilled, she is borne irresistibly to her own fitting habitation; as every pure and just soul which has passed through life in the company and under the guidance of the gods has also her own proper home.\n\nNow the earth has divers wonderful regions, and is indeed in nature and extent very unlike the notions of geographers, as I believe on the authority of one who shall be nameless.\n\nWhat do you mean, Socrates?\n\nsaid Simmias.\n\nI have myself heard many descriptions of the earth, but I do not know in what you are putting your faith, and I should like to know.\n\nWell, Simmias, replied Socrates, the recital of a tale does not, I think, require the art of Glaucus; and I know not that the art of Glaucus could prove the truth of my tale, which I myself should never be able to prove, and even if I could, I fear, Simmias, that my life would come to an end before the argument was completed.\n\nI may describe to you, however, the form and regions of the earth according to my conception of them.\n\nThat, said Simmias, will be enough.\n\nWell, then, he said, my conviction is that the earth is a round body in the center of the heavens, and therefore has no need of air or any similar force as a support, but is kept there and hindered from falling or inclining any way by the equability of the surrounding heaven and by her own equipoise.\n\nFor that which, being in equipoise, is in the center of that which is equably diffused, will not incline any way in any degree, but will always remain in the same state and not deviate.\n\nAnd this is my first notion.\n\nWhich is surely a correct one, said Simmias.\n\nAlso I believe that the earth is very vast, and that we who dwell in the region extending from the river Phasis to the Pillars of Heracles, along the borders of the sea, are just like ants or frogs about a marsh, and inhabit a small portion only, and that many others dwell in many like places.\n\nFor I should say that in all parts of the earth there are hollows of various forms and sizes, into which the water and the mist and the air collect; and that the true earth is pure and in the pure heaven, in which also are the stars-that is the heaven which is commonly spoken of as the ether, of which this is but the sediment collecting in the hollows of the earth."

