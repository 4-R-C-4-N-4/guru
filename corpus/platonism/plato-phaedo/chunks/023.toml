[content]
body = "And now I must begin again and find another argument which will assure me that when the man is dead the soul dies not with him.\n\nTell me, I beg, how did Socrates proceed?\n\nDid he appear to share the unpleasant feeling which you mention?\n\nor did he receive the interruption calmly and give a sufficient answer?\n\nTell us, as exactly as you can, what passed.\n\nPhaed.\n\nOften, Echecrates, as I have admired Socrates, I never admired him more than at that moment.\n\nThat he should be able to answer was nothing, but what astonished me was, first, the gentle and pleasant and approving manner in which he regarded the words of the young men, and then his quick sense of the wound which had been inflicted by the argument, and his ready application of the healing art.\n\nHe might be compared to a general rallying his defeated and broken army, urging them to follow him and return to the field of argument.\n\nEch.\n\nHow was that?\n\nPhaed.\n\nYou shall hear, for I was close to him on his right hand, seated on a sort of stool, and he on a couch which was a good deal higher.\n\nNow he had a way of playing with my hair, and then he smoothed my head, and pressed the hair upon my neck, and said: To-morrow, Phaedo, I suppose that these fair locks of yours will be severed.\n\nYes, Socrates, I suppose that they will, I replied.\n\nNot so if you will take my advice.\n\nWhat shall I do with them?\n\nI said.\n\nTo-day, he replied, and not to-morrow, if this argument dies and cannot be brought to life again by us, you and I will both shave our locks; and if I were you, and could not maintain my ground against Simmias and Cebes, I would myself take an oath, like the Argives, not to wear hair any more until I had renewed the conflict and defeated them.\n\nYes, I said, but Heracles himself is said not to be a match for two.\n\nSummon me then, he said, and I will be your Iolaus until the sun goes down.\n\nI summon you rather, I said, not as Heracles summoning Iolaus, but as Iolaus might summon Heracles.\n\nThat will be all the same, he said.\n\nBut first let us take care that we avoid a danger.\n\nAnd what is that?\n\nI said.\n\nThe danger of becoming misologists, he replied, which is one of the very worst things that can happen to us.\n\nFor as there are misanthropists or haters of men, there are also misologists or haters of ideas, and both spring from the same cause, which is ignorance of the world.\n\nMisanthropy arises from the too great confidence of inexperience; you trust a man and think him altogether true and good and faithful, and then in a little while he turns out to be false and knavish; and then another and another, and when this has happened several times to a man, especially within the circle of his most trusted friends, as he deems them, and he has often quarreled with them, he at last hates all men, and believes that no one has any good in him at all.\n\nI dare say that you must have observed this.\n\nYes, I said.\n\nAnd is not this discreditable?\n\nThe reason is that a man, having to deal with other men, has no knowledge of them; for if he had knowledge he would have known the true state of the case, that few are the good and few the evil, and that the great majority are in the interval between them.\n\nHow do you mean?\n\nI said."

