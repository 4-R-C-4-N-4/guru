[content]
body = "For example, when the body is hot and thirsty, does not the soul incline us against drinking?\n\nand when the body is hungry, against eating?\n\nAnd this is only one instance out of ten thousand of the opposition of the soul to the things of the body.\n\nVery true.\n\nBut we have already acknowledged that the soul, being a harmony, can never utter a note at variance with the tensions and relaxations and vibrations and other affections of the strings out of which she is composed; she can only follow, she cannot lead them?\n\nYes, he said, we acknowledged that, certainly.\n\nAnd yet do we not now discover the soul to be doing the exact opposite-leading the elements of which she is believed to be composed; almost always opposing and coercing them in all sorts of ways throughout life, sometimes more violently with the pains of medicine and gymnastic; then again more gently; threatening and also reprimanding the desires, passions, fears, as if talking to a thing which is not herself, as Homer in the \"Odyssey\" represents Odysseus doing in the words, \"He beat his breast, and thus reproached his heart: Endure, my heart; far worse hast thou endured!\" Do you think that Homer could have written this under the idea that the soul is a harmony capable of being led by the affections of the body, and not rather of a nature which leads and masters them; and herself a far diviner thing than any harmony?\n\nYes, Socrates, I quite agree to that.\n\nThen, my friend, we can never be right in saying that the soul is a harmony, for that would clearly contradict the divine Homer as well as ourselves.\n\nTrue, he said.\n\nThus much, said Socrates, of Harmonia, your Theban goddess, Cebes, who has not been ungracious to us, I think; but what shall I say to the Theban Cadmus, and how shall I propitiate him?\n\nI think that you will discover a way of propitiating him, said Cebes; I am sure that you have answered the argument about harmony in a manner that I could never have expected.\n\nFor when Simmias mentioned his objection, I quite imagined that no answer could be given to him, and therefore I was surprised at finding that his argument could not sustain the first onset of yours; and not impossibly the other, whom you call Cadmus, may share a similar fate.\n\nNay, my good friend, said Socrates, let us not boast, lest some evil eye should put to flight the word which I am about to speak.\n\nThat, however, may be left in the hands of those above, while I draw near in Homeric fashion, and try the mettle of your words.\n\nBriefly, the sum of your objection is as follows: You want to have proven to you that the soul is imperishable and immortal, and you think that the philosopher who is confident in death has but a vain and foolish confidence, if he thinks that he will fare better than one who has led another sort of life, in the world below, unless he can prove this; and you say that the demonstration of the strength and divinity of the soul, and of her existence prior to our becoming men, does not necessarily imply her immortality.\n\nGranting that the soul is longlived, and has known and done much in a former state, still she is not on that account immortal; and her entrance into the human form may be a sort of disease which is the beginning of dissolution, and may at last, after the toils of life are over, end in that which is called death.\n\nAnd whether the soul enters into the body once only or many times, that, as you would say, makes no difference in the fears of individuals."

