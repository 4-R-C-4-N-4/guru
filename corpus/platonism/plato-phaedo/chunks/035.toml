[content]
body = "And now, he said, I think that I may begin again; and to the question which I am about to ask I will beg you to give not the old safe answer, but another, of which I will offer you an example; and I hope that you will find in what has been just said another foundation which is as safe.\n\nI mean that if anyone asks you \"what that is, the inherence of which makes the body hot,\" you will reply not heat (this is what I call the safe and stupid answer), but fire, a far better answer, which we are now in a condition to give.\n\nOr if anyone asks you \"why a body is diseased,\" you will not say from disease, but from fever; and instead of saying that oddness is the cause of odd numbers, you will say that the monad is the cause of them: and so of things in general, as I dare say that you will understand sufficiently without my adducing any further examples.\n\nYes, he said, I quite understand you.\n\nTell me, then, what is that the inherence of which will render the body alive?\n\nThe soul, he replied.\n\nAnd is this always the case?\n\nYes, he said, of course.\n\nThen whatever the soul possesses, to that she comes bearing life?\n\nYes, certainly.\n\nAnd is there any opposite to life?\n\nThere is, he said.\n\nAnd what is that?\n\nDeath.\n\nThen the soul, as has been acknowledged, will never receive the opposite of what she brings.\n\nAnd now, he said, what did we call that principle which repels the even?\n\nThe odd.\n\nAnd that principle which repels the musical, or the just?\n\nThe unmusical, he said, and the unjust.\n\nAnd what do we call the principle which does not admit of death?\n\nThe immortal, he said.\n\nAnd does the soul admit of death?\n\nNo.\n\nThen the soul is immortal?\n\nYes, he said.\n\nAnd may we say that this is proven?\n\nYes, abundantly proven, Socrates, he replied.\n\nAnd supposing that the odd were imperishable, must not three be imperishable?\n\nOf course.\n\nAnd if that which is cold were imperishable, when the warm principle came attacking the snow, must not the snow have retired whole and unmelted-for it could never have perished, nor could it have remained and admitted the heat?\n\nTrue, he said.\n\nAgain, if the uncooling or warm principle were imperishable, the fire when assailed by cold would not have perished or have been extinguished, but would have gone away unaffected?\n\nCertainly, he said.\n\nAnd the same may be said of the immortal: if the immortal is also imperishable, the soul when attacked by death cannot perish; for the preceding argument shows that the soul will not admit of death, or ever be dead, any more than three or the odd number will admit of the even, or fire or the heat in the fire, of the cold.\n\nYet a person may say: \"But although the odd will not become even at the approach of the even, why may not the odd perish and the even take the place of the odd?\" Now to him who makes this objection, we cannot answer that the odd principle is imperishable; for this has not been acknowledged, but if this had been acknowledged, there would have been no difficulty in contending that at the approach of the even the odd principle and the number three took up their departure; and the same argument would have held good of fire and heat and any other thing.\n\nVery true.\n\nAnd the same may be said of the immortal: if the immortal is also imperishable, then the soul will be imperishable as well as immortal; but if not, some other proof of her imperishableness will have to be given."

