[content]
body = "When Socrates had done speaking, for a considerable time there was silence; he himself and most of us appeared to be meditating on what had been said; only Cebes and Simmias spoke a few words to one another.\n\nAnd Socrates observing this asked them what they thought of the argument, and whether there was anything wanting?\n\nFor, said he, much is still open to suspicion and attack, if anyone were disposed to sift the matter thoroughly.\n\nIf you are talking of something else I would rather not interrupt you, but if you are still doubtful about the argument do not hesitate to say exactly what you think, and let us have anything better which you can suggest; and if I am likely to be of any use, allow me to help you.\n\nSimmias said: I must confess, Socrates, that doubts did arise in our minds, and each of us was urging and inciting the other to put the question which he wanted to have answered and which neither of us liked to ask, fearing that our importunity might be troublesome under present circumstances.\n\nSocrates smiled and said: O Simmias, how strange that is; I am not very likely to persuade other men that I do not regard my present situation as a misfortune, if I am unable to persuade you, and you will keep fancying that I am at all more troubled now than at any other time.\n\nWill you not allow that I have as much of the spirit of prophecy in me as the swans?\n\nFor they, when they perceive that they must die, having sung all their life long, do then sing more than ever, rejoicing in the thought that they are about to go away to the god whose ministers they are.\n\nBut men, because they are themselves afraid of death, slanderously affirm of the swans that they sing a lament at the last, not considering that no bird sings when cold, or hungry, or in pain, not even the nightingale, nor the swallow, nor yet the hoopoe; which are said indeed to tune a lay of sorrow, although I do not believe this to be true of them any more than of the swans.\n\nBut because they are sacred to Apollo and have the gift of prophecy and anticipate the good things of another world, therefore they sing and rejoice in that day more than they ever did before.\n\nAnd I, too, believing myself to be the consecrated servant of the same God, and the fellow servant of the swans, and thinking that I have received from my master gifts of prophecy which are not inferior to theirs, would not go out of life less merrily than the swans.\n\nCease to mind then about this, but speak and ask anything which you like, while the eleven magistrates of Athens allow.\n\nWell, Socrates, said Simmias, then I will tell you my difficulty, and Cebes will tell you his.\n\nFor I dare say that you, Socrates, feel, as I do, how very hard or almost impossible is the attainment of any certainty about questions such as these in the present life.\n\nAnd yet I should deem him a coward who did not prove what is said about them to the uttermost, or whose heart failed him before he had examined them on every side.\n\nFor he should persevere until he has attained one of two things: either he should discover or learn the truth about them; or, if this is impossible, I would have him take the best and most irrefragable of human notions, and let this be the raft upon which he sails through life-not without risk, as I admit, if he cannot find some word of God which will more surely and safely carry him.\n\nAnd now, as you bid me, I will venture to question you, as I should not like to reproach myself hereafter with not having said at the time what I think."

