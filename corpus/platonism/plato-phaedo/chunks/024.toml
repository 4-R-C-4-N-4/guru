[content]
body = "I mean, he replied, as you might say of the very large and very small, that nothing is more uncommon than a very large or a very small man; and this applies generally to all extremes, whether of great and small, or swift and slow, or fair and foul, or black and white: and whether the instances you select be men or dogs or anything else, few are the extremes, but many are in the mean between them.\n\nDid you never observe this?\n\nYes, I said, I have.\n\nAnd do you not imagine, he said, that if there were a competition of evil, the first in evil would be found to be very few?\n\nYes, that is very likely, I said.\n\nYes, that is very likely, he replied; not that in this respect arguments are like men-there I was led on by you to say more than I had intended; but the point of comparison was that when a simple man who has no skill in dialectics believes an argument to be true which he afterwards imagines to be false, whether really false or not, and then another and another, he has no longer any faith left, and great disputers, as you know, come to think, at last that they have grown to be the wisest of mankind; for they alone perceive the utter unsoundness and instability of all arguments, or, indeed, of all things, which, like the currents in the Euripus, are going up and down in never-ceasing ebb and flow.\n\nThat is quite true, I said.\n\nYes, Phaedo, he replied, and very melancholy too, if there be such a thing as truth or certainty or power of knowing at all, that a man should have lighted upon some argument or other which at first seemed true and then turned out to be false, and instead of blaming himself and his own want of wit, because he is annoyed, should at last be too glad to transfer the blame from himself to arguments in general; and forever afterwards should hate and revile them, and lose the truth and knowledge of existence.\n\nYes, indeed, I said; that is very melancholy.\n\nLet us, then, in the first place, he said, be careful of admitting into our souls the notion that there is no truth or health or soundness in any arguments at all; but let us rather say that there is as yet no health in us, and that we must quit ourselves like men and do our best to gain health-you and all other men with a view to the whole of your future life, and I myself with a view to death.\n\nFor at this moment I am sensible that I have not the temper of a philosopher; like the vulgar, I am only a partisan.\n\nFor the partisan, when he is engaged in a dispute, cares nothing about the rights of the question, but is anxious only to convince his hearers of his own assertions.\n\nAnd the difference between him and me at the present moment is only this-that whereas he seeks to convince his hearers that what he says is true, I am rather seeking to convince myself; to convince my hearers is a secondary matter with me.\n\nAnd do but see how much I gain by this.\n\nFor if what I say is true, then I do well to be persuaded of the truth, but if there be nothing after death, still, during the short time that remains, I shall save my friends from lamentations, and my ignorance will not last, and therefore no harm will be done.\n\nThis is the state of mind, Simmias and Cebes, in which I approach the argument."

