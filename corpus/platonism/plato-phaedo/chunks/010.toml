[content]
body = "I reckon, said Socrates, that no one who heard me now, not even if he were one of my old enemies, the comic poets, could accuse me of idle talking about matters in which I have no concern.\n\nLet us, then, if you please, proceed with the inquiry.\n\nWhether the souls of men after death are or are not in the world below, is a question which may be argued in this manner: The ancient doctrine of which I have been speaking affirms that they go from this into the other world, and return hither, and are born from the dead.\n\nNow if this be true, and the living come from the dead, then our souls must be in the other world, for if not, how could they be born again?\n\nAnd this would be conclusive, if there were any real evidence that the living are only born from the dead; but if there is no evidence of this, then other arguments will have to be adduced.\n\nThat is very true, replied Cebes.\n\nThen let us consider this question, not in relation to man only, but in relation to animals generally, and to plants, and to everything of which there is generation, and the proof will be easier.\n\nAre not all things which have opposites generated out of their opposites?\n\nI mean such things as good and evil, just and unjust-and there are innumerable other opposites which are generated out of opposites.\n\nAnd I want to show that this holds universally of all opposites; I mean to say, for example, that anything which becomes greater must become greater after being less.\n\nTrue.\n\nAnd that which becomes less must have been once greater and then become less.\n\nYes.\n\nAnd the weaker is generated from the stronger, and the swifter from the slower.\n\nVery true.\n\nAnd the worse is from the better, and the more just is from the more unjust.\n\nOf course.\n\nAnd is this true of all opposites?\n\nand are we convinced that all of them are generated out of opposites?\n\nYes.\n\nAnd in this universal opposition of all things, are there not also two intermediate processes which are ever going on, from one to the other, and back again; where there is a greater and a less there is also an intermediate process of increase and diminution, and that which grows is said to wax, and that which decays to wane?\n\nYes, he said.\n\nAnd there are many other processes, such as division and composition, cooling and heating, which equally involve a passage into and out of one another.\n\nAnd this holds of all opposites, even though not always expressed in words-they are generated out of one another, and there is a passing or process from one to the other of them?\n\nVery true, he replied.\n\nWell, and is there not an opposite of life, as sleep is the opposite of waking?\n\nTrue, he said.\n\nAnd what is that?\n\nDeath, he answered.\n\nAnd these, then, are generated, if they are opposites, the one from the other, and have there their two intermediate processes also?\n\nOf course.\n\nNow, said Socrates, I will analyze one of the two pairs of opposites which I have mentioned to you, and also its intermediate processes, and you shall analyze the other to me.\n\nThe state of sleep is opposed to the state of waking, and out of sleeping waking is generated, and out of waking, sleeping, and the process of generation is in the one case falling asleep, and in the other waking up.\n\nAre you agreed about that?\n\nQuite agreed.\n\nThen suppose that you analyze life and death to me in the same manner.\n\nIs not death opposed to life?\n\nYes.\n\nAnd they are generated one from the other?\n\nYes.\n\nWhat is generated from life?\n\nDeath.\n\nAnd what from death?\n\nI can only say in answer-life.\n\nThen the living, whether things or persons, Cebes, are generated from the dead?"

