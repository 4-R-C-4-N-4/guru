[content]
body = "Yet, said Crito, the sun is still upon the hilltops, and many a one has taken the draught late, and after the announcement has been made to him, he has eaten and drunk, and indulged in sensual delights; do not hasten then, there is still time.\n\nSocrates said: Yes, Crito, and they of whom you speak are right in doing thus, for they think that they will gain by the delay; but I am right in not doing thus, for I do not think that I should gain anything by drinking the poison a little later; I should be sparing and saving a life which is already gone: I could only laugh at myself for this.\n\nPlease then to do as I say, and not to refuse me.\n\nCrito, when he heard this, made a sign to the servant, and the servant went in, and remained for some time, and then returned with the jailer carrying a cup of poison.\n\nSocrates said: You, my good friend, who are experienced in these matters, shall give me directions how I am to proceed.\n\nThe man answered: You have only to walk about until your legs are heavy, and then to lie down, and the poison will act.\n\nAt the same time he handed the cup to Socrates, who in the easiest and gentlest manner, without the least fear or change of color or feature, looking at the man with all his eyes, Echecrates, as his manner was, took the cup and said: What do you say about making a libation out of this cup to any god?\n\nMay I, or not?\n\nThe man answered: We only prepare, Socrates, just so much as we deem enough.\n\nI understand, he said: yet I may and must pray to the gods to prosper my journey from this to that other world-may this, then, which is my prayer, be granted to me.\n\nThen holding the cup to his lips, quite readily and cheerfully he drank off the poison.\n\nAnd hitherto most of us had been able to control our sorrow; but now when we saw him drinking, and saw too that he had finished the draught, we could no longer forbear, and in spite of myself my own tears were flowing fast; so that I covered my face and wept over myself, for certainly I was not weeping over him, but at the thought of my own calamity in having lost such a companion.\n\nNor was I the first, for Crito, when he found himself unable to restrain his tears, had got up and moved away, and I followed; and at that moment.\n\nApollodorus, who had been weeping all the time, broke out in a loud cry which made cowards of us all.\n\nSocrates alone retained his calmness: What is this strange outcry?\n\nhe said.\n\nI sent away the women mainly in order that they might not offend in this way, for I have heard that a man should die in peace.\n\nBe quiet, then, and have patience.\n\nWhen we heard that, we were ashamed, and refrained our tears; and he walked about until, as he said, his legs began to fail, and then he lay on his back, according to the directions, and the man who gave him the poison now and then looked at his feet and legs; and after a while he pressed his foot hard and asked him if he could feel; and he said, no; and then his leg, and so upwards and upwards, and showed us that he was cold and stiff.\n\nAnd he felt them himself, and said: When the poison reaches the heart, that will be the end."

