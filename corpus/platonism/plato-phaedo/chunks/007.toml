[content]
body = "And he attains to the knowledge of them in their highest purity who goes to each of them with the mind alone, not allowing when in the act of thought the intrusion or introduction of sight or any other sense in the company of reason, but with the very light of the mind in her clearness penetrates into the very fight of truth in each; he has got rid, as far as he can, of eyes and ears and of the whole body, which he conceives of only as a disturbing element, hindering the soul from the acquisition of knowledge when in company with her-is not this the sort of man who, if ever man did, is likely to attain the knowledge of existence?\n\nThere is admirable truth in that, Socrates, replied Simmias.\n\nAnd when they consider all this, must not true philosophers make a reflection, of which they will speak to one another in such words as these: We have found, they will say, a path of speculation which seems to bring us and the argument to the conclusion that while we are in the body, and while the soul is mingled with this mass of evil, our desire will not be satisfied, and our desire is of the truth.\n\nFor the body is a source of endless trouble to us by reason of the mere requirement of food; and also is liable to diseases which overtake and impede us in the search after truth: and by filling us so full of loves, and lusts, and fears, and fancies, and idols, and every sort of folly, prevents our ever having, as people say, so much as a thought.\n\nFor whence come wars, and fightings, and factions?\n\nwhence but from the body and the lusts of the body?\n\nFor wars are occasioned by the love of money, and money has to be acquired for the sake and in the service of the body; and in consequence of all these things the time which ought to be given to philosophy is lost.\n\nMoreover, if there is time and an inclination toward philosophy, yet the body introduces a turmoil and confusion and fear into the course of speculation, and hinders us from seeing the truth: and all experience shows that if we would have pure knowledge of anything we must be quit of the body, and the soul in herself must behold all things in themselves: then I suppose that we shall attain that which we desire, and of which we say that we are lovers, and that is wisdom, not while we live, but after death, as the argument shows; for if while in company with the body the soul cannot have pure knowledge, one of two things seems to follow-either knowledge is not to be attained at all, or, if at all, after death.\n\nFor then, and not till then, the soul will be in herself alone and without the body.\n\nIn this present life, I reckon that we make the nearest approach to knowledge when we have the least possible concern or interest in the body, and are not saturated with the bodily nature, but remain pure until the hour when God himself is pleased to release us.\n\nAnd then the foolishness of the body will be cleared away and we shall be pure and hold converse with other pure souls, and know of ourselves the clear light everywhere; and this is surely the light of truth.\n\nFor no impure thing is allowed to approach the pure.\n\nThese are the sort of words, Simmias, which the true lovers of wisdom cannot help saying to one another, and thinking.\n\nYou will agree with me in that?\n\nCertainly, Socrates.\n\nBut if this is true, O my friend, then there is great hope that, going whither I go, I shall there be satisfied with that which has been the chief concern of you and me in our past lives."

