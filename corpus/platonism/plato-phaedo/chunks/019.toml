[content]
body = "The lovers of knowledge are conscious that their souls, when philosophy receives them, are simply fastened and glued to their bodies: the soul is only able to view existence through the bars of a prison, and not in her own nature; she is wallowing in the mire of all ignorance; and philosophy, seeing the terrible nature of her confinement, and that the captive through desire is led to conspire in her own captivity (for the lovers of knowledge are aware that this was the original state of the soul, and that when she was in this state philosophy received and gently counseled her, and wanted to release her, pointing out to her that the eye is full of deceit, and also the ear and other senses, and persuading her to retire from them in all but the necessary use of them and to be gathered up and collected into herself, and to trust only to herself and her own intuitions of absolute existence, and mistrust that which comes to her through others and is subject to vicissitude)-philosophy shows her that this is visible and tangible, but that what she sees in her own nature is intellectual and invisible.\n\nAnd the soul of the true philosopher thinks that she ought not to resist this deliverance, and therefore abstains from pleasures and desires and pains and fears, as far as she is able; reflecting that when a man has great joys or sorrows or fears or desires he suffers from them, not the sort of evil which might be anticipated-as, for example, the loss of his health or property, which he has sacrificed to his lusts-but he has suffered an evil greater far, which is the greatest and worst of all evils, and one of which he never thinks.\n\nAnd what is that, Socrates?\n\nsaid Cebes.\n\nWhy, this: When the feeling of pleasure or pain in the soul is most intense, all of us naturally suppose that the object of this intense feeling is then plainest and truest: but this is not the case.\n\nVery true.\n\nAnd this is the state in which the soul is most enthralled by the body.\n\nHow is that?\n\nWhy, because each pleasure and pain is a sort of nail which nails and rivets the soul to the body, and engrosses her and makes her believe that to be true which the body affirms to be true; and from agreeing with the body and having the same delights she is obliged to have the same habits and ways, and is not likely ever to be pure at her departure to the world below, but is always saturated with the body; so that she soon sinks into another body and there germinates and grows, and has therefore no part in the communion of the divine and pure and simple.\n\nThat is most true, Socrates, answered Cebes.\n\nAnd this, Cebes, is the reason why the true lovers of knowledge are temperate and brave; and not for the reason which the world gives.\n\nCertainly not.\n\nCertainly not!\n\nFor not in that way does the soul of a philosopher reason; she will not ask philosophy to release her in order that when released she may deliver herself up again to the thraldom of pleasures and pains, doing a work only to be undone again, weaving instead of unweaving her Penelope's web.\n\nBut she will make herself a calm of passion and follow Reason, and dwell in her, beholding the true and divine (which is not matter of opinion), and thence derive nourishment.\n\nThus she seeks to live while she lives, and after death she hopes to go to her own kindred and to be freed from human ills.\n\nNever fear, Simmias and Cebes, that a soul which has been thus nurtured and has had these pursuits, will at her departure from the body be scattered and blown away by the winds and be nowhere and nothing."

