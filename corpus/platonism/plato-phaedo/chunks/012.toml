[content]
body = "But if, said Socrates, you are still incredulous, Simmias, I would ask you whether you may not agree with me when you look at the matter in another way; I mean, if you are still incredulous as to whether knowledge is recollection.\n\nIncredulous, I am not, said Simmias; but I want to have this doctrine of recollection brought to my own recollection, and, from what Cebes has said, I am beginning to recollect and be convinced; but I should still like to hear what more you have to say.\n\nThis is what I would say, he replied: We should agree, if I am not mistaken, that what a man recollects he must have known at some previous time.\n\nVery true.\n\nAnd what is the nature of this recollection?\n\nAnd, in asking this, I mean to ask whether, when a person has already seen or heard or in any way perceived anything, and he knows not only that, but something else of which he has not the same, but another knowledge, we may not fairly say that he recollects that which comes into his mind.\n\nAre we agreed about that?\n\nWhat do you mean?\n\nI mean what I may illustrate by the following instance: The knowledge of a lyre is not the same as the knowledge of a man?\n\nTrue.\n\nAnd yet what is the feeling of lovers when they recognize a lyre, or a garment, or anything else which the beloved has been in the habit of using?\n\nDo not they, from knowing the lyre, form in the mind's eye an image of the youth to whom the lyre belongs?\n\nAnd this is recollection: and in the same way anyone who sees Simmias may remember Cebes; and there are endless other things of the same nature.\n\nYes, indeed, there are-endless, replied Simmias.\n\nAnd this sort of thing, he said, is recollection, and is most commonly a process of recovering that which has been forgotten through time and inattention.\n\nVery true, he said.\n\nWell; and may you not also from seeing the picture of a horse or a lyre remember a man?\n\nand from the picture of Simmias, you may be led to remember Cebes?\n\nTrue.\n\nOr you may also be led to the recollection of Simmias himself?\n\nTrue, he said.\n\nAnd in all these cases, the recollection may be derived from things either like or unlike?\n\nThat is true.\n\nAnd when the recollection is derived from like things, then there is sure to be another question, which is, whether the likeness of that which is recollected is in any way defective or not.\n\nVery true, he said.\n\nAnd shall we proceed a step further, and affirm that there is such a thing as equality, not of wood with wood, or of stone with stone, but that, over and above this, there is equality in the abstract?\n\nShall we affirm this?\n\nAffirm, yes, and swear to it, replied Simmias, with all the confidence in life.\n\nAnd do we know the nature of this abstract essence?\n\nTo be sure, he said.\n\nAnd whence did we obtain this knowledge?\n\nDid we not see equalities of material things, such as pieces of wood and stones, and gather from them the idea of an equality which is different from them?-you will admit that?\n\nOr look at the matter again in this way: Do not the same pieces of wood or stone appear at one time equal, and at another time unequal?\n\nThat is certain.\n\nBut are real equals ever unequal?\n\nor is the idea of equality ever inequality?\n\nThat surely was never yet known, Socrates.\n\nThen these (so-called) equals are not the same with the idea of equality?\n\nI should say, clearly not, Socrates."

