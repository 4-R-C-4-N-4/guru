[content]
body = "For this is clear, that when we perceived something, either by the help of sight or hearing, or some other sense, there was no difficulty in receiving from this a conception of some other thing like or unlike which had been forgotten and which was associated with this; and therefore, as I was saying, one of two alternatives follows: either we had this knowledge at birth, and continued to know through life; or, after birth, those who are said to learn only remember, and learning is recollection only.\n\nYes, that is quite true, Socrates.\n\nAnd which alternative, Simmias, do you prefer?\n\nHad we the knowledge at our birth, or did we remember afterwards the things which we knew previously to our birth?\n\nI cannot decide at the moment.\n\nAt any rate you can decide whether he who has knowledge ought or ought not to be able to give a reason for what he knows.\n\nCertainly, he ought.\n\nBut do you think that every man is able to give a reason about these very matters of which we are speaking?\n\nI wish that they could, Socrates, but I greatly fear that to-morrow at this time there will be no one able to give a reason worth having.\n\nThen you are not of opinion, Simmias, that all men know these things?\n\nCertainly not.\n\nThen they are in process of recollecting that which they learned before.\n\nCertainly.\n\nBut when did our souls acquire this knowledge?-not since we were born as men?\n\nCertainly not.\n\nAnd therefore previously?\n\nYes.\n\nThen, Simmias, our souls must have existed before they were in the form of man-without bodies, and must have had intelligence.\n\nUnless indeed you suppose, Socrates, that these notions were given us at the moment of birth; for this is the only time that remains.\n\nYes, my friend, but when did we lose them?\n\nfor they are not in us when we are born-that is admitted.\n\nDid we lose them at the moment of receiving them, or at some other time?\n\nNo, Socrates, I perceive that I was unconsciously talking nonsense.\n\nThen may we not say, Simmias, that if, as we are always repeating, there is an absolute beauty, and goodness, and essence in general, and to this, which is now discovered to be a previous condition of our being, we refer all our sensations, and with this compare them-assuming this to have a prior existence, then our souls must have had a prior existence, but if not, there would be no force in the argument?\n\nThere can be no doubt that if these absolute ideas existed before we were born, then our souls must have existed before we were born, and if not the ideas, then not the souls.\n\nYes, Socrates; I am convinced that there is precisely the same necessity for the existence of the soul before birth, and of the essence of which you are speaking: and the argument arrives at a result which happily agrees with my own notion.\n\nFor there is nothing which to my mind is so evident as that beauty, goodness, and other notions of which you were just now speaking have a most real and absolute existence; and I am satisfied with the proof.\n\nWell, but is Cebes equally satisfied?\n\nfor I must convince him too.\n\nI think, said Simmias, that Cebes is satisfied: although he is the most incredulous of mortals, yet I believe that he is convinced of the existence of the soul before birth.\n\nBut that after death the soul will continue to exist is not yet proven even to my own satisfaction.\n\nI cannot get rid of the feeling of the many to which Cebes was referring-the feeling that when the man dies the soul may be scattered, and that this may be the end of her."

