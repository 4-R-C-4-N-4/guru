[content]
body = "And being dead is the attainment of this separation; when the soul exists in herself, and is parted from the body and the body is parted from the soul-that is death?\n\nExactly: that and nothing else, he replied.\n\nAnd what do you say of another question, my friend, about which I should like to have your opinion, and the answer to which will probably throw light on our present inquiry: Do you think that the philosopher ought to care about the pleasures-if they are to be called pleasures-of eating and drinking?\n\nCertainly not, answered Simmias.\n\nAnd what do you say of the pleasures of love-should he care about them?\n\nBy no means.\n\nAnd will he think much of the other ways of indulging the body-for example, the acquisition of costly raiment, or sandals, or other adornments of the body?\n\nInstead of caring about them, does he not rather despise anything more than nature needs?\n\nWhat do you say?\n\nI should say the true philosopher would despise them.\n\nWould you not say that he is entirely concerned with the soul and not with the body?\n\nHe would like, as far as he can, to be quit of the body and turn to the soul.\n\nThat is true.\n\nIn matters of this sort philosophers, above all other men, may be observed in every sort of way to dissever the soul from the body.\n\nThat is true.\n\nWhereas, Simmias, the rest of the world are of opinion that a life which has no bodily pleasures and no part in them is not worth having; but that he who thinks nothing of bodily pleasures is almost as though he were dead.\n\nThat is quite true.\n\nWhat again shall we say of the actual acquirement of knowledge?-is the body, if invited to share in the inquiry, a hinderer or a helper?\n\nI mean to say, have sight and hearing any truth in them?\n\nAre they not, as the poets are always telling us, inaccurate witnesses?\n\nand yet, if even they are inaccurate and indistinct, what is to be said of the other senses?-for you will allow that they are the best of them?\n\nCertainly, he replied.\n\nThen when does the soul attain truth?-for in attempting to consider anything in company with the body she is obviously deceived.\n\nYes, that is true.\n\nThen must not existence be revealed to her in thought, if at all?\n\nYes.\n\nAnd thought is best when the mind is gathered into herself and none of these things trouble her-neither sounds nor sights nor pain nor any pleasure-when she has as little as possible to do with the body, and has no bodily sense or feeling, but is aspiring after being?\n\nThat is true.\n\nAnd in this the philosopher dishonors the body; his soul runs away from the body and desires to be alone and by herself?\n\nThat is true.\n\nWell, but there is another thing, Simmias: Is there or is there not an absolute justice?\n\nAssuredly there is.\n\nAnd an absolute beauty and absolute good?\n\nOf course.\n\nBut did you ever behold any of them with your eyes?\n\nCertainly not.\n\nOr did you ever reach them with any other bodily sense?\n\n(and I speak not of these alone, but of absolute greatness, and health, and strength, and of the essence or true nature of everything).\n\nHas the reality of them ever been perceived by you through the bodily organs?\n\nor rather, is not the nearest approach to the knowledge of their several natures made by him who so orders his intellectual vision as to have the most exact conception of the essence of that which he considers?\n\nCertainly."

