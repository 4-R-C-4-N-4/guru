[content]
body = "And this, my friend, may be conceived to be that heavy, weighty, earthy element of sight by which such a soul is depressed and dragged down again into the visible world, because she is afraid of the invisible and of the world below-prowling about tombs and sepulchres, in the neighborhood of which, as they tell us, are seen certain ghostly apparitions of souls which have not departed pure, but are cloyed with sight and therefore visible.\n\nThat is very likely, Socrates.\n\nYes, that is very likely, Cebes; and these must be the souls, not of the good, but of the evil, who are compelled to wander about such places in payment of the penalty of their former evil way of life; and they continue to wander until the desire which haunts them is satisfied and they are imprisoned in another body.\n\nAnd they may be supposed to be fixed in the same natures which they had in their former life.\n\nWhat natures do you mean, Socrates?\n\nI mean to say that men who have followed after gluttony, and wantonness, and drunkenness, and have had no thought of avoiding them, would pass into asses and animals of that sort.\n\nWhat do you think?\n\nI think that exceedingly probable.\n\nAnd those who have chosen the portion of injustice, and tyranny, and violence, will pass into wolves, or into hawks and kites; whither else can we suppose them to go?\n\nYes, said Cebes; that is doubtless the place of natures such as theirs.\n\nAnd there is no difficulty, he said, in assigning to all of them places answering to their several natures and propensities?\n\nThere is not, he said.\n\nEven among them some are happier than others; and the happiest both in themselves and their place of abode are those who have practised the civil and social virtues which are called temperance and justice, and are acquired by habit and attention without philosophy and mind.\n\nWhy are they the happiest?\n\nBecause they may be expected to pass into some gentle, social nature which is like their own, such as that of bees or ants, or even back again into the form of man, and just and moderate men spring from them.\n\nThat is not impossible.\n\nBut he who is a philosopher or lover of learning, and is entirely pure at departing, is alone permitted to reach the gods.\n\nAnd this is the reason, Simmias and Cebes, why the true votaries of philosophy abstain from all fleshly lusts, and endure and refuse to give themselves up to them-not because they fear poverty or the ruin of their families, like the lovers of money, and the world in general; nor like the lovers of power and honor, because they dread the dishonor or disgrace of evil deeds.\n\nNo, Socrates, that would not become them, said Cebes.\n\nNo, indeed, he replied; and therefore they who have a care of their souls, and do not merely live in the fashions of the body, say farewell to all this; they will not walk in the ways of the blind: and when philosophy offers them purification and release from evil, they feel that they ought not to resist her influence, and to her they incline, and whither she leads they follow her.\n\nWhat do you mean, Socrates?\n\nI will tell you, he said."

