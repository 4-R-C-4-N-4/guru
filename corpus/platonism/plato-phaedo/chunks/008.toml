[content]
body = "And now that the hour of departure is appointed to me, this is the hope with which I depart, and not I only, but every man who believes that he has his mind purified.\n\nCertainly, replied Simmias.\n\nAnd what is purification but the separation of the soul from the body, as I was saying before; the habit of the soul gathering and collecting herself into herself, out of all the courses of the body; the dwelling in her own place alone, as in another life, so also in this, as far as she can; the release of the soul from the chains of the body?\n\nVery true, he said.\n\nAnd what is that which is termed death, but this very separation and release of the soul from the body?\n\nTo be sure, he said.\n\nAnd the true philosophers, and they only, study and are eager to release the soul.\n\nIs not the separation and release of the soul from the body their especial study?\n\nThat is true.\n\nAnd as I was saying at first, there would be a ridiculous contradiction in men studying to live as nearly as they can in a state of death, and yet repining when death comes.\n\nCertainly.\n\nThen, Simmias, as the true philosophers are ever studying death, to them, of all men, death is the least terrible.\n\nLook at the matter in this way: how inconsistent of them to have been always enemies of the body, and wanting to have the soul alone, and when this is granted to them, to be trembling and repining; instead of rejoicing at their departing to that place where, when they arrive, they hope to gain that which in life they loved (and this was wisdom), and at the same time to be rid of the company of their enemy.\n\nMany a man has been willing to go to the world below in the hope of seeing there an earthly love, or wife, or son, and conversing with them.\n\nAnd will he who is a true lover of wisdom, and is persuaded in like manner that only in the world below he can worthily enjoy her, still repine at death?\n\nWill he not depart with joy?\n\nSurely he will, my friend, if he be a true philosopher.\n\nFor he will have a firm conviction that there only, and nowhere else, he can find wisdom in her purity.\n\nAnd if this be true, he would be very absurd, as I was saying, if he were to fear death.\n\nHe would, indeed, replied Simmias.\n\nAnd when you see a man who is repining at the approach of death, is not his reluctance a sufficient proof that he is not a lover of wisdom, but a lover of the body, and probably at the same time a lover of either money or power, or both?\n\nThat is very true, he replied.\n\nThere is a virtue, Simmias, which is named courage.\n\nIs not that a special attribute of the philosopher?\n\nCertainly.\n\nAgain, there is temperance.\n\nIs not the calm, and control, and disdain of the passions which even the many call temperance, a quality belonging only to those who despise the body and live in philosophy?\n\nThat is not to be denied.\n\nFor the courage and temperance of other men, if you will consider them, are really a contradiction.\n\nHow is that, Socrates?\n\nWell, he said, you are aware that death is regarded by men in general as a great evil.\n\nThat is true, he said.\n\nAnd do not courageous men endure death because they are afraid of yet greater evils?\n\nThat is true.\n\nThen all but the philosophers are courageous only from fear, and because they are afraid; and yet that a man should be courageous from fear, and because he is a coward, is surely a strange thing.\n\nVery true.\n\nAnd are not the temperate exactly in the same case?"

