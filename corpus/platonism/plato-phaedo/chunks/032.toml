[content]
body = "Very true, he said.\n\nAgain, would you not be cautious of affirming that the addition of one to one, or the division of one, is the cause of two?\n\nAnd you would loudly asseverate that you know of no way in which anything comes into existence except by participation in its own proper essence, and consequently, as far as you know, the only cause of two is the participation in duality; that is the way to make two, and the participation in one is the way to make one.\n\nYou would say: I will let alone puzzles of division and addition-wiser heads than mine may answer them; inexperienced as I am, and ready to start, as the proverb says, at my own shadow, I cannot afford to give up the sure ground of a principle.\n\nAnd if anyone assails you there, you would not mind him, or answer him until you had seen whether the consequences which follow agree with one another or not, and when you are further required to give an explanation of this principle, you would go on to assume a higher principle, and the best of the higher ones, until you found a resting-place; but you would not refuse the principle and the consequences in your reasoning like the Eristics-at least if you wanted to discover real existence.\n\nNot that this confusion signifies to them who never care or think about the matter at all, for they have the wit to be well pleased with themselves, however great may be the turmoil of their ideas.\n\nBut you, if you are a philosopher, will, I believe, do as I say.\n\nWhat you say is most true, said Simmias and Cebes, both speaking at once.\n\nEch.\n\nYes, Phaedo; and I don't wonder at their assenting.\n\nAnyone who has the least sense will acknowledge the wonderful clear.\n\nof Socrates' reasoning.\n\nPhaed.\n\nCertainly, Echecrates; and that was the feeling of the whole company at the time.\n\nEch.\n\nYes, and equally of ourselves, who were not of the company, and are now listening to your recital.\n\nBut what followed?\n\nPhaedo.\n\nAfter all this was admitted, and they had agreed about the existence of ideas and the participation in them of the other things which derive their names from them, Socrates, if I remember rightly, said:- This is your way of speaking; and yet when you say that Simmias is greater than Socrates and less than Phaedo, do you not predicate of Simmias both greatness and smallness?\n\nYes, I do.\n\nBut still you allow that Simmias does not really exceed Socrates, as the words may seem to imply, because he is Simmias, but by reason of the size which he has; just as Simmias does not exceed Socrates because he is Simmias, any more than because Socrates is Socrates, but because he has smallness when compared with the greatness of Simmias?\n\nTrue.\n\nAnd if Phaedo exceeds him in size, that is not because Phaedo is Phaedo, but because Phaedo has greatness relatively to Simmias, who is comparatively smaller?\n\nThat is true.\n\nAnd therefore Simmias is said to be great, and is also said to be small, because he is in a mean between them, exceeding the smallness of the one by his greatness, and allowing the greatness of the other to exceed his smallness.\n\nHe added, laughing, I am speaking like a book, but I believe that what I am now saying is true.\n\nSimmias assented to this."

