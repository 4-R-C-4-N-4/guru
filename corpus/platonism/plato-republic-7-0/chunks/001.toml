[content]
body = "BOOK VII SOCRATES - GLAUCON AND now, I said, let me show in a figure how far our nature is enlightened or unenlightened:--Behold!\n\nhuman beings living in a underground den, which has a mouth open towards the light and reaching all along the den; here they have been from their childhood, and have their legs and necks chained so that they cannot move, and can only see before them, being prevented by the chains from turning round their heads.\n\nAbove and behind them a fire is blazing at a distance, and between the fire and the prisoners there is a raised way; and you will see, if you look, a low wall built along the way, like the screen which marionette players have in front of them, over which they show the puppets.\n\nI see.\n\nAnd do you see, I said, men passing along the wall carrying all sorts of vessels, and statues and figures of animals made of wood and stone and various materials, which appear over the wall?\n\nSome of them are talking, others silent.\n\nYou have shown me a strange image, and they are strange prisoners.\n\nLike ourselves, I replied; and they see only their own shadows, or the shadows of one another, which the fire throws on the opposite wall of the cave?\n\nTrue, he said; how could they see anything but the shadows if they were never allowed to move their heads?\n\nAnd of the objects which are being carried in like manner they would only see the shadows?\n\nYes, he said.\n\nAnd if they were able to converse with one another, would they not suppose that they were naming what was actually before them?\n\nVery true.\n\nAnd suppose further that the prison had an echo which came from the other side, would they not be sure to fancy when one of the passers-by spoke that the voice which they heard came from the passing shadow?\n\nNo question, he replied.\n\nTo them, I said, the truth would be literally nothing but the shadows of the images.\n\nThat is certain.\n\nAnd now look again, and see what will naturally follow it' the prisoners are released and disabused of their error.\n\nAt first, when any of them is liberated and compelled suddenly to stand up and turn his neck round and walk and look towards the light, he will suffer sharp pains; the glare will distress him, and he will be unable to see the realities of which in his former state he had seen the shadows; and then conceive some one saying to him, that what he saw before was an illusion, but that now, when he is approaching nearer to being and his eye is turned towards more real existence, he has a clearer vision, -what will be his reply?\n\nAnd you may further imagine that his instructor is pointing to the objects as they pass and requiring him to name them, -will he not be perplexed?\n\nWill he not fancy that the shadows which he formerly saw are truer than the objects which are now shown to him?\n\nFar truer.\n\nAnd if he is compelled to look straight at the light, will he not have a pain in his eyes which will make him turn away to take and take in the objects of vision which he can see, and which he will conceive to be in reality clearer than the things which are now being shown to him?\n\nTrue, he now And suppose once more, that he is reluctantly dragged up a steep and rugged ascent, and held fast until he's forced into the presence of the sun himself, is he not likely to be pained and irritated?\n\nWhen he approaches the light his eyes will be dazzled, and he will not be able to see anything at all of what are now called realities.\n\nNot all in a moment, he said.\n\nHe will require to grow accustomed to the sight of the upper world."

