[content]
body = "True, he replied.\n\nThe spangled heavens should be used as a pattern and with a view to that higher knowledge; their beauty is like the beauty of figures or pictures excellently wrought by the hand of Daedalus, or some other great artist, which we may chance to behold; any geometrician who saw them would appreciate the exquisiteness of their workmanship, but he would never dream of thinking that in them he could find the true equal or the true double, or the truth of any other proportion.\n\nNo, he replied, such an idea would be ridiculous.\n\nAnd will not a true astronomer have the same feeling when he looks at the movements of the stars?\n\nWill he not think that heaven and the things in heaven are framed by the Creator of them in the most perfect manner?\n\nBut he will never imagine that the proportions of night and day, or of both to the month, or of the month to the year, or of the stars to these and to one another, and any other things that are material and visible can also be eternal and subject to no deviation-- that would be absurd; and it is equally absurd to take so much pains in investigating their exact truth.\n\nI quite agree, though I never thought of this before.\n\nThen, I said, in astronomy, as in geometry, we should employ problems, and let the heavens alone if we would approach the subject in the right way and so make the natural gift of reason to be of any real use.\n\nThat, he said, is a work infinitely beyond our present astronomers.\n\nYes, I said; and there are many other things which must also have a similar extension given to them, if our legislation is to be of any value.\n\nBut can you tell me of any other suitable study?\n\nNo, he said, not without thinking.\n\nMotion, I said, has many forms, and not one only; two of them are obvious enough even to wits no better than ours; and there are others, as I imagine, which may be left to wiser persons.\n\nBut where are the two?\n\nThere is a second, I said, which is the counterpart of the one already named.\n\nAnd what may that be?\n\nThe second, I said, would seem relatively to the ears to be what the first is to the eyes; for I conceive that as the eyes are designed to look up at the stars, so are the ears to hear harmonious motions; and these are sister sciences--as the Pythagoreans say, and we, Glaucon, agree with them?\n\nYes, he replied.\n\nBut this, I said, is a laborious study, and therefore we had better go and learn of them; and they will tell us whether there are any other applications of these sciences.\n\nAt the same time, we must not lose sight of our own higher object.\n\nWhat is that?\n\nThere is a perfection which all knowledge ought to reach, and which our pupils ought also to attain, and not to fall short of, as I was saying that they did in astronomy.\n\nFor in the science of harmony, as you probably know, the same thing happens.\n\nThe teachers of harmony compare the sounds and consonances which are heard only, and their labour, like that of the astronomers, is in vain.\n\nYes, by heaven!\n\nhe said; and 'tis as good as a play to hear them talking about their condensed notes, as they call them; they put their ears close alongside of the strings like persons catching a sound from their neighbour's wall--one set of them declaring that they distinguish an intermediate note and have found the least interval which should be the unit of measurement; the others insisting that the two sounds have passed into the same-- either party setting their ears before their understanding."

