[content]
body = "Yes, I said, but for that purpose a very little of either geometry or calculation will be enough; the question relates rather to the greater and more advanced part of geometry--whether that tends in any degree to make more easy the vision of the idea of good; and thither, as I was saying, all things tend which compel the soul to turn her gaze towards that place, where is the full perfection of being, which she ought, by all means, to behold.\n\nTrue, he said.\n\nThen if geometry compels us to view being, it concerns us; if becoming only, it does not concern us?\n\nYes, that is what we assert.\n\nYet anybody who has the least acquaintance with geometry will not deny that such a conception of the science is in flat contradiction to the ordinary language of geometricians.\n\nHow so?\n\nThey have in view practice only, and are always speaking?\n\nin a narrow and ridiculous manner, of squaring and extending and applying and the like-- they confuse the necessities of geometry with those of daily life; whereas knowledge is the real object of the whole science.\n\nCertainly, he said.\n\nThen must not a further admission be made?\n\nWhat admission?\n\nThat the knowledge at which geometry aims is knowledge of the eternal, and not of aught perishing and transient.\n\nThat, he replied, may be readily allowed, and is true.\n\nThen, my noble friend, geometry will draw the soul towards truth, and create the spirit of philosophy, and raise up that which is now unhappily allowed to fall down.\n\nNothing will be more likely to have such an effect.\n\nThen nothing should be more sternly laid down than that the inhabitants of your fair city should by all means learn geometry.\n\nMoreover the science has indirect effects, which are not small.\n\nOf what kind?\n\nhe said.\n\nThere are the military advantages of which you spoke, I said; and in all departments of knowledge, as experience proves, any one who has studied geometry is infinitely quicker of apprehension than one who has not.\n\nYes indeed, he said, there is an infinite difference between them.\n\nThen shall we propose this as a second branch of knowledge which our youth will study?\n\nLet us do so, he replied.\n\nAnd suppose we make astronomy the third--what do you say?\n\nI am strongly inclined to it, he said; the observation of the seasons and of months and years is as essential to the general as it is to the farmer or sailor.\n\nI am amused, I said, at your fear of the world, which makes you guard against the appearance of insisting upon useless studies; and I quite admit the difficulty of believing that in every man there is an eye of the soul which, when by other pursuits lost and dimmed, is by these purified and re-illumined; and is more precious far than ten thousand bodily eyes, for by it alone is truth seen.\n\nNow there are two classes of persons: one class of those who will agree with you and will take your words as a revelation; another class to whom they will be utterly unmeaning, and who will naturally deem them to be idle tales, for they see no sort of profit which is to be obtained from them.\n\nAnd therefore you had better decide at once with which of the two you are proposing to argue.\n\nYou will very likely say with neither, and that your chief aim in carrying on the argument is your own improvement; at the same time you do not grudge to others any benefit which they may receive.\n\nI think that I should prefer to carry on the argument mainly on my own behalf.\n\nThen take a step backward, for we have gone wrong in the order of the sciences.\n\nWhat was the mistake?\n\nhe said.\n\nAfter plane geometry, I said, we proceeded at once to solids in revolution, instead of taking solids in themselves; whereas after the second dimension the third, which is concerned with cubes and dimensions of depth, ought to have followed."

