[content]
body = "Whereas the truth is that the State in which the rulers are most reluctant to govern is always the best and most quietly governed, and the State in which they are most eager, the worst.\n\nQuite true, he replied.\n\nAnd will our pupils, when they hear this, refuse to take their turn at the toils of State, when they are allowed to spend the greater part of their time with one another in the heavenly light?\n\nImpossible, he answered; for they are just men, and the commands which we impose upon them are just; there can be no doubt that every one of them will take office as a stern necessity, and not after the fashion of our present rulers of State.\n\nYes, my friend, I said; and there lies the point.\n\nYou must contrive for your future rulers another and a better life than that of a ruler, and then you may have a well-ordered State; for only in the State which offers this, will they rule who are truly rich, not in silver and gold, but in virtue and wisdom, which are the true blessings of life.\n\nWhereas if they go to the administration of public affairs, poor and hungering after the' own private advantage, thinking that hence they are to snatch the chief good, order there can never be; for they will be fighting about office, and the civil and domestic broils which thus arise will be the ruin of the rulers themselves and of the whole State.\n\nMost true, he replied.\n\nAnd the only life which looks down upon the life of political ambition is that of true philosophy.\n\nDo you know of any other?\n\nIndeed, I do not, he said.\n\nAnd those who govern ought not to be lovers of the task?\n\nFor, if they are, there will be rival lovers, and they will fight.\n\nNo question.\n\nWho then are those whom we shall compel to be guardians?\n\nSurely they will be the men who are wisest about affairs of State, and by whom the State is best administered, and who at the same time have other honours and another and a better life than that of politics?\n\nThey are the men, and I will choose them, he replied.\n\nAnd now shall we consider in what way such guardians will be produced, and how they are to be brought from darkness to light,--as some are said to have ascended from the world below to the gods?\n\nBy all means, he replied.\n\nThe process, I said, is not the turning over of an oyster-shell, but the turning round of a soul passing from a day which is little better than night to the true day of being, that is, the ascent from below, which we affirm to be true philosophy?\n\nQuite so.\n\nAnd should we not enquire what sort of knowledge has the power of effecting such a change?\n\nCertainly.\n\nWhat sort of knowledge is there which would draw the soul from becoming to being?\n\nAnd another consideration has just occurred to me: You will remember that our young men are to be warrior athletes Yes, that was said.\n\nThen this new kind of knowledge must have an additional quality?\n\nWhat quality?\n\nUsefulness in war.\n\nYes, if possible.\n\nThere were two parts in our former scheme of education, were there not?\n\nJust so.\n\nThere was gymnastic which presided over the growth and decay of the body, and may therefore be regarded as having to do with generation and corruption?\n\nTrue.\n\nThen that is not the knowledge which we are seeking to discover?\n\nNo.\n\nBut what do you say of music, which also entered to a certain extent into our former scheme?\n\nMusic, he said, as you will remember, was the counterpart of gymnastic, and trained the guardians by the influences of habit, by harmony making them harmonious, by rhythm rhythmical, but not giving them science; and the words, whether fabulous or possibly true, had kindred elements of rhythm and harmony in them."

