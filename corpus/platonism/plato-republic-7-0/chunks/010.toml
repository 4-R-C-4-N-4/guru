[content]
body = "That is true, Socrates; but so little seems to be known as yet about these subjects.\n\nWhy, yes, I said, and for two reasons:--in the first place, no government patronises them; this leads to a want of energy in the pursuit of them, and they are difficult; in the second place, students cannot learn them unless they have a director.\n\nBut then a director can hardly be found, and even if he could, as matters now stand, the students, who are very conceited, would not attend to him.\n\nThat, however, would be otherwise if the whole State became the director of these studies and gave honour to them; then disciples would want to come, and there would be continuous and earnest search, and discoveries would be made; since even now, disregarded as they are by the world, and maimed of their fair proportions, and although none of their votaries can tell the use of them, still these studies force their way by their natural charm, and very likely, if they had the help of the State, they would some day emerge into light.\n\nYes, he said, there is a remarkable charm in them.\n\nBut I do not clearly understand the change in the order.\n\nFirst you began with a geometry of plane surfaces?\n\nYes, I said.\n\nAnd you placed astronomy next, and then you made a step backward?\n\nYes, and I have delayed you by my hurry; the ludicrous state of solid geometry, which, in natural order, should have followed, made me pass over this branch and go on to astronomy, or motion of solids.\n\nTrue, he said.\n\nThen assuming that the science now omitted would come into existence if encouraged by the State, let us go on to astronomy, which will be fourth.\n\nThe right order, he replied.\n\nAnd now, Socrates, as you rebuked the vulgar manner in which I praised astronomy before, my praise shall be given in your own spirit.\n\nFor every one, as I think, must see that astronomy compels the soul to look upwards and leads us from this world to another.\n\nEvery one but myself, I said; to every one else this may be clear, but not to me.\n\nAnd what then would you say?\n\nI should rather say that those who elevate astronomy into philosophy appear to me to make us look downwards and not upwards.\n\nWhat do you mean?\n\nhe asked.\n\nYou, I replied, have in your mind a truly sublime conception of our knowledge of the things above.\n\nAnd I dare say that if a person were to throw his head back and study the fretted ceiling, you would still think that his mind was the percipient, and not his eyes.\n\nAnd you are very likely right, and I may be a simpleton: but, in my opinion, that knowledge only which is of being and of the unseen can make the soul look upwards, and whether a man gapes at the heavens or blinks on the ground, seeking to learn some particular of sense, I would deny that he can learn, for nothing of that sort is matter of science; his soul is looking downwards, not upwards, whether his way to knowledge is by water or by land, whether he floats, or only lies on his back.\n\nI acknowledge, he said, the justice of your rebuke.\n\nStill, I should like to ascertain how astronomy can be learned in any manner more conducive to that knowledge of which we are speaking?\n\nI will tell you, I said: The starry heaven which we behold is wrought upon a visible ground, and therefore, although the fairest and most perfect of visible things, must necessarily be deemed inferior far to the true motions of absolute swiftness and absolute slowness, which are relative to each other, and carry with them that which is contained in them, in the true number and in every true figure.\n\nNow, these are to be apprehended by reason and intelligence, but not by sight."

