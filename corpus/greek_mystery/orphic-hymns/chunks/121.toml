body = "LXXV.\n\nTO THE MUSES.\n\nThe FUMIGATION from FRANKINCENSE.\n\nDaughters of Jove, dire-sounding and divine, 1 Renown'd Pierian, sweetly speaking Nine; p.\n\n206 To those whose breasts your sacred furies fire Much-form'd, the objects of supreme desire: p.\n\n207 Sources of blameless virtue to mankind, 5 Who form to excellence the youthful mind; p.\n\n208 Who nurse the soul, and give her to descry The paths of right with Reason's steady eye.\n\np.\n\n209 Commanding queens who lead to sacred light The intellect refin'd from Error's night; 10 p.\n\n210 And to mankind each holy rite disclose, For mystic knowledge from your nature flows.\n\np.\n\n211 Clio, and Erato, who charms the sight, With thee Euterpe minist'ring delight: p.\n\n212 Thalia flourishing, Polymina fam'd, 15 Melpomene from skill in music nam'd: p.\n\n213 Terpischore, Urania heav'nly bright, With thee * who gav'st me to behold the light.\n\nCome, venerable, various, pow'rs divine, With fav'ring aspect on your mystics shine; 20 Bring glorious, ardent, lovely, fam'd desire, And warm my bosom with your sacred fire.\n\nFootnotes 205:1 Ver.\n\ni.] Daughters of Jove .\n\nProclus, in some manuscript commentary, cited by Gyraldus, in Syntag.\n\nde Musis.\n\np.534.\n\nsays that the Muses are called the daughters of Jove and Mnemosyne, because to those who desire to posses disciplines and sciences, intellect and the power of memory are necessary p.\n\n106 as the first requisites: the latter of which the Greeks call μνημονικὸσ, the former νοητικὸσ.\n\nBut as the best explanation of the nature of the Muses is given by Proclus, in his Commentary or, Plato's Republic, p.\n\n399.\n\naccompanied with all that philosophical elegance and subtilty which he possessed in so remarkable a degree, I persuade myself the following Paraphrase on his discourse concerning the different kinds of poets, will be highly acceptable to the liberal reader; and that its great excellence will amply compensate for its length.\n\n\"In the first place then, there are three poetic forms corresponding to the three different powers of the soul, Intellect, Reason, and Opinion.\n\nThese we shall explain according to the opinion of Plato; and produce from Homer examples of each.\n\nThe first kind of poetry then, is similar to intellect.\n\nBut intellect is the best, most perfect, and most divine power of the soul: it is the most similar to a divine life, in the contemplation of which it is wholly employed, and is swallowed up as it were in the essence of divinity; so that it enkindles its own light from the splendor of the Gods, and conjoins its own most simple essence with supernatural unity.\n\nIn like manner the most excellent kind of poetry, gives beatitude to the soul, from divinity, and places it among the Gods; participating by an ineffable union with the participated deities, and conjoining that which is filled with good, with its replenishing source.\n\nHence it abstracts the soul from all material connections, illuminates it with celestial light, inflames it with a divine fire; and compels the whole inferior constitution of the soul, to be obedient to intellect alone.\n\nIndeed, a Fury of this kind is more excellent than any temperance; since it furnishes the soul with such a symmetry and proportion of divinity, that the very words bursting forth as its last effects, appear to be adorned with the beautiful bands of measure and number.\n\nFor as prophetic p."

