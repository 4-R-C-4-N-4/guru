[content]
body = "For in this solemnity grass is carried about, enwrapping the kernels of olives, attended with figs, all kinds of pulse, oaken boughs or acorns, the fruit of the strawberry, wheat, and barley, a mass of dried figs, cakes composed from the meal of wheat and barley, heaped in a pyramidal form, and last of all olives.\" Theophrastus then proceeds to shew the impropriety of animal sacrifices, after which he adds: \"But the utility of fruits is the first and greatest of every production; the first fruits of which are to be sacrificed to the Gods alone, and to the Earth, the prolific parent of every herb.\n\np.\n\n52 For Earth is the common Vesta of Gods and men, on whose fertile surface reclining, as on the soft bosom of a mother or a nurse, we ought to celebrate her divinity with hymns, and incline to her with filial affection, as to the source of our existence.\n\nFor thus, when we approach to the conclusion of our mortal life, we shall be thought worthy of a reception into the celestial regions, and of an association with the race of immortal Gods, who now behold us venerating their divinities with those fruits, of which they are the authors, and sacrificing in their honour every herb of the all-bearing earth; at the same time not esteeming every thing worthy or proper to be offered as a testimony of our homage.\n\n\"For as everything indiscriminately is not to be sacrificed to the Gods, so perhaps we cannot find any thing sufficiently worthy, with which we may worship them as they p.\n\n53 deserve.\" Thus far Theophrastus.\n\nPorphyry then proceeds to shew after what manner those ought to sacrifice who propose an intellectual life, as the ultimate object of their pursuit.\n\n\"Let us also,\" says be, \"sacrifice, but in a manner becoming the offspring of intellect, bringing with us the most exalted offerings, with our most exalted powers.\n\nTo the Divinity indeed, who is above all things, as a wise man said, neither sacrificing nor dedicating any thing sensible or material; for there is nothing subsisting by material concretion, which must not be deemed impure by a nature entirely free from the contagion of body.\n\nHence even the discourse, which is proffered by the voice is not proper to be addressed to a cause so sublime and ineffable; nor the internal speech of the soul, if contaminated with any perturbation, or mixed with any p.\n\n54 of the sensible phantasms of imagination.\n\nBut we ought to worship the supreme God, in the most profound and pure silence; and with the purest thoughts concerning his exalted nature.\n\nIt is requisite, therefore, that having conjoined and assimilated ourselves to him, we should approach this sublime principle with a pious sacrifice, which may redound to his praise, and to our safety.\n\nBut such a sacrifice can only be performed by contemplating his divinity with a soul free from material affections, and with the rational eye filled with intellectual light.\n\nBut to the offspring of this first God (I mean the intelligible divinities) we should present the sacrifice of hymns, composed by the rational principle.\n\nFor it is customary to offer the first-fruits of such things as every, God bestows upon us; by which he nourishes and supports our existence, and which are subservient to the p.\n\n55 purposes of sacrifice."

