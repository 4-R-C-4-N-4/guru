body = "Hence according to his theology there are two worlds, the intelligible and the sensible.\n\nHence too his three demiurgic principles: Jovial, Dionysiacal, and Adonical, Δΐι#, ( ) Διονυσιακὴ, Αδωναϊκὴ, from whence many orders and differences of Gods proceed, intelligible e , intellectual, super-mundane, mundane, celestial, authors of generation.\n\nAnd among these some in the order of guardian, demiurgic, elevating and comprehending Gods; perfecters of works, vivific, immutable, absolute, judicial, purgative, &c.\n\nand besides these to each particular divinity, he added a particular multitude of angels, dæmons, and heroes; for according to Proclus, relating the p.\n\n27 opinion of Orpheus, and the theologists: f \"About every God there is a kindred multitude of angels, heroes, and dæmons.\n\nFor every God presides over the form of that multitude which receives the divinity.\" He likewise considered a difference of sex in these deifies, calling some male, and others female; the reason of which distinction g Proclus, with his usual elegance and subtilty, thus explains.\n\n\"The division of male and female comprehends in itself, all the plenitudes of divine orders.\n\nSince the cause of stable power and identity, and the leader Χὸρηγος of being, and that which invests all things with the first principle of conversion, is comprehended in the masculine order.\n\nBut that which generates from itself, all various progressions and partitions, measures p.\n\n28 of life and prolific powers, is contained in the female division.\n\nAnd on this account Timæus also, converting himself to all the Gods, by this division of generated natures, embraces their universal orders.\n\nBut a division of this kind, is particularly accommodated and proper to the present Theory, because the universe is full of this two-fold kind of Gods.\n\nFor that we may begin with the extremes, heaven corresponds with earth, in the order and proportion of male to female.\n\nSince the motion of the heavens imparts particular properties and powers, to particular things.\n\nBut on the other hand earth receiving the celestial defluxions, becomes pregnant, and produces plants and animals of every kind.\n\nAnd of the Gods existing in the heavens, some are distinguished by the male division, and others by the female and the authors of generation, since they p.\n\n29 are themselves destitute of birth, are some of this order and others of that, for the demiurgic choir is abundant in the universe.\n\nThere are also many canals as it as it were of life, some of which exhibit the male and others the female form.\n\nBut why should I insist on this particular?\n\nsince from the absolute unities, whether endued with a masculine, or a feminine form, various orders of beings flow into the universe.\" Thus far Proclus.\n\nBut that Orpheus was a monarchist, as well as a polytheist, is not only evident from the preceding arguments, originally derived from his Theology, but from the following verses quoted by Proclus h .\n\nHence with the universe great Jove contains The æther bright, and heav'ns exalted plains Th' extended restless sea, and earth renown'd Ocean immense, and Tartarus profound; p.\n\n30 Fountains and rivers, and the boundless main, With all that nature's ample realms contain, And Gods and Goddesses of each degree All that is past, and all that e'er shall be, Occultly, and in fair connection i , lies In Jove's wide womb, the ruler of the skies."

