section = "Hymn 21. Sacred Texts Classics Index Previous Next XIV. TO JUPITER. The FUMIGATION from STORAX. O Jove much-honor'd, Jove supremely great, To thee our holy rites we consecrate, p. 140 Our pray'rs and expiations, king divine, For all things round thy head exalted shine. The earth is thine, and mountains swelling high, 5 The sea profound, and all within the sky. Saturnian king, descending from above, Magnanimous, commanding, sceptred Jove; All-parent, principle and end of all, Whose pow'r almighty, shakes this earthly ball; 10 Ev'n Nature trembles at thy mighty nod, Loud-sounding, arm'd with light'ning, thund'ring God. Source of abundance, purifying king, O various-form'd from whom all natures spring; Propitious hear my pray'r, give blameless health, 15 With peace divine, and necessary wealth. Next: XV: To Juno"
translator = "Thomas Taylor"
