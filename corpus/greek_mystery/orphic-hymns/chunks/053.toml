body = "XIII.\n\nTO RHEA * .\n\nThe FUMIGATION from AROMATICS.\n\nDAUGHTER of great Protogonus, divine, 1 Illustrious Rhea, to my pray'r incline, p.\n\n138 Who driv'st thy holy car with speed along, Drawn by fierce lions, terrible and strong.\n\n4 Mother of Jove, whose mighty arm can wield 5 Th' avenging bolt, and shake the dreadful shield.\n\nDrum-beating, frantic, of a splendid mien, 7 Brass-sounding, honor'd, Saturn's blessed queen.\n\nThou joy'st in mountains and tumultuous fight, And mankind's horrid howlings, thee delight.\n\n10 p.\n\n139 War's parent, mighty, of majestic frame, Deceitful saviour, liberating dame.\n\n12 Mother of Gods and men, from whom the earth And lofty heav'ns derive their glorious birth; Th' ætherial gales, the deeply spreading sea 15 Goddess ærial form'd, proceed from thee.\n\nCome, pleas'd with wand'rings, blessed and divine, With peace attended on our labours shine; Bring rich abundance, and wherever found Drive dire disease, to earth's remotest bound.\n\n20 Footnotes 137:1 Ver.\n\n1.] Daughter of great Protogonus .\n\nIn the note to Hercules it appears that Rhea is one of the progeny of the intellectual earth, resident in Phanes; and from the note to Hymn 5, to Protogonus, we learn from Proclus, that Phanes is to be considered in the intelligible as well as in the intellectual orders.\n\nHence Rhea is, with perfect agreement to the Orphic theology, the daughter of Protogonus, considered as subsisting among the intelligible Gods.\n\n137:* Rhea, according to the Orphic and Platonic theology, is one of the zoogonic or vivific principles of the universe; having a maternal rank among the universal paternal orders, i.\n\ne.\n\nbetween Saturn and Jupiter.\n\nHence she calls forth the causes latent in Saturn to the procreation of the universe; and definitely unfolds all the genera of the Gods.\n\nSo that she is filled from Saturn, with an intelligible and prolific power, which she imparts to Jupiter the demiurgus of the universe; filling his essence with a vivific abundance.\n\nSince this Goddess then is a medium between the two intellectual parents of the universe, Saturn and Jupiter, the former of which collects intellectual multitude into one, but the other scatters and divides it.\n\nHence says Proclus, in Theol.\n\nPlat.\n\np.\n\n266.\n\nthis Goddess produces in herself the demiurgic causes of the universe; but imparts her diffusive power abundantly to secondary natures.\n\nOn p.\n\n138 this account Plato assimilates her prolific abundance to the flowing of waters; signifying nothing more by the word flowing , than that fontal power, by which she singularly contains the divine rivers of life.\n\nAnd, p.\n\n267.\n\nProclus informs us, that this Goddess, according to Orpheus, when considered as united to Saturn by the most exalted part of her essence, is called Rhea: but considered as producing Jupiter, and, together with Jove, unfolding the universal and particular orders of the Gods, she is called Ceres.\n\n138:4 Ver.\n\n4.] Drawn by fierce lions , &c.\n\nI have here followed the correction of Pierson, who reads ταυροφονων for ταυροφορον: for Rhea is the same with the mother of the Gods, who is celebrated in the Hymn to her, as seated in a car drawn by lions.\n\n138:7 Ver.\n\n7.] Drum-beating ."

