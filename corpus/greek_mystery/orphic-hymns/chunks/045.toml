[content]
body = "For as the demiurgic intellect represents about matter the significations of primary forms comprehended in its essence; temporal signatures of things eternal; divisible representatives of things in divisible, and produces as it were shadowy resemblances of true beings: after the same manner I think the science we possess, framing an intellectual action, fabricates by discourse both the resemblances of other things, and of the Gods themselves.\n\nSo that it fashions by composition, that which in the Gods is void of composition; that which is simple by variety; and that which is united by multitude.\n\nAnd by this formation of names it demonstrates in the last place the images of divine concerns.\n\nAnd as the theurgic art provokes by certain signs, supernal illumination into artificial statutes, and allures the unevnying goodness of the Gods, in the same manner the science of divine concerns, signifies the occult essence of the God by the compositions and divisions of sounds.\n\n125:5 Ver.\n\n5.] Female and Male.\n\nThis is not wonderful, since according to the fragment of Ficinus in this Dissertation, all souls and the celestial spheres are endued with a two-fold power, nostic and animating; one of which is male and the other female.\n\nAnd these epithets are perpetually occurring in the Orphic Initiations.\n\n126:14 Ver.\n\n14.] Who giv'st to Nature's works , &c.\n\nIn the original it is τελεσφορος, i.\n\ne.\n\nbringing to an end.\n\nAnd Proclus in Theol.\n\nPlat.\n\np.\n\n483.\n\ninforms us that Diana (who is the same with the Moon) is so called, because she finishes or perfects the essential perfection of matter."

