body = "Sacred Texts Classics Index Previous Next V.\n\nTO PROTOGONUS, Or the FIRST-BORN.\n\nThe FUMIGATION from MYRRH.\n\nO Mighty first-begotten, hear my pray'r, 1 Two-fold, egg-born, and wand'ring thro' the air, p.\n\n119 Bull-roarer, glorying in thy golden wings, 3 From whom the race of Gods and mortals springs.\n\np.\n\n120 Ericapæus, celebrated pow'r, 5 Ineffable, occult, all shining flow'r.\n\nFrom eyes obscure thou wip'st the gloom of night, All-spreading splendour, pure and holy light Hence Phanes call'd, the glory of the sky, On waving pinions thro' the world you fly.\n\n10 Priapus, dark-ey'd splendour, thee I sing, Genial, all-prudent, ever-blessed king, p.\n\n121 With joyful aspect on our rights divine And holy sacrifice propitious shine.\n\nFootnotes 118:1 Ver.\n\n1.] First-begotten , and v.\n\nii.\n\nEgg-born .\n\nAccording to Orpheus, as related by Syrianus in Metaph.\n\nAristot.\n\np.\n\n114, the first principle; of all things is Unity or the Good itself, and after this the Duad, or Æther and Chaos, subsists, according to Phythagoras .\n\nThe first of these, or Æther, approaches to a similitude of the one itself, and is the representative of bound; the other, Chaos, comprehends in its essence multitude and infinity.\n\nAfterwards (says Syrianus) the first and secret genera of the Gods subsists, among which the first apparent is the king and father of the universe, whom on this account they call Phanes.\n\nNow this first and secret genera of the Gods, is no other than all the demiurgical and intellectual ideas, considered as proceeding to the production of the sensible World, from their occult subsistence in Æther and Chaos, whose mutual connection Orpheus represents under the symbol of an egg: upon the exclusion of which egg, by night considered as a principle, the God Phanes came forth, who is hence denominated Protogonus.\n\nΔὶο καὶ παῤ Ορφεῖ ἢ Φάνης περικαλλέος αἰθέρος ηἱος ονομά#εται ( ), καὶ ἃϐρὸς Ἕρως, p.\n\n119 Says Proclus in Tim.\n\nii.\n\np.\n\n132, i.\n\ne.\n\n\"on this account Phanes is called by Orpheus, the son of beautiful Æther, and tender Love.\" There is likewise another valuable passage on this subject from Proclus, in Tim.\n\np.\n\n291.\n\nas follows.\n\n\"Orpheus delivers the kings of the Gods, who preside over the universe according to a perfect number; Phanes, Night, Heaven, Saturn, Jupiter, Bacchus.\n\nFor Phanes is first adorned with a scepter, is the first king, and the celebrated Ericapæus.\n\nBut the second king is Night, who receives the sceptre from the father Phanes.\n\nThe third is Heaven, invested with government from Night.\n\nThe fourth Saturn, the oppressor as they say of his father.\n\nThe fifth is Jupiter, the ruler of his father.\n\nAnd the sixth of these is Bacchus.\n\nBut all these kings having a supernal origin from the intelligible and intellectual Gods, are received into the middle orders, and in the world, both which they adorn."

