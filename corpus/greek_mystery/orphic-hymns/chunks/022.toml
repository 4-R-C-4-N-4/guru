[content]
body = "For the generative causes of things, are contained by similitude in their effects; and in causes themselves their progeny subsist, comprehended in perfect union and consent.\n\nHence the celestial orbs impart a copious defluxion of good to this terrestrial region; while sublunary parts, assimilated in a certain respect to p.\n\n73 the heavens, participate a perfection convenient to their nature.\n\nHence too, from the progressions of similitude, there are various leaders in the universe.\n\nAnd many orders of angels dancing harmoniously round their ruling deities; together with a multitude of dæmons, heroes, and particular souls.\n\nThere are besides multiform kinds of mortal animals, and various powers of plants.\n\nSo that all things tend to their respective leaders, and are as it were stamped with one sign of domestic unity; which is in form more evident., and in others more obscure.\n\nFor indeed similitude in first productions subsists more apparently; but in those of the middle and extreme orders is obscured in consequence of the gradations of progression.\n\nHence images and exemplars derive their hypostasis from p.\n\n74 conciliating similitude; and every thing through this is familiar to itself, and to its kindred natures.\n\nBut it is time to return from this digression to the business of sacrifice and prayer.\n\nThat we may therefore have a clearer view of the nature and efficacy of each, let us hear the elegant and subtle Proclus x , upon sacrifice and magic, of which the following is a paraphrase.\n\n\"In the same manner as lovers gradually advance from that beauty which is apparent in sensible forms, to that which is divine; so the ancient priests, when they considered that there was a certain alliance and sympathy in natural things to each p.\n\n75 other, and of things manifest to occult powers, and by this means discovered that all things subsist in all, they fabricated a sacred science, from this mutual sympathy and similarity.\n\nThus they recognized things supreme, in such as are subordinate, and the subordinate in the supreme: in the celestial regions terrene properties subsisting in a causal and celestial manner; and in earth celestial properties, but according to a terrene condition.\n\nFor how shall we account for those plants called heliotropes, that is attendants on the sun, moving in correspondence with the revolution of its orb; but selenitropes, or attendants on the moon, turning in exact conformity with her motion?\n\nit is because all things pray, and compose hymns to the leaders of their respective orders; but some intellectually, and others p.\n\n76 rationally; some in a natural, and others after a sensible manner.\n\nHence the sunflower, as far as it is able, moves in a circular dance towards the sun; so that if any one could hear the pulsation made by its circuit in the air, he would perceive something composed by a sound of this kind, in honour of its king such as a plant is capable of framing.\n\nHence we may behold the sun and moon in the earth, but according to a terrene quality.\n\nBut in the celestial regions, all plants, and stones, and animals, possessing an intellectual life according to a celestial nature.\n\nNow the ancients having contemplated this mutual sympathy of things, applied for occult purposes both celestial and terrene natures, by means of which through a certain similitude they deduced divine virtues into this inferior abode.\n\nFor indeed p.\n\n77 similitude itself is a sufficient cause of binding things together in union and consent.\n\nThus if a piece of paper is heated, and afterwards placed near a lamp, though it does not touch the fire, the paper will be suddenly inflamed, and the flame will descend from the superior to the inferior parts."

