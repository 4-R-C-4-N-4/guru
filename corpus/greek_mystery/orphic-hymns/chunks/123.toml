[content]
body = "So in the poetic chain, it is requisite there should be something divine, which, through proper mediums, may connect the last to the first monad.\n\nThis Fury Homer, as well as Plato, calls at one time in the plural number Muses, and at another time in the singular number a Muse: in the first case, having respect to the multitude of the p.\n\n209 chain of the Muses; but in the second to the coherent union of all things, which is inserted from the first cause in inferior natures.\n\nFor indeed poetry subsists in a secret and uniform manner in the first mover, and afterwards in poets excited by that unity, like the revolution of a thread from its bottom clew εἴνειλεγμένως, but in the rhapsodist's, according to the lowest and ministrant degree.\n\nAnd thus much it is sufficient for the present to have alledged from Plato's Iö.\n\nHe who desires more, must consult that dialogue, where he will find many things commending this first and divine kind of Poets.\n\nWe shall farther add the testimony of the Athenian guest and of Timæus.\n\nFor he exhorts us to follow poets seized with the Fury of Apollo, such being the sons of the Gods, and knowing in the best manner the concerns of their progenitors, although they deliver them without the assistance of arguments and demonstrations.\n\nAnd Plato, in the third book of his Laws, thus writes: \"This genus of poets is divine, it is agitated by the Gods, composes sacred hymns, and every where embraces Truth attended with the Graces and Muses.\" To which may be added, that in the first Alcibiades, he says, the nature of poetry is ænigmatical, and is not manifest to every understanding.\n\nIndeed, you will find in Homer all kinds of poetry; but he has less of imagination and imitation, and excels in the first, concerning which we are now discoursing.\n\nFor, inspired by the Muses and full of fury, he proposes mystical senses of divinity; such as concerning demiurgical unity, the triple division of the universe, the chains of Vulcan, and the connection of Jupiter with Juno.\n\nBut Homer speaking of Demodocus (under whose person he wishes to signify himself, and on this account reports he was blind) says that he was a divine bard, loved by the Muses and their leader Apollo.\n\nAnd thus much for the first kind of poets and poetry, according to Proclus; among which it is evident these Hymns must be ranked; as all sacred poetical composition belongs to this highest order.\n\nHe then proceeds to the second kind of poetry, which the Greeks call διάνοια, or rational, as follows.\n\nReason then is inferior to in dignity and power, yet it follows intellect as the leader of its energies, between which, and opinion, it is the connecting medium.\n\nAnd as soul by intellect is conjoined with the divinities; so by the assistance of reason it is converted into itself.\n\nHence it revolves the multitude of arguments, considers the various differences of forms, collects intellect and the intelligent into one; and imitates in its operations an intelligible essence.\n\nBut since prudence is the employment of reason, we attribute to it the second kind of poetry, which is a medium between the preceding, and the third which we shall next explain.\n\nThis rational poetry, understands the essences of things, and is freely conversant about what is honest and good, as well in words as in actions, which are likewise the object of its contemplation.\n\nIt produces every particular invested with elegant numbers and rythms; proposes moral sentences, the best counsels, intelligible moderation, and every virtue."

