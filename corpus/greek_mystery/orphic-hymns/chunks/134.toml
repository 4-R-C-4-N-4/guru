[content]
body = "χεδνρον (sic lege et non ἄντρον) δὲ τὴν γῆν ἔλεγον, ὡς ὄργανον καὶ αὐτὴν τῦ χρονῦ ἡμερων γαρ ἐςιν ἅυτη, καὶ νυχτων, αἰτία.\n\nThat is, \"But those who more clearly perceive these affairs, call the fire in the middle a demiurgic power, nourishing the whole earth from the midst, and exciting and enlivening whatever it contains of a frigid nature: on which account some call it the tower of Jupiter, as he (i.e.\n\nAristotle) relates in his Phythagorics.\n\nBut others, the keeper or guardian of Jove; as he relates in these (i.e.\n\nhis books of Cælo).\n\nBut according to others, it is the throne of Jupiter.\n\nBut they called the earth a centre, as being itself an organ or instrument of time: for it is the cause of day and night.\" 221:8 Ver.\n\n8] Laughing and blessed .\n\nProclus, in Plat.\n\nRep.\n\np.\n\n384.\n\nobserves, that we ought to interpret the laughter of the Gods as an exuberant operation in the universe; and the gladness of mundane concerns, under the providence of a divine cause.\n\nBut since such a providence, says he, is incomprehensible, and is a never failing communication of all divine goods; we must allow that Homer justly calls the laughter of the Gods ἄσϐεςος {Greek á?s b e s o s } or inextinguishable.\n\nHe adds, that fables do not represent the Gods as always weeping, but affirm that they laugh p.\n\n222 without ceasing; because tears are symbols of their providence in mortal concerns, which are continually subject to existence and decay: but laughter is a sign of their effects in the universe, and of its principal parts, which are ever moved in one and the same orderly manner.\n\nHence, since we divide demiurgical powers between Gods and men, we assign laughter to the generation of the Gods, but tears to the formation of men or animals.\n\nHence, the poet sings in his Hymn to the Sun, O Apollo, the mortal race of men is the subject of thy tears; but the celestial race of Gods springs from laughter .\n\nBut since we divide the works of divinity into things celestial, and those subject to the moon; after the same manner, we attribute laughter to the first, and grief to the second.\n\nLastly, when we reason concerning the generations and corruptions of things below the moon, we refer the one to the weeping, and the other to the laughter of the Gods.\n\nAnd hence in our mysteries, the ministers of sacred rites, at a certain time order each of these to be celebrated.\n\nHe then concludes with an excellent observation , that men of simple understandings are unable to comprehend intellectually mystical ceremonies and fables of this kind; since such men destitute of science, produce nothing but absurd confusion about the religion of the Gods."

