[content]
body = "ix retain nothing of the fire and spirit of the original.\n\nPerhaps, there is but one exception to this remark, and that is Mr.\n\nSydenham: whose success in such an arduous undertaking can only be ascribed to his possessing the philosophical genius, and to his occasionally paraphrasing passages, which would otherwise be senseless and inanimate.\n\nIndeed, where languages differ so much as the ancient and modern, the most perfect method, perhaps, of transferring the philosophy from the one language to the other, is by a faithful and animated paraphrase: faithful, with regard to retaining the sense of the author; and animated, with respect to preserving the fire of the original; p.\n\nx calling it forth when latent, and expanding it when condensed.\n\nSuch a one, will every where endeavour to improve the light, and fathom the depth of his author; to elucidate what is obscure, and to amplify, what in modern language would he unintelligibly concise.\n\nThus most of the compound epithets of which the following Hymns chiefly consist, though very beautiful in the Greek language; yet when literally translated into ours, lose all their propriety and force.\n\nIn their native tongue, as in a prolific soil, they diffuse their sweets with full-blown elegance; but shrink like the sensitive plant at the touch of the verbal critic, or the close translator.\n\nHe who would p.\n\nxi preserve their philosophical beauties, and exhibit them to others in a different language, must expand their elegance, by the supervening and enlivening rays of the philosophic fire; and, by the powerful breath of genius, scatter abroad their latent but copious sweets.\n\nIf some sparks of this celestial fire shall appear to have animated the bosom of the translator, he will consider himself as well rewarded, for his laborious undertaking.\n\nThe ancient philosophy, has been for many years, the only study of his retired leisure; in which he has found an inexhaustible treasure of intellectual wealth, and a perpetual fountain of wisdom and delight.\n\nPresuming that such a p.\n\nxii pursuit must greatly advantage the present undertaking, and feeling the most sovereign contempt for the sordid drudgery of hired composition, he desires no other reward, if he has succeeded, than the praise of the liberal; and no other defence if he has failed, than the decision of the candid, and discerning few."

