[content]
body = "LXVI. TO ESCULAPIUS. The FUMIGATION from MANNA. GREAT Esculapius, skill'd to heal mankind,, All-ruling Pæan, and physician kind; Whose arts medic'nal, can alone assuage Diseases dire, and stop their dreadful rage: Strong lenient God, regard my suppliant pray'r, Bring gentle Health, adorn'd with lovely hair; Convey the means of mitigating pain, And raging, deadly pestilence restrain. O pow'r all-flourishing, abundant, bright, Apollo's honor'd offspring, God of light; 10 Husband of blameless Health, the constant foe Of dread Disease the minister of woe: p. 199 Come, blessed saviour, and my health defend, And to my life afford a prosp'rous end."

