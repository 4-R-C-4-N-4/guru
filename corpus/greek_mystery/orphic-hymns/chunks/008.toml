[content]
body = "SECT.\n\nII.\n\nLET us now proceed to his theology; exchanging the obscurity of conjecture for the light of clear evidence; and the intricate labyrinths of fable for the delightful though solitary paths of truth.\n\np.\n\n13 And here I must acquaint the reader, that I shall every where deduce my information from the writings of the latter Platonists; as the only sources of genuine knowledge, on this sublime and obsolete enquiry e .\n\nThe vulgar systems of mythology are here entirely useless; and he who should attempt to elucidate the theology, or hymns of Orpheus, by any modern hypothesis, would be as ridiculously employed, as he who should expect to find the origin of a copious stream, by pursuing it to its last and most intricate involutions.\n\nIn conformity with modern prejudices, the author of the Letters on Mythology, endeavours to prove, that the Orphic hymns deify the various parts of nature, not considered as animated by different intelligences but as various modifications of p.\n\n14 inert and lifeless matter.\n\nThis hypothesis is no doubt readily embraced by the present philosophers, a great part of whom, deny the existence of any thing incorporeal; and the better sort, who acknowledge one supreme immaterial Being, exclude the agency of subordinate intelligences in the government of the world; though this doctrine is perfectly philosophical, and at the same time consistent with revelation.\n\nThe belief indeed of the man, who looks no higher than sense, must be necessarily terminated by appearances.\n\nSuch a one introduces a dreadful chasm in the universe; and diffuses the deity through the world like an extended substance; divided with every particle of matter, and changed into the infinite varieties of sensible forms.\n\nBut with the ancient philosopher, the deity is an immense and perpetually exuberant fountain; whose streams originally filled and continually replenish p.\n\n15 the world with life.\n\nHence the universe contains in its ample bosom all general natures; divinities visible and invisible; the illustrious race of dæmons; the noble army of exalted souls; and men rendered happy by wisdom and virtue.\n\nAccording to this theology, the power of universal soul does not alone diffuse itself to the sea, and become bounded by its circumfluent waters, while the wide expanse of air and æther, is destitute of life and soul; but the celestial spaces are filled with souls, supplying life to the stars, and directing their revolutions in everlasting order.\n\nSo that the celestial orbs in imitation of intellect, which seeks after nothing external, are wifely agitated in perpetual circuit round the central sun.\n\nWhile some things participate of being alone, others of life, and others are endued with sentient powers; some possess the still higher faculty of reason; and lastly others, are all life and intelligence.\n\np.\n\n16 But let us rise a little higher, and contemplate the arguments by which the Platonists, establish the Orphic doctrine of the existence and agency of subordinate intelligences.\n\nThus then they reason f , Of all beings it is necessary that some should move only, that others should be entirely moved; and that the beings situated between these two, should participate of the extremes, and both move and be moved.\n\nAmong the first in dignity and order are those natures which move only; the second, those which move themselves; the third, those which move and are moved; and the fourth, those which are moved only.\n\nNow the second class of these, or the self-motive natures, since their perfection consists in transition and mutation of life, must depend upon a more ancient cause, which subsists perpetually the same; p.\n\n17 and whose life is not conversant with the circulations of time, but is constituted in the stable essence of eternity.\n\nBut it is necessary that the third class, which both move and are moved, should depend on a self-motive nature."

