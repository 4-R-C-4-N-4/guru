[content]
body = "If this is the case, do not they who deny that prayers are to be offered to the Gods, and who prevent their souls from being united with the divinities, that is with beings more excellent than themselves, appear similar to those who are deprived of their parents?\n\nLastly, all nations who have flourished in the exercise of wisdom, have applied themselves to divine prayers: as the Bramins among the Indians, the Magi among the Persians, and amongst the Greeks also, those who have excelled in the science of theology: for on this account they instituted mysteries and initiatory rites (τελεται).\n\nBesides, this consideration is not to be omitted, that since we are a part of this universe, it is consonant to reason p.\n\n69 that we should be dependent on it for support.\n\nFor a conversion to the universe procures safety to every thing which it contains.\n\nIf therefore you possess virtue, it is requisite you should invoke that divinity which previously comprehended in himself every virtue: for universal good is the cause of that good which belongs to you by participation.\n\nAnd if you seek after some corporeal good, the world is endued with a power which contains universal body.\n\nFrom hence therefore it is necessary that perfection should also extend to the parts.\n\nThus far that most excellent philosopher Porphyry; in which quotation, as well as the preceding, the reader must doubtless confess, that Proclus did not without reason admire him, for what he calls his τὰ ιεροπρεπῆ νοήματα, or conceptions adapted to holy concerns; for surely no p.\n\n70 philosopher ever possessed them in a more eminent degree.\n\nIf it should be asked, in what the power of prayer consists, according to these philosophers?\n\nI answer, in a certain sympathy and similitude of natures to each other: just as in an extended chord, where when the lowest part is moved, the highest presently after gives a responsive motion.\n\nOr as in the firings of a musical instrument, attempered to the same harmony; one chord trembling from the pulsation of another.\n\nas if it were endued with sensation from symphony.\n\nSo in the universe, there is one harmony though composed from contraries; since they are at the same time similar and allied to each other.\n\nFor from the soul of the world, like an immortal self-motive lyre, life every where resounds, but in some things more inferior p.\n\n71 and remote from perfection than in others.\n\nAnd with respect to the super-mundane Gods, sympathy and similitude subsists in these as in their most perfect exemplars; from whence they are participated by sensible natures, their obscure and imperfect images.\n\nHence (say they) we must not conceive, that our prayers cause any animadversion in the Gods, or, properly speaking, draw down their beneficence; but that they are rather the means of elevating the soul to these divinities, and disposing it for the reception of their supernal illumination.\n\nFor the divine irradiation, which takes place in prayer, shines and energizes spontaneously, restoring unity to the soul, and causing our energy to become one with divine energy.\n\nFor such, according to these philosophers, is the efficacy of prayer, that it unites all inferior with all superior p.\n\n72 beings.\n\nSince, as the great Theodorus says, all things pray except the first.\n\nIndeed so great is the power of similitude, that through its unifying nature all things coalesce, and impart their particular properties to ethers.\n\nWhilst primary natures distribute their gifts to such as are secondary, by an abundant illumination, and effects are established in the causes from which they proceed.\n\nBut the connection and indissoluble society of active universals, and of passive particulars, is every where beheld."

