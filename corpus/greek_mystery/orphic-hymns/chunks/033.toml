[content]
body = "THE INITIATIONS OF ORPHEUS .\n\np.\n\n109 TO MUSÆUS * ATTEND Musæus to my sacred song, And learn what rites to sacrifice belong.\n\nJove I invoke, the earth, and solar light, The moon's pure splendor, and the stars of night; p.\n\n110 Thee Neptune, ruler of the sea profound, 5 Dark-hair'd, whose waves begirt the solid ground; p.\n\n111 Ceres abundant, and of lovely mien, And Proserpine infernal Pluto's queen p.\n\n112 The huntress Dian, and bright Phœbus rays, Far-darting God, the theme of Delphic praise; 10 And Bacchus, honour'd by the heav'nly choir, And raging Mars, and Vulcan god of fire; The mighty pow'r who rose from foam to light, And Pluto potent in the realms of night; With Hebe young, and Hercules the strong, 15 And you to whom the cares of births belong: Justice and Piety august I call, And much-fam'd nymphs, and Pan the god of all.\n\nTo Juno sacred, and to Mem'ry fair, And the chaste Muses I address my pray'r; 20 The various year, the Graces, and the Hours, Fair-hair'd Latona, and Dione's pow'rs; Armed Curetes, household Gods I call, With those who spring from Jove the king of all: Th' Idæan Gods, the angel of the skies, 25 And righteous Themis, with sagacious eyes; With ancient night, and day-light I implore, And Faith, and Justice dealing right adore; Saturn and Rhea, and great Thetis too, Hid in a veil of bright celestial blue: 30 I call great Ocean, and the beauteous train Of nymphs, who dwell in chambers of the main; Atlas the strong, and ever in its prime, Vig'rous Eternity, and endless Time; The Stygian pool, and placid Gods beside, 35 And various Genii, that o'er men preside; p.\n\n113 Illustrious Providence, the noble train Of dæmon forms, who fill th' ætherial plain; Or live in air, in water, earth, or fire, Or deep beneath the solid ground retire.\n\n40 Bacchus and Semele the friends of all, And white Leucothea of the sea I call; Palæmon bounteous, and Adrastria great, And sweet-tongu'd Victory, with success elate; Great Esculapius, skill'd to cure disease, 45 And dread Minerva, whom fierce battles please; Thunders and winds in mighty columns pent, With dreadful roaring struggling hard for vent; Attis, the mother of the pow'rs on high, And fair Adonis, never doom'd to die, 50 End and beginning he is all to all, These with propitious aid I gently call; And to my holy sacrifice invite, The pow'r who reigns in deepest hell and night; I call Einodian Hecate, lovely dame, 55 55 Of earthly, wat'ry, and celestial frame, Sepulchral, in a saffron veil array'd, Pleas'd with dark ghosts that wander thro' the shade; p.\n\n114 Persian, unconquerable huntress hail!\n\n59 The world's key-bearer never doom'd to fail 60 On the rough rock to wander thee delights, Leader and nurse be present to our rites Propitious grant our just desires success, Accept our homage, and the incense bless."

