section = "Hymn 22. Sacred Texts Classics Index Previous Next XV. TO JUNO * . The FUMIGATION from AROMATICS. O Royal Juno of majestic mien, Aerial-form'd, divine, Jove's blessed queen, Thron'd in the bosom of cærulean air, The race of mortals is thy constant care. p. 141 The cooling gales thy pow'r alone inspires, Which nourish life, which ev'ry life desires. Mother of clouds and winds, from thee alone Producing all things, mortal life is known: All natures share thy temp'rament divine, And universal sway alone is thine. 10 With founding blasts of wind, the swelling sea And rolling rivers roar, when shook by thee. Come, blessed Goddess, fam'd almighty queen, With aspect kind, rejoicing and serene. Footnotes 140:* Juno is called by the Orphic theologers, according to Proclus Ζωογόνος ϑεά or the vivific Goddess: an epithet perfectly agreeing with the attributes ascribed to her in this Hymn. And in Theol. Plat. p. 483, he says that Juno is the source of the soul's procreation. Next: XVI: To Neptune"
translator = "Thomas Taylor"
