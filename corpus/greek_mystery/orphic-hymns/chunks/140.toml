[content]
body = "The waters of Thames, heavy laden with the wealth of merchandize, and sonorous with the din of trade, may devolve abundance in a golden tide; but we must remember that the Dæmon of commerce is at the same time advancing with giant strides, to trample on the most liberal pursuits, and is preparing with his extended savage arm, to crush the votaries of truth, and depopulate the divine retreats of philosophy.\n\nRise then ye liberal few, and vindicate the dignity of ancient wisdom.\n\nBring truth from her silent and sacred concealments, and vigorously repel the growing empire of barbaric taste; which bids fair to extinguish the celestial fire of philosophy in the rigid embraces of philology, and to bury the divine light of mind, in the sordid gloom of sense.\n\nBut if your labours should prove abortive; if the period is yet at a distance, when truth shall once more establish her kingdom; when another dream like that of Ilissus, shall become tuneful with the music of philosophy; and other cities like those of Athens and Alexandria, be filled with the sacred haunts of philosophers: there yet remains an inheritance for the lovers of wisdom in the regions of intellect, those fortunate islands of truth, where all is tranquil and serene, beyond the of power of chance, and the reach of change.\n\nLet us then fly from hence my friends, to those delightful realms: for p.\n\n227 there, while connected with body, we may find a retreat from the storms and tempests of a corporeal life.\n\nLet us build for ourselves the raft of virtue, and departing from this region of sense, like Ulysses from the charms of Calypso, direct our course by the light of ideas, those bright intellectual stars, through the dark ocean of a material nature, until we arrive at our father's land.\n\nFor there having divested ourselves of the torn garments of mortality, as much as our union with body will permit, we may resume our natural appearance; and may each of us at length, recover the ruined empire of his soul."

