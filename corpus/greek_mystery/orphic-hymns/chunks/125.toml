[content]
body = "Again, the Athenian guest speaks separately of the conjectural kind, where he treats of that music which does not propose to itself pleasure, but a true and most similar imitation of its exemplar, as in the second book of Laws.\n\nIndeed, Socrates speaks of the phantastic kind in the tenth book of the Republic, comparing it to a picture which does not represent the works of nature, but of artists; and these not such as they are, but such as they appear, not imitating their reality, but only their phantastic representation.\n\nHe likewise demonstrates that this kind of poetry is phantastic and is in the third degree from truth.\n\nBut each kind of imitation is found in Homer.\n\nFor he is then to be esteemed phantastic when he affirms any thing according to vulgar opinion; such as when ascribing the rising and setting of the sun, not from true situations, but from such as appear so to the senses, which are deceived by distance of place, But where he preserves p.\n\n213 types of imitation convenient to persons and things, as when he imitates heroes fighting, consulting, and speaking, framing deeds and discourses adapted to the life and pursuits of each, he ought to be called a conjectural poet.\n\nAnd of this kind perhaps is the lyrist of Clytemnestra, who so learnedly imitated examples of temperance by right opinion, that Clytemnestra was free from fault, while he resided with her.\n\nBut it is lawful to call the musician Thamyris, phantastic, who, instead of the ancient and simple music, endeavoured to introduce one more pleasant, diversified in many ways, and calculated to please the senses and the vulgar.\n\nHence he is feigned to have contended with the Muses themselves, by whom, having raised their anger, he was blinded; not that in reality the Muses are affected with anger, but because he was incapable of the true, simple, and ancient music; and laboured only to move the affectons and imagination, not following right opinion, or the science of imitation.\n\n213:* Calliope."

