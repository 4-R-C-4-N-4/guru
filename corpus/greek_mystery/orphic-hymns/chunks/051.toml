body = "127 hence the reason is obvious why Hercules is called \"earth's best blossom.\" And we shall find that Saturn in the following hymn is called \"blossom of the earth;\" and Themis, in Hymn 78, \"young blossom of the earth;\" and the Titans, in Hymn 36, \"the illustrious progeny of heaven and earth.\" 135:15 Ver.\n\n15.] With primogenial fires you shine .\n\nSince the intelligible world, which, as we have already observed, was produced from Æther and Chaos, is nothing else than the comprehension of all the demiurgic ideas in the divine mind, which is, according to Orpheus, the God Phanes; it remains that the sensible world, which is but the image τυ Νοζτυ Παραδείγματοσ of an intelligible paradigm, should be produced according to its similitude, and filled with its proper divinities.\n\nNow Phanes, the author of the sensible world, is represented by Orpheus (for the purpose of symbolically representing the causal production of the universe) as adorned with the heads of various animals.\n\nAccording to Athenagoras, with the head of a dragon, of a lion, and the countenance of the God himself; but according to Proclus and others, in the words of Orpheus, with the countenance of a ram, a bull, a serpent and a lion.\n\nAnd this Phanes Athenagoras informs us is denominated by Orpheus, Hercules, and Time.\n\nHence we see the reason why Hercules is said to shine with primogenial fires; since he is no other than Protogonos in the intelligible, and the Sun in the sensible world.\n\nHence too the reason is apparent why Saturn who is the same with Time, is called in the following Hymn, τιτὰν i.e.\n\nTitan, or the Sun."

