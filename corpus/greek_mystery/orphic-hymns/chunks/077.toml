[content]
body = "Gesner well observes, in his notes to this Hymn, that the comparison and conjunction of the musical and astronomical elements are most ancient; being derived from Orpheus and Pythagoras, to Plato.\n\nNow, according to the Orphic and Pythagoric doctrine, the lyre of Apollo is an image of the celestial harmony, or the melody caused by the orderly revolutions of thc celestial spheres.\n\nBut I cannot believe that Orpheus and Pythagoras considered this harmony as attended with sensible sounds, according to the vulgar acceptation of the word: for it is surely more rational to suppose, that they meant nothing more by the music of the spheres, than their harmonical proportions to each other.\n\nIndeed these wise men, to whom metaphors were familiar, may be easily conceived p.\n\n163 by vulgar sound and vulgar harmony to insinuate internal sound, and harmony subsisting in its origin and cause.\n\nHence we may consider the souls of the celestial spheres, together with the soul of the world, as composing the choir of the nine Muses; (who are called by the Platonists nine Syrens) and dancing in numerical order round Apollo the sun of the intellectual world.\n\nBut these nine Muses are far different from the marine Syrens of the poets who, resident as it were in the sea of material delights, draw us aside by their alluring melody, from the paths of rectitude.\n\nFor these are divine Syrens inviting us to the proper end of our nature; and forming from the eight tones of the eight spheres, one perfect and everlasting harmony.\n\nThe following quotation from the Platonic Nichomachus, Harm.\n\ni.\n\np.\n\n6.\n\nillustrates the meaning of the Hypate and Nete, or the highest and lowest string.\n\nFrom the motion of Saturn, (says he) \"The most remote of the planets, the appellation of the gravest sound, Hypate, is derived: but from the lunar motion, which is the lowest of all, the most acute sound is called νεάτη, Nete, or the lowest.\" But Gesner observes, that a more ancient, and as it were archetypal appellation, is derived from the ancient triangular lyre, a copy of which was found among the pictures lately dug out of the ruins of Herculaneum; where the highest chord next to the chin of the musicians is the longest, and consequently (says he) the sound is the most grave.\n\nGesner proceeds in observing, that the three seasons of the year are so compared together in a musical ratio, that Hypate signifies the Winter, Nete the Summer, and the Dorian measure represents the intermediate seasons, Spring and Autumn.\n\nNow the reason why the Dorian melody is assigned to the Spring, is because that measure wholly consists in temperament and moderation, as we learn from Plut.\n\nde Mus.\n\np.\n\n1136.\n\nE.\n\nand consequently p.\n\n164 is with great propriety attributed to the Spring, considered as placed between Summer and Winter; and gratefully tempering the fervent heat of the one, and the intense cold of the other.\n\n164:39 Ver.\n\n39.] Pan-royal .\n\nSee the notes to the Hymn to Pan, to Hercules, and the Sun.\n\n164:40 Ver.\n\n40.] Emitting whistling winds .\n\nJohannes Diaconus, in Allegorcis Theogoniæ Hesiodi, quotes the following lines from Orpheus."

