[content]
body = "SECT.\n\nIII.\n\nBUT it is now time to speak of the following Hymns, of which, as we have before observed, Onomacritus is the reputed author.\n\nAnd first, with regard to the dialect of these Hymns, Gesner well observes it ought to be no objection to their antiquity.\n\nFor though, according to x Iamblichus, the Thracian Orpheus, who is more ancient than those noble poets Homer and Hesiod, used the Doric dialect; yet the Athenian Onomacritus, who, agreeable to the general opinion of antiquity, is the author of all the works now extant, ascribed to Orpheus y , might p.\n\n86 either, preserving the sentences and a great part of the words, only change the dialect, and teach the ancient Orpheus to speak Homerically, or as I may say Solonically: or might arbitrarily add or take away what he thought proper, which Herodotus relates was his practice, with respect to the oracles.\n\nGesner adds, that it does not appear probable to him that Onomacritus would dare to invent all he writ, since Orpheus must necessarily, at that time, have been in great repute, and a variety of his verses in circulation: and he concludes with observing that the objection p.\n\n87 of the Doric dialect ought to be of no more weight against the antiquity of the present works, than the Pelasgic letters, which Orpheus used according to Diodorus Siculus.\n\nThe hymns of Orpheus are not only mentioned by Plato in his Eighth Book of Laws, but also by Pausanias a , whose words are translated as follows by the author of the Letters on Mythology b .\n\n\"The Thracian Orpheus (says Pausanias) was represented on mount Helicon, with ΤΕΛΕΤΗ (initiation or religion) by his side, and the wild beasts of the woods, some in marble, some in bronze, standing round him.\n\nHis hymns are known by those who have studied the poets to be both short and few in number.\n\nThe Lycomedes, an Athenian p.\n\n88 family dedicated to sacred music, have them all by heart, and sing them at their solemn mysteries.\n\nThey are but of the second class for elegance., being far excelled by Homer's in that respect.\n\nBut our religion has adopted the hymns of Orpheus, and has not done the same honour to the hymns of Homer.\" To the testimony of Pausanias may be added that of Suidas, who, among the writings of the Libethrian Orpheus mentions τελεται, or initiations, which he says are by some ascribed to Onomacritus c .\n\nAnd Scaliger well observes, in his notes co these hymns, that they ought rather to be called initiations, because they contain only invocations of the Gods, p.\n\n89 such as the initiated in mysteries are accustomed to use; but they do not celebrate the nativities, actions, &c.\n\nof the divinities, as it is usual in hymns.\n\nIt is on this account we have entitled them mystical initiations, which is doubtless their proper appellations.\n\nThe author too of the Allegories in the Theogony of Hesiod d , relating the powers of the planets on things inferior, expressly mentions these hymns, or rather initiations, and many of the compound epithets with which they abound e .\n\nFrom all which it is evident that the following Hymns were written by the Athenian Onomacritus, and are the same with those so much celebrated by antiquity.\n\nIndeed it is not probable they Should be the invention of any writer more p."

