[content]
body = "And in that to Death οἴ πάντων ϑητῶν οἴηκα κρατύνωεις.\n\n100:a Lib.\n\niv.\n\np, 128.\n\n101:b The reader may observe that this two-fold power is divided into male and female; the reason of which distribution we have already assigned from Proclus.\n\n104:c I have omitted a comparison between the eighth sphere and Pericionius from necessity, because there is no hymn among the following to that p.\n\n105 orb.\n\nAnd I have not contrasted Licnitan Bacchus with the lunar Sphere, because the resemblance is not apparent; though doubtless there is a concealed similitude.\n\n105:d This is evident from the following epistle of Lucas Holstenius to P.\n\nLambecius, preserved by Fabricius in that excellent work, his Bibliotheca Græca, tom, i.\n\np.\n\n117 .\n\nHabeo et Orphei exemplar p.\n\n106 non contemnendum, ex quo Argonautica plurimis locis emendavi.\n\nAuctor ille huc usque a Criticorum et Correctorum vulgo derelictus tuam exposcere videtur operam.\n\nHymni autem reconditæ antiquitatis plenissimi justum commentarium me entur, quem vel unius, Procli scripta ἀνέκδοτα tibi instruent, ut ex notis meis as Sallustium Philosophum prospicies: ne quid de cæteris, quos apud me habeo, Platonicis nunc dicam, in quibus τῆσ μυθικης ϑεολογίας thesaurus latet."

