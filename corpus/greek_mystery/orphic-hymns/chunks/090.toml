body = "XLIV. TO DIONYSIUS BASSAREUS TRIENNALIS * . A HYMN COME, blessed Dionysius, various nam'd, Bull-fac'd, begot from Thunder, Bacchus fam'd. Bassarian God, of universal might, Whom swords, and blood, and sacred rage delight: In heav'n rejoicing, mad, loud-sounding God, 5 Furious inspirer, bearer of the rod: By Gods rever'd, who dwell'st with human kind, Propitious come, with much-rejoicing mind. Footnotes 178:* So called because his rites were performed every third year."

