[content]
body = "For we preserve as sacred to those divinities, a perpetual fire in our temples; since this element is most similar to their lucid frames.\n\nBut with respect to fumigations from herbs produced by the earth, they called the censer or pan, in which the herbs were burnt, ϑυμιατήριος, and to perform sacrifice ϑύειν, and the sacrifices themselves ϑυσίαι all which we have erroneously interpreted, as if these words were p.\n\n48 signatures of that error, which afterwards crept in among us; and hence it is that we call the worship consisting from the slaughter of animals ϑυσίαι.\n\nIndeed so great was the care of the ancients, in retaining their pirmæval customs, that they uttered imprecations against those who deserted the old manner, and introduced a new one: and therefore they called those herbs with which we now fumigate αρωμάτα, aromatics.\n\nBut the antiquity of the above mentioned fumigations will be perceived by him who considers that even now many odorous kinds of wood, cut into fragments, are employed in sacrifice.\n\nFrom whence it happened that the earth now bearing trees together with grass, its earliest production, men at first eating the fruits of oaks, burned only a few of these in sacrifices to the Gods, on p.\n\n49 account of the rarity of such sustenance; but sacrificed a multitude of the leaves.\n\nAfterwards human life passed to a gentle diet, and sacrifices were performed with nuts; from whence the proverb originated, ἄλις δρυὸς, enough of the oak.\n\n\"But among the fruits of Ceres, after the first appearance of leguminous barley, mankind were accustomed to sprinkle it, made into an entire mass, in their first sacrifices.\n\nAfterwards breaking the barley, and diminishing the nutriment into meal, having concealed the instruments of so great a work, which afford divine assistance to human life, they approached these as certain sacred concerns.\n\nBut they cast the first fruits of the barley (when bruised into meal) and which was more esteemed than when whole, into the fire, in sacrifice to the Gods: from whence even now, at the conclusion of the sacrifice, we make use of p.\n\n50 meal mixed with wine and oil.\n\nBy this custom indeed we indicate from whence, and from what beginnings sacrifices have increased to the present state: but, at the same time, we do not consider why such things are performed.\n\nMankind proceeding from these small beginnings, and the earth yielding an abundant supply of corn and various fruits, they judged that the first produce of all the rest should be offered in sacrifices, with a view of pleasing the various orders of the Gods: selecting many things for this purpose, and mingling not a few others with these, if they possessed any thing beautiful, and on account of its odoriferous nature accommodated to divine sensation.\n\nWith some of these, formed into garlands, they encircled the statues of the Gods; and others they sacrificed with fire.\n\nLikewise to the Gods as the proper causes, they poured p.\n\n51 forth the divine drops of wine, and honey, and oil, when their uses were first discovered.\n\n\"The truth of the preceding account appears to be confirmed by the procession celebrated even now at Athens, in honour of the sun and the hours."

