section = "Hymn 63. Sacred Texts Classics Index Previous Next LVI. TO THE TERRESTRIAL HERMES. The FUMIGATION from STORAX. HERMES I call, whom Fate decrees to dwell In the dire path which leads to deepest hell O Bacchic Hermes, progeny divine Of Dionysius, parent of the vine, p. 189 And of celestial Venus Paphian queen, 5 Dark eye-lash'd Goddess of a lovely mien: Who constant wand'rest thro' the sacred feats Where hell's dread empress, Proserpine, retreats; To wretched souls the leader of thc way When Fate decrees, to regions void of day: 10 Thine is the wand which causes sleep to fly, Or lulls to slumb'rous rest the weary eye; For Proserpine thro' Tart'rus dark and wide Gave thee forever flowing souls to guide. Come, blessed pow'r the sacrifice attend, 15 And grant our mystic works a happy end. Next: LVII: To Cupid, or Love"
translator = "Thomas Taylor"
