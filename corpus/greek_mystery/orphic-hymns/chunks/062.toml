[content]
body = "XXI. TO THE SEA, OR TETHYS * . The FUMIGATION from FRANKINCENSE and MANNA. TETHYS I call, with eyes cærulean bright, Hid in a veil obscure from human sight; Great Ocean's empress, wand'ring thro' the deep, And pleas'd with gentle gales, the earth to sweep; p. 147 Whose blessed waves in swift succession go, 5 And lash the rocky shore with endless flow: Delighting in the Sea serene to play, In ships exulting and the wat'ry way. Mother of Venus, and of clouds obscure, Great nurse of beasts, and source of fountains pure. 10 O venerable Goddess, hear my pray'r, And make benevolent my life thy care; Send, blessed queen, to ships a prosp'rous breeze, And waft them safely o'er the stormy seas. Footnotes 146:* See the last note to Hymn v. for an explanation of the Goddess Tethys."

