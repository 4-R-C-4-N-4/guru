[content]
body = "IX.\n\nTO NATURE.\n\n* The FUMIGATION from AROMATICS.\n\nNATURE, all parent, ancient, and divine, O Much-mechanic mother, art is thine; p.\n\n127 Heav'nly, abundant, venerable queen, In ev'ry part of thy dominions seen.\n\np.\n\n128 Untam'd, all-taming, ever splendid light, 5 All ruling, honor'd, and supremly bright.\n\nImmortal, first-born, ever still the same, Nocturnal, starry, shining, glorious dame.\n\nThy feet's still traces in a circling course, By thee are turn'd, with unremitting force.\n\n10 Pure ornament of all the pow'rs divine, Finite and infinite alike you shine; 12 To all things common and in all things known, Yet incommunicable and alone.\n\nWithout a father of thy wond'rous frame, 15 Thyself the father whence thy essence came.\n\nAll-flourishing, connecting, mingling soul, Leader and ruler of this mighty whole.\n\nLife-bearer, all-sustaining, various nam'd, And for commanding grace and beauty fam'd.\n\n20 Justice, supreme in might, whose general sway The waters of the restless deep obey.\n\nÆtherial, earthly, for the pious glad, Sweet to the good, but bitter to the bad.\n\nAll-wife, all bounteous, provident, divine, 25 A rich increase of nutriment is thine; p.\n\n129 Father of all, great nurse, and mother kind, Abundant, blessed, all-spermatic mind: Mature, impetuous, from whose fertile seeds And plastic hand, this changing scene proceeds.\n\n30 All-parent pow'r, to mortal eyes unseen, Eternal, moving, all-sagacious queen.\n\nBy thee the world, whose parts in rapid flow, 33 Like swift descending streams, no respite know, On an eternal hinge, with steady course 35 Is whirl'd, with matchless, unremitting force.\n\nThron'd on a circling car, thy mighty hand Holds and directs, the reins of wide command.\n\nVarious thy essence, honor'd, and the best, Of judgement too, the general end and test.\n\n40 p.\n\n130 Intrepid, fatal, all-subduing dame, Life-everlasting, Parca, breathing flame.\n\nImmortal, Providence, the world is thine, And thou art all things, architect divine.\n\nO blessed Goddess, hear thy suppliant's pray'r, 45 And make my future life, thy constant care; Give plenteous seasons, and sufficient wealth, And crown my days with lasting, peace and health.\n\nFootnotes 126:* Nature, according to the theologists, as related by Proclus, in Tim.\n\np.\n\niv.\n\nis the last of the demiurgic causes of this sensible world, and the boundary of the latitude of incorporeal essences: and is full of reasons and powers, by which she governs the universe, every where connecting parts with their wholes.\n\nHence p.\n\n127 Nature is represented in this Hymn as turning the still traces of her feet with a swift whirling.\n\nFor since she is the last of the demiurgic causes, her operations aptly symbolize with the traces of feet.\n\nNow the reason why the epithets of much-mechanic, all-artist, connecting, all-wife, providence, &c.\n\nare given to nature, which evince her agreement with Minerva, is because that Goddess, according to the Orphic theology, fabricated the variegated veil of nature, from that wisdom and virtue of which she is the presiding divinity."

