[content]
body = "Some are the causes of conversion to inferiors, and of collecting the multitude of progressive natures to their proper principles: while others promote their progression and procreation, emanating from principles, as their source.\n\nSome supply the power of generating to inferiors; and others exhibit a constant and undefiled purity.\n\nThere are some, again, containing the cause of separable goods; and others, of such goods as subsist together with their recipients.\n\nIndeed, after this manner, the various contrariety of such kinds appears in all the administrations of true being.\n\nThus the station or quiet of things constantly establishing being in themselves, resists efficacious and vital powers of motion.\n\nSo the communication of identity, on every side similar to itself (if the expression may be allowed) is specially opposed to the discretions of diversity.\n\nThus, too, similitude fights with dissimilitude, and equality with inequality.\n\nSince this is the case, can it be wonderful, that mythologists, perceiving a contrariety of this kind among the Gods, and the first principles p.\n\n159 of things, should represent it to their pupils by contentions and wars?\n\nFor though the divine genera are always united with each other, yet they preside as well over those who administer to union, as over those who machinate confusion.\n\nAnd this is the first reason of the wars of the Gods.\n\nBut it is lawful to produce another reason, and to affirm that the Gods are indeed indivisibly conjoined, and subsist together in mutual uniformity: but that their progressions into the universe, and participations by recipient natures, become disjoined and divisible, and by this means filled with contrariety.\n\nFor things subject to the power of the Gods, cannot receive their diffused powers, and multiform illustrations, without mixture and confusion.\n\nHence the last orders dependent on the Gods, since they are produced by a long interval from the first causes, but are contiguous to the concerns they administer, and adhere to matter, contract contrariety, and an all-various division; partially presiding over material affairs, and diminishing and dispersing those separate powers, which before subsisted in a superior manner, uniformly and indivisibly, in their primitive causes.\n\nSince, then, such and so many are the ways, by which, according to the mysteries of theologists, war is usually referred to the Gods; other poets who, seized with fury, have interpreted divine concerns, introduced the battles and wars of the Gods, according to the first reasons, i.\n\ne.\n\nso far as the divine genera admit of diversity, according to the first principles of all things.\n\nFor fables, concealing truth under a veil, shew that such things as recall to principles , oppose and fight with the authors of generation: collecting with separating natures, things unifying with such as multiply by the progression of beings; and universal genera, with such as operate in a partial and particular manner.\n\nHence they relate, that the Titans (or dæmons subservient to Nature) fight with Bacchus, (or Nature) and the giants with Jove.\n\np.\n\n160 For union, and an indivisible work, is proper to Bacchus and Jupiter, as the demiurgic causes of the world; but the Titans and Giants produce the demiurgic powers into multitude; partially administering the concerns of the universe, and existing as the proximate parents of material natures.\" Thus far Proclus.\n\nFor a farther account of Minerva, see the note to Hymn ix.\n\nto Nature."

