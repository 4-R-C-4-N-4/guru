[content]
body = "207 fury arises from truth, and the amatorial from beauty; so the poetic proceeds from divine symmetry, by means of which it most intimately unites the poets with the Gods.\n\nPlato, in the Phædrus, speaking of this Fury, says that it is an occupation of the Muses; and a Fury sent from above on tender and untouched souls.\n\nThat its employment is to fufcitate and inspire the poet, according to odes and the other kinds of poetry but its end, the instruction of posterity by celebrating the infinite deeds of antiquity.\n\nFrom these words it is plain, that Plato, in the first place, ascribes divinity to this kind of poetry, as being derived from the Muses; who fill as well intelligible as sensible works with paternal harmony, and ellegant motion.\n\nBut he calls it an occupation, because the whole illustrated soul, resigns itself to the present effect of illuminating divinity: and a Fury, because it relinquishes its own proper ingenuity, and is carried according to the vigorous impulse of a superior power.\n\nAgain, in the second place he describes the habit of the soul thus occupied: for, he say, it ought to be tender and untouched; not rigid, hard, and filled with many and various opinions, foreign from inspiring divinity: but it should be soft and tender, that it may easily admit divine inspiration; and untouched, that it may be sincere and empty of all other concerns.\n\nIn the third place, he adds its common employment; that it is perfected by the afflatus of the Muses, and by the soul properly disposed for its reception.\n\nIndeed fafcitation is an elevation of the soul, an operation but little depraved, and a vigorous conversion to the deity, from a lapse into the whirls of generation.\n\nBut an afflatus is a divine motion, and an unwearied musical dance towards the inspiring deity.\n\nLastly, he testifies that human concerns spoken from a divine mouth, become more perfect, illustrious, and more convenient for the delivery of true doctrine to the hearers, Not that this kind of poetry is accommodated p.\n\n208 to juvenile tuition, but is the most convenient of all for the instruction of those who are perfect in politic discipline, and who earnestly desire the mystical tradition of divine concerns.\n\nOn this account, Plato deservedly prefers it to all human arts.\n\nBut he who (as he writes in the same place) approaches to the poetic gates, without the Fury of the Muses, trusting that he may become a good poet by a certain art, will be himself empty, as well as his poetry, in respect of that which proceeds from Fury; before whose presence, the poetry vanishes which is dictated by prudence alone.\" Thus far from the Phædrus.\n\nAgain, not dissimilar to these, are the words of Socrates in the Iö.\n\nFor when the rhapsodist affirms, that he abounds with a copiousness of discourse on Homer, but not upon the other poets, Socrates ascribes the cause of this to his being moved by divine force, and not by art.\n\nFor unless he was peculiarly inclined to Homer by a divine instinct, he would he equally as copious on all other poets as upon Homer.\n\nBut the first mover says he is a God or a Muse, that is a divine cause; from thence the poet is excited, and from him again the rhapsodist.\n\nHence poetic Fury is a medium between a divine principle and the rhapsodist, moving, and at the same time moved, and distributing supernal gifts to inferiors, by a certain latent consent; by means of which, these degrees cohere among themselves in the same manner as many iron rings depending from a magnet, each of which communicates in gradation, its alluring and attractive power to the other."

