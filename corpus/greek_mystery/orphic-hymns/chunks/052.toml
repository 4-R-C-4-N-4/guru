[content]
body = "XII. TO SATURN. The FUMIGATION from STORAX. ETHERIAL father, mighty Titan, hear, 1 Great fire of Gods and men, whom all revere: Endu'd with various council, pure and strong, To whom perfection and decrease belong. Consum'd by thee all forms that hourly die, 5 By thee restor'd, their former place supply; The world immense in everlasting chains, Strong and ineffable thy pow'r contains Father of vast eternity, divine, O mighty Saturn, various speech is thine: 10 Blossom of earth and of the starry skies, Husband of Rhea, and Prometheus wife. p. 137 Obstetric Nature, venerable root, From which the various forms of being shoot; No parts peculiar can thy pow'r enclose, 15 Diffus'd thro' all, from which the world arose, O, best of beings, of a subtle mind, Propitious hear to holy pray'rs inclin'd; The sacred rites benevolent attend, And grant a blameless life, a blessed end. Footnotes 136:1 Ver. 1.] Mighty Titan . See the notes to the preceding hymn."

