[content]
body = "XLVIII. TO IPPA * The FUMIGATION from STORAX. Great nurse of Bacchus, to my pray'r incline, For holy Sabus' secret rites are thine, The mystic rites of Bacchus' nightly choirs, Compos'd of sacred, loud-resounding fires: Hear me, terrestrial mother, mighty queen, 5 Whether on Phyrgia's holy mountain + seen, Or if to dwell in Tmolus thee delights, With holy aspect come, and bless these rites. Footnotes 180:* Ippa according to Proclus is same with Juno. 180:+ Ida."

