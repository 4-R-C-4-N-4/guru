body = "A Dissertation ON THE Life and Theology of ORPHEUS.\n\nSECT.\n\nI.\n\nTHE great obscurity and uncertainty in which the history of Orpheus is involved, affords very little matter for our information; and even renders that little, inaccurate and precarious.\n\nUpon surveying the annals of past ages, it seems that the greatest geniuses, have been subject to this historical darkness as is evident in those great lights of antiquity, Homer and Euclid, whose writings indeed enrich mankind with perpetual p.\n\n2 stores of knowledge and delight; but whose lives are for the most part concealed in impenetrable oblivion.\n\nBut this historical uncertainty, is no where so apparent, as in the person of Orpheus; whose name is indeed acknowledged and celebrated by all antiquity (except perhaps Aristotle alone); while scarcely a vestige of his life is to be found amongst the immense ruins of time.\n\nFor who has ever been able to affirm any thing with certainty, concerning his origin, his age, his parents, his country, and condition?\n\nThis alone may be depended on, from general assent, that there formerly lived a person named Orpheus, whose father was Œagrus, who lived in Thrace, and who was the son of a king, who was the founder of theology, among the Greeks; the institutor of their life and morals; the first of prophets, and the prince of poets; himself the offspring of a Muse; who taught the p.\n\n3 Greeks their sacred rites and mysteries, and from whose wisdom, as from a perpetual and abundant fountain, the divine muse of Homer, and the philosophy of Pythagoras, and Plato, flowed; and, lastly, who by the melody of his lyre, drew rocks, woods, and wild beasts, stopt rivers in their course, and ever, moved the inexorable king of hell; as every page, and all the writings of antiquity sufficiently evince.\n\nSince thus much then may be collected from universal testimony, let us, pursue the matter a little farther, by investigating more accurately the history of the original Orpheus; with that of the great men who have, at different periods, flourished under this venerable name.\n\nThe first and genuine Orpheus, was a poet of Thrace, and, according to the opinion of many, the disciple of Linus; who flourished, says Suidas, at the time when the kingdom of the Athenians was p.\n\n4 dissolved.\n\nSome assert that he was prior to the Trojan wars, and that he lived eleven, or according to others nine generations.\n\nBut the Greek word γενεα, or generation, according to Gyraldus, a , signifies the space of seven years; for unless this is supposed, how is it possible that the period of his life can have any foundation in the nature of things?\n\nPlutarch indeed, Heraclitus, Suidas, and some grammarians, assert that this word signifies a space of thirty years: but omitting the discussion of this latter opinion, from its impossibility, we shall embrace the former, agreeable to which Orpheus lived sixty-three years; a period, if we may believe the astrologers fatal to all, and especially to great men, as was the case with Cicero and Aristotle.\n\nOur poet, according to fabulous tradition, was torn in pieces by Ciconian p.\n\n5 women: on which account, Plutarch affirms the Thracians were accustomed to beat their wives, that they might revenge the death of Orpheus."

