body = "Sebazius and Jupiter evidently agree, for Sebazius is expressly called ὐι# ( ) Κρονυ, son of Saturn.\n\nAnd Amphietus is celebrated as moving in concert with the circling hours, Ἐυάζων κινῶν τε χορῦσ ἐνὶ κυκλάσιν ὥραις which corresponds with Saturn, who is called in these Hymns , or the Sun c .\n\nAnd lastly, Dionysius who is called p.\n\n105 called in these Initiations Eribromus, is denominated δικέρωτα or two-horned, which is also an epithet of Pan, or the soul of the world.\n\nAnd thus much for the doctrine of these Hymns, so far as is requisite to an introductory Dissertation.\n\nWhat farther light we have been able to.\n\nthrow on these mysterious remains of antiquity, will appear in our following Notes.\n\nIf the valuable Commentary of Proclus on the Cratylus of Plato was once published, I am persuaded we should find them full of the most recondite antiquity d : but as p.\n\n106 this is not to be expected in the present age, the lovers of ancient wisdom, will I doubt not, gratefully accept the preceding and subsequent elucidations.\n\nFor on a subject so full of obscurity as the present, a glimmering light is as conspicuous, and as agreeable to the eye of the mind, as a small spark in profound darkness is to the corporeal sight.\n\nFootnotes 85:x De Vita Pythag.\n\nc.\n\n34.\n\np.\n\n169.\n\nKuft.\n\n85:y Philoponus observes, in his Commentary on Aristotle's books of the Soul, that Aristotle calls p.\n\n86 the Orphic verses reputed, because they appear not to have been written by Orpheus himself, as Aristotle affirms in his book concerning philosophy.\n\nFor the Dogmata contained in them were indeed his,, but Onomacritus is reported to have put them into verse.\n\n87:a In Boeoticis p.\n\n770 87:b Page 167.\n\n88:c It is remarkable that Sextus Empiricus more than once mentions Onomacritus in the Orphics.\n\nΟιομάκρίλ# ( ) ἒν τοῖσ Ορφικοῖσ.\n\n89:d Page 267.\n\n89:e Vide Fabric.\n\nBib.\n\np.\n\n124.\n\n90:f In Timæum p.\n\n291.\n\n91:g Συμφωνία Ορφέωσ, Πυθαγορυ, καὶ πλατονοσ.\n\n91:h In Tim.\n\np.\n\n289.\n\n91:i In Theol.\n\nPlat.\n\np 13.\n\n94:k πάντων κληΐδα ἒχοντας, Αιθέρ# ( ),ερανισ, κ.λ.\n\n94:l πόντυ κληΐδασ ἒχοντα.\n\n94:m Σοὶ ποτκμοὶ κροσοται ἀεὶ κ πᾶσα ϑάλασσα.\n\n96:n In the hymn to Love Μῦν# ( ) γὰρ τύτων πάνων οἲηκα κρατύνεις."

