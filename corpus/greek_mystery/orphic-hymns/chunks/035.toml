[content]
body = "Thus a bond among men, is the impediment and retention of action: but in divine concerns it insinuates a conjunction and ineffable union with causes; and hence the Saturnian bonds signify the union of the deiurgus of the universe, with the intelligible and paternal excellence of Saturn.\n\nA falling and precipitation signifies with us a violent motion; but in divine concerns, it indicates a prolific progression, and a presence every where loosened and free, which does not desert its proper principle, but depending from it pervades through every order.\n\nAfter this manner, the precipitation of Vulcan intimates the progression of divinity from the highest principle, to the extreme artificers of sensible things; which process is moved, perfected, and deduced from the first demiurgus and parent.\n\nThus too castration in bodies which are composed of parts and matter, brings on a diminution of power: but in primary causes it shadows forth the progression of such as are secondary into a subject order: since primary causes revolve and produce the powers placed in their essences, yet are neither moved through the egression of secondaries, nor diminished by their separation, nor divided by the laceration of inferiors.\n\n113:55 Ver.\n\n55.] Jo Diac.\n\nAllegor.\n\nand Hesiodi Theog.\n\np.\n\n268.\n\ncites this line, upon which, and hymn lxxi.\n\n3.\n\nhe observes, Εὑρίσκω, τὸν Ὀξφέα καὶ τὴν ΤΥΧΗΝ ἈΡΤΕΜΙΝ προταγορεύοτα, αλλὰ καὶτη ΣΕΛΗΝΗΝ ΕΚΑΤΗΝ, i.e.\n\n\"I find that Orpheus calls Fortune Artremis, or Diana, and also the Moon, Hecate.\" 114:59 Ver.\n\n59.] Diodorus informs us that Diana, who is to be understood by this epithet, was very much worshipped by the Persians, and that this goddess was called Persæa in his Time.\n\nSee more concerning this epithet in Gyrald.\n\nSyntag.\n\nii.\n\np.\n\n361."

