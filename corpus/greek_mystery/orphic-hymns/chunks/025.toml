[content]
body = "30:i I have here followed the correction of Eschenbach, who reads σείρα instead of συῥῥα which is I think more expressive and philosophical.\n\n32:k His mind is truth, and a little after, His; body full of light; or, Νοῦσ δέ ἀψευδὴς and Σωμα δέ ϖεριψεγγὲς, perfectly agree with what Pythagoras affirmed, concerning God; that in his soul he resembled truth, and in his body light.\n\n33:l Enn.\n\n5, lib, vi.\n\n34:m Vide Ἀφορμαὶ ϖρὸς τα Νοητά.\n\np.\n\n233.\n\n36:n Meaning material forms and qualities.\n\n36:o It is remarkable that in the Hymn to Nature, among the following, the Deity is celebrated as all things, yet the poet adds that he is p.\n\n37 alone incommunicable; which perfectly agrees with the preceding account of his subsisting in all things, and at the same time being separate and apart from all.\n\n37:p If the word Gods offends the ear of the reader, he may substitute in its stead, thrones, dominions; &c.\n\nfor I do not discourse concerning words.\n\n38:q Stob.\n\nEcl.\n\nPhys.\n\np.\n\n5.\n\n38:r En.\n\n2.\n\nlib.\n\nix.\n\ncap.\n\n9.\n\n40:s In Tim.\n\np.\n\n286.\n\n42:t De Abstinentia, lib.\n\ni.\n\n56:e In the latter part of this Dissertation, we shall shew the wonderful agreement of the following Hymns, with the names given by Pythagoras to numbers.\n\n74:x As a Latin version only of this valuable work is published, the reader will please to make allowances for the Paraphrase, where it may be requisite."

