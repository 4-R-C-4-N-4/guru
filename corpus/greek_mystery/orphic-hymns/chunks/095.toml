section = "Hymn 56. Sacred Texts Classics Index Previous Next p. 181 XLIX. TO LYSIUS LENÆUS. A HYMN. Hear me, Jove's son, blest Bacchus, God of wine, Born of two mothers, honor'd and divine; Lysian, Euion * Bacchus, various-nam'd, Of Gods the offspring secret, holy, fam'd: Fertile and nourishing whose liberal care 5 Earth's fruits increases, flourishing and fair; Sounding, magnanimous, Lenæan pow'r O various form'd, medic'nal, holy flow'r: Mortals in thee, repose from labour find, Delightful charm, desir'd by all mankind: 10 Fair-hair'd Euion, Bromian, joyful God, Lysian, invested with the leafy rod. To these our rites, benignant pow'r incline, When fav'ring men, or when on Gods you shine; Be present to thy mystic's suppliant pray'r, 15 Rejoicing come, and fruits abundant bear. Footnotes 181:* Euion ingeminat, reparabilis assonat Echo. Persius . Next: L: To the Nymphs"
