[content]
body = "LII. To AMPHIETUS BACCHUS. The FUMIGATION from every AROMATIC except FRANKINCENSE. TERRESTRIAL Dionysius, hear my pray'r, Awak'ned rise with nymphs of lovely hair: Great Amphietus Bacchus, annual God, Who laid asleep in Proserpine's abode, Did'st lull to drowsy and oblivious rest, The rites triennial, and the sacred feast; Which rous'd again by thee, in graceful ring, Thy nurses round thee mystic anthems sing; When briskly dancing with rejoicing pow'rs, Thou mov'st in concert with the circling hours. 10 Come, blessed, fruitful, horned, and divine, And on these rites with joyful aspect shine; Accept the general incense and the pray'r, And make prolific holy fruits thy care."

