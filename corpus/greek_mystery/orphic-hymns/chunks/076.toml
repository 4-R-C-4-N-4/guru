[content]
body = "XXXIII.\n\nTO APOLLO.\n\nThe FUMIGATION from MANNA.\n\nBLEST Pæan, come, propitious to my pray'r, Illustrious pow'r, whom Memphian tribes revere, Slayer of Tityus, and the God of health, Lycorian Phœbus, fruitful source of wealth .\n\nSpermatic, golden-lyr'd, the field from thee 5 Receives it's constant, rich fertility.\n\nTitanic, Grunian, Smynthian, thee I sing, 7 Python-destroying, hallow'd, Delphian king: Rural, light-bearer, and the Muse's head, Noble and lovely, arm'd with arrows dread: 10 Far-darting, Bacchian, two-fold, and divine, 11 Pow'r far diffused, and course oblique is thine.\n\nO, Delian king, whose light-producing eye Views all within, and all beneath the sky: p.\n\n162 Whose locks are gold, whose oracles are sure, 15 Who, omens good reveal'st, and precepts pure: Hear me entreating for the human kind, Hear, and be present with benignant mind; For thou survey'st this boundless æther all, And ev'ry part of this terrestrial ball 20 Abundant, blessed; and thy piercing sight, Extends beneath the gloomy, silent night; Beyond the darkness, starry-ey'd, profound, The stable roots, deep fix'd by thee are found.\n\nThe world's wide bounds, all-flourishing are thine, 25 Thyself all the source and end divine: 'Tis thine all Nature's music to inspire, With various-sounding, harmonising lyre; Now the last string thou tun'ft to sweet accord, 29 Divinely warbling now the highest chord; 30 p.\n\n163 Th' immortal golden lyre, now touch'd by thee, Responsive yields a Dorian melody.\n\np.\n\n164 All Nature's tribes to thee their diff'rence owe, And changing seasons from thy music flow Hence, mix'd by thee in equal parts, advance 35 Summer and Winter in alternate dance; This claims the highest, that the lowest string, The Dorian measure tunes the lovely spring .\n\nHence by mankind, Pan-royal, two-horn'd nam'd, 39 Emitting whistling winds thro' Syrinx fam'd; 40 40 Since to thy care, the figur'd seal's consign'd, 41 Which stamps the world with forms of ev'ry kind.\n\np.\n\n165 Hear me, blest pow'r, and in these rites rejoice, And save thy mystics with a suppliant voice.\n\nFootnotes 161:7 Ver.\n\n7.] Grunian .\n\nAccording to Strabo, lib.\n\nxiii.\n\nGrynæus is a town of Myrinæus: likewise, a temple of Apollo, and a most ancient oracle and temple, sumptuously built of white stone.\n\nGyrald.\n\nSyntag.\n\np.\n\n237.\n\n161:11 Ver.\n\n11.] Far-darting .ἑκατηϐελετησ Proclus, on Plato's Cratylus, informs us he is so called, ὅτι χορηγὸσ ὤς, καὶ εξερομενοσ ἐπὶ παντασ ποιεῖ τας ενεργείας.\n\ni.\n\ne, \"because since he is the choragus or leader of the choir of the Muses, he produces energies in all things.\" 162:29 Ver.\n\n29.] Now the last string , &c."

