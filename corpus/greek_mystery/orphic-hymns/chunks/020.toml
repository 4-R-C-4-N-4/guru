[content]
body = "But the bodies of the malevolent dæmons are of a discordant temperament, on which account they inhabit that aerial space proximate to the earth, with a passive affection; and for the most part govern p.\n\n64 things subject to their dominion with a turbulent malignity.\n\nHence there is no evil which they do not endeavour to perpetrate.\n\nFor their manners are entirely violent and fraudulent, and destitute of the guardian preservation of better dæmons; so that they machinate vehement and sudden snares with which they rush on the unwary; sometimes endeavouring to conceal their incursions, and sometimes acting, with open violence against the subjects of their oppression.\" Thus far Porphyry: the length of which quotation needs no apology; both on account of its excellence, and because the unlearned reader will not find it elsewhere in English.\n\nI would also add that I wish (with a proper sense of the greatness of the undertaking) to offer this, together with the preceding and subsequent paraphrases, as specimens of that method mentioned in the Preface to this Work; and p.\n\n65 which I cannot but consider as the best means of exhibiting the Greek philosophy in modern languages.\n\nHaving then discoursed so largely from Porphyry concerning sacrifice, and as he particularly recommends the sacrifice performed by contemplation and divine hymns; let us hear his sentiments concerning the nature of prayer, as they are preserved to us by Proclus in his excellent Commentary on the Timæus, p.\n\n64.\n\n\"It is requisite (says Proclus) before all things, that we understand something perspicuously concerning the nature of prayer: I mean in what its essence consists, what its perfection is, and from whence it becomes natural to our souls.\n\nHe then proceeds to relate the opinion of Porphyry as follows.\n\nFor Porphyry discoursing concerning such of the ancients as either approved p.\n\n66 of, or exploded prayer, leads us through various opinions, which I shall now summarily relate.\n\nNeither those who labour under the first kind of impiety, I mean denying the existence of the Gods, claim any advantage to themselves from prayer: nor yet those of the second class, who entirely subvert a providence; for though they acknowledge the existence of the Gods, yet they deny their provident concern for the affairs of the universe.\n\nNor again those of a third order, who they confess that there are Gods, and that their providence extends to the world, yet consider all things as produced by the divinities from necessity: for the utility of prayer is derived from such things as are contingent, and may have a different existence.\n\nBut those who both acknowledge the being of the Gods, and p.\n\n67 their continual providence, and that some events are contingent, and may subsist in a different manner; these men indeed may be truly said to approve of prayer, and to confess that the Gods correct our life, and establish it in safety.\n\nProclus then proceeds to relate the reasons by which Porphyry confirms its utility.\n\n\"He adds that prayer in a particular manner pertains to worthy men, because it conjoins them with divinity; for similars love to be united together: but a worthy man is in an eminent degree similar to the divine natures.\n\nWe may likewise add, that since good men are placed in custody, and confined by the dark bands of the body as in a prison, they ought to pray to the Gods, that it may be lawful for them to depart from hence.\n\nBesides, since we are as children torn from the bosom of our parent, p.\n\n68 we ought on this account to request by our prayers that we may return to the Gods our true intellectual parents."

