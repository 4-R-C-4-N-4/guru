[content]
body = "LXXI. TO FORTUNE. The FUMIGATION from FRANKINCENSE. Approach strong Fortune, with propitious mind And rich abundance, to my pray'r inclin'd p. 203 Placid, and gentle Trivia, mighty nam'd, 3 Imperial Dian, born of Pluto fam'd; Mankind's unconquer'd, endless praise is thine, 5 Sepulch'ral, widely-wand'ring pow'r divine! In thee, our various mortal life is found, And some from thee hi copious wealth abound; While others mourn thy hand averse to bless, In all the bitterness of deep distress. 10 Bc present, Goddess, to thy vot'ry kind, And give abundance with benignant mind. Footnotes 203:3 Ver. 3.] Placid and gentle Trivia . See the note to the Introduction to Musæus."

