[content]
body = "And although the same employment is common both to the ruler, and those who are ruled; yet the latter, if destitute of a leader, could no longer conspire together in one occupation; as the concord of the fingers and ` dancers, and the expedition of the army, must fail, if the one is deprived of the Coryphæus and the other of the captain or commander.\" To the same purpose Plotinus r shews that it is perfectly philosophical to suppose a multitude of Gods subordinate to the One supreme.\n\n\"It is necessary,\" says he, \"that every man should endeavour to be as good as possible, but at the same time, he should not consider himself as the only thing that is good but should be convinced that there are other good men, and good dæmons in the universe, but much more Gods: who though inhabiting this inferior region, yet look up to that higher world; and especially that most blessed Soul, the ruling Divinity of this universe.\n\nFrom whence a p.\n\n40 man ought to ascend still higher, and to celebrate the intelligible Gods, but above all their great King; declaring his majesty in a particular manner, by the multitude of Gods subordinate to his divinity.\n\nFor it is not the province of those who know the power of God, to contract all into one, but rather to exhibit all that divinity which he has displayed, who himself, remaining one, produces many, which proceed from him and by him.\n\nFor the universe subsists by him, and perpetually speculates his divinity, together with each of the Gods it contains.\" Should it be objected, that if such Gods (or exalted beings) really existed, we should be able to demonstrate the reality of their existence, in the same manner as that of one supreme God; we cannot frame a better reply than in the words of Proclus s .\n\n\"And perhaps,\" says p.\n\n41 he, \"you may affirm that souls more swiftly forget things nearer to them; but have a stronger remembrance of superior principles.\n\nFor these last operate on them more vigorously, through the sublimity of their power, and appear to be present with them by their energy.\n\nAnd this happens with respect to our corporeal fight; which does not perceive many things situated on the earth, yet observes the inerratic sphere, and the stars it contains; because these strongly irradiate our eyes with their light.\n\nSo the eye of our soul is more forgetful, and sooner loses the sight of principles proximate to its nature, than of such as are more elevated and divine.\n\nIn like manner all religions and sects confess that there is one highest principle, and men every where invoke God as their helper; but that there are Gods in subordination to this first cause, and that there is a providence proceeding p.\n\n42 from these to the universe, all men do not believe; and this because the one appears to them more perspicuously than the many.\" Indeed in consequence of the Platonic doctrine of the pre-existence of the soul, it is not strange that we should know so little of those divine and exalted beings above us; since from our union with generation and material concerns, we are imbued with oblivion, ignorance, and error.\n\n\"We are similar,\" as Porphyry t well observes, \"to those who enter or depart from a foreign region, not only in casting aside our native manners and customs; but from the long use of a strange country we are imbued with affections, manners, and laws foreign from our natural and true religion, and with a strong propensity to p."

