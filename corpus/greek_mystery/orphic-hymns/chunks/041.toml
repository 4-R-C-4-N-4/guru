[content]
body = "For Phanes is not only among the intelligible Gods, but also among the intellectual ones; in the demiurgic order, and among the super-mundane and mundane Gods.\n\nAnd Night and Heaven in a similar manner: for the peculiarities of these are received through all the middle orders.\n\nBut with respect to the great Saturn himself, has he not an order prior to that of Jupiter, and likewise posterior to the jovial king, distributing the Dionysiacal administration (δημιυργία) together with the other Titans?\n\nand this indeed in a different manner in the heavens and in things above the moon.\n\nAnd differently in the inerratic stars and in the planets; and in a similar manner Jupiter and Bacchus.\" Now on comparing the present hymn, and the hymns to Night, Heaven, Saturn and Jupiter together, we shall find them celebrated as the sources of all things; and Bacchus is expressly called Protogonus.\n\n119:3 Ver.\n\n3.] Bull-roarer .\n\nPhanes, who, according to the preceding account, is the author of the sensible world, is represented p.\n\n120 by Orpheus (for the purpose of shadowing forth the causal, not the temporal production of the universe) as adorned with the heads of a ram, a bull, a serpent, and a lion.\n\nNow Mithras, according to the Persian theology as related by Porphory de antro Nymph, is the father and creator of all things, And he informs us that the ancient priests of Ceres, called the Moon who is the queen of generation ταῦρος or a Bull (p.\n\n262.) and p.\n\n265 ὡς καὶ ὁ ταῦρος δημιυργόσ ὣν ὁ Μίθρασ, καὶ γενεσέωσ δεσπότησ.\n\ni e.\n\n\"Mithras as well as the Bull is the demiurgus of the universe, and the lord of generation\" The reason therefore is obvious why Phanes is called Bull-roarer.\n\nHence too from the account of Phanes given by Proclus, it follows that what that divinity is in the intelligible, that Thetis must be in the sensible world.\n\nFor Thetis according to Proclus, lib.\n\nv.\n\nin Timæum is Πρετϐυτάτη Θεῶν, or the most ancient and progenitor of the Gods: and Thetis is the mother of Venus, and Protogonus the father of Night.\n\nVenus therefore in the sensible world is the same as Night in the intelligible; and the reason is evident why Night in these Hymns is called Venus.\n\nI cannot conclude this note without observing how much it is to be lamented that the Platonical writers are so little known and understood in the present age.\n\nfor surely if these valuable works had been consulted, it would have appeared that Protogonus and Noah resembled each other as much as the ancient and modern philosophy; or as much as an ancient commentator on Plato, and a modern Mythology ."

