section = "Hymn 60. Sacred Texts Classics Index Previous Next p. 185 LIII. To SILENUS, SATYRUS, and the PRIESTESSES of BACCHUS. The FUMIGATION from MANNA. GREAT nurse of Bacchus, to my pray'r incline., Silenus, honor'd by the pow'rs divine And by mankind at the triennial feast Illustrious dæmon, reverenc'd as the best: Holy, august, the source of lawful rites, 5 Rejoicing pow'r, whom vigilance delights With Sylvans dancing ever young and fair, Head of the Bacchic Nymphs, who ivy bear. With all thy Satyrs on our incense shine, Dæmons wild form'd, and bless the rites divine; 10 Come, rouse to sacred Joy thy pupil kin, * And Brumal Nymphs with rites Lenæan bring; Our orgies shining thro' the night inspire, And bless triumphant pow'r the sacred choir. Footnotes 185:* Because he was the nurse of Bacchus. Next: LIV: To Venus"
translator = "Thomas Taylor"
