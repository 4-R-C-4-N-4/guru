body = "Hence, in the vision of Herus Pamphilius, in Plato, the soul of Orpheus, being destined to descend into another body, is reported to have chosen rather that of a swan than to be born again of a woman; having conceived such hatred against the sex, on account of his violent death.\n\nThe cause of his destruction is variously related by authors.\n\nSome report that it arose from his being engaged in puerile loves, after the death of Eurydice.\n\nOthers, that he was destroyed by women intoxicated with wine, because he was the means of men relinquishing their connexion.\n\nOthers affirm, according to the tradition of Pausanias, that upon the death of Eurydice, wandering to Aornus, a place in Threspotia, where it was customary to evocate the souls of the dead, p.\n\n6 having recalled Eurydice to life, and not being able to detain her, he destroyed himself; nightingales building their nests, and bringing forth their young upon his tomb; whose melody, according to report, exceeded every other of this species.\n\nOthers again ascribe his laceration, to his having celebrated every divinity except Bacchus, which is very improbable, as among the following hymns there are nine to that Deity, under different appellations.\n\nOthers report that he was delivered by Venus herself, into the hands of the Ciconian women, because his mother Calliope, had not determined justly between Venus and Proserpine, concerning the young Adonis.\n\nMany affirm that he was struck by lightning, according to Pausanias; and Diogenes confirms this by the following verses composed as he asserts, by the Muses upon his death: p.\n\n7 Here, by the Muses plac'd, with golden lyre, Great Orpheus rests; destroy'd by heav'nly fire.\n\nAgain, the sacred mysteries called Threscian, derived their appellation, from our Thracian bard, because he first introduced sacred rites and religion into Greece; and hence the authors of initiation in these mysteries, were called Orpheotelestæ.\n\nBesides according to Lucian, our Orpheus brought astrology, and the magical arts into Greece; and with respect to his drawing trees and wild beasts by the melody of his lyre, Palæphatus accounts for it as follows b .\n\nThe mad Bacchanalian nymphs, says he, having violently taken away cattle and other necessaries of life, retired for some days into the mountains.\n\nWhen the citizens having expected their return for a long time, and fearing the worst for their wives and daughters, called Orpheus, and intreated him p.\n\n8 to invent some method of drawing them from the mountains.\n\nBut he tuning his lyre, agreeable to the orgies of Bacchus, drew the mad nymphs from their retreats; who descended from the mountains bearing at first ferulæ and branches of every kind of trees.\n\nBut to the men who were eye-witnesses of these wonders, they appeared at first to bring down the very woods; and from hence gave rise to the fable.\n\nBut so great was the reputation of Orpheus, that he was deified by the Greeks; and Philostratus relates, that his head gave oracles in Lesbos, which, when separated from his body by the Thracian women, was, together with his lyre, carried down the river Hebrus into the Sea.\n\nIn this manner says Lucian c , singing as it were his funeral oration, to which p.\n\n9 the chords of his lyre impelled by the winds, gave a responsive harmony, it was brought to Lesbos and buried.\n\nBut his lyre was suspended in the Temple of Apollo; where it remained for a considerable space of time."

