[content]
body = "As the husbandman, therefore, performs sacred rites, by presenting handfuls of pulse and fruits, so ought we to sacrifice our purest thoughts, and other goods of the soul, thanking the divinities for the sublime contemplations they afford us, and for truly feeding our intellectual part with the speculation of their essences; for, conversing with us, and appearing to our mental sight; for shining upon us with divine splendours, and by this means procuring for us true salvation.\n\n\"But an exercise of this kind is performed in an indolent manner, by many who apply themselves to philosophy, and who more sedulously cultivating fame than honouring the divinity, are wholly employed about statues, taking no care to learn after what manner, or whether or not these intellectual beings are to be adored; nor by p.\n\n56 properly consulting divine concerns, are they anxious to know, in how great a degree, we ought to strive after an union with these exalted natures.\n\nWith such as these we by no means contend; since our only endeavour is to obtain a knowledge of divinity, and to imitate pious and ancient men, by frequently sacrificing of that contemplation which the Gods have bestowed upon us, and by the use of which we are partakers of real salvation.\n\n\"The Pythagoreans indeed who were very studious of numbers and lines, for the most part sacrificed of these to the Gods; denominating this number Minerva e , another Apollo; and again, this justice, and another Temperance.\n\nThey proceeded also p.\n\n57 in a similar manner in geometrical figures.\n\nHence they pleased the divinities by sacrifices of this kind, calling each of them by their proper names, for the purpose of obtaining their particular requests.\n\nThey often besides made such invocations subservient to the purposes of divination; and if they required the investigation of any thing particular, they used the visible celestial Gods, also the wandering and fixed stars, of all which the sun ought to be placed as a leader, next to this the moon; and, as a theologian observes, we should make fire allied to these by a proximate conjunction.\n\nBut the same person asserts that the Pythagoreans sacrificed no animal, but offered the first fruits of flour and honey, and of the diversified productions of the earth; nor kindled fire on the bloody altar, says he, with other things of a similar nature: but why should I transcribe such relations?\n\nFor he who is truly p.\n\n58 studious of piety, knows why he ought not to sacrifice any thing animated to Gods; but alone to genii, and other powers superior to man, whether good or bad: he likewise knows to what kind of men it belongs to sacrifice these, and every circumstance respecting those beings, who require such sacrifices to be performed.\n\nWith regard to other particulars I shall be silent.\n\nBut what some Platonists have divulged will perspicuously illustrate the subject before us, which I shall relate as follows.\n\n\"The first God, since he is incorporeal, immoveable, and indivisible, neither existing, in any being, place, or time, nor even circumscribed by, and as it were invested with himself, is in no respect indigent of any thing external to his nature, as we have already observed.\n\nBut this last property of a divine essence is likewise true of the soul of the world, possessing a triple divisibility, p.\n\n59 and being naturally self-motive, yet so constituted that it chuses to move in an orderly and beautiful manner, and to agitate the corporeal fabric of the world according to the most excellent and harmonious reasons.\n\nBut it associates to itself and is circularly invested with body, although incorporeal and entirely destitute of passion."

