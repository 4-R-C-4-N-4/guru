[content]
body = "XXIX. TO BACCHUS. The FUMIGATION from STORAX. BACCHUS I call, loud-sounding and divine, Fanatic God, a two-fold shape is thine: Thy various names and attributes I sing, O, first-born, thrice begotten, Bacchic king: 4 Rural, ineffable, two-form'd, obscure, 5 Two-horn'd, with ivy crown'd, euion , pure. Bull-fac'd, and martial, bearer of the vine, Endu'd with counsel prudent and divine: Triennial, whom the leaves of vines adorn, Of Jove and Proserpine, occultly born. 10 p. 156 Immortal dæmon, hear my suppliant voice, Give me in blameless plenty to rejoice; And listen gracious to my mystic pray'r, Surrounded with thy choir of nurses fair. Footnotes 155:4 Ver. 4.] O, first-born . See the notes to Hymn v. to Protogonus."

