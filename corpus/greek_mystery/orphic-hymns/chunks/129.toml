[content]
body = "LXXIX. TO THE NORTH WIND. The FUMIGATION from FRANKINCENSE. BOREAS, whose wint'ry blasts, terrific, tear The bosom of the deep surrounding air; Cold icy pow'r, approach, and fav'ring blow, And Thrace a while desert expos'd to snow: The misty station of the air dissolve, 5 With pregnant clouds, whose frames in show'rs resolve: Serenely temper all within the sky, And wipe from moisture, Æther's beauteous eye."

