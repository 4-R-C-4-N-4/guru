[content]
body = "LXXVII. TO AURORA. The FUMIGATION from MANNA. HEAR me, O Goddess! whose emerging ray Leads on the broad refulgence of the day; Blushing Aurora, whose celestial light Beams on the world with red'ning splendours bright: Angel of Titan, whom with constant round, 5 Thy orient beams recall from night profound: Labour of ev'ry kind to lead is thine, Of mortal life the minister divine. Mankind in thee eternally delight, And none presumes to shun thy beauteous sight. 10 Soon as thy splendours break the bands of rest, And eyes unclose with pleasing sleep oppress'd; Men, reptiles, birds, and beasts, with gen'ral voice, And all the nations of the deep, rejoice; For all the culture of our life is thine. 15 Come, blessed pow'r! and to these rites incline: Thy holy light increase, and unconfin'd Diffuse its radiance on thy mystic's mind."

