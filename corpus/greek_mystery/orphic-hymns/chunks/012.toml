[content]
body = "And in the same place, Proclus has preserved to us another copy of Orphic verses, which are also found in the writer (de Mundo); previous to which he observes, that the demiurgus, or artificer of the world, being full of ideas, comprehended by these all things within himself, as that theologer (Orpheus) declares.\n\nWith these verses we have connected others, agreeable to the order of Stephens, Eschenbach, and Gesner, as follows.\n\nJove is the first and last thund'ring king, Middle and head, from Jove all beings spring; p.\n\n31 In Jove the male and female forms combine, For Jove's a man, and yet a maid divine; Jove the strong basis of the earth contains, And the deep splendour of the starry plains; Jove is the breath of all; Jove's wondrous frame Lives in the rage of ever restless flame; Jove is the sea's strong root, the solar light, And Jove's the moon, fair regent of the night; Jove is a king by no restraint confin'd, And all things flow from Jove's prolific mind; One is the pow'r divine in all things known, And one the ruler absolute alone.\n\nFor in Jove's royal body all things lie, Fire, night and day, earth, water and the sky; The first begetters pleasing love and mind; These in his mighty body, Jove confin'd: See, how his beauteous head and aspect bright Illumine heav'n, and scatter boundless light!\n\nRound which his pendant golden tresses shine Form'd from the starry beams, with light divine; On either side two radiant horns behold, Shap'd like a bull's and bright with glittering gold; And East and West in opposition lie, The lucid paths of all the Gods on high; p.\n\n32 His eyes, the sun, and moon with borrow'd ray; Royal, ætherial; and his ear refin'd Hears ev'ry voice, and sounds of ev'ry kind.\n\nThus are his head and mind immortal, bright, His body's boundless, stable, full of light; Strong are his members, with a force endu'd Pow'rful to tame, but ne'er to be subdu'd; Th' extended region of surrounding air Forms his broad shoulders, back, and bosom fair; And thro' the world the ruler of the skies Upborne on natal, rapid pinions flies; His sacred belly earth with fertile plains, And mountains swelling to the clouds, contains; His middle zone's the spreading sea profound, Whose roaring waves the solid globe surround; The distant realms of Tartarus obscure Within earth's roots, his holy feet secure; p.\n\n33 For these earth's utmost bounds to Jove belong, And form his basis permanent and strong.\n\nThus all things Jove within his breast conceal'd, And into beauteous light from thence reveal'd.\n\nThese verses contain what Dr.\n\nCudworth calls the grand arcanum of the Orphic theology, that God is all things; which is likewise an Egyptian doctrine, from whence it was derived through Orpheus into Greece: and this sublime truth Plotinus l himself proves with his usual sagacity and depth.\n\nBut here it is necessary to observe, that Orpheus and the Platonists do not conceive the Deity to be all things, as if he were a divisible, corporeal nature; but that he is all things, because present every where, and to every being totally, though more or less intimately present, according to the various gradations and approximations of being.\n\nSo that he is to be considered as containing p."

