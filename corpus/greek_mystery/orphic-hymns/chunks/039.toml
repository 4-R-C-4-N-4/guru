section = "Hymn 11. Sacred Texts Classics Index Previous Next IV. TO FIRE. The FUMIGATION from SAFFRON. O Ever untam'd Fire, who reign'st on high In Jove's dominions ruler of the sky; The glorious sun with dazzling lustre bright, And moon and stars from thee derive their light; All taming pow'r, ætherial shining fire, 5 Whose vivid blasts the heat of life inspire: p. 118 The world's best element, light-bearing pow'r, With starry radiance shining, splendid flow'r, O hear my suppliant pray'r, and may thy frame Be ever innocent, serene, and tame. 10 Next: V. To Protogonus, Or the First-Born"
translator = "Thomas Taylor"
