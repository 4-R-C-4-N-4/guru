[content]
body = "43 these unnatural habits.\" As, therefore, it is not wonderful that the greatest part of those who inhabit a pestiferous region, should languish and decline, but that a very few should preserve their natural strength; so we ought not to wonder, that thus placed in generation, the multitude of mankind are obnoxious to passions and depraved habits; but we ought rather to be astonished if any souls, thus involved in the dark folds of the body, and surrounded with such great and unceasing mutations, are found sober, pure, and free from destructive perturbations.\n\nFor it is surely astonishing that the soul should live immaterially, in material concerns; and preserve itself uncontaminated amidst such base defilements; that it should drink of the cup of oblivion, and not be laid asleep by the intoxicating draught; that it should elevate its eye p.\n\n44 above the sordid darkness with which it is surrounded; and be able to open the gates of truth, which, though contained in its essence, are guarded and shut by terrene and material species.\n\nBut that it is possible to know more of such exalted natures than is generally believed, by the assistance of the ancient philosophy, accompanied with a suitable life, is, I am persuaded, true; and I would recommend the arduous and glorious investigation to every liberal mind.\n\nLet us now consider the nature of sacrifice according to Orpheus and the Platonists; previous to which, I must beg leave to inform the reader, that the Greek theologists and philosophers were not (as they are represented by modern writers on mythology) so stupid as to worship the creature instead of the Creator; and to neglect or confound that homage and veneration, p.\n\n45 which is due to the first cause of all.\n\nOn the contrary, they considered the supreme Being as honoured by the reverence paid to his most illustrious offspring; and carefully distinguished between the worship proper to the Deity, and to the subordinate Gods, as the following discourse will abundantly evince.\n\nHow, far indeed, such opinions maybe consistent with revelation, it is not my business to determine.\n\nIt is sufficient for me, to give the most faithful account I am able of their sentiments on this subject; to free their opinions from misrepresentation; and to shew that God has not left himself without a witness among the wise and learned of the heathens.\n\nBut as I cannot give a better account of the nature and antiquity of sacrifice than from the writings of Porphyry, I shall present the reader with the following paraphrase, p.\n\n46 on part of the second book of his excellent work on abstinence.\n\n\"The period of time appears to have been immensely distant, from which, as Theophrastus says, a nation the most learned of all others, and inhabiting the sacred region formed by the Nile, began first of all, from the domestic fire, to sacrifice to the celestial divinities; not with myrrh or cassia, nor with the first fruits of frankincense mingled with saffron, (for these were applied many ages afterwards, from error increasing in certain degrees: I mean at the period when men having surmounted the difficulties of a life, formerly oppressed with the cares of procuring necessaries, and from the beginning to the end attended with many labours and tears, sacrificed perhaps a few drops to the Gods.) For at first they performed sacrifices, not with aromatics p.\n\n47 but with the first fruits of the green herb; plucking it with their hands, as a certain soft down or moss of prolific nature.\n\nIndeed the earth produced trees before animals; but prior to trees, the annually rising grass, the leaves, and roots, and entire produce of which having collected, they sacrificed with fire: by this sacrifice, saluting the visible celestial Gods, and rendering them through the ministry of fire immortal honours."

