[content]
body = "For the World is one, and only-begotten.\n\nOpusc.\n\nMythol.\n\np.\n\n203.\n\n131:17 Ver.\n\n17] The sportive nymphs .\n\nThis is because Pan rejoices in the exhalations produced from humid substances; without which the world cannot subsist.\n\nPhurnutus .\n\n131:22 Ver.\n\n22.] In caves obscure .\n\nA cave, as we learn from Porphyry, de Antro Nympharum, is an apt symbol of the material world; since it is agreeable at its first entrance on account of p.\n\n132 its participation of form, but is involved in the deepest obscurity to the intellectual eye, which endeavours to discern its dark foundation.\n\nSo that, like a cave, its exterior and superficial parts are pleasant; but its interior parts are obscure, and its very bottom, darkness itself.\n\n132:23 Ver 23.] True serpent-horned Jove .\n\nThe reason why Pan is horned, is, because Jove is the mingler of all things, according to Orpheus, as we learn from Jo.\n\nDiac.\n\nAllegor.\n\nin Hesiod.\n\np.\n\n305; and the word κερασήσ is as Gesner observes, derived from the verb κεράννυμι, to mingle: so that horns are an occult symbol of the mingling and tempering power of the demiurgus of the world.\n\nBut the literal meaning of the word κερασήσ is horned serpent; and one of the heads of Protogonus is that of a serpent.\n\nWe may add that Pan considered as the soul of the world, is with great propriety called Jove; since that appellation is given by Orpheus to the mundane soul."

