section = "Hymn 29. Sacred Texts Classics Index Previous Next XXII. TO NEREUS. The FUMIGATION from MYRRH. O Thou, who doff the roots of Ocean keep In seats cærulean, dæmon of the deep, With fifty nymphs (attending in thy train, Fair virgin artists) glorying thro' the main: The dark foundation of the rolling sea 5 And Earth's wide bounds, belong much-fam'd to thee; Great dæmon, source of all, whose pow'r can make The Earth's unmeasur'd, holy basis shake, When blust'ring winds in secret caverns pent, By thee excited, struggle hard for vent: 10 Come, blessed Nereus, listen to my pray'r, And cease to shake the earth with wrath severe; p. 148 Send on our sacred rites abundant health, With peace divine and necessary wealth. Next: XXIII: To the Nereids"
translator = "Thomas Taylor"
source_url = "https://sacred-texts.com/cla/hoo/hoo00.htm"
