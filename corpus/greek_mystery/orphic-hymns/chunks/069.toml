[content]
body = "XXVIII.\n\nTO PROSERPINE.\n\nA HYMN DAUGHTER of Jove, almighty and divine, Come, blessed queen, and to these rites incline: Only-begotten, Pluto's honor'd wife, 3 O venerable Goddess, source of life: 'Tis thine in earth's profundities to dwell, 5 Fast by the wide and dismal gates of hell: Jove's holy offspring, of a beauteous mien, Fatal, with lovely locks, infernal queen: Source of the furies, whose blest frame proceeds From Jove's ineffable and secret seeds: 10 Mother of Bacchus, Sonorous, divine, And many-form'd, the parent of the vine: The dancing Hours attend thee, essence bright, All-ruling virgin, bearing heav'nly light: p.\n\n154 Illustrious, horned, of a bounteous mind, 13 Alone desir'd by those of mortal kind.\n\nO, vernal queen, whom grassy plains delight, Sweet to the smell, and pleasing to the sight: Whose holy form in budding fruits we view, Earth's vig'rous offspring of a various hue: 20 Espous'd in Autumn: life and death alone 21 To wretched mortals from thy power is known: For thine the task according to thy will, 23 Life to produce, and all that lives to kill.\n\np.\n\n155 Hear, blessed Goddess, send a rich increase 25 Of various fruits from earth, with lovely Peace; Send Health with gentle hand, and crown my life With blest abundance, free from noisy strife; Last in extreme old age the prey of Death, Dismiss we willing to the realms beneath, 30 To thy fair palace, and the blissful plains Where happy spirits dwell, and Pluto reigns.\n\nFootnotes 153:3 Ver.\n\n3] Only-begotten .\n\nΚαὶ γὰρ ὁ Θεολογός την κόρην ΜΟΥΝΟ-ΓΕΝΕΙΑΝ ἔιαθε προσαγορεύειν.\n\nProc.\n\nTim.\n\n2 extra p.\n\n139.\n\n9.\n\ni.e.\n\n\"I see that the theologist (meaning Orpheus) calls Proserpine, \"Only-begotten\".\n\n154:21 Ver.\n\n21.] Espous'd in Autumn .\n\nWe have already observed in the Dissertation, that the Orphic theologers considered a difference of sex in the divinities; attributing the male to some, and the female to others.\n\nNow the mutual commerce and energy subsisting between these Gods and Goddesses, they denominated Ιεροι Γαμοι, i.\n\ne.\n\n\"holy marriages:\" or according to Proclus, on the Parmenides of Plato, as cited by Eschenbach, in Epig.\n\np.\n\n59.\n\nthey mystically called, the simple kindred conjunction, and communion of divine causes, a marriage.\n\nAnd Proserpine, or the animating part of the earth's soul, may he considered as resting in Autumn, from all farther productions; her powers at that time having attained their full perfection.\n\nHence at this period may we not say, that she is wholly abstracted from the animal life, and secretly united with Pluto, or the intellectual part of the earth's soul; from whom she receives the divine light of mind, and copious streams of the nectar of divine knowledge.\n\n154:23 Ver.\n\n23.] For thine the task , &c.\n\nProclus, in Theol.\n\nPlat.\n\np."

