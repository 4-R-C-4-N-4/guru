[content]
body = "VIII.\n\nTO THE MOON * .\n\nThe FUMIGATION from AROMATICS.\n\nHEAR, Goddess queen, diffusing silver light, Bull-horn'd and wand'ring thro' the gloom of Night.\n\n2 p.\n\n125 With stars surrounded, and with circuit wide Night's torch extending, thro' the heav'ns you ride: Female and Male with borrow'd rays you shine, 5 5 And now full-orb'd, now tending to decline.\n\nMother of ages, fruit-producing Moon, Whose amber orb makes Night's reflected noon: p.\n\n126 Lover of horses, splendid, queen of Night, All-seeing pow'r bedeck'd with starry light.\n\n10 Lover of vigilance, the foe of strife, In peace rejoicing, and a prudent life: Fair lamp of Night, its ornament and friend, Who giv'st to Nature's works their destin'd end.\n\n14 Queen of the stars, all-wife Diana hail!\n\n15 Deck'd with a graceful robe and shining veil; Come, blessed Goddess, prudent, starry, bright, Come moony-lamp with chaste and splendid light, Shine on these sacred rites with prosp'rous rays, And pleas'd accept thy suppliant's mystic praise.\n\nFootnotes 124:2 Ver.\n\n2.] Bull-horned .\n\nFor the mystical reason of this appellation, see note to the third line, of the Hymn to Protogonus.\n\n124:* The Moon is called in this Hymn both σελυνη and μηνη: the former of which words signifies the Moon in the language of the Gods; and the latter is the appellation given to her by Men, as the following Orphic fragment evinces.\n\nΜήσαλο δ᾽ ἄλλην Γᾶιαν ἀπείριτον, ἣντε Σελήνη ᾽Αθάνατοι κλήζυσιν, ἐπιχθόνιοι δέ τε Μηνην· Ἥ πολλ᾽ ὄυρε ἔχει, πολλ᾽ ἄρεα, πολλα μέλαθρα.\n\nThat is, \"But he (Jupiter) fabricated another boundless earth, which the immortals call Selene, but Men, Mene.\n\nWhich has many mountains, many cities, many houses.\" Now this difference of names arises, according to the Platonic philosophers, from the difference subsisting between divine and human knowledge.\n\nFor (say they) as the knowledge of the Gods is different from that of particular souls: so with respect to names some are diverse, exhibiting the whole essence of that which is named; but others are human, which only partially unfolds their signification.\n\nBut a larger account of this curious particular, is given by Proclus, in Theol.\n\nPlat.\n\np.\n\n69.\n\nas follows.\n\nThere are three kinds of names: the first and most proper, and which are truly divine, subsist in the Gods themselves.\n\nBut the second which are the resemblances of the first, having an intellectual subsistence, must be esteemed of divine condition.\n\nAnd the third kind which emanate from Truth itself, but are formed into words for the purpose of discourse, receiving the last signification of divine concerns, are enunciated by skillful men p.\n\n125 at one time by a divine afflatus, at another time by energising intellectually, and generating the images of internal spectacles moving in a discursive procession."

