body = "Sacred Texts Classics Index Previous Next XI.\n\nTO HERCULES.\n\nThe FUMIGATION from FRANKINCENSE.\n\nHEAR, pow'rful, Hercules untam'd and strong, To whom vast hands, and mighty works belong, Almighty Titan, prudent and benign, Of various forms, eternal and divine, Father of Time, the theme of gen'ral praise, 5 Ineffable, ador'd in various ways.\n\nMagnanimous, in divination skill'd And in the athletic labours of the field.\n\n'Tis thine strong archer, all things to devour, Supreme, all-helping, all-producing pow'r; 10 To thee mankind as their deliv'rer pray, Whose arm can chase the savage tribes away: p.\n\n134 Uweary'd, earth's best blossom, offspring fair, To whom calm peace, and peaceful works are dear.\n\n13 p.\n\n135 Self-born, with primogenial fires you shine, 15 15 And various names and strength of heart are thine.\n\nThy mighty head supports the morning light, And bears untam'd, the silent gloomy night; From east to west endu'd with strength divine, Twelve glorious labours to absolve is thine; 20 p.\n\n136 Supremely skill'd, thou reign'st in heav'n's abodes, Thyself a God amid'st th' immortal Gods.\n\nWith arms unshaken, infinite, divine, Come, blessed pow'r, and to our rites incline; The mitigations of disease convey, 25 And drive disasterous maladies away.\n\nCome, shake the branch with thy almighty arm, Dismiss thy darts and noxious fate disarm.\n\nFootnotes 134:13 Ver.\n\n13] Earth's best blossom .\n\nSince, according to the Orphic theology, there are two worlds, the intelligible and the sensible, the former of which is the source of the latter; so, according to the same theology, the first contains in a primary, causal, and intellectual manner, what the second comprehends secondarily and sensibly.\n\nHence it contains an intellectual heaven and earth, not like the material, existing in place, and affected with the circulations of Time; but subsisting immaterially in the stable essence of eternity.\n\nIn this divine world, another sun, and moon, and stars shine with intellectual light; for every thing there is perfectly lucid, light continually mingling with light.\n\nThere, as Plotinus divinely observes, every star is a sun: and though all things are beheld in every thing, yet some things are more excellent than others.\n\nNow from this intellectual heaven and earth, resident in Phanes, the king and father of the universe, Orpheus, according to Proclus, derives the orders of the Gods, subordinate to this sensible heaven and earth: and among these he relates the following progeny of the intellectual earth, as preserved by Proclus in his excellent Commentary on the Timæus, p.\n\n295, and by Athenagoras in Apol.\n\n\"She produced seven beautiful pure virgins with voluble eyes, and seven sons, all of them kings, and covered with downy hair; the daughters are Themis and prudent Tethys, and fair-haired Mnemosyne, and blessed Thea; together with Dione, having an illustrious form, and Phœbe and Rhea the mother of king Jupiter.\n\nBut this illustrious earth generated celestial sons, which are also sirnamed Titans, because they took revenge on the great starry heaven; and these are Cæus and great Cræus, and robust Phorcys, and Saturn, and Ocean, and Hyperion, and Iapetus.\" Now Hercules is celebrated in this Hymn as the Sun, as the nineteenth and twentieth lines particularly evince; and the Sun is the same with Hyperion; p."

