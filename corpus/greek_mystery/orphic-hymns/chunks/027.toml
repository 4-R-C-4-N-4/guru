body = "Indeed it is not probable they Should be the invention of any writer more p.\n\n90 modern than the above period, as it must have been so easy to detect the forgery, from the original initiations which were even extant at the time in which Suidas lived.\n\nIn the former part of this Dissertation, we asserted that we should derive all our information concerning the Orphic theology, from the writings of the Platonists; not indeed without reason.\n\nFor this sublime theology descended from Orpheus to Pythagoras, and from Pythagoras to Plato; as the following testimonies evince.\n\n\"Timæus (says Proclus) f being a Pythagorean, follows the Pythagoric principles, and these are the Orphic traditions; for what Orpheus delivered mystically in secret discourses, these Pythagoras learned p.\n\n91 when he was initiated by Aglaophemus in the Orphic mysteries.\" Syrianus too makes the Orphic and Pythagoric principles to be one and the same; and, according to Suidas, the same Syrianus composed a book, entitled the Harmony of Orpheus, Pythagoras and Plato g .\n\nAnd again Proclus h : it is Pythagorical to follow the Orphic genealogies; for from the Orphic tradition downward by Pythagoras, the science concerning the Gods was derived to the Greeks.\" And elsewhere i , \"All the theology of the Greeks is the progeny of the sacred initiations (μυσαγωγιαι) of Orpheus.\n\nFor Pythagoras first learned the orgies of the Gods from Aglaophemus; but Plato was the second who received a p.\n\n92 perfect science of these, both from the Pythagoric, and Orphic writings.\" Now in consequence of these testimonies, our hymns ought to agree with the doctrine of Pythagoras; especially since Onomacritus, their Author, was of that school.\n\nAnd that .they do so, the following discovery abundantly evinces.\n\nPhotius, in his Bibliotheca, has preserved to us part of a valuable work, written by Nicomachus the Pythagorean, entitled Theological Arithmetic; in which he ascribes particular epithets, and the names of various divinities to numbers, as far as to ten.\n\nThere is likewise a curious work of the same title, by an anonymous writer, which is extant only in manuscript.\n\nFrom these two, and from occasional passages respecting numbers according to Pythagoras, found in the Platonic writers, Meursius p.\n\n93 has composed a book, which he calls Denarius Pythagoricus; and which is an invaluable treatise to such as are studious of the ancient philosophy.\n\nOn perusing this learned book, it seemed to me necessary, that as the divinities, ascribed to each number, had a particular relation to one another, they should also have a mutual agreement in the following hymns.\n\nAnd on the comparison I found the most perfect similitude: a few instances of which I shall select, leaving a more accurate investigation of this matter to the learned and philosophical reader.\n\nIn the first place then, among the various names ascribed to the monad or unity, are those of the following Gods; viz.\n\nthe Sun, Jupiter, Love, Proteus, Vesta.\n\nNow in the hymn to the Sun we find the epithet , O immortal p.\n\n94 Jove.\n\nIn that to Love πυρίδρομος, or wandering fire, which is likewise found in the hymn, to the Sun.\n\nIn the hymn to Love, that deity is celebrated as having the keys of all things k ; viz.\n\nof æther, heaven, the deep, the earth, &c."

