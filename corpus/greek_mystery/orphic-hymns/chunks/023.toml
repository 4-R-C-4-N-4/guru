[content]
body = "This heated paper we may compare to a certain relation of inferiors to superiors; and its approximation to the lamp, to the opportune use of things according to time, place, and matter.\n\nBut the procession of fire in the paper aptly represents the presence of divine light, to that nature which is capable of its reception.\n\nLastly, the inflammation of the paper may be compared to the deification of mortals, and to the illumination of material natures, which are afterwards carried upwards like p.\n\n78 the fire of the paper, from a certain participation of divine feed.\n\nAgain, the lotus before the rising of the sun, folds its leaves into itself, but gradually expands them on its rising: unfolding them in proportion to the sun's ascent to the zenith; but as gradually contracting them as that luminary descends to the west.\n\nHence this plant by the expansion and contraction of its leaves appears no less to honour the sun than men by the gesture of their eye-lids, and the motion of their lips.\n\nBut this imitation and certain participation of supernal light is not only, visible in plants, which possess but a vestige of life, but likewise in particular stones.\n\nThus the sun-stone, by its golden rays, imitates those of the sun; but the stone called the eye of heaven, or of the sun, has a figure p.\n\n79 similar to the pupil of an eye, and a ray shines from the middle of the pupil.\n\nThus too the lunar stone, which has a figure similar to the moon when horned, by a certain change of itself, follows the lunar motion.\n\nLastly, the stone called Helioselenus, i.\n\ne.\n\nof the sun and moon, imitates after a manner the congress of those luminaries, which it images by its colour.\n\nSo that all things are full of divine natures; terrestrial natures receiving the plenitude of such as are celestial, but celestial of supercelestial essences; while every order of things proceeds gradually in a beautiful descent, from the highest to the lowest.\n\nFor whatever is collected into one above the order of things, is afterwards dilated in descending, various souls being distributed under their various ruling divinities.\n\nIn fine, some things turn p.\n\n80 round correspondent to the revolutions of the sun, and others after a manner imitate the solar rays, as the palm and the date: some the fiery nature of the sun as the laurel, and other a different property.\n\nFor indeed we may perceive the properties which are collected in the sun, every where distributed to subsequent natures constituted in a solar order; that is, to angels, dæmons, souls, animals, plants, and stones.\n\nHence the authors of the ancient priesthood, discovered from things apparent, the worship of superior powers, while they mingled some things, and purified with others.\n\nThey mingled many things indeed together, because they saw that some simple substances possessed a divine property (though not taken singly) sufficient to call down that particular power, of which they were participants.\n\np.\n\n81 Hence by the mingling of many things together, they attracted upon us a supernal influx; and by the composition of one thing from many, they symbolised with that one, which is above many; and composed statues from the mixtures of various substances, conspiring in sympathy and consent.\n\nBesides this, they collected composite odours, by a divine art, into one, comprehending a multitude of powers, and symbolizing, with the unity of a divine essence.\n\nConsidering besides, that division debilitates each of these, but that mingling them together restores them to the idea of their exemplar; hence the ancient priests, by the mutual relation and sympathy of things to one another, collected their virtues into one, but expelled them by repugnancy and antipathy; purifying, when it was requisite, with sulphur and p."

