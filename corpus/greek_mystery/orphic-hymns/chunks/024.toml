body = "82 bitumen, and the sprinkling of marine water.\n\nFor sulphur purifies from the sharpness of its odour; but marine water on account of its fiery portion.\n\nBesides this, in the worship of the Gods, they offered animals, and other substances congruous to their nature; and received in the first place the powers of dæmons as proximate to natural substances and operations, by whose assistance they evocated these natural bodies to which the they approached into their presence.\n\nAfterwards they proceeded from dæmons to the powers and energies of the Gods, partly indeed from dæmoniacal instruction, but partly by their own industry, aptly interpreting symbols, and ascending to a proper intelligence of the Gods.\n\nAnd lastly laying aside natural substances and their operations, they received themselves into p.\n\n83 the communion and fellowship of the Gods.\n\nThus far Proclus, and thus much for the theological doctrine of Orpheus, as contained in the works of the latter Platonists.\n\nI persuade myself enough has been said in this Dissertation to convince every thinking and liberal mind, that the Greek theology as professed and understood by the Greek philosophers, is not that absurd and nonsensical system, represented by modern prejudice and ignorance, as the creed of the ancients.\n\nIn consequence of a blind and mistaken zeal it is common to ridicule the opinions of the ancient philosophers, in order to establish the certainty of the Christian religion.\n\nBut surely revelation does not require so unwarrantable and feeble a support, which in reality only betrays the cause it endeavours to defend, by giving infidels occasion to suspect, either p.\n\n84 weakness in its evidence, or obscurity in its fundamental doctrines.\n\nBesides, the generality of these uncandid opponents know nothing of the Platonical writers, from whom alone genuine information can be derived on this sublime and intricate subject; and from whose works the preceding Dissertation has been so abundantly enriched.\n\nWere these invaluable books more generally known and understood, if they did not refine our taste, at present so depraved, they would at least teach us to admire the strength which human reason is capable of exerting, and to be more modest in our pretensions to wisdom; they would silence ignorant declaimers, and stop the immense increase of books on modern philosophy, which are so rapidly hastening to the abyss of forgetfulness, like streams into the ocean from which they originally flowed.\n\nFootnotes 13:e In the latter part of this Dissertation, we shall discourse on the agreement between the doctrine of Orpheus and the Platonists.\n\n16:f Procl.\n\nlib.\n\ni.\n\nTheol.\n\nPlat.\n\n26:e Θεοι Νοεροὶ, Ὑπερκόσμιοι, Ἐγκὸσμιοι Et inter hos, aliæ τάξεις Φρυρητιχῶι ϑεῶν, Δημιυργικῶν, Ἁναγωγῶν, Συνεκλιχῶν Τελεσιυρῶν· Ζωογόνων, Ἀλρεπλων, Ἀπολϋὶων, Κριτικῶν, Καθαρλικῶν, &c.\n\nEschenb.\n\nEpig, p.\n\n58.\n\n27:f In Timæum.\n\np.\n\n67.\n\n27:g In Tim.\n\np.\n\n290.\n\n29:h In Tim.\n\np, 95."

