[content]
body = "\"Longinus is a philologist, but by no means a philosopher.\" Similar to this is the mistake of modern Mythologists, who in conformity with the fashionable philosophy, call the material parts of nature, the Gods of the ancients: the folly and impiety of which system, cannot be better represented than in the words of Plutarch in his above mentioned curious Treatise of Isis and Osiris, which I shall give the reader in the elegant Translation of Dr.\n\nSquire, p.\n\n90.\n\n\"We ought to take the greatest care (says Plutarch) that we do not explain away the very nature of the Gods, by resolving it as it were into mere blasts of wind, or streams of rivers, into the sowing and earing of corn, or into the changes of the earth and seasons, as those persons have actually done, who make Bacchus to be Wine, and Vulcan Fire.\n\nJust as Cleanthes somewhere tells us, that by Proserpine nothing else is meant, but that air which pervading the fruits of the earth, is thereby destroyed as it were, being deprived of its nutritive spirit and as a certain poet, speaking of reaping corn, says, Then, when the vigorous youth shall Ceres cut.\n\nFor those who indulge themselves in this manner of expression, act just as wisely as they would do, who should call the sails, the cables, and the anchors of the ship, the pilot; or the yarn and web, the weaver; or the emulsion, the easing draught, and the ptifan , the physician.\n\n\"And, p.\n\n91.\n\nhe observes, that as the sun and the moon, and the heavens, and the earth, and the sea, though common to all mankind, have different names given them by different people; so may the same be affirmed, likewise, of that one supreme reason, who framed this world, and of that one providence which governs and watches over p.\n\n176 the whole, and of those subordinate ministring powers that are set over the universe , that they are the very same everywhere, though the honors which are paid them, as well as the appellations which are given them, are different in different places, according to the laws of each country, as are likewise those symbols, under which the mystics endeavour to lead their votaries to the knowledge of divine truths: and though some of these are more clear and explicit than others, yet are they not any of them without hazard; for whilst some persons, by wholly mistaking their meaning and appellation, have thereby plunged themselves into superstition , others, that they might avoid so fatal a quagmire, are unawares, dashed themselves upon the rock of atheism .\""

