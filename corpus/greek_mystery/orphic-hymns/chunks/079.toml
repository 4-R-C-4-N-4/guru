[content]
body = "XXXIV. T O L A T O N A. The FUMIGATION from MYRRH. DARK veil'd Latona, much invoked queen, Twin-bearing Goddess, of a noble mien; Cæantis great, a mighty mind is thine, Offspring prolific, blest of Jove divine: Phœbus proceeds from thee, the God of light, 5 And Dian fair, whom winged darts delight; She in Ortygia's honor'd regions born, In Delos he, which mountains high adorn. Hear me, O Goddess, with propitious mind, And end these holy rites, with aspect kind. 10"

