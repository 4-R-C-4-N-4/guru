body = "Again, Vesta, in the Orphic hymns, is the same with the mother of the Gods; and the mother of the Gods is celebrated as \"always governing rivers and every sea m ; which perfectly agrees with the appellations given both to Love and Proteus.\n\nAgain, among the various epithets ascribed to the duad, or number two, are, Phanes, Nature, Justice, Rhea, p.\n\n95 Diana, Cupid, Venus, Fate, Death, &c.\n\nNow Phanes, in the Orphic hymns, is the same with Protogonus; and Nature is called πρωτογενία, or first-born, and δίκη, or Justice, as also πεπρωμενή, or Fate.\n\nLikewise Rhea is denominated ϑύγατερ πολυμορφυ Πωτογονοίο, or daughter, of much formed Protogonus; and in the same hymn the reader will find other epithets, which agree with the appellation given to Nature.\n\nAgain, both Nature and Diana are called ὠκυλοχεία, or swiftly bringing forth; and Love as well as Nature is called or two-fold.\n\nIn like manner Rhea and Venus agree, for he says of Venus πάντα γὰρ ἐκ σιθεν ἐσὶν, for all things are from thee; and of Rhea, Μήτηρ μέν τε θεῶν ἠδὲ θνητῶν ἀνθρώπων, or mother of Gods and mortal men.\n\nAfter which he expressly says that earth and heaven, the sea and the air, proceed from her p.\n\n96 divinity.\n\nBesides this, he celebrates Venus as governing the three Fates; ϗαμπ ηρατέεισ τρισσῶν μοιρῶν.\n\nAnd lastly he says of Love, after representing that Deity as invested with the keys of all things thou alone rulest the governments of all these n ; which he likewise affirms of Death in the same words.\n\nAnd thus much for the duad.\n\nThe triad, or number three, they denominated Juno, Latona, Thetis, Hecate or Diana, Pluto, Tritogenia or Minerva, &c.\n\nNow Latona and Thetis, are each of them called in these initiations, κυανόπεπλ# ( ) or dark-veiled; and Minerva and the Moon, who is the same with Diana, θῆλωσ ϗαμπ ἂρσην, female and male.\n\nThe tetrad p.\n\n97 or number four, they denominated Hercules, Vulcan, Mercury, Bacchus two-mothered, Bassarius, key-keeper of nature, Masculine, Feminine, the World, (which in these initiations is the same with Pan) Harmony, justice.\n\nNow Onomacritus calls Hercules and Vulcan, Καρτεροχειρ, or strong-handed; and he celebrates Hercules and Mercury as \"having an almighty heart.\" ϖατκρατες ἦτορ ἔχῶν.\n\nAnd so of the rest.\n\nThe pentad or number of five they called Nature, Pallas, Immortal, Providence, Nemesis, Venus, Justice, &c."

