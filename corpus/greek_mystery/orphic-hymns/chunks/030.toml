[content]
body = "101 who profess, says he, the Orphic theology, consider a two-fold power in souls and in the celestial orbs: the one consisting in knowledge, the other in vivifying and governing the orb with which that power is connected.\n\nThus in the orb of the earth, they call the nostic power Pluto, the other Proserpine b .\n\nIn water, the former power Ocean, and the latter Thetis.\n\nIn air, that thundering Jove, and this Juno.\n\nIn fire, that Phanes, and this Aurora.\n\nIn the soul of the lunar sphere, they call the nostic power Licnitan Bacchus, the other Thalia.\n\nIn the sphere of Mercury, that Bacchus Silenus, this Euterpe.\n\nIn the orb of Venus, that Lysius Bacchus, this p.\n\n102 Erato.\n\nIn the sphere of the sun, that Trietericus Bacchus, this Melpomene.\n\nIn the orb of Mars, that Bassareus Bacchus, this Clio.\n\nIn the sphere of Jove, that Sebazius, this Terpsichore.\n\nIn the orb of Saturn, that Amphietus, this Polymnia.\n\nIn the eighth sphere, that Pericionius, this Urania.\n\nBut in the soul of the world, the nostic power, Bacchus Eribromus, but the animating power Calliope.\n\nFrom all which the Orphic theologers infer, that the particular epithets of Bacchus are compared with those of the Muses on this account, that we may understand the powers of the Muses, as intoxicated with the nectar of divine knowledge; and may consider the nine Muses, and nine Bacchuses, as revolving round one Apollo, that is about the splendor of one invisible Sun.\" The greater part of this fine passage is p.\n\n103 preserved by Gyraldus, in his Syntagma de Musis, and by Natales Comes, in his Mythology, but without mentioning the original author.\n\nNow if the Hymn to the Earth, is compared with the Hymns to Pluto and Proserpine; the one to Ocean, with that to Thetis; and so of the other elements agreeable to the preceding account, we shall discover a wonderful similitude.\n\nAnd with respect to the celestial spheres, Silenus Bacchus, who, according to the preceding account, should agree with Mercury, is called in these initiations τροφὴ, or Nourishment, and Mercury, τροφιυχε, or Nourisher.\n\nVenus, who should agree with Lysius Bacchus, is called κρυφία or Occult, and ἐρατοπλόκαμος, or lovely haired, and σεμνὴ Βάκχοιο παρεδρε, or venerable attendant of Bacchus; and Lysius is denominated κρυψίγονος, or an occult offspring p.\n\n104 and καλλιέθειρα, or fair-haired.\n\nIn like manner Trietericus Bacchus is called ϖαιάν κρυσετχησ or Apollo pouring golden light, which evidently agrees with the sun.\n\nAgain, Bassarius Bacchus is celebrated as rejoicing in swords and blood, οσ ξιφεσιν χαιρεισ, ἠδ᾽ αἴμασι, κ· λ·, which plainly corresponds with Mars, as the hymn to that Deity evinces in a particular manner."

