[content]
body = "XXXVI. TO THE TITANS * The FUMIGATION from FRANKINCENSE. O Mighty Titans, who from heav'n and earth Derive your noble and illustrious birth, Our fathers fires, in Tartarus profound Who dwell, deep merg'd beneath the solid ground: Fountains and principles, from whom began 5 Th' afflicted, miserable, race of man: Who not alone in earth's retreats abide, But in the ocean and the air reside; Since ev'ry species from your nature flows, Which all prolific, nothing barren knows: 10 Avert your rage, if from th' infernal seats One of your tribe should visit our retreats. Footnotes 167:* See note to Hymn xxxi. to Pallas."

