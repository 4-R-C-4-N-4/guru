[content]
body = "371, informs us, that, according to the Eleusinian mysteries, Proserpine together with Pluto, governs terrestrial concerns, and the recesses of the earth: that she supplies life to the extreme p.\n\n155 parts of the universe, and imparts soul to those, who, by her power, are rendered inanimate and dead.\n\nThis is perfectly agreeable to the 23d and following line."

