[content]
body = "LXXXVI.\n\nTO DEATH.\n\nThe FUMIGATION from MANNA.\n\nHEAR me, O Death, whose empire unconfin'd, Extends to mortal tribes of ev'ry kind.\n\nOn thee, the portion of our time depends, Whose absence lengthens life, whose presence ends.\n\np.\n\n225 Thy sleep perpetual bursts the vivid folds, 5 By which the soul, attracting body holds: 6 p.\n\n226 Common to all of ev'ry sex and age, For nought escapes thy all-destructive rage; p.\n\n227 Not youth itself thy clemency can gain, Vig'rous and strong, by thee untimely slain.\n\n10 In thee, the end of nature's works is known, In thee, all judgment is absolv'd alone: No suppliant arts thy dreadful rage controul, No vows revoke the purpose of thy soul; O blessed pow'r regard my ardent pray'r, 15 And human life to age abundant spare.\n\nTHE END.\n\nFootnotes 225:6 Ver.\n\n6.] By which the soul , &c.\n\nThis is best explained by Porphyry in his excellent work entitled Ἀφορμαὶ πεὸσ τὰ Νοητά 8.\n\nas follows: \"Whatever nature binds, nature again dissolves; and that which the soul conciliates into union, the soul disperses and dissolves.\n\nNature, indeed, bound the body to the soul; but the soul ties herself to the body.\n\nHence, nature frees the body from the soul, but the soul by the exercise of philosophy, separates herself from the deadly bands of the body.\" And again, in the next sentence, \"Death is of two kinds, the one equally known to all men, when the body is separated from the soul; but the other peculiar to philosophers, when the soul is separated from the body: nor does the one always attend the other.\" Now this two-fold death we must understand in the following manner: that though some particular body may be loosened from the soul, yet while material passions and affections reside in the soul, the soul will continually verge to another body, and as long as this inclination continues, remain connected with the body.\n\nBut when from the dominion of an intellectual nature, the soul is separated from material affections, it is truly liberated from the body; though the body at the same time verges and clings to the soul, as to the immediate cause of its support.\n\nAnd thus much for a Commentary on the Hymns or Initiations of Orpheus.\n\nBut before I conclude the present work, I beg leave to address a few words to the liberal and philosophical part of my readers.\n\nYou then, as the votaries of truth, will, I doubt not, unite with me in most earnest wishes, that every valuable work on the Platonic philosophy was well translated into our native tongue; that we might no longer be subject to the toil of learning the ancient languages.\n\nThe mischief, indeed, resulting from the study of words is almost too apparent to need any illustration; as the understanding is generally contra p.\n\n226 its vigour exhausted; and the genius fettered to verbal criticism, and grammatical trifles.\n\nHence an opinion is gradually formed, that the Greek philosophy can alone be understood in the Greek tongue: and thus the books containing the wisdom of antiquity, are for the most part deposited, in the hands of men, incapable of comprehending their contents.\n\nWhile an opinion so sordid prevails, amidst all our refinements in arts, and increasing mass of experiments, we must remain with respect to philosophy in a state of barbarous ignorance.\n\nWe may flourish, indeed, as a commercial people; and stretch the rod of empire over nations as yet unknown."

