[content]
body = "X.\n\nTO PAN * The FUMIGATION from VARIOUS ODORS I Call strong Pan, the substance of the whole, Etherial, marine, earthly, general soul, Immortal fire; for all the world is thine, And all are parts of thee, O pow'r divine.\n\np.\n\n131 Come, blessed Pan, whom rural haunts delight, 5 Come, leaping, agile, wand'ring, starry light; The Hours and Seasons, wait thy high command, And round thy throne in graceful order stand.\n\nGoat-footed, horned, Bacchanalian Pan, Fanatic pow'r, from whom the world began, 10 Whose various parts by thee inspir'd, combine In endless dance and melody divine.\n\nIn thee a refuge from our fears we find, Those fears peculiar to the human kind.\n\nThee shepherds, streams of water, goats rejoice, 15 Thou.\n\nlov'st the chace, and Echo's secret voice: 16 The sportive nymphs, thy ev'ry step attend, 17 And all thy works fulfill their destin'd end.\n\nO all-producing pow'r, much-fam'd, divine, The world's great ruler, rich increase is thine.\n\n20 All-fertile Pæan, heav'nly splendor pure, In fruits rejoicing, and in caves obscure.\n\n22 p.\n\n132 True serpent-horned Jove, whose dreadful rage 23 When rous'd, 'tis hard for mortals to asswage.\n\nBy thee the earth wide-bosom'd deep and long, 25 Stands on a basis permanent and strong.\n\nTh' unwearied waters of the rolling sea, Profoundly spreading, yield to thy decree.\n\nOld Ocean too reveres thy high command, Whose liquid arms begirt the solid land.\n\n30 The spacious air, whose nutrimental fire, And vivid blasts, the heat of life inspire The lighter frame of fire, whose sparkling eye Shines on the summit of the azure sky, Submit alike to thee, whole general sway 35 All parts of matter, various form'd obey.\n\np.\n\n133 All nature's change thro' thy protecting care, And all mankind thy lib'ral bounties share: For these where'er dispers'd thro' boundless space, Still find thy providence support their race.\n\n40 Come, Bacchanalian, blessed power draw near, Fanatic Pan, thy humble suppliant hear, Propitious to these holy rites attend, And grant my life may meet a prosp'rous end; Drive panic Fury too, wherever found, 55 From human kind, to earth's remotest bound.\n\nFootnotes 130:* Pan, it is well known, is the same with the Universe, and is called by Orpheus προτογονοσ (Protogonos), as we are informed by Damascius περὶ ἀρχῶν.\n\nNow Jupiter in the Orphic theology, is the demiurgus of the universe, or the first intellect; and Apollo, in the intellectual world, is the same with Jupiter, as we have shewn in our notes to the Sun.\n\nHence the reason is obvious why Pan is called in this Hymn, all-fertile Pan.\n\nAnd if we compare the Orphic fragment, given in the Dissertation, with the present Hymn, we shall find a striking resemblance; as the king and father of universe, Protogonus or Jupiter is there celebrated as being all things; and is represented under the symbol of a divine body, whole members are the various parts of the world.\n\n131:16 Ver.\n\n16] Echo's secret voice .\n\nPhurnutus informs us, that Pan is reported to dwell in solitary places, for the purpose of evincing his unity."

