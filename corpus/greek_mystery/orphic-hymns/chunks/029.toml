[content]
body = "Now Nature is called in these hymns, or rather initiations πολυμήχανε μῆτερ, or much-mechanic Mother, and παντοτεχνεσ or universal Artist; and Minerva is denominated μητερ τεχνῶν, or Mother of Arts.\n\nLikewise Nature is expressly called ἀθανάτη τε ϖρόνιοια or Immortal, and Providence.\n\nThe hexad or number six, they denominated, Venus, p.\n\n98 Health, the World Ἐκατηϐελέτις darting, (because compounded of the triad, which is called Hecate), Persæa, triform, Amphitrite, &c.\n\nNow Venus, as we have already observed in the names of the duad, is said to be the source of all things and Health is expressly called μῆτερ ἀπαντων, or Mother of all things.\n\nAgain the heptad, or number seven they called Fortune, Minerva, Mars., &c.\n\nAnd Fortune, in these initiations, is the same with Diana or the Moon, who is called male and female as well as Minerva; and Minerva and Mars are each of them denominated ὀπλιχαρές or armipotent, and Minerva πολεμοκλόνε, or full of warlike tumult.\n\nThe ogdoad, or number eight, they called Rhea, Love, Neptune, Law.\n\nAnd the Mother of the Gods, who is the same with Rhea, is represented as we have observed on the monad, as governing rivers and every p.\n\n99 sea; and Love is said to have the keys of all things; of heaven, the deep, &c.\n\nThe ennead, or number nine, they denominate Ocean, Prometheus, Vulcan, Pœan (i.\n\ne.\n\nApollo or the Sun), Juno, Proserpine, &c.\n\nNow Saturn (who is called in these initiations Prometheus) and Ocean, are each of them celebrated as the source of Gods and men: and Vulcan is expressly called ἤλιοσ or the Sun.\n\nAnd lastly they denominated the decad, Heaven, the Sun, Unwearied, Fate, Phanes, Necessity, &c.\n\nHence Heaven is called in these initiations φύλαξ πάντων, or Guardian of all things; and the Sun ϖισοφύλαξ, or faithful Guardian; and ἀκάμα or Unwearied, is an appellation of the Sun, in the hymn to that Deity.\n\nThe reader too will find many epithets in the hymn to Protogonus or Phanes, corresponding with those of the Sun.\n\nAnd thus much for the agreement of these hymns, p.\n\n100 with the Pythagoric names of numbers.\n\nThe limits of the present work will not permit me to be more explicit on this particular; but he who wishes to understand the meaning of many of the preceding appellations, may consult the valuable book of Meursius, already cited, where he will meet with abundant matter for deep speculation.\n\nBut before I conclude this Dissertation, I must beg leave to acquaint the reader with another discovery which I have made respecting these hymns, equally curious with the former.\n\nFicinus, on Plato's Theology a , has the following remarkable passage, translated, most likely from some manuscript work of Proclus, as I conjecture from its conclusion; for, unfortunately, he does not acquaint us with the author.\n\n\"Those p."

