section = "Hymn 88. Sacred Texts Classics Index Previous Next p. 219 LXXXI. TO THE SOUTH WIND. The FUMIGATION from FRANKINCENSE. WIDE coursing gales, whose lightly leaping feet With rapid wings the air's wet bosom beat, Approach benevolent, swift-whirling pow'rs, With humid clouds the principles of flow'rs: For flow'ry clouds are portion'd to your care, 5 To send on earth from all surrounding air. Bear, blessed pow'rs, these holy rites attend, And fruitful rains on earth all-parent send. Next: LXXXII: To Ocean"
