[content]
body = "LXXIV. TO PALÆMON. The FUMIGATION from. MANNA. O Nurs'd with Dionysius, doom'd to keep Thy dwelling in the widely-spreading deep: With joyful aspect to my pray'r incline, Propitious come, and bless the rites divine: Thro' earth and sea thy ministers attend, 5 And from old Ocean's stormy waves defend: For ships their safety ever owe to thee, Who wand'rest with them thro' the raging sea. Come, guardian pow'r, whom mortal tribes desire, And far avert the deep's destructive ire. 10"

