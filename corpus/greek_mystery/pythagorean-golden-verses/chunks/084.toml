[content]
body = "Καὶ τοῖς, οἳ γλαυκὴν δυσπέμφελον ἐργάζονται, 440 εὔχονται δ᾽ Ἑκάτῃ καὶ ἐρικτύπῳ Ἐννοσιγαίῳ, ῥηιδίως ἄγρην κυδρὴ θεὸς ὤπασε πολλήν, ῥεῖα δ᾽ ἀφείλετο φαινομένην, ἐθέλουσά γε θυμῷ.\n\nἘσθλὴ δ᾽ ἐν σταθμοῖσι σὺν Ἑρμῇ ληίδ᾽ ἀέξειν· βουκολίας δ᾽ ἀγέλας τε καὶ αἰπόλια πλατέ᾽ αἰγῶν 445 ποίμνας τ᾽ εἰροπόκων ὀίων, θυμῷ γ᾽ ἐθέλουσα, ἐξ ὀλίγων βριάει καὶ ἐκ πολλῶν μείονα θῆκεν.\n\nΟὕτω τοι καὶ μουνογενὴς ἐκ μητρὸς ἐοῦσα πᾶσι μετ᾽ ἀθανάτοισι τετίμηται γεράεσσιν.\n\nΘῆκε δέ μιν Κρονίδης κουροτρόφον, οἳ μετ᾽ ἐκείνην 450 ὀφθαλμοῖσιν ἴδοντο φάος πολυδερκέος Ἠοῦς.\n\nΟὕτως ἐξ ἀρχῆς κουροτρόφος, αἳ δέ τε τιμαί."

