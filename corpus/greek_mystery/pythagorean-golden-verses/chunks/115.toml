[content]
body = "Αὐτὰρ ἐρισμαράγοιο Διὸς κλειτοὶ ἐπίκουροι 815 δώματα ναιετάουσιν ἐπ᾽ Ὠκεανοῖο θεμέθλοις, Κόττος τ᾽ ἠδὲ Γύης· Βριάρεών γε μὲν ἠὺν ἐόντα γαμβρὸν ἑὸν ποίησε βαρύκτυπος Ἐννοσίγαιος, δῶκε δὲ Κυμοπόλειαν ὀπυίειν, θυγατέρα ἥν.] Αὐτὰρ ἐπεὶ Τιτῆνας ἀπ᾽ οὐρανοῦ ἐξέλασεν Ζεύς, 820 ὁπλότατον τέκε παῖδα Τυφωέα Γαῖα πελώρη Ταρτάρου ἐν φιλότητι διὰ χρυσέην Ἀφροδίτην· οὗ χεῖρες μὲν ἔασιν ἐπ᾽ ἰσχύι, ἔργματ᾽ ἔχουσαι, καὶ πόδες ἀκάματοι κρατεροῦ θεοῦ· ἐκ δέ οἱ ὤμων ἣν ἑκατὸν κεφαλαὶ ὄφιος, δεινοῖο δράκοντος, 825 γλώσσῃσιν δνοφερῇσι λελιχμότες, ἐκ δέ οἱ ὄσσων θεσπεσίῃς κεφαλῇσιν ὑπ᾽ ὀφρύσι πῦρ ἀμάρυσσεν· [πασέων δ᾽ ἐκ κεφαλέων πῦρ καίετο δερκομένοιο·]"

