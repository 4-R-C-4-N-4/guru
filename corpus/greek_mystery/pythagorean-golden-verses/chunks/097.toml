[content]
body = "Ὡς δ᾽ ὁπότ᾽ ἐν σμήνεσσι κατηρεφέεσσι μέλισσαι κηφῆνας βόσκωσι, κακῶν ξυνήονας ἔργων· 595 αἳ μέν τε πρόπαν ἦμαρ ἐς ἠέλιον καταδύντα ἠμάτιαι σπεύδουσι τιθεῖσί τε κηρία λευκά, οἳ δ᾽ ἔντοσθε μένοντες ἐπηρεφέας κατὰ σίμβλους ἀλλότριον κάματον σφετέρην ἐς γαστέρ᾽ ἀμῶνται· ὣς δ᾽ αὔτως ἄνδρεσσι κακὸν θνητοῖσι γυναῖκας 600 Ζεὺς ὑψιβρεμέτης θῆκεν, ξυνήονας ἔργων ἀργαλέων· ἕτερον δὲ πόρεν κακὸν ἀντ᾽ ἀγαθοῖο· ὅς κε γάμον φεύγων καὶ μέρμερα ἔργα γυναικῶν μὴ γῆμαι ἐθέλῃ, ὀλοὸν δ᾽ ἐπὶ γῆρας ἵκοιτο χήτεϊ γηροκόμοιο· ὅ γ᾽ οὐ βιότου ἐπιδευὴς 605 ζώει, ἀποφθιμένου δὲ διὰ κτῆσιν δατέονται χηρωσταί· ᾧ δ᾽ αὖτε γάμου μετὰ μοῖρα γένηται, κεδνὴν δ᾽ ἔσχεν ἄκοιτιν ἀρηρυῖαν"

