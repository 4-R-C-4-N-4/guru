[content]
body = "Τρεῖς δέ οἱ Εὐρυνόμη Χάριτας τέκε καλλιπαρῄους, Ὠκεανοῦ κούρη, πολυήρατον εἶδος ἔχουσα, Ἀγλαΐην τε καὶ Εὐφροσύνην Θαλίην τ᾽ ἐρατεινήν· [τῶν καὶ ἀπὸ βλεφάρων ἔρος εἴβετο δερκομενάων 910 λυσιμελής· καλὸν δέ θ᾽ ὑπ᾽ ὀφρύσι δερκιόωνται.] Αὐτὰρ ὁ Δήμητρος πολυφόρβης ἐς λέχος ἦλθεν, ἣ τέκε Περσεφόνην λευκώλενον, ἣν Ἀιδωνεὺς ἥρπασε ἧς παρὰ μητρός· ἔδωκε δὲ μητίετα Ζεύς.\n\nΜνημοσύνης δ᾽ ἐξαῦτις ἐράσσατο καλλικόμοιο, 915 ἐξ ἧς οἱ Μοῦσαι χρυσάμπυκες ἐξεγένοντο ἐννέα, τῇσιν ἅδον θαλίαι καὶ τέρψις ἀοιδῆς.\n\nΛητὼ δ᾽ Ἀπόλλωνα καὶ Ἄρτεμιν ἰοχέαιραν, ἱμερόεντα γόνον περὶ πάντων Οὐρανιώνων, γείνατο, αἰγιόχοιο Διὸς φιλότητι μιγεῖσα."

