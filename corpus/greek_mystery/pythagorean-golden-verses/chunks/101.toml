[content]
body = "Ὑμεῖς δὲ μεγάλην τε βίην καὶ χεῖρας ἀάπτους φαίνετε Τιτήνεσσιν ἐναντίοι ἐν δαῒ λυγρῇ 650 μνησάμενοι φιλότητος ἐνηέος, ὅσσα παθόντες ἐς φάος ἂψ ἀφίκεσθε δυσηλεγέος ὑπὸ δεσμοῦ ἡμετέρας διὰ βουλὰς ὑπὸ ζόφου ἠερόεντος.\n\nὭς φάτο· τὸν δ᾽ ἐξαῦτις ἀμείβετο Κόττος ἀμύμων· δαιμόνι᾽, οὐκ ἀδάητα πιφαύσκεαι· ἀλλὰ καὶ αὐτοὶ 655 ἴδμεν, ὅ τοι περὶ μὲν πραπίδες, περὶ δ᾽ ἐστὶ νόημα, ἀλκτὴρ δ᾽ ἀθανάτοισιν ἀρῆς γένεο κρυεροῖο.\n\nΣῇσι δ᾽ ἐπιφροσύνῃσιν ὑπὸ ζόφου ἠερόεντος ἄψορρον δεῦρ᾽ αὖτις ἀμειλίκτων ὑπὸ δεσμῶν ἠλύθομεν, Κρόνου υἱὲ ἄναξ, ἀνάελπτα παθόντες."

