[content]
body = "80 Ὅν τινα τιμήσωσι Διὸς κοῦραι μεγάλοιο γεινόμενόν τε ἴδωσι διοτρεφέων βασιλήων, τῷ μὲν ἐπὶ γλώσσῃ γλυκερὴν χείουσιν ἐέρσην, τοῦ δ᾽ ἔπε᾽ ἐκ στόματος ῥεῖ μείλιχα· οἱ δέ τε λαοὶ πάντες ἐς αὐτὸν ὁρῶσι διακρίνοντα θέμιστας 85 ἰθείῃσι δίκῃσιν· ὃ δ᾽ ἀσφαλέως ἀγορεύων αἶψά κε καὶ μέγα νεῖκος ἐπισταμένως κατέπαυσεν· τοὔνεκα γὰρ βασιλῆες ἐχέφρονες, οὕνεκα λαοῖς βλαπτομένοις ἀγορῆφι μετάτροπα ἔργα τελεῦσι ῥηιδίως, μαλακοῖσι παραιφάμενοι ἐπέεσσιν.\n\n90 Ἐρχόμενον δ᾽ ἀν᾽ ἀγῶνα θεὸν ὣς ἱλάσκονται αἰδοῖ μειλιχίῃ, μετὰ δὲ πρέπει ἀγρομένοισιν· τοίη Μουσάων ἱερὴ δόσις ἀνθρώποισιν."

