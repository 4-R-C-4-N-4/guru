[content]
body = "πραπίδεσσι, τῷ δέ τ᾽ ἀπ᾽ αἰῶνος κακὸν ἐσθλῷ ἀντιφερίζει ἐμμενές· ὃς δέ κε τέτμῃ ἀταρτηροῖο γενέθλης, 610 ζώει ἐνὶ στήθεσσιν ἔχων ἀλίαστον ἀνίην θυμῷ καὶ κραδίῃ, καὶ ἀνήκεστον κακόν ἐστιν.\n\nὭς οὐκ ἔστι Διὸς κλέψαι νόον οὐδὲ παρελθεῖν.\n\nΟὐδὲ γὰρ Ἰαπετιονίδης ἀκάκητα Προμηθεὺς τοῖό γ᾽ ὑπεξήλυξε βαρὺν χόλον, ἀλλ᾽ ὑπ᾽ ἀνάγκης 615 καὶ πολύιδριν ἐόντα μέγας κατὰ δεσμὸς ἐρύκει.\n\nΒριάρεῳ δ᾽ ὡς πρῶτα πατὴρ ὠδύσσατο θυμῷ Κόττῳ τ᾽ ἠδὲ Γύῃ, δῆσεν κρατερῷ ἐνὶ δεσμῷ ἠνορέην ὑπέροπλον ἀγώμενος ἠδὲ καὶ εἶδος καὶ μέγεθος· κατένασσε δ᾽ ὑπὸ χθονὸς εὐρυοδείης."

