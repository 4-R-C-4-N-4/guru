[content]
body = "There is not any gate of wealth so secure, which the opportunity of fortune may not open.\n\n50.\n\nExpel by reasoning the unrestrained grief of a torpid soul.\n\n51 .\n\nIt is the province of the wise man to bear poverty with equanimity.\n\n52.\n\nSpare your life, lest you consume it with sorrow and care.\n\n53.\n\nNor will I be silent as to this particular, that it appeared both to Plato and Pythagoras, that old age was not to be considered with reference to an egress from the present life, but to the beginning of a blessed life.\n\n54.\n\nThe ancient theologists and priests testify that the soul is conjoined to the body through a certain punishment, and, that it is buried in this body as in a sepulchre.\n\n55.\n\nWhatever we see when awake is death; and when asleep, a dream.\n\nFootnotes 47:1 Hence the dogma of the Stoics derived its origin, that the wise man is independent of fortune.\n\nNext: Select Sentences of Sextus the Pythagorean"

