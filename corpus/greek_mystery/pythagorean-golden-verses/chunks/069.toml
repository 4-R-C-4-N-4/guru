[content]
body = "θ᾽ Ἁλιμήδη 255 Γλαυκονόμη τε φιλομμειδὴς καὶ Ποντοπόρεια Ληαγόρη τε καὶ Εὐαγόρη καὶ Λαομέδεια Πουλυνόη τε καὶ Αὐτονόη καὶ Λυσιάνασσα [Εὐάρνη τε φυήν τ᾽ ἐρατὴ καὶ εἶδος ἄμωμος] καὶ Ψαμάθη χαρίεσσα δέμας δίη τε Μενίππη 260 Νησώ τ᾽ Εὐπόμπη τε Θεμιστώ τε Προνόη τε Νημερτής θ᾽, ἣ πατρὸς ἔχει νόον ἀθανάτοιο.\n\nΑὗται μὲν Νηρῆος ἀμύμονος ἐξεγένοντο κοῦραι πεντήκοντα, ἀμύμονα ἔργα ἰδυῖαι.\n\nΘαύμας δ᾽ Ὠκεανοῖο βαθυρρείταο θύγατρα 265 ἠγάγετ᾽ Ἠλέκτρην· ἣ δ᾽ ὠκεῖαν τέκεν Ἶριν ἠυκόμους θ᾽ Ἁρπυίας Ἀελλώ τ᾽ Ὠκυπέτην τε, αἵ ῥ᾽ ἀνέμων πνοιῇσι καὶ οἰωνοῖς ἕμ᾽ ἕπονται ὠκείῃς πτερύγεσσι· μεταχρόνιαι γὰρ ἴαλλον."

