[content]
body = "Παῦρα δὲ Θαύμαντος θυγάτηρ πόδας ὠκέα Ἶρις 780 ἀγγελίην πωλεῖται ἐπ᾽ εὐρέα νῶτα θαλάσσης.\n\nὉππότ᾽ ἔρις καὶ νεῖκος ἐν ἀθανάτοισιν ὄρηται καί ῥ᾽ ὅς τις ψεύδηται Ὀλύμπια δώματ᾽ ἐχόντων, Ζεὺς δέ τε Ἶριν ἔπεμψε θεῶν μέγαν ὅρκον ἐνεῖκαι τηλόθεν ἐν χρυσέῃ προχόῳ πολυώνυμον ὕδωρ 785 ψυχρόν, ὅτ᾽ ἐκ πέτρης καταλείβεται ἠλιβάτοιο ὑψηλῆς· πολλὸν δὲ ὑπὸ χθονὸς εὐρυοδείης ἐξ ἱεροῦ ποταμοῖο ῥέει διὰ νύκτα μέλαιναν Ὠκεανοῖο κέρας· δεκάτη δ᾽ ἐπὶ μοῖρα δέδασται· ἐννέα μὲν περὶ γῆν τε καὶ εὐρέα νῶτα θαλάσσης 790 δίνῃς ἀργυρέῃς εἱλιγμένος εἰς ἅλα πίπτει, ἣ δὲ μί᾽ ἐκ πέτρης προρέει μέγα πῆμα θεοῖσιν."

