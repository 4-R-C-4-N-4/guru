[content]
body = "Ἐκ γὰρ τῆς εἵμαρτο περίφρονα τέκνα γενέσθαι· πρώτην μὲν κούρην γλαυκώπιδα Τριτογένειαν 895 ἶσον ἔχουσαν πατρὶ μένος καὶ ἐπίφρονα βουλήν.\n\nαὐτὰρ ἔπειτ᾽ ἄρα παῖδα θεῶν βασιλῆα καὶ ἀνδρῶν ἤμελλεν τέξεσθαι, ὑπέρβιον ἦτορ ἔχοντα· ἀλλ᾽ ἄρα μιν Ζεὺς πρόσθεν ἑὴν ἐσκάτθετο νηδύν, ὡς δή οἱ φράσσαιτο θεὰ ἀγαθόν τε κακόν τε.\n\n900 Δεύτερον ἠγάγετο λιπαρὴν Θέμιν, ἣ τέκεν Ὥρας, Εὐνουμίην τε Δίκην τε καὶ Εἰρήνην τεθαλυῖαν, αἳ ἔργ᾽ ὠρεύουσι καταθνητοῖσι βροτοῖσι, Μοίρας θ᾽, ᾗ πλείστην τιμὴν πόρε μητίετα Ζεύς, Κλωθώ τε Λάχεσίν τε καὶ Ἄτροπον, αἵτε διδοῦσι 905 θνητοῖς ἀνθρώποισιν ἔχειν ἀγαθόν τε κακόν τε."

