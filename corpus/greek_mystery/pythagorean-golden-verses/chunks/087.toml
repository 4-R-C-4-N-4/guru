[content]
body = "Οἳ δὲ θυγατρὶ φίλῃ μάλα μὲν κλύον ἠδ᾽ ἐπίθοντο, καί οἱ πεφραδέτην, ὅσα περ πέπρωτο γενέσθαι 475 ἀμφὶ Κρόνῳ βασιλῆι καὶ υἱέι καρτεροθύμῳ.\n\nΠέμψαν δ᾽ ἐς Λύκτον, Κρήτης ἐς πίονα δῆμον, ὁππότ᾽ ἄρ᾽ ὁπλότατον παίδων τέξεσθαι ἔμελλε, Ζῆνα μέγαν· τὸν μέν οἱ ἐδέξατο Γαῖα πελώρη Κρήτῃ ἐν εὐρείῃ τραφέμεν ἀτιταλλέμεναί τε.\n\n480 Ἔνθα μιν ἷκτο φέρουσα θοὴν διὰ νύκτα μέλαιναν πρώτην ἐς Λύκτον· κρύψεν δέ ἑ χερσὶ λαβοῦσα ἄντρῳ ἐν ἠλιβάτῳ, ζαθέης ὑπὸ κεύθεσι γαίης, Αἰγαίῳ ἐν ὄρει πεπυκασμένῳ ὑλήεντι.\n\nΤῷ δὲ σπαργανίσασα μέγαν λίθον ἐγγυάλιξεν 485 Οὐρανίδῃ μέγ᾽ ἄνακτι, θεῶν προτέρῳ βασιλῆι."

