[content]
body = "Στὺξ δ᾽ ἔτεκ᾽ Ὠκεανοῦ θυγάτηρ Πάλλαντι μιγεῖσα Ζῆλον καὶ Νίκην καλλίσφυρον ἐν μεγάροισιν· καὶ Κράτος ἠδὲ Βίην ἀριδείκετα γείνατο τέκνα, 385 τῶν οὐκ ἔστ᾽ ἀπάνευθε Διὸς δόμος, οὐδέ τις ἕδρη, οὐδ᾽ ὁδός, ὅππη μὴ κείνοις θεὸς ἡγεμονεύῃ, ἀλλ᾽ αἰεὶ πὰρ Ζηνὶ βαρυκτύπῳ ἑδριόωνται."

