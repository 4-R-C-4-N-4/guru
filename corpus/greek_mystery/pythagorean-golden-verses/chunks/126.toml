[content]
body = "Χρυσοκόμης δὲ Διώνυσος ξανθὴν Ἀριάδνην, κούρην Μίνωος, θαλερὴν ποιήσατ᾽ ἄκοιτιν.\n\nΤὴν δέ οἱ ἀθάνατον καὶ ἀγήρω θῆκε Κρονίων.\n\nἭβην δ᾽ Ἀλκμήνης καλλισφύρου ἄλκιμος υἱός, 950 ἲς Ἡρακλῆος, τελέσας στονόεντας ἀέθλους, παῖδα Διὸς μεγάλοιο καὶ Ἥρης χρυσοπεδίλου, αἰδοίην θέτ᾽ ἄκοιτιν ἐν Οὐλύμπῳ νιφόεντι, ὄλβιος, ὃς μέγα ἔργον ἐν ἀθανάτοισιν ἀνύσσας ναίει ἀπήμαντος καὶ ἀγήραος ἤματα πάντα.\n\n955 Ἠελίῳ δ᾽ ἀκάμαντι τέκεν κλυτὸς Ὠκεανίνη Περσηὶς Κίρκην τε καὶ Αἰήτην βασιλῆα.\n\nΑἰήτης δ᾽ υἱὸς φαεσιμβρότου Ἠελίοιο κούρην Ὠκεανοῖο τελήεντος ποταμοῖο γῆμε θεῶν βουλῇσι, Ἰδυῖαν καλλιπάρῃον."

