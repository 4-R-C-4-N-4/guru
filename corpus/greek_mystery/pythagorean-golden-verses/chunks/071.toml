[content]
body = "Χὠ μὲν ἀποπτάμενος προλιπὼν χθόνα, μητέρα μήλων, ἵκετ᾽ ἐς ἀθανάτους· Ζηνὸς δ᾽ ἐν δώμασι ναίει 285 βροντήν τε στεροπήν τε φέρων Διὶ μητιόεντι.\n\nΧρυσάωρ δ᾽ ἔτεκεν τρικέφαλον Γηρυονῆα μιχθεὶς Καλλιρόῃ κούρῃ κλυτοῦ Ὠκεανοῖο.\n\nΤὸν μὲν ἄρ᾽ ἐξενάριξε βίη Ἡρακληείη βουσὶ παρ᾽ εἰλιπόδεσσι περιρρύτῳ εἰν Ἐρυθείῃ 290 ἤματι τῷ ὅτε περ βοῦς ἤλασεν εὐρυμετώπους Τίρυνθ᾽ εἰς ἱερὴν διαβὰς πόρον Ὠκεανοῖο Ὄρθον τε κτείνας καὶ βουκόλον Εὐρυτίωνα σταθμῷ ἐν ἠερόεντι πέρην κλυτοῦ Ὠκεανοῖο."

