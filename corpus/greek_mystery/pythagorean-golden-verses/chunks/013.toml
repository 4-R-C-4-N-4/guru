[content]
body = "The sacrifices of fools are the aliment of the fire; but the offerings which they suspend in temples are the supplies of the sacrilegious.\n\n23.\n\nUnderstand that no dissimulation can be long concealed.\n\n24.\n\nThe unjust man suffers greater evil while his soul is tormented with a consciousness of guilt, than when his body is scourged with whips.\n\n25.\n\nIt is by no means safe to discourse concerning Divinity with men of false opinions; for the danger is equally great in speaking to such as these, things either fallacious or true.\n\n26.\n\nBy everywhere using reason as your guide, you will avoid the commission of crimes.\n\n27.\n\nBy being troublesome to others, you will not easily escape molestation yourself.\n\n28.\n\nConsider that as great erudition, through which you are able to bear the want of erudition, in the ignorant.\n\np.\n\n34 29.\n\nHe who is depraved does not listen to the divine law, and on this account lives without law.\n\n30.\n\nA just man who is a stranger, is not only superior to a citizen, but is even more excellent than a relation.\n\n31.\n\nAs many passions of the soul, so many fierce and savage despots.\n\n32.\n\nNo one is free who has not obtained the empire of himself.\n\n33.\n\nLabour, together with continence, precedes the acquisition of every good.\n\n34.\n\nBe persuaded that those things are not your riches which you do not possess in the penetralia of the reasoning powers.\n\n35.\n\nDo that which you judge to be beautiful and honest, though you should acquire no glory from the performance; for the vulgar is a depraved judge of beautiful deeds.\n\n36.\n\nMake trial of a man rather from his deeds than his discourses; for many live badly and speak well.\n\n37.\n\nPerform great things, at the same time promising nothing great.\n\n38.\n\nSince the roots of our nature are established in Divinity, from which also we p.\n\n35 are produced, we should tenaciously adhere to our root; for streams also of water, and other offspring of the earth, when their roots are cut off, become rotten and dry.\n\n39.\n\nThe strength of the soul is temperance; for this is the light of a soul destitute of passions; but it is much better to die than to darken the soul through the intemperance of the body.\n\n40.\n\nYou cannot easily denominate that man happy who depends either on his friends or children, or on any fleeting and fallen nature; for all these are unstable and uncertain; but to depend on oneself and on Divinity is alone stable and firm.\n\n41.\n\nHe is a wise man, and beloved of Divinity, who studies how to labour for the good of his soul, as much as others labour for the sake of the body.\n\n42.\n\nYield all things to their kindred and ruling nature except liberty.\n\n43.\n\nLearn how to produce eternal children, not such as may supply the wants of the body in old age, but such as may nourish the soul with perpetual food.\n\n44, It is impossible that the same person can be a lover of pleasure, a lover of p.\n\n36 body, a lover of riches, and a lover of Divinity .\n\nFor a lover of pleasure is also a lover of body; but a lover of body is entirely a lover of riches; a lover of riches is necessarily unjust; and the unjust is necessarily profane towards Divinity, and lawless with respect to men.\n\nHence, though he should sacrifice hecatombs, he is only by this means the more impious, unholy, atheistical, and sacrilegious, with respect to his intentions: and on this account it is necessary to avoid every lover of pleasure as an atheist and polluted person.\n\n45.\n\nThe Divinity has not a place in the earth more allied to his nature than a pure and holy soul."

