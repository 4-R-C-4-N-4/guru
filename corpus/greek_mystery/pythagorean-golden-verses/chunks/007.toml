[content]
body = "Therefore, the Oath is constantly observed by the Immortal Gods, they being always conscious of the Divine Will; but by the Heroes only to the extent to which they understand and know God.\n\nThe mortal Oath--that used amongst men--has to be reverenced as an image of the other, and as leading to the greatest strength and stability of character.\n\nAnd if man would reverence the Oath, then must he do all in his power to understand the laws that govern this universe, and endeavour to preserve harmony and order in all things.\n\nThe Illustrious Heroes are the second or middle order of beings, and are turned ever towards God, though not always to the same extent.\n\nThey are divided into three subdivisions:--(1) The Angels, or Ambassadors (being nearest to the Immortal Gods in their nature); (2) The Dæmons, or Spirits; and (3) The Heroes.\n\n3.\n\nThe Terrestrial Dæmons are the souls of men, beautified with truth and virtue, being Masters of Wisdom, having true p.\n\n14 knowledge.\n\nThey are \"terrestrial,\" remaining on earth in order to guide and govern men.\n\nThe best worship to be offered to these men (who are men and yet resemble the Illustrious Heroes), is by obeying those precepts they have left and recommended to us, and by following their instructions as laws; purposing to ourselves the same course of life they lead, the tradition of which they have set down in writing.\n\nThis tradition gives the principles of truth and rules of virtue, as an immortal and paternal inheritance, to be preserved to all succeeding generations for the common good.\n\nTo obey these, and live accordingly, is the truest reverence that can be done them.\n\n4.\n\n\"Reverence thy parents.\" But how it those parents be depraved?\n\n\"If the Divine Law directs us to one thing and our parents to another, then in this deliberation we ought to obey the best, disobeying our parents in those things only in which they recede from the Divine Laws.\" But always a most willing service and obedience must be rendered in all things pertaining to the body or estate.\n\np.\n\n15 To all others, the duties are in proportion to the nearness of the relationship.\n\n7, 8.\n\nNever must friendship be broken for the sake of riches, or glory, or other frail and perishable things.\n\nOnly if the friend falls into a corrupt and degraded mode of life is it right to break the sacred tie of friendship, and then only after every effort has been made to bring him back to the ways of virtue.\n\nHierocles warns us that we have far more strength than we imagine, and all we need is to feel the necessity of preserving friendship.\n\n11, 12.\n\nIf a man makes himself his own guardian, he is then not likely to fall into evil ways if he is out of the reach of public opinion, nor will he be rushed into folly through the influence of companions.\n\n17.\n\nSuch calamities as diseases, poverty, loss of friends, etc., are not real ills, for they hurt not the soul, unless it suffers Itself to be precipitated into vice by them.\n\n21-23.\n\nOne should be able to hear every sort of doctrine patiently, carefully discriminating between the true and the false.\n\np.\n\n16 \"But it falsehoods be advanced,\" i.\n\ne.\n\n, false reasonings.\n\n45.\n\nThis verse completes the instruction concerning the Civil or Practical Virtues ; verse 48 begins the Instruction concerning the Contemplative Virtues .\n\nRegarding the practical virtues, Hierocles points out that the three aspects of the soul should be employed on them together, (1) Activity, (2) the Mind, and (3) the Emotions.\n\n47.\n\n\"I swear it by him,\" i.\n\ne.\n\n, by Pythagoras."

