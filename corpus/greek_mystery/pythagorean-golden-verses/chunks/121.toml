[content]
body = "880 Αὐτὰρ ἐπεί ῥα πόνον μάκαρες θεοὶ ἐξετέλεσσαν, Τιτήνεσσι δὲ τιμάων κρίναντο βίηφι, δή ῥα τότ᾽ ὤτρυνον βασιλευέμεν ἠδὲ ἀνάσσειν Γαίης φραδμοσύνῃσιν Ὀλύμπιον εὐρύοπα Ζῆν ἀθανάτων· ὃ δὲ τοῖσιν ἑὰς διεδάσσατο τιμάς.\n\n885 Ζεὺς δὲ θεῶν βασιλεὺς πρώτην ἄλοχον θέτο Μῆτιν πλεῖστα τε ἰδυῖαν ἰδὲ θνητῶν ἀνθρώπων.\n\nἀλλ᾽ ὅτε δὴ ἄρ᾽ ἔμελλε θεὰν γλαυκῶπιν Ἀθήνην τέξεσθαι, τότ᾽ ἔπειτα δόλῳ φρένας ἐξαπατήσας αἱμυλίοισι λόγοισιν ἑὴν ἐσκάτθετο νηδὺν 890 Γαίης φραδμοσύνῃσι καὶ Οὐρανοῦ ἀστερόεντος.\n\nτὼς γάρ οἱ φρασάτην, ἵνα μὴ βασιληίδα τιμὴν ἄλλος ἔχοι Διὸς ἀντὶ θεῶν αἰειγενετάων."

