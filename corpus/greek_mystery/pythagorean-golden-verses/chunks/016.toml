[content]
body = "It is necessary to provide an inward garment for the protection of the breast, and intellect as a protection against pain.\n\n32.\n\nThe diet of the sick, and the soul of the unwise, are full of fastidiousness.\n\n33.\n\nUntaught boys confound letters, but uneducated men, things.\n\n34, The intellect derived from philosophy is similar to a charioteer; for it is present with our desires, and always conducts them to the beautiful.\n\n35.\n\nTime, indeed, will render the herb absinthium sweeter than honey, but circumstances may sometimes make an enemy preferable to a friend.\n\n36.\n\nA good pilot sometimes suffers shipwreck, and a worthy man is sometimes unfortunate.\n\n37.\n\nThunder especially frightens children; but threats, the unwise.\n\n38.\n\nFigure adorns a statue; but actions adorn a man, 39.\n\nIt is the same thing to drink a deadly medicine from a golden cup, and to receive counsel from an injudicious friend.\n\n40.\n\nSwallows signify fair weather; but p.\n\n42 the discourses of philosophy, exemption from pain.\n\n41.\n\nOrphan children have not so much need of guardians as stupid men.\n\n42.\n\nFortune is like a depraved rewarder of contests; for she frequently crowns him who accomplishes nothing.\n\n43.\n\nThere is need of a pilot and a wind for a prosperous navigation; but of reasoning and fortune, to effect a happy life.\n\n44.\n\nA timid man bears armour against himself; and a fool employs riches for the same purpose.\n\n45.\n\nIt is the same thing to moor a boat by an infirm anchor, and to place hope in a depraved mind.\n\n46.\n\nClouds frequently obscure the sun; but the passions, the reasoning power.\n\n47.\n\nNeither does a golden bed benefit a sick man; nor a splendid fortune, a stupid man.\n\n48.\n\nPure water dissolves inflammation; but mild discourse dissolves anger.\n\n49.\n\nAustere wine is mot adapted for copious drinking, nor rustic manners for conversation.\n\n50.\n\nThe anger of an ape, and the threats of a flatterer, are to be alike regarded.\n\np.\n\n44 51.\n\nOf life, the first part is childhood, on which account all men are attentive to it, as to the first part of a drama.\n\n52.\n\nIt is necessary that we should be cautious in our writings, but splendid in our actions.\n\n53.\n\nAs in plants, so also in youth, the first blossoms indicate the fruit of virtue.\n\n54.\n\nIn banquets, he who is not intoxicated with wine is the more pleasant; but in prosperity, he who does not conduct himself illegally.\n\n55.\n\nIt is the same thing to nourish a serpent, and to benefit a depraved man; for gratitude is produced from neither.\n\n56.\n\nIt is rare to suffer shipwreck in fair weather; and equally so not to suffer shipwreck from want of counsel.\n\n57.\n\nWind inflates empty bladders; but false opinions puff up stupid men.\n\n58.\n\nIt is necessary that he who exercises himself should avoid fatigue, and he who is prosperous, envy.\n\n59.\n\n\"Measure is most excellent,\" says one of the wise men; to which also we being in like manner persuaded, O most friendly and pious Asclepiades, here finish the curations of life.\n\nFootnotes 37:1 The handle of a vessel was called an ear by the Greeks.\n\n39:1 Self-sufficiency must not be considered in the vulgar sense, as consummate arrogance; but as the internal possession of everything requisite to felicity."

