[content]
body = "῾Ρείη δὲ δμηθεῖσα Κρόνῳ τέκε φαίδιμα τέκνα, Ἱστίην Δήμητρα καὶ Ἥρην χρυσοπέδιλον ἴφθιμόν τ᾽ Ἀίδην, ὃς ὑπὸ χθονὶ δώματα ναίει 455 νηλεὲς ἦτορ ἔχων, καὶ ἐρίκτυπον Ἐννοσίγαιον Ζῆνά τε μητιόεντα, θεῶν πατέρ᾽ ἠδὲ καὶ ἀνδρῶν, τοῦ καὶ ὑπὸ βροντῆς πελεμίζεται εὐρεῖα χθών.\n\nΚαὶ τοὺς μὲν κατέπινε μέγας Κρόνος, ὥς τις ἕκαστος νηδύος ἐξ ἱερῆς μητρὸς πρὸς γούναθ᾽ ἵκοιτο, 460 τὰ φρονέων, ἵνα μή τις ἀγαυῶν Οὐρανιώνων ἄλλος ἐν ἀθανάτοισιν ἔχοι βασιληίδα τιμήν."

