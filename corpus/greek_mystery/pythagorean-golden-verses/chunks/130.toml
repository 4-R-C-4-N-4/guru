[content]
body = "Καί ῥ᾽ ἥ γε δμηθεῖσ᾽ ὑπ᾽ Ἰήσονι, ποιμένι λαῶν, 1000 Μήδειον τέκε παῖδα, τὸν οὔρεσιν ἔτρεφε Χείρων Φιλυρίδης· μεγάλου δὲ Διὸς νόος ἐξετελεῖτο.\n\nΑὐτὰρ Νηρῆος κοῦραι, ἁλίοιο γέροντος, ἦ τοι μὲν Φῶκον Ψαμάθη τέκε δῖα θεάων Αἰακοῦ ἐν φιλότητι διὰ χρυσέην Ἀφροδίτην, 1005 Πηλέι δὲ δμηθεῖσα θεὰ Θέτις ἀργυρόπεζα γείνατ᾽ Ἀχιλλῆα ῥηξήνορα θυμολέοντα.\n\nΑἰνείαν δ᾽ ἄρ᾽ ἔτικτεν ἐυστέφανος Κυθέρεια Ἀγχίσῃ ἥρωι μιγεῖσ᾽ ἐρατῇ φιλότητι Ἴδης ἐν κορυφῇσι πολυπτύχου ὑληέσσης.\n\n1010 Κίρκη δ᾽, Ἠελίου θυγάτηρ Ὑπεριονίδαο, γείνατ᾽ Ὀδυσσῆος ταλασίφρονος ἐν φιλότητι Ἄγριον ἠδὲ Λατῖνον ἀμύμονά τε κρατερόν τε· [Τηλέγονον δ᾽ ἄρ᾽ ἔτικτε διὰ χρυσέην Ἀφροδίτην."

