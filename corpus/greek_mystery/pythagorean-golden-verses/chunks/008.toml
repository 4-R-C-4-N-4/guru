[content]
body = "\"Thou shalt not hope what thou ought'st not to hope,\" knowing the nature of all things, and what is possible.\n\n55.\n\nThe Gods near at hand are virtue and truth.\n\np.\n\n17 59, 60.\n\nThe fatal strife is caused by our inclination \"madly to run counter to God's laws.\" it is this strife that should be avoided by yielding to the will of God.\n\n62.\n\nThe Dæmon of whom they make use is their own soul, or essence, for to see and know this is to be freed from all evils.\n\n67.\n\nThe Purifications are divided into two parts, one concerning itself with the physical body, and the other with the \"luminous body.\" The Deliverance of the Soul is accomplished by \"Dialecticks, which science is the intimate inspection of beings.\" Of the two former, one purifies through diet and the whole management and usage of the mortal body; and the other employs the Mathematical Sciences, Meditation, and Religious Ceremonies.\n\nAll three Purifications must be accomplished if man would become free, and Godlike.\n\nIt is to be noted that they deal with (1) the body, (2) the emotions and lower mind, and (3) the higher mind."

