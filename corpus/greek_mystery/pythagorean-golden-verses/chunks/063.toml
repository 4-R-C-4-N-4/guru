[content]
body = "Μήδεα δ᾽ ὡς τὸ πρῶτον ἀποτμήξας ἀδάμαντι κάββαλ᾽ ἀπ᾽ ἠπείροιο πολυκλύστῳ ἐνὶ πόντῳ, ὣς φέρετ᾽ ἂμ πέλαγος πουλὺν χρόνον, ἀμφὶ δὲ λευκὸς 190 ἀφρὸς ἀπ᾽ ἀθανάτου χροὸς ὤρνυτο· τῷ δ᾽ ἔνι κούρη ἐθρέφθη· πρῶτον δὲ Κυθήροισιν ζαθέοισιν ἔπλητ᾽, ἔνθεν ἔπειτα περίρρυτον ἵκετο Κύπρον."

