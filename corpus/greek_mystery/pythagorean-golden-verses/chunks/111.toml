[content]
body = "Ἔνθα θεοῦ χθονίου πρόσθεν δόμοι ἠχήεντες [ἰφθίμου τ᾽ Ἀίδεω καὶ ἐπαινῆς Περσεφονείης] ἑστᾶσιν, δεινὸς δὲ κύων προπάροιθε φυλάσσει νηλειής, τέχνην δὲ κακὴν ἔχει· ἐς μὲν ἰόντας 770 σαίνει ὁμῶς οὐρῇ τε καὶ οὔασιν ἀμφοτέροισιν, ἐξελθεῖν δ᾽ οὐκ αὖτις ἐᾷ πάλιν, ἀλλὰ δοκεύων ἐσθίει, ὅν κε λάβῃσι πυλέων ἔκτοσθεν ἰόντα.\n\n[ἰφθίμου τ᾽ Ἀίδεω καὶ ἐπαινῆς Περσεφονείης.\n\n] Ἔνθα δὲ ναιετάει στυγερὴ θεὸς ἀθανάτοισι, 775 δεινὴ Στύξ, θυγάτηρ ἀψορρόου Ὠκεανοῖο πρεσβυτάτη· νόσφιν δὲ θεῶν κλυτὰ δώματα ναίει μακρῇσιν πέτρῃσι κατηρεφέ᾽· ἀμφὶ δὲ πάντη κίοσιν ἀργυρέοισι πρὸς οὐρανὸν ἐστήρικται."

