[content]
body = "55 Ἐννέα γάρ οἱ νυκτὸς ἐμίσγετο μητίετα Ζεὺς νόσφιν ἀπ᾽ ἀθανάτων ἱερὸν λέχος εἰσαναβαίνων· ἀλλ᾽ ὅτε δή ῥ᾽ ἐνιαυτὸς ἔην, περὶ δ᾽ ἔτραπον ὧραι μηνῶν φθινόντων, περὶ δ᾽ ἤματα πόλλ᾽ ἐτελέσθη, ἣ δ᾽ ἔτεκ᾽ ἐννέα κούρας ὁμόφρονας, ᾗσιν ἀοιδὴ 60 μέμβλεται ἐν στήθεσσιν, ἀκηδέα θυμὸν ἐχούσαις, τυτθὸν ἀπ᾽ ἀκροτάτης κορυφῆς νιφόεντος Ὀλύμπου.\n\n[Ἔνθα σφιν λιπαροί τε χοροὶ καὶ δώματα καλά."

