[content]
body = "Ἐκ γάρ τοι Μουσέων καὶ ἑκηβόλου Ἀπόλλωνος ἄνδρες ἀοιδοὶ ἔασιν ἐπὶ χθόνα καὶ κιθαρισταί, 95 ἐκ δὲ Διὸς βασιλῆες· ὃ δ᾽ ὄλβιος, ὅν τινα Μοῦσαι φίλωνται· γλυκερή οἱ ἀπὸ στόματος ῥέει αὐδή.\n\nΕἰ γάρ τις καὶ πένθος ἔχων νεοκηδέι θυμῷ ἄζηται κραδίην ἀκαχήμενος, αὐτὰρ ἀοιδὸς Μουσάων θεράπων κλέεα προτέρων ἀνθρώπων 100 ὑμνήσῃ μάκαράς τε θεούς, οἳ Ὄλυμπον ἔχουσιν, αἶψ᾽ ὅ γε δυσφροσυνέων ἐπιλήθεται οὐδέ τι κηδέων μέμνηται· ταχέως δὲ παρέτραπε δῶρα θεάων.\n\nΧαίρετε, τέκνα Διός, δότε δ᾽ ἱμερόεσσαν ἀοιδήν.\n\nΚλείετε δ᾽ ἀθανάτων ἱερὸν γένος αἰὲν ἐόντων, 105 οἳ Γῆς τ᾽ ἐξεγένοντο καὶ Οὐρανοῦ ἀστερόεντος, Νυκτός τε δνοφερῆς, οὕς θ᾽ ἁλμυρὸς ἔτρεφε Πόντος."

