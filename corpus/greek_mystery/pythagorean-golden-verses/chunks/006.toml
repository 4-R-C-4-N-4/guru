body = "Sacred Texts Classics Index Previous Next p.\n\n9 NOTES ON THE GOLDEN VERSES OF PYTHAGORAS FROM THE COMMENTARIES OF HIEROCLES.\n\nThe Golden Verses may be divided into two parts, the first treating of the Practical or Human Virtues, whose aim is the making of Good Men; and the second, treating of the Contemplative or Divine Virtues, the end of which is to make Good Men into Gods.\n\nOne is greatly struck by the wonderful completeness of the Verses, and their scientific arrangement.\n\nThey can be divided into groups dealing with practically every aspect and affair of life.\n\np.\n\n10 At the end of the first part (verse 47), we find the Most Solemn Oath that if a man follow these precepts faithfully, he will be ready to tread the further path, to devote himself to the Contemplative Virtues, and to become truly God-like, overcoming Death, and gaining a knowledge of the Gods.\n\nThe Verses may be grouped in the following manner:-- PART I.--THE PRACTICAL VIRTUES.\n\nVerses.\n\n1-3.\n\nConcerning Higher Intelligences.\n\n4.\n\nConcerning Relations.\n\n5-8.\n\nConcerning Friends.\n\n9-12.\n\nConcerning One's Lower Nature.\n\n13-14.\n\nConcerning One's General Behaviour.\n\n15-20.\n\nConcerning Death and Misfortunes.\n\n21-23.\n\nConcerning Doctrines.\n\n24-31.\n\nConcerning Actions and Speech.\n\n32-34.\n\nConcerning the Body.\n\n35-39.\n\nConcerning the Manner of Life.\n\n40-45.\n\nConcerning Introspection.\n\n46, 47.\n\nOath Concerning the Result of the Practical Virtues.\n\np.\n\n11 PART II.--THE CONTEMPLATIVE VIRTUES.\n\n48.\n\nConcerning the Help of the Gods.\n\n49-51.\n\nConcerning the Nature and Constitution of Gods and Men.\n\n52, 53.\n\nConcerning the Nature of the Universe, and what is possible.\n\n54-60.\n\nConcerning Ignorance, and the Liberty of the Soul.\n\n61-66.\n\nConcerning Knowledge and Deliverance.\n\n67-69.\n\nConcerning Purifications.\n\n70, 71.\n\nConcerning the Result of the Contemplative Virtues.\n\nNOTES Verse 1.\n\n\"Worship the Immortal Gods\" with an understanding as to their order and function in the universe.\n\nFor it is Impossible to worship unless you understand to some extent the nature and function of that which you worship.\n\nThe Gods do not occupy their position by accident, nor from carelessness on the part of the Great Architect, nor are they isolated units independent of each other, but rather are they linked together in such a way as to form p.\n\n12 one perfect whole, like the different parts of one animal.\n\nPythagoras seems to have divided the beings in the universe roughly into three orders:-- (1) The Immortal Gods whose who live perpetually in the knowledge of God the Father and Creator of all, being secured from change or separation from Him); (2) The Heroes, and (3) The Terrestrial Dæmons.\n\n2.\n\nBesides the Power that creates a universe, it is necessary that there should be a power that preserves and sustains it, and this power is embodied in the created beings.\n\nFor in their essence all beings are of one nature with the Father, and just in so far as they are conscious of Him will they carry out His will and design.\n\nThey are said to be bound by an Oath to preserve all things in their respective places and to maintain the beauty and harmony of the universe; but this Oath is in reality innate and essential to them, because it is born p.\n\n13 with them and is part of their divine nature."

