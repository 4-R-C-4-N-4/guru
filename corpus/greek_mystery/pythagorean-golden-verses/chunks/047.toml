[content]
body = "Τόνδε δέ με πρώτιστα θεαὶ πρὸς μῦθον ἔειπον, Μοῦσαι Ὀλυμπιάδες, κοῦραι Διὸς αἰγιόχοιο· 25 «Ποιμένες ἄγραυλοι, κάκ᾽ ἐλέγχεα, γαστέρες οἶον, ἴδμεν ψεύδεα πολλὰ λέγειν ἐτύμοισιν ὁμοῖα, ἴδμεν δ᾽, εὖτ᾽ ἐθέλωμεν, ἀληθέα γηρύσασθαι.» Ὥς ἔφασαν κοῦραι μεγάλου Διὸς ἀρτιέπειαι· καί μοι σκῆπτρον ἔδον δάφνης ἐριθηλέος ὄζον 30 δρέψασαι, θηητόν· ἐνέπνευσαν δέ μοι ἀοιδὴν θέσπιν, ἵνα κλείοιμι τά τ᾽ ἐσσόμενα πρό τ᾽ ἐόντα.\n\nΚαί μ᾽ ἐκέλονθ᾽ ὑμνεῖν μακάρων γένος αἰὲν ἐόντων, σφᾶς δ᾽ αὐτὰς πρῶτόν τε καὶ ὕστατον αἰὲν ἀείδειν."

