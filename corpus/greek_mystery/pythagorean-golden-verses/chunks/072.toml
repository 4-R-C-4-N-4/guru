[content]
body = "Ἥ δ᾽ ἔτεκ᾽ ἄλλο πέλωρον ἀμήχανον, οὐδὲν ἐοικὸς 295 θνητοῖς ἀνθρώποις οὐδ᾽ ἀθανάτοισι θεοῖσιν, ἐν σπῆι ἔνι γλαφυρῷ θείην κρατερόφρον᾽ Ἔχιδναν, ἥμισυ μὲν νύμφην ἑλικώπιδα καλλιπάρῃον, ἥμισυ δ᾽ αὖτε πέλωρον ὄφιν δεινόν τε μέγαν τε αἰόλον ὠμηστὴν ζαθέης ὑπὸ κεύθεσι γαίης.\n\n300 Ἔνθα δέ οἱ σπέος ἐστὶ κάτω κοίλῃ ὑπὸ πέτρῃ τηλοῦ ἀπ᾽ ἀθανάτων τε θεῶν θνητῶν τ᾽ ἀνθρώπων· ἔνθ᾽ ἄρα οἱ δάσσαντο θεοὶ κλυτὰ δώματα ναίειν.\n\nἭ δ᾽ ἐρυτ᾽ εἰν Ἀρίμοισιν ὑπὸ χθόνα λυγρὴ Ἔχιδνα, ἀθάνατος νύμφη καὶ ἀγήραος ἤματα πάντα."

