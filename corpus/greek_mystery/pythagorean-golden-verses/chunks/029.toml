[content]
body = "Explanation .--The Symbol may be considered more Pythagorically, beginning from the same principles with those above.\n\nFor since nutriment is to be measured by the corporeal and animal nature, and not by a bushel, do not pass your life in indolence p.\n\n83 nor without being initiated into philosophy; but dedicating yourself to this, rather provide for that part of you which is more divine, which is soul, and much more for the intellect which soul contains; the nutriment of which is measured, not by a bushel, but by contemplation and discipline.\n\nSYMBOL 20.\n\nNourish not that which has crooked nails.\n\nExplanation .--This Symbol also in a more Pythagorean manner advises us to communicate and impart, and prepare others to do so, accustoming them to give and receive without depravity and abundantly; not indeed receiving everything insatiably and giving nothing.\n\nFor the physical organization of animals with crooked nails is adapted to receive rapidly and with facility, but by no means to relinquish what they hold, or impart to others, through the opposition of the nails in consequence of their being crooked; just as the fish called crangœ 1 , are naturally adapted to draw anything to themselves with celerity, but relinquish it with difficulty, p.\n\n84 unless by turning from, we avoid them.\n\nBut hands were indeed suspended from us by nature, that through them we might both give and receive, and the fingers, also, are naturally attached to the hands, straight and not crooked.\n\nIn things of this kind, therefore, we must not imitate animals with crooked nails, since we are fashioned by our maker in a different way, but should rather be communicative and impart to each other, being exhorted to a thing of this kind by the fabricators of names themselves, who denominated the right hand more honourable than the left, not only from receiving but from being capable of imparting.\n\nWe must act justly therefore, and through this philosophize.\n\nFor justice is a certain retribution and remuneration equalizing the abounding and deficient by reciprocal gifts.\n\n2 SYMBOL 21.\n\nCut not in the way.\n\nExplanation .--This Symbol manifests that truth is one, but falsehood multifarious.\n\nBut this is evident from hence, that what any p.\n\n85 particular thing is can be predicted only in one way, if it be properly predicted; but what it is not , may be predicted in infinite ways.\n\nPhilosophy, too, appears to be a path or way.\n\nThe Symbol therefore says, Choose that philosophy, and that path to philosophy in which there is no division, and in which you will not dogmatize things contradictory to each other, but such as are stable and the same with themselves, being established by scientific demonstration through disciplines and contemplation; which is the same thing as if it said, Philosophize Pythagorically .\n\nAnd this is indeed possible.\n\nBut the philosophy which proceeds through things corporeal and sensible, and which is employed by the moderns even to satiety, which likewise considers Divinity, qualities, the soul, the virtues, and in short all the most principal causes of things to be body,--this philosophy easily eludes the grasp, and is easily subverted.\n\n1 And this is evident from the various arguments of its advocates.\n\nOn the p.\n\n86 other hand, the philosophy which proceeds through things incorporeal, intelligible, immaterial, and perpetual, and which always subsist according to the same, and in a similar manner, and never, as far as possible to them, admit either corruption or mutation, being similar to their subjects,--this philosophy is the artificer of firm, stable, and undeviating demonstrations."

