body = "To view the polytonic Greek in this file, your browser needs to be set up to display Unicode correctly.\n\nFor more information, refer to this file .\n\nἩσίοδος Θεογονία Μουσάων Ἑλικωνιάδων ἀρχώμεθ᾽ ἀείδειν, αἵ θ᾽ Ἑλικῶνος ἔχουσιν ὄρος μέγα τε ζάθεόν τε καί τε περὶ κρήνην ἰοειδέα πόσσ᾽ ἁπαλοῖσιν ὀρχεῦνται καὶ βωμὸν ἐρισθενέος Κρονίωνος· καί τε λοεσσάμεναι τέρενα χρόα Περμησσοῖο 5 ἢ Ἵππου κρήνης ἢ Ὀλμειοῦ ζαθέοιο ἀκροτάτῳ Ἑλικῶνι χοροὺς ἐνεποιήσαντο καλούς, ἱμερόεντας· ἐπερρώσαντο δὲ ποσσίν."

