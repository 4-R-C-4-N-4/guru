[content]
body = "Νυκτὸς δ᾽ ἐρεβεννῆς οἰκία δεινὰ ἕστηκεν νεφέλῃς κεκαλυμμένα κυανέῃσιν.] 745 Τῶν πρόσθ᾽ Ἰαπετοῖο πάις ἔχει οὐρανὸν εὐρὺν ἑστηὼς κεφαλῇ τε καὶ ἀκαμάτῃσι χέρεσσιν ἀστεμφέως, ὅθι Νύξ τε καὶ Ἡμέρη ἆσσον ἰοῦσαι ἀλλήλας προσέειπον, ἀμειβόμεναι μέγαν οὐδὸν χάλκεον· ἣ μὲν ἔσω καταβήσεται, ἣ δὲ θύραζε 750 ἔρχεται, οὐδέ ποτ᾽ ἀμφοτέρας δόμος ἐντὸς ἐέργει, ἀλλ᾽ αἰεὶ ἑτέρη γε δόμων ἔκτοσθεν ἐοῦσα γαῖαν ἐπιστρέφεται, ἣ δ᾽ αὖ δόμου ἐντὸς ἐοῦσα μίμνει τὴν αὐτῆς ὥρην ὁδοῦ, ἔστ᾽ ἂν ἵκηται, ἣ μὲν ἐπιχθονίοισι φάος πολυδερκὲς ἔχουσα, 755 ἣ δ᾽ Ὕπνον μετὰ χερσί, κασίγνητον Θανάτοιο.\n\nΝὺξ ὀλοή, νεφέλῃ κεκαλυμμένη ἠεροειδεῖ."

