[content]
body = "Κρίῳ δ᾽ Εὐρυβίη τέκεν ἐν φιλότητι μιγεῖσα 375 Ἀστραῖόν τε μέγαν Πάλλαντά τε δῖα θεάων Πέρσην θ᾽, ὃς καὶ πᾶσι μετέπρεπεν ἰδμοσύνῃσιν.\n\nἈστραίῳ δ᾽ Ἠὼς ἀνέμους τέκε καρτεροθύμους, ἀργέστην Ζέφυρον Βορέην τ᾽ αἰψηροκέλευθον καὶ Νότον, ἐν φιλότητι θεὰ θεῷ εὐνηθεῖσα.\n\n380 Τοὺς δὲ μέτ᾽ ἀστέρα τίκτ' Ἠοσφόρον Ἠριγένεια ἄστρα τε λαμπετόωντα, τά τ᾽ οὐρανὸς ἐστεφάνωται."

