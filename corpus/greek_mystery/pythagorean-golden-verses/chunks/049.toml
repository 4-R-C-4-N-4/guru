[content]
body = "Δεύτερον αὖτε Ζῆνα, θεῶν πατέρ᾽ ἠδὲ καὶ ἀνδρῶν, ἀρχόμεναί θ᾽ ὑμνεῦσι θεαὶ λήγουσαί τ' ἀοιδῆς, ὅσσον φέρτατός ἐστι θεῶν κράτεΐ τε μέγιστος.\n\nΑὖτις δ᾽ ἀνθρώπων τε γένος κρατερῶν τε Γιγάντων 50 ὑμνεῦσαι τέρπουσι Διὸς νόον ἐντὸς Ὀλύμπου Μοῦσαι Ὀλυμπιάδες, κοῦραι Διὸς αἰγιόχοιο.\n\nΤὰς ἐν Πιερίῃ Κρονίδῃ τέκε πατρὶ μιγεῖσα Μνημοσύνη, γουνοῖσιν Ἐλευθῆρος μεδέουσα, λησμοσύνην τε κακῶν ἄμπαυμά τε μερμηράων."

