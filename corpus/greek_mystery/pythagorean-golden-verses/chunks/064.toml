[content]
body = "Ἐκ δ᾽ ἔβη αἰδοίη καλὴ θεός, ἀμφὶ δὲ ποίη ποσσὶν ὕπο ῥαδινοῖσιν ἀέξετο· τὴν δ᾽ Ἀφροδίτην 195 [ἀφρογενέα τε θεὰν καὶ ἐυστέφανον Κυθέρειαν] κικλῄσκουσι θεοί τε καὶ ἀνέρες, οὕνεκ᾽ ἐν ἀφρῷ θρέφθη· ἀτὰρ Κυθέρειαν, ὅτι προσέκυρσε Κυθήροις· [Κυπρογενέα δ᾽, ὅτι γέντο πολυκλύστῳ ἐνὶ Κύπρῳ· ἠδὲ φιλομμηδέα, ὅτι μηδέων ἐξεφαάνθη.] 200 Τῇ δ᾽ Ἔρος ὡμάρτησε καὶ Ἵμερος ἕσπετο καλὸς γεινομένῃ τὰ πρῶτα θεῶν τ᾽ ἐς φῦλον ἰούσῃ.\n\nΤαύτην δ᾽ ἐξ ἀρχῆς τιμὴν ἔχει ἠδὲ λέλογχε μοῖραν ἐν ἀνθρώποισι καὶ ἀθανάτοισι θεοῖσι, Παρθενίους τ᾽ ὀάρους μειδήματά τ᾽ ἐξαπάτας τε 205 τέρψιν τε γλυκερὴν φιλότητά τε μειλιχίην τε."

