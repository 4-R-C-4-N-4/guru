[content]
body = "Or in the third place, it is impelled when it is not proper, and to objects to which it ought not to tend.\n\n22.\n\nEndeavour not to conceal your errors p.\n\n49 by words, but to remedy them by reproof.\n\n23.\n\nIt is not so difficult to err, as not to reprove him who errs.\n\n24.\n\nAs a bodily disease cannot be healed, if it be concealed, or praised, thus also, neither can a remedy be applied to a diseased soul, which is badly guarded and protected.\n\n25.\n\nThe grace of freedom of speech, like beauty in season, is productive of greater delight.\n\n26.\n\nIt is not proper either to have a blunt sword or to use freedom of speech ineffectually.\n\n27.\n\nNeither is the sun to be taken from the world nor freedom of speech from erudition.\n\n28.\n\nAs it is possible for one who is clothed with a sordid robe, to have a good habit of body; thus also he whose life is poor may possess freedom of speech.\n\n29.\n\nBe rather delighted with those that reprove, than with those that flatter you; but avoid flatterers, as worse than enemies.\n\n30.\n\nThe life of the avaricious resembles a funeral banquet.\n\nFor though it has all things requisite to a feast, yet no one present rejoices.\n\np.\n\n50 31.\n\nAcquire continence as the greatest strength and wealth.\n\n32.\n\n\"Not frequently man from man,\" is one of the exhortations of Pythagoras; by which he obscurely signifies, that it is not proper to be frequently engaged in venereal connexions.\n\n33.\n\nIt is impossible that he can be free who is a slave to his passions.\n\n34.\n\nPythagoras said, that intoxication is the meditation of insanity.\n\n35.\n\nPythagoras being asked, how a lover of wine might be cured of intoxication, answered, if he frequently surveys what his actions were when he was intoxicated.\n\n36.\n\nPythagoras said, that it was requisite either to be silent, or to say something better than silence.\n\n37.\n\nLet it be more eligible to you to throw a stone in vain, than to utter an idle word.\n\n38.\n\nDo not say a few things in many words, but much in a few words.\n\n39.\n\nGenius is to men either a good or an evil dæmon.\n\n40.\n\nPythagoras being asked how a man ought to conduct himself towards his country, p.\n\n51 when it had acted iniquitously with respect to him, replied, as to a mother.\n\n41.\n\nTravelling teaches a man frugality, and the way in which he may be sufficient to himself.\n\nFor bread made of milk and flour, and a bed of grass, are the sweetest remedies of hunger and labour.\n\n42.\n\nTo the wise man every land is eligible as a place of residence; for the whole world is the country of the worthy soul.\n\n43.\n\nPythagoras said that luxury entered into cities in the first place, afterwards satiety, then lascivious insolence, and after all these, destruction.\n\n44.\n\nPythagoras said, that of cities that was the best which contained most worthy men.\n\n45.\n\nDo those things which you judge to be beautiful, though in doing them you should be without renown.\n\nFor the rabble is a bad judge of a good thing.\n\nDespise, therefore, the reprehension of those whose praise you despise.\n\n46.\n\nThose that do not punish bad men, wish that good men may be injured.\n\n47.\n\nIt is not possible for a horse to be p.\n\n52 governed without bridle, nor riches without prudence.\n\n48.\n\nIt is the same thing to think greatly of yourself in prosperity, as to contend in the race in a slippery road.\n\n49."

