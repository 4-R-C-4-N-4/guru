[content]
body = "960 ἣ δέ οἱ Μήδειαν ἐύσφυρον ἐν φιλότητι γείναθ᾽ ὑποδμηθεῖσα διὰ χρυσέην Ἀφροδίτην.\n\nἩμεῖς μὲν νῦν χαίρετ᾽, Ὀλύμπια δώματ᾽ ἔχοντες, νῆσοί τ᾽ ἤπειροί τε καὶ ἁλμυρὸς ἔνδοθι πόντος.\n\nΝῦν δὲ θεάων φῦλον ἀείσατε, ἡδυέπειαι 965 Μοῦσαι Ὀλυμπιάδες, κοῦραι Διὸς αἰγιόχοιο, ὅσσαι δὴ θνητοῖσι παρ᾽ ἀνδράσιν εὐνηθεῖσαι ἀθάναται γείναντο θεοῖς ἐπιείκελα τέκνα.\n\nΔημήτηρ μὲν Πλοῦτον ἐγείνατο, δῖα θεάων, Ἰασίων᾽ ἥρωι μιγεῖσ᾽ ἐρατῇ φιλότητι 970 νειῷ ἔνι τριπόλῳ, Κρήτης ἐν πίονι δήμῳ, ἐσθλόν, ὃς εἶσ᾽ ἐπὶ γῆν τε καὶ εὐρέα νῶτα θαλάσσης πάντη· τῷ δὲ τυχόντι καὶ οὗ κ᾽ ἐς χεῖρας ἵκηται, τὸν δ᾽ ἀφνειὸν ἔθηκε, πολὺν δέ οἱ ὤπασεν ὄλβον."

