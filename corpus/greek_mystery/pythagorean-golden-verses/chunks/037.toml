[content]
body = "75 words accord with their energies, to honour and reverence them with the greatest earnestness.\n\nSYMBOL 9.\n\nCut not fire with a sword.\n\n1 Explanation .--This Symbol exhorts to prudence.\n\nFor it excites in us an appropriate conception with the respect to the propriety of not opposing sharp words to a man full of fire and wrath, nor contending with him.\n\nFor frequently by words you will agitate and disturb an ignorant man, and will yourself suffer things dreadful and unpleasant.\n\nHeraclitus also testifies to the truth of this Symbol, for he says, \"It is difficult to fight with anger; for whatever is necessary to be done, benefits the soul.\" For many by gratifying anger have changed the condition of the soul, and have made death preferable to life.\n\nBut by governing the tongue and being quiet, friendship is produced from strife, the fire of anger being extinguished, and you yourself will not appear to be destitute of intellect.\n\np.\n\n76 SYMBOL 10.\n\nRemove yourself from every vinegar bottle.\n\nExplanation .--The truth of the preceding is testified by the present Symbol.\n\nFor it exhorts to prudence and not to anger; since that which is sharp in the soul and which we call anger is deprived of reasoning and prudence.\n\nFor anger boils like a kettle heated by the fire, being attentive to nothing but its own emotions, and dividing the judgment into minute parts.\n\nIt is proper therefore that the soul being established in quiet should turn from anger, which frequently attacks itself as if it touched sounding brass.\n\nHence it is requisite to suppress this passion by the reasoning power.\n\nSYMBOL 11.\n\nAssist a man in raising a burden; but do not assist him in laying it down.\n\nExplanation .--This Symbol exhorts to fortitude, for whoever takes up a burden signifies an action of labour and energy; but he who lays one down, of rest and remission.\n\nSo that the Symbol has the following p.\n\n76 meaning.\n\nDo not become either to yourself or another the cause of an indolent and effeminate mode of conduct; for every useful thing is acquired by labour.\n\nBut the Pythagoreans celebrate this Symbol as Herculean, thus denominating it from the labours of Hercules.\n\nFor, during his association with men, he frequently returned from fire and everything dreadful, indignantly rejecting indolence.\n\nFor rectitude of conduct is produced from acting and operating, but not from sluggishness.\n\nSYMBOL 12.\n\nWhen stretching forth your feet to have your sandals put on, first extend your right foot; but when about to use a foot-bath, first extend your left foot.\n\nExplanation .--This Symbol exhorts to practical prudence, admonishing us to place worthy actions about us as right-handed; but entirely to lay aside and throw away such as are base, as being left-handed.\n\nSYMBOL 13.\n\nSpeak not about Pythagorean concerns without light.\n\np.\n\n78 Explanation .--This Symbol exhorts to the possession of intellect according to prudence.\n\nFor this is similar to the light of the soul, to which being indefinite it gives bound, and leads it, as it were, from darkness into light.\n\nIt is proper, therefore, to place intellect as the leader of everything beautiful in life, but especially in Pythagorean dogmas; for these cannot be known without light.\n\nSYMBOL 14.\n\nStep not beyond the beam of the balance.\n\nExplanation .--This Symbol exhorts us to the exercise of justice, to the honouring equality and moderation in an admirable degree, and to the knowledge of justice as the most perfect virtue, to which the other virtues give completion, and without which none of the rest are of any advantage.\n\nIt also admonishes us that it is proper to know this virtue not in a careless manner, but through theorems 1 and scientific demonstrations.\n\np."

