[content]
body = "Vehement desires about any one thing render the soul blind with respect to other things.\n\n38.\n\nThe love is just which, unattended with injury, aspires after things becoming.\n\n39.\n\nAdmit nothing as pleasant which is not advantageous.\n\n40.\n\nIt is better to be governed by, than to govern, the stupid.\n\n41.\n\nNot argument but calamity is the preceptor to children.\n\n42.\n\nGlory and wealth without wisdom are not secure possessions.\n\n43.\n\nIt is not indeed useless to procure wealth, but to procure it from injustice is the most pernicious of all things.\n\n44.\n\nIt is a dreadful thing to imitate the bad, and to be unwilling to imitate the good.\n\n45.\n\nIt is a shameful thing for a man to be employed about the affairs of others, but to be ignorant of his own.\n\n46.\n\nTo be always intending to act renders action imperfect.\n\n47.\n\nFraudulent men, and such as are only seemingly good, do all things in words and nothing in deeds.\n\n48, He is a blessed man who has both p.\n\n24 property and intellect, for he will use them well in such things as are proper.\n\n49.\n\nThe ignorance of what is excellent is the cause of error.\n\n50.\n\nPrior to the performance of base things, a man should reverence himself.\n\n51.\n\nA man given to contradiction, and very attentive to trifles, is naturally unadapted to learn what is proper.\n\n52.\n\nContinually to speak without being willing to hear, is arrogance.\n\n53.\n\nIt is necessary to guard against a depraved man, lest he should take advantage of opportunity.\n\n54.\n\nAn envious man is the cause of molestation to himself, as to an enemy.\n\n55.\n\nNot only he is an enemy who acts unjustly, but even he who deliberates about so acting.\n\n56.\n\nThe enmity of relations is far more bitter than that of strangers.\n\n57.\n\nConduct yourself to all men without suspicion; and be accommodating and cautious in your behaviour.\n\n58.\n\nIt is proper to receive favours, at the same time determining that the retribution shall surpass the gift.\n\np.\n\n25 59.\n\nWhen about to bestow a favour, previously consider him who is to receive it, lest being a fraudulent character he should return evil for good.\n\n60.\n\nSmall favours seasonably bestowed, become things of the greatest consequence to those who receive them.\n\n61.\n\nHonours with wise men are capable of effecting the greatest things, if at the same time they understand that they are honoured.\n\n62.\n\nThe beneficent man is one who does not look to retribution, but who deliberately intends to do well.\n\n63.\n\nMany that appear to be friends are not, and others, who do not appear to be friends, are so.\n\n64.\n\nThe friendship of one wise man is better than that of every fool, 65.\n\nHe is unworthy to live who has not one worthy friend.\n\n66.\n\nMany turn from their friends, if, from affluence, they fall into adversity.\n\n67.\n\nThe equal is beautiful in everything; but excess and defect to me do not appear to be so.\n\np.\n\n26 68.\n\nHe who loves no one does not appear to me to be loved by any one.\n\n69.\n\nHe is an agreeable old man who is facetious, and abounds in interesting anecdote.\n\n70.\n\nThe beauty of the body is merely animal unless supported by intellect.\n\n71.\n\nTo find a friend in prosperity, is very easy; but in adversity, it is the most difficult of all things.\n\n72.\n\nNot all relations are friends, but those who accord with what is mutually advantageous.\n\n73.\n\nSince we are men, it is becoming, not to deride, but bewail, the calamities of men.\n\n74.\n\nGood scarcely presents itself, even to those who investigate it; but evil is obvious without investigation.\n\n75."

