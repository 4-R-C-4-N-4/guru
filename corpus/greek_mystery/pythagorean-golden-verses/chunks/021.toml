body = "Sacred Texts Classics Index Previous Next p.\n\n53 SELECT SENTENCES OF SEXTUS THE PYTHAGOREAN 1.\n\nTo neglect things of the smallest consequence, is not the least thing in human life.\n\n2.\n\nThe wise man, and the despiser of wealth, resemble God.\n\n3.\n\nDo not investigate the name of God, because you will not find it.\n\nFor every thing which is called by a name, receives p.\n\n54 its appellation from that which is more worthy than itself, 1 so that it is one person that calls, and another that hears.\n\nWho is it, therefore, that has given a name to God?\n\nGod, however, is not a name to God, but an indication of what we conceive of Him.\n\n4.\n\nGod is a light incapable of receiving its contrary, darkness.\n\n5.\n\nYou have in yourself some thing similar to God, and therefore use yourself as the temple of God, on account of that which in you resembles God.\n\n6.\n\nHonour God above all things, that He may rule over you.\n\n7.\n\nWhatever you honour above all things, that which you so honour will have dominion over you.\n\nBut if you give yourself to the domination of God, you will thus have dominion over all things.\n\n8.\n\nThe greatest honour which can be paid to God, is to know and imitate Him.\n\np.\n\n55 9.\n\nThere is not any thing, indeed, which wholly resembles God; nevertheless the imitation of Him as much as possible by an inferior nature is grateful to Him.\n\n10.\n\nGod, indeed, is not in want of anything, but the wise man is in want of God alone.\n\nHe, therefore, who is in want but of few things, and those necessary, emulates him who is in want of nothing.\n\n11.\n\nEndeavour to be great in the estimation of Divinity, but among men avoid envy.\n\n12.\n\nThe wise man whose estimation with men was but small while he was living, will be renowned when he is dead.\n\n13.\n\nConsider all the time to be lost to you in which you do not think of divinity.\n\n14.\n\nA good intellect is the choir of divinity.\n\n15.\n\nA bad intellect is the choir of evil dæmons.\n\n16.\n\nHonour that which is just, on this very account that it is just.\n\n17.\n\nYou will not be concealed from divinity when you act unjustly, nor even when you think of doing so.\n\n18.\n\nThe foundation of piety is continence; but the summit of piety is the love of God.\n\np.\n\n56 19.\n\nWish that what is expedient and not what is pleasing may happen to you.\n\n20.\n\nSuch as you wish your neighbour to be to you, such also be you to your neighbour.\n\n21.\n\nThat which God gives you, no one can take away.\n\n22.\n\nNeither do nor even think of that which you are not willing God should know.\n\n23.\n\nBefore you do anything think of God, that his light may precede your energies.\n\n24.\n\nThe soul is illuminated by the recollection of deity.\n\n25.\n\nThe use of all animals as food is Indifferent, but it is more rational to abstain from them.\n\n26.\n\nGod is not the author of any evil.\n\n27.\n\nYou should not possess more than the use, of the body requires.\n\n28.\n\nPossess those things which no one can take from you.\n\n29.\n\nBear that which is necessary, as it is necessary.\n\n30.\n\nAsk those things of God which it is worthy of God to bestow.\n\n31.\n\nThe reason which is in you, is the light of your life.\n\np.\n\n57 32.\n\nAsk those things of God which you cannot receive from man.\n\n33.\n\nWish that those things which labour ought to precede, may be possessed by you after labour.\n\n34.\n\nBe not anxious to please the multitude.\n\n35."

