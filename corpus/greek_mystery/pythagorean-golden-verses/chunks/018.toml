body = "Sacred Texts Classics Index Previous Next p.\n\n45 PYTHAGOREAN ETHICAL SENTENCES FROM STOBÆUS 1.\n\nDo not even think of doing what ought not to be done.\n\n2.\n\nChoose rather to be strong in soul than in body.\n\n3.\n\nBe persuaded that things of a laborious nature contribute more than pleasures to virtue.\n\n4.\n\nEvery passion of the soul is most hostile to its salvation.\n\n5.\n\nIt is difficult to walk at one and the same time many paths of life.\n\np.\n\n46 6.\n\nPythagoras said, it is requisite to choose the most excellent life; for custom will make it pleasant.\n\nWealth is an infirm anchor, glory is still more infirm; and in a similar manner, the body, dominion, and honour.\n\nFor all these are imbecile and powerless.\n\nWhat then are powerful anchors.\n\nPrudence, magnanimity, fortitude.\n\nThese no tempest can shake.\n\nThis is the Law of God, that virtue is the only thing that is strong; and that every thing else is a trifle.\n\n7.\n\nAll the parts of human life, in the same manner as those of a statue, ought to be beautiful.\n\n8.\n\nFrankincense ought to be given to the Gods, but praise to good men.\n\n9.\n\nIt is requisite to defend those who are unjustly accused of having acted injuriously, but to praise those who excel in a certain good.\n\n10.\n\nNeither will the horse be adjudged to be generous, that is sumptuously adorned, but the horse whose nature is illustrious; nor is the man worthy who possesses great wealth, but he whose soul is generous.\n\n11.\n\nWhen the wise man opens his mouth, the beauties of his soul present themselves p.\n\n47 to the view, like the statues in a temple 12.\n\nRemind yourself that all men assert that wisdom is the greatest good, but that there are few who strenuously endeavour to obtain this greatest good.\n\n13.\n\nBe sober, and remember to be disposed to believe; for these are the nerves of wisdom.\n\n14.\n\nIt is better to live lying on the grass, confiding in Divinity and yourself, than to lie on a golden bed with perturbation.\n\n15.\n\nYou will not be in want of anything, which it is in the power of fortune to give and take away.\n\n1 16.\n\nDespise all those things which when liberated from the body you will not want; invoke the Gods to become your helpers.\n\n17.\n\nNeither is it possible to conceal fire in a garment, nor a base deviation from rectitude in time.\n\n18.\n\nWind indeed increases fire, but custom love.\n\n19.\n\nThose alone are dear to Divinity who are hostile to injustice.\n\np.\n\n48 20.\n\nThose things which the body necessarily requires, are easily to be procured by all men, without labour and molestation; but those things to the attainment of which labour and molestation are requisite, are objects of desire, not to the body, but to depraved opinion.\n\n21.\n\nOf desire also, he (Pythagoras) said as follows:--This passion is various, laborious, and very multiform.\n\nOf desires, however, some are acquired and adventitious, but others are connascent.\n\nBut he defined desire itself to be a certain tendency and impulse of the soul, and an appetite of a plentitude or presence of sense, or an emptiness and absence of it, and of non-perception.\n\nHe also said, that there are three most known species of erroneous and depraved desire, viz., the indecorous, the incommensurate, and the unseasonable.\n\nFor desire is either immediately Indecorous, troublesome, and illiberal, or it is not absolutely so, but is more vehement and lasting than is fit."

