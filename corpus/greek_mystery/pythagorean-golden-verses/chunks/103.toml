[content]
body = "Οἳ τότε Τιτήνεσσι κατέσταθεν ἐν δαῒ λυγρῇ πέτρας ἠλιβάτους στιβαρῇς ἐν χερσὶν ἔχοντες.\n\n675 Τιτῆνες δ᾽ ἑτέρωθεν ἐκαρτύναντο φάλαγγας προφρονέως, χειρῶν τε βίης θ᾽ ἅμα ἔργον ἔφαινον ἀμφότεροι· δεινὸν δὲ περίαχε πόντος ἀπείρων, γῆ δὲ μέγ᾽ ἐσμαράγησεν, ἐπέστενε δ᾽ οὐρανὸς εὐρὺς σειόμενος, πεδόθεν δὲ τινάσσετο μακρὸς Ὄλυμπος 680 ῥιπῇ ὕπ᾽ ἀθανάτων, ἔνοσις δ᾽ ἵκανε βαρεῖα Τάρταρον ἠερόεντα, ποδῶν τ᾽ αἰπεῖα ἰωὴ ἀσπέτου ἰωχμοῖο βολάων τε κρατεράων· Ὥς ἄρ᾽ ἐπ᾽ ἀλλήλοις ἵεσαν βέλεα στονόεντα.\n\nΦωνὴ δ᾽ ἀμφοτέρων ἵκετ᾽ οὐρανὸν ἀστερόεντα 685 κεκλομένων· οἳ δὲ ξύνισαν μεγάλῳ ἀλαλητῷ."

