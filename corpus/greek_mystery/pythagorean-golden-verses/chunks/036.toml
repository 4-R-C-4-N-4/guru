body = "At the same time, however, we perfectly fall short of the gods, and neither possess the same power with them, nor equal virtue, This Symbol, therefore, in a particular manner introduces the knowledge of the gods, as beings who are able to effect all things.\n\nOn this account it exhorts us to disbelieve nothing concerning the gods.\n\nIt also adds, nor about divine dogmas, that is to say, these belonging to the Pythagoric philosophy.\n\nFor these being secured by discipline and scientific theory, are alone true and free from falsehood, being corroborated by all various demonstration accompanied with necessity.\n\nThe same Symbol also is capable of exhorting us to the science concerning the gods; for it urges us to acquire a science of that kind through which we shall be in no respect deficient in things asserted about the gods.\n\nIt is also able to exhort the same things concerning divine dogmas.\n\nand a disciplinative progression, For disciplines alone give eyes to and produce p.\n\n72 light about all things in him who intends to consider and survey them.\n\nFor from the participation of disciplines, one thing before all others is effected, that is to say, a belief in the nature, essence, and power of the gods, and also in those Pythagoric dogmas which appear to be prodigious to such as have not been introduced to, and are uninitiated in, disciplines.\n\nSo that the precept disbelieve not is equivalent to participate , and acquire , those things through which you will not disbelieve; that is to say, acquire disciplines and scientific demonstrations.\n\nSYMBOL 5.\n\nDeclining from the public ways, walk in unfrequented paths.\n\nExplanation .--I think that this Symbol also contributes to the same thing as the preceding.\n\nFor this exhorts us to abandon a popular and merely human life; but thinks fit that we should pursue a separate and divine life.\n\nIt also signifies that it is necessary to look above common opinions; but very much to esteem such as are private and arcane; and that we should despise merely human delight; but ardently p.\n\n73 pursue that felicitous mode of conduct which adheres to the divine will.\n\nIt likewise exhorts us to dismiss human manners as popular, and to exchange for these the religious cultivation of the gods, transcending a popular life.\n\nSYMBOL 6.\n\nAbstain from Melanurus 1 ; for it belongs to the terrestrial gods.\n\nExplanation .--This Symbol also is allied to the preceding.\n\nOther particulars therefore pertaining to it we shall speak of in our discourse about the Symbols.\n\n2 So far then as it pertains to exhortation it admonishes us to embrace the celestial journey, to conjoin ourselves to the intellectual gods, to become separated from a material nature, and to be led, as it were in a circular progression to an immaterial and pure life.\n\nIt further exhorts us to adopt the most excellent worship of the gods, and p.\n\n74 especially that which pertains to the primary gods.\n\n3 Such, therefore, are the exhortations to the knowledge and worship of Divinity.\n\nThe following Symbols exhort to wisdom.\n\nSYMBOL 7.\n\nGovern your tongue before all other things, following the gods.\n\nExplanation .--For it is the first work of wisdom to convert reason to itself and to accustom it not to proceed externally, but to be perfected in itself and in a conversion to itself.\n\nBut the second work consists in following the gods.\n\nFor nothing so perfects the intellect as, when being converted Into Itself, it at the same time follows Divinity.\n\nSYMBOL 8.\n\nThe wind is blowing, adore the wind.\n\nExplanation .--This Symbol also is a token of divine wisdom.\n\nFor it obscurely signifies that we ought to love the similitude of the divine essences and powers, and when their p."

