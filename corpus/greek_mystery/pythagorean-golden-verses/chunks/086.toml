[content]
body = "Πεύθετο γὰρ Γαίης τε καὶ Οὐρανοῦ ἀστερόεντος, οὕνεκά οἱ πέπρωτο ἑῷ ὑπὸ παιδὶ δαμῆναι καὶ κρατερῷ περ ἐόντι — Διὸς μεγάλου διὰ βουλάς· — 465 τῷ ὅ γ᾽ ἄρ᾽ οὐκ ἀλαὸς σκοπιὴν ἔχεν, ἀλλὰ δοκεύων παῖδας ἑοὺς κατέπινε· ῾Ρέην δ᾽ ἔχε πένθος ἄλαστον.\n\nἈλλ᾽ ὅτε δὴ Δί᾽ ἔμελλε θεῶν πατέρ᾽ ἠδὲ καὶ ἀνδρῶν τέξεσθαι, τότ᾽ ἔπειτα φίλους λιτάνευε τοκῆας τοὺς αὐτῆς, Γαῖάν τε καὶ Οὐρανὸν ἀστερόεντα, 470 μῆτιν συμφράσσασθαι, ὅπως λελάθοιτο τεκοῦσα παῖδα φίλον, τείσαιτο δ᾽ ἐρινῦς πατρὸς ἑοῖο παίδων θ᾽, οὓς κατέπινε μέγας Κρόνος ἀγκυλομήτης."

