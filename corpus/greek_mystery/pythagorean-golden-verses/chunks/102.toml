[content]
body = "660 Τῷ καὶ νῦν ἀτενεῖ τε νόῳ καὶ ἐπίφρονι βουλῇ ῥυσόμεθα κράτος ὑμὸν ἐν αἰνῇ δηιοτῆτι μαρνάμενοι Τιτῆσιν ἀνὰ κρατερὰς ὑσμίνας.\n\nὭς φάτ᾽· ἐπῄνεσσαν δὲ θεοί, δωτῆρες ἐάων, μῦθον ἀκούσαντες· πολέμου δ᾽ ἐλιλαίετο θυμὸς 665 μᾶλλον ἔτ᾽ ἢ τὸ πάροιθε· μάχην δ᾽ ἀμέγαρτον ἔγειραν πάντες, θήλειαι τε καὶ ἄρσενες, ἤματι κείνῳ, Τιτῆνές τε θεοὶ καὶ ὅσοι Κρόνου ἐξεγένοντο, οὕς τε Ζεὺς Ἐρέβεσφιν ὑπὸ χθονὸς ἧκε φόωσδε δεινοί τε κρατεροί τε, βίην ὑπέροπλον ἔχοντες.\n\n670 Τῶν ἑκατὸν μὲν χεῖρες ἀπ᾽ ὤμων ἀίσσοντο πᾶσιν ὁμῶς, κεφαλαὶ δὲ ἑκάστῳ πεντήκοντα ἐξ ὤμων ἐπέφυκον ἐπὶ στιβαροῖσι μέλεσσιν."

