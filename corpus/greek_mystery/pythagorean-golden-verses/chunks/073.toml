[content]
body = "305 Τῇ δὲ Τυφάονά φασι μιγήμεναι ἐν φιλότητι δεινόν θ᾽ ὑβριστήν τ᾽ ἄνομόν θ᾽ ἑλικώπιδι κούρῃ· ἣ δ᾽ ὑποκυσαμένη τέκετο κρατερόφρονα τέκνα.\n\nὌρθον μὲν πρῶτον κύνα γείνατο Γηρυονῆι· δεύτερον αὖτις ἔτικτεν ἀμήχανον, οὔ τι φατειὸν 310 Κέρβερον ὠμηστήν, Ἀίδεω κύνα χαλκεόφωνον, πεντηκοντακέφαλον, ἀναιδέα τε κρατερόν τε· τὸ τρίτον Ὕδρην αὖτις ἐγείνατο λυγρὰ ἰδυῖαν Λερναίην, ἣν θρέψε θεὰ λευκώλενος Ἥρη ἄπλητον κοτέουσα βίῃ Ἡρακληείῃ.\n\n315 Καὶ τὴν μὲν Διὸς υἱὸς ἐνήρατο νηλέι χαλκῷ Ἀμφιτρυωνιάδης σὺν ἀρηιφίλῳ Ἰολάῳ Ἡρακλέης βουλῇσιν Ἀθηναίης ἀγελείης."

