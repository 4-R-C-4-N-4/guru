[content]
body = "125 Γαῖα δέ τοι πρῶτον μὲν ἐγείνατο ἶσον ἑ᾽ αὐτῇ Οὐρανὸν ἀστερόενθ᾽, ἵνα μιν περὶ πάντα καλύπτοι, ὄφρ᾽ εἴη μακάρεσσι θεοῖς ἕδος ἀσφαλὲς αἰεί.\n\nΓείνατο δ᾽ Οὔρεα μακρά, θεῶν χαρίεντας ἐναύλους, [Νυμφέων, αἳ ναίουσιν ἀν᾽ οὔρεα βησσήεντα.] 130 Ἥ δὲ καὶ ἀτρύγετον πέλαγος τέκεν, οἴδματι θυῖον, Πόντον, ἄτερ φιλότητος ἐφιμέρου· αὐτὰρ ἔπειτα Οὐρανῷ εὐνηθεῖσα τέκ᾽ Ὠκεανὸν βαθυδίνην, Κοῖόν τε Κρῖόν θ᾽ Ὑπερίονά τ᾽ Ἰαπετόν τε Θείαν τε ῾Ρείαν τε Θέμιν τε Μνημοσύνην τε 135 Φοίβην τε χρυσοστέφανον Τηθύν τ᾽ ἐρατεινήν.\n\nΤοὺς δὲ μέθ᾽ ὁπλότατος γένετο Κρόνος ἀγκυλομήτης, δεινότατος παίδων· θαλερὸν δ᾽ ἤχθηρε τοκῆα."

