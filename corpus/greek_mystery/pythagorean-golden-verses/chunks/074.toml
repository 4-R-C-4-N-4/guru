[content]
body = "Ἥ δὲ Χίμαιραν ἔτικτε πνέουσαν ἀμαιμάκετον πῦρ, δεινήν τε μεγάλην τε ποδώκεά τε κρατερήν τε· 320 Τῆς δ᾽ ἦν τρεῖς κεφαλαί· μία μὲν χαροποῖο λέοντος, ἣ δὲ χιμαίρης, ἣ δ᾽ ὄφιος, κρατεροῖο δράκοντος, [πρόσθε λέων, ὄπιθεν δὲ δράκων, μέσση δὲ χίμαιρα, δεινὸν ἀποπνείουσα πυρὸς μένος αἰθομένοιο.] Τὴν μὲν Πήγασος εἷλε καὶ ἐσθλὸς Βελλεροφόντης.\n\n325 Ἥ δ᾽ ἄρα Φῖκ᾽ ὀλοὴν τέκε Καδμείοισιν ὄλεθρον Ὅρθῳ ὑποδμηθεῖσα Νεμειαῖόν τε λέοντα, τόν ῥ᾽ Ἥρη θρέψασα Διὸς κυδρὴ παράκοιτις γουνοῖσιν κατένασσε Νεμείης, πῆμ᾽ ἀνθρώποις.\n\nἜνθ᾽ ἄρ᾽ ὃ οἰκείων ἐλεφαίρετο φῦλ᾽ ἀνθρώπων, 330 κοιρανέων Τρητοῖο Νεμείης ἠδ᾽ Ἀπέσαντος· ἀλλά ἑ ἲς ἐδάμασσε βίης Ἡρακληείης."

