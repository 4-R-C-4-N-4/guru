[content]
body = "920 Λοισθοτάτην δ᾽ Ἥρην θαλερὴν ποιήσατ᾽ ἄκοιτιν· ἣ δ᾽ Ἥβην καὶ Ἄρηα καὶ Εἰλείθυιαν ἔτικτε μιχθεῖσ᾽ ἐν φιλότητι θεῶν βασιλῆι καὶ ἀνδρῶν.\n\nΑὐτὸς δ᾽ ἐκ κεφαλῆς γλαυκώπιδα Τριτογένειαν δεινὴν ἐγρεκύδοιμον ἀγέστρατον ἀτρυτώνην 925 πότνιαν, ᾗ κέλαδοί τε ἅδον πόλεμοί τε μάχαι τε, Ἥρη δ᾽ Ἥφαιστον κλυτὸν οὐ φιλότητι μιγεῖσα 925 γείνατο, καὶ ζαμένησε καὶ ἤρισε ᾧ παρακοίτῃ, ἐκ πάντων τέχνῃσι κεκασμένον Οὐρανιώνων.\n\n(σημείωση) Ἐκ δ᾽ Ἀμφιτρίτης καὶ ἐρικτύπου Ἐννοσιγαίου 930 Τρίτων εὐρυβίης γένετο μέγας, ὅστε θαλάσσης πυθμέν᾽ ἔχων παρὰ μητρὶ φίλῃ καὶ πατρὶ ἄνακτι ναίει χρύσεα δῶ, δεινὸς θεός."

