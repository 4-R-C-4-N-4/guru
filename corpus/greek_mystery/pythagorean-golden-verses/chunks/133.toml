[content]
body = "929m Μῆτις δ᾽ αὖτε Ζηνὸς ὑπὸ σπλάγχνοις λελαθυῖα 929n ἧστο, Ἀθηναίης μήτηρ, τέκταινα δικαίων 929o πλεῖστα θεῶν τε ἰδυῖα καταθνητῶν τ᾽ ἀνθρώπων, 929p ἔνθα θεὰ παρέδεκτο ὅθεν παλάμαις περὶ πάντων 929q ἀθανάτων ἐκέκασθ᾽ οἳ Ὀλύμπια δώματ᾽ ἔχουσιν, 929r [αἰγίδα ποιήσασα φοβέστρατον ἔντος Ἀθήνης·] \u0001"

