[content]
body = "προφερεστάτη ἐστὶν ἁπασέων.\n\nΑὗται δ᾽ Ὠκεανοῦ καὶ Τηθύος ἐξεγένοντο πρεσβύταται κοῦραι· πολλαί γε μέν εἰσι καὶ ἄλλαι.\n\nΤρὶς γὰρ χίλιαί εἰσι τανύσφυροι Ὠκεανῖναι, αἵ ῥα πολυσπερέες γαῖαν καὶ βένθεα λίμνης 365 πάντη ὁμῶς ἐφέπουσι, θεάων ἀγλαὰ τέκνα.\n\nΤόσσοι δ᾽ αὖθ᾽ ἕτεροι ποταμοὶ καναχηδὰ ῥέοντες, υἱέες Ὠκεανοῦ, τοὺς γείνατο πότνια Τηθύς· τῶν ὄνομ᾽ ἀργαλέον πάντων βροτὸν ἀνέρ᾽ ἐνισπεῖν, Οἳ δὲ ἕκαστοι ἴσασιν, ὅσοι περιναιετάωσιν.\n\n370 Θεία δ᾽ Ἠέλιόν τε μέγαν λαμπράν τε Σελήνην Ἠῶ θ᾽, ἣ πάντεσσιν ἐπιχθονίοισι φαείνει ἀθανάτοις τε θεοῖσι, τοὶ οὐρανὸν εὐρὺν ἔχουσι, γείναθ᾽ ὑποδμηθεῖσ᾽ Ὑπερίονος ἐν φιλότητι."

