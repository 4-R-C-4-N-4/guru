[content]
body = "Οἳ δ᾽ ἄρ᾽ ἐνὶ πρώτοισι μάχην δριμεῖαν ἔγειραν Κόττος τε Βριάρεώς τε Γύης τ᾽ ἄατος πολέμοιο, οἵ ῥα τριηκοσίας πέτρας στιβαρῶν ἀπὸ χειρῶν 715 πέμπον ἐπασσυτέρας, κατὰ δ᾽ ἐσκίασαν βελέεσσι Τιτῆνας, καὶ τοὺς μὲν ὑπὸ χθονὸς εὐρυοδείης πέμψαν καὶ δεσμοῖσιν ἐν ἀργαλέοισιν ἔδησαν χερσὶν νικήσαντες ὑπερθύμους περ ἐόντας, τόσσον ἔνερθ᾽ ὑπὸ γῆς, ὅσον οὐρανός ἐστ᾽ ἀπὸ γαίης· 720 [τόσσον γάρ τ᾽ ἀπὸ γῆς ἐς Τάρταρον ἠερόεντα.] Ἔννέα γὰρ νύκτας τε καὶ ἤματα χάλκεος ἄκμων οὐρανόθεν κατιὼν δεκάτῃ κ᾽ ἐς γαῖαν ἵκοιτο· ἐννέα δ᾽ αὖ νύκτας τε καὶ ἤματα χάλκεος ἄκμων ἐκ γαίης κατιὼν δεκάτῃ κ᾽ ἐς Τάρταρον ἵκοι."

