[content]
body = "580 Τῇ δ᾽ ἐνὶ δαίδαλα πολλὰ τετεύχατο, θαῦμα ἰδέσθαι, κνώδαλ᾽, ὅσ᾽ ἤπειρος πολλὰ τρέφει ἠδὲ θάλασσα· τῶν ὅ γε πόλλ᾽ ἐνέθηκε,—χάρις δ᾽ ἀπελάμπετο πολλή,— θαυμάσια, ζῴοισιν ἐοικότα φωνήεσσιν.\n\nΑὐτὰρ ἐπεὶ δὴ τεῦξε καλὸν κακὸν ἀντ᾽ ἀγαθοῖο, 585 ἐξάγαγ᾽, ἔνθα περ ἄλλοι ἔσαν θεοὶ ἠδ᾽ ἄνθρωποι, κόσμῳ ἀγαλλομένην γλαυκώπιδος ὀβριμοπάτρης.\n\nθαῦμα δ᾽ ἔχ᾽ ἀθανάτους τε θεοὺς θνητούς τ᾽ ἀνθρώπους, ὡς ἔιδον δόλον αἰπύν, ἀμήχανον ἀνθρώποισιν.\n\n[ἐκ τῆς γὰρ γένος ἐστὶ γυναικῶν θηλυτεράων,] 590 τῆς γὰρ ὀλώιόν ἐστι γένος καὶ φῦλα γυναικῶν, πῆμα μέγ᾽ αἳ θνητοῖσι μετ᾽ ἀνδράσι ναιετάουσιν οὐλομένης πενίης οὐ σύμφοροι, ἀλλὰ κόροιο."

