[content]
body = "Φόρκυϊ δ᾽ αὖ Κητὼ Γραίας τέκε καλλιπαρῄους 270 ἐκ γενετῆς πολιάς, τὰς δὴ Γραίας καλέουσιν ἀθάνατοί τε θεοὶ χαμαὶ ἐρχόμενοί τ᾽ ἄνθρωποι, Πεμφρηδώ τ᾽ ἐύπεπλον Ἐνυώ τε κροκόπεπλον, Γοργούς θ᾽, αἳ ναίουσι πέρην κλυτοῦ Ὠκεανοῖο ἐσχατιῇ πρὸς Νυκτός, ἵν᾽ Ἑσπερίδες λιγύφωνοι, 275 Σθεννώ τ᾽ Εὐρυάλη τε Μέδουσά τε λυγρὰ παθοῦσα.\n\nἭ μὲν ἔην θνητή, αἳ δ᾽ ἀθάνατοι καὶ ἀγήρῳ, αἱ δύο· τῇ δὲ μιῇ παρελέξατο Κυανοχαίτης ἐν μαλακῷ λειμῶνι καὶ ἄνθεσιν εἰαρινοῖσιν.\n\nΤῆς δ᾽ ὅτε δὴ Περσεὺς κεφαλὴν ἀπεδειροτόμησεν, 280 ἔκθορε Χρυσαωρ τε μέγας καὶ Πήγασος ἵππος.\n\nΤῷ μὲν ἐπώνυμον ἦεν, ὅτ᾽ Ὠκεανοῦ περὶ πηγὰς γένθ᾽, ὃ δ᾽ ἄορ χρύσειον ἔχων μετὰ χερσὶ φίλῃσιν."

