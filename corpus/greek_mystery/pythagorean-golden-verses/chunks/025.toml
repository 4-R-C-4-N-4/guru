[content]
body = "Sacred Texts Classics Index Previous p.\n\n67 THE SYMBOLS OF PYTHAGORAS All the Symbols are exhortatory in common to the whole of virtue; but particularly each to some particular virtue.\n\nDifferent symbols also are differently adapted to parts of philosophy and discipline.\n\nThus for instance the first Symbol directly exhorts to piety and divine science.\n\nSYMBOL 1.\n\nWhen going to the temple to adore Divinity neither say nor do any thing in the interim pertaining to the common affairs of life.\n\nExplanation .--This Symbol preserves a divine nature such as it is in itself pure p.\n\n68 and undefiled: for the pure is wont to be conjoined to the pure.\n\nIt also causes us to introduce nothing from human affairs into the worship of Divinity; for all such things are foreign from, and contrary to, religious worship.\n\nThis Symbol also greatly contributes to science; for in divine science it is necessary to introduce nothing of this kind; such as human conceptions, or those pertaining to the concerns of life.\n\nWe are exhorted to nothing else, therefore, by these words than this: that we should not mingle sacred discourses and divine actions with the instability of human manners.\n\nSYMBOL 2.\n\nNeither enter into a temple negligently, nor in short adore carelessly, not even though you should stand at the very doors themselves.\n\nExplanation .--With the preceding this symbol also accords.\n\nFor if the similar is friendly and allied to the similar, it is evident that since the gods have a.\n\nmost principal essence among wholes, we ought to make the worship of them a principal object.\n\np.\n\n69 But he who does this for the sake of anything else, gives a secondary rank to that which takes the precedency of all things, and subverts the whole order of religious worship and knowledge.\n\nBesides, it is not proper to rank illustrious goods in the subordinate condition of human utility, nor to place our condition in the order of an end, but things more excellent, whether they be works or conceptions, in the condition of an appendage.\n\nSYMBOL 3.\n\nSacrifice and adore unshod.\n\nExplanation .--An exhortation to the same thing may also be obtained from this Symbol.\n\nFor it signifies that we ought to worship the gods and acquire a knowledge of them orderly and modestly, and in a manner not surpassing our condition on earth.\n\nIt also signifies that in worshipping them, and acquiring this knowledge, we should be free from bonds, and properly liberated.\n\nBut the Symbol exhorts that sacrifice and adoration should be performed not only in the body, but also in the energies of the soul; so that these energies may p.\n\n70 neither be detained by passions, nor by the imbecilities of the body, nor by generation, with which we are externally surrounded, But everything pertaining to us should be properly liberated, and prepared for the participation of the gods.\n\nSYMBOL 4.\n\nDisbelieve nothing wonderful concerning the gods, nor concerning divine dogmas.\n\nExplanation .--This Symbol in like manner exhorts to the same virtue.\n\nFor this dogma sufficiently venerates and unfolds the transcendency of the gods.\n\nAffording us a viaticum and recalling to our memory that we ought not to estimate divine power from our judgment.\n\nBut it is likely that some things should appear difficult and impossible to us, in consequence of our corporeal subsistence, and from our being conversant with generation and corruption; from our having a momentary existence; from being subject to a variety of diseases; from the smallness of our habitation; from our gravitating tendency to the middle; from our somnolency, indigence and repletion; from our want of counsel and our imbecility; p.\n\n71 from the impediments of our soul, and a variety of other circumstances, although our nature possesses many illustrious prerogatives."

