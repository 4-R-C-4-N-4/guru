[content]
body = "φωναὶ δ᾽ ἐν πάσῃσιν ἔσαν δεινῇς κεφαλῇσι παντοίην ὄπ᾽ ἰεῖσαι ἀθέσφατον· ἄλλοτε μὲν γὰρ 830 φθέγγονθ᾽ ὥστε θεοῖσι συνιέμεν, ἄλλοτε δ᾽ αὖτε ταύρου ἐριβρύχεω, μένος ἀσχέτου, ὄσσαν ἀγαύρου, ἄλλοτε δ᾽ αὖτε λέοντος ἀναιδέα θυμὸν ἔχοντος, ἄλλοτε δ᾽ αὖ σκυλάκεσσιν ἐοικότα, θαύματ᾽ ἀκοῦσαι, ἄλλοτε δ᾽ αὖ ῥοίζεσχ᾽, ὑπὸ δ᾽ ἤχεεν οὔρεα μακρά.\n\n835 Καί νύ κεν ἔπλετο ἔργον ἀμήχανον ἤματι κείνῳ καί κεν ὅ γε θνητοῖσι καὶ ἀθανάτοισιν ἄναξεν, εἰ μὴ ἄρ᾽ ὀξὺ νόησε πατὴρ ἀνδρῶν τε θεῶν τε.\n\nΣκληρὸν δ᾽ ἐβρόντησε καὶ ὄβριμον, ἀμφὶ δὲ γαῖα σμερδαλέον κονάβησε καὶ οὐρανὸς εὐρὺς ὕπερθε 840 πόντος τ᾽ Ὠκεανοῦ τε ῥοαὶ καὶ Τάρταρα γαίης."

