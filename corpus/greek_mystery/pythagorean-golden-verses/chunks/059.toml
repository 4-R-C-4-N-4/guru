[content]
body = "Τῶν ἑκατὸν μὲν χεῖρες ἀπ᾽ ὤμων ἀίσσοντο, 150 ἄπλαστοι, κεφαλαὶ δὲ ἑκάστῳ πεντήκοντα ἐξ ὤμων ἐπέφυκον ἐπὶ στιβαροῖσι μέλεσσιν· ἰσχὺς δ᾽ ἄπλητος κρατερὴ μεγάλῳ ἐπὶ εἴδει.\n\nὍσσοι γὰρ Γαίης τε καὶ Οὐρανοῦ ἐξεγένοντο, δεινότατοι παίδων, σφετέρῳ δ᾽ ἤχθοντο τοκῆι 155 ἐξ ἀρχῆς· καὶ τῶν μὲν ὅπως τις πρῶτα γένοιτο, πάντας ἀποκρύπτασκε, καὶ ἐς φάος οὐκ ἀνίεσκε, Γαίης ἐν κευθμῶνι, κακῷ δ᾽ ἐπετέρπετο ἔργῳ Οὐρανός.\n\nἣ δ᾽ ἐντὸς στοναχίζετο Γαῖα πελώρη στεινομένη· δολίην δὲ κακήν τ᾽ ἐφράσσατο τέχνην."

