[content]
body = "620 Ἔνθ᾽ οἵ γ᾽ ἄλγε᾽ ἔχοντες ὑπὸ χθονὶ ναιετάοντες ἥατ᾽ ἐπ᾽ ἐσχατιῇ, μεγάλης ἐν πείρασι γαίης, δηθὰ μάλ᾽ ἀχνύμενοι, κραδίῃ μέγα πένθος ἔχοντες.\n\nἀλλά σφεας Κρονίδης τε καὶ ἀθάνατοι θεοὶ ἄλλοι, οὓς τέκεν ἠύκομος ῾Ρείη Κρόνου ἐν φιλότητι, 625 Γαίης φραδμοσύνῃσιν ἀνήγαγον ἐς φάος αὖτις· αὐτὴ γάρ σφιν ἅπαντα διηνεκέως κατέλεξε σὺν κείνοις νίκην τε καὶ ἀγλαὸν εὖχος ἀρέσθαι.\n\nδηρὸν γὰρ μάρναντο πόνον θυμαλγέ᾽ ἔχοντες ἀντίον ἀλλήλοισι διὰ κρατερὰς ὑσμίνας, 631 Τιτῆνές τε θεοὶ καὶ ὅσοι Κρόνου ἐξεγένοντο· 630 οἳ μὲν ἀφ᾽ ὑψηλῆς Ὄθρυος Τιτῆνες ἀγαυοί, οἳ δ᾽ ἄρ᾽ ἀπ᾽ Οὐλύμποιο θεοί, δωτῆρες ἐάων, οὓς τέκεν ἠύκομος ῾Ρείη Κρόνῳ εὐνηθεῖσα."

