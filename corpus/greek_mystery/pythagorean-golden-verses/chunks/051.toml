[content]
body = "Πὰρ δ᾽ αὐτῇς Χάριτές τε καὶ Ἵμερος οἰκί᾽ ἔχουσιν ἐν θαλίῃς· ἐρατὴν δὲ διὰ στόμα ὄσσαν ἱεῖσαι 65 μέλπονται πάντων τε νόμους καὶ ἤθεα κεδνὰ ἀθανάτων κλείουσιν, ἐπήρατον ὄσσαν ἱεῖσαι.] Αἳ τότ᾽ ἴσαν πρὸς Ὄλυμπον ἀγαλλόμεναι ὀπὶ καλῇ, ἀμβροσίῃ μολπῇ· περὶ δ᾽ ἴαχε γαῖα μέλαινα ὑμνεύσαις, ἐρατὸς δὲ ποδῶν ὕπο δοῦπος ὀρώρει 70 νισσομένων πατέρα ὅν· ὃ δ᾽ οὐρανῷ ἐμβασιλεύει, αὐτὸς ἔχων βροντὴν ἠδ᾽ αἰθαλόεντα κεραυνόν, κάρτεϊ νικήσας πατέρα Κρόνον· εὖ δὲ ἕκαστα ἀθανάτοις διέταξεν ὁμῶς καὶ ἐπέφραδε τιμάς."

