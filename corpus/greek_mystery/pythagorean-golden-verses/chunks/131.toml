[content]
body = "] οἳ δή τοι μάλα τῆλε μυχῷ νήσων ἱεράων 1015 πᾶσιν Τυρσηνοῖσιν ἀγακλειτοῖσιν ἄνασσον.\n\nΝαυσίθοον δ᾽ Ὀδυσῆι Καλυψὼ δῖα θεάων γείνατο Ναυσίνοόν τε μιγεῖσ᾽ ἐρατῇ φιλότητι.\n\nΑὗται μὲν θνητοῖσι παρ᾽ ἀνδράσιν εὐνηθεῖσαι ἀθάναται γείναντο θεοῖς ἐπιείκελα τέκνα.\n\n1020 Νῦν δὲ γυναικῶν φῦλον ἀείσατε, ἡδυέπειαι Μοῦσαι Ὀλυμπιάδες, κοῦραι Διὸς αἰγιόχοιο.\n\n------------ Βάσει τῶν: Rzach, Hesiodi Carmina, Lps 1913, [BT] minor P.\n\nMazon, Hesiode, Collection des Universites de France, 1928 δὲς π.χ.\n\nΠ.\n\nΛεκατσᾶς, Ἡσίοδος , Ἰ.\n\nΖαχαρόπουλος, Ἀθήνα 1941 ------------ Σημείωση Σὲ ἄλλες ἐκδόσεις περιλαμβάνονται ἐπίσης οἱ στίχοι: <Ἥρη δὲ ζαμένησε καὶ ἤρισε ᾧ παρακοίτῃ."

