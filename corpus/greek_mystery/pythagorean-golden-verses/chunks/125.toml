[content]
body = "αὐτὰρ Ἄρηι ῥινοτόρῳ Κυθέρεια Φόβον καὶ Δεῖμον ἔτικτε δεινούς, οἵτ᾽ ἀνδρῶν πυκινὰς κλονέουσι φάλαγγας 935 ἐν πολέμῳ κρυόεντι σὺν Ἄρηι πτολιπόρθῳ, Ἁρμονίην θ᾽, ἣν Κάδμος ὑπέρθυμος θέτ᾽ ἄκοιτιν.\n\nΖηνὶ δ᾽ ἄρ᾽ Ἀτλαντὶς Μαίη τέκε κύδιμον Ἑρμῆν, κήρυκ᾽ ἀθανάτων, ἱερὸν λέχος εἰσαναβᾶσα.\n\nΚαδμείη δ᾽ ἄρα οἱ Σεμέλη τέκε φαίδιμον υἱὸν 940 μιχθεῖσ᾽ ἐν φιλότητι, Διώνυσον πολυγηθέα, ἀθάνατον θνητή· νῦν δ᾽ ἀμφότεροι θεοί εἰσιν.\n\nἈλκμήνη δ᾽ ἄρ᾽ ἔτικτε βίην Ἡρακληείην μιχθεῖσ᾽ ἐν φιλότητι Διὸς νεφεληγερέταο.\n\nἈγλαΐην δ᾽ Ἥφαιστος, ἀγακλυτὸς ἀμφιγυήεις, 945 ὁπλοτάτην Χαρίτων θαλερὴν ποιήσατ᾽ ἄκοιτιν."

