[content]
body = "Ἐκ δὲ Τυφωέος ἔστ᾽ ἀνέμων μένος ὑγρὸν ἀέντων, νόσφι Νότου Βορέωτε καὶ ἀργέστεω Ζεφύροιο· 870 οἵ γε μὲν ἐκ θεόφιν γενεή, θνητοῖς μέγ᾽ ὄνειαρ· Οἱ δ᾽ ἄλλοι μαψαῦραι ἐπιπνείουσι θάλασσαν· αἳ δή τοι πίπτουσαι ἐς ἠεροειδέα πόντον, πῆμα μέγα θνητοῖσι, κακῇ θυίουσιν ἀέλλῃ· ἄλλοτε δ᾽ ἄλλαι ἄεισι διασκιδνᾶσί τε νῆας 875 ναύτας τε φθείρουσι· κακοῦ δ᾽ οὐ γίγνεται ἀλκὴ ἀνδράσιν, οἳ κείνῃσι συνάντωνται κατὰ πόντον· αἳ δ᾽ αὖ καὶ κατὰ γαῖαν ἀπείριτον ἀνθεμόεσσαν ἔργ᾽ ἐρατὰ φθείρουσι χαμαιγενέων ἀνθρώπων πιμπλεῖσαι κόνιός τε καὶ ἀργαλέου κολοσυρτοῦ."

