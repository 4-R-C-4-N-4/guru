[content]
body = "Sacred Texts Classics Index Previous Next p.\n\n29 THE PYTHAGOREAN SENTENCES OF DEMOPHILUS 1.\n\nRequest not of Divinity such things as, when obtained, you cannot preserve; for no gift of Divinity can ever be taken away; and on this account he does not confer that which you are unable to retain.\n\n2.\n\nBe vigilant in your intellectual part; for sleep about this has an affinity with real death.\n\np.\n\n30 3.\n\nDivinity sends evil to men, not as being influenced by anger, but for the sake of purification; for anger is foreign from Divinity, since it arises from circumstances taking place contrary to the will; but nothing contrary to the will can happen to a god.\n\n4.\n\nWhen you deliberate whether or not you shall injure another, you will previously suffer the evil yourself which you intend to commit.\n\nBut neither must you expect any good from the evil; for the manners of everyone are correspondent to his life and actions.\n\nEvery soul too is a repository, that which is good, of things good, that which is evil, of things depraved.\n\n5.\n\nAfter long consultation, engage either in speaking or acting; for you have not the ability to recall either your words or deeds.\n\n6.\n\nDivinity does not principally esteem the tongue, but the deeds of the wise; for a wise man, even when he is silent, honours Divinity.\n\n7.\n\nA loquacious and ignorant man both in prayer and sacrifice contaminates a divine nature.\n\nThe wise man therefore is p.\n\n31 alone a priest, is alone a friend of Divinity and only knows how to pray.\n\n8.\n\nThe wise man being sent hither naked, should naked invoke him by whom he was sent; for he alone is heard by Divinity, who is not burdened with foreign concerns.\n\n9.\n\nIt is impossible to receive from Divinity any gift greater than virtue.\n\n1 10.\n\nGifts and victims confer no honour on Divinity, nor is he adorned with offerings suspended in temples; but a soul divinely inspired solidly conjoins us with Divinity; for it is necessary that like should approach to like.\n\n11.\n\nIt is more painful to be subservient to passions than to tyrants.\n\n12.\n\nIt is better to converse more with yourself than others.\n\n13.\n\nIf you are always careful to remember that in whatever place either your soul or body accomplishes any deed, Divinity is present as an inspector of your conduct; in all your words and actions you will venerate the presence of an inspector from whom nothing can be concealed, and will, at the p.\n\n32 same time, possess Divinity as an intimate associate.\n\n14.\n\nBelieve that you are furious and insane in proportion as you are ignorant of yourself.\n\n15.\n\nIt is necessary to search for those wives and children which will remain after a liberation from the present life.\n\n16.\n\nThe self-sufficient and needy philosopher lives a life truly similar to Divinity, and considers the non-possession of external and unnecessary goods as the greatest wealth.\n\nFor the acquisition of riches sometimes inflames desire; but not to act in any respect unjustly is sufficient to the enjoyment of a blessed life.\n\n17.\n\nTrue goods are never produced by indolent habits.\n\n18.\n\nEsteem that to be eminently good, which, communicated to another, will be increased to yourself.\n\n1 19.\n\nEsteem those to be eminently your friends, who assist your soul rather than your body.\n\n20.\n\nConsider both the praise and reproach of every foolish person as ridiculous, p.\n\n33 and the whole life of an ignorant man as a disgrace.\n\n21.\n\nEndeavour that your familiars may reverence rather than fear you; for love attends upon reverence, but hatred upon fear.\n\n22."

