[content]
body = "οἵ ῥα τότ᾽ ἀλλήλοισι χόλον θυμαλγέ᾽ ἔχοντες 635 συνεχέως ἐμάχοντο δέκα πλείους ἐνιαυτούς· οὐδέ τις ἦν ἔριδος χαλεπῆς λύσις οὐδὲ τελευτὴ οὐδετέροις, ἶσον δὲ τέλος τέτατο πτολέμοιο.\n\nἈλλ᾽ ὅτε δὴ κείνοισι παρέσχεθεν ἄρμενα πάντα, νέκταρ τ᾽ ἀμβροσίην τε, τά περ θεοὶ αὐτοὶ ἔδουσι, 640 πάντων ἐν στήθεσσιν ἀέξετο θυμὸς ἀγήνωρ.\n\n[Ὡς νέκταρ τ᾽ ἐπάσαντο καὶ ἀμβροσίην ἐρατεινήν,] δὴ τότε τοῖς μετέειπε πατὴρ ἀνδρῶν τε θεῶν τε· κέκλυτε μευ, Γαίης τε καὶ Οὐρανοῦ ἀγλαὰ τέκνα, ὄφρ᾽ εἴπω, τά με θυμὸς ἐνὶ στήθεσσι κελεύει.\n\n645 Ἤδη γὰρ μάλα δηρὸν ἐναντίοι ἀλλήλοισι νίκης καὶ κράτεος πέρι μαρνάμεθ᾽ ἤματα πάντα Τιτῆνές τε θεοὶ καὶ ὅσοι Κρόνου ἐκγενόμεσθα."

