[content]
body = "[Ἔνθα δὲ γῆς δνοφερῆς καὶ Ταρτάρου ἠερόεντος πόντου τ᾽ ἀτρυγέτοιο καὶ οὐρανοῦ ἀστερόεντος ἑξείης πάντων πηγαὶ καὶ πείρατ᾽ ἔασιν ἀργαλέ᾽ εὐρώεντα, τά τε στυγέουσι θεοί περ.\n\n810 Ἔνθα δὲ μαρμάρεαί τε πύλαι καὶ χάλκεος οὐδὸς ἀστεμφής, ῥίζῃσι διηνεκέεσσιν ἀρηρώς, αὐτοφυής· πρόσθεν δὲ θεῶν ἔκτοσθεν ἁπάντων Τιτῆνες ναίουσι, πέρην Χάεος ζοφεροῖο."

