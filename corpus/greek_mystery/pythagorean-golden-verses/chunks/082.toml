[content]
body = "415 Καὶ γὰρ νῦν, ὅτε πού τις ἐπιχθονίων ἀνθρώπων ἔρδων ἱερὰ καλὰ κατὰ νόμον ἱλάσκηται, κικλῄσκει Ἑκάτην· πολλή τέ οἱ ἕσπετο τιμὴ ῥεῖα μάλ᾽, ᾧ πρόφρων γε θεὰ ὑποδέξεται εὐχάς, καί τέ οἱ ὄλβον ὀπάζει, ἐπεὶ δύναμίς γε πάρεστιν.\n\n420 Ὅσσοι γὰρ Γαίης τε καὶ Οὐρανοῦ ἐξεγένοντο καὶ τιμὴν ἔλαχον, τούτων ἔχει αἶσαν ἁπάντων.\n\nΟὐδέ τί μιν Κρονίδης ἐβιήσατο οὐδέ τ᾽ ἀπηύρα, ὅσσ᾽ ἔλαχεν Τιτῆσι μετὰ προτέροισι θεοῖσιν, ἀλλ᾽ ἔχει, ὡς τὸ πρῶτον ἀπ᾽ ἀρχῆς ἔπλετο δασμός, 425 καὶ γέρας ἐν γαίῃ τε καὶ οὐρανῷ ἠδὲ θαλάσσῃ· 427 οὐδ᾽, ὅτι μουνογενής, ἧσσον θεὰ ἔμμορε τιμῆς, 426 ἀλλ᾽ ἔτι καὶ πολὺ μᾶλλον, ἐπεὶ Ζεὺς τίεται αὐτήν."

