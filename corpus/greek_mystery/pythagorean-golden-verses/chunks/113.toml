[content]
body = "Ὅς κεν τὴν ἐπίορκον ἀπολλείψας ἐπομόσσῃ ἀθανάτων, οἳ ἔχουσι κάρη νιφόεντος Ὀλύμπου, κεῖται νήυτμος τετελεσμένον εἰς ἐνιαυτόν· 795 οὐδέ ποτ᾽ ἀμβροσίης καὶ νέκταρος ἔρχεται ἆσσον βρώσιος, ἀλλά τε κεῖται ἀνάπνευστος καὶ ἄναυδος στρωτοῖς ἐν λεχέεσσι, κακὸν δέ ἑ κῶμα καλύπτει.\n\nΑὐτὰρ ἐπεὶ νοῦσον τελέσῃ μέγαν εἰς ἐνιαυτόν, ἄλλος γ᾽ ἐξ ἄλλου δέχεται χαλεπώτερος ἄεθλος.\n\n800 Εἰνάετες δὲ θεῶν ἀπαμείρεται αἰὲν ἐόντων, οὐδέ ποτ᾽ ἐς βουλὴν ἐπιμίσγεται οὐδ᾽ ἐπὶ δαῖτας ἐννέα πάντα ἔτεα· δεκάτῳ δ᾽ ἐπιμίσγεται αὖτις εἴρας ἐς ἀθανάτων, οἳ Ὀλύμπια δώματ᾽ ἔχουσιν.\n\nΤοῖον ἄρ᾽ ὅρκον ἔθεντο θεοὶ Στυγὸς ἄφθιτον ὕδωρ 805 ὠγύγιον, τὸ δ᾽ ἵησι καταστυφέλου διὰ χώρου."

