[content]
body = "Τὸν τόθ᾽ ἑλὼν χείρεσσιν ἑὴν ἐσκάτθετο νηδὺν σχέτλιος· οὐδ᾽ ἐνόησε μετὰ φρεσίν, ὥς οἱ ὀπίσσω ἀντὶ λίθου ἑὸς υἱὸς ἀνίκητος καὶ ἀκηδὴς λείπεθ᾽, ὅ μιν τάχ᾽ ἔμελλε βίῃ καὶ χερσὶ δαμάσσας 490 τιμῆς ἐξελάειν, ὃ δ᾽ ἐν ἀθανάτοισι ἀνάξειν.\n\nΚαρπαλίμως δ᾽ ἄρ᾽ ἔπειτα μένος καὶ φαίδιμα γυῖα ηὔξετο τοῖο ἄνακτος· ἐπιπλομένων δ᾽ ἐνιαυτῶν [Γαίης ἐννεσίῃσι πολυφραδέεσσι δολωθεὶς] ὃν γόνον ἄψ ἀνέηκε μέγας Κρόνος ἀγκυλομήτης 495 νικηθεὶς τέχνῃσι βίηφί τε παιδὸς ἑοῖο."

