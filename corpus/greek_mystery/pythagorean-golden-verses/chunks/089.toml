[content]
body = "Πρῶτον δ᾽ ἐξέμεσεν λίθον, πύματον καταπίνων· τὸν μὲν Ζεὺς στήριξε κατὰ χθονὸς εὐρυοδείης Πυθοῖ ἐν ἠγαθέῃ γυάλοις ὕπο Παρνησοῖο σῆμ᾽ ἔμεν ἐξοπίσω, θαῦμα θνητοῖσι βροτοῖσιν.\n\n500 [Λῦσε δὲ πατροκασιγνήτους ὀλοῶν ὑπὸ δεσμῶν Οὐρανίδας, οὓς δῆσε πατὴρ ἀεσιφροσύνῃσιν· οἳ οἱ ἀπεμνήσαντο χάριν εὐεργεσιάων, δῶκαν δὲ βροντὴν ἠδ᾽ αἰθαλόεντα κεραυνὸν καὶ στεροπήν· τὸ πρὶν δὲ πελώρη Γαῖα κεκεύθει· 505 τοῖς πίσυνος θνητοῖσι καὶ ἀθανάτοισιν ἀνάσσει.] Κούρην δ᾽ Ἰαπετὸς καλλίσφυρον Ὠκεανίνην ἠγάγετο Κλυμένην καὶ ὁμὸν λέχος εἰσανέβαινεν."

