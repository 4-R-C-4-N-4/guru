body = "Sacred Texts Classics Index Previous Next p.\n\n18 THE GOLDEN SENTENCES OF DEMOCRATES 1.\n\nIf anyone will give his mind to these sentences, he will obtain many things worthy of a man, and be free from many things that are base.\n\n2.\n\nThe perfection of the soul will correct the depravity of the body; but the strength of the body without reasoning does not render the soul better.\n\np.\n\n20 3.\n\nHe who loves the goods of the soul will love things more, divine; but he who loves the goods of its transient habitation will love things human.\n\n4.\n\nIt is beautiful to impede an unjust man; but, if this be not possible, it is beautiful not to act in conjunction with him.\n\n5.\n\nIt is necessary to be good, rather than to appear so.\n\n6.\n\nThe felicity of a man does not consist either in body or in riches, but in upright conduct and justice.\n\n7.\n\nSin should be abstained from, not through fear, but for the sake of the becoming.\n\n8.\n\nIt is a great thing to be wise where we ought in calamitous circumstances.\n\n9.\n\nRepentance after base actions is the salvation of life.\n\n10.\n\nIt is necessary to be a speaker of the truth, and not to be loquacious.\n\n11.\n\nHe who does an injury is more unhappy than he who receives one.\n\n12.\n\nIt is the province of a magnanimous man to bear with mildness the errors of others.\n\n13.\n\nIt is comely not to oppose the law, nor a prince, nor one wiser than yourself.\n\np.\n\n21 14.\n\nA good man pays no attention to the reproofs of the depraved.\n\n15.\n\nIt is hard to be governed by these who are worse than ourselves.\n\n16.\n\nHe who is perfectly vanquished by riches, can never be just.\n\n17.\n\nReason is frequently more persuasive than gold itself.\n\n18.\n\nHe who admonishes a man that fancies he has intellect, labours in vain.\n\n19.\n\nMany who have not learnt to argue rationally, still live according to reason.\n\n20.\n\nMany who commit the basest actions often exercise the best discourse.\n\n21.\n\nFools frequently become wise under the pressure of misfortunes.\n\n22.\n\nIt is necessary to emulate the works and actions, and not the words of virtue.\n\n23.\n\nThose who are naturally well disposed, know things beautiful, and are themselves emulous of them.\n\n24.\n\nVigour and strength of body are the nobility of cattle; but the rectitude of manners is the nobility of man.\n\n25.\n\nNeither art nor wisdom can be acquired without preparatory learning.\n\n26.\n\nIt is better to reprove your own errors, than those of others.\n\np.\n\n22 27.\n\nThose whose manners are well ordered will also be orderly in their lives.\n\n28.\n\nIt is good not only to refrain from doing an injury, but even from the very wish.\n\n29.\n\nIt is proper to speak well of good works; for to do so of such as are base is the property of a fraudulent man and an impostor.\n\n30, Many that have great learning have no intellect.\n\n31.\n\nIt is necessary to endeavour to obtain an abundance of intellect, and not pursue an abundance of erudition.\n\n32.\n\nIt is better that counsel should precede actions, than that repentance should follow them.\n\n33.\n\nPut not confidence in all men, but in those that are worthy; for to do the former is the province of a stupid man, but the latter of a wise man.\n\n34.\n\nA worthy and an unworthy man are to be judged not from their actions only, but also from their will.\n\n35.\n\nTo desire immoderately is the province of a boy, and not of a man.\n\n36.\n\nUnseasonable pleasures bring forth pains.\n\np.\n\n23 37."

