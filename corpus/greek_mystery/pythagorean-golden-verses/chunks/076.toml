[content]
body = "345 Τίκτε δὲ θυγατέρων ἱερὸν γένος, αἳ κατὰ γαῖαν ἄνδρας κουρίζουσι σὺν Ἀπόλλωνι ἄνακτι καὶ Ποταμοῖς, ταύτην δὲ Διὸς πάρα μοῖραν ἔχουσι, Πειθώ τ᾽ Ἀδμήτη τε Ἰάνθη τ᾽ Ἠλέκτρη τε Δωρίς τε Πρυμνώ τε καὶ Οὐρανίη θεοειδὴς 350 Ἱππώ τε Κλυμένη τε ῾Ρόδειά τε Καλλιρόη τε Ζευξώ τε Κλυτίη τε Ἰδυῖά τε Πασιθόη τε Πληξαύρη τε Γαλαξαύρη τ᾽ ἐρατή τε Διώνη Μηλόβοσίς τε Φόη τε καὶ εὐειδὴς Πολυδώρη Κερκηίς τε φυὴν ἐρατὴ Πλουτώ τε βοῶπις 355 Περσηίς τ᾽ Ἰάνειρά τ᾽ Ἀκάστη τε Ξάνθη τε Πετραίη τ᾽ ἐρόεσσα Μενεσθώ τ᾽ Εὐρώπη τε Μῆτίς τ᾽ Εὐρυνόμη τε Τελεστώ τε κροκόπεπλος Χρυσηίς τ᾽ Ἀσίη τε καὶ ἱμερόεσσα Καλυψὼ Εὐδώρη τε Τύχη τε καὶ Ἀμφιρὼ Ὠκυρόη τε 360 καὶ Στύξ, ἣ δή σφεων"

