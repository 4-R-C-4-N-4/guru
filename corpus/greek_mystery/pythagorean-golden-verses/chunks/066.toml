[content]
body = "Καὶ Μοίρας καὶ Κῆρας ἐγείνατο νηλεοποίνους, [Κλωθώ τε Λάχεσίν τε καὶ Ἄτροπον, αἵτε βροτοῖσι γεινομένοισι διδοῦσιν ἔχειν ἀγαθόν τε κακόν τε,] αἵτ᾽ ἀνδρῶν τε θεῶν τε παραιβασίας ἐφέπουσιν· 220 οὐδέ ποτε λήγουσι θεαὶ δεινοῖο χόλοιο, πρίν γ᾽ ἀπὸ τῷ δώωσι κακὴν ὄπιν, ὅς τις ἁμάρτῃ.\n\nΤίκτε δὲ καὶ Νέμεσιν, πῆμα θνητοῖσι βροτοῖσι, Νὺξ ὀλοή· μετὰ τὴν δ᾽ Ἀπάτην τέκε καὶ Φιλότητα Γῆράς τ᾽ οὐλόμενον, καὶ Ἔριν τέκε καρτερόθυμον."

