[content]
body = "Οὐδ᾽ ἄρ᾽ ἔτι Ζεὺς ἴσχεν ἑὸν μένος, ἀλλά νυ τοῦ γε εἶθαρ μὲν μένεος πλῆντο φρένες, ἐκ δέ τε πᾶσαν φαῖνε βίην· ἄμυδις δ᾽ ἄρ᾽ ἀπ᾽ οὐρανοῦ ἠδ᾽ ἀπ᾽ Ὀλύμπου ἀστράπτων ἔστειχε συνωχαδόν· οἱ δὲ κεραυνοὶ 690 ἴκταρ ἅμα βροντῇ τε καὶ ἀστεροπῇ ποτέοντο χειρὸς ἄπο στιβαρῆς, ἱερὴν φλόγα εἰλυφόωντες ταρφέες· ἀμφὶ δὲ γαῖα φερέσβιος ἐσμαράγιζε καιομένη, λάκε δ᾽ ἀμφὶ πυρὶ μεγάλ᾽ ἄσπετος ὕλη.\n\nἜζεε δὲ χθὼν πᾶσα καὶ Ὠκεανοῖο ῥέεθρα 695 πόντος τ᾽ ἀτρύγετος· τοὺς δ᾽ ἄμφεπε θερμὸς ἀυτμὴ Τιτῆνας χθονίους, φλὸξ δ᾽ αἰθέρα δῖαν ἵκανεν ἄσπετος, ὄσσε δ᾽ ἄμερδε καὶ ἰφθίμων περ ἐόντων αὐγὴ μαρμαίρουσα κεραυνοῦ τε στεροπῆς τε."

