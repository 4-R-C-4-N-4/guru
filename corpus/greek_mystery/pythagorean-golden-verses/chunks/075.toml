[content]
body = "Κητὼ δ᾽ ὁπλότατον Φόρκυι φιλότητι μιγεῖσα γείνατο δεινὸν ὄφιν, ὃς ἐρεμνῆς κεύθεσι γαίης σπείρησιν μεγάλοις παγχρύσεα μῆλα φυλάσσει.\n\n335 Τοῦτο μὲν ἐκ Κητοῦς καὶ Φόρκυνος γένος ἐστίν.\n\nΤηθὺς δ᾽ Ὠκεανῷ Ποταμοὺς τέκε δινήεντας, Νεῖλόν τ᾽ Ἀλφειόν τε καὶ Ἠριδανὸν βαθυδίνην Στρυμόνα Μαίανδρόν τε καὶ Ἴστρον καλλιρέεθρον Φᾶσίν τε ῾Ρῆσόν τ᾽ Ἀχελώιόν τ᾽ ἀργυροδίνην 340 Νέσσον τε ῾Ροδίον θ᾽ Ἁλιάκμονά θ᾽ Ἑπτάπορόν τε Γρήνικόν τε καὶ Αἴσηπον θεῖόν τε Σιμοῦντα Πηνειόν τε καὶ Ἕρμον ἐυρρείτην τε Κάικον Σαγγάριόν τε μέγαν Λάδωνά τε Παρθένιόν τε Εὔηνόν τε καὶ Ἄρδησκον θεῖόν τε Σκάμανδρον."

