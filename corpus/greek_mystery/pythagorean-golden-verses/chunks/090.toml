[content]
body = "Ἥ δέ οἱ Ἄτλαντα κρατερόφρονα γείνατο παῖδα· τίκτε δ᾽ ὑπερκύδαντα Μενοίτιον ἠδὲ Προμηθέα, 510 ποικίλον αἰολόμητιν, ἁμαρτίνοόν τ᾽ Ἐπιμηθέα, ὃς κακὸν ἐξ ἀρχῆς γένετ᾽ ἀνδράσιν ἀλφηστῇσιν· πρῶτος γάρ ῥα Διὸς πλαστὴν ὑπέδεκτο γυναῖκα παρθένον.\n\nὙβριστὴν δὲ Μενοίτιον εὐρύοπα Ζεὺς εἰς Ἔρεβος κατέπεμψε βαλὼν ψολόεντι κεραυνῷ 515 εἵνεκ᾽ ἀτασθαλίης τε καὶ ἠνορέης ὑπερόπλου.\n\nἌτλας δ᾽ οὐρανὸν εὐρὺν ἔχει κρατερῆς ὑπ᾽ ἀνάγκης πείρασιν ἐν γαίης, πρόπαρ Ἑσπερίδων λιγυφώνων, ἑστηὼς κεφαλῇ τε καὶ ἀκαμάτῃσι χέρεσσιν· ταύτην γάρ οἱ μοῖραν ἐδάσσατο μητίετα Ζεύς."

