[content]
body = "Ὥς γὰρ ἐβούλευσεν Στὺξ ἄφθιτος Ὠκεανίνη ἥματι τῷ, ὅτε πάντας Ὀλύμπιος ἀστεροπητὴς 390 ἀθανάτους ἐκάλεσσε θεοὺς ἐς μακρὸν Ὄλυμπον, εἶπε δ᾽, ὃς ἂν μετὰ εἷο θεῶν Τιτῆσι μάχοιτο, μή τιν᾽ ἀπορραίσειν γεράων, τιμὴν δὲ ἕκαστον ἑξέμεν, ἣν τὸ πάρος γε μετ᾽ ἀθανάτοισι θεοῖσιν Τὸν δ᾽ ἔφαθ᾽, ὅς τις ἄτιμος ὑπὸ Κρόνου ἠδ᾽ ἀγέραστος, 395 τιμῆς καὶ γεράων ἐπιβησέμεν, ἧ θέμις ἐστίν.\n\nἮλθε δ᾽ ἄρα πρώτη Στὺξ ἄφθιτος Οὔλυμπόνδε σὺν σφοῖσιν παίδεσσι φίλου διὰ μήδεα πατρός.\n\nΤὴν δὲ Ζεὺς τίμησε, περισσὰ δὲ δῶρα ἔδωκεν.\n\nΑὐτὴν μὲν γὰρ ἔθηκε θεῶν μέγαν ἔμμεναι ὅρκον, 400 παῖδας δ᾽ ἤματα πάντα ἕο μεταναιέτας εἶναι."

