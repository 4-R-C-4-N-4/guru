[content]
body = "520 Δῆσε δ᾽ ἀλυκτοπέδῃσι Προμηθέα ποικιλόβουλον δεσμοῖς ἀργαλέοισι μέσον διὰ κίον᾽ ἐλάσσας· καί οἱ ἐπ᾽ αἰετὸν ὦρσε τανύπτερον· αὐτὰρ ὅ γ᾽ ἧπαρ ἤσθιεν ἀθάνατον, τὸ δ᾽ ἀέξετο ἶσον ἁπάντη νυκτός, ὅσον πρόπαν ἦμαρ ἔδοι τανυσίπτερος ὄρνις.\n\n525 Τὸν μὲν ἄρ᾽ Ἀλκμήνης καλλισφύρου ἄλκιμος υἱὸς Ἡρακλέης ἔκτεινε, κακὴν δ᾽ ἀπὸ νοῦσον ἄλαλκεν Ἰαπετιονίδῃ καὶ ἐλύσατο δυσφροσυνάων οὐκ ἀέκητι Ζηνὸς Ὀλυμπίου ὑψιμέδοντος, ὄφρ᾽ Ἡρακλῆος Θηβαγενέος κλέος εἴη 530 πλεῖον ἔτ᾽ ἢ τὸ πάροιθεν ἐπὶ χθόνα πουλυβότειραν.\n\nΤαῦτά γ᾽ ἄρ᾽ ἁζόμενος τίμα ἀριδείκετον υἱόν· καί περ χωόμενος παύθη χόλου, ὃν πρὶν ἔχεσκεν, οὕνεκ᾽ ἐρίζετο βουλὰς ὑπερμενέει Κρονίωνι."

