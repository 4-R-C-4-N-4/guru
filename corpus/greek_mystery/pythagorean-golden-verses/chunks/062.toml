[content]
body = "175 Ἦλθε δὲ νύκτ᾽ ἐπάγων μέγας Οὐρανός, ἀμφὶ δὲ Γαίῃ ἱμείρων φιλότητος ἐπέσχετο καί ῥ᾽ ἐτανύσθη πάντη· ὃ δ᾽ ἐκ λοχεοῖο πάις ὠρέξατο χειρὶ σκαιῇ, δεξιτερῇ δὲ πελώριον ἔλλαβεν ἅρπην μακρὴν καρχαρόδοντα, φίλου δ᾽ ἀπὸ μήδεα πατρὸς 180 ἐσσυμένως ἤμησε, πάλιν δ᾽ ἔρριψε φέρεσθαι ἐξοπίσω· τὰ μὲν οὔ τι ἐτώσια ἔκφυγε χειρός· ὅσσαι γὰρ ῥαθάμιγγες ἀπέσσυθεν αἱματόεσσαι, πάσας δέξατο Γαῖα· περιπλομένων δ᾽ ἐνιαυτῶν γείνατ᾽ Ἐρινῦς τε κρατερὰς μεγάλους τε Γίγαντας, 185 τεύχεσι λαμπομένους, δολίχ᾽ ἔγχεα χερσὶν ἔχοντας, Νύμφας θ᾽, ἃς Μελίας καλέουσ᾽ ἐπ᾽ ἀπείρονα γαῖαν."

