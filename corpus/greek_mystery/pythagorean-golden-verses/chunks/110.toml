[content]
body = "Ἔνθα δὲ Νυκτὸς παῖδες ἐρεμνῆς οἰκί᾽ ἔχουσιν, Ὕπνος καὶ Θάνατος, δεινοὶ θεοί· οὐδέ ποτ᾽ αὐτοὺς Ἠέλιος φαέθων ἐπιδέρκεται ἀκτίνεσσιν 760 οὐρανὸν εἰς ἀνιὼν οὐδ᾽ οὐρανόθεν καταβαίνων.\n\nΤῶν δ᾽ ἕτερος γαῖάν τε καὶ εὐρέα νῶτα θαλάσσης ἥσυχος ἀνστρέφεται καὶ μείλιχος ἀνθρώποισι, τοῦ δὲ σιδηρέη μὲν κραδίη, χάλκεον δέ οἱ ἦτορ νηλεὲς ἐν στήθεσσιν· ἔχει δ᾽ ὃν πρῶτα λάβῃσιν 765 ἀνθρώπων· ἐχθρὸς δὲ καὶ ἀθανάτοισι θεοῖσιν."

