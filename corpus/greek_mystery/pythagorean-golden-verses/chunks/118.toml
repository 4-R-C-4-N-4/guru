[content]
body = "Καῦμα δ᾽ ὑπ᾽ ἀμφοτέρων κάτεχεν ἰοειδέα πόντον βροντῆς τε στεροπῆς τε, πυρός τ᾽ ἀπὸ τοῖο πελώρου, 845 [πρηστήρων ἀνέμων τε κεραυνοῦ τε φλεγέθοντος.] ἔζεε δὲ χθὼν πᾶσα καὶ οὐρανὸς ἠδὲ θάλασσα· θυῖε δ᾽ ἄρ᾽ ἀμφ᾽ ἀκτὰς περί τ᾽ ἀμφί τε κύματα μακρὰ ῥιπῇ ὕπ᾽ ἀθανάτων, ἔνοσις δ᾽ ἄσβεστος ὀρώρει· τρέε δ᾽ Ἀίδης, ἐνέροισι καταφθιμένοισιν ἀνάσσων, 850 Τιτῆνές θ᾽ ὑποταρτάριοι, Κρόνον ἀμφὶς ἐόντες, [ἀσβέστου κελάδοιο καὶ αἰνῆς δηιοτῆτος.] Ζεὺς δ᾽ ἐπεὶ οὖν κόρθυνεν ἑὸν μένος, εἵλετο δ᾽ ὅπλα, βροντήν τε στεροπήν τε καὶ αἰθαλόεντα κεραυνόν, πλῆξεν ἀπ᾽ Οὐλύμποιο ἐπάλμενος· ἀμφὶ δὲ πάσας 855 ἔπρεσε θεσπεσίας κεφαλὰς δεινοῖο πελώρου."

