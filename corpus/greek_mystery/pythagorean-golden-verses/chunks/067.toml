[content]
body = "225 Αὐτὰρ Ἔρις στυγερὴ τέκε μὲν Πόνον ἀλγινόεντα Λήθην τε Λιμόν τε καὶ Ἄλγεα δακρυόεντα Ὑσμίνας τε Μάχας τε Φόνους τ᾽ Ἀνδροκτασίας τε Νείκεά τε ψευδέας τε Λόγους Ἀμφιλλογίας τε Δυσνομίην τ᾽ Ἀάτην τε, συνήθεας ἀλλήλῃσιν, 230 Ὅρκον θ᾽, ὃς δὴ πλεῖστον ἐπιχθονίους ἀνθρώπους πημαίνει, ὅτε κέν τις ἑκὼν ἐπίορκον ὀμόσσῃ.\n\nΝηρέα δ᾽ ἀψευδέα καὶ ἀληθέα γείνατο Πόντος, πρεσβύτατον παίδων· αὐτὰρ καλέουσι γέροντα, οὕνεκα νημερτής τε καὶ ἤπιος, οὐδὲ θεμιστέων 235 λήθεται, ἀλλὰ δίκαια καὶ ἤπια δήνεα οἶδεν· αὖτις δ᾽ αὖ Θαύμαντα μέγαν καὶ ἀγήνορα Φόρκυν Γαίῃ μισγόμενος καὶ Κητὼ καλλιπάρῃον Εὐρυβίην τ᾽ ἀδάμαντος ἐνὶ φρεσὶ θυμὸν ἔχουσαν."

