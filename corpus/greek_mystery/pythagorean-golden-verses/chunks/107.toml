[content]
body = "725 Τὸν πέρι χάλκεον ἕρκος ἐλήλαται· ἀμφὶ δέ μιν νὺξ τριστοιχεὶ κέχυται περὶ δειρήν· αὐτὰρ ὕπερθεν γῆς ῥίζαι πεφύασι καὶ ἀτρυγέτοιο θαλάσσης.\n\nἜνθα θεοὶ Τιτῆνες ὑπὸ ζόφῳ ἠερόεντι κεκρύφαται βουλῇσι Διὸς νεφεληγερέταο 730 [χώρῳ ἐν εὐρώεντι, πελώρης ἔσχατα γαίης.] Τοῖς οὐκ ἐξιτόν ἐστι.\n\nθύρας δ᾽ ἐπέθηκε Ποσειδέων χαλκείας, τεῖχος δὲ περοίχεται ἀμφοτέρωθεν.\n\nἜνθα Γύης Κόττος τε καὶ Ὀβριάρεως μεγάθυμος ναίουσιν, φύλακες πιστοὶ Διὸς αἰγιόχοιο."

