[content]
body = "Εἴπατε δ᾽, ὡς τὰ πρῶτα θεοὶ καὶ γαῖα γένοντο καὶ ποταμοὶ καὶ πόντος ἀπείριτος, οἴδματι θυίων, ἄστρα τε λαμπετόωντα καὶ οὐρανὸς εὐρὺς ὕπερθεν 110 οἵ τ᾽ ἐκ τῶν ἐγένοντο θεοί, δωτῆρες ἐάων ὥς τ᾽ ἄφενος δάσσαντο καὶ ὡς τιμὰς διέλοντο ἠδὲ καὶ ὡς τὰ πρῶτα πολύπτυχον ἔσχον Ὄλυμπον."

