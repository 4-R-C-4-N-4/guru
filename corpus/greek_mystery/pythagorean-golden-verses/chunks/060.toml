[content]
body = "160 Αἶψα δὲ ποιήσασα γένος πολιοῦ ἀδάμαντος τεῦξε μέγα δρέπανον καὶ ἐπέφραδε παισὶ φίλοισιν· εἶπε δὲ θαρσύνουσα, φίλον τετιημένη ἦτορ· «Παῖδες ἐμοὶ καὶ πατρὸς ἀτασθάλου, αἴ κ᾽ ἐθέλητε πείθεσθαι, πατρός κε κακὴν τισαίμεθα λώβην 165 ὑμετέρου· πρότερος γὰρ ἀεικέα μήσατο ἔργα.» Ὥς φάτο· τοὺς δ᾽ ἄρα πάντας ἕλεν δέος, οὐδέ τις αὐτῶν φθέγξατο.\n\nΘαρσήσας δὲ μέγας Κρόνος ἀγκυλομήτης ἂψ αὖτις μύθοισι προσηύδα μητέρα κεδνήν· «Μῆτερ, ἐγώ κεν τοῦτό γ᾽ ὑποσχόμενος τελέσαιμι 170 ἔργον, ἐπεὶ πατρός γε δυσωνύμου οὐκ ἀλεγίζω ἡμετέρου· πρότερος γὰρ ἀεικέα μήσατο ἔργα»."

