[content]
body = "735 Ἔνθα δὲ γῆς δνοφερῆς καὶ Ταρτάρου ἠερόεντος πόντου τ᾽ ἀτρυγέτοιο καὶ οὐρανοῦ ἀστερόεντος ἑξείης πάντων πηγαὶ καὶ πείρατ᾽ ἔασιν ἀργαλέ᾽ εὐρώεντα, τά τε στυγέουσι θεοί περ, χάσμα μέγ᾽, οὐδέ κε πάντα τελεσφόρον εἰς ἐνιαυτὸν 740 οὖδας ἵκοιτ᾽, εἰ πρῶτα πυλέων ἔντοσθε γένοιτο.\n\n[Ἀλλά κεν ἔνθα καὶ ἔνθα φέροι πρὸ θύελλα θυέλλῃ ἀργαλέη· δεινὸν δὲ καὶ ἀθανάτοισι θεοῖσι τοῦτο τέρας."

