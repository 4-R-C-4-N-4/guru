[content]
body = "Ταῦτά μοι ἔσπετε Μοῦσαι, Ὀλύμπια δώματ᾽ ἔχουσαι [ἐξ ἀρχῆς, καὶ εἴπαθ᾽, ὅ τι πρῶτον γένετ᾽ αὐτῶν.] 115 Ἦ τοι μὲν πρώτιστα Χάος γένετ᾽, αὐτὰρ ἔπειτα Γαῖ᾽ εὐρύστερνος, πάντων ἕδος ἀσφαλὲς αἰεὶ [ἀθανάτων, οἳ ἔχουσι κάρη νιφόεντος Ὀλύμπου, Τάρταρά τ᾽ ἠερόεντα μυχῷ χθονὸς εὐρυοδείης,] ἠδ᾽ Ἔρος, ὃς κάλλιστος ἐν ἀθανάτοισι θεοῖσι, 120 λυσιμελής, πάντων δὲ θεῶν πάντων τ᾽ ἀνθρώπων δάμναται ἐν στήθεσσι νόον καὶ ἐπίφρονα βουλήν.\n\nἘκ Χάεος δ᾽ Ἔρεβός τε μέλαινά τε Νὺξ ἐγένοντο· Νυκτὸς δ᾽ αὖτ᾽ Αἰθήρ τε καὶ Ἡμέρη ἐξεγένοντο, οὓς τέκε κυσαμένη Ἐρέβει φιλότητι μιγεῖσα."

