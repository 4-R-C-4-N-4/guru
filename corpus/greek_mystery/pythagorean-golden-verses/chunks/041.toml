[content]
body = "It admonishes us, therefore, rather to betake p.\n\n90 ourselves to scientific conceptions about intellectual objects, from which a most splendid and stable purity is produced about the eye of the soul, resulting from all intellectual conceptions and intelligibles, and the contemplation about these, and not from corporeal and sensible natures.\n\nFor we have frequently shown that these are in a continual flux and mutation, and do not in any manner subsist stably and similar to themselves, so as to sustain a firm and scientific apprehension and knowledge in the same manner as the objects of Intellectual vision.\n\nSYMBOL 26.\n\nBe not addicted to immoderate laughter.\n\nExplanation .--This Symbol shows that the passions are to be subdued, Recall, therefore, Into your memory right reason, and be not inflated with prosperity nor abject in calamity; being persuaded that no worthy attention takes place in either of these.\n\nBut this Symbol mentions laughter above all the passions, because this alone is most conspicuous, being, as it were, a certain efflorescence and inflammation of the disposition proceeding as far as to the face.\n\nPerhaps, too, p.\n\n91 it admonishes us to abstain from immoderate laughter, because laughter is the peculiarity of man with respect to other animals; and hence he is defined to be a risible animal.\n\nIt is shown, therefore, by this precept, that we should not firmly adhere to the human nature, but acquire by philosophizing am imitation of divinity to the utmost of our power; and withdrawing ourselves from this peculiarity of man, prefer the rational to the risible in the distinction and difference which we make of him with respect to other animals.\n\nSYMBOL 27.\n\nCut not your nails at a sacrifice.\n\nExplanation .--The exhortation of this Symbol pertains to friendship.\n\nFor of our relations and those allied to us by blood, the nearest of kin are brothers, children, and parents, who resemble those parts of our body which when taken away produce pain and mutilation by no means trifling; such as fingers, hands, ears, nostrils, and the like.\n\nBut others who are distantly related to us, such as the daughters of cousins, or the sons-in-law of uncles, or others of this p.\n\n92 kind, resemble those parts of our body from the cutting off of which no pain is produced; such as hair, nails, and the like.\n\nThe Symbol, therefore, wishing to indicate those relations who have been for a time neglected by us through the distance of their alliance, employs the word nails, and says: Do not entirely cast off these; but if at sacrifices, or any other time, you have neglected them, draw them to you, and renew your familiarity with them.\n\nSYMBOL 28.\n\nOffer not your right hand easily to everyone.\n\nExplanation .--The meaning of this Symbol is, Do not draw up, nor endeavour to raise, by extending your right hand, the unadapted and uninitiated.\n\nIt also signifies that the right hand is not to be given easily even to those who have for a long time proved themselves worthy of it through disciplines and doctrines, and the participation of continence, the quinquennial silence, 1 and other probationary trials.\n\np.\n\n93 SYMBOL 29.\n\nWhen rising from the bed-clothes, roll them together and obliterate the impression of the body.\n\nExplanation .--This Symbol exhorts that, having applied yourself to philosophy, in the next place you should familiarize yourself with intelligible and incorporeal natures.\n\nRising therefore from the sleep and nocturnal darkness of ignorance, draw off with you nothing corporeal to the daylight of philosophy, but purify and obliterate from your memory all the vestiges of that sleep of ignorance.\n\nSYMBOL 30.\n\nEat not the heart."

