[content]
body = "Γείνατο δ᾽ αὖ Κύκλωπας ὑπέρβιον ἦτορ ἔχοντας, Βρόντην τε Στερόπην τε καὶ Ἄργην ὀβριμόθυμον, 140 [οἳ Ζηνὶ βροντήν τε δόσαν τεῦξάν τε κεραυνόν.] Οἳ δή τοι τὰ μὲν ἄλλα θεοῖς ἐναλίγκιοι ἦσαν, μοῦνος δ᾽ ὀφθαλμὸς μέσσῳ ἐνέκειτο μετώπῳ.\n\n[Κύκλωπες δ᾽ ὄνομ᾽ ἦσαν ἐπώνυμον, οὕνεκ᾽ ἄρα σφέων κυκλοτερὴς ὀφθαλμὸς ἕεις ἐνέκειτο μετώπῳ·] 145 ἰσχὺς δ᾽ ἠδὲ βίη καὶ μηχαναὶ ἦσαν ἐπ᾽ ἔργοις.\n\nἌλλοι δ᾽ αὖ Γαίης τε καὶ Οὐρανοῦ ἐξεγένοντο τρεῖς παῖδες μεγάλοι τε καὶ ὄβριμοι, οὐκ ὀνομαστοί, Κόττος τε Βριάρεώς τε Γύης θ᾽, ὑπερήφανα τέκνα."

