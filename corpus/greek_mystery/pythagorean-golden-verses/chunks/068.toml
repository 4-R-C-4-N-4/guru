[content]
body = "Νηρῆος δ᾽ ἐγένοντο μεγήρατα τέκνα θεάων 240 πόντῳ ἐν ἀτρυγέτῳ καὶ Δωρίδος ἠυκόμοιο, κούρης Ὠκεανοῖο, τελήεντος ποταμοῖο, Πλωτώ τ᾽ Εὐκράντη τε Σαώ τ᾽ Ἀμφιτρίτη τε Εὐδώρη τε Θέτις τε Γαλήνη τε Γλαύκη τε Κυμοθόη Σπειώ τε Θόη θ᾽ Ἀλίη τ᾽ ἐρόεσσα 245 Πασιθέη τ᾽ Ἐρατώ τε καὶ Εὐνίκη ῥοδόπηχυς καὶ Μελίτη χαρίεσσα καὶ Εὐλιμένη καὶ Ἀγαυὴ Δωτώ τε Πρωτώ τε Φέρουσά τε Δυναμένη τε Νησαίη τε καὶ Ἀκταίη καὶ Πρωτομέδεια Δωρὶς καὶ Πανόπεια καὶ εὐειδὴς Γαλάτεια 250 Ἱπποθόη τ᾽ ἐρόεσσα καὶ Ἱππονόη ῥοδόπηχυς Κυμοδόκη θ᾽, ἣ κύματ᾽ ἐν ἠεροειδέι πόντῳ πνοιάς τε ζαέων ἀνέμων σὺν Κυματολήγῃ ῥεῖα πρηΰνει καὶ ἐυσφύρῳ Ἀμφιτρίτῃ, Κυμώ τ᾽ Ἠιόνη τε ἐυστέφανός"

