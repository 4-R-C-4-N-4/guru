body = "Sacred Texts Classics Index Previous Next p.\n\n37 THE SIMILITUDES OF DEMOPHILUS 1.\n\nFlattery is like painted armour, because it affords delight, but is of no use.\n\n2.\n\nLearning is similar to a golden crown; for it is both honourable and advantageous.\n\n3.\n\nFlighty men, like empty vessels, are easily laid hold of by the ears.\n\n1 4.\n\nLife, like a musical instrument, being harmonized by remission and intention, becomes more agreeable.\n\np.\n\n38 5.\n\nReason, like a good potter, introduces a beautiful form to the soul.\n\n6.\n\nThe intellect of wise men, like gold, possesses the greatest weight.\n\n7.\n\nBoasting, like gilt armour, is not the same within as without.\n\n8.\n\nReason has the same power as an ointment, for it benefits us when we are disordered, but delights us when well.\n\n9.\n\nOf a bad man, as of a bad dog, the silence is more to be dreaded than the voice.\n\n10.\n\nIt is neither becoming to prefer a mistress to a wife; nor flattery to a friend.\n\n11.\n\nGarrulous men, like magpies, by their continued loquacity destroy the pleasures of conversation.\n\n12.\n\nThe Furies pursue the sins of bad men who are impious, and those also of the stupid and daring, when they grow old.\n\n13.\n\nIt is necessary that a well-educated man should depart from life elegantly, as from a banquet.\n\n14.\n\nA port is a place of rest to a ship, but friendship, to life.\n\n15.\n\nThe reproof of a father is a pleasant medicine; for it is more advantageous than severe chastisements.\n\np.\n\n39 16.\n\nIt is necessary that a worthy man, like a good wrestler, should oppose his weight to fortune, when acting the part of an antagonist.\n\n17.\n\nThe possession of self-sufficiency, 1 like a short and pleasant road, has much grace and but little labour.\n\n18.\n\nRestive horses are led by the bridle, but irritable minds, by reasoning.\n\n19.\n\nTests, like salt, should be used sparingly.\n\n20.\n\nBoth a well-adapted shoe, and a well-harmonized life, are accompanied with but little pain.\n\n21.\n\nGarments reaching to the feet impede the body 2 ; and immoderate riches, the soul.\n\n22.\n\nTo those who run in the stadium, the reward of victory is in the end of the race; p.\n\n49 but to those who delight to labour in wisdom, the reward is in old age.\n\n23.\n\nIt is necessary that he who hastens to behold virtue as his country, should pass by pleasures, as he would by the sirens.\n\n24.\n\nAs those who sail in fair weather are wont to have things prepared against a storm, so also those who are wise in prosperity, should prepare things necessary for their assistance against adversity.\n\n25.\n\nGarments that are made clean and bright become soiled again by use; but the soul being once purified from ignorance, remains splendid forever.\n\n26.\n\nFugitive slaves, although they are not pursued, are affrighted; but the unwise suffer perturbation, although they have not yet acted badly.\n\n27.\n\nThe wealth of the avaricious, like the sun when it has descended under the earth, delights no living thing.\n\n28.\n\nThe fruits of the earth spring up once a year; but the fruits of friendship at all times.\n\n29.\n\nIt is the business of a musician to harmonize every instrument; but of a well-educated man to adapt himself harmoniously to every fortune.\n\np.\n\n41 30.\n\nNeither the blows of a sick man, nor the threats of a stupid one, are to be feared.\n\n31."

