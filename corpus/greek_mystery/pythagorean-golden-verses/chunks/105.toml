[content]
body = "Καῦμα δὲ θεσπέσιον κάτεχεν Χάος· εἴσατο δ᾽ ἄντα 700 ὀφθαλμοῖσιν ἰδεῖν ἠδ᾽ οὔασι ὄσσαν ἀκοῦσαι αὔτως, ὡς εἰ Γαῖα καὶ Οὐρανὸς εὐρὺς ὕπερθε πίλνατο· τοῖος γάρ κε μέγας ὑπὸ δοῦπος ὀρώρει τῆς μὲν ἐρειπομένης, τοῦ δ᾽ ὑψόθεν ἐξεριπόντος· τόσσος δοῦπος ἔγεντο θεῶν ἔριδι ξυνιόντων.\n\n705 Σὺν δ᾽ ἄνεμοι ἔνοσίν τε κονίην τ᾽ ἐσφαράγιζον βροντήν τε στεροπήν τε καὶ αἰθαλόεντα κεραυνόν, κῆλα Διὸς μεγάλοιο, φέρον δ᾽ ἰαχήν τ᾽ ἐνοπήν τε ἐς μέσον ἀμφοτέρων· ὄτοβος δ᾽ ἄπλητος ὀρώρει σμερδαλέης ἔριδος, κάρτος δ᾽ ἀνεφαίνετο ἔργων.\n\n710 Ἔκλίνθη δὲ μάχη· πρὶν δ᾽ ἀλλήλοις ἐπέχοντες ἐμμενέως ἐμάχοντο διὰ κρατερὰς ὑσμίνας."

