[content]
body = "545 Τὸν δ᾽ αὖτε προσέειπε Προμηθεὺς ἀγκυλομήτης ἦκ᾽ ἐπιμειδήσας, δολίης δ᾽ οὐ λήθετο τέχνης· Ζεῦ κύδιστε μέγιστε θεῶν αἰειγενετάων, τῶν δ᾽ ἕλε᾽, ὁπποτέρην σε ἐνὶ φρεσὶ θυμὸς ἀνώγει.\n\nΦῆ ῥα δολοφρονέων· Ζεὺς δ᾽ ἄφθιτα μήδεα εἰδὼς 550 γνῶ ῥ᾽ οὐδ᾽ ἠγνοίησε δόλον· κακὰ δ᾽ ὄσσετο θυμῷ θνητοῖς ἀνθρώποισι, τὰ καὶ τελέεσθαι ἔμελλεν.\n\nΧερσὶ δ᾽ ὅ γ᾽ ἀμφοτέρῃσιν ἀνείλετο λευκὸν ἄλειφαρ.\n\nΧώσατο δὲ φρένας ἀμφί, χόλος δέ μιν ἵκετο θυμόν, ὡς ἴδεν ὀστέα λευκὰ βοὸς δολίῃ ἐπὶ τέχνῃ.\n\n555 Ἐκ τοῦ δ᾽ ἀθανάτοισιν ἐπὶ χθονὶ φῦλ᾽ ἀνθρώπων καίουσ᾽ ὀστέα λευκὰ θυηέντων ἐπὶ βωμῶν."

