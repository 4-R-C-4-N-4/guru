[content]
body = "Καὶ γὰρ ὅτ᾽ ἐκρίνοντο θεοὶ θνητοί τ᾽ ἄνθρωποι 535 Μηκώνῃ, τότ᾽ ἔπειτα μέγαν βοῦν πρόφρονι θυμῷ δασσάμενος προέθηκε, Διὸς νόον ἐξαπαφίσκων.\n\nΤοῖς μὲν γὰρ σάρκας τε καὶ ἔγκατα πίονα δημῷ ἐν ῥινῷ κατέθηκε καλύψας γαστρὶ βοείῃ, τῷ δ᾽ αὖτ᾽ ὀστέα λευκὰ βοὸς δολίῃ ἐπὶ τέχνῃ 540 εὐθετίσας κατέθηκε καλύψας ἀργέτι δημῷ.\n\nΔὴ τότε μιν προσέειπε πατὴρ ἀνδρῶν τε θεῶν τε· Ἰαπετιονίδη, πάντων ἀριδείκετ᾽ ἀνάκτων, ὦ πέπον, ὡς ἑτεροζήλως διεδάσσαο μοίρας.\n\nὭς φάτο κερτομέων Ζεὺς ἄφθιτα μήδεα εἰδώς."

