[content]
body = "428 ᾮ δ᾽ ἐθέλει, μεγάλως παραγίγνεται ἠδ᾽ ὀνίνησιν· ἔν τε δίκῃ βασιλεῦσι παρ᾽ αἰδοίοισι καθίζει, 434 ἔν τ᾽ ἀγορῇ λαοῖσι μεταπρέπει, ὅν κ᾽ ἐθέλῃσιν· 430 ἠδ᾽ ὁπότ᾽ ἐς πόλεμον φθεισήνορα θωρήσσωνται ἀνέρες, ἔνθα θεὰ παραγίγνεται, οἷς κ᾽ ἐθέλῃσι νίκην προφρονέως ὀπάσαι καὶ κῦδος ὀρέξαι.\n\n433 Ἐσθλὴ δ᾽ αὖθ᾽ ὁπότ᾽ ἄνδρες ἀεθλεύωσιν ἀγῶνι, 435 ἔνθα θεὰ καὶ τοῖς παραγίγνεται ἠδ᾽ ὀνίνησιν· νικήσας δὲ βίῃ καὶ κάρτεϊ καλὸν ἄεθλον ῥεῖα φέρει χαίρων τε, τοκεῦσι δὲ κῦδος ὀπάζει.\n\nἘσθλὴ δ᾽ ἱππήεσσι παρεστάμεν, οἷς κ᾽ ἐθέλῃσιν."

