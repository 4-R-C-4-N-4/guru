[content]
body = "Ἔνθεν ἀπορνύμεναι, κεκαλυμμέναι ἠέρι πολλῇ, ἐννύχιαι στεῖχον περικαλλέα ὄσσαν ἱεῖσαι, 10 ὑμνεῦσαι Δία τ᾽ αἰγίοχον καὶ πότνιαν Ἥρην Ἀργεΐην, χρυσέοισι πεδίλοις ἐμβεβαυῖαν, κούρην τ᾽ αἰγιόχοιο Διὸς γλαυκῶπιν Ἀθήνην Φοῖβόν τ᾽ Ἀπόλλωνα καὶ Ἄρτεμιν ἰοχέαιραν ἠδὲ Ποσειδάωνα γαιήοχον, ἐννοσίγαιον, 15 καὶ Θέμιν αἰδοίην ἑλικοβλέφαρόν τ᾽ Ἀφροδίτην Ἥβην τε χρυσοστέφανον καλήν τε Διώνην Λητώ τ᾽ Ἰαπετόν τε ἰδὲ Κρόνον ἀγκυλομήτην Ἠῶ τ᾽ Ἠέλιόν τε μέγαν λαμπράν τε Σελήνην Γαῖάν τ᾽ Ὠκεανόν τε μέγαν καὶ Νύκτα μέλαιναν 20 ἄλλων τ᾽ ἀθανάτων ἱερὸν γένος αἰὲν ἐόντων.\n\nΑἵ νύ ποθ᾽ Ἡσίοδον καλὴν ἐδίδαξαν ἀοιδήν, ἄρνας ποιμαίνονθ᾽ Ἑλικῶνος ὕπο ζαθέοιο."

