[content]
body = "Ταῦτ᾽ ἄρα Μοῦσαι ἄειδον, Ὀλύμπια δώματ᾽ ἔχουσαι, 75 ἐννέα θυγατέρες μεγάλου Διὸς ἐκγεγαυῖαι, Κλειώ τ᾽ Εὐτέρπη τε Θάλειά τε Μελπομέενη τε Τερψιχόρη τ᾽ Ἐρατώ τε Πολύμνιά τ᾽ Οὐρανίη τε Καλλιόπη θ᾽· ἣ δὲ προφερεστάτη ἐστὶν ἁπασέων.\n\nἭ γὰρ καὶ βασιλεῦσιν ἅμ᾽ αἰδοίοισιν ὀπηδεῖ."

