[content]
body = "Ὥς δ᾽ αὔτως πάντεσσι διαμπερές, ὥς περ ὑπέστη, ἐξετέλεσσ᾽· αὐτὸς δὲ μέγα κρατεῖ ἠδὲ ἀνάσσει.\n\nΦοίβη δ᾽ αὖ Κοίου πολυήρατον ἦλθεν ἐς εὐνήν· κυσαμένη δὴ ἔπειτα θεὰ θεοῦ ἐν φιλότητι 405 Λητὼ κυανόπεπλον ἐγείνατο, μείλιχον αἰεί, μείλιχον ἐξ ἀρχῆς, ἀγανώτατον ἐντὸς Ὀλύμπου, 408 ἤπιον ἀνθρώποισι καὶ ἀθανάτοισι θεοῖσιν.\n\n407 Γείνατο δ᾽ Ἀστερίην ἐυώνυμον, ἥν ποτε Πέρσης ἠγάγετ᾽ ἐς μέγα δῶμα φίλην κεκλῆσθαι ἄκοιτιν.\n\n410 Ἤ δ᾽ ὑποκυσαμένη Ἑκάτην τέκε, τὴν περὶ πάντων Ζεὺς Κρονίδης τίμησε· πόρεν δέ οἱ ἀγλαὰ δῶρα, μοῖραν ἔχειν γαίης τε καὶ ἀτρυγέτοιο θαλάσσης.\n\nἭ δὲ καὶ ἀστερόεντος ἀπ᾽ οὐρανοῦ ἔμμορε τιμῆς ἀθανάτοις τε θεοῖσι τετιμένη ἐστὶ μάλιστα."

