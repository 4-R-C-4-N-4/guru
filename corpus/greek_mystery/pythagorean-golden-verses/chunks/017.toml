[content]
body = "39:2 Long garments or robes, both by ancients and moderns, have always been worn as marks of distinction; consequently, like riches, they are among the objects of desire; and although not so extensively pernicious, yet the philosopher very properly places them among things that are by no means free from danger; and which are neither to be embraced by everyone, nor without the greatest caution.\n\nNext: Pythagorean Ethical Sentences from Stobæus"

