[content]
body = "Αὐτὰρ ἐπεὶ δή μιν δάμασεν πληγῇσιν ἱμάσσας, ἤριπε γυιωθείς, στενάχιζε δὲ γαῖα πελώρη.\n\nΦλὸξ δὲ κεραυνωθέντος ἀπέσσυτο τοῖο ἄνακτος οὔρεος ἐν βήσσῃσιν Ἀίτνης παιπαλοέσσῃς, 860 πληγέντος.\n\nΠολλὴ δὲ πελώρη καίετο γαῖα ἀτμῇ θεσπεσίῃ καὶ ἐτήκετο κασσίτερος ὣς τέχνῃ ὕπ᾽ αἰζηῶν ἐν ἐυτρήτοις χοάνοισι θαλφθείς, ἠὲ σίδηρος, ὅ περ κρατερώτατός ἐστιν, οὔρεος ἐν βήσσῃσι δαμαζόμενος πυρὶ κηλέῳ 865 τήκεται ἐν χθονὶ δίῃ ὑφ᾽ Ἡφαιστου παλάμῃσιν.\n\nὭς ἄρα τήκετο γαῖα σέλαι πυρὸς αἰθομένοιο.\n\nῬῖψε δέ μιν θυμῷ ἀκαχὼν ἐς Τάρταρον εὐρύν."

