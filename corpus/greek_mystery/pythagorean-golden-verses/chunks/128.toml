[content]
body = "Κάδμῳ δ᾽ Ἁρμονίη, θυγάτηρ χρυσέης Ἀφροδιτης, 975 Ἰνὼ καὶ Σεμέλην καὶ Ἀγαυὴν καλλιπάρῃον Αὐτονόην θ᾽, ἣν γῆμεν Ἀρισταῖος βαθυχαίτης, γείνατο καὶ Πολύδωρον ἐυστεφάνῳ ἐνὶ Θήβῃ.\n\n[Κούρη δ᾽ Ὠκεανοῦ, Χρυσάορι καρτεροθύμῳ μιχθεῖσ᾽ ἐν φιλότητι πολυχρύσου Ἀφροδίτης, 980 Καλλιρόη τέκε παῖδα βροτῶν κάρτιστον ἁπάντων, Γηρυονέα, τὸν κτεῖνε βίη Ἡρακληείη βοῶν ἕνεκ᾽ εἰλιπόδων ἀμφιρρύτῳ εἰν Ἐρυθείῃ.] Τιθωνῷ δ᾽ Ἠὼς τέκε Μέμνονα χαλκοκορυστήν, Αἰθιόπων βασιλῆα, καὶ Ἠμαθίωνα ἄνακτα.\n\n985 Αὐτὰρ ὑπαὶ Κεφάλῳ φιτύσατο φαίδιμον υἱόν, ἴφθιμον Φαέθοντα, θεοῖς ἐπιείκελον ἄνδρα."

