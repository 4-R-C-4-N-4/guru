[content]
body = "Explanation .--This Symbol signifies that it is not proper to divulse the union and consent of the universe.\n\nAnd still further it signifies this, Be not envious, but philanthropic and communicative; and from this it exhorts us to philosophize.\n\nFor philosophy alone among the sciences and arts is neither pained with the goods of others, nor rejoices in evils of neighbours, these being allied and p.\n\n94 familiar by nature, subject to the like passions, and exposed to one common fortune; and evinces that all men are equally incapable of foreseeing future events.\n\nHence it exhorts us to sympathy and mutual love, and to be truly communicative, as it becomes rational animals.\n\nSYMBOL 31.\n\nEat not the brain.\n\nExplanation .--This Symbol also resembles the former; for the brain is the ruling instrument of intellectual prudence.\n\nThe Symbol, therefore, obscurely signifies that we ought not to dilacerate nor mangle things and dogmas which have been the objects of judicious deliberation.\n\nBut these will be such as have been the subject of intellectual consideration, becoming thus equal to objects of a scientific nature.\n\nFor things of this kind are to be surveyed, not through the instruments of the irrational form of the soul, such as the heart and the liver; but through the pure rational nature.\n\nHence to dilacerate these by opposition, is inconsiderate folly; but the Symbol rather exhorts p.\n\n95 us to venerate the fountain of intelligence and the most proximate organ of intellectual perception, through which we shall possess contemplation, science, and wisdom; and by which we shall truly philosophize, and neither confound nor obscure the vestiges which philosophy produces.\n\nSYMBOL 32.\n\nIndignantly turn from your excrements and the parings of your nails.\n\nExplanation .--The meaning of this Symbol is as follows: Despise things which are connascent with you, and which in a certain respect are more destitute of soul, since things which are more animated are more honourable.\n\nThus also when you apply yourself to philosophy, honour the things which are demonstrated through soul and intellect without sensible instruments, and through contemplative science, but despise and reject things which are opined merely through the connascent instruments of sense without intellectual light, and which are by no means able to acquire the perpetuity of intellect.\n\np.\n\n96 SYMBOL 33.\n\nReceive not Erythinus.\n\n1 Explanation .--This Symbol seems to be merely referred to the etymology of the name.\n\nReceive not an unblushing and impudent man, nor on the contrary one stupidly astonished, and who in everything blushes and is humble in the extreme through the imbecility of his intellect and dianötic 2 power.\n\nHence this also is understood: Be not yourself such a one.\n\nSYMBOL 34.\n\nObliterate the mark of the pot from the ashes.\n\nExplanation .--This Symbol signifies, that he who applies himself to philosophy should consign to oblivion the confusion and grossness which subsists in corporeal and sensible demonstrations, and that he should rather use such as are conversant with intelligible objects.\n\nBut ashes are here assumed instead of the dust in the tables, in p.\n\n97 which the Pythagoreans completed their demonstrations.\n\n1 SYMBOL 35.\n\nDraw not near to that which has gold, in order to produce children.\n\nExplanation .--The Symbol does not here speak of a woman, but of that sect and philosophy which has much of the corporeal in it, and a gravitating tendency downwards.\n\nFor gold is the heaviest of all things in the earth, and pursues a tendency to the middle, which is the peculiarity of corporeal weight; but the term to draw near not only signifies to be connected with, but always to approach towards, and be seated near, another.\n\nSYMBOL 36."

