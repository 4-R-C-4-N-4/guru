body = "1.\n\nYea, I will speak forth; hear ye; now listen, ye who from near, and ye who from afar have come seeking 1 (the knowledge).\n\nNow ponder 2 ye clearly all 3 (that concerns) him 4 .\n\nNot for a second time shall the false teacher slay our life (of the mind, or the body).\n\nThe wicked is hemmed in with his faith and his tongue!\n\n5 2.\n\nYea, I will declare the world's two first 6 spirits, of whom the more bountiful thus spake to the harmful 7 : Neither our thoughts, nor commands, nor our p.\n\n126 understandings, nor our beliefs, nor our deeds, nor our consciences, nor our souls, are at one 1 .\n\n3.\n\nThus I will declare this world's first 2 (teaching), that which the all-wise Mazda Ahura hath told me.\n\nAnd they among you who will not so fulfil and obey this Mãthra, as I now shall conceive and declare it, to these shall the end of life (issue) in woe.\n\n4.\n\nThus I will declare forth this world's best (being).\n\nFrom (the insight of His) Righteousness Mazda, who hath appointed these (things) 3 , hath known (what He utters to be true; yea, I will declare) Him the father of the toiling Good Mind (within us).\n\nSo is His p.\n\n127 daughter through good deeds (our) Piety.\n\nNot to be deceived is the all-viewing 1 Lord.\n\n5.\n\nYea, thus I will declare that which the most bountiful One told me, that word which is the best to be heeded by mortals.\n\nThey who therein grant me obedient 2 attention, upon them cometh Weal to bless, and the Immortal being, and in the deeds of His Good Mind cometh the Lord.\n\n6.\n\nAye, thus I will declare forth Him who is 3 of all the greatest, praising through my Righteousness, I who do aright, those who (dispose of all as well aright).\n\nLet Ahura Mazda hear with His bounteous spirit, in whose homage (what I asked) was asked 4 with the Good Mind.\n\nAye, let Him exhort me through His wisdom (which is ever) the best.\n\n7.\n\n(Yea, I will declare Him) whose blessings the offerers will seek for, those who are living now, as well as those who have lived (aforetime), as will they p.\n\n128 also who are coming 1 (hereafter.\n\nYea, even) the soul(s) of the righteous (will desire) them in the eternal 2 Immortality.\n\n(Those things they will desire which are blessings to the righteous) but woes to the wicked.\n\nAnd these hath Ahura Mazda (established) through His kingdom, He, the creator (of all).\n\n8.\n\nHim in our hymns of homage and of praise would I faithfully serve, for now with (mine) eye, I see Him clearly, Lord of the good spirit 3 , of word, and action, I knowing through my Righteousness Him who is Ahura Mazda.\n\nAnd to Him (not here alone, but) in His home of song 4 , His praise we 5 shall bear.\n\n9.\n\nYea, Him with our better Mind we seek to honour, who desiring (good), shall come to us (to bless) in weal and sorrow 6 .\n\nMay He, Ahura Mazda, make us 7 vigorous through Khshathra's royal power, p.\n\n129 our flocks and men in thrift to further, from the good support and bearing 1 of His Good Mind, (itself born in us) by His Righteousness.\n\n10."

