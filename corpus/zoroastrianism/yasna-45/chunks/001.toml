body = "Sacred Texts Zoroastrianism Index Previous Next Buy this Book at Amazon.com The Zend Avesta, Part III (SBE31) , L.H.\n\nMills, tr.\n\n[1886], at sacred-texts.com p.\n\n122 YASNA XLV.\n\nTHE DOCTRINE OF DUALISM.\n\nHOMAGE TO AHURA.\n\nThis hymn bears fewer traces of a fragmentary condition than others.\n\nIt recalls Y.\n\nXXX, and, like it, appears to belong to a period, or to an interval, of political repose and theological activity.\n\nIt is smoother and more artificial than is usual, and it goes straight on its way from beginning to end.\n\nA powerful adversary had just been crushed.\n\nIt was the du s sasti of Y.\n\nXXXII, 9.\n\nThis may well have been the result of the conflict alluded to in Y.\n\nXLIV, 15, 16, and possibly in Y.\n\nLI, 9, 10, also urged on by the fierce Y.\n\nXXXI, 18 probably often repeated in lost hymns.\n\nAn assembly is addressed as in Y.\n\nXXX, 1, but this time as coming 'from near and from far.' It may very possibly have been the winning side in a late struggle.\n\nThe first verse sounds like a congratulation.\n\nIt might be said to be intended to be sung, if not shouted, to a multitude whose outskirts were by no means within easy reach with the voice.\n\nAt all events attention is summoned with three differing expressions.\n\n'Awake your ears to the sound,' literally 'sound ye,' in a receptive sense; ('let the sound peal in your ears'), then 'listen' (sraotâ); and then 'ponder' (mãzd a unghôdûm).\n\n'The Antizarathu s tra, the evil teacher par eminence, has been defeated,' he declares, 'and he will never again destroy the peace of our lives (Y.\n\nXXXII, 9, 11).\n\nHis evil creed has been silenced, and his tongue can no longer shout out its periods of persuasion or invective (Y.\n\nXXXI, 12) beside our preachers.' 2.\n\nHe then reiterates the chief doctrine for which the parties had been at war, and which they should now see clearly in the light of their victory.\n\n'The foul evils of society do not lie within the control of the holy Ahura in such a manner as that he either originates, or tolerates them.\n\n' They are, on the contrary, the product of the personified Anger of the Daêvas, the Mainyu in its evil sense, the Angra (angry?) Spirit.\n\nBetween this being, or personified abstraction, and Ahura, there is a gulf fixed.\n\n(Never do we see any aspersions upon Ahura's name, or a suspicion of His purity as shown by complicity with cruelty, or the toleration of evil passions.) It is also to be noted that the defeated du s sasti may have possibly been a Daêva-worshipper chiefly as being a heretic from this Faith p.\n\n123 of Ahura, believing Him to be implicated in the creation, or permission of sin and suffering, or, if the burial or burning of the dead was forbidden at this time, then possibly a heretic on these questions also.\n\nBut yet, as a recreant Mazda-worshipper he may have claimed a rightful allegiance to the urvâtâ, and the future blessings, as well as temporal advantages, involved in a correct discipleship; and so he may have used the name of the sacred tenets of the Religion itself to help on a nefarious warfare."

