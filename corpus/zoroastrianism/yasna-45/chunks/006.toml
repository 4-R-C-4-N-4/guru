[content]
body = "Otherwise I would render 'there is furtherance,' comparing afrashîma n tô.\n\n128:1 Bvai n ti k â (sic) seems, as elsewhere, to express 'those who are becoming.' 128:2 The Pahlavi uniformly errs, or is strangely free, with this word.\n\nThe sense 'continuous' is here admirably adapted.\n\n128:3 This word seems evidently used almost in a modern sense of 'character,' 'disposition.' Elsewhere we are in doubt whether to refer it to the Speni s ta Mainyu of Ahura, or to Ahura Himself.\n\n128:4 Paradise; possibly 'home of sublimity.' 128:5 The change from singular to plural is frequent.\n\nNer.\n\nvaries from the Pahlavi in the last verse, improving upon it: Evam tasmai pra n âmam antar Garothmâne nidadâmahe.\n\nThis was probably an intentional improvement, as the Persian MS.\n\nfollows our Pahlavi text.\n\nHis MS.\n\nof the Pahlavi probably read barâ yehabûnd.\n\n128:6 Or, 'who has created weal and sorrow for us with good intention, (and as our discipline);' but this is hardly probable.\n\nAhura did not originate evil.\n\nSp e n k â, asp e n k â are used adverbially (see Y.\n\nXXXIV, 7).\n\n128:7 I hardly agree to reading verez e ny a u (sic) here in the sense of 'homes.' The meaning is 'endow us with efficiency' in the pursuit of the objects mentioned in the context.\n\nOr 'the propitiation and p.\n\n129 reverential honour' may have been more directly in the composer's mind; 'may He endow our (worship) with efficiency that it may accomplish its desired result.' See the positions of the words.\n\nThe Pahlavi translation also bears witness to the rendering above, with its erroneous or free varzî d âr ayŏ lanman.\n\n129:1 As it is impossible for those who have studied the subject to believe that the Pahlavi translator did not know the meaning of amavandîh in Zend, we must suppose him to have had some form like hazah before him instead of huzã(thwâ t ).\n\n129:2 The Pahlavi translator, rendering this word in the two other places by pavan astûbîh, had evidently some reason for seeing a form of nãman here.\n\nThe natural conclusion is that his MS.\n\nread differently in this place.\n\nNer.\n\nrenders him appropriately.\n\n129:3 Dãn looks like an accusative infinitive here (Bartholomae); otherwise the two verbs must be regarded as having indefinite pronouns understood, 'one assigns,' and 'they grant.' 129:4 I cannot see the applicability of Agni's title 'house-lord' here; compare dá m supatnî as adj.\n\nreferring to páti.\n\n130:1 He who despised the Daêvas, they returning the contempt is probably the same person expressed by the two hôi in the previous verse.\n\nIt is therefore Ahura, but the words which mean friend, brother, father, are grammatically connected with y e —mainyâtâ.\n\nthe one who reverenced Ahura.\n\nThe expression 'father' gives a strong impression that Ahura is referred to, notwithstanding the vocative.\n\nParticularly as we have father in verse 4.\n\nThe word 'brother,' however, inclines one to the more closely grammatical view.\n\nNext: Yasna XLVI"

