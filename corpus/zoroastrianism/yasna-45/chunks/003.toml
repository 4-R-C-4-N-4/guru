[content]
body = "Zarathu s tra (or his substitute) then professes his eagerness to serve the Lord with these words which he had called the 'greatest,' and because he had seen Him with his very eyes, which he explains as meaning that he had known Him through the Righteous Order in his soul, and therefore he prays and hopes to pronounce these greatest praises, not in the assembly (Y.\n\nLI, 3) alone, but in the 'Home of sublimity or song' (Y.\n\nL, 4).\n\n9.\n\nAnd he desires all the more fervently to do homage to Ahura, because He approaches him with the Power of His divine Authority in weal or woe, blessing both men and herds so long as they multiplied under the influences of Piety.\n\n10.\n\nAs the praises were the 'greatest,' so he seeks to 'magnify' the Lord in the Yasnas of Âramaiti, Ahura being renowned by His unchanging purpose, for He will bestow the 'eternal two' in His holy Kingdom, when it shall have been made firm!\n\n11.\n\nYea, he would seek to magnify Him who contemns the Daêvas and their party as much as they, in their turn, profess to make little of Him and His religious Kingdom, contrasted as they were with Ahura's prophet, who honoured Him in the holy Insight, the Daêna of the Saoshya n t.\n\nAnd this Saoshya n t is declared to be the controlling master of every faithful worshipper, and he, or the faithful venerator of the reviled Ahura, is also as our friend, brother, nay, like Ahura Himself (verse 4), our very Father in the Faith.\n\np.\n\n125 Translation.\n\n1.\n\nYea, I will speak forth; hear ye; now listen, ye who from near, and ye who from afar have come seeking 1 (the knowledge).\n\nNow ponder 2 ye clearly all 3 (that concerns) him 4 .\n\nNot for a second time shall the false teacher slay our life (of the mind, or the body).\n\nThe wicked is hemmed in with his faith and his tongue!\n\n5 2.\n\nYea, I will declare the world's two first 6 spirits, of whom the more bountiful thus spake to the harmful 7 : Neither our thoughts, nor commands, nor our p.\n\n126 understandings, nor our beliefs, nor our deeds, nor our consciences, nor our souls, are at one 1 .\n\n3.\n\nThus I will declare this world's first 2 (teaching), that which the all-wise Mazda Ahura hath told me.\n\nAnd they among you who will not so fulfil and obey this Mãthra, as I now shall conceive and declare it, to these shall the end of life (issue) in woe.\n\n4.\n\nThus I will declare forth this world's best (being).\n\nFrom (the insight of His) Righteousness Mazda, who hath appointed these (things) 3 , hath known (what He utters to be true; yea, I will declare) Him the father of the toiling Good Mind (within us).\n\nSo is His p.\n\n127 daughter through good deeds (our) Piety.\n\nNot to be deceived is the all-viewing 1 Lord.\n\n5.\n\nYea, thus I will declare that which the most bountiful One told me, that word which is the best to be heeded by mortals.\n\nThey who therein grant me obedient 2 attention, upon them cometh Weal to bless, and the Immortal being, and in the deeds of His Good Mind cometh the Lord.\n\n6."

