[content]
body = "Aye, thus I will declare forth Him who is 3 of all the greatest, praising through my Righteousness, I who do aright, those who (dispose of all as well aright).\n\nLet Ahura Mazda hear with His bounteous spirit, in whose homage (what I asked) was asked 4 with the Good Mind.\n\nAye, let Him exhort me through His wisdom (which is ever) the best.\n\n7.\n\n(Yea, I will declare Him) whose blessings the offerers will seek for, those who are living now, as well as those who have lived (aforetime), as will they p.\n\n128 also who are coming 1 (hereafter.\n\nYea, even) the soul(s) of the righteous (will desire) them in the eternal 2 Immortality.\n\n(Those things they will desire which are blessings to the righteous) but woes to the wicked.\n\nAnd these hath Ahura Mazda (established) through His kingdom, He, the creator (of all).\n\n8.\n\nHim in our hymns of homage and of praise would I faithfully serve, for now with (mine) eye, I see Him clearly, Lord of the good spirit 3 , of word, and action, I knowing through my Righteousness Him who is Ahura Mazda.\n\nAnd to Him (not here alone, but) in His home of song 4 , His praise we 5 shall bear.\n\n9.\n\nYea, Him with our better Mind we seek to honour, who desiring (good), shall come to us (to bless) in weal and sorrow 6 .\n\nMay He, Ahura Mazda, make us 7 vigorous through Khshathra's royal power, p.\n\n129 our flocks and men in thrift to further, from the good support and bearing 1 of His Good Mind, (itself born in us) by His Righteousness.\n\n10.\n\nHim in the Yasnas of our Piety we seek to praise with homage, who in His persistent energy 2 was famed to be (in truth) the Lord Ahura Mazda, for He hath appointed in His kingdom, through His holy Order and His Good Mind, both Weal and Immortality, to grant 3 the eternal mighty pair to this our land (and the creation).\n\n11.\n\n(Him would we magnify and praise) who hath despised the Daêva-gods and alien men, them who before held Him in their derision.\n\nFar different are (these) from him who gave Him honour.\n\nThis latter one is through the Saoshya n t's bounteous Faith, who likewise is the Lord of saving power 4 , p.\n\n130 a friend, brother, or a father to us, Mazda Lord 1 !\n\nFootnotes 125:1 Ish means 'to come seeking.' The bavîhûnê d of the Pahlavi, followed by many, is by no means incorrect.\n\n125:2 The reading mãzd a unghôdûm was suggested to me by Dr.\n\nAurel Stein previously (as I believe) to its announcement elsewhere.\n\nBefore this the indication of the Pahlavi (which always hesitates to change a MS.\n\nregarded at the time as sacred) had been followed by all with its necessary error.\n\n125:3 The ' e ' in k ithr e must represent a nasalised vowel, as in m e hmaidî.\n\n125:4 Îm may be merely a particle.\n\n125:5 I would here strongly insist upon an alternative rendering in the sense of the Pahlavi.\n\nThe rendering above is given on principle.\n\nA text should never be changed, if it is possible to render it as it is."

