[content]
body = "Read, 'the wicked confessing (varetô, active sense) evil beliefs with his tongue.' The Pahlavi has zaka s sarîtar kâmakŏ va zaka s darvandîh pavan hûzvânŏ hêmnunê d .\n\nMany, with this view, would at once read varetâ without MSS.\n\n125:6 Observe the peculiar pouruyê (pourviyê, if not a locative), the two first things, principles, forces; so in Y.\n\nXXX, 3.\n\n125:7 Notice that vahyô akem k â (in Y.\n\nXXX, 3) necessarily apply to the mainyû, and not only because, as nominatives, the words fall to the end of the sentence.\n\nHere we have analogous adjectives applied unmistakably to the two.\n\nThe neuters correspond with vahi s tem manô and a k i s tem manô, and are of capital importance as p.\n\n126 expressing that abstract conception which renders the Gâthas so much more impressive as the earliest documents of their kind.\n\n126:1 The Pahlavi thus glosses: I do not think what thou thinkest, [for I think what is pious, and thou thinkest what is impious]; nor our teachings, [for I teach what is pious, and thou, what is impious]—nor our religions, for mine is the Gâthic, and thine that of the sorcerer; nor our souls, [for he who takes his stand on my religion, and he who takes his stand on thy religion, are apart; their souls do not occupy the same position].\n\nNer.: na k a dînih [yato me dîni h gâthabhavâ te k a râkshasî*].\n\n126:2 The 'first teaching' was a prominent idea with the Zarathu s trians.\n\nZ.\n\nis called in the later Avesta the paoiryô t kaêsha (sic).\n\nHe hardly plays the rôle of a reformer in the Avesta.\n\nHe is mentioned after others chronologically, not as repudiating them.\n\nHe might better be termed reviver.\n\nYãm is difficult; perhaps daênãm is to be understood, or y e m (mãthrem) read; see verse 4, angh e u s ahyâ vahi s tem.\n\nNeither pourvîm nor vahi s tem are adverbs.\n\n126:3 Some change the text here to another which corresponds to some of the terms better.\n\nIt should, however, first be rendered as it stands; the obscurities may well be owing to idiosyncrasy it the composer; possibly also to an affectation of obscurity (or 'dark speech').\n\nHow can Mazda be said to 'know Himself?' or how could any but Ahura be spoken of as 'the Father of Vohu Manah and Âramaiti?' He recognised Himself as having generated V.\n\nM.\n\nand Â.\n\nHe was conscious of the completed relation.\n\n127:1 Hishas looks irresistibly like a nom.\n\nsing., but may it not be a nom.\n\nactoris from the redup.\n\nroot?\n\nCompare hîshasa t (although the Pahlavi renders with a different cast of meaning).\n\nWhat Indian word to compare here is hard to say.\n\nI prefer Bartholomae's earlier view (as to the meaning) with the Pahlavi harvispŏ nikîrî d ar.\n\nBy dropping the later glosses, the sense of the Pahlavi comes out as usual, much closer to the Gâtha."

