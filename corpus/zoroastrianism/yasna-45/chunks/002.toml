[content]
body = "In fact he may have been a self-styled Mazda-worshipper, but not of 'Zarathu s tra's order,' not owned at all in any degree by the genuine adherents, and met as a real, if not an open, Daêva-worshipper.\n\nThe ardent prophet therefore declares the utter severance between the good and the evil, the God and the Demon.\n\nIt is a popular corollary to Y.\n\nXXX, 3-6.\n\nThe two spirits came together indeed at first to make life, and its negation, and they co-operate, if such a term can be applied to an irreconcilable antagonism out of whose antitheses and friction sentient existence alone becomes possible.\n\nTheir union consists in opposition, for if they blend, they each cease to be what they are.\n\nThey are, while upholders of existence, yet separate for ever, and that as to every attribute and interest.\n\n3.\n\nAnd the sage goes on to assert that in this he is proclaiming the first Mãthra of this life which the all-wise Mazda had revealed to him.\n\nAnd, whether sure of the victorious masses before him, or whether on the contrary perfectly aware that many a group among them had been more convinced by the snaitha i s than by reason, he presses at once upon them that one terrible doctrine which seems unfortunately too needful for all successful and sudden propagandism, and he declares that they who do not act in a manner accordant with what he speaks, and even thinks, (having formerly announced it), to such delinquents this life should end in woe.\n\n4.\n\nProceeding in a happier vein, he then dwells upon the fatherhood of God.\n\nHe will declare this world's best being who is Mazda Himself.\n\nHe is the father of the Good Mind within His people, when that Good Mind is active in good works.\n\nSo our piety, when it is practical, is His daughter, for no pretended good intention can claim relationship with Him, nor can any idle sentiment.\n\nHe needs the ' ready mind' within His servant, and He is not to be deceived (compare Y.\n\nXLIII, 6).\n\n5.\n\nReturning once more to the Mãthra, and this time to hold out rewards rather than to utter threats, he declares that Happiness and Immortality would be the portion of those who listened to, and p.\n\n124 pondered his revelation, and that Ahura Himself would likewise approach them with the rewarding actions of His Good Mind, for Ahura was also in all good actions on the one hand, just as His Immortal Archangels on the other had their objective existence likewise in the believer's soul.\n\n6.\n\nTurning from admonition to worship, he announces, not what he terms the 'first' (verse 3), nor the 'best' (verses 4 and 5), but the 'greatest,' element of all, implying that praise, which he now expresses, includes both prayer and doctrinal confessions, and he calls on Ahura both to listen and to teach.\n\n7.\n\nIt is the 'greatest' element indeed, for it concerns those spiritual blessings which not only the offerers who are now living will seek after, but those also who shall live in future; nay, even the spirits of the just desire them in the eternal Immortality.\n\nAnd these blessings are, according to a well-remembered law, woe to the wicked, and that, not only from outward discipline, but from inward grief.\n\nAnd Ahura had established, so he adds, the beneficent, but, as regards the wicked, still solemn regulations by the exercise of His Sovereign Power as the controller of all (Y.\n\nXXIX, 4).\n\n8."

