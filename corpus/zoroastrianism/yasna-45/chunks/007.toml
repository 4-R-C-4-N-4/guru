[content]
body = "It is therefore Ahura, but the words which mean friend, brother, father, are grammatically connected with y e —mainyâtâ.\n\nthe one who reverenced Ahura.\n\nThe expression 'father' gives a strong impression that Ahura is referred to, notwithstanding the vocative.\n\nParticularly as we have father in verse 4.\n\nThe word 'brother,' however, inclines one to the more closely grammatical view.\n\nNext: Yasna XLVI"

