body = "104 give the contending 1 throngs(?), as a blessing 2 , (Your) spiritual gifts (of certainty and peace).\n\n13.\n\nThus I conceived of Thee as bounteous, O Ahura Mazda!\n\nwhen with Thy Good Mind (Sraosha, Obedience) approached me.\n\n(And I would therefore pray thus of Thee, that bounteous one.) In order that I may make known to men the true and sacred aims of their desires (in the rite or daily toil), grant Ye me long life 3 for this, (that blessing 4 ) which none with daring may extort 5 from You, even this (gift) of that desired 6 place which has been declared to be within Thy Realm.\n\n14.\n\nYea, as the man enlightened 7 (in Thy law), and who has possessions, gives to his friend, (so give Ye) me, O Great Creator 8 !\n\nThy rejoicing and p.\n\n105 abounding grace, when through Thy sovereign Power, and from (the motives of Thy cause of) Righteous Order, I stand forth 1 to go out to 2 , or to arouse, the chiefs 3 of Thy (pure) proclamation, with all those (others) who recite Thy well-remembered 4 Mãthra word.\n\n15.\n\nYea, I conceived of Thee as bounteous, O Ahura Mazda!\n\nwhen with the Good Mind's grace Thy Sraosha (Obedience) approached me, (and said): Let the quiet and long-enduring better mind with understanding teach (thee); let not a foremost 5 man p.\n\n106 conciliate the wicked (as sycophant desiring aid), for with that (quiet mind of faith), Thy saints have brought full many a sinner unto Thee (as convert, and in penitence 1 ).\n\n16.\n\nThus, O Ahura Mazda!\n\nthis Zarathu s tra loves 2 the Spirit 3 , and every man most bounteous prays 4 (beside him): Be Righteousness life-strong, and clothed with body.\n\nIn that (holy) Realm which shines (with splendour) as the sun, let Piety be present; and may she through the indwelling of Thy Good Mind give us blessings in reward for deeds 5 !\n\nFootnotes 95:1 Anaêshem manô, anaêshem va k ô, anaêshem s kyaothnem prove that the thought, word, and deed referred to were not limited to a ritual meaning.\n\n98:1 Ahmâi as = to us, does not seem to be good grammar here, as it necessitates a forced separation between it and yahmâikahmâi k î t .\n\nCp.\n\nahmâi yahmâi-kahmâi k î t in Y.\n\nXLIV, 16.\n\n98:2 I turn from the fine rendering of the Pahlavi with the greatest reluctance: Nadû k valman mûn zak î valman nadûkîh ka d ârzâî [aîgh ka d ârzâî an s utâ min nadûkîh î valman nadûkîh], happy is he whose benefit is for every one; [that is, for every man there is happiness from his benefit]; Ner.\n\nfollows.\n\n98:3 There is a question whether the particle ga t (gha t ?) may not have originated from gâ t .\n\nBarth.\n\nhere follows the Pahlavi, reading gatôi (?) = pavan yâmtûni s nŏ.\n\nLak may have been added, as often, to serve as an alternative rendering."

