body = "105:5 The rendering pourû s (?) as=pl.\n\nof pûrús is attractive, but dregvatô hardly needs, and seldom has, a substantive.\n\nThe wicked = wicked men; and, on the other hand, nâ constantly claims an accompanying word; (nâ ismanô; nâ vaêdemnô; hvô nâ-erethwô; nâ spe n tô, y e -nâ, k e vâ-nâ, &c.) Also it is improbable that the words nâ and pourû s , as = pûrávas, should come together; 'let not a man men evil ingratiate (?).' Compare for sense here purviâs in one or more of its applications.\n\nPossibly the meaning is, 'let not a man be foremost in conciliating the wicked.' The Pahlavi likewise has kabed (freely).\n\nNer.\n\nhas: Mâ nara h * pra k ura m durgatinâm bhûyât* yathâ katha m k it satkartâ.\n\nAn important rendering is that of Professor p.\n\n106 Jolly, V.S.\n\ns.\n\n47, 'möchte es wenige Verehrer des Lügners geben.' Cp.\n\nY.\n\nXLVI, 1, where the composer speaks of the chefs as on their side, 'not contenting' him.\n\n106:1 Or, with the Pahl.: Mûn aêtûnŏ lak harvisp-gûnŏ aharûbânŏ pavan anâk yakhsenund, for they consider all Thy saints as wicked.\n\nThe rendering above is less natural as conveying the idea of a conversion (comp., however, yâ g (i)va n tô vîsp e n g vaurayâ), but it renders the grammatical forms more simply.\n\nIt is bad policy to force a text to express what we happen to believe to be a more natural idea.\n\nUsing the hint of the Pahlavi here in an understanding manner, we might then render 'for they hold all sinners as holy.' 106:2 I had long since compared vere n tê with v ri n îte (-devâ´nâm ávas); and am now sustained by Bartholomae's view.\n\n106:3 Possibly the Speni s ta mainyu of Ahura.\n\n(See also Y.\n\nXLIV, 2.) 106:4 The Pahlavi, on the contrary, bears evidence to the meaning 'comes,' which I cannot accept as 'tradition' in view of the following precatives.\n\n106:5 Ner.: 'The kingdom becomes established (in a manner completely manifest) in sun-publicity through mental perfection [ ]; and upon the workers of righteousness the Good Mind bestows it.' Next: Yasna XLIV"

