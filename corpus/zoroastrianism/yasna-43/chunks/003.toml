[content]
body = "94 the composer beseeches Ahura to grant those two 'mighty and eternal ones,' which logically form the complement to each other, universal wholeness, welfare of soul and body, without which beatitude was inconceivable, and then the unlimited duration of that condition; for it is quite impossible that 'long life' alone was here meant by a term, the equivalent of which soon after designated the Bountiful Immortals.\n\nWe have here again ample data for affirming the richness and depth of the religious conceptions.\n\nThe 'powerful and continuous two' are sought together with splendour as rewards, not for the gratification of any selfish sentiment, but in order to maintain Asha, the religious Order, on which the sacred polity, and the tribal, as well as the national wealth depended, but more than any general blessings, the individual sanctity of life.\n\n2.\n\nAnd this is signalised as the highest good; and to this a prayer is added for the 'mâya,' which recalls the supernatural wisdom of the Indian Hercules, about which much phantastic and highly coloured myth is grouped; but here, with the ever-recurring contrast, the mâya is the mysterious wisdom of the Divine Benevolence, colourless and abstract indeed, but yet possessing how great religious depth!\n\n3.\n\nThe highest blessing, in another and more than once repeated phrase, is again besought, as 'the better than the good,' even the attainment of the one who guides to the 'straight paths,' which are the 'way, even the conceptions and revelations of the Saviours' (Y.\n\nXXXIV, 13; LIII, 2), in which the believer prospers, and Ahura dwells, as he dwells in his kingdom, and his 'chosen home' itself (Y.\n\nXLVI, 16).\n\nWhether 'this man who shows the paths' of 'the bodily and mental world' is the same as he who prays for the âyaptâ ahv a u astvatas k â hya t k â mananghô (the boons of the two worlds) in Y.\n\nXXVIII, 3, here referred to in the third person, there speaking in the first, and whether he is Zarathu s tra himself; are questions.\n\nIt is only necessary to say that, if any relief is gained by the supposition, then beyond a doubt Zarathu s tra may have been the composer of both pieces or fragments, here, as in Y.\n\nXXVIII, 7, referring to himself as in the third person, there, in Y.\n\nXXVIII, also further representing another who prays, referring by name to him as in the third.\n\nBut was Zarathu s tra the only sacred singer, or was he the centre of a group only, of which he was the life?\n\n(Compare Yathrâ v e afsmâinî (?) s e nghânî— G âmâspâ Hvôgvâ; Y.\n\nXLVI, 17; see also the Introduction.) 4.\n\nProceeding as if the first three verses were absent from his p.\n\n95 mind (as indeed they may have been only later brought together with what now follows), the composer begins his ascriptions of praise.\n\nHe will regard Ahura as all-bountiful and mighty, since He has carefully nurtured, as with His very hand, the aids of grace which He will bestow, as gifts of forbearance on those now wicked, in the hope of penitence, and in the merciful threat of punishment, and to the devout disciple, whose piety is never ceremonial only.\n\nAnd these means of grace, although abounding in the inculcation of moral sanctity in thought, and word, and deed (see Vendîdâd VIII, 100 (Sp."

