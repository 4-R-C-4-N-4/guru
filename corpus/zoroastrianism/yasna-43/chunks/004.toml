[content]
body = "283) 1 , where 'thought' clearly refers to intention in the strongest sense of the term), are yet profane, aside from the flame of that holy Fire which rallied the masses to a national worship, and which was strong for the holy order, as well as by means of it.\n\nFor these reasons he adores their giver, but for still another.\n\nIt was because the might of the Good Mind of Ahura approached him within them, and gave him strength for all that was before him.\n\n5.\n\nLike the Semitic prophet, he poetically conceives himself as having beheld Ahura, as the chief of the two spirits, and as sovereign over all other powers when the world was born.\n\nAnd he regards Him as having also then established rewards and punishments by his holiness, so separate in its dualistic distinction from all complicity with evil either by infliction or permission.\n\nAnd these rewards and punishments were to have their issue not in time alone, but in 'the last turning of the creation' in its course.\n\n6.\n\nAnd for Ahura's coming in this last changing he fervently beseeches, as well as for the appearance of the Sacred Kingdom, established aid guarded by the divine Benevolence.\n\nAnd this consummation, he implies, will take place when the settlements shall be furthered in the Righteous Order, and by means of it, the end of progress having been attained; for then the piety of men's souls will itself be their instructor, delivering the regulations which shall silence the controversy of the two sides (Y.\n\nXXXI, 3).\n\nAnd these regulations are as the wisdom of Ahura's understanding (Y.\n\nXXVIII, 2), so penetrating that all thoughts lie bare to it (Y.\n\nXXXI, 13).\n\n7.\n\nHe now declares the principles on which he accepted the divine call.\n\nSraosha (verse 12), he says, drew near to question him.\n\nAs he is called by Ahura, Obedience, the same who constitutes the way to Ahura (or finds His throne (Y.\n\nXXVIII, 6)), now draws near p.\n\n96 him, (I say Sraosha (i.e.\n\nObedience), for if he is not so described as drawing near in this verse, he assuredly is so described in a verse nearly following (the twelfth)).\n\nBeyond a question, the fine subjectivity here expressed was intended.\n\nAs the seer cried: O Righteousness!\n\nwhen shall I see thee (in myself and within my people), so now he means that his obedient spirit listens to the call of God.\n\n8.\n\nAnd as his personified conscience questions him as to his origin, and the principles on which he would proceed, it represents the obedient people, as well as the obedient sage (for the sense of Sraosha, while originally applied to the personal will, is not restricted to it).\n\n'Loyalty' questions him, that 'loyalty' may report his answers.\n\nHe therefore responds, speaking in his name as Zarathu s tra (or else one thoroughly in unison with him, here speaks in his name).\n\nAnd this is his statement as to the indications which shall determine his personality.\n\nHis course will be without a compromise.\n\nThe unbelieving opposers, as he declares, shall meet no favour at his hands, but detestation, while to the devout disciple he will be as powerful an aid.\n\nAnd this because his mind and thought are (as if blinded to the present) fixed upon the ideal Kingdom, while for the present he never ceases to toil on, making preparations for the Frashakar d , and constructing hymn after hymn to set up the needed machinery of lore.\n\n9."

