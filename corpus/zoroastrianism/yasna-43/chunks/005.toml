[content]
body = "He then, with a depth which I confess seems suspicious, asks of Mazda to put his petitions for him, recalling Y.\n\nXXVIII, 11, where he beseeches Ahura to fill up his desire with what not he, the speaker, but with what He, Ahura, knows to he the Good Mind's gifts.\n\nOr, with a conjectural improvement (?) of the text, he asks of Ahura to question him that he may be questioned indeed, saying as it were, 'search me, and know me.' But the other reading being retained as having superior point, and needing no conjectured text, we may see his further thought: 'Ask Thou our questions for us, and then we shall never fail; then we shall be no desireless (anaêsha) men, spurned by the wailing kine as flinching champions (Y.\n\nXXIX, 9), but we shall be indeed Thy rulers, \"speaking our mighty wish.\" p.\n\n97 [paragraph continues] Like the isha-khshathra, whom she sought (Y.\n\nXXIX, 9), our wish shall work our will; it will accord with the will of God.' 11.\n\nHe is, however, not blind to all that lies before him in accepting this call.\n\nHe worships the bounty and majesty of Ahura while he is impressing his soul with the import of this conference, and that notwithstanding, and none the less, because His will, when obeyed in actions, will bring on earthly sufferings.\n\n12.\n\nBut notwithstanding all that may be in store for him, he hopes to make those doctrines treasures (Y.\n\nXXXIV, 7), that is, a spiritual wealth (compare also Ahura's î s ti).\n\nOne only qualification would he add: 'Wait only before Thou givest the word that I should go forth with Thy new truths (which bring such suffering to him who first pronounces them), wait till my obedient will, listening fully to all which Thou shalt say, shall come to me, and then shall that obedient reverence in me and my beloved, help on our effort, that we may spread abroad the tidings of Thy promised recompense to win the living to Thee (Y.\n\nXXXI, 3).' 13.\n\n'And that I may know and make known (so he continues) the true aims and objects of desire to those to whom I am at Thy word to go, grant me for this long life within Thy Realm, although that life be full of bitterness (verse 11; and Y.\n\nXXXII, 10, 11; XLVI, 1), for those who propagate Thy cause.' 14.\n\n'Yea, as a friend, both wise and powerful, gives to a friend, send to me not only Sraosha, an obedient listening will, but raf(e)nô frâkhshnenem, abundant grace.\n\nThen, and then only, shall I be flanked with a proper ally.\n\nThen with Thy Sovereign Power, like my Obedient will, as an angel sent forth from Thee, and inspired by Thy righteous Order in law and ritual in thought, and word, and deed, then I will go out to arouse and head the chiefs, gathering into spiritual hosts the many believing priests who even now would bear in mind and celebrate Thy mysteries.' 15.\n\nAnd as he began with fearless severity, so he would end without a compromise.\n\n'My patient suffering (so he implies as he proceeds (Y.\n\nXLVI, 1)) reveals its lesson to me.\n\nMy mind is long-enduring, but that patience, although it may seem to some the cowardice of a pusillanimous protector (Y."

