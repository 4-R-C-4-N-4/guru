[content]
body = "103:3 I still prefer Professor Bartholomae's earlier rendering, after the Pahlavi, as more in harmony with mraotâ and mrao s .\n\n103:4 Professor Jolly has the important rendering 'das will ich thun;' the infinitive in a future or imperative sense.\n\n103:5 'Ye said.' 103:6 The Pahlavi unvaryingly kabed.\n\n103:7 Here we probably have the missing subject in the other verses.\n\n103:8 Reading mãzâ rayâ.\n\n(Rayâ cannot well mean 'riches' here.) The Pahlavi also indicates the division by its free or erroneous mas ratû (ra d ).\n\nSraosha, an obedient will personified, guides the soul as in the later Parsism.\n\nCp.\n\nthe Ar d â Vîrâf.\n\n104:1 Here we have the important reading rânôibyô as against the dual of K4, &c.\n\n(see Geldner).\n\nNo mention of the fire occurs; and as the form does not agree with ara n i, we may well doubt that comparison in view of ãsay a u in Y.\n\nXXXI, 2, and the unvarying and uniform patkar d ârânŏ of the Pahlavi.\n\nThe rendering 'with the sticks' is, however, admirably adapted, and must be considered as an emphatic alternative.\n\n104:2 The Pahlavi supports the reading vî for v e ; it has barâ.\n\nAshî might also mean merely 'holy,' as adjective.\n\n104:3 In Y.\n\nXXVIII, 7, he asks for it that he may crush the malice of the foe.\n\n104:4 Justi admirably suggested yânem understood.\n\n104:5 The Pahlavi divides dâr s taitê, and, as I hold, mistakes the root as was inevitable.\n\nThe ancient scribe feared to restore the severed fragments, which appeared, as so often, in the MSS.\n\nbefore him.\n\nI would read dar s aitê with Spiegel's c(?) (so Bartholomae, later, however, recurring to a division, with Geldner after the Pahlavi, for the sake of bringing out an infinitive).\n\n104:6 Vairy a u contracted from vairyay a u by a corrupting improvement to regulate the metre.\n\n104:7 So the Pahlavi indicates, Bartholomae following as against the rendering 'possessing.' 104:8 With regard to Mazd a u and medhâ, I should perhaps long p.\n\n105 since have stated that I object to the comparison, not only because medhâ´ is a feminine, and, as Grassmann has supposed, possibly represented by the Zend madh, Greek math, but because 'wisdom' is an abstract (while su-medhâ´s, as a compound, does not apply so directly).\n\nI hold, however, that mazdâ, the fem.\n\nnoun in Y.\n\nXL, 1 = medhâ´.\n\nIt is also not impossible that this word may be represented (with differing shades of meaning) by both madh and mazdãm (fem.) in Zend.\n\n105:1 Read, perhaps, frâkh s tâ; or frâ s tâ, 'with Thine advancing kingdom I (am) to go forth to'; (frâ + as, participle.) 105:2 Prof.\n\nJolly has the important rendering, 'Ich will mich erheben; ' the infinitive in a a future or imperative sense.\n\n105:3 Chieftainships.\n\nCompare (not with exactness, however) s árdhâ m si.\n\n105:4 The idea of reciting from memory seems to be included in mar e n tê."

