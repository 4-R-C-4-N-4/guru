body = "1.\n\nSalvation to this man 1 , salvation to him whosoever (he may be 2 )!\n\nLet the absolutely ruling Great Creator grant (us, He) the living Lord, the two eternal powers.\n\nYea, verily 3 , I ask it of Thee (O Ahura) for the maintaining 4 Righteousness.\n\nAnd may’st Thou also give it to me, (O inspiring) Piety!\n\nsplendour 5 (as it is), holy blessings, the Good Mind's life 6 .\n\n2.\n\nYea, to this one 7 may the man endowed with p.\n\n99 glory 1 give that best of all things, the (spiritual) glory.\n\nAnd do Thou likewise (Thyself) reveal 2 Thine own 3 (gifts) through Thy most bountiful spirit, O Mazda!\n\n(And do Thou teach us) Thy wonderful thoughts of wisdom 4 , those of Thy Good Mind, which Thou hast revealed (to us) by Thy Righteousness (within us) with the happy increase of (our joy 5 ), and on a long life's every day 6 .\n\n3.\n\nAnd may that (holy man) approach toward that which is the better than the good 7 , he who will show to us the straight paths of (spiritual) profit, (the blessings) of this corporeal life, and of that the mental 8 , in those veritably real (eternal 9 ) worlds, where dwells Ahura; (that holy man) an offerer of Thine 10 , O Mazda!\n\na faithful citizen 11 , and bountiful of (mind).\n\np.\n\n100 4.\n\nYea, I will 1 regard Thee as mighty and likewise bountiful, O Ahura Mazda!\n\nwhen (I behold) those aids of grace (approach me), aids which Thou dost guard and nurture 2 as (Thy) just awards to the wicked (to hold him far from us), as well as to the righteous (for our help), Thy Fire's flame therewith so strong through the Holy Order 3 , and when to me the Good Mind's power comes 4 + 5 5.\n\n(For) so I conceived of Thee as bountiful, O Great Giver, Mazda!\n\nwhen I beheld Thee as supreme 6 in the generation of life, when, as rewarding 7 deeds and words, Thou didst establish evil for the evil, and happy blessings for the good, by Thy (great) virtue 8 (to be adjudged to each) in the creation's final change.\n\n6.\n\nIn which (last) changing Thou shalt come, and with Thy bounteous spirit, and Thy sovereign power, p.\n\n101 [paragraph continues] O Ahura Mazda!\n\nby deeds of whom the settlements are furthered through the Righteous Order.\n\nAnd saving regulations 1 likewise unto these shall Âramaiti utter, (she, our Piety within us), yea, (laws) of Thine understanding which no man may deceive 2 .\n\n7.\n\nYea, I conceived of Thee as bountiful, O Great Giver Mazda!\n\nwhen he (Thy messenger, Obedience) drew near me, and asked me thus: Who 3 art thou?\n\nAnd whose is thine allegiance?\n\nAnd how to-day shall I show the signs that give the light on this (our) question, (signs) as to the lands (from whence thou camest) and in thyself?\n\n8.\n\nThen to him I, Zarathu s tra, as my first answer, said: To the wicked (would that I could be) in very truth a strong 4 tormentor and avenger, but to the p."

