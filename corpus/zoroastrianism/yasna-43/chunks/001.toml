body = "Sacred Texts Zoroastrianism Index Previous Next Buy this Book at Amazon.com The Zend Avesta, Part III (SBE31) , L.H.\n\nMills, tr.\n\n[1886], at sacred-texts.com p.\n\n91 THE GÂTHA(Â) U S TAVAITI(Î).\n\nThis Gâtha, consisting of Yasna XLIII-XLVI, is named from the word which begins it, like the three last collections.\n\nThe fact that the word u s tâ possesses special significance may have influenced the minds of the Parsis of a later age, inducing them to associate this first chapter with happy anticipations, but it was of course not owing to any such circumstance that the name was given to the Gâtha.\n\nThe Gâtha, like its fellows, has its existence as a unit from the nature of its metre.\n\nIt has lines generally of eleven syllables, arranged in stanzas of five.\n\nIt seemed convenient to chant all the hymns of one particular metre together.\n\nThis hymn, from some unknown reason, or from pure accident, having stood first in the collection in this metre, the Gâtha was named from its first word.\n\nThe question naturally arises at this place whether this Gâtha, in its parts or as a whole, is older than the Ahunavaiti and the others.\n\nFor supplementary statements on this subject, see the Introduction, page xxvii, also elsewhere.\n\nIt is sufficient to recall here that the procedure of the Ahunavaiti, and the sequence of the other Gâthas in the MSS.\n\nof the Yasna, have little importance in determining the question of relative age.\n\nIf originally grouped in the order of their age, they might easily become transposed for the purpose of liturgical recitation.\n\n(See the inserted Haptanghâiti, and Y.\n\nLII.) As to the metres present, they afford no indications as to relative age.\n\nThe metre of the U s tavaiti, approaching as it does the Trish t up, may be as old as, or older than, that of the Ahunavaiti.\n\nThe oldest Ri shis sang in Trish t up.\n\nThe sole remaining test of the relative age of pieces, is their contents.\n\nDo those of the Ahunavaiti show a priority to those in the U s tavaiti as regards the particular circumstances of which they treat?\n\nSo far as I am able to p.\n\n92 judge, no part of the Ahunavaiti is older than Y.\n\nXLVI.\n\nThere we have the man before us at a period in his life before he had attained to his supreme position.\n\nHe not only laments the unfavourable prospects of his cause, but he is full of vehement animosity, urging on his adherents to the overthrow of some powerful opposing leader, and anticipating an armed struggle so formidable that its partisans are elsewhere alluded to (in Y.\n\nXLIV) as 'hosts.' We see him also exhorting the various chiefs of his party as they are evidently standing before him in some large assembly, possibly as the army on the eve of an important encounter.\n\nHe refers intimately to the monarch, to his own family, the Spitâmas, and to the Hvôgvas, as represented by Frashao s tra.\n\nHe offers the rewards of Ahura, as he pronounces His threats and condemnations.\n\nEvery feature bears the strongest evidence of originality.\n\nBut have we not the same in the Gâthas Ahunavaiti, Spe n tâ-mainyu, and the others?\n\nBeyond a question."

