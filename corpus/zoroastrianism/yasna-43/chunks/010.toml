[content]
body = "101:1 The word ratû s reminds one of the work of the Ratu for the afflicted kine.\n\nIn the last changing, which shall complete the Frashakar d , he, or his representatives, will appear as the last Saoshya n t, introducing 'millennial' blessedness.\n\n101:2 I render the Pahlavi here as in evidence: 'Through Thee, O (?) bountiful Spirit!\n\nthe changing comes [(later (?) gloss) from wickedness to goodness].\n\nAnd it comes likewise through Aûharmazd's supremacy within a good mind, through whose action the progress of Aharâyîh's settlements is furthered, those which the master is instructing with a perfect mind [ ], and in which this Thy wisdom shall in no wise be deceived thereby.' 101:3 As the kine thought little of her deliverer (see Y.\n\nXXIX, 9), so Sraosha, the obedient host, is here represented as inquiring as to the antecedents of the newly-appointed prophet.\n\nBut he asks more properly concerning the settlements from which he comes than the lands.\n\nGaêtha is not da h v (h)yu.\n\nAn origin external to that of other chieftains is not at all necessarily indicated by the question.\n\n101:4 The Pahlavi sees a denominative in isôyâ (isôvâ; y for v); it is denom.\n\nin the Altiranisches Verbum.\n\nIt differs, however, as to root.\n\nI offer an alternative in its sense.\n\nAn open tormentor; [that is, I openly torment the wicked] even as much as I desire, do I torment (them) [(later (?) gloss) Ganrâk mînavad].\n\n102:1 We must be cautious in accepting the statement that the Pahlavi translations attempt to be literal.\n\nHere is one which is free and far from erroneous: Aêtûnŏ avŏ aharûbŏ min valman î aô g -hômand aîtŏ; [aîgha s , râmînam].\n\n102:2 The Pahlavi here shows only the correct root.\n\n102:3 Mâ = smâ?\n\n102:4 'So long as I can, will I be of this mind,' seems hardly expressed here.\n\nObserve the nearly parallel construction in verse 8.\n\n102:5 The Pahlavi, Sanskrit, and Persian translations would here be regarded once more as extremely close even by opponents, if reasonable in their estimates.\n\nManayâî seems to me hardly an infinitive, as it is comparatively seldom that an infinitive falls to the end of a sentence either in Gâthic or Vedic.\n\nI prefer the indication of the Pahlavi with Justi and Bartholomae (in the Altiranisches Verbum).\n\n102:6 Read perhaps daidhî s (later shortened to suit the metre).\n\n102:7 Or, 'ask us that we may be questioned by Thee.' 103:1 The Pahlavi translation bears evidence to a less subtle, and therefore more probable sense here, but at the same time to a rarer grammatical form.\n\nIt renders dîdai N hê as a third person, indicating an instance of a third person in ê, and not in the perfect.\n\nIt also recognises a reduplicated form by its pavan nikêzi s nŏ nikêzê d ŏ.\n\n103:2 The Pahlavi translator with a curious error, or still more curious freedom, has rûbâk-dahi s nîh here and elsewhere.\n\nPossibly the Gâthic text before the last compiler differed from ours."

