body = "98:4 Or 'I will,' so Prof.\n\nJolly (infinitive for imper.).\n\n98:5 So also the Pahl.\n\nrayê-hômand, not as a rendering merely, but as a philological analagon.\n\nOtherwise 'riches.' 98:6 Gaêm recalls sraê s ta gaya g (i)vai n ti.\n\n98:7 As ahmâi would more naturally mean 'to this one' in the previous verse, it is desirable to render it in the same way here.\n\n99:1 It is to the last degree improbable that h v âthrôyâ ( h v âthravâ; 'y' miswritten for 'v') indicates a condition of ease and comfort here.\n\nThe 'easy man' is the farthest possible from the thoughts of the composer.\n\nThe 'best of all things' makes a word kindred to h v e n g ( h v an) appropriate here.\n\n99:2 K î k î (?), if an imperative (?), may mean guard over; but the Pahlavi translator gives us the better view; he has lak pê d âkînŏ; Ner.\n\ntvam prakâ s aya.\n\nGeldner's k î k îthwâ is important.\n\n99:3 Thwâ = thy properties.\n\n99:4 The Pahl.\n\nhas merely pa d mânŏ.\n\n99:5 This shade of meaning is expressed by the Pahlavi.\n\n99:6 Ayâr e , acc.\n\npl.\n\n99:7 This expression seems to equal the summum bonum; so also 'worse than the evil' is the ultimate of woe.\n\n99:8 Cp.\n\nY.\n\nXXVIII, 3.\n\n99:9 Does haithy e n g mean 'eternal,' with every passage in which it occurs considered?\n\n99:10 Thwâva n t may, however, like mava n t, simply express the personal pronoun here.\n\nThe position of aredrô, &c.\n\nis awkward if thwâva n t = thy: 'Where dwells Ahura, Thyself, O Mazda!\n\nbeneficent, wise, and bountiful.' But aredra is almost a special term for a zealous partisan.\n\n99:11 The Pahl.\n\nhas khûp-dânâkîh, indicating a meaning which would p.\n\n100 better apply to Ahura than the one given, which cannot be applied to Him.\n\n100:1 Subjunctive (see Prof.\n\nJolly, V.S.\n\np.\n\n28).\n\n100:2 'By Thy hand.' 100:3 The holy Fire of the altar.\n\n100:4 G ima t may be regarded as an improper subjunctive here.\n\n100:5 The Pahlavi: 'and that too which renders justice to the wicked and also to the righteous.\n\nAnd this Thy Fire is burning, since by it the strength of him who lives in Righteousness is (maintained) when that violence which approaches with a good intention comes to me.' 100:6 See Y.\n\nXXXI, 8, where the word is also rendered as = vornehmster.\n\n100:7 Literally, 'When Thou didst render deeds provided with rewards.' We are forced to put the action in the past on account of zãthôi, but the influences originally set in motion were to have their issue in the end of the world.\n\n100:8 I render hunarâ literally, and bring its Pahlavi translation to the same sense as necessarily.\n\nOtherwise hûmar would generally mean 'skill.' Ner.\n\nhas tava gu n eshu.\n\nThe Pahlavi would here be recognised by all reasonable scholars as striking in its closeness."

