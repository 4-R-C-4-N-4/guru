[content]
body = "Those passages which express grief, fear, and passionate resentment, we should naturally refer to Zarathu s tra personally, and to the earlier portion of his career; and we can make no distinction between such passages when they occur in the Ahunavaiti, U s tavaiti, or elsewhere.\n\nAs to chapter XXIX with its logical commencement, as expressing the sufferings to be remedied in the entire effort, together with the call of Zarathu s tra in immediate connection, and chapter XXX with its theosophical statements, we should say that they were composed later, during a period of success and reflection.\n\nBut this would be a mere surmise.\n\nThe time of the sage need not necessarily have been consumed in struggles even during the early years of his career.\n\nChapter LIII seems to belong to a period of mature age, but not necessarily to a period of advanced age.\n\nIt celebrates the marriage of Zarathu s tra's daughter, but maidens were married early.\n\nWith the exception of Y.\n\nLIII, I would say that the occurrence of a piece in this or that Gâtha has little, if anything, to do with determining the question of its relative age.\n\np.\n\n93 YASNA XLIII.\n\nSALVATION IS ANNOUNCED AS UNIVERSAL FOR BELIEVERS.\n\nREFLECTIONS OF ZARATHU S TRA UPON THE SUBLIMITY AND BOUNTIFULNESS OF AHURA.\n\nAs, in every instance, it is probable that verses have fallen out here and there in this important piece, and some may have been inserted, not necessarily from another composer, but from other compositions.\n\nAfter certain limits, however, marked signs of at least external connection are present.\n\nAfter the first three verses, which are quite apart, then from the fourth and fifth on, every alternate verse has the formula Spe n tem a t thwâ Mazdâ me N hî Ahurâ.\n\nIt would indeed present no difficulty for a successor to add these words to stanzas otherwise also imitated, but whether from the leading sage or not, whether from him in one strain, or from him as collected from different fragments, the course of thought does not so fail in logical sequence as that it is either impossible, or displeasing, as a whole in a poetical composition.\n\nVerses 1-3 are admirable as preliminary.\n\nVerses 4-6, with their lofty descriptions of power and benevolence in the Deity, prepare the way well, with their allusions to the final judgment, for the closer reflections in verses 7-15 upon the prophet's call, uttered at the instigation of Sraosha (his obedient will).\n\nVerse 16 is a closing strophe looking much like an addition from another hand, not at all because Zarathu s tra is mentioned in the third person, but from its general cast.\n\nIt possesses, however, very great interest from these circumstances.\n\nIf a later addition, it enables us to see how the principal features of the system were viewed at a period not identical with the earliest, but closely following it.\n\n1.\n\nIf we can accept the deeply interesting suggestion of the Pahlavi translator, which is, 'Salvation to him to whom there is salvation for every man,' we need then suppose no necessary loss of verses.\n\nOtherwise we are obliged to consider the loss of some laudatory verse, or verses, containing such matter as perhaps Y.\n\nXXXIV, 14, 'This princely priest has devoted all to Thee, therefore, salvation to him, whosoever he may be.' Whatever may be the actual truth, the main stress of the thoughts is clear and appropriate.\n\nUsing the word vas e -khshayãs in a good sense, p."

