[content]
body = "102 righteous may I be a mighty help and joy 1 , since to preparations 2 for Thy Kingdom, and in desire (for its approach), I would devote myself so long as to Thee, O Mazda!\n\nI may praise, and weave my song.\n\n9.\n\nYea, I conceived of Thee as bountiful, O Ahura Mazda!\n\nwhen (Thine herald) with Thy Good Mind near approached me, and asked me thus: For what dost thou desire that thou may’st gain, and that thou may’st know it?\n\nThen for Thy Fire an offering of praise and holiness (I desired.\n\nAnd on that offering for myself) 3 as long as I have the power, will I meditate 4 , (and for its holy power among Thy people will I plan 5 ).\n\n10.\n\nAnd may’st Thou likewise grant 6 me (Thy) Righteousness (within me), since I earnestly invoke that perfect readiness (of mind), joining in my prayer with Âramaiti (our Piety toward Thee.\n\nYea, pray Thou Thyself within me through these holy powers).\n\nAsk Thou (Thyself) our questions, those which shall be asked by us 7 of Thee; for a question asked by p.\n\n103 [paragraph continues] Thee (as its inspirer), is as the question of the mighty, whene’er Thy (?) ruler speaks his potent wish.\n\nII.\n\nYea, I conceived of Thee as bountiful, O Ahura Mazda!\n\nwhen (Thy messenger) with Thy Good Mind near approached me, and with your words I 1 first impressed (my soul).\n\nWoes then 'midst men Thy heart-devoted one 2 declared 3 (to be) my (portion); but that will I do 4 which Thou did’st 5 say was best.\n\n12.\n\nAnd since Thou, coming thus, Thy legal Righteousness in fulness 6 spakest, then declare not to me words as yet unheard (with faith or knowledge; command me not) to go forth (with these upon my task) before Thy Sraosha 7 (Obedience) comes to me, to go on hand in hand with me with holy recompense and mighty splendour 8 , whereby to p.\n\n104 give the contending 1 throngs(?), as a blessing 2 , (Your) spiritual gifts (of certainty and peace).\n\n13.\n\nThus I conceived of Thee as bounteous, O Ahura Mazda!\n\nwhen with Thy Good Mind (Sraosha, Obedience) approached me.\n\n(And I would therefore pray thus of Thee, that bounteous one.) In order that I may make known to men the true and sacred aims of their desires (in the rite or daily toil), grant Ye me long life 3 for this, (that blessing 4 ) which none with daring may extort 5 from You, even this (gift) of that desired 6 place which has been declared to be within Thy Realm.\n\n14.\n\nYea, as the man enlightened 7 (in Thy law), and who has possessions, gives to his friend, (so give Ye) me, O Great Creator 8 !\n\nThy rejoicing and p.\n\n105 abounding grace, when through Thy sovereign Power, and from (the motives of Thy cause of) Righteous Order, I stand forth 1 to go out to 2 , or to arouse, the chiefs 3 of Thy (pure) proclamation, with all those (others) who recite Thy well-remembered 4 Mãthra word.\n\n15.\n\nYea, I conceived of Thee as bounteous, O Ahura Mazda!"

