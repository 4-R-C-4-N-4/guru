[content]
body = "XXIX, 3) who will thus take up the snaithi s and the Mãthra (verse 14), and so at once contend for 'both the worlds.' And he wishes him rot alone pointed out, but approached, as Zarathustra was approached (Y.\n\nXLIII), by an obedient will, and moved to his holy work by the inspiring Good p.\n\n111 [paragraph continues] Mind of Ahura, be that champion Ratu whosoever the Lord might wish.\n\nSalvation in the shape of success in his great attempt should be his portion (Y.\n\nXLIII, 1).\n\n17.\n\nHalf intimating that he himself may be the coming man, he begs to know when he can have that conference in which, as in the desired h e mpar s ti and dar s ti of Y.\n\nXXXIII, 6, he may communicate more closely with Ahura, and through the revelation which might be vouchsafed, may become a protecting leader to secure the ever-named 'abiding two,' 'Weal' and 'Immortality,' which were the 'better than the good,' the 'vahi s ta' of the saints.\n\n18.\n\nA preliminary wish arising, he asks that he may receive the honorary gift of mated mares and a camel, as material for sacrifice before a battle (?), the highest interests of the people even, their lasting Welfare, demanding that he should receive this help.\n\n19.\n\nFor the monarch, or leading chief, who may withhold this justly deserved and needed help, or honour, he declares by the terms of his following question, that some instant judgment will be forthcoming, for the threats of the future condemnation seem for the moment only trite.\n\n20.\n\nAs a peroration, he appeals to the reason of the wavering groups, among the masses who still delay to call evil evil (verse 12), and he asks whether the Daêvas, as represented by their adherents, had ever been good rulers, when they had the power.\n\nWere not robbery and violence then the law with them as now?\n\nAnd did not the Kine, as representing the sacred herds and people, lift up her wailing voice?\n\n(The piece from verse 12 seems to constitute a religious war-song.\n\nThese verses seem not to have been originally connected with the calm and thankful contemplations in verses 1-10, but later united with them.\n\nVerses 12-20 stand in the closest connection with Y.\n\nXLVI, which has, however, preserved more of the elements of sorrow and discouragement which influenced the leader and his followers at times.\n\nSee also XLIII, 11.) Translation.\n\n1.\n\nThis I ask Thee, O Ahura!\n\ntell me aright; when praise is to be offered, how (shall I complete) the praise of the One like You 1 , O Mazda?\n\nLet p.\n\n112 the One like Thee declare it earnestly to the friend who is such as I, thus through Thy Righteousness (within us) to offer friendly help 1 to us, so that the One like Thee 2 may draw near 3 us through Thy Good Mind (within the soul).\n\n2.\n\nThis I ask Thee, O Ahura!\n\ntell me aright, how, in pleasing Him, may we serve the supreme one of (Heaven) the better world 4 ; yea, how to serve that chief who may grant us those (blessings of His grace, and) who will seek for (grateful requitals at our hands); for He, bountiful (as He is) through the Righteous Order, (will hold off) ruin 5 from (us) all, guardian (as He is) for both the worlds, O Spirit 6 Mazda!\n\nand a friend.\n\np.\n\n113 3.\n\nThis I ask Thee, O Ahura!"

