[content]
body = "Who, in his keen discrimination, gave (us our) sleep and waking; [that is, our diligence and activity?] Who is he who gave us the time of hu s aina, and the time of rapithvana [ ], and the method and calculation of him who discerns by means of the just rule [ ]?' 114:3 So also the Pahlavi indicates by 'stavar.' 114:4 So I prefer; but the indication of the Pahlavi deserves an alternative 'giver of bounty'; skar = kar.\n\n'G e u s azy a u' was later a common expression for a mature animal, but possibly vulgarised from its older special use here.\n\n114:5 Root nî (?).\n\n114:6 I thus add as the Pahlavi translator indicates such an element in uzemem.\n\n115:1 Frakhshnî = in abundance (Pahl.\n\nkabed; Ner.\n\npra k uram; Persian MS.\n\nbisyar).\n\nThe thought refers back to anyâ k â vîduyê [-vê].\n\n115:2 Haug sagaciously renders as if m e n dâidyâi were a miswriting for p e n dâidyâi, which is in itself very possible, as an 'm' looks much like an inverted in MSS.\n\nSo the Pahlavi records the irregularity also, from which Haug derived his idea.\n\nBut Haug explains the word as an allusion to the five prayer-hours of the day.\n\nI doubt very greatly whether the five prayer-hours existed at the date of the composition of this passage.\n\nSuch regulations grew up much later.\n\nThe Pahlavi translator indicates elsewhere an accusative (m e n g = mãm) with an infinitive 'that I should give forth,' which is in itself far from impossible.\n\nHe was aware (!) that m e n g could also equal man; see Y.\n\nLIII, 5.\n\n115:3 Vaêdyâi is infinitively used for vôi z dyâi.\n\n115:4 I do think that it is necessary on the whole to postulate two similar words here (although Geldner's suggestion is most keen and interesting).\n\nUrvâkh s anguha and urvâkh s ukhti do not favour a comparison with vra g here.\n\nThe Pahlavi is indifferent: K îgûn denman î li rûbânŏ zak î s apîr hû-ravâkh-manîh?\n\nSo Ner.\n\nuttamânanda h .\n\nBarth.\n\nbeglückend.\n\n115:5 Kâ-tâ = kéna-téna.\n\n115:6 Or, 'let those things happen to me;' gam means 'come' more frequently than 'go,' here.\n\nLit.\n\n'let it thus advance.' 115:7 K îgûn denman î li dînô yô s -dâsar î avê g ak yô s -dâsaryôm?\n\nNer.: Katham ida m aham yat* dîni m pavitratarâm pavitrayâmi; [kila, dîni m katha m pravartamânâ m karomi]?\n\nAs Zarathu s tra is p.\n\n116 represented as sanctifying the Fire (in Y.\n\nIX, 1), so here he would doubly sanctify the Faith itself.\n\nHe would 'hallow its name' and meaning.\n\n116:1 Pavana s -hamdemûnîh-ketrûnê d [pavan hamkhadûkîh].\n\n116:2 I cannot regard the caesura in this verse as possessing ordinary importance, the ma h v y a u (mahy a u) k istôi s is especially dependent on the following words."

