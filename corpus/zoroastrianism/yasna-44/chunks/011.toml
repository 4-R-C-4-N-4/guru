[content]
body = "It agrees admirably with the Pahlavi as to sense: Aîmat, Aûharmazd!\n\ndamânŏ kar d ârîh î Lekûm, when is Your appointment of the time?\n\n119:6 The Pahlavi va mûni k zak i li gôbi s no hômand khvâstar.\n\n119:7 Va sardâr yehevûni s nîh madam Haurvada d va Amerôdâ d ; Ner.\n\nSvâmino bhavishyanti upari Avirdâde Amirdâde; comp.\n\nalso Y.\n\nXLIX, 8 fraê s t a unghô a unghâmâ.\n\nProfessor Jolly compares bû z dyâi with φύεσθαι (Inf.\n\ns.\n\n194).\n\nThe long since circulated comparison with bhu g seems to me hardly so probable.\n\nIt may, however, deserve an alternative: 'to enjoy Weal and Immortality'; but accusatives p.\n\n120 do not fall so naturally to the end of the sentence in Gâthic or Vedic, without preceding related or qualifying words.\n\n120:1 Those suspected of no partisanship for the Pahlavi translation follow it here as against Haug, who translated the words u s trem k â by et amplius!\n\nIt means a camel; so the Pahlavi translator rendered many centuries ago before Europeans even knew what the Indian úsh t ra meant, which simple analogy Neryosangh first drew.\n\nHorses were material for sacrifice among the Persians according to Herodotus.\n\nThe reasons for the prayer are not fully expressed.\n\n120:2 So better than as a first person aorist subjunctive, if taêibyô is to be read.\n\nThe Pahlavi, however, read taibyô, which is not lightly to be passed over.\n\n120:3 The rendering 'take' has long circulated.\n\nI do not, however, prefer it here.\n\n120:4 Weal and Immortality, but hî might refer to the two objects, 'the mares' and the 'camel.' 120:5 The ideal Zarathu s trian; comp.\n\nY.\n\nXXXI, 15; XLIX, 9.\n\n121:1 So also the Pahlavi followed by all.\n\nKa d âr valman pavan zak vinâsi s nŏ aîtŏ fratûm; [aîga s pavan-vinâskârîh pâ d afrâs fratûm maman]?\n\nÂkâs hômanam zak mûn valman aîtŏ afdûm [mamana s darvandîh]?\n\nNer.\n\n(with regard to him) who does not give the reward which has come for the one fitted for, or deserving of, it [to G arathustra's equal], (the reward) which the truthful man; [that is, the good man] is giving to him, what is the first thing which happens through this sin of his?\n\n[that is, what is his first chastisement in consequence of this fault?] (For) I am aware of what his punishment shall be in the end [ ].\n\n121:2 The Pahlavi translator either had a text with some form of pâ, or was otherwise misled.\n\nHe renders mûn netrûnd, but gives the word the adverse sense of 'hindering' in the gloss.\n\nNer., however, has pratiskhalanti which points to peshyêi n tî, and also tends to show that other MSS.\n\nof the Pahlavi (and among them the one used by Ner.) read differently from our three, K5, D.\n\nJ., and the Persian transliteration."

