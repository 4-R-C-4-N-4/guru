[content]
body = "tell me aright, how to myself shall I hallow 7 the Faith of Thy people, p.\n\n116 which the beneficent kingdom's lord hath taught me, even the admonitions which He called Thine equal, hath taught me through His lofty (and most righteous Sovereignty and) Power, as He dwells in like abode 1 with Thine Order and Thy Good Mind?\n\n10.\n\nThis I ask Thee, O Ahura!\n\ntell me aright that holy Faith which is of all things best, and which, going on hand in hand with Thy people, shall further my lands in Asha, Thine order, and, through the words of Âramaiti (our piety), shall render actions just.\n\nThe prayers of mine understanding will seek 2 for Thee, O Ahura!\n\n11.\n\nThis I ask Thee, O Ahura!\n\ntell me aright; how to these your (worshippers) may (that Piety once again and evermore) approach, to them to whom O Lord, Thy Faith is uttered?\n\nYea, I beseech of Thee to tell me this, I who am known to Thee as Thy foremost 3 of (servants); all other (Gods, with their p.\n\n117 polluted worshippers), I look upon with (my) spirit's 1 hate 2 .\n\n12.\n\nThis I ask Thee, O Ahura!\n\ntell me aright; who is the righteous one in that regard in which 3 I ask Thee my question?\n\nAnd who is evil?\n\nFor which is the wicked?\n\nOr which is himself the (foremost) wicked one?\n\nAnd the vile man who stands against me (in this gain of) Thy blessing, wherefore 4 is he not held and believed to be the sinner that he is?\n\n13.\n\nThis I ask Thee, O Ahura!\n\ntell me aright, how shall I banish this Demon-of-the-Lie from us hence to those beneath who are filled 5 with rebellion?\n\nThe friends of Righteousness (as it lives in Thy saints) gain no light (from their teachings), nor have they loved the questions which Thy Good Mind (asks in the soul 6 )!\n\np.\n\n118 14.\n\nThis I ask Thee, O Ahura!\n\ntell me aright; how shall I deliver that Demon-of-the-Lie into the two hands of Thine Order 1 (as he lives in our hosts) to cast her down to death through Thy Mãthras of doctrine, and to send mighty destruction 2 among her evil believers, to keep those deceitful and harsh oppressors from reaching their (fell) aims 3 ?\n\n15.\n\nThis I ask Thee, O Ahura!\n\ntell me aright.\n\nIf through Thy Righteousness (within our souls) Thou hast the power over this for my 4 protection, when the two hosts shall meet in hate (as they strive) for those vows which Thou dost desire to maintain, how, O Mazda!\n\nand to which of both wilt Thou give 5 the day 6 ?\n\n16.\n\nThis I ask Thee, O Ahura!\n\ntell me aright, p.\n\n119 who smites with victory 1 in the protection (of all) who exist, and for the sake of, and by means of Thy doctrine?\n\nYea, clearly reveal a lord having power 2 (to save us) for both lives.\n\nThen let (our) Obedience 3 with Thy Good Mind draw near to that (leader), O Mazda!\n\nyea, to him to whomsoever 4 Thou (shalt) wish that he should come.\n\n17.\n\nThis I ask Thee, O Ahura!\n\ntell me aright; how, O Mazda!"

