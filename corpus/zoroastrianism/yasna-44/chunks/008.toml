[content]
body = "Khshmâvatô is sometimes merely a way of saying 'of Thyself,' as mavaitê = to me.\n\n112:3 Observe also the emphasis on his 'drawing near'; otherwise 'let Your one declare it to my friend' (?).\n\n112:4 See Roth, Y.\n\nXXXI, 8.\n\nSee, however, also de Harlez's suggestion, perhaps after the hint of the Pahlavi: 'qu’elle a été l’origine?' Here we have another instance where an entire verse seems to allude to Ahura in the third person with an address to Him thrown in, or at the close.\n\nIn connection with angh e u s vahi s tahyâ Ahura must be the pourvya, as in Y.\n\nXXXI, 8, where Roth renders vornehmster.\n\nThe guardian is also Ahura (see Y.\n\nXXXI, 13).\n\n112:5 I cannot fully accept the hint of the Pahlavi here as others do who seldom heed it.\n\nI do not think that 'sin' is so much indicated as 'destruction.' 112:6 Mainyû is suspiciously expressive as a vocative; perhaps 'by spiritual power' would be safer.\n\n113:1 'As a generator (?).' 113:2 Bartholomae follows the Pahlavi here as rendered by Ner.\n\nputting hv e n g and star e m (-ãm) in the genitive, which is in itself far better than to regard dâ t as governing two accusatives.\n\nOne would, however, rather expect hv e n g starãm adhvânem dâ t .\n\n113:3 All follow the Pahlavi here, which renders with allowable freedom.\n\nNerefsaitî (= Pahl.\n\nnerefsê d ; Ner.\n\nnimîlati; Persian kâhad) might possibly be explained as a nasalised form of an Aryan correspondent to arbha, as na s = a s .\n\n113:4 Possibly from thine influence (?).\n\n113:5 The infinitive vîduyê (= vîdvê) lies here in an unusual place, at the end of the sentence.\n\nIt is because the word has no stress upon it.\n\nThe emphasis rests on the objects which he desires to know about; the entire connection deals with 'knowing'; it has no prominence.\n\n113:6 This rendering is not supported by the Pahlavi, which seems to report a rendering from some text with an a privative, and a form of dar.\n\nThe 'unsupported' object might mean the 'air-space.' See the suggestion of Bartholomae 'the earth and the air-space,' comparing the later Sanskrit.\n\n113:7 Or 'for velocity,' adverbially.\n\nVelocity, however, in the abstract as the object yoked-on, is rather too finely drawn.\n\nI should prefer p.\n\n114 the fleet ones, the lightnings.\n\nMy rendering follows the indication of another, as a dual, but not as to full exegesis.\n\nOne naturally supposes the yoking together of the winds and dark clouds to be meant.\n\n114:1 Recall svàr yád á s mann adhipâ´ u ándho.—Rv.\n\nVII, 88, 2.\n\n114:2 Ner.: 'Who gave us the lights with his keen discrimination?\n\nAnd who the darkness?"

