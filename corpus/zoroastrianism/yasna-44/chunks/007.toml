[content]
body = "shall I proceed to that (great) conference 5 with You, to that consummation of Your own, when my spoken wish 6 shall be (effected) unto me, (the desire) to be in the chieftainship 7 (and supported) by (the hope of) Weal and Immortality (those saving powers of Thy grace), and by that (holy) Mãthra (Thy word of thought) which fully guides our way through Righteousness (within).\n\np.\n\n120 18.\n\n(And, having gained Thine audience and Thine Order's sacred chieftainship), then I ask of Thee, O Ahura!\n\nand tell me aright, how shall I acquire that Thy Righteous Order's prize, ten (costly) mares male-mated, and with them the camel 1 (those signs of honour and blessing for Thy chief.\n\nI ask Thee for these gifts for sacrifice).\n\nFor it was told me for the sake of our Welfare (in our salvation), and of our Immortality, in what manner Thou 2 shalt give 3 to these (Thy conquering hosts) both of these Thy (gifts 4 of grace).\n\n19.\n\nThis I ask Thee, O Ahura!\n\ntell me aright; (in the case of the recreant, of him) who does not give this (honoured) gift to him who hath earned it; yea, who does not give it to this (veracious tiller of the earth, to him who in no respect shows favour to the Demon-of-the-Lie, even to the) correct speaker 5 (of Thy sacrificial word), what shall be his sentence at p.\n\n121 the first (now at this time, and because of this false dealing?\n\nI ask it), knowing well his doom at last 1 20.\n\n(And how as to our deluded foes?) Have Daêva-(worshippers) e’er reigned as worthy kings?\n\n(This verily I ask of Thee, the Daêva-worshippers) who fight 2 for these (who act amiss?\n\nHave they well reigned) by whom the Karpan and the Usi g (k) gave the (sacred) Kine to Rapine 3 , whence, too, the Kavian in persistent strength 4 has flourished?\n\n(And these have also never given us tribal wealth nor blessings), nor for the Kine have they brought waters to the fields for the sake of the Righteous Order (in our hosts), to further on their growth (and welfare)!\n\nFootnotes 111:1 Some who seldom cite the Pahlavi follow it here; nîyâyi s no zak mûn aêtûno nîyâyi s no î Lekûm [dînô].\n\nOtherwise one might p.\n\n112 read nemê with B.V.S.\n\n(variation) in Y.\n\nLVIII, 3, and render, 'how shall I bow myself in your worship?' 112:1 The Pahl.\n\nhamkar d âr is likewise followed.\n\nThe alteration to hâkôrenâ is very interesting, but, I think, hardly necessary.\n\n112:2 Observe the great difficulty in referring Khshmâvatô to a human subject.\n\nHere we have 'the homage of the One like You (of Yours(?)' some would say); in Y.\n\nXXXIII, 8 we have Yasnem Mazdâ (Ahurâ) Khshmâvatô; in Y.\n\nXXXIV, 2 Khshmâvatô vahmê; in Y.\n\nXLIX, 6 Tãm daênãm yâ Khshmâvatô Ahurâ."

