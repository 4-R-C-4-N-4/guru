body = "Sacred Texts Zoroastrianism Index Previous Next Buy this Book at Amazon.com The Zend Avesta, Part III (SBE31) , L.H.\n\nMills, tr.\n\n[1886], at sacred-texts.com p.\n\n107 YASNA XLIV.\n\nQUESTIONS ASKED OF AHURA WITH THANKFULNESS AND DEVOTION.\n\nMany verses may here have fallen out, or, on the other hand, the piece having been made up of homogeneous, but not originally connected fragments, has been left with some abrupt transitions.\n\nThese, however, occasion very little difficulty in exegetical treatment, and are also not displeasing.\n\nThe formula, 'This I ask Thee, O Ahura!\n\ntell me aright' seems to have been suggested by Y.\n\nXXXI, 14.\n\nWe might therefore look upon this piece as composed later than Y.\n\nXXXI, but not necessarily in a later generation, or even from another hand.\n\nIn fact the style is thoroughly homogeneous in certain places with that of pieces which we ascribe without a doubt to Zarathu s tra, and the signs of struggle point to the earliest period.\n\nIt is possible that the words in Y.\n\nXXXI, and the formula here were of common origin, neither having any extended priority to the other, or the words may be original here, and derived in Y.\n\nXXXI.\n\nWhether Zarathu s tra, or another of the narrow circle of religious leaders, was the composer throughout depends upon the further questions already more than once broached, as to how far a corresponding intellectual cultivation was extended at the period in the community, and as to what is the probability of the existence of more than one man in the small group, endowed with the peculiar qualities everywhere manifested in these hymns (see remarks in the Introduction and elsewhere).\n\nIt is safest to say that Zarathu s tra composed most of the matter here before us, and that the supplementary fragments were composed under his dominating, if not immediate, influence.\n\nVerses 1 and 2 seem an introduction, but hardly give added emphasis to the fact that the following questions were expressions of devotion, and only in a few instances appeals for knowledge.\n\nVerses 3-5 are certainly questions intended to express veneration while naming particular objects of devout inquiry.\n\nVerse 6 stands somewhat apart.\n\nVerses 7-11 enter into details touching the moral and religious improvement of the people, 12-14 are polemical, 15 and 16 are prophetical, &c.\n\np.\n\n108 1.\n\nMore closely; the composer beseeches Ahura to speak to him, and in a manner characteristic of Himself as in distinction from the falsifying utterance of the opposing religion, which was so familiarly described as the religion of 'Falsehood.' He is entreated to reveal, as is His wont, 'the holy truth.' And the first question propounded to Him by the composer, as comprehensive of all others, is how he may offer homage, the homage of God Himself or of His bountiful spirit; (see mainyû in verse 2).\n\nAnd he further asks that Ahura may speak to him, showing him by what ceremonial he may conciliate him, and by what helps of grace that spirit, or Ahura Himself, may be inclined to draw near to him in accordance with his frequent prayer.\n\n2.\n\nOnce more he asks how he may serve that Spirit as the foremost one of Heaven (compare Y.\n\nXXXI, 8, and the Parsi vahi s t) who seeks for this addition of praise to praise, for as the supreme claim to our veneration, He had, as a guardian (Y.\n\nXXXI, 13) like Ahura in yet another place, held off destruction from all believing saints and from all repentant men (Y."

