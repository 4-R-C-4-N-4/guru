[content]
body = "The Pahlavi translator hints at an important solution, which is, that a pause should be made before us e n; 'the wish of mine understanding wishes, and I wish (am wishing); Khûrsand hômanam = I am content.\n\n' If we can accept a break (a possibility far too little recognised), the u s e n as representing a nom.\n\nsing.\n\nwould refer back to the meaning in ma h v y a u (mahy a u).\n\nBut reading î s tî s (as irregular for î s tayô on account of the metre) we might regard us e n as a third pl.\n\nOr shall we take it as a quasi-third singular, us e n being usãm ( e n = the nasal vowel; comp.\n\nû k ãm as a third sing.\n\nimper.\n\nafter Barth)?\n\nLet 'the wish (î s ti s ) of my enlightened understanding wish for Thee.' 116:3 Compare 'aêshãm tôi, Ahura!\n\ne hmâ pourutemâi s dastê.' p.\n\n117 Auserkoren is a fine but a bold rendering.\n\nElection is, however, included in all divine prescience.\n\n117:1 I have no doubt whatever, but that mainy e u s and dvaêshanghâ belong together.\n\n117:2 The Pahlavi translation is as follows: 'That which I ask of Thee, tell me aright, O Aûharmazd!\n\nwhen shall the perfect mind come to those persons [that is, when does the mind of my disciples become perfect]?\n\nWhen shall it come to those who declare this Thy Religion, O Aûharmazd?\n\nGrant to me before these the proclamation of the truth.\n\nAgainst every other spirit which is malevolent I keep my guard.' 117:3 Yâi s adverbially, or possibly, 'with whom I question.' 117:4 K ya n gha t is, I think, simply the equivalent for k î (?) angha t = quî fit, how does it happen that?\n\n'Stands' free for 'comes.' 117:5 The Pahlavi on the contrary takes peren a unghô in the sense of combating, pavan anyôkhshî d â´rîh patkârênd = '(who) are opposing you through disobedience.' It is far from certain that he does not indicate some improvement in text, or rendering.\n\n117:6 Or, 'the counsels of holy men.' 118:1 Ashâi with Geldner.\n\n118:2 The Pahlavi anticipates us in the correct general sense here.\n\nIt has nas,hôni s nŏ.\n\nThe Persian MS.\n\nrenders the Pahlavi, hamâvandî nîst dehand î darwand.\n\n118:3 Anâshê seems regarded as an infinitive by the Pahlavi translator, anayâtûni s no.\n\n'For the destruction of those deceivers' is an obvious alternative to the rendering above (â nashê?).\n\n118:4 Geldner and Roth render ma t = Sanskrit mad; otherwise 'with complete protection.' Or is ma t ablative for genitive: If thou rulest over me to afford me protection?\n\nThe Pahlavi affords no indication.\n\n118:5 The Pahlavi translator erred widely in his attempt to render the word anao k anghâ.\n\nAs it is certain that his MSS.\n\ndiffered from ours often, they probably did so here.\n\nThe verse alludes beyond a question to some expected battle in a religious war, and perhaps in a religious civil war.\n\nIt is the most positive allusion to the 'strife of the two parties' (V."

