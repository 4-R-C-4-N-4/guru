[content]
body = "117:2 The Pahlavi translation is as follows: 'That which I ask of Thee, tell me aright, O Aûharmazd!\n\nwhen shall the perfect mind come to those persons [that is, when does the mind of my disciples become perfect]?\n\nWhen shall it come to those who declare this Thy Religion, O Aûharmazd?\n\nGrant to me before these the proclamation of the truth.\n\nAgainst every other spirit which is malevolent I keep my guard.' 117:3 Yâi s adverbially, or possibly, 'with whom I question.' 117:4 K ya n gha t is, I think, simply the equivalent for k î (?) angha t = quî fit, how does it happen that?\n\n'Stands' free for 'comes.' 117:5 The Pahlavi on the contrary takes peren a unghô in the sense of combating, pavan anyôkhshî d â´rîh patkârênd = '(who) are opposing you through disobedience.' It is far from certain that he does not indicate some improvement in text, or rendering.\n\n117:6 Or, 'the counsels of holy men.' 118:1 Ashâi with Geldner.\n\n118:2 The Pahlavi anticipates us in the correct general sense here.\n\nIt has nas,hôni s nŏ.\n\nThe Persian MS.\n\nrenders the Pahlavi, hamâvandî nîst dehand î darwand.\n\n118:3 Anâshê seems regarded as an infinitive by the Pahlavi translator, anayâtûni s no.\n\n'For the destruction of those deceivers' is an obvious alternative to the rendering above (â nashê?).\n\n118:4 Geldner and Roth render ma t = Sanskrit mad; otherwise 'with complete protection.' Or is ma t ablative for genitive: If thou rulest over me to afford me protection?\n\nThe Pahlavi affords no indication.\n\n118:5 The Pahlavi translator erred widely in his attempt to render the word anao k anghâ.\n\nAs it is certain that his MSS.\n\ndiffered from ours often, they probably did so here.\n\nThe verse alludes beyond a question to some expected battle in a religious war, and perhaps in a religious civil war.\n\nIt is the most positive allusion to the 'strife of the two parties' (V.\n\nXXXI, 2) which has come down to us.\n\nIt was a struggle concerning the religious vows, or doctrines; avâi s urvâtâi s yâ tû Mazdâ dîderegh z ô.\n\n118:6 The Pahlavi renders vananãm by 'good thing,' explaining 'the sovereign power.' 119:1 Verethrem- g â thwâ, following the Pahlavi with Westergaard, Geldner, and Bartholomae.\n\n119:2 Compare Y.\n\nXXIX, 2 and Y.\n\nXXVIII, 3; or it may mean 'promise to establish' (Barth.).\n\nK i z dî, however, hardly seems to need an infinitive with it; it may mean 'appoint.' Compare dá m su (patnî) for a better sense than 'house-lord,' also for d e n g patôi s .\n\n119:3 This casts additional light on the 'one that should come' in Y.\n\nXLIII, 7, 9, 11, 13, 15.\n\n119:4 This recalls ahmâi yahmâi u s tâ kahmâi k î t .\n\n119:5 The comparison with g ar has long circulated among Zendists.\n\nMany adopt it."

