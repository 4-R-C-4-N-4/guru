[content]
body = "tell me aright: Who by generation 1 was the first father of the Righteous Order (within the world)?\n\nWho gave the (recurring) sun and stars 2 their (undeviating) way?\n\nWho established that whereby the moon waxes, and whereby she wanes 3 , save Thee 4 ?\n\nThese things, O Great Creator!\n\nwould I know 5 , and others likewise still.\n\n4.\n\nThis I ask Thee, O Ahura!\n\ntell me aright, who from beneath hath sustained the earth and the clouds 6 above that they do not fall?\n\nWho made the waters and the plants?\n\nWho to the wind has yoked on the storm-clouds, the swift and fleetest two 7 ?\n\nWho, O Great Creator!\n\nis the inspirer of the good thoughts (within our souls)?\n\np.\n\n114 5.\n\nThis I ask Thee, O Ahura!\n\ntell me aright; who, as a skilful artisan, hath made the lights and the darkness 1 ?\n\nWho, as thus skilful, hath made sleep and the zest (of waking hours)?\n\nWho (spread) the Auroras, the noontides and midnight, monitors to discerning (man), duty's true (guides) 2 ?\n\n6.\n\nThis I ask Thee, O Ahura!\n\ntell me aright these things which I shall speak forth, if they are truly thus.\n\nDoth the Piety (which we cherish) in reality increase 3 the sacred orderliness within our actions?\n\nTo these Thy true saints hath she given the Realm through the Good Mind.\n\nFor whom hast Thou made the Mother-kine, the producer of joy 4 ?\n\n7.\n\nThis I ask Thee, O Ahura!\n\ntell me aright; who fashioned Âramaiti (our piety) the beloved, together with Thy Sovereign Power?\n\nWho, through his guiding wisdom 5 , hath made the son revering the father?\n\n(Who made him beloved 6 ?) With (questions p.\n\n115 such as) these, so abundant 1 , O Mazda!\n\nI press Thee, O bountiful Spirit, (Thou) maker of all!\n\n8.\n\nThis I ask Thee, O Ahura!\n\ntell me aright, that I may ponder 2 these which are Thy revelations, O Mazda!\n\nand the words which were asked (of Thee) by Thy Good Mind (within us), and that whereby we may attain 3 , through Thine Order, to this life's perfection.\n\nYea, how may my soul with joyfulness 4 increase in goodness?\n\nLet it thus 5 be 6 .\n\n9.\n\nThis I ask Thee, O Ahura!\n\ntell me aright, how to myself shall I hallow 7 the Faith of Thy people, p.\n\n116 which the beneficent kingdom's lord hath taught me, even the admonitions which He called Thine equal, hath taught me through His lofty (and most righteous Sovereignty and) Power, as He dwells in like abode 1 with Thine Order and Thy Good Mind?\n\n10.\n\nThis I ask Thee, O Ahura!\n\ntell me aright that holy Faith which is of all things best, and which, going on hand in hand with Thy people, shall further my lands in Asha, Thine order, and, through the words of Âramaiti (our piety), shall render actions just.\n\nThe prayers of mine understanding will seek 2 for Thee, O Ahura!\n\n11.\n\nThis I ask Thee, O Ahura!\n\ntell me aright; how to these your (worshippers) may (that Piety once again and evermore) approach, to them to whom O Lord, Thy Faith is uttered?"

