[content]
body = "He prays that he may know how he may still further sanctify that Religion which the King of the Holy Realm (compare angh e u s vahi s tahyâ pourvîm), the one like Ahura (see Khshmâvatô and thwâvãs, verse 1) would teach, dwelling in the same abode (in which Ahura is also elsewhere said to dwell) with the holy Order, and the Good Mind (see Y.\n\nXLVI, 16).\n\n10.\n\nExpressing all in a single word, he asks Ahura to reveal to him the Daêna, the Insight, the substance of that Religion which was 'of all things best,' and which alone could 'advance the settlements' with the holy ritual and moral Order as its ally, which would also render all their moral and.\n\nceremonial actions, and moral principles just by means of the divine Piety, which was their realisation in practice; and he closes with the exclamation that the wishes and desires of his soul, when most embued with wisdom, will seek for God.\n\n11.\n\nFollowing out the influence of Âramaiti (that personified Piety), he asks to know by what practical means she may approach, and be realised as the characteristic of those to whom the holy Insight should be preached, avowing that God knows how prominent p.\n\n110 he is in his devotion to the matter, and with what hatred seated 'in his spirit,' he views the opposing Gods.\n\n12.\n\nThen casting a searching glance over the masses, and perhaps eyeing their several groups, each headed by its 'chieftainship' (sarden a u s e nghahyâ), he cries, addressing Ahura formally, but the people really (so also elsewhere frequently), and says: 'Who is the righteous believer as regards these my questions asked of God to express my belief in Him, and who is the sceptic?\n\nWhich man does the Angra Mainyu govern; or which is as evil as that chief himself?' And, recalling the galling fact that some are tolerated who not only do not assist but oppose his efforts, and perhaps having some half-convinced sections in full sight, he cries with bitterness: 'Why is this sinner, that chief who opposes me as Angra Mainyu opposed Ahura (compare paiti-eretê with âa t môi paiti-eretê in Vendîdâd I), why is he not believed to be what in very truth he is?\n\nWhy is he still countenanced?' 13.\n\nAnd then with a fierceness which reminds us of sâzdûm snaithishâ (Y.\n\nXXXI, 18), but which is deeper because proposing a less material remedy, he asks: 'Why must we abide the sight of these opposers, representing their Lie-demon as their Goddess?\n\nHow can I drive her hence to Hell beneath, not to those who hesitate like these, pausing before they condemn the evil party, but to those who are already filled with their disobedience, and who, having no communion at all with us, receive no light, like these, from the reflected glory of the truth, and who have moreover neither sought nor shared like these, the counsels of Thy Good Mind."

