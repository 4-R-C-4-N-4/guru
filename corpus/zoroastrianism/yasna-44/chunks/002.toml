[content]
body = "XXXI, 3), and that although as 'the chief of Heaven,' yet also as a benignant friend.\n\n3.\n\nFrom these introductory petitions, inserted perhaps before many lost verses, he proceeds in another tone, although he may still be said to say what is homogeneous to the foregoing: 'Yea, I ask how I may serve Him, O Mazda!\n\nfor He is indeed Thyself, and therefore, to show my fervent homage, I ask: Who was, not the first establisher alone, but the first father, of our holy Order as the personified Immortal, and that not by creation, but by generation, as the parent generates the child?\n\nWho fixed for stars and sun that \"way,\" the undeviating path through space, long noticed and studied by our fathers, as no random course, or unknown progress save Thee?' 4.\n\nThe laws of gravitation then become the theme of his praise still expressed in the form of questions, also the atmospheric phenomena, especially the clouds driven by winds, not like the Maruts beyond the mountains perhaps, but still terrible as winds can be.\n\nBut he cannot leave even the sublime objects of nature without thinking once more of that spiritual power, the strength of righteous character, which was justly more impressive, although still more familiar, and which he designates, as ever, by the 'Good Mind.' Here this great Immortal is left an immortal thought, and is spoken of as 'created,' not 'born' like Asha (in verse third).\n\n5.\n\nBeyond a doubt, recognising the satisfactions of energetic life as well as the solaces of slumber, and as forming by their contrast the necessary p.\n\n109 change which builds up happiness, he alludes to the supreme arranger as 'well-skilled,' and asks: Who so wisely relieved the day by night?\n\nBut, again, he cannot close without reverting to the course of moral duty.\n\n6.\n\nSeized with a doubt which again only heightens the fervour of his assurance, he asks whether indeed the facts which he proclaims are really what they seem.\n\nWhether piety, although aided by the Good Mind, implanted through Ahura's grace within us, will indeed at last, or soon, assign the purified Realm to the servants of Ahura, who were there among the masses before his eyes (taêibyô), or to Ahura Himself as their sovereign controller (taibyô?).\n\nAnd, as including all rural riches in herself, he asks for whom He had made the kine, not now wailing in her grief (Y.\n\nXXIX, 9), but 'delight-affording,' on account of the influence of Piety and Benevolence embodied in the Kingdom, inferring that God had made her for these same (the faithful masses).\n\n7.\n\nAnd going yet further back; he asks who made that paternal and filial Piety itself, together with the Realm which it should leaven?\n\nAnswering his own inquiries by an inference, he adds: I am pressing Thee with fulness in these questions, O Thou bountiful Spirit (compare mainyu s , or mainyû in verse 2), the maker of all (sun, stars, and holy qualities).\n\n8.\n\nTurning now to verbal revelations, he asks by what means his soul may prosper in moral goodness, praying that it may indeed thus advance as the expected answer would declare.\n\n9."

