[content]
body = "It is probable, indeed, that the first Zand was really written in the Avesta language, as we find many traces of such Avesta commentaries interpolated both in the Avesta and Pahlavi texts of the Parsi scriptures; but this is rather a matter of, European inference than of Parsi belief.\n\nThe later (or Pahlavi) Zand appears also, in many places, to be merely a translation of this earlier (or Avesta) Zand, with additional explanations offered by the Pahlavi translators.\n\nRegarding the sacredness of these Pahlavi translations, in the eyes of the Parsis, there can be no manner of doubt, so far as they cannot be shown to be inconsistent with the p.\n\nxi original Avesta text.\n\nBut besides these translations there is another class of Pahlavi religious writings whose authority is more open to dispute.\n\nThese writings are either translations and Zands of Avesta texts no longer extant, or they contain the opinions and decisions of high-priests of later times, when the Pahlavi language was on the decline.\n\nSuch writings would hardly be considered of indisputable authority by any Parsi of the present day, unless they coincided with his own preconceived opinions.\n\nBut for outsiders they have the inestimable value either of supplying numerous details of religious traditions and customs which would be vainly sought for elsewhere, or of being contemporary records of the religious ideas of the Parsis in the declining days of their Mazdayasnian faith.\n\nIt is with a few of such writings this volume has to deal; but before describing them more minutely it will be desirable to give some account of the Pahlavi language in which they are written.\n\nFootnotes x:1 See Haug's Essays, on the Sacred Language, Writings, and Religion of the Parsis, second edition, London, 1878; pp.\n\n121, 122.\n\nNext: 2.\n\nThe Pahlavi Language and Literature"

