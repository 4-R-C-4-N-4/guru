body = "Sacred Texts Zoroastrianism Index Previous Next Buy this Book at Amazon.com Pahlavi Texts, Part I (SBE05) , E.W.\n\nWest, tr.\n\n[1880], at sacred-texts.com p.\n\nix INTRODUCTION TO PAHLAVI TEXTS.\n\nTHOUGH we must look to the Avesta for information regarding the main outlines of the Parsi religion, it is to Pahlavi writings we must refer for most of the details relating to the traditions, ceremonies, and customs of this ancient faith, which styles itself emphatically 'the good religion of the Mazdayasnians,' and calls its laity bahdînân, or 'those of the good religion.' In the fragments of the Avesta which still exist, we may trace the solid foundations of the religion, laid by philosophic bards and lawgivers of old, with many a mouldering column and massive fragment of the superstructure.\n\nerected upon them by the ancient priesthood.\n\nThese are the last remnants of the faith held by Cyrus, the anointed of the Lord (Isaiah xlv.\n\n1), the righteous one (Is.\n\nxli.\n\n2), or eagle (Is.\n\nxlvi.\n\n11), whom He called from the east, and the shepherd who performed His pleasure (Is.\n\nxliv.\n\n28); scattered fragments of the creed professed by Darius in his inscriptions, when he attributes his successes to 'the will of Aûramazdâ;' and mouldering ruins of the comparatively pure religion of oriental 'barbarism,' which Alexander and his civilising Greek successors were unable wholly to destroy, and replace by their own idolatrous superstitions.\n\nWhile in the Pahlavi texts we, find much of the mediaeval edifice built by later Persian priest craft upon the old foundations, with a strange mixture of old and new materials, and exhibiting the usual symptom of declining powers, a strong insistence upon complex forms and minute details, with little of the freedom of treatment and simplicity of outline characteristic of the ancient bards.\n\np.\n\nx To understand the relationship between these two classes of Parsi sacred writings, it must be observed that the Avesta and Pahlavi of the same scripture, taken together, form its Avesta and Zand, terms which are nearly synonymous with 'revelation and commentary.' Both words are derived from verbal roots implying 'knowledge;' Avesta being the Pahlavi avistâk, which may most probably be traced to the past participle of â, 'to,' + vid, 'to know,' with the meaning of 'what is announced' or 'declaration;' and Zand, being the Pahlavi form of Av.\n\nzai n ti (traceable in the word âzai n ti s ), must be referred to the root zan, 'to know,' with the meaning of 'knowledge, understanding 1 .' European scholars, misled probably by Muhammadan writers, have converted the phrase 'Avesta and Zand' into 'Zend-Avesta,' and have further identified Zand with the language of the Avesta.\n\nThis use of the word Zand is, however, quite at variance with the practice of all Parsi writers who have been independent of European influence, as they apply the term Zand only to the Pahlavi translations and explanations of their sacred books, the original text of which they call Avesta.\n\nSo that when they use the phrase 'Avesta and Zand' they mean the whole of any scripture, both the Avesta text and Pahlavi translation and commentary.\n\nAnd the latter, being often their only means of understanding the former, has now become of nearly equal authority with the Avesta itself."

