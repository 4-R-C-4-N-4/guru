[content]
body = "Aye, let the zealous and thrifty husbandman, so formed for giving help and blessings 2 , give heed and listen when I call, (O Mazda!) Let not the truthful (tiller, he who hears and speaks Thy word 3 ), be he who takes 4 that sheltering chieftainship together with the wicked.\n\nLet the believing natures (only) join in that best recompense.\n\nAnd thus in the course of the holy Order are in the fact so joined those two, G âmâspa and the 'hero' 5 .\n\n10.\n\n(And since these champions thus join in that reward), then therefore will I place as well in Thy p.\n\n167 protection (Thy) Good Mind 1 (in the living) and the spirits (of the dead.\n\nYea, I confide our very) self-humbling praises, (which we offer, unto Thee), by which (Thine) Âramaiti (who is our Piety, exists), and likewise sacrificing zeal.\n\nAnd this would we do to further Thy great Sovereign Power (among Thy folk), and with undying 2 (?) strength.\n\n11.\n\n(But as to faithless reprobates); the souls (of the evil dead) shall meet those evil men who serve their evil rulers, who speak with evil words, and harbour evil consciences, these souls (in Hell) shall come with evil food 3 (to welcome them), and in the Lie's abode their dwelling 4 verily shall be 5 !\n\nFootnotes 162:1 If this word does not simply mean 'a band,' one might suspect a relation of root with bãnayen.\n\nThe Pahlavi has expressively and freely badtûm here, and vîmarîh in the next verse, with a like word in Y.\n\nXXX, 6.\n\nThis enemy may have been roughly dubbed 'the polluted,' or even 'diseased one;' analogous occurrences are not wanting.\n\n162:2 I cannot agree to rendering ashâ 'really,' when applied in an evil sense.\n\nThe sacred word may mean 'really' when applied to the righteous, but then, in that case, the reality indicated has an element of sanctity in it, and that of no low order.\n\nI am also not aware that ri téna is applied in an evil sense in the Ri g-veda.\n\nThe use of Asha, like that of Vohu Manah and Khshathra, &c., is obvious in the Gâtha; the six sacred words were, like the theme of a symphony, brought in at every opportunity, with all shades of meaning from those of proper names to those of adverbs.\n\nWith slight change of text to a nom., we might render, 'He who seeks to please the evil-minded, O Thou A.!' 162:3 Comp.\n\nY.\n\nXXXIII, 2, 162:4 I cannot agree that arapâ should be read rapâ for the sake of a syllable in the metre.\n\nThe line has more than eleven syllables here, as the Vedic Trish t up often has.\n\nMoreover the ancient writing before the Pahlavi translator read likewise arapâ, and the sense demands it.\n\n162:5 Or, 'may I obtain.' 162:6 See Y.\n\nLIII, 9.\n\n162:7 See the first verse.\n\n163:1 I would gladly accede to a subjunctive 2nd singular intensive here in a causative sense, but a 3rd singular precedes, and a 3rd singular follows.\n\nI cannot therefore recognise a subjunctive in a precative, or imperative, sense here.\n\nI think the word is a nominative, as its position in the verse corresponds well to that form."

