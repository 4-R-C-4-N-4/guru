[content]
body = "(And I do not ask in vain, for such an one is found for us, and near at hand.) To Frashao s tra hast Thou given that most favouring guardian power, the headship 5 of the Holy Order (for us), O p.\n\n166 [paragraph continues] Ahura!\n\nThis therefore would I pray of Thee (to confirm to him that gracious gift), and for myself likewise, would I now seek as well that sheltering headship which is within Thy Realm; yea, most blest and foremost 1 may we both for ever be within it.\n\n9.\n\nAye, let the zealous and thrifty husbandman, so formed for giving help and blessings 2 , give heed and listen when I call, (O Mazda!) Let not the truthful (tiller, he who hears and speaks Thy word 3 ), be he who takes 4 that sheltering chieftainship together with the wicked.\n\nLet the believing natures (only) join in that best recompense.\n\nAnd thus in the course of the holy Order are in the fact so joined those two, G âmâspa and the 'hero' 5 .\n\n10.\n\n(And since these champions thus join in that reward), then therefore will I place as well in Thy p.\n\n167 protection (Thy) Good Mind 1 (in the living) and the spirits (of the dead.\n\nYea, I confide our very) self-humbling praises, (which we offer, unto Thee), by which (Thine) Âramaiti (who is our Piety, exists), and likewise sacrificing zeal.\n\nAnd this would we do to further Thy great Sovereign Power (among Thy folk), and with undying 2 (?) strength.\n\n11.\n\n(But as to faithless reprobates); the souls (of the evil dead) shall meet those evil men who serve their evil rulers, who speak with evil words, and harbour evil consciences, these souls (in Hell) shall come with evil food 3 (to welcome them), and in the Lie's abode their dwelling 4 verily shall be 5 !"

