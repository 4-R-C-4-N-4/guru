[content]
body = "161 highest offence, not failing to point out what should conciliate sympathy with him always; that is, that those who brought the Daêvas, and opposed Asha, were the devotees of Rapine (aêshmem vareden); for murderous rapine seems to have been, apart from Asha, the universal sin.\n\nBy this these Daêva-worshippers gained a stolen livelihood, and spent their ill-gotten means in idle waste (fshuyasû afshuya n tô).\n\n5.\n\nBut he who defended the holy Daêna was as meat and drink to the people, wise and faithful, as a settled citizen, and trained in the habits of the holy State.\n\n6.\n\nHe therefore prays once more for right discernment as to how he may propagate the Faith.\n\n7.\n\nAnd he calls on the steady citizen to listen, beseeching God Himself to give an ear, and to tell him who the faithful prince, or peer, or villager, may be, who may take the lead (see sar e ) in giving forth (see srâvayaêmâ) that holy Daêna, with its frasasti, to the masses who await it.\n\n8.\n\nBut he asks the question as if only to give emphasis to his naming a chief and venerated friend.\n\nFrashao s tra is the man.\n\nHe is the one fitted for the hearing, apt to proclaim the truth (frasrûidyâi erethwô).\n\nAnd he begs that they both (compare Y.\n\nXXVIII, 9) may be lastingly prominent in that holy Realm which was to counteract the depraved polity whose chief had for the moment gained the upper hand (verses 1, 2).\n\n9.\n\nBut the case is in so far uncertain and undecided, that he cries for help once more to the ideal citizen himself, fearing that he may yet be induced to share the power with the heretic, and still declares that men's souls may reach the reward of priority only through the holy System of Ahura, and under the rulers of His choice.\n\n10.\n\nHe therefore confides the result to Ahura, and with it, his dependents, those living and those dead.\n\nAnd his thoughts, being turned to heaven (11), they also revert as if by antithesis (the key-note of the Daêna) to future retribution.\n\nThose who may be wavering, half-inclined to adhere to the opposing party (verse 9), are warned in words of peculiar meaning.\n\nThose that choose the evil sovereign, a du s sasti, as in Y.\n\nXXXII, 9, or as the sastars of Y.\n\nXLVI, 1, will not go forward with the saints to the K inva t (Y.\n\nXLVI, 10), nor will they be met by their consciences under pleasing images, and later by the souls of saints who had gone before, but the wicked dead shall meet them in the home of Lies, with poisoned food, and sneering words.\n\nAnd this shall be a self-inflicted vengeance.\n\np.\n\n162 Translation.\n\n1.\n\nB e n dva 1 has ever fought with me; (yea, since he first appeared at hand to threaten, and alas to his advantage in the strife) He is the most powerful (in brutal might), and (in his predominance) would crush my strength as I seek to win back the disaffected (in my host) through Righteous 2 (zeal), O Mazda!\n\nCome then with gifts of (vengeful 3 ) good to (meet) my sorrow 4 .\n\nThrough (Thine inspiring) Good Mind obtain (for me 5 ) that (B e n dva's) death 6 !\n\n2.\n\n(Aye, he is indeed the greatest 7 ), for that p."

