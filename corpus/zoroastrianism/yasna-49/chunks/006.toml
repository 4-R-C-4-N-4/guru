[content]
body = "It is a half answer, even if we render d a u (dâo) as a subjunctive.\n\nAs the question in verse 7 certainly concerns a chief of some kind, I cannot see how we can avoid rendering sar e m analogously.\n\nWe need one who gives a refuge rather than one who receives it.\n\nCompare the Pahlavi, and also the Persian, sar.\n\nThe Pahlavi p.\n\n166 translation gives its evidence without intermission for this meaning, a fact largely overlooked.\n\n166:1 I think that the connection fairly proves this meaning; and it has likewise the powerful support of the Pahlavi translation: Hamâi vad avŏ vîspŏ farmânpatŏ hômanânî [aîgh, Frasho s tar [ ] vad tanû î pasînŏ hamâî s alîtâîh yehabûn].\n\n166:2 It is not to be forgotten that su is the root of Saoshya n t.\n\n166:3 Comp.\n\nY.\n\nXXXI, 15.\n\n166:4 Or 'gives;' compare peresâ ava t yâ maini s y e dregvâitê khshathrem hunâitî.\n\nProfessor Jolly, V.S., s.\n\n36: 'Nicht soll wer das Rechte redet, die Herrschaft dem Lügner überlassen.' 166:5 Yâhî remains a singular, whereas we should expect a dual; (can it be such, the form being altered, as so often by later reciters, to accommodate the metre?) For G âmâspâ and yukhtâ as duals compare utayûitî tevîsht.\n\nYâhî probably refers to Vî s tâspa (Y.\n\nXLVI, 14).\n\nWas it an especial epithet for the kings?\n\nThe later Persian kings took prominent places in battle.\n\nIf the duals are not admitted, my rendering would be, 'the souls are united with the reward through the (influence and example of the) valiant G âmâspa.' Perhaps G âmâspô is to be read.\n\n167:1 This is probably the foundation for the later identification of Vohû Manah and the faithful disciple.\n\n167:2 Here all is conjectural.\n\nThe Pahlavi reports an adjective from a form of man (or a participle).\n\nThey who think upon the throne (to seize it) do so with dying power.\n\nWilder conjectures have been made; but the Pahlavi translators seldom wilfully guessed.\n\nThey took the shattered results of their predecessors, and worked them feebly over; hence their great value, and the unimportance of their errors.\n\nThey used what intelligence they possessed in redelivering what they heard and read.\n\nVazdanghâ cannot well be taken in an evil sense, as it is used in a good sense elsewhere.\n\nThe connection mãzâ with râ has long circulated; mãzâ avêmî râ (?).\n\nAs the souls of the departed are thought of, perhaps 'undying' is the meaning; compare av e mîra (for form) with the Zend avimithri s .\n\n167:3 See Ya s t XXII by Darmesteter, as supplemented.\n\n167:4 So the Pahlavi; otherwise 'their bodies shall so lie.' 167:5 Verse 12 belongs to the next chapter.\n\nNext: Yasna L"

