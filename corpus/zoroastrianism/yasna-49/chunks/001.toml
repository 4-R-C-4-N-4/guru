[content]
body = "1.\n\nB e n dva 1 has ever fought with me; (yea, since he first appeared at hand to threaten, and alas to his advantage in the strife) He is the most powerful (in brutal might), and (in his predominance) would crush my strength as I seek to win back the disaffected (in my host) through Righteous 2 (zeal), O Mazda!\n\nCome then with gifts of (vengeful 3 ) good to (meet) my sorrow 4 .\n\nThrough (Thine inspiring) Good Mind obtain (for me 5 ) that (B e n dva's) death 6 !\n\n2.\n\n(Aye, he is indeed the greatest 7 ), for that p.\n\n163 [paragraph continues] B e n dva's evil judge doth cause me to hesitate and ponder (in my earnest course of propagation and reform), a deceiver as he is, (estranged) from the Righteous Order, and receiving 1 from it (not happiness) but many a wound.\n\nThe bountiful and perfect Piety he has not maintained nor strengthened for this 2 land, nor questions with Thy Good Mind hath he asked 3 (to gain him light), O Lord!\n\n3.\n\nBut (all is not yet lost!); for this religious choice 4 (our holy creed, for which our last lost 5 battle has been fought), O Mazda!\n\nThy blessed Order (our guardian help) has yet been set to save and bless us.\n\n(But) for (that evil) Judge, the Demon-of-the-Lie, (is set) to deal (for him) her wounds 6 .\n\nTherefore do I pray (the more) for the sheltering leadership of Thy Good Mind (within our folk and our commanders).\n\nAnd all the allies of the wicked I abjure 7 .\n\n4.\n\nThey who with evil scheme and will shall cherish and help on the Wrath of Rapine, and with her Râma 8 , and (not by silent favour, but) with their p.\n\n164 very tongues, whose will and wish 1 (run) not with good but evil deeds.\n\nThese settle and support the Daêvas (in their power, not the Lord).\n\nIt is 2 the wicked's Faith and Insight (so to do.\n\nTheir faith is the perverted).\n\n5.\n\nBut he, O Mazda!\n\nis our abundance and our fatness 3 , who (will yet dare these unbelieving foes) and guard the Faith (against that envious Wrath 4 ), and with the Good Mind's power.\n\nFor every man of Piety is a wise citizen 5 in accordance with the holy Order, and so are all who are (in truth) within Thy Realm, O Lord!\n\n6.\n\nAnd now, will I beseech of You, O Mazda, and Righteousness (within Thy Mãthra) speaks 6 (to tell me) what lies within Your will's intention, that (having discerned Your Insight as the enlightened p.\n\n165 ever must), I may as well discern aright how we can herald forth those (truths), and that pure Daêna (with them) which is the Faith of Him who is Thyself 1 , O Lord.\n\n7, And (as we speak it forth as taught by Asha) then let the (zealous 2 citizen) give heed, and with Thy Good Mind, O Ahura Mazda!\n\nYea, let him give ear in accordance with (the dictate of) the Holy Order, and do Thou hear alike as well 3 .\n\nWho shall be the ally; and who the kinsman-lord himself, who, with his gifts and (legal rules), shall institute and settle for the serving mass a worthy praise (for God 4 )?\n\n8."

