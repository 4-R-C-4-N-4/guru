body = "Sacred Texts Zoroastrianism Index Previous Next Buy this Book at Amazon.com The Zend Avesta, Part III (SBE31) , L.H.\n\nMills, tr.\n\n[1886], at sacred-texts.com YASNA XLIX.\n\nREVERSES AND HOPES.\n\nHONOUR TO FRASHAO S TRA AND OTHER CHIEFS.\n\nThe chapter divides itself naturally into sections 1-5, 6-11.\n\nVerse 12 belongs with chapter L.\n\nOne of the struggles in the holy cause seems to have gone against the party of Asha.\n\nI say 'one p.\n\n160 of the struggles,' for from the account of a reverse which we have here, and from that of a success which meets us in chapter XLV, 1, and again from reverses in XLVI, 1, 2, &c., we naturally conclude that 'the cause' saw many vicissitudes, in which the last Gâtha still leaves us.\n\nWhether Y.\n\nXLV, 1 records a victory which was subsequent to the reverse before us, referring to a battle alluded to in Y.\n\nXLIV, 14, 15, also possibly anticipated in Y.\n\nXXXI, can never be decided; the order of the statements in the sequence of our present MSS.\n\nhas little or nothing to do with the possible order of the events.\n\n1.\n\nA border chief, B e n dva by name, had proved himself too formidable (mazi s tô) for the moment, and the holy Faith knows how to beg for vengeance on the armed Drû g -worshipper.\n\nThe weapons of Ahura were not spiritual only, any more than those of Israel were, or those of Mohammed.\n\nThe death of an armed religious enemy was devoutly to be desired for every moral and political, as well as for every personal reason.\n\n2.\n\nFor judicial as well as priestly decisions hung on the issue.\n\nAnd this B e n dva had his functionaries and a system, and they were in full and active operation.\n\nAnd this was, beyond a doubt, a rival and settled system, and not merely an upstart and insurrectionary one.\n\nIt had caused the true prophet many an hour of thought as well as anger.\n\nIts functionaries gave him pause (mânayêitî).\n\nFalsity in religion was as ever his opportunity; and invective follows.\n\n'The priestly judge himself who served the Drû g -worshippers was a cheat.' 'The holy Order was his foe, and not his helper.' And he did not contribute at all to the spread of Piety as the Zarathu s trians conceived of it, nor indeed really in another sense for the reason that he even repudiated the source of pious wisdom, which is holy counsel.\n\n3.\n\nBut, however, the evil functionaries might resort to subterfuge and strategy, the opposing powers themselves, the Righteous Order on the one side, and the power of the Lie-demon on the other, were planted in the opposing systems with dualistic clearness, to benefit or injure.\n\nThere was no compromise, as doubtless the Drû g -party may have wished.\n\nAnd so the poet cries once more for the divine Benevolence to be his guardian; or perhaps he may have intended a particular chief who represented the Good Mind, while at the same time he swept the entire throng and company who adhered to the Lie-demon, with his interdict, away from his consideration.\n\n4.\n\nHe declares them closely allied to the Daêva-worshippers, or else he puts their worship of the Daêvas in the place of climax as their p."

