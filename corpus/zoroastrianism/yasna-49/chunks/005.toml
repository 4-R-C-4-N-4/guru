[content]
body = "163:7 The Pahlavi translator gave as our first rendering here: Andarg harvîsp-gûnŏ darvandânŏ min hamkhâkîh andarg yemalelûnam; [aîgh, min dôstîh î levatman valman s ân g avî d âk yehevûnam].\n\n163:8 The Pahlavi has arêshkŏ = envy.\n\n164:1 The Pahlavi gave us our first surmise as to the general meaning of vãs; it renders kâmak.\n\n164:2 Or, 'by that which is the evil's Faith.' 164:3 The Pahlavi translator gave us our first general indication here as elsewhere; he has shîrînîh and k arpîh.\n\nReading 'Mazd a u,' we have 'Mazda (is our source of) abundance and refreshment.' 164:4 See the fourth verse.\n\n164:5 The Pahlavi has, however, khûp shinâsakîh.\n\nI differ with hesitation; possibly views may be harmonised.\n\n164:6 Compare Y.\n\nXXIX, 3, where Asha answers.\n\nI cannot well accept mrûitê as an infinitive.\n\nGeldner has keenly pointed out that fraêshyâ is inclined to unite with an infinitive, but so are other forms of ish and vas.\n\nMoreover the infinitive does not so naturally fall to the end of the sentence in Gâthic or Vedic.\n\n(See above, note on Y.\n\nXXXIV, 1.) If an infinitive is insisted upon (so long since) let us at least bring the word into more usual shape, using the Pahlavi translator, as in one of his most valuable offices, as an indirect evidence, where his translation is at fault as a rendering.\n\nHe has: Frâzŏ avŏ zak î Lekûm farmâyêm, Aûharmazd, va Ashavahi s tŏ k râî yemalelûnam.\n\nHe had 'mrûvê' before him, which might be an infinitive.\n\n165:1 I think that khshmâvatô equals simply 'yourself' here, as often (so mava n t = me); otherwise 'of your disciple,' which would be feeble.\n\nProfessor Jolly has, V.S., s.\n\n97, 'damit wir ihn verkündigen möchten den Glauben, welcher der euere ist, o Ahura.' 165:2 See the ninth verse.\n\n165:3 Ahura is elsewhere addressed in close connection with human beings; here the human subject is half lost in Vohûman and Asha.\n\nI hardly think that it is wise to change the text without MSS.\n\nA lost verse may have relieved all difficulty.\n\n165:4 Others 'the good doctrine,' or again 'the good repute;' but as to the latter, frasasti is coupled so constantly in the later Avesta with yasna, and vahma, &c., that I do not feel at liberty to depart from that sense.\n\nThe Pahlavi has also vâfrîgânîh, quite in harmony with the connection.\n\n165:5 This verse is clearly an answer to the questions contained in verse 7.\n\nIt is a half answer, even if we render d a u (dâo) as a subjunctive.\n\nAs the question in verse 7 certainly concerns a chief of some kind, I cannot see how we can avoid rendering sar e m analogously.\n\nWe need one who gives a refuge rather than one who receives it.\n\nCompare the Pahlavi, and also the Persian, sar.\n\nThe Pahlavi p."

