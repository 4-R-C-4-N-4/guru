[content]
body = "(Yea, tell me the secret of the future struggle 1 ; for that enlightened man) must 2 follow close 3 the holy Faith (for which that struggle had its toil and effort).\n\nYea, O Mazda!\n\nhe who would bend his mind (till it attains to) that which is the better and more holy, must pursue the Daêna close in word and action.\n\nHis will and wish must be consistent with his chosen creed and fealty, and in Thine Understanding (which discerneth all) shall he in many ways 4 be (versed) at last!\n\n_________________________ 5.\n\n(But while I as yet know not the issue, I can yet hope and pray.) Let the good kings obtain the rule.\n\nLet not the evil monarchs govern us 6 , (but let the righteous gain the day and rule us), with deeds done in a good discernment, O thou pious wisdom, Âramaiti!\n\nsanctifying to men's minds the best of blessings for (their) offspring 7 .\n\nYea, for the Kine, (O Âramaiti 5 !) p.\n\n156 let (Thy) toil be given 1 , and may’st Thou cause her to prosper for our life.\n\n6.\n\nFor she will grant us pleasing homes 2 , and, (while we live) in this Thy Good Mind's longing 3 prayer (to gain her welfare), she grants us likewise lasting strength (for every deed which that Thy Good Mind moves us to perform), and therefore hath Mazda caused the plants 4 to flourish for her (nurture), He, Ahura, in the generation of primeval life.\n\n_________________________ 7.\n\n(Then in our coming strife 5 let both her mortal foes be slain.) Let the Wrath-demon of rapine be cast down.\n\nSmite ye against the envy (which would plot against our Throne 6 ), O ye who, abiding by the Good Mind, and in accordance with our holy Order, desire to hold that refuge 7 fast, to whose sacred bond the bounteous man belongs.\n\nAnd therefore, p.\n\n157 [paragraph continues] O Ahura!\n\n(to save Thy struggling saint who toils with changing lot) will I place (that refuge) for him in Thy world.\n\n8.\n\n(And how shall I beseech Thee for this victory and gift?) What is the (potent 1 ) prayer to bring on that Thy holy Reign 2 ?\n\nWhat for Thy sacred reward and blessing for my (soul)?\n\nHow shall I seek the open helpers for (the spread and maintenance of) Thy (great) Order 3 , while I myself live 4 on in Thy Good Spirit's deeds?\n\n9.\n\n(Aye, when shall faith be changed to sight 5 ); and when shall I in verity discern if Ye indeed have power over aught, O Lord!\n\nand through Thy Righteous Order (guarding here on earth), O Thou within whose (power lie) my griefs 6 and doubts?\n\nLet then Thy saving prophet find and gain aright (for) my delight 7 Thy Good Mind's wonder-working p.\n\n158 grace 1 ; yea, let Thy Saoshya n t see how gifts of recompense may be his own.\n\n10.\n\nWhen, Mazda!\n\nshall the men of mind's perfection come 2 ?\n\nAnd when shall they drive 3 from hence, the soil of this (polluted) drunken joy 4 , whereby the Karpans with (their) angry zeal would crush us 5 , and by whose inspiration the tyrants of the provinces (hold on) their evil rule 6 ?\n\n11.\n\nYea, when shall our perfected Piety appear p.\n\n159 together with 1 Thy Righteousness?"

