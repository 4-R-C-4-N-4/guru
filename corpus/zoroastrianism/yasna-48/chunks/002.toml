[content]
body = "Again he utters a cry for relief in his suspense, and of entreaty for light as to the rewards, which did not concern this life for its own sake (verse 1) merely or chiefly; but which were spiritual blessings received here in preparation for the spiritual world.\n\n10.\n\n'When,' he repeats as one among similar questions four times repeated, 'when shall the ideal men appear whose thoughtful plans (Y.\n\nXLVI, 3) shall drive hence the polluted schemes of the false priests and of the tyrants (Y.\n\nXLVI, 1)?\n\n11.\n\nAnd when shall Âramaiti, the kindly piety of home, appear, she who, like the earth, spreads pastures for the peaceful kine, when shall she appear with holy Khshathra (later well called an angel, or archangel) the personified Authority of God over home and state, without which p.\n\n153 an anarchy as bad as that of the Evil Authority (verse 5) might continue or recur; and who was the champion-chief who would give them peace through blood (Y.\n\nXLVI, 4; LIII, 9)?\n\nIn a word, to whom, as to the coadjutors of such a leader, would the light of reason, and the true faith come to inspire and to guide them?' 12.\n\nThere is but one only class of human combatants whom he would thus match against that Demon of furious Rapine (v.\n\n6), toward whom the evil on their part at their first creation rushed as to their leader (Y.\n\nXXX, 6), and these are the saving Saoshya n ts, the vicegerents of the Immortals upon earth, the religious princes Vî s tâspa, G âmâspa, Frashao s tra, and with them, as the greatest among all, he who was, with much probability, the speaker in the passage, that is, the Ratu appointed by Ahura for the kine and for men, Zarathu s tra Spitâma elsewhere and later called, with hyperbole, the first tiller, warrior, and priest.\n\nTranslation.\n\n1.\n\nIf through his action 1 in the offering of gifts in accordance with the Righteous Order, (Thy saint 2 ) shall smite the Demon-of-the-Lie (the inspiring spirit of our foes), when that in very truth shall come 3 , which has been (and is still yet) proclaimed as a deceit 4 , (when it shall come) in the Immortal life, regarding (as it does both) men (to bless), and Daêvas 5 (to afflict them), then shall (Thy faithful worshipper) increase thereby the celebration of Thy praise, O Lord!\n\nand with it blessings 6 (for Thy folk).\n\n2.\n\nTell me then, Lord?\n\n(the end), for Thou dost p.\n\n154 know it.\n\n(Tell me to grant me strength and courage) before those conflicts come which shall encounter me 1 (as leader of Thy tribes); shall the champion of Thy holy Order, O Ahura!\n\nsmite (at last) the evil heretic, and when?\n\n(I ask Thee this); for this if it be gained (is known) to be the (one) good consummation 2 of (our) life.\n\n3.\n\n(Yea, tell me then this), for to the enlightened 3 man is that the best of teachings which the beneficent Ahura doth proclaim, and through (the revelations of) His holy Order, bounteous as he and wise with His intelligence, as well as they 4 who declare to us (still other) secret sayings (in His name).\n\nThe one like Thee (their chieftain 5 ) is, O Mazda!\n\nendowed with Thy Good Mind's understanding thoughts.\n\np.\n\n155 4."

