[content]
body = "157 [paragraph continues] O Ahura!\n\n(to save Thy struggling saint who toils with changing lot) will I place (that refuge) for him in Thy world.\n\n8.\n\n(And how shall I beseech Thee for this victory and gift?) What is the (potent 1 ) prayer to bring on that Thy holy Reign 2 ?\n\nWhat for Thy sacred reward and blessing for my (soul)?\n\nHow shall I seek the open helpers for (the spread and maintenance of) Thy (great) Order 3 , while I myself live 4 on in Thy Good Spirit's deeds?\n\n9.\n\n(Aye, when shall faith be changed to sight 5 ); and when shall I in verity discern if Ye indeed have power over aught, O Lord!\n\nand through Thy Righteous Order (guarding here on earth), O Thou within whose (power lie) my griefs 6 and doubts?\n\nLet then Thy saving prophet find and gain aright (for) my delight 7 Thy Good Mind's wonder-working p.\n\n158 grace 1 ; yea, let Thy Saoshya n t see how gifts of recompense may be his own.\n\n10.\n\nWhen, Mazda!\n\nshall the men of mind's perfection come 2 ?\n\nAnd when shall they drive 3 from hence, the soil of this (polluted) drunken joy 4 , whereby the Karpans with (their) angry zeal would crush us 5 , and by whose inspiration the tyrants of the provinces (hold on) their evil rule 6 ?\n\n11.\n\nYea, when shall our perfected Piety appear p.\n\n159 together with 1 Thy Righteousness?\n\nWhen shall she come, as having the amenities of home for us, and provided (like our land) with pastures 2 (for the kine)?\n\nAnd who shall give us quiet 3 from the cruel (men) of evil life and faith?\n\nTo whom shall Thy Good Mind's sacred wisdom come (to guide them in their toil to rescue and avenge us)?\n\n12.\n\n(To whom?\n\nThe answer lieth near.) Such shall be the Saviours of the Provinces, and they who, through Thy Good Mind's grace, shall go on hand in hand with mental keenness 4 (as it spreads among Thy saints) by the doing every deed of Thy commandment, O Ahura!\n\nthrough the help of, and in accordance with, Thy Holy Order; for such as these are set (for us), as steadfast foes of hate!"

