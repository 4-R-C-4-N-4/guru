[content]
body = "When shall she come, as having the amenities of home for us, and provided (like our land) with pastures 2 (for the kine)?\n\nAnd who shall give us quiet 3 from the cruel (men) of evil life and faith?\n\nTo whom shall Thy Good Mind's sacred wisdom come (to guide them in their toil to rescue and avenge us)?\n\n12.\n\n(To whom?\n\nThe answer lieth near.) Such shall be the Saviours of the Provinces, and they who, through Thy Good Mind's grace, shall go on hand in hand with mental keenness 4 (as it spreads among Thy saints) by the doing every deed of Thy commandment, O Ahura!\n\nthrough the help of, and in accordance with, Thy Holy Order; for such as these are set (for us), as steadfast foes of hate!\n\nFootnotes 153:1 The Pahlavi has also pavan zak dahi s nŏ; but a false gloss gives an erroneous concrete [pavan tanû î pasînŏ].\n\nRecall âdâi paitî.\n\n153:2 See ashaônô, ashâunê (sic) (Y.\n\nXLVII, 4, 5).\n\n153:3 Read 'as âshûtâ'—has been pushed on, enacted.\n\nI correct here as seems so evidently necessary; but the Pahlavi anticipates with its amat zak yâmtûnê d .\n\n153:4 Pavan friftârîh.\n\n153:5 See Y.\n\nXXIX, 4.\n\n153:6 See Y.\n\nXXX, 11, sava k â ashavabyô.\n\n154:1 M e n g = mãm or man; - e n g is the nasalised vowel.\n\nMan is suspiciously significant here; 'mental battles' is rather advanced for the circumstances.\n\nIt is, however, not impossible.\n\nThe Pahlavi favours mãm (?) here; it has avŏ li.\n\nWe might even read m e nâ on its evidence.\n\nThe Pahlavi indicates the meaning 'crises' under the figure of the 'Bridge,' which was the last great crisis to every man in the eye of the earlier, as well as of the later, Faith; so also in Y.\n\nLI, 12.\n\nThe 'straits of life' would be an admirable meaning; I differ with hesitation.\n\n154:2 Pahlavi kar d ârîh.\n\n154:3 See Y.\n\nXLIII, 14.\n\n154:4 Yaê k î t gûzrâ-s e ngh a unghô.\n\nOr, 'knowing also those who are the teachers of secret doctrines.' 154:5 We may, with some effort, connect thwâvãs with vaêdemnâi.\n\nSpe n tô vîdv a u, however, must refer to the immediately foregoing Ahurô, especially in view of the tv e m vîdv a u, Ahurâ, of verse 2.\n\n'The one like Thee' might even, as in other cases, be only an oblique way of rendering 'Thyself;' but the expression 'with the understanding of Vohu Manah' induces me to refer the word Thwâvãs to the servant of Ahura; in this case, however, this last line must of course be drawn to verse 4, although not mechanically separated from verse 3.\n\n155:1 See verse 2.\n\n155:2 Present for imperative, as sometimes in modern languages in giving directions.\n\n155:3 The words are anticipated from the third line.\n\n155:4 I follow the Indian sense here with great reluctance."

