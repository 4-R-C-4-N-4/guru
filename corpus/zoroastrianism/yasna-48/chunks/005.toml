[content]
body = "Nanâ may well be, in Iranian, equivalent to 'each several one,' and in fact may not impossibly teach us the origin of the word ('man, man.' comp.\n\nnar e m,* nar e m*).\n\nThe Pahl.\n\ntrlr.\n\nis so decided for a personal sense, that he renders gabrâ nê s man = man and woman.\n\nDid he suppose 'woman' to be literally (!) expressed in the text?\n\n155:5 Âramaiti is addressed, unless indeed an instrumental is read without MSS.\n\nAn instrumental is of course preferable.\n\n155:6 The Pahlavi has, with admirable freedom, zakatŏ hû-khû d âî pâ d akhshâyîni s n, va al lanman zak î dû s -khû d âî s alîtâ yehavûnâ d ŏ.\n\nI read hukhshathrâ khshaye ñ tãm, mâ n e dû s -khshathrâ, to bring the metre somewhat into order, as some gross irregularity is present; the caesura only, not the sense, is affected by the change.\n\n155:7 Or, 'from the birth-hour on;' so the Pahlavi.\n\nIts gloss reads [akhar min zerkhûni s nŏ avinâsîh pâhlûm].\n\n156:1 So Bartholomae, who now holds to a third singular here, leaving the text undisturbed, and explaining as an optative.\n\n156:2 The Pahlavi seems to render 'comfort' here, using khvârîh in that sense.\n\n156:3 So the Pahlavi correctly indicates by its arzûk; Ner.\n\npriyataram.\n\n156:4 Compare Y.\n\nLI, 7.\n\nAre the plants here mentioned as in connection with Âramaiti in her figurative association with the earth?\n\n156:5 See verses 1, 2.\n\n156:6 Or, 'against the blow,' Y.\n\nXXIX, 1.\n\nThe Pahlavi translator here renders pa d îrak î arêshak, while in Y.\n\nXXIX, 1 he renders î rêshkûn.\n\nThe variations are probably not real; the renderings referring to some forgotten differences of text; or, as often, he may have anticipated modern freedom, and 'changed his text;' that is, rendered it as if changed to a seemingly more intelligible form; so in a throng of similar cases.\n\nThis is the only rational explanation of some of his errors.\n\n(He was able to render, and has rendered, most grammatical forms in different places.) 156:7 The Pahlavi has, however, navîdîh.\n\nDid he read vidhyãm, in itself a very possible text?\n\n157:1 Compare e mava n tem aêshem, also peresâ n a u yâ tôi e hmâ par s tâ.\n\nObserve that the Pahlavi translator distinguishes the two senses of î s ti.\n\nIn Y.\n\nXLVI, 2 he transcribes the Gâthic word, the Persian rendering ‘hezânah; Ner.\n\npu n yalakshmîm; here, however, he has: Ka d âr lak, Aûharmazd, zak î s apîr khvahî s n î khû d âyîh.\n\n157:2 Compare verse 5.\n\n157:3 Ashâ might certainly equal á kh â here (so Bartholomae) if the constant and intentional repetition of the name and idea of Asha, = the personified Order, would not have caused confusion."

