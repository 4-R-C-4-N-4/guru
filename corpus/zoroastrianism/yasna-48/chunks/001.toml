[content]
body = "1.\n\nIf through his action 1 in the offering of gifts in accordance with the Righteous Order, (Thy saint 2 ) shall smite the Demon-of-the-Lie (the inspiring spirit of our foes), when that in very truth shall come 3 , which has been (and is still yet) proclaimed as a deceit 4 , (when it shall come) in the Immortal life, regarding (as it does both) men (to bless), and Daêvas 5 (to afflict them), then shall (Thy faithful worshipper) increase thereby the celebration of Thy praise, O Lord!\n\nand with it blessings 6 (for Thy folk).\n\n2.\n\nTell me then, Lord?\n\n(the end), for Thou dost p.\n\n154 know it.\n\n(Tell me to grant me strength and courage) before those conflicts come which shall encounter me 1 (as leader of Thy tribes); shall the champion of Thy holy Order, O Ahura!\n\nsmite (at last) the evil heretic, and when?\n\n(I ask Thee this); for this if it be gained (is known) to be the (one) good consummation 2 of (our) life.\n\n3.\n\n(Yea, tell me then this), for to the enlightened 3 man is that the best of teachings which the beneficent Ahura doth proclaim, and through (the revelations of) His holy Order, bounteous as he and wise with His intelligence, as well as they 4 who declare to us (still other) secret sayings (in His name).\n\nThe one like Thee (their chieftain 5 ) is, O Mazda!\n\nendowed with Thy Good Mind's understanding thoughts.\n\np.\n\n155 4.\n\n(Yea, tell me the secret of the future struggle 1 ; for that enlightened man) must 2 follow close 3 the holy Faith (for which that struggle had its toil and effort).\n\nYea, O Mazda!\n\nhe who would bend his mind (till it attains to) that which is the better and more holy, must pursue the Daêna close in word and action.\n\nHis will and wish must be consistent with his chosen creed and fealty, and in Thine Understanding (which discerneth all) shall he in many ways 4 be (versed) at last!\n\n_________________________ 5.\n\n(But while I as yet know not the issue, I can yet hope and pray.) Let the good kings obtain the rule.\n\nLet not the evil monarchs govern us 6 , (but let the righteous gain the day and rule us), with deeds done in a good discernment, O thou pious wisdom, Âramaiti!\n\nsanctifying to men's minds the best of blessings for (their) offspring 7 .\n\nYea, for the Kine, (O Âramaiti 5 !) p.\n\n156 let (Thy) toil be given 1 , and may’st Thou cause her to prosper for our life.\n\n6.\n\nFor she will grant us pleasing homes 2 , and, (while we live) in this Thy Good Mind's longing 3 prayer (to gain her welfare), she grants us likewise lasting strength (for every deed which that Thy Good Mind moves us to perform), and therefore hath Mazda caused the plants 4 to flourish for her (nurture), He, Ahura, in the generation of primeval life.\n\n_________________________ 7.\n\n(Then in our coming strife 5 let both her mortal foes be slain.) Let the Wrath-demon of rapine be cast down.\n\nSmite ye against the envy (which would plot against our Throne 6 ), O ye who, abiding by the Good Mind, and in accordance with our holy Order, desire to hold that refuge 7 fast, to whose sacred bond the bounteous man belongs.\n\nAnd therefore, p."

