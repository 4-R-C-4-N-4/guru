body = "Sacred Texts Zoroastrianism Index Previous Next Buy this Book at Amazon.com The Zend Avesta, Part III (SBE31) , L.H.\n\nMills, tr.\n\n[1886], at sacred-texts.com YASNA XLVIII.\n\nANTICIPATED STRUGGLES AND PRAYERS FOR CHAMPIONS AND DEFENDERS.\n\nThis chapter divides itself quite naturally into sections.\n\n1-4 belong together, then 5 and 6, 7 seems less closely connected; then follows 8-12.\n\n1.\n\nA struggle is evidently at hand, whether the same as that to which allusion is more than once made, by incitation, as in Y.\n\nXXXI, 18; with anxious expectation, as in Y.\n\nXLIV, 15, 16; or as if in a sense of victory, as in Y.\n\nXLV, 1; or of defeat, as in Y.\n\nXLIX, is difficult, or rather impossible to determine.\n\nBut with the verses 10, 11, 12 in view, together with the dispirited, Y.\n\nXLIX, 1, we shall say at once that, if this verse was intended to connect with them, an armed struggle had been expected, whether the decisive one or not, we need not say.\n\nThe saint, that is, the pious adherent to the Holy Order, whatever may be the result of the preliminary struggles, is encouraged by a view of the end.\n\n2.\n\nBut the burdened worshipper craves still further reassurance before the storms of battle came once more upon him.\n\n3.\n\nFor little as the assurances of Ahura are valued p.\n\n152 by the heretic, to the man who understands the true relations, what Ahura declares by means of His inspired prophets, the secret-announcers, this is, of all things, best; (he need not ask as elsewhere, Y.\n\nXXXI, 17).\n\n4.\n\nAnd whoever would hope for spiritual growth and purity must turn his mind to that word of the Deity, and pursue its teachings faithfully, and so at last his fears will vanish, for his doubts will disappear.\n\nHe will understand as the Lord has taught.\n\n5.\n\nThis verse seems a prayer to Âramaiti; when the long struggles shall have found their issues, and the one party or the other wins the day, let not that party be the evil alliance with its monarch.\n\nFor, if the government is set up, and carried on with all the prescribed ceremonial and moral exactness of the wise K isti; if men who toil for the sacred Kine, and with the virtue of those who cultivate her, hold the reins of power, and can so suppress the predatory raids on defenceless, as well as unoffending victims, then no gift of Ahura, since the tribes became a nation, could be looked upon as a greater, or as so great a blessing, as the correct Authority, and the Order of the Faith.\n\n6.\n\nFor that sacred Kine, as so often already implied or stated, was all in all to the pious worshipper.\n\nIt was she, representing, as she did, all wealth in herds, who alone could sustain the home-life of happy industry.\n\nAnd this is the reason why Ahura had originally caused the herbage to grow for her support.\n\n7.\n\nUrging the overthrow of the spirit of Rapine in accordance with the Kine's complaint, he exhorts the armed masses to energetic and offensive valour.\n\n8.\n\nHe then vehemently, although only rhetorically, asks how he may use the proper prayers to rally the needed coadjutors among the chiefs (Y.\n\nXLVI, 9) to carry on the struggle.\n\n9."

