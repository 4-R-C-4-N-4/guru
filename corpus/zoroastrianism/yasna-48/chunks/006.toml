[content]
body = "157:4 The Pahlavi translator renders a word which occupied the place of g avarô by yakhsenunî d ârîh; Ner.\n\nfollowing as to root (freely as to form).\n\nAs he, however, renders related forms elsewhere by 'living,' 'live,' our only safe conclusion is that he had a different word from g avarô ( g ivarô) before him in his MS.\n\n157:5 Compare Y.\n\nXXVIII, 6.\n\n157:6 I am very far from certain that we do not seriously blunder in not following the indication of the Pahlavi here.\n\nSee remarks Y.\n\nXXXII, 16.\n\n157:7 Or, 'let me enjoy as my own;' but môi is difficult.\n\nÛ k ãm might otherwise be a first personal form in the sense of the Vedic u k .\n\np.\n\n158 Bartholomae's third sing.\n\nimper.\n\nis also of course well possible; but were not the originally abnormal third singulars in -âm, duhâ´m s ayâm, vidâm, taken over from third pl.\n\nsubj.\n\n'-âm' really equalling the nasal vowel merely*?\n\nComp.\n\nalso Indian ád ri s ram, ábudhram, ás ri gram, Zend vavazirem, -am = an.\n\n'Tradition' has, Pahl.\n\nzîvi s nîh; Ner.\n\ng îvitam; Pers.\n\nzîstan, for û k ãm, as if rendering 'enjoyment,' 'experience of life.' *(âm = tâm is more difficult.) 158:1 Comparing vápus; otherwise, with the Pahlavi, 'knowing the destruction (of the evil) which Vohûman works;' see Y.\n\nXXIX, 6, where the rendering of the Pahlavi is supported by the previous verse.\n\n158:2 Comp.\n\nY.\n\nXLVI, 3.\n\nKadâ Mazda; frâr e n tê*—saoshya n tãm khratavô?\n\n158:3 Compare Y.\n\nXXXII, 15.\n\n158:4 Is Soma-intoxication here referred to?\n\nAnd was the Haoma-worship in abeyance at the time?\n\nThe Pahlavi seems to have understood 'magic' here, and in the evil sense, that is, judging from the perhaps later gloss.\n\nAside from the gloss, however, the Pahlavi may well have been, nay, more probably was, intended to be read madîh as = madahyâ.\n\n158:5 As to this word, we cannot do better than follow Justi (although his work is now a score of years old).\n\nThe Indian várpas, in the sense of deceit, has also been compared.\n\nThe last Pahlavi translator was probably confused by finding this word, as so often, divided in his MS.\n\nHe rendered as best he could, or rather he handed down the shattered documents, or oral teachings, of his predecessors with his own too often lame additions, the whole mass being rich in the relics of the truth.\n\n158:6 See verse 5.\n\n159:1 Ma t following Ashâ shows that we may also have the preposition in pôi ma t .\n\n159:2 As Âramaiti is here spoken of as 'having pasture,' that is, as inspiring the thrifty husbandmen who cultivate the meadows by irrigation, or drainage, she became associated herself with those meadows, and so later with the earth; see Y.\n\nXLVII, 2."

