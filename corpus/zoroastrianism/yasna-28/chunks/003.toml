[content]
body = "And these gifts are again mainly the holy revelation, for he knows, so he earnestly declares, the words of those mighty three to be never void, and to be a sustenance able indeed to fill up his wishes, giving him more than he has of himself either the intelligence or the grace to ask.\n\n12.\n\nHaving added, in verse after verse, some particular to heighten the fervour of his request, he sums up all in a final expression, as remarkable for its earnestness as for its depth, and begs Ahura, as one set for ever for the defence of the Righteous Order and the Good Mind (whose hallowed influences he accurately foresaw were destined to endure for ages), to tell him, with His very 'voice of spirit,' in order that he may declare them to the waiting masses, the laws which pervade the moral universe, and according to which it arose.\n\nFor according to these holy principles and so alone, could he promulgate a system which might reclaim society from its imperfections and the Iranian saint from his sufferings.\n\nAhura who, be it remarked, is alone addressed in this culminating verse, hears and answers by a revelation of these eternal principles, and this answer is contained in chapter XXX.\n\nBy a thorough comprehension of that most important document, I hold that we may see how it met its purpose as indicated by the capacities and needs of those to whom it was addressed, and how by discriminating truth from falsehood it helped on the defence of Asha, and the founding of the true Benevolence.\n\np.\n\n17 Translation.\n\n1.\n\n(A strengthening blessing 1 is the thought, a blessing is the word, a blessing is the deed of the righteous Zarathu s tra.\n\nMay the Bountiful Immortals 2 accept and help on 3 the chants.\n\nHomage to you, O sacred Gâthas 4 !) 2.\n\nWith venerating (desire) for this (gift) of gracious help, O Mazda 5 , and stretching forth my hands (to Thee) I pray for the first (blessing) of (Thy) bountiful Spirit; (that is, I beseech of Thee that my) actions p.\n\n18 [paragraph continues] (toward) all (may be performed) in (the Divine) Righteousness; and with this I implore from Thee the understanding of Thy Benevolent Mind, in order that I may propitiate the Soul of the Kine 1 (our herds and folk, which cries so bitterly to Thee).\n\n3.\n\nAnd therefore, O Great Creator, the Living Lord!\n\n(inspired) by Thy Benevolent Mind, I approach You 2 , (and beseech of Thee 3 ) to grant me (as a bountiful gift) for both the worlds, the corporeal and (for that) of mind, those attainments which are to be derived from the (Divine) Righteousness, and by means of which (that personified Righteousness 4 within us) may introduce those who are its recipients into beatitude and glory 5 !\n\n4.\n\nO (thou Divine) Righteousness, and thou Benevolent p.\n\n19 [paragraph continues] Mind (of Deity)!\n\nI will worship you, and Ahura Mazda the first 1 , for all of whom the Pious ready mind (within us) is 2 causing the imperishable Kingdom to advance.\n\n(And while I thus utter my supplications to You), come Ye to my calls to help 3 !\n\n5."

