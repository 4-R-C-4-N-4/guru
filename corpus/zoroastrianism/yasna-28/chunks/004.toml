[content]
body = "(Yea, I will approach You with my supplications, I) who am delivering up (my) 4 mind and soul to that (heavenly) Mount (whither all the redeemed at last must pass 5 ), knowing (full well) the holy characteristics and rewards 6 of the (ceremonial and moral) actions (prescribed) by Ahura Mazda.\n\n(And) p.\n\n20 so long as I am able and may have the power, so long will I teach 1 (Your people concerning these holy deeds to be done by them with faith toward God, and) in the desire (for the coming) of the (Divine) Righteousness (within their souls) 2 .\n\n6.\n\nAnd, thou Righteousness!\n\nwhen shall I see 3 (thee, knowing the Good Mind (of God), and above all the personified) Obedience 4 (of our lives which constitutes) the way 5 to the most beneficent Ahura Mazda.\n\n(Asking this, I thus beseech thee, for) with this holy word of supplication we most hold off 6 with tongue the flesh-devouring fiends, (the very sign and power of all spiritual foulness) 7 !\n\np.\n\n21 7.\n\nAnd do Thou, O Lord, the Great Creator!\n\ncome to me with Thy Good Mind; and do Thou, who bestowest gifts through Thy Righteousness, bestow alike long-lasting life on us.\n\nAnd (that this life may be spent aright, do) Thou by means of Thy lofty words (bestow) the (needed) powerful spiritual help upon Zarathu s tra and upon us 1 , whereby we may overcome 2 the torments of the tormentor.\n\n8.\n\n(And) do thou, O (Divine) Righteousness, bestow (upon me) that sacred blessing which is constituted by the attainments of the Good Mind (within my soul) 3 ; and do thou also, O Piety!\n\ngrant unto p.\n\n22 [paragraph continues] Vî s tâspa and to me our wish; (yea) may’st Thou grant (us), O Mazda, ruler 1 (as Thou art!\n\nthat grace) whereby we may hear 2 (with understanding) Thy benignant words.\n\n9.\n\nThat best (of gifts therefore) do I beseech (of Thee), O Thou best (of beings) Ahura!\n\nwho art one in will with (Thy Divine) Righteousness (within us, likewise), the best 3 (of spirits), desiring it (as I now do) for the (heroic) man Frashao s tra, and for me 4 , upon whom also may’st Thou bestow it (not for time alone), but for all the ages of Thy Good Mind (that reign of Thy Benevolence which shall be to us as Heaven 5 )!\n\np.\n\n23 10.\n\nAnd (impressed and moved) by these gifts of strengthening grace 1 (which Thou may’st give in answer to these prayers) may we never anger You, O Ahura Mazda!\n\n(nor Thy) Righteousness (within us), nor yet Thy Kindly Mind (toward us), since we have most earnestly made effort (helping to advance Your cause) in the (chanted) 2 offering of Your praisers, for most easy to be invoked (are Ye).\n\n(Yours are verily both) the desire for (spiritual) blessings (for us), and the (Divine) Possession (of their power) 3 .\n\n11.\n\nAnd therefore do Thou, O Lord, the Great Creator!"

