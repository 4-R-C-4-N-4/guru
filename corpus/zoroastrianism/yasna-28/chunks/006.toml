[content]
body = "As there is an Indian svar which means 'to roar,' and another 'to shine,' and again a svan = to sound, so in Iranian there is a h v an = to sound, and another = to shine, as in asmanem h v anva n tem.\n\nThe 'comfortable stone heaven' is difficult.\n\nComfortable, or even 'delectable mountains' so we should have to say elsewhere), are not very likely to have been recognised or appreciated in the Avesta.\n\n'Glorious beatitude' is a better rendering here.\n\nIf h v âthrâ always means 'comfort,' how comes it that h v arenô is said to be h v âthrava t ?\n\n'Comfortable glory' is hardly probable.\n\nCompare also the ancient s ubha.\n\nWhen it is the fashion to accept a separate Iranian root at every difficulty, small and great, I see no reason for stopping here, where the pressure is considerable.\n\nThe Pahlavi also may be read to favour my view.\n\n(Comp.\n\nh v eng = h v an.) 19:1 Or, 'having no first' (Roth, reading apourvîm).\n\n19:2 I am very far from a positive rejection of the forms suggested by the Pahlavi translator, although he should never be pressed on such a point, being often free.\n\nAs alternative read 'may Piety who bestows increase (fem.\n\nparticiple) come to my calls to give grace.' 19:3 The Pahlavi translator, unable to credit 'y e as = I who' (so also modern authority sometimes with regard to other occurrences of y e in this chapter), renders as follows: When I shall be your own (thus for 'worship,' and possibly deceived by the form of the words, ufyânî and naf s man being nearly alike in the Pahlavi character), O Ashavahi s t and Vohûman!\n\nthe first [ ], Aûharmazd's also [his own I shall be], through whose unweakened acquisition his rule over them exists [ ], and [hers also I shall be], Spendarmad's, the giver of increase.\n\nShe comes to me with joy when I invoke her [when I shall call upon you, come ye on toward me with joy].\n\n(A plain and noticeable instance of an alternative rendering in the gloss.\n\nThe verb was first thought of as a 3rd sing.\n\nmiddle subjunctive, afterwards as an imperative 2nd plural.) 19:4 M e ñ = m + the nasal vowel, and may represent man, or I think also mãm, adverbially for m e nâ; or 'mân' = 'demânê.' 19:5 Mount Albor g , where the K inva t Bridge extends; so also important authority; but we might read m e n gairê = mângairê (Garô d man).\n\n19:6 Ashi, a blessing given in reward; so elsewhere.\n\n20:1 I think it is better to hold by the parallel passage and the sense of 'teach' here.\n\nThe Pahlavi has an irregular form which probably means 'I teach,' but might be intended for 'I am taught.' After the words 'so long as I have the power,' 'I will teach' is rather more natural than 'I will learn.' Haug's rendering of this word has never been accepted.\n\nThose most opposed to tradition follow it here.\n\nPerhaps, 'I will teach to desire R.' 20:2 The Pahlavi translation corrected by MSS."

