body = "fill up and satisfy (my 4 ) desire with these attainments (of the grace) of Thy Good Mind, which Thou dost know to be derived from Righteousness, (and) which (are verily) sublime 5 , for I have known 6 p.\n\n24 [paragraph continues] Thine instructions to be never void 1 of their effect (in the struggles) for our (daily) food 2 , and therefore worthy objects of desire 3 .\n\n12.\n\n(Yea, I approach Thee with my prayers, I) who by these (great gifts of grace) will 4 protect ((Thy) Divine Righteousness, and (Thy) Good Mind within us) for ever.\n\nAnd do Thou therefore, O Ahura Mazda!\n\nteach me from Thyself, yea, from Thine own mouth of spirit, that I may declare it forth to (these Thy waiting people) by what (powers and according to what laws 5 ) the primeval world arose 6 !\n\nFootnotes 17:1 Yânîm cannot well mean 'revealed,' except by the most farfetched conception.\n\nThe Indian yâna, as in devâ´yna, should give the fundamental idea, easily reconcileable as it is with the ancient rendering of the Pahlavi translator.\n\n17:2 Notice that the Ameshôspends are mentioned in this early heading.\n\nIn the Gâthas themselves the name, 'Bountiful Immortals,' does not occur.\n\n17:3 Possibly, 'take up and continue on the Gâthas.' Literally, 'seize forth.' 17:4 It is hardly necessary to say that this is no part of the Gâthas.\n\nIt is, however, in the Gâthic dialect, and as it needs not, or perhaps cannot, be considered an intentional imitation, it must be very old.\n\n17:5 Vocative with the Vendîdâd Sâdah, otherwise the accumulation of genitives would be suspicious.\n\nAhura is, however, beyond any question elsewhere spoken of as 'the most bounteous Spirit.' The usage is like that of the Semitic scriptures; the Holy Spirit is both God and 'of God.' As to the rendering 'bounteous,' I fear that 'holiest' (so many) is too bold.\n\nAshavan occurs side by side with spe n ta as applied to Ahura, and ashavan cannot mean 'righteous' there, but must mean 'holy.' The Pahlavi renders etymologically afzûnîk.\n\nComp.\n\ns vânta.\n\nThe sole etymological bases for the meaning 'holy' are presented by the Lithuanian and Ecclesiastical Sclavonic; but, as Justi has well remarked, in the conceptions of the Avesta that which increases the kingdom of Ahura is equivalent to what is holy.\n\n'Bountiful' must therefore be understood in a particular sense, only to be rendered by the words, 'gracious, sacred, and august.' 18:1 See Y.\n\nXXIX, 1.\n\n18:2 The plural of majesty, or the literal plural, referring to the Bountiful Immortals as together.\n\n18:3 Plural and singular interchange throughout.\n\n18:4 Possibly, 'one may introduce.' 18:5 See Y.\n\nL, 5.\n\nH v âthrâ and its allied forms are so often associated with rao k ah and the like, that I do not hesitate to accept an Iranian h v an = to shine (with Justi)."

