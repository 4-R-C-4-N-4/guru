body = "Sacred Texts Zoroastrianism Index Previous Next Buy this Book at Amazon.com The Zend Avesta, Part III (SBE31) , L.H.\n\nMills, tr.\n\n[1886], at sacred-texts.com p.\n\n14 YASNA XXVIII.\n\nPRAYERS CHIEFLY FOR GRACE AND FOR THE WORDS OF REVELATION.\n\n2.\n\nZarathu s tra, having entered upon the duties of his office (XXIX, 11), composes a liturgy for the use of some of his more eminent colleagues, possibly, but not at all probably, for the original mover in the entire religious effort (see the expressions 'to Zarathu s tra and to us,' 'to Vî s tâspâ and to me,' 'to Frashao s tra and to me').\n\nThis reciter, whoever he may have been intended to be, is represented as standing in the appropriate place as a priest, with hands stretched toward Ahura, or His Fire, and praying for the possession of spiritual graces from an unselfish motive, and in order that he might appease the grief of the Kine's Soul, for whose relief Zarathu s tra had just been appointed (see XXIX, 1, 6, 8).\n\n3.\n\nHe approaches Ahura Mazda, spiritually inspired by the Good Mind as he declares, and asking for attainments and boons for both the bodily and spiritual lives, derived from Righteousness, whereby that personified Righteousness might establish the elect in a beatified state.\n\n4.\n\nThe personality of the Ameshôspends comes again strongly forward, as it does so often in worship, in addresses in which Righteousness (Asha), the Good Mind (Vohu Manah), Khshathra (the active Power of the Divine Sovereignty), and Âramaiti (practical piety in the souls of believers), are besought to come, as the Vedic Gods so often are, to the appeals of the supplicant, and to his help in the act of worship itself, which is recognised to be the one efficient means for furthering the cause of redemption which is ever held in view.\n\n5.\n\nAs one who offered his soul to heaven, and would know by actual experience the blessed rewards bestowed by the holy ceremonial and moral actions prescribed by Ahura Mazda, the reciter declares that he will teach on in the effort to propagate the holy Religious Order, and possessed by the one desire for its increase, while power shall last.\n\n6.\n\nWith a piety as fervent as it is profound, and speaking with great earnestness, he asks Righteousness, as a person, when he shall see him, becoming fully acquainted with the Good Mind of God, the way which leads to Him, and above all with Obedience.\n\nBut although he addresses these lofty abstractions as persons, it is utterly p.\n\n15 out of the question to suppose that he did not speak in the deepest meaning of the words as expressing states of mind, and qualities of character: O thou Divine Righteous Order!\n\n(Thus he seems to have meant), O thou divine Righteous Order!\n\nwhen shall I see Thee as if present in my own soul and in those of the people whom Ahura has committed to my charge?\n\nWhen shall I know the Divine Benevolence as made one with the disposition of my congregation?\n\nWhen shall I possess by knowledge that only way to our most bountiful Ahura which is, not a mythical angel Sraosha only, but that angel interpreted 'Obedience to Ahura' (observe the dative).\n\nOne cannot well exaggerate the religious depth or subjectivity."

