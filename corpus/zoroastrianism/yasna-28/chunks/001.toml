[content]
body = "1.\n\n(A strengthening blessing 1 is the thought, a blessing is the word, a blessing is the deed of the righteous Zarathu s tra.\n\nMay the Bountiful Immortals 2 accept and help on 3 the chants.\n\nHomage to you, O sacred Gâthas 4 !) 2.\n\nWith venerating (desire) for this (gift) of gracious help, O Mazda 5 , and stretching forth my hands (to Thee) I pray for the first (blessing) of (Thy) bountiful Spirit; (that is, I beseech of Thee that my) actions p.\n\n18 [paragraph continues] (toward) all (may be performed) in (the Divine) Righteousness; and with this I implore from Thee the understanding of Thy Benevolent Mind, in order that I may propitiate the Soul of the Kine 1 (our herds and folk, which cries so bitterly to Thee).\n\n3.\n\nAnd therefore, O Great Creator, the Living Lord!\n\n(inspired) by Thy Benevolent Mind, I approach You 2 , (and beseech of Thee 3 ) to grant me (as a bountiful gift) for both the worlds, the corporeal and (for that) of mind, those attainments which are to be derived from the (Divine) Righteousness, and by means of which (that personified Righteousness 4 within us) may introduce those who are its recipients into beatitude and glory 5 !\n\n4.\n\nO (thou Divine) Righteousness, and thou Benevolent p.\n\n19 [paragraph continues] Mind (of Deity)!\n\nI will worship you, and Ahura Mazda the first 1 , for all of whom the Pious ready mind (within us) is 2 causing the imperishable Kingdom to advance.\n\n(And while I thus utter my supplications to You), come Ye to my calls to help 3 !\n\n5.\n\n(Yea, I will approach You with my supplications, I) who am delivering up (my) 4 mind and soul to that (heavenly) Mount (whither all the redeemed at last must pass 5 ), knowing (full well) the holy characteristics and rewards 6 of the (ceremonial and moral) actions (prescribed) by Ahura Mazda.\n\n(And) p.\n\n20 so long as I am able and may have the power, so long will I teach 1 (Your people concerning these holy deeds to be done by them with faith toward God, and) in the desire (for the coming) of the (Divine) Righteousness (within their souls) 2 .\n\n6.\n\nAnd, thou Righteousness!\n\nwhen shall I see 3 (thee, knowing the Good Mind (of God), and above all the personified) Obedience 4 (of our lives which constitutes) the way 5 to the most beneficent Ahura Mazda.\n\n(Asking this, I thus beseech thee, for) with this holy word of supplication we most hold off 6 with tongue the flesh-devouring fiends, (the very sign and power of all spiritual foulness) 7 !\n\np.\n\n21 7.\n\nAnd do Thou, O Lord, the Great Creator!\n\ncome to me with Thy Good Mind; and do Thou, who bestowest gifts through Thy Righteousness, bestow alike long-lasting life on us.\n\nAnd (that this life may be spent aright, do) Thou by means of Thy lofty words (bestow) the (needed) powerful spiritual help upon Zarathu s tra and upon us 1 , whereby we may overcome 2 the torments of the tormentor.\n\n8."

