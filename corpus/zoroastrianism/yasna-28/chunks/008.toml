[content]
body = "So often.\n\nOral communications are figuratively alluded to everywhere.\n\nNo literal articulation or sound (!) is of course intended.\n\n(Or 'sravayaêmâ = proclaim.') Neryosangh may be rendered as follows: Grant, O Sanctity!\n\nthis devotion which (results) from the priority (an error from misreading the characters of the Pahlavi, chiefly his original) of the Good Mind [that is, make me so religious that prosperity may result [to me from my good conduct].\n\nGrant thou to the perfect mind in, or to, the earth (so the Parsis understood Âramaiti)] the wish that proceeds from Gustâspa and from my people [ ].\n\nGrant praisers, O great wise One!\n\nkings, who may be announcers of your word, and bestowers of arrangements (for the service); [that is, who may teach thy word, and render it progressive].\n\n22:3 The earliest occurrence of Asha Vahi s ta.\n\nThe Pahlavi: 'Since the best thing that Thou hast [Thy Religion] is better than all other things, the best through Righteousness.' 22:4 See verses 7 and 8.\n\n22:5 In the millennial (sic) renovation as well as in heaven.\n\nSee chap.\n\nXXX, 4, where Vahi s ta Manah is equivalent to heaven.\n\nThe Pahlavi gloss has: Aîgh Frashô s tar va hâvi s tân î Frashô s tar, vad tanû î pasînŏ hamâî nadûkîh pa d a s vâdan; that is, for Frashô s tar and the disciples of Frashô s tar for ever, until the final body provide a benefit thereby.\n\n23:1 Possibly, 'may we not anger you with our prayers for these blessings.' Kím me havyám áh ri n âno g usheta.\n\n23:2 That dasemê may now better be referred to a similar root with dasvare, I regard the more probable because the Pahlavi also freely renders as if it so understood.\n\nIts author knew the meaning of dasema = da s ama.\n\nOne is reminded of course of the dá s a-gva.\n\n23:3 The Pahlavi with its peculiar view of anâi s (not to be rejected too confidently; see note at another occurrence of it) is interesting (as corrected by the Persian MS.): On account of a not-coming to you, O Aûharmazd!\n\nThis I would not do [ ].\n\nAshavahi s t also I will not pain for the sake of a blessing; [that is, I do not desire a single blessing which appears displeasing to Ashavahi s t (this turn of the sense is followed by some who have hitherto opposed tradition, but I cannot follow it, although I value every hint of the ancient writers).\n\nAlso Vohûman, the excellent [I do not harass him].\n\n23:4 Or, 'to those whom thou seest as creatures (?) of V.\n\nfill up the desire with attainments.' 23:5 Possibly, 'the righteous,' erethw e n g; cp.\n\nri tâ´vânas (?).\n\nPahl.\n\ntrans.\n\n'î frârûnŏ.' 23:6 Possibly, 'I obtain.' 24:1 Ner.\n\nhas analaso(-a h ) for asûnâ more correctly than the Pahlavi asû d ak.\n\n24:2 Or, 'well reaching their aim;' but the Pahlavi translator gives his evidence for the meaning 'food'—khûri s nŏ.\n\nRecall the constant prayers for nourishment in the Ri ks."

