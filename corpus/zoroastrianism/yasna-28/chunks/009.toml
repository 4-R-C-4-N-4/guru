[content]
body = "And as favouring the ancient translation, see XXIX, 7, where 'food for the eaters' is declared to be the gift of God, who is at the same time 'bounteous with his doctrine.' 24:3 Neryosangh: Eva m ye dharmasya vettâra h * uttamasya k a dâter manasa h [ ] ekahelayâ* Mahâ g ñ ânin Svâmin!\n\ntebhya h * pûr n a m pari k inohi* kâma m ; [kila, [ ] s ubha m tebhya h kuru].\n\nEva m k a i g isne h * analaso labhatâ m khâdyâni vastrâ n i k a vadanena.\n\n24:4 One is tempted to read nip a ungh ê as an infinitive, but the Pahlavi translation anticipates us all with its more critical barâ netrûnam.\n\n24:5 This question is answered in Y.\n\nXXX.\n\n24:6 Ner.\n\nimproving upon the Pahlavi has as follows: Yadi sunirîksha n atayâ dharma m pâlayâmi mana s k a* uttama m sadâprav ri ttaye; [kila, k et satyasya sadvyâpârasya k a rakshâ m karomi].\n\nTvam tat* Mahâ g ñ ânin Svâmin!\n\nprak ri sh t am me s ikshâpaya* [ ] vâ k i.\n\nAd ri s ya Tvatto mukhena [sphu t aya] antar bhuvane pûrva m babhûva [tâm s ri sh t im me brûhi].\n\nA translation truly remarkable considering the circumstances under which it was made.\n\nNext: Yasna XXX"

