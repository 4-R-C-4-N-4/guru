[content]
body = "Then, with a bathos which shows how then as ever superstition could hold its own side by side with the truest piety, he exclaims (if the third line was really so composed by him as it has come down to us); 'By such a prayer as a Mãthra spell we can with the greatest vigour repel the unclean beasts and creatures which defile our sanctity, or endanger our lives.' 7.\n\nAlluding immediately to this revelation, he beseeches Ahura once more to 'come with His Good Mind,' and to grant, not booty, nor even wealth, but 'Asha-gifts,' and (as a bestower of righteousness) long life and powerful spiritual grace to the leading agent Zarathu s tra (in all probability the composer of the section), and to himself, the officiating priest with his helpers, in order that, not with carnal weapons, but by his 'lofty' and holy 'words,' they all combined may overcome the torments of the ravagers who had made havoc of the settlements, and who were still liable to overwhelm the faithful with their raids and rapine (see XLIV, 20).\n\n8.\n\nWith an intentional and interesting alliteration he prays to Asha for an ashi; that is, a blessing, even the strenuously attained-to gifts of the great Benevolence.\n\nÂramaiti likewise becomes the object of his petition together with Ahura; and this time for the benefit of Vî s tâspa the monarch, and for himself that they might hear the gracious Mãthras, which is indeed the burden of the entire piece.\n\n9.\n\nOnce more he affords an early (or the earliest (?)) instance of the rhetorical trick, and fills one line with three 'vahi s tas,' praying Ahura, as being of one mind with Asha (here, for the first time in the Avesta, called 'the best'), to grant the same blessing; and this time again with an intentional change, 'to himself and to Frashao s tra;' and not for this world, but for 'all the duration of the Good Mind,' using the expression in its concrete sense as heaven; for heaven to him consisted in an inward state.\n\n(So also elsewhere in the Avesta, p.\n\n16 even where the palate and the olfactory nerve are the media of felicity or of torture, there also conciliating language on the one side, or 'vile speech' pointed with finest irony on the other, is equally prominent.\n\nIt is the mind which chiefly enjoys or suffers.) 10.\n\nDeeply sensible of the spiritual benefits for which he is asking, he seems touched with gratitude.\n\nAccordingly he adds one more petition, which is, that he and his coadjutors, the three just mentioned, may never anger the indulgent mercy which had granted them their request; and that they may persevere, as they have begun, in the strenuous service of Ahura, Asha, and Vohu Manah.\n\nFor they are, as he declares, easy to be entreated, and beings who desire to bestow spiritual blessings upon mortals, rather than to exercise merely capricious favour or cruelty, and who also possess the power to bring their benevolence to effect.\n\n11.\n\nAs if unwilling to trust his own perception as to his real spiritual needs, he prays Ahura 'to fill up his desire,' not with what he, the reciter, may in particular request, but with what He, Ahura, knows to be the gifts of Righteousness and the divine Benevolence."

