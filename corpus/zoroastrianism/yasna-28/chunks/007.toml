[content]
body = "may be rendered thus: He who gives up his soul within Garô d mân does so by the aid of Vohûman [ ], and is also intelligent concerning the veneration which belongs to the doers of good works [ ] in that which is Aûharmazd's [religion]; as long as I am a suppliant and have [the power, so long do I inculcate the desire of Righteousness which is, duty and good works].\n\n20:3 Kadâ´ m ri l îkám sumánâ abhí khyam (Rv.\n\nVII, 86, 2).\n\n20:4 Obedience, throughout the Avesta and Parsi literature, guides the soul to heaven.\n\n20:5 Or, 'knowing the throne of Ahura' (so the Pahlavi, most scholars following); but the construction would be awkward.\n\n'Finding the way' occurs in the Ri ks, and gâtu need not always mean 'place' in the Gâthic, because it has that sense most frequently in the Zend.\n\n20:6 Possibly, 'we may teach the foul polluted men.' Or, 'confess the greatest One with Khrafstra(-slaying) tongue.' Perhaps the text is to be amended; yet see XXXIV, 5, 9.\n\n20:7 The Pahlavi translation may be rendered thus: O Ashavahi s t!\n\nwhen do (shall) I see thee?\n\nI know this one by means p.\n\n21 of a good mind's instruction [that is, I see thee in that time when every man is intelligent because he is pious; but when shall it be?].\n\nAnd the place of Aûharmazd, when do (shall) I see it, I who am a suppliant for a benefit?\n\nThat place is known through Srôsh [ ], that greatest of Mãthras is to be taught, given forth with tongue to him whose understanding is confused.\n\n21:1 It certainly involves a question how the words 'to Zarathu s tra and to us' can be compatible with Zarathu s tra's authorship.\n\nVî s tâspa and Frashao s tra (verses 8, 9) are equally excluded.\n\nWho is then the individual who thus refers to himself with others?\n\nAnd is this verse an interpolation, and with it 8 and 9?\n\nThis last seems to me a very feeble suggestion.\n\nWas this piece, together with the rest (for they all are connected), the work of some unnamed man of influence, the true author of Zarathu s trianism?\n\nI think that there is also little gained by this supposition.\n\nThere is no particular reason why Zarathu s tra's name should have come down to us as the chief figure, while that of the prime mover failed to reach us.\n\nI should say that the piece was composed by Zarathu s tra and put into the mouth of a leading priest, or that it was composed with many others under his inspiration.\n\nOr, can there have been a school, or family, of Zarathu s trians, religious poets, similar to the Vedic seers?\n\n(See chap.\n\nLIII, 2 Zarathu s tri s Spitâmô.) 21:2 This mention of 'overcoming an enemy,' strengthens the probability of my view of vâvarôimaidî (vâurôimaidî).\n\n21:3 The Good Mind is now, as we should say, 'the Spirit of God' in the mind of God, and again His Spirit in the human soul.\n\n22:1 The Pahlavi correctly renders pâdakhshâ.\n\n22:2 Probably originally heard, inspired words.\n\nCompare Many e u s ha k â Thwâ a unghâ, verse 12."

