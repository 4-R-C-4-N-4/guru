[content]
body = "There is a certain plausibility about the rendering 'to us,' but I think ahmâi refers to ashaonê understood (see verses 4 and 5).\n\nThe Pahlavi, moreover, is against a first person.\n\n147:2 Dãn (Geldn.) seems to be a 3rd plural aorist subjunctive; the p.\n\n148 plural being owing to the fact that Ahura gives with the other Ameshôspends.\n\nDã, might also be the relic of the proper word which represents the participle; comp.\n\ndãs (sic).\n\n148:1 The idea of the summum bonum seems to have early developed itself, and from this constant use of this word in the neut.\n\nsingular and plural, and also with anghu.\n\n148:2 Notice once more the pronounced personification of both Vohu Manah and Âramaiti; see Y.\n\nXXX, 8, and Y.\n\nXLIV, 14, &c.\n\nThe Pahlavi translation notices the dual form pavan kolâ II yadman.\n\n148:3 The Pahlavi seems to lead those who regard ôyâ as = a form of ava; it has zak î.\n\n148:4 This is the ahmâi of the first verse, (but always possibly = 'to us,' if the verses are not to be brought into any kind of connection.) Otherwise it obviously refers to ashâunê* in 4 and 5; so the Pahlavi throughout.\n\nSee ahmâi and hôi in LI, 6.\n\n149:1 Many would say that we have here an instance in which the identity of Âramaiti with the earth is recognised in the Gâthas.\n\nI would say, on the contrary, that here we have an instance in which a poetical conception gave rise to a later error or fantastical association.\n\nPiety, with frugal virtue, induced a thorough husbandry; and secured the hushiti, peaceful home-life.\n\nShe gave meadow to the Kine; at the next step she poetically represents the meadows, and then the earth.\n\nIf vâstrâi, it would be for 'nurture.' 149:2 Or 'she,' as she once bewailed in a colloquy.\n\nOtherwise the person who was appointed to care for her interests is meant.\n\nCompare Y.\n\nXXXIII, 6, where the righteous Zaotar speaks as desiring counsels (h e mpar s tôi s ) in the interest of the pastures, and the laws of the sacred agriculture.\n\nCp.\n\nalso the later reproduction of the idea in an extended form in the Vendîdâd.\n\nThe zaotar of Y.\n\nXXXIII, 6, may have been the ashavan of verses 4 and 5.\n\n149:3 Voc.\n\nwith K5 (Barth.).\n\n149:4 The Pahlavi gives us, as usual, our first surmise as to the meaning of 'kâthê;' I follow Geldner with regard to it as against Haug.\n\nThe expressions here are not literal.\n\n149:5 Isvâ k î t connects only indirectly with kas e u s k î t , as kâthê intervenes.\n\nI regard parao s akô dregvâitê as presenting the true antithesis to kas e u s k î t nâ ashâunê.\n\nThe isvâ may have k î t merely from the influence of jingle, being at the head of the line like kas e u s ; isvâ means p.\n\n150 of itself 'possessing means.' Parao s may depend on kâthê understood, as kas e u s depends on it expressed."

