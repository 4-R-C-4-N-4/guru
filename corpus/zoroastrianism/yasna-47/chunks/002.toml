[content]
body = "Such a revelation of the component parts of the mind and will of the Deity, the simplest labouring Class could understand for the moment, and for some decades; but all was, as a matter of course, soon to be overgrown with the old weeds of superstition and of myth.\n\n2.\n\nFalling into detail and varying expressions, the composer prays that Ahura may carry out His holy scheme into action by the busy hands and fingers of domestic piety, and by the preached and recited words of the Good Mind from the mouth and tongue of faithful priests.\n\nSo, and so only, would He become the Father of Asha, the divine Order, and of moral and ritual regularity among men.\n\n3.\n\nFrom discourse concerning God, he arises, as so often, to an address to Him.\n\nThat Spirit (referred to in the verses 1, 2) is Ahura's own, for He is the One who makes it bounteous; He is the bountiful One who has created the sacred symbolic Kine, the emblem and the substance of 'joy,' representing at once the possessions of the holy people, and those people themselves.\n\nAnd He it is who, in answer to her wail (Y.\n\nXXIX, 1, 9), has spread for her the meadows 'of Piety' as arranged in the consultations (Y.\n\nXXXIII, 6) made on her behalf.\n\n4.\n\nAnd this 'Spirit,' as might be expected, does not confine its attention to the inspiration of Piety alone.\n\nThe justice of Mazda is vindicated.\n\nThe wicked are afflicted under its influence with a long wounding (Y.\n\nXXX, 11) for their sins, and for their cynical preference for prosperous men of bad and dishonest character as well as of heretical faith.\n\np.\n\n147 5.\n\nBut he expresses his confidence that Ahura Mazda will, in the end, set all aright.\n\nHe will, unlike the persons just mentioned, give unto the ashavan, not kasu alone, but paru, (not a meagre share, but fulness) of whatever is the best, while the dregva n t and the aka (verse 4), the faithless and the wicked, although they may be isvanô, prosperous, will only taste the enjoyment of their wealth aside from God, and therefore marred.\n\nSo long as they pursue their usual course, they live in actions inspired not by the bountiful spirit, but by the Evil Mind, a mind as aka as the person alluded to in the words parao s (kâthê) akô dregvaitê in the previous verse.\n\n6.\n\nBut, as ever, the moral appeals, and ascriptions of praise, lofty as they are, are not left without the support and service of the ritual.\n\nGod will give these gifts, and all which are the best, but in connection with His Fire imparted to these struggling sides (Y.\n\nXXXI, 2), the believing and the faithless (verses 4, 5), through the increase of His Piety and Order; for that piety, as ever the instructress, will convert all those who come to her, and seek her light (Y.\n\nXXX, 1; Y.\n\nXLV, 1).\n\nNay, she will cause all the living to choose and believe in God (Y.\n\nXXXI, 3).\n\n(If the first two verses here are more like the work of a disciple, the last four show again the original tone.\n\nIt must never be forgotten, however, that later and even interpolated portions are, in their sense, also original, and differ but slightly in their great age from pieces more directly from the first composer.) Translation.\n\n11."

