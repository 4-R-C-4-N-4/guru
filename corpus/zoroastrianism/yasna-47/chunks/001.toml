[content]
body = "11. And to this 1 (man, His chosen saint), Ahura Mazda will give 2 both the two (greatest gifts, His) p. 148 [paragraph continues] Universal Weal and Immortality, by means of His bountiful Spirit, and with His Best Mind, from (the desire to maintain His) Righteous moral Order in word and deed, and by the (strength and wisdom) of His Sovereign Power, (established) in Piety (among His folk). 2. Aye, (that blessedness, which is the) best 1 (creation) of this most bounteous spirit, Ahura Mazda will bring forth in action with words from the mouth and tongue of His Good Mind (within His seers), and by the two hands 2 of Âramaiti (His Piety as she lives within the soul). And by such 3 wise (beneficence is) He the father of the righteous Order (within our worship and our lives). 3. And Thou art therein, O Ahura Mazda! the bountiful One who appertains to, and who possesses, that (most bounteous) spirit in that Thou art He who for this 4 (man, in whom this spirit works) hath made the joy-creating Kine. (And as to her), for her, as p. 149 joyful meadows 1 of her peace, wilt Thou bestow (Thine) Âramaiti (who is our Piety as earth considered), since he 2 (for her) hath taken counsel with Thy Good Mind, Lord! 4. (But this Thy bounteous spirit doth not alone bestow rewards and blessings on the good.) The wicked (foemen of the Faith) are harmed, and from (the motives which move) that bounteous spirit (of Thine own), O Mazda 3 ! but not thus the saints. (And yet the ruler's pride would ever slight the righteous.) The feeble man alone stands free to give in kindly obligation 4 to Thy saint, but having wealth and ruling power, the evil (man) is (at the service) of the wicked, and for much 5 . p. 150 5. But Thou wilt give these gifts, and through Thy (most blessed and most) bounteous spirit, O Ahura Mazda! to this 1 Thy holy saint, for they are whatsoever is the best; but far 2 from Thy love the wicked has his portion, abiding in the actions of the Evil Mind. 6. Aye, these things wilt Thou give (to him), O Thou Ahura Mazda! and through Thy bounteous spirit, (and) by Thy Fire as in a good bestowal to p. 151 the two striving 1 (throngs) through the prosperous increase of our Piety, and of the Righteous ritual and moral Truth; for that (Piety of ours instructing) doth teach 2 the many coming ones who seek her (face)!"

