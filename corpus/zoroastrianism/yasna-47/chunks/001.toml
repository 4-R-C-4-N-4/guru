body = "Sacred Texts Zoroastrianism Index Previous Next Buy this Book at Amazon.com The Zend Avesta, Part III (SBE31) , L.H.\n\nMills, tr.\n\n[1886], at sacred-texts.com p.\n\n145 THE GÂTHA(Â) SPE N TÂ MAINYÛ (SPE N TÂMAINYU(Û)).\n\nThis Gâtha, consisting of Yasna XLVII-L, takes its name from its commencing words.\n\nLike the other Gâthas it owes its existence as a collection to the nature of its metre, as its matter is homogeneous with that of the others.\n\nIts metre may be said to be Trish t up, as its lines have each eleven syllables, and are arranged in stanzas of four.\n\nA general view precedes each chapter.\n\nThe grouping of hymns in this Gâtha has, as usual, little or nothing to do with the question of their relative age.\n\nYASNA XLVII.\n\nTHE BOUNTIFULNESS OF AHURA.\n\nAs in every instance, we may have here only the fragments of a more extended piece; but also, as ever, the circumstance does not diminish the value of what remains.\n\nAlthough some signs of authorship apart from Zarathu s tra are present, the later verses are not at all remote, so far as the period of time which they indicate is concerned, from the Zarathu s trian verses, and are therefore of nearly equal interest, possessing the advantage moreover of affording data for estimating the progress of change.\n\n1.\n\nThe Spe n tâ mainyû here is not identical with Ahura, but is, as so often, His spirit.\n\nIt is more than possible that the memorable application of the word spe n ta to the seven, giving us the Ameshôspends, the Amshaspands of literature, derives its origin from the first verse here before us, or from lost verses of a similar character.\n\nAll the seven seem purposely and artificially grouped here, although 'His Spirit' is of course not one of them.\n\nThe commencing word spe n ta further attracted attention in so far as to form the theme for a sort of play upon words in the later epilogue of Visparad XIX.\n\nBy means of this His indwelling Spirit (which idea, or expression, has probably no direct connection with the 'Holy Spirit' of the Old and New Testaments, but which, as giving the designation 'spirit' to the Ameshôspends, may well have been the original of the 'seven spirits which are before the throne of God'), by means of this p.\n\n146 blessed spirit, that is, in accordance with his inmost thoughts, Ahura bestows a gift upon the ideal saint (verses 4, 5), upon him who works the best results for Zarathu s tra (Y.\n\nXLVI, 19), the Ratu, and the prophet (Y.\n\nXXIX, 6, 8).\n\nAnd this gift is declared to be the inseparable two, Happiness in every particular, and then both the prospect and realisation of the continuance of that Happiness in Immortality.\n\nAnd these He bestows, not through His immediate action, which no human intellect, or susceptibility, could take in unaided, but by His especially revealed Benevolence, His Best Mind, as His representative, in accordance with His plan of Order and Purity, pervading every moral as well as every spiritual regulation, and by the exercise of His Royal Power, sent forth as the 'archangel' Khshathra, and embodied in the polity of the sacred Zarathu s trian state, and this as influenced in all its relations, public and domestic, by practical piety called Âramaiti, Ahura's daughter (the ready mind)."

