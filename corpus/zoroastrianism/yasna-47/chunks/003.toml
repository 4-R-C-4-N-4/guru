[content]
body = "And to this 1 (man, His chosen saint), Ahura Mazda will give 2 both the two (greatest gifts, His) p.\n\n148 [paragraph continues] Universal Weal and Immortality, by means of His bountiful Spirit, and with His Best Mind, from (the desire to maintain His) Righteous moral Order in word and deed, and by the (strength and wisdom) of His Sovereign Power, (established) in Piety (among His folk).\n\n2.\n\nAye, (that blessedness, which is the) best 1 (creation) of this most bounteous spirit, Ahura Mazda will bring forth in action with words from the mouth and tongue of His Good Mind (within His seers), and by the two hands 2 of Âramaiti (His Piety as she lives within the soul).\n\nAnd by such 3 wise (beneficence is) He the father of the righteous Order (within our worship and our lives).\n\n3.\n\nAnd Thou art therein, O Ahura Mazda!\n\nthe bountiful One who appertains to, and who possesses, that (most bounteous) spirit in that Thou art He who for this 4 (man, in whom this spirit works) hath made the joy-creating Kine.\n\n(And as to her), for her, as p.\n\n149 joyful meadows 1 of her peace, wilt Thou bestow (Thine) Âramaiti (who is our Piety as earth considered), since he 2 (for her) hath taken counsel with Thy Good Mind, Lord!\n\n4.\n\n(But this Thy bounteous spirit doth not alone bestow rewards and blessings on the good.) The wicked (foemen of the Faith) are harmed, and from (the motives which move) that bounteous spirit (of Thine own), O Mazda 3 !\n\nbut not thus the saints.\n\n(And yet the ruler's pride would ever slight the righteous.) The feeble man alone stands free to give in kindly obligation 4 to Thy saint, but having wealth and ruling power, the evil (man) is (at the service) of the wicked, and for much 5 .\n\np.\n\n150 5.\n\nBut Thou wilt give these gifts, and through Thy (most blessed and most) bounteous spirit, O Ahura Mazda!\n\nto this 1 Thy holy saint, for they are whatsoever is the best; but far 2 from Thy love the wicked has his portion, abiding in the actions of the Evil Mind.\n\n6.\n\nAye, these things wilt Thou give (to him), O Thou Ahura Mazda!\n\nand through Thy bounteous spirit, (and) by Thy Fire as in a good bestowal to p.\n\n151 the two striving 1 (throngs) through the prosperous increase of our Piety, and of the Righteous ritual and moral Truth; for that (Piety of ours instructing) doth teach 2 the many coming ones who seek her (face)!\n\nFootnotes 147:1 Or, 'to us;' but in that case it would be the Kine who 'took counsel' as mentioned in the third verse.\n\nThis is, however, far from impossible, as she is mentioned as uttering her wail, and being answered by her maker in Y.\n\nXXIX, 1, 2.\n\nSo understanding, 'to us' becomes an admirable rendering for verse 1; but in verse 3, it is strained, as the Kine for whom (Y.\n\nXXIX, 9) Zarathu s tra was appointed, could not so readily be declared to be the one which was given to 'us,' she representing 'us' in that place to a great extent."

