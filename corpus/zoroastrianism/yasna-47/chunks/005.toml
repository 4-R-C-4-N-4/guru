[content]
body = "Moreover, his in all the instances in which it is used ends the sense, and here is separated by the caesura from parao s , which, however, is of no great importance.\n\nThe discourse is of the wicked; the holy are incidentally mentioned, and here their ill-treatment is signalised.\n\nAkô cannot well mean 'hostile' here; see also akâ t in the following verse.\n\nIsvâ k î t , if understood with nâ, alters nothing.\n\n'A man was desirous of (little for the service of the saint, but even when he himself was rich, in the desire) of much was the evil for the evil.\n\n' Or, taking kas e u s k î t as governed by isvâ k î t understood with kâthê as before understood in the last line: 'Only a man (men) (possessed) of little was at the service of the righteous, while an evil man (men) possessed of much (was at the service) of the wicked.' The other translation is: 'Even a man of little means stands to the willing service of the saint, but a man even of large means is hostile (?) to the wicked.' This is very glib and so attractive, but I cannot accept it in view of the context.\n\nGâthic expression is often unfortunately far from glib; but cramped, awkward, and apt to contain more thought than could be conveniently expressed within the counted number of syllables.\n\nThe glib rendering needs other language than that in the MSS.\n\nSee the following verse, which directly contrasts the treatment of the good and evil by Ahura Himself.\n\n150:1 See ahmâi in verse 1, and ashaunê in verse 4.\n\nAhura treats the saint in a manner the reverse from that practised by the nâ kas e u s * and akô, not giving sparingly to the good, nor much to the wicked.\n\n150:2 The Pahlavi gives us our first surmise here, as usual, by g avî d min hanâ î lak dôshi s nîh.\n\n151:1 Or, 'by the two ará n i;' but compare the ãsay a u in Y.\n\nXXXI, 2 just preceding ranôibyâ; so here the ashavan and dregva n t are mentioned in a preceding verse.\n\nThe Pahlavi is unvarying with patkardârânŏ.\n\nI will not positively decide as to this point; generally, however, the preferred rendering is in the text, while on very many questions there is nearly an even balance of probabilities.\n\n151:2 Or, 'chooses to herself;' but a causative sense may be expressed by an intensive form; the Pahlavi also here bears evidence in the same sense to a causative by hêmnunê d , itself, however, meaning only the object caused; namely, the belief.\n\nNext: Yasna XLVIII"

