[content]
body = "175 [paragraph continues] (of ritual and truth I shall yet further do) on account of, (and to make full 1 ) these (prior deeds of worship), yea, whatsoever (holy works) shine bright 2 as having worth in (all) men's eyes through Thy Good Mind (whose character they share; these as) the stars, suns, and the Aurora which brings on the light 3 of days, are all, through their Righteous Order, (the speakers) of Thy 4 praise, O Thou Great Giver, Lord!\n\n11.\n\nYour praiser then (by eminence) would I be named, and (more), would be it, so long as by (Thine inspiring) Righteousness I am thus able and may have the power.\n\nAnd may the maker of the world give help through (His implanted) Good Mind (in my fellow-servants).\n\nAnd may that (all) be done 5 (to further us) which through His veritable grace is most promotive (for the cause)!\n\nFootnotes 170:1 This verse is placed here as obviously more closely related to chapter L than to chapter XLIX.\n\nLost verses may, however, have intervened between it and Y.\n\nL, 1.\n\n170:2 Another rendering, regarding ka t as a purely interrogative participle, would be, 'Are they (tôi) helpful to the invoking Zarathu s tra?' But ka t tôi is a familiar form; see Y.\n\nXXXIV, 12, where it must mean quid tibi.\n\n171:1 I should be far from denying that azdâ may equal addhâ´, but a strengthening adverb seems to me of no particular force here.\n\nI formerly rested at the simple explanation az + dâ = dhâ = desire-exciting, much desired one.\n\nBut the Pahlavi translator affords an explanation which may surpass that of his successors.\n\nHe sees the meaning: 'When I shall call upon You,' (that is, freely, 'being invoked,') 'cause Thou (sic) me to understand fully.' This is the remnant of some predecessor's work who rendered 'tell ye me;' az = ah, otherwise lost in Zend.\n\nThe plural follows the singular too often to excite much doubt; azdâ = tell ye; so zdî is from az, as syôdûm is from as (recall the well-known Indian analogies).\n\nSee also the explanation of the Pahlavi at Y.\n\nXXXI, 17.\n\nIf a plural cannot be admitted, then consider a form extended by d.\n\n171:2 The Pahlavi translates freely, bavîhûnam.\n\n171:3 The Kine must represent the people as well as their live-stock.\n\nThe raids concerned the owners more than their cattle.\n\nIn answer to the cry of the Kine, Zarathu s tra was sent to the people.\n\n171:4 I can hardly agree to the rendering 'among people who see the sun' without a needless reconstruction of the text.\n\nThe Pahlavi likewise has pavan khvârîh; for general meaning, compare Khshathrôi h v e n g daresôi, not as equivalent however.\n\n171:5 Âskârak stî.\n\n172:1 The Pahlavi translation, as usual, not literally exact, still furnishes the correct clue, Zak î nazdistô (1) gêhânŏ min valman î darvand bakhshê d [aîga s zak dên dâri s n barâ yansegûnyên].\n\n172:2 Frô tâi s vîspâi s K invatô frâ, peretûm."

