[content]
body = "172:3 Âk a u (compare the Indian âkê); 'who approach, and are therefore evident (âshkârak) to God, and seeing Him.' Comp.\n\nâk a u in Y.\n\nLI, 13, which has been thought a loc.\n\n172:4 See n a u.\n\n172:5 To vra g .\n\n173:1 See the previous verse, where the wisher stands on the path, seeking to reach Garô d man.\n\nIt seems therefore probable that h v âthrê refers to demânê garô.\n\n173:2 Compare Y.\n\nLIII, 2, d a unghô erezû s pathô.\n\n173:3 As remarked, this entire piece recalls Y.\n\nXXVIII.\n\nHere the monarch is represented as speaking precisely as spokesmen are introduced in any other composition.\n\nWe have no reason to suppose the piece to be the composition of some leading person other than Zarathu s tra, because of the words 'let Zarathu s tra speak forth my regulations.' (See page 169 .) 173:4 Îshô st a ungha t â paithî.\n\n173:5 Consider a suffix ish t i.\n\n173:6 Here the Pahlavi translator gives us both text and translation, aurvatô = arvand.\n\n173:7 Or, 'yoke Thou, may’st Thou gain.' 173:8 The K inva t Bridge, either literally or figuratively.\n\nCompare 'the bridge of the earth' (Y.\n\nLI, 12).\n\nThe crises of effort, or temptation, are meant, as the K inva t Bridge was the last crisis before salvation or perdition.\n\nThe souls of the good and of the evil were met by their own consciences on the Bridge, and encouraged or reviled.\n\n'When the soul of the pious passes over that Bridge, the width of p.\n\n174 that Bridge becomes about one league' (West, Mainyô-î Khard,* p.\n\n134).\n\nPossibly the extension of the Bridge for the pious arose from the plural use here.\n\n174:1 Compare Y.\n\nXXVIII, 3.\n\n174:2 See Y.\n\nXXVIII, 9.\n\n174:3 See Y.\n\nXXVIII, 2.\n\n174:4 See Y.\n\nXLVI, 9.\n\n174:5 The Pahlavi translator accepts a ser se of acquisition here as well as of desire: Aêtûnŏ zak î valman î avŏ hû-dânâk pavan khvahî s nŏ grîftâr hômanânî [mozd].\n\nI accede to its indication, holding that gardh certainly has such an element in its meaning.\n\n175:1 I can here only follow the words as they are written; the meaning is clear enough although rather advanced.\n\nReconstructions on a large scale are seldom of value.\n\n175:2 Judging from the context, we may render ar g a t thus.\n\n175:3 The Pahlavi translator here renders as if he read ushâ.\n\nIn Y.\n\nXLVI, 3 he translates ukhshânô.\n\nProfessor Wilhelm, preferring as above, still recalls the Homeric usage favouring 'increaser.' The Pahlavi has vakhshînî d âr in Y.\n\nXLVI, 3.\n\nHere hôsh zak î arûs dên bâm I.\n\nNer.\n\nalone understood arûs.\n\n175:4 'Your.' 175:5 An imperative has long been recognised in var s tãm; or read: 'Let him cause that which is the most furthering of deeds to grow influential through veritable grace.' So perhaps better.\n\nNext: Yasna LI"

