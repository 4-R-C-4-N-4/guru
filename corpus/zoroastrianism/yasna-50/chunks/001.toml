[content]
body = "Y.\n\nXLIX, 12 1 .\n\nWhat aids of grace hast Thou for Thine invoking Zarathu s tra, (O Ahura Mazda!) to grant him through Thy Righteous Order?\n\nYea, what (aids of 2 grace hast thou for me as) through Thy Good Mind given (within my soul), for me who will (still) pray to Thee with praises, O Great Creator!\n\nbeseeching what in accordance with Your wished-for aim is best?\n\nY.\n\nL, 1.\n\nAye, doth my soul indeed obtain assisting p.\n\n171 grace, and which of Thy blessings is that gift to me, O Lord?\n\nWhat saving champion is found to save both flocks and herds?\n\nAnd who for myself other than Thy Righteous Order, and Thyself, Ahura?\n\nTell me 1 , O (ye) invoked ones!\n\nOr what of grace is there for me save Thy Best Mind (itself)?\n\n2.\n\n(And if Thy guardian is verily to save our wealth) how shall he (obtain, and by what means shall he) seek after 2 that joy-creating Kine (who is the living symbol of our peace 3 )?\n\n(How shall that man obtain his wish) who shall desire to see her provided with pastures for (the welfare of) this land?\n\n(That only way is righteousness.) Do Thou then grant me lands (so would I ask of Thee) which live in justice in the many 4 splendours of the sun, and lands which openly 5 thus live, and which are to be p.\n\n172 sought and gained by me (as conquests for the cause).\n\nGive Thou this gift!\n\n3.\n\n(Yea, let that joy-creating one) be his possession through the Righteous Order (which he helps to bring, that living sign) which (the most valiant citizen) may give to him (at once reward and charge), and in accordance with Thy Sovereign Authority.\n\n(May that heroic settler grant him this gift) he who may make the (last imperilled) farm to flourish in the vigour of Thy blest prosperity, the tract which lies the nearest (to the fields) which our foeman holds as his 1 .\n\n4.\n\n(And therefore both in thankfulness and hope) will I give sacrifice to You with praises, O Ahura Mazda!\n\ntogether with Thine Order and Thy Best Mind (in Thy saints), and in accordance with Thy sacred Sovereign Power, by whose help the wisher (heaven-bound) may stand upon the (certain) pathway 2 , and in Thine Home-of-song shall I (by means of these my Yasnas offered here) there hear the praises of Thine offering saints who see Thy face 3 .\n\n5.\n\nAnd we 4 are in readiness as well (to fulfil Your praises and declare your words), O Ahura Mazda!\n\nthrough Your (grace, and) in accordance with Your Holy Order, since Ye advance with friendliness 5 to cheer the speaker of Your Mãthra-word with open acts of visible relief, as if with hand sent forth, p.\n\n173 whereby that Mãthra-speaker of Your truth may bring us on, and settle us, in weal and bliss 1 .\n\n6.\n\n(Therefore will I incite him to his task the more.\n\nLet him indeed proclaim the righteous way 2 ) he who already lifts his voice in Mãthras, O Ahura Mazda!\n\nhe, Zarathu s tra 3 , the faithful friend in accordance with the Holy Order, and with self-abasing worship, giver of understanding for this land, voice-guider (of the way to glory 4 ), let him indeed proclaim and teach my regulations, and in accordance with Thy Good Mind (as his law).\n\n7."

