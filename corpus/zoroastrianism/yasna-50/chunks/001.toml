body = "Sacred Texts Zoroastrianism Index Previous Next Buy this Book at Amazon.com The Zend Avesta, Part III (SBE31) , L.H.\n\nMills, tr.\n\n[1886], at sacred-texts.com YASNA XLIX, 12-L.\n\nThe most striking circumstance here, after the rhetorical and moral-religious peculiarities have been observed, is the sixth verse; and as to the question of Zarathu s trian authorship, it is the most striking in the Gâthas or the Avesta.\n\nIn that verse we have Zarathu s tra, not named alone, which might easily be harmonised p.\n\n168 with his personal authorship, nor have we only such expressions as 'to Zarathu s tra and to us' (Y.\n\nXXVIII, 7), but we have Zarathu s tra named as 'mahyâ râz e n g sâhî t ,' 'may he declare my regulations, ' which could only be said, without figure of speech, by some superior, if not by the prime mover himself.\n\nWere these verses then written by the prime mover?\n\nAnd was he other than Zarathu s tra?\n\nIf so, the entire mass of the Gâthas was of course written by him, or else their style and character may be regarded as of such a character that they could have been composed by four or five closely connected individuals.\n\nBut while verses here and there are doubtless the productions of secondary persons, the mass of the Gâthas cannot be regarded as the work of several different composers.\n\nThey are one man's work, directly or indirectly.\n\nIf then the present section, which is especially original in its tone, was not from Zarathu s tra, the man whose heart and soul, and, we may add, whose power were in Zarathu s trianism, was not Zarathu s tra, but some unnamed individual far more important.\n\n(See note on Y.\n\nXXVIII, 7.) The prominence of the name of Zarathu s tra was in that case solely owing to the personal activity of Zarathu s tra supported by the social rank of the Spitâmas.\n\nZarathu s tra was a princely disciple, on the hypothesis mentioned, and nothing more.\n\nThe real author of Zarathu s trianism was, in that case, in no sense Zarathu s tra; compare 'to Zarathu s tra and to us:' nor yet Vî s tâspa; compare 'to Vî s tâspa and to me:' nor Frashao s tra; compare 'to Frashao s tra and to us;' and, we may also say, not G âmâspa, for he is addressed in the vocative.\n\nHe was mentally and personally the superior of all of them.\n\nIn fact he was the power behind both throne and home, and yet without a name!\n\nBut, in that case, what becomes of Y.\n\nXXIX, 6, 8?\n\nIs it probable that the founder of a religion (or of a new departure in a religion) would describe another as the chosen of God, if he were not in fact supposed to be thus eminent?\n\nOr, if a popular and sincerely enthusiastic religious composer were about to chant a hymn at a meeting of the religious masses, would he be likely to name a person to the animated throngs, whom they themselves did not feel to be the life of their religious faith?\n\nespecially, if that person were not prominent from the arbitrary circumstance that he was the reigning prince?\n\nI do not think that this is at all probable."

