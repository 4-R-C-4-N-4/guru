[content]
body = "(And therefore both in thankfulness and hope) will I give sacrifice to You with praises, O Ahura Mazda!\n\ntogether with Thine Order and Thy Best Mind (in Thy saints), and in accordance with Thy sacred Sovereign Power, by whose help the wisher (heaven-bound) may stand upon the (certain) pathway 2 , and in Thine Home-of-song shall I (by means of these my Yasnas offered here) there hear the praises of Thine offering saints who see Thy face 3 .\n\n5.\n\nAnd we 4 are in readiness as well (to fulfil Your praises and declare your words), O Ahura Mazda!\n\nthrough Your (grace, and) in accordance with Your Holy Order, since Ye advance with friendliness 5 to cheer the speaker of Your Mãthra-word with open acts of visible relief, as if with hand sent forth, p.\n\n173 whereby that Mãthra-speaker of Your truth may bring us on, and settle us, in weal and bliss 1 .\n\n6.\n\n(Therefore will I incite him to his task the more.\n\nLet him indeed proclaim the righteous way 2 ) he who already lifts his voice in Mãthras, O Ahura Mazda!\n\nhe, Zarathu s tra 3 , the faithful friend in accordance with the Holy Order, and with self-abasing worship, giver of understanding for this land, voice-guider (of the way to glory 4 ), let him indeed proclaim and teach my regulations, and in accordance with Thy Good Mind (as his law).\n\n7.\n\n(And together with that chief speaker of your word I would engage yet others in the cause).\n\nYour well-incited 5 and swift 6 (servants), O Ahura!\n\nwould I yoke 7 on (as steeds to take their holy course toward heaven), gaining 7 thereby (at last) the Bridges 8 where p.\n\n174 [paragraph continues] Your adoration (rules and is complete).\n\nYea, I (?) yoke on your mighty ones, and with Thy Holy Order, and Thy Good Mind.\n\nAnd with these may Ye drive on; aye, be Ye for my help!\n\n8.\n\n(And as I yoke on Your Mãthra-speakers for their course, then) would I (myself) approach You in the (highest) deed of worship 1 , and with these sacred metric feet (of Zarathu s tra and his peers 2 ), those which are heard and famed afar, as the metric feet of zealous worship, and with my hands stretched 3 out (in supplicating prayer).\n\nYea, You (would I approach), O Mazda!\n\nin union with Your sacred ritual Truth, and with the homage of a freely-giving helper 4 , and with the good virtue of (Your) Good Mind (in my soul).\n\n9.\n\nYea, with these Yasnas of Your sacrifice would I approach You, praising back to You (in answer to Your mercies), O Ahura!\n\nand Thou, O Righteousness!\n\nin (the holy) actions of Your Good Mind, (as he moves within us), so long indeed as I shall have the power, commanding at my will o’er this my sacred (privilege) and gift.\n\n(And doing as) the wise man (thus), may I (like him) become a supplicant who gains 5 his ends.\n\n10.\n\n(Mine every wish and prayer is this), then therefore whatsoever I shall do, and whatsoever deeds p."

