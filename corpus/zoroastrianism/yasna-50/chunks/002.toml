[content]
body = "(And together with that chief speaker of your word I would engage yet others in the cause).\n\nYour well-incited 5 and swift 6 (servants), O Ahura!\n\nwould I yoke 7 on (as steeds to take their holy course toward heaven), gaining 7 thereby (at last) the Bridges 8 where p.\n\n174 [paragraph continues] Your adoration (rules and is complete).\n\nYea, I (?) yoke on your mighty ones, and with Thy Holy Order, and Thy Good Mind.\n\nAnd with these may Ye drive on; aye, be Ye for my help!\n\n8.\n\n(And as I yoke on Your Mãthra-speakers for their course, then) would I (myself) approach You in the (highest) deed of worship 1 , and with these sacred metric feet (of Zarathu s tra and his peers 2 ), those which are heard and famed afar, as the metric feet of zealous worship, and with my hands stretched 3 out (in supplicating prayer).\n\nYea, You (would I approach), O Mazda!\n\nin union with Your sacred ritual Truth, and with the homage of a freely-giving helper 4 , and with the good virtue of (Your) Good Mind (in my soul).\n\n9.\n\nYea, with these Yasnas of Your sacrifice would I approach You, praising back to You (in answer to Your mercies), O Ahura!\n\nand Thou, O Righteousness!\n\nin (the holy) actions of Your Good Mind, (as he moves within us), so long indeed as I shall have the power, commanding at my will o’er this my sacred (privilege) and gift.\n\n(And doing as) the wise man (thus), may I (like him) become a supplicant who gains 5 his ends.\n\n10.\n\n(Mine every wish and prayer is this), then therefore whatsoever I shall do, and whatsoever deeds p.\n\n175 [paragraph continues] (of ritual and truth I shall yet further do) on account of, (and to make full 1 ) these (prior deeds of worship), yea, whatsoever (holy works) shine bright 2 as having worth in (all) men's eyes through Thy Good Mind (whose character they share; these as) the stars, suns, and the Aurora which brings on the light 3 of days, are all, through their Righteous Order, (the speakers) of Thy 4 praise, O Thou Great Giver, Lord!\n\n11.\n\nYour praiser then (by eminence) would I be named, and (more), would be it, so long as by (Thine inspiring) Righteousness I am thus able and may have the power.\n\nAnd may the maker of the world give help through (His implanted) Good Mind (in my fellow-servants).\n\nAnd may that (all) be done 5 (to further us) which through His veritable grace is most promotive (for the cause)!"

