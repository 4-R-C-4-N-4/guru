[content]
body = "But if Zarathu s tra had, as described, the leading name, and composed a portion of the hymns with their lost companions, is it probable that he possessed no decided prominence in this matter above Vî s tâspa, Frashao s tra, and G âmâspa?\n\nWas there no central poet, who p.\n\n169 composed the mass of the metrical lore, dominating by his influence those who added portions here and there, or was there a quaternion of seers, four Zarathu s tras, as one might say?\n\nAs we have said, the hymns decide it.\n\nOne man's soul is in them, as a composer's feelings are in his compositions, or a master's feelings are in the lines of his disciples.\n\nBut if there was one central figure instead of four, and he is mentioned as Zarathu s tra, and as the spokesman in many portions of the Gâthas, being likewise known by inference to be the composer of nearly all of them, how can we account for the words, 'let him, Zarathu s tra, teach or proclaim my regulations?' Can the verse be regarded as put into the mouth of Ahura, as elsewhere?\n\nHardly, for Ahura is addressed in it.\n\nI can therefore only repeat of this verse, as of the others which present analogous questions in Y.\n\nXXVIII (with which this chapter L stands in the closest connection), that this thoroughly original piece was composed by Zarathu s tra as by far the most prominent individual in the religious struggle, dominating his party essentially and positively, and that these verses (6-11) were simply rhetorically put into the mouth of the monarch from the exigency of the style of composition.\n\nAnd I conclude that Vî s tâspa was supposed to speak them, because in the presence of Zarathu s tra, it is extremely improbable that any one but the titular head of the State should have been represented as saying of Zarathu s tra, 'mahyâ râz e n g sâhî t .' 1.\n\nThe piece from Y.\n\nXLIX, 52 to Y.\n\nL, 1-5 joins well on with Y.\n\nXLIX, although the tone is brighter.\n\nAs he begins with questions in Y.\n\nXLVIII, 8-11, after the prospective prayers of Y.\n\nXLVIII, 1-7, in which he looks forward to a crisis in the armed struggle, so now after the hostile chief has got the upper hand, he cries out once more with interrogatives, uttering the questions, not of curiosity, but of mournful devotion.\n\n'The storm has broken over us,' so he would seem to say, 'and I have prayed for grace to know how we may administer (Y.\n\nXLIV, 9) the all-powerful means of help, the Daêna, in which Thy Righteous Order is set (Y.\n\nXLIX, 3).\n\nI have cried to Thee for chief and peer (verse 7), naming Frashao s tra, G âmâspa, and the Yâhin, and now, while I invoke you, praying for what in your selection is the best (Y.\n\nXXVIII, 11; Y.\n\nXLIV, 10), I would more than ever declare that I have none other help than Thee and Thy saving Order.' 2.\n\nAnd he asks once more to know how he who seeks to further the sacred herds, as the emblem of the moral thrift of the provinces, should proceed in his allotted work.\n\n3.\n\nAnswering his own question, he says that it is by advance upon the enemy; he declares p."

