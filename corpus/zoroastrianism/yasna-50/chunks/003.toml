body = "170 that the heroic settler who pushes the holy system to the utmost verge of the sacred territory or still further, was the man 'to gain the Kine' for the seeking prophet.\n\n4.\n\nBut in the midst of struggles, he anticipates Garô d man with its praises.\n\n5.\n\nFor they were all prepared for both worship and work, since God had approached to aid His prophet, encouraging His discouraged spirit.\n\n6.\n\nHere Vî s tâspa is represented as intervening; and he addresses Ahura literally, but Zarathu s tra really, exhorting him indirectly to continue on in his work of propagation, undismayed by present circumstances.\n\n7.\n\nAnd with Zarathu s tra, he would re-engage the other powerful helpers, whom he would yoke on as steeds to gain God's praise in Heaven by passing over every bridge of trial safely.\n\n8.\n\nHaving heard from Zarathu s tra his metric words, he will approach with them to pray, and, as in Y.\n\nXXVIII, 2, 3, 'with hands stretched out' with homage, and with vigour.\n\n9.\n\nAnd he looks to attain the object of his prayers by religious self-control, and faithful action.\n\n10.\n\nHis efforts vie with the heavenly bodies in their praise of God.\n\n11.\n\nTherefore he will persevere, and as a praiser-king (so the Pahlavi in one place); and he beseeches that Ahura, the life-giver, may help on the all-engrossing cause.\n\nTranslation.\n\nY.\n\nXLIX, 12 1 .\n\nWhat aids of grace hast Thou for Thine invoking Zarathu s tra, (O Ahura Mazda!) to grant him through Thy Righteous Order?\n\nYea, what (aids of 2 grace hast thou for me as) through Thy Good Mind given (within my soul), for me who will (still) pray to Thee with praises, O Great Creator!\n\nbeseeching what in accordance with Your wished-for aim is best?\n\nY.\n\nL, 1.\n\nAye, doth my soul indeed obtain assisting p.\n\n171 grace, and which of Thy blessings is that gift to me, O Lord?\n\nWhat saving champion is found to save both flocks and herds?\n\nAnd who for myself other than Thy Righteous Order, and Thyself, Ahura?\n\nTell me 1 , O (ye) invoked ones!\n\nOr what of grace is there for me save Thy Best Mind (itself)?\n\n2.\n\n(And if Thy guardian is verily to save our wealth) how shall he (obtain, and by what means shall he) seek after 2 that joy-creating Kine (who is the living symbol of our peace 3 )?\n\n(How shall that man obtain his wish) who shall desire to see her provided with pastures for (the welfare of) this land?\n\n(That only way is righteousness.) Do Thou then grant me lands (so would I ask of Thee) which live in justice in the many 4 splendours of the sun, and lands which openly 5 thus live, and which are to be p.\n\n172 sought and gained by me (as conquests for the cause).\n\nGive Thou this gift!\n\n3.\n\n(Yea, let that joy-creating one) be his possession through the Righteous Order (which he helps to bring, that living sign) which (the most valiant citizen) may give to him (at once reward and charge), and in accordance with Thy Sovereign Authority.\n\n(May that heroic settler grant him this gift) he who may make the (last imperilled) farm to flourish in the vigour of Thy blest prosperity, the tract which lies the nearest (to the fields) which our foeman holds as his 1 .\n\n4."

