body = "Hübschmann: 'um durch ihn Plagen über das Leben des Menschen zu bringen.' 32:2 Verbatim.\n\nOf these two spirits not aright may choose the Daêvas, since these we have beguiled (or have injured).\n\nTo the-questioning ones upon came-he in-order-that he might-be-chosen (subjunctive middle) he-the worst mind.\n\nThereupon to-furious-rapine they rushed-together in-order-that (yena) they might disease (or ruin) the-life of-man.\n\n32:3 Or, 'to him;' some unnamed benefactor; hardly 'to us.' The Pahlavi has, avŏ valman, but Ner.\n\nhas only tatra k a.\n\nObserve ahmâi in chap.\n\nXLIII, 1, and in chap.\n\nXLVII.\n\n32:4 Root ãn = in.\n\nThe Pahlavi freely, pavan astûbîh.\n\nHe seems to have thought of nam + a priv.\n\nKehrpem is feminine.\n\nÃnmâ may be a neuter in apposition.\n\nOtherwise we must accept -mâ as a suffix.\n\nOr can kehrpem (corpus) be a neuter here?\n\nThe clothing of the spirits with corporeal natures enabled them to advance in the development of moral qualities by self-restraint and pursuit.\n\nAs has been observed in the summary, no Fravashis appear in the Gâthas.\n\nHave we here possibly an indication of the pre-existence of souls?\n\nIf Âramaiti gave a body, it may be inferred that a period elapsed between the acts of the two spirits and this.\n\n32:5 That bodies are to be given to the saints as at the first is to p.\n\n33 be inferred from Ya s t XIX, 89.\n\n(Which see in part ii of the translations of the Zend-Avesta.) 33:1 Verbatim.\n\nTo-this (to us?)-and with-Khshathra came, with-Manah Vohu, with Asha-and (Âramaiti) thereupon a-body the-continuing gave Âr(a)maiti the strenuous (Âramaiti, or the body, a vigorous and strenuous thing).\n\nOf these thine (or to thee) to let-it (the body)-be as thou-tamest in-creations the-first.\n\n33:2 See verse 6.\n\n33:3 What else can be the subject of sastî?\n\n33:4 Observe the pronounced personification of Righteousness.\n\nAs a matter of course the ultimate sense is more commonplace, as is the case with all poetical matter.\n\n'Into the hands of Asha,' is the same as to say, 'into the power of the servant of God.' But would this be a proper mode of rendering a line of real though rudely primitive poetry?\n\nSuch renderings are commentary rather than translation.\n\nThe Pahlavi may be rendered as follows: Thus also in that creation [in the final body] hatred comes to these haters and sinners; [that is, the avengers shall execute chastisement upon them].\n\nAnd, therefore, O Aûharmazd!\n\nwhat to thee is the sovereignty, by that (so possibly) shall Vohûman give a reward.\n\nThrough these, O Aûharmazd!\n\n[through the religion of Aûharmazd], when one is instructed in Righteousness, [that is, as to the interests of the pious] then the Drû g is given into one's hand, [the Drû g who is Aharmôk]."

