[content]
body = "Observe the singular abstract a g yâitî m k â, which is not lightly to be passed over.\n\nWhy not a more ordinary expression?\n\nHave we not here an unusual antithesis?\n\nThe danger is great that by aiming to reduce all to commonplace for the sake of safety, we may demolish many an interesting conception of antiquity.\n\n30:3 Observe the subjectivity.\n\nThese verses settle the question as to the depth of the Zarathu s trian hymns.\n\nGrammar forces us to see that the composer had large ideas.\n\nThe entire cast of reflection in the Gâthas tends to be abstract as well as subjective.\n\nNot so their invective and partisan exhortations.\n\n30:4 Verezyô is a nom.\n\nsing.\n\nmasc., as would seem natural from its position in the sentence.\n\nCompare mãthrâi s verezyâi s .\n\n30:5 Observe that Ahura is undoubtedly called speni s ta mainyu.\n\nElsewhere we must sometimes render, 'His bountiful spirit.' 31:1 Zak î sakht sag nihûftŏ âsmâni k .\n\nNer.\n\nGâ dh ataram* âkâ s a m dadau.\n\n31:2 'Who with actions really good piously content Ahura.' Let it be noticed that fraore t is not independently translated by the Pahlavi.\n\nIt is freely included in avŏ Aûharmazd; and yet this is supposed by some to be a word-for-word rendering!\n\nNer.\n\npraka t âi s k a karmabhi h .\n\nVerbatim.\n\nOf-these-two spirits he-chose-to-himself (he)-who (was) the evil (the one) the worst (deeds) working*.\n\nThe-Righteous-Order (accusative) (chose) the spirit most-bountiful (he-)who the most-firm stones clothes-on-himself, (those) who-and will-content Ahura with real actions believingly Mazda.\n\n(Properly a verbatim rendering is only possible in an inflected language.) 31:3 La râstŏ vi g inênd.\n\nThey suffer judicial blindness; a common idea in the Gâthas; compare, 'who holds them from the sight of the truth,' &c.\n\n31:4 The root is indicated by va mûni k valman s ân frîft.\n\nI can see no escape from the above rather adventurous rendering.\n\nSee also dafshnyâ he n tû in chap.\n\nLIII, 8.\n\nPerhaps the idea of injury here preponderates over that of deceit; 'since we have impaired their power.' The choice between a preterit or an improper subjunctive is also difficult.\n\nPossibly, 'so that we may fatally deceive them.' Poss.\n\nnom.\n\n'deception came upon them, even A.M.' 31:5 This recalls Vendîdâd XIX, 45, where the demons assemble in council to consider the advent of Zarathu s tra.\n\n31:6 Compare verse 4, where Vahi s tem Manô equals heaven.\n\nThe p.\n\n32 word is the subject of ' g asa t ,' and has the proper place of a nominative in the sentence; cp.\n\nVedic usage.\n\n32:1 That they might disease (so literally) the lives of those who had not yet been tempted or fallen.\n\nThe Pahlavi: Vîmârtnî d ŏ ahvân î mar d ûmân [aîgh, ###evatman aêshm an s ûtâân ahûkînên d ].\n\nNer.: Ye ni g aghnur bhuvana m manushyânâ m ."

