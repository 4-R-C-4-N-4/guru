body = "Sacred Texts Zoroastrianism Index Previous Next Buy this Book at Amazon.com The Zend Avesta, Part III (SBE31) , L.H.\n\nMills, tr.\n\n[1886], at sacred-texts.com p.\n\n25 YASNA XXX.\n\nTHE DOCTRINE OF DUALISM.\n\n1.\n\nAccustomed to instruct the masses who throng him on public occasions seeking light, the composer constructs this hymn for similar opportunities.\n\nHe may be regarded as continuing the thoughts in the close of Y.\n\nXXVIII, where he besought Ahura to inform him concerning the origin of the world.\n\nHe says that he will declare the counsels of God, by which, as we see, he means the great doctrines concerning the origin of good and evil.\n\nWith these he will declare also the praises, the laudatory portions of the Mãthra, and the sacrifices.\n\nAnd he prays that propitious results may be discerned in the heavenly bodies.\n\n2.\n\nHe further introduces what he has to say by telling the throngs before him that a decisive moment is upon them.\n\nThey are to choose their religion, and not by acclamation with the foolish decision of a mob, but man by man, each individually for himself.\n\nThey should therefore arouse themselves and hear with all attention, and gaze at the holy Fire with a good and receptive disposition of mind.\n\n3.\n\nHe then delivers the earliest statement of dualism which has come down to us.\n\nThere were two original spirits, and they are called, be it well noted, not two persons, or at least not only two persons, but a better thing, or principle, and a worse one.\n\n(The qualifying words are all in the neuter 1 .) At the next sentence they are personified as a pair, each independent in his thoughts, declarations, and actions.\n\nSuch is the short Theodicy, followed at once by an admonition to those before him to choose the better.\n\n4.\n\nThese two spirits came together as by natural combination, to make the opposing phenomena of life and its absence, of Heaven and of Hell.\n\nAnd Hell is described not as a scene of cruelty inflicted on the innocent and the ignorant, but as 'the worst life,' and Heaven as equally remote from a superstitious paradise; that is, as the 'best mental state.' p.\n\n26 This is the proper Zarathu s trian creation.\n\nIt is undeniably 'abstract,' very, and just in proportion as it lacks colour and myth are its depths visible.\n\nThe account of it is also very limited.\n\nBut it must never be forgotten that its existence is the probable proof that very much more of the kind existed beside it.\n\nInstead of there being one hymn sung like this, Y.\n\nXXX, there were probably many.\n\nThe two original forces or beings, although separate clearly, come together; but they do not lose their distinction.\n\nTheir difference remains as clear as their union.\n\n5.\n\nThey do not blend unrecognisably; for having created the two principles, they choose each his own particular realm.\n\nAhura chooses the righteous order of religion, and with it the pious of all ages.\n\nThe evil spirit chooses the wicked.\n\nThe point and meaning of the entire doctrine is that a good God cannot be responsible for permanent evil; that imperfection and suffering are original, and inherent in the nature of things, and permanently so.\n\nThe swallowing up of sin and sorrow in ultimate happiness belongs to a later period.\n\nIt is not Gâthic Zarathu s trianism.\n\nEvil was the work of an independent being.\n\nThe great thinker saw his point; and it was that the Deity Himself could not prevent the evolution of base and revolting moral qualities with their consequent miseries in both victim and aggressor.\n\nAn evil God was therefore their author.\n\n6."

