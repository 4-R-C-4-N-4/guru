[content]
body = "And may we be such as those who bring on p.\n\n34 this great renovation, and make this world progressive, (till its perfection shall have been reached).\n\n(As) the Ahuras of Mazda 1 (even) may we be; (yea, like Thyself), in helpful readiness to meet 2 (Thy people), presenting (benefits 3 ) in union with the Righteous Order.\n\nFor there 4 will our thoughts be (tending) where true wisdom shall abide in her home 5 .\n\n10.\n\n(And when perfection shall have been attained) then shall the blow of destruction fall upon the Demon of Falsehood, (and her adherents shall perish with her), but swiftest in the happy abode of the Good Mind and of Ahura the righteous saints p.\n\n35 shall gather, they who proceed in their walk (on earth) in good repute 1 (and honour) 2 .\n\n11.\n\nWherefore, O ye men!\n\nye are learning 3 (thus) these religious incitations which Ahura gave in (our) happiness 4 and (our) sorrow 5 .\n\n(And ye are also learning) what is the long wounding for the wicked, and the blessings which are in store for the righteous.\n\nAnd when these (shall have begun their course), salvation shall be (your portion 6 )!"

