[content]
body = "But the blood-feuds of War, not to speak of the theological animosity, were too much for his philosophy.\n\nThe sage could not regard all men and their circumstances with broad and equable impartiality.\n\nThe hated Daêva-worshippers, who were doubtless equally conscientious with the Zarathu s trians, are said to have failed of correct discernment.\n\nAs they were deliberating, so he recalls, the Worst Mind, a very real although 'abstract' Satan, came upon them, to induce them to choose him and his evil realm.\n\nThey acceded, becoming furious in their intention to injure human life.\n\nThis may be regarded as a dramatic, but at the same time, in a moral sense, a philosophical statement of a temptation and fall.\n\n(For a later one, with more colour and less truth, see the temptation proper of Zarathu s tra himself 1 , recalling as it does so vividly the temptation in the Gospels.) 7.\n\nIf we can accept the words ahmâi k â to mean merely 'upon p.\n\n27 this,' we may hold that the statements proceed without a break.\n\nEven a gap of lost verses does not interrupt the sense.\n\nThe clothing of souls with bodies seems indicated.\n\nIf so, the doctrine of the Fravashis, otherwise foreign to the Gâthas, may have its origin by inference here, and directly in verse 4.\n\nAfter the creation and first activity of the souls of the Archangels on the one hand, and of the Daêvas on the other, together with their respective human adherents, the one choosing good and the other evil, the remaining Ameshôspends unite with Âramaiti in bestowing a body upon the newly created soul.\n\n(So we must conclude from the language.) And the prophet breaks in with the prayer that in the future, and possibly at the Frashakar d , the completion of progress, these created souls might possess such advantages as they had when Ahura came at first with his acts of creation; that is, that they might be restored again to a state of sinless happiness, provided with bodies by Âramaiti as at the first.\n\n(See Ya s t XIX, 89.) 8.\n\nBut, as he implies, and perhaps expresses in a lost verse, vengeance shall come upon the wretched beings who choose the Evil Mind as their master.\n\nAnd it shall come, not in the abstract merely by any means, but as executed by a numerous, if not once predominant party, 'the offspring of the Evil Mind.' And when this shall have been completed (and XXXI, 18 shows us that the weapons to be used to bring it about were not to be those of verbal argument alone) then, as he declares with enthusiasm, 'to God shall be the Kingdom,' a Kingdom established in the Divine Benevolence, which will pervade its organic life, and which will likewise, as the personified 'Immortal,' utter encouragements and commands to its loyal citizens.\n\nAnd these citizens will then not only defeat the Lie-demon, who is the life of the Daêva-party, but they will deliver her up as a captive to the great Genius of Truth, the personified Righteousness.\n\n9.\n\nAnd, as he ardently hoped for the coming of the Kingdom into the hands of Ahura, he as ardently beseeches that he and his coadjutors, the princes already named, may be honoured as the immediate agents in bringing on this 'millennial' completion; nay, he even prays that they may be as Ahuras 1 in merciful services, declaring that all their thoughts were centred in that scene where religious light dwelt as personified in her home.\n\n10."

