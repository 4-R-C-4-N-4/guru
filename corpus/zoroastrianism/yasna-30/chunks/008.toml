[content]
body = "34:1 Otherwise, 'the Ahura-Mazdas,' or, 'O Mazda and the Ahuras!' I think that the most natural rendering according to the grammar should first be given, notwithstanding something uncommon about it.\n\n'All the Ahura-Mazdas,' has been seen by Roth in chapter XXXI, 4.\n\n34:2 The Pahlavi has the gloss [aîgh s ân hamîshakŏ han g aman madam tanû î pasînŏ kûni s nŏ], needlessly enlarged of course, but showing the proper root, which is mi t ; (so Spiegel.) 34:3 Or possibly sustaining (the feeble).\n\nThe Pahlavi reads simply dedrûni s nŏ.\n\n34:4 The Pahlavi renders hathrâ in the Indian sense as asâr*, endlessly; so others elsewhere.\n\nHathrâ and yathrâ are of course distinctly in antithesis.\n\n34:5 The Pahlavi mihânŏ, Persian makân.\n\nThat maêthâ is an adverbial instrumental meaning, 'in one's home,' seems the more probable from the two hathrâ, yathrâ, adverbs of place.\n\nCompare, for instance, athrâ-yathrâ in XLVI, 16, where shaêitî follows.\n\nHübschmann, 'Dort mögen (unsre) Sinne sein, wo die Weisheit thront;' see also hu s itôis in the next verse.\n\nThe Parsi-persian MS.\n\nhas—Aedûnŏ (sic) ham mâ kih ân i tû hastam (sic); [kû ân i tû ‘hwê s hastam] în—rastâ‘hiz kardan andar g ihân.\n\n(c) Kih—mini s n bêd [kû mini s n pah—dârad] a s ân g â dânâî hast [kû, â‘hir i k îz pah nêkî bih dânad] andar makân.\n\n35:1 Pahlavi, 'mûn vâdûnd zak î s apîr nâmîkîh = they are creating a good repute,' as if zaze n tê were understood in the sense of produce.\n\nSee the sense 'bear' as given for hâ, Ri g-veda 843, 2 (X, 17).\n\nThe analogy is, however, not strong.\n\n35:2 The Pahlavi translation may here be rendered as follows: Thus in that dispensation [in the later body] the Drû g [who is Ganrâk Mînavad] will be overthrown [ ] when (his) host is scattered.\n\nThus they move keenly on [to seize the reward], which is attained through the good citizenship of Vohûman [when they shall have dwelt in piety].\n\nThey who are creating a good renown are thus moving on toward Aûharmazd and Ashavahi s t [that is, the person who is of good repute goes forward to seize the reward].\n\n35:3 Once more the anomalous form âmûkhti s nŏ meets us in the Pahlavi.\n\nMay this not be intended to express 'learning,' whereas âmûzi s nŏ would express 'teaching?' I hardly think so.\n\n35:4 The Pahlavi translation is only remotely if at all responsible for h v îti k â as = sua sponte.\n\nThis would require h v îti as = * h v âti with difficulty comparing 'yim' and 'y e m'(?)."

