body = "And (when the great struggle shall have been fought out which began when the Daêvas first seized the Demon of Wrath as their ally 2 ), and when the (just) vengeance shall have come upon these wretches, then, O Mazda!\n\nthe Kingdom shall have been gained for Thee by (Thy) Good Mind (within Thy folk).\n\nFor to those, O living Lord!\n\ndoes (that Good Mind 3 ) utter his command, who will deliver the Demon of the Lie into the two hands 4 of the Righteous Order (as a captive to a destroyer).\n\n9.\n\nAnd may we be such as those who bring on p.\n\n34 this great renovation, and make this world progressive, (till its perfection shall have been reached).\n\n(As) the Ahuras of Mazda 1 (even) may we be; (yea, like Thyself), in helpful readiness to meet 2 (Thy people), presenting (benefits 3 ) in union with the Righteous Order.\n\nFor there 4 will our thoughts be (tending) where true wisdom shall abide in her home 5 .\n\n10.\n\n(And when perfection shall have been attained) then shall the blow of destruction fall upon the Demon of Falsehood, (and her adherents shall perish with her), but swiftest in the happy abode of the Good Mind and of Ahura the righteous saints p.\n\n35 shall gather, they who proceed in their walk (on earth) in good repute 1 (and honour) 2 .\n\n11.\n\nWherefore, O ye men!\n\nye are learning 3 (thus) these religious incitations which Ahura gave in (our) happiness 4 and (our) sorrow 5 .\n\n(And ye are also learning) what is the long wounding for the wicked, and the blessings which are in store for the righteous.\n\nAnd when these (shall have begun their course), salvation shall be (your portion 6 )!\n\nFootnotes 25:1 It is also noticeable that the name Angra Mainyu does not occur in this section.\n\n26:1 Comp.\n\nVd.\n\nXIX, 1-10.\n\nConsider how much time would be required for the name of Zarathu s tra to become so involved in myth.\n\n27:1 As the Ahuras of Mazda, the Ameshôspends.\n\n28:1 As 'ish' means approaching with desire, the Pahlavi translator has, freely, khvahî s no.\n\n28:2 Read mãzdathâ.\n\n28:3 So with long ê; but yaê k â (P 11 supported by the Pahl.) may be the lost dual neuter of the pronoun, referring to the two principles discussed below.\n\nYê* k â = I pray for, although the most natural rendering grammatically, does not seem so well adapted here, as a prayer for the success of his communication does not harmonise with the otherwise dogmatic statements of the composer.\n\nThe urvâtâ (vrata) founded upon the doctrine of dualism bring about salvation.\n\nThey may therefore be touched upon in this introductory verse.\n\nAnd that the heavenly bodies contained indications bearing directly or indirectly upon human destiny seems to have been early an accepted doctrine.\n\n(Compare also chap.\n\nXXIX, 3, where 'the lofty fires' seem alluded to as moved by the Deity, and this in immediate connection with the discussion of the most important problems concerning the fate of the holy community.) It is, however, not impossible that the lights of the altar may have been meant.\n\n(See sû k â in the second verse.) The Pahlavi translation p.\n\n29 has dên rôshano pavan vêni s nŏ hû-ravâkh-manîh.\n\nAs to yê* k â or yaê k â, the Pahlavi does not favour a verbal form."

