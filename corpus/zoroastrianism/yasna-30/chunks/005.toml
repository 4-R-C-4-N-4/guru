[content]
body = "But if the pronoun is accepted, even then change is needed; yaê k â yâ = yé k a yéna is hardly possible.\n\nWe should be obliged to render: And which two things (were those?) whereby (adverbially) propitious results have been seen in the stars.\n\nOthers have experienced difficulty, and even ashayaê k â(?) has been conjecturally suggested for this place and chap.\n\nLI, 2.\n\nNeither Sp.\n\nnor Westg.\n\nreport a long ê.\n\n29:1 Gôshânŏ srû d nyôkhshi s nîh [aîgha s gôsh barâ va s ammûn d ]—Zak î rôshanŏ.\n\nOtherwise 'with the eye;' but see yâ rao k e bî s daresatâ urvâzâ.\n\nThe altar-flame would not unnaturally be mentioned after the heavenly lights.\n\n29:2 Literally, '(be ye) wakeful.' 29:3 Hardly, to teach us.' Possibly, 'to teach this, each one.' 29:4 Pahl.\n\ntranscribes.\n\nNotice that paouruyê (pourvîyê) is neut.\n\n* as are vahyô and akem k â, which is not lightly to be passed over.\n\n29:5 The Pahlavi freely: Benaf s man—[aîgh s ânŏ vinâs va kirfak benaf s man barâ yemalelûn d ].\n\nThey announced themselves as sin and good works.\n\nNer.\n\nyau pu n ya m pâpa m k a svaya m avo k atâ m .\n\n29:6 Barâ vi g î d .\n\nNer.\n\nvibhaktavân*.\n\nIf a third plural subjunctive, still the force is as if imperative.\n\nPossibly it is preterit.\n\n29:7 On this important verse I cite Neryosangh.\n\nHe may be rendered as follows: Thus the two spirits [Hormi g da and Âharmana] who uttered first in the world each his own (principle); [that is, who each uttered one his own good (deed), and the other his own sin], these were a pair, in thought, word, and deed, a highest p.\n\n30 and a degraded one.\n\nAnd of these two, the one endowed with good intelligence [ ] was the distinguisher of the true, and not the one endowed with evil intelligence [ ].\n\n(Both he and the Pahlavi fail to credit a plural form in ere s vîshyâtâ with Spiegel and Hübschmann.) The Gâthic verbatim.\n\nYea (= thereupon) the-two the-two-spirits the-two-first-things which-two two-twins two-self-acting-ones were-heard-of in-thought in-word-and in-deed these-two a-better an-evil-and.\n\nOf-which-two-and the wisely-acting (ones) aright may discern, not the evil-acting ones.\n\n29:* Adverb (?).\n\n30:1 The Pahlavi read as an infinitive, dazdê = avŏ zak dahi s nŏ.\n\n(So also an important authority recently.) Otherwise it has the place of a third dual perfect; 'they two made.' The place of an infinitive is not generally at the end of a sentence in Gâthic.\n\nCan it be simply a third singular?\n\n'(Each) makes' ( k amasâ´ karóti).\n\n30:2 Pavan zendakîh—va mûni k azendakîh.\n\nNer.\n\ng îvitena k a a g îvitena k a."

