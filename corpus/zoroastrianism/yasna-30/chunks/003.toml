body = "Once more he announces the certain defeat and chastisement of the incarnate falsehood and her adherents, which enables p.\n\n28 him only the more impressively to describe the rapid reunion of the righteous amid the home-happiness of Heaven.\n\n11.\n\nHaving delivered his brief but weighty communication, he commends his hearers for learning the holy vows of the Religion on account of the duration of the announced rewards and punishments.\n\nThey shall be long indeed; and upon their complete inauguration full salvation shall be realised for those who shall have learned and heeded the invaluable truths.\n\nTranslation.\n\n1.\n\nAnd now I will proclaim, O ye who are drawing near and seeking 1 to be taught!\n\nthose animadversions 2 which appertain to Him who knows (all things) whatsoever; the praises which are for Ahura, and the sacrifices (which spring) from the Good Mind, and likewise the benignant meditations inspired by Righteousness.\n\nAnd I pray 3 that propitious results may be seen in the lights.\n\np.\n\n29 2.\n\nHear ye then with your ears; see ye the bright flames 1 with the (eyes of the) Better Mind.\n\nIt is for a decision as to religions, man and man, each individually for himself.\n\nBefore the great effort of the cause, awake ye 2 (all) to our 3 teaching!\n\n3.\n\nThus are the primeval spirits who as a pair 4 (combining their opposite strivings), and (yet each) independent in his action, have been famed (of old).\n\n(They are) a better thing, they two, and a worse 5 , as to thought, as to word, and as to deed.\n\nAnd between these two let the wisely acting choose aright.\n\n(Choose ye 6 ) not (as) the evil-doers 7 !\n\np.\n\n30 4.\n\n(Yea) when the two spirits came together at the first to make 1 life, and life's absence 2 , and to determine how the world at the last shall be (ordered), for the wicked (Hell) the worst life, for the holy (Heaven) the Best Mental State 3 , 5.\n\n(Then when they had finished each his part in the deeds of creation, they chose distinctly each his separate realm.) He who was the evil of them both (chose the evil), thereby working 4 the worst of possible results, but the more bounteous spirit 5 chose the p.\n\n31 [paragraph continues] (Divine) Righteousness; (yea, He so chose) who clothes upon Himself the firm 1 stones of heaven (as His robe).\n\nAnd He chose likewise them who content Ahura with actions, which (are performed) really in accordance with the faith 2 .\n\n6.\n\nAnd between these two spirits the Demon-gods (and they who give them worship) can make no righteous choice 3 , since we have beguiled 4 them.\n\nAs they were questioning and debating in their council 5 the (personified 6 ) Worst Mind approached them that he might be chosen.\n\n(They made their p.\n\n32 fatal decision.) And thereupon they rushed together unto the Demon of Fury, that they might pollute 1 the lives of mortals 2 .\n\n7.\n\nUpon this 3 Âramaiti (the personified Piety of the saints) approached, and with her came the Sovereign Power, the Good Mind, and the Righteous Order.\n\nAnd (to the spiritual creations of good and of evil) Âramaiti gave a body, she the abiding and ever strenuous 4 .\n\nAnd for these (Thy people) so let 5 (that p.\n\n33 body) be (at the last), O Mazda!\n\nas it was when Thou camest first with creations 1 !\n\n8."

