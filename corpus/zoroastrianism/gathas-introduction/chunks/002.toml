[content]
body = "Whether any persons existed in the immediate circle of the sage capable of composing hymns like these unaided, is of course a question; but that some were able to put poetical matter together under his guidance or inspiration seems certain.\n\nAn analysis and general summary is placed before each chapter as more convenient than massing them all together.\n\nThe reader is reminded that the rhythm of the original, so far as it could be reasonably conjectured, is somewhat imitated in parts of the translations.\n\nNext: Yasna XXIX"

