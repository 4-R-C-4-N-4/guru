[content]
body = "XLVI, 9, 14.\n\n182:9 See the fourth verse.\n\n183:1 Some other portion of the human body, suggested by the context, may be meant by aodare s .\n\nThe word looks like a verbal form, 3rd pl., but see the preceding dual.\n\n183:2 I render the Pahlavi of this most difficult verse as follows: Far from satisfying me is the Kîk, the paederast, in regard to both of the two particulars [food and clothing] on the path of winter; (far from satisfying me) who am Zartûsht, the Spîtâman, with whom he is; that is, (or 'where') he incites me with his incitation in my bodily (?) (sensations; reading astak (?)); [that is, a person comes, and thus also they, or he, would do it to me]; and this one who (is doing) [that to us] is also leading us on, even in our progress in the cold [of a winter] of accustomed sin, (or in the cold iniquitous winter).\n\nThis verse seems a very ancient interpolation.\n\n183:3 Haithîm is an adverb; its position also does not so much favour an accusative substantive.\n\n183:4 So our texts; but the Pahlavi translator saw khraozhdaitî (see Y.\n\nXLVI, 11) in his MSS., rendering khrûsi s nŏ yehabûnd = utter cries: 'while his soul cries fiercely.' 183:5 The occurrence of peret a u(âo) in this verse sheds light upon the peretô in the previous one.\n\nÂk a u(âo) seems to be an attracted form for a loc.\n\nas elsewhere.\n\nPerhaps it is miswritten.\n\n184:1 Nãsv a u(âo) would naturally mean 'reaching'; but the word is also elsewhere used in an evil sense, 'reaching to harm.' Y.\n\nLIII, 7.\n\nThe Pahlavi, however, indicates the reading nasv a u by its nasînênd.\n\nDoes the Avesta show an original evil sense to nas = to reach?\n\nMay the two nas possibly have some original connection?\n\nThat h v âi s s kyaothnâi s means here 'by means of' rather than 'because of' is the more probable from the same words in the next verse, and this notwithstanding Y.\n\nXXXI, 20.\n\n184:2 So general a term as 'creatures' should be avoided where possible; but see ye dâthaêibyô ere s ratûm khshayãs ashav a u k istâ (verse 5).\n\n184:3 As to the grammatical structure, all depends on s e n dâ.\n\nShall we bring down nôi t from the verse above; or shall we regard s e n dâ as in an evil sense from sad as in sadrâ?\n\nThe Pahlavi favours the former, as also in Y.\n\nXXXVIII, 5 (Sp.\n\n15).\n\nThe general result is not, however, affected.\n\nRead as alternative: No friends to the creatures are the Karpans as to perfect (harvests) from the fields, (not) blessing us in the matter of perfect (care and fodder) for the cattle, &c.; (sad in the sense of blessing with nôi t ).\n\n184:4 Free.\n\n184:5 Or, 'doctrines.' 184:6 See the eleventh verse."

