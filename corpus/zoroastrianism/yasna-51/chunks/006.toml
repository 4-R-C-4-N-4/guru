[content]
body = "XXX, 1, and so render, 'and which two things belong to thee, the possession (rule) of wealth and the blessings.' Roth, cited by Geldner, changes to ashayaê k â here and in Y.\n\nXXX, 1; and it is certainly striking that ashâ yê k â should occur twice.\n\nI render as above, first, as, nearer our MSS., and as affording a good sense.\n\n179:2 See Y.\n\nXXXI, 17.\n\n179:3 See verse 5.\n\n179:4 See Y.\n\nXXIX, 1; Y.\n\nXXXII.\n\n180:1 It is hardly necessary to call attention to the fact that these abstracts are personified here, as in so many other places in the Gâthas.\n\nWe may indeed doubt whether the idea of personification was ever wholly absent, the original meaning being likewise never lost.\n\nProfessor Wilhelm prefers taking Ashem as an accusative, 'how does one (do they) come to Asha?' This is admirable; but I am, on the whole, inclined to regard Ashem as a nominative with fseratu s , Âr(a)maiti s , &c., taking the plurals yasô h v y e n (hy e n) as irregularly extending to the other subjects.\n\n180:2 So Wilhelm (by letter), taking a form of the pronoun as understood.\n\nIt is difficult to suppose that the vâstrya could be referred to as appointing the Ratu through the influence of his devotion and pious supplications; as Wilhelm justly says, the third line must apply to Ahura.\n\n180:3 See Y.\n\nXLIII, 3; notice ahmâi as referring to hôi.\n\n181:1 See Y.\n\nXXXI, 17 where the faith of the dregva n t is sufficiently recognised to form the basis for a question, rhetorical indeed, but still a question.\n\n181:2 From this and similar occurrences of the 'water and the plants' beside 'Immortality and Welfare' probably arose the later peculiar identification of those names with water and plants.\n\n181:3 Compare perhaps verse 20.\n\n181:4 Otherwise; 'I will speak for Thee, O Lord!\n\nfor the (all)-wise one should speak.' 181:5 Or, 'from the two ara n i;' see notes on Y.\n\nXXXI, 3 and Y.\n\nXLIII, 12.\n\n182:1 Compare Y.\n\nXXXII, 7, h v aênâ ayanghâ (lit.\n\niron).\n\nOthers see the ordeal of fire here, and the bath of melted metal from which the righteous suffers nothing, but in which the sinner is consumed, but râshayanghê seems to point to injury produced otherwise than by dipping, and dakhshta certainly designates a metallic instrument elsewhere; 'sign' is, however, the original meaning.\n\n182:2 So several times; comp.\n\nY.\n\nXXVIII, 3, where the depth is unmistakable; see also Y.\n\nXXXI, 18 with ahûbî s in the next verse.\n\n182:3 The Pahlavi while not strictly correct, affords the indication of a causative, sû d înê d .\n\n182:4 From this verse probably arose the later association of khshathra-vairya and metal founding and forging.\n\n182:5 As invoking Asha is in the antithesis, I regard ashâ t as understood here.\n\nGa t seems a particle, but also not impossibly = gâ t .\n\nAs it is twice followed by tê (tôi), the interesting change is suggested to gatê, infin.\n\n182:6 Or a proper name.\n\n182:7 See the third verse.\n\n182:8 See Y."

