body = "184:7 Alternatives would be, 'Ahura will meet these engagements (?) made when the reward was promised;' or, 'the reward which Zarathu s tra promised before Ahura came into Garô d man.' According p.\n\n185 to the general form of the Gâthic sentence, k ôi s t parâ go more naturally together than if the force of the parâ was extended to g asa t .\n\nThe coming of Ahura is elsewhere mentioned; here He enters His audience-chamber before His approaching saints.\n\n185:1 Maga may have some such cast of meaning.\n\nI have, moreover, more than once suspected that the origin of 'magian' may, notwithstanding the môghu of the later Avesta, be simply this maga so often used in the Gâthas to designate 'the cause.' 185:2 See verse 20.\n\n185:3 So also the Pahlavi translator in his gloss; aîgham bartman pavan nê s manîh barâ yebabûnê d ŏ.\n\n185:4 So also of Zarathu s tra's daughter, Y.\n\nLIII, 4.\n\n185:5 Or, 'cry ye for the gaining of Asha,' as in Y.\n\nXXIX, I.\n\n185:6 Or, reading a nominative, ' G âmâspa is choosing,' which is itself well possible, as var is also conjugated with n; but rap e n seems a plural, and vîdô likewise.\n\n186:1 I concede this shade of meaning to the indications of the Pahlavi.\n\n186:2 The Pahlavi gives us our first indication here.\n\n186:3 If G âmâspô (nom.) is read in verse 18, ahmâi might here refer to him; 'to this one.' 186:4 Or, 'let them grant;' infinitive as imperative.\n\n186:5 Seeking; a dual is here disapproved by the source from which the suggestion originated.\n\n187:1 I refer t e m to Ahura, supposing it to stand; reading tãm, I would refer it to ashi.\n\n187:2 Compare Vend.\n\nXIX, 31.\n\nNext: Yasna LIII"

