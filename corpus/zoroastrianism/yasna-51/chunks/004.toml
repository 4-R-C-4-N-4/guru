body = "seeks to destroy my life, is a son 6 of the Lie's creation, and belongs to the miscreants; (but as for me), I call on Asha (Thy Righteous Order to be my help); and may he come with Thy good blessing.\n\n11.\n\n(And ye who throng the great assembly 7 , it is of you I speak while, with my lips, I now address the Lord): Who, O Ahura!\n\nis a loyal friend to the Spitâma 8 , to Zarathu s tra?\n\nWho has asked his question of the divine Righteousness, (as he approached 9 )?\n\np.\n\n183 [paragraph continues] By whom is the bounteous Piety (received and cherished)?\n\nOr who has been regarded as upright and fitted for the great cause of Thy Good Mind?\n\n12.\n\n('Who is worthy?' would I ask, for Zarathu s tra was ever such, and from earliest days.\n\nHe was no polluted wretch.) Paederast never gained his ear, nor Kavi-follower on this (temptation-)bridge of earth, when his body was (maturely) grown, when they both hasten(ed) to him with the bosom's 1 impure power 2 .\n\n13.\n\n(And he will be likewise victorious on the veritable Judgment Bridge, for) the righteous man's conscience will truly 3 crush the wicked man's (spirit) while his soul rages 4 fiercely on the open K inva t Bridge 5 , as he strives by his actions, and his tongue's p.\n\n184 [paragraph continues] (cursing speech) to reach 1 (and to pollute) Asha's paths (where the faithful souls come).\n\n14.\n\n(And as are those lost spirits, so are our foes.) No friends to the creatures 2 are the Karpans, (not granting) complete (harvests) from the fields with complete (pasture) for the Kine (chief objects for our prayer), bringing woe 3 by their deeds and their teachings.\n\nAnd they 4 will deliver these (beings 5 whom they lead) at the last (?) by their doctrine(s) in the Home of the Lie.\n\n15.\n\nBut this is the reward which Zarathu s tra declared before (to his friends who counsel with Asha), and are fitted for the cause 6 ; Ahura Mazda will come the first 7 into His Song Home, Garô d man, p.\n\n185 and then these gifts will be given you by the Good Mind (within you), and with blessings for the cause of the Righteous Order (in His hosts).\n\n16.\n\n(And one of you, the greatest, has indeed attained to that wisdom which is thus blessed with a promise), Kavi Vî s tâspa has reached it in the Realm of our great cause (of devotion 1 ), and moved in his toil by the chants of the Good Mind (who speaks in the Mãthra 2 ); yea, he hath attained to that wisdom which the bountiful Ahura conceived in accordance with Asha, thus to teach us salvation.\n\n17.\n\n(And not alone amidst our princes hath sanctity been marked), Frashao s tra, the Hvôgva, hath presented a blest and an endeared form (his child 3 ); and may Ahura Mazda, who has the Sovereign Power, grant her (to us), who is so much to be beloved.\n\nAnd for the (progress of the) good Religion 4 do ye, O ye people!\n\nreceive her with desire 5 , and for the gaining of Asha; (she will help the great cause).\n\n18.\n\nYea, that (holy) wisdom, O G âmâspa the Hvôgva 6 !"

