[content]
body = "185 and then these gifts will be given you by the Good Mind (within you), and with blessings for the cause of the Righteous Order (in His hosts).\n\n16.\n\n(And one of you, the greatest, has indeed attained to that wisdom which is thus blessed with a promise), Kavi Vî s tâspa has reached it in the Realm of our great cause (of devotion 1 ), and moved in his toil by the chants of the Good Mind (who speaks in the Mãthra 2 ); yea, he hath attained to that wisdom which the bountiful Ahura conceived in accordance with Asha, thus to teach us salvation.\n\n17.\n\n(And not alone amidst our princes hath sanctity been marked), Frashao s tra, the Hvôgva, hath presented a blest and an endeared form (his child 3 ); and may Ahura Mazda, who has the Sovereign Power, grant her (to us), who is so much to be beloved.\n\nAnd for the (progress of the) good Religion 4 do ye, O ye people!\n\nreceive her with desire 5 , and for the gaining of Asha; (she will help the great cause).\n\n18.\n\nYea, that (holy) wisdom, O G âmâspa the Hvôgva 6 !\n\nthese (pious throngs) are choosing through p.\n\n186 their Righteousness as the (true) splendours of riches (these pious men who are) gaining the kingdom where the Good Mind (doth govern).\n\nAnd grant me also, O Mazda!\n\nthat which these with glad wishes 1 receive from Thy grace 2 .\n\n19.\n\n(And this prayer is already and beforehand heard.) This established Sovereign Power the heroic (Kavi Vî s tâspa has given), O Maidhyô-mâh the Spitâma.\n\nHe who is wise through the Religion, and who seeks (the true) life, he is granting it to us 3 ; yea, he has pronounced the laws of Ahura our Maker, and declared that which is for (our) life's actions (beyond all other things) best.\n\n20.\n\nAnd, that gift of blessedness for you, all (the Bountiful Immortals) with one consent in sympathy to help us (are disposed 4 ) to grant; (and may they likewise make) the Holy Order (firm) for us through the Good Mind (in our folk); and may they reveal to us the words with which Piety likewise (speaks her truths).\n\nAnd receiving sacrifice with homage (from our praises), may they seek 5 for us Ahura Mazda's grace.\n\n21.\n\n(Yea, this Kavi Vî s tâspa) the man of Âramaiti is bounteous, and with understanding in his words and his actions.\n\n(And as a reward) may Ahura give p.\n\n187 him that Righteousness which is blest, (but) with the Religion (alone), and that Sovereign Power which is established through the Good Mind (in His folk).\n\nAnd this same blessing would I pray from His grace 1 .\n\n22.\n\nFor Ahura Mazda knoweth the man whose best gift for the sacrifice is given unto me, and from the motive of Righteousness; (and in thankfulness for all, and in prayer for yet still further grace), I will worship (the eternal ones); yea, I will worship those who have ever lived, and who still live, and by their own (holy) names, and to their (thrones 2 ) will I draw near with my praise!"

