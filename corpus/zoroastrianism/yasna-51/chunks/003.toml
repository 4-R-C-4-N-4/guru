[content]
body = "Yea, these are all assembling (each) to hear You, of whom Thou, O Ahura Mazda!\n\nart the foremost guide 2 and light.\n\n4.\n\n(And they cry aloud to Thee, O Mazda!\n\nI speaking with them, and in their name): Where is the (promised 3 ) lord of our thrift (the embodied law, saving us from the most dreaded dangers that we fear 4 , the thrift-lord) of (our) ready zeal?\n\nWhere p.\n\n180 does he stand to (show us) mercy?\n\nWhither are (Thy) Righteousness and the Bountiful Âramaiti (our Piety) approaching?\n\nFrom what direction comes Thy Best Mind (to inspire and to guide)?\n\nAnd whence (again), O Great Creator!\n\nThy Sovereign Power (to be our ruler and defence 1 )?\n\n5.\n\nAnd it is the tiller of the earth who asks this of Thee, O Ahura!\n\n(Thy chosen saint himself); he has asked this all of Thee, striving to discover how he may gain to himself the sacred Kine (and with all wealth in herds beside.\n\nAnd he would seek this) moved by the motives which flow from Thy Righteous Order (and Thy cause), upright as he is in actions, and wise in his self-humbling worship (of that 2 One) who, as a righteous ruler, has appointed a just controlling guide for those whom He has made.\n\n6.\n\n(And in partial answer to his question, and to solve his doubt, I now declare the truth): He who gives to this (good citizen) that which is better than the good 3 ; yea, He who bestows on him in accordance with his religious choice is (our) Ahura Mazda (and not p.\n\n181 a false god of the Daêvas 1 ).\n\nAnd this will He bestow through His divine Authority (established in preparation here), while on the withholder of the sacrifice, who offers nothing to His (cause), He will send worse than the evil (and that not here alone, but) in the last turning of the creation in its course!\n\n7.\n\n(And as Thou wilt bestow thus graciously on him), so grant me also, O Thou most bountiful Spirit Mazda, Thou who hast made both the Kine and the waters and the plants 2 (for her support) both Immortality and Welfare, those two eternal powers, and through Thy Good Mind in the doctrine (which is revealed through his inspired words 3 ).\n\n8.\n\n(Yea, grant me these two inseparable gifts, for having them in store) I will speak for Thee, O Mazda!\n\nbecause to the man of understanding 4 one should declare for Thee that which is woe to the wicked, but salvation to him who has maintained the holy Order (in Thy folk and in his soul).\n\nFor he is (repaid in his deed, and) rejoiced by the Mãthra who declares it to the wise.\n\n9.\n\n(And when I shall speak, I will declare for You that mental) keenness (which reaches the decision), and which Thou hast bestowed upon the two striving sides 5 , (in Thy satisfying word).\n\nAnd this p.\n\n182 [paragraph continues] I will announce by means of Thy flaming Fire; yea, I will declare it for the bestowal of that sword of justice which is forged from steel 1 , and wrought for both the worlds 2 .\n\nAnd for the wounding of the wicked (with its blade) may’st Thou 3 , O Ahura Mazda!\n\nbless and prosper Thine (avenging) saint 4 !\n\n10.\n\n(Yea, let Thy believer wound the wicked to the quick), for he, who totally estranged from this (our holy rule 5 ), O Mazda!"

