[content]
body = "(Yea, grant me these two inseparable gifts, for having them in store) I will speak for Thee, O Mazda!\n\nbecause to the man of understanding 4 one should declare for Thee that which is woe to the wicked, but salvation to him who has maintained the holy Order (in Thy folk and in his soul).\n\nFor he is (repaid in his deed, and) rejoiced by the Mãthra who declares it to the wise.\n\n9.\n\n(And when I shall speak, I will declare for You that mental) keenness (which reaches the decision), and which Thou hast bestowed upon the two striving sides 5 , (in Thy satisfying word).\n\nAnd this p.\n\n182 [paragraph continues] I will announce by means of Thy flaming Fire; yea, I will declare it for the bestowal of that sword of justice which is forged from steel 1 , and wrought for both the worlds 2 .\n\nAnd for the wounding of the wicked (with its blade) may’st Thou 3 , O Ahura Mazda!\n\nbless and prosper Thine (avenging) saint 4 !\n\n10.\n\n(Yea, let Thy believer wound the wicked to the quick), for he, who totally estranged from this (our holy rule 5 ), O Mazda!\n\nseeks to destroy my life, is a son 6 of the Lie's creation, and belongs to the miscreants; (but as for me), I call on Asha (Thy Righteous Order to be my help); and may he come with Thy good blessing.\n\n11.\n\n(And ye who throng the great assembly 7 , it is of you I speak while, with my lips, I now address the Lord): Who, O Ahura!\n\nis a loyal friend to the Spitâma 8 , to Zarathu s tra?\n\nWho has asked his question of the divine Righteousness, (as he approached 9 )?\n\np.\n\n183 [paragraph continues] By whom is the bounteous Piety (received and cherished)?\n\nOr who has been regarded as upright and fitted for the great cause of Thy Good Mind?\n\n12.\n\n('Who is worthy?' would I ask, for Zarathu s tra was ever such, and from earliest days.\n\nHe was no polluted wretch.) Paederast never gained his ear, nor Kavi-follower on this (temptation-)bridge of earth, when his body was (maturely) grown, when they both hasten(ed) to him with the bosom's 1 impure power 2 .\n\n13.\n\n(And he will be likewise victorious on the veritable Judgment Bridge, for) the righteous man's conscience will truly 3 crush the wicked man's (spirit) while his soul rages 4 fiercely on the open K inva t Bridge 5 , as he strives by his actions, and his tongue's p.\n\n184 [paragraph continues] (cursing speech) to reach 1 (and to pollute) Asha's paths (where the faithful souls come).\n\n14.\n\n(And as are those lost spirits, so are our foes.) No friends to the creatures 2 are the Karpans, (not granting) complete (harvests) from the fields with complete (pasture) for the Kine (chief objects for our prayer), bringing woe 3 by their deeds and their teachings.\n\nAnd they 4 will deliver these (beings 5 whom they lead) at the last (?) by their doctrine(s) in the Home of the Lie.\n\n15.\n\nBut this is the reward which Zarathu s tra declared before (to his friends who counsel with Asha), and are fitted for the cause 6 ; Ahura Mazda will come the first 7 into His Song Home, Garô d man, p."

