[content]
body = "While in terms he addresses Ahura, he in reality challenges the devotion of the chieftains, as he calls aloud to the Deity.\n\n12.\n\nHere a temptation of Zarathu s tra is narrated, as in the Vendîdâd, here dwelling on his youth, there on his maturer manhood.\n\nBut the verse shows marked signs of later age.\n\n13.\n\nAnd the soul of the righteous is encouraged by the recorded example; he shall come off the conqueror, as Zarathu s tra did.\n\n14.\n\nBut the Karpans (priestly chiefs?) of the opposing party, following the typical destroyer (as in Y.\n\nXXXII), would bring the world to ruin, and the creatures to Hell.\n\n15.\n\nThe true disciples will however infallibly receive the promised recompense.\n\n16.\n\nAnd as for that K isti, conceived by Mazda to give the saving knowledge in the sacred verse, the King of the Realm had acquired it.\n\nIt will be stored in the memory of faithful priests under his care and rule; and he will give his subjects a good worship (Y.\n\nXLIX, 7) in accordance with it.\n\n17.\n\nA female saint, also illustrious in rank, is celebrated with honourable mention; she is, as it were, the K isti in her person, as she is named in this connection.\n\n18.\n\nAnother devoted friend arrests the speaker's eye, as he stands in the assembly; (59) and still another.\n\n20.\n\nThen, as if taking in all with his view, and with an expression which shows p.\n\n178 his identification with the people, he declares that the 'Archangels' are of one mind with Mazda in bestowing spiritual blessings, the chief of which are inspired words, the source of their discipline, and the guide of their hopes.\n\n21.\n\nAnd with assurances as to the greatness of the spiritual blessings implied in all that he has said, he prays Ahura all the more earnestly to grant them to His elect.\n\n22.\n\nAnd he declares that Ahura knows and observes the man who fulfils every command that he has uttered, as well as believes every doctrine which he has divulged, and that, knowing Him, He also marks Him as the object of His grace.\n\nAnd he ends by expressing once more his desire to approach the Bountiful Immortals, not as naming them alone, but naming them, as we may well suppose, with a full appreciation of all that is meant by the sacred words which belong to them as names.\n\nTranslation.\n\n1.\n\nThe good Government (of Ahura 1 ) is to be chosen (among all wished-for things 2 ) as that lot which most of all brings on (our happiness).\n\nActions that oppress us it opposes 3 , through the holy Order (which pervades it), and with the pious zeal (of its true servants).\n\nTherefore, O Great Creator!\n\nlet me p.\n\n179 produce, and help bring on (that Sovereign Power) which is the best for us at every present hour.\n\n2.\n\nAnd first I will ask for 1 these two blessings of Your own, O Thou Great Creator, and thou His Righteous Order!\n\nand I also ask of thee, Our Piety (personified, as well); and grant me this Your Sovereign Rule over our desired wealth (to give and to preserve it; and likewise) those spiritual blessings which are advantageous for our worship (of Ahura) through (the inspiration of His) Good Mind (within the soul).\n\n3.\n\n(And it is not I alone who thus appeal to You; I speak for all) who are guarded in the (ceremonial and moral) actions of Your (law), and by those (inspired) words (which proceed) from the tongue of Thy Good Mind (as he speaks within Thy Mãthra)."

