body = "Sacred Texts Zoroastrianism Index Previous Next Buy this Book at Amazon.com The Zend Avesta, Part III (SBE31) , L.H.\n\nMills, tr.\n\n[1886], at sacred-texts.com p.\n\n176 THE GÂTHA(Â) VOHÛ KHSHATHREM (VOHUKHSHATHRA(Â)).\n\nThis Gâtha consists of the single chapter Y.\n\nLI.\n\nIt has lines of fourteen syllables with caesura in the middle.\n\nYASNA LI.\n\nINSTRUCTIONS AND APPEALS TO AN ASSEMBLY OF THE FAITHFUL.\n\nIt is hardly possible that we have here a continuous whole.\n\nThe thoughts, however, harmonise well enough, and the changes give little trouble.\n\n1.\n\nAs so often the Sovereign Authority of Ahura, His reign over the hearts and in the minds of His faithful worshippers, is the leading theme.\n\nThat sovereign Power, when it is established, will produce every good thing with it, and repress every evil, and the composer prays that he may never pause at any moment in his efforts to bring that kingdom on.\n\n2.\n\nAccordingly, as the foremost of objects, he beseeches for both its blessings and its protection, and names Âramaiti as the especial representative of Ahura in this case to grant the Kingdom as a Realm established in spiritual wealth, and whose first effect should be the glory of God through the agency of holy dispositions in men.\n\n3.\n\nThe spirit of the Daêna is public and prophetic rather than occult and mysterious.\n\nThe people therefore gather to hear Gâthas recited, and religious harangues delivered as on political occasions, and all the more because the Mãthras are declared to be the results of direct inspiration from Ahura.\n\n4.\n\nThe present recitations are invocations calling for the four energising Immortals, the guiding Order, the active Piety, the inspiring Benevolence, and the Power-wielding Kingdom, and, in using these names, the multitude are also beseeching, by the voice of their spokesman, for the Ratu, the Saoshya n t cried for by the Kine, looked for by Asha himself, and promised by Ahura.\n\np.\n\n177 5.\n\nAnd the men who press this prayer are, each of them, for the moment (nû k î t ), as the Ratu himself.\n\nWise in his homage, he seeks to gain the kine, like the ideal husbandman, both as property and as emblem, and he desires to establish the Ratu, understood as a person, or as the law, which may judge between the two sides (Y.\n\nXXXI, 2), and, by the expulsion of the evil, give quiet to the land (Y.\n\nXLVI, 4; Y.\n\nLIII, 9).\n\n6.\n\nDeclaring Ahura to be the awarder of the highest good and deepest evil, (7) he calls on Him to grant the 'eternal two,' the rewarding Immortals (not named in the former verse), but only by means of the inspired teachings.\n\n8.\n\nAnd as these inculcations are effective for himself, he will declare forth their threats and promises to others, being repaid for his zealous fidelity in the very act.\n\n9.\n\nRecalling the hopes of vengeance, he beseeches Ahura to give forth a sign, or instrument, from the holy Fire, which may settle the disputes by the forged blade of justice.\n\n10.\n\nFor he declares that the man who murderously assaults his adherents in the opposing interest (see Y.\n\nXXXII, 10, &c.) is inherently and originally perverted in his motives, a very son of the Lie, and of the seed of Akôman.\n\n11."

