[content]
body = "The aêvâ in 6 would incline one to read aêvâ (y e n e aêvâ), but the manuscript before the Pahlavi translator read aêvô = khadûk.\n\nIt is quite out of the question to suppose his aêtûno and khadûk to be accidental.\n\nA sharp distinction is made.\n\n11:1 So the Pahlavi translator, giving the only critical etymology in his hûdemûnîh, the gloss aside.\n\n11:2 The Pahlavi text corrected by the Persian MS.\n\nmay be rendered as follows: This gift I obtained [ ].\n\nFor this one is he who was listening to that which is our teaching, Zartûsht, the Spitâmân.\n\nFor us, Aûharmazd, and for Aharâyîh is his desire, [that is, that perfectly performed duty, and good works are desired by him].\n\nHe recites also a remedy-making (free or erroneous), [that is, he declares a remedy-making against the Drû g who is in the world]; on account of which saying for his word of piety which he utters, they give him a good abode [ ].\n\n(The glosses are often from a later hand and erroneous.\n\nSometimes, however, they contain the truth while the text is futile.\n\nI drop them in the present citations when they are of no importance.) 11:3 Observe that Zarathu s tra, like other prophets, met at times little honour from his fellow-countrymen who are here well represented by the voice of the Kine's Soul.\n\n(See Y.\n\nXLVI, 1.) 11:4 Or could not hôi be taken in a reflective sense, and referred to the first person like the possessive sve; see the connection.\n\n11:5 Verbatim.\n\nThereupon-and the Kine's Soul wept: (I) who p.\n\n12 (lament) one-not-able-to-effect-his-wish in-wounding as-a-master (or, I established?) [ ], whom as-against I-wish one wish-controlling-and-effecting-as-a-sovereign.\n\nWhen ever he may-(shall)-be who to her (possibly to-me-myself?) shall-give effected-by-the-hand help.\n\n12:1 Zarathu s tra, having accepted his call to be the Ratu or his substitute, at once interposes with a prayer for his suffering charge.\n\n12:2 See verse 1, to which reference is continually made as the chief expression of the sufferings to be remedied.\n\n12:3 The Pahlavi without glosses may be rendered as follows: Give ye assistance to these, O Aûharmazd, Ashavahi s t and Khshatraver!\n\nSo also Vohûman, who gives him a pleasing habitation, and also joy.\n\nI also think that the first gain and obtaining of this is from thee.\n\n(With the gloss slightly different; but valman should be rendered according to ahyâ.) The text literally is as follows: (Do) ye to these, O Ahura!\n\nhappiness (?\n\npossibly strength; see the Pahlavi) grant, O Asha!\n\nKhshathra-and (=the Kingdom) such (kingdom as) by Vohu Manah by-which amenities peaceful-joy-and (one) may give-or-establish; I-even of this, O Mazda!\n\nThee I thought foremost possessor.\n\n12:4 So the Pahlavi translation indicates; compare g imâ and frâ man (?) mathâ; otherwise mâmashâ = I hasten (to fulfil my mission).\n\n13:1 The Pahlavi has kabed.\n\nFor the fundamental idea compare p ri ksh + suffix."

