[content]
body = "This man is found for me here who alone 4 has p.\n\n11 hearkened to our enunciations, Zarathu s tra Spitama!\n\nOur mighty and completed acts of grace he desires to enounce for us, for (Me), the Great Creator and for Righteousness; wherefore I will give him the good abode 1 (and authoritative place) of such an one as speaks 2 !\n\nThe G e u s Urvan.\n\n9.\n\nUpon this the Soul of the Kine lamented (: Woe is unto me) since (I have obtained for myself) in my wounding a lord who is powerless to effect (his) wish, the (mere) voice of a feeble and pusillanimous man, whereas I desire one who is lord over his will (and able as one of royal state to bring what he desires to effect 3 ).\n\nThe Ameshôspends 4 .\n\n((Aye,) when shall he ever appear who may bring to her 4 help strong-handed 5 ?) p.\n\n12 Zarathu s tra 1 .\n\n10.\n\nDo ye, O Ahura and thou, O Righteousness!\n\ngrant gladness unto these (our disciples), and the sovereign Kingdom (of the Deity) such as (is established) in (His) Good Mind by which one bestows upon them the peaceful amenities of home and quiet happiness (as against the fearful ravages which they suffer 2 ), for of these, O Great Creator!\n\nI ever thought Thee first possessor 3 !\n\n11.\n\nAnd when shall the (Divine) Righteousness, the Good Mind (of the Lord, and His) Sovereign Power (come) hastening 4 to me (to give me strength for my task and mission), O Great Creator, the Living Lord!\n\n(For without his I cannot advance p.\n\n13 or undertake my toil.) Do ye now therefore assign unto us your aid and in abundance 1 for our great cause.\n\nMay we be (partakers) of the bountiful grace of these your equals 2 (your counsellors and servants) 3 !\n\nFootnotes 4:1 Something like this is implied.\n\n4:2 If verses 4, 5, 6, were originally connected.\n\n4:3 Or possibly a company of the religious chiefs poetically conceived to be present.\n\n6:1 K e ma tasha t can only mean this here.\n\nThe Pahlavi translator probably read kahmâi.\n\nHe has val mûn li tukhshî d (?) hômanam.\n\n6:2 One might think of 'inertia' as a rendering for remô, (if read), but the afflictions complained of seem rather to imply active violence.\n\n6:3 Or read tâyu s k â (robbery?) with the Pahlavi translation; 'yu' and 'vi' would be written much alike in a manuscript.\n\n6:4 Vastâ has been found, as I understand, in some manuscripts.\n\nThe Persian manuscript of Haug has a curious vâstîrî d âr (vâsta-rî d âr?) in the Pahlavi text, which seems to confirm vastâ in the sense given.\n\n6:5 As there are very many non-specialists to whom it is important to weigh this present subject as closely as it may be possible, and as everything here is a matter of the keenest questioning among experts, I add occasionally a word-for-word rendering, although necessarily very uncouth: To you the Kine's soul cried-complaining: For whom me did ye fashion?\n\nWho me made?\n\nAgainst me assaulting-rapine, violence-and, desolations-[blow], daring-insolence-and, (thievish) might-and (possibly change the text)."

