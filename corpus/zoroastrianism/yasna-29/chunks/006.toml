[content]
body = "8:9 Some have referred the word to the root zan obscurely present in it; otherwise a drivable cow; one mature and fit for use.\n\nThe term used in the Vendîdâd in a common meaning as merely p.\n\n9 designating a cow at a certain age, may be the familiar use of an adjective here applied in the ancient Gâtha in a sacred sense.\n\n9:1 This passage is one of the strongest for the comparison of Mazd a u and medhâ.\n\nThe sense 'asking wisdom in our doubt,' is admirable.\n\nI cannot however accept the comparison.\n\n9:2 Pavan gômânîkîh hampûrsânî; root dî.\n\n9:3 The Pahlavi awasîni s nîh*, but in other connections fra g yâiti s might well mean 'continued life;' 'life long endured with the wicked.' 9:4 The Pahlavi has vishûpi s nŏ, which here affords a better meaning; see however Y.\n\nXLVIII, 9.\n\nWe might read as alternative here, 'knowing the calamity to be averted.' 9:5 Uncertain.\n\nThe Pahlavi however indicates 'discernment.' 9:6 One is strongly tempted to read aêvô, 'not a single chief,' but the ancient writing read by the Pahlavi translator had aêvâ ahû.\n\n9:7 This indicates that Zarathu s tra had been the speaker in the previous verses.\n\n9:8 Appointed.\n\n9:9 Verbatim.\n\nThereupon spake Ahura Mazda knowing the-wonderful (thing) through-insight (?) not thus a master found, nor a ruler righteous-order-from-even from, therefore for thee to-the-thrifty-and to-the-husbandman-and (I) as-a-creator I-have-made.\n\n10:1 Or a company of the saints conceived to be present.\n\n10:2 So some writers, accepting an irregular reading h v arushaêibyô after the indication of the Pahlavi translation.\n\nOtherwise compare 'rush' (?), uru = ru, and render 'to the estranged.' We have often to stretch the meaning more than this.\n\nConverting instructions are elsewhere suggested for 'all mankind.' 10:3 The translation of Neryosangh is added here not merely because it is of interest, but because it is, together with the Pahlavi translation, of the last importance in forming correct conclusions.\n\nIt may be rendered as follows; and the reader may regard it as a specimen, but by no means a particularly favourable one.\n\nAt the words âzûtôî s and maretaêibyô different texts were before him and the Pahlavi translator as well.\n\nThose words are elsewhere rendered by the latter k arpîh and an s ûtâân: This greatest magnitude (sic) of the Mãthra, the Lord produced together with righteousness as his fellow-worker [ ].\n\nThe Great Wise One discloses the herds to the eaters; and he discloses also the great matter to the well-taught scholars.\n\nWho is thine, who endowed with the best mind, gives the two things, with the mouth to those who are prosecuting studies (sic)?\n\nTo expect an ancient rendering to be closer would be unreasonable.\n\nThe errors (as to root) are not errors, but the certain signs of differing MSS.\n\nThis constantly occurs; and it is hardly necessary to add that sometimes from such supposed mistakes we get the only possible means of recovering the original text.\n\n10:4 Repeating the announcement in verse 6."

