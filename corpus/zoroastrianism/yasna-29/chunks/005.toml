[content]
body = "Not for me a pasture-giver than-you other; therefore to-me teach-ye good (things) for-the-pasture (adj.\n\nacc.\n\npl.\n\nneut.).\n\n6:6 I fear that I cannot follow Haug in his later view, where he follows tradition in rather an extreme manner, rendering 'the cutter (wounder) of the Ox.' Neither Spiegel nor Justi would confide to a later myth to this degree (see Y.\n\nXXXI, 9 and XLVI, 9).\n\nThis is p.\n\n7 mentioned, however, not as complaining of an error, but solely to guard the reader against the mistake of an eminent authority.\n\n(See also Roth, Z.D.M.G., Bd.\n\n25, s.\n\n9.) 7:1 Observe the personification of righteousness.\n\n7:2 Or, 'what salvation-lord,' governed by dâtâ from the preceding line; so also the Pahlavi translator mûn avo pavan nadûkîh khû d âî.\n\nU s tâ occurs only here as a verbal form.\n\nSupply angha t in b.\n\n7:3 The Pahlavi aêshmo anâêr zani s no.\n\n7:4 Or read ashem.\n\nThe Pahlavi has ashavahi s to pasukhvo gûft.\n\nI am not at all inclined to accept vocatives for nominatives in the Gâthas.\n\n7:5 Sar- g an, compare Verethra g an.\n\nThe Pahlavi indicates this by tanû sardârîh.\n\n7:6 Possibly, 'by which he approaches.' 7:7 The Pahlavi rôshano î râsto.\n\n7:8 Cp.\n\nY.\n\nXXX, 1: yâ rao k e bî s daresatâ urvâzâ.\n\n7:9 The Pahlavi indicates a third person; and keredushâ is far the most simply explained as a nom.\n\npl.\n\nRecall mâ mashâ and man (?) mathâ.\n\nOtherwise, 'to whom I will come with activity and invoking.' 8:1 A verse or verses may here have fallen out.\n\n8:2 I cannot persuade myself to accept the nearly universally accepted comparison of Mazd a u and medhâ.\n\nSee note on p.\n\n104 .\n\n8:3 Or, 'He has done by Daêvas?' If thus, absolute and not qualified sovereignty would be indicated.\n\nSee the last line 8:4 Observe that while 'by Daêva-worshippers' would be an admirable rendering for Daêvâi s , because more commonplace and therefore safer, it is here impossible on account of mashyâi s k â.\n\nWe are closely confined to the acceptance of a large idea.\n\nAhura was mindful of what transpired in the deeds of Daêva-gods and not in those of Daêva-worshippers alone.\n\nThe inst.\n\nmust be modified.\n\n8:5 As varshaitê is elsewhere used in an active sense, it is possible, but not probable, that a special predestination may be indicated.\n\n'He shall do by means of Daêvas and men.' 8:6 'To us men,' not to us Ameshôspends, of course!\n\n8:7 Verbatim.\n\nMazda the-words most-mindful which for have-been-fulfilled before by-means-of- (the actions of) Daêvas-and men-and what-and (shall)-be-done after, He the discriminating lord; so to-us shall-it-be as He shall-choose.\n\n8:8 This seems to prove positively that a human being speaks here and in the previous verse; 'the soul of Righteousness' is of course impossible."

