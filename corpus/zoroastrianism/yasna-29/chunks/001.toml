body = "Sacred Texts Zoroastrianism Index Previous Next Buy this Book at Amazon.com The Zend Avesta, Part III (SBE31) , L.H.\n\nMills, tr.\n\n[1886], at sacred-texts.com p.\n\n3 THE GÂTHAS.\n\nYASNA XXIX.\n\nTHE WAIL OF THE KINE.\n\nTHE CALL OF ZARATHU S TRA.\n\nHIS PRAYER FOR AID.\n\nThis chapter, the second in the manuscripts of the Gâtha Ahunavaiti, is placed here as in a more natural order.\n\nIt may be regarded as containing the terminus a quo of the divine revelation.\n\nThe Soul of the Kine, as representing the herds of the holy Iranian people, their only means of honourable livelihood, raises its voice, and expressing the profoundest needs of an afflicted people, addresses Ahura and His Divine Order, Asha, in bitterness.\n\n1.\n\nRecalling another and a later 'groan of the creation,' she demands wherefore and for whom she was made, since afflictions encompass her; and as her comfort, if not her existence, was threatened as much by the unsettled habits induced by constant alarms as by the actual incursions of her predatory neighbours, she beseeches the Bountiful Immortals to instruct her as to the benefits of civilised agriculture, and confirm her protectors in its practice, as her only remedy against the evils of which she complains.\n\n2.\n\nAhura answers by a question to Asha, the personified Righteous Order, as to what guardian he had appointed in order to smite back the fury which assails her, intimating that some chief ought to have been set over her originally who would have averted her miseries, training her people in steady tillage and bucolic skill, and repelling the destructive raids.\n\n3.\n\nAsha answers that her sufferings were inevitable, that no chief could be appointed who could prevent them since none was himself without his share of injustice and of passionate resentment.\n\nHe could not answer why this was the case.\n\nThe question, involving the insolvable problem of the origin of evil, lay at the foundation of those influences which move the stars of destiny; that the religious revelation afforded by the Ratu (as in p.\n\n4 chapter XXX) was intended to meet these problems so far as they could be answered 1 , and that therefore all who were entering upon active enterprises were in the act of approaching, not him Asha, the subordinate archangel, but Mazda himself, who was the greatest of beings, and alone able to answer their prayers and questions.\n\n4.\n\nZarathu s tra 2 , poetically conceived to be present, here intervenes to reaffirm the homage just paid by Asha.\n\nHe declares Ahura Mazda to be himself the most mindful of all the previously revealed assertions and directions uttered by himself, and fulfilled in the actions of both the Demon-gods of their enemies, and of good or evil men.\n\nHe is also said to be fully cognisant of what they will do in the future, and to discriminate between what is good and evil as an infallible judge, allotting to us all our destiny in future sufferings or rewards.\n\n5.\n\nAddressing Ahura and Asha, and uniting with the Kine's Soul in her supplication, he questions Mazda in his doubt, not in peaceful confidence, as later in the impressive hymn, each verse of which begins with the words, 'This ask I Thee, aright, Ahura!\n\ntell me!' but deprecating from himself, and constructively from the Kine, the impending destruction which he sees will justly fall upon the wicked as visited by the discriminating vengeance acknowledged to be Ahura's attribute (see verse 4).\n\n6."

