[content]
body = "At last Ahura, showing the intention of His questions, answers them himself; no regulating lord in full sympathy with the Righteous Order had as yet been discovered or discoverable, but He himself will make a selection.\n\nHe therefore declares himself as solemnly appointing Zarathustra to that office.\n\nAnd Zarathu s tra, inspired by His Good Mind, and guided by His righteousness, will accomplish more than has as yet been done to rally the thrifty community, and settle their virtuous polity upon its desired basis of training and defence.\n\n7.\n\nAs Zarathustra is a listener in the colloquy between the Deity, the Kine's Soul, and Asha, the Righteous Order, so the other Immortals beside Asha 3 , here join in, as if the appointment just made had not been heard, or was incredible (see below).\n\nMazda is indeed declared to have revealed the sacred Word-of-reason in harmony with the consenting Righteousness, and to have provided food for the Kine and p.\n\n5 the needy consumers, but who was there adequately endowed with the Good Mind, who could promulgate that Mãthra with its revealed directions as to sustenance of both body and mind?\n\n8.\n\nAhura repeats his announcement of Zarathu s tra, as if to silence the objections.\n\nAs Zarathu s tra alone had heard the doctrines from the voice of inspiration, so he desired to declare them, and had authority to do so, together with a settled position of such a character as to make his statements felt.\n\n9.\n\nBut an unexpected difficulty arises.\n\nThe Kine's Soul is by no means impressed by the personality of the individual selected as her guardian.\n\nSo far from being the demi-god of the other parts of the Avesta, Zarathu s tra's declarations are characterised by her as 'the voice of a pusillanimous man,' while she, on the contrary, expected one truly kingly in his rank and characteristics, and able to bring his desires to effect, while the Bountiful Immortals (or the attending chieftains), as if they had meant their question in verse 7 to be a question uttered in mere perplexity or contempt, join in with chorus, asking when indeed an effective helper will be provided.\n\n10.\n\nZarathustra, undismayed by the coldness of his reception, enters at once upon his office as priest and prophet, praying Ahura for the people; and recognising the names of the 'Immortals,' Khshathra, Asha, and Vohu Manah, in their original sense, asks Ahura to grant to the people in their straits, a Sovereign Authority established in the Divine Order, and bestowing the needed quiet and happiness for which the suffering provinces, as represented by the Kine's Soul in her wail, had expressed their desire.\n\nAnd as he prays, he avows his own steadfast confidence in Ahura rather than in the Daêvas, as the prime possessor and bestower of blessings.\n\n11.\n\nThen, as if eager to receive full equipment upon the spot, he not only beseeches for the Righteous Order, the Kingly Power of God, and His Good Mind for the masses as represented by the Kine, but asks when they are coming to him, and hastening; and he entreats Ahura to bestow His help at once for the great cause, and to a very abundant degree, upon himself and his associates.\n\n(It is singular that the name of Âramaiti does not occur in this section.) p.\n\n6 Translation.\n\n(Homage to you, O Sacred Gâthas!) 1."

