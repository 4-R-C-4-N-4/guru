[content]
body = "13:2 The Ameshôspends just mentioned, together with whom Ahura governs and blesses His people.\n\nAhmâ (so conjecturing with Barth.), is also quite sufficiently indicated by the lanman of the Pahlavi.\n\nWhether an instrumental e hmâ can be accepted is doubtful.\n\nThe form should be altered.\n\nIf e hmâ stands, i s tem must be understood, or the instrumental taken in a possessive sense.\n\nAhmâ has no authority from MSS., but is better than anghâmâ, as being nearer the MSS.\n\n13:3 As an impartial specimen I render Ner.\n\nthus: Whence will that gift come to me, (the gift which is) A s avahista, Gvahmana, and Saharevara, [that is, sanctity, the highest (best) mind, and the sovereignty, where is the place of the reward which will thus come to me?].\n\n(Here the translation falls into confusion from an error which is most interesting and instructive, because it is corrected by Ner.\n\nin an alternative rendering in the gloss.\n\nAs has been seldom noticed his original was the Pahlavi word pâ d adahi s nînê d , rather than the Gâthic paitî-zânatâ.\n\nThis Pahlavi form he could not at first believe to be a second plural.\n\nIndeed the Pahlavi glossist may have taken it as a third sg.\n\nNeryosangh therefore abortively renders word-for-word as follows: You, O Great Wise One!\n\nit offers or presents more excellently through the 'greatest exaltation' (the holy cause).\n\nBut he recovers himself in the gloss by reading the Pahlavi pâ d âdahi s nŏ vâdûnyên as an imperative: [Provide a reward through that spotless exaltation (the irreproachable cause)] continuing: Here, O Lord!\n\nis the gift (which is) ours, and (which comes) to us from Thee.) Next: Yasna XXVIII"

