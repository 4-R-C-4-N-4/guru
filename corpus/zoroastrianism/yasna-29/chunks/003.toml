[content]
body = "Unto you (O Ahura and Asha!) the Soul of the Kine (our sacred herds and folk) cried aloud: For whom did ye create me, and by 1 whom did ye fashion me?\n\nOn me comes the assault of wrath, and of violent power, the blow 2 of desolation, audacious insolence, and (thievish) 3 might.\n\nNone other pasture-giver 4 have I than you, therefore do ye teach me good (tillage) for the fields (my only hope of welfare 5 )!\n\nAhura speaks.\n\n2.\n\nUpon this the Creator 6 of the Kine (the holy p.\n\n7 herds) asked of Righteousness 1 : How (was) thy guardian for the Kine (appointed) by thee when, as having power (over all her fate), ye made her?\n\n(In what manner did ye secure) for her, together with pasture, a cattle-chief who was both skilled and likewise energetic?\n\nWhom did ye select 2 as her (life's) master who might hurl back the fury of the wicked 3 ?\n\nAsha answers.\n\n3.\n\nTo Him the (Divine Righteousness) answered with 4 his sanctity.\n\n(Great was our perplexity); a chieftain who war capable of smiting 5 back (their fury), and who was himself without hate (was not to be obtained by us); among such things as these, those things are not to be known (by beings such as we) which are the influences which approach 6 (and move) the lofty fires 7 (revealing the favour and the will of God 8 ).\n\nOf beings He is the mightiest to whom those 9 p.\n\n8 who have performed their actions approach with invocations.\n\n(He has no need to ask!) Zarathu s tra intervenes 1 .\n\n4.\n\nThe Great Creator 2 (is himself) most mindful of the uttered indications which have been fulfilled beforehand hitherto in the deeds of 3 demon-gods 4 and (good or evil) men, and of those which shall be fulfilled by them 5 hereafter.\n\nHe Ahura is the discerning arbiter; so shall it be to us 6 as He shall will 7 !\n\n5.\n\nTherefore it is that we both, my soul 8 and (the soul) of the mother 9 Kine, (are) making our supplications p.\n\n9 for the two worlds to Ahura, and with hands stretched out in entreaty, when (we pray to the Great Creator 1 with questions in our doubt 2 ; (and He will answer).\n\nNot for the righteous liver, not for the thrifty (tiller of the earth), shall there be destruction 3 together with the wicked!\n\nAhura.\n\n6.\n\nUpon this the Lord, the Great Creator, He who understands the mysterious grace 4 by His insight 5 , spake thus.\n\nNot in this manner 6 is a spiritual master found for us, nor a chieftain moved by Righteousness and appointed (in its spirit); therefore Thee 7 have I named 8 (as such a head) to the diligent tiller of the ground 9 !\n\np.\n\n10 The Ameshôspends 1 .\n\n7.\n\nMazda has created the inspired Word-of-reason which is a Mãthra of fatness (for the offering), the (Divine) Righteousness consenting with Him in his deed.\n\nFood he has prepared for the Kine and for the eaters 2 , He the one bountiful with his (saving) doctrine; but whom hast Thou, endowed with the Good Mind, who may give forth those (doctrines) by word of mouth to mortals 3 ?\n\nAhura.\n\n8."

