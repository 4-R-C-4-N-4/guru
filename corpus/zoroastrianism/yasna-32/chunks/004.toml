[content]
body = "Aye, this man will destroy my doctrines (indeed, for he blasphemes the highest of creatures that live or are made).\n\nHe declares that the (sacred) Kine 5 and the Sun are the worst of things which eye can see; and he will offer the gifts of the wicked (as priest to their Demon-gods).\n\nAnd at the last he will parch 6 our meadows with drought, and will hurl his mace at Thy saint (who may fall before his arms 7 ).\n\np.\n\n63 11.\n\nYea, these will destroy my life, for they consult with the great 1 of the wicked (enlightening themselves by their words 2 ).\n\nAnd they are seizing away 3 the gifts of inherited treasures 4 from both household-lord and from house-wife 5 ; (wretched men that they are), and those who will fiercely wound (my folk, repelled and in no way kindly moved) by the better mind of the holy 6 .\n\n12.\n\n(But Ahura will speak His rebuke, for) as to those doctrines which (such) men may be (basely) delivering 7 (repelled) by the holiest action, (and galled 8 by its sacred truth) God hath said: Evil (are they!\n\nYea, unto these He hath said it) who have slain the Kine's life by a blessing (and have cursed her while they offered to help her 9 ), men by whom Gr e hmas are loved above Righteousness, and the Karpans, p.\n\n64 and the Throne of those who have wished 1 for the Demon of lies (as their deity and friend 2 ).\n\n13.\n\nAnd the Gr e hma will seek 3 for these things by means of his (evil) kingdom 4 in the abode of (Hell which is 5 ) the Worst Mind (who both are together) the destroyers of life, and who, O Mazda!\n\nwill bewail 6 with glad but (envious) wish the message of Thy prophet.\n\n(But he will not abate with his vengeance), he will hold them afar from the sight 7 of the truth!\n\n14.\n\nHis is Gr e hma 8 ; aye, his!\n\nAnd to (oppose) Thee 9 he will establish the Kavis and (their) scheming p.\n\n65 plans.\n\nTheir deeds 1 of power are but deceits since they have come as an aid to the wicked 2 , and since he has been (falsely) said (to be set) to conquer the Kine 3 , he who shall kindle that (very) help of grace which removes our death afar, (and lightens Thy saving flame).\n\n15.\n\nAnd therefore will I drive from hence 4 the Karpans’ and Kavis’ disciples.\n\nAnd after these (have thus been driven hence and away) then these (my princely aiding saints) whom they (now) render no longer rulers at will over life, (and deprive of their absolute power), these shall be borne (at p.\n\n66 last) by the (immortal 1 ) two to the home of (Thy) Good Mind (in Heaven) 2 !\n\n16.\n\n(And) this entire 3 (reward of the righteous) is from that Best One who teaches 4 in the wide (mental) light of the pious 5 , ruling (as supreme), O Mazda Ahura 6 !\n\nwhose are my woes and my p.\n\n67 doubtings 1 (yea, they lie in His power to heal), when I shall make (my prophets) men to be sought 2 for the harm of the wicked.\n\nAnd this I shall do by the word of my mouth (to defend and avenge my saints)!\n\nFootnotes 56:1 See, however, the notes."

