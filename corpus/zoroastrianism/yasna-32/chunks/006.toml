[content]
body = "58:8 I correct frô m e (= man) mathâ (adj.\n\nnom.\n\npl.; compare yimâ keredushâ and ma mashâ).\n\nI do so after the admirable reading of the Pahlavi translator, a s frâz mîni s nŏ var d înê d [aîgha s barâ frîfê d , afa s mîni s nŏ barâ avŏ vinâs kar d anŏ var d înê d ].\n\nNer.\n\nprak ri sh t a m mana h —mathnâti.\n\nNotice that a k i s tâ is awkward as a masc., although I have so rendered as more personal.\n\n58:9 Vakhshye n tê stood in the ancient writing used by the Pahlavi translator, as also now in some of our surviving MSS.; otherwise p.\n\n59 reading vakhshe n tê with Justi and most others, and mîmathâ with Bartholomae: 'Ye have caused that men who produce the worst results are flourishing, loved of the Daêvas (as they are).' But in the Casuslehre, Hübschmann preferred 'sie sprechen was den Devas angenehm ist,' also reading vakhshe n tê (?) (page 240).\n\n59:1 So the Pahlavi also indicates a s ân Vohûman sîzd; Ner.\n\nGvahmana h * dûre* âste.\n\n59:2 Improper subjunctive; otherwise ye (have) beguiled.\n\n59:3 The Pahlavi also freely frîfê d an s ûtâân pavan hû-zîvi s nîh.\n\n59:4 Fra k inas far from necessarily means 'gave'; 'assigned,' 'indicated' renders it more closely.\n\nThe Pahlavi has here correctly, but freely, k âshê d .\n\n59:5 The Pahlavi has here s alîtâîh for khshayô, and in XXVIII, 8 it has pâ d akhshâ for khshayâ.\n\nI do not think that the word is an accusative there.\n\nA simple accusative does not so naturally fall to the end of the sentence in Gâthic; it is generally in apposition when so situated.\n\nThe nominatives tend toward the end of the sentence.\n\n59:6 Ner.: It is through both of these that he is deceiving (sic, unable to follow the Pahlavi which probably renders as a second plural; see mûn lekûm) mankind in regard to prosperity and immortality, [(saying) if it is possible to live, immortality lies in our path].\n\nSince he is yours, O ye base-minded!\n\nO ye base Devas!\n\nhe is inculcating the lowest actions [of the miscreants; he says that sovereignty [is from Âharmana; (that is, the sovereignty) of certain ones (meaning over every one)].\n\nThe Gâthic verbatim is as follows: Therefore ye beguiled (would beguile) man of-happy-life, of-immortality-and since you with-evil mind (you) who-(are)-and Daêvas’ (worshippers) the evil-and spirit with an-evil (-word as concerning) action with-word (rules), by p.\n\n60 which (same) means (has-)commanded the wicked (his) ruler (nom.\n\nsing.\n\nmasc.; see Y.\n\nXXVIII, 8).\n\nThe nom., as in Vedic, at the end.\n\n60:1 Or, Full of crime ye have striven to attain your ends (?) by those things which are reported."

