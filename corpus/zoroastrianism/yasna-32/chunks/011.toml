[content]
body = "If in an evil sense (as vas e -khshaya n t is sometimes elsewhere taken) one might think of such a rendering as this: I have driven the Karpans' and Kavis' disciples hence to those (evil rulers) whom they (my servants) render no longer wanton tyrants over life.\n\nBut these (my champion saints) shall be borne by the two to the home of Thy Good Mind.\n\nBut strict grammar demands of us that tôi should refer back to y e n g.\n\nAccordingly I suggest as above first.\n\n66:2 Observe that Vohu Manah equals heaven.\n\nRecall XXX, 4, 'but for the holy Vahi s ta Manah; that is heaven.' 66:3 The Pahlavi has ham; Neryosangh has sarvam.\n\n66:4 Reading sâ k (a)yãs k î t (P 11 , s k yas k î t ; Pahlavi, âmûkhti s nŏ (sic); Ner., s ikshâpa n a m ).\n\nOtherwise syas k î t , which may well mean 'lying, reposing' in the wide (mental) light of the pious (or of the offering).\n\nGeldner lately admirably suggests a 2nd sg.\n\n66:5 Pavan farâkhû hûshîh.\n\n66:6 If this 'best one' is the Ratu of XXXIII, 1, all is grammatically clear; but the expressions are rather strong in view of p.\n\n67 XLVIII, 9, where similar language is certainly applied to Ahura.\n\nIf Ahura is here meant, we have only one instance more to add to the many in which Ahura is spoken of in the third person, with an address to Him thrown in.\n\nSee the differing views of XLV, 11.\n\nPossibly the 'Best One' was Ahura's Spe n ta Mainyu.\n\n67:1 Zak î pavan gûmânîkîh.\n\nAs to âithi, âithiva n t seems to prove that its meaning must be calamity also in this place.\n\nOtherwise one is strongly tempted to heed the vigorous indication of the Pahlavi translator.\n\nHere and in XLVIII, 9, he renders 'manifest,' 'what is clear in the midst of my doubt.' The etymology would be far simpler.\n\nAlternatively dvaêthâ = terror (bî).\n\n67:2 Valman î pûmman khvâstâr.\n\nThe Pahlavi sees 'to be desired' in ishy e n g.\n\nOtherwise one might render: I will cause (verbal) missiles (comp.\n\nzastâ-i s tâi s ) to be cast forth from the mouth for the harm of the wicked.\n\n(SUPPLEMENTARY NOTE.\n\n'Parch with drought' in verse 10 may be regarded as having figurative application.\n\nThe destruction of the means of irrigation, so often resorted to in the same regions later, would point also to a literal sense, but 'waste our meadows like drought' is a safer expression.\n\nSee further vivâpa t , and vî âpem = vîyâpa t , viyâpem.) Next: Yasna XXXIII"

