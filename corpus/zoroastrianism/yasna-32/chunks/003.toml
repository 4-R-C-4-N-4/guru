body = "His 1 lord-kinsman will pray 2 (as I Zarathu s tra prayed), and his labouring villagers, with his (trusted) peers, and his (fellow) Daêva-worshippers 3 .\n\nBut in my mind is the friendship 4 of Ahura Mazda, the Great Creator, the living Lord; and Thine heralds, O Ahura!\n\nmay we be; may we hold back 5 those who hate and who offend You!\n\n2.\n\nTo these (for whom the prophet spake) Ahura Mazda answered, ruling 6 as He does through His Good Mind (within their souls), He replied from His Sovereign Power, our good friend (as he is) through His surpassing 7 Righteousness: We have accepted p.\n\n58 your good and bountiful Piety, and we have chosen her; ours shall she be 1 !\n\n3.\n\nBut you, O ye Daêvas!\n\nare all a seed from the Evil Mind 2 .\n\nHe who offers sacrifice 3 to You the most 4 is of the Lie-demon, and (he is a child) of perversion 5 .\n\nIn advance 6 (are your) deceits whereby ye are famed in the sevenfold 7 earth!\n\n4.\n\nFor ye (are) confusing our thoughts 8 , whereby men, giving forth the worst deeds, will speak 9 , as of p.\n\n59 the Demon-gods beloved, forsaken by the Good Mind 1 , (far) astray from the understanding of the Great Creator, the Living Lord, and (far astray) from His Righteousness!\n\n5.\n\nTherefore ye would 2 beguile mankind of happy life 3 (upon earth) and of Immortality (beyond it), since the Evil Spirit (has ruled) you with his evil mind.\n\nYea, he has ruled 4 you, (ye) who are of the Demon-gods, and with an evil word unto action, as his ruler 5 (governs) the wicked 6 !\n\np.\n\n60 6.\n\nFull of crime (your leader) has desired to destroy 1 us, wherefore he is famed, (and his doctrine is declared); but if this be so of these, then in the same manner, O Ahura!\n\nThou possessest 2 (because Thou knowest) the true (teachings) in Thy memory 3 .\n\nAnd in Thy kingdom and Thy Righteous Order I will establish Thy precepts (in Thy name) 4 .\n\n7.\n\nAmong these wretched beings 5 (this their leader 6 ) knows not that those things 7 which are declared p.\n\n61 as victorious 1 (by his allies) are bound together for the smiting; yea, those things by which he was famed (as victorious) by his (blade of) glittering iron 2 .\n\nBut the utter destruction 3 of those things Thou, O Ahura Mazda!\n\nknowest 4 , most surely 5 !\n\n8.\n\nOf these wretched beings 6 Yima Vîvanghusha was famed to be; he who, desiring to content 7 our men, was eating kine's flesh in its pieces.\n\nBut from 8 (such as) these, O Ahura Mazda!\n\nin Thy discerning discrimination, am I (to be seen as distinct 9 ).\n\np.\n\n62 9.\n\nAn evil teacher (as that leader is), he will 1 destroy (our) doctrines, and by his teachings he will pervert the (true) understanding of life, seizing away 2 (from me) my riches 3 , the choice and real wealth of (Thy) Good Mind.\n\nTo You and to Asha, O Ahura Mazda!\n\nam I therefore crying with the voice of my spirit's 4 (need)!\n\n10."

