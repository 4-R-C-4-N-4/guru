[content]
body = "56:2 Compare XXXI, 15, 18.\n\n57:1 Some prominent teacher, representing the entire Daêva-party, is alluded to; see verses 6, 7, 9, 10.\n\n57:2 Compare yâsâ in XXVIII, 2.\n\n57:3 Or, 'his are the Daêvas;' but the verb yâsa t perhaps affords a sufficient expression for Daêvâ; yâsen or he n tî may be understood.\n\nWe may also understand the Daêvas here, as the embodied Daêvas, in the manner in which the pious worshipper is called Vohu Manah.\n\nThat Daêva should however be used quite simply for Daêva-worshipper in this early composition is not probable.\n\nIn the later Avesta it is frequent usage.\n\n57:4 Or, 'the friend;' I recoil as much as possible from abstracts, but the Pahlavi has hû-ravâkh-manîh, and Geldner admirably proposed brahman.\n\n57:5 Aîgh s ân min Lekûm lakhvâr yakhsenunêm; so the Pahlavi translation, first venturing on the meaning 'holding back from;' dar in the sense of pâ, which latter in Iranian can mean hold back from advantages as well as from misfortunes.\n\nHigh modern authority coincides with the most ancient authority on this latter point.\n\nIt is apt to be a subject of scepticism with some who neglect the evidence of tradition.\n\n57:6 'Pavan sardârîh î Vohûman;' Ner.\n\nsvâmîtâyâm*.\n\nIt seems difficult to apply the meaning 'being as a refuge' here; see the following 'from His Kingdom.' 57:7 Lit.\n\n'glorious.' This casts light upon the expression h v anvaitî s verezô.\n\n58:1 Aîgh Spendarma d Lekûm raî s apîr dôshêm [bûndak mini s nîh] zak î lanman aîtŏ [aîghmânŏ pavan tanû mâhmân yehevûnâ d ].\n\nNeryosangh: To these the Great Wise (One), the Lord, answered in the lordship of the highest (best) mind; [that is, if, or since, Gvahmana had arrived, as a guest, within (their) body]; from Saharevara he answered [ ] through (their) righteousness, from the well-inclined, and through good conduct, [if truly good conduct had arrived as a guest within (their) body].\n\nAnd he said: I befriend your Earth (so Âramaiti was later understood), the perfect-minded one, and your highest one; she is mine [ ].\n\n58:2 Compare Yasna XXX, 6.\n\nWhere the Daêvas are approached by the worst mind as they are consulting.\n\n58:3 As those who offer sacrifice to these Daêvas are mentioned separately, we are forced to concede a large idea to the composer.\n\nHe addresses the Daêvas as poetically conceived to be present, and not merely their worshippers as in verse 1.\n\nAnd this must have its weight in the exegesis of other passages.\n\n58:4 The Pahlavi translator has kabed.\n\nOr ma s for mashyô (?).\n\n58:5 Or possibly arrogance, avarmîni s ntar; Ner.\n\napamanastara s k a.\n\n58:6 Sâtûnînê d freely, but indicating the root.\n\nThe word is a locative.\n\n58:7 The seven karshvars, or quarters of the earth, were already known."

