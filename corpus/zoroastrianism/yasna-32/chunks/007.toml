[content]
body = "(If verse 5 originally preceded) e nakh s tâ would naturally be regarded as a singular as paouru-aênâo is an impossible plural masculine.\n\nIt might, however, be a singular used collectively.\n\nIn that case we could put the verb in the plural with verse 5 in view.\n\nAs to concrete or abstract, the first is obviously correct, and is also so rendered by the Pahlavi translation.\n\n60:2 Vid (with the perf.\n\nvaêdâ) seems to occur in the Gâthas in this sense.\n\nOr, 'Thou knowest with the Best Mind.' 60:3 Or 'in the memorised recital;' Ner.\n\npraka t a m kalayati.\n\n60:4 Parsi-persian MS.: Bisyâr kînah-varzandah kînah ‘hwâhad, [kû s wanâh-kârân pâdafrâh kûnêd], kih, guft + srûd îstêd [kih guft îstêd]; kû, kih ô s ân bî- s umâr [kû, pâdafrâh pah ân zamân tamâm bih kunand, kih ruwân bâz ân tan dehad].\n\nZ̤âhir s umâr-kunandah Hôrmuzd [kû pah wanâh wa kirfah s umâr-kunand]; wân i buland âgâh pah Bahman [muzd dânad; kû ân kih bâyad dâdan].\n\nPah ân i Tû i S umâ, Hôrmuzd!\n\n‘hudâ, ân i Ṣawâb âmû‘htan bih dânêstuwân (sic vid); [kih S umâ padi s âhî tamâm bih bêd + ya‘hnî + bâ s ad, har kas pah nêkî âgâh bih bâ s ad].\n\n60:5 The Pahlavi has kînîkânŏ.\n\n60:6 The h v aêtu of the first verse, the du s sasti of the ninth, &c.\n\n60:7 The Pahlavi curiously errs with his rôshanŏ = clear; Ner.\n\nparishphu t atara h .\n\nIt would be straining a point to call him free in interpreting what is 'collected' and so 'obvious' as 'clear.' We must, however, never forget that the supposed error of the Pahlavi is sometimes the reflex of our own (often necessary) ignorance.\n\nVîdv a u must refer back to the same subject as a yâ in the first verse, or possibly to Aka Manah, going a step further back.\n\n61:1 Possibly, 'which are by Thee announced as destined and proper to be smitten.' The Pahlavi has mûn zani s nŏ âmûkhtênd (sic).\n\nJôyâ = jâyâ to jan, as âkâyia is to kan.\n\n61:2 Compare other allusions to weapons, snaithi s â, and possibly dakhshtem.\n\n61:3 So also the Pahlavi, ristak and pâ d afrâs.\n\n61:4 Naê k î t vîdv a u and vaêdi s tô ahî are in antithesis and emphatic.\n\n61:5 A literal rendering of this difficult verse would be as follows: Of these wretches, nothing knowing (is he that) for the smiting (dat."

