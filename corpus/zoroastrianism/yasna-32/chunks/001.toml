body = "Sacred Texts Zoroastrianism Index Previous Next Buy this Book at Amazon.com The Zend Avesta, Part III (SBE31) , L.H.\n\nMills, tr.\n\n[1886], at sacred-texts.com p.\n\n54 YASNA XXXII.\n\nTHE STRUGGLE IS CONTINUED IN THE MIDST OF REVERSES.\n\n1.\n\nThe same author may well be supposed to continue.\n\nThe first stanzas have been lost, but we observe that the subject of the section is still face to face with the Daêva party.\n\nHe seems to see them arrayed and engaged in hostile devotions.\n\nBut he is not intimidated.\n\nThe friendship of Ahura is before his mind, and he expresses his desire that he and his colleagues may become, or continue, His apostles, notwithstanding the temporal sorrows which, according to XLIII, II, we see that he clearly anticipated as the portion of those who would propagate the holy faith.\n\n2.\n\nMazda answers him, and through him his followers, as established in His spiritual sovereignty, accepting the devotion of their piety with commendations and implied encouragements.\n\nHe whom they would serve is supreme; they need not fear.\n\n3.\n\nAfter reporting this response of Ahura, the composer turns with vehemence toward the Daêvas, poetically conceived to be present as if before their adherents, who also, according to verse 1, are supposed to be in sight (or are dramatically so conceived) celebrating their profane devotions; and he addresses them as the 'very seed' of Satan.\n\nTheir worshippers belong to the religious falsehood and perversity.\n\nAnd they have persistently propagated their evil creed, which is in consequence spreading.\n\n4.\n\nThey have, so he acknowledges with grief, perverted men's minds, making them spokesmen for themselves, and in consequence deserters from the great Kindly Disposition of Ahura Mazda, and outcasts, fallen from His understanding.\n\n5.\n\nThey have destroyed the hopes of mankind for a happy life upon earth, and for Immortality in heaven.\n\nAnd in this they are not only the seed of the Evil Mind personified, but his servants rallying at his word.\n\n6.\n\nTheir leader is striving energetically, so he mournfully bewails, to effect his evil ends; but it is time that he should recall the counteracting measures of Ahura.\n\nHis holy doctrines are to be announced, and their authority established by the divine Khshathra, His Sovereign Power personified.\n\np.\n\n55 7.\n\nThe composer then contemplates with religious irony the infatuated security of the wretched delinquents whom he is apostrophising.\n\nNot a man of them knows the destruction which awaits him, and which, as he intimates, is close at hand, but Ahura, he significantly exclaims, is aware of it.\n\nAnd it will be proportionably severe.\n\nThe blindness of sinners to danger seems as definite a judgment upon them in his estimate as their blindness to the truth.\n\n8.\n\nTo point his anger with an instance he names the apostate Yima, whom he supposes to have erred in first introducing the consumption of the flesh of cattle.\n\nHe disavows community with him as with them all, declaring himself separate from them in Ahura's sight.\n\n9.\n\nHe acknowledges that their leader has to a certain degree defeated his teachings, and impaired the just estimates of life which he had striven to form within the people, (or that he will do this if not checked), declaring also that he had made inroads upon his property, which was sacred to the holy cause.\n\nAnd he cries aloud to Ahura and to Asha with the words of his very soul.\n\n10."

