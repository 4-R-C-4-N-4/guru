[content]
body = "jâ, jan; cp.\n\nform Sk.\n\njâ, jan) (are) the-collected-things, which things (as) victorious (read jayâ) are declared forth, by which things) he has been heard (of) through glittering iron, of which things Thou, O-Ahura I the ruin, O-Mazda!\n\nmost knowing art.\n\nOthers take s e nghaitê in the sense of 'cut' (?) and render very differently.\n\n61:6 The Pahlavi has shedâân; Ner.\n\ntân dveshi n a h .\n\n61:7 Or 'teaching,' so the Pahlavi; Ner.\n\nsamâsvâdayati.\n\n61:8 The Pahlavi translator hits the true rendering here: 'from among these I am chosen out by Thee.' Otherwise we have a question: Am I of these?\n\nThe allusion is to the fall of Yima.\n\nAs to the first eating of the flesh of beasts, recall Genesis ix.\n\n3.\n\nSome have rendered: With regard to these I am of Thine opinion, O Mazda (?).\n\n61:9 The Pahlavi may be rendered as follows: Among (of) these demons Yima of the Vîva n hânas is famed to have been a wicked scourge.\n\nIt was he who taught men thus: Eat ye our flesh in pieces [wide as the beast, long as the arm—(or better with West, 'in lapfuls and armfuls')].\n\nFrom among these [ ] I am chosen out by Thee, O Aûharmazd!\n\nhereafter; [that is, even by Thee I am considered as good].\n\n62:1 An improper subjunctive.\n\nOtherwise: He (has) destroyed (not irretrievably, of course; the case was not decided, and finally issued favourably).\n\n62:2 Apô—ya n tâ; otherwise 'they would take'; Ner.\n\napaharati.\n\n62:3 Zak î li îshtî avôrtŏ [—khvâstak î pavan dastôbar].\n\n62:4 Pavan valman s ân milayâ î mînavadîhâ; Ner.\n\nvâgbhi h mânasav ri ttyâ aham—âkrandaye (not following our present Pahlavi text, the gloss however).\n\nObserve that in reading Ner.\n\nwe by no means ipso facto read the Pahlavi, either in correct translation, or as following our texts., Compare XLVI, 2.\n\n62:5 One thinks somewhat of the familiar foes of the Vedic kine; but there can be of course no connection.\n\nThe Iranian sacred Cow did not represent the rain cloud, at least not at all directly.\n\n62:6 Read viyâpa t as a demon.\n\nwithout sign: 'v' was miswritten for 'y' as often 'y' for 'v.' The Pahlavi language, not to speak of the Pahlavi translation, suggests it.\n\nHow are we to account for the word vîyâvânînê d ?\n\nWe should not arrest our philology at the Zend and Sanskrit.\n\nThe long vowel is most awkward for a comparison with the Indian vap = shear.\n\nAnd I think that 'destroying the means of irrigation' gives good a meaning as 'shearing the land.' Notice that elsewhere a more correct form appears, vîâpôtemem (Vd.\n\nIII, 15, (51 Sp.))=viyâpôtemem."

