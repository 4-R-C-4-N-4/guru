[content]
body = "65 Read: In his dominion he has established the Kavis and their intended plans.\n\nReading hôithôi, 'his G.\n\nis to be bound.' 65:1 The predecessors of the Pahlavi translator seem to have understood the word var(e) k a u as conveying the idea of power rather than that of brilliancy.\n\nHe renders freely pavan zak î varzânân avârûnŏ dânâkânŏ.\n\nSupposing the text to stand, and not supplying a formation from var(e)z, we may hold that there existed a var(e) k beside var(e)z, as there undoubtedly was a har(e) k (see harek e ) beside har(e)z.\n\nThis casts light on the Vedic vár k as.\n\n65:2 Amati k pa d îrênd valman darvandân aîyyârîh [ ] amati k avŏ Tôra zani s nŏ gûftŏ.\n\nThe sufferings of the sacred Kine form the central thought of much that occurs.\n\n65:3 Can gâu s be a genitive here?\n\nBut if a nominative, must not y e refer to it?\n\nHow then could the Kine 'kindle' the aid of grace?\n\nA genitive looks difficult.\n\nIt is, however, accepted by Spiegel, although he renders differently from my translation.\n\nThe Pahlavi may give us invaluable relief here by restoring the text.\n\nThe ancient translator read vao k aya t .\n\nReading with him, we might render: When the Kine which (yâ?) caused a death-removing help to be declared, was said to be meet for subjection (or slaying, reading an infinitive from g an).\n\nThis rendering is more probable than that from sao k aya t .\n\nThe Kine distinctly caused this help to be declared.\n\nSee XXIX.\n\nBut I make it a matter of principle to follow the MSS.\n\nin a first translation, where that is at all possible.\n\n65:4 The Pahlavi translator differs greatly here, having taken anâi s with adverbial force, and as possessing the a priv.\n\n(they being p.\n\n66 not inclined).\n\nHe also read somewhat as follows: anâi s avaênî(?) as y e = from his non-inclination he was blind who (belongs to the Karpan and to the Kavi).\n\nWhether a truer text is indicated by him here is doubtful on account of XLIV, 13, and its nâshâmâ; but the unvarying explanation of the Kavis as blind probably derives its origin from some such reading here, or elsewhere in lost documents.\n\nCertainly if âi s can be used as a particle, anâi s is not altogether impossible in some such sense.\n\nMoreover, the Pahlavi translation here and elsewhere has afforded us such a multitude of valuable concretes, that we shall do well to think twice before we reject its most startling suggestions.\n\nLit.\n\ntrl.\n\n'what (things are) of the K.' 66:1 The Pahlavi translation gives a fine suggestion in the concrete sense here; seeing the dual âbyâ, it explains it as referring to Haurvatâ t and Ameretatâ t , which is very probably correct.\n\nSo Spiegel also renders.\n\nIt is very difficult to decide in which sense y e n g dai n tî nôi t jyât e u s khshayaman e n g vasô is to be taken."

