body = "62:7 Literally, 'he will discharge his club at the righteous.' 63:1 The Pahlavi translator erroneous, or free, as to k ikôitere s , indicates the proper sense of mazibî s by pavan masâî [—pavan pêshpâyîh va pâspâyîh—]; but Neryosangh, mahattayâ-pura h -saratayâ.\n\n63:2 Comp.\n\nXXXI, 12, 'there high his voice lifts the truthful or liar.' 63:3 Literally, 'he takes.' 63:4 Riknah vindi s nŏ.\n\n63:5 Ka d ak-khû d âî gabrâ nê s man.\n\n63:6 Reshînênd; see V, 10.\n\nThe ablative of the cause, comp.\n\nashâ t ha k â; otherwise with Hübschm., 'Sie die Schaden nehmen mögen durch den besten heiligen Geist, O Mazda!' (Casuslehre, s.\n\n241.) 63:7 The Pahlavi translator had probably before him a text reading rashayen; he renders freely rêsh srâyênd.\n\nWith such a text which is far preferable to the one afforded by the MSS.\n\nwe may read: Whereby (yéna) men will be opposing and retarding (literally wounding) the doctrines which (are derived) from the best (moral and ceremonial) action; but to these men Mazda declared: Evil (are ye).\n\nSee the previous verse.\n\n63:8 See the previous verse.\n\n63:9 The Pahlavi has hû-ravâkh-manîh yemalelûnd.\n\n64:1 So also indicated by the Pahlavi bavîhûnd.\n\n64:2 There is elsewhere evidence enough of a desire to encroach upon the truth.\n\n64:3 So also indicated by bavîhûnê d .\n\n64:4 Or, 'which kingdoms, sovereign power.\n\n' 64:5 Comp.\n\nXXX 6.\n\n64:6 Or, 'they gladly complain;' so also the Pahlavi: Mûn—garzi s nŏ kâmak.\n\nThe singular g îgereza t is difficult with yaê k â.\n\nMany would alter the text at once, and the temptation is great.\n\n64:7 Hübschm., 'y e î s pâ t daresâ t ashahyâ der sie abhalte vom Schauen des Asha' (Casus.\n\n241).\n\nSo of XLVI, 4.\n\nSo also indicated by pâ d ênd mîn nikêzi s nŏ î Aharâyîh; evidence of a struggle, or at least of a desire on the part of a rival party to possess themselves of some religious privilege or precedence.\n\nSee the previous verse; also XXXI, in: Never, O Mazda!\n\nnever shall the thriftless and thieving one share the good doctrine.\n\nSee still further XLIV, 15, where the two hosts meet in hostility 'on account of the doctrinal vows.\n\n' 64:8 Gr e hma appertains to, but is not the particular evil teacher referred to throughout.\n\nThe Pahlavi translator indicates bribery as the meaning of the word.\n\nPossibly some impious chieftain is meant whose procedure was of that nature.\n\nThe word omits in the plural.\n\n64:9 Â hôi; Thwôi is difficult.\n\nOr (see Y.\n\nXLIV, 14), 'Thine understanding has subdued the Kavis.' The Pahlavi translator renders masîh, as if he had read ahuthwôi, offering an important alternative.\n\np."

