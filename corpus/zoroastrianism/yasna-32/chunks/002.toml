[content]
body = "He repeats that their leader threatens to invalidate his teachings, blaspheming the supreme object of nature, the Sun, together with the sacred Kine, injuring the productive land, and carrying murder among the saints.\n\n11.\n\nHe utters his bitter wail in view of attempted slaughter, and actual spiritual opposition.\n\nHe points out the plots among the powerful and their illegal confiscation of inheritances, as well those of women as those of men.\n\nAnd he declares that his opponents are endeavouring to injure his adherents, as if repelled by the best spiritual qualities which an individual could possess.\n\n12.\n\nHe announces the solemn judgment of God upon it all, especially reprobating those who deal treacherously against the mystical Kine; that is, the holy herds and people, and apostrophising those who prefer the Gr e hma above the saving and sanctifying Asha, and the Kingdom of the Lie-demon above the Divine Khshathra.\n\n13.\n\nHe declares that Gr e hma, an opposing chief, desired that evil kingdom in the abode of the personified Hell.\n\nAnd he cannot refrain from adding that he also enviously desires to share in the holy apostleship.\n\nBut, as he severely rejoins, the messenger of God will hold him afar from the sight of the (Divine) Righteousness.\n\nHe can have no share in the Faith.\n\n(Here it may be noticed that we have some data for presenting p.\n\n56 the main features of the struggle.\n\nIn several instances, centring perhaps in the actual description of a battle in XLIV, 15, 16, we see traces of the closeness of the controversy.\n\nIn XLIV, 15, the two hosts seem to be closing in regular lines for the 'holy vows themselves.' Here, on the other hand, we read of willing complaint or 'regretful desire,' while judicial blindness is referred to over and over again under various phrases.\n\nOne might suppose that the Daêva-party were very near the Zarathu s trians in many of their religious peculiarities, but that they could not accede to, or understand, the dualism.\n\nAfter the manner of Pagans they implicated the Gods in their sins.\n\n(Compare the drunken Indra.) At all events a bitter and violent war of doctrines was waging with both speech and weapons.\n\nI think it looks like the struggle 'of two parties' who each claimed to be the proper representative of some similar form of faith, similar, of course I mean, outwardly.) 14.\n\nDeploring the establishment of the Kavis who approach with stratagems and false teachings to aid the opposing party, the composer declares that they say that the Kine herself is to be injured instead of blessed by the very fire-priest who kindles 1 the altar-flame.\n\n15.\n\nHe supports himself however with the hope of ultimate success, and with the prospect of his reward, when he and his fellow-labourers should be gloriously borne to heaven by Weal and Immortality, the 'eternal two,' who not only, as we see, bear saints to bliss, but also constitute the beatitude of heaven itself.\n\n16.\n\nHe confides all at last to Ahura, who is able to control all events, and to solve all doubts, and who will support his servants in bringing the wicked to vengeance by means of verbal instructions and commands.\n\nTranslation.\n\n(That rival-monarch (thus we may supply the sense of lost verses) for whom some are plotting to secure the sovereignty, and who, once in power, would deliver over home, village, town, and province to ruin and to death 2 , is active in his efforts, and offering p.\n\n57 the devotions of his false religion to accomplish his ends.) 1."

