[content]
body = "[That is, I (?) shall do that thing through which, by my means, your sovereignty is extended; and also wealth is kept in your possession by me.] For whenever I (?) shall do righteous deeds, [that is, when I (?) shall do duty and good works], Vohûman gives nourishment to our poor.\n\nBefore all of every kind, even before them ye are p.\n\n86 declared; [that is, ye are more capable] than the demons, for their (?) intellect is perverted, (and ye are also before) men.\n\n86:1 So also the Pahlavi dakh s ak.\n\n86:2 So indicated by ketrûnânî.\n\nI have no doubt whatever that maêthâ should have this sense.\n\nSee also Y.\n\nXXX, 9.\n\n86:3 So also the Pahlavi: Pavan âfrînagânŏ dahi s nŏ va stâyi s nŏ sâtûnam madam.\n\n86:4 Urvâidyâo, if in its original form, looks like a comparative.\n\nOne naturally thinks of a *vrâd (?) equivalent to 'v ri dh.' 86:5 Rhetorically interrogative as often in English, or indeed a mere particle.\n\n(Compare XLVI, 9.) 86:6 So also the Pahlavi indicates with its âmûkhti s nŏ (sic) î hûvari s nŏ [î avŏ kâr va kirfak], mûni k pavan âsânîh va mûni k pavan tangîh vâdûnyên frâkh-hushîh.\n\nNer.: S ikshâm satyiya ya h samâdhânatve, sa m ka t atve* ’pi kurute vipula k aitanya h [kila, ya h kârya m pu n ya m yat sam ri ddhatayâ kurute] ta k k a yat sa m ka t atayâ ’pi kurute, tasya vi g ñ âna k aitanya m tasmâd bhavati.\n\n86:7 Nâo being taken in a possessive sense.\n\n86:8 But the Pahlavi has: 'Min zak î valman s ân maman kûni s nŏ lanman bîm'; possibly 'by these actions they terrify us'; the middle in the sense of the active.\n\n87:1 It is a mistake to suppose that the Pahlavi translator and his followers, Ner.\n\nand the Persian MS.\n\n(of Haug's Collection), refer nâidy a unghem and nade n tô to the same Sanskrit word.\n\nThey translate them as if referring the first to nâdh, and the last to nid.\n\n87:2 Min valman s ân barâ rakhîk aîtŏ Vohûman.\n\nAsmanô seems an impossible reading, and cannot be reconciled with Vohû.\n\n87:3 The hint of the Pahlavi points, as usual, to the general sense, leaving us the task of discovering the grammatical structure.\n\nHere I do not follow the indication of sedkûnyên; Ner.\n\nparikshipyanti.\n\nThe voc.\n\n'O Thou' is free.\n\n87:4 So also in general the Pahlavi: Min valman s ân kabed Aharâyîh se g dak; Ner.\n\ntebhya h * prabhuto dharma h * prabhra s yati.\n\n87:5 So if ahma t is read, but the MS.\n\nbefore the Pahlavi translator read ahmât; Ner.\n\netebhya h (freely)."

