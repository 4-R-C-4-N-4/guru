[content]
body = "XXVIII, 10.\n\nThe Pahlavi renders freely and not uncritically, regarding the spe n ta nar as Zarathu s tra himself: Aftânŏ dên Garô d mânŏ stâyem.\n\nNer.: Garothmâne staumi te.\n\n84:2 So also the translations: Aîgha s parvari s n va min frarûnîh.\n\nNer.: Uttamena pratipâlyâ manasâ.\n\nCompare Y.\n\nXXXII, 2: sâremanŏ khshathrâ t .\n\nThe singular verb is difficult.\n\n84:3 Or, 'for as those justly acting, and in preparation will we offer it as a blessing together with all who are among \"Your own.\"' Here khshmâva n t equals 'Your own'; rather than 'Yourselves.' 84:4 Or 'visible' as fire, but this seems too feeble a conception for the place.\n\nThe Pahlavi translator read dere s tâ as a participle from dar(e)z, which is quite as possible as that it should be from dar(e)s.\n\nHe renders yakhsenunê d kînŏ; Ner., vidadhâti nigraham.\n\nThat he so translated because he was not aware that dere s tâ could be also a participle from dar(e)s, is no longer tenable.\n\n84:5 As by no means a partially selected specimen, let the reader p.\n\n85 consider the following from the Pahlavi: Thus, O Aûharmazd!\n\nthis which is Thy Fire, which is so powerful, is a satisfaction to him whose is Aharâyîh [-when my chieftain (the glossist seeming to have a text with a first pronoun; otherwise the first translator who never saw?\n\nus(e)mahî) becomes one by whom duty and charity are fulfilled], for it is quick and powerful [the Fire], and remains continually in friendship with him, and makes joy manifest to him.\n\nAnd therefore, O Aûharmazd I on him who is the tormentor it takes revenge as if with a mighty wish.\n\n85:1 Ka t is often a mere interrogative particle, so modern interrogatives are also often merely formal.\n\n85:2 Bartholomae admirably follows K4 here with its hakhmî; it gives a more common explanation of vâo, which I am obliged to take in a possessive sense beside n e .\n\nThe manuscript used by the Pahlavi writer had, however, ahmî, as many others now extant.\n\n85:3 Note the recurrence of this care for the poor, showing what the frequent mention of righteousness, the good mind, &c.\n\nmeant.\n\n85:4 Observe that daêvâi s must mean the Demon-gods and not their worshippers here; par e vâo indicates this, and also mashyâi s = men, who are separately mentioned.\n\nThe Pahlavi translator is finely critical here, giving us our first hint as to the meaning: Pêsh Lekûm min harvisp-gûnŏ levînŏ gûft hômanê d [aîgh tûbânkar d ar hômanê d , &c.].\n\nSo with antare-mrûyê (-vê), he was the pioneer also.\n\nI render with impartiality: Which (of what kind) is your sovereignty?\n\n[that is, what thing can I do, whereby your sovereignty may be increased through my instrumentality?] And which is your wealth?\n\n[that is, what thing shall I do whereby riches may be kept in your possession by my means?] How thus in the actions of Aûharmazd shall I become yours?"

