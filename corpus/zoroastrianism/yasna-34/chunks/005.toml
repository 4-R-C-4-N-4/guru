[content]
body = "Kine, these further 2 Your merciful care through the understanding's action 3 , and (taught) by Thine Order's (word) 4 .\n\n15.\n\nYea, (show me, O Mazda!\n\nthat path and its reward); tell me the best (of truths); reveal the best words and best actions, and the confessing 5 prayer of the praiser through Thy Good Mind (living within us); and through the Righteous Order, O Ahura!\n\nAnd by Your Sovereign Power and grace may’st Thou make life really progressive 6 (till perfection shall have been reached)!\n\nFootnotes 83:1 The hymns seem to be all composed for public declamation, as is evident from various passages.\n\nSimilar indications often occur in the Veda.\n\nI formerly connected aêshãm with Ameretatâ t , &c., 'a thank-offering for these (gifts).' 83:2 I am very sorry to oppose progress on such a subject as dastê, but I do not think that it is an infinitive, nor that âitê or mrûitê are such.\n\n-Tê, or what it represents, I regard as seldom or never a Gâthic suffix, and especially not, as here, where dastê falls to the end of the sentence.\n\nToo little attention has been paid to the Gâthic sentence.\n\nThe infinitive seldom falls to the end of it; vîdvanôi vao k â; ta t môi vî k idyâi vao k â; vîduyê (vîdvê) vohû mananghâ; me n k â daidyâi yêhyâ mâ rishis; ashâ fradathâi asperezatâ; â g ôi (?) hâdrôyâ; y e a k i s tem vaênanghê aogedâ; but zbayâ avanghânê (?) yâ verezyêidyâi ma n tâ vâstryâ; srûidyâi Mazdâ frâvao k â; kahmâi vîvîduyê (-vê) vashî; ta t verezyêidyâi hya t môi mraotâ vahi s tem; arethâ vôizhdyâi kâmahyâ t e m môi dâtâ; dazdyâi hâkerenâ; but vasmî anyâ k â vîduyê (-vê); m e n dâidyâi yâ Tôi Mazdâ âdi s ti s , &c.\n\nThe Pahlavi renders here with admirable freedom as a first person, yehabûnêm.\n\n83:3 Observe this expression.\n\nIt is the spe n ta mainyu which, like the 'Holy Spirit of God,' is sometimes identical with Him.\n\n83:4 Souls are elsewhere said to go hand in hand; see Y.\n\nXXXIII, 9.\n\n83:5 I suppose that it is possible that khshmâvatô, here and elsewhere, may refer to the human subject, 'to the praise of your worshipper,' p.\n\n84 but it does not sound at all natural.\n\nI think that khshmâvatô is merely another way of saying 'of you,' as mava n t = me.\n\nSo the Pahlavi also seems to render here: Avô zak î lekûm va nîyâyî s nŏ.\n\nNer.\n\nalso: Samâga k kh âmi yushmâkam namask ri taye, Mahâ g ñ ânin.\n\n84:1 This recalls the dasemê-stûtãm of Y."

