body = "Sacred Texts Zoroastrianism Index Previous Next Buy this Book at Amazon.com The Zend Avesta, Part III (SBE31) , L.H.\n\nMills, tr.\n\n[1886], at sacred-texts.com p.\n\n80 YASNA XXXIV.\n\n1.\n\nA tone of thankfulness continues.\n\nAs if in gratitude for better fortunes, the prophet declares that he will bestow upon Ahura with the foremost, according to the measure of the gifts (which he has received.\n\nThose gifts were the secured Immortality not mere temporal 'deathlessness'), the Righteous Order, and the Sovereign Power established in holiness and bestowing the Universal Weal.\n\n2.\n\nThe kind of gifts which are proposed for offerings are not sacrificial beasts or fruits, but the actions of the truly pious citizen whose soul is intimately united with Righteousness, the homage of prayer, and the songs of praise.\n\nAs no piety could exist without strict ecclesiastical regularity, so no ceremonial punctuality was conceived of apart from honour and charity (see verse 5 and Ya s t XXII).\n\n3.\n\nAccordingly the meat-offering, the mention of which immediately follows, is spoken of as offered with homage to the Righteous Order and to the Divine Sovereignty for the benefit of all the sacred settlements, in order to equip the wise man fully, and as a helpful blessing among the Immortals themselves and their adherents.\n\n4.\n\nAnd the Fire is likewise mentioned, which was worshipped not so much like Agni as the friendly god of the hearth and the altar, but more and chiefly like Agni as the priest of the church.\n\nNot unlike Agni, it is called upon both for inward spiritual strength and for temporal blessings in various forms, together with vengeance hurled very much as if in the form of a thunderbolt (zastâ-i s tâi s dere s tâ-aênanghem).\n\n5.\n\nTo explain what he means by his supplications for the coming of the Kingdom, and for holy actions (that is, to make it certain that he does not mean punctilious ritualism apart from the noblest charity), he rhetorically asks: ‘And what is Your Kingdom, that which Zarathu s tra establishes and offers to You?\n\n(XXXIII, 14).\n\nWhat is the kind of prayer (comp.\n\nXLVIII, 8, and LIII, 1) which I must use, so that I may become Yours (Your property) in my actions, not to load Your priesthood with sacrifices, nor to fatten Your princes with booty (as too often in the Ri ks), nor yet to secure a heavy gift to the poet, but to 'nourish Your poor?' This was the essence of the desired Sanctity and the Sovereign Authority.\n\nThe Kingdom of God, exalted p.\n\n81 and personified as a separate intelligence, is positively said to be something more than a gaudy pageant of material display, even Tavâ Khshathrem yâ ere z i g yôi dâhî drigavê vahyô (LIII, 9).\n\n(See also even Vendîdâd II [part i], where moral duties are lauded.) And the composer himself seems to be so conscious of the sharply defined difference between such a kingdom and that of the rival religion, that he immediately adds an interdict: 'Such is Your Kingdom, caring for the righteous poor, and therefore we declare You irreconcilably distinct from the Daêvas and their polluted followers.\n\nYe are beyond them and before in the spirit of Your Reign!' 6."

