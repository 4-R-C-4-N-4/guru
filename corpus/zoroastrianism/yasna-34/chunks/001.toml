[content]
body = "1.\n\nAs to those (three gifts of blessings), Immortality, the Righteous Order, and the (established) Kingdom of Welfare, which Thou, O Mazda!\n\nhast given through (holy) deeds, words, and the sacrifice unto these (Thy servants here in my sight 1 ), gifts (shall) be offered 2 by us in return to Thee, O Ahura!\n\nand with the foremost of them all.\n\n2.\n\nYea, and all those gifts of the Good Spirit 3 have been given (back in gratitude) to Thee by the mind and the deed of the bountiful man, whose soul goes hand in hand 4 with the Righteous Order in the settlement, in homage toward the One like You 5 , p.\n\n84 [paragraph continues] O Mazda!\n\nand with the chants of the (thankful) praisers 1 .\n\n3.\n\nAnd unto Thee, O Ahura!\n\nwill we offer the (thankful) meat-offering with self-humbling praise, and to Thy Righteousness (like Thee a person), and for all the settlements in Thy kingdom which are guarded 2 by Thy Good Mind.\n\nFor in the perfect preparation of the justly acting (has that offering its power), O Mazda!\n\ntogether with all (others of its kind).\n\nAmong those like You and worthy of Yourselves, it is a blessing 3 .\n\n4.\n\nAnd we pray likewise for Thy Fire, O Ahura!\n\nstrong through Righteousness (as it is), most swift, (most) powerful, to the house with joy receiving it, in many wonderful ways our help, but to the hater, O Mazda!\n\nit is a steadfast 4 harm as if with weapons hurled from the hands 5 .\n\np.\n\n85 5.\n\nWhat is 1 then Your Kingdom, O Mazda?\n\nWhat are Your riches?\n\nthat I may become 2 Your own in my actions, with the Righteous Order, and (Thy) Good Mind, to care for Your poor (in their suffering 3 ).\n\nApart from all would we declare You, yea, apart from Daêvas 4 , and Khrafstra-polluted mortals!\n\np.\n\n86 6.\n\nIf thus Ye are in verity, O Mazda!\n\nwith the Righteous Order and Thy Good Mind, then grant Ye me a sign 1 of this in this world's entire abiding 2 (while I live amid its scenes), how offering sacrifice and praising 3 You the more devoutly 4 , I may approach You (in my worship)!\n\n7.\n\nWhere 5 are Thine offerers, O Mazda!\n\nThy helpers, who as the enlightened of the Good Mind are producing the doctrines with wide mental light as inherited treasures, (delivering them as Thy word) in misfortune and in woe 6 ?\n\nI know none other than You; then do Ye save us through Your righteousness!\n\n8.\n\nThrough these our deeds (of sacrifice and zeal 7 ), they are terrified 8 among whom there was (once) destruction, and for many (at the time) when the p.\n\n87 oppressor of Thy holy vows was as the stronger oppressing the weaker 1 .\n\nThey who have not thought (in consonance) with Thy Righteous Order, from these Thy Good Mind 2 abideth afar.\n\n9.\n\nAye, they who desert Thy bountiful Piety, O Mazda!\n\nthat one desired of Thee 3 , O Thou omniscient!\n\nand who thus abandon her by reason of the evil-doer, and in their ignorance of (Thy) Good Mind, from such as these (Âramaiti) with her holiness utterly departs 4 as the red Khrafstras (who destroy and pollute all life, flee) from us 5 (Thy faithful servants).\n\n10."

