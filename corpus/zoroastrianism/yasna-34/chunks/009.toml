[content]
body = "[Mârga m ya m pûrvanyâyavanta m asmabhya m brûhi.] 89:3 Observe the certainty of a subtle meaning, 'the way is the consciences or laws.' 89:4 Geldner has admirably suggested a comparison with vra g on account of the connection 'way.' But as this necessitates two urvâz = vrâz, and as Ahura is spoken of as 'dwelling' in 'paths,' I do not think that 'thriving in paths' is very difficult.\n\nThe prominent thought is not the going, but the 'right going.' That path indicates a reward (so also the Pahlavi k âshî d ŏ, Ner.\n\nâsvâdaya h ).\n\nBut we must be thankful for the keen and vigorous discussion.\n\nCompare urvâkhshanguha gâya g ighaê s a.\n\nThe Pahlavi has hû-ravâkh-manîh and in Y.\n\nXLIV, 8.\n\nIf vra g is compared, the idea must be happy progress; but varh (Justi) seems the more obvious correspondent.\n\n89:5 Asha, very often personified, is a stronger expression than 'correctly: 89:6 Of course our life on earth, merely in the bodily state.\n\nComp.\n\nY.\n\nXXVIII, 3.\n\nThere astavatas k â evidently means 'of earth,' mananghô, 'of heaven' (—of corporeal—of mind, without body).\n\n90:1 Or the 'mature,' 'drivable' (?) cow.\n\nShe 'goes on her path' of toil.\n\n90:2 So frâz yehabûn d .\n\n90:3 Observe that vere z e nâ cannot well mean 'stall' in this line.\n\nThe Pahlavi likewise sees varzî-aît in it; Ner.\n\nvidhîyate, both free as to form.\n\n90:4 Neryosangh: Sa yato, Mahâ g ñ ânin!\n\nkâmo ’smâka m yat tanumate g îvamate dîyate [â k âryâya], uttamena karma n e manasâ [khshatriyâya], ya s k a gavâ* â k ârayitre* A g inâmnyâ, [ku t umbine], yo yushmâka m sunirvâ n a g ñ ânatayâ, Svâmin!\n\nbuddhyâ k a, pu n yapradattayâ vidhîyate [dîni h ] 90:5 I concede this shade of meaning to the constant and unvarying evidence of the Pahlavi translator.\n\nHe translates uniformly by avâm yehabûnê d or its equivalents.\n\n90:6 Bring on 'millennial' perfection when progress shall have been completed.\n\nThe Pahlavi translation is as follows: Pavan zak î lekûm khû d âyîh-Aûharmazd!\n\nfrashakar d ŏ pavan kâmakŏ âshkârakŏ dên ahvânŏ yehabûnî-aît.\n\nNer.: Yushmâkam râ g yena, Svâmin!\n\nakhshayatvam sve k kh ayâ parisphu t a m dâsyate bhuvane.\n\nNext: Yasna XLIII"

