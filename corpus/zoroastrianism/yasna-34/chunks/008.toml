[content]
body = "A simpler rendering results; 'as from him flee away.' 87:6 Observe the evidence of the Zend to the prevalent meaning of 'khratu.' 87:7 Or reading hithãn, and in the sense of 'bond,' we coincide with Ner.\n\nsukhanivâsam.\n\nHaithãm = the true; hâtãm?\n\n= of beings.\n\nLit.\n\n'the true creatrix of Asha (the holy).' 88:1 The word voyathrâ is difficult to place; the Pahlavi translator divided, reading âvo-yathrâ (possibly âvoi athrâ), and rendered frô d kûshî-aît = is smitten down; the Persian better: Frôd zadar, is smiting down.\n\nWe may well hesitate before rejecting this indication, which may point to a better text.\n\nLike vafu s , it may indicate the severity of the influences of the righteous system, in the midst of genial allusion.\n\nThe tâ vîspâ might refer quite naturally to du s - s kayasthanâ in the previous verse.\n\nThe form voyathrâ (corrected) may represent some derivative from the root bî = to fear.\n\nCompare bya n tê in verse 8.\n\n88:2 So likewise the Pahlavi with its khûri s nŏ; otherwise 'for glory;' h v ar = svar.\n\nLit.\n\n'To Thee (are) both Weal and Immortality.' 88:3 G avî d bêsh min lak hômanih; Ner.\n\nvîtakash t as tva m asi.\n\n88:4 Ner.: Thus both are (to be derived) from thee, Avirdâda's food, and that of Amirdâda also, [the (food) of the Lord-of-water, and of the Lord-of-wood * (so the later Avesta and Parsism)], and in the kingdom of the best mind, righteousness is making a revelation together with the perfect mind.\n\nDo thou also bestow zeal and power upon this one, O Great Wise One, the Lord!\n\nFrom torment art thou exempt.\n\n88:5 So also vîrâyi s nŏ.\n\n88:6 Pahlavi ârâyi s nŏ.\n\n88:* Otherwise simply 'water and tree.' 89:1 The Pahlavi has the gloss: Teach us the way of the original religion.\n\n89:2 Neryosangh: Ki m to sa m mâr g anam [kila, kârya m , te ki m mahânyâyitara m ?] Ka h kâma h ?\n\nKâ k a yushmâka m stuti h ?\n\nKâ k a yushmâka m i g isni h ?\n\nS ri n omi, Mahâ g ñ ânin!\n\nprak ri sh t a m brûhi!\n\nyat k etsi* dharmasya sa m mâr g ana m , [aho viseshe n a pa s ya!\n\ntasmât mahânyâyitarât kuru!] S ikshâpaya* asmâka m dharmasya mârga m uttamena svâdhîna m manasâ."

