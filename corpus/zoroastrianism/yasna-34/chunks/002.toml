[content]
body = "He then utters an impressive doubt, which only deepens our admiration at his expressions of faith: 'If it be really true,' he continues (see XLIV, 6), 'that Ye are thus with the Righteous Order and the Good Mind, the God who looks upon the goodness of the heart and the activity of the hands, then give me a sign of it, that I may persevere and increase in the depth of my homage while life shall last.' 7.\n\nFor the struggle, though not without signs of a favourable issue, was far from over yet.\n\n(Hence his misgivings.) He then asks with some wistfulness after the 'ar(e)drâ,' the men that could help, who from the experience of the grace of God, could turn sorrow into blessing by establishing the holy religious system firmly, but with enlarged and not narrowed understanding.\n\nAnd, still a little dispirited, he declares, as so often: 'None have I other than You; therefore I can wait for the ar(e)drâ.\n\nDo ye save us alone by Your already offered means of grace.' 8.\n\n'For Ye have given me already, as it were, a sign.\n\nThe enemy are checked, and for the moment cowed, if they are not repelled.\n\nThey among whom there was death for so many when they had the upper hand, and when their ruler persecuted the holy vows are not only struck with terror by the action which we take, but their chief retribution is, as we hold it, spiritual, and therefore, in the eye of truth the more severe.\n\nThey will not encourage righteous Order and righteous intentions, and accordingly, the personified Good Intention, grieved, will depart from them.' 9.\n\n'Yea,' he reiterates, amplifying, 'the unfortunate sinners who depart from Thy kindly and sacred Piety in this ignorance of all experience of Thy Good Mind, will suffer an equal desertion.\n\nThe characteristics of righteousness will, in their turn, avoid them as the unclean creatures flee from us.' 10.\n\n'And this is,' thus he continues, 'a sign or result which the All-wise declares to me to steady my soul as I waver.' 'And these are indeed the cheering proofs of Thy favour,' he adds, addressing Ahura, 'which terrify our enemies p.\n\n82 and advance us, giving us a righteous eminence (XXXIII, 14) in Thy Kingdom.' 11.\n\n'Therefore that kindly Piety whom these desert in their judicial ignorance, will increase for us both the all-comprehensive blessings; spiritual Deathlessness begun in anticipation here, and its necessary condition, Welfare.\n\nAnd they shall be increased as food (sic) for Mazda's straitened people, or better, to His glory as their monarch.\n\nAnd by their means Ahura may defend Himself efficiently from the persecuting and idolatrous foe.' 12.\n\nTaking into consideration all that depends on a correct understanding as to religious and political duties, he fervently prays to be guided aright in the establishment of a ceremonial and of praises, beseeching Mazda to speak, declaring the kind of worship which may secure the ashis (which are the blessed rewards).\n\nAnd he asks to be taught those religious paths about which no error was possible, the paths which are the Good Mind's own.\n\n13.\n\nAfter a fashion already known to us (as in XXIX), he answers his question himself.\n\nThat way which Ahura had already revealed as the Good Mind's own, was made up of the revealed precepts of the Saoshya n ts.\n\nThere, as in the paths where Ahura dwells (XXXIII, 5; XLVI, 16), the well-doer may prosper from his devotion to the religious truths, and gain a reward immediately from the hand of God.\n\n14."

