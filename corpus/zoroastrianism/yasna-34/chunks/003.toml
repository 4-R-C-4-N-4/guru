[content]
body = "As if never forgetting the original calamity, the woes of the Kine, he further declares that way to be the one of all to be chosen for this earthly life, as the vestibule to the heavenly one.\n\nAnd he asserts that they who toil for the Kine (who represents here, as generally, the holy settlements as well as their chief source of riches and support) are striving to further and demonstrate the wisdom of that way by every righteous contrivance.\n\nNay, he declares that the deeds of Piety are themselves the highest wisdom, just as the words and righteous actions of the Saoshya n ts not only declare and make, but constitute, 'the way.' 15.\n\nAgain, concluding with a climacteric and synoptical prayer, he beseeches Ahura to speak and reveal to him all the most available statements, ceremonies, and praises.\n\nAnd never forgetting that all ceremonies, hymns, and sacrifices, sacred as they are, are only means to a greater end; he prays the Deity that He may exert that Sovereign Power which is alone supremely efficient in relieving actual distress (LIII, 9), for by its holy laws and spiritual arms it can alone bring on the Frashakar d , and produce that condition in society in which all human progress shall have become complete.\n\np.\n\n83 Translation.\n\n1.\n\nAs to those (three gifts of blessings), Immortality, the Righteous Order, and the (established) Kingdom of Welfare, which Thou, O Mazda!\n\nhast given through (holy) deeds, words, and the sacrifice unto these (Thy servants here in my sight 1 ), gifts (shall) be offered 2 by us in return to Thee, O Ahura!\n\nand with the foremost of them all.\n\n2.\n\nYea, and all those gifts of the Good Spirit 3 have been given (back in gratitude) to Thee by the mind and the deed of the bountiful man, whose soul goes hand in hand 4 with the Righteous Order in the settlement, in homage toward the One like You 5 , p.\n\n84 [paragraph continues] O Mazda!\n\nand with the chants of the (thankful) praisers 1 .\n\n3.\n\nAnd unto Thee, O Ahura!\n\nwill we offer the (thankful) meat-offering with self-humbling praise, and to Thy Righteousness (like Thee a person), and for all the settlements in Thy kingdom which are guarded 2 by Thy Good Mind.\n\nFor in the perfect preparation of the justly acting (has that offering its power), O Mazda!\n\ntogether with all (others of its kind).\n\nAmong those like You and worthy of Yourselves, it is a blessing 3 .\n\n4.\n\nAnd we pray likewise for Thy Fire, O Ahura!\n\nstrong through Righteousness (as it is), most swift, (most) powerful, to the house with joy receiving it, in many wonderful ways our help, but to the hater, O Mazda!\n\nit is a steadfast 4 harm as if with weapons hurled from the hands 5 .\n\np.\n\n85 5.\n\nWhat is 1 then Your Kingdom, O Mazda?\n\nWhat are Your riches?\n\nthat I may become 2 Your own in my actions, with the Righteous Order, and (Thy) Good Mind, to care for Your poor (in their suffering 3 ).\n\nApart from all would we declare You, yea, apart from Daêvas 4 , and Khrafstra-polluted mortals!\n\np.\n\n86 6.\n\nIf thus Ye are in verity, O Mazda!"

