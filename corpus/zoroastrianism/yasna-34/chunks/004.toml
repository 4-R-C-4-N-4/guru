[content]
body = "with the Righteous Order and Thy Good Mind, then grant Ye me a sign 1 of this in this world's entire abiding 2 (while I live amid its scenes), how offering sacrifice and praising 3 You the more devoutly 4 , I may approach You (in my worship)!\n\n7.\n\nWhere 5 are Thine offerers, O Mazda!\n\nThy helpers, who as the enlightened of the Good Mind are producing the doctrines with wide mental light as inherited treasures, (delivering them as Thy word) in misfortune and in woe 6 ?\n\nI know none other than You; then do Ye save us through Your righteousness!\n\n8.\n\nThrough these our deeds (of sacrifice and zeal 7 ), they are terrified 8 among whom there was (once) destruction, and for many (at the time) when the p.\n\n87 oppressor of Thy holy vows was as the stronger oppressing the weaker 1 .\n\nThey who have not thought (in consonance) with Thy Righteous Order, from these Thy Good Mind 2 abideth afar.\n\n9.\n\nAye, they who desert Thy bountiful Piety, O Mazda!\n\nthat one desired of Thee 3 , O Thou omniscient!\n\nand who thus abandon her by reason of the evil-doer, and in their ignorance of (Thy) Good Mind, from such as these (Âramaiti) with her holiness utterly departs 4 as the red Khrafstras (who destroy and pollute all life, flee) from us 5 (Thy faithful servants).\n\n10.\n\nThrough the action of this (His) Good Mind (as he works his grace within us) the benevolently wise 6 One declared a result as its fruit, He knowing the bountiful Piety, the creatrix of righteous beings 7 .\n\nThese all, O Mazda Ahura!\n\nin Thy Kingdom (are p.\n\n88 [paragraph continues] 'helps to our progress') for they smite (our tyrants) with fear 1 .\n\n11.\n\nAnd for Thee hath Âramaiti (who is Our Piety) increased both the Universal Weal and (its continuance in) Immortality, and (with them as ever united) the Righteous (ritual and moral) Order (established and made firm) in the Kingdom of (Thy Good Mind).\n\nThose powerful lasting two (hath she increased) to (give us the needful) food 2 .\n\nAnd through these, O Mazda!\n\nart Thou with Thy perfect expellers of hate 3 .\n\n(Thou removest Thy foes afar 4 !) 12.\n\nWhat then are Thy regulations 5 ?\n\nAnd what wilt Thou?\n\nWhat of praise, or of (fuller) offering?\n\nSpeak forth that we hear it, O Mazda!\n\nwhat will establish the blessed rewards of Thine ordinance 6 !\n\np.\n\n89 [paragraph continues] Teach Thou us the paths through Righteousness, those verily trod by (Thy) Good Mind 1 as he lives within Thy saints 2 .\n\n13.\n\n(Do I ask what is that path?) That way which Thou declarest to me as the path of the Good Mind, O Ahura!\n\n(is made 3 in its parts by) the religious precepts and laws of the Saviours, wherein the well-doer thrives 4 from (his) Righteousness 5 .\n\nAnd it marks for the good a reward of which Thou art Thyself the bestower.\n\n14.\n\nFor that (reward), O Mazda!\n\nye have given as the one to be chosen for (our) bodily 6 life through p.\n\n90 the deeds of Thy Good Mind (in us).\n\nThey who work in the toil of the mother 1 ."

