[content]
body = "45:5 Observe that this cow (some would say 'ox') chooses her master, unlike other cattle.\n\nBut observe also, what is more interesting, that she seems reconciled to the guardian appointed by Ahura.\n\nIn Y.\n\nXXIX, 9, she actually 'wept' at the naming of the pusillanimous Zarathu s tra, desiring a kingly potentate.\n\nNow, however, we see that she must have dried her tears, as she is satisfied with the simple workman whom he represents notwithstanding high rank.\n\n45:6 In the later Avesta this first vâstrya f s uya n t is declared to be Zarathu s tra.\n\n45:7 Mûn f s uîh pavan Vohûmanŏ.\n\n46:1 Pahlavi davãsaha k ; Ner.\n\npratârayitre.\n\n46:2 Khûpŏ-hôshmûri s nîh.\n\n'Judicial blindness' is everywhere indicated.\n\n(The wicked are kept from the sight of the truth.) Hübschm., Casuslehre, 'der frohen Botschaft.' 46:3 This seems implied.\n\n46:4 Or, 'madest the worlds and the souls (?).' 46:5 Geldner admirably 'flesh.' The Pahlavi: tanû-hômandânŏ g ân yehabûn d .\n\nNotice that 'bodily life or flesh' is mentioned after 'understanding.' Compare Y.\n\nXXX, 7, where Âramaiti gives 'a body' after previous creations.\n\n46:6 The Pahlavi has the following interesting gloss: [That is, even the actions and teachings of the pious are given forth by thee; and this was also given in this wisdom of thy mind].\n\nAnd when there is a person in whom there is a desire for the other world, that desire is granted to him by thee; [that is, what is necessary when he is arriving in the other world, this which is thus required (or desired) by him at that time, is given by thee—through that which is thy mind and wisdom].\n\nAlthough not able to follow the indications of the Pahlavi fully, I think that there is no question but that we have an important statement in the last line.\n\nIt does not seem to me possible to render less profoundly than 'where the wisher may place his choices,' his religious preferences and beliefs, including all moral volition.\n\n47:1 Avŏ zak libbemman.\n\n47:2 See verse 13.\n\n47:3 Pavan ha g i s nŏ î: the Persian MS.\n\n(Haug XII, b) transliterates khêzi s nŏ: Ner.\n\nhas mano-utthânena (sic).\n\nOr, 'immediately.' 47:4 The evil as well as the good spirit is questioned.\n\nThe two spirits of Y.\n\nXXX, 3-6 were here inspiring the conflict.\n\n47:5 The Pahlavi unvaryingly in the sense of mihânŏ [-a s gâs tamman yehevûnê d ŏ]; Ner.\n\nparalokanivâsân.\n\nSee Y.\n\nXXX, 9; XXXIII, 9; XXXIV, 6.\n\nA questioning which was lightly made would indicate a willingness to tamper with error.\n\nThe Persian MS.\n\nfollowing the Pahlavi has: An g a bang i buland ân i durû gh guftâr [Ganâ Mînû] wa ân ham i râst guftâr [Hôrmuzd], &c."

