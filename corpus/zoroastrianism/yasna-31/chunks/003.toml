[content]
body = "See XLV, 2.) 13.\n\nThe composer is still more reanimated by the certainty that Ahura is gazing into the depths of all questions, trivial and profound; which is to say that he observes most closely the men who are discussing them.\n\nAnd he declares that he also sees the cruel injustice of the punishments which the tyrants visit upon the smallest offences, as well as the more flagrant wickedness of those who persecute his adherents without even a pretence of justice.\n\n14.\n\nAs he recalls the divine forecasting omniscience, he asks Ahura once more concerning the future which was close at hand with its portentous events.\n\nAnd he inquires as to the nature of the veritable and not iniquitous confessions, which were properly due to p.\n\n39 be made by the righteous believer in order to avert the impending calamities, and secure the upper hand in the struggle for the throne.\n\nAnd he inquires also as to the proper expiatory prayers which were to be offered by the believer.\n\nHe does not however fail to inquire analogously concerning the wicked, nor to ask how they, as well as the righteous, shall be situated in the final consummation.\n\n15.\n\nParticularising as to the latter, he asks what shall be the punishment for those who succeed in installing an evil monarch, one of the Daêva-party, a prince who cannot exist without the ruthless persecution of the pious husbandman, who repudiates the Lie-demon presiding over the counsels and efforts of the opposing religion.\n\n16.\n\nHe further asks how and by what actions the wise man may become like Ahura, or his faithful adherent, the expressions used implying deep religious feeling.\n\n17.\n\nStriving to arouse the perceptions of his hearers, he inquires as to which one of the two parties holds to the greater or more important religion, the disciple of Asha, the personified Righteous Order Ahura's immediate creature (see above), or the opponent.\n\nAnd he prays that no blind guide may deceive him, or those who belong to him, 'but that the enlightened, yea, even Ahura Himself, may speak to him, and become the indicator and demonstrator of the truth.' 18.\n\nClosing this address to the Deity, he turns to the congregation, vehemently forbidding them to listen to the doctrines of his opponents, warning them against the ruin and death which would ensue, and fiercely appealing to the sword.\n\n19.\n\nOnce more addressing Ahura, he prays that they may on the contrary listen to Him who has power to vindicate the conscientious Zarathu s trian, inculcating veracity upon him, and encouraging him in its practice; and this by means of the holy sacrifice, or ordeal of the Fire.\n\n20.\n\nHe solemnly warns those who would seduce the righteous of their ultimate fate, and adds that their sorrows will be self-induced, if they persevere in their hostility.\n\nTheir own consciences (as we see from Ya s t XXII) would not only bring on their ruin, but would form a part of their punishment.\n\n21.\n\nOn the other hand, happiness and immortality will be the lot of the faithful.\n\nAnd these 'eternal two' will be given to them, accompanied by the fulness of Righteousness, and the exuberant vigour of the Good and Kindly Mind within them and bestowing its blessings upon them.\n\np.\n\n40 22.\n\nIn conclusion he apostrophises the manifest certainty of the truths which he declares, and, addressing Ahura, animates the faithful not merely with the hope of the objective recompense, but with the prospect of being efficient as servants of God.\n\nTranslation.\n\n1."

