[content]
body = "XXX, 10.) 42:3 Roth, rendering ishasâ in accordance with the Pahlavi, 'erbitte ich.' 42:4 Mûn pavan zak î valman gûrdîh—khûshî d ŏ Drû g ŏ aê sufficiently indicates the proper sense.\n\nRoth, 'kraft deren wir den Unhold bemeistern mögen.' 42:5 The Pahlavi may he rendered thus: Since in that dispensation [in the final body], I shall be an invoker of Ashavahi s t, and of Aûharmazd also [ ]; and of her who is veneration 'Spendarmad' [ ], I desire [that best of things which is the reward], of Vohûman.\n\nLet also that authority which belongs to my people [ ] be from the strong one [ ] by whose fortitude [ ] the Drû g is overcome [ ].\n\n42:6 Literally, 'Ye gave.' 42:7 I am far from sure that the indication of the Pahlavi is not correct here.\n\nAccording to it, when properly understood, we have here an accusative with the infinitive; 'that I should establish.' Its own translation is however avŏ li yehabûnâi.\n\nMe n = man or mãm; e n (g) = ã the nasal vowel.\n\nThe Pahl.\n\ntranslator recognises m e n elsewhere as = mîni s nŏ.\n\nIt was from no ignorance (!) of the particular word that he wrote 'li' here.\n\n42:8 Or 'my prophet;' comp.\n\nri shi; that is, 'that with which my prophet is concerned.' 43:1 Or, possibly, 'which shall not be, or which shall be.' Is the subjunctive here used to express obligation?\n\nRoth has 'was nicht sein soll oder was sein soll.' Ner.\n\nmay be rendered as follows: Tell it to me distinctly [ ], that which is the highest gift, and which is given to me through sanctity; [that is, because duty and righteousness are fulfilled by me, the best gift of thy reward (is gained) by this means; but how is it possible to make it (actually) one's own?].\n\nGrant me the knowledge through the best mind; [that is, declare that intelligence to me which comes through good conduct], and by which also safety is (secured) to me [ ].\n\nAnd declare either that which is not, or that which is, O Great Wise One, the Lord!\n\n[ ].\n\n43:2 An interval of silence seems here to intervene, or lost verses leave an unexplained transition.\n\nThe sage turns again to the people.\n\n43:3 Vao k â t K4 (Barth.).\n\n43:4 See verse 4.\n\n43:5 The Pahlavi has Aûharmazd având (sic) khû d âyîh k and dên valman vakhshê d Vohûmanŏ.\n\n43:6 The Parsi-persian MS.\n\nis as follows: Û hast buland, kih ân man âgahîhâ (sic) gû-î â s kârah [ ] mânsar i tamâm raftanî; [kû, tamâm pêdâi s n pah râh i mânsar bâz ân ‘hwê s î i Hôrmuzd rasêd], kih pah Ṣawâb dârad—bî-marg raftanî aza s [ ]."

