body = "The Parsi-persian MS.: Wa ma kas aêdûn az s umâ kih û p.\n\n51 darwand mânsar s unawad wa âmû‘hti s n (sic); [kû az Â s môkân (?) Awestâ wa Zand ma s unawad], k ih andar—ma h all s ahar wa deh dehad bad-rafti s n wa marg an i Â s mô gh ; aêdûn (sic) ô s ân Â s mô gh ân râ sâzad silâ h .\n\n(Again very close.) 51:1 So conjecturally.\n\n51:2 Compare chap.\n\nXXX, 2.\n\n'Behold ye the flames with the better mind;' possibly, also chap.\n\nXXX, 1, the signs in the lights seen friendly.' 51:3 According to the grammatical forms the agent here must be a divine being, as y e ma n ta ashem ahûbi s (see verse 7) is characteristic of the Deity.\n\nThe vocative, strange as it may seem, does not necessarily exclude Ahura, as the subject referred to in y e .\n\nSeveral analogous cases occur.\n\nThe Deity may here however represent His prophet, as the Daêvas do their worshippers in the later Avesta.\n\nSome writers force the language into a reference to the human subject for the sake of the greatly to be desired simplicity.\n\nOne places Ahurâ in the instrumental, a case in which the Almighty seldom appears.\n\nThe above translation needs no alternative, as the language would be the same whoever y e refers to.\n\n51:4 See note on verse 3, and read as alternative 'from the two ara n i.' As an inferior rendering of tradition I cite Neryosangh here: The matter should be heard (taking gûshtâ as a third singular in a subjunctive sense); [that is, a study should be made of it by him] who is even (in any degree) acquainted with the righteous design of Hormi g da for both the worlds.\n\nHe is independent in the literal truth of his words, in his freedom of speech, [and his fear has no existence].\n\nThy brilliant fire gives the explanation to the contenders.\n\n[It makes purity and impurity evident.] 52:1 I follow the admirable lead of the Pahlavi here, as the previous verse mentions veracity.\n\nIts indication is pavan frîfi s nŏ, freely.\n\n52:2 I differ with diffidence from the hint of the Pahlavi here (as elsewhere).\n\nIt has shîvan = tears, which however is free for 'calamity' and 'sorrow.' Nom.\n\nsing.; see its position.\n\n52:3 Anâk rûbi s nîh yemalelûnê d ŏ.\n\nThis, placed together with such passages as XLVI, 11, XLIX, 11, and LI, 13, formed the basis for the more complete Ya s t XXII.\n\n52:4 Others prefer 'place,' but see âyû in line b.\n\n52:5 'Has led on'?\n\n52:6 I cite Ner.: He who betrays the pure through his fraud, may (deceit) be (also his portion) at the last; [that is, let it be so afterwards; it is in his soul].\n\nLong is his journey, and his arrival is in darkness; and evil food and increasing lawlessness is his [ ].\n\nDarkness is your world, O ye wicked!\n\nyour in-bred deeds, and your dîn, are leading you on.\n\n52:7 That Ameretatâ t means more than long life is clear from amesha."

