body = "But on the whole agushtâ seems better in its ordinary sense, although in so rendering we are obliged to supply a word.\n\n40:2 Valman s ân mûn pavan âfrîngânîh î Drû g zak î Aharâyîh gêhân barâ, maren k înên d .\n\n40:3 The Pahlavi may be rendered as follows: Both these benedictions, which I (we) recite as yours [the Avesta and Zand], we are teaching by word to him who is no hearer, [to the destroyer of sanctity (the heretical persecutor) [ ]].\n\nThose who utterly slay the world of righteousness through the benedictions of the Drû g [ ], even those might be an excellent thing, if they would cause progress in what belongs to Aûharmazd.\n\n40:4 Read perhaps advayâo; see the Pahlavi.\n\nOtherwise 'the way' advâo as panthâs; but the participle * does not agree.\n\nCompare for meaning kavím ádvayantam, sákhâ ádvayâs.* 40:5 The Pahlavi renders 'in the soul' freely by 'believes:' Pavan nikîri s nŏ la hêmnunê d ŏ a s pavan zak î agûmânîkîh.\n\nThe general indications are to be observed.\n\n40:* Is it a loc.?\n\n41:1 Comp.\n\nchap.\n\nXXIX, 2, where the Ratu is discussed; here the word might be the abstract.\n\n41:2 Roth 'dieser beiden Parteien (Yasna XXXI).' 41:3 He repels and condemns the evil, and he hallows and helps the good.\n\n41:4 Most striking is the use of mainyu.\n\nIt is 'the Spirit' = God.\n\nIt is 'His Spirit.' It is also used of man's spirit.\n\n41:5 Or, 'from the two ara n i;' but see ãsayâo in verse 2.\n\nThe Pahlavi translator has avŏ patkâr d ârânŏ shnâkhtârîh; so uniformly.\n\nIn Y.\n\nXLIII, 12, K5 and most MSS., except K4, and likewise excepting the printed B.V.S., read ranôibyô which excludes the dual form; also the fire is not mentioned there.\n\nIt is however far from impossible that the present Pahlavi translation may be a growth beyond an earlier one more in accordance with ara n i.\n\nThe strivers, or fighters, might describe the two rubbing-sticks (?).\n\n41:6 Aîmar (sic), vi g âr d âr.\n\nThis meaning suits the connection admirably.\n\nThe word is otherwise difficult, and this general sense is followed by some who do not so often cite the Pahlavi translator.\n\n41:7 See verse 1.\n\n41:8 Roth, 'wie ich alle lebenden bekehren soll.' So also the general indication of the Pahlavi translator.\n\nPavan hûzvânŏ î Lak—zîvandakân harvist-gûn hêmnund.\n\nObserve that the religious system contemplated universal proselytism.\n\n42:1 The general indications karîtûntâr and bavîhûnam point to the proper sense.\n\n42:2 Or, with Roth, 'wenn wirklich sich rufen lassen die Ahura-Mazdas.' Otherwise, 'O Mazda and the Ahuras.' Hübschmann also maintained that Mazd a u was here a plural; (see his Y."

