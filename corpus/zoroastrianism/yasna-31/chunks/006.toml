body = "49 harm to the tiller's herd, to the pious husbandman's flock, who speaks no word with lying, (who abjures the Lie-demon's faith 1 )?\n\n16.\n\nYea, I would ask Thee such a thing as this: How such an one as he who, with wise action, has striven to promote (Thy holy) Rule 2 over house, and region, and province, in the Righteous Order and in truth, how he may become like Thee 3 , O Great Creator, Living Lord?\n\nAnd when he may so become, (this also I would ask), and in what actions living he may so be 4 ?\n\n17.\n\nAnd which of the (religions) is the greater (and the more prevailing 5 as to these questions which thus concern the soul?) Is it that which the p.\n\n50 righteous believes, or the wicked 1 ?\n\n(Let then our questionings cease.) Let the enlightened (alone) speak to the enlightened.\n\nLet not the ignorant (further) deceive us, (high though he may lift his voice 2 ).\n\nDo Thou thyself, O Ahura Mazda!\n\ndeclare 3 to us (the truth) as Thy Good Mind's full revealer.\n\n18.\n\n(And you, ye assembled throngs!) let not a man of you lend a hearing to Mãthra, or to command of that sinner 4 (ignorant 5 as he is), for home, village, region, and province he would deliver to ruin 6 and death.\n\nBut (fly ye to arms without hearing), and hew ye them all with the halberd 7 !\n\np.\n\n51 19.\n\nLet them hear Him who conceived of the Righteous Order for the worlds, the (all)-wise One, O Ahura!\n\nFor truthful speech He rules with absolute sway over words, and ever free of tongue (to guide us in our way 1 ).\n\nBy Thy shining flame 2 (He doth guide us 3 , Thine altar's flame with its signs of decision and of grace) sent forth for the good of the strivers 4 .\n\n20.\n\n(But, O ye listening men!) he who renders p.\n\n52 the saint deceived 1 , for him shall be later destruction 2 .\n\nLong life shall be his lot in the darkness; foul shall be his food; his speech shall be of the lowest 3 .\n\nAnd this, which is such a life 4 as your own, O ye vile!\n\nyour (perverted) conscience through your own deeds will bring 5 you 6 !\n\n21.\n\nBut Ahura Mazda will give both Universal Weal and Immortality 7 in the fulness of His Righteous Order, and from himself 8 as the head 9 of Dominion (within His saints).\n\nAnd He will likewise give the Good Mind's vigorous might 10 to him who in spirit and deeds is His friend 11 , (and with faith fulfils his vows 12 ) p.\n\n53 22.\n\nAnd to the wise are these things clear as to the one discerning with his mind (not blinded by the perverter 1 ).\n\nWith Thy Good Mind and Thy (holy) Kingdom he follows the Righteous Order both in his words and his actions.\n\nAnd to Thee, O Ahura Mazda!\n\nsuch a man shall be the most helpful and vigorous being 2 (for he serves with every power 3 )!\n\nFootnotes 40:1 Roth, 'wollen wir Worte künden—ungern gehört von denen, welche nach des Unholds Geboten,' &c.\n\nHübschmann preferring 'wir sprechen Worte nicht anhörbar für diejenigen' (Casuslehre, s.\n\n223).\n\nA dative of the pronoun is certainly more natural than the ablative as inst."

