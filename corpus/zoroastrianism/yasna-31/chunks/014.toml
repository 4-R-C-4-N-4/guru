body = "52:8 Afa s naf s man patîh.\n\nThe Gâthic would be more literally perhaps 'from His own Dominion.' 52:9 Sardârîh.\n\n52:10 Vazdvarîh; Ner.\n\npîvaratvam.\n\n52:11 One naturally thinks of urvatha (vratha), as having something of the sense of vratyá.\n\nBut usage compels also the sense of friendship.\n\nHübschmann, Casuslehre, s.\n\n259, 'der durch Gesinnung and Thaten sich ihm als freund erweist.' 52:12 Ner.: Mahâ g ñ âni dadau Svâmî* avirdâdât* an irdâdât sa m pûr n atva m p.\n\n53 pu n yâtmane [ ] ni g a m prabhutva m râ g ñ e* âdhipatyena [ ] uttamena pîvaratva m manasâ [-tasmâi dadate], yo ni g asya adri s yamûrte h karma n â mitra m .\n\n53:1 So according to frequent indications.\n\n53:2 Tanû aîtŏ.\n\nNer.: Sa te—mitram asti nivedîtatanu h .\n\n53:3 See chap.\n\nXXXIII, 14.\n\nThe Pahlavi translator renders freely as follows: Manifest things (so possibly; otherwise 'manifestly') (are) these to (so a MS.\n\nnot yet elsewhere compared) the wise when according to his understanding he disposes and reflects, [that is, he who meditates with thought upon that which his lord and dastur declares to him].\n\nGood is the King for whom they would effect righteousness in word and deed, the man whose body is a bearer of Thee, O Aûharmazd!\n\nNext: Yasna XXXII"

