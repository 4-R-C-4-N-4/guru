body = "Sacred Texts Zoroastrianism Index Previous Next Buy this Book at Amazon.com The Zend Avesta, Part III (SBE31) , L.H.\n\nMills, tr.\n\n[1886], at sacred-texts.com p.\n\n36 YASNA XXXI.\n\nTHE PROGRESS AND STRUGGLES OF THE CAUSE.\n\nThis composition differs from that in XXX as descending from the more general to the particular, and from the doctrinal to the practical.\n\nOne might even trace an immediate connection, urvâtâ occurring in the last verse of the one and in the first of the other.\n\nIt is, of course, very possible that the verses before us are only a remnant of those which originally constituted the piece, and here and there one may have been interpolated from other scriptures.\n\nSome writers prefer to assume a loss of the original text or an addition to it at the smallest change of tone, and to assume also a change of subject with it.\n\nI do not regard it as very useful to lay too much stress upon these occurrences.\n\nWhether caused by gaps or interpolations, they do not at all affect the fact that the subject-matter is homogeneous and contemporaneous; and, probably, like many more modern compositions, the verses gain in rhetorical effect by being weeded of repetitions.\n\nWe might divide as follows 1, 2, an address to the congregation to be connected with XXX as its concluding words; 3-5, an address to Ahura; 6, an address to the faithful; 7-17, to Ahura; 18, to the congregation; 19, to Ahura; 20, 21, to the congregation; 22, an addition.\n\nTreating the section then as containing homogeneous matter which combines well into a unit, I proceed as follows.\n\nThe sage chants his hymn in the presence of the multitude as before.\n\n1.\n\nHe declares that while he is reciting things unwillingly heard by the hostile party, those same truths are valued as the best of existing things by those who are sincerely devoted to Mazda, their good disposition quickening their perception.\n\n2.\n\nHe then declares that if the truths of the holy Religion are not yet clearly seen by the instrumentalities provided, he will approach them still more effectively in accordance with the especial regulation of the spiritual chieftainship, which Ahura Mazda had prepared in response to the lament of the soul of the Kine; i.e.\n\nof the Iranian herds and people possibly as representing the entire holy, or clean, creation upon earth.\n\nAnd he further asserts that this regulation concerns the struggle of the two parties, and will bring the cause of the Righteous Order to a successful issue.\n\n3.\n\nChanging his address to Ahura, he proceeds to pray at once p.\n\n37 for that satisfying decision which would be the natural result of the regulation just promised, and which could be given by the instrumentality of the Sacred Fire and holy ritual, affording mental keenness to the two contending parties.\n\nAnd he declares that this is the doctrine which should be proclaimed for the conversion of mankind.\n\nHere we observe that the Zarathu s trian Mazda-worship was aggressive and missionary in its spirit, and in a proselyting sense by no means indifferent to the final destiny of the Gentile world.\n\n(The later and traditional system announced indeed the restoration and so the conversion of all men, and that not as an object proposed to the efforts of charity, but as a necessary result (so by inference; see Bundahi s (West), pp.\n\n126, 129).\n\nI can find no trace of this in the Gâthas.\n\nHere we have only the effort to convert.) 4."

