[content]
body = "Hôrmuzd—‘hudâî k and andar û afzayêd Bahman [Kû s pâdi s âhî pah tan i mard— k andî (?) Hôrmuzd pah tan mihmân].\n\n44:1 Mûna s avŏ rôshanîh gâmîkhtŏ khvârîh.\n\nH v âthrâ and khvârîh can hardly mean 'comfortable' here.\n\n'Ease' is the later sense.\n\n44:2 Rao k e bî s certainly means, with illuminating objects, stars or shining lights.\n\n44:3 Hübschmann, 'der Schöpfer des Asha.'—Casuslehre, s.\n\n190.\n\n44:4 Pavan mînavadîkih vakhshînê d [ ] mûn kevani k ham khû d âî.\n\n44:5 Compare the frequent expression 'spentem a t Th###vâ me N hî,' in chap.\n\nXLIII.\n\n44:6 Roth, 'vornehmsten.' 44:7 When I seized Thee (took Thee in) with my eye.\n\nThe Pahlavi: Amatam [ ] pavan ham k ashmîh avŏ ham vakhdûn d hômanih.\n\n44:8 Dên ahvânŏ pavan kûni s nŏ khû d âî hômanih.\n\nNer.\n\nmay be rendered as follows: Thus thou wert thought at the first by me, O Great Wise One, the Lord!\n\nwhen thou wert engaged in the production of Gvahmana [ ].\n\nIn which (production) they apprehend the father of the Best Mind when they observe him with a full-faced look [ ].\n\n(And thou art the father) of that creation which is manifestly righteous; [that is, thou makest the purer creation good in conduct].\n\nThou art a King in the world as to action; [that is, where it is fitting to confer a benefit, and also where it is fitting to inflict a punishment, in each of these thou art capable].\n\n45:1 His spe n ta mainyu; otherwise 'spiritual (understanding),' but mainyu is used elsewhere (verse 3 and 7) alone, and certainly not as an adjective even with a substantive understood.\n\nThe rendering 'spirit' as 'Thy spirit' is suspiciously significant; but what is the help?\n\nWe are forced by grammar so to translate.\n\n45:2 The ablative has this force as in Ashâ t ha k â.\n\n45:3 I can hardly accede to an infinitive here: -tê is a rare infinitive termination in Gâthic.\n\nAlso the infinitive seldom falls to the end of the sentence.\n\nThe Pahlavi has yâtûnê d , a present; but the Pahlavi should never be positively cited for the forms, as it is free.\n\n45:4 Observe that we are forced by every dictate of logic and common sense to avoid the commonplace rendering here.\n\nCattle do not have 'paths' made for them, nor do they cry aloud for an overseer, or complain at the appointment of one who does not appear to them promising; nor is it one main effort of religion 'to content the soul of cattle.' Cattle, as the chief article of wealth, are taken to signify all civic life.\n\nThe 'path' is the path for the people to walk in, securing safety for soul and life and herds.\n\nThe adhvan is 'the way' which 'is the religious characteristics and teachings of the prophets' (XXXIV, 13)."

