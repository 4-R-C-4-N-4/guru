body = "as the one to be adored with the mind in the creation, as the Father of the Good Mind within us, when I beheld Thee 7 with my (enlightened) eyes as the veritable maker of our Righteousness, as the Lord of the actions of life 8 !\n\n9.\n\nThine, O Ahura!\n\nwas Piety; yea, Thine, O Creator of the Kine!\n\nwas understanding and the p.\n\n45 [paragraph continues] Spirit 1 , when Thou didst order a path for her (guiding).\n\nFrom the earth's tiller (aided 2 ) she goeth 3 (in that allotted way), or from him who was never tiller.\n\n(Thy path hath given her choice 4 .) 10.\n\n(But she did not pause in temptation.) Of the two she chose 5 the husbandman, the thrifty toiler in the fields 6 , as a holy master endowed with the Good Mind's wealth 7 .\n\nNever, Mazda!\n\nshall p.\n\n46 the thieving 1 nomad share the good creed 2 .\n\n(For the Kine's choice would bestow it 3 !) 11.\n\n(And this doctrine was the first of rules to regulate our actions.\n\nYet the opposer speaks beside Thee.) For when first, O Ahura Mazda!\n\nThou didst create the (holy) settlements, and didst reveal the religious laws 4 ; and when Thou gavest (us) understanding from Thine own mind, and madest our (full) bodily life 5 , and (didst thus determine) actions (by Thy power), and didst moreover deliver to us (nearer) injunctions whereby (as by a rule) the wisher may place his choices 6 , 12.\n\n(There strife at once arose, and still is raging.) There (beside Thy prophet) the truthful or liar, the enlightened or unenlightened, lifts his voice (to utter p.\n\n47 his faith), and with devoted mind and heart 1 .\n\n(But without hindrance from this striving, or pausing with feeble search 2 , our) Piety steadily 3 questions the two spirits 4 (not here on earth) but (there in the spirit-world) where (they dwell as) in their home 5 .\n\n13.\n\n(Yea, my Piety questions searchingly, for Thou, O Maker!\n\nhast Thy view on all; we cannot question lightly.) What questions are asked which are open 6 (permitted to our thoughts), or what questions (are asked) which are furtive 7 (hiding themselves from the light), or (what decision soever we may make, and the man) who for the smallest sin binds on the heaviest penance, on all 8 with Thy glittering eye(s) as a righteous guard Thou art gazing 9 !\n\np.\n\n48 14.\n\nThis then I will ask Thee, O Ahura Mazda!\n\n(as I seek Thy counsel once again 1 ).\n\nWhat events are coming now, and what events shall come in the future 2 ; and what prayers with debt-confessions 3 are offered with 4 the offerings of the holy?\n\nAnd what (are the awards) for the wicked?\n\nAnd how shall they be in the (final) state 5 of completion 6 ?\n\n15.\n\nAnd I would ask Thee this, O Mazda!\n\n(concerning the coadjutor of the wicked): What is the award 7 for him who prepares the throne 8 for the evil, for the evil-doer 9 , O Ahura!\n\nfor him who cannot else reclaim 10 his life, not else save 11 with lawless p."

