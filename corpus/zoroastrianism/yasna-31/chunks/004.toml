[content]
body = "These doctrines (therefore) we are earnestly declaring to You as we recite them forth from memory, words (till now) unheard 1 (with faith) by those who by means of the doctrinal vows 2 of the harmful Lie are delivering the settlements of Righteousness to death, but words which are of the best unto those who are heartily devoted to Ahura 3 .\n\n2.\n\nAnd if by this means the indubitable truths 4 are not seen in the soul 5 , then as better (than these words) I will come to you all (in my person) with p.\n\n41 that power, and in that way according to which Ahura Mazda knows and appoints His ruler 1 , that ruler over both the two (struggling) bands 2 , in order that we (in obedience to him), may live according to Righteousness 3 .\n\n3.\n\nAnd that keenness, that deciding satisfaction, which Thou hast given by (Thy) Spirit 4 , and (Thy) Fire, and by Thy Righteousness (itself) to the two battling 5 (sides), do Thou declare unto us, O Ahura!\n\nthat vow which is for the seeing 6 (as those endowed with mental light).\n\nYea, do Thou declare this that we may know it, O Mazda!\n\nWith the tongue of Thy mouth do Thou speak it (that as I preach its mighty truths 7 ) I may make all the living believers 8 !\n\np.\n\n42 4.\n\nAnd when the Divine Righteousness shall be inclined to my appeal 1 , and with him all those (remaining ones who are as) Mazda's 2 (own) Ahuras then with the blessedness (of the reward), with (my) Piety and with Thy Best Mind (active within me), I will pray 3 for that mighty Kingdom by whose force 4 we may smite the Lie-demon 5 .\n\n5.\n\nAye, do Thou tell me that I may discern it, since through (Thy) Righteous Order the better (lot) is 6 given; tell me this that I may know it with (Thy) Good Mind (as it speaks within me), and that I may ponder 7 that to which these my truths 8 belong (and p.\n\n43 of which my prophet speaks; yea), tell me those things, O Mazda Ahura!\n\nwhich may not be, and which may be 1 .\n\n6 2 .\n\nAnd that verily shall be the best of all words to Him which the All-(wise one) will 3 declare to me in very deed, that word which is the Mãthra of Welfare and of Immortality (for it proclaims His beneficent power).\n\nAnd to the Great Creator (shall there be) a Realm such as that (whose strength I asked for victory 4 ), and which (at the last) shall flourish 5 in its holiness to His (glory 6 )!\n\n7.\n\n(For He has sovereign control.) He who conceived of these (truths of the Mãthra) as their first (inspirer), (and as He thought their existence they p.\n\n44 [paragraph continues] (all) as (His) glorious 1 (conceptions first) clothed themselves in the stars 2 ), He is through His understanding the Creator 3 of the Righteous Order.\n\nAnd thus likewise He supports His Beneficent Mind (in His saints).\n\nAnd these (holy creatures) may’st Thou cause to prosper by Thy Spirit (since they are Thine own), O Ahura Mazda!\n\nThou who art for every hour the same 4 !\n\n8.\n\nTherefore 5 , as the first 6 did I conceive of Thee, O Ahura Mazda!"

