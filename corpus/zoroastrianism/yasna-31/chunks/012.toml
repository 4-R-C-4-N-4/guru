body = "In another place, he renders vi g î d min; (see XLVII, 5.) 49:1 Neryosangh may be rendered as follows: Thus I ask thee: What is for him who seizes upon destruction, and who provides the sovereignty for the wicked [ ], and commits that evil action.\n\nO Lord!\n\nfrom which he does not acquire life even through a bribe* (so meaning), [ ] and who is a calamity to the man who acts for herds and men removing calamities from them [ ]?\n\n49:2 Roth, 'der die Herrschaft über Hof Gau and Land um das rechte zu fördern hat.' 49:3 Pahlavi, Lak hâvand; Neryosangh, tvattulyo; Roth, 'deiner werth.' 49:4 I render the Sanskrit of Neryosangh thus (it improves on the Pahlavi): I ask (thee) thus: How [dost thou bestow] the sovereignty upon one when he is beneficently wise?\n\n[ ] (in the body) of him who, through the increase of sanctity, is no opposer (of prosperity) in provinces or villages; [that is, with him who is discharging his duty and performing acts of sanctity.\n\nHe is this teacher's teacher, he does not contend].\n\nThine equal, O Great Wise One, the Lord!\n\nthus is he verily, who (is such) in action, [who is thus Thine equal through activity].\n\n49:5 Possibly mazyô has the sense of mazi s ta in chap.\n\nL, 1.\n\nThere 'the most prevailing' seems to be the proper rendering.\n\n50:1 Literally, 'Which of the two (creeds as) the greater does the righteous (the believing saint) or the wicked (opponent) believe?' 50:2 See verse 12.\n\n50:3 Or with others 'be Thou'; but the gloss of the Pahlavi translation contains an explanation which may well afford the true solution as in so many instances in which he is both consciously and inadvertently followed.\n\nIt reads [aîghmânŏ barâ khavîtûnînŏ—].\n\nMay we not see an az = ah in the form, or at least a separate Iranian root, as also in azdâ (L, r), where the Pahlavi translator gives the same explanation admirably suited to the context.\n\nNeryosangh: Which is it, the pure of soul, or the wicked who teaches as the great one?\n\n[ ] The intelligent speaks to the intelligent [ ].\n\nBe not thou ignorant after this; because (ignorance is) from the deceiver.\n\nInstruct us, O Great Wise One, the Lord!\n\n[ ] Furnish us with a sign through the Best Mind; [that is, make me steadfast in good conduct through the recognition of the dîn].\n\nSuch renderings may suffice to show that an examination of these ancient translations in our search for hints is imperative.\n\nYet the practice prevails of omitting a knowledge of the Pahlavi language, on which not only the oldest translation of the Avesta, but also the irregular Sanskrit of Neryosangh, closely depends.\n\n50:4 Jolly, 'Keiner von euch höre auf die Lieder and Gebote des Lügners.' Roth, 'Rath and Befehle.' 50:5 Compare evîdvâo in verse 17.\n\n50:6 Dû s -rûbi s nîh.\n\n50:7 Sazê d sanêh, 'prepare the sabre.' It was however a two-handed weapon; see Y.\n\nLVI, 12, (4 Sp.)."

