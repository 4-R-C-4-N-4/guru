body = "But Neryosangh is more accurate or literal: Atra bumbâm* karoti [antar g agati], mithyâvaktâ vâ satyavaktâ vâ, &c.\n\n47:6 Pavan zak î âshkârakŏ.\n\n47:7 Nîhânîk.\n\n47:8 Thou seest even the questions and decisions of our thoughts as to matters which are simple or difficult, permitted or occult.\n\n47:9 I have not followed what may yet possibly be a valuable and correct hint of tradition.\n\nI render Neryosangh: He who asks through what is open [through righteousness], or he who asks through what is secret [through sin]; or he (also) who through, or on account of, a little sin which has been committed, commits the great one to secure a purification; [that is, who for the sake of purification necessary on account of a little sin which has been committed, commits a greater one, in order that the first may not p.\n\n48 become known], upon these two, each of them, look with thy two eyes.\n\n[Over sins and righteous actions thou art in one way, everywhere and again, the Lord.] The concretes here may give the right indication.\n\n48:1 See verse 5.\n\n48:2 Man madŏ, mûni k yâmtûnê d ŏ, 'What has come?\n\nAnd what is coming?' 48:3 Mûn âvâm.\n\n48:4 Ha k â in the Indian sense.\n\n48:5 Angar d îkîh, the judgment; but Ner.\n\nvipâkatâ, consummation.\n\n48:6 Neryosangh has as follows: Tad dvitaya m tvatta h * pri k kh âmi, Svâmin!\n\nyad âgata m , âyâti k a, yo* ri n am dadate dânebhya h * pu n yâtmane [Hormi g dâya yathâ yu g yate dâtu m ], ye k a, Mahâ g ñ ânin!\n\ndurgatimadbhya h ; katha m teshâ m asti vipâkatâ* eva m [kila, ya h tat kurute, tasmai nidâne prasâdadâna m ki m bhavati, ya s k a tat kurute, tasmai k a ki m bhavatî ’ti; me brûhi!] This seems to me very close, far more so than we have any right to expect as a general rule from a Parsi living in India, and only five or six centuries ago, too late for 'tradition,' and too early for close criticism.\n\n48:7 Roth, 'Ich frage—was die Strafe ist?' 48:8 The head of a party seems to have been plotting to introduce a hostile sovereign.\n\n48:9 Î dû s -kûni s nŏ.\n\n48:10 The Pahlavi translator, nîvîdînê d ŏ, (otherwise nivêkînê d , which I much suspect has become confused with nîvîdînê d ŏ through a clerical blunder); Ner.\n\nlabhate.\n\nThey both refer vînastî to vid (so Justi) followed by most.\n\nRoth (Yasna XXXI, p.\n\n11), 'der sein Brot nicht findet ohne Gewalthat an der Heerde.' 48:11 The Pahlavi translator sees the root han in the sense of p.\n\n49 acquisition, and not from ignorance of the sense given above."

