[content]
body = "Addressing all the Bountiful Immortals, and with the striking title of the Ahuras of Mazda, he prays for the establishment of the 'mighty kingdom' by means of which he might overcome the personified and aggressive falsehood of the opposing and persecuting Daêva-worshippers.\n\n5.\n\nIn order to enable himself to fulfil his mission, he asks for prophetic and judicial knowledge as to what ought to be done, or as to what is about to happen in the immediate future.\n\n6.\n\nHe lauds the Mãthra which we may suppose him to recognise as delivered to him afresh in answer to his prayer for prophetic light, and he praises co-ordinately with the Word of God that Sovereign Authority of Ahura, which was to be established in a kingdom where goodness would increase, and be prosperous, if not predominant.\n\n7.\n\nHe takes the heavenly bodies as evidence of the wisdom of Him who created the Sacred Order personified as the 'Immortal' Asha, and also the Good Mind, his equal.\n\nAnd he ascribes the support and extension of their hallowing influence to Ahura, because He never changes.\n\n8.\n\nHe reiterates, in expressions which form the basis for another hymn, his conception of Mazda as the supreme object of devotion, as the father of the Good Mind personified as His child, as the creator of the Righteous Order, and as both the controller and the judge of human actions.\n\nTherefore the Good Mind and Righteousness are to be worshipped as standing in the closest possible relation to him.\n\n9.\n\nHe ascribes the 'Immortal' Piety to Him as well.\n\nShe is His own, and elsewhere His own daughter.\n\nHe is declared, as in p.\n\n38 chapter XXIX, to be the Creator of the Kine, and of Understanding, (His own intelligence), to guide Him in the disposition of the destiny of the holy Iranian people.\n\nAnd according to it He makes the path for the Kine, which as a matter of course has no meaning as applied to bucolics, but is full of meaning when read in view of the wail of the Kine's Soul in chapter XXIX, and of the intervention of the Deity in her behalf, for He actually appointed Zarathu s tra to meet her necessities.\n\nHe adds, however, that her free choice is not abolished by the construction 'of this path.' It is elsewhere called the 'religion of the Saviour-prophets,' and she is free to proceed in it, guided by the first prophet, the ideal husbandman, or she can follow the profaner nomad.\n\n10.\n\nBut he thankfully exclaims that she does not pause in indecision, nor does she choose perversely.\n\nShe selects the guardian appointed by Ahura, the diligent and pious husbandman, elsewhere identified with Zarathu s tra himself.\n\nHe is rich with the spiritual wealth of the Good Mind; and she rejects in his favour the idle and free-booting nomad, excluding him from all share in the sacred religious system.\n\n11.\n\nThe composer then delineates the struggle which inevitably follows this establishment of the needed means of deliverance.\n\nWhen Mazda has completed the inspiration of doctrines, teaching whither the one endowed with free volition (like the Kine [verse 9]) should direct his choice in action (12), there upon the spot, as it were, the ignorant Daêva-worshipper makes himself heard beside God's spokesman.\n\nBut the prophet is consoled by the reflection that the pious mind will not question the evil Spirit, or the good Spirit superficially.\n\nIt searches both the Spirits, questioning them, as it were, in their very home.\n\n(Hence it is that Ahura speaks so fully concerning Angra Mainyu, delineating his opposition to Him in extended detail."

