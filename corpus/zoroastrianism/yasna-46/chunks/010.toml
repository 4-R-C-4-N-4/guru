[content]
body = "140:4 'Go forth.' 140:5 Or, 'with kings;' but the Pahlavi has, avŏ khû d âyîh ayû g ênd mûn Kîk va Karapŏ.\n\n140:6 So the Pahlavi indicates.\n\nOtherwise 'will harden,' or, if khraodat is read, 'will rage (against).' 140:7 Inserted to shed light on the last line; so the later Parsism.\n\n141:1 I am again brought back to the Pahlavi, having formerly rendered 'bodies,' which I would now put in the second place.\n\n141:2 The Pahlavi, although as usual free or erroneous as to forms, gives us the valuable hint of hen g î-aît for u z g e n (sic = g ayen).\n\n141:3 Here we have the clear evidence of the conversion of a border tribe.\n\nThe Zarathu s trians had saved some Turanian clan from plunder or annihilation, and so secured their friendship.\n\nThese became known as the 'friendly people.' That true Zarathu s trian piety may have arisen among them is of course possible.\n\n141:4 It need hardly be said that this reference to Z.\n\nin the third person, does not prove that the composer was not Z.\n\nhimself.\n\nOne might even say that his authorship was even not less probable on this account.\n\n141:5 Let it be noted that the Pahlavi translator gives us our first critical knowledge as to the true writing and meaning of m e hmaidî; or will scholars object that he renders in the singular?\n\nValman pavan zak î Lekûm Aharâyîh hamîshak minâm khûp hamkhâk; Ner.\n\ndhyâyâmi s uddha-sakhâya m .\n\n142:1 Shall we regard this verse as misplaced because the subject is in the second person?\n\nIt is probable (as of very many verses) that it was often recited by the composer, or others, in a different connection, and perhaps originally so; but it was a happy thought for the effect to introduce it here.\n\nLet it be supposed that this and the previous verse were arranged to be spoken by another voice during the public recital.\n\nWe see that the interest is much increased by the intruding strophe.\n\n142:2 This passage may be regarded as recording the call of Vî s tâspa to the holy work.\n\nZu = hû need not always express the invocation of the gods.\n\n142:3 Others, 'unite.' 142:4 Or, 'ye take to you the righteous character to yourselves,' as the infinitive is difficult; but in that case Khshmaibyâ becomes awkward.\n\nThe translation of dâ as 'take' has long been familiar.\n\n142:5 Obviously composed for an occasion when the several parties would be present.\n\n143:1 Ar(e)dra seems to be especially applied, and might be left unrendered.\n\n143:2 I see no impossibility whatever in such a rendering, literally in 'his choice-abode;' so also the Pahlavi indicates: tamman aîgh Aûharmazd pavan kâmak dên demânŏ ketrûnê d .\n\nThe question is of 'going' and 'dwelling,' and the meaning 'abode' is quite in point.\n\nAs to var, see î s tâ khshathrâ; and compare mazdâvarâ.\n\nAside from this, vardmãm = in blessing.\n\n143:3 The Pahlavi again, with its followers, gives us our first hint at the general meaning here."

