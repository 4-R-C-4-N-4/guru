body = "Sacred Texts Zoroastrianism Index Previous Next Buy this Book at Amazon.com The Zend Avesta, Part III (SBE31) , L.H.\n\nMills, tr.\n\n[1886], at sacred-texts.com YASNA XLVI.\n\nPERSONAL SUFFERINGS, HOPES, AND APPEALS.\n\nIn treating this most valuable section, we can as usual presuppose that the several verses were not originally composed in the order in which they now appear.\n\nVerses 1-3 seem like a cry 'from the depths.' In verse 4 animosity appears; and an appeal to the energy of some of his warlike adherents seems to prove that, with verses 5 and 6, the composer addressed it to an assembly; 7-10 are questions and appeals to Ahura, but, as a matter of course, they are none the less really intended to impress the hearers, as well as to animate the mind of the reciter.\n\nVerses 11 and 12 were again intended to be delivered to adherents.\n\nVerse 13 is addressed to them in terms.\n\nVerse 14 would be regarded by some as little suited to the connection, and the rest seem spoken to an assembly of chiefs.\n\nHowever different they may be as to the particular time or circumstances of their origin, they are in general so homogeneous even as to pitch of intensity, that, with a little exercise of the mind, we can as usual see the reasons why they were put together, or were consecutively composed; and in poetic diction sudden changes neither displease nor surprise us.\n\n1.\n\nBeyond a doubt the leading prophet is the figure in the first and second verses; and those verses are so free from imagery that we hold them as describing beyond any reasonable p.\n\n131 question, together with many other passages in the Gâthas, the afflictions and discouragements of Zarathu s tra himself.\n\nHe knows not whither to turn, although he speaks as a public person and in command of forces which are scanty indeed (verse 2), but yet still able to take the field (Y.\n\nXLIV, 15, 16); and his movements also concern large districts ('lands').\n\nHe is not driven from his house, but from his country.\n\nIt is superfluous to say that religion, although blended with a natural ambition, is his leading motive.\n\nHow he shall satisfy Ahura is the one problem which he aims to solve; but his case at this particular juncture shows every discouragement.\n\n2.\n\nNot supposing that his yâ = yéna is merely lost in the meaning 'that,' we see that in relieving his burdened mind he exclaims, not that he knows that he is poor in means and troops, but that he knows why it is thus.\n\nIt is the dregva n t's work, whom we may also well understand as the drugva n t, the accursed enemy, who holds back (verse 4) the bearers of the Holy Order from all success in their efforts to gain a righteous livelihood from the favoured cattle culture (Y.\n\nXXIX, 2), and who, as he with grief long since foresaw, should he attain to power, would deliver up home, village, district, and province to ruin and death (Y.\n\nXXXI, 18).\n\nHe therefore cries to Ahura in common with the Kine herself (Y.\n\nXXIX, 9), and his behold' is only a changed expression for her exclamations (Y.\n\nXXIX, x).\n\nAs a friend, he would have the good Mazda to regard him as seeking an especial form of grace; and he would beseech Him to fill up his need (Y."

