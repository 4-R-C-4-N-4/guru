body = "by deeds performed in which Thy Righteous rule is saved and nurtured?\n\nTherefore that spiritual power 6 (vouchsafing me) for the (holy) Faith (its truths) declare.\n\n8.\n\nAnd as to him who (now by evil power) delivers up my settlements to harm, let not his burning (wrath) in deeds attain 7 me.\n\nBut bearing back 8 the (evil will and evil influence of such), let these things come (back) to him in anger.\n\nLet that to his body come which holds from 9 welfare; but let no (help) p.\n\n139 at all (approach him, which may) keep him back from misery.\n\n(And let this happen as I speak) from (vengeful) hate, O Lord!\n\n9.\n\nBut who is the freely helping one who will teach me foremost 1 how we may adore Thee, Thou the well to be invoked 2 as in Thy deeds, the holy 3 , bountiful Ahura?\n\nWhat (words) the Kine's creator 4 spake for Thee by aid of, and to aid, the Righteous ritual Order, these words of Thine, (Thy people coming) with Thy Good Mind, are seeking 5 now (to gain and learn from) me 6 , O Mazda Lord!\n\np.\n\n140 10.\n\nWhoever, man or woman, shall give to me those (gifts) of life which Thou hast known 1 as best, O Mazda!\n\nand as a holy blessing through (Thy) Righteous Order, a throne (established) with (Thy) Good Mind, (with these I shall go forth; yea, those) whom I shall (accompany and so) incite 2 , to the homage of such as You 3 (on earth), forth to the Judge's Bridge (itself) with all of them shall I lead on 4 (at last).\n\n11.\n\n(And they and I have every need for help, for now) the Karpan and the Kavi will join in governments 5 to slay the life of man with evil deeds, they whom their own souls and their own conscience will becry 6 .\n\nAnd when they approach there where the Judge's Bridge (extends, unlike the believing ones of God, who go so firmly forth with me as guide and helper, these shall miss their path and fall 7 ), and p.\n\n141 in the Lie's abode for ever shall their habitation 1 be.\n\n12.\n\n(But for the penitent there is yet hope; for all our former foes shall not thus fall, as from the K inva t Bridge to woe, for) when from among the tribes and kith of the Turanian, even among the more powerful ones of the Fryâna, those shall arise 2 who further on the settlements of Piety with energy and zeal, with these shall Ahura dwell together through His Good Mind (in them), and to them for joyful grace deliver His commands 3 .\n\n13.\n\nYea, he who will propitiate Zarathu s tra Spitâma 4 with gifts midst men, this man is fitted for the proclamation, and to him Ahura Mazda will give the (prospered) life.\n\nAnd he will likewise cause the settlements to thrive in mental goodness.\n\nWe think 5 him, therefore, Your good companion to (further and maintain) Your Righteousness (and meet for Your approach).\n\np.\n\n142 (A voice from among the Chiefs.) 14.\n\n(But where is such an one?) Whom hast thou Zarathu s tra 1 !\n\nthus a holy friend for the great (effort of the) cause?\n\nWho is it who thus desires to speak it forth?\n\n(Zarathu s tra answers."

