[content]
body = "I have, however, elsewhere, as against tradition, rendered as if the root were dar(e)s; 'has set his eye on me for vengeance.' 138:6 One might be tempted to read ta t môi dãs tv e m; 'that granting me, do Thou speak forth for the faith.' 138:7 The Pahlavi translator indicates the root sâ by his rêsh; so read as alternative, 'let him not wound us.' 138:8 The meaning 'but contrariwise' has been ventured on.\n\nThe indication of the Pahlavi is 'in opposing;' pavan pa d îrak yâmtûni s nŏ.\n\n138:9 The Pahlavi here misses the point, and taking pâyâ t in its usual p.\n\n139 sense, falls into confusion.\n\nThe ancient scholars, like some of their successors, could not always believe that pâ could mean 'to hold back from good' as well as from evil.\n\nThey recognised it sometimes, giving us our instruction on the subject, but not here.\n\n139:1 Did the composer appeal to some powerful coadjutor here, or does he rhetorically express his perplexity?\n\n139:2 Zevî s tîm must equal forms of hû; but from the constant evidence of the Pahlavi to the meaning 'endearing,' one is much inclined to suggest a reading as if from zush.\n\n139:3 Ashavanem is applied to Ahura, and cannot so well mean 'righteous' here.\n\n'Holy' is the more proper term in this connection, while spe n tem is necessarily excluded from that meaning by its occurrence with ashavanem in immediate connection.\n\n139:4 Notice that the word tashâ occurs here with no mention of wounding in the connection (see note 6 on page 6 ).\n\n139:5 I am here recalled to the Pahlavi by some who rarely name it.\n\nI had rendered, 'these words are inciting me (in duty) through Thy Good Mind;' so ish often in the Veda.\n\nThe Pahlavi translator, like his successors, scandalised at the difficult forms, also anticipated his successors (as elsewhere often) in getting free from the difficulty.\n\nHe did what is exactly equivalent to what is now practised by scholars (sometimes too often).\n\nHe rendered the text as if changed from what he could not understand to what he could understand, adhering to the right roots however, which I now follow.\n\nHe knew that ishe n ti mâ did not mean, 'I am seeking,' but he could not credit the words before him.\n\n139:6 We have now a suggestion which must often have presented itself to those who read the Ri g-veda constantly, and that is (so p.\n\n140 Bartholomae) that mâ may equal smâ here and often elsewhere.\n\nIt is well possible, as the 's' often disappears.\n\n140:1 Notice once more the expression, 'Thou hast known;' so in Y.\n\nXXVIII, II, the composer confides the very direction of his petitions to the discrimination of the Deity.\n\nWe gain from this the true sense of peresâ n a u yâ tôi e hmâ par s tâ; Ahura's question and prayer are mighty when repeated by us, because He has known what is best, and what are the true dâth e n g for which we should ask.\n\n140:2 This sense corresponds admirably with the connection; Ner.\n\nutthâpayâmi.\n\n140:3 Such as you = you as in the plural of majesty, or as referring to Ahura and His Bountiful Immortals (so often)."

