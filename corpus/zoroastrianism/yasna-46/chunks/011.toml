[content]
body = "What else can his pa d mân and apa d mânîk mean, but the regularity, that is, the rhythm and cadence of the words?\n\n143:4 Dâthem k â adâthem k â would be 'the truth and the heresy' in general.\n\n143:5 If ma n tû is taken as an instrumental, (can it be an act.\n\nimper.?) vistâ might occupy the place of a preterit, but it looks far more like a participle, and might be regarded as forming a compositum with vahm e n g.\n\nSupply the dat.\n\n(?) pers.\n\npron.\n\nunderstood before y e .\n\n143:6 The alteration to yau s , considered as an aorist, has long circulated, but seems now, like so many of the bolder conceptions, to be given up.\n\nYao s is the sister word of the Vedic yós, and p.\n\n144 shows us that some shade of sanctity may inhere in that word.\n\nThe Pahlavi renders more indefinitely by 'yân' = a helpful blessing.\n\n144:1 The Pahlavi translator, however, saw m e nâ, rendering avŏ li.\n\nHis text may well have justified him.\n\n144:2 Bearing; or is it 'fit to drive?' 144:3 The Pahlavi here reports another text.\n\n(SUPPLEMENTARY NOTES.\n\nAs k î t , in verse 18, may equal 'verily indeed.' Vahi s tâ, &c.= 'the best things of my wealth will I assign to him through the Good Mind.' The meaning 'wealth' seems much called for here, and if here, then in verse 2.\n\nVasnâ in verse 19 may mean 'through grace.') Next: Yasna XLVII"

