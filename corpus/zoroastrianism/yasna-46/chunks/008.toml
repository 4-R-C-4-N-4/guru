[content]
body = "The expression might refer to the 'going of the kine,' as representing the people in her 'path.' 136:4 Comp.\n\nY.\n\nXXXI, 18.\n\n136:5 Pahl.\n\nzak î pavan dû s -stahamak; Ner.\n\ndush t o balâtkârî.\n\nThe elements seem to be du z + hazô + bâo(= vâo).\n\n136:6 Ush in Iranian seems to have the sense of destruction combined with it sometimes; hence aoshah, aoshi s nŏ.\n\n136:7 K ar can well mean 'attain to.' Pathm e n g as = paths (so I formerly rendered) gives a far feebler sense than that indicated by the first Zendist, the Pahlavi writer.\n\nThe 'wisdom' of preparing stores for the kine, even if we suppose an animal only to be meant; p.\n\n137 is obvious.\n\nThe Iranian winter was something very different from that in India.\n\nBut the kine is not alluded to without a certain figurative meaning: she represents the people, and as such she cried aloud; and Zarathu s tra received the commission to relieve her sufferings as such.\n\nThat the word hu k i s tôi s stands in the genitive should not disturb us.\n\nThe 'care for the kine' was a matter of national importance, and 'wisdom' could not better be exercised than in this direction.\n\n137:1 Or we may render 'he who as ruler does not bestow favours upon him who approaches with injury.' The hint of the Pahlavi favours this.\n\n137:2 H v aêtavê is here, as in Y.\n\nXXXIII, 4; Y.\n\nXXXII, 1, and the first verse of this chapter, the hostile chieftain called 'kinsman' in an aristocratic sense by Zarathu s tra and his group.\n\n137:3 I compare uzûithy a us k a which is used of the breaking forth of water.\n\nThe Pahlavi translator seems to have had some such idea 'mûn lâlâ hen g î d ŏ,' but with him the entire line, which divides all writers, favours the sense 'in saving him from his impiety.' Khrûnyâ t is a verbal form (with Bartholomae).\n\n137:4 The Pahlavi translator sees the root is = to wish in ismanô, 'who does not willingly approach him;' or 'who does not approach desiring (and seeking?) him.' 137:5 I am gratified to see that another takes nearly this view of this line.\n\nHe has 'verfolgt.' 138:1 Haêthahyâ, as a masculine, is awkward, as would be baêthahyâ, so the Pahl.\n\n(of the terrifier).\n\nA loc.\n\nof haithya may be correct, taking dâmãn also as a loc.\n\nOtherwise 'to the creatures of the Lie, and the enchainer (or terrifier).' 138:2 Or, 'as Thou didst make the souls at first.' 138:3 So with K6, K9 (Barth.).\n\n138:4 Some render 'me' here, who seem elsewhere loath to translate thwâva n t as = like thee, thee.\n\nKhshmâvatô, thwâvãs, and mavaitê, in Y.\n\nXLIV, 1, may be rendered, 'of you,' 'thou,' and 'to me.' 138:5 So the Pahlavi indicates."

