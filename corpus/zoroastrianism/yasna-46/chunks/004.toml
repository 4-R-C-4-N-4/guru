[content]
body = "After all complaints, and threats, and stern injunctions, he closes with the once more repeated word 'reward,' and that for every man who shall aid in 'his great affair' (Y.\n\nXXX, 2), and he appeals to God Himself, asserting His inspiration for all that he has said.\n\nTranslation.\n\n1.\n\nTo what land to turn 1 ; aye, whither turning shall I go?\n\nOn the part of 2 a kinsman (prince), or allied peer, none, to conciliate, give 3 (offerings) to me (to help my cause), nor yet the throngs of labour, (not) even such as these 4 , nor yet (still less) the evil p.\n\n135 tyrants of the province.\n\nHow then shall I (establish well the Faith, and thus) conciliate Thy (grace), O Lord?\n\n2.\n\nThis know I, Mazda!\n\nwherefore I am thus unable to attain my wish 1 , and why my flocks are so reduced in number, and why my following is likewise scant.\n\nTherefore I cry to Thee; behold it, Lord!\n\ndesiring helpful grace for me, as friend bestows on friend.\n\n(Therefore to meet my spirit's need, and this as well) declare and teach 2 to me the Good Mind's wealth.\n\n3.\n\nWhen come, Great Giver!\n\nthey who are the day's enlighteners 3 , to hold the Righteous Order of the world upright, and forward pressing?\n\nWhen are p.\n\n136 the schemes of the saviour Saoshya n ts with (their) lofty revelations (to appear)?\n\nTo whom for help does he (their chief) approach, who has Thy Good Mind (as his fellow-worker 1 )?\n\nThee, for mine exhorter and commander, Living Lord!\n\nI choose.\n\n4.\n\n(But e’er these helpers come to me, all rests as yet in gloom.) The evil man is holding back 2 those who are the bearers of the Righteous Order from progress 3 with the Kine, (from progress with the sacred cause) within the region, or the province 4 , he, the evil governor, endowed with evil might 5 , consuming 6 life with evil deeds.\n\nWherefore, whoever hurls him from his power, O Mazda!\n\nor from life, stores for the Kine in sacred wisdom shall he make 7 .\n\np.\n\n137 5.\n\n(Yea), he who, as ruler, treats no coming applicant with injury 1 , as a good citizen (or nobly wise) in sacred vow and duty, and living righteously in every covenant, who, as an uncorrupted judge, discerns the wicked (that leader who, rejecting me, would keep back those who propagate the Faith), let him, (this righteous judge,) declare (the vengeance) to that (hostile 2 ) lord, (my) kinsman.\n\nYea, let him crush him when he sallies forth 3 (to approach us for our harm)!\n\n6.\n\n(And he who leaves him in his guilty error has my curse.) Yea, he who has the power 4 , and will not thus (with stern reproof 5 ) approach him, shall go to p.\n\n138 the abode of the Lie, (and) the enchainer 1 .\n\nFor he is evil who is the best one to the evil, and he is holy who is friendly to the righteous, as Thou didst fix the moral laws 2 , O Lord!\n\n7.\n\nWhom, then, as guard, O Mazda!\n\nhast Thou 3 set me 4 then when that wicked one still held 5 me for his hate?\n\nWhom (had I) then but Thee, Thy Fire and Mind, Ahura!"

