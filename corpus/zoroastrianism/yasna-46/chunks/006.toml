[content]
body = "Aye, such an one have.) It is our Kavi Vî s tâspa 2 , the heroic; (and not he alone, but all) whom thou shalt (as in Thy prophet) meet 3 in the assembly, O Ahura Mazda!\n\nthese likewise will I call (to my attempt), and with Thy Good Mind's words.\n\n15.\n\nO ye Haê k a t -aspas, Spitâmas!\n\nto you will I now address my words, since ye discern the things unlawful, and the lawful, for these your actions to establish 4 (firmly on its base) for you the Righteous Order through those which are the Lord's primeval laws.\n\n16.\n\n(And to the Hvôgvas would I likewise speak.) Thou Frashao s tra Hvôgva (whom I see) 5 ; go thou p.\n\n143 [paragraph continues] (forth) with the generous helpers 1 , with those whom we are praying for as for salvation to the land.\n\nGo thou where Piety joins hand in hand with the Righteous Order, where are the wished-for Realms of Good Mind, where Mazda in His most honoured 2 home abides, 17.\n\nWhere in your measured verse 3 I will declare aloud (the praises), not in unmeasured lines, G âmâspa Hvôgva!\n\nbut songs of homage (will I weave) with ever gained Obedience in offering.\n\n(And unto Mazda) will I chant them, yea, to Him who will discern aright what things are lawful (or) unlawful 4 (which I thus do, or utter), and with His wonder-working thoughts 5 of Righteousness (attend).\n\n18.\n\n(For) whosoever (offers) sanctity 6 to me, to him shall be the best gifts whatsoever.\n\nYea, of my p.\n\n144 [paragraph continues] (spirit's) wealth will I bestow on him through Thy Good Mind (which I give), but oppressions will I send on him who as oppressor will deliver us to anguish, O Mazda!\n\ndesiring, as I do, to satisfy Your choice by righteous (vengeance).\n\nThis is the decision of mine understanding and my will.\n\n19.\n\n(Yea, this I earnestly announce.) He who from Righteousness (in mind and life) shall verily perform for me, for Zarathu s tra, that which is thus most helpful (for my cause) according to my earnest wish (and through my words of urgent zeal) on him shall they bestow reward(s) beyond this earth, with all the mental 1 blessings gained through the sacred mother-kine 2 .\n\nAnd these things (all) did’st Thou (Thyself) command to me, O Mazda, Thou most wise 3 !\n\nFootnotes 134:1 The Pahlavi translator sees the usual meaning in nemôi and nemô.\n\nHe also accepts kãm zãm adverbially after the constant Greek usage.\n\n'In what land shall I establish my religion (as it is here rejected); whither with my praises (of the true God) shall I go?' The rendering is so much richer that I turn from it with great reluctance.\n\n134:2 It is to be regretted that able scholars should so hastily change the Gâthic text here without first trying to render it as it is.\n\nThis is all the more necessary, as each independent writer disputes emendations.\n\nPairî I think ought to stand.\n\nThe h v aêtu, airyaman, and verez e nem are also elsewhere alluded to, as appertaining to the hostile party sometimes, and therefore not among those from among whom (parâ?) the prophet would be expelled.\n\n134:3 Dadaitî as a third plural has long been suggested with the eagerness of discovery."

