[content]
body = "XXVIII, 11) in his extremity, teaching him, not the value of flocks and followers alone, but of that î s ti which lay deeper than the material wealth which he yet lamented, even the blessings of the Holy Order in every home.\n\n3.\n\nAnd therefore he continues: Teach me and tell me of those great thoughts, the khratavô, the salvation-schemes of the Saviours, elsewhere also spoken of as the khratu of life (Y.\n\nXXXII, 9); for these saving helpers would, through a severe conflict and after many a reverse, at last bring on 'Completed Progress.' 4.\n\nBut he must arouse himself from the relief and indulgence of his grief, he therefore springs to action, and with a cry which we hear elsewhere (Y.\n\nLIII, 9), and which was in all probability often uttered in hymns now lost to us, he urges the reward for the chief, who at the head of his retainers, shall expel the world-destroyer, the du s sasti (Y.\n\nXLV, 1), from power and from life.\n\nAnd what is that reward?\n\nIt seems to be merely the recognition and confirmation of merit among the faithful.\n\nThe man who shall p.\n\n132 expel, or destroy, the heretical tyrant shall be eminent in the recognition of his services in the support of the people and their sacred agricultural civilisation.\n\nThat was to be reward enough, and even that prestige (pourvatâtem) was to be given back to God in offering for still further service (Y.\n\nXXXIII, 14).\n\n5.\n\nAnd every righteous official is urged to repeat the proclamation as a warning to every polluted Daêva-worshipper whom he can discover, or to whom his voice can reach, as well as to those secret adherents who would seem to need encouragement.\n\nThe charged official is to assail the destructive opponent (Y.\n\nXXXII, 6-8), only after careful discrimination.\n\nHe is to approach the evil chief, the hostile h v aêtu (of the blood), as distinct from the inferior noble, or the peasant clansman, and he is to tell him fully of the price set on his head.\n\n6.\n\n'And the superintendent who has the power, and does not thus carry out these instructions, shall himself be delivered over to the bonds of that Lie-demon whom the evil \"kinsman\" serves.\n\nFor there is no compromise in the dualistic moral creed.\n\nThe man who favours the evil is as the evil, and the friend of the good is as the good himself; so had the Lord ordained.' 7.\n\nThen, as so often elsewhere, he turns his thoughts to the outward emblem as the sign of inward grace, the sacramental Fire without which the masses would have had no help to fix the eye, or draw prostrations, and he asks with the question of profound devotion: Whom have they (Thy Saoshya n ts, verse 3) set me, as strengthener in these storms, save Thee and Thy symbolic flames?\n\nYet even here he names the Good Mind with them, and the Order.\n\n8.\n\n'But,' he continues, 'may he who would destroy my settlement find every influence and power combined to form his ruin; may all things keep him back from prosperity, and may nothing keep him back from harm.' 9.\n\nHe calls, then, for a leading helper who may help him magnify Ahura, not merely in religious celebrations, but in that universal advance of the sacred 'cause,' which follows Ahura's 'conciliation' (verse 1).\n\n10."

