[content]
body = "As if to hinder the discouragement of those who hear his own unburdenings of grief, he declares that he will never leave the faithful few who follow him; he will go with them to the 'dread assize ' itself, as if to help them pass the last of tests.\n\n11.\n\nBut the 'wicked,' open or concealed, should not share these hopes; their conscience, ever the remorseless executioner, shall curse them, as they try to pass the Judgment Bridge; and hurled p.\n\n133 from that narrow path (it becomes narrow to the faithless), they shall fall to 'eternal' Hell.\n\n12.\n\nTheir destruction is not, however, yet decided; there is not only hope for the tribesmen of Ahura, but for the pagan, and not for the 'alien' only, but for the Turanian enemy, whose very name had been a synonym for suffering.\n\nIf these even shall repent, they may be blest; and some had already turned.\n\nThe converted tribe Fryâna offered many pious proselytes.\n\nThese would help on the righteous order together with the holy people, and God would dwell with them as well.\n\n13.\n\nRhetorically referring to himself as in the third person, or else representing some second speaker who names his name, he can still offer his reward to any prince who will yet come up with his retainers to his cause, not kept back by the many refusals which he had met (verse 1), nor discouraged by the scant numbers of his bands; and that reward is one which might yet be efficacious to induce self-sacrificing succour, for in addition to what had been said (see verse 4) he could declare spiritual life from Ahura to be the portion of every faithful follower, and with it future temporal wealth.\n\nAnd he should declare this true recruit the good mate' in the service, the first helper (verse 9) of the tribes.\n\n54.\n\nHere we have what seems a question conceived as uttered by some one in the throng, or else simply rhetorically thrown in: 'Who is that friend, that powerful coadjutor who is thus offered this reward, and for such a service?' Zarathu s tra names the king.\n\nBut he diverts the minds of hearers from a pernicious trust in individuals.\n\nHe would appeal, so he implies, not to one man only, although that one be Vî s tâspa, the heroic, but to all whom Ahura would recognise in His assembly, through the inspired suffrage of the mass.\n\n15.\n\nAnd first he addresses the group made up chiefly of his family, the Spitâmas; they were, as he implied, enlightened in the sacred lore, and among the foremost therefore of the Ar(e)dra.\n\n16.\n\nHe then calls on Frashao s tra, with the Hvôgvas, exhorting all to continue in their righteous course, in harmony with those whom they wish for as Saviours for the land, assuring them that they will reach at last that sacred scene where the 'Immortals' dwell with God.\n\n17.\n\n'That scene,' he further adds, 'where the faithful sing their praises in perfection, using the true metres' (as sacred as the Vedic).\n\nAnd he declares that Ahura, who discerns the truth infallibly, will heed and answer; for the praises sung there will be those of obedient men who offer to the cause.\n\n18.\n\nHe once p.\n\n134 more holds out his spiritual rewards as the best gifts of the inspired revelation, threatening as usual commensurate visitation upon the oppressing clans, while both promises and threats are in harmony with Ahura's will, for that alone has been his guide in every statement.\n\n19."

