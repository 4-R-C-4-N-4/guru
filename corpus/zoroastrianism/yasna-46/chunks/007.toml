body = "Its subjects would then be khshnâu s , and that implied in yâ verez e nâ.\n\nBut the construction is difficult thus, and it may be greatly doubted whether we had not better alter our discovery back into the singular with the Pahlavi.\n\nI am greatly confirmed in my view of the grammatical form of khshnâu s by Bartholomae's decision for a nominal form.\n\nOtherwise it would be a third singular, with loss of the final dental.\n\n134:4 H e k â seems to be an irregular form (see Y.\n\nLVIII, 4).\n\nI can p.\n\n135 only make an exclamatory isque = talisque of it.\n\nThe Pahlavi renders freely as if some form of hi = to bind were before him (recall hôi s ?), or perhaps he read ha k â, rendering as = these all together, hamsâyaki k ; Ner.\n\nye sva s re n ayo.\n\n135:1 So the Kine complained of him in Y.\n\nXXIX, 9 as anaêsha; so also the Pahlavi, explaining akhvâstar [aîgham denman atûbânîkîh maman râî khavîtûnam].\n\nHe proceeds li amat kam ramak va amati k kam-gabrâ hômanam, explaining anaêshô as not being an îshâ-khshathra.\n\nMâ = smâ notwithstanding position (?).\n\n135:2 'Nim wahr' has long since circulated as a rendering for âkhsô; and with î s tîm in the sense of 'prayer,' it has afforded the admirable sense 'observe, take heed of the desire of the pious.' But we have a positive proof of the meaning 'teach,' 'declare' for khsa; see Y.\n\nLXV, 9 (Wg.).\n\nSo also in Y.\n\nXXVIII, 5.\n\nThat Ahura possessed an î s ti is clear from Y.\n\nXXXIV, 5.\n\nAnd if the sage could ask, 'What is your î s ti (wealth)?\n\nwhat is your kingdom (power over possessions)?' it is certainly not strained to suppose that he could say here; 'tell me concerning your wealth,' especially as he bewails his poverty.\n\nÎ s ti is in antithesis to the idea expressed in kamnafshvâ and kamnânâ.\n\nSo also the Pahlavi as translated by the Persian ‘hezânah.\n\n135:3 Ukshâno would seem to be an ancient error for ushâno, as the Pahlavi translator renders as if reading ushâ in Y.\n\nL, 10, and p.\n\n136 not ukhshâ.\n\nOtherwise 'increasers of the days' is a fine expression, but suspicious in view of the Pahlavi rendering in Y.\n\nL, 10.\n\nNer.'s *vikâ s ayitryo (sic) is striking, but I cannot claim for it all that it seems to offer, as Ner.\n\nelsewhere renders forms of vakhsh by those of kas.\n\nThe Persian follows the Pahlavi.\n\n136:1 Comp.\n\nY.\n\nXLIV, 1.\n\n136:2 Pa in the sense of 'keeping back from welfare' as well as in that of 'protection,' a sense first taught us by the Pahlavi writers, is now at last generally acknowledged.\n\nIt now, like many other suggestions of the Pahlavi, actually casts light in the rendering of the analogous Vedic word.\n\n136:3 So the mass of MSS.\n\nwith the Pahl.\n\nmin fravâmi s nŏ; Persian az raftan."

