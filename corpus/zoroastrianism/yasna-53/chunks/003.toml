body = "And may Kavi Vî s tâspa, and the Zarathu s trian Spitâma 6 , and Frashao s tra too with them, offer propitiation to Mazda in thought, word, and deed, and p.\n\n191 [paragraph continues] Yasna confessions 1 as they render Him praise, making straight paths 2 (for our going), even that Faith of the Saoshya n t which Ahura will found 3 .\n\n(The master of the feast.) 3 4 .\n\nAnd him will they give Thee, O Pouru k ista, Haê k a t -aspid and Spitâmi!\n\nyoung 5 (as thou art) of the daughters of Zarathu s tra, him will they 6 give thee as a help in the Good Mind's true service, of Asha's and Mazda's, as a chief and a guardian 7 .\n\nCounsel well then (together 8 ), with the mind of Ârmaiti, most bounteous and pious; and act with just action.\n\n(She answers.) 4.\n\nI will love 9 and vie with him, since from (my) father 10 he gained (me).\n\nFor the master and toilers, and for the lord-kinsman (be) the Good Mind's bright p.\n\n192 blessing 1 , the pure for the pure ones, and to me (be 2 ) the insight (which I gain from his counsel 3 ).\n\nMazda grant it, Ahura for good conscience for ever.\n\n(The priestly master of the feast.) 5.\n\nMonitions for the marrying I speak to (you) maidens, to you, I who know them; and heed ye my (sayings): By these 4 laws of the Faith which I utter obtain ye the life of the Good Mind (on earth and in heaven).\n\n(And to you, bride and bridegroom 5 ), let each one the other in Righteousness cherish; thus alone unto each shall the home-life be happy.\n\n6.\n\n[Thus real are these things, ye men and ye women 6 !] from the Lie-demon protecting, I guard o’er my (faithful), and so (I) grant progress (in weal and in goodness).\n\nAnd the hate of the Lie (with the hate of her) bondsmen (?) I pray from the body, (and so would expel it 7 ).\n\nFor to those who bear Vayu 8 , (and bring him to power), his shame 9 mars the glory.\n\nTo these evil truth-harmers by these means he reaches.\n\nYe thus slay the life mental (if ye follow his courses 10 ).\n\np.\n\n193 7.\n\nBut yours be the recompense, (O ye righteous women!) of this great cause.\n\nFor while lustful desire heart-inflamed from the body 1 there beyond goeth down where the spirit of evil reaches (to ruin, still) ye bring forth the champion 2 to help on the cause, (and thus conquer temptation).\n\nSo your last word is 'Vayu'; (ye cry it in triumph 3 ).\n\n8.\n\nAnd thus let the sinners by these means be foiled 4 ; and consumed 5 be they likewise.\n\nLet them shriek in their anger.\n\nWith good kings let (our champion 6 ) deliver 7 the smiter 8 (as a captive in p.\n\n194 battle), giving peace to our dwellings, and peace to our hamlets.\n\nLet him charge 1 those deceivers, chaining death as the strongest 2 ; and swift be (the issue).\n\n9.\n\nThrough false believers the tormentor makes Thy helpers 3 refusers 4 ; (those who once helped our heroes shall no longer give succour)."

