[content]
body = "As the object of the 'great cause,' next to the preservation of its adherents, was the extension of its influence, first over hesitating parties (Y.\n\nXLIV, 12), and then over all the living (Y.\n\nXXXI, 3), it is not surprising that the central prayer of Zarathu s tra should have culminated in a desire for the conversion of opponents.\n\nEven Turanians had been known to come over to the holy creed, and help prosper the settlements which their kith had so often plundered (Y.\n\nXLVI, 12); he had therefore prayed that those who p.\n\n189 had heretofore injured the holy Daêna might become its disciples by a genuine conversion.\n\n2.\n\nHaving observed the fidelity of converts and original disciples, the king and his chief nobles would celebrate their devotion by hymns, ceremonies, and sacrifices, as the symbols of every moral virtue, laying down for the people the moral law of the Saviour.\n\n3.\n\nAs it would be pushing rather far to suppose the Saoshya n t to be referred to in t e m k â, and as moreover, according to Geldner's admirable suggestion, that title may here well refer to Zarathu s tra, it is better to accept a loss of verses, and to suppose a person alluded to as the bridegroom, who, if not one so eminent as to merit the imposing name of Saoshya n t, was still at least one of his more prominent satellites, for the ancient poet goes on to address a daughter of Zarathu s tra as a bride.\n\nShe is the youngest, and her name is as pious as that of a maid of ancient Israel, for she is called 'full of the religious knowledge.' Her husband is to be a support in holiness, and she is to take counsel with piety 4.\n\nHer response is appropriate; she will vie with her husband in every sacred affection, as well as in every domestic virtue.\n\n5.\n\nThe priestly thaliarch then addresses the bridesmaids and the pair with suitable admonitions to piety and affection.\n\n6.\n\nTurning now to the assembly, possibly after the recital of some stanzas long since vanished, he proceeds with warnings and encouragements.\n\nHe will exorcise the Demon who was especially the slave of the Daêvas; but he warns all men and women against the evil Vayu, the spirit of the air.\n\n7.\n\nCharitably concluding that they would come forth as conquerors from the trials which still awaited them, he next warns them against all solicitations to vice.\n\n8.\n\nHaving named profane Demons, his polemical zeal becomes fully inflamed.\n\nAnticipating with fierce delight the sufferings of the wicked, he calls vehemently for the champion, who may, in alliance with neighbouring potentates, deliver up the murderous false-leader, giving peace to the masses; and he entreats that all haste may be used.\n\n9.\n\nTo arouse the great chiefs to their duty, he recalls (as in Y.\n\nXXXII) the successes of the foe; and he calls for the prince who may overthrow and expel him, but, as if well aware that the human arm could not alone bring salvation, he attributes to Ahura the Sovereign Power, which alone can guard helpless innocence against lawless plunder and oppression.\n\np.\n\n190 Translation.\n\n1.\n\nThat best prayer has been answered 1 , the prayer of Zarathu s tra Spitâma, that Ahura Mazda might 2 grant him those boons, (the most wished-for) which flow from the good Order, even a life that is prospered 3 for eternal duration, and also those who deceived 4 him (may He likewise thus grant him) as the good Faith's disciples in word and in deed 5 .\n\n2."

