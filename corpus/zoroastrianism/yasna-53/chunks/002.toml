[content]
body = "With good kings let (our champion 6 ) deliver 7 the smiter 8 (as a captive in p.\n\n194 battle), giving peace to our dwellings, and peace to our hamlets.\n\nLet him charge 1 those deceivers, chaining death as the strongest 2 ; and swift be (the issue).\n\n9.\n\nThrough false believers the tormentor makes Thy helpers 3 refusers 4 ; (those who once helped our heroes shall no longer give succour).\n\nThe estranged thus desires, and the reprobate 5 wills it, with the will that he harbours to conquer our honour 6 .\n\nWhere is then the Lord righteous who will smite them from life 7 , and (beguile) them of license?\n\nMazda!\n\nThine is that power, (which will banish and conquer).\n\nAnd Thine is the Kingdom 8 ; and by it Thou bestowest the highest (of blessings) on the right-living poor 9 !"

