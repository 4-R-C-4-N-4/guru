body = "The estranged thus desires, and the reprobate 5 wills it, with the will that he harbours to conquer our honour 6 .\n\nWhere is then the Lord righteous who will smite them from life 7 , and (beguile) them of license?\n\nMazda!\n\nThine is that power, (which will banish and conquer).\n\nAnd Thine is the Kingdom 8 ; and by it Thou bestowest the highest (of blessings) on the right-living poor 9 !\n\nFootnotes 190:1 Some lay stress upon the literal form 'was heard,' and regard the expression as indicating the fact that Zarathu s tra was no longer living (see the remarks in the summary).\n\n190:2 Free.\n\n190:3 I follow the Pahlavi with all; it has hû-âhûînâ d .\n\n190:4 I follow the frîftâr of the Pahlavi, as the conversion of those formerly hostile is suggested by vaurayâ and Fryâna, not to speak of the primary rendering of du s erethrî s k ikhshnushâ.\n\nThe Pahlavi also has, 'even he who is the deceiver is to be instructed in the word and deed of the good religion.' The MSS.\n\nshould not hastily be abandoned.\n\n190:5 That more than a ritualistic sanctity is meant is certain (see Y.\n\nXXX, 3); but that no sanctity could be recognised apart from worship is equally undeniable.\n\n190:6 Who was the Zarathu s trian Spitâma?\n\nSome change the text after the Pahlavi translator, reading Zarathu s tra Spitâma; but I would not follow this evil example in a first translation of a translatable text.\n\nWhy should a Spitâma, who was not Zarathu s tra, be called Zarathu s trian?\n\nWere some of the Spitâmas not in sympathy with their great kinsman, Spitâmas who were Mazdayasnians, but not 'of Zarathu s tra's order?' One would however suppose that some one of Zarathu s tra's family was meant who occupied the position of his especial representative and natural successor.\n\n191:1 Free.\n\n191:2 Recall the 'path made for the Kine,' and 'the way' which 'Thou declarest to be that of the Good Mind.' 191:3 That is, will permanently found, establish.\n\n191:4 Verses have here fallen out, as some allusion must have been made to the bridegroom.\n\n191:5 So more according to the hint of the Pahlavi and the statement of the Bundahi s ; West, XXXII, 5.\n\nSo Geldner, K.Z.\n\n28, 195.\n\n191:6 Or, 'will he, the Saoshya n t, the bride's father.' 191:7 A chieftain, a protecting head.\n\n191:8 It is, perhaps, safer to refer this 'questioning' to the pair; but forms of ham with pares are also used of consultations with the Deity (see Y.\n\nXXXIII, 6).\n\nY.\n\nXLIV, 13 nearly necessitates the wider and less concrete view here.\n\n191:9 Varânî looks somewhat like a gloss, but the metre seems to demand it.\n\n191:10 Her father's sanction was a reason for devotion to the man to whom he had given her.\n\n192:1 The Pahlavi translator has sîrîh here.\n\n192:2 B e t = bá d lies certainly nearer than b e e t =bava t .\n\n192:3 See the previous verse.\n\n192:4 Or, 'being zealous.' 192:5 These words do not seem adapted to the bridesmaids."

