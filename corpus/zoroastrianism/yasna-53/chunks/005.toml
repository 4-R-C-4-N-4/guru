[content]
body = "192:6 G aini is elsewhere used in an evil sense.\n\n192:7 I can only render thus literally: From the Drû g as a generous guide (I) who (compare ye in Y.\n\nXXVIII) (for) mine, (mê) a watching guardian (I guide as a râthema; nom.\n\nsing.\n\nwith verbal force) increasing prosperity, i.e.\n\nprogress, of the Drû g I pray (forth*; I exorcise) of the bond (?) (of the Drû g ) the malicious injuries* from the body or person.\n\n*yêsê-parâ.\n\n*to 3rd pî.\n\n192:8 'If ye bear, or promote, the interests of Vayu.' 192:9 Or, 'evil food.' 192:10 Some line here is gloss; the first thought would be to eliminate p.\n\n193 the difficult second line; but the third line might be an effort (by the poet himself, or an associate, see the metrical form) to explain, or relieve, the awkward second line.\n\nReading y e mâ and râthemâ, and taking g enayô as in an evil sense, with spasuthâ as a second plural, we might render as a question: 'Do ye, O ye twain, ye helpers of the Drû g ; do ye regard promotion (as thus to be gained)?' But in that case verses 6 and 7 should be regarded as separated by many lost verses from the fifth verse.\n\nBut is not the first line the gloss?\n\nIt is merely an address.\n\n193:1 Free.\n\n193:2 Lit.\n\n'the greatness.' 193:3 The difficulty here lies in the first line which seems to declare a reward in a good sense.\n\nMî z dem is hardly used of retribution.\n\nIt must therefore be taken in a good sense.\n\nThe following evil results must be supposed to have been avoided; and 'Vayu' to be uttered in triumph.\n\nVayu is used in an evil sense in verse 6.\n\nIf mî z dem could be supposed to express retribution, then evil men and women would be threatened, and Vayu would be a cry uttered in woe.\n\nAs to Vayu with his two natures, see part ii as per index.\n\n193:4 The foiling of the evil here recalls âdebaomâ.\n\n193:5 The Pahlavi translator seems to me too free in rendering za h v yâ k â (zahyâ k â), zani s n-hômand.\n\nIt also makes a curious imitation of letters in g êh va mar for g enarãm.\n\nIt is of course far from certain that he had our present text.\n\n193:6 See verse 9; also Y.\n\nXLVI, 4.\n\n193:7 Recall the delivering of the evil into the two hands of Asha (Y.\n\nXXX, 8, and Y.\n\nXLIV, 14).\n\n193:8 Khrûnerãm k â must be a gloss.\n\n194:1 'Let him \"rout\" or \"stir\" them.' 194:2 Comp.\n\nmazi s ta = the strongest in Y.\n\nXLIX, 1, 'the prevailer.' Lit.\n\n'with the chaining of death the greatest.' 194:3 For narpî s I can only suggest the suspiciously simple nar = hero (comp.\n\nthe frequent nâ) and pî = nourish, support.\n\nThe Pahlavi translator seems likewise to have had some such rendering in mind, for he translates dastôbar.\n\n194:4 As to ri g î s , the Pahlavi translation, which is here more than usually difficult, hints in the direction above followed, by a word which I would restore as rê g înênd."

