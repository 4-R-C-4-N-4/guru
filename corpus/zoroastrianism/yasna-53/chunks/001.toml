body = "Sacred Texts Zoroastrianism Index Previous Next Buy this Book at Amazon.com The Zend Avesta, Part III (SBE31) , L.H.\n\nMills, tr.\n\n[1886], at sacred-texts.com THE GÂTHA(Â) VAHI S TÂ Î S TI S (VAHI S TÔI S TI(Î)).\n\nThis Gâtha, named from its first words, consists of chapter LIII of the Yasna.\n\nWhile its matter is homogeneous with that of the other Gâthas, it bears some evidence of having been composed in the latter portion of Zarathu s tra's life.\n\nIt is, as usual, separated from the other Gâthas by its metre, which shows four lines with two half lines.\n\nThe first two have eleven or twelve syllables; the third seems to have fourteen plus a half line with five, so also the last.\n\nIrregularities seem frequent.\n\nThe composition has for its substance a marriage song, but one of a politically religious character.\n\nThe piece â-airy e mâ-ishyô, Y.\n\nLIV, 1, has been considered by some is susceptible of a similar metrical arrangement, and it certainly looks as if it originally belonged to Y.\n\nLIII.\n\nIt is, however, p.\n\n188 otherwise divided by Bartholomae (see Arische Forschungen, 2 ter heft, s.\n\n23).\n\nFrom the past form of srâvî, some have thought that Zarathu s tra was no longer living when this hymn was composed, but the word may only mean '(his prayer) has been, or is heard.' If we must, however, render 'was heard,' this does not determine the certainty of Zarathu s tra's death.\n\nThe expression Zarathu s tri s Spitâmô also gives the impression that some heir to Zarathu s tra's office and prestige existed, but even this is not decisive, for a future successor may be for a time a contemporary, while, on the contrary, the nuptials of Zarathu s tra's daughter, with the mention of his name, and the reference to her 'father' as the one from whom her bridegroom obtained her, indicate that Zarathu s tra may well have been still living.\n\nThe later forms Zarathu s trahê and fedhrô remain as the indications of a later origin than the actual period of Zarathu s tra's lifetime; but these circumstances may he owing to accidental causes.\n\nThe style has freshness and vigour throughout, and would indicate Zarathu s trian influence, if not authorship.\n\nThat Zarathu s tra does not speak in the first person, has no importance whatever in the question.\n\nThe piece is not of course a whole; but it may well be a whole out of which parts have fallen.\n\nThat the subject passes on to the old polemical vehemence in the last verses, is far from unnatural.\n\nThe marriage festival of Zarathu s tra's child must have been, if without intention, a semi-political occasion, and the bard would express himself, as naturally, with regard to the struggle which was still going on.\n\nThis latter fact also shows an early date; the passages referring to the struggle are strongly kindred with some in Y.\n\nXLVI, and elsewhere.\n\nVerses 1 and 2 form an admirable introduction; the transition to the marriage occasion was, however, contained in lost verses.\n\nVerses 3, 4, and 5 hang well together; and 6 and 7 are not at all remote from them; the warlike close, although far from surprising us, must have been introduced by one or more now missing stanzas.\n\n1."

