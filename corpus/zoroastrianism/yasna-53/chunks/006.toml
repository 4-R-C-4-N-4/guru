[content]
body = "194:5 The Pahlavi translator erroneously sees 'bridge' in peshô, or is free with his tanâpûharkânŏ hômand.\n\nSee Geldner, Stud.\n\n3.\n\n194:6 See Geldner, Stud.\n\n54.\n\n194:7 See Y.\n\nXLVI, 4.\n\n194:8 Comp.\n\nthe Ahuna-vairya which takes its last line from this place, and Y.\n\nXXXIV, 5.\n\nVahyô is a variation for vangh e u s vahyô.\n\n194:9 Here I have endeavoured to imitate the swing of the rhythm by breaking up the sentences, especially in the second line.\n\nLiterally it would be, 'with the desire, with the virtue-conquering (desire) of the reprobate.' Such freedom as the above is often a critical necessity in the attempts to reproduce the warmth of the original.\n\nNext: Yasna I.\n\nThe Sacrifice Commences"

