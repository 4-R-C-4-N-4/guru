[content]
body = "79:2 The Pahlavi translation may be rendered as follows: Thus, as a gift of generosity, I who am Zartû s t (so freely, and with no error from ignorance (!)) give the life of my own body, as the advance [as the chieftainship] to Vohûman and to Aûharmazd, and to Ashavahi s t, in actions [that is, I would do the deeds which Aharâyîh desires], and would give obedient attention to the word (literally the hearing of the word) to (i.e.\n\nof) Khshatraver.\n\nNext: Yasna XXXIV"

