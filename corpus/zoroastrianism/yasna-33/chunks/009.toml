[content]
body = "Those, O Great Wise One!\n\nwho shall exist [(or) come in the future], let them render these persons thine own through friendship to thee.\n\nCause thou the Best Mind to increase within me, O Lord!\n\n[that is, make my mind ever the more piously zealous].\n\nAnd in view of my righteousness grant me a benefit in my body, or person [ ].\n\n77:8 So the Pahlavi also: Am barâ âmûrzê d .\n\n77:9 Observe that all the Ameshôspends, except the two mentioned in verse 8, are here bidden as persons to listen and be merciful.\n\nThese recurring instances (recall the two hands of Asha &c.) necessitate the view that the idea of personality is never lost in that p.\n\n78 of the abstract quality; and vice versâ; (the latter especially in the Gâthas where the names always retain much, if not all of their original force).\n\nAs to âdâi; see vanghuyâ (sic) zavô-âdâ in the next verse.\n\n78:1 We seem obliged to suppose that Ahura was poetically conceived of as sitting (like Vohûman in Vendîdâd XIX, 31 (Wg.)) upon an ornamented throne, or we may take the expression as pure metaphor equalling 'exert Thy power.\n\n' Âramaitî may be a voc.\n\n78:2 See âdâi in verse tr.\n\n78:3 Pavan zak î Vohûman sardârîh.\n\nThe 'thrift-law' is the regulation established by the Ratu demanded in Y.\n\nXXIX for the redemption of the Kine.\n\nIt expresses the entire polity and theology of the Zarathu s trian people as summed up in the original Avesta.\n\n78:4 Neryosangh: Up!\n\nO Lord!\n\npurify me [that is, make me pure, or free, from the influence of that tormentor, the Evil Mind]; and grant me perfect spirituality and zeal.\n\nFor we are recipients of Gvahmana, O more mighty spirit [that is, let him be as a guest, arrived within my body]!\n\nAnd let sanctity have power over the murderer (?) [ ], and through the lordship of the Best Mind.\n\n78:5 The Pahlavi has here pavan kâmak k âshi s nŏ, on which see Darmesteter, Études Iraniennes, vol.\n\nii, as per index.\n\n78:6 Literally, 'Your.' 78:7 Ashi has this meaning in the later Avesta.\n\nIt also means 'sacred regularity,' 'exactness' in religious duties.\n\n78:8 So the Pahlavi also: A s pavan Aharâyîh dînô frâz dakhshakînŏ; p.\n\n79 Ner.: Pu n yena dinim pra k ihnaya.\n\nPossibly, 'give light to our consciences through Asha' would be better.\n\n79:1 The tissues; the word seems contrasted with bones elsewhere.\n\nThe Pahlavi has khayâ, and Ner.\n\ng iva m (sic)."

