[content]
body = "Taking up the peculiar 'I who' of XXVIII, the composer returns to the first person, continuing in that form with little exception until the last verse, which, naming Zarathu s tra in the third person, implies (if it is not an addition, which, however, it may be) that Zarathu s tra had been the speaker throughout.\n\nAs it is highly probable that the author who uses this ' I who' is the same who uses it in XXVIII, and if we may take verse 14 as fair evidence that Zarathustra is the speaker here, we acquire some additional grounds for believing that the person who wrote (if we can apply such an expression to the author) the words 'to Zarathu s tra and to us,' as well as 'to Vî s tâspa and to me,' and 'to Frashao s tra and to me,' was universally recognised to be Zarathu s tra himself composing a piece to be recited by another.\n\nAs if in response to the expression in verse 3, recalling that although a vahi s ta (a best one) to some of each class (verse 1) he was no contenter of the wicked (XLIII, 15), he begins a prayer which is only completed by its izyâ in verse 6, and which gathers force by each preceding profession of fidelity.\n\nAnd true to a practical dualism, he first abjures the leading sin of disobedience to God, and of arrogance, discontent, and dishonesty toward man, accompanied (as it seems to have been) with neglect of the all-important duties to the cattle who shared the sanctity of 'the soul' of their representative.\n\nAnd perhaps it is this practical severity of dualism as opposed to the more facile 'lying' of the opposed religion, which was the cause of that high reputation of the Persians for veracity, which was grouped with avoiding debt by Herodotus among the virtues of the race.\n\n5.\n\nI, he goes on to say, or to imply, I who not only abjure disobedience, insolence, complaint, and lying, but especially invoke the great genius who is Obedience himself, Obedience toward God, (Thee), endeavouring as I do by this abjuration and prayer to attain, not to a 'hundred autumns' of booty and glory, but to a long life in the kingdom which was established in the spirit of p.\n\n70 the Divine Benevolence, and to paths not only for the war-cart, or for commerce, but to those rigidly straight paths of moral purity in which Ahura dwells, 6.\n\nI, he adds once more, who am thus Thine actually invoking (zbayâ) invoker, 'straight' like the paths (erezu s ), I am seeking with longing (kayâ) to know from that Best Spirit (Thy Spe n ta Mainyu?) animated once more by that best mind, to know-what?\n\nShall we regard it as a bathos when we read that he thus with cumulative urgency prays to know what the Best Spirit thought should be done for the recovery and perfection of the fields?\n\nIf we turn back to XXIX, 1, we shall see that the identical word (vâstryâ) describes the original want of the kine's soul.\n\nIt was vohu vâstryâ which she implored as her salvation; and it was the sacred agriculturist who alone could afford it, and who as the 'diligent tiller of the earth' always remained the typical saint."

