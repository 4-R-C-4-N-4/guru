[content]
body = "of the One like You 1 , or the words of praises offered with Righteousness.\n\nAnd give Ye as Your offering 2 (of grace to me) the abiding gifts of Your Immortality and Welfare!\n\n9.\n\nAnd let (one like those 3 ), O Mazda!\n\nbear on to Thee the spirit of the two leaders who cause the holy ritual Truth to flourish; let him 4 bear them to (Thy) brilliant home 5 with 6 preternatural insight, and with the Better Mind.\n\nYea, let him bear that spirit on as a fellow-help 7 in (furthering) the p.\n\n77 readiness 1 of those (in their holy work) whose souls go hand in hand 2 .\n\n10.\n\n(And not for these alone do I pray, but for us 3 as well.) All prosperous states 4 in being which have been enjoyed in the past, which men are now enjoying, and which shall be known in the future, do Thou grant (me) these in Thy love 5 .\n\n(Yea), cause (our) bodily and personal life to be blest with salvation 6 through (Thy) Good Mind, (Thy) Sovereign Power, and (Thy) Sanctity 7 .\n\n11.\n\nAnd, O Thou who art the most beneficent Ahura Mazda!\n\nand thou who art Âramaiti (our piety), and also the Righteous Order who dost further on the settlements; and Thou, the Good Mind, and the Sovereign Power!\n\nhear ye me all, and have mercy 8 for every deed which I do whatsoever 9 !\n\np.\n\n78 12.\n\nAnd Thou, O Ahura!\n\ndo Thou (Thyself) arise 1 to me!\n\nThrough Âramaiti give me power, O most bountiful Spirit Mazda!\n\nthrough (my) faithful appeals and offerings 2 ; and for (my) Righteousness grant me mighty strength, and (Thy) thrift-law 3 through (Thy) Good Mind 4 .\n\n13.\n\n(Arise to give me power), and then for grace in a wide perception 5 (that I may view its depth and extent), do Thou reveal to me Thy 6 nature (?), O Ahura!\n\n(the power of Thine attributes), and those of Thy (holy) kingdom, and by these, the blessed gifts 7 of (Thy) Good Mind!\n\nAnd do Thou, O bountiful Piety 8 show forth the religious truths through (Thy) Righteous Order.\n\np.\n\n79 14.\n\nThus, as an offering, Zarathu s tra gives the life 1 of his very body.\n\nAnd he offers, likewise, O Mazda!\n\nthe priority of the Good Mind, (his eminence gained) by his holiness (with Thy folk); and he offers (above all his) Obedience (to Thee) in deed and in speech, and with these (Thine established) Sovereign Power 2 !"

