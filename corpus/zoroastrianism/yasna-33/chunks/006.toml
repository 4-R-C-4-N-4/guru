[content]
body = "And do Thou, O bountiful Piety 8 show forth the religious truths through (Thy) Righteous Order.\n\np.\n\n79 14.\n\nThus, as an offering, Zarathu s tra gives the life 1 of his very body.\n\nAnd he offers, likewise, O Mazda!\n\nthe priority of the Good Mind, (his eminence gained) by his holiness (with Thy folk); and he offers (above all his) Obedience (to Thee) in deed and in speech, and with these (Thine established) Sovereign Power 2 !\n\nFootnotes 70:1 In this particular.\n\nAs to ceremonies it had at a later period more than its share of absurdities; but as to honest work as against 'foraging on the enemy' there is a great difference between the Gâthas, and some other ancient hymns, for instance the Ri ks of the Veda.\n\nIn fact these latter may be regarded as representing the opposite extreme.\n\n72:1 See XXIX, 1.\n\n72:2 See XXIX, 6, 8.\n\n72:3 So the Pahl.; and so also Roth (Z.D.M.G., vol.\n\nxxxvii.\n\n5, 223) taking mithahyâ as a nom.\n\npl.\n\n(comp.\n\nva k ahya).\n\nBut I am strongly inclined to a former view of my own.\n\nYêhyâ-mithahyâ look irresistibly like two genitives.\n\nI would render as an emphatic alternative 'what fraud he may lay hold of (h e myâsaitê with the gen.), reach (of the one), and what (seem) to him the righteous deeds (of the other).' But if Roth and the Pahlavi are right, we have here the origin of the later hamêstagã, the souls in the intermediate place between Heaven and Hell, whose sins and good works have been equal (West, Gloss.\n\nto M.\n\nî K.).\n\nThe Persian manuscript of Haug 12 b.\n\nhas: Kih i k (pro ham) û i ân ham rasîd êstêd ân i durû gh , kih i k (ham) û ân i ‘hâli s [kû, hamêstân].\n\n72:4 So the Pahlavi also indicates: Val valman î s apîr— k âshi s n.\n\nNer.\n\nuttamasya vâ âsvâdayanti dehina h .\n\n72:5 Literally, 'they are offering a gift to their own choice' (var = varena; comp.\n\nyâvarenâ).\n\n72:6 They are holding fast by the holy cause, and their vehemence in vengeance does not negative the fact that they are toiling in the love of Ahura.\n\nPahlavi: Pavan zak î lak dôshi s nŏ, Aûharmazd!\n\n73:1 Literally, 'with, or as, the kinsman.' 73:2 'With the true ally.' 73:3 See XXIX, 2: 'Let that pasture-giver whom ye would appoint for us, teaching by example and precept vohû vâstryâ, let him be on our sacred pastures, and on our side.' 73:4 The Pahlavi may be rendered as follows: He who affords increase to the righteous on account of the relationship [that is, something is given to him?] does so also on account of the labourer's duty, or class [that is, the labourer is to be considered as his own] Through the loyalty; that is, the loyal class, that which adheres to Aûharmazd, he has a thorough understanding as to what is (true) energy toward the herds."

