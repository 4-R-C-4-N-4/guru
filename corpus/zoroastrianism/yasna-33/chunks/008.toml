[content]
body = "The word 'âidûm' (sic) stood, as similar words so often stand, in his MS.\n\nas 'âi.\n\ndûm.' Deeply imbued with a superstitious regard for every letter, and with a public equally scrupulous, he saw no course before him but to translate each as best he could.\n\nHe chose to render 'âi' by an infinitive, preserving the root, and could only think of a form of 'dâ' for dûm (so also moderns in another case).\n\nMany writers, seeing such a step, cast away his paper, regarding themselves as absolved by such a 'blunder' from mastering his translations.\n\nBut a little honest labour will always bring one back to sounder exegesis.\n\nIn the next following verse we have identically the same form in another word, which he renders awkwardly but correctly, using dâ again, but as a proper auxiliary.\n\n76:1 To approach the offering of a praiser seems certainly an unnatural expression.\n\nI think that we are obliged to regard khshmâvatô as another way of saying Yourself rather than 'of Yours'; and if it equals 'Yourself' here, it may elsewhere; see XXXIV, 2, khshmâvatô vahmê, also XLIV, 1, nem e khshmâvatô.\n\nAll acknowledge mavaitê to mean 'to me.' Hübschmann, Casuslehre, s.\n\n200: 'dass ich mit frommem sinne an eure Verehrung, Mazda, gehen kann.' 76:2 It is curious that draonô seems to be in apposition here.\n\nThe word is used merely in the sense of offering in the later Avesta.\n\nIt might possibly mean 'possessions' here.\n\n76:3 See XXXII, 15.\n\nThere helping princes are spoken of 'as borne by the two (Haurvatâ t and Ameretatâ t ).' Here in immediate connection with the same two it is said: Let one bear the spirit of the two united chiefs.\n\nBy the term 'spirit,' which sounds so suspiciously modern, we must nevertheless understand very nearly what the word would mean in a modern phrase.\n\nBy these two leaders we may understand either G âmâspa and Vî s tâspa (XLIX, 9) or G âmâspa and Frashao s tra.\n\n(Compare yâvarenâ Frashao s tra G âmâspâ.) 76:4 'Let one bear them.' 76:5 Khvârîh mânîni s nŏ.\n\n76:6 The Pahlavi gives its evidence for an instrumental and for a less pronounced meaning than the one above.\n\n76:7 Hamkar d ârîh.\n\nIf the second kar is the root, the sense is figurative.\n\n77:1 Bûndakŏ.\n\n77:2 Pavan akvînŏ rûbânŏ.\n\n77:3 So more probably.\n\nSee the first person in verses 8 and 11.\n\n77:4 So the Pahlavi also, hû-zîvi s nîh.\n\n77:5 So the Pahlavi also: Pavan hanâ î lak dôshi s nŏ.\n\n'In Thy will' is here very weak.\n\n77:6 Nadûkîhi k î avŏ tanû [am yehabûn]; Ner.\n\ns ubha m tanau.\n\n77:7 Neryosangh: Let them continue to live well, and be prosperous in all things [ ] those females (yâ h most curiously) who are born thus [that is, come from elsewhere (and not from us)], and who are [gained over by myself]."

