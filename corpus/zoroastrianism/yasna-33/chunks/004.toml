[content]
body = "With a spirituality still deeper than his Semitic colleague, he asks, not to see the person of God, but His nature, and especially to be able to comprehend and bring home to his mind what the Sovereignty of God implies with its 'blessed rewards.' And he asks of Piety as first acquired, practised, and then speaking within him, to reveal the Gnosis, the Insight, that is, the Religion.\n\n14.\n\nAfter the fervent language of the previous verses we may accept verse 14 as a legitimate continuation.\n\nIts 'Zarathu s tra' may mean 'I' just as 'David' is used by the Psalmist for 'me.' And the language can mean nothing but a dedication of all that he is and has to God, his flesh, his body, his religious eminence, the obedience which he offers in word and deed, inspired by Righteousness, and the Kingdom which he has succeeded in saving and blessing.\n\n(I do not think that I have at all exaggerated the grasp and fervour of this section.\n\nLess could not be.\n\nsaid, if the words are to be allowed their natural weight.) p.\n\n72 Translation.\n\n1.\n\nAs by the laws of the primeval world, so will our spiritual chieftain act (that chief besought-for by the Kine 1 , and named as Zarathu s tra 2 by the Lord).\n\nDeeds most just he will do toward the wicked, as toward the righteous, and toward him whose deeds of fraud 3 and righteous deeds combine (in equal measure).\n\n2.\n\nYea, (he will act with justice but with vengeance, for) he who does evil to the wicked by word, or with thought (and plan), and (who therein does not dally, but toils labouring as) with both the hands, or he (again) who admonishes one for his good 4 , such as these are offering (a gift) to their religious 5 faith in the love (and with the approving view) of Ahura Mazda 6 ; (they are offering to conscience.) p.\n\n73 3.\n\n(And so may it be), O Ahura!\n\nLet the man who is the best toward the righteous saint, whether lord's kinsman 1 , or as village labourer, with the allied 2 peer (of the master), having light, and endowed with energy for the cattle (a Ratu such as Ahura sought to satisfy their wail), let such an one be (for us) 3 in the work-field of the Righteous Order, in the pastures of Thy Good Mind 4 .\n\n4.\n\n(And I beseech for Thine instruction), I who will abjure 5 all disobedience (toward Thee, praying that others likewise may withhold it) from Thee; I who abjure the Evil Mind as well, the lordly kinsman's arrogance 6 , and that lying sin which is (alas!) the next thing to the people 7 (their most familiar fault), and the blaming ally's falsehood, and from the Kine the worst care of her meadows 8 (the crime of stint in labour 9 ), p.\n\n74 5.\n\nI, who (abjuring these sins), call earnestly on Thine Obedience of all (assisting guardians) the greatest one for our help 1 , gaining (thereby 2 ) long life in the Realm of (Thy) Good Mind (incarnate in our tribes), and paths that are straight from their Righteous Order, wherein Ahura Mazda dwells 3 , 6."

