[content]
body = "1.\n\nAs by the laws of the primeval world, so will our spiritual chieftain act (that chief besought-for by the Kine 1 , and named as Zarathu s tra 2 by the Lord).\n\nDeeds most just he will do toward the wicked, as toward the righteous, and toward him whose deeds of fraud 3 and righteous deeds combine (in equal measure).\n\n2.\n\nYea, (he will act with justice but with vengeance, for) he who does evil to the wicked by word, or with thought (and plan), and (who therein does not dally, but toils labouring as) with both the hands, or he (again) who admonishes one for his good 4 , such as these are offering (a gift) to their religious 5 faith in the love (and with the approving view) of Ahura Mazda 6 ; (they are offering to conscience.) p.\n\n73 3.\n\n(And so may it be), O Ahura!\n\nLet the man who is the best toward the righteous saint, whether lord's kinsman 1 , or as village labourer, with the allied 2 peer (of the master), having light, and endowed with energy for the cattle (a Ratu such as Ahura sought to satisfy their wail), let such an one be (for us) 3 in the work-field of the Righteous Order, in the pastures of Thy Good Mind 4 .\n\n4.\n\n(And I beseech for Thine instruction), I who will abjure 5 all disobedience (toward Thee, praying that others likewise may withhold it) from Thee; I who abjure the Evil Mind as well, the lordly kinsman's arrogance 6 , and that lying sin which is (alas!) the next thing to the people 7 (their most familiar fault), and the blaming ally's falsehood, and from the Kine the worst care of her meadows 8 (the crime of stint in labour 9 ), p.\n\n74 5.\n\nI, who (abjuring these sins), call earnestly on Thine Obedience of all (assisting guardians) the greatest one for our help 1 , gaining (thereby 2 ) long life in the Realm of (Thy) Good Mind (incarnate in our tribes), and paths that are straight from their Righteous Order, wherein Ahura Mazda dwells 3 , 6.\n\n(Yea), I who, as this Thy faithful priest, invoke Thee through (my) Righteousness, (now) seek 4 with longing from (Thy) Best Spirit, and with that 5 (best) intention of mind, (to know) what 6 he himself thought of the working of (our) fields 7 .\n\nTherefore (because I abjure the Evil Mind, and all disobedience, p.\n\n75 arrogance, falsehood), O Mazda!\n\nwould I beseech of Thee for a sight of Thee, and for consultation with Thee!\n\n(What is Thy will and mind?) 7.\n\nCome Ye, then, to my best (regulations.\n\nCome to my men, and my laws 1 ), my very own, O Mazda!\n\nand let them see through the Righteous Order and (Thy) Good Mind (which Thou wilt bestow in Thy drawing near) how I am heard before the rich giver 2 (in the assembly of Thy worshippers).\n\nYea, (come Ye); and let the manifold offerings of worship be manifest among us 3 .\n\n(Arouse Ye, and help our zeal 4 !) p.\n\n76 8.\n\n(Come Ye) and show me the worthy aims of our faith, so that I may approach and fulfil them with (Thy) Good Mind, the offering, O Mazda!"

