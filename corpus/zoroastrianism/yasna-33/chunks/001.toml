body = "Sacred Texts Zoroastrianism Index Previous Next Buy this Book at Amazon.com The Zend Avesta, Part III (SBE31) , L.H.\n\nMills, tr.\n\n[1886], at sacred-texts.com p.\n\n68 YASNA XXXIII.\n\nPRAYERS, HOPES, AND SELF-CONSECRATION.\n\nBrighter times seem to have arrived.\n\nThe vengeance so confidently promised in the close of XXXII is described as near at hand.\n\nIn fact the first three verses seem to belong as much to XXXII as to the present chapter.\n\nThey remind one of the choruses of attending saints, or 'Immortals,' in XXIX, perfectly germane to the connection, but referring in the third person to a speaker who closes the last chapter with a first, and who begins again with a first in verse 4.\n\nThe propriety of a division of chapters here rests upon the fact that the thought comes to a climax at XXXII, 16, beginning afresh at XXXIII, 4.\n\nWhether Zarathu s tra, or the chief composer, whatever his name may have been, composed these three verses relating, as they do, to himself, and put them into the mouth of another, or whether their grammatical form indicates another author, is difficult to determine.\n\nI doubt very greatly whether either the expressions 'I approach,' 'I offer,' &c., or the words 'he will act,' 'let him be in Asha's pastures,' are at all meant to express more than some modern hymns which use 'I' and 'he.\n\n' Both are in constant employment in anthology with no change in the person indicated.\n\n'I' and Thy servant' are merely verbal variations.\n\nHere, however, the change is somewhat marked by the allusion to the chastisement of the wicked just previously mentioned in XXXII, 16 .\n\n1.\n\nIt is to be noticed that the strictest canon with the original, as indeed with the later, Zarathu s trians of the Avesta was the 'primeval law.' Unquestionably the precepts understood as following from the dualistic principle were intended; that is to say, no trifling with any form of evil, least of all with a foreign creed, was to be tolerated.\n\nAhura has no share in the evolution of anything corrupt.\n\nWe may even add that He had no power to prevent either sin or sorrow, although He possessed all conceivable power to oppose them.\n\nAccording to these fundamental laws, then, the Ratu is said to act, as sternly severe upon the evil as he is beneficent to the saint.\n\n2.\n\nThe fierce hostilities hitherto pursued are more than justified.\n\nThe injury of the wicked by denouncing, planning, or by physical violence, is on a par with advising the good.\n\nThey who pursue the enemies of Ahura are actually operating in love to God, and sacrificing to religion itself.\n\np.\n\n69 3.\n\nAnd accordingly the reciter is made to pray in this immediate connection for a sincere and useful friend (a vahi s ta) to the believer, to whichever class he may belong, whether chief, allied peer, or villager, a friend spiritually enlightened (vîdãs), and, according to Ahura's prescript (XXIX, 2), keen, persevering, and brave in the cultivation of cattle (thwakhshanghâ gavôi).\n\n'Let such an one as this, so asked for by the Lord himself, so needed by the Kine, let him,' he prays, 'be supported in his holy toil for us.\n\nLet him till and tend, not in the pastures of our valleys only, but in the spiritual pastures of the Divine Benevolence where the mystic kine is grazing.' 4."

