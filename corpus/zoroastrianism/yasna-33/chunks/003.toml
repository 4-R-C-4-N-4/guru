[content]
body = "And as his useful deeds in reclaiming, irrigating, and cultivating land, were justly ranked among the first services of a human being, and as the last preparation of the gathered grain was perhaps humorously, but yet pungently, said to make the Daêvas start, and shriek, and fly (see Vendîdâd III, 32, Sp.\n\n165), and as further, a life from the fruits of the earth to this day constitutes the main difference between those who live by murderous theft and those who live honestly in nearly the same regions, I think we may not only see no bathos here, but on the contrary admire the robust sense of this early religion 1 , and say that a knowledge as to a true policy in the department of agriculture was one of the wisest possible desires, and the most of all things worthy of a 'sight of Mazda and of consultation with Him.' How the fields had better be worked, and how the people could best be kept from bloody freebooting as aggressors or as victims, this involved Ahura's Righteous Order, Benevolence, Power, and Piety, the four energising Immortals all at once.\n\nAnd this only could secure the other two rewarding personifications, Welfare and Immortality.\n\n7.\n\nHaving prayed for that which is the first virtue of civilised existence, work (verezyêidyâi), he proceeds to further petitions.\n\n'Come Ye,' he beseeches in Vedic fashion.\n\nCome Ye, O Ahura, Asha, and Vohu Manah l and behold the attentive monarch, the leading Magavan, as he listens to my instructions with the other p.\n\n71 chiefs, and the thronging masses.\n\nAnd let too the sacrificial gifts pour in for offering and worship.\n\n8.\n\nHe rests at no bare morality for the simple multitude.\n\nHe knows too well the human foible, therefore he asks with vigour for sacrifice and hymn.\n\n9.\n\nEncouraging the two pious chiefs whose souls go hand in hand, he prays that an influence like that of the 'eternal two' might bear their 'spirit' (sic) to the shining home of Paradise, it having attained to perfection by the help of the Best Mind of God within it.\n\n(For mainyu in this sense compare XLIV, 11.) 10.\n\nAsking of Mazda to grant in His love (or 'by His will') all the happy phases of life which have been, or which shall ever be experienced, he prays that their bodies, that is, their persons, as separate accountable individuals (compare nar e m narem h v ahyâi tanuyê) might flourish in the graces of the Good Mind, the Holy Sovereignty, and the Sacred Order, till they were blessed with the u s tâ, the summum bonum.\n\n11.\n\nHe here prays all the grand abstractions, Piety, the Righteous Order (which alone can 'push on' the settlements), the Good Mind of God within His people, and His kingdom, to turn their mental ears and listen, and listening to pardon.\n\n12.\n\nAnd specifying the one central object of desire, the Thrift-law, the Avesta of the Ratu, or Saoshya n t, he asks Ahura to arise to his help and give him spiritual strength by sustaining him through the inspiring Righteousness and the Good Mind, in an effective invocation.\n\n13."

