[content]
body = "Thus Vohûman (a good mind) is a workman with him to whom Righteousness also belongs.\n\n73:5 Hübschm.\n\nCasuslehre, 'der ich von dir den Ungehorsam and schlechten Sinn durch Gebet abwenden will' (s.\n\n180).\n\n73:6 Observe that h v aêtu certainly designates an upper class.\n\nWhy else arrogance?\n\n73:7 Possibly this severity was the cause of the later high reputation of the Zarathu s trians for veracity.\n\n73:8 Literally, 'from the pasture of the Kine.' 73:9 The Pahlavi may be rendered: Him who will not listen to p.\n\n74 Thee, O Aûharmazd!\n\nwill I abjure, and Akôman also, for by him there is the despising of relations, and the deception of the labouring men who live close at hand [that is, of neighbours].\n\nAnd he is ever bringing censure upon the clients.\n\nAnd he holds to the lowest measure of duty toward the Herd.\n\n74:1 Avanghâ n e , or avanghânê, an infinitive (see Wilhelm, de Infin.\n\np.\n\n16).\n\nThe Pahlavi has avŏ aîyyârîh.\n\n74:2 Sraosha (= listening obedience) is the greatest for help, because by a Mãthra which appeals to him the way to Ahura is found out (XXVIII, 6) and the Demon defeated.\n\nIf apânô is read, so strictly.\n\nThe Pahlavi translator seems to have understood apâ n e ; barâm ayâfînâi pavan dêr-zîvi s nîh, zak î pavan khû d âyîh î Vohûman.\n\nNer.: Avâpaya dîrghe g îvitatve.\n\nThis may well restore for us the proper text.\n\nReading apâ n e we should render 'obtain for us.' 74:3 Ahura Mazda dwells as in His abode amid the paths where His saints walk (see XLVI, 16).\n\n74:4 So also indicated by bavîhûnê d .\n\nKayâ properly refers to ye.\n\n74:5 The Pahlavi translator seems to have seen an imperative in avâ, rendering it freely aîyyârînê d ŏ.\n\n74:6 Yâ may be an instr.\n\nsing.\n\nor an acc.\n\npl.\n\nneut.\n\n'I ask what he thought meet to be done;' yâ does not necessarily equal yen, in every instance.\n\n74:7 I need hardly remind the reader that agriculture was the great question of orderly and religious life with the Zarathu s trians.\n\nWithout it there was of course no resource but wandering and plunder for them.\n\n75:1 So I render from the context.\n\nOtherwise see tâ tôi izyâ in the previous verse.\n\n75:2 I was formerly inclined to understand Ahura here, Indian usage permitting.\n\n(Indra and other Gods are maghavan.) But modern authority, aided by the ancient Pahlavi translator, brings me to a better mind.\n\nThe Pahlavi has pavan fravôn magîh.\n\nIt is better to refer the word to the disciple.\n\nThe more prominent members of the congregation are meant.\n\n75:3 Ner.\n\nrenders the last line thus: And may these offerings be manifest in the midst of us, and accompanied with (sincerest) worship.\n\n75:4 There are certain cases where allowance for an ancient scholar working under great disadvantages becomes a critical necessity.\n\nHere the Pahlavi translator was clearly the victim of a manuscript."

