[content]
body = "p. 15 RECORDS OF ANCIENT MATTERS [SECT. I.—THE BEGINNING OF HEAVEN AND EARTH.] The names of the Deities 1 that were born 2 in the Plain of High Heaven 3 when the Heaven and Earth began were the Deity Master-of-the-August-Centre-of-Heaven, 4 next the High-August-Producing-Wondrous Deity, 5 next the Divine-Producing-Wondrous-Deity. 6 These three Deities were all Deities born alone, and hid their persons. 7 The names of the Deities that were born next from a thing that sprouted up like unto a reed-shoot when the earth, 8 young and like unto floating oil, drifted about medusa-like, were the Pleasant-Reed-Shoot-Prince-Elder Deity, 9 next the Heavenly-Eternally-Standing-Deity. 10 [16] These two Deities were likewise born alone, and hid their persons. The five Deities in the above list are separate Heavenly Deities. 11 p. 16"

