[content]
body = "And wherever (under the form of intelligence, reason, sensation, nutrition, growth, or any mode whatsoever) you find life or the 146 Principle of life or the Essence of life, there you find that which lives and imparts life from the Life transcending all life, and indivisibly 397 397 Since Eternal Life is undifferentiated, all things have in It a common or identical life, as all plants and animals have a common life in the air they breathe.\n\npre-exists therein as in its Cause.\n\nFor the Supra-Vital and Primal Life is the Cause of all Life, and produces and fulfils it and individualizes it.\n\nAnd we must draw from all life the attributes we apply to It when we consider how It teems with all living things, and how under manifold forms It is beheld and praised in all Life and lacketh not Life or rather abounds therein, and indeed hath Very Life, and how it produces life in a Supra-Vital manner and is above all life 398 398 See p.\n\n144, n.\n\ni.\n\nand therefore is described by whatsoever human terms may express that Life which is ineffable.\n\n392 The Godhead, though called Eternal Life, is really supra-vital, because life implies differentiations, and the Godhead as such is undifferentiated.\n\nThis Supra-Vitality passes out through the Differentiated persons of the Trinity into Very Life, whence life is derived to all the creatures.\n\n393 Ps.\n\nciv.\n\n29, 30 .\n\n394 i.\n\ne.\n\nThe ultimate Principle.\n\n395 Simon denied the Resurrection of the Body.\n\nVide Irenæus, Origen, Hippolytus, Epiphanius.\n\n396 Physical life has behind it Eternal Life, by which it is in the true sense natural for it to be renewed and transformed.\n\n397 Since Eternal Life is undifferentiated, all things have in It a common or identical life, as all plants and animals have a common life in the air they breathe.\n\n398 See p.\n\n144, n.\n\ni."

