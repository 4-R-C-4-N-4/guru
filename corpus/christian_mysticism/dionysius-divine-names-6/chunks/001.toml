[content]
body = "144 CHAPTER VI Concerning ” Life .” 1.\n\nNow must we celebrate Eternal Life as that whence cometh very Life and all life, 392 392 The Godhead, though called Eternal Life, is really supra-vital, because life implies differentiations, and the Godhead as such is undifferentiated.\n\nThis Supra-Vitality passes out through the Differentiated persons of the Trinity into Very Life, whence life is derived to all the creatures.\n\nwhich also endues every kind of living creature with its appropriate meed of Life.\n\nNow the Life of the immortal Angels and their immortality, and the very indestructibility of their perpetual motion, exists and is derived from It and for Its sake.\n\nHence they are called Ever-living and Immortal, and yet again are denied to be immortal, because they are not the source of their own immortality and eternal life, but derive it from the creative Cause which produces and maintains all life.\n\nAnd, as, in thinking of the title “Existent,” we said that It is an Eternity of very Being, so do we now say that the Supra-Vital or Divine Life is the Vitalizer and Creator of Life.\n\nAnd all life and vital movement comes from the Life which is beyond all Life and beyond every Principle of all Life.\n\nThence have souls their indestructible quality, and all animals and plants possess their life as a far-off reflection of that Life.\n\nWhen this is taken away, as saith the Scripture, all life fades; 393 393 Ps.\n\nciv.\n\n29, 30 .\n\nand those which have faded, through being unable to participate therein, when they turn to It again revive once more.\n\n2.\n\nIn the first place It gives to Very Life its vital quality, and to all life and every form thereof It gives the Existence appropriate to each.\n\nTo the celestial forms of life it gives their immaterial, godlike, and 145 unchangeable immortality and their unswerving and unerring perpetuity of motion; and, in the abundance of its bounty, It overflows even into the life of the devils, for not even diabolic life derives its existence from any other source, but derives from This both its vital nature and its permanence.\n\nAnd, bestowing upon men such angelic life as their composite nature can receive, in an overflowing wealth of love It turns and calls us from our errors to Itself, and (still Diviner act) It hath promised to change our whole being (I mean our souls and the bodies linked therewith) to perfect Life and Immortality, which seemed to the ancients unnatural, but seems to me and thee and to the Truth a Divine and Supernatural thing: Supernatural, I say, as being above the visible order of nature around us, not as being above the Nature of Divine Life.\n\nFor unto this Life (since it is the Nature of all forms of life, 394 394 i.\n\ne.\n\nThe ultimate Principle.\n\nand especially of those which are more Divine) no form of life is unnatural or supernatural.\n\nAnd therefore fond Simon’s captious arguments 395 395 Simon denied the Resurrection of the Body.\n\nVide Irenæus, Origen, Hippolytus, Epiphanius.\n\non this subject must find no entry into the company of God’s servants or into thy blessed soul.\n\nFor, in spite of his reputed wisdom, he forgot that no one of sound mind should set the superficial order of sense-perception against the Invisible Cause of all things.\n\n396 396 Physical life has behind it Eternal Life, by which it is in the true sense natural for it to be renewed and transformed.\n\nWe must tell him that if there is aught “against Nature” ‘tis his language.\n\nFor naught can be contrary to the Ultimate Cause.\n\n3.\n\nFrom this Source all animals and plants receive their life and warmth."

