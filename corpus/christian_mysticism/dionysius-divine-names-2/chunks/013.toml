[content]
body = "καὶ τῆς εἰρημένης ἑνώσεως ἴδια καὶ αὖθις τῆς διακρίσεως εἶνάι τινας ἰδικὰς καὶ ἱνώσεις καὶ διακρίσεις.\n\nThis, as it stands, must be translated: “They say that certain qualities belong to the said Undifference, and that to Differentiation, on the other hand, belong certain principles of Unity and principles of Differentiation.” This would mean that the Persons of the Trinity, though distinct from Each Other, yet have a Common Unity, or else that Each has a Unity of Its Own making It distinct from the Other Persons.\n\nI have ventured, however, to emend the text by omitting the last six words and making the sentence end at εἶναι .\n\nI believe the last six words have crept in from a marginal gloss or variant, which ran (I imagine) as follows:— εἶναί τινας ἰδικὰς κ.τ.λ.\n\n.\n\nIf the MS.\n\nbelonged to a family having seventeen or eighteen letters to a column the εἶναι after διακρίσεως would end a line, since there are 571 letters from the beginning of the chapter to the end of that word.\n\nHence it would easily be confused with the εἶναι at the beginning of the gloss, which would thus creep into the text.\n\nAnd, since the added words amount to thirty-four letters, they would exactly fill two lines, thus making the interpolation easier.\n\nFor the meaning, see Intr., p.\n\n6f.\n\n191 Cf.\n\nMyst.\n\nTheo1.\n\nI.\n\n2.\n\nThis universal Affirmation is not pantheism because evil, as such, is held to be non-existent.\n\nIt is only all goodness that is affirmed of God, though He surpasses it.\n\nGod is present in all things, but not equally in all.\n\n192 “Yes” implies the possibility of “No,” and “No” the possibility of “Yes.” Thus “Yes” and “No” belong to the relative world.\n\nGod’s absolute existence is beyond such antithesis.\n\nSee Intr., p.\n\n4f.\n\n193 The Persons, though fused, are yet not confused because the Godhead transcends unity.\n\nSee Intr., p.\n\n5.\n\n194 Material things are merged by being united (e.\n\ng.\n\ndrops of water).\n\nSouls or angels being united through love (whereby they participate in God) are not merged but remain distinct even while being, as it were, fused into a single spiritual unity more perfect than the fusion of water with wine.\n\nThe Persons of the Trinity are still more perfectly united and at the same time still more utterly distinct.\n\n195 Two kinds of Differentiation: (1) Distinctness of Existence, (2) Difference of Functions.\n\n196 D.\n\nmeans that the Undifferentiated Godhead is actually present in all these creative activities.\n\nIt is multiplied (as it were) in Its energies, and yet It remains indivisible.\n\nSee Intr., p.\n\n17.\n\n197 D.\n\nhere touches on the fundamental difference between spiritual and material things.\n\nCf.\n\nShelley: “True love has this different from gold or clay that to divide is not to take away.” 198 Plotinus uses the same illustration (Enn.\n\niv.\n\n1).\n\n199 D.\n\nis always on his guard against Pantheism."

