body = "Their ultimate nature, which they possess in their own original being, is beyond Mind and beyond all Being and Knowledge.\n\n203 203 Even the Differentiations finally lead us up into the Undifferenced Godhead Where they transcend themselves.\n\n(Cf.\n\np.\n\n70, n.\n\n3 and the passage in ii.\n\n4 about the torches.) Into that region we cannot track them.\n\nBut on the other side they flow out into creative activity, and thus are, in some degree, revealed.\n\nFor instance, if we call the Super-Essential Mystery by the Name of “God,’’ or “Life,” or “Being,” or “Light,” or “Word,” we conceive of nothing else than the powers that stream Therefrom to us bestowing Godhead, Being, Life or Wisdom; 204 204 These terms may be thus classified:— Sphere of Activity.\n\nNature of Gift.\n\nForm under which Giver is manifested (i) Grace.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nGodhead .\n\n“God” (ii) Nature (1) Material existence.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nBeing .\n\n“Being” } “Word.” (2) Vegetable and animal existence.\n\n.\n\n.\n\nLife .\n\n“Life” (3) Human existence.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nWisdom .\n\n“Light” while that Mystery Itself we strive to apprehend by casting aside all the activities of our mind, since we behold no Deification, 205 205 The doctrine of “Deification” is not a mere speculation.\n\nIt embodies an experienced fact.\n\nSee Intr., p.\n\n43.\n\nor Life, or Being, which exactly resembles the altogether and utterly Transcendent Cause of all things.\n\nAgain, that the Father is Originating Godhead while Jesus and the Spirit are (so to speak) Divine Off-shoots of the Paternal Godhead, and, as it were, Blossoms and Super-Essential Shinings Thereof we learn from Holy Scripture; but how these things are so we cannot say, nor yet conceive.\n\n8.\n\nJust so far can the powers of our .minds attain as to see that all spiritual paternity and sonship is a gift bestowed from the all-transcendent Archetypal Fatherhood and Sonship both upon us and also upon the celestial Powers: whereby Godlike Minds receive 75 the states and names of Gods, and Sons of Gods, and Fathers of Gods, such paternity and sonship being perfected in a spiritual manner ( i.\n\ne.\n\nincorporeally, immaterially, and invisibly) because the Divine Spirit setteth above all invisible Immateriality and Deification, and the Father and the Son, supernaturally transcend all spiritual fatherhood and sonship.\n\n206 206 The act by which one spirit or soul imparts spiritual life to another is a manifestation in time of a Mystery which is eternally perfect in the Trinity, and would be impossible were it not ultimately rooted in that Mystery.\n\nJust as all life draws its existence from the Divine supra-vitality, so all spiritual paternity draws its existence from the Divine supra-paternity.\n\nFor there is no exact similitude between the creatures and the Creative Originals; 207 207 τὰ αἴτια—i.e.\n\nThe Persons of the Godhead.\n\nfor the creatures possess only such images of the Creative Originals as are possible to them, while the Originals Themselves transcend and exceed the creatures by the very nature of Their own Originality.\n\nTo employ human examples, we say that pleasant or painful conditions produce in us feelings of pleasure or pain while yet they possess not these feelings themselves; and we do not say that the fire which warms and burns is itself burnt or warmed."

