body = "and Manifestations; and following the Holy Scripture they declare that some Attributes belong especially to Undifference, and some, on the other hand, to Differentiation.\n\n190 190 The received text reads: Φᾶσι .\n\n.\n\n.\n\nκαὶ τῆς εἰρημένης ἑνώσεως ἴδια καὶ αὖθις τῆς διακρίσεως εἶνάι τινας ἰδικὰς καὶ ἱνώσεις καὶ διακρίσεις.\n\nThis, as it stands, must be translated: “They say that certain qualities belong to the said Undifference, and that to Differentiation, on the other hand, belong certain principles of Unity and principles of Differentiation.” This would mean that the Persons of the Trinity, though distinct from Each Other, yet have a Common Unity, or else that Each has a Unity of Its Own making It distinct from the Other Persons.\n\nI have ventured, however, to emend the text by omitting the last six words and making the sentence end at εἶναι .\n\nI believe the last six words have crept in from a marginal gloss or variant, which ran (I imagine) as follows:— εἶναί τινας ἰδικὰς κ.τ.λ.\n\n.\n\nIf the MS.\n\nbelonged to a family having seventeen or eighteen letters to a column the εἶναι after διακρίσεως would end a line, since there are 571 letters from the beginning of the chapter to the end of that word.\n\nHence it would easily be confused with the εἶναι at the beginning of the gloss, which would thus creep into the text.\n\nAnd, since the added words amount to thirty-four letters, they would exactly fill two lines, thus making the interpolation easier.\n\nFor the meaning, see Intr., p.\n\n6f.\n\nFor instance, they say concerning the Divine Unity, or Super-Essence, that the undivided Trinity holds in a common Unity without distinction Its Subsistence beyond Being, Its Godhead beyond Deity, Its Goodness beyond Excellence; 70 the Identity, surpassing all things, of Its transcendently Individual Nature; Its Oneness above Unity; Its Namelessness and Multiplicity of Names; Its Unknowableness and perfect Intelligibility; Its universal Affirmation 191 191 Cf.\n\nMyst.\n\nTheo1.\n\nI.\n\n2.\n\nThis universal Affirmation is not pantheism because evil, as such, is held to be non-existent.\n\nIt is only all goodness that is affirmed of God, though He surpasses it.\n\nGod is present in all things, but not equally in all.\n\nand universal Negation in a state above all Affirmation and Negation, 192 192 “Yes” implies the possibility of “No,” and “No” the possibility of “Yes.” Thus “Yes” and “No” belong to the relative world.\n\nGod’s absolute existence is beyond such antithesis.\n\nSee Intr., p.\n\n4f.\n\nand that It possesses the mutual Abiding and Indwelling (as it were) of Its indivisibly supreme Persons in an utterly Undifferentiated and Transcendent Unity, and yet without any confusion 193 193 The Persons, though fused, are yet not confused because the Godhead transcends unity.\n\nSee Intr., p.\n\n5."

