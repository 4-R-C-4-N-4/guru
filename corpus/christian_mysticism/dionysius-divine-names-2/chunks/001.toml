body = "65 CHAPTER II Concerning the Undifferencing and the Differentiation in Divinity, and the Nature of Divine Unification and Differentiation.\n\n166 166 περὶ ἡνωμένης καὶ διακεκριμένης θεολογίας καὶ τίς ἡ θεία ἕνωσις καὶ διάκρισις.\n\nI.\n\n’ Tis the whole Being of the Supernal Godhead (saith the Scripture) that the Absolute Goodness hath defined and revealed.\n\n167 167 The point of this section is that God’s Nature is not a sum total of separate Attributes.\n\nTherefore when we say that the Scriptural titles of God are only symbols and that the ultimate Godhead transcends them, we do not mean that they express only a part of His Nature (for His Nature has no parts), but that they dimly suggest His whole Nature.\n\nHence, too, we cannot say that some of God’s titles belong only to one separate Person of the Trinity and others only to the other Persons severally—e.\n\ng.\n\nThe Trinity, and not the Father alone, is the Creator of the world.\n\n“The one world was made by the Father, through the Son, in the Holy Ghost” (St.\n\nAug., Com.\n\non St.\n\nJohn, Tr.\n\nXX.\n\n9).\n\nFor in what other sense may we take the words of Holy Writ when it tells us how the Godhead spake concerning Itself, and said: “Why asketh thou me concerning the good?\n\nNone is good save one, that is, God.” 168 168 The title “Good ” is applied to the whole Godhead.\n\nAnd if that title, then others too.\n\nCf.\n\nMatt.\n\nxix.\n\n17 .] Now this matter we have discussed elsewhere, and have shown that all the Names proper to God are always applied in Scripture not partially but to the whole, entire, full, complete Godhead, and that they all refer indivisibly, absolutely, unreservedly, and wholly to all the wholeness of the whole and entire Godhead.\n\nIndeed (as we made mention in the Outlines of Divinity), if any one deny that such utterance refers to the whole Godhead, he blasphemeth and profanely dares to divide the Absolute and Supreme Unity.\n\nWe must, then, take them as referring unto the entire Godhead.\n\nFor not only did the goodly Word Himself say: “I am Good,” 169 169 John x.\n\n11 .\n\nbut 66 also one of the inspired prophets speaks of the Spirit as Good.\n\n170 170 Ps.\n\ncxliii.\n\n10 .\n\nThis is a further argument arising out of what has been said above.\n\nThe point here is that we cannot limit the title “Good” to one Person of the Trinity.\n\n(The notion that the Father is stern and the Son mollifies His sternness is false.) The rest of the section takes other titles and shows how they are common to all Three Persons of the Trinity.\n\nSo, too, of the words “I Am that I Am.” 171 171 Ex.\n\niii.\n\n14 .\n\nIf, instead of applying these to the whole Godhead, they wrest them to include only one part Thereof, how will they explain such passages as: “Thus saith He that is and was and is to come, the Almighty,” 172 172 Rev.\n\ni.\n\n4 .\n\nor: “Thou art the same,” 173 173 Ps.\n\ncii.\n\n27 .\n\nor “The Spirit of Truth that is, and that proceedeth from the Father”?\n\n174 174 John xv.\n\n26 ."

