[content]
body = "Yea, ‘tis a common and undifferenced activity of the whole Godhead that It is wholly and entirely communicated unto each of them that share It and unto none merely in part; 197 197 D.\n\nhere touches on the fundamental difference between spiritual and material things.\n\nCf.\n\nShelley: “True love has this different from gold or clay that to divide is not to take away.” even as the centre of a circle is shared by all the radii which surround it in a circle; 198 198 Plotinus uses the same illustration (Enn.\n\niv.\n\n1).\n\nand as there are many impressions of a seal all sharing in the seal which is their archetype while yet this is entire, nor is it only a part thereof that belongeth unto any of them.\n\nBut the Incommunicable All-creative Godhead transcends all such symbols in that It is beyond Apprehension nor hath It any other mode of communion such as to join It unto the participants.\n\n199 199 D.\n\nis always on his guard against Pantheism.\n\nPerhaps, however, some one will say: “The seal is not entire and the same in all the printed copies.” I answer that this is not due to the seal itself (for it gives itself wholly and identically to each), but the difference of the substances which share it makes the impressions of the one, entire, identical archetype to be different.\n\nFor instance, if they are soft, plastic, and smooth, and have no print already, and are neither hard and resistent, nor yet melting and unstable, the imprint will be clear, plain, and permanent; 73 but if the aforesaid fitness should in aught be lacking, then the material will not take the impression and reproduce it distinctly, and other such results will follow as an unsuitable material must bring about.\n\n6.\n\nAgain, it is by a Differentiated act of God’s benevolence that the Super-Essential Word should wholly and completely take Human Substance of human flesh and do and suffer all those things which, in a special and particular manner, belong to the action of His Divine Humanity.\n\nIn these acts the Father and the Spirit have no share, except of course that they all share in the loving generosity of the Divine counsels and in all that transcendent Divine working of unutterable mysteries which were performed in Human Nature by Him Who as God and as the Word of God is Immutable.\n\n200 200 Redemption is a work performed by the whole Trinity through the Second Person.\n\n(So, too, is Creation.\n\nCf.\n\np.\n\n65, n.\n\n2).\n\nSo do we strive to differentiate the Divine Attributes, according as these Attributes are Undifferenced or Differentiated.\n\n201 201 i.\n\ne.\n\nWe strive to distinguish the two planes of Being in God.\n\nCf.\n\nAthan.\n\nCreed: “Neither confounding the Persons,” etc.\n\n7.\n\nNow all the grounds of these Unifications, and Differentiations in the Divine Nature which the Scriptures have revealed to us, we have explained in the Outlines of Divinity, to the best of our abilities, treating separately of each.\n\nThe latter class we have philosophically unravelled and unfolded, and so have sought to guide the holy and unspotted mind to contemplate the shining truths of Scripture, while the former class we have endeavoured (in accordance with Divine Tradition) to apprehend as Mysteries in a manner beyond the activities of our minds.\n\n202 202 Undifference belongs to the ultimate Godhead, Differentiation to the distinction between the Three Persons of the Trinity.\n\nThe former is the sphere of Mystical Theology, the latter is that of Dogmatic Theology.\n\nThe former implies the Via Negativa the latter the Via Affirmativa.\n\nFor 74 all Divine things, even those that are revealed to us, are only known by their Communications."

