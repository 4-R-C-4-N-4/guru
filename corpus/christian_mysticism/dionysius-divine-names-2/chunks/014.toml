body = "200 Redemption is a work performed by the whole Trinity through the Second Person.\n\n(So, too, is Creation.\n\nCf.\n\np.\n\n65, n.\n\n2).\n\n201 i.\n\ne.\n\nWe strive to distinguish the two planes of Being in God.\n\nCf.\n\nAthan.\n\nCreed: “Neither confounding the Persons,” etc.\n\n202 Undifference belongs to the ultimate Godhead, Differentiation to the distinction between the Three Persons of the Trinity.\n\nThe former is the sphere of Mystical Theology, the latter is that of Dogmatic Theology.\n\nThe former implies the Via Negativa the latter the Via Affirmativa.\n\n203 Even the Differentiations finally lead us up into the Undifferenced Godhead Where they transcend themselves.\n\n(Cf.\n\np.\n\n70, n.\n\n3 and the passage in ii.\n\n4 about the torches.) Into that region we cannot track them.\n\nBut on the other side they flow out into creative activity, and thus are, in some degree, revealed.\n\n204 These terms may be thus classified:— Sphere of Activity.\n\nNature of Gift.\n\nForm under which Giver is manifested (i) Grace.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nGodhead .\n\n“God” (ii) Nature (1) Material existence.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nBeing .\n\n“Being” } “Word.” (2) Vegetable and animal existence.\n\n.\n\n.\n\nLife .\n\n“Life” (3) Human existence.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nWisdom .\n\n“Light” 205 The doctrine of “Deification” is not a mere speculation.\n\nIt embodies an experienced fact.\n\nSee Intr., p.\n\n43.\n\n206 The act by which one spirit or soul imparts spiritual life to another is a manifestation in time of a Mystery which is eternally perfect in the Trinity, and would be impossible were it not ultimately rooted in that Mystery.\n\nJust as all life draws its existence from the Divine supra-vitality, so all spiritual paternity draws its existence from the Divine supra-paternity.\n\n207 τὰ αἴτια—i.e.\n\nThe Persons of the Godhead.\n\n208 So St.\n\nAugustine constantly teaches that God acts not in the manner which we call activity, but by causing the creature itself to perform the action.\n\nThus he explains God’s rest on the Seventh Day to mean not that God Himself rested but that the creation now rested in Him.\n\nAristotle and his disciple, St.\n\nThomas, teach that God moves all things simply through being desired by them.\n\nSo God causes action without Himself acting (somewhat as fire causes warmth without feeling it).\n\nCf.\n\np.\n\n87, n.\n\n1.\n\n209 ὑπερφυῶς.\n\nThe proper meaning of ὑπερφυής in the Dionysian writings appears to be “supernatural.” 210 οὺ μόνον μαθὼν ἀλλὰ καὶ παθὼν τὰ θεῖα.\n\n211 πρὸς τὴν ὰδιδακτὸν αὐτῶν καὶ μυστικὴν ἀποτελεσθεὶς ἕνωσιν καὶ πίστιν.\n\n212 Being beyond Unity the Godhead is, of course, beyond the categories of whole and part.\n\nThe Godhead is not a Whole because it is indivisible, nor a Part because there is nothing, on the ultimate plane, outside It."

