[content]
body = "Even so if any one says that Very Life lives, or that Very Light is enlightened, he will be wrong (according to my view) unless, perchance, he were to use these terms in a different sense from the ordinary one to mean that the qualities of created things pre-exist, after a superlative manner as touching their true Being in the Creative Originals.\n\n208 208 So St.\n\nAugustine constantly teaches that God acts not in the manner which we call activity, but by causing the creature itself to perform the action.\n\nThus he explains God’s rest on the Seventh Day to mean not that God Himself rested but that the creation now rested in Him.\n\nAristotle and his disciple, St.\n\nThomas, teach that God moves all things simply through being desired by them.\n\nSo God causes action without Himself acting (somewhat as fire causes warmth without feeling it).\n\nCf.\n\np.\n\n87, n.\n\n1.\n\n9.\n\nEven the plainest article of Divinity, namely the 76 Incarnation and Birth of Jesus in Human Form, cannot be expressed by any Language or known by any Mind—not even by the first of the most exalted angels.\n\nThat He took man’s substance is a mysterious truth, the which we have received; but we know not how from the Virgin’s seed He was formed in another manner than is natural, nor how His dry feet supporting the solid weight of His material body He walked upon the unstable substance of the water, nor understand we any of the other things which belong to the Supernatural Nature of Jesus.\n\nOf these things I have spoken enough elsewhere; and our renowned Teacher hath wonderfully 209 209 ὑπερφυῶς.\n\nThe proper meaning of ὑπερφυής in the Dionysian writings appears to be “supernatural.” declared, in his Elements of Divinity , what he hath either learnt directly from the Sacred Writers, or else hath discovered from his cunning research concerning Scriptural truths through the much toil and labour which he bestowed thereon, or else hath had revealed unto him by some diviner inspiration wherein he received not only true spiritual notions but also true spiritual motions , 210 210 οὺ μόνον μαθὼν ἀλλὰ καὶ παθὼν τὰ θεῖα.\n\nand by the kinship of his mind with them (if I may so express it) was perfected to attain without any other teacher to a mystical communion with these verities and a belief therein.\n\n211 211 πρὸς τὴν ὰδιδακτὸν αὐτῶν καὶ μυστικὴν ἀποτελεσθεὶς ἕνωσιν καὶ πίστιν.\n\nAnd to put before them in briefest compass the many blessed speculations of his ingenious mind thus speaketh he concerning Jesus in his compilation of the Elements of Divinity .\n\n10.\n\nFrom the Elements of Divinity , by S.\n\nHierotheus.\n\nThe Universal Cause which filleth all things is the Deity of Jesus, whereof the parts are in such wise tempered to the whole that It is neither whole nor part, and yet is at the same time whole and also part, 77 containing in Its all-embracing unity both part and whole, and being transcendent and antecedent to both.\n\n212 212 Being beyond Unity the Godhead is, of course, beyond the categories of whole and part."

