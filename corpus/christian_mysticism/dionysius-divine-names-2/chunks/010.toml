[content]
body = "And since that Supra-Divine Being hath in loving kindness come down from thence unto the Natural Estate, and verily took substance and assumed the name of Man (we must speak with reverence of those things which we utter beyond human thought and language), even in this act He possesses His Supernatural and Super-Essential Existence—not only in that He hath without change or confusion of Attributes shared in our human lot while remaining unaffected by that unutterable Self-Emptying as regards the fullness of His Godhead, but also because (most wonderful of all wonders!) He passed in His Supernatural and Super-Essential state through conditions of Nature and Being, and receiving from us all things that are ours, exalted them far above us.\n\n220 220 i.\n\ne.\n\nChrist did not merely keep His Godhead parallel, as it were, with His Manhood, but brought It into His Manhood and so exalted the Manhood.\n\n11.\n\nSo much for these matters.\n\nNow let us proceed to the object of our discussion and endeavour to explain the Common and Undifferenced Names belonging to God’s Differentiated Being.\n\n221 221 e.\n\nLet us explain what are the Names which belong indivisibly to all Three Persons of the Trinity.\n\nAnd, that the subject of our investigation may be clearly defined beforehand, we give the name of Divine Differentiation 79 (as was said) to the beneficent Emanations of the Supreme Godhead.\n\n222 222 The word “Emanation” is here used in its very widest sense as including (1) the Persons of the Trinity, (2) Their creative activity as manifested in the Universal and the Particular stream of energy.\n\nSee Intr., p.\n\n17.\n\nThe Differentiated Being of the Trinity underlies all the Differentiations of the creative process.\n\nThe Trinity is differentiated on the plane of Eternity; then It emanates or energizes on the temporal plane, and thus It is manifested in all the differentiations of the universe, (especially in deified souls).\n\nFor bestowing upon all things and supernally infusing Its Communications unto the goodly Universe, It becomes differentiated without loss of Undifference; 223 223 God is indivisibly present in each separate deified soul (see supra, p.\n\n71), the sentence beginning: “And if the term ‘Differentiation’ be also applied to the bounteous act,” etc.\n\nand multiplied without loss of Unity; from Its Oneness it becomes manifold while yet remaining within Itself.\n\nFor example, since God is super-essentially Existent and bestows existence upon all things that are, and brings the world into being, that single Existence of His is said to become manifold through bringing forth the many existences from Itself, while yet He remains One in the act of Self-Multiplication; Undifferenced throughout the process of Emanation, and Full in the emptying process of Differentiation; Super-Essentially transcending the Being of all things, and guiding the whole world onwards by an indivisible act, and pouring forth without diminution His indefectible bounties.\n\nYea, being One and communicating of His Unity both unto every part of the world and also unto the whole, both unto that which is one and unto that which is many, He is One in an unchangeable and super-essential manner, being neither an unit in the multiplicity of things nor yet the sum total of such units."

