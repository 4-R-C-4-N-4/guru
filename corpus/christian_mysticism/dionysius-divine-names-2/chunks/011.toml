[content]
body = "Indeed, He is not an unity in this sense, and doth not participate in unity nor possess it; 224 224 These two phrases well express the meaning of the title “Beyond things and supernally infusing Unity” (ὑπερηνωμένη), which I have generally translated, like ἡνωμένη, as “Undifferenced.” but He is an Unity in a manner far 80 different from this, above all unity which is in the world; yea, He is an Indivisible Plurality, insatiable yet brim-full, producing, perfecting, and maintaining all unity and plurality.\n\nMoreover, since many, through Deification from Him, are made Gods 225 225 τῇ ἐξ αὐτοῦ θεώσει .\n\n.\n\n.\n\nθεῶν πολλῶν γιγνομένων.\n\nSee Intr., p.\n\n43.\n\n(so far as the Godlike capacity of each allows), there thus appears to be what is called a Differentiation 226 226 Cf.\n\np.\n\n71, n.\n\n1.\n\nand a Reduplication of the One God, yet none the less He is the primal God, the Supra-Divine and Super-Essentially One God, who dwells Indivisibly within the separate and individual things, being an Undifferenced Unity in Himself and without any commixture or multiplication through His contact with the Many.\n\n227 227 The fullness of God’s Unity is manifested, (1) in all the multiplicity of the material world, (2) after a higher manner in the deified souls of men and in angels.\n\nAnd supernaturally perceiving this, thus speaketh (by inspiration, in his holy writings) that Guide unto Divine illumination by whom both we and our teacher are led, that mighty man in things Divine, that Luminary of the world.\n\nFor though (saith he) there be that are called gods, whether in heaven or in earth (as there be gods many and lords many).\n\nBut to us there is but one God, the Father, of whom are all things, and we in Him, and one Lord Jesus Christ, by whom are all things, and we by Him.\n\nFor in divine things the undifferenced Unities are of more might than the Differentiations 228 228 Each deified soul is a differentiation of God (cf.\n\np.\n\n71, n.\n\ni); yet the Unity of God transcends them all, even after God has thus poured Himself into them.\n\nand hold the foremost place and retain their state of Undifference even after the One has, without departing from Its oneness, entered into Differentiation.\n\nThese Differentiations or beneficent Emanations of the whole 81 Godhead—whereby Its Undifferenced Nature is shared in common 229 229 i.\n\ne.\n\nThese active Manifestations whereby God enters into each part of the universe, yet without loss of Unity.\n\n—we shall (so far as in us lies) endeavour to describe from the Divine Names which reveal them in the Scriptures, having now made this clear beforehand (as hath been said): that every Name of the Divine beneficent Activity unto whichever of the Divine Persons it is applied, must be taken as belonging, without distinction, to the whole entirety of the Godhead.\n\n230 230 See the beginning of this chapter."

