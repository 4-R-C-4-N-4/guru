body = "166 περὶ ἡνωμένης καὶ διακεκριμένης θεολογίας καὶ τίς ἡ θεία ἕνωσις καὶ διάκρισις.\n\n167 The point of this section is that God’s Nature is not a sum total of separate Attributes.\n\nTherefore when we say that the Scriptural titles of God are only symbols and that the ultimate Godhead transcends them, we do not mean that they express only a part of His Nature (for His Nature has no parts), but that they dimly suggest His whole Nature.\n\nHence, too, we cannot say that some of God’s titles belong only to one separate Person of the Trinity and others only to the other Persons severally—e.\n\ng.\n\nThe Trinity, and not the Father alone, is the Creator of the world.\n\n“The one world was made by the Father, through the Son, in the Holy Ghost” (St.\n\nAug., Com.\n\non St.\n\nJohn, Tr.\n\nXX.\n\n9).\n\n168 The title “Good ” is applied to the whole Godhead.\n\nAnd if that title, then others too.\n\nCf.\n\nMatt.\n\nxix.\n\n17 .] 169 John x.\n\n11 .\n\n170 Ps.\n\ncxliii.\n\n10 .\n\nThis is a further argument arising out of what has been said above.\n\nThe point here is that we cannot limit the title “Good” to one Person of the Trinity.\n\n(The notion that the Father is stern and the Son mollifies His sternness is false.) The rest of the section takes other titles and shows how they are common to all Three Persons of the Trinity.\n\n171 Ex.\n\niii.\n\n14 .\n\n172 Rev.\n\ni.\n\n4 .\n\n173 Ps.\n\ncii.\n\n27 .\n\n174 John xv.\n\n26 .\n\n175 John v.\n\n21 .\n\n176 John vi.\n\n63 .\n\n177 2 Cor.\n\niii.\n\n17 .\n\n178 1 Chron.\n\nxxix.\n\n14 .\n\n179 Rom.\n\nxi.\n\n36 .\n\n180 Ibid.\n\n181 Ps.\n\nciv.\n\n30 .\n\n182 John x.\n\n30 .\n\n183 John xvi.\n\n15 .\n\n184 John xvii.\n\n10 .\n\n185 i.e.\n\nThat we are seeking to destroy the distinction between the Persons of the Trinity.\n\n186 The method of Undifference applies to the ultimate Godhead, that of Differentiation to the emanating Godhead.\n\nThe absolute and the relative planes of Being both belong to God.\n\nOn the absolute plane all distinctions are transcended, and the Persons exist in a manner in which They would appear to us to be merged, but on the relative plane we see that They are eternally distinct.\n\nSee Intr., p.\n\n8.\n\n187 Because we see things which are good, fair, existent, etc., we apply to God, their ultimate Cause, the titles “Good,” “Fair,” “Existent,” etc.\n\nSee p.\n\n36, n.\n\n6.\n\n188 i.\n\ne.\n\nOnly the Second Person was Incarnate, was crucified, etc.\n\n‘Mysteries of Love and Being” = φιλανθρωφίας οὐσιώδη μυστήρια.\n\n189 προόδους τε καὶ ἐκφάνσεις,—sc.\n\nthe Persons of the Trinity.\n\nSee Intr., p.\n\n16.\n\n190 The received text reads: Φᾶσι .\n\n.\n\n."

