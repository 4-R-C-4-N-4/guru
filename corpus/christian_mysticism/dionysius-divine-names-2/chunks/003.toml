[content]
body = "But if he taketh Scriptural Truth as his Standard, this is the very Rule and Light by which we will (so far as in us lies) proceed straight to our defence, and will declare that the Sacred Science sometimes employs a method of Undifference and sometimes one of Differentiation; and that we must neither disjoin those things which are Undifferenced 68 nor confuse those which are Differentiated; but following the Sacred Science to the best of our powers, we must lift up our eyes towards the Divine Rays; for, receiving thence the Divine Revelations as a noble Standard of Truth, we strive to preserve its treasure in ourselves without addition, diminution, or distortion, and in thus preserving the Scriptures, we also are preserved, and are moreover enabled by the same to the end that we may still preserve them and be by them preserved.\n\n3.\n\nNow Undifferenced Names belong to the entire Godhead 186 186 The method of Undifference applies to the ultimate Godhead, that of Differentiation to the emanating Godhead.\n\nThe absolute and the relative planes of Being both belong to God.\n\nOn the absolute plane all distinctions are transcended, and the Persons exist in a manner in which They would appear to us to be merged, but on the relative plane we see that They are eternally distinct.\n\nSee Intr., p.\n\n8.\n\n(as we showed more fully from the Scriptures in the Outlines of Divinity).\n\nTo this class belong the following: “Super-Excellent,” “Super-Divine,” “Super-Essential,” “Super-Vital,” “Supra-Sapient,” and thereto all those titles wherein the negative expresses excess; moreover, all those titles which have a causal sense, such as “Good,” “Fair,” “Existent,” “Lifegiving,” “Wise,” and whatever titles are ascribed to the Cause of all good things from Its bountiful gifts.\n\n187 187 Because we see things which are good, fair, existent, etc., we apply to God, their ultimate Cause, the titles “Good,” “Fair,” “Existent,” etc.\n\nSee p.\n\n36, n.\n\n6.\n\nThe differentiated Names, on the other hand, are the Super-Essential names and connotations of “Father,” “Son,” and “Spirit.” In these cases the titles cannot be interchanged, nor are they held in common.\n\nAgain, besides this, the perfect and unchangeable subsistence of Jesus in our nature is differentiated, and so are all the mysteries of Love and Being therein displayed.\n\n188 188 i.\n\ne.\n\nOnly the Second Person was Incarnate, was crucified, etc.\n\n‘Mysteries of Love and Being” = φιλανθρωφίας οὐσιώδη μυστήρια.\n\n69 4.\n\nBut needs must we, methinks, go deeper into the matter and thoroughly explain the difference between Undifference and Differentiation as concerning God, in order that our whole Discourse may be made clear, and, being free from all doubtfulness and obscurity, may (to the best of our powers) give a distinct, plain, and orderly statement of the matter.\n\nFor, as I said elsewhere, the Initiates of our Divine Tradition designate the Undifferenced Attributes of the Transcendently Ineffable and Unknowable Permanence as hidden, incommunicable Ultimates, but the beneficent Differentiations of the Supreme Godhead, they call Emanations 189 189 προόδους τε καὶ ἐκφάνσεις,—sc.\n\nthe Persons of the Trinity.\n\nSee Intr., p.\n\n16."

