body = "Yet It is a Whole because It includes the true existence of all things, and is Partitive because It contains the principle of separate Individuality whereby Christ possesses a Human Soul distinct from all other human souls, and whereby, too, we possess distinct and separate souls.\n\n213 God is in us even before we are in Him.\n\nCf.\n\nLuke xvii.\n\n21 .\n\nCf.\n\nSt.\n\nAug., “Thou wast within; I was without.” Also cf.\n\nc.\n\ni.\n\n3; c.\n\niii.\n\ni: “For the Trinity,” etc.\n\nSee Intr., p.\n\n6 on the use of the word ” outside.” 214 Perfection implies an objector purpose achieved.\n\nHence it implies a distinction between self and not self.\n\nThe Godhead is beyond such a distinction.\n\nCompared with imperfection, It is perfect; compared with perfection, It is perfectionless (ἀτελής), or, rather, beyond Perfection (ὑπερτελής) and before it (προτέλειος), just as compared with impersonal things It is personal, and compared with personality It is non-personal, or, rather, supra-personal.\n\n215 Cf.\n\np.\n\n75, n.\n\n3.\n\n216 Cf.\n\nSt.\n\nPaul on the Law and the Spirit.\n\nThe Law is deposited, as it were, by the Spirit; and yet the Law cramps the Spirit, and the Spirit must break loose from this bondage.\n\n217 i.\n\ne.\n\nIt gives the universe its bounds and distinctions.\n\n218 Eternity, in the sense of ” Very Eternity” (αὐτοαιών), is an Emanation of the Godhead—a distinct view of Its transcendent state (cf.\n\nIntr., p.\n\ni7).\n\nIt is the Divine Rest taken in the abstract, as Very Life is perhaps the Divine Motion taken in the abstract.\n\nThe Godhead includes both rest and Motion by transcending them.\n\n219 Behind Nature are certain higher supernatural possibilities (which are manifested, e.\n\ng., in the Miracles of Christ and His Disciples), and beyond our personalities there is a mystery which is greater than our finite selves, and yet, in a sense, is our true selves.\n\nThe Godhead possesses in Itself the supernatural possibilities of Nature and the supra-personal possibilities of our personalities.\n\n220 i.\n\ne.\n\nChrist did not merely keep His Godhead parallel, as it were, with His Manhood, but brought It into His Manhood and so exalted the Manhood.\n\n221 e.\n\nLet us explain what are the Names which belong indivisibly to all Three Persons of the Trinity.\n\n222 The word “Emanation” is here used in its very widest sense as including (1) the Persons of the Trinity, (2) Their creative activity as manifested in the Universal and the Particular stream of energy.\n\nSee Intr., p.\n\n17.\n\nThe Differentiated Being of the Trinity underlies all the Differentiations of the creative process.\n\nThe Trinity is differentiated on the plane of Eternity; then It emanates or energizes on the temporal plane, and thus It is manifested in all the differentiations of the universe, (especially in deified souls).\n\n223 God is indivisibly present in each separate deified soul (see supra, p.\n\n71), the sentence beginning: “And if the term ‘Differentiation’ be also applied to the bounteous act,” etc."

