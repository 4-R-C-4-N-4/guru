[content]
body = "The Godhead is not a Whole because it is indivisible, nor a Part because there is nothing, on the ultimate plane, outside It.\n\nYet It is a Whole because It includes the true existence of all things, and is Partitive because It contains the principle of separate Individuality whereby Christ possesses a Human Soul distinct from all other human souls, and whereby, too, we possess distinct and separate souls.\n\nThis Deity is perfect in those Beings that are imperfect as a Fount of Perfection; 213 213 God is in us even before we are in Him.\n\nCf.\n\nLuke xvii.\n\n21 .\n\nCf.\n\nSt.\n\nAug., “Thou wast within; I was without.” Also cf.\n\nc.\n\ni.\n\n3; c.\n\niii.\n\ni: “For the Trinity,” etc.\n\nSee Intr., p.\n\n6 on the use of the word ” outside.” It is Perfectionless 214 214 Perfection implies an objector purpose achieved.\n\nHence it implies a distinction between self and not self.\n\nThe Godhead is beyond such a distinction.\n\nCompared with imperfection, It is perfect; compared with perfection, It is perfectionless (ἀτελής), or, rather, beyond Perfection (ὑπερτελής) and before it (προτέλειος), just as compared with impersonal things It is personal, and compared with personality It is non-personal, or, rather, supra-personal.\n\nin those that are perfect as transcending and anticipating their Perfection; It is the Form producing Form in the formless, as a Fount of every form; and it is Formless in the Forms, as being beyond all form; It is the Being that pervades all beings at once though not affected by them; 215 215 Cf.\n\np.\n\n75, n.\n\n3.\n\nand It is Super-Essential, as transcending every being; It sets all bounds of Authority and Order, and yet It has Its seal beyond all Authority and Order.\n\n216 216 Cf.\n\nSt.\n\nPaul on the Law and the Spirit.\n\nThe Law is deposited, as it were, by the Spirit; and yet the Law cramps the Spirit, and the Spirit must break loose from this bondage.\n\nIt is the Measure of the Universe; 217 217 i.\n\ne.\n\nIt gives the universe its bounds and distinctions.\n\nand it is Eternity, and above Eternity and before Eternity.\n\n218 218 Eternity, in the sense of ” Very Eternity” (αὐτοαιών), is an Emanation of the Godhead—a distinct view of Its transcendent state (cf.\n\nIntr., p.\n\ni7).\n\nIt is the Divine Rest taken in the abstract, as Very Life is perhaps the Divine Motion taken in the abstract.\n\nThe Godhead includes both rest and Motion by transcending them.\n\nIt is an 78 Abundance in those Beings that lack, and a Super-Abundance in those that abound; unutterable, ineffable; beyond Mind, beyond Life, beyond Being; It supernaturally possesses the supernatural and super-essentially possesses the super-essential.\n\n219 219 Behind Nature are certain higher supernatural possibilities (which are manifested, e.\n\ng., in the Miracles of Christ and His Disciples), and beyond our personalities there is a mystery which is greater than our finite selves, and yet, in a sense, is our true selves.\n\nThe Godhead possesses in Itself the supernatural possibilities of Nature and the supra-personal possibilities of our personalities."

