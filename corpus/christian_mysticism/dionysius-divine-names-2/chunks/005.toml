[content]
body = "even as the lights of lamps (to use visible and homely similes) being in one house and wholly interpenetrating one another, severally possess a clear and absolute distinction each from each, and are by their distinctions united into one, and in their unity are kept distinct.\n\nEven so do we see, when there are many lamps in a house, how that the lights of them all are unified into one undifferentiated light, so that there shineth forth from them one indivisible brightness; and no one, methinks, could separate the light of one particular lamp from the others, in isolation from the air which embraces them all, nor could he see one light without another, inasmuch as, without confusion, they yet are wholly commingled.\n\nYea, if any one takes out of the dwelling one of the burning lamps, all its own particular light will therewith depart from the place without either carrying off in itself aught of the other lights or bequeathing any of its own brightness to the rest.\n\nFor, as 71 I said, the entire and complete union of the lights one with another brought no confusion or commixture in any parts—and that though the light is literally embodied in the air and streams from the material substance of fire.\n\nThe Super-Essential Unity of God, however, exceedeth (so we declare) not only the unions of material bodies, but even those of Souls and of Intelligences, which these Godlike and celestial Luminaries in perfect mutual interpenetration supernaturally and without confusion possess, through a participation corresponding to their individual powers of participating in the All-Transcendent Unity.\n\n194 194 Material things are merged by being united (e.\n\ng.\n\ndrops of water).\n\nSouls or angels being united through love (whereby they participate in God) are not merged but remain distinct even while being, as it were, fused into a single spiritual unity more perfect than the fusion of water with wine.\n\nThe Persons of the Trinity are still more perfectly united and at the same time still more utterly distinct.\n\n5.\n\nThere is, on the other hand, a Differentiation made in the Super-Essential Doctrine of God—not merely such as I have just mentioned (viz.\n\nthat in the very Unity, Each of the Divine Persons possesses without confusion Its own distinct existence), but also that the Attributes of the Super-Essential Divine Generation are not interchangeable.\n\n195 195 Two kinds of Differentiation: (1) Distinctness of Existence, (2) Difference of Functions.\n\nThe Father alone is the Source of the Super-Essential Godhead, and the Father is not a Son, nor is the Son a Father; for the Divine Persons all preserve, Each without alloy, His own particular Attributes of praise.\n\nSuch, then, are the instances of Undifference and of Differentiation in the Ineffable Unity and Subsistence of God.\n\nAnd if the term “Differentiation” be also applied to the bounteous act of Emanation whereby the Divine Unity, brimming Itself with goodness in the excess of Its Undifferenced Unity thus enters 72 into Multiplicity, 196 196 D.\n\nmeans that the Undifferentiated Godhead is actually present in all these creative activities.\n\nIt is multiplied (as it were) in Its energies, and yet It remains indivisible.\n\nSee Intr., p.\n\n17.\n\nyet an undifferenced unity worketh even in those differentiated acts whereby, in ceaseless communications, It bestows Being, Life, and Wisdom, and those other gifts of the all-creative Goodness in respect of which (as we behold the communications and the participants thereof) we celebrate those things wherein the creatures supernaturally participate."

