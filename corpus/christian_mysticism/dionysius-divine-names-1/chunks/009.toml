body = "1 .\n\nas “God of Gods” and “Lord of Lords”, 108 108 Ps.\n\ncxxxvi.\n\n2, 3 .\n\nand “Holy of Holies,” 109 109 Isa.\n\nvi.\n\n3 .\n\nas “Eternal,” 110 110 Deut.\n\nxxxiii.\n\n27 .\n\nas “Existent” 111 111 Ex.\n\niii.\n\n14 .\n\nand as “Creator of Ages,” 112 112 Gen.\n\ni.\n\n1–8 .\n\nas “Giver of Life,” 113 113 Gen.\n\ni.\n\n20 ; ii.\n\n7 ; Job x.\n\n12 ; John x.\n\n10 .\n\nas “Wisdom,” 114 114 Prov.\n\nviii .\n\nas “Mind,” 115 115 I Cor.\n\nii.\n\n16 .\n\nas “Word,” 116 116 John i.\n\n1 .\n\nas “Knower,” 117 117 Ps.\n\nxliv.\n\n21 .\n\nas “possessing beforehand all the treasures of knowledge,” 118 118 Col.\n\nii.\n\n3 .\n\nas “Power,” 119 119 Rev.\n\nxix.\n\n1 .\n\nas “Ruler,” 120 120 Rev.\n\ni.\n\n5 .\n\nas “King of kings,” 121 121 Rev.\n\nxvii.\n\n4 .\n\nas “Ancient of Days;” 122 122 Dan.\n\nvii.\n\nand as “Him that is the same and whose years shall not fail,” 123 123 Ps.\n\ncii.\n\n25 .\n\nas “Salvation,” 124 124 Ex.\n\nxv.\n\n2 .\n\nas “Righteousness,” 125 125 Jer.\n\nxxiii.\n\n6 .\n\nas “Sanctification,” 126 126 I Cor.\n\ni.\n\n30 .\n\nas “Redemption,” 127 127 I Cor.\n\ni.\n\n30 .\n\nas “Surpassing all things in greatness,” 128 128 Isa.\n\nxl.\n\n15 .\n\nand yet as being in “the still small breeze.” 129 129 I Kings xix.\n\n12 .\n\nMoreover, they say that He dwells within our minds, and in our souls 130 130 John xiv.\n\n17 .\n\nand bodies, 131 131 I Cor.\n\nvi.\n\n19 .\n\nand in heaven and in earth, 132 132 Isa.\n\nlxvi.\n\n1 .\n\nand that, while remaining Himself, He is at one and the same time within the world around it and above it (yea, above the sky and above existence); and they call Him a Sun, 133 133 Ps.\n\nlxxxiv.\n\n11 .\n\na Star, 134 134 Rev.\n\nxxii.\n\n16 .\n\nand a Fire, 135 135 Deut.\n\niv.\n\n24 .\n\nand Water, 136 136 Ps.\n\nlxxxiv.\n\n6 .\n\na Wind or Spirit, 137 137 John iv.\n\n24 ; Acts ii.\n\n2 .\n\na Dew, 138 138 Hosea xiv.\n\n5 .\n\na Cloud, 139 139 Ex.\n\nxiii.\n\n21 .\n\nan Archetypal Stone, 140 140 Ps.\n\ncxviii.\n\n22 .\n\nand a Rock, 141 141 Ps.\n\nxxxi.\n\n2,3 .\n\nand All Creation, 142 142 I Cor.\n\nxv.\n\n28 .\n\nWho yet (they declare) is no created thing.\n\nThus, then, the Universal and Transcendent Cause must both be nameless and also possess the names of all things in order that It may truly be an universal Dominion, the Centre of creation on which all things depend, as on their Cause and 63 Origin and Goal; and that, according to the Scriptures, It may be all in all, and may be truly called the Creator of the world, originating and perfecting and maintaining all things; their Defence and Dwelling, and the Attractive Force that draws them: and all this in one single, ceaseless, and transcendent act."

