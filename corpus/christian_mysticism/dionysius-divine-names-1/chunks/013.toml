body = "65 In the whole of this passage God is spoken of as at the same time Efficient, Formal and Final Cause of the soul’s activity.\n\nD.\n\nteaches that God is present in all things, but not equally in all.\n\nCf.\n\nIntr., p.\n\n14 66 Gen.\n\ni.\n\n67 Three stages may be traced here corresponding to Purgation, Illumination and Union.\n\nI have tried to indicate the transitions from one stage to the next by the punctuation.\n\n68 τῶν τελουμένων τελεταρχία.\n\n“Perfect” (τέλειος) and the words connected with it were technical terms in the Greek Mysteries.\n\nPossibly there are traces of this technical use in St.\n\nPaul’s Epistles (e.g.\n\nI Cor.\n\nii.\n\n6 ; Phil.\n\niii.\n\n15 ).\n\n69 τῶν θεουμένων θεαρχιά.\n\nSee Intr., p.\n\n39.\n\n70 The soul must turn away from the complex world of sense and have only one desire—the desire for God.\n\nThus it becomes concentrated as it were, and so is in a simple and unified state.\n\nCf.\n\nMatt.\n\nvi.\n\n22.\n\nSee Intr., p.\n\n25 71 i.\n\ne.\n\nSo far as we are capable of receiving this communication.\n\n72 ἐκφαντορικῶς καὶ ὑμνητικῶς.\n\n73 i.e.\n\nGod’s differentiated activities.\n\nSince the ultimate Godhead is ineffable, Scripture can only hint at its Nature by speaking of Its manifestations in the relative sphere.\n\nSee Intr., p.\n\n8.\n\n74 God is ineffable and transcends unity, see Intr., p.\n\n5.\n\nBut, since His presence in man produces an unity in each individual (and in human society), Scripture calls Him “One.” 75 The ineffable Godhead transcends our conception of the Trinity.\n\nBut we call Him a Trinity because we experience His trinal working—as our ultimate Home, as an Individual Personality Who was once Incarnate, and as a Power within our hearts.\n\nSee Intr., p.\n\n7.\n\n76 God is not a First Cause, for a cause is one event to a temporal series, and God is beyond Time and beyond the whole creation.\n\nYet in so far as He acts on the relative plane He may, by virtue of this manifestation of Himself in the creation, be spoken of as a Cause.\n\n77 Beauty is a sacrament and only truly itself when it points to something beyond itself.\n\nThat is why “Art for Art’s sake” degrades art.\n\nBeauty reveals God, but God is more than Beauty.\n\nHence Beauty has its true being outside itself in Him.\n\nCf.\n\nIntr., p.\n\n31.\n\n78 Love is the most perfect manifestation of God.\n\nYet God is in a sense beyond even love as we know it.\n\nFor love, as we know it, implies the distinction between “me” and “thee,” and God is ultimately beyond such distinction.\n\nSee Intr., p.\n\n35.\n\n79 ὁ ἁπλοῦς Ἰησοῦς συνετέθη.\n\nCf.\n\nMyst.\n\nTheol.\n\nIII., “Super Essential Jesus.” 80 ἱεραρχικῶν παραδόσεων, i.\n\ne.\n\nEcclesiastical Tradition.\n\n81 I Thess.\n\niv.\n\n16."

