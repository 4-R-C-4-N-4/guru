[content]
body = "These mysteries we learn from the Divine Scriptures, and thou wilt find that in well-nigh all the utterances of the Sacred Writers the Divine Names refer in a Symbolical Revelation 72 72 ἐκφαντορικῶς καὶ ὑμνητικῶς.\n\nto Its beneficent Emanations 73 73 i.e.\n\nGod’s differentiated activities.\n\nSince the ultimate Godhead is ineffable, Scripture can only hint at its Nature by speaking of Its manifestations in the relative sphere.\n\nSee Intr., p.\n\n8.\n\nWherefore, in almost all consideration of Divine things we see the Supreme Godhead celebrated with holy praises as One and an Unity, through the simplicity and unity of Its supernatural indivisibility, from whence (as from an unifying power) we attain to unity, and through the supernal conjunction of our diverse and separate qualities are knit together each into a Godlike Oneness, and all together into a mutual Godly union 74 74 God is ineffable and transcends unity, see Intr., p.\n\n5.\n\nBut, since His presence in man produces an unity in each individual (and in human society), Scripture calls Him “One.” And It is called the Trinity because Its supernatural fecundity is revealed in a Threefold Personality, 75 75 The ineffable Godhead transcends our conception of the Trinity.\n\nBut we call Him a Trinity because we experience His trinal working—as our ultimate Home, as an Individual Personality Who was once Incarnate, and as a Power within our hearts.\n\nSee Intr., p.\n\n7.\n\nwherefrom all Fatherhood in heaven and on earth exists and draws Its name.\n\nAnd It is called the Universal Cause 76 76 God is not a First Cause, for a cause is one event to a temporal series, and God is beyond Time and beyond the whole creation.\n\nYet in so far as He acts on the relative plane He may, by virtue of this manifestation of Himself in the creation, be spoken of as a Cause.\n\nsince all things came into being through Its 57 bounty, whence all being springs; and It is called Wise and Fair because all things which keep their own nature uncorrupted are full of all Divine harmony and holy Beauty; 77 77 Beauty is a sacrament and only truly itself when it points to something beyond itself.\n\nThat is why “Art for Art’s sake” degrades art.\n\nBeauty reveals God, but God is more than Beauty.\n\nHence Beauty has its true being outside itself in Him.\n\nCf.\n\nIntr., p.\n\n31.\n\nand especially It is called Benevolent 78 78 Love is the most perfect manifestation of God.\n\nYet God is in a sense beyond even love as we know it.\n\nFor love, as we know it, implies the distinction between “me” and “thee,” and God is ultimately beyond such distinction.\n\nSee Intr., p.\n\n35.\n\nbecause, in one of Its Persons, It verily and wholly shared in our human lot, calling unto Itself and uplifting the low estate of man, wherefrom, in an ineffable manner, the simple Being of Jesus assumed a compound state, 79 79 ὁ ἁπλοῦς Ἰησοῦς συνετέθη.\n\nCf.\n\nMyst.\n\nTheol.\n\nIII., “Super Essential Jesus.” and the Eternal hath taken a temporal existence, and He who supernaturally transcends all the order of all the natural world was born in our Human Nature without any change or confusion of His ultimate properties."

