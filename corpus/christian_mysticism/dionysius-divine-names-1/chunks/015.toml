body = "99 Ex.\n\niii.\n\n14 .\n\n100 John xiv.\n\n6 .\n\n101 John viii.\n\n12 .\n\n102 Gen.\n\nxxviii.\n\n13 .\n\n103 John xiv.\n\n6 .\n\n104 Matt.\n\nxix.\n\n17 .\n\n105 Ps.\n\nxxvii.\n\n4 .\n\n106 Rom.\n\nxvi.\n\n27 .\n\n107 Isa.\n\nv.\n\n1 .\n\n108 Ps.\n\ncxxxvi.\n\n2, 3 .\n\n109 Isa.\n\nvi.\n\n3 .\n\n110 Deut.\n\nxxxiii.\n\n27 .\n\n111 Ex.\n\niii.\n\n14 .\n\n112 Gen.\n\ni.\n\n1–8 .\n\n113 Gen.\n\ni.\n\n20 ; ii.\n\n7 ; Job x.\n\n12 ; John x.\n\n10 .\n\n114 Prov.\n\nviii .\n\n115 I Cor.\n\nii.\n\n16 .\n\n116 John i.\n\n1 .\n\n117 Ps.\n\nxliv.\n\n21 .\n\n118 Col.\n\nii.\n\n3 .\n\n119 Rev.\n\nxix.\n\n1 .\n\n120 Rev.\n\ni.\n\n5 .\n\n121 Rev.\n\nxvii.\n\n4 .\n\n122 Dan.\n\nvii.\n\n123 Ps.\n\ncii.\n\n25 .\n\n124 Ex.\n\nxv.\n\n2 .\n\n125 Jer.\n\nxxiii.\n\n6 .\n\n126 I Cor.\n\ni.\n\n30 .\n\n127 I Cor.\n\ni.\n\n30 .\n\n128 Isa.\n\nxl.\n\n15 .\n\n129 I Kings xix.\n\n12 .\n\n130 John xiv.\n\n17 .\n\n131 I Cor.\n\nvi.\n\n19 .\n\n132 Isa.\n\nlxvi.\n\n1 .\n\n133 Ps.\n\nlxxxiv.\n\n11 .\n\n134 Rev.\n\nxxii.\n\n16 .\n\n135 Deut.\n\niv.\n\n24 .\n\n136 Ps.\n\nlxxxiv.\n\n6 .\n\n137 John iv.\n\n24 ; Acts ii.\n\n2 .\n\n138 Hosea xiv.\n\n5 .\n\n139 Ex.\n\nxiii.\n\n21 .\n\n140 Ps.\n\ncxviii.\n\n22 .\n\n141 Ps.\n\nxxxi.\n\n2,3 .\n\n142 I Cor.\n\nxv.\n\n28 .\n\n143 God is above Time.\n\n144 e.\n\ng.\n\n“I am that I am,” “Good,” “Fair.” 145 e.\n\ng.\n\nSun,” c c Star,” “Rock,” etc.\n\n146 ἀπὸ τῶν .\n\n.\n\n.\n\nπρονοιῶν ἢ προνοουμένων.\n\nThe first are the faculties of acting or being revealed in a certain way; the second are the results or manifestations of these faculties when in action.\n\n147 Thus the complete classification is: (1) Analogies drawn from the material world, (a) universal, (b) particular; (2) psychic visions.\n\n148 Ezek.\n\ni.\n\n26, 27 .\n\n149 Ps.\n\nx.\n\n5 .\n\n150 James v.\n\n4 .\n\n151 Dan.\n\nvii.\n\n9 .\n\n152 Ps.\n\nxxxiii.\n\n17 .\n\n153 Job x.\n\n8 .\n\n154 Ps.\n\nxci.\n\n4 .\n\n155 Ibid.\n\n156 Deut.\n\nxxxiii.\n\n27 .\n\n157 Ex.\n\nxxxiii.\n\n23 .\n\n158 Ex.\n\nxxiv.\n\n10 .\n\n159 Rev.\n\nxiv.\n\n14 .\n\n160 Ezek.\n\ni.\n\n26, 27 .\n\n161 Ps.\n\nlxxv.\n\n8 .\n\n162 Prov.\n\nix.\n\n5 .\n\n163 τῶν νοητῶν θεωνυμιῶν—i.\n\ne.\n\nthe Names belonging to God when revealed in the relative sphere; not those which belong to the ultimate Godhead as such.\n\nIn fact, the Godhead, as such, is Nameless.\n\nSee Intr., p.\n\n7.\n\n164 κυρίως εἰπεῖν—i.\n\ne.\n\nactually godlike because man is deified by them.\n\n165 See Myst.\n\nTheol.\n\nI.\n\n2; and cf.\n\nMatt.\n\nvii.\n\n6 ."

