body = "82 ἐν θειοτέρᾳ μιμήσει τῶν ὑπερουρανίων νοῶν—i.\n\ne.\n\nthe angels.\n\n83 Luke xx.\n\n36 84 Meditation leads on to Contemplation; and the higher kind of Contemplation is performed by the Via Negativa.\n\n85 i.e.\n\nThe Angels.\n\nI have throughout translated ὑπερουράνιος “celestial” instead of “super-celestial.” Presumably the meaning is “beyond the material sky,” or “celestial in a transcendent sense.” 86 The whole of this passage shows that there is a positive element in Unknowing.\n\n87 παντῶν .\n\n.\n\n.\n\nπροληπτική—i.e.\n\ncontains them eternally before their creation.\n\n88 ἃς εἴτε ἐπιβολὰς εἴτε παραδοχὰς χρῆ φάναι—i.\n\ne.\n\naccording as we describe the act from above or below.\n\nGod sends the impulse, the angels receive it.\n\n89 οἱ θεοειδεῖς .\n\n.\n\n.\n\nνόες—i.e.\n\nhuman minds.\n\n90 ἀγγελομιμητῶς.\n\n“In a manner which imitates the angels.” Cf.\n\nWordsworth, Prelude, xiv.\n\n108, 102: “Like angels stopped upon the wing by sound of harmony from heaven’s remotest spheres.” 91 This shows that the Via Negativa is based on experience and not on mere speculation.\n\n92 ὅ τι ποτέ ἐστιν ἡ τῆς ὑπεραγαθότητος ὑπερύπαρξις.\n\n93 “Union” (ἕνωσις).\n\nThis word has more than one meaning in D., and hence occasional ambiguity.\n\nIt may = (1) Unity (i.\n\ne.\n\nthat which makes an individual thing to be one thing); (2) Mental or Spiritual intercourse; (3) Physical intercourse; (4) Sense perception.\n\nHere it = either (1) or (2), probably (1).\n\n94 ἀγαθότητος ὕπαρξις—i.\n\ne.\n\nthe ultimate Essence in which goodness consists.\n\n95 Man—Animal—Vegetable—Inorganic Matter.\n\nFor the thought of this whole passage, cf.\n\nShelley, Adonais: “That Light whose smile kindles the universe.” “The property of mere existence” = οὐσιώδη καὶ ἑκτικὴν ἐπιτηδειότητα.\n\nοὐσία = an individual existence.\n\nIts highest meaning is a “personality,” its lowest a “thing.” οὐσιώδης refers generally to its lowest meaning and = “possessing mere existence,” i.\n\ne.\n\n“belonging to the realm of inorganic matter.” See Intr., p.\n\n4.\n\n96 This shows that there is a positive element in D.‘s Via Negativa.\n\n97 Judges xiii.\n\n18 .\n\n98 Phil.\n\nii.\n\n9 ; Eph.\n\ni.\n\n21 ."

