[content]
body = ") with our hearts predisposed unto the vision of God, and let us bring holy ears to the exposition of God’s holy Names, implanting holy Truths in holy instruments according to the Divine command, and withholding these things from the mockery and laughter of the uninitiate, or, rather, seeking to redeem those wicked men (if any such there be) from their enmity towards God.\n\nThou, therefore, O good Timothy, must guard these truths according to the holy Ordinance, nor must thou utter or divulge the heavenly mysteries unto the uninitiate.\n\n165 165 See Myst.\n\nTheol.\n\nI.\n\n2; and cf.\n\nMatt.\n\nvii.\n\n6 .\n\nAnd for myself I pray God grant me worthily to declare the beneficent and manifold Names of the Unutterable and Nameless Godhead, and that He do not take away the word of Truth out of my mouth.\n\n45 The name of St.\n\nPaul’s companion is intended to give colour to the writer’s pseudonym.\n\nSee Introduction, p.\n\n1; cf.\n\niii.\n\n2.\n\n46 This work is lost 47 1 Cor.\n\nii.\n\n4 .\n\n48 τοῖς ἀφθέγκτοις καὶ ἀγνώστοις ἀφθέγκτως καὶ ἀγνώστως συναπτόμεθα.\n\nSee Intr.\n\non “Unknowing,” p.\n\n32.\n\n49 κατὰ τὴν κρείττονα τῆς καθ᾿ ἡμᾶς λογικῆς καὶ νοερᾶς δυνάμεως καὶ ἐνεργείας.\n\nD.\n\nfrequently distinguishes between the discursive and the intuitive reason.\n\nTogether they cover the whole of the intellect, cf.\n\nWordsworth, Prelude, xiv.\n\n119, 120: “Hence endless occupation for the soul, Whether discursive or intuitive.” The former gives us deductions, the latter the axioms on which these are based.\n\nSee Intr., p.\n\n26.\n\n50 See Intr., p.\n\n4.\n\n51 D.\n\nis here contrasting the Affirmative Path of Knowing with the Negative Path of Unknowing.\n\nThe former has a value as leading up to the latter; but it is only safe so far as we keep within the bounds of Scripture.\n\nUnscriptural conceptions of God are false; Scriptural conceptions are true as far as they go; but their literal meaning must be transcended.\n\nSee Intr., p.\n\n41 f.\n\n52 i.\n\ne.\n\nThe Transcendent Truths which are beyond ordinary knowledge.\n\nνοητά .\n\nThe word νοῦς = Mind in the sense not merely of abstract intellect but of the spiritual personality.\n\nHence the word is often used to = an angel; and νοητός is often used as = spiritual, instead of πνευματικός , which D.\n\ndoes not employ.\n\nThis use of νοῦς and its derivatives is ultimately due to the influence of Aristotle.\n\n(Cf.\n\nthe use of νοῦς in Plotinas.) St.\n\nThomas Aquinas regards intellectus as = “personality.” But here the reference is perhaps rather to the province of abstract intellect.\n\n53 Apparently this is the same thought repeated in three different ways."

