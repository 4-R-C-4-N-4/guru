body = "51 CHAPTER I Dionysius the Presbyter, to his fellow-Presbyter Timothy.\n\n45 45 The name of St.\n\nPaul’s companion is intended to give colour to the writer’s pseudonym.\n\nSee Introduction, p.\n\n1; cf.\n\niii.\n\n2.\n\nWhat is the purpose of the discourse, and what the tradition concerning the Divine Names.\n\n1.\n\nNow , Blessed Timothy, the Outlines of Divinity 46 46 This work is lost being ended, I will proceed, so far as in me lies, to an Exposition of the Divine Names.\n\nAnd here also let us set before our minds the scriptural rule that in speaking about God we should declare the Truth, not with enticing words of man’s wisdom, but in demonstration of the power which the Spirit 47 47 1 Cor.\n\nii.\n\n4 .\n\nstirred up in the Sacred Writers, whereby, in a manner surpassing speech and knowledge, 48 48 τοῖς ἀφθέγκτοις καὶ ἀγνώστοις ἀφθέγκτως καὶ ἀγνώστως συναπτόμεθα.\n\nSee Intr.\n\non “Unknowing,” p.\n\n32.\n\nwe embrace those truths which, in like manner, surpass them, in that Union which exceeds our faculty, and exercise of discursive, and of intuitive reason.\n\n49 49 κατὰ τὴν κρείττονα τῆς καθ᾿ ἡμᾶς λογικῆς καὶ νοερᾶς δυνάμεως καὶ ἐνεργείας.\n\nD.\n\nfrequently distinguishes between the discursive and the intuitive reason.\n\nTogether they cover the whole of the intellect, cf.\n\nWordsworth, Prelude, xiv.\n\n119, 120: “Hence endless occupation for the soul, Whether discursive or intuitive.” The former gives us deductions, the latter the axioms on which these are based.\n\nSee Intr., p.\n\n26.\n\nWe must not then dare to speak, or indeed to form any conception, of the hidden super-essential 50 50 See Intr., p.\n\n4.\n\nGodhead, except those things that are revealed to us from the Holy Scriptures.\n\n51 51 D.\n\nis here contrasting the Affirmative Path of Knowing with the Negative Path of Unknowing.\n\nThe former has a value as leading up to the latter; but it is only safe so far as we keep within the bounds of Scripture.\n\nUnscriptural conceptions of God are false; Scriptural conceptions are true as far as they go; but their literal meaning must be transcended.\n\nSee Intr., p.\n\n41 f.\n\n52 For a super-essential understanding of It is proper to Unknowing, which lieth in the Super-Essence Thereof surpassing Discourse, Intuition and Being; acknowledging which truth let us lift up our eyes towards the steep height, so far as the effluent light of the Divine Scriptures grants its aid, and, as we strive to ascend unto those Supernal Rays, let us gird ourselves for the task with holiness and the reverent fear of God.\n\nFor, if we may safely trust the wise and infallible Scriptures, Divine things are revealed unto each created spirit in proportion to its powers, and in this measure is perception granted through the workings of the Divine goodness, the which in just care for our preservation divinely tempereth unto finite measure the infinitude of things which pass man’s understanding."

