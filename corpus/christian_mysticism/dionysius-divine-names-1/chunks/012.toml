body = "The formless essence (ἀμορφία) of a thing is simple and imageless—a Platonic idea—perceived by the mind; things which have bodily form are, as it were, types and symbols perceived by the senses.\n\n54 Or “indeterminate.” 55 Thus the three grades are: (1) the material world; (2) the spiritual world of truths, personality, etc.; (3) the Godhead which is, so to speak, supra-spiritual.\n\n56 i.\n\ne.\n\nA Supra-Personal Personality.\n\nSee Intr., p.\n\n4 f.\n\n57 νοῦς ἀνοητός.\n\nProbably not ” Irrational Mind” (as Dr.\n\nInge translates it).\n\nMaximus takes it passively, as translated above.\n\n58 Ps.\n\ncxlv.\n\n3 ; Matt.\n\nxi 27 ; Rom.\n\nxi.\n\n33 ; I Cor.\n\nii.\n\n11 ; Eph.\n\niii.\n\n8 .\n\n59 ὡς οὐκ ὄντος ἴχνους τῶν ἐπὶ τὴν κρυφίαν αὐτῆς ἀπειρίαν διεληλυθότων.\n\nTwo interpretations of this passage are possible: (1) Those who have penetrated the hidden Depths cannot describe the Vision (cf.\n\nDante, Par.\n\nxxxiii.\n\n55–66) ; (2) Nobody has ever penetrated into the ultimate Depths of Deity.\n\n60 θεωριά, κοινωνία, δμοίωσις.\n\nThese are three elements of one process.\n\nResemblance is the final goal, cf.\n\nI John iii.\n\n2.\n\nD.\n\ndefines Deification as “a process whereby we are made like unto God (ἀφομοίωσις) and are united unto Him (ἕνωσις) so far as these things may be.” (Eccl.\n\nHier.\n\nI.\n\n4.\n\nMigne, p.\n\n376, A.) 61 Two kinds of danger: (1) spiritual presumption; (2) the temptations of our earthly nature.\n\nIn dealing with the first D.\n\nwarns us against leaving the Affirmative Path until we are ready.\n\nThe Negative Path goes on where the Affirmative Path stops.\n\nSt.\n\nJohn of the Cross and other spiritual writers insist that, though contemplation is a higher activity than meditation through images, yet not all are called to it, and that it is disastrous prematurely to abandon meditation.\n\nS.\n\nJohn of the Cross, in the Dark Night of the Soul, explains the signs which will show when the time has come for the transition.\n\nNote the spiritual sanity of D.\n\nHis Unknowing is not a blank.\n\n62 τὰς ὅλας .\n\n.\n\n.\n\nτῶν ὑπερουρανίων τάξεων ἁγίας διακοσμήσεις.\n\n63 A depth opens up in the heart of man corresponding to the depth of the Godhead.\n\nDeep answers unto deep.\n\nCf.\n\nI Cor.\n\nii.\n\n10, 11 .\n\n64 πρὸς τοὺς θεαρχικοὺς ὕμνους.\n\nEither (1) “leads us to declare the Divine praises”; or (2) “leads us to apprehend the Divine praises as sung by angels,” etc."

