[content]
body = "And in all the other Divine enlightenments which the occult Tradition of our inspired teachers hath, by mystic Interpretation, accordant with the Scriptures, bestowed upon us, we also have been initiated: apprehending these things in the present life (according to our powers), through the sacred veils of that loving kindness which in the Scriptures and the Hierarchical Traditions, 80 80 ἱεραρχικῶν παραδόσεων, i.\n\ne.\n\nEcclesiastical Tradition.\n\nenwrappeth spiritual truths in terms drawn from the world of sense, and super-essential truths in terms drawn from Being, clothing with shapes and forms things which are shapeless and formless, and by a variety of separable symbols, 58 fashioning manifold attributes of the imageless and supernatural Simplicity.\n\nBut hereafter, when we are corruptible and immortal and attain the blessed lot of being like unto Christ, then (as the Scripture saith), we shall be for ever with the Lord, 81 81 I Thess.\n\niv.\n\n16.\n\nfulfilled with His visible Theophany in holy contemplations, the which shall shine about us with radiant beams of glory (even as once of old it shone around the Disciples at the Divine Transfiguration); and so shall we, with our mind made passionless and spiritual, participate in a spiritual illumination from Him, and in an union transcending our mental faculties, and there, amidst the blinding blissful impulsions of His dazzling rays, we shall, in a diviner manner than at present, be like unto the heavenly Intelligences.\n\n82 82 ἐν θειοτέρᾳ μιμήσει τῶν ὑπερουρανίων νοῶν—i.\n\ne.\n\nthe angels.\n\nFor, as the infallible Scripture saith, we shall be equal to the angels and shall be the Sons of God, being Sons of the Resurrection.\n\n83 83 Luke xx.\n\n36 But at present we employ (so far as in us lies), appropriate symbols for things Divine; and then from these we press on upwards according to our powers to behold in simple unity the Truth perceived by spiritual contemplations, and leaving behind us all human notions of godlike things, we still the activities of our minds, and reach (so far as this may be) into the Super-Essential Ray, 84 84 Meditation leads on to Contemplation; and the higher kind of Contemplation is performed by the Via Negativa.\n\nwherein all kinds of knowledge so have their pre-existent limits (in a transcendently inexpressible manner), that we cannot conceive nor utter It, nor in any wise contemplate the same, seeing that It surpasseth all things, and wholly exceeds our knowledge, and super-essentially contains beforehand (all conjoined within Itself) the bounds of all natural sciences and forces (while yet 59 Its force is not circumscribed by any), and so possesses, beyond the celestial Intelligences, 85 85 i.e.\n\nThe Angels.\n\nI have throughout translated ὑπερουράνιος “celestial” instead of “super-celestial.” Presumably the meaning is “beyond the material sky,” or “celestial in a transcendent sense.” Its firmly fixed abode.\n\nFor if all the branches of knowledge belong to things that have being, and if their limits have reference to the existing world, then that which is beyond all Being must also be transcendent above all knowledge.\n\n86 86 The whole of this passage shows that there is a positive element in Unknowing.\n\n5."

