body = "that which makes an individual thing to be one thing); (2) Mental or Spiritual intercourse; (3) Physical intercourse; (4) Sense perception.\n\nHere it = either (1) or (2), probably (1).\n\nlimit, infinity, everything that exists.\n\nAnd yet since, as the Subsistence 94 94 ἀγαθότητος ὕπαρξις—i.\n\ne.\n\nthe ultimate Essence in which goodness consists.\n\nof goodness, It, by the very fact of Its existence, is the Cause of all things, in celebrating the bountiful Providence of the Supreme Godhead we must draw upon the whole creation.\n\nFor It is both the central Force of all things, and also their final Purpose, and is Itself before them all, and they all subsist in It; and 61 through the fact of Its existence the world is brought into being and maintained; and It is that which all things desire—those which have intuitive or discursive Reason seeking It through knowledge, the next rank of beings through perception, and the rest through vital movement, or the property of mere existence belonging to their state.\n\n95 95 Man—Animal—Vegetable—Inorganic Matter.\n\nFor the thought of this whole passage, cf.\n\nShelley, Adonais: “That Light whose smile kindles the universe.” “The property of mere existence” = οὐσιώδη καὶ ἑκτικὴν ἐπιτηδειότητα.\n\nοὐσία = an individual existence.\n\nIts highest meaning is a “personality,” its lowest a “thing.” οὐσιώδης refers generally to its lowest meaning and = “possessing mere existence,” i.\n\ne.\n\n“belonging to the realm of inorganic matter.” See Intr., p.\n\n4.\n\nConscious of this, the Sacred Writers celebrate It by every Name while yet they call It Nameless.\n\n96 96 This shows that there is a positive element in D.‘s Via Negativa.\n\n6.\n\nFor instance, they call It Nameless when they say that the Supreme Godhead Itself, in one of the mystical visions whereby It was symbolically manifested, rebuked him who said: “What is thy name?” 97 97 Judges xiii.\n\n18 .\n\nand, as though bidding him not seek by any means of any Name to acquire a knowledge of God, made the answer: “Why askest thou thus after My Name seeing it is secret?” Now is not the secret Name precisely that which is above all names 98 98 Phil.\n\nii.\n\n9 ; Eph.\n\ni.\n\n21 .\n\nand nameless, and is fixed beyond every name that is named, not only in this world but also in that which is to come?\n\nOn the other hand, they attribute many names to It when, for instance, they speak of It as declaring: “I am that I am,” 99 99 Ex.\n\niii.\n\n14 .\n\nor “I am the Life,” 100 100 John xiv.\n\n6 .\n\nor “the Light,” 101 101 John viii.\n\n12 .\n\nor “God,” 102 102 Gen.\n\nxxviii.\n\n13 .\n\nor “the Truth,” 103 103 John xiv.\n\n6 .\n\nand when the Inspired Writers themselves celebrate the Universal Cause with many titles drawn from the whole created 62 universe, such as “Good,” 104 104 Matt.\n\nxix.\n\n17 .\n\nand “Fair,” 105 105 Ps.\n\nxxvii.\n\n4 .\n\nand “Wise,” 106 106 Rom.\n\nxvi.\n\n27 .\n\nas “Beloved,” 107 107 Isa.\n\nv."

