[content]
body = "And we press upwards to those beams which in the Holy Scripture shine upon us; wherefrom we gain the light which leads us unto 55 the Divine praises 64 64 πρὸς τοὺς θεαρχικοὺς ὕμνους.\n\nEither (1) “leads us to declare the Divine praises”; or (2) “leads us to apprehend the Divine praises as sung by angels,” etc.\n\nbeing supernaturally enlightened by them and conformed unto that sacred hymnody, even so as to behold the Divine enlightenments the which through them are given in such wise as fits our powers, and so as to praise the bounteous Origin of all holy illumination in accordance with that Doctrine, as concerning Itself, wherewith It hath instructed us in the Holy Scriptures.\n\nThus do we learn 65 65 In the whole of this passage God is spoken of as at the same time Efficient, Formal and Final Cause of the soul’s activity.\n\nD.\n\nteaches that God is present in all things, but not equally in all.\n\nCf.\n\nIntr., p.\n\n14 that It is the Cause and Origin and Being and Life of all creation.\n\n66 66 Gen.\n\ni.\n\nAnd It is unto them that fall away from It a Voice that doth recall them and a Power by which they rise; and to them that have stumbled into a corruption of the Divine image within them, It is a Power of Renewal and Reform; and It is a sacred Grounding to them that feel the shock of unholy assault, and a Security to them that stand: an upward Guidance to them that are being drawn unto It, and a Principle of Illumination 67 67 Three stages may be traced here corresponding to Purgation, Illumination and Union.\n\nI have tried to indicate the transitions from one stage to the next by the punctuation.\n\nto them that are being enlightened: a Principle of Perfection to them that are being perfected; 68 68 τῶν τελουμένων τελεταρχία.\n\n“Perfect” (τέλειος) and the words connected with it were technical terms in the Greek Mysteries.\n\nPossibly there are traces of this technical use in St.\n\nPaul’s Epistles (e.g.\n\nI Cor.\n\nii.\n\n6 ; Phil.\n\niii.\n\n15 ).\n\na principle of Deity to them that are being deified; 69 69 τῶν θεουμένων θεαρχιά.\n\nSee Intr., p.\n\n39.\n\nand of Simplicity to them that are being brought unto simplicity; 70 70 The soul must turn away from the complex world of sense and have only one desire—the desire for God.\n\nThus it becomes concentrated as it were, and so is in a simple and unified state.\n\nCf.\n\nMatt.\n\nvi.\n\n22.\n\nSee Intr., p.\n\n25 and of Unity 56 to them that are being brought unto unity.\n\nYea, in a super-essential manner, above the category of origin, It is the Origin of all origin, and the good and bounteous Communication (so far as such may be 71 71 i.\n\ne.\n\nSo far as we are capable of receiving this communication.\n\n) of hidden mysteries; and, in a word, It is the life of all things that live and the Being of all that are, the Origin and Cause of all life and being through Its bounty which both brings them into existence and maintains them.\n\n4."

