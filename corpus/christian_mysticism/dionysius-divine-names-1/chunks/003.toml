body = "59 59 ὡς οὐκ ὄντος ἴχνους τῶν ἐπὶ τὴν κρυφίαν αὐτῆς ἀπειρίαν διεληλυθότων.\n\nTwo interpretations of this passage are possible: (1) Those who have penetrated the hidden Depths cannot describe the Vision (cf.\n\nDante, Par.\n\nxxxiii.\n\n55–66) ; (2) Nobody has ever penetrated into the ultimate Depths of Deity.\n\nNot that the Good is wholly incommunicable to anything; nay, rather, while dwelling alone by Itself, and having there 54 firmly fixed Its super-essential Ray, It lovingly reveals Itself by illuminations corresponding to each separate creature’s powers, and thus draws upwards holy minds into such contemplation, participation and resemblance 60 60 θεωριά, κοινωνία, δμοίωσις.\n\nThese are three elements of one process.\n\nResemblance is the final goal, cf.\n\nI John iii.\n\n2.\n\nD.\n\ndefines Deification as “a process whereby we are made like unto God (ἀφομοίωσις) and are united unto Him (ἕνωσις) so far as these things may be.” (Eccl.\n\nHier.\n\nI.\n\n4.\n\nMigne, p.\n\n376, A.) of Itself as they can attain—even them that holily and duly strive thereafter and do not seek with impotent presumption the Mystery beyond that heavenly revelation which is so granted as to fit their powers, nor yet through their lower propensity slip down the steep descent, 61 61 Two kinds of danger: (1) spiritual presumption; (2) the temptations of our earthly nature.\n\nIn dealing with the first D.\n\nwarns us against leaving the Affirmative Path until we are ready.\n\nThe Negative Path goes on where the Affirmative Path stops.\n\nSt.\n\nJohn of the Cross and other spiritual writers insist that, though contemplation is a higher activity than meditation through images, yet not all are called to it, and that it is disastrous prematurely to abandon meditation.\n\nS.\n\nJohn of the Cross, in the Dark Night of the Soul, explains the signs which will show when the time has come for the transition.\n\nNote the spiritual sanity of D.\n\nHis Unknowing is not a blank.\n\nbut with unwavering constancy press onwards toward the ray that casts its light upon them and, through the love responsive to these gracious illuminations, speed their temperate and holy flight on the wings of a godly reverence.\n\n3.\n\nIn obedience to these divine behests which guide all the holy dispositions 62 62 τὰς ὅλας .\n\n.\n\n.\n\nτῶν ὑπερουρανίων τάξεων ἁγίας διακοσμήσεις.\n\nof the heavenly hosts, we worship with reverent silence the unutterable Truths and, with the unfathomable 63 63 A depth opens up in the heart of man corresponding to the depth of the Godhead.\n\nDeep answers unto deep.\n\nCf.\n\nI Cor.\n\nii.\n\n10, 11 .\n\nand holy veneration of our mind, approach that Mystery of Godhead which exceeds all Mind and Being."

