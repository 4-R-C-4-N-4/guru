body = "143 143 God is above Time.\n\nFor the Nameless Goodness is not only the cause of cohesion or life or perfection in such wise as to derive Its Name from this or that providential activity alone; nay, rather does It contain all things beforehand within Itself, after a simple and uncircumscribed manner through the perfect excellence of Its one and all-creative Providence, and thus we draw from the whole creation Its appropriate praises and Its Names.\n\n8.\n\nMoreover, the sacred writers proclaim not only such titles as these (titles drawn from universal 144 144 e.\n\ng.\n\n“I am that I am,” “Good,” “Fair.” or from particular 145 145 e.\n\ng.\n\nSun,” c c Star,” “Rock,” etc.\n\nprovidences or providential activities 146 146 ἀπὸ τῶν .\n\n.\n\n.\n\nπρονοιῶν ἢ προνοουμένων.\n\nThe first are the faculties of acting or being revealed in a certain way; the second are the results or manifestations of these faculties when in action.\n\n), but sometimes they have gained their images from certain heavenly visions 147 147 Thus the complete classification is: (1) Analogies drawn from the material world, (a) universal, (b) particular; (2) psychic visions.\n\n(which in the holy precincts or elsewhere have illuminated the Initiates or the Prophets), and, ascribing to the super-luminous nameless Goodness titles drawn from all manner of acts and functions, have clothed It in human (fiery or amber) shapes 148 148 Ezek.\n\ni.\n\n26, 27 .\n\nor forms, and have spoken of Its Eyes, 149 149 Ps.\n\nx.\n\n5 .\n\nand Ears, 150 150 James v.\n\n4 .\n\nand Hair, 151 151 Dan.\n\nvii.\n\n9 .\n\nand Face, 152 152 Ps.\n\nxxxiii.\n\n17 .\n\nand Hands, 153 153 Job x.\n\n8 .\n\nand Wings, 154 154 Ps.\n\nxci.\n\n4 .\n\nand Feathers, 155 155 Ibid.\n\nand Arms, 156 156 Deut.\n\nxxxiii.\n\n27 .\n\nand Back Parts, 157 157 Ex.\n\nxxxiii.\n\n23 .\n\nand Feet; 158 158 Ex.\n\nxxiv.\n\n10 .\n\nand fashioned such mystical 64 conceptions as its Crown, 159 159 Rev.\n\nxiv.\n\n14 .\n\nand Throne, 160 160 Ezek.\n\ni.\n\n26, 27 .\n\nand Cup, 161 161 Ps.\n\nlxxv.\n\n8 .\n\nand Mixing Bowl, 162 162 Prov.\n\nix.\n\n5 .\n\netc., concerning which things we will attempt to speak when we treat of Symbolical Divinity.\n\nAt present, collecting from the Scriptures what concerns the matter in hand, and employing as our canon the rule we have described, and guiding our search thereby, let us proceed to an exposition of God’s Intelligible 163 163 τῶν νοητῶν θεωνυμιῶν—i.\n\ne.\n\nthe Names belonging to God when revealed in the relative sphere; not those which belong to the ultimate Godhead as such.\n\nIn fact, the Godhead, as such, is Nameless.\n\nSee Intr., p.\n\n7.\n\nNames; and as the Hierarchical Law directs us in all study of Divinity, let us approach these godlike contemplations (for such indeed they are 164 164 κυρίως εἰπεῖν—i.\n\ne.\n\nactually godlike because man is deified by them."

