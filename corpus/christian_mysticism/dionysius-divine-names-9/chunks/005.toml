body = "power bestowed upon all according to their worth; and because all Equality (perceived or exercised by the intellect, or possessed in the sphere of 169 reason, sensation, essence, nature, or will) is transcendently contained beforehand as an Unity in Him through that Power, exceeding all things, which brings all Equality into existence.\n\n438 Boundless space cannot contain God, yet He is wholly contained in a single point of that apparent nothingness which we call air.\n\nCf.\n\nSection 3.\n\n439 Cf.\n\nSt.\n\nAugustine, Confessions, 1, Section 1.\n\nThe great paradox is that God combines perfect Rest and perfect Motion.\n\nIdealism has seized the first aspect, Pragmatism and Vitalism the second.\n\nA sense of both is present in the highest Mystical experience and in the restful activity or strenuous repose of Love.\n\n440 Cf.\n\n155, n.\n\n3.\n\n441 It is a Quality, not a quantity.\n\nVulgarity consists in mistaking quantity for quality.\n\nThis has been the mistake of the modern world.\n\n442 Heb.\n\niv.\n\n12.\n\nWe can conceive of the mind’s search for God in two ways: as a journey, (1) outwards, to seek Him beyond the sky, (2) inwards, to seek Him in the heart.\n\nPsalm xix.\n\ncombines both ways.\n\nSo does the Paradiso.\n\nDante passes outwards through the concentric spheres of space to the Empyrean which is beyond space and encloses it.\n\nThere he sees the Empyrean as a point and his whole journey from sphere to sphere as a journey inwards instead of outwards.\n\n(Canto xxviii.\n\n16.) The Mystics often speak of “seeing God in a Point.” God is in all things as the source of their existence and natural life; and in us as the Source of our existence and spiritual life.\n\n443 The Potentiality of all quality is without particular quality.\n\nCf.\n\np.\n\n155, n.\n\n2.\n\n444 It causes each thing (1) to be a thing, (2) to co-exist harmoniously with other things.\n\n445 It contains the potential existence of all things, however different from each other, as the air contains the potential life of all the various plants and animals.\n\n446 Since He is the Super-Essence of all things, their life is ultimately His Life—i.\n\ne.\n\nHe is, in every case, the underlying Reality of their individual existence.\n\n447 Because He is the underlying Reality of our separate personalities, which have their true being outside themselves in Him, therefore in finding our true selves we find and possess His Being.\n\nCf.\n\nSt.\n\nBernard: Ubi se mihi dedit me mihi reddidit.\n\n448 i.\n\ne.\n\nWe must not take metaphorical titles literally (much bad philosophy and much sentimentality and also brutality in Religion, has come from taking anthropomorphic titles of God literally).\n\n449 If anything derived this quality from some other source than God, that thing, instead of standing towards God in the relation of effect to Cause, would be co-ordinate with Him.\n\nBut as it is, all things stand towards God in the relation of effect to Cause.\n\n450 Vide supra on Very Existence, Very Life, Very Wisdom, etc.\n\n451 Cf.\n\ne.\n\ng.\n\nPs.\n\nlxxxvi.\n\n8 .\n\n452 i.\n\ne.\n\nThis stability is due to Undifferentiation.\n\n453 St.\n\nAugustine frequently explains God’s activity to consist in His causing His creatures to act, while Himself resting.\n\n454 i.\n\ne.\n\n“Due,” “right,” cf.\n\np.\n\n161, n.\n\n3."

