body = "Scripture itself declares 451 451 Cf.\n\ne.\n\ng.\n\nPs.\n\nlxxxvi.\n\n8 .\n\nthat God is Dissimilar to the world, and not to be compared therewith.\n\nIt says that He is different from all things, and (what is yet more strange) that there is nothing even similar to Him.\n\nAnd yet such language contradicts not the Similitude of things to Him.\n\nFor the same things are both like unto God and unlike Him: like Him in so far as they can imitate Him that is beyond imitation, unlike Him in so far as the effects fall short of the Cause and are infinitely and incomparably inferior.\n\n8.\n\nNow what say we concerning the Divine attributes of “Standing” and “Sitting”?\n\nMerely this—that God remains What He is in Himself and is firmly fixed in an immovable Sameness wherein His transcendent Being is fast rooted, and that He acts under the same modes and around the same Centre without changing; and that He is wholly Self-Subsistent in His Stability, possessing Very Immutability and an entire Immobility, and that He is all this in a Super-Essential manner.\n\n452 452 i.\n\ne.\n\nThis stability is due to Undifferentiation.\n\nFor He is the Cause of the stability and rest of all things: He who is beyond all Rest and Standing.\n\nAnd in Him all things have their consistency and are preserved, so as not to be shaken from the stability of their proper virtues.\n\n9.\n\nAnd what is meant, on the other hand, when the Sacred Writers say that the Immovable God moves and goes forth unto all things?\n\nMust we not understand this also in a manner befitting God?\n\nReverence bids us regard His motion to imply no change of place, variation, alteration, turning or 168 locomotion, whether straightforward, circular, or compounded of both; or whether belonging to mind, soul, or natural powers; but to mean that God brings all things into being and sustains them, 453 453 St.\n\nAugustine frequently explains God’s activity to consist in His causing His creatures to act, while Himself resting.\n\nand exerts all manner of Providence over them, and is present to them all, holding them in His incomprehensible embrace, and exercising over them all His providential Emanations and Activities.\n\nNevertheless our reason must agree to attribute movements to the Immutable God in such a sense as befits Him.\n\nStraightness we must understand to mean Directness of aim and the unswerving Emanation of His energies, and the outbirth of all things from Him.\n\nHis Spiral Movement must be taken to mean the combination of a persistent Emanation and a productive Stillness.\n\nAnd His Circular Movement must be taken to mean His Sameness, wherein He holds together the intermediate orders and those at either extremity, so as to embrace each other, and the act whereby the things that have gone forth from Him return to Him again.\n\n10.\n\nAnd if any one takes the Scriptural Title of “Same,” or that of “Righteousness,” as implying Equality, we must call God “Equal,” not only because He is without parts and doth not swerve from His purpose, but also because He penetrates equally to all things and through all, and is the Fount of Very Equality, whereby He worketh equally the uniform interpenetration of all things and the participation thereof possessed by things which (each according to its capacity) have an equal share therein, and the equal 454 454 i.\n\ne.\n\n“Due,” “right,” cf.\n\np.\n\n161, n.\n\n3."

