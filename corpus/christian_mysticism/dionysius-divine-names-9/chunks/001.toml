body = "162 CHAPTER IX Concerning ” Great ,” ” Small ,” ” Same ,” ” Different ,” ” Like ,” “ Unlike ,” ” Standing ,” ” Motion ,” ” Equality .” 1.\n\nNow , since Greatness and Smallness are ascribed to the Universal Cause, and Sameness and Difference, and Similarity and Dissimilarity, and Rest and Motion, let us also consider these Titles of the Divine Glory so far as our minds can grasp them.\n\nNow Greatness is attributed in the Scriptures unto God, both in the great firmament and also in the thin air whose subtlety reveals the Divine Smallness.\n\n438 438 Boundless space cannot contain God, yet He is wholly contained in a single point of that apparent nothingness which we call air.\n\nCf.\n\nSection 3.\n\nAnd Sameness is ascribed to Him when the Scripture saith, “Thou art the same,” and Difference when He is depicted by the same Scriptures as having many forms and qualities.\n\nAnd He is spoken of as Similar to the creatures, in so far as He is the Creator of things similar to Himself and of their similarity; and as Dissimilar from them in so far as there is not His like.\n\nAnd He is spoken of as Standing and Immovable and as Seated for ever, and yet as Moving and going forth into all things.\n\n439 439 Cf.\n\nSt.\n\nAugustine, Confessions, 1, Section 1.\n\nThe great paradox is that God combines perfect Rest and perfect Motion.\n\nIdealism has seized the first aspect, Pragmatism and Vitalism the second.\n\nA sense of both is present in the highest Mystical experience and in the restful activity or strenuous repose of Love.\n\nThese and many similar Titles are given by the Scriptures unto God.\n\n2.\n\nNow God is called Great in His peculiar Greatness which giveth of Itself to all things that are great and is poured upon all Magnitude from outside and stretches far beyond it; embracing all Space, exceeding all Number, penetrating beyond all Infinity 440 440 Cf.\n\n155, n.\n\n3.\n\nboth 163 in Its exceeding fullness and creative magnificence, and also in the bounties that well forth from It, inasmuch as these, being shared by all in that lavish outpouring, yet are totally undiminished and possess the same exceeding Fullness, nor are they lessened through their distribution, but rather overflow the more.\n\nThis Greatness is Infinite, without Quantity and without Number.\n\n441 441 It is a Quality, not a quantity.\n\nVulgarity consists in mistaking quantity for quality.\n\nThis has been the mistake of the modern world.\n\nAnd the excess of Greatness reaches to this pitch through the Absolute Transcendent outpouring of the Incomprehensible Grandeur.\n\n3.\n\nAnd Smallness, or Rarity, is ascribed to God’s Nature because He is outside all solidity and distance and penetrates all things without let or hindrance.\n\nIndeed, Smallness is the elementary Cause of all things; for you will never find any part of the world but participates in that quality of Smallness.\n\nThis, then, is the sense in which we must apply this quality to God.\n\nIt is that which penetrates unhindered unto all things and through all things, energizing in them and reaching to the dividing of soul and spirit, and of joints and marrow; and being a Discerner of the desires and the thoughts of the heart, or rather of all things, for there is no creature hid before God.\n\n442 442 Heb.\n\niv.\n\n12.\n\nWe can conceive of the mind’s search for God in two ways: as a journey, (1) outwards, to seek Him beyond the sky, (2) inwards, to seek Him in the heart.\n\nPsalm xix.\n\ncombines both ways.\n\nSo does the Paradiso."

