body = "But be these matters as God wills 513 513 This anthropomorphic phrase is not inconsistent with the conceptions D.\n\nhas been expounding; because he regards the limits of individual human capacities, etc., as timelessly existent in the Super-Essence.\n\nBy a natural, though inadequate, metaphor, the limits of the resulting activities are spoken of as due to God’s Will.\n\nthat we should do or speak.\n\nAnd be this now the end of our treatise concerning the Intelligible Names of God.\n\nNow will I proceed, God helping me, to the Symbolical Divinity.\n\n494 Religion, in its highest forms, and Philosophy and Natural Science postulate and seek some Unity behind the world.\n\nHence Unity is regarded as the ultimate attribute.\n\nThus Plotinus calls the Absolute “The One.” God possesses all Attributes not separately but indivisibly, as pure light contains all colours.\n\n495 Though the Godhead is the Super-Essence of the creatures, yet on the other hand It is distinct from them because It transcends them.\n\n(See next note.) This aspect of distinctness is manifested in the fact that the Emanation of Absolute Life, etc., is distinct from the Persons of the Trinity, the aspect of identity is manifested in the fact that They possess Absolute Life antecedently to the act of Emanation.\n\n496 The Godhead is Perfect: (1) absolutely, and not by participation in some other essence; (2) transcendently, and not in such a manner as to he differentiated froth other essences (for on the super-essential plane of the Undifferentiated Godhead there is no other essence than It).\n\nThe Emanation of Absolute Life, etc., is perfect absolutely, because, being a direct overflow from the Godhead, it does not participate in any other Essence; but not transcendently, because it is differentiated from the particular things which share it.\n\nThat is why it does not contain Exemplars.\n\nThe creatures.\n\npossess their true and undifferentiated being not in the Emanation but in the ultimate Godhead.\n\nThe Emanation is, we may say, transcendental, or timeless, but not transcencient, or undifferentiated.\n\nD., by saying that “in Its transcendence .\n\n.\n\n.\n\nIt penetrates to all things at once and beyond them,” teaches incidentally that the Godhead’s Transcendence and Immanence are ultimately the same fact.\n\nThey are two ways of looking at the one truth of Its Undifferentiation.\n\nSince It is undifferentiated the Godhead is beyond our individual being; but since It is undifferentiated It is not ultimately other than ourselves.\n\nIt is beyond our essence and is our Super-Essence.\n\nThe theory of mere Transcendence is Deism, that of mere Immanence is Pantheism.\n\nTrue religion demands both in one fact and as one fact.\n\nSo God is both near and far (see the Bible passim).\n\nHe is far because He is nearer to us than our own souls are.\n\n“Thou wast within, I was outside” (St.\n\nAugustine).\n\nHence true Introversion is an act of self-transcendence.\n\nWe must lose ourselves to find ourselves.\n\n497 Identical because timeless.\n\n498 “Perfect,” a term taken from the Mysteries expressing the final state of the initiated.\n\n499 See p.\n\n184, n.\n\n3.\n\n500 Cf.\n\nX., 2.\n\n501 The Godhead is not one individual, or essence, among others, but is the Super-Essence of them all.\n\nThe numbers 1, 2, 3, 4, etc.\n\n= 1 x 1, 1 x 2, 1 x 3, 1 x 4, etc."

