body = "abundant and inexhaustible supple, whereby It perfects all perfect 498 498 “Perfect,” a term taken from the Mysteries expressing the final state of the initiated.\n\nthings and fills them with Its own Perfection.\n\n2.\n\nAnd the title “One” implies that It is all things under the form of Unity through the Transcendence of Its single Oneness, 499 499 See p.\n\n184, n.\n\n3.\n\nand is the Cause of all things without departing from that Unity.\n\nFor there is nothing in the world without a share in the One; and, just as all number participates in unity (and we speak of one couple, one dozen, one half, one third, or one tenth) even so everything and each part of everything participates in the One, and on the existence of the One all other existences are based, and the One Cause of all things is not one of the many things in the world, 500 500 Cf.\n\nX., 2.\n\nbut is before all Unity and Multiplicity and gives to all Unity and Multiplicity their definite bounds.\n\n501 501 The Godhead is not one individual, or essence, among others, but is the Super-Essence of them all.\n\nThe numbers 1, 2, 3, 4, etc.\n\n= 1 x 1, 1 x 2, 1 x 3, 1 x 4, etc.\n\nThus in the form “1 x 1” the first figure represents the unity underlying all numbers, the second figure represents unity as a particular number among other numbers.\n\nThe first figure may thus be taken as a symbol of the Godhead, the second figure as a symbol of all created unity.\n\nFor no multiplicity can exist except by 186 some participation in the One: 502 502 Though created unity differs (see last note) from Uncreated Unity, yet it is, so to speak, a reflection thereof, as essence is a reflection of Super-Essence.\n\nSo each number, because based on an underlying Unity, is itself a unit, and the underlying Unity of the Godhead shines through the world in all the harmonies and systems of things.\n\nthat which is many in its parts is one in its entirety; that which is many in its accidental qualities is one in its substance; 503 503 A tree is one tree though (1) made up of root, trunk, branches, leaves, etc., (2) green in the leaves and brown in the trunk, etc.\n\nthat which is many in number or faculties is one in species; 504 504 There are many oaks with different capacities of growth and productiveness, yet all belong to the same “oak species”; and there are many species or kinds of trees (oaks, chestnuts, firs, etc.) yet all belong to the genus “tree.” that which is many in its emanating activities is one in its originating essence.\n\n505 505 A man’s thoughts, desires and acts of will all spring from his one personality.\n\nThere is naught in the world without some participation in the One, the Which in Its all-embracing Unity contains beforehand all things, and all things conjointly, combining even opposites under the form of oneness.\n\nAnd without the One there can be no Multiplicity; yet contrariwise the One can exist without the Multiplicity just as the Unit exists before all multiplied Number.\n\n506 506 Just as in the series 1 x 2, 1 x 3, 1 x 4, etc., if you destroy the 2, 3, 4, etc., the 1 remains, so if the universe disappeared the Godhead would still remain.\n\n(Cf."

