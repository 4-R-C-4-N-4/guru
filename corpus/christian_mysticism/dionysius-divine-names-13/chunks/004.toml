[content]
body = "And hence, when we speak of the All-Transcendent Godhead as an Unity and a Trinity, It is not an Unity or a Trinity such as can be known by us or any other creature, though to express the truth of Its utter Self-Union and Its Divine Fecundity we apply the titles of “Trinity” and “Unity” to That Which is beyond all titles, expressing under the form of Being That Which is beyond Being.\n\n512 512 Numerical unity is a number among other numbers and so implies differentiation.\n\nThe Godhead is undifferentiated.\n\nBut no Unity or Trinity or Number or Oneness or Fecundity or any other thing that either is a creature or can be known to any creature, is able to utter the mystery, beyond all mind and reason, of that Transcendent Godhead which super-essentially surpasses all things.\n\nIt hath no name, nor can It be grasped by the reason; It dwells in a region beyond us, where our feet cannot tread.\n\nEven the title of “Goodness” we do not ascribe to It because we think such a name suitable; but desiring to frame some conception and language about this Its ineffable Nature, we consecrate as primarily belonging to It the Name we most revere.\n\nAnd in this too we shall be in agreement with the Sacred Writers; nevertheless the actual 189 truth must still be far beyond us.\n\nHence we have given our preference to the Negative method, because this lifts the soul above all things cognate with its finite nature, and, guiding it onward through all the conceptions of God’s Being which are transcended by that Being exceeding all Name, Reason, and Knowledge, reaches beyond the farthest limits of the world and there joins us unto God Himself, in so far as the power of union with Him is possessed even by us men.\n\n4.\n\nThese Intelligible Names we have collected and endeavoured to expound, though falling short not only of the actual meaning thereof (for such a failure even angels would be forced to confess), nor yet merely of such utterance as angels would have given concerning them (for the greatest of those among us who touch these themes are far inferior to the lowest of the angels); nor yet do we merely fall behind the teaching of the Sacred Writers thereon or of the Ascetics, their fellow-labourers, but we fall utterly and miserably behind our own compeers.\n\nAnd hence if our words are true and we have really, so far as in us lies, attained some intellectual grasp of the right way to explain the Names of God, the thanks are due to Him Who is the Creator of all things; granting first the faculty of speech and then the power to use it well.\n\nAnd if any Synonym hath been passed over we must supply and interpret that also by the same methods.\n\nAnd if this treatment is wrong or imperfect, and we have erred from the Truth either wholly or in part, I beg thy loving-kindness to correct my unwilling ignorance, to satisfy with argument my desire for knowledge, to help my insufficient strength and heal my involuntary feebleness; and that, obtaining thy stores partly from thyself and partly from others and wholly from the Good, thou wilt also pass them on to us.\n\nAnd I pray thee be not weary 190 in this kindness to a friend, for thou seest that we have not kept to ourselves any of the Hierarchic Utterances which have been handed down to us, but have imparted them without adulteration both to yourselves and to other holy men, and will continue so to do as long as we have the power to speak and you to hear.\n\nSo will we do no despite unto the tradition, unless strength fail us for the perception or the utterance of these Truths."

