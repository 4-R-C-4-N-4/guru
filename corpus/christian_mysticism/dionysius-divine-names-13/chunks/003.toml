[content]
body = "Emily Brontë: “Every existence would exist in Thee.”) And if all things be conceived as being ultimately unified with each other, then all things taken as a whole are One.\n\n507 507 All things possess the same Super-Essence, and that is why they are connected together in this world.\n\n3.\n\nMoreover, we must bear this in mind: that when we attribute a common unity to things we do so in 187 accordance with the preconceived law of their kind belonging to each one, and that the One is thus the elementary basis of all things.\n\n508 508 Cf.\n\np.\n\n186, n.\n\n3.\n\nAnd if you take away the One there will remain neither whole nor part nor anything else in the world; for all things are contained beforehand and embraced by the One as an Unity in Itself.\n\nThus Scripture speaks of the whole Supreme Godhead as the Cause of all things by employing the title of “One”; and there is One God Who is the Father and One Lord Jesus Christ and One unchanging Spirit, through the transcendent indivisibility of the entire Divine Unity, wherein all things are knit together in one and possess a supernal Unity and super-essentially pre-exist.\n\nHence all things are rightly referred and attributed unto It, since by It and in It and unto It all things possess their existence, co-ordination, permanence, cohesion, fulfilment, and innate tendency.\n\nAnd you will not find anything in .the world but derives from the One (which, in a super-essential sense, is the name of the whole Godhead) both its individual existence and the process that perfects and preserves it.\n\n509 509 i.\n\ne.\n\nBoth its unity in space and its unity in time.\n\nAnd we also must, in the power of the Divine Unity, turn from the Many to the One and declare the Unity of the whole single Godhead, which is the One Cause of all things; before all distinctions of One and Many, Part and Whole, Definiteness and Indefiniteness, 510 510 A thing is definite when we can say of it: “This is not that,” indefinite when it is doubtful whether this is, or is not, that.\n\nThe Godhead not being a particular thing, belongs to a region where there is no “this” or “that.” So we cannot say, on that ultimate plane either: “This is not that,” or, “It is doubtful whether this is that.” Hence the mystical act of Unknowing.\n\nKnowledge distinguishes things, Unknowing passes beyond this act yet without confusion.\n\nIn Unknowing the distinction between Thinker and Object of Thought is (from one point of view) gone; and yet the psychical state is a luminously clear one.\n\nOur personalities in their Super-Essence are merged yet unconfused.\n\n188 Finitude and Infinitude; 511 511 See p.\n\n162 on “Greatness” and “Smallness.” giving definite shape to all things that have Being, and to Being itself; the Cause of everything and of all together—a Cause both co-existent and pre-existent and transcendent, and all these things at once; yea, beyond existent Unity itself, and giving definite shape to existent Unity itself.\n\nFor Unity, as found in the creatures, is numerical; and number participates in Essence: but the Super-Essential Unity gives definite shape to existent unity and to every number, and is Itself the Beginning, the Cause, the Numerical Principle and the Law of Unity, number and every creature."

