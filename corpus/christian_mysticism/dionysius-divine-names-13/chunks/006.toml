[content]
body = "Thus in the form “1 x 1” the first figure represents the unity underlying all numbers, the second figure represents unity as a particular number among other numbers.\n\nThe first figure may thus be taken as a symbol of the Godhead, the second figure as a symbol of all created unity.\n\n502 Though created unity differs (see last note) from Uncreated Unity, yet it is, so to speak, a reflection thereof, as essence is a reflection of Super-Essence.\n\nSo each number, because based on an underlying Unity, is itself a unit, and the underlying Unity of the Godhead shines through the world in all the harmonies and systems of things.\n\n503 A tree is one tree though (1) made up of root, trunk, branches, leaves, etc., (2) green in the leaves and brown in the trunk, etc.\n\n504 There are many oaks with different capacities of growth and productiveness, yet all belong to the same “oak species”; and there are many species or kinds of trees (oaks, chestnuts, firs, etc.) yet all belong to the genus “tree.” 505 A man’s thoughts, desires and acts of will all spring from his one personality.\n\n506 Just as in the series 1 x 2, 1 x 3, 1 x 4, etc., if you destroy the 2, 3, 4, etc., the 1 remains, so if the universe disappeared the Godhead would still remain.\n\n(Cf.\n\nEmily Brontë: “Every existence would exist in Thee.”) 507 All things possess the same Super-Essence, and that is why they are connected together in this world.\n\n508 Cf.\n\np.\n\n186, n.\n\n3.\n\n509 i.\n\ne.\n\nBoth its unity in space and its unity in time.\n\n510 A thing is definite when we can say of it: “This is not that,” indefinite when it is doubtful whether this is, or is not, that.\n\nThe Godhead not being a particular thing, belongs to a region where there is no “this” or “that.” So we cannot say, on that ultimate plane either: “This is not that,” or, “It is doubtful whether this is that.” Hence the mystical act of Unknowing.\n\nKnowledge distinguishes things, Unknowing passes beyond this act yet without confusion.\n\nIn Unknowing the distinction between Thinker and Object of Thought is (from one point of view) gone; and yet the psychical state is a luminously clear one.\n\nOur personalities in their Super-Essence are merged yet unconfused.\n\n511 See p.\n\n162 on “Greatness” and “Smallness.” 512 Numerical unity is a number among other numbers and so implies differentiation.\n\nThe Godhead is undifferentiated.\n\n513 This anthropomorphic phrase is not inconsistent with the conceptions D.\n\nhas been expounding; because he regards the limits of individual human capacities, etc., as timelessly existent in the Super-Essence.\n\nBy a natural, though inadequate, metaphor, the limits of the resulting activities are spoken of as due to God’s Will."

