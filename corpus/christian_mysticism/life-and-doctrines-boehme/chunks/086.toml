[content]
body = "God created him in His image; but when he fell he became subject to the limitation of time.\" ( Grace , vii.\n\n51.) \"Time has a beginning and an end, and as the will with its desire has surrendered itself to the temporal guide, the body dies and perishes therefore likewise.\" ( Signature , v.\n\n9.) \"After the fall man with his interior body lived only in time; the precious gold of heavenly corporeity, which should tincture, penetrate and bless the external body, had lost its colour.\" 3 ( Signature , v.\n\n8.) Moreover, the powers of animal life have gained so much room in man, and become preponderating in him to such an extent, that in his external essence he has become an animal himself.\n\n4 p.\n\n187 \"Man was not, like the animals, created from evil and good (out of the merely terrestrial substance).\n\nIf he had not eaten of evil and good there would not be in him the fire of the wrath; but now he has also an animal body.\" ( Aurora , xviii.\n\n109.) \"Before the sin the celestial image penetrated wholly the external man, clothing him with divine power.\n\nThe animal element was then not manifested in him; but when that image, formed of the celestial essence, paled and disappeared, then the poor soul, formed out of the first principle, found herself surrounded by the animal body, naked and bare.\" ( Mysterium , xxi.\n\n15.) \"After Adam and Eve had eaten from the tree of self-knowledge of good and evil, they soon became ashamed, because in their ethereal form there had grown up such a gross animal, made of common flesh and hard bones and animal bowels.\n\nThe animal being had swallowed up the celestial state, and arisen in them as a creature foreign to their true nature, such as they had not known heretofore.\" ( Mysterium , xxiii.\n\n1.) \"Let no one imagine that man before the fall had animal organs of reproduction, neither did he have bowels such as he has now.\n\nSuch uncleanliness does not exist within the Holy Trinity, nor within Paradise; it belongs to the earth.\n\nOriginally man was created an immortal being and holy, like the angels.\" ( Three Principles , x.\n\n7.) \"By means of the fall man, in regard to his external body, became the animal of all animals; that is to say, he became the animal image of God, wherein the word of God became manifested in an earthly manner.\n\nThus he became a master and king of all animals; but nevertheless p.\n\n188 only an animal; endowed, however, with a higher intellect than the merely animal forms.\" ( Grace , vii.\n\n6.) The senses of man also became of an earthly and animal nature, so that he is no longer able to perceive God and that which is divine.\n\n1 \"When man left the Paradise and entered into another generation, namely, into the spirit of this world, into the quality of the sun, the planets and elements, then his paradisiacal perception became extinct.\" ( Three Principles , xiv.\n\n2.) \"After the fall man became degraded to an animal state of being, so that Heaven, Paradise, and divinity became a mystery to him.\" ( Menschwerdung , i.\n\n2, 14.) \"The serpent (of desire) said to Eve, 'You will not die; but your eyes will be opened, and you will be like God.' It is true that her earthly eyes became opened, but her celestial eyes became closed.\" 2 ( Stiefel , i.\n\n44.) Man's will and mind were captured by the spirit of this world, and are now held by one or another element, as is shown by the power of the temperaments.\n\n\"The soul entered with Adam into a strange habitation, namely, within the spirit of this world."

