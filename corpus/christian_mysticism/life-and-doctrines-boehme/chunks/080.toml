[content]
body = "For the internal being is continually labouring to manifest itself outwardly.\n\nThus everything has its own mouth for the purpose of revealing itself, and therein is based the language of nature, by means of which each thing speaks out of its own quality, and represents that for which it may be useful and good.\" 1 ( Signature , i.\n\n11–17.) Footnotes 164:1 The external consciousness was hidden within the internal one, in the same sense as the character of a tree is hidden within the seed.\n\n165:1 We find the same fundamental law in all departments of nature.\n\nA new world is only a \"nebular spot,\" a dust of cosmic matter, as long as it has not formed an organised centre.\n\nLikewise man resembles a \" nebula \" of unlimited extent, of which only the organised kernel (the physical body) is visible; and so man begins to exist as a spiritual being only when the universal Spirit takes form within his soul.\n\n166:1 The visible sun in the sky is the exterior manifestation of an invisible spiritual power.\n\nAs the visible sunlight dries up swamps and destroys impurities, so is the spiritual sunlight opposed to the evil influences that arise from the astral plane.\n\n166:2 Nature exists in universal man, and be is existing in her.\n\nNature receives her consciousness from man, and as the will in him has become tinctured with evil desires, so nature—the product of his imagination—became tinctured with evil likewise.\n\n166:3 Neither Christ, nor \"Lucifer,\" nor \"the Antichrist,\" is, as the vulgar interpretation has it, outside of the soul of the world, but a power active within the latter, in the same sense as a man's disease does not exist outside of his own body, but within it.\n\n167:1 If it had not been for Lucifer's seduction and Adam's fall, primordial man would have remained for ever in blissful ignorance of the lower qualities, in a spiritual state, which he could not have fully enjoyed, because he did not know its opposite, namely, suffering.\n\nThus the devil brought suffering into the world, and is therefore man's benefactor; provided that man learns by the experience afforded to him in this way, and does not become absorbed by evil, but conquers it.\n\n167:2 If it were not for the omnipresent and superior power of good, there would be no possibility for man to conquer his evil desires.\n\nThis absolute good is the One, without which the Two (relative good and evil) could not exist.\n\n168:1 The earth, like every other cosmic body, is a form of manifestation of will, and has a sensation of its own.\n\nEvery part of the earth strives for the full enjoyment of the beneficent sun-rays, and when arriving at the meridian it would fain stand still, as if in mute adoration and worship of the glory of the celestial orb, but is pushed on by those parts that follow.\n\nThus every part alternatively embraces the sunlight and sinks again into darkness once during the daily revolution of our planet.\n\n169:1 The world is the body of universal man; the spiritual sun is his heart, and the moon is the symbol of his imagination (or fancy).\n\nThe true meaning of Boehme's writings, like those of the Bible, will only be understood if we cease to look upon the cosmos from our limited personal point of view, and, by becoming identified in our consciousness with the All, realise that the All is our Self.\n\n170:1 It may be remarked that at the time of Jacob Boehme it was not generally known that the sun has a hydrogen atmosphere, nor that water was composed of oxygen and hydrogen, the most combustible gas.\n\n170:2 The same doctrine applies to the light of the spirit.\n\nThe Christ-spirit is everywhere; but it is not manifest in every person."

