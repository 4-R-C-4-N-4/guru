body = "Sacred Texts Esoteric Index Previous Next The Life and Doctrines of Jacob Boehme , by Franz Hartmann, [1891], at sacred-texts.com p.\n\n140 CHAPTER VII.\n\nMAN.\n\n\"God created man in His own image.\n\nMale and female ( in one ) created He them.\" Man in his cosmic aspect is a being very superior to that which is commonly looked upon as a \"man,\" and which is described in books on anthropology, anatomy, &c.\n\nSuch external sciences deal only with the grossly material body of external terrestrial man, while the essential body of macrocosmic and microcosmic man is beyond the reach of external observation.\n\nIn the study of man as a cosmic being there are three subjects to be considered, although the three are only three aspects of one.\n\nThese three subjects are God, Nature, and Man, and neither one of them can be understood in its inner essence without an understanding of the other two.\n\nExternal science, \"natural philosophy,\" and theology seek to separate them.\n\nThey regard man as a being separated, distinct, and independent of nature, and nature as something independent of man; while of God they know nothing, and regard the divine power, which is the cause of all life, as if it were something external to nature and man, and beyond their reach.\n\nFor this reason the \"man\" of modern science has become an unnatural being, without any conceivable object for his existence, and nature is to him an organism evolved by accidence and subject to no other than mechanically acting law.\n\nThe divine, spiritual, creative, and hidden powers in man and in nature are entirely removed from the field of perception of the \"rationalist.\" Man, as a whole, may be conceived of as a planetary p.\n\n141 spirit, a self-conscious, luminous sphere of unimaginable extent; as, in fact, at present the mental sphere of man has no defined limits; it reaches as far as his thoughts can go.\n\nHe was created for the purpose of being the image of God.\n\nThe glory of God was residing in him, and he was penetrated by the light of divine love.\n\nIn man is contained everything, God, and the Christ, and the angels, the celestial and terrestrial kingdoms, and the powers of hell.\n\nOutside of him is nothing of which he can conceive; he can know nothing except that which exists in his mind.\n\nNo god or devil, no spirit or any power whatever, can act within man unless it enters into his constitution.\n\nOnly that which exists in him has existence for him.\n\nWithout a realisation of this fact the mysteries of religion will remain incomprehensible.\n\nIt may be interesting and amusing to speculate about all the different gods and celestial hosts that go to make up the Pantheons of the various nations, but such a study does not constitute real knowledge.\n\nOnly when man's spiritual perceptions are unfolded and he attains divine knowledge of self, then will he know the Christ and all the celestial powers whose aggregate goes to make up the kingdom of God existing within himself.\n\n\"The Spirit of God resides from eternity to eternity only in heaven—that is to say, in His own essence, in the power of the majesty.\n\nWhen it became inbreathed into the image of man, then was heaven in man; for God willed to reveal Himself in man, as in an image created after His own likeness, and to manifest the great wonders of His eternal wisdom.\" ( Stiefel , i.\n\n36.) \"Simultaneously with the introduction of His divine image, Adam received also the living word of God (spiritual intelligence) to furnish food for his soul.\" ( Menschwerdung , i.\n\n3, 24.) \"God created Adam to (enjoy) eternal life in Paradise in a state of paradisiacal perfection.\n\nDivine love illumined p.\n\n142 his interior, as the sun is illuminating the world.\" ( Stiefel , i."

