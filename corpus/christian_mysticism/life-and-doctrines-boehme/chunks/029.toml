[content]
body = "\"The eternal will, the Father, conducts His heart, His eternal Son, by means of the fire into great triumph, into His kingdom of joy.\" ( Grace , ii.\n\n21.) \"When the Father speaks His Word—that is to say, when He generates His Son—which is done continually and eternally, that Word first of all takes its origin in the first or acrid quality, where it becomes conceived.\n\nIn the second or the sweet quality it receives its activity; in the third it moves; in the heat it arises and ignites the sweet flow of power and the fire.\n\nNow all the qualities are made to burn by the kindled fire, and the tire is fed by them; but this fire is only one and not many.\n\nThis fire is the true Son of God Himself, who is continuing to be born from eternity to eternity.\" ( Aurora , viii.\n\n81.) \"The Father is the first of all conceivable beings, but if the second principle were not becoming manifest in the birth of the Son, He would not be revealed.\n\nThus the Son, being the heart, light, love, and the beautiful and sweet beneficence of the Father, but being distinct from Him in His individual aspect, renders the Father reconciled, loving, and merciful.\n\nHis birth takes place in the fire, but He obtains His personality and name by the ignition of the soft, white, and clear light, which He is Himself.\" ( Three Principles , iv.\n\n58.) \"The Son is perpetually born from eternity to eternity, and shines perpetually into the powers of the Father while these powers are continually generating the Son.\" ( Aurora , vii.\n\n33.) p.\n\n88 The Holy Spirit, manifesting Himself in the third principle, issues eternally from the Father and the Son, and in and with Him issues the splendour of God's majesty.\n\n\"The Eternal Father becomes manifest in the fire, the Son in the light of the fire, and the Holy Spirit in the power of the life and the motion that issues front the fire and the light.\" ( Signature , xiv.\n\n34.) \"The Holy Spirit reveals the Godhead in nature.\n\nHe extends the splendour of the majesty, so that it may be recognised in the wonders of nature.\n\nHe is not that splendour itself, but its power, and He introduces the splendour of the majesty into the substantiality wherein the Godhead is revealed.\" ( Threefold Life , iv.\n\n82; v.\n\n39.) Thus the holy Trinity is everywhere, manifesting itself in and through the seven qualities of eternal nature.\n\n\"We Christians say that God is threefold, but one in essence, and this is misunderstood by the ignorant as well as by the half learned, for God is not a person except in Christ.\n\nHe is an eternally generating power and the kingdom with all beings.\" ( Myst.\n\nmagn.\n\n, vii.\n\n5.) \"He is generating Himself in a threefold aspect, and in this eternal generation there is nevertheless to be understood only one essence and generation; neither Father, nor Son, nor Spirit but only the one eternal Life, or Good.\" ( Myst.\n\nmagn.\n\n, vii.\n\n11.) Footnotes 71:1 If it is asked how it is possible that Jacob Boehme knew anything about the invisible spiritual processes taking place in the universe, the answer is that the spirit of man is one and universal, and he who knows his own divine self knows the whole of the universe.\n\nSeen from the spiritual point of view, the universal cosmic processes in the body of universal nature are internal processes taking place within the organism of macrocosmic man, mirrored forth and eternally repeated in the microcosm of the individual.\n\nThe history of the universe is the history of a man.\n\nNext: Chapter IV.\n\nCreation"

