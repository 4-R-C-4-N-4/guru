[content]
body = "145:1 This was the divine Man, out of whom the world was created, while the natural man is a product of the world.\n\n145:2 Because everything was within his own will, within himself.\n\n145:3 This celestial Adam has not died, but still exists in all of us; but on account of our state of degeneration, caused by the attraction of the lower principles, we have forgotten our own divine nature.\n\n146:1 It was Adam's own state of feeling and thinking that created an Eden for him, and thus each human being creates his or her own Paradise.\n\n147:1 This Paradise ( Deva-loca or Devachan ) is described in Eastern books as an \"illusion;\" but it is no more an illusion to its inhabitants than the dream called \"terrestrial existence\" is an illusion to us.\n\nOn the contrary, it is far more permanent and beautiful than this terrestrial world.\n\n147:2 He could not enjoy similarity with God, because he did not possess divine self-knowledge.\n\nTo attain this knowledge of self he had to eat from the tree of the self-knowledge of good and evil, and then return to his original divine state.\n\n148:1 This the soul can surely not do by seeking for the Son or the Heart of God in anything outside of her own sphere, and with which she is in no way related.\n\nTherefore the meaning of the words, \"Thou shalt worship only one God,\" is \"Thou shalt have faith in no other God except the one who is seeking to reveal Himself within your own conscience, and not worship any strange idols, such as exist in the imagination of men.\" 149:1 God being a unity, has no other will or object in view than to give birth to His Son, i.e.\n\n, to manifest His outspoken Word as wisdom in man.\n\n150:1 The spiritual will of man is free; not so the will of semi-animal man, for freedom depends on the extent of knowledge.\n\nWhen man's knowledge becomes divine, then will his will be free—wholly free.\n\n150:2 Man requires the material (animal) element in him to endow him with strength to rise above it by the power of God.\n\nMan may be regarded as a god crucified within an animal.\n\nThe god furnishes him with wisdom, the animal with strength.\n\nWe are to overcome the animal in us by the power of divine wisdom.\n\nHe who has nothing to overcome can gain no victory.\n\nWe cannot rise above a thing as long as we have not attained its highest level.\n\n151:1 It would be foolish to worry about what Adam ought or ought not to have done.\n\nThe meaning is, that we who have \"Adam\" in us should enter now with our will into the will of God.\n\n152:1 If primordial man had never fallen from his purely spiritual state and \"refused to create,\" he would never have learned to know the wonders of creation, the unfoldment of the third principle.\n\nThe external world, as we know it, was created by Adam's fall.\n\n152:2 The \"devil\" means spiritual will perverted.\n\nIf it is perverted in a personal being, then will there be a personal devil.\n\n153:1 God (Christ), nature, and the devil (Antichrist— i.e.\n\n, Christ perverted) are seeking to attain self-consciousness in man.\n\nMan's consciousness is, therefore, continually changing, and in reality not his own.\n\nOnly when the principle of either good or evil has become self-conscious in man, and he has become identified with it, will he know his true impersonal self.\n\nOnly then will he be a free and responsible agent.\n\n153:2 It was his desire that the lower qualities should become conscious in himself, each according to its own nature."

