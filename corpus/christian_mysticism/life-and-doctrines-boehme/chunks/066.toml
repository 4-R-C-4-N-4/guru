[content]
body = "15.) The forthcoming of the tree of temptation is not to be wondered at, because Adam was endowed with great powers, and an earthly form as a protection to him against the powers of hell.\n\n1 \"Reason (man's reasoning) says, 'Why did God permit Adam to draw the tree of temptation out of the earth by means of his imagination?' Christ said, 'If you have faith as big as a mustard-seed, and you say to the mountain: throw thyself into the sea; it shall be done as you say.' The soul-spirit (spiritual soul) was produced out of the divine omnipotence, out of the centre of eternal nature, wherefrom all beings have been created.\n\nWhy should it then not be powerful?\n\nIt was a fire-spark out of God's power, but after it had been gathered into a created being (individualised as an organism) it gave way to its own selfish desire, and broke away from the whole, and thus it caused corruption unto itself.\n\nThe soul-power, before vanity entered, was so strong as not to be subject to anything, and would be so now, even this very day, if the understanding had not been taken away.\" ( Mysterium , xvii.\n\n41.) \"Divine prevision recognised that the devil was going to winnow mankind, and to introduce them into evil desire; and therefore God put before them the tree of life, and of the knowledge of good and evil, by means of which the breaking up (the death) of the external body was inaugurated.\n\nHe did this lest man should long after the centre of the dark world.\" 2 ( Mysterium , xvii.\n\n38.) p.\n\n156 Formerly Adam belonged to the celestial world and to eternity; but now, the image of God having begun to pale in him, he sank into the terrestrial state, and thereby into impotency and sleep.\n\n\"A reasonable person will easily perceive that there could be no sleep in Adam as long as he was in the image of God, for at that time he was such an image as we shall be in the resurrection of the dead.\n\nWe shall then not need the elements, neither the sun nor the moon, and also require no sleep; but our eyes will be open to see always and eternally the glory of God.\" ( Three Principles , xii.\n\n17.) \"The image of God does not sleep.\n\nIn it there is no time.\n\nWith sleep, time became manifest in man.\n\nHe fell asleep in the angelic world, and awoke relatively to the external world.\" 1 ( Mysterium , xix.\n\n4.) \"After Adam had been overcome, the tincture , wherein the beautiful virgin had previously dwelt, became terrestrial, faint, and feeble.\n\nThe powerful source of the tincture , wherefrom the virgin had her power, without being subjected to sleep, left Adam and went into its own principle.\" ( Three Principles , iii.\n\n8.) Thus Adam became a victim of Magic, and now his magnificence was gone.\n\nSleep signifies death and surrender.\n\nThe terrestrial realm had conquered him and ruled over him.\" ( Menschwerdung , i.\n\n5.) \"After the lust of the spirit of this world had conquered in Adam, he fell asleep.\n\nThen his celestial body became flesh and blood, and his strong power became rigid bones.\n\nThen the celestial virgin went into the p.\n\n157 celestial ether, into the principle of power.\" 1 ( Three Principles , xiii.\n\n2.) This impotency was to be a means of salvation for Adam, and moreover there was given to him the terrestrial woman in the place of the celestial virgin, who had passed away from him.\n\n2 This was done to save him from arriving at a still greater depth of degradation.\n\n3 \"When Adam left God and entered into selfishness, God permitted it to happen that a deep sleep fell upon Adam."

