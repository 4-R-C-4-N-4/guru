[content]
body = "Without the incarnation a real union of God and man, and a resurrection of the latter from death, would not have been possible.\n\n1 \"It was the will of God to transmute humanity, after it had become earthly, again into the celestial quality, to turn the human earth (material element) into heaven, to make out of the four elements only one, and to transform the wrath of God in human quality into love.\n\nBut the wrath of God, having become ignited in man, was a power of fire and fury, to resist which, and to transform it into love, it was necessary that love itself should enter into the wrath and surrender itself wholly to it.\n\nIt was not enough for that purpose that God should remain in heaven (in His own divine self-consciousness), and look lovingly down upon humanity.\n\nThis would not have subdued the power of the fury and wrath, neither would they have entered into a state of love.\" ( Signature , xi.\n\n7.) \"In the holiness of God the human essence could not have been conceived without the presence of an appropriate medium; the will was separated from it.\n\nTherefore God became man, so that He might endow or bless humanity with His divinity, and that He may become conceivable to us.\" ( Baptism , ii.\n\n36.) p.\n\n245 \"Before the incarnation took place, the Word could redeem the soul, so that she could stand the test before the Father in the fire; but not (the test) in the love and delight before the light of the Holy Trinity.\n\nA rising from the tomb was not thus to be accomplished.\n\nIf man was to be raised from the tomb, the Word had first to become man.\" 1 ( Three Principles , xvi.\n\n35.) \"The pious have clothed themselves in Christ before His incarnation in the covenant of promise, not in substance, but merely in power; not in the flesh, but merely in the spirit.\" ( Stiefel , ii.\n\n442.) In consequence of sin the power of death had become a ruler, and therefore the Redeemer entered Himself into death for the purpose of conquering it, and to obtain for us again the fulness of divine life.\n\n2 \"In consequence of the sin there was no salvation for man; if the eternal Word and heart of God had not become human and entered into the third principle, into the human flesh and blood, taking upon itself (the state of) a human soul, and entering into the death of the destitute soul, whereby it could take away from death its power and from hell its terrible sting, and thus conduct the soul out of death and redeem her from hell.\" ( Threefold Life , viii.\n\n39.) \"Adam's soul had turned from God and died relatively to the essentiality of tile light.\n\nThus the second Adam brought the soul again into the fire, i.e.\n\n, into the fountain of wrath, and ignited again the light in death.\n\nThen shone the light again into the darkness, and death died itself, and for the wrath or hell there was created a plague.\" ( Tilk .\n\ni.\n\n513.) p.\n\n246 \"As we had gone out from the freedom of the angelic world and entered into the dark torture, therefore the power and the word of the light became man, and led us out of the darkness and through death in the fire into the freedom of divine life, into the divine essentiality.\n\nTherefore Christ had to die and to enter into the divine essentiality through hell and through the wrath of eternal nature, and to open a road for our soul through death and through the wrath, on which we may enter with Him by means of death into divine life.\" ( Menschwerdung , i.\n\n3, 7.) \"When the two kingdoms, the wrath of God and the love of God, were battling with each other, then appeared Christ as the hero."

