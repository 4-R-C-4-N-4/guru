[content]
body = "When, then, death actually takes place, and separates the soul from the body, the poor soul will then cling to that thread and refuse to let go her hold of it, but all her essences are still deeply immersed in the wrath of God; she is tortured by her gross sins, and the thread of faith (the umbilical cord) of the new-born being is very feeble.\n\n1 Therefore when the bridegroom says 'Come!' the poor soul answers, 'I cannot; my lamp is not yet ready;' but she clings to the thread and puts her imagination into the heart of God, and thus she becomes ultimately redeemed by the suffering of the Christ (in her) from the pool of putrefaction; i.e.\n\n, from her fearful sins that are burning in the wrath of God and wherein she is immersed.\" ( Three Principles , xix.\n\n41.) A soul that has gathered her divinity around herself like a garment of light and cut loose from all earthly attractions will have no desire to return to the earth and takes no interest in terrestrial affairs, which in fact she has forgotten, like a person who forgets his external circumstances after he goes to sleep; but a soul still held captive by the terrestrial essence or state may reappear among mortals in her sidereal (astral) body for the purpose Of seeking gratification for some personal wish.\n\nSuch souls sometimes return for the purpose of asking the living to aid them with prayer.\n\np.\n\n308 \"When a person dies the external body becomes decomposed and returns to that of which it has been formed, but the soul born from eternal nature, and having been introduced into the Adamic essence by the Spirit of God, cannot die; for she has not originated in time, but from the eternal generation.\n\nIf the soul has introduced her will into temporal things, she has then conceived of the quality of those things in her desire, and holds to them magically, as if she were possessing them corporeally.\n\nOf course she cannot keep the elementary (physical) body, but she may retain her sidereal body until it leas been consumed by the constellation (the astral elements).\n\nThus it happens sometimes that persons after death are seen in their houses, in their own body, but that body is cold, dead, and stiff, and the soul-spirit attracts it only by means of the astral spirit, until the (physical) body is decomposed.\" ( Letters , xxii.\n\n8.) \"Souls that have not yet reached heaven have still the human state, with its deeds, clinging to them, and therefore many a soul of that kind returns in her sidereal form and haunts her house, and is seen in human form.\n\nShe may then ask for this or that, and think to be able to obtain the blessing of the saints for her rest (by means of the prayers she asks), and she may likewise concern herself about children or friends.\n\nAll this, however, does not last any longer than until her astral spirit has been consumed, and then she will enter into rest.\n\nAfter that all leer sorrow and trouble is over, and she has then no more knowledge of it; only that she sees it in the wonders, in the magia (of the spirit).\" ( Forty Questions , xxvi.\n\n8.) \"Christ says, 'Wherever your treasure is, there is your heart.' Thus it has often happened that unfortunate souls have reappeared in their community and asked for help by way of prayer, and that they fancied that in this way they might find relief.\n\nOut of such facts the doctrine of the purgatory has originated.\" ( Threefold Life , xii.\n\n24.) p."

