body = "Sacred Texts Esoteric Index Previous Next The Life and Doctrines of Jacob Boehme , by Franz Hartmann, [1891], at sacred-texts.com p.\n\n122 CHAPTER VI.\n\nTHE RESTORATION OF NATURE AND THE GENERATION OF MAN.\n\n\" If we speak about heaven and the birth of the elements, we are then not telling of things that are far away or foreign to us, but of that which is taking place within our own self, and there is nothing nearer to us than this birth, for we are therein as in our own mother.\n\nIf we speak of heaven, we then speak of our home, of our own country, wherein the illumined soul can see, even if that country is hidden before the eyes of the body.\" ( Principles , vii.\n\n7.) The Mosaic account of creation was never intended to be a history of the creation of the world from the beginning, but it is a history of the renewal or the restoration of the natural world that was formerly ruled by Lucifer, and which was thrown into disorder and convulsion by his desertion from God.\n\n\"Before the times of the wrath there were in the locality of this world the six sourcive spirits generating the seventh in a sweet and lovely manner, as is even now done in heaven, and there was growing therein not even a spark of wrath.\n\nAll that was contained therein was light and clear, needing no other light, for the fountain of love within the heart of God was illumining all.\n\nNature was then very ethereal, and everything therein stood in great power.\n\nBut as soon as in nature the war with the proud devils began, everything took another shape and mode of action.\n\nThe light became extinguished in the external generation, and therefore the heat became imprisoned in corporeity and could no p.\n\n123 longer generate its own life.\n\nFrom this cause death then entered into nature, and nature degenerated.\n\nConsequently another creation of light had to be inaugurated, and without that the earth would have had to remain in eternal death.\" 1 ( Aurora , xvii.\n\n2; iv.\n\n15.) Everything in nature was to bloom out and become newly-born, as may be seen by beholding minerals and stones, trees, grass, and herbs, and animals of various kinds, and although all these formations were perishable and not pure in the sight of God, nevertheless God intended to extract from them at the end of this time their heart and kernel, and to separate them from the wrath and death, and then that which had thus been regenerated was to bloom eternally, and to bear again celestial fruits outside of and beyond the locality of this world.\" 2 ( Aurora , xxiv.\n\n2 5.) \"The same sal-nitre \" (the material basis or foundation), \"which at the time of the ignition of the wrath perished in death, has at the time of regeneration been raised in the flash of fire.\n\nIt has not become anything new, but merely another form of corporeity, which is now in a state of death\" (existing relatively to us as gross matter).\n\n3 ( Aurora , xxii.\n\n80.) The outcast spirits, having produced in nature a state of ignition, God gathered together the essence of that nature, and thereby He withdrew it from the reach of those powers, putting a stop to their insolence by means of water.\n\n4 p.\n\n124 \"The outcast spirits were still in the quality of the Father, and therefore they ignited the quality of nature by means of their imagination, so that the celestial substance became earth and stones, and the sweet spirit of the water a burning sky.\n\nAfter this the creation of this world took place.\" ( Menschwerdung , i."

