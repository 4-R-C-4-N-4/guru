[content]
body = "21.) \"All the seven spirits of God are born one in another.\n\nOne gives birth to the other; there is neither first nor last.\n\nThe last generates the first, as well as the first the second, the third the fourth, up to the last.\n\nThey are all seven equally eternal.\" ( Aurora , x.\n\n2.) \"If I am sometimes describing only two or three as being active in the generation of another spirit, I am doing so on account of my weakness, because in my degenerate mind I cannot retain the impression of the action of all the seven in their perfection.\n\nI see all the seven; but when I begin to analyse what I see, I then cannot grasp all the seven at once, but only one after another.\" ( Aurora , x.\n\n22.) These seven properties are never transformed one into another; each retains eternally its own specific essentiality.\n\nThe relations into which they enter with each other serve for the purpose of their mutual glorification; so that they, when they meet each other like strains of sweet harmonies in God's eternal nature, appear like flaming lights of life and joy.\n\nThus matter is never transformed into spirit, but illumined and glorified by the latter, while the spirit obtains its corporification from matter, and, is thus enabled to become manifest.\n\nLikewise ignorance is never transformed into knowledge, nor death into life.; but an ignorant person may become wise if illuminated by the light of wisdom, and a body in which life is inactive may be made living if the activity of life is aroused therein.\n\np.\n\n74 \"Each of these principles is strongly defined in regard to its nature, nevertheless there is no antipathy between them.\n\nThey are all rejoicing in God as one only spirit.\n\nEach loves the other, and there is nothing among them but joy and happiness.\n\nTheir evolution is an eternal one and never any other.\" ( Aurora , x.\n\n51.) \"The higher they become exalted, and the more they become ignited, the greater will be their joy in the kingdom of light.\" ( Mysterium , v.\n\n6.) \"Each quality of the spirit desires the other, and when it acquires its object it becomes as it were changed into that other; but its own quality is thereby not lost, it merely adapts itself to the other, and manifests another kind of anguish (consciousness), but both retain their own special qualities.\" ( Threefold Life , iv.\n\n8.) Thus the darkness is illumined by the light, but it never becomes light itself, nor can the light become darkness.\n\nThe light shineth eternally into darkness, but the darkness comprehendeth it not.\n\n\"Each of these divine forms of life desires to govern; each has a will of its own.\n\nWithout that there could be no sensibility nor perceptibility, but only eternal tranquillity.\n\nNeither, however, of them is pressing forward to make itself manifest more than the rest, but all are in perfect harmony with each other.\" ( Stiefel , ii.\n\n348.) \"When the fourth principle enters into the first, all the spirits intermingle their light, triumph, and rejoice.\n\nThey then arise all one within the other, and evolve each other as if moving in circular motion; and the light in the midst of them begins to shine and renders them luminous.\n\nTheir harsh quality then remains hidden like a kernel in a fruit.\n\nAs a sour or bitter unripe apple by ripening in the sun becomes changed, so that it acquires an agreeable taste, but nevertheless retains the qualities that constitute it an apple, likewise the Godhead retains its own essential qualities, but they become manifest in a sweet and agreeable manner.\" ( Aurora , xiii.\n\n80.) p.\n\n75 \"All the seven principles are spiritual within eternal nature, and appear there in a clear, crystalline, translucent substantiality.\" ( Grace , iii."

