[content]
body = "2.) \"The inner man stood in heaven; his essences were the Paradise; his body was indestructible.\n\nHe knew the language of God and the angels, and the language of nature, as may be seen by Adam giving names to all creatures, to each according to its own essence and quality.\" ( Forty Questions , iv.\n\n7.) \"Adam, after having been created by God, was in Paradise in a state of joy and glorification, beautiful and filled with knowledge.\n\nGod then brought before him, as the lord of the world, all the animals, so that he might behold them, and give a name to each according to its special essence and power.\n\nAnd Adam knew that he was within every creature, and he gave to each its appropriate name.\n\nGod can see into the hearts of all things, and the same could be done by Adam.\" 1 ( Three Principles , x.\n\n17.) In this state of godlike being he had power over all things; for all things existed in him and he in all, and there was nothing that could have done him any external injury.\n\nTo express it in other words, all things existed subjectively in his mind, as they now do in ours, but his mind was his \" body,\" and where the centre of his consciousness was, there was his \"form.\" 2 p.\n\n145 \"As God is a Lord over all, so man in the power of God was to be a lord over this world.\" ( Menschwerdung , i.\n\n4, 7.) \"The soul in the power of God penetrates through all things, and is powerful over all, as God Himself; for she lives in the power of His heart.\" ( Three Principles , xxii.\n\n17.) \"As gold is incorruptible in the fire, so man was subject to nothing, only to the One God dwelling in him, and manifested in him by the power of His holy being.\" ( Mysterium , xvi.\n\n12.) \"Everything was subject to Adam; his rule extended into heaven and over the earth, and in all elements and stars.\n\nThis was because divine power was manifested in him.\" 1 ( Mysterium , xvi.\n\n2.) \"The will-spirit of man penetrated through all creatures, and was injured by none, because none could grasp it.\n\nNo creature can apprehend the power and light of the sun in its own will, but must remain passive to become penetrated by it; thus it was then the case with the will-spirit of man.\" ( Grace , vii.\n\n2.) \"Before his fall, man could rule over the sun and the stars.\n\nEverything was in his power.\n\n2 Fire, air, water, and earth could not tame him; no fire burned him, no water drowned, no air suffocated him; all that lived stood in awe of him.\" ( Threefold Life , xi.\n\n23.) \"No heat, no cold, no sickness, nor accident, nor any fear could touch or terrify him.\n\nHis body could pass through earth and rocks without breaking anything in them; for a man who could be overpowered by the terrestrial nature, or who could be broken to pieces, would not be eternal.\" 3 ( Menschwerdung , i.\n\n2, 13.) p.\n\n146 Likewise that nature which surrounded him, and which is called Eden, was illuminated by the celestial light, and it was thereby exalted to paradisiacal magnificence.\n\n\"Adam was in Paradise, that is to say, in the temperature.\n\nThereby he was placed in a certain locality, namely, in that where the holy world was blooming out through the earth and bearing the fruits of Paradise.\" ( Grace , v.\n\n34.) \"'Eden' means the locality, but 'Paradise' is the out-flowing or the life of God in divine harmony.\" ( Letters , xxxi."

