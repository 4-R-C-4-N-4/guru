[content]
body = "The other one (Jacob) came also from the same Adamic nature; but in that nature was the realm of grace in the essence of faith, constituting a conqueror.\n\nEven if the latter was inferior according to the Adamic nature, nevertheless God was (more) revealed in him, and therefore the greater one was to serve and be subject to the smaller one.\n\nIt is not shown that Esau became subject to Jacob, but the story represents to us a spiritual symbol, showing how the kingdom of nature in man was to become subjected and to be made to submit in humility to the kingdom p.\n\n214 of grace; how it should become entirely submerged in divine humility, and out of that humility become regenerated.\" ( Mysterium , lii.\n\n29.) \"Upon Esau followed Jacob as the image of Christ, conceived in the essence of faith and clinging to Esau's heel.\n\nThe Adamic image created by God had to be born first of all and to live eternally, but not in its gross and animal state of existence.\n\nWith the expression of 'Jacob holding on to Esau's heel' is symbolised that the other Adam, namely, Christ, should be born after the first Adam, and grasping him from behind, draw him back from the direction of his own self-will into the first matrix, wherein nature originated, so that he might be newly born.\" ( Mysterium , lii.\n\n37.) \"Esau was born of holy parents, and represented an image of corrupted nature only in regard to his state of separation.\n\nGod separated also the image of Christ from the same seed of Esau's parents (as Jacob), and put it before him as a contrast to his brother (Esau).\n\nMoreover, Jacob by his gift and humility excited the greatest compassion in Esau, and therefore we should not condemn Esau.\" 1 ( Grace , ix.\n\n121.) More important than these opposites are those of the descendants of Japhet, because they selected for themselves false gods from the powers of nature, and were now led by them by means of oracles.\n\n\"The idolatry of the heathen consisted in their departing from the one only God and turning to the magic generation of nature, selecting false gods from the powers of nature.\" 2 ( Mysterium , xi.\n\n6.) p.\n\n215 \"The heathen worshipped the planetary system and the four elements, because they knew that these ruled the external life of all things.\n\nThus by means of their intellectually conceived word they entered into the likewise conceived and formed (manifested) word of nature.\n\nOn the other hand, the spirit of the formed word of nature became a part of themselves, and thus one intellect moved the other.\n\nThe human intellect moved the intelligence within the soul of the external world as far as the desire of the latter is concerned, and by means of this intelligence (residing within the astral light or the mind of the external world) the prophetic spirit out of the Spirit of God indicated to them how in future times the formed word of external nature would manifest itself in the up-building and in the destruction of kingdoms, &c.\n\nOut of this soul of the world the heathen received answers by means of their images and idols, because their faith which they very powerfully introduced into them moved them; and this has therefore not all been accomplished by the devil, as it is supposed by those who, knowing nothing about the mystery, make the devil responsible for everything, while they are ignorant of what either God or the devil is.\" ( Mysterium , xxxvii.\n\n10–13.) Those heathen who led a pure and blameless life arrived at a knowledge of the symbols of celestial things by means of their ability to see within the mirror of external nature.\n\n1 \"The heathen remained within their own magic, but p."

