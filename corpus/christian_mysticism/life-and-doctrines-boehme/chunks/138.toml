[content]
body = "Often she is deluded with sin, and everything seems to be against her.\n\nYou must continually battle against the devil.\n\nThen will the pearl-tree grow like grass in storm and rain; but when it becomes big and brings forth flowers, you may then be sure of obtaining the fruit.\" ( Three Principles , xxiv.\n\n37.) The new life of the Spirit unfolds itself within the innermost being, and the terrestrial man is only rarely pervaded by the divine luminosity.\n\n\"Not the mortal soul, but the inner (spiritual) soul from the eternal Word of God is to be married to Sophia.\n\np.\n\n273 [paragraph continues] The external soul is wedded to the constellation (mental functions) and elements.\n\nThis external soul only rarely obtains a glance at Sophia, for she has death and mortality within herself.\n\nAfter this time she is to be again transformed into the first image which God created in Adam.\" ( Mysterium , lii.\n\n13.) \"While the mortal house exists our soul does not dwell in the fountain of God, so as to apprehend that fountain in her selfhood.\n\nThe sun shines through a glass and renders it luminous; nevertheless the glass does not become the sun.\n\nIt merely remains (for a while) in the light and power of the sun, and the latter shines to and through its substance.\n\nThus it is with the soul in her terrestrial state.\" ( Mysterium , lii.\n\n3.) \"As fire glows in hot iron, so are the rays of the Holy Spirit sometimes penetrating the other principle; namely, the new man penetrates the old one.\n\nBut as iron, whether within or without the forge, always remains iron, likewise it is with the terrestrial man.\n\nHe undoubtedly has to become a servant for the inner man, whenever the latter penetrates him with his glowing divine fire; and he is willing that this should be so as long as the glow of that fire is within him, but he cannot transform himself into the interior kingdom.\n\n'The external flesh and blood,' says Christ, 'shall not inherit the kingdom of heaven.' It shall and must dissolve, like the husk of the kernel sown into a field.\" ( Stiefel , i.\n\n24.) Only rarely, but especially in the moment of regeneration, there is within the human self the living sensation of a celestial existence.\n\n\"No one must ever think that the tree of the Christian faith can be seen or known in the kingdom of this world.\n\nExternal man does not recognise it, and even if it happens that the Holy Spirit manifests itself in the external mirror, so that the external life is glad and trembles for joy, and thinks that now it has received the p.\n\n274 esteemed guest, and that it would now believe, nevertheless there is no perfect duration therein; for the Spirit of God does not remain constantly within the terrestrial mind.\n\nIt wants to have a clean vessel, and whenever it returns into its principle—this being the true image—then the external being becomes doubtful and full of fears.\" ( Menschwerdung , cxi.\n\n8.) \"The soul puts on her wreath; but it is again taken away from her and put aside.\n\nThus it is with a crown with which a king has been crowned, and which is afterwards kept in the treasury.\n\nThis is done to the soul because she is still surrounded by a house of sin; so that if she should fall again, her crown may not become soiled.\" ( Repentance , i."

