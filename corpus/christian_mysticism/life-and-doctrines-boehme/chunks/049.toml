[content]
body = "2–8.) Creation could not take place as long as all the elements were in a state of revolution; only after the \"Spirit of God moved upon the waters of the deep\" could the divine Word take form.\n\n\"When the eternal Word moved, because of the malice of Lucifer, and for the purpose of expelling this evil guest from his residence into eternal darkness, the essence was rendered compact (coagulated).\n\nGod was not willing to leave the manifested powers, wherein Lucifer ruled as a prince, any longer in his command, but he caused them to enter into a state of coagulation and spued him out therefrom.\" ( Mysterium , x.\n\n13.) \"Therein consists the fall of Lucifer, that he awakened the mother of fire and wanted to rule over the benevolence in the heart of God.\n\nThis fire is now his hell; but this hell God has captured by means of heaven— i.e.\n\n, the mother of water .\n\nFor while the locality of this world was to burn on his account in the fire, God moved to create, and created the water.\n\nFrom this has resulted the ocean and the unfathomable watery depth.\n\nSo it was at Sodom and Gomorrha , for when their sin was great and the devil resided therein, desirous of maintaining his power, God permitted that the prince of this world ignited those five kingdoms with fire and sulphur.\n\nBut while the devil imagined to be lord in that place, and to have there his dwelling, God thought of breaking his pride; He caused water to come there, and thus He extinguished his glory.\" 1 ( Threefold Life , viii.\n\n24.) p.\n\n125 By His creative will, full of love, God caused the light to arise, and thus He directed the power of darkness downwards into the depths.\n\nThus, when the soul of man rises up to eternal freedom, the powers of darkness disappear in the abyss below.\n\n\"The wrath did not touch the heart of God; but His benevolent love issues from His heart, penetrating into the most external generation of wrath, and extinguishing the latter.\n\nTherefore He said, Let there be light.\" ( Aurora , 85.) \"When God spoke, Let there be light, the holy power which was conceived together with the wrath, moved, and the power of the devil was entirely withdrawn from him in its essence.\" ( Mysterium , xii.\n\n14.) \"Thus the darkness remained within the quality of the wrath in the substance of the earth, and within the whole depth of this world; and in the substance of light, the light of nature from heaven— i.e.\n\n, out of the fifth essence, arose that whereof the constellation was created.\n\nThis essence is everywhere, in the earth and above the earth.\" 1 ( Aurora , xii.\n\n15.) By means of this new creation of the light, the new life had begun to stir everywhere; but this creation, in accordance with the number of the divine spirits which were active thereby, arrived at a state of perfection only on the seventh day.\n\n2 \"When God spoke the word, Let there be light, the essence, the being within the quality of the light, stirred not only within the earth, but also within the whole depth, in great power; wherefrom on the fourth p.\n\n126 day the sun was created—that is to say, ignited .\" Mysterium, xii.\n\n13.) \"When God stirred to create this world, it was not that only one part moved and the other one rested, but there was all in motion at once.\" ( Aurora , xxii.\n\n122.) \"This motion lasted during six lengths of days and nights, when all the seven spirits of God were in complete and moving generation, and also the heart of all spirits, and the sal-nitre of the earth turned around in that time six times within the great wheel.\" ( Aurora , xxi."

