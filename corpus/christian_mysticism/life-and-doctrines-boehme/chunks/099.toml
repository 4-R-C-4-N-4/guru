body = "Japhet also represents an image of the Father, and Sem that of the Son; but Ham is an image of the external world.\" 2 ( Mysterium , xxxi.\n\n10.) From these fundamental directions result the different p.\n\n211 fates of these races, such as they were already predicted by Noah.\n\n\"The configuration of Sem descended upon Abraham and Isaac, for there the Word of the covenant was manifested and contained within the sound; but Japhet's configuration went through the wisdom of nature in the realm of nature, and from that originated the heathen (intellectual but unspiritual people) who were giving (preeminently) attention to the light of nature (natural things).\n\nThus Japhet—that is to say; the destitute, imprisoned soul, belonging to eternal nature—lived within the \"huts\" of Sem— i.e.\n\n, within the covenant—for the light of nature lives in the light of grace, constituting a form or a conceived state of the unformed light of God.\n\nHam's descending line overshadowed animal man, formed from the Limus of the earth, wherein is the curse, and from that resulted the sodomitic semi-animal race, that pays attention neither to the light of nature nor to that of grace in the covenant.\" ( Mysterium , xxxiv.\n\n14.) \"Noah said, 'Praised be the God of Sem, and Japhet shall live in the huts of Sem.' Here by the expression 'God of Sem,' is meant the holy Word in the covenant, and how it would manifest itself, that the Japhites or heathen—that is to say, those who lived only by the light of nature—would come to the light of grace that was manifested in Sem, and thus enter into the 'huts of Sem' and live therein.\n\nBut Ham, the spirit of fleshly lust, was to become a servant of the children of light, according to his quality and selfhood, because the children of God were to force him to become submissive to p.\n\n212 [paragraph continues] Him and take away his scoffing self-will.\" 1 ( Mysterium , xxxiv.\n\n31.) The name of Abraham had not a terrestrial meaning, and in this, as in many other respects, he was an anti-type of Christ.\n\n2 \"The great name which God was to give to Abraham in his seed was not to be taken in an especially terrestrial sense; for Abraham was upon this earth like a stranger, owning no principality or kingdom.\n\nHe was to be in the promised seed and blessing a stranger upon the earth, and therein resembled Christ, whose kingdom was likewise not of this world.\" 3 ( Mysterium , xxxvii.\n\n23.) Nevertheless the sons of Abraham represent the same antithesis as those of Noah and Adam.\n\n\"Isaac was not made entirely of celestial essence, but of both—namely, of Abraham's Adamic essence and of the word conceived of faith, or the substance of Christ; but Ishmael was only of Adam's own nature according to the corrupted quality, and not from the conceived word of faith, which was acting with superior strength upon Isaac.\" 4 ( Mysterium , xl.\n\n13.) p.\n\n213 The same may be said about the sons of Isaac, in whom there is plainly represented an image of the first and the second Adam, and of the final conquest of the first by the second.\n\n1 \"Esau and Jacob both, and also the races descending from them, have originated out of one seed.\n\nThe former, coming solely out of the Adamic nature, was the greater one, and comparable to the first man whom God created in His own image, which image, however, became corrupted and died relatively to God."

