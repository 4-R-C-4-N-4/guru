[content]
body = "31.) \"This terrestrial world is based upon the world of darkness, and if the good bad not been also embodied therein, there would be in it no other doing than that of the world of darkness; but this is prevented by the divine power and by the light of the sun.\" 1 ( Six Theosophical Points , ix.\n\n17.) \"This world is rooted in evil and good, and there can be neither one of them without the other.\n\nBut the great misfortune in it is that evil is preponderating therein over good, and the wrath stronger than love, and this is due to the sin of the devil and of man, who excited nature by their perverted desires, so that the world is now powerfully qualified in wrath, acting like a poison within the body.\" 2 ( Mysterium , xi.\n\n15.) That the darkness has obtained so much power in this world is not the fault of God, but it is due to Lucifer, who corrupted the primordial creation, and who in consequence of Adam's fall is now still more enabled to act within the dark element of nature.\n\n3 \"Within all nature there is a continual wrestling, battling, and devouring, so that this world may truly be called a p.\n\n167 valley of sorrow, full of trouble, persecution, suffering, and labour; for when the spirit of creation went into the middle, it had to form the world from the midst of the kingdom of hell.\" ( Aurora , xviii.\n\n112.) \"Nature, up to the day of judgment, has two inherent qualities; one is lovely, celestial, and holy, and the other one wrathful and hellish.\n\nThe good quality works with great diligence for the purpose of producing good fruits under the influence of the Holy Spirit, and likewise the evil quality labours for the purpose of producing evil fruits, receiving power and incitement thereto by the devil.\" ( Aurora , Preface, x.\n\n10.) \"The devil resides in this world, and he continually infests external nature; but he has his power only in the wrath, in bitter desire.\" 1 ( Menschwerdung , i.\n\n2, 4.) God acts with the holy power of his inner world against the corrupting power of Lucifer, but the external world is not thereby changed in its own particular essence.\n\n2 \"The inner world, the world of light, dwells in the external world, and the latter receives power from the former.\n\nShe blooms in the external power, but this power knows nothing of it.\" ( Six Theosophical Points , vi.\n\n2.) \"The powers of eternity work through the powers of time, like the sun that shines through water, while the water does not apprehend the sun, but only receives the heat; or, like a fire, which glows in the iron, but the iron remains iron nevertheless.\" ( Mysterium , xii.\n\n20.) p.\n\n168 \"The spiritual world is hidden within the visible elementary world, and acts through the latter, and by means of the separator , or the soul of the outer world, it shapes itself in all things according to the character and quality of each thing; but the visible being receives the invisible one not in its own power, neither does the external thing become changed into the inner one, but the inner power merely takes shape therein, as we may see if we observe the growth of herbs, trees, and metals.\" ( Contemplations , iii.\n\n19.) \"We see that the earth has a great hunger and desire after the power and the light of the sun, and likewise the external being craves for the interior one."

