[content]
body = "The first of these three states, being a beginning of all power and strength, originates from the quality of the Father; the second, being the source of all activity and differentiation, comes from the quality of the Son; and the third, being the root of all life, originates in the quality of the Holy Spirit.\" ( Grace , vi.\n\n9.) \"The ancients said that in sulphur, mercury, and salt are contained all things.\n\nThis refers not so much to the material as to the spiritual aspect of things, namely, to the spirit of the qualities wherefrom material things grow.\n\nBy the term 'salt' they understood the sharp metallic desire in nature; 'mercury' symbolised to them the motion and differentiation of the former, by means of which each thing becomes objective and enters into formation.\n\n'Sulphur,' the third quality, signified the anguish of nature.\" ( Clavis , 46.) The true divine life wherein the substantiality of divine Trinity is revealed is rendered possible only by means of the Fourth Quality , called the lightning-flash, whose ignition is caused by the desire of eternal nature and by the longing of eternal freedom.\n\n\"The fire is originally darkness, hardness, eternal coldness and dryness, and there is nothing in it except an eternal hunger.\n\nHow then does it become actual fire?\n\nThe Spirit of God, in its aspect as the eternal light, comes to the aid of the fire-hunger.\n\nThe hunger itself originates from the light, because when the divine power mirrors itself in the darkness, the latter becomes full of desire after the light, and this desire is the will (of p.\n\n80 eternal nature).\n\nBut the will or the desire in the dryness cannot reach the light, and therein consists the anguish and the craving for light.\n\nThis anguish and craving continues until the Spirit of God enters like a flash of lightning.\" ( Three Principles , xi.\n\n45.) This ever-turning \"wheel of Ixion\" is represented by the Cross, the \"Tree of Life.\" Free is the spirit of man before he enters this valley of suffering, but after he enters he is nailed to the cross of his own personal desires.\n\nMan himself is the \"Cross,\" and he creates a cross for himself, from which there is no liberation until he discovers the true spiritual Cross by entering into the realm of light through the power of the fire, which means that his spirit breaks through the bonds of matter and becomes again free.\n\n\"Freedom by means of the eternal will grasps the darkness, and the latter reaches out for the light of freedom but cannot attain it.\n\nIt imprisons itself by means of its own desire within itself, and causes itself to be darkness.\n\nFrom these two—namely, the dark impression and the desire for light or freedom which is directed towards the former, there results then in the former darkness the lightning-flash, the primitive condition of the fire.\n\nBut freedom being a nothing, and therefore inapprehensible, it cannot retain the impression.\n\nTherefore the impression surrenders to freedom, and the latter devours the dark nature of the former.\n\nThus freedom governs within the darkness, and is not comprehended by it.\" ( Signature , xiv.\n\n22.) \"Eternal unity or freedom, per se , is of infinite loveliness and mildness, but the three qualities are sharp, painful, and even terrible.\n\nThe will of the three qualities longs for the mild unity, and the unity longs for the fiery foundation and sensibility.\n\nThus one enters into the other, and when this takes place the lightning-flash appears, comparable to a spark produced by the friction of flint and p.\n\n81 steel.\n\nThereby the unity attains sensibility, and the will of nature receives the mild unity.\n\nThus the unity becomes a fountain of fire, and the fire penetrated by desire, like a fountain of love.\" ( Clavis , ix."

