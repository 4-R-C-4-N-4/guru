[content]
body = "16.) \"The One, the 'Yes,' is pure power, and the life and the truth of God, or God Himself; but God would be unknowable to Himself, and there would be in Him no joy or perception, if it were not for the presence of the 'No.' The latter is the antithesis or the opposite to the positive or the truth; it causes the latter to become revealed, and this is only possible by its being the opposite p.\n\n68 wherein eternal love may become active and perceptible.\" ( Theosophical Questions , iii.\n\n2.) \"If there is to be a light, there must be a fire.\n\nThe fire produces the light, and the light renders the fire manifest; it receives the nature of the fire within itself and resides in the fire.\" ( Mysterium , xl.\n\n2.) \"Joy enters the state of desire for the purpose of producing a fiery love, a realm of happiness, which could not exist in the tranquillity.\" ( Signature , vi.\n\n2.) \"The majesty of God could not become revealed in power, joy, and magnificence, if it were not for the attraction caused by desire.\n\nLikewise there could be no light, if desire were not entering and overshadowing, and thereby creating a state of darkness, which grows until the ignition of the fire takes place.\" ( Grace , ii.\n\n14.) Relative good cannot exist without relative evil, and evil cannot exist without good.\n\nThe fire can no more exist without the light than the light without the fire.\n\nNo multiplicity is possible without the unity.\n\nEach requires and therefore desires the other.\n\n\"Light and darkness are opposed to each other, but there is between them a link, so that neither of them could exist without the other.\" ( Threefold Life , ii.\n\n86.) \"In God there are two states, eternally and without end—namely, the eternal light and eternal darkness.\n\nThe light is God, and in the darkness there would be no pain if it were not for the presence of the light.\n\nThe light causes the darkness to long for the light and to suffer anguish therefor.\" ( Three Principles , ix.\n\n30.) \"The will having issued from the state of unity (by assuming a position, as it were, against the unity in desiring its own self), enters as a state of desire, and this desire is magnetic—that is to say, indrawing; but the unity as such is outflowing; it seeks to issue outwardly, p.\n\n69 so as to become revealed.\n\nThe will having issued from the state of unity, desires to enter within itself, so as to attain sensation in the unity, and that thereby the unity may attain sensation in the will.\" ( Theosophical Questions , iii.\n\n9.) \"The light-life has its own motion and impulse, and likewise the fire-life; but the latter generates the former and the former is the lord of the latter.\n\nIf there were no fire, there would be no light and no spirit; and if there were no spirit to breathe upon the fire, the latter would be extinguished and darkness would rule.\n\nEach of the two would be nothing without the other; both are mutually dependent upon each other.\" ( Forty Questions , i.\n\n62.) There is, however, no equality between this duality, for the unity is superior to the multiplicity, freedom to nature, light to fire; the higher always rules the lower.\n\n\"The will as such is an insensible life, but it finds the desire, and in willing to desire it constitutes itself in a being.\n\nThe will is superior to the desire, for although the desire is an exciting cause for the will, the will is a life without a cause and it is also intelligence.\n\nIt is therefore, lord over desire.\n\nIt rules the life of the desire and uses it as it pleases."

