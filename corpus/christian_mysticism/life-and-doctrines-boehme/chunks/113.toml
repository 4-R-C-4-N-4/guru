[content]
body = "\"The Word of promise, which was before the Jews as an antitype, or as an image in a mirror, wherein the wrathful Father imagined and wherewith He extinguished His wrath, began to move essentially, as it had not moved from eternity; for when the angel Gabriel brought to Mary the message saying that she should become pregnant, and when she expressed her willingness, saying, \"Let it be done to me as you said,\" then the centre of the Holy Trinity moved itself; that is to say, the eternal virginity which was lost by Adam, became opened in her in the Word of life.\n\nThe fire of divine love in Mary's being, in the virginal essence that had been corrupted in Adam, was again restored.\" ( Menschwerdung , i.\n\n8, 3.\n\n4.) \"The Word, that stood in the virgin of wisdom and surrounded by eternal wonders, entered again, out of great love to our image, which had been destroyed in Adam, and it became human in Mary in consequence of the benediction.\" ( Forty Questions , xxxvi.\n\n10.) \"The eternal virgin, being without substance, entered also into the incarnation, and thus the tine soul was received out of the essences of Mary.\n\nIn this way the eternal virgin came into substantiality, for she received the human soul within herself.\" ( Threefold Life , vi.\n\n75.) p.\n\n232 Mary could not by her own power put herself in possession of that celestial blessing, but it came to her by divine grace and in the power of the Holy Spirit.\n\n\"The true being of humanity, that had died and disappeared (become latent) in Adam, awoke again to life in Mary, and thus she became highly exalted and like man before the fall.\n\nThis, however, did not take place by her own power, but by the power of God.\n\nIf the centre of God had not moved within her, she would not have been different from all other daughters of Eve.\" ( Menschwerdung , i.\n\n8.\n\n5.) \"Mary is called a holy and pure virgin merely with reference to the celestial virgin that had taken possession of her, and clothed her with the pure element of Paradise.\n\nMary did not obtain possession of this state by her own power, as is shown by the angel saying to her, 'The Spirit of God will come over you, and you will be overshadowed by the power of the Supreme; therefore the Holy One that shall be born of thee shall be called the Son of God.'\" ( Three Principles , xx.\n\n41.) \"The words of the angel, 'The Spirit of God will come over you, and you will be overshadowed by the power of the Supreme,' means: The Holy Spirit shall open the closed centre within, in the moribund seed, and the Word of God will enter with living and celestial substantiality within that which had been closed in death, and become one flesh with it.\" 1 ( Three Principles , xxii.\n\n4l.) It is certain that the soul of the Redeemer could issue from Mary only on account of her being of a character full of humility and in accordance with the will of God; and it is furthermore certain that she spiritually p.\n\n233 enjoys a high state of glorification for having had the qualifications necessary for becoming the mother of the Redeemer.\n\n\"The first thing that a child (in the womb) receives is the tincture of its mother.\n\nThus it was in the case of Christ.\n\nWhen the angel announced to Mary the coming incarnation of Christ, it was the mother's will, and the tincture which received the Limbus of God and impregnated her, belonged to her."

