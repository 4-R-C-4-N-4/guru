[content]
body = "The human will refuses to submit itself entirely to the exquisite grace which offers itself out of divine love, and seeks for its own self and for the love of that self which belongs to that which is impermanent.\n\nIt loves itself and the state of this world better than God.\n\nHere man is tempted by his own nature, which in her centre stands outside of the love of God, in anguish, combativeness, and dissension, and in which the devil puts his perverted desires for the purpose of leading man away from the sublime grace and love of God.\n\nHere the dragon within the soul turns its eyes in vanity towards the world, and shows to her the glory and beauty of this world, and derides her because she desires to become another creature.\n\nHe puts before her the kingdom wherein she exists and wherein she has her foundation.\" ( Letters , xliii.\n\n3.) 249:1 The second temptation for the regenerated is spiritual pride.\n\n\"The second temptation is, that the soul, after having tasted of divine love, and having once been illumined, desires to have that light in her possession, and to act therein in her own power.\n\nThe fiery nature of the soul ought to be transformed into a love-fire, and she ought to give up her natural right.\n\nThis she does not like to do, but looks about, prefers to see herself in her own power, which she, however, does not find.\n\nThen the soul begins to doubt the power of grace, for she sees that she has to desert therein her natural desire and will.\n\nShe then trembles, and will not sacrifice to the divine will the rights conferred upon her by nature and die in the divine will; and she imagines the light of grace, which acts without such a fierce power, to be a false light.\" ( Letters , xliii.) 250:1 In the regenerating man the third temptation is, that the soul thinks of employing the spiritual powers which she has acquired for purposes which are not divine, namely, for awakening the sourcive spirits of the lower qualities, and thus of raising her head higher than God, as was the case with Lucifer.\n\n250:2 The sun of wisdom is higher than the moon of imagination.\n\n251:1 Thus in each individual man the overcoming of the temptations on this or that occasion is not sufficient for permanent salvation; for as long as the germ of evil exists, it may sprout again.\n\nFinal safety is attained only after the battle, when the root of the evil is torn out of the heart.\n\n251:2 A more modern way of expressing it would be: When the disciple becomes an accepted \" Chela ,\" his evil Karma begins to assert itself.\n\nIn other words, the awakening of a new life in an organism stimulates also the lower qualities therein, whether it be a man, a people, or a whole world.\n\n252:1 When that which is mortal in man dies, that which is immortal in him returns to freedom.\n\n253:1 Thus every one should sacrifice to God all of his actions, his thoughts, and will; he should not do anything out of his own power, but out of the power of God (after he once knows that power).\n\nAs the physical body, except in a state of disease (such as spasms, epilepsy, &c.), does not perform any motions except such as originate in the will of the person, likewise the regenerated acts only as he is made to act by the God in him.\n\nMortal and sinful man cannot perform anything really good by his own power; to attempt it would be a presumption and arrogance; for all that is good belongs to God; man is merely an instrument for divine power.\n\n254:1 If the self-will is entirely sacrificed to the divine will in man, then does man's will not thereby become annihilated, but is itself rendered divine."

