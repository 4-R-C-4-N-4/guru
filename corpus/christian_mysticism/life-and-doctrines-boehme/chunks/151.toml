[content]
body = "The bitterness seeks the fire and wants to increase it; but the acridity keeps it imprisoned, and thus it results in a terrible anxiety and resembles a turning wheel, turning perpetually around itself.\" ( Forty Questions , xviii.\n\n14.) \"The four forms of the original state of nature are the source of universal anguish.\n\nEach person feels that according to the quality of his Turba , one in one way and another in another.\n\nThe avaricious soul, for instance, suffers from cold; the angry soul from heat; the envious soul experiences bitterness; the conceited is continually flying and dropping into an abyss.\" ( Forty Questions , xviii.\n\n21.) Moreover, there is within the consciousness of the soul the memory of past deeds, misdeeds, and the reproaches of those whom she has injured, and as in that subjective condition all these subjective images are seen objectively, the soul lives in the miseries which she has created.\n\nIn addition to this, the curses of the living (being projections of will) reach the soul and cause her to suffer.\n\n\"All sins are objective to the soul in her tincture.\n\nIf she remembers the kingdom of heaven—which she, of course, does neither see nor know—she then sees the causes why she is suffering; for she has created these causes herself.\n\nThere are within her tincture all the tears of those whom she has injured, and they are fiery, stinging, burning, and gnawing, and cause an p.\n\n296 eternal despair within the essences, and an inimical will towards God.\" ( Three Principles , xix.\n\n24.) \"There the master will have to render account to his servants, if he has, given them a bad example and caused them to enter the way of evil.\n\nThen will the poor soul cry out in despair against her master; for all this is objective before her in the tincture.\" ( Three Principles , xxiv.\n\n30.) \"If a godless person has left behind a great deal of falsehood and deceit, so that the tincture of hell is invoked over his tomb, then will that curse penetrate to his soul.\n\nThis (curse) he will have to eat; for it is his food, sent to him by the living.\n\nTo send such curses does not, however, belong to the children of God; for by cursing another, man casts seed into hell—into the wrath of God.\n\nLet every one beware, for he will reap that which he sows.\" ( Forty Questions , xxiv.\n\n4.) During terrestrial life the voice of the conscience can be drowned in the turmoil of external life, and the recollection of evil deeds be driven away by allowing oneself to become immersed in sensual pleasures; but after death it does no longer depend on the will of the soul whether or not to remember the past, and her remorse is intensified to an enormous extent, by the absence of all external distractions.\n\nMoreover, the desire for gratifying her evil instincts still exists in her, but there are no means for such a gratification.\n\n\"During terrestrial life the godless feels the presence of hell within his false conscience, but he does not understand it; for he still lives in earthly vanity, wherewith he amuses himself, and which causes him pleasure and lust.\n\nMoreover, his external life is in possession of the light of external nature, and his soul revels therein; so that the internal pain cannot become manifest.\n\nBut when the body dies, the soul can no longer enjoy such protection and temporal pleasure.\n\nIn p.\n\n297 addition to this, the external light will have been extinguished for her.\n\nThen will she be in an eternal craving after such vanity as she indulged in during her life on the earth; but she can attain nothing except her own false conceived will.\n\nShe has now too little of that of which she formerly had too much, and with which she nevertheless was not satisfied."

