body = "Sacred Texts Esoteric Index Previous Next The Life and Doctrines of Jacob Boehme , by Franz Hartmann, [1891], at sacred-texts.com p.\n\n58 CHAPTER II.\n\nTHE UNITY OF THE ALL.\n\n\"We are all one body in Christ, and have all the Spirit of Christ within our reach.\n\nIf, then, we enter into the Christ, we may see and know everything by the power of His Spirit.\" ( Forty Questions , xxvi.\n\n5.) That which is finite cannot conceive of the infinite; that which has a beginning cannot conceive of that which is without beginning and without an end.\n\nWho has measured space?\n\nHas it an end?\n\nand if so, what is there beyond the utmost limits of space?\n\nBut if, there is no end to space, does not thought lose itself in seeking to penetrate into its depths?\n\nWe cannot conceive of infinite space, but we can conceive of limited forms, which are space rendered objective; and in describing a form we describe space in a certain state or condition.\n\nLikewise, we cannot describe that which exists eternally in God, nor the eternal processes continually taking place within the divine life, in any other way than by speaking of them as if they had a beginning in time, and by using terrestrial terms, all of which are necessarily inadequate to produce a conception of that which cannot be conceived by the terrestrial mind, because it is infinitely above all terrestrial things.\n\n\"I cannot describe to you the whole of divinity as it were in a circle, because God is immeasurable; nevertheless the Godhead is not inconceivable to the spirit resting in the love of God.\n\nSuch a spirit may grasp eternal truth, one part after another, and in this way it may end in perceiving the whole.\" ( Aurora , x.\n\n26.) \"If I am to make comprehensible the eternal generation, unfolding, or evolution of God out of His own self, p.\n\n59 [paragraph continues] I cannot speak otherwise than in a devilish (knowingly erroneous) manner, making it appear as if the eternal Light had ignited itself in the darkness, and as if the Godhead had a beginning.\n\nIn no other way can I instruct you, so that you may form an approximate conception of it.\n\nThere is nothing first and nothing last in this generation and evolution, nevertheless in describing it I have to put one thing after another.\" ( Aurora , xxiii.\n\n17–33.) We do not mean to say that the Deity had a beginning; we merely wish to show the way in which the Godhead has revealed itself by means of nature.\n\nGod has no beginning in time; He has an eternal beginning and an eternal end.\" ( Signature , iii.\n\ni.) \"The Godhead is an eternal band, which cannot perish.\n\nIt generates itself from eternity to eternity, and the first therein is always the last, and the last the first.\" ( Three Principles , vii.\n\n14.) 1 .\n\nThat which is subject to the conditions of time may conceive of temporal things; only that which is eternal in man can realise the existence of the eternal.\n\n\"We cannot speak the language of the angels, and even if we were to speak it everything would appear to the inhabitants of this world as if it did refer to created beings, and before the terrestrial mind it would represent itself as terrestrial.\n\nWe are ourselves only parts of the whole, and we can conceive and speak only of parts, but not of the whole.\" ( Threefold Life , ii.\n\n66.) \"I advise the reader, whenever I am speaking of the Godhead and its great mystery, not to conceive of what I say as if it were intended to be understood in a p.\n\n60 terrestrial sense, but to regard it from a higher point of view, in a supernatural aspect."

