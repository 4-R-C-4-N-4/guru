body = "25.) \"Whether or not God will create something more out of His will after the end of this time is not perceptible to my spirit, for it does not penetrate deeper than within its own centre wherein it lives, and therein is the paradise and the kingdom of heaven.\" (Principles, ix.\n\n41.) Next: Chapter V.\n\nThe Angels"

