body = "291 from her nature that which has been generated by the serpent, and the soul will then serve God in His holy temple in Paradise, waiting there for the resurrection of her (celestial) body.\" 1 ( Mysterium , xxv.\n\n2.) During his terrestrial existence man can remain consciously in the three worlds, and by the power of the will with which he is endowed penetrate into either one or the other; but after the separation of the soul from the body has taken place, he can continue to exist as an individuality only in one of these worlds, either within the realm of divine light or within the power of the fire; because together with his physical body he loses the power of self-government.\n\nHe can then no longer follow his own will, but has to go where he gravitates.\n\n\"There are three principles in the constitution of man, either of which he may unfold during his terrestrial existence; but after the body is disorganised, he then lives only in one principle and cannot evolve the other.\n\nIn eternity he must remain in that state of consciousness which he has acquired here.\" ( Three Principles , Supplement , x.) \"There are not three separate souls in man, but only one.\n\nThis soul stands in three principles; namely, the realm of the wrath, the realm of the love of God and the kingdom of this world.\n\nWhen the air of the external kingdom of this world deserts the soul, then will she become manifest in either the dark realm of fire or in the holy kingdom of light, which is the kingdom of the love-fire, the power of God.\n\nTo whatever plane she has p.\n\n292 surrendered herself during her earthly existence, therein she remains after the external kingdom has departed from her.\" ( Mysterium , xv.\n\n24.) During his terrestrial life man may live either in heaven or hell, or come out of one of these states and enter the other, because he can then govern his will by means of his intellect; but after the death of the body the function of the brain necessary for that purpose exists no longer, and then the soul is not able to change her will.\n\nShe therefore becomes absorbed entirely into that principle which has obtained ruling power within her own nature.\n\nFor this reason, it is of paramount importance for man to seek to unfold during his terrestrial life the love of God; i.e.\n\n, the appreciation of the ideal and the will to realise all that is noble and good within his soul, so that it will act as his guiding star in eternity.\n\n\"Man is in this world already in heaven or hell, wherever he corporeally may be.\n\nIf his spirit is in harmony with God, he is then spiritually in heaven and his soul is in God.\n\nIf he spiritually dwells in the wrath, he is then already in hell and in company of all the devils.\" ( Aurora , xx.\n\n86.) \"Here in the life of the soul is the balance.\n\nIf she is evil, she can be reborn in love; but when the balance breaks and the angle has turned, then will she be in that principle which is prevailing in her.\" ( Forty Questions , xxiii.\n\n10.) \"During her terrestrial life the soul can change her will, but after the death of the body there remains nothing within her power by which she can change her will.\" ( Tilk .\n\ni.\n\n267.) \"Whatever the soul during her terrestrial life receives within her will, and wherewith she becomes entangled, that she will take in her will with her after the death of the body, and she can no more rid herself of it, because she has then nothing but that wherein she has entered, p.\n\n293 and which now constitutes her very self.\n\nBut during terrestrial life she may destroy that wherein she has become entangled in her will.\" ( Threefold Life , xii."

