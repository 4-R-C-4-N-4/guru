[content]
body = "154:1 This is the difference between life in the terrestrial and life in the celestial states of nature, that the former is differentiated into forms, each of which loves to live in the consciousness of its own illusive self— i.e.\n\n, in a state of isolation and separatedness, and enjoying its own qualities; while in the celestial state the individual powers intermingle, each living, so to say, in the consciousness and enjoying itself in the life of the other.\n\nwhile all strive towards unity and rest in it, like a tree, whose many branches and leaves receive their life all from one common trunk.\n\n154:2 This \"tree of temptation\" is still growing in every human being, as is represented in the allegorical \"Adam.\" The lower qualities in man still strive for outward manifestation, and can be overcome in no other way than by his rising above them into the higher ones.\n\n155:1 It is self-evident that man can attain knowledge of a thing only by giving attention to it.\n\nIn doing so, he directs his consciousness to it.\n\nMan's consciousness became centred within the lower principles constituting the sensual world, and thereby it lost its seat and centre of gravity in the Supreme.\n\nIf it had not been for this attraction which the material world exercised upon man, he might have sunk still lower, and approached absolute evil, the kingdom of Lucifer.\n\n155:2 \"Adam would have fallen into the unfathomable abyss of hell, if, p.\n\n156 besides the celestial state, which in consequence of his sin became perverted into a hellish one, there had not been still another, namely, the terrestrial region \" ( Hamberger ).\n\n156:1 God (divine self-consciousness) never sleeps; it is only nature in man that causes him to sleep and wake alternatively.\n\nNo man is fully awake and self-conscious as long as he has not found his own god.\n\n157:1 The \"history of Adam\" is nothing else but the history of mankind as a whole.\n\nIts truth may be recognised by every one capable of self-examination.\n\n157:2 Adam having lost the power to recognise the true woman, the eternal virgin within himself, it was necessary that he should have an external objective substitute to whom he might be attracted, so as to stimulate his power to love; which would have entirely died out without such an object, or would have degraded him still lower by turning into desire for still lower beings in the scale of evolution.\n\n157:3 From such a degradation may have resulted the tribe of the monkeys descended from aboriginal man.\n\n(See Secret Doctrine , by H.\n\nP.\n\nBlavatsky.) 157:4 The \" Sal-nitre \" means the fiery material element in man, wherein reside his sensual attractions; in other words, his Kama-rupa .\n\n158:1 The woman is made out of the more refined and spiritual essences of man; for this reason woman even to-day is more refined and intuitional than man; while the organisation of the body and also the mind of the male is on the whole more gross and material; and he reasons where woman perceives.\n\nThere were not all the female elements removed from man in the creation of the woman.\n\nIf man had no such elements in him he would be a brute.\n\nNeither could any woman be visible and tangible and man's associate if she had none of the male and grossly material elements of Adam in her organisation.\n\n158:2 It was a part of the higher and more celestial elements which left \"Adam\" at the time of the creation of \"Eve.\" 158:3 It may be well to remember that at the time of Jacob Boehme it was considered a crime to disbelieve even in the literal and external interpretation of the Bible allegories, and that his explanations would have been incomprehensible and unacceptable if his expressions had not been such as to correspond with those of the Bible."

