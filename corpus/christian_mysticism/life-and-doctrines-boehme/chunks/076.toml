body = "But the constellation has still another woman, wherein it breeds out its substance, namely, the moon, she being the wife of all the planets, but especially of the sun.\" 3 ( Mysterium , xi.\n\n31.) p.\n\n171 \"As the stars, full of desire, draw unto themselves the power of the sun, likewise the sun penetrates also powerfully into the stars, so that they receive their light from the power of the sun.\n\nThe stars then send again their ignited power as their product into the elements.\" ( Grace , ii.\n\n26.) But as the stars have their origin from the world of light and from the world of darkness, not only the good, but also the evil, existing in the terrestrial world comes from them.\n\n\"With the creation of the constellation good and evil became manifest, for in them is manifest the wrathful fiery power of eternal nature, as well as the power of the holy spiritual world, as an outbreathed essence.\n\nThus there are many dark stars which we cannot see, and there are many shining ones which we see.\" 1 ( Mysterium , x.\n\n36.) \"The evil, like the good, in all things comes from the stars; and as the creatures upon the earth are in their qualities, likewise are also the stars.\" ( Aurora , ii.\n\n2.) \"All that lives and exists is awakened and brought to life by the stars, for they are not only fire and water, but they also possess hardness and softness, sourness and sweetness, bitterness and darkness, even all the powers of nature, and everything that is contained in the earth.\" ( Threefold Life , vii.\n\n46.) \"The constellation is the cause of all arts and science, also of all order and harmony in this world, because it awakens the trees and metals, enabling them to grow.\n\nIn the earth is everything that is contained within the stars; p.\n\n172 the constellation ignites the earth, and all this taken together is only one spirit.\" 1 ( Threefold Life , vii.\n\n48.) In their relations to the earth and the elements, the stars act the part of a higher, living, and, so to say, male power.\n\n\"The stars are a quintessence, a fifth form of the elements, and, so to say, the life of the four.\" ( Threefold Life , vii.\n\n45.) \"The starry sky rules in all creatures as it were in its own property.\n\nThis sky is the man, and 'matter,' or the watery form, is his wife, who gives birth to what heaven creates.\" 2 ( Three Principles , vii.\n\n33.) \"The upper desires the lower and the lower the higher.\n\nThe hunger of that which is above is directed powerfully to the earth, and the hunger of the earth strives for that which is above.\n\nThus, compared with each other, they are like body and soul, or like man and woman, generating children with each other.\" ( Grace , v.\n\n19.) But it must be understood that there is a distinct life in the earth.\n\nThis is proved by her products, and also by her desire for the sun, in consequence of which she is continually turning around.\n\n3 \"If you behold the earth and the rocks you will acknowledge that there is a life in them; for if this were p.\n\n173 not so, there would be in them neither gold nor silver, and neither herbs nor grasses.\" ( Aurora , xix.\n\n57.) \"Each being desires the other.\n\nThat which is above desires that which is below, and the lower desires the higher."

