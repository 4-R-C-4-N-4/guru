[content]
body = "That which Sol (the sun) is spiritually becomes corporeal in Luna (the moon).\" ( Signature , ix.\n\n24.) After the world of stars had begun to exist, the sidereal life appeared by the power of the former—that is to say, that living organisms were produced, representing, so to speak, \"stars of the various elements.\" \"The firmament of heaven, having been made from the medium of the water, this generation penetrates through the external, congealed generation—that is to say, through death, and brings forth the sidereal life, such as animals and men, birds, fishes, and worms.\" ( Aurora , xx.\n\n60.) \"After God had unfolded the stars and the four elements, there were produced creatures in all the four elements, such as birds in the constellation of the air, fishes in the constellation of the water, animals and four-legged beings in the constellation of earth, and spirits in that of the fire.\" 1 ( Mysterium , xliv.\n\n1.) These creatures received their spirit from the stars, or rather from the spirit of this world, but their body they received from the earth.\n\nAccording to the predominance of the fiery or the watery form, there resulted also an antithesis of sex.\n\n\"By the power of His word, Fiat , God caused all beings to come forth from the matrix of nature on the fifth day, all according to their qualities; the fishes in the water, the birds in the air, the other animals upon the earth.\n\nThey received their corporeity from the fixedness (rigidity) of the earth, and their spirit from the Spiritus Mundi .\" ( Grace , v.\n\n20.) p.\n\n135 \"All creatures have been created of the life below and the life above.\n\nThe matrix of the earth gave the body, and the stars the spirit.\" ( Threefold Life , xi.\n\n7.) \"As the spirit of the stars, or the spirit in the fire-form, by the power of its longing, became mixed with the watery one, there resulted two senses from one and the same essence.\n\nThe one, the male, in a fiery, and the other, the female, in a watery shape (state).\" 1 ( Three Principles , viii.\n\n43.) Finally, man was created, and out of him there was to come forth a celestial army, and in the midst of the time its king, in the place of the outcast Lucifer.\n\n\"God willed to create an angelic army.\n\nThus He created Adam, and he was to generate out of his own body creatures of his own kind; but in the midst of the time there was to be born out of the body of a man the King of all men, and He was to take possession of the new kingdom as a ruler over these created beings, in the place of the degenerated and outcast Lucifer.\" 2 ( Aurora , xxiv.\n\n18.) Man, however, was to surpass the angels (in perfection), for he was to be a complete image of divine glory, while the angels have been created out of only two principles.\n\np.\n\n136 \"Adam was to be a perfect symbol of God, created out of the eternal Magia , the substance of God; he was to be something made out of the nothing, out of the spirit—the ideal—into the body.\" ( Menschwerdung , i.\n\n5.) \"The angels are created out of two principles, but the soul, with the body of the outer life, out of three principles.\n\nTherefore man is higher than the angels, provided that he remains in God.\" ( Forty Questions , i.\n\n263.) \"We human beings are a far greater mystery than the angels, and we shall surpass them in celestial wisdom."

