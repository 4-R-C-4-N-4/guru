[content]
body = "In the place which formerly was the seat of self-will there is now nothing, and wherever there is nothing there the love of God is solely active.\" ( Supernatural Life , xxviii.) \"A true Christian knows himself to be a servant of God, whose duty it is to attend to the works of God properly.\n\nHe is not his own property, and the terrestrial body which he inhabits is not his true home.\n\nHe may seek and plant, cultivate, strive and act as he pleases, but he is always aware that he is doing it for God, and that he will have to render account for it.\n\nHe should always remember that among these works he is a stranger, a guest, and a servant.\" ( Signature , xv.\n\n44.) \"He who hopes to perform something perfect and good, wherein he may rejoice eternally and enjoy it, let him come out of his egoism and self-will and enter into submission within the will of God.\n\nEven if the terrestrial desire for selfhood clings to him in his flesh and blood, if only the soul-will is not infected by that desire for self, then will that self not be able to produce anything; for the (inner) will of the soul, resting in submission to God, continually destroys the essence of the self-assertion, and thus the wrath of God cannot reach her.\n\nIf the wrath should reach that essence, then the submitted will rises up in its power therein, and stands there in shape before God as a production of victory that will inherit the in fancy.\" 1 ( Calmness , xi.\n\n1.) p.\n\n286 It is self-evident that no terrestrial possessions of any kind will benefit the spirit, but the acquisition of such possessions will not be an obstacle for us, provided that we possess them, and do not permit ourselves to be possessed by them.\n\n\"Dear soul, if you desire the light of God, and also the light of this world, if you desire to feed your body (and mind), and (at the same time) to seek for the mysteries of God, do as God Himself does.\n\nOne of the eyes of your soul looks into eternity, the other one into nature.\n\nThe latter goes on continually seeking in desiring and creating one mirror after another.\n\nLet that be so.\n\nIt must be so, for God wills it.\n\nBut the eye for eternity must not be turned (away from God) into desire; but by means of that eye you should seek to turn the other one towards you, and not let it turn away from you; i.e.\n\n, not let it turn away from the eye that looks into freedom.\n\nPut one will into that which you are doing, thinking that you are a servant in the vineyard of God; i.e.\n\n, into the Eternal.\n\nSink your will every hour into humility before God; then will your image walk in humility with your will in the majesty of God, and be illumined perpetually by the triumphant light of God.\" ( Forty Questions , xii.\n\n28.) All terrestrial fortunes or misfortunes with which we may possibly meet do not concern our real divine self, but merely the personality with which we are connected during our earthly life.\n\nThis personality is given us for the purpose of gaining experience, be it good or evil, and therefore we should always be satisfied and remain contented in God.\n\n\"Ultimately all things must be one and the same to man.\n\nHe is to become one with fortune and misfortune, with poverty and riches, joy and sorrow, light and darkness, p.\n\n287 life and death.\n\nMan is then to himself nothing, for he is dead relatively to all things in his will.\n\nGod is in all and through all, and nevertheless He is nothing in regard to all, and nothing can comprehend Him.\n\nEverything becomes manifest through Him, and He Himself is everything."

