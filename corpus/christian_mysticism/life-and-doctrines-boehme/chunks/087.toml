[content]
body = "There are actually four dwellings in which that precious jewel is imprisoned.\n\nOf these four there is always one especially manifest in a person, and not all four, according to the four elements which are within each man, and of which always one predominates in the life of a person.\n\nThese p.\n\n189 four states, forms, or temperaments are called the choleric, the sanguine, phlegmatic, and melancholy temperament.\n\nIn the choleric one is the nature and quality of the fire manifested, in the sanguine that of the air, in the phlegmatic the nature of water, and in the melancholic the quality of the element of the earth.\" ( Four Complexions , i.\n\n6.) Man's enjoyment and desire is now turned away from the divine, and directed towards that which is earthly and animal.\n\n\"The angelic image in man became entirely destroyed both as to mind and senses, as we may plainly see at present, both thoughts and senses are shaped by an animal will, and it is very difficult for them to arrive at a state in which they love God and justice.\" ( Grace , vii.\n\n36.) 1 \"After the fall the creatures (elementals) obtained -power in man and arose in him.\n\nThere are persons who live in the quality of a snake, and are full of cunning and poisonous malice; others live in the quality of a toad or a dog, a bear or a wolf; or one may have in him the quality of some good and tame animal.\n\nAll men are outwardly formed in the human image, but within the quality is seated an animal.\" 2 ( Grace , vii.\n\n3, 4.) p.\n\n190 Man's present animal method of reproducing himself originated in his fall, as is proved by Eve having been projected from Adam at a later period of time, and also by the inherited sense of shame in regard to the organs of generation.\n\n\"If God had created man for this earthly, corruptible, poverty-stricken, sickly, and animal life, He would not have put him into Paradise.\n\nIf He had originally intended that mankind should procreate themselves like the brutes, He would have made them into men and women already at the start.\" ( Mysterium , xviii.\n\n5.) \"The poor degraded soul is ashamed of the possession of animal organs of generation, and of the way in which impregnation takes place.\n\nDoes not every one feel this?\n\nIf we had been created beastlike in Adam, why should we be ashamed of our beastliness?\n\nWhy is it that the soul is ashamed of the monstrosity of her outward body, and of its animal method of procreation?\" ( Tilk .\n\ni.\n\n608.) If there had occurred no sin, man, being the living image of God, and therefore possessing the power to create, could have produced his equals out of his own self without the existence of severed sexes.\n\n\"The sum of all mankind constitutes the one original Adam.\n\nGod created him alone, and left it to him to produce other beings.\n\nHe should have surrendered his self-will entirely to God, and with God generated other men out of himself, and in conformity with himself.\" ( Mysterium , lxxi.\n\n31.) \"Adam was a complete image of God, male and female, and nevertheless neither of them separately, but pure like a chaste virgin.\n\nHe had in himself the desire (power) of the fire and the light, the mother of love and wrath, and the fire in him loved the light, receiving from it calmness and beneficence; while the light in him loved the fire as being its life, in the same sense as God, in His p.\n\n191 quality as Father, loves the Son and the Son loves the Father.\" ( Stiefel , ii.\n\n351.) \"Adam was man and wife in one individuality."

