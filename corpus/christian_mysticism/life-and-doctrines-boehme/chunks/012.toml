body = "56 Neither is such a state attained without a hard fight against the powers of darkness.\n\n\"If any one desires to follow me, let him not be intoxicated by terrestrial thoughts and desires, but girded with the sword of the Spirit, because he will have to descend into a terrible depth, even into the midst of the kingdom of hell.\n\nIt indeed requires hard labour to fight with the devil between heaven and hell, as he is a powerful lord.\n\nDuring such battles I have often made many bitter experiences, which filled my heart with sorrow.\n\nOften the sun has disappeared from my sight, but then he rose again, and the oftener the sunset occurred, the more beautiful, clear, and magnificent was the sunrise.\" ( Aurora , xiii.\n\n20.) He who desires nothing for himself, to him everything shall be given.\n\nThe infinite cannot be made to contract, to be comprehended by the finite mind of man; but let the mind of man expand by the power of the Spirit, and become conscious of its infinity, and it will then conceive of infinite truth.\n\n\"Spiritual knowledge cannot be communicated from one intellect to another, but must be sought for in the Spirit of God.\n\nTruly theosophical writings will even to the intellect convey here and there a ray of recognition; but if the reader is found worthy by God to have the divine light kindled within his own soul, then will the inexpressible words of God be heard by him.\" ( Letters , lv.\n\n8.) \"He who reads these writings and cannot understand them, should not throw them aside, imagining that they can never be understood.\n\nHe should seek to change his will, and elevate his soul to God, asking Him for grace and understanding, and then read again.\n\nHe will then perceive more truth than he did before, until at last the power of God will manifest itself in him, and he will be drawn down into the depths, into the supernatural foundation— p.\n\n57 that is to say, into the eternal unity of God.\n\nThen will he hear actual but inexpressible words of God, which will conduct him through the divine radiation of the celestial light, even within the grossest forms of terrestrial matter, and from thence back again unto God; and the Spirit of God will search all things in and with him.\" ( Clavis , Preface, 5.) 1 Footnotes 47:1 At that time Boehme, like other persons, mistook his terrestrial personality for his real self, because he had not yet learned to know the God within his own heart, and therefore he felt the insignificance of the former, if compared with the grandeur of the universal power of p.\n\n48 God manifested in nature, until at last he awoke to a realisation of the fact that the universal God and the God within his heart were one, and that his own personality was merely one of millions of similar instruments or organisms through which God is manifesting His power.\n\n48:1 The \"devil\" and the \"powers of darkness\" are the perverted fiery will, with his evil productions, originating from Lucifer, the \" Dhyan-Chohan \" of evil; the greatest angel before he fell.\n\n49:1 \"Rejoice and be glad, and praise the Lord above all; for His name arises in glory above all the mountains and hills.\n\nIt grows up like a sprout and performs great miracles.\n\nWho will hinder it?\" ( Apologia .) 57:1 This may perhaps be also expressed in the following words:—It is not the mortal intellect, but the divinity in man, which is in possession of divine knowledge...."

