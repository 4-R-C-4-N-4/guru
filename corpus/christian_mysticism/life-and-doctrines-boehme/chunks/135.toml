[content]
body = "All that man can do is to employ the powers which he has received from God for the purpose that there may be no impediment created by his self-will which might prevent the action of the Holy Spirit within his own soul.\n\nTo accomplish this he must rise by the aid of the divine Spirit within himself above the inferior elements within his own nature, and thus surrender his whole self-will to God, an act which is expressed in the original meaning of the word \"prayer.\" 1 p.\n\n267 \"Spiritual regeneration does not depend on learning and scientific knowledge; but there must be an intense and powerful earnest, a great hunger and thirst for the Spirit of Christ.\n\nMere science is not faith; the latter is the intense hunger and thirst for that which I desire, so that it becomes formed into an image within me, and by grasping it in my imagination it becomes my own property.\n\nThis hunger and desire moulds the substance of Christ, it being the celestial substantiality, into the weakened image, wherein the word of the power of God is the active life.\n\n\"If, then, the soul partakes of this celestial nutriment, she becomes kindled by the great love that dwells in the name Jesus.\n\nThen her anguish becomes converted into great joy and a real sun arises within her, while she becomes regenerated into another will.\n\nThen takes place the marriage of the Lamb, of which the mouth-Christians talk so much without understanding the meaning.\" ( Regeneration , iv.) \"In the name of Jesus, God has opened a door for us to His ear, whereby we may hear God actually speak within us as in His mercy He speaks to us through this opened portal of thought.\n\nAgain, the soul speaks through this door to God within herself, and during this inspeaking she is nourished, restored, illumined, and renewed by the outspeaking of God.\" ( Prayer , xxxi.) \"If the soul is to receive actual advantage and fruition from prayer, then must her will turn away from all creatures and terrestrial things and stand pure before God.\n\nLet not the flesh with its desires co-operate (in prayer) so that earthly desires may not be introduced into the divine effect in the soul.\" ( Prayer , xxxiv.) p.\n\n268 \"Every prayer which does not find and take (what it asks) is cold and insipid, and is obstructed by temporal terrestrial things; that is to say, the soul does then not approach God in purity.\n\nShe does not want to sacrifice herself entirely to God, but clings to terrestrial loves which hold her imprisoned so that she cannot attain the kingdom of God.\" ( Prayer , xviii.) No man can truly pray in spirit and in truth by his own power, because only that which is divine can enter into relation with the Divine.\n\nTrue prayer is not a mere wishing or desiring, but an action within the power of the omnipotent God.\n\nPrayer is the union with God effected by the sacrifice of the personal will.\n\nIt is, therefore, the only \" Yoga practice\" worthy of serious attention.\n\n1 \"The will necessary to accomplish prayer is far too weak as long as it is in our own powers that we pray, but if acted upon by divine power it becomes awakened, fiery, and full of desire.\n\nWithin this desire God Himself is acting.\n\nThus does man speak with God in truth, and God speaks in truth with the soul of man.\" ( Prayer , xxix.) \"He who truly prays co-operates with God internally, while externally he produces good fruit.\" ( Prayer , xxiv.) \"Mere word-prayer without exaltation of thought and divine desire is only an external thing, a mere repeating of words.\n\nNothing pleases God except that which He does Himself.\" ( Prayer , i.\n\n2.) Christ says (Matt.\n\nvii.\n\n21): \"Not all who say, Lord!\n\nLord!"

