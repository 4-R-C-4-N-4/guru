[content]
body = "The outbreathed desire—that is to say, the love of the divine power for nature, wherefrom nature and self-will have originated—is longing to get rid of the natural perverted self-will, and is destined, at the end of time, to be free of the illusion thus acquired, and to be brought into a clear, crystalline nature.\" ( Contemplations , i.\n\n30.) \"Behold a tree.\n\nOutwardly it has a hard and rough shell, appearing dead and encrusted; but the body of the tree has a living power, which breaks through the hard and dry bark and generates many young bodies, branches, and leaves, which, however, all are rooted in the body of the tree.\n\nThus it is with the whole house of this world, wherein also the holy light of God appears to have died out, because it has withdrawn into its principle, and therefore it seems dead, although it still exists in God.\n\nBut love ever again and again breaks p.\n\n178 through this very house of death and generates holy and celestial branches in this great tree, and which root in the light.\" ( Aurora , xxiv.\n\n7.) All these external formations proceed from the fire-life by means of the tincture and the oily, spiritual quality, which manifests its power and activity in contrast with the elements.\n\n1 \"Each thing is like a fire.\n\nHowever, the torture of the fire is not a true life, but the tincture that originates from the fire.\" ( Threefold Life , viii.\n\n18.) \"As the spirit is in a thing, so is the tincture , for the tincture issues from the spirit and is its delight.\" ( Three Principles , xiii.\n\n45.) \"Where a desire exists there is a fire, for the fire desires substantiality, so that it may have something to consume.\n\nIt cannot make for itself any substantiality, but it makes a tincture , and that tincture produces the substantiality.\" ( Threefold Life , viii.\n\n33.) \"The tincture produces all colours, because it introduces the quality of fire and light into the water.\n\nThus it also transforms water into blood.\" ( Six Mystical Points , i.\n\n5.) \"The oily quality is in stones, metals, herbs, trees, animals, and men.\n\nThe deadly quality is in the earth, in water, fire, and air.\n\nThose four qualities are, in fact, like a dead body; but the oil therein is a light or a life, wherefrom results the desire or the growth, the outblooming from this deadly quality.\n\nThe oily quality could not, however, be a life if it were not in the anxiety of death.\n\nThe latter arouses the former, and renders it movable, because the oily quality desires to fly from the anxiety, and to issue from thence, and thereby the growth p.\n\n179 is caused.\n\nThus death itself has to be a cause of life and motion.\" ( Signature , viii.\n\n5.) The external appearance or signature of things is a symbol of what they actually are in their inner essence, or of what principle is preponderating in their character, and therein is the basis of the language of nature.\n\n\"All the external visible world, in all its states, is a symbol or figure of the internal spiritual world.\n\nThat which a thing actually is in its interior is reflected in its external character.\" ( Signature , ix.\n\n1.) \"That principle which in the spirit of its action is superior to the rest, engraves its character principally upon the corporeal being, and the other qualities are only secondary additions to it, as may be seen in all living creatures.\" ( Signature , ix.\n\n4.) \"The inner form characterises man, also in his face.\n\nThe same may be said of animals, herbs, and trees.\n\nEach thing is marked externally with that which it is internally and essentially."

