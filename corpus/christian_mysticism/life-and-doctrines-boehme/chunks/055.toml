[content]
body = "They are fire-flames, illumined by the light of God, but we attain the great fountain of meekness and love which is welling up within the holy essentiality of God.\" 1 ( Menschwerdung , i.\n\n5.) Man comprises all three principles: the principle of darkness or fire, from which originates his soul; the principle of light, from which his spirit originates; and the third principle, which is the basic element of his body.\n\n\"In the life of man there are three states to be distinguished from each other—first, the innermost , that is to say, God being eternally hidden within the fire; secondly, the middle part , which from eternity has stood as an image or likeness in the wonders of God, comparable to a person seeing himself in a mirror; thirdly, has this living image received still another mirror in creation wherein to behold itself, namely, the spirit of the external world , or the third principle , which is also a form (state) of the Eternal.\" ( Threefold Life , xviii.\n\n4.) \"The darkness in man longing for light is the first p.\n\n137 principle; the power of the light the second; and the longing power which attracts and becomes full (substantial), and whereof the material body grows, is the third principle.\" ( Three Principles , vii.\n\n26.) \"The soul , or the first principle, is founded on the fire of eternal nature; the spirit , or the second principle, roots in the light; and the body is the third principle, or the substantiality of the visible world.\" 1 ( Tabulæ Principiæ , 65.) Adam was to rule over all nature, and therefore his body was taken from all the powers of the external world; but the third principle, as well as the first one, appeared in him subject to the second, the light.\n\n\"If you will behold your own self and the outer world, and what is taking place therein, you will find that you, with regard to your external being, are that external world.\n\nYou are a little world formed out of the large one, and your external light is a chaos of the sun and the constellation of stars.\n\nIf this were not so, you would not be able to see by means of the light of the sun.\" 2 ( Mysterium , ii.\n\n5.) \"If man, as the image of God, is to rule over the fishes and fowls, the animals, and the whole of the earth, as well as over the essence of all the stars, then must he be out of all three, for each spirit can rule only in his mother, wherein he originated.\" ( Mysterium , xiv.\n\n8.) \"Terrestrial man had in.\n\nhis constitution the kingdom of this world, but there were not ruling in him the four elements (separately); but they were in one, and the terrestrial order of things was hidden in him.\n\nHe was p.\n\n138 to live in celestial state, and although everything was stirring (alive) within him, nevertheless he was to rule over the terrestrial anguish (external consciousness) by means of the celestial quality (inner consciousness) of the other (second) principle, and to retain dominion over the kingdom of the stars and elements by means of the Paradisiacal quality.\" ( Menschwerdung , i.\n\n2.) Man must rise, not merely in his imagination, but with his will, above all that which is earthly, sensual, or merely intellectual, if he desires to be a power in the kingdom of the Spirit.\n\nThus will the ideal become real to him.\n\n\"Adam's body (the ethereal body of aboriginal man) was created out of the four elements of external nature, and out of the (essences of the) stars, by means of the eternal Fiat ."

