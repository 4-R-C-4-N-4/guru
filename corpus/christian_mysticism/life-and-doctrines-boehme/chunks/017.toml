[content]
body = "Likewise the mother does not create the child, but merely furnishes the materials required by the creative spirit existing within the child, and which, before it is born, attracts from the organism of the mother that which it needs, comparable to the way in which, after the child is born, it draws its nutriment from the mother's breast.\n\n1 p.\n\n64 \"Wisdom is the outspoken word of divine power, knowledge, and sanctity, an antithesis of the unfathomable unity in essentiality, wherein the Holy Spirit forms and imagines.\n\nShe is passive, but the Spirit of God is active, like the soul in the body.\" ( Clavis , v.\n\n18.) This eternal Trinity is inconceivable in its aspect as a spiritual potentiality, in the same sense as a fire is inconceivable if it does not burn; but as the burning fire reveals itself by means of the light and the heat, likewise the divine power reveals itself in a threefold aspect in eternal nature.\n\n\"The threefold Spirit is a unity, an only being; or to speak more correctly, not a being, but eternal Reason; consequently a mystery comparable to the intelligence of man, which is also incomprehensible.\" (Mysterium., i.\n\n5.) \"God in His primitive aspect is not to be conceived of as a being, but merely as the power or the intelligence constituting the potentiality for being—as an unfathomable, eternal will, wherein everything is contained, and which, although being itself everything, is nevertheless only one, but desirous of revealing itself and to enter into a state of spiritual being.\n\nThis takes place by means of the fire in the desire of love, i.e.\n\n, in the power of the light.\" ( Mysterium , vi.\n\n1.) \"Here we have not yet cause to say that God is three persons, but He is threefold in His eternal evolution.\n\nHe gives birth to Himself in trinity; and in this eternal unfoldment He is nevertheless an only being, neither Father, nor Son, nor Spirit, but only the eternal Life or God.\n\nThe Trinity will become comprehensible in His eternal revelation only when He reveals Himself by p.\n\n65 means of eternal nature—that is to say, in the light by means of the fire.\" ( Mysterium , vii.\n\n9–12.) \"Within the stillness of eternal freedom the Father does not yet appear as a father.\n\nHe appears as such only when He is desirous to create, and conceives within Himself the will to generate nature, within Himself.\" ( Threefold Life , iv.\n\n64.) We cannot conceive of a man without a body of some kind, nor of a universal God without a universal nature.\n\nThe very essence which constitutes \"man\" is will and intelligence manifesting itself in a human form.\n\nGod begins to exist as a being only when He is manifesting Himself in nature.\n\nFrom all eternity has God thus been revealing Himself to Himself; and the cause of this self-revelation rests first of all in the will of God in the Trinity and in the longing of eternal wisdom.\n\n\"Of eternity we cannot speak otherwise than as of a spirit, for everything was spirit in the beginning; but it has also from all eternity evolved itself into being.\" ( Menschwerdung , i.\n\n2.) \"That which is tranquil and without being, resting within itself, does not contain darkness, but is a calm, clear, lucid happiness.\n\nThis then is eternity without anything else, and means above all God.\n\nBut as God cannot be without being, He conceives within Himself a will, and this will is love.\" ( Threefold Life , ii.\n\n75.) \"The whole of the divine Being is in a state of continual and eternal generation comparable to the mind of a man, but immutable.\n\nThere are continually thoughts born from the mind of man, and from them arises desire and will."

