[content]
body = "Neither is God measurable, and there has no place of residence been discovered in Him, unless He should establish for Himself such a dwelling in one of His creatures; but even then He remains a whole apart from and beyond such a created being.\" ( Menschwerdung , i.\n\n8.) In this respect Christ may be likened to the sun, who is also immeasurable in his aspect as a power, but which is nevertheless existing as a separate body in space.\n\n\"We may compare the sun to Christ in His aspect as p.\n\n240 a created being, and the whole depth of space may be compared to the Father.\n\nIf we then see that the sun shines within the whole depth of space, and sends his heat and power everywhere, we cannot then say that within the depth the power and light of the sun is nowhere outside of the body of the sun; for if the light and substance of the sun were not everywhere, space could not receive the power and light of the sun.\n\nIt requires two powers or principles of a similar nature to be receptive of each other.\n\nThe depth (of space) contains its light, but hidden (latent).\n\nIf it were the will of God, the whole depth would all be sun.\" ( Menschwerdung , i.\n\n8.) \"As the sun shines through all the external world, causing everything to become more powerful and fertile, and as nevertheless the world and the sun are (in their corporeal centres) to be distinguished from each other, so Christ, as a manifested Sun, shines out of (the depth of) Jehovah or Jesus, in the created humanity of Christ.\n\nJehovah is the eternal divine Sun, and within that Sun has been hidden to all creatures the great Love-Sun of Christ, as a heart in the centre of the Holy Trinity; but by the moving of the Godhead He has become revealed as a holy Sun of divine love.\" ( Stiefel , ii.\n\n422.) \"The sun illumines the world; but this would not be possible if there were not within the depth a similar state of being as that which constitutes the sun.\n\nLikewise the corporeity of Christ is all the fulness of the heavens, as a created being in the person and without the person; but (both) exist in one spirit and one power as one, and not in a state of duality or as two things separated from each other.\" ( Tilk .\n\nii.\n\n251,) 1 This unlimited, celestial (state of) being of the Redeemer is nevertheless lower than the Godhead.\n\n\"When the Word enters into the one pure element, p.\n\n241 the virginal matrix, it does not become separated from the Father, but remains eternally, and is everywhere present in the heaven of the element wherein it entered, and wherein it has become a new creature, called a 'god.' This very new creature is naturally not born from the flesh and blood of the (physical) virgin, but of God, out of His element (the celestial virgin), and in the power of the Holy Trinity, which remains therein eternally in its fulness.\n\nBut the corporeity of the element of that created being is lower than the Godhead, for the Godhead is spirit, and the holy element is born out of the Word from eternity.\n\nThus the Lord has entered into the servant, whereof all the angels in heaven are filled with surprise.\n\nIt is the greatest miracle that has occurred from all eternity, because it is against (human) nature, and could only have been accomplished by divine love.\" ( Three Principles , xviii.\n\n42.) 1 Footnotes 224:1 The Logos is everywhere, and did not enter from any external locality.\n\nLikewise the body of the sun is everywhere, although it manifests its light only in one locality in the sky."

