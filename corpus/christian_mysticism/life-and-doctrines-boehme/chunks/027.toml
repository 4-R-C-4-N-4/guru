[content]
body = "171.) When the power of the light becomes revealed it manifests its activity first of all in the Fifth Quality , which is evolved by means of the preceding four as sweet love, or a luminous water-spirit.\n\n\"The first three principles are merely qualities conducive to life, the fourth is life itself, but the fifth is the true Spirit.\n\nWhenever this power has been evolved from the fire, it lives within all the others and changes them all into its own sweet nature, so that painfulness and enmity cannot be found therein in any shape whatever.\" ( Tabulæ Principæ , i.\n\n46.) \"The fifth quality is the true love-fire, which in the light separates from the painful fire, and wherein divine love appears as a substantial being.\n\nIt has within itself all the powers of divine wisdom; it is the trunk or the centre of the tree of eternal life, wherein God the Father becomes revealed in His Son by means of the speaking Word.\" ( Grace , iii.\n\n26.) In the Sixth Quality the divine powers, still united, and therefore undifferentiated and not manifest in the fifth, become differentiated and audible.\n\n\"The sixth form of eternal nature is intelligent life or sound.\n\nThe qualities being all in a state of equilibrium in the light (the fifth), they now rejoice and acquire audibility.\n\nThereby the desire of the unity enters into a state of (conscious) willing and acting, perceiving and feeling.\" ( Tabulæ Principæ , i.\n\n48.) \"To constitute audible life, or the sound of the powers, hardness and softness, compactness and thinness and motion are required.\n\nTo constitute the sixth principle there are therefore required all the other qualities of p.\n\n84 nature.\n\nThe first form furnishes hardness, the second motion; by means of the third division takes place.\n\nThe fire changes the harshness of the conceived essence by consuming it into a spiritual being, representing mildness and softness, and this becomes formed into sound, according to the qualities which it contains.\" ( Mysterium , v.\n\n11.) This sound of course is not to be compared to terrestrial audible sound.\n\n\"In the light of God the kingdom of heaven (the consciousness of the spirit), sound is very subtle, sweet, and lovely, so that if compared with terrestrial noise, it is like a perfect stillness.\n\nNevertheless in the realm of glory it is indeed comprehensible sound, and there is a language which is heard by the angels—a language which is, however, only partaking of the nature of their world.\" ( Mysterium , v.\n\n19.) The third principle reappears in the seventh , and therein consists the \"resurrection of the flesh.\" \" The Seventh Principle is the corporeal comprehension of the other qualities.\n\nIt is called ' Essential Wisdom ' or the ' Body of God .' The third principle appears in the seven forms of nature in so far as they have been brought into comprehensibility in the seventh.\n\nThis principle or state of being is holy, pure, and good.\n\nIt is called the eternal untreated heaven or the kingdom of God, and it is outspoken from the first principle, of the dark fire-world and from the holy light-flaming love-world.\" ( Grace , iv.\n\n10.) \"The seventh form is the state of being wherein all the others manifest their activity, like the soul in the body.\n\nIt is called Nature, and also the eternal essential wisdom of God.\" ( Tabulæ Principæ , i.\n\n49.) \"The seventh spirit of God is the body, being born from the other six spirits, and in it all the celestial figures are taking form.\n\nFrom it arises all beauty, all p.\n\n85 joy.\n\nIf this spirit did not exist God would be imperceptible.\" ( Aurora , xi.\n\n1.) \"Wisdom is the substantiality of the spirit.\n\nThe spirit wears it as a garment, and becomes revealed thereby."

