[content]
body = "207:1 \" Eve ,\" the soul of the world, had not yet become spiritually enlightened enough to produce a divine being.\n\n207:2 \"Eve imagined that in Cain she had produced Jehovah , the future King of the external world; and likewise the apostles supposed that Christ Was going to establish au external kingdom.\" ( Three Principles , xx.\n\n50.) 207:3 It should be remembered that these allegorical names do not refer to individual men, but to states of the universal mind.\n\n208:1 \" Seth \" is a ray of love-light escaping from the fiery will.\n\n( Mysterium Magnum , xxix.\n\n24.) 209:1 If \" Cain \"— i.e.\n\n, the external \" church,\"—had been annihilated, there could have been no further progress therein.\n\nThe destruction of the intellect would make an end to all prospects of its becoming spiritual.\n\n210:1 \" Sem ,\" the outbreathing of divine power.\n\n\" Ham ,\" a breath from the centre of nature, conceived within the \"flesh.\" \" Japhet ,\" the will penetrated by light.\n\n210:2 In regard to the Bible allegories Boehme says:— \"The written Word is only an instrument wherewith the Spirit leads.\n\nThe Spirit must be alive in the literal form.\n\nWithout this there can be no divine teacher, but only teachers of letters; only reciters of stories.\" ( Regeneration , viii.\n\n6.) \"Christ alone is the Word of God, teaching by means of His children and members the way of truth.\n\nThe literal Word is merely a guidance and symbol, a testimony to illustrate and represent objectively to man what Christ has done (and is doing) for us; so that we may draw and conceive our faith therein; but then we should enter with our desire into p.\n\n211 the living Word, into Christ Himself, and become ourselves born to life therein.\" ( Mysterium , xxviii.\n\n53).\n\n\"Babel does not like to hear it if it is taught that Christ Himself has to be the teacher within the human spirit.\n\nThey call upon the written Word, and say that if they teach that, then would the Spirit be poured out.\n\nOh yes!\n\nAll right!\n\nI claim the same thing.\n\nIf the Word is taught in the spirit and power of Christ, then is this so.\" ( Mysterium xxviii.\n\n51).\n\n212:1 Those are the favoured people of God in whom lives the light of Christ, and not those who exclaim, \"Lord!\n\nLord!\n\n\" using the name of Christ in vain, while the devil is occupying their souls.\n\nBoehme says:— \"All beings are created out of the Father.\n\nThe Father is in all and maintains everything.\n\nHe gives to all life and substance, and the Son is in the Father and gives to all things power and light.\n\nHe is our light, and without Him we cannot know God.\n\nHow can we, then, say anything about Him?\n\nIf we wish to speak of Him truthfully, we must speak out of His Spirit, because He testifies of God.\" ( Threefold Life , xi.\n\n90.) 212:2 \"Abraham,\" a collection of people— i.e.\n\n, of minds—in whom spirituality has become manifest.\n\n(See Mysterium Magnum , xli.\n\n1.) 212:3 This again goes to show that Boehme's conception of these intracosmic powers and processes had nothing in common with the narrow views of orthodox \"Christianity,\" which sees in those Biblical personifications nothing but terrestrial men and women.\n\n212:4 These representations of intracosmic powers, personified in the Bible, p.\n\n213 are all to be found in the theogonies of the \"heathen,\" although under different names."

