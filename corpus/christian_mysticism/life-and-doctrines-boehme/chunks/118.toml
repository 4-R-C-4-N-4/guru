[content]
body = "225:1 All disputes about the nature of Christ only prove that the disputants are not Christians, because if they were true followers of the Christ they would have the living Christ within themselves, and know His true nature.\n\nThe misunderstandings of the \"Christians\" regarding the Christ arise from the fact that they regard Him as something external and incompatible with human nature; neither will any merely theoretical research regarding this mystery lead to any satisfactory result.\n\nThe only way in which this matter can be settled for once and for ever is that those who have doubts about the divinity of Christ succeed in raising Him from His tomb within their own souls, when He will become revealed to them.\n\n\"Each one desires to be a child of God in his knowledge, and nevertheless disobedience and unfaithfulness are as great in one people as they are in another.\n\nA belief that Christ has once been born and died for me and arisen from death does not make me a child of God.\n\nThe devil knows that also; but it is of no use to him.\n\nI must clothe myself in Christ by means of the desire of faith; I must enter myself into His obedience, His incarnation, His suffering and death; I must myself arise in Him and adopt the obedience of Christ.\n\nOnly in this way can I be a Christian, and not in any other way.\" ( Mysterium , li.\n\n43).\n\n226:1 \"'Gabriel,' an angel or god of sound, an internal, sourcive spirit.\" ( Aurora , xii.\n\n86.) 226:2 There is no doubt that, as some will have it, the legend of the descent of the Redeemer is the description of an astrological process; but this theory, far from disproving the incarnation of divine wisdom into a human form, confirms it; because that which takes place in the macrocosm produces corresponding effects in the microcosm.\n\nIn man is the sun, the moon, the stars, and the whole of the zodiac.\n\nIn the microcosm is represented every part of the macrocosm in its material and spiritual aspect.\n\np.\n\n227 When man sees the external sun rise in the outer world, the sun in him arises and gives joy to his heart.\n\nAny individual person, or also humanity as a whole, may become either a god or a devil incarnate.\n\n227:1 Christ, or the Universal Logos , is not a personality in the usual acceptation of that term, but becomes personal if personified in man.\n\nLikewise the celestial virgin is personified in woman, in the same sense as the light of the sun becomes individualised in a flower, a diamond, or precious stone.\n\n227:2 \" Outside of a body the spirit cannot remain in its perfection, for as soon as it is separated from the form it loses its rule.\n\nThe body is the mother of the spirit.\n\nIn the body the spirit is born, and receives therein its power and strength.\n\nIf it is separated from the body it still remains a spirit, but loses its ruling power.\" ( Aurora , xxvi.\n\n50.) 228:1 And the divinity in man continues to be crucified in him until the self-will is dead and the Christ arisen in His own light.\n\n229:1 The Christ can never be born or revealed in any impure soul.\n\nA soul wherein regeneration is to take place must be an immaculate virgin, having no intercourse with any external god; but executing the will of God dwelling within herself.\n\n229:2 \"Ana\" is the Chaldean name for the astral light (see Secret Doctrine ).\n\n\"In the language of nature the name 'Mary' means 'salvation from this valley of sorrow.'\" ( Principles , xviii.\n\n37.) No man can be saved without the grace of Mary, i.e.\n\n, without the presence of that which is noble, exalted, saving, and sanctifying in him."

