[content]
body = "Man had become earthly, and therefore God put before Himself the object to a covenant of mercy, so that His imagination might not enter into the terrestrial consciousness of man, and that His wrath-fire might not be ignited with the earthliness and the sins of mankind.\" 1 ( Tilk .\n\ni.\n\n289.) This reconciliation (or atonement) could surely not result from the merely external act of sacrificing animals, but by means of the faith that accompanied it.\n\nThis faith required an external action or form wherein to become conceived.\n\n\"All sacrificing without faith and divine desire is an p.\n\n219 abomination before God, and does not reach the gate of divine glory; but if man enters therein with the power of faith, he surrenders to it his free will, and desires by that means, and through its instrumentality, to enter into the eternal free will of God.\" ( Mysterium , xxvii.\n\n13.) \"Why did the two brothers (Cain and Abel) wish to sacrifice to God, while atonement is only to be found within the earnest desire for the mercy of God, in prayer and in man's persuading himself to depart from his own evil will, to change and to repent, and by bringing his faith and hope into the mercy of God?\n\nThe free will of the soul is as thin as a nothing, and although within its (material) body it is surrounded by something (substantial), nevertheless its own conceived essence is in a state of false desire on account of the sin.\n\nIf, then, this free will, with its (accompanying) desire, is to proceed towards God, it will have first to issue from its own illusive something, and whenever it issues from thence it is then naked and impotent, and again within the original nothing.\n\nIf the will desires to go with or to enter into God, it must die to its own selfhood and leave that (illusive) self; and whenever the will leaves that self it is then like a nothing, and can therefore not act, strive for, or accomplish anything.\n\nIf it wants to show its power, it must be within something wherein it may conceive and form itself, as is the case with Faith; for if there is to be an active faith, then that faith must conceive of something (have some object) wherein it may act.\n\nEven the free will of God conceived itself within (has for its object) the internal spiritual world, and acts through the latter.\n\nThus the free will of the soul of man, having its origin from the abyss (the primordial, unfathomable will), must conceive itself into something, so as to become manifest and to move before God.\" ( Mysterium , xxvii.\n\n1, 4–6).\n\nThe earthly and impure substance of the victim was to p.\n\n220 be destroyed by the fire, but this fire was not of a terrestrial but of a celestial kind.\n\n1 \"The spirit of man has issued from God, and has gone from God (the Eternal) into time, and within the temporal it has become impure.\n\nNow it will have to leave its impurity, and by means of the sacrifice enter again into God.\" ( Mysterium , xxvii.\n\n34.) \"Adam's body has been created out of the Limus of the earth, and also out of the Limus of the heaven of holiness; but the Limus of heaven, wherein the free will could conceive itself into a celestial form and move, act, think, and pray before God, was weakened in Adam, and therefore the two brothers ignited (sacrificed) the fruits of the earth.\n\nCain brought of the fruits of the earth (matter), but Abel of the first-born of his flocks (of the spirit), and these they ignited by means of fire .\" ( Mysterium , xxvii."

