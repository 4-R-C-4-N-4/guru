[content]
body = "It is itself the most secret thing, which can be known by no one except by him who has experienced it; neither do those that live entirely within the realm of animality, or within that of the speculating intellect, believe that such a state is possible, and in fact it is unattainable for any person; because he who enters into it, ceases to be a person, except in regard to his external appearance and form—that is to say, all sense of personality is lost to him, and has ceased to exist in the field of his inner consciousness.\n\nIt is therefore unnecessary to repeat that this state cannot be entered by the exercise of the self-will of animal man; neither can it be produced by him by means of any intellectual study; nor is it dependent on his social condition, or education, profession, or external qualifications in life, but it comes to man solely and alone by the mercy and grace of God .\n\nIt means the presence of the divine light, and that presence depends on nothing else than on that presence itself.\n\nBoehme says— \"It pleases the Supreme to reveal His secrets by means of the foolish, who are looked upon by the world as being nothing; so that it may be seen that their knowledge does not come from these fools, but from Him.\n\nTherefore I ask you to regard my writings as being those of a child in which the Supreme has manifested His power.\n\nThere is in them so much, that no kind or amount of argumentation and reasoning can comprehend or grasp it; but to those that are illumined by the Spirit their understanding is easy and merely child's play.\" ( Letters , xv.\n\n10.) \"The understanding is born of God.\n\nIt is not the product of the schools in which human science is taught.\n\nI do not treat intellectual learning with contempt, and if I had obtained a more elaborate education, it would p.\n\n53 surely have been an advantage to me, while my mind received the divine gift; but it pleases God to turn the wisdom of this world into foolishness, and to give His strength to the weak, so that all may bow down before Him.\" ( Forty Questions , xxxvii.\n\n20.) The reasoning intellect has nothing to do with originating perceptions, but is used for the purpose of bringing the ideas received from the clear perception of truth into a requisite form; and as the mind is then in a higher than the normal condition, it often happens that on returning to the lower state it does not understand, and perhaps not even remember, the ideas which it expressed during that time.\n\n\"I say it before God, and testify before His judgment-seat, where everything must appear, that I in my human self do not know what I shall have to write; but whenever I am writing the Spirit dictates to me what to write, and shows me all in such a wonderful clearness, that I often do not know whether or not I am with my consciousness in this world.\n\nThe more I seek the more I find, and I am continually penetrating deeper; so that it often seems to me as if my sinful person were too low and too unworthy for the reception of knowledge of such high and exalted mysteries; but in such moments the Spirit unfolds His banner and says to me, 'Behold!\n\nin this shalt thou live eternally, and be crowned therewith.\n\nWhy art thou terrified?'\" ( Letters , ii.\n\n10.) \"I might sometimes perhaps write more elegantly, and in a better style, but the fire burning within me is driving me on.\n\nMy hand and my pen must then seek to follow the thoughts as well as they can.\n\nThe inspiration comes like a shower of rain.\n\nThat which I catch I have.\n\nIf it were possible to grasp and describe all that I perceive, then would my writings be more explicit.\" ( Letters , X.\n\n45.) p."

