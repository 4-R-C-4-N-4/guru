body = "Not that he contains their essences, but their life arose from his centre in the beginning.\" ( Threefold Life , iv.\n\n27.) \"The sun is the heart of all the powers in this world, and is configurated from the powers of all the stars, while, on the other hand, he illuminates and vivifies all the stars and powers in this world.\" ( Aurora , vii.\n\n42.) Thus the divine principle in man furnishes the intellect with light and life in the same sense as the sun reflects his light upon the moon.\n\nAn intellect which has been deserted by God will perish after its accumulated strength is exhausted.\n\nOnly that which God knows in us remains permanent.\n\n\"The sun is in the midst of the depth, and is, so to say, the light or heart of the stars, extracted from all their powers by the power of God, and brought into form Therefore is he the clearest light of all, and by his lustre and heat he ignites all the stars, each one according to its own special quality and power.\" ( Threefold Life , vii.\n\n40.) \"This is not to be understood as if by calling the sun the centre we meant to say that all the stars were originated from a central point, called the 'sun.' The sun is the centre of the powers of the stars, and the cause why they move in their essence.\n\nHe unfolds their powers and puts his power into them, and this power constitutes their heart.\" ( Mysterium , xi.\n\n32.) Especially have the seven planets become objective by means of the sun, and in accordance with and corresponding to the seven forms of nature.\n\n1 p.\n\n133 \"As the sun is the heart of the life and an origin of all the spirits in the body of this world, likewise is Saturn a beginning of all corporeity and tangibility.\n\nThus he does not derive his beginning and descent from the sun, but his origin is the earnest, acrid, and severe anxiety of the whole body of this world.\" ( Aurora , xxvi.\n\n1.) \"When the light became ignited, the conquered power in the astringency became Mercury.\" ( Three Principles , viii.\n\n24.) \"Mercury is an agitator, sound-maker, ringer; but he leas not yet the true life.\n\nThe latter originates in the fire.\n\nThus he desires the fierce and storming essence, to cause fire to appear, and this is Mars.\" ( Threefold Life , ix.\n\n78.) \" When the sun became ignited, the terrible fire-flash went from the locality of the sun in an upward direction like a furious stroke of lightning, and this became Mars.\n\nHe is now there as a tyrant, a raging element, a mover of the whole body of this world, so that all life takes its origin of him.\" ( Aurora , xxv.\n\n72.) \"As soon as the spirits of motion and life, by means of the ignition of the water, arose from the locality of the sun, mildness, being the basis of the water, penetrated, endowed with the power of light, in a downward direction, after the manner of meekness, and from this the planet Venus came into existence.\" ( Aurora , xxvi.\n\n19–33.) \"When the fiery terror was captured by the light, the light, by its own power, and being a mild, exalting life, penetrated still higher upwards into the depth, until it arrived in the hard and cold seat of nature.\n\nThere it remained, and from that power the planet Jupiter came into existence.\" ( Aurora , xxv.\n\n76–82.) \"The seventh form is Luna, wherein are contained the qualities of all the six forms.\n\nShe is, so to say, the corporeal p.\n\n134 being of the other forms, all of which throw into her their desire by means of Sol ."

