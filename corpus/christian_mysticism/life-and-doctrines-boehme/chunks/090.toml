body = "If this could be done in purity, and without the admixture of that which causes disgust, then would it all be holy; but even the sulphur (the terrestrial element) of the seed is a cause of disgust in the sight of true holiness.\" ( Stiefel , ii.\n\n402.) During the connubial act a divine interaction takes place; but there are also influences coming from the terrestrial and the satanic worlds.\n\nMore especially is the nature of the child dependent on the quality of its parents.\n\n2 p.\n\n196 \"The will called into action during the connubial act is threefold.\n\nFirstly, there arises between the parents of the child the animal desire to commingle, and during the commingling the centre of love becomes opened, even if they were otherwise dissatisfied with each other.\n\nThat love then participates in the qualities of the one element, and this element with paradise; but the paradise is before God.\" ( Three Principles , xv.\n\n30.) \"On the other hand, the external seed has also its own essences, and they participate in the qualities of the external elements.\n\nThese external elements participate in the qualities of the external planets, and they are connected with external wrath and malice; while the latter are connected with the abyss of hell, and that abyss belongs to the devils.\" ( Three Principles , xv.\n\n31.) \"If a branch grows out of a tree, its form approximates that of the tree.\n\nThus, if a mother produces a child, the child is formed in her own image.\" ( Forty Questions , v.\n\n1.) \"An evil tree cannot produce good fruits.\n\nIf both parents are bad and in the power of the devil, a soul inclined to evil will be sown.\n\nIt would be well for parents to remember this fact.\n\nYou are saving up money for your children, but if you would furnish them with a good soul, that would be more useful to them.\" 1 ( Forty Questions , x.\n\n7–9.) p.\n\n197 \"To the extent in which the parents have the essentiality of God connected with their own souls will the seed not be introduced into the Turba; for Christ says, 'A good tree cannot bring forth evil fruit.'\" ( Forty Questions , x.\n\n5.) Each soul, however, is an individual being, and therefore a child born from bad parents can again turn to God, or the reverse of this may take place.\n\n1 \"Although the soul is a branch from the tree, she is, nevertheless, an individual being.\n\nTherefore a child, after being born, has a life of its own, and the centre of nature is within its own power.\" ( Forty Questions , vi.\n\n2.) \"Even if a child has good parents, it may afterwards enter into the Turba .\n\nLikewise a child born of evil parents may become converted by means of its imagination, and enter into the Word of the Lord.\n\nThis rarely takes place, but it is nevertheless possible.\n\nGod throws no soul away, unless the soul throws herself away.\n\nEach soul judges herself.\" 2 ( Forty Questions , x.\n\n6–8.) Footnotes 180:1 It is the principle of light in man that causes him to seek for the light, and to desire that it should become manifest.\n\nIf man were something entirely different from God, and had consequently nothing divine in him, he would be an atheist, incapable of conceiving of justice or truth, and have neither any desire nor understanding for that which is divine.\n\n181:1 In proportion as the will of man is not controlled by reason, that will becomes unreasonable and follows its lower impulses.\n\n182:1 To express this in other words, we may say that the will of man ceased to act within his own higher nature, i.e."

