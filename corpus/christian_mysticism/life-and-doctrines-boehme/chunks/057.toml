[content]
body = "126:1 The six \"days\" are the activities of the seven forms of eternal nature, the seventh is their centre or rest, or the \"temperature.\" In the seventh, \"God\" appears as the \"Christ.\" (See Grace , iii.\n\n39.) 128:1 Three is the number of form, and therefore on the third \"day,\" and by means of the third principle, three dimensional forms (there can be no other) came (and continue to come) into objective existence.\n\n131:1 Man judges himself.\n\nAccording to his conscience will turn the scales of the balance.\n\nThe judgment-day appears when the judging spirits awaken in him.\n\n132:1 All the illumined philosophers of the past speak of only seven planets, and if we accept the possibility of spiritual perception and agree that this p.\n\n133 perception was true, then there can be no more than seven original planets in our solar system, and the remaining two may be looked upon as excrescences, or shadows, as would also appear from the maleficent influence of at least one of these, which is known to astrologers.\n\n134:1 For explicit details regarding the inhabitants of the elemental world see Paracelsus.\n\nThe existence of such beings will become more comprehensible if we remember that the universe is an organised unity, and that each form therein, whether it is visible or invisible to us, is nothing but a relative expanse of manifestation of the consciousness that resides in the All.\n\n135:1 All this refers not only to beings such as are visible to us, but likewise to such that exist on other planes of creation, and which can therefore not be seen with our eyes.\n\nThere are male and female elemental beings, moll and dur accords in music, positive and negative forces in all departments of nature, from the spiritual down to the most material plane.\n\nIn all creatures the will is the executing and female, corporifying, and the imagination the superintending, directing, male element.\n\n135:2 In regard to the \"stuff out of which man is made,\" Theophrastus Paracelsus says: \"It is an extract of all beings that exist in heaven and upon the earth, of the souls of all things, all creatures, spirits, elements, and minds, attracted to a focus by means of the spiritual centre residing within each form.\n\nIt is the quintessence of all things, and man is a microcosm, differing from the macrocosm only in so far as in his constitution the things which constitute the macrocosm appear in another image, order, or shape.\n\nIn him are all the potencies and qualities that exist in the universe, active or latent.\n\nHis terrestrial substance is from the earth, his mental faculties from the universal mind, his worldly wisdom is from the light of nature; but the divine wisdom in him belongs to God.\" 136:1 In studying the \"anatomy\" and \"physiology\" of the inner man, it will be necessary to remember that, in dealing with anthropology and cosmology from a spiritual point of view, we must be able to discard from our mind all the vulgar conceptions of what is usually called \"matter \" by that science which deals merely with external appearances, and we must look upon all things as being manifestations of an universal consciousness, acting upon internal or external planes of existence, while the visible form is nothing but a passing apparition.\n\n137:1 Man is made out of will and imagination; in other words, \"fire\" and \"light.\" The manifestation of fire and light (thought) produces that which appears to us as \"substance\" or \"form.\" 137:2 It is not \"man\" in the abstract who recognises anything.\n\nIt is always a certain principle, having become active in him, that recognises its own counterpart in external nature, when it comes in contact with it."

