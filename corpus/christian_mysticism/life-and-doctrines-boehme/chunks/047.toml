[content]
body = "Man must know evil for the purpose of becoming able to realise the good, after which he returns to the latter; but as everything seeks for its own corresponding principle, he in whom evil has become paramount will remain in evil.\n\np.\n\n121 \"Behold a thistle or a nettle.\n\nThe more sunshine and power they receive, the more stings will they produce.\n\nThus, if God pours His love into the devil, the products of the devil are anger and hate.\" (See Grace , iv.\n\n37.) An end of the hellish torment 1 is inconceivable.\n\nSuch an end would involve either a change of Lucifer's pride into humility, or a destruction of the whole work of creation.\n\n\"If Lucifer were again to become an angel, to become such he would have to draw again from the unity and love of God; his fire-life would have to be consumed by love, and to be changed into humility; but this the hellish foundation (the will) in the devils refuses to permit.\" ( Theosophical Questions , vii.\n\n5.) \"The hellish essence, having an eternal foundation, the will cannot perish, unless the whole of creation would cease to exist and eternal nature in her own loveliness be extinguished.\n\nBut in this case the kingdom of joy would be equally lost.\" ( Theosophical Questions , v.\n\n3.) 2 Footnotes 101:1 Whether we call them by those names, or whether we adopt the names by which they are called in other theologies, will be of no consequence, and not alter the fact that such powers exist.\n\n102:1 Jehovah.\n\n109:1 Therefore no man can resist, successfully resist the devil by fighting him on the same level, nor can any one overcome temptations in the end except by rising above them.\n\n111:1 To \"desire the Nothing\" does not mean to become unconscious of everything, like a man when he goes to sleep, but it means \"contentment,\" and a state of perfect rest and happiness found in the self-consciousness of being and possessing the All.\n\n113:1 True humility does not consist in self-abasement, but in the entire sacrifice of one's lower self, whereby the power and the majesty of God become revealed in man.\n\n114:1 Hell is created in man by the awakening of his lower qualities, whereby they attain self-consciousness and self-will, and refuse to obey the divine will in man.\n\n115:1 The same is the case with every one who turns away from the light and seeks the darkness, until at last he becomes identified with the darkness, and can no longer separate himself from it.\n\n117:1 It must not be supposed that the good angels \"made up their minds\" to fight Lucifer, but this separation was according to natural laws, in the same sense as water is opposed to fire.\n\n118:1 The good which we receive is not recognised, because it causes no pain.\n\nNo one complains about receiving more blessings than he merits; but the deserved evil which we receive causes suffering, and the unmerited evil is keenly resented.\n\n121:1 The word \"torment\" means here not necessarily \"pain,\" but \"consciousness.\" The \"devil\" does not suffer as long as he is in his own element.\n\n121:2 That which has become self-conscious in evil cannot be changed into good without first becoming unconscious of its own evil self; but if the being is wholly evil, such a complete death would also prevent the possibility of its becoming conscious of good.\n\nNext: Chapter VI.\n\nThe Restoration of Nature and the Generation of Man"

