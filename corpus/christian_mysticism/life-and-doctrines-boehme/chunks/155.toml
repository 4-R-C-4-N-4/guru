[content]
body = "Their existence resembles that of a man enjoying a happy dream.\n\n\"The rest of the soul is like that of one who rests in a sweet sleep.\" ( Forty Questions , xxix.\n\n1.) \"Those happy souls that are resting in Abraham's bosom, in Christ— i.e.\n\n, in the heavenly essentiality (Devachan)—cannot be disturbed by anybody, unless they should wish it themselves, in case that they were very favourably inclined towards some particular soul in harmony with their own.\n\nThey do not trouble themselves about terrestrial things, unless it be for the glorification of God.\n\nIn that case they will be indefatigable in revealing things in a magical way.\" ( Forty Questions , xxvi.\n\n22.) In regard to the intercourse between mortals and that class of spirits Boehme says in a letter:— \"You are asking questions of things which I cannot know, because for that purpose I would have to be myself within the departed soul, and the spirit of that soul would have to be my own; but as we are all having one body and one spirit in Christ, therefore all of us may see in Christ out of one spirit and enjoy His knowledge.\n\nThus our soul is in relationship with the souls of the dead.\n\nThey cannot come to us, but we may penetrate unto them.\" ( Forty Questions , xxv.\n\n1.) Fully sanctified souls are in possession of an enormous amount of self-knowledge; others have less.\n\n\"The soul which in this body has entered into the new birth and penetrated to God through the doors of p.\n\n304 the depth has great wisdom and knowledge, even as regards the heavens; for she has come from the womb of the virgin, wherein have been unfolded the eternal miracles of God, and the splendour of the Holy Trinity shines out of her.\n\nBut we err if we attribute great wisdom to a soul that has hardly escaped from the clutches of the devil, after having left a world wherein she cared nothing about divine wisdom, but merely followed her own desires.\" ( Three Principles , xix.\n\n61.) It is an absurdity to believe that the departed souls of God, the saints, could petition God in regard to our necessities, or argue the case with Him, or that they could put into motion the eternal and infinite mercy of God.\n\n\"The departed souls do not petition God on our behalf.\n\nWhy should they do so?\n\nOur salvation does not depend on their begging, but on our entering.\n\nIf any one puts his will into God, then will God help him.\n\nHis arms are outstretched by day and night for the purpose of aiding man.\n\nShould then a soul be so presumptuous as to make out of God an over-severe Judge, unwilling to receive a converted sinner?\" ( Forty Questions , xxvi.\n\n23.) It is explainable that the souls of deceased saints have performed what is called \"miracles;\" but this did not take place after the manner in which it is commonly believed, but by a conjunction of the faith (will) of the living with the faith of the departed.\n\n\"We do not deny that (as it is taught by Popery) great departed saints have appeared to many persons and performed miracles.\n\nThis is true, although it is now denied by many; but it belongs to a different A B C (to another department of occult science) than is known to those who affirm it, or to those who deny.\" ( Forty Questions , xix.\n\n63.) p.\n\n305 \"The reason why our forefathers have sometimes appeared after death in some wonderful manner is to be found in the faith of the living; for faith is a power that may move mountains.\n\nThe faith of these living persons was still good and pure, and they did not worship their bellies or adore earthly show.\n\nTherefore their faith penetrated into heaven; i.e.\n\n, into the one element, to the saints."

