[content]
body = "At first there moved the centre of nature in the Father, for the purpose of creating the angels, and through them the world.\n\nThe second time the quality of the Son moved, whereby the Heart of God became Man, and this will never take place again in eternity; but whenever it now takes place, it will occur merely through this only (universal) Man (Divinity in Humanity), who is God, manifesting Himself through and in many.\n\nFor the third time, and at the end of the world, God will move in the name (quality) of the Holy Spirit, when the world will return into the Ether ( Akasa ), and then its dead will be resurrected.\" ( Threefold Life , vii.\n\n22.) This may perhaps be expressed in other words by saying: At the first impulse the latent will became active, at the second move the latent wisdom or light, and at the third move or impulse the third principle will enter from the latent state into activity.\n\n199:1 Whether such an event took place some 1900 years ago or at any other date may be left to the historian to find out.\n\nAt all events, the Bible account is a description of the redemption of the world from spiritual ignorance by the entering of a ray of the light of God, and likewise of the spiritual regeneration of man.\n\nThe external \"Christian\" Church, with its ritualism, is based upon a belief in a person of Jewish history, who died and left his powers in the hands of the clergy.\n\nThe religion of the living Christ is based upon the recognition of an eternal process going on in the macrocosm of nature and in the microcosm of man.\n\nTo the externally-reasoning \"liberal\" Christian, Jesus of Nazareth, whether He ever existed or not, represents the type of an ideal man, a teacher who, by example and words, taught men virtue.\n\nTo the internal perception of the seer He is the type of the personification of the divine Logos in man.\n\n199:2 The expression \"God\" is here not to be taken as the primordial absolute Will, but as God in His aspect as the Father.\n\n199:3 God never went outside of universal man, neither did His light become extinguished in him.\n\nIn its macrocosmic aspect the \"re-entering\" of that light may be compared to a ray of light in the centre of a body penetrating to the periphery.\n\nIn its microcosmic aspect it is comparable to the life giving power of the sun, awakening the life in an individual organism.\n\n200:1 The true Christ is, therefore, neither an \"Adept\" nor a \" Mahatma ,\" nor a Reformer, a mortal person, nor anything whatsoever that differs from God, but he is Divinity itself manifesting itself in Humanity, and thereby saving mankind as a whole, and each individual person separately considered, from ignorance and suffering, to the extent as mankind or such an individual person receives Him (the light) in him or her.\n\nThe redemption from spiritual darkness depends on the presence of the redeeming power of the spiritual light within the darkness itself.\n\n200:2 As the future regenerated Man, the second Adam was contained hidden within the first Adam; likewise the name of Jesus was hidden in the name of Jehovah , the latter being Himself Universal Man.\n\n201:1 Christ ( Atma-Buddhi ) being Divinity in Humanity, there can be no other Redeemer than He, because man cannot be saved from mortality in any other way than by becoming immortal; nor can he become immortal unless he does become divine.\n\n(\"That which is unclean cannot enter the kingdom of cleanliness.\") The reason why the divine Logos , in its aspect as the \"Christ\" or Redeemer, is not spoken of as an \"it,\" but as \"He,\" is evidently because the Word, by becoming human in man, naturally assumed the qualities of man."

