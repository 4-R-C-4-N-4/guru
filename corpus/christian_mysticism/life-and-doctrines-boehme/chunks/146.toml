[content]
body = "It would then be easy for us to grant our own desires, if in that divine state there could be room for personal desires of any kind.\n\n268:1 True prayer is the bringing of will, thought, and word into one Δ by the power of the Spirit of God.\n\n272:1 Here it may be useful to remark that if a person cannot perceive these dangers of the devil which are lurking in everything, it would be folly for him to imagine all sorts of dangers in his own fancy, whereby he would merely create for himself innumerable fears and perplexities, and become afraid of the world, instead of superior to it.\n\nThe main paint for the seeker of divine enlightenment is, and remains, to put his \"point of gravitation\" into the divine self-reliance, and remember that he who has found his true dignity and manhood in God is superior to the devil, and there is nothing in the universe which could give him just cause for fear.\n\n274:1 See \" Jehoshua, the Prophet of Nazareth .\" 275:1 The human intellect, in its relation to the divine spirit, may be compared to the moon that receives her light from the sun.\n\nIn either case the former is merely a reflection, while in the latter rests the true light.\n\nThus there are many who mistake the reflection for the true light and their own fancies for the wisdom of God, and from this arises that self-conceit which is never more repulsive than if found among those who boast of being the servants of God.\n\n277:1 There are many \"Christians,\" \"Buddhists,\" &c., who imagine that they could attain the apex of perfection if they were only getting rid of their physical body.\n\nSome even go so far as to object to having a soul.\n\nSurely the Divinity per se does require neither a physical body nor a soul to be self-existent and eternal; but man requires all this to enable the light of Divinity to become revealed in him.\n\nWithout that, man, even if he could continue to be, would be unconscious of his existence; a spirit without knowing or experiencing anything about it.\n\nImmortality is not attained by merely fancying oneself to be immortal; neither can there be much satisfaction for man to believe that God is immortal as long as he is godless himself.\n\nGautama himself could not have become a \" Buddha \"— i.e.\n\n, an enlightened soul—if he had not been in possession of a soul which could be enlightened.\n\nThis divine soul is the body of Christ.\n\n278:1 The very same idea is expressed in the Bhagavad Gita , where man is advised to seek to realise that he is one with Krishna , and having realised it, he will be no longer a partaker, but merely a spectator, in the battle, which after all does not concern the Divinity in him, his own real self.\n\nNo man can, however, identify himself by his own human power with Krishna or Christ; this always requires the presence and the power of Christ or Krishna Himself.\n\nIn other words, it requires, as Boehme expresses it.\n\n\"the grace of God, which, however, can be found within every person who ceases to desire evil.\" ( Mysterium , lxi.\n\n57.) Boehme says: \"No man can make himself a child of God, but he must throw himself entirely into a state of complete obedience to God.\n\nThen will God make him His child.\n\nHe must be dead (to all sense of self), then will God in the Christ live in him.\" ( Tilk .\n\ni.\n\n398.) \"No man can by his own power raise himself into the light which is extinct within his will, but he may enter the ground that produces the light and wherein is hidden neither evil nor good, because he is himself that foundation (cause)."

