[content]
body = "Only he in whom is light can see the light; only the element of love can feel love; only the divinity in man can know God in and through man.\n\n138:1 Therefore Theophrastus Paracelsus says: \"Natural man is made out of the world, and not the world out of him.\n\nHe is a child of nature, and has all of his mother's qualities in himself, neither more nor less.\n\nBut the true spiritual man is a son of God.\n\nNatural wisdom is not divine, but divine wisdom is above all.\" 139:1 And thus at this very day each person who has not yet begun to be regenerated in the spirit is in the same condition in which Adam was before the Spirit of God breathed in him.\n\nMan's soul resembles a seed containing the potency of conscious immortality in an unconscious state.\n\nThere is nothing immortal in man except God, and by the awakening of that which is divine in him attains the self-consciousness of his own immortality.\n\nNext: Chapter VII.\n\nMan"

