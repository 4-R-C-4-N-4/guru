[content]
body = "159:1 Woman in all departments of life is a saviour of man.\n\nEven the most degraded woman may be a saviour for still more degraded man, by keeping alive in him a feeling for an ideal—a low ideal, it is true, but one that keeps him from sinking into still lower depths, and which may become more refined.\n\nThe mission of woman to save man ceases only when man has found the celestial virgin within himself.\n\n160:1 The \"serpent\" is the astral light , in whose folds and temptations the will of man is entangled.\n\n161:1 Evil desires always enter the heart of man silently and worm-like, until the soul becomes entangled therein as in the folds of a serpent.\n\n161:2 The serpent is not himself the devil, but the devil is the evil will that causes the serpent to move.\n\n161:3 There is no mortal man to whose tree of life the serpent of desire is not attached during his terrestrial existence.\n\n162:1 If woman represents the will and man the intellectual power of mankind as a whole, it naturally follows that the will was seduced by the desire before the intellect followed in its track.\n\nIf the intellect had become seduced first, it would have become separated from the \"woman,\" and man would have become a clever fool, an intellectual maniac, an unspiritual but cunning scientist, without any soul or faith—a \"materialist.\" 162:2 Actual \"sin\" begins only where there is a knowledge of evil.\n\nA mere evil desire does not constitute \"sin\" as long as the desire has not the consent of the intellect.\n\n163:1 The more man seeks for the object of his existence in external and sensual things, the more will he depart from his spiritual faith or point of gravitation from his own divine centre or God.\n\nHe becomes experienced in external and superficial things, and loses sight of that which is real and divine.\n\nHis external knowledge, which after all is only imaginary, as it deals only with passing illusions, awakens his pride and self-conceit; he begins to assert his personality against immortality; he becomes cruel, and selfish, and passionate; and unless he be redeemed by the awakening of spirituality within himself, he will end in awakening in him the \"fiery foundation,\" the principle of evil, the \"devil.\" Instead of the Christ, Lucifer will be revealed in him.\n\nNext: Chapter VIII.\n\nNature, or the Third Principle"

