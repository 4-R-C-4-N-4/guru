[content]
body = "216 those who went out from the desire of corruption and entered into the light of nature, because they did not know God, but who, nevertheless, lived in purity, these heathen were the children of the free will, and in them has the spirit of freedom unfolded great wonders, as may be seen in the works of wisdom which they left behind them.\" ( Terrestrial and Celestial Mysterium , viii.\n\n9.) \"In those heathen that were highly intellectual in the light of nature the interior holy realm was mirrored, and although the true divine intelligence was closed to them, and although they beheld merely an external reflection, nevertheless at the restoration of all beings, when the veil will be removed, they shall live in the huts of Sem.\" ( Mysterium , xxv.\n\n24.) Not only in the \"Israelites\" (in spiritually awakened races), but also in the \"heathen\" (in those races that lived on a more material plane) was active the power of the Redeemer (the Word), that had been spoken into Eve, and thereby into all mankind.\n\n\"Adam issued from the one only God, and entered into a selfhood, into ignorance, and he led us all with him into that ignorance (or misunderstanding); but then came the grace out of the same one and only God, and is offering itself to all those that are ignorant, to the heathen as well as the Jews.\" ( Mysterium , lxx.\n\n78.) \"The heathen were not out of that seed of Abraham with which God made a covenant; but the first covenant, the word that had been in-spoken in mercy, was as a foundation in them.\n\nTherefore, says Paul (Rom.\n\nix.\n\n24), that God had not called and elected merely the Jews in their covenant, but also the Gentiles in the covenant of Christ, and that He called 'My people' and My 'beloved' those that did not know Him, and who, not knowing Him, were not His people in an external sense.\n\nThe proposition of grace, which had incorporated itself by means of the in-speaking in Paradise after the fall, was p.\n\n217 contained in them, and according to that God called them His beloved ones.\n\nOnly the children of wrath must be excepted, because in them the incorporation of the name of Jesus does not take place, but only the incorporation of wrath.\n\nThe latter, however, never extends over whole races, but merely over such individuals among them as are like thistles among the wheat.\" 1 ( Grace , x.\n\n24.) Before the Redeemer appeared in the flesh His reconciling and blissful power was participated by man by means of sacrifices.\n\n\"Before the incarnation of Christ mankind became p.\n\n218 redeemed by means of the incorporated word and name of Jesus.\n\nThose who directed their will in (and to) God have received the word of promise, because the soul was accepted therein.\n\nThus the whole law in regard to sacrifice is nothing else but an antitype of the manhood of Christ.\n\nThat which Christ did as man, when by means of His love He reconciled the divine wrath, the same was (symbolically) done by means of the blood of the animals.\n\nThe word of promise was within the covenant, and in the meantime God conceived of a figure (symbol), and by the power of the covenant He caused Himself to be reconciled symbolically, for the name of Jesus was within the covenant, and by means of the imagination it reconciled the fury and wrath within the nature of the Father.\" ( Menschwerdung , i.\n\n7, 12.) \"The sacrifices were symbols of the object which God had proposed unto Himself.\n\nThe divine imagination saw through the object of the covenant the animal blood wherein Israel performed the sacrifice."

