[content]
body = "1.) \"The terrestrial consciousness corrupted the celestial one, and the former became the Turba of the latter.\n\nLikewise, the Fiat made the earth and stones out of the eternal essentiality.\" ( Menschwerdung , i.\n\n9.) \"But in the earth we find still another tincture hidden away which is like the celestial one, especially in the precious metals.\" 2 ( Six Theosophical Points , vi.\n\n2.) \"Gold is nearly related to the divine substantiality or celestial corporeity.\n\nThis would be seen if we could dissolve the dead body of the gold and cause it to become a volatile, active spirit, but this is only possible by means of the power of God.\" 3 ( Signature , iii.\n\n39.) \"As far as precious stones are concerned, carbuncles, rubies, delphines, onyx, &c., they have their origin there where the flash of light arose within love.\n\nThis flash is born in meekness, and is the heart in the centre of the p.\n\n176 sourcive spirits.\n\nTherefore are such stones so mild, lovely, and at the same time so powerful.\" 1 ( Aurora , xviii.\n\n17.) As it is in regard to the mineral kingdom, so it is in regard to the vegetable and animal kingdoms.\n\nThere the power of death has also penetrated into everything; but there also are formations existing which show a relationship with the paradise.\n\n\"Before the fall the paradise was efflorescing through all trees and through all the fruits which God created for man.\n\nBut when the earth was cursed, the curse penetrated into all fruits, and now everything became good and bad.\n\nIn all things was death and rottenness, which formerly was only in the one tree, called the tree of knowledge of good and evil.\" ( Threefold Life , ix.\n\n15.) \"The fruits of the earth are not entirely in the wrath of God, for the incorporated word, being immortal and imperishable, was blossoming out again in the body of death, and produced fruits from the mortified body of the earth.\" ( Aurora , xxi.\n\n24.) \"Some animals, especially the tame ones, are closely related to the one element; others, especially the ferocious ones, have more relationship with the four elements.\" ( Three Principles , xviii.\n\n10.) \"There are poisonous animals and worms grown out of the wrathful quality, and formed after the centre of the dark world.\n\nThey love to dwell only in the dark, and hide themselves away from the sunlight.\n\nFurthermore, there are many creatures which the spiritus mundi has formed out of the realm of phantasy, such as monkeys and certain animals and birds, who like to play pranks and torment and disturb other creatures, so that one is the enemy of the other, and they are all fighting against each other.\n\nOn the other hand, there are also good and p.\n\n177 kind creatures, made after the type of the angelic world, such as the tame animals and birds: among them, however, there are also bad qualities to be found.\" ( Grace , v.\n\n20.) 1 In each external thing there is hidden an eternal and imperishable something, which issues again in an ethereal form out of the degraded body of the terrestrial substance.\n\n2 \"In each external thing there are two qualities, one originating from time and the other one from eternity.\n\nThe first or temporal quality is manifest, the other one hidden.\" ( Signature , iv.\n\n17.) \"In the beings of this world we find everywhere two beings in one—first, an eternal, divine and spiritual being, and then one that has a beginning, and is natural, temporal, and corruptible."

