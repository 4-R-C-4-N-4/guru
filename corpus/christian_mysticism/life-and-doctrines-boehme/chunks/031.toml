[content]
body = "84.) A man can never be God; not even Christ in His human aspect made ever any such claims.\n\np.\n\n91 \"Christ never said, 'I, in my human selfhood, am the voice of God, I am speaking as God, in or with God,' &c.; but He said, 'The words which I speak are the Father's, who lives in me '—that is to say, who lives in my human or natural self.\" ( Stief ., i.\n\n94.) To the blind reasoner God is an universal blind and unconscious power; the god existing within the imagination of the narrow-minded sectarian is equally narrow; but to the enlightened, God is a personal (individual) God and all-loving Father, residing within His own holy omnipotence, superior to all that can be conceived.\n\n\"Do not imagine God to be a blind power, existing and moving in, or beyond, or above heaven, having neither reason nor knowledge, comparable to the sun, who runs around in his orbit, sending out light and heat regardless whether it benefits or harms the earth and her creatures.\n\nNo!\n\nNot thus is the Father; but He is an omnipotent, all-wise, and all-knowing God, in Himself good, kind, and merciful, joyful, and even joy itself.\" ( Aurora , iii.\n\n11.) \"If you consider the depth of heaven, the stars, the elements, and the earth, you will, of course, not grasp with your eyes the pure and clear Godhead, although God is there and within it; but if you rise up in your thoughts and direct your mind to God, who in His holiness rules within the All, you are then penetrating through heaven and grasping the very sacred heart of God Himself.\" ( Aurora , xxiii.\n\n11.) God is not subject to the law of evolution, but the law has its foundation in Him.\n\nGod as a Spirit, eternally perfected within Himself, did not need to create for the purpose of perfecting Himself.\n\nThere is no being who can perfect itself by its own power, or give to itself anything which is not within its reach.\n\nThe growth of a plant and the unfoldment of the human soul requires the presence of a superior power.\n\nA God capable to grow p.\n\n92 would presuppose the presence of a superior God from which to draw power.\n\nOnly that which descends from above can rise again upwards, as is symbolised by the double interlaced triangle.\n\n\"Before the time of the creation of heaven, the stars, the elements, and also before the creation of the angels, there was nothing but Deity, reproducing itself for ever sweetly and lovely, and conceiving of its own image.\" ( Aurora , xxiii.\n\n15.) \"God did not create for the purpose of perfecting Himself, but to reveal Himself to Himself in great joy and magnificence.\n\nThis joy did not begin with the beginning of creation, but it has been from all eternity a subjective state in God.\" ( Signature , xvi.\n\n2.) God did not make the world out of something intellectually conceivable or out of something that was not Himself; neither does a man create the images which constitute his thoughts out of anything outside of his own mind.\n\nBefore creation took place it was resting (subjectively) like a seed in His own completion and perfection, comparable to the imagination of a marl whose mind rests in a peaceful slumber, while for all that the divine spirit in him is self-conscious.\n\n\"We cannot truly say that this world has been made out of something.\" ( Signature , xiv."

