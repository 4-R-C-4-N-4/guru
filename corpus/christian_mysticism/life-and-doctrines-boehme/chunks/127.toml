[content]
body = "All this He gave up entirely into the Father's hands as being the end of nature, the great mystery of the Father; but not so that it should be dead, but so that the Spirit of God should be therein all its life, and the divine regimen exist in the personality of Christ.\" ( Signature , xii.\n\n1.) Neither did the external being of the Redeemer become lost by His corporeal death, but it entered thereby into its true and exalted substantiality.\n\n1 \"When Christ died He did not throw away the body which had been in His possession while upon the earth, or left it to be consumed by the four elements, thus keeping (or taking up) a body entirely foreign (to the terrestrial form); but He merely laid aside the suffering (the external consciousness) of this world, and clothed Himself in immortality, so that His body might live in divine power, and not in the spirit of this world.\" ( Three Principles , xxv.\n\n53.) \"Christ assumed indeed earthly substance, but in His death—that is to say, as He overcame death—the divine being caused the earthly state to disappear and took away from it its supremacy.\n\nNot that Christ had laid aside something (which He did not), but so that the external being was conquered and, so to speak, consumed.\" ( Menschwerdung , i.\n\n8, 11.) \"The true essentiality in Christ did not take away the earthly consciousness, but entered into the latter as its lord and conqueror.\n\nThe true life was to be led first p.\n\n256 into death and the wrath of God.\n\nThis took place on the Cross, on which occasion death became destroyed and the wrath imprisoned and extinguished by love, and thus conquered.\" ( Menschwerdung , ix.\n\n16.) \"When Jesus broke up death in (His) humanity and took away the sense of self, He did then not throw away the human quality wherein dwelt death and the wrath of God, but He now accepted them to the fullest extent; that is to say, He only now took the external realm within the interior one.\" ( Signature , xi.\n\n41.) \"The external active and feeling life, wherein the wrath of God was burning, died, but not in such a way that it would have become a nothing, but it descended into nothing; that is to say, in this case, into the will of God, into His acting and feeling.\n\nThereby it became free of the will of the external world, which will is evil and good, and it lived no longer within the world and the constellations with the four elements, but after the nature of the Father and within the pure and divine element.\n\nThus the true human life came to occupy again the position which had been lost by Adam, and entered again into Paradise.\" ( Signature , xii.\n\n5.) The earthly being of the Redeemer was sanctified by His celestial blood, and thereby it was prepared for the resurrection.\n\n1 \"When Christ poured out His celestial blood, then the fiery desire kindled in humanity became transformed into a love-desire, and out of the anguish of death there was born a joy and strength of divine power.\" ( Signature , xi.\n\n5.) \"When the Son of God poured out His holy blood in Christ, then did the poison of the wrath in Adam's p.\n\n257 flesh, soul, and spirit, which He took upon Himself, become sanctified and transformed into love.\n\nThus the enmity ceased then and there, and God became Immanuel; that is to say, man with God and God with man.\n\nThen the flesh of Adam became tinctured and prepared for the resurrection.\" 1 ( Stiefel , ii.\n\n209.) By the power of the glorification at which the Redeemer arrived through His entering into death He overcame the power of hell, so that now the life again issued from death."

