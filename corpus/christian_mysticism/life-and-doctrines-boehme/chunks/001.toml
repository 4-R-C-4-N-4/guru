body = "Sacred Texts Esoteric Index Previous Next The Life and Doctrines of Jacob Boehme , by Franz Hartmann, [1891], at sacred-texts.com p.\n\n33 THE DOCTRINES OF JACOB BOEHME.\n\n\"Our whole doctrine is nothing else but an instruction to show how man may create a kingdom of light within himself.\n\n.\n\n.\n\n.\n\nHe in whom this spring of divine power flows, carries within himself the divine image and the celestial substantiality.\n\nIn him is Jesus born from the Virgin, and he will not die in eternity.\" ( Six Points , vii.\n\n33.) p.\n\n34 \"Not I, the I that I am, know these things; but God knows them in me.\" ( Apology , Tilken , ii.\n\n72.) p.\n\n35 CHAPTER I.\n\nINTRODUCTION.\n\n\"Science cannot abolish faith in the all-seeing God, without worshipping in His place the blind intellect.\" \"The true faith is that the spirit of the soul enters with its will and desire into that which it does neither see nor feel.\" ( Four Complexions , 85.) It is self-evident that if we wish to attempt a contemplation of that which is divine and eternal, we must first of all not refuse to believe in the possibility that something divine and eternal exists or may reveal itself in the constitution of man.\n\nThis spiritual principle in man is superior to the animal and reasoning man; superior to the material body, and superior to the arguing intellect; it does not need to reason and guess; it perceives and knows.\n\nBeing superior to the intellect, it cannot be conceived intellectually; but it can be perceived by man if he rises above the animal and intellectual plane to the consciousness of his own divine spirit; or to express it in the language of Boehme, if he attains self-knowledge in Christ.\n\nThe animal instincts in man belong to the animal nature in man, his intellectual faculties belong to his intellectual nature, but that which is divine in him belongs to his God, his own true and real and permanent self.\n\nMerely theoretical speculation in regard to the things that belong to the Spirit in man is therefore entirely inadequate for their true understanding, and is not divine wisdom; it can only lead to the formation of theories and opinions about it, which may or may not be true, but which do not constitute real knowledge, while true wisdom is the result of practical experience, p.\n\n36 attainable in no other way than by entering the divine state.\n\nIn other words, it is the knowledge by which God in \"man\" knows His own self.\n\nMost surely the attainment of this divine state is not the result of fancy's flights, of pious dreaming, or of allowing the imagination to run away with one's self.\n\nThere is nothing more positive, real, and practical than the consciousness of being a man, and to find one's centre of gravity in the dignity which arises from true manhood; or in other words, from the knowledge of being a living temple wherein resides the power of one's own immortal self.\n\nEvery state of knowledge has its uses in the sphere to which it belongs and not to any other.\n\nJacob Boehme says:— \"I do not say that man should not investigate natural sciences, and gain experience in regard to external things.\n\nSuch a study is certainly useful to him; but man's own reasoning should not be the basis of his knowledge.\n\nMan should not have his conduct guided merely by the light of external reasoning, but he should, with all his reasoning and with his whole being, bow in deep humility before God.\" ( Calmness , i.\n\n3 5.) As long as a man does not recognise the existence of a divine principle within his own self, it will be of little use for him to philosophise and speculate about the attributes of the Divinity in the universe; he cannot know the Holy Ghost as long as the Spirit of Holiness is not active within himself."

