body = "253 and shedding of blood.\n\nAdam's body died on the Cross, and Christ, born of Jesus and the sanctified seed of the woman, tinctured (blessed) him with His dear blood of love.\" ( Stiefel , ii.\n\n494.) \"The inner man Christ took our sins upon Him, and left the body, whereon He had laid the curse of God, hanging at the Cross as a curse of God.\n\nThus He died, and in His death He spilt His blood, the blood of the holy man, into the essence of the external man, wherein death resided.\n\nBut when this holy blood entered into death (with the external essence), then became death terrified at this holy life, and the wrath became terrified by the love, and went down into its own poison, as if killed or annihilated.\" ( Stiefel , ii.\n\n205.) By means of this spiritual death the Lord was to sacrifice entirely to His celestial Father not only the human self-will (this having been already accomplished at the temptation), but also His holy love-will.\n\n1 \"When the speaking Word of God in human quality arrested itself in the Redeemer, then the essentiality which had died in Adam, but became alive again in the Christ, called out together with the soul, 'My God!\n\nmy God!\n\nwhy hast Thou forsaken me?' This means that the wrath of God had entered through the quality of the soul into the image of the divine essentiality, and it had absorbed within itself the image of God, because it was this image that was to bruise within the fiery soul the head of the wrath of God, and to change its fiery p.\n\n254 power into the eternal sun-life.\n\nAs a candle dies in the burning, and as from this dying issues light and power, so out of the dying and death of Christ there was to arise the eternal divine sun in human quality.\n\nThus there was to die in this case not only the selfhood of human quality, i.e.\n\n, the self-will of the soul relatively to (its desire to) live in the power of the fire, and to be lost in the image of love, but this very image of love had to enter itself into the wrath of death, so that all would sink down in death, and by means of death and perfect humility, and in the will and mercy of God, become raised again in paradisiacal substantiality, so that the Spirit of God might be all in all.\" ( Signature , xi.\n\n87.) In consequence of this sacrifice of the whole of His will, the human soul-life of the Redeemer did not become annihilated, but it entered thereby entirely into the divine will.\n\n1 \"The humanity of Christ gave itself up as a sacrifice to the wrath of the Father, entering entirely into His fire-essence; but the love-spirit of God defeated the wrathful essence of the fire, so that it could not consume humanity (the human quality).\n\nIt merely took away from humanity its self-will, and brought it again into the first universal will, wherefrom the will was (originally) given to man.\n\nThus that same will came again into the will of the Father as into its first root (fountain or origin).\" ( Mysterium , xxxix.\n\n24.) \"The doctrine that Christ died a natural death in His human quality must not be understood as if meaning that His created soul had died, and still less that He had perished in His aspect as a divine being, or relatively to His celestial essentiality and celestial tincture.\n\nHe only died relatively to His selfhood, i.e.\n\n, relatively to the will p.\n\n255 and regimen of the external world which ruled in man.\n\nHe died relatively to the self-will and to the self-powers of the created self hood."

