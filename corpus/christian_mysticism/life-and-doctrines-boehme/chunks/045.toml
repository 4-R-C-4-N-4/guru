[content]
body = "1.) \"Lucifer having left the harmony of God, the holy name of God separated from him and remained in its own unity; but Lucifer remained in the qualities of the central fire which he had awakened within himself.\" ( Theosophical Questions , x.\n\n6.) p.\n\n117 \"The dark realm of phantasy and the creature which is constituted by the fallen angels is only one thing, one will, one being; and as this rebellious will did not want to reside and rule solely in the phantasy, but wanted to rule also in the holy power wherein it stood at first, the holy power repelled it out of itself and hid itself away before it—that is to say, the inner heaven shut it out of its own state, so that it could not see God.\n\nThus it died to the kingdom of goodwill.\" ( Grace , iv.\n\n46.) \"When Lucifer proved to be such a tyrant and corrupter of all that is good, the whole army of heaven turned against him, and he likewise turned against everything.\n\nThen the battle began, and the arch-prince Michael with his legions fought against him, and the devil with his legions conquered not; but was driven away from his position as one who has been conquered.\" 1 ( Aurora , xvi.\n\n9.) The separation of Lucifer from the world of light was a total separation, but not a local one in the ordinary sense of this word.\n\n\"The world of light knows nothing of the devils, and the devils know nothing about the world of light except that they once belonged to it.\" ( Theosophical Points , v.\n\n2.) \"Heaven is in hell, and hell is in heaven, and nevertheless there is neither of them revealed to the other.\n\nEven if the devil were travelling for many hundred thousands of miles, for the purpose of going to heaven, he would nevertheless always remain in hell.\n\nThus the angels do not see the darkness; they see only the light of divine power; but the devils see only the darkness of the wrath of God.\" ( Mysterium , viii.\n\n28).\n\np.\n\n118 Every being is in that state which constitutes its own consciousness.\n\nThe hellish being has not yet attained completion in its development.\n\nThe existence of the terrestrial world, in whose evil parts the evil spirits reside and work, is an obstacle to that.\n\nAs man loses his knowledge of God, he correspondingly loses his power for evil A man cannot become a complete devil until he attains Godlike knowledge and corresponding powers.\n\n\"As the devils, led by conceit and wantonness, ignited themselves, they have now been entirely cast out from the generation of light, and cannot conceive or comprehend it in all eternity.\n\nNevertheless the dwelling of Lucifer is not yet completed, because in all things in this world there are love and wrath still residing together, and wrestling and battling with each other.\n\nStill those things or beings realise not the wrestling of light, but merely the wrestle of wrath.\" 1 ( Aurora , xviii.\n\n32.) \"The hellish being is not yet fully manifest; the devils will have to wait for a still greater judgment.\n\nThe sun and the water keep their kingdom still hidden unto the day of reckoning, and therefore the devils have so much fear of the judgment day.\" ( Theosophical Questions , xiii.\n\n5.) \"There are always two kingdoms (states) to be distinguished in the elements.\n\nIn one of these rules the love that issued from God, and in the other His wrath.\n\nThe devils reside only in the realm of wrath, where they are enclosed within eternal night, and they cannot come in contact with the good powers of the elements.\" ( Theosophical Questions , xiii.\n\n7.) p."

