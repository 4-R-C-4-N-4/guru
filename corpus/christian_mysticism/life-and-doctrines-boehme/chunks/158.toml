[content]
body = "309 As a matter of course, no dead soul can be made alive by prayer, neither can mere lip-prayer or any empty ceremony aid the soul in freeing herself from the bonds of matter, but the living may aid the \"dead,\" and especially the dying, by means of true prayer; i.e.\n\n, by an exercise of the spiritual will (divine aspiration) in them.\n\nThus prayer may aid them to combat the powers of darkness, provided that the prayer of those persons is earnest and full of faith.\n\n\"We acknowledge that the community of Christ has great power in redeeming a soul, provided that they do their work earnestly, as it used to be done among the primitive Christians, when there were still saintly persons and saintly priests in existence.\n\nThey surely did succeed, but not those who assert that they carry the keys and could let souls out of purgatory according to their pleasure and according to the amount of money received for it.\n\nFor such persons, it would be better if they were never given any money, so that they would not cling to it with their desire.\" ( Forty Questions , xxiv.\n\n12.) \"The prayer of the living for the dead may be useful in so far as those who pray are truly Christians (in their hearts), and in a state of regeneration.\n\nIf the poor soul has not become entirely brutalised into a worm or au animal, but if she still enters into God with her desire, and is therefore still connected with Him by the thread of regeneration, and if the soul-spirit of those who pray, together with the poor soul herself, turns in fervent love, towards God, then will the former aid the latter to wrestle with the elements of darkness and to burst the chains of the devil.\n\nThis is especially possible at the time of the separation of the spirit from the body, and eminently so in the case of parents, children, or blood relatives; for among those who are related with each other by blood the tinctures enter easier into the necessary harmony (co-vibration), and then the spirit is more willing to enter p.\n\n310 into the battle, and there is then more facility of conquering than if only strangers are present.\n\nAll this is, however, useless unless these persons are themselves in the state of regeneration, for one devil cannot destroy another devil.\n\nIf the soul of the dying is entirely separated from that which links her to Christ, and if she reaches not by her own efforts for the thread, then will the prayers of the others avail nothing.\" ( Three Principles , xix.\n\n55.) 1 Footnotes 291:1 It will hardly be necessary to state that this is not to be taken in an external and superficial sense, as if the soul were waiting for the resurrection of that physical body which has then already been decomposed and passed into other organisms according to its constituting elements; but, like all other writings of occult nature, this has to be taken in an internal spiritual meaning, which we must seek to grasp with the spirit rather than with the sceptical brain.\n\nIt refers to the unfoldment of the third principle, which remains latent in the soul during that state.\n\n294:1 There are not animals enough in the world to represent all the combinations of evil characters which may be formed within the soul of man; neither could such monstrous shapes exist in the physical plane, on account of anatomical and physiological laws; but in the hellish world, where the human element becomes mixed with the animal essence, all kinds of monsters, half human, half animal, may be found.\n\nThe horrors of hell are, therefore, not mere inventions of poets and visionaries, but there is no reason why they should not actually exist."

