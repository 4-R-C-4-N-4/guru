[content]
body = "Let them, therefore, again go out with their will from their wilful ignorance or malignity and enter again into the will of God.\" ( Menschwerdung , 3, 5.) All this goes to show that it is useless and vain to seek for divine wisdom, meaning a true realisation of eternal truth in outward things, in external observations, in the reading of books, or in the sayings of the sages, if we do not recognise the truth that exists within our own self.\n\nAll dependence placed upon external things and persons or gods outside of our own true self, is p.\n\n41 merely idol-worship and deceptive if we do not recognise the God that exists within ourselves.\n\nThe words, \"Thou shalt worship no strange gods or idols, but have only one God,\" mean, Thou shalt have faith and confidence and trust in no other God than in the one whose temple you are, and who resides within your own self.\n\n\"God,\" according to Boehme, is \"the will of eternal wisdom.\" To become strong in God is to become strong in that will which renders one wise.\n\nThis is the true faith, of which Boehme says that \"it is not merely a certain method of thinking, or a belief in certain historical occurrences, but the receiving of the spirit and the power of Christ within one's self.\" ( Letters , xlvi.\n\n39.) \"This light and this power of Christ arises in His children within their interior foundation, and illumines the whole of their life.\n\nWithin that foundation is the kingdom of God in man.\" ( Communion , v.\n\n18.) But what is it that prevents man from recognising God within his own self?\n\nWhat hinders him from seeing the light of the truth, and hearing the voice of the Divinity?\n\nTo this Jacob Boehme answers, \"Thy own hearing, willing, and seeing prevents thee from seeing and hearing God.\n\nBy the exercise of your own will you separate yourself from the will of God, and by the exercise of your own seeing you see only within your own desires, while your desiring obstructs your sense of hearing by closing your ears with that which belongs to terrestrial and material things.\n\nIt overshadows you so that you cannot see that which is beyond your own human nature and supersensual.\n\nBut if you keep quiet, and desist from thinking and feeling with your own personal selfhood, then will the eternal hearing, seeing, and speaking become revealed to you, and God will see and hear and perceive through you.\"—( Supersensual Life , 1–5.) Here it may be asked by some, \"Is it then necessary p.\n\n42 for us, if we want to attain divine wisdom, that we should sit down, and think, and feel, and do nothing at all?\" Those who ask such a question do not realise that, as there is a region below all feeling and thought, in which man resembles an animal, if not a corpse, there is also another state, beyond all speculative thought, a state of divine being.\n\nNot a state in which man imagines himself to be divine, but a condition in which the will of man, having stripped off all that is earthly, becomes divine and absorbed in the self-consciousness of divinity.\n\n\"The only true way by which God may be perceived in His word, His essence, and His will, is that man arrives at the state of unity with himself, and that—not merely in his imagination, but in his will —he should leave everything that is his personal self, or that belongs to that self, money and goods, father and mother, brother and sister, wife and child, body and life, and that his own self should become as nothing to him.\n\nHe must surrender everything and become poorer than a bird in the air that owns a nest.\n\nMan must have no nest for his heart in this world."

