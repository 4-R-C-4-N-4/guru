[content]
body = "43.) \"Not through Adam's fire-tincture was this event to take place, but in and through Adam's light-tincture, wherein the love was burning that had become separated from him to constitute woman, the mother of all mankind.\n\nIt was she in whom the voice of God promised again to introduce the living, holy substance from heaven, and to generate anew and in divine power the faded image of God that was contained therein.\" 1 ( Grace , vii.\n\n18.) This, however, did not take place in her terrestrial body, but in her celestial essence, which on account of the sin had weakened.\n\n\"When God said, 'I will put enmity, and the seed of the woman shall bruise the head of the serpent,' then the holy voice went from Jehovah into the weakened celestial substance of the woman for the purpose of introducing therein a new living and celestial state, and to conquer the kindled wrath of God by means of the most exalted divine love, whereby the monstrosity and its desire should p.\n\n204 be entirely killed and exterminated.\" ( Mysterium , xxiii.\n\n29, 37.) \"The voice of God, speaking to Eve, entered into the seed of the woman; but the true woman was the eternal virgin, and this virgin became revealed by the power of the voice speaking into her in the name of Jesus, which (name) had evolved from Jehovah, and promised that in the fulness of time the holy, celestial love-essence would again be introduced into the weakened image.\" 1 ( Grace , vii.\n\n33.) From Eve, out of whom the Saviour as an incarnation was to issue in the fulness of time, the blissful power radiated and expanded over the whole of humanity.\n\n2 \"God spoke into the image of Adam, that had become weakened relatively to its divine life, His holy word, 'The seed of the woman shall bruise the head of the serpent.' By the action of this voice the destitute soul regained a divine life, and this very voice (inner consciousness) was perpetuated from man to man as the covenant of mercy.\" ( Grace , vii.\n\n16.) \"Christ was perpetuated in all men as a glowing spark of divine light, according to the quality of the true image, and as a potentiality (or seed of immortal being), but, as a matter of course, not in the external flesh of the terrestrial world, but within the second principle.\" ( Stiefel , ii.\n\n318.) \"The word that had been incorporated in the seed of Eve became perpetuated from man to man in his celestial part as a sound (conscience) or spark of the divine and p.\n\n205 holy fiery light, until the time when Mary was awakened, when the time for the fulfilment of the covenant had arrived and the doors of the closed chamber were opened.\" 1 ( Mysterium , xxiii.\n\n31.) This event could not take place earlier on account of the great depth of human corruption, but in the minds of those that were willing to submit to divine mercy this power resisted Satan, and even awakened prophets among them.\n\n2 \"Christ remained in Adam and Eve as a divine mystery, and did not take human substance in them.\n\nHe remained motionless until the time (for His manifestation) arrived; only then He moved within the seed of the woman.\" ( Stiefel , 448.) \"The seed of the woman received its anointment by means of the motion of the name of Jesus only in Mary, but not in Adam, Abel, Enoch, Noah, Isaac, Jacob, and David.\n\nThe ancient prophets did not know Christ in their seed, and that Ile had moved within their carnal seed, but only within their spirit and soul, within their p."

