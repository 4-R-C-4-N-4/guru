[content]
body = "90.) \"The living Word that dwelt within the eternal virgin attracted to itself the flesh of Mary—that is to say, the essences from the corporeal body of Mary—and thus there grew in nine months a complete human being with soul, spirit, and flesh.\" ( Threefold Life , vi.\n\n79.) \"The life of Christ did not begin to stir immediately at the time of conception, or in any supernatural manner, but this took place at the proper natural time, as is the case with all the children of Adam.\n\nThus in nine months he grew to be a complete human being, and was born like all other children of Adam.\n\nHe might have caused himself to be born magically, but if this had been done he would not have been in this world in a natural manner.\" ( Menschwerdung , i.\n\n10.) In Christ, as the son of Mary, there were united all the three principles, but without commingling with each p.\n\n236 other, so that, in spite of His terrestrial body, He remained nevertheless free from sin.\n\n\"Christ in Mary accepted all the three principles, but in divine order, and not intermingled, such as they became in Adam, who, by means of his imagination, introduced the external realm into the internal realm, into the soul-fire, in consequence of which the light became extinguished.\n\nHe (Christ) had on Himself the soul-essence, or the first principle, the substance of the image of the second principle, and finally the external form, i.e.\n\n, the third principle.\" ( Tilk .\n\ni.\n\n336.) \"Christ took from Mary the interior seed that had been weakened in Adam, and to this was attached the external seed of the flesh, but so that they did not mix with each other, neither were they separated; but they were relatively to each other like God, who dwells in the world, while the world nevertheless is not God.\" ( Stiefel , ii.\n\n204.) \"Christ did not by means of His external body produce sin and dishonour.\n\nNo, this cannot be; but He has taken upon Himself as a burden the sin which we have inherited from Adam, and which He was to carry as if He were Adam, while He still was not Adam.\" ( Stiefel , ii.\n\n499.) \"Christ did not take upon Himself the awakened and conceived vanity (selfishness) which the devil introduced into the flesh by means of his imagination, and which caused the flesh to sin; but He took the awakened forms of life (principles) which from a state of harmony had issued, each one in its own desire.\n\nTherein He took upon Himself our sin and disease, and death and hell; but only for the purpose of tincturing them by His love, by means of.\n\nHis celestial blood which He had poured into our external human nature, and this was to change hell into heaven, and to introduce the human qualities again into divine harmony.\" ( Regeneration , iii.\n\n11.) p.\n\n237 Still less has the innermost essence of the Lord, the eternal Word, ever mingled with His terrestrial body; it did not even mingle with His human soul.\n\n1 \"God has become revealed within the external seed (principle) of Mary, for Christ did not differ while upon the earth from other human beings in form, substance, or external appearance.\n\nIn that external seed He did not take up divinity; His external form was mortal, and He annihilated death therein.\" ( Stiefel , ii.\n\n203.) \"Christ truly attracted to Himself our human essences while in the body of the virgin Mary, and He has become our brother (thereby).\n\nBut the human essences cannot apprehend His eternal divinity; only the new man, born in God, conceives of it as the body apprehends of the soul.\" ( Three Principles , xxii."

