[content]
body = "281 \"The inner man continually kills the outer one by means of the love and sweetness of God, so that the external one cannot introduce into the soul-fire his earthly poisonous desire, which is infected by the devil; but the external man cannot be entirely destroyed, for if this were to take place the kingdom of this world would depart from him entirely.\" ( Stiefel , i.\n\n51.) \"Even if Christ is born in us, nevertheless we cannot say, in speaking of ourselves as a whole, 'I am Christ,' for the external man is not Christ.\n\nWe can only say honestly, 'I am in Christ, and Christ has become human in me.'\" ( Stiefel , i.\n\n54.) For the great majority of people the celestial inner man is either not perceived at all, or assumes a merely vague and nebulous appearance; but there are others who are aware of the divine qualities of the inner man, and who desire to enter into harmony with him, but they are often so constituted as to be powerfully attracted by the outer life, and they do not know how to overcome the external and sinful man of flesh.\n\n\"Sometimes a person is externally so badly constituted by the influence of the stars as to experience much trouble therefrom.\n\nWhenever he stops to consider, he then enters within himself and abstains from sin.\n\nNevertheless he does not know how to get rid of the outer malicious man.\" ( Three Principles , xx.\n\n83.) In external nature we see that the more the sunlight and rain favour a field the richer will be the vegetation growing thereon, not only in regard to wholesome plants, but also in regard to such as are noxious.\n\nThus the power of the spiritual sun, acting within the soul of man, will cause the germs therein, whether good or evil, to sprout and grow.\n\nFor this reason persons endowed with great spiritual power are sometimes inclined to evil practices, while there are others leading a blameless life merely p.\n\n282 because they have no power or virtue in them, neither for evil nor good.\n\n\"Many of the saints that were driven on by the Spirit of God went afterwards from that state of submission again into selfishness; namely, to their own reasoning and self-will.\" ( Calmness , i.\n\n34.) During our terrestrial life it is not possible for us to become entirely rid of the old sinful Adam, but we should continually try to live above his plane; that means to say, we should maintain our point of gravitation in God.\n\n\"Man's life during his present existence is like a turning wheel, which suddenly turns uppermost what was below.\n\nIt kindleth itself in every substance and defileth itself thereby; but it is purified in the water of meekness, wherein moves the heart of God, and out of that its fire-life may evolve celestial substance.\" ( Six Mysterious Points , ii.\n\n13.) \"Our whole life ought to be a continual repentance, because it is also a continual chain of sin.\n\nTruly the noble lily-branch, newly born in Christ, does not sin; nevertheless the terrestrial man sins in body and soul, and seeks to spoil the noble flower.\" 1 ( Stiefel , xi.\n\n537.) \"A true Christian hates the will of the flesh and rejects it.\n\nHe is continually his own accuser, and considers himself unworthy, and with his whole heart will he wish to enter into the mercy of God.\n\nHe will never boast and say, 'I am a Christian;' but he will strive to enter into the mercy of God and desire His grace, so that he may become a true Christian.\n\nHis whole life is a continual repentance, and he continually desires to grasp p.\n\n283 divine grace as that grace grasps him.\" ( Communion , iv."

