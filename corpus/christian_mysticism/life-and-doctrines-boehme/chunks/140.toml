body = "A sprout grows from the earth, and thus the substance of which it is formed flies from the earth and is attracted towards the sunlight until it becomes a plant or a tree.\n\nSo does the divine Sun draw the human lily, i.e.\n\n, the new man in his power, out of the substance of evil, until he finally becomes a tree in the kingdom of God.\n\nHe then lets the evil tree or the husk wherein the new tree grew drop into the earth, its mother, for which that husk was longing.\" ( Menschwerdung , xi.\n\n8.) Trees do not grow in the air, but require the dark soil and manure to take root and draw nutriment from the earth, and likewise the inner man requires the outer one for the purpose of gaining experience and self-knowledge.\n\n\"In the rough rock precious gold may be found growing, and the roughness of the rock aids it to grow, although the roughness is not like the gold.\n\nLikewise the terrestrial body must aid in generating Christ within itself, even though that body is not Christ, and never will be Christ in eternity.\" ( Grace , viii.\n\n94.) p.\n\n277 \"We are of an earthly nature, but we have also a celestial existence within the terrestrial one.\n\nDuring temporal life both are mixed with each other, but they do not act upon each other; each one is merely the dwelling of the other, as is the case with gold-bearing rock.\n\nThe rock is not the gold, but merely its vehicle.\n\nThe roughness of the rock is not that which produces gold, but this is done by the tincture of the sun acting therein.\" 1 ( Menschwerdung , i.\n\n14.) In this battle between the terrestrial and celestial nature we need not be aggressive, but merely on the defence.\n\nThis means that it is useless to resist evil or to combat it by remaining on the same level with it.\n\nWe render ourselves free from the conflict by rising above the place of contention, and this rising is accomplished by surrendering ourselves to the Supreme; or, to express it in other words, we conquer the flesh by sacrificing ourselves to the eternal spirit in Christ.\n\n\"Adamic man may live in Paradise according to the inner element which is unfolded within his mind, provided he does not permit himself to be affected by malice and surrenders himself fully to the heart of God.\n\nThen will the virgin within the inner element receive him and illumine his heart, so that he may master the Adamic body.\" ( Three Principles , xv.\n\n20.) p.\n\n278 \"We are always exposed to temptations, but we can be victorious in Christ who has conquered, for His soul is our soul and His flesh is our flesh, provided that we trust in Him and surrender ourselves to Him entirely, as Christ surrendered Himself to His Father.\" 1 ( Forty Questions , i.\n\n10.) Far easier is it to overcome the desire for evil than to destroy it after it has become embodied by being enacted.\n\n\"Desire is the introducing (of the will) into a thing, and from the desire results the formation of a corporeal being (in the astral plane).\n\nTherein is hidden the source of sin.\n\nIt is far easier to ward off the desire than to destroy the body (formed by the act).\n\nThe latter is far more difficult.\n\nTherefore it is advisable to turn away one's eyes from evil desire, so that the tincture (the life-principle) may not enter the essence and the mind be filled with that whereby the desire becomes substantial and which will require a (forcible) breaking up.\" ( Three Principles , xx.\n\n28.) \"It is far better to demolish the desire than to demolish afterwards the substance with great pains.\n\nIf the p."

