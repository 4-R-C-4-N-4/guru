[content]
body = "54 From this it appears that truly inspired writings are quite different from those produced by ordinary mediumship; because in the former instance the seer perceives the truths which he is to express, while in the latter case the medium is either an unconscious machine, or feels an inspiration without knowing the nature of the source from which that inspiration comes.\n\nIt is also not to be supposed that any person, as long as he inhabits a physical body, and is to a certain extent dependent on external conditions, should be at all times in that superior spiritual state necessary to realise fully the eternal glory of the kingdom of God; but that there must necessarily be a return of the lower state of consciousness.\n\nBoehme says— \"As the lightning-flash arises within the centre, and disappears again in a moment, so it is with the soul.\n\nWhen during her battle she penetrates through the clouds, she sees the Godhead like a flash of light; but the clouds of sin soon gather again around her and cover her sight.\" ( Aurora , xi.\n\n76.) \"The soul has her origin partly from nature and partly from God.\n\nThere is good and evil in nature; and man, by means of his sinful tendencies, has become subject to that which is fiery in nature, so that his soul becomes daily and hourly spotted with sin.\n\nTherefore the power of the soul to recognise eternal truth is not perfect.\" ( Aurora , Preface, 100) \"As long as God watches over me with His protecting hand, I understand that which I have written; but whenever He becomes hidden before me, I then no longer recognise my own work, and this proves to me the impossibility of penetrating into the mysteries of God unless by the aid of His Spirit.\" ( Letters , x.\n\n29.) If the carnal mind cannot understand the language of the Spirit, how then could that mind arrive at a true recognition of the truth by its own reasoning, that reasoning p.\n\n55 leading at best only to an opinion of what the truth cannot be, but not to a perception of what it is?\n\nThose who wish to understand such writings must enter into the spirit of the author.\n\nMere reasoning will not serve the purpose.\n\n\"These writings transcend the horizon of intellectual reasoning, and their interior meaning cannot be grasped by speculation and argumentation; but it requires the mind to be in a godlike state, and illumined by the Spirit of Truth.\" ( Letters , xviii.\n\n9.) 1 \"If any one desires to follow me in the science of the things whereof I write, let him follow rather the flights of my soul than those of my pen.\" ( Three Principles , xxiv.\n\n2.) This flight into the regions of eternal freedom is impossible for him who is bound by the chains that are forged by the illusion of \"self,\" and is therefore unattainable to those who seek for a knowledge of God with the object of gratifying their curiosity, or with any other selfish object in view.\n\n\"Above all, examine yourself for what purpose you desire to know the mysteries of God, and whether you are prepared to employ that which will be received for the glorification of God and to the benefit of your neighbour.\n\nAre you ready to die entirely to your own selfish and earthly will, and do you earnestly desire to become one with the Spirit?\n\nHe who has no such high purposes, and merely seeks for knowledge for the gratification of self, or that he may be looked upon as something great by the world, is not fit to receive such knowledge.\" ( Clavis , ii.\n\n3.) 1 \"If you once understand the true meaning of what I have written, you will then be released from the conflict of opinions and possess self-knowledge; but, as a matter of course, this is not to be accomplished by the mere reading of the letters, but by the living power of the Spirit of Christ.\" ( Apologia .) p."

