[content]
body = "The heart of God wanted to have him in Paradise and to reside in him, for it said, 'He is my image and likeness.' The kingdom of wrath wanted him, for it said, 'He is mine; for he has issued out of my fountain, out of the eternal mind of the darkness.\n\nI will be in him, and he shall live in my power; I will manifest through him strong and great power.' Finally, the kingdom of the world likewise said, 'He is mine, for he bears my image; he lives in me and I in p.\n\n153 him; he must be obedient to me, for I have all nay members (organs) in him and he has his members in me, and I am greater than he.\n\nHe shall be my steward, and manifest my power and wonders.'\" 1 ( Three Principles , xi.\n\n33.) Adam, making a perverted use of the freedom granted to him, allowed his lower qualities to be awakened to an evil desire—that is to say, to a desire for the terrestrial world, which is divided within itself.\n\n\"In primitive man before the fall, the qualities for differentiation and self-enjoyment were in equal will-power, and their desire was introduced into the unity of God.\n\nThis the devil begrudged to them, and he deluded the seven qualities of life by awakening within them a perverted desire, persuading them that it were good, and that they would become wise, if the qualities, each according to its own kind, would enter into their own accord, 2 and that in this way the spirit would taste and recognise that which was good and evil.\" ( Tabulæ Principiæ , 68.) \"The soul of Adam fell in love with the creation of the formed word in its differentiation, and not being conscious of the power of distinguishing, she entered into lust, into differentiation.\" ( Grace , vi.\n\n33.) \"The soul wanted to know how it would be if the temperature were to become separated—that is to say, divided, as heat and cold, moisture and dryness, hardness and softness, acridity and sweetness, bitterness and that which is sour; she wanted to taste these and the other p.\n\n154 qualities all in their separateness, although it had been prohibited to Adam by God.\" 1 ( Grace , iii.\n\n34.) Owing to this perverted desire, there grew in him the tree of temptation, wherein the terrestrial qualities, as such, became manifest.\n\n2 \"Adam's spirit was lusting after terrestrial fruit, such as was of the nature of the corrupted earth, and therefore nature formed for him a tree that was like the corrupted earth; for Adam was the heart in nature, and therefore his spiritual soul aided in the formation of that tree, of which he desired to eat.\" ( Aurora , xvii.\n\n20.) \"The tree of temptation grew by the power of the hunger after self-knowledge of good and evil.\n\nIt should not be said that it was any other kind of a product than the rest of such trees; only there was manifest in it the terrestrial desire for conscious evil and good; while the other trees and plants were penetrated by the holy, paradisiacal Mercury , so that in them the qualities were in equal accordance, and heat and cold were not separately manifested in them.\" ( Stiefel , ii.\n\n80.) \"In the tree of self-knowledge of good and evil there were the qualities in the curse, such as is the case at present—that is to say, each of them was manifest in itself, and seeking to preponderate.\n\nThey had gone out of their harmony, and thus all the three principles, each separately, were manifest in that tree.\n\nTherefore p.\n\n155 [paragraph continues] Moses (wisdom) calls it the tree of knowledge of good and evil.\" ( Mysterium , xvii."

