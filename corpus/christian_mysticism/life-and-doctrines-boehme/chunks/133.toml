body = "Sacred Texts Esoteric Index Previous Next The Life and Doctrines of Jacob Boehme , by Franz Hartmann, [1891], at sacred-texts.com p.\n\n263 CHAPTER XIII.\n\nREGENERATION.\n\n\"Art thou a master of Israel, and knowest not of those things?\" — John iii.\n\n10.\n\n\"Whoever will come after Me, let him deny himself, and take up his cross daily, and follow Me.\"— Luke ix.\n\n23.\n\nNo man can attain spiritual self-knowledge without being spiritual, because it is not intellectual man that knows the Spirit, but the divine Spirit that attains self-knowledge in man.\n\n\"Christ said, 'Unless you become like children, you will not see the kingdom of God.' And again He says (John iii.), 'Unless a person is born of the water and Spirit, he cannot enter into the kingdom of God; for that which is born from the flesh is flesh, and what is born from the Spirit is spirit.' It is clearly shown in the Bible that the carnal natural man does not conceive of the Spirit of God.\n\nThat Spirit is to him a foolishness, and he cannot comprehend it.\" \"It is self-evident, and requires no further proof, that we are all made up of flesh and blood, and that we are mortal.\n\nNevertheless, we are taught that we are temples of the Holy Spirit who dwells in us.\n\nWe are also taught that Christ must take a form in us, and that He will give us His flesh as our nutriment and His blood for us to drink.\n\nHe says that he who does not eat the flesh of the Son of Man will have no eternal life.\n\nTherefore we ought to seriously consider what kind of a man is within our own self similar to God and capable of becoming divine.\" ( Regeneration , i.) p.\n\n264 \"For that which is made of mortal flesh will again return to earth.\n\nIn it dwells the vanity of this world.\n\nIt is desirous for that which is not of God, and it cannot be said to be a temple of the Holy Spirit.\n\nMuch less can there take place a spiritual regeneration of this terrestrial flesh, because it dies and becomes dissolved, and is a dwelling for sins.\n\nBut the true Christian is born out of Christ, and that which is regenerated is a temple of the Holy Spirit dwelling in us.\" ( Regeneration , i.) For the purpose of understanding the process of the spiritual regeneration of man it is useless to cling to a merely historical belief in a Christ supposed to have died for the purpose of paying our debts to an angry God, but it is necessary to eat of the flesh and drink of the blood of the living Christ within ourselves; that is to say that we must allow our soul to become filled with the divine substantiality of the body of Christ, and experience the paradisiacal power of Christ therein.\n\n\"To produce a true Christian it is not sufficient to he satisfied with a merely historical or scientific belief in a Son of God who is said to have once lived upon the earth.\n\nIt is not that we are to be rewarded by some external God attributing righteousness to us on account of our confessing such a belief, but the recognition of divine truth must be born within us and received by us in a child-like manner.\n\nAs the flesh is bound to die, so the life and the will of our sinful nature must die, and we must become like a child that knows nothing, but clings (instinctively) to the mother who gave it birth.\n\nAnd thus the will of the Christian must die to its own self-willing and self-assertion, and become like a child in Christ."

