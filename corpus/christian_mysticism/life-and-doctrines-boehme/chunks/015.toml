[content]
body = "I am often forced to give terrestrial names to that which is celestial, so that the reader may form a conception, and by meditating about it penetrate within the inner foundation.\" ( Grace , iii.\n\n19.) God is self-existent, self-sufficient, infinite Will, having no origin.\n\nThat Will, by conceiving of its own self, thereby creates a mirror within its own self.\n\nThe same takes place in the microcosm of man.\n\nBy conceiving of his own self man creates a mirror in which he \" feels \" his own self, and thereby he becomes self-conscious and realises his existence as an individual being.\n\n\"Within the groundlessness (that which by some writers is called the 'Non-Being '—a term without any meaning) there is nothing but eternal tranquillity, an eternal rest without beginning and without an end.\n\nIt is true that even there God has a will, but this will can be no object for our investigation, as to attempt to investigate it would merely produce a confusion in our mind.\n\nWe conceive of this will as constituting the foundation of the Godhead.\n\nIt has no origin, but conceives itself within itself.\" ( Menschwerdung , xxi.\n\n1.) \"Divine Intelligence is a free will.\n\nIt never originated from or by the power of anything.\n\nIt is itself, and resides only and solely within itself, unaffected by anything, because there is nothing outside or previous to it.\" ( Mysterium , xxix.\n\n1.) \"Eternal Freedom has the will, and is itself the will.\n\nIn the will there is a desire to do or an impulse to wish something.\n\nThere is nothing besides that will towards which that impulse could be directed.\n\nThe will therefore sees within itself as within eternity; it sees what it is itself, and thereby creates within itself a mirror.\" ( Forty Questions , i.\n\n13.) By this eternal mirroring, or God seeing Himself p.\n\n61 within Himself, divine self-consciousness—that is to say, the self-knowledge of God, or in other words, divine wisdom, exists.\n\nThe eternal Will, in its aspect as the Father, eternally conceives of itself as the Son, and, so to say, re-expands as the Holy Spirit.\n\nThe same process on a minor scale takes place in the microcosm of man: for if he finds himself within himself by penetrating to the boundless abyss within himself, he then finds in the self-consciousness of his own manhood that power and strength by whose expansion his will and thought become powerful to act even at unmeasured distances.\n\nTherefore it is said, that the deeper we lower ourselves and enter within our own centre, diving down into the groundless foundation of our own soul, even so deep that the sense of our own personality is completely lost, the higher shall we be exalted into the realm of divine and universal being.\n\n\"God is the will of eternal wisdom, and the wisdom eternally generated from Him is His revelation.\n\nThis revelation takes place through a threefold spirit.\n\nFirst, by means of the eternal Will, as such, in its aspect as the Father; next, by means of the eternal Will in its aspect as divine love, the centre or the heart of the Father; and finally, by means of the Spirit, the power issuing from the will and the love.\" ( Mysterium , i.\n\n2, 4.) \"The Father Himself is the will of the groundlessness (the Absolute).\n\nThis will conceives within itself the desire to manifest itself to itself.\n\nThis love or desire is the power conceived by the will or Father within itself—that is to say, the Son, heart, or seat (the first foundation within the non-foundation or groundlessness), the first beginning within the will."

