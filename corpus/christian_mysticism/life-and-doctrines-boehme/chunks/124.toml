[content]
body = "There was then no earthly food or drink, and the soul of Christ knew very well that she was in God, and that she could make terrestrial bread out of stones, as there was no other bread there.\n\nBut she did not desire to eat with her celestial body terrestrial but celestial bread, and to leave the terrestrial body to its hunger, because the divinity in Christ said, 'Eat of the word of the Lord and you will issue from the earthly man and rest in the kingdom of heaven; live in the new man, and then the old one will be dead for the sake of the new.' However, the devil spoke to the soul: 'Thy earthly body is hungry, and as there is no bread, therefore make thou bread out of stones.' Then p.\n\n249 the strong soul in Christ stood there as a warrior and said, 'Man lives not alone of bread, but of each word that passes through the mouth of God.\n\nThus he rejected the terrestrial bread and life, and put his imagination into the word of God and ate of it.\n\nThen was the soul alive in the kingdom of heaven, but the body like one dead; that is to say, it became the servant of heaven and lost its powerful rule (over the soul).\" ( Three Principles , xxii.\n\n100–105.) Furthermore, the devil thought of turning the Redeemer away from the divine will by exciting the spirit of vanity.\n\n1 \"After the soul of Christ had received the heavenly bread, it was to be seen whether she would now arise in the power of the fire of vanity, or, full of humility, behold only the heart and the will of God, and surrendering herself to it, become an angel of meekness.\n\nHerein is seen the cunning of the devil, because he quotes the Scripture and says, 'The angels will carry him upon their hands.' This passage has been misapplied, because it did not refer to the physical body, but to the soul.\n\nThis he wanted to introduce into pride, so that it should rely upon being carried by the angels; but the Redeemer said, 'It is also written, Thou shalt not tempt the Lord thy God.' Thus he overcame the pride of the devil and entered into the humility and love of His celestial Father.\" ( Three Principles , xxii.\n\n108.) p.\n\n250 Finally, he offered to the Saviour the rule over the external world; but the Lord did not accept it from the hands of the devil, but from His celestial Father.\n\n1 \"After the devil had thus failed twice, he came forward with the last powerful temptation (saying) that he would give to Him the whole world if He would fall down and worship him.\n\nAdam already had been anxious to come into possession of this world, and he wanted to make it his own; but in doing so he departed from God, and became himself captured by the spirit of this world.\n\nNow the second Adam had to submit to this temptation of the first Adam.\n\nIt was to be tried whether the soul would remain within the new, holy, and celestial man, and live in the grace of God or in the spirit of this world.\n\nBut the soul of Christ said to the devil, 'Depart from me, Satan!\n\nfor it is written, Thou shalt worship the Lord thy God, and serve Him alone!' Thus the valiant warrior conquered, and the devil had to depart; and thus all that is earthly has been overcome by the Christ.\n\nNow the Lord is higher than the moon, 2 and takes all the power in heaven and hell, and is Master over death and life.\n\nHe now began His sacerdotal kingdom with signs and miracles.\n\nHe changed water into wine, made whole the sick, the blind seeing, and enabled the lame to walk, and even awakened the dead to life."

