[content]
body = "13.) Man can attain real similarity to God and perfect beatitude only by decisively willing to put his will into the Son, as the Heart or Light of the Father.\n\n\"God has the eternal and unchangeable will to generate His Heart and his Son, and thus the soul should put her immutable will into the heart of God.\n\nThen would she be in heaven and Paradise, and enjoy the inexpressible happiness of God the Father, which He enjoys in the Son, and she would hear the inexpressible words in the heart of God.\" 1 ( Three Principles , x.\n\n14.) \"Adam was conceived in the love of God and born into this world.\n\nHe was in possession of a divine substantiality, and his soul was of the will, the first principle, the quality of the Father.\n\nThis will should be directed, together with the imagination, into the heart of the Father, that is to say, into the Word and the Spirit of love and purity.\n\nThen would man's soul retain the substance p.\n\n149 of God in the Word of Life.\" ( Menschwerdung , i.\n\n10, 2.) \"The living soul, from the eternal will of the Father, was breathed into man, and this will has no other purpose than to give birth to His only Son.\n\n1 Of this will God the Father infused into man, and this is the eternal soul of man.\n\nThe soul ought to put her regenerated will into the eternal will of the Father, in the heart of God.\n\nThen will she receive the power of the heart of God and also His holy eternal light, wherein arises the Paradise and the celestial kingdom and eternal joy.\" ( Three Principles , xxvi.\n\n16.) \"If the soul sinks her will into the meekness, i.e.\n\n, the obedience of God, she becomes a fountain of the heart of God, and receives divine power, and all her essences become angelic and joyful.\n\nThen her harsh essences will also be useful to her, and appear to her more mild and useful, than if they had already originally been entirely sweet and mild.\" ( Three Principles , xiii.\n\n31.) It was within his power to decide, and he was free to do so, because there was in him not only the principle of light, but also the fire-principle,—not only perception, but will.\n\n\"The light and the power of the light is a desire, and wants to come in possession of the noble image made after God's likeness, because it has been created for the world of light.\n\nLikewise the dark world or the craving wrath desires the same, for man has all the worlds within himself, and there is a great battle taking place in man.\n\nThat principle with which he identifies himself with in his desire and his will, will rule in him.\" ( Tilk ., i.\n\n381.) \"As the soul is essential and her very substance is a p.\n\n150 desire, it is clear that she is in two kinds of Fiat .\n\nThe first is her own soul-property; the other belongs to the second principle, issuing from the will of God in the soul.\n\nThe soul desiring for God for the purpose of forming herself in His image and likeness, this desire of God acts as a Fiat in her own centre; for the desire of God wants to possess the soul.\n\nOn the other hand, she herself desires to possess the centre in the power of the fire, wherein the life of the soul originates.\" ( Eye , vii.) \"The will of the soul is free, and she can either sink into nothing within herself and conceive of herself as the nothing, when she will sprout like a branch out of the tree of divine life, and eat of the love of God; or she may in her own self-will rise up in the fire and desire to become a separate tree.\" 1 ( Forty Questions , ii."

