[content]
body = "49.) Thus the light conquers the darkness, but does not destroy it; it merely becomes victorious over it and consumes it in a manner comparable to that of the assimilation of food by the organism which conquers and consumes that food by means of the fire of life.\n\n\"When the spiritual fire and light has become ignited in the darkness (it having, however, burned from all eternity), the great mystery of divine power and knowledge becomes eternally revealed therein, because in the fire all the qualities of nature appear exalted into spirituality.\n\nNature herself remains what she is, but her issue—namely, that which she produces, becomes spiritualised.\n\nIn the fire the dark will is consumed, and thereby issues the pure fire-spirit, penetrated by the light-spirit.\" ( Clavis , ix.\n\n64.) When this great internal revelation 'takes place, the internal senses are then opened to the direct perception of spiritual truth.\n\nThere will then be no more necessity for drawing conclusions of any kind in regard to such unknown things, because the spirit perceives that which belongs to its sphere in the same sense as a seeing person sees external things.\n\n\"Behold how all life in the external world attracts its food to itself.\n\nThus you may recognise how life originates from death.\n\nThere can be no life unless that from which life is to issue is broken up in its form.\n\nEverything has to enter into the state of anguish to attain the lightning-flash, and without this there will be no ignition.\" ( Menschwerdung , ii.\n\n5.) This, then, is the beginning of the manifestation of God as the principle of fire and the principle of light.\n\nThe Godhead, as such, the will of the Trinity willing to p.\n\n82 enter from the groundlessness into Trinity, is not yet a principle, and has no beginning, but is the beginning itself of itself.\n\n\"If a thing becomes that which it has not been before, this does not constitute a principle; a principle is there where a form of life and motion begins, such as has not existed before.\n\nThus the fire is a principle, and also the light which is born from the fire, but which, nevertheless is not a quality of the fire, but has a life of its own.\" ( Six Theosophical Points , ii.\n\n1.) In the fire there is represented the division of the two aspects in which God is manifesting Himself—namely, as God and as Nature; also the division between the sweet life in love and the life in wrath.\n\n\"As the sun in the terrestrial plane transforms acerbity into concord, so acts the light of God in the forms of eternal nature; This light shines into them and out of them; it ignites them so that they obtain its will and surrender themselves to it entirely.\n\nThey then give up their own will and become as if they had no power at all of themselves, and are desirous only for the power of the light.\" ( Six Theosophical Points , v.\n\n3.) By the union of fire and light the third principle attains substantiality.\n\n\"If the Godhead according to the first and second principle is to be regarded only as a spirit and without any conceivable essentiality, there is in it nevertheless the desire to evolve a third principle, wherein rests the spirit of the two first principles, and wherein it will become manifest as an image.\" ( Six Theosophical Points , i.\n\n25.) \"The fire receiving within itself the essence of desire as its food, so that it may burn, renders a joyful spirit and opens the power of the mild essentiality in the light.\" ( Six Theosophical Points , i.\n\n57.) \"The fire, drawing within itself the mild essentiality p.\n\n83 of the light, there issues from it, by means of the wrath of death, the mild spirit that was enclosed therein, and which has within itself the quality of nature.\" ( Tilk ., i."

