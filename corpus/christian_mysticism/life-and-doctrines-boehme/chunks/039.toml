[content]
body = "105 \"From all eternity the light of God was lovely, sweet, and clear; but when God moved to create, the matrix (the foundation), with its fiery, dark, acrid and bitter qualities, became manifest; for the angels have been created out of that matrix into the light, and rendered corporeal by the moving Spirit.\" ( Aurora , v.\n\n24.) \"Each angel has the power of the seven primitive spirits within himself.\" ( Aurora , xii.\n\n8.) \"The body of the angels—that is to say, its apprehensibility, originates from the seventh spirit, and the generating powers in that body are the seven spirits.\" ( Aurora , xvi.\n\n15.) The body of the angels is the incorporated spirit of nature, and it encloses the seven other spirits.\n\nThey generate themselves in that body, as is also the case in the Godhead.\" ( Aurora , iii.\n\n30.) If the terrestrial world which we know is corporeal to us, having been thrown into objectivity by the power of the divine Will acting upon the images existing in the bosom of eternal Wisdom, there is no reason why the same Will should not have called into existence in the same way a superterrestrial, supersensual, and celestial world, whose subjects will be as real and corporeal to its inhabitants as the objects in our world are corporeal to us.\n\n\"There is a life superior to life in this world in eternity.\n\nThe spirit of this world (the terrestrial mind) cannot conceive of its nature.\n\nIt has within itself all the qualities of this terrestrial life, but not in such inflamed essences as the latter.\n\nTruly, it also has a fire, and a very powerful one, but it burns in a different way; it is sweet, mild, and without pain; it does not consume, but causes majesty and living splendour, and its spirit is pure love and joy.\" ( Threefold Life , viii.\n\n1.) \"In heaven, in the spiritual world, are the same qualities as there are in the terrestrial world; but they p.\n\n106 are there not manifested in such a furious (gross) form, but in a superior state, like darkness that is absorbed by light.\" ( Mysterium , x.\n\n7.) As the eyes of the blind are unable to see the objects of the external world, so those whose spiritual perceptions have not been opened will be unable to.\n\nperceive the objects existing within the inner world.\n\nThere are objective products in that celestial world which appear there as \"natural\" as ours appear on the terrestrial plane; but as the celestial world is far more refined, glorious, and beautiful than the terrestrial world, those products must also be superior to any that can be found upon this earth.\n\n\"The celestial powers, by their interaction, generate trees and bushes, whereon grows the beautiful and lovely fruit of life.\n\nLikewise, by means of these powers, there arise various flowers of beautiful celestial colours and exquisite odour, in a similar manner as in this perverted and dark terrestrial valley various kinds of trees, shrubs, flowers, and fruits grow, and as the earth produces beautiful stones, silver, and gold.\n\nAll these external forms are symbols of the celestial generation.\n\nNature labours very diligently with the degenerated and inert earth, for the purpose of producing celestial forms and kinds; but she produces only dead, dark, bitter, cold, and evil fruits.\n\nIn heaven there are no such dead, hard, wooden trees as in the terrestrial sphere, but spiritual growths.\n\nNevertheless we speak, not symbolically, but of real, actual plants, and this is to be taken in no other than in a literal sense.\" ( Aurora , iv.\n\n10.) The objects existing in the ideal, but nevertheless perfectly real world, are as far above those existing in the external world as tile ideal conceptions of a great genius are above what he can possibly execute by his hands.\n\np."

