[content]
body = "40.) \"The seven candlesticks in Saint John's Revelation refer to the seven spirits in the Godhead, also the seven stars.\n\nThe seven spirits are in the centre of the Father—that is to say, in the power of the Word.\n\nThe Word changes the wrathfulness into sweet joy and shapes it into a crystalline ocean; therein the seven spirits appear in a burning form, like seven luminous torches.\" ( Threefold Life , iii.\n\n46.) A variety of colours is necessary to make up a picture, to represent an idea, and although the idea represented by the various colours is only one, nevertheless each colour retains its essential qualities.\n\nThe various organs of the human body manifest various powers, nevertheless they all go to make up one manifestation of life.\n\nThe various planets have each one its own special qualities, nevertheless they go to make up one world.\n\nLikewise each of the seven forms remains what it is, but their manifestations differ widely according to the planes and conditions under which they are manifesting themselves.\n\nThe First Quality begins when God, for the purpose of revealing His majesty, allows His eternal nature to contract within herself, whereby a state of darkness and corporeity is created.\n\n\"The first quality is the desire.\n\nIt is comparable to magnetic attraction, and therefore the comprehensibility of the will.\n\nThe will conceives of itself as something.\n\nBy this act of impressing or contracting it overshadows itself and causes itself to become darkness.\" ( Clavis , viii.\n\n38.) \"In this state there is no active life or intelligence; it is merely the first principle of substantiality, or the first beginning of the becoming.\" ( Three Principles , vii.\n\n11.) p.\n\n76 \"In eternity beyond nature there can be no darkness, because there is nothing that could produce it.\n\nThe will by desiring contracts and becomes substantial.\n\nThus darkness is created within the will, while without that desire there would be nothing but eternal stillness without substantiality.\" ( Forty Questions .) \"Desire is an acrid, astringent, attracting (contracting) quality.\n\nIt is an active power, and without it there would be nothing but tranquillity.\n\nIt contracts and fills itself with itself; but that which it attracts constitutes nothing but darkness, a state which is more compact than the original will, the latter being thin as nothing, but it then becomes full and substantial.\" ( Threefold Life , ii.\n\n12.) The fact of this contractive power of desire, by which the will is rendered substantial, corporeal, and heavy, is experienced by every one who feels the weight of sorrow caused by some unfulfilled desire weighing upon his soul, while freedom from desire, and consequently from care, renders the heart (the will) light and ethereal.\n\nSimultaneously with the appearance of the first enters the Second Form , namely, motion.\n\nMatter and motion are co-eternal, and neither of them can exist without the other.\n\nThere could be no contraction without motion, neither would there be any expansion if there were no desire to contract.\n\nWith the beginning of action reaction begins.\n\nThere is then a duality of manifestation of the eternal One.\n\nFrom this duality of action, having its source in the One, results the manifestation of relative life.\n\n\"Motion divides the attracted desire and causes differentiation, thereby awakening the true life.\" ( Clavis , viii.\n\n30.) \"From this results sensitiveness in nature, and herein is the cause of differentiation.\n\nHardness (solidity) and the motion of life are opposed to each other.\n\nMotion p.\n\n77 breaks up the solidity (expands), and by means of attraction it also causes hardness (contracts).\" ( Tabulæ Princip ., i.\n\n34.) \"Desire, being a strong attraction, causes the ethereal freedom, which is comparable to a nothing, to contract and enter into a state of darkness."

