[content]
body = "\"The saints in their teachings and writings did not all use the same words, but what they taught and wrote was all out of one spirit.\" ( Three Principles , xxvi.\n\nI9).\n\n\"The Spirit of Christ in His children is not bound to a certain form, so that He could say nothing but what is found in the writings of the apostles; but as the Spirit was free in the apostles, and as they did not all use the same expressions, but were all teaching in one spirit and foundation, each one as he was influenced by the Spirit to speak, likewise the Spirit of Christ still speaks out of His children, and needs no previously prepared formula of the literal Word, but itself reminds the spirit of man of that which is contained within the letter.\" ( Mysterium , xxviii.\n\n52).\n\n\"You need not be surprised that reason is manifesting itself in many different forms, in one in a way different from that of the other, and that the children of God do not all speak the same language and words.\n\nEach one speaks out of the wisdom of the mother, whose number is without beginning and without end.\n\nTheir aim is the heart of God, wherein they all meet.\n\nThis, then, is the test by which you must know whether the spirit speaks out of God or out of the devil.\" ( Threefold Life , v.\n\n73.) 213:1 \" Esau ,\" gross, sensual nature.\n\n( Mysterium Magnum , iv.) 214:1 Evidently all these Bible allegories represent cosmic processes which have actually taken place in the history of the world.\n\nThey are, so to say, the genealogy of Humanity, in which at the fulness of the times the Divinity became manifest.\n\n214:2 The \"heathen,\" then, seem to be those prehistoric races that were cultivating magic arts.\n\n215:1 \"The mysteries of nature were not so deeply hidden to those (prehistorical) peoples as they are to us, because they were not so deeply hidden (immersed) in materiality and sin.\n\nTherefore they knew the relationship between the paradisiacal (ethereal) forms of nature and their corporeal visible embodiments.\n\nThey knew the qualities and the true nature, not only of animals, but likewise of plants and minerals.\n\nMan himself was the heart of all beings, and he created them.\n\nHe could therefore give to each its appropriate name, as if he were in these things himself, and (felt and) experienced their conditions himself.\" ( Three Principles , xxi.\n\n8.) 217:1 Thus it appears that a person's true Christianity does not depend on his or her being learned in regard to theology, nor in subscribing to a certain creed or belief, nor in going through certain ceremonies, but in their being penetrated by that principle of love and wisdom which constitutes the Christ.\n\n\"It is very deplorable to see the world revile and storm, blaspheme and denounce, whenever the gifts of God manifest themselves in mankind in different ways, and if they have not all the same quality of knowledge.\n\nWhat can a man take if it is not generated within him?\n\nThis (the quality of his understanding) is not a matter of his choice, but as his heaven (his mental constitution) is, so will God become revealed to him.\" ( Letters , i.\n\n14.) \"We ought not to persecute each other on account of the difference of the gifts given to us, but rather rejoice in love towards each other, seeing that the wisdom of God is so inexhaustible, and we should think thereby of the future, and what would become of us if all knowledge were to become manifest only from one and within one single soul.\" ( Grace , xiii."

