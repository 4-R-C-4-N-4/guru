[content]
body = "\"The created world was before the mysterium magnum, for all things were then in a spiritual condition in wisdom, as in a continual play or wrestle of love.\n\nThe one only Will conceived this spiritual form into the Word, and permitted the intelligence (the separate consciousness— i.e.\n\n, the acrid and astringent quality), to act without restraint, so that each power could enter or build itself a form according to its own specific quality.\" ( Grace , iv.\n\n12.) \"The eternal Mind is always desirous for the power, and the power is the astringency, and the astringency is the contraction, attraction, or the eternal fiat , which creates and renders corporeal that which the eternal Will desires in its own benevolence.\n\nThe Will desires by means of the keen fiat to bring into substantiality (render objective) that which it beholds in eternal Wisdom.\" ( Three Principles , xiv.\n\n74.) Thus the divine spirit in man, by means of the thoughts of the latter, brings the powers which exist in his microcosm into shapes which are objective to him, and which form the soul world wherein he resides.\n\np.\n\n99 Creation could, however, become actually complete only by means of the activity of all the seven divine spirits.\n\nIt is therefore true that in one sense it was not God, the primordial Cause, that directly created the world, but the elohims or \"powers\" that created it by means of the power received from the fundamental causation.\n\n\"The universe with all its beings has been created out of eternal nature, out of the seven spirits of eternal nature.\" ( Threefold Life , iii.\n\n40.) \"Whenever anything is born out of the divine Essence, it is brought into form, not merely by one spirit, but by all the seven.\" ( Aurora , x.\n\n4.) \"When the Godhead stirred for the purpose of creating a world, it softly moved within the acrid quality and contracted the latter within the divine sal-nitre .\" ( Aurora , xiii.\n\n94.) In the formation of beings, their own spirit co-operates with the universal Spirit.\n\nThe universal Life could not produce a tree out of the four elements if there were not a seed containing the qualities necessary to grow into a tree.\n\nNevertheless, by the expression \"their own spirit,\" it is not to be understood as if these spirits were anything essentially different from God.\n\nThey are merely individual centres, receiving their power from the universal Fountain of love.\n\n\"Originally the spirit is a magic gush or outburst of fire and desires for substantiality—that is to say, 'form.' This is then caused by that desire, and constitutes the corporeity of the spirit, and the spirit is then called a created being.\" ( Tilk .\n\ni.\n\n186.) Every human being has within himself the capacity to create, but not every one has that power developed.\n\nEverybody can imagine, but not every one is artist enough to bring the objects of his imagination into an external objective form by painting or sculpture.\n\nLikewise every p.\n\n100 one has good and evil powers within himself, but not every one has his spiritual strength sufficiently developed to create of them living and conscious forms.\n\n\"The centre of each thing is spirit, co-existing with the Word.\n\nThe separation (differentiation) of a thing (by which it distinguishes itself from other things) is in the quality of its will, by means of which it assumes a form or state of being according to its own essential (predominating) desire.\" ( Letters , xlvii.\n\n5.) \"Even to-day the act of creation still continues, and it will not end until the judgment of God arrives.\n\nThen will that which has grown in the holy tree of life become separated from the unholy thistles and thorns.\" ( Three Principles , xxiii."

