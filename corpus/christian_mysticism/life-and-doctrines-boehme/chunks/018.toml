body = "From desire and will originates action, and the hands do their work, so as to render it substantial., Thus it is with eternal evolution.\" ( Three Principles , ix.\n\n3 5.) \"At first the will is as thin as a nothing, and therefore it desires and longs to be something, and to become p.\n\n66 manifest to itself.\n\nThis nothingness causes the will to enter into a state of desire, and this desire is an imagination.\n\nThe will beholding itself in the mirror of wisdom causes its own image to appear within the groundlessness, and thus it creates a foundation in its own imagination.\" ( Menschwerdung , ii.\n\n1.) \"Wisdom, the eternal virgin, the playmate of God to His honour and joy, becomes full of desire to behold the wonders of God that are contained within herself.\n\nOwing to this desire, the divine essences within her become active and attract the holy power, and thus, she enters into a state of permanent being.\n\nBy this she does not conceive of anything within herself; her inclination is resting in the Holy Spirit.\n\nShe merely moves before God for the purpose of revealing the wonders of God.\" 1 ( Three Principles , xiv.\n\n87.) The possibility of such an \"external\" or corporeal revelation of God rests in the divine magic power, which exists within the divine life itself.\n\nIt is the power of the magic will to produce that which it desires.\n\n\"The magic power is the Spirit desirous for being.\n\nIt is essentially nothing but will, but it enters into existence.\n\nIt is the greatest mystery; it is above nature, and forces nature to assume forms according to the form of its will.\n\nIt introduces the foundation into the abyss of the groundlessness, and changes nothing into something.\n\nIt is the mother of eternity and of the essentiality of all beings.\n\nIn it are contained all the forms of the latter.\n\nIt is not the intellect, but it acts according to the will of the intellect.\n\nIt is not majesty, neither the power itself, but a desire entering into the dark nature (matter) and proceeding by means of that dark nature into the p.\n\n67 fire, and through the fire into light.\n\nThrough this magic power the wonders of the number Three become revealed by means of nature.\" ( Six Mystical Points , v.\n\n1–11.) \"The corporeity of God results from His essentiality.\n\nThis essentiality is not spirit, but it appears like impotency if compared with the power wherein the Three resides.\n\nThis essentiality is the element of God, wherein is life but no intelligence.\" ( Threefold Life , v.\n\n53.) A thesis presupposes the antithesis.\n\nIn the One there exists no relation.\n\nThere can be no consciousness manifest without something to be conscious of, and without that which is to be conscious.\n\nWithout nature there could be no freedom of nature; without the positive there could be no negative; without the dark basis of fire there could be no light.\n\n\"The One has nothing within itself which it could possibly desire, neither can such a unity feel its own self.\n\nThis is possible only in a state of duality.\" ( Theosophical Questions , iii.\n\n3.) \"If everything were only one, that one could not become manifest to itself.\n\nIf there were no anguish joy could not be known.\" ( Mysterium , iv.\n\n22.) \"God introduces His will into nature for the purpose of revealing His power in light and in majesty, to constitute a kingdom of joy.\n\nIf there were no nature originating within the eternal unity, there would be nothing else but eternal tranquillity.\n\nNature entering into a state of pain, the tranquillity becomes changed into motion, and the powers become audible as the word.\" ( Grace , ii."

