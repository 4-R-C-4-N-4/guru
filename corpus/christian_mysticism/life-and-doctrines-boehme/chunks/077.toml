body = "Thus the earth is filled with hunger after the stars and after the spiritus mundi , so that they have no peace.\" ( Clavis , 110.) \"The earth is turning around because she has both fires, the hot and the cold fire, and that which is below always desires to rise upwards towards the sun, because she receives spirit and power only from the sun.\n\nTherefore she is turning.\n\nThe fire, her desire for light, is turning her, for it wishes to be ignited, and to have a life of its own.\n\nHaving nevertheless to remain in death, still it desires after the life above and attracts the latter, and opens its centre for ever to receive the tincture and fire of the sun.\" 1 ( Threefold Life , xi.\n\n5.) The four elements are actually only qualities of the true one element, which is hidden behind the external four elements.\n\n\"That which we call at present four elements are in fact not elements, but merely qualities of the one true element.\" ( Three Principles , xiv.\n\n54.) \"The quintessence is a paradisiacal substance in the celestial world, but enclosed in the external world; that is to say, not imprisoned therein, but only rendered invisible.\" ( Clavis Specialis .) \"Fire, air, water, and earth have issued from the centre of nature, and consisted in the ignition of one substance.\n\nSince that ignition took place they appear in four forms, which are called 'elements;' but they are still interiorly, and in reality there exists, only one.\n\nThere are not four p.\n\n174 elements in heaven, but only one; but all four states are contained therein.\" ( Threefold Life , v.\n\n105.) From this superterrestrial basis have proceeded the external terrestrial elements.\n\nThere was first separated from it the fire, next the air, then the water, and finally the element of earth.\n\n1 \"The four forms which are hidden within the one true element have become active by means of the ignition or excitation of the lower principles, and they now appear in their external substance comprehensible to the creatures.\" ( Threefold Life , v.\n\n105.) \"From the fire originates the air, and from the air the water, and from the water earth; i.e.\n\n, a substance which is of an earthly nature, and thus the elements are merely an external manifestation of the inner eternal element and an ignited smoke of the latter.\" ( Mysterium , vii.\n\n19.) The elements having issued from their original unity, strongly desire each other, but at the same time there are dissensions and strifes among them.\n\n\"The four elements are only qualities of the one in-differentiated element.\n\nTherefore there is a great anxiety and desire among them.\n\nThey constitute interiorly only one sole principle, and therefore they instinctively long one after the other and each seeks for the inner principle within each other.\" ( Clavis , 106.) \"After from the one element, which has only one single will, the four elements had originated, which are now existing in one single body, there is among them much strife and dissension.\n\nHeat is against cold, and p.\n\n175 fire against water; the air is against earth, and each causes the death and breaking-up of the other.\" ( Signature , xv.\n\n4.) In many of the products of the earth—for instance, in many of the minerals—the true essence seems to be entirely hidden in death; but in others, especially in the noble metals and precious stones, it still manifests its brightness.\n\n1 \"It seems strange to the reasoning mind, if we observe the earth with its solid rocks and its rough and harsh appearance, that big rocks and stones have been created, whereof a part is useless, and which are only an obstacle for the creatures of this world.\" ( Mysterium , x."

