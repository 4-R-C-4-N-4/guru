[content]
body = "2.) \"Lucifer had within himself the fire and the light.\n\nHe p.\n\n113 was free.\n\nWhy then did he imagine (project his consciousness) into the fire?\n\nThe light and the power of God did not draw him into the fire, but the wrath of nature.\n\nWhy did his spirit consent?\" ( Menschwerdung , i.\n\n5.) \"The fiery lust, which was strong in Lucifer, incited him.\n\nLikewise the darkness (matter) wanted to become created (objective) in him.\" ( Mysterium Magnum , ix.\n\n9.) The very divine beauty, and the high power and authority with which Lucifer was invested, incited him to attempt to rise above God, instead of surrendering himself to Him in humility, 1 and thus he stimulated the activity of his sourcive spirits (latent principles) in an unnatural manner.\n\n\"When the kingly body of Lucifer became corporified (organised), and his spirits (principles or qualities) began to become qualified and generated (unfolded), the lightning flash of life arose in his heart, and the spirit went from the heart back again into all the veins of his (organising) body, inflaming all the seven spirits.\n\nThus he stood, a divine king, in transcendent clearness.\" ( Aurora , xiv.\n\n4.) His condition may be compared to that of a man who uses the powers which are given him for the purpose of enabling him to rise up to the kingdom of God to feed his own passions.\n\n\"When Lucifer saw that he was so very beautiful, and when he realised his high birth and great power, the spirit which he had generated in himself ( i.e.\n\n, his own free will) arose and became desirous to triumph over the divine birth, and to exalt itself above the heart of God.\" ( Aurora , xiv.\n\n13, 32.) \"When Lucifer was in such a kingly form, and placed in such high glory, he ought to have moved in God as God moved in him; but this he did not do, for after his p.\n\n114 sourcive spirits were endowed with such a glorious light, they were filled with so much joy that they revolted against the natural right (the law), and desired a still higher, prouder, and more magnificent qualification than God Himself.\n\nThen it happened that the acrid quality contracted her essence to such a state of hardness that the sweet water therein became exsiccated.\n\nSimultaneously (with that) the lightning flash was so glaring that it became intolerable to the rising spirits, because it went ihto the acrid quality in such a terrible manner, as if it wanted to burst them asunder with great joy.\" ( Aurora , xiii.\n\n116.) It must not be supposed that God created an especial pain for the purpose of punishing Lucifer for his sinful conceit; but Lucifer himself inaugurated a hell for himself by turning away from God and exciting the lower natural qualities.\n\n\"God did not create a hell or a special state of suffering wherein to torment the creatures that deserted Him; but as soon as the devils went out of the light and attempted to rule by the power of fire over the beatitude in the heart of God, in the same moment they were outside of God and in the four lower qualities of eternal nature.\n\nThereby they were kept imprisoned in the abyss of hell.\" ( Threefold Life , ii.\n\n5 3) 1 \"The devil is not affected with any pain coming from the outside, but (the cause of all suffering) is in himself.\n\nThis is the bell wherefrom he is created, and the light of God is his eternal dishonour, because he is the enemy of God, and no longer in the light of God.\" ( Three Principles , iv."

