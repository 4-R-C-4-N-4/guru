[content]
body = "But when this took place the love in the light of God broke through that heaven of division and ignited the heat.\" ( Aurora , xxv.\n\n68.) \"God, the eternal light and the eternal will, shines within the darkness, and the darkness has captured the will (received its activity).\n\nIn this will arises now the anxiety, and in this is the fire, and in the fire the light.\n\nThus from the fire the stars have been produced, and from the power of the heavens the sun.\" ( Three Principles , viii.\n\n22.) All this takes place in a corresponding manner during the spiritual regeneration of man.\n\nThereby divine Wisdom has manifested itself, not in an entirely pure, and therefore not permanent and immutable manner, but nevertheless as in a clear mirror, and it thereby drove the devil backward deep into his darkness.\n\n\"On the fourth day God, out of His eternal wisdom, created the lord of the third principle (the visible world), the sun and the stars.\n\nHerein is now truly seen the Godhead and the eternal wisdom of God, as in a clear mirror.\n\nThis being, visible before our eyes, is not God Himself, but a God in the third principle, which will ultimately return to his ether and take an end.\" ( Three Principles , viii.\n\n13.) \"God has made a solid foundation (firmament) called 'heaven,' between the most external and the most internal generation, between the clear Godhead and corrupted nature, through which one must break if one wants to go to God.\n\nOf this foundation it is said ( Hiob .\n\nxiv.\n\n15) that p.\n\n131 even the heavens are not pure before God, but on the day of judgment the wrath shall be swept therefrom.\" 1 ( Aurora , xx.\n\n41.) \"At the time of creation another light, the sun, was awakened in this world, it having been corrupted by Lucifer, and thereby the splendour of the devil was taken away.\n\nThus he has been shut in like a prisoner into the darkness between the realm of God and the realm of this world, so that he has no longer anything to rule over in this world, except in the Turba, wherein is awakened the wrath and anger of God.\" ( Menschwerdung , i.\n\n2.) The sun has been revealed by means of the soul of the world, and is made of the influences of all the stars.\n\nHe is also the life of all the stars.\n\nThus the sun of divine Wisdom in man is representing the collective knowledge which man has gathered from his experiences, having as a basis his own divine self-consciousness.\n\nWithout that self-consciousness in God all his intellectual acquisitions are merely vapoury, and will pass away.\n\n\"In the soul of the external world, and by means of it, God has awakened a king, or, as I would wish to call it symbolically, a natural deity, together with six councillors, to be his assistants, namely, the sun and the six other planets, which were spoken out of the seven qualities from the locus (seat or centre) of the sun.\n\nThe sun receives his splendour from the tincture of the fire-world and the world of light, and is manifested as a revealed point in relation to the world of fire.\" ( Mysterium , xiii.\n\n16.) \"In the death in the centre—that is to say, in the body or the corporeal substance of the earth, God has awakened the tincture , its lustre, splendour, and light, wherein is contained the life of the earth; but to the depth above p.\n\n132 the centre He has given the sun, which is a tincture of the fire, and which, with its power, reaches into the freedom outside and beyond nature, and from which nature receives its splendour.\n\nHe is the life of the whole circle of stars, and all these stars are His children."

