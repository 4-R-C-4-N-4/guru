body = "Thus one faith grasped the other; for the saints also were reacting upon that strong faith, especially those saints who while upon the earth had converted many to God.\n\nThus some wonderful works have been accomplished by invoking their memory.\" ( Three Principles , xviii.\n\n80.) \"One faith grasps the other.\n\nThe faith of the living caught that of the saints, and the faith performed the miracle.\n\nFaith can overthrow mountains.\n\nIt could destroy the world, if God were so to direct it.\" 1 ( Forty Questions , xxvi.) In the above we have considered two different classes of human spirits or souls; namely, those in whom the principle of darkness and evil has become manifest, and who ultimately become identified with that principle which is called \"the devil,\" and we have also investigated the fate that awaits those in whom the principle of light, or good, becomes manifest; but there is to be met a vast number of souls in whom the division of good and evil, within the fourth form of eternal nature has not yet taken place, and who are in that state which is called Kama loca in the East and Purgatory in the West, although the meaning commonly attached to these terms is not quite identical.\n\n\"The souls in which doubt and faith are mixed have p.\n\n306 their basis neither in heaven nor in hell, but they stand in the middle of the portal, where fire and light become separated from each other.\n\nThey are held by the Turba.\n\nMany a soul is held there for a considerable time; the wrath, however, cannot devour the little spark of faith which the soul possesses, and has ultimately to release her.\n\nWhat (suffering) this implies, I leave those to experience who remain wilfully in sin to the end, and then wish to be saved.\" ( Forty Questions , xxiv.\n\n5.) \"It is not possible to describe what kind of a purgatory such a soul will have to pass through before, by means of her little spark (of love), she can enter (into eternal life).\n\nThe world would not believe such a description; the world is too clever, and likewise too blind, to understand it.\n\nPeople cling for ever to the letter.\n\nI wish to God that no one would have to pass through that experience; I would then gladly keep still and say nothing about it.\" ( Forty Questions , xviii.) A soul from which the higher principles have entirely departed will, of course, suffer nothing, because she has no (spiritual) intelligence.\n\nSuch an entity is merely an astral corpse, which is no more affected by the destructive influence of the astral elements than the unconscious physical body by its own decomposition; but if there is still any spiritual intelligence left in that astral form, it will then have to pass through a painful and forcible separation.\n\n\"Many a soul will, after taking leave of this world, have to remain for a considerable time in purgatory, if she has stained herself with gross sins, and if she has never truly entered into regeneration, but merely tasted of it to a certain extent, as is sometimes the case with persons that are here loaded with temporal honours and power, in which case personal claims being substituted for justice, malice, but not wisdom, is the judge.\n\np.\n\n307 [paragraph continues] When the hour of death approaches and the conscience awakens, such a soul trembles in great fear of hell, and would like to be saved; but there is only very little of the saving power of faith within her, while before her is nothing but injustice and falsehood, earthly lust, and the tears and sighs of the down-trodden.\n\nHer desire turns to a certain extent towards God, but the sins she committed are in her way, and there arises in her a great doubt and unrest.\n\nMany a soul then clings to the saving power as it were by a thin thread."

