[content]
body = "The above assertion of Jacob Boehme is, therefore, not a mere figure of speech; but the animal soul of every human being resembles a menagerie composed of different animals, which may be seen by those that are sifted with the astral perception, and according to the quality of the will of man, whereon these animals live, some become sick and die, while others are born and grow.\n\nThe conditions of these animal elementals in the constitution of man are some of those causes of his bodily ills of which modern medical science is entirely ignorant.\n\n191:1 This is the way in which the \"personalities\" mentioned in the Book Genesis were \"begotten.\" 192:1 Since the \"woman\" has issued from man, his manner of reproduction has necessarily become an external and animal one, and will continue to be so until the true divine marriage has taken place, by which the Will of man becomes again one with the goddess of wisdom.\n\n192:2 Each sex seeks within the other that of which it is itself deficient, and therefore, seen from the spiritual point of view, all sexual \"love\" may be regarded as a manifestation of selfishness.\n\n193:1 \"Sin\" is that which constitutes a disobedience against the will of God, which is also the law of nature.\n\nHe who resists the law of nature without being able to rise above his own animal nature commits a crime against nature, and therefore against God.\n\nBut if we rise above our animal plane into the higher regions of feeling and thought, then shall we be no longer affected by the laws that govern that animal nature, and no resistance will be needed, as the desires of the flesh do not affect the spirit that is not identified with the flesh.\n\n193:2 Here Jacob Boehme evidently refers to the human soul, the Manas , and not to the Buddhi , or spiritual soul, which overshadows each new incarnation.\n\n193:3 The spiritual soul in man has its origin in God, and its individual qualities are gathered from the efflorescence of its experiences in previous p.\n\n194 incarnations; but the human and animal soul are the products of the mental and astral influences acting through the bodies of the parents; while the visible material form is made of the elements of the earth.\n\n194:1 The highest sensual pleasure which human beings can possibly enjoy is experienced by them during the connubial act; but as this act constitutes the exercise of the highest power which is still within man's dominion, namely, the power to create a being like unto himself, therefore this power should not be prostituted for baser motives, such as the gratification of sensual desire.\n\n195:1 In the male is represented especially the fiery essence (the will or obstinacy), in the female the essence of light (spirituality or gentleness).\n\nThe sexual distinctions, however, do not belong to the external body exclusively, but to the inner man, of whom the outer man is not always a correct image, because there are other factors besides the true soul entering in his formation.\n\nTherefore it sometimes happens that the sex of the external body does not seem to correspond to that of the inner man.\n\nWe meet with male persons apparently inhabited by a female soul with female tastes and tendencies, and vice versa; and in such persons there are sometimes manifest apparently inexplicable sexual perversities.\n\n195:2 It should always be remembered that man's constitution is not the p.\n\n196 result of the action of only one principle, but of three, manifesting themselves in the seven qualities of eternal nature, in seven different forms, and that, therefore, his external body is not the expression of only one principle, but of three.\n\nHis spirit is from the innermost fountain, his soul from the internal world, his body from external nature.\n\n196:1 The absence of words in modern languages for expressing internal facts in a comprehensible manner leads to a continual confusion of terms."

