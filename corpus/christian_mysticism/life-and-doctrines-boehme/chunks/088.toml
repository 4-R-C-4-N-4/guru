[content]
body = "However, he must not be considered as having been a woman in the usual sense of this word, but as a pure, chaste, virginal power.\n\nThat is to say, he had within himself the tincture or spirit of fire, and also that of water, and he loved himself and God.\n\nHe could generate in a virginal state, and procreate by means of his will and out of his own substance, without any pain or laceration.\" ( Threefold Life , ii.\n\n24.) \"If man had withstood the temptation one human being would have been born from another, in the same way as Adam in his virginal state was projected into objectivity as a human being and image of God, because that which is of the Eternal can also procreate (multiply) itself according to the law of eternity.\" ( Threefold Life , xviii.\n\n7.) These descendants of man would have issued one from the other, and one would have surpassed the other in his qualities and dignity before God.\n\n1 \"It is unnecessary to know whether, if man had remained in his original state, all (future) individuals would have been the products of one individual, or whether they would have been produced one from another; but in seeking within the depth, in the centre, I find that one would have come from the other.\n\nIn the course of time they would have differed in their qualities; some would have grown to be superior to others, as is the case at present where not all men are equals, but some have more genius and intelligence than others.\" ( Menschwerdung , 1.\n\n5, 4.) But now, after the generative powers, which were formerly p.\n\n192 united in man, appear in a state of separation in males and females, each sex seeks within the other the child that is to be generated, and strongly desires to unite with the other.\n\n1 \"In the beginning of creation all was born from one being, and a separation of sex took place later on.\n\nTherefore each sex strongly desires the other, as is seen in the process of procreation.\" ( Three Principles , viii.\n\n40.) \"There is now a strong sexual desire in all creatures.\n\nThe male spirit seeks for the beloved child in the female, and the female seeks for it in the male.\" ( Three Principles , viii.\n\n44.) \"The water-mother strongly desires for the fire-mother, and seeks for the child of love.\n\nLikewise the fire-mother seeks for it in the water-mother, and therefore both sexes have a strong desire to mingle with each other.\" ( Three Principles , viii.\n\n42.) This desire, wherein the two sexes are burning in regard to each other, is an abomination before God; but if it is governed by faithfulness and orderly conjugal love, it is patiently tolerated by the Lord.\n\n2 \"Conjugal sexual cohabitation is not sinful, because it is in accordance with man's human nature.\n\nIt is incited by the power of nature, and tolerated in divine patience by the spiritual soul.\" ( Stiefel , ii.\n\n409.) \"Lust, however, without being ennobled by faithful conjugal love, is merely an animal and sinful desire; and if you seek in marriage only the gratification of sexual lust, you are then not superior to an animal.\" ( Three Principles , xx.\n\n64.) p.\n\n193 \"Beware, O man, as to how you use the sexual animal desire!\n\nIt is an abomination before the Lord (the divine Being in man), whether it be within or outside of legalised wedlock; but true lawful love and faithfulness hides the desire before the sight of God.\" ( Three Principles , xx.\n\n65.) \"If a couple generate children, their imagination or desire (during the sexual act) is not holy, but the noble part of the soul is ashamed of it."

