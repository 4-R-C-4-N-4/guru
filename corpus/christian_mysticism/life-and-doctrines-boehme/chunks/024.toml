[content]
body = "The primitive will desires to be free of that darkness, for it desires the light.\n\nThe will cannot attain this light, and the more it desires for freedom the greater will be the attraction caused by the desire.\" ( Six Theosophical Points , i, 38.) \"There must be au opposition, for the will desires not to be dark, and this very desire causes the darkness: The will loves the excitement caused by the desire, but it does not love the contraction and darkening.\n\nThe will itself does not become dark, but only the desire existing in it.\n\nThe desire is in darkness, and therefore a great anguish results within the will, as its desire for freedom is strong, but by this desire it causes itself to become still more harsh and dark.\" ( Forty Questions .) Eliphas Levi expressed a corresponding truth by saying; \"The will accomplishes that which it does not desire.\" A selfish desire for heaven defeats its own object.\n\nThe Third Quality , called into existence by the action and reaction of the absolute One, calls sensation into existence; or, to express it in other words, absolute consciousness, by manifesting itself, becomes relative.\n\nNothing new is thereby created, only that which already was begins to exist.\n\nThis relative consciousness is called \" anguish \" by Boehme.\n\n\"The third quality, the anguish, is evolved in the following manner:—The hardness is fixed, the motion is fugitive; the one is centripetal, the other centrifugal; but as they are one, and cannot separate from each other (nor from their centre) they become like a turning wheel, in which one part strives upwards and the other one in p.\n\n78 a downward direction.\n\nThe hardness furnishes substantiality and weight, while the 'sting' (desire in motion) supplies spirit (will for freedom) and fugitive life.\n\nAll this causes a turning around and within and outwardly, having nevertheless no destination where to arrive.\n\nThat which the attraction of the desire causes to become fixed is again rendered volatile by the aspiring for freedom.\n\nThere then results the greatest disquietude, comparable to a furious madness, from which results a terrible anguish.\" ( Mysterium , iii.\n\n5.) The truth of this every one experiences within his own self, because as long as man is nailed to the cross of terrestrial life, there is a continual battle raging in him between his higher and lower impulses, or between his ideal aspirations and his material self-interests.\n\n\"The more the first principle gathers its hardness for the purpose of arresting the second principle, the stronger does the action of that principle grow, and the stronger is the raging and breaking.\n\nThe sting refuses to be subdued, but the will (from which it originates) holds on to it with great strength, and it cannot follow its impulse.\n\nIt strives upwards and the will strives downwards, for the acerbity indraws, rendering itself heavy.\n\nThus the one strives to rise upwards, and the other to sink downwards, while neither of them can accomplish its object, and thus eternal nature becomes like a revolving wheel.\" ( Menschwerdung , ii.\n\n4.) This macrocosmic battle leas its counterpart in the microcosm of man.\n\nThere is in him also the continual fight between matter and spirit, between desire and renunciation, between the desire for existence and the will for that freedom which cannot be found before even the desire for freedom itself is at rest.\n\nThese three first forms or qualities, wherein the activity of the Father, the Son, and the Holy Spirit are p.\n\n79 represented, or to express it in other words, through which the quality of will and intelligence becomes revealed, are sometimes alluded to under the names of \"salt,\" \"sulphur,\" and \"mercury.\" \"The first three principles are not God Himself, but only His revelation."

