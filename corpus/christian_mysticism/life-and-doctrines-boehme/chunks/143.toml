[content]
body = "27.) No Christian should contemplate his own holiness, or fancy himself to be better than others; but he should rather realise his own unworthiness, and regret the perverted state of himself and of humanity as a whole.\n\n\"No one should want to know his state of holiness while he lives in this world, but he should keep on drawing the sap of Christ from his own tree, and leave it to that tree to bring forth from him whatever branch or bough it may choose.\" ( Stiefel , cxi.\n\n345.) \"An earnest Christian does not wish to know his own sanctity; he sees only his imperfections, in which the devil battles against him.\n\nHis imperfections are always before him, but his sanctity he does not know while he lives in this world.\n\nThat sanctity is hidden by Christ at the foot of His Cross, so that the devil may not perceive it.\" ( Threefold Life , xv.) \"A real Christian loves truth and justice, and hates hypocrisy.\" ( Communion , iv.\n\n228.) 1 The new-born internal and spiritual life is benefited by trouble and suffering.\n\n\"To the pious, light arises out of darkness and day out of night.\n\nFor them fortune results from misfortune, and out of the curse and malice of this world there grows for them a paradise.\n\nPaul says, To those who love God, all things are for the best.'\" ( Mysterium , lxvi.) \"Whenever God leads His children into trouble and anguish, they are then every time to produce a new branch on the tree of faith.\n\nWhenever the Spirit of God appears it always presents a new out-growth, of which the noble image is exceedingly glad.\" ( Menschwerdung , cxi.\n\n8.) p.\n\n284 The conditions by which man is surrounded during his terrestrial life may not permit the effect of his spiritual unfoldment to become fully manifest during that time, but at the time of the death of the physical body, when the obstacles presented by the flesh disappear, then will the inner man enjoy his perfections.\n\n\"The celestial kingdom in the saints is active and conscious within their faith, whereby their will surrenders itself to God; but the natural life is surrounded by flesh and blood, and is related to the contrarium in the wrath of God.\n\nThus the soul is often in anguish when hell rushes upon her, and desires to manifest itself in her; but she sinks within the hope of divine grace, and stands like a beautiful rose among the thorns, until at the death of the body the kingdom of this world drops away from her.\n\nOnly then, when there is nothing more to hinder it, will she become truly manifest in the love of God.\" ( Supersensual Life , xxxix.) The object of our life should be to die continually in regard to our human selfhood, and to live only in the love of God, labouring in His service.\n\nThereby our activity will become blessed.\n\n1 \"I am not rejoicing because I am living within my own sense of self, but because in my selfhood I am in the death of Christ and am dying perpetually, and I wish to die entirely in regard to my selfhood, and to leave it entirely in God, so as to be nothing whatever except an instrument p.\n\n285 of God, and know nothing any more about my (separate) self.\" ( Stiefel , xi.\n\n527.) \"Wherever self dwelleth not, there love has her dwelling.\n\nIn the tranquillity at the bottom of the soul, where she dies as to her own selfhood, and where she does not will anything except what God wills (in her), there love resides.\n\nTo the extent in which the self-will is dead within itself, to the same extent is the place occupied by love."

