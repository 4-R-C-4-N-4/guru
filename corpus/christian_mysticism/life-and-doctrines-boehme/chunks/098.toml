[content]
body = "2.) \"The killing of Abel's external body by Cain symbolises that the external man must be mortified in the wrath of God.\n\nThe wrath must kill and consume the external image that has grown in the wrath, but from its death springs forth the eternal life.\" ( Mysterium , xxviii.\n\n14.) \"Abel, representing an antitype of Christ, who was to suffer death for humanity, had to pass through death without having produced fruits or branches; for the fruit which Christ was to generate was the tree of humanity, that was to be reborn in the spirit, but not new branches of the old one.\n\nThus Abel, as the anti-type of Christ, was to produce no new branch from his loins.\" ( Mysterium , xxix.\n\n22.) In the place of Abel, Adam was to produce a third son, namely, Seth, in whom was to be perpetuated the line of generation from which the Saviour was to be born in the flesh.\n\n1 p.\n\n209 \"Adam, by means of his Eve, was to produce still another branch from the tree of life, a son, who would be in his image similar to Adam and like himself, namely, Seth; (a race) wherein a ray of the love-will is perceived within the fiery will; being, however, still imprisoned by the essence of the external world, the corrupted house of (matter which afterwards became) flesh.\" ( Mysterium , xxix.\n\n24.) \"In Seth the line of the covenant was perpetuated, wherein Christ was to manifest Himself relatively to the tree of humanity.\" ( Mysterium , xxix.\n\n26.) To Cain also was shown the mercy of the Lord, who protected him against his hellish enemies, so that he might repent.\n\n1 Cain was afraid that the spirits (elementals) that had influenced him to commit murder would kill him.\n\nTo prevent this God decreed that whoever should take away Cain's life should be punished eternally through the seven qualities of the world of darkness.\" ( Mysterium , xxix.\n\n55, 58.) \"By the command, 'Upon him who kills Cain vengeance shall be sevenfold,' the terrible avenger, the abyss of hell, was driven away from Cain, so that he did not fall a victim to despair.\n\nCain had departed from God, but nevertheless the kingdom of heaven was before him, so as to enable him to turn and enter into repentance.\n\nGod did not want to reject Cain, but merely his wicked murder and his false belief.\" ( Three Principles , xx.\n\ni.) Cain and his descendants, however, preferred to give themselves up to mundane desires and occupations, while the generation of Seth entered into divine contemplation.\n\np.\n\n210 \"Cain was made of flesh and blood, and understood not these words about eternal death; but being assured that no one would kill him, he became again glad, and began to turn to terrestrial arts; not only to agricultural pursuits, but also to working the metals.\" ( Three Principles , xxi.\n\n5.) \"From the descendants of Cain resulted the arts as a wonder of divine wisdom acting in and through nature, but in Seth the Word entered into spiritual contemplation.\" ( Mysterium , xxx.\n\n2.) In the descendants of Noah—Sem, Ham, and Japhet—are represented the mental tendencies of the three principal races of mankind before the flood.\n\n1 \"After the first terrestrial world of human quality had been drowned in the flood, its form became reconstituted again in Noah and his three sons.\" ( Mysterium , xxiv.\n\n30.) \"Sem represents the world of light; Japhet the world of fire, wherein, however, the light is visible."

