body = "Sacred Texts Esoteric Index Previous Next The Life and Doctrines of Jacob Boehme , by Franz Hartmann, [1891], at sacred-texts.com p.\n\n101 CHAPTER V.\n\nTHE ANGELS.\n\n\"If you wish to hear the Holy Ghost speak out of the mouth of another you must first enter yourself with your will into the spirit of holiness.\"— Jacob Boehme .\n\nIT is perfectly useless to attempt to enter into theoretical speculations for the purpose of trying to find out whether or not the doctrines of Jacob Boehme in regard to that which transcends the reasoning power of man are true or not.\n\nLogic can never supply the place of perception; it can only teach us what a thing cannot be, but it does not enable us to see what it is.\n\nThe only way to convince ourselves whether there is a divine state of existence and celestial powers is, by the aid of God, to seek within ourselves for these powers which Jacob Boehme describes.\n\nIf we succeed we shall then know the Holy Trinity and the archangels; in the meantime a consideration of Boehme's doctrines may serve -to destroy the erroneous conceptions which hinder us from seeing the truth as it exists in ourselves.\n\nGod (the divine primordial Will) by becoming objective to Himself, and thereby constituting Himself a created being, assumed a threefold aspect, which gave rise to three different self-conscious divine powers, called \"archangels,\" representing the three types of the Holy Trinity.\n\nThe angels or powers are called Michael, Lucifer, and Uriel.\n\n1 p.\n\n102 \"God, constituting Himself a created being, assumed the aspect of such a being in regard to His trinity; and as this trinity is the greatest and highest in God, also He created three princes of angels (divine reflections of His own image) which are superior to all others.\" ( Aurora , xii.\n\n88.) \"Michael represents God the Father.\n\n1 This is not to be understood as if he were God the Father Himself; but there is among the created beings (the angels) one who represents God the Father.\n\nThe circle or space wherein he with his angels is created is his kingdom, and he is a beloved son of God, a joy for his Father.\n\nYou ought not to compare him with the heart or the light of God, which is in the totality of the Father, and which, like the Father Himself, has neither beginning nor end.\n\nThis prince is a created being, and has (as such) a beginning; but he is in God the Father, and bound to Him in love.\n\nTherefore he wears upon his head the crown of honour, power, and strength, and except God Himself in His trinity, there can be nothing found in heaven that is higher, or more beautiful or powerful, than he.\" ( Aurora , xii.\n\n86.) \"As Michael has been created after the type and beauty of God the Father, so was Lucifer created after the type and beauty of God the Son, bound to Him in love, and his heart was resting in the centre of light, as if he were God Himself.\" ( Aurora , xii.\n\n101.) \"The third king, Uriel, is formed after the type and character of the Holy Spirit.\n\nHe is a magnificent and beautiful prince of God, and also bound up in love with the other princes, as in one heart.\" ( Aurora , xii.\n\n111.) From the three result the seven, according to a law that is manifesting itself eternally on all planes of existence.\n\nThere are seven qualities or properties revealed in the life of God; there are seven natural qualities, p.\n\n103 and there are likewise seven high angels besides the former three, after which follow innumerable subdivisions of angels and spirits, occupying different ranks on the ladder of eternal progression."

