[content]
body = "These \"angels,\" \"thrones,\" and \"dominions\" we find also in the Hindu mythology, although under different names.\n\nIt ought to be kept in mind that \"myths\" are not \"fables.\" Myths are representations of actualities clothed in a fabulous form.\n\nTheir kernel is true, even if the shell in which it is clothed is an illusion.\n\n\"There are seven principal qualities in the divine Power, wherefrom the centre of God is born, and likewise there are some powerful princes of angels created, each one, according to his main quality, being a ruler in the army to which he belongs.\n\nEach of them, is next to his king or archangel, the chieftain of other subordinate angels.\" ( Aurora , xii.\n\n7.) \"God has also called into existence other princes of angels, corresponding to the seven spirits, such as Gabriel, Raphael, &c.\" ( Aurora , xii.\n\n88.) \"We have to consider especially seven high princely divisions in three hierarchies, according to the fountain of the seven qualities of nature, each of these forms ultimating in one throne.\" ( Grace , x.\n\n24.) Although these self-conscious powers or angels are differentiated, each class and each individual having its own special characteristics, nevertheless they originate all from one common root, and in so far as they have remained faithful to their Creator, they are united by the most powerful love and harmony, and mingle with each other like the individual tones constituting one grand accord in creation.\n\n\"The angels have among themselves only one love-will.\n\nNeither of them envies the other on account of his beauty, but they are in regard to each other like the spirits of God.\n\nThey love each other, and neither of p.\n\n104 them imagines himself to surpass another in beauty; but each rejoices in the beauty and loveliness of the rest.\" ( Aurora , xii.\n\n17).\n\n\"When the spirits of God arise in their divine glory, they cannot be bound in such a manner as would prevent them from intermingling with each other, and the angels are not limited by the locality in which they reside.\n\nThe spirits of God perpetually rise within each other, and in their eternal generation they enjoy a continual exchange of love.\n\nThus the holy angels move within each other and go with each other in all the three kingdoms, whereby each one receives from the other beauty of form, loveliness and virtue, and supreme happiness; but each one retains the position belonging to hire (his centre of gravitation) which in his aspect as a created being has: been assigned to him as his own special property.\" ( Aurora , xii.\n\n57.) All the angels have been created out of the fire and the light; each of them is therefore a complete being, having within himself all the seven qualities in various stages of unfoldment.\n\nIn the evolution of the seventh the corporeal body is formed, because the third quality reappears in the form of the seventh.\n\nThis reappearance of the third within the seventh constitutes the \"resurrection of the flesh.\" Not in a dead and putrefied corpse, but in the living soul, does that resurrection take place.\n\n\"When God created the angels, the principle of fire and light became manifest.\n\nTheir spirit or life-anguish (consciousness) has its origin in the fire.\n\nFrom thence it passed through the light, and became there the anguish of love, by which the wrath was extinguished.\" ( Menschwerdung , i.\n\n3–10.) \"The angels have all been created in the first principle, formed and corporified by the moving Spirit, and illumined by the light of God.\" ( Three Principles , iv.\n\n67.) p."

