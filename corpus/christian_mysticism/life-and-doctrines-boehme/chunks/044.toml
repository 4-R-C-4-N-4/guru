body = "36.) \"The foundation of hell was from eternity; however, it was not manifest, but hidden until it became awakened.\" ( Theosophical Questions , xv.\n\ni.) p.\n\n115 \"The four lower principles without the eternal light are the abyss, the wrath of God, and hell.\n\nTheir light is the terrible lightning-flash, wherein they must awaken themselves.\" ( Threefold Life , ii.\n\n50.) \"The acrid and stern desire moved in Lucifer, awakening the sting and the desire of anguish.\n\nThus the beautiful star overshadowed its own light and perished, and its legions acted as he did.\" ( Mysterium , ix.\n\n10.) Neither could Lucifer's legions have acted in any other way, because it was his will acting in them.\n\nThey are parts of himself.\n\nAll the forms of nature are warring furiously against each other in Lucifer, being in a state of implacable animosity towards each other.\n\nThey generate in him a proud and dark monster, instead of a son of God, united with Him in love.\n\n\"If the spirits arising (in Lucifer) would have interacted peacefully and according to the will of God, they would have generated a son within themselves who would have been like the Son of God and His beloved brother; but when they arose in a state of keen ignition, they generated a self-conceited, triumphant son, who, according to the first quality, was hard, harsh, cold, and dark; and according to the second, of a bitter, burning, fiery appearance.\n\nThe sound in him was a hard fire-sound, and in the place of love there was proud enmity.\n\nThus in the seventh form of nature there appeared a proud monster which fancied to be above God and that there was no equal to it.\n\nLove was grown cold; the heart of God could not touch this perverted being.\n\nWhenever that heart, full of benevolence and loveliness, moved to meet it, the heart of the monster appeared dark, cold, hard, and fiery.\" 1 ( Aurora , xiii.\n\n40–47.) p.\n\n116 \"The acrid quality was the first murderer, for seeing that he was generating a beautiful light, he contracted still harder than God had created him.\n\nThe second quality, as the second murderer, went with great strength into the acrid one, as if he wanted to rend its body to pieces.\n\nThe heat, being the third murderous spirit, killed its mother, the sweet water.\n\nThe sound arose so furiously that it sounded like a clap of thunder; it intended thereby to prove its own new divinity, and the fire arose like a terrible glare of lightning.\n\nThus the whole body became a dark valley, and there was no comfort nor help.\n\nLove turned into enmity, and the angel of light became a black and dark devil.\" ( Aurora , xiv.\n\n19–25.) As the saint becomes identified with God, so the wicked may become identified with the devil.\n\nEither of the two is an \"incarnation\" of that principle which has attained self-consciousness in him.\n\nLucifer having conceived a will entirely opposed to the divine, and intending to put his own products in the place of the formations of God, not only God, but also the pure angels, especially Michael with his legions, separated from him.\n\n\"Lucifer saw creation and knew its foundation.\n\nThereupon he also wanted to be a god, and to rule in all things by the power of fire.\n\nHe wanted to bring into form his own thoughts, and not that which the Creator desired.\n\nThus he became an enemy of God, and desired to destroy what was formed by the action of God for the purpose of putting in its place his own effects and figurations.\" ( Theosophical Questions , x."

