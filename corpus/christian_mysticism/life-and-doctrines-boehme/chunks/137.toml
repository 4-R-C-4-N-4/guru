[content]
body = "First, by the severe wrath of God, the abyss and dark world, which is the centre of the created life of the soul, whose innermost root is desire.\n\nThe second chain is the fiery longing of the devil for the soul, in consequence of which he tempts the soul and incessantly seeks to throw her from her rest in divine truth down into vanity— i.e.\n\n, into pride, avarice, envy, and anger; and these evil propensities he continually seeks to fan the fire in the soul, and thus the will of the soul is made to turn away from God and to enter p.\n\n271 into selfishness.\n\nBut the third and most dangerous chain, to which the whole of the soul is tied, is the corruptible, vain, earthly, and mortal flesh and blood, which is full of evil desires and inclinations, together with the star region (astral plane), wherein, like in a great ocean, the soul is floating, and which causes her to become daily infected and inflamed in sin.\" ( Three Principles , xxv.\n\n7.) There is a continual danger for the soul of sinking back into the acrid root of her existence, and at the same time she is continually exposed to the aggressions of the devil.\n\n\"If a person is in the anxiety of enmity, and the sting of death and anger is moving in him, so as to render him avaricious, envious, angry, and irritable, he ought then not to remain in that evil essence, but stop to consider and draw (from the eternal fountain) another will, namely, the will to go out of malice and enter into the freedom of God, wherein is perpetual rest and peace.\n\nIf then his anguish tastes the freedom, then will the torture of the anguish become terrified, and in this terror death will be broken up; for this terror is of great joy and consists in a kindling of the life of God.\n\nThereby the branchlet of pearls appears, and this now stands in trembling joy, but also in great danger; for death and the torture of anguish are its root; as also the anguish in external nature has the quality that out of evil, i.e.\n\n, out of the anguish, the great life is born.\n\nOut of a manure, for instance, a beautiful green branch grows, it having, of course, a constitution, odour, and state (life) different from that which produced it.\" ( Menschwerdung , xi.\n\n8.) \"The poor soul is so much blinded as not even to recognise the heavy chains wherewith she is bound.\n\nThe whole world is full of traps set by the devil for the purpose of capturing her.\n\nIf the outer man could have his eyes (spiritually) opened he would be terrified.\n\nWhatever a p.\n\n272 man sees or touches, therein is a devil's trap, and if the Word of the Lord, having become human, were not occupying the middle, the devil would capture and devour all souls.\" 1 ( Menschwerdung , xi.\n\n6.) \"As long as earthly man lives the soul will be in continual danger, for the devil is at enmity with her, and shoots his rays with a false imagination into the spirit of the stars and elements, and he therewith reaches out after the soul-fire, and desires to poison it with an earthly and devilish desire.\n\nThen must the noble image (in the inner consciousness in man) stand up in defence; much fighting for the crownlet of the angels is then required, and there often arises doubt and unbelief within the old Adam.\" ( Menschwerdung , xi.\n\n6.) \"Even after the precious jewel is sown it does not immediately become a tree.\n\nOften the devil blows over it, and wishes to exterminate the mustard-seed.\n\nMany storms has the soul to suffer."

