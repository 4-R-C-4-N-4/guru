[content]
body = "21.) \"If there were even a thousand persons well taught by God and regenerated in the Spirit of Christ assembled together, and if each of them had his own particular gift and self-knowledge in God, nevertheless they would all be one in the root of Christ, and each of them would be desirous only for the love of God in Christ; for which one of the disciples would exalt himself above his own Master?\n\nIf, then, we are one body in Christ, why should one member dispute with another about the food?\n\nIf the mouth that desires eats, all the members receive strength, and each member has its own office to unfold the wonders of God.\n\nWe do not all use one and the same expression, but we all have only one spirit in Christ.\n\nTo each one is given that which he ought to unfold in God, so that the great mysteries of God may become manifest, and the wonders that are in His wisdom from eternity be revealed.\" ( Threefold Life , xvi.\n\n24.) 218:1 Surely an internal and spiritual God could want no other sacrifices than internal and spiritual ones.\n\nThe animals in man, the snake of envy, the peacock of vanity, the ox of self-will, &c., had to be killed, so that God could manifest Himself in the purified soul.\n\nAny external sacrifice could at best be a symbol of the internal one.\n\n220:1 Such animal sacrifices are still taking place, whenever man kills his sensual desires and sacrifices them upon the altar of his soul.\n\nThen the animal symbols in his astral light are destroyed by the magic fire of his spiritual will.\n\n222:1 If the light of wisdom, the Son, enters the fiery will, the Father, then does the Son become one with the Father, and the wrath of the Father becomes reconciled and changed into that light which is love.\n\nNext: Chapter XI.\n\nIncarnation—The Celestial Virgin"

