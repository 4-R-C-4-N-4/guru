[content]
body = "' Not that a person should run away from his home, and desert his wife, child, or relatives, commit suicide, or throw away his property, so that he may not be therein corporeally; but he should kill and annihilate his self-will, the will that claims all these things as its possessions.\n\nHe should surrender all this to his Creator, and say with the full consent of his heart, Lord, all is Thine!\n\nI am unworthy to govern it, but as You have placed me therein, I shall do my duty by surrendering my will wholly and entirely to You.\n\nAct through me in what manlier You will, so that Thy will shall be done in all things, and that all that I am called upon to do may be done for the benefit of my brothers, to whom I am serving according to Thy command.\n\nHe who enters into such a state of supreme resignation enters into divine union with Christ, so that he sees God Himself.\n\nHe speaks with God and God speaks with him, and he thus p.\n\n43 knows what is the Word, the Essence, and the Will of God.\" ( Mysterium , xli.\n\n54–63.) \"Follow my advice, and leave off your difficult seeking for the knowledge of God by means of your selfish will and reasoning; throw away that imaginary reason, which your mortal self thinks to possess, and your will shall then be the will of God.\n\nIf He finds His will to be your will in His, then will His will become manifest in your will as in His own property.\n\nHe is All, and whatever you wish to know in the All is in Him.\n\nThere is nothing hidden before Him, and you will see in His own light.\" ( Forty Questions , i.\n\n36.) All of one's own seeking and investigating of divine mysteries in a spirit of selfishness is useless and vain.\n\nThe self-will cannot comprehend anything of God, because that will is not in God but external to Him.\n\nThe will in a state of divine tranquillity comprehends the divine, because it is an instrument of the Spirit, and it is the spirit wherein the will is tranquil that has the faculty of such a comprehension.\n\nThere are many things, undoubtedly, that may be investigated and learned and comprehended in a spirit of selfishness, but the conception thus formed by the mind is merely an external appearance, and there is no understanding of the essential foundation.\" ( Signature 15, 33.) To express the above in other words, we might say that the selfish will of man, being limited, cannot conceive the universal will of God; it must give up its selfishness and limitation, to become one in the Spirit of God and understand its own self.\n\nNeither can the self-will know even a part of God, because God is one and a Unity, and cannot be conceived in parts.\n\n\"The will should strive after or desire nothing but the mercy of God in the Christ; it should continually enter into the love of God, and not permit anything whatever to turn it away from that object.\n\nIf external reason p.\n\n44 triumphs and says, 'I have the true knowledge,' then should the will make that carnal reason bow down to the earth, and cause it to enter into the highest state of humility, and always repeat to it the words, 'You are foolish.\n\nYou have nothing whatever except the mercy of God.' Into that mercy you must seek to penetrate and to become entirely nothing within yourself, and step out of all of your own selfish knowing and desiring, regarding it as an entirely impotent thing.\n\nThen will the natural self-will enter into a state of helplessness, and the Holy Spirit of God will take a living form within yourself and ignite the soul with its flame of divine love.\n\nThus the high knowledge and the science of the Centre of all being will arise and appear."

