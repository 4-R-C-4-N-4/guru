[content]
body = "Thus the term \"soul\" refers here not to the divine soul that originates directly from God, nor to that part of man which becomes reincarnated (the Karana Sarira ), but to the \"inner man\" (the Manas and lower lsencippri).\n\nUnless this distinction of the various aspects of man is kept in mind, we are always exposed to mistaking the leaves of the tree of life for the branches, and the branches for the trunk, and the trunk for the roots.\n\n197:1 Each soul constitutes an individual, but for all that not an independent, part of the tree of life.\n\nThe trunk (Christ) remains, but the leaves (the personalities of men and women) drop off.\n\nThe branches (the individual human spirits) grow from year to year, and by the power of the sap which the branches receive through the trunk they produce new leaves (personalities) every spring.\n\nThus it is not the Christ, i.e.\n\n, the divine, man, who becomes reincarnated; neither do the same identical leaves reappear upon the same tree, but the spirit of man (his higher Manas ) through the power of Christ (the Atma-Buddhi ) produces new personalities in whom is expressed the power which the spirit receives from God.\n\n197:2 Each soul is receptive of good and evil influences, but especially to such as are predominant in her own nature.\n\nWhether or not a soul will inherit the desire or power to overcome the evil in her own constitution, or whether she will be more inclined to evil, will depend on the Karma acquired by her in previous incarnations.\n\nNext: Chapter X.\n\nThe Christ"

