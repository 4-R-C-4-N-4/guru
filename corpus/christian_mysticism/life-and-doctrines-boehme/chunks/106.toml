[content]
body = "201:2 There was no occasion for the voice of conscience to speak in \"Adam\" as long as he had not acted against the Law.\n\n202:1 From all eternity there was in man latent the power of becoming divine; but that power did not act as long as there was no cause to incite it to do so.\n\nThis cause was created by the second moving of the fundamental will (of God).\n\n202:2 \"Jesus\" means \"Wisdom.\" Divine wisdom is love.\n\n202:3 Woman, being on the whole more refined, more submissive and intuitional than man, is also more receptive for the germ of true spirituality.\n\n203:1 Whether a person is of the male or the female gender, it is always in his or her female elements (in the intuitive faculties, and not in the fiery will), that the divine and redeeming power of the love-light becomes first manifest.\n\n204:1 The \"seed of woman\" is the universal female principle, the celestial image which finds its reflection and representation in terrestrial woman, upon the earth.\n\nFor this reason woman is more beautiful than man.\n\nBeauty in a male results from the presence of the female principle of beauty in him, combined with his strength.\n\nStrength (rigidity) without mildness (harmony) cannot be beautiful.\n\n204:2 \"Eve \" means the celestial woman, the vehicle of the divine spirit, wherein the divine will moves, in a terrestrial aspect.\n\n205:1 Jesus of Nazareth represents the incarnation, personification, and fruition of the divine Logos in man.\n\nLikewise Mary represents the personification of the celestial virgin-mother, the universal celestial kingdom which furnishes the conditions necessary for the unfoldment of divinity in humanity.\n\n205:2 It is obvious that, as Universal Man became more and more differentiated in His external forms as individual powers or human beings, the original power contained in Him must also have remained in all His successors; but as there may be millions of seeds of a plant while only one of them finds the conditions necessary to grow into perfection, likewise the Atma was in all human beings, but not active in their material nature, while in Mary it is represented as having begun to stir and to become incorporated in visible form, manifesting itself outwardly and externally as an incarnation of divine power.\n\nIf we apply the rules laid down in the Secret Doctrine , the appearance of the Christ— i.e.\n\n, the incarnation of the divine Word, or the awakening of the Divinity in.\n\nHumanity—would have had to take place during the middle of the fourth race in the fourth \"round.\" 206:1 \" Adam \" is the trunk of the tree representing humanity.\n\nHe is the primordial man, or the collectivity of the first \"anthropoid beings\" (spirits;—not apes), which were of an ethereal kind.\n\n\" Abel \" and \" Cain \" are the two branches of that tree.\n\n\" Cain \" represents the external, sensual realm; \" Abel \" the supernatural— i.e.\n\n, transcendental kingdom.\n\n\" Enoch \" means the outbreathing of life and reconceiving of it within itself, such as constitutes contemplativeness.\n\n\" Noah ,\" the end in the beginning; the \" Word \" that enters from the end into the beginning.\n\n\" Isaac \" is the prototype of the kingdom of grace.\n\n\" Jacob ,\" the uprising and consolidation of the spiritual will coming from the fiery will.\n\n\" David ,\" the power of grace arising from the submission of one's personal will to one's divine will.\n\n(Compare Mysterium Magnum .) 206:2 The \" Christ ,\" the light, existed therein essentially, but not substantially.\n\nIt was a state of feeling, but not of understanding.\n\nIt may be compared to the heat in a body, which renders the body hot; but not luminous, until the ignition takes place."

