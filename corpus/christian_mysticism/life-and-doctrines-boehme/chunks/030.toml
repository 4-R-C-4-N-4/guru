body = "Sacred Texts Esoteric Index Previous Next The Life and Doctrines of Jacob Boehme , by Franz Hartmann, [1891], at sacred-texts.com p.\n\n89 CHAPTER IV.\n\nCREATION.\n\nEverything we see in nature is manifested truth; only we are not able to recognise it as such, unless the truth is manifest within ourselves.\n\nGod is the supreme, fundamental, universal, self-existent eternal cause; absolute and unimaginable glory, perfection, goodness, beauty, magnificence, and splendour.\n\nHe created everything out of His own self, as there was nothing but Himself to create from.\n\nIt is, therefore, logical to suppose that the first powers which He created and which were nearest to Him must have been divine and spiritual, all lower existences being more remote from His supreme state, belonging to a more \" material \" condition of creation.\n\nThe same may be observed in man.\n\nHis thoughts are nearer to his divine centre and self than his muscles and bones, and the realm of his soul is nearer to his spirit than his material body, and the more holy his thoughts the more will they be capable to communicate with the God in him.\n\nBoehme says:— \"God has created the holy angels, not by means of any substance foreign to His own self, but out of His own self, out of His power and eternal wisdom.\" ( Aurora , iv.\n\n26.) Truly, if there was or is nothing but God, it follows that God is the All, and that there is nothing which is not God.\n\nNevertheless, those creations of God which are in a certain sense remote from the divine centre are not divine, and therefore not God.\n\n\"It is said that God is everything, that He is in heaven and earth, and also the external world, and such an assertion is true in a certain sense; because everything p.\n\n90 originates in and from God.\n\nBut of what use is such a doctrine, which is not a religion?\n\nSuch a doctrine was accepted by the devil, who wanted to be manifest and powerful in everything.\" ( Tilk ., ii.\n\n140.) Such a system of Pantheism may satisfy the rationalistic reasoner, who has no power of spiritual perception, but true divine knowledge has nothing to do with such a Pantheism nor with rationalistic Theism.\n\nIt does not admit of a confounding of the terms \"God\" and the \"world.\" The universe is not identical with God, neither is the spirit of man identical with his body.\n\nNot even the Christ is identical with God, in so far as He has become human.\n\n\"The external world is not God, and will not be God in all eternity.\n\nThe world is merely a state of existence wherein God is manifesting Himself.\" ( Stief ., ii.\n\n316.) God is not man.\n\n\"There will always a distinction have to be made between the Godhead and humanity, between the human will and the will of God.\" ( Stief ., ii.\n\n95.) The moon has no light of her own; she merely reflects the light of the sun.\n\nNevertheless the light coming from the moon is not equal to sunlight.\n\nLikewise man's will and consciousness is derived from God; but for all that it is only human, and not divine.\n\n\"If a man says of himself, 'I, the living word of God in this my holy flesh and bone, say and do this or that,' he then dishonours the sacred name of God.\n\nThis is also against the doctrines of the Bible; for whenever the intellect of a man was selected for the purpose of prophecy, the prophet did not say, 'I, Mr.\n\nSo-and-So, say this or that,' but he said, 'Thus speaks the Lord!' This means that the Lord speaks in and through such a man, and the latter is His medium and instrument.\" ( Stief ., i."

