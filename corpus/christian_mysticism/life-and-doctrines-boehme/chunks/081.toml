[content]
body = "Little would it benefit the blind to know of the light merely from hearsay.\n\nLittle would it profit the \"Christian\" if he knew of a historical Christ, and could not perceive the glory and majesty of the Atma Buddhi within his own soul.\n\nBoehme says— \"The light and the power of Christ arises within His children in the interior foundation and illumines the whole course of their life.\n\nWithin this fountain of light is the kingdom of God in man.\n\nHe who is not in possession of it cannot bring it into himself by means of any creed, opinions, or theories; but if he possesses it, then from that fountain will arise many streams of pure love.\" ( Communion v.\n\n18.) 170:3 So with the mind of man, it being the \"constellation of stars, thoughts, and mental powers wherein he lives,\" he receives its light from the divine p.\n\n171 sun that shines in the centre of his own being.\n\nThere are thoughts of which we are conscious, and others which remain hidden until they are called forth by that power which rests in the spirit of man.\n\n171:1 This is also asserted in Sinnett's Esoteric Buddhism .\n\nIdeas have their regular revolutions in the mental world, comparable to the planets in the sky.\n\nThey arise and disappear from the mental horizon of the individual, and also from that of humanity as a whole, according to cosmic laws.\n\n172:1 To realise the nature of the relation existing between the macrocosm and the microcosm, it is necessary that man should learn to realise his own existence as a macrocosmic being.\n\nWithout such a practical realisation, a merely theoretical study of such mysteries is difficult, and of little use.\n\n172:2 All material forms are nothing but ultimate expressions of ideas, shaped into forms by thought and caused to grow and become objective by the power of will which is inherent in everything.\n\n172:3 There is only one universal life; but its action becomes differentiated and modified in each individual form by the qualities of the latter.\n\nIt then becomes therein, as it were, a distinct and separate life, differing not in essence but in quality from that of other forms.\n\nThis individual life constitutes the individuality of the form.\n\nThe external expression which results from the action of this individual life constitutes the personality.\n\n173:1 If the whole world is a manifestation of consciousness, there can be nothing absolutely unconscious in it.\n\nEach thing has its own state of consciousness, but is not necessarily therefore self-conscious or aware of its own qualities.\n\nIf it were so, the world would be a hell.\n\n174:1 The same order may be observed in the microcosm of man.\n\nFirst comes the desire, which is of a fiery nature; then the idea, which is still airy and indefinite, but which becomes concrete as a thought by the aid of the \"watery element,\" and ultimately there results the act or the material corporification.\n\n175:1 In the mineral kingdom precious stones may be compared to the eye in the animal realm, in so far as the same is said to be the mirror of the soul; i.e.\n\n, of the interior quality.\n\n175:2 All forms are expressions of originally spiritual powers, and the qualities of such powers are more manifest in precious stones than in any other material substance.\n\n175:3 For this reason it requires the possession of divine power to practise alchemy.\n\nIt is a divine and not merely a \"natural\" science.\n\n176:1 For the true signification and magic powers of precious stones see \" In the Promos of the Temple of Wisdom .\" 177:1 For description of the elementals inhabiting the astral plane see Paracelsus ."

