[content]
body = "255:1 However gratifying it may be for the curious seeker in history to know whether or when such an event has actually occurred in the history of the Jewish nation, such a historical belief would be of little benefit to him if he could not realise within his own inner consciousness that the death of his mortal nature cannot cause any loss to that which is immortal in him.\n\n256:1 The earthly body is those elements in the terrestrial man the ultimate expression of which is his visible form.\n\n\"There are two beings (natures) in man.\n\nThe spirit-life is directed inwardly, and the natural life acts in an outward direction.\" ( Text .\n\nv.\n\n1.) 257:1 The \"flesh of Adam\" is as invisible to us as the spiritual body of Christ.\n\nThat which we see with our external eyes is merely an appearance.\n\n257:2 Whenever the light of Christ in the soul of man penetrates within the interior foundation of his fiery will, then is that will changed into sweet love, and the soul enters into freedom from the bondage of self.\n\n258:1 If the purified soul of man enters into the divine fountain from which she originated, bringing with her the light which she has gathered unto herself during her terrestrial existence, then will this be like adding new fuel to the fire, and a new effulgence of light and glory will take place in the soul of the world.\n\n259:1 Likewise in each individual man will the terrestrial light disappear from his view when the Christ has arisen in him; for the Christ Himself is the Light, and surpasses the light of external nature.\n\nIf that divine light arises in man, then will the celestial spirits that have been dormant in his soul arise and move and rejoice.\n\n260:1 Neither will any one's physical body, wherein the inner man is imprisoned as in a tomb, offer any obstacles for the prisoner to escape, after the latter has been raised from the darkness of ignorance into the light of spiritual self-knowledge.\n\nThen will the inner sight of the soul be opened and the rock be rolled away.\n\nThen may the inner man go out and visit his disciples.\n\n261:1 Man, having become one with the Christ in Humanity, will necessarily partake of His powers in Divinity.\n\nThe will of the Father is then his own, and in the Son he rules as a Lord over the spiritual kingdom, and through the inner world over the external one.\n\n262:1 \"Why does the soul torment herself and strive in her own power and will, thus augmenting her torture?\n\nThe more anxious she is, the greater will be her pain, and she acquires no rest.\n\nA dying plant does not begin to sprout and obtain sap by its own power, and likewise the soul cannot by her own power attain the kingdom of God.\n\nShe ought to do nothing but abandon her own selfish will, then the evil qualities become weak, and her will returns to the one from which she came in the beginning.\n\nHere God will send His supreme love to meet her; that love which has been revealed in humanity, in Jesus Christ.\" ( Illumined Soul , 46.) Next: Chapter XIII.\n\nRegeneration"

