[content]
body = "\"Natural man knows nothing about the mystery of the kingdom of God, because he is outside and not within the state of divinity, as is daily proved by the action of the philosophisers who are disputing about the attributes and the will of God, and who nevertheless do not know God, because they do not listen to the word of God within their own souls.\" ( Letters , xxxv.\n\n5.) p.\n\n37 External man judges according to his external reasoning.\n\nMan, depending entirely on his external perceptions, and having neither belief nor confidence in anything except what he sees with his bodily eyes, knows only that which he sees with those eyes, and is not aware that there is anything superior to that.\n\n\"When external reason beholds the things of this world, and how misfortunes befall the pious as well as the godless, and that all things are doomed to death and destruction—if it moreover perceives that there seems to be none to save the virtuous from trouble and grief, but that he, like the wicked, sorrowfully enters the valley of death, then man's reason thinks that all things are due to hap-hazard, and that there is no God to take care of those that are suffering.\" ( Contemplation , i.\n\n1.) If there is no proof of the existence of a benevolent God to be found within the world of phenomena, there is likewise no divine self-knowledge to be obtained by the superficial reading of Holy Writ, nor by an external study of the Bible, or conceiving of its contents from a merely historical point of view.\n\nNeither will listening to sermons be productive of self-knowledge, if he who preaches or he who listens has not the living Spirit of Truth within himself.\n\n\"All those who desire to speak of or teach divine mysteries ought to be in possession of the Spirit of God.\n\nMan should recognise within himself the divine light of the truth, and in that light the things which he desires to represent as being true.\n\nHe should never be without such a divine self-knowledge, and not make the force of his arguments to depend merely on external reasonings or literal interpretations of the Bible.\" ( Menschwerdung , i.\n\n1, 3.) \"What would it benefit me if I were continually quoting the Bible, and knew the whole book by heart, but did not know the Spirit that inspired the holy men p.\n\n38 who wrote that book, nor the source from which they received their knowledge?\n\nHow can I expect to understand them in truth, if I have not the same spirit as they?\n\n\"( Tilk .\n\nii.\n\n55.) Spiritual truths are above and beyond intellectual reasoning, and can, therefore, not be intellectually explained.\n\nThey can at best be represented by allegories and pictures such as may induce men to give way to exalted thoughts, and thus to acquire a higher state of perception.\n\n\"The children of God spake as they were made to speak by the Holy Spirit.\n\nTherefore their words remain a mystery to the men of earth; and even if the latter imagine that they understand them, nevertheless they see only the external meaning.\" ( Letters , xi.\n\n40.) \"In all things received by mere hearsay, without self-perception, there still remains a doubt as to whether that which one has heard is actually true; but that which is seen by the eye and understood by the heart carries conviction with it.\" ( Three Principles , x.\n\n26.) It should never be forgotten that speculative philosophy and theosophy are two entirely different, if not opposite things, and those who clamour for intellectual explanations of spiritual truths that are beyond intellectual reasoning have an entirely wrong conception of the meaning of the term \"Theosophy.\" \"The true understanding must come from the interior fountain and enter the mind from the living Word of God within the soul.\n\nUnless this takes place, all teaching about divine things is useless and worthless.\" ( Letters , xxxv."

