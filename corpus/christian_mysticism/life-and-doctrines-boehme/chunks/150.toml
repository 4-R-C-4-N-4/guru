[content]
body = "25.) If during terrestrial life the will of the soul has become anti-Christian—that means to say, perverted into an evil spirituality—then will the evil nature of the soul likewise be perverted and anti-Christian, and this perverted essence will manifest itself in the other life as a shape and a power for evil.\n\n\"In so far as a person remains in a will foreign to his true nature, and does not want to be cured of it by entering into the holy Word, this foreign being will take substance in him and hold the celestial essence in subjection; so that the latter remains, as it were, imprisoned after death and cannot reach the kingdom of God, and from this results eternal death.\" ( Mysterium , xxiv.\n\n13.) \"Each one needs only to examine his own quality and see in what direction he is carried by his will.\n\nHe will then know to what kingdom he belongs, and whether he is actually a man (in the image of God), as he fancies himself or pretends to be, or a creature of the dark world, an avaricious dog, a vain peacock, a lewd monkey, or a poisonous snake.\n\nIf, then, the essence of the four elements departs from him at death, there will remain in him nothing but the internal poisonous and evil consciousness.\" ( Six Theosophical Points , vii.\n\n37.) On account of the want of plasticity of the matter composing the physical body, the animal characteristics predominant in such a person become never fully expressed in his external appearance during his terrestrial life; but the soul is more plastic, and being likewise a product and expression of her internal character, she will after the death of the body assume the form of that animal or monster whose character is dominant in her.\n\np.\n\n294 \"If the spirit remains unregenerated within its original principle, then will there appear at the rupture of the form such a creature as corresponds to the quality of the will (character) acquired during terrestrial life.\n\nIf, for instance, during life you have the envious disposition of a dog, begrudging everything to everybody, then will this dog-character find its expression in a corresponding shape after the death of the body; for according to it the (animal) soul takes (assumes) her shape, and this kind of will remains with you in eternity, for the doors of the depths that lead to the light of God are then closed before you.\" 1 ( Three Principles , xvi.\n\n50.) If the soul is devoid of the divine light, then will the four lower qualities of eternal nature become active in her and torment her in various ways.\n\n\"If you have not during your terrestrial life enlightened your soul, and the eternal spirit that has been given to you by supreme good, in the light of God, so that the spirit has become reborn in that light, in divine substantiality, then will the soul in the Mysterium return to the centre of nature, and enter into the quality of the anguish of the four lower forms of eternal nature.\n\nThere she will then be in the company of all the devils, and be forced to devour that which she has stirred up.\" ( Menschwerdung , xi.\n\n6.) \"If the soul-fire has not become substantiated in the p.\n\n295 [paragraph continues] Spirit of God, nor sought for that substance in its desire, it is then a dark fire, burning in great anguish and terror, because there are in its constitution then only the four lower qualities of nature.\n\nIf the will has nothing of the divine power of true humility, there can then be no entering of it within itself into the life by means of death; but the soul is then like a furiously turning wheel, seeking continually to rise and continually sinking down on the other side.\n\nThere is in that state surely a kind of fire, but not a combustion, for there rules the severe harshness and bitterness."

