body = "206 desire for faith (spiritual knowledge).\" 1 ( Stiefel , ii, 453.) \"The (astral) soul of Adam and Eve and of all human beings was still too rough, unmanageable, and impregnated by the first principle.\n\nTherefore the Word and the bruiser of the head of the serpent did not enter into form within their souls; but it stood within the mind to oppose the devils and the kingdom of hell with those that were willing to surrender themselves to it.\" ( Three Principles , xviii.\n\n26.) \"The saints of God being prophets, and prophesying in the spirit of Jesus, all spoke aiming at the covenant, i.e.\n\n, out of the promised Word , which was again to move within the flesh; that is to say, that the Word was contained within the weakened interior image, and unfolded itself, and indicated to the external man what was to happen to him in the future, when it would manifest itself, and destroy therein death and the loathsomeness resulting from the battle taking place within the forms of life.\" 2 ( Stiefel , 385.) As our progenitors (in their terrestrial aspect) were p.\n\n207 governed by external reasoning, Eve believed that in giving birth to Cain the bruiser of the head of the serpent had already come into the world.\n\n1 \"Hear and see what was Adam and Eve's desire before and after the fall.\n\nThey desired the terrestrial kingdom, and Eve's mind was directed to terrestrial things.\n\nWhen she gave birth to Cain she said, 'I have the Man, the Lord.' She thought that he was the one whose heel was to bruise the head of the serpent, and that he was to drive the devil away.\n\nShe did not think that it was for her to die to her own false, earthly, and fleshly will, and to be reborn in a divine will.\n\nSuch a (selfish) will she carried within her seed, and Adam likewise, and from that resulted the will in the soul-essence.\n\n2 The tree produced a branch of its own nature, for Cain's thoughts were bent upon becoming a lord of this earth.\n\nAs Cain saw that Abel was higher in the love of God than he, his free animal will arose for the purpose of killing Abel, for he cared only for the possession of the external world, and to be lord therein, while Abel was seeking only for the love of God.\" ( Mysterium , xxvi.\n\n23.) As an antithesis to Cain, there was born to Adam another son, namely, Abel, who was not so much an image of his earthly as rather of his celestial essentiality, that had been restored to a certain extent by divine mercy.\n\n3 \"After the fall Jehovah spoke the name of Jesus in Adam into an actual life; that is to say, he manifested it in the celestial being that had been weakened on account of the sin.\n\nIn consequence of this in-speaking, there was awakened out of the spiritual death or state of dying, into p.\n\n208 which Adam had sunk, a divine desire once more, and this awakened desire was the beginning of faith.\n\nThis very desire separated itself from the quality of the false desire, and formed an image, and thus Abel came into existence; but Cain was the product of Adam's soul-quality, according to his earthly lust.\" ( Grace , ix.\n\n101.) Thus Abel on the whole, and especially on account of his forcible death which he suffered, represented an anti-type of the Redeemer.\n\n\"Relatively to his external human state, Abel was also sinful; but in his interior the angelic world and image of Paradise began to bud.\n\nThen the interior man put his heel upon the monster-serpent of false desire, and on the other hand the monster-serpent stung the heel of his angelic will.\" ( Mysterium , xxviii."

