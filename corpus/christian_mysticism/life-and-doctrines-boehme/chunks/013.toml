[content]
body = "A man knowing nothing of God, and having no faith in the power of anything divine, which may become revealed in him, cannot be in possession of divine self-knowledge; but if man, by being obedient to the law, enters into a state of harmony and union with God, then may God become revealed in him, and the mind being penetrated by the light of the divine spirit, man may partake of the knowledge of divinity.\n\nIn this way he may learn all about everything in the three kingdoms; for the Spirit of God pervades the All.\n\nOccult knowledge, therefore, does not consist in gathering information or opinions from books and authorities, but its foundation is the recognition of the divine will in man.\n\nNext: Chapter II.\n\nThe Unity of the All"

