body = "He will not die eternally, but merely let the terrestrial kingdom pass away from him, it having been in this life to him au opposition and hindrance, wherewith God has (not filled but) merely covered him.\" ( Six Theosophical Points , vii.\n\n44.) Such souls are during this terrestrial life, and still more after the death of the body, filled with the light and the power of God.\n\nThis light moderates the action of the fiery will still active in them, the blessings of their good deeds surround them, the hope for still greater glorification is their life, and from the trouble and persecution which they have suffered there arises for them pure joy.\n\n\"The principle of the father wherein the soul has her basis is a burning fire, giving light, and in this light rests the noble image of God.\n\nThis light moderates the burning fire by means of the substantiality of love, so as to render it beneficent for nature and life.\" ( Letters , viii.\n\n78.) \"Those earnest souls that have worked the wonders of God in His will at the foot of the Cross, having received the body of God, i.e.\n\n, of Christ, and who have walked therein in justice and truth, all their doings also follow them in their strong will and desire, and they experience inexpressible joy in the love and mercy of God, by which they are continually surrounded.\n\nThe wonders of God are their nutriment; they are living in glory, power, strength, and majesty such as is beyond all description.\" ( Threefold Life , xviii.\n\n12.) \"The blessed souls are rendered happy by the works which they have performed while here, and those who have suffered much persecution for the sake of the truth will behold the wreath of victory which is to crown their new body on the judgment day.\n\nThere takes place in them a continual uprising of joy whenever they contemplate p.\n\n302 the future.\n\nAs their deeds have been varied, so is their hope.\n\nA day-labourer having gained much is glad of the reward.\n\nThus it is there.\n\nA joyful consciousness abides in them.\n\nAll the scorn to which they were submitted and all the accusations that have been falsely brought forward against them are to them a great honour of victory.\n\nTheir frequent prayers, good thoughts, and good works in behalf of their neighbours are the nutriment which they take until the time when their (celestial) body will eat of the fruits of Paradise.\" ( Forty Questions , xxii.\n\n4.) \"He who aids the degraded blesses himself, for he wishes him everything good, and prays to God to bless him in body and soul.\n\nThus his desire and blessing returns to the giver in the Mysterium and surrounds him, and follows him as a good work born in God.\n\nThis is the treasure which man takes with him; his earthly treasures he will have to leave behind.\" ( Menschwerdung , cxi.\n\n4.) There is no man without sin, and as he is followed to the other side of the grave by all of his works, his sins go with him, but if he has known how to obtain forgiveness for his sins, then his happiness will not be infringed upon by them.\n\n1 \"Man is followed by all of his works, and he has them eternally before his eyes and lives therein, unless he has out of his malice and falsehood been newly born by the blood of Jesus Christ.\n\nIf so, he will then break through the earthly and hellish image and enter into an angelic p.\n\n303 one, and come into another kingdom, to which his imperfections cannot follow him, and thus will the image of God be restored out of the terrestrial and hellish form.\" ( Three Principles , xvi.\n\n47.) The departed blessed souls trouble themselves neither about that which belongs to hell nor about terrestrial matters of any kind."

