body = "Sacred Texts Esoteric Index Previous Next The Life and Doctrines of Jacob Boehme , by Franz Hartmann, [1891], at sacred-texts.com p.\n\n289 CHAPTER XIV.\n\nDEATH AND ETERNAL LIFE.\n\n\"The mystic death is the beginning of eternal life.\" Man is a product of three worlds His spirit is of God, his soul from the constellation of the astral elements, his body from the elements of the terrestrial plane.\n\nIn each of these aspects he partakes of the attributes of the principle from which he has originated.\n\nAs a spirit he is, and has been, and will always be, immortal; and is even now in heaven, from which he has never departed.\n\nAs a product of the astral plane, he is subject to the conditions existing therein, while his physical form must dissolve again into the elements to which it belongs.\n\nWith whatever of these three states man identifies himself, that state will be his own.\n\n\"God willed to become manifest in all three principles, but the order did not remain as it was originally instituted.\n\nThe middle went into the exterior, and the exterior into the middle.\n\nThis is not the order of eternity, and therefore the external and the inner principles must become separated.\" ( Threefold Life , xviii.\n\n3.) \"The life which we receive in the body of our mother is merely from the power of the sun, the stars, and the elements, which not only organise the body of the child and endow it with life, but which also bring it to light and nourish and nurse it during the whole term of its life.\n\nThey likewise distribute to it fortune and misfortune, and finally they cause it to die and to decompose.\" ( Three Principles , xiv.\n\n4.) p.\n\n290 \"Behold what you are.\n\nDust of the earth; a corpse.\n\nYour life is subject to the stars and elements.\n\nIt is they who rule you according to their qualities, and they endow you with talents and arts; but when their period and constellation under which you have been conceived and born is ended, then they will forsake you.\" ( Menschwerdung , xi.\n\n6.) \"The corporeal essences return to the earth; the elemental spirit, the air, returns to the air; the water and blood are received by the terrestrial water and earth, and there remains nothing of the external man.\n\nHe has then ceased to exist.\n\nHe had a beginning and he had an end.\" ( Threefold Life , xviii.\n\n8.) \"At death the four elements separate from the one element.\n\nThen the tincture, together with the shadow of that which constituted the man, goes into the ether and remains within the root of that element from which the four elements were born, and from which they emanated.\" ( Three Principles , xix.\n\n14.) After the death of the physical form man remains still a being of twofold aspect; namely, as a celestial spirit, according to the divine principle in him (of which he may or may not be conscious); and secondly, as a supersensual, but nevertheless material being, according to his astral body.\n\nEach of these essences now gravitates to the plane to which it belongs according to its qualities.\n\nFrom this double but opposite tendency results the rupture or division of the soul and the judgment.\n\n\"When a person in this world dies, he then comes before the angel who in his sword carries death and life, the love and the wrath of God.\n\nThere his soul has to pass through the judgment at the portals of Paradise.\n\nIf she has been captured by the wrath of God she will not be able to pass through the door, but if she is a child of the virgin and born of the seed of the (celestial) woman, she will then pass through.\n\nThen will the angel cut away p."

