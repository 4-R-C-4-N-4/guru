body = "If it had not been for that circumstance, he would in his selfishness even have become a devil by the power of the fire.\" 4 ( Stiefel , ii.\n\n363.) \"When the devil saw that lust resided in Adam, he acted still more powerfully upon the Sal-nitre in Adam, and infected it still stronger.\n\nThen it was time that the Creator should build him a wife, who afterwards indeed caused the sin to be acted out, and who ate of the evil fruit.\n\nOtherwise, if Adam had eaten of the tree before the woman was made out of him, he would have fared still worse.\" ( Aurora , xvii.\n\n21.) Therefore woman (spirituality) is, and will always be, the saviour of man.\n\nThe woman was extracted from all the powers of Adam.\n\nRelatively to her substance, she was formed out p.\n\n158 of a \"rib,\" which at that time had not yet degenerated into stiff bone.\n\n1 \"Eve has been extracted from Adam, not as a mere spirit, but entirely substantial.\n\nIt should be said that Adam received a cleft, and that the woman is bearing Adam's spirit, flesh and bone.\" ( Three Principles , xiii.\n\n14.) \"Reasoning says, 'If Eve has been made out of a rib of Adam, she must be very inferior to man.' This is, however, not so, but the Fiat , in its aspect as sharp attraction (the first quality), took her from all essences and qualities of each power of Adam.\" 2 ( Three Principles , xiii.\n\n18.) \"Adam's body had not yet received hard bones and osseous substance.\n\nThis took place only when Eve tasted the apple and gave to Adam to eat thereof.\" \"It is true that the infection and the terrestrial death were already in him as a tendency and deadly disease, but the 'bones' and 'ribs' were nevertheless still power and strength, and thus Eve was created out of that power or strength which (later on) was to become rib .\" 3 ( Three Principles , xiii.\n\n13.) Eve was not misshaped.\n\nShe lived with Adam in p.\n\n159 [paragraph continues] Paradise; but the pure likeness of God was then in neither of them.\n\n\"Eve was not misshapen, but very lovely; nevertheless she too bore the signs (of corruption), and could not be anything more than a wife of Adam.\n\nBoth were still in Paradise, and if they had not eaten from the tree, but turned to God by changing their imagination, they would have remained in Paradise.\" ( Three Principles , xiii.\n\n36.) \"Adam and Eve had still a paradisiacal consciousness, but it was mixed with terrestrial desire.\n\nThey were naked, and had animal organs for procreation; but they did not know this, neither were they ashamed of them, for the spirit of the great world had not yet obtained rule over them before they had eaten of the terrestrial fruit.\" ( Menschwerdung , i.\n\n6, 15.) \"No one can truly say that Eve, before coming in contact with Adam, had been a pure and chaste virgin, because, as soon as Adam awoke from his sleep, he saw her by his side.\n\nHe soon imagined into her (fell in love with her).\n\nHe took her unto himself and said, 'This is flesh of my flesh and bone of my bone.\n\nShe will be called woman , because she has been taken from man.' Eve likewise began to put her imagination into Adam, and each one ignited the desire of the other.\n\nWhere, then, is the pure chastity and virginity?\n\nIs this not animal?\n\nHas not the external image become an animal?\" 1 ( Forty Questions , xxxvi."

