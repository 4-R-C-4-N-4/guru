body = "If, then, the soul of the child is in the Holy Trinity, do you then not think that its glorious light beautifully illuminates the mother, and does not that mother rightfully put her feet upon the Moon, 1 as being exalted above all that is of an earthly nature?\n\nShe gave birth to the Redeemer of the world without any carnal commingling, and from her issued the body which attracts all members, namely, the children of God in Christ, i.e.\n\n, the children of Light.\" ( Three Principles , xviii.\n\n93–98.) Mary, however, was not deified.\n\nIn spite of all her greatness she could only through her Son become perfect and inherit heaven.\n\n2 \"The Word which was promised by God in the garden of Eden came to bloom in the life-light of the virgin; and when the angel Gabriel, by order of the Father, came to give to it an impulse by means of the message, it then entered into the one element of the chaste virgin, but p.\n\n234 not so entirely within her soul and body so as to deify her person.\" ( Three Principles , xviii.\n\n89.) \"The virgin Mary entered into great perfection, like the star of the morning, which is more glorious than the rest of the stars.\n\nShe attained perfection and beatitude through her Son, Jesus Christ.\" ( Three Principles , xviii.\n\n88.) \"The virgin Mary did not become deified.\n\nChrist Himself says, 'No one goes to heaven except the Son of Man, who came from heaven and is in heaven.' All others have to attain heaven through Him.\n\nChrist is their heaven, and the Father is the heaven of Christ.\" ( Three Principles , xviii.\n\n89.) The external kingdom of this world did not become separated from the virgin; but it lost its power over her.\n\nThe quality of her inner life communicated itself to her physical body.\n\n\"When God moved in Mary as His object, then was she highly blessed, and in that benediction of the Redeemer she became impregnated.\n\nNow, it is known that the seed of man communicates its qualities to the body.\n\nWhen the divine life entered into the essence of the seed (power) of Mary, her whole body, which was then surrounding the body of the (divine) image, became highly blessed, and quickened by this wonderful moving of God.\n\nThe external kingdom of this world was then not separated from Mary, she was still imprisoned therein; but the tincture of her blood became kindled with the divine tincture; i.e.\n\n, with the tincture of the seed; communicating its qualities to the corporeal form.\" ( Tilk .\n\ni.\n\n331.) \"The soul of Mary became surrounded by the divine living substantiality, not relatively to her terrestrial but to her celestial nature, so that the terrestrial state was merely supplementing her being.\n\nHer soul, with the Word of life that became human in her, was to pass with it through p.\n\n235 the death and wrath of the Father into the celestial consciousness, and thus her external human nature had to (he in regard to earthly life, so that she could live in God.\n\nBut because she has been blessed, and has carried in her womb the object of the covenant, that which was celestial in her consumed her terrestrial part.\" ( Menschwerdung , i.\n\n9, 18.) 1 The Saviour had to receive earthly essences from Mary, and He became in her, in the normal way, a terrestrial man.\n\n2 \"The virgin comprised Christ as a mother her child.\n\nShe gave to him natural essences, such as she had inherited from her parents, and these essences from her flesh and blood he received to the element, and became therein a living soul.\" ( Three Principles , xviii."

