[content]
body = "8.) \"When the earth received the blood of Christ she trembled and shook, for the wrath of God was now conquered in her, and there entered into her the living blood which had come from heaven out of the substantiality of God.\" ( Menschwerdung , i.\n\n10.) \"The wrath of the Father had to consume in death the life of Christ; but when the wrath had swallowed up the life in death, then the holy life of the deepest love of God moved in the death and wrath and swallowed up the wrath.\n\nThen the earth began to tremble, and the rocks burst and the tombs of the holy ones opened.\" ( Mysterium , xxviii.\n\n123.) \"After the Father had brought again the soul of the Redeemer, that had entered into His wrath, into love— p.\n\n260 that is to say, into the image from Paradise, which had disappeared—then the world trembled in the terror of death as with a terror of joy, and that joy entered into the dead bodies of those that had hoped for the coining of the Messiah, and awakened them to life.\n\nIt was this very terror that tore the curtain in the Temple, namely, the veil of Moses, which hung before the clear face of God, so that man could not see God.\" ( Signature , xi.\n\n71.) The body in which Christ Himself arose from the dead was paradisiacal and divine, and could not be apprehended by anything of an earthly nature; but as the terrestrial body was absorbed therein, therefore the Lord could make Himself visible to His disciples.\n\n1 \"The body in which Christ became raised from the dead could not be stopped or arrested by rocks or stones.\n\nIt passes through all things without breaking anything; it takes hold of this world, but this world cannot lay hold of it.\n\nNothing can make it suffer, for in it is all the fulness of the Godhead.\" ( Three Principles , xxv.\n\n87.) \"There was no necessity for the removal of a stone to liberate the body of the Lord from the tomb.\n\nThis took place merely to show to the Jews the folly of their imagining that they could withstand God, and also for the sake of the weak faith of the disciples, so that they might see that Christ had in truth been raised up.\" ( Three Principles , xxv.\n\n85.) \"Although Christ not always walked visibly among His disciples, nevertheless He showed Himself often visibly, tangibly, and substantially to them in the shape of the body which He had occupied while upon this earth, and which the new body had absorbed, but which p.\n\n261 it had the power to represent again.\" ( Three Principles , xxiv.\n\n97.) The heaven wherein the Redeemer has entered after His resurrection is the fulness of divine power, by means of which He is Lord over the terrestrial world and over the world of hell.\n\n1 \"The internal foundation of this world, whereof the four elements have originated, is heaven, and in this internal power Christ rules as true God and Man in the external world.\n\nWhen He says, 'To Me has been given all power in heaven and upon the earth,' and also, 'I am with you every day unto the end of the world;' and furthermore, if it is said of Him, 'He shall rule over His enemies until they are all made to be a footstool under His feet,' all this refers to His internal kingdom, because He rules within the internal and over and above the external and terrestrial, and likewise over the hellish world.\" ( Baptism , ii.\n\ni, 29.) Thus the Bible history of the life of Christ and the miracles which He performed, is a description of the processes taking place within the inner life of the regenerated.\n\nIn Jesus Christ we behold the antitype of the one and only Redeemer of the world, as a whole, and of every separate individual."

