[content]
body = "177:2 The spiritual being is the one that is not subject to the dissolution of the physical form, but \"reincarnates\" periodically; that is to say, it creates for itself again other forms in which it may find to a certain extent an outward expression.\n\n(Compare Myster.\n\nMagn.\n\n, 29, 45.).\n\n178:1 In other words, each thing is an expression of will-power.\n\nThe will alone, however, does not constitute its true consciousness; the latter results from the action of the will upon the imagination.\n\n179:1 See Magic, White and Black .\n\nNext: Chapter IX.\n\nGeneration"

