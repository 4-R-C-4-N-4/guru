[content]
body = "We may say that the world, as we know it, is constituted entirely of forms of heat, or of motion, or of electric conditions, or light, &c., &c.\n\nAll this is true in so far as it refers to the relations which it bears towards ourselves.\n\nAll these powers are only modes of manifestation of one primordial and originally divine power, namely, the will of God acting in His own eternal wisdom.\n\n\"The eternal Triune God created all things by and through the eternal Word out of His own self, namely, out of His two aspects or qualities; out of eternal nature, the fury or wrath , and out of His love; by means of which the wrath or \"nature\" was pacified.\n\nThus He created them, and caused them to enter into existence.\" ( Stief ., ii.\n\n33.) p.\n\n95 \"The Father, being primordial Will, speaks out all things by means of the Word, out of the centre of freedom; but the issue from the Father by means of the Word is the spirit of the power, and this spirit gives form to that which has been outspoken, so that it appears as a spirit.\" ( Threefold Life , ii.\n\n63).\n\nThis magic power, or \"Word,\" has been in God from all eternity, and as such it is God and the \"Christ\" in its purely divine aspect.\n\nThere is not any time during which \"God goes to sleep\" or loses His self-consciousness; neither does the idea to create come to Him from some outside influence; but God beholds the universe from all eternity in His wisdom as a mirror, and by the act of creation He projects into objectivity (so to say) the image existing subjectively in Him.\n\nIt is, therefore, Nature and not God that goes to rest during the \"nights of creation,\" in the same sense as the body of a man goes to sleep, while his spirit remains self-conscious in its own sphere.\n\n\"Wisdom is a divine imagination, wherein the ideas of the angels and souls have been seen from eternity; not as substantial, actual creatures, but non-essential, like the images in a mirror.\" ( Clavis , x.\n\n5.) \"The likeness of God, having been seen in the wisdom of God from all eternity, and in which God created Man, was without life and substantiality before the beginning of the time of this world.\n\nIt was merely a reflection of the image wherein God saw how He would be in an image.\" ( Stief ., ii.\n\n123).\n\n\"Man has not been from eternity; but only like a shadow stood the image, wherein God in His wisdom knew all things from eternity, in the mirror of His own wisdom.\" ( Stief ., ii.\n\n143.) The will of God is only one; but by its action within eternal nature a great many divine powers are produced.\n\np.\n\n96 [paragraph continues] The ideas existing in the universal mind are innumerable, and therefore there is the possibility of innumerable different forms coming into existence by the action of the divine will.\n\nThere is, however, nothing fully perfect besides the Godhead, and consequently there exist on all planes beings of different states of perfection, and capable to become more perfect by means of the will of God, which is the law of evolution.\n\n\"The kinds of creatures are as varied as are the eternal thoughts in the wisdom of God.\" ( Three Principles , ix, 37.) \"As the divine powers are manifold, even innumerable, so there is a differentiation of ideas and a difference among the angels; in consequence of which some appear like kings or rulers and others as servants.\" ( Theosophic Question s, v.\n\n9–12.) \"There being nothing perfect except the divine Three, consequently all things differ from one another, and likewise the angels have different qualities.\" ( Threefold Life , v."

