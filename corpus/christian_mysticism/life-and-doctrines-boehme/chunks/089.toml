[content]
body = "There are even animals that are ashamed of that act.\n\nEven in its best aspect the performance is disgusting before the sanctity of that which is divine, it having been caused by sin in consequence of primordial man's degradation, but being patiently submitted to by that which is divine in man, because it is a necessity of his present animal state.\" 1 ( Stiefel , ii.\n\n396.) It is an error to suppose that one person is a descendant from others merely as far as his corporeal form is concerned.\n\nThe human soul is likewise generated in that manner.\n\nIf the heart were absent even the body could not come into existence.\n\n2 \"The soul is not every time created anew and breathed into the body, but she is reproduced according to human natural law, like a branch growing out of the trunk of a tree, or as a kernel or seed that is sown.\n\nThus the soul is sown that it may grow to be a spirit and body.\" 3 ( Forty Questions , x.\n\n4.) p.\n\n194 \"The souls of men, all taken together, are as only one soul, for they have all been generated out of one soul.\" \"The soul is a cause of the existence of all the members necessary for the life of man, for without the soul no organ would come into existence to live in the life of man.\" ( Three Principles , xiv.\n\n14.) \"The heart is the true origin of the soul, and in the interior blood of the heart (the will) is the soul, the fire, while in the tincture the soul is its spirit (its light); the spirit floats above the heart, and communicates itself to the body and to all of its organs.\" ( Forty Questions , xi.\n\n3.) In so far as by the connubial act a soul is generated, there is in it even something of a paradisiacal nature.\n\n1 \"While Adam remained in the love of God, and the woman (the female principle) in him was a chaste virgin, the tincture of the fire (in him) could have experienced much joy in the embrace of the tincture of the light contained (in him); but the present external body is not worthy of enjoying such an intercourse with the kingdom of delight, wherein the life of the soul is sown.\n\nOnly the inner essences, which originate (directly) from the Eternal, are capable of participating in such happiness; external animal man merely gratifies an animal desire, and knows nothing of the delight of the (spiritual) essences.\n\nIf, however, the (external and internal) tinctures intermingle, then there is therein something (a sensation) belonging p.\n\n195 to Paradise; but the earthly essence (lust) soon becomes mixed therewith.\" ( Menschwerdung , i.\n\n7, 6.) \"The desire for conjunction in men and women results from the separation of the fire and light-tincture in Adam.\n\nThese principles in their own essence are still much more noble and pure than the flesh.\n\nIt is true that they are now separated, and do not contain the true life; but they are full of desire for that true life, and when they again meet with each other in the unity of all being, they then awaken the true life to which their desire is directed.\n\nThey want to be again that which they were in the image of God when Adam was man and woman.\" 1 ( Stiefel , ii.\n\n388.) \"When the two tinctures are brought together into one, then the quality of the eternal kingdom of joy, the highest desire and its fulfilment, becomes manifested."

