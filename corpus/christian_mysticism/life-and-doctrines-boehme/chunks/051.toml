body = "Then in the spirit of external nature there originated a male and a female kind—namely, in the fiery Mercury the male, and in the watery the female one.\" ( Clavis , 86.) \"On the third day the fiery and the watery Mercury have again entered in conjunction and mixture, and then the sal-nitre gave birth to grasses and herbs and trees.\" ( Clavis , 88.) \"After God had put heaven between the love and the wrath, for the purpose of discernment, there on the third day love penetrated through heaven into the wrath.\n\nThen the old and deadened body began to stir and to feel the anguish of generation; for love is ardent, and it ignited the fountain of fire, and the latter caused a friction in the acrid and cold quality of stiffened death, until on the third day the acrid quality became heated, and thus the acrid earth became moveable.\n\n( Aurora , xxv.\n\n29).\n\n\"When the light contained in the sweet water penetrated through the acrid spirit, the lightning flash, having become ignited in the water, in the acrid, hard, and dead quality, it caused motion in everything, and thus came movability (life) into existence, not only in the heaven above the earth, but also at the same time within the earth.\n\nThen there began life to be generated in all things, and from the earth were produced grass, herbs, and trees, and within the earth there were formed silver, gold, and metals of various kinds.\" ( Aurora , xxi, 132; xx.\n\n6.) p.\n\n129 As the light could be active only in the corrupted essence, there being none other, the products formed thereby were of a mixed kind, half good and half evil.\n\n\"When the light appeared again within the external conceivableness, the Word brought forth life out of death, and the corrupted sal-nitre produced fruits again; but this had to take place in a certain relation to the depraved state existing in the wrath, and as the external forthcoming of those fruits took place from the earth, they had to become evil and good.\" ( Aurora , xxi.\n\n19.) Before the ignition of the sun and the stars took place nature was resting as in a state of death, and the formations proceeding from her were devoid of the living, growth-producing power.\n\n\"Until the third day after the ignition of the wrath of God in this world, nature remained in anxiety, and was a dark valley in death; but on the third day, when the light of the stars became ignited in the water of life, the life broke through death, and the new generation began.\" ( Aurora , xxiv.\n\n41.) \"In the earth there is above all the acrid quality.\n\nThis contracts the sal-nitre and solidifies the earth, causing it to become a corporeal being, forming therein also bodies of various kinds, such as rocks, metals, and manifold roots.\n\nWhen this is formed it has nevertheless no life to enable it to grow and expand.\n\nBut when the heat of the sun acts upon the soil, various formations prosper and grow in the earth.\" ( Aurora , viii.\n\n41.) Likewise the material and earthly elements in man have no power themselves to rise superior to their own nature.\n\nThis they can do in no other way than by the power of the Divine Spirit.\n\nNow the eternal light of God shone into the darkness of this world and ignited the heat in the firmament or p.\n\n130 heaven, and thus out of the fire arose the light—that is to say, the sun and the starry sky.\n\n\"After the heaven had been made, for the sake of distinction between the light of God and the corrupted body of this world, the latter was a dark valley and without light, and all the powers were captured, as if in death, and very uneasy until they became kindled in the midst of the whole body."

