body = "36.) \"In Paradise there is perfect life without disturbance, and a perpetual day, and the paradisiacal man is clear like transparent glass, and he is fully penetrated by the light of the divine sun.\" 1 ( Signature , xi.\n\n5 1.) His body likewise appeared luminous, because its terrestrial substance was absorbed in the celestial essence.\n\nIt radiated a pure, divine light.\n\n2 \"The inner holy corporeity of the pure element penetrated through the four elements and kept the Limus of earth—that is to say, the external sulphuric (terrestrial) body within itself as in a state of absorption.\n\nNevertheless, that body was actually present, but in such a way as darkness dwells in light, so that the darkness cannot manifest itself on account of the light.\" ( Mysterium , xvi.\n\n6.) \"All the qualities of the inner and holy body, together with the external ones, were in primordial man attuned in one harmony.\n\nNeither of them lived in its own state of desire; but they had their desire in the soul wherein the divine light was manifest.\n\nThis, the divine light radiated through all the qualities, and produced in them an equal, harmonious temperature.\" ( Mysterium , xvi.\n\n5.) \"The inner man kept the external one imprisoned within itself and penetrated it in a manner comparable to iron, which glows if it is penetrated by fire, so that it seems as if it were itself fire.\n\nBut when the fire becomes extinct, then does the black, dark iron become manifest.\" ( Mysterium , xvi.\n\n7.) p.\n\n143 \"The pure element penetrated through the external roan and overpowered the four elements; moreover, the power of the heat and the cold was in the flesh.\n\nBut as the light of God was shining therein, they were in equal harmony, so that neither one of them became manifest before the other.\n\nThus God the Father is called a wrathful, jealous God and a consuming fire, and He is all that in regard to His qualities; but of these qualities nothing becomes manifest in His light.\" ( Stiefel , xi.\n\n75.) \"Primordial man in Paradise, being fixed therein, was in a state such as time is before God and God in time.\n\nAs time is a spectacle before God, likewise the external life of man was a spectacle before the inner and holy man, who was the true image of God.\" ( Mysterium , xvi.\n\n8.) In the same sense the Bhagavad Gita says that the true self, the God, Atma , or \" Christ,\" is not a participator, but merely a spectator in that which concerns the external illusion.\n\n\"The inner body was a dwelling-place of the Godhead, an image of divine substantiality.\n\nIn that body the soul had her meekness, and her fire was rendered mild thereby, for she received there the love and meekness of God.\" ( Tilk ., i.\n\n233.) Owing to this resemblance to God, Adam's will and thoughts were as one.\n\nHis mind was pure and uncomplicated, childlike, unsophisticated, and devoted to God; he did not need to speculate about the unknown, because he had the power to perceive that which he wanted to know.\n\nHe enjoyed the perception of divine and terrestrial things.\n\n1 \"The mind of Adam was innocent like that of a child, playing with the wonders of its Father.\n\nThere was in him no self-knowledge of evil will, no avarice, pride, p.\n\n144 envy, anger, but a pure enjoyment of love.\" ( Threefold Life , xi.\n\n23.) \"When Adam was created in Paradise, there his life was burning like a flame of pure oil.\n\nTherefore his perception was celestial, and his intelligence was surpassing and comprehending things beyond nature.\" ( Signature , vii."

