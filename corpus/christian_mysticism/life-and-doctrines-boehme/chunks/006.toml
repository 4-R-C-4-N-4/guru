[content]
body = "The human selfhood will then follow in its perceptions the Spirit of God, tremblingly and in the joy of humility, and become able to see what is contained in time and in eternity.\n\nEverything is near to a soul in that state, for the soul is then no longer her own property, but an instrument of God.\n\nIn such a state of calmness and humility should the soul then remain, like a fountain remains at its own origin, and she should without ceasing draw and drink from that well, and nevermore desire to leave the way of God.\" ( Calmness , i.\n\n24.) As the worm, crawling in the dust of the earth, cannot rise like the eagle above the clouds, so the self-willing thought of man, wandering in the labyrinth of conflicting opinions, does not enter the realm of eternal truth.\n\nBut when man attains freedom by giving up self-will and selfish desires—or, to express it in other words, when by means of the Christ (eternal Light and Truth) he arrives at that state of oneness (at-one-ment) with God, which renders his soul godlike and divine, he then also receives in the Christ a true and essential knowledge of God and of Nature.\n\n\"As soon as the newly-regenerated man becomes manifest, will he attain real knowledge.\n\nAs the p.\n\n45 external man sees the external world, likewise the regenerated man sees the divine world wherein he dwells.\" ( Letters , xxvii.\n\n3.) This spiritual world, wherein the regenerated ones consciously live, is not an imaginary or illusive world, but perfectly real; neither has it anything in common with the vulgar conceptions of heaven, which are merely the products of fancy.\n\n\"It is to be regretted that men are led so blindly by those that are blind, and that the truth is stopped from manifesting itself to us in its glory and purity by our conceptions of external pictures and forms; for when the divine power in all its splendour becomes manifest and active within the interior foundation of the soul to such a degree that man earnestly desires to depart from his godless ways and to sacrifice his whole being to God, then will the whole of the triune Deity be present within the life and the will of the soul, and the heaven, wherein God resides, will be open to her.\" ( Mystery , lx.\n\n43.) This is the only way in which a knowledge of God can be attained, and there is no other way.\n\n\"Christ says: The Son of Man does nothing except what he sees that the Father is doing.\n\nIf the Son of Man has become our body and His spirit our own, shall we then not be able to know God?\n\nIf we live in the Christ the Spirit of Christ will see through us and in us whatever it desires, and that which the Christ desires we will see and know in Him.\n\nThe world of the angels is easier and more clearly comprehensible to the regenerated man than the terrestrial world.\n\nHe also sees into heaven, and beholds God and eternity.\" ( Menschwerdung , ii.\n\n7, 3.) \"Our seeing and knowing is in God.\n\nHe reveals to every one in this world as much as He wills, and as much as He knows will be useful to him.\n\nWe are not in possession of our own selves.\n\nWe know nothing of God.\n\np.\n\n46 God Himself is our knowing and seeing.\n\nWe are nothing, so that He may be All in us.\n\nWe should be blind and deaf and mute, and know nothing and know of no life of our own, so that He may be our life and our soul, and that our work may be His.\" ( Menschwerdung , ii.\n\n7, 9.) Seen in this true light, how foolish appear the practices of those who seek to obtain spiritual power and greatness by their speculations and mental efforts, without the light of God."

