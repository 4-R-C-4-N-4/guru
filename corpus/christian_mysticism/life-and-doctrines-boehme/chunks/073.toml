body = "Sacred Texts Esoteric Index Previous Next The Life and Doctrines of Jacob Boehme , by Franz Hartmann, [1891], at sacred-texts.com p.\n\n164 CHAPTER VIII.\n\nNATURE, OR THE THIRD PRINCIPLE.\n\n\"The godless seeks for God outside of his own self, and the Christless sectarians seek for a personal Christ in history; but the man of God and the true Christian know God and Christ within their own soul.\" \"We surely believe in a personal and historical Christ; but only after Christ has become personal in a man will he realise the true nature and vocation of Jesus the son of Jehovah.\"— Johannes .\n\nThe image of everything that ever existed was in the light at the time when God began to create a new world.\n\nThe external world, to which Adam had become subjected in consequence of his degradation, has its origin in God's eternal nature and its prototype in His wisdom, wherein it was spiritually contained from the beginning.\n\nWe may compare the external world to the imagery seen upon a screen, upon which it has been projected by the light of a magic-lantern.\n\nThe images represent the world, the pictures on the slide the ether, and the light itself is the Spirit of God.\n\n\"The third principle, the spirit and torment of this world, has been hidden from eternity in eternal nature, and was discovered by the light-flaming spirit in God's wisdom and the divine tincture.\n\nThen the Godhead moved according to the nature of the producing mother, and the great Mysterium was born, wherein was contained everything that is within the power of eternal nature.\n\nThis, however, was only a Mysterium, and had no resemblance to any created being.\n\nThere everything was as if (mixed) together, like a cloud of dust.\" 1 ( Menschwerdung , i.\n\n1, 10.) p.\n\n165 \"If we rightly consider the creation of this world and the spirit of the third principle, or the spirit of the great world with its stars and elements, we find therein the qualities of the eternal world as if in a state of mixture; wherein Deity willed to manifest the eternal wonders that were hidden, and to bring them into objective existence.\" ( Six Theosophical Points , ii.\n\n6.) \"The external world, in being born (coming into objectivity), makes for itself a new principium or beginning.\n\nThe generatrix of the temporal is a reproduction of the eternal generatrix, time originates in eternity, and even here eternity, with its wonderful production, appears, in its powers and capabilities, in an especially temporal form and shape.\" 1 ( Mysterium , vi.\n\n10.) In this external world, called the third principle, there are manifest two powers—the holy divine power and the power of the darkness.\n\nThe latter is even preponderating.\n\n\"The third principle, or the visible elemental world, is an issue of the first and second principles, which is produced by the motion and outbreathing of divine power and divine will.\n\nIn it is figured the spiritual world according to light and darkness, and brought into a created (objective) condition.\" ( Tabulæ Principiæ , 5.) \"The external world has been outbreathed from the holy and from the dark world.\n\nIt is, therefore, evil and good, and in love and wrath; but, compared with the spiritual world, it is only like a smoke or a fog.\" ( Mysterium , iii.\n\n10.) \"The word moved the Fiat in all forms of eternal nature, in harmony with the world of light and the world p.\n\n166 of darkness; so that the desire after the quality of both worlds entered into being.\n\nThis caused good and evil to originate in the essentiality, and thereby was created the external visible world, with stars and elements as a particular life.\" ( Stiefel , i."

