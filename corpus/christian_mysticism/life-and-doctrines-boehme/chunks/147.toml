body = "If he then, in his imagination, sinks himself into the abyss, he is then already there, and in this abyss is his pearl (the celestial jewel).\" ( Grace , ii.\n\n43.) 279:1 This may be expressed in other words by saying that desire gives rise to the formation of a thought, and this thought is made alive by the will, and obtains substantiality and the right to live by being acted out.\n\nIt is easier to avoid creating such an Elemental than to kill it after it has been created; because such a being is a part of our own self, and its destruction involves suffering.\n\n280:1 Here it may be remarked that it will hardly be sufficient to have merely a theoretical knowledge of the uselessness of material attractions to cure the desire for them.\n\nIn this, as in all other cases, there can be no true self-knowledge except that which arises from practical experience.\n\n282:1 True \"repentance\" does not consist in fancying oneself to be sorry on account of the consequences to be expected from sins committed in the past, or in worrying about what has been done and cannot be undone now, while perhaps the heart still craves to sin again; but it consists in a turning away from that which is sinful and evil, and in forming the firm resolution to sacrifice and surrender oneself, faults and all, to the immutable will of God.\n\n(Compare True Repentance , i.) 283:1 No man can truly realise his own unworthiness so long as the light has not become active in him.\n\n284:1 We cannot labour in the service of God without dying to our human selfhood.\n\nTo \"labour in the service of God\" does not mean that, for instance, \"I, parson, or professor, or author So-and-so, in my human personality, considered as something separate and distinct from God, could with my human smartness render a service to some outside god, or please him, or advise him what to do;\" but it is God Himself rendering the service to Himself through our instrumentality, provided that by rising above all conception of self and personality we become identified with Himself.\n\nFor this reason all clerical assumption and pretence, by which is assumed an authority apart from that of the God to whom they profess to serve, is repulsive to the religious instinct of man.\n\n285:1 If the saints or \"adepts\" are often addressed as \"children,\" this is not a mere invented figure of speech, without any adequate cause, but has p.\n\n286 a deep signification; for no one can inherit the kingdom of heaven, i.e.\n\n, divine self-knowledge, unless he becomes like a child that of itself knows nothing in the realm of the spirit.\n\nNext: Chapter XIV.\n\nDeath and Eternal Life"

