[content]
body = ", the celestial virgin of divine wisdom, wherein his power was united to sweetness, and became active within the lower and animal elements of his constitution, so that brute passion took the place of divine self-conscious will.\n\nThis animal will produces corresponding animal images in his soul.\n\n183:1 If man's imagination were not excited by the pictorial representations which the objects of the surrounding world call forth in his mind by means of his external senses, but if his mental activity were restricted to forming images by its own power, his fiery will, from which the recognition of his divine bride has departed, would cause him to become self-conscious in evil.\n\nFor this reason asceticism without divine wisdom leads to the acquisition of the powers of black magic.\n\n184:1 Man became an organism wherein the powers of nature are acting, and in identifying himself with nature he began to enjoy and to suffer with her.\n\n185:1 Man's constitution resembles a garden, wherein all kinds of seeds, good and evil, are sown.\n\nThose which he cultivates or permits to glow will become predominant in him.\n\n186:1 If \"Eve\" had not plucked the fruit from the tree of knowledge for \"Adam,\" that is to say, if he had not desired it merely in his imagination, but plucked the fruit himself by entering therein with his own fiery will, the consequences would have been still more disastrous to him.\n\nThe universal man (Adam) would then have become a devil, instead of a semi-animal human being.\n\n186:2 This does not mean to say that the true divine and immortal man did lose his immortality; but man in his aspect as a human being became unconscious of his immortality, and is now seeking for external proof for the purpose of becoming convinced that there may be something immortal in him.\n\n186:3 The more of man identifies itself with the body and its lower principles, the more of him will die.\n\nThat part of man which identifies itself with the immortal part within becomes immortal with the latter.\n\nMan should, therefore, not identify himself in thought and will with the lower elements in his constitution, but employ the powers of the latter for the unfoldment of his spirituality.\n\n186:4 As the whole of the animal kingdom exists in macrocosmic man, likewise p.\n\n187 the representative forms or germs of all animals exist in the animal soul of microcosmic man, and they grow and become predominant in him according to his predominant animal tendencies or desires.\n\nThey are the elementals which take possession of godless man and render him subservient to their will.\n\n188:1 If man were truly to realise his own divine state, there is no power that would retain him against his will in his semi-animal body.\n\nHe would then be the god which in the course of ages he aspires to become.\n\n188:2 In the same sense, the more we cling to merely external pursuits, the more are we liable to lose the power of the true recognition of internal truth, and for this reason we usually find the least amount of spirituality and intuition among those that are very learned.\n\nThe more we close our eyes and speculate, the less shall we become capable to see.\n\n189:1 If the senses of man were educated to love that which is true and divine, then would the inner realm become opened to their perception, and man would know \"supersensual things.\" 189:2 Every character, when it is to be expressed, finds its expression in a certain form.\n\nAll the animals in this world are incarnations of certain characters, and likewise the qualities of animal man are expressed in his animal soul (on the astral plane) in corresponding animal forms."

