[content]
body = "He willingly surrendered Himself to the wrath (to the suffering caused by the lower principles that had been awakened to consciousness in consequence of the sin), and He extinguished it by His love.\n\nHe came from God into this world and took our soul into Himself, so that He might take us out of the earthly state into Himself and lead us thus into God.\n\nHe regenerated us within Himself, so that we would become capable of living again in God, and that we should put our will into Him.\n\nIn Him He led us to the Father, into our first home; that is to say, into the Paradise which Adam had left.\" ( Menschwerdung , i.\n\n11.\n\n6.) \"The Word took our own flesh and blood into the divine essentiality, and broke the power which held us imprisoned in the wrath of death and fury.\n\nIt broke that power on the Cross; that is to say, in the centre of nature (the fourth natural form, whose symbol is the Cross), and ignited again in our soul (that had become dark) the burning white light-fire.\" ( Menschwerdung , ii.\n\n6, 9.) \"Christ sacrificed our human image to the wrath of His Father, to be swallowed up in death, and introduced His life into death; but He manifested His love in that life which death had devoured, and thus He brought that life out of death by means of His love (with which p.\n\n247 it had become one and immortal).\n\nAs a seed sown into the earth must die (as such and relatively to its form) within the earth, and as by means of this dying a new body grows, so the corrupted body of Adam had to be sacrificed to death and to the wrath, and out of the death and wrath issued the body of the love of God .\" ( Mysterium , xxviii.\n\n17.) The conquest of the power of death took place, in a certain sense, already at the time of the overcoming of the temptation of the Redeemer, which, like that of Adam, was caused by the envy of the devil, but in which the devil was conquered by the Lord.\n\n1 \"Adam was to take possession of the kingly throne of Lucifer, because the latter had turned away from God.\n\nFrom this results the great envy and the spite of the devil against mankind.\n\nFrom this also originates the temptation of Christ in the wilderness, because Christ was to take possession of the throne which the devil claimed, to break his power, and to become his judge who was to reject him eternally.\" ( Grace , vi.\n\n13.) \"All that which had seduced Adam; and wherein he became imprisoned as in the death of darkness, was offered to the Saviour at the time of temptation.\" ( Signature , vii.\n\n46.) \"The temptation is the hard fight in the garden of Eden, in which Adam fell; but the new warrior came out of it victorious, and remained conqueror.\" ( Three Principles , xii.\n\n91.) \"When Christ withstood the temptation in the place of Adam, then the newly introduced celestial Ens broke the sword in the death of the external body of Christ, and by means of the holy substance it brought the external body, which He had taken up in Mary and out of her p.\n\n248 seed, through that sword of the wrath and into the holy state.\n\nIn this very power the external body became raised from the dead, and conquered both, death and the fiery sword.\" ( Mysterium , xxiv.\n\n24.) The first factor in the temptation was that Christ was requested to take earthly food instead of celestial nutriment, and that He should thereby gratify the desire of His body.\n\n1 \"After the Spirit of God had led Christ into the wilderness, then was the devil permitted to approach Him in the kingdom of wrath and to tempt the second Adam as he had tempted the first one."

