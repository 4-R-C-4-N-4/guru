[content]
body = "27.) The first and greatest danger for the new-born being arises from pride; as is illustrated in the New Testament, for hardly is the new-born Saviour laid in the cradle, standing between the ox of self will and the ass of ignorance in the stable, represented by the animal constitution of man, when the king of pride (Herod) finds his kingdom endangered, and seeks to kill the child, which is to become the ruler in the new Jerusalem within the consciousness of man.\n\n1 \"The enlightened children of God are threatened by a great danger; namely, in many of them who enjoyed the great sight of the holiness of God, wherein the triumph of life is attained, carnal reason mirrors itself therein and seeks to intrude its selfishness into the interior centre from whence the light shines.\n\nFrom this results miserable pride and self-conceit; and selfish reason,—being, moreover, nothing but a reflection of the eternal light,—fancies itself to be more than that.\n\nIt thinks that it may now do as it pleases, and that, whatever it does, it is the will of God doing it in it, and it believes itself to be a prophet.\n\nNevertheless it enters nowhere p.\n\n275 except within its own self, and moves within its own desire, whereby the centrum naturæ soon begins to arise.\n\nThen the devil of flattery comes forward, and man becomes drunk with self-conceit, persuading himself that it is God who compels him to act as he does.\n\nThus he ruins the good beginning, during which the light of God began to shine within nature, and then the light of God departs from him.\n\nThere is then nothing left but the light of external nature within the creature, but self-assertion puts itself therein and fancies that it is the original light received from God.\" 1 ( Calmness , i.\n\n8.) Within the human constitution the old terrestrial and the new celestial states are dwelling together, and this necessarily causes within the regenerated a continual battle during the term of his terrestrial life.\n\nThis battle between the higher and the lower consciousness, between earthly desires and celestial joy, is experienced by every one, but it is especially marked in those in whom, on account of a higher degree of spirituality, the spiritual sensitiveness is more keen.\n\n\"Not in the terrestrial essence does God become manifest in us, but in the true image that became weakened in Adam; but the external thing clings to the internal, the inner man manifests the divine mystery, and the external one the external mystery or the mirror of wonders.\n\nFrom this results the battle in the new-born man.\n\nThe new man wants to be lord, for he perceives the divine world; but the terrestrial man is opposed to him, and wants to rule also, for he perceives the external world.\" ( Forty Questions , xvii.\n\n14.) p.\n\n276 \"The cause of the antagonism between the flesh and the spirit can easily be found without much seeking, for the inner spirit has the body of God, born from the sweet essentiality, and the external spirit has the body of the fiery mirror of wrath, which continually seeks to awaken wrath; namely, the great wonders which are in the Arcanum in the sternness of the soul.\n\nThe inner love-spirit protests and will not let the external spirit arise and fire the soul; because it would cause it to lose its own happiness and form, which would then be destroyed by the wrath.\" ( Forty Questions , xvii.\n\n14.) \"There are two kinds of will to be distinguished in the constitution of man.\n\nOne arises within the lily and grows in the kingdom of God; the other sinks into the darkness of death and desires for the earth, she being its mother.\n\nThis latter will continually battles against the lily, and the lily flies from its roughness."

