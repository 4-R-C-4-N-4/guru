body = "162 [paragraph continues] Eve, the latter was the first to be seduced to fall away from God.\n\n1 \"The lust originated in Adam, but thereupon this perverted desire began to be excited in the woman.\" ( Stiefel , ii.\n\n375.) \"Eve was lusting after the fruit of the tree of knowledge of good and evil, but there was the prohibition before her, and she was afraid of God, and did not want to act against the prohibition.\n\nThen the devil entered into the substance and cunning of the snake, and turned this power and craftiness around, so that Eve could see and know that the serpent was very artful and cunning.\n\nShe clung to the forbidden tree, and it did her no harm; but she looked at the serpent and fell in love with his cunning and cleverness, also with his agility and artfulness, and she lusted to eat of the tree.\n\nThe serpent advised her to do so by the sound and voice of the devil, and pretended that he derived his cunning and artfulness from the tree.\" ( Mysterium , xx.\n\n22.) \"The devil told her that the fruit would do her no harm, but that the eyes of her understanding would be opened, and she would be like God.\n\nShe thought it would be a good thing to be a goddess, and she consented; and in consenting she fell from the divine harmony, from the peace in God, and from divine faith, and entered with her desire into the serpent and into the cunning, the desire, and vanity of the devil.\" 2 ( Mysterium , xx.\n\n25.) While the devil was desirous directly for the fire-life, p.\n\n163 man at first was only desirous after the terrestrial things, but thereby his lust of pride began to arise.\n\n\"The devil went with his imagination into the fiery foundation, but Adam into the watery quality.\" ( Signature , vii.\n\n4.) \"Unlike Lucifer, Adam did not actually desire to awaken the first principle; his desire was rather to taste good and evil—that is to say, the vanity of the earth.\" ( Mysterium , xviii.\n\n31.) \"In the external part of the soul originated the terrestrial lust to eat of the manifold qualities; but in the interior fiery part of it originated lust for pride, to know evil and good, and to be like God.\" 1 ( Mysterium , xviii.\n\n30.) Thus the first act of the great drama ended, and a god became a man.\n\nIn the second act He rises again upward toward His former divine state, no more innocent and ignorant of evil, but taught by experience, knowing and wise, a conqueror over \"matter,\" and a true Lord over all.\n\nFootnotes 142:1 The term \"Paradise\" means a state of purity and innocence and happiness, but not necessarily knowledge.\n\nMan had to learn to know evil so as to be able to realise good.\n\n142:2 His thoughts and will were pure, and therefore his spirit (the union of will and thought) manifested itself in producing a pure and luminous form, not burdened with the gross material elements which form at present the bodies of human beings.\n\nThen, as now, his body was the product of his own thoughts.\n\n143:1 Logical proof is only useful as long as we are blind in regard to the nature of a thing After that thing has become a part of ourselves and we perceive it, no more proof of its existence will be required.\n\n144:1 Adam was in harmony with creation and as one with all nature.\n\nTherefore he could experience the feelings of all beings in nature within himself, and express them accordingly.\n\n144:2 Even now man is still there where his consciousness exists; but as his physical body is too gross to follow the movements of his thoughts, the body becomes unconscious whenever his consciousness concentrates itself at another place."

