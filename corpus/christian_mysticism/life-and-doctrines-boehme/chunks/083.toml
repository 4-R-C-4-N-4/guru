body = "Sacred Texts Esoteric Index Previous Next The Life and Doctrines of Jacob Boehme , by Franz Hartmann, [1891], at sacred-texts.com p.\n\n180 CHAPTER IX.\n\nGENERATION.\n\n\"Let every Brahman, with fixed attention, consider all nature, both visible and invisible, as existing in the Divine Spirit.\n\nFor when he contemplates the boundless universe in the Divine Spirit, he cannot give his heart to iniquity.\"— Manu .\n\nGod evolves the centre of light from eternity to eternity within Himself, and likewise there is in the soul of man a desire to penetrate into the second principle and to live in the light of God.\n\n1 \"The soul in its substance is a magical gush of fire from the nature of God the Father.\n\nShe is an ardent desire for the light.\n\nThus, God the Father very strongly, and from all eternity, desires his heart, the centre of the light, and He generates it in His desiring will out of the quality of the fire.\" ( Four Complexions , ii.) \"God makes also the second principle in His love, wherefrom He generates from eternity to eternity His eternal word and heart, and the spirit ignites the bond of nature, and renders it luminous in the love and the life of His heart by the power of the light.\n\nLikewise the soul of man desires to penetrate into the second principle, and to still its hunger with the power of God.\" ( Threefold Life , i.\n\n11–13.) But if the soul, as has been the case with Adam, does p.\n\n181 not surrender her will to God, then will the divine idea not become annihilated, but is rendered inactive in man.\n\n\"The soul has the seven qualities of the inner spiritual world (modified) according to nature; but the spirit is without any qualities; it is outside of nature and in the unity of God.\n\nBy means of its fiery nature the spirit becomes manifest in the soul, because it is the true likeness of God, an idea wherein God Himself acts and resides, provided that the soul enters with her desire into God and surrenders her will to Him.\n\nIf this does not take place, then will that idea, namely, the spirit, be mute and inactive, like a picture in a mirror that has faded and is without substance, as was the case with Adam in his fall.\" ( Tabulæ Principæ , 66.) \"It should not be supposed that the celestial Ego of man had become a nothing.\n\nIt has remained in him, but in his (personal) life it was then like a nothing.\n\nIt was then hidden in God and inconceivable to man, and without (manifested) life.\" ( Mysterium , xx.\n\n28.) \"The essence of the soul, that issued from the unfathomable will, has not died.\n\nNothing can destroy it.\n\nIt remains for ever a free will.\n\nBut it lost the divine state, wherein was burning the light of God and the fire of His love.\n\nNot that the latter has become a nothing, although within the created soul it became like nothing (unmanifested), and unconscious; but the holy power, that is to say, the spirit of God, which was the active life therein, became hidden.\" ( Grace , vi.\n\n2.) If the soul thus permits her true light and life to be extinguished, then it naturally follows that her opposite power, the principle of wrath, becomes perceptible (conscious) in her.\n\n1 \"As the word or heart of God takes its origin in the light of the majesty, in the eternal fire-tincture of the p.\n\n182 [paragraph continues] Father, likewise is this the case with the image of the soul."

