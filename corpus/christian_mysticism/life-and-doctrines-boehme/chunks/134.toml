[content]
body = "Then, if the will and desire of the soul is directed only to its source, there will arise from the Spirit of Christ a new will and obedience in divine justice, out of the death of the self-will, and not the sinful will.\" ( Regeneration , i.) p.\n\n265 To form a correct conception of the regeneration of man, and of what kind of a being it is which is to be brought to life in us, we must learn to know what is eternity and time, light and darkness, good and evil, and especially the origin and the generation of man.\n\nWe shall then find that man is of a threefold aspect.\n\nIn one aspect he dwells continually in heaven, and is a member of the body of Christ; in another aspect he is subject to the powers of darkness, and in his third aspect he is made of mortal flesh.\n\nNevertheless there are not three men in one human being, but he is only one.\n\nIt is nowhere stated that God is a temple of man, and that we can enter into Him with our human selfhood, however refined that selfhood may be.\n\nThe spiritual regeneration of man is brought about by the divine power of God entering and becoming self-conscious in man, so that his whole being becomes filled with God as the darkness becomes filled with light.\n\n\"We behold the eternal world with its stars, and the four elements wherein man and all creatures live.\n\nThis is not God, and is not called 'God.' God dwells therein, but the essence of the external world does not comprehend Him.\n\nLikewise the light shines into the darkness, and the darkness comprehendeth it not.\" \"God dwells in the world and fills everything; nevertheless He possesses nothing.\n\nThe light dwells within the darkness, but does not own it; day dwells in night and night in the day, time in eternity and eternity in time; and so it is with man.\n\nHe is himself time, and lives within it according to his external aspect, and likewise the external world is existing in time; but the inner man is eternity, and spiritual time and world, such as is created in light according to the love of God, and in darkness according to His wrath.\n\nHis spirit lives in that principle which is manifest in him, either in darkness or in the light.\n\nEach of these dwells within itself; neither possesses the other; but if one enters within the p.\n\n266 other and desires to possess the other, then will the other lose its supremacy and power.\n\nIf the light becomes manifest in the darkness, then the darkness ceases to be darkness; and if the darkness arises within the light, then the light and its power will be extinguished.\n\n\"The eternal darkness of the soul is the kingdom of hell; the eternal light in the soul is her heaven.\n\nMan, therefore, is created of, and lives in three worlds.\n\nOne is the world of eternal darkness that arises from the centre of nature—eternal nature—wherein is born the fire as the eternal torment; the other world is the world of eternal light, wherein resides happiness and the Spirit of God.\n\nIt is in this world of light wherein the Spirit of Christ assumes human substantiality.\n\nThe third world wherein man lives, and from which he was generated, is the external visible world, with its four elements, and the visible stars.\" ( Regeneration , i.) Now the question may be asked, \"By what means can man effect the process of his spiritual regeneration?\" The answer is, that man, not being a god, can accomplish nothing whatever of that kind by his own will or power, and that it can only be accomplished by the unmerited grace of the god in him.\n\nNo one can give unto himself anything which he does not possess; neither can any man attract unto himself by an exercise of his will the sunshine."

