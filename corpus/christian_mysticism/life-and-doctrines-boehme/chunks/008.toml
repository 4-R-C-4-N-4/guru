[content]
body = "1 \"When my spirit, full of sorrow, earnestly, and as if moving in a great storm, arose in God, carrying with it my whole heart and mind, with all my thoughts and with the whole of my will, and when I would not cease to wrestle with the love and mercy of God unless His blessing descended upon me—that is to say, unless He illumined my mind with His Holy Spirit, so that I could understand His will and get rid of my sorrow, then the light of the Spirit broke through the clouds.\n\nWhile in my zeal I powerfully stormed against the portals of hell, as if I had more strength than was in my possession, and willing to risk even my life (all of which would have been impossible to me without the aid of God); then after some hard fights with the powers of darkness, my spirit broke through the doors of hell, and penetrated even into the innermost essence of the newly-born Divinity, where it was received with great love, such as is offered by a bridegroom welcoming his beloved bride.\n\n\"No words can express the great joy and triumph which I then experienced, neither can I compare this gladness to anything except to a state in which life is p.\n\n49 born in the midst of death, or with a resurrection of the dead.\n\nWhile in that state, my spirit immediately saw through everything, and recognised God in all things, even in herbs and grasses, and it knew what is God and what is His will.\n\nThen very soon my will grew in this light, and received a strong impulse to describe the divine state.\" ( Aurora , xix.\n\n4.) 1 Truly, none can enter the kingdom of heaven (meaning spiritual self-knowledge and unspeakable joy) than he who is reborn in the Spirit; but no one can be reborn unless he dies entirely to all sense of self-will, and he then ceases to be a person and becomes pure joy, pure knowledge itself.\n\nIf this truth is once realised, if it is known that a limited personality, subject to the conditions of time and space, cannot embrace infinite wisdom and joy, then it appears self-evident that all the attempts for the attainment of divine wisdom, as long as one clings to self, must necessarily be unsuccessful.\n\nIn fact no one should seek for spiritual knowledge for the purpose of rendering himself knowing and wise, but he should strive after dying within the Christ—that is to say, to become entirely one with divine truth, so that it is not any longer \"he\" who lives, but the truth living in him.\n\nHe should not wish to become celebrated or renowned or self-satisfied, but rather pray that his knowledge should be taken away from him, unless it would lead to the glorification of God in him.\n\nIn short, he should not wish to become anything, but he should be all knowledge, all joy, wisdom, and glory itself.\n\nBoehme says— \"I have never desired to know anything about divine mysteries, neither did I understand how I might seek or find them.\n\nI sought for nothing except the heart of p.\n\n50 [paragraph continues] Jesus Christ (the centre of truth), wherein I might hide myself and find protection from the fearful wrath of God, and I asked God earnestly for His Holy Spirit and mercy, that He might bless and conduct me, and take away from me all that could avert me from Him, so that I might not live in my own will but in His.\n\nWhile engaged in such an earnest seeking and desiring, the door was opened to me, so that in one quarter of an hour I saw and learned more than if I had studied for many years at the universities.\" ( Letters , xii.\n\n6, 7.) \"I am not a master of literature nor of arts, such as belong to this world, but a foolish and simple-minded man."

