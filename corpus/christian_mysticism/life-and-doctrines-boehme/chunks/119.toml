[content]
body = "\"Human reason can understand nothing about the kingdom of Christ, nor about His person or office, because the testament of Christ is celestial, and human reasoning is terrestrial; the latter seeks Christ in time, while He can only be found in eternity.\" \"All misunderstanding is caused by the circumstance that the heaven wherein Christ is seated to the right of God is not understood, and because it is not known that this heaven is in this world, and this world rooted in heaven.\n\nThey are both one in the other, like day and night.\" ( Baptism , i.) 230:1 The spiritual soul does not become an animal soul in man; neither is the former a separate entity to be put into the latter; but as the vibrations of light awaken corresponding vibrations within the ether that is in darkness, so the divine harmony existing in the spiritual soul of the universe awakens corresponding harmonies in the soul of man.\n\n232:1 Perhaps the same idea might be approached by saying: The divine harmony underlying the original order of nature, which was thrown into confusion by the action of an evil will within the seven qualities of eternal nature, created a centre of harmony within the soul of Mary, which, expanding from within outwardly, rendered her whole nature harmonious and spiritual.\n\n233:1 The sunlight of wisdom (self- knowledge and self-perception) is superior to all that is merely imaginary, fanciful, and illusive.\n\nWisdom sees the illusion, but is not captivated by it.\n\n233:2 No soul can become divine or deified by merely contemplating God as if He were something foreign to herself.\n\nGod must become substantial and corporified in her.\n\nThe mere idealist is satisfied with enjoying in his imagination the beauty of the ideal, but does not embody it within himself.\n\nThe so-called \"realist\" is satisfied with what he believes to be real, and acquires nothing better than what he already has.\n\nThe true Christian, i.e.\n\n, the \"ideo-realist,\" seeks to realise the ideal, so that it becomes a part of himself.\n\n235:1 The Manas became absorbed in the Buddhi .\n\n235:2 \"God lives also in man.\" ( Threefold Life , xi.\n\n106.) Each human being (if he is not godless) carries God and the Christ, the Holy Spirit, the virgin Mary, together with the angel Gabriel and all the rest of the angels and spirits within himself.\n\nIt is, therefore, of little use to seek for all that in history.\n\nWe can find it nowhere except within ourselves.\n\n237:1 The divine spirit, i.e.\n\n, the spiritual consciousness of each or any individual person upon this earth, never was, is, or will be imprisoned, incarnated or reincarnated, or absorbed in any material mind or person.\n\nIt for ever remains in heaven, i.e.\n\n, in its own celestial state.\n\nThe mind and the body are merely reflections of the light of the spirit as it shines into \"matter.\" The true Man is in heaven; his shadow walks upon the earth.\n\n237:2 Whenever I speak of the man Christ, and of what a triune God and man He is, I make a distinction between the human creature, that came from us human beings, and the triune Divinity, the revealed word of the power and omnipotence.\n\nNot that they are separated from each other, but the Spirit of God is higher than the being to which that Spirit gives birth in its outbreathed word.\n\nI do not say that the sweet and beloved Christ is the man, but it is the holy sunshine in the flame of love in the p.\n\n238 man; for whenever I see a holy Christian man stand or walk I do not say, \"Here stands or walks Christ;\" but I say, \"Here stands and walks a Christian man in whom shines the sun of Christ.\" ( Stief ."

