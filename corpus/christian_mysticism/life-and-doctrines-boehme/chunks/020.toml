[content]
body = "This eternal will-spirit we know to be God, but the active life of the desire is eternal nature.\" ( Inner Mystery , i.\n\n1; iii.\n\n2.) \"God is from eternity Power and Light, and is therefore called God according to that, but not according to the fire-spirit.\n\nIn regard to the latter, we speak of it not as God, but as 'the wrath of God ' and the consuming part of His power.\n\nThe light of God has also the quality of the fire, but in it the wrath is changed into love; hate and bitter pain into mild beneficence and sweet desire or satisfaction.\" ( Menschwerdung , i.\n\n5–16.) \"The fountain of love is a clasping and keeping of the stern wrathfulness, an overcoming of the harsh p.\n\n70 power, because meekness takes away the rule of the acrid and hard power of the fire.\n\nThe light of peacefulness keeps the darkness imprisoned and resides in the darkness.\n\nThe stern power desires only wrathfulness and imprisonment in death; but the mildness issues like a sweet growth, it blossoms out and overcomes death, giving eternal life.\" ( Threefold Life , ii.\n\n92.) \"When love becomes revealed in light by means of the fire, it streams over nature and penetrates her, like the sunshine penetrating an herb or fire penetrating through iron.\" ( Clavis , viii.\n\n36.) To understand the above it is only necessary to realise these things within one's own being.\n\nTo the speculating intellect they will for ever remain a mystery.\n\nNot in the trunk, the root, the branches, or the leaves, but only in the flower of a plant, can be found the germ that produces the fruit or seed from which a new plant of a similar kind may grow.\n\nLikewise, not in the passions of man, nor in his intellectual acquisitions, but only in the spiritual efflorescence of his soul, exists the germ for the new-born being capable of obtaining consciousness of its own immortality.\n\nFootnotes 59:1 God is unchangeable, and has no beginning in time; the \"beginning \" refers only to the manifestation of His power in nature.\n\nNature resembles a continually revolving wheel, wherein forms in which the power of God becomes manifest are born and die.\n\nThe death of one form is the birth of another.\n\nThus life is born out of death; but that which produces life and causes death is eternal.\n\n61:1 The possibility of a being conceiving of its own self is experienced by its awakening to a consciousness of its own self.\n\n63:1 Terrestrial men and women are male and female organisms, in which the active and passive elements of creation are manifesting themselves in their external expression.\n\nEach man has in him male and female elements.\n\nA woman in whom merely the principle of will were active, without the presence of thought, would be nothing but an accumulation of blind force.\n\np.\n\n64 A man without any female element, i.e.\n\n, without any will, would be like a mirror full of images, but incapable to produce anything.\n\nThe true woman, in the ideal marriage of the soul, has no other thought than that of her husband; neither does the true man will any thing that is not compatible with the desire of his wife.\n\n66:1 Thus divine wisdom in man does not speculate or \"draw logical conclusions,\" neither is it dependent for knowledge on communications received from anybody; but it is the power of the true living faith, i.e.\n\n, the power of the spirit of man to grasp spiritual truths existing within its own self.\n\nNext: Chapter III.\n\nThe Seven Properties or Qualities of Eternal Nature"

