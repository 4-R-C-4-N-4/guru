[content]
body = "Nevertheless he has nothing (objectively), because that which is before Him is nothing in His comprehension, for it does not comprehend Him.\n\nLikewise will this be the state of a person according to his submitted will if he entirely surrenders himself to God.\n\nThen will his will drop back into the unfathomable will of God, wherefrom it came in the beginning, and it will then be in the form of the unfathomable will, wherein God resides and wills.\" ( Mysterium , lxvi.) \"The will, surrendered to God, says, 'Lord, if Thou wishest me to be imprisoned or in misery, I shall willingly be so.\n\nIf Thou takest me to hell I will go with Thee, for Thou art in heaven.\n\nIf I have only Thee, what should I care for either heaven or hell?\n\nEven if my body and soul were to perish, I shall remain in Thee and Thou in me.\n\nIn possessing Thee, I have all that I want.\n\nUse me as Thou wilt.\" ( Mysterium , lxvi.) By conquering the terrestrial desire and entering into submission to Christ, we shall attain the internal power over external nature, first over our own and afterwards over \"outside\" nature, the latter being, after all, also within God, our own divine self.\n\n\"If you rule merely externally (by external means) over all creatures, you are then with your will in an animal quality, and your rule is of an external kind, dealing only with forms.\n\nYour desire will then be carried into the animal essence, which will infect and capture you, and you will receive animal qualities.\n\nBut if you leave that which merely relates to forms, you will become superior to it, and able to rule over all creatures within p.\n\n288 the foundation wherefrom they have been created.\" ( Supersensual Life , viii.) \"If you allow nothing to enter your desire, you will then be free from all things and possess power over all.\n\nYou have then nothing within your receptivity, and are as nothing to all things, and all things will be nothing to you, in the same sense as God rules over all things and sees them all; but there is nothing that comprehends Him.\" ( Supersensual Life , ix.) \"By your own power you cannot attain such a tranquillity that no creature can touch you.\n\nYou must give yourself completely into the life of our Lord Jesus Christ, and surrender to Him all your own willing and desiring, so that you desire nothing without Him.\n\nThen will you be in this world and in its qualities, as far as your body is concerned.\n\nWith your will you will be at the foot of the Cross of Christ, and with your will you will walk in heaven, at the goal from whence all creatures come, and to which they all return.\" ( Supersensual Life , ix.) The celestial body is formed by means of the terrestrial body.\n\nThere is no regeneration after the body has died.\n\n\"The soul proper is nothing corporeal.; but the body in the tincture grows either celestial or infernal.\n\nIt is not a tangible body in an external aspect, but a power-body; the body of God; the celestial body of Christ.\" ( Forty Questions , vii.\n\n18.) \"After this life there is no regeneration, for the four elements with their principles have departed.\" ( Threefold Life , i.\n\n1.) Footnotes 266:1 In the German language the word Gebet (prayer) originates from geben (to give), and means, therefore, a gift or sacrifice to God.\n\nIt does p.\n\n267 not imply the offering of selfish petitions or the asking for personal favours.\n\nHowever, if we give ourselves fully to God, and are accepted by Him, we then become, as it were, a part of God, and consequently a partaker of His divine powers."

