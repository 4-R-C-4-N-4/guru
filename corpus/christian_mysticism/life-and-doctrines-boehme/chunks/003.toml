[content]
body = "7.) \"I do not wish to divert men from the Word as it is written and taught; but my writings are intended to lead them from a merely historical belief to a living faith, even to Jesus Christ (the Light and Truth) Himself.\n\nAll preaching and teaching is in vain if it is mere p.\n\n39 talk, and if the preacher or teacher has not the power of Christ, if not Christ Himself by means of the Word acts within those that teach and within those that listen.\" ( Richter , 45.) By studying a book we may at best imagine what the author believed; but such an imaginary knowledge is not self-knowledge.\n\nReal spiritual knowledge comes only from the awakening of the spirit.\n\n\"I am not collecting my knowledge from letters and books, but I have it within my own self; because heaven and earth with all their inhabitants, and moreover, God Himself, is in man.\" ( Tilk .\n\nii.\n\n297.) The essential man is not limited by the visible physical form of his material body; his spiritual substance extends as far as the stars.\n\nHis true self is the Spirit of God, wherein are existing all worlds.\n\n\"The spirit of man has not merely come from the stars and the elements, but there is hidden within him a spark of the light and the power of God.\n\nIt is not empty talk if Moses (Genesis i.) says God created man in His own image.\n\nTo be His own image created He him.\" ( Aurora , Preface, 96.) The divine Spirit, once awakened in the consciousness of man, knows all things by the knowledge of its own self.\n\n\"The soul searches into the Godhead, and also into the depths of nature; for she has her fountain and origin in the whole of the divine Being.\" ( Aurora , Preface, 98.) \"As the eye of man reaches the stars wherefrom it has its primitive origin, likewise the soul penetrates and sees even within the divine state of being wherein she lives.\" ( Aurora , Preface, 99.) \"Oh, how near is God to all things.\n\nNevertheless, no thing can comprehend Him unless it be tranquil and surrenders to Him its own self-will.\n\nIf this is accomplished, p.\n\n40 then will God be acting through the instrumentality of everything, like the sun that acts throughout the whole world.\" ( Mystery , 45.) \"Why is it that we cannot see God?\n\nThis world and the devil (perverted good) within the wrath of God are the cause that we cannot see with the eyes of God.\n\nThere is no other impediment.\n\nIf any one says, 'I can see nothing divine,' let him understand that flesh and blood and the craftiness of the devil (perverted desires) are to him an obstacle and an impediment.\n\nIf he were to enter the new life, if he were to step below the cross of Christ, he would then be sure to see the Father and his Redeemer the Christ, and also the Holy Ghost.\" ( Menschwerdung , ii.\n\n7.) Let those would-be philosophers who reject God and that which is divine remember that there can be no divine wisdom without something divine, and that man can become divine in no other way than through the power of Divinity.\n\n\"There is no spark of divine life in him who is without God.\n\nFor this it is not God who is to blame, but the person himself.\n\nSuch persons have themselves, and by their own will, entered into that state, and have themselves drowned their higher consciousness, while the precious jewel, although unknown to them, is still hidden within the centre."

