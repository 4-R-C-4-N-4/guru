[content]
body = "will enter the kingdom of heaven, but those who do the will of My Father in heaven.\" It would seem self-evident that no being inferior to the Father in heaven can possibly do the will of the Father, because no one can do the will of God unless he is in possession of p.\n\n269 [paragraph continues] God's will, and thus one with God.\n\nTherefore he who wants to pray truly or to practice \"Yoga\" must enter into heaven; that is to say, into the celestial state of will.\n\nThe new life which is accorded to man by means of his regeneration in the power of faith and prayer is not a mere spirit, but corporeal and substantial.\n\nThe \"body of the resurrection,\" even if it is invisible to mortal eyes, is far more durable and indestructible than any imaginable physical form.\n\n\"While Christ eats the faith and the prayer of our soul, the human faith, together with the prayer and praise of God, become corporeal in the word of the power, and this new being is then one with the substance of the celestial corporeity of Christ, the eternal body of Christ.\" ( Mysterium , lxx.) \"The poor imprisoned soul, shut up within the darkness of death, is a hungering magical fire, which attracts from the incarnation of Christ the reopened substantiality of God, and out of this swallowing or nourishing she produces a body similar to Divinity.\n\nThus, then, the poor soul will be clothed with a body of light, comparable to the fire in a burning wick.\" ( Letters , xi.\n\n21.) \"The new man is not a mere spirit, but he lives in flesh and blood, comparable to gold in a rock, which is not merely spiritual, but has a body; nut only such a body as that of the gross rock, but a body which can stand the test of the fire.\" ( Menschwerdung , i.\n\n4.) The creation of this new body is the beginning of the union of man with divine glory, but it is not the perfection of it.\n\nThe process of regeneration, like that of physical generation, has its stages of development.\n\nUpon the baptism by \"water\" follows that of the \"blood,\" and finally that of the \"fire.\" \"By means of the introduction of the divine will man becomes reunited to God and reborn in his emotional p.\n\n270 nature.\n\nHe then begins to die relatively to the selfishness of the false desire (in him) and to be regenerated in new power.\n\nThere is then still attracted to him the carnal quality, but in the spirit he walks with God, and thus there is born within the earthly man of flesh a new spiritual man with divine perceptions and with a divine will, killing day by day the lust of the flesh, and by divine power rendering the world— i.e.\n\n, the external life—heavenly, and causing heaven— i.e.\n\n, the inner spiritual world—to become visible in the external world, so that God becomes man and man God, until finally the tree reaches its perfection, when the external shell will drop off, and it then stands there as a spiritual tree of life in the garden of God.\" ( Mysterium , Supplement, viii.) This imbibing of the \"Elixir of Life\" no man can accomplish by his own mortal power.\n\nAll he can do is to render himself receptive for the divine power.\n\nThe rest is done by the Spirit of God.\n\nThe new life of the regenerated is during his terrestrial existence continually exposed to great dangers, arising from three sources, namely, from the selfishness of human nature, from the devil (evil will), and from the desires of the mortal flesh and blood.\n\n\"No one should imagine himself to be secure after having once obtained the crown of pearls, for he may lose it again.\n\nThe soul is during her terrestrial life fettered by three fearful chains."

