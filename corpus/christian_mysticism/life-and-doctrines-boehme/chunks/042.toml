[content]
body = "\"In the lightning flash, the fourth form of nature, is the origin of life, and it attains perfection in the constancy of the fire.\n\nHere, in the object of division, is the p.\n\n111 spirit born, and this spirit can either go backwards and enter with his imagination into his mother, the dark world, or move forward, and by means of death sink into the anguish of the fire, and then bloom out into life.\n\nHe is free, and therefore either of these two ways is within his choice.\" ( Theosophical Points , vii.\n\n2.) Every being is free and responsible only according to the degree of its knowledge; not its intellectual knowledge, but according to that which is the result of the experiences of its spirit—its \"conscience.\" \"In the principle of fire is the turning-point.\n\nThere the will may move in whatever direction he chooses.\n\nIf it desires the \"Nothing,\" i.e.\n\n, freedom, it must sacrifice itself to the fire, and sink in the death of that principle.\n\n1 Then the Father, the eternal Will to nature, will put it into the will of the Son; where for the great deal which that being has given, it will receive all; but not to its own honour, but for the glorification and power of God.\n\nWhen this is accomplished, God in such a man is his will and his doing, and his fire becomes a light and a clear mirror; but if he does not will to do so, but wishes to be himself a master, and to possess multiplicity for his own self; then must he enter into the severe astringency, into the world of darkness, and cannot conduct himself in his principles higher than up to the fire, or rather only up to the lightning flash.\n\nHe remains in darkness, because only freedom outside of nature can supply the light and the clearness.\" ( Theosophical Points , vii.\n\n6).\n\nThe fourth form is the object of division after the death of the body, and the centre of consciousness will be either with the higher part or the lower, according to the preponderance of either good or evil.\n\nThe higher p.\n\n112 consciousness enters the light; the lower consciousness continues to exist in its own hell-fire and self-created suffering.\n\nGod \"redeems\" man by redeeming Himself from man's animal elements, to which he is tied during the terrestrial life of the personality.\n\nLucifer could have retained his state of celestial life; it was by his own will that he surrendered himself to the wrath of nature.\n\n\"The life of the eternal creature was in its beginning entirely free, because it was in the appropriate harmonious temperature.\n\nThe angels were created for heaven, and even if the world of darkness with the realm of phantasy was contained therein, it was in latent condition, and not manifest.\n\nBy the action of the free will in the fallen angels the world of darkness became objective in them; because they were inclined towards phantastry (speculation), and consequently the latter took possession of them and arose in their essence.\" ( Grace , iv.\n\n45.) \"One should not think that King Lucifer could not have remained that which he was.\n\nHe had before him the light of the majesty, just like the other throne angels.\n\nIf he had contemplated therein, he would have remained an angel; but because he acted according to his own selfish will, he is now an enemy of the love of God, and of all holy angels.\" ( Menschwerdung , i.\n\n217.) He knew the will of God, and nevertheless acted in opposition to it, and therefore he did not become merely an idiot, but a devil.\n\n\"The realm of illusion has been from eternity, and gave cause to the angels' fall; it presented the conditions without which such a fall from the angelic state could not have taken place; but Lucifer entered into it by his own free will, and without any coercion.\" ( Grace , Vi."

