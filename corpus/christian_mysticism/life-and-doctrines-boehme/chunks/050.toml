[content]
body = "123.) \"The day's works refer to the seven qualities, six of them belonging to the actual regiment, but the seventh, or the essentiality, is that wherein the others are resting; for these qualities have been spoken out by God and rendered visible.\" ( Mysterium , xii.\n\n2.) 1 On the second day a separation took place in the power of the light, of the external material from the inner immaterial water, and the firmament (that which is firm) was put in the middle between these two.\n\n\"The water of life became separated from the water of death; but in such a way that in the time of this world they are linked together like body and soul.\n\nBut the heaven, having been made from the middle-part of the water, is like an abyss between the two, so that the conceivable water is a death, but the inconceivable one is the life.\" ( Aurora , xxi.\n\n7.) \"The water upon the earth is a degenerated and deadly being, like the earth herself.\n\nThis material water, contained within the most external generation, has been separated from the inconceivable one.\" ( Aurora , xx.\n\n27.) \"The water above the firmament is in heaven, and p.\n\n127 the water below the firmament is the material water.\" ( Mysterium , xii.\n\n2 4.) \"The firmament is the connecting link between time and eternity.\n\nGod calls it 'heaven,' and makes a distinction between the waters; which is to indicate that heaven is in the world, but not the world in heaven.\" ( Mysterium , xii.\n\n23.) Thus the mind of man is the connecting link between the celestial and terrestrial state.\n\nHeaven and happiness may be in his mind, but not his mind in an external heaven.\n\nThe spiritual and the material water are not separated from each other in an external manner, or according to locality, but wherever there is the material water, there is also the spiritual one, and it comes to aid the former.\n\n\"When I behold the external water, I am forced to say, 'Here in the water below the firmament is also contained water from above the firmament.' But the firmament is the middle, and the link (dividing line) between time and eternity, so that neither one of them is the other.\n\nBy means of the external eyes, or the eyes of this world, I see only the water below the firmament; but the water above the firmament is that which God in Christ has instituted for the baptism of regeneration.\" ( Mysterium , xii.\n\n26.) \"All the water in this world is degenerated, and therefore the upper water must come to the aid of the earth, and extinguish her fire and pacify her, so that the true water may be born.\" ( Aurora , xx.\n\n33.) Divine inspiration must come to the aid of the material thought, so that heavenly thoughts may be born.\n\nOn the third day the fiery and the watery essence, the firmament of heaven and the earth, entered again in Conjunction, and from this there were born grasses and p.\n\n128 herbs and trees, and at the same time there were also formed gold and silver and ores of various kinds.\n\n1 \"On the second day God separated the watery and the fiery mercury from each other, and called the fiery one the firmament of heaven."

