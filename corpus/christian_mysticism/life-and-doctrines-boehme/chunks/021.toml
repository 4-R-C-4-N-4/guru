body = "Sacred Texts Esoteric Index Previous Next The Life and Doctrines of Jacob Boehme , by Franz Hartmann, [1891], at sacred-texts.com p.\n\n71 CHAPTER III.\n\nTHE SEVEN PROPERTIES OR QUALITIES OF ETERNAL NATURE.\n\n1 I.\n\n♄ ☾ II.\n\n☿ ♃ III.\n\n♂ ♀ IV.\n\n☉ V.\n\n♀ ♂ VI.\n\n♃ ☿ VII.\n\n☾ ♄ When the Eternal One, in its aspect as a Trinity and with reference to divine wisdom, reveals itself on the seven planes of existence, this revelation constitutes seven different rays or states of eternal nature, comparable to the sevenfold scale of colours, tunes, chemical substances, &c., all of which are seven different forms in which the fundamental one is manifesting itself.\n\nOf these seven forms or sourcive states of eternal nature, the first and the seventh refer to the Father, the second and sixth to the Son, the third and fifth to the Holy Spirit, while the fourth represents the balance in which exists the division between spirit and matter.\n\n\"The eternal Essence, being desirous of revealing itself to itself (to attain self-consciousness), had to conceive within itself a will; but as within itself there was no object for its will or desire, except the powerful Word, which in the tranquil eternity did not exist, the seven states of eternal nature had to be born from p.\n\n72 within.\n\nFrom these, then, proceeded, from eternity to eternity, the powerful Word, the power, the heart, and the life of the tranquil eternity and its eternal wisdom.\" ( Threefold Life , iii.\n\n21.) \"The first and the seventh quality must be regarded as one, likewise the second and sixth, and also the third and the fifth; but the fourth is the object of division.\n\nThe first then refers to the Father, the second to the Son, the third to the, Holy Spirit.\" ( Clavis , ix.\n\n75.) By means of the manifestation of these seven qualities of eternal nature the infinity of divine being does not become limited; they are merely seven different forms in which the power of God is manifesting itself, and the existence of each of these seven properties depends on that of the rest.\n\n\"If I speak of the seven states of eternal nature, it is not to be understood as if there were a limitation of the Godhead in regard to object and measure.\n\nIts power and wisdom is without end, without measure and unspeakable.\" ( Mysterium , vii.\n\n17.) \"Do not imagine these seven spirits to be standing one by the side of the other, comparable to the stars, which are seen side by side in the sky; they are all seven like only one spirit.\n\nLikewise the body of man has many organs, but each organ partakes of the power of the rest.\n\n( Aurora , x.\n\n40.) In the same sense we speak of the bones and flesh, the arteries and veins and nerves of a body, all of which go to make up only one organism.\n\nLikewise a picture is made up of many different colours, of which each has a certain individuality of its own, while the sum total is necessary to form one individual picture.\n\n\"As the organs of a man's body love one another, so do the spirits in divine power.\n\nThere is nothing but longing, desiring, and fulfilling, and each triumphs and rejoices in the other.\" ( Aurora , ix.\n\n37.) p.\n\n73 They are like seven living and conscious rays contained within the original colourless ray, and broken into seven different tints by their passage through \"matter.\" \"You must know that one spirit alone cannot generate another, but the birth of one spirit results from the cooperation of all the seven.\n\nSix of them always generate the seventh, and if one of them were absent the others could not be there.\" ( Aurora , x."

