[content]
body = "28.) \"In Paradise the substance of the divine world penetrated the substance belonging to time, comparable to the power of the sun penetrating a fruit growing on a tree, and endowing it with such qualities as render it lovely to the sight and good to the taste.\" ( Mysterium , xvii.\n\n5.) \"Thus the holy divine world was predominant through all the three principles of the human quality, and there was an equal accord, and no enmity or opposite will was manifest betwixt the principles.\" 1 ( Mysterium , xvii.\n\n20.) There were in Paradise all the products which we meet in the terrestrial world, but they were there in a state of ethereality and of supernatural beauty.\n\nThis paradisiacal beauty was, however, not manifested in all parts of the world.\n\n\"In Paradise there are growths, the same as in this world, but not in (terrestrial) tangibility.\n\nThere Heaven is in the place of the earth, the Light of God instead of the sun, and the Eternal Father in the place of the power of the stars.\" ( Three Principles , ix.\n\n20.) \"The Paradise is not anything corporeal or tangible in a terrestrial sense, but its corporeity and tangibility is like that of the angels.\n\nIt is there a clear, p.\n\n147 visible, substance, as if it were material, and it is actually \"material;\" but it is formed only out of the power, without any addition of terrestrial matter, and it is, therefore, perfectly transparent.\" ( Three Principles , ix.\n\n18.) \"The tangible world, or nature, before the time of the wrath of God, was thin, ethereal, lovely, and clear, so that the sourcive spirits could look through everything and penetrate it.\n\nThere were therein neither terrestrial rocks nor earth, and there was no created light needed, such as it is now; but the light was generated in all things in the midst of each thing, and everything was in the light.\" ( Aurora , xviii.\n\n29.) \"The whole world would have been all Paradise if it had not been corrupted by Lucifer.\n\nBut as God knew that Adam was going to fall, it bloomed out in only one place, wherein man might find a suitable dwelling-place, and be fortified therein.\" ( Mysterium , xvii.\n\n7.) \"God saw and knew that man was going to fall, and therefore the Paradise did not bloom and bear fruits in the whole of the world by means of the earth, although it was manifest everywhere, but only in the Garden of Eden, wherein Adam was tempted, did it become revealed in its full magnificence.\" 1 ( Letters , xxxix.\n\n28.) For all that, man, although having been endowed with great splendour by the Creator, did not yet enjoy true similarity with God.\n\n2 \"In Adam was manifest the kingdom of grace, the divine life, because he lived in the temperature (harmony) of the qualities, but he did not know that God was p.\n\n148 revealed in him.\n\nLikewise his self-will did not know that which is good, because it had as yet experienced no evil.\n\nHow could there be any joy where no sorrow is known?\" ( Grace , ix.\n\n15.) \"The soul was in her own essence from eternity, but as a created thing she was formed to represent the image of God at the time of the creation of the body.\n\nNevertheless she is per se not yet the true image, but only an essential fire for its production.\" ( Tilk ., i.\n\n81.) \"The soul of man, which has been breathed into him by God, is from the Eternal Father; but with that she has not yet attained the birth of the Son, wherein is the end of nature, and from which no created being issues.\" ( Three Principles , ix."

