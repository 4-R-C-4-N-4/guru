[content]
body = "109 the spirit of holiness cannot enter unless unholiness is chased away.\n\nIn this battle against evil the angels are always ready to assist man in an invisible manner against the temptations of the \"devils,\" provided that he is willing to receive such an aid.\n\n\"The external nature of this world cannot comprehend the nature of heaven: Both are compared with each other, like death compared with life.\n\nWe cannot see the angels according to our external nature, neither can they be with us externally; but they reside internally with us.\n\nWhenever we battle with the devil they ward off his blows, and thus they take under their protection the soul that aspires for that which is holy.\" ( Aurora , xix.\n\n30.) \"Know that the devil often fights with the angels.\n\nWhen the soul of man is secure in God, then the devil desires to enter; but he is stopped, so that he cannot do what he wills.\n\nWhenever the soul imagines, and lustful desires begin to arise, then is the devil victorious.\" 1 ( Threefold Life , xiv.\n\n13.) \"Each principle is attracted by, knows, and loves that which is like unto its own self.\n\nThe principles existing within the periphery are acting upon their corresponding principles in the centre.\n\nLove acts upon love, hate upon hate; good is attracted by good, and evil by evil.\n\nIf there is no evil desire active in man, evil influences cannot take root in his soul.\n\nThe devil is the poorest of all creatures.\n\nHe cannot move a leaf upon a tree unless the wrath is contained therein.\" ( Theosophical Points , v.\n\n18.) Man without any principle could know nothing; it is always a certain principle in him that recognises its corresponding principle in nature.\n\nA man without love cannot know what love is.\n\nNeither can any one recognise the Christ, or be recognised by Him, unless he has the Christ within his own soul.\n\np.\n\n110 The self-will, i.e.\n\n, the will of God perverted in a created being, is the \"fire-life\" of the latter and the cause of its anguish.\n\nAll the angels have originally been created out of the light; but for the purpose of remaining therein they had to give up to God their fire-life, and not rise up in their self-will against the Lord.\n\n\"Each angel who wishes to live in the light and power of God must give up the selfhood of the dominion of the fire within the desire; he must surrender himself and all that belongs to him to the will of God; he must die in regard to his self-will, and unfold in the light of love as a fruit of divine love, so that the will-spirit (the spiritual will) of God shall rule his life.\" (Stief.\n\nii.\n\n49.) \"The devil was an angel, and it would have been his duty to put his imagination (faith) into the light of God.\n\nIn that case he would have received the divine substantiality in his imagination, and his light would have remained luminous.\n\nThe fire-fountain would have remained in that essence and quality, and he would have remained an angel.\" ( Tilk .\n\ni.\n\n187.) Thus those who crave for intellectual knowledge, while deserting the basis of the true knowledge of God, will ultimately become the victims of their own conceit, and turn into devils.\n\nIn the recognition of good and evil rests the freedom of choice.\n\nThis knowledge is attained by means of the fourth form.\n\nIf that quality has awakened in a being, then may the latter go ahead in a forward direction either toward absolute good or evil until the orbit is reached, where the attraction of one or the other ceases to act.\n\nAs long as this limit is not reached, a being may either enter the divine love-will, or turn in the opposite direction, and sink within the lower qualities of nature."

