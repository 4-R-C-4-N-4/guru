[content]
body = "6.) God had ordered mankind not to eat from the fruits of the tree of temptation; but the devil thought of inducing them to disobey the command, and they were, moreover, p.\n\n160 incited to do so by the spirit of the world, and by their own perverted desire.\n\n\"The holy-speaking Word of God, after the Trinity of the unfathomable Godhead, gave to the fiery intelligence of the soul the command, 'Eat not of the tree of knowledge of good and evil; or, if you do that, you will die in the image of God on the same day.' That is to say, 'the fiery soul will lose her light, and thereby mortality, the quality of the dark world, from the centre of the first three principles, will creep forth and manifest itself in the tree, and swallow up the Kingdom of God therein.'\" ( Grace , vi.\n\n17.) \"When Adam and Eve were in Paradise as man and woman, being still in possession of a celestial essence, although the latter was mixed (with materiality), the devil would not suffer this to be so, for his envy was great.\n\nThen, after Adam had been brought to fall and deprived of his angelic form, and seeing that Eve was his wife, the devil thought that they might generate children in Paradise and remain therein.\n\nHe then made up his mind to seduce them to eat of the forbidden fruit, so that they might become earthly thereby.\" ( Menschwerdung , i.\n\n7.) \"Adam was urged on by the power of the tree, which was also within himself, so that one lust infected another.\n\nHe was also urged by the spirit of the great world, so that his strength became overpowered.\" ( Three Principles , xi.\n\n40.) For the purpose of seducing mankind, the devil availed himself especially of the services of the serpent, which, being a living symbol of the tree of temptation, caused them to imagine that, by eating the forbidden fruit, they would become godlike.\n\n1 \"The devil introduced his poisonous imagination into p.\n\n161 the human quality.\n\nTherefrom resulted in man the ardent desire to eat of evil and good, and to live in the self-will; that is to say, his will left the harmony of unity and went into the multiplicity of the qualities.\n\nThe devil, by means of the serpent, represented to him that he would become like God, and that his eyes would open; which then actually took place in the fall, so that they could now recognise, taste, see, and feel evil and good.\" 1 ( Mysterium , xvii.\n\n37.) \"The devil mixed lies and truth together, and said to the first human beings that they would be like God.\n\nHis meaning was that they would be so, according to the first principle of wrath; but about the Paradise he said nothing.\" ( Three Principles , xvii.\n\n96.) \"The substance of the snake, its celestial aspect, was a great power, as there was likewise a great celestial power in the devil, for he was a prince of God.\n\nThus he introduced his cunning and lies into a strong state of will, for the purpose of making illusions therewith as his own god.\" ( Mysterium , xx.\n\n16.) \"The imagination of the devil poisoned the substance of the serpent, so that the latter, in consequence of the division of its powers that formerly were in paradisiacal unity, formed itself into a serpent.\n\nThus he used the snake as his instrument.\" 2 ( Letters , xxxix.\n\n21.) \"The snake was a living symbol of the tree of temptation.\n\nThe tree of temptation was in mute power, and the serpent was in a living power, and the serpent attached itself to that tree, being of its own nature.\" 3 ( Mysterium , xx.\n\n20.) After Adam had introduced his perverted desire into p."

