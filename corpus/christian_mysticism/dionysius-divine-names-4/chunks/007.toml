[content]
body = "and because It is the Cause of the harmony and splendour in all things, flashing forth upon them all, like light, the beautifying communications of Its originating ray; and because It summons all things to fare unto Itself (from whence It hath the name of “Fairness” 272 272 ὡς πάντα πρὸς ἑαυτὸ καλοῦν (ὅθεν καὶ κάλλος λέγεται).\n\nCf.\n\niv.\n\n4.\n\n), and because It 96 draws all things together in a state of mutual inter penetration.\n\nAnd it is called “Beautiful” because It is All-Beautiful and more than Beautiful, and is eternally, unvaryingly, unchangeably Beautiful; in capable of birth or death or growth or decay; and not beautiful in one part and foul in another; nor yet at one time and not at another; nor yet beautiful in relation to one thing but not to another; nor yet beautiful in one place and not in another (as if It were beautiful for some but were not beautiful for others); nay, on the contrary, It is, in Itself and by Itself, uniquely and eternally beautiful, and from beforehand It contains in a transcendent manner the originating beauty of everything that is beautiful.\n\nFor in the simple and supernatural nature belonging to the world of beautiful things, 273 273 The ultimate nature of all beautiful things is a simple and supernatural Element common to them all and manifested in them all.\n\nThe law of life is that it has its true and ultimate being outside it.\n\nThe true beauty of all beautiful things is outside them in God.\n\nHence all great art (even when not directly religious) tends towards the Supernatural or has a kind of supernatural atmosphere.\n\nall beauty and all that is beautiful hath its unique and pre-existent Cause.\n\nFrom this Beautiful all things possess their existence, each kind being beautiful in its own manner, and the Beautiful causes the harmonies and sympathies and communities of all things.\n\nAnd by the Beautiful all things are united together and the Beautiful is the beginning of all things, as being the Creative Cause which moves the world and holds all things in existence by their yearning for their own Beauty.\n\nAnd It is the Goal of all things, and their Beloved, as being their Final Cause (for ‘tis the desire of the Beautiful that brings them all into existence), and It is their Exemplar 274 274 παραδειγματικόν—i.e.\n\nthe ultimate Law of their being, the Idea or Type.\n\nfrom which they derive their definite limits; and hence the Beautiful is the 97 same as the Good, inasmuch as all things, in all causation, desire the Beautiful and Good; nor is there anything in the world but hath a share in the Beautiful and Good.\n\nMoreover our Discourse will dare to aver that even the Non-Existent 275 275 τὸ μὴ ὄν—i.e.\n\nthat mere nothingness which is manifested either as (1) formless “matter” or (2) evil.\n\nSee Intr., p.\n\n20.\n\nshares in the Beautiful and Good, for Non-Existence 276 276 Evil is non-existent in one sense.\n\nThe Good is Non-Existent in another.\n\nCf.\n\np.\n\n90, n.\n\n1.\n\nis itself beautiful and good when, by the Negation of all Attributes, it is ascribed Super-Essentially to God.\n\nThis One Good and Beautiful is in Its oneness the Cause of all the many beautiful and good things."

