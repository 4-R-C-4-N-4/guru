[content]
body = "For in the case of other qualities, such as heat or cold, the things which have been warmed have their being even when they lose their warmth, and many of the creatures there are which have no life or mind; and in like manner God transcendeth all being and so is Super-Essential; 330 330 God exists without Essence, as an object can exist without this particular quality or that.\n\nand generally, in all other cases, though the quality be gone or hath never been present, the creatures yet have being and can subsist; but that which is utterly bereft of the Good never had, nor hath, nor ever shall have, no nor can have any sort of being whatever.\n\nFor instance, the depraved sinner, though bereft of the Good by his brutish desire, is in this respect unreal and desires unrealities; but still he hath a share in the Good in so far as there is in him a distorted reflection of true Love and Communion.\n\n331 331 D.\n\nis thinking especially of carnal sin.\n\nSuch sin is a depraved form of that which, in its true purity, is a mystery, symbolizing the Unitive Life.\n\nAnd anger hath a share in the Good, in so far as it is a movement which seeks to remedy apparent evils, converting them to that which appears to be fair.\n\nAnd even he that desires the basest life, yet in so far as he feels desire at all and feels desire for life, and intends what he thinks the best kind of life, so far participates in the Good.\n\nAnd if you wholly destroy the Good, there drill be neither being, life, desire, nor motion, or any other thing.\n\nHence the birth of fresh 116 life out of destruction is not the function of evil but is the presence of Good in a lesser form, even as disease is a disorder, yet not the destruction of all order, for if this happen the disease itself will not exist.\n\n332 332 A diseased body still lives.\n\nDeath ends the disease.\n\nBut the disease remains and exists.\n\nIts essence is order reduced to a minimum ; and in this it consists.\n\nFor that which is utterly without the Good hath neither being nor place amongst the things that are in being; but that which is of mixed nature owes to the Good its place among things in being, and hath this place amongst them and hath being just so far as it participates in the Good.\n\nOr rather all things in being will have their being more or less in proportion as they participate in the Good.\n\nFor so far as mere Being is concerned, that which hath not being in any respect will not exist at all; that which hath being in one respect but not in another doth not exist in so far as it hath fallen away from the everlasting Being; while in so far as it hath a share of being, to that extent it exists; and thus both an element of existence and an element of non-existence in it are kept and preserved.\n\nSo too with evil.\n\nThat which is utterly fallen from Good can have no place either in the things which are more good or in the things which are less so.\n\nThat which is good in one respect but not in another is at war with some particular good but not with the whole of the Good.\n\nIt also is preserved by the admixture of the Good, and thus the Good giveth existence to the lack of Itself through some element of Itself being present there.\n\nFor if the Good be entirely removed, there will not remain aught at all, either good or mixed or absolutely bad.\n\nFor if evil is imperfect Goodness, the perfect absence of the Good will remove both the perfect and the imperfect Good, and evil will only exist and appear because, while it is evil in relation to one kind of good (being the contrary 117 thereof), yet it depends for its existence on another kind of good and, to that extent, is good itself."

