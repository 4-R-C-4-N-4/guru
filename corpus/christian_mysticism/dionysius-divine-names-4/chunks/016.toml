body = "let us now yet further resume and compact them all together into the one and concentrated Yearning which is the Father of them all, and let us collect together into two kinds their general desiderative 109 powers, over which the entire mastery and primacy is in that Incomprehensible Causation of all yearning which cometh from Beyond them all, and whereunto the universal yearning of all creatures presseth upwards according to the nature of each.” 17.\n\nWords of the same, from the same Hymns of Yearning “Let us once more collect these powers into one and declare that there is but One Simple Power Which of Itself moveth all things to be mingled in an unity, starting from the Good and going unto the lowest of the creatures and thence again returning through all stages in due order unto the Good, and thus revolving from Itself, and through Itself and upon Itself 322 322 “That which is not” = formless matter.\n\nPlotinus (Enn.\n\ni.\n\n8.\n\n3) defines the Non-Existent as the world of sense-perception.\n\nIt is, as it were, the stuff of which all things perceived by the senses are made.\n\nThis stuff cannot exist without some kind of “form,” and therefore, if entirely bereft of all “form,” would simply disappear into nothingness.\n\nThus, apart from that element of “form” which it derives from the Good, it is sheer Non-Entity.\n\nEach individual thing consists of “matter” and “form”— i.\n\ne.\n\nof this indeterminate “stuff” and of the particular qualities belonging to that thing.\n\nRemove those qualities and the thing is destroyed: e.g.\n\nremove the colours, shape, etc., of a tree, and the tree becomes nonexistent.\n\nIt crumbles into dust, and thus the “stuff” takes on a new form.\n\nIf, as M.\n\nLe Bon maintains, material particles sometimes lose their material qualities and are changed into energy, in such a case the “stuff” takes on yet another kind of form.\n\nThe individual thing, in every case, becomes non-existent when it loses its “form,” or the sum total of its individual qualities, but the “stuff” persists because it at once assumes another “form.” Hence this “stuff,” being non-existent per se , draws its existence from the Good Which is the Source of all “form.” And thus the existence of this non-existent stuff is ultimately contained in the Good.\n\nD.\n\ntries to prove that evil is non-existent by showing that there is nothing that can have produced it.\n\nGood cannot have produced it because a thing cannot produce its own opposite; evil cannot have produced itself because evil is always destructive and never productive.\n\nAll things that exist are produced by the Good or the desire for the Good-which comes to the same thing.\n\nand towards Itself, in an unceasing orbit.” 18.\n\nNow some one, perhaps, will say: “If the 110 Beautiful and Good is an Object of Yearning and desire and love to all (for even that which is not longs for It, as was said, 323 323 The “matter” or stuff of which the universe is made, exists ultimately in the Good, but evil does not.\n\nAll force exists ultimately in the Good, but the warping of it, or the lawlessness of it (which is the evil of it), does not exist in the Good.\n\nForce, or energy, as such is a relative embodiment of the Absolute: evil as such is a contradiction of the Absolute.\n\nand strives to find its rest therein, and thus It creates a form even in formless things and thus is said super-essentially to contain, and does so contain, the non-existent) 324 324 i.\n\ne.\n\nThere is an element of good in evil things enabling them to cohere and so to exist."

