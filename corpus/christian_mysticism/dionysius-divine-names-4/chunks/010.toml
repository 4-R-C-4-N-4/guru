[content]
body = "For from It and through It are all Being and life of spirit and of soul; and hence in the realm of nature magnitudes both small, co-equal and great; hence all the measured order and the proportions of things, which, by their different harmonies, commingle into wholes made up of co-existent parts; hence this universe, which is both One and Many; the conjunctions of parts together; the unities underlying all multiplicity, and the perfections of the individual wholes; hence Quality, Quantity, Magnitude and Infinitude; hence fusions 296 296 συγκρίσεις.\n\nand differentiations, hence all infinity and all limitation; all boundaries, ranks, transcendences, 297 297 ὑπεροχαί.\n\nelements and forms, hence all Being, all Power, all Activity, all Condition, 298 298 ἕξις.\n\nall Perception, all Reason, all Intuition, all Apprehension, all Understanding, All Communion 299 299 ἔνωσις.\n\nThe word is here used in the most comprehensive manner to include physical communion, sense-perception, and spiritual communion of souls with one another and with God.\n\n—in a word, all, that is comes from the Beautiful and Good, hath its very existence in the Beautiful and Good, and turns towards the Beautiful and Good.\n\nYea, all that exists and that comes into being, exists and comes into being because of the Beautiful and Good; and unto this Object all things gaze and by It are moved and are conserved, and for the sake of It, because of It and in It, existeth every originating Principle—be 101 this Exemplar, 300 300 The exemplar is the formal cause before this is actualized in the object embodying it.\n\nThe principle in an oak tree constituting it an oak is the formal cause.\n\nBut before there were any oak trees this principle existed as an exemplar.\n\nThe final cause is the beneficent purpose the oak tree serves.\n\nIn the Aristotelian classification exemplar, and final cause would be classed together as final cause.\n\nor be it Final or Efficient or Formal or Material Cause—in a word, all Beginning, all Conservation, and all Ending, or (to sum it up) all things that have being are derived from the Beautiful and Good.\n\nYea, and all things that have no substantial being 301 301 This means either (1) that actually non-existent things (e.\n\ng.\n\nthe flowers of next year which have not yet appeared, or those of last year, which are now dead) have an eternal place in God; or else (2) that evil things have their true being, under a different form, in Him.\n\nsuper-essentially exist in the Beautiful and Good: this is the transcendent Beginning and the transcendent Goal of the universe.\n\nFor, as Holy Scripture saith: “Of Him, and through Him, and to Him, are all things: to whom be glory for ever.\n\nAmen.” 302 302 Rom.\n\nxi.\n\n36 .\n\nAnd hence all things must desire and yearn for and must love the Beautiful and the Good.\n\nYea, and because of It and for Its sake the inferior things yearn for the superior under the mode of attraction, and those of the same rank have a yearning towards their peers under the mode of mutual communion; and the superior have a yearning towards their inferiors under the mode of providential kindness; and each hath a yearning towards itself under the mode of cohesion, 303 303 In the whole of this passage D.\n\nis thinking primarily of Angels and men, or at least of sentient creatures.\n\nBut he would see analogies of such activity in the inanimate material world."

