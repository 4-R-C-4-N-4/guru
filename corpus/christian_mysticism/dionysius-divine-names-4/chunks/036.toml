[content]
body = "Good cannot have produced it because a thing cannot produce its own opposite; evil cannot have produced itself because evil is always destructive and never productive.\n\nAll things that exist are produced by the Good or the desire for the Good-which comes to the same thing.\n\n323 The “matter” or stuff of which the universe is made, exists ultimately in the Good, but evil does not.\n\nAll force exists ultimately in the Good, but the warping of it, or the lawlessness of it (which is the evil of it), does not exist in the Good.\n\nForce, or energy, as such is a relative embodiment of the Absolute: evil as such is a contradiction of the Absolute.\n\n324 i.\n\ne.\n\nThere is an element of good in evil things enabling them to cohere and so to exist.\n\nIn this passage “Non-Existent” is used in three senses: (1) “Matter,” or force, cannot exist without some form (which is its complement) and therefore is technically called non-existent.\n\n(2) Evil cannot exist at all on the ultimate plane of Being, nor in this world without an admixture of good (which is its contrary) and therefore is in an absolute sense non-existent.\n\n(3) The Good is beyond all existence and therefore is by transcendence Non-Existent.\n\n325 The Good is beyond this world and beyond the stuff, or force, of which this world is made.\n\nEvil, on the other hand, is below this world and the stuff composing it.\n\nGet rid of the limitations in this world ( sc.\n\nthe difference between one quality and another) and you have an energy or force possessing all the particular qualities of things fused in one.\n\nGet rid of the limitations inherent in this ( i.\n\ne.\n\nintensify it to infinity) and you have the Good.\n\nOn the other hand, destroy some particular object ( e.g.\n\na tree), and that object, being now actually non-existent, has still a potential existence in the world-stuff.\n\nDestroy that potential existence and you have absolute non-existence, which is Evil.\n\nThus the three grates may be tabulated as follows: (i) Transcendent Non-Existence (= the Good).\n\n(ii) Actual Non-Existence (=the world stuff, force or energy, of which material particles are a form.\n\nModern science teaches that atoms have no actual existence.\n\nThus the atomic theory has worked round to something very much like D’s theory of the non-existent world stuff).\n\n(iii) Absolute Non-Existence (= Evil).\n\nThe three grades might be expressed by a numerical symbol as follows: If finite numbers represent the various forms of existence, the Infinity (which contradicts the laws of finite numbers) = the Good: Unity (which is a mere abstraction and cannot exist apart from multiplicity since every finite unit is divisible into parts) = the world stuff: Zero (which annihilates all finite numbers that are multiplied by it) = Evil.\n\n326 The argument in the rest of the section is as follows: Evil exists, for there is a radical difference between virtue and vice.\n\nEvil is, in fact, not merely negative, but positive: not merely destructive, but also productive.\n\nAnd hence it is necessary to the perfection of the world.\n\nTo which D.\n\nreplies in the next section that evil does not exist qua evil, nor is it positive or productive qua evil.\n\nIt exists and is positive and productive solely through an admixture of the Good.\n\n(We might illustrate this by the fact that Zero, multiplied by Infinity, produces finite number.) 327 D.\n\nis no pantheist.\n\nAccording to Pantheism God is equally present in all things.\n\nThus Pantheism is a debased form of the Immanence doctrine, as Calvinism is a debased form of the Transcendence doctrine."

