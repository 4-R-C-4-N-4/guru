[content]
body = "(which are not in their essential nature evil, although alleged to be so), the lion, having lost its savage wildness, will be a lion no longer; and the dog, if it become gentle to all, will cease to be a dog, since the virtue of a dog is to watch and to allow its own masters to approach while driving strangers away.\n\nWherefore ‘tis not evil for a creature so to act as preserveth its nature undestroyed; evil is the destruction of its nature, the weakness and deficiency of its natural qualities, activities, and powers.\n\nAnd if all things which the process of generation produces have their goal of perfection in time, then even that which seemeth to be their imperfection is not wholly and entirely contrary to nature.\n\n352 352 i.\n\ne.\n\nThat which is imperfect in them is capable of being made perfect.\n\n26.\n\nNeither inhereth evil in nature as a whole.\n\nFor if all natural laws together come from the universal system of Nature, there is nothing contrary to Nature.\n\n353 353 The sum total of natural laws comes from the ultimate unity of Nature, which comes from the Good.\n\nThus the sum total of natural laws is not, as such, opposed to the ultimate unity of Nature, and therefore is not as such opposed to the Good.\n\nIt is not essentially evil.\n\n124 ’Tis but when we consider the nature of particular thins, that we find one part of Nature to be natural and another part to be unnatural.\n\nFor one thing may be unnatural in one case, and another thing in another case; and that which is natural in one is unnatural in another.\n\n354 354 Cf.\n\nSection 30.\n\nNow the evil taint of a natural force is something unnatural.\n\nIt is a lack of the thing’s natural virtues.\n\nHence, no natural force is evil: the evil of nature lies in a thing’s inability to fulfil its natural functions.\n\n355 355 The argument of the whole passage is that evil is not inherent in the essential nature of things as a whole or of any particular thing.\n\nIt arises in particular things (accidentally, as it were) through their failure to fulfil their true nature.\n\nBut what of this accident?\n\nIs it inherent?\n\nPerhaps we might answer, “Not inherent because capable of being eliminated.” 27.\n\nNeither inhereth evil in our bodies.\n\nFor ugliness and disease are a deficiency in form and a want of order.\n\nBut this is not wholly evil, being rather a lesser good.\n\nFor were there a complete destruction of beauty, form, and order, the very body must disappear.\n\nAnd that the body is not the cause of evil in the soul is plain in that evil can be nigh at hand even without a body, as it is in the devils.\n\nEvil in spirits’ souls and bodies is a weakness and lapse in the condition of their natural virtues.\n\n28.\n\nNor is the familiar notion true that “Evil inheres in matter qua matter.” For matter, too, hath a share in order, beauty, and form.\n\nAnd if matter is without these things, and in itself hath no quality or form, how can it produce anything, since in that case it hath not of itself even the power of suffering any affection?\n\nNay, how can matter be 125 evil?\n\nFor if it hath no being whatever, it is neither good nor evil; but if it hath a kind of being, then (since all things that have being come from the Good) matter must come from the Good.\n\nAnd thus either the Good produces evil ( i.\n\ne.\n\nevil, since it comes from the Good, is good), or else the Good Itself is produced by evil ( i.\n\ne.\n\nthe Good, as coming thus from evil, is evil).\n\nOr else we are driven back again to two principles.\n\nBut if so, these must be derived from some further single source beyond them."

