[content]
body = "cannot be free from pain, nor without a feeling of ill, since there would be something causing Him trouble, yea, all things must in that case be in a state of disorder and perpetual strife; whereas the Good imparts a principle of harmony to all things and is called by the Sacred Writers Peace and the Bestower of Peace.\n\nAnd hence it is that all good things display a mutual attraction and harmony, and are the offspring of one Life and are disposed in fellowship towards one Good, and are kindly, of like nature, and benignant to one another.\n\nAnd so evil is not in God, 339 339 i.\n\ne.\n\nEvil does not arise through the passage of the Good from Super-Essence into Essence.\n\nIt is not in the Good through the Good submitting to the conditions of existence (D.\n\nhas already shown that evil has no place in the ultimate Super-Essential Nature of the Good).\n\nand is not divine.\n\nNor cometh it of God.\n\nFor either He is not good, or else He worketh goodness and bringeth good things unto 119 existence.\n\nNor acts He thus only at some times and not at others, or only in the case of some things but not of all.\n\nFor were He to act thus, He must suffer a change and alteration, and that in respect of the divinest quality of all—causality.\n\nAnd if the Good is in God as His very substance, God must, in changing from the Good, sometimes exist and sometimes not exist.\n\nDoubtless if you feign that He hath the Good by mere participation therein, and derives It from another, in that case He will, forsooth, sometimes possess It and sometimes not possess It.\n\n340 340 This is a reductio ad absurdum.\n\nD.\n\nconsiders it obvious that God possesses the Good as His Substance and not by participation.\n\nThe Persons of the Trinity are not products of the Absolute but Emanations or Differentiations of It.\n\nEvil, therefore, doth not come from God, nor is it in God either absolutely or temporally.\n\n341 341 The argument is as follows: No evil is from God.\n\nAll existence is from God.\n\nTherefore no existence is evil.\n\n22.\n\nNeither inhereth evil in the angels.\n\n342 342 Having shown that existence as such is not inherently evil, D.\n\nnow takes various forms of existence and shows that none of them is, as such, inherently evil.\n\nFor if the good angel declares the Divine Goodness, he is in a secondary manner and by participation that which the Subject of his message is in a primary and causal manner.\n\n343 343 Cf.\n\nOld Testament title, “Sons of God,” and D.\n\non Deification.\n\nCf.\n\nalso “I have said, Ye are Gods.” And thus the angel is an image of God, a manifestation of the invisible light, a burnished mirror, bright, untarnished, without spot or blemish, receiving (if it is reverent to say so) all the beauty of the Absolute Divine Goodness, and (so far as may be) kindling in itself, with unallowed radiance, the Goodness of the Secret Silence.\n\nHence evil inhereth not in the angels; they are evil only in so far as they must punish sinners.\n\nBut in this respect even those who chastise wrong-doers are evil, and so are the priests who exclude the profane man from the Divine 120 Mysteries.\n\nBut, indeed, ‘tis not the suffering of the punishment that is evil but the being worthy thereof; nor yet is a just exclusion from the sacrifices evil, but to be guilty and unholy and unfit for those pure mysteries is evil.\n\n23.\n\nNor are the devils naturally evil."

