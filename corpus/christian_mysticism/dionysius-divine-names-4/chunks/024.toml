[content]
body = "Hence if they are always in the same condition, they are not evil; for to remain always the same is a property of the Good.\n\nBut if they are not always evil, then they are not evil by their natural constitution, but only through a lack of angelic virtues.\n\n350 350 Evil is essentially a negative and self-contradictory thing.\n\nIts very permanence would be opposed to its own nature and would be due to an element of the Good within it.\n\nHence they are not utterly without the Good, seeing that they exist and live and form intuitions and have 122 within them any movement of desire at all; but they are called evil because they fail in the exercise of their natural activity.\n\nThe evil in them is therefore a warping, a declension from their right condition; a failure, an imperfection, an.\n\nimpotence, and a weakness, loss and lapse of that power which would preserve their perfection in them.\n\nMoreover what is the evil in the devils?\n\nBrutish wrath, blind desire, headstrong fancy.\n\nBut these qualities, even though they exist in the devils, are not wholly, invariably, and essentially evil.\n\nFor in other living creatures, not the possession of these qualities but their loss is destructive of the creature and hence is evil; while their possession preserves the creature and enables the creature possessing them to exist.\n\nHence the devils are not evil in so far as they fulfil their nature, but in so far as they do not.\n\nNor hath the Good bestowed complete upon them been changed; rather have they fallen from the completeness of that gift.\n\nAnd we maintain that the angelic gifts bestowed upon their have never themselves suffered change, but are unblemished in their perfect brightness, even if the devils themselves do not perceive it through blinding their faculties of spiritual perception.\n\n351 351 There is a timeless ground in all personalities, and this ground is good.\n\nEckhart and Tauler say, that even the souls in hell possess eternally the divine root of their true being.\n\nRuysbroeck says, this divine root does not of itself make us blessed, but merely makes us exist.\n\nThus, so far as their existence is concerned, they possess it from the Good, and are naturally good, and desire the Beautiful and Good in desiring existence, life, and intuition, which are existent things.\n\nAnd they are called evil through the deprivation and the loss whereby they have lapsed from their proper virtues.\n\nAnd hence they are evil in so far as they do not exist; and in desiring evil they desire that which is non-existent.\n\n24.\n\nBut perhaps some one will say that human 123 souls are the seat of evil.\n\nNow if the reason alleged is that they have contact with evil temptations when they take forethought to preserve themselves therefrom, this is not evil but good and cometh from the Good that turns even evil into good.\n\nBut if we mean the depravation which souls undergo, in what do they undergo depravation except in the deficiency of good qualities and activities and in the failure and fall therefrom due to their own weakness?\n\nEven so we say that the air is darkened around us by a deficiency and absence of the light; while yet the light itself is always light and illuminates the darkness.\n\nHence the evil inhereth not in the devils or in us, as evil, but only as a deficiency and lack of the perfection of our proper virtues.\n\n25.\n\nNeither inhereth evil in the brute beasts.\n\nFor if you take away the passions of anger, desire, etc."

