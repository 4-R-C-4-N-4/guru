body = "Aug., Transcende mundum et sape animum, transcende animum et sape Deum.\n\n307 This shows that the Via Negativa starts from something positive.\n\nIt is a transcendence, not a mere negation.\n\n308 Prov.\n\niv.\n\n6, 8 .\n\n309 ὁ ἐμὸς Ἔρως ἐσταύρωται&gt;.\n\nIgnatius Ep.\n\nad Rom.\n\n§ 6.\n\nBut possibly St.\n\nIgnatius means: “My earthly affections are crucified.” St.\n\nIgnatius wrote just before being martyred, at the beginning of the second century.\n\nThis reference would alone be sufficient to make the authenticity of the Dionysian writings improbable.\n\n[It is perhaps impossible to determine whether Ignatius meant by the words “my Love is crucified” to refer to Jesus or to himself.\n\nThe latter is supported by Zahn and by Lightfoot, the former by Origen, Prologue to Commentary on Canticles.\n\n” Nec pato quod culpari possit, si quis Deum, sicut Joannis, charitatur, ita ipse amorem nominit.\n\nDenejire memini, aliquem sanctorum dixisse Ignatium nomine de Christo: Mens autem amor crucifixus est: nec reprehendi eum per hoc dignum judico.\n\n“ Much further evidence is given in Jacobson’s Apostolic Fathers (p.\n\n377).\n\nJacobson himself supports it, observing that the Greek commemoration of Ignatius takes the words in this sense.\n\nWhether Dionysius followed Origen or not, his exposition is very interesting and is quite possibly the true.\n\nSee also the translator’s note on ἔρως .\n\nEd .] 310 ἐν ταῖς προεισαγωγαῖς τῶν λογίων.\n\nApparently this was a title of the books ascribed to Solomon.\n\nThe present reference is Wisdom viii.\n\n2 .\n\n311 τοῖς θείοις μᾶλλον ἀναθεῖναι τὸν ὄντως ἔρωτα.\n\n312 Earthly desire is below static conditions, the Divine Desire is above them.\n\n313 i.\n\ne.\n\nThe word ἔρως is sometimes used concerning God to stimulate our minds by its unexpectedness and so to make us penetrate beyond the word to the mystery hinted at by it.\n\nOn the other hand ἀγάπη or ἀνάπησις is sometimes used concerning human relationships to prevent any degrading associations from entering in.\n\n314 2 Sam.\n\ni.\n\n26 .\n\n315 καὶ ἐστι τοῦτο δυνάμεως ἑνοποίου καὶ συνδετικῆς καὶ διαφερόντως συγκρατικῆς.\n\n316 This finely suggests that the “Selfhood” of God is selfless.\n\nVide Intr., p.\n\n9.\n\nNote also the combination of rest and motion alluded to here.\n\n317 Yearning is a movement in the soul; the Object of Yearning causes such movement in the soul.\n\n318 Cf.\n\nSt.\n\nThomas Aquinas: Deus movet sicut desideratum a Se Ipso.\n\nCf."

