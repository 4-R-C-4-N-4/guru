[content]
body = "Spenser: “He loved Himself because Himself was fair.” CE Plato’s Doctrine of ἔρως.\n\nThis Yearning is eternally fulfilled in the Trinity.\n\nCf.\n\nDante: ”O somma luce che sofa in Te sidi / sola T’ intendi e da Te intelletta / ed intendente Te ami ed arridi.“ It is struggling towards actualization in this world.\n\n319 i.\n\ne.\n\nThe social instinct in men and animals, and the impulse of mutual attraction in the inanimate world.\n\n320 The manifold yearnings of the spirit for Truth, Beauty, Spiritual Love, etc.\n\n321 i.e.\n\nOf the two classes just alluded to the second is the higher; and of those yearnings which belong to this class the most transcendent are the highest.\n\nReligion is higher than secular life, and the highest element in Religion is other-worldly.\n\nThe received text reads— “The Divine Yearnings in the very core,” etc., οἱ αὐτονόητοι καὶ θεῖοι τῶν ὄντως ἐκεῖ καλῶς ἐρώτων .\n\nI have ventured to amend ἐρώτων to ἔρωτες .\n\nIf the MS.\n\nfrom which the received text is derived belonged to a family having seventeen or eighteen letters to a line then this word would probably come at the end of a line (since there are 260 letters to the end of it, from the beginning of the section), and would have the ὀν- of ὄντως just above it and the -ον- of αὐτονόητοι just above that, and ἐρώτων at the end of the line next but one above that.\n\nThis would make the corruption of ἔρωτες into ἐρώτων very natural.\n\n322 “That which is not” = formless matter.\n\nPlotinus (Enn.\n\ni.\n\n8.\n\n3) defines the Non-Existent as the world of sense-perception.\n\nIt is, as it were, the stuff of which all things perceived by the senses are made.\n\nThis stuff cannot exist without some kind of “form,” and therefore, if entirely bereft of all “form,” would simply disappear into nothingness.\n\nThus, apart from that element of “form” which it derives from the Good, it is sheer Non-Entity.\n\nEach individual thing consists of “matter” and “form”— i.\n\ne.\n\nof this indeterminate “stuff” and of the particular qualities belonging to that thing.\n\nRemove those qualities and the thing is destroyed: e.g.\n\nremove the colours, shape, etc., of a tree, and the tree becomes nonexistent.\n\nIt crumbles into dust, and thus the “stuff” takes on a new form.\n\nIf, as M.\n\nLe Bon maintains, material particles sometimes lose their material qualities and are changed into energy, in such a case the “stuff” takes on yet another kind of form.\n\nThe individual thing, in every case, becomes non-existent when it loses its “form,” or the sum total of its individual qualities, but the “stuff” persists because it at once assumes another “form.” Hence this “stuff,” being non-existent per se , draws its existence from the Good Which is the Source of all “form.” And thus the existence of this non-existent stuff is ultimately contained in the Good.\n\nD.\n\ntries to prove that evil is non-existent by showing that there is nothing that can have produced it."

