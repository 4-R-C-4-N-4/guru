[content]
body = "For, were they such, they would not have sprung from the Good, nor have a place amongst existent creatures, nor have fallen from Goodness (being by their very nature always evil).\n\nMoreover, are they evil with respect to themselves or to others?\n\nIf the former 344 344 i.\n\ne.\n\nIf totally and essentially by very nature evil with respect to themselves.\n\nIn so far as they continue to exist they are good with respect to themselves.\n\nthey must also be self-destructive; if the latter, how do they destroy, and what do they destroy?\n\n345 345 Evil is the contrary of the Good.\n\nHence since the Good is by Its very nature productive, evil must be destructive.\n\nHence the devils, if essentially evil, must be essentially destructive.\n\nNow they are not essentially self-destructive, for, were they such, they could not exist.\n\nTherefore, if essentially evil, they must under all circumstances be destructive of other things.\n\nDo they destroy Essence, or Faculty, or Activity?\n\n346 346 The essence of (e.\n\ng.) an apple-tree is self-identity; its faculty is its latent power of producing leaves, apples, etc.; its activity is the actual production of the leaves, apples, etc.\n\nIf Essence, then, first, they cannot destroy it contrary to its own nature; for they cannot destroy things which by their nature are indestructible, but only the things which are capable of destruction.\n\nAnd, secondly, destruction itself is not evil in every case and under all circumstances.\n\nNor can any existent thing be destroyed so far as its being and nature act; for its destruction is due to a failure of its natural order, whereby the principle of harmony and symmetry grows weak and so cannot remain unchanged.\n\n347 347 (1) The devils do not destroy all things (e.\n\ng.\n\nthey do not annihilate the human soul).\n\nTherefore they are not essentially evil.\n\nEvil passions are good things misdirected.\n\n(2) Often the destruction of a thing is beneficial (e.\n\ng.\n\nthe falling of the faded leaf).\n\nIn fact, nothing could be destroyed if it had not grown feeble and so become worthy to be destroyed.\n\n(D.\n\nhere, in his zeal to explain evil away, countenances the base doctrine that might is right.\n\nWhat is wrong with the whole system of the universe is that its underlying law is the survival of the fittest.\n\nThe enlightened conscience of humanity rebels against this law.) But 121 the weakness is not complete; for, were it complete, it would have annihilated both the process of destruction and the object which suffers it: and such a destruction as this must be self-destructive.\n\nHence such a quality is not evil but imperfect good; for that which is wholly destitute of the Good can have no place among things that have being.\n\n348 348 The weakness is an imperfect good, and therefore the process of destruction which co-operates with the weakness is an imperfect good.\n\nAnd the same is true of destruction when it works upon a faculty or activity.\n\nMoreover, how can the devils be evil since they are sprung from God?\n\nFor the Good produceth and createth good things.\n\nBut it may be said that they are called evil not in so far as they exist (for they are from the Good and had a good existence given them), but in so far as they do not exist, haying been unable (as the Scripture saith) to keep their original state.\n\nFor in what, pray, do we consider the wickedness of the devils to consist except their ceasing from the quality and activity of divine virtues?\n\nOtherwise, if the devils are naturally evil, they must be always evil.\n\nBut evil is unstable.\n\n349 349 The Good is permanent.\n\nHence its contrary must be unstable."

