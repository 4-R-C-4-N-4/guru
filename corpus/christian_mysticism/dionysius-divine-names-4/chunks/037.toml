body = "In the one case we get Immanence without Transcendence: in the other Transcendence without Immanence.\n\nD.\n\nholds a Transcendent Immanence (cf.\n\nBradley, Appearance and Reality, rebutting charge of Pantheism).\n\n328 e.\n\ng.\n\nThe cruelty of Nature seems to show Intelligence; and Intelligence per se is a good thing.\n\n329 All evil things contain the seed of their own decay, and so tend to non-existence.\n\nThe arrogance and cruelty of the Germans has been their weakness, as discipline and self-sacrifice has been their strength.\n\n330 God exists without Essence, as an object can exist without this particular quality or that.\n\n331 D.\n\nis thinking especially of carnal sin.\n\nSuch sin is a depraved form of that which, in its true purity, is a mystery, symbolizing the Unitive Life.\n\n332 A diseased body still lives.\n\nDeath ends the disease.\n\n333 Exuberant vitality is per se a good thing and the more exuberant the better, though, like all good things, it is dangerous, and unless properly directed is disastrous.\n\n334 If good and evil are both existent, they are, to that extent, both of the same kind; which is impossible.\n\n335 So far D.\n\nhas been showing that evil is not an ultimate principle, being neither (1) identical with the Good, nor (2j self-subsistent.\n\nNow he argues that it is not a necessary element in any created thing: neither in their existence as such, nor in any particular kind of creature.\n\n336 D.\n\nrambles characteristically, but the general argument is plain.\n\nAll existence is from the Good.\n\nHence, if evil is inherent in the nature of existence, evil is from the Good.\n\nThus D.\n\nmeets again and proceeds to lay the ghost of a theory which he has already elaborately slain in the previous section.\n\n337 Having just given a metaphysical argument for the non-existence of evil, D.\n\nnow gives an argument drawn from the actual nature of the universe and of God’s creative activity.\n\nThis argument is not so satisfactory as the metaphysical one, for, under all the harmony of the world, there is perpetual strife, and the Cross of Christ reveals God as suffering pain.\n\n“Christ is in an agony and will be till the end of the world” ( Pascal ).\n\nThe metaphysical argument is sound because metaphysics deal with ultimate ideals, and evil is ultimately or ideally non-existent.\n\nThe argument from actual facts is unsound because evil is actually existent.\n\nMuch wrong thinking on the subject of evil is due to a confusion of ideal with actual non-existence.\n\nD.\n\nhere seems to fall into this mistake.\n\n338 D.\n\nhere uses the name “God” because he is thinking of the Absolute or the Good, not in Its ultimate Nature, but in Its emanating or creative activity, in which the Personal Differentiations of the Trinity appear.\n\nSee II.\n\n7.\n\n339 i.\n\ne.\n\nEvil does not arise through the passage of the Good from Super-Essence into Essence.\n\nIt is not in the Good through the Good submitting to the conditions of existence (D.\n\nhas already shown that evil has no place in the ultimate Super-Essential Nature of the Good).\n\n340 This is a reductio ad absurdum.\n\nD.\n\nconsiders it obvious that God possesses the Good as His Substance and not by participation.\n\nThe Persons of the Trinity are not products of the Absolute but Emanations or Differentiations of It.\n\n341 The argument is as follows: No evil is from God.\n\nAll existence is from God.\n\nTherefore no existence is evil.\n\n342 Having shown that existence as such is not inherently evil, D.\n\nnow takes various forms of existence and shows that none of them is, as such, inherently evil.\n\n343 Cf.\n\nOld Testament title, “Sons of God,” and D.\n\non Deification.\n\nCf."

