[content]
body = "Intr., p.\n\n5.\n\n259 Here we get once more the Aristotelian classification of causes.\n\nThe Good is:— (i) Formal Cause (1) immanent in the world (Order— τάξις ); (2) containing the world (Embracing Power— περιοχή ).\n\n(ii) Efficient Cause (Cause— αἰτία ).\n\n(iii) Final Cause (End— τέλος ).\n\n260 The light permeates water but it does not permeate a stone.\n\nIt passes over the stone and permeates the water beyond it.\n\n261 ἀρχισυνάγωγος ἐστι τῶν ἐσκεδασμένων.\n\n262 ὡς ἐν παντοκρατορικῷ πυθμένι.\n\n263 (1) Man, (2) Animal, (3) Vegetable, (4) Matter.\n\n264 This seems to imply that matter itself could not exist without the influence of the light.\n\nPerhaps this belief rests on Gen.\n\ni.\n\n1, 2 .\n\n265 ἥλιος ὅτι πάντα ἀολλῆ ποιεῖ.\n\nWith the naïf etymology cf.\n\niv.\n\n5.\n\n266 Rom.\n\ni.\n\n20 .\n\nThe sun is not personal or supra-personal.\n\nBut its impersonal activity is an emblem, as it were, of God’s supra-personal activity.\n\n267 Two worlds: (1) Nature, (2) Grace.\n\nGod is revealed in both; the former was apparently the subject of the Symbolic Divinity; the latter is that of the present treatise.\n\n268 i.e.\n\nMen and different orders of angels.\n\n269 Material light is diffused in space and hence is divisible.\n\nThe Spiritual Light is indivisible, being totally present to each illuminated mind.\n\nHence the Spiritual Light is simple in a way that the material light is not.\n\n270 All our spiritual and mental powers are due to the same Spiritual Light working in each one of us.\n\nCf.\n\nWordsworth: “Those mysteries of Being which have made and shall continue evermore to make of the whole human race one brotherhood.” 271 Cf.\n\nii.\n\n8.\n\n272 ὡς πάντα πρὸς ἑαυτὸ καλοῦν (ὅθεν καὶ κάλλος λέγεται).\n\nCf.\n\niv.\n\n4.\n\n273 The ultimate nature of all beautiful things is a simple and supernatural Element common to them all and manifested in them all.\n\nThe law of life is that it has its true and ultimate being outside it.\n\nThe true beauty of all beautiful things is outside them in God.\n\nHence all great art (even when not directly religious) tends towards the Supernatural or has a kind of supernatural atmosphere.\n\n274 παραδειγματικόν—i.e.\n\nthe ultimate Law of their being, the Idea or Type.\n\n275 τὸ μὴ ὄν—i.e.\n\nthat mere nothingness which is manifested either as (1) formless “matter” or (2) evil.\n\nSee Intr., p.\n\n20.\n\n276 Evil is non-existent in one sense.\n\nThe Good is Non-Existent in another.\n\nCf.\n\np.\n\n90, n.\n\n1."

