body = "The types of things existent in the permanent spiritual world before the things were created in this transitory material world; the Platonic Ideas.\n\nThere was also a Jewish belief in such a pre-existence of things.\n\nCf.\n\nRev.\n\niv.\n\n11 (R.\n\nV.).] 296 συγκρίσεις.\n\n297 ὑπεροχαί.\n\n298 ἕξις.\n\n299 ἔνωσις.\n\nThe word is here used in the most comprehensive manner to include physical communion, sense-perception, and spiritual communion of souls with one another and with God.\n\n300 The exemplar is the formal cause before this is actualized in the object embodying it.\n\nThe principle in an oak tree constituting it an oak is the formal cause.\n\nBut before there were any oak trees this principle existed as an exemplar.\n\nThe final cause is the beneficent purpose the oak tree serves.\n\nIn the Aristotelian classification exemplar, and final cause would be classed together as final cause.\n\n301 This means either (1) that actually non-existent things (e.\n\ng.\n\nthe flowers of next year which have not yet appeared, or those of last year, which are now dead) have an eternal place in God; or else (2) that evil things have their true being, under a different form, in Him.\n\n302 Rom.\n\nxi.\n\n36 .\n\n303 In the whole of this passage D.\n\nis thinking primarily of Angels and men, or at least of sentient creatures.\n\nBut he would see analogies of such activity in the inanimate material world.\n\n304 εἰς τὸ πρακτικεύεσθαι κατὰ τὴν ἁπάντων γεννητικὴν ὑπερβολήν.\n\nDesire = want.\n\nAnd want in us = imperfection; but in God it = that excess of perfection, whereby God is “Perfectionless.” Thus the words “super-excellence,” “super-unity,” etc., are not meaningless superlatives.\n\nThey imply an impulse towards motion within the Divine Stillness, a Thirst in the Divine Fullness.\n\nCf.\n\nJulian of Norwich Revelations, ch.\n\nxxxi.\n\n” .\n\n.\n\n.\n\nThere is a property in God of thirst and longing.” The categories of Greek Philosophy are static.\n\nThe superlatives of D.\n\nimply something dynamic, though the static element remains.\n\nIn much modern philosophy (the Pragmatists and also Bergson) dynamic conceptions are prominent; but the tendency here is for the static to disappear instead of being subsumed as it is in D.\n\nThe result, or the cause, is that Grace is lost sight of and only Nature is perceived.\n\nReally Absolutism and Pragmatism are not mutually exclusive; for Rest and Motion co-exist as transcended elements in God.\n\nThis is the paradox of perfect Love which is both at rest and in motion, both satisfied and unsatisfied.\n\nCf.\n\nJulian of Norwich: “I had Him and I wanted Him” (Revelations, ch.\n\nx.).\n\n305 θεοειδής..\n\n306 This clause can only have been written by one for whom Unknowing was a personal experience.\n\nThe previous clause shows how there is a negative element even in the Method of Affirmation.\n\nSense-perception must first give way to spiritual intuition, just as this must finally give way to Unknowing.\n\n(Cf.\n\nSt.\n\nJohn of the Cross’s Dark Night, on three kinds of night.) All progress is a transcendence and so, in a sense, a Via Negativa.\n\nCf.\n\nSt."

