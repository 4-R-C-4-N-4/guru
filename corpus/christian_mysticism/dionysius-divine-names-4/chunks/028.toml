body = "Wherefore Its Providential character is shown herein: that It preserves the nature of each individual, and, in making provision for the free and independent, it hath respect unto their state, providing, both in general and in 129 particular, according as the nature of those It cares for can receive Its providential benefactions, which are bestowed suitably on each by Its multiform and universal activity.\n\n34.\n\nThus evil hath no being, nor any inherence in things that have being.\n\nEvil is nowhere qua evil; and it arises not through any power but through weakness.\n\nEven the devils derive their existence from the Good, and their mere existence is good.\n\nTheir evil is the result of a fall from their proper virtues, and is a change with regard to their individual state, a weakness of their true angelical perfections.\n\nAnd they desire the Good in so far as they desire existence, life, and understanding; and in so far as they do not desire the Good, they desire that which bath no being.\n\nAnd this is not desire, but an error of real desire.\n\n35.\n\nBy “men who sin knowingly” Scripture means them that are weak in the exercised knowledge 360 360 περὶ τὴν ἄληστον του ἀγαθοῦ γνῶσιν.\n\nand performance of Good; and by “them that know the Divine Will and do it not,” 361 361 Luke xii.\n\n47 .\n\nit means them that have heard the truth and yet are weak in faith to trust the Good or in action to fulfil it.\n\n362 362 In the previous section D.\n\nhas maintained that all people ultimately desire the Good.\n\nHence it follows that all sin is due to ignorance; for could we all recognize that which we desire we would follow it.\n\nThis raises the question: What, then, does Scripture mean by speaking of men who sin knowingly?\n\nTo this D.\n\nreplies that wilful sin is wilful ignorance.\n\nIt is the failure to exercise the knowledge we possess: as when we know a fact which yet is not actually present to our minds.\n\nWe know (having been taught it) the desirableness of the Good, but we can shut this desirableness out from our minds and refuse to dwell upon it.\n\nIn such a case we refuse to exercise our knowledge.\n\nAnd some desire not to have understanding in order that they may do good, so great is the warping or the weakness of their will.\n\nAnd, in a word, evil (as we have often said) is weakness, impotence, and deficiency of 130 knowledge (or, at least, of exercised knowledge), or of faith, desire, or activity as touching the Good.\n\nNow, it may be urged that weakness should not be punished, but on the contrary should be pardoned.\n\nThis would be just were the power not within man’s grasp; but if the power is offered by the Good that giveth without stint (as saith the Scripture) that which is needful to each, we must not condone the wandering or defection, desertion, and fall from the proper virtues offered by the Good.\n\nBut hereon let that suffice which we have already spoken (to the best of our abilities) in the treatise Concerning Justice and Divine Judgment : 363 363 This treatise is lost.\n\na sacred exercise wherein the Truth of Scripture disallowed as lunatic babbling such nice arguments as despitefully and slanderously blaspheme God."

