[content]
body = "And such was the Incarnate Life of Christ and such is the Life of God in eternity.\n\nSo too the wisdom of Christ is, from a worldly point of view, foolishness.\n\nFor worldly wisdom = self-seeking, but the Wisdom of Christ = self-abandonment.\n\nIn fact Heavenly Wisdom = Love.\n\nCf.\n\n1 Cor.\n\ni.\n\n25 ; iii.\n\n18, 19 .\n\n253 That which Is Not = Evil (vide infra in this chapter).\n\nCf.\n\nIntr., p.\n\n20.\n\nThe Good is Non-Existent as being beyond existence; evil is non-existent as being contrary to it.\n\nThus evil is by its very nature trying as it were to be Good.\n\nThis also looks like a barren paradox and yet it may contain a spiritual truth.\n\nEvil is, in the words of Goethe, “the spirit that denies”: It is destructive, e.\n\ng.\n\ninjustice, cruelty, immorality, etc., undermine or overwhelm civilization and so destroy it.\n\nBut the Good supersedes civilization and so in a sense destroys it.\n\nCf.\n\nthe eschatological teaching of Christ.\n\nCivilization, art, morality, etc., are good so far as they go, but imperfect.\n\nBeing halfway, as it were, between Good and evil, and being of necessity neither wholly the one nor wholly the other, they must disappear wherever the one or the other completely triumphs.\n\nChrist’s teaching on Marriage illustrates this.\n\nMarriage is sacred, and divorce is wrong, because it seeks to abolish Marriage.\n\nAnd yet Marriage is finally abolished in heaven.\n\nSt.\n\nPaul’s antithesis of Law and Spirit is another example.\n\nThe Law is good and yet is not the Good.\n\nSin is contrary to the Law, but the Spirit is contrary to the Law in another sense and so supersedes it.\n\nSo too with art.\n\nA modern vandal is indifferent to beauty because he is below it, a Mediæval Saint became sometimes indifferent to beauty by rising to a super-sensuous plane above it.\n\nGreek idolatry is a higher thing than Calvinism, but the Christianity of the New Testament is a higher thing than Greek idolatry.\n\nThe Saints sometimes employ negatives in one sense and those who are not saints employ the same negatives in another; whence disaster.\n\nMuch of Nietzsche’s language ( e.\n\ng.\n\nthe phrase “Beyond Good and Evil”) might have been used by a Mediæval Christian Mystic; but Nietzsche did not generally mean what the Christian Mystic would have meant by it.\n\nSoo too with pain.\n\nAll pain is in itself bad, being a negation of our personality.\n\nAnd yet a self-abnegation springing from Love which bravely bears pain is the highest kind of Good.\n\n“The devil .\n\n.\n\n.\n\nput it into the heart of Judas to betray” Christ, and yet the Passion was in accordance with “the determinate counsel and foreknowledge of God.” 254 εἰ οὕτε χρὴ φάναι.\n\nD.\n\nis alluding to the ancient belief in the Music of the Spheres.\n\n255 Gen.\n\ni.\n\n16 .\n\n256 μέτρον.\n\nAll things have their pre-existent limits in the Super-Essence.\n\n257 αἰών—i.e.\n\nThe Permanent Principle underlying its temporal process.\n\nThis and the next phrase explain what is meant by the words “the Measure of the universe.” The Good sets bounds to the world (1) temporally, because Eternity is the Fount of Time, (2) spatially, because Transcendent Unity is the Fount of Number.\n\nAll temporal things are permanent in God; and all diversities are one in Him.\n\n258 All number has its roots in the Good.\n\nElsewhere D.\n\nsays that the Good being beyond Unity, is a Multiplicity as well as an Unity.\n\nCf."

