body = "See also the translator’s note on ἔρως .\n\nEd .] And in the “Introductions’ of Scripture 310 310 ἐν ταῖς προεισαγωγαῖς τῶν λογίων.\n\nApparently this was a title of the books ascribed to Solomon.\n\nThe present reference is Wisdom viii.\n\n2 .\n\nthou wilt find some one saying concerning the Divine Wisdom: “I yearned for her beauty.” Let us not, therefore, shrink from this title of “Yearning,” nor be perturbed and affrighted by aught that any man may say about it.\n\nFor methinks the Sacred Writers regard the titles “Love” and “Yearning” as of one meaning; but preferred, when speaking of Yearning in a heavenly sense, to qualify it with the world “real” 311 311 τοῖς θείοις μᾶλλον ἀναθεῖναι τὸν ὄντως ἔρωτα.\n\nbecause of the inconvenient pre-notion of such men.\n\nFor whereas the title of “Real Yearning” is employed not merely by ourselves but even by the Scriptures, mankind (not grasping the unity intended when Yearning is ascribed to God) fell by their own propensity into, the notion 105 of a partial, physical and divided quality, which is not true Yearning but a vain image of Real Yearning, or rather a lapse therefrom.\n\n312 312 Earthly desire is below static conditions, the Divine Desire is above them.\n\nFor mankind at large cannot grasp the simplicity of the one Divine Yearning, and hence, because of the offence it gives to most men, it is used concerning the Divine Wisdom to lead and raise them up to the knowledge of the Real Yearning until they are set free froth all offence thereat; and often on the other hand when it was possible that base minds should suppose that which is not convenient, the word that is held in greater reverence is used concerning ourselves.\n\n313 313 i.\n\ne.\n\nThe word ἔρως is sometimes used concerning God to stimulate our minds by its unexpectedness and so to make us penetrate beyond the word to the mystery hinted at by it.\n\nOn the other hand ἀγάπη or ἀνάπησις is sometimes used concerning human relationships to prevent any degrading associations from entering in.\n\n“Thy love,” says some one, “came upon me like as the love of women.” 314 314 2 Sam.\n\ni.\n\n26 .\n\nTo those who listen aright to Holy Scripture, the word “Love” is used by the Sacred Writers in Divine Revelation with the same meaning as the word “Yearning.” It means a faculty of unifying and conjoining and of producing a special commingling together 315 315 καὶ ἐστι τοῦτο δυνάμεως ἑνοποίου καὶ συνδετικῆς καὶ διαφερόντως συγκρατικῆς.\n\nin the Beautiful and Good: a faculty which pre-exists for the sake of the Beautiful and Good, and is diffused from this Origin and to this End, and holds together things of the same order by a mutual connection, and moves the highest to take thought for those below and fixes the inferior in a state which seeks the higher.\n\n13."

