body = "also “I have said, Ye are Gods.” 344 i.\n\ne.\n\nIf totally and essentially by very nature evil with respect to themselves.\n\nIn so far as they continue to exist they are good with respect to themselves.\n\n345 Evil is the contrary of the Good.\n\nHence since the Good is by Its very nature productive, evil must be destructive.\n\nHence the devils, if essentially evil, must be essentially destructive.\n\nNow they are not essentially self-destructive, for, were they such, they could not exist.\n\nTherefore, if essentially evil, they must under all circumstances be destructive of other things.\n\n346 The essence of (e.\n\ng.) an apple-tree is self-identity; its faculty is its latent power of producing leaves, apples, etc.; its activity is the actual production of the leaves, apples, etc.\n\n347 (1) The devils do not destroy all things (e.\n\ng.\n\nthey do not annihilate the human soul).\n\nTherefore they are not essentially evil.\n\nEvil passions are good things misdirected.\n\n(2) Often the destruction of a thing is beneficial (e.\n\ng.\n\nthe falling of the faded leaf).\n\nIn fact, nothing could be destroyed if it had not grown feeble and so become worthy to be destroyed.\n\n(D.\n\nhere, in his zeal to explain evil away, countenances the base doctrine that might is right.\n\nWhat is wrong with the whole system of the universe is that its underlying law is the survival of the fittest.\n\nThe enlightened conscience of humanity rebels against this law.) 348 The weakness is an imperfect good, and therefore the process of destruction which co-operates with the weakness is an imperfect good.\n\n349 The Good is permanent.\n\nHence its contrary must be unstable.\n\n350 Evil is essentially a negative and self-contradictory thing.\n\nIts very permanence would be opposed to its own nature and would be due to an element of the Good within it.\n\n351 There is a timeless ground in all personalities, and this ground is good.\n\nEckhart and Tauler say, that even the souls in hell possess eternally the divine root of their true being.\n\nRuysbroeck says, this divine root does not of itself make us blessed, but merely makes us exist.\n\n352 i.\n\ne.\n\nThat which is imperfect in them is capable of being made perfect.\n\n353 The sum total of natural laws comes from the ultimate unity of Nature, which comes from the Good.\n\nThus the sum total of natural laws is not, as such, opposed to the ultimate unity of Nature, and therefore is not as such opposed to the Good.\n\nIt is not essentially evil.\n\n354 Cf.\n\nSection 30.\n\n355 The argument of the whole passage is that evil is not inherent in the essential nature of things as a whole or of any particular thing.\n\nIt arises in particular things (accidentally, as it were) through their failure to fulfil their true nature.\n\nBut what of this accident?\n\nIs it inherent?\n\nPerhaps we might answer, “Not inherent because capable of being eliminated.” 356 Matter, it is argued, is evil because the discordant motion of the soul springs from matter.\n\nBut, replies D., matter is necessary for certain kinds of existence.\n\nHence it follows that evil is necessary.\n\nBut this is impossible.\n\n357 D.\n\nis here alluding to the mystical doctrine of the timeless self—the ultimate root of goodness in each individual which remains unchanged by the failures and sins of the temporal self.\n\n358 D.\n\nis arguing with those who hold that evil is in some sense necessary to the existence of the world, and therefore has a permanent place in it.\n\nSin is, they hold, a necessary self-realization of human souls which are in their ultimate essence sinless.\n\nD.\n\nreplies that, if this is so, we cannot explain how goodness can ever be (as it is) a form of self-realization for human souls.\n\n359 i.\n\ne."

