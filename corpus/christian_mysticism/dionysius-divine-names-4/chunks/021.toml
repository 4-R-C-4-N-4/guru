[content]
body = "For things of the same kind cannot 333 333 Exuberant vitality is per se a good thing and the more exuberant the better, though, like all good things, it is dangerous, and unless properly directed is disastrous.\n\nbe wholly contradictory to one another in the same respects.\n\n334 334 If good and evil are both existent, they are, to that extent, both of the same kind; which is impossible.\n\nHence evil is Non-Existent.\n\n21.\n\nNeither inhereth evil in existent creatures.\n\n335 335 So far D.\n\nhas been showing that evil is not an ultimate principle, being neither (1) identical with the Good, nor (2j self-subsistent.\n\nNow he argues that it is not a necessary element in any created thing: neither in their existence as such, nor in any particular kind of creature.\n\nFor if all creatures are from the Good, and the Good is in them all and embraces them all, either evil can have no place amongst the creatures, or else it must have a place in the Good.\n\n336 336 D.\n\nrambles characteristically, but the general argument is plain.\n\nAll existence is from the Good.\n\nHence, if evil is inherent in the nature of existence, evil is from the Good.\n\nThus D.\n\nmeets again and proceeds to lay the ghost of a theory which he has already elaborately slain in the previous section.\n\nNow it cannot inhere in the Good, any more than cold can inhere in fire; just so the quality of becoming evil cannot inhere in that which turns even evil into good.\n\nAnd if evil doth inhere in the Good, what will the mode of its inherence be?\n\nIf you say: It cometh of the Good, I answer: That is absurd and impossible.\n\nFor (as the infallible Scriptures say), a good tree cannot bring forth evil fruit, nor yet is the converse possible.\n\nBut if it cometh not of the Good, it is plainly from another origin and cause.\n\nEither evil must come from the Good, or the Good from evil, or else (if this is impossible} both the Good and evil must be from another origin or cause.\n\nFor no duality can be an origin: same unity must be the origin of all duality.\n\nAnd yet it is absurd to suppose that two entirely 118 opposite things can owe their birth and their being to the same thing.\n\nThis would make the origin itself not a simple unity but divided, double, self-contradictory and discordant.\n\nNor again is it possible that the world should have two contradictory origins, existing in each other and in the whole and mutually at strife.\n\nFor, 337 337 Having just given a metaphysical argument for the non-existence of evil, D.\n\nnow gives an argument drawn from the actual nature of the universe and of God’s creative activity.\n\nThis argument is not so satisfactory as the metaphysical one, for, under all the harmony of the world, there is perpetual strife, and the Cross of Christ reveals God as suffering pain.\n\n“Christ is in an agony and will be till the end of the world” ( Pascal ).\n\nThe metaphysical argument is sound because metaphysics deal with ultimate ideals, and evil is ultimately or ideally non-existent.\n\nThe argument from actual facts is unsound because evil is actually existent.\n\nMuch wrong thinking on the subject of evil is due to a confusion of ideal with actual non-existence.\n\nD.\n\nhere seems to fall into this mistake.\n\nwere this assumed, God 338 338 D.\n\nhere uses the name “God” because he is thinking of the Absolute or the Good, not in Its ultimate Nature, but in Its emanating or creative activity, in which the Personal Differentiations of the Trinity appear.\n\nSee II.\n\n7."

