[content]
body = "Hence comes the bare existence of all things, and hence their unions, 277 277 ἑνώσεις, διακρίσεις, ταὐτότητες, ἑτερότητες.\n\ntheir differentiations, their identities, their differences, 278 278 Hence parts are united into wholes and wholes articulated into parts, and hence each thing is identical with itself and distinct from everything else.\n\ntheir similarities, their dissimilarities, their communions of opposite things, 279 279 e.g.\n\nMoisture interpenetrates the solid earth.\n\nthe unconfused distinctions of their interpenetrating elements; 280 280 e.g.\n\nIn a piece of wet ground the water is water and the earth is earth.\n\nthe providences of the Superiors, 281 281 αἱ πρόνοιαι τῶν ὑπερτέρων.\n\nLit.\n\n“the providences,” etc., e.g.\n\nthe influence of the light without which, D.\n\nholds, the material world could not exist.\n\nOr this and the following may refer to different ranks of angels, or to angels and men.\n\nthe interdependence of the Co-ordinates, the responses of the Inferiors, 282 282 αἱ ἐπιστροφαί τῶν καταδεεστέρων.\n\nLit.\n\n“the conversions,” etc.\n\ne.g.\n\nMatter (according to his theory) responds to the influence of the light.\n\nAnd men are influenced by angels, and the lower angels by the higher.\n\nthe states of permanence wherein all keep their own identity.\n\nAnd hence again the intercommunion of all things according to the power of each; their harmonies and sympathies (which do not merge them) and the co-ordinations of the whole 98 universe; 283 283 The point of this section is that besides the particular and partial harmonies already mentioned, there is a universal harmony uniting the whole world in one system.\n\nthe mixture of elements therein and the indestructible ligaments of things; the ceaseless succession of the recreative process in Minds and Souls and in Bodies; for all have rest and movement in That Which, above all rest and all movement, grounds each one in its own natural laws and moves each one to its own proper movement.\n\n284 284 In the two following sections the difference between angelic and human activity is that the angels confer spiritual enlightenment and men receive it.\n\nAngels are in a state of attainment and men are passing through a process of attainment.\n\n8.\n\nAnd the Heavenly Minds are spoken of as moving (1) in a circular manner, when they are united to the beginningless and endless illuminations of the Beautiful and Good; 285 285 Vide supra on Introversion (p.\n\n88, n.\n\n1).\n\n(2) straight forward, when they advance to the providential guidance of those beneath them and unerringly accomplish their designs; 286 286 They are united to God in the centre of their being, by ceaselessly entering into themselves.\n\nThey help us by going forth, as it were, from themselves.\n\nand (3) with spiral motion, because, even while providentially guiding their inferiors, they remain immutably in their self-identity, 287 287 Their true self-identity is rooted in God.\n\nSee Intr., pp.\n\n31 f.\n\nturning unceasingly around the Beautiful and Good whence all identity is sprung.\n\n9.\n\nAnd the soul hath (1) a circular movement—viz."

