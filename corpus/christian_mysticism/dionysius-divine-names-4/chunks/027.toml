[content]
body = "127 There remains but one alternative: Evil is a weakness and deficiency of Good.\n\n31.\n\nGood things have all one cause.\n\nIf evil is opposed to the Good, then hath evil many causes.\n\nThe efficient causes of evil results, however, are not any laws and faculties, but an impotence and weakness and an inharmonious mingling of discordant elements.\n\nEvil things are not immutable and unchanging but indeterminate and indefinite: the sport of alien influences which have no definite aim.\n\nThe Good must be the beginning and the end even of all evil things.\n\nFor the Good is the final Purpose of all things, good and bad alike.\n\nFor even when we act amiss we do so from a longing for the Good; for no one makes evil his definite object when performing any action.\n\nHence evil hath no substantial being, but only a shadow thereof; since the Good, and not itself, is the ultimate object for which it comes into existence.\n\n32.\n\nUnto evil we can attribute but an accidental kind of existence.\n\nIt exists for the sake of something else, and is not self-originating.\n\nAnd hence our action appears to be right (for it hath Good as its object) while yet it is not really right (because we mistake for good that which is not good).\n\n‘Tis proven, then, that our purpose is different from our action.\n\nThus evil is contrary to progress, purpose, nature, cause, principle, end, law, will, and being.\n\nEvil is, then, a lack, a deficiency, a weakness, a disproportion, an error, purposeless, unlovely, lifeless, unwise, unreasonable, imperfect, unreal, causeless, indeterminate, sterile, inert, powerless, disordered, incongruous, indefinite, dark, unsubstantial, and never in itself possessed of any existence whatever.\n\nHow, 128 then, is it that an admixture of the Good bestows any power upon evil?\n\nFor that which is altogether destitute of Good is nothing and hath no power.\n\nAnd if the Good is Existent and is the Source of will, power, and action, how can Its opposite (being destitute of existence, will, power, and activity), have any power against It?\n\nOnly because evil things are not all entirely the same in all cases and in all relations.\n\n359 359 i.\n\ne.\n\nEvil things are not entirety bad, but are bad only in some partial aspect.\n\nIn the case of a devil evil lieth in the being contrary to spiritual goodness; in the soul it lieth in the being contrary to reason; in the body it lieth in the being contrary to nature.\n\n33.\n\nHow can evil things have any existence at all if there is a Providence?\n\nOnly because evil (as such) hath no being, neither inhereth it in things that have being.\n\nAnd naught that hath being is independent of Providence; for evil hath no being at all, except when mingled with the Good.\n\nAnd if no thing in the world is without a share in the Good, and evil is the deficiency of Good and no thing in the world is utterly destitute of Good, then the Divine Providence is in all things, and nothing that exists can be without It.\n\nYea, even the evil effects that arise are turned by Providence to a kindly purpose, for the succour of themselves or others (either individually or in common), and thus it is that Providence cares individually for each particular thing in all the world.\n\nTherefore we shall pay no heed to the fond argument so often heard that “Providence shall lead us unto virtue even against our will.” ‘Tis not worthy of Providence to violate nature."

