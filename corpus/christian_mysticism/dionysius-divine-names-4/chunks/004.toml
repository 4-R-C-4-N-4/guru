[content]
body = "Nay, even the foundation and the boundaries of the heavens (as we forgot to say while 91 thinking of other matters) owe their origin to the Good.\n\nSuch is this universe, which lessens not nor grows, and such the noiseless movements (if noiseless they be) 254 254 εἰ οὕτε χρὴ φάναι.\n\nD.\n\nis alluding to the ancient belief in the Music of the Spheres.\n\nof the vast heavenly revolution, and such the starry orders whose light is fixed as an ornament of heaven, and such the various wanderings of certain stars—especially the repeated and returning orbits of those two luminaries to which the Scripture giveth the name of “Great,” 255 255 Gen.\n\ni.\n\n16 .\n\nwhereby we reckon our days and nights and months and years; which define the round of time and temporal events and give them measurement, sequence, and cohesion.\n\nAnd what shall I say concerning the sun’s rays considered in themselves?\n\nFrom the Good comes the light which is an image of Goodness; wherefore the Good is described by the name of “Light,” being the archetype thereof which is revealed in that image.\n\nFor as the Goodness of the all-transcendent Godhead reaches from the highest and most perfect forms of being unto the lowest, and still is beyond them all, remaining superior to those above and retaining those below in its embrace, and so gives light to all things that can receive It, and creates and vitalizes and maintains and perfects them, and is the Measure 256 256 μέτρον.\n\nAll things have their pre-existent limits in the Super-Essence.\n\nof the Universe and its Eternity, 257 257 αἰών—i.e.\n\nThe Permanent Principle underlying its temporal process.\n\nThis and the next phrase explain what is meant by the words “the Measure of the universe.” The Good sets bounds to the world (1) temporally, because Eternity is the Fount of Time, (2) spatially, because Transcendent Unity is the Fount of Number.\n\nAll temporal things are permanent in God; and all diversities are one in Him.\n\nits Numerical Principle, 258 258 All number has its roots in the Good.\n\nElsewhere D.\n\nsays that the Good being beyond Unity, is a Multiplicity as well as an Unity.\n\nCf.\n\nIntr., p.\n\n5.\n\nits Order, its 92 Embracing Power, its Cause and its End: 259 259 Here we get once more the Aristotelian classification of causes.\n\nThe Good is:— (i) Formal Cause (1) immanent in the world (Order— τάξις ); (2) containing the world (Embracing Power— περιοχή ).\n\n(ii) Efficient Cause (Cause— αἰτία ).\n\n(iii) Final Cause (End— τέλος ).\n\neven so this great, all-bright and ever-shining sun, which is the visible image of the Divine Goodness, faintly reechoing the activity of the Good, illumines all things that can receive its light while retaining the utter simplicity of light, and expands above and below throughout the visible world the beams of its own radiance.\n\nAnd if there is aught that does not share them, this is not due to any weakness or deficiency in its distribution of the light, but is due to the unreceptiveness of those creatures which do not attain sufficient singleness to participate therein.\n\nFor verily the light passeth over many such substances and enlightens those which are beyond them, and there is no visible thing unto which the light reacheth not in the exceeding greatness of its proper radiance."

