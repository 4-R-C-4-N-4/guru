[content]
body = "In this present treatise we have, to the best of our abilities, celebrated the Good as truly Admirable, as the Beginning and the End of all things, as the Power that embraces them, as That Which gives form to non-existent things, as That which causes all good things and yet causes no evil things, as perfect Providence and Goodness surpassing all things that are and all that are not, and turning base things and the lack of Itself unto good, as That Which all must desire, yearn for, and love; and as possessed of many other qualities the which a true argument hath, methinks, in this chapter expounded.\n\n243 ὡς οὐσιῶδις ἀγαθύν.\n\n244 God’s activity cannot be distinguished from Himself.\n\nCf.\n\np.\n\n81, n.\n\n4.\n\nGod acts simply by being what He is—by being Good.\n\nThis fits in with the doctrine that He creates the world as being the Object of its desire.\n\nHe attracts it into existence.\n\n245 αἱ νοηταὶ καὶ νοεραὶ πᾶσαι καὶ οὐσίαι καὶ δυνάμεις καὶ ἐνέργειαι.\n\nAngels and men are percipient Essences; their powers when quiescent or dormant on the one hand and active on the other are respectively percipient faculties and activities.\n\nBut angels and men with their faculties and activities can also be perceived.\n\nCf.\n\nnext sentence.\n\n246 This doctrine may be based on some psychic experience enjoyed by D.\n\nor recounted to him.\n\nGeorge Fox received an experience of this kind in which he had an intuitive knowledge concerning the hidden properties of plants.\n\nSee his Diary near the beginning.\n\n247 Lit.\n\n“Revolutions.” (αἱ .\n\n.\n\n.\n\nπερὶ ἑαυτὰς ἀμετάπτωτοι συνελίξεις.) In Dante’s Paradiso the souls of the Redeemed all move with a circular motion.\n\nThis symbolizes an activity of spiritual concentration.\n\nCf.\n\niv.\n\n8, 9.\n\n248 The Celestial Hierarchy is among D’s extant works.\n\nIt is referred to by Dante and was the chief source of medieval angelology.\n\n249 τὴν οὐσιώδη ζωήν—i.\n\ne.\n\nlife as such, mere life, the life which they share with animals and plants.\n\n250 The existence of the whole creation—angels, men, animals, and vegetables, dead matter—is in the Good.\n\nIt has not, in the ordinary sense, made them, but they are grounded in It and draw their existence from it and would not exist but for it.\n\nThey exist not through any particular activity It exerts but solely because It Is.\n\n251 “Being” implies finite relations; for one thing must be distinguished from another.\n\nIf a thing is itself, it is not something else; this thing is not that.\n\nThe Good is beyond this distinction, for nothing (on the ultimate plane) is outside It.\n\nSee Intr., p.\n\n5.\n\n252 This apparently profitless speculation really suggests profound spiritual mysteries.\n\nLove is the one reality and love is self realization through self-sacrifice.\n\nWe must lose our life to find it.\n\nWe must, through the excess of spiritual life within us, seek to be (as it were) lifeless, so that this excess of life may still be ours."

