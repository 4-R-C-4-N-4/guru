[content]
body = "And the Divine Yearning brings ecstasy, not allowing them that are touched thereby to belong unto themselves but only to the objects of their affection.\n\nThis principle is shown by superior things 106 through their providential care for their inferiors, and by those which are co-ordinate through the mutual bond uniting them, and by the inferior through their diviner tendency towards the highest.\n\nAnd hence the great Paul, constrained by the Divine Yearning, and having received a share in its ecstatic power, says, with inspired utterance, “I live, and yet not I but Christ liveth in me”: true Sweetheart that he was and (as he says himself) being beside himself unto God, and not possessing his own life but possessing and loving the life of Him for Whom he yearned.\n\nAnd we must dare to affirm (for ‘tis the truth) that the Creator of the Universe Himself, in His Beautiful and Good Yearning towards the Universe, is through the excessive yearning of His Goodness, transported outside of Himself in His providential activities towards all things that have being, and is touched by the sweet spell of Goodness, Love and Yearning, and so is drawn from His transcendent throne above all things, to dwell within the heart of all things, through a super-essential and ecstatic power whereby He yet stays within Himself 316 316 This finely suggests that the “Selfhood” of God is selfless.\n\nVide Intr., p.\n\n9.\n\nNote also the combination of rest and motion alluded to here.\n\nHence Doctors call Him “jealous,” because He is vehement in His Good Yearning towards the world, and because He stirs men up to a zealous search of yearning desire for Him, and thus shows Himself zealous inasmuch as zeal is always felt concerning things which are desired, and inasmuch as He hath a zeal concerning the creatures for which He careth.\n\nIn short, both the Yearning and its Object belong to the Beautiful and the Good, and have therein their pre-existent roots and because of it exist and come into being.\n\n14.\n\nBut why speak the Sacred Writers of God sometimes as Yearning and Love, sometimes as the 107 Object of these emotions?\n\nIn the one case He is the Cause and Producer and Begetter of the thing signified, in the other He is the Thing signified Itself.\n\nNow the reason why He is Himself on the one hand moved by the quality signified, and on the other causes motion by it, 317 317 Yearning is a movement in the soul; the Object of Yearning causes such movement in the soul.\n\nis that He moves and leads onward Himself unto Himself.\n\n318 318 Cf.\n\nSt.\n\nThomas Aquinas: Deus movet sicut desideratum a Se Ipso.\n\nCf.\n\nSpenser: “He loved Himself because Himself was fair.” CE Plato’s Doctrine of ἔρως.\n\nThis Yearning is eternally fulfilled in the Trinity.\n\nCf.\n\nDante: ”O somma luce che sofa in Te sidi / sola T’ intendi e da Te intelletta / ed intendente Te ami ed arridi.“ It is struggling towards actualization in this world.\n\nTherefore on the one hand they call Him the Object of Love and Yearning as being Beautiful and Good, and on the other they call Him Yearning and Love as being a Motive-Power leading all things to Himself, Who is the only ultimate Beautiful and Good—yea, as being His own Self-Revelation and the Bounteous Emanation of His own Transcendent Unity, a Motion of Yearning simple, self-moved, self-acting, pre-existent in the Good, and overflowing from the Good into creation, and once again returning to the Good."

