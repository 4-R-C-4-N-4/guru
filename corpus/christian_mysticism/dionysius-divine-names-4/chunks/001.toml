body = "CHAPTER IV Concerning ” Good ,” ” Light ,” ” Beautiful ,” “ Desire ,” ” Ecstasy ,” “ Jealousy .” Also that Evil is neither existent nor Sprung from anything existent nor inherent in existent things .\n\n1.\n\nNow let us consider the name of “Good” which the Sacred Writers apply to the Supra-Divine Godhead in a transcendent manner, calling the Supreme Divine Existence Itself “Goodness” (as it seems to me) in a sense that separates It from the whole creation, and meaning, by this term, to indicate that the Good, under the form of Good-Being, 243 243 ὡς οὐσιῶδις ἀγαθύν.\n\nextends Its goodness by the very fact of Its existence unto all 87 things.\n\n244 244 God’s activity cannot be distinguished from Himself.\n\nCf.\n\np.\n\n81, n.\n\n4.\n\nGod acts simply by being what He is—by being Good.\n\nThis fits in with the doctrine that He creates the world as being the Object of its desire.\n\nHe attracts it into existence.\n\nFor as our sun, through no choice or deliberation, but by the very fact of its existence, gives light to all those things which have any inherent power of sharing its illumination, even so the Good (which is above the sun, as the transcendent archetype by the very mode of its existence is above its faded image) sends forth upon all things according to their receptive powers, the rays of Its undivided Goodness.\n\nThrough these all Spiritual Beings and faculties and activities (whether perceived or percipient 245 245 αἱ νοηταὶ καὶ νοεραὶ πᾶσαι καὶ οὐσίαι καὶ δυνάμεις καὶ ἐνέργειαι.\n\nAngels and men are percipient Essences; their powers when quiescent or dormant on the one hand and active on the other are respectively percipient faculties and activities.\n\nBut angels and men with their faculties and activities can also be perceived.\n\nCf.\n\nnext sentence.\n\n) began; through these they exist and possess a life incapable of failure or diminution, and are untainted by any corruption or death or materiality or birth, being separate above all instability and flux and restlessness of change.\n\nAnd whereas they are bodiless and immaterial they are perceived by our minds, and whereas they are minds themselves, they possess a supernatural perception and receive an illumination (after their own manner) concerning the hidden nature of things, 246 246 This doctrine may be based on some psychic experience enjoyed by D.\n\nor recounted to him.\n\nGeorge Fox received an experience of this kind in which he had an intuitive knowledge concerning the hidden properties of plants.\n\nSee his Diary near the beginning.\n\nfrom whence they pass on their own knowledge to other kindred spirits.\n\nTheir rest is in the Divine Goodness, wherein they are grounded, and This Goodness maintains them and protects them and feasts them with Its good things.\n\nThrough desiring this they possess their being and their blessedness, and, being conformed thereto (according 88 to their powers, they are goodly, and, as the Divine Law commands, pass on to those that are below them, of the gifts which have come unto them from the Good.\n\n2."

