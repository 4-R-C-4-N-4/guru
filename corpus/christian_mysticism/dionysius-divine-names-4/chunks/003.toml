body = "The Good is beyond this distinction, for nothing (on the ultimate plane) is outside It.\n\nSee Intr., p.\n\n5.\n\nand Lifelessness an excess of Life and Its Mindless state is an excess of Wisdom, 252 252 This apparently profitless speculation really suggests profound spiritual mysteries.\n\nLove is the one reality and love is self realization through self-sacrifice.\n\nWe must lose our life to find it.\n\nWe must, through the excess of spiritual life within us, seek to be (as it were) lifeless, so that this excess of life may still be ours.\n\nAnd such was the Incarnate Life of Christ and such is the Life of God in eternity.\n\nSo too the wisdom of Christ is, from a worldly point of view, foolishness.\n\nFor worldly wisdom = self-seeking, but the Wisdom of Christ = self-abandonment.\n\nIn fact Heavenly Wisdom = Love.\n\nCf.\n\n1 Cor.\n\ni.\n\n25 ; iii.\n\n18, 19 .\n\nand all the Attributes of 90 the Good we express in a transcendent manner by negative images.\n\n253 253 That which Is Not = Evil (vide infra in this chapter).\n\nCf.\n\nIntr., p.\n\n20.\n\nThe Good is Non-Existent as being beyond existence; evil is non-existent as being contrary to it.\n\nThus evil is by its very nature trying as it were to be Good.\n\nThis also looks like a barren paradox and yet it may contain a spiritual truth.\n\nEvil is, in the words of Goethe, “the spirit that denies”: It is destructive, e.\n\ng.\n\ninjustice, cruelty, immorality, etc., undermine or overwhelm civilization and so destroy it.\n\nBut the Good supersedes civilization and so in a sense destroys it.\n\nCf.\n\nthe eschatological teaching of Christ.\n\nCivilization, art, morality, etc., are good so far as they go, but imperfect.\n\nBeing halfway, as it were, between Good and evil, and being of necessity neither wholly the one nor wholly the other, they must disappear wherever the one or the other completely triumphs.\n\nChrist’s teaching on Marriage illustrates this.\n\nMarriage is sacred, and divorce is wrong, because it seeks to abolish Marriage.\n\nAnd yet Marriage is finally abolished in heaven.\n\nSt.\n\nPaul’s antithesis of Law and Spirit is another example.\n\nThe Law is good and yet is not the Good.\n\nSin is contrary to the Law, but the Spirit is contrary to the Law in another sense and so supersedes it.\n\nSo too with art.\n\nA modern vandal is indifferent to beauty because he is below it, a Mediæval Saint became sometimes indifferent to beauty by rising to a super-sensuous plane above it.\n\nGreek idolatry is a higher thing than Calvinism, but the Christianity of the New Testament is a higher thing than Greek idolatry.\n\nThe Saints sometimes employ negatives in one sense and those who are not saints employ the same negatives in another; whence disaster.\n\nMuch of Nietzsche’s language ( e.\n\ng.\n\nthe phrase “Beyond Good and Evil”) might have been used by a Mediæval Christian Mystic; but Nietzsche did not generally mean what the Christian Mystic would have meant by it.\n\nSoo too with pain.\n\nAll pain is in itself bad, being a negation of our personality.\n\nAnd yet a self-abnegation springing from Love which bravely bears pain is the highest kind of Good.\n\n“The devil .\n\n.\n\n.\n\nput it into the heart of Judas to betray” Christ, and yet the Passion was in accordance with “the determinate counsel and foreknowledge of God.” And if it is reverent so to say, even that which is not desires the all-transcendent Good and struggles itself, by its denial of all things, to find its rest in the Good which verily transcends all being.\n\n4."

