body = "277 ἑνώσεις, διακρίσεις, ταὐτότητες, ἑτερότητες.\n\n278 Hence parts are united into wholes and wholes articulated into parts, and hence each thing is identical with itself and distinct from everything else.\n\n279 e.g.\n\nMoisture interpenetrates the solid earth.\n\n280 e.g.\n\nIn a piece of wet ground the water is water and the earth is earth.\n\n281 αἱ πρόνοιαι τῶν ὑπερτέρων.\n\nLit.\n\n“the providences,” etc., e.g.\n\nthe influence of the light without which, D.\n\nholds, the material world could not exist.\n\nOr this and the following may refer to different ranks of angels, or to angels and men.\n\n282 αἱ ἐπιστροφαί τῶν καταδεεστέρων.\n\nLit.\n\n“the conversions,” etc.\n\ne.g.\n\nMatter (according to his theory) responds to the influence of the light.\n\nAnd men are influenced by angels, and the lower angels by the higher.\n\n283 The point of this section is that besides the particular and partial harmonies already mentioned, there is a universal harmony uniting the whole world in one system.\n\n284 In the two following sections the difference between angelic and human activity is that the angels confer spiritual enlightenment and men receive it.\n\nAngels are in a state of attainment and men are passing through a process of attainment.\n\n285 Vide supra on Introversion (p.\n\n88, n.\n\n1).\n\n286 They are united to God in the centre of their being, by ceaselessly entering into themselves.\n\nThey help us by going forth, as it were, from themselves.\n\n287 Their true self-identity is rooted in God.\n\nSee Intr., pp.\n\n31 f.\n\n288 ἡ εἰς ἑαυτὴν εἴσοδος.\n\n289 In souls being unified and simplified.\n\nSee Intr., p.\n\n25.\n\n290 Cf.\n\nSt.\n\nAug.\n\n”ascendat per se supra se.“ 291 i.\n\ne.\n\nTo the Angels and the perfected Saints.\n\nThere is a somewhat similar thought in Wordsworth’s Prelude: “To hold fit converse with the spiritual world / and with the generations of mankind / spread over time past, present, and to come / age after age till time shall be no more.” This thought in Wordsworth and in D.\n\nis an experience and not a speculation.\n\n292 This spiritual unity was by later Mystical writers called the apex of the soul, or the ground, or the spark.\n\nAnother name is synteresis or synderesis.\n\n293 There is an element of intuition in all discursive reasoning because all argument is based on certain axioms which are beyond proof (e.\n\ng.\n\nthe law of universal causation).\n\nIn fact the validity of our laws of thought is an axiom and therefore perceived by intuition.\n\nIn the present passage D.\n\nmeans something deeper.\n\nHe means that formal Dogmatic Theology advances round a central core of spiritual experience by which it must constantly be verified, Pectus facit theologum.\n\nWhenever theology even attempts to be purely deductive it goes wrong (e.\n\ng.\n\nCalvinism).\n\nIf it is not rooted in intuition it will be rooted in fancies.\n\n294 In D.‘s classification Introversion and Sensation are both unmixed movements, for each leads to a kind of perception.\n\nDiscursive reasoning is a mixed movement because it does not lead to a direct perception and yet it must contain an element of perception.\n\n295 i.e."

