[content]
body = "260 260 The light permeates water but it does not permeate a stone.\n\nIt passes over the stone and permeates the water beyond it.\n\nYea, and it contributes to the birth of material bodies and brings them unto life, and nourishes them that they may grow, and perfects and purifies and renews them.\n\nAnd the light is the measure and the numerical principle of seasons and of days and of all our earthly Time; for ‘tis the selfsame light (though then without a form) which, Moses the Divine declares, marked even that first period of three days which was at the beginning of time.\n\nAnd like as Goodness draweth all things to Itself, and is the great Attractive Power which unite things that are sundered 261 261 ἀρχισυνάγωγος ἐστι τῶν ἐσκεδασμένων.\n\n(being as It is: the Godhead and the Supreme Fount and Producer of Unity); 93 and like as all things desire It as their beginning, their cohesive power and end; and like as ‘tis the Good (as saith the Scripture) from which all things were made and are (having been brought into existence thence as from a Perfect Cause); and like as in the Good all things subsist, being kept and controlled in an almighty Receptacle; 262 262 ὡς ἐν παντοκρατορικῷ πυθμένι.\n\nand like as unto the Good all things are turned (as unto the proper End of each) ; and like as after the Good all things do yearn—those that have mind and reason seeking It by knowledge, those that have perception seeking It by perception, those that have no perception seeking It by the natural movement of their vital instinct, and those that are without life and have mere existence seeking It by their aptitude for that bare participation whence this mere existence is theirs 263 263 (1) Man, (2) Animal, (3) Vegetable, (4) Matter.\n\n—even so doth the light (being as it were Its visible image) draw together all things and attract them unto Itself: those that can see, those that have motion, those that receive Its light and warmth, those that are merely held in being by Its rays; 264 264 This seems to imply that matter itself could not exist without the influence of the light.\n\nPerhaps this belief rests on Gen.\n\ni.\n\n1, 2 .\n\nwhence the sun is so called because it summeth 265 265 ἥλιος ὅτι πάντα ἀολλῆ ποιεῖ.\n\nWith the naïf etymology cf.\n\niv.\n\n5.\n\nall things and uniteth the scattered elements of the world.\n\nAll material things desire the sun, for they desire either to see or to move and to receive light and warmth and to be maintained in existence by the light.\n\nI say not (as was feigned by the ancient myth) that the sun is the God and Creator of this Universe, and therefore takes the visible world under his special care; but I say that the “invisible things of God from the creation of the world are clearly seen, being understood by the things 94 that are made, even His eternal power and Godhead.” 266 266 Rom.\n\ni.\n\n20 .\n\nThe sun is not personal or supra-personal.\n\nBut its impersonal activity is an emblem, as it were, of God’s supra-personal activity.\n\n5."

