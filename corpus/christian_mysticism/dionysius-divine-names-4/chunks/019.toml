[content]
body = "And if any one says that it is productive, and that by the destruction of one thing it giveth birth to somewhat else, the true answer is that it doth not so qua destructive.\n\nQua destructive and evil it only destroys and debases; but it taketh upon it the form of birth and essence through the action of the Good.\n\nThus evil will be found to be a destructive force in itself, but a productive force through the action of the Good.\n\nQua evil it neither hath being nor confers it; through the action of the Good, it hath being (yea, a good being) and confers being on good things.\n\nOr rather (since we cannot call the same thing both good and bad in the same relations, nor are the destruction and birth of the same thing the same function or faculty, whether productive or destructive, working in the same relations), Evil in itself hath neither being, goodness, productiveness, nor power of creating things which have being 114 and goodness; the Good, on the other hand, wherever It becomes perfectly present, creates perfect, universal and untainted manifestations of goodness; while the things which have a lesser share therein are imperfect manifestations of goodness and mixed with other elements through lack of the Good.\n\nIn fine, evil is not in any wise good, nor the maker of good; but every thing must be good only in proportion as it approacheth more or less unto the Good, since the perfect Goodness penetrating all things reacheth not only to the wholly good beings around It, but extendeth even unto the lowest things, being entirely present unto some, and in a lower measure to others, and unto others in lowest measure, according as each one is capable of participating therein.\n\n327 327 D.\n\nis no pantheist.\n\nAccording to Pantheism God is equally present in all things.\n\nThus Pantheism is a debased form of the Immanence doctrine, as Calvinism is a debased form of the Transcendence doctrine.\n\nIn the one case we get Immanence without Transcendence: in the other Transcendence without Immanence.\n\nD.\n\nholds a Transcendent Immanence (cf.\n\nBradley, Appearance and Reality, rebutting charge of Pantheism).\n\nSome creatures participate wholly in the Good, others are lacking in It less or more, and others possess a still fainter participation therein, while to others the Good is present as but the faintest echo.\n\nFor if the Good were not present only in a manner proportioned unto each, then the divinest and most honourable things would be no higher than the lowest!\n\nAnd how, pray, could all things have a uniform share in the Good, since not all are equally fit to share entirely therein?\n\nBut in truth the exceeding greatness of the power of the Good is shown by this—that It giveth power even to the things which lack It, yea even unto that very lack itself, inasmuch as even here is to be found some kind of participation in It.\n\n328 328 e.\n\ng.\n\nThe cruelty of Nature seems to show Intelligence; and Intelligence per se is a good thing.\n\nAnd, if we must needs 115 boldly speak the truth, even the things that fight against It possess through Its power their being and their capability to fight.\n\nOr rather, to speak shortly, all creatures in so far as they have being are good and come from the Good, and in so far as they are deprived of the Good, neither are good nor have they being.\n\n329 329 All evil things contain the seed of their own decay, and so tend to non-existence.\n\nThe arrogance and cruelty of the Germans has been their weakness, as discipline and self-sacrifice has been their strength."

