[content]
body = "Hence have they their celestial orders, their self-unities, their mutual indwellings, their distinct Differences, the faculties which raise the lower unto the higher ranks, the providences of the higher for those beneath them; their preservation of the properties belonging to each faculty, their unchanging introversions, 247 247 Lit.\n\n“Revolutions.” (αἱ .\n\n.\n\n.\n\nπερὶ ἑαυτὰς ἀμετάπτωτοι συνελίξεις.) In Dante’s Paradiso the souls of the Redeemed all move with a circular motion.\n\nThis symbolizes an activity of spiritual concentration.\n\nCf.\n\niv.\n\n8, 9.\n\ntheir constancy and elevation in their search for the Good, and all the other qualities which we have described in our book concerning the Properties and Orders of the Angels.\n\n248 248 The Celestial Hierarchy is among D’s extant works.\n\nIt is referred to by Dante and was the chief source of medieval angelology.\n\nMoreover all things appertaining to the Celestial Hierarchy, the angelic Purifications, the Illuminations and the attainments which perfect them in all angelic perfection and come from the all-creative and originating Goodness, from whence it was given to them to possess their created goodness, and to manifest the Secret Goodness in themselves, and so to be (as it were) the angelic Evangelists of the Divine Silence and to stand forth as shining lights revealing Him that is within the shrine.\n\nAnd next those sacred and holy Minds, men’s souls and all the excellences that belong to souls derive their being from the Super-Excellent Goodness.\n\nSo do they possess intelligence; so do they preserve their living being 249 249 τὴν οὐσιώδη ζωήν—i.\n\ne.\n\nlife as such, mere life, the life which they share with animals and plants.\n\nimmortal; so is it they exist at all, and can, by straining towards the living angelic powers, through 89 their good guidance mount towards the Bounteous Origin of all things; so can they (according to their measure) participate in the illuminations which stream from above and share the bounteous gift (as far as their power extends) and attain all the other privileges which we leave recounted in our book, Concerning the Soul.\n\nYea, and the same is true, if it must needs be said, concerning even the irrational souls, or living creatures, which cleave the air, or tread the earth, or crawl upon the ground, and those which live among the waters or possess an amphibious life, and all that live buried and covered in the earth—in a word all that possess a sensitive soul or life.\n\nAll these are endowed with soul and life because the Good exists.\n\nAnd all plants derive from the Good that life which gives them nourishment and motion, and even whatsoever has no life or soul exists through the Good, and thus came into the estate of being.\n\n250 250 The existence of the whole creation—angels, men, animals, and vegetables, dead matter—is in the Good.\n\nIt has not, in the ordinary sense, made them, but they are grounded in It and draw their existence from it and would not exist but for it.\n\nThey exist not through any particular activity It exerts but solely because It Is.\n\n3.\n\nNow if the Good is above all things (as indeed It is) Its Formless Nature produces all-form; and in It alone Not-Being is an excess of Being, 251 251 “Being” implies finite relations; for one thing must be distinguished from another.\n\nIf a thing is itself, it is not something else; this thing is not that."

