[content]
body = "and all things are moved by a longing for the Beautiful and Good, to accomplish every outward work and form every act of will.\n\nAnd true reasoning will also dare to affirm that even the Creator of all things Himself yearneth after all things, createth all things, perfecteth all things, conserveth all things, attracteth all things, through 102 nothing but excess of Goodness.\n\nYea, and the Divine Yearning is naught else than a Good Yearning towards the Good for the mere sake of the Good.\n\nFor the Yearning which createth all the goodness of the world, being pre-existent abundantly in the Good Creator, allowed Him not to remain unfruitful in Himself, but moved Him to exert the abundance of His powers in the production of the universe.\n\n304 304 εἰς τὸ πρακτικεύεσθαι κατὰ τὴν ἁπάντων γεννητικὴν ὑπερβολήν.\n\nDesire = want.\n\nAnd want in us = imperfection; but in God it = that excess of perfection, whereby God is “Perfectionless.” Thus the words “super-excellence,” “super-unity,” etc., are not meaningless superlatives.\n\nThey imply an impulse towards motion within the Divine Stillness, a Thirst in the Divine Fullness.\n\nCf.\n\nJulian of Norwich Revelations, ch.\n\nxxxi.\n\n” .\n\n.\n\n.\n\nThere is a property in God of thirst and longing.” The categories of Greek Philosophy are static.\n\nThe superlatives of D.\n\nimply something dynamic, though the static element remains.\n\nIn much modern philosophy (the Pragmatists and also Bergson) dynamic conceptions are prominent; but the tendency here is for the static to disappear instead of being subsumed as it is in D.\n\nThe result, or the cause, is that Grace is lost sight of and only Nature is perceived.\n\nReally Absolutism and Pragmatism are not mutually exclusive; for Rest and Motion co-exist as transcended elements in God.\n\nThis is the paradox of perfect Love which is both at rest and in motion, both satisfied and unsatisfied.\n\nCf.\n\nJulian of Norwich: “I had Him and I wanted Him” (Revelations, ch.\n\nx.).\n\n11.\n\nAnd let no man think we are contradicting the Scripture when we solemnly proclaim the title of “Yearning.” For ‘tis, methinks, unreasonable and foolish to consider the phrases rather than the meaning; and such is not the way of them that wish for insight into things Divine, but rather of them that receive the empty sounds without letting them pass beyond their ears, and shut them out, not wishing to know what such and such a phrase intends, nor how they ought to explain it in other terms expressing the same sense more clearly.\n\nSuch men are under the dominion of senseless elements and lines, and of uncomprehended syllables and phrases which penetrate not into the perception of their souls, but make a dumb noise outside about their lips and hearing 103 holding it unlawful to explain the number “four” by calling it “twice two,” or a straight line by calling it a “direct line ” or the “Motherland” by calling it the “Fatherland,” or so to interchange any other of those terms which under varieties of language possess all the same signification."

