[content]
body = "And herein the Divine Yearning showeth especially its beginningless and endless nature, revolving in a perpetual circle for the Good, from the Good, in the Good, and to the Good, with unerring revolution, never varying its centre or direction, perpetually advancing and remaining and returning to Itself.\n\nThis by Divine inspiration our renowned Initiator hath declared in his Hymns of Yearning, which it will not be amiss to quote and thus to bring unto a holy consummation our Discourse concerning this matter.\n\n15.\n\nWords of the most holy Hierotheus from the Hymns of Yearning.\n\n“Yearning (be it in God or Angel, or Spirit, or Animal Life, or Nature) must be 108 conceived of as an uniting and commingling power which moveth the higher things to a care for those below them, moveth co-equals to a mutual communion, and finally moveth the inferiors to turn towards their superiors in virtue and position.” 16.\n\nWords of the same, from the same Hymns of Yearning.\n\n“Forasmuch as we have set down in order the manifold yearnings springing from the One, and have duly explained what are the powers of knowledge and of action belonging to the yearnings springing from the One, and have duly explained what are the powers of knowledge and of action proper to the Yearnings within 319 319 i.\n\ne.\n\nThe social instinct in men and animals, and the impulse of mutual attraction in the inanimate world.\n\nthe world and above 320 320 The manifold yearnings of the spirit for Truth, Beauty, Spiritual Love, etc.\n\nit (wherein, as hath been already explained, the higher place belongeth unto those ranks and orders of Yearning which are spiritually felt and perceived, and highest amongst these are the Divine Yearnings in the very core of the Spirit towards those Beauties which have their veritable Being Yonder), 321 321 i.e.\n\nOf the two classes just alluded to the second is the higher; and of those yearnings which belong to this class the most transcendent are the highest.\n\nReligion is higher than secular life, and the highest element in Religion is other-worldly.\n\nThe received text reads— “The Divine Yearnings in the very core,” etc., οἱ αὐτονόητοι καὶ θεῖοι τῶν ὄντως ἐκεῖ καλῶς ἐρώτων .\n\nI have ventured to amend ἐρώτων to ἔρωτες .\n\nIf the MS.\n\nfrom which the received text is derived belonged to a family having seventeen or eighteen letters to a line then this word would probably come at the end of a line (since there are 260 letters to the end of it, from the beginning of the section), and would have the ὀν- of ὄντως just above it and the -ον- of αὐτονόητοι just above that, and ἐρώτων at the end of the line next but one above that.\n\nThis would make the corruption of ἔρωτες into ἐρώτων very natural."

