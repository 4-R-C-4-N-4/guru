[content]
body = "And if they say that matter is necessary for the whole world to fulfil its development, how can that be evil which depends for its existence upon the Good?\n\nFor evil abhors the very nature of the Good.\n\nAnd how can matter, if it is evil, produce and nourish Nature?\n\nFor evil, qua evil, cannot produce or nourish anything, nor create or preserve it at all.\n\nAnd if they reply that matter causes not the evil in our souls, but that it yet draws them down towards evil, can that be true?\n\nFor many of them have their gaze turned towards the Good.\n\nAnd how can that be, if matter doth nothing except drag them down towards evil?\n\nHence evil in our souls is not derived from matter but from a disordered and discordant motion.\n\nAnd if they say that this motion is always the consequence of matter; and if the unstable medium of matter is necessary for things that are incapable of firm self-subsistence, then why is it that evil is thus necessary or that this necessary thing is evil?\n\n356 356 Matter, it is argued, is evil because the discordant motion of the soul springs from matter.\n\nBut, replies D., matter is necessary for certain kinds of existence.\n\nHence it follows that evil is necessary.\n\nBut this is impossible.\n\n29.\n\nNor is the common saying true that Deprivation or Lack fights by its natural power against the Good.\n\nFor a complete lack is utterly impotent; and that 126 which is partial hath its power, not in so far as it is a lack, but in so far as it is not a perfect lack.\n\nFor when the lack of the Good is partial, evil is not as yet; and when it becomes perfect, evil itself utterly vanishes.\n\n30.\n\nIn fine, Good cometh from the One universal Cause; and evil from many partial deficiencies.\n\nGod knows evil under the form of good, and with Him the causes of evil things are faculties productive of good.\n\nAnd if evil is eternal, creative, and powerful, and if it hath being and activity, whence hath it these attributes?\n\nCome they from the Good?\n\nOr from the evil by the action of the Good?\n\nOr from some other cause by the action of them both?\n\nAll natural results arise from a definite cause; and if evil hath no cause or definite being, it is unnatural.\n\nFor that which is contrary to Nature hath no place in Nature, even as unskilfulness hath no place in skilfulness.\n\nIs the soul, then, the cause of evils, even as fire is the cause of warmth?\n\nAnd doth the soul, then, fill with evil whatsoever things are near it?\n\nOr is the nature of the soul in itself good, while yet in its activities the soul is sometimes in one state, and sometimes in another?\n\n357 357 D.\n\nis here alluding to the mystical doctrine of the timeless self—the ultimate root of goodness in each individual which remains unchanged by the failures and sins of the temporal self.\n\nNow, if the very existence of the soul is naturally evil, whence is that existence derived?\n\nFrom the Good Creative Cause of the whole world?\n\nIf from this Origin, how can it be, in its essential nature, evil?\n\nFor all things sprung from out this Origin are good.\n\nBut if it is evil merely in its activities, even so this condition is not fixed.\n\nOtherwise ( i.\n\ne.\n\nif it doth not itself also assume a good quality) what is the origin of the virtues?\n\n358 358 D.\n\nis arguing with those who hold that evil is in some sense necessary to the existence of the world, and therefore has a permanent place in it.\n\nSin is, they hold, a necessary self-realization of human souls which are in their ultimate essence sinless.\n\nD.\n\nreplies that, if this is so, we cannot explain how goodness can ever be (as it is) a form of self-realization for human souls."

