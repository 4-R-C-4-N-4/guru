[content]
body = "367 367 Sense-perception is a direct apprehension of that which we actually touch, see, hear, taste, or smell; Reason or Inference is an indirect apprehension of that which we do not actually touch, see, etc.\n\nIntuition is a direct apprehension of that which (by its very nature) we do not touch, see, etc.\n\nSense perception, Reason, and Intuition are refractions from the perfect Light of Divine Wisdom; but the Divine Wisdom is beyond them because God apprehends all things, not as existent outside Himself, but as existent in Himself, under the form of a single Unity which is identical with His own Being.\n\nThe Godhead is a Single Desire wherein alt the souls eternally exist as fused and inseparable elements.\n\n2.\n\nThese Names which reveal the Providence of God our Discourse would now consider.\n\nFor we make no promise to express the Absolute Super-Essential Goodness and Being and Life and Wisdom of the Absolute Super-Essential Godhead which (as saith the Scripture) hath Its foundation in a secret place 368 368 See Ps.\n\nxvii.\n\n22 .\n\nbeyond all Goodness, Godhead, Being, Wisdom, and Life; but we are considering the benignant Providence which is revealed to us and are celebrating It as Transcendent Goodness and Cause of all good things, and as Existent as Life and as Wisdom, and as productive Cause of.\n\nExistence and of Life and the Giver of Wisdom, in those creatures which partake of Existence, Life, Intelligence, and 133 Perception.\n\nWe do not regard the Good as one thing, the Existent as another, and Life or Wisdom as another; nor do we hold that there are many causes and different Godheads producing different effects and subordinate one to another; but we hold that one God is the universal Source of the emanations, 369 369 i.\n\ne.\n\nIs the Source of Goodness, existence, life, wisdom, etc.\n\nand the Possessor of all the Divine Names we declare; and that the first Name expresses the perfect Providence of the one God, and the other names express certain more general or more particular modes of His Providence.\n\n370 370 The title “Good” applies to all God’s providential activity, for everything that He makes is good.\n\nAnd even evil is good depraved; and exists as good in the Good (see p.\n\n132, n.\n\ni ).\n\nOr, rather, evil possesses not an existence but a non-existence in the Good.\n\nIt is (according to D.) a kind of non-existent good.\n\nHence the title “Existent” is not quite so general as the title “Good.” “Living” is a less general title still (since a stone, for instance, has no life), and “Wise” is yet less general (since a plant is not wise).\n\nThus we get the following table of emanating activity: (1) Good (including and transcending existent and non-existent things, viz.\n\n“good,” and “evil”).\n\n(2) Existent ( existent things, viz.\n\ngood).\n\n(3) Life (plants, animals, men, angels).\n\n(4) Wisdom (men and angels).\n\n3.\n\nNow, some one may say: “How is it, since Existence transcends Life, and Life transcends Wisdom, that living things are higher than things which merely exist, and sentient things than those which merely live, and reasoning things than those which merely feel, and intelligences than those which have only reason?\n\n371 371 Intuition is the faculty of the Intelligences or Angels, by which are meant, of course, angels and spiritual men; Discursive Reason is that of natural men.\n\nWhy do the creatures rise in this order to the Presence of God and to a closer relationship with Him?"

