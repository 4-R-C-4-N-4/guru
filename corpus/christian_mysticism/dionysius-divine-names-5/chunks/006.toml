[content]
body = "And the highest measure of existence He bestows upon the more exalted Beings, which the Scripture calls eternal; 380 380 2 Cor.\n\niv.\n\n18 but also the mere existence of the world as a whole is perpetual; and its very existence comes from the Pre-existent.\n\nHe is not an Attribute of Being, but Being is an Attribute of Him; He is not contained in Being, but Being is contained in Him; He doth not possess Being, but Being possesses Him; He is the Eternity, the Beginning, and the Measure of Existence, being anterior to Essence and essential Existence and Eternity, because He is the Creative Beginning, Middle, and End of all things.\n\nAnd hence the truly Pre-existent receives from the Holy Scripture manifold attributions drawn from every kind of existence; and states of being and processes (whether past, present, or future) are properly attributed to Him; for all these attributions, if their divine meaning be perceived, signify that He hath a Super-Essential Existence fulfilling all our categories, and is the Cause producing every mode of existence.\n\nFor He is not This without being That; nor doth He possess this mode of being without that.\n\nOn the contrary He is all things as being the Cause of them all, and as holding together and anticipating in Himself all the beginnings and all the fulfilments of all things; and He is above them all in that He, anterior to their existence, super-essentially 140 transcends them all.\n\nHence all attributes may be affirmed at once of Him, and yet He is No Thing.\n\n381 381 Cf.\n\nTheol.\n\nGerm.\n\npassim.\n\nHence the soul possessing God is in a state of “having nothing and yet possessing all things.” Cf.\n\nDante, cio che per l’universa si squaderna, etc.\n\nHe possesses all shape and form, and yet is formless and shapeless, containing beforehand incomprehensibly and transcendently the beginning, middle, and end of all thins, and shedding upon them a pure radiance of that one and undifferenced causality whence all their fairness comes.\n\n382 382 Cf.\n\nSection 5.\n\nFor if our sun, while still remaining one luminary and shedding one unbroken light, acts on the essences and qualities of the things which we perceive, many and various though they be, renewing, nourishing, guarding, and perfecting them; differencing them, unifying them, warming them and making them fruitful, causing them to grow, to change, to take root and to burst forth; quickening them and giving them life, so that each one possesses in its own way a share in the same single sun—if the single sun contains beforehand in itself under the form of an unity the causes of all the things that participate in it; much more doth this truth hold good with the Cause which produced the sun and all things; and all the Exemplars 383 383 i.\n\ne.\n\nThe Platonic ideas of things—their ultimate essences.\n\nBut see below.\n\nof existent things must pre-exist in It under the form of one Super-Essential Unity.\n\n384 384 Cf.\n\nBlake.\n\n“Jerusalem,” ad fin.\n\nFor It produces Essences only by an outgoing from Essence.\n\nAnd we give the name of “Exemplars” to those laces which, preexistent in God 385 385 i.\n\ne.\n\nIf It produces the essences of things, It must first contain Essence.\n\nD.\n\nhere uses the term “God” because he is thinking of the Absolute in Its emanating activity (wherein the Differentiations of the Trinity appear)."

