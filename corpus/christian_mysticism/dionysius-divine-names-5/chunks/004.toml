[content]
body = "All the properties, etc., of each thing exist outside that thing as an element in the Transcendent Being of God.\n\nthe Existence of those that have any kind of existence, the Life-Process of those which in any way pass through that process.\n\nFrom Him that Is come Eternity, Essence, Being, Time, Life-Process; and that which passes through such Process, the things which inhere in existent things 374 374 i.\n\ne.\n\nThe qualities of things.\n\nand those which under any power whatever possess an independent subsistence.\n\nFor God is not Existent in any ordinary sense, but in a simple and undefinable manner embracing and anticipating all existence in Himself.\n\nHence He is called “King of the Ages,” because in Him and around Him all Being is and subsists, and He neither was, nor will be, nor hath entered the life-process, nor is doing so, nor ever will, or rather He doth not even exist, but is the Essence of existence in things that exist; and not only the things that exist but also their very existence comes from Him that Is before the ages.\n\nFor He Himself is the Eternity of the ages and subsists before the ages.\n\n136 5.\n\nLet us, then, repeat that all things and all ages derive their existence from the Pre-Existent.\n\nAll Eternity and Time are from Him, and He who is Pre-Existent is the Beginning and the Cause of all Eternity and Time and of anything that hath any kind of being.\n\nAll things participate in Him, nor doth He depart from anything that exists; He is before all things, and all things have their maintenance in Him; and, in short, if anything exists under any form whatever, ‘tis in the Pre-Existent that it exists and is perceived and preserves its being.\n\nAntecedent 375 375 sc.\n\nLogically not temporally.\n\nto all Its other participated gifts is that of Being.\n\nVery Being is above Very Life, Very Wisdom, Very Divine Similarity and all the other universal Qualities, wherein all creatures that participate must participate first of all in Being Itself; or rather, all those mere Universals wherein the creatures participate do themselves participate in very Being Itself.\n\nAnd there is no existent thing whose essence and eternal nature is not very Being.\n\n376 376 Cf.\n\nSt.\n\nAugustine, ”Homini bono tolle hominem, et Deum invenis.“ Cf.\n\nSection 8.\n\nHence God receives His Name from the most primary of His gifts when, as is meet, He is called in a special manner above all things, “He which Is.” For, possessing in a transcendent manner Pre-Existence and Pre-Eminence, He caused beforehand all Existence (I mean Very Being) and in that Very Being caused all the particular modes of existence.\n\nFor all the principles of existent things derive from their participation in Being the fact that they are existent and that they are principles and that the former quality precedes the latter.\n\nAnd if it like thee to say that Very Life is the Universal Principle of living things as such, and Very Similarity of similar things as such, and Very Unity of unified things as such, and Very 137 Order of orderly things as such, and if it like thee to give the name of Universals to the Principles of all other things which (by participating in this quality or in that or in both or in many) are this, that, both or many thou wilt find that the first Quality in which they participate is Existence, and that their existence is the basis, (1) of their permanence, and (2) of their being the principles of this or that; and also that only through their participation in Existence do they exist and enable things to participate in them."

