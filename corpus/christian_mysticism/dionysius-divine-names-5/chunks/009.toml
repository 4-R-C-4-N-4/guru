[content]
body = "364 The ultimate Godhead is reached only by the Negative Path, and known only by Unknowing.\n\nThe Affirmative Path of philosophical knowledge leads only to the differentiated manifestations of the Godhead: e.g.\n\nthe Trinity, in Its creative and redemptive activities, is known by the Affirmative Method, but behind these activities and the faculty for them lies an ultimate Mystery where the Persons transcend Themselves and are fused (though not confused).\n\n365 In spiritual Communion, the mind, being joined with God, distinguishes itself from Him as Self from Not-Self, Subject from Object.\n\nAnd this law was fulfilled even in the Human Soul of Christ, Who distinguished Himself from His Father.\n\nThe Persons of the Trinity, though they lie deeper than this temporal world (being, in Their eternal emanative Desire, the Ground of its existence), were manifested through the Incarnation.\n\nHence the distinction of Father, Son, and Spirit, revealed in the Human Soul of Christ, exists eternally in the Trinity.\n\nAnd those who reach the Unitive State, since they reach it only through the Spirit of Christ and are one spirit with Him, must in a lesser degree reveal the Personal Differentiations of the Trinity in their lives.\n\nBut because the eternal Differentiations of the Trinity transcend Themselves in-the Super-Essence, therefore Their manifestations in the Unitive State lead finally to a point beyond Union where all distinctions are transcended.\n\nAt that point the distinction between Self and Not-Self, Subject and Object, vanishes in the unknowable Mystery of the Divine Darkness.\n\nThe Self has disappeared and been, in a sense, merged.\n\nBut in another sense the Self remains.\n\nThis is the paradox of Personality—that it seeks (and attains) annihilation in the Supra-personal plane, and yet on the relative plane retains its own particular being.\n\nThis is the paradox of Love.\n\nSee Intr., p.\n\n28 f., and p.8.\n\n366 i.\n\ne.\n\nExtends both to good things and to bad things and is beyond the opposition between good and bad.\n\nThe Good extends to bad things because evil is a mere distortion of good, and no evil thing could exist but for an element of good holding it together: its existence, qua existence, is good.\n\nSee ch.\n\niv.\n\nThe Good is beyond the opposition between good and evil because on the ultimate plane nothing exists outside It.\n\nIt is beyond relationships.\n\nHence also beyond Existence, Life, and Wisdom, since these (as we know them) imply relationships.\n\n367 Sense-perception is a direct apprehension of that which we actually touch, see, hear, taste, or smell; Reason or Inference is an indirect apprehension of that which we do not actually touch, see, etc.\n\nIntuition is a direct apprehension of that which (by its very nature) we do not touch, see, etc.\n\nSense perception, Reason, and Intuition are refractions from the perfect Light of Divine Wisdom; but the Divine Wisdom is beyond them because God apprehends all things, not as existent outside Himself, but as existent in Himself, under the form of a single Unity which is identical with His own Being.\n\nThe Godhead is a Single Desire wherein alt the souls eternally exist as fused and inseparable elements.\n\n368 See Ps.\n\nxvii.\n\n22 .\n\n369 i.\n\ne.\n\nIs the Source of Goodness, existence, life, wisdom, etc.\n\n370 The title “Good” applies to all God’s providential activity, for everything that He makes is good.\n\nAnd even evil is good depraved; and exists as good in the Good (see p.\n\n132, n.\n\ni ).\n\nOr, rather, evil possesses not an existence but a non-existence in the Good.\n\nIt is (according to D.) a kind of non-existent good."

