[content]
body = "This apparent hair-splitting is really of the utmost practical importance.\n\nD.\n\nis attacking the irreligious attitude in science, philosophy, and life.\n\nWe must seek for all things (including our own personalities) not in themselves but in God.\n\nThe great defect of Natural Science in the nineteenth century was its failure to do this.\n\nIt was, perhaps, the defect of Gnosticism in earlier days, and is the pitfall of Occultism to-day.\n\n388 i.e.\n\nHe gives each thing its distinctness while yet containing infinite possibilities of development for it.\n\n389 He is always yearning yet always satisfied.\n\nCf.\n\nSt.\n\nAugustine, Confessions, ad in.\n\nA reproduction of this state has been experienced by some of the Saints.\n\nCf.\n\nJulian of Norwich: “I had Him and I wanted Him.” 390 He is the ultimate Reality of all beings, and is not one Being among others.\n\n391 Very Eternity perhaps corresponds to the aeternitas of St.\n\nThomas and Eternity to his aevum (with which cf.\n\nBergson’s durée).\n\nEternity is a totum simul without beginning or end, aevum is a totum simul with beginning but no end.\n\nIt is eternity reached through Time, or Time accelerated to the stillness of infinite motion and so changed into Eternity, as in human souls when finally clothed with perfected immortality.\n\nThe Absolute, or Godhead, is beyond Very Eternity, because this latter is a medium of differentiated existence (for the differentiated Persons of the Trinity exist in it), whereas the Godhead is undifferentiated and beyond relationships.\n\nThis world of Time springs out of Very Eternity and is rooted therein, being made by the differentiated Persons."

