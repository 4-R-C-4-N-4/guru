[content]
body = "And if these Universals exist by participating in Existence, far more is this true of the things which participate in them.\n\n6.\n\nThus the first gift which the Absolute and Transcendent Goodness bestows is that of mere Existence, and so It derives its first title from the chiefest of the participations in Its Being.\n\nFrom It and in It are very Being and the Principles of the world, and the world which springs from them and all things that in any way continue in existence.\n\nThis attribute belongs to It in an incomprehensible and concentrated oneness.\n\nFor all number pre-exists indivisibly in the number One, and this number contains all things in itself under the form of unity.\n\nAll number exists as unity in number One, and only when it goes forth from this number is it differenced and multiplied.\n\n377 377 The number One, being infinitely divisible, contains the potentiality of all numbers.\n\nAll the radii of a circle are concentrated into a single unity in the centre, and this point contains all the straight lines brought together within itself and unified to one another, and to the one starting-point from which they began.\n\nEven so are they a perfect unity in the centre itself, and, departing a little therefrom they are differenced a little, and departing further are differenced further, and, in fact, the nearer they are to the centre, so 138 much the more are they united to it and to one another, and the more they are separated from it the more they are separated from one another.\n\n378 378 Cf.\n\nPlotinus.\n\n7.\n\nMoreover, in the Universal Nature of the world all the individual Laws of Nature are united in one Unity without confusion; and in the soul the individual faculties which govern different parts of the body are united in one.\n\nAnd hence it is not strange that, when we mount from obscure images to the Universal Cause, we should with supernatural eyes behold all things (even those things which are mutually contrary) existing as a single Unity in the Universal Cause.\n\nFor It is the beginning of all things, whence are derived Very Being, and all things that have any being, all Beginning and End, all Life, Immortality, Wisdom, Order, Harmony, Power, Preservation, Grounding, Distribution, Intelligence, Reason, Perception, Quality, Rest, Motion, Unity, Fusion, Attraction, Cohesion, Differentiation, Definition, and all other Attributes which, by their mere existence, qualify all existent things.\n\n8.\n\nAnd from the same Universal Cause come those godlike and angelical Beings, which possess Intelligence and are apprehended by Intelligence; and from It come our souls and the natural laws of the whole universe, and all the qualities which we speak of as existing in other objects or as existing merely in our thoughts.\n\nYea, from It come the all-holy and most reverent Powers, which possess a real existence 379 379 sc.\n\nIn contradistinction to the Godhead, which (being beyond essence) does not literally exist.\n\nand are grounded, as it were, in the fore-court of the Super-Essential Trinity, possessing from It and in It their existence and the godlike nature thereof; and, after them, those which are inferior to them, possessing their inferior existence from the same Source; and 139 the lowest, possessing from It their lowest existence ( i.\n\ne.\n\nlowest compared with the other angels, though compared with us it is above our world).\n\nAnd human souls and all other creatures possess by the same tenure their existence, and their blessedness, and exist and are blessed only because they possess their existence and their blessedness from the Pre-existent, and exist and are blessed in Him, and begin from Him and are maintained in Him and attain in Him their Final Goal."

