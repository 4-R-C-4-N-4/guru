body = "as an Unity, produce the essences of things: laws which are called in Divine Science 141 “Preordinations” or Divine and beneficent Volitions, laws which ordain things and create them, laws whereby the Super-Essential preordained and brought into being the whole universe.\n\n9.\n\nAnd whereas the philosopher Clement 386 386 This is apparently the Bishop of Rome (c.\n\nA.D.\n\n95), writer of the well-known Epistle to the Corinthians, which is the earliest Christian writing outside the New Testament, and is published in Lightfoot’s Apostolic Fathers.\n\nBut no such passage as D.\n\nalludes to occurs in the Epistle, which is his one extant writing.\n\nmaintains that the title “Exemplar” may, in a sense, be applied to the more important types in the visible world, he employs not the terms of his discourse in their proper, perfect and simple meaning.\n\n387 387 Cf.\n\nSt.\n\nAugustine, Commentary on St.\n\nJohn, Tr.\n\nXXI., § 2: ”Ubi demonstrat Filio Pater quod facit nisi in ipso Filio per quem facit?\n\n.\n\n.\n\n.\n\n.\n\nSi quid facit Pater per Filium facit; si per sapientiam suam et virtutem suam facit; non extra illi ostendit quod videat .\n\n.\n\n.\n\nin ipso illi ostendit quod facit.\n\n.\n\n.\n\n.\n\n(3) Quid videt Pater, vel potius quid videt Filius in Patre .\n\n.\n\n.\n\net ipse.“ (The Son beholds all things in Himself, and is Himself in the Father.) All things ultimately and timelessly exist in the Absolute.\n\nIt is their Essence (or Super-Essence).\n\nTheir creation from the Absolute into actual existence is performed by the Differentiated Persons of the Trinity: the Father working by the Spirit through the Son.\n\nThus the Differentiated Persons (to which together is given the Name of God) being the manifested Absolute, contain eternally those fused yet distinct essences of things which exist in the Absolute as a single yet manifold Essence.\n\nThis Essence they, by their mutual operation, pour forth, so that while ultimately contained in (or, rather identified with) the Absolute, it is in this world of relationships distinct and separate from the Differentiated Persons Which together are God, being in fact, a created manifestation of the Absolute, as God is an Uncreated Manifestation Thereof.\n\nThis created Essence of the world itself becomes differentiated into the separate creatures (water, earth, plants, animals, etc.), having this tendency because it contains within itself their separate generic forms which seek expression in the various particular things.\n\nWherever we can trace a law or purpose it is due to the presence of a generic form.\n\nThus vapour condenses into water in obedience to the generic form of water, and an oak-tree grows to its full stature in obedience to the generic form of the oak.\n\nSo too with works of art.\n\nA cathedral is built in accordance with a plan or purpose, and this plan is the pre-existent generic form of the building; whereas a fortuitous heap of stones does not (as such) manifest any plan, and therefore has no generic form.\n\nD.\n\nattributing to Clement (perhaps fictitiously) the view that generic forms can in themselves— i.\n\ne.\n\nin their created essence—be properly called Exemplars, maintains that this is not strictly accurate.\n\nProperly speaking, he says, they are Exemplars only as existent in God, and not as projected out from Him.\n\nIf, by a licence, we call them Exemplars, yet we must not let our minds rest in them, but must pass on at once to find their true being in God.\n\nThis apparent hair-splitting is really of the utmost practical importance.\n\nD."

