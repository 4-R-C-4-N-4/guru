[content]
body = "Hence the title “Existent” is not quite so general as the title “Good.” “Living” is a less general title still (since a stone, for instance, has no life), and “Wise” is yet less general (since a plant is not wise).\n\nThus we get the following table of emanating activity: (1) Good (including and transcending existent and non-existent things, viz.\n\n“good,” and “evil”).\n\n(2) Existent ( existent things, viz.\n\ngood).\n\n(3) Life (plants, animals, men, angels).\n\n(4) Wisdom (men and angels).\n\n371 Intuition is the faculty of the Intelligences or Angels, by which are meant, of course, angels and spiritual men; Discursive Reason is that of natural men.\n\n372 The more universal a Title is, the more truly it is applicable to God (see end of Section 2).\n\nThus Existence is more applicable than Life, and Life than Wisdom, as involving in each case less that needs to be discarded.\n\nThus Wisdom implies both a time-process and also a certain finite mode of consciousness, neither of which belong to the eternal and infinite God: Life implies a time-process though not a finite consciousness: Existence implies neither time-process nor finite consciousness.\n\nThus we reach the highest conception of God by a process of abstraction in which we cast aside all particular elements (cf.\n\nSt.\n\nAugustine on the Bonum bonum).\n\nThis is the philosophical basis of the Via Negativa .\n\nBut this abstraction is not mere abstraction nor this negation mere negation.\n\nExistence in God subsumes and so includes all that is real in Life; and Life in Him subsumes all that is real in Wisdom.\n\nHence the creatures, as they advance in the scale of creation, draw from Him more and more particular qualities and progress by becoming more concrete and individual instead of more abstract.\n\nAll the rich variety of creation exists as a simple Unity in God, and the higher a creature stands in the scale, the more does it draw fresh forces from this simple Unity and convert them into its own multiplicity.\n\nD.\n\nwould have understood Evolution very well.\n\nThis passage exactly fits in with D’s.\n\npsychological doctrine of the Via Negativa .\n\nThat which is reached by the spiritual act of Contemplation explains the principles underlying the whole creative process, the growing diversity of the world-process and of human life.\n\nIn God there is a rich Unity, and we must leave all diversity behind to reach It.\n\nThus we shall have richness without diversity.\n\n373 Eternity is a totum simul.\n\nIt may thus be symbolized by a point revolving round a centre at infinite speed.\n\nTime would be symbolized by a point revolving round a centre at a finite speed.\n\nThus eternity is time made perfect.\n\nTime is thus subsumed in eternity as the incomplete in the complete.\n\nHence time, like existence, life, etc., exists in God as transcended.\n\nHence the temporal-process is a manifestation of Him.\n\nThis might had to Pantheism, but D.\n\nis saved from such a result by his hold on the complementary truth of Transcendence.\n\nAll the properties, etc., of each thing exist outside that thing as an element in the Transcendent Being of God.\n\n374 i.\n\ne.\n\nThe qualities of things.\n\n375 sc.\n\nLogically not temporally.\n\n376 Cf.\n\nSt.\n\nAugustine, ”Homini bono tolle hominem, et Deum invenis.“ Cf.\n\nSection 8.\n\n377 The number One, being infinitely divisible, contains the potentiality of all numbers.\n\n378 Cf.\n\nPlotinus.\n\n379 sc.\n\nIn contradistinction to the Godhead, which (being beyond essence) does not literally exist.\n\n380 2 Cor.\n\niv.\n\n18 381 Cf.\n\nTheol.\n\nGerm.\n\npassim."

