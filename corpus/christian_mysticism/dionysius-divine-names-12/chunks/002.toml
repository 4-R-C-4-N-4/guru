body = "Which meaneth that just as things that have no substantial Being 490 490 i.\n\ne.\n\nThe material things (cf.\n\nMyst.\n\nTheol.\n\nI.).\n\nThis is the ordinary meaning of the phrase in D.\n\nare transcended by things that have such Being, together with Sanctity, Divinity, Dominion, or Royalty; and just as the things that 183 participate in these Qualities are transcended by the Very Qualities themselves—even so all things that have Being are surpassed by Him that is beyond them all, and all the Participants and all the Very Qualities are surpassed by the Unparticipated 491 491 Material things are surpassed by angels and perfected human souls, anal these by the Divine Grace which they all share; and this, together with the whole creation on which it is bestowed, is surpassed by God from Whom it emanates.\n\nFor while this emanation can be communicated the Godhead cannot.\n\n(Cf.\n\nVia Negativa.\n\nSee esp.\n\nMyst.\n\nTheol.\n\nI.).\n\nCreator.\n\nAnd Holy Ones and Kings and Lords and Gods, in the language of Scripture, are the higher Ranks in each Kind 492 492 i.\n\ne.\n\nThe higher ranks whether among angels or among human souls.\n\n(Cf.\n\n“I have said, ‘Ye are gods,’” “hath made us kings and priests,” etc.) through which the secondary Ranks receiving of their gifts from God, show forth the abundance of that Unity thus distributed among them in their own manifold qualities—which various qualities the First Ranks in their providential, godlike activity draw together into the Unity of their own being.\n\n493 493 The highest ranks (i.\n\ne.\n\nthe Seraphim and the Contemplative Saints) have a direct version of God, Whom they behold by an act of complete spiritual contemplation.\n\nOthers, learning from them, behold God truly but less directly—by knowing rather than by Unknowing, by discursive Meditation rather than by intuitive Contemplation—or are called to serve Him chiefly in practical works.\n\nContemplation is a complete activity of the concentrated spirit, unifying it within itself and uniting it to all kindred spirits (for true Mysticism is the same in every age and place).\n\nMeditation and practical works are partial activities which imply a succession of different images in the same mind and a shifting variety of different mental types and interests in the same Community.\n\n486 D.\n\nholds that God’s dominion is an absolute quality in Himself apart from all reference to the creation.\n\nThe Greek word, as he truly says, supports his view.\n\nThe Latin Dominus , on the other hand, implies the notion of governing, and so has a necessary reference to the creation.\n\nHence St.\n\nAugustine says that God could not actually be spoken of as “Lord” before the world or the angels were made.\n\nEckhart says that before the creation God was not God, ” Er war was Er war.\n\n“ D.\n\nholds that the title “God” is relative to us.\n\nBut then he holds—and here explains—that the roots of this relationship exist timelessly in the undifferentiated Godhead.\n\n487 “Transcendent,” “Supreme,” “Simple,” all express the same fact—that, being Super-Essential, it is above the multiplicity of the creatures.\n\n488 Cf.\n\nShelley, Adonais: “That Light whose smile kindles the universe.” 489 “Holiness” especially contains the notion of Transcendence.\n\n490 i.\n\ne.\n\nThe material things (cf.\n\nMyst.\n\nTheol.\n\nI.).\n\nThis is the ordinary meaning of the phrase in D.\n\n491 Material things are surpassed by angels and perfected human souls, anal these by the Divine Grace which they all share; and this, together with the whole creation on which it is bestowed, is surpassed by God from Whom it emanates."

