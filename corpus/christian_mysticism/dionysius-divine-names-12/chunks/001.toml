body = "181 CHAPTER XII Concerning ” Holy of holies ,” ” King of kings ,” ” Lord of lords ,” ” God of gods .” 1.\n\nForasmuch as the things which needed to be said concerning this matter have been brought, I think, to a proper ending, we must praise God (whose Names are infinite) as “Holy of holies” and “King of kings,” reigning through Eternity and unto the end of Eternity and beyond it, and as “Lord of lords” and “God of gods.” And we must begin by saying what we understand by “Very Holiness,” what by “Royalty,” “Dominion,” and “Deity,” and what the Scripture means by the reduplication of the titles.\n\n2.\n\nNow Holiness is that which we conceive as a freedom from all defilement and a complete and utterly untainted purity.\n\nAnd Royalty is the power to assign all limit, order, law, and rank.\n\nAnd Dominion is not only the superiority to inferiors, but is also the entirely complete and universal possession of fair and good things and is a true and steadfast firmness; wherefore the name is derived from a word meaning “validity” and words meaning severally “that which possesseth validity” and “which exerciseth” it.\n\n486 486 D.\n\nholds that God’s dominion is an absolute quality in Himself apart from all reference to the creation.\n\nThe Greek word, as he truly says, supports his view.\n\nThe Latin Dominus , on the other hand, implies the notion of governing, and so has a necessary reference to the creation.\n\nHence St.\n\nAugustine says that God could not actually be spoken of as “Lord” before the world or the angels were made.\n\nEckhart says that before the creation God was not God, ” Er war was Er war.\n\n“ D.\n\nholds that the title “God” is relative to us.\n\nBut then he holds—and here explains—that the roots of this relationship exist timelessly in the undifferentiated Godhead.\n\nAnd Deity is the Providence which contemplates all things and which, in perfect Goodness, 182 goes round about all things and holds them together and fills them with Itself and transcends all things that enjoy the blessings of Its providential care.\n\n3.\n\nThese titles, then, must be given in an absolute sense to the All-Transcendent Cause, and we must add that It is a Transcendent Holiness and Dominion, that It is a Supreme Royalty and an altogether Simple Deity.\n\n487 487 “Transcendent,” “Supreme,” “Simple,” all express the same fact—that, being Super-Essential, it is above the multiplicity of the creatures.\n\nFor out of It there hath, in one single act, come forth collectively and been distributed throughout the world all the unmixed Perfection of all untainted Purity; all that Law and Order of the world, which expels all disharmony, inequality and disproportion, and breaks forth into a smiling aspect of ordered Consistency 488 488 Cf.\n\nShelley, Adonais: “That Light whose smile kindles the universe.” and Rightness, bringing into their proper place all things which are held worthy to participate in It; all the perfect Possession of all fair qualities; and all that good Providence which contemplates and maintains in being the objects of Its own activity, bounteously bestowing Itself for the Deification of those creatures which are converted unto It.\n\n4..\n\nAnd since the Creator of all things is brim-full with them all in one transcendent excess thereof.\n\nHe is called “Holy of Holies,” etc., by virtue of His overflowing Causality and excess of Transcendence.\n\n489 489 “Holiness” especially contains the notion of Transcendence."

