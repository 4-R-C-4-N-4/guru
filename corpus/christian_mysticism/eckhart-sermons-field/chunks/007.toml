[content]
body = "So, if my soul is to know God, it must be God-like.” Now, how is the soul to arrive at this heavenly state that it recognizes God in itself, and knows that He is near?\n\nBy copying the heavens, which can receive no impulse from without to mar their tranquility.\n\nThus must the soul, which would know God, be rooted and grounded in Him so steadfastly, as to suffer no perturbation of fear or hope, or joy or sorrow, or love or hate, or anything which may disturb its peace.\n\nThe heavens are everywhere alike remote  from earth, so should the soul be remote from all earthly things alike so as not to be nearer to one than another.\n\nIt should keep the same attitude of aloofness in love and hate, in possession and renouncement, that is, it should be simultaneously dead, resigned and lifted up.\n\nThe heavens are pure and clear without shadow of stain, out of space and out of time.\n\nNothing corporeal is found there.\n\nTheir revolutions are incredibly swift and independent of time, though time depends on them.\n\nNothing hinders the soul so much in attaining to the knowledge of God as time and place.\n\nTherefore, if the soul is to know God, it must know Him outside time and place, since God is neither in this or that, but One and above them.\n\nIf the soul is to see God, it must look at nothing in time; for while the soul is occupied with time or place or any image of the kind, it cannot recognize God.\n\nIf it is to know Him, it must have no fellowship with nothingness.\n\nOnly he knows God who recognizes that all creatures are nothingness.\n\nFor, if one creature be set over against another, it may appear to be beautiful and somewhat, but if it be set over against God, it is nothing.\n\nI say moreover: If the soul is to know God it must forget itself and lose itself, for as long as it contemplates self, it cannot contemplate God.\n\nWhen it has lost itself and everything in God, it finds itself again in God when it attains to the knowledge of Him, and it finds also everything which it had abandoned complete in God.\n\nIf I am to know the highest good, and the everlasting Godhead, truly, I must know them as they are in themselves apart from creation.\n\nIf I am to know real existence, I must know it as it is in itself, not as it is parceled out in creatures.\n\nThe whole Being of God is contained in God alone.\n\nThe whole of humanity is not contained in one man, for one man is not all men.\n\nBut in God the soul knows all humanity, and all things at their highest level of existence, since it knows them in their essence.\n\nSuppose any one to be in a beautifully adorned house: he would know much more about it than one who had never entered therein, and yet wished to speak much about it.\n\nThus, I am as sure, as I am of my own existence and God’s, that, if the soul is to know God, it must know Him outside of time and place.\n\nSuch a soul will know clearly how near God’s kingdom is.\n\nSchoolmen have often asked how it is possible for the soul to know God.\n\nIt is not from severity that God demands much from men in order to obtain the knowledge of Himself: it is of His kindness that He wills the soul by effort to grow capacious of receiving much, and that He may give much.\n\nLet no man think that to attain this knowledge is too difficult, although it may sound so, and indeed the commencement of it, and the renouncement of all things, is difficult.\n\nBut  when one attains to it, no life is easier nor more pleasant nor more lovable, since God is always endeavouring to dwell with man, and teach him in order to bring him to Himself."

