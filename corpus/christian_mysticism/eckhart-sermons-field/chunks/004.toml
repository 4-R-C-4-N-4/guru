[content]
body = "It is also a fellowship with the Devil, for everything hath fellowship with its like; and sin maketh the soul and Satan resemble each other.\n\nIt is also an expulsion of Christianity, for it depriveth the sinner of all the profit that comes from Christianity.\n\nIt is also a dungeon of hell, for if the soul remain in the purity in which God created her, neither angel nor devil may rob her of her freedom.\n\nBut sin confines it in hell.\n\nSin is also an eternity of hell, for eternity is in the will, and were it not in the will, it would not be in the consciousness.\n\nNow, people say when they commit sin, that they do not intend to do so always; they intend to turn away from sin.\n\nThat is just as though a man were to kill himself and suppose that he could make himself alive again by his own strength.\n\nThat is, however, impossible; but to turn from sin by one’s own power and come to God is still much more impossible.\n\nTherefore, whosoever is to turn from sin and come to God in His heavenly kingdom, must be drawn by the heavenly Father with the might of His divine power.\n\nThe Father also draws the Son who comes to help us with His grace, by stimulating our free will to turn away from, and hate sin, which has drawn us aside from God, and from the immutable goodness of the Godhead.\n\nThen, if she is willing, He pours the gift of His grace into the soul, which renounces all her misery and sin, and all her works become living.\n\nNow, this grace springs from the centre of Godhead and the Father’s heart, and flows perpetually, nor ever ceases, if the soul obeys His everlasting love.\n\nTherefore He saith in the prophets: “I have loved thee with an everlasting love, therefore with loving kindness have I drawn thee.” Out of the overflow of His universal love He desires to draw all to Himself, and to His Only-begotten Son, and to the Holy Ghost in the joy of the heavenly kingdom.\n\nNow, we should know that before our Lord Jesus Christ was born, the Heavenly Father drew men with all His might for five thousand, two hundred years; and yet, as far as we know, brought not one into the heavenly kingdom.\n\nSo, when the Son saw that the Father had thus strongly drawn men and even wearied Himself, and yet not succeeded, He said to the Father: “I will draw them with the cords of a man.” It was as though He said, “I see well, Father, that Thou with all Thy might, canst not succeed, therefore will I myself draw them with the cords of a man.” Therefore the Son came down from heaven, and was incarnate of a Virgin, and took upon Him all our bodily weaknesses, except sin and folly, into which Adam had cast us; and out of all His words and works and limbs and nerves, He made a cord, and drew us so skillfully, and so heartily, that the bloody sweat poured from His sacred Body.\n\nAnd when He had drawn men without ceasing for three and thirty years, He saw the beginnings of a movement and the redemption of all things that would follow.\n\nTherefore He said, “And I, if I be lifted up on the Cross, will draw all men unto Me.” Therefore He was stretched upon the Cross, and laid aside all His glory, and whatever might hinder His drawing men.\n\nNow, there are three natural means of attraction with which Christ on the Cross drew to Himself between the third and the ninth hour, more people than He had drawn before during the three and thirty years of His life.\n\nThe first means by which He draws is affinity, that affinity which brings creatures of the same species together, and like to its like.\n\nWith this cord of affinity he drew men to the Godhead, Whom He always resembles."

