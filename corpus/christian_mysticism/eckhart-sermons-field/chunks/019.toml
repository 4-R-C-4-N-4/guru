[content]
body = "That is not due to the heat, but to the variety of the materials.\n\nSimilarly God works in all hearts not alike but in proportion as He finds them prepared and susceptible.\n\nIf the heart is to be ready for the highest, it must he vacant of all other things.\n\nIf I wish to write on a white tablet, whatever else is written on the tablet, however noble its purport, is a hindrance to me.\n\nIf I am to write, I must wipe the tablet clean of everything, and the tablet is most suitable for my purpose when it is blank.\n\nSimilarly, if God is to write on my heart, everything else must come out of it till it is really sanctified.\n\nOnly so can God work His highest will, and so the sanctified heart has no outward object at all.\n\nThe question arises: But what then does the sanctified heart pray for?\n\nI answer that when truly sanctified, it prays for nothing, for whosoever prays asks God to give him some good, or to take some evil from him.\n\nBut the sanctified heart desires nothing, and contains nothing that it wishes to be freed from.\n\nTherefore it is free of all want except that it wants to be like God.\n\nSt Dionysius commenting on the text, “Know ye not that all run, but one receiveth the prize?” says “this running is nothing else than a turning away from all creatures and being united to the Uncreated.” When the soul gets to this point, it loses its own distinctiveness, and vanishes in God as the crimson of sunrise disappears in the sun.\n\nTo this goal only pure sanctification can arrive.\n\nSt Augustine says.\n\n“the strong attraction of the soul to the Divine reduces everything to nothingness: on earth this attraction is manifested as sanctification.\n\nWhen this process has reached its culminating point, knowledge becomes ignorance, desire indifference and light darkness.\n\nThe reason why God desires a sanctified heart more than any other is apparent when we ask the question,  “What does God seek in all things?” The mouth of Wisdom says to us, “In all things I seek rest,” and rest is to be found only in the sanctified heart; therein therefore God is more glad to dwell than in any other thing.\n\nThou shouldest also know that the more a man sets himself to be receptive of divine influence, the happier he is: who most sets himself so, is the happiest.\n\nNow no man can reach this condition of receptivity except by conformity with God, which comes from submission to God.\n\nThis is what Saint Paul means when he says, “Put on the Lord Jesus Christ,” that is “be conformed to Christ.” Whosoever wishes to comprehend the lofty rank and benefit of sanctification must mark Christ’s words to His disciples regarding His humanity, “It is profitable for you, that I go away, for, if I go not away, the Comforter will not come to you.” As if to say, “Ye have so much desire towards my natural outward form, that ye cannot fully desire the Holy Spirit.” Therefore put away forms and unite yourselves with formless Being, for God’s spiritual comfort is only offered to those who despise earthly comfort.\n\nNow, all thoughtful folk, mark me!\n\nno one can be truly happy, except he who abides in the strictest sanctification.\n\nNo bodily and fleshly delight can ever take place with out spiritual loss, for the flesh lusteth against the spirit, and the spirit against the flesh.\n\nTherefore, the more a man fleeth from the created, the more the Creator hastens to him.\n\nAnd consider this: if the pleasure we take in the outward image of our Lord Jesus Christ diminishes our capacity for receiving the Holy Spirit, how much more must our unbridled desire for earthly comforts diminish it!"

