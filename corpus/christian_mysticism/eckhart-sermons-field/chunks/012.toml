[content]
body = "No, they are certainly not; for the work of the angels is the will of God, and the will of God is the work of the angels; their service to us does not hinder their joy nor their working.\n\nIf God told an angel to go to a tree and pluck caterpillars off it, the angel would be quite ready to do so, and it would be his happiness, if it were the will of God.\n\nThe man who abides in the will of God wills nothing else than what God is, and what He wills.\n\nIf he were ill he would not wish to be well.\n\nIf he really abides in God’s will, all pain is to him a joy, all complication, simple: yea, even the pains of hell would be a joy to him.\n\nHe is free and gone out from himself, and from all that he receives, he must be free.\n\nIf my eye is to discern colour, it must itself be free from all colour.\n\nThe eye with which I see God is the same with which God sees me.\n\nMy eye and God’s eye is one eye, and one sight, and one knowledge, and one love.\n\nThe man who abides in God’s love must be dead to himself and all created things, and regard himself as a mere unit among a thousand million.\n\nSuch a man must renounce himself and all the world.\n\nSupposing a man possessed all the world, and gave it back to God intact just as he received it, God would give him back, all the world and everlasting life to boot.\n\nAnd supposing there were another man who had nothing but a good will, and he thought in his heart, “Lord, were all this world mine, and two worlds more beside it, I would give them and myself also back to Thee as I received them from thee”; to that man God would give back as much as he had given away.\n\nAnd supposing a man had renounced himself for twenty years, if he took himself back for a moment, that man’s renunciation would be as nothing.\n\nThe man who has truly renounced himself and does not once cast a glance on what he has renounced, and thus remains immovable and unalterable, that man alone has really renounced self.\n\nMay God and the Eternal Wisdom grant us to remain equally immovable and unalterable with Himself.\n\nAmen."

