[content]
body = "In order that God may draw more to Himself, and forget His wrath, the Son saith, “Beloved Father, seeing that Thou wouldest not forgive sins because of all the former sacrifices offered, lo I, Thine Only begotten Son, Who resemble Thy Godhead in all things, in Whom Thou hast hidden all the riches of divine love, I come to the Cross, that I may be a living sacrifice before Thine eyes; that out of Thy fatherly compassion Thou mayest bend and look on Me, Thine only Son, and on My Blood flowing from My wounds, and slake the fiery sword with which in the angel’s hands Thou hast barred the way to Paradise, that all who have repented and bewailed their sins through Me, may enter therein.” The second means of attraction which He used is Emptiness, as we see when we place one end of a hollow pipe in water, and draw up it by suction; the water runs up the stem to the mouth, because the emptiness of the pipe, from which the air has been drawn, draws the water to itself.\n\nSo Our Lord Jesus Christ made Himself empty that He might wisely draw all things to Himself.\n\nTherefore He let all the blood that was in His Body flow out, and so attracted to Himself all the compassion and grace that was in His Father’s heart, so completely and profitably as to suffice for the whole world.\n\nAccordingly, the Father said, “My compassion will I never forget,” and further, “Now, My Son, be bold and strong that Thou mayest lead the people altogether into the land which I have promised, the land of heavenly joys, the land which floweth with the honey of My Godhead, and with the milk of Thy manhood.” The third means of attraction is this—that as we see the sun draw up the mists from the earth to heaven, so the heart of our Lord Jesus Christ waxed hot as a fiery furnace upon the Cross, so fiercely burned the flame of love which He felt towards the whole world.\n\nThus, with the heat of His love, from which nothing could be hidden, so intense was it—He drew the whole world to Himself.\n\nNever did our Lord Jesus Christ display such great love as when He suffered the torture of the Cross when He gave His life for us, and washed our sins with His precious Blood.\n\nTherefore with the cords of Love, He drew us all to Himself upon the Cross that those who feel the drawing of His death and martyrdom might live with Him in everlasting felicity.\n\nNow when the Holy Spirit saw that the Only Begotten Son of the Father had drawn so wisely that He had won to Himself all things in heaven and earth, He also felt impelled by His own love and kindness to  draw.\n\nTherefore He said, “I will also draw with My cords and My net.” So He made a net of the seven high attributes of the Father, of the seven graces of the Son, of His own seven gifts, and of the seven Christian virtues.\n\nThus He assures us that we shall never perish, for we are so caught by His goodness that He expels from us all the evil works of the flesh, and produces in us His fruits, so that we gain the reward of everlasting life.\n\nMay the Father of His love, and the Son of His grace, and the Holy Spirit with His fellowship, grant us to be worthy of the same.\n\nAmen."

