[content]
body = "The earth cannot flee from heaven: whether it flee up or down, the heaven rains its influence upon it, and stamps its impress upon it, and makes it fruitful, whether it be willing or not.\n\nThus doth God with men: whoever thinketh to escape Him, flies into His bosom, for every corner is open to Him.\n\nGod brings forth His Son in thee, whether thou likest it or not, whether thou sleepest or wakest; God worketh His own will.\n\nThat man is unaware of it, is man’s fault, for his taste is so spoilt by feeding on earthly things that he cannot relish God’s love.\n\nIf we had love to God, we should relish God, and all His works; we should receive all things from God, and work the same works as He worketh.\n\nGod created the soul after the image of His highest perfection.\n\nHe issued forth from the treasure-house of the everlasting Fatherhood in which He had rested from all eternity.\n\nThen the Son opened the tent of His everlasting glory and came forth from His high place to fetch His Bride, whom the Father had espoused to Him from all Eternity, back to that heaven from which she came.\n\nTherefore He came forth rejoicing as a bridegroom and suffered the pangs of love.\n\nThen He returned to His secret chamber in the silence and stillness of the everlasting Fatherhood.\n\nAs He came forth from the Highest, so He returned to the Highest with His Bride, and revealed to her the hidden treasures of His Godhead.\n\nThe first beginning is for the sake of the last end.\n\nGod Himself doth not rest because He is the beginning, but because He is the end and goal of all creation.\n\nThis end is concealed in the darkness of the everlasting Godhead, and is unknown, and never was known, and never will be known.\n\nGod Himself remains unknown; the light of the everlasting Father shineth in darkness, and the darkness comprehended it not.\n\nMay the truth of which we have spoken lead us to the truth.\n\nAmen."

