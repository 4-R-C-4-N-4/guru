[content]
body = "OUTWARD AND INWARD MORALITY I Cor.\n\nxv.\n\n10 .—“The Grace of God.” Grace is from God, and works in the depth of the soul whose powers it employs.\n\nIt is a light which issues forth to do service under the guidance of the Spirit.\n\nThe Divine Light permeates the soul, and lifts it above the turmoil of temporal things to rest in God.\n\nThe soul cannot progress except with the light which God has given it as a nuptial gift; love works the likeness of God into the soul.\n\nThe peace, freedom and blessedness of all souls consist in their abiding in God’s will.\n\nTowards this union with God for which it is created the soul strives perpetually.\n\nFire converts wood into its own likeness, and the stronger the wind blows, the greater grows the fire.\n\nNow by the fire understand love, and by the wind the Holy Spirit.\n\nThe stronger the influence of the Holy Spirit, the brighter grows the fire of love; but not all at once, rather gradually as the soul grows.\n\nLight causes flowers and plants to grow and bear fruit; in animals it produces life, but in men blessedness.\n\nThis comes from the  grace of God, Who uplifts the soul, for if the soul is to grow God-like it must be lifted above itself.\n\nTo produce real moral freedom, God’s grace and man’s will must co-operate.\n\nAs God is the Prime Mover of nature, so also He creates free impulses towards Himself and to all good things.\n\nGrace renders the will free that it may do everything with God’s help, working with grace as with an instrument which belongs to it.\n\nSo the will arrives at freedom through love, nay, becomes itself love, for love unites with God.\n\nAll true morality, inward and outward, is comprehended in love, for love is the foundation of all the commandments.\n\nAll outward morality must be built upon this basis, not on self-interest.\n\nAs long as man loves something else than God, or outside God, he is not free, because he has not love.\n\nTherefore there is no inner freedom which does not manifest itself in works of love.\n\nTrue freedom is the government of nature in and outside man through God; freedom is essential existence unaffected by creatures.\n\nBut love often begins with fear; fear is the approach to love: fear is like the awl which draws the shoemaker’s thread through the leather.\n\nAs for outward works they are ordained for this purpose that the outward man may be directed to God.\n\nBut the inner work, the work of God in the soul is the chief matter; when a man finds this within himself, he can let go externals.\n\nNo law is given to the righteous, because he fulfils the law inwardly, and bears it in himself, for the least thing done by God is better than all the work of creatures.\n\nBut this is intended for those who are enlightened by God and the Holy Scriptures.\n\nBut here on earth man never attains to being unaffected by external things.\n\nThere never was a Saint so great as to be immovable.\n\nI can never arrive at a state when discord shall be as pleasing to my ears as harmony.\n\nSome people wish to do without good works.\n\nI say, “This cannot be.” As soon as the disciples received the Holy Ghost, they began to work.\n\nWhen Mary sat at the feet of our Lord that was her school time.\n\nBut afterwards when Christ went to heaven, and she received the Holy Spirit, she began to serve and was a handmaid of the disciples.\n\nWhen saints become saints, they begin to work, and so gather to the refuge of everlasting safety.\n\nHow can a man abide in love, when he does not keep God’s commands which issue forth from love?"

