[content]
body = "How can the inner man be born in God, when the outer man abides not in the following of Christ, in self-mortification and in suffering, for there is no being born of God, except through Christ.\n\nLove is the fulfilling of all commands; therefore however much man strives to reach this freedom, the body can never quite attain thereto, and must be ever in conflict.\n\nSeeing that good works are  the witness of the Holy Ghost, man can never do without them.\n\nThe aim of man is not outward holiness by works, but life in God, yet this last expresses itself in works of love.\n\nOutward as well as inward morality helps to form the idea of true Christian freedom.\n\nWe are right to lay stress on inwardness, but in this world there is no inwardness without an outward expression.\n\nIf we regard the soul as the formative principle of the body, and God as the formative principle of the soul, we have a profounder principle of ethics than is found in Pantheism.\n\nThe fundamental thought of this system is the real distinction between God and the world, together with their real inseparability, for only really distinct elements can interpenetrate each other.\n\nThe inner work is first of all the work of God’s grace in the depth of the soul which subsequently distributes itself among the faculties of the soul, in that of Reason appearing as Belief, in that of Will as Love, and in that of Desire as Hope.\n\nWhen the Divine Light penetrates the soul, it is united with God as light with light.\n\nThis is the light of faith.\n\nFaith bears the soul to heights unreachable by her natural senses and faculties.\n\nAs the peculiar faculty of the eye is to see form and colour, and of the ear to hear sweet tones and voices, so is aspiration peculiar to the soul.\n\nTo relax from ceaseless aspiration is sin.\n\nThis energy of aspiration directed to and grasping God, as far as is possible for the creature, is called Hope, which is also a divine virtue.\n\nThrough this faculty the soul acquires such great confidence that she deems nothing in the Divine Nature beyond her reach.\n\nThe third faculty is the inward Will, which, always turned to God like a face, absorbs to itself love from God.\n\nAccording to the diverse directions in which redemptive Grace through the Holy Spirit is imparted to the different faculties of men, it finds corresponding expression as one of the Spirit’s seven gifts.\n\nThis impartation constitutes man’s spiritual birth which brings him out of sin into a state of grace while natural birth makes him a sinner.\n\nAs God can only be seen by His own light, so He can only be loved by His own love.\n\nThe merely natural man is incapable of this, because nature by itself is incapable of responding to the Divine Love and is confined within its own circle.\n\nTherefore it is necessary for Grace, which is a simple supernatural power, to elevate the natural faculties to union in God above the merely temporal objects of existence.\n\nThe possibility of love to God is grounded in the relative likeness between man and God.\n\nIf the soul is to reach its moral goal, i.e.\n\nGodlikeness, it must become inwardly like God through grace, and a spiritual birth which is the spring of true morality.\n\nThe inner work that man has to do is the practical realization of Grace: without this, all outward work is ineffectual for salvation.\n\nVirtue is never mere virtue, it is either from God, or through God, or in God.\n\nAll the soul’s works which are to inherit an everlasting recompense must be carried on in God.\n\nThey are rewarded by Him in proportion as they are carried on in Him, for the soul is an instrument of God whereby He carries on His work.\n\nThe essence of morality is inwardness, the intensity of will from which it springs, and the nobleness of the aim for which it is practiced."

