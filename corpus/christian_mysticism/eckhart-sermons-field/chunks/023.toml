[content]
body = "When a good work is done by a man, he is free of it, and through that freedom is liker and nearer to his Original than he was before.\n\nThe moral task of man is a process of spiritualization.\n\nAll creatures are go-betweens, and we are placed in time that by diligence in spiritual business we may grow liker and nearer to God.\n\nThe aim of man is beyond the temporal—in the serene region of the everlasting Present.\n\nIn this sense the New Birth of man is the focus towards which all creation strives, because man is the image of God after the likeness of which the world is created.\n\nAll time strives towards eternity or the timeless Now, out of which it issued at creation.\n\nThe merely temporal life in itself is a negation of real being, because it depends on itself and not on the deepest foundation of life; therefore also natural love is cramped finite and defective.\n\nIt must through grace be lifted to the highest sphere of existence, and attain to freedom outside the narrow confines of the natural.\n\nThereby love becomes real love, because only that is real which is comprehended and loved in its essence.\n\nOnly by grace man comes from the temporal and transitory to be one with God.\n\nThis lifting of manifoldness to unity is the supreme aim of ethics; by thus the divine birth is completed on the side of man.\n\nThis passage from nothingness to real being, this quitting of oneself is a birth accompanied by pain, for by it natural love is excluded.\n\nAll grief except grief for sin comes from love of the world.\n\nIn God is neither sorrow, nor grief, nor trouble.\n\nWouldst thou be free from all grief and trouble, abide and walk in God, and to God alone.\n\nAs long as love of the creature is in us, pain cannot cease.\n\nThis is the chief significance of the suffering of Christ for us, that we cast all our grief into the ocean of His suffering.\n\nIf thou sufferest only regarding thyself, from whatever cause it may be, that suffering causes grief to thee, and is hard to bear.\n\nBut if thou sufferest regarding God and Him alone, that suffering is not grievous, nor hard to bear, because God bears the load.\n\nThe love of the Cross must swallow up our personal grief.\n\nWhoso does not suffer from love, for him sorrow is sorrow and grievous to bear; but whoso  suffers from love he sorrows not, and his suffering is fruitful in God.\n\nTherefore is sorrow so noble; he who sorrows most is the noblest.\n\nNow no mortal’s sorrow was like the sorrow which Christ bore; therefore he is far nobler than any man.\n\nVerily were there anything nobler than sorrow, God would have redeemed man thereby.\n\nSorrow is the root of all virtue.\n\nThrough the higher love the whole life of man is to be elevated from temporal selfishness to the spring of all love, to God: man will again be master over nature by abiding in God and lifting her up to God."

