[content]
body = "TRUE HEARING Ecclesiasticus xxiv.\n\n30 .—“Whoso heareth Me shall not be confounded.” The everlasting and paternal wisdom saith, “Whoso heareth Me is not ashamed.” If he is ashamed of anything he is ashamed of being ashamed.\n\nWhoso worketh in Me sinneth not.\n\nWhoso confesseth Me and feareth Me, shall have eternal life.\n\nWhoso will hear the wisdom of the Father must dwell deep, and abide at home, and be at unity with himself.\n\nThree things hinder us from hearing the everlasting Word.\n\nThe first is fleshliness, the second is distraction, the third is the illusion of time.\n\nIf a man could get free of these, he would dwell in eternity, and in the spirit, and in solitude, and in the desert, and there would hear the everlasting Word.\n\nOur Lord saith, “No man can hear My word nor my teaching without renouncing himself.” All that the Eternal Father teaches and reveals is His being, His nature, and His Godhead, which He manifests to us in His Son, and teaches us that we are also His Son.\n\nAll that God worketh and teacheth, He  worketh in His Son.\n\nAll His work is directed to this end that we also may be His Son.\n\nWhen God sees that we are indeed His son, He yearns after us, and in the depth of His Divine Being waves of longing break forth, to reveal to us the abyss of His Godhead, and the fullness of His essence; He hastens to identify Himself with us.\n\nHerein He hath joy and gladness in full measure.\n\nGod loveth men not less than He loveth Himself.\n\nIf thou really lovest thyself, thou lovest all men as thyself; as long as thou lovest any one less than thyself, thou dost not really love thyself.\n\nThat man is right who loves all men as himself.\n\nSome folk say: “I love my friends, who do me kindness, more than other people.” Such love is imperfect and incomplete; it is like having your sails only half-filled with wind.\n\nWhen I love anyone as much as myself, I would just as soon that joy or sorrow, death or life were mine, as well as his.\n\nThat would be the dictate of right reason.\n\nSt Paul felt such love when he said, “I would that I were cut off from God for my friends’ sake.” Now to be cut off from God is equivalent to suffering the pains of hell.\n\nSome ask whether St Paul was on the way to perfection or was perfect.\n\nI answer, he was perfect, or he would have spoken otherwise.\n\nI wish further to elucidate this saying of St Paul that he was willing to be cut off from God.\n\nThe highest act of renunciation for man is for God’s sake to give up God, and that is what St Paul was willing to do; to give up all the blessings that he might receive from God.\n\nWhen for God’s sake he gave up God, God still remained with him, since God’s essence is Himself, not any impression or reception of Himself.\n\nHe who does so is a true man to whom no grief may happen, any more than it happens to the Divine Being.\n\nThere is a somewhat in the soul that is, as it were, a blood-relative of God.\n\nIt is one, it has nothing in common with nothing, nor is it like nothingness, nothing.\n\nAll that is created is nothing, all far from and foreign to the soul.\n\nCould I but find myself one instant in that sphere of pure existence, I should regard myself as little as a worm.\n\nA question arises regarding the angels who dwell with us, serve us and protect us, whether their joys are equal to those of the angels in heaven, or whether they are diminished by the fact that they protect and serve us."

