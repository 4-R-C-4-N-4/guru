[content]
body = "Therefore sanctification is the best of all things, for it cleanses the soul, and illuminates the conscience, and kindles the heart, and wakens the spirit, and girds up the loins, and glorifies virtue and separates us from creatures, and unites us with God.\n\nThe quickest means to bring us to perfection is suffering; none enjoy everlasting blessedness more than those who share with Christ the bitterest pangs.\n\nNothing is sharper than suffering, nothing is sweeter than to have suffered.\n\nThe surest foundation in which this perfection may rest is humility; whatever here crawls in the deepest abjectness, that the Spirit lifts to the very heights of God, for love brings suffering and suffering brings love.\n\nWays of living are many; one lives thus, and another thus; but whosoever will reach the highest life, let him in a few words hear the conclusion of the whole matter: keep thyself clear of all men, keep thyself from all imaginations that crowd upon the mind, free thyself from all that is contingent, entangling, and cumbersome and direct thy mind always to gazing upon God in thy heart with a steadfast look that never wavers: as for other spiritual exercises—fasting, watching and prayer—direct them all to this one end, and practice them so far as they may be helpful thereto, so wilt thou win to perfection.\n\nHere some one may ask, “Who can thus gaze always without wavering at a divine object?” I answer: “No one who now lives.” This has only been said to thee that thou mightest know what the highest is, and that thou mightest have desires after it.\n\nBut when thou losest sight of the Divine, thou shouldest feel as if bereft of thine eternal salvation, and shouldest long to recover it, and watch over thyself at all times, and direct thy aims and longing towards it.\n\nMay God be blessed for ever.\n\nAmen.\n\n1 That is separation from all outward things."

