[content]
body = "SANCTIFICATION 1 1 That is separation from all outward things.\n\nSt Luke x.\n\n42 .—“One thing is needful.” I have read many writings both of heathen philosophers and inspired prophets, ancient and modern, and have sought earnestly to discover what is the best and highest quality whereby man may approach most nearly to union with God, and whereby he may most resemble the ideal of himself which existed in God, before God created men.\n\nAnd after having thoroughly searched these writings as far as my reason may penetrate, I find no higher quality than sanctification or separation from all creatures.\n\nTherefore said our Lord to Martha, “One thing is necessary,” as if to say, “whoso wishes to be untroubled and content, must have one thing, that is sanctification.” Various teachers have praised love greatly, as St Paul does, when he saith, “to whatever height I may attain, if I have not love, I am nothing.” But I set sanctification even above love; in the first place because the best thing in love is that it compels me to love God.\n\nNow it is a greater thing that I compel God to come to me, than that I compel myself to go to God.\n\nSanctification compels God to come to me, and I prove this as follows:— Everything settles in its own appropriate place; now God’s proper place is that of oneness and holiness; these come from sanctification; therefore God must of necessity give Himself to a sanctified heart.\n\nIn the second place I set sanctification above love, because love compels me to suffer all things for the sake of God; sanctification compels me to be the recipient of nothing but God; now, it is a higher state to be the recipient of nothing but God than to suffer all things for God, because in suffering one must have some regard to the person who inflicts the suffering, but sanctification is independent of all creatures.\n\nMany teachers also praise humility as a virtue.\n\nBut I set sanctification above humility for the following reason.\n\nAlthough humility may exist without sanctification, perfect sanctification cannot exist without perfect humility.\n\nPerfect humility tends to the annihilation of self; sanctification also is so close to self-annihilation that nothing can come between them.\n\nTherefore perfect sanctification cannot exist without humility, and to have both of these virtues is better than to have only one of them.\n\nThe second reason why I set sanctification above humility is that humility stoops to be under all creatures, and in doing so goes out of itself.\n\nBut sanctification remains self-contained.\n\nBut to remain contained within oneself is nobler than to go out of oneself for any purpose whatever; therefore saith the Psalmist, “The King’s daughter is all glorious within ,” that is, all her glory is from her inwardness.\n\nPerfect sanctification has no inclination nor going-out towards any creature; it wishes neither to be above or below, neither to be like nor unlike any creature, but only to be one .\n\nWhosoever wishes to be this or that wishes to be somewhat; but sanctification wishes to be nothing.\n\nBut some one may say: “All virtues must have existed in fullness in Our Lady, therefore perfect sanctification must have been in her.\n\nIf sanctification is higher than humility, why did Our Lady speak of her humility, and not of her sanctification, when she said, “For He hath regarded the lowliness of His handmaiden?” To this I answer that God possesses both sanctification and humility, so far as we may attribute virtues to God.\n\nNow thou shouldest know that His humility brought God to stoop down to human nature, and our Lady knew that He wished for the same quality in her, and in that matter had regard to her humility alone."

