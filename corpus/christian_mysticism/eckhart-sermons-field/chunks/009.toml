[content]
body = "THE ANGEL’S GREETING St Luke i.\n\n28 .—“Hail, thou that art highly favoured among women, the Lord is with thee.” Here there are three things to understand: the first, the modesty of the angel; the second, that he thought himself unworthy to accost the Mother of God; the third, that he not only addressed her, but the great multitude of souls who long after God.\n\nI affirm that had the Virgin not first borne God spiritually He would never have been born from her in bodily fashion.\n\nA certain woman said to Christ, “Blessed is the womb that bear Thee.” To which Christ answered, “Nay, rather blessed are they that hear the Word of God and keep it.” It is more worthy of God that He be born spiritually of every pure and virgin soul, than that He be born of Mary.\n\nHereby we should understand that humanity is, so to speak, the Son of God born from all eternity.\n\nThe Father produced all creatures, and me among them, and I issued forth from Him with all creatures, and yet I abide in the Father.\n\nJust as the word which I now speak is conceived and spoken forth by me, and you all receive it, yet none the less it abides in me.\n\nThus I and all creatures abide in the Father.\n\nHereto I adjoin a parable.\n\nThere were a certain man and wife; the woman by accident lost an eye, and was sorely troubled thereat.\n\nHer husband then said to her, “Wife, why are you troubled?\n\n“She answered, “It is not the loss of my eye that troubles me, but the thought that you may love me less on account of that loss.” He said, “I love you all the same.” Not long after he put one of his own eyes out, and came to his wife and said, “Wife, that you may believe I love you, I have made myself like you: I, too, now, have only one eye.” So men could hardly believe that God loved them till God put one of His eyes out, that is took upon Himself human nature, and was made man.\n\nJust as fire infuses its essence and clearness into the dry wood, so has God done with man.\n\nHe has created the human soul and infused His glory into it, and yet in His own essence has remained unchangeable.\n\nIf you ask me whether, seeing that my spiritual birth is out of time, whether I am an eternal son, I answer “Yes,” and “No.” In the everlasting foreknowledge of God, I slumbered like a word unspoken.\n\nHe hath brought me forth His son in the image of His eternal fatherhood, that I also should be a father and bring forth Him.\n\nIt is as if one stood before a high mountain, and cried, “Art thou there?” The echo comes back, “Art thou there?” If one cries, “Come out.” the echo answers, “Come out.” Again: If I am in a higher place and say to some one, “Come up hither,” that might be difficult for him.\n\nBut if I say, “Sit down,” that would be easy.\n\nThus God dealeth with us.\n\nWhen man humbles himself, God cannot restrain His mercy; He must come down and pour His grace into the humble man, and He gives Himself most of all, and all at once, to the least of all.\n\nIt is essential to God to give, for His essence is His goodness and His goodness is His love.\n\nLove is the root of all joy and sorrow.\n\nSlavish fear of God is to be put away.\n\nThe right fear is the fear of losing God.\n\nIf the earth flee downward from heaven, it finds heaven beneath it; if it flee upward, it comes again to heaven."

