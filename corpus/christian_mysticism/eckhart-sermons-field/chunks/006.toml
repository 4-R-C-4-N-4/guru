[content]
body = "THE NEARNESS OF THE KINGDOM St Luke xxi.\n\n31 .—“Know that the Kingdom of God is near.” Our Lord saith that the Kingdom of God is near us.\n\nYea, the Kingdom of God is within us as St Paul saith “our salvation is nearer than when we believed.” Now we should know in what manner the Kingdom of God is near us.\n\nTherefore let us pay diligent attention to the meaning of the words.\n\nIf I were a king, and did not know it, I should not really be a king.\n\nBut, if I were fully convinced that I was a king, and all mankind coincided in my belief, and I knew that they shared my conviction, I should indeed be a king, and all the wealth of the king would be mine.\n\nBut, if one of these three conditions were lacking, I should not really be a king.\n\nIn similar fashion our salvation depends upon our knowing and recognizing the Chief Good which is God Himself.\n\nI have a capacity in my soul for taking in God entirely.\n\nI am as sure as I live that nothing is so near to me as God.\n\nGod is nearer to me than I am to myself; my existence depends  on the nearness and presence of God.\n\nHe is also near things of wood and stone, but they know it not.\n\nIf a piece of wood became as aware of the nearness of God as an archangel is, the piece of wood would be as happy as an archangel.\n\nFor this reason man is happier than the inanimate wood, because he knows and understands how God is near him.\n\nHis happiness increases and diminishes in proportion to the increase and diminution in his knowledge of this.\n\nHis happiness does not arise from this that God is near him, and in him, and that He possesses God; but from this, that he knows the nearness of God, and loves Him, and is aware that “the Kingdom of God is near.” So, when I think on God’s Kingdom, I am compelled to be silent because of its immensity, because God’s Kingdom is none other than God Himself with all His riches.\n\nGod’s Kingdom is no small thing: we may survey in imagination all the worlds of God’s creation, but they are not God’s Kingdom.\n\nIn whichever soul God’s Kingdom appeareth, and which knoweth God’s Kingdom, that soul needeth no human preaching or instruction; it is taught from within and assured of eternal life.\n\nWhoever knows and recognizes how near God’s Kingdom is to him may say with Jacob, “God is in this place, and I knew it not.” God is equally near in all creatures.\n\nThe wise man saith, “God hath spread out His net over all creatures, so that whosoever wishes to discover Him may find and recognize Him in each one.” Another saith, “He knows God rightly who recognizes Him alike in all things.” To serve God with fear is good; to serve Him out of love is better; but to fear and love Him together is best of all.\n\nTo have a restful or peaceful life in God is good; to bear a life of pain in patience is better; but to have peace in the midst of pain is the best of all.\n\nA man may go into the field and say his prayer and be aware of God, or, he may be in Church and be aware of God; but, if he is more aware of Him because he is in a quiet place, that is his own deficiency and not due to God, Who is alike present in all things and places, and is willing to give Himself everywhere so far as lies in Him.\n\nHe knows God rightly who knows Him everywhere.\n\nSt Bernard saith, “How is it that mine eye and not my foot sees heaven?\n\nBecause mine eye is more like heaven than my foot is."

