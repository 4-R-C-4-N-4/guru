[content]
body = "THE SELF-COMMUNICATION OF GOD St John xiv.\n\n23 .—“If a man love me, he will keep my words; and my Father will love him, and we will come unto him, and make our abode with him.” We read in the Gospels that Our Lord fed many people with five loaves and two fishes.\n\nSpeaking parabolically, we may say that the first loaf was—that we should know ourselves, what we have been everlastingly to God, and what we now are to Him.\n\nThe second—that we should pity our fellow Christian who is blinded; his loss should grieve us as much as our own.\n\nThe third—that we should know our Lord Jesus Christ’s life, and follow it to the utmost of our capacity.\n\nThe fourth—that we should know the judgments of God.\n\nAll that may be said of the pains of hell is true.\n\nSt Dionysius saith, “To be separated from God is hell, and the sight of God’s countenance is heaven.” The fifth is—that we should know the Godhead which has flowed into the Father and filled Him with joy, and which has flowed into the Son and filled Him with wisdom, and the Two are essentially one.\n\nTherefore said Christ, “Where I am, there is My Father, and where My Father is, there am I” And They have flowed into the Holy Ghost and filled Him with good will.\n\nTherefore said Christ, “I and My Father have one Spirit,” and the Holy Ghost has flowed into the soul.\n\nThe soul has by nature two capacities.\n\nThe one is intelligence, which may comprehend the Holy Trinity with all its works and be contained by It as water is by a vessel.\n\nWhen the vessel is full, it has enclosed all that is contained in it, and is united with that which it has enclosed, and of which it is full.\n\nThus intelligence becomes one with that which it has understood and comprehended.\n\nIt is united therewith by grace, as the Son is one with the Father.\n\nThe second capacity is Will.\n\nThat is a nobler one, and its essential characteristic is to plunge into the Unknown which is God.\n\nThere the Will lays hold of God in a mysterious manner, and the Unknown God imparts His impress to the Will.\n\nThe Will draws thought and all the powers of the soul after it in its train, so that the soul becomes one with God by grace, as the Holy Ghost is one with the Father and with the Son by nature.\n\nIn God it is more worthy to be loved, than it is in itself.\n\nTherefore St Augustine saith that the soul is greater by its love-giving power than by its life-giving power.\n\nIf man might only abide in this union, and do all the works which have ever been done by creatures, he would be no other than God, if his higher powers so brought his lower powers under control, that he could only work God-like works.\n\nThat however may not be, and man’s highest faculty therefore contemplates God as best it can, and so influences his lower faculties that they can discern between Good and Evil.\n\nAdam possessed that union with God which we have spoken of, and while he had it, his capacity contained the capacities of all creatures.\n\nThe load-stone attracts the needle, and the needle receives the magnetic power, so that it can also attract other needles and draw them to the load-stone.\n\nBut if one draws the first needle away, all the other needles come with it.\n\nThus was it with Adam: when, in his highest capacity, he was separated from God all his capacities deteriorated.\n\nThence came also discord and the clashing of oppugnant wills among the lower creation, and deterioration of their powers down to the lowest."

