[content]
body = "“ Meister Eckhart ,” who has been called the “Father of German thought,” was a Dominican monk, and one of the most profound thinkers of the Middle Ages.\n\nHe was born about 1260 A.D.\n\nin Thuringia, and died at Cologne 1327 A.D.\n\nIn 1295 he was Prior of the Dominicans at Erfurt and Vicar-General of Thuringia.\n\nIn 1300 he was sent to the University of Paris, where he studied Aristotle and the Platonists, and took the degree of Master of Arts.\n\nIt is possible also that he taught at Paris.\n\nHe already had a wide reputation as a philosopher, and was summoned to Rome in 1302 to assist Pope Boniface VIII.\n\nin his struggle against Philip the Fair.\n\nIn 1304 he became Provincial of his order for Saxony, and in 1307 Vicar-General of Bohemia.\n\nIn 1311 he was sent again to act as professor of theology in the school of Dominicans in Paris, and afterwards in Strasburg.\n\nEverywhere his teaching and preaching left a deep mark.\n\nAt Strasburg he aroused suspicions and created enemies; his doctrine was accused of resembling that of the heretical sects of the “Beghards” and “Brothers of the Holy Spirit.” The Superior-General of the Order had his writings submitted to a close examination by the Priors of Worms and Mayence.\n\nThe history of this episode is very obscure.\n\nIt appears that Eckhart was cited before the tribunal of the Inquisition at Cologne, and that he professed himself willing to withdraw anything that his writings might contain contrary to the teaching of the Church.\n\nThe matter was referred to the Pope, who, in 1329, condemned certain propositions extracted from the writings of Eckhart two years after the death of the latter.\n\nThe importance of Eckhart in the history of scholastic philosophy is considerable.\n\nAt that period all the efforts of religious philosophy were directed to widen theology, and to effect a reconciliation between reason and faith.\n\nThe fundamental idea of Eckhart’s philosophy is that of the Absolute or Abstract Unity conceived as the sole real existence.\n\nHis God is the Θεος αγνοστος of the neoplatonists: He is absolutely devoid of attributes which would be a limitation of His Infinity.\n\nGod is incomprehensible; in fact, with regard to our limited intelligence, God is the origin and final end of every being.\n\nHow then, it may be asked, can God be a Person?\n\nThe answer is, that by the eternal generation of the Son the Father becomes conscious of Himself, and the Love reflected back to the Father by the Son is the Holy Spirit.\n\nTogether with the Son, God also begets the ideal forms of created things.\n\nThe Absolute is thus the common background of God and the Universe.\n\nLike as the Son does, so everything born of God tends to return to Him, and to lose itself in the unity of His Being.\n\nThis theology is really Pantheism.\n\nOf the Absolute we have no cognizance but only of phenomena, but by the resolute endeavour to abstract ourselves from time and space, we can, according to Eckhart, at rare moments, attain to the Absolute by virtue of what he calls “the spark” (Funkelein) of the soul, which comes direct from God.\n\nThis is really God acting in man; to know God is to be one with God.\n\nThis is the final end of all our activity, and the means of attaining thereto is complete quietism.\n\nBut Eckhart shrank from carrying his doctrines out to their extreme logical conclusion, though some of the more fanatical among his followers did so.\n\nOn account of his insistence on the immediacy of man’s approach to God, apart from Church institutions, he may be justly regarded as a fore-runner of the Reformation."

