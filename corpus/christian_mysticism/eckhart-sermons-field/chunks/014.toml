[content]
body = "It is necessary, therefore, for all the creatures which issued forth from God to co-operate earnestly with all their powers to form a Man who may again attain that union with God which Adam enjoyed before he fell, and who may again restore to the creatures their forfeited powers.\n\nThis is fulfilled in Christ as He Himself said, “I, if I be lifted up, will draw all men unto Me.” He means, if He is exalted in our knowledge, He will draw us unto Himself.\n\nIn Him human nature grew divine, and thanked God and loved Him with immeasurable love.\n\nThis also befits God that he loves human nature with so great love.\n\nI counsel you, sisters and brothers, that you grow in knowledge, and thank God, while you are in time, that He brought you out of non-existence to existence, and united you with the Divine Nature.\n\nBut if the Divine Nature be beyond your comprehension, believe simply on Christ; follow His holy example and remain steadfast.\n\nConvert Jews, heathen, heretics, bad Christians, and all who do not enjoy your knowledge of God, and are still astray.\n\nNow rejoice, all ye powers of my soul, that you are so united with God that no one may separate you from Him.\n\nI cannot fully praise nor love Him therefore must I die, and cast myself into the divine void, till I rise from non-existence to existence.\n\nIf I should remain entombed in flesh till the judgment day and suffer the pains of hell, that would be for me a small thing to bear for my beloved Lord Jesus Christ, if I had the certainty at last of not being separated from Him.\n\nWhile I am here, He is in me; after this life, I am in Him.\n\nAll things are therefore possible to me, if I am united to Him Who can do all things.\n\nPreviously I could not distinguish whether we were divine by nature or by grace.\n\nThen came Jesus and enlightened me so that I recognized in the Divine Nature Three Persons, and that the Father was the Bringer-Forth of all things, as St James says, “every perfect gift cometh down from the Father of lights.” The Father and the Son have one Will, and that Will is the Holy Ghost, Who gives Himself to the soul so that the Divine Nature permeates the powers of the soul so that it can only do God-like works.\n\nJust as a spring, which perpetually flows and waters the roots of the flowers, so that the flowers bloom and receive their colours from the water of the spring, so the Godhead imparts Itself to the capacities of the soul that it may grow in the likeness of God.\n\nThe more that the soul receives of the Divine Nature, the more it grows like It, and the closer becomes its union with God.\n\nIt may arrive at such an intimate union that God at last draws it to Himself altogether, so that there is no distinction left, in the soul’s consciousness, between itself and God, though God still regards it as a creature.\n\nWherefore let yourselves not be misled by the light of nature.\n\nThe higher the degree of knowledge which the soul attains to in the light of grace, the darker seems to it the light of nature.\n\nIf the soul would know the real truth it must examine itself, whether it has withdrawn from all things, whether it has lost itself, whether it loves God purely with His love and nothing of its own at the same time, so that it may not be separated from Him by anything, and whether God alone dwells in it.\n\nIf it has lost itself, it is as when the Virgin Mary lost Christ.\n\nShe sought Him for three days, and yet was sure that she would find Him.\n\nAll the while Christ was in the highest class in the school of His Father, unconscious of His mother’s seeking Him."

