[content]
body = "Here some one may make the objection: “Are then all good works and prayers thrown away, since God is unmoved by them, and at the same time we are told to pray to Him for everything?” In answer to this I say that God from all eternity saw everything that would happen, and also when, and how He would make all creatures: He foresaw also all the prayers which would be offered, and which of them He would hear: He saw the earnest prayers which thou wilt offer tomorrow, but He will not listen to them tomorrow, because He heard them in eternity, before thou wast a man at all.\n\nIf, however, thy prayer is half-hearted and not in earnest, God will not deny it now , seeing that He has denied it in eternity.\n\nThus God remains always in His immovable sanctity, but sincere prayer and good works are not lost, for whoso doeth well, will be well rewarded.\n\nWhen God appears to be angry or to do us a kindness, it is we who are altered, while He remains unchangeable, as the same sunshine is injurious to weak eyes and beneficial to strong ones, remaining in itself the same.\n\nRegarding this Isidorus in his book concerning the highest good says, “People ask what was God doing before He created heaven and earth, or whence came the new desire in God to create?” To this he answers, “No new desire arose in God, seeing that creation was everlastingly present in Him, and in His intelligence.” Moses said to God, “When Pharaoh asks me who Thou art, what shall I answer?” God said, “Say, I AM hath sent me unto you,” that is to say, “He Who is unchangeable hath sent me.” Perhaps some one may ask, “Was Christ then also unchangeable, when He said, ‘My soul is troubled even unto death,’ or Mary when she stood under the Cross and lamented?” Here, thou shouldest know that in every man are two kinds of men, the outer and the inner man.\n\nEvery man, who loves God, only uses his outer senses so far as is absolutely necessary; he takes care that they do not drag him down to the level of the beasts, as they do some who might rather he termed beasts than men.\n\nThe soul of the spiritual man whom God moves to love Him with all his powers concentrates all its forces on the inner man.\n\nTherefore He saith, “Thou shalt love the Lord thy God with all thy heart.” Now, there are some who waste the powers of the soul for the use of the outer man; these are they who turn all their thoughts and desires towards transitory things, and know nothing of the inner life.\n\nBut a good man sometimes deprives his outer man of all power  that it may have a higher object, while sensualists deprive the inner man of all power to use it for the outer man.\n\nThe outer man may go through various experiences, while the inner man is quite free and immovable.\n\nNow both in Christ and in Our Lady there was an inner and an outer man; when they spoke of outward things, they did so with the outward man, while the inner man remained immovable.\n\nIt may be asked: “What is the object of this immovable sanctity?” I answer, “Nothing”: that is, so far as God has His way with a man, for He has not His way with all men.\n\nAlthough God is Almighty, He can only work in a heart when He finds readiness or makes it.\n\nHe works differently in men than in stones.\n\nFor this we may take the following illustration: if we bake in one oven three loaves of barley-bread, of rye-bread, and of wheat, we shall find the same heat of the oven affects them differently; when one is well-baked, another will be still raw, and another yet more raw."

