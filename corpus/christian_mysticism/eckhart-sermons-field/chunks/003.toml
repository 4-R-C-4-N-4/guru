[content]
body = "THE ATTRACTIVE POWER OF GOD St John vi.\n\n44.\n\n—“No one can come unto Me, except the Father which hath sent Me draw him.” Our Lord Jesus Christ hath in the Gospel spoken with His own blessed lips these words, which signify, “No man can come to Me unless My Father draw him.” In another place He says, “I am in the Father and the Father in Me.” Therefore whoever cometh to the Son cometh to the Father.\n\nFurther, He saith, “I and the Father are One.\n\nTherefore whomsoever the Father draweth, the Son draweth likewise.” St Augustine also saith, “The works of the Holy Trinity are inseparable from each other.” Therefore the Father draweth to the Son, and the Son draweth to the Holy Ghost, and the Holy Ghost draweth to the Father and the Son; and each Person of the Trinity, when He draweth to the Two Others, draweth to Himself, because the Three are One.\n\nThe Father draweth with the might of His power, the Son draweth with His unfathomable wisdom, the Holy Ghost draweth with His love.\n\nThus we are drawn by the Sacred Trinity with the cords of Power, Wisdom and Love, when we are drawn from an evil thing to a good thing, and from a good thing to a better, and from a better thing to the best of all.\n\nNow the Father draws us from the evil of sin to the goodness of His grace with the might of His measureless power, and He needs all the resources of His strength in order to convert sinners, more than when He was about to make heaven and earth, which He made with His own power without help from any creature.\n\nBut when He is about to convert a sinner, He always needs the sinner’s help.\n\n“He converts thee not without thy help,” as St Augustine says.\n\nTherefore deadly sin is a breach of nature, a death of the soul, a disquiet of the heart, a weakening of power, a blindness of the sense, a sorrow of the spirit, a death of grace, a death of virtue, a death of good works, an aberration of the spirit, a fellowship with the devil, an expulsion of Christianity, a dungeon of hell, a banquet of hell, an eternity of hell.\n\nTherefore, if thou committest a deadly sin thou art guilty of all these and incurrest their consequences.\n\nRegarding the first point: Deadly sin is a breach of nature, for every man’s nature is an image and likeness and mirror of the Trinity, of Godhead and of eternity.\n\nAll these together are marred by a deadly sin; therefore, it is a breach of nature.\n\nSuch sin is also the death of the soul, for death is to lose life.\n\nNow God is the life of the soul, and deadly sin separates from God; therefore it is a death of the soul.\n\nDeadly sin is also a disquiet of the heart, for everything rests nowhere except in its own proper place; and the proper resting-place of the soul is nowhere except in God as St Augustine saith, “Lord!\n\nThou hast made us for Thyself, therefore we may not rest anywhere save in Thee.” Deadly sin is also a weakening of the powers, for by his own power no one can throw off the load of sin nor restrain himself from committing sin.\n\nIt is also a blindness of the sense, for it prevents a man recognizing how brief is the space of time that can be spent in the pleasure of voluptuousness, and how long are the pains of hell and the joys of heaven.\n\nDeadly sin is also a death of all grace, for whenever such a sin is committed, the soul is bereft of all grace.\n\nSimilarly, it is the death of all virtue and good works, and an aberration of the spirit."

