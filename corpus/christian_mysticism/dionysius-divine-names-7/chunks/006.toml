body = "The angels are conceived of as being always in such a state of contemplation.\n\n408 God is the Manifested Absolute.\n\nHence qua Absolute He is supra-sapient, qua Manifested He is wise (cf.\n\nch.\n\ni, § 1).\n\nThe Persons of the Trinity possess one common Godhead (= the Absolute) which is supra-sapient, and in that Godhead.\n\nThey are One.\n\nYet they are known by us only in their differentiation wherein Supra-Sapience is revealed as Wisdom.\n\n409 Via Negativa.\n\nIt is not mere negation.\n\n410 Susannah 42.\n\n411 “According to its idea,” “according to the law of its species.” We perceive that this is a rose and that is a horse because we have two separate notions in our minds—one the notion of a rose and the other that of a horse.\n\nBut in the Divine Knowledge there is only one Notion wherein such specific notions are elements, as the activities of several nerves are elements in one indivisible sensation of taste, or touch, or smell.\n\n412 i.\n\ne.\n\nSuppose the light were conscious, and knew its own nature, it would know that if it withheld its brightness there would be darkness (for the very nature of light is that it dispels, or at least prevents, darkness).\n\nOn the other hand, the light could not directly know the darkness, because darkness cannot exist where there is light.\n\nThe simile is capable of being applied to illustrate God’s knowledge of the world, because the world is imperfect.\n\nIt applies more fundamentally to God’s knowledge of evil, and is so employed by St.\n\nThomas Aquinas, who quotes this passage and says (Summa, xiv.\n\n10) that, since evil is the lack of good, God knows evil things in the act by which He knows good things, as we know darkness through knowing light.\n\n413 God, being the Manifested Absolute, exists on two planes at once: that of Undifferentiation and that of Differentiation.\n\nOn this second plane He moves out into creative activity.\n\nAnd thus He is both knowable and unknowable: knowable in so far as He passes outwards into such activity, unknowable in that His Being passes inwards into Undifferentiation.\n\nThus He is known in His acts but not in His ultimate Nature.\n\n414 He is the Super-Essence of all things, wherein all things possess their true being outside of themselves [as our perceptions are outside of ourselves in the things we perceive.\n\n(Vide Bergson, Matière et Mémoire.)].\n\n415 This is experience and not mere theory.\n\n416 Prov.\n\nviii.\n\n417 The reference is, of course, to the opening verses of St.\n\nJohn’s Gospel.\n\nThe present passage shows that by the term “God” D.\n\nmeans not one Differentiation of the Godhead singly (i.\n\ne.\n\nnot God the Father), but all Three Differentiations together; the undivided (though differentiated) Trinity.\n\n418 Wisdom viii.\n\ni 419 God is called Reason: (1) because He is the Giver of reason; (2j because reason causes unity (e.g.\n\nit unifies our thoughts, making them coherent), and God in His creative activity causes unity and in His ultimate Godhead is Unity.\n\n420 The Divine Omniscience is: (1) the Object of our faith because we trust in it; (2) the Ground of our faith because the development of our faith comes from it.\n\nFaith is a faint image of Divine Knowledge, and is gradually perfected by being changed into knowledge."

