[content]
body = "(2) Wisdom as a whole = Wisdom embodied in the universe as a whole.\n\n(3) Wisdom in each individual instance = Wisdom as shown in the structure of some particular plant or animal, or part of a plant or animal.\n\n(1) Is an Emanation; (2) and (3) are created.\n\n2.\n\nFrom It the intelligible and intelligent powers of the Angelic Minds derive their blessed simple perceptions, not collecting their knowledge of God in partial fragments or from partial activities of Sensation or of discursive Reason, nor yet being circumscribed by aught that is akin to these, 406 406 i.\n\ne.\n\nThey are not limited by the material world, which, with its laws, is known through sensation and discursive reason.\n\nbut rather, being free from all taint of matter and multiplicity, they perceive the spiritual truths of Divine things in a single immaterial and spiritual intuition.\n\nAnd their intuitive faculty and activity shines in its unalloyed and undefiled purity and possesses its Divine intuitions all together in an indivisible and immaterial manner, being by that Godlike unification made similar (as far as may be) to the Supra-Sapient Mind and Reason of 149 God through the working of the Divine Wisdom.\n\n407 407 This speculation is, no doubt, based on experience.\n\nA concentration of the spiritual faculties in the act of contemplation produces that unity of the soul of which all mystics often speak.\n\nThe angels are conceived of as being always in such a state of contemplation.\n\nAnd human souls possess Reason, whereby they turn with a discursive motion round about the Truth of things, and, through the partial and manifold activities of their complex nature, are inferior to the Unified Intelligences: yet they too, through the concentration of their many faculties, are vouchsafed (so far as their nature allows) intuitions like unto those of the Angels.\n\nNay, even our sense-perceptions themselves may be rightly described as an echo of that Wisdom; even diabolic intelligence, qua intelligence, belongs thereto, though in so far as it is a distraught intelligence, not knowing how to obtain its true desire, nor wishing to obtain it, we must call it rather a declension from Wisdom.\n\nNow we have already said that the Divine Wisdom is the Beginning, the Cause, the Fount, the Perfecting Power, the Protector and the Goal of Very Wisdom and all created Wisdom, and of all Mind, Reason, and Sense-Perception.\n\nWe must now ask in what sense God, 408 408 God is the Manifested Absolute.\n\nHence qua Absolute He is supra-sapient, qua Manifested He is wise (cf.\n\nch.\n\ni, § 1).\n\nThe Persons of the Trinity possess one common Godhead (= the Absolute) which is supra-sapient, and in that Godhead.\n\nThey are One.\n\nYet they are known by us only in their differentiation wherein Supra-Sapience is revealed as Wisdom.\n\nWho is Supra-Sapient, can be spoken of as Wisdom, Mind, Reason, and Knowledge?\n\nHow can He have an intellectual intuition of intelligible things when He possesses no intellectual activities?\n\nOr how can He know the things perceived by sense when His existence transcends all sense-perception?\n\nAnd yet the Scripture says that He knoweth all things and that nothing escapes the Divine Knowledge.\n\nBut, as I have often said, we must interpret Divine Things in a manner 150 suitable to their nature.\n\nFor the lack of Mind and Sensation must be predicated of God by excess and not by defect.\n\n409 409 Via Negativa.\n\nIt is not mere negation."

