[content]
body = "And in the same way we attribute lack of Reason to Him that is above Reason, and Imperfectibility to Him that is above and before Perfection; and Intangible and Invisible Darkness we attribute to that Light which is Unapproachable because It so far exceeds the visible light.\n\nAnd thus the Mind of God embraces all things in an utterly transcendent knowledge and, in Its causal relation to all things, anticipates within Itself the knowledge of them all—knowing and creating angels before the angels were, and knowing all other things inwardly and (if I may so put it) from the very beginning, and thus bringing them into existence.\n\nAnd methinks this is taught by the Scripture when it saith “Who knoweth all things before their birth.” 410 410 Susannah 42.\n\nFor the Mind of God gains not Its knowledge of things from those things; but of Itself and in Itself It possesses, and hath conceived beforehand in a causal manner, the cognizance and the knowledge and the being of them all.\n\nAnd It doth not perceive each class speciically, 411 411 “According to its idea,” “according to the law of its species.” We perceive that this is a rose and that is a horse because we have two separate notions in our minds—one the notion of a rose and the other that of a horse.\n\nBut in the Divine Knowledge there is only one Notion wherein such specific notions are elements, as the activities of several nerves are elements in one indivisible sensation of taste, or touch, or smell.\n\nbut in one embracing casuality It knows and maintains all things—even as Light possesses beforehand in itself a causal knowledge of the darkness, not knowing the darkness in any other way than from the Light.\n\n412 412 i.\n\ne.\n\nSuppose the light were conscious, and knew its own nature, it would know that if it withheld its brightness there would be darkness (for the very nature of light is that it dispels, or at least prevents, darkness).\n\nOn the other hand, the light could not directly know the darkness, because darkness cannot exist where there is light.\n\nThe simile is capable of being applied to illustrate God’s knowledge of the world, because the world is imperfect.\n\nIt applies more fundamentally to God’s knowledge of evil, and is so employed by St.\n\nThomas Aquinas, who quotes this passage and says (Summa, xiv.\n\n10) that, since evil is the lack of good, God knows evil things in the act by which He knows good things, as we know darkness through knowing light.\n\nThus the Divine Wisdom in knowing Itself 151 will know all things: will in that very Oneness know and produce material things immaterially, divisible things indivisibly, manifold things under the form of Unity.\n\nFor if God, in the act of causation, imparts Existence to all things, in the same single act of causation He will support all these His creatures the which are derived from Him and have in Him their forebeing, and He will not gain His knowledge of things from the things themselves, but He will bestow upon each kind the knowledge of itself and the knowledge of the others.\n\nAnd hence God doth not possess a private knowledge of Himself and as distinct therefrom a knowledge embracing all the creatures in common; for the Universal Cause, in knowing Itself, can scarcely help knowing the things that proceed from it and whereof It is the Cause.\n\nWith this knowledge, then, God knoweth all things, not through a mere understanding of the things but through an understanding of Himself.\n\nFor the angels, too, are said by the Scripture to know the things upon earth not through a sense-perception of them (though they are such as may be perceived this way), but through a faculty and nature inherent in a Godlike Intelligence.\n\n3."

