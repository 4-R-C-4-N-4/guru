[content]
body = "Furthermore, we must ask how it is that we know God when He cannot be perceived by the mind or the senses and is not a particular Being.\n\nPerhaps ‘tis true to say that we know not God by His Nature (for this is unknowable and beyond the reach of all Reason.\n\nand Intuition), yet by means of that ordering of all things which (being as it were projected out of 152 Him) possesses certain images and semblances of His Divine Exemplars, we mount upwards (so far as our feet can tread that ordered path), advancing through the Negation and Transcendence of all things and through a conception of an Universal Cause, towards That Which is beyond all things.\n\n413 413 God, being the Manifested Absolute, exists on two planes at once: that of Undifferentiation and that of Differentiation.\n\nOn this second plane He moves out into creative activity.\n\nAnd thus He is both knowable and unknowable: knowable in so far as He passes outwards into such activity, unknowable in that His Being passes inwards into Undifferentiation.\n\nThus He is known in His acts but not in His ultimate Nature.\n\nHence God is known in all things and apart from all things; and God is known through Knowledge and through Unknowing, and on the one hand He is reached by Intuition, Reason, Understanding, Apprehension, Perception, Conjecture, Appearance, Name, etc; and yet, on the other hand, He cannot be grasped by Intuition, Language, or Name, and He is not anything in the world nor is He known in anything.\n\nHe is All Things in all things and Nothing in any, 414 414 He is the Super-Essence of all things, wherein all things possess their true being outside of themselves [as our perceptions are outside of ourselves in the things we perceive.\n\n(Vide Bergson, Matière et Mémoire.)].\n\nand is known from all things unto all men, and is not known from any unto any man.\n\n‘Tis meet that we employ such terms concerning God, and we get from all things (in proportion to their quality) notions of Him Who is their Creator.\n\nAnd yet on the other hand, the Divinest Knowledge of God, the which is received through Unknowing, is obtained in that communion which transcends the mind, when the mind, turning away from all things and then leaving even itself behind, is united to the Dazzling Rays, being from them and in them, illumined by the unsearchable depth of Wisdom.\n\n415 415 This is experience and not mere theory.\n\nNevertheless, as I said, we must 153 draw this knowledge of Wisdom from all things; for wisdom it is (as saith the Scripture) 416 416 Prov.\n\nviii.\n\nthat hath made all things and ever ordereth them all, and is the Cause of the indissoluble harmony and order of all things, perpetually fitting the end of one part unto the beginning of the second, and thus producing the one fair agreement and concord of the whole.\n\n4.\n\nAnd God is called “Word” or “Reason” 417 417 The reference is, of course, to the opening verses of St.\n\nJohn’s Gospel.\n\nThe present passage shows that by the term “God” D.\n\nmeans not one Differentiation of the Godhead singly (i.\n\ne.\n\nnot God the Father), but all Three Differentiations together; the undivided (though differentiated) Trinity.\n\nby the Holy Scriptures, not only because He is the Bestower of Reason and Mind and Wisdom, but also because He contains beforehand in His own Unity the causes of all things, and because He penetrates all things, “reaching” (as the Scripture saith) “unto the end of all things,” 418 418 Wisdom viii."

