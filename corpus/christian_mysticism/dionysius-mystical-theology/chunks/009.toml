body = "The ultimate truth about God and our relation to Him is held to be that He is a “Person” and that He has “made” the world.\n\n(This attitude is seen at its worst in Unitarian theology.\n\nBradley’s criticisms on Lotze show how this fails on the intellectual side.\n\nThe Doctrine of the Trinity, by insisting on an unsolved Mystery in God, prevents Orthodox theology from resting permanently in this morass, though it often has one foot there.) And non-Christian thinkers, in opposition to this conception, regard the ultimate Reality as impersonal, which is a worse error still.\n\nWe must get beyond our partial conceptions of “personality,” “impersonality,” etc.\n\nThey are useful and necessary up to a point, but the Truth lies beyond them and is to be apprehended to a supernatural manner by what later writers call “infused” contemplation.\n\nThe sum of the whole matter is that God is incomprehensible.\n\n520 On Via Affirmativa and Via Negativa, vide Intr., p.\n\n26 f.\n\n521 No writings of St.\n\nBartholomew are extant.\n\nPossibly D.\n\ns inventing, though not necessarily.\n\n522 Vide Intr., p.\n\n21.\n\n“Beyond Good and Evil” (though not in Nietzsche’s sense).\n\nWhen evil disappears Good ceases to be an opposition to it, and so Good attains a new condition.\n\n523 In the following passage we get the three stages tabulated by later Mystical Theology: (1) Purgation, (2) Illumination, (3) Union.\n\n524 See Intr., p.\n\n27, on the ecstasy.\n\nD.‘s terminology is always exact though exuberant—or rather exuberant because exact.\n\nAnd, since if the mind, in thinking of any particular thing, gives itself to that thing and so belongs to it, in utterly ceasing to belong to itself it ceases to have any self-consciousness and possesses a God-consciousness instead.\n\nThis would be a mere merging of the personality, but that the Godhead, according to D., is of such a paradoxical nature as to contain all the creatures fused and yet distinct (Intr , p.\n\n28) so the self is merged on one side of its being and distinct on the other.\n\nIf I lose myself in God, still it will always be “I” that shall lose myself There.\n\n525 This simile shows that the Via Negativa is, in the truest sense, positive.\n\nOur “matter-moulded forms” of thought are the really negative things.\n\n(Cf.\n\nBergson.) A sculptor would not accept a block of ice in place of a block of marble (for ice will not carve into a statue); and yet the block of marble is not, as such, a statue.\n\nSo, too, the Christian will not accept an impersonal God instead of a personal God (for an impersonal Being cannot be loved), and yet a “personal” God is not, as such, the Object of the Mystical quest.\n\nThe conception of Personality enshrines, but is not, the Ultimate Reality.\n\nIf D.\n\nwere open to the charge of pure negativity so often brought against him, he would have wanted to destroy his block of marble instead of carving it.\n\n526 Namely, in the Divine Names and in the Outlines; see Chap.\n\nIII.\n\n527 In the Divine Names D."

