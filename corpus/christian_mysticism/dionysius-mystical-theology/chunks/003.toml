[content]
body = "How it is necessary to be united with and render praise to Him Who is the cause of all and above all.\n\nUnto this Darkness which is beyond Light we pray that we may come, and may attain unto vision through the loss of sight and knowledge, and that in ceasing thus to see or to know we may learn to know that which is beyond all perception and understanding (for this emptying of our faculties is true sight and knowledge), 524 524 See Intr., p.\n\n27, on the ecstasy.\n\nD.‘s terminology is always exact though exuberant—or rather exuberant because exact.\n\nAnd, since if the mind, in thinking of any particular thing, gives itself to that thing and so belongs to it, in utterly ceasing to belong to itself it ceases to have any self-consciousness and possesses a God-consciousness instead.\n\nThis would be a mere merging of the personality, but that the Godhead, according to D., is of such a paradoxical nature as to contain all the creatures fused and yet distinct (Intr , p.\n\n28) so the self is merged on one side of its being and distinct on the other.\n\nIf I lose myself in God, still it will always be “I” that shall lose myself There.\n\nand that we may offer Him that transcends 195 all things the praises of a transcendent hymnody, which we shall do by denying or removing all things that are—like as men who, carving a statue out of marble, remove all the impediments that hinder the clear perceptive of the latent image and by this mere removal display the hidden statue itself in its hidden beauty.\n\n525 525 This simile shows that the Via Negativa is, in the truest sense, positive.\n\nOur “matter-moulded forms” of thought are the really negative things.\n\n(Cf.\n\nBergson.) A sculptor would not accept a block of ice in place of a block of marble (for ice will not carve into a statue); and yet the block of marble is not, as such, a statue.\n\nSo, too, the Christian will not accept an impersonal God instead of a personal God (for an impersonal Being cannot be loved), and yet a “personal” God is not, as such, the Object of the Mystical quest.\n\nThe conception of Personality enshrines, but is not, the Ultimate Reality.\n\nIf D.\n\nwere open to the charge of pure negativity so often brought against him, he would have wanted to destroy his block of marble instead of carving it.\n\n; Now we must wholly distinguish this negative method from that of positive statements.\n\nFor when we were making positive statements 526 526 Namely, in the Divine Names and in the Outlines; see Chap.\n\nIII.\n\nwe began with the most universal statements, and then through intermediate terms we came at last to particular titles, 527 527 In the Divine Names D.\n\nbegins with the notion of Goodness (which he holds to be possessed by all things) and proceeds thence to Existence (which is not possessed by things that are either destroyed or yet unmade), and thence to Wisdom (which is not possessed either by unconscious or irrational forms of Life), and thence to qualities (such as Righteousness, Salvation, Omnipotence) or combinations of opposite qualities (such as Greatness and Smallness) which are not, ‘in the full sense, applicable to any creature as such.\n\nThus by adding quality to quality (“Existence” to “Goodness,” “Life” to “Existence,” “Wisdom” to “Life,” “Salvation,” etc., to “Wisdom”) he reaches the conception of God.\n\nBut he constantly reminds us in the Divine Names that these qualities apply adequately only to the manifested Godhead which, in Its ultimate Nature, transcends them."

