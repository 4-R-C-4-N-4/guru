[content]
body = "safeguards the position against pure negativity by explaining that they are not absent either.\n\nThe rest of this chapter deals with the qualities (1) of inanimate matter; (2 ) of material life.\n\n537 It is not (1) a Thinking Subject; nor (2) an Act or Faculty of Thought; nor (3) an Object of Thought.\n\n538 Divine Names, II.\n\n7.\n\nGodhead is regarded as the property of Deified men, and so belongs to relativity.\n\n539 It knows only Itself, and there knows all things in their Super-Essence—sub specie aeternitatis.\n\n540 Truth is an Object of Thought.\n\nTherefore, being beyond objectivity, the ultimate Reality is not Truth.\n\nBut still less is It Error.\n\n541 Cf.\n\np.\n\n199, n.\n\n2.\n\n542 It is (1) richer than all concrete forms of positive existence; (2) more simple than the barest abstraction.\n\n(Cf.\n\np.\n\n196, n.\n\ni.)"

