[content]
body = "They are useful and necessary up to a point, but the Truth lies beyond them and is to be apprehended to a supernatural manner by what later writers call “infused” contemplation.\n\nThe sum of the whole matter is that God is incomprehensible.\n\nThat while it possesses all the positive attributes of the universe (being the universal Cause), yet in a stricter sense It does not possess them, since 193 It transcends them all, wherefore there is no contradiction between affirming and denying that It has them inasmuch as It precedes and surpasses all deprivation, being beyond all positive and negative distinctions?\n\n520 520 On Via Affirmativa and Via Negativa, vide Intr., p.\n\n26 f.\n\nSuch at least is the teaching of the blessed Bartholomew.\n\n521 521 No writings of St.\n\nBartholomew are extant.\n\nPossibly D.\n\ns inventing, though not necessarily.\n\nFor he says that the subject-matter of the Divine Science is vast and yet minute, and that the Gospel combines in itself both width and straitness.\n\nMethinks he has shown by these his words how marvellously he has understood that the Good Cause of all things is eloquent yet speaks few words, or rather none; possessing neither speech nor understanding because it exceedeth all things in a super-essential manner, and is revealed in Its naked truth to those alone who pass right through the opposition of fair and foul, 522 522 Vide Intr., p.\n\n21.\n\n“Beyond Good and Evil” (though not in Nietzsche’s sense).\n\nWhen evil disappears Good ceases to be an opposition to it, and so Good attains a new condition.\n\nand pass beyond the topmost altitudes of the holy ascent and leave behind them all divine enlightenment and voices and heavenly utterances and plunge into the Darkness where truly dwells, as saith the Scripture, that One Which is beyond all things.\n\nFor not without reason 523 523 In the following passage we get the three stages tabulated by later Mystical Theology: (1) Purgation, (2) Illumination, (3) Union.\n\nis the blessed Moses bidden first to undergo purification himself and then to separate himself from those who have not undergone it; and after all purification hears the many-voiced trumpets and sees many lights flash forth with pure and diverse-streaming rays, and then stands separate from the multitudes and with the chosen priests presses forward to the topmost pinnacle of the Divine Ascent.\n\nNevertheless he meets not with God Himself, 194 yet he beholds—not Him indeed (for He is invisible)—but the place wherein He dwells.\n\nAnd this I take to signify that the divinest and the highest of the things perceived by the eyes of the body or the mind are but the symbolic language of things subordinate to Him who Himself transcendeth them all.\n\nThrough these things His incomprehensible presence is shown walking upon those heights of His holy places which are perceived by the mind; and then It breaks forth, even from the things that are beheld and from those that behold them, and plunges the true initiate unto the Darkness of Unknowing wherein he renounces all the apprehensions of his understanding and is enwrapped in that which is wholly intangible and invisible, belonging wholly to Him that is beyond all things and to none else (whether himself or another), and being through the passive stillness of all his reasoning powers united by his highest faculty to Him that is wholly Unknowable, of whom thus by a rejection of all knowledge he possesses a knowledge that exceeds his understanding."

