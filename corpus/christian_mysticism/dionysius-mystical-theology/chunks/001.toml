[content]
body = "Wheat is the Divine Gloom.\n\nT rinty, which exceedeth all Being, Deity, and Goodness!\n\n514 514 Lit.\n\n“Super-Essential, Supra-Divine, Super-Excellent.” Thou that instructeth Christians in Thy heavenly wisdom!\n\nGuide us to that topmost height of mystic lore 515 515 Lit.\n\n“Oracles” i.\n\ne.\n\nto the most exalted and mystical teaching of Holy Scripture.\n\nwhich exceedeth light and more than exceedeth knowledge, where the simple, absolute, and unchangeable mysteries of heavenly Truth lie hidden in the dazzling obscurity of the secret Silence, outshining all brilliance with the intensity of their darkness, and surcharging our blinded intellects with the utterly impalpable and invisible fairness of glories which exceed all beauty!\n\nSuch be my prayer; and thee, dear Timothy, I counsel that, in the earnest exercise of mystic contemplation, thou leave the senses and the activities of the intellect and all things that the senses or the intellect can perceive, and all things in this world of nothingness, or in that world of being, and that, thine understanding being laid to rest, 516 516 Gk.\n\nἀγνώστως refers to a transcendent or spiritual Unknowing (as disinguished from mere ignorance).\n\nthou strain (so far as thou mayest) towards an union with Him whom neither being nor understanding can contain.\n\nFor, by the unceasing and absolute renunciation 192 of thyself and all things, thou shalt in pureness cast all things aside, and be released from all, and so shalt be led upwards to the Ray of that divine Darkness which exceedeth all existence.\n\n517 517 “The Super-Essential Ray of Divine Darkness.” These things thou must not disclose to any of the uninitiated, by whom I mean those who cling to the objects of human thought, and imagine there is no super-essential reality beyond; and fancy that they know by human understanding Him that has made Darkness His secret place.\n\n518 518 i.\n\ne.\n\nPhilosophers and unmystical theologians.\n\nAnd, if the Divine Initiation is beyond such men as these, what can be said of others yet more incapable thereof, who describe the Transcendent Cause of all things by qualities drawn from the lowest order of being, while they deny that it is in any way superior to the various ungodly delusions which they fondly invent in ignorance of this truth?\n\n519 519 i.\n\ne.\n\nThose who accept “popular theology.” The first stage of theistic Religion is anthropomorphic, and God is thought of (like Jehovah) as a magnified man of changing moods.\n\nPopular religion seldom rises above this level, and even gifted theologians often sink to it.\n\nBut it is, D.\n\ntells us, the lowest stage.\n\nThen comes a metaphysical stage.\n\nGod is now thought of as a timeless Being and therefore changeless, but the conception of a magnified man has been refined rather than abolished.\n\nThe ultimate truth about God and our relation to Him is held to be that He is a “Person” and that He has “made” the world.\n\n(This attitude is seen at its worst in Unitarian theology.\n\nBradley’s criticisms on Lotze show how this fails on the intellectual side.\n\nThe Doctrine of the Trinity, by insisting on an unsolved Mystery in God, prevents Orthodox theology from resting permanently in this morass, though it often has one foot there.) And non-Christian thinkers, in opposition to this conception, regard the ultimate Reality as impersonal, which is a worse error still.\n\nWe must get beyond our partial conceptions of “personality,” “impersonality,” etc."

