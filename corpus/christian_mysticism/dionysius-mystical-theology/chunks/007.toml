[content]
body = "That He Who is the Pre-eminent Cause of everything sensibly perceived is not Himself any one of the things sensibly perceived. We therefore maintain 536 536 Being about to explain, in these two last chapters, that no material or mental qualities are present in the Godhead, D. safeguards the position against pure negativity by explaining that they are not absent either. The rest of this chapter deals with the qualities (1) of inanimate matter; (2 ) of material life. that the universal Cause transcending all things is neither impersonal nor lifeless, nor irrational nor without understanding: in short, that It is not a material body, and therefore does not possess outward shape or intelligible form, or quality, or quantity, or solid weight; nor has It any local existence which can be perceived by sight or touch; nor has It the power of perceiving or being perceived; nor does It suffer any vexation or disorder through the disturbance of earthly passions, or any feebleness through the tyranny of material chances, or any want of light; nor any change, or decay, or division, or deprivation, or ebb and flow, or anything else which the senses can perceive. None of these things can be either identified with it or attributed unto It. 200"

