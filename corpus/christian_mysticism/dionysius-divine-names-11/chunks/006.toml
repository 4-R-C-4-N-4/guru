body = "472 Contemplation, Act of Contemplation, and Object Contemplated are all united together, and so imply a fundamental Unity which exists ultimately in God.\n\n473 Cf.\n\np.\n\n174, n.\n\n3.\n\n474 D.‘s paradox is the paradox of sanity.\n\nWe must hold at the same time two apparent contradictions.\n\nOn one side all things are, in a sense, merged, in the other side they are not.\n\nTheir Super-Essence is identical and is one and the same Super-Essence for all.\n\nYet each one severally and individually possesses it.\n\nThe paradox is due to the fact that the question is one of ultimate Reality.\n\nAll life and individuality start in the individual’s opposition to the rest of the world, for by distinguishing myself from the world I, in a sense, oppose myself to it.\n\nThis is the basis of selfishness and so of moral evil.\n\nBut being transmuted by Love, it becomes the basis of all harmony and moral good, and so leads to Peace: And the same principles of opposition and harmony are at work in the whole creation, animate and inanimate alike.\n\n(Cf.\n\nDante, Paradiso , I.\n\n103 to end.) 475 Vide supra [Movet Deus sicut Desideratum]: True peace is restful energy, both elements of which are incomplete in the present world but complete in the Godhead.\n\n476 Cf.\n\nDante, Paradiso.\n\n”E se altra cosa vostra amor seduce Non è se non di quella alcun vestigio,” etc.\n\n477 Absolute Existence or Life, etc., is in God super-essentially, and timelessly emanates from Him.\n\nIt is in Him as a Super-Essence and projected from Him as an Essence.\n\n478 i.\n\ne.\n\nThe angels, who, being the highest creatures, possess Existence, Life, Peace, Power, etc., in the greatest degree.\n\n479 The titles “Absolute Life,” etc., correspond to the Via Affirmativa, and the titles “Cause of Absolute Life,” etc., to the Via Negativa.\n\n480 The Godhead causes: (1) the particular existent thing, (2) the ultimate fact of Existence, i.\n\ne.\n\nAbsolute Existence.\n\nThe Exemplars are in the Godhead and not in the emanating Absolute Existence.\n\n481 See last note.\n\n482 Perhaps under the pretence of attacking Paganism D.\n\nis really aiming his shafts against Manicheism or some Gnostic heresy current in his day.\n\n483 (1) God possesses and is Absolute Being, Absolute Life, etc.\n\n(2) He pours forth Absolute Being that the creatures may share it and so exist and be ennobled.\n\n484 Migne’s text here is corrupt, I have emended it.\n\n(1) The First Things = Absolute Existence, etc.\n\n(2) Those that share completely therein = the angels and perfected human souls.\n\n(3) Those that share partially therein = the lower orders of creation which possess existence without life, or life without consciousness, or consciousness without spirituality (stones, plants, animals).\n\n485 The beauty of a human being is more complete than that of a horse, and spiritual beauty is more complete than mere physical beauty."

