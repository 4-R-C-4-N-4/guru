[content]
body = "Now, since thou hast, on a previous occasion, sent me an epistle asking what I mean by Very Being Itself, Very Life Itself, Very Wisdom Itself: and since thou saidst thou couldst not understand why sometimes I call God “Life” and sometimes the “Fount of Life”: I have thought it necessary, holy man of God, to solve for thee this question also which hath arisen between us.\n\nIn the first place, to repeat again what hath often been said before, there is no contradiction between calling God “Life” or “Power” and “Fount of Life, Peace, or Power.” 477 477 Absolute Existence or Life, etc., is in God super-essentially, and timelessly emanates from Him.\n\nIt is in Him as a Super-Essence and projected from Him as an Essence.\n\nThe former titles are derived from forms of existence, and especially from the primary forms, 478 478 i.\n\ne.\n\nThe angels, who, being the highest creatures, possess Existence, Life, Peace, Power, etc., in the greatest degree.\n\nand are applied to Him because all existences come forth from Him; the latter titles are given Him because in a superessential manner He transcends all things, even the 179 primary existences.\n\n479 479 The titles “Absolute Life,” etc., correspond to the Via Affirmativa, and the titles “Cause of Absolute Life,” etc., to the Via Negativa.\n\n“But,” thou wilt say, “what mean we at all by Very Being and Very Life and those things to which we ascribe an Ultimate Existence derived primarily from God?” We reply as follows: “This matter is not crooked, but straightforward, and the explanation thereof is easy.\n\nThe Very Existence underlying the existence of all things is not some Divine or Angelic Being (for only That Which is Super-Essential can be the Principle, the Being and the Cause of all Existences and of Very Existence Itself) 480 480 The Godhead causes: (1) the particular existent thing, (2) the ultimate fact of Existence, i.\n\ne.\n\nAbsolute Existence.\n\nThe Exemplars are in the Godhead and not in the emanating Absolute Existence.\n\nnor is It any life-producing Deity other than the Supra-Divine Life which is the Cause of all living things and of Very Life, 481 481 See last note.\n\nnor, in short, is It identical with any such originative and creative Essences and Substances of things as men in their rash folly call “gods” and “creators” of the world, though neither had these men themselves any true and proper knowledge of such beings nor had their fathers.\n\nIn fact, such beings did not exist.\n\n482 482 Perhaps under the pretence of attacking Paganism D.\n\nis really aiming his shafts against Manicheism or some Gnostic heresy current in his day.\n\nOur meaning is different: “Very Being,” “Very Life,” “Very Godhead” are titles which in an Originating Divine and Causal sense we apply to the One Transcendent Origin and Cause of all things, but we also apply the terms in a derivative sense to the Providential Manifestations of Power derived from the Unparticipated God, i.\n\ne.\n\nto the Infusion of Very Being, Very Life, and Very Godhead, which so transmutes the creatures where each, according to its nature, participates therein, that these obtain the 180 qualities and names: “Existent,” “Living,” “Divinely Possessed,” etc.\n\n483 483 (1) God possesses and is Absolute Being, Absolute Life, etc.\n\n(2) He pours forth Absolute Being that the creatures may share it and so exist and be ennobled."

