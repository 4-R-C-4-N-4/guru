[content]
body = "And the perfect Peace guards each several individuality unalloyed by Its providential gift of peace, keeping all things without internal or mutual discord or confusion, and establishing all things, in the power of unswerving stability, so as to possess their own peace and rest.\n\n474 474 D.‘s paradox is the paradox of sanity.\n\nWe must hold at the same time two apparent contradictions.\n\nOn one side all things are, in a sense, merged, in the other side they are not.\n\nTheir Super-Essence is identical and is one and the same Super-Essence for all.\n\nYet each one severally and individually possesses it.\n\nThe paradox is due to the fact that the question is one of ultimate Reality.\n\nAll life and individuality start in the individual’s opposition to the rest of the world, for by distinguishing myself from the world I, in a sense, oppose myself to it.\n\nThis is the basis of selfishness and so of moral evil.\n\nBut being transmuted by Love, it becomes the basis of all harmony and moral good, and so leads to Peace: And the same principles of opposition and harmony are at work in the whole creation, animate and inanimate alike.\n\n(Cf.\n\nDante, Paradiso , I.\n\n103 to end.) 177 4.\n\nAnd if all things which move be found desiring not to be at rest but always to perform their proper movements, this also is a desire for that Divine Peace of the Universe which keeps all things in their proper places so that they fall not, and preserves the individual and the motive life of all moving things from removal or declension.\n\nAnd this it doth by reason that the things which move perform their proper functions through being in a constant state of inward peace.\n\n475 475 Vide supra [Movet Deus sicut Desideratum]: True peace is restful energy, both elements of which are incomplete in the present world but complete in the Godhead.\n\n5.\n\nBut if, in affirming that Peace is not desired by all, the objector is thinking of the opposition caused by a falling away from Peace, in the first place there is nothing in the world which hath utterly fallen away from all Unity; for that which is utterly unstable, boundless, baseless, and indefinite hath neither Being nor any inherence in the things that have Being.\n\nAnd if he says that hatred towards Peace and the blessings of Peace is shown by them that rejoice in strife and anger and in conditions of variations and instability, I answer that these also are governed by dim shadows of the desire for Peace; for, being oppressed by the various movements of their passions, they desire (without understanding) to set these at rest, and suppose that the surfeit of fleeting pleasures will give them Peace because they feel themselves 178 disturbed by the unsatisfied cravings which have mastered them.\n\n476 476 Cf.\n\nDante, Paradiso.\n\n”E se altra cosa vostra amor seduce Non è se non di quella alcun vestigio,” etc.\n\nThere is no need to tell how the loving-kindness of Christ cometh bathed in Peace, wherefrom we must learn to cease from strife, whether against ourselves or against one another, or against the angels, and instead to labour together even with the angels for the accomplishment of God’s Will, in accordance with the Providential Purpose of Jesus Who worketh all things in all and maketh Peace, unutterable and foreordained from Eternity, and reconcileth us to Himself, and, in Himself, to the Father.\n\nConcerning these supernatural gifts enough hath been said in the Outlines of Divinity with confirmation drawn from the holy testimony of the Scriptures.\n\n6."

