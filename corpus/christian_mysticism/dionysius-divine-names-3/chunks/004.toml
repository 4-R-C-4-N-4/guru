body = "233 Cf p.\n\n77, n.\n\n1.\n\n234 This is profound.\n\nSpatial metaphors are always dangerous, though unavoidable, in Theology.\n\nIn space if A is touching B then B must be touching A.\n\nIn the spiritual world this is not so.\n\nGod is near me (or rather to me), and yet I may be far from God because I may be far from my own true self.\n\nI must seek my true self where it is, in God.\n\nIt is the paradox of Personality that my true self is outside myself and I can only gain it by casting aside this counterfeit “self.” Cf.\n\np.\n\n77, n.\n\n1, and Intr., p.\n\n15.\n\n235 Even the word “omnipresent” suggests that God is in space, whereas really His existence is non-spatial.\n\n236 τὰς θεολογικὰς στοιχειώσεις ὑπερφυῶς συναγαγόντος.\n\n237 Or “intelligible” (νοητῶν).\n\nCf.\n\np.\n\n52, n.\n\n1.\n\nThe Scriptures are expressed in symbolic terms which our minds can grasp.\n\nHierotheus was inspired to penetrate to the ultimate truth enshrined in these symbols.\n\nThus he was able not only to assimilate this solid food himself but also to give it to others.\n\nApparently Hierotheus passed through certain extraordinary psychic experiences, which are described in his writings.\n\nThese particular experiences D.\n\nhas not himself passed through.\n\nBut he believes that his own teaching may clear the ground, and so be a preliminary to such flights.\n\nHe is chiefly explaining principles, but these principles may lead the way to a true experience.\n\nSt.\n\nPaul and other Scriptural writers experienced such extraordinary psychic states, though they do not speak of them in the extravagant terms apparently used by Hierotheus.\n\nCf.\n\n2 Cor.\n\nxii.\n\n2–4 .\n\n238 του ὑφειμένοις καθιερωταῖς καὶ ἱερωμένοις.\n\n239 sc.\n\nIt would be an impiety to do so, for he is almost equal to the Scriptural Writers, as he showed when he met with them to view the body of the B.\n\nV.\n\nM.\n\n240 Cf.\n\np.\n\n1, n 1.\n\n241 Ecclus.\n\niii.\n\n21 ; Ps.\n\ncxxxi.\n\n1 .\n\n242 2 Tim.\n\nii.\n\n2 ."

