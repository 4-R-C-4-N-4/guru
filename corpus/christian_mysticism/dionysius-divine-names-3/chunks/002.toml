[content]
body = "Now perhaps there is need of an explanation why, when our renowned teacher Hierotheus hath compiled 236 236 τὰς θεολογικὰς στοιχειώσεις ὑπερφυῶς συναγαγόντος.\n\nhis wonderful Elements of Divinity, we have composed other Tractates of Divinity, and now are writing this present as if his work were not sufficient.\n\nNow if he had professed to deal in an ordered system with all questions of Divinity, and had gone through the whole sum of Divinity with an exposition of every branch, we should not have gone so far in madness or folly as to suppose that we could touch these problems with a diviner insight than he, nor would we have cared to waste our time in a vain repetition of those same truths; more especially since it would be an injury to a teacher whom we love were we thus to claim for ourselves the famous speculations and expositions of a man who, next to Paul the Divine, hath been our chief preceptor.\n\nBut since, in his lofty “Instructions on Divinity,” he gave us comprehensive and pregnant definitions fitted to our understanding, and to that of such amongst us as were teachers of the newly initiated souls, and bade us unravel and explain with whatever powers of reason we possessed, the comprehensive and compact skeins of thought spun by his mighty intellect; and since thou hast thyself oftentimes urged us so to do, and hast remitted his treatise to us as too sublime for comprehension, therefore we, while setting him apart (as a teacher of advanced and perfect spirits) for those above the commonalty, and as a kind of second Scriptures worthy to follow the Inspired Writings, will yet teach Divine Truths, according to our capacity, unto those who are our peers.\n\nFor if solid food is suited 84 only to the perfect, what degree of perfection would it need to give this food to others?\n\nWherefore we are right in saying that the direct study of the spiritual 237 237 Or “intelligible” (νοητῶν).\n\nCf.\n\np.\n\n52, n.\n\n1.\n\nThe Scriptures are expressed in symbolic terms which our minds can grasp.\n\nHierotheus was inspired to penetrate to the ultimate truth enshrined in these symbols.\n\nThus he was able not only to assimilate this solid food himself but also to give it to others.\n\nApparently Hierotheus passed through certain extraordinary psychic experiences, which are described in his writings.\n\nThese particular experiences D.\n\nhas not himself passed through.\n\nBut he believes that his own teaching may clear the ground, and so be a preliminary to such flights.\n\nHe is chiefly explaining principles, but these principles may lead the way to a true experience.\n\nSt.\n\nPaul and other Scriptural writers experienced such extraordinary psychic states, though they do not speak of them in the extravagant terms apparently used by Hierotheus.\n\nCf.\n\n2 Cor.\n\nxii.\n\n2–4 .\n\nScriptures and the comprehensive teaching of them need advanced capacities, while the understanding and the learning of the matter which contribute thereto is suited to the inferior Initiators and Initiates.\n\n238 238 του ὑφειμένοις καθιερωταῖς καὶ ἱερωμένοις.\n\nWe have, however, carefully observed the principle: Whatsoever things our Divine Preceptor has throughly dealt with and made clearly manifest we have never in any wise ventured thereon, for fear of repetition, nor given the same explanation of the passage whereof he treated.\n\nFor 239 239 sc."

