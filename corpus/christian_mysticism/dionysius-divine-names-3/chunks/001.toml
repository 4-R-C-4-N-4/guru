body = "CHAPTER III What is the power of Prayer?\n\nAlso concerning the Blessed Hierotheus and concerning Reverence and the Writing of Divinity.\n\n1.\n\nAnd first of all, if it like thee, let us consider the highest Name, even “Goodness,” by which all the Emanations of God are conjointly revealed.\n\n231 231 All God’s activities are good.\n\nAnd let us begin with an invocation of the Trinity, the Which, as It surpasseth Goodness, and is the Source of all goodness, doth reveal all conjoined together Its own good providences.\n\n232 232 The particular activities of God exist as one Act in Him, cf.\n\np.\n\n79, n.\n\n2.\n\nSo St.\n\nThomas (following Aristotle) calls Him Actus Purus.\n\nFor we must first lift up our minds in prayer unto the Primal Goodness, and by drawing nearer Thereunto, we must thus be initiated into the mystery of those good gifts which are rooted in Its being.\n\nFor the Trinity is nigh unto all things, and yet not all things are nigh unto It.\n\n233 233 Cf p.\n\n77, n.\n\n1.\n\nAnd when we call upon It with holy prayers and unspotted 82 mind and with our souls prepared for union with God, then are we also nigh Thereto; for It is not in space, so as to be absent from any spot, or to move from one position to another.\n\n234 234 This is profound.\n\nSpatial metaphors are always dangerous, though unavoidable, in Theology.\n\nIn space if A is touching B then B must be touching A.\n\nIn the spiritual world this is not so.\n\nGod is near me (or rather to me), and yet I may be far from God because I may be far from my own true self.\n\nI must seek my true self where it is, in God.\n\nIt is the paradox of Personality that my true self is outside myself and I can only gain it by casting aside this counterfeit “self.” Cf.\n\np.\n\n77, n.\n\n1, and Intr., p.\n\n15.\n\nNay, to speak of It as omnipresent doth not express Its all-transcendent all-embracing Infinitude.\n\n235 235 Even the word “omnipresent” suggests that God is in space, whereas really His existence is non-spatial.\n\nLet us then press on in prayer, looking upwards to the Divine benignant Rays, even as if a resplendent cord were hanging from the height of heaven unto this world below, and we, by seizing it with alternate hands in one advance, appeared to pull it down; but in very truth instead of drawing down the rope (the same being already nigh us above and below), we were ourselves being drawn upwards to the higher Refulgence of the resplendent Rays.\n\nOr even as, having embarked on a ship and clinging to the cables, the which being stretched out from some rock unto us, presented themselves (as it were) for us to lay hold upon them, we should not be drawing the rock towards ourselves, but should, in very truth, be drawing ourselves and the vessel towards the rock; as also, conversely, if any one standing upon the vessel pushes away the rock that is on the shore, he will not affect the rock (which stands immovable) but will separate himself therefrom, and the more he pushes it so much the more will he be staving himself away.\n\nHence, before every endeavour, more especially if the subject be Divinity, must we begin with prayer: not as though we would pull down to ourselves that Power which is 83 nigh both everywhere and nowhere, but that, by these remembrances and invocations of God, we may commend and unite ourselves Thereunto.\n\n2."

