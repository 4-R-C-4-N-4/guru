[content]
body = "It would be an impiety to do so, for he is almost equal to the Scriptural Writers, as he showed when he met with them to view the body of the B.\n\nV.\n\nM.\n\neven among our inspired Hierarchs (when, as thou knowest, we with him and many of our holy brethren met together to behold that mortal body, Source of Life, which received the Incarnate God, 240 240 Cf.\n\np.\n\n1, n 1.\n\nand James, the brother of God, was there, and Peter, the chief and highest of the Sacred Writers, and then, having beheld it, all the Hierarchs there present celebrated, according to the power of each, the omnipotent goodness of the Divine weakness): on that occasion, I say, he surpassed all the Initiates next to the Divine Writers, 85 yea, he was wholly transported, was wholly outside of himself, and was so moved by a communion with those Mysteries he was celebrating, that all who heard him and saw him and knew him (or rather knew him not) deemed him to be rapt of God and endued with utterance Divine.\n\nBut why should I tell thee of the divine things that were uttered in that place?\n\nFor, unless I have forgotten who I am, I know that I have often heard from thee certain fragments of those enraptured praises; so earnest hast thou been with all thy soul to follow heavenly things.\n\n3.\n\nBut, to say nothing of those mystical experiences (since they cannot be told unto the world, and since thou knowest them well), when it behoved us to communicate these things unto the world and to bring all whom we might unto that holy knowledge we possessed, how he surpassed nearly all the holy teachers in the time he devoted to the task, in pureness of mind, in exactness of exposition, and in all other holy qualities, to such a degree that we could not attempt to gaze upon such spiritual radiance.\n\nFor we are conscious in ourselves and well aware that we cannot sufficiently perceive those Divine Truths which are granted to man’s perception, nor can we declare and utter those elements of Divine Knowledge which are given unto man to speak.\n\nWe fall very short of that understanding which the Divine men possessed concerning heavenly truths, and verily, from excess of reverence, we should not have ventured to listen, or give utterance to any truths of Divine philosophy, were it not that we are convinced in our mind that such knowledge of Divine Truth as is possible must not be disregarded.\n\nThis conviction was wrought within us, not only by the natural impulse of our minds, which yearn and strive for such vision of supernatural things as may be 86 attained, but also by the holy ordinance of Divine Law itself, which, while it bids us not to busy ourselves in things beyond us because such things are both beyond our merits and also unattainable, 241 241 Ecclus.\n\niii.\n\n21 ; Ps.\n\ncxxxi.\n\n1 .\n\nyet earnestly exhorts us to learn all things within our reach, which are granted and allowed us, and also generously to impart these treasures unto others.\n\n242 242 2 Tim.\n\nii.\n\n2 .\n\nIn obedience to these behests we, ceasing not through weariness or want of courage in such search for Divine Truth as is possible, yea, and not daring to leave without assistance those who possess not a greater power of contemplation than ourselves, have set ourselves to the task of composition, in no vain attempt to introduce fresh teaching, but only seeking by more minute and detailed investigations to make more clear and plain that which the true Hierotheus hath said in brief.\n\n231 All God’s activities are good.\n\n232 The particular activities of God exist as one Act in Him, cf.\n\np.\n\n79, n.\n\n2.\n\nSo St.\n\nThomas (following Aristotle) calls Him Actus Purus."

