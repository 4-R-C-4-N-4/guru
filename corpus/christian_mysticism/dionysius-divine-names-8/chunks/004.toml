[content]
body = "Thus, ‘tis true to say that it is more in accordance with Divine Righteousness not to lull into its destruction the manliness of the noblest characters through bestowing material goods upon them, nor to leave them without the aid of Divine corrections if any one attempt so to corrupt them.\n\nIt is true justice to strengthen them in their noble and loyal stability, and to bestow on them the things which befit their high condition.\n\n433 433 True again within certain limits.\n\nThe Saints are made perfect through suffering.\n\nBut :what of the innocent child victims of war atrocities?\n\n9.\n\nThis Divine Righteousness is also called the Salvation or Preservation of the world, because It preserves and keeps the particular being and place of each thing inviolate from the rest, and is the inviolate Cause of all the particular activity in the world.\n\nAnd if any one speaks of Salvation as the saving Power which plucks the world out of the influence of evil, we will also certainly accept this account of Salvation since Salvation hath so many forms.\n\nWe shall only ask him to add, that the primary Salvation of the world is that which preserves all things in their proper places without change, conflict, or deterioration, and keeps them all severally without strife or struggle obeying their proper laws, and banishes all inequality and interference from the world, and establishes the due capacities of each so that they fall not into their opposites nor suffer any transferences.\n\n434 434 Salvation is that which, when persons or things are in a right state, keeps them therein; when they are in a wrong state, transfers them thence.\n\nThe first meaning is positive and essential, the second negative and incidental.\n\nThe Scriptural view includes both sides, with the emphasis on the first.\n\nProtestantism (being in this as in other matters of a negative tendency) ignores the positive side to the great detriment of Religion.\n\nIndeed, it would be quite in keeping with 161 the teaching of the Divine Science to say that this Salvation, working in that beneficence which preserves the world, redeems all things (according as each can receive this saving power) so that they fall not from their natural virtues.\n\nHence the Sacred Writers call It Redemption, both because It allows not the things which truly exist 435 435 i.\n\ne.\n\nAll good things.\n\n“to fall away into nothingness,” 436 436 Nothingness includes (1) mere non-entity ; (2 ) evil.\n\n(Perhaps both meanings are intended.) Salvation maintains all good things both in their being and in their excellence.\n\nIf they fell away towards nothingness the result is first corruption and then destruction.\n\nand also because, should anything stumble into error or disorder and suffer a diminution of the perfection of its proper virtues, It redeems even this thing from the weakness and the loss it suffers: filling up that which it lacks and supporting its feebleness with Fatherly Love; raising it from its evil state, or rather setting it firmly in its right state; completing once more the virtue it had lost, and ordering and arraying its disorder and disarray; making it perfect and releasing it from all its defects.\n\nSo much for this matter and for the Righteousness whereby the equality or proportion of all things is measured and given its bounds, and all inequality or disproportion (which arises from the loss of proportion in the individual things) is kept far away.\n\nFor if one considers the inequality shown in the mutual differences of all things in the world, this also is preserved by Righteousness which will not permit a complete mutual confusion and disturbance of all things, but keeps all things within the several forms naturally belonging to each.\n\n437 437 The word ἰσότης implies that a thing is identical in size, etc.\n\n(1) with other things; (2 ) with its own true nature."

