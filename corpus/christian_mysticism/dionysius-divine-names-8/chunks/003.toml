[content]
body = "The wise Elymas, forsooth, did not perceive this; and so is like an unskilled athlete, who (as often happens), thinking his adversary to be weak, through judging by his own estimation, misses him each time and manfully strikes at his shadow, and bravely beating the air with vain blows, fancies he hath gotten him a victory and boasts of his prowess through ignorance of the other’s power.\n\n430 430 This unskilled athlete is not very convincing.\n\nPresumably D.\n\ncould not box!\n\nBut we striving to shoot our guard home to our teacher’s mark celebrate the Supra-Potent God as Omnipotent, as Blessed and the only Potentate, as ruling by His might over Eternity, as indwelling every part of the universe, or rather as transcending and anticipating all things in His Super-Essential Power, as the One Who hath bestowed upon all things their capacity to exist, and their existence through the rich outpouring of His transcendent and abundant Power.\n\n7.\n\nAgain, God is called “Righteousness” because He gives to all things what is right, defining Proportion, Beauty, Order, Arrangement, and all Dispositions of Place and Rank for each, in accordance with that place which is most truly right; and because He causeth each to possess its independent activity.\n\nFor the Divine Righteousness ordains all things, and sets their bounds and keeps all things 159 unconfused and distinct from one another, and gives to all things that which is suited to each according to the worth which each possesses.\n\n431 431 Vide supra on Exemplars.\n\nAnd if this is true, then all those who blame the Divine Righteousness stand (unwittingly) self-condemned of flagrant unrighteousness; for they say that immortality should belong to mortal things and perfection to the imperfect, and necessary or mechanical motion to those which possess free spiritual motion, and immutability to those which change, and the power of accomplishment to the weak, and that temporal things should be eternal, and that things which naturally move should be unchangeable, and that pleasures which are but for a season should last for ever; and, in short, they would interchange the properties of all things.\n\nBut they should know that the Divine Righteousness is found in this to be true Righteousness, that it gives to all the qualities which befit them, according to the worth of each, and that it preserves the nature of each in its proper order and power.\n\n432 432 D.\n\nis least satisfactory when he becomes an apologist, and when (like other apologists) he tries to explain away the obvious fact of evil and imperfection.\n\nWithin certain limits what he says will hold.\n\nA rose fulfils its true function by being a rose, and not by trying to be an elephant.\n\nBut to hold that whatever is, is best, is quietism.\n\nThe variety of the world is good, but not its imperfections.\n\n8.\n\nBut some one may say: “It is not right to leave holy men unaided to be oppressed by the wicked.” We must reply, that if those whom you call holy love the earthly things which are the objects of material ambition, they have utterly fallen from the Desire for God.\n\nAnd I know not how they can be called holy where they do this wrong to the things which are truly Lovely and Divine, wickedly rejecting them for things unworthy of their ambition and their love.\n\nBut if they long for the things that are real, then they who desire aught should rejoice when the 160 object of their desire is obtained.\n\nNow are they not nearer to the angelic virtues when they strive, in their desire for Divine Things, to abandon their affection towards material things, and manfully to train themselves unto this object in their struggles for the Beautiful?"

