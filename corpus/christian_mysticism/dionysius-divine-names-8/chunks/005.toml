[content]
body = "It thus = (1) “equality”; (2) “rightness.” D.\n\nmaintains that all things possess the latter though not the former.\n\n421 The highest power our minds can conceive is that of the angels.\n\nBut God has the dominion over them, and hence His power is of a yet higher kind such as we cannot conceive.\n\n422 Since the ultimate Godhead is undifferentiated God’s power is conceived of as an undifferentiated or potential energy.\n\n423 The inexhaustible multiplication of things in this world, though it should go on for ever, is a series made up of separate units.\n\nGod’s inexhaustible energy is beyond this series because it is one indivisible act.\n\nThe Undifferentiated transcends infinite divisibility.\n\nCf.\n\nIX.\n\n2.\n\n424 This is meant to meet the objection that if God’s power is infinite there should be no decay or death.\n\nThings, says D., are sometimes incapable of responding, as a blind eye cannot respond to the light.\n\n425 i.\n\ne.\n\nPower in the abstract.\n\n426 See Intr., p.\n\n43.\n\n427 The name is introduced to support the fiction of authorship, and an objection, current no doubt in the writer’s day (as in every age), is put into the mouth of one who belonged to the same time as St.\n\nPaul’s Athenian convert.\n\n428 2 Tim.\n\nii.\n\n13 .\n\n429 He seems to mean two distinct things: (1) The objection is childish and needs no answering; (2) The whole question is beyond the reach of our understanding.\n\n430 This unskilled athlete is not very convincing.\n\nPresumably D.\n\ncould not box!\n\n431 Vide supra on Exemplars.\n\n432 D.\n\nis least satisfactory when he becomes an apologist, and when (like other apologists) he tries to explain away the obvious fact of evil and imperfection.\n\nWithin certain limits what he says will hold.\n\nA rose fulfils its true function by being a rose, and not by trying to be an elephant.\n\nBut to hold that whatever is, is best, is quietism.\n\nThe variety of the world is good, but not its imperfections.\n\n433 True again within certain limits.\n\nThe Saints are made perfect through suffering.\n\nBut :what of the innocent child victims of war atrocities?\n\n434 Salvation is that which, when persons or things are in a right state, keeps them therein; when they are in a wrong state, transfers them thence.\n\nThe first meaning is positive and essential, the second negative and incidental.\n\nThe Scriptural view includes both sides, with the emphasis on the first.\n\nProtestantism (being in this as in other matters of a negative tendency) ignores the positive side to the great detriment of Religion.\n\n435 i.\n\ne.\n\nAll good things.\n\n436 Nothingness includes (1) mere non-entity ; (2 ) evil.\n\n(Perhaps both meanings are intended.) Salvation maintains all good things both in their being and in their excellence.\n\nIf they fell away towards nothingness the result is first corruption and then destruction.\n\n437 The word ἰσότης implies that a thing is identical in size, etc.\n\n(1) with other things; (2 ) with its own true nature.\n\nIt thus = (1) “equality”; (2) “rightness.” D.\n\nmaintains that all things possess the latter though not the former."

