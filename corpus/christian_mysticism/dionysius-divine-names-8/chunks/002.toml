[content]
body = "From this Source come the Godlike Powers of the Angelic Orders; from this Source they immutably possess their being and all the ceaseless and immortal motions of their spiritual life; and their very stability and unfailing desire for the Good they have received from that infinitely good Power which Itself infuses into them this power and this existence, and makes them ceaselessly to desire existence, and gives them the very power to desire that ceaseless power which they possess.\n\n5.\n\nThe effects of this Inexhaustible Power enter into men and animals and plants and the entire Nature of the Universe, and fill all the unified organizations with a force attracting them to mutual harmony and concord, and drawing separate individuals into being, according to the natural laws and qualities of each, without confusion or merging of their properties.\n\nAnd the laws by which this Universe is ordered It preserves to fulfil their proper functions, .and keeps the immortal lives of the individual angels inviolate; and the luminous stars of 157 heaven It keeps in all their ranks unchanged, and gives unto Eternity the power to be; and the temporal orbits It differentiates when they begin their circuits and brings together again when they return once more; and It makes the power of fire unquenchable, and the liquid nature of water It makes perpetual; and gives the atmosphere its fluidity, and founds the earth upon the Void and keeps its pregnant travail without ceasing.\n\nAnd It preserves the mutual harmony of the interpenetrating elements distinct and yet inseparable, and knits together the bond uniting soul and body, and stirs the powers by which the plants have nourishment and growth, and governs the faculties whereby each kind of creature maintains its being and makes firm the indissoluble permanence of the world, and bestows Deification 426 426 See Intr., p.\n\n43.\n\nitself by giving a faculty for it unto those that are deified.\n\nAnd, in short, there is nothing in the world which is without the Almighty Power of God to support and to surround it.\n\nFor that which hath no power at all hath no existence, no individuality, and no place whatever in the world.\n\n6.\n\nBut Elymas 427 427 The name is introduced to support the fiction of authorship, and an objection, current no doubt in the writer’s day (as in every age), is put into the mouth of one who belonged to the same time as St.\n\nPaul’s Athenian convert.\n\nthe sorcerer raises this objection: “If God is Omnipotent” (quoth he) “what meaneth your Sacred Writer by saying that there are some things He cannot do?” And so he blames Paul the Divine for saying that God cannot deny Himself.\n\n428 428 2 Tim.\n\nii.\n\n13 .\n\nNow, having stated his objection, I greatly fear that I shall be laughed at for my folly, in gong about to pull down tottering houses built upon the sand by idle children, and in striving to aim my arrow at an inaccessible target when I endeavour to deal with this 158 question of Divinity.\n\n429 429 He seems to mean two distinct things: (1) The objection is childish and needs no answering; (2) The whole question is beyond the reach of our understanding.\n\nBut thus I answer him: The denial of the true Self is a declension from Truth.\n\nAnd Truth hath Being; and therefore a declension from the Truth is a declension from Being.\n\nNow whereas Truth hath Being and denial of Truth is a declension from Being, God cannot fall from Being.\n\nWe might say that He is not lacking in Being, that He cannot lack Power, that He knows not how to lack Knowledge."

