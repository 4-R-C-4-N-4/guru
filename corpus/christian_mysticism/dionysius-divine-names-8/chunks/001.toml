body = "CHAPTER VIII Concerning ” Power ,” ” Righteousness ,” ” Salvation ,” ” Redemption “; and also concerning ” Inequality .” 1.\n\nNow since the Sacred Writers speak of the Divine Truthfulness and Supra-Sapient Wisdom as Power, and as Righteousness, and call It Salvation and Redemption, let us endeavour to unravel these Divine Names also.\n\nNow I do not think that any one nurtured in Holy Scripture can fail to know 155 that the Godhead transcends and exceeds every mode of Power however conceived.\n\nFor often Scripture attributes the Dominion to the Godhead and thus distinguishes It even from the Celestial Powers.\n\n421 421 The highest power our minds can conceive is that of the angels.\n\nBut God has the dominion over them, and hence His power is of a yet higher kind such as we cannot conceive.\n\nIn what sense, then, do the Sacred Writers speak of It also as Power when It transcends all Power?\n\nOr in what sense can we take the title Power when applied to the Godhead?\n\n2.\n\nWe answer thus: God is Power because in His own Self He contains all power beforehand and exceeds it, and because He is the Cause of all power and produces all things by a power which may not be thwarted nor circumscribed, and because He is the Cause wherefrom Power exists whether in the whole system of the world or in any particular part.\n\n422 422 Since the ultimate Godhead is undifferentiated God’s power is conceived of as an undifferentiated or potential energy.\n\nYea, He is Infinitely Powerful not only in that all Power comes from Him, but also because He is above all power and is Very Power, and possesses that excess of Power which produces in infinite ways an infinite number of other existent powers; and because the infinitude of powers which is continually being multiplied to infinity can never blunt that transcendently infinite 423 423 The inexhaustible multiplication of things in this world, though it should go on for ever, is a series made up of separate units.\n\nGod’s inexhaustible energy is beyond this series because it is one indivisible act.\n\nThe Undifferentiated transcends infinite divisibility.\n\nCf.\n\nIX.\n\n2.\n\nactivity of His Power whence all power comes; and because of the unutterable, unknowable, inconceivable greatness of His all-transcendent Power which, through its excess of potency, gives strength to that which is weak and maintains and governs the lowest of its created copies, even as, in those things whose power strikes our senses, very brilliant 156 illuminations can reach to eyes that are dim and as loud sounds can enter ears dull of hearing.\n\n(Of course that which is utterly incapable of hearing is not an ear, and that which cannot see at all is not an eye.\n\n424 424 This is meant to meet the objection that if God’s power is infinite there should be no decay or death.\n\nThings, says D., are sometimes incapable of responding, as a blind eye cannot respond to the light.\n\n) 3.\n\nThus this distribution of God’s Infinite Power permeates all things, and there is nothing in the world utterly bereft of all power.\n\nSome power it must have, be it in the form of Intuition, Reason, Perception, Life, or Being.\n\nAnd indeed, if one may so express it, the very fact that power exists 425 425 i.\n\ne.\n\nPower in the abstract.\n\nis derived from the Super-Essential Power.\n\n4."

