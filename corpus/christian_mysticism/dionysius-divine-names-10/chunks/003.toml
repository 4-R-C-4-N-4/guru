[content]
body = "It is spoken of by ail the Christian Mystics as the root of our being, or as the spark, or the Synteresis, etc.\n\nOur perfection consists in this ultimate reality, which is each man’s self, shining through his whole being and transforming it.\n\nHence man is at last lifted on to the eternal plane from that of time.\n\nThe movements of his spirit will then be so intense that they will attain a totum simul .\n\nWe get a foretaste of this when, in the experience of deep spiritual joy, the successive parts of Time so coalesce (as it were) that an hour seems like a moment.\n\nEternity is Rest and Time is Motion.\n\nAccelerate the motion in the individual soul, through the intensification of that soul’s bliss to infinity.\n\nThere is now in the soul an infinite motion.\n\nBut Infinite Motion is above succession, and therefore is itself a form of repose.\n\nThus Motion has been changed into Rest, Time into Eternity.\n\nMechanical Time, or dead Time (of which Aristotle speaks as mere movement or succession) is the Time measured by the clock; developing or living Time (which is Plato’s “incomplete life”) is real Time, and this is Aevum , which partakes both of mechanical Time and of Eternity.\n\nThe best treatment of the subject is probably to be found in Bergson’s theory of durée .\n\n(Cf.\n\nVon Hügel’s Eternal Life .) The words “eternal,” “everlasting,” etc., being loosely employed, may refer to three different things: (1) endless mechanical Time, i.\n\ne.\n\nmere endless succession; (2 ) Aevum , or developing and finally perfected living Time; (3) True Timeless Eternity.\n\nAnd God we must celebrate as both Eternity and Time, 465 465 Vide pp.\n\n169 n.\n\n1, 170 n.\n\n1.\n\nas the Cause of all Time and Eternity and as the Ancient of Days; as before Time and above Time and producing all the variety of times and seasons; and again, as existing before Eternal Ages, in that 173 He is before 466 466 Vide p.\n\n170, n.\n\n2.\n\nEternity and above Eternity and His Kingdom is the Kingdom of all the Eternal Ages.\n\nAmen.\n\n455 In the Super-Essence each thing has its ultimate and timeless being, 456 In the Super-Essence each thing has the limits of its duration predetermined.\n\nOr else D.\n\nmeans that in the Super-Essence the movement of Time has the impulse which generates it.\n\n457 Temporal precedence is metaphorically used to express metaphysical precedence.\n\nGod cannot in the literal sense of the words, temporally precede time.\n\n458 He transcends both Rest and Motion.\n\n459 Presumably Hierotheus.\n\n460 He is the Source of all extension both in Time and in Space, Unity underlies all counting (for 2, 3, 4, etc.\n\n= twice 1, three times 1, four times 1, etc.).\n\nHence it is the Origin, as it were, of all number.\n\nAnd, being at the beginning of the arithmetical series (as youth is at the beginning of life) it is symbolized (according to D.) by youthfulness.\n\n461 Ps.\n\nxxiv.\n\n7 .\n\n462 We cannot help thinking of Eternity as an Endless Time, as we think of infinite number as an endless numerical process.\n\nBut this is wrong.\n\nEternity is timeless as infinite number is superior to all numerical process.\n\nAccording to Plato, Time is “incomplete life” and Eternity is “complete life.” Thus Eternity fulfils Time and yet contradicts it, as infinite number fulfils and contradicts the properties of finite numbers."

