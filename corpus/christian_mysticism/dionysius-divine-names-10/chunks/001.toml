body = "CHAPTER X Concerning ” Omnipotent ,” ” Ancient of Days “; and also concerning ” Eternity “ and ” Time .” 1.\n\nNow ‘tis time that our Discourse should celebrate God (Whose Names are many) as “Omnipotent” and “Ancient of Days.” The former title is given Him because He is that All-Powerful Foundation of all things which maintains and embraces the Universe, founding and establishing and compacting it; knitting the whole together in Himself without a rift, producing the Universe out of Himself as out of an all-powerful Root, and attracting all things back into Himself as unto an all-powerful Receptacle, holding them all together as their Omnipotent Foundation, and securing them all in this condition with an all-transcendent bond suffering them not to fail away from Himself, nor (by being removed from out of that perfect Resting Place) to come utterly to destruction.\n\nMoreover, the Supreme Godhead is called “Omnipotent” because It is potent over all things, and rules with unalloyed sovranty over the world It governs; and because It is the Object of desire and yearning for all, and casts on all Its voluntary yoke and sweet travail of Divine all-powerful and indestructible Desire for Its Goodness.\n\n2.\n\nAnd “Ancient of Days” is a title given to God because He is the Eternity 455 455 In the Super-Essence each thing has its ultimate and timeless being, of all things and their 170 Time, 456 456 In the Super-Essence each thing has the limits of its duration predetermined.\n\nOr else D.\n\nmeans that in the Super-Essence the movement of Time has the impulse which generates it.\n\nand is anterior 457 457 Temporal precedence is metaphorically used to express metaphysical precedence.\n\nGod cannot in the literal sense of the words, temporally precede time.\n\nto Days and anterior to Eternity and Time.\n\nAnd the titles “Time,” “Day,” “Season,” and “Eternity” must be applied to Him in a Divine sense, to mean One Who is utterly incapable of all change and movement and, in His eternal motion, remains at rest; 458 458 He transcends both Rest and Motion.\n\nand Who is the Cause whence Eternity, Time, and Days are derived.\n\nWherefore in the Sacred Theophanies revealed in mystic Visions He is described as Ancient and yet as Young: the former title signifying that He is the Primal Being, existent from the beginning, and the latter that He grows not old.\n\nOr both titles together teach that He goes forth from the Beginning through the entire process of the world unto the End.\n\nOr, as the Divine Initiator 459 459 Presumably Hierotheus.\n\ntells us, either term implies the Primal Being of God: the term “Ancient” signifying that He is First in point of Time, and the term “Young” that He possesses the Primacy in point of Number, since Unity and the properties of Unity have a primacy over the more advanced numbers.\n\n460 460 He is the Source of all extension both in Time and in Space, Unity underlies all counting (for 2, 3, 4, etc.\n\n= twice 1, three times 1, four times 1, etc.).\n\nHence it is the Origin, as it were, of all number.\n\nAnd, being at the beginning of the arithmetical series (as youth is at the beginning of life) it is symbolized (according to D.) by youthfulness.\n\n3.\n\nNeed is there, methinks, that we understand the sense in which Scripture speaketh of Time and Eternity."

