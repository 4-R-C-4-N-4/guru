body = "If Time be thought of as an infinite series of finite numbers Eternity is the sum of that series and not its process.\n\nBut the name may be applied loosely to the process, though this is generally to be avoided.\n\nAccording to St.\n\nThomas, Eternity measures Rest, and Time measures Motion: Eternity is a totum simul and Time is successivum.\n\nThe difference between them is not, he says, that Time has a beginning and an end whereas Eternity has neither, though he admits that each of the particular objects existing in Time began and will end.\n\n(Summa, Pars I.\n\nQ.\n\nx.\n\nArt.\n\niv.) But this is, he says, not essential to the nature of time: it is only per accidens (ibid.\n\nArt.\n\nv.).\n\nCf.\n\nAristotle’s distinction between “unlimited Time” and limited Time.\n\n463 He alludes to Angels and the perfected souls of men and to their celestial abode.\n\n464 St.\n\nThomas speaks of aevum as standing between Eternity and Time and participating in both.\n\nTime, he says, consists in succession, Aevum does not but is capable of it, Eternity does not and is incapable of it (Summa, Pars I.\n\nQ.\n\nx.\n\nArt.\n\nv.).\n\nThus the heavenly bodies, he says, are changeless in essence, but capable of motion from place to place; and the angels are changeless in nature, but capable of choice and so of spiritual movement.\n\nMaximus’s note on the present passage explains this to be D.‘s meaning.\n\nThere is in each one of us a timeless self.\n\nIt is spoken of by ail the Christian Mystics as the root of our being, or as the spark, or the Synteresis, etc.\n\nOur perfection consists in this ultimate reality, which is each man’s self, shining through his whole being and transforming it.\n\nHence man is at last lifted on to the eternal plane from that of time.\n\nThe movements of his spirit will then be so intense that they will attain a totum simul .\n\nWe get a foretaste of this when, in the experience of deep spiritual joy, the successive parts of Time so coalesce (as it were) that an hour seems like a moment.\n\nEternity is Rest and Time is Motion.\n\nAccelerate the motion in the individual soul, through the intensification of that soul’s bliss to infinity.\n\nThere is now in the soul an infinite motion.\n\nBut Infinite Motion is above succession, and therefore is itself a form of repose.\n\nThus Motion has been changed into Rest, Time into Eternity.\n\nMechanical Time, or dead Time (of which Aristotle speaks as mere movement or succession) is the Time measured by the clock; developing or living Time (which is Plato’s “incomplete life”) is real Time, and this is Aevum , which partakes both of mechanical Time and of Eternity.\n\nThe best treatment of the subject is probably to be found in Bergson’s theory of durée .\n\n(Cf.\n\nVon Hügel’s Eternal Life .) The words “eternal,” “everlasting,” etc., being loosely employed, may refer to three different things: (1) endless mechanical Time, i.\n\ne.\n\nmere endless succession; (2 ) Aevum , or developing and finally perfected living Time; (3) True Timeless Eternity.\n\n465 Vide pp.\n\n169 n.\n\n1, 170 n.\n\n1.\n\n466 Vide p.\n\n170, n.\n\n2."

