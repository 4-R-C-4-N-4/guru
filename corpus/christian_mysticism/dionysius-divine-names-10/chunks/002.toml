body = "For where Scripture speaks of things as “eternal” it doth not always mean things that are absolutely Uncreated or verily Everlasting, Incorruptible, 171 Immortal, Invariable, and Immutable ( e.g.\n\n“Be ye lift up, ye eternal doors,” 461 461 Ps.\n\nxxiv.\n\n7 .\n\nand suchlike passages).\n\nOften it gives the name of “Eternal” to anything very ancient; and sometimes, again, it applies the term “Eternity” to the whole course of earthly Time, inasmuch as it is the property of Eternity to be ancient and invariable and to measure the whole of Being.\n\nThe name “Time” it Gives to that changing process which is shown in birth, death, and variation.\n\nAnd hence we who are here circumscribed by Time are, saith the Scripture, destined to share in Eternity when we reach that incorruptible Eternity which changes not.\n\nAnd sometimes the Scripture declares the glories of a Temporal Eternity and an Eternal Time, although we understand that in stricter exactness it describes and reveals Eternity as the home of things that are in Being; and Time as the home of things that are in Birth.\n\n462 462 We cannot help thinking of Eternity as an Endless Time, as we think of infinite number as an endless numerical process.\n\nBut this is wrong.\n\nEternity is timeless as infinite number is superior to all numerical process.\n\nAccording to Plato, Time is “incomplete life” and Eternity is “complete life.” Thus Eternity fulfils Time and yet contradicts it, as infinite number fulfils and contradicts the properties of finite numbers.\n\nIf Time be thought of as an infinite series of finite numbers Eternity is the sum of that series and not its process.\n\nBut the name may be applied loosely to the process, though this is generally to be avoided.\n\nAccording to St.\n\nThomas, Eternity measures Rest, and Time measures Motion: Eternity is a totum simul and Time is successivum.\n\nThe difference between them is not, he says, that Time has a beginning and an end whereas Eternity has neither, though he admits that each of the particular objects existing in Time began and will end.\n\n(Summa, Pars I.\n\nQ.\n\nx.\n\nArt.\n\niv.) But this is, he says, not essential to the nature of time: it is only per accidens (ibid.\n\nArt.\n\nv.).\n\nCf.\n\nAristotle’s distinction between “unlimited Time” and limited Time.\n\nWe must not, therefore, think of the things which are called Eternal as being simply co-ordinate with the Everlasting God Who exists before Eternity; 463 463 He alludes to Angels and the perfected souls of men and to their celestial abode.\n\n172 but, strictly following the venerable Scriptures, we had better interpret the words “Eternal” and “Temporal” in their proper senses, and regard those things which to some extent participate in Eternity and to some extent in Time as standing midway between things in Being and things in Birth.\n\n464 464 St.\n\nThomas speaks of aevum as standing between Eternity and Time and participating in both.\n\nTime, he says, consists in succession, Aevum does not but is capable of it, Eternity does not and is incapable of it (Summa, Pars I.\n\nQ.\n\nx.\n\nArt.\n\nv.).\n\nThus the heavenly bodies, he says, are changeless in essence, but capable of motion from place to place; and the angels are changeless in nature, but capable of choice and so of spiritual movement.\n\nMaximus’s note on the present passage explains this to be D.‘s meaning.\n\nThere is in each one of us a timeless self."

