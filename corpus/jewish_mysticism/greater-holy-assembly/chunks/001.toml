body = "Sacred Texts Judaism Index Previous Next p.\n\n109 HADRA RBA QDIShA (HA IDRA RABBA QADISHA); OR, THE GREATER HOLY ASSEMBLY.\n\nCHAPTER I.\n\nTHE INGRESS AND THE PREFACE.\n\n1.\n\nTRADITION.--Rabbi Schimeon spake unto his companions, and said: \"How long shall we abide in the condition of one column by itself?\n\nwhen it is written, Psa.\n\ncxix.\n\n126: 'It is time for Thee, Lord, to lay to Thine hand, for they have destroyed Thy law.' 2.\n\n\"The days are few, and the creditor is urgent; the herald crieth aloud daily, and the reapers of the land are few; and those who are about the end of the vineyard attend not, and have not known where may be the lawful place.\n\n( That is, do not study holiness, which is called the vineyard .) 3.\n\n\"Assemble yourselves, O my companions, in an open space, equipped with armour and spears; be ye ready in your preparations, in council, in wisdom, in understanding, in science, in care, with hands and with feet!\n\nAppoint as King over you, Him in whose power is life and death: so that the words of truth may be received: things unto p.\n\n110 which the supernal holy ones attend, and rejoice to hear and to know them.\" 4.\n\nRabbi Schimeon sat down and wept; then he said: \"Woe!\n\nif I shall reveal it!\n\nWoe!\n\nif I shall not reveal it!\" 5.\n\nHis companions who were there were silent.\n\n6.\n\nRabbi Abba arose and said unto him: \"With the favour of the Lord, also it is written, Psa.\n\nxxv.\n\n14: 'The Arcanum of the Tetragrammaton is with them that fear Him.' And well do these companions fear that Holy and Blessed One; and now they have entered into the assembly of the tabernacle of his house, some of them have only entered, and some of them have departed also.\" 7.\n\nMoreover, it is said the companions who were with Rabbi Schimeon were numbered, and they were found to consist of Rabbi Eleazer, his son; and Rabbi Abba, and Rabbi Yehuda, and Rabbi Yosi the son of Jacob, and Rabbi Isaac, and Rabbi Chisqiah the son of Rav, and Rabbi Chiya, and Rabbi Yosi, and Rabbi Yisa.\n\n8.\n\nThey gave their hands unto Rabbi Schimeon, and raised their fingers on high, and entered into a field under the trees and sat down.\n\n9.\n\nRabbi Schimeon arose and offered up a prayer.\n\nHe sat in the midst of them, and said: \"Let whosoever will place his hand in my bosom.\" They placed their hands there, and he took them.\n\n10.\n\nWhen he began, he said ( from Deut .\n\nxxvii.\n\n15): \"Cursed be the man that maketh any graven or molten image, the work of the hands of the craftsman, and putteth it in a secret place.\n\nAnd all the people shall answer and say Amen!\" 11.\n\nRabbi Schimeon began, and said: \"Time for Thee, O Tetragrammaton to lay to Thine hand.\" Why is it time for the Tetragrammaton to lay to His hand?\n\nBecause they have perverted Thy law.\n\nWhat is this, p.\n\n111 they hath perverted Thy law?' The higher law, which is itself made void, if it be not carried out according to his commands.\n\nWherefore is this?\n\n( Or, as others read: Wherefore is this name Tetragrammaton here employed?"

