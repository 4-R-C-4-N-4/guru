[content]
body = ") This hath been said concerning the Ancient of Days.\n\n1 12.\n\n\"For it is written, Deut.\n\nxxxiii.\n\n29: 'Blessed art thou, O Israel: who is like unto thee?' Also it is written, Exod.\n\nxv.\n\n11: 'Who is like unto thee among the gods, O Tetragrammaton?'\" 2 13.\n\nHe called Rabbi Eleazer, his son, and commanded him to sit down before him, and Rabbi Abba on the other side, and said: \"We are the type of all things\" (that is, \"we represent the three columns of the Sephiroth;\") \"thus far are the columns established.\" 14.\n\nThey kept silence, and they heard a voice; and their knees knocked one against the other with fear.\n\nWhat was that voice?\n\nThe voice of the Higher Assembly, which had assembled above.\n\n( For out of Paradise came the souls of Me just thither, that they might hearken, together with the Schechinah of the Presence Divine .) 15.\n\nRabbi Schimeon rejoiced, and said.\n\n\"O Tetragrammaton!\n\nI have heard Thy speech, and was afraid!\n\n(Hab.\n\niii.\n\n1).\n\nHe hath said: 'It is therefore rightly done, seeing that fear hath followed; but for us the matter rather dependeth upon love.' Like as it is written, p.\n\n112 [paragraph continues] Deut.\n\nvi.\n\n5: 'And thou shalt delight in Tetragrammaton thy God.' Also it is written, Mal.\n\ni.\n\n2: \"I have loved you.'\" 16.\n\nRabbi Schimeon said further: \"'He who walketh, going up and down ( from one house unto another ) revealeth the secret; but the faithful in spirit concealeth the word' (Prov.\n\nxi.\n\n13).\n\n17.\n\n\"'He who walketh going up and down.' This saying meriteth question, because it is said, 'going up and down.' Wherefore then I walketh?' The man is already said to be going up and down: what is this word 'walketh?' 18.\n\n\"For truly it is true concerning that man who is not stable in his spirit nor truthful, that the word which he hath heard is moved hither and thither, like a straw in the water, until it cometh forth from him.\n\n19.\n\n\"For what reason?\" Because his spirit is not a firm Spirit.\n\n20.\n\n\"But concerning him who is firm in spirit it is written: 'But the faithful in spirit concealeth the word.' (But this phrase) 'faithful in spirit' denoteth firmness of spirit; like as it is said, Isa.\n\nxxii.\n\n23: 'And I will fasten him as a nail in a sure place.' Matter dependeth upon Spirit.\n\n21.\n\n\"And it is written, Eccles.\n\nv.\n\n6: 'Suffer not thy mouth to cause thy flesh to sin.' 22.\n\n\"For neither doth the world remain firm, except through secresy.\n\nAnd if in worldly affairs there be so great need of secresy, how much more in the things of the most secret of secrets, and in the meditation of the Ancient of Days, 1 which matters are not even revealed unto the highest of the angels.\" 23.\n\nRabbi Schimeon said, moreover: \"I will not say it unto the heavens, that they may hear; I will not declare it unto the earth, that it may hear; for certainly we are (the symbols of) the pillars of the Universe.\" p.\n\n113 24.\n\nIt is said in the Arcanum of Arcana, that when Rabbi Schimeon opened his mouth, the whole place was shaken, and his companions also were shaken.\n\nFootnotes 111:1 I.e."

