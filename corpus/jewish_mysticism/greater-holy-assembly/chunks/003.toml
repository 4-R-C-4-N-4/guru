[content]
body = ", one of the names of Macroprosopus, the first emanation, the crown.\n\nKether.\n\n(See Introduction.) 111:2 In the above verse it is well to note that by Notariqon, the second division of the literal Qabalah.\n\nthe initial letters of the first quotation give the word AIMK, Aimakh , \"Thy terror,\" the addition of the numeration of which by Gematra, the first division of the Literal Qabalah, is 71; and that in a similar manner from the second quotation, the word MKBI, Maccabee , is obtained, whose numeration is 72.\n\nNow, 72 is the number of the Schemhamphorasch, or \"divided name,\" to which Maccabee is always referred.\n\nAnd if to the 71 Of the first quotation we add A, expressing thus the hidden unity, we obtain 72 again.\n\nFurthermore.\n\nIt is well to note that each quotation consists of four words.\n\nthus answering to the letters of the Tetragrammaton.--TRANS.\n\n112:1 Macroprosopus, the first Sephira.\n\nNext: Chapter II: Of the Condition of the World and the World of Vacancy"

