[content]
body = "Like as it is written, Job xxviii.\n\n23: \"God understandeth the way thereof, and He knoweth the place thereof.\" 111.\n\n\"The Elohim understand the way thereof: \"this is the inferior Eden, known unto Microprosopus.\n\n\"And He hath known the place thereof:\" this is the superior Eden, which the Ancient of Days hath known, the most abstruse of all.\n\nFootnotes 123:1 Macroprosopus.\n\n123:2 That of Macroprosopus.\n\nNext: Chapter IX: Concerning the Eyes of Macroprosopus"

