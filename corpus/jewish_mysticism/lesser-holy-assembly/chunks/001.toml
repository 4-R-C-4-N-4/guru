body = "Sacred Texts Judaism Index Previous Next CHAPTER VIII.\n\nCONCERNING THE FOREHEAD OF MACROPROSOPUS.\n\n87.\n\nTHE forehead of His skull is the acceptation of acceptations, whereunto is opposed the acceptation of Microprosopus, like as it is written, Exod.\n\nxxviii.\n\n38: \"And it shall be upon His forehead always for acceptation,\" &c.\n\n90.\n\nAnd that forehead is called RTzVN, Ratzon , Will-power, because it is the ruler of the whole head and of the skull, which is covered by four hundred and twenty worlds.\n\n91.\n\nAnd when it is uncovered, the prayers of the Israelites ascend.\n\n92.\n\n\"When is it uncovered?\" Rabbi Schimeon was silent.\n\nHe asked again a second time, \"When?\" Rabbi Schimeon said unto Rabbi Eleazar, his son, \"When is it uncovered.\" 93.\n\nHe answered unto him: \"In the time of the offering of the evening prayer on the Sabbath.\" 94.\n\nHe said unto him: \"For what reason?\" He answered unto him: \"Because at that time the lower judgment threateneth through Microprosopus; but that forehead is uncovered which is called 'Acceptation,' and then wrath is assuaged, and the prayer ascendeth.\n\np.\n\n123 95.\n\n\"This is that which is written, Ps.\n\nlxix.\n\n14: 'And I have prayed unto Thee, O Tetragrammaton!\n\nin an acceptable time.' 96.\n\n\"And the time of acceptance by the Ancient of Days 1 is here to be understood, and of the unveiling of the forehead; and because it is thus disposed at the offering of the evening prayer on the Sabbath.\" 97.\n\nRabbi Schimeon spake unto Rabbi Eleazar, his son, and said: Blessed be thou, O my son!\n\nby the Ancient of Days; for thou hast found in that time in which thou hast need--the acceptation of His forehead.\n\n98.\n\nCome and behold!\n\nin these inferiors, when the forehead is uncovered, there is found fixed shamelessness.\n\n99.\n\nThis is the same which is written, Jer.\n\niii.\n\n3: \"Yet thou hadst the forehead of a shameless woman, thou refusedst to be ashamed.\" 100.\n\nBut when this forehead 2 is uncovered, inclination and acceptation are found in perfect form, and all wrath is quieted and subdued before Him.\n\n10I, From that forehead shine forth four hundred habitations of judgments, when it is uncovered during that period of acceptation, anti all things are at peace before it.\n\n102.\n\nThis is the same which is written, Dan.\n\nvii.\n\n10: \"The judgment was set\"--that is, subsideth in its place, and the judgment is not exercised.\n\n103.\n\nAnd this is the tradition: There is no hair found on that part, because it is opened and not covered.\n\n104.\n\nIt is covered, I say, and the executors of judgment behold this, and are pacified, and ( judgment ) is not exercised.\n\n105.\n\nThis is the tradition: This forehead hath been extended into two hundred and seventy thousand lights of the luminaries of the superior Eden.\n\np.\n\n124 106.\n\nThis is the tradition: There existeth an Eden which shineth in Eden.\n\nThe superior Eden, which is not uncovered, and is hidden in concealment, and is not distributed into the paths, like as it hath been said.\n\n107.\n\nThe inferior Eden is distributed into its paths; ( namely ) into thirty-two directions of its paths.\n\n108.\n\nAnd although this Eden is distributed into its path, yet is it not known unto any, save unto Microprosopus, 109.\n\nBut no man hath known the superior Eden, nor its paths, except Macroprosopus Himself.\n\n110."

