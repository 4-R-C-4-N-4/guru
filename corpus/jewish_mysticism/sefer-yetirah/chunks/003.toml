[content]
body = "Three mothers, Alef-Mem-Shin—In the Person are Fire, Water, and Wind; the head was created from Fire, the belly was created from Water, and the chest from Wind decides between them.\n\nThree Mothers, Alef-Mem-Shin—He carved them, hewed them, combined them, and with them He sealed Three Mothers in the World, and Three Mothers in the Year, and Three Mothers in the Person, male and female.\n\nHe made the letter Alef reign over Wind, and He bound to it a crown.\n\nHe combined them, this one with that one.\n\nWith them He sealed the Wind in the world, and satiation in the Year, and the chest in the Person—male with Alef-Mem-Shin and female with Alef-Shin-Mem.\n\nHe made the letter Mem reign over Water, and He bound to it a crown.\n\nHe combined them, this one with that one; He sealed with them the earth in the World, and cold in the Year, and the belly in the Person, male and female—male with Mem-Alef-Shin and female with Mem-Shin-Alef.\n\nHe made the letter Shin reign over Fire, and He bound to it a crown.\n\nHe combined them, this one with that one; He sealed with them the heavens in the World, and heat in the Year, and the head in the Person, male and female [male with Shin-Alef-Mem and female with Shin-Mem-Alef, written thus in the N.Y.].\n\nSeven Pairs, Begad-Kafrat (pronounced with two tongues)—their foundation is Life, Peace, Wisdom, Wealth, Beauty, Fertility, and Dominion, pronounced with two tongues: Vet-Bet, Ghimel-Gimel, Dhalet-Dalet, Khaf-Kaf, Feh-Peh, Resh-Rresh, Taw-Thaw.\n\nA soft and hard structure, a strong and weak structure.\n\nPairs, for they are opposites—The opposite of Life is Death; the opposite of Peace is Evil; the opposite of Wisdom is Folly; the opposite of Wealth is Poverty; the opposite of Beauty is Ugliness; the opposite of Fertility is Barrenness; the opposite of Dominion is Servitude.\n\nSeven Pairs, Begad-Kafrat—Seven and not six, seven and not eight.\n\nTest with them and probe of them (and form and think).\n\nMake a thing stand in assembly before its Creators; return the Maker to His Site.\n\nSeven Pairs, Begad-Kafrat, against 7 Edges.\n\n6 of the Edges are Above and Below, East and West, North and South, with the Holy Palace established in the center, bearing them all.\n\nSeven Pairs, Begad-Kafrat.\n\nHe carved them, hewed them, exchanged them, and formed with them the stars in the World and days in the Year and gates in the Person.\n\nHe carved out of them the Seven Firmaments, and Seven Earths, and Seven Sabbaths; for this reason, He loved the Seventh Day more than anything under all the heavens.\n\nHow?\n\nHe made the letter Bet reign over Life, and He bound to it a crown, and formed with it Saturn in the World, and Sunday in the Year, and the right eye in the Person.\n\nHe made the letter Gimel reign, and He bound to it a crown, and formed with it Jupiter in the World, and Monday in the Year, and the left eye in the Person.\n\nHe made the letter Dalet reign, and He bound to it a crown, and formed with it Mars in the World, and Tuesday in the Year, and the right ear in the Person."

