[content]
body = "He made the letter Zayin reign, and bound to it a crown, and formed with it Gemini in the World, and Siwan in the year, and the right leg in the Person.\n\nHe made the letter Chet reign, and bound to it a crown, and formed with it Cancer in the World, and Tammuz in the year, and the left leg in the Person.\n\nHe made the letter Tet reign, and bound to it a crown, and formed with it Leo in the World, and Av in the Year, and the the right kidney in the Person.\n\nHe made the letter Yod reign, and bound to it a crown, and formed with it Virgo in the World, and Elul in the Year, and the left kidney in the Person.\n\nHe made the letter Lamed reign, and bound to it a crown, and formed with it Libra in the World, and Tishri in the Year, and the liver in the Person.\n\nHe made the letter Nun reign, and bound to it a crown, and formed with it Scorpio in the World, and Marcheshwan in the Year, and the spleen in the Person.\n\nHe made the Samekh reign, and bound to it a crown, and formed with it Sagittarius in the World, and Kislew in the year, and the gall in the Person.\n\nHe made the letter ʽAyin reign, and bound to it a crown, and formed with it Capricorn in the World, and Tevet in the Year, and the rumen in the Person.\n\nHe made the letter Tzadi reign, and bound to it a crown, and formed with it Aquarius in the World, and Shevat in the Year, and the abomasum in the Person.\n\nHe made the letter Qof reign, and bound to it a crown, and formed with it Pisces in the World, and Adar in the Year, and the craw in the Person.\n\nThree Mothers, which are the Three Fathers from whom come Fire and Wind and Water; Three Mothers, and Seven Pairs, and Twelve Simple Letters.\n\nThe Holy One, Blessed Is He, YAH, ADONAI of Hosts, Living God, God of Israel, High and Exalted, Dwelling Ever Above, Holy Is His Name, Lofty and Holy Is He—These are the Twenty-Two Letters with which He founded.\n\nThree Fathers and their descendants, and Seven Stars [another version: Conquerors] and their hosts, and Twelve Diagonal Borders.\n\nA sight for faithful witnesses to speak—World, Year, Person.\n\nAn edict—Twelve [another version: Ten] and Seven and Three He appointed them: the Dragon Teli, and the Wheel, and the Heart.\n\nThree—Fire, Water, and Wind; Fire above and Water below, with Wind the edict deciding between them.\n\nA cipher to speak: The Fire carries the Water; Mem being quiet and Shin whistling, with Alef the edict deciding between them.\n\nTeli is in the World like a king on his throne; the Wheel is in the Year like a king in the city; the Heart is in the Person like a king in war.\n\nGod made all things as this one compared to that one: good compared to evil, better and best and a worse and worst.\n\nGoodness distinguishes evil and evil distinguishes goodness; goodness is kept for the good and evil is kept for the evil.\n\nThree, but each one stands alone.\n\n7 divided: Three opposite Three, with an edict deciding between them.\n\nTwelve stand in war: Three Friends, Three Foes, Three Lifegivers, and Three Executioners.\n\nThree Friends: the heart and the ears and the mouth.\n\nThree foes: the liver and the gall and the tongue."

