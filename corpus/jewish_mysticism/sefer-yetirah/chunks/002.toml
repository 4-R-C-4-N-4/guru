[content]
body = "Eight—He sealed West and faced backwards and sealed it with Heh-Waw-Yod.\n\nNine—He sealed South and faced to His right and sealed it with Waw-Yod-Heh.\n\nTen—He sealed North and faced to His left and sealed it with Waw-Heh-Yod.]\nThese are the Ten SEFIROT BELIMAH: One, the Wind of the Living God; and Wind from Wind, and Water from Air, and Fire from Water; and Up Above and Below, and East and West, and North and South.\n\nTwenty-Two Letters of Foundation—Three Mothers, Seven Pairs, and Twelve Simple Letters.\n\nThree Mothers, Alef-Mem-Shin: Their foundation is the palm of innocence and the palm of guilt, and the tongue of edict decides between them.\n\nTwenty-Two Letters—He carved them, and hewed them, and weighed them, and exchanged them, and combined them, and formed with them the soul of every formed being and the soul of every being He has yet to form.\n\nTwenty-Two Letters of Foundation—Carved with voice, hewn with spirit, fixed in the mouth in five places: Alef-Heh-Chet-ʽAyin, Bet-Waw-Mem-Peh, Gimel-Yod-Kaf-Qof, Dalet-Tet-Lamed-Nun-Taw, Zayin-Samekh-Shin-Resh-Tzadi.\n\n([In the Mantua printing, the following is added to the paragraph:] Bound to the tongue like a flame to coal—Alef-Chet-Heh-ʽAyin, serving behind the tongue in the house of swallowing.\n\nBet-Waw-Mem-Peh, between the lips and in front of the tongue.\n\nGimel-Yod-Kaf-Qof, being cut upon the third portion of the tongue.\n\nDalet-Tet-Lamed-Nun-Taw, with the tip of the tongue, serving with voice.\n\nAnd Samekh-Tzadi-Resh-Shin, between the teeth and tongue, lain down and flattened.\n\n[On this stand the remarks of the Ramav.])\nTwenty-Two Letters of Foundation—Fixed in a wheel with 231 gates.\n\nThe wheel turns back and forth.\n\nThis is a cypher for the matter: There is nothing in goodness higher than Delight, and nothing in evil lower than Affliction.\n\nHow did He weigh and transform them?\n\nAlef with them all and all of them with Alef; Bet with them all and all of them with Bet.\n\nAnd so it turns, such that all matter is found and all speech emerges into one name.\n\nHe formed matter from chaos and made nothingness somethingness; He hewed great columns out of imperceptible Air.\n\nThis is a cipher: observing, transforming, making all matter and all words one name.\n\nA cipher for the matter: twenty-two (numbers) [objects] in one body.\n\nThree Mothers, Alef-Mem-Shin—Their foundation is the palm of guilt and the palm of innocence, and the tongue of edict decides between them.\n\nThree Mothers, Alef-Mem-Shin—A great secret, concealed and covered and sealed in Six Rings.\n\nFrom them emerge Fire and Water, being divided male and female.\n\nThree Mothers, Alef-Mem-Shin is their foundation—from them are born Fathers from which all is created.\n\nThree Mothers, Alef-Mem-Shin—In the World are Air, Water, Fire.\n\nThe heavens were created first from Fire, and the earth is created from Water, and the Air decides between the fire and the water.\n\nThree Mothers, Alef-Mem-Shin—In the Year are Fire, Water, and Wind.\n\nHeat was created from Fire, and cold from Water, and satiation from Wind deciding between them."

