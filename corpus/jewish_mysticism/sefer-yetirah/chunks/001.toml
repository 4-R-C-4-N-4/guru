[content]
body = "YAH, ADONAI of Hosts, God of Israel, Living God and King of the World, EL SHADDAI, Merciful and Gracious, High and Exalted, Dwelling Ever Above, Holy Is His Name—He carved and created His World in Thirty-Two Wondrous Ways of Wisdom , with three linguistic tools: with Counting, with Writing, and with Speech.\n\nTen SEFIROT BELIMAH and Twenty-Two Letters of Foundation: Three Mothers, Seven Pairs, and Twelve Simple Letters.\n\nTen SEFIROT BELIMAH—The count of ten fingers, five against five, with the Covenant of the Unique One established in the center, like a word of the tongue and circumcision of the genitals.\n\nTen SEFIROT BELIMAH—Ten and not nine, ten and not eleven.\n\nUnderstand with Wisdom and become wise with Understanding; test with them and probe of them.\n\nMake a thing stand in assembly before its Creators; return the Maker to His Site.\n\nTen SEFIROT BELIMAH—Their measure is ten; they have no edge.\n\nDepth of Beginning, Depth of End; Depth of Good, Depth of Evil; Depth of Above, Depth of Below; Depth of East, Depth of West; Depth of North, Depth of South.\n\nThe Unique Lord EL, the faithful king, governs them all from His Holy Abode, forever and ever and ever.\n\nTen SEFIROT BELIMAH—Their visage is as the look of lightning, and their limit has no edge.\n\nHis Word is in them, running and returning.\n\nBy His word they pursue like a whirlwind; before His throne they bow.\n\nTen SEFIROT BELIMAH—Their end is attached to their start, like the flame-tongue is bound to the coal.\n\nFor the Lord is unique, He has no second—before one, what can you count?\n\nTen SEFIROT BELIMAH—Keep your mouth from speaking and your heart from conceiving.\n\nIf your heart should run, return to the place of which is said, “running and returning”.\n\nUpon this matter the covenant was cut.\n\nTen SEFIROT BELIMAH—One—The Wind of the Living GOD, Blessed and Happy is His Name, He Who Lives Forever.\n\nVoice and Wind and Speech—this is the Holy Wind.\n\nTwo—He carved Wind from Wind, and with it He hewed Twenty-Two Letters of Foundation: Three Mothers, Seven Pairs, and Twelve Simple Letters.\n\nAnd Wind is the first of them.\n\nThree—He carved Water from Wind and with them He hewed tohu and bohu, mud and clay.\n\nHe carved them like a garden bed, erected them like a wall, screened them like ceiling plaster.\n\nFour—He carved Fire from Water, and with it He hewed the Throne of the Glory, and the Wheels, and the Fiery Serpents, and the Holy Creatures, and the Ministering Angels.\n\nAnd from the three of them He founded His Abode, as is said, “He makes the winds His angels and burning fire His ministers”.\n\n([According to the 1562 Mantua print, the edition as written in the Otzer Hashem and in Rambam:] Five—Three of the Simple Letters—He sealed Wind by means of three and fixed them within His Great Name, Yod-Heh-Waw.) [The correct version:] He chose 3 of the simple letters with the secret of the 3 Mothers, Alef-Mem-Shin, and He fixed them within His Great Name.\n\nWith them He sealed 6 Edges.\n\nFive—He sealed Above and faced upwards and sealed it with Yod-Heh-Waw.\n\nSix—He sealed Below and faced downwards and sealed it with Yod-Waw-Heh.\n\nSeven—He sealed East and faced forwards and sealed it with Heh-Yod-Waw."

