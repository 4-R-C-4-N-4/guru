[content]
body = "He made the letter Kaf reign, and He bound to it a crown, and formed with it the Sun in the World, and Wednesday in the Year, and the left ear in the Person.\n\nHe made the letter Peh reign, and He bound to it a crown, and formed with it Venus in the World, and Thursday in the Year, and the right nostril in the Person.\n\nHe made the letter Resh reign, and He bound to it a crown, and formed with it Mercury in the World, and Friday in the Year, and the left nostril in the Person.\n\nHe made the letter Taw reign, and He bound to it a crown, and formed with it the Moon in the World, and Saturday in the Year, and the mouth in the Person.\n\nSeven Pairs, Begad-Kafrat—How did He exchange them?\n\nTwo stones build two houses; three build six houses; four build twenty-four houses; five build one hundred and twenty houses; six build seven hundred and twenty houses; seven build five thousand and forty houses.\n\nFrom here on out, go and contemplate what the mouth cannot speak and the ear cannot hear.\n\nThese are the Seven Stars in the world: the Sun, Venus, Mercury, the Moon, Saturn, Jupiter, Mars.\n\nThese are the 7 Days in the Year: the Days of Creation.\n\nAnd the Seven Gates in the person: two eyes, two ears, two punctures of the nose, and the mouth.\n\nWith them He carved the Seven Firmaments and the Seven Earths and the Seven Hours; for this reason, He loved the Seventh Day more than any object under the heavens.\n\nTwelve Simple Letters, Heh-Waw Zayin-Chet Tet-Yod Lamed-Nun ʽAyin-Samekh Tzadi-Qof—Their foundation is Seeing, Hearing, Smelling, Talking, Eating, Sex, Work, Movement, Excitement, Play, Contemplation, Sleep.\n\nTheir measure is the Twelve Diagonal Borders: Northeastern border, Southeastern border, Upper-Eastern border, Lower-Western border, Upper-Northern border, Lower-Northern border, Southwestern border, Northwestern border, Upper-Western border, Lower-Western border, Upper-Southern border, Lower-Southern border.\n\nThey extend outwards and go on forever and ever and ever—They are the Arms of the World.\n\nTwelve Simple Letters, Heh-Waw Zayin-Chet Tet-Yod Lamed-Nun ʽAyin-Samekh Tzadi-Qof—He carved them, hewed them, weighed them, exchanged them, transformed them, and formed with them the Twelve Constellations in the World.\n\nA cipher: Teshat Seʼav Meʽaq Gedad.\n\nAnd these are the Twelve Months in the Year: Nisan, Iyyar, Siwan, Tammuz, Av, Elul, Tishri, Marcheshwan, Kislew, Tevet, Shevat, Adar.\n\nAnd these are the Twelve Leaders in the Person: two hands, two legs, two kidneys, spleen, liver, gall, rumen, abomasum, craw.\n\nLike what did He make them?\n\n(A city) [strife].\n\nAnd like what did He arrange them?\n\nWar.\n\nGod made them as this one compared with that one.\n\nHow did He combine them?\n\nHe made the letter Heh reign, and bound to it a crown, and formed with it Aries in the World, and Nisan in the year, and the right hand in the Person, male and female.\n\nHe made the letter Waw reign, and bound to it a crown, and formed with it Taurus in the World, and Iyyar in the Year, and the left hand in the Person."

