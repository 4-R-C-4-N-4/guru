[content]
body = "He produced Oin, predominant in Anger, crowned, combined, and formed Capricornus in the world, Tebet in the year, and the liver in man.\n\n11.\n\nHe produced Tzaddi, predominant in Taste, crowned, combined, and formed Aquarius in the world, Sebat in the year, and the gullet in man.\n\n12.\n\nHe produced Quoph, predominant in Mirth, crowned, combined, and formed Pisces in the world, Adar in the year, and the spleen in man.\n\nCHATER VI 1.\n\nIn proof of these things, and witnessing faithfully are the Universe, the Year of time, and Man himself, the Microcosm.\n\nHe fixed these as testimonies of the Triad, the Heptad, and the Dodecad; the twelve constellations rulers of the world, the Dragon (THELE) Tali which environs the universe, and the microcosm, man.\n\nThe triad, fire, water, and air; the fire above, the water below, and the air in the midst.\n\nThe proof of which is that air is a participator with both.\n\n2.\n\nTali, the Dragon, is above the Universe, as a king on his throne; the sphere in the year as a king in his State, the Heart of man as a king in warfare.\n\nAnd our God made the states of opposition, good and evil, good from the good, and evil from the evil.\n\nHappiness is reserved for the just, and misery for the wicked ones.\n\n3.\n\nAnd out of the triad one stands apart; and in the heptad there are two triads, and one standing apart.\n\nThe dodecad symbolizes war, the triad of amity, the triad of enmity, three which are life-giving, three which are death-dealing, and God, the faithful king, rules over all from the throne of his sanctity.\n\nOne above three, three above seven, and seven above twelve, and all are linked together, and one with another.\n\n4.\n\nAfter that our father Abraham had seen, and pondered over, investigated, and understood these things, he designed, engraved, and composed them, and received them into his power (hands).\n\nThen the Lord of all appeared unto him, made a covenant with him, and kissed his head, and naming him after his own name, called him his friend; and as it is written, completed a covenant with him and with his seed forever, who then believed on God, the Tetragrammaton, and it was imputed to him for righteousness.\n\nGod ordained a covenant between the toes of his feet, that of circumcision; and a covenant between the fingers of his hands, that of the Tongue.\n\nHe bound the essences of the twenty-two letters on his tongue, and God disclosed to him the secrets of them.\n\nGod has carried these through waters, He has borne them aloft through fire, and He has stamped them in the storms of the air; He has distributed them among the seven stars, and has assigned them to twelve celestial constellations.\n\nAmen.\n\nTHE THIRTY-TWO PATHS OF WISDOM APPENDIX TO THE SEPHER YETZIRAH The First Path is called the Admirable or the Concealed Intelligence (The Highest Crown) - for it is the Light giving the power of comprehension of that First Principle which has no beginning, and it is the Primal Glory, for no created being can attain to its essence.\n\nThe Second Path is that of the Illuminating Intelligence it is the Crown of Creation, the Splendor of the Unity, equaling it, and it is exalted above every bead, and named by the Kabbalists the Second Glory."

