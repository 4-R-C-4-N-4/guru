body = "Sacred-texts Judaism Kabbalah SEPHER YETZIRAH OR THE BOOK OF CREATION W.W.\n\nWescott, tr.\n\n(1887) CHAPTER 1 1.\n\nIn two and thirty most occult and wonderful paths of wisdom did JAH the Lord of Hosts engrave his name: God of the armies of Israel, ever-living God, merciful and gracious, sublime, dwelling on high, who inhabiteth eternity.\n\nHe created this universe by the three Sepharim, Number, Writing, and Speech.\n\n2.\n\nTen are the numbers, as are the Sephiroth, and twenty-two the letters, these are the Foundation of all things.\n\nOf these letters, three are mothers, seven are double, and twelve are simple.\n\n3.\n\nThe ten numbers formed from nothing are the Decad: these are seen in the fingers of the hands, five on one, five on the other, and over them is the Covenant by voice spiritual, and the rite of Circumcision, corporeal (as of Abraham).\n\n4.\n\nTen are the numbers of the ineffable Sephiroth, ten and not nine, ten and not eleven.\n\nLearn this wisdom, and be wise in the understanding of it, investigate these numbers, and draw knowledge from them, fix the design in its purity, and pass from it to its Creator seated on his throne.\n\n5.\n\nThese Ten Numbers, beyond the Infinite one, have the boundless realms, boundless origin and end, an abyss of good and one of evil, boundless height and depth, East and West, North and South, and the one only God and king, faithful forever seated on his throne, shall rule over all, forever and ever.\n\n6.\n\nThese ten Sephiroth which are ineffable, whose appearance is like scintillating flames, have no end but are infinite.\n\nThe word of God is in them as they burst forth, and as they return; they obey the divine command, rushing along as a whirlwind, returning to prostrate themselves at his throne.\n\n7.\n\nThese ten Sephiroth which are, moreover, ineffable, have their end even as their beginning, conjoined, even as is a flame to a burning coal: for our God is superlative in his unity, and does not permit any second one.\n\nAnd who canst thou place before the only one?\n\n8.\n\nAnd as to this Decad of the Sephiroth, restrain thy lips from comment, and thy mind from thought of them, and if thy heart fail thee return to thy place; therefore is it written, \"The living creatures ran and returned,\" and on this wise was the covenant made with us.\n\n9.\n\nThese are the ten emanations of number.\n\nOne is the Spirit of the Living God, blessed and more than blessed be the name of the Living God of Ages.\n\nThe Holy Spirit is his Voice, his Spirit, and his Word.\n\n10.\n\nSecond, from the Spirit he made Air and formed for speech twenty-two letters, three of which are mothers, A, M, SH, seven are double, B, G, D, K, P, R, T, and twelve are single, E, V, Z, CH, H, I, L, N, S, O, Tz, Q, but the spirit is first among these.\n\nThird, Primitive Water.\n\nHe also formed and designed from his Spirit, and from the void and formless made earth, even as a rampart, or standing wall, and varied its surface even as the crossing of beams.\n\nFourth, from the Water, He designed Fire, and from it formed for himself a throne of honor, with Auphanim, Seraphim, Holy Animals, and ministering Angels, and with these he formed his dwelling, as is written in the text \"Who maketh his angels spirits and his ministers a flaming fire.\" (Psalm civ."

