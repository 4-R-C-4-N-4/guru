[content]
body = "These three mothers again represent in the Microcosm or Human form, male and female; the Head, the Belly, and the Chest; the bead from the fire, the belly from water, and the chest from the air lieth between them.\n\n5.\n\nThese three mothers did he create, form, and design, and combine with the three mothers in the world, and in the year, and in Man, both male and female.\n\nHe caused Aleph to reign in the air, and crown it, and combined one with the other, and with these he sealed the Air in the world, the temperate climate of the year, and the chest (the lungs for breathing air) in man; the male with A, M, SH, the female with SH, M, A.\n\nHe caused Mem to predominate in Water, and crowned it, and combined it with others, and formed Earth on the world, cold in the year, and the fruit of the womb in mankind, being carried in the belly.\n\nHe caused Shin to reign in Fire and crowned it, and he combined one with the other, and sealed them, as heaven in the universe, as heat in the year, and as the head of Man and Woman.\n\nCHAPTER IV 1.\n\nThere were formed seven double letters, Beth, Gimel, Daleth, Kaph, Pe, Resh, Tau, each has two voices, either aspirated or softened.\n\nThese are the foundations of Life, Peace, Riches, Beauty or Reputation, Wisdom, Fruitfulness, and Power.\n\nThese are double, because their opposites take part in life, opposed to Life is Death; to Peace, War; to Riches, Poverty; to Beauty or Reputation, Deformity or Disrepute; to Wisdom, Ignorance; to Fruitfulness, Sterility; to Power, Slavery.\n\n2.\n\nThese seven double letters point out the dimensions, East, West, height, depth, North, South, with the holy temple in the middle, sustaining all things.\n\n3.\n\nThese seven double letters He formed, designed, created, and combined into the Stars of the Universe, the days of the week, the orifices of perception in man; and from them he made seven heavens, and seven planets, all from nothingness, and, moreover, he has preferred and blessed the sacred Heptad.\n\n4.\n\nFrom two letters, or forms He composed two dwellings; from three, six; from four, twenty-four; from five, one hundred and twenty; from six, seven hundred and twenty; from seven, five thousand and forty; and from thence their numbers increase in a manner beyond counting; and are incomprehensible.\n\nThese seven are Planets of the Universe, the Sun, Venus, Mercury, Moon, Saturn, Jupiter, and Mars; the seven days are the days of creation; and these an the seven gateways of a man, two eyes, two ears, two nostrils and a mouth, through which he perceives by his senses.\n\nSUPPLEMENT TO CHAPTER IV (Found in some editions) He caused and produced Beth, predominant in wisdom, crowned, combined, and formed the Moon in the Universe, the first day of the week, and the right eye, of man.\n\nGimel, predominant in health, crowned, .\n\ncombined and formed Mars in the Universe, the second day of the week, and the right ear in man.\n\nDaleth, predominant in fertility, crowned, combined, and formed the Sun in the Universe, the third day of the week, and the right nostril in man.\n\nKaph, predominant in life, crowned, combined, and formed Venus in the Universe, the fourth day of the week, and the left eye of man.\n\nPe, predominant in power, crowned, combined, and formed Mercury in the Universe, the fifth day of the week, and the left ear in man."

