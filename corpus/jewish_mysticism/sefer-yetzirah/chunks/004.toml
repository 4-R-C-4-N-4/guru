[content]
body = "Resh, predominant in peace, crowned, combined, and formed Saturn in the Universe, the sixth day of the week, and the left nostril in man.\n\nTau, predominant in beauty, crowned, combined and formed Jupiter in the Universe, the seventh day in the week, and the mouth of man.\n\nBy these seven letters were also made seven worlds, seven heavens, seven lands, seven seas, seven rivers, seven deserts, seven days (as before), seven weeks from Passover to Pentecost, and every seventh year a jubilee.\n\nCHAPTER V 1.\n\nThe simple letters are twelve, namely: He, Vau, Zain, Heth, Teth, Yod, Lamed, Nun, Samech, Oin, Tzaddi, and Quoph; they represent the fundamental properties, eight, hearing, smell, speech, desire for food, the sexual appetite, movement, anger, mirth, thought, sleep, and work.\n\nThese symbolize also twelve directions in space: northeast, southeast, the east above, the east below, the northwest, southwest, the west above, the west below, the upper south, the lower south, the upper north, the lower north.\n\nThese diverge to all eternity, and an as the arms of the universe.\n\n2.\n\nThese twelve letters, he designed, formed, combined, weighed, and changed, and created with them the twelve divisions of the heavens (namely, the zodiacal constellations), the twelve months of the year, and the twelve important organs of the frame of man, namely the right and left hands, the right and left feet, two kidneys, the liver, the gall, the spleen, the intestines, the gullet, and the stomach.\n\n3.\n\nThree mothers, seven double and twelve simple, these are the twenty-two letters with which I H V H Tetragrammaton, that is our Lord of Hosts, exalted, and existed in the ages, whose name is Holy, created three fathers, fire and spirit and water, progressing beyond them, seven heavens with their armies of angels; and twelve limits of the universe.\n\nSUPPLEMENT TO CHAPTER V (Found in some Versions) 1.\n\nGod produced He, predominant in Speech, crowned, combined, and formed Aries in the world, Nisan in the year, and the right foot of man.\n\n2.\n\nGod produced Vau, predominant in Mind, crowned, combined, and formed Taurus in the world, Yiar in the year, and the right kidney of man.\n\n3.\n\nGod produced Zain, predominant in movement, crowned, combined, and formed Gemini in the world, Sivan in the year, and the left foot of man.\n\n4.\n\nHe produced Heth, predominant in Sight, crowned, combined, and formed Cancer in the world, Tammuz in the year, and the right hand of man.\n\n5.\n\nHe produced Teth, predominant in Hearing, crowned, combined, and formed Leo in the world, Ab in the year, and the left kidney in man.\n\n6.\n\nHe produced Yod, predominant in Labor, crowned, combined, and formed Virgo in the world, Elul in the year, and the left hand of man.\n\n7.\n\nHe produced Lamed, predominant in sexual desire, crowned, combined, and formed Libra in the world, Tisri in the year, and the gall in man.\n\n8.\n\nHe produced Nun, predominant in smell, crowned, combined, and formed Scorpio in the world, Marchesvan in the year, and the intestines in man.\n\n9.\n\nHe produced Samech, predominant in sleep, crowned, combined, and formed Sagittarius in the world, Kislev in the year, and the stomach of man.\n\n10."

