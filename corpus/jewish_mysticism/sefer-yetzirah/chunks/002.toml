[content]
body = "4.) 11.\n\nHe selected three letters from the simple ones, and sealed them as forming his great Name, I H V and he sealed the universe in six directions.\n\nFive.- He looked above, and sealed the height, with I H V.\n\nSix.- He looked below, and sealed the deep, with I V H.\n\nSeven.- He looked forward, and sealed the East, with H I V.\n\nEight.-He looked backward, and sealed the West, with V H I.\n\nNine.- He looked to the right, and sealed the South, with V I H.\n\nTen.-He looked to the left, and sealed the North, with H V 1.\n\n12.\n\nThese are the ten ineffable existences, the spirit of the living God, Air, Water, Fire, Height and Depth, East and West, North and South.\n\nCHAPTER II 1.\n\nThe foundations are the twenty-two letters, three mothers, seven double, and twelve single letters.\n\nThree mothers, namely A, M, SH, these are Air, Water, and Fire: Mute as Water, Hissing as Fire, and Air of a spiritual type, is as the tongue of a balance standing erect between them pointing out the equilibrium which exists.\n\n2.\n\nHe hath formed, weighed, transmuted, composed, and created with these twenty-two letters every living being, and every soul yet uncreated.\n\n3.\n\nTwenty-two letters are formed by the voice, impressed on the air, and audibly uttered in five situations, in the throat, guttural sounds; in the palate, palatals; by the tongue, linguals; through the teeth, dentals; and by the lips, labial sounds.\n\n4.\n\nThese twenty-two letters, the foundations, He arranged as on a sphere, with two hundred and thirty-one modes of entrance.\n\nIf the sphere be rotated forward, good is implied, if in a retrograde manner evil is intended.\n\n5.\n\nFor He indeed showed the mode of combination of the letters, each with each, Aleph with all, and all with Aleph.\n\nThus in combining all together in pairs are produced these two hundred and thirty-one gates of knowledge.\n\nAnd from Nothingness did He make something, and all forms of speech and every created thing, and from the empty void He made the solid earth, and from the non-existent He brought forth Life.\n\nHe hewed, as it were, immense column or colossal pillars, out of the intangible air, and from the empty space.\n\nAnd this is the impress of the whole, twenty-one letters, all from one the Aleph.\n\nCHAPTER III 1.\n\nThe three mother letters A, M, SH are the foundations of the whole; and resemble a Balance, the good in one scale, the evil in the other, and the oscillating tongue of the Balance between them.\n\n2.\n\nThese three mothers enclose a mighty mystery, most occult and most marvelous, sealed as with six rings, and from them proceed primeval Fire, Water, and Air; these are subsequently differentiated into male and female.\n\nAt first existed these three mothers, and there arose three masculine powers, and hence all things have originated.\n\n3.\n\nThe three mothers are A, M, SH; and in the beginning as to the Macrocosm the Heavens were created from Fire;nthe Earth from primeval Water; and the Air was formed from the Spirit, which stands alone in the midst, and is the Mediator between them.\n\n4.\n\nIn the Year or as regards Time, these three mothers represent Heat, Cold, and a Temperate climate, the heat from the fire, the cold from the water, and the temperate state from the spiritual air which again is an equalizer between them."

