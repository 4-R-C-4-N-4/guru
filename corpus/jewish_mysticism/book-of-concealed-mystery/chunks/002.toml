[content]
body = "If the reader turn to the introduction, to the Table showing the Sephiroth arranged in three pillars, he will see that Malkuth is, as it were, the antithesis of Kether; and hence it is said that \"Malkuth is Kether after another manner.\" And this recalls the precept of Hermes in the Smaragdine Tablet \"That which is below is like that which is above, and that which is above is like that which is below.\"] 7.\n\nHShMIM, Ha-Shamaim , \"the heavens\" (the fifth word of this text, and) VATh, Vaath, \"and the substance p.\n\n97 of\" (the sixth word; they are referred unto the paths of beauty and victory) like as it is written, 1 Chron.\n\nxxix.\n\n11: \"And the beauty and the victory.\" These paths are joined together in one.\n\n[\"The beauty and the victory\" are Tiphereth and Netzach, the sixth and seventh Sephiroth.] 8.\n\nHARTz, Haaretz , \"the earth\" (the seventh word of this beginning denoteth the queen joined together with the glory and the foundation), like as it is written, Ps.\n\nViii.\n\n2: \"How magnificent (this is the path of glory) is Thy name in all the world\" (whereby is symbolized the foundation); the earth which is the kingdom.\n\nAlso) Isa.\n\nvi.\n\n3: \"The whole earth is full of His glory\" (where these three paths again concur).\n\n9.\n\n\"Let there be a firmament in the midst of the waters,\" \"to make a distinction between the Holy Place and between the Holy of Holies.\" (That is, between Microprosopus and Macroprosopus.) 10.\n\nThe Most Ancient One is expanded into Microprosopus (or the Crown into the Beauty), and adhereth (unto it, so that it may receive increase.\n\nIf) it be not perfectly expanded (so that Microprosopus as it were existeth by himself, but instead is retained in his mother's womb) the mouth speaking great things moveth in that place (that Microprosopus, so that he may be fully born), and he is crowned with the lesser crowns under the five divisions of the waters.\n\n(That is, Microprosopus receiveth the influx of the five benignities, which are called \"crowns,\" because they descend from the crown, or Macroprosopus; but \"lesser crowns,\" because they take their rise from benignity in the Microprosopic Path ; and they are called the five divisions of the waters, because the water belongeth unto the benignity, and in this verse, (Gen.\n\ni.\n\n6, 7, the word MIM, Meim, waters, filleth the fifth place).\n\np.\n\n98 11.\n\nLike as it is written, Num.\n\nxix.\n\n17: \"And shall pour upon him living waters in a vessel.\" (But the life looketh towards the mother; and it) is (understood to be that path which is called) ALHIM ChIIM , Elohim Chiiim , \"the Elohim of life;\" and the king of the universe (that is, the understanding.\n\nWhereunto belong also the following sayings:--) Ps.\n\ncxvi.\n\nv.\n\n9: \"I will walk before the Lord in the lands of life.\" Also 1 Sam.\n\n29: \"And the soul of my Lord shall be bound in the quiver of life.\" Also Gen.\n\nii.\n\n9: \"And the tree of life in the midst of the garden.\" (All these, I say, refer unto the understanding, from which the six members receive the influx."

