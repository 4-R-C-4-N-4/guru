[content]
body = "31: \"And He was wise above every man.\" Because these are not classed with man.\n\n21.\n\n(But when it is said) \"And the Tetragrammaton gave him wisdom,\" then is understood the supernal He .\n\n(Because he gave unto him the influx of the wisdom of the queen.) \"And he was wise before every man,\" because from her he received the wisdom here below (through the path to the kingdom).\n\n22.\n\nThose (spirits) are powerful who exist from eternity.\n\nThat is, from (eternity or) the supernal world (the understanding, namely, whence are excited severity and rigour).\n\nThe men of the name (that is) who exercised themselves in the name.\n\n23.\n\nIn what name?\n\nIn the Holy Name, wherein they exercised themselves (for the performing of various wonders), and not the holy inferiors.\n\nYet (these) did not exercise themselves save in the name (and not in holiness).\n\n24.\n\nIt is said openly \"the men of the name,\" and not p.\n\n102 [paragraph continues] \"the men of the Tetragrammaton.\" Not (therefore used they the name) with respect unto the mystery of the Arcanum, or in a diminutive form; nor yet with any diminution of the (name itself).\n\n25.\n\n(And because) the men of the name (are) openly (spoken of, hence) are they shut out from the general conception of man.\n\n26.\n\nIt is written, Ps.\n\nxlix.\n\n12: \"Man being in honour, abideth not.\" (When it is said) \"man being in honour\" (the same is as if also it were said, a man such as was Solomon) shall not remain long in the honour of the King without the spirit.\n\n(That is, in the influx from the King, Microprosopus, to whom, or to the beautiful path, the spirit belongeth.) 27.\n\nThirteen kings (that is, the twelve metatheses of the Tetragrammaton with its radix, which are the measures of mercies) wage war with seven (with the Edomite kings; because, while the lights of the former flowed down, these could not maintain themselves, and, besides, they are the classes of the most rigorous judgments which are opposed to the mercies.\n\nFor) seven kings are seen in the land (Edom), and now after that their vessels are broken, they are called shells, who have fallen down among the inferiors.\n\n(These) nine vanquished in war (the measures of Microprosopus, concerning which see the \"Idra Rabba\"; through which David conquered his enemies), which ascend in the paths of those which pass downward, on account of His ruling power (that is, which make thirteen, as they are in Macroprosopus and his beard, which is called his influence, and freely floweth down), and there is none who can withhold their hand.\n\n(For whilst the supernal measures permit the increase in the inferiors, all judgments are subdivided.) [Concerning the \"twelve banners of the sacred Name,\" the metatheses of the Tetragrammaton, see Introduction, § 62; also concerning the Edomite kings.\n\nI have before remarked that the p.\n\n103 demons are called Qliphoth, or \"shells,\" by the Qabalists.\n\nThe thirteen in Microprosopus is composed of nine manifest and four hidden.\n\n28.\n\nFive kings (that is, the five letters MNTzPK, Me , Nun , Tzaddi , Pe , Kaph , which are the roots of the judgments), betake themselves into swift flight before four (the four letters of the Tetragrammaton which bear with them the influx of benignity.\n\nThey cannot remain (since the judgments and rigours cease and flee)."

