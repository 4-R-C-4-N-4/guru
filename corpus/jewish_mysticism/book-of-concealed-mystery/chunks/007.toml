[content]
body = "The four wheels are their correlatives under the second Sephira, on their four sides--namely, the four elements of the air, fire, water, and earth, which are the abodes of the spirits of the elements, the sylphs, salamanders, undines, and gnomes, under the presidency of the tenth Sephira.] 33.\n\nThe serpent (which was made from the rod of Moses--that is, the shell--NVOH, Nogah , or splendour) which rusheth forth with three hundred and seventy leaps (the thirty-two names together with the five letters of ALHIM, Elohim , which make 37, multiplied by the p.\n\n105 decad 370, and the judgments of the bride are denoted, to which that shell directeth his springs, because he is of middle nature betwixt the holy and the profane).\n\n\"He leapeth upon the mountains, and rusheth swiftly over the hills,\" like as it is written (Cant.\n\nii.\n\n8.\n\nThat is, he leapeth high above the rest of the shells).\n\nHe holdeth his tail in his mouth between his teeth (that is, his extremity, by which he is linked to the shells, turneth towards his other extremity wherewith he looketh towards holiness).\n\nHe is pierced through on either side (so that he may seek to receive the superior and inferior nature).\n\nWhen the chief ariseth (who is Metatron ) he is changed into three spirits (that is, he assumeth the nature of three inferior shells).\n\n[\"Nogah\" is also the qabalistical title of the sphere of the planet Venus.\n\nMTTRVN, Metatron , or Methraton, is the particular intelligence of the first Sephira, and is called the \"Prince of Faces;\" he is said also to have been the \"ruler of Moses.\" Methraton has the same numeration as ShDI, Shaddai , the Almighty.] 34.\n\n(But concerning Metatron) it is written, Gen.\n\nv.\n\n22: \"And Enoch walked with the Elohim\" (because out of Enoch, Metatron is formed).\n\nAnd it is written, Prov.\n\nxxii.\n\n6: \"Enoch hath been made into a boy, according to his path.\" (That is, \"hath been changed into\") the boy (namely, Metatron, who is spoken of under his name NOR, Nour , which meaneth a \"boy\").\n\n[\"Enoch hath been made into a boy,\" &c.\n\nThis peculiar rendering of the passage, \"Train up a child in the way,\" &c., arises from reading in the Hebrew text ChNVK, Chanokh , Enoch, instead of ChNK, Chanekh , \"train up,\" or \"instruct.\"] 35.\n\nWith the Elohim, and not with the Tetragrammaton (because he himself is referred unto the path of the queen, to whom is attributed this name of Rigour).\n\n\"And he existed not\" (longer) under this name (Enoch), because the Elohim took him in order that he might be called by this name.\n\n(For this name is communicable unto the angels, p.\n\n106 and in the first instance unto this chief among them, namely, Metatron.) 36.\n\nThere are three houses of judgment given, which are four (that is, the three letters IHV, referred into the understanding, which yield the four letters of the Tetragrammaton, pointed with the vowel points of the name Elohim.\n\nFor) there are four superior houses of judgment (the four said Tetragrammatic letters) and four inferior (which are the four letters ADNI, Adonaï , belonging unto the kingdom).\n\nFor it is written, Lev.\n\nxix."

