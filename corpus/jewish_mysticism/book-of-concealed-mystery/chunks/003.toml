[content]
body = "And to it also pertain the following names, namely, the name) IH, Yah (whensoever it is written in full with A in this manner:) IVD HA, Yod Ha (and containeth the number of the numeral powers of the letters of the Tetragrammaton, namely, 26; unto which also is referred that form of the name belonging unto the intelligence), AHII, Eheii (where in the place of the final He , Yod is put, as in a former instance.\n\n(See Chap.\n\nI, § 32.) [In the Hebrew, ChIIM, Chiim, \"living\"; in our version of the Old Testament it is translated \"running water.\" Chiim is plural.] 12.\n\nBetween the waters and the waters.\n\n(Since there are the superior) perfect waters, and (those which are in Microprosopus) imperfect waters (or those mingled with severities; because in another manner it is said) perfect compassion, imperfect compassion.\n\n(Now followeth a mystical explanation of Gen.\n\nvi.\n\n3.) 13.\n\nAnd the Tetragrammaton hath said: \"My spirit shall not strive with man for ever, seeing that he also is in the flesh.\" (In this passage, when it is said:) \"And the Tetragrammaton hath said,\" (it is to be noted that) after that there was formed (the supernal structure), in the last place concerning Microprosopus (this name is p.\n\n99 understood).\n\nFor when it is said, \"He calleth this also by the name,\" the Ancient One speaketh occultly in a hidden manner.\n\n[The Ancient One is symbolized by the pronoun He in the sentence, \"He calleth this also by the name.\"] 14.\n\n\"My spirit shall not strive with man.\" (Here is understood, not the spirit of Microprosopus, but) that which is from the supernals, because from that spirit which rusheth forth from the two nostrils of the nose of Macroprosopus the influx is sent down unto the inferiors.\n\n15.\n\nAnd because it is written (in the same place) \"And his days shall be a hundred and twenty years,\" I, Yod , is either perfect (whensoever its singular parts exist in the form of decads) or imperfect (when they are in monads or units).\n\nWhen (therefore Yod (is placed by itself) alone (it is understood to be perfect, because in itself it containeth) a hundred.\n\n(But if) two letters (are put, then are understood the ten units) twice reckoned; (hence are produced) the hundred and twenty years.\n\n[The \"singular parts\" of Yod are the numbers from one to ten, for the number of Yod is ten.\n\nBut when Yod is taken as its square I x I = 10 x 10 = 100.\n\nBut II = I x I + I + I (or the two letters both multiplied and added together) = 10 x 10+ 10+ 10 = 120.\n\nBut when Yod = 100, its digits are tens and not units--namely, the numbers 10, 20, 30, &c., instead of 1, 2, 3, &c.] 16.\n\nYod is alone whensoever he is manifested in Microprosopus (that is when the lights of Macroprosopus descend into Him, then indeed the paths of the decads are increased, and this decad) is increased into ten thousands (by the paths joined with the four letters of the Tetragrammaton) of years.\n\n(But) hence (if it be conceived only according unto the power of Macroprosopus, it hath that position) which is written, Ps.\n\ncxxxix."

