body = "Sacred Texts Judaism Index Previous Next CHAPTER V.\n\n1.\n\n(It is written) Isa.\n\ni.\n\n4: \"Woe unto the sinful nation, unto the people heavy with iniquity, unto the seed of evildoers, &c.\" (Here the author of the \"Siphra Dtzenioutha\" reasoneth concerning the small word HVI, \"woe,\" which also is a form of the name.\n\nAnd this word is alone separated from the following portions of the sentence.) 2.\n\nSeven are the paths (if the Tetragrammaton, be written in this way partially complete), IVD, HH, V, H, (where the father and mother are written in full, Microprosopus and his bride are written uncovered.\n\nIf here the last and first letters be combined, and the penultimate and second, and therefore the paths at either extremity, so that they may form the letters) HI and VV (mother and son), then are produced (the three middle letters) HH, D (which are the symbols of the queen, heavy with judgments.\n\nBut if mother and daughter be combined) HVI and HH, (then) is produced forth VV (or Microprosopus)as well as DV (or the androgyn, who also is a condition of judgments), for occultly Adam is denoted, or the male and female, who are that DV concerning whom it is written (in the place cited above) \"corrupt children.\" 3.\n\n(When it is said) BRAShITh, BRA, Berashith bera , \"In the beginning created,\" (the supernal paths are under p.\n\n96 stood.\n\nFor) BRAShITh, Berashith , is the speech (one of the ten rules of Genesis), but BRA, Bera , is the speech halved.\n\n(But there are here understood) Father and Son, the hidden and the manifest.\n\n(And also) 4 The superior Eden is hidden and concealed.\n\n(That is, no mention is made of the crown.) The inferior Eden cometh forth so that it may be transferred (towards the inferiors) and manifested (through the voice of its original, which denoteth wisdom.) [\"No mention made of the crown\"-- i.e.\n\n, Kether, the first Sephira, Macroprosopus.] 5.\n\nFor the name (Tetragrammaton) IHVH, Yod , He , Vau , He , includeth the name IH, Yah , (which is of the father, and the name) ALHIM, Elohim (which here followeth in the text, and pertaineth unto the mother).\n\n6.\n\nATh, Ath (the fourth word of this text, which in another manner signifieth the name) ADNI, Adonaï , \"Lord\" (namely, the path of the kingdom; also the name) AHIH, Eheieh (that is, the path of the crown, and this symbolizeth in itself the two extreme paths; here denoteth) the right and the left (that is, benignity and severity), which are united in one (equilibrium).\n\n[ Ath , ATh, means \"the,\" \"the very substance of.\" Qabalistically it signifies \"the beginning and the end,\" and is like the term \"Alpha and Omega\" used in the Apocalypse.\n\nFor as Alpha and Omega are respectively the first and last letters of the Greek alphabet, so are Aleph and Tau of the Hebrew.\n\nThe \"two extreme paths\" are the crown, Kether, and the kingdom, Malkuth, the first and tenth Sephiroth.\n\nthe highest and the lowest, Macroprosopus, and the queen."

