[content]
body = "And IVBL, Yobel , \"jubilee,\" is H, He (the first He of the Tetragrammaton); and He is the spirit rushing forth over all (because the mother is the world to come, when in the resurrection all things will receive the spirit); and all things shall return unto their place (like as in the jubilee, so in the world to come).\n\n43.\n\nFor it is written, AHH, IHVH, ALHIM, Ahah Tetragrammaton Eloim!\n\n\"Ah Tetragrammaton Elohim!\" p.\n\n108 [paragraph continues] When the H, He , appeareth (first), and H, He (in the second place); then is Tetragrammaton called Elohim (like as a judge; because in the world to come there will be work for much strength.\n\nThis is) the full name.\n\nAnd it is written, Isa.\n\nii.\n\n11: \"And Tetragrammaton alone shall be exalted in that day.\" When the one He is turned towards the other He , and Yod is taken away, then cometh vengeance into the universe; and except for that Adam who is called Tetragrammaton, the universe would not exist; but all things would be destroyed.\n\nHence it is written: \"And the Tetragrammaton alone,\" &c.\n\n44.\n\nHereunto is the hidden and involved Mystery of the King, that is \"The Book of Concealed Mystery,\" Blessed is he who entereth into and departeth therefrom, and knoweth its paths and ways.\n\nNext: Chapter I: The Ingress and the Preface"

