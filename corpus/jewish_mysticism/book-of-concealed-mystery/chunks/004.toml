body = "5; \"And thou shalt place upon me thine hand:\" KPKH, Khephakha .\n\n(Where this word KPKH, if it be written according to the usual p.\n\n100 custom KPK, Khephakh , yieldeth the number 120.\n\nBut now by adding the paragogic H of the female, there is given the number 125, on account of the five severities.) [\"This decad is increased into ten thousand by the paths joined with the four letters of the Tetragrammaton \" --i.e.\n\n, the paths are the Sephiroth = the numbers from one to ten; and they are said to be joined with the four letters by multiplying the decad to the fourth power, or 10 4 .\n\nHence for I, the first letter, we have 10 x 1 = 10; for H, the second letter, we have 10 x 10= 100: for V.\n\nthe third letter, 10 x 10 x 10 = 1,000; and for H, the fourth letter, 10 x 10 x 10 x 10 = 10,000.\n\nIn the Shemitic languages, a paragogic letter is one which is added to a word to give it additional emphasis.] 17, \"There were giants in the earth,\" Gen.\n\nvi.\n\n4.\n\n(If this word HIV, Hayu , is considered, which also is a form of the often varied name, it taketh its rise from the kingdom.) This is that which is written, Gen.\n\nii.\n\n10: \"And thence is it divided, and is in four heads.\" (Where is understood the end of that emanation which the separated universe followeth.\n\nNevertheless) from the place where the body is divided, they are called those trees (or, as the Mantuan Codex correcteth the passage: Where the garden is divided, and the seven inferior emanations are understood; where then it divideth the universe into the inferior worlds and provideth a habitation for the shells or spirits of matter).\n\nHence it is written: \"And from hence is it divided.\" [\"The shells\" = elemental spirits.\n\nThe Qabalah always calls the evil elemental spirits of matter \"shells.\"] 18.\n\nThey were in the earth in those days, but not in the following time, until Joshua came.\n\n(That is, they are applicable unto the path of the bride, which also is called the land of Canaan, wherein Joshua found the giants.\n\nFor the word NPILIM, Nephilim , occurreth not fully, except when it is used in the incident of the spies, Num.\n\nxiii.\n\n33.) p.\n\n101 19.\n\nAnd the sons of the Elohim are guarded (nor is mention made of a similar case) until Solomon came and joined himself with the daughters of men; like as it is written, Eccles.\n\nii.\n\n8: VThONVGVTh, Ve-Thonogoth \"And the delights of the sons of men,\" &c.\n\nWhere (in the feminine gender) he calleth the word ThONVGVTh, Thonogoth , and not (as elsewhere in the masculine gender) ThONVGIM, Thonogim , \"sons of Adam;\" so that it is intimated in an occult manner that the latter (the sons of the Elohim) are of those other spirits who are not contained under the supernal wisdom; concerning which it is written, 1 Kings v.\n\n12: \"And the Lord gave wisdom unto Solomon.\" (Concerning these matters, further see the \"Treatise of the Revolutions).\" [\"The Treatise of the Revolutions\" is not published in this volume.] 20.\n\nAlso it is written, ibid .\n\niv."

