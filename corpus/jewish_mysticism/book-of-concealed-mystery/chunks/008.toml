[content]
body = "35: \"Ye shall not do iniquity in judgment, in dimension, in weight, and in measure.\" (Where these four are mystically intimated.) 37.\n\n(There is one) rigorous judgment (of severity),another that is not rigorous (that is, of the kingdom).\n\nThere is one judgment by balance (wherein are the two scales of merit and error), another judgment which is not made by balance; (and this is) the gentle judgment (whereby the Israelites are judged.\n\nBut also there is given) the judgment which is neither of the one nature nor of the other.\n\n(Namely, the beautiful path.) [Of course the \"beautiful path\" is Tiphereth, the sixth Sephira.] 38.\n\n(Further on it is written), Gen.\n\nvi.\n\n1.\n\n\"And it came to pass when man began to multiply upon the face of the earth.\" (Where by these words) ADM, Adam, began to multiply (there is understood Daath, or the knowledge, the soul of the beautiful path, to which Moses is referred; which sendeth down many lights into the bride, the earth, when the spouse ascendeth thither).\n\nThis is that which is written ( ibid .\n\n3): BShGM, Beshegam , \"in that also, he is flesh\" (which word Beshegam , \"in that also,\" by equality of numeration equalleth MShH, Moses ) Adam (namely) the supernal (Daath, or knowledge).\n\nAnd it is written: \"Upon the face of the earth\" (which face of the earth is this, that the highest representation of the queen is the understanding, the mother, unto whose gates Moses ascended).\n\np.\n\n107 39.\n\n(Concerning this face, it is written) Exod.\n\nxxxiv.\n\n29: \"And Moses knew not that the skin of his face shone\" (where by the face the mother is understood; by the skin, the queen.) This is that which is said, Gen.\n\niii.\n\n21: \"Tunics of skin\" (because by itself the kingdom is wanting in light).\n\n40.\n\nTo shine (but when it is said \"the face of Moses,\" the mother is understood, according to that passage, 1 Sam.\n\nxvi.\n\n13: \"And Samuel took the horn of oil\" (where by the oil, the wisdom, by the horn, or the splendour of the oil, the understanding is denoted).\n\nFor there is no anointing except by the horn (that is, every descent of unction is through the mother).\n\nHence it is said, Ps.\n\nlxxxix.\n\n18: \"And in thy favour our horn shall be exalted.\" (Also) Ps.\n\ncxxxii.\n\n17: \"There shall the born of David flourish\" (that is, the queen shall receive the influx from the mother).\n\nThis is the tenth of the kings (that is, the path of the kingdom), and originateth from jubilee, who is the mother.\n\n41.\n\nFor it is written, Josh.\n\nvi.\n\n5: \"And it shall be when the horn of jubilee is sounded.\" This is the splendour of the jubilee, and the tenth (path) is crowned by the mother.\n\n42.\n\n(This is) the horn which receiveth the horn and the spirit, that it may restore the spirit of Yod He unto Yod He .\n\n(That is, when the spirit is to be given unto Microprosopus, his mother contributed as much, which is QRN, Qaran , \"the horn,\" the brilliancy, as the increase which he receiveth from the father.) And this is the horn of jubilee."

