[content]
body = "[The letters of the Hebrew alphabet are divided into three classes, the three mothers as they are called, AMSh; the seven duplex letters, BGDKPRTh, so called because they are sometimes tenues and sometimes aspirates, according to whether they are written with or without the Daghesh point; and the twelve simple letters, HVZChTILNSOTzQ.\n\nThey are also divided into the three categories of Chesed , Din , and Rachmim , or mercy, judgment, and mildness.\n\nNow these five letters MNTzPK denote the severest judgments, and their number = 280 = PR = the name of the angel Sandalphon , SNDLPVN, the angel IOR, or of the wood of the world of Asiah, since the greatest part of it are sterile trees.] 29.\n\nFour kings slay four (that is, the four letters of the Tetragrammaton are bound together with the four letters ADNI, Adonaï , which) depend from them like grapes in a cluster (in the concatenation of these two names, thus, IAHDVNHI).\n\n30.\n\nAmong them are set apart (that is, among these paths of the Divine names a selection of holiness is made from these broken vessels) seven channels (that is, seven broken vessels, which now are like the shells, and contain in themselves a great part of the lights and souls); they testify testimony (that is, the souls thus selected, thence having been born into the universe, testify that they are freed from impurity) and they do not remain in their place (and are no longer detained under the shells).\n\n31.\n\nThe tree which is mitigated (that is, the path of the kingdom or Schechinah, which is the tree of the p.\n\n104 knowledge of good and evil, which in itself existeth from the judgments, but is mitigated by the bridegroom through the influx of mercies) resideth within (within the shells; because the kingdom hath its dominion over all things, and its feet descend into death).\n\nIn its branches (in the inferior worlds) the birds lodge and build their nests (the souls and the angels have their place).\n\nBeneath it those animals which have power seek the shade (that is, the shells, \"for in it every beast of the forest doth walk forth,\" Ps.\n\nciv.\n\n20).\n\n[See the Introduction for the Sephiroth arranged in the three pillars, or tree of life.] 32.\n\nThis is the tree which hath two paths (for thus is this passage restored in the corrected Codex) for the same end (namely, good and evil, because it is the tree of the knowledge of good and evil).\n\nAnd it hath around it seven columns (that is, the seven palaces), and the four splendours (that is, the four animals) whirl around it (in four wheels) on their four sides (after the fourfold description of the chariot of Yechesqiel (Ezekiel).\n\n[The seven palaces answer to the 3rd, 4th, 5th, 6th, 7th, 8th, and 9th Sephiroth, operating through the respective orders of the angels into the spheres of the seven planets, Saturn, Jupiter, Mars, Sol, Venus, Mercury, and Luna.\n\nThe four animals, or Chaioth Ha-Qadesch , are the vivified powers of the four letters of the Tetragrammaton operating under the presidency of the first Sephira as the mainspring of primum mobile of creation."

