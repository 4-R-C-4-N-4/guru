body = "Works of an Apocalyptic character, continued to be written for about three centuries; the Second (Fourth) Book of Esdras, one of the most remarkable Apocalypses, belongs to the end of the first Christian century, approximately.\n\nThere are Apocalypses of later date, some of subordinate interest are of much later date; but the real period of the Apocalyptic Literature is from about 200 B.C.\n\nto about A.D.\n\n100; its beginnings date, therefore, from a time prior to that great landmark in Jewish history, the Maccabæan Era.\n\nTHE BOOK OF ENOCH: ITS COMPONENT PARTS AND THEIR DATES The Book of Enoch is now usually designated 1 Enoch, to distinguish it from the later Apocalypse, The Secrets of Enoch , known as 2 Enoch.\n\nThe former is also called the Ethiopic Enoch, the latter the Slavonic Enoch, after the languages of the earliest versions extant of each respectively.\n\nNo manuscript of the original language of either is known to be in existence.\n\nAccording to Canon Charles, the various elements of which our book in its present form is made up belong to different dates.\n\nThe following table will show the dates of the different parts of the book.\n\nCanon Charles believes that these are approximately p.\n\nxiv correct, without committing himself to the certainty of this in each case: CHAPTERS xii.-xxxvi.\n\nxclii.\n\nxci.\n\n12-17 \"The Apocalypse of Weeks.\" The oldest pre-Maccabæan portions.\n\nvi.-xi.\n\nliv.\n\n7-lv.\n\n2 lx.\n\nlxv.-lxix.\n\n25 cvi., cvii.\n\nFragments of \"The Book of Noah.\" Pre-Maccabæan at the latest.\n\nlxxxiii.-xc.\n\n\"The Dream-Visions,\" 165-161 B.C.\n\nlxxii.-lxxxii.\n\n\"The Book of the Heavenly Luminaries.\" Before 110 B.C.\n\nxxxvii.-lxxi.\n\nxci.\n\n1-11, 18, 19-civ.\n\n\"The Parables,\" or \"Similitudes.\" circa 105-64 B.C.\n\ni.-v.\n\nThe latest portion, but pre-Christian.\n\n[paragraph continues] Chapter cv, which consists of only two verses, cannot be dated; while cviii.\n\nis in the nature of an appendix, probably added subsequently, to the whole work.\n\nWhile these dates may be regarded as approximately correct, it should be pointed out that differences of opinion exist among scholars on the subject.\n\nSchürer holds, for example, that, with the exception of chapters xxxvii.-lxxi.\n\n(the \"Parables,\" or \"Similitudes\"), the entire book belongs to the period 130-100 B.C.; the \"Parables\" he assigns to a time not earlier than Herod the Great.\n\nBeer thinks that the \"Dream-Visions\" (chapters lxxxiii.-xc.) belong to the time of John Hyrcanus (135-105 B.C.), and he includes under the pre-Maccabæan portions only xci.\n\n12-17, xcii.\n\nxciii.\n\n1-14; and holds that the rest of the book was written before 64 B.C.\n\nDalman maintains that it cannot be proved that the important section xxxvii.-lxxi.\n\n(the \"Similitudes\") is \"the product of the pre-Christian period,\" though he fully p.\n\nxv recognizes its Jewish character.\n\nBurkitt regards the writer as \"almost contemporary\" with the philosopher Posidonius (135-51 B.C.).\n\nThere is thus some diversity of opinion as to the date of the book among leading authorities.\n\nThat it is, as a whole, pre-Christian, may be regarded as definitely established."

