[content]
body = "CHAPTER XXX. 1 .And beyond these, I went afar to the east, and I saw another place, a valley (full) of water. 2. And ⌈ therein there was ⌉ a tree, the colour (?) of fragrant trees such as the mastic. 3. And on the sides of those valleys I saw fragrant cinnamon. And beyond these I proceeded to the east."

