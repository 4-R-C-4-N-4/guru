[content]
body = "And all desirable trees shall be planted on it, and they shall plant vines on it: and the vine which they plant thereon shall yield wine in abundance, and as for all the seed which is sown thereon each measure (of it) shall bear a thousand, and each measure of olives shall yield ten presses of oil.\n\n20.\n\nAnd cleanse thou the earth from all oppression, and from all unrighteousness, and from all sin, and from all godlessness: and all the uncleanness that is wrought upon the earth destroy from off the earth.\n\n21.\n\n⌈ And all the children of men shall become righteous ⌉ , and all nations shall p.\n\n39 offer adoration and shall praise Me, and all shall worship Me.\n\nAnd the earth shall be cleansed from all defilement, and from all sin, and from all punishment, and from all torment, and I will never again send (them) upon it from generation to generation and for ever."

