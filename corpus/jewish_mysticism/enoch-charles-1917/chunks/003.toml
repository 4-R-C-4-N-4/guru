body = "p.\n\nvii INTRODUCTION THE APOCALYPTIC LITERATURE As the Book of Enoch is, in some respects, the most notable extant apocalyptic work outside the canonical Scriptures, it will not be inappropriate to offer a few remarks here on the Apocalyptic Literature generally.\n\nIn writing about the books which belong to this literature, Prof.\n\nBurkitt says very pointedly that \"they are the most characteristic survival of what I will venture to call, with all its narrowness and its incoherence, the heroic age of Jewish history, the age when the nation attempted to realize in action the part of the peculiar people of God.\n\nIt ended in catastrophe, but the nation left two successors, the Christian Church and the Rabbinical Schools, each of which carried on some of the old national aims.\n\nAnd of the two it was the Christian Church that was most faithful to the ideas enshrined in the Apocalypses, and it did consider itself, not without some reason, the fulfilment of those ideas.\n\nWhat is wanted, therefore, in studying the Apocalypses is, above all, sympathy with the ideas that underlie them, and especially with the belief in the New Age.\n\nAnd those who believe that in Christianity a new Era really did dawn for us ought, I think, to have that sympathy.\n\n.\n\n.\n\n.\n\nWe study the Apocalypses to learn how our spiritual ancestors hoped again that God would make all right in the end; and that we, their children, are here to-day studying them is an indication p.\n\nviii that their hope was not wholly unfounded.\" 1 Hope is, indeed, the main underlying motive-power which prompted the writers of the Apocalypses.\n\nAnd this hope is the more intensive and ardent in that it shines forth from a background which is dark with despair; for the Apocalyptists despaired of the world in which they lived, a world in which the godly were of no account, while the wicked seemed too often triumphant and prosperous.\n\nWith evil everywhere around, the Apocalyptists saw no hope for the world as it was; for such a world there was no remedy, only destruction; if the good were ever to triumph it must be in a new world.\n\nDespairing, therefore, of the world around them, the Apocalyptists centred their hope upon a world to come, where the righteous would come to their own and evil would find no place.\n\nIt is this thought which underlies the opening words of the Book of Enoch: \"The words of the blessing of Enoch, wherewith he blessed the elect and righteous, who will be living in the day of tribulation, when all the wicked and godless are to be removed.\" Nowhere in this book is the essence of this hope more beautifully expressed than in a short metrical piece in the first chapter: \"But with the righteous He will make peace, And will protect the elect, And mercy shall be upon them.\n\n\"And they shall all belong to God, And they shall all be prospered, And they shall all be blessed.\n\n\"And He will help them all, And light shall appear unto them, And He will make peace with them\" (1 Enoch i.\n\n8).\n\nIn all the books belonging to this literature which have come down to us this hope is expressed more or p.\n\nix less vividly; nor is the dark background wanting.\n\nwith prophecies of coming wrath.\n\nIt will, therefore, be realized that the Apocalyptic Literature is almost wholly concerned with the future; it is true that again and again the Apocalyptist glances at the contemporary history of the world around him, to which many a cryptic reference is made--a fact which necessitates some knowledge of the history of this period ( circa 200 B.C.-A.D."

