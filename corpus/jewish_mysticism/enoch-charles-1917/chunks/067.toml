[content]
body = "p. 66 XLVIII. The Fount of Righteousness; the Son of Man--the Stay of the Righteous: Judgement of the Kings and the Mighty . CHAPTER XLVIII. 1. And in that place I saw the fountain of righteousness Which was inexhaustible: And around it were many fountains of wisdom; And all the thirsty drank of them, And were filled with wisdom, And their dwellings were with the righteous and holy and elect. 2. And at that hour that Son of Man was named In the presence of the Lord of Spirits, And his name before the Head of Days. 3. Yea, before the sun and the signs were created, Before the stars of the heaven were made, His name was named before the Lord of Spirits. 4. He shall be a staff to the righteous whereon to stay themselves and not fall, And he shall be the light of the Gentiles, And the hope of those who are troubled of heart. 5. All who dwell on earth shall fall down and worship before him, And will praise and bless and celebrate with song the Lord of Spirits. 6. And for this reason hath he been chosen and hidden before Him, Before the creation of the world and for evermore. 7. And the wisdom of the Lord of Spirits hath revealed him to the holy and righteous; For he hath preserved the lot of the righteous, Because they have hated and despised this world of unrighteousness, And have hated all its works and ways in the name of the Lord of Spirits: p. 67 For in his name they are saved, And according to his good pleasure hath it been in regard to their life. 8. In these days downcast in countenance shall the kings of the earth have become, And the strong who possess the land because of the works of their hands; For on the day of their anguish and affliction they shall not (be able to) save themselves. 9. And I will give them over into the hands of Mine elect: As straw in the fire so shall they burn before the face of the holy: As lead in the water shall they sink before the face of the righteous, And no trace of them shall any more be found. 10. And on the day of their affliction there shall be rest on the earth, And before them they shall fall and not rise again: And there shall be no one to take them with his hands and raise them: For they have denied the Lord of Spirits and His Anointed. The name of the Lord of Spirits be blessed."

