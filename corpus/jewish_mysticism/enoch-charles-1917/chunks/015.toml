body = "42-49 occurs in a Greek Vatican MS.\n\n(No.\n\n1809); there are also a few quotations in early Greek ecclesiastical writings; and i.\n\n9, v.\n\n4.\n\nxxvii.\n\n2 are quoted in the Epistle of St.\n\nJude 14, 15.\n\nxix:1 Op.\n\ncit.\n\n, p.\n\n27.\n\nxix:2 It is a great pity that one system of chapter-enumeration runs through the whole volume; if each separate book began with chap.\n\ni.\n\nit would be much better.\n\nFor obvious reasons this cannot be done here; see Editors' General Preface.\n\nxxiii:1 See also lxxxii.\n\n4-6.\n\nit.\n\nxxiii:2 Charles, The Book of Enoch , p.\n\n147 (1912).\n\nxxiv:1 Op.\n\ncit.\n\np.\n\n150.\n\nxxiv:2 for the points of difference between the Pharisees and Sadducees see the present writer's The Books of the Apocrypha, their Origin, Teaching, and Contents , chap.\n\nvii.\n\n(1914).\n\nxxvi:1 Op.\n\ncit.\n\n, p.\n\n218."

