[content]
body = "LXX. The Final Translation of Enoch . CHAPTER LXX. 1. And it came to pass after this that his name during his lifetime was raised aloft to that Son of Man and to the Lord of Spirits from amongst those who dwell on the earth. 2. And he was raised aloft on the chariots of the spirit and his name vanished among them. 3. And from that day I was no longer numbered amongst them: and he set me between the two winds, between the North and the West, where the angels took the cords to measure for me the place for the elect and righteous. 4. And there p. 93 I saw the first fathers and the righteous who from the beginning dwell in that place."

