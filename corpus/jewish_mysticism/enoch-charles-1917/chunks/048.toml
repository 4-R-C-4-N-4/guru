[content]
body = "CHAPTER XXIX. 1. And thence I went to another place in the desert, and approached to the east of this mountain range. 2. And ⌈⌈ there ⌉⌉ I saw aromatic trees exhaling the fragrance of frankincense and myrrh, and the trees also were similar to the almond tree."

