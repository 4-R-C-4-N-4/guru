body = "XXII.\n\nSheol, or the Underworld .\n\nCHAPTER XXII.\n\n1.\n\nAnd thence I went to another place, and he showed me in the west ⌈ another ⌉ great and high mountain [ and ] of hard rock.\n\nE 2 And there was in it †four† hollow places, deep and wide and very smooth.\n\n†How† smooth are the hollow places and deep and dark to look at.\n\nG g 2.\n\nAnd there were †four† hollow places in it, deep and very smooth: †three† of them were dark and one bright; and there was a fountain of water in its midst.\n\nAnd I said: '†How† smooth are these hollow places, and deep and dark to view.' 3.\n\nThen Raphael answered, one of the holy angels who was with me, and said unto me: 'These hollow places have been created for this very purpose, that the spirits of the souls of the dead should assemble therein, yea that all the souls of the children of men should assemble here.\n\nAnd these places have p.\n\n48 been made to receive them till the day of their judgement and till their appointed period ⌈ till the period appointed ⌉ , till the great judgement (comes) upon them.' E 5.\n\nI saw the spirits of the children of men who were dead, and their voice went forth to heaven and made suit.\n\n6.\n\nThen I asked Raphael the angel who was with me, and I said unto him: 'This spirit--whose is it whose voice goeth forth and maketh suit?' G g 5.\n\nI saw (the spirit of) a dead man making suit, and his voice went forth to heaven and made suit.\n\n6.\n\nAnd I asked Raphael the angel who was with me, and I said unto him: 'This spirit which maketh suit, whose is it, whose voice goeth forth and maketh suit to heaven?' 7.\n\nAnd he answered me saying: 'This is the spirit which went forth from Abel, whom his brother Cain slew, and he makes his suit against him till his seed is destroyed from the face of the earth, and his seed is annihilated from amongst the seed of men.' E 8.\n\nThen I asked regarding it, and regarding all the hollow places : 'Why as one separated from the other?' 9.\n\nAnd he answered me and said unto me: 'These three have been made that the spirits of the dead might be separated.\n\nAnd such a division has been made 〈 for 〉 the spirits of the righteous, in which there as the bright spring of water .\n\n10.\n\nAnd such has G g 8.\n\nThen I asked regarding all the hollow places : 'Why is one separated from the other?' 9.\n\nAnd he answered me saying: 'These three have been made that the spirits of the dead might be separated.\n\nAnd this division has been made for the spirits of the righteous, in which there is the bright spring of water.\n\n10.\n\nAnd this has been made for sinners p.\n\n49 E been made for sinners when they die and are buried in the earth and judgement has not been executed on them in their lifetime.\n\n11.\n\nHere their spirits shall be set apart in this great pain till the great day of judgement and punishment and torment of those who †curse† for ever, and retribution for their spirits.\n\nThere He shall bind them for ever.\n\n12.\n\nAnd such a division has been made for the spirits of those who make their suit, who make disclosures concerning their destruction, when they were slain in the days of the sinners.\n\n13.\n\nSuch has been made for the spirits of men who were not righteous but sinners, who were complete in transgression, and of the transgressors."

