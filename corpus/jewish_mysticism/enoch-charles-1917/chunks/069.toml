[content]
body = "L. The Glorification and Victory of the Righteous: the Repentance of the Gentiles . CHAPTER L. 1. And in those days a change shall take place for the holy and elect, And the light of days shall abide upon them, And glory and honour shall turn to the holy, 2. On the day of affliction on which evil shall have been treasured up against the sinners. And the righteous shall be victorious in the name of the Lord of Spirits: And He will cause the others to witness (this) That they may repent And forgo the works of their hands. 3. They shall have no honour through the name of the Lord of Spirits, Yet through His name shall they be saved, And the Lord of Spirits will have compassion on them, For His compassion is great. 4. And He is righteous also in His judgement, And in the presence of His glory unrighteousness also shall not maintain itself: At His judgement the unrepentant shall perish before Him. 5. And from henceforth I will have no mercy on them, saith the Lord of Spirits."

