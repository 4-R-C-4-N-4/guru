[content]
body = "p. 69 LI. The Resurrection of the Dead, and the Separation by the Judge of the Righteous and the Wicked . CHAPTER LI. 1. And in those days shall the earth also give back that which has been entrusted to it, And Sheol also shall give back that which it has received, And hell shall give back that which it owes. 5 a . For in those days the Elect One shall arise, 2. And he shall choose the righteous and holy from among them: For the day has drawn nigh that they should be saved. 3. And the Elect One shall in those days sit on My throne, And his mouth shall pour forth all the secrets of wisdom and counsel: For the Lord of Spirits hath given (them) to him and hath glorified him. 4. And in those days shall the mountains leap like rams, And the hills also shall skip like lambs satisfied with milk, And the faces of ⌈ all ⌉ the angels in heaven shall be lighted up with joy. 5 b . And the earth shall rejoice, c . And the righteous shall dwell upon it, d . And the elect shall walk thereon."

