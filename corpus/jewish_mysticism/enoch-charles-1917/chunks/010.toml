[content]
body = "Of special interest here is the mention of the Garden of Righteousness, and the Tree of Wisdom (xxviii.-xxxvi.).\n\nMuch that is written in these chapters may appear p.\n\nxxi pointless and uninspiring; but we must bear in mind the purpose that lies behind it all.\n\nThe fallen angels were believed to have brought sin on to the earth; all the wickedness of the world the Apocalyptist traces back to them.\n\nThis cause of sin must be wholly destroyed before righteousness can come truly to its own.\n\nTherefore the Apocalyptist has a practical aim in view when describing in much detail the final place of punishment of the fallen angels; for here, too, are to come all those who by sin are the offspring of this race.\n\nNo less does he delight in telling of the abode of joy prepared for the righteous.\n\nThat all these descriptions were constructed out of the imagination of the Apocalyptist, based largely, no doubt, upon popular tradition, did not detract from their practical value for the people of his day.\n\nHe was a preacher of righteousness who looked forward in absolute conviction to the final overthrow of sin; and all his visions have as their motive-power the yearning for and belief in the triumph of righteousness over sin.\n\nOne of a like mind wrote later on, in a kind of preface to his book, these significant words, which sum up the essence of the teaching of this book: And destroy all the spirits of the reprobate, and the children of the Watchers.\n\nbecause they have wronged mankind.\n\nDestroy all wrong from the face of the earth, and let every evil work come to an end: and let the plant of righteousness and truth appear: and it shall prove a blessing: the works of righteousness and truth shall be planted in truth and joy for evermore.\n\nii.\n\nThe Parables (chapters xxxvii.-lxxi.).\n\nThere are three Parables.\n\nor Similitudes, and they all have as their underlying thought the destruction of evil and the triumph of righteousness, as in the preceding book.\n\nBut here some new and important elements are introduced which give special value to this book.\n\nThe first parable (xxxviii.-xliv.) is a prophecy of coming judgement upon the wicked, and especially the kings and mighty ones on the earth.\n\nOn the p.\n\nxxii other hand, the Apocalyptist sees in his vision the abode and resting-places of the righteous who are continually praising the \"Lord of Spirits \"; this is the usual title given -to God in this book.\n\nHere occurs the first mention of the \"Elect One\" (cp.\n\nLuke xxiii.\n\n35).\n\nIn the presence of the Lord of Spirits are also the four Archangels and innumerable companies of other angels.\n\nHere he learns many secrets of the heavens; a fragment on Wisdom (xlii.), which recalls some passages in Ecclus.\n\nxxiv., comes in the middle of the secrets, and is clearly out of place.\n\nThe second parable (xlv.-lvii.) continues the same theme and further develops it.\n\nOf special importance is the sitting of the Elect One on the throne of glory as Judge (xlv.\n\n3), and the mention of His title, \"Son of Man\" (xlvi.\n\n2).\n\nThe thought of the vindication of the righteous is marred by their joy at vengeance upon the wicked.\n\nA particularly striking passage is chapter xlviii.\n\n1-7, which speaks of the inexhaustible fountain of righteousness reserved for the holy and elect in the presence of the Son of Man and of the Lord of Spirits."

