[content]
body = "CHAPTER XVI. 1. From the days of the slaughter and destruction and death ⌈ of the giants ⌉ , from the souls of whose flesh the spirits, having gone forth, shall destroy without incurring judgement--thus shall they destroy until the day of the consummation, the great ⌈ judgement ⌉ in which the age shall be consummated, over the Watchers and the godless, yea, shall be wholly consummated.\" 2. And now as to the Watchers who have sent thee to intercede for them, who had been ⌈⌈ aforetime ⌉⌉ in heaven, (say to p. 44 them): \"You have been in heaven, but ⌈ all ⌉ the mysteries had not yet been revealed to you, and you knew worthless ones, and these in the hardness of your hearts you have made known to the women, and through these mysteries women and men work much evil on earth.\" 4. Say to them therefore: \"You have no peace.\"'"

