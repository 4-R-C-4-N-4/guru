[content]
body = "they shall be companions: but their spirits shall not be slain in the day of judgement nor shall they be raised from thence.\n\n14.\n\nThen I blessed the Lord of glory and said: 'Blessed be my Lord, the Lord of righteousness, who ruleth for ever.' G g when they die and are buried in the earth and judgement has not been executed upon them in their lifetime.\n\n11.\n\nHere their spirits shall be set apart in this great pain, till the great day of judgement, scourgings, and torments of the accursed for ever, so that (there maybe) retribution for their spirits.\n\nThere He shall bind them for ever.\n\n12.\n\nAnd this division has been made for the spirits of those who make their suit, who make disclosures concerning their destruction, when they were slain in the days of the sinners.\n\n13.\n\nAnd this has been made for the spirits of men who shall not be righteous but sinners, who are godless, and of the lawless they shall be companions: but their spirits shall not be punished in the day of judgement nor shall they be raised from thence.\n\n14.\n\nThen I blessed the Lord of Glory and said: 'Blessed art Thou, Lord of righteousness, who rulest over the world.'"

