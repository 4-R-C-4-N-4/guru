[content]
body = "CHAPTER II. 1. Observe ye everything that takes place in the heaven, how they do not change their orbits, ⌈ and ⌉ the luminaries which are in the heaven, how they all rise and set in order each in its season, and transgress not against their appointed order. 2. Behold ye the earth, and give heed to the things which take place upon it from first to last, ⌈ how steadfast they are ⌉ , how ⌈ none of the things upon earth ⌉ change, ⌈ but ⌉ all the works of God appear ⌈ to you ⌉ . 3. Behold the summer and the winter, ⌈⌈ how the whole earth is filled with water, and clouds and dew and rain lie upon it ⌉⌉ ."

