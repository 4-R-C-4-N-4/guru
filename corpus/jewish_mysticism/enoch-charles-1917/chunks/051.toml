[content]
body = "CHAPTER XXXII. E 1. And after these fragrant odours, as I looked towards the north over the mountains I saw seven mountains full of choice nard and fragrant trees and cinnamon and pepper. G g 1. To the north-east I beheld seven mountains full of choice nard and mastic and cinnamon and pepper. 2. And thence I went over the summits of ⌈ all ⌉ these mountains, far towards the east ⌈ of the earth ⌉ , and passed above the Erythraean sea and went far from it, and passed over ⌈⌈ the angel ⌉⌉ Zotîêl. p. 54 E 3. And I came to the Garden of Righteousness, and saw beyond those trees many large trees growing there and of goodly fragrance, large, very beautiful and glorious, and the tree of wisdom whereof they eat and know great wisdom. G g 3. And I came to the Garden of Righteousness, and from afar off trees more numerous than these trees and great--†two† trees there, very great, beautiful, and glorious, and magnificent, and the tree of knowledge, whose holy fruit they eat and know great wisdom. 4. ⌈ That tree is in height like the fir, and its leaves are ⌉ like (those of) the Carob tree: and its fruit is like the clusters of the vine, very beautiful: and the fragrance of the tree penetrates afar. 5. Then I said: ' ⌈ How ⌉ beautiful is the tree, and how attractive is its look!' 6. Then Raphael the holy angel, who was with me, answered me ⌈⌈ and said ⌉⌉ : 'This is the tree of wisdom, of which thy father old (in years) and thy aged mother, who were before thee, have eaten, and they learnt wisdom and their eyes were opened, and they knew that they were naked and they were driven out of the garden.'"

