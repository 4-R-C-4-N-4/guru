[content]
body = "CHAPTER VII. 1. And all the others together with them took unto themselves wives, and each chose for himself one, and they began to go in unto them and to defile themselves with them, and they taught them charms and enchantments, and the cutting of roots, and made them acquainted with plants. 2. And they became pregnant, and they bare great giants, whose height was three thousand ells: 3. Who consumed all the acquisitions of men. And when men could no longer sustain them, 4. the giants turned against them and devoured mankind. 5. And they began to sin against birds, and beasts, and reptiles, and fish, and to devour one another's flesh, and drink the blood. 6. Then the earth laid accusation against the lawless ones."

