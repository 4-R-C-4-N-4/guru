[content]
body = "XX. Name and Functions of the Seven Archangels . CHAPTER XX. 1. And these are the names of the holy angels who watch. 2. Uriel, one of the holy angels, who is over the world and over Tartarus. 3. Raphael, one of the holy angels, who is over the spirits of men. 4. Raguel, one of the holy angels who †takes vengeance on† the world of the luminaries. 5. Michael, one of the holy angels, to wit, he that is set over the best part of mankind ⌈⌈ and ⌉⌉ over chaos. 6. Saraqâêl, one of the holy angels, who is set over the spirits, who sin in the spirit. 7. Gabriel, one of the holy angels, who is over Paradise and the serpents and the Cherubim. 8. Remiel, one of the holy angels, whom God set over those who rise."

