[content]
body = "XXVIII-XXXIII. Further Journey to the East . CHAPTER XXVIII 1. And thence I went ⌈⌈ towards the east ⌉⌉ , into the midst ⌈⌈ of the mountain range of the desert ⌉⌉ , p. 53 and I saw a wilderness and it was solitary, full of trees and plant s. 2. ⌈⌈ And ⌉⌉ water gushed forth from above. 3. Rushing like a copious watercourse [ which flowed ] towards the north-west it caused clouds and dew to ascend on every side."

