body = "Another book of great value and interest--also already quoted--is Burkitt's Jewish and Christian Apocalypses .\n\nIn dealing with the subject of 1 Enoch and the Gospels, this writer points out that the former \"contains a serious attempt to account for the presence of Evil in human history, and this attempt claims our attention, because it is in essentials the view presupposed in the Gospels, especially in the Synoptic Gospels.\n\np.\n\nxxviii [paragraph continues] It is when you study Matthew, Mark, and Luke against the background of the Books of Enoch that you see them in their true perspective.\n\nIn saying this I have no intention of detracting from the importance of what the, Gospels report to us.\n\nOn the contrary, it puts familiar words into their proper setting.\n\nIndeed, it seems to me that some of the best-known Sayings of Jesus only appear in their true light if regarded as Midrash upon words and concepts that were familiar to those who heard the Prophet of Galilee, though now they have been forgotten by Jew and Christian alike\" (p.\n\n21).\n\nHe then gives an illustration of this from Matt.\n\nxii.\n\n43-45, Luke xi.\n\n24--26.\n\nOf still greater interest are his remarks upon the relationship between 1 Enoch lxii.\n\nand Matt.\n\nxxv, 31-46; he believes that \"the Similitudes of Enoch are presupposed in the scene from Matthew.\" The whole of the discussion which follows should be read.\n\nThe special points of interest that should be studied in seeking to realize the importance of these books of Enoch for the study of Christian origins are the problems of evil, including, of course, the subjects of dæmonology, and future judgement; the Messiah and the Messianic Kingdom--the title \"Son of Man\" is of special importance--and the Resurrection.\n\nThere are, of course, other subjects which will suggest themselves in studying the book.\n\nFootnotes viii:1 Jewish and Christian Apocalypses , pp.\n\n15, 16 (1913).\n\nxi:1 G.\n\nH.\n\nBox, The Ezra Apocalypse , pp.\n\n35, 36 (1912).\n\nxiii:1 The general Pharisaic point of view regarding this may be gathered from Matt.\n\niii.\n\n7-10.\n\nxv:1 Burkitt rightly insists that we should speak of the collection as the books.\n\nnot the book, of Enoch.\n\nxv:2 Burkitt, op.\n\ncit., 28-30.\n\nxvi:1 i.e.\n\nthe \" Pious ones.\" or \" Saints.\" xvi:2 Die Saddurder (1912).\n\nxvi:3 i.e., according to him, i.-xxxvi., lxxii.-lxxxii., lxxxiii.-xc., xci.\n\n12-17, xciii.\n\nxvi:4 See Gen.\n\nv.\n\n21-23.\n\nxvi:5 Op.\n\ncit.\n\n, p.\n\n18.\n\nxvi:6 Gen.\n\nv.\n\n24.\n\nxvii:1 i.e.\n\n\"The Book of the Heavenly Luminaries.\" as Charles calls it.\n\nxvii:2 i.e.\n\n\"the righteous\"; a play on the word Zaddûkîm , the \"sons of Zadok,\" i.e.\n\nthe Sadducees.\n\nxvii:3 Leszynsky, op cit.\n\n, pp.\n\n253 ff.\n\nxviii:1 Chaps.\n\ni.-xxxii.\n\n6.\n\nand xix.\n\n3-xxi.\n\n9 in a duplicate form were discovered at Akhmîm in 1886-1887; vi.-x.\n\n14.\n\nxv.\n\n8-xvi.\n\nx, and viii.\n\n4-ix.\n\n4 in a duplicate form, have been preserved in Syncellus; lxxxix."

