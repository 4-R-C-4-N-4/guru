body = "The author's reckoning of the year at 364 days may be partly due to his opposition to heathen systems, and partly to the fact that 364 is divisible by seven, and amounts to fifty-two weeks exactly.\" 1 In any case, he is opposed to the lunar year, the Pharisaic way of reckoning time; and this is an important point in favour of Sadducæan authorship.\n\nIt will be noted that this book was written in post-Maccabæan times; it was after the Maccabæan struggle that the Sadducees and Pharisees appeared as parties definitely opposed to one another.\n\n2 iv.\n\nThe Dream-Visions (chapters lxxxiii.-xc.).\n\nThis book consists of two dream-visions; the first deals with the judgement brought upon the world by the deluge on account of sin; the origin of sin is again traced to the angels who fell.\n\nIt concludes with a hymn of praise to God in which a prayer is offered that all flesh may not be destroyed (lxxxiii.-lxxxiv.).\n\nThe second dream-vision is much longer; it gives in brief outline the history of the world to the founding of the Messianic Kingdom.\n\nFirst, the patriarchs, symbolized by bulls, etc.\n\n(lxxxv.); then the fallen angels, also described in symbolic language, and their punishment (lxxxvi.-lxxxviii.).\n\nThe history then proceeds to deal more specifically with Israel from the time of Noah to the Maccabæan revolt (lxxxix.-xc.\n\n19).\n\np.\n\nxxv [paragraph continues] Throughout the dream-vision symbolic language is used; the faithful in Israel are spoken of as the sheep, while the Gentiles are symbolized by wild beasts and birds of prey.\n\nThe dream-vision concludes with some familiar eschatological notes: the judgement and condemnation of the wicked; the establishment of the New Jerusalem; the conversion of the Gentiles, who become subject to Israel; the gathering-in of the dispersed Israelites; the resurrection of the righteous dead and the setting-up of the Messianic Kingdom on the appearance of the Messiah (xc.\n\n20-38).\n\nv.\n\nThe Concluding Section of the Book (xcii.-cv.; xci.\n\nx-10, 18, 19 also belong here) is a complete, though short, work; but there are some obvious interpolations, and it is quite possible that some parts of the text are dislocated.\n\nThis makes the understanding of the book difficult; but if we follow Charles's guidance here the difficulties will disappear.\n\nHe says that this concluding piece has in some degree suffered at the hands the final editor of the book, both in the way of direct interpolation and of severe dislocations of the text.\n\nThe interpolations are: xci.\n\n11, xciii.\n\n11-14, xciv.\n\n7 d , xcvi.\n\n2.\n\nThe dislocations of the text are a more important feature of the book.\n\nThey are confined (with the exception of xciii.\n\n13-14, and of cvi.\n\n17 a which should be read immediately after cvi.\n\n14) to xci.-xciii.\n\nAll critics are agreed as to the chief of these.\n\nxci.\n\n12-17 should undoubtedly be read directly after xciii.\n\n.\n\n.\n\n.\n\nTaken together xciii.\n\n1-10, xci.\n\n12-17 form an independent whole--the Apocalypse of Weeks--which has been incorporated in xci.-civ.\n\n.\n\n.\n\n.\n\nThe remaining dislocations need only to be pointed out in order to be acknowledged.\n\nOn other grounds we find that xci.-civ.\n\nis a book of different authorship from that of the rest of the sections.\n\nNow, this being so, this section obviously begins with xcii.: 'Written by Enoch the Scribe.' etc.\n\nOn xcii.\n\nfollows xci."

