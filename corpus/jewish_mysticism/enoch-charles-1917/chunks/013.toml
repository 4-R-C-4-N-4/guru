body = "1-10, 18, 19 as a natural sequel, where p.\n\nxxvi [paragraph continues] Enoch summons his children to receive his parting words.\n\nThen comes the Apocalypse of weeks, xciii.\n\n1-10, xci.\n\n12-17.\n\nThe original order of the text, therefore, was: xcii.\n\nxci.\n\n1-10, 18, 19, xciii.\n\n1-10, xci.\n\n12-17.\n\nxciv.\n\nThese dislocations were the work of the editor, who put the different books of Enoch together, and added lxxx.\n\nand lxxxi.\" 1 This book is concerned with the question of the final reward of the righteous and the final punishment of the wicked.\n\n.\n\nBut a new teaching of great importance is put forth here.\n\nHitherto it had been taught that although much incongruity and apparent injustice were to be found on this earth owing to the suffering of the righteous and the prosperity of the wicked,.\n\nnevertheless all things would be righted in the world to come, where the wicked would receive their deserts, and the righteous would come to their own.\n\nIn this book it is taught that retribution will overtake the wicked, and the righteous will have peace and prosperity, even on this earth, with the setting-up of the Messianic Kingdom; and that at the last there will come, with the final judgement, the destruction of the former heaven and earth, and the creation of a new heaven.\n\nThen will follow the resurrection of the spirits of the righteous dead who will live for ever in peace and joy, while the wicked will perish everlastingly.\n\nThe important point, which is a development, is the idea of the punishment of the wicked taking place on this earth, the very scene of their unrighteous triumphs.\n\nvi.\n\nThe Noah Fragments (vi.-xi, lvii.\n\n7-lv.\n\n2, ix.\n\nlxv.-lxix.\n\n25, cvi., cvii.).\n\nThese fragments are not of much importance; the main topics touched upon are the fall of the angels and sin among men in consequence; judgement on mankind, i.e.\n\nthe Deluge, and the preservation of Noah.\n\nThe first five chapters are generally field to be as late as any part of the whole collection; they deal with the punishment hereafter of the wicked and p.\n\nxxvii the blessedness of the righteous.\n\nChapter cviii., which reads like a final word to the whole collection, touches upon the same theme.\n\nTHE IMPORTANCE OF THE BOOK FOR THE STUDY OF CHRISTIAN ORIGINS This is a subject which cannot be thoroughly appreciated without studying the book in detail, especially from its doctrinal standpoint, and seeing in how many aspects it represents the doctrine and the popular conceptions of the Jews during the two last pre-Christian centuries.\n\nTo do this here would involve a far too extended investigation; it must suffice to indicate a few of the many points which should be studied; from these it will be seen how important the book is for the study of Christian origins.\n\nCharles says that \"the influence of 1 Enoch on the New Testament has been greater than that of all the other apocryphal and pseudepigraphical books put together\"; and he gives a formidable list of passages in the New Testament which \"either in phraseology or idea directly depend on, or are illustrative of, passages in 1 Enoch,\" as well as a further list showing that various doctrines in 1 Enoch had \"an undoubted share in moulding the corresponding New Testament doctrines.\" These passages should be studied--and they will be found to be a most interesting study--in Charles's work already referred to several times, pp.\n\nxcv.-ciii.; and with these should be read the section on the Theology of the Book of Enoch, pp.\n\nciii.-cx."

