[content]
body = "THE CONCLUDING SECTION OF THE BOOK. p. 129 (XCII-CV.) XCII. XCI. 1-10. 18-19 Enoch's Book of Admonition for his Children . CHAPTER XCII. 1. The book written by Enoch-- [ Enoch indeed wrote this complete doctrine of wisdom, (which is) praised of all men and a judge of all the earth ] for all my children who shall dwell on the earth. And for the future generations who shall observe uprightness and peace. 2. Let not your spirit be troubled on account of the times; For the Holy and Great One has appointed days for all things. 3. And the righteous one shall arise from sleep, [ Shall arise ] and walk in the paths of righteousness, And all his path and conversation shall be in eternal goodness and grace. 4. He will be gracious to the righteous and give him eternal uprightness, And He will give him power so that he shall be (endowed) with goodness and righteousness. And he shall walk in eternal light. 5. And sin shall perish in darkness for ever, And shall no more be seen from that day for evermore."

