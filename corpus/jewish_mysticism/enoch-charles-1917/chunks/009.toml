body = "xix as Burkitt says, \"most of the most convincing proofs that the Greek text of Enoch is a translation from a Semitic language fit equally well with a Hebrew or an Aramaic original\"; his opinion is that Aramaic was the original language, \"but that a few passages do seem to suggest a Hebrew origin, yet not decisively.\" 1 GENERAL CONTENTS The reader who comes to peruse the Book of Enoch for the first time will find much that appears to him strange and unattractive; he must not, however, be repelled by this; for in due time he will come to other arts of the book which he will soon see to be of real value from many points of view.\n\nBut even regarding the less attractive parts, he will find that when these are carefully studied they contain more that is of interest than appears upon the surface.\n\nUnfortunately, the opening portion (i.-xxxvi.), which is naturally read first, contains a good deal of the least important parts of the whole book; some passages are even repellent.\n\nIt is well to remember the point, already referred to, that there are at least four quite independent books included in the \"Book of Enoch,\" exclusive of certain \"Noah\" fragments and other pieces (see below); the student is, therefore, advised to treat these as separate works, and to read them as such.\n\nThere is no reason to begin with the book which happens to come first, especially as the first thirty-six chapters do not all belong together.\n\n2 But, in any case, it will be found most useful to have some general idea of the contents of each of the different books before beginning to read them.\n\nFor this purpose a brief résumé of each is given here.\n\np.\n\nxx i.\n\nThe Book of Enoch (chapters xii.-xxxvi.).\n\nThe book begins With a Dream-Vision of Enoch.\n\nIn this dream Enoch is asked to intercede for the watchers of heaven, i.e.\n\nthe angels, who had left their heavenly home to commit iniquity with the daughters of men.\n\nHe writes out the petition (cp.\n\nthe title \"Enoch the Scribe\") the fallen angels make, and then retires to await the answer, which comes to him in a series of visions.\n\nThese visions are not quite easy to follow; they are evidently incomplete and somewhat confused; in all probability the text has suffered in transmission.\n\nAt any rate, the petition is refused; Enoch declares to the fallen angels the doom which, as he has been taught in the visions, is to be their lot; the final words of the message which he is bidden to give them are: \"You have no peace\" (xii.-xvi.).\n\nThere follow then accounts of the different journeys which Enoch makes, being conducted by angels of light, through certain parts of the earth, and through Sheol.\n\nAfter the account of the first journey (xvii.-xix.) a short enumeration is made of the archangels, seven in number, and their functions (xx.).\n\nIn the second journey is described the place of final punishment of the fallen angels: \"This place is the prison of the angels and here they will imprisoned for ever.\" From thence Enoch is taken to Sheol; then to the west, where he sees the luminaries of heaven.\n\nAfter that the angels show him \"seven magnificent mountains,\" upon one of which is the throne of God; he sees also the Tree of Life, which is to be given to the holy and.\n\nrighteous after the great judgement.\n\nFrom thence he comes back to the centre of the earth and sees the \"blessed place,\" Jerusalem, and the \"accursed valley\" (xxi.-xxvii.).\n\nThe book concludes with what appear to be fragments of other journeys, to the east, to the north, and to the south."

