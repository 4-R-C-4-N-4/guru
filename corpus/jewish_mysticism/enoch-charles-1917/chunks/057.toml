[content]
body = "XXXVII-XLIV. The First Parable . XXXVIII. The Coming Judgement of the Wicked . CHAPTER XXXVIII 1. The First Parable. When the congregation of the righteous shall appear, And sinners shall be judged for their sins, And shall be driven from the face of the earth: 2. And when the Righteous One shall appear before the eyes of the righteous, Whose elect works hang upon the Lord of Spirits, And light shall appear to the righteous and the elect who dwell on the earth, p. 57 Where then will be the dwelling of the sinners, And where the resting-place of those who have denied the Lord of Spirits? It had been good for them if they had not been born. 3. When the secrets of the righteous shall be revealed and the sinners judged, And the godless driven from the presence of the righteous and elect, 4. From that time those that possess the earth shall no longer be powerful and exalted: And they shall not be able to behold the face of the holy, For the Lord of Spirits has caused His light to appear On the face of the holy, righteous, and elect. 5. Then shall the kings and the mighty perish And be given into the hands of the righteous and holy. 6. And thenceforward none shall seek for themselves mercy from the Lord of Spirits For their life is at an end."

