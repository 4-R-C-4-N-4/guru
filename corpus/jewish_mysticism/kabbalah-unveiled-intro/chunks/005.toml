[content]
body = "The seventh space here means Malkuth, the kingdom, or the queen, which together with the six of Microprosopus, makes up the seven lower Sephiroth.\n\n(See Introduction, § 77, further, for the idea of the balance of mercy and judgment.)] 23.\n\nThe thirteenth (that is, \"of the waters,\" HMIM, Hamim , which is the thirteenth word) raiseth up these (that is, as well the sanctuary which is above as that which is below) through mercy (since the water symbolizeth that measure of mercy through which judgment and punishments are mitigated), and they are renewed as before (for the six words follow afresh, as in the beginning the six members are enumerated).\n\nFor all those six continue and stand fast (they are the members of the Microprosopus, and are not as his bride, and from them is the restitution), since it is written BRA, Bera , \"created\" (which hath a sense of permanence), and then it is written HIThH, Hayitha , \"it was\" (which also is a p.\n\n50 phrase of permanence and not of interpolation), for it is very truth (plainly, therefore, the kingdom perished not, although it might be formless and void, but it retaineth hitherto the essence).\n\n[Mercy and judgment are opposites, and from the side of judgment comes the execution of judgment, which is destruction.] 24.\n\nAnd at the end of the Formless and the Void and the Darkness (that is, at the end of the exile this saying shall have place: Isa.\n\nii.\n\n11).\n\nAnd the Tetragrammaton alone shall be exalted in that day (that is, in the time of Messiah).\n\n[The Tetragrammaton (see Introduction, § 67) comprehends the whole ten Sephiroth, and consequently expresses their three trinities of balanced force also; consequently, when the Tetragrammaton appears, the formless and the void and the darkness disappear, and form, fulness, and light replace them.] 25.\n\nBut there are excavations of excavations.\n\n(The excavation is the receptacle, like that which is hollowed out, or carved out, like a cave, or any other receptacle.\n\nTherefore all receptacles are inferior with respect to the superiors, among which the \"shells\" hold the last place, which here are described, which are) under the form of a vast serpent extending this way and that.\n\n(Concerning this serpent the author of the \"Royal Valley\" speaks thus in his \"Treatise of the Shells.\" The fragments of the receptacles, which have fallen into the world of Creation, of Formation, and of Action, therein exist from the Outer; and judgments are more consonant to these, which are called profane, and have their habitation in the middle space between the Holy and the Unclean.\n\nAnd from the head is formed that great dragon which is in the sea, and is the sea-serpent, which is, however, not so harmful as the earthly one.\n\nAnd this dragon hath been castrated since his crest (or membrum genitale ), together with his mate, have been repressed, and thence have been formed four hundred desirable worlds.\n\nAnd this dragon hath in his head a p.\n\n51 nostril (after the manner of whales) in order that he may receive influence, and in himself he containeth all other dragons, concerning which it is said: \"Thou hast broken the heads of the dragons upon the waters\" (Ps.\n\nlxxiv.\n\n13)."

