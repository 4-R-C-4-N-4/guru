[content]
body = "\"And the Elohim said, let there be light, and there was light.\" (The sense may be sought from that Psalm xxxiii.\n\n9) where it a written, \"Since He Himself spake, and it was done.\" (First, therefore, is commemorated) the Path HVA, Hoa , (that is, the mother of understanding, who is called ALHIM, Elohim , near the beginning of the verse.\n\n\"And the Elohim said.\" She also is called HVA, Hoa , in the words of Psalm xxxiii.\n\n9, on account of her truly secret nature) is alone (as well with Moses as with David).\n\nThe word VIHI, Vayehi , \"and it was done,\" is also alone.\n\n(As if the six members were considered separately, seeing that V, Vau , occupieth the first place in the word VIHI, Vayehi .\n\n[This statement, that the supernal mother symbolized by the word Hoa, He, seems at first sight at variance with the statement in another place, that Hoa represents Macroprosopus.\n\nBut the letter H in the Tetragrammaton symbolizes the supernal mother, and this is also the initial letter of Hoa.\n\nAnd again by Gematria (see Introduction) Hoa, HVA = 5 + 6 + 1 = 12, and the digits of 12 1 + 2 = 3.\n\nAnd 3 symbolizes Binah because she is the third Sephira.\n\n\"Seeing that V, Vau , occupies the first place in the word VIHI,\" because V stands for the number 6.\n\nSee Table of the Alphabet, &c., in Introduction.] 32.\n\nThen are the letters inverted, and become one.\n\n(If, namely, in the word VIHI, Vayehi , the letters I, Yod , and H, He , be placed in front so that it may read IHVI, Yahevi , it maketh one Tetragrammaton, which exhausteth the whole Divinity.\n\nBut since these belong to the mother, from whom arise the judgments, hence this tetragrammaton is here written in retrograde order, which mode of writing is referred by qabalists to the judgments, on account of the nature of averse things; whence this p.\n\n55 ought to be written in this way: IHVI, Yahevi , IHV, Yeho , IH, Yah , I, Yod .\n\nBut since in the path of understanding those judgments themselves do not exist, but only their roots, while in itself this path is only pure mercy; hence the retrograde order is inverted, in order that it may be posited entire in this manner as at first): I, Yod , IH, Yah , IHV, Yeho , IHVI, Yahevi .\n\n(But it is not written in the usual manner, IHVH, Yod , He , Vau , He ; because the word is derived from VIHI, Vayehi , whose metathesis is here discussed.\n\nAnd nevertheless the letter) which is last (namely, I, Yod , which is put in the place of the last H, He , in the ordinary form of the Tetragrammaton, denoteth), the Schechinah (or the queenly presence) which is below (that is, a path of the kingdom, namely, MLKVTh, Malkuth , the tenth and last Sephira); like as (in the other instance) the letter H, He , is found to be the Schechinah.\n\n[The reader will be utterly unable to follow the reasoning in this section."

