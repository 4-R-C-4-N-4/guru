[content]
body = "[The \"path of beauty,\" or Tiphereth, the sixth Sephira, is sometimes represented by V, Vau , and therefore sometimes stands for Microprosopus by itself; it is really the central Sephira of the group of six Sephiroth which compose him.\n\nThe numerical value of Vau is 6.] 36.\n\n(Now the author of the \"Siphra Dtzenioutha\" hasteneth to the latter explanation of these letters, I, Yod , and V, Vau ; and concerning V, Vau , he saith): Six members are produced from the branch of the root of his body.\n\n(The body is Microprosopus; the root of the body is the mother, who is symbolized by the letter H, He ; the branch of the root is the letter V, Vau , enclosed and hidden within the letter H, He ; and from that very branch were produced the six members--that is, the entire letter V, Vau , now having obtained the head.) [The mother here mentioned is of course the third Sephira, Binah.\n\nThe six members of Microprosopus forming the entire letter Vau in an allusion to the numerical value of that letter being 6.] 37.\n\n\"The tongue speaketh great things\" (see Dan, vi.\n\n8.\n\nAnd by the tongue is understood the foundation--namely, the letter I, Yod , joined with his bride; the speech is the marital influx flowing forth from the bride; for the queen is called the word; but the great things are the inferiors of all grades produced.) p.\n\n59 [The inferiors of all \"grades\" or \"paths\" are the Sephiroth in the inferior worlds.] 38.\n\nThis tongue is hidden between I, Yod , and H, He .\n\n(For father and mother are perpetually conjoined in ISVD, Yesod , the foundation, but concealed under the mystery of Daath or of knowledge.) [The conjunction of the letters V and H at the end of the Tetragrammaton IHVH is similar to that of I and H at the beginning.] 39.\n\nBecause it is written (Isa.\n\nxliv.\n\n5): \"That man shall say, I am of the Tetragrammaton.\" (The word ANI, Ani , I, when the discourse is concerning judgments, pertaineth to the queen.\n\nBut whensoever mercy is introduced it referreth to the understanding, like as in this place.\n\nIn order that the sense may be: The supernal path, which is called I, or the understanding in act of conjunction with the father, is for the purpose of the formation of the Tetragrammaton, and this is one conjunction between the father and the mother for the constitution of the six members.) And that shall be called by the name Jacob, IOQB, Yaqob .\n\n(To call by name is to preserve; and another conjunction of father and mother is introduced for the purpose of preserving the Microprosopus, which is called Jacob.) And that man shall write with his hand, \"I am the Lord's\" (To write belongeth to the written law, or the beautiful path, and the same also signifieth to flow in.\n\n\"With his hand,\" BIDV, Byodo , is by metathesis BIVD, Byod , by I, Yod --that is, through the foundation; in order that the sense may be, it may be formed from his influx, so that the Tetragrammaton may be written with I, Yod , as we have above said.) And by the name of Israel shall he call himself.\n\nHe shall call himself thus in truth."

