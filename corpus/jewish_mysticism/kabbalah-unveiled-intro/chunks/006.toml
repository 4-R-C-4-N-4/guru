[content]
body = "And here the idea or universal form of all the shells is understood, which encompasseth the seven inferior emanations of the queen after the manner of a serpent, as well from the right as from the left and from every side.) [The excavation or receptacle of a Sephira is that quality whereby it receives the supernal influence from that which immediately precedes it; hence each Sephira has a double quality of receiving and of transmitting, which passes through the four worlds in each which the Sephiroth exist, though in gradually decreasing light.\n\n(See Table subjoined.) The \"shells,\" Qlipoth , are the demons, in whom again is a form of the Sephiroth, distorted and averse.\n\nThis great dragon which is here described is evidently identical with the leviathan of Job.\n\nHe is the executor of judgment, the centripetal force, the old serpent ever seeking to penetrate into Paradise; finally, in a more exoteric sense he is Satan and the devil, the accusing one.\n\nIn the Sepher Yetzirah, a most important qabalistical book, he is called Theli , ThLI, the dragon.\n\nNow, by Gematria.\n\nThLI = 400 + 30 + 10 = 440; and if we \"repress his crest\"-- i.e.\n\n, take away the first letter, which is Th, Tau ,--400, there will remain LI = 40 = M, Mem , the water.\n\nThe \"400 desirable worlds\" are the numerical value of Th, and signify the power of the Tetragrammaton on the material plane (See note to section 21, foregoing).\n\nThere is much alchemical symbolism contained in the \"Siphra Dtzenioutha.\" The \"Seven Inferior Emanations\" of the queen, are the seven lower Sephiroth --viz., Chesed, Geburah, Tiphereth, Netzach, Hod.\n\nYesod, and Malkuth; or Microprosopus and his bride, the king and queen.\n\nShells,\" Qliphoth , are the evil spirits.] 26.\n\nHis tail is in his head (that is, he holdeth his tail in his mouth, in order that he may form a circle, since he is said to encompass holiness).\n\nHe transferreth his head to behind the shoulders (that is, he raiseth his head at the back of the bride of Microprosopus, where is the place of most severe judgments), and he is despised (since in him is the extremity of judgments and severities, whence wrath is the attribute of his forms).\n\nHe watcheth (that p.\n\n52 is, he accurately searcheth out and seeketh in what place he may gain an entry into holiness.\n\nAnd he is concealed (as if laying traps; since he insinuateth himself into the inferiors, by whose sins he hath access to the holy grades, where the carrying out of judgments is committed to him.) He is manifested in one of the thousand shorter days.\n\n(Numbers are called days, and numbers of the inferior world short days; among which tens are attributed to the factive, on account of their decimal numeration; hundreds to the formative, since they are numbers of the light of their author, and draw their existence from the tens; but thousands to the creative, for the same reason.\n\nBut that dragon hath about this his.\n\nmost powerful location, whence, if a defect occurreth only in one numeration of that system through the fault of the inferiors, he is immediately manifest, and thus commenceth his accusations before the throne of glory.) [Here is the origin of the well-known symbol of a serpent holding his tail in his mouth, like a circle--the serpent of Saturn.\n\nThe reason that he raiseth his head behind the shoulders of the bride (Malkuth) is because he is."

