body = "Furthermore, the circumstance of certain words being written defectively or redundantly is commented on in the Introduction, § 15.\n\nThe term \"square,\" or \"square name.\" is sometimes applied to the Tetragrammaton.\n\nThe p.\n\n63 phrase \"member of the treaty\" probably alludes to the symbolism of circumcision.\n\nIn this sense, I, Yod , in the path of Yesod, the ninth Sephira, has a symbolical phallic signification.) 43.\n\nI, Yod , therefore irradiateth two.\n\n(That is, the letter I, Yod , in this square of the Tetragrammaton hath a double sense of influx, forasmuch as in the first instance it signifieth the father who illuminateth the mother; and forasmuch as in the second instance it signifieth the Microprosopus, or rather his treaty, which illuminateth the kingdom.) And (again in another manner) it shineth (that is, and also hath a third signification, whilst in the complete name it constituteth the last letter), and passeth on into the woman.\n\nThat is, and denoteth the bride of Microprosopus, as is shown above, because it is put in the place of the last H, He , of the Tetragrammaton IHVH; like as also it hath the same power of signification in the connection of the names of existence and domination in this manner, IAChD, VNHI.) 44.\n\n(Now he turneth to the last part of this square, which is I, Yod , alone, and saith), I, Yod , remaineth one and alone (in order that it may show that all flow out from the one single letter I, Yod , which is in the form of a point, yet partaking of three parts, concerning which see elsewhere; yet in this place denoting only the woman, or the kingdom, wherein are contained all the supernals.).\n\n[Yod at the end of the Tetragrammaton denotes the synthesis, the circular movement by which the end returns to the beginning.\n\nIn the secret qabalistical alphabet known as the \"celestial alphabet,\" Yod is represented by three circles at the angles of an equilateral triangle with the apex uppermost.\n\nMalkuth, the tenth Sephira, of course receives the influx of all the other Sephiroth (see Table showing the reception and transmission of the Sephiroth in the four worlds.] 45.\n\nAnd then (if now the Tetragrammaton be not considered in the manner just described, but in this manner of instituting the square, IHVI, IHV, IH, I, p.\n\n64 then Yod also is in a certain sense solitary, but in a plainly contrary sense.\n\nFor it ascendeth in its path upwards and upwards.\n\n(That is, it doth not so much receive the higher sense, in order that it may denote the beautiful path or the foundation; but the highest , that is, the father or the wisdom.) The woman is again hidden.\n\n(That is, in this instance, the former meaning by which it denoted the bride of Microprosopus, namely, the last letter of the above-written form of the Tetragrammaton, ceaseth in itself.) (This is in the converse manner.\n\nThe letter I no longer signifies the bride when it ceases to be the final letter of a Tetragrammaton.] 46."

