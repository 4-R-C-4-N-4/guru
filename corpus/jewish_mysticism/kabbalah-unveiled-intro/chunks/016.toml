body = "66 the sins of the inferiors, no influx can come into the universe in a proper manner.) [Following out the symbol of the equilibrium in the Sephiroth, the sin of the inferior paths would be the introduction of unbalanced force.\n\nThe reader will at first find a little difficulty in following the reasoning of these last few sections, but after reading them over once or twice, their meaning will seem clearer to him.] Next: Chapter II."

