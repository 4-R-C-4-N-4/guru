body = "The Mantuan Codex terms this the sixth conformation of Macroprosopus, and refers it, as in the case of the fourth conformation, to the primal idea of the Sephira Netzach, victory.] 15.\n\nTherein are His two nostrils like mighty galleries, whence His spirit rushes forth over all.\n\n(The Mantuan Codex adds that this is the seventh conformation, which refers to MLKVTh, Malkuth , or \"the kingdom,\" the tenth emanation or Sephira of the Deity.) [The creative spirit, or the \"breath of life.\"] 16.\n\n(When, therefore, the Divine law beginneth) BRAShITh BRA ALHIM ATh HShMIM VATh HARTz, Berashith Bera Elohim Ath Hashamaim Vaath Haaretz : \"In the beginning the Elohim created the substance of the heavens and the substance of the earth.\" (The sense is: Six members were created, which are the six numerations of Microprosopus--viz., benignity as His right arm; severity as His left arm; beauty as His body; victory as His right leg; glory as His left leg; and the foundation as reproductive.) For instead of BRAShITh, Berashith, \"in the beginning,\" it may be read, BRAShITh, Bera p.\n\n47 Shith , \"He created the six.\" Upon these depend all things which are below (principally the Queen, who is the lowest path, or the bride of Microprosopus, and all the three inferior worlds.) (The view which the Siphra Dtzenioutha here follows out is that the beginning of Genesis describes not only the creation of the world, but the development of God , for it considers the universe as the outward and material expression of the power of the thought Divine.\n\nMicroprosopus is as it were the reflection of Macroprosopus, for as Macroprosopus has six principal titles.\n\nso is Microprosopus composed of six of the Sephiroth.\n\n(See Introduction, §§ 42.\n\n47 and 77.) ShITh, Shith, is the Chaldee form of the Hebrew ShSh, Shash , six.\n\nThe queen is Malkuth, the tenth Sephira.\n\nThe three inferior worlds are Briah, Yetzirah, and Asiah.\n\nSee Introduction, §§ 57-60.] 11.\n\nAnd the dignity of dignity hangeth from the seven conformations of the cranium.\n\n(This is the beard of the venerable and Ancient One, which is divided into thirteen portions).\n\n(The Ancient One is the first Sephira, Macroprosopus.\n\nas I have before remarked.\n\nThe beard, in continuation of the symbolic representation of the head.\n\nis divided Into thirteen portions, which answer by Gematria (see Introduction, § 11) to the idea of unity.\n\nFor AChD, Achad , unity, yields the number 13 by numerical value.] 18.\n\nAnd the second earth came not into the computation.\n\n(That is, the kingdom of the restored world, which elsewhere is called the Bride of Microprosopus, came not into the computation when the six members were said to be created.\n\nOr otherwise, when in Genesis iv.\n\n2 it is said in another way, \"And the earth,\" that earth is not to be understood of which mention hath been first made; since by the first is to be understood the kingdom of the restored world, and by the second the kingdom of the destroyed world), and this is elsewhere said.\n\n[The kingdom (of the destroyed world is that of unbalanced force, (See Introduction.\n\n§§ 41 and 56, and also note Section 3.\n\nforegoing.) This refers to a period prior to the development of the Sephiroth."

