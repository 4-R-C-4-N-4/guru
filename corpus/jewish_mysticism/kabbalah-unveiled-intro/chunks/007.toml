body = "so to speak, not only the executor of judgment, but also the destroyer; destruction as opposed to creation, death as opposed to life.\n\nFor the whole Sephiroth are represented as being the balance of mercy and justice, and the tenth Sephira is especially of the nature of justice, as also is Geburah.\n\nthe fifth.\n\nHe is concealed, because he is not called into action till justice requires him.\n\nThe term \"decimal numeration\" of course refers to the ten Sephiroth.\n\nThe presence of the serpent when revealed, is an accusation, because it shows that the balance is destroyed; just as in a watch, if one of the wheels be injured, irregularity is at once manifested.\n\nNow, life, when it consists of birth into another form, necessarily implies death in the previous form.\n\nThe throne of glory is the Briatic world.] 27.\n\nThere are swellings in his scales (that is, like as in a crocodile; because great in him is the heaping together of judgments).\n\nHis crest keepeth its own place (that is, there is in him no further power of hastening to things beyond in the Outer).\n\np.\n\n53 [There is in the destroyer no \"hastening to the outer,\" because he is centripetal and not centrifugal .] 28.\n\nBut his head is broken by the waters of the great sea.\n\n(The great sea is wisdom, the fountain of mercy and loving-kindness; which, if it sendeth down its influence, judgments are pacified, and the hurtful power of the shells is restricted); like as it is written, Ps.\n\nlxxiv.\n\n13: \"Thou hast broken the heads of the dragons by the waters.\" [\"The waters of the great sea,\" are the influence of the supernal mother, Binah, of whom Malkuth is the reflection.\n\nBut Binah receives the influence of Chokmah.\n\nSee Introduction.] 29.\n\nThey were two (male and female, whence the text of the Psalm speaketh of the dragons in the plural number; but when the plural number is given in its least form, two only are understood).\n\nThey are reduced into one (for the female leviathan hath been slain, lest they should seek to multiply judgments).\n\nWhence the word ThNINM, Thenanim (in the before-mentioned passage of the Psalm), is written in a defective form (purposely to denote that restriction).\n\n[I may refer the reader to the Talmud for further information regarding Jewish ideas of the Leviathan.\n\nThenanim is written in a defective form, because the letter I of the plural is omitted.\n\nWritten fully, it should be ThNINIM, instead of ThNINM.] 30.\n\n(But it is said) heads (in the plural number, for the purpose of denoting a vast multitude, as well of species as of individuals in that genus); like as it is written, Ezek.\n\ni.\n\n22: \"And a likeness as a firmament above the heads of the living creature.\" (Where also the word living creature, ChIH, Chiah , is put in the singular as a genus of angels; and heads in the plural for the purpose of denoting species and innumerable individuals.) [\"Thou hast broken the heads of the dragons (Thenanim) by the waters.\" It must be remembered that this dragon is said by the author of the \"Royal Valley\" to be the king of all the \"shells\" p.\n\n54 or demons.\n\nNow, the demons are divided into ten classes.\n\ncorresponding to the ten Sephiroth, but in an averse form, and are called in the book, \"Beth Elohim,\" the \"impure Sephiroth.\" The heads of the leviathan (cf.\n\nthe Lernæan Hydra which Hercules slew) are probably these.\n\nCompare the description of the beast in Revelation.] 31."

