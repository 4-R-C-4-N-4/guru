body = "Sacred Texts Judaism Index Previous Next p.\n\n43 SPRA DTzNIOVThA (SIPHRA DTZENIOUTHA); OR, THE BOOK OF CONCEALED MYSTERY.\n\nCHAPTER I.\n\n1.\n\nTradition .--\"The Book of Concealed Mystery\" is the book of the equilibrium of balance.\n\n[The word \"Dtzenioutha\" is difficult to translate, but I think its meaning is best expressed by the words \"Concealed Mystery.\" I have explained in the Introduction the qabalistical meaning of the words \"equilibrium\" and \"balance,\" § 29.] 2.\n\nTradition .--For before there was equilibrium, countenance beheld not countenance.\n\n[By the two countenances are mean, Macroprosopus and Microprosopus.\n\nSee Introduction, §§ 42, 47, 64, 65, 67.\n\n73, and 77.] 3.\n\nAnd the kings of ancient time were dead, and their crowns were found no more; and the earth was desolate.\n\n[The \"kings of ancient time\" mean the same thing as the \"Edomite Kings;\" that is, they symbolize worlds of \"unbalanced force,\" which, according to the Zohar.\n\npreceded the formation of this universe.\n\nI have explained this also in the Introduction, §§ 41 and 56.\n\nThis and the immediately following sections are supposed to trace the gradual development of the Deity from negative into positive existence; the text is here describing the time when the Deity was just commencing His manifestation from His primal negative form.\n\nTherefore, according p.\n\n44 to the qabalistical ideas, the universe is the garment as it were of the Deity; He not only contains all, but is Himself all.\n\nand exists in all.] 4.\n\nUntil that head (which is incomprehensible) desired by all desires (proceeding from AIN SVP, Ain Soph , the infinite and limitless one), appeared and communicated the vestments of honour.\n\n[This Head, which is here described as proceeding from the infinite and limitless One, the Ain Soph , is the first Sephira, the Crown Kether , otherwise called Arikh Anpin , or Macroprosopus, the Vast Countenance.\n\nFrom this first Sephira the other nine emanations are produced.\n\nI have explained all this in the Introduction, §§ 38-57, in treating of the Sephiroth.] 5.\n\nThis equilibrium hangeth in that region which is negatively existent in the Ancient One.\n\n[By the expression \"This equilibrium hangeth in that region which is negatively existent in the Ancient One,\" is meant that the other nine Sephiroth (which are equilibrated by their formation in trinities) are as yet not developed in the first Sephira.\n\nbut exist within it as the tree exists in the seed from which it springs.\n\nBy \"the Ancient One\", is intended the first Sephira, the Crown Kether, one of whose appellations is Autheqa , the Ancient One.\n\nFrom this Sephira, as I have before remarked.\n\nthe idea of negative existence depends back towards the AIN.] 6.\n\nThus were those powers equiponderated which were not yet in perceptible existence.\n\n[These powers are the other nine Sephiroth, which are, as it were powers of the first Sephira; as soon as they are equated they become positively existent through correlation of force.\n\nThe next two sections explain the manner of their equilibration while yet negative entities, or rather ideas ] 7.\n\nIn His form (in the form of the Ancient One) existeth the equilibrium: it is incomprehensible, it is unseen."

