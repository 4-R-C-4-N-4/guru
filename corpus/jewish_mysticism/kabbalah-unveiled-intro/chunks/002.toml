[content]
body = "[But the first idea of equilibrium is the Ancient One (the first Sephira, or Crown Kether), because it is the first potential limitation of the boundless light which proceeds from the Limitless One.\n\nThat is, the central point of Kether is the equilibrium, because the balance p.\n\n45 does not yet exist, the two opposite poles which form the balance not being yet developed.\n\nWe must not confuse these two terms, equilibrium and balance.\n\nThe balance consists of two scales (opposing forces), the equilibrium is the central point of the beam.] 8.\n\nTherein have they ascended, and therein do they ascend--they who are not, who are, and who shall be.\n\n[Therein (in the equilibrium of Kether) have they ascended (developed when they became positively existent), and therein (in the equilibrium) do they ascend (have their first existence), they (the Sephiroth) who are not (exist negatively).\n\nwho are (then become positive), and who shall.\n\nbe (exist permanently.\n\nbecause they we counterbalanced powers).\n\nThis triple expression \"are not, are, and shall be.\" also refers to the triple trinity of the Sephiroth.] (See Introduction.\n\n§§ 52, 64, 65 And 66.) 9.\n\nThe head which is incomprehensible is secret in secret.\n\n[This head Is Macroprosopus, the Vast Countenance, and is the same as the Ancient One, or Crown Kether.\n\nIt is were, for therein axe hidden the other potentialities.] 10.\n\nBut it hath been formed and prepared in the likeness of a cranium, and is filled with the crystalline dew.\n\n[The crystalline dew is the creative lux or Aur , AVR, proceeding from the Limitless One.\n\nThe Mantuan Codex calls the skull or cranium the first, and the crystalline dew the second conformation of Macroprosopus.] 11.\n\nHis skin is of other, clear and congealed.\n\n12.\n\n(His hair is as) most fine wool, floating through the balanced equilibrium.\n\n[The ether is the clear and insupportable brilliance of his glory.\n\nThe hair is white-- i.e.\n\n; spotless as wool--to denote the utter absence of matter and of shell.\n\nThe Mantuan Codex calls the ether the third conformation, and the hair the fourth, which latter it refers to the Sephira Netzach, victory.] 13.\n\n(His forehead is) the benevolence of those benevolences which are manifested through the prayers of the inferior powers.\n\np.\n\n46 [The supernal benignity which transmits their qualities, powers and offices, to the lower Sephiroth (the inferior powers).\n\nIt must be remembered that each Sephira receives from that which immediately precedes it, and transmits to that which next follows it.\n\nThus, each Sephira is said to be feminine or passive as regards its predecessor, and masculine or active in respect to its successor.\n\n(See Introduction, §§ 43 and 51.) The Mantuan Codex calls this the fifth conformation, and refers it to the idea of the ninth Sephira, Yesod, foundation.] 14.\n\nHis eye is ever open and sleepeth not, for it continually keepeth watch.\n\nAnd the appearance of the lower is according to the aspect of the higher light.\n\n(Were the eye to close (the directing thought Divine to be abstracted from the Sephiroth), the whole universe would give way, for its mainspring would be withdrawn.\n\nBecause the appearance (development) of the lower (nine Sephiroth) is according to (dependent on) the aspect (ruling thought) of the higher light (Kether, the first Sephira)."

