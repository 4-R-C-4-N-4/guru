body = "and must therefore be referable to the Edomite kings.] p.\n\n48 19.\n\nAnd it hath proceeded out of that which hath undergone the curse, as it is written in Genesis v., 29, \"From the earth which the Lord hath cursed.\" (The meaning is: That the kingdom of the restored world was formed from the kingdom of the destroyed world, wherein seven kings had died and their possessions had been broken up.\n\nOr, the explanation of the world, of which mention is made elsewhere, proceedeth from the kingdom of the destroyed world.) [These seven kings are the Edomite kings before mentioned in Section 3.] 20.\n\nIt was formless and void, and darkness upon the face of the deep, and the Spirit of the Elohim vibrating upon the face of the waters.\n\nThirteen (these words, from \"it was formless\" down to \"of the waters,\" are thirteen in the Hebrew text of Genesis) depend from the thirteen (forms) of the dignity of dignity (that is, the beard of the Macroprosopus, or first formed head).\n\n[I have before remarked that the number thirteen expresses unity.\n\nThe author of \"The Book of Concealed Mystery\" here argues that the very number and order of the words in the Hebrew text refer to certain forms of the Deity.\n\nThe terms \"face of the deep\" and \"face of the waters\" bear a striking analogy to Macroprosopus and Microprosopus, the Vast and the Lesser Countenances.\n\nIn this sense the \"face of (from) the deep (abyss)\" is the countenance formed from Ain Soph, the Limitless One; namely.\n\nthe first Sephira the Crown Kether.] 21.\n\nSix thousand years depend from the six first.\n\nThis is what the wise have said, that the world shall last six thousand years, and it is understood from the six numbers of Microprosopus.\n\nBut also the six following words give occasion to this idea: VIAMR ALHIM IHI AVR VIHI AVR, Veyomar Elohim Yehi Aur Vayehi Aur : \"And the Elohim said, Let there be light, and there was light.\" [By an exegetical rule of numbers, not so often employed as the others.\n\nsimple numbers or units signify divine things; numbers of ten, celestial things; numbers of a hundred, terrestrial things; and thousands p.\n\n49 signify the future, what shall be in an after-age.\n\nHence are the \"six thousand years\" deduced from the six first words, which also are said to refer to the six Sephiroth of whom Microprosopus is formed; the idea of six being extended into as many thousands, to symbolise that number on the plane of a future age.] 2:.\n\nThe seventh (the millennium, and the seventh space.\n\nnamely, the Kingdom), above that One which alone is powerful--( i.e.\n\n, when the six degrees of the members denote mercies and judgments, the seventh degree tendeth alone to judgment and rigour).\n\nAnd the whole is desolate (that is, the Kingdom, MLKVTh, Malkuth , in the higher powers, is the antitype of the sanctuary, and like as this is destroyed, so also the Schechinah, or Kingdom, is itself exiled) for twelve hours (for the Hebrews include all this time of their exile in the space of one day).\n\nLike as it is written: \"It was formless and void, &c.\" (for from the word \"it was formless,\" down to \"upon the faces of,\" are twelve words in the Hebrew text of Genesis.) [By the same rule, the millennium is deduced from the seventh word."

