[content]
body = "(Here a reason is adduced from the proposed text itself, showing how the last letter of this form of the Tetragrammaton, namely, I, Yod , may be said to symbolize the bride, since p.\n\n57 [paragraph continues] God himself might behold in that light the path of conjunctive foundation, which the word \"goodness\" pointeth out; but when the foundation is in the act of conjunction--that is, under the idea of communicating goodness--there then is the bride.\n\nBut also that the word \"goodness\" denoteth the foundation is proved from Isa.\n\niii.\n\n10, where it is said, \"Say ye unto the righteous man\" (that is, to the path of foundation, because the first man is said to be the foundation of the world, Prov.\n\nx.\n\n25),,that it shall be well with him.\" Therefore, then do they ascend within the equilibrium.\n\n(That is, these two letters, I, Yod , and H, He , mean one and the same thing.\n\nOr, again: But behold, how in balanced power ascend the letters of Tetragrammaton.\n\nThat is, how those letters agree when in conjunction, which before were standing separated in the word VIHI, Vayehi .) (The \"path of foundation\" is of course the ninth Sephira, Yesod, which is the sixth member of Microprosopus (see section 16, foregoing).\n\nand typifies reproductive power.\n\nMalkuth is the queen.\n\nWe must remember that in the Tetragrammaton, IHVH, I, Yod , is the father (who is not Macroprosopus, though he is implied therein.\n\nas the top point of the Hebrew letter Yod is said to symbolize him); H, He , the supernal mother; V, Vau , the son (Microprosopus); and H, He , final, the bride (the queen).\n\nAnd this is their proper order.\n\nOther variations of the Tetragrammaton, therefore, alter the position of the letters with regard to each other their normal and correct position being IHVH.] 35 (Whilst the spouse, Microprosopus) was at first alone (he was standing by, whilst the letter V, Vau , occupied the first place, then was he separated from his bride).\n\nBut all things returned into the unity.\n\n(That is, not only were father and mother conjoined into one, because the two letters, I, Yod , and H, He , were combined; but also the Microprosopus returned to his bride, whilst V, Vau , was placed next to I, Yod , in the Tetragrammaton, IHVI, Yahevi .\n\nFor) V, Vau , descendeth (when in the word VIHI, Vayehi , \"and it was done,\" it occupieth the first p.\n\n58 place; but in the proposed metathesis it descended into the third place, in order that it might be IHVI, Yahevi ).\n\nAnd they are bound together the one to the other (male and female, V, Vau , and I, Yod , the path of beauty and the queen), namely, I, Yod , and H, He (by which are shown wisdom and knowledge, father and mother), like unto two lovers who embrace each other.\n\n(By two lovers are understood either V, Vau , and I, Yod , only--that is, at the end; or I, Yod , and H, He , together--that is, at the beginning)."

