body = "Reprinted by P.\n\nDavidson in The Mistletoe and Its Philosophy.) Von Helmont is only one of many who have accidentally hit upon the secrets of the early priestcrafts, but none in this age give evidence of an adequate comprehension of the ancient Hermetic secrets.\n\nFrom the description von Helmont gives, it is probable that the herb mentioned by him paralyzed temporarily the cerebrospinal nervous system, the result being that the consciousness was forced to function through the sympathetic nervous system and its brain--the solar plexus.\n\n*** The control of universal energy is virtually impossible, save through one of its vehicles (the mumia).\n\nA good example of this is food.\n\nMan does not secure nourishment from dead animal or plant organisms, but when he incorporates their structures into his own body he first gains control over the mumia, or etheric double, of the animal or plant.\n\nHaving obtained this control, the human organism then diverts the flow of the archæus to its own uses.\n\nParacelsus says: \"That which constitutes life is contained in the Mumia, and by imparting the Mumia we impart life.\" This is the secret of the remedial properties of talismans and amulets, for the mumia of the substances of which they are composed serves as a channel to connect the person wearing them with certain manifestations of the universal vital life force.\n\nAccording to Paracelsus, in the same way that plants purify the atmosphere by accepting into their constitutions the carbon dioxid exhaled by animals and humans, so may plants and animals accept disease elements transferred to them by human beings.\n\nThese lower forms of life, having organisms and needs different from man, are often able to assimilate these substances without ill effect.\n\nAt other times, the plant or animal dies, sacrificed in order that the more intelligent, and consequently more useful, creature may survive.\n\nParacelsus discovered that in either case the patient was gradually relieved of his malady.\n\nWhen the lower life had either completely assimilated the foreign mumia from the patient, or had itself died and disintegrated as the result of its inability to do so, complete recovery resulted.\n\nMany years of investigation were necessary to determine which herb or animal most readily accepted the mumia of each of various diseases.\n\nParacelsus discovered that in many cases plants revealed by their shape the particular organs of the human body which they served most effectively.\n\nThe medical system of Paracelsus was based on the theory that by removing the diseased etheric mumia from the organism of the patient and causing it to be accepted into the nature of some distant and disinterested thing of comparatively little value, it was possible to divert from the patient the flow of the archæus which had been continually revitalizing and nourishing the malady.\n\nIts vehicle of expression being transplanted, the archæus necessarily accompanied its mumia, and the patient recovered.\n\nTHE HERMETIC THEORY CONCERNING THE CAUSATIONS OF DISEASE According to the Hermetic philosophers, there were seven primary causes of disease.\n\nThe first was evil spirits .\n\nThese were regarded as creatures born of degenerate actions, subsisting on the vital energies of those to whom they attached themselves.\n\nThe second cause was a derangement of the spiritual nature and the material nature : these two, failing to coordinate, produced mental and physical subnormality.\n\nThe third was an unhealthy or abnormal mental attitude .\n\nMelancholia, morbid emotions, excess of feeling, such as passions, lusts, greeds, and hates, affected the mumia, from which they reacted into the physical body, where they resulted in ulcers, tumors, cancers, fevers, and tuberculosis.\n\nThe ancients viewed the disease germ as a unit of mumia which had been impregnated with the emanations from evil influences which it had contacted."

