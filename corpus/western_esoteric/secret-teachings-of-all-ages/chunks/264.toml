body = "They have no fixed domicile, but wander about from place to place--elemental nomads, invisible but ever-present powers in the intelligent activity of the universe.\n\nGENERAL OBSERVATIONS Certain of the ancients, differing with Paracelsus, shared the opinion that the elemental kingdoms were capable of waging war upon one another, and they recognized in the battlings of the elements disagreements among these kingdoms of Nature spirits.\n\nWhen lightning struck a rock and splintered it, they believed that the salamanders were attacking the gnomes.\n\nAs they could not attack one another on the plane of their own peculiar etheric essences, owing to the fact that there was no vibratory correspondence between the four ethers of which these kingdoms are composed, they had to attack through a common denominator, namely, the material substance of the physical universe over which they had a certain amount of power.\n\nWars were also fought within the groups themselves; one army of gnomes would attack another army, and civil war would be rife among them.\n\nPhilosophers of long ago solved the problems of Nature's apparent inconsistencies by individualizing and personifying all its forces, crediting them with having temperaments not unlike the human and then expecting them to exhibit typical human inconsistencies.\n\nThe four fixed signs of the zodiac were assigned to the four kingdoms of elementals.\n\nThe gnomes were said to be of the nature of Taurus; the undines, of the nature of Scorpio; the salamanders exemplified the constitution of Leo; while the sylphs manipulated the emanations of Aquarius.\n\nThe Christian Church gathered all the elemental entities together under the title of demon .\n\nThis is a misnomer with far-reaching consequences, for to the average mind the word demon means an evil thing, and the Nature spirits are essentially no more malevolent than are the minerals, plants, and animals.\n\nMany of the early Church Fathers asserted that they had met and debated with the elementals.\n\nAs already stated, the Nature spirits are without hope of immortality, although some philosophers have maintained that in isolated cases immortality was conferred upon them by adepts and initiates who understood certain subtle principles of the invisible world.\n\nAs disintegration takes place in the physical world, so it takes place in the ethereal counterpart of physical substance.\n\nUnder normal conditions at death, a Nature spirit is merely resolved back into the transparent primary essence from which it was originally individualized.\n\nWhatever evolutionary growth is made is recorded solely in the consciousness of that primary essence, or element, and not in the temporarily individualized entity of the elemental.\n\nBeing without man's compound organism and lacking his spiritual and intellectual vehicles, the Nature spirits are subhuman in their rational intelligence, but from their functions--limited to one element--has resulted a specialized type of intelligence far ahead of man in those lines of research peculiar to the element in which they exist.\n\nThe terms incubus and succubus have been applied indiscriminately by the Church Fathers to elementals.\n\nThe incubus and succubus, however, are evil and unnatural creations, whereas elementals is a collective term for all the inhabitants of the four elemental essences.\n\nA SYLPH.\n\nFrom sketch by Howard Wookey.\n\nThe sylphs were changeable entities, passing to and fro with the rapidity of lightning.\n\nThey work through the gases and ethers of the earth and are kindly disposed toward human beings.\n\nThey are nearly always represented as winged, sometimes as tiny cherubs and at other times as delicate fairies.\n\n*** According to Paracelsus, the incubus and succubus (which are male and female respectively) are parasitical creatures subsisting upon the evil thoughts and emotions of the astral body.\n\nThese terms are also applied to the superphysical organisms of sorcerers and black magicians.\n\nWhile these larvæ are in no sense imaginary beings, they are, nevertheless, the offspring of the imagination."

