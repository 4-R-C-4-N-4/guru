body = "Secondly, the degree of 'Theoreticus,' which dealt with superficial applications of the exact sciences, and, lastly, the degree of 'Electus,' which entitled the candidate to pass forward into the light of the fullest illumination which he was capable of absorbing.\n\nThe pupils of the Pythagorean school were divided into 'exoterici,' or pupils in the outer grades, and 'esoterici,' after they had passed the third degree of initiation and were entitled to the secret wisdom.\n\nSilence, secrecy and unconditional obedience were cardinal principles of this great order.\" (See Ancient Freemasonry .) PYTHAGORIC FUNDAMENTALS The study of geometry, music, and astronomy was considered essential to a rational understanding of God, man, or Nature, and no one could accompany Pythagoras as a disciple who was not thoroughly familiar with these sciences.\n\nMany came seeking admission to his school.\n\nEach applicant was tested on these three subjects, and if found ignorant, was summarily dismissed.\n\nPythagoras was not an extremist.\n\nHe taught moderation in all things rather than excess in anything, for he believed that an excess of virtue was in itself a vice.\n\nOne of his favorite statements was: \"We must avoid with our utmost endeavor, and amputate with fire and sword, and by all other means, from the body, sickness; from the soul, ignorance; from the belly, luxury; from a city, sedition; from a family, discord; and from all things, excess.\" Pythagoras also believed that there was no crime equal to that of anarchy.\n\nAll men know what they want , but few know what they need .\n\nPythagoras warned his disciples that when they prayed they should not pray for themselves; that when they asked things of the gods they should not ask things for themselves, because no man knows what is good for him and it is for this reason undesirable to ask for things which, if obtained, would only prove to be injurious.\n\nThe God of Pythagoras was the Monad , or the One that is Everything.\n\nHe described God as the Supreme Mind distributed throughout all parts of the universe--the Cause of all things, the Intelligence of all things, and the Power within all things.\n\nHe further declared the motion of God to be circular, the body of God to be composed of the substance of light, and the nature of God to be composed of the substance of truth.\n\nPythagoras declared that the eating of meat clouded the reasoning faculties.\n\nWhile he did not condemn its use or totally abstain therefrom himself, he declared that judges should refrain from eating meat before a trial, in order that those who appeared before them might receive the most honest and astute decisions.\n\nWhen Pythagoras decided (as he often did) to retire into the temple of God for an extended period of time to meditate and pray, he took with his supply of specially prepared food and drink.\n\nThe food consisted of equal parts of the seeds of poppy and sesame, the skin of the sea onion from which the juice had been thoroughly extracted, the flower of daffodil, the leaves of mallows, and a paste of barley and peas.\n\nThese he compounded together with the addition of wild honey.\n\nFor a beverage he took the seeds of cucumbers, dried raisins (with seeds removed), the flowers of coriander, the seeds of mallows and purslane, scraped cheese, meal, and cream, mixed together and sweetened with wild honey.\n\nPythagoras claimed that this was the diet of Hercules while wandering in the Libyan desert and was according to the formula given to that hero by the goddess Ceres herself.\n\nThe favorite method of healing among the Pythagoreans was by the aid of poultices.\n\nThese people also knew the magic properties of vast numbers of plants."

