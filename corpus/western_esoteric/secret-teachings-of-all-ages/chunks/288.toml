[content]
body = "THE Qabbalists conceive of the Supreme Deity as an Incomprehensible Principle to be discovered only through the process of eliminating, in order, all its cognizable attributes.\n\nThat which remains--when every knowable thing has been removed--is AIN SOPH, the eternal state of Being .\n\nAlthough indefinable, the Absolute permeates all space.\n\nAbstract to the degree of inconceivability, AIN SOPH is the unconditioned state of all things .\n\nSubstances, essences, and intelligences are manifested out of the inscrutability of AIN SOPH, but the Absolute itself is without substance, essence, or intelligence.\n\nAIN SOPH may be likened to a great field of rich earth out of which rises a myriad of plants, each different in color, formation, and fragrance, yet each with its roots in the same dark loam--which, however, is unlike any of the forms nurtured by it.\n\nThe \"plants\" are universes, gods, and man, all nourished by AIN SOPH and all with their source in one definitionless essence; all with their spirits, souls, and bodies fashioned from this essence, and doomed, like the plant, to return to the black ground--AIN SOPH, the only Immortal--whence they came.\n\nAIN SOPH was referred to by the Qabbalists as The Most Ancient of all the Ancients .\n\nIt was always considered as sexless.\n\nIts symbol was a closed eye.\n\nWhile it may be truly said of AIN SOPH that to define It is to defile It, the Rabbis postulated certain theories regarding the manner in which AIN SOPH projected creations out of Itself, and they also assigned to this Absolute Not-Being certain symbols as being descriptive, in part at least, of Its powers.\n\nThe nature of AIN SOPH they symbolize by a circle, itself emblematic of eternity.\n\nThis hypothetical circle encloses a dimensionless area of incomprehensible life, and the circular boundary of this life is abstract and measureless infinity.\n\nAccording to this concept, God is not only a Center but also Area.\n\nCentralization is the first step towards limitation.\n\nTherefore, centers which form in the substances of AIN SOPH are finite because they are predestined to dissolution back into the Cause of themselves, while AIN SOPH Itself is infinite because It is the ultimate condition of all things.\n\nThe circular shape given to AIN SOPH signifies that space is hypothetically enclosed within a great crystal-like globe, outside of which there is nothing, not even a vacuum.\n\nWithin this globe--symbolic of AIN SOPH--creation and dissolution take place.\n\nEvery element and principle that will ever be used in the eternities of Kosmic birth, growth, and decay is within the transparent substances of this intangible sphere.\n\nIt is the Kosmic Egg which is not broken till the great day \"Be With Us,\" which is the end of the Cycle of Necessity, when all things return to their ultimate cause.\n\nIn the process of creation the diffused life of AIN SOPH retires from the circumference to the center of the circle and establishes a point, which is the first manifesting One--the primitive limitation of the all-pervading O.\n\nWhen the Divine Essence thus retires from the circular boundary to the center, It leaves behind the Abyss, or, as the Qabbalists term it, the Great Privation.\n\nThus, in AIN SOPH is established a twofold condition where previously had existed but one.\n\nThe first condition is the central point--the primitive objectified radiance of the eternal, subjectified life.\n\nAbout this radiance is darkness caused by the deprivation of the life which is drawn to the center to create the first point, or universal germ."

