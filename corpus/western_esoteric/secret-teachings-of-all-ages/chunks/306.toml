[content]
body = "(See Transcendental Magic .) Of the Great Word, Albert Pike writes: \"The True Word of a Mason is to be found in the concealed and profound meaning of the Ineffable Name of Deity, communicated by God to Moses; and which meaning was long lost by the very precautions taken to conceal it.\n\nThe true pronunciation of that name was in truth a secret, in which, however, was involved the far more profound secret of its meaning.\n\nIn that meaning is included all the truth that can be known by us, in regard to the nature of God.\" (See Morals and Dogma .)"

