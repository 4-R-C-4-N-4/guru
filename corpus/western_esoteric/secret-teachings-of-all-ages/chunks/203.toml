[content]
body = "Part 1 THE creatures inhabiting the water, air, and earth were held in veneration by all races of antiquity.\n\nRealizing that visible bodies are only symbols of invisible forces, the ancients worshiped the Divine Power through the lower kingdoms of Nature, because those less evolved and more simply constituted creatures responded most readily to the creative impulses of the gods.\n\nThe sages of old studied living things to a point of realization that God is most perfectly understood through a knowledge of His supreme handiwork--animate and inanimate Nature.\n\nEvery existing creature manifests some aspect of the intelligence or power of the Eternal One, who can never be known save through a study and appreciation of His numbered but inconceivable parts.\n\nWhen a creature is chosen, therefore, to symbolize to the concrete human mind some concealed abstract principle it is because its characteristics demonstrate this invisible principle in visible action.\n\nFishes, insects, animals, reptiles, and birds appear in the religious symbolism of nearly all nations, because the forms and habits of these creatures and the media in which they exist closely relate them to the various generative and germinative powers of Nature, which were considered as prima-facie evidence of divine omnipresence.\n\nThe early philosophers and scientists, realizing that all life has its origin in water, chose the fish as the symbol of the life germ.\n\nThe fact that fishes are most prolific makes the simile still more apt.\n\nWhile the early priests may not have possessed the instruments necessary to analyze the spermatozoon, they concluded by deduction that it resembled a fish.\n\nFishes were sacred to the Greeks and Romans, being connected with the worship of Aphrodite (Venus).\n\nAn interesting survival of pagan ritualism is found in the custom of eating fish on Friday.\n\nFreya , in whose honor the day was named, was the Scandinavian Venus, and this day was sacred among many nations to the goddess of beauty and fecundity.\n\nThis analogy further links the fish with the procreative mystery.\n\nFriday is also sacred to the followers of the Prophet Mohammed.\n\nThe word nun means both fish and growth, and as Inman says: \"The Jews were led to victory by the Son of the Fish whose other names were Joshua and Jesus (the Savior).\n\nNun is still the name of a female devotee\" of the Christian faith.\n\nAmong early Christians three fishes were used to symbolize the Trinity, and the fish is also one of the eight sacred symbols of the great Buddha.\n\nIt is also significant that the dolphin should be sacred to both Apollo (the Solar Savior) and Neptune.\n\nIt was believed that this fish carried shipwrecked sailors to heaven on its back.\n\nThe dolphin was accepted by the early Christians as an emblem of Christ, because the pagans had viewed this beautiful creature as a friend and benefactor of man.\n\nThe heir to the throne of France, the Dauphin , may have secured his title from this ancient pagan symbol of the divine preservative power.\n\nThe first advocates of Christianity likened converts to fishes, who at the time of baptism \"returned again into the sea of Christ.\" Primitive peoples believed the sea and land were inhabited by strange creatures, and early books on zoology contain curious illustrations of composite beasts, reptiles, and fishes, which did not exist at the time the medieval authors compiled these voluminous books.\n\nIn the ancient initiatory rituals of the Persian, Greek, and Egyptian Mysteries the priests disguised themselves as composite creatures, thereby symbolizing different aspects of human consciousness.\n\nThey used birds and reptiles as emblems of their various deities, often creating forms of grotesque appearance and assigning to them imaginary traits, habits, and places of domicile, all of which were symbolic of certain spiritual and transcendental truths thus concealed from the profane.\n\nThe phœnix made its nest of incense and flames.\n\nThe unicorn had the body of a horse, the feet of an elephant, and the tail of a wild boar."

