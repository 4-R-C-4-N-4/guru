body = "They had means of intercommunication all over the then known world, and from them, doubtless, sprang the guilds of the Traveling Masons known in the Middle Ages.\" (See The Obelisk and Freemasonry .) The fraternity of the Dionysiac Architects spread throughout all of Asia Minor, even reaching Egypt and India.\n\nThey established themselves in nearly all the countries bordering on the Mediterranean, and with the rise of the Roman Empire found their way into Central Europe and even into England.\n\nThe most stately and enduring buildings in Constantinople, Rhodes, Athens, and Rome were erected by these inspired craftsmen.\n\nOne of the most illustrious of their number was Vitruvius, the great architect, renowned as the author of De Architectura Libri Decem .\n\nIn the various sections of his book Vitruvius gives several hints as to the philosophy underlying the Dionysiac concept of the principle of symmetry applied to the science of architecture, as derived from a consideration of the proportions established by Nature between the parts and members of the human body.\n\nThe following extract from Vitruvius on the subject of symmetry is representative: \"The design of a temple depends on symmetry, the principles of which must be most carefully observed by the architect.\n\nThey are due to proportion, in ἀναλογία.\n\nProportion is a correspondence among the measures of the members of an entire work, and of the whole to a certain part selected as standard.\n\nFrom this result the principles of symmetry.\n\nWithout symmetry and proportion there can be no principles in the design of any temple; that is, if there is no precise relation between its members, as in the case of those of a well shaped man.\n\nFor the human body is so designed by nature that the face, from the chin to the top of the forehead and the lowest roots of the hair, is a tenth part of the whole height; the open hand from the wrist to the tip of the middle finger is just the same; the head from the chin to the crown is an eighth, and with the neck and shoulder from the top of the breast to the lowest roots of the hair is a sixth; from the middle of the breast to the summit of the crown is a fourth.\n\nIf we take the height of the face itself, the distance from the bottom of the chin to the under side of the nostrils [and from that point] to a line between the eyebrows is the same; from there to the lowest roots of the hair is also a third, comprising the forehead.\n\nThe length of the foot is one sixth of the height of the body; of the forearm, one fourth; and the breadth of the breast is also one fourth.\n\nThe other members, too, have their own symmetrical proportions, and it was by employing them that the famous painters and sculptors of antiquity attained to great and endless renown.\" The edifices raised by the Dionysiac Builders were indeed \"sermons in stone.\" Though unable to comprehend fully the cosmic principles thus embodied in these masterpieces of human ingenuity and industry, even the uninitiated were invariably overwhelmed by the sense of majesty and symmetry resulting from the perfect coordination of pillars, spans, arches, and domes.\n\nBy variations in the details of size, material, type, arrangement, ornamentation, and color, these inspired builders believed it possible to provoke in the nature of the onlooker certain distinct mental or emotional reactions.\n\nVitruvius, for example, describes the disposition of bronze vases about a room so as to produce certain definite changes in the tone and quality of the human voice.\n\nIn like manner, each chamber in the Mysteries through which the candidate passed had its own peculiar acoustics."

