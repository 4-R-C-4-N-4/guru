[content]
body = "Francis Udny, a Theosophical writer, is of the belief that the Comte de St.-Germain was not the son of Prince Rákóczy of Transylvania, but because of his age could have been none other than the prince himself, who was known to be of a deep philosophic and mystic nature.\n\nThe same writer believes the Comte de St.-Germain passed through the \"philosophic death\" as Francis Bacon in 1626, as François Rákóczy in 1735, and as Comte de St.-Germain in 1784.\n\nHe also feels that the Comte de St.-Germain was the famous Comte de Gabalis, and as Count Hompesch was the last Grand Master of the Knights of Malta.\n\nIt is well known that many members of the European secret societies have feigned death for various purposes.\n\nMarshal Ney, a member of the Society of Unknown Philosophers, escaped the firing squad and under the name of Peter Stuart Ney lived and taught school for over thirty years in North Carolina.\n\nOn his deathbed, P.\n\nS.\n\nNey told Doctor Locke, the attending physician, that he was Marshal Ney of France.\n\nIn concluding an article on the identity of the inscrutable Comte de St.-Germain, Andrew Lang writes: \"Did Saint-Germain really die in the palace of Prince Charles of Hesse about 1780-85?\n\nDid he, on the other hand, escape from the French prison where Grosley thought he saw him, during the French Revolution?\n\nWas he known to Lord Lytton about 1860?\n\n* * * Is he the mysterious Muscovite adviser of the Dalai Lama?\n\nWho knows?\n\nHe is a will-o'-the-wisp of the memoir-writers of the eighteenth century.\n\n\" (See Historical Mysteries .) EPISODES FROM AMERICAN HISTORY Many times the question has been asked, Was Francis Bacon's vision of the \"New Atlantis\" a prophetic dream of the great civilization which was so soon to rise upon the soil of the New World?\n\nIt cannot be doubted that the secret societies of Europe conspired to establish upon the American continent \"a new nation, conceived in liberty and dedicated to the proposition that all men are created equal.\" Two incidents in the early history of the United States evidence the influence of that silent body which has so long guided the destinies of peoples and religions.\n\nBy them nations are created as vehicles for the promulgation of ideals, and while nations are true to these ideals they survive; when they vary from them they vanish like the Atlantis of old which had ceased to \"know the gods.\" In his admirable little treatise, Our Flag , Robert Allen Campbell revives the details of an obscure, but most important, episode of American history--the designing of the Colonial flag of 1775.\n\nThe account involves a mysterious man concerning whom no information is available other than that he was on familiar terms with both General George Washington and Dr.\n\nBenjamin Franklin.\n\nThe following description of him is taken from Campbell's treatise: \"Little seems to have been known concerning this old gentleman; and in the materials from which this account is compiled his name is not even once mentioned, for he is uniformly spoken of or referred to as 'the Professor.' He was evidently far beyond his threescore and ten years; and he often referred to historical events of more than a century previous just as if he had been a living witness of their occurrence; still he was erect, vigorous and active--hale, hearty, and clear-minded--as strong and energetic every way as in the prime of his life He was tall, of fine figure, perfectly easy, and very dignified in his manners; being at once courteous, gracious and commanding."

