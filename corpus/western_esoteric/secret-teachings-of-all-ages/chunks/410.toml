[content]
body = "At the left stands Morienus, the philosopher, pointing towards the salamander who \"lives and grows in fire.\" Morienus, who was born in the twelfth century, became the disciple of the great Arabian alchemist Adfar, from whom he learned the Hermetic arts.\n\nMorienus prepared the Philosophical Elixir for the Sultan of Egypt, inscribing upon the vase in which he placed the precious substance the words: \"He who possesses all has no need of others.\" He spent many years as a hermit near Jerusalem.\n\nThe lines below the salamander are: \"Let the fire be of a perfect red color; the earth white, the water clear.\n\nThen compound them by philosophical means and calcine them as many times with the water which the body had as to turn it white by its kindness.\n\nHaving done this, you will have the greatest treasure in the world.\" Leaf 14 .\n\nThe three words at the top of the left page are translated: \"The man that digs.\" Above the birds it is declared that none but the cocks of Hermes, the two Mercuries, shall put hand to the plow, and only after irrigation will the earth bring forth her fruits.\n\nThe seated man is Count Bernard of Treviso, who says: \"Work the earth with Mercury.\" (See chapter on Alchemy and Its Exponents .) The three sentences to the Count's left read: \"Go to the fire and with Mercury, thy brother, await me for a month.\n\nCrumble the stone I gave thee and I shall go to the fire.\n\nThy death, my life.\n\nI shall net die but, living, tell of the works of this, my master.\" Bernard of Treviso in his alchemical speculation emphasized the necessity of meditation upon the philosophical writings of the great adepts rather than chemical experimentation.\n\nHe ultimately discovered the \"Stone.\" Leaf 15 .\n\nThe first sentence reads: \"The fruit of plants by virtue of the Sun, our Stone.\" The boy holding the dish is made to say: \"Drink here all ye that are athirst.\n\nCome unto me, run to the waters.\n\nHere drink, without price, and drink your fill.\n\nOpen your eyes and see the wonders of the earth.\n\nThey learn, my thirsty twenty and four.\" Beneath the boy are the words: \"In the beginning God created the Heavens and the Earth, and divided the waters from the waters.\n\nBless the waters which are above the Heavens.\" The circle contains this statement: \"The earth without form and void.\n\nOut of the stars come the rains.\" The lower left panel continues the alchemical process, ending with admonition to renounce the misery of worldly existence.\n\nAbove is a prayer to the Virgin Mary which opens thus: \"Hail Mary, full of grace, the Lord be with thee.\n\nBlessed thou among women.\" Leaf 16 .\n\nThe first sentence reads: \"The dead bodies remain; the spirits are freed by the death in the bodies.\n\nYou will ride with that death with a scythe, and the light of the Sun, the Moon, and the fixed stars.\" Over the scythe is written: \"Subject to the Sun, the Moon and Azoth, complete the Work.\" The four words in the curve of the scythe blade say: \"Man's head, head of raven.\" The three lines to the right are interpreted thus: \"This figure is called Laton, for it looks black in a vessel, and is the beginning of corruption.\" The text below the ladder states: \"This is the ladder of primitive matter which when placed in a vessel turns black, the gradually changes to white by the scale [ladder] of digestion, according to the degree of heat.\" Here a ladder is used to signify the natural steps up which matter must ascend before it can attain to a truly spiritual state.\n\nLeaf 17 ."

