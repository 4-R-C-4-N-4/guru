body = "On this subject Richard Payne Knight writes: \"The emblematical meaning, which certain animals were employed to signify, was only some particular property generalized; and, therefore, might easily be invented or discovered by the natural operation of the mind: but the collections of stars, named after certain animals, have no resemblance whatever to those animals; which are therefore merely signs of convention adopted to distinguish certain portions of the heavens, which were probably consecrated to those particular personified attributes, which they respectively represented.\" ( The Symbolical Language of Ancient Art and Mythology .) Some authorities are of the opinion that the zodiac was originally divided into ten (instead of twelve) houses, or \"solar mansions.\" In early times there were two separate standards--one solar and the other lunar--used for the measurement of the months, years, and seasons.\n\nThe solar year was composed of ten months of thirty-six days each, and five days sacred to the gods.\n\nThe lunar year consisted of thirteen months of twenty-eight days each, with one day left over.\n\nThe solar zodiac at that time consisted often houses of thirty-six degrees each.\n\nThe first six signs of the zodiac of twelve signs were regarded as benevolent, because the sun occupied them while traversing the Northern Hemisphere.\n\nThe 6,000 years during which, according to the Persians, Ahura-Mazda ruled His universe in harmony and peace, were symbolic of these six signs.\n\nThe second six were considered malevolent, because while the sun was traveling the Southern Hemisphere it was winter with the Greeks, Egyptians, and Persians.\n\nTherefore these six months symbolic of the 6,000 years of misery and suffering caused by the evil genius of the Persians, Ahriman, who sought to overthrow the power of Ahura-Mazda.\n\nThose who hold the opinion that before its revision by the Greeks the zodiac consisted of only ten signs adduce evidence to show that Libra (the Scales) was inserted into the zodiac by dividing the constellation of Virgo Scorpio (at that time one sign) into two parts, thus establishing \"the balance\" at the point of equilibrium between the ascending northern and the descending southern signs.\n\n(See The Rosicrucians, Their Rites and Mysteries , by Hargrave Jennings.) On this subject Isaac Myer states: \"We think that the Zodiacal constellations were first ten and represented an immense androgenic man or deity; subsequently this was changed, resulting in Scorpio and Virgo and making eleven; after this from Scorpio, Libra, the Balance, was taken, making the present twelve.\" ( The Qabbalah .) Each year the sun passes entirely around the zodiac and returns to the point from which it started--the vernal equinox--and each year it falls just a little short of making the complete circle of the heavens in the allotted period of time.\n\nAs a result, it crosses the equator just a little behind the spot in the zodiacal sign where it crossed the previous year.\n\nEach sign of the zodiac consists of thirty degrees, and as the sun loses about one degree every seventy two years, it regresses through one entire constellation (or sign) in approximately 2,160 years, and through the entire zodiac in about 25,920 years.\n\n(Authorities disagree concerning these figures.) This retrograde motion is called the precession of the equinoxes .\n\nThis means that in the course of about 25,920 years, which constitute one Great Solar or Platonic Year, each one of the twelve constellations occupies a position at the vernal equinox for nearly 2,160 years, then gives place to the previous sign.\n\nCHART SHOWING THE RELATIONSHIP BETWEEN THE HUMAN BODY AND THE EXTERIOR UNIVERSE.\n\nFrom Kircher's Œdipus Ægyptiacus."

