[content]
body = "The three degrees of the Craft bury the Grand Master (the Great Arcanum) in the actual structure they erect, after first having killed him with the builders' tools, by reducing the dimensionless Spirit of Cosmic Beauty to the limitations of concrete form.\n\nThese abstract ideals of architecture can be resurrected, however, by the Master Mason who, by meditating upon the structure, releases therefrom the divine principles of architectonic philosophy incorporated or buried within it.\n\nThus the physical building is actually the tomb or embodiment of the Creative Ideal of which its material dimensions are but the shadow.\n\nMoreover, the Hiramic legend may be considered to embody the vicissitudes of philosophy itself.\n\nAs institutions for the dissemination of ethical culture, the pagan Mysteries were the architects of civilization.\n\nTheir power and dignity were personified in CHiram Abiff--the Master Builder--but they eventually fell a victim to the onslaughts of that recurrent trio of state, church, and mob.\n\nThey were desecrated by the state, jealous of their wealth and power; by the early church, fearful of their wisdom; and by the rabble or soldiery incited by both state and church.\n\nAs CHiram when raised from his grave whispers the Master Mason's Word which was lost through his untimely death, so according to the tenets of philosophy the reestablishment or resurrection of the ancient Mysteries will result in the rediscovery of that secret teaching without which civilization must continue in a state of spiritual confusion and uncertainty.\n\nWhen the mob governs, man is ruled by ignorance; when the church governs, he is ruled by superstition; and when the state governs, he is ruled by fear.\n\nBefore men can live together in harmony and understanding, ignorance must be transmuted into wisdom, superstition into an illumined faith, and fear into love.\n\nDespite statements to the contrary, Masonry is a religion seeking to unite God and man by elevating its initiates to that level of consciousness whereon they can behold with clarified vision the workings of the Great Architect of the Universe.\n\nFrom age to age the vision of a perfect civilization is preserved as the ideal for mankind.\n\nIn the midst of that civilization shall stand a mighty university wherein both the sacred and secular sciences concerning the mysteries of life will be freely taught to all who will assume the philosophic life.\n\nHere creed and dogma will have no place; the superficial will be removed and only the essential be preserved.\n\nThe world will be ruled by its most illumined minds, and each will occupy the position for which he is most admirably fitted.\n\nThe great university will be divided into grades, admission to which will be through preliminary tests or initiations.\n\nHere mankind will be instructed in the most sacred, the most secret, and the most enduring of all Mysteries-- Symbolism .\n\nHere the initiate will be taught that every visible object, every abstract thought, every emotional reaction is but the symbol of an eternal principle.\n\nHere mankind will learn that CHiram (Truth) lies buried in every atom of Kosmos; that every form is a symbol and every symbol the tomb of an eternal verity.\n\nThrough education--spiritual, mental, moral, and physical--man will learn to release living truths from their lifeless coverings.\n\nThe perfect government of the earth must be patterned eventually after that divine government by which the universe is ordered.\n\nIn that day when perfect order is reestablished, with peace universal and good triumphant, men will no longer seek for happiness, for they shall find it welling up within themselves.\n\nDead hopes, dead aspirations, dead virtues shall rise from their graves, and the Spirit of Beauty and Goodness repeatedly slain by ignorant men shall again be the Master of Work.\n\nThen shall sages sit upon the seats of the mighty and the gods walk with men."

