body = "Fryar, in a footnote to his reprint of the Hieroglyphical Figures by Nicholas Flammel, says: \"One thing which seems to prove the reality of this story beyond dispute, is, that this very book of Abraham the Jew, with the annotations of 'Flammel,' who wrote from the instructions he received from this physician, was actually in the hands of Cardinal Richelieu, as Borel was told by the Count de Cabrines, who saw and examined it.\" *** His search for the Philosopher's Stone and the secret of the transmutation of metals began when he was but fourteen years of age.\n\nHe spent not only a lifetime but also a fortune in his quest.\n\nCount Bernard went from one alchemist and philosopher to another, each of whom unfolded some pet theorem which he eagerly accepted and experimented with but always without the desired result.\n\nHis family believed him to be mad and declared that he was disgracing his house by his experiments, which were rapidly reducing him to a state of penury.\n\nHe traveled in many countries, hoping that in distant places he would find wise men capable of assisting him.\n\nAt last as he was approaching his seventy-sixth year, he was rewarded with success.\n\nThe great secrets of the Elixir of Life, the Philosopher's Stone, and the transmutation of metals were revealed to him.\n\nHe wrote a little book describing the results of his labors, and while he lived only a few years to enjoy the fruitage of his discovery he was thoroughly satisfied that the treasure he had found was worth the lifetime spent in search of it.\n\nAn example of the industry and perseverance displayed by him is to be found in one of the processes which some foolish pretender coaxed him to attempt and which resulted in his spending twenty years calcining egg shells and nearly an equal period distilling alcohol and other substances.\n\nIn the history of alchemical research there never was a more patient and persevering disciple of the Great Arcanum.\n\nBernard declared the process of dissolution, accomplished not with fire but with mercury, to be the supreme secret of alchemy."

