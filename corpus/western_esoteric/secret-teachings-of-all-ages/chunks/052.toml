body = "A cone expresses the sun, a cylinder the earth; the phallus and triangle (a symbol of the matrix) designate generation.\" (From Essay on the Mysteries of Eleusis by M.\n\nOuvaroff.) THE PROCESSIONAL OF THE BACCHIC RITES.\n\nFrom Ovid's Metamorphosis.\n\nIn the initiation, of the Bacchic Mysteries, the rôle of Bacchus is played by the candidate who, set upon by priests in the guise of the Titans, is slain and finally restored to life amidst great rejoicing.\n\nThe Bacchic Mysteries were given every three years, and like the Eleusinian Mysteries, were divided into two degrees.\n\nThe initiates were crowned with myrtle and ivy, plants which were sacred to Bacchus.\n\nIn the Anacalypsis, Godfrey Higgins conclusively establishes Bacchus (Dionysos) as one of the early pagan forms of the Christos myth, \"The birthplace of Bacchus, called Sabazius or Sabaoth, was claimed by several places in Greece; but on Mount Zelmisus, in Thrace, his worship seems to have been chiefly celebrated.\n\nHe was born of a virgin on the 25th of December; he performed great miracles for the good of mankind; particularly one in which he changed water into wine; he rode in a triumphal procession on an ass; he was put to death by the Titans, and rose again from the dead on the 25th of March: he was always called the Saviour.\n\nIn his mysteries, he was shown to the people, as an infant is by the Christians at this day, on Christmas Day morning in Rome.\" While Apollo most generally represents the sun, Bacchus is also a form of solar energy, for his resurrection was accomplished with the assistance of Apollo.\n\nThe resurrection of Bacchus signifies merely the extraction or disentanglement of the various Parts of the Bacchic constitution from the Titanic constitution of the world.\n\nThis is symbolized by the smoke or soot rising from the burned bodies of the Titans.\n\nThe soul is symbolized by smoke because it is extracted by the fire of the Mysteries.\n\nSmoke signifies the ascension of the soul, far evolution is the process of the soul rising, like smoke, from the divinely consumed material mass.\n\nAt me time the Bacchic Rites were of a high order, but later they became much degraded .\n\nThe Bacchanalia, or orgies of Bacchus, are famous in literature.\n\n*** The Eleusinian Mysteries, according to Heckethorn, survived all others and did not cease to exist as an institution until nearly four hundred years after Christ, when they were finally suppressed by Theodosius (styled the Great), who cruelly destroyed all who did not accept the Christian faith.\n\nOf this greatest of all philosophical institutions Cicero said that it taught men not only how to live but also how to die.\n\nTHE ORPHIC MYSTERIES Orpheus, the Thracian bard, the great initiator of the Greeks, ceased to be known as a man and was celebrated as a divinity several centuries before the Christian Era.\n\n\"As to Orpheus himself * * *, \" writes Thomas Taylor, \"scarcely a vestige of his life is to be found amongst the immense ruins of time.\n\nFor who has ever been able to affirm any thing with certainty of his origin, his age, his country, and condition?"

