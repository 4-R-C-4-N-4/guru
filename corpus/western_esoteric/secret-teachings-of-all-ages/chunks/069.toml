body = "In his Ancient Mythology, Bryant writes: \"I have mentioned that Cadmus was the same as the Egyptian Thoth; and it is manifest from his being Hermes, and from the invention of letters being attributed to him.\n\n\" (In the chapter on the theory of Pythagorean Mathematics will be found the table of the original Cadmean letters.) Investigators believe that it was Hermes who was known to the Jews as \"Enoch,\" called by Kenealy the \"Second Messenger of God.\" Hermes was accepted into the mythology of the Greeks, later becoming the Mercury of the Latins.\n\nHe was revered through the form of the planet Mercury because this body is nearest to the sun: Hermes of all creatures was nearest to God, and became known as the Messenger of the Gods.\n\nIn the Egyptian drawings of him, Thoth carries a waxen writing tablet and serves as the recorder during the weighing of the souls of the dead in the judgment Hall of Osiris--a ritual of great significance.\n\nHermes is of first importance to Masonic scholars, because he was the author of the Masonic initiatory rituals, which were borrowed from the Mysteries established by Hermes.\n\nNearly all of the Masonic symbols are Hermetic in character.\n\nPythagoras studied mathematics with the Egyptians and from them gained his knowledge of the symbolic geometric solids.\n\nHermes is also revered for his reformation of the calendar system.\n\nHe increased the year from 360 to 365 days, thus establishing a precedent which still prevails.\n\nThe appellation \"Thrice Greatest\" was given to Hermes because he was considered the greatest of all philosophers, the greatest of all priests, and the greatest of all kings.\n\nIt is worthy of note that the last poem of America's beloved poet, Henry Wadsworth Longfellow, was a lyric ode to Hermes.\n\n(See Chambers' Encyclopædia .) THE MUTILATED HERMETIC FRAGMENTS On the subject of the Hermetic books, James Campbell Brown, in his History of Chemistry , has written: \"Leaving the Chaldean and earliest Egyptian periods, of which we have remains but no record, and from which no names of either chemists or philosophers have come down to us, we now approach the Historic Period, when books were written, not at first upon parchment or paper, but upon papyrus.\n\nA series of early Egyptian books is attributed to Hermes Trismegistus, who may have been a real savant , or may be a personification of a long succession of writers.\n\n* * * He is identified by some with the Greek god Hermes, and the Egyptian Thoth or Tuti, who was the moon-god, and is represented in ancient paintings as ibis-headed with the disc and crescent of the moon.\n\nThe Egyptians regarded him as the god of wisdom, letters, and the recording of time.\n\nIt is in consequence of the great respect entertained for Hermes by the old alchemists that chemical writings were called 'hermetic,' and that the phrase 'hermetically sealed' is still in use to designate the closing of a glass vessel by fusion, after the manner of chemical manipulators.\n\nWe find the same root in the hermetic medicines of Paracelsus, and the hermetic freemasonry of the Middle Ages.\" Among the fragmentary writings believed to have come from the stylus of Hermes are two famous works.\n\nThe first is the Emerald Table , and the second is the Divine Pymander , or, as it is more commonly called, The Shepherd of Men , a discussion of which follows.\n\nOne outstanding point in connection with Hermes is that he was one of the few philosopher-priests of pagandom upon whom the early Christians did not vent their spleen."

