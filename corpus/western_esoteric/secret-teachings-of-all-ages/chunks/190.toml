body = "Each year the great tragedy is repeated, and the glorious resurrection takes place.\" (See Stellar Theology and Masonic Astronomy .) CHiram is termed dead because in the average individual the cosmic creative forces are limited in their manifestation to purely physical--and correspondingly materialistic--expression.\n\nObsessed by his belief in the reality and permanence of physical existence, man does not correlate the material universe with the blank north wall of the temple.\n\nAs the solar light symbolically is said to die as it approaches the winter solstice, so the physical world may be termed the winter solstice of the spirit.\n\nReaching the winter solstice, the sun apparently stands still for three days and then, rolling away the stone of winter, begins its triumphal march north towards the summer solstice.\n\nThe condition of ignorance may be likened to the winter solstice of philosophy; spiritual understanding to the summer solstice.\n\nFrom this point of view, initiation into the Mysteries becomes the vernal equinox of the spirit, at which time the CHiram in man crosses from the realm of mortality into that of eternal life.\n\nThe autumnal equinox is analogous to the mythological fall of man, at which time the human spirit descended into the realms of Hades by being immersed in the illusion of terrestrial existence.\n\nIn An Essay on the Beautiful , Plotinus describes the refining effect of beauty upon the unfolding consciousness of man.\n\nCommissioned to decorate the Everlasting House, CHiram Abiff is the embodiment of the beautifying principle.\n\nBeauty is essential to the natural unfoldment of the human soul.\n\nThe Mysteries held that man, in part at least, was the product of his environment.\n\nTherefore they considered it imperative that every person be surrounded by objects which would evoke the highest and noblest sentiments.\n\nThey proved that it was possible to produce beauty in life by surrounding life with beauty.\n\nThey discovered that symmetrical bodies were built by souls continuously in the presence of symmetrical bodies; that noble thoughts were produced by minds surrounded by examples of mental nobility.\n\nConversely, if a man were forced to look upon an ignoble or asymmetrical structure it would arouse within him a sense of ignobility which would provoke him to commit ignoble deeds.\n\nIf an ill-proportioned building were erected in the midst of a city there would be ill-proportioned children born in that community; and men and women, gazing upon the asymmetrical structure, would live inharmonious lives.\n\nThoughtful men of antiquity realized that their great philosophers were the natural products of the æsthetic ideals of architecture, music, and art established as the standards of the cultural systems of the time.\n\nThe substitution of the discord of the fantastic for the harmony of the beautiful constitutes one of the great tragedies of every civilization.\n\nNot only were the Savior-Gods of the ancient world beautiful, but each performed a ministry of beauty, seeking to effect man's regeneration by arousing within him the love of the beautiful.\n\nA renaissance of the golden age of fable can be made possible only by the elevation of beauty to its rightful dignity as the all-pervading, idealizing quality in the religious, ethical, sociological, scientific, and political departments of life.\n\nThe Dionysiac Architects were consecrated to the raising of their Master Spirit--Cosmic Beauty--from the sepulcher of material ignorance and selfishness by erecting buildings which were such perfect exemplars of symmetry and majesty that they were actually magical formulæ by which was evoked the spirit of the martyred Beautifier entombed within a materialistic world.\n\nIn the Masonic Mysteries the triune spirit of man (the light Delta) is symbolized by the three Grand Masters of the Lodge of Jerusalem."

