body = "And as in the most holy of the mysteries, they say, that the mystics at first meet with the multi form, and many-shaped genera, which are hurled forth before the gods, but on entering the temple, unmoved, and guarded by the mystic rites, they genuinely receive in their bosom [heart] divine illumination, and divested of their garments, as they would say, participate of a divine nature; the same mode, as it appears to me, takes place in the speculation of wholes.\n\nFor the soul when looking at things posterior to herself, beholds the shadows and images of beings, but when she converts herself to herself she evolves her own essence, and the reasons which she contains.\n\nAnd at first indeed, she only as it were beholds herself; but, when she penetrates more profoundly into the knowledge of herself, she finds in herself both intellect, and the orders of beings.\n\nWhen however, she proceeds into her interior recesses, and into the adytum as it were of the soul, she perceives with her eye closed [without the aid of the lower mind], the genus of the gods, and the unities of beings.\n\nFor all things are in us psychically, and through this we are naturally capable of knowing all things, by exciting the powers and the images of wholes which we contain.\" The initiates of old warned their disciples that an image is not a reality but merely the objectification of a subjective idea.\n\nThe image, of the gods were nor designed to be objects of worship but were to be regarded merely as emblems or reminders of invisible powers and principles.\n\nSimilarly, the body of man must not be considered as the individual but only as the house of the individual, in the same manner that the temple was the House of God.\n\nIn a state of grossness and perversion man's body is the tomb or prison of a divine principle; in a state of unfoldment and regeneration it is the House or Sanctuary of the Deity by whose creative powers it was fashioned.\n\n\"Personality is suspended upon a thread from the nature of Being,\" declares the secret work.\n\nMan is essentially a permanent and immortal principle; only his bodies pass through the cycle of birth and death.\n\nThe immortal is the reality; the mortal is the unreality.\n\nDuring each period of earth life, reality thus dwells in unreality, to be liberated from it temporarily by death and permanently by illumination.\n\nWhile generally regarded as polytheists, the pagans gained this reputation not because they worshiped more than one God but rather because they personified the attributes of this God, thereby creating a pantheon of posterior deities each manifesting a part of what the One God manifested as a whole.\n\nHAND DECORATED WITH EFFIGIES OF JESUS CHRIST, THE VIRGIN MARY, AND THE TWELVE APOSTLES.\n\nFrom an old print, courtesy of Carl Oscar Borg.\n\nUpon the twelve phalanges of the fingers, appear the likenesses of the Apostles, each bearing its own appropriate symbol.\n\nIn the case of those who suffered martyrdom the symbol signifies the instrument of death.\n\nThus, the symbol of St.\n\nAndrew is a cross; of St.\n\nThomas, a javelin or a builder's square; of St.\n\nJames the Less, a club; of St Philip, a cross; of St.\n\nBartholomew, a large knife or scimitar; of St.\n\nMatthew, a sword or spear (sometimes a purse); of St.\n\nSimon, a club or saw; of St.\n\nMatthias, an axe; and of St.\n\nJudas, a halbert.\n\nThe Apostles whose symbols do not elate to their martyrdom are St.\n\nPeter, who carries two crossed keys, one gold and one silver; St.\n\nJames the Great, who bears a pilgrim's staff and an escalop shell; and St."

