body = "Palmer's translation of the Qur'an .) In his youth Mohammed traveled with the Meccan caravans, on one occasion acted as armor-bearer for his uncle, and spent a considerable time among the Bedouins, from whom he learned many of the religious and philosophic traditions of ancient Arabia.\n\nWhile traveling with his uncle, Abu Taleb, Mohammed contacted the Nestorian Christians, having encamped on a certain night near one of their monasteries.\n\nHere the young Prophet-to-be secured much of his information concerning the origin and doctrines of the Christian faith.\n\nWith the passing years Mohammed attained marked success in business and when about twenty-six years old married one of his employers, a wealthy widow nearly fifteen years his senior.\n\nThe widow, Khadijah by name, was apparently somewhat mercenary, for, finding her young business manager most efficient, she resolved to retain him in that capacity for life!\n\nKhadijah was a woman of exceptional mentality and to her integrity and devotion must be ascribed the early success of the Islamic cause.\n\nBy his marriage Mohammed was elevated from a position of comparative poverty to one of great wealth and power, and so exemplary was his conduct that he became known throughout Mecca as \"the faithful and true.\" Mohammed would have lived and died an honored and respected Meccan had he not unhesitatingly sacrificed both his wealth and social position in the service of the God whose voice he heard while meditating in the cavern on Mount Hira in the month of Ramadan.\n\nYear after year Mohammed climbed the rocky and desolate slopes of Mount Hira (since called Jebel Nur, \"the Mountain of light\") and here in his loneliness cried out to God to reveal anew the pure religion of Adam, that spiritual doctrine lost to mankind through the dissensions of religious factions.\n\nKhadijah, solicitous over her husband's ascetic practices which were impairing his physical health, sometimes accompanied him in his weary vigil, and with womanly intuition sensed the travail of his soul.\n\nAt last one night in his fortieth year as he lay upon the floor of the cavern, enveloped in his cloak, a great light burst upon him.\n\nOvercome with a sense of perfect peace and understanding in the blessedness of the celestial presence, he lost consciousness.\n\nWhen he came to himself again the Angel Gabriel stood before him, exhibiting a silken shawl with mysterious characters traced upon it.\n\nFrom these characters Mohammed gained the basic doctrines later embodied in the Koran.\n\nThen Gabriel spoke in a clear and wonderful voice, declaring Mohammed to be the Prophet of the living God.\n\nIn awe and trembling, Mohammed hastened to Khadijah, fearing the vision to have been inspired by the same evil spirits who served the pagan magicians so greatly despised by him, Khadijah assured him that his own virtuous life would be his protection and that he need fear no evil.\n\nThus reassured, the Prophet awaited further visitations from Gabriel.\n\nWhen these did not come, however, such a despair filled his soul that he attempted self-destruction, only to be stopped in the very act of casting himself over a cliff by the sudden reappearance of Gabriel, who again assured the Prophet that the revelations needed by his people would be given to him as necessity arose.\n\nPossibly as a result of his lonely periods of meditation, Mohammed seemingly was subject to ecstatic swoons.\n\nOn the occasions when the various suras of the Koran were dictated he is said to have fallen unconscious, and, regardless of the chill of the surrounding air, to have been covered with beads of perspiration.\n\nOften these attacks came without warning; at other times he would sit wrapped in a blanket to prevent a chill from the copious perspiration, and while apparently unconscious would dictate the various passages which a small circle of trusted friends would either commit to memory or reduce to writing."

