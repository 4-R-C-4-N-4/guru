body = "THE DRUIDIC MYSTERIES OF BRITAIN AND GAUL \"The original and primitive inhabitants of Britain, at some remote period, revived and reformed their national institutes.\n\nTheir priest, or instructor, had hitherto been simply named Gwydd, but it was considered to have become necessary to divide this office between the national, or superior, priest and another whose influence [would] be more limited.\n\nFrom henceforth the former became Der-Wydd (Druid), or superior instructor, and [the latter] Go-Wydd, or O-Vydd (Ovate), subordinate instructor; and both went by the general name of Beirdd (Bards), or teachers of wisdom.\n\nAs the system matured and augmented, the Bardic Order consisted of three classes, the Druids, Beirdd Braint, or privileged Bards, and Ovates.\" (See Samuel Meyrick and Charles Smith, The Costume of The Original Inhabitants of The British Islands .) The origin of the word Druid is under dispute.\n\nMax Müller believes that, like the Irish word Drui , it means \"the men of the oak trees.\" He further draws attention to the fact that the forest gods and tree deities of the Greeks were called dryades .\n\nSome believe the word to be of Teutonic origin; others ascribe it to the Welsh.\n\nA few trace it to the Gaelic druidh , which means \"a wise man\" or \"a sorcerer.\" In Sanskrit the word dru means \"timber.\" At the time of the Roman conquest, the Druids were thoroughly ensconced in Britain and Gaul.\n\nTheir power over the people was unquestioned, and there were instances in which armies, about to attack each other, sheathed their swords when ordered to do so by the white-robed Druids.\n\nNo undertaking of great importance was scatted without the assistance of these patriarchs, who stood as mediators between the gods and men.\n\nThe Druidic Order is deservedly credited with having had a deep understanding of Nature and her laws.\n\nThe Encyclopædia Britannica states that geography, physical science, natural theology, and astrology were their favorite studies.\n\nThe Druids had a fundamental knowledge of medicine, especially the use of herbs and simples .\n\nCrude surgical instruments also have been found in England and Ireland.\n\nAn odd treatise on early British medicine states that every practitioner was expected to have a garden or back yard for the growing of certain herbs necessary to his profession.\n\nÉliphas Lévi, the celebrated transcendentalist, makes the following significant statement: \"The Druids were priests and physicians, curing by magnetism and charging amylets with their fluidic influence.\n\nTheir universal remedies were mistletoe and serpents' eggs, because these substances attract the astral light in a special manner.\n\nThe solemnity with which mistletoe was cut down drew upon this plant the popular confidence and rendered it powerfully magnetic.\n\n* * * The progress of magnetism will some day reveal to us the absorbing properties of mistletoe.\n\nWe shall then understand the secret of those spongy growths which drew the unused virtues of plants and become surcharged with tinctures and savors.\n\nMushrooms, truffles, gall on trees, and the different kinds of mistletoe will be employed with understanding by a medical science, which will be new because it is old * * * but one must not move quicker than science, which recedes that it may advance the further.\n\n\" (See The History of Magic .) Not only was the mistletoe sacred as symbolic of the universal medicine, or panacea, but also because of the fact that it grew upon the oak tree.\n\nThrough the symbol of the oak, the Druids worshiped the Supreme Deity; therefore, anything growing upon that tree was sacred to Him."

