[content]
body = "It is not strange that the erudite Moses, initiated in Egypt, should teach the Jews a philosophy containing the more important principles of Egyptian esotericism.\n\nThe religions of Egypt at the time of the Israelitic captivity were far older than even the Egyptians themselves realized.\n\nHistories were difficult to compile in those days, and the Egyptians were satisfied to trace their race back to a mythological period when the gods themselves walked the earth and with their own power established the Double Empire of the Nile.\n\nThe Egyptians did not dream that these divine progenitors were the Atlanteans, who, forced to abandon their seven islands because of volcanic cataclysms, had immigrated into Egypt--then an Atlantean colony--where they established a great philosophic and literary center of civilization which was later to influence profoundly the religions and science of unnumbered races and peoples.\n\nToday Egypt is forgotten, but things Egyptian will always be remembered and revered.\n\nEgypt is dead--yet it lives immortal in its philosophy, and architectonics.\n\nAs Odin founded his Mysteries in Scandinavia, and Quexalcoatl in Mexico, so Moses, laboring with the then nomadic people of Israel's twelve tribes, established in the midst of them his secret and symbolic school, which has came to be known as The Tabernacle Mysteries.\n\nThe Tabernacle of: the Jews was merely a temple patterned after the temples of Egypt, and transportable to meet the needs of that roving disposition which the Israelites were famous.\n\nEvery part of the Tabernacle and the enclosure which surrounded it was symbolic of some great natural or philosophic truth.\n\nTo the ignorant it was but a place to which to bring offerings and in which to make sacrifice; to the wise it was a temple of learning, sacred to the Universal Spirit of Wisdom.\n\nWhile the greatest, minds of the Jewish and Christian worlds have realized that the Bible is a book of allegories, few seem to have taken the trouble to investigate its symbols and parables.\n\nWhen Moses instituted his Mysteries, he is said to have given to a chosen few initiates certain oral teachings which could never be written but were to be preserved from one generation to the next by word-of-mouth transmission.\n\nThose instructions were in the form of philosophical keys, by means of which the allegories were made to reveal their hidden significance.\n\nThese mystic keys to their sacred writings were called by the Jews the Qabbalah ( Cabala , Kaballah ).\n\nThe modern world seems to have forgotten the existence of those unwritten teachings which explained satisfactorily the apparent contradictions of the written Scriptures, nor does it remember that the pagans appointed their two-faced Janus as custodian of the key to the Temple of Wisdom.\n\nJanus has been metamorphosed into St.\n\nPeter, so often symbolized as holding in his hand the key to the gate of heaven.\n\nThe gold and silver keys of \"God's Vicar on Earth,\" the Pope, symbolizes this \"secret doctrine\" which, when properly understood, unlocks the treasure chest of the Christian and Jewish Qabbalah.\n\nThe temples of Egyptian mysticism (from which the Tabernacle was copied) were--according to their own priests--miniature representations of the universe.\n\nThe solar system was always regarded as a great temple of initiation, which candidates entered through the gates of birth; after threading the tortuous passageways of earthly existence, they finally approached the veil of the Great Mystery--Death--through whose gate they vanished back into the invisible world."

