body = "As Mithras, he is the ford of the sun, powerful and radiant, and most magnificent of the Yazatas (Izads, or Genii, of the sun).\n\nAs Mithra , this deity represents the feminine principle; the mundane universe is recognized as her symbol.\n\nShe represents Nature as receptive and terrestrial, and as fruitful only when bathed in the glory of the solar orb.\n\nThe Mithraic cult is a simplification of the more elaborate teachings of Zarathustra (Zoroaster), the Persian fire magician.\n\nAccording to the Persians, there coexisted in eternity two principles.\n\nThe first of these, Ahura-Mazda , or Ormuzd , was the Spirit of Good.\n\nFrom Ormuzd came forth a number of hierarchies of good and beautiful spirits (angels and archangels).\n\nThe second of these eternally existing principles was called Ahriman .\n\nHe was also a pure and beautiful spirit, but he later rebelled against Ormuzd, being jealous of his power.\n\nThis did not occur, however, until after Ormuzd had created light, for previously Ahriman had not been conscious of the existence of Ormuzd.\n\nBecause of his jealousy and rebellion, Ahriman became the Spirit of Evil.\n\nFrom himself he individualized a host of destructive creatures to injure Ormuzd.\n\nWhen Ormuzd created the earth, Ahriman entered into its grosser elements.\n\nWhenever Ormuzd did a good deed, Ahriman placed the principle of evil within it.\n\nAt last when Ormuzd created the human race, Ahriman became incarnate in the lower nature of man so that in each personality the Spirit of Good and the Spirit of Evil struggle for control.\n\nFor 3,000 years Ormuzd ruled the celestial worlds with light and goodness.\n\nThen he created man.\n\nFor another 3,000 years he ruled man with wisdom, and integrity.\n\nThen the power of Ahriman began, and the struggle for the soul of man continues through the next period of 3,000 years.\n\nDuring the fourth period of 3,000 years, the power of Ahriman will be destroyed.\n\nGood will return to the world again, evil and death will be vanquished, and at last the Spirit of Evil will bow humbly before the throne of Ormuzd.\n\nWhile Ormuzd and Ahriman are struggling for control of the human soul and for supremacy in Nature, Mithras, God of Intelligence, stands as mediator between the two.\n\nMany authors have noted the similarity between mercury and Mithras.\n\nAs the chemical mercury acts as a solvent (according to alchemists), so Mithras seeks to harmonize the two celestial opposites.\n\nTHE GROUND PLAN OF STONEHENGE.\n\nFrom Maurice's Indian Antiquities.\n\nThe Druid temples of places of religious worship were not patterned after those of other nations.\n\nMost of their ceremonies were performed at night, either in thick groves of oak trees or around open-air altars built of great uncut stones.\n\nHow these masses of rock were moved ahs not been satisfactorily explained.\n\nThe most famous of their altars, a great stone ring of rocks, is Stonehenge, in Southwestern England.\n\nThis structure, laid out on an astronomical basis, still stands, a wonder of antiquity.\n\n*** There are many points of resemblance between Christianity and the cult of Mithras.\n\nOne of the reasons for this probably is that the Persian mystics invaded Italy during the first century after Christ and the early history of both cults was closely interwoven."

