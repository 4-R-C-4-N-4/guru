body = "On the sixteenth unnumbered page of the 1641 edition of Du Bartas' Divine Weeks is a boar surmounting a pyramidal text.\n\nThe text is meaningless jargon, evidently inserted for cryptographic reasons and marked with Bacon's signature--the hog.\n\nThe year following publication of the First Folio of Shakespeare's plays in 1623, there was printed in \"Lunæburg\" a remarkable volume on cryptography, avowedly by Gustavus Selenus.\n\nIt is considered extremely probable that this volume constitutes the cryptographic key to the Great Shakespearian Folio .\n\nPeculiar symbolical head- and tail-pieces also mark the presence of cryptograms.\n\nWhile such ornaments are found in many early printed books, certain emblems are peculiar to volumes containing Baconian Rosicrucian ciphers.\n\nThe light and dark shaded A is an interesting example.\n\nBearing in mind the frequent recurrence in Baconian symbolism of the light and dark shaded A and the hog, the following statement by Bacon in his Interpretation of Nature is highly significant: \"If the sow with her snout should happen to imprint the letter A upon the ground, wouldst thou therefore imagine that she could write out a whole tragedy as one letter?\" The Rosicrucians and other secret societies of the seventeenth century used watermarks as mediums for the conveyance of cryptographic references, and books presumably containing Baconian ciphers are usually printed upon paper bearing Rosicrucian or Masonic watermarks; often there are several symbols in one book, such as the Rose Cross, urns, bunches of grapes, and others.\n\nAt hand is a document which may prove a remarkable key to a cipher beginning in The Tragedy of Cymbeline .\n\nSo far as known it has never been published and is applicable only to the 1623 Folio of the Shakespearian plays.\n\nThe cipher is a line-and-word count involving punctuation, especially the long and short exclamation points and the straight and slanting interrogation points.\n\nThis code was discovered by Henry William Bearse in 1900, and after it has been thoroughly checked its exact nature will be made public.\n\nA CRYPTIC HEADPIECE.\n\nFrom Ralegh's History of the World.\n\nMany documents influenced by Baconian philosophy--or intended m conceal Baconian or Rosicrucian cryptograms--use certain conventional designs at the beginning and end of chapters, which reveal to the initiated the presence of concealed information.\n\nThe above ornamental has long been accepted as of the presence of Baconian influence and is to be found only in a certain number of rare volumes, all of which contain Baconian cryptograms.\n\nThese cipher messages were placed in the books either by Bacon himself or by contemporaneous and subsequent authors belonging to the same secret society which Bacon served with his remarkable knowledge of ciphers and enigmas.\n\nVariants of this headpiece adorn the Great Shakespearian Folio (1623); Bacon's Novum Organum (1620); the St.\n\nJames Bible (1611); Spencer's Faerie Queene (1611); and Sir Walter Ralegh's History of the World (1614) (See American Baconiana.) *** THE DROESHOUT PORTRAIT OF SHAKSPERE.\n\nFrom Shakespeare's Great Folio of 1623.\n\nThere are no authentic portraits of Shakspere in existence.\n\nThe dissimilarities the Droeshout, Chandos, Janssen, Hunt, Ashbourne, Soest, and Dunford portraits prove conclusively that the artists were unaware of Shakspere's actual features.\n\nAn examination of the Droeshout portrait discloses several peculiarities.\n\nBaconian enthusiasts are convinced that the face is only a caricature, possibly the death mask of Francis Bacon."

