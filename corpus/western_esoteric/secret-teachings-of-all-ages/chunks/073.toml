body = "It is doubtful that the deity called Thoth by the Egyptians was originally Hermes, but the two personalities were blended together and it is now impossible to separate them.\n\nThoth was called \"The Lord of the Divine Books\" and \"Scribe of the Company of the Gods.\" He is generally depicted with the body of a man and the head of an ibis.\n\nThe exact symbolic meaning of this latter bird has never been discovered.\n\nA careful analysis of the peculiar shape of the ibis--especially its head and beak--should prove illuminating.\n\n*** Then out of the imprisoned Light a mysterious and Holy Word came forth and took its stand upon the smoking waters.\n\nThis Word--the Voice of the Light--rose out of the darkness as a great pillar, and the fire and the air followed after it, but the earth and the water remained unmoved below.\n\nThus the waters of Light were divided from the waters of darkness, and from the waters of Light were formed the worlds above and from the waters of darkness were formed the worlds below.\n\nThe earth and the water next mingled, becoming inseparable, and the Spiritual Word which is called Reason moved upon their surface, causing endless turmoil.\n\nThen again was heard the voice of Poimandres, but His form was not revealed: \"I Thy God am the Light and the Mind which were before substance was divided from spirit and darkness from Light.\n\nAnd the Word which appeared as a pillar of flame out of the darkness is the Son of God, born of the mystery of the Mind.\n\nThe name of that Word is Reason .\n\nReason is the offspring of Thought and Reason shall divide the Light from the darkness and establish Truth in the midst of the waters.\n\nUnderstand, O Hermes, and meditate deeply upon the mystery.\n\nThat which in you sees and hears is not of the earth, but is the Word of God incarnate.\n\nSo it is said that Divine Light dwells in the midst of mortal darkness, and ignorance cannot divide them.\n\nThe union of the Word and the Mind produces that mystery which is called Life .\n\nAs the darkness without you is divided against itself, so the darkness within you is likewise divided.\n\nThe Light and the fire which rise are the divine man, ascending in the path of the Word, and that which fails to ascend is the mortal man, which may not partake of immortality.\n\nLearn deeply of the Mind and its mystery, for therein lies the secret of immortality.\" The Dragon again revealed its form to Hermes, and for a long time the two looked steadfastly one upon the other, eye to eye, so that Hermes trembled before the gaze of Poimandres.\n\nAt the Word of the Dragon the heavens opened and the innumerable Light Powers were revealed, soaring through Cosmos on pinions of streaming fire.\n\nHermes beheld the spirits of the stars, the celestials controlling the universe, and all those Powers which shine with the radiance of the One Fire--the glory of the Sovereign Mind.\n\nHermes realized that the sight which he beheld was revealed to him only because Poimandres had spoken a Word.\n\nThe Word was Reason, and by the Reason of the Word invisible things were made manifest.\n\nDivine Mind--the Dragon--continued its discourse: \"Before the visible universe was formed its mold was cast.\n\nThis mold was called the Archetype , and this Archetype was in the Supreme Mind long before the process of creation began.\n\nBeholding the Archetypes, the Supreme Mind became enamored with Its own thought; so, taking the Word as a mighty hammer, It gouged out caverns in primordial space and cast the form of the spheres in the Archetypal mold, at the same time sowing in the newly fashioned bodies the seeds of living things.\n\nThe darkness below, receiving the hammer of the Word, was fashioned into an orderly universe.\n\nThe elements separated into strata and each brought forth living creatures."

