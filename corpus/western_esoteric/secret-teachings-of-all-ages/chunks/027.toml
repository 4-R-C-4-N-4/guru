body = "They taught man to use his faculties more intelligently, to be patient in the face of adversity, to be courageous when confronted by danger, to be true in the midst of temptation, and, most of all, to view a worthy life as the most acceptable sacrifice to God, and his body as an altar sacred to the Deity.\n\nA FEMALE HIEROPHANT OF THE MYSTERIES.\n\nFrom Montfaucon's Antiquities.\n\nThis illustration shows Cybele, here called the Syrian Goddess, in the robes of a hierophant.\n\nMontfaucon describes the figure as follows: \"Upon her head is an episcopal mitre, adorned on the lower part with towers and pinnacles; over the gate of the city is a crescent, and beneath the circuit of the walls a crown of rays.\n\nThe Goddess wears a sort of surplice, exactly like the surplice of a priest or bishop; and upon the surplice a tunic, which falls down to the legs; and over all an episcopal cope, with the twelve signs of the Zodiac wrought on the borders.\n\nThe figure hath a lion on each side, and holds in its left hand a Tympanum, a Sistrum, a Distaff, a Caduceus, and another instrument.\n\nIn her right hand she holds with her middle finger a thunderbolt, and upon the same am animals, insects, and, as far as we may guess, flowers, fruit, a bow, a quiver, a torch, and a scythe.\" The whereabouts of the statue is unknown, the copy reproduced by Montfaucon being from drawings by Pirro Ligorio.\n\n*** Sun worship played an important part in nearly all the early pagan Mysteries.\n\nThis indicates the probability of their Atlantean origin, for the people of Atlantis were sun worshipers.\n\nThe Solar Deity was usually personified as a beautiful youth, with long golden hair to symbolize the rays of the sun.\n\nThis golden Sun God was slain by wicked ruffians, who personified the evil principle of the universe.\n\nBy means of certain rituals and ceremonies, symbolic of purification and regeneration, this wonderful God of Good was brought back to life and became the Savior of His people.\n\nThe secret processes whereby He was resurrected symbolized those cultures by means of which man is able to overcome his lower nature, master his appetites, and give expression to the higher side of himself.\n\nThe Mysteries were organized for the purpose of assisting the struggling human creature to reawaken the spiritual powers which, surrounded by the flaming ring of lust and degeneracy, lay asleep within his soul.\n\nIn other words, man was offered a way by which he could regain his lost estate.\n\n(See Wagner's Siegfried .) In the ancient world, nearly all the secret societies were philosophic and religious.\n\nDuring the medieval centuries, they were chiefly religious and political, although a few philosophic schools remained.\n\nIn modern times, secret societies, in the Occidental countries, are largely political or fraternal, although in a few of them, as in Masonry, the ancient religious and philosophic principles still survive.\n\nSpace prohibits a detailed discussion of the secret schools.\n\nThere were literally scores of these ancient cults, with branches in all parts of the Eastern and Western worlds.\n\nSome, such as those of Pythagoras and the Hermetists, show a decided Oriental influence, while the Rosicrucians, according to their own proclamations, gained much of their wisdom from Arabian mystics.\n\nAlthough the Mystery schools are usually associated with civilization, there is evidence that the most uncivilized peoples of prehistoric times had a knowledge of them.\n\nNatives of distant islands, many in the lowest forms of savagery, have mystic rituals and secret practices which, although primitive, are of a decided Masonic tinge."

