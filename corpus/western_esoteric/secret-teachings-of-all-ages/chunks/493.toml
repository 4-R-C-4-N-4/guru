body = "Little is known of the history of the Caaba prior to its rededication as a Mohammedan mosque, other than that the building was a pagan temple.\n\nAt the time the Prophet captured Mecca, the Caaba and surrounding court contained 360 idols, which were destroyed by Mohammed before he actually gained access to the shrine itself.\n\nThe \"Ancient House,\" as the Caaba is called, is an irregular cube measuring about 38 feet in length, 35 feet in height, and 30 feet in width.\n\nThe length of each side wall varies slightly and that of the end walls over a foot.\n\nIn the southeast corner of the wall at a convenient distance above the ground (about five feet) is embedded the sacred and mysterious black stone or aerolite of Abraham.\n\nWhen first given to that patriarch by the Angel Gabriel this stone was of such strong whiteness as to be visible from every part of the earth, but late, it became black because of the sins of man.\n\nThis black stone, oval in shape and about seven inches in diameter, was broken in the seventh century and is now held together by a silver mounting.\n\nAccording to tradition, 2,000 years before the creation of the world the Caaba was first constructed in heaven, where a model of it still remains.\n\nAdam erected the Caaba on earth exactly below the spot in heaven occupied by the original, and selected the stones from the five sacred mountains Sinai, al-Judī, Hirā, Olivet, and Lebanon.\n\nTen thousand angels were appointed to guard the structure.\n\nAt the time of the Deluge the sacred house was destroyed, but afterward was rebuilt by Abraham and his son Ishmael.\n\n(For details see A Dictionary of Islam).\n\nIt is probable that the site of the Caaba was originally occupied by a prehistoric stone altar or ring of uncut monoliths similar to those of Stonehenge.\n\nLike the temple at Jerusalem, the Caaba has undergone many vicissitudes, and the present structure does not antedate the seventeenth century of the Christian Era.\n\nWhen Mecca was sacked in A.D.\n\n930, the famous black stone was captured by the Carmathians, in whose possession it remained over twenty years and it is a moot question whether the stone finally returned by them in exchange far a princely ransom was actually the original block or a substitute.\n\nThe side of the Caaba are the supposed graves of Hagar and Ishmael, and near the door (which is about seven feet above the ground) is the stone upon which Abraham stood while rebuilding the Caaba.\n\nVarious coverings have always been thrown over the cube-shaped structure; the present drape, which is replaced annually, is a black brocade embroidered in a gold.\n\nSmall pieces a the old drape are cherished by pilgrims as holy relics.\n\nEntrance to the Caaba is effected by a movable flight of steps.\n\nThe interior is lined with varicolored marble, silver, and gilt.\n\nAlthough the building is generally conceived to be windowless, this point is disputed.\n\nAccess to the roof is had through a silver-plated door.\n\nIn addition to the sacred books the Caaba contains thirteen lamps.\n\nThe great courtyard around the building contains a number of holy objects, and is bounded by a colonnade which originally consisted of 360 pillars.\n\nOpening into the courtyard are nineteen gates, the sacred and significant number of the Metonic Cycle and also the number of stones in the inner ring of Stonehenge.\n\nSeven great minarets tower above the Caaba, and one of the sacred ceremonials in connection with the building includes seven circumambulations about the central Caaba in an apparent effort to portray the motion of the celestial bodies.\n\n*** The most frequent, and apparently the most damaging, accusation brought against Mohammed is that of polygamy."

