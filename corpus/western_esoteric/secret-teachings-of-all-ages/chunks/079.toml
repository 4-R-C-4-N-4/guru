[content]
body = "SUPREME among the wonders of antiquity, unrivaled by the achievements of later architects and builders, the Great Pyramid of Gizeh bears mute witness to an unknown civilization which, having completed its predestined span, passed into oblivion.\n\nEloquent in its silence, inspiring in its majesty, divine in its simplicity, the Great Pyramid is indeed a sermon in stone.\n\nIts magnitude overwhelms the puny sensibilities of man.\n\nAmong the shifting sands of time it stands as a fitting emblem of eternity itself.\n\nWho were the illumined mathematicians who planned its parts and dimensions, the master craftsmen who supervised its construction, the skilled artisans who trued its blocks of stone?\n\nThe earliest and best-known account of the building of the Great Pyramid is that given by that highly revered but somewhat imaginative historian, Herodotus.\n\n\"The pyramid was built in steps, battlement-wise, as it is called, or, according to others, altar-wise.\n\nAfter laying the stones for the base, they raised the remaining stones to their places by means of machines formed of short wooden planks.\n\nThe first machine raised them from the ground to the top of the first step.\n\nOn this there was another machine, which received the stone upon its arrival, and conveyed it to the second step, whence a third machine advanced it still higher.\n\nEither they had as many machines as there were steps in the pyramid, or possibly they had but a single machine, which, being easily moved, was transferred from tier to tier as the stone rose.\n\nBoth accounts are given, and therefore I mention both.\n\nThe upper portion of the pyramid was finished first, then the middle, and finally the part which was lowest and nearest the ground.\n\nThere is an inscription in Egyptian characters on the pyramid which records the quantity of radishes, onions, and garlick consumed by the labourers who constructed it; and I perfectly well remember that the interpreter who read the writing to me said that the money expended in this way was 1600 talents of silver.\n\nIf this then is a true record, what a vast sum must have been spent on the iron tools used in the work, and on the feeding and clothing of the labourers, considering the length of time the work lasted, which has already been stated [ten years], and the additional time--no small space, I imagine--which must have been occupied by the quarrying of the stones, their conveyance, and the formation of the underground apartments.\" While his account is extremely colorful, it is apparent that the Father of History, for reasons which he doubtless considered sufficient, concocted a fraudulent story to conceal the true origin and purpose of the Great Pyramid.\n\nThis is but one of several instances in his writings which would lead the thoughtful reader to suspect that Herodotus himself was an initiate of the Sacred Schools and consequently obligated to preserve inviolate the secrets of the ancient orders.\n\nThe theory advanced by Herodotus and now generally accepted that the Pyramid was the tomb of the Pharaoh Cheops cannot be substantiated.\n\nIn fact, Manetho, Eratosthenes, and Diodorus Siculus all differ from Herodotus--as well as from each other--regarding the name of the builder of this supreme edifice.\n\nThe sepulchral vault, which, according to the Lepsius Law of pyramid construction, should have been finished at the same time as the monument or sooner, was never completed.\n\nThere is no proof that the building was erected by the Egyptians, for the elaborate carvings with which the burial chambers of Egyptian royalty are almost invariably ornamented are entirely lacking and it embodies none of the elements of their architecture or decoration, such as inscriptions, images, cartouches, paintings, and other distinctive features associated with dynastic mortuary art."

