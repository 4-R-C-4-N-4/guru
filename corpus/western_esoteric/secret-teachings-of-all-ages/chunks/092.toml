body = "Gathering seventy-two persons as fellow conspirators, he attained his nefarious end in a most subtle manner.\n\nHe had a wonderful ornamented box made just the size of the body of Osiris.\n\nThis he brought into a banquet hall where the gods and goddesses were feasting together.\n\nAll admired the beautiful chest, and Typhon promised to give it to the one whose body fitted it most perfectly.\n\nOne after another lay down in the box, but in disappointment rose again, until at last Osiris also tried.\n\nThe moment he was in the chest Typhon and his accomplices nailed the cover down and sealed the cracks with molten lead.\n\nThey then cast the box into the Nile, down which it floated to the sea.\n\nPlutarch states that the date upon which this occurred was the seventeenth day of the month Athyr, when the sun was in the constellation of Scorpio.\n\nThis is most significant, for the Scorpion is the symbol of treachery.\n\nThe time when Osiris entered the chest was also the same season that Noah entered the ark to escape from the Deluge.\n\nISIS, QUEEN OF HEAVEN.\n\nFrom Mosaize Historie der Hebreeuwse Kerke.\n\nDiodorus writes of a famous inscription carved on a column at Nysa, in Arabia, wherein Isis described herself as follows: \"I am Isis, Queen of this country.\n\nI was instructed by Mercury.\n\nNo one can destroy the laws which I have established.\n\nI am the eldest daughter of Saturn, most ancient of the gods.\n\nI am the wife and sister of Osiris the King.\n\nI first made known to mortals the use of wheat.\n\nI am the mother of Orus the King.\n\nIn my honor was the city of Bubaste built.\n\nRejoice, O Egypt, rejoice, land that gave me birth!\" (See \"Morals and Dogma,\" by Albert Pike.) *** Plutarch further declares that the Pans and Satyrs (the Nature spirits and elementals) first discovered that Osiris had been murdered.\n\nThese immediately raised an alarm, and from this incident the word panic, meaning fright or amazement of the multitudes, originated.\n\nIsis, upon receiving the news of her husband's murder, which she learned from some children who had seen the murderers making off with the box, at once robed herself in mourning and started forth in quest of him.\n\nAt length Isis discovered that the chest had floated to the coast of Byblos.\n\nThere it had lodged in the branches of a tree, which in a short time miraculously grew up around the box.\n\nThis so amazed the king of that country that he ordered the tree to be cut down and a pillar made from its trunk to support the roof of his palace.\n\nIsis, visiting Byblos, recovered the body of her husband, but it was again stolen by Typhon, who cut it into fourteen parts, which he scattered all over the earth.\n\nIsis, in despair, began gathering up the severed remains of her husband, but found only thirteen pieces.\n\nThe fourteenth part (the phallus) she reproduced in gold, for the original had fallen into the river Nile and had been swallowed by a fish.\n\nTyphon was later slain in battle by the son of Osiris.\n\nSome of the Egyptians believed that the souls of the gods were taken to heaven, where they shone forth as stars.\n\nIt was supposed that the soul of Isis gleamed from the Dog Star, while Typhon became the constellation of the Bear.\n\nIt is doubtful, however, whether this idea was ever generally accepted.\n\nAmong the Egyptians, Isis is often represented with a headdress consisting of the empty throne chair of her murdered husband, and this peculiar structure was accepted during certain dynasties as her hieroglyphic."

