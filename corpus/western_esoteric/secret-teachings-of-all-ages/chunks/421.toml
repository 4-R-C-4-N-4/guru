body = "The dark half represents the Deep, or Chaos, the Eternal Waters pouring forth out of the Deity; the light half-circle containing the figure of Apollo represents the diurnal hemisphere of the world, which in the ancient Mysteries was ruled over by Apollo.\n\nThe dark half-circle is the nocturnal hemisphere ruled over by Dionysius (Dionysos), whose figure is faintly visible in the gloom.\n\n*** Virgo Lucifera then placed the if Moor's head in a kettle-like receptacle in the upper part of the fountain and poured upon it the substances prepared on the previous day in the laboratory.\n\nThe virgins placed lamps beneath.\n\nThese substances when they boiled passed out through holes in the sides of the kettle and, falling upon the bodies in the fountain below, dissolved them.\n\nThe six royal bodies having been reduced thus to a liquid state, a tap was opened in the lower end of the fountain and the fluid drained into an immense golden globe, which, when filled, was of great weight.\n\nAll but the wedding guests then retired and shortly a hole in the ceiling opened as before and the guests ascended pell-mell to the third floor.\n\nHere the globe were suspended by a strong chain.\n\nThe walls of the apartment were of glass, and mirrors were so arranged that the sun's rays were concentrated upon the central globe, thus causing it to become very hot.\n\nLater the sun's rays were deflected and the globe permitted to cool, after which it was cut open with a diamond, revealing a beautiful white egg.\n\nCarrying this with her, Virgo Lucifera departed.\n\nThe guests, having ascended through another trap door, found themselves upon the fourth floor, where stood a square kettle filled with silver sand warmed by a gentle fire.\n\nThe great white egg was placed upon the warm sand to mature.\n\nIn a short time it cracked and there emerged an ugly, ill-tempered bird, which was fed with the blood of the beheaded royal persons diluted with prepared water.\n\nAt each feeding its feathers changed color; from black they turned to white and at last they became varicolored, the disposition of the bird improving the while.\n\nDinner was then served, after which Virgo Lucifera departed with the bird.\n\nThe guests ascended with ropes, ladders, and wings to the fifth floor, where a bath colored with fine white powder had been prepared for the bird, which enjoyed bathing in it until the lamps placed beneath the bath caused the water to become uncomfortably warm.\n\nWhen the heat had removed all the bird's feathers it was taken out, but the fire continued until nothing remained in the bath save a sediment in the form of a blue stone.\n\nThis was later pounded up and made into a pigment; with this, all of the bird except the head was painted.\n\nThe guests thereupon ascended to the sixth floor, where stood a small altar resembling that in the King's throne room.\n\nThe bird drank from the little fountain and was fed with the blood of the white serpent which crawled through the openings in the skull.\n\nThe sphere by the altar revolved continuously.\n\nThe watch struck one, two, and then three, at which time the bird, laying its neck upon the book, suffered itself to be decapitated.\n\nIts body was burned to ashes, which were placed in a box of cypress wood.\n\nVirgo Lucifera told C.R.C.\n\nand three of his comrades that they were lazy and sluggish \"labourators\" and would therefore be excluded from the seventh room.\n\nMusicians were sent for, who with cornets were to \"blow\" the four in ridicule from the chamber.\n\nC.R.C.\n\nand his three companions were disheartened until the musicians told them to be of good cheer and led them up a winding stair to the eighth floor of the tower directly beneath the roof."

