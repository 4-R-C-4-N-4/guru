body = "Then come various industries and in the center is a terrestrial globe with an ape-man sitting upon it, measuring a sphere with a pair of compasses.\n\nThis little figure represents the animal creation.\n\nIn the outer ring of fire, above is the sacred name of Jehovah surrounded by clouds.\n\nFrom these clouds issues a hand holding a chain.\n\nBetween the divine sphere and the lower world personified by the ape is the figure of a woman.\n\nIt is to be specially noted that the female figure is merely holding the chain connecting her with the lower world, but the chain connecting her with the higher world ends in a shackle about her wrist.\n\nThis female figure is capable of several interpretations: she may represent humanity suspended between divinity and the beast; she may represent Nature as the link between God and the lower world; or she may represent the human soul--the common denominator between the superior and the inferior.\n\n*** FRATERNITAS R.C.\n\nJohann Valentin Andreæ is generally reputed to be the author of the Confessio.\n\nIt is a much-mooted question, however, whether Andreæ did not permit his name to be used as a pseudonym by Sir Francis Bacon.\n\nApropos of this subject are two extremely significant references occurring in the introduction to that remarkable potpourri, The Anatomy of Melancholy .\n\nThis volume first appeared in 1621 from the pen of Democritus junior, who was afterwards identified as Robert Burton, who, in turn, was a suspected intimate of Sir Francis Bacon.\n\nOne reference archly suggests that at the time of publishing The Anatomy of Melancholy in 1621 the founder of the Fraternity of R.C.\n\nwas still alive.\n\nThis statement--concealed from general recognition by its textual involvement--has escaped the notice of most students of Rosicrucianism.\n\nIn the same work there also appears a short footnote of stupendous import.\n\nIt contains merely the words: \"Job.\n\nValent.\n\nAndreas, Lord Verulam.\" This single line definitely relates Johann Valentin Andreæ to Sir Francis Bacon, who was Lord Verulam, and by its punctuation intimates that they are one and the same individual.\n\nProminent among Rosicrucian apologists was John Heydon, who inscribes himself \"A Servant of God, and a Secretary of Nature.\" In his curious work, The Rosie Cross Uncovered , he gives an enigmatic but valuable description of the Fraternity of R.C.\n\nin the following language: \"Now there are a kind of men, as they themselves report, named Rosie Crucians , a divine fraternity that inhabit the suburbs of heaven, and these are the officers of the Generalissimo of the world, that are as the eyes and ears of the great King, seeing and hearing all things: they say these Rosie Crucians are seraphically illuminated, as Moses was, according to this order of the elements, earth refin'd to water, water to air, air to fire.\" He further declares that these mysterious Brethren possessed polymorphous powers, appearing in any desired form at will."

