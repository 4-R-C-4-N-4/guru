[content]
body = "THE present consideration of the Bacon--Shakspere--Rosicrucian controversy is undertaken not for the vain purpose of digging up dead men's bones but rather in the hope that a critical analysis will aid in the rediscovery of that knowledge lost to the world since the oracles were silenced.\n\nIt was W.\n\nF.\n\nC.\n\nWigston who called the Bard of Avon \"phantom Captain Shakespeare, the Rosicrucian mask.\" This constitutes one of the most significant statements relating to the Bacon-Shakspere controversy.\n\nIt is quite evident that William Shakspere could not, unaided, have produced the immortal writings bearing his name.\n\nHe did not possess the necessary literary culture, for the town of Stratford where he was reared contained no school capable of imparting the higher forms of learning reflected in the writings ascribed to him.\n\nHis parents were illiterate, and in his early life he evinced a total disregard for study.\n\nThere are in existence but six known examples of Shakspere's handwriting.\n\nAll are signatures, and three of them are in his will.\n\nThe scrawling, uncertain method of their execution stamps Shakspere as unfamiliar with the use of a pen, and it is obvious either that he copied a signature prepared for him or that his hand was guided while he wrote.\n\nNo autograph manuscripts of the \"Shakespearian\" plays or sonnets have been discovered, nor is there even a tradition concerning them other than the fantastic and impossible statement appearing in the foreword of the Great Folio .\n\nA well-stocked library would be an essential part of the equipment of an author whose literary productions demonstrate him to be familiar with the literature of all ages, yet there is no record that Shakspere ever possessed a library, nor does he make any mention of books in his will.\n\nCommenting on the known illiteracy of Shakspere's daughter Judith, who at twenty-seven could only make her mark, Ignatius Donnelly declares it to be unbelievable that William Shakspere if he wrote the plays bearing his name would have permitted his own daughter to reach womanhood and marry without being able to read one line of the writings that made her father wealthy and locally famous.\n\nThe query also has been raised, \"Where did William Shakspere secure his knowledge of modern French, Italian, Spanish, and Danish, to say nothing of classical Latin and Greek?\" For, in spite of the rare discrimination with which Latin is used by the author of the Shakespearian plays, Ben Jonson, who knew Shakspere intimately, declared that the Stratford actor understood \"small Latin and less Greek\"!\n\nIs it not also more than strange that no record exists of William Shakspere's having ever played a leading role in the famous dramas he is supposed to have written or in others produced by the company of which he was a member?\n\nTrue, he may have owned a small interest in the Globe Theatre or Blackfriars, but apparently the height of his thespian achievements was the Ghost in Hamlet !\n\nIn spite of his admitted avarice, Shakspere seemingly made no effort during his lifetime to control or secure remuneration from the plays bearing his name, many of which were first published anonymously.\n\nAs far as can be ascertained, none of his heirs were involved in any manner whatsoever in the printing of the First Folio after his death, nor did they benefit financially therefrom.\n\nHad he been their author, Shakspere's manuscripts and unpublished plays would certainly have constituted his most valued possessions, yet his will--while making special disposition of his second-best bed and his \"broad silver gilt bowl\" neither mentions nor intimates that he possessed any literary productions whatsoever."

