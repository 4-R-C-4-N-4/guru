body = "The general shape of this niche, however, with its walls converging by a series of overlaps like those of the Grand Gallery, would indicate that originally it had been intended as a passageway.\n\nEfforts made to explore this niche have been nonproductive, but Mr.\n\nDupré believes an entrance to exist here through which--if the well did not exist at the time--the workmen made their exit from the Pyramid after dropping the stone plugs into the ascending gallery.\n\nBiblical scholars have contributed a number of most extraordinary conceptions regarding the Great Pyramid.\n\nThis ancient edifice has been identified by them as Joseph's granary (despite its hopelessly inadequate capacity); as the tomb prepared for the unfortunate Pharaoh of the Exodus who could not be buried there because his body was never recovered from the Red Sea; and finally as a perpetual confirmation of the infallibility of the numerous prophecies contained in the Authorized Version!\n\nTHE SPHINX Although the Great Pyramid, as Ignatius Donnelly has demonstrated, is patterned after an antediluvian type of architecture, examples of which are to be found in nearly every part of the world, the Sphinx ( Hu ) is typically Egyptian.\n\nThe stele between its paws states the Sphinx is an image of the Sun God, Harmackis, which was evidently made in the similitude of the Pharaoh during whose reign it was chiseled.\n\nThe statue was restored and completely excavated by Tahutmes IV as the result of a vision in which the god had appeared and declared himself oppressed by the weight of the sand about his body.\n\nThe broken beard of the Sphinx was discovered during excavations between the front paws.\n\nThe steps leading up to the sphinx and also the temple and altar between the paws are much later additions, probably Roman, for it is known that the Romans reconstructed many Egyptian antiquities.\n\nThe shallow depression in the crown of the head, once thought to be the terminus of a closed up passageway leading from the Sphinx to the Great Pyramid, was merely intended to help support a headdress now missing.\n\nMetal rods have been driven into the Sphinx in a vain effort to discover chambers or passages within its body.\n\nThe major part of the Sphinx is a single stone, but the front paws have been built up of smaller stones.\n\nThe Sphinx is about 200 feet long, 70 feet high, and 38 feet wide across the shoulders.\n\nThe main stone from which it was carved is believed by some to have been transported from distant quarries by methods unknown, while others assert it to be native rock, possibly an outcropping somewhat resembling the form into which it was later carved.\n\nThe theory once advanced that both the Pyramid and the Sphinx were built from artificial stones made on the spot has been abandoned.\n\nA careful analysis of the limestone shows it to be composed of small sea creatures called mummulites .\n\nThe popular supposition that the Sphinx was the true portal of the Great Pyramid, while it survives with surprising tenacity, has never been substantiated.\n\nP.\n\nChristian presents this theory as follows, basing it in part upon the authority of Iamblichus: \"The Sphinx of Gizeh, says the author of the Traité des Mystères, served as the entrance to the sacred subterranean chambers in which the trials of the initiate were undergone.\n\nThis entrance, obstructed in our day by sands and rubbish, may still be traced between the forelegs of the crouched colossus.\n\nIt was formerly closed by a bronze gate whose secret spring could be operated only by the Magi.\n\nIt was guarded by public respect: and a sort of religious fear maintained its inviolability better than armed protection would have done.\n\nIn the belly of the Sphinx were cut out galleries leading to the subterranean part of the Great Pyramid."

