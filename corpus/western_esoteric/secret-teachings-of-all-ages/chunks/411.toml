body = "The verse at the top of the page reads: \"Not only must this material be fixed, but it must be allowed to enter into everything so that this material may be well completed and have infinite virtue.\n\nThen by making it thick, it becomes at once all white, sublimation from white it becomes shining.\" Above the sun are the words: \"God and Nature do nothing in vain.\" The man on the left is a medieval conception of Hermes, the great Egyptian philosopher; the one on the right is Christopher, the philosopher of Paris.\n\nAbove the latter is written: \"If the Stone is black, it is not useless.\" The words over the retort are: \"There is air, fire, water, and earth.\" Below is added: \"A dissolution of the body is the first step.\n\n\" The curious chemical apparatus must be considered purely symbolic in this work and, as its author himself says, is intended to give only a hint of the \"Art.\" Leaf 18 .\n\nAt the left holding a book stands Aristotle, who is described as the most learned of all the Greeks.\n\nThe tree surmounted by the Sun and Mon.\n\nis accompanied by the wards: \"When the Stone is dead, that is changed to water, in this it will produce flowers.\" Beneath Aristotle and the prostrate human figure from which rises the flowering tree are these statements: \"He who makes everything descend from heaven to earth, and then ascend from earth to heaven, has information about the Stone.\n\nFor in Mercury there is something the wise seek, not invoked except by white or red ferment.\" The first part of this quotation is based upon the Emerald Tablet of Hermes (which see).\n\nIn ordinary man, the spirit is figuratively absorbed by the body; but in the true philosopher, the spirit is so greatly increased in power that it absorbs into itself and is nourished by man's corporeal body.\n\nLeaf 19 .\n\nAt the top it reads: \"He that comes to know this figure will have knowledge of the Stone.\" The seated man probably represents Paracelsus.\n\nTo his right are the words: \"I am neither tree nor animal, nor stone nor vegetable, but the Philosopher's Stone, trampled on by men, cast into the fire by my father, and in fire I rejoice.\" The four words to the left say \"In dryness is the Stone.\" Below the man is the Philosophic Egg containing the words: \"It is the end in which the beginning rests.\" The capital T stands for \"Tincture.\" The text to the right states: \"In Stone it is formed, as Gerber writes in his book very learnedly, and possessing so much of its nature that it changes into clear, living water; and it has the power to make folks rich, satisfied, and free from all cares, so they will be always happy if they attain by their wit to the secret.\" Leaf 20 .\n\nAt the top is written: \"Rains are made by six stars.\" Under the inverted man it reads: \"Receive new spirit.\n\nArise, for you are asleep.\" The two sentences about the large figure read: \"Remember Mercury, for ashes thou art and unto ashes thou shalt return.\n\nI thirst and am dead.\" Above the seven globes at the left is the admonition: \"If he thirst, give him a drink and he shall live.\" Over the small man is written: \"Hermes, the father of philosophers.\" The curved line of writing to which Hermes points says: \"The measure of the drink.\" Under the central pedestal appears: \"The light of my eyes is a lantern to my feet.\" Below is added: \"If the beginning is unknown, the rest is unknown.\" Above the figure rising from the flames on the right is the statement: \"He was resurrected after new Moon,\" and under the eagle: \"Thou shalt not fly further with me.\" Leaf 21 ."

