body = "Later, when the cross was discovered by the Empress Helena, the wood was found to be of four different varieties contained in one tree (representing the elements), and thereafter the cross continued to heal all the sick who were permitted to touch it.\n\nThe prevalent idea that the reverence for the cross is limited to the Christian world is disproved by even the most superficial investigation of its place in religious symbolism.\n\nThe early Christians used every means possible to conceal the pagan origin of their symbols, doctrines, and rituals.\n\nThey either destroyed the sacred books of other peoples among whom they settled, or made them inaccessible to students of comparative philosophy, apparently believing that in this way they could stamp out all record of the pre-Christian origin of their doctrines.\n\nIn some cases the writings of various ancient authors were tampered with, passages of a compromising nature being removed or foreign material interpolated.\n\nThe supposedly spurious passage in Josephus concerning Jesus is an example adduced to illustrate this proclivity.\n\nTHE LOST LIBRARIES OF ALEXANDRIA Prior to the Christian Era seven hundred thousand of the most valuable books, written upon parchment, papyrus, vellum, and wax, and also tablets of stone, terra cotta, and wood, were gathered from all parts of the ancient world and housed in Alexandria, in buildings specially prepared for the purpose.\n\nThis magnificent repository of knowledge was destroyed by a series of three fires.\n\nThe parts that escaped the conflagration lighted by Cæsar to destroy the fleet in the harbor were destroyed about A.D.\n\n389 by the Christians in obedience to the edict of Theodosius, who had ordered the destruction of the Serapeum, a building sacred to Serapis in which the volumes were kept.\n\nThis conflagration is supposed to have destroyed the library that Marcus Antonius had presented to Cleopatra to compensate in part for that burned in the fire of the year 51.\n\nConcerning this, H.\n\nP.\n\nBlavatsky, in Isis Unveiled , has written: \"They [the Rabbis of Palestine and the wise men] say that not all the rolls and manuscripts, reported in history to have been burned by Cæsar, by the Christian mob, in 389, and by the Arab General Amru, perished as it is commonly believed; and the story they tell is the following: At the time of the contest for the throne, in 51 B.\n\nC., between Cleopatra and her brother Dionysius Ptolemy, the Bruckion, which contained over seven hundred thousand rolls all bound in wood and fire-proof parchment, was undergoing repairs and a great portion of the original manuscripts, considered among the most precious, and which were not duplicated, were stored away in the house of one of the librarians.\n\n* * *Several hours passed between the burning of the fleet, set on fire by Cæsar's order, and the moment when the first buildings situated near the harbor caught fire in their turn; and * * * the librarians, aided by several hundred slaves attached to the museum, succeeded in saving the most precious of the rolls.\" In all probability, the books which were saved lie buried either in Egypt or in India, and until they are discovered the modern world must remain in ignorance concerning many great philosophical and mystical truths.\n\nThe ancient world more clearly understood these missing links--the continuity of the pagan Mysteries in Christianity.\n\nTHE CROSS IN PAGAN SYMBOLISM In his article on the Cross and Crucifixion in the Encyclopædia Britannica , Thomas Macall Fallow casts much light on the antiquity of this ideograph.\n\n\"The use of the cross as a religious symbol in pre-Christian times, and among non-Christian peoples, may probably be regarded as almost universal, and in very many cases it was connected with some form of nature worship.\" HISTORY OF THE HOLY CROSS.\n\nFrom Berjeau's History of the Holy Cross."

