body = "The heraldic rose of the Middle Ages generally has either five or ten petals thereby showing its relationship to the spiritual mystery of man through the Pythagorean pentad and decad.\n\nCULTUS ARBORUM The worship of trees as proxies of Divinity was prevalent throughout the ancient world.\n\nTemples were often built in the heart of sacred groves, and nocturnal ceremonials were conducted under the wide-spreading branches of great trees, fantastically decorated and festooned in honor of their patron deities.\n\nIn many instances the trees themselves were believed to possess the attributes of divine power and intelligence, and therefore supplications were often addressed to them.\n\nThe beauty, dignity, massiveness, and strength of oaks, elms, and cedars led to their adoption as symbols of power, integrity, permanence, virility, and divine protection.\n\nSeveral ancient peoples--notably the Hindus and Scandinavians---regarded the Macrocosm, or Grand Universe, as a divine tree growing from a single seed sown in space.\n\nThe Greeks, Persians, Chaldeans, and Japanese have legends describing the axle tree or reed upon which the earth revolves.\n\nKapila declares the universe to be the eternal tree, Brahma, which springs from an imperceptible and intangible seed--the material monad.\n\nThe medieval Qabbalists represented creation as a tree with its roots in the reality of spirit and its branches in the illusion of tangible existence.\n\nThe Sephirothic tree of the Qabbalah was therefore inverted, with its roots in heaven and its branches upon the earth.\n\nMadam Blavatsky notes that the Great Pyramid was considered to be a symbol of this inverted tree, with its root at the apex of the pyramid and its branches diverging in four streams towards the base.\n\nThe Scandinavian world-tree, Yggdrasil, supports on its branches nine spheres or worlds,--which the Egyptians symbolized by the nine stamens of the persea or avocado.\n\nAll of these are enclosed within the mysterious tenth sphere or cosmic egg--the definitionless Cipher of the Mysteries.\n\nThe Qabbalistic tree of the Jews also consists of nine branches, or worlds, emanating from the First Cause or Crown, which surrounds its emanations as the shell surrounds the egg.\n\nThe single source of life and the endless diversity of its expression has a perfect analogy in the structure of the tree.\n\nThe trunk represents the single origin of all diversity; the roots, deeply imbedded in the dark earth, are symbolic of divine nutriment; and its multiplicity of branches spreading from the central trunk represent the infinity of universal effects dependent upon a single cause.\n\nThe tree has also been accepted as symbolic of the Microcosm, that is, man.\n\nAccording to the esoteric doctrine, man first exists potentially within the body of the world-tree and later blossoms forth into objective manifestation upon its branches.\n\nAccording to an early Greek Mystery myth, the god Zeus fabricated the third race of men from ash trees.\n\nThe serpent so often shown wound around the trunk of the tree usually signifies the mind--the power of thought--and is the eternal tempter or urge which leads all rational creatures to the ultimate discovery of reality and thus overthrows the rule of the gods.\n\nThe serpent hidden in the foliage of the universal tree represents the cosmic mind; and in the human tree, the individualized intellect.\n\nThe concept that all life originates from seeds caused grain and various plants to be accepted as emblematic of the human spermatozoon, and the tree was therefore symbolic of organized life unfolding from its primitive germ.\n\nThe growth of the universe from its primitive seed may be likened to the growth of the mighty oak from the tiny acorn.\n\nWhile the tree is apparently much greater than its own source, nevertheless that source contains potentially every branch, twig, and leaf which will later be objectively unfolded by the processes of growth."

