body = "Concerning the number (10) of the spheres of existence (Sephiroth) out of Nothing, seal up your lips and guard your heart as you consider them, and if your month opens for utterance and your heart turns towards thought, control them, returning to silence.\n\nSo it is written: \"And the living creatures ran and returned.\" (Ezekiel i.\n\n14.) And on this wise was the covenant made with us, 9.\n\nThese are the ten emanations of number out of Nothing: 1st .\n\nThe spirit of the living Elohim, blessed and more than blessed be the living Elohim of ages.\n\nHis Voice, His Spirit, and His Word are the Holy Spirit.\n\n2nd .\n\nHe produced air from the spirit and in the air.\n\nHe formed and established twenty-two sounds--the letters.\n\nThree of them were fundamental, or mothers; seven were double; and twelve were simple (single); but the spirit is the first one and above all.\n\n3rd .\n\nPrimordial water He extracted from the air.\n\nHe formed therein twenty-two letters and established them out of mud and loam, making them like a border, putting them up like a wall, and surrounding them as with a rampart.\n\nHe poured snow upon them and it became earth, as it reads: \"He said to the snow be thou earth.\" (Job.\n\nxxxvii.\n\n6.) 4th .\n\nFire (ether) He drew forth from the water.\n\nHe engraved and established by it the Throne of Glory.\n\nHe fashioned the Seraphim, the Ophanim, and the Holy Living Creatures (Cherubim?), as His ministering angels; and with (of) these three He formed His habitation, as it reads: \"Who made His angels spirits, His ministers a flaming fire.\" (Psalms civ.\n\n4.) THE TETRAGRAMMATON.\n\nBy arranging the four letters of the Great Name, י ה ו ה , (I H V H), in the form of the Pythagorean Tetractys, the 72 powers of the Great Name of God are manifested.\n\nThe key to the problem is as follows: .\n\n= I = 10 = 10 .\n\n.\n\n= H I = 5+10 = 15 .\n\n.\n\n.\n\n= V H I = 6+5+10 = 21 .\n\n.\n\n.\n\n.\n\n= H V H I = 5+6+5+10 = 26 The Great Name of God = 72 *** 5th .\n\nHe selected three consonants (I, H, V) from the simple ones--a secret belonging to the three mothers, or first elements; אמש(A, M, Sh), air, water, fire (ether).\n\nHe sealed them with His spirit and fashioned them into a Great Name and with this sealed the universe in six directions.\n\nHe turned towards the above and sealed the height with יהו(I, H, V).\n\n6th .\n\nHe turned towards the below and sealed the depth withהיו(H, I, V).\n\n7th .\n\nHe turned forward and sealed the East with ויה(V, I, H).\n\n8th .\n\nHe turned backward and sealed the West with והי(V H, I).\n\n9th .\n\nHe turned to the right and sealed the South with יוה(I, V, H).\n\n10th .\n\nHe turned to the left and sealed the North with הוי(H, V, I).\n\nNOTE.\n\nThis arrangement of the letters of the Great Name is according to the Rev.\n\nDr.\n\nIsidor Kalisch.\n\n10.\n\nThese are the ten ineffable existences out of nothing; From the spirit of the Living God emanated air; from the air, water; from the water, fire (ether); from the fire, the height and the depth, the East and the West, the North and the South."

