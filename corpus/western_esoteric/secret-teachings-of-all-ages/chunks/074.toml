[content]
body = "The Supreme Being--the Mind--male and female, brought forth the Word; and the Word, suspended between Light and darkness, was delivered of another Mind called the Workman , the Master-Builder , or the Maker of Things .\n\n\"In this manner it was accomplished, O Hermes: The Word moving like a breath through space called forth the Fire by the friction of its motion.\n\nTherefore, the Fire is called the Son of Striving .\n\nThe Workman passed as a whirlwind through the universe, causing the substances to vibrate and glow with its friction, The Son of Striving thus formed Seven Governors , the Spirits of the Planets, whose orbits bounded the world; and the Seven Governors controlled the world by the mysterious power called Destiny given them by the Fiery Workman.\n\nWhen the Second Mind (The Workman) had organized Chaos, the Word of God rose straightway our of its prison of substance, leaving the elements without Reason, and joined Itself to the nature of the Fiery Workman.\n\nThen the Second Mind, together with the risen Word, established Itself in the midst of the universe and whirled the wheels of the Celestial Powers.\n\nThis shall continue from an infinite beginning to an infinite end, for the beginning and the ending are in the same place and state.\n\n\"Then the downward-turned and unreasoning elements brought forth creatures without Reason.\n\nSubstance could not bestow Reason, for Reason had ascended out of it.\n\nThe air produced flying things and the waters such as swim.\n\nThe earth conceived strange four-footed and creeping beasts, dragons, composite demons, and grotesque monsters.\n\nThen the Father--the Supreme Mind--being Light and Life, fashioned a glorious Universal Man in Its own image, not an earthy man but a heavenly Man dwelling in the Light of God.\n\nThe Supreme Mind loved the Man It had fashioned and delivered to Him the control of the creations and workmanships.\n\n\"The Man, desiring to labor, took up His abode in the sphere of generation and observed the works of His brother--the Second Mind--which sat upon the Ring of the Fire.\n\nAnd having beheld the achievements of the Fiery Workman, He willed also to make things, and His Father gave permission.\n\nThe Seven Governors, of whose powers He partook, rejoiced and each gave the Man a share of Its own nature.\n\n\"The Man longed to pierce the circumference of the circles and understand the mystery of Him who sat upon the Eternal Fire.\n\nHaving already all power, He stooped down and peeped through the seven Harmonies and, breaking through the strength of the circles, made Himself manifest to Nature stretched out below.\n\nThe Man, looking into the depths, smiled, for He beheld a shadow upon the earth and a likeness mirrored in the waters, which shadow and likeness were a reflection of Himself.\n\nThe Man fell in love with His own shadow and desired to descend into it.\n\nCoincident with the desire, the Intelligent Thing united Itself with the unreasoning image or shape.\n\n\"Nature, beholding the descent, wrapped herself about the Man whom she loved, and the two were mingled.\n\nFor this reason, earthy man is composite.\n\nWithin him is the Sky Man, immortal and beautiful; without is Nature, mortal and destructible.\n\nThus, suffering is the result of the Immortal Man's falling in love with His shadow and giving up Reality to dwell in the darkness of illusion; for, being immortal, man has the power of the Seven Governors--also the Life, the Light, and the Word-but being mortal, he is controlled by the Rings of the Governors--Fate or Destiny.\n\n\"Of the Immortal Man it should be said that He is hermaphrodite, or male and female, and eternally watchful."

