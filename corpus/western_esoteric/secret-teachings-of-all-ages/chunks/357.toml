[content]
body = "Whereas the eyes, the nostrils, and the ears admit the wisdom of Nature into the mind, the tongue alone may give it forth.\n\nIn various ages there have been illumined ones who have seen, smelt, tasted, or heard the will of God, but it will shortly come to pass that those who have seen, smelt, tasted, or heard shall speak, and truth shall be revealed.\n\nBefore this revelation of righteousness is possible, however, the world must sleep away the intoxication of her poisoned chalice (filled with the false life of the theological vine) and, opening her heart to virtue and understanding, welcome the rising sun of Truth.\n\nChapter IX .\n\nWe have a magic writing, copied from that divine alphabet with which God writes His will upon the face of celestial and terrestrial Nature.\n\nWith this new language we read God's will for all His creatures, and just as astronomers predict eclipses so we prognosticate the obscurations of the church and how long they shall last.\n\nOur language is like unto that of Adam and Enoch before the Fall, and though we understand and can explain our mysteries in this our sacred language, we cannot do so in Latin, a tongue contaminated by the confusion of Babylon.\n\nChapter X .\n\nAlthough there are still certain powerful persons who oppose and hinder us--because of which we must remain concealed--we exhort those who would become of our Fraternity to study unceasingly the Sacred Scriptures, for such as do this cannot be far from us.\n\nWe do not mean that the Bible should be continually in the mouth of man, but that he should search for its true and eternal meaning, which is seldom discovered by theologians, scientists, or mathematicians because they are blinded by the opinions of their sects.\n\nWe bear witness that never since the beginning of the world has there been given to man a more excellent book than the Holy Bible.\n\nBlessed is he who possesses it, more blessed he who reads it, most blessed he who understands it, and most godlike he who obeys it.\n\nChapter XI .\n\nWe wish the statements we made in the Fama Fraternitatis concerning the transmutation of metals and the universal medicine to be lightly understood.\n\nWhile we realize that both these works are attainable by man, we fear that many really great minds may be led away from the true quest of knowledge and understanding if they permit themselves to limit their investigation to the transmutation of metals.\n\nWhen to a man is given power to heal disease, to overcome poverty, and to reach a position of worldly dignity, that man is beset by numerous temptations and unless he possess true knowledge and full understanding he will become a terrible menace to mankind.\n\nThe alchemist who attains to the art of transmuting base metals can do all manner of evil unless his understanding be as great as his self-created wealth.\n\nWe therefore affirm that man must first gain knowledge, virtue, and understanding; then all other things may be added unto him.\n\nWe accuse the Christian Church of the great sin of possessing power and using it unwisely; therefore we prophesy that it shall fall by the weight of its own iniquities and its crown shall be brought to naught.\n\nChapter XII .\n\nIn concluding our Confessio , we earnestly admonish you to cast aside the worthless books of pseudo-alchemists and philosophers (of whom there are many in our age), who make light of the Holy Trinity and deceive the credulous with meaningless enigmas.\n\nOne of the greatest of these is a stage player, a man with sufficient ingenuity for imposition.\n\nSuch men are mingled by the Enemy of human welfare among those who seek to do good, thus making Truth more difficult of discovery.\n\nBelieve us, Truth is simple and unconcealed, while falsehood is complex, deeply hidden, proud, and its fictitious worldly knowledge, seemingly a glitter with godly luster, is often mistaken for divine wisdom."

