body = "The center of the Atlantean Wisdom-Religion was presumably a great pyramidal temple standing on the brow of a plateau rising in the midst of the City of the Golden Gates.\n\nFrom here the Initiate-Priests of the Sacred Feather went forth, carrying the keys of Universal Wisdom to the uttermost parts of the earth.\n\nThe mythologies of many nations contain accounts of gods who \"came out of the sea.\" Certain shamans among the American Indians tell of holy men dressed in birds' feathers and wampum who rose out of the blue waters and instructed them in the arts and crafts.\n\nAmong the legends of the Chaldeans is that of Oannes, a partly amphibious creature who came out of the sea and taught the savage peoples along the shore to read and write, till the soil, cultivate herbs for healing, study the stars, establish rational forms of government, and become conversant with the sacred Mysteries.\n\nAmong the Mayas, Quetzalcoatl, the Savior-God (whom some Christian scholars believe to have been St.\n\nThomas), issued from the waters and, after instructing the people in the essentials of civilization, rode out to sea on a magic raft of serpents to escape the wrath of the fierce god of the Fiery Mirror, Tezcatlipoca.\n\nMay it not have been that these demigods of a fabulous age who, Esdras-like, came out of the sea were Atlantean priests?\n\nAll that primitive man remembered of the Atlanteans was the glory of their golden ornaments, the transcendency of their wisdom, and the sanctity of their symbols--the cross and the serpent.\n\nThat they came in ships was soon forgotten, for untutored minds considered even boats as supernatural.\n\nWherever the Atlanteans proselyted they erected pyramids and temples patterned after the great sanctuary in the City of the Golden Gates.\n\nSuch is the origin of the pyramids of Egypt, Mexico, and Central America.\n\nThe mounds in Normandy and Britain, as well as those of the American Indians, are remnants of a similar culture.\n\nIn the midst of the Atlantean program of world colonization and conversion, the cataclysms which sank Atlantis began.\n\nThe Initiate-Priests of the Sacred Feather who promised to come back to their missionary settlements never returned; and after the lapse of centuries tradition preserved only a fantastic account of gods who came from a place where the sea now is.\n\nH.\n\nP.\n\nBlavatsky thus sums up the causes which precipitated the Atlantean disaster: \"Under the evil insinuations of their demon, Thevetat, the Atlantis-race became a nation of wicked magicians .\n\nIn consequence of this, war was declared, the story of which would be too long to narrate; its substance may be found in the disfigured allegories of the race of Cain, the giants, and that of Noah and his righteous family.\n\nThe conflict came to an end by the submersion of the Atlantis; which finds its imitation in the stories of the Babylonian and Mosaic flood: The giants and magicians '* * * and all flesh died * * * and every man.' All except Xisuthrus and Noah, who are substantially identical with the great Father of the Thlinkithians in the Popol Vuh , or the sacred book of the Guatemaleans, which also tells of his escaping in a large boat, like the Hindu Noah--Vaiswasvata.\n\n\" (See Isis Unveiled .) From the Atlanteans the world has received not only the heritage of arts and crafts, philosophies and sciences, ethics and religions, but also the heritage of hate, strife, and perversion."

