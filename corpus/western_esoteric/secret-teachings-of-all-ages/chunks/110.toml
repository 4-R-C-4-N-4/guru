body = "Regeneration actually means the unfoldment of the omnipresent Divinity in man, that this Divinity may shine forth as a sun and illumine all with whom it comes in contact.\n\nTHE MIDNIGHT SUN Apuleius said when describing his initiation ( vide ante ): \"At midnight I saw the sun shining with a splendid light.\" The midnight sun was also part of the mystery of alchemy.\n\nIt symbolized the spirit in man shining through the darkness of his human organisms.\n\nIt also referred to the spiritual sun in the solar system, which the mystic could see as well at midnight as at high noon, the material earth bring powerless to obstruct the rays of this Divine orb.\n\nThe mysterious lights which illuminated the temples of the Egyptian Mysteries during the nocturnal hours were said by some to he reflections of the spiritual sun gathered by the magical powers of the priests.\n\nThe weird light seen ten miles below the surface of the earth by I-AM-THE-MAN in that remarkable Masonic allegory Etidorhpa (Aphrodite spelt backward) may well refer to the mysterious midnight sun of the ancient rites.\n\nPrimitive conceptions concerning the warfare between the principles of Good and Evil were often based upon the alternations of day and night.\n\nDuring the Middle Ages, the practices of black magic were confined to the nocturnal hours; and those who served the Spirit of Evil were called black magicians, while those who served the Spirit of Good were called white magicians.\n\nBlack and white were associated respectively with night and day, and the endless conflict of light and shadow is alluded to many times in the mythologies of various peoples.\n\nThe Egyptian Demon, Typhon, was symbolized as part crocodile and part: hog because these animals are gross and earthy in both appearance and temperament.\n\nSince the world began, living things have feared the darkness; those few creatures who use it as a shield for their maneuvers were usually connected with the Spirit of Evil.\n\nConsequently cats, bats, toads, and owls are associated with witchcraft.\n\nIn certain parts of Europe it is still believed that at night black magicians assume the bodies of wolves and roam around destroying.\n\nFrom this notion originated the stories of the werewolves.\n\nSerpents, because they lived in the earth, were associated with the Spirit of Darkness.\n\nAs the battle between Good and Evil centers around the use of the generative forces of Nature, winged serpents represent the regeneration of the animal nature of man or those Great Ones in whom this regeneration is complete.\n\nAmong the Egyptians the sun's rays are often shown ending in human hands.\n\nMasons will find a connection between these hands and the well-known Paw of the Lion which raises all things to life with its grip.\n\nSOLAR COLORS The theory so long held of three primary and four secondary colors is purely exoteric, for since the earliest periods it has been known that there are seven, and not three, primary colors, the human eye being capable of estimating only three of them.\n\nThus, although green can be made by combining blue and yellow, there is also a true or primary green which is not a compound.\n\nThis can he proved by breaking up the spectrum with a prism.\n\nHelmholtz found that the so-called secondary colors of the spectrum could not be broken up into their supposed primary colors.\n\nThus the orange of the spectrum, if passed through a second prism, does not break up into red and yellow but remains orange.\n\nConsciousness, intelligence, and force are fittingly symbolized by the colors blue, yellow, and red.\n\nThe therapeutic effects of the colors, moreover, are in harmony with this concept, for blue is a fine, soothing, electrical color; yellow, a vitalizing and refining color; and red, an agitating and heat-giving color.\n\nIt has also been demonstrated that minerals and plants affect the human constitution according to their colors."

