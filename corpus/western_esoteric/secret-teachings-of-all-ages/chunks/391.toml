body = "*** The following table shows the angles to which the parties of three (salt, sulphur, and mercury) go in search of CHiram : The Four \"Corners\" of Creation : The Fixed Signs of the Zodiac East : Aquarius South : Leo West : Scorpio North : Taurus The Four \"Corners\" of Creation : The Parts of the Cherubim East : Man South : Lion West : Eagle North : Bull The Four \"Corners\" of Creation : The Four Seasons East : Spring South : Summer West : Autumn North : Winter The Four \"Corners\" of Creation : The Ages of Man East : Childhood South : Youth West : Maturity North : Age The Four \"Corners\" of Creation : The Stages of Existence East : Birth South : Growth West : Maturity North : Decay The Four \"Corners\" of Creation : The Parts of Man's Constitution East : Spirit South : Soul West : Mind North : Body The Four \"Corners\" of Creation : The Four Elements East : Air South : Fire West : Water North : Earth One more table should prove of interest to Masonic scholars: one showing the relationship existing between the three substances, salt, sulphur, and mercury, and certain symbols with which Masons are familiar.\n\nThis table also has an alternative rendering, based on the interblending of philosophic principles, which are difficult--if not impossible--to separate into chronological order.\n\n1.\n\nThe Three Lights Stellar Fire Solar Fire Lunar Fire 2.\n\nThe Three Grand Masters Hiram Solomon Hiram of Tyre 3.\n\nThe Geometric Solids Sphere Pyramid Cube 4.\n\nAlchemical Substances Mercury Sulphur Salt The alternative rendering of No.\n\n2 is: 2.\n\nThe Three Grand Masters Solomon Hiram Hiram of Tyre In alchemy is found again the perpetuation of the Universal Mystery; for as surely as Jesus died upon the cross, Hiram ( CHiram ) at the west gate of the Temple, Orpheus on the banks of the river Hebros, Christna on the banks of the Ganges, and Osiris in the coffin prepared by Typhon, so in alchemy, unless the elements first die, the Great Work cannot be achieved.\n\nThe stages of the alchemical processes can be traced in the lives and activities of nearly all the world Saviors and teachers, and also among the mythologies of several nations.\n\nIt is said in the Bible that \"except a man be born again, he cannot see the kingdom of God.\" In alchemy it is declared that without putrefaction the Great Work cannot be accomplished.\n\nWhat is it that dies on the cross, is buried in the tomb of the Mysteries, and that dies also in the retort and becomes black with putrefaction?\n\nAlso, what is it that does this same thing in the nature of man, that he may rise again, phœnix-like, from his own ashes ( caput mortuum )?\n\nThe solution in the alchemical retort, if digested a certain length of time, will turn into a red elixir, which is called the universal medicine .\n\nIt resembles a fiery water and is luminous in the dark.\n\nDuring the process of digestion it passes through many colors which has given rise to its being called the peacock because of its iridescence during one of the periods of its digestion.\n\nIf the augmentations of its power be carried too far, the test tube containing the substance will explode and vanish as dust.\n\nThis commonly occurs and is the greatest danger involved in the preparation of the medicine for men and metals.\n\nIf developed too far, it will also seep through the glass, for there is no physical container sufficiently strong to hold it, The reason for this is that it is no longer a substance but a divine essence partaking of the interpenetrative power of Divinity."

