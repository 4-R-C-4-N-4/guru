[content]
body = "The specifications of the Tabernacle are described in the book of Exodus, twenty-fifth chapter: \"Then the Lord spake unto Moses, saying, Speake unto the children of Israel that they receive an offering for me: of every man, whose heart giveth it freely, yee shall take the offering for me.\n\nAnd this is the offering which ye shall take of them, gold and silver, and brass, and blue silke, and purple, and scarlet, and fine linnen and goats haire.\n\nAnd rammes skinnes coloured red, and the skinnes of badgers, and the wood Shittim, oyle for the light, spices for anoynting oyle, and for the perfume of sweet favour, onix stones, and stories to be set in the Ephod, and in the breastplate.\n\nAlso they shall make me a Sanctuary, that I may dwell among them.\n\nAccording to all that I shew thee, even so shall ye make the forme of the Tabernacle, and the fashion of all the instruments thereof.\" The court of the Tabernacle was an enclosed area, fifty cubits wide and one hundred cubits long, circumscribed by a wall of linen curtains hung from brazen pillars five cubits apart.\n\n(The cubit is an ancient standard of measurement, its length being equal to the distance between the elbow and the extreme end of the index finger, approximately eighteen inches.) There were twenty of these pillars on each of the longer sides and ten on the shorter.\n\nEach pillar had a base of brass and a capital of silver.\n\nThe Tabernacle was always laid out with the long sides facing north and south and the short sides facing east and west, with the entrance to the east, thus showing the influence of primitive sun worship.\n\nThe outer court served the principal purpose of isolating the tent of the Tabernacle proper, which stood in the midst of the enclosure.\n\nAt the entrance to the courtyard, which was in the eastern face of the rectangle, stood the Altar of Burnt Offerings, made of brass plates over wood and ornamented with the horns of bulls and rams.\n\nFarther in, but on a line with this altar, stood the Laver of Purification, a great vessel containing water for priestly ablutions.\n\nThe Laver was twofold in its construction, the upper part being a large bowl, probably covered, which served as a source of supply for a lower basin in which the priests bathed themselves before participating in the various ceremonials.\n\nIt is supposed that this Laver was encrusted with the metal mirrors of the women of the twelve tribes of Israel.\n\nThe dimensions of the Tabernacle proper were as follows: \"Its length, when it was set up, was thirty cubits, and its breadth was ten cubits.\n\nThe one of its walls was on the south, and the other was exposed to the north, and on the back part of it remained the west.\n\nIt was necessary that its height should be equal to its breadth (ten cubits).\" (Josephus.) It is the custom of bibliologists to divide the interior of the Tabernacle into two rooms: one room ten cubits wide, ten cubits high, and twenty cubits long, which was called the Holy Place and contained three special articles of furniture, namely, the Seven-Branched Candlestick, the Table of the Shewbread, and the Altar of Burnt Incense; the other room ten cubits wide, ten cubits high, and ten cubits long, which was called the Holy of Holies and contained but one article of furniture--the Ark of the Covenant.\n\nThe two rooms were separated from each other by an ornamental veil upon which were embroidered many kinds of flowers, but no animal or human figures."

