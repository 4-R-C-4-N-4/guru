body = "It is a fit type of immortality on account of its tenacity of life; for it has been known, when planted as a door-post, to take root again and shoot out budding boughs above the threshold.\" (See Morals and Dogma .) It is quite possible that much of the veneration accorded the acacia is due to the peculiar attributes of the mimosa , or sensitive plant, with which it was often identified by the ancients.\n\nThere is a Coptic legend to the effect that the sensitive plant was the first of all trees or shrubs to worship Christ.\n\nThe rapid growth of the acacia and its beauty have also caused it to be regarded as emblematic of fecundity and generation.\n\nThe symbolism of the acacia is susceptible of four distinct interpretations: (1) it is the emblem of the vernal equinox--the annual resurrection of the solar deity; (2) under the form of the sensitive plant which shrinks from human touch, the acacia signifies purity and innocence, as one of the Greek meanings of its name implies; (3) it fittingly typifies human immortality and regeneration, and under the form of the evergreen represents that immortal part of man which survives the destruction of his visible nature; (4) it is the ancient and revered emblem of the Mysteries, and candidates entering the tortuous passageways in which the ceremonials were given carried in their hands branches of these sacred plants or small clusters of sanctified flowers.\n\nAlbert G.\n\nMackey calls attention to the fact that each of the ancient Mysteries had its own peculiar plant sacred to the gods or goddesses in whose honor the rituals were celebrated.\n\nThese sacred plants were later adopted as the symbols of the various degrees in which they were used.\n\nThus, in the Mysteries of Adonis, lettuce was sacred; in the Brahmin and Egyptian rites, the lotus; among the Druids, the mistletoe; and among certain of the Greek Mysteries, the myrtle.\n\n(See Encyclopædia of Freemasonry .) As the legend of CHiram Abiff is based upon the ancient Egyptian Mystery ritual of the murder and resurrection of Osiris, it is natural that the sprig of acacia should be preserved as symbolic of the resurrection of CHiram.\n\nThe chest containing the body of Osiris was washed ashore near Byblos and lodged in the roots of a tamarisk, or acacia, which, growing into a mighty tree, enclosed within its trunk the body of the murdered god.\n\nThis is undoubtedly the origin of the story that a sprig of acacia marks the grave of CHiram.\n\nThe mystery of the evergreen marking the grave of the dead sun god is also perpetuated in the Christmas tree.\n\nTHE SUNFLOWER.\n\nFrom Kircher's Magnes sive de Arte Magnetica Opus Tripartitum.\n\nThe above diagram illustrates a curious experiment in plant magnetism reproduced with several other experiments in Athanasius Kircher's rare volume on magnetism.\n\nSeveral plants were sacred to the ancient Egyptians, Greeks, and Hindus because of the peculiar effect which the sun exerted over them.\n\nAs it is difficult for man to look upon the face of the sun without being blinded by the light, those plants which turned and deliberately faced the solar orb were considered typical of very highly advanced souls.\n\nSince the sun was regarded as the personification of the Supreme Deity, those forms of life over which it exercised marked influence were venerated as being sacred to Divinity.\n\nThe sunflower, because of its plainly perceptible affinity for the sun, was given high rank among sacred plants.\n\n*** The apricot and quince are familiar yonic symbols, while the bunch of grapes and the fig are phallic.\n\nThe pomegranate is the mystic fruit of the Eleusinian rites; by eating it, Prosperine bound herself to the realms of Pluto."

