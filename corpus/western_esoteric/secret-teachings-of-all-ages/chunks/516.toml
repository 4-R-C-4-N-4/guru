body = "Petersburg.\" It is evident that M.\n\nde St.-Germain adopted these various names in the interests of the political secret service work which historians have presumed to be the major mission of his life.\n\nThe Comte de St.-Germain has been described as of medium height, well proportioned in body, and of regular and pleasing features.\n\nHis complexion was somewhat swarthy and his hair dark, though often shown powdered.\n\nHe dressed simply, usually in black, but his clothes were well fitting and of the best quality.\n\nHe had apparently a mania for diamonds, which he wore not only in rings but also in his watch and chain, his snuff box, and upon his buckles.\n\nA jeweler once estimated the value of his shoe buckles at 200,000 francs.\n\nThe Comte is generally depicted as a man in middle life, entirely devoid of wrinkles and free from any physical infirmity.\n\nHe ate no meat and drank no wine, in fact seldom dined in the presence of any second person.\n\nAlthough he was looked upon as a charlatan and impostor by a few nobles at the French court, Louis XV severely reprimanded a courtier who made a disparaging remark concerning him.\n\nThe grace and dignity that characterized his conduct, together with his perfect control of every situation, attested the innate refinement and culture of one \"to the manner born.\" This remarkable person also had the surprising and impressive ability to divine, even to the most minute details, the questions of his inquisitors before they were asked.\n\nBy something akin to telepathy he was also able to feel when his presence was needed in some distant city or state, and it has even been recorded of him that he had the astonishing habit not only of appearing in his own apartment and in those of friends without resorting to the conventionality of the door but also of departing therefrom in a similar manner.\n\nM.\n\nde St.-Germain's travels covered many countries.\n\nDuring the reign of Peter III he was in Russia and between the years 1737 and 1742 in the court of the Shah of Persia as an honored guest.\n\nOn the subject: of his wanderings Una Birch writes: \"The travels of the Comte de Saint-Germain covered a long period of years and a great range of countries.\n\nFrom Persia to France and from Calcutta to Rome he was known and respected.\n\nHorace Walpole spoke with him in London in 1745; Clive knew him in India in 1756; Madame d'Adhémar alleges that she met him in Paris in 1789, five years after his supposed death; while other persons pretend to have held conversations with him in the early nineteenth century.\n\nHe was on familiar and intimate terms with the crowned heads of Europe and the honoured friend of many distinguished persons of all nationalities.\n\nHe is even mentioned in the memoirs and letters of the day, and always as a man of mystery.\n\nFrederick the Great, Voltaire, Madame de Pompadour, Rousseau, Chatham, and Walpole, all of whom knew him personally, rivalled each other in curiosity as to his origin.\n\nDuring the many decades in which he was before the world, however, no one succeeded in discovering why he appeared as a Jacobite agent in London, as a conspirator in Petersburg, as an alchemist and connoisseur of pictures in Paris, or as a Russian general at Naples."

