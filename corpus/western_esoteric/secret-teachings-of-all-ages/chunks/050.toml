[content]
body = "The secret exercises for spiritual unfoldment given to disciples of the higher degrees are unknown, but there is every reason to believe that they were similar to the Brahmanic Mysteries, since it is known that the Eleusinian ceremonies were closed with the Sanskrit words \"Konx Om Pax.\" That part of the allegory referring to the two six-month periods during one of which Persephone must remain with Pluto, while during the other she may revisit the upper world, offers material for deep consideration.\n\nIt is probable that the Eleusinians realized that the soul left the body during steep, or at least was made capable of leaving by the special training which undoubtedly they were in a position to give.\n\nThus Persephone would remain as the queen of Pluto's realm during the waking hours, but would ascend to the spiritual worlds during the periods of sleep.\n\nThe initiate was taught how to intercede with Pluto to permit Persephone (the initiate's soul) to ascend from the darkness of his material nature into the light of understanding.\n\nWhen thus freed from the shackles of clay and crystallized concepts, the initiate was liberated not only for the period of his life but for all eternity, for never thereafter was he divested of those soul qualities which after death were his vehicles for manifestation and expression in the so-called heaven world.\n\nIn contrast to the idea of Hades as a state of darkness below, the gods were said to inhabit the tops of mountains, a well-known example being Mount Olympus, where the twelve deities of the Greek pantheon were said to dwell together.\n\nIn his initiatory wanderings the neophyte therefore entered chambers of ever-increasing brilliancy to portray the ascent of the spirit from the lower worlds into the realms of bliss.\n\nAs the climax to such wanderings he entered a great vaulted room, in the center of which stood a brilliantly illumined statue of the goddess Ceres.\n\nHere, in the presence of the hierophant and surrounded by priests in magnificent robes, he was instructed in the highest of the secret mysteries of the Eleusis.\n\nAt the conclusion of this ceremony he was hailed as an Epoptes , which means one who has beheld or seen directly.\n\nFor this reason also initiation was termed autopsy .\n\nThe Epoptes was then given certain sacred books, probably written in cipher, together with tablets of stone on which secret instructions were engraved.\n\nIn The Obelisk in Freemasonry , John A.\n\nWeisse describes the officiating personages of the Eleusinian Mysteries as consisting of a male and a female hierophant who directed the initiations; a male and a female torchbearer; a male herald; and a male and a female altar attendant.\n\nThere were also numerous minor officials.\n\nHe states that, according to Porphyry, the hierophant represents Plato's Demiurgus , or Creator of the world; the torch bearer, the Sun; the altar man, the Moon; the herald, Hermes, or Mercury; and the other officials, minor stars.\n\nFrom the records available, a number of strange and apparently supernatural phenomena accompanied the rituals.\n\nMany initiates claim to have actually seen the living gods themselves.\n\nWhether this was the result of religious ecstasy or the actual cooperation of invisible powers with the visible priests must remain a mystery.\n\nIn The Metamorphosis, or Golden Ass , Apuleius thus describes what in all probability is his initiation into the Eleusinian Mysteries: \"I approached to the confines of death, and having trod on the threshold of Proserpine I, returned from it, being carried through all the elements.\n\nAt midnight I saw the sun shining with a splendid light; and I manifestly drew near to, the gods beneath, and the gods above, and proximately adored them.\" Women and children were admitted to the Eleusinian Mysteries, and at one time there were literally thousands of initiates."

