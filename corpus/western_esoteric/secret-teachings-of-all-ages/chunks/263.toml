[content]
body = "In his editorial notes to the Occult Sciences of Salverte, Anthony Todd Thomson says: \"The Fayes and Fairies are evidently of Scandinavian origin, although the name of Fairy is supposed to be derived from, or rather [is] a modification of the Persian Peri, an imaginary benevolent being, whose province it was to guard men from the maledictions of evil spirits; but with more probability it may be referred to the Gothic Fagur, as the term Elves is from Alfa, the general appellation for the whole tribe.\n\nIf this derivation of the name of Fairy be admitted, we may date the commencement of the popular belief in British Fairies to the period of the Danish conquest.\n\nThey were supposed to be diminutive aerial beings, beautiful, lively, and beneficent in their intercourse with mortals, inhabiting a region called Fairy Land, Alf-heinner; commonly appearing on earth at intervals--when they left traces of their visits, in beautiful green-rings, where the dewy sward had been trodden in their moonlight dances.\" To the sylphs the ancients gave the labor of modeling the snowflakes and gathering clouds.\n\nThis latter they accomplished with the cooperation of the undines who supplied the moisture.\n\nThe winds were their particular vehicle and the ancients referred to them as the spirits of the air.\n\nThey are the highest of all the elementals, their native element being the highest in vibratory rate.\n\nThey live hundreds of years, often attaining to a thousand years and never seeming to grow old.\n\nThe leader of the sylphs is called Paralda , who is said to dwell on the highest mountain of the earth.\n\nThe female sylphs were called sylphids .\n\nA MERMAID.\n\nFrom Lycosthenes' Prodigiorum ac Ostentorum Chronicon.\n\nProbably the most famous of the undines were the mythological mermaids, with which early mariners peopled the Seven Seas.\n\nBelief in the existence of these creatures, the upper half of their bodies human in form and the lower half fishlike, may have been inspired by flocks of penguins seen at great distance, or possibly seals.\n\nIn mediæval descriptions of mermaids, it was also stated that their hair was green like seaweed and that they wore wreaths twisted from the blossoms of subaqueous plants and sea anemones.\n\n*** It is believed that the sylphs, salamanders, and nymphs had much to do with the oracles of the ancients; that in fact they were the ones who spoke from the depths of the earth and from the air above.\n\nThe sylphs sometimes assume human form, but apparently for only short periods of time.\n\nTheir size varies, but in the majority of cases they are no larger than human beings and often considerably smaller.\n\nIt is said that the sylphs have accepted human beings into their communities and have permitted them to live there for a considerable period; in fact, Paracelsus wrote of such an incident, but of course it could not have occurred while the human stranger was in his physical body.\n\nBy some, the Muses of the Greeks are believed to have been sylphs, for these spirits are said to gather around the mind of the dreamer, the poet, and the artist, and inspire him with their intimate knowledge of the beauties and workings of Nature.\n\nTo the sylphs were given the eastern corner of creation.\n\nTheir temperament is mirthful, changeable, and eccentric.\n\nThe peculiar qualities common to men of genius are supposedly the result of the cooperation of sylphs, whose aid also brings with it the sylphic inconsistency.\n\nThe sylphs labor with the gases of the human body and indirectly with the nervous system, where their inconstancy is again apparent."

