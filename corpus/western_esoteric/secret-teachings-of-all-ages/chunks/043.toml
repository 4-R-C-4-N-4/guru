body = "In fact, the Emperor Hadrian, while traveling in Egypt in A.D.\n\n24, declared in a letter to Servianus that the worshipers of Serapis were Christians and that the Bishops of the church also worshiped at his shrine.\n\nHe even declared that the Patriarch himself, when in Egypt, was forced to adore Serapis as well as Christ.\n\n(See Parsons' New Light on the Great Pyramid .) The little-suspected importance of Serapis as a prototype of Christ can be best appreciated after a consideration of the following extract from C.\n\nW.\n\nKing's Gnostics and Their Remains : \"There can be no doubt that the head of Serapis, marked as the face is by a grave and pensive majesty, supplied the first idea for the conventional portraits of the Saviour.\n\nThe Jewish prejudices of the first converts were so powerful that we may be sure no attempt was made to depict His countenance until some generations after all that had beheld it on earth had passed away.\" Serapis gradually usurped the positions previously occupied by the other Egyptian and Greek gods, and became the supreme deity of both religions.\n\nHis power continued until the fourth century of the Christian Era.\n\nIn A.D.\n\n385, Theodosius, that would-be exterminator of pagan philosophy, issued his memorable edict De Idolo Serapidis Diruendo .\n\nWhen the Christian soldiers, in obedience to this order, entered the Serapeum at Alexandria to destroy the image of Serapis which had stood there for centuries, so great was their veneration for the god that they dared not touch the image lest the ground should open at their feet and engulf them.\n\nAt length, overcoming their fear, they demolished the statue, sacked the building, and finally as a fitting climax to their offense burned the magnificent library which was housed within the lofty apartments of the Serapeum.\n\nSeveral writers have recorded the remarkable fact that Christian symbols were found in the ruined foundations of this pagan temple.\n\nSocrates, a church historian of the fifth century, declared that after the pious Christians had razed the Serapeum at Alexandria and scattered the demons who dwelt there under the guise of gods, beneath the foundations was found the monogram of Christ!\n\nTHE ALEXANDRIAN SERAPIS.\n\nFrom Mosaize Historie der Hebreeuwse Kerke.\n\nSerapis is often shown standing on the back of the sacred crocodile, carrying in his left hand a rule with which to measure the inundations of the Nile, and balancing with his right hand a curious emblem consisting of an animal with the heads.\n\nThe first head--that of a lion--signified the present; the second head--that of a wolf--the past; and the third head--that of a dog--the future.\n\nThe body with its three heads was enveloped by the twisted coils of a serpent.\n\nFigures of Serapis are occasionally accompanied by Cerberus, the three-headed dog of Pluto, and--like Jupiter--carry baskets of grain upon their heads.\n\n*** Two quotations will further establish the relationship existing between the Mysteries of Serapis and those of other ancient peoples."

