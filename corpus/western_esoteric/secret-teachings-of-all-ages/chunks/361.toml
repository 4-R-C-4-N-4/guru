body = "The Rosicrucians were also the instigators of the French Revolution, but in this instance were not wholly successful, owing to the fact that the fanaticism of the revolutionists could not be controlled and the Reign of Terror ensued.\n\n2.\n\nThe reformation of science, philosophy, and ethics .\n\nThe Rosicrucians declared that the material arts and sciences were but shadows of the divine wisdom, and that only by penetrating the innermost recesses of Nature could man attain to reality and understanding.\n\nThough calling themselves Christians, the Rosicrucians were evidently Platonists and also profoundly versed in the deepest mysteries of early Hebrew and Hindu theology.\n\nThere is undeniable evidence that the Rosicrucians desired to reestablish the institutions of the ancient Mysteries as the foremost method of instructing humanity in the secret and eternal doctrine.\n\nIndeed, being in all probability the perpetuators of the ancient Mysteries, the Rosicrucians were able to maintain themselves against the obliterating forces of dogmatic Christianity only by absolute secrecy and the subtlety of their subterfuges.\n\nThey so carefully guarded and preserved the Supreme Mystery--the identity and interrelationship of the Three Selves --that no one to whom they did not of their own accord reveal themselves has ever secured any satisfactory information regarding either the existence or the purpose of the Order.\n\nThe Fraternity of R.C., through its outer organization, is gradually creating an environment or body in which the Illustrious Brother C.R.C.\n\nmay ultimately incarnate and consummate for humanity the vast spiritual and material labors of the Fraternity.\n\nTHE ALCHEMICAL ANDROGYNE From the Turbæ Philosophorum.\n\nThe Turbæ Philosophorum is one of the earliest known documents on alchemy in the Latin tongue.\n\nIts exact origin is unknown.\n\nIt is sometimes referred to as The Third Pythagorical Synod.\n\nAs its name implies, it is an assembly of the sages and sets forth the alchemical viewpoints of many of the early Greek philosophers.\n\nThe symbol reproduced above is from a rare edition of the Turbæ Philosophorum published in Germany in 1750, and represents by a hermaphroditic figure the accomplishment of the magnum opus.\n\nThe active and passive principles of Nature were often depicted by male and female figures, and when these two principle, were harmoniously conjoined in any one nature or body it was customary to symbolize this state of perfect equilibrium by the composite figure above shown.\n\n*** A ROSICRUCIAN TITLE PAGE.\n\nFrom Maier's Viatorium.\n\nCount Michael Maier, physician to Rudolph II., was an outstanding figure in the Rosicrucian controversy.\n\nThere is little doubt that he was an initiated member of the Rosicrucian Fraternity, empowered by the Order to promulgate its secrets among the philosophic elect of Europe.\n\nThe above title page shows the seven planets represented by appropriate figures.\n\nBehind the central figure in each case is a smaller emblem, signifying the zodiacal sign in which the planet is enthroned.\n\nIn the arch over the title itself is a portrait of the learned Maier.\n\nThe volume of which this is the title page is devoted to an analysis of the nature and effect of the seven planets, and is couched in alchemical terminology throughout.\n\nMichael Maier concealed his knowledge so cunningly that it is exceedingly difficult to tract from his writings the secrets which he possessed.\n\nHe was profuse in his use of emblems and the greater part of his philosophical lore is concealed in the engravings which illustrate his books.\n\n*** 3.\n\nThe discovery of the Universal Medicine, or panacea, for all forms of disease .\n\nThere is ample evidence that the Rosicrucians were successful in their quest for the Elixir of Life."

