[content]
body = "Upon the first of the leaves, was written in great capital letters of gold, Abraham the Jew, Prince, Priest, Levite, Astrologer, and Philosopher, to the Nation of the Jews, by the Wrath of God dispersed among the Gauls, sendeth Health .\n\nAfter this it was filled with great execrations and curses (with this word Maranatha , which was often repeated there) against every person that should cast his eyes upon it, if he were not Sacrificer or Scribe.\n\n\"He that sold me this book knew not what it was worth nor more than I when I bought it; I believe it had been stolen or taken from the miserable Jews, or found in some part of the ancient place of their abode.\n\nWithin the book, in the second leaf, he comforted his nation, counselling them to fly vices, and above all idolatry, attending with sweet patience the coming of the Messias, Who should vanquish all the kings of the earth and should reign with His people in glory eternally.\n\nWithout doubt this had been some very wise and understanding man.\n\n\"In the third leaf, and in all the other writings that followed, to help his captive nation to pay their tributes unto the Roman emperors, and to do other things, which I will not speak of, he taught them in common words the transmutation of metals; he painted the vessels by the sides, and he advertised them of the colors, and of all the rest, saving of the first agent, of the which he spake not a word, but only (as he said) in the fourth and fifth leaves entire he painted it, and figured it with very great cunning and workman ship: for although it was well and intelligibly figured and painted, yet no man could ever have been able to understand it, without being well skilled in their Cabala, which goeth by tradition, and without having well studied their books.\n\n\"The fourth and fifth leaves therefore, were without any writing, all full of fair figures enlightened, or as it were enlightened, for the work was very exquisite.\n\nFirst he painted a young man with wings at his ancles, having in his hand a Caducean rod, writhen about with two serpents, wherewith he struck upon a helmet which covered his head.\n\nHe seemed to my small judgment, to be the God Mercury of the pagans: against him there came running and flying with open wings, a great old man, who upon his head had an hour glass fastened, and in his hand a book (or syrhe) like death, with the which, in terrible and furious manner, he would have cut off the feet of Mercury.\n\nOn the other side of the fourth leaf, he painted a fair flower on the top of a very high mountain which was sore shaken with the North wind; it had the foot blue, the flowers white and red, the leaves shining like fine gold: and round about it the dragons and griffons of the North made their nests and abode.\n\n\"On the fifth leaf there was a fair rose tree flowered in the midst of a sweet garden, climbing up against a hollow oak; at the foot whereof boiled a fountain of most white water, which ran headlong down into the depths, notwithstanding it first passed among the hands of infinite people, who digged in the earth seeking for it; but because they were blind, none of them knew it, except here and there one who considered the weight."

