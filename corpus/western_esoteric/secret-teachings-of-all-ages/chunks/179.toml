body = "This knowledge of how man's manifold constitution could be most quickly and most completely regenerated to the point of spiritual illumination constituted the secret, or esoteric, doctrine of antiquity.\n\nCertain apparently physical organs and centers are in reality the veils or sheaths of spiritual centers.\n\nWhat these were and how they could be unfolded was never revealed to the unregenerate, for the philosophers realized that once he understands the complete working of any system, a man may accomplish a prescribed end without being qualified to manipulate and control the effects which he has produced.\n\nFor this reason long periods of probation were imposed, so that the knowledge of how to become as the gods might remain the sole possession of the worthy.\n\nTHE THREEFOLD LIFE OF THE INNER MAN.\n\nRedrawn from Gichtel's Theosophia Practica.\n\nJohann Georg Gichtel, a profound Philosopher and mystic, the most illumined of the disciples of Jakob Böhme, secretly circulated the above diagrams among a small group of devoted friends and students.\n\nGichtel republished the writings of Böhme, illustrating them with numerous remarkable figures.\n\nAccording to Gichtel, the diagrams above, represent the anatomy of the divine (or inner) man, and graphically set forth its condition during its human, infernal, and divine states.\n\nThe plates in the William Law edition of Böhme's works are based apparently upon Gichtel's diagrams, which they follow in all essentials.\n\nGichtel gives no detailed description of his figures, and the lettering on the original diagrams here translated out of the German is the only clue to the interpretation of the charts.\n\nThe two end figures represent the obverse and reverse of the same diagram and are termed Table Three.\n\nThey are \"designed to show the Condition of the whole Man, as to all his three essential Parts, Spirit, Soul, and Body, in his Regenerated State.\" The third figure from the left is called the Second Table, and sets forth \"the Condition of Man in his old, lapsed, and corrupted State; without any respect to, or consideration of his renewing by regeneration.\" The third figure, however, does not correspond with the First Table of William Law.\n\nThe First Table presumably represents the condition of humanity before the Fall, but the Gichtel plate pertains to the third, or regenerated, state of mankind.\n\nWilliam Law thus describes the purpose of the diagrams, and the symbols upon them: \"These three tables are designed to represent Man in his different Threefold State: the First before his Fall, in Purity, Dominion, and Glory: the Second after his Fall, in Pollution and Perdition: and the Third in his rising from the Fall, or on the Way of regeneration, in Sanctification and Tendency to his last Perfection.\" The student of Orientalism will immediately recognize in the symbols upon the figures the Hindu chakras, or centers of spiritual force, the various motions and aspects of which reveal the condition of the disciple's internal divine nature.\n\n*** Lest that knowledge be lost, however, it was concealed in allegories and myths which were meaningless to the profane but self-evident to those acquainted with that theory of personal redemption which was the foundation of philosophical theology.\n\nChristianity itself may be cited as an example.\n\nThe entire New Testament is in fact an ingeniously concealed exposition of the secret processes of human regeneration.\n\nThe characters so long considered as historical men and women are really the personification of certain processes which take place in the human body when man begins the task of consciously liberating himself from the bondage of ignorance and death.\n\nThe garments and ornamentations supposedly worn by the gods are also keys, for in the Mysteries clothing was considered as synonymous with form.\n\nThe degree of spirituality or materiality of the organisms was signified by the quality, beauty, and value of the garments worn."

