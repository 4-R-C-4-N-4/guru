body = "Yonder, too, exists an earth, not of inanimate matter, but vivid with animal life and all natural terrestrial phenomena like this one, but of other kinds and perfections.\n\nThere are plants, also, and gardens, and flowing water; there are aquatic animals but of nobler species.\n\nYonder is air and life appropriate to it, all immortal.\n\nAnd although the life there is analogous to ours, yet it is nobler, seeing that it is intellectual, perpetual and unalterable.\n\nFor if anyone should object and ask, How in the world above do the plants, etc.\n\nabove mentioned find footing, we should answer that they do not have objective existence, for they were produced by the primal Author in an absolute condition and without exteriorization.\n\nThey are, therefore, in the same case as intellect and soul; they suffer no defect such as waste and corruption, since the beings yonder are full of energy, strength and joy, as living in a life sublime and being the issue of one fount and of one quality, compounded of all like sweet savors, delicate perfumes, harmonious color and sound, and other perfections.\n\nNor do they move violently about nor intermix nor corrupt each other, but each perfectly preserves its own essential character; and they are simple and do not multiply as corporeal beings do.\" In the midst of the Table is a great covered throne with a seated female figure representing Isis, but here called the Pantomorphic IYNX.\n\nG.\n\nR.\n\nS.\n\nMead defines the IYNX as \"a transmitting intelligence.\" Others have declared it to be a symbol of Universal Being.\n\nOver the head of the goddess the throne is surmounted by a triple crown, and beneath her feet is the house of material substance.\n\nThe threefold crown is here symbolic of the Triune Divinity, called by the Egyptians the Supreme Mind, and described in the Sepher ha Zohar as being \"hidden and unrevealed.\" According to the Hebrew system of Qabbalism, the Tree of the Sephiroth was divided into two parts, the upper invisible and the lower visible.\n\nThe upper consisted of three parts and the lower of seven.\n\nThe three uncognizable Sephiroth were called Kether , the Crown; Chochmah , Wisdom; and Binah , Understanding.\n\nThese are too abstract to permit of comprehension, whereas the lower seven spheres that came forth from them were within the grasp of human consciousness.\n\nThe central panel contains seven triads of figures.\n\nThese represent the lower Sephiroth, all emanating from the concealed threefold crown over the throne.\n\nWESTCOTT'S KEY TO THE BEMBINE TABLE.\n\nFrom Westcott's The Isiac Tablet.\n\nZoroaster declared that the number three shines throughout the world.\n\nThis is revealed in the Bembine, Table by a series of triads representing the creative impulses.\n\nOf the Isiac Table Alexandre Lenoir writes: \"The Isiac Table, as a work of art, is not of great interest.\n\nit is but a composition, rather cold and insignificant, whose figures, summarily sketched and methodically placed near each other, give but little impression of life.\n\nBut, if on the contrary after examining it, we understand the purpose of the author, we become soon convinced that the Isiac Table is an image of the heavenly sphere divided in small parts to be used very like, for general teaching.\n\nAccording to that idea, we can conclude that the Isiac Table was originally the introduction to a collection followed by the Mysteries of Isis.\n\nIt was engraved on copper in order to be used in the ceremonial of initiation.\" (See New Essay on the Isiac Table.) *** Kircher writes: \"The throne denotes the diffusion of the triform Supreme Mind along the universal paths of the three worlds."

