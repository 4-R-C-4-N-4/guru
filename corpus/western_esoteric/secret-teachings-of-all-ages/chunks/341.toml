body = "The twelve prophets, the twelve patriarchs, the twelve tribes, and the twelve Apostles--each group has a certain occult significance, for each refers to the Divine Duodecimo, or Twelvefold Deity, whose emanations are manifested in the tangible created Universe through twelve individualized channels.\n\nThe secret doctrine also caught the priests that the jewels represented centers of life within their own constitutions, which when unfolded according to the esoteric instructions of the Temple, were capable of absorbing into themselves and radiating forth again the Divine light of the Deity.\n\n(The East Indian lotus blossoms have a similar meaning.) The Rabbis have taught that each twisted linen thread used in weaving the Tabernacle curtains and ornamentations consisted of twenty-four separate strands, reminding the discerning that the experience, gained during the twenty-four hours of the day (symbolized in Masonry by the twenty-four-inch rule) becomes the threads from which are woven the Garments of Glory.\n\nTHE URIM AND THUMMIM In the reverse side of the Essen , or breastplate, was a pocket containing mysterious objects--the Urim and Thummim .\n\nAside from the fact that they were used in divination, little is now known about these objects.\n\nSome writers contend that they were small stones (resembling the fetishes still revered by certain aboriginal peoples) which the Israelites had brought with them out of Egypt because of their belief that they possessed divine power.\n\nOthers believe that the Urim and Thummim were in the form of dice, used for deciding events by being cast upon the ground.\n\nA few have maintained that they were merely sacred names, written on plates of gold and carried as talismans.\n\n\"According to some, the Urim and the Thummim signify 'lights and perfections,' or 'light and truth' which last present a striking analogy to the.\n\ntwo figures of Re (Ra) and Themi in the breastplate worn by the Egyptians.\" (Gardner's The Faiths of the World .) Not the least remarkable of the vestments of the High Priest was his bonnet, or headdress.\n\nOver the plain white cap of the ordinary priest this dignitary wore an outer cloth of blue and a crown of gold, the crown consisting of three bands, one above the other like the triple miter of the Persian Magi.\n\nThis crown symbolized that the High Priest was ruler not only over the three worlds which the ancients had differentiated (heaven, earth, and hell), but also over the threefold divisions of man and the universe--the spiritual, intellectual, and material worlds.\n\nThese divisions were also symbolized by the three apartments of the Tabernacle itself.\n\nAt the peak of the headdress was a tiny cup of gold, made in the form of a flower.\n\nThis signified that the nature of the priest was receptive and that he had a vessel in his own soul which, cuplike, was capable of catching the eternal waters of life pouring upon him from the heavens above.\n\nThis flower over the crown of his head is similar in its esoteric meaning to the rose growing out of a skull, so famous in Templar symbology.\n\nThe ancients believed that the spiritual nature escaping from the body passed upward through the crown of the head; therefore, the flowerlike calyx, or cup, symbolized also the spiritual consciousness.\n\nOn the front of the golden crown were inscribed in Hebrew, Holiness unto the Lord .\n\nThough robes and ornaments augmented the respect and veneration of the Israelites for their High Priest, such trappings meant nothing to Jehovah.\n\nTherefore, before entering the Holy of Holies, the High Priest removed his earthly finery and entered into the presence of the Lord God of Israel unclothed.\n\nThere he could be robed only in his own virtues, and his spirituality must adorn him as a garment."

