[content]
body = "By the man of Ezekiel's vision is symbolized the World of Atziluth ; by the throne, the World of Briah ; by the firmament, the World of Yetzirah ; and by the living creatures the World of Assiah .\n\nThese spheres are the wheels within wheels of the prophet.\n\nThe Qabbalists next established a human figure in each of the four worlds: A 1 was the head and A 10 the feet of the man of Atziluth ; B 1 was the head and B 10 the feet of the man of Briah ; C 1 was the head and C 10 the feet of the man of Yetzirah ; D 1 was the head and D 10 the feet of the man of Assiah .\n\nThese four are called the World Men .\n\nThey are considered androgynous and are the prototypes of humanity.\n\nThe human body, like that of the universe, is considered to be a material expression of ten globes or spheres of light.\n\nTherefore man is called the Microcosm--the little world, built in the image of the great world of which he is a part.\n\nThe Qabbalists also established a mysterious universal man with his head at A 1 and his feet at D 10.\n\nThis is probably the secret significance of the great figure of Nebuchadnezzar's dream, with its head in the World of Atziluth , its arms and hands in the World of Briah , its generative system in the World of Yetzirah , and its legs and feet in the World of Assiah .\n\nThis is the Grand Man of the Zohar , of whom Éliphas Lévi writes: \"It is not less astonishing to observe at the beginning of the Zohar the profundity of its notions and the sublime simplicity of its images.\n\nIt is said as follows: 'The science of equilibrium is the key of occult science.\n\nUnbalanced forces perish in the void.\n\nSo passed the kings of the elder world, the princes of the giants.\n\nThey have fallen like trees without roots, and their place is found no more.\n\nThrough the conflict of unbalanced forces, the devastated earth was void and formless, until the Spirit of God made for itself a place in heaven and reduced the mass of waters.\n\nAll the aspirations of Nature were directed then towards unity of form, towards the living synthesis (if equilibrated forces; the face of God, crowned with light, rose over the vast sea and was reflected in the waters thereof.\n\nHis two eyes were manifested, radiating with splendour, darting two beams of light which crossed with those of the reflection.\n\nThe brow of God and His eyes formed a triangle in heaven, and its reflection formed a second triangle in the waters.\n\nSo was revealed the number six, being that of universal creation.' The text, which would be unintelligible in a literal version, is translated here by way of interpretation.\n\nThe author makes it plain that the human form which he ascribes to Deity is only an image of his meaning and that God is beyond expression by human thought or representation by any figure.\n\nPascal said that God is a circle, of which the center is everywhere and the circumference nowhere.\n\nBut how is one to imagine a circle apart from its circumference?\n\nThe Zohar adopts the antithesis of this paradoxical image and in respect of the circle of Pascal would say rather that the circumference is everywhere, while that which is nowhere is the center.\n\nIt is however to a balance and not to a circle that it compares the universal equilibrium of things.\n\nIt affirms that equilibrium is everywhere and so also is the central point where the balance hangs in suspension.\n\nWe find that the Zohar is thus more forcible and more profound than Pascal."

