[content]
body = "The hymns of praise no longer echo in muffled tones through the chambers; the neophyte no longer passes through the elements and wanders among the seven stars; the candidate no longer receives the \"Word of Life\" from the lips of the Eternal One.\n\nNothing now remains that the eye of man can see but an empty shell--the outer symbol of an inner truth--and men call the House of God a tomb!\n\nThe technique of the Mysteries was unfolded by the Sage Illuminator, the Master of the Secret House.\n\nThe power to know his guardian spirit was revealed to the new initiate; the method of disentangling his material body from.\n\nhis divine vehicle was explained; and to consummate the magnum opus , there was revealed the Divine Name--the secret and unutterable designation of the Supreme Deity, by the very knowledge of which man and his God are made consciously one.\n\nWith the giving of the Name, the new initiate became himself a pyramid , within the chambers of whose soul numberless other human beings might also receive spiritual enlightenment.\n\nIn the King's Chamber was enacted the drama of the \"second death.\" Here the candidate, after being crucified upon the cross of the solstices and the equinoxes, was buried in the great coffer.\n\nThere is a profound mystery to the atmosphere and temperature of the King's Chamber: it is of a peculiar deathlike cold which cuts to the marrow of the bone.\n\nThis room was a doorway between the material world and the transcendental spheres of Nature.\n\nWhile his body lay in the coffer, the soul of the neophyte soared as a human-headed hawk through the celestial realms, there to discover first hand the eternity of Life, Light, and Truth, as well as the illusion of Death, Darkness, and Sin.\n\nThus in one sense the Great Pyramid may be likened to a gate through which the ancient priests permitted a few to pass toward the attainment of individual completion.\n\nIt is also to be noted incidentally that if the coffer in the King's Chamber be struck, the sound emitted has no counterpart in any known musical scale.\n\nThis tonal value may have formed part of that combination of circumstances which rendered the King's Chamber an ideal setting for the conferment of the highest degree of the Mysteries.\n\nThe modern world knows little of these ancient rites.\n\nThe scientist and the theologian alike gaze upon the sacred structure, wondering what fundamental urge inspired the herculean labor.\n\nIf they would but think for a moment, they would realize that there is only one urge in the soul of man capable of supplying the required incentive--namely, the desire to know, to understand, and to exchange the narrowness of human mortality for the greater breadth and scope of divine enlightenment.\n\nSo men say of the Great Pyramid that it is the most perfect building in the world, the source of weights and measures, the original Noah's Ark, the origin of languages, alphabets,.\n\nand scales of temperature and humidity.\n\nFew realize, however, that it is the gateway to the Eternal.\n\nThough the modern world may know a million secrets, the ancient world knew one--and that one was greater than the million; for the million secrets breed death, disaster, sorrow, selfishness, lust, and avarice, but the one secret confers life, light, and truth.\n\nThe time will come when the secret wisdom shall again be the dominating religious and philosophical urge of the world.\n\nThe day is at hand when the doom of dogma shall be sounded.\n\nThe great theological Tower of Babel, with its confusion of tongues, was built of bricks of mud and the mortar of slime.\n\nOut of the cold ashes of lifeless creeds, however, shall rise phœnixlike the ancient Mysteries."

