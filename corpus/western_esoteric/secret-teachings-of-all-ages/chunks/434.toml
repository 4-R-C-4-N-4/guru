[content]
body = "NO treatise which deals with symbolism would be complete without a section devoted to the consideration of cryptograms.\n\nThe use of ciphers has long been recognized as indispensable in military and diplomatic circles, but the modern world has overlooked the important role played by cryptography in literature and philosophy.\n\nIf the art of deciphering cryptograms could be made popular, it would result in the discovery of much hitherto unsuspected wisdom possessed by both ancient and medieval philosophers.\n\nIt would prove that many apparently verbose and rambling authors were wordy for the sake of concealing words.\n\nCiphers are hidden in the most subtle manner: they may be concealed in the watermark of the paper upon which a book is printed; they may be bound into the covers of ancient books; they may be hidden under imperfect pagination; they may be extracted from the first letters of words or the first words of sentences; they may be artfully concealed in mathematical equations or in apparently unintelligible characters; they may be extracted from the jargon of clowns or revealed by heat as having been written in sympathetic ink; they may be word ciphers, letter ciphers, or apparently ambiguous statements whose meaning could be understood only by repeated careful readings; they may he discovered in the elaborately illuminated initial letters of early books or they may be revealed by a process of counting words or letters.\n\nIf those interested in Freemasonic research would give serious consideration to this subject, they might find in books and manuscripts of the sixteenth and seventeenth centuries the information necessary to bridge the gap in Masonic history that now exists between the Mysteries of the ancient world and the Craft Masonry of the last three centuries.\n\nThe arcana of the ancient Mysteries were never revealed to the profane except through the media of symbols.\n\nSymbolism fulfilled the dual office of concealing the sacred truths from the uninitiated and revealing them to those qualified to understand the symbols.\n\nForms are the symbols of formless divine principles; symbolism is the language of Nature.\n\nWith reverence the wise pierce the veil and with clearer vision contemplate the reality; but the ignorant, unable to distinguish between the false and the true, behold a universe of symbols.\n\nIt may well be said of Nature--the Great Mother--that she is ever tracing strange characters upon the surface of things, but only to her eldest and wisest sons as a reward for their faith and devotion does she reveal the cryptic alphabet which is the key to the import of these tracings.\n\nThe temples of the ancient Mysteries evolved their own sacred languages, known only to their initiates and never spoken save in the sanctuary.\n\nThe illumined priests considered it sacrilege to discuss the sacred truths of the higher worlds or the divine verities of eternal Nature in the same tongue as that used by the vulgar for wrangling and dissension.\n\nA sacred science must needs be couched in a sacred language.\n\nSecret alphabets also were invented, and whenever the secrets of the wise were committed to writing, characters meaningless to the uninformed were employed.\n\nSuch forms of writing were called sacred or Hermetic alphabets.\n\nSome--such as the famous angelic writing --are still retained in the higher degrees of Masonry.\n\nSecret alphabets were not entirely satisfactory, however, for although they rendered unintelligible the true nature of the writings, their very presence disclosed the fact of concealed information--which the priests also sought to conceal.\n\nThrough patience or persecution, the keys to these alphabets were eventually acquired and the contents of the documents revealed to the unworthy.\n\nThis necessitated employment of more subtle methods for concealing the divine truths.\n\nThe result was the appearance of cryptic systems of writing designed to conceal the presence of both the message and the cryptogram.\n\nHaving thus devised a method of transmitting their secrets to posterity, the illuminati encouraged the circulation of certain documents specially prepared through incorporating into them ciphers containing the deepest secrets of mysticism and philosophy."

