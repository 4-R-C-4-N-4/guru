body = "The Divine Pymander consists of seventeen fragmentary writings gathered together and put forth as one work.\n\nThe second book of The Divine Pymander , called Poimandres , or The Vision , is believed to describe the method by which the divine wisdom was first revealed to Hermes.\n\nIt was after Hermes had received this revelation that he began his ministry, teaching to all who would listen the secrets of the invisible universe as they had been unfolded to him.\n\nThe Vision is the most: famous of all the Hermetic fragments, and contains an exposition of Hermetic cosmogony and the secret sciences of the Egyptians regarding the culture and unfoldment of the human soul.\n\nFor some time it was erroneously called \"The Genesis of Enoch,\" but that mistake has now been rectified.\n\nAt hand while preparing the following interpretation of the symbolic philosophy concealed within The Vision of Hermes the present author has had these reference works: The Divine Pymander of Hermes Mercurius Trismegistus (London, 1650), translated out of the Arabic and Greek by Dr.\n\nEverard; Hermetica (Oxford, 1924), edited by Walter Scott; Hermes, The Mysteries of Egypt (Philadelphia, 1925), by Edouard Schure; and the Thrice-Greatest Hermes (London, 1906), by G.\n\nR.\n\nS.\n\nMead.\n\nTo the material contained in the above volumes he has added commentaries based upon the esoteric philosophy of the ancient Egyptians, together with amplifications derived partly from other Hermetic fragments and partly from the secret arcanum of the Hermetic sciences.\n\nFor the sake of clarity, the narrative form has been chosen in preference to the original dialogic style, and obsolete words have given place to those in current use.\n\nHermes, while wandering in a rocky and desolate place, gave himself over to meditation and prayer.\n\nFollowing the secret instructions of the Temple, he gradually freed his higher consciousness from the bondage of his bodily senses; and, thus released, his divine nature revealed to him the mysteries of the transcendental spheres.\n\nHe beheld a figure, terrible and awe-inspiring.\n\nIt was the Great Dragon, with wings stretching across the sky and light streaming in all directions from its body.\n\n(The Mysteries taught that the Universal Life was personified as a dragon.) The Great Dragon called Hermes by name, and asked him why he thus meditated upon the World Mystery.\n\nTerrified by the spectacle, Hermes prostrated himself before the Dragon, beseeching it to reveal its identity.\n\nThe great creature answered that it was Poimandres , the Mind of the Universe , the Creative Intelligence, and the Absolute Emperor of all.\n\n(Schure identifies Poimandres as the god Osiris.) Hermes then besought Poimandres to disclose the nature of the universe and the constitution of the gods.\n\nThe Dragon acquiesced, bidding Trismegistus hold its image in his mind.\n\nImmediately the form of Poimandres changed.\n\nWhere it had stood there was a glorious and pulsating Radiance.\n\nThis Light was the spiritual nature of the Great Dragon itself.\n\nHermes was \"raised\" into the midst of this Divine Effulgence and the universe of material things faded from his consciousness.\n\nPresently a great darkness descended and, expanding, swallowed up the Light.\n\nEverything was troubled.\n\nAbout Hermes swirled a mysterious watery substance which gave forth a smokelike vapor.\n\nThe air was filled with inarticulate moanings and sighings which seemed to come from the Light swallowed up in the darkness.\n\nHis mind told Hermes that the Light was the form of the spiritual universe and that the swirling darkness which had engulfed it represented material substance.\n\nTHOTH, THE IBIS-HEADED.\n\nFrom Wilkinson's Manners & Customs of the Ancient Egyptians."

