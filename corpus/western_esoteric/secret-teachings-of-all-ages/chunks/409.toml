body = "In the upper right the true herb of the philosophers is described, and it is declared that whoever believes in and it shall be [spiritually] rich.\n\nThe panel concludes thus: \"Understand thoroughly what it is that the man has in either hand if you wish to be enlightened.\" The text to the left above the sun reads: \"Entirely without the Sun and Moon, make dye; dissolve, congeal, and like produces for itself like.\" The words to the right of the man holding the Philosopher's herb declare sublimation to be the beginning, the middle and the end of the Great Work.\n\nThe last sentence reads: \"Out of the Sun and Moon make a thing of equal parts, and by their union, God willing, let the Philosopher's Stone be made.\" Leaf 10 .\n\nThe two short lines of text at upper left read: \"Some take a recent stone.\" The lines to the right of the symbol of Mars (iron) admonish the student to control his appetites and apply his mind to the accumulation of knowledge.\n\nNo satisfactory translation can be found for the words under the outstretched arm of the man holding the upper part of the tree.\n\nThe lower panel reads thus: \"After the Stone has been well refined it will appear to penetrate thoroughly.\n\nIt should be put into its vessel with its water.\n\nClose it well with a little fire, and await the wonders of Nature.\" The large red oval filling the lower half of the leaf is evidently the egg or vessel of the Sages.\n\nThe tree is a symbol of the growth of the sacred metals, for the alchemists affirmed that the metals are like plants and grow in the rocks, spreading their branches (veins) through the interstices.\n\nLeaf 11 .\n\nThe fount is described as that from which the two Mercuries of the Philosophers are extracted.\n\nAt the upper left is described the white Mercury and at the right the red Mercury.\n\nThe text about the fountain declares that Saturn collects the white Mercury, which is called the Water of Earth; and the Earth collects the red Mercury, which is called the Water of Heaven.\n\nThe text to the left of the frog reads: \"Through Him who created the Heavens and the Earth I am the Philosopher's Stone, and in my body I carry something the wise seek.\n\nIf such a charm be extracted from me, it will be a sweet refreshment for you.\n\nI am an animal having father and mother, and father and mother were created; and in my body are contained the four elements, and I am before father and mother and I am a poisonous animal.\" The lines at the right describe distilling and calcining processes.\n\nLeaf 12 .\n\nThe three words at the top read: \"This is Nature.\" The lines above the donkey read: \"This is the Philosophers' donkey who wished to rise to the practice of the Philosopher's Some.\" The three lines below the animal are translated: \"Frogs gather in multitudes but science consists of clear water made from the Sun and Moon.\" The text under the symbolic bird is as follows: \"This is fortune with two wings.\n\nWhosoever has it knows that fruit will in such away be produced.\n\nA great philosopher has shown that the stone is a certain white sun, to see which needs a telescope.\n\nTo dissolve it in water requires the Sun and Moon, and here one must open 200 telescopes, putting body and soul in one mass.\n\nAnd here is lost the mass; other sages cook the frogs and add nothing, if the juice of the Wise you wish to enjoy.\" To the Greeks the frog symbolized both metempsychosis and earthly humidity.\n\nLeaf 13 .\n\nThis Page contains but two figures."

