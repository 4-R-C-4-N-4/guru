[content]
body = "Chapter Two 1.\n\nThere are twenty-two basic (sounds and) letters.\n\nThree are the first elements (water, air, fire), fundamentals, or mothers; seven are double letters; and twelve are simple letters.\n\nThe three fundamental letters אמשhave as their basis the balance.\n\nAt one end of the scale are the virtues and at the other the vices, placed in equilibrium by the tongue.\n\nOf the fundamental letters מ(M) is mute like the water, ש(Sh) hissing like fire, א(A) a reconciling breath between them.\n\nt 2.\n\nThe twenty-two basic letters having been designed, appointed, and established by God, He combined, weighed, and exchanged them (each with the others), and formed by them all beings which are in existence, and all which will be formed in time to come.\n\n3.\n\nHe established twenty-two basic letters, formed by the voice and impressed upon the air by the breath.\n\nHe set them to be audibly uttered in five different parts of the human mouth: namely, Gutturals, אהחע; Palatals, גיכק; Linguals, דטלנתDentals, זשסרץ; Labials, בומף.\n\n4.\n\nHe fixed the twenty-two basic letters in a ring (sphere) like a wall with two hundred and thirty-one gates, and turned the sphere forward and backward.\n\nTurned forward, the sphere signified good; when reversed, evil.\n\nThree letters may serve for an illustration: There is nothing better than ענג(O, N, G), pleasure (joy), and nothing worse than נגע(N, G, O), plague (sorrow).\n\n5.\n\nHow was it all accomplished?\n\nHe combined, weighed, and changed: the א(A) with all the other letters in succession, and all the others again with א(A), and all again with ב(B); and so with the whole series of letters.\n\nHence it follows that there are two hundred and thirty-one formations, or gates, through which the powers of the letters go forth; every creature and every language proceeded from One Name and the combinations of its letters.\n\n6.\n\nHe created a reality out of Nothing.\n\nHe called the nonentity into existence and hewed colossal pillars from intangible air.\n\nThis has been shown by the example of combining the letter א(A) with all the other letters, and all the other letters with א.\n\nBy speaking He created every creature and every word by the power of One Name.\n\nAs an illustration, consider the twenty-two elementary substances from the primitive substance of א.\n\nThe production of every creature from the twenty-two letters is proof that they are in reality the twenty-two parts of one living body.\n\nChapter Three 1.\n\nThe first three elements (the Mother letters, אמש) resemble a balance, in one scale virtue and in the other vice, placed in equilibrium by the tongue.\n\n2.\n\nThe three Mothers, אמש, enclose a great, wonderful, and unknown mystery, and are sealed by six wings (or elementary circles), namely, air, water, fire--each divided into an active and a passive power.\n\nThe Mothers, אמש, gave birth to the Fathers (the progenitors), and these gave birth to the generations.\n\n3.\n\nGod appointed and established three Mothers, אמש, combined, weighed, and exchanged them, forming by them three Mothers, in the universe, in the year, and in man (male and female).\n\n4.\n\nThe three Mothers, אמש, in the universe are: air, water, and fire."

