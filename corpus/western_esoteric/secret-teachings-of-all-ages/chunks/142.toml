body = "But when she places herself on the seat of the God, she becomes co-adapted to his stable prophetic power: and from both of these preparatory operations she becomes wholly possessed by the God.\n\nAnd then, indeed, he is present with and illuminates her in a separate manner, and is different from the fire, the spirit, the proper seat, and, in short, from all the visible apparatus of the place, whether physical or sacred.\" Among the celebrities who visited the oracle of Delphi were the immortal Apollonius of Tyana and his disciple Damis.\n\nHe made his offerings and, after being crowned with a laurel wreath and given a branch of the same plant to carry in his hand, he passed behind the statue of Apollo which stood before the entrance to the cave, and descended into the sacred place of the oracle.\n\nThe priestess was also crowned with laurel and her head bound with a band of white wool.\n\nApollonius asked the oracle if his name would be remembered by future generations.\n\nThe Pythoness answered in the affirmative, but declared that it would always be calumniated.\n\nApollonius left the cavern in anger, but time has proved the accuracy of the prediction, for the early church fathers perpetuated the name of Apollonius as the Antichrist.\n\n(For details of the story see Histoire de la Magie .) The messages given by the virgin prophetess were turned over to the philosophers of the oracle, whose duty it was to interpret and apply them.\n\nThe communications were then delivered to the poets, who immediately translated them into odes and lyrics, setting forth in exquisite form the statements supposedly made by Apollo and making them available for the populace.\n\nSerpents were much in evidence at the oracle of Delphi.\n\nThe base of the tripod upon which the Pythia sat was formed of the twisted bodies of three gigantic snakes.\n\nAccording to some authorities, one of the processes used to produce the prophetic ecstasy was to force the young priestess to gaze into the eyes of a serpent.\n\nFascinated and hypnotized, she then spoke with the voice of the god.\n\nAlthough the early Pythian priestesses were always maidens--some still in their teens--a law was later enacted that only women past fifty years of age should be the mouthpiece of the oracle.\n\nThese older women dressed as young girls and went through the same ceremonial as the first Pythiæ.\n\nThe change was probably the indirect result of a series of assaults made upon the persons of the priestesses by the profane.\n\nDuring the early history of the Delphian oracle the god spoke only at each seventh birthday of Apollo.\n\nAs time went on, however, the demand became so great that the Pythia was forced to seat herself upon the tripod every month.\n\nThe times selected for the consultation and the questions to be asked were determined by lot or by vote of the inhabitants of Delphi.\n\nIt is generally admitted that the effect of the Delphian oracle upon Greek culture was profoundly constructive.\n\nJames Gardner sums up its influence in the following words: \"It responses revealed many a tyrant and foretold his fate.\n\nThrough its means many an unhappy being was saved from destruction and many a perplexed mortal guided in the right way.\n\nIt encouraged useful institutions, and promoted the progress of useful discoveries.\n\nIts moral influence was on the side of virtue, and its political influence in favor of the advancement of civil liberty.\" (See The Faiths of The World .) The oracle of Dodona was presided over by Jupiter, who uttered prophecies through oak trees, birds, and vases of brass.\n\nMany writers have noted the similarities between the rituals of Dodona and those of the Druid priests of Britain and Gaul."

