body = "In consternation, the princes of Xibalba then counseled together how they could destroy the intrepid neophytes and forthwith prepared for them the next ordeal.\n\nFor their fourth test, the two brothers were made to enter the House of Cold, where they remained for an entire night.\n\nThe princes of Xibalba considered the chill of the icy cavern to be unbearable and it is described as \"the abode of the frozen winds of the North.\" Hunahpu and Xbalanque, however, protected themselves from the deadening influence of the frozen air by building fires of pine cones, whose warmth caused the spirit of cold to leave the cavern so that the youths were not dead but full of life when day dawned.\n\nEven greater than before was the amazement of the princes of Xibalba when Hunahpu and Xbalanque again entered the Hall of Assembly in the custody of their guardians.\n\nThe fifth ordeal was also of a nocturnal nature.\n\nHunahpu and Xbalanque were ushered into a great chamber which was immediately filled with ferocious tigers.\n\nHere they were forced to remain throughout the night.\n\nThe young men tossed bones to the tigers, which they ground to pieces with their strong jaws.\n\nGazing into the House of the Tigers, the princes of Xibalba beheld the animals chewing the bones and said one to the other: \"They have at last learned (to know the power of Xibalba), and they have given themselves up to the beasts.\n\n\" But when at dawn Hunahpu and Xbalanque emerged from the House of the Tigers unharmed, the Xibalbians cried: \"Of what race are those?\" for they could not understand how any man could escape the tigers' fury.\n\nThen the princes of Xibalba prepared for the two brothers a new ordeal.\n\nThe sixth test consisted of remaining from sunset to sunrise in the House of Fire.\n\nHunahpu and Xbalanque entered a large apartment arranged like a furnace.\n\nOn every side the flames arose and the air was stifling; so great was the heat that those who entered this chamber could survive only a few moments.\n\nBut at sunrise when the doors of the furnace were opened, Hunahpu and Xbalanque came forth unscorched by the fury of the flames.\n\nThe princes of Xibalba, perceiving how the two intrepid youths had survived every ordeal prepared for their destruction, were filled with fear lest all the secrets of Xibalba should fall into the hands of Hunahpu and Xbalanque.\n\nSo they prepared the last ordeal, an ordeal yet more terrible than any which had gone before, certain that the youths could not withstand this crucial test.\n\nThe seventh ordeal took place in the House of the Bats.\n\nHere in a dark subterranean labyrinth lurked many strange and odious creatures of destruction.\n\nHuge bars fluttered dismally through the corridors and hung with folded wings from the carvings on the walls and ceilings.\n\nHere also dwelt Camazotz, the God of Bats, a hideous monster with the body of a man and the wings and head of a bat.\n\nCamazotz carried a great sword and, soaring through the gloom, decapitated with a single sweep of his blade any unwary wanderers seeking to find their way through the terror-filled chambers.\n\nXbalanque passed successfully through this horrifying test, but Hunahpu, caught off his guard, was beheaded by Camazotz.\n\nMIDEWIWIN RECORD ON BIRCH BARK.\n\nCourtesy of Alice Palmer Henderson.\n\nThe birch-bark roll is one of the most sacred possessions of an initiate of the Midewiwin, or Grand Medicine Society, of the Ojibwas."

