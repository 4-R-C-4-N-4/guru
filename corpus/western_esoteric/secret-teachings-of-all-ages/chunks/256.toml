[content]
body = "A number of authorities are of the opinion that many of the gods worshiped by the pagans were elementals, for some of these invisibles were believed to be of commanding stature and magnificent deportment.\n\nThe Greeks gave the name dæmon to some of these elementals, especially those of the higher orders, and worshiped them.\n\nProbably the most famous of these dæmons is the mysterious spirit which instructed Socrates, and of whom that great philosopher spoke in the highest terms.\n\nThose who have devoted much study to the invisible constitution of man realize that it is quite probable the dæmon of Socrates and the angel of Jakob Böhme were in reality not elementals, but the overshadowing divine natures of these philosophers themselves.\n\nIn his notes to Apuleius on the God of Socrates , Thomas Taylor says: \"As the dæmon of Socrates, therefore, was doubtless one of the highest order, as may be inferred from the intellectual superiority of Socrates to most other men, Apuleius is justified in calling this dæmon a God.\n\nAnd that the dæmon of Socrates indeed was divine, is evident from the testimony of Socrates himself in the First Alcibiades: for in the course of that dialogue he clearly says, 'I have long been of the opinion that the God did not as yet direct me to hold any conversation with you.' And in the Apology he most unequivocally evinces that this dæmon is allotted a divine transcendency, considered as ranking in the order of dæmons.\" The idea once held, that the invisible elements surrounding and interpenetrating the earth were peopled with living, intelligent beings, may seem ridiculous to the prosaic mind of today.\n\nThis doctrine, however, has found favor with some of the greatest intellects of the world.\n\nThe sylphs of Facius Cardin, the philosopher of Milan; the salamander seen by Benvenuto Cellini; the pan of St.\n\nAnthony; and le petit homme rouge (the little red man, or gnome) of Napoleon Bonaparte, have found their places in the pages of history.\n\nLiterature has also perpetuated the concept of Nature spirits.\n\nThe mischievous Puck of Shakespeare's Midsummer Night's Dream ; the elementals of Alexander Pope's Rosicrucian poem, The Rape of the Lock , the mysterious creatures of Lord Lytton's Zanoni ; James Barrie's immortal Tinker Bell; and the famous bowlers that Rip Van Winkle encountered in the Catskill Mountains, are well-known characters to students of literature.\n\nThe folklore and mythology of all peoples abound in legends concerning these mysterious little figures who haunt old castles, guard treasures in the depths of the earth, and build their homes under the spreading protection of toadstools.\n\nFairies are the delight of childhood, and most children give them up with reluctance.\n\nNot so very long ago the greatest minds of the world believed in the existence of fairies, and it is still an open question as to whether Plato, Socrates, and Iamblichus were wrong when they avowed their reality.\n\nParacelsus, when describing the substances which constitute the bodies of the elementals, divided flesh into two kinds, the first being that which we have all inherited through Adam.\n\nThis is the visible, corporeal flesh.\n\nThe second was that flesh which had not descended from Adam and, being more attenuated, was not subject to the limitations of the former.\n\nThe bodies of the elementals were composed of this transubstantial flesh.\n\nParacelsus stated that there is as much difference between the bodies of men and the bodies of the Nature spirits as there is between matter and spirit."

