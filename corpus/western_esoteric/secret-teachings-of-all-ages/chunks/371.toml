body = "Figure 18 describes the division according to Genesis of the waters above the heavens ( D ) from the waters below ( A , B , and C ).\n\nFigure 19 is the mercury of the philosophers, essential to material existence.\n\nTABLE XIII, Figures 1-4 .\n\nFigure 1 is Ain Soph , the Incomprehensible Abyss of Divine Majesty, an endless welling up, limitless in time and space.\n\nFigure 2 symbolizes the three Divine Principles--Father, Son, and Holy Ghost.\n\nTable XIII, Figures 1-4 *** Around the triangle is written: I Shall Be That I Shall Be .\n\nAt the apex of the triangle is the word Crown ; in the left point, Wisdom ; in the right point, Understanding .\n\nFigure 3 represents the Trinity with its outflow.\n\nThe words above the upper sphere are Revelation of the Divine Majesty in Jehovah Elohim .\n\nThe lower circles contain the names of the Hierarchies controlling the lower worlds.\n\nThe words within the circle of stars read: Lucifer the Son of the Aurora of the morning .\n\nThe letter C represents the Universal Mercury.\n\nThe words within the circle read: The first beginning of all creatures .\n\nFigure 4 represents the abode of Lucifer and his angels, the Chaos spoken of in Genesis.\n\nTABLE XIV, Figures 5, 7, 8 .\n\nFigure 5 shows the triangle of triune Divinity in the midst of a cross.\n\nAt the left is a small triangle containing the words The Secrets of Elohim , and at the right is another inscribed The Secrets of Nature .\n\nOn the horizontal arms of the cross are the words The Tree of Life and The Tree of the Knowledge of Good and Evil .\n\nThe plate explains the interblending of the spiritual and infernal powers in the creation of the universe.\n\nFigure 7 is called The Road to Paradise .\n\nIt probably indicates the positions of the sun, moon, and planets at the moment of their genesis.\n\nFigure 8 is the earth before the flood, when it was watered by a mist or vapor.\n\nThe words at the left are The Tree of Life ; those at the right, The Tree of the Knowledge of good and Evil.\n\nThe diagram with the symbol of Mars is devoted to a consideration of the rainbow.\n\nTable XIV, Figures 5, 7, and 8 *** TABLE XV, Figures 6, 9, 10 .\n\nFigure 6 is similar to Figure 5 and is called The Secret of Nature .\n\nAn interesting diagram is shown on either side of the central figure, each consisting of a triangle with circles radiating from its points.\n\nThe diagram on the left is called The Secrets of the Upper World , and the one on right The Secrets of the Underworld .\n\nFigure 9 is the solar system.\n\nAround the central part are the words The Place of the Damned .\n\nFigure 10 shows the dot, or point of rest, surrounded by a triangle enclosing a circle containing the names of the twelve tribes of Israel.\n\nIt represents completion of the process of regeneration and the consummation of the Great Work.\n\nTable XV, Figures 6, 9, and 10"

