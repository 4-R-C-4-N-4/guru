[content]
body = "The basic charge against Cagliostro was that he had attempted to found a Masonic lodge in Rome--nothing more.\n\nAll other accusations are of subsequent date.\n\nFor some reason undisclosed, the Pope commuted Cagliostro's sentence of death to perpetual imprisonment.\n\nThis act in itself showed the regard in which Cagliostro was held even by his enemies.\n\nWhile his death is believed to have occurred several years later in an Inquisitional dungeon in the castle of San Leo, it is highly improbable that such was the case.\n\nThere are rumors that he escaped, and according to one very significant story Cagliostro fled to India, where his talents received the appreciation denied them in politics-ridden Europe.\n\nAfter creating his Egyptian Rite, Cagliostro declared that since women had been admitted into the ancient Mysteries there was no reason why they should be excluded from the modem orders.\n\nThe Princesse de Lamballe graciously accepted the dignity of Mistress of Honor in his secret society, and on the evening of her initiation the most important members of the French court were present.\n\nThe brilliance of the affair attracted the attention of the Masonic lodges in Paris.\n\nTheir representatives, in a sincere desire to understand the Masonic Mysteries, chose the learned orientalist Court de Gébelin as their spokesman, and invited Comte di Cagliostro to attend a conference to assist in clearing up a number of important questions concerning Masonic philosophy.\n\nThe Comte accepted the invitation.\n\nOn May 10, 1785, Cagliostro attended the conference called for that purpose, and his power and simplicity immediately won for him the favorable opinion of the entire gathering.\n\nIt took but a few words for the Court de Gébelin to discover that he was talking nor only to a fellow scholar but to a man infinitely his superior.\n\nCagliostro immediately presented an address, which was so unexpected, so totally different from anything ever heard before by those assembled, that all were speechless with amazement.\n\nCagliostro declared the Rose-Cross to be the ancient and true symbol of the Mysteries and, after a brief description of its original symbolism, branched out into a consideration of the symbolic meaning of letters, predicting to the assembly the future of France in a graphic manner that left no room for doubt that the speaker was a man of insight and supernatural power.\n\nWith a curious arrangement of the letters of the alphabet, Cagliostro foretold in detail the horrors of the coming revolution and the fall of the monarchy, describing minutely the fate of the various members of the royal family.\n\nHe also prophesied the advent of Napoleon and the rise of the First Empire.\n\nAll this he did to demonstrate that which can be accomplished by superior knowledge.\n\nLater when arrested and sent to the Bastille, Cagliostro wrote on the wall of his cell the following cryptic message which, when interpreted, reads: \"In 1789 the besieged Bastille will on July 14th be pulled down by you from top to bottom.\" Cagliostro was the mysterious agent of the Knights Templars, the Rosicrucian initiate whose magnificent store of learning is attested by the profundity of the Egyptian Rite of Freemasonry.\n\nThus Comte di Cagliostro remains one of the strangest characters in history--believed by his friends to have lived forever and to have taken part in the marriage feast of Cana, and accused by his enemies of being the Devil incarnate!\n\nHis powers of prophecy are ably described by Alexandre Dumas in The Queen's Necklace .\n\nThe world he sought to serve in his own strange way received him not, but has followed with relentless persecution down through the centuries even the very memory of this illustrious adept who, unable to accomplish the great labor at hand, stepped aside in favor of his more successful compatriot, the Comte de St-Germain."

