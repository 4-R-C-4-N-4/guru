[content]
body = "The imagination of the Greeks peopled the regions of earth and sea with divinities, to whose agency it attributed the phenomena that our philosophy ascribes to the operation of natural law.\" Thus, in behalf of the plant it worked with, the elemental accepted and rejected food elements, deposited coloring matter therein, preserved and protected the seed, and performed many other beneficent offices.\n\nEach species was served by a different but appropriate type of Nature spirit.\n\nThose working with poisonous shrubs, for example, were offensive in their appearance.\n\nIt is said the Nature spirits of poison hemlock resemble closely tiny human skeletons, thinly covered with a semi-transparent flesh.\n\nThey live in and through the hemlock, and if it be cut down remain with the broken shoots until both die, but while there is the slightest evidence of life in the shrub it shows the presence of the elemental guardian.\n\nGreat trees also have their Nature spirits, but these are much larger than the elementals of smaller plants.\n\nThe labors of the pygmies include the cutting of the crystals in the rocks and the development of veins of ore.\n\nWhen the gnomes are laboring with animals or human beings, their work is confined to the tissues corresponding with their own natures.\n\nHence they work with the bones, which belong to the mineral kingdom, and the ancients believed the reconstruction of broken members to be impossible without the cooperation of the elementals.\n\nThe gnomes are of various sizes--most of them much smaller than human beings, though some of them have the power of changing their stature at will.\n\nThis is the result of the extreme mobility of the element in which they function.\n\nConcerning them the Abbé de Villars wrote: \"The earth is filled well nigh to its center with Gnomes, people of slight stature, who are the guardians of treasures, minerals and precious stones.\n\nThey are ingenious, friends of man, and easy to govern.\" Not all authorities agree concerning the amiable disposition of the gnomes.\n\nMany state that they are of a tricky and malicious nature, difficult to manage, and treacherous.\n\nWriters agree, however, that when their confidence is won they are faithful and true.\n\nThe philosophers and initiates of the ancient world were instructed concerning these mysterious little people and were taught how to communicate with them and gain their cooperation in undertakings of importance.\n\nThe magi were always warned, however, never to betray the trust of the elementals, for if they did, the invisible creatures, working through the subjective nature of man, could cause them endless sorrow and probably ultimate destruction.\n\nSo long as the mystic served others, the gnomes would serve him, but if he sought to use their aid selfishly to gain temporal power they would turn upon him with unrelenting fury.\n\nThe same was true if he sought to deceive them.\n\nThe earth spirits meet at certain times of the year in great conclaves, as Shakespeare suggests in his Midsummer Night's Dream, where the elementals all gather to rejoice in the beauty and harmony of Nature and the prospects of an excellent harvest.\n\nThe gnomes are ruled over by a king, whom they greatly love and revere.\n\nHis name is Gob ; hence his subjects are often called goblins.\n\nMediæval mystics gave a corner of creation (one of the cardinal points) to each of the four kingdoms of Nature spirits, and because of their earthy character the gnomes were assigned to the North--the place recognized by the ancients as the source of darkness and death.\n\nOne of the four main divisions of human disposition was also assigned to the gnomes, and because so many of them dwelt in the darkness of caves and the gloom of forests their temperament was said to be melancholy, gloomy, and despondent."

