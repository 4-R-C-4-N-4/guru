body = "THE art of healing was originally one of the secret sciences of the priestcraft, and the mystery of its source is obscured by the same veil which hides the genesis of religious belief.\n\nAll higher forms of knowledge were originally in the possession of the sacerdotal castes.\n\nThe temple was the cradle of civilization.\n\nThe priests, exercising their divine prerogative, made the laws and enforced them; appointed the rulers and controlled than; ministered to the needs of the living, and guided the destinies of the dead.\n\nAll branches of learning were monopolized by the priesthood, who admitted into their ranks only those intellectually and morally qualified to perpetuate their arcanum.\n\nThe following quotation from Plato's Statesman is apropos of the subject: \" * * * in Egypt, the King himself is not allowed to reign, unless he have priestly powers; and if he should be one of another class, and have obtained the throne by violence, he must get enrolled in the priestcraft.\" Candidates aspiring to membership in the religious orders underwent severe tests to prove their worthiness.\n\nThese ordeals were called initiations .\n\nThose who passed them successfully were welcomed as brothers by the priests and were instructed in the secret teachings.\n\nAmong the ancients, philosophy, science, and religion were never considered as separate units: each was regarded as an integral part of the whole.\n\nPhilosophy was scientific and religious; science was philosophic and religious I religion was philosophic and scientific.\n\nPerfect wisdom was considered unattainable save as the result of harmonizing all three of these expressions of mental and moral activity.\n\nWhile modern physicians accredit Hippocrates with being the father of medicine, the ancient therapeutæ ascribed to the immortal Hermes the distinction of being the founder of the art of healing.\n\nClemens Alexandrinus, in describing the books purported to be from the stylus of Hermes, divided the sacred writings into six general classifications, one of which, the Pastophorus , was devoted to the science of medicine.\n\nThe Smaragdine , or Emerald Tablet found in the valley of Ebron and generally accredited to Hermes, is in reality a chemical formula of a high and secret order.\n\nHippocrates, the famous Greek physician, during the fifth century before Christ, dissociated the healing art from the other sciences of the temple and thereby established a precedent for separateness.\n\nOne of the consequences is the present widespread crass scientific materialism.\n\nThe ancients realized the interdependence of the sciences.\n\nThe moderns do not; and as a result, incomplete systems of learning are attempting to maintain isolated individualism.\n\nThe obstacles which confront present-day scientific research are largely the result of prejudicial limitations imposed by those who are unwilling to accept that which transcends the concrete perceptions of the five primary human senses.\n\nTHE PARACELSIAN SYSTEM OF MEDICAL PHILOSOPHY During the Middle Ages the long-ignored axioms and formulæ of Hermetic wisdom were assembled once more, and chronicled, and systematic attempts were made to test their accuracy.\n\nTo Theophrastus of Hohenheim, who called himself Paracelsus (a name meaning \"greater than Celsus\"), the world is indebted for much of the knowledge it now possesses of the ancient systems of medicine.\n\nParacelsus devoted his entire life to the study and exposition of Hermetic philosophy.\n\nEvery notion and theory was grist to his mill, and, while members of the medical fraternity belittle his memory now as they opposed his system then, the occult world knows that he will yet be recognized as the greatest physician of all times.\n\nWhile the heterodox and exotic temperament of Paracelsus has been held against him by his enemies, and his wanderlust has been called vagabondage, he was one of the few minds who intelligently sought to reconcile the art of healing with the philosophic and religious systems of paganism and Christianity."

