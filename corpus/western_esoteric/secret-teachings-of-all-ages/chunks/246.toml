[content]
body = "CEREMONIAL magic is the ancient art of invoking and controlling spirits by a scientific application of certain formulæ.\n\nA magician, enveloped in sanctified vestments and carrying a wand inscribed with hieroglyphic figures, could by the power vested in certain words and symbols control the invisible inhabitants of the elements and of the astral world.\n\nWhile the elaborate ceremonial magic of antiquity was not necessarily evil, there arose from its perversion several false schools of sorcery, or black magic .\n\nEgypt, a great center of learning and the birthplace of many arts and sciences, furnished an ideal environment for transcendental experimentation.\n\nHere the black magicians of Atlantis continued to exercise their superhuman powers until they had completely undermined and corrupted the morals of the primitive Mysteries.\n\nBy establishing a sacerdotal caste they usurped the position formerly occupied by the initiates, and seized the reins of spiritual government.\n\nThus black magic dictated the state religion and paralyzed the intellectual and spiritual activities of the individual by demanding his complete and unhesitating acquiescence in the dogma formulated by the priestcraft.\n\nThe Pharaoh became a puppet in the hands of the Scarlet Council--a committee of arch-sorcerers elevated to power by the priesthood.\n\nThese sorcerers then began the systematic destruction of all keys to the ancient wisdom, so that none might have access to the knowledge necessary to reach adeptship without first becoming one of their order.\n\nThey mutilated the rituals of the Mysteries while professing to preserve them, so that even though the neophyte passed through the degrees he could not secure the knowledge to which he was entitled.\n\nIdolatry was introduced by encouraging the worship of the images which in the beginning the wise had erected solely as symbols for study and meditation.\n\nFalse interpretations were given to the emblems and figures of the Mysteries, and elaborate theologies were created to confuse the minds of their devotees.\n\nThe masses, deprived of their birthright of understanding and groveling in ignorance, eventually became the abject slaves of the spiritual impostors.\n\nSuperstition universally prevailed and the black magicians completely dominated national affairs, with the result that humanity still suffers from the sophistries of the priestcrafts of Atlantis and Egypt.\n\nFully convinced that their Scriptures sanctioned it, numerous medieval Qabbalists devoted their lives to the practice of ceremonial magic.\n\nThe transcendentalism of the Qabbalists is founded upon the ancient and magical formula of King Solomon, who has long been considered by the Jews as the prince of ceremonial magicians.\n\nAmong the Qabbalists of the Middle Ages were a great number of black magicians who strayed from the noble concepts of the Sepher Yetzirah and became enmeshed in demonism and witchcraft.\n\nThey sought to substitute magic mirrors, consecrated daggers, and circles spread around posts of coffin nails, for the living of that virtuous life which, without the assistance of complicated rituals or submundane creatures, unfailingly brings man to the state of true individual completion.\n\nThose who sought to control elemental spirits through ceremonial magic did so largely with the hope of securing from the invisible worlds either rare knowledge or supernatural power.\n\nThe little red demon of Napoleon Bonaparte and the infamous oracular heads of de Medici are examples of the disastrous results of permitting elemental beings to dictate the course of human procedure.\n\nWhile the learned and godlike dæmon of Socrates seems to have been an exception, this really proves that the intellectual and moral status of the magician has much to do with the type of elemental he is capable of invoking.\n\nBut even the dæmon of Socrates deserted the philosopher when the sentence of death was passed.\n\nTranscendentalism and all forms of phenomenalistic magic are but blind alleys--outgrowths of Atlantean sorcery; and those who forsake the straight path of philosophy to wander therein almost invariably fall victims to their imprudence."

