body = "Popular taste, being always tickled by sensuous and meretricious effects, was to be treated with deserved contempt.\n\n(See The History of Music .) Even today martial music is used with telling effect in times of war, and religious music, while no longer developed in accordance with the ancient theory, still profoundly influences the emotions of the laity.\n\nTHE MUSIC OF THE SPHERES The most sublime but least known of all the Pythagorean speculations was that of sidereal harmonics.\n\nIt was said that of all men only Pythagoras heard the music of the spheres .\n\nApparently the Chaldeans were the first people to conceive of the heavenly bodies joining in a cosmic chant as they moved in stately manner across the sky.\n\nJob describes a time \"when the stars of the morning sang together,\" and in The Merchant of Venice the author of the Shakesperian plays writes: \"There's not the smallest orb which thou behold'st but in his motion like an angel sings.\" So little remains, however, of the Pythagorean system of celestial music that it is only possible to approximate his actual theory.\n\nPythagoras conceived the universe to be an immense monochord, with its single string connected at its upper end to absolute spirit and at its lower end to absolute matter--in other words, a cord stretched between heaven and earth.\n\nCounting inward from the circumference of the heavens, Pythagoras, according to some authorities, divided the universe into nine parts; according to others, into twelve parts.\n\nThe twelvefold system was as follows: The first division was called the empyrean , or the sphere of the fixed stars, and was the dwelling place of the immortals.\n\nThe second to twelfth divisions were (in order) the spheres of Saturn, Jupiter, Mars, the sun, Venus, Mercury, and the moon, and fire, air, water, and earth.\n\nThis arrangement of the seven planets (the sun and moon being regarded as planets in the old astronomy) is identical with the candlestick symbolism of the Jews--the sun in the center as the main stem with three planets on either side of it.\n\nThe names given by the Pythagoreans to the various notes of the diatonic scale were, according to Macrobius, derived from an estimation of the velocity and magnitude of the planetary bodies.\n\nEach of these gigantic spheres as it rushed endlessly through space was believed to sound a certain tone caused by its continuous displacement of the æthereal diffusion .\n\nAs these tones were a manifestation of divine order and motion, it must necessarily follow that they partook of the harmony of their own source.\n\n\"The assertion that the planets in their revolutions round the earth uttered certain sounds differing according to their respective 'magnitude, celerity and local distance,' was commonly made by the Greeks.\n\nThus Saturn, the farthest planet, was said to give the gravest note, while the Moon, which is the nearest, gave the sharpest.\n\n'These sounds of the seven planets, and the sphere of the fixed stars, together with that above us [Antichthon], are the nine Muses, and their joint symphony is called Mnemosyne.'\" (See The Canon .)This quotation contains an obscure reference to the ninefold division of the universe previously mentioned.\n\nTHE MUNDANE MONOCHORD WITH ITS PROPORTIONS AND INTERVALS.\n\nFrom Fludd's De Musica Mundana.\n\nIn this chart is set forth a summary of Fludd's theory of universal music.\n\nThe interval between the element of earth and the highest heaven is considered as a double octave, thus showing the two extremes of existence to be in disdiapason harmony.\n\nIt is signifies that the highest heaven, the sun, and the earth have the same time, the difference being in pitch.\n\nThe sun is the lower octave of the highest heaven and the earth the lower octave of the sun."

