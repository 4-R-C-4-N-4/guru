body = "When it is properly developed, this universal solvent in liquid form will dissolve into itself all other metals.\n\nIn this high state the universal salt is a liquid fire.\n\nThis salt dissolved with the proper amount of any metal and run through the different stages of digestion and rotations; of augmentations will eventually become a medicine for the transmuting of inferior metals.\n\nThe True Way of Nature by Hermes Trismegistus, given out by a genuine Freemason, I.C.H., describes the danger of over-augmenting the universal salt: \"But this multiplication cannot be carried on ad infinitum but it attains completeness in the ninth rotation.\n\nFor when this tincture has been rotated nine times it cannot be exalted any further because it will not permit any further separation.\n\nFor as soon as it perceives only the smallest degree of material fire it goes instantly into a flux and passes through the glass like hot oil through paper.\" In classifying the processes through which the chemical elements must pass before the Hermetic medicine is produced, lack of uniformity in terminology is evidenced, for in The True Way of Nature seven stages are given, while in the Dictionnaire Mytho-Hermétique twelve are noted.\n\nThese twelve are linked with the signs of the zodiac in a manner worthy of consideration.\n\n1.\n\nAries, Calcination 2.\n\nTaurus, Congelation 3.\n\nGemini, Fixation 4.\n\nCancer, Dissolution 5.\n\nLeo, Digestion 6.\n\nVirgo, Distillation 7.\n\nLibra, Sublimation 8.\n\nScorpio, Separation 9.\n\nSagittarius, Incineration 10.\n\nCapricorn, Fermentation 11.\n\nAquarius, Multiplication 12.\n\nPisces, Projection This arrangement opens an interesting field of speculation which may be of great service if intelligently carried out.\n\nThese twelve \"steps\" leading up to the accomplishment of the Magnum Opus are a reminder of the twelve degrees of the ancient Rosicrucian Mysteries.\n\nTo a certain degree, Rosicrucianism was chemistry theologized and alchemy philosophized.\n\nAccording to the Mysteries, man was redeemed as the result of his passage in rotation through the twelve mansions of the heavens.\n\nThe twelve processes by means of which the \"secret essence\" may be discovered remind the student forcibly of the twelve Fellow Craftsmen who are sent forth in search of the murdered Builder of the Universe, the Universal Mercury.\n\nAccording to Solomon Trismosin, the stages through which matter passes in its journey towards perfection are divided into twenty-two parts, each of which is represented by an appropriate drawing.\n\nThere is an important connection between the twenty-two emblems of Trismosin, the twenty-two major cards of the Tarot, and the twenty-two letters of the Hebrew alphabet.\n\nThese mysterious Tarot cards are themselves an alchemical formula, if properly interpreted.\n\nAs if to substantiate the claims of medieval philosophers that King Solomon was a master of alchemy, Dr.\n\nFranz Hartmann has noted that the much-abused and misunderstood Song of Solomon is in reality an alchemical formula.\n\nThe student of natural philosophy will immediately recognize the \"dark maid of Jerusalem,\" not as a person but as a material sacred to the sages.\n\nDr.\n\nHartmann writes: \"The ' Song of Solomon ,' in the Old Testament, is a description of the processes of Alchemy.\n\nIn this Song the Subjectum is described in Cant .\n\ni ., 5; the Lilium artis in C .\n\nii ., 1; the Preparation and Purification in C .\n\nii ., 4; the Fire in C .\n\nii ., 7, and C .\n\niv ., 16, the Putrefaction in C .\n\niii ., 1; Sublimation and Distillation in C .\n\niii ., 6, Coagulation and Change of Colors , C ."

