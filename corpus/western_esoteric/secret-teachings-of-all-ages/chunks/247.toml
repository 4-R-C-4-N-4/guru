body = "Man, incapable of controlling his own appetites, is not equal to the task of governing the fiery and tempestuous elemental spirits.\n\nMany a magician has lost his life as the result of opening a way whereby submundane creatures could become active participants in his affairs.\n\nWhen Éliphas Lévi invoked the spirit of Apollonius of Tyana, what did he hope to accomplish?\n\nIs the gratification of curiosity a motive sufficient to warrant the devotion of an entire lifetime to a dangerous and unprofitable pursuit?\n\nIf the living Apollonius refused to divulge his secrets to the profane, is there any probability that after death he would disclose them to the curious-minded?\n\nLevi himself did not dare to assert that the specter which appeared to him was actually the great philosopher, for Levi realized only too well the proclivity of elementals to impersonate those who have passed on.\n\nThe majority of modern mediumistic apparitions are but elemental creatures masquerading through bodies composed of thought substance supplied by the very persons desiring to behold these wraiths of decarnate beings.\n\nTHE THEORY AND PRACTICE OF BLACK MAGIC Some understanding of the intricate theory and practice of ceremonial magic may be derived from a brief consideration of its underlying premises.\n\nFirst .\n\nThe visible universe has an invisible counterpart, the higher planes of which are peopled by good and beautiful spirits; the lower planes, dark and foreboding, are the habitation of evil spirits and demons under the leadership of the Fallen Angel and his ten Princes.\n\nSecond .\n\nBy means of the secret processes of ceremonial magic it is possible to contact these invisible creatures and gain their help in some human undertaking.\n\nGood spirits willingly lend their assistance to any worthy enterprise, but the evil spirits serve only those who live to pervert and destroy.\n\nThird .\n\nIt is possible to make contracts with spirits whereby the magician becomes for a stipulated time the master of an elemental being.\n\nFourth .\n\nTrue black magic is performed with the aid of a demoniacal spirit, who serves the sorcerer for the length of his earthly life, with the understanding that after death the magician shall become the servant of his own demon.\n\nFor this reason a black magician will go to inconceivable ends to prolong his physical life, since there is nothing for him beyond the grave.\n\nThe most dangerous form of black magic is the scientific perversion of occult power for the gratification of personal desire.\n\nIts less complex and more universal form is human selfishness, for selfishness is the fundamental cause of all worldly evil.\n\nA man will barter his eternal soul for temporal power, and down through the ages a mysterious process has been evolved which actually enables him to make this exchange.\n\nIn its various branches the black art includes nearly all forms of ceremonial magic, necromancy, witchcraft, sorcery, and vampirism.\n\nUnder the same general heading are also included mesmerism and hypnotism, except when used solely for medical purposes, and even then there is an element of risk for all concerned.\n\nThough the demonism of the Middle Ages seems to have disappeared, there is abundant evidence that in many forms of modern thought--especially the so-called \"prosperity\" psychology, \"willpower-building\" metaphysics, and systems of \"high-pressure\" salesmanship--black magic has merely passed through a metamorphosis, and although its name be changed its nature remains the same.\n\nBAPHOMET, THE GOAT OF MENDES.\n\nFrom Levi's Transcendental Magic.\n\nThe practice of magic--either white or black--depends upon the ability of the adept to control the universal life force--that which Éliphas Lévi calls the great magical agent or the astral light.\n\nBy the manipulation of this fluidic essence the phenomena of transcendentalism are produced.\n\nThe famous hermaphroditic Goat of Mendes was a composite creature formulated to symbolize this astral light."

