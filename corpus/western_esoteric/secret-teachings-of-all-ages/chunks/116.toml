body = "Grant us Thy peace.\"' Therefore, the Lamb of God is a title given to the sun, who is said to be reborn every year in the Northern Hemisphere in the sign of the Ram, although, due to the existing discrepancy between the signs of the zodiac and the actual star groups, it actually rises in the sign of Pisces.\n\nThe summer solstice is regarded as occurring in Cancer (the Crab), which the Egyptians called the scarab --a beetle of the family Lamellicornes, the head of the insect kingdom, and sacred to the Egyptians as the symbol of Eternal Life.\n\nIt is evident that the constellation of the Crab is represented by this peculiar creature because the sun, after passing through this house, proceeds to walk backwards, or descend the zodiacal arc.\n\nCancer is the symbol of generation, for it is the house of the Moon, the great Mother of all things and the patroness of the life forces of Nature.\n\nDiana, the moon goddess of the Greeks, is called the Mother of the World.\n\nConcerning the worship of the feminine or maternal principle, Richard Payne Knight writes: \"By attracting or heaving the waters of the ocean, she naturally appeared to be the sovereign of humidity; and by seeming to operate so powerfully upon the constitutions of women, she equally appeared to be the patroness and regulatress of nutrition and passive generation: whence she is said to have received her nymphs, or subordinate personifications, from the ocean; and is often represented by the symbol of the sea crab, an animal that has the property of spontaneously detaching from its own body any limb that has been hurt or mutilated, and reproducing another in its place.\" ( The Symbolical Language of Ancient Art and Mythology .) This water sign, being symbolic of the maternal principle of Nature, and recognized by the pagans as the origin of all life, was a natural and consistent domicile of the moon.\n\nThe autumnal equinox apparently occurs in the constellation of Libra (the Balances).\n\nThe scales tipped and the solar globe began its pilgrimage toward the house of winter.\n\nThe constellation of the Scales was placed in the zodiac to symbolize the power of choice, by means of which man may weigh one problem against another.\n\nMillions of years ago, when the human race was in the making, man was like the angels, who knew neither good nor evil.\n\nHe fell into the state of the knowledge of good and evil when the gods gave him the seed for the mental nature.\n\nFrom man's mental reactions to his environments he distills the product of experience, which then aids him to regain his lost position plus an individualized intelligence.\n\nParacelsus said: \"The body comes from the elements, the soul from the stars, and the spirit from God.\n\nAll that the intellect can conceive of comes from the stars [the spirits of the stars, rather than the material constellations].\" The constellation of Capricorn, in which the winter solstice theoretically takes place, was called The House of Death , for in winter all life in the Northern Hemisphere is at its lowest ebb.\n\nCapricorn is a composite creature, with the head and upper body of a goat and the tail of a fish.\n\nIn this constellation the sun is least powerful in the Northern Hemisphere, and after passing through this constellation it immediately begins to increase.\n\nHence the Greeks said that Jupiter (a name of the Sun God) was suckled by a goat."

