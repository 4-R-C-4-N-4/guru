body = "The cipher appearing upon this card would substantiate this interpretation, for the cipher, or circle, is emblematic of the superior sphere from which issue the lower worlds, powers, and letters.\n\nWestcott carefully collected the all too meager theories advanced by various authorities and in 1887 published his now extremely rare volume, which contains the only detailed description of the Isiac Tablet published in English since Humphreys translated Montfaucon's worthless description in 1721.\n\nAfter explaining his reticence to reveal that which Levi evidently felt was better left concealed, Westcott sums up his interpretation of the Tablet as follows: \"The diagram of Levi, by which he explains the mystery of the Tablet, shows the Upper Region divided into the four seasons of the year, each with three signs of the Zodiac, and he has added the four-lettered sacred name, the Tetragrammaton, assigning Jod to Aquarius, that is Canopus, He to Taurus, that is Apis, Vau to Leo, that is Momphta, and He final to Typhon.\n\nNote the Cherubic parallel--Man, Bull, Lion and Eagle.\n\nThe fourth form is found either as Scorpion or Eagle depending upon the Occult good or evil intention: in the Demotic Zodiac, the Snake replaces the Scorpion.\n\n\"The Lower Region he ascribes to the twelve simple Hebrew letters, associating them with the four quarters of the horizon.\n\nCompare the Sepher Yerzirah, Cap.\n\nv., sec.\n\n1.\n\n\"The Central Region he ascribes to the Solar powers and the Planetary.\n\nIn the middle we see above, the Sun, marked Ops, and below it is a Solomon's Seal, above a cross; a double triangle Hexapla, one light and one dark triangle superposed, the whole forming a sort of complex symbol of Venus.\n\nTo the Ibimorphos he gives the three dark planets, Venus, Mercury, and Mars placed around a dark triangle erect, denoting Fire.\n\nTo the Nephthæan triad he gives three light planets, Saturn, Luna, and Jupiter, around a light inverted triangle which denotes Water.\n\nThere is a necessary connection between water, female power, passive principle, Binah, and Sephirotic Mother, and Bride.\n\n(See the Kabbalah by Mathers.) Note the ancient signs for the planets were all composed of a Cross, Solar Disc and Crescent: Venus is a cross below a Sun disc, Mercury, a disc With a crescent above and cross below, Saturn is a Cross whose lowest point touches the apex of the crescent; Jupiter is a Crescent whose lowest point touches the left hand end of a cross: all these are deep mysteries.\n\nNote that Levi in his original plate transposed Serapis and Hecate, but not the Apis noir and Apis blanc, perhaps because of the head of Bes being associated by him with Hecate.\n\nNote that having referred the 12 simple letters to the lower, the 7 double must correspond to the central region of the planets, and then the great triad A.M.S.\n\nthe mother letters representing Air, Water, and Fire remain to be pictured, around S the Central Iynx, or Yod, by the Ophionian Triad the two Serpents and the Leonine Sphynx.\n\nLevi's word OPS in the centre is the Latin Ops, Terra, genius of the Earth; and the Greek Ops, Rhea, or Kubele (Cybele) often drawn as a goddess seated in a chariot drawn by lions; she is crowned with turrets, and holds a Key.\" (See The Isiac Tablet .) LEVI'S KEY TO THE BEMBINE TABLE.\n\nFrom Levi's History of Magic."

