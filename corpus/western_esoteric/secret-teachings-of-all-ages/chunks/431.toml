body = "A comparison of the Droeshout Shakspere with portraits and engravings of Francis Bacon demonstrates the identity of the structure of the two faces, the difference in expression being caused by lines of shading.\n\nNot also the peculiar line running from the ear down to the chin.\n\nDoes this line subtly signify that the face itself a mask, ending at the ear?\n\nNotice also that the head is not connected with the body, but is resting on the collar.\n\nMost strange of all is the coat: one-half is on backwards.\n\nIn drawing the jacket, the artist has made the left arm correctly, but the right arm has the back of the shoulder to the front.\n\nFrank Woodward has noted that there are 157 letters on the title page.\n\nThis is a Rosicrucian signature of first importance.\n\nThe date, 1623, Plus the two letters \"ON\" from the word \"LONDON,\" gives the cryptic signature of Francis Bacon, by a simple numerical cipher.\n\nBy merely exchanging the 26 letters of the alphabet for numbers, 1 became A, 6 becomes F, 2 becomes B, and 3 becomes C, giving AFBC.\n\nTo this is added the ON from LONDON, resulting in AFBCON, which rearranged forms F.\n\nBACON.\n\n*** No reasonable doubt remains that the Masonic Order is the direct outgrowth of the secret societies of the Middle Ages, nor can it be denied that Freemasonry is permeated by the symbolism and mysticism of the ancient and medieval worlds.\n\nSir Francis Bacon knew the true secret of Masonic origin and there is reason to suspect that he concealed this knowledge in cipher and cryptogram.\n\nBacon is not to be regarded solely as a man but rather as the focal point between an invisible institution and a world which was never able to distinguish between the messenger and the message which he promulgated.\n\nThis secret society, having rediscovered the lost wisdom of the ages and fearing that the knowledge might be lost again, perpetuated it in two ways: (1) by an organization (Freemasonry) to the initiates of which it revealed its wisdom in the form of symbols; (2) by embodying its arcana in the literature of the day by means of cunningly contrived ciphers and enigmas.\n\nEvidence points to the existence of a group of wise and illustrious Fratres who assumed the responsibility of publishing and preserving for future generations the choicest of the secret books of the ancients, together with certain other documents which they themselves had prepared.\n\nThat future members of their fraternity might not only identify these volumes bur also immediately note the significant passages, words, chapters, or sections therein, they created a symbolic alphabet of hieroglyphic designs.\n\nBy means of a certain key and order, the discerning few were thus enabled to find that wisdom by which a man is \"raised\" to an illumined life.\n\nThe tremendous import of the Baconian mystery is daily becoming more apparent.\n\nSir Francis Bacon was a link in that great chain of minds which has perpetuated the secret doctrine of antiquity from its beginning.\n\nThis secret doctrine is concealed in his cryptic writings.\n\nThe search for this divine wisdom is the only legitimate motive for the effort to decode his cryptograms.\n\nMasonic research might discover much of value if it would turn its attention to certain volumes published during the sixteenth and seventeenth centuries which bear the stamp and signet of that secret society whose members first established modern Freemasonry but themselves remained as an intangible group controlling and directing the activities of the outer body.\n\nThe unknown history and lost rituals of Freemasonry may be rediscovered in the symbolism and cryptograms of the Middle Ages .\n\nFreemasonry is the bright and glorious son of a mysterious and hidden father.\n\nIt cannot trace its parentage because that origin is obscured by the veil of the superphysical and the mystical."

