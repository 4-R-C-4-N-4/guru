body = "All ancient peoples believed in the compassionate intercession of the Deity for the alleviation of human suffering.\n\nParacelsus said that faith would cure all disease.\n\nFew persons, however, possess a sufficient degree of faith.\n\nThe sixth method--which was prevention rather than cure--was regulation of the diet and daily habits of life.\n\nThe individual, by avoiding the things which caused illness, remained well.\n\nThe ancients believed that health was the normal state of man; disease was the result of man's disregard of the dictates of Nature.\n\nThe seventh method was \"practical medicine,\" consisting chiefly of bleeding, purging, and similar lines of treatment.\n\nThese procedures, while useful in moderation, were dangerous in excess.\n\nMany a useful citizen has died twenty-five or fifty years before his time as the result of drastic purging or of having all the blood drained out of his body.\n\nParacelsus used all seven methods of treatment, and even his worst enemies admitted that he accomplished results almost miraculous in character.\n\nNear his old estate in Hohenheim, the dew falls very heavily at certain seasons of the year, and Paracelsus discovered that by gathering the dew under certain configurations of the planets he obtained a water possessing marvelous medicinal virtue, for it had absorbed the properties of the heavenly bodies.\n\nHERMETIC HERBALISM AND PHARMACOLOGY The herbs of the fields were sacred to the early pagans, who believed that the gods had made plants for the cure of human ills.\n\nWhen properly prepared and applied, each root and shrub could be used for the alleviation of suffering, or for the development of spiritual, mental, moral, or physical powers.\n\nIn The Mistletoe and Its Philosophy , P.\n\nDavidson pays the following beautiful tribute to the plants: \"Books have been written on the language of flowers and herbs, the poet from the earliest ages has held the sweetest and most loving converse with them, kings are even glad to obtain their essences at second hand to perfume themselves; but to the true physician--Nature's High-Priest--they speak in a far higher and more exalted strain.\n\nThere is not a plant or mineral which has disclosed the last of its properties to the scientists.\n\nHow can they feel confident that for every one of the discovered properties there may not be many powers concealed in the inner nature of the plant?\n\nWell have flowers been called the 'Stars of Earth,' and why should they not be beautiful?\n\nHave they not from the time of their birth smiled in the splendor of the sun by day, and slumbered under the brightness of the stars by night?\n\nHave they not come from another and more spiritual world to our earth, seeing that God made 'every plant of the field BEFORE it was in the earth, and every herb of the field BEFORE IT GREW'?\" Many primitive peoples used herbal remedies, with many remarkable cures.\n\nThe Chinese, Egyptians, and American Indians cured with herbs diseases for which modern science knows no remedy.\n\nDoctor Nicholas Culpeper, whose useful life ended in 1654, was probably the most famous of herbalists.\n\nFinding that the medical systems of his day were unsatisfactory in the extreme, Culpeper turned his attention to the plants of the fields, and discovered a medium of healing which gained for him national renown.\n\nNICHOLAS CULPEPER.\n\nFrom Culpeper's Semeiotica Uranica.\n\nThis famous physician, herbalist, and astrologer spent the greater part of his useful life ranging the hills and forests of England and cataloguing literally hundreds of medicinal herbs.\n\nCondemning the unnatural methods of contemporaneous medicos, Culpeper wrote: \"This not being pleasing, and less profitable tome, I consulted with my two brothers, DR.\n\nREASON and DR.\n\nEXPERIENCE, and took a voyage to visit my mother NATURE, by whose advice, together with the help of Dr."

