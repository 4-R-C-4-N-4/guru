body = "Anaximander, differing from his master Thales, declared measureless and indefinable infinity to be the principle from which all things were generated.\n\nAnaximenes asserted air to be the first element of the universe; that souls and even the Deity itself were composed of it.\n\nAnaxagoras (whose doctrine savors of atomism) held God to be an infinite self-moving mind; that this divine infinite Mind, not inclosed in any body, is the efficient cause of all things; out of the infinite matter consisting of similar parts, everything being made according to its species by the divine mind, who when all things were at first confusedly mingled together, came and reduced them to order.\" Archelaus declared the principle of all things to be twofold: mind (which was incorporeal) and air (which was corporeal), the rarefaction and condensation of the latter resulting in fire and water respectively.\n\nThe stars were conceived by Archelaus to be burning iron places.\n\nHeraclitus (who lived 536-470 B.C.\n\nand is sometimes included in the Ionic school) in his doctrine of change and eternal flux asserted fire to be the first element and also the state into which the world would ultimately be reabsorbed.\n\nThe soul of the world he regarded as an exhalation from its humid parts, and he declared the ebb and flow of the sea to be caused by the sun.\n\nBABBITT'S ATOM.\n\nFrom Babbitt's Principles of Light and Color.\n\nSince the postulation of the atomic theory by Democritus, many efforts have been made to determine the structure of atoms and the method by which they unite to form various elements, Even science has not refrained from entering this field of speculation and presents for consideration most detailed and elaborate representations of these minute bodies.\n\nBy far the most remarkable conception of the atom evolved during the last century is that produced by the genius of Dr.\n\nEdwin D.\n\nBabbitt and which is reproduced herewith.\n\nThe diagram is self-explanatory.\n\nIt must be borne in mind that this apparently massive structure is actually s minute as to defy analysis.\n\nNot only did Dr.\n\nBabbitt create this form of the atom but he also contrived a method whereby these particles could be grouped together in an orderly manner and thus result in the formation of molecular bodies.\n\n*** After Pythagoras of Samos, its founder, the Italic or Pythagorean school numbers among its most distinguished representatives Empedocles, Epicharmus, Archytas, Alcmæon, Hippasus, Philolaus, and Eudoxus.\n\nPythagoras (580-500?\n\nB.C.) conceived mathematics to be the most sacred and exact of all the sciences, and demanded of all who came to him for study a familiarity with arithmetic, music, astronomy, and geometry.\n\nHe laid special emphasis upon the philosophic life as a prerequisite to wisdom.\n\nPythagoras was one of the first teachers to establish a community wherein all the members were of mutual assistance to one another in the common attainment of the higher sciences.\n\nHe also introduced the discipline of retrospection as essential to the development of the spiritual mind.\n\nPythagoreanism may be summarized as a system of metaphysical speculation concerning the relationships between numbers and the causal agencies of existence.\n\nThis school also first expounded the theory of celestial harmonics or \"the music of the spheres.\" John Reuchlin said of Pythagoras that he taught nothing to his disciples before the discipline of silence, silence being the first rudiment of contemplation.\n\nIn his Sophist , Aristotle credits Empedocles with the discovery of rhetoric."

