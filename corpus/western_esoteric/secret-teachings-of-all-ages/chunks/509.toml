[content]
body = "II of the Anales del Museo Nacional de México is reproduced the head of an image generally considered to represent Quetzalcoatl.\n\nThe sculpturing is distinctly Oriental in character and on the crown of the head appear both the thousand-petaled sunburst of spiritual illumination and the serpent of the liberated spinal fire.\n\nThe Hindu chakra is unmistakable and it frequently appears in the religious art of the three Americas.\n\nOne of the carved monoliths of Central America is adorned with the heads of two elephants with their drivers.\n\nNo such animals have existed in the Western Hemisphere since prehistoric times and it is evident that the carvings are the result of contact with the distant continent of Asia.\n\nAmong the Mysteries of the Central American Indians is a remarkable doctrine concerning the consecrated mantles or, as they were called in Europe, magic capes.\n\nBecause their glory was fatal to mortal vision, the gods, when appearing to the initiated priests, robed themselves in these mantles, Allegory and fable likewise are the mantles with which the secret doctrine is ever enveloped.\n\nSuch a magic cape of concealment is the Popol Vuh , and deep within its folds sits the god of Quiché philosophy.\n\nThe massive pyramids, temples, and monoliths of Central America may be likened also to the feet of gods, whose upper parts are enshrouded in magic mantles of invisibility."

