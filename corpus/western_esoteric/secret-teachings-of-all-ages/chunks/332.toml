body = "THERE is no doubt that much of the material recorded in the first five books of the Old Testament is derived from the initiatory rituals of the Egyptian Mysteries.\n\nThe priests of Isis were deeply versed in occult lore, and the Israelites during their captivity in Egypt learned from them many things concerning the significance of Divinity and the manner of worshiping It.\n\nThe authorship of the first five books of the Old Testament is generally attributed to Moses, but whether or not he was the actual writer of them is a matter of controversy.\n\nThere is considerable evidence to substantiate the hypothesis that the Pentateuch was compiled at a much later date, from oral traditions.\n\nConcerning the authorship of these books, Thomas Inman makes a rather startling statement: \"It is true that we have books which purport to be the books of Moses; so there are, or have been, books purporting to be written by Homer, Orpheus, Enoch, Mormon, and Junius; yet the existence of the writings, and the belief that they were written by those whose name they bear, are no real evidences of the men or the genuineness of the works called by their names.\n\nIt is true also that Moses is spoken of occasionally in the time of the early Kings of Jerusalem; but it is clear that these passages are written by a late hand, and have been introduced into the places where they are found, with the definite intention of making it appear that the lawgiver was known to David and Solomon.\" (See Ancient Faiths Embodied in Ancient Names .) While this noted scholar undoubtedly had much evidence to support his belief, it seems that this statement is somewhat too sweeping in character.\n\nIt is apparently based upon the fact that Thomas Inman doubted the historical existence of Moses.\n\nThis doubt was based upon the etymological resemblance of the word Moses to an ancient name for the sun.\n\nAs the result of these deductions, Inman sought to prove that the Lawgiver of Israel was merely another form of the omnipresent solar myth.\n\nWhile Inman demonstrated that by transposing two of the ancient letters the word Moses (משה) became Shemmah (שמה), an appellation of the celestial globe, he seems to have overlooked the fact that in the ancient Mysteries the initiates were often given names synonymous with the sun, to symbolize the fact that the redemption and regeneration of the solar power had been achieved within their own natures.\n\nIt is far more probable that the man whom we know as Moses was an accredited representative of the secret schools, laboring--as many other emissaries have labored--to instruct primitive races in the mysteries of their immortal souls.\n\nThe true name of the Grand Old Man of Israel who is known to history as Moses will probably never be ascertained.\n\nThe word Moses, when understood in its esoteric Egyptian sense, means one who has been admitted into the Mystery Schools of Wisdom and ~as gone forth to teach the ignorant concerning the will of the gods and the mysteries of life, as these mysteries were explained within the temples of Isis, Osiris, and Serapis.\n\nThere is much controversy concerning the nationality of Moses.\n\nSome assert that he was a Jew, adopted and educated by the ruling house of Egypt; others hold the opinion that he was a full-blooded Egyptian.\n\nA few even believe him to be identical with the immortal Hermes, for both these illustrious founders of religious systems received tablets from heaven supposedly written by the finger of God.\n\nThe stories told concerning Moses, his discovery in the ark of bulrushes by Pharaoh's daughter, his adoption into the royal family of Egypt, and his later revolt against Egyptian autocracy coincide exactly with certain ceremonies through which the candidates of the Egyptian Mysteries passed in their ritualistic wanderings in search of truth and understanding.\n\nThe analogy can also be traced in the movements of the heavenly bodies."

