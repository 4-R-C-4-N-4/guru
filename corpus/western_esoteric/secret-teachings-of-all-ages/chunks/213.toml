body = "Typhon waited to devour all who failed to pass the judgment of the Dead, which rite took place in the Hall of Justice between the earth and the Elysian Fields.\n\nAnthony Todd Thomson thus describes the good treatment accorded the smaller and tamer crocodiles, which the Egyptians accepted as personifications of good: \"They were fed daily and occasionally had mulled wine poured down their throats.\n\nTheir ears were ornamented with rings of gold and precious stones, and their forefeet adorned with bracelets.\" To the Chinese the turtle was a symbol of longevity.\n\nAt a temple in Singapore a number of sacred turtles are kept, their age recorded by carvings on their shells.\n\nThe American Indians use the ridge down the back of the turtle shell as a symbol of the Great Divide between life and death.\n\nThe turtle is a symbol of wisdom because it retires into itself and is its own protection.\n\nIt is also a phallic symbol, as its relation to long life would signify.\n\nThe Hindus symbolized the universe as being supported on the backs of four great elephants who, in turn, are standing upon an immense turtle which is crawling continually through chaos.\n\nThe Egyptian sphinx, the Greek centaur, and the Assyrian man-bull have much in common.\n\nAll are composite creatures combining human and animal members; in the Mysteries all signify the composite nature of man and subtly refer to the hierarchies of celestial beings that have charge of the destiny of mankind.\n\nTHE URÆUS.\n\nFrom Kircher's Œdipus Ægyptiacus.\n\nThe spinal cord was symbolized by a snake, and the serpent coiled upon the foreheads of the Egyptian initiates represented the Divine Fire which had crawled serpentlike up the Tree of Life.\n\n*** These hierarchies are the twelve holy animals now known as constellations--star groups which are merely symbols of impersonal spiritual impulses.\n\nChiron, the centaur, teaching the sons of men, symbolizes the intelligences of the constellation of Sagittarius, who were the custodians of the secret doctrine while (geocentrically) the sun was passing through the sign of Gemini.\n\nThe five-footed Assyrian man-bull with the wings of an eagle and the head of a man is a reminder that the invisible nature of man has the wings of a god, the head of a man, and the body of a beast.\n\nThe same concept was expressed through the sphinx--that armed guardian of the Mysteries who, crouching at the gate of the temple, denied entrance to the profane.\n\nThus placed between man and his divine possibilities, the sphinx also represented the secret doctrine itself.\n\nChildren's fairy stories abound with descriptions of symbolic monsters, for nearly all such tales are based upon the ancient mystic folklore.\n\nGOOD AND EVIL CONTENDING FOR THE UNIVERSAL EGG.\n\nFrom Maurice's Indian Antiquities.\n\nBoth Mithras, the Persian Redeemer, and Serapis, the Egyptian God of the Earth, are symbolized by serpents coiled about their bodies.\n\nThis remarkable drawing shows the good and evil principles of Persia--Ahura-Mazda and Ahriman--contending for the Egg of the Earth, which each trying to wrench from the teeth of the other.\n\n*** Part 2 AS appropriate emblems of various human and divine attributes birds were included in religious and philosophic symbolism that of pagans and of Christians alike.\n\nCruelty was signified by the buzzard; courage by the eagle; self-sacrifice by the pelican; and pride by the peacock.\n\nThe ability of birds to leave the earth and fly aloft toward the source of light has resulted in their being associated with aspiration, purity, and beauty.\n\nWings were therefore often added to various terrene creatures in an effort to suggest transcendency."

