body = "Aristarchus of Samos, another great Greek astronomer and mathematician, who lived about 250 B.C., established by philosophical deduction and a few simple scientific instruments that the earth revolved around the sun.\n\nWhile Copernicus actually believed himself to be the discoverer of this fact, he but restated the findings advanced by Aristarchus seventeen hundred years earlier.\n\n*** Another peculiarity of the evenly-odd numbers is that if the divisor be odd the quotient is always even, and if the divisor be even the quotient is always odd.\n\nFor example: if 18 be divided by 2 (an even divisor) the quotient is 9 (an odd number); if 18 be divided by 3 (an odd divisor) the quotient is 6 (an even number).\n\nThe evenly-odd numbers are also remarkable in that each term is one-half of the sum of the terms on either side of it.\n\nFor example: 10 is one-half of the sum of 6 and 14; 18 is one-half the sum of 14 and 22; and 6 is one-half the sum of 2 and 10.\n\nThe oddly-odd, or unevenly-even, numbers are a compromise between the evenly-even and the evenly-odd numbers.\n\nUnlike the evenly-even, they cannot be halved back to unity; and unlike the evenly-odd, they are capable of more than one division by halving.\n\nThe oddly-odd numbers are formed by multiplying the evenly-even numbers above 2 by the odd numbers above one.\n\nThe odd numbers above one are 3, 5, 7, 9, 11, and so forth.\n\nThe evenly-even numbers above 2 are 4, 8, 16, 32, 64, and soon.\n\nThe first odd number of the series (3) multiplied by 4 (the first evenly-even number of the series) gives 12, the first oddly-odd number.\n\nBy multiplying 5, 7, 9, 11, and so forth, by 4, oddly-odd numbers are found.\n\nThe other oddly-odd numbers are produced by multiplying 3, 5, 7, 9, 11, and so forth, in turn, by the other evenly-even numbers (8, 16, 32, 64, and so forth).\n\nAn example of the halving of the oddly-odd number is as follows: 1/2 of 12 = 6; 1/2 of 6 = 3, which cannot be halved further because the Pythagoreans did not divide unity.\n\nEven numbers are also divided into three other classes: superperfect , deficient , and perfect .\n\nSuperperfect or superabundant numbers are such as have the sum of their fractional parts greater than themselves.\n\nFor example: 1/2 of 24 = 12; 1/4 = 6; 1/3 = 8; 1/6 = 4; 1/12 = 2; and 1/24 = 1.\n\nThe sum of these parts (12+6+8+4+2+1) is 33, which is in excess of 24, the original number.\n\nDeficient numbers are such as have the sum of their fractional parts less than themselves.\n\nFor example: 1/2 of 14 = 7; 1/7 = 2; and 1/14 = 1.\n\nThe sum of these parts (7+2+1) is 10, which is less than 14, the original number.\n\nPerfect numbers are such as have the sum of their fractional parts equal to themselves."

