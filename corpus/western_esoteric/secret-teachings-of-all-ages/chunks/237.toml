body = "As the homeland or birthplace of a race was considered sacred, these stones were emblematic of that universal regard shared by all nations for the place of their geniture.\n\nThe discovery that fire could be produced by striking together two pieces of stone augmented man's reverence for stones, but ultimately the hitherto unsuspected world of wonders opened by the newly discovered element of fire caused pyrolatry to supplant stone worship.\n\nThe dark, cold Father--stone--gave birth out of itself to the bright, glowing Son-fire; and the newly born flame, by displacing its parent, became the most impressive and mysterious of all religio-philosophic symbols, widespread and enduring through the ages.\n\nSATURN SWALLOWING THE STONE SUBSTITUTED FOR JUPITER.\n\nFrom Catrari's Imagini degli Dei degli Antichi.\n\nSaturn, having been warned by his parents that one of his own children would dethrone him, devoured each child at birth.\n\nAt last Rhea, his wife, in order to save Jupiter, her sixth child substituted for him a rock enveloped in swaddling clothes--which Saturn, ignorant of the deception practiced upon him, immediately swallowed.\n\nJupiter was concealed on the island of Crete until he attained manhood, when he forced his father to disgorge the five children he had eaten.\n\nThe stone swallowed by Saturn in lieu of his youngest son was placed by Jupiter at Delphi, where it was held in great veneration and was daily anointed.\n\n*** The body of every thing was likened to a rock, trued either into a cube or more ornately chiseled to form a pedestal, while the spirit of everything was likened to the elaborately carved figure surmounting it.\n\nAccordingly, altars were erected as a symbol of the lower world, and fires were kept burning upon them to represent that spiritual essence illuminating the body it surmounted.\n\nThe square is actually one surface of a cube, its corresponding figure in plane geometry, and its proper philosophic symbol.\n\nConsequently, when considering the earth as an element and not as a body, the Greeks, Brahmins, and Egyptians always referred to its four corners, although they were fully aware that the planet itself was a sphere.\n\nBecause their doctrines were the sure foundation of all knowledge and the first step in the attainment of conscious immortality, the Mysteries were often represented as cubical or pyramidal stones.\n\nConversely, these stones themselves became the emblem of that condition of self-achieved godhood.\n\nThe unchangeability of the stone made it an appropriate emblem of God--the immovable and unchangeable Source of Existence--and also of the divine sciences--the eternal revelation of Himself to mankind.\n\nAs the personification of the rational intellect, which is the true foundation of human life, Mercury, or Hermes, was symbolized in a like manner.\n\nSquare or cylindrical pillars, surmounted by a bearded head of Hermes and called hermæ, were set up in public places.\n\nTerminus, a form of Jupiter and god of boundaries and highways, from whose name is derived the modern word terminal , was also symbolized by an upright stone, sometimes ornamented with the head of the god, which was placed at the borders of provinces and the intersections of important roads.\n\nThe philosopher's stone is really the philosophical stone , for philosophy is truly likened to a magic jewel whose touch transmutes base substances into priceless gems like itself.\n\nWisdom is the alchemist's powder of projection which transforms many thousand times its own weight of gross ignorance into the precious substance of enlightenment.\n\nTHE TABLETS OF THE LAW While upon the heights of Mount Sinai, Moses received from Jehovah two tablets bearing the characters of the Decalogue traced by the very finger of Israel's God."

