body = "Thus in one chamber the voice of the priest was amplified until his words caused the very room to vibrate, while in another the voice was diminished and softened to such a degree that it sounded like the distant tinkling of silver bells.\n\nAgain, in some of the underground passageways the candidate was apparently bereft of the power of speech, for though he shouted at the top of his voice not even a whisper was audible to his ears.\n\nAfter progressing a few feet, however, he would discover that his softest sigh would be reechoed a hundred times.\n\nThe supreme ambition of the Dionysiac Architects was the construction of buildings which would create distinct impressions consistent with the purpose for which the structure itself was designed.\n\nIn common with the Pythagoreans, they believed it possible by combinations of straight lines and curves to induce any desired mental attitude or emotion.\n\nThey labored, therefore, to the end of producing a building perfectly harmonious with the structure of the universe itself.\n\nThey may have even believed that an edifice so constructed because it was in no respect at variance with any existing reality would not be subject to dissolution but would endure throughout the span of mortal time.\n\nAs a logical deduction from their philosophic trend of thought, such a building-- en rapport with Cosmos--would also have become an oracle.\n\nCertain early works on magical philosophy hint that the Ark of the Covenant was oracular in character because of specially prepared chambers in its interior.\n\nThese by their shape and arrangement were so attuned to the vibrations of the invisible world that they caught and amplified the voices of the ages imprinted upon and eternally existent in the substance of the astral light.\n\nUnskilled in these ancient subtleties of their profession, modern architects often create architectural absurdities which would cause their creators to blush with shame did they comprehend their actual symbolic import.\n\nThus, phallic emblems are strewn in profusion among the adornments of banks, office buildings, and department stores.\n\nChristian churches also may be surmounted with Brahmin or Mohammedan domes or be designed in a style suitable for a Jewish synagogue or a Greek temple to Pluto.\n\nThese incongruities may be considered trivial in importance by the modern designer, but to the trained psychologist the purpose for which a building was erected is frustrated in large measure by the presence of such architectural discordances.\n\nVitruvius thus defines the principle of propriety as conceived and applied by the Dionysians: \"Propriety is that: perfection of style which comes when a work is authoritatively constructed on approved principles.\n\nIt arises from prescription (Greek θεματισμῷ), from usage, or from nature.\n\nFrom prescription, in the case of hypæthral edifices, open to the sky, in honour of Jupiter Lightning, the Heaven, the Sun, or the Moon: for these are gods whose semblances and manifestations we behold before our very eyes in the sky when it is cloudless and bright.\n\nThe temples of Minerva, Mars, and Hercules will be Doric, since the virile strength of these gods makes daintiness entirely inappropriate to their houses.\n\nIn temples to Venus, Flora, Proserpine, Spring-Water, and the Nymphs, the Corinthian order will be found to have peculiar significance, because these are delicate divinities and so its rather slender outlines, its flowers, leaves, and ornamental volutes will lend propriety where it is due."

