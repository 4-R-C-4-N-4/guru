body = "(See The Indian Religions , by Hargrave Jennings.) \"It is mentioned as a tradition in some of the accounts of the burning,\" writes Jennings, \"that Molay, ere he expired, summoned Clement, the Pope who had pronounced the bull of abolition against the Order and had condemned the Grand Master to the flames, to appear, within forty days, before the Supreme Eternal judge, and Philip [the king] to the same awful tribunal within the space of a year.\n\nBoth predictions were fulfilled.\" The close relationship between Freemasonry and the original Knights Templars has caused the story of CHiram to be linked with the martyrdom of Jacques de Molay.\n\nAccording to this interpretation, the three ruffians who cruelly slew their Master at the gates of the temple because he refused to reveal the secrets of his Order represent the Pope, the king, and the executioners.\n\nDe Molay died maintaining his innocence and refusing to disclose the philosophical and magical arcana of the Templars.\n\nThose who have sought to identify CHiram with the murdered King Charles the First conceive the Hiramic legend to have been invented for that purpose by Elias Ashmole, a mystical philosopher, who was probably a member of the Rosicrucian Fraternity.\n\nCharles was dethroned in 1647 and died on the block in 1649, leaving the Royalist party leaderless.\n\nAn attempt has been made to relate the term \"the Sons of the Widow\" (an appellation frequently applied to members of the Masonic Order) to this incident in English history, for by the murder of her king England became a Widow and all Englishmen Widow's Sons .\n\nTo the mystic Christian Mason, CHiram.\n\nrepresents the Christ who in three days (degrees) raised the temple of His body from its earthly sepulcher.\n\nHis three murderers were Cæsar's agent (the state), the Sanhedrin (the church), and the incited populace (the mob).\n\nThus considered, CHiram becomes the higher nature of man and the murderers are ignorance, superstition, and fear.\n\nThe indwelling Christ can give expression to Himself in this world only through man's thoughts, feelings, and actions.\n\nRight thinking, right feeling, and right action--these are three gates through which the Christ power passes into the material world, there to labor in the erection of the Temple of Universal Brotherhood.\n\nIgnorance, superstition, and fear are three ruffians through whose agencies the Spirit of Good is murdered and a false kingdom, controlled by wrong thinking, wrong feeling, and wrong action, established in its stead.\n\nIn the material universe evil appears ever victorious.\n\n\"In this sense,\" writes Daniel Sickels, \"the myth of the Tyrian is perpetually repeated in the history of human affairs.\n\nOrpheus was murdered, and his body thrown into the Hebrus; Socrates was made to drink the hemlock; and, in all ages, we have seen Evil temporarily triumphant, and Virtue and Truth calumniated, persecuted, crucified, and slain.\n\nBut Eternal justice marches surely and swiftly through the world: the Typhons, the children of darkness, the plotters of crime, all the infinitely varied forms of evil, are swept into oblivion; and Truth and Virtue--for a time laid low--come forth, clothed with diviner majesty, and crowned with everlasting glory!\" (See General Ahiman Rezon .) If, as there is ample reason to suspect, the modern Freemasonic Order was profoundly influenced by, if it is not an actual outgrowth of, Francis Bacon's secret society, its symbolism is undoubtedly permeated with Bacon's two great ideals: universal education and universal democracy.\n\nThe deadly enemies of universal education are ignorance, superstition, and fear, by which the human soul is held in bondage to the lowest part of its own constitution."

