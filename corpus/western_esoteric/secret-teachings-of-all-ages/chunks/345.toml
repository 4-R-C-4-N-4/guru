body = "The double-headed eagle, or Phœnix, subtly foreshadows the ultimate androgynous state of the human creature.\n\nRosicrucian alchemy was not concerned with metals alone.\n\nMan's own body was the alchemical laboratory, and none could reach Rosicrucian adeptship until he had performed the supreme experiment of transmutation by changing the base metals of ignorance into the pure gold of wisdom and understanding.\n\n*** They then decided to separate and visit the other countries of the earth, not only that their wisdom might be given to others who deserved it but also that they might check and correct any mistakes existing in their own system.\n\nBefore separating, the Brethren prepared six rules, or by-laws, and each bound himself to obey them.\n\nThe first rule was that they should take to themselves no other dignity or credit than that they were willing to heal the sick without charge.\n\nThe second was that from that time on forever they should wear no special robe or garment, but should dress according to the custom of the country wherein they dwelt.\n\nThe third stated that every year upon a certain day they should meet in the \"House of the Holy Spirit,\" or, if unable to do so, should be represented by an epistle.\n\nThe fourth decreed that each member should search for a worthy person to succeed him at his own demise.\n\nThe fifth stated that the letters \"R.C.\" should be their seal, mark, and character from that time onward.\n\nThe sixth specified that the Fraternity should remain unknown to the world for a period of one hundred years.\n\nAfter they had sworn to this code five of the Brothers departed to distant lands, and a year later two of the others also went their way, leaving Father C.R.\n\nC.\n\nalone in the \"House of the Holy Spirit.\" Year after year they met with great joy, for they had quietly and sincerely promulgated their doctrines among the wise of the earth.\n\nWhen the first of the Order died in England, it was decided that the burial places of the members should be secret.\n\nSoon afterward Father C.R.C.\n\ncalled the remaining six together, and it is supposed that then he prepared his own symbolic tomb.\n\nThe Fama records that none of the Brothers alive at the time of its writing knew when Father C.R.C.\n\ndied or where he was buried.\n\nHis body was accidentally discovered 120 years after his death when one of the Brothers, who possessed considerable architectural skill, decided to make some alterations in the \"House of the Holy Spirit.\" [It is only suspected that the tomb was in this building.] While making his alterations, the Brother discovered a memorial tablet upon which were inscribed the names of the early members of the Order.\n\nThis he decided to transfer to a more imposing chapel, for at that time no one knew in what country Father C.R.C.\n\nhad died, this information having been concealed by the original members.\n\nIn attempting to remove the memorial tablet, which was held in place by a large nail, some stones and plastering were broken from the wall, disclosing a door concealed in the masonry.\n\nThe members of the Order immediately cleared away the rest of the débris and uncovered the entrance to a vault.\n\nUpon the door in large letters were the words: POST CXX ANNOS PATEBO.\n\nThis, according to the mystic interpretation of the Brethren, meant, \"In 120 years I shall come forth.\" The following morning the door was opened and the members entered a vault with seven sides and seven corners, each side five feet broad and eight feet high.\n\nAlthough the sun never penetrated this tomb, it was brilliantly illuminated by a mysterious light in the ceiling.\n\nIn the center was a circular altar, upon which were brass plates engraved with strange characters.\n\nIn each of the seven sides was a small door which, upon being opened, revealed a number of boxes filled with books, secret instructions, and the supposedly lost arcanum of the Fraternity."

