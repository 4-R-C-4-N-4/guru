body = "Both Pythagoras and Empedocles accepted the theory of transmigration, the latter saying: \"A boy I was, then did a maid become; a plant, bird, fish, and in the vast sea swum.\" Archytas is credited with invention of the screw and the crane.\n\nPleasure he declared to be a pestilence because it was opposed to the temperance of the mind; he considered a man without deceit to be as rare as a fish without bones.\n\nThe Eleatic sect was founded by Xenophanes (570-480 B.C.), who was conspicuous for his attacks upon the cosmologic and theogonic fables of Homer and Hesiod.\n\nXenophanes declared that God was \"one and incorporeal, in substance and figure round, in no way resembling man; that He is all sight and all hearing, but breathes not; that He is all things, the mind and wisdom, not generate but eternal, impassible, immutable, and rational.\" Xenophanes believed that all existing things were eternal, that the world was without beginning or end, and that everything which was generated was subject to corruption.\n\nHe lived to great age and is said to have buried his sons with his own hands.\n\nParmenides studied under Xenophanes, but never entirely subscribed to his doctrines.\n\nParmenides declared the senses to be uncertain and reason the only criterion of truth.\n\nHe first asserted the earth to be round and also divided its surface into zones of hear and cold.\n\nMelissus, who is included in the Eleatic school, held many opinions in common with Parmenides.\n\nHe declared the universe to be immovable because, occupying all space, there was no place to which it could be moved.\n\nHe further rejected the theory of a vacuum in space.\n\nZeno of Elea also maintained that a vacuum could not exist.\n\nRejecting the theory of motion, he asserted that there was but one God, who was an eternal, ungenerated Being.\n\nLike Xenophanes, he conceived Deity to be spherical in shape.\n\nLeucippus held the Universe to consist of two parts: one full and the other a vacuum.\n\nFrom the Infinite a host of minute fragmentary bodies descended into the vacuum, where, through continual agitation, they organized themselves into spheres of substance.\n\nThe great Democritus to a certain degree enlarged upon the atomic theory of Leucippus.\n\nDemocritus declared the principles of all things to be twofold: atoms and vacuum.\n\nBoth, he asserted, are infinite--atoms in number, vacuum in magnitude.\n\nThus all bodies must be composed of atoms or vacuum.\n\nAtoms possessed two properties, form and size, both characterized by infinite variety.\n\nThe soul Democritus also conceived to be atomic in structure and subject to dissolution with the body.\n\nThe mind he believed to be composed of spiritual atoms.\n\nAristotle intimates that Democritus obtained his atomic theory from the Pythagorean doctrine of the Monad .\n\nAmong the Eleatics are also included Protagoras and Anaxarchus.\n\nSocrates (469-399 B.C.), the founder of the Socratic sect, being fundamentally a Skeptic, did not force his opinions upon others, but through the medium of questionings caused each man to give expression to his own philosophy.\n\nAccording to Plutarch, Socrates conceived every place as appropriate for reaching in that the whole world was a school of virtue.\n\nHe held that the soul existed before the body and, prior to immersion therein, was endowed with all knowledge; that when the soul entered into the material form it became stupefied, but that by discourses upon sensible objects it was caused to reawaken and to recover its original knowledge.\n\nOn these premises was based his attempt to stimulate the soul-power through irony and inductive reasoning.\n\nIt has been said of Socrates that the sole subject of his philosophy was man."

