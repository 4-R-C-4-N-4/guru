body = "In his Key to Alchemy, Samuel Norton divides into fourteen parts the processes or states through which the alchemical substances pass from the time they are first placed in the test tube until ready as medicine for plants, minerals, or men: 1.\n\nSolution, the act of passing from a gaseous or solid condition, into one of liquidity.\n\n2.\n\nFiltration, the mechanical separation of a liquid from the undissolved particles suspended in it.\n\n3.\n\nEvaporation, the changing or converting from a liquid or solid state into a vaporous state with the aid of heat.\n\n4.\n\nDistillation, an operation by which a volatile liquid may be separated from substances which it holds in solution.\n\n5.\n\nSeparation, the operation of disuniting or decomposing substances.\n\n6.\n\nRectification, the process of refining or purifying any substance by repeated distillation.\n\n7.\n\nCalcination, the conversion into a powder or calx by the action of heat; expulsion of the volatile substance from a matter.\n\n8.\n\nCommixtion, the blending of different ingredients into new compounds or mass.\n\n9.\n\nPurification (through putrefaction), disintegration by spontaneous decomposition; decay by artificial means.\n\n10.\n\nInhibition, the process of holding back or restraining.\n\n11.\n\nFermentation, the conversion of organic substances into new compounds in the presence of a ferment.\n\n12.\n\nFixation, the act or process of ceasing to be a fluid and becoming firm; state of being fixed.\n\n13.\n\nMultiplication, the act or process of multiplying or increasing in number, the state of being multiplied.\n\n14.\n\nProjection, the process of turning the base Metals into gold.\n\n*** The Great Arcanum was the most prized of the secrets of the Atlantean priestcraft.\n\nWhen the land of Atlas sank, hierophants of the Fire Mystery brought the formula to Egypt, where it remained for centuries in the possession of the sages and philosophers.\n\nIt gradually moved into Europe, where its secrets are still preserved intact.\n\nThose disagreeing with the legend of Hermes and his Emerald Tablet see in the two hundred angels who descended upon the mountains, as described by the Prophet: Enoch, the first instructors in the alchemical art.\n\nRegardless of its originator, it was left to the Egyptian priests to preserve alchemy for the modern world.\n\nEgypt, because of the color of its earth, was called \"the black empire\" and is referred to in the Old Testament as \"the land of darkness.\" By reason of its possible origin there, alchemy has long been known as \"the black art, \" not in the sense of evil but in the sense of that darkness which has always enshrouded its secret processes.\n\nDuring the Middle Ages, alchemy was not only a philosophy and a science but also a religion.\n\nThose who rebelled against the religious limitations of their day concealed their philosophic teachings under the allegory of gold-making.\n\nIn this way they preserved their personal liberty and were ridiculed rather than persecuted.\n\nAlchemy is a threefold art, its mystery well symbolized by a triangle.\n\nIts symbol is 3 times 3--three elements or processes in three worlds or spheres.\n\nThe 3 times 3 is part of the mystery of the 33rd degree of Freemasonry, for 33 is 3 times 3, which is 9, the number of esoteric man and the number of emanations from the root of the Divine Tree.\n\nIt is the number of worlds nourished by the four rivers that pour out of the Divine Mouth as the verbum fiat .\n\nBeneath the so-called symbolism of alchemy is concealed a magnificent concept, for this ridiculed and despised craft still preserves intact the triple key to the gates of eternal life."

