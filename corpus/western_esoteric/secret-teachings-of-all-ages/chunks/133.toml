[content]
body = "Is not the Holy Temple in the center the great throne of the many-formed Spirit of Nature which is shown in the middle of the Tablet?\n\nWhat are the seven triads but the seven Powers that rule over the world?\n\nPsellus writes: 'The Egyptians worshipped the triad of faith, truth, and love; and the seven fountains: the Sun as ruler--the fountain of matter; then the fountain of the archangels; the fountain of the senses; of judgment; of lightning; of reflections; and of characters of unknown composition.\n\nThey say that the highest material fountains are those of Apollo, Osiris, and Mercury--the fountains of the centers of the elements.\n\n'Thus, they understood by the Sun as ruler the solar world; by the material archangelic, the lunar world; by the fountain of the senses, the world of Saturn; by judgment, Jupiter; by lightning, Mars; by that of the reflections, or mirrors, the world of Venus; by the fountain of characters, the world of Mercury.\n\nAll these are shown by the figures in the center pane of the Tablet.\" The upper panel contains the twelve figures of the zodiac arranged in four triads.\n\nThe center figure in each group represents one of the four fixed signs of the zodiac.\n\nS is the sign of Aquarius; Z , Taurus; C , Leo; and G , Scorpio.\n\nThese are called the Fathers .\n\nIn the secret teachings of the Far East these four figures--the man, the bull, the lion, and the eagle--are called the winged globes or the four Maharajahs who stand upon the corners of creation.\n\nThe four cardinal signs-- P , Capricorn; X , Aries; B , Cancer; F , Libra--are called the Powers.\n\nThe four common signs-- V , Pisces; A , Gemini; E , Virgo; H , Sagittarius--are called the Minds of the Four Lords.\n\nThis explains the meaning of the winged globes of Egypt, for the four central figures--Aquarius, Taurus, Leo, and Scorpio (called by Ezekiel the Cherubim )--are the globes; the cardinal and common signs on either side are the wings.\n\nTherefore the twelve signs of the zodiac may be symbolized by four globes, each with two wings.\n\nThe celestial triads are further shown by the Egyptians as a globe (the Father ) from which issue a serpent (the Mind ) and wings (the Power ).\n\nThese twelve forces are the fabricators of the world, and from them emanate the microcosm, or the mystery of the twelve sacred animals--representing in the universe the twelve parts of the world and in man the twelve parts of the human body.\n\nAnatomically, the twelve figures in the upper panel may well symbolize the twelve convolutions of the brain and the twelve figures in the lower panel the twelve zodiacal members and organs of the human body, for man is a creature formed of the twelve sacred animals with his members and organs under the direct control of the twelve governors or powers resident in the brain.\n\nA more profound interpretation is found in the correspondences between the twelve figures in the upper panel and the twelve in the lower.\n\nThis furnishes a key to one of the most arcane of ancient secrets--the relationship existing between the two great zodiacs the fixed and the movable .\n\nThe fixed zodiac is described as an immense dodecahedron, its twelve surfaces representing the outermost walls of abstract space.\n\nFrom each surface of this dodecahedron a great spiritual power, radiating inward, becomes embodied as one of the hierarchies of the movable zodiac, which is a band of circumambulating so-called fixed stars.\n\nWithin this movable zodiac are posited the various planetary and elemental bodies."

