body = "In defending his right to seek knowledge in all parts of the earth, and among all classes of society, Paracelsus wrote: \"Therefore I consider that it is for me a matter of praise, not of blame, that I have hitherto and worthily pursued my wanderings.\n\nFor this will I bear witness respecting nature: he who will investigate her ways must travel her books with his feet.\n\nThat which is written is investigated through its letters, but nature from land to land-as often a land so often a leaf.\n\nThus is the Codex of Nature, thus must its leaves be turned.\" ( Paracelsus , by John Maxson Stillman.) Paracelsus was a great observationalist, and those who knew him best have called him \"The Second Hermes\" and \"The Trismegistus of Switzerland.\" He traveled Europe from end to end, and may have penetrated Eastern lands while running down superstitions and ferreting out supposedly lost doctrines.\n\nFrom the gypsies he learned much concerning the uses of simples, and apparently from the Arabians concerning the making of talismans and the influences of the heavenly bodies.\n\nParacelsus felt that the healing of the sick was of far greater importance than the maintaining of an orthodox medical standing, so he sacrificed what might otherwise have been a dignified medical career and at the cost of lifelong persecution bitterly attacked the therapeutic systems of his day.\n\nUppermost in his mind was the hypothesis that everything in the universe is good for something--which accounts for his cutting fungus from tombstones and collecting dew on glass plates at midnight.\n\nHe was a true explorer of Nature's arcanum.\n\nMany authorities have held the opinion that he was the discoverer of mesmerism, and that Mesmer evolved the art as the result of studying the writings of this great Swiss physician.\n\nThe utter contempt which Paracelsus felt for the narrow systems of medicine in vogue during his lifetime, and his conviction of their inadequacy, are best expressed in his own quaint way: \"But the number of diseases that originate from some unknown causes is far greater than those that come from mechanical causes, and for such diseases our physicians know no cure because not knowing such causes they cannot remove them.\n\nAll they can prudently do is to observe the patient and make their guesses about his condition; and the patient may rest satisfied if the medicines administered to him do no serious harm, and do not prevent his recovery.\n\nThe best of our popular physicians are the ones that do least harm.\n\nBut, unfortunately, some poison their patients with mercury, others purge them or bleed them to death.\n\nThere are some who have learned so much that their learning has driven out all their common sense, and a there are others who care a great: deal more for their own profit than for the health of their patients.\n\nA disease does not change its state to accommodate itself to the knowledge of the physician, but the physician should understand the causes of the disease.\n\nA physician should be a servant of Nature, and not her enemy; he should be able to guide and direct her in her struggle for life and not throw, by his unreasonable interference, fresh obstacles in the way of recovery.\" (From the Paragranum , translated by Franz Hartmann.) The belief that nearly all diseases have their origin in the invisible nature of man (the Astrum) is a fundamental precept of Hermetic medicine, for while Hermetists in no way disregarded the physical body, they believed that man's material constitution was an emanation from, or an objectification of, his invisible spiritual principles.\n\nA brief, but it is believed fairly comprehensive, résumé of the Hermetic principles of Paracelsus follows.\n\nTHE TITLE PAGE OF THE BOOK OF ALZE.\n\nFrom Musæum Hermeticum Reformatum et Amplificatum.\n\nThis title page is a further example of Hermetic and alchemical symbolism."

