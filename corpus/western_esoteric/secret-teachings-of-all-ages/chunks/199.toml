body = "A word whispered in one of these apartments was so intensified that the reverberations made the entire building sway and be filled with a deafening roar.\n\nThe very wood and stone used in the erection of these sacred buildings eventually became so thoroughly permeated with the sound vibrations of the religious ceremonies that when struck they would reproduce the same tones thus repeatedly impressed into their substances by the rituals.\n\nEvery element in Nature has its individual keynote.\n\nIf these elements are combined in a composite structure the result is a chord that, if sounded, will disintegrate the compound into its integral parts.\n\nLikewise each individual has a keynote that, if sounded, will destroy him.\n\nThe allegory of the walls of Jericho falling when the trumpets of Israel were sounded is undoubtedly intended to set forth the arcane significance of individual keynote or vibration.\n\nTHE PHILOSOPHY OF COLOR \"Light,\" writes Edwin D.\n\nBabbitt, \"reveals the glories of the external world and yet is the most glorious of them all.\n\nIt gives beauty, reveals beauty and is itself most beautiful.\n\nIt is the analyzer, the truth-teller and the exposer of shams, for it shows things as they are.\n\nIts infinite streams measure off the universe and flow into our telescopes from stars which are quintillions of miles distant.\n\nOn the other hand it descends to objects inconceivably small, and reveals through the microscope objects fifty millions of times less than can be seen by the naked eye.\n\nLike all other fine forces, its movement is wonderfully soft, yet penetrating and powerful.\n\nWithout its vivifying influence, vegetable, animal, and human life must immediately perish from the earth, and general ruin take place.\n\nWe shall do well, then, to consider this potential and beautiful principle of light and its component colors, for the more deeply we penetrate into its inner laws, the more will it present itself as a marvelous storehouse of power to vitalize, heal, refine, and delight mankind.\" (See The Principles of Light and Color .) Since light is the basic physical manifestation of life, bathing all creation in its radiance, it is highly important to realize, in part at least, the subtle nature of this divine substance.\n\nThat which is called light is actually a rate of vibration causing certain reactions upon the optic nerve.\n\nFew realize how they are walled in by the limitations of the sense perceptions.\n\nNot only is there a great deal more to light than anyone has ever seen but there are also unknown forms of light which no optical equipment will ever register.\n\nThere are unnumbered colors which cannot be seen, as well as sounds which cannot be heard, odors which cannot be smelt, flavors which cannot be tasted, and substances which cannot be felt.\n\nMan is thus surrounded by a supersensible universe of which he knows nothing because the centers of sense perception within himself have not been developed sufficiently to respond to the subtler rates of vibration of which that universe is composed.\n\nAmong both civilized and savage peoples color has been accepted as a natural language in which to couch their religious and philosophical doctrines.\n\nThe ancient city of Ecbatana as described by Herodotus, its seven walls colored according to the seven planets, revealed the knowledge of this subject possessed by the Persian Magi.\n\nThe famous zikkurat or astronomical tower of the god Nebo at Borsippa ascended in seven great steps or stages, each step being painted in the key color of one of the planetary bodies.\n\n(See Lenormant's Chaldean Magic .) THE THEORY OF ELEMENTAL MUSIC.\n\nFrom Fludd's De Musica Mundana.\n\nIn this diagram two interpenetrating pyramids are again employed, one of which represents fire and the other earth.\n\nIt is demonstrated according to the law of elemental harmony that fire does not enter into the composition of earth nor earth into the composition of fire."

