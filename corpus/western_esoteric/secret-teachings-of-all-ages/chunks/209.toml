body = "In his Chaldean Account of the Genesis , George Smith, copying from the cuneiform cylinders, in describing the wanderings of the hero Izdubar (Nimrod), throws some light on the scorpion god who guards the sun.\n\nThe tablet which he translated is not perfect, but the meaning is fairly clear: \"* * * who each day guard the rising sun.\n\nTheir crown was at the lattice of heaven, under hell their feet were placed [the spinal column].\n\nThe scorpion man guarded the gate, burning with terribleness, their appearance was like death, the might of his fear shook the forest.\n\nAt the rising of the sun and the setting of the sun, they guarded the sun; Izdubar saw them and fear and terror came into his face.\" Among the early Latins there was a machine of war called the scorpion.\n\nIt was used for firing arrows and probably obtained its name from a long beam, resembling a scorpion's tail, which flew up to hurl the arrows.\n\nThe missiles discharged by this machine were also called scorpions.\n\nThe butterfly (under the name of Psyche , a beautiful maiden with wings of opalescent light) symbolizes the human soul because of the stages it passes through in order to unfold its power of flight.\n\nThe three divisions through which the butterfly passes in its unfoldment resemble closely the three degrees of the Mystery School, which degrees are regarded as consummating the unfoldment of man by giving him emblematic wings by which he may soar to the skies.\n\nUnregenerate man, ignorant and helpless, is symbolized by the stage between ovum and larva; the disciple, seeking truth and dwelling in medication, by the second stage, from larva to pupa, at which time the insect enters its chrysalis (the tomb of the Mysteries); the third stage, from pupa to imago (wherein the perfect butterfly comes forth), typifies the unfolded enlightened soul of the initiate rising from the tomb of his baser nature.\n\nNight moths typify the secret wisdom, because they are hard to discover and are concealed by the darkness (ignorance).\n\nSome are emblems of death, as Acherontia atropos , the death's-head moth, which has a marking on its body somewhat like a human skull.\n\nThe death-watch beetle, which was believed to give warning of approaching death by a peculiar ticking sound, is another instance of insects involved in human affairs.\n\nOpinions differ concerning the spider.\n\nIts shape makes it an appropriate emblem of the nerve plexus and ganglia of the human body.\n\nSome Europeans consider it extremely bad luck to kill a spider--possibly because it is looked upon as an emissary of the Evil One, whom no person desires to offend.\n\nThere is a mystery concerning all poisonous creatures, especially insects.\n\nParacelsus taught that the spider was the medium for a powerful but evil force which the Black Magicians used in their nefarious undertakings.\n\nCertain plants, minerals, and animals have been sacred among all the nations of the earth because of their peculiar sensitiveness to the astral fire--a mysterious agency in Nature which the scientific world has contacted through its manifestations as electricity and magnetism.\n\nLodestone and radium in the mineral world and various parasitic growths in the plant kingdom are strangely susceptible to this cosmic electric fire, or universal life force.\n\nThe magicians of the Middle Ages surrounded themselves with such creatures as bats, spiders, cats, snakes, and monkeys, because they were able to appropriate the life forces of these species and use them to the attainment of their own ends.\n\nSome ancient schools of wisdom taught that all poisonous insects and reptiles are germinated out of the evil nature of man, and that when intelligent human beings no longer breed hate in their own souls there will be no more ferocious animals, loathsome diseases, or poisonous plants and insects."

