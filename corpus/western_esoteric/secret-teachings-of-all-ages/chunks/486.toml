[content]
body = "This city will ultimately be united with the spirit of God and absorbed into the Divine Effulgency.\n\nAnd St.\n\nJohn beheld a river, the Water of Life, which proceeded out of the throne of the Lamb.\n\nThe river represents the stream pouring from the First Logos, which is the life of all things and the active cause of all creation.\n\nThere also was the Tree of Life (the spirit) bearing twelve manner of fruit, whose leaves were for the healing of the nations.\n\nBy the tree is also represented the year, which every month yields some good for the maintenance of existing creatures.\n\nJesus then tells St.\n\nJohn that He is the root and the offspring of David and the bright and morning star (Venus).\n\nSt.\n\nJohn concludes with the words, \"The grace of our Lord Jesus Christ be with you all.\n\nAmen.\""

