body = "At the first gate the great crown is removed from her head, at the second gate the earrings from her ears, at the third gate the necklace from her neck, at the fourth gate the ornaments from her breast, at the fifth gate the girdle from her waist, at the sixth gate the bracelets from her hands and feet, and at the seventh gate the covering cloak of her body.\n\nIshtar remonstrates as each successive article of apparel is taken from her, bur the guardian tells her that this is the experience of all who enter the somber domain of death.\n\nEnraged upon beholding Ishtar, the Mistress of Hades inflicts upon her all manner of disease and imprisons her in the underworld.\n\nAs Ishtar represents the spirit of fertility, her loss prevents the ripening of the crops and the maturing of all life upon the earth.\n\nIn this respect the story parallels the legend of Persephone.\n\nThe gods, realizing that the loss of Ishtar is disorganizing all Nature, send a messenger to the underworld and demand her release.\n\nThe Mistress of Hades is forced to comply, and the water of life is poured over Ishtar.\n\nThus cured of the infirmities inflicted on her, she retraces her way upward through the seven gates, at each of which she is reinvested with the article of apparel which the guardians had removed.\n\n(See The Chaldean Account of Genesis .) No record exists that Ishtar secured the water of life which would have wrought the resurrection of Tammuz.\n\nThe myth of Ishtar symbolizes the descent of the human spirit through the seven worlds, or spheres of the sacred planets, until finally, deprived of its spiritual adornments, it incarnates in the physical body--Hades--where the mistress of that body heaps every form of sorrow and misery upon the imprisoned consciousness.\n\nThe waters of life--the secret doctrine--cure the diseases of ignorance; and the spirit, ascending again to its divine source, regains its God-given adornments as it passes upward through the rings of the planets.\n\nAnother Mystery ritual among the Babylonians and Assyrians was that of Merodach and the Dragon.\n\nMerodach, the creator of the inferior universe, slays a horrible monster and out of her body forms the universe.\n\nHere is the probable source of the so-called Christian allegory of St.\n\nGeorge and the Dragon.\n\nThe Mysteries of Adonis , or Adoni , were celebrated annually in many parts of Egypt, Phœnicia, and Biblos.\n\nThe name Adonis , or Adoni , means \"Lord\" and was a designation applied to the sun and later borrowed by the Jews as the exoteric name of their God.\n\nSmyrna, mother of Adonis, was turned into a tree by the gods and after a time the bark burst open and the infant Savior issued forth.\n\nAccording to one account, he was liberated by a wild boar which split the wood of the maternal tree with its tusks.\n\nAdonis was born at midnight of the 24th of December, and through his unhappy death a Mystery rite was established that wrought the salvation of his people.\n\nIn the Jewish month of Tammuz (another name for this deity) he was gored to death by a wild boar sent by the god Ars (Mars).\n\nThe Adoniasmos was the ceremony of lamenting the premature death of the murdered god.\n\nIn Ezekiel viii.\n\n14, it is written that women were weeping for Tammuz (Adonis) at the north gate of the Lord's House in Jerusalem."

