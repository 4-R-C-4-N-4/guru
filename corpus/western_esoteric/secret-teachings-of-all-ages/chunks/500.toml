body = "The Indian does not worship the sun; he rather regards this shining orb as an appropriate symbol of the Great and Good Spirit who forever radiates life to his red children.\n\nIn Indian symbolism the serpent--especially the Great Serpent--corroborates other evidence pointing to the presence of the Mysteries on the North American Continent.\n\nThe flying serpent is the Atlantean token of the initiate; the seven-headed snake represents the seven great Atlantean islands (the cities of Chibola?) and also the seven great prehistoric schools of esoteric philosophy.\n\nMoreover, who can doubt the presence of the secret doctrine in the Americas when he gazes upon the great serpent mound in Adams County, Ohio, where the huge reptile is represented as disgorging the Egg of Existence?\n\nMany American Indian tribes are reincarnationists, some are transmigrationists.\n\nThey even called their children by the names supposed to have been borne by them in a former life.\n\nThere is an account of an instance where a parent by inadvertence had given his infant the wrong name, whereupon the babe cried incessantly until the mistake had been rectified!\n\nThe belief in reincarnation is also prevalent among the Eskimos.\n\nAged Eskimos not infrequently kill themselves in order to reincarnate in the family of some newly married loved one.\n\nThe American Indians recognize the difference between the ghost and the actual soul of a dead person, a knowledge restricted to initiates of the Mysteries.\n\nIn common with the Platonists they also understood the principles of an archetypal sphere wherein exist the patterns of all forms manifesting in the earth plane, The theory of Group, or Elder, Souls having supervision over the animal species is also shared by them.\n\nThe red man's belief in guardian spirits would have warmed the heart of Paracelsus.\n\nWhen they attain the importance of being protectors of entire clans or tribes, these guardians are called totems .\n\nIn some tribes impressive ceremonies mark the occasion when the young men are sent out into the forest to fast and pray and there remain until their guardian spirit manifests to them.\n\nWhatever creature appears thereupon becomes their peculiar genius, to whom they appeal in time of trouble.\n\nThe outstanding hero of North American Indian folklore is Hiawatha, a name which, according to Lewis Spence, signifies \"he who seeks the wampum-belt.\" Hiawatha enjoys the distinction of anticipating by several centuries the late Woodrow Wilson's cherished dream of a League of Nations.\n\nFollowing in the footsteps of Schoolcraft, Longfellow confused the historical Hiawatha of the Iroquois with Manabozho, a mythological hero of the Algonquins and Ojibwas.\n\nHiawatha, a chief of the Iroquois, after many reverses and disappointments, succeeded in uniting the five great nations of the Iroquois into the \"League of the Five Nations.\" The original purpose of the league--to abolish war by substituting councils of arbitration--was not wholly successful, but the power of the \"Silver Chain\" conferred upon the Iroquois a solidarity attained by no other confederacy of North American Indians.\n\nHiawatha, however, met the same opposition which has confronted every great idealist, irrespective of time or race.\n\nThe shamans turned their magic against him and, according to one legend, created an evil bird which, swooping down from heaven, tore his only daughter to pieces before his eyes.\n\nWhen Hiawatha, after accomplishing his mission, had sailed away in his self-propelled canoe along the path of the sunset, his people realized the true greatness of their benefactor and elevated him to the dignity of a demigod."

