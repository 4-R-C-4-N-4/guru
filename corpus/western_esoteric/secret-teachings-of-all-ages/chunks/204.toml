body = "The upper half of the centaur's body was human and the lower half equine.\n\nThe pelican of the Hermetists fed its young from its own breast, and to this bird were assigned other mysterious attributes which could have been true only allegorically.\n\nThough regarded by many writers of the Middle Ages as actual living creatures, none of these--the pelican excepted--ever existed outside the symbolism of the Mysteries.\n\nPossibly they originated in rumors of animals then little known.\n\nIn the temple, however, they became a reality, for there they signified the manifold characteristics of man's nature.\n\nThe mantichora had certain points in common with the hyena; the unicorn may have been the single-horned rhinoceros.\n\nTo the student of the secret wisdom these composite animals.\n\nand birds simply represent various forces working in the invisible worlds.\n\nThis is a point which nearly all writers on the subject of medieval monsters seem to have overlooked.\n\n(See Vlyssis Aldrovandi's Monstrorum Historia , 1642, and Physica Curiosa , by P.\n\nGaspare Schotto, 1697.) There are also legends to the effect that long before the appearance of human beings there existed a race or species of composite creatures which was destroyed by the gods.\n\nThe temples of antiquity preserved their own historical records and possessed information concerning the prehistoric world that has never been revealed to the uninitiated.\n\nAccording to these records, the human race evolved from a species of creature that partook somewhat of the nature of an amphibian, for at that time primitive man had the gills of a fish and was partly covered with scales.\n\nTo a limited degree, the human embryo demonstrates the possibility of such a condition.\n\nAs a result of the theory of man's origin in water, the fish was looked upon as the progenitor of the human family.\n\nThis gave rise to the ichthyolatry of the Chaldeans, Phœnicians, and Brahmins.\n\nThe American Indians believe that the waters of lakes, rivers, and oceans are inhabited by a mysterious people, the \"Water Indians.\" The fish has been used as an emblem of damnation; but among the Chinese it typified contentment and good fortune, and fishes appear on many of their coins.\n\nWhen Typhon, or Set, the Egyptian evil genius, had divided the body of the god Osiris into fourteen parts, he cast one part into the river Nile, where, according to Plutarch, it was devoured by three fishes--the lepidotus (probably the lepidosiren ), the phagrus , and the oxyrynchus (a form of pike).\n\nFor this reason the Egyptians would not eat the flesh of these fishes, believing that to do so would be to devour the body of their god.\n\nWhen used as a symbol of evil, the fish represented the earth (man's lower nature) and the tomb (the sepulcher of the Mysteries).\n\nThus was Jonah three days in the belly of the \"great fish,\" as Christ was three days in the tomb.\n\nTHE FIRST INCARNATION, OR MATSYA AVATAR, OF VISHNU.\n\nFrom Picart's Religious Ceremonials.\n\nThe fish has often been associated with the World Saviors.\n\nVishnu, the Hindu Redeemer, who takes upon himself ten forms for the redemption of the universe, was expelled from the mouth of a fish in his first incarnation.\n\nIsis, while nursing the infant Horus, is often shown with a fish on her headdress.\n\nOannes, the Chaldean Savior (borrowed from the Brahmins), is depicted with the head and body of a fish, from which his human form protrudes at various points.\n\nJesus was often symbolized by a fish."

