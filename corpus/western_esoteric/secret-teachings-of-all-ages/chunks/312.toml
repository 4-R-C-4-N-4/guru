[content]
body = "The Zohar holds the concept of two Adams: the first a divine being who, stepping forth from the highest original darkness, created the second, or earthly, Adam in His own image.\n\nThe higher, or celestial, man was the Causal sphere With its divine potencies and potentialities considered as a gigantic personality; its members, according to the Gnostics, being the basic elements of existence.\n\nThis Adam may have been symbolized as facing both ways to signify that with one face it looked upon the proximate Cause of itself and with the other face looked upon the vast sea of Cosmos into which it was to be immersed.\n\nPhilosophically, Adam may be regarded as representative of the full spiritual nature of man--androgynous and nor subject to decay.\n\nOf this fuller nature the mortal man has little comprehension.\n\nJust as spirit contains matter within itself and is both the source and ultimate of the state denominated matter , so Eve represents the lower, or mortal, portion that is taken out of, or has temporal existence in the greater and fuller spiritual creation .\n\nBeing representative of the inferior part of the individual, Eve is the temptress who, conspiring with the serpent of mortal knowledge, caused Adam to sink into a trancelike condition in which he was unconscious of his own higher Self.\n\nWhen Adam seemingly awoke, he actually sank into sleep, for he no longer was in the spirit but in the body; division having taken place within him, the true Adam rested in Paradise while his lesser part incarnated in a material organism (Eve) and wandered in the darkness of mortal existence.\n\nThe followers of Mohammed apparently sensed more accurately than the uninitiated of other sects the true mystic import of Paradise, for they realized that prior to his fall the dwelling place of man was not in a physical garden in any particular part of the earth but rather in a higher sphere (the angelic world) watered by four mystical streams of life.\n\nAfter his banishment from Paradise, Adam alighted on the Island of Ceylon, and this spot is sacred to certain Hindu sects who recognize the old Island of Lanka--once presumably connected with the mainland by a bridge--as the actual site of the Garden of Eden from which the human race migrated.\n\nAccording to the Arabian Nights (Sir Richard Burton's translation), Adam's footprint may still be seen on the top of a Ceylonese mountain.\n\nIn the Islamic legends, Adam was later reunited with his wife and after his death his body was brought to Jerusalem subsequent to the Flood for burial by Melchizedek.\n\n(See the Koran .) The word ADM signifies a species or race and only for lack of proper understanding has Adam been considered as an individual.\n\nAs the Macrocosm, Adam is the gigantic Androgyne, even the Demiurgus; as the Microcosm, he is the chief production of the Demiurgus and within the nature of the Microcosm the Demiurgus established all the qualities and powers which He Himself possessed.\n\nThe Demiurgus, however, did not possess immortality and, therefore, could not bestow it upon Adam.\n\nAccording to legend, the Demiurgus strove to keep man from learning the incompleteness of his Maker.\n\nThe Adamic man consequently partook of the qualities and characteristics of the angels who were the ministers of the Demiurgus.\n\nIt was affirmed by the Gnostic Christians that the redemption of humanity was assured through the descent of Nous (Universal Mind), who was a great spiritual being superior to the Demiurgus and who, entering into the constitution of man, conferred conscious immortality upon the Demiurgic fabrications.\n\nThat phallic symbolism occupies an important place in early Jewish mysticism is indisputable."

