[content]
body = "As God is the pervading principle of three worlds, in each of which He manifests as an active principle, so the spirit of man, partaking of the nature of Divinity, dwells upon three planes of being: the Supreme, the Superior, and the Inferior spheres of the Pythagoreans.\n\nAt the gate of the Inferior sphere (the underworld, or dwelling place of mortal creatures) stands the guardian of Hades--the three--headed dog Cerberus, who is analogous to the three murderers of the Hiramic legend.\n\nAccording to this symbolic interpretation of the triune spirit, CHiram is the third, or incarnating, part--the Master Builder who through all ages erects living temples of flesh and blood as shrines of the Most High.\n\nCHiram comes forth as a flower and is cut down; he dies at the gates of matter; he is buried in the elements of creation, but--like Thor--he swings his mighty hammer in the fields of space, sets the primordial atoms in motion, and establishes order out of Chaos.\n\nAs the potentiality of cosmic power within each human soul, CHiram lies waiting for man by the elaborate ritualism of life to transmute potentiality into divine potency.\n\nAs the sense perceptions of the individual increase, however, man gains ever greater control over his various parts, and the spirit of life within gradually attains freedom.\n\nThe three murderers represent the laws of the Inferior world--birth, growth, and decay--which ever frustrate the plan of the Builder.\n\nTo the average individual, physical birch actually signifies the death of CHiram, and physical death the resurrection of CHiram.\n\nTo the initiate, however, the resurrection of the spiritual nature is accomplished without the intervention of physical death.\n\nThe curious symbols found in the base of Cleopatra's Needle now standing in Central Park, New York, were interpreted as being of first Masonic significance by S.\n\nA.\n\nZola, 33° Past Grand Master of the Grand Lodge of Egypt.\n\nMasons' marks and symbols are to be found on the stones of numerous public buildings not only in England and on the Continent but also in Asia.\n\nIn his Indian Masons' Marks of the Moghul Dynasty , A.\n\nGorham describes scores of markings appearing on the walls of buildings such as the Taj Mahal , the Jama Masjid , and that: famous Masonic structure, the Kutab Minar .\n\nAccording to those who regard Masonry as an outgrowth of the secret society of architects and builders which for thousands of years formed a caste of master craftsmen, CHiram Abiff was the Tyrian Grand Master of a world-wide organization of artisans, with headquarters in Tyre.\n\nTheir philosophy consisted of incorporating into the measurements and ornamentation of temples, palaces, mausoleums, fortresses, and other public buildings their knowledge of the laws controlling the universe.\n\nEvery initiated workman was given a hieroglyphic with which he marked the stones he trued to show to all posterity that he thus dedicated to the Supreme Architect of the Universe each perfected product of his labor.\n\nConcerning Masons' marks, Robert Freke Gould writes: \"It is very remarkable that these marks are to be found in all countries--in the chambers of the Great Pyramid at Gizeh, on the underground walls of Jerusalem, in Herculaneum and Pompeii, on Roman walls and Grecian temples, in Hindustan, Mexico, Peru, Asia Minor--as well as on the great ruins of England, France, Germany, Scotland, Italy, Portugal and Spain.\" (See A Concise History of Freemasonry .) From this viewpoint the story of CHiram may well represent the incorporation of the divine secrets of architecture into the actual parts and dimensions of earthly buildings."

