body = "This central globe he called the Tower of Jupiter , the Globe of Unity , the Grand Monad , and the Altar of Vesta .\n\nAs the sacred number 10 symbolized the sum of all parts and the completeness of all things, it was only natural for Pythagoras to divide the universe into ten spheres, symbolized by ten concentric circles.\n\nThese circles began at the center with the globe of Divine Fire; then came the seven planers, the earth, and another mysterious planet, called Antichthon , which was never visible.\n\nOpinions differ as to the nature of Antichthon .\n\nClement of Alexandria believed that it represented the mass of the heavens; others held the opinion that it was the moon.\n\nMore probably it was the mysterious eighth sphere of the ancients, the dark planet which moved in the same orbit as the earth but which was always concealed from the earth by the body of the sun, being in exact opposition to the earth at all times.\n\nIs this the mysterious Lilith concerning which astrologers have speculated so long?\n\nIsaac Myer has stated: \"The Pythagoreans held that each star was a world having its own atmosphere, with an immense extent surrounding it, of aether.\" (See The Qabbalah .) The disciples of Pythagoras also highly revered the planet Venus, because it was the only planet bright enough to cast a shadow.\n\nAs the morning star, Venus is visible before sunrise, and as the evening star it shines forth immediately after sunset.\n\nBecause of these qualities, a number of names have been given to it by the ancients.\n\nBeing visible in the sky at sunset, it was called vesper , and as it arose before the sun, it was called the false light , the star of the morning , or Lucifer , which means the light-bearer .\n\nBecause of this relation to the sun, the planet was also referred to as Venus, Astarte, Aphrodite, Isis, and The Mother of the Gods.\n\nIt is possible that: at some seasons of the year in certain latitudes the fact that Venus was a crescent could be detected without the aid of a telescope.\n\nThis would account for the crescent which is often seen in connection with the goddesses of antiquity, the stories of which do not agree with the phases of the moon.\n\nThe accurate knowledge which Pythagoras possessed concerning astronomy he undoubtedly secured in the Egyptian temples, for their priests understood the true relationship of the heavenly bodies many thousands of years before that knowledge was revealed to the uninitiated world.\n\nThe fact that the knowledge he acquired in the temples enabled him to make assertions requiring two thousand years to check proves why Plato and Aristotle so highly esteemed the profundity of the ancient Mysteries.\n\nIn the midst of comparative scientific ignorance, and without the aid of any modern instruments, the priest-philosophers had discovered the true fundamentals of universal dynamics.\n\nAn interesting application of the Pythagorean doctrine of geometric solids as expounded by Plato is found in The Canon .\n\n\"Nearly all the old philosophers,\" says its anonymous author, \"devised an harmonic theory with respect to the universe, and the practice continued till the old mode of philosophizing died out.\n\nKepler (1596), in order to demonstrate the Platonic doctrine, that the universe was formed of the five regular solids, proposed the following rule.\n\n'The earth is a circle, the measurer of all.\n\nRound it describe a dodecahedron; the circle inclosing this will be Mars.\n\nRound Mars describe a tetrahedron; the sphere inclosing this will be Jupiter.\n\nDescribe a cube round Jupiter; the sphere containing this will be Saturn.\n\nTHE TETRACTYS.\n\nTheon of Smyrna declares that the ten dots, or tetractys of Pythagoras, was a symbol of the greatest importance, for to the discerning mind it revealed the mystery of universal nature."

