[content]
body = "Heaven was created from the elementary fire (or ether) ש, the earth, comprising sea and land, from the elementary water, מ, and the atmospheric air from the elementary air, or spirit, א, which establishes the balance among them.\n\nThus were all things produced.\n\n5.\n\nThe three Mothers, אמש, produce in the year heat, coldness, and the temperate state.\n\nHeat was created from fire, coldness from water, and the temperate state from air, which equilibrates them.\n\n6.\n\nThe three Mothers, אמש, produce in man (male and female) breast, abdomen, and head.\n\nThe head was formed from the fire, ש; the abdomen from the water, מ; and the breast (thorax) from air, א, which places them in equilibrium.\n\n7.\n\nGod let the letter א(A) predominate in primordial air, crowned it, combined it with the other two, and sealed the air in the universe, the temperate state in the year, and the breast in man (male and female).\n\n8.\n\nHe let the letter מ(M) predominate in primordial water, crowned it, combined it with the other two, and sealed the earth in the universe (including land and sea), coldness in the year, and the abdomen in man (male and female).\n\n9.\n\nHe let the letter ש(Sh) predominate in primordial fire, crowned it, combined it with the other two, and sealed heaven in the universe, heat in the year, and the head of man (male and female).\n\nChapter Four 1.\n\nThe seven double letters, בגדכפרת(B, G, D, K, P, R, Th), have a duplicity of pronunciation (two voices), aspirated and unaspirated, namely: פּת, רּ ר, פּ פ, כּ כ, דּ ד, גּ גThey serve as a model of softness and hardness, strength and weakness.\n\n2.\n\nThe seven double letters symbolize wisdom, riches, fertility life, power, peace, and grace.\n\n3.\n\nThe seven double letters also signify the antitheses to which human life is exposed.\n\nThe opposite of wisdom is foolishness; of riches, poverty; of fertility, sterility; of life, death; of power, servitude; of peace, war; and of beauty, deformity.\n\n4.\n\nThe seven double letters point out the six dimensions, height, depth, East and West, North and South, and the Holy Temple in the center, which sustains them all.\n\n5.\n\nThe double letters are seven and not six, they are seven and not eight; reflect upon this fact, search into it and reveal its hidden mystery and place the Creator on His throne again.\n\n6.\n\nThe seven double letters having been designed, established, purified, weighed, and exchanged by God, He formed of them seven planets in the universe, seven days in the Year, and seven gateways of the senses in man (male and female).\n\nFrom these seven He also produced seven heavens, seven earths, and seven Sabbaths.\n\nTherefore He loved seven more than any other number beneath His throne.\n\n7.\n\nThe seven planets in the universe are: Saturn, Jupiter, Mars, Sun, Venus, Mercury, and Moon.\n\nThe seven days in the Year are the seven days of the week (possibly the seven creative days are meant).\n\nThe seven gateways in man (male and female) are two eyes, two ears, two nostrils, and the mouth.\n\nTHE HEBREW LETTERS ACCORDING TO THE SEPHER YETZIRAH.\n\nIn the central triangle are the three Mother Letters from which come forth the seven Double Letters--the planets and the heavens."

