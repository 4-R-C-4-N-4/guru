body = "This orb, being the symbol of all Light, has three distinct phases: rising, midday, and setting.\n\nThe philosophers therefore divided the life of all things into three distinct parts: growth, maturity, and decay.\n\nBetween the twilight of dawn and the twilight of evening is the high noon of resplendent glory.\n\nGod the Father, the Creator of the world, is symbolized by the dawn.\n\nHis color is blue, because the sun rising in the morning is veiled in blue mist.\n\nGod the Son he Illuminating One sent to bear witness of His Father before all the worlds, is the celestial globe at noonday, radiant and magnificent, the maned Lion of Judah, the Golden-haired Savior of the World.\n\nYellow is His color and His power is without end.\n\nGod the Holy Ghost is the sunset phase, when the orb of day, robed in flaming red, rests for a moment upon the horizon line and then vanishes into the darkness of the night to wandering the lower worlds and later rise again triumphant from the embrace of darkness.\n\nTo the Egyptians the sun was the symbol of immortality, for, while it died each night, it rose again with each ensuing dawn.\n\nNot only has the sun this diurnal activity, but it also has its annual pilgrimage, during which time it passes successively through the twelve celestial houses of the heavens, remaining in each for thirty days.\n\nAdded to these it has a third path of travel, which is called the precession of the equinoxes , in which it retrogrades around the zodiac through the twelve signs at the rate of one degree every seventy-two years.\n\nConcerning the annual passage of the sun through the twelve houses of the heavens, Robert Hewitt Brown, 32°, makes the following statement: \"The Sun, as he pursued his way among these 'living creatures' of the zodiac, was said, in allegorical language, either to assume the nature of or to triumph over the sign he entered.\n\nThe sun thus became a Bull in Taurus, and was worshipped as such by the Egyptians under the name of Apis, and by the Assyrians as Bel, Baal, or Bul.\n\nIn Leo the sun became a Lion-slayer, Hercules, and an Archer in Sagittarius.\n\nIn Pisces, the Fishes, he was a fish--Dagon, or Vishnu, the fish-god of the Philistines and Hindoos.\" A careful analysis of the religious systems of pagandom uncovers much evidence of the fact that its priests served the solar energy and that their Supreme Deity was in every case this Divine Light personified.\n\nGodfrey Higgins, after thirty years of inquiry into the origin of religious beliefs, is of the opinion that \"All the Gods of antiquity resolved themselves into the solar fire, sometimes itself as God, or sometimes an emblem or shekinah of that higher principle, known by the name of the creative Being or God.\" The Egyptian priests in many of their ceremonies wore the skins of lions, which were symbols of the solar orb, owing to the fact that the sun is exalted, dignified, and most fortunately placed in the constellation of Leo, which he rules and which was at one time the keystone of the celestial arch.\n\nAgain, Hercules is the Solar Deity, for as this mighty hunter performed his twelve labors, so the sun, in traversing the twelve houses of the zodiacal band, performs during his pilgrimage twelve essential and benevolent labors for the human race and for Nature in general, Hercules, like the Egyptian priests, wore the skin of a lion for a girdle.\n\nSamson, the Hebrew hero, as his name implies, is also a solar deity."

