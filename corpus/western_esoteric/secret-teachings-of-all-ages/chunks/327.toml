body = "The demon is winged like a bar, showing that it pertains to the nocturnal, or shadow inferior sphere.\n\nThe animal natures of man, in the form of a male and a female elemental, are chained to its footstool.\n\nThe torch is the false light which guides unillumined souls to their own undoing.\n\nIn the pseudo-Egyptian Tarot appears Typhon--a winged creature composed of a hog, a man, a bat, a crocodile, and a hippopotamus--standing in the midst of its own destructiveness and holding aloft the firebrand of the incendiary.\n\nTyphon is created by man's own misdeeds, which, turning upon their maker, destroy him.\n\nThe sixteenth numbered major trump is called Le Feu du Ciel , the Fire of Heaven, and portrays a tower the battlements of which, in the form of a crown, are being destroyed by a bolt of lightning issuing from the sun .\n\nThe crown, being considerably smaller than the tower which it surmounts, possibly indicates that its destruction resulted from its insufficiency.\n\nThe lighting bolt sometimes takes the form of the zodiacal sign of Scorpio, and the tower may be considered a phallic emblem.\n\nTwo figures are failing from the tower, one in front and the other behind.\n\nThis Tarot card is popularly associated with the traditional fall of man.\n\nThe divine nature of humanity is depicted as a tower.\n\nWhen his crown is destroyed, man falls into the lower world and takes upon himself the illusion of materiality.\n\nHere also is a key to the mystery of sex.\n\nThe tower is supposedly filled with gold coins which, showering out in great numbers from the rent made by the lightning bolt, suggesting potential powers.\n\nIn the pseudo-Egyptian Tarot the tower is a pyramid, its apex shattered by a lightning bolt.\n\nHere is a reference to the missing capstone of the Universal House.\n\nIn support of Levi's contention that this card is connected with the Hebrew letter Ayin , the failing figure in the foreground is similar in general appearance to the sixteenth letter of the Hebrew alphabet.\n\nThe seventeenth numbered major trump is called Les Etoiles , the Stars, and portrays a young girl kneeling with one foot in water and the other on and, her body somewhat suggesting the swastika.\n\nShe has two urns, the contents of which she pours upon the land and sea.\n\nAbove the girl's head are eight stars, one of which is exceptionally large and bright.\n\nCount de Gébelin considers the great star to be Sothis or Sirius; the other seven are the sacred planets of the ancients.\n\nHe believes the female figure to be Isis in the act of causing the inundations of the Nile which accompanied the rising of the Dog Star.\n\nThe unclothed figure of Isis may well signify that Nature does not receive her garment of verdure until the rising of the Nile waters releases the germinal life of plants and flowers.\n\nThe bush and bird (or butterfly) signify the growth and resurrection which accompany the rising of the waters.\n\nIn the pseudo-Egyptian Tarot the great star contains a diamond composed of a black and white triangle, and the flowering bush is a tall plant with a trifoliate head upon which a butterfly alights.\n\nHere Isis is in the form of an upright triangle and the vases have become shallow cups.\n\nThe elements of water and earth under her feet represent the opposites of Nature sharing impartially in the divine abundance.\n\nThe eighteenth numbered major trump is called La Lune , the Moon, and portrays Luna rising between two towers--one light and the other dark.\n\nA dog and a wolf are baying at the rising moon, and in the foreground is a pool of water from which emerges a crawfish.\n\nBetween the towers a path winds, vanishing in the extreme background."

