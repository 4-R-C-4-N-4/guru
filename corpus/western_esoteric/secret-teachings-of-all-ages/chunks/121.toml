body = "Pythagoras taught that 10, or the unit of the decimal system, was the most perfect of all numbers, and he symbolized the number ten by the lesser tetractys , an arrangement of ten dots in the form of an upright triangle.\n\nThe early star gazers, after dividing the zodiac into its houses, appointed the three brightest scars in each constellation to be the joint rulers of that house.\n\nThen they divided the house into three sections of ten degrees each, which they called decans.\n\nThese, in turn, were divided in half, resulting in the breaking up of the zodiac into seventy-two duodecans of five degrees each.\n\nOver each of these duodecans the Hebrews placed a celestial intelligence, or angel, and from this system, has resulted the Qabbalistic arrangement of the seventy-two sacred names, which correspond to the seventy-two flowers, knops, and almonds upon the seven-branched Candlestick of the Tabernacle, and the seventy-two men who were chosen from the Twelve Tribes to represent Israel.\n\nThe only two signs not already mentioned are Gemini and Sagittarius.\n\nThe constellation of Gemini is generally represented as two small children, who, according to the ancients, were born out of eggs, possibly the ones that the Bull broke with his horns.\n\nThe stories concerning Castor and Pollux, and Romulus and Remus, may be the result of amplifying the myths of these celestial Twins.\n\nThe symbols of Gemini have passed through many modifications.\n\nThe one used by the Arabians was the peacock.\n\nTwo of the important stars in the constellation of Gemini still bear the names of Castor and Pollux.\n\nThe sign of Gemini is supposed to have been the patron of phallic worship, and the two obelisks, or pillars, in front of temples and churches convey the same symbolism as the Twins.\n\nThe sign of Sagittarius consists of what the ancient Greeks called a centaur--a composite creature, the lower half of whose body was in the form of a horse, while the upper half was human.\n\nThe centaur is generally shown with a bow and arrow in his hands, aiming a shaft far off into the stars.\n\nHence Sagittarius stands for two distinct principles: first, it represents the spiritual evolution of man, for the human form is rising from the body of the beast; secondly, it is the symbol of aspiration and ambition, for as the centaur aims his arrow at the stars, so every human creature aims at a higher mark than he can reach.\n\nAlbert Churchward, in The Signs and Symbols of Primordial Man , sums up the influence of the zodiac upon religious symbolism in the following words: \"The division here [is] in twelve parts, the twelve signs of the Zodiac, twelve tribes of Israel, twelve gates of heaven mentioned in Revelation, and twelve entrances or portals to be passed through in the Great Pyramid, before finally reaching the highest degree, and twelve Apostles in the Christian doctrines, and the twelve original and perfect points in Masonry.\" The ancients believed that the theory of man's being made in the image of God was to be understood literally.\n\nThey maintained that the universe was a great organism not unlike the human body, and that every phase and function of the Universal Body had a correspondence in man.\n\nThe most precious Key to Wisdom that the priests communicated to the new initiates was what they termed the law of analogy .\n\nTherefore, to the ancients, the study of the stars was a sacred science, for they saw in the movements of the celestial bodies the ever-present activity of the Infinite Father.\n\nThe Pythagoreans were often undeservedly criticized for promulgating the so-called doctrine of metempsychosis, or the transmigration of souls.\n\nThis concept as circulated among the uninitiated was merely a blind, however, to conceal a sacred truth."

