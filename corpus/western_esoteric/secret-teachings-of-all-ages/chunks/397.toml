[content]
body = "Without doubt as the black, pitchy matter will and must of necessity become White and Red , and the Red having been carried to perfection, medicinally and for Metals, is then fully capable to preserve mentem sanam in corpore sano until the natural period of Life and promise us ample means, in infinitum multipliable, to be benevolent and charitable without any diminution of our inexhaustible resources, therefore well may it be called the Glory [Honours] of the Whole World , as truly the study and contemplation of the L.\n\nP.\n\n[ Lapis Philosophorum ], harmonising with Divine Truths, elevates the mind to God our Creator and merciful Father, and if He should permit us to possess it practically must eradicate the very principle of Avarice, Envy, and Evil Inclinations, and cause our hearts to melt in gratitude toward Him that has been so kind to us!\n\nTherefore the Philosophers say with great Truth, that the L.\n\nP.\n\neither finds a good man or makes one.\n\n\"AND DARKNESS WILL FLY FROM THEE.\n\nBy invigorating the Organs the Soul makes use of for communicating with exterior objects, the Soul must acquire greater powers not only for conception but also for retention, and therefore if we wish to obtain still more knowledge, the organs and secret springs of physical life being wonderfully strengthened and invigorated, the Soul must acquire new powers for conceiving and retaining, especially if we pray to God for knowledge, and confirm our prayers by faith, all Obscurity must vanish of course.\n\nThat this has not been the case with all possessors, was their own fault, as they contented themselves merely with the Transmutation of Metals.\n\n\"(Use.) THIS IS THE STRENGTH OF ALL POWERS.\n\nThis is a very strong figure, to indicate that the L.\n\nP.\n\npositively does possess all the Powers concealed in Nature, not for destruction but for exaltation and regeneration of matter, in the three Departments of Nature.\n\n\"WITH THIS THOU WILT BE ABLE TO OVERCOME ALL THINGS, AND TO TRANSMUTE ALL WHAT IS FINE AND WHAT IS COARSE .\n\nIt will conquer every subtil Thing, of course, as it refixes the most subtil Oxygen into its own fiery Nature and that with more power, penetration and virtue, in a tenfold ratio, at every multiplication, and each time in a much shorter period, until its power becomes incalculable, which multiplied power also penetrates [overcomes] every Solid Thing , such as unconquerable Gold and Silver , the otherwise unalterable Mercury , Crystals and Glass Fluxes, to which it is able to give natural hardness and fixity, as Philaletha does attest, and is proved by an artificial Diamond, in my father's time, in possession of Prince Lichtenstein in Vienna , valued at Five Hundred Thousand Ducats, fixed by the Lapis [Philosopher's Stone].\n\n\"IN THIS MANNER THE WORLD WAS CREATED; THE ARRANGEMENTS TO FOLLOW THIS ROAD ARE HIDDEN.\n\nFOR THIS REASON I AM CALLED CHIRAM TELAT MECHASOT , ONE IN ESSENCE , BUT THREE IN ASPECT .\n\nIN THIS TRINITY IS HIDDEN THE WISDOM OF THE WHOLE WORLD (i.e., in Chiram and its Use ).\n\nIt is thought that Hermes was Moses or Zoroaster , otherwise Hermes signifies a Serpent , and the Serpent used to be an Emblem of Knowledge or Wisdom ."

