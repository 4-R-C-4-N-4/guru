[content]
body = "About the vase is written: \"Green and white.\" \"The vase flame color, the flowers green.\" \"Our water, our silver.\" The lines below read: \"The material of the Philosopher's Stone is that thick, viscous water, which either heat or cold congeals.\n\nIt is Mercury boiled down and thickened, cooked in neutral earth with sulphurous heat and is called the Prime Material of the metals.\n\nIn caverns yet dark, and forbidding mountains, if a Stone be found which a thousand years ago Nature made out of her fruits, it will bring him that has it out of trouble.\n\n* * * Listen carefully to all my verses; I speak them without veil and without deception.\n\nLeaf 2 .\n\nAt the top is a quotation from St.\n\nThomas Aquinas concerning the composition of the Philosopher's Stone, which is described as of the purest transparency; in it all the forms of the elements and their contrarieties were visible.\n\nBeneath the figure of St.\n\nThomas Aquinas is a short paragraph praising the excellence of the Philosophic Stone, declaring that from the one substance can be derived three and from the three, two.\n\nTo the right of St.\n\nThomas Aquinas is a likeness of Raymond Lully seated in the door of his hermitage.\n\nUnder his feet appears a quotation from this celebrated alchemist, beginning with the question, \"What is the Philosopher's Stone?\" After declaring it to be a reddish, fixed mercury, Lully swears to the Almighty that he has told the truth and that it is not permissible to say more.\n\n(The original manuscript is mutilated at this point.) Leaf 3 .\n\nThe writing at the top of the page reads: \"Death of Saturn; life of Mercury.\" After describing the use of the saturnine substances, the key to the process is declared to be depicted below.\n\nThe verse reads \"This [the stone] is made of four elements.\n\nThis is the truth in all Nature.\n\nTake it in hand, bright and shining, with all diligence and great care and then try to bind all securely together side by side, so the fire may cause alarm.\" Above the human figure is written: \"Saturn is almost dead.\" To the right if the devouring serpent is a statement of Albertus Magnus that Saturn and Mercury are the first principles of the Stone.\n\nIt also declares that Nature wisely provided a mixture of elements so that earth can communicate its dryness to fire, fire its heat to air, air its moisture to water, and water its coldness to earth.\n\n(Text about the vase is illegible in original.) Leaf 4 .\n\nAt the top: \"Let them believe that .\n\neverything is possible.\n\nThe art is fleeting, bright and rare, and not believed by the foolish.\" The words between the sun and crescent read \"It is hidden,\" and on the panel across the body \"The Book of life and true Treasury of the World.\" The panel to the left of the figure says \"Moving almost all, and the soul of its body returns to the place from which it had fled, and ripens seven months or nine, and the King crowned with his diadem appears.\" The right panel states: \"There are three Mercuries: animal, vegetable, and mineral.\" The text below is of such a cryptic nature that to translate it is well nigh impossible.\n\nIt declares that by putting fire beneath the feet of the symbolic figure it is possible to extract therefrom the sun and the moon which the human body is shown elevating to a position of dignity above its head.\n\nLeaf 5 .\n\nIn the upper panel it is declared that the sun-bird battles with the earth-serpent, who, tearing out his own entrails, gives them to the bird.\n\nThe spirit is vivified and Lazarus with joy is raised from the dead."

