body = "Whether such men as these, or Ptolemæus, who never saw the apostles, and who never even in his dreams attained to the slightest trace of an apostle?\" Commenting on the foregoing passage, Godfrey Higgins remarks that it has fortunately escaped the hands of those destroyers who have attempted to render the Gospel narratives consistent by deleting all such statements.\n\nHe also notes that the doctrine of the crucifixion was a vexata questio among Christians even during the second century.\n\n\"The evidence of Irenæus,\" he says, \"cannot be touched.\n\nOn every principle of sound criticism, and of the doctrine of probabilities, it is unimpeachable.\" It should further be noted that Irenæus prepared this statement to contradict another apparently current in his time to the effect that the ministry of Jesus lasted but one year.\n\nOf all the early Fathers, Irenæus, writing within eighty years after the death of St.\n\nJohn the Evangelist, should have had reasonably accurate information.\n\nIf the disciples themselves related that Jesus lived to advanced age in the body, why has the mysterious number 33 been arbitrarily chosen to symbolize the duration of His life?\n\nWere the incidents in the life of Jesus purposely altered so that His actions would fit more closely into the pattern established by the numerous Savior-Gods who preceded Him?\n\nThat these analogies were recognized and used as a leverage in converting the Greeks and Romans is evident from a perusal of the writings of Justin Martyr, another second-century authority.\n\nIn his Apology , Justin addresses the pagans thus: \"And when we say also that the Word, who is the first-birth of God, was produced without sexual union, and that He, Jesus Christ, Our Teacher, was crucified and died, and rose again, and ascended into heaven, we propound nothing different from what you believe regarding those whom you esteem sons of Jupiter.\n\n* * * And if we assert that the Word of God was born of God in a peculiar manner, different from ordinary generation, let this, as said above, be no extraordinary thing to you, who say that Mercury is the angelic word of God.\n\nBut if any one objects that He was crucified, in this also He is on a par with those reputed sons of Jupiter of yours, who suffered as we have now enumerated.\" From this it is evident that the first missionaries of the Christian Church were far more willing to admit the similarities between their faith and the faiths of the pagans than were their successors in later centuries.\n\nIn an effort to solve some of the problems arising from any attempt to chronicle accurately the life of Jesus, it has been suggested that there may have lived in Syria at that time two or more religious teachers bearing the name Jesus , Jehoshua or Joshua , and that the lives of these men may have been confused in the Gospel stories.\n\nIn his Secret Sects of Syria and the Lebanon , Bernard H.\n\nSpringett, a Masonic author, quotes from an early book, the name of which he was not at liberty to disclose because of its connection with the ritual of a sect.\n\nThe last part of his quotation is germane to the subject at hand: \"But Jehovah prospered the seed of the Essenians, in holiness and love, for many generations.\n\nThen came the chief of the angels, according to the commandment of GOD, to raise up an heir to the Voice of Jehovah.\n\nAnd, in four generations more, an heir was born, and named Joshua, and he was the child of Joseph and Mara, devout worshippers of Jehovah, who stood aloof from all other people save the Essenians.\n\nAnd this Joshua, in Nazareth, reestablished Jehovah, and restored many of the lost rites and ceremonies.\n\nIn the thirty-sixth year of his age he was stoned to death in Jerusalem * * *\" THE ROUND TABLE OF KING ARTHUR."

