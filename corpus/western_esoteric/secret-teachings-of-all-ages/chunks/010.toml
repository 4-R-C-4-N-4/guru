body = "In reality, however, pleasure (especially of a physical nature) is the true end of existence and exceeds in every way mental and spiritual enjoyments.\n\nPleasure, furthermore, is limited wholly to the moment; now is the only time.\n\nThe past cannot be regarded without regret and the future cannot be faced without misgiving; therefore neither is conducive to pleasure.\n\nNo man should grieve, for grief is the most serious of all diseases.\n\nNature permits man to do anything he desires; he is limited only by his own laws and customs.\n\nA philosopher is one free from envy, love, and superstition, and whose days are one long round of pleasure.\n\nIndulgence was thus elevated by Aristippus to the chief position among the virtues.\n\nHe further declared philosophers to differ markedly from other men in that they alone would not change the order of their lives if all the laws of men were abolished.\n\nAmong prominent philosophers influenced by the Cyrenaic doctrines were Hegesias, Anniceris, Theodorus, and Bion.\n\nThe sect of the Academic philosophers instituted by Plato (427-347 B.C.) was divided into three major parts--the old, the middle, and the new Academy.\n\nAmong the old Academics were Speusippus, Zenocrates, Poleman, Crates, and Crantor.\n\nArcesilaus instituted the middle Academy and Carneades founded the new.\n\nChief among the masters of Plato was Socrates.\n\nPlato traveled widely and was initiated by the Egyptians into the profundities of Hermetic philosophy.\n\nHe also derived much from the doctrines of the Pythagoreans.\n\nCicero describes the threefold constitution of Platonic philosophy as comprising ethics, physics, and dialectics.\n\nPlato defined good as threefold in character: good in the soul, expressed through the virtues; good in the body, expressed through the symmetry and endurance of the parts; and good in the external world, expressed through social position and companionship.\n\nIn The Book of Speusippus on Platonic Definitions , that great Platonist thus defines God: \"A being that lives immortally by means of Himself alone, sufficing for His own blessedness, the eternal Essence, cause of His own goodness.\n\nAccording to Plato, the One is the term most suitable for defining the Absolute, since the whole precedes the parts and diversity is dependent on unity, but unity not on diversity.\n\nThe One, moreover, is before being, for to be is an attribute or condition of the One.\n\nPlatonic philosophy is based upon the postulation of three orders of being: that which moves unmoved, that which is self-moved, and that which is moved.\n\nThat which is immovable but moves is anterior to that which is self-moved, which likewise is anterior to that which it moves.\n\nThat in which motion is inherent cannot be separated from its motive power; it is therefore incapable of dissolution.\n\nOf such nature are the immortals.\n\nThat which has motion imparted to it from another can be separated from the source of its an animating principle; it is therefore subject to dissolution.\n\nOf such nature are mortal beings.\n\nSuperior to both the mortals and the immortals is that condition which continually moves yet itself is unmoved.\n\nTo this constitution the power of abidance is inherent; it is therefore the Divine Permanence upon which all things are established.\n\nBeing nobler even than self-motion, the unmoved Mover is the first of all dignities.\n\nThe Platonic discipline was founded upon the theory that learning is really reminiscence, or the bringing into objectivity of knowledge formerly acquired by the soul in a previous state of existence.\n\nAt the entrance of the Platonic school in the Academy were written the words: \"Let none ignorant of geometry enter here.\" After the death of Plato, his disciples separated into two groups."

