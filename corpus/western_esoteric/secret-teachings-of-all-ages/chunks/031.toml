body = "In the present world, said they, Good and Evil are so exactly balanced that man has the utmost freedom and is able to choose or reject either.\n\nThe Welsh Triads tell us there are three objects of metempsychosis: to collect into the soul the properties of all being, to acquire a knowledge of all things, and to get power to conquer evil.\n\nThere are also, they say, three kinds of knowledge: knowledge of the nature of each thing, of its cause, and its influence.\n\nThere are three things which continually grow less: darkness, falsehood, and death.\n\nThere are three which constantly increase: light, life, and truth.\" Like nearly all schools of the Mysteries, the teachings of the Druids were divided into two distinct sections.\n\nThe simpler, a moral code, was taught to all the people, while the deeper, esoteric doctrine was given only to initiated priests.\n\nTo be admitted to the order, a candidate was required to be of good family and of high moral character.\n\nNo important secrets were intrusted to him until he had been tempted in many ways and his strength of character severely tried.\n\nThe Druids taught the people of Britain and Gaul concerning the immortality of the soul.\n\nThey believed in transmigration and apparently in reincarnation.\n\nThey borrowed in one life, promising to pay back in the next.\n\nThey believed in a purgatorial type of hell where they would be purged of their sins, afterward passing on to the happiness of unity with the gods.\n\nThe Druids taught that all men would be saved, but that some must return to earth many times to learn the lessons of human life and to overcome the inherent evil of their own natures.\n\nBefore a candidate was intrusted with the secret doctrines of the Druids, he was bound with a vow of secrecy.\n\nThese doctrines were imparted only in the depths of forests and in the darkness of caves.\n\nIn these places, far from the haunts of men, the neophyte was instructed concerning the creation of the universe, the personalities of the gods, the laws of Nature, the secrets of occult medicine, the mysteries of the celestial bodies, and the rudiments of magic and sorcery.\n\nThe Druids had a great number of feast days.\n\nThe new and full moon and the sixth day of the moon were sacred periods.\n\nIt is believed that initiations took place only at the two solstices and the two equinoxes.\n\nAt dawn of the 25th day of December, the birth of the Sun God was celebrated.\n\nThe secret teachings of the Druids are said by some to be tinctured with Pythagorean philosophy.\n\nThe Druids had a Madonna, or Virgin Mother, with a Child in her arms, who was sacred to their Mysteries; and their Sun God was resurrected at the time of the year corresponding to that at which modern Christians celebrate Easter.\n\nBoth the cross and the serpent were sacred to the Druids, who made the former by cutting off all the branches of an oak tree and fastening one of them to the main trunk in the form of the letter T.\n\nThis oaken cross became symbolic of their superior Deity.\n\nThey also worshiped the sun, moon, and stars.\n\nThe moon received their special veneration.\n\nCaesar stated that Mercury was one of the chief deities of the Gauls.\n\nThe Druids are believed to have worshiped Mercury under the similitude of a stone cube.\n\nThey also had great veneration for the Nature spirits (fairies, gnomes, and undines), little creatures of the forests and rivers to whom many offerings were made."

