[content]
body = "I am the guardian of the Tree of Knowledge and I have sworn that none whom I can lead astray shall partake of its fruits.\" The Adam replies: \"For uncounted ages have I been thy servant.\n\nIn my ignorance I listened to thy words and they led me into paths of sorrow.\n\nThou hast placed in my mind dreams of power, and when I struggled to realize those dreams they brought me naught but pain.\n\nThou hast sowed in me the seeds of desire, and when I lusted after the things of the flesh agony was my only recompense.\n\nThou hast sent me false prophets and false reasoning, and when I strove to grasp the magnitude of Truth I found thy laws were false and only dismay rewarded my strivings.\n\nI am done with thee forever, O artful Spirit!\n\nI have tired of thy world of illusions.\n\nNo longer will I labor in thy vineyards of iniquity.\n\nGet thee behind me, rempter, and the host of thy temptations.\n\nThere is no happiness, no peace, no good, no future in the doctrines of selfishness, hate, and passion preached by thee.\n\nAll these things do I cast aside.\n\nRenounced is thy rule forever!\" And the serpent makes answer: \"Behold, O Adam, the nature of thy Adversary!\" The serpent disappears in a blinding sunburst of radiance and in its place stands an angel resplendent in shining, golden garments with great scarlet wings that spread from one corner of the heavens to the other.\n\nDismayed and awestruck, the Adam falls before the divine creature.\n\n\"I am the Lord who is against thee and thus accomplishes thy salvation, \" continues the voice.\n\n\"Thou hast hated me, but through the ages yet to be thou shalt bless me, for I have led thee our of the sphere of the Demiurgus; I have turned thee against the illusion of worldliness; I have weaned thee of desire; I have awakened in thy soul the immortality of which I myself partake.\n\nFollow me, O Adam, for I am the Way, the Life, and the Truth!\""

