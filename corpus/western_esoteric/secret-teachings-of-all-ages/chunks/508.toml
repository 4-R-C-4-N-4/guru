body = "Pisces, their ashes turning into man-fishes , and later back into human form.\" It would seem more appropriate to assign the river of blood to Aries and that of mud to Taurus, and it is not at all improbable that in the ancient form of the legend the order of the rivers was reversed.\n\nDr.\n\nGuthrie's most astonishing conclusion is his effort to identify Xibalba with the ancient continent of Atlantis.\n\nHe sees in the twelve princes of Xibalba the rulers of the Atlantean empire, and in the destruction of these princes by the magic of Hunahpu and Xbalanque an allegorical depiction of the tragic end of Atlantis.\n\nTo the initiated, however, it is evident that Atlantis is simply a symbolic figure in which is set forth the mystery of origins.\n\nConcerned primarily with the problems of mystical anatomy, Mr.\n\nPryse relates the various symbols described in the Popol Vuh to the occult centers of consciousness in the human body.\n\nAccordingly, he sees in the elastic ball the pineal gland and in Hunahpu and Xbalanque the dual electric current directed along the spinal column.\n\nUnfortunately, Mr.\n\nPryse did not translate that portion of the Popol Vuh dealing directly with the initiatory ceremonial.\n\nXibalba he considers to be the shadowy or etheric sphere which, according to the Mystery teachings, was located within the body of the planet itself.\n\nThe fourth book of the Popol Vuh concludes with an account of the erection of a majestic temple, all white, where was preserved a secret black divining stone, cubical in shape.\n\nGucumatz (or Quetzalcoatl) partakes of many of the attributes of King Solomon: the account of the temple building in the Popol Vuh is a reminder of the story of Solomon's Temple, and undoubtedly has a similar significance.\n\nBrasseur de Bourbourg was first attracted to the study of religious parallelisms in the Popol Vuh by the fact that the temple together with the black stone which it contained, was named the Caabaha , a name astonishingly similar to that of the Temple, or Caaba , which contains the sacred black stone of Islam.\n\nThe exploits of Hunahpu and Xbalanque take place before the actual creation of the human race and therefore are to be considered essentially as spiritual mysteries.\n\nXibalba doubtless signifies the inferior universe of Chaldean and Pythagorean philosophy; the princes of Xibalba are the twelve Governors of the lower universe; and the two dummies or manikins in their midst may be interpreted as the two false signs of the ancient zodiac inserted in the heavens to make the astronomical Mysteries incomprehensible to the profane.\n\nThe descent of Hunahpu and Xbalanque into the subterranean kingdom of Xibalba by crossing over the rivers on bridges made from their blowguns has a subtle analogy to the descent of the spiritual nature of man into the physical body through certain superphysical channels that may be likened to the blowguns or tubes.\n\nThe sabarcan is also an appropriate emblem of the spinal cord and the power resident within its tiny central opening.\n\nThe two youths are invited to play the \"Game of Life\" with the Gods of Death, and only with the aid of supernatural power imparted to them by the \"Sages\" can they triumph over these gloomy lords.\n\nThe tests represent the soul wandering through the sub-zodiacal realms of the created universe; their final victory over the Lords of Death represents the ascension of the spiritual and illumined consciousness from the tower nature which has been wholly consumed by the fire of spiritual purification.\n\nThat the Quichés possessed the keys to the mystery of regeneration is evident from an analysis of the symbols appearing upon the images of their priests and gods.\n\nIn Vol."

