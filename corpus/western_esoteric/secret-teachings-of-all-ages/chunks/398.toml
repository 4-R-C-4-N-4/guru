body = "The Serpent is met with everywhere amongst the Hieroglyphics of the ancient Egyptians, so is the Globe with Wings , the Sun and Moon , Dragons and Griffins , whereby the Egyptians denoted their sublime knowledge of the Lapis Philosophorum, according to Suidas, the hints in the Scriptures, and even De Non where he speaks of the sanctuaries of the ancient Egyptian Temples.\n\n\"IT IS ENDED NOW, WHAT I HAVE SAID CONCERNING THE EFFECTS OF THE SUN.\n\nFINISH OF THE TABULA SMARAGDINA.\n\nWhat I have said or taught of the Solar Work , is now finished.\n\nThe perfect Seed , fit for multiplication.\n\n\"This I know is acknowledged to be the genuine Tabula Smaragdina Hermetis .\" A LETTER FROM THE BROTHERS OF R.\n\nC.\n\n(ROSE CROSS) Although Eugenius Philalethes disclaimed membership in the Rosicrucian Fraternity, it is believed that for a number of years he was the head of that Order.\n\nIn a little work called Lumen de Lumine, or A New Magical Light Discovered and Communicated to the World , published in London in 1651, Eugenius Philalethes gives a remarkable letter, presumably from the Rosicrucian Order.\n\nAccompanying the letter is an emblematic figure setting forth in symbolic form the processes and formulæ of the Philosopher's Stone.\n\nThis epistle is an excellent example of the Rosicrucian system of combining abstract theological speculations with concrete chemical formulæ.\n\nWith the aid of the material contained in various parts of this present book the student would do well to set himself the task of solving the riddle contained in this hieroglyph.\n\n\" A Letter from the Brothers of R.\n\nC.\n\nConcerning the Invisible, Magical Mountain, And the Treasure therein Contained .\n\n\"Every man naturally desires a superiority, to have treasures of Gold and Silver [intellect and soul], and to seem great in the eyes of the world.\n\nGod indeed created all things for the use of man, that he might rule over them, and acknowledge therein the singular goodness and omnipotence of God, give Him thanks for His benefits, honor Him and praise Him.\n\nBut there is no man looks after these things, otherwise than by spending his days idly; they would enjoy them without any previous labor and danger; neither do they look them out of that place where God hath treasured them up, Who expects also that man should seek for them there, and to those that seek will He give them.\n\nBut there is not any that labors for a possession in that place, and therefore these riches are not found: For the way to this place, and the place itself hath been unknown for a long time, and it is hidden from the greatest part of the world.\n\nBut notwithstanding it be difficult and laborious to find Out this way and place, yet the place should be sought after.\n\n\"But it is not the will of God to conceal anything from those that are His, and therefore in this last age, before the final judgment comes, all these things shall be manifested to those that are worthy: As He Himself (though obscurely, lest it should be manifested to, the unworthy) hath spoken in a certain place: There is nothing covered that shall not be revealed, and hidden that shall not be known.\n\nWe therefore being moved by the Spirit of God, do declare the will of God to the world, which we have also already performed and published in several languages."

