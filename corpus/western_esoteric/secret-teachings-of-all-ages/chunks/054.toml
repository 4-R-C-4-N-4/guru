[content]
body = "By the symbolism of his music he communicated the divine secrets to humanity, and several authors have declared that the gods, though loving him, feared that he would overthrow their kingdom and therefore reluctantly encompassed his destruction.\n\nAs time passed on the historical Orpheus became hopelessly confounded with the doctrine he represented and eventually became the symbol of the Greek school of the ancient wisdom.\n\nThus Orpheus was declared to be the son of Apollo, the divine and perfect truth, and Calliope, the Muse of harmony and rhythm.\n\nIn other words, Orpheus is the secret doctrine (Apollo) revealed through music (Calliope).\n\nEurydice is humanity dead from the sting of the serpent of false knowledge and imprisoned in the underworld of ignorance.\n\nIn this allegory Orpheus signifies theology, which wins her from the king of the dead but fails to accomplish her resurrection because it falsely estimates and mistrusts the innate understanding within the human soul.\n\nThe Ciconian women who tore Orpheus limb from limb symbolize the various contending theological factions which destroy the body of Truth.\n\nThey cannot accomplish this, however, until their discordant cries drown out the harmony drawn by Orpheus from his magic lyre.\n\nThe head of Orpheus signifies the esoteric doctrines of his cult.\n\nThese doctrines continue to live and speak even after his body (the cult) has been destroyed.\n\nThe lyre is the secret teaching of Orpheus; the seven strings are the seven divine truths which are the keys to universal knowledge.\n\nThe differing accounts of his death represent the various means used to destroy the secret teachings: wisdom can die in many ways at the same time.\n\nThe allegory of Orpheus incarnating in the white swan merely signifies that the spiritual truths he promulgated will continue and will be taught by the illumined initiates of all future ages.\n\nThe swan is the symbol of the initiates of the Mysteries; it is a symbol also of the divine power which is the progenitor of the world.\n\nTHE BACCHIC AND DIONYSIAC RITES The Bacchic Rite centers around the allegory of the youthful Bacchus (Dionysos or Zagreus) being torn to pieces by the Titans.\n\nThese giants accomplished the destruction of Bacchus by causing him to become fascinated by his own image in a mirror.\n\nAfter dismembering him, the Titans first boiled the pieces in water and afterwards roasted them.\n\nPallas rescued the heart of the murdered god, and by this precaution Bacchus (Dionysos) was enabled to spring forth again in all his former glory.\n\nJupiter, the Demiurgus, beholding the crime of the Titans, hurled his thunderbolts and slew them, burning their bodies to ashes with heavenly fire.\n\nOur of the ashes of the Titans--which also contained a portion of the flesh of Bacchus, whose body they had partly devoured--the human race was created.\n\nThus the mundane life of every man was said to contain a portion of the Bacchic life.\n\nFor this reason the Greek Mysteries warned against suicide.\n\nHe who attempts to destroy himself raises his hand against the nature of Bacchus within him, since man's body is indirectly the tomb of this god and consequently must be preserved with the greatest care.\n\nBacchus (Dionysos) represents the rational soul of the inferior world.\n\nHe is the chief of the Titans--the artificers of the mundane spheres.\n\nThe Pythagoreans called him the Titanic monad .\n\nThus Bacchus is the all-inclusive idea of the Titanic sphere and the Titans--or gods of the fragments --the active agencies by means of which universal substance is fashioned into the pattern of this idea."

