[content]
body = "Apuleius describes her as follows: \"In the first place, then, her most copious and long hairs, being gradually intorted, and promiscuously scattered on her divine neck, were softly defluous.\n\nA multiform crown, consisting of various flowers, bound the sublime summit of her head.\n\nAnd in the middle of the crown, just on her forehead, there was a smooth orb resembling a mirror, or rather a white refulgent light, which indicated that she was the moon.\n\nVipers rising up after the manner of furrows, environed the crown on the right hand and on the left, and Cerealian ears of corn were also extended from above.\n\nHer garment was of many colours, and woven from the finest flax, and was at one time lucid with a white splendour, at another yellow from the flower of crocus, and at another flaming with a rosy redness.\n\nBut that which most excessively dazzled my sight, was a very black robe, fulgid with a dark splendour, and which, spreading round and passing under her right side, and ascending to her left shoulder, there rose protuberant like the center of a shield, the dependent part of the robe falling in many folds, and having small knots of fringe, gracefully flowing in its extremities.\n\nGlittering stars were dispersed through the embroidered border of the robe, and through the whole of its surface: and the full moon, shining in the middle of the stars, breathed forth flaming fires.\n\nNevertheless, a crown, wholly consisting of flowers and fruits of every kind, adhered with indivisible connexion to the border of that conspicuous robe, in all its undulating motions.\n\nWhat she carried in her hands also consisted of things of a very different nature.\n\nFor her right hand, indeed, bore a brazen rattle [sistrum] through the narrow lamina of which bent like a belt, certain rods passing, produced a sharp triple sound, through the vibrating motion of her arm.\n\nAn oblong vessel, in the shape of a boat, depended from her left hand, on the handle of which, in that part in which it was conspicuous, an asp raised its erect head and largely swelling neck.\n\nAnd shoes woven from the leaves of the victorious palm tree covered her immortal feet.\" The green color alludes to the vegetation which covers the face of the earth, and therefore represents the robe of Nature.\n\nThe black represents death and corruption as being the way to a new life and generation.\n\n\"Except a man be born again, he cannot see the kingdom of God.\" (John iii.\n\n3.) White, yellow, and red signify the three principal colors of the alchemical, Hermetical, universal medicine after the blackness of its putrefaction is over.\n\nTHE SISTRUM.\n\n\"The sistrum is designed * * * to represent to us, that every thing must be kept in continual agitation, and never cease from motion; that they ought to be mused and well-shaken, whenever they begin to grow drowsy as it were, and to droop in their motion.\n\nFor, say they, the sound of these sistra averts and drives away Typho; meaning hereby, that as corruption clogs and puts a stop to the regular course of nature; so generation, by the means of motion, loosens it again, and restores it to its former vigour."

