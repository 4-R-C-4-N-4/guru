body = "After this wind will come an earthquake, that will overthrow those things which the wind hath left and make all flat.\n\nBut be sure that you fall not off.\n\n\"The earthquake being past, there shall follow afire, that will consume the earthly rubbish, and discover the treasure, but as yet you cannot see it.\n\nAfter all these things and near the daybreak there shall be a great calm, and you shall see the Day-Star arise and the dawning will appear, and you shall perceive a great treasure.\n\nThe chiefest thing in it, and the most perfect, is a certain exalted tincture, with which the world (if it served God and were worthy of such gifts) might be tinged and turned into most pure gold.\n\n\"This tincture being used, as your Guide shall reach you, will make you young when you are old, and you shall perceive no disease in any part of your bodies.\n\nBy means of this tincture also you shall find pearls of that excellency which cannot be imagined.\n\nBut do not you arrogate anything to yourselves because of your present power, but be contented with that which your Guide shall communicate to you.\n\nPraise God perpetually for this His gift, and have a special care that you use it not for worldly pride, but employ it in such works which are contrary to the world.\n\nUse it rightly and enjoy it so, as if you had it not.\n\nLive a temperate life, and beware of all sin, otherwise your Guide will forsake you, and you shall be deprived of this happiness.\n\nFor know this of a truth, whosoever abuseth this tincture and lives not exemplarly, purely, and devoutly before men he shall lose this benefit, and scarce any hope will there be left ever to recover it afterwards.\" If, as transcendentalists believe, the initiations into the Fraternity of the Rose Cross were given in the invisible worlds which surround and interpenetrate the visible universe, it is not beyond the range of possibility that this allegory is to be considered in the light of an initiatory ritual as well as an alchemical formula.\n\nAs has been noted, it is difficult to secure a complete formula for any of the alchemical operations.\n\nThe one presented here is the most nearly complete of any available.\n\nThe collecting of the rays and energies of the celestial bodies as precipitated in dew is a process which Paracelsus used with great success.\n\nBear constantly in mind that these processes are only for those who have been properly instructed in the secret art .\n\n\" A TRUE REVELATION OF THE MANUAL OPERATION FOR THE UNIVERSAL MEDICINE COMMONLY CALLED 'THE PHILOSOPHER'S STONE.' By the celebrated philosopher of Leyden, as attested upon his deathbed with his own Blood, Anno Domini 1662.\n\nTo my Loving Cousin and Son, the True Hermetic Philosopher-- \"Dear Loving Cousin and Son: \"Although I had resolved never to give in writing to any person the secret of the Ancient Sages, yet notwithstanding out of peculiar affection and love to you, I have taken it upon me, to which the nearness of our relation obliges me, and especially because this temporal life is short, and Art is very dark and you may therefore not attain the wished for end;--but my Son because so precious a jewel belongs not to swine; and also this so great a gift of God may be treated carefully and Christianlike, in consideration thereof I do so largely declare myself to thee.\n\n\"I conjure thee with hand and mouth sacredly; \"1st.\n\nThat most especially thou faithfully keep the same from all wicked, lustful and criminal persons.\n\n\"2dly.\n\nThat thou exalt not thyself in any way.\n\n\"3dly."

