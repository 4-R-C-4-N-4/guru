body = "He himself declared philosophy to be the way of true happiness and its purpose twofold: (1) to contemplate God, and (2) to abstract the soul from corporeal sense.\n\nThe principles of all things he conceived to be three in number: God , matter , and ideas .\n\nOf God he said: \"What He is I know not; what He is not I know.\" Matter he defined as the subject of generation and corruption; idea, as an incorruptible substance--the intellect of God.\n\nWisdom he considered the sum of the virtues.\n\nAmong the prominent members of the Socratic sect were Xenophon, Æschines, Crito, Simon, Glauco, Simmias, and Cebes.\n\nProfessor Zeller, the great authority on ancient philosophies, has recently declared the writings of Xenophon relating to Socrates to be forgeries.\n\nWhen The Clouds of Aristophanes , a comedy written to ridicule the theories of Socrates, was first presented, the great Skeptic himself attended the play.\n\nDuring the performance, which caricatured him seated in a basket high in the air studying the sun, Socrates rose calmly in his seat, the better to enable the Athenian spectators to compare his own unprepossessing features with the grotesque mask worn by the actor impersonating him.\n\nThe Elean sect was founded by Phædo of Elis, a youth of noble family, who was bought from slavery at the instigation of Socrates and who became his devoted disciple.\n\nPlato so highly admired Phædo's mentality that he named one of the most famous of his discourses The Phædo.\n\nPhædo was succeeded in his school by Plisthenes, who in turn was followed by Menedemus.\n\nOf the doctrines of the Elean sect little is known.\n\nMenedemus is presumed to have been inclined toward the teachings of Stilpo and the Megarian sect.\n\nWhen Menedemus' opinions were demanded, he answered that he was free, thus intimating that most men were enslaved to their opinions.\n\nMenedemus was apparently of a somewhat belligerent temperament and often returned from his lectures in a badly bruised condition.\n\nThe most famous of his propositions is stated thus: That which is not the same is different from that with which it is not the same.\n\nThis point being admitted, Menedemus continued: To benefit is not the same as good, therefore good does not benefit.\n\nAfter the time of Menedemus the Elean sect became known as the Eretrian.\n\nIts exponents denounced all negative propositions and all complex and abstruse theories, declaring that only affirmative and simple doctrines could be true.\n\nFrom Thomasin's Recuil des Figures, Groupes, Thermes, Fontaines, Vases et autres Ornaments.\n\nPlato's real name was Aristocles.\n\nWhen his father brought him to study with Socrates, the great Skeptic declared that on the previous night he had dreamed of a white swan, which was an omen that his new disciple was to become one of the world's illumined.\n\nThere is a tradition that the immortal Plato was sold as a slave by the King of Sicily.\n\n*** The Megarian sect was founded by Euclid of Megara (not the celebrated mathematician), a great admirer of Socrates.\n\nThe Athenians passed a law decreeing death to any citizen of Megara found in the city of Athens.\n\nNothing daunted, Euclid donned woman's clothing and went at night to study with Socrates.\n\nAfter the cruel death of their teacher, the disciples of Socrates, fearing a similar fate, fled to Megara, where they were entertained with great honor by Euclid.\n\nThe Megarian school accepted the Socratic doctrine that virtue is wisdom, adding to it the Eleatic concept that goodness is absolute unity and all change an illusion of the senses."

