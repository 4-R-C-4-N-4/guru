[content]
body = "For the third time I asked my question and he answered, 'I am as swift as human thought.' 'You shall serve me,' I replied.\n\nThis spirit was faithful for a long time, but to tell you how he served me is not possible in a document of this length and I will here only indicate how spirits are to be invoked and how the circles for protection are to be prepared.\n\nThere are many kinds of spirits which will permit themselves to be invoked by man and become his servant.\n\nOf these I will list a few: \" Aciel : The mightiest among those who serve men.\n\nHe manifests in pleasing human form about three feet high.\n\nHe must be invoked three times before he will come forth into the circle prepared for him.\n\nHe will furnish riches and will instantly fetch things from a great distance, according to the will of the magician.\n\nHe is as swift as human thought.\n\n\" Aniguel : Serviceable and most useful, and comes in the form of a ten-year-old boy.\n\nHe must be invoked three times.\n\nHis special power is to discover treasures and minerals hidden in the ground, which he will furnish to the magician.\n\n\" Marbuel : A true lord of the mountains and swift as a bird on the wing.\n\nHe is an opposing and troublesome spirit, hard to control.\n\nYou must invoke him four times.\n\nHe appears in the person of Mars [a warrior in heavy armor].\n\nHe will furnish the magician those things which grow above and under the earth.\n\nHe is particularly the lord of the spring-root .\n\n[The spring-root is a mysterious herb, possibly of a reddish color, which medieval magicians asserted had the property of drawing forth or opening anything it touched.\n\nIf placed against a locked door, it would open the door.\n\nThe Hermetists believed that the red-capped woodpecker was specially endowed with the faculty of discovering spring-root , so they followed this bird to its nest, and then stopped up the hole in the tree where its young were.\n\nThe red-crested woodpecker went at once in quest of the spring-root, and, discovering it, brought it to the tree.\n\nIt immediately drew forth the stopper from the entrance to the nest.\n\nThe magician then secured the root from the bird.\n\nIt was also asserted that because of its structure, the etheric body of the spring-root was utilized as a vehicle of expression by certain elemental spirits which manifested through the proclivity of drawing out or opening things.] \" Aciebel : A mighty ruler of the sea, controlling things both upon and under the water.\n\nHe furnishes things lost or sunk in rivers, lakes, and oceans, such as sunken ships and treasures.\n\nThe more sharply you invoke him, the swifter he is upon his errands.\n\n\" Machiel : Comes in the form of a beautiful maiden and by her aid the magician is raised to honor and dignity.\n\nShe makes those she serves worthy and noble, gracious and kindly, and assists in all matters of litigation and justice.\n\nShe will not come unless invoked twice.\n\n\" Baruel : The master of all arts.\n\nHe manifests as a master workman and comes wearing an apron.\n\nHe can teach a magician more in a moment than all the master workmen of the world combined could accomplish in twenty years.\n\nHe must be invoked three times.\n\n\"These are the spirits most serviceable to man, but there are numerous others which, for lack of space, I am unable to describe.\n\nNow, if you desire the aid of the spirit to get this or that, then you must first draw the sign of the spirit whom you desire to invoke.\n\nThe drawing must be made just in front of a circle made before sunrise, in which you and your assistants will stand.\n\nIf you desire financial assistance, then you must invoke the spirit Aciel .\n\nDraw his sign in front of the circle.\n\nIf you need other things, then draw the sign of the spirit capable of furnishing them."

