[content]
body = "But most men either revile, or contemne that, our Manifesto, (the Fama and Confessio Fraternitatis ) or else waiving the Spirit of God, they expect the proposals thereof from us, supposing we will straightway teach them how to make gold by Art, or furnish them with ample treasures, whereby they may live pompously in the face of the world, swagger, and make wars, turn usurers, gluttons, and drunkards, live unchastely, and defile their whole life With several other sins, all which things are contrary to the blessed will of God.\n\nThese men should have learnt from those Ten Virgins (whereof five that were foolish demanded oil for their lamps, from those five that were wise) how that the case is much otherwise.\n\n\"It is expedient that every man should labor for this treasure by the assistance of God, and his own particular search and industry.\n\nBut the perverse intentions of these fellows we understand out of their own writings, by the singular grace and revelation of God.\n\nWe do stop our ears, and wrap ourselves as it were in clouds, to avoid the bellowings and howlings of those men, who in vain cry out for gold.\n\nAnd hence indeed it comes to pass that they brand us with infinite calumnies and slanders, which notwithstanding we do not resent but God in His good time will judge them for it.\n\nBut after that we had well known (though unknown to you) and perceived also by your writing how diligently you are to peruse the Holy Scripture, and seek the true knowledge of God: we have also above many thousands, thought you worthy of some answer, and we signify this much to you by the will of God and the admonition of the Holy Ghost.\n\n\"There is a mountain situated in the midst of the earth, or center of the world, which is both small and great.\n\nIt is soft, also above measure hard and stony.\n\nIt is far off, and near at hand, but by the providence of God, invisible.\n\nIn it are hidden most ample treasures, which the world is not able to value.\n\nThis mountain by envy of the devil, who always opposeth the glory of God and the happiness of man, is compassed about with very cruel beasts and other [sic] ravenous birds, which make the way thither both difficult and dangerous; and therefore hitherto, because the time is not yet come, the way thither could not be sought after nor found out.\n\nBut now at last the way is to be found by those that are worthy, but notwithstanding by every man's self-labor and endeavors.\n\n\"To this mountain you shall go in a certain night (when it: comes) most long and most dark, and see that you prepare yourselves by prayer.\n\nInsist upon the way that: leads to the mountain, but ask not of any man where the way lies: only follow your Guide, who will offer himself to you, and will meet you in the way but you shall not know him.\n\nThis Guide will bring you to the mountain at midnight, when all things are silent and dark.\n\nIt is necessary that you arm yourselves with a resolute heroic courage, lest you fear those things that will happen, and so fall back.\n\nYou need no sword, nor any other bodily weapons, only call upon God sincerely and heartily.\n\n\"When you have discovered the mountain, the first miracle that will appear is this.\n\nA most vehement and very great wind, that will shake the mountain and shatter the rocks to pieces.\n\nYou shall be encountered also by lions and dragons and other terrible beasts, but fear not any of these things.\n\nBe resolute and rake heed that you return not, for your Guide who brought you thither will not suffer any evil to befall you.\n\nAs for the treasure, it is not yet discovered but it is very near."

