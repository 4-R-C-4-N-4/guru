body = "A striking example of the important part which the sun plays in the symbols and rituals of Freemasonry is given by George Oliver, D.D., in his Dictionary of Symbolical Masonry , as follows: \"The sun rises in the east, and in the east is the place for the Worshipful Master.\n\nAs the sun is the source of all light and warmth, so should the Worshipful Master enliven and warm the brethren to their work.\n\nAmong the ancient Egyptians the sun was the symbol of divine providence.\" The hierophants of the Mysteries were adorned with many.\n\ninsignia emblematic of solar power.\n\nThe sunbursts of gilt embroidery on the back of the vestments of the Catholic priesthood signify that the priest is also an emissary and representative of Sol Invictus .\n\nCHRISTIANITY AND THE SUN For reasons which they doubtless considered sufficient, those who chronicled the life and acts of Jesus found it advisable to metamorphose him into a solar deity.\n\nThe historical Jesus was forgotten; nearly all the salient incidents recorded in the four Gospels have their correlations in the movements, phases, or functions of the heavenly bodies.\n\nAmong other allegories borrowed by Christianity from pagan antiquity is the story of the beautiful, blue-eyed Sun God, with His golden hair falling upon His shoulders, robed from head to foot in spotless white and carrying in His arms the Lamb of God, symbolic of the vernal equinox.\n\nThis handsome youth is a composite of Apollo, Osiris, Orpheus, Mithras, and Bacchus, for He has certain characteristics in common with each of these pagan deities.\n\nThe philosophers of Greece and Egypt divided the life of the sun during the year into four parts; therefore they symbolized the Solar Man by four different figures.\n\nWhen He was born in the winter solstice, the Sun God was symbolized as a dependent infant who in some mysterious manner had managed to escape the Powers of Darkness seeking to destroy Him while He was still in the cradle of winter.\n\nThe sun, being weak at this season of the year, had no golden rays (or locks of hair), but the survival of the light through the darkness of winter was symbolized by one tiny hair which alone adorned the head of the Celestial Child.\n\n(As the birth of the sun took place in Capricorn, it was often represented as being suckled by a goat.) At the vernal equinox, the sun had grown to be a beautiful youth.\n\nHis golden hair hung in ringlets on his shoulders and his light, as Schiller said, extended to all parts of infinity.\n\nAt the summer solstice, the sun became a strong man, heavily bearded, who, in the prime of maturity, symbolized the fact that Nature at this period of the year is strongest and most fecund.\n\nAt the autumnal equinox, the sun was pictured as an aged man, shuffling along with bended back and whitened locks into the oblivion of winter darkness.\n\nThus, twelve months were assigned to the sun as the length of its life.\n\nDuring this period it circled the twelve signs of the zodiac in a magnificent triumphal march.\n\nWhen fall came, it entered, like Samson, into the house of Delilah (Virgo), where its rays were cut off and it lost its strength.\n\nIn Masonry, the cruel winter months are symbolized by three murderers who sought to destroy the God of Light and Truth.\n\nThe coming of the sun was hailed with joy; the time of its departure was viewed as a period to be set aside for sorrow and unhappiness."

