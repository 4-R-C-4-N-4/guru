[content]
body = "This glorious, radiant orb of day, the true light \"which lighteth every man who cometh into the world,\" the supreme benefactor, who raised all things from the dead, who fed the hungry multitudes, who stilled the tempest, who after dying rose again and restored all things to life--this Supreme Spirit of humanitarianism and philanthropy is known to Christendom as Christ, the Redeemer of worlds, the Only Begotten of The Father, the Word made Flesh, and the Hope of Glory.\n\nTHE BIRTHDAY OF THE SUN The pagans set aside the 25th of December as the birthday of the Solar Man.\n\nThey rejoiced, feasted, gathered in processions, and made offerings in the temples.\n\nThe darkness of winter was over and the glorious son of light was returning to the Northern Hemisphere.\n\nWith his last effort the old Sun God had torn down the house of the Philistines (the Spirits of Darkness) and had cleared the way for the new sun who was born that day from the depths of the earth amidst the symbolic beasts of the lower world.\n\nConcerning this season of celebration, an anonymous Master of Arts of Balliol College, Oxford, in his scholarly treatise, Mankind Their Origin and Destiny , says: \"The Romans also had their solar festival, and their games of the circus in honor of the birth of the god of day.\n\nIt took place the eighth day before the kalends of January--that is, on December 25.\n\nServius, in his commentary on verse 720 of the seventh book of the Æneid, in which Virgil speaks of the new sun, says that, properly speaking, the sun is new on the 8th of the Kalends of January-that is, December 25.\n\nIn the time of Leo I.\n\n(Leo, Serm.\n\nxxi., De Nativ.\n\nDom.\n\np.\n\n148), some of the Fathers of the Church said that 'what rendered the festival (of Christmas) venerable was less the birth of Jesus Christ than the return, and, as they expressed it, the new birth of the sun.' It was on the same day that the birth of the Invincible Sun (Natalis solis invicti), was celebrated at Rome, as can be seen in the Roman calendars, published in the reign of Constantine and of Julian (Hymn to the Sun, p.\n\n155).\n\nThis epithet 'Invictus' is the same as the Persians gave to this same god, whom they worshipped by the name of Mithra, and whom they caused to be born in a grotto (Justin.\n\nDial.\n\ncum Trips.\n\np.\n\n305), just as he is represented as being born in a stable, under the name of Christ, by the Christians.\" Concerning the Catholic Feast of the Assumption and its parallel in astronomy, the same author adds: \"At the end of eight months, when the sun-god, having increased, traverses the eighth sign, he absorbs the celestial Virgin in his fiery course, and she disappears in the midst of the luminous rays and the glory of her son.\n\nThis phenomenon, which takes place every year about the middle of August, gave rise to a festival which still exists, and in which it is supposed that the mother of Christ, laying aside her earthly life, is associated with the glory of her son, and is placed at his side in the heavens.\n\nThe Roman calendar of Columella (Col.\n\n1.\n\nII.\n\ncap.\n\nii.\n\np.\n\n429) marks the death or disappearance of Virgo at this period.\n\nThe sun, he says, passes into Virgo on the thirteenth day before the kalends of September.\n\nThis is where the Catholics place the Feast of the Assumption, or the reunion of the Virgin to her Son."

