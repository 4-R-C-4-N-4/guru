body = "No king had the power of life and death over his kinsmen without the assent of a majority of the ten.\n\nTHE SCHEME OF THE UNIVERSE ACCORDING TO THE GREEKS AND ROMANS.\n\nFrom Cartari's Imagini degli Dei degli Antichi.\n\nBy ascending successively through the fiery sphere of Hades, the spheres of water, Earth, and air, and the heavens of the moon, the plane of Mercury is reached.\n\nAbove Mercury are the planes of Venus, the sun, Mars, Jupiter, and Saturn, the latter containing the symbols of the Zodiacal constellations.\n\nAbove the arch of the heavens (Saturn) is the dwelling Place of the different powers controlling the universe.\n\nThe supreme council of the gods is composed of twelve deities--six male and six female--which correspond to the positive and negative signs of the zodiac.\n\nThe six gods are Jupiter, Vulcan, Apollo, Mars, Neptune, and Mercury; the six goddesses are Juno, Ceres, Vesta, Minerva, Venus, and Diana.\n\nJupiter rides his eagle as the symbol of his sovereignty over the world, and Juno is seated upon a peacock, the proper symbol of her haughtiness and glory.\n\n*** Plato concludes his description by declaring that it was this great empire which attacked the Hellenic states.\n\nThis did not occur, however, until their power and glory had lured the Atlantean kings from the pathway of wisdom and virtue.\n\nFilled with false ambition, the rulers of Atlantis determined to conquer the entire world.\n\nZeus, perceiving the wickedness of the Atlanteans, gathered the gods into his holy habitation and addressed them.\n\nHere Plato's narrative comes to an abrupt end, for the Critias was never finished.\n\nIn the Timæus is a further description of Atlantis, supposedly given to Solon by an Egyptian priest and which concludes as follows: \"But afterwards there occurred violent earthquakes and floods; and in a single day and night of rain all your warlike men in a body sank into the earth, and the island of Atlantis in like manner disappeared, and was sunk beneath the sea.\n\nAnd that is the reason why the sea in those parts is impassable and impenetrable, because there is such a quantity of shallow mud in the way; and this was caused by the subsidence of the island.\" In the introduction to his translation of the Timæus , Thomas Taylor quotes from a History of Ethiopia written by Marcellus, which contains the following reference to Atlantis: \"For they relate that in their time there were seven islands in the Atlantic sea, sacred to Proserpine; and besides these, three others of an immense magnitude; one of which was sacred to Pluto, another to Ammon, and another, which is the middle of these, and is of a thousand stadia, to Neptune.\" Crantor, commenting upon Plato, asserted that the Egyptian priests declared the story of Atlantis to be written upon pillars which were still preserved circa 300 B.C.\n\n(See Beginnings or Glimpses of Vanished Civilizations .) Ignatius Donnelly, who gave the subject of Atlantis profound study, believed that horses were first domesticated by the Atlanteans, for which reason they have always been considered peculiarly sacred to Poseidon.\n\n(See Atlantis .) From a careful consideration of Plato's description of Atlantis it is evident that the story should not be regarded as wholly historical but rather as both allegorical and historical.\n\nOrigen, Porphyry, Proclus, Iamblichus, and Syrianus realized that the story concealed a profound philosophical mystery, but they disagreed as to the actual interpretation.\n\nPlato's Atlantis symbolizes the threefold nature of both the universe and the human body.\n\nThe ten kings of Atlantis are the tetractys , or numbers, which are born as five pairs of opposites."

