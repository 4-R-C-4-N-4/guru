body = "In Ecclesiasticus (one of the books rejected from the modern Bible), these bells and their purpose are described in the following words: \"And he compassed him with pomegranates, and with many golden bells round about, that as he went, there might be a sound and a noise that might be heard in the temple, for a memorial to the children of his people.\" The Meeir was also bound in with a variegated girdle finely embroidered and with gold wire inserted through the embroidery.\n\nThe Ephod , a short vestment described by Josephus as resembling a coat or jacket, was worn over the upper part of the Meeir .\n\nThe threads of which the Ephod was woven were of many colors, probably red, blue, purple, and white, like the curtains and coverings of the Tabernacle.\n\nFine gold wires were also woven into the fabric.\n\nThe Ephod was fastened at each shoulder with a large onyx in the form of a button, and the names of the twelve sons of Jacob were engraven upon these two stones, six on each.\n\nThese onyx buttons were supposed to have oracular powers, and when the High Priest asked certain questions, they emitted a celestial radiance.\n\nWhen the onyx on the right shoulder was illuminated, it signified that Jehovah answered the question of the High Priest: in the affirmative, and when the one on the left gleamed, it indicated a negative answer to the query.\n\nIn the middle of the front surface of the Ephod was a space to accommodate the Essen , or Breastplate of Righteousness and Prophecy , which, as its name signifies, was also an oracle of great power.\n\nThis pectoral was roughly square in shape and consisted of a frame of embroidery into which were set twelve stones, each held in a socket of gold.\n\nBecause of the great weight of its stones, each of which was of considerable size and immense value, the breastplate was held in position by special golden chains and ribbons.\n\nThe twelve stones of the breastplate, like the onyx stones at the shoulders of the Ephod , had the mysterious power of lighting up with Divine glory and so serving as oracles.\n\nConcerning the strange power of these flashing symbols of Israel's twelve tribes, Josephus writes: \"Yet will I mention what is still more wonderful than this: For God declared beforehand, by those twelve stones which the High Priest bare upon his breast and which were inserted into his breastplate, when they should be victorious in battle; for so great a splendor shone forth from them before the army began to march, that all the people were sensible of God's being present for their assistance.\n\nWhence it came to pass that those Greeks, who had a veneration for our laws, because they could not possibly contradict this, called the breastplate, 'the Oracle'.\" The writer then adds that the stones ceased to light up and gleam some two hundred years before he wrote his history, because the Jews had broken the laws of Jehovah and the God of Israel was no longer pleased with His chosen people.\n\nThe Jews learned astronomy from the Egyptians, and it is not unlikely that the twelve jewels of the breastplate were symbolic of the twelve constellations of the zodiac.\n\nThese twelve celestial hierarchies were looked upon as jewels adorning the breastplate of the Universal Man, the Macroprosophus, who is referred to in the Zohar as The Ancient of Days.\n\nThe number twelve frequently occurs among ancient peoples, who in nearly every case had a pantheon consisting of twelve demigods and goddesses presided over by The Invincible One, who was Himself subject to the Incomprehensible All-Father.\n\nThis use of the number twelve is especially noted in the Jewish and Christian writings."

