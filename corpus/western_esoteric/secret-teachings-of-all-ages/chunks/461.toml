body = "In The Greek Gospel of Nicodemus it is declared that when Jesus was brought into the presence of Pilate the standards borne by the Roman guards bowed their tops in homage to him in spite of every effort made by the soldiers to prevent it.\n\nIn The Letters of Pilate the statement also appears that Cæsar, being wroth at Pilate for executing a just man, ordered him to be decapitated.\n\nPraying for forgiveness, Pilate was visited by an angel of the Lord, who reassured the Roman governor by promising him that all Christendom should remember his name and that when Christ came the second time to judge His people he (Pilate) should come before Him as His witness.\n\nStories like the foregoing represent the incrustations that have attached themselves to the body of Christianity during the centuries.\n\nThe popular mind itself has been the self-appointed guardian and perpetuator of these legends, bitterly opposing every effort to divest the faith of these questionable accumulations.\n\nWhile popular tradition often contains certain basic elements of truth, these elements are usually distorted out of all proportion.\n\nThus, while the generalities of the story may be fundamentally true, the details are hopelessly erroneous.\n\nOf truth as of beauty it may be said that it is most adorned when unadorned.\n\nThrough the mist of fantastic accounts which obscure the true foundation of the Christian faith is faintly visible to the discerning few a great and noble doctrine communicated to the world by a great and noble soul.\n\nJoseph and Mary, two devout and holy-minded souls, consecrated to the service of God and dreaming of the coming of a Messiah to serve Israel, obeyed the injunctions of the high priest of the Essenes to prepare a body for the coming of a great soul.\n\nThus of an immaculate conception Jesus was born.\n\nBy immaculate is meant clean, rather than supernatural.\n\nJesus was reared and educated by the Essenes and later initiated into the most profound of their Mysteries.\n\nLike all great initiates, He must travel in an easterly direction, and the silent years of His life no doubt were spent in familiarizing Himself with that secret teaching later to be communicated by Him to the world.\n\nHaving consummated the ascetic practices of His order, He attained to the Christening .\n\nHaving thus reunited Himself with His own spiritual source, He then went forth in the name of the One who has been crucified since before the worlds were and, gathering about Him disciples and apostles, He instructed them in that secret teaching which had been lost--in part, at least--from the doctrines of Israel.\n\nHis fate is unknown, but in all probability He suffered that persecution which is the lot of those who seek to reconstruct the ethical, philosophical, or religious systems of their day.\n\nTo the multitudes Jesus spoke in parables; to His disciples He also spoke in parables, though of a more exalted and philosophic nature.\n\nVoltaire said that Plato should have been canonized by the Christian Church, for, being the first propounder of the Christos mystery, he contributed more to its fundamental doctrines than any other single individual.\n\nJesus disclosed to His disciples that the lower world is under the control of a great spiritual being which had fashioned it according to the will of the Eternal Father.\n\nThe mind of this great angel was both the mind of the world and also the worldly mind.\n\nSo that men should not die of worldliness the Eternal Father sent unto creation the eldest and most exalted of His powers--the Divine Mind.\n\nThis Divine Mind offered Itself as a living sacrifice and was broken up and eaten by the world.\n\nHaving given Its spirit and Its body at a secret and sacred supper to the twelve manners of rational creatures, this Divine Mind became a part of every living thing.\n\nMan was thereby enabled to use this power as a bridge across which he might pass and attain immortality."

