body = "An Egyptian allegory states that the sunrise is caused by the scarab unfolding its wings, which stretch out as glorious colors on each side of its body--the solar globe--and that when it folds its wings under its dark shell at sunset, night follows.\n\nKhepera , the scarab-headed aspect of Ra , is often symbolized riding through the sea of the sky in a wonderful ship called the Boat of the Sun .\n\nROYAL EGYPTIAN SCARAB.\n\nFrom Hall's Catalogue of Egyptian Scarabs, Etc., in the British Museum.\n\nThe flat under side of a scarab usually bears an inscription relating to the dynasty during which it was cut.\n\nThese scarabs were sometimes used as seals.\n\nSome were cut from ordinary or precious stones; others were made of clay, baked and glazed.\n\nOccasionally the stone scarabs were also glazed.\n\nThe majority of the small scarabs are pierced as though originally used as beads.\n\nSome are so hard that they will cut glass.\n\nIn the picture above, A shows top and side views of the scarab, and B and B the under surface with the name of Men-ka-Ra within the central cartouche.\n\n*** The scorpion is the symbol of both wisdom and self-destruction.\n\nIt was called by the Egyptians the creature accursed; the time of year when the sun entered the sign of Scorpio marked the beginning of the rulership of Typhon.\n\nWhen the twelve signs of the zodiac were used to represent the twelve Apostles (although the reverse is true), the scorpion was assigned to Judas Iscariot--the betrayer.\n\nThe scorpion stings with its tail, and for this reason it has been called a backbiter, a false and deceitful thing.\n\nCalmet, in his Dictionary of the Bible , declares the scorpion to be a fit emblem of the wicked and the symbol of persecution.\n\nThe dry winds of Egypt are said to be produced by Typhon, who imparts to the sand the blistering heat of the infernal world and the sting of the scorpion.\n\nThis insect was also the symbol of the spinal fire which, according to the Egyptian Mysteries, destroyed man when it was permitted to gather at the base of his spine (the tail of the scorpion).The red star Antares in the back of the celestial scorpion was considered the worst light in the heavens.\n\nKalb al Akrab , or the heart of the scorpion, was called by the ancients the lieutenant or deputy of Mars.\n\n(See footnote to Ptolemy's Tetrabiblos .) Antares was believed to impair the eyesight, often causing blindness if it rose over the horizon when a child was born.\n\nThis may refer again to the sand storm, which was capable of blinding unwary travelers.\n\nThe scorpion was also the symbol of wisdom, for the fire which it controlled was capable of illuminating as well as consuming.\n\nInitiation into the Greater Mysteries among the pagans was said to take place only in the sign of the scorpion.\n\nIn the papyrus of Ani ( The Book of the Dead ), the deceased likens his soul to a scorpion, saying: \"I am a swallow, I am that scorpion, the daughter of Ra!\" Elizabeth Goldsmith, in her treatise on Sex Symbolism , states that the scorpions were a \"symbol of Selk, the Egyptian goddess of writing, and also [were] revered by the Babylonians and Assyrians as guardians of the gateway of the sun.\n\nSeven scorpions were said to have accompanied Isis when she searched for the remains of Osiris scattered by Set\" (Typhon)."

