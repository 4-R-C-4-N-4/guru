[content]
body = "This is also the Adept whom Omar Khayyám calls \"the master of the show.\" His message is that the wise direct the phenomena of Nature and are never deceived thereby.\n\nThe magician stands behind a table on which are spread out a number of objects, prominent among them a cup--the Holy Grail and the cup placed by Joseph in Benjamin's sack; a coin--the tribute money and the wages of a Master Builder, and a sword, that of Goliath and also the mystic blade of the philosopher which divides the false from the true.\n\nThe magician's hat is in the form of the cosmic lemniscate, signifying the first motion of creation.\n\nHis right hand points to the earth, his left holds aloft the rod of Jacob and also the staff that budded--the human spine crowned with the globe of creative intelligence.\n\nIn the pseudo-Egyptian Tarot the magician wears an uræus or golden band around his forehead, the table before him is in the form of a perfect cube, and his girdle is the serpent of eternity devouring its own tail.\n\nThe second numbered major trump is called La Papesse , the Female Pope, and has been associated with a curious legend of the only woman who ever sat in the pontifical chair.\n\nPope Joan is supposed to have accomplished this by masquerading in malt attire, and was stoned to death when her subterfuge was discovered.\n\nThis card portrays a seated woman crowned with a tiara surmounted by a lunar crescent.\n\nIn her lap is the Tora , or book of the Law (usually partly closed), and in her left hand are the keys to the secret doctrine, one gold and the other silver.\n\nBehind her rise two pillars (Jachin and Boaz) with a multicolored veil stretched between.\n\nHer throne stands upon a checker-hoard floor.\n\nA figure called Juno is occasionally substituted for La Papesse.\n\nlike the female hierophant of the Mysteries of Cybele, this symbolic figure personifies the Shekinah, or Divine Wisdom.\n\nIn the pseudo-Egyptian Tarot the priestess is veiled, a reminder that the full countenance truth is not revealed to uninitiated man.\n\nA veil also covers one-half of her book, thus intimating that but one-half of the mystery of being can be comprehended.\n\nThe third numbered major trump is called L'Impératrice , the Empress, and has been likened to the \"woman clothed with the sun\" described in the Apocalypse.\n\nOn this card appears the winged figure of a woman seated upon a throne, supporting with her right hand a shield emblazoned with a phœnix and holding in her left a scepter surmounted by an orb or trifoliate flower.\n\nBeneath her left foot is sometimes shown the crescent.\n\nEither the Empress is crowned or her head is surrounded by a diadem of stars; sometimes both.\n\nShe is called Generation , and represents the threefold spiritual world out of which proceeds the fourfold material world.\n\nTo the graduate of the College of the Mysteries she is the Alma Mater out of whose body the initiate has \"born again.\" In the pseudo-Egyptian Tarot the Empress is shown seated upon a cube filled with eyes and a bird is balanced upon the forefinger other left hand.\n\nThe upper part of her body is surrounded by a radiant golden nimbus.\n\nBeing emblematic of the power from which emanates the entire tangible universe, L'Impératrice is frequently symbolized as pregnant.\n\nThe fourth numbered major trump is called L'Empereur , the Emperor, and by its numerical value is directly associated with the great Deity revered by the Pythagoreans under the form of the tetrad.\n\nHis symbols declare the Emperor to be the Demiurgus, the Great King of the inferior world."

