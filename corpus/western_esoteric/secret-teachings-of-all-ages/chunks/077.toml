[content]
body = "\"Then, being naked of all the accumulations of the seven Rings, the soul comes to the Eighth Sphere, namely, the ring of the fixed stars.\n\nHere, freed of all illusion, it dwells in the Light and sings praises to the Father in a voice which only the pure of spirit may understand.\n\nBehold, O Hermes, there is a great mystery in the Eighth Sphere, for the Milky Way is the seed-ground of souls, and from it they drop into the Rings, and to the Milky Way they return again from the wheels of Saturn.\n\nBut some cannot climb the seven-runged ladder of the Rings.\n\nSo they wander in darkness below and are swept into eternity with the illusion of sense and earthiness.\n\n\"The path to immortality is hard, and only a few find it.\n\nThe rest await the Great Day when the wheels of the universe shall be stopped and the immortal sparks shall escape from the sheaths of substance.\n\nWoe unto those who wait, for they must return again, unconscious and unknowing, to the seed-ground of stars, and await a new beginning.\n\nThose who are saved by the light of the mystery which I have revealed unto you, O Hermes, and which I now bid you to establish among men, shall return again to the Father who dwelleth in the White Light, and shall deliver themselves up to the Light and shall be absorbed into the Light, and in the Light they shall become Powers in God.\n\nThis is the Way of Good and is revealed only to them that have wisdom.\n\n\"Blessed art thou, O Son of Light, to whom of all men, I, Poimandres, the Light of the World, have revealed myself.\n\nI order you to go forth, to become as a guide to those who wander in darkness, that all men within whom dwells the spirit of My Mind (The Universal Mind) may be saved by My Mind in you, which shall call forth My Mind in them.\n\nEstablish My Mysteries and they shall not fail from the earth, for I am the Mind of the Mysteries and until Mind fails (which is never) my Mysteries cannot fail.\" With these parting words, Poimandres, radiant with celestial light, vanished, mingling with the powers of the heavens.\n\nRaising his eyes unto the heavens, Hermes blessed the Father of All Things and consecrated his life to the service of the Great Light.\n\nThus preached Hermes: \"O people of the earth, men born and made of the elements, but with the spirit of the Divine Man within you, rise from your sleep of ignorance!\n\nBe sober and thoughtful.\n\nRealize that your home is not in the earth but in the Light.\n\nWhy have you delivered yourselves over unto death, having power to partake of immortality?\n\nRepent, and change your minds .\n\nDepart from the dark light and forsake corruption forever.\n\nPrepare yourselves to climb through the Seven Rings and to blend your souls with the eternal Light.\" Some who heard mocked and scoffed and went their way, delivering themselves to the Second Death from which there is no salvation.\n\nBut others, casting themselves before the feet of Hermes, besought him to teach them the Way of Life.\n\nHe lifted them gently, receiving no approbation for himself, and staff in hand, went forth teaching and guiding mankind, and showing them how they might be saved.\n\nIn the worlds of men, Hermes sowed the seeds of wisdom and nourished the seeds with the Immortal Waters.\n\nAnd at last came the evening of his life, and as the brightness of the light of earth was beginning to go down, Hermes commanded his disciples to preserve his doctrines inviolate throughout all ages.\n\nThe Vision of Poimandres he committed to writing that all men desiring immortality might therein find the way."

