body = "Now my head will cease to speak, for it is only the head of a corpse, which has no more flesh.\" Following the admonitions of Hunhun-ahpu, the young girl returned to her home.\n\nHer father, Cuchumaquiq, later discovering that she was about to become a mother, questioned her concerning the father of her child.\n\nXquiq replied that the child was begotten while she was gazing upon the head of Hunhun-ahpu in the calabash tree and that she had known no man.\n\nCuchumaquiq, refusing to believe her story, at the instigation of the princes of Xibalba, demanded her heart in an urn.\n\nLed away by her executioners, Xquiq pleaded with them to spare her life, which they agreed to do, substituting for her heart the fruit of a certain tree (rubber) whose sap was red and of the consistency of blood.\n\nWhen the princes of Xibalba placed the supposed heart upon the coals of the altar to be consumed, they were all amazed by the perfume which rose therefrom, for they did not know that they were burning the fruit of a fragrant plant.\n\nFRAGMENT OF INDIAN POTTERY.\n\nCourtesy of Alice Palmer Henderson This curious fragment was found four feet under the ground beneath a trash pile of broken early Indian pottery not far from the Casa Grande ruins in Arizona.\n\nIt is significant because of its striking to the Masonic compass and square.\n\nIndian baskets pottery, and blankets frequently bear ornamental designs of especial Masonic and philosophic interest.\n\n*** Xquiq gave birth to twin sons, who were named Hunahpu and Xbalanque and whose lives were dedicated to avenging the deaths of Hunhun-ahpu and Vukub-hunhun-ahpu.\n\nThe years passed, and the two boys grew up to manhood and great were their deeds.\n\nEspecially did they excel in a certain game called tennis but somewhat resembling hockey.\n\nHearing of the prowess of the youths, the princes of Xibalba asked: \"Who, then, are those who now begin again to play over our heads, and who do not scruple to shake (the earth)?\n\nAre not Hunhun-ahpu and Vukub-hunhun-ahpu dead, who wished to exalt themselves before our face?\" So the princes of Xibalba sent for the two youths, Hunahpu and Xbalanque, that they might destroy them also in the seven days of the Mysteries.\n\nBefore departing, the two brothers bade farewell to their grandmother, each planting in the midst of the house a cane plant, saying that as long as the cane lived she would know that they were alive.\n\n\"O, our grandmother, O, our mother, do not weep; behold the sign of our word which remains with you.\n\n\" Hunahpu and Xbalanque then departed, each with his sabarcan (blowpipe), and for many days they journeyed along the perilous trail, descending through tortuous ravines and along precipitous cliffs, past strange birds and boiling springs, cowards the sanctuary of Xibalba.\n\nThe actual ordeals of the Xibalbian Mysteries were seven in number.\n\nAs a preliminary the two adventurers crossed a river of mud and then a stream of blood, accomplishing these difficult feats by using their sabarcans as bridges.\n\nContinuing on their way, they reached a point where four roads converged--a black road, a white road, a red road, and a green road.\n\nNow Hunahpu and Xbalanque knew that their first test would consist of being able to discriminate between the princes of Xibalba and the wooden effigies robed to resemble them; also that they must call each of the princes by his correct name without having been given the information."

