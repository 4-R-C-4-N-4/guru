body = "In time the location of the secret vaults was lost, but after the lapse of ages there came another builder--an initiate after the order of Enoch--and he, while laying the foundations for another temple to the Great Architect of the Universe, discovered the long-lost vaults and the secrets contained within.\n\nJohn Leylande was appointed by King Henry VIII to go through the archives of the various religious institutions dissolved by the king and remove for preservation any books or manuscripts of an important character.\n\nAmong the documents copied by Leylande was a series of questions and answers concerning the mystery of Masonry written by King Henry VI.\n\nIn answer to the question, \"How came Masonry into England?\" the document States that Peter Gower, a Grecian, traveled for knowledge in Egypt, Syria, and every land where the Phœnicians had planted Masonry; winning entrance in all lodges of Masons, he learned much, and returning, dwelt in Greater Greece.\n\nHe became renowned for his wisdom, formed a great lodge at Groton, and made many Masons, some of whom journeyed in France, spreading Masonry there; from France in the course of time the order passed into England.\n\nTo even the superficial student of the subject it must be evident that the name of Peter Gower , the Grecian, is merely an Anglicized form of Pythagoras ; consequently Groton, where he formed his lodge, is easily identified with Crotona.\n\nA link is thus established between the philosophic Mysteries of Greece and mediæval Freemasonry.\n\nIn his notes on King Henry's questions and answers, William Preston enlarges upon the vow of secrecy as it was practiced by the ancient initiates.\n\nOn the authority of Pliny he describes how Anaxarchus, having been imprisoned in order to extort from him some of the secrets with which he had been entrusted, bit out his own tongue and threw it in the face of Nicocreon, the tyrant of Cyprus.\n\nPreston adds that the Athenians revered a brazen statue that was represented without a tongue to denote the sanctity with which they regarded their oath-bound secrets.\n\nIt is also noteworthy that, according to King Henry's manuscript, Masonry had its origin in the East and was the carrier of the arts and sciences of civilization to the primitive humanity of the western nations.\n\nConspicuous among the symbols of Freemasonry are the seven liberal arts and sciences.\n\nBy grammar man is taught to express in noble and adequate language his innermost thoughts and ideals; by rhetoric he is enabled to conceal his ideals under the protecting cover of ambiguous language and figures of speech; by logic he is trained in the organization of the intellectual faculties with which he has been endowed; by arithmetic he not only is instructed in the mystery of universal order but also gains the key to multitude, magnitude, and proportion; by geometry he is inducted into the mathematics of form, the harmony and rhythm of angles, and the philosophy of organization; by music he is reminded that the universe is founded upon the laws of celestial harmonics and that harmony and rhythm are all-pervading; by astronomy he gains an understanding of the immensities of time and space, of the proper relationship between himself and the universe, and of the awesomeness of that Unknown Power which is driving the countless stars of the firmament through illimitable space.\n\nEquipped with the knowledge conferred by familiarity with the liberal arts and sciences, the studious Freemason therefore finds himself confronted by few problems with which he cannot cope.\n\nTHE DIONYSIAC ARCHITECTS The most celebrated of the ancient fraternities of artisans was that of the Dionysiac Architects.\n\nTHE MYSTERY OF THE MACROCOSM.\n\nRedrawn from Cesariano's Edition of Vitruvius."

