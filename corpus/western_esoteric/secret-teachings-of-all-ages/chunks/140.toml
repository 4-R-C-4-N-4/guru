body = "After being vanquished by Apollo, the spirit of Python remained at Delphi as the representative of his conqueror, and it was with the aid of his effluvium that the priestess was able to become en rapport with the god.\n\nThe fumes rising from the fissure of the oracle were supposed to come from the decaying body of Python.\n\nThe name Pythoness , or Pythia , given to the female hierophant of the oracle, means literally one who has been thrown into a religious frenzy by inhaling fumes rising from decomposing matter.\n\nIt is of further interest to note that the Greeks believed the oracle of Delphi to be the umbilicus of the earth, thus proving that they considered the planet an immense human being.\n\nThe connection between the principle of oracular revelation and the occult significance of the navel is an important secret belonging to the ancient Mysteries.\n\nThe oracle, however, is much older than the foregoing account indicates.\n\nA story of this kind was probably invented by the priests to explain the phenomena to those inquisitive persons whom they did not consider worthy of enlightenment regarding the true esoteric nature of the oracle.\n\nSome believe that the Delphic fissure was discovered by a Hypoborean priest, but as far back as recorded history goes the cave was sacred, and persons came from all parts of Greece and the surrounding countries to question the dæmon who dwelt in its chimney-like vent.\n\nPriests and priestesses guarded it closely and served the spirit who dwelt therein and who enlightened humanity through the gift of prophecy.\n\nThe story of the original discovery of the oracle is somewhat as follows: Shepherds tending their flocks on the side of Mount Parnassus were amazed at the peculiar antics of goats that wandered close to a great chasm on its southwestern spur.\n\nThe animals jumped about as though trying to dance, and emitted strange cries unlike anything before heard.\n\nAt last one of the shepherds, curious to learn the cause of the phenomenon, approached the vent, from which were rising noxious fumes.\n\nImmediately he was seized with a prophetic ecstasy; he danced with wild abandon, sang, jabbered inarticulate sounds, and foretold future events.\n\nOthers went close to the fissure, with the same result.\n\nThe fame of the place spread, and many came to learn of the future by inhaling the mephitic fumes, which exhilarated to the verge of delirium.\n\nSome of those who came, being unable to control themselves, and having temporarily the strength of madmen, tore themselves from those seeking to restrain them, and, jumping into the vent, perished.\n\nIn order to prevent others from doing likewise, a wall was erected around the fissure and a prophetess was appointed to act as mediator between the oracle and those who came to question it.\n\nAccording to later authorities, a tripod of gold, ornamented with carvings of Apollo in the form of Python, the great serpent, was placed over the cleft, and on this was arranged a specially prepared seat, so constructed that a person would have difficulty in falling off while under the influence of the oracular fumes.\n\njust before this time, a story had been circulated that the fumes of the oracle arose from the decaying body of Python.\n\nIt is possible that the oracle revealed its own origin.\n\nFor many centuries during its early history, virgin maidens were consecrated to the service of the oracle.\n\nThey were called the Phœbades , or Pythiæ , and constituted that famous order now known as the Pythian priesthood.\n\nIt is probable that women were chosen to receive the oracles because their sensitive and emotional nature responded more quickly and completely to \"the fumes of enthusiasm.\" Three days before the time set to receive the communications from Apollo, the virgin priestess began the ceremony of purification."

