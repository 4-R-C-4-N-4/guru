[content]
body = "The episode of weighing the souls of men has its parallel in the ceremony described in the Egyptian Book of the Dead .\n\nThe walled city entered by C.R.C.\n\nrepresents the sanctuary of wisdom wherein dwell the real rulers of the world--the initiated philosophers.\n\nLike the ancient Mysteries after which it was patterned, the Order of the Rose Cross possessed a secret ritual which was lived by the candidate for a prescribed number of years before he was eligible to the inner degrees of the society.\n\nThe various floors of the Tower of Olympus represent the orbits of the planets.\n\nThe ascent of the philosophers from one floor to another also parallels certain rituals of the Eleusinian Mysteries and the rites of Mithras wherein the candidate ascended the seven rungs of a ladder or climbed the seven steps of a pyramid in order to signify release from the influences of the Planetary Governors.\n\nMan becomes master of the seven spheres only when he transmutes the impulses received from them.\n\nHe who masters the seven worlds and is reunited with the Divine Source of his own nature consummates the Hermetic Marriage ."

