body = "(The sacrificing of beasts, and in some cases human beings, upon the altars of the pagans was the result of their ignorance concerning the fundamental principle underlying sacrifice.\n\nThey did not realize that their offerings must come from within their own natures in order to be acceptable.) THE BREASTPLATE OF THE HIGH PRIEST.\n\nFrom Calmet's Dictionary of the Holy Bible.\n\nThe order of the stones and the tribe over which each administered were, according to Calmet, as in the above diagram.\n\nThese gems, according to the Rosicrucians, were symbolic of the twelve great qualities and virtues: Illumination, Love, Wisdom, Truth, Justice, Peace, Equilibrium, Humility, Faith, Strength, Joy, Victory.\n\n*** Farther westward, in line with the Brazen Altar, was the Laver of Purification already described.\n\nIt signified to the priest that he should cleanse not only his body but also his soul from all stains of impurity, for none who is not clean in both body and mind can enter into the presence of Divinity and live.\n\nBeyond the Laver of Purification was the entrance to the Tabernacle proper, facing the east, so that the first rays of the rising sun might enter and light the chamber.\n\nBetween the encrusted pillars could be seen the Holy Place, a mysterious chamber, its walls hung with magnificent drapes embroidered with the faces of Cherubs.\n\nAgainst the wall on the southern side of the Holy Place stood the great Candlestick, or lampstand, of cast gold, which was believed to weigh about a hundred pounds.\n\nFrom its central shaft branched out six arms, each ending in a cup-shaped depression in which stood an oil lamp.\n\nThere were seven lamps, three on the arms at each side and one on the central stem.\n\nThe Candlestick was ornamented with seventy-two almonds, knops, and flowers.\n\nJosephus says seventy, but wherever this round number is used by the Hebrews it really means seventy-two.\n\nOpposite the Candlestick, against the northern wall, was a table bearing twelve loaves of Shewbread in two stacks of six loaves each.\n\n(Calmet is of the opinion that the bread was not stacked up but spread out on the table in two rows, each containing six loaves.) On this table also stood two lighted incensories, which were placed upon the tops of the stacks of Shewbread so that the smoke of the incense might be an acceptable aroma to the Lord, bearing with it in its ascent the soul of the Shewbread.\n\nIn the center of the room, almost against the partition leading into the Holy of Holies, stood the Altar of Burnt Incense, made of wood overlaid with golden plates.\n\nIts width and length were each a cubit and its height was two cubits.\n\nThis altar was symbolic of the human larynx, from which the words of man's mouth ascend as an acceptable offering unto the Lord, for the larynx occupies the position in the constitution of man between the Holy Place, which is the trunk of his body, and the Holy of Holies, which is the head with its contents.\n\nInto the Holy of Holies none might pass save the High Priest, and he only at certain prescribed times, The room contained no furnishings save the Ark of the Covenant, which stood against the western wall, opposite the entrance.\n\nIn Exodus the dimensions of the Ark are given as two and a half cubits for its length, one cubit and a half its breadth and one cubit and a half its height.\n\nIt was made of shittim-wood, gold plated within and without, and contained the sacred tablets of the Law delivered to Moses upon Sinai.\n\nThe lid of the Ark was in the form of a golden plate upon which knelt two mysterious creatures called Cherubim, facing each other, with wings arched overhead."

