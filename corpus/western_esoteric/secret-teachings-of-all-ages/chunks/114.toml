body = "The ornamental border contains groups of names of animal, mineral, and vegetable substances, Their relationship to corresponding parts of the human body is shown by the dotted lines.\n\nThe words in capital letters on the dotted lines indicate to what corporeal member, organ, or disease, the herb or other substance is related.\n\nThe favorable positions in relation to the time of year are shown by the signs of the zodiac, each house of which is divided by crosses into its three decans.\n\nThis influence is further emphasized by the series of planetary signs placed on either side of the figure.\n\n*** Among the ancients the sun was always symbolized by the figure and nature of the constellation through which it passed at the vernal equinox.\n\nFor nearly the past 2,000 years the sun has crossed the equator at the vernal equinox in the constellation of Pisces (the Two Fishes).\n\nFor the 2,160 years before that it crossed through the constellation of Aries (the Ram).\n\nPrior to that the vernal equinox was in the sign of Taurus (the Bull).\n\nIt is probable that the form of the bull and the bull's proclivities were assigned to this constellation because the bull was used by the ancients to plow the fields, and the season set aside for plowing and furrowing corresponded to the time at which the sun reached the segment of the heavens named Taurus.\n\nTHE EQUINOXES AND SOLSTICES.\n\nThe plane of the zodiac intersects the celestial equator at an angle of approximately 23° 28'.\n\nThe two points of intersection (A and B) are called the equinoxes.\n\n*** Albert Pike describes the reverence which the Persians felt for this sign and the method of astrological symbolism in vogue among them, thus: \"In Zoroaster's cave of initiation, the Sun and Planets were represented, overhead, in gems and gold, as was also the Zodiac.\n\nThe Sun appeared, emerging from the back of Taurus.\n\n\" In the constellation of the Bull are also to be found the \"Seven Sisters\"--the sacred Pleiades--famous to Freemasonry as the Seven Stars at the upper end of the Sacred Ladder.\n\nIn ancient Egypt it was during this period--when the vernal equinox was in the sign of Taurus--that the Bull, Apis, was sacred to the Sun God, who was worshiped through the animal equivalent of the celestial sign which he had impregnated with his presence at the time of its crossing into the Northern Hemisphere.\n\nThis is the meaning of an ancient saying that the celestial Bull \"broke the egg of the year with his horns.\" Sampson Arnold Mackey, in his Mythological Astronomy of the Ancients Demonstrated , makes note of two very interesting points concerning the bull in Egyptian symbolism.\n\nMr.\n\nMackey is of the opinion that the motion of the earth that we know as the alternation of the poles has resulted in a great change of relative position of the equator and the zodiacal band.\n\nHe believes that originally the band of the zodiac was at right angles to the equator, with the sign of Cancer opposite the north pole and the sign of Capricorn opposite the south pole.\n\nIt is possible that the Orphic symbol of the serpent twisted around the egg attempts to show the motion of the sun in relation to the earth under such conditions.\n\nMr.\n\nMackey advances the Labyrinth of Crete , the name Abraxas , and the magic formula, abracadabra , among other things, to substantiate his theory.\n\nConcerning abracadabra he states: \"But the slow progressive disappearance of the Bull is most happily commemorated in the vanishing series of letters so emphatically expressive of the great astronomical fact.\n\nFor ABRACADABRA is The Bull, the only Bull."

