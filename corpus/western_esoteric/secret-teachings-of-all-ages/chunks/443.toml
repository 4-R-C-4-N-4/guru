body = "The code cipher.\n\nThe most modem form of cryptogram is the code system.\n\nIts most familiar form is the Morse code for use in telegraphic and wireless communication.\n\nThis form of cipher may be complicated somewhat by embodying dots and dashes into a document in which periods and colons are dots, while commas and semicolons are dashes.\n\nThere are also codes used by the business world which can be solved only by the use of a private code book.\n\nBecause they furnish an economical and efficient method of transmitting confidential information, the use of such codes is far more prevalent than the average person has any suspicion.\n\nIn addition to the foregoing classifications there are a number of miscellaneous systems of secret writing, some employing mechanical devices, others colors.\n\nA few make use of sundry miscellaneous objects to represent words and even complete thoughts.\n\nBut as these more elaborate devices were seldom employed by the ancients or by the medieval philosophers and alchemists, they have no direct bearing upon religion and philosophy.\n\nThe mystics of the Middle Ages, borrowing the terminology of the various arts and sciences, evolved a system of cryptography which concealed the secrets of the human soul under terms generally applied to chemistry, biology, astronomy, botany, and physiology.\n\nCiphers of this nature can only be decoded by individuals versed in the deep philosophic principles upon which these medieval mystics based their theories of life.\n\nMuch information relating to the invisible nature of man is concealed under what seem to be chemical experiments or scientific speculations.\n\nEvery student of symbolism and philosophy, therefore, should be reasonably well acquainted with the underlying principles of cryptography; in addition to serving him well in his researches, this art furnishes a fascinating method of developing the acuteness of the mental faculties.\n\nDiscrimination and observation are indispensable to the seeker after knowledge, and no study is equal to cryptography as a means of stimulating these powers.\n\nQABBALISTIC AND MAGIC ALPHABETS.\n\nFrom Barrett's Magus.\n\nCurious alphabets were invented by the early and mediæval philosophers to conceal their doctrines and tenets from the profane.\n\nSome of these alphabets are still used to a limited extent in the higher degrees of Freemasonry.\n\nProbably the most famous is the angelic writing, termed in the above plate \"The Writing called Malachim.\" Its figures are supposedly derived from the constellations.\n\nAdvanced students of occult philosophy will come upon many valuable documents in which these figures are used.\n\nUnder each letter of the first alphabet above is its equivalent in English.\n\nAbove each letter of the other three alphabets is its Hebrew letter equivalent."

