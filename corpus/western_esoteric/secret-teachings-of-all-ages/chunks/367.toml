[content]
body = "Figure 36 is the character of copper and Venus; Figure 37, of iron and Mars; Figure 38, of tin and Jupiter; Figure 39, of lead and Saturn; Figure 40, of Mercury (both the planet and the element); Figure 41, of antimony, the key metal of the earth itself; Figure 42, of arsenic; Figure 43, of sulphur; Figure 44, of cinnabar; Figure 45, of quicklime; Figure 46, of nitre; and Figure 47, of vitriol.\n\nFigure 48 is the character of sal ammoniac, which element derives its name from the Temple of Jupiter Ammon in an Egyptian desert, where it was found.\n\nFigure 49 is the character of alum; Figure 50, of alkali, a name of Arabian origin; and Figure 51, of sal tartar, a substance possessing great occult virtue.\n\nTABLE Ill, Figure 52 .\n\nThe eight globes and the central square represent the seven days of creation.\n\nThe three worlds wherein creation occurs are symbolized by three concentric rings.\n\nThe German words in the outer ring are extracts from the first chapter of Genesis.\n\nThe words around the outside of the outer ring are The First Day .\n\nThe four small globes inside the outer ring deal with the abstract phases of creation.\n\nThe upper globe containing the triangle encloses the words Heaven and Earth.\n\nThe globe to the right contains the word Light, and the one to the left, Jehovah Elohim in the upper part and Darkness in the lower part.\n\nThe globe at the bottom contains the word Day in the upper half and Night in the lower.\n\nThe four globes within the second ring depict the second, third, fourth, and fifth days of creation.\n\nThe white globe above divided by a dotted line is designated The Second Day ; the globe to the left with the mountains, The Third Day ; the globe to the right with the planetary rings, The Fourth Day ; and the globe below bisected by a dotted line, The Fifth Day .\n\nThe square in the central ring containing the human form is marked The Sixth Day .\n\nThis chart is a diagrammatic exposition of the three layers of the macrocosmic and microcosmic auric eggs, showing the forces active within them.\n\nTABLE IV, Figure.\n\n53 .\n\nFigure 53 has been designated the symbolic tomb of Christian Rosencreutz.\n\nThe upper circle is the first world--the Divine Sphere of God.\n\nThe triangle in the center is the throne of God.\n\nThe small circles at the points of the star symbolize the seven great Spirits before the throne, mentioned in the Book of Revelation, in the midst of which walks the Alpha and Omega--the Son of God.\n\nThe central triangle contains three flames--the Divine Trinity.\n\nFrom the lowest of these flames proceeds the first divine outflow, shown by two parallel lines descending through the throne of Saturn (the Spirit Orifelis , through whom God manifested Himself).\n\nPassing through the boundary of the celestial universe and the 22 spheres of the lower system, the lines end at point B , the throne of Lucifer, in whom the divine outpouring is concentrated and reflected.\n\nFrom him the divine light irradiates in succession to d (Capricorn), e (Gemini), f (Libra), g (Taurus), h (Pisces), i (Aquarius), k (Cancer), l (Virgo), m (Aries), n (Leo), o (Scorpio), p (Sagittarius), thence back to d .\n\nThe zodiacal circles represent twelve orders of great and beneficent Spirits, and the smaller circles within the ring of fixed stars mark the orbits of the sacred planets.\n\nTABLE V, Figure 54 .\n\nFigure 54 is similar to Figure 53, but represents the universe at the time God manifested Himself through the character of Jupiter, the Spirit Sachasiel ."

