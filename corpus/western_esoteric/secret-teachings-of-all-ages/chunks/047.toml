body = "The Mysteries were the channels through which this one philosophic light was disseminated, and their initiates, resplendent with intellectual and spiritual understanding, were the perfect fruitage of the divine tree, bearing witness before the material world of the recondite source of all Light and Truth.\n\nThe rites of Eleusis were divided into what were called the Lesser and the Greater Mysteries.\n\nAccording to James Gardner, the Lesser Mysteries were celebrated in the spring (probably at the time of the vernal equinox) in the town of Agræ, and the Greater, in the fall (the time of the autumnal equinox) at Eleusis or Athens.\n\nIt is supposed that the former were given annually and the latter every five years.\n\nThe rituals of the Eleusinians were highly involved, and to understand them required a deep study of Greek mythology, which they interpreted in its esoteric light with the aid of their secret keys.\n\nThe Lesser Mysteries were dedicated to Persephone.\n\nIn his Eleusinian and Bacchic Mysteries , Thomas Taylor sums up their purpose as follows: \"The Lesser Mysteries were designed by the ancient theologists, their founders, to signify occultly the condition of the unpurified soul invested with an earthy body, and enveloped in a material and physical nature.\" The legend used in the Lesser rites is that of the abduction of the goddess Persephone, the daughter of Ceres, by Pluto, the lord of the underworld, or Hades.\n\nWhile Persephone is picking flowers in a beautiful meadow, the earth suddenly opens and the gloomy lord of death, riding in a magnificent chariot, emerges from its somber depths and, grasping her in his arms, carries the screaming and struggling goddess to his subterranean palace, where he forces her to become his queen.\n\nIt is doubtful whether many of the initiates themselves understood the mystic meaning of this allegory, for most of them apparently believed that it referred solely to the succession of the seasons.\n\nIt is difficult to obtain satisfactory information concerning the Mysteries, for the candidates were bound by inviolable oaths never to reveal their inner secrets to the profane.\n\nAt the beginning of the ceremony of initiation, the candidate stood upon the skins of animals sacrificed for the purpose, and vowed that death should seal his lips before he would divulge the sacred truths which were about to be communicated to him.\n\nThrough indirect channels, however, some of their secrets have been preserved.\n\nThe teachings given to the neophytes were substantially as follows: The soul of man--often called Psyche , and in the Eleusinian Mysteries symbolized by Persephone--is essentially a spiritual thing.\n\nIts true home is in the higher worlds, where, free from the bondage of material form and material concepts, it is said to be truly alive and self-expressive.\n\nThe human, or physical, nature of man, according to this doctrine, is a tomb, a quagmire, a false and impermanent thing, the source of all sorrow and suffering.\n\nPlato describes the body as the sepulcher of the soul; and by this he means not only the human form but also the human nature.\n\nThe gloom and depression of the Lesser Mysteries represented the agony of the spiritual soul unable to express itself because it has accepted the limitations and illusions of the human environment.\n\nThe crux of the Eleusinian argument was that man is neither better nor wiser after death than during life.\n\nIf he does not rise above ignorance during his sojourn here, man goes at death into eternity to wander about forever, making the same mistakes which he made here.\n\nTHE RAPE OF PERSEPHONE.\n\nFrom Thomassin's Recucil des Figures, Groupes, Themes, Fontaines, Vases et autres Ornements."

