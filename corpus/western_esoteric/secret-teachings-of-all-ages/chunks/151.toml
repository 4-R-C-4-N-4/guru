[content]
body = "Pythagoras highly esteemed the medicinal properties of the sea onion, and he is said to have written an entire volume on the subject.\n\nSuch a work, however, is not known at the present time.\n\nPythagoras discovered that music had great therapeutic power and he prepared special harmonies for various diseases.\n\nHe apparently experimented also with color, attaining considerable success.\n\nOne of his unique curative processes resulted from his discovery of the healing value of certain verses from the Odyssey and the Iliad of Homer.\n\nThese he caused to be read to persons suffering from certain ailments.\n\nHe was opposed to surgery in all its forms and also objected to cauterizing.\n\nHe would not permit the disfigurement of the human body, for such, in his estimation, was a sacrilege against the dwelling place of the gods.\n\nPythagoras taught that friendship was the truest and nearest perfect of all relationships.\n\nHe declared that in Nature there was a friendship of all for all; of gods for men; of doctrines one for another; of the soul for the body; of the rational part for the irrational part; of philosophy for its theory; of men for one another; of countrymen for one another; that friendship also existed between strangers, between a man and his wife, his children, and his servants.\n\nAll bonds without friendship were shackles, and there was no virtue in their maintenance.\n\nPythagoras believed that relationships were essentially mental rather than physical, and that a stranger of sympathetic intellect was closer to him than a blood relation whose viewpoint was at variance with his own.\n\nPythagoras defined knowledge as the fruitage of mental accumulation.\n\nHe believed that it would be obtained in many ways, but principally through observation.\n\nWisdom was the understanding of the source or cause of all things, and this could be secured only by raising the intellect to a point where it intuitively cognized the invisible manifesting outwardly through the visible, and thus became capable of bringing itself en rapport with the spirit of things rather than with their forms.\n\nThe ultimate source that wisdom could cognize was the Monad , the mysterious permanent atom of the Pythagoreans.\n\nPythagoras taught that both man and the universe were made in the image of God; that both being made in the same image, the understanding of one predicated the knowledge of the other.\n\nHe further taught that there was a constant interplay between the Grand Man (the universe) and man (the little universe).\n\nPythagoras believed that all the sidereal bodies were alive and that the forms of the planets and stars were merely bodies encasing souls, minds, and spirits in the same manner that the visible human form is but the encasing vehicle for an invisible spiritual organism which is, in reality, the conscious individual.\n\nPythagoras regarded the planets as magnificent deities, worthy of the adoration and respect of man.\n\nAll these deities, however, he considered subservient to the One First Cause within whom they all existed temporarily, as mortality exists in the midst of immortality.\n\nThe famous Pythagorean Υ signified the power of choice and was used in the Mysteries as emblematic of the Forking of the Ways.\n\nThe central stem separated into two parts, one branching to the right and the other to the left.\n\nThe branch to the right was called Divine Wisdom and the one to the left Earthly Wisdom .\n\nYouth, personified by the candidate, walking the Path of Life, symbolized by the central stem of the Υ, reaches the point where the Path divides.\n\nThe neophyte must then choose whether he will take the left-hand path and, following the dictates of his lower nature, enter upon a span of folly and thoughtlessness which will inevitably result in his undoing, or whether he will take the right-hand road and through integrity, industry, and sincerity ultimately regain union with the immortals in the superior spheres."

