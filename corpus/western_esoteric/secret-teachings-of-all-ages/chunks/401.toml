body = "That thou seek to advance the honor of thy Creator of all things and the good of thy neighbor, preserve it sacredly that thy Lord may not have cause to complain of thee at the last day.\n\nI have written here in this treatise such a part of the Kingdom of Heaven, just as I myself have worked this treasure and finished it with my fingers, therefore I have subscribed all this work with my blood, lying on my deathbed in Leyden.\n\n\" THE PROCESS --In the Name of God, take of the purest and cleanest salt, sea salt, so as it is made by the sun itself, such as is brought by shipping from Spain, (I used salt that came from St.\n\nUber) let it be dried in a warm stove, grind it in a stone mortar, as fine as possible to a powder that it may be so much the easier dissolve and taken up by our Dew-water , which is thus to be had in the months of May or June: When the Moon is at the full, observe when the dew falls with an East or South East wind.\n\nThen you must have sticks about one and a half feet high above the ground when driven in the Earth.\n\nUpon two or three such sticks, lay some four square plates of glass, and as the dew falls it easily fastens on the glass like a vapour, then have glass Vessels in readiness, let the dew drain from the sides of the glasses into your vessels.\n\nDo this until you have enough.\n\nThe full of the Moon is a good season, afterwards it will be hard.\" The solar rays descending from the sun carry with them solar sulphur--the Divine Fire.\n\nThese rays are crystallized by contact with the lunar rays.\n\nThe solar rays are also met by the emanations pouring upward from the earth's surface and are thus still further crystallized into a partly tangible substance, which is soluble in pure water.\n\nThis substance is the \"Magical Mountain of the Moon\" referred to in the R.\n\nC.\n\nletter.\n\nThe crystallization of the solar and lunar rays in water (dew) produces the virgin earth--a pure, invisible substance, uncontaminated by material matter.\n\nWhen the virgin earth crystals are wet, they appear green; when dry, white.\n\nVon Welling makes a suggestion for the extraction of the solar life from stagnant water, but is reticent both as to naming the essence extracted and also as to the various processes through which it must pass to be refined and increased in power.\n\nHis hint, however, is both valuable and unusual: \"Take sweet clean water and seal it in a large bottle, leaving about one-fourth empty.\n\nPlace the bottle in the sun for some weeks until it rots, showing a precipitation in the bottom.\n\nThis precipitation, when properly manipulated by distillation, will produce a clear, fiery, burning oil, the constituents and use of which are only known to the wise.\" The philosopher of Leyden continues: \"Now when you have enough of your dew close your glasses exactly, and keep it till you use it, that none of its spirits may evaporate, which may easily happen.\n\nSet it therefore in a cool place, that no warmth may come to it, or else the subtle spirit will rise and be gone; which will not so happen if after you have filled your glasses with Dew quite full, you close them very well with wax.\n\nTHE INVISIBLE MAGICAL MOUNTAIN.\n\nFrom Phililethales' Lumen de Lumine.\n\nOn Page 24 of Lumen de Lumine, Eugenius Philalethes describes the magical mountain as follows: \"This is that emblematical magical type, which Thalia delivered to me in the invisible Guiana.\n\nThe first and superior Part of it represents the Mountains of the Moon.\n\nThe philosophers commonly call them the Mountains of India, on whose tops grows their secret and famous Lunaria."

