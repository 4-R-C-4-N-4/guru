body = "It recognized the existence of a secret and all-important doctrine which from the time of the earliest civilizations had been concealed within the rituals, symbols, and allegories of religions and philosophies.\n\nTo the mind unacquainted with its fundamental tenets, Neo-Platonism may appear to be a mass of speculations interspersed with extravagant flights of fancy.\n\nSuch a viewpoint, however, ignores the institutions of the Mysteries--those secret schools into whose profundities of idealism nearly all of the first philosophers of antiquity were initiated.\n\nÆNEAS AT THE GATE OF HELL.\n\nFrom Virgil's Æneid.\n\n(Dryden's translation.) Virgil describes part of the ritual of a Greek Mystery--possibly the Eleusinian--in his account of the descent of Æneas, to the gate of hell under the guidance of the Sibyl.\n\nOf that part of the ritual portrayed above the immortal poet writes: \"Full in the midst of this infernal Road, An Elm displays her dusky Arms abroad; The God of Sleep there hides his heavy Head And empty Dreams on ev'ry Leaf are spread.\n\nOf various Forms, unnumber'd Specters more; Centaurs, and double Shapes, besiege the Door: Before the Passage horrid Hydra stands, And Briareus with all his hundred Hands: Gorgons, Geryon with his triple Frame; And vain Chimæra vomits empty Flame.\n\nThe Chief unsheath'd his shining Steel, prepar'd, Tho seiz'd with sudden Fear, to force the Guard.\n\nOff'ring his brandish'd Weapon at their Face, Had not the Sibyl stop'd his eager Pace, And told him what those empty Phantoms were; Forms without Bodies, and impassive Air.\" *** When the physical body of pagan thought collapsed, an attempt was made to resurrect the form by instilling new life into it by the unveiling of its mystical truths.\n\nThis effort apparently was barren of results.\n\nDespite the antagonism, however, between pristine Christianity and Neo-Platonism many basic tenets of the latter were accepted by the former and woven into the fabric of Patristic philosophy.\n\nBriefly described, Neo-Platonism is a philosophic code which conceives every physical or concrete body of doctrine to be merely the shell of a spiritual verity which may be discovered through meditation and certain exercises of a mystic nature.\n\nIn comparison to the esoteric spiritual truths which they contain, the corporeal bodies of religion and philosophy were considered relatively of little value.\n\nLikewise, no emphasis was placed upon the material sciences.\n\nThe term Patristic is employed to designate the philosophy of the Fathers of the early Christian Church.\n\nPatristic philosophy is divided into two general epochs: ante-Nicene and post-Nicene.\n\nThe ante-Nicene period in the main was devoted to attacks upon paganism and to apologies and defenses of Christianity.\n\nThe entire structure of pagan philosophy was assailed and the dictates of faith elevated above those of reason.\n\nIn some instances efforts were made to reconcile the evident truths of paganism with Christian revelation.\n\nEminent among the ante-Nicene Fathers were St.\n\nIrenæus, Clement of Alexandria, and Justin Martyr.\n\nIn the post-Nicene period more emphasis was placed upon the unfoldment of Christian philosophy along Platonic and Neo-Platonic lines, resulting in the appearance of many strange documents of a lengthy, rambling, and ambiguous nature, nearly all of which were philosophically unsound.\n\nThe post-Nicene philosophers included Athanasius, Gregory of Nyssa, and Cyril of Alexandria.\n\nThe Patristic school is notable for its emphasis upon the supremacy of man throughout the universe.\n\nMan was conceived to be a separate and divine creation--the crowning achievement of Deity and an exception to the suzerainty of natural law."

