body = "The ancient sentence split into its component parts stands thus: Ab'r-achad-ab'ra, i.\n\ne.\n\n, Ab'r, the Bull; achad, the only, &c.--Achad is one of the names of the Sun, given him in consequence of his Shining ALONE,--he is the ONLY Star to be seen when he is seen--the remaining ab'ra, makes the whole to be, The Bull, the only Bull; while the repetition of the name omitting a letter, till all is gone, is the most simple, yet the most satisfactory method that could have been devised to preserve the memory of the fact; and the name of Sorapis, or Serapis, given to the Bull at the above ceremony puts it beyond all doubt.\n\n* * * This word (Abracadabra) disappears in eleven decreasing stages; as in the figure.\n\nAnd what is very remarkable, a body with three heads is folded up by a Serpent with eleven Coils, and placed by Sorapis: and the eleven Volves of the Serpent form a triangle similar to that formed by the ELEVEN diminishing lines of the abracadabra.\" Nearly every religion of the world shows traces of astrological influence.\n\nThe Old Testament of the Jews, its writings overshadowed by Egyptian culture, is a mass of astrological and astronomical allegories.\n\nNearly all the mythology of Greece and Rome may be traced in star groups.\n\nSome writers are of the opinion that the original twenty-two letters of the Hebrew alphabet were derived from groups of stars, and that the starry handwriting on the wall of the heavens referred to words spelt out, with fixed stars for consonants, and the planets, or luminaries, for vowels.\n\nThese, coming into ever-different combinations, spelt words which, when properly read, foretold future events.\n\nAs the zodiacal band marks the pathway of the sun through the constellations, it results in the phenomena of the seasons.\n\nThe ancient systems of measuring the year were based upon the equinoxes and the solstices.\n\nThe year always began with the vernal equinox, celebrated March 21 with rejoicing to mark the moment when the sun crossed the equator northward up the zodiacal arc.\n\nThe summer solstice was celebrated when the sun reached its most northerly position, and the day appointed was June 21.\n\nAfter that time the sun began to descend toward the equator, which it recrossed southbound at the autumnal equinox, September 21.\n\nThe sun reached its most southerly position at the winter solstice, December 21.\n\nFour of the signs of the zodiac have been permanently dedicated to the equinoxes and the solstices; and, while the signs no longer correspond with the ancient constellations to which they were assigned, and from which they secured their names, they are accepted by modern astronomers as a basis of calculation.\n\nThe vernal equinox is therefore said to occur in the constellation of Aries (the Ram).\n\nIt is fitting that of all beasts a Ram should be placed at the head of the heavenly flock forming the zodiacal band.\n\nCenturies before the Christian Era, the pagans revered this constellation.\n\nGodfrey Higgins states: \"This constellation was called the 'Lamb of God.' He was also called the 'Savior,' and was said to save mankind from their sins.\n\nHe was always honored with the appellation of 'Dominus' or 'Lord.' He was called the 'Lamb of God which taketh away the sins of the world.' The devotees addressing him in their litany, constantly repeated the words, 'O Lamb of God, that taketh away the sin of the world, have mercy upon us."

