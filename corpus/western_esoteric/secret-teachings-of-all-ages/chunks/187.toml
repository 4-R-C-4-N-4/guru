body = "The arrant enemies of universal democracy have ever been the crown, the tiara, and the torch.\n\nThus CHiram symbolizes that ideal state of spiritual, intellectual, and physical emancipation which has ever been sacrificed upon the altar of human selfishness.\n\nCHiram is the Beautifier of the Eternal House.\n\nModern utilitarianism, however, sacrifices the beautiful for the practical, in the same breath declaring the obvious lie that selfishness, hatred, and discord are practical.\n\nTHE EMBLEMATIC HAND OF THE MYSTERIES.\n\nFrom Montfaucon's Antiquities.\n\nA hand covered with numerous symbols was extended to the neophytes when they entered into the Temple of Wisdom.\n\nAn understanding of the embossed upon the surface of the hand brought with it Divine power and regeneration Therefore, by means of these symbolic hands the candidate was said to be raised from the dead.\n\n*** Dr.\n\nOrville Ward Owen found a considerable part of the first thirty-two degrees of Freemasonic ritualism hidden in the text of the First Shakespeare Folio.\n\nMasonic emblems are to be observed also upon the title pages of nearly every book published by Bacon.\n\nSir Francis Bacon considered himself as a living sacrifice upon the altar of human need; he was obviously cut down in the midst of his labors, and no student of his New Atlantis can fail to recognize the Masonic symbolism contained therein.\n\nAccording to the observations of Joseph Fort Newton, the Temple of Solomon described by Bacon in that utopian romance was not a house at all but the name of an ideal state.\n\nIs it not true that the Temple of Freemasonry is also emblematic of a condition of society?\n\nWhile, as before stated, the principles of the Hiramic legend are of the greatest antiquity, it is not impossible that its present form may be based upon incidents in the life of Lord Bacon, who passed through the philosophic death and was raised in Germany.\n\nIn an old manuscript appears the statement that the Freemasonic Order was formed by alchemists and Hermetic philosophers who had banded themselves together to protect their secrets against the infamous methods used by avaricious persons to wring from them the secret of gold-making.\n\nThe fact that the Hiramic legend contains an alchemical formula gives credence to this story.\n\nThus the building of Solomon's Temple represents the consummation of the magnum opus , which cannot be realized without the assistance of CHiram, the Universal Agent.\n\nThe Masonic Mysteries teach the initiate how to prepare within his own soul a miraculous powder of projection by which it is possible for him to transmute the base lump of human ignorance, perversion, and discord into an ingot of spiritual and philosophic gold.\n\nSufficient similarity exists between the Masonic CHiram and the Kundalini of Hindu mysticism to warrant the assumption that CHiram may be considered a symbol also of the Spirit Fire moving through the sixth ventricle of the spinal column.\n\nThe exact science of human regeneration is the Lost Key of Masonry, for when the Spirit Fire is lifted up through the thirty-three degrees, or segments of the spinal column, and enters into the domed chamber of the human skull, it finally passes into the pituitary body (Isis), where it invokes Ra (the pineal gland) and demands the Sacred Name.\n\nOperative Masonry, in the fullest meaning of that term, signifies the process by which the Eye of Horus is opened.\n\nE.\n\nA.\n\nWallis Budge has noted that in some of the papyri illustrating the entrance of the souls of the dead into the judgment hall of Osiris the deceased person has a pine cone attached to the crown of his head.\n\nThe Greek mystics also carried a symbolic staff, the upper end being in the form of a pine cone, which was called the thyrsus of Bacchus."

