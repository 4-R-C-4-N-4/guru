body = "Those black clouds will [descend] to the body whence they came, and the junction of body, soul, and spirit has been completed and turned to ashes.\" The eighth bottle is divided horizontally by a golden band, from which rises a golden stem ending in five leaves protruding from the neck of the bottle.\n\nThe contents of the vessel are transparent, and it is written that \"the black clouds are past and the great whiteness has been completed.\" The ninth bottle (from the neck of which rises a golden white rose) is also partly filled with a transparent liquid.\n\nThe rose is made to say: \"He who blanches me makes me red.\" The tenth and last bottle represents the consummation of the Great Work.\n\nThe lower half of the vessel is filled with the blood-red Elixir and from the neck rises a red rose with many petals and of extreme beauty.\n\nAfter declaring all the planets to have been present at the consummation of the Great Work, the author of the document concludes: \"I gave to the Master [spirit] so much silver and gold that be can never be poor.\" In his dedication the author and illustrator of the manuscript declares that he has set forth all the operations of the Great Work.\n\nHe prays to the Holy Spirit that he may be included in the number of those who have pursued this most noble of the sciences and that he may be set always in the path of righteousness.\n\nExclusive of his own researches, the main sources of his information are said to be the writings of St.\n\nThomas Aquinas, Raymond Lully, and Arnold of Villa Nova.\n\nTo protect themselves from the persecution of despotic theology the medieval alchemists couched their philosophy in Christian terminology, although the great secrets of the Art were derived largely from Egyptian or Arabian adepts.\n\nThe Mohammedans were masters of the Hermetic secrets and even the great Paracelsus secured from them the major part of his knowledge.\n\nIn their manifestoes the Rosicrucians also disclose the Arabian source of their secret doctrine.\n\nHence it should be borne in mind that the relating of the alchemical teachings to Biblical symbolism was a gesture of expediency.\n\nIn their search of the Scriptures for the arcana of Israel, the Qabbalists substantiated in great measure the alchemical interpretations of the Bible, for the soul of alchemy is one with that of Qabbalism.\n\nBoth schools have a common end, being who concerned with the mystery of human regeneration, despite apparent discrepancies in their symbolism.\n\nThe publication of this manuscript places at the student's disposal the most profound secrets of the Hermetic Art.\n\nAt first the task of decipherment may seem hopeless and the superficially-minded will be tempted to scoff at the possibility of real knowledge being perpetuated in such unconventional fashion.\n\nThe scoffer will not realize that one of the purposes of the document is to awaken ridicule and thus preserve more effectually its arcana from the profane.\n\nA few sheets (such as those here reproduced) represent the life work of one who has consecrated himself to the task of tearing aside the veil of the World Virgin.\n\nYears of research and experimentation, days of incessant labor, nights of prayer and meditation, and at last comes the realization of accomplishment!\n\nThis is the real story told by the grotesque figures drawn so painstakingly upon the faded, worm-eaten pages.\n\nThose who have glimpsed the greater realities of being realize that the fundamental verities of life find at best only imperfect expression through physical symbols.\n\nOnly those who have passed through the travail of spiritual birth can adequately comprehend and properly reverence the pathetic efforts to portray for others that knowledge necessarily locked within the heart of the one who knows.\n\nLeaf 1 .\n\nThe top line reads: \"Our earliest medicine was made of natural objects.\" About the king and queen appears the statement that to them a son shall be born \"in two trees of the vine,\" resembling his father and without equal in all the world."

