body = "The allowing arrangement is most generally accepted for the musical intervals of the planets between the earth and the sphere of the fixed stars: From the sphere of the earth to the sphere of the moon; one tone; from the sphere of the moon to that of Mercury, one half-tone; from Mercury to Venus, one-half; from Venus to the sun, one and one-half tones; from the sun to Mars, one tone; from Mars to Jupiter, one-half tone; from Jupiter to Saturn, one-half tone; from Saturn to the fixed stars, one-half tone.\n\nThe sum of these intervals equals the six whole tones of the octave.\n\n*** Having once established music as an exact science, Pythagoras applied his newly found law of harmonic intervals to all the phenomena of Nature, even going so far as to demonstrate the harmonic relationship of the planets, constellations, and elements to each other.\n\nA notable example of modern corroboration of ancient philosophical reaching is that of the progression of the elements according to harmonic ratios.\n\nWhile making a list of the elements in the ascending order of their atomic weights, John A.\n\nNewlands discovered at every eighth element a distinct repetition of properties.\n\nThis discovery is known as the law of octaves in modern chemistry.\n\nSince they held that harmony must be determined not by the sense perceptions but by reason and mathematics, the Pythagoreans called themselves Canonics , as distinguished from musicians of the Harmonic School , who asserted taste and instinct to be the true normative principles of harmony.\n\nRecognizing, however, the profound effect: of music upon the senses and emotions, Pythagoras did not hesitate to influence the mind and body with what he termed \"musical medicine.\" Pythagoras evinced such a marked preference for stringed instruments that he even went so far as to warn his disciples against allowing their ears to be defiled by the sounds of flutes or cymbals.\n\nHe further declared that the soul could be purified from its irrational influences by solemn songs sung to the accompaniment of the lyre.\n\nTHE CONSONANCES OF THE MUNDANE MONOCHORD.\n\nFrom Fludd's De Musica Mundana.\n\nThis diagrammatic sector represents the major gradations of energy and substance between elemental earth and absolute unconditioned force.\n\nBeginning with the superior, the fifteen graduated spheres descend in the following order: Limitless and Eternal Life; the superior, the middle, and the inferior Empyrean; the seven planets; and the four elements.\n\nEnergy is symbolized by Fludd as a pyramid with its base upon the concave surface of the superior Empyrean, and substance as another Pyramid with its base upon the convex surface of the sphere (not planet) of earth.\n\nThese pyramids demonstrate the relative proportions of energy and substance entering into the composition of the fifteen planes of being.\n\nIt will be noted that the ascending pyramid of substance touches but does not pierce the fifteenth sphere--that of Limitless and Eternal Life.\n\nLikewise, the descending pyramid of energy touches but does not pierce the first sphere--the grossest condition of substance.\n\nThe plane of the sun is denominated the sphere of equality, for here neither energy nor substance predominate.\n\nThe mundane monochord consists of a hypothetical string stretched from the base of the pyramid of energy to the base of the pyramid of substance.\n\n*** In his investigation of the therapeutic value of harmonics, Pythagoras discovered that the seven modes--or keys--of the Greek system of music had the power to incite or allay the various emotions.\n\nIt is related that while observing the stars one night he encountered a young man befuddled with strong drink and mad with jealousy who was piling faggots about his mistress' door with the intention of burning the house.\n\nThe frenzy of the youth was accentuated by a flutist a short distance away who was playing a tune in the stirring Phrygian mode."

