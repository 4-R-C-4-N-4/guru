[content]
body = "\"The universe is surrounded by the sphere of the stars.\n\nBeyond that sphere is the sphere of Schamayim , which is the Divine fiery water, the first outflow of the Word of God, the flaming river pouring from the presence of the Eternal.\n\nSchamayim , the fiery androgynous water, divides.\n\nThe fire becomes the solar fire and the water becomes the lunar water.\n\nSchamayim is the universal mercury--sometimes called Azoth --the measureless spirit of life.\n\nThe spiritual fiery original water-- Schamayim --comes through Eden (in Hebrew, vapor ) and pours itself into four main rivers [the elements].\n\nThis is the river of living water-- Azoth [the fiery mercurial essence] that flows out from the throne of God and the Lamb.\n\nIn this Eden [vaporous essence or mist] is the spiritual earth [incomprehensible and intangible], or the dust Aphar , out of which God formed Adam min Haadamah , the spiritual body of man, which body must sometime become revealed.\" In another part of his writings von Welling also says that there was no material universe until Lucifer, attempting to perform the cosmic alchemy, misused the Schamayim , or the Divine Fire.\n\nIn order to reestablish the Schamayim which Lucifer had perverted, this universe was formed as a means of liberating it from the dark cloud within which it was locked by the failure of Lucifer's attempt to control it.\n\nThese statements clearly emphasize the fact that the early philosophers recognized in the Bible a book of chemical and alchemical formulæ.\n\nIt is essential that this point be kept in mind at all times.\n\nWoe to that seeker who accepts as literal the rambling allegories of the alchemists.\n\nSuch a one can never enter the inner sanctuary of truth.\n\nElias Ashmole in his Theatrum Chemicum Britannicum thus describes the methods employed by the alchemists to conceal their true doctrines: \"Their chiefest study was to wrap up their Secrets in Fables , and spin out their Fancies in Vailes and shadows , whose Radii seems to extend every way, yet so, that they meet in a Common Center , and point onely at One thing.\" The fact that the Scriptures reveal a hidden knowledge, if considered allegorically, is clearly demonstrated by a parable describing King Solomon, his wives, concubines, and virgins, which parable occurs in Geheime Figuren der Rosenkreuzer , published in Ultona in 1785.\n\nDr.\n\nHartmann, who translated part of this work into English, declared that the wives of Solomon represented the arts, the concubines the sciences, and the virgins the still unrevealed secrets of Nature.\n\nBy order of the King the virgins were forced to remove their veils, thus signifying that by means of wisdom (Solomon) the mystic arts were forced to disclose their hidden parts to the philosopher, while to the uninitiated world only the outside garments were visible.\n\n(Such is the mystery of the veil of Isis.) As the alchemist must do his work in four worlds simultaneously if he would achieve the Magnum Opus , a table showing the analogies of the three principles in the four worlds may clarify the relationship which the various parts bear to each other.\n\nThe early masters of the art of alchemical symbolism did not standardize either their symbols or their terms.\n\nThus it required great familiarity with the subject combined with considerable intuitive power to unravel some of their enigmatical statements.\n\nThe third and fourth divisions of the following table are given alternative renderings, owing to the fact that some authors did not draw a clear line between spirit and soul .\n\nAccording to the Scriptures, spirit is indestructible, but soul is destructible.\n\nObviously, then, they are not synonymous."

