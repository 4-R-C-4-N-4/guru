body = "* * * Now and again the curtain which shrouds his actions is drawn aside, and we are permitted to see him fiddling in the music room at Versailles, gossiping with Horace Walpole in London, sitting in Frederick the Great's library at Berlin, or conducting illuminist meetings in caverns by the Rhine.\" (See The Nineteenth Century , January, 1908.) THE ''DIVINE'' CAGLIOSTRO.\n\nFrom Houdon's Bust of Cagliostro.\n\nThe Comte di Cagliostro is described as a man not overly tall, but square shouldered and deep of chest.\n\nHis head, which was large, was abundantly covered with black hair combed back from his broad and noble forehead.\n\nHis eyes were black and very brilliant, and when he spoke with great feeling upon some profound subject the pupils dilated, his eyebrows rose, and he shook his head like a maned lion.\n\nHis hands and feet were small--an indication of noble birth--and his whole bearing was one of dignity and studiousness.\n\nHe was filled with energy, and could accomplish a prodigious amount of work.\n\nHe dressed somewhat fantastically, gave so freely from an inexhaustible purse that he received the title of \"Father of the Poor,\" accepted nothing from anyone, and maintained himself in magnificence in a combined temple and palace in the Rue d, la Sourdière.\n\nAccording to his own statement he was initiated into the Mysteries by none other than the Comte de St.-Germain.\n\nHe had traveled through all parts of the world, and in the ruins of ancient Babylon and Nineveh had discovered wise men who understood all the secrets of human life.\n\n*** The Comte de St.-Germain has been generally regarded as an important figure in early activities of the Freemasons.\n\nRepeated efforts, however, probably with an ulterior motive, have been made to discredit his Masonic affiliations.\n\nAn example of this is the account appearing in The Secret Tradition in Freemasonry , by Arthur Edward Waite.\n\nThis author, after making several rather disparaging remarks on the subject, amplifies his article by reproducing an engraving of the wrong Comte de St.-Germain, apparently being unable to distinguish between the great illuminist and the French general.\n\nIt will yet be established beyond all doubt that the Comte de St.-Germain was both a Mason and a Templar; in fact the memoirs of Cagliostro contain a direct statement of his initiation into the order of the Knights Templars at the hands of St.-Germain.\n\nMany of the illustrious personages with whom the Comte de St.-Germain associated were high Masons, and sufficient memoranda have been preserved concerning the discussions which they held to prove that he was a master of Freemasonic lore.\n\nIt is also reasonably certain that he was connected with the Rosicrucians--possibly having been the actual head of that order.\n\nThe Comte de St.-Germain was thoroughly conversant with the principles of Oriental esotericism.\n\nHe practiced the Eastern system of meditation and concentration, upon several occasions having been seen seated with his feet crossed and hands folded in the posture of a Hindu Buddha.\n\nHe had a retreat in the heart of the Himalayas to which he retired periodically from the world.\n\nOn one occasion he declared that he would remain in India for eighty-five years and then would return to the scene of his European labors.\n\nAt various times he admitted that he was obeying the orders of a power higher and greater than himself.\n\nWhat he did not say was that this superior power was the Mystery school which had sent him into the world to accomplish a definite mission.\n\nThe Comte de St.-Germain and Sir Francis Bacon are the two greatest emissaries sent into the world by the Secret Brotherhood in the last thousand years.\n\nE."

