body = "Students flocked from France and Germany and England to drink from the fountains of learning which flowed only in the cities of the Moors.\n\nThe surgeons and doctors of Andalusia were in the van of science; women were encouraged to devote themselves to serious study, and a lady doctor was not unknown among the people of Cordova.\n\nMathematics, astronomy and botany, history, philosophy and jurisprudence, were to he mastered in Spain and in Spain alone.\" The Library of Original Sources thus sums up the effects of Islam: \"The results of Mohammedism have been greatly underestimated.\n\nIn the century after Mohammed's death it wrested Asia Minor, Africa, and Spain from Christianity, more than half of the civilized world, and established a civilization, the highest in the world during the Dark Ages.\n\nIt brought the Arabian race to their highest development, raised the position of women in the East, though it retained polygamy, was intensively monotheistic, and until the Turks gained control for the most part encouraged progress.\" In the same work, among the great Islamic scientists and philosophers who have made substantial contributions to human knowledge are listed Gerber, or Djafer, who in the ninth century laid the foundations for modern chemistry; Ben Musa, who in the tenth century introduced the theory of algebra; Alhaze, who in the eleventh century made a profound study of optics and discovered the magnifying power of convex lenses; and in the eleventh century also, both Avicenna, or Ibn Sina, whose medical encyclopedia was the standard of his age, and the great Qabbalist Avicebron, or Ibn Gebirol.\n\n\"Looking back upon the science of the Mohammedans,\" resumes the authority just quoted, \"it will be seen that they laid the first foundations of chemistry, and made important advances in mathematics and optics.\n\nTheir discoveries never had the influence they should have had upon the course of European civilization, but this was because Europe itself was not enlightened enough to grasp and make use of them.\n\nGerber's observation that oxidized iron weighs heavier than before oxidation had to be made over again.\n\nSo had some of their work in optics, and many of their geographical discoveries.\n\nThey had rounded Africa long before Vasco da Gama.\n\nThe composition of gunpowder came into Northern Europe from them.\n\nWe must never forget that the dark ages in Christian Europe were the bright ones of the Mohammedan world.\n\nIn the field of philosophy the Arabs started by adopting the neo-Platonism they found in Europe, and gradually working back to Aristotle.\" What means the subtle mystery of the phœnix reborn every six hundred years?\n\nFaintly from within the sanctuary of the World Mysteries is whispered the answer.\n\nSix hundred years before Christ the phœnix of wisdom (Pythagoras?) spread its wings and died upon the altar of humanity, consumed by the sacrificial fire.\n\nIn Nazareth the bird was again reborn from its own ashes, only to die upon the tree which had its roots in Adam's skull.\n\nIn A.D.\n\n600 appeared Ahmed (Mohammed).\n\nAgain the phœnix suffered, this time from the poison of Kheibar, and from its charred ashes rose to spread its wings across the face of Mongolia, where in the twelfth century Genghis Khan established the rule of wisdom.\n\nCircling the mighty desert of Gobi, the phœnix again gave up its form, which now lies buried in a glass sarcophagus under a pyramid bearing upon it the ineffable figures of the Mysteries.\n\nAfter the lapse of six hundred years from the death of Genghis Khan, did Napoleon Bonaparte--who believed himself to be the man of destiny--contact in his wanderings this strange legend of the continual periodic rebirth of wisdom?"

