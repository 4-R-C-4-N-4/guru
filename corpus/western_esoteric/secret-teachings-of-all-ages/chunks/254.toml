body = "The aforesaid Bond of spirits, together with the seal and character of the planetary angel, must be written m virgin Parchment and laid before the Spirit [for signature] when he appears; at that time the invocant must not lost confidence but be patient, firm, bold, and Persevering, and take care that he asks nor requires nothing of the Spirit but with a view to the glory of God and the well-being fellow creatures.\n\nHaving obtained his desires of the Spirit, the invocant may license him to depart.\" *** The black magician cannot use the symbols of white magic without bringing down upon himself the forces of white magic, which would be fatal to his schemes.\n\nHe must therefore distort the hierograms so that they typify the occult fact that he himself is distorting the principles for which the symbols stand.\n\nBlack magic is not a fundamental art; it is the misuse of an art.\n\nTherefore it has no symbols of its own.\n\nIt merely takes the emblematic figures of white magic, and by inverting and reversing them signifies that it is left-handed.\n\nTHE PENTACLES OF THE SEVEN PLANETS AND THE SEALS AND CHARACTERS OF THE PLANETARY ANGELS.\n\nFrom a mediæval Book of Spirits (unpublished).\n\nThe seven large circle are the planets, while the two small circles under each contain the seal and the character of the controlling intelligence of the planet.\n\n*** A good instance of this practice is found in the pentagram, or five-pointed star, made of five connected lines.\n\nThis figure is the time-honored symbol of the magical arts, and signifies the five properties of the Great Magical Agent, the five senses of man, the five elements of nature, the five extremities of the human body.\n\nBy means of the pentagram within his own soul, man not only may master and govern all creatures inferior to himself, but may demand consideration at the hands of those superior to himself.\n\nThe pentagram is used extensively in black magic, but when so used its form always differs in one of three ways: The star may be broken at one point by not permitting the converging lines to touch; it may be inverted by having one point down and two up; or it may be distorted by having the points of varying lengths.\n\nWhen used in black magic, the pentagram is called the \"sign of the cloven hoof,\" or the footprint of the Devil.\n\nThe star with two points upward is also called the \"Goat of Mendes,\" because the inverted star is the same shape as a goat's head.\n\nWhen the upright star turns and the upper point falls to the bottom, it signifies the fall of the Morning Star."

