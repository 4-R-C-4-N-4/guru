[content]
body = "Wynn Westcott says of the duad: \"it was called 'Audacity,' from its being the earliest number to separate itself from the Divine One; from the 'Adytum of God-nourished Silence,' as the Chaldean oracles say.\" As the monad is the father, so the duad is the mother; therefore, the duad has certain points in common with the goddesses Isis, Rhea (Jove's mother), Phrygia, Lydia, Dindymene (Cybele), and Ceres; Erato (one of the Muses); Diana, because the moon is forked; Dictynna, Venus, Dione, Cytherea; Juno, because she is both wife and sister of Jupiter; and Maia, the mother of Mercury.\n\nWhile the monad is the symbol of wisdom, the duad is the symbol of ignorance, for in it exists the sense of separateness--which sense is the beginning of ignorance.\n\nThe duad, however, is also the mother of wisdom, for ignorance--out of the nature of itself--invariably gives birth to wisdom.\n\nThe Pythagoreans revered the monad but despised the duad, because it was the symbol of polarity.\n\nBy the power of the duad the deep was created in contradistinction to the heavens.\n\nThe deep mirrored the heavens and became the symbol of illusion, for the below was merely a reflection of the above.\n\nThe below was called maya , the illusion, the sea, the Great Void, and to symbolize it the Magi of Persia carried mirrors.\n\nFrom the duad arose disputes and contentions, until by bringing the monad between the duad, equilibrium was reestablished by the Savior-God, who took upon Himself the form of a number and was crucified between two thieves for the sins of men.\n\nThe triad--3--is the first number actually odd (monad not always being considered a number).\n\nIt is the first equilibrium of unities; therefore, Pythagoras said that Apollo gave oracles from a tripod, and advised offer of libation three times.\n\nThe keywords to the qualities of the triad are friendship, peace, justice, prudence, piety, temperance, and virtue.\n\nThe following deities partake of the principles of the triad: Saturn (ruler of time), Latona, Cornucopiæ, Ophion (the great serpent), Thetis, Hecate, Polyhymnia (a Muse), Pluto, Triton, President of the Sea, Tritogenia, Achelous, and the Faces, Furies, and Graces.\n\nThis number is called wisdom, because men organize the present, foresee the future, and benefit by the experiences of the fast.\n\nIt is cause of wisdom and understanding.\n\nThe triad is the number of knowledge--music, geometry, and astronomy, and the science of the celestials and terrestrials.\n\nPythagoras taught that the cube of this number had the power of the lunar circle.\n\nThe sacredness of the triad and its symbol--the triangle--is derived from the fact that it is made up of the monad and the duad.\n\nThe monad is the symbol of the Divine Father and the duad of the Great Mother.\n\nThe triad being made of these two is therefore androgynous and is symbolic of the fact that God gave birth to His worlds out of Himself, who in His creative aspect is always symbolized by the triangle.\n\nThe monad passing into the duad was thus capable of becoming the parent of progeny, for the duad was the womb of Meru, within which the world was incubated and within which it still exists in embryo."

