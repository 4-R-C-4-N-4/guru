[content]
body = "Realizing, therefore, that alchemy is a mystery in three worlds--the divine, the human, and the elemental--it can easily be appreciated why the sages and philosophers created and evolved an intricate allegory to conceal their wisdom.\n\nAlchemy is the science of multiplication and is based upon the natural phenomenon of growth.\n\n\"Nothing from nothing comes,\" is an extremely ancient adage.\n\nAlchemy is not the process of making something from nothing; it is the process of increasing and improving that which already exists.\n\nIf a philosopher were to state that a living man could be made from a stone, the unenlightened would probably exclaim, \"Impossible!\" Thus would they reveal their ignorance, for to the wise it is known that in every stone is the seed of man.\n\nA philosopher might declare that a universe could be made out of a man, but the foolish would regard this as an impossibility, not realizing that a man is a seed from which a universe may be brought forth.\n\nGod is the \"within\" and the \"without\" of all things.\n\nThe Supreme One manifests Himself through growth, which is an urge from within outward, a struggle for expression and manifestation.\n\nThere is no greater miracle in the growing and multiplication of gold by the alchemist than in a tiny mustard seed producing a bush many thousands of times the size of the seed.\n\nIf a mustard seed produces a hundred thousand times its own size and weight when planted in an entirely different substance (the earth), why should not the seed of gold be multiplied a hundred thousand times by art when that seed is planted in its earth (the base metals) and nourished artificially by the secret process of alchemy?\n\nAlchemy teaches that God is in everything; that He is One Universal Spirit, manifesting through an infinity of forms.\n\nGod, therefore, is the spiritual seed planted in the dark earth (the material universe).\n\nBy arc it is possible so to grow and expand this seed that the entire universe of substance is tinctured thereby and becomes like unto the seed--pure gold.\n\nIn the spiritual nature of man this is termed regeneration ; in the material body of the elements it is called transmutation .\n\nAs it is in the spiritual and material universes, so it is in the intellectual world.\n\nWisdom cannot be imparted to an idiot because the seed of wisdom is not within him, but wisdom may be imparted to an ignorant person, however ignorant he may be, because the seed of wisdom exists in him and can be developed by art and culture.\n\nHence a philosopher is only an ignorant man within whose nature a projection has taken place.\n\nThrough art (the process of learning) the whole mass of base metals (the mental body of ignorance) was transmuted into pure gold (wisdom), for it was tinctured with understanding.\n\nIf, then, through faith and proximity to God the consciousness of man may be transmuted from base animal desires (represented by the masses of the planetary metals) into a pure, golden, and godly consciousness, illumined and redeemed, and the manifesting God within that one increased from a tiny spark to a great and glorious Being; if also the base metals of mental ignorance can, through proper endeavor and training, be transmuted into transcendent genius and wisdom, why is the process in two worlds or spheres of application not equally true in the third?\n\nIf both the spiritual and mental elements of the universe can be multiplied in their expression, then by the law of analogy the material elements of the universe can also be multiplied, if the necessary process can be ascertained.\n\nThat which is true in the superior is true in the inferior .\n\nIf alchemy be a great spiritual fact, then it is also a great material fact.\n\nIf it can take place in the universe, it can take place in man; if it can take place in man, it can take place in the plants and minerals."

