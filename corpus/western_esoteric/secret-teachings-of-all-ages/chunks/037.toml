body = "Of these shoots one is manifested from above, which is the Great Power, the Universal Mind ordering all things, male, and the other, [is manifested] from below, the Great Thought, female, producing all things.\n\nHence pairing with each other, they unite and manifest the Middle Distance, incomprehensible Air, without beginning or end.\n\nIn this is the Father Who sustains all things, and nourishes those things which have a beginning and end.\" (See Simon Magus , by G.\n\nR.\n\nS.\n\nMead.) By this we are to understand that manifestation is the result of a positive and a negative principle, one acting upon the other, and it takes place in the middle plane, or point of equilibrium, called the pleroma .\n\nThis pleroma is a peculiar substance produced out of the blending of the spiritual and material æons.\n\nOut of the pleroma was individualized the Demiurgus , the immortal mortal, to whom we are responsible for our physical existence and the suffering we must go through in connection with it.\n\nIn the Gnostic system, three pairs of opposites, called Syzygies , emanated from the Eternal One.\n\nThese, with Himself, make the total of seven.\n\nThe six (three pairs) Æons (living, divine principles) were described by Simon in the Philosophumena in the following manner: The first two were Mind (Nous) and Thought (Epinoia).\n\nThen came Voice (Phone) and its opposite, Name (Onoma), and lastly, Reason (Logismos) and Reflection (Enthumesis).\n\nFrom these primordial six, united with the Eternal Flame , came forth the Æons (Angels) who formed the lower worlds through the direction of the Demiurgus.\n\n(See the works of H.\n\nP.\n\nBlavatsky.) How this first Gnosticism of Simon Magus and Menander, his disciple, was amplified, and frequently distorted, by later adherents to the cult must now be considered.\n\nThe School of Gnosticism was divided into two major parts, commonly called the Syrian Cult and the Alexandrian Cult.\n\nThese schools agreed in essentials, but the latter division was more inclined to be pantheistic, while the former was dualistic.\n\nWhile the Syrian cult was largely Simonian, the Alexandrian School was the outgrowth of the philosophical deductions of a clever Egyptian Christian, Basilides by name, who claimed to have received his instructions from the Apostle Matthew.\n\nLike Simon Magus, he was an emanationist, with Neo-Platonic inclinations.\n\nIn fact, the entire Gnostic Mystery is based upon the hypothesis of emanations as being the logical connection between the irreconcilable opposites Absolute Spirit and Absolute Substance, which the Gnostics believed to have been coexistent in Eternity.\n\nSome assert that Basilides was the true founder of Gnosticism, but there is much evidence to the effect that Simon Magus laid down its fundamental principles in the preceding century.\n\nTHE DEATH OF SIMON THE MAGICIAN.\n\nFrom the Nuremberg Chronicle.\n\nSimon Magus, having called upon the Spirits of the Air, is here shown being picked up by the demons.\n\nSt.\n\nPeter demands that the evil genii release their hold upon the magician.\n\nThe demons are forced to comply and Simon Magus is killed by the fall.\n\n*** The Alexandrian Basilides inculcated Egyptian Hermeticism, Oriental occultism, Chaldean astrology, and Persian philosophy in his followers, and in his doctrines sought to unite the schools of early Christianity with the ancient pagan Mysteries.\n\nTo him is attributed the formulation of that peculiar concept of the Deity which carries the name of Abraxas."

