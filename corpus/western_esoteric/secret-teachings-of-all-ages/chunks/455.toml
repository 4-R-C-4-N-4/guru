[content]
body = "THE true story of the life of Jesus of Nazareth has never been unfolded to the world, either in the accepted Gospels or in the Apocrypha, although a few stray hints may be found in some of the commentaries written by the ante-Nicene Fathers.\n\nThe facts concerning His identity and mission are among the priceless mysteries preserved to this day in the secret vaults beneath the \"Houses of the Brethren.\" To a few of the Knights Templars, who were initiated into the arcana of the Druses, Nazarenes, Essenes, Johannites, and other sects still inhabiting the remote and inaccessible fastnesses of the Holy Land, part of the strange story was told.\n\nThe knowledge of the Templars concerning the early history of Christianity was undoubtedly one of the main reasons for their persecution and final annihilation.\n\nThe discrepancies in the writings of the early Church Fathers not only are irreconcilable, but demonstrate beyond question that even during the first five centuries after Christ these learned men had for the basis of their writings little more substantial than folklore and hearsay.\n\nTo the easy believer everything is possible and there are no problems.\n\nThe unemotional person in search of facts, however, is confronted by a host of problems with uncertain factors, of which the following are typical: According to popular conception, Jesus was crucified during the thirty-third year of His life and in the third year of His ministry following His baptism.\n\nAbout A.D.\n\n180, St.\n\nIrenæus, Bishop of Lyons, one of the most eminent of the ante-Nicene theologians, wrote Against Heresies , an attack on the doctrines of the Gnostics.\n\nIn this work Irenæus declared upon the authority of the Apostles themselves that Jesus lived to old age.\n\nTo quote: \"They, however, that they may establish their false opinion regarding that which is written, 'to proclaim the acceptable year of the Lord,' maintain that He preached for one year only, and then suffered in the twelfth month.\n\n[In speaking thus], they are forgetful of their own disadvantage, destroying His whole work, and robbing Him of that age which is both more necessary and more honourable than any other; that more advanced age, I mean, during which also as a teacher He excelled all others.\n\nFor how could He have had His disciples, if He did not teach?\n\nAnd how could He have taught, unless He had reached the age of a Master?\n\nFor when He came to be baptised, He had not yet completed His thirtieth year, but was beginning to be about thirty years of age (for thus Luke, who has mentioned His years, has expressed it: 'Now Jesus was, as it were, beginning to be thirty years old,' when He came to receive baptism); and, (according to these men,) He preached only one year reckoning from His baptism.\n\nOn completing His thirtieth year He suffered, being in fact still a young man, and who had by no means attained to advanced age.\n\nNow, that the first stage of early life embraces thirty years, and that this extends onward to the fortieth year, every one will admit; but from the fortieth and fiftieth year a man begins to decline towards old age, which Our Lord possessed while He still fulfilled the office of a Teacher , even as the Gospel and all the elders testify; those who were conversant in Asia with John, the disciple of the Lord, (affirming) that John conveyed to them that information.\n\nAnd he remained among them up to the time of Trajan.\n\nSome of them, moreover, saw not only John, but the other apostles also, and heard the very same account from them, and bear testimony as to the'(validity of) the statement.\n\nWhom then should we rather believe?"

