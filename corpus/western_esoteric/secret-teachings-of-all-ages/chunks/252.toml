[content]
body = "\"I intreat thee, Pabiel , by the whole Spirit of Heaven, Seraphim, Cherubim, Thrones, Dominations, Witnesses, Powers, Principalities, Archangels, and Angels, by the holy, great, and glorious Angels Orphaniel Tetra-Dagiel Salamla Acimoy pastor poti , that thou come forthwith, readily show thyself that we may see you and audibly hear you, speak unto us and fulfil our desires, and by your star which is Jupiter, and by all the constellations of Heaven, and by whatsoever you obey, and by your character which you have given, proposed, and confirmed, that you attend unto me according to the prayer and petitions which I have made unto Almighty God, and that you forthwith send me one of your ministering Spirits, who may willingly, truly, and faithfully fulfil all my desires, and that you command him to appear unto me in the form of a beautiful Angel, gently, courteously, affably, and meekly, entering into communication with me, and that he neither permitting any evil Spirit to approach in any sort of hurt, terrify or affright me in any way nor deceiving me in any wise.\n\nThrough the virtue of Our Lord JC, in whose Name I attend, wait for, and expect thy appearance.\n\nFiat, fiat, fiat.\n\nAmen, Amen, Amen.\n\n\" Interrogatories .\n\n[Having summoned the spirit unto his presence, the magician shall question him as follows:] \"'Comest thou in peace in the Name of the Father and of the Son and of the Holy Ghost?' [And the spirit shall answer:] 'Yes.' \"'Thou art welcome, noble Spirit.\n\nWhat is thy Name?' [And the spirit shall answer:] ' Pabiel .' \"'I have called thee in the Name of Jesu of Nazareth at whose Name every knee doth bow in heaven, earth, and hell, and every tongue shall confess there is no name like unto the Name of Jesus, who hath given power unto man to bind and to loose all things in his most Holy Name, yea even unto those that trust in his salvation.\n\n\"'Art thou the messenger of Zadkiel?' [And the spirit shall answer:] 'Yes.' \"'Wilt thou confirm thyself unto me at this time and henceforth reveal all things unto me that I shall desire to know, and teach me how I may increase in wisdom and knowledge and show unto me all the secrets of the Magic Art, and of all liberal sciences, that I may thereby set forth the glory of Almighty God?' [And the spirit shall answer:] 'Yes.' \"'Then I pray thee give and confirm thy character unto me whereby I may call thee at all times, and also swear unto me this oath and I will religiously keep my vow and covenant unto Almighty God and will courteously receive thee at all times where thou dost appear unto me.' \" License to Depart .\n\n\"'Forasmuch as thou comest in peace and quietness and hath answered unto my petitions, I give humble and hearty thanks unto Almighty God in whose Name I called and thou camest, and now thou mayest depart in peace unto thine orders and return unto me again at what time soever I shall call thee by thine oath, or by thy name or by thine order, or by thine office which is granted thee from the Creator, and the power of God be with me and thee and upon the whole issue of God, Amen.\n\n\"'Glory be to the Father, and to the Son, and to the Holy Ghost.' [Note.] \"It would be advisable for the invocant to remain in the circle for a few minutes after reciting the license, and if the place of operation be in the open air, let him destroy all traces of the circle, etcetera, and return quietly to his home."

