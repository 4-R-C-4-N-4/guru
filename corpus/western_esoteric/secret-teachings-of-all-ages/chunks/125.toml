body = "For as in the Supreme Mind everything is simultaneous and spaceless, the future is therefore present in that Mind; and they thought that while the human mind was absorbed in the Supreme by contemplation, by that union they were enabled to know all the future.\n\nNearly all that is represented in our Tablet consists of amulets which, by analogy above described, would inspire them, under the described conditions, with the virtues of the Supreme Power and enable them to receive good and avert evil.\n\nThey also believed they could in this magical manner effect cures of diseases; that genii could be induced to appear to them during sleep and cure or teach them to cure the sick.\n\nIn this belief they consulted the Gods about all sort of doubts and difficulties, while adorned with the simulacra of the mystic rite and intently contemplating the Divine Ideas; and while so enraptured they believed the God by some sign, nod or gesture communicated with them, whether asleep or awake, concerning the truth or falsity of the matter in point.\" (See Œdipus Ægyptiacus.) *** In his Œdipus Ægyptiacus , published in 1654, Kircher attacked the problem with characteristic avidity.\n\nBeing peculiarly qualified for such a task by years of research in matters pertaining to the secret doctrines of antiquity, and with the assistance of a group of eminent scholars, Kircher accomplished much towards an exposition of the mysteries of the Tablet.\n\nThe master secret, however, eluded even him, as Éliphas Lévi has shrewdly noted in his History of Magic .\n\n\"The learned Jesuit, \" writes Levi, \"divined that it contained the hieroglyphic key to sacred alphabets, though he was unable to develop the explanation.\n\nIt is divided into three equal compartments; above are the twelve houses of heaven and below are the corresponding distributions of labor [work periods] throughout the year, while in the middle place are twenty-one sacred signs answering to the letters of the alphabet.\n\nIn the midst of all is a seated figure of the pantomorphic IYNX, emblem of universal being and corresponding as such to the Hebrew Yod , or to that unique letter from which all the other letters were formed.\n\nThe IYNX is encircled by the Ophite triad, answering to the Three Mother Letters of the Egyptian and Hebrew alphabets.\n\nOn the right are the Ibimorphic and Serapian triads; on the left are those of Nepthys and Hecate, representing active and passive, fixed and volatile, fructifying fire and generating water.\n\nEach pair of triads in conjunction with the center produces a septenary, and a septenary is contained in the center.\n\nThe three septenaries furnish the absolute number of the three worlds, as well as the complete number of primitive letters, to which a complementary sign is added, like zero to the nine numerals.\" Levi's hint may be construed to mean that the twenty-one figures in the center section of the Table represent the twenty-one major trumps of the Tarot cards.\n\nIf this be so, is not the zero card, cause of so much controversy, the nameless crown of the Supreme Mind, the crown being symbolized by the hidden triad in the upper part of the throne in the center of the Table?\n\nMight not the first emanation of this Supreme Mind be well symbolized by a juggler or magician with the symbols of the four lower worlds spread out on a table before him: the rod, the sword, the cup, and the coin?\n\nThus considered, the zero card belongs nowhere among the others but is in fact the fourth dimensional point from which they all emanated and consequently is broken up into the twenty-one cards (letters) which, when gathered together, produce the zero."

