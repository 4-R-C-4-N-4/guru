body = "Pythagoras here warns his followers that any who begin the search for truth and, after having learned part of the mystery, become discouraged and attempt to return again to their former ways of vice and ignorance, will suffer exceedingly; for it is better to know nothing about Divinity than to learn a little and then stop without learning all.\n\nVII.\n\nNourish a cock, but sacrifice it not; for it is sacred to the sun and moon .\n\nTwo great lessons are concealed in this aphorism.\n\nThe first is a warning against the sacrifice of living things to the gods, because life is sacred and man should not destroy it even as an offering to the Deity.\n\nThe second warns man that the human body here referred to as a cock is sacred to the sun (God) and the moon (Nature), and should be guarded and preserved as man's most precious medium of expression.\n\nPythagoras also warned his disciples against suicide.\n\nVIII.\n\nReceive not a swallow into your house .\n\nThis warns the seeker after truth not to allow drifting thoughts to come into his mind nor shiftless persons to enter into his life.\n\nHe must ever surround himself with rationally inspired thinkers and with conscientious workers.\n\nIX.\n\nOffer not your right hand easily to anyone .\n\nThis warns the disciple to keep his own counsel and not offer wisdom and knowledge (his right hand) to such as are incapable of appreciating them.\n\nThe hand here represents Truth, which raises those who have fallen because of ignorance; but as many of the unregenerate do not desire wisdom they will cut off the hand that is extended in kindness to them.\n\nTime alone can effect the redemption of the ignorant masses X.\n\nWhen rising from the bedclothes, roll them together, and obliterate the impression of the body .\n\nPythagoras directed his disciples who had awakened from the sleep of ignorance into the waking state of intelligence to eliminate from their recollection all memory of their former spiritual darkness; for a wise man in passing leaves no form behind him which others less intelligent, seeing, shall use as a mold for the casting of idols.\n\nThe most famous of the Pythagorean fragments are the Golden Verses , ascribed to Pythagoras himself, but concerning whose authorship there is an element of doubt.\n\nThe Golden Verses contain a brief summary of the entire system of philosophy forming the basis of the educational doctrines of Crotona, or, as it is more commonly known, the Italic School.\n\nThese verses open by counseling the reader to love God, venerate the great heroes, and respect the dæmons and elemental inhabitants.\n\nThey then urge man to think carefully and industriously concerning his daily life, and to prefer the treasures of the mind and soul to accumulations of earthly goods.\n\nThe verses also promise man that if he will rise above his lower material nature and cultivate self-control, he will ultimately be acceptable in the sight of the gods, be reunited with them, and partake of their immortality.\n\n(It is rather significant to note that Plato paid a great price for some of the manuscripts of Pythagoras which had been saved from the destruction of Crotona.\n\nSee Historia Deorum Fatidicorum , Geneva, 1675.) PYTHAGOREAN ASTRONOMY According to Pythagoras, the position of each body in the universe was determined by the essential dignity of that body.\n\nThe popular concept of his day was that the earth occupied the center of the solar system; that the planets, including the sun and moon, moved about the earth; and that the earth itself was flat and square.\n\nContrary to this concept, and regardless of criticism, Pythagoras declared that fire was the most important of all the elements; that the center was the most important part of every body; and that, just as Vesta's fire was in the midst of every home, so in the midst of the universe was a flaming sphere of celestial radiance."

