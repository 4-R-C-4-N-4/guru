body = "The four major divisions of the human structure--bones, muscles, nerves, and arteries--are considered to have contributed to the symbolism of the cross.\n\nThis is especially due to the fact that the spinal nerves cross at the base of the spine, and is a reminder that \"Our Lord was crucified also in Egypt.\" Man has four vehicles (or mediums) of expression by means of which the spiritual Ego contacts the external universe: the physical nature, the vital nature, the emotional nature, and the mental nature.\n\nEach of these partakes in principle of one of the primary elements, and the four creatures assigned to them by the Qabbalists caused the cross to be symbolic of the compound nature of man.\n\nTHE CRUCIFIXION--A COSMIC ALLEGORY Saviors unnumbered have died for the sins of man and by the hands of man, and through their deaths have interceded in heaven for the souls of their executioners.\n\nThe martyrdom of the God-Man and the redemption of the world through His blood has been an essential tenet of many great religions.\n\nNearly all these stories can be traced to sun worship, for the glorious orb of day is the Savior who dies annually for every creature within his universe, but year after year rises again victorious from the tomb of winter.\n\nWithout doubt the doctrine of the crucifixion is based upon the secret traditions of the Ancient Wisdom; it is a constant reminder that the divine nature of man is perpetually crucified upon the animal organism.\n\nCertain of the pagan Mysteries included in the ceremony of initiation the crucifixion of the candidate upon a cross, or the laying of his body upon a cruciform altar.\n\nIt has been claimed that Apollonius of Tyana (the Antichrist) was initiated into the Arcanum of Egypt in the Great Pyramid, where he hung upon a cross until unconscious and was then laid in the tomb (the coffer) for three days.\n\nWhile his body was unconscious, his soul was thought to pass into the realms of the immortals (the place of death) After it had vanquished death (by recognizing that life is eternal) it returned again to the body, which then rose from the coffer, after which he was hailed as a brother by the priests, who believed that he had returned from the land of the dead.\n\nThis concept was, in substance, the teaching of the Mysteries.\n\nTHE CRUCIFIED SAVIORS The list of the deathless mortals who suffered for man that he might receive the boon of eternal life is an imposing one.\n\nAmong those connected historically or allegorically with a crucifixion are Prometheus, Adonis, Apollo, Arys, Bacchus, Buddha, Christna, Horus, Indra, Ixion, Mithras, Osiris, Pythagoras, Quetzalcoatl, Semiramis, and Jupiter.\n\nAccording to the fragmentary accounts extant, all these heroes gave their lives to the service of humanity and, with one or two exceptions, died as martyrs for the cause of human progress.\n\nIn many mysterious ways the manner of their death has been designedly concealed, but it is possible that most of them were crucified upon a cross or tree.\n\nThe first friend of man, the immortal Prometheus, was crucified on the pinnacle of Mount Caucasus, and a vulture was placed over his liver to torment him throughout eternity by clawing and rending his flesh with its talons.\n\nPrometheus disobeyed the edict of Zeus by bringing fire and immortality to man, so for man he suffered until the coming of Hercules released him from his ages of torment.\n\nConcerning the crucifixion of the Persian Mithras, J.\n\nP.\n\nLundy has written: \"Dupuis tells us that Mithra was put to death by crucifixion, and rose again on the 25th of March."

