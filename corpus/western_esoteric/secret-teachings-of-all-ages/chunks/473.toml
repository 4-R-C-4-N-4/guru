body = "It is copied from Moor's Hindu Pantheon, not as a curiosity, but as a most singular monument of the crucifixion.\n\nI do not venture to give it a name, other than that of a crucifixion in space .\n\n* * * Can it be the Victim-Man, or the Priest and Victim both in one, of the Hindu mythology, who offered himself a sacrifice before the worlds were?\n\nCan it be Plato's second God who impressed himself on the universe in the form of the cross?\n\nOr is it his divine man who would be scourged, tormented, fettered, have his eyes burnt out; and lastly, having suffered all manner of evils, would be crucified ?\n\nPlato learned his theology in Egypt and the East, and must have known of the crucifixion of Krishna, Buddha, Mithra [ et al ].\n\nAt any rate, the religion of India had its mythical crucified victim long anterior to Christianity, as a type of the real one [ Pro Deo et Ecclesia !], and I am inclined to think that we have it in this remarkable plate.\" THE TAU CROSS.\n\nThe TAU Cross was the sign which the Lord told the people of Jerusalem to mark on their foreheads, as related by the Prophet Ezekiel.\n\nIt was also placed as a symbol of liberation upon those charged with crimes but acquitted.\n\n*** THE CRUX ANSATA.\n\nBoth the cross and the circle were phallic symbols, for the ancient world venerated the generative powers of Nature as being expressive of the creative attributes of the Deity.\n\nThe Crux Ansata, by combining the masculine TAU with the feminine oval, exemplified the principles of generation.\n\n*** The modern world has been misled in its attitude towards the so-called pagan deities, and has come to view them in a light entirely different from their true characters and meanings.\n\nThe ridicule and slander heaped by Christendom upon Christna and Bacchus are excellent examples of the persecution of immortal principles by those who have utterly failed to sense the secret meaning of the allegories.\n\nWho was the crucified man of Greece, concerning whom vague rumors have been afloat?\n\nHiggins thinks it was Pythagoras, the true story of whose death was suppressed by early Christian authors because it conflicted with their teachings.\n\nWas it true also that the Roman legionaries carried on the field of battle standards upon which were crosses bearing the crucified Sun Man?\n\nAPOLLONIUS OF TYANA.\n\nFrom Historia Deorum Fatidicorum.\n\nConcerning Apollonius and his remarkable Powers, Francis Barrett, in his Biographia Antiqua, after describing how Apollonius quelled a riot without speaking a word, continues: \"He traveled much, professed himself a legislator; understood all languages, without having learned them; he had the surprising faculty of knowing what was transacted at an immense distance, and at the time the Emperor Domitian was stabbed, Apollonius being at a vast distance and standing in the market-place of the city, exclaimed, 'Strike!\n\nstrike!--'tis time, the tyrant is no more.' He understood the language of birds; he condemned dancing and other diversions of that sort.\n\nhe recommended charity and piety; he traveled over almost all the countries of the world; and he died at a very great age.\" *** THE CRUCIFIXION OF QUETZALCOATL One of the most remarkable of the crucified World Saviors is the Central American god of the winds, or the Sun, Quetzalcoatl, concerning whose activities great secrecy was maintained by the Indian priests of Mexico and Central America.\n\nThis strange immortal, whose name means feathered snake , appears to have come out of the sea, bringing with him a mysterious cross.\n\nOn his garments were embellished clouds and red crosses."

