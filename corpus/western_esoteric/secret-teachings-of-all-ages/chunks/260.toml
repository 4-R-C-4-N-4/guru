body = "By this it is not meant that they themselves are of such disposition, but rather that they have special control over elements of similar consistency.\n\nThe gnomes marry and have families, and the female gnomes are called gnomides .\n\nSome wear clothing woven of the element in which they live.\n\nIn other instances their garments are part of themselves and grow with them, like the fur of animals.\n\nThe gnomes are said to have insatiable appetites, and to spend a great part of the rime eating, but they earn their food by diligent and conscientious labor.\n\nMost of them are of a miserly temperament, fond of storing things away in secret places.\n\nThere is abundant evidence of the fact that small children often see the gnomes, inasmuch as their contact with the material side of Nature is not yet complete and they still function more or less consciously in the invisible worlds.\n\nAccording to Paracelsus, \"Man lives in the exterior elements and the Elementals live in the interior elements.\n\nThe latter have dwellings and clothing, manners and customs, languages and governments of their own, in the same sense as the bees have their queens and herds of animals their leaders.\" ( Philosophia Occulta , translated by Franz Hartmann.) Paracelsus differs somewhat from the Greek mystics concerning the environmental limitations imposed on the Nature spirits.\n\nThe Swiss philosopher constitutes them of subtle invisible ethers.\n\nAccording to this hypothesis they would be visible only at certain times and only to those en rapport with their ethereal vibrations.\n\nThe Greeks, on the other hand, apparently believed that many Nature spirits had material constitutions capable of functioning in the physical world.\n\nOften the recollection of a dream is so vivid that, upon awakening, a person actually believes that he has passed through a physical experience.\n\nThe difficulty of accurately judging as to the end of physical sight and the beginning of ethereal vision may account for these differences of opinion.\n\nCONVENTIONAL GNOMES.\n\nFrom Gjellerup's Den Ældre Eddas Gudesange.\n\nThe type of gnome most frequently seen is the brownie, or elf, a mischievous and grotesque little creature from twelve to eighteen inches high, usually dressed in green or russet brown.\n\nMost of them appear as very aged, often with long white beards, and their figures are inclined to rotundity.\n\nThey can be seen scampering out of holes in the stumps of trees and sometimes they vanish by actually dissolving into the tree itself.\n\n*** Even this explanation, however, does not satisfactorily account for the satyr which, according to St.\n\nJerome, was captured alive during the reign of Constantine and exhibited to the people.\n\nIt was of human form with the horns and feet of a goat.\n\nAfter its death it was preserved in salt and taken to the Emperor that he might testify to its reality.\n\n(It is within the bounds of probability that this curiosity was what modern science knows as a monstrosity .) THE UNDINES As the gnomes were limited in their function to the elements of the earth, so the undines (a name given to the family of water elementals) function in the invisible, spiritual essence called humid (or liquid) ether.\n\nIn its vibratory rate this is close to the element water, and so the undines are able to control, to a great degree, the course and function of this fluid in Nature.\n\nBeauty seems to be the keynote of the water spirits.\n\nWherever we find them pictured in art or sculpture, they abound in symmetry and grace.\n\nControlling the water element--which has always been a feminine symbol--it is natural that the water spirits should most often be symbolized as female.\n\nThere are many groups of undines."

