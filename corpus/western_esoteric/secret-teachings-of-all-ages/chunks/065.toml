body = "From Kircher's Œdipus Ægyptiacus.\n\nThe great Pan was celebrated as the author and director of the sacred dances which he is supposed to have instituted to symbolize the circumambulations of the heavenly bodies.\n\nPan was a composite creature, the upper part--with the exception of his horns--being human, and the lower part in the form of a goat.\n\nPan is the prototype of natural energy and, while undoubtedly a phallic deity, should nor be confused with Priapus.\n\nThe pipes of Pan signify the natural harmony of the spheres, and the god himself is a symbol of Saturn because this planet is enthroned in Capricorn, whose emblem is a goat.\n\nThe Egyptians were initiated into the Mysteries of Pan, who was regarded as a phase of Jupiter, the Demiurgus.\n\nPan represented the impregnating power of the sun and was the chief of a horde rustic deities, and satyrs.\n\nHe also signified the controlling spirit of the lower worlds.\n\nThe fabricated a story to the effect that at the time of the birth of Christ the oracles were silenced after giving utterance to one last cry, \"Great Pan is dead!\" *** The Mysteries of Atys included a sacramental meal during which the neophyte ate out of a drum and drank from a cymbal.\n\nAfter being baptized by the blood of a bull, the new initiate was fed entirely on milk to symbolize that he was still a philosophical infant, having but recently been born out of the sphere of materiality.\n\n(See Frazer's The Golden Bough .) Is there a possible connection between this lacteal diet prescribed by the Attic rite and St.\n\nPaul's allusion to the food for spiritual babes?\n\nSallust gives a key to the esoteric interpretation of the Attic rituals.\n\nCybele, the Great Mother, signifies the vivifying powers of the universe, and Atys that aspect of the spiritual intellect which is suspended between the divine and animal spheres.\n\nThe Mother of the gods, loving Atys, gave him a starry hat, signifying celestial powers, but Atys (mankind), falling in love with a nymph (symbolic of the lower animal propensities), forfeited his divinity and lost his creative powers.\n\nIt is thus evident that Atys represents the human consciousness and that his Mysteries are concerned with the reattainment of the starry hat.\n\n(See Sallust on the Gods and the World .) The rites of Sabazius were very similar to those of Bacchus and it is generally believed that the two deities are identical.\n\nBacchus was born at Sabazius, or Sabaoth, and these names are frequently assigned to him.\n\nThe Sabazian Mysteries were performed at night, and the ritual included the drawing of a live snake across the breast of the candidate.\n\nClement of Alexandria writes: \"The token of the Sabazian Mysteries to the initiated is 'the deity gliding over the breast.'\" A golden serpent was the symbol of Sabazius because this deity represented the annual renovation of the world by the solar power.\n\nThe Jews borrowed the name Sabaoth from these Mysteries and adopted it as one of the appellations of their supreme God.\n\nDuring the time the Sabazian Mysteries were celebrated in Rome, the cult gained many votaries and later influenced the symbolism of Christianity.\n\nThe Cabiric Mysteries of Samothrace were renowned among the ancients, being next to the Eleusinian in public esteem.\n\nHerodotus declares that the Samothracians received their doctrines, especially those concerning Mercury, from the Pelasgians.\n\nLittle is known concerning the Cabiric rituals, for they were enshrouded in the profoundest secrecy."

