[content]
body = "(Consult Theon of Smyrna for the Pythagorean doctrine of opposites.) The numbers 1 to 10 rule every creature, and the numbers, in turn, are under the control of the Monad, or 1--the Eldest among them.\n\nWith the trident scepter of Poseidon these kings held sway over the inhabitants of the seven small and three great islands comprising Atlantis.\n\nPhilosophically, the ten islands symbolize the triune powers of the Superior Deity and the seven regents who bow before His eternal throne.\n\nIf Atlantis be considered as the archetypal sphere, then its immersion signifies the descent of rational, organized consciousness into the illusionary, impermanent realm of irrational, mortal ignorance.\n\nBoth the sinking of Atlantis and the Biblical story of the \"fall of man\" signify spiritual involution--a prerequisite to conscious evolution.\n\nEither the initiated Plato used the Atlantis allegory to achieve two widely different ends or else the accounts preserved by the Egyptian priests were tampered with to perpetuate the secret doctrine.\n\nThis does not mean to imply that Atlantis is purely mythological, but it overcomes the most serious obstacle to acceptance of the Atlantis theory, namely, the fantastic accounts of its origin, size, appearance, and date of destruction--9600 B.C.\n\nIn the midst of the central island of Atlantis was a lofty mountain which cast a shadow five thousand stadia in extent and whose summit touched the sphere of æther .\n\nThis is the axle mountain of the world, sacred among many races and symbolic of the human head, which rises out of the four elements of the body.\n\nThis sacred mountain, upon whose summit stood the temple of the gods, gave rise to the stories of Olympus, Meru, and Asgard.\n\nThe City of the Golden Gates--the capital of Atlantis--is the one now preserved among numerous religions as the City of the Gods or the Holy City .\n\nHere is the archetype of the New Jerusalem, with its streets paved with gold and its twelve gates shining with precious stones.\n\n\"The history of Atlantis,\" writes Ignatius Donnelly, \"is the key of the Greek mythology.\n\nThere can be no question that these gods of Greece were human beings.\n\nThe tendency to attach divine attributes to great earthly rulers is one deeply implanted in human nature.\" (See Atlantis .) The same author sustains his views by noting that the deities of the Greek pantheon were nor looked upon as creators of the universe but rather as regents set over it by its more ancient original fabricators.\n\nThe Garden of Eden from which humanity was driven by a flaming sword is perhaps an allusion to the earthly paradise supposedly located west of the Pillars of Hercules and destroyed by volcanic cataclysms.\n\nThe Deluge legend may be traced also to the Atlantean inundation, during which a \"world\" was destroyed by water., Was the religious, philosophic, and scientific knowledge possessed by the priestcrafts of antiquity secured from Atlantis, whose submergence obliterated every vestige of its part in the drama of world progress?\n\nAtlantean sun worship has been perpetuated in the ritualism and ceremonialism of both Christianity and pagandom.\n\nBoth the cross and the serpent were Atlantean emblems of divine wisdom.\n\nThe divine (Atlantean) progenitors of the Mayas and Quichés of Central America coexisted within the green and azure radiance of Gucumatz, the \"plumed\" serpent.\n\nThe six sky-born sages came into manifestation as centers of light bound together or synthesized by the seventh--and chief--of their order, the \"feathered\" snake.\n\n(See the Popol Vuh .) The title of \"winged\" or \"plumed\" snake was applied to Quetzalcoatl, or Kukulcan, the Central American initiate."

