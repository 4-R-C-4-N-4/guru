[content]
body = "Did he feel the spreading wings of the phœnix within himself and did he believe the hope of the world had taken flesh in him?\n\nThe eagle on his standard may well have been the phœnix.\n\nThis would explain why he was moved to believe himself predestined to establish the kingdom of Christ on earth and is, perhaps, the clue to his little-understood friendliness toward the Moslem."

