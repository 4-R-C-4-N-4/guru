body = "The sacred emblem of the ancient initiates, here composed of 13 stars,, also appears above the head of the \"eagle.\" The motto, E Pluribus Unum, contains 13 letters, as does also the inscription, Annuit Cœptis.\n\nThe \"eagle\" clutches in its right talon a branch bearing 13 leaves and 13 berries and in its left a sheaf of 13 arrows.\n\nThe face of the pyramid, exclusive of the panel containing the date, consists of 72 stones arranged in 13 rows.\n\n*** The eagles of Napoleon and Cæsar and the zodiacal eagle of Scorpio are really phœnixes, for the latter bird--not the eagle--is the symbol of spiritual victory and achievement.\n\nMasonry will be in a position to solve many of the secrets of its esoteric doctrine when it realizes that both its single- and double-headed eagles are phœnixes, and that to all initiates and philosophers the phœnix is the symbol of the transmutation and regeneration of the creative energy--commonly called the accomplishment of the Great Work.\n\nThe double-headed phœnix is the prototype of an androgynous man, for according to the secret teachings there will come a time when the human body will have two spinal cords, by means of which vibratory equilibrium will be maintained in the body.\n\nNot only were many of the founders of the United States Government Masons, but they received aid from a secret and august body existing in Europe, which helped them to establish this country for a peculiar and particular purpose known only to the initiated few.\n\nThe Great Seal is the signature of this exalted body--unseen and for the most part unknown--and the unfinished pyramid upon its reverse side is a trestleboard setting forth symbolically the task to the accomplishment of which the United States Government was dedicated from the day of its inception.\n\nANIMALS The lion is the king of the animal family and, like the head of each kingdom, is sacred to the sun, whose rays are symbolized by the lion's shaggy mane.\n\nThe allegories perpetuated by the Mysteries (such as the one to the effect that the lion opens the secret book) signify that the solar power opens the seed pods, releasing the spiritual life within.\n\nThere was also a curious belief among the ancients that the lion sleeps with his eyes open, and for this reason the animal was chosen as a symbol of vigilance.\n\nThe figure of a lion placed on either side of doors and gateways is an emblem of divine guardianship.\n\nKing Solomon was often symbolized as a lion.\n\nFor ages the feline family has been regarded with peculiar veneration.\n\nIn several of the Mysteries--most notably the Egyptian--the priests wore the skins of lions, tigers, panthers, pumas, or leopards.\n\nHercules and Samson (both solar symbols) slew the lion of the constellation of Leo and robed themselves in his skin, thus signifying that they represented the sun itself when at the summit of the celestial arch.\n\nAt Bubastis in Egypt was the temple of the famous goddess Bast, the cat deity of the Ptolemies.\n\nThe Egyptians paid homage to the cat, especially when its fur was of three shades or its eyes of different colors.\n\nTo the priests the cat was symbolic of the magnetic forces of Nature, and they surrounded themselves with these animals for the sake of the astral fire which emanated from their bodies.\n\nThe cat was also a symbol of eternity, for when it sleeps it curls up into a ball with its head and tail touching.\n\nAmong the Greeks and Latins the cat was sacred to the goddess Diana.\n\nThe Buddhists of India invested the cat with special significance, but for a different reason."

