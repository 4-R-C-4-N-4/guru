[content]
body = "It is not improbable that this mysterious figure standing over the primitive altars was made in the nature of a manikin and, like certain emblematic hands in the Mystery schools, was covered with either carved or painted hieroglyphs.\n\nThe statue may have opened, thus showing the relative positions of the organs, bones, muscles, nerves, and other parts.\n\nAfter ages of research, the manikin became a mass of intricate hieroglyphs and symbolic figures.\n\nEvery part had its secret meaning.\n\nThe measurements formed a basic standard by means of which it was possible to measure all parts of cosmos.\n\nIt was a glorious composite emblem of all the knowledge possessed by the sages and hierophants.\n\nThen came the age of idolatry.\n\nThe Mysteries decayed from within.\n\nThe secrets were lost and none knew the identity of the mysterious man who stood over the altar.\n\nIt was remembered only that the figure was a sacred and glorious symbol of the Universal Power, and it: finally came to be looked upon as a god--the One in whose image man was made.\n\nHaving lost the knowledge of the purpose for which the manikin was originally constructed, the priests worshiped this effigy until at last their lack of spiritual understanding brought the temple down in ruins about their heads and the statue crumbled with the civilization that had forgotten its meaning.\n\nProceeding from this assumption of the first theologians that man is actually fashioned in the image of God, the initiated minds of past ages erected the stupendous structure of theology upon the foundation of the human body.\n\nThe religious world of today is almost totally ignorant of the fact that the science of biology is the fountainhead of its doctrines and tenets.\n\nMany of the codes and laws believed by modern divines to have been direct revelations from Divinity are in reality the fruitage of ages of patient delving into the intricacies of the human constitution and the infinite wonders revealed by such a study.\n\nIn nearly all the sacred books of the world can be traced an anatomical analogy.\n\nThis is most evident in their creation myths.\n\nAnyone familiar with embryology and obstetrics will have no difficulty in recognizing the basis of the allegory concerning Adam and Eve and the Garden of Eden, the nine degrees of the Eleusinian Mysteries, and the Brahmanic legend of Vishnu's incarnations.\n\nThe story of the Universal Egg, the Scandinavian myth of Ginnungagap (the dark cleft in space in which the seed of the world is sown), and the use of the fish as the emblem of the paternal generative power--all show the true origin of theological speculation.\n\nThe philosophers of antiquity realized that man himself was the key to the riddle of life, for he was the living image of the Divine Plan, and in future ages humanity also will come to realize more fully the solemn import of those ancient words: \"The proper study of mankind is man.\" Both God and man have a twofold constitution, of which the superior part is invisible and the inferior visible.\n\nIn both there is also an intermediary sphere, marking the point where these visible and invisible natures meet.\n\nAs the spiritual nature of God controls His objective universal form-which is actually a crystallized idea--so the spiritual nature of man is the invisible cause and controlling power of his visible material personality.\n\nThus it is evident that the spirit of man bears the same relationship to his material body that God bears to the objective universe.\n\nThe Mysteries taught that spirit, or life, was anterior to form and that what is anterior includes all that is posterior to itself.\n\nSpirit being anterior to form, form is therefore included within the realm of spirit.\n\nIt is also a popular statement or belief that man's spirit is within his body.\n\nAccording to the conclusions of philosophy and theology, however, this belief is erroneous, for spirit first circumscribes an area and then manifests within it."

