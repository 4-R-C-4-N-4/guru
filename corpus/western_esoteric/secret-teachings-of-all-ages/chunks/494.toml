[content]
body = "Those who sincerely believe the harem to be irreconcilable with spirituality should with consistency move for the expurgation of the Psalms of David and the Proverbs of Solomon from the list of inspired writings, for the harem of Islam's Prophet was insignificant compared with that maintained by Israel's wisest king and the reputed favorite of the Most High!\n\nThe popular conception that Mohammed taught that woman had no soul and could attain heaven only through marriage is not substantiated by the words and attitude of the Prophet during his lifetime.\n\nIn a paper entitled The Influence of Islam on Social Conditions , read at the World's Parliament of Religions held in Chicago, in 1893, Mohammed Webb states the charge and answers it thus: \"it has been said that Mohammed and the Koran denied a soul to woman and ranked her with the animals.\n\nThe Koran places her on a perfect and complete equality with man, and the Prophet's teachings often place her in a position superior to the male in some respects.\" Mr.\n\nWebb justifies his stand by quoting from the thirty-fifth verse of the thirty-third sura of the Koran: \"Verily the Moslems of either sex, and the true believers of either sex, and the devout men, and the devout women, and the men of veracity, and the women of veracity, and the patient men, and the patient women, and the humble men, and the humble women, and the alms-givers of either sex, and the men who fast, and the women who fast, and the chaste men, and the chaste women, and those of either sex who remember Allah frequently: for them hath Allah prepared forgiveness and a great reward.\" Here the attainment of heaven is clearly set forth as a problem whose only solution is that of individual merit.\n\nOn the day of his death Mohammed told Fatima, his beloved daughter, and Safiya, his aunt: \"Work ye out that which shall gain acceptance for you with the Lord: for I verily have no power with Him to save you in any wise.\" The Prophet did not advise either woman to rely upon the virtues of her husband nor in any manner did he indicate woman's salvation to be dependent upon the human frailty of her spouse.\n\nEverything to the contrary notwithstanding, Mohammed is not responsible for the contradictions and inconsistencies in the Koran, for the volume was not compiled and did not assume its present form until over twenty years after his death.\n\nIn its present state the Koran is, for the major part, a jumble of hearsay through which occasionally shines forth an example of true inspiration.\n\nFrom what is known of the man Mohammed, it is reasonable to suppose that these nobler and finer portions represent the actual doctrines of the Prophet; the remainder are obvious interpolations, some arising from misunderstanding and others direct forgeries calculated to satisfy the temporal ambitions of conquering Islam.\n\nOn this subject, Godfrey Higgins speaks with his usual perspicacity: \"Here we have the Koran of Mohammed and the first four sincere and zealous patriarchs, and the Koran of the conquering and magnificent Saracens--puffed up with pride and vanity.\n\nThe Koran of the eclectic philosopher was not likely to suit the conquerors of Asia.\n\nA new one must be grafted on the old, to find a justification for their enormities.\" (See Anacalypsis .) To the discerning few it is evident that Mohammed had a knowledge of that secret doctrine which must needs constitute the core of every great philosophical, religious, or ethical institution."

