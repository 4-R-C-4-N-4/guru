body = "Figure 59 represents this solar system, with W and X as the locality of the Garden of Eden.\n\nTable VII, Figures 1-5, 7 and 8 *** TABLE VII, Figures 1-5, 7, 8 .\n\n(Table VIII has Figure 6.) Figure 1 is the triune divine sulphur, the All-Perfect out of the All-Perfect, the Soul of creatures.\n\nThe threefold Divine One is symbolized by three interlaced circles designated alchemically salt , sulphur , and mercury .\n\nIn the central triangle is the divine name Ehieh .\n\nGeist means spirit.\n\nThe other words require no translation.\n\nFigure 2 is common destructive sulphur.\n\nA bar placed in the triangle makes it the character of earth.\n\nFigure 3 is true oil of vitriol, composed of a circle with two diameters and two reversed half-circles hanging below.\n\nIn this are hidden the characters of all metals.\n\nTin is symbolized by Figure 4 and iron by Figure 5.\n\nFigure 7 is the solar system according to Copernicus.\n\nFigure 8 is the last judgment.\n\nThe sun is removed from the center of the solar system and replaced by the earth.\n\nThis changes the respective positions of all the other planets except Mars, Jupiter, and Saturn, which retain their respective circles.\n\nThe letter a signifies the circle of the sun; b , that of Mercury; c , that of Venus; d , (sic) that of the moon; and E , that of the earth.\n\nInward from the sphere h are the great circles of damnation.\n\nTable VIII, Figure 6.\n\n*** TABLE VIII., Figure 6 .\n\nIn Figure 6 the letter a marks the center of eternity.\n\nThe motion of the rays toward b , d , and c was the first divine manifestation and is symbolized by the equilateral triangle, b , d , c .\n\nThe eternal world within the inner circle became manifest in the water (salt), the light (mercury), and the fire (sulphur) of the archetypal world, represented by the three circles ( f , e , g ) within the triangle of complete equality ( h , i , k ), which is in turn surrounded by the circle of the high throne.\n\nThe circle f is named understanding ; e , wisdom ; g , reason .\n\nIn circle i is the word Father ; in circle h , Son ; in circle k , Spirit .\n\nThe seven outer circles are the seven spirits before the throne.\n\nThe lower part of the figure is similar to Figures 53 and 54.\n\nThe outer circles are the angelic world ending in the cognizable world of the Sons of God.\n\nThen comes the circle of the visible constellations and fixed stars; within this is the solar system with the sun as the center ( l ).\n\nUngrund means the Abyss.\n\nTable X, Figures 10-15.\n\n*** TABLE IX, Figure 9 .\n\nFigure 9 is a synthesis of the Old and New Testaments and represents the interblending planes of being.\n\nIn the right margin the seven outer circles contain the names of the planetary angels.\n\nThe words in the graduated circles from the top triangle downward read: (1) Abyss of Compassion ; (2) Zion ; (3) The New Heaven and the New Earth ; (4) The New Jerusalem ; (5) Paradise ; (6) The Bosom of Abraham ; (7) The Outer Courts of the Lord .\n\nFrom below the circles of darkness reach upward, each divine principle being opposed by an infernal opposite.\n\nThe small circle on the left containing a triangle and cross is named The Tree of Life , and that on the right The Tree of the Knowledge of Good and Evil .\n\nIn the center of the diagram is the Trinity, joined with the superior and inferior planes by lines of activity.\n\nTABLE X, Figures 10-15 ."

