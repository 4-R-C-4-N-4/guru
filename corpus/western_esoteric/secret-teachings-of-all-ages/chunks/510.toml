[content]
body = "DID that divine knowledge which constituted the supreme possession of the pagan priestcrafts survive the destruction of their temples?\n\nIs it yet accessible to mankind, or does it lie buried beneath the rubbish of ages, entombed within the very sanctuaries that were once illuminated by its splendor?\n\n\"In Egypt,\" writes Origen, \"the philosophers have a sublime and secret knowledge respecting the nature of God.\n\nWhat did Julian imply when he spoke of the secret initiations into the sacred Mysteries of the Seven-Rayed God who lifted souls to salvation through His own nature?\n\nWho were the blessed theurgists who understood them profundities concerning which Julian dared not speak?\n\nIf this inner doctrine were always concealed from the masses, for whom a simpler code had been devised, is it not highly probable that the exponents of every aspect of modern civilization--philosophic, ethical, religious, and scientific-are ignorant of the true meaning of the very theories and tenets on which their beliefs are founded?\n\nDo the arts and sciences that the race has inherited from older nations conceal beneath their fair exterior a mystery so great that only the most illumined intellect can grasp its import?\n\nSuch is undoubtedly the case .\n\nAlbert Pike, who has gathered ample evidence of the excellence of the doctrines promulgated by the Mysteries, supports his assertions by quoting from the writings of Clement of Alexandria, Plato, Epictetus, Proclus, Aristophanes, and Cicero, all of whom unite in lauding the high ideals of these institutions.\n\nFrom the unqualified testimony of such reputable authorities no reasonable doubt can exist that the initiates of Greece, Egypt, and other ancient countries possessed the correct solution to those great cultural, intellectual, moral, and social problems which in an unsolved state confront the humanity of the twentieth century.\n\nThe reader must not interpret this statement to mean that antiquity had foreseen and analyzed every complexity of this generation, but rather that the Mysteries had evolved a method whereby the mind was so trained in the fundamental verities of life that it was able to cope intelligently with any emergency which might arise.\n\nThus the reasoning faculties were organized by a simple process of mental culture, for it was asserted that where reason reigns supreme, inconsistency cannot exist.\n\nWisdom, it was maintained, lifts man to the condition of Godhood, a fact which explains the enigmatical statement that the Mysteries transformed \"roaring beasts into divinities.\" The preeminence of any philosophical system can be determined only by the excellence of its products.\n\nThe Mysteries have demonstrated the superiority of their culture by giving to the world minds of such overwhelming greatness, souls of such beatific vision, and lives of such outstanding impeccability that even after the lapse of ages the teachings of these individuals constitute the present spiritual, intellectual, and ethical standards of the race.\n\nThe initiates of the various Mystery schools of past ages form a veritable golden chain of supermen and superwomen connecting heaven and earth.\n\nThey are the links of that Homeric \"golden chain\" with which Zeus boasted he could bind the several parts of the universe to the pinnacle of Olympus.\n\nThe sons and daughters of Isis are indeed an illustrious line--founders of sciences and philosophies, patrons of arts and crafts, supporting by the transcendency of their divinely given power the structures of world religions erected to do them homage.\n\nFounders of doctrines which have molded the lives of uncounted generations, these Initiate-Teachers bear witness to that spiritual culture which has always existed--and always will exist--as a divine institution in the world of men.\n\nThose who represent an ideal beyond the comprehension of the masses must face the persecution of the unthinking multitude who are without that divine idealism which inspires progress and those rational faculties which unerringly sift truth from falsehood.\n\nThe lot of the Initiate-Teacher is therefore almost invariably an unhappy one."

