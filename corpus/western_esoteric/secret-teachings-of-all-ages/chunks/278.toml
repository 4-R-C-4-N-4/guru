body = "Moses, who was learned in all the wisdom of Egypt, was first initiated into it in the land of his birth, but became most proficient in it during his wanderings in the wilderness, when he not only devoted to it the leisure hours of the whole forty years, but received lessons in it from one of the angels.\n\n* * * Moses also initiated the seventy Elders into the secrets of this doctrine and they again transmitted them from hand to hand.\n\nOf all who formed the unbroken line of tradition, David and Solomon were most initiated into the Kabbalah.\" (See The Kabbalah .) According to Éliphas Lévi, the three greatest books of Qabbalism are the Sepher Yetzirah , The Book of Formation; the Sepher ha Zohar , The Book of Splendor; and the Apocalypse , The Book of Revelation.\n\nThe dates of the writing of these books are by no means thoroughly established.\n\nQabbalists declare that the Sepher Yetzirah was written by Abraham.\n\nAlthough it is by far the oldest of the Qabbalistic books, it was probably from the pen of the Rabbi Akiba, A.D.\n\n120.\n\nThe Sepher ha Zohar presumably was written by Simeon ben Jochai, a disciple of Akiba.\n\nRabbi Simeon was sentenced to death about A.D.\n\n161 by Lucius Verus, co-regent of the Emperor Marc Aurelius Antoninus.\n\nHe escaped with his son and, hiding in a cave, transcribed the manuscript of the Zohar with the assistance of Elias, who appeared to them at intervals.\n\nSimeon was twelve years in the cave, during which time he evolved the complicated symbolism of the \"Greater Face\" and the \"Lesser Face.\" While discoursing with disciples Rabbi Simeon expired, and the \"Lamp of Israel\" was extinguished.\n\nHis death and burial were accompanied by many supernatural phenomena.\n\nThe legend goes on to relate that the secret doctrines of Qabbalism had been in existence since the beginning of the world, but that Rabbi Simeon was the first man permitted to reduce them to writing.\n\nTwelve hundred years later the books which he had compiled were discovered and published for the benefit of humanity by Moses de León.\n\nThe probability is that Moses de León himself compiled the Zohar about A.D.\n\n1305, drawing his material from the unwritten secrets of earlier Jewish mystics.\n\nThe Apocalypse , accredited to St.\n\nJohn the Divine, is also of uncertain date, and the identity of its author has never been satisfactorily proved.\n\nBecause of its brevity and because it is the key to Qabbalistic thought, the Sepher Yetzirah is reproduced in full in this chapter.\n\nSo far as is known, the Sepher ha Zohar has never been completely translated into English, but it can be obtained in French.\n\n(S.\n\nL.\n\nMacGregor-Mathers translated three books of the Zohar into English.) The Zohar contains a vast number of philosophical tenets, and a paraphrase of its salient points is embodied in this work.\n\nFew realize the influence exerted by Qabbalism over medieval thought, both Christian and Jewish.\n\nIt taught that there existed within the sacred writings a hidden doctrine which was the key to those writings.\n\nThis is symbolized by the crossed keys upon the papal crest.\n\nScores of learned minds began to search for those arcane truths by which the race should be redeemed; and that their labor was not without its reward, their subsequent writings have demonstrated.\n\nThe theories of Qabbalism are inextricably interwoven with the tenets of alchemy, Hermeticism, Rosicrucianism, and Freemasonry.\n\nTHE SEVENTY-TWO NAMES OF GOD.\n\nFrom Kircher's Œdipus Ægyptiacus."

