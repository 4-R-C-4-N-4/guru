body = "It is sacred to Astarte, Cybele, Isis, Venus, Juno, Mylitta, and Aphrodite.\n\nOn account of its gentleness and devotion to its young, the dove was looked upon as the embodiment of the maternal instinct.\n\nThe dove is also an emblem of wisdom, for it represents the power and order by which the lower worlds are maintained.\n\nIt has long been accepted as a messenger of the divine will, and signifies the activity of God.\n\nThe name dove has been given to oracles and to prophets.\n\n\"The true name of the dove was Ionah or Iönas ; it was a very sacred emblem, and atone time almost universally received; it was adopted by the Hebrews; and the mystic Dove was regarded as a symbol from the days of Noah by all those who were of the Church of God.\n\nThe prophet sent to Ninevah as God's messenger was called Jonah or the Dove; our Lord's forerunner, the Baptist, was called in Greek by the name of Ioannes; and so was the Apostle of Love, the author Of the fourth Gospel and of the Apocalypse, named Ioannes.\" (Bryant's Analysis of Ancient Mythology .) In Masonry the dove is the symbol of purity and innocence.\n\nIt is significant that in the pagan Mysteries the dove of Venus was crucified upon the four spokes of a great wheel, thus foreshadowing the mystery of the crucified Lord of Love.\n\nAlthough Mohammed drove the doves from the temple at Mecca, occasionally he is depicted with a dove sitting upon his shoulder as the symbol of divine inspiration.\n\nIn ancient times the effigies of doves were placed upon the heads of scepters to signify that those bearing them were overshadowed by divine prerogative.\n\nIn medieval art, the dove frequently was pictured as an emblem of divine benediction.\n\nTHE PHŒNIX Clement, one of the ante-Nicæan Fathers, describes, in the first century after Christ, the peculiar nature and habits of the phœnix, in this wise: \"There is a certain bird which is called a Phœnix.\n\nThis is the only one of its kind and lives five hundred years.\n\nAnd when the time of its dissolution draws near that it must die, it builds itself a nest of frankincense, and myrrh, and other spices, into which, when the time is fulfilled, it enters and dies.\n\nBut as the flesh decays a certain kind of worm is produced, which, being nourished by the juices of the dead bird, brings forth feathers.\n\nThen, when it has acquired strength, it takes up that nest in which are the bones of its parent, and bearing these it passes from the land of Arabia into Egypt, to the city called Heliopolis.\n\nAnd, in open day, flying in the sight of all men, it places them on the altar of the sun, and having done this, hastens back to its former abode.\n\nThe priests then inspect the registers of the dates, and find that it has returned exactly as the five hundredth year was completed.\" THE PHŒNIX ON ITS NEST OF FLAMES.\n\nFrom Lycosthenes' Prodigiorum, ac Ostentorum Chronicon.\n\nThe phœnix is the most celebrated of all the symbolic creatures fabricated by the ancient Mysteries for the purpose of concealing the great truths of esoteric philosophy.\n\nThough modern scholars of natural history declare the existence of the phœnix to be purely mythical, Pliny describes the capture of one of these birds and it exhibition in the Roman Forum during the reign of the Emperor Claudius."

