body = "Single books were lent by other persons and organizations, to whom thanks are also given.\n\nThe matter of translation was the greatest single task in the research work incident to the preparation of this volume.\n\nThe necessary German translations, which required nearly three years, were generously undertaken by Mr.\n\nAlfred Beri, who declined all remuneration for his labor.\n\nThe Latin, Italian, French, and Spanish translations were made by Prof.\n\nHomer P.\n\nEarle.\n\nThe Hebrew text was edited by Rabbi Jacob M.\n\nAlkow.\n\nMiscellaneous short translations and checking also were done by various individuals.\n\nThe editorial work was under the supervision of Dr.\n\nC.\n\nB.\n\nRowlingson, through whose able efforts literary order was often brought out of literary chaos.\n\nSpecial recognition is also due the services rendered by Mr.\n\nRobert B.\n\nTummonds, of the staff of H.\n\nS.\n\nCrocker Company, Inc., to whom were assigned the technical difficulties of fitting the text matter into its allotted space.\n\nFor much of the literary charm of the work I am also indebted to Mr.\n\nM.\n\nM.\n\nSaxton, to whom the entire manuscript was first dictated and to whom was also entrusted the preparation of the index.\n\nThe splendid efforts of Mr.\n\nJ.\n\nAugustus Knapp, the illustrator, have resulted in a series of color plates which add materially to the beauty and completeness of the work.\n\nQ The printing of the book was in the hands of Mr.\n\nFrederick E.\n\nKeast, of H.\n\nS.\n\nCrocker Company, Inc., whose great personal interest in the volume has been manifested by an untiring effort to improve the quality thereof Through the gracious cooperation of Dr.\n\nJohn Henry Nash, the foremost designer of printing on the American Continent, the book appears in a unique and appropriate form, embodying the finest elements of the printer's craft.\n\nAn increase in the number of plates and also a finer quality of workmanship than was first contemplated have been made possible by Mr.\n\nC.\n\nE.\n\nBenson, of the Los Angeles Engraving Company, who entered heart and soul into the production of this volume.\n\nThe pre-publication sale of this book has been without known precedent in book history.\n\nThe subscription list for the first edition of 550 copies was entirely closed a year before the manuscript was placed in the printer's hands.\n\nThe second, or King Solomon, edition, consisting of 550 copies, and the third, or Theosophical, edition, consisting of 200 copies, were sold before the finished volume was received from the printer.\n\nFor so ambitious a production, this constitutes a unique achievement.\n\nThe credit for this extraordinary sales program belongs to Mrs.\n\nMaud F.\n\nGaligher, who had as her ideal not to sell the book in the commercial sense of the word but to place it in the hands of those particularly interested in the subject matter it contains.\n\nValuable assistance in this respect was also rendered by numerous friends who had attended my lectures and who without compensation undertook and successfully accomplished the distribution of the book.\n\nIn conclusion, the author wishes to acknowledge gratefully his indebtedness to each one of the hundreds of subscribers through whose advance payments the publication of this folio was made possible.\n\nTo undertake the enormous expense involved was entirely beyond his individual means and those who invested in the volume had no assurance of its production and no security other than their faith in the integrity of the writer.\n\nI sincerely hope that each reader will profit from the perusal of this book, even as I have profited from the writing of it.\n\nThe years of labor and thought expended upon it have meant much to me.\n\nThe research work discovered to me many great truths; the writing of it discovered to me the laws of order and patience; the printing of it discovered to me new wonders of the arts and crafts; and the whole enterprise has discovered to me a multitude of friends whom otherwise I might never have known."

