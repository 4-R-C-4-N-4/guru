body = "The focal point, D to E , between the three higher and the three lower spheres, is called \"The Reservoir.\" It receives impressions from both the superior and the inferior regions and is common to both.\n\nFigure 2 is the Qabbalistic symbol of elemental water; Figure 9 represents the spiritual invisible water.\n\nFigure 3 is the Qabbalistic symbol of elemental air; Figure 7 represents the spiritual and invisible air.\n\nFigure 4 is the Qabbalistic sign of the elemental earth; Figure 8 represents the spiritual and invisible earth.\n\nFigure 5 is the Qabbalistic sign of the elemental fire; Figure 6 represents the spiritual and invisible fire.\n\nFigures 6, 7, 8, and 9 symbolize the four elements before the descent of Lucifer.\n\nThey are the four rivers spoken of in Genesis, having their source in the one river, Figure W, which represents the elements superimposed on one another.\n\nThe golden ball in the center is Schamayim, the fiery source of all elements.\n\nFigure 11 is the emblem of the beginning and the end of all creatures.\n\nFrom it all things proceed and to it all must return again, to become one with the fiery water of divine understanding.\n\nTABLE II, Figures 12-51 .\n\nFigures 12, 13, 14 demonstrate the sphere as a symbol of motion to be emblematic of fire, water, and air; and the cube as a symbol of weight to be emblematic of earth.\n\nThe sphere rests upon a point, the cube upon a surface; the sphere is therefore used to symbolize spirit, and the cube, matter.\n\nFigure 14 demonstrates that atmosphere rushing in behind a falling object increases its velocity and apparently adds to its weight.\n\nThe essential nature of each element is occultly signified by the peculiar symbol and character assigned to it.\n\nOf Figure 15, the symbol of salt, von Welling writes, in substance: The cube has six sides, corresponding to the six days of creation, with the point of rest (the seventh day) in the center of the cube.\n\nOn each surface of the cube appear the signs of the four elements [triangles].\n\nThe alchemists declared that salt was the first created substance produced by the fire (Schamayim) which flowed out of God.\n\nIn salt all creation is concentrated; in salt are the beginning and end of all things.\n\nThe cube, furthermore, is composed of twelve bodies, each of which has six sides.\n\nThese bodies are the twelve fundamental pillars of the true invisible church, and when these twelve bodies are multiplied by their six sides the magical number 72 results.\n\nThe wise have said that nothing is perfect until it has been dissolved, separated, and again united so that it becomes a body composed of twelve bodies, like the cube.\n\nThe cube also consists of six pyramids with the six surfaces of the cube as their bases.\n\nThe points of these six pyramids meet at the center of the cube.\n\nThese six pyramids, each consisting of four triangles, signify the elements, and produce the magical number 24, which refers to the Elders before the Throne.\n\nThe six surfaces and the point constitute the magical number 7.\n\nIf 7 be multiplied by 7 again, and so on 7 times, the answer will reveal the method used by the ancients for measuring the periods of eternity; thus: (1) 7 X 7 = 49; (2) 49 X 7 = 343; (3) 343 X 7 = 2,401; (4) 2,401 X 7 = 16,807; (5):16,807 X 7 = 117,649; (6) 117,649 X 7 = 823,543; (7) 823,543 X 7 = 5,764,801."

