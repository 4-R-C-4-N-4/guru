body = "TITLE PAGE OF 1616 EDITION OF CHYMISCHE HOCHZEIT: CHRISTIAN ROSENCREUTZ.\n\nFrom Rosencreutz' Chemical Marriage.\n\nThe most remarkable of all the publications involved in the Rosicrucian controversy is that of The Chemical Marriage, published in Strasbourg.\n\nThis work, which is very rare, should be reproduced in exact facsimile to provide students with the opportunity of examining the actual text for the various forms of cipher employed.\n\nProbably no other volume in the history or literature created such a profound disturbance as this unpretentious little book.\n\nImmediately following its publication the purpose for which the volume was intended became the subject of popular speculation.\n\nIt was both attacked and defended by theologians and philosophers alike, but when the various contending elements are simmered down the mysteries surrounding the book remain unsolved.\n\nThat its author was a man of exceptional learning was admitted, and it is noteworthy that those minds which possessed the deepest understanding of Nature's mysteries were among those profoundly impressed by the contents of The Chemical Marriage.\n\n*** At the sound of trumpets each seated himself at the table, taking a position corresponding to his dignity, so that C.R.C.\n\nreceived a very humble seat.\n\nMost of the pseudo-philosophers present being vain pretenders, the banquet became an orgy, which, however, suddenly ceased at the sound of stately and inspired music.\n\nFor nearly half an hour no one spoke.\n\nThen amidst a great sound the door of the dining hall swung open and thousands of lighted tapers held by invisible hands entered.\n\nThese were followed by the two pages lighting the beautiful Virgo Lucifera seated on a self-moving throne.\n\nThe white-and-gold-robed Virgin then rose and announced that to prevent the admission of unworthy persons to the mystical wedding a set of scales would be erected the following day upon which each guest would be weighed to determine his integrity.\n\nThose unwilling to undergo this ordeal she stated should remain in the dining hall.\n\nShe then withdrew, but many of the tapers stayed to accompany the guests to their quarters for the night.\n\nMost of those present were presumptuous enough to believe that they could be safety weighed, but nine--including C.R.C.--felt their shortcomings so deeply that they feared the outcome and remained in the hall while the others were led away to their sleeping chambers.\n\nThese nine were bound with ropes and left alone in darkness.\n\nC.R.C.\n\nthen dreamed that he saw many men suspended over the earth by threads, and among them flew an aged man who, cutting here and there a thread, caused many to fall to earth.\n\nThose who in arrogance had soared to lofty heights accordingly fell a greater distance and sustained more serious injury than the more humble ones who, falling but a short distance, often landed without mishap.\n\nConsidering this dream to be a good omen, C.R.C.\n\nrelated it to a companion, continuing in discourse with him until dawn.\n\nTHE THIRD DAY Soon after dawn the trumpets sounded and the Virgo Lucifera , arrayed in red velvet, girded with a white sash, and crowned with a laurel wreath, entered accompanied by two hundred men in red-and-white livery.\n\nShe intimated to C.R.C.\n\nand his eight companions that they might fare better than the other, self-satisfied guests.\n\nGolden scales were then hung in the midst of the hall and near them were placed seven weights, one good-sized, four small, and two very large.\n\nThe men in livery, each carrying a naked sword and a strong rope, were divided into seven groups and from each group was chosen a captain, who was given charge of one of the weights.\n\nHaving remounted her high throne, Virgo Lucifera ordered the ceremony to begin.\n\nThe first to step on the scales was an emperor so virtuous that the balances did not tip until six weights had been placed upon the opposite end."

