body = "The Atlanteans instigated the first war; and it has been said that all subsequent wars were fought in a fruitless effort to justify the first one and right the wrong which it caused.\n\nBefore Atlantis sank, its spiritually illumined Initiates, who realized that their land was doomed because it had departed from the Path of Light, withdrew from the ill-fated continent.\n\nCarrying with them the sacred and secret doctrine, these Atlanteans established themselves in Egypt, where they became its first \"divine\" rulers.\n\nNearly all the great cosmologic myths forming the foundation of the various sacred books of the world are based upon the Atlantean Mystery rituals.\n\nTHE MYTH OF THE DYING GOD The myth of Tammuz and Ishtar is one of the earliest examples of the dying-god allegory, probably antedating 4000 B.\n\nC.\n\n(See Babylonia and Assyria by Lewis Spence.) The imperfect condition of the tablets upon which the legends are inscribed makes it impossible to secure more than a fragmentary account of the Tammuz rites.\n\nBeing the esoteric god of the sun, Tammuz did not occupy a position among the first deities venerated by the Babylonians, who for lack of deeper knowledge looked upon him as a god of agriculture or a vegetation spirit.\n\nOriginally he was described as being one of the guardians of the gates of the underworld.\n\nLike many other Savior-Gods, he is referred to as a \"shepherd\" or \"the lord of the shepherd seat.\" Tammuz occupies the remarkable position of son and husband of Ishtar, the Babylonian and Assyrian Mother-goddess.\n\nIshtar--to whom the planer Venus was sacred--was the most widely venerated deity of the Babylonian and Assyrian pantheon.\n\nShe was probably identical with Ashterorh, Astarte, and Aphrodite.\n\nThe story of her descent into the underworld in search presumably for the sacred elixir which alone could restore Tammuz to life is the key to the ritual of her Mysteries.\n\nTammuz, whose annual festival took place just before the summer solstice, died in midsummer in the ancient month which bore his name, and was mourned with elaborate ceremonies.\n\nThe manner of his death is unknown, but some of the accusations made against Ishtar by Izdubar (Nimrod) would indicate that she, indirectly at least, had contributed to his demise.\n\nThe resurrection of Tammuz was the occasion of great rejoicing, at which time he was hailed as a \"redeemer\" of his people.\n\nWith outspread wings, Ishtar, the daughter of Sin (the Moon), sweeps downward to the gates of death.\n\nThe house of darkness--the dwelling of the god Irkalla--is described as \"the place of no return.\" It is without light; the nourishment of those who dwell therein is dust and their food is mud.\n\nOver the bolts on the door of the house of Irkalla is scattered dust, and the keepers of the house are covered with feathers like birds.\n\nIshtar demands that the keepers open the gates, declaring that if they do not she will shatter the doorposts and strike the hinges and raise up dead devourers of the living.\n\nThe guardians of the gates beg her to be patient while they go to the queen of Hades from whom they secure permission to admit Ishtar, but only in the same manner as all others came to this dreary house.\n\nIshtar thereupon descends through the seven gates which lead downward into the depths of the underworld."

