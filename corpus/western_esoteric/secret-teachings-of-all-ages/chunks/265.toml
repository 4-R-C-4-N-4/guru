[content]
body = "By the ancient sages they were recognized as the invisible cause of vice because they hover in the ethers surrounding the morally weak and continually incite them to excesses of a degrading nature.\n\nFor this reason they frequent the atmosphere of the dope den, the dive, and the brothel, where they attach themselves to those unfortunates who have given themselves up to iniquity.\n\nBy permitting his senses to become deadened through indulgence in habit-forming drugs or alcoholic stimulants, the individual becomes temporarily en rapport with these denizens of the astral plane.\n\nThe houris seen by the hasheesh or opium addict and the lurid monsters which torment the victim of delirium tremens are examples of submundane beings, visible only to those whose evil practices are the magnet for their attraction.\n\nDiffering widely from the elementals and also the incubus and succubus is the vampire, which is defined by Paracelsus as the astral body of a person either living or dead (usually the latter state).\n\nThe vampire seeks to prolong existence upon the physical plane by robbing the living of their vital energies and misappropriating such energies to its own ends.\n\nIn his De Ente Spirituali Paracelsus writes thus of these malignant beings: \"A healthy and pure person cannot become obsessed by them, because such Larvæ can only act upon men if the later make room for them in their minds.\n\nA healthy mind is a castle that cannot be invaded without the will of its master; but if they are allowed to enter, they excite the passions of men and women, they create cravings in them, they produce bad thoughts which act injuriously upon the brain; they sharpen the animal intellect and suffocate the moral sense.\n\nEvil spirits obsess only those human beings in whom the animal nature is predominating.\n\nMinds that are illuminated by the spirit of truth cannot be possessed; only those who are habitually guided by their own lower impulses may become subjected to their influences.\" (See Paracelsus , by Franz Hartmann.) A strange concept, and one somewhat at variance with the conventional, is that evolved by the Count de Gabalis concerning the immaculate conception , namely, that it represents the union of a human being with an elemental.\n\nAmong the offspring of such unions he lists Hercules, Achilles, Æneas, Theseus, Melchizedek, the divine Plato, Apollonius of Tyana, and Merlin the Magician."

