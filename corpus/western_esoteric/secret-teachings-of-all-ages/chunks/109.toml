body = "One philosophical concept regarded the sun as a parent and the planers as embryos still connected to the solar body by means of ethereal umbilical cords which served as channels to convey life and nourishment to the planets.\n\nSome secret orders have taught that the sun was inhabited by a race of creatures with bodies composed of a radiant, spiritual ether not unlike in its constituency the actual glowing ball of the sun itself.\n\nThe solar heat had no harmful effect upon them, because their organisms were sufficiently refined and sensitized to harmonize with the sun's tremendous vibratory rate.\n\nThese creatures resemble miniature suns, being a little larger than a dinner plate in size, although some of the more powerful are considerably larger.\n\nTheir color is the golden white light of the sun, and from them emanate four streamers of Vril.\n\nThese streamers are often of great length and are in constant motion.\n\nA peculiar palpitation is to be noted throughout the structure of the globe and is communicated in the form of ripples to the emanating streamers.\n\nThe greatest and most luminous of these spheres is the Archangel Michael; and the entire order of solar life, which resemble him and dwell upon the sun, are called by modern Christians \"the archangels\" or \"the spirits of the light.\n\nSURYA, THE REGENT OF THE SUN.\n\nFrom Moor's Hindu Pantheon.\n\nMoor describes this figure as follows: \"The cast is nine inches in height, representing the glorious god of day-holding the attributes of VISHNU, seated on a seven-headed serpent; his car drawn by a seven-headed horse, driven by the legless ARUN, a personification of the dawn, or AURORA.\" (See Moor's Hindu Pantheon.) *** THE SUN IN ALCHEMICAL SYMBOLOGY Gold is the metal of the sun and has been considered by many as crystallized sunlight.\n\nWhen gold is mentioned in alchemical tracts, it may be either the metal itself or the celestial orb which is the source, or spirit, of gold.\n\nSulphur because of its fiery nature was also associated with the sun.\n\nAs gold was the symbol of spirit and the base metals represented man's lower nature, certain alchemists were called \"miners\" and were pictured with picks and shovels digging into the earth in search of the precious metal--those finer traits of character buried in the earthiness of materiality and ignorance.\n\nThe diamond concealed in the heart of the black carbon illustrated the same principle.\n\nThe Illuminati used a pearl hidden in the shell of an oyster at the bottom of the sea to signify spiritual powers.\n\nThus the seeker after truth became a pearl-fisher: he descended into the sea of material illusion in search of understanding, termed by the initiates \"the Pearl of Great Price.\" When the alchemists stated that every animate and inanimate thing in the universe contained the seeds of gold, they meant that even the grains of sand possessed a spiritual nature, for gold was the spirit of all things.\n\nConcerning these seeds of spiritual gold the following Rosicrucian axiom is significant: \"A seed is useless and impotent unless it is put in its appropriate matrix.\" Franz Hartmann comments on this axiom with these illuminating words: \"A soul cannot develop and progress without an appropriate body, because it is the physical body that furnishes the material for its development.\" (See In the Pronaos of the Temple of Wisdom .) The purpose of alchemy was not to make something out of nothing but rather to fertilize and nurture the seed which was already present.\n\nIts processes did nor actually create gold but rather made the ever-present seed of gold grow and flourish.\n\nEverything which exists has a spirit--the seed of Divinity within itself--and regeneration is not the process of attempting to place something where it previously had not existed."

