body = "There are then forty-two books of Hermes indispensably necessary; of which the six-and-thirty containing the whole philosophy of the Egyptians are learned by the forementioned personages; and the other six, which are medical, by the Pastophoroi (image-bearers),--treating of the structure of the body, and of disease, and instruments, and medicines, and about the eyes, and the last about women.\n\nOne of the greatest tragedies of the philosophic world was the loss of nearly all of the forty-two books of Hermes mentioned in the foregoing.\n\nThese books disappeared during the burning of Alexandria, for the Romans--and later the Christians--realized that until these books were eliminated they could never bring the Egyptians into subjection.\n\nThe volumes which escaped the fire were buried in the desert and their location is now known to only a few initiates of the secret schools.\n\nTHE BOOK OF THOTH While Hermes still walked the earth with men, he entrusted to his chosen successors the sacred Book of Thoth .\n\nThis work contained the secret processes by which the regeneration of humanity was to be accomplished and also served as the key to his other writings.\n\nNothing definite is known concerning the contents of the Book of Thoth other than that its pages were covered with strange hieroglyphic figures and symbols, which gave to those acquainted with their use unlimited power over the spirits of the air and the subterranean divinities.\n\nWhen certain areas of the brain are stimulated by the secret processes of the Mysteries, the consciousness of man is extended and he is permitted to behold the Immortals and enter into the presence of the superior gods.\n\nThe Book of Thoth described the method whereby this stimulation was accomplished.\n\nIn truth, therefore, it was the \"Key to Immortality.\" According to legend, the Book of Thoth was kept in a golden box in the inner sanctuary of the temple.\n\nThere was but one key and this was in the possession of the \"Master of the Mysteries,\" the highest initiate of the Hermetic Arcanum.\n\nHe alone knew what was written in the secret book.\n\nThe Book of Thoth was lost to the ancient world with the decay of the Mysteries, but its faithful initiates carried it sealed in the sacred casket into another land.\n\nThe book is still in existence and continues to lead the disciples of this age into the presence of the Immortals.\n\nNo other information can be given to the world concerning it now, but the apostolic succession from the first hierophant initiated by Hermes himself remains unbroken to this day, and those who are peculiarly fitted to serve the Immortals may discover this priceless document if they will search sincerely and tirelessly for it.\n\nIt has been asserted that the Book of Thoth is, in reality, the mysterious Tarot of the Bohemians--a strange emblematic book of seventy-eight leaves which has been in possession of the gypsies since the time when they were driven from their ancient temple, the Serapeum.\n\n(According to the Secret Histories the gypsies were originally Egyptian priests.) There are now in the world several secret schools privileged to initiate candidates into the Mysteries, but in nearly every instance they lighted their altar fires from the flaming torch of Herm .\n\nHermes in his Book of Thoth revealed to all mankind the \"One Way,\" and for ages the wise of every nation and every faith have reached immortality by the \"Way\" established by Hermes in the midst of the darkness for the redemption of humankind.\n\nPOIMANDRES, THE VISION OF HERMES The Divine Pymander of Hermes Mercurius Trismegistus is one of the earliest of the Hermetic writings now extant.\n\nWhile probably not in its original form, having been remodeled during the first centuries of the Christian Era and incorrectly translated since, this work undoubtedly contains many of the original concepts of the Hermetic cultus."

