body = "This viewpoint is best expressed by a number of questions which are still being asked by investigators of this elusive group of metaphysicians.\n\nWas the \"Brotherhood of the Rose Cross\" merely a mythical institution created in the fertile mind of some literary cynic for the purpose of deriding the alchemical and Hermetic sciences?\n\nDid the \"House of the Holy Spirit\" ever exist outside the imagination of some medieval mystic?\n\nWas the whole Rosicrucian story a satire to ridicule the gullibility of scholastic Europe?\n\nWas the mysterious Father C.R.C.\n\na product of the literary genius of Johann Valentin Andreæ, or another of similar mind, who, attempting to score alchemical and Hermetic philosophy, unwittingly became a great power in furthering the cause of its promulgation?\n\nThat at least one of the early documents of the Rosicrucians was from the pen of Andreæ there is little doubt, but for just what purpose he compiled it still remains a matter of speculation.\n\nDid Andreæ himself receive from some unknown person, or persons, instructions to be carried out?\n\nIf he wrote the Chymical Nuptials of Christian Rosencreut z when only fifteen years old, was he overshadowed in the preparation of that book?\n\nTo these vital questions no answers are forthcoming.\n\nA number of persons accepted the magnificent imposture of Andreæ as absolute truth.\n\nIt is maintained by many that, as a consequence, numerous pseudo-societies sprang up, each asserting that it was the organization concerning which the Fama Fraternitatis and the Confessio Fraternitatis were written.\n\nBeyond doubt there are many spurious orders in existence today; but few of them can offer valid claims that their history dates back farther than the beginning of the nineteenth century.\n\nThe mystery associated with the Rosicrucian Fraternity has resulted in endless controversy.\n\nMany able minds, notable among them Eugenius Philalethes, Michael Maier, John Heydon, and Robert Fludd, defended the concrete existence of \"The Society of Unknown Philosophers.\" Others equally qualified have asserted it to be of fraudulent origin and doubtful existence.\n\nEugenius Philalethes, while dedicating books to the Order, and himself writing an extended exposition of its principles, disclaims all personal connection with it.\n\nMany others have done likewise.\n\nSome are of the opinion that Sir Francis Bacon had a hand in the writing of the Fama and Confessio Fraternitatis , on the basis that the rhetorical style of these works is similar to that of Bacon's New Atlantis .\n\nThey also contend that certain statements in the latter work point to an acquaintance with Rosicrucian symbology.\n\nThe elusiveness of the Rosicrucians has caused them to be favorite subject's for literary works.\n\nOutstanding among the romances which have been woven around them is Zanoni .\n\nThe author, Lord Bulwer-Lytton, is regarded by some as a member of the Order, while others assert that he applied for membership but was rejected.\n\nPope's Rape of the Lock , &c.\n\nComte de Gabalis by Abbé de Villars, and essays by De Quincy, Hartmann, Jennings, Mackenzie, and others, are examples of Rosicrucian literature.\n\nAlthough the existence of these medieval Rosicrucians is difficult to prove, sufficient evidence is at hand to make it extremely probable that there existed in Germany, and afterwards in France, Italy, England, and other European countries, a secret society of illuminated savants who made contributions of great import to the sum of human knowledge, while maintaining absolute secrecy concerning their personalities and their organization.\n\nTHE FOURTH POSTULATE The apparent incongruities of the Rosicrucian controversy have also been accounted for by a purely transcendental explanation."

