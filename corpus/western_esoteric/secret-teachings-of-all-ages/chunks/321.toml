[content]
body = "Since Aleph (the first Hebrew letter) has the numerical value of 1, its assignment to the zero card is equivalent to the statement that zero is equal to the letter Aleph and therefore synonymous with the number 1.\n\nWith rare insight, Court de Gébelin assigned the zero card to AIN SOPH, the Unknowable First Cause.\n\nAs the central panel of the Bembine Table represents the Creative Power surrounded by seven triads of manifesting divinities, so may the zero card represent that Eternal Power of which the 21 surrounding or manifesting aspects are but limited expressions.\n\nIf the 21 major trumps be considered as limited forms existing in the abstract substance of the zero card, it then becomes their common denominator.\n\nWhich letter, then, of the Hebrew alphabet is the origin of all the remaining letters?\n\nThe answer is apparent: Yod.\n\nIn the presence of so many speculations, one more may not offend.\n\nThe zero card-- Le Mat , the Fool--has been likened to the material universe because the mortal sphere is the world of unreality.\n\nThe lower universe, like the mortal body of man, is but a garment, a motley costume, well likened to cap and bells.\n\nBeneath the garments of the fool is the divine substance, however, of which the jester is but a shadow; this world is a Mardi Gras--a pageantry of divine sparks masked in the garb of fools.\n\nWas not this zero card (the Fool) placed in the Tarot deck to deceive all who could not pierce the veil of illusion?\n\nThe Tarot cards were entrusted by the illumined hierophants of the Mysteries into the keeping of the foolish and the ignorant, thus becoming playthings--in many instances even instruments of vice.\n\nMan's evil habits therefore actually became the unconscious perpetuators of his philosophical precepts.\n\n\"We must admire the wisdom of the Initiates,\" writes Papus, \"who utilized vice and made it produce more beneficial results than virtue.\" Does not this act of the ancient priests itself afford proof that the entire mystery of the Tarot is wrapped up in the symbolism of its zero card?\n\nIf knowledge was thus entrusted to fools, should it not be sought for in this card?\n\nIf Le Mat be placed before the first card of the Tarot deck and the others laid out in a horizontal line in sequence from left to right, it will be found that the Fool is walking toward the other trumps as though about to pass through the various cards.\n\nLike the spiritually hoodwinked and bound neophyte, Le Mat is about to enter upon the supreme adventure--that of passage through the gates of the Divine Wisdom.\n\nIf the zero card be considered as extraneous to the major trumps, this destroys the numerical analogy between these cards and the Hebrew letters by leaving one letter without a Tarot correspondent.\n\nIn this event it will be necessary to assign the missing letter to a hypothetical Tarot card called the elements, assumed to have been broken up to form the 56 cards of the minor trumps.\n\nIt is possible that each of the major trumps may be subject to a similar division.\n\nThe first numbered major trump is called Le Bateleur , the juggler, and according to Court de Gébelin, indicates the entire fabric of creation to be but a dream, existence a juggling of divine elements, and life a perpetual game of hazard.\n\nThe seeming miracles of Nature are but feats of cosmic legerdemain.\n\nMan is like the little ball in the hands of the juggler, who waves his wand and, presto!\n\nthe ball vanishes.\n\nThe world looking on does not realize that the vanished article is still cleverly concealed by the juggler in the hollow of his hand."

