body = "The theory of Pragmatism, while not original with Professor William James, owes its widespread popularity as a philosophic tenet to his efforts.\n\nPragmatism may be defined as the doctrine that the meaning and nature of things are to be discovered from consideration of their consequences.\n\nThe true, according to James, \"is only an expedient in the way of our thinking, just as 'the right' is only an expedient in the way of our behaving.\" (See his Pragmatism .) John Dewey, the Instrumentalist , who applies the experimental attitude to all the aims of life, should be considered a commentator of James.\n\nTo Dewey, growth and change are limitless and no ultimates are postulated.\n\nThe long residence in America of George Santayana warrants the listing of this great Spaniard among the ranks of American philosophers.\n\nDefending himself with the shield of skepticism alike from the illusions of the senses and the cumulative errors of the ages, Santayana seeks to lead mankind into a more apprehending state denominated by him the life of reason .\n\n(In addition to the authorities already quoted, in the preparation of the foregoing abstract of the main branches of philosophic thought the present writer has had recourse to Stanley's History of Philosophy ; Morell's An Historical and Critical View of the Speculative Philosophy of Europe in the Nineteenth Century ; Singer's Modern Thinkers and Present Problems ; Rand's Modern Classical Philosophers ; Windelband's History of Philosophy ; Perry's Present Philosophical Tendencies ; Hamilton's Lectures on Metaphysics and Logic ; and Durant's The Story of Philosophy .) Having thus traced the more or less sequential development of philosophic speculation from Thales to James and Bergson, it is now in order to direct the reader's attention to the elements leading to and the circumstances attendant upon the genesis of philosophic thinking.\n\nAlthough the Hellenes proved themselves peculiarly responsive to the disciplines of philosophy, this science of sciences should not be considered indigenous to them.\n\n\"Although some of the Grecians,\" writes Thomas Stanley, \"have challenged to their nation the original of philosophy, yet the more learned of them have acknowledged it [to be] derived from the East.\" The magnificent institutions of Hindu, Chaldean, and Egyptian learning must be recognized as the actual source of Greek wisdom.\n\nThe last was patterned after the shadow cast by the sanctuaries of Ellora, Ur, and Memphis upon the thought substance of a primitive people.\n\nThales, Pythagoras, and Plato in their philosophic wanderings contacted many distant cults and brought back the lore of Egypt and the inscrutable Orient.\n\nFrom indisputable facts such as these it is evident that philosophy emerged from the religious Mysteries of antiquity, not being separated from religion until after the decay of the Mysteries.\n\nHence he who would fathom the depths of philosophic thought must familiarize himself with the teachings of those initiated priests designated as the first custodians of divine revelation.\n\nThe Mysteries claimed to be the guardians of a transcendental knowledge so profound as to be incomprehensible save to the most exalted intellect and so potent as to be revealed with safety only to those in whom personal ambition was dead and who had consecrated their lives to the unselfish service of humanity.\n\nBoth the dignity of these sacred institutions and the validity of their claim to possession of Universal Wisdom are attested by the most illustrious philosophers of antiquity, who were themselves initiated into the profundities of the secret doctrine and who bore witness to its efficacy.\n\nThe question may legitimately be propounded: If these ancient mystical institutions were of such \"great pith and moment,\" why is so little information now available concerning them and the arcana they claimed to possess?"

