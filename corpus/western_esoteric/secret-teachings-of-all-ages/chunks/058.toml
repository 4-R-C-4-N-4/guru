[content]
body = "The descendants of Atlas continued as rulers of Atlantis, and with wise government and industry elevated the country to a position of surpassing dignity.\n\nThe natural resources of Atlantis were apparently limitless.\n\nPrecious metals were mined, wild animals domesticated, and perfumes distilled from its fragrant flowers.\n\nWhile enjoying the abundance natural to their semitropic location, the Atlanteans employed themselves also in the erection of palaces, temples, and docks.\n\nThey bridged the zones of sea and later dug a deep canal to connect the outer ocean with the central island, where stood the palaces And temple of Poseidon, which excelled all other structures in magnificence.\n\nA network of bridges and canals was created by the Atlanteans to unite the various parts of their kingdom.\n\nPlato then describes the white, black, and red stones which they quarried from beneath their continent and used in the construction of public buildings and docks.\n\nThey circumscribed each of the land zones with a wall, the outer wall being covered with brass, the middle with tin, and the inner, which encompassed the citadel, with orichalch.\n\nThe citadel, on the central island, contained the pal aces, temples, and other public buildings.\n\nIn its center, surrounded by a wall of gold, was a sanctuary dedicated to Cleito and Poseidon.\n\nHere the first ten princes of the island were born and here each year their descendants brought offerings.\n\nPoseidon's own temple, its exterior entirely covered with silver and its pinnacles with gold, also stood within the citadel.\n\nThe interior of the temple was of ivory, gold, silver, and orichalch, even to the pillars and floor.\n\nThe temple contained a colossal statue of Poseidon standing in a chariot drawn by six winged horses, about him a hundred Nereids riding on dolphins.\n\nArranged outside the building were golden statues of the first ten kings and their wives.\n\nIn the groves and gardens were hot and cold springs.\n\nThere were numerous temples to various deities, places of exercise for men and for beasts, public baths, and a great race course for horses.\n\nAt various vantage points on the zones were fortifications, and to the great harbor came vessels from every maritime nation.\n\nThe zones were so thickly populated that the sound of human voices was ever in the air.\n\nThat part of Atlantis facing the sea was described as lofty and precipitous, but about the central city was a plain sheltered by mountains renowned for their size, number, and beauty.\n\nThe plain yielded two crops each year,, in the winter being watered by rains and in the summer by immense irrigation canals, which were also used for transportation.\n\nThe plain was divided into sections, and in time of war each section supplied its quota of fighting men and chariots.\n\nThe ten governments differed from each other in details concerning military requirements.\n\nEach of the kings of Atlantis had complete control over his own kingdom, but their mutual relationships were governed by a code engraved by the first ten kings on a column' of orichalch standing in the temple of Poseidon.\n\nAt alternate intervals of five and six years a pilgrimage was made to this temple that equal honor might be conferred upon both the odd and the even numbers.\n\nHere, with appropriate sacrifice, each king renewed his oath of loyalty upon the sacred inscription.\n\nHere also the kings donned azure robes and sat in judgment.\n\nAt daybreak they wrote their sentences upon a golden tablet: and deposited them with their robes as memorials.\n\nThe chief laws of the Atlantean kings were that they should not take up arms against each other and that they should come to the assistance of any of their number who was attacked.\n\nIn matters of war and great moment the final decision was in the hands of the direct descendants of the family of Atlas."

