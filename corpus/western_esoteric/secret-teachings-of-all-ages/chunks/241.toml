body = "Its green color relates it to Venus and to the mystery of generation; also to the Islamic faith, whose sacred color is green and whose Sabbath is Friday, the day of Venus.\n\nThe Holy Grail is a symbol both of the lower (or irrational) world and of the bodily nature of man, because both are receptacles for the living essences of the superior worlds.\n\nSuch is the mystery of the redeeming blood which, descending into the condition of death, overcomes the last enemy by ensouling all substance with its own immortality.\n\nTo the Christian, whose mystic faith especially emphasizes the love element, the Holy Grail typifies the heart in which continually swirls the living water of eternal life.\n\nMoreover, to the Christian, the search for the Holy Grail is the search for the real Self which, when found, is the consummation of the magnum opus .\n\nThe Holy Cup can be discovered only by those who have raised themselves above the limitations of sensuous existence.\n\nIn his mystic poem, The Vision of Sir Launfal , James Russell Lowell discloses the true nature of the Holy Grail by showing that it is visible only to a certain state of spiritual consciousness .\n\nOnly upon returning from the vain pursuit of haughty ambition did the aged and broken knight see in the transformed leper's cup the glowing chalice of his lifelong dream.\n\nSome writers trace a similarity between the Grail legend and the stories of the martyred Sun Gods whose blood, descending from heaven into the earth, was caught in the cup of matter and liberated therefrom by the initiatory rites.\n\nThe Holy Grail may also be the seed pod so frequently employed in the ancient Mysteries as an emblem of germination and resurrection; and if the cuplike shape of the Grail be derived from the flower, it signifies the regeneration and spiritualization of the generative forces in man.\n\nThere are many accounts of stone images which, because of the substances entering into their composition and the ceremonials attendant upon their construction, were ensouled by the divinities whom they were created to resemble.\n\nTo such images were ascribed various human faculties and powers, such as speech, thought, and even motion.\n\nWhile renegade priests doubtless resorted to trickery--an instance of which is related in a curious apocryphal fragment entitled Bel and the Dragon and supposedly deleted from the end of the Book of Daniel --many of the phenomena recorded in connection with sanctified statues and relics can hardly be explained unless the work of supernatural agencies be admitted.\n\nHistory records the existence of stones which, when struck, threw all who heard the sound into a state of ecstasy.\n\nThere were also echoing images which whispered for hours after the room itself had become silent, and musical stones productive of the sweetest harmonies.\n\nIn recognition of the sanctity which the Greeks and Latins ascribed to stones, they placed their hands upon certain consecrated pillars when taking an oath.\n\nIn ancient times stones played a part in determining the fate of accused persons, for it was customary for juries to reach their verdicts by dropping pebbles into a bag.\n\nDivination by stones was often resorted to by the Greeks, and Helena is said to have foretold by lithomancy the destruction of Troy.\n\nMany popular superstitions about stones survive the so-called Dark Ages.\n\nChief among these is the one concerning the famous black stone in the seat of the coronation chair in Westminster Abbey, which is declared to be the actual rock used by Jacob as a pillow.\n\nThe black stone also appears several times in religious symbolism.\n\nIt was called Heliogabalus , a word presumably derived from Elagabal , the Syro-Phœnician sun god.\n\nThis stone was sacred to the sun and declared to possess great and diversified properties.\n\nThe black stone in the Caaba at Mecca is still revered throughout the Mohammedan world."

