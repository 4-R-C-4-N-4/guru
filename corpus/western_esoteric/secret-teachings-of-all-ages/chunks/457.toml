body = "From Jennings' The Rosicrucians, Their Rites and Mysteries.\n\nAccording to tradition, Arthur, when a boy of fifteen, was crowned King of Britain, in A.D.\n\n516.\n\nSoon after his ascension to the throne he founded the Order of the Knights of the Round Table at Windsor.\n\nThereafter the Knights met annually at Carleon, Winchester, or at Camelot, to celebrate Pentecost.\n\nFrom all parts of Europe came the brave and the bold, seeking admission into this noble order of British knighthood.\n\nNobility, virtue, and valor were its requirements, and those possessing these qualities to a marked degree were welcomed to King Arthur's court at Camelot.\n\nHaving gathered the bravest and noblest Knights of Europe about him, King Arthur chose twenty-four who excelled all the others in daring and integrity and formed of them his Circle of the Round Table.\n\nAccording to legend, each of these Knights was so great in dignity and power that none could occupy a more exalted seat than another, so when they gathered at the table to celebrate the anniversary of their foundation it was necessary to use a round table that all might occupy chairs of equal importance.\n\nWhile it is probable that the Order of the Round Table had its distinctive rituals and symbols, the knowledge of them has not survived the ages.\n\nElias Ashmole, in his volume on the Order of the Garter, inserted a double-page plate showing the insignia of all the orders of knighthood, the block set aside for the symbol of the Round Table being left blank.\n\nThe chief reason for the loss of the symbolism of the Round Table was the untimely death of King Arthur upon the field of Kamblan (A.D.\n\n542) in the forty-first year of his life.\n\nWhile he destroyed his bitter enemy, Mordred, in this famous battle, it cast him not only his own life but the lives of nearly all his Knights of the Round Table, who died defending their commander.\n\n*** Within the last century several books have been published to supplement the meager descriptions in the Gospels of Jesus and His ministry.\n\nIn some instances these narratives claim to be founded upon early manuscripts recently discovered; in others, upon direct spiritual revelation.\n\nSome of these writings are highly plausible, while others are incredible.\n\nThere are persistent rumors that Jesus visited and studied in both Greece and India, and that a coin struck in His honor in India during the first century has been discovered.\n\nEarly Christian records are known to exist in Tibet, and the monks of a Buddhist monastery in Ceylon still preserve a record which indicates that Jesus sojourned with them and became conversant with their philosophy.\n\nAlthough early Christianity shows every evidence of Oriental influence, this is a subject the modern church declines to discuss.\n\nIf it is ever established beyond question that Jesus was an initiate of the pagan Greek or Asiatic Mysteries, the effect upon the more conservative members of the Christian faith is likely to be cataclysmic.\n\nIf Jesus was God incarnate, as the solemn councils of the church discovered, why is He referred to in the New Testament as \"called of God an high prim after the order of Melchizedek\"?\n\nThe words \"after the order\" make Jesus one of a line or order of which there must have been others of equal or even superior dignity.\n\nIf the \"Melchizedeks\" were the divine or priestly rulers of the nations of the earth before the inauguration of the system of temporal rulers, then the statements attributed to St.\n\nPaul would indicate that Jesus either was one of these \"philosophic elect\" or was attempting to reestablish their system of government.\n\nIt will be remembered that Melchizedek also performed the same ceremony of the drinking of wine and the breaking of bread as did Jesus at the Last Supper.\n\nGeorge Faber declares the original name of Jesus was Jescua Hammassiah."

