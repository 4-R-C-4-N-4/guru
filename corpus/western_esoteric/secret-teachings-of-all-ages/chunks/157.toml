[content]
body = "The Pythagoreans bound themselves by the following oath: \"By Him who gave to our soul the tetractys, which hath the fountain and root of ever-springing nature.\" *** THE CUBE AND THE STAR.\n\nBy connecting the ten dots of the tetractys, nine triangles are formed.\n\nSix of these are involved in the forming of the cube.\n\nThe same triangles, when lines are properly drawn between them, also reveal the six-pointed star with a dot in the center.\n\nOnly seven dots are used in forming the cube and the star.\n\nQabbalistically, the three unused corner dots represent the threefold, invisible causal nature of the universe, while the seven dots involved in the cube and the star are the Elohim--the Spirits of the seven creative periods.\n\nThe Sabbath, or seventh day, is the central dot.\n\n*** Now inscribe in the earth an icosahedron; the circle inscribed in it will be Venus.\n\nInscribe an octahedron in Venus; the circle inscribed in it will be Mercury' ( Mysterium Cosmographicum , 1596).\n\nThis rule cannot be taken seriously as a real statement of the proportions of the cosmos, fox it bears no real resemblance to the ratios published by Copernicus in the beginning of the sixteenth century.\n\nYet Kepler was very proud of his formula, and said he valued it more than the Electorate of Saxony.\n\nIt was also approved by those two eminent authorities, Tycho and Galileo, who evidently understood it.\n\nKepler himself never gives the least hint of how his precious rule is to be interpreted.\" Platonic astronomy was not concerned with the material constitution or arrangement of the heavenly bodies, but considered the stars and planers primarily as focal points of Divine intelligence.\n\nPhysical astronomy was regarded as the science of \"shadows,\" philosophical astronomy the science of \"realities.\""

