[content]
body = "Blavatsky, the foremost occultist of the nineteenth century, has written: 'Plants also have like mystical properties in a most wonderful degree, and the secrets of the herbs of dreams and enchantments are only lost to European science, and useless to say, too, are unknown to it, except in a few marked instances, such as opium and hashish.\n\nYet, the psychical effects of even these few upon the human system are regarded as evidences of a temporary mental disorder.\n\nThe women of Thessaly and Epirus, the female hierophants of the rites of Sabazius, did not carry their secrets away with the downfall of their sanctuaries.\n\nThey are still preserved, and those who are aware of the nature of Soma, know the properties of other plants as well.\" ( Isis Unveiled .) Herbal compounds were used to cause temporary clairvoyance in connection with the oracles, especially the one at Delphi.\n\nWords spoken while in these imposed trances were regarded as prophetic.\n\nModem mediums, while under control as the result of partly self-imposed catalepsy, give messages somewhat similar to those of the ancient prophets, but in the majority of cases their results are far less accurate, for the soothsayers of today lack the knowledge of Nature's hidden forces.\n\nThe Mysteries taught that during the higher degrees of initiation the gods themselves took part in the instruction of candidates or at least were present, which was in itself a benediction.\n\nAs the deities dwelt in the invisible worlds and came only in their spiritual bodies, it was impossible for the neophyte to cognize them without the assistance of drugs which stimulated the clairvoyant center of his consciousness (probably the pineal gland).\n\nMany initiates in the ancient Mysteries stated emphatically that they had conversed with the immortals, and had beheld the gods.\n\nWhen the standards of the pagans became corrupted, a division took place in the Mysteries.\n\nThe band of truly enlightened ones separated themselves from the rest and, preserving the most important of their secrets, vanished without leaving a trace.\n\nThe rest slowly drifted, like rudderless ships, on the rocks of degeneracy and disintegration.\n\nSome of the less important of the secret formulæ fell into the hands of the profane, who perverted them--as in the case of the Bacchanalia, during which drugs were mixed with wine and became the real cause of the orgies.\n\nIn certain parts of the earth it was maintained that there were natural wells, springs, or fountains, in which the water (because of the minerals through which it coursed) was tinctured with sacred properties.\n\nTemples were often built near these spots, and in some cases natural caves which chanced to be in the vicinity were sanctified to some deity.\n\n\"The aspirants to initiation, and those who came to request prophetic dreams of the Gods, were prepared by a fast, more or less prolonged, after which they partook of meals expressly prepared; and also of mysterious drinks, such as the water of Lethe, and the water of Mnemosyne in the grotto of Trophonius; or of the Ciceion in the mysteries of the Eleusinia.\n\nDifferent drugs were easily mixed up with the meats or introduced into the drinks, according to the state of mind or body into which it was necessary to throw the recipient, and the nature of the visions he was desirous of procuring.'' (Salverte's The Occult Sciences .) The same author states that certain sects of early Christianity were accused of using drugs for the same general purposes as the pagans.\n\nThe sect of the Assassins, or the Yezidees as they are more generally known, demonstrated a rather interesting aspect of the drug problem."

