body = "The magnificent library amassed by Sir Francis Bacon contained the very volumes necessary to supply the quotations and anecdotes incorporated into the Shakespearian plays.\n\nMany of the plays, in fact, were taken from plots in earlier writings of which there was no English translation at that time.\n\nBecause of his scholastic acquirements, Lord Verulam could have read the original books; it is most unlikely that William Shakspere could have done so.\n\nAbundant cryptographic proof exists that Bacon was concerned in the production of the Shakespearian plays.\n\nSir Francis Bacon's cipher number was 33.\n\nIn the First Part of King Henry the Fourth , the word \"Francis\" appears 33 times upon one page.\n\nTo attain this end, obviously awkward sentences were required, as: \"Anon Francis?\n\nNo Francis, but tomorrow Francis: or Francis, on Thursday: or indeed Francis when thou wilt.\n\nBut Francis.\" Throughout the Shakespearian Folios and Quartos occur scores of acrostic signatures.\n\nThe simplest form of the acrostic is that whereby a name--in these instances Bacon's--was hidden in the first few letters of lines.\n\nIn The Tempest , Act I, Scene 2, appears a striking example of the Baconian acrostic: \"Begun to tell me what I am, but stopt And left me to a bootelesse Inquisition, Concluding, stay: not yet.\n\nThe first letters of the first and second lines together with the first three letters of the third line form the word BACon .\n\nSimilar acrostics appear frequently in Bacon's acknowledged writings.\n\nThe tenor of the Shakespearian dramas politically is in harmony with the recognized viewpoints of Sir Francis Bacon, whose enemies are frequently caricatured in the plays.\n\nLikewise their religious, philosophic, and educational undercurrents all reflect his personal opinions.\n\nNot only do these marked similarities of style and terminology exist in Bacon's writings and the Shakespearian plays, but there are also certain historical and philosophical inaccuracies common to both, such as identical misquotations from Aristotle.\n\n\"Evidently realizing that futurity would unveil his full genius, Lord Verulam in his will bequeathed his soul to God above by the oblations of his Savior, his body to be buried obscurely, his name and memory to men's charitable speeches, to foreign nations, to succeeding ages, and to his own countrymen after some time had elapsed .\n\nThat portion appearing in italics Bacon deleted from his will, apparently fearing that he had said too much.\n\nThat Sir Francis Bacon's subterfuge was known to a limited few during his lifetime is quite evident.\n\nAccordingly, stray hints regarding the true author of the Shakespearian plays may be found in many seventeenth century volumes.\n\nOn page 33 (Bacon's cipher number) of the 1609 edition of Robert Cawdry's Treasurie or Storehouse of Similes appears the following significant allusion: \"Like as men would laugh at a poore man, if having precious garments lent him to act and play the part of some honourable personage upon a stage, when the play were at an ende he should keepe them as his owne, and bragge up and downe in them.\" Repeated references to the word hog and the presence of cryptographic statements on page 33 of various contemporary writings demonstrate that the keys to Bacon's ciphers were his own name, words playing upon it, or its numerical equivalent.\n\nNotable examples are the famous statement of Mistress Quickly in The Merry Wives of Windsor : \"Hang-hog is latten for Bacon, I warrant you\"; the title pages of The Countess of Pembroke's Arcadia and Edmund Spenser's Faerie Queene ; and the emblems appearing in the works of Alciatus and Wither.\n\nA BACONIAN SIGNATURE."

