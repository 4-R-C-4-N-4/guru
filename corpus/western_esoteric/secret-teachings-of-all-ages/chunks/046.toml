body = "The Odinic Mysteries were given in underground crypts or caves, the chambers, nine in number, representing the Nine Worlds of the Mysteries.\n\nThe candidate seeking admission was assigned the task of raising Balder from the dead.\n\nAlthough he did not realize it, he himself played the part of Balder.\n\nHe called himself a wanderer; the caverns through which he passed were symbolic of the worlds and spheres of Nature.\n\nThe priests who initiated him were emblematic of the sun, the moon, and the stars.\n\nThe three supreme initiators--the Sublime, the Equal to the Sublime, and the Highest--were analogous to the Worshipful Master and the junior and Senior Wardens of a Masonic lodge.\n\nAfter wandering for hours through the intricate passageways, the candidate was ushered into the presence of a statue of Balder the Beautiful, the prototype of all initiates into the Mysteries.\n\nThis figure stood in the center of a great apartment roofed with shields.\n\nIn the midst of the chamber stood a plant with seven blossoms, emblematic of the planers.\n\nIn this room, which symbolized the house of the Æsir, or Wisdom, the neophyte took his oath of secrecy and piety upon the naked blade of a sword.\n\nHe drank the sanctified mead from a bowl made of a human skull and, having passed successfully through all the tortures and trials designed to divert him from the course of wisdom, he was finally permitted to unveil the mystery of Odin--the personification of wisdom.\n\nHe was presented, in the name of Balder, with the sacred ring of the order; he was hailed as a man reborn; and it was said of him that he had died and had been raised again without passing through the gates of death.\n\nRichard Wagner's immortal composition, Der Ring des Nibelungen , is based upon the Mystery rituals of the Odinic cult.\n\nWhile the great composer took many liberties with the original story, the Ring Operas, declared to be the grandest tetralogy of music dramas the world possesses, have caught and preserved in a remarkable manner the majesty and power of the original sagas.\n\nBeginning with Das Rheingold , the action proceeds through Die Walküre and Siegfried to an awe-inspiring climax in Götterdämmerung , \"The Twilight of the Gods.\" Part 3 THE most famous of the ancient religious Mysteries were the Eleusinian, whose rites were celebrated every five years in the city of Eleusis to honor Ceres (Demeter, Rhea, or Isis) and her daughter, Persephone.\n\nThe initiates of the Eleusinian School were famous throughout Greece for the beauty of their philosophic concepts and the high standards of morality which they demonstrated in their daily lives.\n\nBecause of their excellence, these Mysteries spread to Rome and Britain, and later the initiations were given in both these countries.\n\nThe Eleusinian Mysteries, named for the community in Attica where the sacred dramas were first presented, are generally believed to have been founded by Eumolpos about fourteen hundred years before the birth of Christ, and through the Platonic system of philosophy their principles have been preserved to modern times.\n\nThe rites of Eleusis, with their Mystic interpretations of Nature's most precious secrets, overshadowed the civilizations of their time and gradually absorbed many smaller schools, incorporating into their own system whatever valuable information these lesser institutions possessed.\n\nHeckethorn sees in the Mysteries of Ceres and Bacchus a metamorphosis of the rites of Isis and Osiris, and there is every reason to believe that all so-called secret schools of the ancient world were branches from one philosophic tree which, with its root in heaven and its branches on the earth, is--like the spirit of man--an invisible but ever-present cause of the objectified vehicles that give it expression."

