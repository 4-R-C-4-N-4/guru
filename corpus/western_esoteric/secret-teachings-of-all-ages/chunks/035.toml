body = "Candidates who successfully passed the Mithraic initiations were called Lions and were marked upon their foreheads with the Egyptian cross.\n\nMithras himself is often pictured with the head of a lion and two pairs of wings.\n\nThroughout the entire ritual were repeated references to the birth of Mithras as the Sun God, his sacrifice for man, his death that men might have eternal life, and lastly, his resurrection and the saving of all humanity by his intercession before the throne of Ormuzd.\n\n(See Heckethorn.) While the cult of Mithras did not reach the philosophic heights attained by Zarathustra, its effect upon the civilization of the Western world was far-reaching, for at one time nearly all Europe was converted to its doctrines.\n\nRome, in her intercourse with other nations, inoculated them with her religious principles; and many later institutions have exhibited Mithraic culture.\n\nThe reference to the \"Lion\" and the \"Grip of the Lion's Paw\" in the Master Mason's degree have a strong Mithraic tinge and may easily have originated from this cult.\n\nA ladder of seven rungs appears in the Mithraic initiation.\n\nFaber is of the opinion that this ladder was originally a pyramid of seven steps.\n\nIt is possible that the Masonic ladder with seven rungs had its origin in this Mithraic symbol.\n\nWomen were never permitted to enter the Mithraic Order, but children of the male sex were initiates long before they reached maturity.\n\nThe refusal to permit women to join the Masonic Order may be based on the esoteric reason given in the secret instructions of the Mithraics.\n\nThis cult is another excellent example of those secret societies whose legends are largely symbolic representations of the sun and his journey through the houses of the heavens.\n\nMithras, rising from a stone, is merely the sun rising over the horizon, or, as the ancients supposed, out of the horizon, at the vernal equinox.\n\nMITHRAS SLAYING THE BULL.\n\nFrom Lundy's Monumental Christianity.\n\nThe most famous sculpturings and reliefs of this prototokos show Mithras kneeling upon the recumbent form of a great bull, into whose throat he is driving a sword.\n\nThe slaying of the bull signifies that the rays of the sun, symbolized by the sword, release at the vernal equinox the vital essences of the earth--the blood of the bull--which, pouring from the wound made by the Sun God, fertilize the seeds of living things.\n\nDogs were held sacred to the cult of Mithras, being symbolic of sincerity and trustworthiness.\n\nThe Mithraics used the serpent a an emblem of Ahriman, the Spirit of Evil, and water rats were held sacred to him.\n\nThe bull is esoterically the Constellation of Taurus; the serpent, its opposite in the zodiac, Scorpio; the sun, Mithras, entering into the side of the bull, slays the celestial creature and nourishes the universe with its blood.\n\n*** John O'Neill disputes the theory that Mithras was intended as a solar deity.\n\nIn The Night of the Gods he writes: \"The Avestan Mithra, the yazata of light, has '10,000 eyes, high, with full knowledge (perethuvaedayana), strong, sleepless and ever awake (jaghaurvaunghem).'The supreme god Ahura Mazda also has one Eye, or else it is said that 'with his eyes, the sun, moon and stars, he sees everything.' THE BIRTH OF MITHRAS.\n\nFrom Montfaucon's Antiquities Mithras was born out of a rock, which, breaking open, permitted him to emerge.\n\nThis occurred in the darkness of a subterranean chamber."

