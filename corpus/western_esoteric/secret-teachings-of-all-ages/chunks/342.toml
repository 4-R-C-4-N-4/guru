[content]
body = "There is a legend to the effect that any who chanced to enter the Holy of Holies unclean were destroyed by a bolt of Divine fire from the Mercy Seat.\n\nIf the High Priest had but one selfish thought, he would be struck dead.\n\nAs no man knows when an unworthy thought may flash through his mind, precautions had to be taken in case the High Priest should be struck dead while in the presence of Jehovah.\n\nThe other priests could not enter the sanctuary therefore, when their leader was about to go in and receive the commands of the Lord, they tied a chain around one of his feet so that if he were struck down while behind the veil they could drag the body out.\n\nTHE HEADDRESS OF THE PRIESTS.\n\nFrom Mosaize Historie der Hebreeuwse Kerke.\n\nOver the plain white cap of the ordinary priests the High Priest wore an overcloth of blue and a band of gold.\n\nOn the front of the golden band were inscribed the Hebrew words \"Holiness unto the Lord.\" This illustration shows the arrangement of the bonnet both with and without the golden crown.\n\n*** THE ARK WITH ITS CHERUBIM.\n\nFrom Calmet's Dictionary of the Holy Bible.\n\nJosephus tells its that the Cherubim were flying creatures but different in appearance, from anything to be seen on earth; therefore impossible to describe.\n\nMoses is supposed to have seen these beings kneeling at the footstool of God when he was picked up and brought into the Presence of Jehovah.\n\nIt is probable that they resembled, at least in general appearance, the famous Cherubim of Ezekiel."

