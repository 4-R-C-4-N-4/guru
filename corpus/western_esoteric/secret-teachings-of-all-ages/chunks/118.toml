body = "Augustine expresses it, 'If you join together the initial letters of the five Greek words, Ἰησοῦς Χριστος Θεου Υιὸσ Σωτήρ, which mean Jesus Christ, Son of God, Savior, they will make ΙΧΘΥΣ, Fish, in which word Christ is mystically understood, because He was able to live in the abyss of this mortality as in the depth of waters, that is, without sin.'\" ( Monumental Christianity .) Many Christians observe Friday, which is sacred to the Virgin (Venus), upon which day they shall eat fish and not meat.\n\nThe sign of the fish was one of the earliest symbols of Christianity; and when drawn upon the sand, it informed one Christian that another of the same faith was near.\n\nAquarius is called the Sign of the Water Bearer , or the man with a jug of water on his shoulder mentioned in the New Testament.\n\nThis is sometimes shown as an angelic figure, supposedly androgynous, either pouring water from an urn or carrying the vessel upon its shoulder.\n\nAmong Oriental peoples, a water vessel alone is often used.\n\nEdward Upham, in his History and Doctrine of Budhism , describes Aquarius as being \"in the shape of a pot and of a color between blue and yellow; this Sign is the single house of Saturn.\" When Herschel discovered the planet Uranus (sometimes called by the name of its discoverer), the second half of the sign of Aquarius was allotted to this added member of the planetary family.\n\nThe water pouring from the urn of Aquarius under the name of \"the waters of eternal life\" appears many times in symbolism.\n\nSo it is with all the signs.\n\nThus the sun in its path controls whatever form of worship man offers to the Supreme Deity.\n\nThere are two distinct systems of astrological philosophy.\n\nOne of them, the Ptolemaic, is geocentric: the earth is considered the center of the solar system, around which the sun, moon, and planets revolve.\n\nAstronomically, the geocentric system is incorrect; but for thousands of years it has proved its accuracy when applied to the material nature of earthly things.\n\nA careful consideration of the writings of the great occultists and a study of their diagrams reveal the fact that many of them were acquainted with another method of arranging the heavenly bodies.\n\nThe other system of astrological philosophy is called the heliocentric.\n\nThis posits the sun in the center of the solar system, where it naturally belongs, with the planets and their moons revolving about it.\n\nThe great difficulty, however, with the heliocentric system is that, being comparatively new, there has not been sufficient time to experiment successfully and catalogue the effects of its various aspects and relationships.\n\nGeocentric astrology, as its name implies, is confined to the earthy side of nature, while heliocentric astrology may be used to analyze the higher intellectual and spiritual faculties of man.\n\nThe important point to be remembered is that when the sun was said to be in a certain sign of the zodiac, the ancients really meant that the sun occupied the opposite sign and cast its long ray into the house in which they enthroned it.\n\nTherefore, when it is said that the sun is in Taurus, it means (astronomically) that the sun is in the sign opposite to Taurus, which is Scorpio.\n\nThis resulted in two distinct schools of philosophy: one geocentric and exoteric, the other heliocentric and esoteric."

