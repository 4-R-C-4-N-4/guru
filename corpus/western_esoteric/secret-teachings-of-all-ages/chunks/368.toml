body = "Von Welling gives no reason for the change in the order of influx into the twelve orders of spirits, for the third world, for the adding of another circle and the interlaced triangles in the upper world, or for the letters Y and Z.\n\nTable III, Figure 52 *** In the upper triangle, A represents the Father Principle, F the divine outflow, G the point of influx into the twelve orders of spirits (probably Sagittarius).\n\nThe letters H , I , J , K , L , M , N , O , P , Q , S , and T denote the sequential points of irradiations to each other; W and X , the World of the Sons of God; and B , C , D , and E , the World of Lucifer.\n\nThis plate shows the universe after the descent of Lucifer into matter.\n\nAccording to von Welling, when Lucifer wanted to control power, the influx of the divine light instantly ceased.\n\nLucifer's world (which later became the solar system), with all its legions of spirits (who in their essence were Schamayim) reflecting his ideas and inverting the divine light, was turned into darkness.\n\nLucifer's Schamayim thereupon became a contracted disc, a tangible substance; and Chaos came into existence.\n\nTABLE VI, Figures 55-59 .\n\nFigure 55 symbolizes the Chaos of Lucifer; Figure 56, the separation of light from darkness; Figure 57, the light in the midst of the darkness; and Figure 58, the regions of the elements and their inhabitants.\n\nThe four A 's signify the Abyss surrounding all things.\n\nThe A B is the fiery throne of Lucifer.\n\nThe plane of g is the subterranean air; f , the subterranean water; c , the earth region; d , the outer water; e , the outer air, W and X the region of Schamayim.\n\nTable IV, Figure 53 *** The elemental inhabitants of the planes differ in goodness according to their proximity to the center of wickedness ( A B ).\n\nThe earth's surface ( c ) divides the subterranean elementals from those of the outer water, air, and fire ( d , c , and X ).\n\nThe elementals of the upper strata (the upper half of c , and all of d , e , and X ) represent an ascending scale of virtue, while those of the lower strata (the lower half of c , and all of f , g , and A B ) represent a descending scale of depravity.\n\nThe region of air ( e ) is a partial exception to this order.\n\nWhile air is close to the light and filled with beautiful spirits, it is also the habitation of Beelzebub, the Evil Spirit of the air, with his legion of elemental demons.\n\nUpon the subtle element of air are impressed the influences of the stars; the thoughts, words, and deeds of man; and a myriad of mysterious influences from the various planes of Nature.\n\nMan inhales these impressions, and they produce diverse effects upon his mind.\n\nTable V, Figure 54 *** In air are suspended also the seed germs by which water is impregnated and made capable of bringing forth forms of organic and inorganic life.\n\nThe grotesque figures seen in crystal caves and frost pictures upon windows are caused by these aerial impressions.\n\nWhile the air elementals are great and wise, they are treacherous and confused because amenable to both good and evil impressions.\n\nThe mighty elemental beings who inhabit the watery light fire of the region X cannot be deceived by the spirits of darkness.\n\nThey love the creatures of the waters, for the watery element ( d ) proceeded from the fiery water ( X ).\n\nMortal man cannot endure the society of these fiery spirits, but gains wisdom from them through the creatures of the waters in which they continually mirror themselves."

