body = "This feast was formerly called the feast of the Passage of the Virgin (Beausobre, tome i.\n\np.\n\n350); and in the Library of the Fathers (Bibl.\n\nPart.\n\nvol.\n\nII.\n\npart ii.\n\np.\n\n212) we have an account of the Passage of the Blessed Virgin.\n\nThe ancient Greeks and Romans fix the assumption of Astraea, who is also this same Virgin, on that day.\" This Virgin mother, giving birth to the Sun God which Christianity has so faithfully preserved, is a reminder of the inscription concerning her Egyptian prototype, Isis, which appeared on the Temple of Sais: \" The fruit which I have brought forth is the Sun .\" While the Virgin was associated with the moon by the early pagans, there is no doubt that they also understood her position as a constellation in the heavens, for nearly all the peoples of antiquity credit her as being the mother of the sun, and they realized that although the moon could not occupy that position, the sign of Virgo could, and did, give birth to the sun out of her side on the 25th day of December.\n\nAlbertus Magnus states, \"We know that the sign of the Celestial Virgin rose over the Horizon at the moment at which we fix the birth of our Lord Jesus Christ.\n\nAmong certain of the Arabian and Persian astronomers the three stars forming the sword belt of Orion were called the Magi who came to pay homage to the young Sun God.\n\nThe author of Mankind--Their Origin and Destiny contributes the following additional information: \"In Cancer, which had risen to the meridian at midnight, is the constellation of the Stable and of the Ass.\n\nThe ancients called it Præsepe Jovis.\n\nIn the north the stars of the Bear are seen, called by the Arabians Martha and Mary, and also the coffin of Lazarus.\n\n\"Thus the esotericism of pagandom was embodied in Christianity, although its keys are lost.\n\nThe Christian church blindly follows ancient customs, and when asked for a reason gives superficial and unsatisfactory explanations, either forgetting or ignoring the indisputable fact that each religion is based upon the secret doctrines of its predecessor.\n\nTHE THREE SUNS.\n\nFrom Lilly's Astrological Predictions for 1648, 1649, and 1650.) The following description of this phenomenon appears in a letter written by Jeremiah Shakerley in Lancashire, March 4th, 1648:--\"On Monday the 28th of February last, there arose with the Sun two Parelii, on either side one; their distance from him was by estimation, about ten degrees; they continued still of the same distance from the Zenith, or height above the Horizon, that the Sun did; and from the parts averse to the Sun, there seemed to issue out certain bright rays, not unlike those which the Sun sendeth from behind a cloud, but brighter.\n\nThe parts of these Parelii which were toward the Sun, were of a mixt colour, wherein green and red were most predominant.\n\nA little above them was a thin rainbow, scarcely discernible, of a bright colour, with the concave towards the Sun, and the ends thereof seeming to touch the Parelii: Above that, in a clear diaphanous ayr, [air], appeared another conspicuous Rainbow, beautified with divers colours; it was as neer as I could discern to the Zenith; it seemed of something a lesser radius than the other, they being back to back, yet a pretty way between.\n\nAt or neer the apparent time of the full Moon, they vanished, leaving abundance of terror and amazement in those that saw them.\n\n(See William Lilly.) *** THE THREE SUNS The solar orb, like the nature of man, was divided by the ancient sages into three separate bodies."

