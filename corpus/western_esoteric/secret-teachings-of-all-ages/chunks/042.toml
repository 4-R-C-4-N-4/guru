[content]
body = "Clement of Alexandria describes a figure of Serapis compounded from the following elements: First, filings of gold, silver, lead, and tin; second, all manner of Egyptian stones, including sapphires, hematites, emeralds, and topazes; all these being ground down and mixed together with the coloring matter left over from the funeral of Osiris and Apis.\n\nThe result was a rare and curious figure, indigo in color.\n\nSome of the statues of Serapis must have been formed of extremely hard substances, for when a Christian soldier, carrying out the edict of Theodosius, struck the Alexandrian Serapis with his ax, that instrument was shattered into fragments and sparks flew from it.\n\nIt is also quite probable that Serapis was worshiped in the form of a serpent, in common with many of the higher deities of the Egyptian and Greek pantheons.\n\nSerapis was called Theon Heptagrammaton , or the god with the name of seven letters.\n\nThe name Serapis (like Abraxas and Mithras) contains seven letters.\n\nIn their hymns to Serapis the priests chanted the seven vowels.\n\nOccasionally Serapis is depicted with horns or a coronet of seven rays.\n\nThese evidently represented the seven divine intelligences manifesting through the solar light.\n\nThe Encyclopædia Britannica notes that the earliest authentic mention of Serapis is in connection with the death of Alexander.\n\nSuch was the prestige of Serapis that he alone of the gods was consulted in behalf of the dying king.\n\nThe Egyptian secret school of philosophy was divided into the Lesser and the Greater Mysteries, the former being sacred to Isis and the latter to Serapis and Osiris.\n\nWilkinson is of the opinion that only the priests were permitted to enter the Greater Mysteries.\n\nEven the heir to the throne was not eligible until he had been crowned Pharaoh, when, by virtue of his kingly office, he automatically became a priest and the temporal head of the state religion.\n\n(See Wilkinson's Manners and Customs of the Egyptians .) A limited number were admitted into the Greater Mysteries: these preserved their secrets inviolate.\n\nMuch of the information concerning the rituals of the higher degrees of the Egyptian Mysteries has been gleaned from an examination of the chambers and passageways in which the initiations were given.\n\nUnder the temple of Serapis destroyed by Theodosius were found strange mechanical contrivances constructed by the priests in the subterranean crypts and caverns where the nocturnal initiatory rites were celebrated.\n\nThese machines indicate the severe tests of moral and physical courage undergone by the candidates.\n\nAfter passing through these tortuous ways, the neophytes who Survived the ordeals were ushered into the presence of Serapis, a noble and awe-inspiring figure illumined by unseen lights.\n\nLabyrinths were also a striking feature in connection with the Rice of Serapis, and E.\n\nA.\n\nWallis Budge, in his Gods of the Egyptians , depicts Serapis(Minotaur-like) with the body of a man and the head of a bull.\n\nLabyrinths were symbolic of the involvements and illusions of the lower world through which wanders the soul of man in its search for truth.\n\nIn the labyrinth dwells the lower animal man with the head of the bull, who seeks to destroy the soul entangled in the maze of worldly ignorance.\n\nIn this relation Serapis becomes the Tryer or Adversary who tests the souls of those seeking union with the Immortals.\n\nThe maze was also doubtless used to represent the solar system, the Bull-Man representing the sun dwelling in the mystic maze of its planets, moons, and asteroids.\n\nThe Gnostic Mysteries were acquainted with the arcane meaning of Serapis, and through the medium of Gnosticism this god became inextricably associated with early Christianity."

