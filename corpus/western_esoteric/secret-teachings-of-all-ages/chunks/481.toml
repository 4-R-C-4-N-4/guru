[content]
body = "In the heavens above the twenty-four elders with their harps and censers bow before the throne of the Ancient One, from whose hand the Lamb is taking the book sealed with seven seals.\n\nThe seven spirit, of God, in the form of cups from which issue tongues of fire, surround the head of the Ancient One, and the four beasts (the cherubim) kneel at the corners of His throne.\n\nIn the upper left-hand corner are shown the seven angels bearing the trumpets and also the altar of God and the angel with the censer.\n\nIn the upper right are the spirits of the winds; below them is the virgin clothed wit h the sun, to whom wings were given that she might fly into the wilderness.\n\nTo her right is a scene representing the spirits of God hurling the evil serpent into the bottomless pit.\n\nAt the lower left St.\n\nJohn is shown receiving from the angelic figure, whose legs are pillars of fire and whose face is a shining sun, the little book which he is told to eat if he would understand the mysteries of the spiritual life.\n\nThe plate also contains a number of other symbols, including episodes from the destruction of the world and the crystal sea pouring forth from the throne of God.\n\nBy the presentation of such symbolic conceptions in the form of rituals and dramatic episodes the secrets of the Phrygian Mysteries were perpetuated.\n\nWhen these sacred pageantries were thus revealed to all mankind indiscriminately and each human soul was appointed it own initiator into the holy rite, of the philosophic life, a boon was conferred upon humanity which cannot be fully appreciated until men and women have grown more responsive to those mysteries which are of the spirit.\n\n*** The sixth to eleventh chapters inclusive are devoted to an account of the opening of the seven seals on the book held by the Lamb.\n\nWhen the first seal was broken, there rode forth a man on a white horse wearing a crown and holding in his hand a bow.\n\nWhen the second seal was broken, there rode forth a man upon a red horse and in his hand was a great sword.\n\nWhen the third seal was broken there rode forth a man upon a black horse and with a pair of balances in his hand.\n\nAnd when the fourth seal was broken there rode forth Death upon a pale horse and hell followed after him.\n\nThe four horsemen of the Apocalypse may be interpreted to signify the four main divisions of human life.\n\nBirth is represented by the rider on the white horse who comes forth conquering and to conquer; the impetuosity of youth by the rider on the red horse who took peace from the earth; maturity by the rider on the black horse who weighs all things in the scales of reason; and death by the rider on the pale horse who was given power over a fourth part of the earth.\n\nIn the Eastern philosophy these horsemen signify the four yugas , or ages, of the world which, riding forth at: their appointed times, become for a certain span the rulers of creation.\n\nCommenting on the twenty-fourth allocution of Chrysostom, in The Origin of all Religious Worship , Dupuis notes that each of the four elements was represented by a horse bearing the name of the god \"who is set over the element.\" The first horse, signifying the fire ether, was called Jupiter and occupied the highest place in the order of the elements.\n\nThis horse was winged, very fleet, and, describing the largest circle, encompassed all the others.\n\nIt shone with the purest light, and on its body were the images of the sun, the moon, the stars, and all the bodies in the ethereal regions.\n\nThe second horse, signifying the element of air, was Juno.\n\nIt was inferior to the horse of Jupiter and described a smaller circle; its color was black but that part exposed to the sun became luminous, thus signifying the diurnal and nocturnal conditions of air."

