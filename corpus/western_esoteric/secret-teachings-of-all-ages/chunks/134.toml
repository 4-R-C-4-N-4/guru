[content]
body = "The relation of these two zodiacs to the subzodiacal spheres has a correlation in the respiratory system of the human body.\n\nThe great fixed zodiac may be said to represent the atmosphere, the movable zodiac the lungs, and the subzodiacal worlds the body.\n\nThe spiritual atmosphere containing the vivifying energies of the twelve divine powers of the great fixed zodiac is inhaled by the cosmic lungs--the movable zodiac--and distributed by them through the constitution of the twelve holy animals which are the parts and members of the material universe.\n\nThe functional cycle is completed when the poisonous effluvia of the lower worlds collected by the movable zodiac are exhaled into the great fixed zodiac, there to be purified by being passed through the divine natures of its twelve eternal hierarchies.\n\nThe Table as a whole is susceptible of many interpretations.\n\nIf the border of the Table with its hieroglyphic figures be accepted as the spiritual source, then the throne in the center represents the physical body within which human nature is enthroned.\n\nFrom this point of view the entire Table becomes emblematic of the auric bodies of man, with the border as the outer extremity or shell of the auric egg .\n\nIf the throne be accepted as the symbol of the spiritual sphere, the border typifies the elements, and the various panels surrounding the central one become emblematic of the worlds or planes emanating from the one divine source.\n\nIf the Table be considered from a purely physical basis, the throne becomes symbolic of the generative system and the Table reveals the secret processes of embryology as applied to the formation of the material worlds.\n\nIf a purely physiological and anatomical interpretation be desired, the central throne becomes the heart, the Ibimorphous Triad the mind, the Nephtæan Triad the generative system, and the surrounding hieroglyphics the various parts and members of the human body.\n\nFrom the evolutionary viewpoint the central gate becomes the point of both entrance and exit.\n\nHere also is set forth the process of initiation, in which the candidate after passing successfully through the various ordeals is finally brought into the presence of his own soul, which he alone is capable of unveiling.\n\nIf cosmogony be the subject of consideration, the central panel represents the spiritual worlds, the upper panel the intellectual worlds, and the lower panel the material worlds.\n\nThe central panel may also symbolize the nine invisible worlds, and the creature marked T the physical nature--the footstool of Isis, the Spirit of Universal Life.\n\nConsidered in the light of alchemy, the central panel contains the metals and the borders the alchemical processes.\n\nThe figure seated on the throne is the Universal Mercury--the \"stone of the wise\"; the flaming canopy of the throne above is the Divine Sulphur; and the cube of earth beneath is the elemental salt.\n\nThe three triads--or the Paternal Foundation --in the central panel represent the Silent Watchers, the three invisible parts of the nature of man; the two panels on either side are the quaternary lower nature of man.\n\nIn the central panel are 21 figures.\n\nThis number is sacred to the sun--which consists of three great powers, each with seven attributes--and by Qabbalistic reduction 21 becomes 3, or the Great Triad.\n\nIt will yet be proved that the Table of Isis is directly connected with Egyptian Gnosticism, for in a Gnostic papyrus preserved in the Bodleian Library there is a direct reference to the twelve Fathers or Paternities beneath whom are twelve Fountains.\n\n(See Egyptian Magic by S.S.D.D.) That the lower panel represents the underworld is further emphasized by the two gates--the great gate of the East and the great gate of the West--for in the Chaldean theology the sun rises and sets through gates in the underworld, where it wanders during the hours of darkness."

