body = "Nicephorus Callistus declared the Gospel according to St.\n\nJohn to have been discovered in a cavern under the Temple at Jerusalem, the volume having been secreted \"long anterior to the Christian æra.\" The existence of interpolated material in the fourth Gospel substantiates the belief that the work was originally written without any specific reference to the man Jesus , the statements therein accredited to Him being originally mystical discourses delivered by the personification of the Universal Mind.\n\nThe remaining Johannine writings--the Epistles and the Apocalypse--are enshrouded by a similar veil of mystery.\n\nBy Notarikon each letter of a word may become the initial character of a new word.\n\nThus from BRASHITH, first word in the book of Genesis, are extracted six words which mean that \"in the beginning the Elohim saw that Israel would accept the law.\" Mr.\n\nMacGregor-Mathers also gives six additional examples of Notarikon formed from the above word by Solomon Meir Ben Moses, a medieval Qabbalist.\n\nFrom the famous acrostic ascribed to the Erythræan Sibyl, St.\n\nAugustine derived the word ΙΧΘΥΣ, which by Notarikon was expanded into the phrase, \"Jesus Christ, Son of God, Savior.\" By another use of Notarikon, directly the reverse of the first, the initial, last, or middle letters of the words of a sentence may be joined together to form a new word or words.\n\nFor example, the name Amen, ἁμήν, maybe extracted from ארנימלרנאטז, \"the Lord is the faithful King.\" Because they had embodied these cryptic devices in their sacred writings, the ancient priests admonished their disciples never to translate, edit, or rewrite the contents of the sacred books.\n\n.\n\nUnder the general heading of Temurah several systems may be grouped and explained in which various letters are substituted for other letters according to prearranged tables or certain mathematical arrangements of letters, regular or irregular.\n\nThus the alphabet may be broken into two equal parts and written in horizontal lines so that the letters of the lower row can be exchanged for those of the upper row, or vice versa.\n\nBy this procedure the letters of the word Kuzu may be exchanged for those of IHVH, the Tetragrammaton .\n\nIn another form of Temurah the letters are merely rearranged., שתיהis the stone which is found in the center of the world, from which point the earth spread out on all sides.\n\nWhen broken in two the stone is שתיה, which means \"the placing of God.\"(See Pekudei Rakov , 71, 72.) Again, Temurah may consist of a simple anagram, as in the English word live , which reversed becomes evil .\n\nThe various systems of Temurah are among the most complicated and profound devices of the ancient Rabbins.\n\nAmong theological scholars there is a growing conviction that the hitherto accepted translations of the Scriptural writings do not adequately express the spirit of the original documents.\n\n\"After the first copy of the Book of God ,\" writes H.\n\nP.\n\nBlavatsky, \"has been edited and launched on the world by Hilkiah, this copy disappears, and Ezra has to make a new Bible, which Judas Maccabeus finishes; * * * when it was copied from the horned letters into square letters, it was corrupted beyond recognition; * * * the Masorah completed the work of destruction; finally, we have a text, not 900 years old, abounding with omissions, interpolations, and premeditated perversions.\" (See Isis Unveiled .) Prof."

