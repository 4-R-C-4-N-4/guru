body = "It is related that during his last sickness he rose one night and visited a burial ground on the outskirts of Medina, evidently believing that he, too, would soon be numbered with the dead.\n\nAt this time he told an attendant that the choice had been offered him of continuing his physical life or going to his Lord, and that he had chosen to meet his Maker.\n\nMohammed suffered greatly with his head and side and also from fever, but on June 8th seemed convalescent.\n\nHe joined his followers in prayer and, seating himself in the courtyard, delivered a lecture to the faithful in a clear and powerful voice.\n\nApparently he overtaxed his strength, for it was necessary to assist him into the house of A’isha, which opened into the court of the mosque.\n\nHere upon a tough pallet laid on the bare floor the prophet of Islam spent his last two hours on earth.\n\nWhen she saw that her aged husband was suffering intense pain, A’isha--then but a girl of twenty--lifting the gray head of the man she had known from infancy and who must have seemed more like a father than a husband, supported him in her arms until the end.\n\nFeeling that death was upon him, Mohammed prayed: \"O Lord, I beseech Thee, assist me in the agonies of death.\" Then almost in a whisper he repeated three times: \"Gabriel, come close unto me.\" (For details consult The Life of Mohammad by Sir William Muir.) In The Hero as Prophet , Thomas Carlyle writes thus of the death of Mohammed: \"His last words were a prayer, broken ejaculations of a heart struggling-up in trembling hope towards its Maker.\" Mohammed was buried under the floor of the apartment in which he died.\n\nThe present condition of the grave is thus described: \"Above the Hujrah is a green dome, surmounted by a large gilt crescent, springing from a series of globes.\n\nWithin the building are the tombs of Muhammad, Abū Bakr, and ’Umar, with a space reserved for the grave of our Lord Jesus Christ, who Muslims say will again visit the earth, and die and be buried at al-Madīnah.\n\nThe grave of Fātimah, the Prophet's daughter, is supposed to be in a separate part of the building, although some say she was buried in Baqī’.\n\nThe Prophet's body is said to be stretched full length on the right side, with the right palm supporting the right check, the face fronting Makkah.\n\nClose behind him is placed Abū Bakr, whose face fronts Muhammad's shoulder, and then ’Umar, who occupies the same position with respect to his predecessor.\n\nAmongst Christian historians there is a popular story to the effect that Muhammadans believed the coffin of their Prophet to be suspended in the air, which has no foundation whatever in Muslim literature, and Niebuhr thinks the story must have arisen from the rude pictures sold to strangers.\n\n(See A Dictionary of Islam .) Concerning the character of Mohammed there have been the grossest misconceptions.\n\nNo evidence exists to support the charges of extreme cruelty and licentiousness laid at his door.\n\nOn the other hand, the more closely the life of Mohammed is scrutinized by dispassionate investigators, the more apparent become the finer qualities of his nature.\n\nIn the words of Carlyle: \"Mahomet himself, after all that can be said about him, was nor, a sensual man.\n\nWe so err widely if we consider this man as a common voluptuary, intent mainly on base enjoyments--nay, on enjoyments of any kind.\n\nHis household was of the frugalest, his common diet barley bread and water.\n\nSometimes for months there was not a fire once lighted on his hearth.\n\n* * * A poor, hard-working, ill-provided man; careless of what vulgar man toiled for."

