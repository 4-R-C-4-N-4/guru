[content]
body = "It was also called unwearied, because, like God, it was tireless.\n\nThe Pythagoreans divided the heavenly bodies into ten orders.\n\nThey also stated that the decad perfected all numbers and comprehended within itself the nature of odd and even, moved and unmoved, good and ill.\n\nThey associated its power with the following deities: Atlas (for it carried the numbers on its shoulders), Urania, Mnemosyne, the Sun, Phanes, and the One God.\n\nThe decimal system can probably be traced back to the time when it was customary to reckon on the fingers, these being among the most primitive of calculating devices and still in use among many aboriginal peoples."

