[content]
body = "\"Yet,\" he adds, \"the Elementals are not spirits, because they have flesh, blood and bones; they live and propagate offspring; they cat and talk, act and sleep, &c., and consequently they cannot be properly called 'spirits.' They are beings occupying a place between men and spirits, resembling men and spirits, resembling men and women in their organization and form, and resembling spirits in the rapidity of their locomotion.\" ( Philosophia Occulta , translated by Franz Hartmann.) Later the same author calls these creatures composita , inasmuch as the substance out of which they are composed seems to be a composite of spirit and matter.\n\nHe uses color to explain the idea.\n\nThus, the mixture of blue and red gives purple, a new color, resembling neither of the others yet composed of both.\n\nSuch is the case with the Nature spirits; they resemble neither spiritual creatures nor material beings, yet are composed of the substance which we may call spiritual matter , or ether.\n\nA SALAMANDER, ACCORDING TO PARACELSUS.\n\nFrom Paracelsus' Auslegung von 30 magischen Figuren.\n\nThe Egyptians, Chaldeans, and Persians often mistook the salamanders for gods, because of their radiant splendor and great power.\n\nThe Greeks, following the example of earlier nations, deified the fire spirits and in their honor kept incense and altar fire, burning perpetually.\n\n*** Paracelsus further adds that whereas man is composed of several natures (spirit, soul, mind, and body) combined in one unit, the elemental has but one principle , the ether out of which it is composed and in which it lives.\n\nThe reader must remember that by ether is meant the spiritual essence of one of the four elements.\n\nThere areas many ethers as there are elements and as many distinct families of Nature spirits as there are ethers.\n\nThese families are completely isolated in their own ether and have no intercourse with the denizens of the other ethers; but, as man has within his own nature centers of consciousness sensitive to the impulses of all the four ethers, it is possible for any of the elemental kingdoms to communicate with him under proper conditions.\n\nThe Nature spirits cannot be destroyed by the grosser elements, such as material fire, earth, air, or water, for they function in a rate of vibration higher than that of earthy substances.\n\nBeing composed of only one element or principle (the ether in which they function), they have no immortal spirit and at death merely disintegrate back into the element from which they were originally individualized.\n\nNo individual consciousness is preserved after death, for there is no superior vehicle present to contain it.\n\nBeing made of but one substance, there is no friction between vehicles: thus there is little wear or tear incurred by their bodily functions, and they therefore live to great age.\n\nThose composed of earth ether are the shortest lived; those composed of air ether, the longest.\n\nThe average length of life is between three hundred and a thousand years.\n\nParacelsus maintained that they live in conditions similar to our earth environments, and are somewhat subject to disease.\n\nThese creatures are thought to be incapable of spiritual development, but most of them are of a high moral character.\n\nConcerning the elemental ethers in which the Nature spirits exist, Paracelsus wrote: \"They live in the four elements: the Nymphæ in the element of water, the Sylphes in that of the air, the Pigmies in the earth, and the Salamanders in fire.\n\nThey are also called Undinæ, Sylvestres, Gnomi, Vulcani, &c."

