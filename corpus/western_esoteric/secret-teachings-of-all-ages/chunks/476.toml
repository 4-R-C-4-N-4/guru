[content]
body = "The figure is nailed to the cross, which symbolizes the death and surrender of the self-will, and that it should not attempt to accomplish anything by its own power, but merely serve as an instrument wherein the Divine will is executed.\n\nAbove the head are inscribed the letters: I.\n\nN.\n\nR.\n\nJ.\n\nwhose most important meaning is: In Nobis Regnat Jesus (Within ourselves reigns Jesus).\n\nBut this signification of this inscription can be practically known only to those who have actually died relatively to the world of desires, and risen above the temptation for personal existence; or, to express it in other words, those who have become alive in Christ, and in whom thus the kingdom of Jesus (the holy love-will issuing from the heart of God) has been established.\" One of the most interesting interpretations of the crucifixion allegory is that which identifies the man Jesus with the personal consciousness of the individual.\n\nIt is this personal consciousness that conceives of and dwells in the sense of separateness, and before the aspiring soul can be reunited with the ever-present and all-pervading Father this personality must be sacrificed that the Universal Consciousness may be liberated."

