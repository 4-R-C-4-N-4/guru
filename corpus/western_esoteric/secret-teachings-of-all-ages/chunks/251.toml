body = "The words about the circle are the names of the invisible intelligences, and the small crosses mark points at which certain prayers and invocations are recited.\n\nThe small circle outside is prepared for the spirit to be invoked, and while in use has the signature of the desired intelligence traced within the triangle.\n\n*** MODUS OPERANDI FOR THE INVOCATION OF SPIRITS The following condensed extract from an ancient manuscript is reproduced herewith as representative of the ritualism of ceremonial magic.\n\nThe extract is from The Complete Book of Magic Science , an unpublished manuscript (original in the British Museum), with pentacles in colors, mentioned by Francis Barrett in his Magus .\n\n\" Opening Prayer \"Omnipotent and Eternal God who hath ordained the whole creation for thy praise and glory and for the salvation of man, I earnestly beseech thee that thou wouldst send one of thy spirits of the order of Jupiter, one of the messengers of Zadkiel whom thou hast appointed governor of thy firmament at the present time, most faithfully, willingly, and readily to show me these things which I shall ask, command or require of him, and truly execute my desires.\n\nNevertheless, O Most Holy God, thy will and not mine be done through JC, thine only begotten Son our Lord.\n\nAmen.\n\n\" The Invocation .\n\n[The magician, having properly consecrated his vestments and utensils and being protected by his circle, now calls upon the spirits to appear and accede to his demands.] \"Spirits, whose assistance I require, behold the sign and the very Hallowed Names of God full of power.\n\nObey the power of this our pentacle; go out your hidden caves and dark places; cease your hurtful occupations to those unhappy mortals whom without ceasing you torment; come into this place where the Divine Goodness has assembled us; be attentive to our orders and known to our just demands; believe not that your resistance will cause us to abandon our operations.\n\nNothing can dispense with your obeying us.\n\nWe command you by the Mysterious Names Elohe Agla Elohim Adonay Gibort .\n\nAmen.\n\n\"I call upon thee, Zadkiel, in the Name of the Father, and of the Son, and of the Holy Ghost, blessed Trinity, unspeakable Unity.\n\n\"I invoke and intreat thee, Zadkiel, in this hour to attend to the words and conjurations which I shall use this day by the Holy Names of God Elohe El Elohim Elion Zebaoth Escerehie Iah Adonay Tetragrammaton .\n\n\"I conjure thee, I exorcise thee, thou Spirit Zadkiel , by these Holy Names Hagios O Theos Iscyros Athanatos Paracletus Agla on Alpha et Omega Ioth Aglanbroth Abiel Anathiel Tetragrammaton : And by all other great and glorious, holy and unspeakable, mysterious, mighty, powerful, incomprehensible Names of God, that you attend unto the words of my mouth, and send unto me Pabiel or other of your ministering, serving Spirits, who may show me such things as I shall demand of him in the Name of the Father, and of the Son, and of the Holy Ghost.\n\nAmen."

