[content]
body = "The feast over, the young King, holding in his hand the little black book from the altar, asked the guests if they would all be true to him through prosperity and adversity, and when they tremblingly agreed he asked that each should sign his name in the little black book as proof of his fealty.\n\nThe royal persons then drank from the little crystal fountain, the others afterwards doing likewise.\n\nThis was called the \"Draught of Silence.\" The royal persons then sadly shook hands with all present.\n\nSuddenly a little bell tinkled and immediately the kings and queens took off their white garments and donned black ones, the room was hung in sable draperies, and the tables were removed.\n\nThe eyes of the royal persons were bound with six black taffeta scarfs and six coffins were placed in the center of the room.\n\nAn executioner, a Moor, robed in black and bearing an axe, entered, and beheaded in turn each of the six royal persons.\n\nThe blood of each was caught in a golden goblet, which was placed in the coffins with the body.\n\nThe executioner was also decapitated and his head placed in a small chest.\n\nThe Virgo Lucifera , after assuring C.R.C.\n\nand his companions that all should be well if they were faithful and true, ordered the pages to conduct them to their rooms for the night while she remained to watch with the dead.\n\nAbout midnight C.R.C.\n\nawakened suddenly and, looking from his window, beheld seven ships sailing upon a lake.\n\nAbove each hovered a flame; these he believed to be the spirits of the beheaded.\n\nWhen the ships reached shore, the Virgo Lucifera met them and on each of six of the vessels was placed a covered coffin.\n\nAs soon as the coffins had been thus disposed of, the lights were extinguished and the flames passed back over the lake so that there remained but one light for a watch in each ship.\n\nAfter beholding this strange ceremony, C.R.C.\n\nreturned to his bed and slept till morning.\n\nTHE FIFTH DAY Rising at daybreak and entreating his page to show him other treasures of the palace, C.R.C.\n\nwas conducted down many steps to a great iron door bearing a curious inscription, which he carefully copied.\n\nPassing through, he found himself in the royal treasury, the light in which came entirely from some huge carbuncles.\n\nIn the center stood the triangular sepulcher of Lady Venus.\n\nLifting a copper door in the pavement, the page ushered C.R.C.\n\ninto a crypt where stood a great bed upon which, when his guide had raised the coverlets, C.R.C.\n\nbeheld the body of Venus.\n\nLed by his page, C.R.C.\n\nthen rejoined his companions, saying nothing to them of his experience.\n\nVirgo Lucifera , robed in black velvet and accompanied by her virgins, then led the guests out into the courtyard where stood six coffins, each with eight pallbearers.\n\nC.R.C.\n\nwas the only one of the group of \"artists\" who suspected the royal bodies were no longer in these coffins.\n\nThe coffins were lowered into graves and great stones rolled over them.\n\nThe Virgo Lucifera then made a short oration in which she exhorted each to assist in restoring the royal persons to life, declaring that they should journey with her to the Tower of Olympus, where the medicines necessary to the resurrection of the six royal persons could alone be found.\n\nC.R.C.\n\nand his companions followed Virgo Lucifera to the seashore, where all embarked on seven ships disposed according to a certain strange order.\n\nAs the ships sailed across the lake and through a narrow channel into the open sea, they were attended by sirens, nymphs, and sea goddesses, who in honor of the wedding presented a great and beautiful pearl to the royal couple."

