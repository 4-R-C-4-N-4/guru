[content]
body = "The Greeks sacrificed a rooster to the gods at the time of entering the Eleusinian Mysteries.\n\nSir Francis Bacon is supposed to have died as the result of stuffing a fowl with snow.\n\nMay this not signify Bacon's initiation into the pagan Mysteries which still existed in his day?\n\nBoth the peacock and the ibis were objects of veneration because they destroyed the poisonous reptiles which were popularly regarded as the emissaries of the infernal gods.\n\nBecause of the myriad of eyes in its tail feathers the peacock was accepted as the symbol of wisdom, and on account of its general appearance it was often confused with the fabled phœnix of the Mysteries.\n\nThere is a curious belief that the flesh of the peacock will not putrefy even though kept for a considerable time.\n\nAs an outgrowth of this belief the peacock became the emblem of immortality, because the spiritual nature of man--like the flesh of this bird--is incorruptible.\n\nThe Egyptians paid divine honors to the ibis and it was a cardinal crime to kill one, even by accident.\n\nIt was asserted that the ibis could live only in Egypt and that if transported to a foreign country it would die of grief.\n\nThe Egyptians declared this bird to be the preserver of crops and especially worthy of veneration because it drove out the winged serpents of Libya which the wind blew into Egypt.\n\nThe ibis was sacred to Thoth, and when its head and neck were tucked under its wing its body closely resembled a human heart.\n\n(See Montfaucon's Antiquities .) The black and white ibis was sacred to the moon; but all forms were revered because they destroyed crocodile eggs, the crocodile being a symbol of the detested Typhon.\n\nNocturnal birds were appropriate symbols of both sorcery and the secret divine sciences: sorcery because black magic cannot function in the light of truth (day) and is powerful only when surrounded by ignorance (night); and the divine sciences because those possessing the arcana are able to see through the darkness of ignorance and materiality.\n\nOwls and bats were consequently often associated with either witchcraft or wisdom.\n\nThe goose was an emblem of the first primitive substance or condition from which and within which the worlds were fashioned.\n\nIn the Mysteries, the universe was likened to an egg which the Cosmic Goose had laid in space.\n\nBecause of its blackness the crow was the symbol of chaos or the chaotic darkness preceding the light of creation.\n\nThe grace and purity of the swan were emblematic of the spiritual grace and purity of the initiate.\n\nThis bird also represented the Mysteries which unfolded these qualities in humanity.\n\nThis explains the allegories of the gods (the secret wisdom) incarnating in the body of a swan (the initiate).\n\nBeing scavengers, the vulture, the buzzard, and the condor signified that form of divine power which by disposing of refuse and other matter dangerous to the life and health of humanity cleanses and purifies the lower spheres.\n\nThese birds were therefore adopted as symbols of the disintegrative processes which accomplish good while apparently destroying, and by some religions have been mistakenly regarded as evil.\n\nBirds such as the parrot and raven were accorded veneration because, being able to mimic the human voice, they were looked upon as links between the human and animal kingdoms.\n\nThe dove, accepted by Christianity as the emblem of the Holy Ghost, is an extremely ancient and highly revered pagan yonic emblem.\n\nIn many of the ancient Mysteries it represented the third person of the Creative Triad, or the Fabricator of the world.\n\nAs the lower worlds were brought into existence through a generative process, so the dove has been associated with those deities identified with the procreative functions."

