[content]
body = "The serpent mounds of the American Indian; the carved-stone snakes of Central and South America; the hooded cobras of India; Python, the great snake o the Greeks; the sacred serpents of the Druids; the Midgard snake of Scandinavia; the Nagas of Burma, Siam, and Cambodia; the brazen serpent of the Jews; the mystic serpent of Orpheus; the snakes at the oracle; of Delphi twining themselves around the tripod upon which the Pythian priestess sat, the tripod itself being in the form of twisted serpents; the sacred serpents preserved in the Egyptian temples; the Uræus coiled upon the foreheads of the Pharaohs and priests;--all these bear witness to the universal veneration in which the snake was held.\n\nIn the ancient Mysteries the serpent entwining a staff was the symbol of the physician.\n\nThe serpent-wound staff of Hermes remains the emblem of the medical profession.\n\nAmong nearly all these ancient peoples the serpent was accepted as the symbol of wisdom or salvation.\n\nThe antipathy which Christendom feels towards the snake is based upon the little-understood allegory of the Garden of Eden.\n\nThe serpent is true to the principle of wisdom, for it tempts man to the knowledge of himself.\n\nTherefore the knowledge of self resulted from man's disobedience to the Demiurgus , Jehovah.\n\nHow the serpent came to be in the garden of the Lord after God had declared that all creatures which He had made during the six days of creation were good has not been satisfactorily answered by the interpreters of Scripture.\n\nThe tree that grows in the midst of the garden is the spinal fire; the knowledge of the use of that spinal fire is the gift of the great serpent.\n\nNotwithstanding statements to the contrary, the serpent is the symbol and prototype of the Universal Savior, who redeems the worlds by giving creation the knowledge of itself and the realization of good and evil.\n\nIf this be not so, why did Moses raise a brazen serpent upon a cross in the wilderness that all who looked upon it might be saved from the sting of the lesser snakes?\n\nWas not the brazen serpent a prophecy of the crucified Man to come?\n\nIf the serpent be only a thing of evil, why did Christ instruct His disciples to be as wise as serpents?\n\nTHE SCORPION TALISMAN.\n\nFrom Paracelsus' Archidoxes Magica.\n\nThe scorpion often appears upon the talismans and charms of the Middle Ages.\n\nThis hieroglyphic Arachnida was supposed to have the power of curing disease.\n\nThe scorpion shown above was composed of several metals, and was made under certain planetary configurations.\n\nParacelsus advised that it be worn by those suffering from any derangement of the reproductive system.\n\n*** The accepted theory that the serpent is evil cannot be substantiated.\n\nIt has long been viewed as the emblem of immortality.\n\nIt is the symbol of reincarnation, or metempsychosis, because it annually sheds its skin, reappearing, as it were, in a new body.\n\nThere is an ancient superstition to the effect that snakes never die except by violence and that, if uninjured, they would live forever.\n\nIt was also believed that snakes swallowed themselves, and this resulted in their being considered emblematic of the Supreme Creator, who periodically reabsorbed His universe back into Himself.\n\nIn Isis Unveiled , H.\n\nP.\n\nBlavatsky makes this significant statement concerning the origin of serpent worship: \"Before our globe had become egg-shaped or round it was a long trail of cosmic dust or fire-mist, moving and writhing like a serpent."

