body = "The rose as a religious emblem is of great antiquity.\n\nIt was accepted by the Greeks as the symbol of the sunrise, or of the coming of dawn.\n\nIn his Metamorphosis, or Golden Ass, Apuleius, turned into a donkey because of his foolishness, regained his human shape by eating a sacred rose given to him by the Egyptian priests.\n\nThe presence of a hieroglyphic rose upon the escutcheon of Martin Luther has been the basis of much speculation as to whether any connection existed between his Reformation and the secret activities of the Rose Cross.\n\n*** One theory concerning the two Orders is to the effect that Freemasonry was an outgrowth of Rosicrucianism; in other words, that the \"Unknown Philosophers\" became known through an organization which they created to serve them in the material world.\n\nThe story goes on to relate that the Rosicrucian adepts became dissatisfied with their progeny and silently withdrew from the Masonic hierarchy, leaving behind their symbolism and allegories, but carrying away the keys by which the locked symbols could be made to give tip their secret meanings.\n\nSpeculators have gone so far as to state that, in their opinion, modern Freemasonry has completely absorbed Rosicrucianism and succeeded it as the world's greatest secret society.\n\nOther minds of equal learning declare that the Rosicrucian Brotherhood still exists, preserving its individuality as the result of having withdrawn from the Masonic Order.\n\nAccording to a widely accepted tradition, the headquarters of the Rosicrucian Order is near Carlsbad, in Austria (see Doctor Franz Hartmann).\n\nAnother version has it that a mysterious school, resembling in general principles the Rosicrucian Fraternity, which calls itself \"The Bohemian Brothers,\" still maintains its individuality in the Schwarzwald (Black Forest) of Germany.\n\nOne thing is certain: with the rise of Freemasonry, the Rosicrucian Order in Europe practically disappeared, and notwithstanding existing statements to the contrary, it is certain that the 18th degree (commonly known as the Rose-Croix) perpetuates many of the symbols of the Rosicrucian Fire Alchemists.\n\nIn an anonymous unpublished manuscript of the eighteenth century bearing the earmarks of Rosicrucian Qabbalism appears this statement: \"Yet will I now give the over-wise world a paradox to be solved, namely, that some illuminated men have undertaken to found Schools of Wisdom in Europe and these for some peculiar reason have called themselves Fratres Rosa: Crucis .\n\nBut soon afterwards came false schools into existence and corrupted the good intentions of these wise men.\n\nTherefore, the Order no longer exists as most people would understand existence, and as this Fraternity of the Seculo Fili call themselves Brothers of the Rosie Cross , so also will they in the Seculo Spiritus Sancti call themselves Brothers of the Lily Cross and the Knights of the White Lion .\n\nThen will the Schools of Wisdom begin again to blossom, but why the first one chose their name and why the others shall also choose theirs, only those can solve who have understanding grounded in Nature.\" Political aspirations of the Rosicrucians were expressed through the activities of Sir Francis Bacon, the Comte de St.-Germain, and the Comte di Cagliostro.\n\nThe last named is suspected of having been an emissary of the Knights Templars, a society deeply involved in transcendentalism, as Éliphas Lévi has noted.\n\nThere is a popular supposition to the effect that the Rosicrucians were at least partial instigators of the French Revolution.\n\n(Note particularly the introduction to Lord Bulwer-Lytton's Rosicrucian novel Zanoni .) THE THIRD POSTULATE The third theory takes the form of a sweeping denial of Rosicrucianism, asserting that the so-called original Order never had any foundation in fact but was entirely a product of imagination."

