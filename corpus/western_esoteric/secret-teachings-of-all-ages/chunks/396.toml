body = "The knowledge of Nature's secret operations constitutes the principal sense of all these ancient writings, but ignorance framed out of it that external or veiled mythology and the lower class of people turned it into idolatry.\n\nTHE KEY TO ALCHEMY ACCORDING TO THE EGYPTIANS.\n\nFrom Kircher's Œdipus Ægyptiacus.\n\nThe priests of Egypt not only used the scarab as a symbol of regeneration but also discovered in its habits many analogies to the secret process whereby base metals could be transmuted into gold.\n\nThey saw in the egg of the scarab the seed of the metals, and the above figure shows the path of this seed through the various planetary bodies until, finally reaching the center, it is perfected and then returns again to its source.\n\nThe words in the mall spiral at the top read: \"The spiral Progress of the mundane spirit.\" After the scarab has wound its way around the spiral to the center of the lower part of the figure, it returns to the upper world along the path bearing the words: \"Return of the spirit to the center of unity.\" *** \" The Genuine Translation from the Original Very Ancient Chaldee is as Follows : \"THE SECRET WORKS OF CHIRAM ONE IN ESSENCE, BUT THREE IN ASPECT.\n\n\"(The two first large words mean the Secret Work .) \"(The second line in large letters, reads: Chiram Telat Machasot, i.e.\n\nChiram the Universal Agent, One in Essence but three in aspect .) 'IT IS TRUE, NO LIE, CERTAIN, AND TO BE DEPENDED UPON, THE SUPERIOR AGREES WITH THE INFERIOR, AND THE INFERIOR WITH THE SUPERIOR, TO EFFECT THAT ONE TRULY WONDERFUL WORK.\n\nAS ALL THINGS OWE THEIR EXISTENCE TO THE WILL OF THE ONLY ONE , SO ALL THINGS OWE THEIR ORIGIN TO THE ONE ONLY THING , THE MOST HIDDEN, BY THE ARRANGEMENT OF THE ONLY GOD .\n\nTHE FATHER OF THAT ONE ONLY THING IS THE SUN , ITS MOTHER IS THE MOON , THE WIND CARRIES IT IN ITS BELLY; BUT ITS NOURSE IS A SPIRITUOUS EARTH .\n\nTHAT ONE ONLY THING (after God) IS THE FATHER OF ALL THINGS IN THE UNIVERSE.\n\nITS POWER IS PERFECT, AFTER IT HAS BEEN UNITED TO A SPIRITUOUS EARTH.\n\n\"(Process--First Distillation.) SEPARATE THAT SPIRITUOUS EARTH FROM THE DENSE OR CRUDE BY MEANS OF A GENTLE HEAT, WITH MUCH ATTENTION.\n\n\"(Last Digestion.) IN GREAT MEASURE IT ASCENDS FROM THE EARTH UP TO HEAVEN, AND DESCENDS AGAIN, NEWBORN, ON THE EARTH, AND THE SUPERIOR AND THE INFERIOR ARE INCREASED IN POWER.\n\nThe Azoth ascends from the Earth, from the bottom of the Glass, and redescends in Veins and drops into the Earth and by this continual circulation the Azoth is more and more subtilized, Volatilizes Sol and carries the volatilized Solar atoms along with it and thereby becomes a Solar Azoth , i.e.\n\nour third, and genuine Sophic Mercury , and this circulation of the Solar Azoth must continue until it ceases of itself, and the Earth has sucked it all in, when it muse become the black pitchy matter, the Toad [the substances in the alchemical retort and also the lower elements in the body of man], which denotes complete putrefaction or Death of the Compound .\n\n\"BY THIS THOU WILT PARTAKE OF THE HONOURS OF THE WHOLE WORLD."

