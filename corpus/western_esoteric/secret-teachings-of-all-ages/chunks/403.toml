[content]
body = "\"When you see it black set your glass as before to coagulate and when it begins to be of a grayish color and whitish, set it in a third time to putrefy, and coagulate to the fifth time, until you see that your water in its dissolution is clean, pellucid and clear, and that it appears in its Calcination of a fine white like Snow.\n\nThen it is prepared and becomes a Salt fixed which will melt on hot Silver plate like wax; but before you set this your Salt out, set it again [in] the furnace of putrefaction that it may dissolve of itself, then let it cool, open your Glass and you will find your Matter lessened a third part.\n\nBut instead of your former Salt Water you will have a fine Sweet and very penetrating Water which the Philosophers have hid under very wonderful Names--It is the Mercury of all true Philosophers, the Water out of which comes Gold and Silver, for they say its Father is Gold and its Mother is Silver.\n\nThus hast thou the strength of both these Luminaries conjoined in this Water, most true, in its right Pondus.\n\n\" Prescription .\n\n5 Drops of this Water taken inwardly strengthens the understanding and memory, and opens to us most wonderful and sweet things, of which no man hath heard, and of which I dare not further write, because of the Oath I made God to the contrary.\n\nTime and the holy use of this blessed Water will teach us, as soon as you have taken it inwardly such influence will happen to thee as if the whole heavens and all the stars with their powers are working in thee.\n\nAll Knowledge and secret Arts will be opened to thee as in a dream, but the most excellent of all is, you will perfectly learn rightly to know all creatures in their Nature, and by means thereof, the true understanding of God, the Creator of us, Heaven and Earth, like David and Moses and all the Saints of God, for the wisdom of our fountain of living Water will instruct thee as it did Solomon and the Brethren of our fraternity.\" In his rare treatise on Salt, Sulphur and Mercury , von Welling discloses a secret: not generally revealed in alchemical writings, namely, that the alchemists were concerned not only with the transmutation of metals but had a complete cosmological and philosophical system based upon the Qabbalah.\n\nAccording to von Welling, the universal salt (in watery form) is a positive cure for all the physical ailments of mankind; it is in every living thing, but from some things it is more easily secured than from others: especially is this true of virgin earth; it is the universal solvent, the alkahest.\n\nThe same writer also states that in the first stages of its preparation this salt will cure any and all diseases of the heart.\n\nThe anonymous philosopher of Leyden continues: \"Would you now proceed further with our blessed Water to the forementioned intention of preparing a Tincture for Metals, hearken my Son-- \"Take in the NAME of the Lord, of thy Paradisiacal Water, of heavenly Water of Mercury, as much as thou wilt, put it into a glass to dissolve, and set it in a slow heat of Ashes, that it may just feel the warmth, then have ready well purified Gold for the Red, or Silver for the White Elixir, for in both the Processes are the same.\n\nLet your Gold or Silver be beaten as thin as leaf Gold, cast it by degrees into your dissolving Glass, that contains your blessed Water, as you did in the beginning with your Salt, and it will melt like Ice in Warm Water, and continue so to do till your Gold or Silver lie therein four days without dissolving, then it has received its due Pondus."

