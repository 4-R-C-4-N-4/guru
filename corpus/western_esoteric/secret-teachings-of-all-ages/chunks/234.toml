body = "Trifoliate plants, such as the shamrock, were employed by many religious cults to represent the principle of the Trinity.\n\nSt.\n\nPatrick is supposed to have used the shamrock to illustrate this doctrine of the triune Divinity.\n\nThe reason for the additional sanctity conferred by a fourth leaf is that the fourth principle of the Trinity is man, and the presence of this leaf therefore signifies the redemption of humanity.\n\nWreaths were worn during initiation into the Mysteries and the reading of the sacred books to signify that these processes were consecrated to the deities.\n\nTHE TREE OF ALCHEMY.\n\nFrom Musæum Hermeticum Reformatum et Amplificatum.\n\nThe alchemists were went to symbolize their metals by means of a tree, to indicate that all seven were branches dependent upon the single trunk of solar life.\n\nAs the Seven Spirits depend upon God and are branches of a tree of which He is the root, trunk, and the spiritual earth from which the root derives its nourishment, so the single trunk of divine life and power nourishes all the multitudinous forms of which the universe is composed.\n\nIn Gloria Mundi, from which the above illustration is reproduced, there is contained an important thought concerning the plantlike growth of metals: \"All trees, herbs, stones, metals, and minerals grow and attain to perfection without being necessarily touched by any human hand: for the seed is raised up from the ground, puts forth flowers, and bears fruit, simply through the agency of natural influences.\n\nAs it is with plants, so it is with metals.\n\nWhile they lie in the heart of the earth, in their natural ore, they grow and are developed, day by day, through the influence of the four elements: their fire is the splendor of the Sun and Moon; the earth conceives in her womb the splendor of the Sun, and by it the seeds of the metals are well and equally warmed, just like the grain in the fields.\n\n* * * For as each tree of the field has its own peculiar shape, appearance, and fruit, so each mountain bears its own particular ore; those stones and that earth being the soil in which the metals grow.\" (See Translation of 1893.) *** On the symbolism of wreaths, Richard Payne Knight writes: \"Instead of beads, wreaths of foliage, generally of laurel, olive, myrtle, ivy, or oak, appear upon coins, sometimes encircling the symbolical figures, and sometimes as chaplets upon their heads.\n\nAll these were sacred to some peculiar personifications of the deity, and significant of some particular attributes, and, in general, all evergreens were Dionysiac planes; that is, symbols of the generative power, signifying perpetuity of youth and vigor, as the circles of beads and diadems signify perpetuity of existence.\n\n(See Symbolical Language of Ancient Art and Mythology .)"

