body = "Socrates subtly reminded his disciples that Death was, in reality, the great initiation, for his last words were: \"Crito, I owe a cock to Asclepius; will you remember to pay the debt?\" (As the rooster was sacred to the gods and the sacrifice of this bird accompanied a candidate's introduction into the Mysteries, Socrates implied that he was about to take his great initiation.) THE ANCIENT OF DAYS.\n\nFrom Montfaucon's Antiquities.\n\nIt is in this form that Jehovah is generally pictured by the Qabbalists.\n\nThe drawing is intended to represent the Demiurgus of the Greeks and Gnostics, called by the Greeks \"Zeus,\" the Immortal Mortal, and by the Hebrews \"IHVH.\" *** Life is the great mystery, and only those who pass successfully through its tests and trials, interpreting them aright and extracting the essence of experience therefrom, achieve true understanding.\n\nThus, the temples were built in the form of the world and their rituals were based upon life and its multitudinous problems.\n\nNor only was the Tabernacle itself patterned according to Egyptian mysticism; its utensils were also of ancient and accepted form.\n\nThe Ark of the Covenant itself was an adaptation of the Egyptian Ark, even to the kneeling figures upon its lid.\n\nBas-reliefs on the Temple of Philæ show Egyptian priests carrying their Ark--which closely resembled the Ark of the Jews--upon their shoulders by means of staves like those described in Exodus.\n\nThe following description of the Tabernacle and its priests is based upon the account of its construction and ceremonies recorded by Josephus in the Third Book of his Antiquities of the Jews .\n\nThe Bible references are from a \"Breeches\" Bible (famous for its rendering of the seventh verse of the third chapter of Genesis), printed in London in 1599, and the quotations are reproduced in their original spelling and punctuation.\n\nTHE BUILDING OF THE TABERNACLE Moses, speaking for Jehovah, the God of Israel, appointed two architects to superintend the building of the Tabernacle.\n\nThey were Besaleel, the son of Uri, of the tribe of Judah, and Aholiab, the son of Ahisamach, of the tribe of Dan.\n\nTheir popularity was so great that they were also the unanimous choice of the people.\n\nWhen Jacob upon his deathbed blessed his sons (see Genesis xlix), he assigned to each a symbol.\n\nThe symbol of Judah was a lion; that of Dan a serpent or a bird (possibly an eagle).\n\nThe lion and the eagle are two of the four beasts of the Cherubim (the fixed signs of the zodiac); and the Rosicrucian alchemists maintained that the mysterious Stone of the Wise (the Soul) was compounded with the aid of the Blood of the Red Lion and the Gluten of the White Eagle.\n\nIt seems probable that there is a hidden mystic relationship between fire (the Red Lion), water (the White Eagle), as they were used in occult chemistry, and the representatives of these two tribes whose symbols were identical with these alchemical elements.\n\nAs the Tabernacle was the dwelling place of God among men, likewise the soul body in man is the dwelling place of his divine nature, round which gathers a twelvefold material constitution in the same manner that the tribes of Israel camped about the enclosure sacred to Jehovah.\n\nThe idea that the Tabernacle was really symbolic of an invisible spiritual truth outside the comprehension of the Israelites is substantiated by a statement made in the eighth chapter of Hebrews: \"Who serve unto the paterne and shadowe of heavenly things, as Moses was warned by God, when he was about to finish the Tabernacle.\" Here we find the material physical place of worship called a \"shadow\" or symbol of a spiritual institution, invisible but omnipotent."

