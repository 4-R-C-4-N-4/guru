[content]
body = "Knowing only the body which is subject to death, they believe in death because they worship that substance which is the cause and reality of death.\" Then Hermes asked how the righteous and wise pass to God, to which Poimandres replied: \"That which the Word of God said, say I: 'Because the Father of all things consists of Life and Light, whereof man is made.' If, therefore, a man shall learn and understand the nature of Life and Light, then he shall pass into the eternity of Life and Light.\" Hermes next inquired about the road by which the wise attained to Life eternal, and Poimandres continued: \"Let the man endued with a Mind mark, consider, and learn of himself, and with the power of his Mind divide himself from his not-self and become a servant of Reality.\" Hermes asked if all men did not have Minds, and the Great Dragon replied: \"Take heed what you say, for I am the Mind--the Eternal Teacher.\n\nI am the Father of the Word --the Redeemer of all men--and in the nature of the wise the Word takes flesh.\n\nBy means of the Word, the world is saved.\n\nI, Thought (Thoth)--the Father of the Word, the Mind--come only unto men that are holy and good, pure and merciful, and that live piously and religiously, and my presence is an inspiration and a help to them, for when I come they immediately know all things and adore the Universal Father.\n\nBefore such wise and philosophic ones die, they learn to renounce their senses, knowing that these are the enemies of their immortal souls.\n\n\"I will not permit the evil senses to control the bodies of those who love me, nor will I allow evil emotions and evil thoughts to enter them.\n\nI become as a porter or doorkeeper, and shut out evil, protecting the wise from their own lower nature.\n\nBut to the wicked, the envious and the covetous, I come not, for such cannot understand the mysteries of Mind ; therefore, I am unwelcome.\n\nI leave them to the avenging demon that they are making in their own souls, for evil each day increases itself and torments man more sharply, and each evil deed adds to the evil deeds that are gone before until finally evil destroys itself.\n\nThe punishment of desire is the agony of unfulfillment.\" Hermes bowed his head in thankfulness to the Great Dragon who had taught him so much, and begged to hear more concerning the ultimate of the human soul.\n\nSo Poimandres resumed: \"At death the material body of man is returned to the elements from which it came, and the invisible divine man ascends to the source from whence he came, namely the Eighth Sphere .\n\nThe evil passes to the dwelling place of the demon, and the senses, feelings, desires, and body passions return to their source, namely the Seven Governors, whose natures in the lower man destroy but in the invisible spiritual man give life.\n\n\"After the lower nature has returned to the brutishness, the higher struggles again to regain its spiritual estate.\n\nIt ascends the seven Rings upon which sit the Seven Governors and returns to each their lower powers in this manner: Upon the first ring sits the Moon, and to it is returned the ability to increase and diminish.\n\nUpon the second ring sits Mercury, and to it are returned machinations, deceit, and craftiness.\n\nUpon the third ring sits Venus, and to it are returned the lusts and passions.\n\nUpon the fourth ring sits the Sun, and to this Lord are returned ambitions.\n\nUpon the fifth ring sits Mars, and to it are returned rashness and profane boldness.\n\nUpon the sixth ring sits Jupiter, and to it are returned the sense of accumulation and riches.\n\nAnd upon the seventh ring sits Saturn, at the Gate of Chaos, and to it are returned falsehood and evil plotting."

