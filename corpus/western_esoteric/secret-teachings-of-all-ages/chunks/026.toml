[content]
body = "He says, in part: \"It appears that all the perfection of civilization, and all the advancement made in philosophy, science, and art among the ancients are due to those institutions which, under the veil of mystery, sought to illustrate the sublimest truths of religion, morality, and virtue, and impress them on the hearts of their disciples.* * * Their chief object was to teach the doctrine of one God, the resurrection of man to eternal life, the dignity of the human soul, and to lead the people to see the shadow of the deity, in the beauty, magnificence, and splendor of the universe.\" With the decline of virtue, which has preceded the destruction of every nation of history, the Mysteries became perverted.\n\nSorcery took the place of the divine magic.\n\nIndescribable practices (such as the Bacchanalia) were introduced, and perversion ruled supreme; for no institution can be any better than the members of which it is composed.\n\nIn despair, the few who were true sought to preserve the secret doctrines from oblivion.\n\nIn some cases they succeeded, but more often the arcanum was lost and only the empty shell of the Mysteries remained.\n\nThomas Taylor has written, \"Man is naturally a religious animal.\" From the earliest dawning of his consciousness, man has worshiped and revered things as symbolic of the invisible, omnipresent, indescribable Thing , concerning which he could discover practically nothing.\n\nThe pagan Mysteries opposed the Christians during the early centuries of their church, declaring that the new faith (Christianity) did not demand virtue and integrity as requisites for salvation.\n\nCelsus expressed himself on the subject in the following caustic terms: \"That I do not, however, accuse the Christians more bitterly than truth compels, may be conjectured from hence, that the cryers who call men to other mysteries proclaim as follows: 'Let him approach whose hands are pure, and whose words are wise.' And again, others proclaim: 'Let him approach who is pure from all wickedness, whose soul is not conscious of any evil, and who leads a just and upright life.' And these things are proclaimed by those who promise a purification from error.\n\nLet us now hear who those are that are called to the Christian mysteries: Whoever is a sinner, whoever is unwise, whoever is a fool, and whoever, in short, is miserable, him the kingdom of God will receive.\n\nDo you not, therefore, call a sinner, an unjust man, a thief, a housebreaker, a wizard, one who is sacrilegious, and a robber of sepulchres?\n\nWhat other persons would the cryer nominate, who should call robbers together?\" It was not the true faith of the early Christian mystics that Celsus attacked, but the false forms that were creeping in even during his day.\n\nThe ideals of early Christianity were based upon the high moral standards of the pagan Mysteries, and the first Christians who met under the city of Rome used as their places of worship the subterranean temples of Mithras, from whose cult has been borrowed much of the sacerdotalism of the modem church.\n\nThe ancient philosophers believed that no man could live intelligently who did not have a fundamental knowledge of Nature and her laws.\n\nBefore man can obey, he must understand, and the Mysteries were devoted to instructing man concerning the operation of divine law in the terrestrial sphere.\n\nFew of the early cults actually worshiped anthropomorphic deities, although their symbolism might lead one to believe they did.\n\nThey were moralistic rather than religionistic; philosophic rather than theologic."

