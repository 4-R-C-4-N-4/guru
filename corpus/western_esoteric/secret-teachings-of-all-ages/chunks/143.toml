body = "The famous oracular dove of Dodona, alighting upon the branches of the sacred oaks, not only discoursed at length in the Greek tongue upon philosophy and religion, but also answered the queries of those who came from distant places to consult it.\n\nThe \"talking\" trees stood together, forming a sacred grove.\n\nWhen the priests desired answers to important questions, after careful and solemn purifications they retired to the grove.\n\nThey then accosted the trees, beseeching a reply from the god who dwelt therein.\n\nWhen they had stated their questions, the trees spoke with the voices of human beings, revealing to the priests the desired information.\n\nSome assert that there was but one tree which spoke--an oak or a beech standing in the very heart of the ancient grove.\n\nBecause Jupiter was believed to inhabit this tree he was sometimes called Phegonæus , or one who lives in a beech tree.\n\nMost curious of the oracles of Dodona were the \"talking\" vases, or kettles.\n\nThese were made of brass and so carefully fashioned that when struck they gave off sound for hours.\n\nSome writers have described a row of these vases and have declared that if one of them was struck its vibrations would be communicated to all the others and a terrifying din ensue.\n\nOther authors describe a large single vase, standing upon a pillar, near which stood another column, supporting the statue of a child holding a whip.\n\nAt the end of the whip were a number of swinging cords tipped with small metal balls, and the wind, which blew incessantly through the open building, caused the balls to strike against the vase.\n\nThe number and intensity of the impacts and the reverberations of the vase were all carefully noted, and the priests delivered their oracles accordingly.\n\nWhen the original priests of Dodona--the Selloi --mysteriously vanished, the oracle was served for many centuries by three priestesses who interpreted the vases and at midnight interrogated the sacred trees.\n\nThe patrons of the oracles were expected to bring offerings and to make contributions.\n\nAnother remarkable oracle was the Cave of Trophonius, which stood upon the side of a hill with an entrance so small that it seemed impossible for a human being to enter.\n\nAfter the consultant had made his offering at the statue of Trophonius and had donned the sanctified garments, he climbed the hill to the cave, carrying in one hand a cake of honey.\n\nSitting down at the edge of the opening, he lowered his feet into the cavern.\n\nThereupon his entire body was precipitately drawn into the cave, which was described by those who had entered it as having only the dimensions of a fair-sized oven.\n\nWhen the oracle had completed its revelation, the consultant, usually delirious, was forcibly ejected from the cave, feet foremost.\n\nTHE DODONEAN JUPITER.\n\nFrom Historia Deorum Fatidicorum.\n\nJupiter was called Dodonean after the city of Dodona in Epirus.\n\nNear this city was a hill thickly covered with oak trees which from the most ancient times had been sacred to Jupiter.\n\nThe grove was further venerated because dryads, fauns, satyrs, and nymphs were believed to dwell in its depths.\n\nFrom the ancient oaks and beeches were hung many chains of tiny bronze bells which tinkled day and night as the wind swayed the branches.\n\nSome assert that the celebrated talking dove of Dodona was in reality a woman, because in Thessaly both prophetesses and doves were called Peleiadas.\n\nIt is supposed that the first temple of Dodona was erected by Deucalion and those who survived the great flood with him.\n\nFor this reason the oracle at Dodona was considered the oldest in Greece.\n\n*** Near the cave of the oracle two fountains bubbled out of the earth within a few feet of each other."

