[content]
body = "Court de Gébelin sees in this card another reference to the rising of the Nile and states on the authority of Pausanius that the Egyptians believed the inundations of the Nile to result from the tears of the moon goddess which, falling into the river, swelled its flow.\n\nThese tears are seen dropping from the lunar face.\n\nCourt de Gébelin also relates the towers to the Pillars of Hercules, beyond which, according to the Egyptians, the luminaries never passed.\n\nHe notes also that the Egyptians represented the tropics as dogs who as faithful doorkeepers prevented the sun and moon from penetrating too near the poles.\n\nThe crab or crawfish signifies the retrograde motion of the moon.\n\nA CARD FROM THE MANTEGNA PACK.\n\nFrom Taylor's The History of Playing Cards.\n\nAmong the more curious examples of playing cards are those of the Mantegna deck.\n\nIn 1820, a perfect deck of fifty cards brought the then amazing price of eighty pounds.\n\nThe fifty subjects composing the Mantegna deck, each of which is represented by an appropriate figure, are: (1) A beggar; (2) A page; (3) A goldsmith; (4) A merchant; (5) A gentleman; (6) A knight; (7) The Doge; (8) A king; (9) An emperor, (10) The Pope; (11) Calliope; (12) Urania; (13) Terpsichore; (14) Erato; (15) Polyhymnia; (16) Thalia; (17) Melpomene; (18) Euterpe; (19) Clio; (20) Apollo; (21) Grammar, (22) Logic; (23) Rhetoric; (24) Geometry; (25) Arithmetic; (26) Music, (27) Poetry; (28) Philosophy; (29) Astrology; (30) Theology; (31) Astronomy; (32) Chronology (33) Cosmogony; (34) Temperance; (35) Prudence; (36) Fortitude; (37) Justice; (38) Charity; (39) Fortitude, (40) Faith; (41) the Moon; (42) Mercury; (43) Venus; (45) the Sun; (45) Mars; (46) Jupiter; (47) Saturn; (48) the eighth Sphere; (49) the Primum Mobile; (50) the First Cause.\n\nThe Qabbalistic significance of these cards is apparent, and it is possible that they have a direct analogy to the fifty gates of light referred to in Qabbalistic writings.\n\n*** This card also refers to the path of wisdom.\n\nMan in his quest of reality emerges from the pool of illusion.\n\nAfter mastering the guardians of the gates of wisdom he passes between the fortresses of science and theology and follows the winding path leading to spiritual liberation.\n\nHis way is faintly lighted by human reason (the moon), which is but a reflection of divine wisdom.\n\nIn the pseudo-Egyptian Tarot the towers are pyramids, the dogs are black and white respectively, and the moon is partly obscured by clouds.\n\nThe entire scene suggests the dreary and desolate place in which the Mystery dramas of the Lesser Rites were enacted.\n\nThe nineteenth numbered major trump is called Le Soleil , the Sun, and portrays two children--probably Gemini, the Twins--standing together in a garden surrounded by a magic ring of flowers.\n\nOne of these children should be shown as male and the other female.\n\nBehind them is a brick wall apparently enclosing the garden.\n\nAbove the wall the sun is rising, its rays alternately straight and curved."

