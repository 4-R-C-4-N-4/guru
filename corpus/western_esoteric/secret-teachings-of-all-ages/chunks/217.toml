[content]
body = "*** Although admitting that he had not seen the phœnix bird (there being only one alive at a time), Herodotus amplifies a bit the description given by Clement: \"They tell a story of what this bird does which does not seem to me to be credible: that he comes all the way from Arabia, and brings the parent bird, all plastered with myrrh, to the temple of the sun, and there buries the body.\n\nIn order to bring him, they say, he first forms a ball of myrrh as big as he finds that he can carry; then he hollows out the ball, and puts his parent inside; after which he covers over the opening with fresh myrrh, and the ball is then of exactly the same weight as at first; so he brings it to Egypt, plastered over as I have said, and deposits it in the temple of the sun.\n\nSuch is the story they tell of the doings of this bird.\" Both Herodotus and Pliny noted the general resemblance in shape between the phœnix and the eagle, a point which the reader should carefully consider, for it is reasonably certain that the modern Masonic eagle was originally a phœnix.\n\nThe body of the phœnix is described as having been covered with glossy purple feathers, while its long tail feathers were alternately blue and red.\n\nIts head was light in color and about its neck was a circlet of golden plumage.\n\nAt the back of its head the phœnix had a peculiar tuft of feathers , a fact quite evident, although it has been overlooked by most writers and symbolists.\n\nThe phœnix was regarded as sacred to the sun, and the length of its life (500 to 1000 years) was taken as a standard for measuring the motion of the heavenly bodies and also the cycles of time used in the Mysteries to designate the periods of existence.\n\nThe diet of the bird was unknown.\n\nSome writers declare that it subsisted upon the atmosphere; others that it ate at rare intervals but never in the presence of man.\n\nModern Masons should realize the special Masonic significance of the phœnix, for the bird is described as using sprigs of acacia in the manufacture of its nest.\n\nThe phœnix (which is the mythological Persian roc ) is also the name of a Southern constellation, and therefore it has both an astronomical and an astrological significance.\n\nIn all probability, the phœnix was the swan of the Greeks, the eagle of the Romans, and the peacock of the Far East.\n\nTo the ancient mystics the phœnix was a most appropriate symbol of the immortality of the human soul, for just as the phœnix was reborn out of its own dead self seven times seven, so again and again the spiritual nature of man rises triumphant from his dead physical body.\n\nMediæval Hermetists regarded the phœnix as a symbol of the accomplishment of alchemical transmutation, a process equivalent to human regeneration.\n\nThe name phœnix was also given to one of the secret alchemical formula.\n\nThe familiar pelican of the Rose Croix degree, feeding its young from its own breast, is in reality a phœnix, a fact which can be confirmed by an examination of the head of the bird.\n\nThe ungainly lower part of the pelican's beak is entirely missing, the head of the phœnix being far more like that of an eagle than of a pelican.\n\nIn the Mysteries it was customary to refer to initiates as phœnixes or men who had been born again , for just as physical birth gives man consciousness in the physical world, so the neophyte, after nine degrees in the womb of the Mysteries, was born into a consciousness of the Spiritual world."

