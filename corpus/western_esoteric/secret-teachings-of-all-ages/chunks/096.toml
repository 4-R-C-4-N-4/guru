[content]
body = "At one of her ears was the moon and at the other the sun, to indicate that these two were the agent and patient, or father and mother principles of all natural objects; and that Isis, or Nature, makes use of these two luminaries to communicate her powers to the whole empire of animals, vegetables, and minerals.\n\nOn the back of her neck were the characters of the planets and the signs of the zodiac which assisted the planets in their functions.\n\nThis signified that the heavenly influences directed the destinies of the principles and sperms of all things, because they were the governors of all sublunary bodies, which they transformed into little worlds made in the image of the greater universe.\n\nIsis holds in her right hand a small sailing ship with the spindle of a spinning wheel for its mast.\n\nFrom the top of the mast projects a water jug, its handle shaped like a serpent swelled with venom.\n\nThis indicates that Isis steers the bark of life, full of troubles and miseries, on the stormy ocean of Time.\n\nThe spindle symbolizes the fact that she spins and cuts the thread of Life.\n\nThese emblems further signify that Isis abounds in humidity, by means of which she nourishes all natural bodies, preserving them from the heat of the sun by humidifying them with nutritious moisture from the atmosphere.\n\nMoisture supports vegetation, but this subtle humidity (life ether) is always more or less infected by some venom proceeding from corruption or decay.\n\nIt must be purified by being brought into contact with the invisible cleansing fire of Nature.\n\nThis fire digests, perfects, and revitalizes this substance, in order that the humidity may become a universal medicine to heal and renew all the bodies in Nature.\n\nThe serpent throws off its skin annually and is thereby renewed (symbolic of the resurrection of the spiritual life from the material nature).\n\nThis renewal of the earth takes place every spring, when the vivifying spirit of the sun returns to the countries of the Northern Hemisphere, The symbolic Virgin carries in her left hand a sistrum and a cymbal, or square frame of metal, which when struck gives the key-note of Nature (Fa); sometimes also an olive branch, to indicate the harmony she preserves among natural things with her regenerating power.\n\nBy the processes of death and corruption she gives life to a number of creatures of diverse forms through periods of perpetual change.\n\nThe cymbal is made square instead of the usual triangular shape in order to symbolize that all things are transmuted and regenerated according to the harmony of the four elements.\n\nDr.\n\nSigismund Bacstrom believed that if a physician could establish harmony among the elements of earth, fire, air, and water, and unite them into a stone (the Philosopher's Stone) symbolized by the six-pointed star or two interlaced triangles, he would possess the means of healing all disease.\n\nDr.\n\nBacstrom further stated that there was no doubt in his mind that the universal, omnipresent fire (spirit) of Nature: \"does all and is all in all.\" By attraction, repulsion, motion, heat, sublimation, evaporation, exsiccation, inspissation, coagulation, and fixation, the Universal Fire (Spirit) manipulates matter, and manifests throughout creation.\n\nAny individual who can understand these principles and adapt them to the three departments of Nature becomes a true philosopher.\n\nFrom the right breast of Isis protruded a bunch of grapes and from, the left an ear of corn or a sheaf of wheat, golden in color.\n\nThese indicate that Nature is the source of nutrition for plant, animal, and human life, nourishing all things from herself.\n\nThe golden color in the wheat (corn) indicates that in the sunlight or spiritual gold is concealed the first sperm of all life.\n\nOn the girdle surrounding the upper part of the body of the statue appear a number of mysterious emblems."

