[content]
body = "ALBERT PIKE, quoting from Transcendental Magic , thus sums up the importance of Qabbalism as a key to Masonic esotericism: \"One is filled with admiration, on penetrating into the Sanctuary of the Kabalah, at seeing a doctrine so logical, so simple, and at the same time so absolute.\n\nThe necessary union of ideas and signs, the consecration of the most fundamental realities by the primitive characters; the Trinity of Words, Letters, and Numbers; a philosophy simple as the alphabet, profound and infinite as the Word; theorems more complete and luminous than those of Pythagoras; a theology summed up by counting on one's fingers; an Infinite which can be held in the hollow of an infant's hand; ten ciphers and twenty-two letters, a triangle, a square, and a circle,--these are all the elements of the Kabalah.\n\nThese are the elementary principles of the written Word, reflection of that spoken Word that created the world!\" ( Morals and Dogma .) Hebrew theology was divided into three distinct parts.\n\nThe first was the law , the second was the soul of the law , and the third was the soul of the soul of the law .\n\nThe law was taught to all the children of Israel; the Mishna , or the soul of the law, was revealed to the Rabbins and teachers; but the Qabbalah , the soul of the soul of the law, was cunningly concealed, and only the highest initiates among the Jews were instructed in its secret principles.\n\nAccording to certain Jewish mystics, Moses ascended Mount Sinai three times, remaining in the presence of God forty days each time.\n\nDuring the first forty days the tables of the written law were delivered to the prophet; during the second forty days he received the soul of the law; and during the last forty days God instructed him in the mysteries of the Qabbalah, the soul of the soul of the law.\n\nMoses concealed in the first four books of the Pentateuch the secret instructions that God had given him, and for centuries students of Qabbalism.\n\nhave sought therein the secret doctrine of Israel.\n\nAs the spiritual nature of man is concealed in his physical body, so the unwritten law--the Mishna and the Qabbalah --is concealed within the written teachings of the Mosaic code.\n\nQabbalah means the secret or hidden tradition , the unwritten law , and according to an early Rabbi, it was delivered to man in order that through the aid of its abstruse principles he might learn to understand the mystery of both the universe about him and the universe within him.\n\nThe origin of Qabbalism is a legitimate subject for controversy.\n\nEarly initiates of the Qabbalistic Mysteries believed that its principles were first taught by God to a school of His angels before the fall of man.\n\nThe angels later communicated the secrets to Adam, so that through the knowledge gained from an understanding of its principles fallen humanity might regain its lost a estate.\n\nThe Angel Raziel was dispatched from heaven to instruct Adam in the mysteries of the Qabbalah.\n\nDifferent angels were employed to initiate the succeeding patriarchs in this difficult science.\n\nTophiel was the teacher of Shem, Raphael of Isaac, Metatron of Moses, and Michael of David.\n\n(See Faiths of the World .) Christian D.\n\nGinsburg has written: \"From Adam it passed over to Noah, and then to Abraham, the friend of God, who emigrated with it to Egypt, where the patriarch allowed a portion of this mysterious doctrine to ooze out.\n\nIt was in this way that the Egyptians obtained some knowledge of it, and the other Eastern nations could introduce it into their philosophical systems."

