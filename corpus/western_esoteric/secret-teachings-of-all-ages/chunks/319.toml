body = "W.\n\nF.\n\nC.\n\nWigston has discovered evidence that Sir Francis Bacon employed the Tarot symbolism in his ciphers.\n\nThe numbers 21, 56, and 78, which are all directly related to the divisions of the Tarot deck, are frequently involved in Bacon's cryptograms.\n\nIn the great Shakespearian Folio of 1623 the Christian name of Lord Bacon appears 21 times on page 56 of the Histories.\n\n(See The Columbus of Literature .) Many symbols appearing upon the Tarot cards have definite Masonic interest.\n\nThe Pythagorean numerologist will also find an important relationship to exist between the numbers on the cards and the designs accompanying the numbers.\n\nThe Qabbalist will be immediately impressed by the significant sequence of the cards, and the alchemist will discover certain emblems meaningless save to one versed in the divine chemistry of transmutation and regeneration.' As the Greeks placed the letters of their alphabet--with their corresponding numbers--upon the various parts of the body of their humanly represented Logos , so the Tarot cards have an analogy not only in the parts and members of the universe but also in the divisions of the human body..\n\nThey are in fact the key to the magical constitution of man.\n\nThe Tarot cards must be considered (1) as separate and complete hieroglyphs, each representing a distinct principle, law, power, or element in Nature; (2) in relation to each other as the effect of one agent operating upon another; and (3) as vowels and consonants of a philosophic alphabet.\n\nThe laws governing all phenomena are represented by the symbols upon the Tarot cards, whose numerical values are equal to the numerical equivalents of the phenomena.\n\nAs every structure consists of certain elemental parts, so the Tarot cards represent the components of the structure of philosophy.\n\nIrrespective of the science or philosophy with which the student is working, the Tarot cards can be identified with the essential constituents of his subject, each card thus being related to a specific part according to mathematical and philosophical laws.\n\n\"An imprisoned person,\" writes Éliphas Lévi, \"with no other book than the Tarot, if he knew how to use it, could in a few years acquire universal knowledge, and would be able to speak on all subjects with unequalled learning and inexhaustible eloquence.\n\n\" (See Transcendental Magic .) The diverse opinions of eminent authorities on the Tarot symbolism are quite irreconcilable.\n\nThe conclusions of the scholarly Court de Gébelin and the bizarre Grand Etteila--the first authorities on the subject--not only are at radical variance but both are equally discredited by Levi, whose arrangement of the Tarot trumps was rejected in turn by Arthur Edward Waite and Paul Case as being an effort to mislead students.\n\nThe followers of Levi--especially Papus, Christian, Westcott, and Schuré-are regarded by the \"reformed Tarotists\" as honest but benighted individuals who wandered in darkness for lack of Pamela Coleman Smith's new deck of Tarot cards with revisions by Mr.\n\nWaite.\n\nMost writers on the Tarot (Mr.\n\nWaite a notable exception) have proceeded upon the hypothesis that the 22 major trumps represent the letters of the Hebrew alphabet.\n\nThis supposition is based upon nothing more substantial than the coincidence that both consist of 22 parts.\n\nThat Postel, St.\n\nMartin, and Levi all wrote books divided into sections corresponding to the major Tarots is an interesting sidelight on the subject.\n\nEARLY PORTUGUESE CARDS.\n\nFrom Chatto's Origin and History of Playing Cards."

