body = "According to the secret schools, the sacral ganglion is called the four-petaled lotus; the prostatic plexus, the six-petaled lotus; the epigastric plexus and navel, the ten-petaled lotus; the cardiac plexus, the twelve-petaled lotus; the pharyngeal plexus, the sixteen-petaled locus; the cavernous plexus, the two-petaled lotus; and the pineal gland or adjacent unknown center, the thousand-petaled locus.\n\nThe color, size, and number of petals upon the lotus are the keys to its symbolic import.\n\nA hint concerning the unfoldment of spiritual understanding according to the secret science of the Mysteries is found in the story of Aaron's rod that budded, and also in Wagner's great opera, Tannhäuser , where the budding staff of the Pope signifies the unfolding blossoms upon the sacred rod of the Mysteries--the spinal column.\n\nTHE TREE OF THE KNIGHTS OF THE ROUND TABLE.\n\nThis remarkable example of the use of the tree in symbolism is from the Chateau de Pierrefonds in the little town of Pierrefonds, northern France.\n\nThe eight side branches end in conventional cup-like flowers, from each of which rises the body of a knight carrying in his hand a ribbon bearing his name.\n\nThe central stem is surmounted by a larger flower, from which emerges the body of King Arthur himself.\n\nThe tree is a favorite motif in heraldry.\n\nThe one trunk with its multitude of branches caused the tree to be frequently used in diagramming family lineage, from which practice has arisen the custom of terming such tables \"family trees.\" *** The Rosicrucians used a garland of roses to signify the same spiritual vortices, which are referred to in the Bible as the seven lamps of the candlestick and the seven churches of Asia.\n\nIn the 1642 edition of Sir Francis Bacon's History of Henry the Seventh is a frontispiece showing Lord Bacon with Rosicrucian roses for shoe buckles.\n\nIn the Hindu system of philosophy, each petal of the lotus bears a certain symbol which gives an added clue to the meaning of the flower.\n\nThe Orientals also used the lotus plant to signify the growth of man through the three periods of human consciousness--ignorance, endeavor, and understanding.\n\nAs the lotus exists in three elements (earth, water, and air) so man lives in three worlds--material, intellectual, and spiritual.\n\nAs the plant, with its roots in the mud and the slime, grows upward through the water and finally blossoms forth in the light and air, so the spiritual growth of man is upward from the darkness of base action and desire into the light of truth and understanding, the water serving as a symbol of the ever-changing world of illusion through which the soul must pass in its struggle to reach the state of spiritual illumination.\n\nThe rose and its Eastern equivalent, the lotus, like all beautiful flowers, represent spiritual unfoldment and attainment: hence, the Eastern deities are often shown seated upon the open petals of the lotus blossoms.\n\nThe lotus was also a universal motif in Egyptian art and architecture.\n\nThe roofs of many temples were upheld by lotus columns, signifying the eternal wisdom; and the lotus-headed scepter--symbolic of self-unfoldment and divine prerogative--was often carried in religious processions.\n\nWhen the flower had nine petals, it was symbolic of man; when twelve, of the universe and the gods; when seven, of the planets and the law; when five, of the senses and the Mysteries; and when three, of the chief deities and the worlds."

