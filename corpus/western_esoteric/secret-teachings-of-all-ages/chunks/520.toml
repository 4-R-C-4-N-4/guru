[content]
body = "It was a grave moment and not a few of those present feared that their lives would be the forfeit for their audacity.\n\nIn the midst of the debate a fierce voice rang out.\n\nThe debaters stopped and turned to look upon the stranger.\n\nWho was this man who had suddenly appeared in their midst and transfixed them with his oratory?\n\nThey had never seen him before, none knew when he had entered, but his tall form and pale face filled them with awe.\n\nHis voice ringing with a holy zeal, the stranger stirred them to their very souls.\n\nHis closing words rang through the building: \" God has given America to be free !\" As the stranger sank into a chair exhausted, a wild enthusiasm burst forth.\n\nName after name was placed upon the parchment: the Declaration of Independence was signed.\n\nBut where was the man who had precipitated the accomplishment of this immortal task--who had lifted for a moment the veil from the eyes of the assemblage and revealed to them a part at least of the great purpose for which the new nation was conceived?\n\nHe had disappeared, nor was he ever seen again or his identity established.\n\nThis episode parallels others of a similar kind recorded by ancient historians attendant upon the founding of every new nation.\n\nAre they coincidences, or do they demonstrate that the divine wisdom of the ancient Mysteries still is present in the world, serving mankind as it did of old?"

