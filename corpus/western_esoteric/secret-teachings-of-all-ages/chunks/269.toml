body = "de la Violette, one of the best Chymists that our Age hath produced; who affirmes, that himselfe saw an Excellent Polich Physician of Cracovia, who kept, in Glasses, the Ashes of almost all the Hearbs that are knowne: so that, when any one, out of Curiosity, had a desire to see any of them, as (for example) a Rose, in one of his Glasses, he tooke That where the Ashes of a Rose were preserved; and holding it over a lighted Candle, so soone as it ever began to feele the Heat, you should presently see the Ashes begin to Move; which afterwards rising up, and dispersing themselves about the Glasse, you should immediately observe a kind of little Dark Cloud; which dividing it selfe into many parts, it came at length to represent a Rose; but so Faire, so Fresh, and so Perfect a one, that you would have thought it to have been as Substancial, & as Odoriferous a Rose, as growes on the Rose-tree.\" ( Unheard-of Curiosities Concerning Talismanical Sculpture of the Persians .) Paracelsus, recognizing derangements of the etheric double as the most important cause of disease, sought to reharmonize its substances by bringing into contact with it other bodies whose vital energy could supply elements needed, or were strong enough to overcome the diseased conditions existing in the aura of the sufferer.\n\nIts invisible cause having been thus removed, the ailment speedily vanished.\n\nThe vehicle for the archæus , or vital life force, Paracelsus called the mumia .\n\nA good example of a physical mumia is vaccine, which is the vehicle of a semi-astral virus.\n\nAnything which serves as a medium for the transmission of the archæus, whether it be organic or inorganic, truly physical or partly spiritualized, was termed a mumia.\n\nThe most universal form of the mumia was ether, which modern science has accepted as a hypothetical substance serving as a medium between the realm of vital energy and that of organic and inorganic substance.\n\nJOHANNIS BAPTISTAE VON HELMONT.\n\nFrom von Helmont's Ausgang der Artznen-Kunst.\n\nAt the beginning of the seventeenth century von Helmont, the Belgian alchemist (to whom incidentally, the world is indebted for the common term gas, as distinguished from other kinds of air), while experimenting with the root of A---, touched it to the tip of his tongue, without swallowing any of the substance.\n\nHe himself describes the result in the following manner: \"Immediately my head seemed tied tightly with a string, and soon after there happened to me a singular circumstance such as I had never before experienced.\n\nI observed with astonishment that I no longer felt and thought with the head, but with the region of the stomach, as if consciousness had now taken up its seat in the stomach.\n\nTerrified by this unusual phenomenon, I asked myself and inquired into myself carefully; but I only became the more convinced that my power of perception was became greater and more comprehensive.\n\nThis intellectual clearness was associated with great pleasure.\n\nI did not sleep, nor did I dream; I was perfectly sober; and my health was perfect.\n\nI had occasionally had ecstasies, but these had nothing in common with this condition of the stomach, in which it thought and felt, and almost excluded all cooperation of the head.\n\nIn the meantime my friends were troubled with the fear that I might go mad.\n\nBut my faith to God, and my submission to His will, soon dissipated this fear.\n\nThis state continued for two hours, after which I had same dizziness.\n\nI afterwards frequently tasted of the A---, but I never again could reproduce these sensations.\" (Van Helmont, Demens idea."

