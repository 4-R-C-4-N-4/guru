body = "He who lifted up his soul to this Divine Mind and served It was righteous and, having attained righteousness, liberated this Divine Mind, which thereupon returned again in glory to Its own divine source.\n\nAnd because He had brought to them this knowledge, the disciples said one to another: \"Lo, He is Himself this Mind personified!\" THE ARTHURIAN CYCLE AND LEGEND OF THE HOLY GRAIL According to legend, the body of the Christos (the Spiritual Law) was given into the keeping of two men, of whom the Gospels make but brief mention.\n\nThese were Nicodemus and Joseph of Arimathea, both devout men who, though not listed among the disciples or apostles of the Christos, were of all men chosen to be custodians of His sacred remains.\n\nJoseph of Arimathea was one of the initiated brethren and is called by A.\n\nE.\n\nWaite, in his A New Encyclopædia of Freemasonry , \"the first bishop of Christendom.\" just as the temporal (or visible) power of the Holy See was established by St.\n\nPeter(?), so the spiritual (or invisible) body of the faith was entrusted to the \"Secret Church of the Holy Grail\" through apostolic succession from Joseph of Arimathea, into whose keeping had been given the perpetual symbols of the covenant--the ever-flowing cup and the bleeding spear.\n\nJAKOB BÖHME, THE TEUTONIC THEOSOPHER.\n\nFrom William Law's Translation of The Works of Jakob Böhme.\n\nJakob Böhme was born in the year 1575 in a village near Gorlitz, and died in Silesia in 1624.\n\nHe had but little schooling and was apprenticed at an early age to a shoemaker.\n\nHe later became a journeyman shoemaker, married and had four children One day while tending his master's shoe shop, a mysterious stranger entered who while he seemed to possess but little of this world's goods, appeared to be most wise and noble in spiritual attainment.\n\nThe stranger asked the price of a pair of shoes, but young Böhme did not dare to name a figure, for fear that he would displease his master.\n\nThe stranger insisted and Böhme finally placed a valuation which he was all that his master possibly could hope to secure for the shoes.\n\nThe stranger immediately bought them and departed.\n\nA short distance down the street the mysterious stranger stopped and cried out in a loud voice, \"Jakob, Jakob come forth.\" In amazement and fright, Böhme ran out of the house.\n\nThe strange man fixed his yes upon the youth--great eyes which sparkled and seemed filled with divine light.\n\nHe took the boy's right hand and addressed him as follows--\"Jakob, thou art little, but shalt be great, and become another Man, such a one as at whom the World shall wonder.\n\nTherefore be pious, fear God, and reverence His Word.\n\nRead diligently the Holy Scriptures, wherein you have Comfort and Instruction.\n\nFor thou ust endure much Misery and Poverty, and suffer Persecution, but be courageous and persevere, far God loves, and is gracious to thee.\" Deeply impressed by the prediction, Böhme became ever more intense in his search for truth.\n\nAt last his labors were reworded.\n\nFor seven days he remained in a mysterious condition during which time the mysteries of the invisible world were revealed to him.\n\nIt has been said of Jakob Böhme that he revealed to all mankind the deepest secrets of alchemy.\n\nHe died surrounded by his family, his last words being \"Now I go hence into Paradise.\" *** Presumably obeying instructions of St.\n\nPhilip, Joseph of Arimathea, carrying the sacred relics, reached Britain after passing through many and varied hardships."

