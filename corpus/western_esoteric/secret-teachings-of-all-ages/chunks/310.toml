body = "Having thus established the inferior universe in perfect accord with the esoteric teachings of the Hindu, Egyptian, and Greek Mysteries, the Elohim next turned their attention to the production of flora and fauna and lastly man.\n\n\"And God said, Let us make man in our image, after our likeness.\n\n* * * So God created man in his own image, in the image of God created he him ; male and female created he them .\n\nAnd God blessed them, and God said unto them, Be fruitful, and multiply, and re plenish the earth, * * *.\" Consider in thoughtful silence the startling use of pronouns in the above extract from \"the most perfect example of English literature.\" When the plural and androgynous Hebrew word Elohim was translated into the singular and sexless word God , the opening chapters of Genesis were rendered comparatively meaningless.\n\nIt may have been feared that had the word been correctly translated as \"the male and female creative agencies,\" the Christians would have been justly accused of worshiping a plurality of gods in the face of their repeated claims to monotheism!\n\nThe plural form of the pronouns us and our reveals unmistakably, however, the pantheistic nature of Divinity.\n\nFurther, the androgynous constitution of the Elohim (God) is disclosed in the next verse, where he (referring to God) is said to have created man in his own image, male and female ; or, more properly, as the division of the sexes had not yet taken place, male-female .\n\nThis is a deathblow to the time-honored concept that God is a masculine potency as portrayed by Michelangelo on the ceiling of the Sistine Chapel.\n\nThe Elohim then order these androgynous beings to be fruitful .\n\nNote that neither the masculine nor the feminine principle as yet existed in a separate state!\n\nAnd, lastly, note the word \" re plenish.\" The prefix re denotes \"back to an original or former state or position,\" or \"repetition or restoration.\" (See Webster's International Dictionary , 1926.) This definite reference to a humanity existing prior to the \"creation of man\" described in Genesis must be evident to the most casual reader of Scripture.\n\nAn examination of Bible dictionaries, encyclopedias, and commentaries discloses the plural form of the word Elohim to be beyond the comprehension of their respected authors and editors.\n\nThe New Schaff-Herzog Encyclopedia of Religious Knowledge thus sums up the controversy over the plural form of the word Elohim: \"Does it now or did it originally signify plurality of divine being?\" A Dictionary of the Bible, edited by James Hastings, contains the following conclusion, which echoes the sentiments of more critical etymologists of the Bible: \"The use of the plur.\n\nElohim is also difficult to explain.\" Dr.\n\nHavernick considers the plural form Elohim to signify the abundance and super-richness existing in the Divine Being.\n\nHis statement, which appears in The Popular and Critical Bible Encyclopædia , is representative of the efforts made to circumvent this extremely damaging word.\n\nThe International Standard Bible Dictionary considers the explanations offered by modern theologians--of which Dr.\n\nHavernick's is a fair example--to be too ingenious to have been conceived by the early Hebrews and maintains that the word represents the survival of a polytheistic stage of Semitic thought.\n\nThe Jewish Encyclopedia supports the latter assumption with the following concise statement: \"As far as epigraphic material, traditions, and folk-lore throw light on the question, the Semites are shown to be of polytheistic leanings.\" Various schools of philosophy, both Jewish and Gentile, have offered explanations erudite and otherwise of the identity of Adam.\n\nIn this primordial man the Neo-Platonists recognized the Platonic Idea of humanity--the archetype or pattern of the genus homo ."

