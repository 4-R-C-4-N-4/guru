body = "John, who holds a cup from which the poison miraculously departed in the form of a serpent.\n\n(See Handbook of Christian Symbolism.) The figure of Christ upon the second phalange of the thumb does not follow the pagan system of assigning the first Person of the Creative Triad to this Position.\n\nGod the Father should occupy the second Phalange, God the Son the first phalange, while to God the Holy Spirit is assigned the base of the thumb.--Also, according to the Philosophic arrangement, the Virgin should occupy the base of the thumb, which is sacred to the moon.\n\n*** The various pantheons of ancient religions therefore actually represent the catalogued and personified attributes of Deity.\n\nIn this respect they correspond to the hierarchies of the Hebrew Qabbalists.\n\nAll the gods and goddesses of antiquity consequently have their analogies in the human body, as have also the elements, planets, and constellations which were assigned as proper vehicles for these celestials.\n\nFour body centers are assigned to the elements, the seven vital organs to the planets, the twelve principal parts and members to the zodiac, the invisible parts of man's divine nature to various supermundane deities, while the hidden God was declared to manifest through the marrow in the bones.\n\nIt is difficult for many to realize that they are actual universes; that their physical bodies are a visible nature through the structure of which countless waves of evolving life are unfolding their latent potentialities.\n\nYet through man's physical body not only are a mineral, a plant, and an animal kingdom evolving, but also unknown classifications and divisions of invisible spiritual life.\n\njust as cells are infinitesimal units in the structure of man, so man is an infinitesimal unit in the structure of the universe.\n\nA theology based upon the knowledge and appreciation of these relationships is as profoundly just as it is profoundly true.\n\nAs man's physical body has five distinct and important extremities--two legs, two arms, and a head, of which the last governs the first four--the number 5 has been accepted as the symbol of man.\n\nBy its four corners the pyramid symbolizes the arms and legs, and by its apex the head, thus indicating that one rational power controls four irrational corners.\n\nThe hands and feet are used to represent the four elements, of which the two feet are earth and water, and the two hands fire and air.\n\nThe brain then symbolizes the sacred fifth element--æther--which controls and unites the other four.\n\nIf the feet are placed together and the arms outspread, man then symbolizes the cross with the rational intellect as the head or upper limb.\n\nThe fingers and toes also have special significance.\n\nThe toes represent the Ten Commandments of the physical law and the fingers the Ten Commandments of the spiritual law.\n\nThe four fingers of each hand represent the four elements and the three phalanges of each finger represent the divisions of the element, so that in each hand there are twelve parts to the fingers, which are analogous to the signs of the zodiac, whereas the two phalanges and base of each thumb signify the threefold Deity.\n\nThe first phalange corresponds to the creative aspect, the second to the preservative aspect, and the base to the generative and destructive aspect.\n\nWhen the hands are brought together, the result is the twenty-four Elders and the six Days of Creation.\n\nIn symbolism the body is divided vertically into halves, the right half being considered as light and the left half as darkness.\n\nBy those unacquainted with the true meanings of light and darkness the light half was denominated spiritual and the left half material.\n\nLight is the symbol of objectivity; darkness of subjectivity.\n\nLight is a manifestation of life and is therefore posterior to life.\n\nThat which is anterior to light is darkness, in which light exists temporarily but darkness permanently."

