body = "On one occasion in later life when Abu Bekr referred to the gray hairs in his beard, Mohammed, lifting the end of his beard and looking at it, declared its whiteness to be due to the physical agony attendant upon his periods of inspiration.\n\nMOHAMMED'S NIGHT JOURNEY TO HEAVEN.\n\nFrom D'Ohsson's Tableau Général de l'Empire Othoman.\n\nIn the seventeenth sura of the Koran it is written that upon a certain night Mohammed was transported from the temple at Mecca to that of Jerusalem, but no details are given of the strange journey.\n\nIn the Mishkāteu ’l-Masabih, Mohammed is made to describe his ascent through the seven heavens into the icy presence of the may-veiled God and his subsequent return to his own bed, all in a single night.\n\nMohammed was awakened in the night by the Angel Gabriel, who, after removing the Prophet's heart, washed the cavity with Zamzam water, and filled the heart itself with faith and science.\n\nA strange creature, called Alborak, or the lightning bolt, was brought for the conveyance of the Prophet.\n\nAlborak is described as white animal of the shape and size of a mule, with the head of a woman and the tail of a peacock.\n\nAccording to some versions, Mohammed merely rode Alborak to Jerusalem, where, dismounting upon Mount Moriah, he caught hold of the lower rung of a golden ladder lowered from heaven and, accompanied by Gabriel, ascended through the seven spheres separating he earth from the inner surface of the empyrean.\n\nAt the gate of each sphere stood me of the Patriarchs, whom Mohammed saluted as he entered the various planes.\n\nAt the gate of the first heaven stood Adam; at the gate of the second, John and Jesus (sisters' sons); at the third, Joseph; at the fourth, Enoch; at the fifth, Aaron; at the sixth, Moses; and at the seventh, Abraham.\n\nAnother order of the Patriarchs and prophets is given which places Jesus at the gate of the seventh heaven, and upon reaching this Point Mohammed is said to have requested Jesus to intercede for him before the throne of God.\n\n*** If the writings attributed to Mohammed be considered as merely the hallucinations of an epileptic--and for that reason discounted--his Christian detractors should beware lest with the doctrines of the Prophet they also undermine the very teachings which they themselves affirm, for many of the disciples, apostles, and saints of the early church are known to have been subject to nervous disorders.\n\nMohammed's first convert was his own wife, Khadijah, who was followed by other members of his immediate family, a circumstance which moved Sir William Muir to note: \"It is strongly corroborative of Mohammed's sincerity that the earliest converts to Islam were not only of upright character, but his own bosom friends and people of his household; who, intimately acquainted with his private life, could not fail otherwise to have detected those discrepancies which ever more or less exist between the professions of the hypocritical deceiver abroad and his actions at: home.\" (See The Life of Mohammad .) Among the first to accept the faith of Islam was Abu Bekr, who became Mohammed's closest and most faithful friend, in fact his alter ego.\n\nAbu Bekr, a man of brilliant attainments, contributed materially to the success of the Prophet's enterprise, and in accord with the express wish of the Prophet became the leader of the faithful after Mohammed's death.\n\nA’isha, the daughter of Abu Bekr, later became the wife of Mohammed, thus still further cementing the bond of fraternity between the two men.\n\nQuietly, but industriously, Mohammed promulgated his doctrines among a small circle of powerful friends."

