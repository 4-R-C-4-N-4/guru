body = "Many of these monoliths stand over twenty feet out of the sand in which they are embedded, and it has been calculated that some of the larger ones weigh as much as 250,000 pounds.\n\nBy some it is believed that certain of the menhirs mark the location of buried treasure, but the most plausible view is that which regards Carnac as a monument to the astronomical knowledge of antiquity.\n\nScattered throughout the British Isles and Europe, these cairns, dolmens, menhirs, and cistvaens stand as mute but eloquent testimonials to the existence and achievements of races now extinct.\n\nOf particular interest are the rocking or logan stones, which evince the mechanical skill of these early peoples.\n\nThese relics consist of enormous boulders poised upon one or two small points in such a manner that the slightest pressure will sway them, but the greatest effort is not sufficient to overthrow them.\n\nThese were called living stones by the Greeks and Latins, the most famous one being the Gygorian stone in the Strait of Gibraltar.\n\nThough so perfectly balanced that it could be moved with the stalk of a daffodil, this rock could not be upset by the combined weight of many men.\n\nThere is a legend that Hercules raised a rocking stone over the graves of the two sons of Boreas whom he had killed in combat.\n\nThis stone was so delicately poised that it swayed back and forth with the wind, but no application of force could overturn it.\n\nA number of logan stones have been found in Britain, traces of one no longer standing having been discovered in Stonehenge.\n\n(See The Celtic Druids .) It is interesting to note that the green stones forming the inner ring of Stonehenge are believed to have been brought from Africa.\n\nIn many cases the monoliths are without carving or inscription, for they undoubtedly antedate both the use of tools and the art of writing.\n\nIn some instances the stones have been trued into columns or obelisks, as in the runic monuments and the Hindu lingams and sakti stones; in other instances they are fashioned into rough likenesses of the human body, as in the Easter Island statues, or into the elaborately sculptured figures of the Central American Indians and the Khmers of Cambodia.\n\nThe first rough-stone images can hardly be considered as effigies of any particular deity but rather as the crude effort of primitive man to portray in the enduring qualities of stone the procreative attributes of abstract Divinity.\n\nAn instinctive recognition of the stability of Deity has persisted through all the intervening ages between primitive man and modem civilization.\n\nAmple proof of the survival of litholatry in the Christian faith is furnished by allusions to the rock of refuge , the rock upon which the church of Christ was to be founded, the corner stone which the builders rejected, Jacob's stony pillow which he set up and anointed with oil, the sling stone of David, the rock Moriah upon which the altar of King Solomon's Temple was erected, the white stone of Revelation, and the Rock of Ages .\n\nStones were highly venerated by prehistoric peoples primarily because of their usefulness.\n\nJagged bits of stone were probably man's first weapons; rocky cliffs and crags constituted his first fortifications, and from these vantage points he hurled loose boulders down upon marauders.\n\nIn caverns or rude huts fashioned from slabs of rock the first humans protected themselves from the rigors of the elements.\n\nStones were set up as markers and monuments to primitive achievement; they were also placed upon the graves of the dead, probably as a precautionary measure to prevent the depredations of wild beasts.\n\nDuring migrations, it was apparently customary for primitive peoples to carry about with them stones taken from their original habitat."

