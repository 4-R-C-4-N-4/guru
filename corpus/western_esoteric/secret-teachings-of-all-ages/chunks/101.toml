[content]
body = "THE adoration of the sun was one of the earliest and most natural forms of religious expression.\n\nComplex modern theologies are merely involvements and amplifications of this simple aboriginal belief.\n\nThe primitive mind, recognizing the beneficent power of the solar orb, adored it as the proxy of the Supreme Deity.\n\nConcerning the origin of sun worship, Albert Pike makes the following concise statement in his Morals and Dogma : \"To them [aboriginal peoples] he [the sun] was the innate fire of bodies, the fire of Nature.\n\nAuthor of Life, heat, and ignition, he was to them the efficient cause of all generation, for without him there was no movement, no existence, no form.\n\nHe was to them immense, indivisible, imperishable, and everywhere present.\n\nIt was their need of light, and of his creative energy, that was felt by all men; and nothing was more fearful to them than his absence.\n\nHis beneficent influences caused his identification with the Principle of Good; and the BRAHMA of the Hindus, and MITHRAS of the Persians, and ATHOM, AMUN, PHTHA, and OSIRIS, of the Egyptians, the BEL of the Chaldeans, the ADONAI of the Phœnicians, the ADONIS and APOLLO of the Greeks, became but personifications of the Sun, the regenerating Principle, image of that fecundity which perpetuates and rejuvenates the world's existence.\" Among all the nations of antiquity, altars, mounds, and temples were dedicated to the worship of the orb of day.\n\nThe ruins of these sacred places yet remain, notable among them being the pyramids of Yucatan and Egypt, the snake mounds of the American Indians, the Zikkurats of Babylon and Chaldea, the round towers of Ireland, and the massive rings of uncut stone in Britain and Normandy.\n\nThe Tower of Babel, which, according to the Scriptures, was built so that man might reach up to God, was probably an astronomical observatory.\n\nMany early priests and prophets, both pagan and Christian, were versed in astronomy and astrology; their writings are best understood when read in the light of these ancient sciences.\n\nWith the growth of man's knowledge of the constitution and periodicity of the heavenly bodies, astronomical principles and terminology were introduced into his religious systems.\n\nThe tutelary gods were given planetary thrones, the celestial bodies being named after the deities assigned to them.\n\nThe fixed stars were divided into constellations, and through these constellations wandered the sun and its planets, the latter with their accompanying satellites.\n\nTHE SOLAR TRINITY The sun, as supreme among the celestial bodies visible to the astronomers of antiquity, was assigned to the highest of the gods and became symbolic of the supreme authority of the Creator Himself.\n\nFrom a deep philosophic consideration of the powers and principles of the sun has come the concept of the Trinity as it is understood in the world today.\n\nThe tenet of a Triune Divinity is not peculiar to Christian or Mosaic theology, but forms a conspicuous part of the dogma of the greatest religions of both ancient and modern times.\n\nThe Persians, Hindus, Babylonians, and Egyptians had their Trinities.\n\nIn every instance these represented the threefold form of one Supreme Intelligence.\n\nIn modern Masonry, the Deity is symbolized by an equilateral triangle, its three sides representing the primary manifestations of the Eternal One who is Himself represented as a tiny flame, called by the Hebrews Yod (י).\n\nJakob Böhme, the Teutonic mystic, calls the Trinity The Three Witnesses , by means of which the Invisible is made known to the visible, tangible universe.\n\nThe origin of the Trinity is obvious to anyone who will observe the daily manifestations of the sun."

