body = "We further affirm that we shall reform the governments of Europe and pattern them according to the system applied by the philosophers of Damcar.\n\nAll men desirous of securing knowledge shall receive as much as they are capable of understanding.\n\nThe rule of false theology shall be overthrown and God shall make His will known through His chosen philosophers.\n\nJOHANN VALENTIN ANDREÆ.\n\nFrom a rare print.\n\nIn certain esoteric circles there are vague rumors which intimate that the humble personality of Johann Valentin Andreæ masked an exalted emissary of the Rose Cross.\n\nWhile there is sufficient evidence at hand to establish the actual existence of a German theologian by the name of Andreæ, there are many discrepancies in his biography which have net been cleared up to the satisfaction of critical investigators.\n\nA comparison of the face shown above with that of Sir Francis Bacon discloses striking resemblances in spite of the differences due to age.\n\nIf Lord Bacon borrowed the name and identity of William Shakspere, he could also assume, after his mock funeral in England, the personality of Johann Valentin Andreæ.\n\nThe crescent below the bust is significant, as it also appears upon the crest of Lord Bacon; to denote that he was the second son of Sir Nicholas Bacon.\n\nFurther, the four letters (O MDC) in the frame at the lower right corner of the plate, by a very simple Baconian cipher, can be changed into number whose sum gives 33--the numerical equivalent of the name Bacon.\n\nThese several points of interest, when considered together, go far towards clearing up the mystery surrounding the authorship of the first Rosicrucian manifestoes.\n\n*** Chapter VII .\n\nBecause of the need of brevity, it is enough to say that our Father C.R.C.\n\nwas born in the year 1378 and departed at the age of 106, leaving to us the labor of spreading die doctrine of philosophic religion to the entire world.\n\nOur Fraternity is open to all who sincerely seek for truth; but we publicly warn the false and impious that they cannot betray or injure us, for God has protected our Fraternity, and all who seek to do it harm shall have their evil designs return and destroy them, while the treasures of our Fraternity shall remain untouched, to be used by the Lion in the establishment of his kingdom.\n\nChapter VII .\n\nWe declare that God, before the end of the world, shall create a great flood of spiritual light to alleviate the sufferings of humankind.\n\nFalsehood and darkness which have crept into the arts, sciences, religions, and governments of humanity--making it difficult for even the wise to discover the path of reality--shall be forever removed and a single standard established, so that all may enjoy the fruitage of truth.\n\nWe shall not be recognized as those responsible for this change, for people shall say that it is the result of the progressiveness of the age.\n\nGreat are the reforms about to take place; but we of the Fraternity of R.C.\n\ndo not arrogate to ourselves the glory for this divine reformation, since many there are, not members of our Fraternity but honest, true and wise men, who by their intelligence and their writings shall hasten its coming.\n\nWe testify that sooner the stones shall rise up and offer their services than that there shall be any lack of righteous persons to execute the will of God upon earth.\n\nChapter VIII .\n\nThat no one may doubt, we declare that God has sent messengers and signs in the heavens, namely, the i new stars in Serpentarius and Cygnus , to show that a great Council of the Elect is to take place.\n\nThis proves that God reveals in visible nature--for the discerning few--signs and symbols of all things that are coming to pass.\n\nGod has given man two eyes, two nostrils, and two ears, but only one tongue."

