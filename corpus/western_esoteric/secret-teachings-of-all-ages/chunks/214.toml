[content]
body = "Because their habitat was among the branches of the sacred trees in the hearts of ancient forests, birds were also regarded as the appointed messengers of the tree spirits and Nature gods dwelling in these consecrated groves, and through their clear notes the gods themselves were said to speak.\n\nMany myths have been fabricated to explain the brilliant plumage of birds.\n\nA familiar example is the story of Juno's peacock, in whose tail feathers were placed the eyes of Argus.\n\nNumerous American Indian legends also deal with birds and the origin of the various colors of feathers.\n\nThe Navahos declare that when all living things climbed to the stalk of a bamboo to escape the Flood, the wild turkey was on the lowest branch and his tail feathers trailed in the water; hence the color was all washed out.\n\nGravitation, which is a law in the material world, is the impulse toward the center of materiality; levitation, which is a law in the spiritual world, is the impulse toward the center of spirituality.\n\nSeeming to be capable of neutralizing the effect of gravity, the bird was said to partake of a nature superior to other terrestrial creation; and its feathers, because of their sustaining power, came to be accepted as symbols of divinity, courage, and accomplishment.\n\nA notable example is the dignity attached to eagle feathers by the American Indians, among whom they are insignia of merit.\n\nAngels have been invested with wings because, like birds, they were considered to be the intermediaries between the gods and men and to inhabit the air or middle kingdom betwixt heaven and earth.\n\nAs the dome of the heavens was likened to a skull in the Gothic Mysteries, so the birds which flew across the sky were regarded as thoughts of the Deity.\n\nFor this reason Odin's two messenger ravens were called Hugin and Munin-- thought and memory .\n\nAmong the Greeks and Romans, the eagle was the appointed bird of Jupiter and consequently signified the swiftly moving forces of the Demiurgus; hence it was looked upon as the mundane lord of the birds, in contradistinction to the phœnix, which was symbolic of the celestial ruler.\n\nThe eagle typified the sun in its material phase and also the immutable Demiurgic law beneath which all mortal creatures must bend.\n\nThe eagle was also the Hermetic symbol of sulphur, and signified the mysterious fire of Scorpio--the most profoundly significant sign of the zodiac and the Gate of the Great Mystery .\n\nBeing one of the three symbols of Scorpio, the eagle, like the Goat of Mendes, was an emblem of the theurgic art and the secret processes by which the infernal fire of the scorpion was transmuted into the spiritual light-fire of the gods.\n\nAmong certain American Indian tribes the thunderbird is held in peculiar esteem.\n\nThis divine creature is said to live above the clouds; the flapping of its wings causes the rumbling which accompanies storms, while the flashes from its eyes are the lightning.\n\nBirds were used to signify the vital breath; and among the Egyptians, mysterious hawklike birds with human heads, and carrying in their claws the symbols of immortality, are often shown hovering as emblems of the liberated soul over the mummified bodies of the dead.\n\nIn Egypt the hawk was the sacred symbol of the sun; and Ra, Osiris, and Horns are often depicted with the heads of hawks.\n\nThe cock, or rooster, was a symbol of Cashmala (Cadmillus) in the Samothracian Mysteries, and is also a phallic symbol sacred to the sun.\n\nIt was accepted by the Greeks as the emblem of Ares (Mars) and typified watchfulness and defense.\n\nWhen placed in the center of a weather vane it signifies the sun in the midst of the four corners of creation."

