body = "After Arthur had drawn the sword of Branstock from the anvil and thus established his divine right to leadership, Merlin further assisted him to secure from the Lady of the Lake the sacred sword Excalibur.\n\nAfter the establishment of the Round Table, having fulfilled his duty, Merlin disappeared, according to one account vanishing into the air, where he still exists as a shadow communicating at will with mortals; according to another, retiring of his own accord into a great stone vault which he sealed from within.\n\nIt is reasonably certain that many legends regarding Charlemagne were later associated with Arthur, who is most famous for establishing the Order of the Round Table at Winchester.\n\nReliable information is not to be had concerning the ceremonies and initiatory rituals of the \"Table Round.\" In one story the Table was endowed with the powers of expansion and contraction so that fifteen or fifteen hundred could be seated around it, according to whatever need might arise.\n\nThe most common accounts fix the number of knights who could be seated at one time at the Round Table at either twelve or twenty-four.\n\nThe twelve signified the signs of the zodiac and also the apostles of Jesus.\n\nThe knights' names and also their heraldic arms were emblazoned upon their chairs.\n\nWhen twenty-four are shown seated at the Table, each of the twelve signs of the zodiac is divided into two parts--a light and a dark half--to signify the nocturnal and diurnal phases of each sign.\n\nAs each sign of the zodiac is ascending for two hours every day, so the twenty-four knights represent the hours, the twenty-four elders before the throne in Revelation , and twenty-four Persian deities who represent the spirits of the divisions of the day.\n\nIn the center of the Table was the symbolic rose of the Passion of Our Lord Jesus Christ, the symbol of resurrection in that He \"rose\" from the dead.\n\nThere was also a mysterious empty seat called the Siege Perilous in which none might sit except he who was successful in his quest for the Holy Grad.\n\nIn the personality of Arthur is to be found a new form of the ever-recurrent cosmic myth.\n\nThe prince of Britain is the sun, his knights are the zodiac, and his flashing sword may be the sun's ray with which he fights and vanquishes the dragons of darkness or it may represent the earth's axis.\n\nArthur's Round Table is the universe; the Siege Perilous the throne of the perfect man.\n\nIn its terrestrial sense, Arthur was the Grand Master of a secret Christian-Masonic brotherhood of philosophic mystics who termed themselves Knights .\n\nArthur received the exalted position of Grand Master of these Knights because he had faithfully accomplished the withdrawal of the sword (spirit) from the anvil of the base metals (his lower nature).\n\nAs invariably happens, the historical Arthur soon was confused with the allegories and myths of his order until now the two are inseparable.\n\nAfter Arthur's death on the field of Kamblan his Mysteries ceased, and esoterically he was borne away on a black barge, as is so beautifully described by Tennyson in his Morte d'Arthur .\n\nThe great sword Excalibur was also cast back into the waters of eternity--all of which is a vivid portrayal of the descent of cosmic night at the end of the Day of Universal Manifestation.\n\nThe body of the historical Arthur was probably interred at Glastonbury Abbey, a building closely identified with the mystic rites of both the Grail and the Arthurian Cycle.\n\nThe mediæval Rosicrucians were undoubtedly in possession of the true secret of the Arthurian Cycle and the Grail legend, much of their symbolism having been incorporated into that order.\n\nThough the most obvious of all keys to the Christos mystery, the Grail legend has received the least consideration.\n\nTHE NIMBUS AND AUREOLE IN SYMBOLISM.\n\nFrom Audsley's Handbook of Christian Symbolism."

