[content]
body = "Greek mystics believed that the spiritual nature of man descended into material existence from the Milky Way--the seed ground of souls--through one of the twelve gates of the great zodiacal band.\n\nThe spiritual nature was therefore said to incarnate in the form of the symbolic creature created by Magian star gazers to represent the various zodiacal constellations.\n\nIf the spirit incarnated through the sign of Aries, it was said to be born in the body of a ram; if in Taurus, in the body of the celestial bull.\n\nAll human beings were thus symbolized by twelve mysterious creatures through the natures of which they were able to incarnate into the material world.\n\nThe theory of transmigration was not applicable to the visible material body of man, but rather to the invisible immaterial spirit wandering along the pathway of the stars and sequentially assuming in the course of evolution the forms of the sacred zodiacal animals.\n\nIn the Third Book of the Mathesis of Julius Firmicus Maternus appears the following extract concerning the positions of the heavenly bodies at the time of the establishment of the inferior universe: \"According to Æsculapius, therefore, and Anubius, to whom especially the divinity Mercury committed the secrets of the astrological science, the geniture of the world is as follows: They constituted the Sun in the 15th part of Leo, the Moon in the 15th part of Cancer, Saturn in the 15th part of Capricorn, Jupiter in the 15th part of Sagittary, Mars in the 15th part of Scorpio, Venus in the 15th part of Libra, Mercury in the 15th part of Virgo, and the Horoscope in the 15th part of Cancer.\n\nConformably to this geniture, therefore, to these conditions of the stars, and the testimonies which they adduce in confirmation of this geniture, they are of opinion that the destinies of men, also, are disposed in accordance with the above arrangement, as maybe learnt from that book of Æsculapius which is called Μυριογενεσις, (i.e.\n\nTen Thousand, or an innumerable multitude of Genitures) in order that nothing in the several genitures of men may be found to be discordant with the above-mentioned geniture of the world.\" The seven ages of man are under the control of the planets in the following order: infancy, the moon; childhood, Mercury; adolescence, Venus; maturity, the sun; middle age, Mars; advanced age, Jupiter; and decrepitude and dissolution, Saturn.\n\nHIEROGLYPHIC PLAN, By HERMES, OF THE ANCIENT ZODIAC.\n\nFrom Kircher's Œdipus Ægyptiacus.\n\nThe inner circle contains the hieroglyph of Hemphta, the triform and pantamorphic deity.\n\nIn the six concentric bands surrounding the inner circle are (from within outward): (1) the numbers of the zodiacal houses in figures and also in words; (2) the modern names of the houses.(3) the Greek or the Egyptian names of the Egyptian deities assigned to the houses; (4) the complete figures of these deities; (5) the ancient or the modem zodiacal signs, sometimes both; (6) the number of decans or subdivisions of the houses."

