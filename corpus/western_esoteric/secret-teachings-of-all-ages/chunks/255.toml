[content]
body = "FOR the most comprehensive and lucid exposition of occult pneumatology (the branch of philosophy dealing with spiritual substances) extant, mankind is indebted to Philippus Aureolus Paracelsus (Theophrastus Bombastus von Hohenheim), prince of alchemists and Hermetic philosophers and true possessor of the Royal Secret (the Philosopher's Stone and the Elixir of Life).\n\nParacelsus believed that each of the four primary elements known to the ancients (earth, fire, air, and water) consisted of a subtle, vaporous principle and a gross corporeal substance.\n\nAir is, therefore, twofold in nature-tangible atmosphere and an intangible, volatile substratum which may be termed spiritual air .\n\nFire is visible and invisible, discernible and indiscernible--a spiritual, ethereal flame manifesting through a material, substantial flame.\n\nCarrying the analogy further, water consists of a dense fluid and a potential essence of a fluidic nature.\n\nEarth has likewise two essential parts--the lower being fixed, terreous, immobile; the higher, rarefied, mobile, and virtual.\n\nThe general term elements has been applied to the lower, or physical, phases of these four primary principles, and the name elemental essences to their corresponding invisible, spiritual constitutions.\n\nMinerals, plants, animals, and men live in a world composed of the gross side of these four elements, and from various combinations of them construct their living organisms.\n\nHenry Drummond, in Natural Law in the Spiritual World , describes this process as follows: \"If we analyse this material point at which all life starts, we shall find it to consist of a clear structureless, jelly-like substance resembling albumen or white of egg.\n\nIt is made of Carbon, Hydrogen, Oxygen and Nitrogen.\n\nIts name is protoplasm.\n\nAnd it is not only the structural unit with which all living bodies start in life, but with which they are subsequently built up.\n\n'Protoplasm,' says Huxley, 'simple or nucleated, is the formal basis of all life.\n\nIt is the clay of the Potter.'\" The water element of the ancient philosophers has been metamorphosed into the hydrogen of modern science; the air has become oxygen; the fire , nitrogen; the earth , carbon.\n\nJust as visible Nature is populated by an infinite number of living creatures, so, according to Paracelsus, the invisible, spiritual counterpart of visible Nature (composed of the tenuous principles of the visible elements) is inhabited by a host of peculiar beings, to whom he has given the name elementals, and which have later been termed the Nature spirits.\n\nParacelsus divided these people of the elements into four distinct groups, which he called gnomes , undines , sylphs , and salamanders .\n\nHe taught that they were really living entities, many resembling human beings in shape, and inhabiting worlds of their own, unknown to man because his undeveloped senses were incapable of functioning beyond the limitations of the grosser elements.\n\nThe civilizations of Greece, Rome, Egypt, China, and India believed implicitly in satyrs, sprites, and goblins.\n\nThey peopled the sea with mermaids, the rivers and fountains with nymphs, the air with fairies, the fire with Lares and Penates, and the earth with fauns, dryads, and hamadryads.\n\nThese Nature spirits were held in the highest esteem, and propitiatory offerings were made to them.\n\nOccasionally, as the result of atmospheric conditions or the peculiar sensitiveness of the devotee, they became visible.\n\nMany authors wrote concerning them in terms which signify that they had actually beheld these inhabitants of Nature's finer realms."

