body = "Crawford Howell Toy of Harvard notes: \"Manuscripts were copied and recopied by scribes who not only sometimes made errors in letters and words, but permitted themselves to introduce new material into the text, or to combine in one manuscript, without mark of division, writings composed by different men; instances of these sorts of procedure are found especially in Micah and Jeremiah, and the groups of prophecies which go under the names of Isaiah and Zachariah.\" (See Judaism and Christianity .) THE VISION OF EZEKIEL.\n\nFrom The \"Bear\" Bible.\n\nThis plate, which is from the first Protestant Bible published in Spanish, shows the Mercavah, or chariot of Jehovah, which appeared to Ezekiel by the river Chebar.\n\nThe prophet beheld four strange creatures (E), each having four heads, four wings, and brazen hoofs like those of a calf.\n\nAnd there were four wheels (F) filled with eyes.\n\nWhere the cherubim went the wheels went also.\n\nThe space between the cherubim and the wheels was filled with coals of fire.\n\nUpon the top of the chariot was a throne, upon which sat the likeness of a man (H).\n\nEzekiel fell upon his knees when he beheld the Mercavah surrounded by a whirlwind of clouds and flames (A, B, C).\n\nA hand (K) reached out from the clouds and the prophet was ordered to eat of a scroll which the hand held forth.\n\nAccording to the mystics, the wheels supporting the throne of God represent the orbits of the planets, and the entire solar system is properly the Mercavah, or chariot of God.\n\nOne of the divisions of the Qabbalah--that dealing with the arts and sciences of those planes which are under the heavens--is called the Mercavah.\n\nIn the Zohar it is written that the celestial throne or Ezekiel's vision signifies the traditional law; the appearance of a man sitting upon the throne represents the written law, Philo Judæus in describing the cherubim upon the Ark of the Covenant declares that the figures are an intimation of the revolutions of the whole heavens, one of the cherubim representing the outer circumference and the other the inner sphere.\n\nFacing each other, they represent the two hemispheres of the world.\n\nThe flaming sword of the cherubim of Genesis is the central motion and agitation of the heavenly bodies.\n\nIn all probability it also represents the solar ray.\n\n*** Does the mutilated condition of the Holy Bible--in part accidental--represent none the less a definite effort to confuse the uninitiated reader and thus better conceal the secrets of the Jewish Tannaim ?\n\nNever has the Christian world been in possession of those hidden scrolls which contain the secret doctrine of Israel, and if the Qabbalists were correct in their assumption that the lost books of the Mosaic Mysteries have been woven into the fabric of the Torah, then the Scriptures are veritably books within books.\n\nIn rabbinical circles the opinion is prevalent that Christendom never has understood the Old Testament and probably never will.\n\nIn fact, the feeling exists--in some quarters, at least--that the Old Testament is the exclusive possession of the Jewish faith; also that Christianity, after its unrelenting persecution of the Jew, takes unwarranted liberties when it includes strictly Jewish writings in its sacred canon.\n\nBut, as noted by one rabbi, if Christianity must use the Jewish Scriptures, it should at least strive to do so with some degree of intelligence!\n\nIn the opening chapter of Genesis it is stated that after creating light and separating it from darkness, the seven Elohim divided the waters which were under the firmament from the waters which were above the firmament."

