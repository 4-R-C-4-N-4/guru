[content]
body = "P, Blavatsky relates the colors to the septenary constitution of man and the seven states of matter as follows: COLOR: Violet PRINCIPLES OF MAN: Chaya, or Etheric Double STATES OF MATTER: Ether COLOR: Indigo PRINCIPLES OF MAN: Higher Manas, or Spiritual Intelligence STATES OF MATTER: Critical State called Air COLOR: Blue PRINCIPLES OF MAN: Auric Envelope STATES OF MATTER: Steam or Vapor COLOR: Green PRINCIPLES OF MAN: Lower Manas, or Animal Soul STATES OF MATTER: Critical State COLOR: Yellow PRINCIPLES OF MAN: Buddhi, or Spiritual Soul STATES OF MATTER: Water COLOR: Orange PRINCIPLES OF MAN: Prana, or Life Principle STATES OF MATTER: Critical State COLOR: Red PRINCIPLES OF MAN: Kama Rupa, or Seat of Animal Life STATES OF MATTER: Ice THE FOUR ELEMENTS AND THEIR CONSONANTAL INTERVALS.\n\nFrom Fludd's De Musica Mundana.\n\nIn this diagram Fludd has divided each of the four Primary elements into three subdivisions.\n\nThe first division of each element is the grossest, partaking somewhat of the substance directly inferior to itself (except in the case of the earth, which has no state inferior to itself).\n\nThe second division consists of the element in its relatively pure state, while the third division is that condition wherein the element partakes somewhat of the substance immediately superior to itself.\n\nFor example the lowest division of the element of water is sedimentary, as it contains earth substance in solution; the second division represents water in its most common state--salty--as in the case of the ocean; and the third division is water in its purest state--free from salt.\n\nThe harmonic interval assigned to the lowest division of each element is one tone, to the central division also a tone, but to the higher division a half-tone because it partakes of the division immediately above it.\n\nFludd emphasizes the fact that as the elements ascend in series of two and a half tones, the diatessaron is the dominating harmonic interval of the elements.\n\n*** This arrangement of the colors of the spectrum and the musical notes of the octave necessitates a different grouping of the planets in order to preserve their proper tone and color analogies.\n\nThus do becomes Mars; re , the sun; mi , Mercury; fa , Saturn; sol , Jupiter; la , Venus; si ( ti ) the moon.\n\n(See The E.\n\nS.\n\nInstructions .)"

