body = "The forging of Shakspere's handwriting; the foisting of fraudulent portraits and death masks upon a gullible public; the fabrication of spurious biographies; the mutilation of books and documents; the destruction or rendering illegible of tablets and inscriptions containing cryptographic messages, have all compounded the difficulties attendant upon the solution of the Bacon-Shakspere-Rosicrucian riddle.\n\nThe Ireland forgeries deceived experts for years.\n\nAccording to material available, the supreme council of the Fraternity of R.C.\n\nwas composed of a certain number of individuals who had died what is known as the \"philosophic death.\" When the time came for an initiate to enter upon his labors for the Order, he conveniently \"died\" under somewhat mysterious circumstances.\n\nIn reality he changed his name and place of residence, and a box of rocks or a body secured for the purpose was buried in his stead.\n\nIt is believed that this happened in the case of Sir Francis Bacon who, like all servants of the Mysteries, renounced all personal credit and permitted others to be considered as the authors of the documents which he wrote or inspired.\n\nThe cryptic writings of Francis Bacon constitute one of the most powerful tangible elements in the mysteries of transcendentalism and symbolic philosophy.\n\nApparently many years must yet pass before an uncomprehending world will appreciate the transcending genius of that mysterious man who wrote the Novum Organum , who sailed his little ship far out into the unexplored sea of learning through the Pillars of Hercules, and whose ideals for a new civilization are magnificently expressed in the Utopian dream of The New Atlantis .\n\nWas Sir Francis Bacon a second Prometheus?\n\nDid his great love for the people of the world and his pity for their ignorance cause him to bring the divine fire from heaven concealed within the contents of a printed page?\n\nIn all probability, the keys to the Baconian riddle will be found in classical mythology.\n\nHe who understands the secret of the Seven-Rayed God will comprehend the method employed by Bacon to accomplish his monumental labor.\n\nAliases were assumed by him in accordance with the attributes and order of the members of the planetary system.\n\nOne of the least known--but most important--keys to the Baconian enigma is the Third, or 1637, Edition, published in Paris, of Les Images ou Tableaux de platte peinture des deux Philostrates sophistes grecs et les statues de Callistrate , by Blaise de Vigenere.\n\nThe title page of this volume--which, as the name of the author when properly deciphered indicates, was written by or under the direction of Bacon or his secret society--is one mass of important Masonic or Rosicrucian symbols.\n\nOn page 486 appears a plate entitled \"Hercules Furieux,\" showing a gigantic figure shaking a spear, the ground before him strewn with curious emblems.\n\nIn his curious work, Das Bild des Speershüttlers die Lösung des Shakespeare-Rätsels , Alfred Freund attempts to explain the Baconian symbolism in the Philostrates .\n\nBacon he reveals as the philosophical Hercules, whom time will establish as the true \"Spear-Shaker\" (Shakespeare)."

