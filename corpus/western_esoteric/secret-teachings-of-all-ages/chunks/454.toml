[content]
body = "In a letter to Robert Freke Gould, Albert Pike writes: \"It began to shape itself to my intellectual vision into something more imposing and majestic, solemnly mysterious and grand.\n\nIt seemed to me like the Pyramids in their loneliness, in whose yet undiscovered chambers may be hidden, for the enlightenment of coming generations, the sacred books of the Egyptians, so long lost to the world; like the Sphynx half buried in the desert.\n\nIn its symbolism, which and its spirit of brotherhood are its essence, Freemasonry is more ancient than any of the world's living religions.\n\nIt has the symbols and doctrines which, older than himself, Zarathustra inculcated; and ii seemed to me a spectacle sublime, yet pitiful--the ancient Faith of our ancestors holding out to the world its symbols once so eloquent, and mutely and in vain asking for an interpreter.\n\nAnd so I came at last to see that the true greatness and majesty of Freemasonry consist in its proprietorship of these and its other symbols; and that its symbolism is its soul.\" Though the temples of Thebes and Karnak be now but majestic heaps of broken and time-battered stone, the spirit: of Egyptian philosophy still marches triumphant through the centuries.\n\nThough the rock-hewn sanctuaries of the ancient Brahmins be now deserted and their carvings crumbled into dust, still the wisdom of the Vedas endures.\n\nThough the oracles be silenced and the House of the Mysteries be now but rows of ghostly columns, still shines the spiritual glory of Hellas with luster undiminished.\n\nThough Zoroaster, Hermes, Pythagoras, Plato, and Aristotle are now but dim memories in a world once rocked by the transcendency of their intellectual genius, still in the mystic temple of Freemasonry these god-men live again in their words and symbols; and the candidate, passing through the initiations, feels himself face to face with these illumined hierophants of days long past."

