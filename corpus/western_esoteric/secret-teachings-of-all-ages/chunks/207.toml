body = "E.\n\nA.\n\nWallis Budge says, in effect, of the worship of the scarab by the Egyptians: \"Yet another view held in primitive times was that the sky was a vast meadow over which a huge beetle crawled, pushing the disk of the sun before him.\n\nThis beetle was the Sky-god, and, arguing from the example of the beetle ( Scarabæus sacer ), which was observed to roll along with its hind legs a ball that was believed to contain its eggs, the early Egyptians thought that the ball of the Sky-god contained his egg and that the sun was his offspring.\n\nThanks, however, to the investigations of the eminent entomologist, Monsieur J.\n\nH.\n\nFabre, we now know that the ball which the Scarabæus sacer rolls along contains not its eggs, but dung that is to serve as food for its egg, which it lays in a carefully prepared place.\" Initiates of the Egyptian Mysteries were sometimes called scarabs; again, lions and panthers.\n\nThe scarab was the emissary of the sun, symbolizing light, truth, and regeneration.\n\nStone scarabs, called heart scarabs, about three inches long, were placed in the heart cavity of the dead when that organ was removed to be embalmed separately as part of the process of mummifying.\n\nSome maintain that the stone beetles were merely wrapped in the winding cloths at the time of preparing the body for eternal preservation.\n\nThe following passage concerning this appears in the great Egyptian book of initiation, The Book of the Dead : \"And behold, thou shalt make a scarab of green stone, which shalt be placed in the breast of a man, and it shall perform for him, 'the opening of the mouth.'\" The funeral rites of many nations bear a striking resemblance to the initiatory ceremonies of their Mysteries.\n\nRa , the god of the sun, had three important aspects.\n\nAs the Creator of the universe he was symbolized by the head of a scarab and was called Khepera , which signified the resurrection of the soul and a new life at the end of the mortal span.\n\nThe mummy cases of the Egyptian dead were nearly always ornamented with scarabs.\n\nUsually one of these beetles, with outspread wings, was painted on the mummy case directly over the breast of the dead.\n\nThe finding of such great numbers of small stone scarabs indicates that they were a favorite article of adornment among the Egyptians.\n\nBecause of its relationship to the sun, the scarab symbolized the divine part of man's nature.\n\nThe fact that its beautiful wings were concealed under its glossy shell typified the winged soul of man hidden within its earthly sheath.\n\nThe Egyptian soldiers were given the scarab as their special symbol because the ancients believed that these creatures were all of the male sex and consequently appropriate emblems of virility, strength, and courage.\n\nTHE MANTICHORA.\n\nFrom Redgrove's Bygone Beliefs.\n\nThe most remarkable of allegorical creatures was the mantichora, which Ctesias describes as having aflame-colored body, lionlike in shape, three rows of teeth, a human head and ears, blue eyes, a tail ending in a series of spikes and stings, thorny and scorpionlike, and a voice which sounded like the blare of trumpets.\n\nThis synthetic quadruped ambled into mediæval works on natural history, but, though seriously considered, had never been seen, because it inhabited inaccessible regions and consequently was difficult to locate.\n\n*** Plutarch noted the fact that the scarab rolled its peculiar ball of dung backwards, while the insect itself faced the opposite direction.\n\nThis made it an especially fitting symbol for the sun, because this orb (according to Egyptian astronomy) was rolling from west to east, although apparently moving in the opposite direction."

