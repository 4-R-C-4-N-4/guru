body = "He was therefore turned over to the sixth group.\n\nThe rich and poor alike stood upon the scales, but only a few passed the test successfully.\n\nTo these were given velvet robes and wreaths of laurel, after which they were seated upon the steps of Virgo Lucifera's throne.\n\nThose who failed were ridiculed and scourged.\n\nThe \"inquisition\" being finished, one of the captains begged Virgo Lucifera to permit the nine men who had declared themselves unworthy also to be weighed, and this caused C.R.C.\n\nanguish and fear.\n\nOf the first seven one succeeded and was greeted with joy.\n\nC.R.C.\n\nwas the eighth and he not only withstood all the weights but even when three men hung on the opposite end of the beam he could not be moved.\n\nA page cried out: \"THAT IS HE!\" C.R.C.\n\nwas quickly set at liberty and permitted to release one of the captives.\n\nHe chose the first emperor.\n\nVirgo Lucifera then requested the red roses that C.R.C.\n\ncarried, which he immediately gave her.\n\nThe ceremony of the scales ended about ten o'clock in the forenoon.\n\nAfter agreeing upon the penalties to be imposed upon those whose shortcomings had been thus exposed, a dinner was served to all.\n\nThe few successful \"artists,\" including C.R.C., were given the chief seats, after which the Golden Fleece and a Flying Lion were bestowed upon them in the name of the Bridegroom.\n\nVirgo Lucifera then presented a magnificent goblet to the guests, stating that the King had requested all to share its contents, Following this, C.R.C.\n\nand his companions were taken out upon a scaffolding where they beheld the various penalties suffered by those who failed.\n\nBefore leaving the palace, each of the rejected guests was given a draught of forgetfulness.\n\nThe elect then returned to the castle, where to each was assigned a learned page, who conducted them through the various parts of the edifice.\n\nC.R.C.\n\nsaw many things his companions were not privileged to behold, including the Royal Sepulcher, where he learned \"more than is extant in all books.\" He also visited a magnificent library and an observatory containing a great globe thirty feet in diameter and with all the countries of the world marked upon it.\n\nAt supper the various guests propounded enigmas and C.R.C.\n\nsolved the riddle which Virgo Lucifera asked concerning her own identity.\n\nThen entered the dining hall two youths and six virgins beautifully robed, followed by a seventh virgin wearing a coronet.\n\nThe latter was called the Duchess, and was mistaken for the Hermetic Bride.\n\nThe Duchess told C.R.C.\n\nthat he had received more than the others, therefore should make a greater return.\n\nThe Duchess then asked each of the virgins to pick up one of the seven weights which still remained in the great room.\n\nTo Virgo Lucifera was given the heaviest weight, which was hung in the Queen's chamber during the singing of a hymn.\n\nIn the second chamber the first virgin hung her weight during a similar ceremony; thus they proceeded from room to room until the weights had been disposed of.\n\nThe Duchess then presented her hand to C.\n\nR.\n\nC.\n\nand his companions and, followed by her virgins, withdrew.\n\nPages then conducted the guests to their sleeping chambers.\n\nThe one assigned to C.R.C.\n\nwas hung with rare tapestries and with beautiful paintings.\n\nTHE FOURTH DAY After washing and drinking in the garden from a fountain which bore several inscriptions--among them one reading, \"Drink, brothers, and live\"--the guests, led by Virgo Lucifera , ascended the 365 steps of the royal winding stairs.\n\nThe guests were given wreaths of laurel and, a curtain being raised, found themselves in the presence of the King and Queen.\n\nC.R.C."

