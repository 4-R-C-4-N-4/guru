body = "Euclid maintained that good has no opposite and therefore evil does not exist.\n\nBeing asked about the nature of the gods, he declared himself ignorant of their disposition save that they hated curious persons.\n\nThe Megarians are occasionally included among the dialectic philosophers.\n\nEuclid (who died 374?\n\nB.C.) was succeeded in his school by Eubulides, among whose disciples were Alexinus and Apollonius Cronus.\n\nEuphantus, who lived to great age and wrote many tragedies, was among the foremost followers of Eubulides.\n\nDiodorus is usually included in the Megarian school, having heard Eubulides lecture.\n\nAccording to legend, Diodorus died of grief because he could not answer instantly certain questions asked him by Stilpo, at one time master of the Megarian school.\n\nDiodorus held that nothing can be moved, since to be moved it must be taken out of the place in which it is and put into the place where it is not, which is impossible because all things must always be in the places where they are.\n\nThe Cynics were a sect founded by Antisthenes of Athens (444-365?\n\nB.C.), a disciple of Socrates.\n\nTheir doctrine may be described as an extreme individualism which considers man as existing for himself alone and advocates surrounding him by inharmony, suffering, and direst need that be may thereby be driven to retire more completely into his own nature.\n\nThe Cynics renounced all worldly possessions, living in the rudest shelters and subsisting upon the coarsest and simplest food.\n\nOn the assumption that the gods wanted nothing, the Cynics affirmed that those whose needs were fewest consequently approached closest to the divinities.\n\nBeing asked what he gained by a life of philosophy, Antisthenes replied that he had learned how to converse with himself.\n\nDiogenes of Sinopis is remembered chiefly for the tub in the Metroum which for many years served him as a home.\n\nThe people of Athens loved the beggar-philosopher, and when a youth in jest bored holes in the tub, the city presented Diogenes with a new one and punished the youth.\n\nDiogenes believed that nothing in life can be rightly accomplished without exercitation.\n\nHe maintained that everything in the world belongs to the wise, a declaration which he proved by the following logic: \"All things belong to the gods; the gods are friends to wise persons; all things are common amongst friends; therefore all things belong to the wise.\" Among the Cynics are Monimus, Onesicritus, Crates, Metrocles, Hipparchia (who married Crates), Menippus, and Menedemus.\n\nThe Cyrenaic sect, founded by Aristippus of Cyrene (435-356?\n\nB.C.), promulgated the doctrine of hedonism.\n\nLearning of the fame of Socrates, Aristippus journeyed to Athens and applied himself to the teachings of the great Skeptic.\n\nSocrates, pained by the voluptuous and mercenary tendencies of Aristippus, vainly labored to reform the young man.\n\nAristippus has the distinction of being consistent in principle and practice, for he lived in perfect harmony with his philosophy that the quest of pleasure was the chief purpose of life.\n\nThe doctrines of the Cyrenaics may be summarized thus: All that is actually known concerning any object or condition is the feeling which it awakens in man's own nature.\n\nIn the sphere of ethics that which awakens the most pleasant feeling is consequently to be esteemed as the greatest good.\n\nEmotional reactions are classified as pleasant or gentle, harsh, and mean.\n\nThe end of pleasant emotion is pleasure; the end of harsh emotion, grief; the end of mean emotion, nothing.\n\nThrough mental perversity some men do not desire pleasure."

