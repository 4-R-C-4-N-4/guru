body = "The seven-pointed star of the sacred metals is arranged that one black point is downward, thus symbolizing Saturn, the Destroyer.\n\nBeginning in the space immediately to the left of the black point, reading clockwise discloses the cryptic word VITRIOL formed by the capital letters of the seven Latin words in the outer circle.\n\n*** There is one vital substance in Nature upon which all things subsist.\n\nIt is called archæus , or vital life force , and is synonymous with the astral light or spiritual air of the ancients.\n\nIn regard to this substance, Éliphas Lévi has written: \"Light, that creative agent, the vibrations of which are the movement and life of all things; light, latent in the universal ether, radiating about absorbing centres, which, being saturated thereby, project movement and life in their turn, so forming creative currents; light, astralized in the stars, animalized in animals, humanized in human beings; light, which vegetates all plants, glistens in metals, produces all forms of Nature and equilibrates all by the laws of universal sympathy--this is the light which exhibits the phenomena of magnetism, divined by Paracelsus, which tinctures the blood, being released from the air as it is inhaled and discharged by the hermetic bellows of the lungs.\" ( The History of Magic .) This vital energy has its origin in the spiritual body of the earth.\n\nEvery created thing has two bodies, one visible and substantial, the other invisible and transcendent.\n\nThe latter consists of an ethereal counterpart of the physical form; it constitutes the vehicle of archæus , and may be called a vital body .\n\nThis etheric shadow sheath is not dissipated by death, but remains until the physical form is entirely disintegrated.\n\nThese \"etheric doubles, \"seen around graveyards, have given rise to a belief in ghosts.\n\nBeing much finer in its substances than the earthly body, the etheric double is far more susceptible to impulses and inharmonies.\n\nIt is derangements of this astral light body that cause much disease.\n\nParacelsus taught that a person with a morbid mental attitude could poison his own etheric nature, and this infection, diverting the natural flow of vital life force , would later appear as a physical ailment.\n\nAll plants and minerals have an invisible nature composed of this \"archæus,\" but each manifests it in a different way.\n\nConcerning the astral-light bodies of flowers, James Gaffarel, in 1650, wrote the following: \"I answer, that though they be chopt in pieces, brayed in a Mortar, and even burnt to Ashes; yet do they neverthelesse retaine, (by a certaine Secret, and wonderfull Power of Nature), both in the Juyce, and in the Ashes, the selfe same Forme, and Figure, that they had before: and though it be not there Visible, yet it may by Art be drawne forth, and made Visible to the Eye, by an Artist.\n\nThis perhaps will seem a Ridiculous story to those, who reade only the Titles of Bookes: but, those that please, may see this truth confirmed, if they but have recourse to the Workes of M.\n\ndu Chesne, S."

