body = "Now the outer surface of this instrument is of a convex figure, as within its circumference are contained those four chords or bars [only three shown], which make such a rattling when they are shaken--nor is this without its meaning; for that part of the universe which is subject to generation and corruption is contained within the sphere of the moon; and whatever motions or changes may happen therein, they are all effected by the different combinations of the four elementary bodies, fire, earth, water, and air--moreover, upon the upper part of the convex surface of the sistrum is carved the effigies of a cat with a human visage, as on the lower edge of it, under those moving chords, is engraved on the one side the face of Isis, and on the other that of Nephthys--by the faces symbolically representing generation and corruption (which, as has been already observed, is nothing but the motion and alteration of the four elements one amongst another),\" (From Plutarch's Isis and Osiris.) *** The ancients gave the name Isis to one of their occult medicines; therefore the description here given relates somewhat to chemistry.\n\nHer black drape also signifies that the moon, or the lunar humidity--the sophic universal mercury and the operating substance of Nature in alchemical terminology--has no light of its own, but receives its light, its fire, and its vitalizing force from the sun.\n\nIsis was the image or representative of the Great Works of the wise men: the Philosopher's Stone, the Elixir of Life, and the Universal Medicine.\n\nOther hieroglyphics seen in connection with Isis are no less curious than those already described, but it is impossible to enumerate all, for many symbols were used interchangeably by the Egyptian Hermetists.\n\nThe goddess often wore upon her head a hat made of cypress branches, to signify mourning for her dead husband and also for the physical death which she caused every creature to undergo in order to receive a new life in posterity or a periodic resurrection.\n\nThe head of Isis is sometimes ornamented with a crown of gold or a garland of olive leaves, as conspicuous marks of her sovereignty as queen of the world and mistress of the entire universe.\n\nThe crown of gold signifies also the aurific unctuosity or sulphurous fatness of the solar and vital fires which she dispenses to every individual by a continual circulation of the elements, this circulation being symbolized by the musical rattle which she carries in her hand.\n\nThis sistrum is also the yonic symbol of purity.\n\nA serpent interwoven among the olive leaves on her head, devouring its own tail, denotes that the aurific unctuosity was soiled with the venom of terrestrial corruption which surrounded it and must be mortified and purified by seven planetary circulations or purifications called flying eagles (alchemical terminology) in order to make it medicinal for the restoration of health.\n\n(Here the emanations from the sun are recognized as a medicine for the healing of human ills.) The seven planetary circulations are represented by the circumambulations of the Masonic lodge; by the marching of the Jewish priests seven times around the walls of Jericho, and of the Mohammedan priests seven times around the Kabba at Mecca.\n\nFrom the crown of gold project three horns of plenty, signifying the abundance of the gifts of Nature proceeding from one root having its origin in the heavens (head of Isis).\n\nIn this figure the pagan naturalists represent all the vital powers of the three kingdoms and families of sublunary nature-mineral, plant, and animal (man considered as an animal)."

