body = "Elizabeth Wells Gallup, the celestial globe at which the maniac is pointing is a cryptic symbol of Sir Francis Bacon.\n\nThe planetary signs which appear in the clouds opposite the marginal figures 4, 5;, 6, and 7 signify the planetary configurations, which produce the forms of mania depicted.\n\nThe seated man, with his head resting upon his hand.\n\nis declared by Baconian enthusiasts to represent Sir Francis Bacon.\n\n*** Scores of volumes have been written to establish Sir Francis Bacon as the real author of the plays and sonnets popularly ascribed to William Shakspere.\n\nAn impartial consideration of these documents cannot but convince the open-minded of the verisimilitude of the Baconian theory.\n\nIn fact those enthusiasts who for years have struggled to identify Sir Francis Bacon as the true \"Bard of Avon\" might long since have won their case had they emphasized its most important angle, namely, that Sir Francis Bacon, the Rosicrucian initiate, wrote into the Shakespearian plays the secret teachings of the Fraternity of R.C.\n\nand the true rituals of the Freemasonic Order, of which order it may yet be discovered that he was the actual founder.\n\nA sentimental world, however, dislikes to give up a traditional hero, either to solve a controversy or to right a wrong.\n\nNevertheless, if it can be proved that by raveling out the riddle there can be discovered information of practical value to mankind, then the best minds of the world will cooperate in the enterprise.\n\nThe Bacon-Shakspere controversy, as its most able advocates realize, involves the most profound aspects of science, religion, and ethics; he who solves its mystery may yet find therein the key to the supposedly lost wisdom of antiquity.\n\nIt was in recognition of Bacon's intellectual accomplishments that King James turned over to him the translators' manuscripts of what is now known as the King James Bible for the presumable purpose of checking, editing, and revising them.\n\nThe documents remained in his hands for nearly a year, but no information is to be had concerning what occurred in that time.\n\nRegarding this work, William T.\n\nSmedley writes: \" It will eventually be proved that the whole scheme of the Authorised Version of the Bible was Francis Bacon's.\" (See The Mystery of Francis Bacon .) The first edition of the King James Bible contains a cryptic Baconian headpiece.\n\nDid Bacon cryptographically conceal in the Authorized Bible that which he dared not literally reveal in the text--the secret Rosicrucian key to mystic and Masonic Christianity?\n\nSir Francis Bacon unquestionably possessed the range of general and philosophical knowledge necessary to write the Shakespearian plays and sonnets, for it is usually conceded that he was a composer, lawyer, and linguist.\n\nHis chaplain, Doctor William Rawley, and Ben Jonson both attest his philosophic and poetic accomplishments.\n\nThe former pays Bacon this remarkable tribute: \"I have been enduced to think that if there were a beame of knowledge derived from God upon any man in these modern times, it was upon him.\n\nFor though he was a great reader of books; yet he had not his knowledge from books but from some grounds and notions from within himself.\n\n\" (See Introduction to the Resuscitado .) Sir Francis Bacon, being not only an able barrister but also a polished courtier, also possessed that intimate knowledge of parliamentary law and the etiquette of the royal court revealed in the Shakespearian plays which could scarcely have been acquired by a man in the humble station of the Stratford actor.\n\nLord Verulam furthermore visited many of the foreign countries forming the background for the plays and was therefore in a position to create the authentic local atmosphere contained therein, but there is no record of William Shakspere's ever having traveled outside of England."

