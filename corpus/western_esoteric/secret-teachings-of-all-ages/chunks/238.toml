[content]
body = "These tables were fashioned from the divine sapphire, Schethiyâ, which the Most High, after removing from His own throne, had cast into the Abyss to become the foundation and generator of the worlds.\n\nThis sacred stone, formed of heavenly dew, was sundered by the breath of God, and upon the two parts were drawn in black fire the figures of the Law.\n\nThese precious inscriptions, aglow with celestial splendor, were delivered by the Lord on the Sabbath day into the hands of Moses, who was able to read the illumined letters from the reverse side because of the transparency of the great jewel.\n\n(See The Secret Doctrine in Israel or The Zohar for details of this legend.) The Ten Commandments are the ten shining gems placed by the Holy One in the sapphire sea of Being, and in the depths of matter the reflections of these jewels are seen as the laws governing the sublunary spheres.\n\nThey are the sacred ten by which the Supreme Deity has stamped His will upon the face of Nature.\n\nThis same decad was celebrated by the Pythagoreans under the form of the tetractys--that triangle of spermatic points which reveals to the initiated the whole working of the cosmic scheme; for ten is the number of perfection, the key to creation, and the proper symbol of God, man, and the universe.\n\nBecause of the idolatry of the Israelites, Moses deemed the people unworthy to receive the sapphire tables; hence he destroyed them, that the Mysteries of Jehovah should not be violated.\n\nFor the original set Moses substituted two tablets of rough stone into the surface of which he had cut ten ancient letters.\n\nWhile the former tables--partaking of the divinity of the Tree of Life--blazed forth eternal verities, the latter--partaking of the nature of the Tree of Good and Evil--revealed only temporal truths.\n\nThus the ancient tradition of Israel returned again to heaven, leaving only its shadow with the children of the twelve tribes.\n\nOne of the two tables of stone delivered by the Lawgiver to his followers stood for the oral, the other for the written traditions upon which the Rabbinical School was founded.\n\nAuthorities differ widely as to the size and substance of the inferior tables.\n\nSome describe them as being so small that they could be held in the hollow of a man's hand; others declare that each table was ten or twelve cubits in length and of enormous weight.\n\nA few even deny that the tables were of stone, maintaining that they were of a wood called sedr , which, according to the Mohammedans, grows profusely in Paradise.\n\nThe two tables signify respectively the superior and the inferior worlds--the paternal and the maternal formative principles.\n\nIn their undivided state they represent the Cosmic Androgyne.\n\nThe breaking of the tables signifies obscurely the separation of the superior and the inferior spheres and also the division of the sexes.\n\nIn the religious processionals of the Greeks and Egyptians an ark or ship was carried which contained stone tablets, cones, and vessels of various shapes emblematic of the procreative processes.\n\nThe Ark of the Israelites--which was patterned after the sacred chests of the Isiac Mysteries--contained three holy objects, each having an important phallic interpretation: the pot of manna, the rod that budded, and the Tablets of the Law--the first, second, and third Principles of the Creative Triad.\n\nThe manna, the blossoming staff, and the stone tables are also appropriate images respectively of the Qabbalah, the Mishna, and the written law--the spirit, soul, and body of Judaism.\n\nWhen placed in King Solomon's Everlasting House, the Ark of the Covenant contained only the Tablets of the Law.\n\nDoes this indicate that even at that early date the secret tradition had been lost and the letter of the revelation alone remained?"

