[content]
body = "The Mysteries taught that the divine energies from the gods descended upon the top of the Pyramid, which was likened to an inverted tree with its branches below and its roots at the apex.\n\nFrom this inverted tree the divine wisdom is disseminated by streaming down the diverging sides and radiating throughout the world.\n\nThe size of the capstone of the Great Pyramid cannot be accurately determined, for, while most investigators have assumed that it was once in place, no vestige of it now remains.\n\nThere is a curious tendency among the builders of great religious edifices to leave their creations unfinished, thereby signifying that God alone is complete.\n\nThe capstone--if it existed--was itself a miniature pyramid, the apex of which again would be capped by a smaller block of similar shape, and so on ad infinitum .\n\nThe capstone therefore is the epitome of the entire structure.\n\nThus, the Pyramid may be likened to the universe and the capstone to man.\n\nFollowing the chain of analogy, the mind is the capstone of man, the spirit the capstone of the mind, and God--the epitome of the whole--the capstone of the spirit.\n\nAs a rough and unfinished block, man is taken from the quarry and by the secret culture of the Mysteries gradually transformed into a trued and perfect pyramidal capstone.\n\nThe temple is complete only when the initiate himself becomes the living apex through which the divine power is focused into the diverging structure below.\n\nW.\n\nMarsham Adams calls the Great Pyramid \"the House of the Hidden Places\"; such indeed it was, for it represented the inner sanctuary of pre-Egyptian wisdom.\n\nBy the Egyptians the Great Pyramid was associated with Hermes, the god of wisdom and letters and the Divine Illuminator worshiped through the planet Mercury.\n\nRelating Hermes to the Pyramid emphasizes anew the fact that it was in reality the supreme temple of the Invisible and Supreme Deity.\n\nThe Great Pyramid was not a lighthouse, an observatory, or a tomb, but the first temple of the Mysteries, the first structure erected as a repository for those secret truths which are the certain foundation of all arts and sciences.\n\nIt was the perfect emblem of the microcosm and the macrocosm and, according to the secret teachings, the tomb of Osiris, the black god of the Nile.\n\nOsiris represents a certain manifestation of solar energy, and therefore his house or tomb is emblematic of the universe within which he is entombed and upon the cross of which he is crucified.\n\nThrough the mystic passageways and chambers of the Great Pyramid passed the illumined of antiquity.\n\nThey entered its portals as men ; they came forth as gods .\n\nIt was the place of the \"second birth,\" the \"womb of the Mysteries,\" and wisdom dwelt in it as God dwells in the hearts of men.\n\nSomewhere in the depths of its recesses there resided an unknown being who was called \"The Initiator,\" or \"The Illustrious One,\" robed in blue and gold and bearing in his hand the sevenfold key of Eternity.\n\nThis was the lion-faced hierophant, the Holy One, the Master of Masters, who never left the House of Wisdom and whom no man ever saw save he who had passed through the gates of preparation and purification.\n\nIt was in these chambers that Plato--he of the broad brow---came face to face with the wisdom of the ages personified in the Master of the Hidden House.\n\nWho was the Master dwelling in the mighty Pyramid, the many rooms of which signified the worlds in space; the Master whom none might behold save those who had been \"born again\"?\n\nHe alone fully knew the secret of the Pyramid, but he has departed the way of the wise and the house is empty."

