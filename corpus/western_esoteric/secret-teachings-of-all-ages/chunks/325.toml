[content]
body = "Above sits the immobile sphinx, carrying the sword of Justice and signifying the perfect equilibrium of Universal Wisdom.\n\nAnubis is shown rising and Typhon descending; but when Typhon reaches the bottom, evil ascends again, and when Anubis reaches the top good wanes once more.\n\nThe Wheel of Fortune represents the lower universe as a whole with Divine Wisdom (the sphinx) as the eternal arbiter between good and evil.\n\nIn India, the chakra , or wheel, is associated with the life centers either of a world or of an individual.\n\nIn the pseudo-Egyptian Tarot the Sphinx is armed with a javelin, and Typhon is being thrown from the wheel.\n\nThe vertical columns, supporting the wheel and so placed that but one is visible, represent the axis of the world with the inscrutable sphinx upon its northern pole.\n\nSometimes the wheel with its supports is in a boat upon the water.\n\nThe water is the Ocean of Illusion, which is the sole foundation of the Cycle of Necessity.\n\nThe eleventh numbered major trump is called La Force, Strength, and portrays a girl wearing a hat in the form of a lemniscate, with her hands upon the mouth of an apparently ferocious lion.\n\nConsiderable controversy exists as to whether the maid is dosing or opening the lion's mouth.\n\nMost writers declare her to be closing the jaws of the beast, but a critical inspection conveys the opposite impression.\n\nThe young woman symbolizes spiritual strength and the lion either the animal world which the girl is mastering or the Secret Wisdom over which she is mistress.\n\nThe lion also signifies the summer solstice and the girl, Virgo, for when the sun enters this constellation, the Virgin robs the lion of his strength.\n\nKing Solomon's throne was ornamented with lions and he himself was likened to the king of beasts with the key of wisdom between its teeth.\n\nIn this sense, the girl may be opening the lion's mouth to find the key contained therein for courage is a prerequisite to the attainment of knowledge.\n\nIn the pseudo-Egyptian Tarot the symbolism is the same except that the maiden is represented as a priestess wearing an elaborate crown in the form of a bird surmounted by serpents and an ibis.\n\nThe twelfth numbered major trump is called Le Pendu , the Hanged Man, an portrays a young man hanging by his left leg from a horizontal beam, the latter supported by two tree trunks from each of which six branches have been removed.\n\nThe right leg of the youth is crossed in back of the left and his arms are folded behind his back in such a way as to form a cross surmounting a downward pointing triangle.\n\nThe figure thus forms an inverted symbol of sulphur and, according to Levi, signifies the accomplishment of the magnum opus .\n\nIn some decks the figure carries under each arm a money bag from which coins are escaping.\n\nPopular tradition associates this card with Judas Iscariot, who is said to have gone forth and hanged himself, the money bags representing the payment he received for his crime.\n\nLevi likens the hanged man to Prometheus, the Eternal Sufferer, further declaring that the upturned feet signify the spiritualization of the lower nature.\n\nIt is also possible that the inverted figure denotes the loss of the spiritual faculties, for the head is below the level of the body.\n\nThe stumps of the twelve branches are the signs of the zodiac divided into two groups--positive and negative.\n\nThe picture therefore depicts polarity temporarily triumphant over the spiritual principle of equilibrium.\n\nTo attain the heights of philosophy, therefore, man must reverse (or invert) the order of his life.\n\nHe then loses his sense of personal possession because he renounces the rule of gold in favor of the golden rule."

