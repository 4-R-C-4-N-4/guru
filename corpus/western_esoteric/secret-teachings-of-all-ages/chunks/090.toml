body = "IT is especially fitting that a study of Hermetic symbolism should begin with a discussion of the symbols and attributes of the Saitic Isis .\n\nThis is the Isis of Sais, famous for the inscription concerning her which appeared on the front of her temple in that city: \" I, Isis, am all that has been, that is or shall be; no mortal Man hath ever me unveiled .\" Plutarch affirms that many ancient authors believed this goddess to be the daughter of Hermes; others held the opinion that she was the child of Prometheus.\n\nBoth of these demigods were noted for their divine wisdom.\n\nIt is not improbable that her kinship to them is merely allegorical.\n\nPlutarch translates the name Isis to mean wisdom.\n\nGodfrey Higgins, in his Anacalypsis, derives the name of Isis from the Hebrew ישע, Iso , and the Greek ζωω, to save.\n\nSome authorities, however, for example, Richard Payne Knight (as stated in his Symbolical Language of Ancient Art and Mythology ), believe the word to be of Northern extraction, possibly Scandinavian or Gothic.\n\nIn these languages the name is pronounced Isa , meaning ice , or water in its most passive, crystallized, negative state.\n\nThis Egyptian deity under many names appears as the principle of natural fecundity among nearly all the religions of the ancient world.\n\nShe was known as the goddess with ten thousand appellations and was metamorphosed by Christianity into the Virgin Mary, for Isis, although she gave birth to all living things--chief among them the Sun--still remained a virgin, according to the legendary accounts.\n\nApuleius in the eleventh book of The Golden Ass ascribes to the goddess the following statement concerning her powers and attributes: \"Behold, * *, I, moved by thy prayers, am present with thee; I, who am Nature, the parent of things, the queen of all the elements, the primordial progeny of ages, the supreme of Divinities, the sovereign of the spirits of the dead, the first of the celestials, and the uniform resemblance of Gods and Goddesses.\n\nI, who rule by my nod the luminous summits of the heavens, the salubrious breezes of the sea, and the deplorable silences of the realms beneath, and whose one divinity the whole orb of the earth venerates under a manifold form, by different rites and a variety of appellations.\n\nHence the primogenial Phrygians call me Pessinuntica, the mother of the Gods, the Attic Aborigines, Cecropian Minerva; the floating Cyprians, Paphian Venus; the arrow-bearing Cretans, Diana Dictynna; the three-tongued Sicilians, Stygian Proserpine; and the Eleusinians, the ancient Goddess Ceres.\n\nSome also call me Juno, others Bellona, others Hecate, and others Rhamnusia.\n\nAnd those who are illuminated by the incipient rays of that divinity the Sun, when he rises, viz.\n\nthe Ethiopians, the Arii, and the Egyptians skilled in ancient learning, worshipping me by ceremonies perfectly appropriate, call me by my true name, Queen Isis.\" Le Plongeon believes that the Egyptian myth of Isis had a historical basis among the Mayas of Central America, where this goddess was known as Queen Moo.\n\nIn Prince Coh the same author finds a correspondence to Osiris, the brother-husband of Isis.\n\nLe Plongeon's theory is that Mayan civilization was far more ancient than that of Egypt.\n\nAfter the death of Prince Coh, his widow, Queen Moo, fleeing to escape the wrath of his murderers, sought refuge among the Mayan colonies in Egypt, where she was accepted as their queen and was given the name of Isis."

