body = "The lower octave (Γ to G) comprises that part of the universe in which substance predominate over energy.\n\nIts harmonies, therefore, are more gross than those of the higher octave (G to g) wherein energy predominates over substance.\n\n\"If struck in the more spiritual part,\" writes Fludd, \"the monochord will give eternal life; if in the more material part, transitory life.\" It will be noted that certain elements, planets, and celestial spheres sustain a harmonic ratio to each other, Fludd advanced this as a key to the sympathies and antipathies existing between the various departments of Nature.\n\n*** The Greek initiates also recognized a fundamental relationship between the individual heavens or spheres of the seven planets, and the seven sacred vowels.\n\nThe first heaven uttered the sound of the sacred vowel Α (Alpha); the second heaven, the sacred vowel Ε (Epsilon); the third, Η (Eta); the fourth, Ι (Iota); the fifth, Ο (Omicron); the sixth, Υ (Upsilon); and the seventh heaven, the sacred vowel Ω (Omega).\n\nWhen these seven heavens sing together they produce a perfect harmony which ascends as an everlasting praise to the throne of the Creator.\n\n(See Irenæus' Against Heresies .) Although not so stated, it is probable that the planetary heavens are to be considered as ascending in the Pythagorean order, beginning with the sphere of the moon, which would be the first heaven.\n\nMany early instruments had seven Strings, and it is generally conceded that Pythagoras was the one who added the eighth string to the lyre of Terpander.\n\nThe seven strings were always related both to their correspondences in the human body and to the planets.\n\nThe names of God were also conceived to be formed from combinations of the seven planetary harmonies.\n\nThe Egyptians confined their sacred songs to the seven primary sounds, forbidding any others to be uttered in their temples.\n\nOne of their hymns contained the following invocation: \"The seven sounding tones praise Thee, the Great God, the ceaseless working Father of the whole universe.\" In another the Deity describes Himself thus: \"I am the great indestructible lyre of the whole world, attuning the songs of the heavens.\n\n(See Nauman's History of Music .) The Pythagoreans believed that everything which existed had a voice and that all creatures were eternally singing the praise of the Creator.\n\nMan fails to hear these divine melodies because his soul is enmeshed in the illusion of material existence.\n\nWhen he liberates himself from the bondage of the lower world with its sense limitations, the music of the spheres will again be audible as it was in the Golden Age.\n\nHarmony recognizes harmony, and when the human soul regains its true estate it will not only hear the celestial choir but also join with it in an everlasting anthem of praise to that Eternal Good controlling the infinite number of parts and conditions of Being.\n\nThe Greek Mysteries included in their doctrines a magnificent concept of the relationship existing between music and form.\n\nThe elements of architecture, for example, were considered as comparable to musical modes and notes, or as having a musical counterpart.\n\nConsequently when a building was erected in which a number of these elements were combined, the structure was then likened to a musical chord, which was harmonic only when it fully satisfied the mathematical requirements of harmonic intervals.\n\nThe realization of this analogy between sound and form led Goethe to declare that \"architecture is crystallized music.\" In constructing their temples of initiation, the early priests frequently demonstrated their superior knowledge of the principles underlying the phenomena known as vibration.\n\nA considerable part of the Mystery rituals consisted of invocations and intonements, for which purpose special sound chambers were constructed."

