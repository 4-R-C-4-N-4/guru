body = "Yet the cross itself is the oldest of phallic emblems, and the lozenge-shaped windows of cathedrals are proof that yonic symbols have survived the destruction of the pagan Mysteries.\n\nThe very structure of the church itself is permeated with phallicism.\n\nRemove from the Christian Church all emblems of Priapic origin and nothing is left, for even the earth upon which it stands was, because of its fertility, the first yonic symbol.\n\nAs the presence of these emblems of the generative processes is either unknown or unheeded by the majority, the irony of the situation is not generally appreciated.\n\nOnly those conversant with the secret language of antiquity are capable of understanding the divine significance of these emblems.\n\nFlowers were chosen as symbols for many reasons.\n\nThe great variety of flora made it possible to find some plant or flower which would be a suitable figure for nearly any abstract quality or condition.\n\nA plant might be chosen because of some myth connected with its origin, as the stories of Daphne and Narcissus; because of the peculiar environment in which it thrived, as the orchid and the fungus; because of its significant shape, as the passion flower and the Easter lily; because of its brilliance or fragrance, as the verbena and the sweet lavender; because it preserved its form indefinitely, as the everlasting flower; because of unusual characteristics as the sunflower and heliotrope, which have long been sacred because of their affinity for the sun.\n\nThe plant might also be considered worthy of veneration because from its crushed leaves, petals, stalks, or roots could be extracted healing unctions, essences, or drugs affecting the nature and intelligence of human beings--such as the poppy and the ancient herbs of prophecy.\n\nThe plant might also be regarded as efficacious in the cure of many diseases because its fruit, leaves, petals, or roots bore a resemblance in shape or color to parts or organs of the human body.\n\nFor example, the distilled juices of certain species of ferns, also the hairy moss growing upon oaks, and the thistledown were said to have the power of growing hair; the dentaria , which resembles a tooth in shape, was said to cure the toothache; and the palma Christi plant, because of its shape, cured all afflictions of the hands.\n\nThe blossom is really the reproductive system of the plant and is therefore singularly appropriate as a symbol of sexual purity--an absolute requisite of the ancient Mysteries.\n\nThus the flower signifies this ideal of beauty and regeneration which must ultimately take the place of lust and degeneracy.\n\nOf all symbolic flowers the locus blossom of India and Egypt and the rose of the Rosicrucians are the most important.\n\nIn their symbolism these two flowers are considered identical.\n\nThe esoteric doctrines for which the Eastern lotus stands have been perpetuated in modern Europe under the form of the rose.\n\nThe rose and the lotus are yonic emblems, signifying primarily the maternal creative mystery, while the Easter lily is considered to be phallic.\n\nThe Brahmin and Egyptian initiates, who undoubtedly understood the secret systems of spiritual culture whereby the latent centers of cosmic energy in man may be stimulated, employed the lotus blossoms to represent the spinning vortices of spiritual energy located at various points along the spinal column and called chakras , or whirling wheels, by the Hindus.\n\nSeven of these chakras are of prime importance and have their individual correspondences in the nerve ganglia and plexuses."

