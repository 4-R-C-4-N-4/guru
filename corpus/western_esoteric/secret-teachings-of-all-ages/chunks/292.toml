[content]
body = "Out of B 1 are taken nine globes--B 2, B 3, B 4, B 5, B 6, B 7, B 8, B 9, and B 10--which constitute the World of Briah .\n\nThese ten subdivisions, however, are really the ten Atziluthic powers reflected into the substance of the Briatic World.\n\nB 1 is the ruler of this world, for it contains all the other rings of its own world and also the rings of the third and fourth worlds, C and D.\n\nIn the World of Briah the ten spheres of light are called the Archangels of Briah .\n\nTheir order and powers are as follows: From A 10 came B 1, the Second Crown; it is called Metatron , the Angel of the Presence.\n\nFrom B 1 came B 2, the second Wisdom; it is called Raziel , the Herald of Deity who revealed the mysteries of Qabbalah to Adam.\n\nFrom B 2 carne B 3, the second Understanding; it is called Tsaphkiel , the Contemplation of God.\n\nFrom B 3 came B 4 ' the second Mercy; it is called Tsadkiel , the justice of God.\n\nFrom B 4 came B 5, the second Severity; it is called Samael , the Severity of God.\n\nFrom B 5 came B 6, the second Beauty; it is called Michael , Like Unto God.\n\nFrom B 6 came B 7, the second Victory; it is called Haniel , the Grace of God.\n\nFrom B 7 came B 8, the second Glory; it is called Raphael , the Divine Physician.\n\nFrom B 8 came B 9, the second Foundation; it is called Gabriel , the Man-God.\n\nFrom B 9 came B 10, the second Kingdom; it is called Sandalphon , the Messias.\n\nFrom B 10 came C 1, the Third Crown, and the World of Yetzirah was established.\n\nThe ten Archangels of Briah are conceived to be ten great spiritual beings, whose duty is to manifest the ten powers of the Great Name of God existent in the Atziluthic World, which surrounds and interpenetrates the entire world of creation.\n\nAll things manifesting in the lower worlds exist first in the intangible rings of the upper spheres, so that creation is, in truth, the process of making tangible the intangible by extending the intangible into various vibratory rates.\n\nThe ten globes of Briatic power, while themselves reflections, are mirrored downward into the third or Yetziratic World, where still more limited in their expression they become the spiritual and invisible zodiac which is behind the visible band of constellations.\n\nIn this third world the ten globes of the original Atziluthic World are greatly limited and dimmed, but they are still infinitely powerful in comparison with the state of substance in which man dwells.\n\nIn the third world, C 1 to C 10, the globes become hierarchies of celestial creatures, called the Choirs of Yetzirah .\n\nHere again, all are included within the ring C 1, the power which controls the Yetziratic World and which includes within itself and controls the entire world D.\n\nThe order of the globes and the names of the hierarchies composing them are as follows: From B 10 came C 1, the Third Crown; the Hierarchy is the Cherubim, Chaioth Ha Kadosh , the Holy Animals.\n\nFrom C 1 came C 2, the third Wisdom; the Hierarchy is the Cherubim, Orphanim , the Wheels."

