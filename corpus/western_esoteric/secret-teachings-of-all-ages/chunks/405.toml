body = "No better way can be found of introducing to the \"Royal Art\" a seeker after the mysteries of symbolical philosophy than to place at his disposal an actual example of alchemical writing.\n\nThe text of this manuscript is as enigmatic as are its diagrams; but to him who will meditate upon the profound significance of both, the deeper issues of mysticism in due time will be made clear.\n\nAn unknown person through whose hands this manuscript passed wrote thus of it: \"Because of its drawings and illustrated expositions, the manuscript is of preeminent importance to the Rosicrucians and the contemporary order of Freemasons.\n\nThe first, and larger, part of the illustrations deals with the Hermetic philosophy, explaining its teachings and doctrines.\n\nInterspersed among these are portraits of great teachers and satirical representations of bunglers and their mistaken views.\n\nThe systematically arranged part shows with wonderful clearness the color development of the alchemical processes from blue-gold over black to white and rose.\n\nThroughout it treats of the change in human beings and not of the making of gold .\n\nEver upon the Grade of Black (the return into Chaos from which new creations are possible) follows the Grade of the Neophytes, the New Birth, which is often repeated with impressive lucidity.\n\nThe black stage occurs as usual through fire.\n\nThis unopened and unpublished manuscript belongs to the order of the most important Precepts and Documents of the Rosicrucians, and Freemasons.\n\nA search through the museums and library collections of Germany has failed to reveal any item of even a similar character.\" In addition to the 26 leaves here reproduced there are ten bottles or retorts, each half filled with varicolored substances.\n\nThese bottles can be so easily described that it is unnecessary to reproduce them.\n\nThe first bottle (from the mouth of which issues a golden shrub with three blossoms) contains a bluish-gray liquid, the entire figure being called \"Our Quicksilver.\" Under the vessel is a verse containing the significant words: \"He will have white garments for black and then red.\" The second bottle (from the neck of which rise four golden flowers) also contains the bluish-gray substance termed quicksilver.\n\nBelow the bottle is the admonition to \"make spirit of the body and grace of the gross, that the corporeal may become incorporeal.\" The third bottle is entirely black save for a golden tree trunk having six lopped-off branches and terminating in five branches which end in knobs and protrude from the neck of the bottle.\n\nThe state of the substance is termed \"Blackness showing through the Head of the Raven.\" Under the bottle occurs the statement that \"the tincture of the Philosophers is hidden in the air like the soul in the human body.\" The fourth bottle is of the deepest blackness and is called \"The Head of the Raven.\" Nothing rises from the neck of the vessel, for the earth (its contents) is described as \"submerged in Chaos.\" The bottom of the fifth bottle contains a bluish-gray, spotted liquid, the upper part being filled with a brick-colored substance.\n\nAbove are the words: \"Sixth Raven's Head\"; below is added: \"At the bottom of the vessel worms are born.\" The lower half of the sixth bottle is of a bluish-gray, the u per half black, the entire figure being termed \"Seventh Raven's Head.\" A child is seated beside the bottle, concerning whom it is written: \"This newly-born, black son is called Elixir and will be made perfectly white.\" The seventh bottle is black below and black spotted with red above.\n\nThe process is thus described: \"Black blacker than black, for many divers colors will appear."

