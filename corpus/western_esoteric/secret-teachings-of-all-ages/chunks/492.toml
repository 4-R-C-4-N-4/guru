body = "* * * They called him a Prophet, you say?\n\nWhy, he stood there face to face with them; there, not enshrined in any mystery, visibly clouting his own cloak, cobbling his own shoes, fighting, counselling, ordering in the midst of them, they must have seen what kind of a man he was, let him be called what you like!\n\nNo emperor with his tiaras was obeyed as this man in a cloak of his own clouting.\" Confused by the apparently hopeless task of reconciling the life of the Prophet with the absurd statements long accepted as authentic, Washington Irving weighs him in the scales of fairness.\n\n\"His military triumphs awakened no pride nor vainglory, as they would have done had they been effected for selfish purposes.\n\nIn the time of his greatest power, he maintained the same simplicity of manners and appearances as in the days of his adversity.\n\n* * * It is this perfect abnegation of self, connected with this apparent heartfelt piety, running throughout the various phases of his fortune, which perplex one in forming a just estimate of Mahomet's character.\n\n* * * When he hung over the death-bed of his infant son Ibrahim, resignation to the will of God was exhibited in his conduct under this keenest of afflictions; and the hope of soon rejoining his child in Paradise was his consolation.\" (See Mahomet and His Successors .) A'isha, questioned after the death of the Prophet concerning his habits, replied that he mended his own clothes, cobbled his own shoes, and helped her in the household duties.\n\nHow far removed from Western concepts of Mohammed's sanguinary character is A’isha's simple admission that he loved most of all to sew!\n\nHe also accepted the invitations of slaves and sat at meals with servants, declaring himself to be a servant.\n\nOf all vices he hated lying the most.\n\nBefore his death he freed all his slaves.\n\nHe never permitted his family to use for personal ends any of the alms or tithe money given by his people.\n\nHe was fond of sweetmeats and used rain water for drinking purposes.\n\nHis time he divided into three parts, namely: the first he gave to God, the second to his family, and the third to himself.\n\nThe latter portion, however, he later sacrificed to the service of his people.\n\nHe dressed chiefly in white but also wore red, yellow, and green.\n\nMohammed entered Mecca wearing a black turban and bearing a black standard.\n\nHe wore only the plainest of garments, declaring that rich and conspicuous raiment did not become the pious, and did not remove his shoes at prayer.\n\nHe was particularly concerned with the cleanliness of his teeth and at the time of his death, when too weak to speak, indicated his desire for a toothpick.\n\nWhen fearful of forgetting something, the Prophet tied a thread to his ring.\n\nHe once had a very fine gold ring but, noting that his followers had taken to wearing similar rings in emulation of him, he removed his own and threw it away lest his followers form an evil habit.\n\n(See The Life of Mohammad .) THE CAABA, THE HOLY PLACE OF ISLAM.\n\nSection from panorama of Mecca in D'Ohsson's Tableau Général de l'Empire Othman.\n\nThe Caaba, or cube-shaped building in the midst of the great court of the mosque at Mecca, is the most holy spot in the Islamic world.\n\nToward it the followers of the Prophet must face five times a day at the appointed hours of prayer.\n\nLike the devotees of nearly all other faiths, the Mussulman originally faced the East while in prayer, but by a later decree he was ordered to turn his face toward Mecca."

