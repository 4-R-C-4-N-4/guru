body = "IT was a common practice among the early Egyptians, Greeks, and Romans to seal lighted lamps in the sepulchers of their dead as offerings to the God of Death.\n\nPossibly it was also believed that the deceased could use these lights in finding his way through the Valley of the Shadow.\n\nLater as the custom became generally established, not only actual lamps but miniatures of them in terra cotta were buried with the dead.\n\nSome of the lamps were enclosed in circular vessels for protection; and instances have been recorded in which the original oil was found in them, in a perfect state of preservation, after more than 2,000 years.\n\nThere is ample proof that many of these lamps were burning when the sepulchers were sealed, and it has been declared that they were still burning when the vaults were opened hundreds of years later.\n\nThe possibility of preparing a fuel which would renew itself as rapidly as it was consumed has been a source of considerable controversy among medieval authors.\n\nAfter due consideration of the evidence at hand, it seems well within the range of possibility that the ancient priest-chemists did manufacture lamps that burned, if not indefinitely, at least for considerable periods of time.\n\nNumerous authorities have written on the subject of ever-burning lamps.\n\nW.\n\nWynn Westcott estimates the number of writers who have given the subject consideration as more than 150, and H.\n\nP.\n\nBlavatsky as 173.\n\nWhile conclusions reached by different authors are at variance, a majority admit the existence of these phenomenal lamps.\n\nOnly a few maintained that the lamps would burn forever, but many were willing to concede that they might remain alight for several centuries without replenishment of the fuel.\n\nSome considered the so-called perpetual lights as mere artifices of the crafty pagan priests, while a great many, admitting that the lamps actually burned, made the sweeping assertion that the Devil was using this apparent miracle to ensnare the credulous and thereby lead their souls to perdition.\n\nOn this subject the learned Jesuit, Athanasius Kircher, usually dependable, exhibits a striking inconsistency.\n\nIn his Œdipus Ægyptiacus he writes: \"Not a few of these ever-burning lamps have been found to be the devices of devils, * * * And I take it that all the lamps found in the tombs of the Gentiles dedicated to the worship of certain gods, were of this kind, not because they burned, or have been reported to burn, with a perpetual flame, but because probably the devil set them there, maliciously intending thereby to obtain fresh credence for a false worship.\" Having admitted that dependable authorities defend the existence of the ever-burning lamps, and that even the Devil lends himself to their manufacture, Kircher next declared the entire theory to be desperate and impossible, and to be classed with perpetual motion and the Philosopher's Stone.\n\nHaving already solved the problem to his satisfaction once, Kircher solves it again--but differently--in the following words: \"In Egypt there are rich deposits of asphalt and petroleum.\n\nWhat did these clever fellows [the priests] do, then, but connect an oil deposit by a secret duct with one or more lamps, provided with wicks of asbestos!\n\nHow could such lamps help burning perpetually?\n\n* * * In my opinion this is the solution of the riddle of the supernatural everlastingness of these ancient lamps.\" Montfaucon, in his Antiquities , agrees in the main with the later deductions of Kircher, believing the fabled perpetual lamps of the temples to be cunning mechanical contrivances.\n\nHe further adds that the belief that lamps burned indefinitely in tombs was the result of the noteworthy fact that in some cases fumes resembling smoke poured forth from the entrances of newly opened vaults.\n\nParties going in later and discovering lamps scattered about the floor assumed that they were the source of the fumes."

