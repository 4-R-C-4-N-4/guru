body = "She bathed in the Castalian well, abstained from all food, drank only from the fountain of Cassotis, which was brought into the temple through concealed pipes, and just before mounting the tripod, she chewed a few leaves of the sacred bay tree.\n\nIt has been said that the water was drugged to bring on distorted visions, or the priests of Delphi were able to manufacture an exhilarating and intoxicating gas, which they conducted by subterranean ducts and released into the shaft of the oracle several feet below the surface.\n\nNeither of these theories has been proved, however, nor does either in any way explain the accuracy of the predictions.\n\nTHE PYTHIAN APOLLO.\n\nFrom Historia Deorum Fatidicorum.\n\nApollo, the twin brother of Diana, was the son of Jupiter and Latona.\n\nApollo was fully adult at the time of his birth.\n\nHe was considered to be the first physician and the inventor of music and song.\n\nThe Greeks also acclaimed him to be father of the bow and arrow.\n\nThe famous temple of Apollo at Delphi was rebuilt five times.\n\nThe first temple was formed only of laurel branches; the second was somewhat similar; the third was brass and the fourth and fifth were probably of marble, of considerable size and great beauty.\n\nNo other oracle in Greece equaled in magnificence that of Delphi in the zenith of its power.\n\nWriters declared that it contained many statues of solid gold and silver, marvelous ornaments, and implements of the most valuable materials and beautiful workmanship, donated by princes and kings who came from all parts of the civilized world to consult the spirit of Apollo dwelling in this sanctuary.\n\n*** When the young prophetess had completed the process of purification, she was clothed in sanctified raiment and led to the tripod, upon which she seated herself, surrounded by the noxious vapors rising from the yawning fissure.\n\nGradually, as she inhaled the fumes, a change came over her.\n\nIt was as if a different spirit had entered her body.\n\nShe struggled, tore her clothing, and uttered inarticulate cries.\n\nAfter a time her struggles ceased.\n\nUpon becoming calm a great majesty seemed to posses her, and with eyes fixed on space and body rigid, she uttered the prophetic words.\n\nThe predictions were usually in the form of hexameter verse, but the words were often ambiguous and sometimes unintelligible.\n\nEvery sound that she made, every motion of her body, was carefully recorded by the five Hosii, or holy men, who were appointed as scribes to preserve the minutest details of each divination.\n\nThe Hosii were appointed for life, and were chosen from the direct descendants of Deucalion.\n\nAfter the oracle was delivered, the Pythia began to struggle again, and the spirit released her.\n\nShe was then carried or supported to a chamber of rest, where she remained till the nervous ecstasy had passed away.\n\nIamblichus, in his dissertation on The Mysteries , describes how the spirit of the oracle--a fiery dæmon, even Apollo himself--took control of the Pythoness and manifested through her: \"But the prophetess in Delphi, whether she gives oracles to mankind through an attenuated and fiery spirit, bursting from the mouth of the cavern; or whether being seated in the adytum on a brazen tripod, or on a stool with four feet, she becomes sacred to the God; whichsoever of these is the case, she entirely gives herself up to a divine spirit, and is illuminated with a ray of divine fire.\n\nAnd when, indeed, fire ascending from the mouth of the cavern circularly invests her in collected abundance, she becomes filled from it with a divine splendour."

