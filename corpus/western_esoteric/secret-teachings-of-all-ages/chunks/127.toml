[content]
body = "\"The Isiac Tablet, writes Levi, is a Key to the Ancient Book of Thoth, which has survived to some extent the lapse of centuries and is pictured to us in the still comparatively ancient set of Tarocchi Cards.\n\nTo him the Book of Thoth was a résumé of the esoteric learning of the Egyptians, after the decadence of their civilization, this lore became crystallized in a hieroglyphic form as the Tarot; this Tarot having become partially or entirely forgotten or misunderstood, its pictured symbols fell into the hands of the sham diviners, and of the providers of the public amusement by games of Cards.\n\nThe modem Tarot, or Tarocchi pack of cards consists of 78 cards, of which 22 form a special group of trumps, of pictorial design: the remaining 56 are composed of four suits of 10 numerals and four court cards, King, Queen, Knight, and Knave or Valet; the suits are Swords (Militaryism), Cups (Sacerdocy), Clubs or Wands (Agriculture), and Shekels or Coins (Commerce), answering respectively to our Spades, Hearts, Clubs and Diamonds.\n\nOur purpose is with the 22 trumps, these form the special characteristic of the Pack and are the lineal descendants of the Hieroglyphics of the Tarot.\n\nThese 22 respond to the letters of the Hebrew and other sacred alphabets, which fall naturally into three classes of a Trio of Mothers, a Heptad of doubles, and a duodecad of simple letters.\n\nThey are also considered as a triad of Heptads and one apart, a system of Initiation and an Uninitiate.\" (See Westcott's The Isiac Tablet.) *** The essay published in French by Alexandre Lenoir in 1809, while curious and original, contains little real information on the Tablet, which the author seeks to prove was an Egyptian calendar or astrological chart.\n\nAs both Montfaucon and Lenoir--in fact all writers on the subject since 1651--either have based their work upon that of Kircher or have been influenced considerably by him, a careful translation has been made of the latter's original article (eighty pages of seventeenth century Latin).\n\nThe double-page plate at the beginning of this chapter is a faithful reproduction made by Kircher from the engraving in the Museum of Hieroglyphics.\n\nThe small letters and numbers used to designate the figures were added by him to clarify his commentary and will be used for the same purpose in this work.\n\nLike nearly all religious and philosophical antiquities, the Bembine Table of Isis has been the subject of much controversy.\n\nIn a footnote, A.\n\nE.\n\nWaite--unable to differentiate between the true and the purported nature or origin of the Tablet--echoes the sentiments of J.G.\n\nWilkinson, another eminent exotericus : \"The original [Table] is exceedingly late and is roughly termed a forgery.\" On the other hand, Eduard Winkelmann, a man of profound learning, defends the genuineness and antiquity of the Tablet.\n\nA sincere consideration of the Mensa Isiaca discloses one fact of paramount importance: that although whoever fashioned the Table was not necessarily an Egyptian, he was an initiate of the highest order, conversant with the most arcane tenets of Hermetic esotericism.\n\nSYMBOLISM OF THE BEMBINE TABLE The following necessarily brief elucidation of the Bembine Table is based upon a digest of the writings of Kircher supplemented by other information gleaned by the present author from the mystical writings of the Chaldeans, Hebrews, Egyptians, and Greeks.\n\nThe temples of the Egyptians were so designed that the arrangement of chambers, decorations, and utensils was all of symbolic significance, as shown by the hieroglyphics that covered them."

