[content]
body = "According to Humanism, man is the measure of all things; Rationalism makes the reasoning faculties the basis of all knowledge; Political Philosophy holds that man must comprehend his natural, social, and national privileges; Empiricism declares that alone to be true which is demonstrable by experiment or experience; Moralism emphasizes the necessity of right conduct as a fundamental philosophic tenet; Idealism asserts the realities of the universe to be superphysical--either mental or psychical; Realism , the reverse; and Phenomenalism restricts knowledge to facts or events which can be scientifically described or explained.\n\nThe most recent developments in the field of philosophic thought are Behaviorism and Neo-Realism .\n\nThe former estimates the intrinsic characteristics through an analysis of behavior; the latter may be summed up as the total extinction of idealism.\n\nBaruch de Spinoza, the eminent Dutch philosopher, conceived God to be a substance absolutely self-existent and needing no other conception besides itself to render it complete and intelligible.\n\nThe nature of this Being was held by Spinoza to be comprehensible only through its attributes, which are extension and thought: these combine to form an endless variety of aspects or modes .\n\nThe mind of man is one of the modes of infinite thought; the body of man one of the modes of infinite extension.\n\nThrough reason man is enabled to elevate himself above the illusionary world of the senses and find eternal repose in perfect union with the Divine Essence.\n\nSpinoza, it has been said, deprived God of all personality, making Deity synonymous with the universe.\n\nTHE PTOLEMAIC SCHEME OF THE UNIVERSE.\n\nFrom an old print, courtesy of Carl Oscar Borg.\n\nIn ridiculing the geocentric system of astronomy expounded by Claudius Ptolemy, modem astronomers have overlooked the philosophic key to the Ptolemaic system.\n\nThe universe of Ptolemy is a diagrammatic representation of the relationships existing between the various divine and elemental parts of every creature, and is not concerned with astronomy as that science is now comprehended.\n\nIn the above figure, special attention is called to the three circles of zodiacs surrounding the orbits of the planets.\n\nThese zodiacs represent the threefold spiritual constitution of the universe.\n\nThe orbits of the planets are the Governors of the World and the four elemental spheres in the center represent the physical constitution of both man and the universe, Ptolemy's scheme of the universe is simply a cross section of the universal aura, the planets and elements to which he refers having no relation to those recognized by modern astronomers.\n\n*** German philosophy had its inception with Gottfried Wilhelm von Leibnitz, whose theories are permeated with the qualities of optimism and idealism.\n\nLeibnitz's criteria of sufficient reason revealed to him the insufficiency of Descartes' theory of extension, and he therefore concluded that substance itself contained an inherent power in the form of an incalculable number of separate and all-sufficient units.\n\nMatter reduced to its ultimate particles ceases to exist as a substantial body, being resolved into a mass of immaterial ideas or metaphysical units of power, to which Leibnitz applied the term monad .\n\nThus the universe is composed of an infinite number of separate monadic entities unfolding spontaneously through the objectification of innate active qualities.\n\nAll things are conceived as consisting of single monads of varying magnitudes or of aggregations of these bodies, which may exist as physical, emotional, mental, or spiritual substances.\n\nGod is the first and greatest Monad; the spirit of man is an awakened monad in contradistinction to the lower kingdoms whose governing monadic powers are in a semi-dormant state.\n\nThough a product of the Leibnitzian-Wolfian school, Immanuel Kant, like Locke, dedicated himself to investigation of the powers and limits of human understanding."

