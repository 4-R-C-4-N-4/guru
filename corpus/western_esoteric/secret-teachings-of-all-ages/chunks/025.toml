body = "Part 1 WHEN confronted with a problem involving the use of the reasoning faculties, individuals of strong intellect keep their poise, and seek to reach a solution by obtaining facts bearing upon the question.\n\nThose of immature mentality, on the other hand, when similarly confronted, are overwhelmed.\n\nWhile the former may be qualified to solve the riddle of their own destiny, the latter must be led like a flock of sheep and taught in simple language.\n\nThey depend almost entirely upon the ministrations of the shepherd.\n\nThe Apostle Paul said that these little ones must be fed with milk, but that meat is the food of strong men.\n\nThought less ness is almost synonymous with childishness, while thought ful ness is symbolic of maturity.\n\nThere are, however, but few mature minds in the world; and thus it was that the philosophic-religious doctrines of the pagans were divided to meet the needs of these two fundamental groups of human intellect--one philosophic, the other incapable of appreciating the deeper mysteries of life.\n\nTo the discerning few were revealed the esoteric , or spiritual, teachings, while the unqualified many received only the literal, or exoteric , interpretations.\n\nIn order to make simple the great truths of Nature and the abstract principles of natural law, the vital forces of the universe were personified, becoming the gods and goddesses of the ancient mythologies.\n\nWhile the ignorant multitudes brought their offerings to the altars of Priapus and Pan (deities representing the procreative energies), the wise recognized in these marble statues only symbolic concretions of great abstract truths.\n\nIn all cities of the ancient world were temples for public worship and offering.\n\nIn every community also were philosophers and mystics, deeply versed in Nature's lore.\n\nThese individuals were usually banded together, forming seclusive philosophic and religious schools.\n\nThe more important of these groups were known as the Mysteries .\n\nMany of the great minds of antiquity were initiated into these secret fraternities by strange and mysterious rites, some of which were extremely cruel.\n\nAlexander Wilder defines the Mysteries as \"Sacred dramas performed at stated periods.\n\nThe most celebrated were those of Isis, Sabazius, Cybele, and Eleusis.\" After being admitted, the initiates were instructed in the secret wisdom which had been preserved for ages.\n\nPlato, an initiate of one of these sacred orders, was severely criticized because in his writings he revealed to the public many of the secret philosophic principles of the Mysteries.\n\nEvery pagan nation had (and has) not only its state religion, but another into which the philosophic elect alone have gained entrance.\n\nMany of these ancient cults vanished from the earth without revealing their secrets, but a few have survived the test of ages and their mysterious symbols are still preserved.\n\nMuch of the ritualism of Freemasonry is based on the trials to which candidates were subjected by the ancient hierophants before the keys of wisdom were entrusted to them.\n\nFew realize the extent to which the ancient secret schools influenced contemporary intellects and, through those minds, posterity.\n\nRobert Macoy, 33°, in his General History of Freemasonry , pays a magnificent tribute to the part played by the ancient Mysteries in the rearing of the edifice of human culture."

