body = "On the place where you intend to make the circle, you must first draw a great cross with a large sword with which no one ever has been hurt.\n\nThen you must make three concentric circles.\n\nThe innermost circle is made of a long narrow strip of virgin parchment and must be hung upon twelve crosses made of the wood of cross-thorn .\n\nA MAGICAL SWORD.\n\nFrom Levi's The Magical Ritual.\n\nÉliphas Lévi describes the preparation of a magical sword in substance as follows: The steel blade should be forged in the hour of Mars, with new tools.\n\nThe pommel should be of hollow silver containing quicksilver, and the symbols of Mercury and the moon and the signatures of Gabriel and Samael should be engraved upon it.\n\nThe hilt should be encased with tin, with the symbol of Jupiter and the signature of Michael engraved upon it.\n\nA copper triangle should extend from the hilt along the blade a short distance on each side: these should bear the symbols of Mercury and Venus.\n\nFive Sephiroth should be engraved upon the handle, as shown.\n\nThe blade itself should have the word Malchut upon one side and Quis ut Deus upon the other.\n\nThe sword should be consecrated on Sunday.\n\n*** Upon the parchment you must write the names and symbols according to the figure which follows.\n\nOutside this first circle make the second as follows: \"First secure a thread of red silk that has been spun or twisted to the left instead of the right.\n\nThen place in the ground twelve crosses made of laurel leaves, and also prepare a long strip of new white paper.\n\nWrite with an unused pen the characters and symbols as seen on the second circle.\n\nWind this latter strip of paper around with the red silken thread and pin them upon the twelve crosses of laurel leaves.\n\nOutside this second circle make a third one which is also of virgin parchment and pinned upon twelve crosses of consecrated palm.\n\nWhen you have made these three circles, retire into them until at last you stand in the center upon a pentagram drawn in the midst of the great cross first drawn.\n\nNow, to insure success, do everything according to the description, and when you have read off the sacred invocation pronounce the name of the spirit which you desire to appear.\n\nIt is essential that you pronounce the name very distinctly.\n\nYou must also note the day and the hour, for each spirit can only be invoked at certain times.\" While the black magician at the time of signing his pact with the elemental demon maybe fully convinced that he is strong enough to control indefinitely the powers placed at his disposal, he is speedily undeceived.\n\nBefore many years elapse he must turn all his energies to the problem of self-preservation.\n\nA world of horrors to which he has attuned himself by his own covetousness looms nearer every day, until he exists upon the edge of a seething maelstrom, expecting momentarily to be sucked down into its turbid depths.\n\nAfraid to die--because he will become the servant of his own demon--the magician commits crime after crime to prolong his wretched earthly existence.\n\nRealizing that life is maintained by the aid of a mysterious universal life force which is the common property of all creatures, the black magician often becomes an occult vampire, stealing this energy from others.\n\nAccording to medieval superstition, black magicians turned themselves into werewolves and roamed the earth at night, attacking defenseless victims for the life force contained in their blood.\n\nA MAGIC CIRCLE.\n\nFrom The Complete Book of Magic Science (unpublished).\n\nThe above figure is a complete and faithful representation of a magic circle as designed by mediæval conjurers for the invocation of spirits.\n\nThe magician accompanied by his assistant takes his place at the point formed by the crossing of the central lines marked MAGISTER."

