body = "The girdle is joined together in front by four golden plates (the elements), placed in the form of a square.\n\nThis signified that Isis, or Nature, the first matter (alchemical terminology), was the essence- of the four elements (life, light, heat, and force), which quintessence generated all things.\n\nNumerous stars are represented on this girdle, thereby indicating their influence in darkness as well as the influence of the sun in light.\n\nIsis is the Virgin immortalized in the constellation of Virgo, where the World Mother is placed with the serpent under her feet and a crown.\n\nof stars on her head.\n\nIn her arms she carries a sheaf of grain and sometimes the young Sun God.\n\nThe statue of Isis was placed on a pedestal of dark stone ornamented with rams' heads.\n\nHer feet trod upon a number of venomous reptiles.\n\nThis indicates that Nature has power to free from acidity or saltness all corrosives and to overcome all impurities from terrestrial corruption adhering to bodies.\n\nThe rams' heads indicate that the most auspicious time for the generation of life is during the period when the sun passes through the sign of Aries.\n\nThe serpents under her feet indicate that Nature is inclined to preserve life and to heal disease by expelling impurities and corruption.\n\nIn this sense the axioms known to the ancient philosophers are verified; namely: Nature contains Nature, Nature rejoices in her own nature, Nature surmounts Nature; Nature cannot be amended but in her own nature .\n\nTherefore, in contemplating the statue of Isis, we must not lose sight of the occult sense of its allegories; otherwise, the Virgin remains an inexplicable enigma.\n\nFrom a golden ring on her left arm a line descends, to the end of which is suspended a deep box filled with flaming coals and incense.\n\nIsis, or Nature personified, carries with her the sacred fire, religiously preserved and kept burning in.\n\na special temple by the vestal virgins.\n\nThis fire is the genuine, immortal flame of Nature--ethereal, essential, the author of life.\n\nThe inconsumable oil; the balsam of life, so much praised by the wise and so often referred to in the Scriptures, is frequently symbolized as the fuel of this immortal flame.\n\nTHOTH, THE DOG-HEADED.\n\nFrom Lenoir's La Franche-Maconnerie.\n\nAroueris, or Thoth, one of the five immortals, protected the infant Horus from the wrath of Typhon after the murder of Osiris.\n\nHe also revised the ancient Egyptian calendar by increasing the year from 360 days to 365.\n\nThoth Hermes was called \"The Dog-Headed\" because of his faithfulness and integrity.\n\nHe is shown crowned with a solar nimbus, carrying in one hand the Crux Ansata, the symbol of eternal life, and in the other a serpent-wound staff symbolic of his dignity as counselor of the gods.\n\n*** From the right arm of the figure also descends a thread, to the end of which is fastened a pair of scales, to denote the exactitude of Nature in her weights and measures.\n\nIsis is often represented as the symbol of justice, because Nature is eternally consistent.\n\nThe World Virgin is sometimes shown standing between two great pillars--the Jachin and Boaz of Freemasonry--symbolizing the fact that Nature attains productivity by means of polarity.\n\nAs wisdom personified, Isis stands between the pillars of opposites, demonstrating that understanding is always found at the point of equilibrium and that truth is often crucified between the two thieves of apparent contradiction.\n\nTHE EGYPTIAN MADONNA.\n\nFrom Lenoir's La Franche-Maconnerie.\n\nIsis is shown with her son Horus in her arms."

