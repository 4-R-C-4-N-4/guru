[content]
body = "(2) Abba , the Great Father , is the term generally applied to Chochmah--Universal Wisdom--the first emanation of Kether, but, according to Ibn Gebirol, Chochmah represents the Son, the Logos or the Word born from the union of Kether and Binah.\n\n(3) Aima , the Great Mother , is the name by which Binah, or the third Sephira, is generally known.\n\nThis is the Holy Ghost, from whose body the generations issue forth.\n\nBeing the third person of the Creative Triad, it corresponds to Jehovah, the Demiurgus.\n\n(4) Microprosophus , or the Lesser Face , is composed of the six Sephiroth--Chesed, Geburah, Tiphereth, Netsah, Hod, and Jesod.\n\nThe Microprosophus is commonly called the Lesser Adam , or Zauir Anpin , whereas the Macroprosophus , or Superior Adam , is Arikh Anpin .\n\nTHE FOUR SEPHIROTHIC TREES.\n\nThe forty concentric circles shown in the large circular cut in the preceding chapter are here arranged as four trees, each consisting of ten circles.\n\nThese trees disclose the organization of the hierarchies controlling the destinies of all creation.\n\nThe trees are the same in each of the four world but the powers vested in the globes express themselves differently through the substances of each world, resulting in endless differentiation.\n\n*** A TABLE OF SEPHIROTHIC CORRESPONDENCES.\n\nFrom Fludd's Collectio Operum.\n\nThe above diagram has been specially translated from the Latin as being of unique value to students of Qabbalism and also as an example of Robert Fludd's unusual ability in assembling tables of correspondences.\n\nRobert Fludd ranks among the most eminent Rosicrucians and Freemasons; in fact, he has often been called \"the first English Rosicrucian.\" He has written several valuable documents directly bearing upon the Rosicrucian enigma.\n\nIt is significant that the most important of his works should be published at the same time as those of Bacon, Shakespeare, and the first Rosicrucian authors.\n\n*** THE SEPHIROTHIC TREE OF THE LATER QABBALISTS.\n\nTranslated from Kircher's Œdipus Ægyptiacus.\n\nHaving demonstrated that the Qabbalists divided the universe into four worlds, each consisting of ten spheres, it is necessary to consider next how the ten spheres of each world were arranged into what is called the ''Sephirothic Tree.\" This Tree is composed of ten circles, representing the numbers 1 to 20 and connected together by twenty-two canals--the twenty-two letters of the Hebrew alphabet.\n\nThe ten numbers plus the twenty-two letters result in the occult number 32, which, according to the Mishna, signifies the Thirty-two Paths of Wisdom.\n\nLetters and numbers, according to the Qabbalists, are the keys to all knowledge, for by a secret system of arranging them the mysteries of creation are revealed.\n\nFor this reason they are called \"the Paths of Wisdom.\" This occult fact is carefully concealed in the 32nd degree of Freemasonry.\n\nThere are four trees, one in each of the four worlds established in the preceding chapter.\n\nThe first is in the Atziluthic World, the ten circles being the ten globes of light established in the midst of AIN SOPH.\n\nThe powers and attributes of this Tree are reflected into each of the three lower worlds, the form of the Tree remaining the same but its power diminishing as it descends.\n\nTo further complicate their doctrine, the Qabbalists created another tree, which was a composite of all four of the world trees but consisted of only ten globes.\n\nIn this single tree were condensed all the arcana previously scattered through the voluminous archives of Qabbalistic literature."

