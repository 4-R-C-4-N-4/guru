[content]
body = "According to the mystics, there are three suns in each solar system, analogous to the three centers of life in each individual constitution.\n\nThese are called three lights: the spiritual sun, the intellectual or soular sun, and the material sun (now symbolized in Freemasonry by three candles).\n\nThe spiritual sun manifests the power of God the Father; the soular sun radiates the life of God the Son; and the material sun is the vehicle of manifestation for God the Holy Spirit.\n\nMan's nature was divided by the mystics into three distinct parts: spirit, soul, and body.\n\nHis physical body was unfolded and vitalized by the material sun; his spiritual nature was illuminated by the spiritual sun; and his intellectual nature was redeemed by the true light of grace --the soular sun.\n\nThe alignment of these three globes in the heavens was one explanation offered for the peculiar fact that the orbits of the planets are not circular but elliptical.\n\nThe pagan priests always considered the solar system as a Grand Man , and drew their analogy of these three centers of activity from the three main centers of life in the human body: the brain, the heart, and the generative system.\n\nThe Transfiguration of Jesus describes three tabernacles, the largest being in the center (the heart), and a smaller one on either side (the brain and the generative system).\n\nIt is possible that the philosophical hypothesis of the existence of the three suns is based upon a peculiar natural phenomenon which has occurred many times in history.\n\nIn the fifty- first year after Christ three suns were seen at once in the sky and also in the sixty-sixth year.\n\nIn the sixty-ninth year, two suns were seen together.\n\nAccording to William Lilly, between the years 1156 and 1648 twenty similar occurrences were recorded.\n\nRecognizing the sun as the supreme benefactor of the material world, Hermetists believed that there was a spiritual sun which ministered to the needs of the invisible and divine part of Nature--human and universal.\n\nAnent this subject, the great Paracelsus wrote: \"There is an earthly sun, which is the cause of all heat, and all who are able to see may see the sun; and those who are blind and cannot see him may feel his heat.\n\nThere is an Eternal Sun, which is the source of all wisdom, and those whose spiritual senses have awakened to life will see that sun and be conscious of His existence; but those who have not attained spiritual consciousness may yet feel His power by an inner faculty which is called Intuition.\" Certain Rosicrucian scholars have given special appellations to these three phases of the sun: the spiritual sun they called Vulcan ; the soular and intellectual sun, Christ and Lucifer respectively; and the material sun, the Jewish Demiurgus Jehovah .\n\nLucifer here represents the intellectual mind without the illumination of the spiritual mind; therefore it is \"the false light.\n\n\" The false light is finally overcome and redeemed by the true light of the soul, called the Second Logos or Christ .\n\nThe secret processes by which the Luciferian intellect is transmuted into the Christly intellect constitute one of the great secrets of alchemy, and are symbolized by the process of transmuting base metals into gold.\n\nIn the rare treatise The Secret Symbols of The Rosicrucians , Franz Hartmann defines the sun alchemically as: \"The symbol of Wisdom.\n\nThe Centre of Power or Heart of things.\n\nThe Sun is a centre of energy and a storehouse of power.\n\nEach living being contains within itself a centre of life, which may grow to be a Sun."

