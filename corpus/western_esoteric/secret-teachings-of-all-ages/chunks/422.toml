body = "Here the old warden, standing upon a little round furnace, welcomed them and congratulated them upon being chosen by Virgo Lucifera , for this greater work.\n\nVirgo Lucifera then entered, and after laughing at the perplexity of her guests, emptied the ashes of the bird into another vessel, filling the cypress box with useless matter.\n\nShe thereupon returned to the seventh floor, presumably to mislead those assembled there by setting them to work upon the false ashes in the box.\n\nC.R.C.\n\nand his three friends were set to work moistening the bird's ashes with specially prepared water until the mixture became of doughlike consistency, after which it was heated and molded into two miniature forms.\n\nLater these were opened, disclosing two bright and almost transparent human images about four inches high (homunculi), one male and the other female.\n\nThese tiny forms were laid upon satin cushions and fed drop by drop with the blood of the bird until they grew to normal size and of great beauty.\n\nThough the bodies had the consistency of flesh, they showed no signs of life, for the soul was not in them.\n\nThe bodies were next surrounded with torches and their faces covered with silk.\n\nVirgo Lucifera then appeared, bearing two curious white garments.\n\nThe virgins also entered, among them six bearing great trumpets.\n\nA trumpet was placed upon the mouth of one of the two figures and C.R.C.\n\nsaw a tiny hole open in the dome of the tower and a ray of light descend through the tube of the trumpet and enter the body.\n\nThis process was repeated three times on each body.\n\nThe two newly ensouled forms were then removed upon a traveling couch.\n\nIn about half an hour the young King and Queen awakened and the Virgo Lucifera presented them with the white garments.\n\nThese they donned and the King in his own person most graciously returned thanks to C.R.C.\n\nand his companions, after which the royal persons departed upon a ship.\n\nC.R.C.\n\nand his three privileged friends then rejoined the other \"artists,\" making no mention of that which they had seen.\n\nLater the entire party were assigned handsome chambers, where they rested till morning.\n\nTHE SEVENTH DAY In the morning Virgo Lucifera announced that each of the wedding guests had become a \"Knight of the Golden Stone.\n\n\" The aged warden then presented each man with a gold medal, bearing on one side the inscription \"At.\n\nNat.\n\nMi.\n\n\" and on the other, \"Tem.\n\nNa.\n\nF.\" The entire company returned in twelve ships to the King's palace.\n\nThe flags on the vessels bore the signs of the zodiac, and C.R.C.\n\nsat under that of Libra.\n\nAs they entered the lake, many ships met them and the King and Queen, together with their lords, ladies, and virgins, rode forth on a golden barge to greet the returning guests.\n\nAtlas then made a short oration in the King's behalf, also asking for the royal presents.\n\nIn reply the aged warden delivered to Cupid, who hovered about the royal pair, a small, curious-shaped casket.\n\nC.R.C.\n\nand the old lord, each bearing a snow-white ensign with a red cross on it, rode in the carriage with the King.\n\nAt the first gate stood the porter with blue clothes, who, upon seeing C.R.C., begged him to intercede with the King to release him from that post of servitude.\n\nThe King replied that the porter was a famous astrologer who was forced to keep the gate as a punishment for the crime of having gazed upon Lady Venus reposing upon her couch.\n\nThe King further declared that the porter could be released only when another was found who had committed the same crime.\n\nUpon hearing this, C.R.C.'s heart sank, for he realized himself to be the culprit, but he remained silent at that time."

