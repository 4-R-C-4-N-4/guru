body = "THE yoni and phallus were worshiped by nearly all ancient peoples as appropriate symbols of God's creative power.\n\nThe Garden of Eden, the Ark, the Gate of the Temple, the Veil of the Mysteries, the vesica piscis or oval nimbus, and the Holy Grail are important yonic symbols; the pyramid, the obelisk, the cone, the candle, the tower, the Celtic monolith, the spire, the campanile, the Maypole, and the Sacred Spear are symbolic of the phallus.\n\nIn treating the subject of Priapic worship, too many modern authors judge pagan standards by their own and wallow in the mire of self-created vulgarity.\n\nThe Eleusinian Mysteries--the greatest of all the ancient secret societies--established one of the highest known standards of morality and ethics, and those criticizing their use of phallic symbols should ponder the trenchant words of King Edward III, \" Honi soit qui mal y pense .\" The obscene rites practiced by the later Bacchanalia and Dionysia were no more representative of the standards of purity originally upheld by the Mysteries than the orgies occasionally occurring among the adherents of Christianity till the eighteenth century were representative of primitive Christianity.\n\nSir William Hamilton, British Minister at the Court of Naples, declares that in 1780, Isernia, a community of Christians in Italy, worshiped with phallic ceremonies the pagan god Priapus under the name of St.\n\nCosmo.\n\n(See Two Essays on the Worship of Priapus , by Richard Payne Knight.) Father, mother, and child constitute the natural trinity.\n\nThe Mysteries glorified the home as the supreme institution consisting of this trinity functioning as a unit.\n\nPythagoras likened the universe to the family, declaring that as the supreme fire of the universe was in the midst of its heavenly bodies, so, by analogy, the supreme fire of the world was upon its hearthstones.\n\nThe Pythagorean and other schools of philosophy conceived the one divine nature of God to manifest itself in the threefold aspect of Father, Mother, and Child.\n\nThese three constituted the Divine Family, whose dwelling place is creation and whose natural and peculiar symbol is the 47th problem of Euclid.\n\nGod the Father is spirit, God the Mother is matter, and God the Child--the product of the two--represents the sum of living things born out of and constituting Nature.\n\nThe seed of spirit is sown in the womb of matter, and by an immaculate (pure) conception the progeny is brought into being.\n\nIs not this the true mystery of the Madonna holding the Holy Babe in her arms?\n\nWho dares to say that such symbolism is improper?\n\nThe mystery of life is the supreme mystery, revealed in all of its divine dignity and glorified as Nature's per feet achievement by the initiated sages and seers of all ages.\n\nThe prudery of today, however, declares this same mystery to be unfit for the consideration of holy-minded people.\n\nContrary to the dictates of reason, a standard has been established which affirms that innocence bred of ignorance is more to be desired than virtue born of knowledge.\n\nEventually, however, man will learn that he need never be ashamed of truth.\n\nUntil he does learn this, he is false to his God, to his world, and to himself.\n\nIn this respect, Christianity has woefully failed in its mission.\n\nWhile declaring man's body to be the living temple of the living God, in the same breath it asserts the substances and functions of this temple to be unclean and their study defiling to the sensitive sentiments of the righteous.\n\nBy this unwholesome attitude, man's body--the house of God--is degraded and defamed."

