[content]
body = "In describing the regalia of a magician, Éliphas Lévi declares that on Sunday (the day of the sun) he should carry in his right hand a golden wand, set with a ruby or chrysolite; on Monday (the day of the moon) he should wear a collar of three strands consisting of pearls, crystals, and selenites; on Tuesday (the day of Mars) he should carry a wand of magnetized steel and a ring of the same metal set with an amethyst, on Wednesday (the day of Mercury) he should wear a necklace of pearls or glass beads containing mercury, and a ring set with an agate; on Thursday (the day of Jupiter) he should carry a wand of glass or resin and wear a ring set with an emerald or a sapphire; on Friday (the day of Venus) he should carry a wand of polished copper and wear a ring set with a turquoise and a crown or diadem decorated with lapis lazuli and beryl; and on Saturday (the day of Saturn) he should carry a wand ornamented with onyx stone and wear a ring set with onyx and a chain about the neck formed of lead.\n\n(See The Magical Ritual of the Sanctum Regnum .) Paracelsus, Agrippa, Kircher, Lilly, and numerous other magicians and astrologers have tabulated the gems and stones corresponding to the various planets and zodiacal signs.\n\nThe following list has been compiled from their writings.\n\nTo the sun is assigned the carbuncle, ruby, garnet---especially the pyrope--and other fiery stones, sometimes the diamond; to the moon, the pearl, selenite, and other forms of crystal; to Saturn, the onyx, jasper, topaz, and sometimes the lapis lazuli; to Jupiter, the sapphire, emerald, and marble; to Mars, the amethyst, hyacinth, lodestone, sometimes the diamond; to Venus, the turquoise, beryl, emerald, and sometimes the pearl, alabaster, coral, and carnelian; to Mercury, the chrysolite, agate, and variegated marble.\n\nTo the zodiac the same authorities assigned the following gems and stones: To Aries the sardonyx, bloodstone, amethyst, and diamond; to Taurus the carnelian, turquoise, hyacinth, sapphire, moss agate, and emerald; to Gemini the topaz, agate, chrysoprase, crystal, and aquamarine; to Cancer the topaz, chalcedony, black onyx, moonstone, pearl, cat's-eye, crystal, and sometimes the emerald; to Leo the jasper, sardonyx, beryl, ruby, chrysolite, amber, tourmaline, sometimes the diamond; to Virgo the emerald, camelian, jade, chrysolite, and sometimes the pink jasper and hyacinth; to Libra the beryl, sardius, coral, lapis lazuli, opal, and sometimes the diamond; to Scorpio the amethyst, beryl, sardonyx, aquamarine, carbuncle, lodestone, topaz, and malachite; to Sagittarius die hyacinth, topaz, chrysolite, emerald, carbuncle, and turquoise; to Capricorn the chrysoprase, ruby, malachite, black onyx, white onyx, jet, and moonstone; to Aquarius the crystal, sapphire, garnet, zircon, and opal; to Pisces the sapphire, jasper, chrysolite, moonstone, and amethyst Both the magic mirror and the crystal ball are symbols little understood."

