[content]
body = "Hence came the legend of the murder of Khurum, representative of the Sun, by the three Fellow-Crafts, symbols of the Winter signs, Capricornus, Aquarius, and Pisces, who assailed him at the three gates of Heaven and slew him at the Winter Solstice.\n\nHence the search for him by the nine Fellow-Crafts, the other nine signs, his finding, burial, and resurrection.\" (See Morals and Dogma .) Other authors consider Libra, Scorpio, and Sagittarius as the three murderers of the sun, inasmuch as Osiris was murdered by Typhon, to whom were assigned the thirty degrees of the constellation of Scorpio.\n\nIn the Christian Mysteries also Judas signifies the Scorpion, and the thirty pieces of silver for which he betrayed His Lord represent the number of degrees in that sign.\n\nHaving been struck by Libra (the state), Scorpio (the church), and Sagittarius (the mob), the sun (CHiram) is secretly home through the darkness by the signs of Capricorn, Aquarius, and Pisces and buried over the brow of a hill (the vernal equinox).\n\nCapricorn has for its symbol an old man with a scythe in his hand.\n\nThis is Father Time--a wayfarer--who is symbolized in Masonry as straightening out the ringlets of a young girl's hair.\n\nIf the Weeping Virgin be considered a symbol of Virgo, and Father Time with his scythe a symbol of Capricorn, then the interval of ninety degrees between these two signs will be found to correspond to that occupied by the three murderers.\n\nEsoterically, the urn containing the ashes of CHiram represents the human heart.\n\nSaturn, the old man who lives at the north pole, and brings with him to the children of men a sprig of evergreen (the Christmas tree), is familiar to the little folks under the name of Santa Claus , for he brings each winter the gift of a new year.\n\nDIANA OF EPHESUS.\n\nFrom Montfaucon's Antiquities.\n\nCrowned with a triple tower-like tiara and her form adorned with symbolic creatures representative of her spiritual powers, Diana stood for the source of that imperishable doctrine which, flowing from the bosom of the Great Multimammia, is the spiritual food of those aspiring men and women who have consecrated their lives to the contemplation of reality.\n\nAs the physical body of man receives its nutriment from the Great Earth Mother, so the spiritual nature of man is fed from the never failing fountains of Truth pouring outward from the invisible worlds.\n\n*** The martyred sun is discovered by Aries, a Fellow-Craftsman, and at the vernal equinox the process of raising him begins.\n\nThis is finally accomplished by the Lion of Judah, who in ancient times occupied the position of the keystone of the Royal Arch of Heaven.\n\nThe precession of the equinoxes causes various signs to play the role of the murderers of the sun during the different ages of the world, but the principle involved remains unchanged.\n\nSuch is the cosmic story of CHiram, the Universal Benefactor, the Fiery Architect: of the Divine House, who carries with him to the grave that Lost Word which, when spoken, raises all life to power and glory.\n\nAccording to Christian mysticism, when the Lost Word is found it is discovered in a stable, surrounded by beasts and marked by a star.\n\n\"After the sun leaves Leo,\" writes Robert Hewitt Brown, \"the days begin to grow unequivocally shorter as the sun declines toward the autumnal equinox, to be again slain by the three autumnal months, lie dead through the three winter ones, and be raised again by the three vernal ones."

