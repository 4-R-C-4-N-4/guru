body = "This rare cut shows the name of God in seventy-two languages inscribed upon the petals of a symbolic sunflower.\n\nAbove the circle are the seventy-two powers of God according to the Hebrew Qabbalah.\n\nBelow two trees, that on the left bearing the symbols of the planets and that on the right the signs of the zodiac and the names of the tribes of Israel.\n\nThe esoteric doctrines of the Qabbalah are in alignment with the secret teachings of all the schools of philosophy, but the method by which its secrets are revealed to the wise and concealed from the ignorant is most unusual.\n\nAs the religious world interprets its scriptures with twentieth-century educational facilities, it becomes ever more apparent that the sacred books were not historical documents, but that the kings, sages, prophets, and saviors whom Bible students ham revered for ages as once-existing personalities are in reality only personified attributes of man himself.\n\n*** The words Qabbalism and Hermeticism are now considered as synonymous terms covering all the arcana and esotericism of antiquity.\n\nThe simple Qabbalism of the first centuries of the Christian Era gradually evolved into an elaborate theological system, which became so involved that it was next to impossible to comprehend its dogma.\n\nThe Qabbalists divided the uses of their sacred science into five sections.\n\nThe Natural Qabbalah was used solely to assist the investigator in his study of Nature's mysteries.\n\nThe Analogical Qabbalah was formulated to exhibit the relationship which exists between all things in Nature, and it revealed to the wise that all creatures and substances were one in essence, and that man--the Little Universe--was a replica in miniature of God--the Great Universe.\n\nThe Contemplative Qabbalah was evolved for the purpose of revealing through the higher intellectual faculties the mysteries of the celestial spheres.\n\nBy its aid the abstract reasoning faculties cognized the measureless planes of infinity and learned to know the creatures existing within them.\n\nThe Astrological Qabbalah instructed those who studied its lore in the power, magnitude, and actual substance of the sidereal bodies, and also revealed the mystical constitution of the planet itself.\n\nThe fifth, or Magical Qabbalah , was studied by such as desired to gain control over the demons and subhuman intelligences of the invisible worlds.\n\nIt was also highly valued as a method of healing the sick by talismans, amulets, charms, and invocations.\n\nThe Sepher Yetzirah , according to Adolph Franck, differs from other sacred books in that it does not explain the world and the phenomena of which it is the stage by leaning on the idea of God or by setting itself up as the interpreter of the supreme will.\n\nThis ancient work rather reveals God by estimating His manifold handiwork.\n\nIn preparing the Sepher Yetzirah for the consideration of the reader, five separate English translations have been compared.\n\nThe resulting form, while it embodies the salient features of each, is not a direct translation from any one Hebrew or Latin text.\n\nAlthough the purpose was to convey the spirit rather than the letter of the ancient document, there are no wide deviations from the original rendition.\n\nSo far as known, the first translation of the Sepher Yetzirah into English was made by the Rev.\n\nDr.\n\nIsidor Kalisch, in 1877.\n\n(See Arthur Edward Waite.) In this translation the Hebrew text accompanies the English words.\n\nThe work of Dr.\n\nKalisch has been used as the foundation of the following interpretation, but material from other authorities has been incorporated and many passages have been rewritten to simplify the general theme.\n\nAt hand also was a manuscript copy in English of the Book of the Cabalistick Art , by Doctor John Pistor.\n\nThe document is undated; but judging from the general type of the writing, the copy was made during the eighteenth century."

