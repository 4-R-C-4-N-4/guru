body = "Woe to that benighted mortal who accepts literally the stories circulated concerning them!\n\nHe will discover--often at the cost of sanity and health--that sorcery and philosophy, while often confused, have nothing in common.\n\nThe Persian Magi carried mirrors as an emblem of the material sphere which reflects Divinity from its every part.\n\nThe crystal ball, long misused as a medium for the cultivation of psychical powers, is a threefold symbol: (1) it signifies the crystalline Universal Egg in whose transparent depths creation exists; (2) it is a proper figure of Deity previous to Its immersion in matter; (3) it signifies the ætheric sphere of the world in whose translucent essences is impressed and preserved the perfect image of all terrestrial activity.\n\nTHE PYTHAGOREAN SIGNET RING.\n\nFrom Cartari's Imagini degli Dei degli Antichi.\n\nThe number five was peculiarly associated by the Pythagoreans with the art of healing, and the pentagram, or five-pointed star, was to them the symbol of health.\n\nThe above figure represents a magical ring set with a talismanic gem bearing the pentalpha, or star formed by five different positions of the Greek Alpha.\n\nOn this subject Mackey writes: \"The disciples of Pythagoras, who were indeed its real inventors, placed within each of its interior angles one of the letters of the Greek word ΥΓΕΙΑ, or the Latin one SALUS, both of which signify health; and thus it was made the talisman of health.\n\nThey placed it at the beginning of their epistles as a greeting to invoke a secure health to their correspondent.\n\nBut its use was not confined to the disciples of Pythagoras.\n\nAs a talisman, it was employed all over the East as a charm to resist evil spirits.\" *** Meteors, or rocks from heave n, were considered tokens of divine favor and enshrined as evidence of a pact between the gods and the community in which they fell.\n\nCuriously marked or chipped natural stones are occasionally found.\n\nIn China there is a slab of marble the grain of which forms a perfect likeness of the Chinese dragon.\n\nThe Oberammergau stone, chipped by Nature into a close resemblance to the popular conception of the face of Christ, is so remarkable that even the crowned heads of Europe requested the privilege of beholding it.\n\nStones of such nature were held in the highest esteem among primitive peoples and even today exert a wide influence upon the religiously-minded."

