[content]
body = "Those professing this theory regard the Comte de St.-Germain as their highest adept and assert that he and Christian Rosencreutz were one and the same individual.\n\nThey accept fire as their universal symbol because it was the one element by means of which they could control the metals.\n\nThey declared themselves the descendants of Tubal-cain and Hiram Abiff, and that the purpose of their existence was to preserve the spiritual nature of man through ages of materiality.\n\n\"The Gnostic sects, the Arabs, Alchemists, Templars, Rosicrucians, and lastly the Freemasons, form the Western chain in the transmission of occult science.\" (See The Tarot of the Bohemians translated by A.\n\nE.\n\nWaite from the French of Papus.) Max Heindel, the Christian mystic, described the Rosicrucian Temple as an \"etheric structure\" located in and around the home of a European country gentleman.\n\nHe believed that this invisible building would ultimately be moved to the American continent.\n\nMr.\n\nHeindel referred to the Rosicrucian Initiates as so advanced in the science of life that \"death had forgotten them.\""

