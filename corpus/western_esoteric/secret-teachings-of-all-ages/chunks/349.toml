body = "Godfrey Higgins believes that the word Rosicrucian is not derived from the flower but from the word Ros , which means dew.\n\nIt is also interesting to note that the word Ras means wisdom, while Rus is translated concealment.\n\nDoubtless all of these meanings have contributed to Rosicrucian symbolism.\n\nA.\n\nE.\n\nWaite holds with Godfrey Higgins that the process of forming the Philosopher's Stone with the aid of dew is the secret concealed within the name Rosicrucian.\n\nIt is possible that the dew referred to is a mysterious substance within the human brain, closely resembling the description given by alchemists of the dew which, falling from heaven, redeemed the earth.\n\nThe cross is symbolic of the human body, and the two symbols together--the rose on the cross--signify that the soul of man is crucified upon the body, where it is held by three nails.\n\nIt is probable that Rosicrucian symbolism is a perpetuation of the secret tenets of the Egyptian Hermes, and that the Society of Unknown Philosophers is the true link connecting modern Masonry, with its mass of symbols, to ancient Egyptian Hermeticism, the source of that symbolism.\n\nIn his Doctrine and Literature of the Kabalah , A.\n\nE.\n\nWaite makes this important observation: \"There are certain indications which point to a possible connection between Masonry and Rosicrucianism, and this, if admitted, would constitute the first link in its connection with the past.\n\nThe evidence is, however, inconclusive, or at least unextricated.\n\nFreemasonry per se, in spite of the affinity with mysticism which I have just mentioned, has never exhibited any mystic character, nor has it a clear notion how it came by its symbols.\" Many of those connected with the development of Freemasonry were suspected of being Rosicrucians; some, as in the case of Robert Fludd, even wrote defenses of this organization.\n\nFrank C.\n\nHiggins, a modern Masonic symbolist, writes: \"Doctor Ashmole, a member of this fraternity [Rosicrucian], is revered by Masons as one of the founders of the first Grand Lodge in London.\" (See Ancient Freemasonry .) Elias Ashmole is but one of many intellectual links connecting Rosicrucianism with the genesis of Freemasonry.\n\nThe Encyclopædia Britannica notes that Elias Ashmole was initiated into the Freemasonic Order in 1646, and further states that he was \"the first gentleman, or amateur, to be 'accepted'.\" On this same subject, Papus, in his Tarot of the Bohemians , has written: \"We must not forger that the Rosicrucians were the Initiators of Leibnitz, and the founders of actual Freemasonry through Ashmole.\" If the founders of Freemasonry were initiated into the Great Arcanum of Egypt--and the symbolism of modern Masonry would indicate that such was the case--then it is reasonable to suppose that they secured their information from a society whose existence they admitted and which was duly qualified to teach them these symbols and allegories.\n\nTHE ROSICRUCIAN ROSE.\n\nFrom Geheime Figuren der Rosenkreuzer.\n\nThe rose is a yonic symbol associated with generation, fecundity, and purity.\n\nThe fact that flowers blossom by unfolding has caused them to be chosen as symbolic of spiritual unfoldment.\n\nThe red color of the rose refers to the blood of Christ, and the golden heart concealed within the midst of the flower corresponds to the spiritual gold concealed within the human nature.\n\nThe number of its petals being ten is also a subtle reminder of the perfect Pythagorean number.\n\nThe rose symbolizes the heart, and the heart has always been accepted by Christians as emblematic of the virtues of love and compassion, as well as of the nature of Christ--the personification of these virtues."

