body = "Therefore, they chose the five-pointed star, or pentagram, as the symbol of vitality, health, and interpenetration.\n\nIt was customary for the philosophers to conceal the element of earth under the symbol of a dragon, and many of the heroes of antiquity were told to go forth and slay the dragon.\n\nHence, they drove their sword (the monad) into the body of the dragon (the tetrad).\n\nThis resulted in the formation of the pentad, a symbol of the victory of the spiritual nature over the material nature.\n\nThe four elements are symbolized in the early Biblical writings as the four rivers that poured out of Garden of Eden.\n\nThe elements themselves are under the control of the composite Cherubim of Ezekiel.\n\nThe Pythagoreans held the hexad--6--to represent, as Clement of Alexandria conceived, the creation of the world according to both the prophets and the ancient Mysteries.\n\nIt was called by the Pythagoreans the perfection of all the parts.\n\nThis number was particularly sacred to Orpheus, and also to the Fate, Lachesis, and the Muse, Thalia.\n\nIt was called the form of forms, the articulation of the universe, and the maker of the soul.\n\nAmong the Greeks, harmony and the soul were considered to be similar in nature, because all souls are harmonic.\n\nThe hexad is also the symbol of marriage, because it is formed by the union of two triangles, one masculine and the other feminine.\n\nAmong the keywords given to the hexad are: time, for it is the measure of duration; panacea, because health is equilibrium, and the hexad is a balance number; the world, because the world, like the hexad, is often seen to consist of contraries by harmony; omnisufficient, because its parts are sufficient for totality (3 +2 + 1 = 6); unwearied, because it contains the elements of immortality.\n\nBy the Pythagoreans the heptad--7--was called \"worthy of veneration.\" It was held to be the number of religion, because man is controlled by seven celestial spirits to whom it is proper for him to make offerings.\n\nIt was called the number of life, because it was believed that human creatures born in the seventh month of embryonic life usually lived, but those born in the eighth month often died.\n\nOne author called it the Motherless Virgin, Minerva, because it was nor born of a mother but out of the crown, or the head of the Father, the monad.\n\nKeywords of the heptad are fortune, occasion, custody, control, government, judgment, dreams, voices, sounds, and that which leads all things to their end.\n\nDeities whose attributes were expressed by the heptad were Ægis, Osiris, Mars, and Cleo (one of the Muses).\n\nAmong many ancient nations the heptad is a sacred number.\n\nThe Elohim of the Jews were supposedly seven in number.\n\nThey were the Spirits of the Dawn, more commonly known as the Archangels controlling the planets.\n\nThe seven Archangels, with the three spirits controlling the sun in its threefold aspect, constitute the 10, the sacred Pythagorean decad.\n\nThe mysterious Pythagorean tetractys, or four rows of dots, increasing from 1 to 4, was symbolic of the stages of creation.\n\nThe great Pythagorean truth that all things in Nature are regenerated through the decad, or 10, is subtly preserved in Freemasonry through these grips being effected by the uniting of 10 fingers, five on the hand of each person.\n\nThe 3 (spirit, mind, and soul) descend into the 4 (the world), the sum being the 7, or the mystic nature of man, consisting of a threefold spiritual body and a fourfold material form."

