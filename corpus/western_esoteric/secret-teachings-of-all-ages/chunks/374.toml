body = "A brief sketch of the lives of four should serve to show the general principles on which they worked, the method by which they obtained their knowledge, and the use which they made of it.\n\nThese four were Grand Masters of this secret science; and the stories of their wanderings and strivings, as recorded by their own pens and by contemporaneous disciples of the Hermetic art, are as fascinating as any romance of fiction.\n\nFrom The Complete Writings of Paracelsus, of Hohenheim.\n\nIn his Biographia Antiqua, Francis Barrett appends to the name of Paracelsus the following titles of distinction: \"The Prince of Physicians and Philosophers by Fire; Grand Paradoxical Physician; The Trismegistus of Switzerland; First Reformer of Chymical Philosophy; Adept in Alchymy, Cabala, and Magic; Nature's Faithful Secretary; Master of the Elixir of Life and The Philosopher's Stone,\" and the \"Great Monarch of Chymical Secrets\" *** PARACELSUS OF HOHENHEIM The most famous of alchemical and Hermetic philosophers was Philippus Aureolus Theophrastus Bombastus von Hohenheim.\n\nThis man, who called himself Paracelsus, declared that some day all the doctors of Europe would turn from the other schools and, following him, revere him above every other physician.\n\nThe accepted date of the birth of Paracelsus is December 17, 1493.\n\nHe was an only child.\n\nBoth his father and mother were interested in medicine and chemistry.\n\nHis father was a physician and his mother the superintendent of a hospital.\n\nWhile still a youth, Paracelsus became greatly interested in the writings of Isaac of Holland, and determined to reform the medical science of his day.\n\nWhen twenty years old he began a series of travels which continued for about twelve years.\n\nHe visited many European countries, including Russia.\n\nIt is possible that he penetrated into Asia.\n\nIt was in Constantinople that the great secret of the Hermetic arts was bestowed upon him by Arabian adepts.\n\nHis knowledge of the Nature spirits and the inhabitants of the invisible worlds he probably secured from the Brahmins of India with whom he came in contact either directly or through their disciples.\n\nHe became an army physician, and his understanding and skill brought him great success.\n\nUpon his return to Germany, he began his long-dreamed-of reformation of the medical arts and sciences.\n\nHe was opposed on every hand and criticized unmercifully.\n\nHis violent temper and tremendously strong personality undoubtedly precipitated many storms upon his head which might have been avoided had he been of a less caustic disposition.\n\nHe flayed the apothecaries, asserting that they did not use the proper ingredients in their prescriptions and did not consider the needs of their patients, desiring only to collect exorbitant fees for their concoctions.\n\nThe remarkable cures which Paracelsus effected only made his enemies hate him more bitterly, for they could not duplicate the apparent miracles which he wrought.\n\nHe not only treated the more common diseases of his day but is said to have actually cured leprosy, cholera, and cancer.\n\nHis friends claimed for him that he all but raised the dead.\n\nHis systems of healing were so heterodox, however, that slowly but surely his enemies overwhelmed him and again and again forced him to leave the fields of his labors and seek refuge where he was not known.\n\nThere is much controversy concerning the personality of Paracelsus.\n\nThat he had an irascible disposition there is no doubt.\n\nHis barred for physicians and for women amounted to a mania; for them he had nothing but abuse.\n\nAs far as can be learned, there was never a love affair in his life.\n\nHis peculiar appearance and immoderate system of living were always held against him by his adversaries."

