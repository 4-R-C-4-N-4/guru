[content]
body = "In concluding his exposition of the Vision , Hermes wrote: \"The sleep of the body is the sober watchfulness of the Mind and the shutting of my eyes reveals the true Light.\n\nMy silence is filled with budding life and hope, and is full of good.\n\nMy words are the blossoms of fruit of the tree of my soul.\n\nFor this is the faithful account of what I received from my true Mind, that is Poimandres, the Great Dragon, the Lord of the Word, through whom I became inspired by God with the Truth.\n\nSince that day my Mind has been ever with me and in my own soul it hath given birth to the Word: the Word is Reason, and Reason hath redeemed me.\n\nFor which cause, with all my soul and all my strength, I give praise and blessing unto God the Father, the Life and the Light, and the Eternal Good.\n\n\"Holy is God, the Father of all things, the One who is before the First Beginning.\n\n\"Holy is God, whose will is performed and accomplished by His own Powers which He hath given birth to out of Himself.\n\n\"Holy is God, who has determined that He shall be known, and who is known by His own to whom He reveals Himself.\n\n\"Holy art Thou, who by Thy Word (Reason) hast established all things.\n\n\"Holy art Thou, of whom all Nature is the image.\n\n\"Holy art Thou, whom the inferior nature has not formed.\n\n\"Holy art Thou, who art stronger than all powers.\n\n\"Holy art Thou, who art greater than all excellency.\n\n\"Holy art Thou, who art better than all praise.\n\n\"Accept these reasonable sacrifices from a pure soul and a heart stretched out unto Thee.\n\n\"O Thou Unspeakable, Unutterable, to be praised with silence!\n\n\"I beseech Thee to look mercifully upon me, that I may not err from the knowledge of Thee and that I may enlighten those that are in ignorance, my brothers and Thy sons.\n\n\"Therefore I believe Thee and bear witness unto Thee, and depart in peace and in trustfulness into Thy Light and Life.\n\n\"Blessed art Thou, O Father!\n\nThe man Thou hast fashioned would be sanctified with Thee as Thou hast given him power to sanctify others with Thy Word and Thy Truth.\" The Vision of Hermes , like nearly all of the Hermetic writings, is an allegorical exposition of great philosophic and mystic truths, and its hidden meaning may be comprehended only by those who have been \"raised\" into the presence of the True Mind."

