body = "These galleries were so artfully crisscrossed along their course to the Pyramid that in setting forth into the passage without a guide through this network, one ceaselessly and inevitably returned to the starting point.\" (See Histoire de la Magie .) Unfortunately, the bronze door referred to cannot be found, nor is there any evidence that it ever existed.\n\nThe passing centuries have wrought many changes in the colossus, however, and the original opening may have been closed.\n\nNearly all students of the subject believe that subterranean chambers exist beneath the Great Pyramid.\n\nRobert Ballard writes: \"The priests of the Pyramids of Lake Mœris had their vast subterranean residences.\n\nIt appears to me more than probable that those of Gizeh were similarly provided.\n\nAnd I may go further:--Out of these very caverns may have been excavated the limestone of which the Pyramids were built.\n\n* * * In the bowels of the limestone ridge on which the Pyramids are built will yet be found, I feel convinced, ample information as to their uses.\n\nA good diamond drill with two or three hundred feet of rods is what is wanted to test this, and the solidarity of the Pyramids at the same time.\" (See The Solution of the Pyramid Problem .) Mr.\n\nBallard's theory of extensive underground apartments and quarries brings up an important problem in architectonics.\n\nThe Pyramid builders were too farsighted to endanger the permanence of the Great Pyramid by placing over five million tons of limestone and granite on any but a solid foundation.\n\nIt is therefore reasonably certain that such chambers or passageways as may exist beneath the building are relatively insignificant, like those within the body of the structure, which occupy less than one sixteen-hundredth of the cubic contents of the Pyramid.\n\nA VERTICAL SECTION OF THE GREAT PYRAMID.\n\nFrom Smyth's Life and Wok at the Great Pyramid.\n\nThe Great Pyramid stands upon a limestone plateau at the base of which, according to ancient history, the Nile once flooded, thus supplying a method for the huge blocks used in its construction.\n\nPresuming that the capstone as originally in place, the Pyramid is, according to John Taylor, in round figures 486 feet high; the base of each side is 764 feet long, and the entire structure covers a ground area of more than 13 acres.\n\nThe Great Pyramid is the only one in the group at Gizeh--in fact, as far as known, the only one in Egypt--that has chambers within the actual body of the Pyramid itself.\n\nFar this reason it is said to refute the Lepsius Law, which asserts that each of these structures is a monument raised over a subterranean chamber in which a ruler is entombed.\n\nThe Pyramid contains four chambers, which in the diagram are lettered K, H, F, and O.\n\nThe King's Chamber (K) is an oblong apartment 39 feet long, 17 felt wide, and 19 feet high (disregarding fractional parts of a foot in each case), with a flat roof consisting of nine great stones, the largest in the Pyramid.\n\nAbove the King's Chamber are five low compartments (L), generally termed construction chambers.\n\nIn the lowest of these the so-called hieroglyphs of the Pharaoh Cheops are located.\n\nThe roof of the fifth construction chamber is peaked.\n\nAt the end of the King's Chamber opposite the entrance stands the famous sarcophagus, or coffer (I), and behind it is a shallow opening that was dug in the hope of discovering valuables.\n\nTwo air vents (M, N) passing through the entire body of the Pyramid ventilate the King's Chamber.\n\nIn itself this is sufficient to establish that the building was not intended for a tomb.\n\nBetween the upper end of the Grand Gallery (G."

