body = "While the ignorant multitudes worshiped the house of the sun's reflection, which in the case described would be the Bull, the wise revered the house of the sun's actual dwelling, which would be the Scorpion, or the Serpent, the symbol of the concealed spiritual mystery.\n\nThis sign has three different symbols.\n\nThe most common is that of a Scorpion, who was called by the ancients the backbiter , being the symbol of deceit and perversion; the second (and less common) form of the sign is a Serpent, often used by the ancients to symbolize wisdom.\n\nProbably the rarest form of Scorpio is that of an Eagle.\n\nThe arrangement of the stars of the constellation bears as much resemblance to a flying bird as to a scorpion.\n\nScorpio, being the sign of occult initiation, the flying eagle--the king of birds--represents the highest and most spiritual type of Scorpio, in which it transcends the venomous insect of the earth.\n\nAs Scorpio and Taurus are opposite each other in the zodiac, their symbolism is often closely intermingled.\n\nThe Hon.\n\nE.\n\nM.\n\nPlunket, in Ancient Calendars and Constellations , says: \"The Scorpion (the constellation Scorpio of the Zodiac opposed to Taurus) joins with Mithras in his attack upon the Bull, and always the genii of the spring and autumn equinoxes are present in joyous and mournful attitudes.\" The Egyptians, the Assyrians, and the Babylonians, who knew the sun as a Bull, called the zodiac a series of furrows, through which the great celestial Ox dragged the plow of the sun.\n\nHence the populace offered up sacrifice and led through the streets magnificent steers, bedecked with flowers and surrounded with priests, dancing girls of the temple, and musicians.\n\nThe philosophic elect did not participate in these idolatrous ceremonials, but advocated them as most suitable for the types of mind composing the mass of the population.\n\nThese few possessed a far deeper understanding, as the Serpent of Scorpio upon their foreheads--the Uræus --bore witness.\n\nThe sun is often symbolized with its rays in the form of a shaggy mane.\n\nConcerning the Masonic significance of Leo, Robert Hewitt Brown, 32°, has written: \"On the 21st of June, when the sun arrives at the summer solstice, the constellation Leo--being but 30° in advance of the sun--appears to be leading the way, and to aid by his powerful paw in lifting the sun up to the summit of the zodiacal arch.\n\n* * * This visible connection between the constellation Leo and the return of the sun to his place of power and glory, at the summit of the Royal Arch of heaven, was the principal reason why that constellation was held in such high esteem and reverence by the ancients.\n\nThe astrologers distinguished Leo as the 'sole house of the sun,' and taught that the world was created when the sun was in that sign.\n\n'The lion was adored in the East and the West by the Egyptians and the Mexicans.\n\nThe chief Druid of Britain was styled a lion.'\" ( Stellar Theology and Masonic Astronomy .) When the Aquarian Age is thoroughly established, the sun will be in Leo, as will be noted from the explanation previously given in this chapter regarding the distinction between geocentric and heliocentric astrology.\n\nThen, indeed, will the secret religions of the world include once more the raising to initiation by the Grip of the Lion's Paw.\n\n(Lazarus will come forth.) THE CIRCULAR ZODIAC OF TENTYRA.\n\nFrom Cole's Treatise--the Circular Zodiac of Tentyra, in Egypt."

