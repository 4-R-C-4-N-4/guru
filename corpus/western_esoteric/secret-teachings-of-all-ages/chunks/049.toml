body = "The mystics of Eleusis also laid stress upon the evil of suicide, explaining that there was a profound mystery concerning this crime of which they could not speak, but warning their disciples that a great sorrow comes to all who take their own lives.\n\nThis, in substance, constitutes the esoteric doctrine given to the initiates of the Lesser Mysteries.\n\nAs the degree dealt largely with the miseries of those who failed to make the best use of their philosophic opportunities, the chambers of initiation were subterranean and the horrors of Hades were vividly depicted in a complicated ritualistic drama.\n\nAfter passing successfully through the tortuous passageways, with their trials and dangers, the candidate received the honorary title of Mystes .\n\nThis meant one who saw through a veil or had a clouded vision.\n\nIt also signified that the candidate had been brought up to the veil, which would be torn away in the higher degree.\n\nThe modern word mystic , as referring to a seeker after truth according to the dictates of the heart along the path of faith, is probably derived from this ancient word, for faith is belief in the reality of things unseen or veiled.\n\nThe Greater Mysteries (into which the candidate was admitted only after he had successfully passed through the ordeals of the Lesser, and not always then) were sacred to Ceres, the mother of Persephone, and represent her as wandering through the world in quest of her abducted daughter.\n\nCeres carried two torches, intuition and reason, to aid her in the search for her lost child (the soul).\n\nAt last she found Persephone not far from Eleusis, and out of gratitude taught the people there to cultivate corn, which is sacred to her.\n\nShe also founded the Mysteries.\n\nCeres appeared before Pluto, god of the souls of the dead, and pleaded with him to allow Persephone to return to her home.\n\nThis the god at first refused to do, because Persephone had eaten of the pomegranate, the fruit of mortality.\n\nAt last, however, he compromised and agreed to permit Persephone to live in the upper world half of the year if she would stay with him in the darkness of Hades for the remaining half.\n\nThe Greeks believed that Persephone was a manifestation of the solar energy, which in the winter months lived under the earth with Pluto, but in the summer returned again with the goddess of productiveness.\n\nThere is a legend that the flowers loved Persephone and that every year when she left for the dark realms of Pluto, the plants and shrubs would die of grief.\n\nWhile the profane and uninitiated had their own opinions on these subjects, the truths of the Greek allegories remained safely concealed by the priests, who alone recognized the sublimity of these great philosophic and religious parables.\n\nThomas Taylor epitomizes the doctrines of the Greater Mysteries in the following statement: \"The Greater (Mysteries) obscurely intimated, by mystic and splendid visions, the felicity of the soul both here and hereafter when purified from the defilement of a material nature, and constantly elevated to the realities of intellectual (spiritual) vision.\" Just as the Lesser Mysteries discussed the prenatal epoch of man when the consciousness in its nine days (embryologically, months) was descending into the realm of illusion and assuming the veil of unreality, so the Greater Mysteries discussed the principles of spiritual regeneration and revealed to initiates not only the simplest but also the most direct and complete method of liberating their higher natures from the bondage of material ignorance.\n\nLike Prometheus chained to the top of Mount Caucasus, man's higher nature is chained to his inadequate personality.\n\nThe nine days of initiation were also symbolic of the nine spheres through which the human soul descends during the process of assuming a terrestrial form."

