body = "Pythagoras had succeeded too well in concealing his symbols with a veil that was from the first impenetrable, without his oral explanation * * *.\" This uncertainty shared by all true students of the subject proves conclusively that it is unwise to make definite statements founded on the indefinite and fragmentary information available concerning the Pythagorean system of mathematical philosophy.\n\nThe material which follows represents an effort to collect a few salient points from the scattered records preserved by disciples of Pythagoras and others who have since contacted his philosophy.\n\nMETHOD OF SECURING THE NUMERICAL POWER OF WORDS The first step in obtaining the numerical value of a word is to resolve it back into its original tongue.\n\nOnly words of Greek or Hebrew derivation can be successfully analyzed by this method, and all words must be spelled in their most ancient and complete forms .\n\nOld Testament words and names, therefore, must be translated back into the early Hebrew characters and New Testament words into the Greek.\n\nTwo examples will help to clarify this principle.\n\nThe Demiurgus of the Jews is called in English Jehovah , but when seeking the numerical value of the name Jehovah it is necessary to resolve the name into its Hebrew letters.\n\nIt becomes יהוה, and is read from right to left.\n\nThe Hebrew letters are: ה, He; ו, Vau; ה, He; י, Yod; and when reversed into the English order from left to right read: Yod-He-Vau-He .\n\nBy consulting the foregoing table of letter values, it is found that the four characters of this sacred name have the following numerical significance: Yod equals 10.\n\nHe equals 5, Vau equals 6, and the second He equals 5.\n\nTherefore, 10+5+6+5=26, a synonym of Jehovah .\n\nIf the English letters were used, the answer obviously would not be correct.\n\nThe second example is the mysterious Gnostic pantheos Abraxas .\n\nFor this name the Greek table is used.\n\nAbraxas in Greek is Ἀβραξας.\n\nΑ = 1, β = 2, ρ = 100, α = 1, ξ =60, α = 1, ς = 200, the sum being 365, the number of days in the year.\n\nThis number furnishes the key to the mystery of Abraxas, who is symbolic of the 365 Æons, or Spirits of the Days, gathered together in one composite personality.\n\nAbraxas is symbolic of five creatures, and as the circle of the year actually consists of 360 degrees, each of the emanating deities is one-fifth of this power, or 72, one of the most sacred numbers in the Old Testament of the Jews and in their Qabbalistic system.\n\nThis same method is used in finding the numerical value of the names of the gods and goddesses of the Greeks and Jews.\n\nAll higher numbers can be reduced to one of the original ten numerals, and the 10 itself to 1.\n\nTherefore, all groups of numbers resulting from the translation of names of deities into their numerical equivalents have a basis in one of the first ten numbers.\n\nBy this system, in which the digits are added together, 666 becomes 6+6+6 or 18, and this, in turn, becomes 1+8 or 9.\n\nAccording to Revelation, 144,000 are to be saved.\n\nThis number becomes 1+4+4+0+0+0, which equals 9, thus proving that both the Beast of Babylon and the number of the saved refer to man himself, whose symbol is the number 9.\n\nThis system can be used successfully with both Greek and Hebrew letter values."

