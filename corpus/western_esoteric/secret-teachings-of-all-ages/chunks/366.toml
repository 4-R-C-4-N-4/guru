[content]
body = "(This is not to be taken as earth years or times.) The 5,000, 000 represents the great hall year; the 700,000 the great Sabbath year, wherein all human beings gradually gain true understanding and become heirs to their original and eternal inheritance, which was lost when they were enmeshed in the lower elements.\n\nThe 64,800 is the number of the fallen angels, and the last one year signifies the liberation of Lucifer and return to his original estate.\n\nFigure 16 is another symbol of salt, while Figure 17 (the dot) is the sign of spirit, gold, the sun, or the germ of life.\n\nIf the dot be moved before itself it becomes a line, Figure 18.\n\nThis motion of the dot is the first motion.\n\nThe beginning and end of every line is a dot.\n\nFigure 19 is the circle.\n\nIt is the second motion and the most perfect of all lines.\n\nOut of it are formed all figures and bodies imaginable.\n\nFigure 20 represents the outpouring of the upper and spiritual life into manifestation.\n\nFigure 21 represents darkness, for it is the loosening of the subterrene destructive principle.\n\nFigure 20 is also the symbol of day, and Figure 21 of night.\n\nTABLE I, Figures 1-11.\n\n*** Figure 22 is a symbol of water; Figure 23 is the complete universal character of light and darkness.\n\nThe upright triangle represents Schamayim; the inverted triangle the dark earth which imprisons the infernal subterranean fire.\n\nIt is \"The First Day of Creation,\" or the time of the separation of Schamayim and Ares.\n\nFigure 24 represents the six days of creation and proves that the elements are an outflow of the Divine Fire which, breaking up, becomes the substances of the tangible universe, as signified in Figure 25.\n\nTABLE II, Figures 12-51.\n\n*** Figure 26 is the character of the air, showing that air is born out of the Eternal Light and the ethereal water.\n\nFigure 27 is the character of water.\n\nIt is the inversion of Figure 26, indicating that its origin is from the lower fire and not the higher.\n\nIts upper part signifies that water does not lack the Divine element, but as a universal mirror reflects the heavenly influences.\n\nFigures 28 and 29 are symbols of salt, showing that it is both fire and water in one.\n\nFigure 30 is the character of fire in all its attributes, and Figure M (the same inverted), water in all its powers.\n\nFigure 32 is the character of salt in all its attributes.\n\nFigure 33 represents both gold and the sun.\n\nTheir essential natures are identical, being formed from the first fire out of Schamayim.\n\nThey are perfect, as can be seen from their symbol, for no more perfect form can be produced out of the dot than the circle.\n\nFigure 34 is the character of the greater and lesser worlds; as the dot is surrounded by its circumference, this world is surrounded by Schamayim.\n\nMan (the Little World) is included in this symbol because his inner nature is potential gold (Aphar Min Haadamah), which gold is his eternal indestructible spiritual body.\n\nGold is the masculine principle of the universe.\n\nFigure 35 is the character of silver and the moon.\n\nIt signifies that silver (like gold) is a perfect metal, except that the red part of its nature is turned inward.\n\nSilver is the feminine principle of the universe."

