body = "The TAU cross was inscribed on the forehead of every person admitted into the Mysteries of Mithras.\n\nWhen a king was initiated into the Egyptian Mysteries, the TAU was placed against his lips.\n\nIt was tattooed upon the bodies of the candidates in some of the American Indian Mysteries.\n\nTo the Qabbalist, the TAU stood for heaven and the Pythagorean tetractys .\n\nThe Caduceus of Hermes was an outgrowth of the TAU cross.\n\n(See Albert Pike.) THE CRUX ANSATA The second type was that of a T, or TAU, cross surmounted by a circle, often foreshortened to the form of an upright oval.\n\nThis was called by the ancients the Crux Ansata, or the cross of life .\n\nIt was the key to the Mysteries of antiquity and it probably gave rise to the more modern story of St.\n\nPeter's golden key to heaven.\n\nIn the Mysteries of Egypt the candidate passed through all forms of actual and imaginary dangers, holding above his head the Crux Ansata, before which the powers of darkness fell back abashed.\n\nThe student is reminded of the words In hoc signo vinces .\n\nThe TAU form of the cross is not unlike the seal of Venus, as Richard Payne Knight has noted.\n\nHe states: \"The cross in this form is sometimes observable on coins, and several of them were found in a temple of Serapis [the Serapeum], demolished at the general destruction of those edifices by the Emperor Theodosius, and were said by the Christian antiquaries of that time to signify the future life.\" Augustus Le Plongeon, in his Sacred Mysteries Among the Mayas and Quiches, notes that the Crux Ansata, which he calls The Key to the Nile and the Symbol of Symbols, either in its complete form or as a simple TAU, was to be seen adorning the breasts of statues and bas-reliefs at Palenque, Copan, and throughout Central America.\n\nHe notes that it was always associated with water; that among the Babylonians it was the emblem of the water gods; among the Scandinavians, of heaven and immortality; and among the Mayas, of rejuvenation and freedom from physical suffering.\n\nConcerning the association of this symbol with the waters of life , Count Goblet d'Alviella, in his Migration of Symbols , calls attention to the fact that an instrument resembling the Crux Ansata and called the Nilometer was used by the ancient Egyptians for measuring and regulating the inundations of the river Nile.\n\nIt is probable that this relationship to the Nile caused it to be considered the symbol of life, for Egypt depended entirely upon the inundations of this river for the irrigation necessary to insure sufficient crops.\n\nIn the papyrus scrolls the Crux Ansata is shown issuing from the mouths of Egyptian kings when they pardoned enemies, and it was buried with them to signify the immortality of the soul.\n\nIt was carried by many of the gods and goddesses and apparently signified their divine benevolence and life-giving power.\n\nThe Cairo Museum contains a magnificent collection of crosses of many shapes, sizes, and designs, proving that they were a common symbol among the Egyptians.\n\nTHE ROMAN AND GREEK CATHOLIC CROSSES The third form of the cross is the familiar Roman or Greek type, which is closely associated with the crucifixion of Jesus Christ, although it is improbable that the cross used resembled its more familiar modern form.\n\nThere are unlimited sub-varieties of crosses, differing in the relative proportions of their vertical and horizontal sections.\n\nAmong the secret orders of different generations we find compounded crosses, such as the triple TAU in the Royal Arch of Freemasonry and the double and triple crosses of both Masonic and Roman Catholic symbolism.\n\nTo the Christian the cross has a twofold significance."

