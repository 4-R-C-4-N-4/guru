body = "She is crowned with the lunar orb, ornamented with the horns of rams or bulls.\n\nOrus, or Horus as he is more generally known, was the son of Isis and Osiris.\n\nHe was the god of time, hours, days, and this narrow span of life recognized as mortal existence.\n\nIn all probability, the four sons of Horus represent the four kingdoms of Nature.\n\nIt was Horus who finally avenged the murder of his father, Osiris, by slaying Typhon, the spirit of Evil.\n\n*** The sheen of gold in her dark hair indicates that while she is lunar, her power is due to the sun's rays, from which she secures her ruddy complexion.\n\nAs the moon is robed in the reflected light of the sun, so Isis, like the virgin of Revelation, is clothed in the glory of solar luminosity.\n\nApuleius states that while he was sleeping he beheld the venerable goddess Isis rising out of the ocean.\n\nThe ancients realized that the primary forms of life first came out of water, and modem science concurs in this view.\n\nH.\n\nG.\n\nWells, in his Outline of History , describing primitive life on the earth, states: \"But though the ocean and intertidal water already swarmed with life, the land above the high-tide line was still, so far as we can guess, a stony wilderness without a trace of life.\" In the next chapter he adds: \"Wherever the shore-line ran there was life, and that life went on in and by and with water as its home, its medium, and its fundamental necessity.\" The ancients believed that the universal sperm proceeded from warm vapor, humid but fiery.\n\nThe veiled Isis, whose very coverings represent vapor, is symbolic of this humidity, which is the carrier or vehicle for the sperm life of the sun, represented by a child in her arms.\n\nBecause the sun, moon, and stars in setting appear to sink into the sea and also because the water receives their rays into itself, the sea was believed to be the breeding ground for the sperm of living things.\n\nThis sperm is generated from the combination of the influences of the celestial bodies; hence Isis is sometimes represented as pregnant.\n\nFrequently the statue of Isis was accompanied by the figure of a large black and white ox.\n\nThe ox represents either Osiris as Taurus, the bull of the zodiac, or Apis, an animal sacred to Osiris because of its peculiar markings and colorings.\n\nAmong the Egyptians, the bull was a beast of burden.\n\nHence the presence of the animal was a reminder of the labors patiently performed by Nature that all creatures may have life and health.\n\nHarpocrates, the God of Silence, holding his fingers to his mouth, often accompanies the statue of Isis.\n\nHe warns all to keep the secrets of the wise from those unfit to know them.\n\nThe Druids of Britain and Gaul had a deep knowledge concerning the mysteries of Isis and worshiped her under the symbol of the moon.\n\nGodfrey Higgins considers it a mistake to regard Isis as synonymous with the moon.\n\nThe moon was chosen for Isis because of its dominion over water.\n\nThe Druids considered the sun to be the father and the moon the mother of all things.\n\nBy means of these symbols they worshiped Universal Nature.\n\nThe figure of Isis is sometimes used to represent the occult and magical arts, such as necromancy, invocation, sorcery, and thaumaturgy.\n\nIn one of the myths concerning her, Isis is said to have conjured the invincible God of Eternities, Ra , to tell her his secret and sacred name, which he did.\n\nThis name is equivalent to the Lost Word of Masonry.\n\nBy means of this Word, a magician can demand obedience from the invisible and superior deities.\n\nThe priests of Isis became adepts in the use of the unseen forces of Nature."

