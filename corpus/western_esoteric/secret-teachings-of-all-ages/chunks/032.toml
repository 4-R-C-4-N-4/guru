[content]
body = "Describing the temples of the Druids, Charles Heckethorn, in The Secret Societies of All Ages & Countries , says: \"Their temples wherein the sacred fire was preserved were generally situate on eminences and in dense groves of oak, and assumed various forms--circular, because a circle was the emblem of the universe; oval, in allusion to the mundane egg, from which issued, according to the traditions of many nations, the universe, or, according to others, our first parents; serpentine, because a serpent was the symbol of Hu, the Druidic Osiris; cruciform, because a cross is an emblem of regeneration; or winged, to represent the motion of the Divine Spirit.\n\n* * * Their chief deities were reducible to two--a male and a female, the great father and mother--Hu and Ceridwen, distinguished by the same characteristics as belong to Osiris and Isis, Bacchus and Ceres, or any other supreme god and goddess representing the two principles of all Being.\" Godfrey Higgins states that Hu , the Mighty, regarded as the first settler of Britain, came from a place which the Welsh Triads call the Summer Country, the present site of Constantinople.\n\nAlbert Pike says that the Lost Word of Masonry is concealed in the name of the Druid god Hu .\n\nThe meager information extant concerning the secret initiations of the Druids indicates a decided similarity between their Mystery school and the schools of Greece and Egypt.\n\nHu , the Sun God, was murdered and, after a number of strange ordeals and mystic rituals, was restored to life.\n\nThere were three degrees of the Druidic Mysteries, but few successfully passed them all.\n\nThe candidate was buried in a coffin, as symbolic of the death of the Sun God.\n\nThe supreme test, however, was being sent out to sea in an open boat.\n\nWhile undergoing this ordeal, many lost their lives.\n\nTaliesin, an ancient scholar, who passed through the Mysteries, describes the initiation of the open boat in Faber's Pagan Idolatry .\n\nThe few who passed this third degree were said to have been \"born again,\" and were instructed in the secret and hidden truths which the Druid priests had preserved from antiquity.\n\nFrom these initiates were chosen many of the dignitaries of the British religious and political world.\n\n(For further details, see Faber's Pagan Idolatry , Albert Pike's Morals and Dogma , and Godfrey Higgins' Celtic Druids .) THE RITES OF MITHRAS When the Persian Mysteries immigrated into Southern Europe, they were quickly assimilated by the Latin mind.\n\nThe cult grew rapidly, especially among the Roman soldiery, and during the Roman wars of conquest the teachings were carried by the legionaries to nearly all parts of Europe.\n\nSo powerful did the cult of Mithras become that at least one Roman Emperor was initiated into the order, which met in caverns under the city of Rome.\n\nConcerning the spread of this Mystery school through different parts of Europe, C.\n\nW.\n\nKing, in his Gnostics and Their Remains , says: \"Mithraic bas-reliefs cut on the faces of rocks or on stone tablets still abound in the countries formerly the western provinces of the Roman Empire; many exist in Germany, still more in France, and in this island (Britain) they have often been discovered on the line of the Picts' Wall and the noted one at Bath.\" Alexander Wilder, in his Philosophy and Ethics of the Zoroasters , states that Mithras is the Zend title for the sun, and he is supposed to dwell within that shining orb.\n\nMithras has a male and a female aspect, though not himself androgynous."

