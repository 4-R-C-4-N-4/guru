body = "The deer desires no other name but that of the soul ; * * *.\n\nHe that knows how to tame and master them by art, to couple them together, and to lead them in and our of the form, may justly be called a Master.\" The Egyptian devil, Typhon, was often symbolized by the Set monster whose identity is obscure.\n\nIt has a queer snoutlike nose and pointed ears, and may have been a conventional hyena.\n\nThe Set monster lived in the sand storms and wandered about the world promulgating evil.\n\nThe Egyptians related the howling of the desert winds with the moaning cry of the hyena.\n\nThus when in the depths of the night the hyena sent forth its doleful wail it sounded like the last despairing cry of a lost soul in the clutches of Typhon.\n\nAmong the duties of this evil creature was that of protecting the Egyptian dead against: grave robbers.\n\nAmong other symbols of Typhon was the hippopotamus, sacred to the god Mars because Mars was enthroned in the sign of Scorpio, the house of Typhon.\n\nThe ass was also sacred to this Egyptian demon.\n\nJesus riding into Jerusalem upon the back of an ass has the same significance as Hermes standing upon the prostrate form of Typhon.\n\nThe early Christians were accused of worshiping the head of an ass.\n\nA most curious animal symbol is the hog or sow, sacred to Diana, and frequently employed in the Mysteries as an emblem of the occult art.\n\nThe wild boar which gored Atys shows the use of this animal in the Mysteries.\n\nAccording to the Mysteries, the monkey represents the condition of man before the rational soul entered into his constitution.\n\nTherefore it typifies the irrational man.\n\nBy some the monkey is looked upon as a species not ensouled by the spiritual hierarchies; by others as a fallen state wherein man has been deprived of his divine nature through degeneracy.\n\nThe ancients, though evolutionists, did not trace man's ascent through the monkey; the monkey they considered as having separated itself from the main stem of progress.\n\nThe monkey was occasionally employed as a symbol of learning.\n\nCynocephalus, the dog-headed ape, was the Egyptian hieroglyphic symbol of writing, and was closely associated with Thoth.\n\nCynocephalus is symbolic of the moon and Thoth of the planet Mercury.\n\nBecause of the ancient belief that the moon followed Mercury about the heavens the dog-ape was described as the faithful companion of Thoth.\n\nThe dog, because of its faithfulness, denotes the relationship which should exist between disciple and master or between the initiate and his God.\n\nThe shepherd dog was a type of the priestcraft.\n\nThe dog's ability to sense and follow unseen persons for miles symbolized the transcendental power by which the philosopher follows the thread of truth through the labyrinth of earthly error.\n\nThe dog is also the symbol of Mercury.\n\nThe Dog Star, Sirius or Sothis, was sacred to the Egyptians because it presaged the annual inundations of the Nile.\n\nAs a beast of burden the horse was the symbol of the body of man forced to sustain the weight of his spiritual constitution.\n\nConversely, it also typified the spiritual nature of man forced to maintain the burden of the material personality.\n\nChiron, the centaur, mentor of Achilles, represents the primitive creation which was the progenitor and instructor of mankind, as described by Berossus.\n\nThe winged horse and the magic carpet both symbolize the secret doctrine and the spiritualized body of man.\n\nThe wooden horse of Troy, secreting an army for the capture of the city, represents man's body concealing within it those infinite potentialities which will later come forth and conquer his environment.\n\nAgain, like Noah's Ark, it represents the spiritual nature of man as containing a host of latent potentialities which subsequently become active."

