body = "There are several interesting stories concerning the discoveries of ever-burning lamps in various parts of the world.\n\nIn a tomb on the Appian Way which was opened during the papacy of Paul III was found a burning lamp which had remained alight in a hermetically sealed vault for nearly 1,600 years.\n\nAccording to an account written by a contemporary, a body--that of a young and beautiful girl with long golden hair--was found floating in an unknown transparent liquid and as well preserved as though death had occurred but a few hours before.\n\nAbout the interior of the vault were a number of significant objects, which included several lamps, one of them alight.\n\nThose entering the sepulcher declared that the draft caused by the opening of the door blew out the light and the lamp could not be relighted.\n\nKircher reproduces an epitaph, \"TULLIOLAE FILIAE MEAE,\" supposedly found in the tomb, but which Montfaucon declares never existed, the latter adding that although conclusive evidence was not found, the body was generally believed to be that of Tulliola, the daughter of Cicero.\n\nEver-burning lamps have been discovered in all parts of the world.\n\nNot only the Mediterranean countries but also India, Tibet, China, and South America have contributed records of lights which burned continuously without fuel.\n\nThe examples which follow were selected at random from the imposing list of perpetual lamps found in different ages.\n\nPlutarch wrote of a lamp that burned over the door of a temple to Jupiter Ammon; the priests declared that it had remained alight for centuries without fuel.\n\nSt.\n\nAugustine described a perpetual lamp, guarded in a temple in Egypt sacred to Venus, which neither wind nor water could extinguish.\n\nHe believed it to be the work of the Devil.\n\nAn ever-burning lamp was found at Edessa, or Antioch, during the reign of the Emperor Justinian.\n\nIt was in a niche over the city gate, elaborately enclosed to protect it from the elements.\n\nThe date upon it proved that the lamp had been burning for more than 500 years.\n\nIt was destroyed by soldiers.\n\nDuring the early Middle Ages a lamp was found in England which had burned since the third century after Christ.\n\nThe monument containing it was believed to be the tomb of the father of Constantine the Great.\n\nThe Lantern of Pallas was discovered near Rome in A.D.\n\n1401.\n\nIt was found in the sepulcher of Pallas, son of Evander, immortalized by Virgil in his Æneid .\n\nThe lamp was placed at the head of the body and had burned with a steady glow for more than 2,000 years.\n\nIn A.D.\n\n1550 on the island of Nesis, in the Bay of Naples, a magnificent marble vault was opened in which was found a lamp still alight which had been placed there before the beginning of the Christian Era.\n\nPausanias described a beautiful golden lamp in the temple of Minerva which burned steadily for a year without refueling or having the wick trimmed.\n\nThe ceremony of filling the lamp took place annually, and time was measured by the ceremony.\n\nAccording to the Fama Fraternitatis , the crypt of Christian Rosencreutz when opened 120 years after his death was found to be brilliantly illuminated by a perpetual lamp suspended from the ceiling.\n\nNuma Pompilius, King of Rome and magician of considerable power, caused a perpetual light to burn in the dome of a temple he had created in honor of an elemental being.\n\nBASE OF A DELPHIAN TRIPOD.\n\nFrom Montfaucon's Antiquities.\n\nThe windings of these serpents formed the base, and the three heads sustained the three feet of the tripod.\n\nIt is impossible to secure satisfactory information concerning the shape and size of the celebrated Delphian tripod."

