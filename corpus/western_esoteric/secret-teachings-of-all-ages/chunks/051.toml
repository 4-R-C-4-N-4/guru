body = "Because this vast host was not prepared for the highest spiritual and mystical doctrines, a division necessarily took place within the society itself.\n\nThe higher teachings were given to only a limited number of initiates who, because of superior mentality, showed a comprehensive grasp of their underlying philosophical concepts.\n\nSocrates refused to be initiated into the Eleusinian Mysteries, for knowing its principles without being a member of the order he realized that membership would seal his tongue.\n\nThat the Mysteries of Eleusis were based upon great and eternal truths is attested by the veneration in which they were held by the great minds of the ancient world.\n\nM.\n\nOuvaroff asks, \"Would Pindar, Plato, Cicero, Epictetus, have spoken of them with such admiration, if the hierophant had satisfied himself with loudly proclaiming his own opinions, or those of his order?\" The garments in which candidates were initiated were preserved for many years and were believed to possess almost sacred properties.\n\nJust as the soul can have no covering save wisdom and virtue, so the candidates--being as yet without true knowledge--were presented to the Mysteries unclothed, being first: given the skin of an animal and later a consecrated robe to symbolize the philosophical teachings received by the initiate.\n\nDuring the course of initiation the candidate passed through two gates.\n\nThe first led downward into the lower worlds and symbolized his birth into ignorance.\n\nThe second led upward into a room brilliantly lighted by unseen lamps, in which was the statue of Ceres and which symbolized the upper world, or the abode of Light and Truth.\n\nStrabo states that the great temple of Eleusis would hold between twenty and thirty thousand people.\n\nThe caves dedicated by Zarathustra also had these two doors, symbolizing the avenues of birth and death.\n\nCERES, THE PATRON OF THE MYSTERIES.\n\nFrom a mural painting in Pompeii.\n\nCeres, or Demeter, was the daughter of Kronos and Rhea, and by Zeus the mother of Persephone.\n\nSome believe her to be the goddess of the earth, but more correctly she is the deity protecting agriculture in general and corn in particular.\n\nThe Poppy is sacred to Ceres and she is often shown carrying or ornamented by a garland of these flowers.\n\nIn the Mysteries, Ceres represented riding in a chariot drawn by winged serpents.\n\n*** The following paragraph from Porphyry gives a fairly adequate conception of Eleusinian symbolism: \"God being a luminous principle, residing in the midst of the most subtile fire, he remains for ever invisible to the eyes of those who do not elevate themselves above material life: on this account, the sight of transparent bodies, such as crystal, Parian marble, and even ivory, recalls the idea of divine light; as the sight of gold excites an idea of its purity, for gold cannot he sullied.\n\nSome have thought by a black stone was signified the invisibility of the divine essence.\n\nTo express supreme reason, the Divinity was represented under the human form--and beautiful, for God is the source of beauty; of different ages, and in various attitudes, sitting or upright; of one or the other sex, as a virgin or a young man, a husband or a bride, that all the shades and gradations might be marked.\n\nEvery thing luminous was subsequently attributed to the gods; the sphere, and all that is spherical, to the universe, to the sun and the moon--sometimes to Fortune and to Hope.\n\nThe circle, and all circular figures, to eternity--to the celestial movements; to the circles and zones of the heavens.\n\nThe section of circles, to the phases of the moon; and pyramids and obelisks, to the igneous principle, and through that to the gods of Heaven."

