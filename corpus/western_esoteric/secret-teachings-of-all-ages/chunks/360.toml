body = "In the preface of the same work, he enumerates the strange powers of the Rosicrucian adepts: \"I shall here tell you what Rosie Crucians are, and that Moses was their Father, and he was Θεοῦ παῖς; some say they were of the order of Elias, some say the Disciples of Ezekiel; * * * For it should seem Rosie Crucians were not only initiated into the Mosaical Theory, but have arrived also to the power of working miracles, as Moses , Elias , Ezekiel , and the succeeding Prophets did, as being transported where they please, as Habakkuk was from Jewry to Babylon, or as Philip, after he had baptized the Eunuch to Azorus, and one of these went from me to a friend of mine in Devonshire, and came and brought me an answer to London the some day, which is four days journey; they caught me excellent predictions of Astrology and Earthquakes; they slack the Plague in Cities; they silence the violent Winds and Tempests; they calm the rage of the Sea and Rivers; they walk in the Air, they frustrate the malicious aspects of Witches; they cure all Diseases.\" The writings of John Heydon are considered a most important contribution to Rosicrucian literature.\n\nJohn Heydon was probably related to Sir Christopher Heydon, \"a Seraphically Illuminated Rosie Crucian , \" whom the late F.\n\nLeigh Gardner, Hon.\n\nSecretary Sec.\n\nRos.\n\nin Anglia, believes to have been the source of his Rosicrucian knowledge.\n\nIn his Bibliotheca Rosicrucian a he makes the following statement concerning John Heydon: \"On the whole, from the internal evidence of his writings, he appears to have gone through the lower grade of the R.\n\nC.\n\nOrder and to have given out much of this to the world.\" John Heydon traveled extensively, visiting Arabia, Egypt, Persia, and various parts of Europe, as related in a biographical introduction to his work, The Wise-Mans Crown, Set with Angels, Planets, Metals, etc.\n\n, or The Glory of the Rosie Cross --a work declared by him to be a translation into English of the mysterious book M brought from Arabia by Christian Rosencreutz.\n\nThomas Vaughan (Eugenius Philalethes), another champion of the Order, corroborates the statement of John Heydon concerning the ability of the Rosicrucian initiates to make themselves invisible at will: \"The Fraternity of R.C.\n\ncan move in this white mist.\n\n'Whosoever would communicate with us must be able to see in this light, or us he will never see unless by our own will.'\" The Fraternity of R.C.\n\nis an august and sovereign body, arbitrarily manipulating the symbols of alchemy, Qabbalism, astrology, and magic to the attainment of its own peculiar purposes, but entirely independent of the cults whose terminology it employs.\n\nThe three major objects of the Fraternity are: 1.\n\nThe abolition of all monarchical forms of government and the substitution therefor of the rulership of the philosophic elect .\n\nThe present democracies are the direct outgrowth of Rosicrucian efforts to liberate the maws from the domination of despotism.\n\nIn the early part of the eighteenth century the Rosicrucians turned their attention to the new American Colonies, then forming the nucleus of a great nation in the New World.\n\nThe American War of Independence represents their first great political experiment and resulted in the establishment of a national government founded upon the fundamental principles of divine and natural law.\n\nAs an imperishable reminder of their sub rosa activities, the Rosicrucians left the Great Seal of the United States."

