[content]
body = "In height he exceeded six feet; his body was as perfectly formed as that of Apollo.\n\nPythagoras was the personification of majesty and power, and in his presence a felt humble and afraid.\n\nAs he grew older, his physical power increased rather than waned, so that as he approached the century mark he was actually in the prime of life.\n\nThe influence of this great soul over those about him was such that a word of praise from Pythagoras filled his disciples with ecstasy, while one committed suicide because the Master became momentarily irritate over something he had dome.\n\nPythagoras was so impressed by this tragedy that he never again spoke unkindly to or about anyone.\n\n*** His surviving disciples attempted to perpetuate his doctrines, but they were persecuted on every hand and very little remains today as a testimonial to the greatness of this philosopher.\n\nIt is said that the disciples of Pythagoras never addressed him or referred to him by his own name, but always as The Master or That Man.\n\nThis may have been because of the fact that the name Pythagoras was believed to consist of a certain number of specially arranged letters with great sacred significance.\n\nThe Word magazine has printed an article by T.\n\nR.\n\nPrater, showing that Pythagoras initiated his candidates by means of a certain formula concealed within the letters of his own name.\n\nThis may explain why the word Pythagoras was so highly revered.\n\nAfter the death of Pythagoras his school gradually disintegrated, but those who had benefited by its teachings revered the memory of the great philosopher, as during his life they had reverenced the man himself.\n\nAs time went on, Pythagoras came to be regarded as a god rather than a man, and his scattered disciples were bound together by their common admiration for the transcendent genius of their teacher.\n\nEdouard Schure, in his Pythagoras and the Delphic Mysteries , relates the following incident as illustrative of the bond of fellowship uniting the members of the Pythagorean School: \"One of them who had fallen upon sickness and poverty was kindly taken in by an innkeeper.\n\nBefore dying he traced a few mysterious signs (the pentagram, no doubt) on the door of the inn and said to the host, 'Do not be uneasy, one of my brothers will pay my debts.' A year afterwards, as a stranger was passing by this inn he saw the signs and said to the host, 'I am a Pythagorean; one of my brothers died here; tell me what I owe you on his account.'\" Frank C.\n\nHiggins, 32°, gives an excellent compendium of the Pythagorean tenets in the following outline: \"Pythagoras' teachings are of the most transcendental importance to Masons, inasmuch as they are the necessary fruit of his contact with the leading philosophers of the whole civilized world of his own day, and must represent that in which all were agreed, shorn of all weeds of controversy.\n\nThus, the determined stand made by Pythagoras, in defense of pure monotheism, is sufficient evidence that the tradition to the effect that the unity of God was the supreme secret of all the ancient initiations is substantially correct.\n\nThe philosophical school of Pythagoras was, in a measure, also a series of initiations, for he caused his pupils to pass through a series of degrees and never permitted them personal contact with himself until they had reached the higher grades.\n\nAccording to his biographers, his degrees were three in number.\n\nThe first, that of 'Mathematicus,' assuring his pupils proficiency in mathematics and geometry, which was then, as it would be now if Masonry were properly inculcated, the basis upon which all other knowledge was erected."

