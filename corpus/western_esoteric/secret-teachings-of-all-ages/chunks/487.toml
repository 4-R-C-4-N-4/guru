body = "REPRESENTATIVE of the attitude of Christendom toward Islam, till recent years at least, is Alexander Ross's postscript to the Anglicized version, published in 1649, of Sieur Du Ryer's French translation of the Koran .\n\nThe author of the postscript directs the following invective against Mohammed and the Koran: \"Good Reader, the great Arabian Impostor now at last after a thousand years, is by the way of France arrived in England, and his Alcoran, or gallimaufry of errors, (a brat as deformed as the parent, and as full of heresies as his scald head was of scurvy) hath learned to speak English.\n\n* * * If you will take a brief view of the Alcoran, you shall find it a hodgepodge made up of these four ingredients: 1.\n\nOf Contradictions.\n\n2.\n\nOf Blasphemy.\n\n3.\n\nOf ridiculous Fables.\n\n4.\n\nOf Lies.\" The accusation of blasphemy is emphasized against Mohammed because he affirmed that God, being unmarried, was incapable of having a Son!\n\nThe fallacious argument, however, is apparent from the Prophet's own views of the nature of God as contained in the second sura of the Koran: \"To Allah [God] belongeth the east and the west; therefore, whithersoever ye turn yourselves to pray, there is the face of Allah; for Allah is omnipresent and omniscient.\n\nThey say, Allah hath begotten children: Allah forbid!\n\nTo him belongeth whatever is in heaven, and on earth; all is possessed by him, the Creator of heaven and earth; and when he decreeth a thing, he only saith unto it, Be, and it is.\" In other words, the God of Islam has but to desire and the object of that desire at once comes into being, whereas the God of Alexander Ross must proceed in accord with the laws of human generation!\n\nMohammed, Prophet of Islam, \"the desired of all nations,\" was born in Mecca, A.D.\n\n570 (?) and died in Medina, A.D.\n\n632, or in the eleventh ),ear after the Hegira .\n\nWashington Irving thus describes the signs and wonders accompanying the birth of the Prophet: \"His mother suffered none of the pangs of travail.\n\nAt the moment of his coming into the world a celestial light illumined the surrounding country, and the new born child, raising his eyes to heaven, exclaimed: 'God is great!\n\nThere is no God bur God, and I am his prophet!' Heaven and earth, we are assured, were agitated at his advent.\n\nThe Lake Sawa shrank back to its secret springs, leaving its borders dry; while the Tigris, bursting its bounds, overflowed the neighboring lands.\n\nThe palace of Khosru the king of Persia shook t on its foundations, and several of its towers were toppled to the earth.\n\n* * * In the same eventful night the sacred fire of Zoroaster, which, guarded by the Magi, had burned without interruption for upward of a thousand years, was suddenly extinguished, and all the idols in the world fell down.\" (See Mahomet and His Successors .) While the Prophet was still but a toddling babe, the Angel Gabriel with seventy wings came to him, and cutting open the child, withdrew the heart.\n\nThis Gabriel cleansed of the black drop of original sin which is in every human heart because of the perfidy of Adam and then returned the organ to its proper place in the Prophet's body.\n\n(See footnote in E.\n\nH."

