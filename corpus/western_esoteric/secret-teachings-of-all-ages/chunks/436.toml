body = "At the bottom of the picture is a nobleman (Bacon?) placing his hat on another man's head.\n\nIn the oval at the top of the plate, it is possible that the lights are beacons, or a play upon the name Bacon.\n\nIn the two side panels are striking and subtle \"Shakespearian\" allusions.\n\nOn the left is a nobleman (possibly Bacon) handing a paper to another man of mean appearance who carries in his hand a spear.\n\nAt the right, the man who previously carried the spear is shown in the costume of an actor, wearing spurs and blowing a horn.\n\nThe allusion to the actor blowing his horn and the figure carrying the spear suggest much, especially as spear is the last syllable of the name \"Shakespeare.\" *** To illustrate the basic differences in their construction and use, the various forms of ciphers are here grouped under seven general headings: 1.\n\nThe literal cipher.\n\nThe most famous of all literal cryptograms is the famous biliteral cipher described by Sir Francis Bacon in his De Augmentis Scientiarum .\n\nLord Bacon originated the system while still a young man residing in Paris.\n\nThe biliteral cipher requires the use of two styles of type, one an ordinary face and the other specially cut.\n\nThe differences between the two fonts are in many case so minute that it requires a powerful magnifying glass to detect them.\n\nOriginally, the cipher messages were concealed only in the italicized words, sentences, or paragraphs, because the italic letters, being more ornate than the Roman letters, offered greater opportunity for concealing the slight but necessary variations.\n\nSometimes the letters vary a trifle in size; at other times in thickness or in their ornamental flourishes.\n\nLater, Lord Bacon is believed to have had two Roman alphabets specially prepared in which the differences were so trivial that it is almost impossible for experts to distinguish them.\n\nA careful inspection of the first four \"Shakespeare\" folios discloses the use throughout the volumes of several styles of type differing in minute but distinguishable details.\n\nIt is possible that all the \"Shakespeare\" folios contain ciphers running through the text.\n\nThese ciphers may have been added to the original plays, which are much longer in the folios than in the original quartos, full scenes having been added in some instances.\n\nThe biliteral cipher was not confined to the writings of Bacon and \"Shakespeare,\" however, but appears in many books published during Lord Bacon's lifetime and for nearly a century after his b death.\n\nIn referring to the biliteral cipher, Lord Bacon terms it omnia per omnia .\n\nThe cipher may run through an entire book and be placed therein at the time of printing without the knowledge of the original author, for it does not necessitate the changing of either words or punctuation.\n\nIt is possible that this cipher was inserted for political purposes into many documents and volumes published during the seventeenth century.\n\nIt is well known that ciphers were used for the same reason as early as the Council of Nicæa.\n\nThe Baconian biliteral cipher is difficult to use today, owing to the present exact standardization of type and the fact that so few books are now hand set.\n\nAccompanying this chapter are facsimiles of Lord Bacon's biliteral alphabet as it appeared in the 1640 English translation of De Augmentis Scientiarum .\n\nThere are four alphabets, two for the capital and two for the small letters.\n\nConsider carefully the differences between these four and note that each alphabet has the power of either the letter a or the letter b , and that when reading a word its letters are divisible into one of two groups: those which correspond to the letter a and those which correspond to the letter b .\n\nIn order to employ the biliteral cipher, a document must contain five times as many letters as there are in the cipher message to be concealed, for it requires five letters to conceal one."

