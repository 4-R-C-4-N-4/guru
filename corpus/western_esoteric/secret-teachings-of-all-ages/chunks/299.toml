body = "THE Tree of the Sephiroth may be considered an invaluable compendium of the secret philosophy which originally was the spirit and soul of Chasidism.\n\nThe Qabbalah is the priceless heritage of Israel, but each year those who comprehend its true principles become fewer in number.\n\nThe Jew of today, if he lacks a realization of the profundity of his people's doctrines, is usually permeated with that most dangerous form of ignorance, modernism, and is prone to regard the Qabbalah either as an evil to be shunned like the plague or as a ridiculous superstition which has survived the black magic of the Dark Ages.\n\nYet without the key which the Qabbalah supplies, the spiritual mysteries of both the Old and the New Testament must remain unsolved by Jew and Gentile alike.\n\nThe Sephirothic Tree consists of ten globes of luminous splendor arranged in three vertical columns and connected by 22 channels or paths.\n\nThe ten globes are called the Sephiroth and to them are assigned the numbers i to 10.\n\nThe three columns are called Mercy (on the right), Severity (on the left), and, between them, Mildness , as the reconciling power.\n\nThe columns may also be said to represent Wisdom , Strength , and Beauty , which form the triune support of the universe, for it is written that the foundation of all things is the Three .\n\nThe 22 channels are the letters of the Hebrew alphabet and to them are assigned the major trumps of the Tarot deck of symbolic cards.\n\nÉliphas Lévi declared that by arranging the Tarot cards according to a definite order man could discover all that is knowable concerning his God, his universe, and himself.\n\nWhen the ten numbers which pertain to the globes (Sephiroth) are combined with the 22 letters relating to the channels, the resultant sum is 32--the number peculiar to the Qabbalistic Paths of Wisdom.\n\nThese Paths, occasionally referred to as the 32 teeth in the mouth of the Vast Countenance or as the 32 nerves that branch out from the Divine Brain, are analogous to the first 32 degrees of Freemasonry, which elevate the candidate to the dignity of a Prince of the Royal Secret.\n\nQabbalists also consider it extremely significant that in the original Hebrew Scriptures the name of God should occur 32 times in the first chapter of Genesis.\n\n(In the English translations of the Bible the name appears 33 times.) In the mystic analysis of the human body, according to the Rabbins, 32 spinal segments lead upward to the Temple of Wisdom--the skull.\n\nThe four Qabbalistic Trees described in the preceding chapter were combined by later Jewish scholars into one all-inclusive diagram and termed by them not only the Sephirothic but also the Archetypal , or Heavenly , Adam .\n\nAccording to some authorities, it is this Heavenly Adam, and not a terrestrial man, whose creation is described in the opening chapters of Genesis.\n\nOut of the substances of this divine man the universe was formed; in him it remains and will continue even after dissolution shall resolve the spheres back into their own primitive substance.\n\nThe Deity is never conceived of as actually contained in the Sephiroth, which are purely hypothetical vessels employed to define the limits of the Creative Essence.\n\nAdolph Franck rather likens the Sephiroth to varicolored transparent glass bowls filled with pure light, which apparently assumes the color of its containers but whose essential nature remains ever unchanged and unchangeable."

