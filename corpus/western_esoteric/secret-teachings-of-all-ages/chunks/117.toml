body = "A new and different sidelight on zodiacal symbolism is supplied by John Cole, in A Treatise on the Circular Zodiac of Tentyra, in Egypt : \"The symbol therefore of the Goat rising from the body of a fish [Capricorn], represents with the greatest propriety the mountainous buildings of Babylon rising out of its low and marshy situation; the two horns of the Goat being emblematical of the two towns, Nineveh and Babylon, the former built on the Tigris, the latter on the Euphrates; but both subjected to one sovereignty.\" The period of 2,160 years required for the regression of the sun through one of the zodiacal constellations is often termed an age.\n\nAccording to this system, the age secured its name from the sign through which the sun passes year after year as it crosses the equator at the vernal equinox.\n\nTHE MICROCOSM.\n\nFrom Schotus' Margarita Philosophica.\n\nThe pagans believed that the zodiac formed the body of the Grand Man of the Universe.\n\nThis body, which they called the Macrocosm (the Great World), was divided into twelve major parts, one of which was under the control of the celestial powers reposing in each of the zodiacal constellations.\n\nBelieving that the entire universal system was epitomized in man's body, which they called the Microcosm (the Little World), they evolved that now familiar figure of \"the cut-up man in the almanac\" by allotting a sign of the zodiac to each of twelve major parts of the human body.\n\n*** From this arrangement are derived the terms The Taurian Age , The Aryan Age , The Piscean Age , and The Aquarian Age .\n\nDuring these periods, or ages, religious worship takes the form of the appropriate celestial sign--that which the sun is said to assume as a personality in the same manner that a spirit assumes a body.\n\nThese twelve signs are the jewels of his breastplate and his light shines forth from them, one after the other.\n\nFrom a consideration of this system, it is readily understood why certain religious symbols were adopted during different ages of the earth's history; for during the 2,160 years the sun was in the constellation of Taurus, it is said that the Solar Deity assumed the body of Apis, and the Bull became sacred to Osiris.\n\n(For details concerning the astrological ages as related to Biblical symbolism, see The Message of the Stars by Max and Augusta Foss Heindel.) During the Aryan Age the Lamb was held sacred and the priests were called shepherds .\n\nSheep and goats were sacrificed upon the altars, and a scapegoat was appointed to bear the sins of Israel.\n\nDuring the Age of Pisces, the Fish was the symbol of divinity and the Sun God fed the multitude with two small fishes.\n\nThe frontispiece of Inman's Ancient Faiths shows the goddess Isis with a fish on her head; and the Indian Savior God, Christna, in one of his incarnations was cast from the mouth of a fish.\n\nNot only is Jesus often referred to as the Fisher of Men , but as John P.\n\nLundy writes: \"The word Fish is an abbreviation of this whole title, Jesus Christ, Son of God, Savior, and Cross; or as St."

