[content]
body = "They know that every spoken word has tremendous power and that by certain arrangements of words they can create vortices of force in the invisible universe about them and thereby profoundly influence physical substance.\n\nThe Sacred Word by which the world was established, the Lost Word which Masonry is still seeking, and the threefold Divine Name symbolized by A.\n\nU.\n\nM.\n\n--the creative tone of the Hindus--all are indicative of the veneration accorded the principle of sound.\n\nThe so-called \"new discoveries\" of modern science are often only rediscoveries of secrets well known to the priests and philosophers of ancient pagandom.\n\nMan's inhumanity to man has resulted in the loss of records and formula: which, had they been preserved, would have solved many of the greatest problems of this civilization.\n\nWith sword and firebrand, races obliterate the records of their predecessors, and then inevitably meet with an untimely fate for need of the very wisdom they have destroyed."

