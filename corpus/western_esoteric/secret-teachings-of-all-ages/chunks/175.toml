[content]
body = "The second center (or the link between the superior and inferior worlds) is elevated to the position of greatest physical dignity--the brain.\n\nThe third (or lower) center is relegated to the position of least physical dignity but greatest physical importance--the generative system.\n\nThus the heart is symbolically the source of life; the brain the link by which, through rational intelligence, life and form are united; and the generative system--or infernal creator--the source of that power by which physical organisms are produced.\n\nThe ideals and aspirations of the individual depend largely upon which of these three centers of power predominates in scope and activity of expression.\n\nIn the materialist the lower center is the strongest, in the intellectualist the higher center; but in the initiate the middle center--by bathing the two extremes in a flood of spiritual effulgence--controls wholesomely both the mind and the body.\n\nAs light bears witness of life-which is its source-so the mind bears witness of the spirit, and activity in a still lower plane bears witness of intelligence.\n\nThus the mind bears witness of the heart, while the generative system, in turn, bears witness of the mind.\n\nAccordingly, the spiritual nature is most commonly symbolized by a heart; the intellectual power by an opened eye, symbolizing the pineal gland or Cyclopean eye, which is the two-faced Janus of the pagan Mysteries; and the generative system by a flower, a staff, a cup, or a hand.\n\nWhile all the Mysteries recognized the heart as the center of spiritual consciousness, they often purposely ignored this concept and used the heart in its exoteric sense as the symbol of the emotional nature, In this arrangement the generative center represented the physical body, the heart the emotional body, and the brain the mental body.\n\nThe brain represented the superior sphere, but after the initiates had passed through the lower degrees they were instructed that the brain was the proxy of the spiritual flame dwelling in the innermost recesses of the heart.\n\nThe student of esotericism discovers ere long that the ancients often resorted to various blinds to conceal the true interpretations of their Mysteries.\n\nThe substitution of the brain for the heart was one of these blinds.\n\nThe three degrees of the ancient Mysteries were, with few exceptions, given in chambers which represented the three great centers of the human and Universal bodies.\n\nIf possible, the temple itself was constructed in the form of the human body.\n\nThe candidate entered between the feet and received the highest degree in the point corresponding to the brain.\n\nThus the first degree was the material mystery and its symbol was the generative system; it raised the candidate through the various degrees of concrete thought.\n\nThe second degree was given in the chamber corresponding to the heart, but represented the middle power which was the mental link.\n\nHere the candidate was initiated into the mysteries of abstract thought and lifted as high as the mind was capable of penetrating.\n\nHe then passed into the third chamber, which, analogous to the brain, occupied the highest position in the temple but, analogous to the heart, was of the greatest dignity.\n\nIn the brain chamber the heart mystery was given.\n\nHere the initiate for the first time truly comprehended the meaning of those immortal words: \"As a man thinketh in his heart, so is he.\" As there are seven hearts in the brain so there are seven brains in the heart, but this is a matter of superphysics of which little can be said at the present time.\n\nProclus writes on this subject in the first book of On the Theology of Plato : \"Indeed, Socrates in the (First) Alcibiades rightly observes, that the soul entering into herself will behold all other things, and deity itself.\n\nFor verging to her own union, and to the centre of all life, laying aside multitude, and the variety of the all manifold powers which she contains, she ascends to the highest watch-tower offerings."

