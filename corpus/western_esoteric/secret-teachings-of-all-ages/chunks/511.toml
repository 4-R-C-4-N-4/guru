body = "Pythagoras, crucified and his university burned; Hypatia, torn from her chariot and rended limb from limb; Jacques de Molay, whose memory survives the consuming flame; Savonarola, burned in the square of Florence; Galileo, forced to recant upon bended knee; Giordano Bruno, burned by the Inquisition; Roger Bacon, compelled to carry on his experiments in the secrecy of his cell and leave his knowledge hidden under cipher; Dante Alighieri, dying in exile from his beloved city; Francis Bacon, patient.\n\nunder the burden of persecution; Cagliostro, the most vilified man of modern times--all this illustrious line bear unending witness of man's inhumanity to man.\n\nThe world has ever been prone to heap plaudits upon its fools and calumny upon its thinkers.\n\nHere and there notable exceptions occur, as in the case of the Comte de St.-Germain, a philosopher who survived his inquisitors and through the sheer transcendency of his genius won a position of comparative immunity.\n\nBut even the illustrious Comte--whose illumined intellect merited the homage of the world--could not escape being branded an impostor, a charlatan, and an adventurer.\n\nFrom this long fist of immortal men and women who have represented the Ancient Wisdom before the world, three have been chosen as outstanding examples for more detailed consideration: the first the most eminent woman philosopher of all ages; the second the most maligned and persecuted man since the beginning of Christian Era; the third the most brilliant and the most successful modern exponent of this Ancient Wisdom.\n\nHYPATIA Sitting in the chair of philosophy previously occupied by her father, Theon the mathematician, the immortal Hypatia was for many years the central figure in the Alexandrian School of Neo-Platonism.\n\nFamed alike for the depth of her learning and the charm of her person, beloved by the citizens of Alexandria, and frequently consulted by the magistrates of that city, this noble woman stands out from the pages of history as the greatest of the pagan martyrs.\n\nA personal disciple of the magician Plutarch, and versed in the profundities of the Platonic School, Hypatia eclipsed in argument and public esteem every proponent of the Christian doctrines in Northern Egypt.\n\nWhile her writings perished at the time of the burning of the library of Alexandria by the Mohammedans, some hint of their nature may be gleaned from the statements of contemporaneous authors.\n\nHypatia evidently wrote a commentary on the Arithmetic of Diophantus, another on the Astronomical Canon of Ptolemy, and a third on the Conics of Apollonius of Perga.\n\nSynesius, Bishop of Ptolemais, her devoted friend, wrote to Hypatia for assistance in the construction of an astrolabe and a hydroscope.\n\nRecognizing the transcendency of her intellect, the learned of many nations flocked to the academy where she lectured.\n\nA number of writers have credited the teachings of Hypatia with being Christian in spirit; in fact she removed the veil of mystery in which the new cult had enshrouded itself, discoursing with such clarity upon its most involved principles that many newly converted to the Christian faith deserted it to become her disciples.\n\nHypatia not only proved conclusively the pagan origin of the Christian faith but also exposed the purported miracles then advanced by the Christians as tokens of divine preference by demonstrating the natural laws controlling the phenomena.\n\nTHE TABLE OF CEBES.\n\nFrom Vænius' Theatro Moral de la Vida Humana."

