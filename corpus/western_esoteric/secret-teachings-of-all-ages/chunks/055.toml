[content]
body = "The Bacchic state signifies the unity of the rational soul in a state of self-knowledge, and the Titanic state the diversity of the rational soul which, being scattered throughout creation, loses the consciousness of its own essential one-ness.\n\nThe mirror into which Bacchus gazes and which is the cause of his fall is the great sea of illusion--the lower world fashioned by the Titans.\n\nBacchus (the mundane rational soul), seeing his image before him, accepts the image as a likeness of himself and ensouls the likeness; that is, the rational idea ensouls its reflection--the irrational universe.\n\nBy ensouling the irrational image it implants in it the urge to become like its source, the rational image.\n\nTherefore the ancients said that man does not know the gods by logic or by reason but rather by realizing the presence of the gods within himself.\n\nAfter Bacchus gazed into the mirror and followed his own reflection into matter, the rational soul of the world was broken up and distributed by the Titans throughout the mundane sphere of which it is the essential nature, but the heart, or source, of it they could not: scatter.\n\nThe Titans took the dismembered body of Bacchus and boiled it in water--symbol of immersion in the material universe--which represents the incorporation of the Bacchic principle in form.\n\nThe pieces were afterwards roasted to signify the subsequent ascension of the spiritual nature out of form.\n\nWhen Jupiter, the father of Bacchus and the Demiurgus of the universe, saw that the Titans were hopelessly involving the rational or divine idea by scattering its members through the constituent parts of the lower world, he slew the Titans in order that the divine idea might not be entirely lost.\n\nFrom the ashes of the Titans he formed mankind, whose purpose of existence was to preserve and eventually to release the Bacchic idea, or rational soul, from the Titanic fabrication.\n\nJupiter, being the Demiurgus and fabricator of the material universe, is the third person of the Creative Triad, consequently the Lord of Death, for death exists only in the lower sphere of being over which he presides.\n\nDisintegration takes place so that reintegration may follow upon a higher level of form or intelligence.\n\nThe thunderbolts of Jupiter are emblematic of his disintegrative power; they reveal the purpose of death, which is to rescue the rational soul from the devouring power of the irrational nature.\n\nMan is a composite creature, his lower nature consisting of the fragments of the Titans and his higher nature the sacred, immortal flesh (life) of Bacchus.\n\nTherefore man is capable of either a Titanic (irrational) or a Bacchic (rational) existence.\n\nThe Titans of Hesiod, who were twelve in number, are probably analogous to the celestial zodiac, whereas the Titans who murdered and dismembered Bacchus represent the zodiacal powers distorted by their involvement in the material world.\n\nThus Bacchus represents the sun who is dismembered by the signs of the zodiac and from whose body the universe is formed.\n\nWhen the terrestrial forms were created from the various parts of his body the sense of wholeness was lost and the sense of separateness established.\n\nThe heart of Bacchus, which was saved by Pallas, or Minerva, was lifted out of the four elements symbolized by his dismembered body and placed in the ether.\n\nThe heart of Bacchus is the immortal center of the rational soul.\n\nAfter the rational soul had been distributed throughout creation and the nature of man, the Bacchic Mysteries were instituted for the purpose of disentangling it from the irrational Titanic nature.\n\nThis disentanglement was the process of lifting the soul out of the state of separateness into that of unity.\n\nThe various parts and members of Bacchus were collected from the different corners of the earth."

