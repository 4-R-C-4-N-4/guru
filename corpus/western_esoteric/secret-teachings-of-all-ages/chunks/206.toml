body = "Kenealy, in his notes on the Book of Enoch , observes: \"Why the caterpillar was a symbol of the Messiah is evident; because, under a lowly, creeping, and wholly terrestrial aspect, he conceals the beautiful butterfly-form, with its radiant wings, emulating in its varied colors the Rainbow, the Serpent, the Salmon, the Scarab, the Peacock, and the dying Dolphin * * *.\n\nINSECTS In 1609 Henry Khunrath's Amphitheatrum Sapientiæ Æternæ was published.\n\nÉliphas Lévi declared that within its pages are concealed all the great secrets of magical philosophy.\n\nA remarkable plate in this work shows the Hermetic sciences being attacked by the bigoted and ignorant pedagogues of the seventeenth century.\n\nIn order to express his complete contempt for his slanderers, Khunrath made out of each a composite beast, adding donkey ears to one and a false tail to another.\n\nHe reserved the upper part of the picture for certain petty backbiters whom he gave appropriate forms.\n\nThe air was filled with strange creatures--great dragon flies, winged frogs, birds with human heads, and other weird forms which defy description--heaping venom, gossip, spite, slander, and other forms of persecution upon the secret arcanum of the wise.\n\nThe drawing indicated that their attacks were ineffectual.\n\nPoisonous insects were often used to symbolize the deadly power of the human tongue.\n\nInsects of all kinds were also considered emblematic of the Nature spirits and dæmons, for both were believed to inhabit the atmosphere.\n\nMediæval drawings showing magicians in the act of invoking spirits, often portray the mysterious powers of the other world, which the conjurer has exorcised, as appearing to him in composite part-insect forms.\n\nThe early philosophers apparently held the opinion that the disease which swept through communities in the form of plagues were actually living creatures, but instead of considering a number of tiny germs they viewed the entire plague as one individuality and gave it a hideous shape to symbolize its destructiveness.\n\nThe fact that plagues came in the air caused an insect or a bird to be used as their symbol.\n\nBeautiful symmetrical forms were assigned to all natural benevolent conditions or powers, but to unnatural or malevolent powers were assigned contorted and abnormal figures.\n\nThe Evil One was either hideously deformed or else of the nature of certain despised animals.\n\nA popular superstition during the Middle Ages held that the Devil had the feet of a rooster, while the Egyptians assigned to Typhon (Devil) the body of a hog.\n\nThe habits of the insects were carefully studied.\n\nTherefore the ant was looked upon as emblematic of industry and foresight, as it stored up supplies for the winter and also had strength to move objects many times its own weight.\n\nThe locusts which swept down in clouds, and in some parts of Africa and Asia obscured the sun and destroyed every green thing, were considered fit emblems of passion, disease, hate, and strife; for these emotions destroy all that is good in the soul of man and leave a barren desert behind them.\n\nIn the folklore of various nations, certain insects are given special significance, but the ones which have received world-wide veneration and consideration ate the scarab, the king of the insect kingdom; the scorpion, the great betrayer; the butterfly, the emblem of metamorphosis; and the bee, the symbol of industry.\n\nThe Egyptian scarab is one of the most remarkable symbolic figures ever conceived by the mind of man.\n\nIt was evolved by the erudition of the priestcraft from a simple insect which, because of its peculiar habits and appearance, properly symbolized the strength of the body, the resurrection of the soul, and the Eternal and Incomprehensible Creator in His aspect as Lord of the Sun."

