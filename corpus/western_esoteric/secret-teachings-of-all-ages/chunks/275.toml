body = "In the eleventh century this order, by capturing the fortress of Mount Alamont, established itself at Irak.\n\nHassan Sabbah, the founder of the order, known as the \"Old Man of the Mountain, \" is suspected of having controlled his followers by the use of narcotics.\n\nHassan made his followers believe that they were in Paradise, where they would be forever if they implicitly obeyed him while they were alive.\n\nDe Quincey, in his Confessions of an Opium Eater , describes the peculiar psychological effects produced by this product of the poppy, and the use of a similar drug may have given rise to the idea of Paradise which filled the minds of the Yezidees.\n\nThe philosophers of all ages have taught that the visible universe was but a fractional part of the whole, and that by analogy the physical body of man is in reality the least important part of his composite constitution.\n\nMost of the medical systems of today almost entirely ignore the superphysical man.\n\nThey pay but scant attention to causes, and concentrate their efforts on ameliorating effects.\n\nParacelsus, noting the same proclivity on the part of physicians during his day, aptly remarked: \"There is a great difference between the power that removes the invisible causes of disease, and which is Magic, and that which causes merely external effects [to] disappear, and which is Physic, Sorcery, and Quackery.\" (Translated by Franz Hartmann.) Disease is unnatural, and is evidence that there is a maladjustment within or between organs or tissues.\n\nPermanent health cannot be regained until harmony is restored.\n\nThe outstanding virtue of Hermetic medicine was its recognition of spiritual and psychophysical derangements as being largely responsible for the condition which is called physical disease.\n\nSuggestive therapy was used with marked success by the priest-physicians of the ancient world.\n\nAmong the-American Indians, the Shamans --or \"Medicine Men\"--dispelled sickness with the aid of mysterious dances, invocations, and charms.\n\nThe fact that in spite of their ignorance of modern methods of medical treatment these sorcerers effected innumerable cures, is well worthy of consideration.\n\nCHEMICAL SYLLABLES.\n\nFrom De Monte-Snyders' Metamorphosis Planetarum.\n\nDe Monte-Snyders declares that each of the above characters forms one syllables of a word having seven syllables, the word itself representing the materia prima, or first substance of the universe.\n\nAs all substance is composed of seven powers combined according to certain cosmic laws, a great mystery is concealed within the sevenfold constitution of man, and the universe.\n\nOf the above seven characters, De Monte-Snyder writes: Whoever wants to know the true name and character of the materia prima shall know that out of the combination of the above figures syllables are produced, and out of these the verbum significativum.\" *** The magic rituals used by the Egyptian priests for the curing of disease were based upon a highly developed comprehension of the complex workings of the human mind and its reactions upon the physical constitution.\n\nThe Egyptian and Brahmin worlds undoubtedly understood the fundamental principle of vibrotherapeutics.\n\nBy means of chants and mantras, which emphasized certain vowel and consonant sounds, they set up vibratory reactions which dispelled congestions and assisted Nature in reconstructing broken members and depleted organisms.\n\nThey also applied their knowledge of the laws governing vibration to the spiritual constitution of man; by their intonings, they stimulated latent centers of consciousness and thereby vastly increased the sensitiveness of the subjective nature.\n\nIn the Book of Coming Forth by Day , many of the Egyptian secrets have been preserved to this generation.\n\nWhile this ancient scroll has been well translated, only a few understand the secret: significance of its magical passages.\n\nOriental races have a keen realization of the dynamics of sound."

