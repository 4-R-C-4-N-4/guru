body = "Above the bird is written: \"This is the sun in the form of a bird,\" and above the dragon \"This is the dragon devouring the bird.\n\nThe first operation.\" The panel of text at the lower left reads in substance: \"When our sperm (quicksilver) is mixed with the mother of elements (earth), the action is called coitus .\n\nThe detention by the earth of a bit of quicksilver is called conception .\n\nThe earth grows and multiplies and the operation is called impregnation .\n\nWhen earth is whitened with water and made of uniform color and appearance, it is called birth and the King is born out of fire.\" The text at lower right was deliberately mutilated to conceal a too evident secret.\n\nLeaf 6 .\n\nThis plate shows all the secrets of the great Stone.\n\nIn the center stands the Paschal Virgin, in her hair the prime virtue which is described as an herb flourishing in wells.\n\nThe hands hold the symbols of the spiritual and material elements.\n\nThe statement at the upper left is to the effect that there are four spirits with two faces, which are called the elements.\n\nAt the upper right it is written that fire lives on air, air on water, water on earth, and thus the Stone lives Peacefully on all the pure elements.\n\nUnder the sun appears the word Summer ; under the moon, Autumn .\n\nAbout the tree on the left with its attendant eyes are the words: \"Turn away your eyes to [from?] the fire.\n\nThere is space [?].\" About the tree to the right.\n\n\"Open your eyes to the fire.\n\nThere is time.\" The lower panel opens with this sentence \"I am exalted above the circles of world.\" Leaf 7 .\n\nThe verse at the top reads:,\" This Stone is so noble and worthy that Nature has hidden it in her recesses.\n\nIts soul is all fair, and pure, for it is the true sun.\n\nI inform you of this.\n\nKeep it removed, apart and separated.\n\nWhatever boon you crave, it will come to you bounteously.\n\nwithout sin, with pleasure and delight.\" The seated figure on the left holding aloft the hammer is described as breaking hard stone, while the words beside the man with the retort read: \"Breaking of stone our replenishment.\" Between the standing figures below is the exclamation; \"O Sages, seek and ye shall find my Stone!\" Under the outstretched hand of the man with a basket appear the words: \"Draw out sorerem [?] in the bottom.\" Below the pool which the man on the left is stirring appears the simple statement: \"Our healing water.\" The faces of the four men are extremely well drawn.\n\nLeaf 8 .\n\nUnder the sun, moon, and Mercury are the words Three and One , an inference that the three are one.\n\nThe words under the flower stems read: \"Whiteness forty days after ashes.\" Under the blossoms is written: (left) \"Minor time of the Stone\"; (right) \"The selected red.\" Between the arms of the central figure appears: \"Let one pound of Mercury be placed.\" To the left is written: \"If you who read shall have known this figure, you will possess the whole science of the Stone\"; to the right: \"And if you do not acknowledge it, you will be stiff-necked and dull.\" Above the sun is the word Father ; above the satyr, \"Ferment of the work.\" Beside the child is the sentence: \"The son of the moon would threw the Stone into the fire--his mother.\" Above the flaming basket is written: \"I am the true Stone.\" Under the central figure are the words: \"A moderate fire is the master of the work.\" Leaf 9 .\n\nIn the upper left it is written that without the light of the Moon the Sun does not heat the earth and that into the Moon the Sun emits its fruits."

