body = "Among the manuscripts of Dr.\n\nSigismund Bastrom, the initiated Rosicrucian, appears the following extract from von Welling concerning the true philosophic nature of the Masonic CHiram: \"The original word חירם, CHiram, is a radical word consisting of three consonants חרand םi.\n\ne.\n\nCheth , Resh and Mem .\n\n(1) ח, Cheth , signifies Chamah , the Sun's light, i.\n\ne.\n\nthe Universal , invisible , cold fire of Nature attracted by the Sun, manifested into light and sent down to us and to every planetary body belonging to the solar system.\n\n(2) ר, Resh , signifies ריח Ruach , i.\n\ne.\n\nSpirit , air , wind , as being the Vehicle which conveys and collects the light into numberless Foci, wherein the solar rays of light are agitated by a circular motion and manifested in Heat and burning Fire .\n\n(3) ם, or מ Mem , signifies majim , water , humidity , but rather the mother of water , i.\n\ne.\n\nRadical Humidity or a particular kind of condensed air.\n\nThese three constitute the Universal Agent or fire of Nature in one word, חירם, CHiram , not Hiram.\" Albert Pike mentions several forms of the name CHiram : Khirm , Khurm , and Khur-Om , the latter ending in the sacred Hindu monosyllable OM , which may also be extracted from the names of the three murderers.\n\nPike further relates the three ruffians to a triad of stars in the constellation of Libra and also calls attention to the fact that the Chaldean god Bal--metamorphosed into a demon by the Jews--appears in the name of each of the murderers, Ju bel a, Ju bel o, and Ju bel um.\n\nTo interpret the Hiramic legend requires familiarity with both the Pythagorean and Qabbalistic systems of numbers and letters, and also the philosophic and astronomic cycles of the Egyptians, Chaldeans, and Brahmins.\n\nFor example, consider the number 33.\n\nThe first temple of Solomon stood for thirty-three years in its pristine splendor.\n\nAt the end of that time it was pillaged by the Egyptian King Shishak, and finally (588 B.C.) it was completely destroyed by Nebuchadnezzar and the people of Jerusalem were led into captivity to Babylon.\n\n(See General History of Freemasonry , by Robert Macoy.) Also King David ruled for thirty-three years in Jerusalem; the Masonic Order is divided into thirty-three symbolic degrees; there are thirty-three segments in the human spinal column; and Jesus was crucified in the thirty-third year of His life.\n\nThe efforts made to discover the origin of the Hiramic legend show that, while the legend in its present form is comparatively modem, its underlying principles run back to remotest antiquity.\n\nIt is generally admitted by modem Masonic scholars that the story of the martyred CHiram is based upon the Egyptian rites of Osiris, whose death and resurrection figuratively portrayed the spiritual death of man and his regeneration through initiation into the Mysteries.\n\nCHiram is also identified with Hermes through the inscription on the Emerald Table.\n\nFrom these associations it is evident that CHiram is to be considered as a prototype of humanity; in fact he is Plato's Idea (archetype) of man.\n\nAs Adam after the Fall symbolizes the Idea of human degeneration, so CHiram through his resurrection symbolizes the Idea of human regeneration.\n\nOn the 19th day of March, 1314, Jacques de Molay, the last Grand Master of the Knights Templars, was burned on a pyre erected upon that point of the islet of the Seine, at Paris, where afterwards was erected the statue of King Henry IV."

