body = "Their charts and diagrams are concerned with weighty cosmic principles which they treat with a philosophic understanding decidedly refreshing when compared with the orthodox narrowness prevalent in their day.\n\nAccording to the available records, the Rosicrucians were bound together by mutual aspirations rather than by the laws of a fraternity.\n\nThe \"Brothers of the Rose Cross\" are believed to have lived unobtrusively, laboring industriously in trades and professions, disclosing their secret affiliation to no one--in many cases not even to their own families.\n\nAfter the death of C.R.C., most of the Brethren apparently had no central meeting place.\n\nWhatever initiatory ritual the Order possessed was so closely guarded that it has never been revealed.\n\nDoubtless it was couched in chemical terminology.\n\nTHE CRUCIFIED ROSE.\n\nThe original symbol of the Rosicrucian Fraternity was a hieroglyphic rose crucified upon a cross.\n\nThe cross was often raised upon a three-stepped Calvary.\n\nOccasionally the symbol of a cross rising from a rose was used in connection with their activities.\n\nThe Rosicrucian rose was drawn upon the Round Table of King Arthur, and is the central motif for the links forming the chain from which the \"Great George\" is suspended among the jewels of The Order of the Garter.\n\nHargrave Jennings suspects this Order of having some connection with the Rosicrucians.\n\n*** Efforts to join the Order were apparently futile, for the Rosicrucians always chose their disciples.\n\nHaving agreed on one who they believed would do honor to their illustrious fraternity, they communicated with him in one of many mysterious ways.\n\nHe might receive a letter, either anonymous or with a peculiar seal, usually bearing the letters \"C.R.C.\n\n\"or \"R.C.\n\n\"upon it.\n\nHe would be instructed to go to a certain place at an appointed time.\n\nWhat was disclosed to him he never revealed, although in many cases his later writings showed that a new influence had come into his life, deepening his understanding and broadening his intellect.\n\nA few have written allegorically concerning what they beheld when in the august presence of the \"Brethren of the Rose Cross.\" Alchemists were sometimes visited in their laboratories by mysterious strangers, who delivered learned discourses concerning the secret processes of the Hermetic arts and, after disclosing certain processes, departed, leaving no trace.\n\nOthers declared that the \"Brothers of the Rose Cross\" communicated with them through dreams and visions, revealing the secrets of Hermetic wisdom to them while they were asleep.\n\nHaving been instructed, the candidate was bound to secrecy not only concerning the chemical formulæ which had been disclosed to him but also concerning the method by which he had secured them.\n\nWhile these nameless adepts were suspected of being ''Brothers of the Rose Cross,\" it could never be proved who they were, and those visited could only conjecture.\n\nMany suspect the Rosicrucian rose to be a conventionalization of the Egyptian and Hindu lotus blossom, with the same symbolic meaning as this more ancient symbol.\n\nThe Divine Comedy stamps Dante Alighieri as being familiar with the theory of Rosicrucianism.\n\nConcerning this point, Albert Pike in his Morals and Dogma makes this significant statement: \"His Hell is but a negative Purgatory.\n\nHis heaven is composed of a series of Kabalistic circles, divided by a cross, like the Pantacle of Ezekiel.\n\nIn the center of this cross blooms a rose, and we see the symbol of the Adepts of the Rose-Croix for the first time publicly expounded and almost categorically explained.\" Doubt has always existed as to whether the name Rosicrucian came from the symbol of the rose and cross, or whether this was merely a blind to deceive the uninformed and further conceal the true meaning of the Order."

