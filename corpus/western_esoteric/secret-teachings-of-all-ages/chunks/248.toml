body = "It is identical with Baphomet the mystic pantheos of those disciples of ceremonial magic, the Templars, who probably obtained it from the Arabians.\n\n*** A well-known magician of the Middle Ages was Dr.\n\nJohannes Faustus, more commonly known as Dr.\n\nFaust.\n\nBy a study of magical writings he was enabled to bind to his service an elemental who served him for many years in various capacities.\n\nStrange legends are told concerning the magical powers possessed by Dr.\n\nFaust.\n\nUpon one occasion the philosopher, being apparently in a playful mood, threw his mantle over a number of eggs in a market-woman's basket, causing them to hatch instantly.\n\nAt another time, having fallen overboard from a small boat, he was picked up and returned to the craft with his clothes still dry.\n\nBut, like nearly all other magicians, Dr.\n\nFaust came at length to disaster; he was found one morning with a knife in his back, and it was commonly believed that his familiar spirit had murdered him.\n\nAlthough Goethe's Dr.\n\nFaust is generally regarded as merely a fictional character, this old magician actually lived during the sixteenth century.\n\nDr.\n\nFaust wrote a book describing his experiences with spirits, a section of which is reprinted below.\n\n(Dr.\n\nFaust must not be confused with Johann Fust, the printer.) EXTRACT FROM THE BOOK OF DR.\n\nFAUST, WITTENBERG, 1524 (An abridged translation from the original German of a book ordered destroyed.) \"From my youth I followed art and science and was tireless in my reading of books.\n\nAmong those which came to my hand was a volume containing all kinds of invocations and magical formulæ.\n\nIn this book I discovered information to the effect that a spirit, whether he be of the fire, the water, the earth or the air, can be compelled to do the will of a magician capable of controlling him.\n\nI also discovered that according as one spirit has more power than another, each is adapted for a different operation and each is capable of producing certain supernatural effects.\n\n\"After reading this wonderful book, I made several experiments, desiring to rest the accuracy of the statements made therein.\n\nAt first I had little faith that what was promised would take place.\n\nBut at the very first invocation which I attempted a mighty spirit manifested to me, desiring to know why I had invoked him.\n\nHis coming so amazed me that I scarcely knew what to say, but finally asked him if he would serve me in my magical investigations.\n\nHe replied that if certain conditions were agreed upon he would.\n\nThe conditions were that I should make a pact with him.\n\nThis I did not desire to do, but as in my ignorance I had not protected myself with a circle and was actually at the mercy of the spirit, I did not dare to refuse his request and resigned myself to the inevitable, considering it wisest to turn my mantle according to the wind.\n\n\"I then told him that if he would be serviceable to me according to my desires and needs for a certain length of time, I would sign myself over to him.\n\nAfter the pact had been arranged, this mighty spirit, whose name was Asteroth , introduced me to another spirit by the name of Marbuel , who was appointed to be my servant.\n\nI questioned Marbuel as to his suitability for my needs.\n\nI asked him how quick he was, and he answered, 'As swift as the winds.' This did not satisfy me, so I replied, 'You cannot become my servant.\n\nGo again whence you have come.' Soon another spirit manifested itself, whose name was Aniguel .\n\nUpon asking him the same question he answered that he was swift as a bird in the air.\n\nI said, 'You are still too slow for me.\n\nGo whence you came.' In the same moment another spirit by the name of Aciel manifested himself."

