[content]
body = "The answer is simple enough: The Mysteries were secret societies, binding their initiates to inviolable secrecy, and avenging with death the betrayal of their sacred trusts.\n\nAlthough these schools were the true inspiration of the various doctrines promulgated by the ancient philosophers, the fountainhead of those doctrines was never revealed to the profane.\n\nFurthermore, in the lapse of time the teachings became so inextricably linked with the names of their disseminators that the actual but recondite source--the Mysteries--came to be wholly ignored.\n\nSymbolism is the language of the Mysteries; in fact it is the language not only of mysticism and philosophy but of all Nature, for every law and power active in universal procedure is manifested to the limited sense perceptions of man through the medium of symbol.\n\nEvery form existing in the diversified sphere of being is symbolic of the divine activity by which it is produced.\n\nBy symbols men have ever sought to communicate to each other those thoughts which transcend the limitations of language.\n\nRejecting man-conceived dialects as inadequate and unworthy to perpetuate divine ideas, the Mysteries thus chose symbolism as a far more ingenious and ideal method of preserving their transcendental knowledge.\n\nIn a single figure a symbol may both reveal and conceal, for to the wise the subject of the symbol is obvious, while to the ignorant the figure remains inscrutable.\n\nHence, he who seeks to unveil the secret doctrine of antiquity must search for that doctrine not upon the open pages of books which might fall into the hands of the unworthy but in the place where it was originally concealed.\n\nTHE ORPHIC EGG.\n\nFrom Bryant's An Analysis of Ancient Mythology.\n\nThe ancient symbol of the Orphic Mysteries was the serpent-entwined egg, which signified Cosmos as encircled by the fiery Creative Spirit.\n\nThe egg also represents the soul of the philosopher; the serpent, the Mysteries.\n\nAt the time of initiation the shell is broke.\n\nand man emerges from the embryonic state of physical existence wherein he had remained through the fetal period of philosophic regeneration.\n\n*** Far-sighted were the initiates of antiquity.\n\nThey realized that nations come and go, that empires rise and fall, and that the golden ages of art, science, and idealism are succeeded by the dark ages of superstition.\n\nWith the needs of posterity foremost in mind, the sages of old went to inconceivable extremes to make certain that their knowledge should be preserved.\n\nThey engraved it upon the face of mountains and concealed it within the measurements of colossal images, each of which was a geometric marvel.\n\nTheir knowledge of chemistry and mathematics they hid within mythologies which the ignorant would perpetuate, or in the spans and arches of their temples which time has not entirely obliterated.\n\nThey wrote in characters that neither the vandalism of men nor the ruthlessness of the elements could completely efface, Today men gaze with awe and reverence upon the mighty Memnons standing alone on the sands of Egypt, or upon the strange terraced pyramids of Palanque.\n\nMute testimonies these are of the lost arts and sciences of antiquity; and concealed this wisdom must remain until this race has learned to read the universal language--SYMBOLISM.\n\nThe book to which this is the introduction is dedicated to the proposition that concealed within the emblematic figures, allegories, and rituals of the ancients is a secret doctrine concerning the inner mysteries of life, which doctrine has been preserved in toto among a small band of initiated minds since the beginning of the world.\n\nDeparting, these illumined philosophers left their formulæ that others, too, might attain to understanding."

