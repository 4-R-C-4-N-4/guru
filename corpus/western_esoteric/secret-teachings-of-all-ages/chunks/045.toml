[content]
body = "Briefly stated, the sacred drama which formed the basis of the Odinic Mysteries was as follows: The Supreme, invisible Creator of all things was called All-Father.\n\nHis regent in Nature was Odin, the one-eyed god.\n\nLike Quetzalcoatl, Odin was elevated to the dignity of the Supreme Deity.\n\nAccording to the Drottars, the universe was fashioned from the body of Ymir , the hoarfrost giant.\n\nYmir was formed from the clouds of mist that rose from Ginnungagap, the great cleft in chaos into which the primordial frost giants and flame giants had hurled snow and fire.\n\nThe three gods--Odin, Vili, and Ve--slew Ymir and from him formed the world.\n\nFrom Ymir's various members the different parts of Nature were fashioned.\n\nAfter Odin had established order, he caused a wonderful palace, called Asgard, to be built on the top of a mountain, and here the twelve Æsir (gods) dwelt together, far above the limitations of mortal men.\n\nOn this mountain also was Valhalla, the palace of the slain, where those who had heroically died fought and feasted day after day.\n\nEach night their wounds were healed and the boar whose flesh they ate renewed itself as rapidly as it was consumed.\n\nTHE NINE WORLDS OF THE ODINIC MYSTERIES.\n\nThe Nordic Mysteries were given in nine chambers, or caverns, the candidate advancing through them in sequential order.\n\nThese chambers of initiation represented the nine spheres into which the Drottars divided the universe: (1) Asgard, the Heaven World of the Gods; (2) Alf-heim, the World of the light and beautiful Elves, or Spirits; (3) Nifl-heim, the World of Cold and Darkness, which is located in the North; (4) Jotun-heim, the World of the Giants, which is located in the East; (5) Midgard, the Earth World of human beings, which is located in the midst, or middle place; (6) Vana-heim, the World of the Vanes, which is located in the West; (7) Muspells-heim, the World of Fire, which is located in the South; 8) Svart-alfa-heim, the World of the dark and treacherous Elves, which is under the earth; and (9) Hel-heim, the World of cold and the abode of the dead, which is located at the very lowest point of the universe.\n\nIt is to be understood that all of these worlds are invisible to the senses, except Midgard, the home of human creatures, but during the process of initiation the soul of the candidate--liberated from its earthly sheath by the secret power of the priests--wanders amidst the inhabitants of these various spheres.\n\nThere is undoubtedly a relationship between the nine worlds of the Scandinavians and the nine spheres, or planes, through which initiates of the Eleusinian Mysteries passed in their ritual of regeneration.\n\n*** Balder the Beautiful--the Scandinavian Christ--was the beloved son of Odin.\n\nBalder was not warlike; his kindly and beautiful spirit brought peace and joy to the hearts of the gods, and they all loved him save one.\n\nAs Jesus had a Judas among His twelve disciples, so one of the twelve gods was false--Loki, the personification of evil.\n\nLoki caused Höthr, the blind god of fate, to shoot Balder with a mistletoe arrow.\n\nWith the death of Balder, light and joy vanished from the lives of the other deities.\n\nHeartbroken, the gods gathered to find a method whereby they could resurrect this spirit of eternal life and youth.\n\nThe result was the establishment of the Mysteries."

