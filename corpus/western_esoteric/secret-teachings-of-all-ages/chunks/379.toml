body = "Ulma, the viceroy and all the principal nobility attending.\" NICHOLAS FLAMMEL TITLE PAGE OF ALCHEMICAL TRACT ATTRIBUTED TO JOHN CREMER.\n\nFrom Musæum Hermeticum Reformatum et Amplificatum.\n\nJohn Cremer, the mythical Abbot of Westminster, is an interesting personality in the alchemical imbroglio of the fourteenth century.\n\nAs it is not reasonably certain that m abbot by such a name ever occupied the See of Westminster, the question naturally arises, \"Who was the person concealing his identity under the Pseudonym of John Cremer?\" Fictitious characters such as John Cremer illustrate two important practices of mediæval alchemists: (1) many persons of high political or religious rank were secretly engaged in Hermetic chemical research but, fearing persecution and ridicule, published their findings under various pseudonyms; (2) for thousands of years it was the practice of those initiates who possessed the true key to the great Hermetic arcanum to perpetuate their wisdom by creating imaginary persons, involving them in episodes of contemporaneous history and thus establishing these beings as prominent members of society--in some cases even fabricating complete genealogies to attain that end.\n\nThe names by which these fictitious characters were known revealed nothing to the uniformed.\n\nTo the initiated, however, they signified that the personality to which they were assigned had no existence other than a symbolic one.\n\nThese initiated chroniclers carefully concealed their arcanum in the lives, thoughts, words.\n\nand acts ascribed to these imaginary persons and thus safely transmitted through the ages the deepest secrets of occultism as writings which to the unconversant were nothing more than biographies.\n\n*** In the latter part of the fourteenth century there lived in Paris one whose business was that of illuminating manuscripts and preparing deeds and documents.\n\nTo Nicholas Flammel the world is indebted for its knowledge of a most remarkable volume, which he bought for a paltry sum from some bookdealer with whom his profession of scrivener brought him in contact.\n\nThe story of this curious document, called the Book of Abraham the Jew, is best narrated in his own words as preserved in his Hieroglyphical Figures : \"Whilst therefore, I Nicholas Flammel, Notary, after the decease of my parents, got my living at our art of writing, by making inventories, dressing accounts, and summing up the expenses of tutors and pupils, there fell into my hands for the sum of two florins, a guilded book, very old and large.\n\nIt was not of paper, nor of parchment, as other books be, but was only made of delicate rinds (as it seemed to me) of tender young trees.\n\nThe cover of it was of brass, well bound, all engraven with letters, or strange figures; and for my part I think they might well be Greek characters, or some such like ancient language.\n\nSure I am.\n\nI could not read them, and I know well they were not notes nor letters of the Latin nor of the Gaul, for of them we understand a little.\n\n\"As for that which was within it, the leaves of bark or rind, were engraven and with admirable diligence written, with a point of iron, in fair and neat Latin letters colored.\n\nIt contained thrice seven leaves, for so were they counted in the top of the leaves, and always every seventh leaf there was painted a virgin and serpent swallowing her up.\n\nIn the second seventh, a cross where a serpent was crucified; and the last seventh, there were painted deserts, or wildernesse, in the midst whereof ran many fair fountains, from whence there issued out a number of serpents, which ran up and down here and there."

