body = "Occasionally Jesod is considered as the male and Malchuth as the female generative power.\n\nThe Grand Man thus conceived is the gigantic image of Nebuchadnezzar's dream, with head of gold, arms and chest of silver, body of brass, legs of iron, and feet of clay.\n\nThe medieval Qabbalists also assigned one of the Ten Commandments and a tenth part of the Lord's Prayer in sequential order to each of the ten Sephiroth.\n\nConcerning the emanations from Kether which establish themselves as three triads of Creative Powers--termed in the Sepher ha Zohar three heads each with three faces--H.\n\nP.\n\nBlavatsky writes: \"This [Kether] was the first Sephiroth, containing in herself the other nine ספּירותSephiroth, or intelligences.\n\nIn their totality and unity they represent the archetypal man, Adam Kadmon , the πρωτόγονος, who in his individuality or unity is yet dual, or bisexual, the Greek Didumos , for he is the prototype of all humanity.\n\nThus we obtain three trinities, each contained in a 'head.' In the first head, or face (the three-faced Hindu Trimurti), we find Sephira [Kether], the first androgyne, at the apex of the upper triangle, emitting Hachama [Chochmah], or Wisdom, a masculine and active potency--also called Jah, יה--and Binah , בינה, or Intelligence, a female and passive potency, also represented by the name Jehovah יהוה.\n\nThese three form the first trinity or 'face' of the Sephiroth.\n\nThis triad emanated Hesed , הסד, or Mercy, a masculine active potency, also called El , from which emanated Geburah גבורה, or justice, also called Eloha, a feminine passive potency; from the union of these two was produced Tiphereth טפּארת, Beauty, Clemency, the Spiritual Sun, known by the divine name Elohim ; and the second triad, 'face,' or 'head,' was formed.\n\nThese emanating, in their turn, the masculine potency Netzah , נצה, Firmness, or Jehovah Sabaoth, who issued the feminine passive potency Hod,הוד, Splendor, or Elohim Sabaoth; the two produced Jesod , יסוד, Foundation, who is the mighty living one El-Chai , thus yielding the third trinity or 'head.' The tenth Sephiroth is rather a duad, and is represented on the diagrams as the lowest circle.\n\nIt is Malchuth or Kingdom, מלכות, and Shekinah , שכינה, also called Adonai, and Cherubim among the angelic hosts.\n\nThe first 'Head' is called the Intellectual world; the second 'Head' is the Sensuous, or the world of Perception, and the third is the material or Physical world.\" (See Isis Unveiled .) Among the later Qabbalists there is also a division of the Sephirothic Tree into five parts, in which the distribution of the globes is according to the following order: (1) Macroprosophus , or the Great Face , is the term applied to Kether as the first and most exalted of the Sephiroth and includes the nine potencies or Sephiroth issuing from Kether."

