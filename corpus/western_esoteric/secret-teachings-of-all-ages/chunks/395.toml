body = "Occasionally, however, an adept, on finding a sincere and earnest seeker, would instruct him in the fundamental principles of the art, and if the disciple persisted, he was quietly initiated into the august fraternity of the Brethren.\n\nIn such manner the alchemical processes were preserved, but the number of those who knew them did not increase rapidly.\n\nDuring the sixteenth, seventeenth, and eighteenth centuries a considerable number of alchemical adepts made their way from place to place throughout Europe, appearing and disappearing apparently at will.\n\nAccording to popular tradition, these adepts were immortal, and kept themselves alive by means of the mysterious medicine that was one of the goals of alchemical aspiration.\n\nIt is asserted that some lived hundreds of years, taking no food except this elixir, a few drops of which would preserve their youth for a long period of time.\n\nThat such mysterious men did exist there can be little doubt, as their presence is attested by scores of reliable witnesses.\n\nIt is further asserted that they are still to be found by those who have qualified themselves to contact them.\n\nThe philosophers taught that like attracts like, and that when the disciple has developed a virtue and integrity acceptable to the adepts they will appear to him and reveal those parts of the secret processes which cannot be discovered without such help.\n\n\"Wisdom is as a flower from which the bee its honey makes and the spider poison, each according to its own nature.\" (By an unknown adept.) The reader must bear in mind at all times that the formulæ and emblems of alchemy are to be taken primarily as allegorical symbols; for until their esoteric significance has been comprehended, their literal interpretation is valueless.\n\nNearly every alchemical formula has one element purposely omitted, it being decided by the medieval philosophers that those who could not with their own intelligence discover that missing substance or process were not qualified to be entrusted with secrets which could give them control over great masses of humanity and likewise subject to their will the elemental forces of Nature.\n\nTHE EMERALD TABLE OF HERMES The oldest and most revered of all the alchemical formulæ is the sacred Emerald Tablet of Hermes.\n\nAuthorities do not agree as to the genuineness of this Table, some declaring it to be a post-Christian fraud, but there is much evidence that, regardless of its author, the Table is of great antiquity.\n\nWhile the symbol of the Emerald Table is of special Masonic import--relating as it does to the personality of CHiram (Hiram)--it is first and fundamentally an alchemical formula, relating both to the alchemy of the base metals and the divine alchemy of human regeneration.\n\nIn Dr.\n\nSigismund Bacstrom's collection of alchemical manuscripts is a section devoted to the translations and interpretations of this remarkable Tablet, which was known to the ancients as the Tabula Smaragdina .\n\nDr.\n\nBacstrom was initiated into the Brotherhood of the Rose Cross on the island of Mauritius by one of those unknown adepts who at that time called himself Comte de Chazal .\n\nDr.\n\nBacstrom's translations and notes on the Emerald Tablet are, in part, as follows, the actual text being reproduced in capital letters: \" The Emerald Table, the Most Ancient Monument of the Chaldeans concerning the Lapis Philosophorum (the stone of the philosophers).\n\n\"The Emerald Table furnishes the origin of the allegorical history of King Hiram (rather Chiram ).\n\nThe Chaldeans, Egyptians, and Hebrews in what concerns Chiram have taken their knowledge from one and the same fountain; Homerus , who relates this history in a different manner, followed that original, and Virgil followed Homerus , as Hesiodus took the subject for his Theogony likewise from thence, which Ovidius took afterwards for a pattern for his Metamorphosis."

