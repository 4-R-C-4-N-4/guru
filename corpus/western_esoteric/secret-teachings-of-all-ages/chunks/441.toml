body = "Hence, the first circle deals with divine principles, the second circle with mundane affairs, and the third circle with man.\n\nOn the at the top of the picture sits Themis, the presiding spirit of law, and at her feet three other queens--Juno, Minerva, and Venus--their robes ornamented with geometric figures.\n\nThe axis of law connects the throne, of divine justice above with the throne of human judgment at the bottom of the picture.\n\nUpon the latter throne is seated a queen with a scepter in her hand, before whom stands the winged goddess Nemesis--the angel of judgment.\n\nThe second Circle is divided into three parts by two sets of two horizontal lines.\n\nThe upper and light section is called the Supreme Region and is the abode of the gods, the good spirits, and the heroes.\n\nThe lower and dark section is the abode of lust, sin, and ignorance.\n\nBetween these two extremes is the larger section in which are blended the powers and impulses of both the superior and the inferior regions.\n\nIn the third or inner circle is man, a tenfold creature, consisting of nine parts--three of spirit, three of intellect, and three of soul--enclosed within one constitution.\n\nAccording to Selenus, man's three spiritual qualities are thought, speech, and action; his three intellectual qualities are memory, intelligence, and will; and his three qualities of soul are understanding, courage, and desire.\n\nThe third circle is further divided into three parts called ages: the Golden Age of spiritual truth in the upper right section, the Iron Age of spiritual darkness in the lower right section and the Bronze Age--a composite of the two occupying the entire left half of the inner circle and itself divided into three parts.\n\nThe lowest division of the Bronze Age depicts ignorant man controlled by force, the central the partly awakened man controlled by jurisprudence, and the upper the spiritually illuminated man controlled by love.\n\nBoth the second and third circles revolve upon the axis of law, but the divine source, of law--Heavenly Justice--is concealed by clouds.\n\nAll of the symbols and figures ornamenting the plate are devoted to a detailed amplification of the principles here outlined.\n\n*** The word yes is found by eliminating the second and fourth numbers.\n\nBy adding 23, 5, and 18 together the sum 46 results.\n\nTherefore 46 is the numerical equivalent of the word yes .\n\nAccording to the simple numerical cipher, the sum 138 is equal to the words Note carefully .\n\nTherefore in a book using this method, line 138, page 138, or paragraph 138 may contain the concealed message.\n\nIn addition to this simple numerical cipher there are scores of others so complicated that no one without the key can hope to solve them.\n\nAuthors sometimes based their cryptograms upon the numerical value of their own names; for example, Sir Francis Bacon repeatedly used the cryptic number 33--the numerical equivalent of his name.\n\nNumerical ciphers often involve the pagination of a book.\n\nImperfect pagination, though generally attributed to carelessness, often conceals important secrets.\n\nThe mispaginations found in the 1623 folio of \"Shakespeare\" and the consistent recurrence of similar errors in various volumes printed about the same period have occasioned considerable thought among scholars and cryptogrammatists.\n\nIn Baconian cryptograms, all page numbers ending in 89 seem to have a special significance.\n\nThe 89th page of the Comedies in the 1623 folio of \"Shakespeare\" shows an error of type in the pagination, the \"9\" being from a considerably smaller font than the \"8.\" The 189th page is entirely missing, there being two pages numbered 187; and page 188 shows the second \" 8 \" scarcely more than half the size of the first one.\n\nPage 289 is correctly numbered and has no unusual features, but page 89 of the Histories is missing."

