[content]
body = "Here a site was allotted to him for the erection of a church, and in this manner Glastonbury Abbey was founded.\n\nJoseph planted his staff in the earth and it took root, becoming a miraculous thorn bush which blossomed twice a year and which is now called the Glastonbury thorn.\n\nThe end of the life of Joseph of Arimathea is unknown.\n\nBy some it is believed that, like Enoch, he was translated; by others, that he was buried in Glastonbury Abbey.\n\nRepeated attempts have been made to find the Holy Grail, which many believe to have been hidden in a crypt beneath the ancient abbey.\n\nThe Glastonbury chalice recently discovered and by the devout supposed to be the original Sangreal can scarcely be accepted as genuine by the critical investigator.\n\nBeyond its inherent interest as a relic, like the famous Antioch chalice it actually proves nothing when it is realized that practically little more was known about the Christian Mysteries eighteen centuries ago than can be discovered today.\n\nThe origin of the Grail myth, as of nearly every other element in the great drama, is curiously elusive.\n\nSufficient foundation for it may be found in the folklore of the British Isles, which contains many accounts of magic cauldrons, kettles, cups, and drinking horns.\n\nThe earliest Grail legends describe the cup as a veritable horn of plenty.\n\nIts contents were inexhaustible and those who served it never hungered or thirsted.\n\nOne account states that no matter how desperately ill a person might be he could not die within eight days of beholding the cup.\n\nSome authorities believe the Holy Grail to be the perpetuation of the holy cup used in the rites of Adonis and Atys.\n\nA communion cup or chalice was used in several of the ancient Mysteries, and the god Bacchus is frequently symbolized in the form of a vase, cup, or urn.\n\nIn Nature worship the ever-flowing Grail signifies the bounty of the harvest by which the life of man is sustained; like Mercury's bottomless pitcher, it is the inexhaustible fountain of natural re source.\n\nFrom the evidence at hand it would indeed be erroneous to ascribe a purely Christian origin to the Grail symbolism.\n\nIn the Arthurian Cycle appears a strange and mysterious figure--Merlin, the magician.\n\nIn one of the legends concerning him it is declared that when Jesus was sent to liberate the world from the bondage of evil, the Adversary determined to send an Antichrist to undo His labors.\n\nThe Devil therefore in the form of a horrible dragon overshadowed a young woman who had taken refuge in sanctuary to escape the evil which had dcstroyed her family.\n\nWhen Merlin, her child, was born he partook of the characteristics of his human mother and demon father.\n\nMerlin, however, did not serve the powers of darkness but, being converted to the true light, retained only two of the supernatural powers inherited from his father: prophecy and miracle working.\n\nThe story of Merlin's infernal father must really be considered as an allegorical allusion to the fact that he was a \"philosophical son\" of the serpent or dragon, a title applied to all initiates of the Mysteries, who thus acknowledge Nature as their mortal mother and wisdom in the form of the serpent or dragon as their immortal Father.\n\nConfusion of the dragon and serpent with the powers of evil has resulted as an inevitable consequence from misinterpretation of the early chapters of Genesis.\n\nArthur while an infant was given into the keeping of Merlin, the Mage, and in his youth instructed by him in the secret doctrine and probably initiated into the deepest secrets of natural magic.\n\nWith Merlin's assistance, Arthur became the leading general of Britain, a degree of dignity which has been confused with kingship."

