body = "It was portrayed as androgynous to signify that they recognized the initiates and gods as partaking of both the positive and negative creative powers.\n\nGerald Massey writes: \"This is the secret of the Sphinx.\n\nThe orthodox sphinx of Egypt is masculine in front and feminine behind.\n\nSo is the image of Sut-Typhon, a type of horn and tail, male in front and female behind.\n\nThe Pharaohs, who wore the tail of the Lioness or Cow behind them, were male in front and female behind.\n\nLike the Gods they included the dual totality of Being in one person, born of the Mother, but of both sexes as the Child.\" (See The Natural Genesis .) Most investigators have ridiculed the Sphinx and, without even deigning to investigate the great colossus, have turned their attention to the more overwhelming mystery of the Pyramid.\n\nTHE PYRAMID MYSTERIES The word pyramid is popularly supposed to be derived from πῦρ, fire, thus signifying that it is the symbolic representation of the One Divine Flame, the life of every creature.\n\nJohn Taylor believes the word pyramid to mean a \"measure of wheat, \" while C.\n\nPiazzi Smyth favors the Coptic meaning, \"a division into ten.\" The initiates of old accepted the pyramid form as the ideal symbol of both the secret doctrine and those institutions established for its dissemination.\n\nBoth pyramids and mounds are antitypes of the Holy Mountain, or High Place of God, which was believed to stand in the \"midst\" of the earth.\n\nJohn P.\n\nLundy relates the Great Pyramid to the fabled Olympus, further assuming that its subterranean passages correspond to the tortuous byways of Hades.\n\nThe square base of the Pyramid is a constant reminder that the House of Wisdom is firmly founded upon Nature and her immutable laws.\n\n\"The Gnostics,\" writes Albert Pike, \"claimed that the whole edifice of their science rested on a square whose angles were: Σιγη, Silence; Βυθος, Profundity; Νους, Intelligence; and Αληθεια Truth.\" (See Morals and Dogma .) The sides of the Great Pyramid face the four cardinal angles, the latter signifying according to Éliphas Lévi the extremities of heat and cold (south and north) and the extremities of light and darkness (east and west).\n\nThe base of the Pyramid further represents the four material elements or substances from the combinations of which the quaternary body of man is formed.\n\nFrom each side of the square there rises a triangle, typifying the threefold divine being enthroned within every quaternary material nature.\n\nIf each base line be considered a square from which ascends a threefold spiritual power, then the sum of the lines of the four faces (12) and the four hypothetical squares (16) constituting the base is 28, the sacred number of the lower world.\n\nIf this be added to the three septenaries composing the sun (21), it equals 49, the square of 7 and the number of the universe.\n\nThe twelve signs of the zodiac, like the Governors' of the lower worlds, are symbolized by the twelve lines of the four triangles--the faces of the Pyramid.\n\nIn the midst of each face is one of the beasts of Ezekiel, and the structure as a whole becomes the Cherubim.\n\nThe three main chambers of the Pyramid are related to the heart, the brain, and the generative system--the spiritual centers of the human constitution.\n\nThe triangular form of the Pyramid also is similar to the posture assumed by the body during the ancient meditative exercises."

