[content]
body = "(1) Adam directing Seth how to reach the Garden of Eden.\n\n(2) Seth placing the three seeds from the Tree of Life under the tongue of the dead Adam.\n\n(3) The Queen of Sheba, refusing to place her feet upon the sacred tree, forded the stream.\n\n(4) Placing the sacred tree over the door of Solomon's Temple.\n\n(5) The crucifixion of Christ upon a cross made from the wood of the holy tree.\n\n(6) Distinguishing the true cross from the other two by testing its power to raise a corpse to life.\n\n*** Not only is the cross itself a familiar object in the art of all nations, but the veneration for it is an essential part of the religious life of the greater part of humanity.\n\nIt is a common symbol among the American Indians--North, Central, and South.\n\nWilliam W.\n\nSeymour states: \"The Aztec goddess of rain bore a cross in her hand, and the Toltecs claimed that their deity, Quetzalcoatl, taught them the sign and ritual of the cross, hence his staff, or sceptre of power, resembled a crosier, and his mantle was covered with red crosses.\" ( The Cross in Tradition, History and Art .) The cross is also highly revered by the Japanese and Chinese.\n\nTo the Pythagoreans the most sacred of all numbers was the 10, the symbol of which is an X, or cross.\n\nIn both the Japanese and Chinese languages the character of the number 10 is a cross.\n\nThe Buddhist wheel of life is composed of two crosses superimposed, and its eight points are still preserved to Christendom in the peculiarly formed cross of the Knights Templars, which is essentially Buddhistic.\n\nIndia has preserved the cross, not only in its carvings and paintings, but also in its architectonics; a great number of its temples--like the churches and cathedrals of Christendom--are raised from cruciform foundations.\n\nOn the mandalas of the Tibetans, heaven is laid out in the form of a cross, with a demon king at each of the four gates.\n\nA remarkable cross of great antiquity was discovered in the island caves of Elephanta in the harbor of Bombay.\n\nCrosses of various kinds were favorite motifs in the art of Chaldea, Phœnicia, Egypt, and Assyria.\n\nThe initiates of the Eleusinian Mysteries of Greece were given a cross which they suspended about their necks on a chain, or cord, at the time of initiation.\n\nTo the Rosicrucians, Alchemists, and Illuminati, the cross was the symbol of light, because each of the three letters L V X is derived from some part of the cross.\n\nTHE TAU CROSS There are three distinct forms of the cross.\n\nThe first is called the TAU (more correctly the TAV).\n\nIt closely resembles the modern letter T, consisting of a horizontal bar resting on a vertical column, the two arms being of equal length.\n\nAn oak tree cut off some feet above the ground and its upper part laid across the lower in this form was the symbol of the Druid god Hu .\n\nIt is suspected that this symbol originated among the Egyptians from the spread of the horns of a bull or ram (Taurus or Aries) and the vertical line of its face.\n\nThis is sometimes designated as the hammer cross , because if held by its vertical base it is not unlike a mallet or gavel.\n\nIn one of the Qabbalistic Masonic legends, CHiram Abiff is given a hammer in the form of a TAU by his ancestor, Tubal-cain.\n\nThe TAU cross is preserved to modern Masonry under the symbol of the T square.\n\nThis appears to be the oldest form of the cross extant."

