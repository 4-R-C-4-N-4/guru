body = "He told His disciples that they should became \"fishers of men.\" The sign of the fish was also the first monogram of the Christians.\n\nThe mysterious Greek name of Jesus, ΙΧΘΥΣ, means \"a fish.\" The fish was accepted as a symbol of the Christ by a number of early canonized church fathers.\n\nSt.\n\nAugustine likened the Christ to a fish that had been broiled, and it was also pointed out that the flesh of that Fish was the food of righteous and holy men.\n\n*** Several early church fathers believed that the \"whale\" which swallowed Jonah was the symbol of God the Father, who, when the hapless prophet was thrown overboard, accepted Jonah into His own nature until a place of safety was reached.\n\nThe story of Jonah is really a legend of initiation into the Mysteries, and the \"great fish\" represents the darkness of ignorance which engulfs man when he is thrown over the side of the ship (is born) into the sea (life).\n\nThe custom of building ships in the form of fishes or birds, common in ancient times, could give rise to the story, and mayhap Jonah was merely picked up by another vessel and carried into port, the pattern of the ship causing it to be called a \"great fish.\" (\" Veritatis simplex oratio est!\n\n\") More probably the \"whale\" of Jonah is based upon the pagan mythological creature, hippocampus , part horse and part dolphin, for the early Christian statues and carvings show the composite creature and not a true whale.\n\nIt is reasonable to suppose that the mysterious sea serpents, which, according to the Mayan and Toltec legends, brought the gods to Mexico were Viking or Chaldean ships, built in the shape of composite sea monsters or dragons.\n\nH.\n\nP.\n\nBlavatsky advances the theory that the word cetus , the great whale, is derived from keto , a name for the fish god, Dagon, and that Jonah was actually confined in a cell hollowed out in the body of a gigantic statue of Dagon after he had been captured by Phœnician sailors and carried to one of their cities.\n\nThere is no doubt a great mystery in the gigantic form of cetus , which is still preserved as a constellation.\n\nAccording to many scattered fragments extant, man's lower nature was symbolized by a tremendous, awkward creature resembling a great sea serpent, or dragon, called leviathan .\n\nAll symbols having serpentine form or motion signify the solar energy in one of its many forms.\n\nThis great creature of the sea therefore represents the solar life force imprisoned in water and also the divine energy coursing through the body of man, where, until transmuted, it manifests itself as a writhing, twisting monster---man's greeds, passions, and lusts.\n\nAmong the symbols of Christ as the Savior of men are a number relating to the mystery of His divine nature concealed within the personality of the lowly Jesus.\n\nThe Gnostics divided the nature of the Christian Redeemer into two parts--the one Jesus, a mortal man; the other, Christos, a personification of Nous , the principle of Cosmic Mind.\n\nNous , the greater, was for the period of three years (from baptism to crucifixion) using the fleshly garment of the mortal man (Jesus).\n\nIn order to illustrate this point and still conceal it from the ignorant, many strange, and often repulsive, creatures were used whose rough exteriors concealed magnificent organisms."

