body = "Love, Nietzsche said, should be sacrificed to the production of the superman and those only should marry who are best fitted to produce this outstanding type.\n\nNietzsche also believed in the rule of the aristocracy, both blood and breeding being essential to the establishment of this superior type.\n\nNietzsche's doctrine did not liberate the masses; it rather placed over them supermen for whom their inferior brothers and sisters should be perfectly reconciled to die.\n\nEthically and politically, the superman was a law unto himself.\n\nTo those who understand the true meaning of power to be virtue, self-control, and truth, the ideality behind Nietzsche's theory is apparent.\n\nTo the superficial, however, it is a philosophy heartless and calculating, concerned solely with the survival of the fittest.\n\nOf the other German schools of philosophic thought, limitations of space preclude detailed mention.\n\nThe more recent developments of the German school are Freudianism and Relativism (often called the Einstein theory).\n\nThe former is a system of psychoanalysis through psychopathic and neurological phenomena; the latter attacks the accuracy of mechanical principles dependent upon the present theory of velocity.\n\nRené Descartes stands at the head of the French school of philosophy and shares with Sir Francis Bacon the honor of founding the systems of modern science and philosophy.\n\nAs Bacon based his conclusions upon observation of external things, so Descartes founded his metaphysical philosophy upon observation of internal things.\n\nCartesianism (the philosophy of Descartes) first eliminates all things and then replaces as fundamental those premises without which existence is impossible.\n\nDescartes defined an idea as that which fills the mind when we conceive a thing.\n\nThe truth of an idea must be determined by the criteria of clarity and distinctness.\n\nHence Descartes, held that a clear and distinct idea must be true.\n\nDescartes has the distinction also of evolving his own philosophy without recourse to authority.\n\nConsequently his conclusions are built up from the simplest of premises and grow in complexity as the structure of his philosophy takes form.\n\nThe Positive philosophy of Auguste Comte is based upon the theory that the human intellect develops through three stages of thought.\n\nThe first and lowest stage is theological; the second, metaphysical; and the third and highest, positive.\n\nThus theology and metaphysics are the feeble intellectual efforts of humanity's child-mind and positivism is the mental expression of the adult intellect.\n\nIn his Cours de Philosophie positive , Comte writes: \"In the final, the positive state, the mind has given over the vain search after Absolute notions, the origin and destination of the universe, and the causes of phenomena, and applies itself to the study of their laws,--that is, their invariable relations of succession and resemblance.\n\nReasoning and observation, duly combined, are the means of this knowledge.\" Comte's theory is described as an \"enormous system of materialism.\" According to Comte, it was formerly said that the heavens declare the glory of God, but now they only recount the glory of Newton and Laplace.\n\nAmong the French schools of philosophy are Traditionalism (often applied to Christianity), which esteems tradition as the proper foundation for philosophy; the Sociological school, which regards humanity as one vast social organism; the Encyclopedists , whose efforts to classify knowledge according to the Baconian system revolutionized European thought; Voltairism , which assailed the divine origin of the Christian faith and adopted an attitude of extreme skepticism toward all matters pertaining to theology; and Neo-Criticism , a French revision of the doctrines of Immanuel Kant."

