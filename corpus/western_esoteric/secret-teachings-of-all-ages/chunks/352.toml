body = "There is evidence that early writers were acquainted with such a supposition--which, however, was popularized only after it had been espoused by Theosophy.\n\nThis theory asserts that the Rosicrucians actually possessed all the supernatural powers with which they were credited; that they were in reality citizens of two worlds: that, while they had physical bodies for expression on the material plane, they were also capable, through the instructions they received from the Brotherhood, of functioning in a mysterious ethereal body not subject to the limitations of time or distance.\n\nBy means of this \"astral form\" they were able to function in the invisible realm of Nature, and in this realm, beyond reach of the profane, their temple was located.\n\nAccording to this viewpoint, the true Rosicrucian Brotherhood consisted of a limited number of highly developed adepts, or initiates, those of the higher degrees being no longer subject to the laws of mortality; candidates were accepted into the Order only after long periods of probation; adepts possessed the secret of the Philosopher's Stone and knew the process of transmuting the base metals into gold, but taught that these were only allegorical terms concealing the true mystery of human regeneration through the transmutation of the \"base elements\" of man's lower nature into the \"gold\" of intellectual and spiritual realization.\n\nAccording to this theory, those who have sought to record the events of importance in connection with the Rosicrucian controversy have invariably failed because they approached their subject from a purely physical or materialistic angle.\n\nTHE CREST OF JOHANN VALENTIN ANDREÆ.\n\nFrom Chymische Hochzeit.\n\nThe reference to four red roses and a white cross in the Chymical Marriage of Christian Rosencreutz identified Johann Valentin Andreæ as its author, for his family crest, shown above, consisted of four red roses and a white cross.\n\n*** These adepts were believed to have been able to teach man how to function away from his physical body at will by assisting him to remove the \"rose from the cross.\" They taught that the spiritual nature was attached to the material form at certain points, symbolized by the \"nails\" of the crucifixion; but by three alchemical initiations which took place in the spiritual world, in the true Temple of the Rose Cross, they were able to \"draw\" these nails and permit the divine nature of man to come down from its cross.\n\nThey concealed the processes by which this was accomplished under three alchemical metaphoric expressions: \"The Casting of the Molten Sea,\" \"The Making of the Rose Diamond,\" and \"The Achieving of the Philosopher's Stone.\" While the intellectualist flounders among contradictory theories, the mystic treats the problem in an entirely different manner.\n\nHe believes that the true Rosicrucian Fraternity, consisting of a school of supermen (not unlike the fabled Mahatmas of India), is an institution existing not in the visible world bur in its spiritual counterpart, which he sees fit to call the \"inner planes of Nature\"; that the Brothers can be reached only by those who are capable of transcending the limitations of the material world.\n\nTo substantiate their viewpoint, these mystics cite the following significant statement from the Confessio Fraternitatis : \"A thousand times the unworthy may clamour, a thousand times may present themselves, yet God hath commanded our ears that they should hear none of them, and hath so compassed us about with His clouds that unto us, His servants, no violence can be done; wherefore now no longer are we beheld by human eyes, unless they have received strength borrowed from the eagle.\" In mysticism the eagle is a symbol of initiation (the spinal Spirit Fire), and by this is explained the inability of the unregenerated world to understand the Secret Order of the Rose Cross."

