body = "\"After having acquired all which it was possible for him to learn of the Greek philosophers and, presumably, become an initiate in the Eleusinian mysteries, he went to Egypt, and after many rebuffs and refusals, finally succeeded in securing initiation in the Mysteries of Isis, at the hands of the priests of Thebes.\n\nThen this intrepid 'joiner' wended his way into Phoenicia and Syria where the Mysteries of Adonis were conferred upon him, and crossing to the valley of the Euphrates he tarried long enough to become versed in, the secret lore of the Chaldeans, who still dwelt in the vicinity of Babylon.\n\nFinally, he made his greatest and most historic venture through Media and Persia into Hindustan where he remained several years as a pupil and initiate of the learned Brahmins of Elephanta and Ellora.\" (See Ancient Freemasonry , by Frank C.\n\nHiggins, 32°.) The same author adds that the name of Pythagoras is still preserved in the records of the Brahmins as Yavancharya , the Ionian Teacher.\n\nPythagoras was said to have been the first man to call himself a philosopher ; in fact, the world is indebted to him for the word philosopher .\n\nBefore that time the wise men had called themselves sages , which was interpreted to mean those who know .\n\nPythagoras was more modest.\n\nHe coined the word philosopher , which he defined as one who is attempting to find out .\n\nAfter returning from his wanderings, Pythagoras established a school, or as it has been sometimes called, a university, at Crotona, a Dorian colony in Southern Italy.\n\nUpon his arrival at Crotona he was regarded askance, but after a short time those holding important positions in the surrounding colonies sought his counsel in matters of great moment.\n\nHe gathered around him a small group of sincere disciples whom he instructed in the secret wisdom which had been revealed to him, and also in the fundamentals of occult mathematics, music, and astronomy, which he considered to be the triangular foundation of all the arts and sciences.\n\nWhen he was about sixty years old, Pythagoras married one of his disciples, and seven children resulted from the union.\n\nHis wife was a remarkably able woman, who not only inspired him during the years of his life but after his assassination continued to promulgate his doctrines.\n\nAs is so often the case with genius, Pythagoras by his outspokenness incurred both political and personal enmity.\n\nAmong those who came for initiation was one who, because Pythagoras refused to admit him, determined to destroy both the man and his philosophy.\n\nBy means of false propaganda, this disgruntled one turned the minds of the common people against the philosopher.\n\nWithout warning, a band of murderers descended upon the little group of buildings where the great teacher and his disciples dwelt, burned the structures and killed Pythagoras.\n\nAccounts of the philosopher's death do not agree.\n\nSome say that he was murdered with his disciples; others that, on escaping from Crotona with a small band of followers, he was trapped and burned alive by his enemies in a little house where the band had decided to rest for the night.\n\nAnother account states that, finding themselves trapped in the burning structure, the disciples threw themselves into the flames, making of their own bodies a bridge over which Pythagoras escaped, only to die of a broken heart a short time afterwards as the result of grieving over the apparent fruitlessness of his efforts to serve and illuminate mankind.\n\nPYTHAGORAS, THE FIRST PHILOSOPHER.\n\nFrom Historia Deorum Fatidicorum.\n\nDuring his youth, Pythagoras was a disciple of Pherecydes and Hermodamas, and while in his teens became renowned for the clarity of his philosophic concepts."

