[content]
body = "Man's physical body was looked upon as the robe of his spiritual nature; consequently, the more developed were his super-substantial powers the more glorious his apparel.\n\nOf course, clothing was originally worn for ornamentation rather than protection, and such practice still prevails among many primitive peoples.\n\nThe Mysteries caught that man's only lasting adornments were his virtues and worthy characteristics; that he was clothed in his own accomplishments and adorned by his attainments.\n\nThus the white robe was symbolic of purity, the red robe of sacrifice and love, and the blue robe of altruism and integrity.\n\nSince the body was said to be the robe of the spirit, mental or moral deformities were depicted as deformities of the body.\n\nConsidering man's body as the measuring rule of the universe, the philosophers declared that all things resemble in constitution--if not in form--the human body.\n\nThe Greeks, for example, declared Delphi to be the navel of the earth, for the physical planet was looked upon as a gigantic human being twisted into the form of a ball.\n\nIn contradistinction to the belief of Christendom that the earth is an inanimate thing, the pagans considered not only the earth but also all the sidereal bodies as individual creatures possessing individual intelligences.\n\nThey even went so far as to view the various kingdoms of Nature as individual entities.\n\nThe animal kingdom, for example, was looked upon as one being--a composite of all the creatures composing that kingdom.\n\nThis prototypic beast was a mosaic embodiment of all animal propensities and within its nature the entire animal world existed as the human species exists within the constitution of the prototypic Adam.\n\nIn the same manner, races, nations, tribes, religions, states, communities, and cities were viewed as composite entities, each made up of varying numbers of individual units.\n\nEvery community has an individuality which is the sum of the individual attitudes of its inhabitants.\n\nEvery religion is an individual whose body is made up of a hierarchy and vast host of individual worshipers.\n\nThe organization of any religion represents its physical body, and its individual members the cell life making up this organism.\n\nAccordingly, religions, races, and communities--like individuals--pass through Shakespeare's Seven Ages , for the life of man is a standard by which the perpetuity of all things is estimated.\n\nTHE DIVINE TREE IN MAN (reverse) From Law's Figures of Jakob Böhme.\n\nJust as the diagram representing the front view of man illustrates his divine principles in their regenerated state, so the back view of the same figure sets forth the inferior, or \"night,\" condition of the sun.\n\nFrom the Sphere of the Astral Mind a line ascends through the Sphere of reason into that of the Senses.\n\nThe Sphere of the Astral Mind and of the Senses are filled with stars to signify the nocturnal condition of their natures.\n\nIn the sphere of reason, the superior and the inferior are reconciled, Reason in the mortal man corresponding to Illumined Understanding in the spiritual man.\n\n*** THE DIVINE TREE IN MAN (obverse) From Law's Figures of Jakob Böhme.\n\nA tree with its roots in the heart rises from the Mirror of the Deity through the Sphere of the Understanding to branch forth in the Sphere of the Senses.\n\nThe roots and trunk of this tree represent the divine nature of man and may be called his spirituality; the branches of the tree are the separate parts of the divine constitution and may be likened to the individuality; and the leaves--because of their ephemeral nature--correspond to the personality, which partakes of none of the permanence of its divine source.\n\n*** According to the secret doctrine, man, through the gradual refinement of his vehicles and the ever-increasing sensitiveness resulting from that refinement, is gradually overcoming the limitations of matter and is disentangling himself from his mortal coil."

