[content]
body = "Through one of four possible avenues Mohammed may have contacted the ancient Mystery teachings: (1) through direct contact with the Great School in the invisible world; (2) through the Nestorian Christian monks; (3) through the mysterious holy man who appeared and disappeared at frequent intervals during the period in which the suras of the Koran were revealed; (4) through a decadent school already existing in Arabia, which school in spite of its lapse into idolatry still retained the secrets of the Ancient Wisdom cult.\n\nThe arcana of Islam may yet be demonstrated to have been directly founded upon the ancient pagan Mysteries performed at the Caaba centuries before the birth of the Prophet; in fact it is generally admitted that many of the ceremonials now embodied in the Islamic Mysteries are survivals of pagan Arabia.\n\nThe feminine principle is repeatedly emphasized in Islamic symbolism.\n\nFor example, Friday, which is sacred to the planer Venus, is the Moslem's holy day; green is the color of the Prophet and, being symbolic of verdure, is inevitably associated with the World Mother; and both the Islamic crescent and the scimitar may be interpreted to signify the crescent shape of either the moon or Venus.\n\n\"The famous 'Stone of Cabar,' Kaaba, Cabir, or Kebir, at Mecca,\" says Jennings, \"which is so devoutly kissed by the Faithful, is a Talisman.\n\nIt is said that the figure of Venus is seen to this day engraved upon it with a crescent.\n\nThis very Caaba itself was at first an idolatrous temple, where the Arabians worshipped Al-Uzza (God and Issa), that is Venus.\" (See Kenealy's Enoch, The Second Messenger of God .) \"The Mussulmans,\" writes Sir William Jones, \"are already a sort of heterodox Christians: they are Christians, if Locke reasons justly, because they firmly believe the immaculate conception, divine character, and miracles of the MESSIAH; but they are heterodox, in denying vehemently his character of Son, and his equality, as God, with the Father, of whose unity and attributes they entertain and express the most awful ideas; while they consider our doctrine as perfect blasphemy, and insist that our copies of the Scriptures have been corrupted both by Jews and Christians.\" The following lines are declared by the followers of the Prophet to have been deleted from the Christian Gospels: \"And when Jesus, the Son of Mary, said, O children of Israel, verily I am the apostle of God sent unto you, confirming the law which was delivered before me, and bringing good tidings of an apostle who shall come after me, and whose name shall be AHMED.\" In the present text containing the prophecy of Jesus concerning a comforter to come after Him, it is further claimed that the word comforter should be translated illustrious and that it had a direct reference to Mohammed; also that the tongues of flame that descended upon the apostles on the day of Pentecost in no way could be interpreted as signifying the promised comforter.\n\nWhen asked, however, for definite proof that the original Gospels contained these so-called expurgated references to Mohammed, the Moslems make a counter-demand for production of the original documents upon which Christianity is founded.\n\nUntil such writings are discovered, the point under dispute must remain a source of controversy.\n\nTo ignore the heritage of culture received from Islam would be an unpardonable oversight, for when the crescent triumphed over the cross in Southern Europe it was the harbinger of a civilization which had no equal in its day.\n\nIn Studies in a Mosque , Stanley Lane-Poole writes: \"For nearly eight centuries under her Mohammedan rulers Spain set to all Europe a shining example of a civilized and enlightened state.\n\n* * * Art, literature and science prospered as they then prospered nowhere else in Europe."

