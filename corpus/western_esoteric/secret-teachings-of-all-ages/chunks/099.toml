body = "They understood hypnotism, mesmerism, and similar practices long before the modem world dreamed of their existence.\n\nPlutarch describes the requisites of a follower of Isis in this manner: \"For as 'tis not the length of the beard, or the coarseness of the habit which makes a philosopher, so neither will those frequent shavings, or the mere wearing [of] a linen vestment constitute a votary of Isis; but he alone is a true servant or follower of this Goddess, who after he has heard, and been made acquainted in a proper manner with the history of the actions of these Gods, searches into the hidden truths which he concealed under them, and examines the whole by the dictates of reason and philosophy.\" During the Middle Ages the troubadours of Central Europe preserved in song the legends of this Egyptian goddess.\n\nThey composed sonnets to the most beautiful woman in all the world.\n\nThough few ever discovered her identity, she was Sophia, the Virgin of Wisdom, whom all the philosophers of the world have wooed.\n\nIsis represents the mystery of motherhood, which the ancients recognized as the most apparent proof of Nature's omniscient wisdom and God's overshadowing power.\n\nTo the modern seeker she is the epitome of the Great Unknown, and only those who unveil her will be able to solve the mysteries of life, death, generation, and regeneration.\n\nMUMMIFICATION OF THE EGYPTIAN DEAD Servius, commenting on Virgil's Æneid , observes that \"the wise Egyptians took care to embalm their bodies, and deposit them in catacombs, in order that the soul might be preserved for a long time in connection with the body, and might not soon be alienated; while the Romans, with an opposite design, committed the remains of their dead to the funeral pile, intending that the vital spark might immediately be restored to the general element, or return to its pristine nature.\" (From Prichard's An Analysis of the Egyptian Mythology .) No complete records are available which give the secret doctrine of the Egyptians concerning the relationship existing between the spirit, or consciousness, and the body which it inhabited.\n\nOSIRIS, KING OF THE UNDERWORLD.\n\nOsiris is often represented with the lower par, of his body enclosed in a mummy case or wrapped about with funeral bandages.\n\nMan's spirit consists of three distinct parts, only one of which incarnates in physical form.\n\nThe human body was considered to be a tomb or sepulcher of this incarnating spirit.\n\nTherefore Osiris, a symbol of the incarnating ego, was represented with the lower half of his body mummified to indicate that he was the living spirit of man enclosed within the material form symbolized by the mummy case.\n\nThere is a romance between the active principle of God and the passive principle of Nature.\n\nFrom the union of these two principles is produced the rational creation.\n\nMan is a composite creature.\n\nFrom his Father (the active principle) he inherits his Divine Spirit, the fire of aspiration--that immortal part of himself which rises triumphant from the broken clay of mortality: that part which remains after the natural organisms have disintegrated or have been regenerated.\n\nFrom his Mother (the passive principle) he inherits his body--that part over which the laws of Nature have control: his humanity, his mortal personality, his appetites, his feelings, and his emotions.\n\nThe Egyptians also believed that Osiris was the river Nile and that Isis (his sister-wife) was the contiguous land, which, when inundated by the river, bore fruit and harvest.\n\nThe murky water of the Nile were believed to account for the blackness of Osiris, who was generally symbolized as being of ebony hue."

