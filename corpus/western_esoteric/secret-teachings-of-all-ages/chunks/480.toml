body = "Thus, the church of Ephesus stands for the Arch-Indian branch; the church of Smyrna, the Arch-Persians; the church of Pergamos, the Chaldean-Egyptian-Semitic; the church of Thyatira, the Grecian-Latin-Roman; the church of Sardis, the Teuton-Anglo-Saxon; the church of Philadelphia, the Slavic; and the church of Laodicea, the Manichæan.\n\nThe seven churches also signify the Greek vowels, of which Alpha and Omega are the first and the last.\n\nA difference of opinion exists as to the order in which the seven planers should be related to the churches.\n\nSome proceed from the hypothesis that Saturn represents the church of Ephesus; but from the fact that this city was sacred to the moon goddess and also that the sphere of the moon is the first above that of the earth, the planets obviously should ascend in their ancient order from the moon to Saturn.\n\nFrom Saturn the soul would naturally ascend through the door in the Empyrean.\n\nIn the fourth and fifth chapters St.\n\nJohn describes the throne of God upon which sat the Holy One \"which was and is, and is to come.\" About the throne were twenty-four lesser seats upon which sat twenty-four elders arrayed in white garments and wearing crowns of gold.\n\n\"And out of the throne proceeded lightnings and thunderings and voices: and there were seven lamps of fire burning before the throne, which are the seven Spirits of God.\" He who sat upon the throne held in His right hand a book sealed with seven seals which no man in heaven or earth had been found worthy to open.\n\nThen appeared a Lamb (Aries, the first and chief of the zodiacal signs) which had been slain, having seven horns (rays) and seven eyes (lights).\n\nThe Lamb took the book from the right hand of Him that sat upon the throne and the four beasts and all the elders fell down and worshiped God and the Lamb.\n\nDuring the early centuries of the Christian Church the lamb was universally recognized as the symbol of Christ, and not until after the fifth synod of Constantinople (the \"Quinisext Synod,\" A.D.\n\n692) was the figure of the crucified man substituted for that of Agnus Dei.\n\nAs shrewdly noted by one writer on the subject, the use of a lamb is indicative of the Persian origin of Christianity, for the Persians were the only people to symbolize the first sign of the zodiac by a lamb.\n\nBecause a lamb was the sin offering of the ancient pagans, the early mystic Christians considered this animal as an appropriate emblem of Christ, whom they regarded as the sin offering of the world.\n\nThe Greeks and the Egyptians highly venerated the lamb or ram, often placing its horns upon the foreheads of their gods.\n\nThe Scandinavian god Thor carried a hammer made from a pair of ram's horns.\n\nThe lamb is used in preference to the ram apparently because of its purity and gentleness; also, since the Creator Himself was symbolized by Aries, His Son would consequently be the little Ram or Lamb.\n\nThe lambskin apron worn by the Freemasons over that part of the body symbolized by Typhon or Judas represents that purification of the generative processes which is a prerequisite to true spirituality.\n\nIn this allegory the Lamb signifies the purified candidate, its seven horns representing the divisions of illuminated reason and its seven eyes the chakras, or perfected sense-perceptions.\n\nEPISODES FROM THE MYSTERIES OF THE APOCALYPSE.\n\nFrom Klauber's Historiae Biblicae Veteris et Novi Testamenti.\n\nIn the central foreground, St.\n\nJohn the Divine is kneeling before the apparition of the Alpha and Omega standing in the midst of the seven lights and surrounded by an aureole of flames and smoke."

