body = "The result was his critical philosophy, embracing the critique of pure reason, the critique of practical reason, and the critique of judgment.\n\nDr.\n\nW.\n\nJ.\n\nDurant sums up Kant's philosophy in the concise statement that he rescued mind from matter.\n\nThe mind Kant conceived to be the selector and coordinator of all perceptions, which in turn are the result of sensations grouping themselves about some external object.\n\nIn the classification of sensations and ideas the mind employs certain categories: of sense, time and space; of understanding, quality, relation, modality, and causation; and the unity of apperception.\n\nBeing subject to mathematical laws, time and space are considered absolute and sufficient bases for exact thinking.\n\nKant's practical reason declared that while the nature of noumenon could never be comprehended by the reason, the fact of morality proves the existence of three necessary postulates: free will, immortality, and God.\n\nIn the critique of judgment Kant demonstrates the union of the noumenon and the phenomenon in art and biological evolution.\n\nGerman superintellectualism is the outgrowth of an overemphasis of Kant's theory of the autocratic supremacy of the mind over sensation and thought.\n\nThe philosophy of Johann Gottlieb Fichte was a projection of Kant's philosophy, wherein he attempted to unite Kant's practical reason with his pure reason.\n\nFichte held that the known is merely the contents of the consciousness of the knower, and that nothing can exist to the knower until it becomes part of those contents.\n\nNothing is actually real, therefore, except the facts of one's own mental experience.\n\nRecognizing the necessity of certain objective realities, Friedrich Wilhelm Joseph von Schelling, who succeeded Fichte in the chair of philosophy at Jena, first employed the doctrine of identity as the groundwork for a complete system of philosophy.\n\nWhereas Fichte regarded self as the Absolute, von Schelling conceived infinite and eternal Mind to be the all-pervading Cause.\n\nRealization of the Absolute is made possible by intellectual intuition which, being a superior or spiritual sense, is able to dissociate itself from both subject and object.\n\nKant's categories of space and time von Schelling conceived to be positive and negative respectively, and material existence the result of the reciprocal action of these two expressions.\n\nVon Schelling also held that the Absolute in its process of self-development proceeds according to a law or rhythm consisting of three movements.\n\nThe first, a reflective movement, is the attempt of the Infinite to embody itself in the finite.\n\nThe second, that of subsumption, is the attempt of the Absolute to return to the Infinite after involvement in the finite.\n\nThe third, that of reason, is the neutral point wherein the two former movements are blended.\n\nGeorg Wilhelm Friedrich Hegel considered the intellectual intuition of von Schelling to be philosophically unsound and hence turned his attention to the establishment of a system of philosophy based upon pure logic.\n\nOf Hegel it has been said that he began with nothing and showed with logical precision how everything had proceeded from it in logical order.\n\nHegel elevated logic to a position of supreme importance, in fact as a quality of the Absolute itself.\n\nGod he conceived to be a process of unfolding which never attains to the condition of unfoldment.\n\nIn like manner, thought is without either beginning or end.\n\nHegel further believed that all things owe their existence to their opposites and that all opposites are actually identical.\n\nThus the only existence is the relationship of opposites to each other, through whose combinations new elements are produced.\n\nAs the Divine Mind is an eternal process of thought never accomplished, Hegel assails the very foundation of theism and his philosophy limits immortality to the everflowing Deity alone.\n\nEvolution is consequently the never-ending flow of Divine Consciousness out of itself; all creation, though continually moving, never arrives at any state other than that of ceaseless flow."

