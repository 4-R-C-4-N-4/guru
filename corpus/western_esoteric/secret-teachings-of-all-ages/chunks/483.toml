[content]
body = "At the lower right is the angel with the key to the bottomless pit, who with a great chain binds Satan for a thousand years.\n\nIn the heavens above is represented one like unto the Son of Man, who carries a great sickle with which he reaps the harvest of the world.\n\nIn the center is the Holy City, the New Jerusalem, with its twelve gates and the mountain of the Lamb rising in the midst thereof.\n\nFrom the throne of the Lamb pours the great river of crystal, or living water, signifying the spiritual doctrine: upon all who discover and drink of its waters are conferred immortality.\n\nKneeling upon a high cliff, St.\n\nJohn gazes down upon the mystic city, the archetype of the perfect civilization yet to be.\n\nAbove the New Jerusalem, in a great sunburst of glory, is the throne of the Ancient One, which is the light of those who dwell in the matchless empire of the spirit.\n\nBeyond the recognition of the uninitiated world is an ever-increasing aggregation composed of the spiritual elect.\n\nThough they walk the earth as ordinary mortals, they are of a world apart and through their ceaseless efforts the kingdom of God is being slowly but surely established upon earth.\n\nThese illumined souls are the builders of the New Jerusalem, and their bodies are the living stones in its walls.\n\nLighted by the torch of truth they carry on their work, through their activities the golden age will return to the earth and the power of sin and death will be destroyed.\n\nFor this reason the declare that virtuous and illumined men, instead of ascending to heaven, will bring heaven down and establish it in the midst of earth itself.\n\n*** The twelfth chapter treats of a great wonder appearing in the heavens: a woman clothed with the sun, the moon under her feet, and upon her head a crown of twelve stars.\n\nThis woman represents the constellation of Virgo and also the Egyptian Isis, who, about to be delivered of her son Horus, is attacked by Typhon, the latter attempting to destroy the child predestined by the gods to slay the Spirit of Evil.\n\nThe war in heaven relates to the destruction of the planet Ragnarok and to the fall of the angels.\n\nThe virgin can be interpreted to signify the secret doctrine itself and her son the initiate born out of the \"womb of the Mysteries.\" The Spirit of Evil thus personified in the great dragon attempted to control mankind by destroying the mother of those illumined souls who have labored unceasingly for the salvation of the world.\n\nWings were given to the Mysteries (the virgin) and they flew into the wilderness; and the evil dragon tried to destroy them with a flood (of false doctrine) but the earth (oblivion) swallowed up the false doctrines and the Mysteries endured.\n\nThe thirteenth chapter describes a great beast which rose out of the sea, having seven heads and ten horns.\n\nFaber sees in this amphibious monster the Demiurgus, or Creator of the world, rising out of the Ocean of Chaos.\n\nWhile most interpreters of the Apocalypse consider the various beasts described therein as typical of evil agencies, this viewpoint is the inevitable result of unfamiliarity with the ancient doctrines from which the symbolism of the book is derived.\n\nAstronomically, the great monster rising out of the sea is the constellation of Cetus (the whale).\n\nBecause religious ascetics looked upon the universe itself as an evil and ensnaring fabrication, they also came to regard its very Creator as a weaver of delusions.\n\nThus the great sea monster (the world) and its Maker (the Demiurgus), whose strength is derived from the Dragon of Cosmic Power, came to be personified as a beast of horror and destruction, seeking to swallow up the immortal part: of human nature."

