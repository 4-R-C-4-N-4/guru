body = "ζ, η, θ--Serapæan Triad.\n\n7.\n\nγ, δ (not shown), ε--Osirian Triad.\n\nIn the lower section 1.\n\nλ, Μ, Ν--Horæan Triad.\n\n2.\n\nξ, Ο, Σ--Pandochæan Triad.\n\n3.\n\nΤ, Φ, Χ--Thaustic Triad.\n\n4.\n\nΨ, F, Η--Æluristic Triad.\n\nOf these fifteen triads Kircher writes: \"The figures differ from each other in eight highly important respects, i.\n\ne., according to form, position, gesture, act, raiment, headdress, staff, and, lastly, according to the hieroglyphics placed around them, whether these be flowers, shrubs, small letters or animals.\" These eight symbolic methods of portraying the secret powers of the figures are subtle reminders of the eight spiritual senses of cognition by means of which the Real Self in man may be comprehended.\n\nTo express this spiritual truth the Buddhists used the wheel with eight spokes and raised their consciousness by means of the noble eightfold path.\n\nThe ornamented border enclosing the three main panels of the Table contains many symbols consisting of birds, animals, reptiles, human beings, and composite forms.\n\nAccording to one reading of the Table, this border represents the four elements; the creatures are elemental beings.\n\nAccording to another interpretation, the border represents the archetypal spheres, and in its frieze of composite figures are the patterns of those forms which in various combinations will subsequently manifest themselves in the material world.\n\nThe four flowers at the corners of the Table are those which, because their blossoms always face the sun and follow its course across the sky, are sacred emblems of that finer part of man's nature which delights in facing its Creator.\n\nAccording to the secret doctrine of the Chaldeans, the universe is divided into four states of being (planes or spheres): archetypal, intellectual, sidereal, and elemental.\n\nEach of these reveals the others; the superior controlling the inferior, and the inferior receiving influence from the superior.\n\nThe archetypal plane was considered synonymous with the intellect of the Triune Divinity.\n\nWithin this divine, incorporeal, and eternal sphere are included all the lower manifestations of life-all that is, has been, or ever shall be.\n\nWithin the Kosmic Intellect all things spiritual or material exist as archetypes, or divine thought-forms, which is shown in the Table by a chain of secret similes.\n\nIn the middle region of the Table appears the all-form-containing personified Spiritual Essence--the source and substance of all things.\n\nFrom this proceed the lower worlds as nine emanations in groups of three (the Ophionic, Ibimorphous, and Nephtæan Triads).\n\nConsider in this connection the analogy of the Qabbalistic Sephiroth, or the nine spheres issuing from Kether, the Crown.\n\nThe twelve Governors of the Universe (the Mendesian, Ammonian, Momphtæan, and Omphtæan Triads)--vehicles for the distribution of the creative influences, and shown in the upper region of the Table-are directed in their activities by the Divine Mind patterns existing in the archetypal sphere, The archetypes are abstract patterns formulated in the Divine Mind and by them all the inferior activities are controlled.\n\nIn the lower region of the Table are the Father Fountains (the Horæan, Pandochæan, Thaustic, and Æluristic Triads), keepers of the great gates of the universe.\n\nThese distribute to the lower worlds the influences descending from the Governors shown above.\n\nIn the theology of the Egyptians, goodness takes precedence and all things partake of its nature to a higher or lower degree."

