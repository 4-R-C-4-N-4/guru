body = "IN his well-known work, The Rosicrucians, Their Rites and Mysteries , Hargrave Jennings reproduces five Qabbalistic charts which he declares to be genuine Rosicrucian drawings.\n\nHe gives no information concerning their origin nor does he attempt an elucidation of their symbolism.\n\nA recent writer who reproduced one of these charts correlated it to the emblematic tomb of Father C.R.C., thus exposing the true nature of Christian Rosencreutz.\n\nThe five plates reproduced in Hargrave Jennings' book are part of a series of fifteen diagrams which appear in The Magical, Qabbalistical, and Theosophical Writings of Georgius von Welling, on the Subject of Salt, Sulphur, and Mercury .\n\nThis extremely rare volume was published at Frankfort and Leipzig in 1735 and 1760.\n\nThe numbers and figures on the charts refer to the chapters and sections of the Writings.\n\nThese fifteen charts constitute a remarkable and invaluable addition to the few other known admittedly authentic Qabbalistic and Rosicrucian diagrams.\n\nLucifer is the greatest mystery of symbolism.\n\nThe secret knowledge of the Rosicrucians concerning Lucifer is nowhere so plainly set forth as in these plates, which virtually reveal his true identity, a carefully guarded secret about which little has been written.\n\nLucifer is represented by the number 741.\n\nVon Welling does not give a complete exposition of the fifteen charts; to have done so would have been contrary to the principles of Qabbalistic philosophy.\n\nThe deeper significance of the symbols is revealed only by profound study and contemplation.\n\nTABLE I, Figures 1-11 .\n\nFigure 1 is a Ptolemaic chart showing the true relationship existing between the primordial elements.\n\nIts secret significance is as follows: The outer ring enclosed by the lines A and B is the region of Schamayim , a Qabbalistic name for the Supreme Deity, signifying the expanse of the heavens, or a spiritual fiery water.\n\nSchamayim is \"The Ocean of Spirit, \" within which all created and uncreated things exist and by the life of which they are animated.\n\nIn the lower worlds Schamayim becomes the astral light.\n\nThe space between B and C marks the orbits or planes of the seven Spiritual Intelligences called the Divine Planets (not the visible planets).\n\nAccording to the Mysteries, the souls of men enter the lower worlds through ring B , the fixed stars.\n\nAll creation reflects the glory of Schamayim, the energy that filters into the spheres of the elements through the windows of the stars and planets.\n\nBetween C and D lies the region of the subtle, spiritual air, a subdivision of ether.\n\nD to E marks the surface of the earth and sea, by which are also meant grades of ether.\n\nE to F marks the lower region, called \"The Gathering of the Waters and the Production of the Virgin Earth, \" or \"Ares.\n\n\" The alchemists called this \"quicksand,\" the true mystic foundation of the solid earth.\n\nF to G marks the circle of the subterranean air, which is more dense and coarse than that in the outer space, C to D .\n\nIn this denser atmosphere the stellar influences and celestial impulses are crystallized into corporeal spirits, thus forming the multitude of forms which exist without knowledge of their own fiery source.\n\nG is the region of the central fire of the element earth, a coarse fire in contradistinction to the divine fiery Schamayim.\n\nThe sphere of the starry heavens likewise has its opposite in the sphere of the subterranean air; and the sphere of the upper air (or subtle vaporous water) has its opposite in the sphere E to F ."

