[content]
body = "Goodness is sought by all.\n\nIt is the Prime Cause of causes.\n\nGoodness is self-diffused and hence exists in all things, for nothing can produce that which it does not have in itself.\n\nThe Table demonstrates that all is in God and God is in all; that all is in all and each is in each.\n\nIn the intellectual world are invisible spiritual counterparts of the creatures which inhabit the elemental world.\n\nTherefore, the lowest exhibits the highest, the corporeal declares the intellectual, and the invisible i,.\n\nmade manifest by its works.\n\nFor this reason the Egyptians made images of substances existing in the inferior sensible world to serve as visible exemplars of superior and invisible powers.\n\nTo the corruptible images they assigned the virtues of the incorruptible divinities, thus demonstrating arcanely that this world is but the shadow of God, the outward picture of the paradise within.\n\nAll that is in the invisible archetypal sphere is revealed in the sensible corporeal world by the light of Nature.\n\nThe Archetypal and Creative Mind--first through its Paternal Foundation and afterwards through secondary Gods called Intelligences--poured our the whole infinity of its powers by continuous exchange from highest to lowest.\n\nIn their phallic symbolism the Egyptians used the sperm to represent the spiritual spheres, because each contains all that comes forth from it.\n\nThe Chaldeans and Egyptians also held that everything which is a result dwells in the cause of itself and turns to that cause as the lotus to the sun.\n\nAccordingly, the Supreme Intellect, through its Paternal Foundation, first created light--the angelic world.\n\nOut of that light were then created the invisible hierarchies of beings which some call the stars; and out of the stars the four elements and the sensible world were formed.\n\nThus all are in all, after their respective kinds.\n\nAll visible bodies or elements are in the invisible stars or spiritual elements, and the stars are likewise in those bodies; the stars are in the angels and the angels in the stars; the angels are in God and God is in all.\n\nTherefore, all are divinely in the Divine, angelically in the angels, and corporeally in the corporeal world, and vice versa.\n\njust as the seed is the tree folded up, so the world is God unfolded.\n\nProclus says: \"Every property of divinity permeates all creation and gives itself to all inferior creatures.\n\n\"One of the manifestations of the Supreme Mind is the power of reproduction according to species which it confers upon every creature of which it is the divine part.\n\nThus souls, heavens, elements, animals, plants, and stones generate themselves each according to its pattern, but all are dependent upon the one fertilizing principle existing in the Supreme Mind.\n\nThe fecundative power, though of itself a unit, manifests differently through the various substances, for in the mineral it contributes to material existence, in the plant it manifests as vitality, and in the animal as sensibility.\n\nIt imparts motion to the heavenly bodies, thought to the souls of men, intellectuality to the angels, and superessentiality to God.\n\nThus it is seen that all forms are of one substance and all life of one force, and these are co-existent in the nature of the Supreme One.\n\nThis doctrine was first expounded by Plato.\n\nHis disciple, Aristotle, set it forth in these words: \"We say that this Sensible World is an image of another; therefore since this world is vivid or alive, how much more, then, that other must live.\n\n* * * Yonder, therefore, above the stellar virtues, stand other heavens to be attained, like the heavens of this world; beyond them, because they are of a higher kind, brighter and vaster; nor are they distant from each Other like this one, for they are incorporeal."

