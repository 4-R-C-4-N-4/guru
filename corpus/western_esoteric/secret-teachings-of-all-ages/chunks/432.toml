body = "The Great Folio of 1623 is a veritable treasure house of Masonic lore and symbolism, and the time is at hand when that Great Work should be accorded the consideration which is its due.\n\nThough Christianity shattered the material organization of the pagan Mysteries, it could not destroy the knowledge of supernatural power which the pagans possessed.\n\nTherefore it is known that the Mysteries of Greece and Egypt were secretly perpetuated through the early centuries of the church, and later, by being clothed in the symbolism of Christianity, were accepted as elements of that faith.\n\nSir Francis Bacon was one of those who had been entrusted with the perpetuation and dissemination of s the arcana of the superphysical originally in the possession of the pagan hierophants, and to attain that end either formulated the Fraternity of R.C.\n\nor was admitted into an organization already existing under that name and became one of its principal representatives.\n\nTITLE PAGE OF THE FAMOUS FIRST EDITION OF SIR WALTER RALEGH'S HISTORY OF THE WORLD.\n\nFrom Ralegh's History of the World.\n\nWhat was the mysterious knowledge which Sir Walter Ralegh possessed and which was declared to be detrimental to the British government?\n\nWhy was he executed when the charges against him could not be proved?\n\nWas he a member of me of those feared and hated secret societies which nearly overthrew political and religious Europe during the sixteenth and seventeenth centuries?\n\nWas Sir Walter Ralegh an important factor in the Bacon-Shakspere-Rosicrucian-Masonic enigma?\n\nBy those seeking the keys to this great controversy, he seems to have been almost entirely overlooked.\n\nHis contemporaries are unanimous in their praise of his remarkable intellect, and he has long been considered me of Britain's most brilliant sons.\n\nSir Walter Ralegh--soldier, courtier, statesman, writer, poet, philosopher, and explorer--was a scintillating figure at the court of Queen Elizabeth.\n\nUpon this same man, King James--after the death of Elizabeth--heaped every indignity within his power.\n\nThe cowardly James, who shuddered at the mention of weapons and cried like a child when he was crossed, was insanely jealous of the brilliant courtier.\n\nRalegh's enemies, Playing upon the king's weakness, did not cease their relentless persecution until Ralegh had been hanged and his decapitated, quartered, and disemboweled body lay at their feet.\n\nThe title page reproduced above was used by Ralegh's political foes as a powerful weapon against him.\n\nThey convinced James I that the face of the central figure upholding the globe was a caricature of his own, and the enraged king ordered every copy of the engraving destroyed.\n\nBut a few copies escaped the royal wrath; consequently the plate is extremely rare.\n\nThe engraving is a mass Rosicrucian and Masonic symbols, and the figures on the columns in all probability conceal a cryptogram.\n\nMore significant still is the fact that the page facing this plate is a headpiece identical with that used in the 1623 Folio of \"Shakespeare\" and also in Bacon's Novum Organum.\n\n*** For some reason not apparent to the uninitiated there has been a continued and consistent effort to prevent the unraveling of the Baconian skein.\n\nWhatever the power may be which continually blocks the efforts of investigators, it is as unremitting now as it was immediately following Bacon's death, and those attempting to solve the enigma still feel the weight of its resentment.\n\nA misunderstanding world has ever persecuted those who understood the secret workings of Nature, seeking in every conceivable manner to exterminate the custodians of this divine wisdom.\n\nSir Francis Bacon's political prestige was finally undermined and Sir Walter Ralegh met a shameful fate because their transcendental knowledge was considered dangerous."

