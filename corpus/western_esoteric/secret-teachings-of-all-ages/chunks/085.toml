body = "G.) and the King's Chamber is a small antechamber (H), its extreme length 9 feet, its extreme width 5 feet, and its extreme height 12 feet, with its walls grooved far purposes now unknown.\n\nIn the groove nearest the Grand Gallery is a slab of stone in two sections, with a peculiar boss or knob protruding about an inch from the surface of the upper part facing the Grand Gallery.\n\nThis stone does not reach to the floor of the antechamber and those entering the King's Chamber must pass under the slab.\n\nFrom the King's Chamber, the Grand Gallery--157 feet in length, 28 feet in height, 7 feet in width at its widest point and decreasing to 3½ feet as the result of seven converging overlaps, of the stones forming the walls--descends to a little above the level of the Queen's Chamber.\n\nHere a gallery (E) branches off, passing mere than 100 feet back towards the center of the Pyramid and opening into the Queen's Chamber (F).\n\nThe Queen's Chamber is 19 feet long, 17 feet wide, and 20 feet high.\n\nIts roof is peaked and composed of great slabs of stone.\n\nAir passages not shown lead from the Queen's Chamber, but these were not open originally.\n\nIn the east wall of the Queen's Chamber is a peculiar niche of gradually converging stone, which in all likelihood, may prove to be a new lost entrance way.\n\nAt the paint where the Grand Gallery ends and the horizontal passage towards the Queen's Chamber begins is the entrance to the well and also the opening leading down the first ascending passage (D) to the point where this passage meets the descending passage (A) leading from the outer wall of the Pyramid down to the subterranean chamber.\n\nAfter descending 59 feet down the well (P), the grotto is reached.\n\nContinuing through the floor of the grotto the well leads downward 133 feet to the descending entrance passage (A), which it meets a short distance before this passage becomes horizontal and leads into the subterranean chamber.\n\nThe subterranean chamber (O) is about 46 feet long and 27 feet wide, but is extremely low, the ceiling varying in height from a little over 3 feet to about 13 feet from the rough and apparently unfinished floor.\n\nFrom the south side of the subterranean chamber a low tunnel runs about 50 feet and then meets a blank wall.\n\nThese constitute the only known openings in the Pyramid, with the exception of a few niches, exploration holes, blind passages, and the rambling cavernous tunnel (B) hewn out by the Moslems under the leadership of the Prophet's descendant, Caliph al Mamoun.\n\n*** The Sphinx was undoubtedly erected for symbolical purposes at the instigation of the priestcraft.\n\nThe theories that the uræus upon its forehead was originally the finger of an immense sundial and that both the Pyramid and the Sphinx were used to measure time, the seasons, and the precession of the equinoxes are ingenious but not wholly convincing.\n\nIf this great creature was erected to obliterate the ancient passageway leading into the subterranean temple of the Pyramid, its symbolism would be most appropriate.\n\nIn comparison with the overwhelming size and dignity of the Great Pyramid, the Sphinx is almost insignificant.\n\nIts battered face, upon which may still be seen vestiges of the red paint with which the figure was originally covered, is disfigured beyond recognition.\n\nIts nose was broken off by a fanatical Mohammedan, lest the followers of the Prophet be led into idolatry.\n\nThe very nature of its construction and the present repairs necessary to prevent the head from falling off indicate that it could not have survived the great periods of time which have elapsed since the erection of the Pyramid.\n\nTo the Egyptians, the Sphinx was the symbol of strength and intelligence."

