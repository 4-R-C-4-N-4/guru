[content]
body = "Godfrey Higgins has discovered two references, one in the Midrashjoholeth and the other in the Abodazara (early Jewish commentaries on the Scriptures), to the effect that the surname of Joseph's family was Panther , for in both of these works it is stated that a man was healed \"in the name of Jesus ben Panther.\" The name Panther establishes a direct connection between Jesus and Bacchus--who was nursed by panthers and is sometimes depicted riding either on one of these animals or in a chariot drawn by them.\n\nThe skin of the panther was also sacred in certain of the Egyptian initiatory ceremonials.\n\nThe monogram IHS, now interpreted to mean Iesus Hominum Salvator (Jesus Savior of Men), is another direct link between the Christian and the Bacchic rites.\n\nIHS is derived from the Greek ΥΗΣ, which, as its numerical value (608) signifies, is emblematic of the sun and constituted the sacred and concealed name of Bacchus.\n\n(See The Celtic Druids by Godfrey Higgins.) The question arises, Was early Roman Christianity confused with the worship of Bacchus because of the numerous parallelisms in the two faiths?\n\nIf the affirmative can be proved, many hitherto incomprehensible enigmas of the New Testament will be solved.\n\nIt is by no means improbable that Jesus Himself originally propounded as allegories the cosmic activities which were later con fused with His own life.\n\nThat the Χριστός, Christos , represents the solar power reverenced by every nation of antiquity cannot be controverted.\n\nIf Jesus revealed the nature and purpose of this solar power under the name and personality of Christos , thereby giving to this abstract power the attributes of a god-man, He but followed a precedent set by all previous World-Teachers.\n\nThis god-man, thus endowed with all the qualities of Deity, signifies the latent divinity in every man.\n\nMortal man achieves deification only through at-one-ment with this divine Self.\n\nUnion with the immortal Self constitutes immortality, and he who finds his true Self is therefore \"saved.\" This Christos , or divine man in man, is man's real hope of salvation--the living Mediator between abstract Deity and mortal humankind.\n\nAs Atys, Adonis, Bacchus, and Orpheus in all likelihood were originally illumined men who later were confused with the symbolic personages whom they created as personifications of this divine power, so Jesus has been confused with the Christos , or god-man, whose wonders He preached.\n\nSince the Christos was the god-man imprisoned in every creature, it was the first duty of the initiate to liberate, or \"resurrect, \" this Eternal One within himself.\n\nHe who attained reunion with his Christos was consequently termed a Christian , or Christened , man.\n\nOne of the most profound doctrines of the pagan philosophers concerned the Universal Savior-God who lifted the souls of regenerated men to heaven through His own nature.\n\nThis concept was unquestionably the inspiration for the words attributed to Jesus: \"I am the way, the truth, and the life: no man cometh unto the Father but by me.\" In an effort to make a single person out of Jesus and His Christos, Christian writers have patched together a doctrine which must be resolved back into its original constituents if the true meaning of Christianity is to be rediscovered.\n\nIn the Gospel narratives the Christos represents the perfect man who, having passed through the various stages of the \"World Mystery\" symbolized by the thirty-three years, ascends to the heaven sphere where he is reunited with his Eternal Father.\n\nThe story of Jesus as now preserved is--like the Masonic story of Hiram Abiff--part of a secret initiatory ritualism belonging to the early Christian and pagan Mysteries."

