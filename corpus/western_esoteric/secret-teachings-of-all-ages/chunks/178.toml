[content]
body = "As life precedes light, its only symbol is darkness, and darkness is considered as the veil which must eternally conceal the true nature of abstract and undifferentiated Being.\n\nIn ancient times men fought with their right arms and defended the vital centers with their left arms, on which was carried the protecting shield.\n\nThe right half of the body was regarded therefore as offensive and the left half defensive.\n\nFor this reason also the right side of the body was considered masculine and the left side feminine.\n\nSeveral authorities are of the opinion that the present prevalent right-handedness of the race is the outgrowth of the custom of holding the left hand in restraint for defensive purposes.\n\nFurthermore, as the source of Being is in the primal darkness which preceded light, so the spiritual nature of man is in the dark part of his being, for the heart is on the left side.\n\nAmong the curious misconceptions arising from the false practice of associating darkness with evil is one by which several early nations used the right hand for all constructive labors and the left hand for only those purposes termed unclean and unfit for the sight of the gods.\n\nFor the same reason black magic was often referred to as the left-hand path, and heaven was said to be upon the right and hell upon the left.\n\nSome philosophers further declared that there were two methods of writing: one from left to right, which was considered the exoteric method; the other from right to left, which was considered esoteric.\n\nThe exoteric writing was that which was done out or away from the heart, while the esoteric writing was that which--like the ancient Hebrew--was written toward the heart.\n\nThe secret doctrine declares that every part and member of the body is epitomized in the brain and, in turn, that all that is in the brain is epitomized in the heart.\n\nIn symbolism the human head is frequently used to represent intelligence and self-knowledge.\n\nAs the human body in its entirety is the most perfect known product of the earth's evolution, it was employed to represent Divinity--the highest appreciable state or condition.\n\nArtists, attempting to portray Divinity, often show only a hand emerging from an impenetrable cloud.\n\nThe cloud signifies the Unknowable Divinity concealed from man by human limitation.\n\nThe hand signifies the Divine activity, the only part of God which is cognizable to the lower senses.\n\nThe face consists of a natural trinity: the eyes representing the spiritual power which comprehends; the nostrils representing the preservative and vivifying power; and the mouth and ears representing the material Demiurgic power of the lower world.\n\nThe first sphere is eternally existent and is creative; the second sphere pertains to the mystery of the creative breach; and the third sphere to the creative word.\n\nBy the Word of God the material universe was fabricated, and the seven creative powers, or vowel sounds--which had been brought into existence by the speaking of the Word--became the seven Elohim or Deities by whose power and ministration the lower world was organized.\n\nOccasionally the Deity is symbolized by an eye, an ear, a nose, or a mouth.\n\nBy the first, Divine awareness is signified; by the second, Divine interest; by the third, Divine vitality; and by the fourth, Divine command.\n\nThe ancients did not believe that spirituality made men either righteous or rational, but rather that righteousness and rationality made men spiritual.\n\nThe Mysteries taught that spiritual illumination was attained only by bringing the lower nature up to a certain standard of efficiency and purity.\n\nThe Mysteries were therefore established for the purpose of unfolding the nature of man according to certain fixed rules which, when faithfully followed, elevated the human consciousness to a point where it was capable of cognizing its own constitution and the true purpose of existence."

