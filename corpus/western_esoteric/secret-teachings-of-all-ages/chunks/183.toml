body = "King Solomon began the building of the temple in the fourth year of his reign on what would be, according to modern calculation, the 21st day of April, and finished it in the eleventh year of his reign on the 23rd day of October.\n\nThe temple was begun in the 480th year after the children of Israel had passed the Red Sea.\n\nPart of the labor of construction included the building of an artificial foundation on the brow of Mount Moriah.\n\nThe stones for the temple were hoisted from quarries directly beneath Mount Moriah and were trued before being brought to the surface.\n\nThe brass and golden ornaments for the temple were cast in molds in the clay ground between Succoth and Zeredatha, and the wooden parts were all finished before they reached the temple site.\n\nThe building was put together, consequently, without sound and without instruments, all its parts fitting exactly \"without the hammer of contention, the axe of division, or any tool of mischief.\" Anderson's much-discussed Constitutions of the Free-Masons , published in London in 1723, and reprinted by Benjamin Franklin in Philadelphia in 1734, thus describes the division of the laborers engaged in the building of the Everlasting House: \"But Dagon's Temple, and the finest structures of Tyre and Sidon, could not be compared with the Eternal God's Temple at Jerusalem, * * * there were employed about it no less than 3,600 Princes, or Master-Masons, to conduct the work according to Solomon's directions, with 80,000 hewers of stone in the mountain, or Fellow Craftsmen, and 70,000 labourers, in all 153,600 besides the levy under Adoniram to work in the mountains of Lebanon by turns with the Sidonians, viz., 30,000, being in all 183,600.\" Daniel Sickels gives 3,300 overseers, instead of 3,600, and lists the three Grand Masters separately.\n\nThe same author estimates the cost of the temple at nearly four thousand millions of dollars.\n\nThe Masonic legend of the building of Solomon's Temple does not in every particular parallel the Scriptural version, especially in those portions relating to CHiram Abiff.\n\nAccording to the Biblical account, this Master workman returned to his own country; in the Masonic allegory he is foully murdered.\n\nOn this point A.\n\nE.\n\nWaite, in his New Encyclopædia of Freemasonry , makes the following explanatory comment: \"The legend of the Master-Builder is the great allegory of Masonry.\n\nIt happens that his figurative story is grounded on the fact of a personality mentioned in Holy Scripture, but this historical background is of the accidents and not the essence; the significance is in the allegory and not in any point of history which may lie behind it.\" CHiram, as Master of the Builders, divided his workmen into three groups, which were termed Entered Apprentices , Fellow-Craftsmen , and Master Masons .\n\nTo each division he gave certain passwords and signs by which their respective excellence could be quickly determined.\n\nWhile all were classified according to their merits some were dissatisfied, for they desired a more exalted position than they were capable of filling.\n\nAt last three Fellow-Craftsmen, more daring than their companions, determined to force CHiram to reveal to them the password of the Master's degree.\n\nKnowing that CHiram always went into the unfinished sanctum sanctorum at high noon to pray, these ruffians --whose names were Jubela, Jubelo, and Jubelum--lay in wait for him, one at each of the main gates of the temple.\n\nCHiram, about to leave the temple by the south gate, was suddenly confronted by Jubela armed with a twenty-four-inch gauge."

