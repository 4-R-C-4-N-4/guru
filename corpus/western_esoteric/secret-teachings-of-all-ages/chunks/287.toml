[content]
body = "God is One above three, three are above seven, seven are above twelve, yet all are linked together.\n\n9.\n\nThere are twenty-two letters by which the I AM (YAH), the Lord of Hosts, Almighty and Eternal, designed and created by three Sepharim (Numbers, Letters, and Sounds) His universe, and formed by them all creatures and all those things that are yet to come.\n\n10.\n\nWhen the Patriarch Abraham had comprehended the great truths, meditated upon them, and understood them perfectly, the Lord of the Universe (the Tetragrammaton) appeared to him, called him His friend, kissed him upon the head, and made with him a covenant.\n\nFirst, the covenant was between the ten fingers of his hands, which is the covenant of the tongue (spiritual); second, the covenant was between the ten toes of his feet, which is the covenant of circumcision (material); and God said of him, \"Before Abraham bound the spirit of the twenty-two letters (the Thora) upon his tongue and God disclosed to him their secrets.\n\nGod permitted the letters to be immersed in water, He burned them in the fire and imprinted them upon the winds.\n\nHe distributed them among the seven planets and gave them to the twelve zodiacal signs."

