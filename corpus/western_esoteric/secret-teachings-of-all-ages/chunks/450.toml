body = "But Freemasonry most of all owes to the Dionysiac cult the great mass of its symbols and rituals which are related to the science of architecture.\n\nFrom these ancient and illustrious artisans it also received the legacy of the unfinished Temple of Civilization-that vast, invisible structure upon which these initiated builders have labored continuously since the inception of their fraternity.\n\nThis mighty edifice, which has fallen and been rebuilt time after time but whose foundations remain unmoved, is the true Everlasting House of which the temple on the brow of Mount Moriah was but an impermanent symbol.\n\nAside from the operative aspect of their order, the Dionysiac Architects had a speculative philosophic code.\n\nHuman society they considered as a rough and untrued ashlar but lately chiseled from the quarry of elemental Nature.\n\nThis crude block was the true object upon which these skilled craftsmen labored--polishing it, squaring it, and with the aid of fine carvings transforming it into a miracle of beauty.\n\nWhile mystics released their souls from the bondage of matter by meditation and philosophers found their keenest joy in the profundities of thought, these master workmen achieved liberation from the Wheel of Life and Death by learning to swing their hammers with the same rhythm that moves the swirling forces of Cosmos.\n\nThey venerated the Deity under the guise of a Great Architect and Master Craftsman who was ever gouging rough ashlars from the fields of space and truing them into universes.\n\nThe Dionysians affirmed constructiveness to be the supreme expression of the soul, and attuning themselves with the ever-visible constructive natural processes going on around them, believed immortality could be achieved by thus becoming a part of the creative agencies of Nature.\n\nSOLOMON, THE PERSONIFICATION OF UNIVERSAL WISDOM The name Solomon may be divided into three syllables, SOL-OM-ON, symbolizing light, glory, and truth collectively and respectively.\n\nThe Temple of Solomon is, therefore, first of all \"the House of Everlasting Light,\" its earthly symbol being the temple of stone on the brow of Mount Moriah.\n\nAccording to the Mystery teachings, there are three Temples of Solomon--as there are three Grand Masters, three Witnesses, and three Tabernacles of the Transfiguration.\n\nThe first temple is the Grand House of the Universe, in the midst of which sits the sun (SOL) upon his golden throne.\n\nThe twelve signs of the zodiac as Fellow-Craftsmen gather around their shining lord.\n\nThree lights--the stellar, the solar, and the lunar--illuminate this Cosmic Temple.\n\nAccompanied by his retinue of planets, moons, and asteroids, this Divine King (SOLomon), whose glory no earthly monarch shall ever equal, passes in stately pomp down the avenues of space.\n\nWhereas CHiram represents the active physical light of the sun, SOLomon signifies its invisible but all-powerful, spiritual and intellectual effulgency.\n\nThe second symbolic temple is the human body-the Little House made in the image of the Great Universal House.\n\n\"Know ye not,\" asked the Apostle Paul, \"that ye are the temple of God, and that the Spirit of God dwelleth in you?\" Freemasonry within a temple of stone cannot be other than speculative, but Freemasonry within the living temple of the body is operative.\n\nThe third symbolic temple is the Soul ar House, an invisible structure, the comprehension of which is a supreme Freemasonic arcanum.\n\nThe mystery of this intangible edifice is concealed under the allegory of the Soma Psuchicon , or Wedding Garment described by St.\n\nPaul, the Robes of Glory of the High Priest of Israel, the Yellow Robe of the Buddhist monk, and the Robe of Blue and Gold to which Albert Pike refers in his Symbolism ."

