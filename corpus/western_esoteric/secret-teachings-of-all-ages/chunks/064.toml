body = "Sir James George Frazer cites Jerome thus: \"He tells us that Bethlehem, the traditionary birthplace of the Lord, was shaded by a grove of that still older Syrian Lord, Adonis, and that where the infant Jesus had wept, the lover of Venus was bewailed.\" (See The Golden Bough .) The effigy of a wild boar is said to have been set over one of the gates of Jerusalem in honor of Adonis, and his rites celebrated in the grotto of the Nativity at Bethlehem.\n\nAdonis as the \"gored\" (or \"god\") man is one of the keys to Sir Francis Bacon's use of the \"wild boar\" in his cryptic symbolism.\n\nAdonis was originally an androgynous deity who represented the solar power which in the winter was destroyed by the evil principle of cold--the boar.\n\nAfter three days (months) in the tomb, Adonis rose triumphant on the 25th day of March, amidst the acclamation of his priests and followers, \"He is risen!\" Adonis was born out of a myrrh tree.\n\nMyrrh, the symbol of death because of its connection with the process of embalming, was one of the gifts brought by the three Magi to the manger of Jesus.\n\nIn the Mysteries of Adonis the neophyte passed through the symbolic death of the god and, \"raised\" by the priests, entered into the blessed state of redemption made possible by the sufferings of Adonis.\n\nNearly all authors believe Adonis to have been originally a vegetation god directly connected with the growth and maturing of flowers and fruits.\n\nIn support of this viewpoint they describe the \"gardens of Adonis, \" which were small baskets of earth in which seeds were planted and nurtured for a period of eight days.\n\nWhen those plants prematurely died for lack of sufficient earth, they were considered emblematic of the murdered Adonis and were usually cast into the sea with images of the god.\n\nIn Phrygia there existed a remarkable school of religious philosophy which centered around the life and untimely fate of another Savior-God known as Atys , or Attis , by many considered synonymous with Adonis.\n\nThis deity was born at midnight on the 24th day of December.\n\nOf his death there are two accounts.\n\nIn one he was gored to death like Adonis; in the other he emasculated himself under a pine tree and there died.\n\nHis body was taken to a cave by the Great Mother (Cybele), where it remained through the ages without decaying.\n\nTo the rites of Atys the modern world is indebted for the symbolism of the Christmas tree.\n\nAtys imparted his immortality to the tree beneath which he died, and Cybele took the tree with her when she removed the body.\n\nAtys remained three days in the tomb, rose upon a date corresponding with Easter morn, and by this resurrection overcame death for all who were initiated into his Mysteries.\n\n\"In the Mysteries of the Phrygians, \"says Julius Firmicus, \"which are called those of the MOTHER OF THE GODS, every year a PINE TREE is cut down and in the inside of the tree the image of a YOUTH is tied in!\n\nIn the Mysteries of Isis the trunk of a PINE TREE is cut: the middle of the trunk is nicely hollowed out; the idol of Osiris made from those hollowed pieces is BURIED.\n\nIn the Mysteries of Proserpine a tree cut is put together into the effigy and form of the VIRGIN, and when it has been carried within the city it is MOURNED 40 nights, but the fortieth night it is BURNED!\" (See Sod, the Mysteries of Adoni .) THE GREAT GOD PAN."

