body = "First, it is the symbol of the death of his Redeemer, through whose martyrdom he feels that he partakes of the glory of God; secondly, it is the symbol of humility, patience, and the burden of life.\n\nIt is interesting that the cross should be both a symbol of life and a symbol of death.\n\nMany nations deeply considered the astronomical aspect of religion, and it is probable that the Persians, Greeks, and Hindus looked upon the cross as a symbol of the equinoxes and the solstices, in the belief that at certain seasons of the year the sun was symbolically crucified upon these imaginary celestial angles.\n\nThe fact that so many nations have regarded their Savior as a personification of the sun globe is convincing evidence that the cross must exist as an astronomical element in pagan allegory.\n\nAugustus Le Plongeon believed that the veneration for the cross was partly due to the rising of a constellation called the Southern Cross, which immediately preceded the annual rains, and as the natives of those latitudes relied wholly upon these rains to raise their crops, they viewed the cross as an annual promise of the approaching storms, which to them meant life.\n\nThere are four basic elements (according to both ancient philosophy and modern science), and the ancients represented them by the four arms of the cross, placing at the end of each arm a mysterious Qabbalistic creature to symbolize the power of one of these elements.\n\nThus, they symbolized the element of earth by a bull; water by a scorpion, a serpent, or an eagle; fire by a lion; and air by a human head surrounded by wings.\n\nIt is significant that the four letters inscribed upon parchment (some say wood) and fastened to the top of the cross at the time of the crucifixion should be the first letters of four Hebrew words which stand for the four elements: \" Iammin , the sea or water; Nour , fire; Rouach , the air; and Iebeschah , the dry earth.\" (See Morals and Dogma , by Albeit Pike.) THE EASTER ISLAND FIGURE SHOWING CRUX ANSATA ON REVERSE That the Crux Ansata migrated to many parts of the earth is proved by the fact that it was sculptured upon the back of at least one of the mysterious stone figures found on Easter Island in the south Pacific.\n\nThe statue in question--one of the smallest in the group--was brought to London by a sailing ship, and is now in the British Museum; the Crux Ansata on the reverse side is plainly visible.\n\n*** That a cross can be formed by opening or unfolding the surfaces of a cube has caused that symbol to be associated with the earth.\n\nThough a cross within a circle has long been regarded as a sign of the planet Earth, it should really be considered as the symbol of the composite element earth, since it is composed of the four triangles of the elements.\n\nFor thousands of years the cross has been identified with the plan of salvation for humanity.\n\nThe elements--salt, sulphur, mercury, and Azoth--used in making the Philosopher's Scone in Alchemy, were often symbolized by a cross.\n\nThe cross of the four cardinal angles also had its secret significance, and Masonic parties of three still go forth to the four cardinal points of the compass in search of the Lost Word.\n\nThe material of which the cross was formed was looked upon as being an essential element in its symbolism.\n\nThus, a golden cross symbolized illumination; a silver cross, purification; a cross of base metals, humiliation; a cross of wood, aspiration.\n\nThe fact that among many nations it was customary to spread the arms in prayer has influenced the symbolism of the cross, which, because of its shape, has come to be regarded as emblematic of the human body."

