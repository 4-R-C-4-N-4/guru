[content]
body = "EACH of the four primary elements as taught by the early philosophers has its analogue in the quaternary terrestrial constitution of man.\n\nThe rocks and earth correspond to the bones and flesh; the water to the various fluids; the air to the gases; and the fire to the bodily heat.\n\nSince the bones are the framework that sustains the corporeal structure, they may be regarded as a fitting emblem of the spirit--that divine foundation which supports the composite fabric of mind, soul, and body.\n\nTo the initiate, the skeleton of death holding in bony fingers the reaper's scythe denotes Saturn (Kronos), the father of the gods, carrying the sickle with which he mutilated Ouranos, his own sire.\n\nIn the language of the Mysteries, the spirits of men are the powdered bones of Saturn .\n\nThe latter deity was always worshiped under the symbol of the base or footing, inasmuch as he was considered to be the substructure upholding creation.\n\nThe myth of Saturn has its historical basis in the fragmentary records preserved by the early Greeks and Phœnicians concerning a king by that name who ruled over the ancient continent of Hyperborea.\n\nPolaris, Hyperborea, and Atlantis, because they lie buried beneath the continents and oceans of the modern world, have frequently been symbolized as rocks supporting upon their broad surfaces new lands, races, and empires.\n\nAccording to the Scandinavian Mysteries, the stones and cliffs were formed from the bones of Ymir, the primordial giant of the seething clay , while to the Hellenic mystics the rocks were the bones of the Great Mother, Gæa.\n\nAfter the deluge sent by the gods to destroy mankind at the close of the Iron Age, only Deucalion and Pyrrha were left alive.\n\nEntering a ruined sanctuary to pray, they were directed by an oracle to depart from the temple and with heads veiled and garments unbound cast behind them the bones of their mother.\n\nConstruing the cryptic message of the god to mean that the earth was the Great Mother of all creatures, Deucalion picked up loose rocks and, bidding Pyrrha do likewise, cast them behind him.\n\nFrom these rocks there sprang forth a new and stalwart race of human beings, the rocks thrown by Deucalion becoming men and those thrown by Pyrrha becoming women.\n\nIn this allegory is epitomized the mystery of human evolution; for spirit, by ensouling matter, becomes that indwelling power which gradually but sequentially raises the mineral to the status of the plant; the plant to the plane of the animal; the animal to the dignity of man; and man to the estate of the gods.\n\nThe solar system was organized by forces operating inward from the great ring of the Saturnian sphere; and since the beginnings of all things were under the control of Saturn, the most reasonable inference is that the first forms of worship were dedicated to him and his peculiar symbol--the stone.\n\nThus the intrinsic nature of Saturn is synonymous with that spiritual rock which is the enduring foundation of the Solar Temple, and has its antitypc or lower octave in that terrestrial rock--the planet Earth--which sustains upon its jagged surface the diversified genera of mundane life.\n\nAlthough its origin is uncertain, litholatry undoubtedly constitutes one of the earliest forms of religious expression.\n\n\"Throughout all the world, \" writes Godfrey Higgins, \"the first object of Idolatry seems to have been a plain, unwrought stone, placed in the ground, as an emblem of the generative or procreative powers of nature.\" (See The Celtic Druids .) Remnants of stone worship are distributed over the greater part of the earth's surface, a notable example being the menhirs at Carnac, in Brittany, where several thousand gigantic uncut stones are arranged in eleven orderly rows."

