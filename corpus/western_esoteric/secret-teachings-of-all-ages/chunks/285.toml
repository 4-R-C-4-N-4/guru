body = "The simple letters correspond to twelve directions: east height, northeast, east depth; south height, southeast, south depth; west height, southwest, west depth; north height, northwest, north depth.\n\nThey diverge to all eternity and are the arms of the universe.\n\n3.\n\nThe simple letters having been designed, established, weighed, and exchanged by God, He produced by them twelve zodiacal signs in the universe, twelve months in the year, and twelve chief organs in ` human body (male and female).\n\n4, The signs of the zodiac are: Aries, Taurus, Gemini, Cancer, Leo, Virgo, Libra, Scorpio, Sagittarius, Capricorn, Aquarius, and Pisces.\n\nThe months of the year are: Nisan, liar, Sivan, Tammuz, Ab, Elul, Tisri, Marcheshvan, Kislev, Tebet, Sebat, and Adar.\n\nThe organs of the human body are: two hands, two feet, two kidneys, gall, small intestine, liver, esophagus, stomach, and spleen.\n\n5.\n\nNOTE.\n\nIn the following twelve stanzas, Knut Stenring again differs, this time as to the arrangement of properties: 1st .\n\nGod caused the letter ה(H) to predominate in speech, crowned it, combined it with the others, and fashioned by them Aries (the Ram) in the universe, the month Nisan in the year, and the right foot of the human body (male and female).\n\n2nd .\n\nHe caused the letter ו(V) to predominate in thought, crowned it, combined it with the others, and fashioned by them Taurus (the Bull) in the universe, the month liar in the year, and the right kidney of the human body (male and female).\n\n3rd .\n\nHe caused the letter ז(Z) to predominate in movement, crowned it, combined it with the others, and fashioned by them Gemini (the Twins) in the universe, the month Sivan in the year, and the left foot of the human body (male and female).\n\n4th .\n\nHe caused the letter ח(Ch) to predominate in sight, crowned it, combined it with the others, and fashioned by them Cancer (the Crab) in the universe, the month Tammuz in the year, and the right hand of the human body (male and female).\n\n5th .\n\nHe caused the letter ט(T) to predominate in hearing, crowned it, combined it with the others, and fashioned by them Leo (the Lion) in the universe, the month Ab in the year, and the left kidney of the human body (male and female).\n\n6th .\n\nHe caused the letter י(I) to predominate in work, crowned it, combined it with the others, and fashioned by them Virgo (the Virgin) in the universe, the month Elul in the year, and the left hand of the human body (male and female).\n\n7th .\n\nHe caused the letter ל(L) to predominate in coition, crowned it, combined it with the others, and fashioned by them Libra (the Balance) in the universe, the month Tisri in the year, and the gall of the human body (male and female).\n\n8th .\n\nHe caused the letter נ(N) to predominate in smell, crowned it, combined it with the others, and fashioned by them Scorpio (the Scorpion) in the universe, the month Marcheshvan in the year, and the small intestine in the human body (male and female).\n\n9th ."

