body = "During the centuries just prior to the Christian Era, the secrets of the pagan Mysteries had gradually fallen into the hands of the profane.\n\nTo the student of comparative religion it is evident that these secrets, gathered by a small group of faithful philosophers and mystics, were reclothed in new symbolical garments and thus preserved for several centuries under the name of Mystic Christianity .\n\nIt is generally supposed that the Essenes were the custodians of this knowledge and also the initiators and educators of Jesus.\n\nIf so, Jesus was undoubtedly initiated in the same temple of Melchizedek where Pythagoras had studied six centuries before.\n\nThe Essenes--the most prominent of the early Syrian sects--were an order of pious men and women who lived lives of asceticism, spending their days in simple labor and their evenings in prayer.\n\nJosephus, the great Jewish historian, speaks of them in the highest terms.\n\n\"They teach the immortality of the soul,\" he says, \"and esteem that the rewards of righteousness are to be earnestly striven for.\" In another place he adds, \"Yet is their course of life better than that of other men and they entirely addict themselves to husbandry.\n\n\" The name Essenes is supposed to be derived from an ancient Syrian word meaning \"physician,\" and these kindly folk are believed to have held as their purpose of existence the healing of the sick in mind, soul, and body.\n\nAccording to Edouard Schuré, they had two principal communities, or centers, one in Egypt on the banks of Lake Maoris, the other in Palestine at Engaddi, near the Dead Sea.\n\nSome authorities trace the Essenes back to the schools of Samuel the Prophet, but most agree on either an Egyptian or Oriental origin.\n\nTheir methods of prayer, meditation, and fasting were not unlike those of the holy men of the Far East.\n\nMembership in the Essene Order was possible only after a year of probation.\n\nThis Mystery school, like so many others, had three degrees, and only a few candidates passed successfully through all.\n\nThe Essenes were divided into two distinct communities, one consisting of celibates and the other of members who were married.\n\nThe Essenes never became merchants or entered into the commercial life of cities, but maintained themselves by agriculture and the raising of sheep for wool; also by such crafts as pottery and carpentry.\n\nIn the Gospels and Apocrypha, Joseph, the father of Jesus, is referred to as both a carpenter and a potter.\n\nIn the Apocryphal Gospel of Thomas and also that of Pseudo-Matthew, the child Jesus is described as making sparrows out of clay which came to life and flew away when he clapped his hands.\n\nThe Essenes were regarded as among the better educated class of Jews and there are accounts of their having been chosen as tutors for the children of Roman officers stationed in Syria.\n\nThe fact that so many artificers were listed among their number is responsible for the order's being considered as a progenitor of modern Freemasonry.\n\nThe symbols of the Essenes include a number of builders' tools, and they were secretly engaged in the erection of a spiritual and philosophical temple to serve as a dwelling place for the living God.\n\nTHE GREAT GEORGE AND COLLAR OF THE GARTER.\n\nFrom Ashmole's Order of the Garter.\n\nThe Order of the Garter was probably formed by Edward III in imitation of King Arthur's Knights of the Round Table, which institution was hopelessly scattered after the battle of Kamblan.\n\nThe popular story to the effect that the Countess of Salisbury's garter was the original inspiration for the foundation of the order is untenable.\n\nThe motto of the Order of the Carter is \"Honi soit qui mal y pense\" (Shamed be he who thinks evil of it).\n\nSt."

