body = "Surrounding the black star are the signs of the zodiac symbolized by the twelve Simple Letters.\n\nIn the midst of this star is the Invisible Throne of the Most Ancient of the Ancients--the Supreme Definitionless Creator.\n\n*** 8.\n\nNOTE.\n\nKnut Stenring differs from other authorities in his arrangement of the planets and days of the week in the following seven stanzas.\n\nKircher has still a different order.\n\nRev.\n\nDr.\n\nIsidor Kalisch, Wm.\n\nWynn Westcott, and The Sacred Books and Early Literature of the East adopt the following arrangement.\n\n1st .\n\nHe caused the letter.\n\nב(B) to predominate in wisdom, crowned it, combined each with the others, and formed by them the Moon in the universe, the first day in the year, and the right eye in man (male and female).\n\n2nd .\n\nHe caused the letter ג(G) to predominate in riches, crowned it, combined each with the others, and formed by them Mars in the universe, the second day in the year, and the right ear in man (male and female).\n\n3rd .\n\nHe caused the letter ד(D) to predominate infertility, crowned it, combined each with the others, and formed by them the Sun in the universe, the third day in the year, and the right nostril in man (male and female).\n\n4th .\n\nHe caused the letterכ(K) to predominate in life, crowned it, combined each with the others, and formed by them Venus in the universe, the fourth day in the year, and the left eye in man (male and female).\n\n5th .\n\nHe caused the letter פ(P) to predominate in power, crowned it, combined each with the others, and formed by them Mercury in the universe, the fifth day in the year, and the left ear in man (male and female).\n\n6th .\n\nHe caused the letter ר(R) to predominate in peace, crowned it, combined each with the others, and formed by them Saturn in the universe, the sixth day in the year, and the left nostril in man (male and female).\n\n7th .\n\nHe caused the letter ת(Th) to predominate in grace, crowned it, combined each with the others, and formed by them Jupiter in the universe, the seventh day in the year, and the mouth of man (male and female).\n\n9.\n\nWith the seven double letters He also designed seven earths, seven heavens, seven continents, seven seas, seven rivers, seven deserts, seven days, seven weeks (from Passover to Pentecost), and in the midst of them His Holy Palace.\n\nThere is a cycle of seven years and the seventh is the release year, and after seven release years is the Jubilee.\n\nFor this reason God loves the number seven more than any other thing under the heavens.\n\n10.\n\nIn this manner God joined the seven double letters together.\n\nTwo stones build two houses, three stones build six houses, four stones build twenty-four houses, five stones build 120 houses, six stones build 720 houses, and seven stones build 5,040 houses.\n\nMake a beginning according to this arrangement and reckon further than the mouth can express or the ear can hear.\n\nChapter Five 1.\n\nThe twelve simple letters הוזחטילנסעצק(H, V, Z, Ch, T, I, L, N, S, O, Tz, Q) symbolize the twelve fundamental properties: speech, thought, movement, sight, hearing, work, coition, smell, sleep, anger, taste (or swallowing), and mirth.\n\n2."

