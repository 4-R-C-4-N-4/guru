body = "Again and again his bones were dug up and reinterred in another place.\n\nThe slab of marble over his grave bears the following inscription: \" Here lies buried Philip Theophrastus the famous Doctor of Medicine who cured Wounds, Leprosy, Gout, Dropsy and other incurable Maladies of the Body, with wonderful Knowledge and gave his Goods to be divided and distributed to the Poor.\n\nIn the Year 1541 on the 24th day of September he exchanged Life for Death.\n\nTo the Living Peace, to the Sepulchred Eternal Rest .\" A.\n\nM.\n\nStoddart, in her Life of Paracelsus , gives a remarkable testimonial of the love which the masses had for the great physician.\n\nReferring to his tomb, she writes: \"To this day the poor pray there.\n\nHohenheim's memory has 'blossomed in the dust' to sainthood, for the poor have canonized him.\n\nALBERTUS MAGNUS.\n\nFrom Jovius' Vitae Illustrium Virorum.\n\nAlbert de Groot was born about 1206 and died at the age of 74.\n\nIt has been said of him that he was \"magnus in magia, major in philosophia, maximus in theologia.\" He was a member of the Dominican order and the mentor of St.\n\nThomas Aquinas in alchemy and philosophy.\n\nAmong other positions of dignity occupied by Albertus Magnus was that of Bishop of Regensburg.\n\nHe was beatified in 1622.\n\nAlbertus was an Aristotelian philosopher, an astrologer, and a profound student of medicine and physics.\n\nDuring his youth, he was considered of deficient mentality, but his since service and devotion were rewarded by a vision in which the Virgin Mary appeared to him and bestowed upon him great philosophical and intellectual powers.\n\nHaving become master of the magical sciences, Albertus began the construction of a curious automaton, which he invested with the powers of speech and thought.\n\nThe Android, as it was called, was composed of metals and unknown substances chosen according to the stars and endued with spiritual qualities by magical formulæ and invocations, and the labor upon it consumed over thirty years.\n\nSt.\n\nThomas Aquinas, thinking the device to be a diabolical mechanism, destroyed it, thus frustrating the labor of a lifetime.\n\nIn spite of this act, Albertus Magnus left to St.\n\nThomas Aquinas his alchemical formulæ, including (according to legend) the secret of the Philosopher's Stone.\n\nOn one occasion Albertus Magnus invited William II, Count of Holland and King of the Romans, to a garden party in midwinter.\n\nThe ground was covered with snow, but Albertus, had prepare a sumptuous banquet in the open grounds of his monastery at Cologne.\n\nThe guests were amazed at the imprudence of the philosopher, but as they sat down to eat Albertus, uttered a few words, the snow disappeared, the garden was filled with flowers and singing birds, and the air was warm with the breezes of summer.\n\nAs soon as the feast was over, the snow returned, much to the amazement of the assembled nobles.\n\n(For details, see The Lives of Alchemystical Philosophers.) *** When cholera threatened Salzburg in 1830, the people made a pilgrimage to his monument and prayed him to avert it from their homes.\n\nThe dreaded scourge passed away from them and raged in Germany and the rest of Austria.\" It was supposed that one early teacher of Paracelsus was a mysterious alchemist who called himself Solomon Trismosin.\n\nConcerning this person nothing is known save that after some years of wandering he secured the formula of transmutation and claimed to have made vast amounts of gold.\n\nA beautifully illuminated manuscript of this author, dated 1582 and called Splendor Solis, is in the British Museum."

