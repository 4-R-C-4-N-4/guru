[content]
body = "By our divinely revealed system--which partakes much of theology and medicine but little of jurisprudence--we analyze the heavens and the earth; but mostly we study man himself, within whose nature is concealed the supreme secret.\n\nIf the learned of out day will accept our invitation and join themselves to our Fraternity, we will reveal to them undreamed-of secrets and wonders concerning the hidden workings of Nature.\n\nChapter III .\n\nDo not believe that the secrets discussed in this brief document are lightly esteemed by us.\n\nWe cannot describe fully the marvels of our Fraternity lest the uninformed be overwhelmed by our astonishing declarations and the vulgar ridicule the mysteries which they do not comprehend.\n\nWe also fear that many will be confused by the unexpected generosity of our proclamation, for not understanding the wonders of this sixth age they do nor realize the great changes which are to come.\n\nLike blind men living in a world full of light, they discern only through the sense of feeling.\n\n[By sight is implied spiritual cognition: by feeling , the material senses.] Chapter IV .\n\nWe firmly believe that through deep meditation on the inventions of the human mind and the mysteries of life, through the cooperation of the angels and spirits, and through experience and long observation, our loving Christian Father C.R.C.\n\nwas so fully illumined with God's wisdom that were all the books and writings of the world lost and the foundations of science overturned, the Fraternity of R.C.\n\ncould reestablish the structure of world thought upon the foundation of divine truth and integrity.\n\nBecause of the great depth and perfection of our knowledge, those desiring to understand the mysteries of the Fraternity of R.\n\nC.\n\ncannot attain to that wisdom immediately, but must grow in understanding and knowledge.\n\nTherefore, our Fraternity is divided into grades through which each must ascend step by step to the Great Arcanum.\n\nNow that it has pleased God to lighten unto us His sixth candelabrum, is it not better to seek truth in this way than to wander through the labyrinths of worldly ignorance?\n\nFurthermore, those who receive this knowledge shall become masters of all arts and crafts; no secret shall be hidden from them; and all good works of the past, present, and future shall be accessible to them.\n\nThe whole world shall become as one book and the contradictions of science and theology shall be reconciled.\n\nRejoice, O humanity!\n\nfor the time has come when God has decreed that the number of our Fraternity shall be increased, a labor that we have joyously undertaken.\n\nThe doors of wisdom are now open to the world, but only to those who have earned the privilege may the Brothers present themselves, for it is forbidden to reveal our knowledge even to our own children.\n\nThe right to receive spiritual truth cannot be inherited: it must be evolved within the soul of man himself.\n\nChapter V .\n\nThough we may be accused of indiscretion in offering our treasures so freely and promiscuously--without discriminating between the godly, the wise, the prince, the peasant--we affirm that we have not betrayed our trust; for although we have published our Fama in five languages, only those understand it who have that right.\n\nOur Society is not to be discovered by curiosity seekers, but only by serious and consecrated thinkers; nevertheless we have circulated our Fama in five mother tongues so that the righteous of all nations may have an opportunity to know of us, even though they be not scholars.\n\nA thousand times the unworthy may present themselves and clamor at the gates, but God has forbidden us of the Fraternity of R.C.\n\nto hear their voices, and He has surrounded us with His clouds and His protection so that no harm may come to us, and God has decreed that we of the Order of R.C.\n\ncan no longer be seen by mortal eyes unless they have received strength borrowed from the eagle."

