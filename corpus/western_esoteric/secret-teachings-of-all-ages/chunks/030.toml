body = "The most striking adornment of the Arch-Druid was the iodhan moran, or breastplate of judgment, which possessed the mysterious Power of strangling any who made an untrue statement while wearing it.\n\nGodfrey Higgins states that this breastplate was put on the necks of witnesses to test the veracity of their evidence.\n\nThe Druidic tiara, or anguinum, its front embossed with a number of points to represent the sun's rays, indicated that the priest was a personification of the rising sun.\n\nOn the front of his belt the Arch-Druid wore the liath meisicith--a magic brooch, or buckle in the center of which was a large white stone.\n\nTo this was attributed the power of drawing the fire of the gods down from heaven at the priest's command This specially cut stone was a burning glass, by which the sun's rays were concentrated to light the altar fires.\n\nThe Druids also had other symbolic implements, such as the peculiarly shaped golden sickle with which they cut the mistletoe from the oak, and the cornan, or scepter, in the form of a crescent, symbolic of the sixth day of the increasing moon and also of the Ark of Noah.\n\nAn early initiate of the Druidic Mysteries related that admission to their midnight ceremony was gained by means of a glass boat, called Cwrwg Gwydrin.\n\nThis boat symbolized the moon, which, floating upon the waters of eternity, preserved the seeds of living creatures within its boatlike crescent.\n\n*** In order to reach the exalted position of Arch-Druid , or spiritual head of the organization, it was necessary for a priest to pass through the six successive degrees of the Druidic Order.\n\n(The members of the different degrees were differentiated by the colors of their sashes, for all of them wore robes of white.) Some writers are of the opinion that the title of Arch-Druid was hereditary, descending from father to son, but it is more probable that the honor was conferred by ballot election.\n\nIts recipient was chosen for his virtues and integrity from the most learned members of the higher Druidic degrees.\n\nAccording to James Gardner, there were usually two Arch-Druids in Britain, one residing on the Isle of Anglesea and the other on the Isle of Man.\n\nPresumably there were others in Gaul.\n\nThese dignitaries generally carried golden scepters and were crowned with wreaths of oak leaves, symbolic of their authority.\n\nThe younger members of the Druidic Order were clean-shaven and modestly dressed, but the more aged had long gray beards and wore magnificent golden ornaments.\n\nThe educational system of the Druids in Britain was superior to that of their colleagues on the Continent, and consequently many of the Gallic youths were sent to the Druidic colleges in Britain for their philosophical instruction and training.\n\nÉliphas Lévi states that the Druids lived in strict abstinence, studied the natural sciences, preserved the deepest secrecy, and admitted new members only after long probationary periods.\n\nMany of the priests of the order lived in buildings not unlike the monasteries of the modern world.\n\nThey were associated in groups like ascetics of the Far East.\n\nAlthough celibacy was not demanded of them, few married.\n\nMany of the Druids retired from the world and lived as recluses in caves, in rough-stone houses, or in little shacks built in the depths of a forest.\n\nHere they prayed and medicated, emerging only to perform their religious duties.\n\nJames Freeman Clarke, in his Ten Great Religions , describes the beliefs of the Druids as follows: \"The Druids believed in three worlds and in transmigration from one to the other: In a world above this, in which happiness predominated; a world below, of misery; and this present state.\n\nThis transmigration was to punish and reward and also to purify the soul."

