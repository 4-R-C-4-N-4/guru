body = "In the Persian Mysteries the body of a young man, apparently dead, was exhibited, which was feigned to be restored to life.\n\nBy his sufferings he was believed to have worked their salvation, and on this account he was called their Savior.\n\nHis priests watched his tomb to the midnight of the vigil of the 25th of March, with loud cries, and in darkness; when all at once the light burst forth from all parts, the priest cried, Rejoice, O sacred initiated, your God is risen.\n\nHis death, his pains, and sufferings, have worked your salvation.\" (See Monumental Christianity .) In some cases, as in that of the Buddha, the crucifixion mythos must be taken in an allegorical rather than a literal sense, for the manner of his death has been recorded by his own disciples in the Book of the Great Decease .\n\nHowever, the mere fact that the symbolic reference to death upon a tree has been associated with these heroes is sufficient to prove the universality of the crucifixion story.\n\nThe East Indian equivalent of Christ is the immortal Christna, who, sitting in the forest playing his flute, charmed the birds and beasts by his music.\n\nIt is supposed that this divinely inspired Savior of humanity was crucified upon a tree by his enemies, but great care has been taken to destroy any evidence pointing in that direction.\n\nLouis Jacolliot, in his book The Bible in India , thus describes the death of Christna: \"Christna understood that the hour had come for him to quit the earth, and return to the bosom of him who had sent him.\n\nForbidding his disciples to follow him, he went, one day, to make his ablutions on the banks of the Ganges * * *.\n\nArriving at the sacred river, he plunged himself three times therein, then, kneeling, and looking to heaven, he prayed, expecting death.\n\nIn this position he was pierced with arrows by one of those whose crimes he had unveiled, and who, hearing of his journey to the Ganges, had, with generation.\n\na strong troop, followed with the design of assassinating him * * *.\n\nThe body of the God-man was suspended to the branches of a tree by his murderer, that it might become the prey of vultures.\n\nNews of the death having spread, the people came in a crowd conducted by Ardjouna, the dearest of the disciples of Christna, to recover his sacred remains.\n\nBut the mortal frame of the redeemer had disappeared--no doubt it had regained the celestial abodes * * * and the tree to which it had been attached had become suddenly covered with great red flowers and diffused around it the sweetest perfume.\" Other accounts of the death of Christna declare that he was tied to a cross-shaped tree before the arrows were aimed at him.\n\nThe existence in Moor's The Hindu Pantheon of a plate of Christna with nail wounds in his hands and feet, and a plate in Inman's Ancient Faiths showing an Oriental deity with what might well be a nail hole in one of his feet, should be sufficient motive for further investigation of this subject by those of unbiased minds.\n\nConcerning the startling discoveries which can be made along these lines, J.\n\nP.\n\nLundy in his Monumental Christianity presents the following information: \"Where did the Persians get their notion of this prophecy as thus interpreted respecting Christ, and His saving mercy and love displayed on the cross?\n\nBoth by symbol and actual crucifix we see it on all their monuments.\n\nIf it came from India, how did it get there, except from the one common and original centre of all primitive and pure religion?\n\nThere is a most extraordinary plate, illustrative of the whole subject, which representation I believe to be anterior to Christianity."

