[content]
body = "NUMEROUS volumes have been written as commentaries upon the secret systems of philosophy existing in the ancient world, but the ageless truths of life, like many of the earth's greatest thinkers, have usually been clothed in shabby garments.\n\nThe present work is an attempt to supply a tome worthy of those seers and sages whose thoughts are the substance of its pages.\n\nTo bring about this coalescence of Beauty and Truth has proved most costly, but I believe that the result will produce an effect upon the mind of the reader which will more than justify the expenditure.\n\nWork upon the text of this volume was begun the first day of January, 1926, and has continued almost uninterruptedly for over two years.\n\nThe greater part of the research work, however, was carried on prior to the writing of the manuscript.\n\nThe collection of reference material was begun in 1921, and three years later the plans for the book took definite form.\n\nFor the sake of clarity, all footnotes were eliminated, the various quotations and references to other authors being embodied in the text in their logical order.\n\nThe bibliography is appended primarily to assist those interested in selecting for future study the most authoritative and important items dealing with philosophy and symbolism.\n\nTo make readily accessible the abstruse information contained in the book, an elaborate topical cross index is included.\n\nI make no claim for either the infallibility or the originality of any statement herein contained.\n\nI have studied the fragmentary writings of the ancients sufficiently to realize that dogmatic utterances concerning their tenets are worse than foolhardy.\n\nTraditionalism is the curse of modern philosophy, particularly that of the European schools.\n\nWhile many of the statements contained in this treatise may appear at first wildly fantastic, I have sincerely endeavored to refrain from haphazard metaphysical speculation, presenting the material as far as possible in the spirit rather than the letter of the original authors.\n\nBy assuming responsibility only for the mistakes which may' appear herein, I hope to escape the accusation of plagiarism which has been directed against nearly every writer on the subject of mystical philosophy.\n\nHaving no particular ism of my own to promulgate, I have not attempted to twist the original writings to substantiate preconceived notions, nor have I distorted doctrines in any effort to reconcile the irreconcilable differences present in the various systems of religio-philosophic thought.\n\nThe entire theory of the book is diametrically opposed to the modern method of thinking, for it is concerned with subjects openly ridiculed by the sophists of the twentieth century.\n\nIts true purpose is to introduce the mind of the reader to a hypothesis of living wholly beyond the pale of materialistic theology, philosophy, or science.\n\nThe mass of abstruse material between its covers is not susceptible to perfect organization, but so far as possible related topics have been grouped together.\n\nRich as the English language is in media of expression, it is curiously lacking in terms suitable to the conveyance of abstract philosophical premises.\n\nA certain intuitive grasp of the subtler meanings concealed within groups of inadequate words is necessary therefore to an understanding of the ancient Mystery Teachings.\n\nAlthough the majority of the items in the bibliography are in my own library, I wish to acknowledge gratefully the assistance rendered by the Public Libraries of San Francisco and Los Angeles, the libraries of the Scottish Rite in San Francisco and Los Angeles, the libraries of the University of California in Berkeley and Los Angeles, the Mechanics' Library in San Francisco, and the Krotona Theosophical Library at Ojai, California.\n\nSpecial recognition for their help is also due to the following persons: Mrs.\n\nMax Heindel, Mrs.\n\nAlice Palmer Henderson, Mr.\n\nErnest Dawson and staff, Mr.\n\nJohn Howell, Mr.\n\nPaul Elder, Mr.\n\nPhillip Watson Hackett, and Mr.\n\nJohn R.\n\nRuckstell."

