body = "Johann Friedrich Herbart's philosophy was a realistic reaction from the idealism of Fichte and von Schelling.\n\nTo Herbart the true basis of philosophy was the great mass of phenomena continually moving through the human mind.\n\nExamination of phenomena, however, demonstrates that a great part of it is unreal, at least incapable of supplying the mind with actual truth.\n\nTo correct the false impressions caused by phenomena and discover reality, Herbart believed it necessary to resolve phenomena into separate elements, for reality exists in the elements and not in the whole.\n\nHe stated that objects can be classified by three general terms: thing, matter, and mind; the first a unit of several properties, the second an existing object, the third a self-conscious being.\n\nAll three notions give rise, however, to certain contradictions, with whose solution Herbart is primarily concerned.\n\nFor example, consider matter.\n\nThough capable of filling space, if reduced to its ultimate state it consists of incomprehensibly minute units of divine energy occupying no physical space whatsoever.\n\nThe true subject of Arthur Schopenhauer's philosophy is the will; the object of his philosophy is the elevation of the mind to the point where it is capable of controlling the will.\n\nSchopenhauer likens the will to a strong blind man who carries on his shoulders the intellect, which is a weak lame man possessing the power of sight.\n\nThe will is the tireless cause of manifestation and every part of Nature the product of will.\n\nThe brain is the product of the will to know; the hand the product of the will to grasp.\n\nThe entire intellectual and emotional constitutions of man are subservient to the will and are largely concerned with the effort to justify the dictates of the will.\n\nThus the mind creates elaborate systems of thought simply to prove the necessity of the thing willed.\n\nGenius, however, represents the state wherein the intellect has gained supremacy over the will and the life is ruled by reason and not by impulse.\n\nThe strength of Christianity, said Schopenhauer, lay in its pessimism and conquest of individual will.\n\nHis own religious viewpoints resembled closely the Buddhistic.\n\nTo him Nirvana represented the subjugation of will.\n\nLife--the manifestation of the blind will to live--he viewed as a misfortune, claiming that the true philosopher was one who, recognizing the wisdom of death, resisted the inherent urge to reproduce his kind.\n\nTHE TREE OF CLASSICAL MYTHOLOGY.\n\nFrom Hort's The New Pantheon.\n\nBefore a proper appreciation of the deeper scientific aspects of Greek mythology is possible, it is necessary to organize the Greek pantheon and arrange its gods, goddesses, and various superhuman hierarchies in concatenated order.\n\nProclus, the great Neo-Platonist, in his commentaries on the theology of Plato, gives an invaluable key to the sequence of the various deities in relation to the First Cause and the inferior powers emanating from themselves.\n\nWhen thus arranged, the divine hierarchies may be likened to the branches of a great tree.\n\nThe roots of this tree are firmly imbedded in Unknowable Being.\n\nThe trunk and larger branches of the tree symbolize the superior gods; the twigs and leaves, the innumerable existences dependent upon the first and unchanging Power.\n\n*** Of Friedrich Wilhelm Nietzsche it has been said that his peculiar contribution to the cause of human hope was the glad tidings that God had died of pity!\n\nThe outstanding features of Nietzsche's philosophy are his doctrine of eternal recurrence and the extreme emphasis placed by him upon the will to power --a projection of Schopenhauer's will to live.\n\nNietzsche believed the purpose of existence to be the production of a type of all-powerful individual, designated by him the superman.\n\nThis superman was the product of careful culturing, for if not separated forcibly from the mass and consecrated to the production of power, the individual would sink back to the level of the deadly mediocre."

