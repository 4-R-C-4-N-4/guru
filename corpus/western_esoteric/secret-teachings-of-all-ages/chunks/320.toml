[content]
body = "In writing of the deck from which the four cavaliers (jacks) here reproduced were taken, William Andrew Chatto notes: \"Some of the specimens of Portuguese cards given in the 'Jeux de Cartes, Tarots et de Cartes Numérales' have very much the appearance of having been originally suggested by, if net copied from, an Oriental type; more especially in the suits of Danari and Bastani,--Money and Clubs.\n\nIn those cards the circular figure, generally understood as representing Danari, or Money, is certainly much more like the Chakra, or quoit of Vichnou [Vishnu], as seen in Hindostanic drawings, than a piece of coin; while on the top of the Club is a diamond proper, which is another of the attributes of the same deity.\" Also worthy of note are the Rosicrucian and Masonic emblems appearing on various mediæval decks.\n\nAs the secrets of these organizations were often concealed in cryptic engravings, it is very probable that the enigmatic diagrams upon various decks of cards were used both to conceal and to perpetuate the political and philosophical arcana of these orders.\n\nThe frontispiece of Mr.\n\nChatto's books shows a knave of hearts bearing a shield emblazoned with a crowned Rosicrucian rose.\n\n*** The major trump cards portray incidents from the Book of Revelation; and the Apocalypse of St.\n\nJohn is also divided into 22 chapters.\n\nAssuming the Qabbalah to hold the solution to the Tarot riddle, seekers have often ignored other possible lines of research.\n\nThe task, however, of discovering the proper relationship sustained by the Tarot trumps to the letters of the Hebrew alphabet and the Paths of Wisdom thus far has not met with any great measure of success.\n\nThe major trumps of the Tarot and the 22 letters of the Hebrew alphabet cannot be synchronized without first fixing the correct place of the unnumbered, or zero, card-- Le Mat , the Fool.\n\nLevi places this card between the 20th and 21st Tarots, assigning to it the Hebrew letter Shin (ש).\n\nThe same order is followed by Papus, Christian, and Waite, the last, however, declaring this arrangement to be incorrect.\n\nWestcott makes the zero card the 22nd of the Tarot major trumps.\n\nOn the other hand, both Court de Gébelin and Paul Case place the unnumbered card before the first numbered card of the major trumps, for if the natural order of the numbers (according to either the Pythagorean or Qabbalistic system) be adhered to, the zero card must naturally precede the number 1.\n\nThis does not dispose of the problem, however, for efforts to assign a Hebrew letter to each Tarot trump in sequence produce an effect far from convincing.\n\nMr.\n\nWaite, who reedited the Tarot, expresses himself thus: \"I am not to be included among those who are satisfied that there is a valid correspondence between Hebrew letters and Tarot Trump symbols.\" (See introduction to The Book of Formation by Knut Stenring.) The real explanation may be that the major Tarots no longer are in the same sequence as when they formed the leaves of Hermes' sacred book, for the Egyptians--or even their Arabian successors--could have purposely confused the cards so that their secrets might be better preserved.\n\nMr.\n\nCase has developed a system which, while superior to most, depends largely upon two debatable points, namely, the accuracy of Mr.\n\nWaite's revised Tarot and the justification for assigning the first letter of the Hebrew alphabet to the unnumbered, or zero, card."

