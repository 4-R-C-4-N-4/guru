[content]
body = "Some regard the Cabiri as seven in number and refer to them as \"the Seven Spirits of fire before the throne of Saturn.\" Others believe the Cabiri to be the seven sacred wanderers, later called the planets.\n\nWhile a vast number of deities are associated with the Samothracian Mysteries, the ritualistic drama centers around four brothers.\n\nThe first three--Aschieros, Achiochersus, and Achiochersa--attack and murder the fourth--Cashmala (or Cadmillus).\n\nDionysidorus, however, identifies Aschieros with Demeter, Achiochersus with Pluto, Achiochersa with Persephone, and Cashmala with Hermes.\n\nAlexander Wilder notes that in the Samothracian ritual \"Cadmillus is made to include the Theban Serpent-god, Cadmus, the Thoth of Egypt, the Hermes of the Greeks, and the Emeph or Æsculapius of the Alexandrians and Phœnicians.\n\n\" Here again is a repetition of the story of Osiris, Bacchus, Adonis, Balder, and Hiram Abiff.\n\nThe worship of Atys and Cybele was also involved in the Samothracian Mysteries.\n\nIn the rituals of the Cabiri is to be traced a form of pine-tree worship, for this tree, sacred to Atys, was first trimmed into the form of a cross and then cut down in honor of the murdered god whose body was discovered at its foot.\n\n\"If you wish to inspect the orgies of the Corybantes, \" writes Clement, \"Then know that, having killed their third brother, they covered the head of the dead body with a purple cloth, crowned it, and carrying it on the point of a spear, buried it under the roots of Olympus.\n\nThese mysteries are, in short, murders and funerals.\n\n[This ante-Nicene Father in his efforts to defame the pagan rites apparently ignores the fact that, like the Cabirian martyr, Jesus Christ was foully betrayed, tortured, and finally murdered!] And the priests Of these rites, who are called kings of the sacred rites by those whose business it is to name them, give additional strangeness to the tragic occurrence, by forbidding parsley with the roots from being placed on the table, for they think that parsley grew from the Corybantic blood that flowed forth; just as the women, in celebrating the Thcsmophoria, abstain from eating the seeds of the pomegranate, which have fallen on the ground, from the idea that pomegranates sprang from the drops of the blood of Dionysus.\n\nThose Corybantes also they call Cabiric; and the ceremony itself they announce as the Cabiric mystery.\" The Mysteries of the Cabiri were divided into three degrees, the first of which celebrated the death of Cashmala, at the hands of his three brothers; the second, the discovery of his mutilated body, the parts of which had been found and gathered after much labor; and the third--accompanied by great rejoicing and happiness--his resurrection and the consequent salvation of the world.\n\nThe temple of the Cabiri at Samothrace contained a number of curious divinities, many of them misshapen creatures representing the elemental powers of Nature, possibly the Bacchic Titans.\n\nChildren were initiated into the Cabirian cult with the same dignity as adults, and criminals who reached the sanctuary were safe from pursuit.\n\nThe Samothracian rites were particularly concerned with navigation, the Dioscuri--Castor and Pollux, or the gods of navigation--being among those propitiated by members of that cult."

