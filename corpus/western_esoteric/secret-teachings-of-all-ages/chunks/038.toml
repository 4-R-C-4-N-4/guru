body = "In discussing the original meaning of this word, Godfrey Higgins, in his Celtic Druids, has demonstrated that the numerological powers of the letters forming the word Abraxas when added together result in the sum of 365.\n\nThe same author also notes that the name Mithras when treated in a similar manner has the same numerical value.\n\nBasilides caught that the powers of the universe were divided into 365 Æons, or spiritual cycles, and that the sum of all these together was the Supreme Father, and to Him he gave the Qabbalistical appellation Abraxas , as being symbolical, numerologically, of His divine powers, attributes, and emanations.\n\nAbraxas is usually symbolized as a composite creature, with the body of a human being and the head of a rooster, and with each of his legs ending in a serpent.\n\nC.\n\nW.\n\nKing, in his Gnostics and Their Remains , gives the following concise description of the Gnostic philosophy of Basilides, quoting from the writings of the early Christian bishop and martyr, St.\n\nIrenæus: \"He asserted that God, the uncreated, eternal Father, had first brought forth Nous, or Mind; this the Logos, Word; this again Phronesis, Intelligence; from Phronesis sprung Sophia, Wisdom, and Dynamis, Strength.\" In describing Abraxas, C.\n\nW.\n\nKing says: \"Bellermann considers the composite image, inscribed with the actual name Abraxas, to be a Gnostic Pantheos, representing the Supreme Being, with the Five Emanations marked out by appropriate symbols.\n\nFrom the human body, the usual form assigned to the Deity, spring the two supporters, Nous and Logos, expressed in the serpents, symbols of the inner senses, and the quickening understanding; on which account the Greeks had made the serpent the attribute of Pallas.\n\nHis head--that of a cock--represents Phronesis, that bird being the emblem of foresight and of vigilance.\n\nHis two arms hold the symbols of Sophia and Dynamis: the shield of Wisdom and the whip of Power.\" The Gnostics were divided in their opinions concerning the Demiurgus, or creator of the lower worlds.\n\nHe established the terrestrial universe with the aid of six sons, or emanations (possibly the planetary Angels) which He formed out of, and yet within, Himself.\n\nAs stated before, the Demiurgus was individualized as the lowest creation out of the substance called pleroma .\n\nOne group of the Gnostics was of the opinion that the Demiurgus was the cause of all misery and was an evil creature, who by building this lower world had separated the souls of men from truth by encasing them in mortal vehicles.\n\nThe other sect viewed the Demiurgus as being divinely inspired and merely fulfilling the dictates of the invisible Lord.\n\nSome Gnostics were of the opinion that the Jewish God, Jehovah , was the Demiurgus.\n\nThis concept, under a slightly different name, apparently influenced medieval Rosicrucianism, which viewed Jehovah as the Lord of the material universe rather than as the Supreme Deity.\n\nMythology abounds with the stories of gods who partook of both celestial and terrestrial natures.\n\nOdin, of Scandinavia, is a good example of a deity subject to mortality, bowing before the laws of Nature and yet being, in certain senses at least, a Supreme Deity.\n\nThe Gnostic viewpoint concerning the Christ is well worthy of consideration.\n\nThis order claimed to be the only sect to have actual pictures of the Divine Syrian.\n\nWhile these were, in all probability, idealistic conceptions of the Savior based upon existing sculpturings and paintings of the pagan sun gods, they were all Christianity had."

