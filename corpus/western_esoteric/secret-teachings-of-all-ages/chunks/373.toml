body = "The Act reads as follows: \"An Act to repeal the Statute made in the 5th year of King Henry IV, late king of England, [wherein] it was enacted, among other things, in these words, or to this effect, namely: 'that none from henceforth should use to multiply Gold or Silver or use the craft of multiplication, and if any the same do they shall incur the pain of felony.' And whereas, since the making of the said statute, divers persons have by their study, industry and learning, arrived to great skill & perfection in the art of melting and refining of metals, and otherwise improving and multiplying them and their ores, which very much abound in this realm, and extracting gold and silver our of the same, but dare not to exercise their said skill within this realm, for fear of falling under the penalty of the said statute, but exercise the said art in foreign parts, to the great loss and detriment of this realm: Be it therefore enacted by the King's and Queen's most excellent Majesties, by and with the advice and consent of the Lords spiritual and temporal and Commons in this present parliament assembled, that from henceforth the aforesaid branch, article, or sentence, contained in the said act, and every word, matter and thing contained in the said branch or sentence, shall be repealed, annulled, revoked, and for ever made void, any thing in the said act to the contrary in any wise whatsoever notwithstanding.\n\nProvided always, and be it enacted by the authority aforesaid, that all the gold and silver that shall be extracted by the aforesaid art of melting or refining of metals, and otherwise improving and multiplying of them and their ores, as before set forth, be from henceforth employed for no other use or uses whatsoever but for the increase of monies; and that the place hereby appointed for the disposal thereof shall be their Majesties mint, within the Tower of London, at which place they are to receive the full and true value of their gold and silver, so procured, from time to time, according to the assay and fineness thereof, and so for any greater or less weight, and that none of that metal of gold and silver so refined and procured be permitted to be used or disposed of in any other place or places within their Majesties dominions.\" After this repealing measure had become effective, William and Mary encouraged the further study of alchemy.\n\nDr.\n\nFranz Hartmann has collected reliable evidence concerning four different: alchemists who transmuted base metals into gold not once but many times.\n\nOne of these accounts concerns a monk of the Order of St.\n\nAugustine named Wenzel Seiler, who discovered a small amount of mysterious red powder in his convent.\n\nIn the presence of Emperor Leopold I, King of Germany, Hungary, and Bohemia, he transmuted quantities of tin into gold.\n\nAmong other things which he dipped into his mysterious essence was a large silver medal.\n\nThat part of the medal which came in contact with the gold-producing substance was transmuted into the purest quality of the more precious metal.\n\nThe rest remained silver.\n\nWith regard to this medal, Dr.\n\nHartmann writes: \"The most indisputable proof (if appearances can prove anything) of the possibility of transmuting base metals into gold, may be seen by everyone who visits Vienna; it being a medal preserved in the Imperial treasury chamber, and it is stated that this medal, consisting originally of silver, has been partly transformed into gold, by alchemical means, by the same Wenzel Seiler who was afterwards made a knight by the Emperor Leopold I.\n\nand given the title Wenzeslaus Ritter von Reinburg.\n\n\"( In the Pronaos of the Temple of Wisdom .) Space limitations preclude a lengthy discussion of the alchemists."

