body = "His fight with the Nubian lion, his battles with the Philistines, who represent the Powers of Darkness, and his memorable feat of carrying off the gates of Gaza, all refer to aspects of solar activity.\n\nMany of the ancient peoples had more than one solar deity; in fact, all of the gods and goddesses were supposed to partake, in part at least, of the sun's effulgence.\n\nTHE LION OF THE SUN.\n\nFrom Maurice's Indian Antiquities.\n\nThe sun rising over the back of the lion or, astrologically, in the back of the lion, has always been considered symbolic of power and rulership.\n\nA symbol very similar to the one above appears on the flag of Persia, whose people have always been sun worshipers.\n\nKings and emperors have frequently associated their terrestrial power with the celestial Power of the solar orb, and have accepted the sun, or one of its symbolic beasts or birds, as their emblem.\n\nWitness the lion of the Great Mogul and the eagles of Cæsar and Napoleon.\n\n*** The golden ornaments used by the priestcraft of the various world religions are again a subtle reference to the solar energy, as are also the crowns of kings.\n\nIn ancient times, crowns had a number of points extending outward like the rays of the sun, but modern conventionalism has, in many cases, either removed the points or else bent: them inward, gathered them together, and placed an orb or cross upon the point where they meet.\n\nMany of the ancient prophets, philosophers, and dignitaries carried a scepter, the upper end of which bore a representation of the solar globe surrounded by emanating rays.\n\nAll the kingdoms of earth were but copies of the kingdoms of Heaven, and the kingdoms of Heaven were best symbolized by the solar kingdom, in which the sun was the supreme ruler, the planets his privy council, and all Nature the subjects of his empire.\n\nTHE WINGED GLOBE OF EGYPT.\n\nFrom Maurice's Indian Antiquities.\n\nThis symbol, which appears over the Pylons or gates of many Egyptian palaces and temples, is emblematic of the three persons of the Egyptian Trinity.\n\nThe wings, the serpents, and the solar orb are the insignia of Ammon, Ra, and Osiris.\n\n*** Many deities have been associated with the sun.\n\nThe Greeks believed that Apollo, Bacchus, Dionysos, Sabazius, Hercules, Jason, Ulysses, Zeus, Uranus, and Vulcan partook of either the visible or invisible attributes of the sun.\n\nThe Norwegians regarded Balder the Beautiful as a solar deity, and Odin is often connected with the celestial orb, especially because of his one eye.\n\nAmong the Egyptians, Osiris, Ra, Anubis, Hermes, and even the mysterious Ammon himself had points of resemblance with the solar disc.\n\nIsis was the mother of the sun, and even Typhon, the Destroyer, was supposed to be a form of solar energy.\n\nThe Egyptian sun myth finally centered around the person of a mysterious deity called Serapis .\n\nThe two Central American deities, Tezcatlipoca and Quetzalcoatl , while often associated with the winds, were also undoubtedly solar gods.\n\nIn Masonry the sun has many symbols.\n\nOne expression of the solar energy is Solomon, whose name SOL-OM-ON is the name for the Supreme Light in three different languages.\n\nHiram Abiff, the CHiram (Hiram) of the Chaldees, is also a solar deity, and the story of his attack and murder by the Ruffians, with its solar interpretation, will be found in the chapter The Hiramic Legend ."

