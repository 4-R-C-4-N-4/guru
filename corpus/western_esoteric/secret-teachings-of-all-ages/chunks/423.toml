[content]
body = "The newly created Knights of the Golden Stone were obliged to subscribe to five articles drawn up by His Royal Highness: (1) That they would ascribe their Order only to God and His handmaid, Nature.\n\n(2) That they should abominate all uncleanness and vice.\n\n(3) That they should always be ready to assist the worthy and needy.\n\n(4) That they should not use their knowledge and power for the attainment of worldly dignity.\n\n(5) That they should not desire to live longer than God had decreed.\n\nThey were then duly installed as Knights, which ceremony was ratified in a little chapel where C.\n\nR.\n\nC.\n\nhung up his Golden Fleece and his hat for an eternal memorial, and here he inscribed the following: Summa Scientia nihil Scire, Fr.\n\nChristianus Rosencreutz.\n\nEques aurei Lapidis .\n\nAnno 1459.\n\nAfter the ceremony, C.R.C.\n\nadmitted that he was the one who had beheld Venus and consequently must become the porter of the gate.\n\nThe King embraced him fondly and he was assigned to a great room containing three beds--one for himself, one for the aged lord of the tower, and the third for old Atlas.\n\nThe Chemical Marriage here comes to an abrupt end, leaving the impression that C.R.C.\n\nwas to assume his duties as porter on the following morning.\n\nThe book ends in the middle of a sentence, with a note in italics presumably by the editor.\n\nUnder the symbolism of an alchemical marriage, medieval philosophers concealed the secret system of spiritual culture whereby they hoped to coordinate the disjecta membra of both the human and social organisms.\n\nSociety, they maintained, was a threefold structure and had its analogy in the triune constitution of man, for as man consists of spirit, mind, and body, so society is made up of the church, the state, and the populace.\n\nThe bigotry of the church, the tyranny of the state, and the fury of the mob are the three murderous agencies of society which seek to destroy Truth as recounted in the Masonic legend of Hiram Abiff.\n\nThe first six days of The Chemical Marriage set forth the processes of philosophical \"creation\" through which every organism must pass.\n\nThe three kings are the threefold spirit of man and their consorts the corresponding vehicles of their expression in the lower world.\n\nThe executioner is the mind, the higher part of which--symbolized by the head--is necessary to the achievement of the philosophical labor.\n\nThus the parts of man--by the alchemists symbolized as planets and elements--when blended together according to a certain Divine formula result in the creation of two philosophic \"babes\" which, fed upon the blood of the alchemical bird, become rulers of the world.\n\nFrom an ethical standpoint, the young King and Queen resurrected at the summit of the tower and ensouled by Divine Life represent the forces of Intelligence and Love which must ultimately guide society.\n\nIntelligence and Love are the two great ethical luminaries of the world and correspond to enlightened spirit and regenerated body.\n\nThe bridegroom is reality and the bride the regenerated being who attains perfection by becoming one with reality through a cosmic marriage wherein the mortal part attains immortality by being united with its own immortal Source.\n\nIn the Hermetic Marriage divine and human consciousness are united in holy wedlock and he in whom this sacred ceremony takes place is designated as \"Knight of the Golden Stone\"; he thereby becomes a divine philosophic diamond composed of the quintessence of his own sevenfold constitution.\n\nSuch is the true interpretation of the mystical process of becoming \"a bride of the Lamb.\" The Lamb of God is signified by the Golden Fleece that Jason was forced to win before he could assume his kingship.\n\nThe Flying Lion is illumined will, an absolute prerequisite to the achievement of the Great Work."

