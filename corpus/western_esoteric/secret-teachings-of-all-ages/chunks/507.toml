body = "The fame of the two dancers--who were in reality Hunahpu and Xbalanque--finally came to the notice of the twelve princes of Xibalba, who thereupon desired these two miracle-workers to perform their strange fears before them.\n\nAfter Hunahpu and Xbalanque had slain the dog of the princes and restored it to life, had burned the royal palace and instantly rebuilt it, and given other demonstrations of their magical powers, the monarch of the Xibalbians asked the magicians to destroy him and restore him also to life.\n\nSo Hunahpu and Xbalanque slew the princes of Xibalba but did not return them to life, thereby avenging the murder of Hunhun-ahpu and Vukub-hunhun-ahpu.\n\nThese heroes later ascended to heaven, where they became the celestial lights.\n\nKEYS TO THE MYSTERIES OF XIBALBA \"Do not these initiations,\" writes Le Plongeon, \"vividly recall to mind what Henoch said he saw in his visions?\n\nThat blazing house of crystal, burning hot and icy cold--that place where were the bow of fire, the quiver of arrows, the sword of fire--that other where he had to cross the babbling stream, and the river of fire-and those extremities of the Earth full of all kinds of huge beasts and birds--or the habitation where appeared one of great glory sitting upon the orb of the sun--and, lastly, does not the tamarind tree in the midst of the earth, that he was cold was the Tree of Knowledge, find its simile in the calabash tree, in the middle of the road where those of Xibalba placed the head of Hunhun Ahpu, after sacrificing him for having failed to support the first trial of the initiation?\n\n* * * These were the awful ordeals that the candidates for initiation into the sacred mysteries had to pass through in Xibalba.\n\nDo they not seem an exact counterpart of what happened in a milder form at the initiation into the Eleusinian mysteries?\n\nand also the greater mysteries of Egypt, from which these were copied?\n\nDoes not the recital of what the candidates to the mysteries in Xibalba were required to know, before being admitted, * * * recall to mind the wonderful similar feats said to be performed by the Mahatmas, the Brothers in India, and of several of the passages of the book of Daniel, who had been initiated to the mysteries of the Chaldeans or Magi which, according to Eubulus, were divided into three classes or genera, the highest being the most learned?\" (See Sacred Mysteries among the Mayas and the Quiches .) In his introductory notes to the Popol Vuh , Dr.\n\nGuthrie presents a number of important parallelisms between this sacred book of the Quichés and the sacred writings of other great civilizations.\n\nIn the tests through which Hunahpu and Xbalanque are forced to pass he finds the following analogy with the signs of the zodiac as employed in the Mysteries of the Egyptians, Chaldeans, and Greeks: \"Aries, crossing the river of mud.\n\nTaurus, crossing the river of blood.\n\nGemini, detecting the two dummy kings.\n\nCancer, the House of Darkness.\n\nLeo, the House of Spears.\n\nVirgo, the House of Cold (the usual trip to Hell).\n\nLibra, the House of Tigers (feline poise).\n\nScorpio, the House of Fire.\n\nSagittarius, the House of Bats, where the God Camazotz decapitates one of the heroes.\n\nCapricorn, the burning on the scaffold (the dual Phœnix).\n\nAquarius, their ashes being scattered in a river."

