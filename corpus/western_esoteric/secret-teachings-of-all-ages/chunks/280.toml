body = "The third volume used as a reference was the Sepher Yetzirah , by the late Win.\n\nWynn Westcott, Magus of the Rosicrucian Society of England.\n\nThe fourth was the Sepher Yetzirah , or The Book of Creation, according to the translation in the Sacred Books and Early Literature of the East , edited by Prof.\n\nCharles F.\n\nHorne.\n\nThe fifth was a recent publication, The Book of Formation , by Knut Stenring, containing an introduction by Arthur Edward Waite.\n\nAt hand also were four other copies--two German, one Hebrew, and one Latin.\n\nCertain portions of the Sepher Yetzirah are considered older and more authentic than the rest, bur the controversy regarding them is involved and nonproductive that it is useless to add further comment.\n\nThe doubtful passages are therefore included in the document at the points where they would naturally fall.\n\nTHE SEPHER YETZIRAH, THE BOOK OF FORMATION Chapter One 1.\n\nYAH, the Lord of Hosts, the living Elohim, King of the Universe, Omnipotent, the Merciful and Gracious God, Supreme and Extolled, Dweller in the Height whose habitation is Eternity, who is Sublime and Most-Holy, engraved His name and ordained (formed) and created the Universe in thirty-two mysterious paths (stages) of wisdom (science), by three Sepharim, namely, Numbers, Letters, and Sounds, which are in Him one and the same.\n\n2.\n\nTen Sephiroth (ten properties from the Ineffable One) and twenty-two letters are the Foundation of all things.\n\nOf these twenty-two letters three are called \"Mothers,\" sewn \"Double,\" and twelve \"Simple.\" 3.\n\nThe ten numbers (Sephiroth) out of Nothing are analogous to the ten fingers and the ten toes: five over against five.\n\nIn the center between them is the covenant with the Only One God.\n\nIn the spiritual world it is the covenant of the voice (the Word), and in the corporeal world the circumcision of the flesh (the rite of Abraham).\n\n4.\n\nTen are the numbers (of the Sephiroth) out of Nothing, ten--not nine; ten--not eleven.\n\nComprehend this great, wisdom, understand this knowledge and be wise.\n\nInquire into the mystery and ponder it.\n\nExamine all things by means of the ten Sephiroth.\n\nRestore the Word to Its Creator and lead the Creator back to His throne again.\n\nHe is the only Formator and beside Him there is no other.\n\nHis attributes are ten and are without limit.\n\n5.\n\nThe ten ineffable Sephiroth have ten infinitudes, which are as follows: The infinite beginning and the infinite end; The infinite good and the infinite evil; The infinite height and the infinite depth; The infinite East and the infinite West; The infinite North and the infinite South; and over them is the Lord Superlatively One, the faithful King.\n\nHe rules over all in all from His holy habitation for ages of ages.\n\n6.\n\nThe appearance of the ten spheres (Sephiroth) out of Nothing is as a flash of lightning or a sparkling flame, and they are without beginning or end.\n\nThe Word of God is in them when they go forth and when they return.\n\nThey run by His order like a whirlwind and prostrate themselves before His throne.\n\n7.\n\nThe ten Sephiroth have their end linked to their beginning and their beginning linked to their end, cojoined as the flame is wedded to the live coal, for the Lord is Superlatively One and to Him there is no second.\n\nBefore One what can you count?\n\n8."

