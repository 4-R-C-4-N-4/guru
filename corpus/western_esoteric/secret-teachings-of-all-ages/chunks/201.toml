body = "The seven Creators, or Fabricators, of the inferior spheres were called by the Jews the Elohim .\n\nBy the Egyptians they were referred to as the Builders (sometimes as the Governors ) and are depicted with great knives in their hands with which they carved the universe from its primordial substance.\n\nWorship of the planets is based upon their acceptation as the cosmic embodiments of the seven creative attributes of God.\n\nThe Lords of the planets were described as dwelling within the body of the sun, for the true nature of the sun, being analogous to the white light, contains the seeds of all the tone and color potencies which it manifests.\n\nThere are numerous arbitrary arrangements setting forth the mutual relationships of the planets, the colors, and the musical notes.\n\nThe most satisfactory system is that based upon the law of the octave .\n\nThe sense of hearing has a much wider scope than that of sight, for whereas the ear can register from nine to eleven octaves of sound the eye is restricted to the cognition of but seven fundamental color tones, or one tone short of the octave.\n\nRed, when posited as the lowest color tone in the scale of chromatics, thus corresponds to do , the first note of the musical scale.\n\nContinuing the analogy, orange corresponds to re , yellow to mi , green to fa , blue to sol , indigo to la , and violet to si ( ti ).\n\nThe eighth color tone necessary to complete the scale should be the higher octave of red, the first color tone.\n\nThe accuracy of the above arrangement is attested by two striking facts: (1) the three fundamental notes of the musical scale--the first, the third, and the fifth--correspond with the three primary colors--red, yellow, and blue; (2) the seventh, and least perfect, note of the musical scale corresponds with purple, the least perfect tone of the color scale.\n\nIn The Principles of Light and Color , Edwin D.\n\nBabbitt confirms the correspondence of the color and musical scales: \"As C is at the bottom of the musical scale and made with the coarsest waves of air, so is red at the bottom of the chromatic scale and made with the coarsest waves of luminous ether.\n\nAs the musical note B [the seventh note of the scale] requires 45 vibrations of air every time the note C at the lower end of the scale requires 24, or but little over half as many, so does extreme violet require about 300 trillions of vibrations of ether in a second, while extreme red requires only about 450 trillions, which also are but little more than half as many.\n\nWhen one musical octave is finished another one commences and progresses with just twice as many vibrations as were used in the first octave, and so the same notes are repeated on a finer scale.\n\nIn the same way when the scale of colors visible to the ordinary eye is completed in the violet, another octave of finer invisible colors, with just twice as many vibrations, will commence and progress on precisely the same law.\" When the colors are related to the twelve signs of the zodiac, they are arranged as the spokes of a wheel.\n\nTo Aries is assigned pure red; to Taurus, red-orange; to Gemini, pure orange; to Cancer, orange-yellow; to Leo, pure yellow; to Virgo, yellow-green; to Libra, pure green; to Scorpio, green-blue; to Sagittarius, pure blue; to Capricorn, blue-violet; to Aquarius, pure violet; and to Pisces, violet-red.\n\nIn expounding the Eastern system of esoteric philosophy, H."

