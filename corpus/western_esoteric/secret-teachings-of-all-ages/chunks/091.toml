body = "While Le Plongeon may be right, the possible historical queen sinks into insignificance when compared with the allegorical, symbolic World Virgin; and the fact that she appears among so many different races and peoples discredits the theory that she was a historical individual.\n\nAccording to Sextus Empyricus, the Trojan war was fought over a statue of the moon goddess.\n\nFor this lunar Helena, and not for a woman, the Greeks and Trojans struggled at the gates of Troy.\n\nSeveral authors have attempted to prove that Isis, Osiris, Typhon, Nephthys, and Aroueris (Thoth, or Mercury) were grandchildren of the great Jewish patriarch Noah by his son Ham.\n\nBut as the story of Noah and his ark is a cosmic allegory concerning the repopulation of planets at the beginning of each world period, this only makes it less likely that they were historical personages.\n\nAccording to Robert Fludd, the sun has three properties-- life , light , and heat .\n\nThese three vivify and vitalize the three worlds--spiritual, intellectual, and material.\n\nTherefore, it is said \" from one light, three lights ,\" i.\n\ne.\n\nthe first three Master Masons.\n\nIn all probability, Osiris represents the third, or material, aspect of solar activity, which by its beneficent influences vitalizes and enlivens the flora and fauna of the earth.\n\nOsiris is not the sun, but the sun is symbolic of the vital principle of Nature, which the ancients knew as Osiris.\n\nHis symbol, therefore, was an opened eye, in honor of the Great Eye of the universe, the sun.\n\nOpposed to the active, radiant principle of impregnating fire, hear, and motion was the passive, receptive principle of Nature.\n\nModern science has proved that forms ranging in magnitude from solar systems to atoms are composed of positive, radiant nuclei surrounded by negative bodies that exist upon the emanations of the central life.\n\nFrom this allegory we have the story of Solomon and his wives, for Solomon is the sun and his wives and concubines are the planets, moons, asteroids, and other receptive bodies within his house--the solar mansion.\n\nIsis, represented in the Song of Solomon by the dark maid of Jerusalem, is symbolic of receptive Nature--the watery, maternal principle which creates all things out of herself after impregnation has been achieved by the virility of the sun.\n\nIn the ancient world the year had 360 days.\n\nThe five extra days were gathered together by the God of Cosmic Intelligence to serve as the birthdays of the five gods and goddesses who are called the sons and daughters of Ham.\n\nUpon the first of these special days Osiris was born and upon the fourth of them Isis.\n\n(The number four shows the relation that this goddess bears to the earth and its elements.) Typhon, the Egyptian Demon or Spirit of the Adversary, was born upon the third day.\n\nTyphon is often symbolized by a crocodile; sometimes his body is a combination of crocodile and hog.\n\nIsis stands for knowledge and wisdom, and according to Plutarch the word Typhon means insolence and pride .\n\nEgotism, self-centeredness, and pride are the deadly enemies of understanding and truth.\n\nThis part of the allegory is revealed.\n\nAfter Osiris, here symbolized as the sun, had become King of Egypt and had given to his people the full advantage of his intellectual light, he continued his path through the heavens, visiting the peoples of other nations and converting all with whom he came in contact.\n\nPlutarch further asserts that the Greeks recognized in Osiris the same person whom they revered under the names of Dionysos and Bacchus .\n\nWhile he was away from his country, his brother, Typhon, the Evil One, like the Loki of Scandinavia, plotted against the Sun God to destroy him."

