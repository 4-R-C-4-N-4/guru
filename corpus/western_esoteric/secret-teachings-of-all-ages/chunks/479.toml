body = "These represented the four corners of creation and the multitude of eyes with which they were covered are the stars of the firmament.\n\nThe twenty-four elders have the same significance as the priests gathered around the statue of Ceres in the Greater Eleusinian Rite and also the Persian Genii, or gods of the hours of the day, who, casting away their crowns, glorify the Holy One.\n\nAs symbolic of the divisions of time, the elders adore the timeless and enduring Spirit in the midst of them.\n\n*** In his Restored New Testament, James Morgan Pryse traces the relationship of the various parts of the Alpha and Omega to the seven sacred planets of the ancients.\n\nTo quote: \"The Logos-figure described is a composite picture of the seven sacred planets: he has the snowy-white hair of Kronos ('Father Time'), the blazing eyes of 'wide-seeing' Zeus, the sword of Arcs, the shining face of Helios, and the chiton and girdle of Aphrodite; his feet are of mercury, the metal sacred to Hermes, and his voice is like the murmur of the ocean's waves (the 'many waters'), alluding to Selene, the Moon-Goddess of the four seasons and of the waters.\" The seven stars carried by this immense Being in his right hand are the Governors of the world; the flaming sword issuing from his mouth is the Creative Fiat, or Word of Power, by which the illusion of material permanence is slain.\n\nHere also is represented, in all his symbolic splendor, the hierophant of the Phrygian Mysteries, his various insignia emblematic of his divine attributes.\n\nSeven priests bearing lamps are his attendants and the stars carried in his hand are the seven schools of the Mysteries whose power he administers.\n\nAs one born again out of spiritual darkness, into perfect wisdom, this archimagus is made to say: \"I am he that liveth, and was dead; and, behold, I am alive forever more, Amen; and have the keys of hell and of death.\" In the second and third chapters St.\n\nJohn delivers to the \"seven churches which are in Asia\" the injunctions received by him from the Alpha and Omega.\n\nThe churches are here analogous to the rungs of a Mithraic ladder, and John, being \"in the spirit,\" ascended through the orbits of the seven sacred planets until he reached the inner surface of the Empyrean.\n\n\"After the soul of the prophet,\" writes the anonymous author of Mankind: Their Origin and Destiny , \"in his ecstatic state has passed in its rapid flight through the seven spheres, from the sphere of the moon to that of Saturn, or from the planet which corresponds to Cancer, the gate of men, to that of Capricorn, which is the gate of the gods, a new gate opens to him in the highest heaven, and in the zodiac, beneath which the seven planets revolve; in a word, in the firmament, or that which the ancients called crystallinum primum, or the crystal heaven.\" When related to the Eastern system of metaphysics, these churches represent the chakras, or nerve ganglia, along the human spine, the \"door in heaven\" being the brahmarandra , or point in the crown of the skull (Golgotha), through which the spinal spirit fire passes to liberation.\n\nThe church of Ephesus corresponds to the muladhara , or sacral ganglion, and the other churches to the higher ganglia according to the order given in Revelation.\n\nDr.\n\nSteiner discovers a relationship between the seven churches and the divisions of the Aryan race."

