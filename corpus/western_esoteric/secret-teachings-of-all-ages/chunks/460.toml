body = "George is looked upon as the Patron of the order, for he typifies the higher nature of man overcoming the dragon of his own lower nature.\n\nWhile St.\n\nGeorge is supposed to have lived during the third century, it is probable that he was a mythological personage borrowed from pagan mythology.\n\n*** Like the Gnostics, the Essenes were emanationists.\n\nOne of their chief objects was the reinterpretation of the Mosaic Law according to certain secret spiritual keys preserved by them from the time of the founding of their order.\n\nIt would thus follow that the Essenes were Qabbalists and, like several other contemporary sects flourishing in Syria, were awaiting the advent of the Messiah promised in the early Biblical writings.\n\nJoseph and Mary, the parents of Jesus, are believed to have been members of the Essene Order.\n\nJoseph was many years the senior of Mary.\n\nAccording to The Protevangelium , he was a widower with grown sons, and in the Gospel of Pseudo-Matthew he refers to Mary as a little child less in age than his own grandchildren.\n\nIn her infancy Mary was dedicated to the Lord, and the Apocryphal writings contain many accounts of miracles associated with her early childhood.\n\nWhen she was twelve years old, the priests held counsel as to the future of this child who had dedicated herself to the Lord, and the Jewish high priest, bearing the breastplate, entered into the Holy of Holies, where an angel appeared to him, saying, \"Zacharias, go forth and summon the widowers of the people and let them take a rod apiece and she shall be the wife of him to whom the Lord shall show a sign.\" Going forth to meet the priests at the head of the widowers, Joseph collected the rods of all the other men and gave them into the keeping of the priests.\n\nNow Joseph's rod was but half as long as the others, and the priests on returning the rods to the widowers paid no attention to Joseph's but left it behind in the Holy of Holies.\n\nWhen all the other widowers had received back their wands, the priests awaited a sign from heaven, but none came.\n\nJoseph, because of his advanced age, did not: ask for the return of his rod, for to him it was inconceivable that he should be chosen.\n\nBut an angel appeared to the high priest, ordering him to give back the short rod which lay unnoticed in the Holy of Holies.\n\nAs the high priest handed the rod to Joseph, a white dove flew from the end of it and rested upon the head of the aged carpenter, and to him was given the child.\n\nThe editor of The Sacred Books and Early Literature of the East calls attention to the peculiar spirit with which the childhood of Jesus is treated in most of the Apocryphal books of the New Testament, particularly in one work attributed to the doubting Thomas, the earliest known Greek version of which dates from about A.D.\n\n200: \"The child Christ is represented almost as an imp, cursing and destroying those who annoy him.\" This Apocryphal work, calculated to inspire its readers with fear and trembling, was popular during the Middle Ages because it was in full accord with the cruel and persecuting spirit of mediæval Christianity.\n\nLike many other early sacred books, the book of Thomas was fabricated for two closely allied purposes: first, to outshine the pagans in miracle working; second, to inspire all unbelievers with the \"fear of the Lord.\" Apocryphal writings of this sort have no possible basis in fact.\n\nAt one time an asset, the \"miracles\" of Christianity have become its greatest liability.\n\nSupernatural phenomena, in a credulous age interpolated to impress the ignorant, in this century have only achieved the alienation of the intelligent."

