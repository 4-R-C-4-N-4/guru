body = "In other words, germs were minute creatures born out of man's evil thoughts and actions.\n\nThe fourth cause of disease was what the Orientals called Karma , that is, the Law of Compensation, which demanded that the individual pay in full for the indiscretions and delinquencies of the past.\n\nA physician had to be very careful how he interfered with the workings of this law, lest he thwart the plan of Eternal justice.\n\nThe fifth cause was the motion and aspects of the heavenly bodies .\n\nThe stars did not compel the sickness but rather impelled it.\n\nThe Hermetists taught that a strong and wise man ruled his stars, but that a negative, weak person was ruled by them.\n\nThese five causes of disease are all superphysical in nature.\n\nThey must be estimated by inductive and deductive reasoning and a careful consideration of the life and temperament of the patient.\n\nThe sixth cause of disease was a misuse of faculty, organ, or function , such as overstraining a member or overtaxing the nerves.\n\nThe seventh cause was the presence in the system of foreign substances, impurities, or obstructions .\n\nUnder this heading must be considered diet, air, sunlight, and the presence of foreign bodies.\n\nThis list does not include accidental injuries; such do not belong under the heading of disease.\n\nFrequently they are methods by which the Law of Karma expresses itself.\n\nAccording to the Hermetists, disease could be prevented or successfully combated in seven ways.\n\nFirst, by spells and invocations, in which the physician ordered the evil spirit causing the disease to depart from the patient.\n\nThis procedure was probably based on the Biblical account of the man possessed of devils whom Jesus healed by commanding the devils to leave the man and enter into a herd of swine.\n\nSometimes the evil spirits entered a patient at the bidding of someone desiring to injure him.\n\nIn these cases the physician commanded the spirits to return to the one who sent them.\n\nIt is recorded that in some instances the evil spirits departed through the mouth in the form of clouds of smoke; sometimes from the nostrils as flames.\n\nIt is even averred that the spirits might depart in the form of birds and insects.\n\nThe second method of healing was by vibration.\n\nThe inharmonies of the bodies were neutralized by chanting spells and intoning the sacred names or by playing upon musical instruments and singing.\n\nSometimes articles of various colors were exposed to the sight of the sick, for the ancients recognized, at least in part, the principle of color therapeutics, now in the process of rediscovery.\n\nThe third method was with the aid of talismans, charms, and amulets.\n\nThe ancients believed that the planets controlled the functions of the human body and that by making charms out of different metals they could combat the malignant influences of the various stars.\n\nThus, a person who is anæmic lacks iron.\n\nIron was believed to be under the control of Mars.\n\nTherefore, in order to bring the influence of Mars to the sufferer, around his neck was hung a talisman made of iron and bearing upon it certain secret instructions reputed to have the power of invoking the spirit of Mars.\n\nIf there was too much iron in the system, the patient was subjected to the influence of a talisman composed of the metal corresponding to some planet having an antipathy to Mars.\n\nThis influence would then offset the Mars energy and thus aid in restoring normality.\n\nThe fourth method was by the aid of herbs and simples.\n\nWhile they used metal talismans, the majority of the ancient physicians did not approve of mineral medicine in any form for internal use.\n\nHerbs were their favorite remedies.\n\nLike the metals, each herb was assigned to one of the planets.\n\nHaving diagnosed by the stars the sickness and its cause, the doctors then administered the herbal antidote.\n\nThe fifth method of healing disease was by prayer."

