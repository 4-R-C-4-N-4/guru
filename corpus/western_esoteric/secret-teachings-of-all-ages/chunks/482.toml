body = "The third horse, symbolizing the element of water, was sacred to Neptune.\n\nIt was of heavy gait and described a very small circle.\n\nThe fourth horse, signifying the static element of earth, described as immovable and champing its bit, was the steed of Vesta.\n\nDespite their differences in temperature, these four horses lived harmoniously together, which is in accord with the principles of the philosophers, who declared the world to be preserved by the concord and harmony of its elements.\n\nIn time, however, the racing horse of Jupiter burned the mane of the horse of earth; the thundering steed of Neptune also became covered with sweat, which overflowed the immovable horse of Vesta and resulted in the deluge of Deucalion.\n\nAt last the fiery horse of Jupiter will consume the rest, when the three inferior elements--purified by reabsorption in the fiery ether--will come forth renewed, constituting \"a new heaven and a new earth.\" When the fifth seal was opened St.\n\nJohn beheld those who had died for the word of God.\n\nWhen the sixth seal was broken there was a great earthquake, the sun being darkened and the moon becoming like blood.\n\nThe angels of the winds came forth and also another angel, who sealed upon their foreheads 144,000 of the children of Israel that they should be preserved against the awful day of tribulation.\n\nBy adding the digits together according to the Pythagorean system of numerical philosophy, the number 144,000 is reduced to 9, the mystic symbol of man and also the number of initiation, for he who passes through the nine degrees of the Mysteries receives the sign of the cross as emblematic of his regeneration and liberation from the bondage of his own infernal, or inferior, nature.\n\nThe addition of the three ciphers to the original sacred number 1.44 indicates the elevation of the mystery to the third sphere.\n\nWhen the seventh seal was broken there was silence for the space of half an hour.\n\nThen came forth seven angels and to each was given a trumpet.\n\nWhen the seven angels sounded their trumpets--intoned the seven-lettered Name of the Logos--great catastrophes ensued.\n\nA star, which was called Wormwood, fell from heaven, thereby signifying that the secret doctrine of the ancients had been given to men who had profaned it and caused the wisdom of God to become a destructive agency.\n\nAnd another star--symbolizing the false light of human reason as distinguished from the divine reason of the initiate--fell from heaven and to it (materialistic reason) was given the key to the bottomless pit (Nature), which it opened, causing all manner of evil creatures to issue forth.\n\nAnd there came also a mighty angel who was clothed in a cloud, whose face was as the sun and his feet and legs as pillars of fire, and one foot was upon the waters and the other upon the land (the Hermetic Anthropos ).\n\nThis celestial being gave St.\n\nJohn a little book, bidding him eat it, which the seer did.\n\nThe book is representative of the secret doctrine--that spiritual food which is the nourishment of the spirit.\n\nAnd St.\n\nJohn, being \"in the spirit,\" ate his fill of the wisdom of God and the hunger of his soul was appeased.\n\nJOHN'S VISION OF THE NEW JERUSALEM.\n\nFrom Klauber's Historiae Biblicae Veteris et Novi Testamenti.\n\nIn the upper left-hand corner is shown the destruction of Babylon, also the angel which cast the great millstone into the sea, saying, \"Thus with violence shall that great city Babylon be thrown down and shall be found no more at all.\" Below is the horseman, called Faithful and True, casting the beast into the bottomless pit."

