[content]
body = "He caused the letter ס(S) to predominate in sleep, crowned it, combined it with the others, and fashioned by them Sagittarius (the Archer) in the universe, the month Kislev in the year, and the stomach in the human body (male and female).\n\n10th .\n\nHe caused the letter ע(O) to predominate in anger, crowned it, combined it with the others, and fashioned by them Capricorn (the Goat) in the universe, the month Tebet in the year, and the liver in the human body (male and female).\n\n11th .\n\nHe caused the letter צ(Tz) to predominate in taste (or swallowing), crowned it, combined it with the others, and fashioned by them Aquarius (the Water Bearer) in the universe, the month Sebat in the year, and the esophagus in the human body (male and female).\n\n12th .\n\nHe caused the letter ק(Q) to predominate in mirth, crowned it, combined it with the others, and fashioned by them Pisces (the Fishes) in the universe, the month Adar in the year, and the spleen in the human body (male and female).\n\n6.\n\nHe made them as a conflict, He arranged them as provinces and drew them up like a wall.\n\nHe armed them and set one against another as in warfare.\n\n(The Elohim did likewise in the other spheres.) Chapter Six 1.\n\nThere are three Mothers or first elements, אמש(A, M, Sh), from which emanated three Fathers (progenitors)--primordial (spiritual) air, water, and fire--from which issued the seven planets (heavens) with their angels, and the twelve oblique points (zodiac).\n\n2.\n\nTo prove this there are three faithful witnesses: the universe, the year, and man.\n\nThere are the twelve, the balance, and the seven.\n\nAbove is the Dragon, below is the world, and lastly the heart of man; and in the midst is God who regulates them all.\n\n3.\n\nThe first elements are air, water, and fire; the fire is above, the water is below, and a breath of air establishes balance between them.\n\nThe token is: the fire carries the water.\n\nThe letterמ(M) is mute; ש(Sh) is hissing like fire; there is א(A) among them, a breath of air which reconciles the two.\n\n4.\n\nThe Dragon (Tali) is in the universe like a king upon his throne; the celestial sphere is in the year like a king in his empire; and the heart is in the body of men like a king in warfare.\n\n5.\n\nGod also set the opposites against each other: the good against the evil, and the evil against the good.\n\nGood proceeds from good, evil from evil; the good purifies the bad, the bad the good.\n\nThe good is reserved for the good, and the evil for the wicked.\n\n6.\n\nThere are three of which each stands by itself: one is in the affirmative (filled with good), one is in the negative (filled with evil), and the third equilibrates them.\n\n7.\n\nThere are seven divided three against three, and one in the midst of them (balance).\n\nTwelve stand in warfare: three produce love and three hatred; three are life-givers and three are destroyers.\n\n8.\n\nThe three that cause love are the heart and the two ears; the three that produce hatred are the liver, the gall, and the tongues; the three life-givers are the two nostrils and the spleen; and the three destroyers are the mouth and the two lower openings of the body.\n\nOver all these rules God, the faithful king, from His holy habitation in all eternity."

