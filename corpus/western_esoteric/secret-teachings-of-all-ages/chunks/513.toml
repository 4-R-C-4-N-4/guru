body = "THE COMTE DI CAGLIOSTRO The \"divine\" Cagliostro, one moment the idol of Paris, the next a lonely prisoner in a dungeon of the Inquisition, passed like a meteor across the face of France.\n\nAccording to his memoirs written by him during his confinement in the Bastille, Alessandro Cagliostro was born in Malta of a noble but unknown family.\n\nHe was reared and educated in Arabia under the tutelage of Altotas, a man well versed in several branches of philosophy and science and also a master of the transcendental arts.\n\nWhile Cagliostro's biographers generally ridicule this account, they utterly fail to advance in its stead any logical solution for the source of his magnificent store of arcane knowledge.\n\nBranded as an impostor and a charlatan, his miracles declared to be legerdemain, and his very generosity suspected of an ulterior motive, the Comte di Cagliostro is undoubtedly the most calumniated man in modem history.\n\n\"The mistrust,\" writes W.\n\nH.\n\nK.\n\nTrowbridge, \"that mystery and magic always inspire made Cagliostro with his fantastic personality an easy target for calumny.\n\nAfter having been riddled with abuse till he was unrecognizable, prejudice, the foster child of calumny, proceeded to lynch him, so to speak.\n\nFor over one hundred years his character has dangled on the gibbet of infamy, upon which the sbirri of tradition have inscribed a curse on any one who shall attempt to cut him down.\n\nHis fate has been his fame.\n\nHe is remembered in history, not so much for anything he did, as for what was done to him.\" (See Cagliostro, the Splendour and Misery of a Master of Magic .) According to popular belief Cagliostro's real name was Giuseppe Balsamo, and he was a Sicilian by birth.\n\nWithin recent years, however, doubts have arisen as to whether this belief is in accord with the facts.\n\nIt may yet be proved that in part, at least, the tirades of abuse heaped upon the unfortunate Comte have been directed against the wrong man.\n\nGiuseppe Balsamo was born in 1743 of honest but humble parentage.\n\nFrom boyhood he exhibited selfish, worthless, and even criminal tendencies, and after a series of escapades disappeared.\n\nTrowbridge( loc.\n\ncit.\n\n) presents ample proof that Cagliostro was not Giuseppe Balsamo, thus disposing of the worst accusation against him.\n\nAfter six months' imprisonment in the Bastille, on his trial Cagliostro was exonerated from any implication in the theft of the famous \"Queen's Necklace,\" and later the fact was established that he had actually warned Cardinal de Rohan of the intended crime.\n\nDespite the fact, however, that he was discharged as innocent by the French trial court, a deliberate effort to vilify Cagliostro was made by an artist--more talented than intelligent--who painted a picture showing him holding the fatal necklace in his hand.\n\nThe trial of Cagliostro has been called the prologue of the French Revolution.\n\nThe smoldering animosity against Marie Antoinette and Louis XVI engendered by this trial later burst forth as the holocaust of the Reign of Terror.\n\nIn his brochure, Cagliostro and His Egyptian Rite of Freemasonry , Henry R.\n\nEvans also ably defends this much persecuted man against the infamies so unjustly linked with his name.\n\nSincere investigators of the facts surrounding the life and mysterious \"death\" of Cagliostro are of the opinion that the stories circulated against him may be traced to the machinations of the Inquisition, which in this manner sought to justify his persecution."

