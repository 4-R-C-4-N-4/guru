body = "I bore him after death before he was born in the world; under my feet I have what was his, and out of me and my Son and the foundation of my feet the Philosopher's Stone is made.\" At the lower left the three constituents of the Stone are shown elevated upon a pedestal to signify their dignity.\n\nLeaf 25 .\n\nAbove the figure of the Queen are three lines stating, in substance, that in the beginning of the book it was written of her that from her maternal breasts she nourished the Sun, and that he who was capable of converting her into Primal matter possessed rare skill.\n\nOpposite the Queen's head are the words: \"In the highest mountains this water\" and \"I am the light of the Philosophers.\" To the left of the Queen is an admonition to strike the sons whom she bears.\n\nShe calls herself \"The mother of the Sun, the sister of the Moon, and the servant and spouse of Mercury.\" On the right she is made to exclaim: \"I cannot be crowned unless these sons of mine become ashes.\n\n\" The sons are shown directly below.\n\nThe verse under the Queen continues the alchemical processes, describing the method in which the exudations from the substance should be preserved.\n\nLeaf 26 .\n\nThis page, which concludes that part of the Hermetic manuscript bearing the symbols of the Secret Work, contains a number of emblems not directly correlated.\n\nAt the top is the head of the King--the most common of alchemical figures.\n\nTo the right of the King is an alchemical vessel designated the Hermetic Seal .\n\nBelow is the head of a ferocious bird, here designated a griffon.\n\nTo the left of the King is a headless figure elevating a Sun, or spiritual face.\n\nThis figure is the world, which must be headless, since its spiritual and rational part is not material and consequently, is invisible.\n\nBelow is a circle unaccompanied by descriptive matter.\n\nDirectly under the King's head is a vase of flowers, in which rises the golden plant of the Philosophers.\n\nAt the bottom of the page is additional alchemical equipment, this also being termed a Hermetic Seal ."

