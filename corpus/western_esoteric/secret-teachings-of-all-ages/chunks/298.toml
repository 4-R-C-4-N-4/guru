[content]
body = "The second order of gates is termed Decad of Evolution and its divisions areas follows: (11) Minerals differentiate; (12) Vegetable principles appear; (13) Seeds germinate in moisture; (14) Herbs and Trees; (15) Fructification in vegetable life; (16) Origin of low forms of animal life; (17) Insects and Reptiles appear; (18) Fishes, vertebrate life in the waters; (19) Birds, vertebrate life in the air; (20) Quadrupeds, vertebrate earth animals.\n\nThe third order of gates is termed Decad of Humanity and its divisions are as follows: (21) Appearance of Man; (22) Material human body; (23) Human Soul conferred; (24) Mystery of Adam and Eve; (25) Complete Man as the Microcosm; (26) Gift of five human faces acting exteriorly; (27) Gift of five powers to the soul; (28) Adam Kadmon, the Heavenly Man; (29) Angelic beings, (30) Man in the image of God.\n\nThe fourth order of gates is termed World of Spheres and its divisions are as follows: (31) The Heaven of the Moon; (32) The Heaven of Mercury, (33) The Heaven of Venus; (34) The Heaven of the Sun; (35) The Heaven of Mars; (36) The Heaven of Jupiter; (37) The Heaven of Saturn; (38) The Firmament; (39) The Primum Mobile; (40) The Empyrean Heaven.\n\nThe fifth order of gates is termed The Angelic World and its divisions are as follows: (41) Ishim--Sons of Fire; (42) Orphanim--Cherubim; (43) Aralim--Thrones; (44) Chashmalim--Dominions; (45) Seraphim--Virtues; (46) Melachim--Powers; (47) Elohim--Principalities; (48) Ben Elohim--Angels; (49) Cherubim--Archangels.\n\n[The order of the Angels is a matter of controversy, the arrangement above differing from that accepted in other sections of this volume.\n\nThe Rabbins disagree fundamentally as to the proper sequence of the Angelic names.] The sixth order is termed The Archetype and consists of but one gate: (50) God, AIN SOPH, He whom no mortal eye hath seen.\n\nThe fiftieth gate leads from creation into the Creative Principle and he who passes through it returns into the unlimited and undifferentiated condition of ALL.\n\nThe fifty gates reveal a certain evolutionary process and it was declared by the Rabbins that he who would attain to the highest degree of understanding must pass sequentially through all of these orders of life, each of which constituted a gate in that the spirit, passing from the lower to the higher, found in each more responsive organism new avenues of self-expression."

