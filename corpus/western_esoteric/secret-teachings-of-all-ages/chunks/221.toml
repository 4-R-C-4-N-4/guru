body = "The Apis further signifies that the God-Mind is incarnated in the body of a beast and therefore that the physical beast form is the sacred vehicle of divinity.\n\nMan's lower personality is the Apis in which Osiris incarnates.\n\nThe result of the combination is the creation of Sor-Apis (Serapis)-the material soul as ruler of the irrational material body and involved therein.\n\nAfter a certain period (which is determined by the square of five, or twenty-five years), the body of the Apis is destroyed and the soul liberated by the water which drowns the material life.\n\nThis was indicative of the washing away of the material nature by the baptismal waters of divine light and truth.\n\nThe drowning of the Apis is the symbol of death; the resurrection of Osiris in the new bull is the symbol of eternal renovation.\n\nThe white bull was also symbolically sacred as the appointed emblem of the initiates, signifying the spiritualized material bodies of both man and Nature.\n\nWhen the vernal equinox no longer occurred in the sign of Taurus, the Sun God incarnated in the constellation of Aries and the ram then became the vehicle of the solar power.\n\nThus the sun rising in the sign of the Celestial Lamb triumphs over the symbolic serpent of darkness.\n\nThe lamb is a familiar emblem of purity because of its gentleness and the whiteness of its wool.\n\nIn many of the pagan Mysteries it signified the Universal Savior, and in Christianity it is the favorite symbol of Christ.\n\nEarly church paintings show a lamb standing upon a little hill, and from its feet pour four streams of living water signifying the four Gospels.\n\nThe blood of the lamb is the solar life pouring into the world through the sign of Aries.\n\nThe goat is both a phallic symbol and also an emblem of courage or aspiration because of its surefootedness and ability to scale the loftiest peaks.\n\nTo the alchemists the goat's head was the symbol of sulphur.\n\nThe practice among the ancient Jews of choosing a scapegoat upon which to heap the sins of mankind is merely an allegorical depiction of the Sun Man who is the scapegoat of the world and upon whom are cast the sins of the twelve houses (tribes) of the celestial universe.\n\nTruth is the Divine Lamb worshiped throughout pagandom and slain for the sins of the world, and since the dawn of time the Savior Gods of all religions have been personifications of this Truth.\n\nThe Golden Fleece sought by Jason and his Argonauts is the Celestial Lamb--the spiritual and intellectual sun.\n\nThe secret doctrine is also typified by the Golden Fleece--the wool of the Divine Life, the rays of the Sun of Truth.\n\nSuidas declares the Golden Fleece to have been in reality a book, written upon skin, which contained the formulæ for the production of gold by means of chemistry.\n\nThe Mysteries were institutions erected for the transmutation of base ignorance into precious illumination.\n\nThe dragon of ignorance was the terrible creature set to guard the Golden Fleece, and represents the darkness of the old year which battles with the sun at the time of its equinoctial passage.\n\nDeer were sacred in the Bacchic Mysteries of the Greeks; the Bacchantes were often clothed in fawnskins.\n\nDeer were associated with the worship of the moon goddess and the Bacchic orgies were usually conducted at night.\n\nThe grace and speed of this animal caused it to be accepted as the proper symbol of esthetic abandon.\n\nDeer were objects of veneration with many nations.\n\nIn Japan, herds of them are still maintained in connection with the temples.\n\nThe wolf is usually associated with the principle of evil, because of the mournful discordance of its howl and the viciousness of its nature."

