body = "There is legend to the effect that the Tablet of Cebes, a dialogue between Cebes and Gerundio, was based upon an ancient table set up in the Temple of Kronos at Athens or Thebes which depicted the entire progress of human life.\n\nThe author of the Tablet of Cebes was a disciple of Socrates, and lived about 390 B.C.\n\nThe world is represented as a great mountain.\n\nOut of the earth at the base of it come he myriads of human creatures who climb upward in search of truth and immortality.\n\nAbove the clouds which conceal the summit of the mountain is the goal of human attainment--true happiness.\n\nThe figures and groups are arranged as follows: (1) the door of the wall of life; (2) the Genius or Intelligence; (3) deceit (4) opinions, desires, and pleasures; (5) fortune; (6) the strong; (7) venery, insatiability, flattery; (8) sorrow; (9) sadness; (10) misery; (11) grief, (12) rage or despair; (13) the house of misfortune; (14) penitence; (15) true opinion; (16) false opinion; (17) false doctrine; (18) poets, orators, geometers, et.\n\nal.; (19) incontinence, sexual indulgence, and opinion; (20) the road of the true doctrine (21) continence and patience; (22) the true doctrine; (23) truth and persuasion; (24) science and the virtues; (25) happiness, (26) the highest (first) pleasure of the wise man; (27) the lazy and the strays.\n\n*** At this time Cyril--later to be renowned as the founder of the doctrine of the Christian Trinity and canonized for his zeal--was Bishop of Alexandria.\n\nSeeing in Hypatia a continual menace to the promulgation of the Christian faith, Cyril--indirectly at least--was the cause of her tragic end.\n\nDespite every later effort to exonerate him from the stigma of her murder, the incontrovertible fact remains that he made no effort to avert the foul and brutal crime.\n\nThe only shred of excuse which might be offered in his defense is that, blinded by the spell of fanaticism, Cyril considered Hypatia to be a sorceress in league with the Devil.\n\nIn contrast to the otherwise general excellence of the literary works of Charles Kingsley maybe noted his puerile delineation of character of Hypatia in his book by that name.\n\nWithout exception, the meager historical references to this virgin philosopher attest her virtue, integrity, and absolute devotion to the principles of Truth and Right.\n\nWhile it is true that the best minds of the Christianity of that period may readily be absolved from the charge of participes criminis , the implacable hatred of Cyril unquestionably communicated itself to the more fanatical members of his faith, particularly to a group of monks from the Nitrian desert.\n\nLed by Peter the Reader, a savage and illiterate man, they attacked Hypatia on the open street as she was passing from the academy to her home.\n\nDragging the defenseless woman from her chariot, they took her to the Cæsarean Church.\n\nTearing away her garments, they pounded her to death with clubs, after which they scraped the flesh from her bones with oyster shells and carried the mutilated remains to a place called Cindron, where they burned them to ashes.\n\nThus perished in A.D.\n\n415 the greatest woman initiate of the ancient world, and with her fell also the Neo-Platonic School of Alexandria.\n\nThe memory of Hypatia has probably been perpetuated in the hagiolatry of the Roman Catholic Church in the person of St.\n\nCatherine of Alexandria."

