body = "The apple represents the knowledge of the procreative processes, by the awakening of which the material universe was established.\n\nThe allegory of Adam and Eve in the Garden of Eden is a cosmic myth, revealing the methods of universal and individual establishment.\n\nThe literal story, accepted for so many centuries by an unthinking world, is preposterous, but the creative mystery of which it is the symbol is one of Nature's profoundest verities.\n\nThe Ophites (serpent worshipers) revered the Edenic snake because it was the cause of individual existence.\n\nThough humanity is still wandering in a world of good and evil, it will ultimately attain completion and eat of the fruit of the Tree of Life growing in the midst of the illusionary garden of worldly things.\n\nThus the Tree of Life is also the appointed symbol of the Mysteries, and by partaking of its fruit man attains immortality.\n\nThe oak, the pine, the ash, the cypress, and the palm are the five trees of greatest symbolic importance.\n\nThe Father God of the Mysteries was often worshiped under the form of an oak; the Savior God--frequently the World Martyr--in the form of a pine; the world axis and the divine nature in humanity in the form of an ash; the goddesses, or maternal principle, in the form of a cypress; and the positive pole of generation in the form of the inflorescence of the mate date palm.\n\nTHE TREE OF NOAH.\n\nFrom the \"Breeches\" Bible of 1599.\n\nMost Bibles published during the Middle Ages contain a section devoted to genealogical tables showing the descent of humanity from Father Adam to the advent of Jesus Christ.\n\nThe tree growing from the roof of the Ark represents the body of Noah and its three branches, his sons--Shem, Ham, and Japheth.\n\nThe nations by the descendents of Noah's three sons are appropriately shown in the circles upon the branches of the tree.\n\nWhile such tables are hopelessly incorrect from a historical point of view, to the symbolist their allegorical interpretations are of inestimable importance.\n\n*** The pine cone is a phallic symbol of remote antiquity.\n\nThe thyrsus of Bacchus--a long wand or staff surmounted by a pine cone or cluster of grapes and entwined with ivy or grape-vine leaves, sometimes ribbons--signifies that the wonders of Nature may only be accomplished by the aid of solar virility, as symbolized by the cone or grapes.\n\nIn the Phrygian Mysteries, Atys--the ever-present sun-savior--dies under the branches of the pine tree (an allusion to the solar globe at the winter solstice) and for this reason the pine tree was sacred to his cult.\n\nThis tree was also sacred in the Mysteries of Dionysos and Apollo.\n\nAmong the ancient Egyptians and Jews the acacia, or tamarisk, was held in the highest religious esteem; and among modern Masons, branches of acacia, cypress, cedar, or evergreen are still regarded as most significant emblems.\n\nThe shittim-wood used by the children of Israel in the construction of the Tabernacle and the Ark of the Covenant was a species of acacia.\n\nIn describing this sacred tree, Albert Pike has written: \"The genuine acacia, also, is the thorny tamarisk, the same tree which grew around the body of Osiris.\n\nIt was a sacred tree among the Arabs, who made of it the idol Al-Uzza, which Mohammed destroyed.\n\nIt is abundant as a bush in the desert of Thur; and of it the 'crown of thorns' was composed, which was set on the forehead of Jesus of Nazareth."

