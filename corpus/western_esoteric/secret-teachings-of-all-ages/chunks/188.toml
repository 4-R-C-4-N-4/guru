[content]
body = "In the human brain there is a tiny gland called the pineal body, which is the sacred eye of the ancients, and corresponds to the third eye of the Cyclops.\n\nLittle is known concerning the function of the pineal body, which Descartes suggested (more wisely than he knew) might be the abode of the spirit of man.\n\nAs its name signifies, the pineal gland is the sacred pine cone in man--the eye single , which cannot be opened until CHiram (the Spirit Fire) is raised through the sacred seals which are called the Seven Churches in Asia.\n\nThere is an Oriental painting which shows three sun bursts.\n\nOne sunburst covers the head, in the midst of which sits Brahma with four heads, his body a mysterious dark color.\n\nThe second sunburst--which covers the heart, solar plexus, and upper abdominal region--shows Vishnu sitting in the blossom of the lotus on a couch formed of the coils of the serpent of cosmic motion, its seven-hooded head forming a canopy over the god.\n\nThe third sunburst is over the generative system, in the midst of which sits Shiva, his body a grayish white and the Ganges River flowing out of the crown of his head.\n\nThis painting was the work of a Hindu mystic who spent many years subtly concealing great philosophical principles within these figures.\n\nThe Christian legends could be related also to the human body by the same method as the Oriental, for the arcane meanings hidden in the teachings of both schools are identical.\n\nAs applied to Masonry, the three sunbursts represent the gates of the temple at which CHiram was struck, there being no gate in the north because the sun never shines from the northern angle of the heavens.\n\nThe north is the symbol of the physical because of its relation to ice (crystallized water) and to the body (crystallized spirit).\n\nIn man the light shines toward the north but never from it, because the body has no light of its own but shines with the reflected glory of the divine life-particles concealed within physical substance.\n\nFor this reason the moon is accepted as the symbol of man's physical nature.\n\nCHiram is the mysterious fiery, airy water which must be raised through the three grand centers symbolized by the ladder with three rungs and the sunburst flowers mentioned in the description of the Hindu painting.\n\nIt must also pass upward by means of the ladder of seven rungs-the seven plexuses proximate to the spine.\n\nThe nine segments of the sacrum and coccyx are pierced by ten foramina, through which pass the roots of the Tree of Life.\n\nNine is the sacred number of man, and in the symbolism of the sacrum and coccyx a great mystery is concealed.\n\nThat part of the body from the kidneys downward was termed by the early Qabbalists the Land of Egypt into which the children of Israel were taken during the captivity.\n\nOut of Egypt, Moses (the illuminated mind, as his name implies) led the tribes of Israel (the twelve faculties) by raising the brazen serpent in the wilderness upon the symbol of the Tau cross.\n\nNot only CHiram but the god-men of nearly every pagan Mystery ritual are personifications of the Spirit Fire in the human spinal cord.\n\nThe astronomical aspect of the Hiramic legend must not be overlooked.\n\nThe tragedy of CHiram is enacted annually by the sun during its passage through the signs of the zodiac.\n\n\"From the journey of the Sun through the twelve signs,\" writes Albert Pike, \"come the legend of the twelve labors of Hercules, and the incarnations of Vishnu and Buddha."

