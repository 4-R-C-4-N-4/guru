body = "To the Patristics it was inconceivable that there should ever exist another creature so noble, so fortunate, or so able as man, for whose sole benefit and edification all the kingdoms of Nature were primarily created.\n\nPatristic philosophy culminated in Augustinianism , which may best be defined as Christian Platonism.\n\nOpposing the Pelasgian doctrine that man is the author of his own salvation, Augustinianism elevated the church and its dogmas to a position of absolute infallibility--a position which it successfully maintained until the Reformation.\n\nGnosticism , a system of emanationism, interpreting Christianity in terms of Greek, Egyptian, and Persian metaphysics, appeared in the latter part of the first century of the Christian Era.\n\nPractically all the information extant regarding the Gnostics and their doctrines, stigmatized as heresy by the ante-Nicene Church Fathers, is derived from the accusations made against them, particularly from the writings of St.\n\nIrenæus.\n\nIn the third century appeared Manichæism , a dualistic system of Persian origin, which taught that Good and Evil were forever contending for universal supremacy.\n\nIn Manichæism, Christ is conceived to be the Principle of redeeming Good in contradistinction to the man Jesus, who was viewed as an evil personality.\n\nThe death of Boethius in the sixth century marked the close of the ancient Greek school of philosophy.\n\nThe ninth century saw the rise of the new school of Scholasticism , which sought to reconcile philosophy with theology.\n\nRepresentative of the main divisions of the Scholastic school were the Eclecticism of John of Salisbury, the Mysticism of Bernard of Clairvaux and St.\n\nBonaventura, the Rationalism of Peter Abelard, and the pantheistic Mysticism of Meister Eckhart .\n\nAmong the Arabian Aristotelians were Avicenna and Averroes.\n\nThe zenith of Scholasticism was reached with the advent of Albertus Magnus and his illustrious disciple, St.\n\nThomas Aquinas.\n\nThomism (the philosophy of St.\n\nThomas Aquinas, sometimes referred to as the Christian Aristotle) sought to reconcile the various factions of the Scholastic school.\n\nThomism was basically Aristotelian with the added concept that faith is a projection of reason.\n\nScotism , or the doctrine of Voluntarism promulgated by Joannes Duns Scotus, a Franciscan Scholastic, emphasized the power and efficacy of the individual will, as opposed to Thomism.\n\nThe outstanding characteristic of Scholasticism was its frantic effort to cast all European thought in an Aristotelian mold.\n\nEventually the Schoolmen descended to the level of mere wordmongers who picked the words of Aristotle so clean that nothing but the bones remained.\n\nIt was this decadent school of meaningless verbiage against which Sir Francis Bacon directed his bitter shafts of irony and which he relegated to the potter's field of discarded notions.\n\nThe Baconian, or inductive, system of reasoning (whereby facts are arrived at by a process of observation and verified by experimentation) cleared the way for the schools of modern science.\n\nBacon was followed by Thomas Hobbes (for some time his secretary), who held mathematics to be the only exact science and thought to be essentially a mathematical process.\n\nHobbes declared matter to be the only reality, and scientific investigation to be limited to the study of bodies, the phenomena relative to their probable causes, and the consequences which flow from them under every variety of circumstance.\n\nHobbes laid special stress upon the significance of words, declaring understanding to be the faculty of perceiving the relationship between words and the objects for which they stand.\n\nHaving broken away from the scholastic and theological schools, Post-Reformation , or modern, philosophy experienced a most prolific growth along many diverse lines."

