body = "The headdresses of the Egyptians have great symbolic and emblematic importance, for they represent the auric bodies of the superhuman intelligences, and are used in the same way that the nimbus, halo, and aureole are used in Christian religious art.\n\nFrank C.\n\nHiggins, a well-known Masonic symbolist, has astutely noted that the ornate headgears of certain gods and Pharaohs are inclined backward at the same angle as the earth's axis.\n\nThe robes, insignia, jewels, and ornamentations of the ancient hierophants symbolized the spiritual energies radiating from the human body.\n\nModern science is rediscovering many of the lost secrets of Hermetic philosophy.\n\nOne of these is the ability to gauge the mental development, the soul qualities, and the physical health of an individual from the streamers of semi-visible electric force which pour through the surface of the skin of every human being at all times during his life.\n\n(For details concerning a scientific process for making the auric emanations visible, see The Human Atmosphere by Dr.\n\nWalter J.\n\nKilner.) Isis is sometimes symbolized by the head of a cow; occasionally the entire animal is her symbol.\n\nThe first gods of the Scandinavians were licked out of blocks of ice by the Mother Cow (Audhumla), who symbolized the principle of natural nutriment and fecundity because of her milk.\n\nOccasionally Isis is represented as a bird.\n\nShe often carries in one hand the crux ansata , the symbol of eternal life, and in the other the flowered scepter, symbolic of her authority.\n\nThoth Hermes Trismegistus, the founder of Egyptian learning, the Wise Man of the ancient world, gave to the priests and philosophers of antiquity the secrets which have been preserved to this day in myth and legend.\n\nThese allegories and emblematic figures conceal the secret formulæ for spiritual, mental, moral, and physical regeneration commonly known as the Mystic Chemistry of the Soul (alchemy).\n\nThese sublime truths were communicated to the initiates of the Mystery Schools, but were concealed from the profane.\n\nThe latter, unable to understand the abstract philosophical tenets, worshiped the concrete sculptured idols which were emblematic of these secret truths.\n\nThe wisdom and secrecy of Egypt are epitomized in the Sphinx, which has preserved its secret from the seekers of a hundred generations.\n\nThe mysteries of Hermeticism, the great spiritual truths hidden from the world by the ignorance of the world, and the keys of the secret doctrines of the ancient philosophers, are all symbolized by the Virgin Isis.\n\nVeiled from head to foot, she reveals her wisdom only to the tried and initiated few who have earned the right to enter her sacred presence, tear from the veiled figure of Nature its shroud of obscurity, and stand face to face with the Divine Reality.\n\nThe explanations in these pages of the symbols peculiar to the Virgin Isis are based (unless otherwise noted) on selections from a free translation of the fourth book of Bibliotèque des Philosophes Hermétiques , entitled \"The Hermetical Signification of the Symbols and Attributes of Isis,\" with interpolations by the compiler to amplify and clarify the text.\n\nThe statues of Isis were decorated with the sun, moon, and stars, and many emblems pertaining to the earth, over which Isis was believed to rule (as the guardian spirit of Nature personified).\n\nSeveral images of the goddess have been found upon which the marks of her dignity and position were still intact.\n\nAccording to the ancient philosophers, she personified Universal Nature, the mother of all productions.\n\nThe deity was generally represented as a partly nude woman, often pregnant, sometimes loosely covered with a garment either of green or black color, or of four different shades intermingled-black, white, yellow, and red."

