[content]
body = "The Argonautic expedition, listening to the advice of Orpheus, stopped at the island of Samothrace for the purpose of having its members initiated into the Cabiric rites.\n\nHerodotus relates that when Cambyses entered the temple of the Cabiri he was unable to restrain his mirth at seeing before him the figure of a man standing upright and, facing the man, the figure of a woman standing on her head.\n\nHad Cambyses been acquainted with the principles of divine astronomy, he would have realized that he was then in the presence of the key to universal equilibrium.\n\n\"'I ask,' says Voltaire, 'who were these Hierophants, these sacred Freemasons, who celebrated their Ancient Mysteries of Samothracia, and whence came they and their gods Cabiri?'\" (See Mackey's Encyclopædia of Freemasonry .) Clement speaks of the Mysteries of the Cabiri as \"the sacred Mystery of a brother slain by his brethren,\" and the \"Cabiric death\" was one of the secret symbols of antiquity.\n\nThus the allegory of the Self murdered by the not-self is perpetuated through the religious mysticism of all peoples.\n\nThe philosophic death and the philosophic resurrection are the Lesser and the Greater Mysteries respectively.\n\nA curious aspect of the dying-god myth is that of the Hanged Man.\n\nThe most important example of this peculiar conception is found in the Odinic rituals where Odin hangs himself for nine nights from the branches of the World Tree and upon the same occasion also pierces his own side with the sacred spear.\n\nAs the result of this great sacrifice, Odin, while suspended over the depths of Nifl-heim, discovered by meditation the runes or alphabets by which later the records of his people were preserved.\n\nBecause of this remarkable experience, Odin is sometimes shown seated on a gallows tree and he became the patron deity of all who died by the noose.\n\nEsoterically, the Hanged Man is the human spirit which is suspended from heaven by a single thread.\n\nWisdom, not death, is the reward for this voluntary sacrifice during which the human soul, suspended above the world of illusion, and meditating upon its unreality, is rewarded by the achievement of self-realization.\n\nFrom a consideration of all these ancient and secret rituals it becomes evident that the mystery of the dying god was universal among the illumined and venerated colleges of the sacred teaching.\n\nThis mystery has been perpetuated in Christianity in the crucifixion and death of the God-man-Jesus the Christ.\n\nThe secret import of this world tragedy and the Universal Martyr must be rediscovered if Christianity is to reach the heights attained by the pagans in the days of their philosophic supremacy.\n\nThe myth of the dying god is the key to both universal and individual redemption and regeneration, and those who do not comprehend the true nature of this supreme allegory are not privileged to consider themselves either wise or truly religious."

