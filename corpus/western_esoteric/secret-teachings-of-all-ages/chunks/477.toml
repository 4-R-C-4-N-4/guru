body = "THE presence of the Temple of Diana at Ephesus marked that city as sacred to the Mystery religion, for the Seven Wonders of the ancient world were erected to indicate the repositories of recondite knowledge.\n\nOf Ephesus, H.\n\nP.\n\nBlavatsky writes: \"It was a focus of the universal 'secret' doctrines; the weird laboratory whence, fashioned in elegant Grecian phraseology, sprang the quintessence of Buddhistic, Zoroastrian, and Chaldean philosophy.\n\nArtemis, the gigantic concrete symbol of theosophico-pantheistic abstractions, the great mother Multimamma, androgyne and patroness of the 'Ephesian writings,' was conquered by Paul; but although the zealous converts of the apostles pretended to burn all their books on 'curious arts, τα περιεργα, enough of these remained for them to study when their first zeal had cooled off.\" (See Isis Unveiled .) Being a great center of pagan learning, Ephesus has been the locale for many early Christian myths.\n\nThe assertion has been made that it was the last domicile of the Virgin Mary; also that the tomb of St.\n\nJohn the Divine was located there.\n\nAccording to legend, St.\n\nJohn did not depart from this life in the usual manner but, selecting his vault, entered it while still alive, and closing the entrance behind him, vanished forever from mortal sight.\n\nA rumor was current in ancient Ephesus that St.\n\nJohn would sleep in his tomb until the return of the Savior, and that when the apostle turned over on his sepulchral couch the earth above moved like the coverlets of a bed.\n\nSubjected to more criticism than any other book now incorporated in the New Testament, the Apocalypse--popularly accredited to St.\n\nJohn the Divine--is by far the most important but least understood of the Gnostic Christian writings.\n\nThough Justin Martyr declared the Book of Revelation to have been written by \"John, one of Christ's apostles,\" its authorship was disputed as early as the second century after Christ.\n\nIn the third century these contentions became acute and even Dionysius of Alexandria and Eusebius attacked the Johannine theory, declaring that both the Book of Revelation and the Gospel according to St.\n\nJohn were written by one Cerinthus, who borrowed the name of the great apostle the better to foist his own doctrines upon the Christians.\n\nLater Jerome questioned the authorship of the Apocalypse and during the Reformation his objections were revived by Luther and Erasmus.\n\nThe once generally accepted notion that the Book of Revelation was the actual record of a \"mystical experience\" occurring to St.\n\nJohn while that seer was an exile in the Isle of Parmos is now regarded with disfavor by more critical scholars.\n\nOther explanations have therefore been advanced to account for the symbolism permeating the volume and the original motive for its writing.\n\nThe more reasonable of these theories may be summed up as follows: First, upon the weight of evidence furnished by its own contents the Book of Revelation may well be pronounced a pagan writing--one of the sacred books of the Eleusinian or Phrygian Mysteries.\n\nAs a corollary, the real author of a work setting forth the profundities of Egyptian and Greek mysticism must have been an initiate himself and consequently obligated to write only in the symbolic language of the Mysteries.\n\nSecond, it is possible that the Book of Revelation was written to reconcile the seeming discrepancies between the early Christian and pagan religious philosophies.\n\nWhen the zealots of the primitive Christian Church sought to Christianize pagandom, the pagan initiates retorted with a powerful effort to paganize Christianity.\n\nThe Christians failed but the pagans succeeded."

