body = "Giving up his desire to visit Jerusalem, he arranged with the Arabians for his transportation to Damcar.\n\nC.R.C.\n\nwas but sixteen years of age when he arrived at Damcar.\n\nHe was received as one who had been long expected, a comrade and a friend in philosophy, and was instructed in the secrets of the Arabian adepts.\n\nWhile there, C.R.C.\n\nlearned the Arabic tongue and translated the sacred book M into Latin; and upon returning to Europe he brought this important volume with him.\n\nAfter studying three years in Damcar, C.R.C.\n\ndeparted for the city of Fez, where the Arabian magicians declared further information would be given him.\n\nAt Fez he was instructed how to communicate with the Elementary inhabitants [probably the Nature spirits], and these disclosed to him many other great secrets of Nature.\n\nWhile the philosophers in Fez were not so great as those in Damcar, the previous experiences of C.R.C.\n\nenabled him to distinguish the true from the false and thus add greatly to his store of knowledge.\n\nAfter two years in Fez, C.R.C.\n\nsailed for Spain, carrying with him many treasures, among them rare plants and animals accumulated during his wanderings.\n\nHe fondly hoped that the learned men of Europe would receive with gratitude the rare intellectual and material treasures which he had brought for their consideration.\n\nInstead he encountered only ridicule, for the so-called wise were afraid to admit their previous ignorance lest their prestige be impaired.\n\nAt this point in the narrative is an interpolation stating that Paracelsus, while not a member of the \"Fraternity of the Rose Cross,\" had read the book M and from a consideration of its contents had secured information which made him the foremost physician of medieval Europe.\n\nTired, but not discouraged, as the result of the fruitlessness of his efforts, C.R.C.\n\nreturned to Germany, where he built a house in which he could quietly carry on his study and research.\n\nHe also manufactured a number of rare scientific instruments for research purposes.\n\nWhile he could have made himself famous had he cared to commercialize his knowledge, he preferred the companionship of God to the esteem of men.\n\nAfter five years of retirement he decided to renew his struggle for a reformation of the arts and sciences of his day, this time with the aid of a few trusted friends.\n\nHe sent to the cloister where his early training had been received and called to himself three brethren, whom he bound by an oath to preserve inviolate the secrets he should impart and to write down for the sake of posterity the information he should dictate.\n\nThese four founded the \"Fraternity of the Rose Cross.\" They prepared its secret cipher language and, according to the Fama , a great dictionary in which all forms of wisdom were classified to the glorification of God.\n\nThey also began the work of transcribing the book M , but found the task too difficult because of the demands of the great numbers of sick who came to them for healing.\n\nHaving completed a newer and larger building, which they called the \"House of the Holy Spirit,\" they decided to include four new members in the Fraternity, thus increasing the number to eight, seven of whom were German.\n\nAll were unmarried.\n\nWorking industriously together, they speedily completed the arduous labor of preparing the documents, instructions, and arcana of the Order.\n\nThey also put the house called \"Sancti Spiritus\" in order.\n\nTHE GOLDEN AND ROSY CROSS.\n\nFrom Geheime Figuren der Rosenkreuzer.\n\nIt is said of this cross that it is made of spiritual gold and that each Brother wears it upon his breast.\n\nIt bears the alchemical symbols of salt, sulphur, and mercury; also a star of the planets; and around it are the four words FAITH, HOPE, LOVE, and PATIENCE."

