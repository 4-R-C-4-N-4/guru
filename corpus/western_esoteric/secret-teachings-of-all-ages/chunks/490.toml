body = "When the enthusiasm of his followers finally forced his hand and he publicly announced his mission, he was already the leader of a strong and well-organized faction.\n\nFearing Mohammed's growing prestige, the people of Mecca, waiving the time-honored tradition that blood could not be spilt within the holy city, decided to exterminate Islam by assassinating the Prophet.\n\nAll the different groups combined in this undertaking so that the guilt for the crime might thereby be more evenly distributed.\n\nDiscovering the danger in time, Mohammed left his friend Ali in his bed and fled with Abu Bekr from the city, and after adroitly eluding the Meccans, joined the main body of his followers that had preceded him to Yathrib (afterwards called Medina).\n\nUpon this incident-called the Hegira or \"flight\"--is based the Islamic chronological system.\n\nDating from the Hegira the power of the Prophet steadily grew until in the eighth year Mohammed entered Mecca after practically a bloodless victory and established it as the spiritual center of his faith.\n\nPlanting his standard to the north of Mecca, he rode into the city, and after circling seven times the sacred Caaba , ordered the 360 images within its precincts to be hewn down.\n\nHe then entered the Caaba itself, cleansed it of its idolatrous associations, and rededicated the structure to Allah, the monotheistic God of Islam.\n\nMohammed next granted amnesty to all his enemies for their attempts to destroy him.\n\nUnder his protection Mecca increased in power and glory, becoming the focal point of a great annual pilgrimage, which even to this day winds across the desert in the months of pilgrimage and numbers over threescore thousand in its train.\n\nIn the tenth year after the Hegira, Mohammed led the valedictory pilgrimage and for the last time rode at the head of the faithful along the sacred way leading to Mecca and the Black Stone.\n\nAs the premonition of death was strong upon him, he desired this pilgrimage to be the perfect model for all the thousands that would follow.\n\n\"Conscious that life was waning away within him,\" writes Washington Irving, \"Mahomet, during this last sojourn in the sacred city of his faith, sought to engrave his doctrines deeply in the minds and hearts of his followers.\n\nFor this purpose he preached frequently in the Caaba from the pulpit, or in the open air from the back of his camel.\n\n'Listen to my words,' would he say, 'for I know not whether, after this year, we shall ever meet here again.\n\nOh, my hearers, I am but a man like yourselves; the angel of death may at any time appear, and I must obey his summons.\"' While thus preaching, the very heavens are said to have opened and the voice of God spoke, saying: \"This day I have perfected your religion, and accomplished in you my grace.\" When these words were uttered the multitude fell down in adoration and even Mohammed's camel knelt.\n\n(See Mahomet and His Successors .) Having completed the valedictory pilgrimage, Mohammed returned to Medina.\n\nIn the seventh year after the Hegira (A.H.\n\n7) an attempt was made at Kheibar to poison the Prophet.\n\nAs Mohammed took the first mouthful of the poisoned food, the evil design was revealed to him either by the taste of the meat or, as the faithful believe, by divine intercession.\n\nHe had already swallowed a small portion of the food, however, and for the remainder of his life he suffered almost constantly from the effects of the poison.\n\nIn A.H.\n\n11, when his final illness came upon him, Mohammed insisted that the subtle effects of the poison were the indirect cause of his approaching end."

