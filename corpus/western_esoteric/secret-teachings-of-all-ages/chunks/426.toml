body = "While the Folios and Quartos usually are signed \"William Shakespeare,\" all the known autographs of the Stratford actor read \"William Shakspere.\" Does this change in spelling contain any significance heretofore generally overlooked?\n\nFurthermore, if the publishers of the First Shakespearian Folio revered their fellow actor as much as their claims in that volume would indicate, why did they, as if in ironical allusion to a hoax which they were perpetrating, place an evident caricature of him on the title page?\n\nCertain absurdities also in Shakspere's private life are irreconcilable.\n\nWhile supposedly at the zenith of his literary career, he was actually engaged in buying malt, presumably for a brewing business!\n\nAlso picture the immortal Shakspere--the reputed author of The Merchant of Venice --as a moneylender!\n\nYet among those against whom Shakspere brought action to collect petty sums was a fellow townsman--one Philip Rogers--whom he sued for an unpaid loan of two shillings, or about forty-eight cents!\n\nIn short, there is nothing known in the life of Shakspere that would justify the literary excellence imputed to him.\n\nThe philosophic ideals promulgated throughout the Shakespearian plays distinctly demonstrate their author to have been thoroughly familiar with certain doctrines and tenets peculiar to Rosicrucianism; in fact the profundity of the Shakespearian productions stamps their creator as one of the illuminati of the ages.\n\nMost of those seeking a solution for the Bacon-Shakspere controversy have been intellectualists.\n\nNotwithstanding their scholarly attainments, they have overlooked the important part played by transcendentalism in the philosophic achievements of the ages.\n\nThe mysteries of superphysics are inexplicable to the materialist, whose training does not equip him to estimate the extent of their ramifications and complexities.\n\nYet who but a Platonist, a Qabbalist, or a Pythagorean could have written The Tempest , Macbeth , Hamlet , or The Tragedy of Cymbeline ?\n\nWho but one deeply versed in Paracelsian lore could have conceived, A Midsummer Night's Dream ?\n\nHEADPIECE SHOWING LIGHT AND SHADED A's.\n\nFrom Shakespeare's King Richard The Second, Quarto of 1597.\n\nThe ornamental headpiece shown above has long been considered a Baconian or Rosicrucian signature.\n\nThe light and the dark A's appear in several volumes published by emissaries of the Rosicrucians.\n\nIf the above figure be compared with that from the Alciati Emblemata on the following pages, the cryptic use of the two A's will be further demonstrated.\n\n*** Father of modern science, remodeler of modern law, editor of the modem Bible, patron of modem democracy, and one of the founders of modern Freemasonry, Sir Francis Bacon was a man of many aims and purposes.\n\nHe was a Rosicrucian, some have intimated the Rosicrucian.\n\nIf not actually the Illustrious Father C.R.C.\n\nreferred to in the Rosicrucian manifestoes, he was certainly a high initiate of the Rosicrucian Order, and it is his activities in connection with this secret body that are of prime importance to students of symbolism, philosophy, and literature.\n\nTHE TITLE PAGE OF BURTON'S ANATOMY OF MELANCHOLY.\n\nFrom Burton's Anatomy of Melancholy.\n\nBaconian experts declare Burton's Anatomy of Melancholy to be in reality Francis Bacon's scrapbook in which he gathered strange and rare bits of knowledge during the many years of eventful life.\n\nThis title page has long been supposed to contain a cryptic message.\n\nThe key to this cipher is the pointing figure of the maniac in the lower right-hand corner of the design.\n\nAccording to Mrs."

