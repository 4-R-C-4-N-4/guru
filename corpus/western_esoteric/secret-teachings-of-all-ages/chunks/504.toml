[content]
body = "To secure this information, Hunahpu pulled a hair from his leg, which hair then became a strange insect called Xan ; buzzing along the black road, the Xan entered the council chamber of the princes of Xibalba and stung the leg of the figure nearest the door, which it discovered to be a manikin.\n\nBy the same artifice the second figure was proved to be of wood, but upon stinging the third, there was an immediate response.\n\nBy stinging each of the twelve assembled princes in turn the insect thus discovered each one's name, for the princes called each other by name in discussing the cause of the mysterious bites.\n\nHaving secured the desired information in this novel manner, the insect then flew back to Hunahpu and Xbalanque, who thus fortified, fearlessly approached the threshold of Xibalba and presented themselves to the twelve assembled princes.\n\nWhen told to adore the king, Hunahpu and Xbalanque laughed, for they knew that the figure pointed out to them was the lifeless manikin.\n\nThe young adventurers thereupon addressed the twelve princes by name thus: \"Hail, Hun-came; hail, Vukub-came; hail, Xiquiripat; hail, Cuchumaquiq; hail, Ahalpuh; hail, Ahalcana; hail, Chamiabak; hail, Chamiaholona; hail, Quiqxic; hail, Patan; hail, Quiqre; hail, Quiqrixqaq.\" When invited by the Xibalbians to seat themselves upon a great stone bench, Hunahpu and Xbalanque declined to do so, declaring that they well knew the stone to be heated so that they would he burned to death if they sat upon it.\n\nThe princes of Xibalba then ordered Hunahpu and Xbalanque to rest for the night in the House of Shadows.\n\nThis completed the first degree of the Xibalbian Mysteries.\n\nThe second trial was given in the House of Shadows, where to each of the candidates was brought a pine torch and a cigar, with the injunction that both must be kept alight throughout the entire night and yet each must be returned the next morning unconsumed.\n\nKnowing that death was the alternative to failure in the test, the young men burnt aras-feathers in place of the pine splinters (which they closely resemble) and also put fireflies on the tips of the cigars.\n\nSeeing the lights, those who watched felt certain that Hunahpu and Xbalanque had fallen into the trap, but when morning came the torches and cigars were returned to the guards unconsumed and still burning.\n\nIn amazement and awe, the princes of Xibalba gazed upon the unconsumed splinters and cigars, for never before had these been returned intact.\n\nThe third ordeal took place presumably in a cavern called the House of Spears.\n\nHere hour after hour the youths were forced to defend themselves against the strongest and most skillful warriors armed with spears.\n\nHunahpu and Xbalanque pacified the spearmen, who thereupon ceased attacking them.\n\nThey then turned their attention to the second and most difficult part of the test: the production of four vases of the rarest flowers but which they were not permitted to leave the temple to gather.\n\nUnable to pass the guards, the two young men secured the assistance of the ants.\n\nThese tiny creatures, crawling into the gardens of the temple, brought back the blossoms so that by morning the vases were filled.\n\nWhen Hunahpu and Xbalanque presented the flowers to the twelve princes, the latter, in amazement, recognized the blossoms as having been filched from their own private gardens."

