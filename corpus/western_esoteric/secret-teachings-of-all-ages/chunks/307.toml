body = "HENRIE STEPHEN, in A World of Wonders , published in 1607, mentions a monk of St.\n\nAnthony who declared that while in Jerusalem the patriarch of that city had shown him not only one of the ribs of the Word made flesh and some rays from the Star of Bethlehem, but also the snout of a seraph, a finger nail of a cherub, the horns of Moses, and a casket containing the breath of Christ!\n\nTo a people believing implicitly in a seraph sufficiently tangible to have its proboscis preserved, the more profound issues of Judaistic philosophy must necessarily be incomprehensible.\n\nNor is it difficult to imagine the reaction taking place in the mind of some ancient sage should he hear that a cherub--which, according to St.\n\nAugustine, signifies the Evangelists; according to Philo Judæus, the outermost circumference of the entire heavens, and according to several of the Church Fathers, the wisdom of God--had sprouted finger nails.\n\nThe hopeless confusion of divine principles with the allegorical figures created to represent them to the limited faculties of the uninitiated has resulted in the most atrocious misconceptions of spiritual truths.\n\nConcepts well-nigh as preposterous as these, however, still stand as adamantine barriers to a true understanding of Old and New Testament symbolism; for, until man disentangles his reasoning powers from the web of venerated absurdities in which his mind has lain ensnared for centuries, how can Truth ever be discovered?\n\nThe Old Testament--especially the Pentateuch--contains not only the traditional account of the creation of the world and of man, but also, locked within it, the secrets of the Egyptian initiators of the Moses concerning the genesis of the god-man (the initiate) and the mystery of his rebirth through philosophy.\n\nWhile the Lawgiver of Israel is known to have compiled several works other than those generally attributed to him, the writings now commonly circulated as the purported sixth and seventh books of Moses are in reality spurious treatises on black magic foisted on the credulous during the Middle Ages.\n\nOut of the hundreds of millions of pious and thoughtful students of Holy Writ, it is almost inconceivable that but a mere handful have sensed the sublimity of the esoteric teachings of Sod (the Jewish Mysteries of Adonai).\n\nYet familiarity with the three Qabbalistical processes termed Gematria , Notarikon , and Temurah makes possible the discovery of many of the profoundest truths of ancient Jewish superphysics.\n\nBy Gematria is meant not only the exchange of letters for their numerical equivalents but also the method of determining by an analysis of its measurements the mystic purpose for which a building or other object was constructed.\n\nS.\n\nL.\n\nMacGregor-Mathers, in The Kabbalah Unveiled , gives this example of the application of Gematria: \"Thus also the passage, Gen.\n\nxviii.\n\n2 VHNH SHLSHH, Vehenna Shalisha , 'And lo, three men,' equals in numerical value 'ALV MIKAL GBRIAL VRPAL, Elo Mikhael Gabriel Ve-Raphael ,' These are Mikhael, Gabriel and Raphael; 'for each phrase = 701.\" Assuming the sides of a scalene to be 11, 9, and 6 inches, a triangle of such dimensions would then be an appropriate symbol of Jehovah, for the sum of its three sides would be 26, the numerical value of the Hebrew word IHVH.\n\nGematria also includes the system of discovering the arcane meaning of a word by analyzing the size and arrangement of the strokes employed in the formation of its various letters.\n\nGematria was employed by the Greeks as well as the Jews.\n\nThe books of the New Testament--particularly those attributed to St.\n\nJohn--contain many examples of its use."

