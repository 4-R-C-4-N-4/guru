[content]
body = "Summarizing the relationship between the human body and the theory of architectonics, Vitruvius writes: \"Since nature has designed the human body so that its members are duly proportioned to the frame as a whole, it appears that the ancients had good reason for their rule, that in perfect building the different members must be in exact symmetrical relations to the whole general scheme.\n\nHence, while transmitting to us the proper arrangements for buildings of all kinds, they were particularly careful to do so in the case of temples of the gods, buildings in which merits and faults usually last forever.\n\n* * * Therefore, if it is agreed that number was found out from the human fingers, and that there is a symmetrical correspondent between the members separately and the entire form of the body, in accordance with a certain part selected as standard, we can have nothing but respect for those who, in constructing temples of the immortal gods, have so arranged the members of the works that both the separate parts and the whole design may harmonize in their proportions and symmetry.\" (See The Ten Books on Architecture) By some it is believed that St.\n\nPaul was initiated into the Dionysiac Mysteries, for in the tenth verse of the third chapter of First Corinthians he calls himself a \"master-builder\" or adept: \"According to the grace of God which is given into me, as a wise master-builder, I have laid the foundation and another buildeth thereon.\n\n\" As survivals of the ancient Dionysiac rites, the two diagrams of Cesariano, accompanying this chapter are of incalculable value to the modern mystic architect.\n\n*** This organization was composed exclusively of initiates of the Bacchus-Dionysos cult and was peculiarly consecrated to the science of building and the art of decoration.\n\nAcclaimed as being the custodians of a secret and sacred knowledge of architectonics, its members were entrusted with the design and erection of public buildings and monuments.\n\nThe superlative excellence of their handiwork elevated the members of the guild to a position of surpassing dignity; they were regarded as the master craftsmen of the earth.\n\nBecause of the first dances held in honor of Dionysos, he was considered the founder and patron of the theater, and the Dionysians specialized in the construction of buildings adapted for the presentation of dramatic performances.\n\nIn the circular or semicircular orchestra they invariably erected an altar to Æschylus, the famous Greek poet, that while appearing in one of his own plays he was suspected by a mob of angry spectators of revealing one of the profound secrets of the Mysteries and was forced to seek refuge at the altar of Dionysos.\n\nSo carefully did the Dionysiac Architects safeguard the secrets of their craft that only fragmentary records exist of their esoteric teachings.\n\nJohn A.\n\nWeisse thus sums up the meager data available concerning the order: \"They made their appearance certainly not later than 1000 B.C., and appear to have enjoyed particular privileges and immunities.\n\nThey also possessed secret means of recognition, and were bound together by special ties only known to themselves.\n\nThe richer of this fraternity were bound to provide for their poorer brethren.\n\nThey were divided into communities, governed by a Master and Wardens, and called γυνοικιαι (connected houses).\n\nThey held a grand festival annually, and were held in high esteem.\n\nTheir ceremonials were regarded as sacred.\n\nIt has been claimed that Solomon, at the instance of Hiram, King of Tyre, employed them at his temple and palaces.\n\nThey were also employed at the construction of the Temple of Diana at Ephesus."

