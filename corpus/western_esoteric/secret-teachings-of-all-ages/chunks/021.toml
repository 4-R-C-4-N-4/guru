body = "This is a legitimate method of for to those able to realize the sacred significance of the threefold head a great mystery is revealed.\n\nHowever, in the presence of such applications of symbology in Christian art, it is scarcely proper to consider the philosophers of other faiths as benighted if, like the Hindus, they have a three-faced Brahma, or, like the Romans, a two-faced Janus.\n\n*** Dr.\n\nW.\n\nJ.\n\nDurant declares that Herbert Spencer's Great Work, First Principles , made him almost at once the most famous philosopher of his time.\n\nSpencerianism is a philosophic positivism which describes evolution as an ever-increasing complexity with equilibrium as its highest possible state.\n\nAccording to Spencer, life is a continuous process from homogeneity to heterogeneity and back from heterogeneity to homogeneity.\n\nLife also involves the continual adjustment of internal relations to external relations.\n\nMost famous of all Spencer's aphorisms is his definition of Deity: \"God is infinite intelligence, infinitely diversified through infinite time and infinite space, manifesting through an infinitude of ever-evolving individualities.\" The universality of the law of evolution was emphasized by Spencer, who applied it not only to the form but also to the intelligence behind the form.\n\nIn every manifestation of being he recognized the fundamental tendency of unfoldment from simplicity to complexity, observing that when the point of equilibrium is reached it is always followed by the process of dissolution.\n\nAccording to Spencer, however, disintegration took place only that reintegration might follow upon a higher level of being.\n\nThe chief position in the Italian school of philosophy should be awarded to Giordano Bruno, who, after enthusiastically accepting Copernicus' theory that the sun is the center of the solar system, declared the sun to be a star and all the stars to be suns.\n\nIn Bruno's time the earth was regarded as the center of all creation.\n\nConsequently when he thus relegated the world and man to an obscure corner in space the effect was cataclysmic.\n\nFor the heresy of affirming a multiplicity of universes and conceiving Cosmos to be so vast that no single creed could fill it, Bruno paid the forfeit of his life.\n\nVicoism is a philosophy based upon the conclusions of Giovanni Battista Vico, who held that God controls His world not miraculously but through natural law.\n\nThe laws by which men rule themselves, Vico declared, issue from a spiritual source within mankind which is en rapport with the law of the Deity.\n\nHence material law is of divine origin and reflects the dictates of the Spiritual Father.\n\nThe philosophy of Ontologism developed by Vincenzo Gioberti (generally considered more as a theologian than a philosopher) posits God as the only being and the origin of all knowledge, knowledge being identical with Deity itself.\n\nGod is consequently called Being; all other manifestations are existences.\n\nTruth is to be discovered through reflection upon this mystery.\n\nThe most important of modern Italian philosophers is Benedetto Croce, a Hegelian idealist.\n\nCroce conceives ideas to be the only reality.\n\nHe is anti-theological in his viewpoints, does not believe in the immortality of the soul, and seeks to substitute ethics and aesthetics for religion.\n\nAmong other branches of Italian philosophy should be mentioned Sensism (Sensationalism), which posits the sense perceptions as the sole channels for the reception of knowledge; Criticism , or the philosophy of accurate judgment; and Neo-Scholasticism , which is a revival of Thomism encouraged by the Roman Catholic Church.\n\nThe two outstanding schools of American philosophy are Transcendentalism and Pragmatism .\n\nTranscendentalism, exemplified in the writings of Ralph Waldo Emerson, emphasizes the power of the transcendental over the physical.\n\nMany of Emerson's writings show pronounced Oriental influence, particularly his essays on the Oversoul and the Law of Compensation."

