body = "The Emperor is dressed in armor and his throne is a cube stone, upon which a phœnix is also clearly visible.\n\nThe king has his legs crossed in a most significant manner and carries either a scepter surmounted by an orb or a scepter in his right hand and an orb n his left.\n\nThe orb itself is evidence that he is supreme ruler of the world.\n\nUpon his right and left breasts respectively appear the symbols of the sun and moon, which in symbolism are referred to as the eyes of the Great King.\n\nThe position of the body and legs forms the symbol of sulphur, the sign of the ancient alchemical monarch.\n\nIn the pseudo-Egyptian Tarot the figure is in profile.\n\nHe wears a Masonic apron and the skirt forms s right-angled triangle.\n\nUpon his head is the Crown of the North and his forehead is adorned wit the coiled uræus .\n\nThe fifth numbered major trump is called Le Pape , the Pope, and represents the high priest of a pagan or Christian Mystery school.\n\nIn this card the hierophant wears the tiara and carries in his left hand the triple cross surmounting the globe of the world.\n\nHis right hand, bearing upon its back the stigmata, makes \"the ecclesiastic sign of esotericism,\" and before him kneel two suppliants or acolytes.\n\nThe back of the papal throne is in the form of a celestial and a terrestrial column.\n\nThis card signifies the initiate or master of the mystery of life and according to the Pythagoreans, the spiritual physician.\n\nThe illusionary universe in the form of the two figures (polarity) kneels before the throne upon which sits the initiate who has elevated his consciousness to the plane of spiritual understanding and reality.\n\nIn the pseudo-Egyptian Tarot the Master wears the uræus .\n\nA white and a black figure--life and death, light and darkness, good and evil--kneel before him.\n\nThe initiate's mastery over unreality is indicated by the tiara and the triple cross, emblems of rulership over the three worlds which have issued from the Unknowable First Cause.\n\nThe sixth numbered major trump is called L'Amoureux , the Lovers.\n\nThere are two distinct forms of this Tarot.\n\nOne shows a marriage ceremony in which a priest is uniting a youth and a maiden (Adam and Eve?) in holy wedlock.\n\nSometimes a winged figure above transfixes the lovers with his dart.\n\nThe second form of the card portrays a youth with a female figure on either side.\n\nOne of these figures wears a golden crown and is winged, while the other is attired in the flowing robes of the bacchante and on her head is a wreath of vine leaves.\n\nThe maidens represent the twofold soul of man (spiritual and animal), the first his guardian angel and the second his ever-present demon.\n\nThe youth stands at the beginning of mature life, \"the Parting of the Ways,\" where he must choose between virtue and vice, the eternal and the temporal.\n\nAbove, in a halo of light, is the genius of Fate (his star), mistaken for Cupid by the uninformed.\n\nIf youth chooses unwisely, the arrow of blindfolded Fate will transfix him.\n\nIn the pseudo-Egyptian Tarot the arrow of the genius points directly to the figure of vice, thereby signifying that the end of her path is destruction.\n\nThis card reminds man that the price of free will--or, more correctly, the power of choice--is responsibility.\n\nThe seventh numbered major trump is called Le Chariot , the Chariot, and portrays a victorious warrior crowned and riding in a chariot drawn by black and white sphinxes or horses.\n\nThe starry canopy of the chariot is upheld by four columns.\n\nThis card signifies the Exalted One who rides in the chariot of creation."

