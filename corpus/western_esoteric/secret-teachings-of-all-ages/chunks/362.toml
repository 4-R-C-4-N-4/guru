body = "In his Theatrum Chemicum Britannicum , Elias Ashmole states that the Rosicrucians were not appreciated in England, but were welcomed on the Continent.\n\nHe also states that Queen Elizabeth was twice cured of the smallpox by the Brethren of the Rosy Cross, and that the Earl of Norfolk was healed of leprosy by a Rosicrucian physician.\n\nIn the quotations that follow it is .hinted by John Heydon that the Brothers of the Fraternity possessed the secret of prolonging human existence indefinitely, but not beyond the time appointed by the will of God: \"And at last they could restore by the same course every Brother that died to life again, and so continue many ages; the rules you find in the fourth book.\n\n* * * After this manner began the Fraternity of the Rosie Cross, first by four persons, who died and rose again until Christ, and then they came to worship as the Star guided them to Bethlehem of Judea, where lay our Saviour in his mother's arms; and then they opened their treasure and presented unto him gifts, gold, frankincense, and myrrh, and by the commandment of God went home to their habitation.\n\nThese four waxing young again successively many hundreds of years, made a magical language and writing, with a large dictionary, which we yet daily use to God's praise and glory, and do find great wisdom therein.\n\n* * * Now whilst Brother C.R.\n\nwas in a proper womb quickening, they concluded to draw and receive yet others more into their Fraternity.\" The womb herein referred to was apparently the glass casket, or container, in which the Brothers were buried.\n\nThis was also called the philosophical egg .\n\nAfter a certain period of time the philosopher, breaking the shell of his egg, came forth and functioned for a prescribed period, after which he retired again into his shell of glass, The Rosicrucian medicine for the healing of all human infirmities may be interpreted either as a chemical substance which produces the physical effects described or as spiritual understanding--the true healing power which, whet a man has partaken of it, reveals truth to him.\n\nIgnorance is the worst form of disease, and that: which heals ignorance is therefore the most potent of all medicines.\n\nThe perfect Rosicrucian medicine was for the healing of nations, races, and individuals.\n\nIn an early unpublished manuscript, an unknown philosopher declares alchemy, Qabbalism, astrology, and magic to have been divine sciences originally, but that through perversion they had become false doctrines, leading seekers after wisdom ever farther from their goal.\n\nThe same author gives a valuable key to esoteric Rosicrucianism by dividing the path of spiritual attainment into three steps, or schools, which he calls mountains .\n\nThe first and lowest of these mountains is Mount Sophia ; the second, Mount Qabbalah ; and the third, Mount Magia .\n\nThese three mountains are sequential stages of spiritual growth.\n\nThe unknown author then states: \"By philosophy is to be understood the knowledge of the workings of Nature, by which knowledge man learns to climb to those higher mountains above the limitations of sense.\n\nBy Qabbalism is to be understood the language of the angelic or celestial beings, and he who masters it is able to converse with the messengers of God.\n\nOn the highest of the mountains is the School of Magia (Divine Magic, which is the language of God) wherein man is taught the true nature of all things by God Himself.\" There is a growing conviction that if the true nature of Rosicrucianism were divulged, it would cause consternation, to say the least.\n\nRosicrucian symbols have many meanings, but the Rosicrucian meaning has not yet been revealed."

