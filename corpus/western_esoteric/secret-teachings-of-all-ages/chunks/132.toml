body = "Out of these three intangible spheres emerges the sensible universe, which Plutarch calls the 'House of Horns' and the Egyptians, the 'Great Gate of the Gods.' The top of the throne is in the midst of diffused serpent-shaped flames, indicating that the Supreme Mind is filled with light and life, eternal and incorruptible, removed from all material contact.\n\nHow the Supreme Mind communicated His fire to all creatures is clearly set forth in the symbolism of the Table.\n\nThe Divine Fire is communicated c to lower spheres through the universal power of Nature personified by the World Virgin, Isis, here denominated the IYNX, or the polymorphous all-containing Universal Idea.\" The word Idea is here used in its Platonic sense.\n\n\"Plato believed that there are eternal forms of all possible things which exist without matter; and to these eternal and immaterial forms he gave the name of ideas .\n\nIn the Platonic sense, ideas were the patterns according to which the Deity fashioned the phenomenal or ectypal world.\" (Sir W.\n\nHamilton.) Kircher describes the 21 figures in the central panel thus: \"Seven principal triads, corresponding to seven superior worlds, are shown in the central section of the Table.\n\nThey all originate from the fiery, invisible archetype [the triple crown of the throne].\n\nThe first, the Ophionic or IYNX Triad, V S W, corresponds to the vital and fiery world and is the first intellectual world, called by the ancients the Aetherium .\n\nZoroaster says of it: 'Oh, what rigorous rulers this world has!' The second, or Ibimorphous Triad, O Q R, corresponds to the second intellectual, or ethereal, world, and is concerned with the principle of humidity.\n\nThe third, or Nephtæan Triad, X Y Z, corresponds to the third intellectual and ethereal [world] and is concerned with fecundity.\n\nThese are the three triads of the ethereal worlds, which correspond to the Father Foundation.\n\nThen follow the four triads of the sensible, or material, worlds, of which the first two correspond to the sidereal worlds, G I K and γ δ ε, namely, Osiris and Isis, Sun and Moon, indicated by two bulls.\n\nThey are followed by two triads--the Hecatine, LM N, and the Serapæan, ζ η θ, corresponding to the sublunary and subterranean worlds.\n\nThese complete the seven worlds of primary Genii ruling the natural universe.\n\nPsellus quotes Zoroaster: 'The Egyptians and the Chaldeans, taught that there were seven corporeal worlds (i.\n\ne., worlds ruled by the intellectual powers);the first is of pure fire; the second, third, and fourth, ethereal; the fifth, sixth, and seventh, material; the seventh being the one called terrestrial and hater of light, and is located under the Moon, comprising within itself the matter called fundus , or foundation.\n\n'These seven, plus the one invisible crown, constitute the eight worlds.\n\n* * * \"Plato writes that it is needful for the philosopher to know how the seven circles beneath the first one are arranged according to the Egyptians.\n\nThe first triad of fire denotes life; the second, water, over which rule the Ibimorphous divinities; and the third, air, ruled by Nephta.\n\nFrom the fire the heavens were created, from the water the earth, and air was the mediator between them.\n\nIn the Sephira Yetzirah it is said that from the three originate the seven, i.\n\ne., the height, the depth, the East, the West, the North, and the South, and the Holy Temple in the center sustaining them all."

