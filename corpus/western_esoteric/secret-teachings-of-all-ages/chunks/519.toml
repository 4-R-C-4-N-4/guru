[content]
body = "He was, for those times and considering the customs of the Colonists, very peculiar in his method of living; for he ate no flesh, fowl or fish; he never used for food any 'green thing,' any roots or anything unripe; he drank no liquor, wine or ale; but confined his diet to cereals and their products, fruits that were ripened on the stem in the sun, nuts, mild tea and the sweets of honey, sugar or molasses.\n\n\"He was well educated, highly cultivated, of extensive as well as varied information, and very studious.\n\nHe spent considerable of his time in the patient and persistent conning of a number of very rare old books and ancient manuscripts which he seemed to be deciphering, translating or rewriting.\n\nThese books and manuscripts, together with his own writings, he never showed to anyone; and he did not even mention them in his conversations with the family, except in the most casual way; and he always locked them up carefully in a large, old-fashioned, cubically shaped, iron-bound, heavy, oaken chest, whenever he left his room, even for his meals.\n\nHe took long and frequent walks alone, sat on the brows of the neighboring hills, or mused in the midst of the green and flower-gemmed meadows.\n\nHe was fairly liberal--but in no way lavish--in spending his money, with which he was well supplied.\n\nHe was a quiet, though a very genial and very interesting, member of the family; and be was seemingly at home upon any and every topic coming up in conversation.\n\nHe was, in short, one whom everyone would notice and respect, whom few would feel well acquainted with, and whom no one would presume to question concerning himself--as to whence he came, why he tarried, or whither he journeyed.\n\n\" By something more than a mere coincidence the committee appointed by the Colonial Congress to design a flag accepted an invitation to be guests, while in Cambridge, of the same family with which the Professor was staying.\n\nIt was here that General Washington joined them for the purpose of deciding upon a fitting emblem.\n\nBy the signs which passed between them it was evident that both General Washington and Doctor Franklin recognized the Professor, and by unanimous approval he was invited to become an active member of the committee.\n\nDuring the proceedings which followed, the Professor was treated with the most profound respect and all of his suggestions immediately acted upon.\n\nHe submitted a pattern which he considered symbolically appropriate for the new flag, and this was unhesitatingly accepted by the other six members of the committee, who voted that the arrangement suggested by the Professor be forthwith adopted.\n\nAfter the episode of the flag the Professor quietly vanished, and nothing further is known concerning him.\n\nDid General Washington and Doctor Franklin recognize the Professor as an emissary of the Mystery school which has so long controlled the political destinies of this planet?\n\nBenjamin Franklin was a philosopher and a Freemason--possibly a Rosicrucian initiate.\n\nHe and the Marquis de Lafayette--also a man of mystery--constitute two of the most important links in the chain of circumstance that culminated in the establishment of the original thirteen American Colonies as a free and independent nation.\n\nDoctor Franklin's philosophic attainments are well attested in Poor Richard's Almanac , published by him for many years under the name of Richard Saunders.\n\nHis interest in the cause of Freemasonry is also shown by his republication of Anderson's Constitutions of Freemasonry , a rare and much disputed work on the subject.\n\nIt was during the evening of July 4, 1776, that the second of these mysterious episodes occurred.\n\nIn the old State House in Philadelphia a group of men were gathered for the momentous task of severing the last tie between the old country and the new."

