body = "When the ships came in sight of the Tower of Olympus, Virgo Lucifera ordered the discharge of cannon to signal their approach.\n\nImmediately a white flag appeared upon the tower and a small gilded pinnace, containing an ancient man--the warden of the tower--with his white-clad guards came out to meet the ships.\n\nThe Tower of Olympus stood upon an island which was exactly square and was surrounded by a great wall.\n\nEntering the gate, the group was led to the bottom of the central tower, which contained an excellent laboratory where the guests were fain to beat and wash plants, precious stones, and all sorts of things, extract their juice and essence, and put these latter into glasses.\n\nVirgo Lucifera set the \"artists\" to work so arduously that they felt they were mere drudges.\n\nWhen the day's work was finished, each was assigned a mattress on the stone floor.\n\nBeing unable to sleep, C.R.C.\n\nwandered about contemplating the stars.\n\nChancing upon a flight of steps leading to the top of the wall, he climbed up and looked out upon the sea.\n\nRemaining here for some time, about midnight he beheld seven flames which, passing over the sea towards him, gathered themselves on the top of the spire of the central tower.\n\nSimultaneously the winds arose, the sea became tempestuous, and the moon was covered with clouds.\n\nWith some fear C.R.C.\n\nran down the stairs and returned to the tower and, lying down on his mattress, was lulled to sleep by the sound of a gently flowing fountain in the laboratory.\n\nTHE SIXTH DAY The next morning the aged warden of the tower, after examining the work performed by the wedding guests in the laboratory and finding it satisfactory, caused ladders, ropes, and large wings to be brought forth, and addressed the assembled \"artists\" thus: \"My dear sons, one of these three things must each of you this day constantly bear about with him.\" Lots were cast and to C.R.C., much to his chagrin, fell a heavy ladder.\n\nThose who secured wings had them fastened to their backs so cunningly that it was impossible to detect that they were artificial.\n\nThe aged warden then locked the \"artists\" in the lower room of the tower, but in a short time a round hole was uncovered in the ceiling and Virgo Lucifera invited all to ascend.\n\nThose with wings flew at once through the opening, those with ropes had many difficulties, while C.R.C.\n\nwith his ladder made reasonable speed.\n\nOn the second floor the wedding guests, musicians, and Virgo Lucifera gathered about a fountain-like contrivance containing the bodies of the six royal persons.\n\nTHE UNIVERSE CREATED BY THE DUAL PRINCIPLE OF LIGHT AND DARKNESS.\n\nFrom Fludd's Philosophia Mosaica.\n\nThe Supreme Deity is symbolized by the small globe at the top, which is divided into two hemispheres, the dark half representing the divine darkness with which the Deity surround Himself and which serves as His hiding place.\n\nThe radiant hemisphere signifies the divine light which is in God and which, pouring forth, manifests as the objective creative power.\n\nThe large dark globe to the left and beneath the dark half of the upper sphere signifies the potential darkness which was upon the face of the primordial deep and within which moved the Spirit of God.\n\nThe light globe to the right is the Deity who is revealed out of the darkness.\n\nHere the shining Word has dissipated the shadows and a glorious universe has been formed.\n\nThe divine power of this radiant globe is cognizable to man as the sun.\n\nThe large light and a dark section represents the created universes partaking of the light and darkness which are in the nature of the Creator."

