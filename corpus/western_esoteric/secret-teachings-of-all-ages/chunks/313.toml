body = "Hargrave Jennings sees in the figure of Adam a type of the lingam of Shiva, which was a stone representative of the creative power of the World Generator.\n\n\"In Gregorie's works * * *,\" writes Jennings, \"is a passage to the effect that 'Noah daily prayed in the Ark before the Body of Adam ,' i.e., before the Phallus--Adam being the primitive Phallus, great procreator of the human race.\n\n'It may possibly seem strange,' he says, 'that this orison should be daily said before the body of Adam,' but 'it is a most confessed tradition among the eastern men that Adam was commanded by God that his dead body should be kept above ground till a fullness of time should come to commit it פדככאלאועto the middle of the earth by a priest of the Most High God.' This means Mount Moriah, the Meru of India.\n\n'This body of Adam was embalmed and transmitted from father to son, till at last it was delivered up by Lamech into the hands of Noah.'\" (See Phallicism .) This interpretation somewhat clarifies the Qabbalistic assertion that in the first Adam were contained all the souls of the Israelites.\n\n(See Sod .) Though according to the Aurea Legenda Adam was buried with the three seeds of the Tree of Knowledge in his mouth, it should be borne in mind that apparently conflicting myths were often woven around a single individual.\n\nOne of the profound mysteries of Qabbalism is that set forth in the Notarikon based upon the letters of the name Adam (ADM).\n\nThese three letters form the initials of the names Adam , David , and the Messiah , and these three personalities were said to contain one soul.\n\nAs this soul represents the World Soul of humanity, Adam signifies the involving soul, the Messiah the evolving soul, and David that condition of the soul termed epigenesis .\n\nIn common with certain philosophic institutions of Asia, the Jewish Mysteries contained a strange doctrine concerning the shadows of the Gods .\n\nGazing down into the Abyss, the Elohim beheld their own shadows and from these shadows patterned the inferior creation.\n\n\"In the dramatic representation of the creation of man in the Mysteries,\" writes the anonymous Master of Balliol College, \"the Aleim [Elohim] were represented by men who, when sculpturing the form of an Adamite being, of a man, traced the outline of it on their own shadow, or modelled it on their own shadow traced on the wall.\n\nThis is how the art of drawing originated in Egypt, and the hieroglyphic figures carved on the Egyptian monuments have so little relief that they still resemble a shadow.\" In the ritualism of the early Jewish Mysteries the pageantry of creation was enacted, the various actors impersonating the Creative Agencies.\n\nThe red dirt from which the Adamic man was fashioned may signify fire, particularly since Adam is related to the Yod , or fire flame, which is the first letter of the sacred name Jehovah .\n\nIn John ii.\n\n20 it is written that the Temple was forty and six years in the building, a statement in which St.\n\nAugustine sees a secret and sacred Gematria; for, according to the Greek philosophy of numbers, the numerical value of the name Adam is 46.\n\nAdam thus becomes the type of the Temple, for the House of God-like primitive man--was a microcosm or epitome of the universe.\n\nNOAH AND HIS ZODIACAL ARK.\n\nFrom Myer's Qabbalah.\n\nThe early Church Father--notably Tertullian, Firmilian, St.\n\nCyprian, St.\n\nAugustine, and St.\n\nChrysostom--recognized in the ark a type or symbol of the Holy Catholic Church."

