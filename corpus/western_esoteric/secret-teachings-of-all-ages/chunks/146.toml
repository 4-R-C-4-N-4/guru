body = "His figure was 9 feet 9½ inches tall.\n\nMany attempts have been made to reconstruct the monument, which.\n\nwas destroyed by an earthquake, but none has been altogether successful.\n\nThis monument was sacred to the planet Mars and was built by an initiate for the enlightenment of the world.\n\n6.\n\nThe Gardens of Semiramis at Babylon--more commonly known as the Hanging Gardens--stood within the palace grounds of Nebuchadnezzar, near the Euphrates River.\n\nThey rose in a terrace-like pyramid and on the top was a reservoir for the watering of the gardens.\n\nThey were built about 600 B.C., but the name of the landscape artist has not been preserved.\n\nThey symbolized the planes of the invisible world, and were consecrated to Venus as the goddess of love and beauty.\n\nTROPHONIUS OF LEBADIA.\n\nfrom Historia Deorum Fatidicorum.\n\nTrophonius and his brother Agamedes were famous architects.\n\nWhile building a certain treasure vault, they contrived to leave one stone movable so that they might secretly enter and steal the valuables stored there.\n\nA trap was set by the owner, who had discovered the plot, and Agamedes was caught.\n\nTo prevent discovery, Trophonius decapitated his brother and fled, hotly pursued.\n\nHe hid in the grove of Lebadia, where the earth opened and swallowed him up.\n\nThe spirit of Trophonius thereafter delivered oracles in the grove and its caverns.\n\nThe name Trophonius means \"to be agitated, excited, or roiled.\" It was declared that the terrible experiences through which consultants passed in the oracular caverns so affected them that they never smiled again.\n\nThe bees which accompany the figure of Trophonius were sacred because they led the first envoys from Bœtia to the site of the oracle.\n\nThe figure above is said to be a production of a statue of Trophonius which was placed on the brow of the hill above the oracle and surrounded with sharply pointed stakes that it could not be touched.\n\n*** 7.\n\nThe Great Pyramid was supreme among the temples of the Mysteries.\n\nIn order to be true to its astronomical symbolism, it must have been constructed about 70,000 years ago.\n\nIt was the tomb of Osiris, and was believed to have been built by the gods themselves, and the architect may have been the immortal Hermes.\n\nIt is the monument of Mercury, the messenger of the gods, and the universal symbol of wisdom and letters."

