body = "The fruit here signifies the sensuous life which, once tasted, temporarily deprives man of immortality.\n\nAlso on account of its vast number of seeds the pomegranate was often employed to represent natural fecundity.\n\nFor the same reason, Jacob Bryant in his Ancient Mythology notes that the ancients recognized in this fruit an appropriate emblem of the Ark of the Deluge, which contained the seeds of the new human race.\n\nAmong the ancient Mysteries the pomegranate was also considered to be a divine symbol of such peculiar significance that its true explanation could not be divulged.\n\nIt was termed by the Cabiri \"the forbidden secret.\" Many Greek gods and goddesses are depicted holding the fruit or flower of the pomegranate in their hands, evidently to signify that they are givers of life and plenty.\n\nPomegranate capitals were placed upon the pillars of Jachin and Boaz standing in front of King Solomon's Temple; and by the order of Jehovah, pomegranate blossoms were embroidered upon the bottom of the High Priest's ephod.\n\nStrong wine made from the juice of the grape was looked upon as symbolic of the false life and false light of the universe, for it was produced by a false process--artificial fermentation.\n\nThe rational faculties are clouded by strong drink, and the animal nature, liberated from bondage, controls the individual--facts which necessarily were of the greatest spiritual significance.\n\nAs the lower nature is the eternal tempter seeking co lead man into excesses which inhibit the spiritual faculties, the grape and its product were used to symbolize the Adversary.\n\nThe juice of the grape was thought by the Egyptians to resemble human blood more closely than did any other substance.\n\nIn fact, they believed that the grape secured its life from the blood of the dead who had been buried in the earth.\n\nAccording to Plutarch, \"The priests of the sun at Heliopolis never carry any wine into their temples, * * * and if they made use of it at any time in their libations to the gods, it was not because they looked upon it as in its own nature acceptable to them; but they poured it upon their altars as the blood of those enemies who formerly had fought against them.\n\nFor they look upon the vine to have first sprung out of the earth after it was fattened with the carcasses of those who fell in the wars against the gods.\n\nAnd this, say they, is the reason why drinking its juice in great quantities makes men mad and beside themselves, filling them as it were with the blood of their own ancestors.\" (See Isis and Osiris .) Among some cults the state of intoxication was viewed as a condition somewhat akin to ecstasy, for the individual was believed to be possessed by the Universal Spirit of Life, whose chosen vehicle was the vine.\n\nIn the Mysteries, the grape was often used to symbolize lust and debauchery because of its demoralizing effect upon the emotional nature.\n\nThe fact was recognized, however, that fermentation was the certain evidence of the presence of the solar fire, hence the grape was accepted as the proper symbol of the Solar Spirit--the giver of divine enthusiasm.\n\nIn a somewhat similar manner, Christians have accepted wine as the emblem of the blood of Christ, partaking of it in Holy Communion.\n\nChrist, the exoteric emblem of the Solar Spirit, said, \"I am the vine.\" He was therefore worshiped with the wine of ecstasy in the same manner as were his pagan prototypes--Bacchus, Dionysos, Arys, and Adonis.\n\nThe mandragora officinarum , or mandrake, is accredited with possessing the most remarkable magical powers.\n\nIts narcotic properties were recognized by the Greeks, who employed it to deaden pain during surgical operations, and it has been identified also with baaras , the mystic herb used by the Jews for casting out demons."

