[content]
body = "A MANUSCRIPT by Thomas Taylor contains the following remarkable paragraph: \"Plato was initiated into the 'Greater Mysteries' at the age of 49.\n\nThe initiation took place in one of the subterranean halls of the Great Pyramid in Egypt.\n\nThe ISIAC TABLE formed the altar, before which the Divine Plato stood and received that which was always his, but which the ceremony of the Mysteries enkindled and brought from its dormant state.\n\nWith this ascent, after three days in the Great Hall, he was received by the Hierophant of the Pyramid (the Hierophant was seen only by those who had passed the three days, the three degrees, the three dimensions) and given verbally the Highest Esoteric Teachings, each accompanied with Its appropriate Symbol.\n\nAfter a further three months' sojourn in the halls of the Pyramid, the Initiate Plato was sent out into the world to do the work of the Great Order, as Pythagoras and Orpheus had been before him.\" Before the sacking of Rome in 1527 there is no historical mention of the Mensa Isiaca , (Tablet of Isis).\n\nAt that time the Tablet came into the possession of a certain locksmith or ironworker, who sold it at an exorbitant price to Cardinal Bembo, a celebrated antiquary, historiographer of the Republic of Venice, and afterwards librarian of St.\n\nMark's.\n\nAfter his death in 1547 the Isiac Tablet was acquired by the House of Mantua, in whose museum it remained until 1630, when troops of Ferdinand II captured the city of Mantua.\n\nSeveral early writers on the subject have assumed that the Tablet was demolished by the ignorant soldiery for the silver it contained.\n\nThe assumption, however, was erroneous.\n\nThe Tablet fell into the hands of Cardinal Pava, who presented it to the Duke of Savoy, who in turn presented it to the King of Sardinia.\n\nWhen the French conquered Italy in 1797 the Tablet was carried to Paris.\n\nIn 1809, Alexandre Lenoir, writing of the Mensa Isiaca , said it was on exhibition at the Bibliothèque Nationale.\n\nUpon the establishment of peace between the two countries it was returned to Italy.\n\nIn his Guide to Northern Italy, Karl Baedeker describes the Mensa Isiaca as being in the center of Gallery 2 in the Museum of Antiquities at Turin.\n\nA faithful reproduction of the original Tablet was made in 1559 by the celebrated Æneas Vicus of Parma, and a copy of the engraving was given by the Chancellor of the Duke of Bavaria to the Museum of Hieroglyphics.\n\nAthanasius Kircher describes the Tablet as \"five palms long and four wide.\" W.\n\nWynn Westcott says it measures 50 by 30 inches.\n\nIt was made of bronze and decorated with encaustic or smalt enamel and silver inlay.\n\nFosbroke adds: \"The figures are cut very shallow, and the contour of most of them is encircled by threads of silver.\n\nThe bases upon which the figures were seated or reclined, and left blank in the prints, were of silver and are torn away.\" (See Encyclopædia of Antiquities .) Those familiar with the fundamental principles of Hermetic philosophy will recognize in the Mensa Isiaca the key to Chaldean, Egyptian, and Greek theology.\n\nIn his Antiquities , the learned Benedictine, Father Montfaucon, admits his inability to cope with the intricacies of its symbolism.\n\nHe therefore doubts that the emblems upon the Tablet possess any significance worthy of consideration and ridicules Kircher, declaring him to be more obscure than the Tablet itself."

