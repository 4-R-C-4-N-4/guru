[content]
body = "When humanity has completed its physical evolution, the empty shell of materiality left behind will be used by other life waves as steppingstones to their own liberation.\n\nThe trend of man's evolutionary growth is ever toward his own essential Selfhood.\n\nAt the point of deepest materialism, therefore, man is at the greatest distance from Himself.\n\nAccording to the Mystery teachings, not all the spiritual nature of man incarnates in matter.\n\nThe spirit of man is diagrammatically shown as an equilateral triangle with one point downward.\n\nThis lower point, which is one-third of the spiritual nature but in comparison to the dignity of the other two is much less than a third, descends into the illusion of material existence for a brief space of time.\n\nThat which never clothes itself in the sheath of matter is the Hermetic Anthropos --the Overman-- analogous to the Cyclops or guardian dæmon of the Greeks, the angel of Jakob Böhme, and the Oversoul of Emerson, \"that Unity, that Oversoul, within which every man's particular being is contained and made one with all other.\" At birth only a third part of the Divine Nature of man temporarily dissociates itself from its own immortality and takes upon itself the dream of physical birth and existence, animating with its own celestial enthusiasm a vehicle composed of material elements, part of and bound to the material sphere.\n\nAt death this incarnated part awakens from the dream of physical existence and reunites itself once more with its eternal condition.\n\nThis periodical descent of spirit into matter is termed the wheel of life and death , and the principles involved are treated at length by the philosophers under the subject of metempsychosis.\n\nBy initiation into the Mysteries and a certain process known as operative theology, this law of birth and death is transcended, and during the course of physical existence that part of the spirit which is asleep in form is awakened without the intervention of death--the inevitable Initiator--and is consciously reunited with the Anthropos , or the overshadowing substance of itself.\n\nThis is at once the primary purpose and the consummate achievement of the Mysteries: that man shall become aware of and consciously be reunited with the divine source of himself without tasting of physical dissolution."

