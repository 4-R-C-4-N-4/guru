body = "In the heart of the regenerated, the divine power, stimulated by the Light of the Logos, grows into a Sun which illuminates his mind.\" In a note, the same author amplifies his description by adding: \"The terrestrial sun is the image or reflection of the invisible celestial sun; the former is in the realm of Spirit what the latter is in the realm of Matter; but the latter receives its power from the former.\" In the majority of cases, the religions of antiquity agree that the material visible sun was a reflector rather than a source of power.\n\nThe sun was sometimes represented as a shield carried on the arm of the Sun God, as for example, Frey, the Scandinavian Solar Deity.\n\nThis sun reflected the light of the invisible spiritual sun, which was the true source of life, light, and truth.\n\nThe physical nature of the universe is receptive; it is a realm of effects.\n\nThe invisible causes of these effects belong to the spiritual world.\n\nHence, the spiritual world is the sphere of causation ; the material world is the sphere of effects ; while the intellectual--or soul--world is the sphere of mediation .\n\nThus Christ, the personified higher intellect and soul nature, is called \"the Mediator\" who, by virtue of His position and power, says: \"No man cometh to the Father, but by me.\" What the sun is to the solar system, the spirit is to the bodies of man; for his natures, organs, and functions are as planets surrounding the central life (or sun) and living upon its emanations.\n\nThe solar power in man is divided into three parts, which are termed the threefold human spirit of man.\n\nAll three of these spiritual natures are said to be radiant and transcendent; united, they form the Divinity in man.\n\nMan's threefold lower nature--consisting of his physical organism, his emotional nature, and his mental faculties--reflects the light of his threefold Divinity and bears witness of It in the physical world.\n\nMan's three bodies are symbolized by an upright triangle; his threefold spiritual nature by an inverted triangle.\n\nThese two triangles, when united in the form of a six-pointed star, were called by the Jews \"the Star of David,\" \"the Signet of Solomon,\" and are more commonly known today as \"the Star of Zion.\" These triangles symbolize the spiritual and material universes linked together in the constitution of the human creature, who partakes of both Nature and Divinity.\n\nMan's animal nature partakes of the earth; his divine nature of the heavens; his human nature of the mediator.\n\nTHE CELESTIAL INHABITANTS OF THE SUN The Rosicrucians and the Illuminati, describing the angels, archangels, and other celestial creatures, declared that they resembled small suns, being centers of radiant energy surrounded by streamers of Vrilic force.\n\nFrom these outpouring streamers of force is derived the popular belief that angels have wings.\n\nThese wings are corona-like fans of light, by means of which the celestial creatures propel themselves through the subtle essences of the superphysical worlds.\n\nTrue mystics are unanimous in their denial of the theory that the angels and archangels are human in form, as so often pictured.\n\nA human figure would be utterly useless in the ethereal substances through which they manifest.\n\nScience has long debated the probability of the other planers being inhabited.\n\nObjections to the idea are based upon the argument that creatures with human organisms could nor possibly exist in the environments of Mars, Jupiter, Uranus, and Neptune.\n\nThis argument fails to take into account Nature's universal law of adjustment to environment.\n\nThe ancients asserted that life originated from the sun, and that everything when bathed in the light of the solar orb was capable of absorbing the solar life elements and later radiating them as flora and fauna."

