[content]
body = "This alone may be depended on, from general assent, that there formerly lived a person named Orpheus, who was the founder of theology among the Greeks; the institutor of their lives and morals; the first of prophets, and the prince of poets; himself the offspring of a Muse; who taught the Greeks their sacred rites and mysteries, and from whose wisdom, as from a perennial and abundant fountain, the divine muse of Homer and the sublime theology of Pythagoras and Plato flowed.\" (See The Mystical Hymns of Orpheus .) Orpheus was founder of the Grecian mythological system which he used as the medium for the promulgation of his philosophical doctrines.\n\nThe origin of his philosophy is uncertain.\n\nHe may have got it from the Brahmins, there being legends to the effect that he got it was a Hindu, his name possibly being derived from ὀρφανῖος, meaning \"dark.\" Orpheus was initiated into the Egyptian Mysteries, from which he secured extensive knowledge of magic, astrology, sorcery, and medicine.\n\nThe Mysteries of the Cabiri at Samothrace were also conferred upon him, and these undoubtedly contributed to his knowledge of medicine and music.\n\nThe romance of Orpheus and Eurydice is one of the tragic episodes of Greek mythology and apparently constitutes the outstanding feature of the Orphic Rite.\n\nEurydice, in her attempt to escape from a villain seeking to seduce her, died from the venom of a poisonous serpent which stung her in the heel.\n\nOrpheus, penetrating to the very heart of the underworld, so charmed Pluto and Persephone with the beauty of his music that they agreed to permit Eurydice to return to life if Orpheus could lead her back to the sphere of the living without once looking round to see if she were following.\n\nSo great was his fear, however, that she would stray from him that he turned his head, and Eurydice with a heartbroken cry was swept back into the land of death.\n\nOrpheus wandered the earth for a while disconsolate, and there are several conflicting accounts of the manner of his death.\n\nSome declare that he was slain by a bolt of lightning; others, that failing to save his beloved Eurydice, he committed suicide.\n\nThe generally accepted version of his death, however, is that he was torn to pieces by Ciconian women whose advances he had spurned.\n\nIn the tenth book of Plato's Republic it is declared that, because of his sad fate at the hands of women, the soul that had once been Orpheus, upon being destined to live again in the physical world, chose rather to return in the body of a swan than be born of woman.\n\nThe head of Orpheus, after being torn from his body, was cast with his lyre into the river Hebrus, down which it floated to the sea, where, wedging in a cleft in a rock, it gave oracles for many years.\n\nThe lyre, after being stolen from its shrine and working the destruction of the thief, was picked up by the gods and fashioned into a constellation.\n\nOrpheus has long been sung as the patron of music.\n\nOn his seven-stringed lyre he played such perfect harmonies that the gods themselves were moved to acclaim his power.\n\nWhen he touched the strings of his instrument the birds and beasts gathered about him, and as he wandered through the forests his enchanting melodies caused even the ancient trees with mighty effort to draw their gnarled roots from out the earth and follow him.\n\nOrpheus is one of the many Immortals who have sacrificed themselves that mankind might have the wisdom of the gods."

