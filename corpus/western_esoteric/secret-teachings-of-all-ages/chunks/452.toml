[content]
body = "*** According to the ancient Rabbins, Solomon was an initiate of the Mystery schools and the temple which he built was actually a house of initiation containing amass of pagan philosophic and phallic emblems.\n\nThe pomegranates, the palm-headed columns, the Pillars before the door, the Babylonian cherubim, and the arrangement of the chambers and draperies all indicate the temple to have been patterned after the sanctuaries of Egypt and Atlantis.\n\nIsaac Myer, in The Qabbalah , makes the following observation: \"The pseudo-Clement of Rome, writes: 'God made man male and female.\n\nThe male is Christ: the female, the Church.' The Qabbalists called the Holy Spirit, the mother, and the Church of Israel, the Daughter.\n\nSolomon engraved on the walls of his Temple, likenesses of the male and female principles, to adumbrate this mystery; such, it is said, were the figures of the cherubim.\n\nThis was, however, not in obedience to the words of the Thorah.\n\nThey were symbolical of the Upper, the spiritual, the former or maker, positive or male, and the Lower, the passive, the negative or female, formed or made by the first.\" Masonry came to Northern Africa and Asia Minor from the lost continent of Atlantis, not under its present name but rather under the general designation Sun and Fire Worship.\n\nThe ancient Mysteries did not cease to exist when Christianity became the world's most powerful religion.\n\nGreat Pan did not die!\n\nFreemasonry is the proof of his survival.\n\nThe pre-Christian Mysteries simply assumed the symbolism of the new faith, perpetuating through its emblems and allegories the same truths which had been the property of the wise since the beginning of the world.\n\nThere is no true explanation, therefore, for Christian symbols save that which is concealed within pagan philosophy.\n\nWithout the mysterious keys carried by the hierophants of the Egyptian, Brahmin, and Persian cults the gates of Wisdom cannot be opened.\n\nConsider with reverent spirit, therefore, the sublime allegory of the Temple and its Builders, realizing that beneath its literal interpretation lies hidden a Royal Secret.\n\nAccording to the Talmudic legends, Solomon understood the mysteries of the Qabbalah.\n\nHe was also an alchemist and a necromancer, being able to control the dæmons, and from them and other inhabitants of the invisible worlds he secured much of his wisdom.\n\nIn his translation of Clavicula Salomonis , or The Key of Solomon the King , a work presumably setting forth the magical secrets gathered by Solomon and used by him in the conjuration of spirits and which, according to Frank C.\n\nHiggins, contains many sidelights on Masonic initiatory rituals, S.\n\nL.\n\nMacGregor-Mathers recognizes the probability that King Solomon was a magician in the fullest sense of that word.\n\n\"I see no reason to doubt,\" he affirms, \"the tradition which assigns the authorship of the 'Key' to King Solomon, for among others Josephus, the Jewish historian, especially mentions the magical works attributed to that monarch; this is confirmed by many Eastern traditions, and his magical skill is frequently mentioned in the Arabian Nights.\" Concerning Solomon's supernatural powers, Josephus writes in his Eighth Book of the Antiquities of the Jews : \"Now the sagacity and wisdom which God had bestowed on Solomon was so great that he exceeded the ancients, in so much that he was no way inferior to the Egyptians, who are said to have been beyond all men in understanding; * * * God also enabled him to learn that skill which expelled demons, which is a science useful and sanative to him.\n\nHe composed such incantations also by which distempers are alleviated."

