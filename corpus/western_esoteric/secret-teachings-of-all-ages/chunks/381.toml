body = "On the last side of the fifth leaf there was a king with a great fauchion, who made to be killed in his presence by some soldiers a great multitude of little infants, whose mothers wept at the feet of the unpitiful soldiers: the blood of which infants was afterwards by other soldiers gathered up, and put in a great vessel, wherein the sun and the moon came to bathe themselves.\n\n\"And because that this history did represent the more part of that of the innocents slain by Herod, and that in this book I learned the greatest part of the art, this was one of the causes why I placed in their church-yard these Hieroglyphic Symbols of this secret science.\n\nAnd thus you see that which was in the first five leaves.\n\n\"I will not represent unto you that which was written in good and intelligible Latin in all the other written leaves, for God would punish me, because I should commit a greater wickedness, than he who (as it is said) wished that all the men of the World had but one head that he might cut it off with one blow.\n\nHaving with me therefore this fair book, I did nothing else day nor night, but study upon it, understanding very well all the operations that it showed, but not knowing with what matter I should begin, which made me very heavy and solitary, and caused me to fetch many a sigh.\n\nMy wife Perrenella, whom I loved as myself, and had lately married was much astonished at this, comforting me, and earnestly demanding, if she could by any means deliver me from this trouble.\n\nI could not possibly hold my tongue, but told her all, and showed this fair book, whereof at the same instant that she saw it, she became as much enamoured as myself, taking extreme pleasure to behold the fair cover, gravings, images, and portraits, whereof notwithstanding she understood as little as I: yet it was a great comfort to me to talk with her, and to entertain myself, what we should do to have the interpretation of them.\" Nicholas Flammel spent many years studying the mysterious book.\n\nHe even painted the pictures from it all over the walls of his house and made numerous copies which he showed to the learned men with whom he came in contact, but none could explain their secret significance.\n\nAt last he determined to go forth in quest of an adept, or wise man, and after many wanderings he met a physician--by name Master Canches--who was immediately interested in the diagrams and asked to see the original book.\n\nThey started forth together for Paris, and or, the way the physician adept explained many of the principles of the hieroglyphics to Flammel, but before they reached their journey's end Master Canches was taken ill and died.\n\nFlammel buried him at Orleans, but having meditated deeply on the information he had secured during their brief acquaintance, he was able, with the assistance of his wife, to work out the formula for transmuting base metals into gold.\n\nHe performed the experiment several times with perfect success, and before his death caused a number of hieroglyphic figures to be painted upon an arch of St.\n\nInnocent's churchyard in Paris, wherein he concealed the entire formula as it had been revealed to him from the Book of Abraham the Jew .\n\nCOUNT BERNARD OF TREVISO Of all those who sought for the Elixir of Life and the Philosopher's Scone, few passed through the chain of disappointments that beset Count Bernard of Treviso, who was born in Padua in 1406 and died in 1490.\n\nTHE SYMBOLS OF ABRAHAM THE JEW.\n\nFrom Flammel's Hieroglyphical Figures.\n\nRobert H."

