body = "It was upon this mercy seat between the wings of the celestials that the Lord of Israel descended when He desired to communicate with His High Priest.\n\nThe furnishings of the Tabernacle were made conveniently portable.\n\nEach altar and implement of any size was supplied with staves which could be put: through rings; by this means it could be picked up and carried by four or more bearers.\n\nThe staves were never removed from the Ark of the Covenant until it was finally placed in the Holy of Holies of the Everlasting House, King Solomon's Temple.\n\nThere is no doubt that the Jews in early times realized, at least in part, that their Tabernacle was a symbolic edifice.\n\nJosephus realized this and while he has been severely criticized because he interpreted the Tabernacle symbolism according to Egyptian and Grecian paganism, his description of the secret meanings of its drapes and furnishings is well worthy of consideration.\n\nHe says: \"When Moses distinguished the tabernacle into three parts, and allowed two of them to the priests, as a place accessible and common, he denoted the land and the sea, these being of general access to all; but he set apart the third division for God, because heaven is inaccessible to men.\n\nAnd when he ordered twelve loaves to be set on a table, he denoted the year, as distinguished into so many months.\n\nBy branching out the candlestick into seventy parts, he secretly intimated the Decani, or seventy divisions of the planets; and as to the seven lamps upon the candlesticks, they referred to the course of the planets, of which that is the number.\n\nThe veils too, which were composed of four things, they declared the four elements; for the plain linen was proper to signify the earth, because the flax grows out of the earth; the purple signified the sea, because that color is dyed by the blood of a sea shell-fish; the blue is fit to signify the air; and the scarlet will naturally be an indication of fire.\n\n\"Now the vestment of the high-priest being made of linen, signified the earth; the blue denoted the sky, being like lightning in its pomegranates, and in the noise of the bells resembling thunder.\n\nAnd for the Ephod, it showed that God had made the universe of four (elements); and as for the gold interwoven, * * * it related to the splendor by which all things are enlightened.\n\nHe also appointed the breastplate to be placed in the middle of the Ephod, to resemble the earth, for that has the very middle place of the world.\n\nAnd the girdle which encompassed the high-priest round signified the ocean, for that goes round about and includes the universe.\n\nEach of the sardonyxes declares to us the sun and the moon, those, I mean, that were in the nature of buttons on the high-priest's shoulders.\n\nAnd for the twelve stones, whether we understand by them the months, or whether we understand the like number of the signs of that circle which the Greeks call the Zodiac, we shall not be mistaken in their meaning.\n\nAnd for the mitre, which was of a blue colour, it seems to me to mean heaven; for how otherwise could the name of God be inscribed upon it?\n\nThat it was also illustrated with a crown, and that of gold also, is because of that splendour with which God is pleased.\" It is also symbolically significant that the Tabernacle was built in seven months and dedicated to God at the time of the new moon.\n\nThe metals used in the building of the Tabernacle were all emblematic.\n\nGold represents spirituality, and the golden plates laid over the shittim-wood were emblems of the spiritual nature which glorifies the human nature symbolized by the wood."

