[content]
body = "Thus, A 1--the primitive dot--controls and contains the thirty-nine rings which it encloses, all of these partaking of its nature in varying degrees according to their respective dignities.\n\nConsequently, the entire area from A 1 to D 10 inclusive is the original dot, and the rings symbolize the divisions which took place with in it and the emanations which poured out from it after its establishment in the midst of the abstract nature of AIN SOPH.\n\nThe powers of the rings decrease towards the center of the diagram, for Power is measured by the number of things controlled, and each ring controls the rings within it and is controlled by the rings outside of it.\n\nThus, while A 1 controls thirty-nine rings besides itself, B 1 controls only twenty-nine rings besides its own.\n\nTherefore, A 1 is more powerful than B 1.\n\nAs the greatest spiritual solidity, or permanence, is at the circumference and the greatest material density, or impermanence, is at the center of the diagram, the rings as they decrease in Power become more material and substantial until the center sphere, D 10, symbolizes the actual chemical elements of the earth.\n\nThe rates of vibration are also lower as the rings approach the center.\n\nThus, the vibration of A 2 is lower than A 1 but higher than A 3, and so on in decreasing scale towards the center, A 1 being the highest and D 10 the lowest sphere of creation.\n\nWhile A 1, the ruler of creation, controls the circles marked A, B, C, and D, it is less than the three rings of AIN SOPH--X 1, X2, and X3--and therefore bows before the throne of the ineffable Creator from whose substances it was individualized.\n\n*** The ten orders of demons and the ten Archdemons of the World of Assiah are as follows: D 1, the evil Crown; the hierarchy is called Thaumiel , the doubles of God, the Two-headed; the Archdemons are Satan and Moloch .\n\nFrom D 1 came D 2, the evil Wisdom; the hierarchy is called Chaigidiel , those who obstruct; the Archdemon is Adam Belial .\n\nFrom D 2 came D 3, the evil Understanding; the hierarchy is called Satharial , the concealment of God, the Archdemon is Lucifuge .\n\nFrom D 3 came D 4, the evil Mercy; the hierarchy is called Gamchicoth , the disturber of things; the Archdemon is Astaroth .\n\nFrom D 4 came D 5, the evil Severity; the hierarchy is called Golab , incendiarism and burning; the Archdemon is Asmodeus .\n\nFrom D 5 came D 6, the evil Beauty; the hierarchy is called Togarini , the wranglers; the Archdemon is Belphegor .\n\nFrom D 6 came D 7, the evil Victory; the hierarchy is called Harab Serap , the dispensing Raven; the Archdemon is Baal Chanan .\n\nFrom D 7 came D 8, the evil Glory; the hierarchy is called Samael , the embroiler; the Archdemon is Adramelek .\n\nFrom D 8 came D 9, the evil Foundation; the hierarchy is called Gamaliel , the obscene; the Archdemon is Lilith .\n\nFrom D 9 came D 10, the evil Kingdom; the hierarchy is called Nahemoth , the impure; the Archdemon is Nahema .\n\nThe Qabbalists declare that the worlds, intelligences, and hierarchies were established according to the vision of Ezekiel."

