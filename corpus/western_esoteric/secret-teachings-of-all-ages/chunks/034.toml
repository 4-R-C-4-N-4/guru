[content]
body = "The Encyclopædia Britannica makes the following statement concerning the Mithraic and Christian Mysteries: \"The fraternal and democratic spirit of the first communities, and their humble origin; the identification of the object of adoration with light and the sun; the legends of the shepherds with their gifts and adoration, the flood, and the ark; the representation in art of the fiery chariot, the drawing of water from the rock; the use of bell and candle, holy water and the communion; the sanctification of Sunday and of the 25th of December; the insistence on moral conduct, the emphasis placed on abstinence and self-control; the doctrine of heaven and hell, of primitive revelation, of the mediation of the Logos emanating from the divine, the atoning sacrifice, the constant warfare between good and evil and the final triumph of the former, the immortality of the soul, the last judgment, the resurrection of the flesh and the fiery destruction of the universe--[these] are some of the resemblances which, whether real or only apparent, enabled Mithraism to prolong its resistance to Christianity,\" The rites of Mithras were performed in caves.\n\nPorphyry, in his Cave of the Nymphs , states that Zarathustra (Zoroaster) was the first to consecrate a cave to the worship of God, because a cavern was symbolic of the earth, or the lower world of darkness.\n\nJohn P.\n\nLundy, in his Monumental Christianity , describes the cave of Mithras as follows: \"But this cave was adorned with the signs of the zodiac, Cancer and Capricorn.\n\nThe summer and winter solstices were chiefly conspicuous, as the gates of souls descending into this life, or passing out of it in their ascent to the Gods; Cancer being the gate of descent, and Capricorn of ascent.\n\nThese are the two avenues of the immortals passing up and down from earth to heaven, and from heaven to earth.\" The so-called chair of St.\n\nPeter, in Rome, was believed to have been used in one of the pagan Mysteries, possibly that of Mithras, in whose subterranean grottoes the votaries of the Christian Mysteries met in the early days of their faith.\n\nIn Anacalypsis , Godfrey Higgins writes that in 1662, while cleaning this sacred chair of Bar-Jonas, the Twelve Labors of Hercules were discovered upon it, and that later the French discovered upon the same chair the Mohammedan confession of faith, written in Arabic.\n\nInitiation into the rites of Mithras, like initiation into many other ancient schools of philosophy, apparently consisted of three important degrees.\n\nPreparation for these degrees consisted of self-purification, the building up of the intellectual powers, and the control of the animal nature.\n\nIn the first degree the candidate was given a crown upon the point of a sword and instructed in the mysteries of Mithras' hidden power.\n\nProbably he was taught that the golden crown represented his own spiritual nature, which must be objectified and unfolded before he could truly glorify Mithras; for Mithras was his own soul, standing as mediator between Ormuzd, his spirit, and Ahriman, his animal nature.\n\nIn the second degree he was given the armor of intelligence and purity and sent into the darkness of subterranean pits to fight the beasts of lust, passion, and degeneracy.\n\nIn the third degree he was given a cape, upon which were drawn or woven the signs of the zodiac and other astronomical symbols.\n\nAfter his initiations were over, he was hailed as one who had risen from the dead, was instructed in the secret teachings of the Persian mystics, and became a full-fledged member of the order."

