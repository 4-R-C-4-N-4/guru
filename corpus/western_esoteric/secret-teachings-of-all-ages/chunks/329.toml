[content]
body = "Thirteen teardrops are falling from the solar face Levi, seeing in the two children Faith and Reason, which must coexist as long as the temporal universe endures, writes: \"Human equilibrium requires two feet, the worlds gravitate by means of two forces, generation needs two sexes.\n\nSuch is the meaning of the arcanum of Solomon, represented by the two pillars of the temple, Jakin and Bohas.\" (See Transcendental Magic .) The sun of Truth is shining into the garden of the world over which these two children, as personifications of eternal powers reside.\n\nThe harmony of the world depends upon the coordination of two qualities symbolized throughout the ages as the mind and the heart.\n\nIn the pseudo-Egyptian Tarot the children give place to a youth and a maiden.\n\nAbove them in a solar nimbus is the phallic emblem of generation--a line piercing a circle.\n\nGemini is ruled by Mercury and the two children personify the serpents entwined around the caduceus .\n\nThe twentieth numbered major trump is called Le Jugement , the judgment, and portrays three figures rising apparently from their tombs, though but one coffin is visible.\n\nAbove them in a blaze of glory is a winged figure (presumably the Angel Gabriel) blowing a trumpet.\n\nThis Tarot represents the liberation of man's threefold spiritual nature from the sepulcher of his material constitution.\n\nSince but one-third of the spirit actually enters the physical body, the other two-thirds constituting the Hermetic anthropos or overman , only one of the three figures is actually rising from the tomb.\n\nCourt de Gébelin believes that the coffin may have been an afterthought of the card makers and that the scene actually represents creation rather than resurrection, In philosophy these two words are practically synonymous.\n\nThe blast of the trumpet represents the Creative Word, by the intoning of which man is liberated from his terrestrial limitations.\n\nIn the pseudo-Egyptian Tarot it is evident that the three figures signify the parts of a single being, for three mummies are shown emerging from one mummy case.\n\nThe twenty-first numbered major trump is called Le Monde , the World, and portrays a female figure draped with a scarf which the wind blows into the form of the Hebrew letter Kaph.\n\nHer extended hands--each of which holds a wand--and her left leg, which crosses behind the right, cause the figure to assume the form of the alchemical symbol of sulphur.\n\nThe central figure is surrounded by a wreath in the form of a vesica piscis which Levi likens to the Qabbalistic crown Kether .\n\nThe Cherubim of Ezekiel's vision occupy the corners of the card.\n\nThis Tarot is called the Microcosm and the Macrocosm because in it are summed up every agency contributing to the structure of creation.\n\nThe figure in the form Of the emblem of sulphur represents the divine fire and the heart of the Great Mystery.\n\nThe wreath is Nature, which surrounds the fiery center.\n\nThe Cherubim represent the elements, worlds, forces, and planes issuing out of the divine fiery center of life.\n\nThe wreath signifies the crown of the initiate which is given to those who master the four guardians and enter into the presence of unveiled Truth.\n\nIn the pseudo-Egyptian Tarot the Cherubim surround a wreath composed of twelve trifoliate flowers--the decanates of the zodiac.\n\nA human figure kneels below this wreath, playing upon a harp of three strings, for the spirit must create harmony in the triple constitution of its inferior nature before it can gain for itself the solar crown of immortality.\n\nThe four suits of the minor trumps are considered as analogous to the four elements, the four corners of creation, and the four worlds of Qabbalism."

