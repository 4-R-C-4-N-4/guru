body = "You that are wise will turn from these false teachings and come to us, who seek not your money but freely offer you our greater treasure.\n\nWe desire not your goods, but that you should become partakers of our goods.\n\nWe do not deride parables, but invite you to understand all parables and all secrets.\n\nWe do not ask you to receive us, but invite you to come unto our kingly houses and palaces, not because of ourselves but because we are so ordered by the Spirit of God, the desire of our most excellent Father C.R.C., and the need of the present moment, which is very great.\n\nChapter XIII .\n\nNow that we have made our position clear that we sincerely confess Christ; disavow the Papacy; devote our lives to true philosophy and worthy living; and daily invite and admit into our Fraternity the worthy of all nations, who thereafter share with us the Light of God: will you not join yourselves with us to the perfection of yourselves, the development of all the arts, and the service of the world?\n\nIf you will take this step, the treasures of every part of the earth shall be at one time given unto you, and the darkness which envelopes human knowledge and which results in the vanities of material arts and sciences shall be forever dispelled.\n\nChapter XIV .\n\nAgain we warn those who are dazzled by the glitter of gold or those who, now upright, might be turned by great riches to a life of idleness and pomp, not to disturb our sacred silence with their clamorings; for though there be a medicine which will cure all diseases and give unto all men wisdom, yet it is against the will of God that men should attain to understanding by any means other than virtue, labor, and integrity.\n\nWe are not permitted to manifest ourselves to any man except it be by the will of God.\n\nThose who believe that they can partake of our spiritual wealth against the will of God or without His sanction will find that they shall sooner lose their lives in seeking us than attain happiness by finding us.\n\nA SYMBOLIC DIAGRAM OF THE OPERATIONS OF NATURE.\n\nFrom Fludd's Collectio Operum.\n\nThis plate, engraved by de Bry, is the most famous of the diagrams illustrating the philosophic principles of Robert Fludd (Robertus de Fluctibus).\n\nThree figures are outstanding links between Rosicrucianism and Freemasonry: Michael Maier, Elias Ashmole, and Robert Fludd.\n\nDe Quincey considers Robert Fludd to be the immediate father of Freemasonry.\n\n(See The Rosicrucians and Freemasons.) Edward Waite considers Robert Fludd as second to none of the disciples of Paracelsus, even going as far as to declare that Fludd far surpassed his master.\n\nHe further adds, \"The central figure of Rosicrucian literature, towering as an intellectual giant above the crowd of souffleurs, theosophists, and charlatanic Professors of the magnum opus, who, directly or otherwise, were connected with the mysterious Brotherhood, is Robertus de Fluctibus, the great English mystical philosopher of the seventeenth century, a man of immense erudition, of exalted mind, and, to judge by his writings, of extreme personal sanctity.\n\n\" (See The Real History of the Rosicrucians.) Robert Fludd was born in 1574 and died in 1637.\n\nThe de Bry diagram shown above is almost self-explanatory.\n\nOutside the circle of the starry heavens are the three fiery rings of the empyreum--the triple fire of the Supreme Creator--in which dwell the celestial creatures.\n\nWithin he, of the stars are the circles of the planets and elements.\n\nAfter the element of air comes the circle of the world (earth).\n\nThe circle of animals is followed by the circle of plants, which, in turn is followed by the circle of he minerals."

