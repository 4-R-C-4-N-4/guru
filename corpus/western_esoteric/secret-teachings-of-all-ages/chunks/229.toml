body = "Man's veneration for trees as symbols of the abstract qualities of wisdom and integrity also led him to designate as trees those individuals who possessed these divine qualities to an apparently superhuman degree.\n\nHighly illumined philosophers and priests were therefore often referred to as trees or tree men --for example, the Druids, whose name, according to one interpretation, signifies the men of the oak trees , or the initiates of certain Syrian Mysteries who were called cedars ; in fact it is far more credible and probable that the famous cedars of Lebanon , cut down for the building of King Solomon's Temple, were really illumined, initiated sages.\n\nThe mystic knows that the true supports of God's Glorious House were not the logs subject to decay but the immortal and imperishable intellects of the tree hierophants.\n\nTrees are repeatedly mentioned in the Old and New Testaments, and in the scriptures of various pagan nations.\n\nThe Tree of Life and the Tree of the Knowledge of Good and Evil mentioned in Genesis, the burning bush in which the angel appeared to Moses, the famous vine and fig tree of the New Testament, the grove of olives in the Garden of Gethsemane where Jesus went to pray, and the miraculous tree of Revelation, which bore twelve manners of fruit and whose leaves were for the healing of the nations, all bear witness to the esteem in which trees were held by the scribes of Holy Writ.\n\nBuddha received his illumination while under the bodhi tree, near Madras in India, and several of the Eastern gods are pictured sitting in meditation beneath the spreading branches of mighty trees.\n\nMany of the great sages and saviors carried wands, rods, or staves cut from the wood of sacred trees, as the rods of Moses and Aaron; Gungnir--the spear of Odin--cut from the Tree of Life; and the consecrated rod of Hermes, around which the fighting serpents entwined themselves.\n\nThe numerous uses which the ancients made of the tree and its products are factors in its symbolism.\n\nIts worship was, to a certain degree, based upon its usefulness.\n\nOf this J.\n\nP.\n\nLundy writes: \"Trees occupy such an important place in the economy of nature by way of attracting and retaining moisture, and shading the water-sources and the soil so as to prevent barrenness and desolation; the), are so useful to man for shade, for fruit, for medicine, for fuel, for building houses and ships, for furniture, for almost every department of life, that it is no wonder that some of the more conspicuous ones, such as the oak, the pine, the palm, and the sycamore, have been made sacred and used for worship.\" (See Monumental Christianity .) The early Fathers of the church sometimes used the tree to symbolize Christ.\n\nThey believed that ultimately Christianity would grow up like a mighty oak and overshadow all other faiths of mankind.\n\nBecause it annually discards its foliage, the tree was also looked upon as an appropriate emblem of resurrection and reincarnation, for though apparently dying each fall it blossomed forth again with renewed verdure each ensuing spring.\n\nUnder the appellations of the Tree of Life and the Tree of the Knowledge of Good and Evil is concealed the great arcanum of antiquity--the mystery of equilibrium .\n\nThe Tree of Life represents the spiritual point of balance--the secret of immortality.\n\nThe Tree of the Knowledge of Good and Evil , as its name implies, represents polarity, or unbalance--the secret of mortality.\n\nThe Qabbalists reveal this by assigning the central column of their Sephirothic diagram to the Tree of Life and the two side branches to the Tree of the Knowledge of Good and Evil .\n\n\"Unbalanced forces perish in the void,\" declares the secret work, and all is made known."

