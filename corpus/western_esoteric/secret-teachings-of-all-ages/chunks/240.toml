body = "Standing before the gate of King Solomon's Temple, these columns had the same symbolic import as the obelisks before the sanctuaries of Egypt.\n\nWhen interpreted Qabbalistically, the names of the two pillars mean \"In strength shall My House be established.\n\n\"In the splendor of mental and spiritual illumination, the High Priest stood between the pillars as a mute witness to the perfect virtue of equilibrium--that hypothetical point equidistant from all extremes.\n\nHe thus personified the divine nature of man in the midst of his compound constitution--the mysterious Pythagorean Monad in the presence of the Duad.\n\nOn one side towered the stupendous column of the intellect; on the other, the brazen pillar of the flesh.\n\nMidway between these two stands the glorified wise man, but he cannot reach this high estate without first suffering upon the cross made by joining these pillars together.\n\nThe early Jews occasionally represented the two pillars, Jachin and Boaz, as the legs of Jehovah, thereby signifying to the modern philosopher that Wisdom and Love, in their most exalted sense, support the whole order of creation--both mundane and supermundane.\n\nTHE HOLY GRAIL Like the sapphire Schethiyâ, the Lapis Exilis , crown jewel of the Archangel Lucifer, fell from heaven.\n\nMichael, archangel of the sun and the Hidden God of Israel, at the head of the angelic hosts swooped down upon Lucifer and his legions of rebellious spirits.\n\nDuring the conflict, Michael with his flaming sword struck the flashing Lapis Exilis from the coronet of his adversary, and the green stone fell through all the celestial rings into the dark and immeasurable Abyss.\n\nOut of Lucifer's radiant gem was fashioned the Sangreal, or Holy Grail, from which Christ is said to have drunk at the Last Supper.\n\nThough some controversy exists as to whether the Grail was a cup or a platter, it is generally depicted in art as a chalice of considerable size and unusual beauty.\n\nAccording to the legend, Joseph of Arimathea brought the Grail Cup to the place of the crucifixion and in it caught the blood pouring from the wounds of the dying Nazarene.\n\nLater Joseph, who had become custodian of the sacred relics--the Sangreal and the Spear of Longinus--carried them into a distant country.\n\nAccording to one version, his descendants finally placed these relics in Glastonbury Abbey in England; according to another, in a wonderful castle on Mount Salvat, Spain, built by angels in a single night.\n\nUnder the name of Preston John, Parsifal, the last of the Grail Kings, carried the Holy Cup with him into India, and it disappeared forever from the Western World.\n\nSubsequent search for the Sangreal was the motif for much of the knight errantry of the Arthurian legends and the ceremonials of the Round Table.\n\n(See the Morte d'Arthur .) No adequate interpretation has ever been given to the Grail Mysteries.\n\nSome believe the Knights of the Holy Grail to have been a powerful organization of Christian mystics perpetuating the Ancient Wisdom under the rituals and sacraments of the oracular Cup.\n\nThe quest for the Holy Grail is the eternal search for truth, and Albert G.\n\nMackey sees in it a variation of the Masonic legend of the Lost Word so long sought by the brethren of the Craft.\n\nThere is also evidence to support the claim that the story of the Grail is an elaboration of an early pagan Nature myth which has been preserved by reason of the subtle manner in which it was engrafted upon the cult of Christianity.\n\nFrom this particular viewpoint, the Holy Grail is undoubtedly a type of the ark or vessel in which the life of the world is preserved and therefore is significant of the body of the Great Mother--Nature."

