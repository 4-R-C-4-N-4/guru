body = "Unfortunately, the figure remained standing but fifty-six years, being thrown down by an earthquake in 224 B.C.\n\nThe shattered parts of the Colossus lay scattered about the ground for more than 900 years, when they were finally sold to a Jewish merchant, who carried the metal away on the backs of 700 camels.\n\nSome believed that the brass was converted into munitions and others that it was made into drainage pipes.\n\nThis gigantic gilded figure, with its crown of solar rays and its upraised torch, signified occultly the glorious Sun Man of the Mysteries, the Universal Savior.\n\n2.\n\nThe architect Ctesiphon, in the fifth century B.C., submitted to the Ionian cities a plan for erecting a joint monument to their patron goddess, Diana.\n\nThe place chosen was Ephesus, a city south of Smyrna.\n\nThe building was constructed of marble.\n\nThe roof was supported by 127 columns, each 60 feet high and weighing over 150 tons.\n\nThe temple was destroyed by black magic about 356 B.C., but the world fixes the odious crime upon the tool by means of which the destruction was accomplished--a mentally deranged man named Herostratus.\n\nIt was later rebuilt, but the symbolism was lost.\n\nThe original temple, designed as a miniature of the universe, was dedicated to the moon, the occult symbol of generation.\n\n3.\n\nUpon his exile from Athens, Phidias--the greatest of all the Greek sculptors--went to Olympia in the province of Elis and there designed his colossal statue of Zeus, chief of the gods of Greece.\n\nThere is not even an accurate description of this masterpiece now in existence; only a few old coins give an inadequate idea of its general appearance.\n\nThe body of the god was overlaid with ivory and the robes were of beaten gold.\n\nIn one hand he is supposed to have held a globe supporting a figure of the Goddess of Victory, in the other a scepter surmounted by an eagle.\n\nThe head of Zeus was archaic, heavily bearded, and crowned with an olive wreath.\n\nThe statue was seated upon an elaborately decorated throne.\n\nAs its name implies, the monument was dedicated to the spirit of the planet Jupiter,--one of the seven Logi who bow before the Lord of the Sun.\n\n4.\n\nÉliphas Lévi includes the Temple of Solomon among the Seven Wonders of the World, giving it the place occupied by the Pharos, or Lighthouse, of Alexandria.\n\nThe Pharos, named for the island upon which it stood, was designed and constructed by Sostratus of Cnidus during the reign of Ptolemy (283-247 B.C.).\n\nIt is described as being of white marble and over 600 feet high.\n\nEven in that ancient day it cost nearly a million dollars.\n\nFires were lighted in the top of it and could be seen for miles out at sea.\n\nIt was destroyed by an earthquake in the thirteenth century, but remains of it were visible until A.D.\n\n1350.\n\nBeing the tallest of all the Wonders, it: was naturally assigned to Saturn, the Father of the gods and the true illuminator of all humanity.\n\n5.\n\nThe Mausoleum at Halicarnassus was a magnificent monument erected by Queen Artemisia in memory of her dead husband, King Mausolus, from whose name the word mausoleum is derived.\n\nThe designers of the building were Satyrus and Pythis, and four great sculptors were employed to ornament the edifice.\n\nThe building, which was 114 feet long and 92 feet wide, was divided into five major sections (the senses) and surmounted by a pyramid (the spiritual nature of man).\n\nThe pyramid rose in 24 steps (a sacred number), and upon the apex was a statue of King Mausolus in a chariot."

