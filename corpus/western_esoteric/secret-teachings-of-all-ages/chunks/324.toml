body = "The vehicle of the solar energy being numbered seven reveals the arcane truth that the seven planers are the chariots of the solar power which rides victorious in their midst.\n\nThe four columns supporting the canopy represent the four Mighty Ones who uphold the worlds represented by the star-strewn drapery.\n\nThe figure carries the scepter of the solar energy and its shoulders are ornamented with lunar crescents--the Urim.\n\nand Thummim.\n\nThe sphinxes drawing the chariot resent the secret and unknown power by which the victorious ruler is moved continuously through the various parts of his universe.\n\nIn certain Tarot decks the victor signifies the regenerated man, for the body of the chariot is a cubic stone.\n\nThe man in armor is not standing in the chariot but is rising out of the cube, thus typifying the ascension of the 3 out of the 4--the turning upward of the flap of the Master Mason's apron.\n\nIn the pseudo-Egyptian Tarot the warrior carries the curved sword of Luna, is bearded to signify maturity, and wears the collar of the planetary orbits.\n\nHis scepter (emblematic of the threefold universe) is crowned with a square upon which is a circle surmounted by a triangle.\n\nThe eighth numbered major trump is called La Justice , Justice, and portrays a seated figure upon a throne, the back of which rises in the form of two columns.\n\nJustice is crowned and carries in her right hand a sword and in her left a pair of scales.\n\nThis card is a reminder of the judgment of the soul in the hall of Osiris.\n\nIt teaches that only balanced forces can endure and that eternal justice destroys with the sword that which is unbalanced.\n\nSometimes justice is depicted with a braid of her own hair twisted around her neck in a manner resembling a hangman's knot.\n\nThis may subtly imply that man is the cause of his own undoing, his actions (symbolized by his hair) being the instrument of his annihilation.\n\nIn the pseudo-Egyptian Tarot the figure of Justice is raised upon a dais of three steps, for justice can be fully administered only by such as have been elevated to the third degree.\n\nJustice is blindfolded, that the visible shall in no way influence its decision.\n\n(For reasons he considers beyond his readers' intelligence, Mr.\n\nWaite reversed the eighth and eleventh major trumps.) The ninth numbered major trump is called L'Hermite , the Hermit, and portrays an aged man, robed in a monkish habit and cowl, leaning on a staff.\n\nThis card was popularly supposed to represent Diogenes in his quest for an honest man.\n\nIn his right hand the recluse carries a lamp which he partly conceals within the folds of his cape.\n\nThe hermit thereby personifies the secret organizations which for uncounted centuries have carefully concealed the light of the Ancient Wisdom from the profane.\n\nThe staff of the hermit is knowledge, which is man's main and only enduring support.\n\nSometimes the mystic rod is divided by knobs into seven sections, a subtle reference to the mystery of the seven sacred centers along the human spine.\n\nIn the pseudo-Egyptian Tarot the hermit shields the lamp behind a rectangular cape to emphasize the philosophic truth that wisdom, if exposed to the fury of ignorance, would be destroyed like the tiny flame of a lamp unprotected from the storm.\n\nMan's bodies form a cloak through which his divine nature is faintly visible like the flame of the partly covered lantern.\n\nThrough renunciation--the Hermetic life--man attains depth of character and tranquility of spirit.\n\nThe tenth numbered major trump is called La Roue de Fortune , the Wheel of Fortune, and portrays a mysterious wheel with eight spokes--the familiar Buddhist symbol of the Cycle of Necessity.\n\nTo its rim cling Anubis and Typhon--the principles of good and evil."

