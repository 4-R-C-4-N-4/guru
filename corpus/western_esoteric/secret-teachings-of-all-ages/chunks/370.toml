body = "Figure 10 shows the New Jerusalem in form of a cube, with the names of the twelve tribes of Israel written on the twelve lines of the cube.\n\nIn the center is the eye of God.\n\nThe words round the outer circle are from the Book of Revelation.\n\nTable IX, Figure 9.\n\n*** Figures 11, 12, 13, 14, and 15 possibly are cipher symbols of the angels of the plagues, the name of the Antichrist, the signature of the beast of Babylon, and the name of the woman riding on the beast of blasphemy.\n\nTABLE XI, Figures 1.-11 .\n\nFigure 1 is the solar system according to Genesis.\n\nThe o on top of the radius of the circle is the dot of Eternity--the Beginning of Beginnings.\n\nThe whole diameter is the outflow of God, manifesting first in the heaven of heavens--the Schamayim, in which region human understanding cannot function.\n\nThe space from k to i contains the heavens of Saturn, Jupiter, and Mars; l to m , the heavens of Venus and Mercury; m to h , the heavens of the sun.\n\nThe letter e is the moon, the circle of the earth.\n\nFigure 2 is the globe of the earth, showing the houses and signs of the zodiac.\n\nFigure 3 is the character of the Universal Mercury (Divine Life) in its triune aspect of mercury , sulphur , and salt .\n\nFigure 4 is true saltpetre purified with quicklime and alkali.\n\nFigure 5 shows the exact degree or angle of the planets' places as well as the individual fixed stars in the zodiac.\n\nThe letter a is the sun and b is the earth.\n\nFrom k to i are the circles of Mercury and Venus; g to h , the circles of earth and moon; f to e and e to c , of Jupiter and Saturn; c to d , the starry belt or zodiac.\n\nFigure 6 is the Microcosm, with the planets and signs of the zodiac corresponding to the different parts of its form.\n\nThe words upon the figure read: Know thyself .\n\nIn words, herbs, and stones lies a great power.\n\nFigure 7 is the universal character from which all characters have been taken.\n\nFigures 8, 9, and 10 are left to the solution of the reader.\n\nFigure 11 is the radiating Universal Mercury.\n\nTable XI, Figures 1-11 *** TABLE XII, Figures 12-19 .\n\nFigure 12 is called A Mirror of Astrological Aspects .\n\nBelow it is an astrologer's wheel.\n\nFigure 13 is similar to Figure 12.\n\nFigure 14 is a secret alchemical formula.\n\nThe words around the circle read: Out of one in all is all.\n\nFigure 15 is an unsatisfactory attempt to show the comparative sizes of the suns and planets and their distances from each other.\n\nFigure 16 is the solar system with its internal and spiritual heavens.\n\nA B is the solar system; C is the sphere of fixed stars; D , E , F , G are the systems of the spiritual worlds; H is the throne of the living God; J , K , L , M , and N are the Great Beyond, unmeasurable.\n\nTable XII, Figures 12-19 *** Figure 17 shows the creation of the solar system out of the ring of the Divine Eternity.\n\nThe four A 's are the Abyss, B is the first revelation of God out of the Abyss, and from this revelation C , D , E , F , and G were created.\n\nC and D represent the spiritual hierarchies; D and E , the upper worlds, or constellations; E and F , the distance from Jupiter to the upper worlds; F and G , the solar system with its planets and their heavens; B and C the throne of Christ."

