body = "The Church of the Nativity at Bethlehem confirms the theory that Jesus was born in a grotto, or cave.\n\nAccording to Dupuis, Mithras was put to death by crucifixion and rose again on the third day.\n\n*** The theory that Mithra was originally a title of the supreme heavens-god--putting the sun out of court--is the only one that answers all requirements.\n\nIt will be evident that here we have origins in abundance for the Freemason's Eye and 'its nunquam dormio.'\" The reader must nor confuse the Persian Mithra with the Vedic Mitra.\n\nAccording to Alexander Wilder, \"The Mithraic rites superseded the Mysteries of Bacchus, and became the foundation of the Gnostic system, which for many centuries prevailed in Asia, Egypt, and even the remote West.\" Part 2 THE entire history of Christian and pagan Gnosticism is shrouded in the deepest mystery and obscurity; for, while the Gnostics were undoubtedly prolific writers, little of their literature has survived.\n\nThey brought down upon themselves the animosity of the early Christian Church, and when this institution reached its position of world power it destroyed all available records of the Gnostic cultus .\n\nThe name Gnostic means wisdom , or knowledge , and is derived from the Greek Gnosis .\n\nThe members of the order claimed to be familiar with the secret doctrines of early Christianity.\n\nThey interpreted the Christian Mysteries according to pagan symbolism.\n\nTheir secret information and philosophic tenets they concealed from the profane and taught to a small group only of especially initiated persons.\n\nSimon Magus, the magician of New Testament fame, is often supposed to have been the founder of Gnosticism.\n\nIf this be true, the sect was formed during the century after Christ and is probably the first of the many branches which have sprung from the main trunk of Christianity.\n\nEverything with which the enthusiasts of the early Christian Church might not agree they declared to be inspired by the Devil.\n\nThat Simon Magus had mysterious and supernatural powers is conceded even by his enemies, but they maintained that these powers were lent to him by the infernal spirits and furies which they asserted were his ever present companions.\n\nUndoubtedly the most interesting legend concerning Simon is that which tells of his theosophic contests with the Apostle Peter while the two were promulgating their differing doctrines in Rome.\n\nAccording to the story that the Church Fathers have preserved, Simon was to prove his spiritual superiority by ascending to heaven in a chariot of fire.\n\nHe was actually picked up and carried many feet into the air by invisible powers.\n\nWhen St.\n\nPeter saw this, he cried out in a loud voice, ordering the demons (spirits of the air) to release their hold upon the magician.\n\nThe evil spirits, when so ordered by the great saint, were forced to obey.\n\nSimon fell a great distance and was killed, which decisively proved the superiority of the Christian powers.\n\nThis story is undoubtedly manufactured out of whole cloth, as it is only one out of many accounts concerning his death, few of which agree.\n\nAs more and more evidence is being amassed to the effect that St, Peter was never in Rome, its last possible vestige of authenticity is rapidly being dissipated.\n\nThat Simon was a philosopher there is no doubt, for wherever his exact words are preserved his synthetic and transcending thoughts are beautifully expressed.\n\nThe principles of Gnosticism are well described in the following verbatim statement by him, supposed to have been preserved by Hippolytus: \"To you, therefore, I say what I say, and write what I write.\n\nAnd the writing is this.\n\nOf the universal Æons [periods, planes, or cycles of creative and created life in substance and space, celestial creatures] there are two shoots, without beginning or end, springing from one Root, which is the power invisible, inapprehensible silence [Bythos]."

