body = "He had also, in the course of his travels, met with John Cremer, Abbot of Westminster, with whom he formed a strong friendship; and it was more to please him than the king, that Raymond consented to go to England.\n\n[A tract by John Cremer appears in the Hermetic Museum, but there is no record in the annals of Westminster of anyone by that name.] Cremer had an intense desire to learn the last great secret of alchemy--to make the powder of transmutation--and Raymond, with all his friendship, had never disclosed it.\n\nCremer, however, set to work very cunningly; he was not long in discovering the object that was nearest to Raymond's heart--the conversion of the infidels.\n\nHe told the king wonderful stories of the gold Lully had the art to make; and he worked upon Raymond by the hope that King Edward would be easily induced to raise a crusade against the Mahommedans, if he had the means.\n\n\"Raymond had appealed so often to popes and kings that he had lost all faith in them; nevertheless, as a last hope, he accompanied his friend Cremer to England.\n\nCremer lodged him in his abbey, treating him with distinction; and there Lully at last instructed him in the powder, the secret of which Cremer had so long desired to know.\n\nWhen the powder was perfected, Cremer presented him to the king, who received him as a man may be supposed to receive one who could give him boundless riches.\n\nRaymond made only one condition; that the gold he made should not be expended upon the luxuries of the court or upon a war with any Christian king; and that Edward himself should go in person with an army against the infidels.\n\nEdward promised everything and anything.\n\n\"Raymond had apartments assigned him in the Tower, and there he tells us he transmuted fifty thousand pounds weight of quicksilver, lead, and tin into pure gold, which was coined at the mint into six million of nobles, each worth about three pounds sterling at the present day.\n\nSome of the pieces said to have been coined out of this gold are still to be found in antiquarian collections.\n\n[While desperate attempts have been made to disprove these statements, the evidence is still about equally divided.] To Robert Bruce he sent a little work entitled Of the Art of Transmuting Metals .\n\nDr.\n\nEdmund Dickenson relates that when the cloister which Raymond occupied at Westminster was removed, the workmen found some of the powder, with which they enriched themselves.\n\n\"During Lully's residence in England, he became the friend of Roger Bacon.\n\nNothing, of course, could be further from King Edward's thoughts than to go on a crusade.\n\nRaymond's apartments in the Tower were only an honorable prison; and he soon perceived how matters were.\n\nHe declared that Edward would meet with nothing but misfortune and misery for his breach of faith.\n\nHe made his escape from England in 1315, and set off once more to preach to the infidels.\n\nHe was now a very old man, and none of his friends could ever hope to see his face again.\n\n\"He went first to Egypt, then to Jerusalem, and thence to Tunis a third time.\n\nThere he at last met with the martyrdom he had so often braved.\n\nThe people fell upon him and stoned him.\n\nSome Genoese merchants carried away his body, in which they discerned some feeble signs of life.\n\nThey carried him on board their vessel; but, though he lingered awhile, he died as they came in sight of Majorca, on the 28th of June, 1315, at the age of eighty-one.\n\nHe was buried with great honour in his family chapel at St."

