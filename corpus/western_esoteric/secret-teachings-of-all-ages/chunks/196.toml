body = "Pythagoras induced the musician to change his air to the slow, and rhythmic Spondaic mode, whereupon the intoxicated youth immediately became composed and, gathering up his bundles of wood, returned quietly to his own home.\n\nThere is also an account of how Empedocles, a disciple of Pythagoras, by quickly changing the mode of a musical composition he was playing, saved the life of his host, Anchitus, when the latter was threatened with death by the sword of one whose father he had condemned to public execution.\n\nIt is also known that Esculapius, the Greek physician, cured sciatica and other diseases of the nerves by blowing a loud trumpet in the presence of the patient.\n\nPythagoras cured many ailments of the spirit, soul, and body by having certain specially prepared musical compositions played in the presence of the sufferer or by personally reciting short selections from such early poets as Hesiod and Homer.\n\nIn his university at Crotona it was customary for the Pythagoreans to open and to close each day with songs--those in the morning calculated to clear the mind from sleep and inspire it to the activities of the coming day; those in the evening of a mode soothing, relaxing, and conducive to rest.\n\nAt the vernal equinox, Pythagoras caused his disciples to gather in a circle around one of their number who led them in song and played their accompaniment upon a lyre.\n\nThe therapeutic music of Pythagoras is described by Iamblichus thus: \"And there are certain melodies devised as remedies against the passions of the soul, and also against despondency and lamentation, which Pythagoras invented as things that afford the greatest assistance in these maladies.\n\nAnd again, he employed other melodies against rage and anger, and against every aberration of the soul.\n\nThere is also another kind of modulation invented as a remedy against desires.\" (See The Life of Pythagoras .) It is probable that the Pythagoreans recognized a connection between the seven Greek modes and the planets.\n\nAs an example, Pliny declares that Saturn moves in the Dorian mode and Jupiter in the Phrygian mode.\n\nIt is also apparent that the temperaments are keyed to the various modes, and the passions likewise.\n\nThus, anger--which is a fiery passion--may be accentuated by a fiery mode or its power neutralized by a watery mode.\n\nThe far-reaching effect exercised by music upon the culture of the Greeks is thus summed up by Emil Nauman: \"Plato depreciated the notion that music was intended solely to create cheerful and agreeable emotions, maintaining rather that it should inculcate a love of all that is noble, and hatred of all that is mean, and that nothing could more strongly influence man's innermost feelings than melody and rhythm.\n\nFirmly convinced of this, he agreed with Damon of Athens, the musical instructor of Socrates, that the introduction of a new and presumably enervating scale would endanger the future of a whole nation, and that it was not possible to alter a key without shaking the very foundations of the State.\n\nPlato affirmed that music which ennobled the mind was of a far higher kind than that which merely appealed to the senses, and he strongly insisted that it was the paramount duty of the Legislature to suppress all music of an effeminate and lascivious character, and to encourage only s that which was pure and dignified; that bold and stirring melodies were for men, gentle and soothing ones for women.\n\nFrom this it is evident that music played a considerable part in the education of the Greek youth.\n\nThe greatest care was also to be taken in the selection of instrumental music, because the absence of words rendered its signification doubtful, and it was difficult to foresee whether it would exercise upon the people a benign or baneful influence."

