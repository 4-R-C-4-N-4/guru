body = "The salamanders are as varied in their grouping and arrangement as either the undines or the gnomes.\n\nThere are many families of them, differing in appearance, size, and dignity.\n\nSometimes the salamanders were visible as small balls of light.\n\nParacelsus says: \"Salamanders have been seen in the shapes of fiery balls, or tongues of fire, running over the fields or peering in houses.\" ( Philosophia Occulta , translated by Franz Hartmann.) Mediæval investigators of the Nature spirits were of the opinion that the most common form of salamander was lizard-like in shape, a foot or more in length, and visible as a glowing Urodela, twisting and crawling in the midst of the fire.\n\nAnother group was described as huge flaming giants in flowing robes, protected with sheets of fiery armor.\n\nCertain medieval authorities, among them the Abbé de Villars, held that Zarathustra (Zoroaster) was the son of Vesta (believed to have been the wife of Noah) and the great salamander Oromasis.\n\nHence, from that time onward, undying fires have been maintained upon the Persian altars in honor of Zarathustra's flaming father.\n\nOne most important subdivision of the salamanders was the Acthnici.\n\nThese creatures appeared only as indistinct globes.\n\nThey were supposed to float over water at night and occasionally to appear as forks of flame on the masts and rigging of ships (St.\n\nElmo's fire).\n\nThe salamanders were the strongest and most powerful of the elementals, and had as their ruler a magnificent flaming spirit called Djin , terrible and awe-inspiring in appearance.\n\nThe salamanders were dangerous and the sages were warned to keep away from them, as the benefits derived from studying them were often not commensurate with the price paid.\n\nAs the ancients associated heat with the South, this corner of creation was assigned to the salamanders as their drone, and they exerted special influence over all beings of fiery or tempestuous temperament.\n\nIn both animals and men, the salamanders work through the emotional nature by means of the body heat, the liver, and the blood stream.\n\nWithout their assistance there would be no warmth.\n\nTHE SYLPHS While the sages said that the fourth class of elementals, or sylphs, lived in the element of air, they meant by this not the natural atmosphere of the earth, but the invisible, intangible, spiritual medium--an ethereal substance similar in composition to our atmosphere, but far more subtle.\n\nIn the last: discourse of Socrates, as preserved by Plato in his Phædo , the condemned philosopher says: \"And upon the earth are animals and men, some in a middle region, others (elementals] dwelling about the air as we dwell about the sea; others in islands which the air flows round, near the continent; and in a word, the air is used by them as the water and the sea are by us, and the ether is to them what the air is to us.\n\nMore over, the temperament of their seasons is such that they have no disease [Paracelsus disputes this], and live much longer than we do, and have sight and bearing and smell, and all the other senses, in far greater perfection, in the same degree that air is purer than water or the ether than air.\n\nAlso they have temples and sacred places in which the gods really dwell, and they hear their voices and receive their answers, and are conscious of them and hold converse with them, and they see the sun, moon, and stars as they really are, and their other blessedness is of a piece with this.\" While the sylphs were believed to live among the clouds and in the surrounding air, their true home was upon the tops of mountains."

