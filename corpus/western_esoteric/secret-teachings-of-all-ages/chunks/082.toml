body = "The Great Pyramid was built of limestone and granite throughout, the two kinds of rock being combined in a peculiar and significant manner.\n\nThe stones were trued with the utmost precision, and the cement used was of such remarkable quality that it is now practically as hard as the stone itself.\n\nThe limestone blocks were sawed with bronze saws, the teeth of which were diamonds or other jewels.\n\nThe chips from the stones were piled against the north side of the plateau on which the structure stands, where they form an additional buttress to aid in supporting the weight of the structure.\n\nThe entire Pyramid is an example of perfect orientation and actually squares the circle.\n\nThis last is accomplished by dropping a vertical line from the apex of the Pyramid to its base line.\n\nIf this vertical line be considered as the radius of an imaginary circle, the length of the circumference of such a circle will be found to equal the sum of the base lines of the four sides of the Pyramid.\n\nIf the passage leading to the King's Chamber and the Queen's Chamber was sealed up thousands of years before the Christian Era, those later admitted into the Pyramid Mysteries must have received their initiations in subterranean galleries now unknown.\n\nWithout such galleries there could have been no possible means of ingress or egress, since the single surface entrance was completely dosed with casing stones.\n\nIf not blocked by the mass of the Sphinx or concealed in some part of that image, the secret entrance may be either in one of the adjacent temples or upon the sides of the limestone plateau.\n\nAttention is called to the granite plugs filling the ascending passageway to the Queen's Chamber which Caliph al Mamoun was forced practically to pulverize before he could clear a way into the upper chambers.\n\nC.\n\nPiazzi Smyth notes that the positions of the stones demonstrate that they were set in place from above--which made it necessary for a considerable number of workmen to depart from the upper chambers.\n\nHow did they do it?\n\nSmyth believes they descended through the well (see diagram), dropping the ramp stone into place behind them.\n\nHe further contends that robbers probably used the well as a means of getting into the upper chambers.\n\nThe ramp stone having been set in a bed of plaster, the robbers were forced to break through it, leaving a jagged opening.\n\nMr.\n\nDupré, an architect who has spent years investigating the pyramids, differs from Smyth, however, in that he believes the well itself to be a robbers' hole, being the first successful attempt made to enter the upper chambers from the subterranean chamber, then the only open section of the Pyramid.\n\nMr.\n\nDupré bases his conclusion upon the fact that the well is merely a rough hole and the grotto an irregular chamber, without any evidence of the architectural precision with which the remainder of the structure was erected.\n\nThe diameter of the well also precludes the possibility of its having been dug downward; it must have been gouged out from below, and the grotto was necessary to supply air to the thieves.\n\nIt is inconceivable that the Pyramid builders would break one of their own ramp stones and leave its broken surface and a gaping hole in the side wall of their otherwise perfect gallery.\n\nIf the well is a robbers' hole, it may explain why the Pyramid was empty when Caliph al Mamoun entered it and what happened to the missing coffer lid.\n\nA careful examination of the so-called unfinished subterranean chamber, which must have been the base of operations for the robbers, might disclose traces of their presence or show where they piled the rubble which must have accumulated as a result of their operations.\n\nWhile it is not entirely clear by what entrance the robbers reached the subterranean chamber, it is improbable that they used the descending passageway.\n\nThere is a remarkable niche in the north wall of the Queen's Chamber which the Mohammedan guides glibly pronounce to be a shrine."

