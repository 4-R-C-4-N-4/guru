body = "The key to the lesser Tarots is presumably the Tetragrammaton , or the four-letter name of Jehovah, IHVH.\n\nThe four suits of the minor trumps represent also the major divisions of society: cups are the priesthood, swords the military, coins the tradesmen, and rods the farming class.\n\nFrom the standpoint of what Court de Gébelin calls \"political geography,\" cups represent the northern countries, swords the Orient, coins the Occident, and rods the southern countries.\n\nThe ten pip cards of each suit represent the nations composing each of these grand divisions.\n\nThe kings are their governments, the queens their religions, the knights their histories and national characteristics, and the pages their arts and sciences.\n\nElaborate treatises have been written concerning the use of the Tarot cards in divination, but as this practice is contrary to the primary purpose of the Tarot no profit can result from its discussion.\n\nMany interesting examples of early playing cards are found in the museums of Europe, and there are also noteworthy specimens in the cabinets of various private collectors.\n\nA few hand-painted decks exist which are extremely artistic.\n\nThese depict various important personages contemporary with the artists.\n\nIn some instances, the court cards are portraitures of the reigning monarch and his family.\n\nIn England engraved cards became popular, and in the British Museum are also to be seen some extremely quaint stenciled cards.\n\nHeraldic devices were employed; and Chatto, in his Origin and History of Playing Cards , reproduces four heraldic cards in which the arms of Pope Clement IX adorn the king of clubs.\n\nThere have been philosophical decks with emblems chosen from Greek and Roman mythology, also educational decks ornamented with maps or pictorial representations of famous historic places and incidents.\n\nMany rare examples of playing-cards have been found bound into the covers of early books.\n\nIn Japan there are card games the successful playing of which requires familiarity with nearly all the literary masterpieces of that nation.\n\nIn India there are circular decks depicting episodes from Oriental myths.\n\nThere are also cards which in one sense of the word are not cards, for the designs are on wood, ivory, and even metal.\n\nThere are comic cards caricaturing disliked persons and places, and there are cards commemorating various human achievements.\n\nDuring the American Civil War a patriotic deck was circulated in which stars, eagles, anchors, and American flags were substituted for the suits and the court cards were famous generals.\n\nModern playing cards are the minor trumps of the Tarot, from each suit of which the page , or valet , has been eliminated, leaving 13 cards.\n\nEven in its abridged form, however, the modern deck is of profound symbolic importance, for its arrangement is apparently in accord with the divisions of the year.\n\nThe two colors, red and black, represent the two grand divisions of the year--that during which the sun is north of the equator and that during which it is south of the equator.\n\nThe four suits represent the seasons, the ages of the ancient Greeks, and the Yugas of the Hindus.\n\nThe twelve court cards are the signs of the zodiac arranged in triads of a Father, a Power, and a Mind according to the upper section of the Bembine Table.\n\nThe ten pip cards of each suit represent the Sephirothic trees existing in each of the four worlds (the suits).\n\nThe 13 cards of each suit are the 13 lunar months in each year, and the 52 cards of the deck are the 52 weeks in the year.\n\nCounting the number of pips and reckoning the jacks, queens, and kings as 11, 12, and 13 respectively, the sum for the 52 cards is 364.\n\nIf the joker be considered as one point, the result is 365, or the number of days in the year."

