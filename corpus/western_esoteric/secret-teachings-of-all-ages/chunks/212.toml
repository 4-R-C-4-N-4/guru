body = "This, say the explanations, was the Spirit of God moving on the chaos until its breath had incubated cosmic matter and made it assume the annular shape of a serpent with its tail in its month--emblem of eternity in its spiritual and of our world in its physical sense.\" The seven-headed snake represents the Supreme Deity manifesting through His Elohim, or Seven Spirits, by whose aid He established His universe.\n\nThe coils of the snake have been used by the pagans to symbolize the motion and also the orbits of the celestial bodies, and it is probable that the symbol of the serpent twisted around the egg--which was common to many of the ancient Mystery schools--represented both the apparent motion of the sun around the earth, and the bands of astral light, or the great magical agent, which move about the planet incessantly.\n\nElectricity was commonly symbolized by the serpent because of its motion.\n\nElectricity passing between the poles of a spark gap is serpentine in its motion.\n\nForce projected through atmosphere was called The Great Snake.\n\nBeing symbolic of universal force, the serpent was emblematic of both good and evil.\n\nForce can tear down as rapidly as it can build up.\n\nThe serpent with its tail in its mouth is the symbol of eternity, for in this position the body of the reptile has neither beginning nor end.\n\nThe head and tail represent the positive and negative poles of the cosmic life circuit.\n\nThe initiates of the Mysteries were often referred to as serpents, and their wisdom was considered analogous to the divinely inspired power of the snake.\n\nThere is no doubt that the title \"Winged Serpents\" (the Seraphim?) was given to one of the invisible hierarchies that labored with the earth during its early formation.\n\nThere is a legend that in the beginning of the world winged serpents reigned upon the earth.\n\nThese were probably the demigods which antedate the historical civilization of every nation.\n\nThe symbolic relationship between the sun and the serpent found literal witness in the fact that life remains in the snake until sunset, even though it be cut into a dozen parts.\n\nThe Hopi Indians consider the serpent to be in close communication with the Earth Spirit.\n\nTherefore, at the time of their annual snake dance they send their prayers to the Earth Spirit by first specially sanctifying large numbers of these reptiles and then liberating them to return to the earth with the prayers of the tribe.\n\nThe great rapidity of motion manifested by lizards has caused them to be associated with Mercury, the Messenger of the Gods, whose winged feet traveled infinite distances almost instantaneously.\n\nA point which must not be overlooked in connection with reptiles in symbolism is clearly brought out by the eminent scholar, Dr.\n\nH.\n\nE.\n\nSantee, in his Anatomy of the Brain and Spinal Cord : \"In reptiles there are two pineal bodies, an anterior and a posterior, of which the posterior remains undeveloped but the anterior forms a rudimentary, cyclopean eye.\n\nIn the Hatteria, a New Zealand lizard, it projects through the parietal foramen and presents an imperfect lens and retina and, in its long stalk, nerve fibers.\" Crocodiles were regarded by the Egyptians both as symbols of Typhon and emblems of the Supreme Deity, of the latter because while under water the crocodile is capable of seeing--Plutarch asserts--though its eyes are covered by a thin membrane.\n\nThe Egyptians declared that no matter how far away the crocodile laid its eggs, the Nile would reach up to them in its next inundation, this reptile being endowed with a mysterious sense capable of making known the extent of the flood months before it took place.\n\nThere were two kinds of crocodiles.\n\nThe larger and more ferocious was hated by the Egyptians, for they likened it to the nature of Typhon, their destroying demon."

