body = "From Alciati Emblemata.\n\nThe curious volume from which this figure is taken was published in Paris in r618.\n\nThe attention of the Baconian student is immediately attracted by the form of the hog in the foreground.\n\nBacon often used this animal as a play upon his own name, especially because the name Bacon was derived from he word beech and the nut of this tree was used to fatten hogs.\n\nThe two pillars in the background have considerable Masonic interest.\n\nThe two A's nearly in the center of the picture--one light and one shaded--are alone almost conclusive proof of Baconian influence.\n\nThe most convincing evidence, however, is the fact that 17 is the numerical equivalent of the letters of the Latin farm of Bacon's name (F.\n\nBaco) and there are 17 letters in the three words appearing in the illustration.\n\n*** Furthermore, the word honorificabilitudinitatibus appearing in the fifth act of Love's Labour's Lost is a Rosicrucian signature, as its numerical equivalent (287) indicates.\n\nAgain, on the title page of the first edition of Sir Francis Bacon's New Atlantis , Father Time is depicted bringing a female figure out of the darkness of a cave.\n\nAround the device is a Latin inscription: \"In time the secret truth shall be revealed.\" The catchwords and printer's devices appearing in volumes published especially during the first half of the seventeenth century were designed, arranged, and in some cases mutilated according to a definite plan.\n\nIt is evident also that the mispaginations in the Shakespearian Folios and other volumes are keys to Baconian ciphers, for re-editions--often from new type and by different printers--contain the same mistakes.\n\nFor example, the First and Second Folios of Shakespeare are printed from entirely different type and by different printers nine years apart, but in both editions page 153 of the Comedies is numbered 151, and pages 249 and 250 are numbered 250 and 251 respectively.\n\nAlso in the 1640 edition of Bacon's The Advancement and Proficience of Learning , pages 353 and 354 are numbered 351 and 352 respectively, and in the 1641 edition of Du Bartas' Divine Weeks pages 346 to 350 inclusive are entirely missing, while page 450 is numbered 442.\n\nThe frequency with which pages ending in numbers 50, 51, 52,53, and 54 are involved will he noted.\n\nFRANCIS BACON, BARON VERULAM, VISCOUNT ST.\n\nALBANS.\n\nFrom Bacon's Advancement of Learning.\n\nLord Bacon was born in 1561 and history records his death in 1626.\n\nThere are records in existence, however, which would indicate the probability that his funeral was a mock funeral and that, leaving England, he lived for many years under another name in Germany, there faithfully serving the secret society to the promulgation of whose doctrines he had consecrate his life.\n\nLittle doubt seems to exist in the minds of impartial investigators that Lord Bacon was the legitimate son of Queen Elizabeth and the Earl of Leicester.\n\n*** The requirements of Lord Verulam's biliteral cipher are fully met in scores of volumes printed between 1590 and 1650 and in some printed at other times.\n\nAn examination of the verses by L.\n\nDigges, dedicated to the memory of the deceased \"Authour Maister W.\n\nShakespeare,\" reveals the use of two fonts of type for both capital and small letters, the differences being most marked in the capital T 's, N 's, and A 's, (Seethe First Folio .) The cipher has been deleted from subsequent editions.\n\nThe presence of hidden material in the text is often indicated by needless involvement of words."

