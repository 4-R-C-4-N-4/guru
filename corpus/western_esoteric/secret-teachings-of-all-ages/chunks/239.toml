body = "As representing the power that fabricated the lower, or Demiurgic, sphere, the tablets of stone were sacred to Jehovah in contradistinction to the tablets of sapphire that signified the potency that established the higher, or celestial, sphere.\n\nWithout doubt the Mosaic tablets have their prototype in the stone pillars or obelisks placed on either side of the entrance to pagan temples.\n\nThese columns may pertain to that remote time when men worshiped the Creator through His zodiacal sign of Gemini, the symbol of which is still the phallic pillars of the Celestial Twins.\n\n\"The Ten Commandments, writes Hargrave Jennings, \"are inscribed in two groups of five each, in columnar form.\n\nThe five to the right (looking from the altar) mean the 'Law'; the five to the left mean the 'Prophets.' The right stone is masculine, the left stone is feminine.\n\nThey correspond to the two disjoined pillars of stone (or towers) in the front of every cathedral, and of every temple in the heathen times.\" (See The Rosicrucians: Their Rites and Mysteries .) The same author states that the Law is masculine because it was delivered direct from the Deity, while the Prophets, or Gospels, were feminine because born through the nature of man.\n\nThe right Tablet of the Law further signifies Jachin --the white pillar of light; the left Tablet, Boaz --the shadowy pillar of darkness.\n\nThese were the names of the two pillars cast from brass set up on the porch of King Solomon's Temple.\n\nThey were eighteen cubits in height and beautifully ornamented with wreaths of chainwork, nets, and pomegranates.\n\nOn the top of each pillar was a large bowl--now erroneously called a ball or globe--one of the bowls probably containing fire and the other water.\n\nThe celestial globe (originally the bowl of fire), surmounting the right-hand column (Jachin), symbolized the divine man; the terrestrial globe (the bowl of water), surmounting the left-hand column (Boaz), signified the earthly man.\n\nThese two pillars respectively connote also the active and the passive expressions of Divine Energy, the sun and the moon, sulphur and salt, good and bad, light and darkness.\n\nBetween them is the door leading into the House of God, and standing thus at the gates of Sanctuary they are a reminder that Jehovah is both an androgynous and an anthropomorphic deity.\n\nAs two parallel columns they denote the zodiacal signs of Cancer and Capricorn, which were formerly placed in the chamber of initiation to represent birth and death--the extremes of physical life.\n\nThey accordingly signify the summer and the winter solstices, now known to Freemasons under the comparatively modern appellation of the \"two St.\n\nJohns.\" MOSES RECEIVING THE TABLES OF THE LAW.\n\nFrom an old Bible.\n\nMoses Maimonides, the great Jewish Philosopher of the twelfth century, in describing the Tables of the Law written by the finger of God, divides all productions into two general orders: products of Nature and products of art.\n\nGod works through Nature and man through art, he asserts in his Guide for the Perplexed.\n\nThus the Word of the Lord is the hand, or active principle, by which the will of the Creator is traced upon the face of His creation.\n\nThe Tannaim, or initiates of the Jewish Mystery School, alone possessed a complete understanding of the significance of the Ten Commandments.\n\nThese laws are esoterically related to the ten degrees of contemplation constituting the Path of Ecstasy, which winds upward through he four worlds and ends in the effulgence of AIN SOPH.\n\n*** In the mysterious Sephirothic Tree of the Jews, these two pillars symbolize Mercy and Severity."

