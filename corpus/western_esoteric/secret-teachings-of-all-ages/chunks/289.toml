[content]
body = "The universal AIN SOPH, therefore, no longer shines through space, but rather upon space from an established first point.\n\nIsaac Myer describes this process as follows: \"The Ain Soph at first was filling All and then made an absolute concentration into Itself which produced the Abyss, Deep, or Space, the Aveer Qadmon or Primitive Air, the Azoth; but this is not considered in the Qabbalah as a perfect void or vacuum, a perfectly empty Space, but is thought of as the Waters or Crystalline Chaotic Sea, in which was a certain degree of Light inferior to that by which all the created [worlds and hierarchies] were made.\" (See The Qabbalah .) In the secret teachings of the Qabbalah it is taught that man's body is enveloped in an ovoid of bubble-like iridescence, which is called the Auric Egg.\n\nThis is the causal sphere of man.\n\nIt bears the same relationship to man's physical body that the globe of AIN SOPH bears to Its created universes.\n\nIn fact, this Auric Egg is the AIN SOPH sphere of the entity called man.\n\nIn reality, therefore, the supreme consciousness of man is in this aura, which extends in all directions and completely encircles his lower bodies.\n\nAs the consciousness in the Kosmic Egg is withdrawn into a central point, which is then called God--the Supreme One--so the consciousness in the Auric Egg of man is concentrated, thereby causing the establishment of a point of consciousness called the Ego.\n\nAs the universes in Nature are formed from powers latent in the Kosmic Egg, so everything used by man in all his incarnations throughout the kingdoms of Nature is drawn from the latent powers within his Auric Egg.\n\nMan never passes from this egg; it remains even after death.\n\nHis births, deaths, and rebirths all take place within it, and it cannot be broken until the lesser day \"Be With Us,\" when mankind--like the universe--is liberated from the Wheel of Necessity.\n\nTHE QABBALISTIC SYSTEM OF WORLDS On the accompanying circular chart, the concentric rings represent diagrammatically the forty rates of vibration (called by the Qabbalists Spheres) which emanate from AIN SOPH.\n\nThe circle X 1 is the outer boundary of space.\n\nIt circumscribes the area of AIN SOPH.\n\nThe nature of AIN SOPH Itself is divided into three parts, represented by the spaces respectively between X 1 and X 2, X 2 and X 3, X 3 and A 1; thus: X 1 to X 2, אין, AIN, the vacuum of pure spirit.\n\nX 2 to X 3, איןסוף, AIN SOPH, the Limitless and Boundless.\n\nX 3 to A 1, איןסוףאור, AIN SOPH AUR, the Limitless Light.\n\nIt should be borne in mind that in the beginning the Supreme Substance, AIN, alone permeated the area of the circle; the inner rings had not yet come into manifestation.\n\nAs the Divine Essence concentrated Itself, the rings X 2 and X 3 became apprehensible, for AIN SOPH is a limitation of AIN, and AIN SOPH AUR, or Light, is a still greater limitation.\n\nThus the nature of the Supreme One is considered to be threefold, and from this threefold nature the powers and elements of creation were reflected into the Abyss left by the motion of AIN SOPH towards the center of Itself.\n\nThe continual motion of AIN SOPH towards the center of Itself resulted in the establishment of the dot in the circle."

