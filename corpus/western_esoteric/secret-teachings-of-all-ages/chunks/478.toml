body = "With the decline of paganism the initiated pagan hierophants transferred their base of operations to the new vehicle of primitive Christianity, adopting the symbols of the new cult to conceal those eternal verities which are ever the priceless possession of the wise.\n\nThe Apocalypse shows clearly the resultant fusion of pagan and Christian symbolism and thus bears irrefutable evidence of the activities of these initiated minds operating through early Christianity.\n\nThird, the theory has been advanced that the Book of Revelation represents the attempt made by the unscrupulous members of a certain religious order to undermine the Christian Mysteries by satirizing their philosophy.\n\nThis nefarious end they hoped to attain by showing the new faith to be merely a restatement of the ancient pagan doctrines, by heaping ridicule upon Christianity, and by using its own symbols toward its disparagement.\n\nFor example, the star which fell to earth (Rev.\n\nviii.\n\n10-11) could be construed to mean the Star of Bethlehem, and the bitterness of that star (called Wormwood and which poisoned mankind) could signify the \"false\" teachings of the Christian Church.\n\nWhile the last theory has gained a certain measure of popularity, the profundity of the Apocalypse leads the discerning reader to the inevitable conclusion that this is the least plausible of the three hypotheses.\n\nTo those able to pierce the veil of its symbolism, the inspired source of the document requires no further corroborative evidence.\n\nIn the final analysis, true philosophy can be limited by neither creed nor faction; in fact it is incompatible with every artificial limitation of human thought.\n\nThe question of the pagan or Christian origin of the Book of Revelation is, consequently, of little importance.\n\nThe intrinsic value of the book lies in its magnificent epitome of the Universal Mystery--an observation which led St.\n\nJerome to declare that it is susceptible of seven entirely different interpretations.\n\nUntrained in the reaches of ancient thought, the modem theologian cannot possibly cope with the complexities of the Apocalypse, for to him this mystic writing is but a phantasmagoria the divine inspiration of which he is sorely tempted to question.\n\nIn the limited space here available it is possible to sketch but briefly a few of the salient features of the vision of the seer of Patmos.\n\nA careful consideration of the various pagan Mysteries will assist materially also in filling the inevitable gaps in this abridgment.\n\nIn the opening chapter of the Apocalypse, St.\n\nJohn describes the Alpha and Omega who stood in the midst of the seven golden candlesticks.\n\nSurrounded by his flaming planetary regents, this Sublime One thus epitomizes in one impressive and mysterious figure the entire sweep of humanity's evolutionary growth--past, present, and future.\n\n\"The first stages of man's earthly development,\" writes Dr.\n\nRudolph Steiner, \"ran their course at a period when the earth was still 'fiery'; and the first human incarnations were formed out of the element of fire; at the end of his earthly career man will himself radiate his inner being outwards creatively by the force of the element of fire.\n\nThis continuous development from the beginning to the end of the earth reveals itself to the 'seer,' when he sees on the astral plane the archetype of evolving man.\n\n* * * The beginning of earthly evolution stands forth in the fiery feet, its end in the fiery countenance, and the complete power of the 'creative word,' to be finally won, is seen in the fiery source coming out of the mouth.\" (See Occult Seals and Columns .) THE THRONE OF GOD AND OF THE LAMB.\n\nFrom Jacob Behmen's Works.\n\nBefore the throne of God was the crystal sea representing the Schamayim, or the living waters which are above the heavens.\n\nBefore the throne also were four creatures--a bull, a lion, an eagle, and a man."

