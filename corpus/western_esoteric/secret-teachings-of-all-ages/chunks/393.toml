body = "v ., 9 to 14; Fixation , C .\n\nii ., 12, and C .\n\nviii ., 4; Multiplication , C .\n\nvi ., 7; Augmentation and Projection , C .\n\nviii ., 8, etc., etc.\" A tiny particle of the Philosopher's Scone, if cast upon the surface of water, will, according to an appendix to the work on the universal salt by Herr von Welling, immediately begin a process of recapitulating in miniature the history of the universe, for instantly the tincture--like the Spirits of Elohim--moves upon the face of the waters.\n\nA miniature universe is formed which the philosophers have affirmed actually rises out of the water and floats in the air, where it passes through all the stages of cosmic unfoldment and finally disintegrates into dust again.\n\nNot only is it possible to prepare a medicine for metals; it is also possible to prepare a tincture for minerals by means of which pieces of granite and marble can be turned into precious stones; also stones of inferior quality may be improved.\n\nAs one of the great alchemists fittingly observed, man's quest for gold is often his undoing, for he mistakes the alchemical processes, believing them to be purely material.\n\nHe does not realize that the Philosopher's Gold, the Philosopher's Stone, and the Philosopher's Medicine exist in each of the four worlds and that the consummation of the experiment cannot be realized until it is successfully carried on in four worlds simultaneously according to one formula.\n\nFurthermore, one of the constituents of the alchemical formula exists only within the nature of man himself, without which his chemicals will not combine, and though he spend his life and fortune in chemical experimentation, he will not produce the desired end.\n\nThe paramount reason why the material scientist is incapable of duplicating the achievements of the medieval alchemists--although he follow every step carefully and accurately--is that the subtle element which comes out of the nature of the illuminated and regenerated alchemical philosopher is missing in his experimentation.\n\nOn this subject Dr.\n\nFranz Hartmann in a footnote to his translation of extracts from Paracelsus clearly expresses the conclusions of a modern investigator of alchemical lore: \"I wish to warn the reader, who might be inclined to try any of the alchemical prescriptions * * *, not to do so unless he is an alchemist, because, although I know from personal experience that these prescriptions are not only allegorically but literally true, and will prove successful in the hands of an alchemist, they would only cause a waste of time and money in the hands of one who has not the necessary qualifications.\n\nA person who wants to be an alchemist must have in himself the 'magnesia', which means, the magnetic power to attract and 'coagulate' invisible astral elements.\" In considering the formulæ on the following pages, it must be recognized that the experiments cannot be successfully conducted unless the one who performs them be himself a Magus.\n\nIf two persons, one an initiate and the other unilluminated in the supreme art, were to set to work, side by side, using the same vessels, the same substances, and exactly the same modus operandi , the initiate would produce his \"gold\" and the uninitiated would not.\n\nUnless the greater alchemy has first taken place within the soul of man, he cannot perform the lesser alchemy in the retort.\n\nThis is an invariable rule, although it is cunningly hidden in the allegories and emblems of Hermetic philosophy.\n\nUnless a man be \"born again\" he cannot accomplish the Great Work , and if the student of alchemical formulæ will remember this, it will save him much sorrow and disappointment."

