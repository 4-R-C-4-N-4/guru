body = "This is located where the horizontal line connecting Chochmah and Binah crosses the vertical line joining Kether and Tiphereth.\n\nWhile Daath is not mentioned by the first Qabbalists, it is a highly important element and its addition to the Sephirothic Tree was not made without full realization of the significance of such action.\n\nIf Chochmah be considered the active, intelligent energy of Kether, and Binah the receptive capacity of Kether, then Daath becomes the thought which, created by Chochmah, flows into Binah.\n\nThe postulation of Daath clarifies the problem of the Creative Trinity, for here it is diagrammatically represented as consisting of Chochmah (the Father), Binah (the Mother, or Holy Ghost), and Daath , the Word by which the worlds were established.\n\nIsaac Myer discounts the importance of Daath , declaring it a subterfuge to conceal the fact that Kether, and not Chochmah; is the true Father of the Creative Triad.\n\nHe makes no attempt to give a satisfactory explanation for the symbolism of this hypothetical Sephira.\n\nAccording to the original conception, from the union of the Divine Father and the Divine Mother is produced Microprosophus --the Short Face or the Lesser Countenance , which is established in the Yetziratic World of formation and corresponds to the letter ו, or V , in the Great Name.\n\nThe six powers of Microprosophus flow from and are contained in their own source, which is Binah, the Mother of the Lesser Adam .\n\nThese constitute the spheres of the sacred planets; their name is Elohim, and they move upon the face of the deep.\n\nThe tenth Sephira--Malchuth, the Kingdom--is described as the Bride of the Lesser Adam , created back to back with her lord, and to it is assigned the final, ה, or H , the last letter of the Sacred Name.\n\nThe dwelling place of Malchuth is in the fourth world--Assiah--and it is composed of all the superior powers reflected into the elements of the terrestrial sphere.\n\nThus it will be seen that the Qabbalistic Tree extends through four worlds, with its branches in matter and its roots in the Ancient of Ancients-- Macroprosophus .\n\nThree vertical columns support the universal system as typified by the Sephirothic Tree.\n\nThe central pillar has its foundation in Kether, the Eternal One.\n\nIt passes downward through the hypothetical Sephira, Daath , and then through Tiphereth and Jesod, with its lower end resting upon the firm foundation of Malchuth, the last of the globes.\n\nThe true import of the central pillar is equilibrium.\n\nIt demonstrates how the Deity always manifests by emanating poles of expression from the midst of Itself but remaining free from the illusion of polarity.\n\nIf the numbers of the four Sephiroth connected by this column be added together (1 +6 +9 + 10), the sum is 26, the number of Jehovah.\n\n(See chapter on Pythagorean Mathematics .) The column on the right, which is called Jachin , has its foundation on Chochmah, the outpouring Wisdom of God; the three globes suspended from it are all masculine potencies.\n\nThe column at the left is called Boaz .\n\nThe three globes upon it are feminine and receptive potencies, for it is founded in Understanding , a receptive and maternal potency.\n\nWisdom , it will be noted, is considered as radiant or outpouring, and Understanding as receptive, or something which is filled by the flowing of Wisdom .\n\nThe three pillars are ultimately united in Malchuth, in which all the powers of the superior worlds are manifested.\n\nTHE SEPHIROTH IN THE FORM OF THE SOLAR SYSTEM.\n\nFrom Maurice's Indian Antiquities."

