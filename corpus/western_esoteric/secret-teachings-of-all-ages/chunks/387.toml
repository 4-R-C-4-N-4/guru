[content]
body = "If one thing in the universe grows, then everything in the universe grows.\n\nIf one thing can be multiplied, then all things can be multiplied, \"for the superior agrees with the inferior and the inferior agrees with the superior.\" But as the way for the redemption of the soul is concealed by the Mysteries, so the secrets for the redemption of the metals are also concealed, that they may not fall into the hands of the profane and thereby become perverted.\n\nIf any would grow metals, he must first learn the secrets of the metals: he must realize that all metals--like all stones, plants, animals, and universes--grow from seeds, and that these seeds are already in the body of Substance (the womb of the World Virgin); for the seed of man is in the universe before he is born (or grows), and as the seed of the plant exists for all time though the plant live but a part of that time, so the seeds of spiritual gold and material gold are ever present in all things.\n\nThe metals grow throughout the ages, because life is imparted to them from the sun.\n\nThey grow imperceptibly, in form like tiny shrubs, for everything grows in some way.\n\nOnly the methods of growth differ, according to kind and magnitude.\n\nOne of the great axioms is, \"Within everything is the seed of everything,\" although by the simple processes of Nature it may remain latent for many centuries, or its growth may be exceedingly slow.\n\nTherefore, every grain of sand contains not only the seed of the precious metals as well as the seed of the priceless gems, but also the seeds of sun, moon, and stars.\n\nAs within the nature of man is reflected the entire universe in miniature, so in each grain of sand, each drop of water, each tiny particle of cosmic dust, are concealed all the parts and elements of cosmos in the form of tiny seed germs so minute that even the most powerful microscope cannot detect them.\n\nTrillions of times smaller than the ion or electron, these seeds--unrecognizable and incomprehensible--await the time assigned them for growth and expression.\n\n(Consider the monads of Leibnitz.) There are two methods whereby growth may be accomplished.\n\nThe first is by Nature, for Nature is an alchemist forever achieving the apparently impossible.\n\nThe second is by art , and through art is produced in a comparatively short time that which requires Nature almost endless periods to duplicate.\n\nThe true philosopher, desiring to accomplish the Magnum Opus , patterns his conduct according to the laws of Nature, recognizing that the art of alchemy is merely a method copied from Nature but with the aid of certain secret formulæ greatly shortened by being correspondingly intensified.\n\nNature, in order to achieve her miracles, must work through either extensiveness; or intensiveness.\n\nThe extensive processes of Nature are such as are used in the transmutation of the pitch of black carbon into diamonds, requiring millions of years of natural hardening.\n\nThe intensive process is art , which is ever the faithful servant of Nature (as Dr.\n\nA.\n\nDee says), supplementing her every step and cooperating with her in all her ways.\n\n\"So, in this philosophical work, Nature and Art ought so lovingly to embrace each other, as that Art may not require what Nature denies, nor Nature deny what may be perfected by Art .\n\nFor Nature assenting, she demeans herself obediently to every artist, whilst by their industry she is helped, not hindered.\n\n\" (Dr.\n\nA.\n\nDee in his Chemical Collections .) By means of this art the seed which is within the soul of a stone may be made to germinate so intensively that in a few moments a diamond is grown from the seed of itself.\n\nIf the seed of the diamond were not in the marble, granite, and sand, a diamond could not be grown therefrom."

