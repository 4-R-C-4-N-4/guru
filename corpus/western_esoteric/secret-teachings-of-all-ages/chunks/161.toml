[content]
body = "The first is concerned with the multitude , or the constituent parts of a thing, and the second with the magnitude , or the relative size or density of a thing.\n\nMagnitude is divided into two parts--magnitude which is stationary and magnitude which is movable, the stationary pare having priority.\n\nMultitude is also divided into two parts, for it is related both to itself and to other things, the first relationship having priority.\n\nPythagoras assigned the science of arithmetic to multitude related to itself, and the art of music to multitude related to other things.\n\nGeometry likewise was assigned to stationary magnitude, and spherics (used partly in the sense of astronomy) to movable magnitude.\n\nBoth multitude and magnitude were circumscribed by the circumference of mind.\n\nThe atomic theory has proved size to be the result of number, for a mass is made up of minute units though mistaken by the uninformed for a single simple substance.\n\nOwing to the fragmentary condition of existing Pythagorean records, it is difficult to arrive at exact definitions of terms.\n\nBefore it is possible, however, to unfold the subject further some light must he cast upon the meanings of the words number, monad, and one.\n\nThe monad signifies (a) the all-including ONE.\n\nThe Pythagoreans called the monad the \"noble number, Sire of Gods and men.\" The monad also signifies (b) the sum of any combination of numbers considered as a whole.\n\nThus, the universe is considered as a monad, but the individual parts of the universe (such as the planets and elements) are monads in relation to the parts of which they themselves are composed, though they, in turn, are parts of the greater monad formed of their sum.\n\nThe monad may also be likened (c) to the seed of a tree which, when it has grown, has many branches (the numbers).\n\nIn other words, the numbers are to the monad what the branches of the tree are to the seed of the tree.\n\nFrom the study of the mysterious Pythagorean monad, Leibnitz evolved his magnificent theory of the world atoms--a theory in perfect accord with the ancient teachings of the Mysteries, for Leibnitz himself was an initiate of a secret school.\n\nBy some Pythagoreans the monad is also considered (d) synonymous with the one .\n\nNumber is the term applied to all numerals and their combinations.\n\n(A strict interpretation of the term number by certain of the Pythagoreans excludes 1 and 2.) Pythagoras defines number to be the extension and energy of the spermatic reasons contained in the monad.\n\nThe followers of Hippasus declared number to be the first pattern used by the Demiurgus in the formation of the universe.\n\nThe one was defined by the Platonists as \"the summit of the many.\" The one differs from the monad in that the term monad is used to designate the sum of the parts considered as a unit, whereas the one is the term applied to each of its integral parts.\n\nThere are two orders of number: odd and even .\n\nBecause unity, or 1, always remains indivisible, the odd number cannot be divided equally.\n\nThus, 9 is 4+1+4, the unity in the center being indivisible.\n\nFurthermore, if any odd number be divided into two parts, one part will always be odd and the other even.\n\nThus, 9 may be 5+4, 3+6, 7+2, or 8+1.\n\nThe Pythagoreans considered the odd number--of which the monad was the prototype--to be definite and masculine.\n\nThey were not all agreed, however, as to the nature of unity, or 1.\n\nSome declared it to be positive, because if added to an even (negative) number, it produces an odd (positive) number."

