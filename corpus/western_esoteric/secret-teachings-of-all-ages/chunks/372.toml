[content]
body = "IS the transmutation of base metals into gold possible?\n\nIs the idea one at which the learned of the modern world can afford to scoff?\n\nAlchemy was more than a speculative art: it was also an operative art.\n\nSince the time of the immortal Hermes, alchemists have asserted (and not without substantiating evidence) that they could manufacture gold from tin, silver, lead, and mercury.\n\nThat the galaxy of brilliant philosophic and scientific minds who, over a period of two thousand years, affirmed the actuality of metallic transmutation and multiplication, could be completely sane and rational on all other problems of philosophy and science, yet hopelessly mistaken on this one point, is untenable.\n\nNor is it reasonable that the hundreds declaring to have seen and performed transmutations of metals could all have been dupes, imbeciles, or liars.\n\nThose assuming that all alchemists were of unsound mentality would be forced to put in this category nearly all the philosophers and scientists of the ancient and medieval worlds.\n\nEmperors, princes, priests, and common townsfolk have witnessed the apparent miracle of metallic metamorphosis.\n\nIn the face of existing testimony, anyone is privileged to remain unconvinced, but the scoffer elects to ignore evidence worthy of respectful consideration.\n\nMany great alchemists and Hermetic philosophers occupy an honored niche in the Hall of Fame, while their multitudinous critics remain obscure.\n\nTo list all these sincere seekers after Nature's great arcanum is impossible, but a few will suffice to acquaint the reader with the superior types of intellect who interested themselves in this abstruse subject.\n\nAmong the more prominent names are those of Thomas Norton, Isaac of Holland, Basil Valentine (the supposed discoverer of antimony), Jean de Meung, Roger Bacon, Albertus Magnus, Quercetanus Gerber (the Arabian who brought the knowledge of alchemy to Europe through his writings), Paracelsus, Nicholas Flarnmel, John Frederick Helvetius, Raymond Lully, Alexander Sethon, Michael Sendivogius, Count Bernard of Treviso, Sir George Ripley, Picus de Mirandola, John Dee, Henry Khunrath, Michael Maier, Thomas Vaughan, J.\n\nB.\n\nvon Helmont, John Heydon, Lascaris, Thomas Charnock, Synesius (Bishop of Ptolemais), Morieu, the Comte di Cagliostro, and the Comte de St.-Germain.\n\nThere are legends to the effect that King Solomon and Pythagoras were alchemists and that the former manufactured by alchemical means the gold used in his temple.\n\nAlbert Pike takes sides with the alchemical philosophers by declaring that the gold of the Hermetists was a reality.\n\nHe says: \"The Hermetic science, like all the real sciences, is mathematically demonstrable.\n\nIts results, even material, are as rigorous as that of a correct equation.\n\nThe Hermetic Gold is not only a true dogma, a light without Shadow, a Truth without alloy of falsehood; it is also a material gold, real, pure, the most precious that can be found in the mines of the earth.\" So much for the Masonic angle.\n\nWilliam and Mary jointly ascended the throne of England in 1689, at which time alchemists must have abounded in the kingdom, for during the first year of their reign they repealed an Act made by King Henry IV in which that sovereign declared the multiplying of metals to be a crime against the crown.\n\nIn Dr.\n\nSigismund Bacstrom's Collection of Alchemical Manuscripts is a handwritten copy of the Act passed by William and Mary, copied from Chapter 30 of Statutes at Large for the first year of their reign."

