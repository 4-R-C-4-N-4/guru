body = "Each species moves only in the element to which it belongs, and neither of them can go out of its appropriate element, which is to them as the air is to us, or the water to fishes; and none of them can live in the element belonging to another class.\n\nTo each elemental being the element in which it lives is transparent, invisible and respirable, as the atmosphere is to ourselves.\" ( Philosophia Occulta , translated by Franz Hartmann.) The reader should be careful not to confuse the Nature spirits with the true life waves evolving through the invisible worlds.\n\nWhile the elementals are composed of only one etheric (or atomic) essence, the angels, archangels, and other superior, transcendental entities have composite organisms, consisting of a spiritual nature and a chain of vehicles to express that nature not unlike those of men, but not including the physical body with its attendant limitations.\n\nTo the philosophy of Nature spirits is generally attributed an Eastern origin, probably Brahmanic; and Paracelsus secured his knowledge of them from Oriental sages with whom he came in contact during his lifetime of philosophical wanderings.\n\nThe Egyptians and Greeks gleaned their information from the same source.\n\nThe four main divisions of Nature spirits must now be considered separately, according to the teachings of Paracelsus and the Abbé de Villars and such scanty writings of other authors as are available.\n\nTHE GNOMES The elementals who dwell in that attenuated body of the earth which is called the terreous ether are grouped together under the general heading of gnomes .\n\n(The name is probably derived from the Greek genomus , meaning earth dweller.\n\nSee New English Dictionary .) Just as there are many types of human beings evolving through the objective physical elements of Nature, so there are many types of gnomes evolving through the subjective ethereal body of Nature.\n\nThese earth spirits work in an element so close in vibratory rate to the material earth that they have immense power over its rocks and flora, and also over the mineral elements in the animal and human kingdoms.\n\nSome, like the pygmies, work with the stones, gems, and metals, and are supposed to be the guardians of hidden treasures.\n\nThey live in caves, far down in what the Scandinavians called the Land of the Nibelungen.\n\nIn Wagner's wonderful opera cycle, The Ring of the Nibelungen , Alberich makes himself King of the Pygmies and forces these little creatures to gather for him the treasures concealed beneath the surface of the earth.\n\nBesides the pygmies there are other gnomes, who are called tree and forest sprites.\n\nTo this group belong the sylvestres, satyrs, pans, dryads, hamadryads, durdalis, elves, brownies, and little old men of the woods.\n\nParacelsus states that the gnomes build houses of substances resembling in their constituencies alabaster, marble, and cement, but the true nature of these materials is unknown, having no counterpart in physical nature.\n\nSome families of gnomes gather in communities, while others are indigenous to the substances with and in which they work.\n\nFor example, the hamadryads live and die with the plants or trees of which they are a part.\n\nEvery shrub and flower is said to have its own Nature spirit, which often uses the physical body of the plant as its habitation.\n\nThe ancient philosophers, recognizing the principle of intelligence manifesting itself in every department of Nature alike, believed that the quality of natural selection exhibited by creatures not possessing organized mentalities expressed in reality the decisions of the Nature spirits themselves.\n\nC.\n\nM.\n\nGayley, in The Classic Myths , says: \"It was a pleasing trait in the old paganism that it loved to trace in every operation of nature the agency of deity."

