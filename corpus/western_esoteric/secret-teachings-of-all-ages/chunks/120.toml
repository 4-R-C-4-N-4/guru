body = "The oldest circular zodiac known is the one found at Tentyra, in Egypt, and now in the possession of the French government.\n\nMr.\n\nJohn Cole describes this remarkable zodiac as follows: \"The diameter of the medallion in which the constellations are sculptured, is four feet nine inches, French measure.\n\nIt is surrounded by another circle of much larger circumference, containing hieroglyphic characters; this second circle is enclosed in a square, whose sides are seven feet nine inches long.\n\n* * * The asterisms, constituting the Zodiacal constellations mixed with others, are represented in a spiral.\n\nThe extremities of this spiral, after one revolution, are Leo and Cancer.\n\nLeo is no doubt at the head.\n\nIt appears to be trampling on a serpent, and its tail to be held by a woman.\n\nImmediately after the Lion comes the Virgin holding an ear of corn, Further on, we perceive two scales of a balance, above which, in a medal lion, is the figure of Harpocrates.\n\nThen follows the Scorpion and Sagittarius, to whom the Egyptians gave wings, and two faces.\n\nAfter Sagittarius are successively placed, Capricornus, Aquarius, Pisces, the Ram, the Bull, and the Twins.\n\nThis Zodiacal procession is, as we have already observed, terminated by Cancer, the Crab.\" *** The antiquity of the zodiac is much in dispute.\n\nTo contend that it originated but a mere few thousand years before the Christian Era is a colossal mistake on the part of those who have sought to compile data, concerning its origin.\n\nThe zodiac necessarily must be ancient enough to go backward to that period when its signs and symbols coincided exactly with the positions of the constellations whose various creatures in their natural functions exemplified the outstanding features of the sun's activity during each of the twelve months.\n\nOne author, after many years of deep study on the subject, believed man's concept of the zodiac to be at least five million years old.\n\nIn all probability it is one of the many things for which the modem world is indebted to the Atlantean or the Lemurian civilizations.\n\nAbout ten thousand years before the Christian Era there was a period of many ages when knowledge of every kind was suppressed, tablets destroyed, monuments torn down, and every vestige of available material concerning previous civilizations completely obliterated.\n\nOnly a few copper knives, some arrowheads, and crude carvings on the walls of caves bear mute witness of those civilizations which preceded this age of destruction.\n\nHere and there a few gigantic structures have remained which, like the strange monoliths on Easter Island, are evidence of lost arts and sciences and lost races.\n\nThe human race is exceedingly old.\n\nModern science counts its age in tens of thousands of years; occultism, in tens of millions.\n\nThere is an old saying that \"Mother Earth has shaken many civilizations from her back,\" and it is not beyond reason that the principles of astrology and astronomy were evolved millions of years before the first white man appeared.\n\nThe occultists of the ancient world had a most remarkable understanding of the principle of evolution.\n\nThey recognized all life as being in various stages of becoming .\n\nThey believed that grains of sand were in the process of becoming human in consciousness but not necessarily in form; that human creatures were in the process of becoming planets; that planets were in the process of becoming solar systems; and that solar systems were in the process of becoming cosmic chains; and so on ad infinitum .\n\nOne of the stages between the solar system and the cosmic chain was called the zodiac ; therefore they taught that at a certain time a solar system breaks up into a zodiac.\n\nThe house of the zodiac become the thrones for twelve Celestial Hierarchies, or as certain of the ancients state, ten Divine Orders."

