body = "Concerning these rolls, Colonel Carrick Mallery writes: \"To persons acquainted with secret societies, a good comparison for the Midewiwin charts would be what is called a trestleboard of a Masonic order, which is printed and published and publicly exposed without exhibiting any secrets of the order; yet it is net only significant, but useful to the esoteric in assistance to their memory as to the details of ceremony.\" A most complete and trustworthy account of the Midewiwin is that given by W.\n\nJ.\n\nHoffman in the Seventh Annual Report of the Bureau of Ethnology.\n\nHe writes: The Midewiwin--Society of the Mide or Shaman--consists of an indefinite number of Mide of both sexes.\n\nThe society is graded into four separate and distinct degrees, although there is a general impression prevailing even among certain members that any degree beyond the first is practically a mere repetition.\n\nThe greater power attained by one in making advancement depends upon the fact of his having submitted to 'being shot at with the medicine sacks' in the hands of the officiating priests.\n\n* * * It has always been customary for the Mide priests to preserve birch-bark records, bearing delicate incised lines to represent pictorially the ground plan of the number of degrees to which the owner is entitled.\n\nSuch records or charts are sacred and are never exposed to the public view.\" The two rectangular diagrams represent two degrees of the Mide lodge and the straight line through the center the spiritual path, or \"straight and narrow way,\" running through the degrees.\n\nThe lines running tangent to the central Path signify temptations, and the faces at the termini of the lines are manidos, or powerful spirits.\n\nWriting of the Midewiwin, Schoolcraft, the great authority on the American Indian, says: \"In the society of the Midewiwin the object is to teach the higher doctrines of spiritual existence, its nature and mode of existence, and the influence it exercises among men.\n\nIt is an association of men who profess the highest knowledge known to the tribes.\" According to legend, Manabozho, the great Rabbit, who was a servant of Dzhe Manido, the Good Spirit, gazing down upon the progenitors of the Ojibwas and perceiving them to be without spiritual knowledge, instructed an otter in the mysteries of Midewiwin.\n\nManabozho built a Midewigan and initiated the otter, shooting the sacred Migis (a small shell, the sacred symbol of the Mide) into the body of the otter.\n\nHe then conferred immortality upon the animal, and entrusted to it the secrets of the Grand Medicine Society.\n\nThe ceremony of initiation is preceded by sweat baths and consists chiefly of overcoming the influences of evil manidos.\n\nThe initiate is also instructed in the art of healing and (judging from Plate III of Mr.\n\nHoffman's article) a knowledge of directionalizing the forces moving through the vital centers of the human body.\n\nThough the cross is an important symbol in the Midewiwin rites, it is noteworthy that the Mide Priests steadfastly refused to give up their religion and be converted to Christianity.\n\n*** Later, Hunahpu was restored to life by magic, and the two brothers, having thus foiled every attempt against their lives by the Xibalbians, in order to better avenge the murder of Hunhun-ahpu and Vukub-hunhun-ahpu, permitted themselves to be burned upon a funeral pyre.\n\nTheir powdered bones were then cast into a river and immediately became two great man-fishes.\n\nLater taking upon themselves the forms of aged wanderers, they danced for the Xibalbians and wrought strange miracles.\n\nThus one would cut the other to pieces and with a single word resurrect him, or they would burn houses by magic and then instantly rebuild them."

