[content]
body = "Pluto, the lord of the underworld, represents the body intelligence of man; and the rape of Persephone is symbolic of the divine nature assaulted and defiled by the animal soul and dragged downward into the somber darkness of Hades, which is here used as a synonym for the material, or objective, sphere of consciousness.\n\nIn his Disquisitions upon the Painted Greek Vases, James Christie presents Meursius' version of the occurrences taking place during the nine days required for the enactment of the Greater Eleusinian Rites.\n\nThe first day was that of general meeting, during which those to be initiated were questioned concerning their several qualifications.\n\nThe second day was spent in a procession to the sea, possibly for the submerging of a image of the presiding goddess.\n\nThe third day was opened by the sacrifice of a mullet.\n\nOn the fourth day the mystic basket containing certain sacred symbols was brought to Eleusis, accompanied by a number of female devotees carrying smaller baskets.\n\nOn the evening of the fifth day there was a torch race, on the sixth a procession led by a statue of Iacchus, and on the seventh an athletic contest.\n\nThe eighth day was devoted to a repetition of the ceremonial for the benefit of any who might have been prevented from coming sooner.\n\nThe ninth and last day was devoted to the deepest philosophical issues of the Eleusinia, during which an urn or jar--the symbol of Bacchus--was exhibited as an emblem of supreme importance.\n\n*** If he does not outgrow the desire for material possessions here, he will carry it with him into the invisible world, where, because he can never gratify the desire, he will continue in endless agony.\n\nDante's Inferno is symbolically descriptive of the sufferings of those who never freed their spiritual natures from the cravings, habits, viewpoints, and limitations of their Plutonic personalities.\n\nThose who made no endeavor to improve themselves (whose souls have slept) during their physical lives, passed at death into Hades, where, lying in rows, they slept through all eternity as they had slept through life.\n\nTo the Eleusinian philosophers, birch into the physical world was death in the fullest sense of the word, and the only true birth was that of the spiritual soul of man rising out of the womb of his own fleshly nature.\n\n\"The soul is dead that slumbers,\" says Longfellow, and in this he strikes the keynote of the Eleusinian Mysteries.\n\nJust as Narcissus, gazing at himself in the water (the ancients used this mobile element to symbolize the transitory, illusionary, material universe) lost his life trying to embrace a reflection, so man, gazing into the mirror of Nature and accepting as his real self the senseless clay that he sees reflected, loses the opportunity afforded by physical life to unfold his immortal, invisible Self.\n\nAn ancient initiate once said that the living are ruled by the dead.\n\nOnly those conversant with the Eleusinian concept of life could understand that statement.\n\nIt means that the majority of people are not ruled by their living spirits but by their senseless (hence dead) animal personalities.\n\nTransmigration and reincarnation were taught in these Mysteries, but in a somewhat unusual manner.\n\nIt was believed that at midnight the invisible worlds were closest to the Terrestrial sphere and that souls coming into material existence slipped in during the midnight hour.\n\nFor this reason many of the Eleusinian ceremonies were performed at midnight.\n\nSome of those sleeping spirits who had failed to awaken their higher natures during the earth life and who now floated around in the invisible worlds, surrounded by a darkness of their own making, occasionally slipped through at this hour and assumed the forms of various creatures."

