body = "As nearly all the ancient Mysteries included a test of the neophyte's moral character, the temptress (the animal soul) is here portrayed as a pagan goddess.\n\nTHE FOUR HORSEMEN OF THE APOCALYPSE.\n\nFrom Solis' Biblische Figuren.\n\nIn the allegory of the four horsemen--according to the mysteries of philosophy--is set forth the condition of man during the stages of his existence.\n\nIn his first and spiritual state he is crowed.\n\nAs he descend into the realm of experience he carries the sword.\n\nReaching physical expression--which is his least spiritual state--he carries the scales, and by the \"philosophic death\" is released again into the highest spheres.\n\nIn the ancient Roman games the chariot of the sun was drawn by four horses of different colors and the horsemen of the Apocalypse may be interpreted to represent the solar energy riding upon the four elements which serve as media for its expression.\n\n*** In the nineteenth and twentieth chapters is set forth the preparation of that mystical sacrament called the marriage of the Lamb.\n\nThe bride is the soul of the neophyte, which attains conscious immortality by uniting itself to its own spiritual source.\n\nThe heavens opened once more and St.\n\nJohn saw a white horse, and the rider (the illumined mind) which sat upon it was called Faithful and True .\n\nOut of his mouth issued a sharp sword and the armies of heaven followed after him.\n\nUpon the plains of heaven was fought the mystic Armageddon--the last great war between light and darkness.\n\nThe forces of evil under the Persian Ahriman battled against the forces of good under Ahura-Mazda.\n\nEvil was vanquished and the beast and the false prophet cast into a lake of fiery brimstone.\n\nSatan was bound for a thousand years.\n\nThen followed the last judgment; the books were opened, including the book of life.\n\nThe dead were judged according to their works and those whose names were not in the book of life were cast into a sea of fire.\n\nTo the neophyte, Armageddon represents the last struggle between the flesh and the spirit when, finally overcoming the world, the illumined soul rises to union with its spiritual Self.\n\nThe judgment signifies the weighing of the soul and was borrowed from the Mysteries of Osiris.\n\nThe rising of the dead from their graves and from the sea of illusion represents the consummation of the process of human regeneration.\n\nThe sea of fire into which those are cast who fail in the ordeal of initiation signifies the fiery sphere of the animal world.\n\nIn the twenty-first and twenty-second chapters are pictured the new heaven and the new earth to be established at the close of Ahriman's reign.\n\nSt.\n\nJohn, carried in the spirit to a great and high mountain (the brain), beheld the New Jerusalem descending as a bride adorned for her husband.\n\nThe Holy City represents the regenerated and perfected world, the trued ashlar of the Mason, for the city was a perfect cube, it being written, \"the length and the breadth and the height of it are equal.\" The foundation of the Holy City consisted of a hundred and forty-four stones in twelve rows, from which it is evident that the New Jerusalem represents the microcosm, patterned after the greater universe in which it: stands.\n\nThe twelve gates of this symbolic dodecahedron are the signs of the zodiac through which the celestial impulses descend into the inferior world; the jewels are the precious stones of the zodiacal signs; and the transparent golden streets are the streams of spiritual light along which the initiate passes on his path towards the sun.\n\nThere is no material temple in that city, for God and the Lamb are the temple; and there is neither sun nor moon, for God and the Lamb are the light.\n\nThe glorified and spiritualized initiate is here depicted as a city."

