body = "At certain seasons, according to the positions of the sun, moon, and stars, the Arch-Druid climbed the oak tree and cut the mistletoe with a golden sickle consecrated for that service.\n\nThe parasitic growth was caught in white cloths provided for the purpose, lest it touch the earth and be polluted by terrestrial vibrations.\n\nUsually a sacrifice of a white bull was made under the tree.\n\nThe Druids were initiates of a secret school that existed in their midst.\n\nThis school, which closely resembled the Bacchic and Eleusinian Mysteries of Greece or the Egyptian rites of Isis and Osiris, is justly designated the Druidic Mysteries .\n\nThere has been much speculation concerning the secret wisdom that the Druids claimed to possess.\n\nTheir secret teachings were never written, but were communicated orally to specially prepared candidates.\n\nRobert Brown, 32°, is of the opinion that the British priests secured their information from Tyrian and Phœnician navigators who, thousands of years before the Christian Era, established colonies in Britain and Gaul while searching for tin.\n\nThomas Maurice, in his Indian Antiquities , discourses at length on Phœnician, Carthaginian, and Greek expeditions to the British Isles for the purpose of procuring tin.\n\nOthers are of the opinion that the Mysteries as celebrated by the Druids were of Oriental origin, possibly Buddhistic.\n\nThe proximity of the British Isles to the lost Atlantis may account for the sun worship which plays an important part in the rituals of Druidism.\n\nAccording to Artemidorus, Ceres and Persephone were worshiped on an island close to Britain with rites and ceremonies similar to those of Samothrace.\n\nThere is no doubt that the Druidic Pantheon includes a large number of Greek and Roman deities.\n\nThis greatly amazed Cæsar during his conquest of Britain and Gaul, and caused him to affirm that these tribes adored Mercury, Apollo, Mars, and Jupiter, in a manner similar to that of the Latin countries.\n\nIt is almost certain that the Druidic Mysteries were not indigenous to Britain or Gaul, but migrated from one of the more ancient civilizations.\n\nThe school of the Druids was divided into three distinct parts, and the secret teachings embodied therein are practically the same as the mysteries concealed under the allegories of Blue Lodge Masonry.\n\nThe lowest of the three divisions was that of Ovate (Ovydd).\n\nThis was an honorary degree, requiring no special purification or preparation.\n\nThe Ovates dressed in green, the Druidic color of learning, and were expected to know something about medicine, astronomy, poetry if possible, and sometimes music.\n\nAn Ovate was an individual admitted to the Druidic Order because of his general excellence and superior knowledge concerning the problems of life.\n\nThe second division was that of Bard (Beirdd).\n\nIts members were robed in sky-blue, to represent harmony and truth, and to them was assigned the labor of memorizing, at least in part, the twenty thousand verses of Druidic sacred poetry.\n\nThey were often pictured with the primitive British or Irish harp--an instrument strung with human hair, and having as many strings as there were ribs on one side of the human body.\n\nThese Bards were often chosen as teachers of candidates seeking entrance into the Druidic Mysteries.\n\nNeophytes wore striped robes of blue, green, and white, these being the three sacred colors of the Druidic Order.\n\nThe third division was that of Druid (Derwyddon).\n\nIts particular labor was to minister to the religious needs of the people.\n\nTo reach this dignity, the candidate must first become a Bard Braint.\n\nThe Druids always dressed in white--symbolic of their purity, and the color used by them to symbolize the sun.\n\nTHE ARCH-DRUID IN HIS CEREMONIAL ROBES.\n\nFrom Wellcome's Ancient Cymric Medicine."

