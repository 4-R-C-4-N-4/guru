[content]
body = "No other institution has so completely satisfied the religious aspirations of humanity, for since the destruction of the Mysteries there never has been a religious code to which Plato could have subscribed.\n\nThe unfolding of man's spiritual nature is as much an exact science as astronomy, medicine or jurisprudence.\n\nTo accomplish this end religions were primarily established; and out of religion have come science, philosophy, and logic as methods whereby this divine purpose might be realized.\n\nThe Dying God shall rise again!\n\nThe secret room in the House of the Hidden Places shall be rediscovered.\n\nThe Pyramid again shall stand as the ideal emblem of solidarity, inspiration, aspiration, resurrection, and regeneration.\n\nAs the passing sands of time bury civilization upon civilization beneath their weight, the Pyramid shall remain as the Visible covenant between Eternal Wisdom and the world.\n\nThe time may yet come when the chants of the illumined shall be heard once more in its ancient passageways and the Master of the Hidden House shall await in the Silent Place for the coming of that man who, casting aside the fallacies of dogma and tenet, seeks simply Truth and will be satisfied with neither substitute nor counterfeit."

