[content]
body = "When all the rational parts are gathered Bacchus is resurrected.\n\nThe Rites of Dionysos were very similar to those of Bacchus, and by many these two gods are considered as one.\n\nStatues of Dionysos were carried in the Eleusinian Mysteries, especially the lesser degrees.\n\nBacchus, representing the soul of the mundane sphere, was capable of an infinite multiplicity of form and designations.\n\nDionysos apparently was his solar aspect.\n\nThe Dionysiac Architects constituted an ancient secret society, in principles and doctrines much like the modern Freemasonic Order.\n\nThey were an organization of builders bound together by their secret knowledge of the relationship between the earthly and the divine sciences of architectonics.\n\nThey were supposedly employed by King Solomon in the building of his Temple, although they were not Jews, nor did they worship the God of the Jews, being followers of Bacchus and Dionysos.\n\nThe Dionysiac Architects erected many of the great monuments of antiquity.\n\nThey possessed a secret language and a system of marking their stones.\n\nThey had annual convocations and sacred feasts.\n\nThe exact nature of their doctrines is unknown.\n\nIt is believed that CHiram Abiff was an initiate of this society."

