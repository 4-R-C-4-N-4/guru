body = "One, the Academics , continued to meet in the Academy where once he had presided; the other, the Peripatetics , removed to the Lyceum under the leadership of Aristotle (384-322 B.C.).\n\nPlato recognized Aristotle as his greatest disciple and, according to Philoponus, referred to him as \"the mind of the school.\" If Aristotle were absent from the lectures, Plato would say: \"The intellect is not here.\" Of the prodigious genius of Aristotle, Thomas Taylor writes in his introduction to The Metaphysics : \"When we consider that he was not only well acquainted with every science, as his works abundantly evince, but that he wrote on almost every subject which is comprehended in the circle of human knowledge, and this with matchless accuracy and skill, we know not which to admire most, the penetration or extent of his mind.\" Of the philosophy of Aristotle, the same author says: \"The end of Aristotle's moral philosophy is perfection through the virtues, and the end of his contemplative philosophy an union with the one principle of all things.\" THE PROBLEM OF DIVERSITY.\n\nFrom Kircher's Ars Magna Sciendi.\n\nIn the above diagram Kircher arranges eighteen objects in two vertical columns and then determines he number of arrangements in which they can be combined.\n\nBy the same method Kircher further estimates that fifty objects may be arranged in 1,273,726,838,815,420,339,851,343,083,767,005,515,293,749,454,795,408,000,000,000,000 combinations.\n\nFrom this it will be evident that infinite diversity is possible, for the countless parts of the universe may be related to each other in an incalculable number of ways; and through the various combinations of these limitless subdivisions of being, infinite individuality and infinite variety must inevitably result.\n\nThus it is further evident that life can never become monotonous or exhaust the possibilities of variety.\n\n*** Aristotle conceived philosophy to be twofold: practical and theoretical.\n\nPractical philosophy embraced ethics and politics; theoretical philosophy, physics and logic.\n\nMetaphysics he considered to be the science concerning that substance which has the principle of motion and rest inherent to itself.\n\nTo Aristotle the soul is that by which man first lives, feels, and understands.\n\nHence to the soul he assigned three faculties: nutritive, sensitive, and intellective.\n\nHe further considered the soul to be twofold--rational and irrational--and in some particulars elevated the sense perceptions above the mind.\n\nAristotle defined wisdom as the science of first Causes.\n\nThe four major divisions of his philosophy are dialectics, physics, ethics, and metaphysics.\n\nGod is defined as the First Mover, the Best of beings, an immovable Substance, separate from sensible things, void of corporeal quantity, without parts and indivisible.\n\nPlatonism is based upon a priori reasoning; Aristotelianism upon a posteriori reasoning.\n\nAristotle taught his pupil, Alexander the Great, to feel that if he had not done a good deed he had not reigned that day.\n\nAmong his followers were Theophrastus, Strato, Lyco, Aristo, Critolaus, and Diodorus.\n\nOf Skepticism as propounded by Pyrrho of Elis (365-275 B.C.) and by Timon, Sextus Empiricus said that those who seek must find or deny they have found or can find, or persevere in the inquiry.\n\nThose who suppose they have found truth are called Dogmatists ; those who think it incomprehensible are the Academics ; those who still seek are the Skeptics ."

