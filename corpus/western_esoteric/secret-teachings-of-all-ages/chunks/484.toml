body = "The seven heads of the monster represent the seven stars (spirits) composing the constellation of the Great Dipper, called by the Hindus Rishis , or Cosmic Creative Spirits.\n\nThe ten horns Faber relates to the ten primordial patriarchs.\n\nThese may also denote the ancient zodiac of ten signs.\n\nThe number of the beast (666) is an interesting example of the use of Qabbalism in the New Testament and among early Christian mystics.\n\nIn the following table Kircher shows that the names of Antichrist as given by Iranæus all have 666 as their numerical equivalent.\n\nΤ 300 Λ 30 Λ 1 Λ 30 ε 5 α 1 ν 50 α 1 ι 10 μ 40 τ 300 τ 300 τ 300 π 80 ε 5 ε 5 α 1 ε 5 μ 40 ι 10 ν 50 τ 300 ο 70 ν 50 ι 10 ς 200 ο 70 ς 200 ς 200 666 666 666 666 James Morgan Pryse also notes that according to this method of figuring, the Greek term ἡ φρην, which signifies the lower mind, has 666 as its numerical equivalent.\n\nIt is also well known to Qabbalists that Ἰησους, Jesus, has for its numerical value another sacred and secret number--888.\n\nAdding the digits of the number 666 and again adding the digits of the sum gives the sacred number--9 the symbol of man in his unregenerate state and also the path of his resurrection.\n\nThe fourteenth chapter opens with the Lamb standing on Mount Zion (the eastern horizon), about Him gathered the 144,000 with the name of God written in their foreheads.\n\nAn angel thereupon announces the fall of Babylon--the city of confusion or worldliness.\n\nThose perish who do not overcome worldliness and enter into the realization that spirit--and not matter--is enduring; for, having no interests other than those which are material, they are swept to destruction with the material world.\n\nAnd St.\n\nJohn beheld One like unto the Son of Man (Perseus) riding upon a cloud (the substances of the invisible world) and bearing in his hand a sharp sickle, and with the sickle the Shining One reaped the earth.\n\nThis is a symbol of the Initiator releasing into the sphere of reality the higher natures of those who, symbolized by ripened grain, have reached the point of liberation.\n\nAnd there came another angel (Boötes)--Death--also with a sickle (Karma), who reaped the vines of the earth (those who have lived by the false light) and cast them into the winepress of the wrath of God (the purgatorial spheres).\n\nThe fifteenth to eighteenth chapters inclusive contain an account of seven angels (the Pleiades) who pour their vials upon the earth.\n\nThe contents of their vials (the loosened energy of the Cosmic Bull) are called the seven last plagues.\n\nHere also is introduced a symbolic figure, termed \"the harlot of Babylon, \"which is described as a woman seated upon a scarlet-colored beast having seven heads and ten horns.\n\nThe woman was arrayed in purple and scarlet and bedecked with gold, precious stones, and pearls, having in her hand a golden cup full of abominations.\n\nThis figure may be an effort (probably interpolated) to vilify Cybele, or Artemis, the Great Mother goddess of antiquity.\n\nBecause the pagans venerated the Mater Deorum through symbols appropriate to the feminine generative principle they were accused by the early Christians of worshiping a courtesan."

