body = "An aged woman called the \"Ancient Matron\" wrote in a golden yellow book the names of those drawn forth, and each of the redeemed was given for remembrance a piece of gold bearing the symbol of the sun and the letters D L S .\n\nC.R.C., who had been injured while clinging to the rope, found it difficult to walk.\n\nThe aged woman bade him not to worry, but to thank God who had permitted him to come into so high a light.\n\nThereupon trumpets sounded and C.R.C.\n\nawoke, but so vivid was the dream that he was still sensible of the wounds received while asleep.\n\nWith renewed faith C.\n\nR.\n\nC.\n\narose and prepared himself for the Hermetic Marriage .\n\nHe donned a white linen coat and bound a red ribbon crosswise over his shoulders.\n\nIn his hat he stuck four roses and for food he carried bread, water, and salt.\n\nBefore leaving his cottage, he knelt and vowed that whatever knowledge was revealed to him he would devote to the service of his neighbor.\n\nHe then departed from his house with joy.\n\nTHE SECOND DAY As he entered the forest surrounding his little house, it seemed to C.R.C.\n\nthat all Nature had joyously prepared for the wedding.\n\nAs he proceeded singing merrily, he came to a green heath in which stood three great cedars, one bearing a tablet with an inscription describing the four paths that led to the palace of the King: the first short and dangerous, the second circuitous, the third a pleasant and royal road, and the fourth suitable only for incorruptible bodies.\n\nWeary and perplexed, C.R.C.\n\ndecided to rest and, cutting a slice of bread, was about to partake thereof when a white dove begged it from him.\n\nThe dove was at once attacked by a raven, and in his efforts to separate the birds C.R.C.\n\nunknowingly ran a considerable distance along one of the four paths--that leading southward.\n\nA terrific wind preventing him from retracing his steps, the wedding guest resigned himself to the loss of his bread and continued along the road until he espied in the distance a great gate.\n\nThe sun being low, he hastened towards the portal, upon which, among other figures, was a tablet bearing the words Procul hinc procul ite profani .\n\nA gatekeeper in sky-colored habit immediately asked C.R.C.\n\nfor his letter of invitation and, on receiving it, bade him enter and requested that he purchase a token.\n\nAfter describing himself as a Brother of the Red Rosie Cross, C.R.C.\n\nreceived in exchange for his water bottle a golden disk bearing the letters S C .\n\nNight drawing near, the wanderer hastened on to a second gate, guarded by a lion, and to which was affixed a tablet with the words Date et dabitur volis , where he presented a letter given him by the first gatekeeper.\n\nBeing urged to purchase a token bearing the letters S M , he gave his little package of salt and then hastened on to reach the palace gates before they were locked for the night.\n\nA beautiful virgin called Virgo Lucifera was extinguishing the castle lights as C.R.C.\n\napproached, and he was barely able to squeeze through the closing gates.\n\nAs they closed they caught part of his coat, which he was forced to leave behind.\n\nHere his name was written in the Lord Bridegroom's little vellum book and he was presented with a new pair of shoes and also a token bearing the letters S P N .\n\nHe was then conducted by pages to a small chamber where the \"ice-grey locks\" were cut from the crown of his head by invisible barbers, after which he was ushered into a spacious hall where a goodly number of kings, princes, and commoners were assembled."

