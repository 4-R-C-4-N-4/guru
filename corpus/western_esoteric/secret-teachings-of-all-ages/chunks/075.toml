body = "He neither slumbers nor sleeps, and is governed by a Father also both male and female, and ever watchful.\n\nSuch is the mystery kept hidden to this day, for Nature, being mingled in marriage with the Sky Man, brought forth a wonder most wonderful--seven men, all bisexual, male and female, and upright of stature, each one exemplifying the natures of the Seven Governors.\n\nThese O Hermes, are the seven races, species, and wheels.\n\n\"After this manner were the seven men generated.\n\nEarth was the female element and water the male element, and from the fire and the æther they received their spirits, and Nature produced bodies after the species and shapes of men.\n\nAnd man received the Life and Light of the Great Dragon, and of the Life was made his Soul and of the Light his Mind.\n\nAnd so, all these composite creatures containing immortality, but partaking of mortality, continued in this state for the duration of a period.\n\nThey reproduced themselves out of themselves, for each was male and female.\n\nBut at the end of the period the knot of Destiny was untied by the will of God and the bond of all things was loosened.\n\nA GREEK FORM OF HERMES.\n\nFrom Bryant's Mythology.\n\nThe name Hermes is derived from \"Herm,\" a form of CHiram, the Personified Universal Life Principle, generally represented by fire.\n\nThe Scandinavians worshiped Hermes under the name of Odin; the Teutons as Wotan, and certain of the Oriental peoples as Buddha, or Fo.\n\nThere are two theories concerning his demise.\n\nThe first declares that Hermes was translated like Enoch and carried without death into the presence of God, the second states that he was buried in the Valley of Ebron and a great treasure placed in his tomb--not a treasure of gold but of books and sacred learning.\n\nThe Egyptians likened humanity to a flock of sheep.\n\nThe Supreme and Inconceivable Father was the Shepherd, and Hermes was the shepherd dog.\n\nThe origin of the shepherd's crook in religious symbolism may be traced to the Egyptian rituals.\n\nThe three scepters of Egypt include the shepherd's crook, symbolizing that by virtue of the power reposing in that symbolic staff the initiated Pharaohs guided the destiny of their people.\n\n*** \"Then all living creatures, including man, which had been hermaphroditical, were separated, the males being set apart by themselves and the females likewise, according to the dictates of Reason.\n\n\"Then God spoke to the Holy Word within the soul of all things, saying: 'Increase in increasing and multiply in multitudes, all you, my creatures and workmanships.\n\nLet him that is endued with Mind know himself to be immortal and that the cause of death is the love of the body; and let him learn all things that are, for he who has recognized himself enters into the state of Good.' \"And when God had said this, Providence, with the aid of the Seven Governors and Harmony, brought the sexes together, making the mixtures and establishing the generations, and all things were multiplied according to their kind.\n\nHe who through the error of attachment loves his body, abides wandering in darkness, sensible and suffering the things of death, but he who realizes that the body is but the tomb of his soul, rises to immortality.\" Then Hermes desired to know why men should be deprived of immortality for the sin of ignorance alone.\n\nThe Great Dragon answered:, To the ignorant the body is supreme and they are incapable of realizing the immortality that is within them."

