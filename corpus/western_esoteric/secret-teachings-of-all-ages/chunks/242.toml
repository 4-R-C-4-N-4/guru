body = "It is said to have been white originally and of such brilliancy that it could be seen many days' journey from Mecca, but as ages passed it became blackened by the tears of pilgrims and the sins of the world.\n\nTHE MAGIC OF METALS AND GEMS According to the teachings of the Mysteries, the rays of the celestial bodies, striking the crystallizing influences of the lower world, become the various elements.\n\nPartaking of the astral virtues of their source, these elements neutralize certain unbalanced forms of celestial activity and, when properly combined, contribute much to the well-being of man.\n\nLittle is known today concerning these magical properties, but the modern world may yet find it profitable to consider the findings of the early philosophers who determined these relationships by extensive experimentation.\n\nOut of such research arose the practice of identifying the metals with the bones of the various deities.\n\nFor example, the Egyptians, according to Manetho, considered iron to be the bone of Mars and the lodestone the bone of Horus.\n\nBy analogy, lead would be the physical skeleton of Saturn, copper of Venus, quicksilver of Mercury, gold of the sun, silver of the moon, and antimony of the earth.\n\nIt is possible that uranium will prove to be the metal of Uranus and radium to be the metal of Neptune.\n\nEXAMPLES OF HERMÆ.\n\nFrom Christie's Disquisitions upon the Painted Greek Vases.\n\nThe Primitive custom of worshiping the gods in the form of heaps of stones gave place to the practice of erecting phallic pillars, or cones, in their honor.\n\nThese columns differed widely in size and appearance.\n\nSome were of gigantic proportions and were richly ornamented with inscriptions or likenesses of the gods and heroes; others--like the votive offerings of the Babylonians--were but a few inches high, without ornament, and merely bore a brief statement of the purpose for which they had been prepared or a hymn to the god of the temple in which they were placed.\n\nThese small baked clay cones were identical in their symbolic meaning with the large hermæ set up by the roadside and in other public places.\n\nLater the upper end of the column was surmounted by a human head.\n\nOften two projections, or tenons, corresponding to shoulders were placed, one on either side, to support the wreaths of flowers adorning the columns.\n\nOfferings, usually of food, were placed near the hermæ.\n\nOccasionally these columns were used to uphold roofs and were numbered among the art objects ornamenting the villas of wealthy Romans.\n\n*** The four Ages of the Greek mystics--the Golden Age, the Silver Age, the Bronze Age, and the Iron Age--are metaphoric expressions referring to the four major periods in the life of all things.\n\nIn the divisions of the day they signify dawn, midday, sunset, and midnight; in the duration of gods, men, and universes, they denote the periods of birth, growth, maturity, and decay.\n\nThe Greek Ages also bear a close correspondence to the four Yugas of the Hindus: Krita-Yuga , Treta-Yuga , Dvapara-Yuga , and Kali-Yuga .\n\nTheir method of calculation is described by Ullamudeian as follows: \"In each of the 12 signs there are 1800 minutes; multiply this number by 12 you have 21600; e.g.\n\n1800 X 12=21600.\n\nMultiply this 21600 by 80 and it will give 1,728,000, which is the duration of the first age, called Krita-Yuga .\n\nIf the same number be multiplied by 60, it will give 1,296,000, the years of the second age, Treta-Yuga .\n\nThe same number multiplied by 40 gives 864,000, the length of the third age, Dvapara-Yuga ."

