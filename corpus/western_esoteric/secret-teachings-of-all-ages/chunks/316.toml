[content]
body = "Many of the early Church Fathers sought to establish a direct relationship between Adam and Christ, thereby obviously discounting the extremely sinful nature of man's common ancestor, since it is quite certain that when St.\n\nAugustine likens Adam to Christ and Eve to the church he does not intend to brand the latter institution as the direct cause of the fall of man.\n\nFor some inexplicable reason, however, religion has ever regarded intellectualism--in fact every form of knowledge--as fatal to man's spiritual growth.\n\nThe Ignaratitine Friars are an outstanding example of this attitude.\n\nIn this ritualistic drama--possibly derived from the Egyptians--Adam, banished from the Garden of Eden, represents man philosophically exiled from the sphere of Truth.\n\nThrough ignorance man falls; through wisdom he redeems himself.\n\nThe Garden of Eden represents the House of the Mysteries (see The Vision of Enoch ) in the midst of which grew both the Tree of Life and the Tree of the Knowledge of Good and Evil.\n\nMan, the banished Adam, seeks to pass from the outer court of the Sanctuary (the exterior universe) into the sanctum sanctorum, but before him rises a vast creature armed with a flashing sword that, moving slowly but continually, sweeps clear a wide circle, and through this \"Ring Pass Not\" the Adamic man cannot break.\n\nThe cherubim address the seeker thus: \"Man, thou art dust and to dust thou shalt return.\n\nThou wert fashioned by the Builder of Forms; thou belongest to the sphere of form, and the breath that was breathed into thy soul was the breath of form and like a flame it shall flicker out.\n\nMore than thou art thou canst not be.\n\nThou art a denizen of the outer world and it is forbidden thee to enter this inner place.\" And the Adam replies: \"Many times have I stood within this courtyard and begged admission to my Father's house and thou hast refused it me and sent me back to wander in darkness.\n\nTrue it is that I was fashioned out of the dirt and that my Maker could not confer upon me the boon of immortality.\n\nBut no more shalt thou send me away; for, wandering in the darkness, I have discovered that the Almighty hath decreed my salvation because He hath sent out of the most hidden Mystery His Only Begotten who didst take upon Himself the world fashioned by the Demiurgus.\n\nUpon the elements of that world was He crucified and from Him hath poured forth the blood of my salvation.\n\nAnd God, entering into His creation, hath quickened it and established therein a road that leadeth to Himself.\n\nWhile my Maker could not give me immortality, immortality was inherent in the very dust of which I was composed, for before the world was fabricated and before the Demiurgus became the Regent of Nature the Eternal Life had impressed itself upon the face of Cosmos.\n\nThis is its sign--the Cross .\n\nDo you now deny me entrance, I who have at last learned the mystery of myself?\" And the voice replies: \"He who is aware, IS !\n\nBehold!\" Gazing about him, Adam finds himself in a radiant place, in the midst of which stands a tree with flashing jewels for fruit and entwined about its trunk a flaming, winged serpent crowned with a diadem of stars.\n\nIt was the voice of the serpent that had spoken.\n\n\"Who art thou?\" demands the Adam.\n\n\"I,\" the serpent answers, \"am Satan who was stoned; I am the Adversary--the Lord who is against you, the one who pleads for your destruction before the Eternal Tribunal.\n\nI was your enemy upon the day that you were formed; I have led you into temptation; I have delivered you into the hands of evil; I have maligned you; I have striven ever to achieve your undoing."

