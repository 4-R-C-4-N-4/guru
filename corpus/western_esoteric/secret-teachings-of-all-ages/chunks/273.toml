body = "DILIGENCE, I at last obtained my desire; and, being warned by MR.\n\nHONESTY, a stranger in our days, to publish it to the world, I have done it.\" (From the Introduction to the 1835 Edition of The Complete Herbal.) Doctor Johnson said of Culpeper that he merited the gratitude of posterity.\n\n*** In Doctor Culpeper's correlation of astrology and herbalism, each plant was under the jurisdiction of one of the planets or luminaries.\n\nHe believed that disease was also controlled by celestial configurations.\n\nHe summed up his system of treatment as follows: \"You may oppose diseases by Herbs of the planet opposite to the planet that causes them: as diseases of Jupiter by Herbs of Mercury, and the contrary; diseases of the Luminaries by the Herbs of Saturn, and the contrary; diseases of Mars by Herbs of Venus and the contrary.\n\n* * * There is a way to cure diseases sometimes by Sympathy, and so every planet cures his own disease; as the Sun and Moon by their Herbs cure the Eyes, Saturn the Spleen, Jupiter the Liver, Mars the Gall and diseases of choler, and Venus diseases in the Instruments of Generation.\" ( The Complete Herbal .) Mediæval European herbalists rediscovered only in part the ancient Hermetic secrets of Egypt and Greece.\n\nThese earlier nations evolved the fundamentals of nearly all modern arcs and sciences.\n\nAt that time the methods used in healing were among the secrets imparted to initiates of the Mysteries.\n\nUnctions, collyria, philters, and potions were concocted to the accompaniment of strange rites.\n\nThe effectiveness of these medicines is a matter of historical record.\n\nIncenses and perfumes were also much used.\n\nBarrett in his Magus describes the theory on which they worked, as follows: \"For, because our spirit is the pure, subtil, lucid, airy and unctuous vapour of the blood, nothing, therefore, is better adapted for collyriums than the like vapours which are more suitable to our spirit in substance; for then, by reason of their likeness, they do more stir up, attract and transform the spirit.\" Poisons were thoroughly studied, and in some communities extracts of deadly herbs were administered to persons sentenced to death--as in the case of Socrates.\n\nThe infamous Borgias of Italy developed the art of poisoning to its highest degree.\n\nUnnumbered brilliant men and women were quietly and efficiently disposed of by the almost superhuman knowledge of chemistry which for many centuries was preserved in the Borgia family.\n\nEgyptian priests discovered herb extracts by means of which temporary clairvoyance could be induced, and they made use of these during the initiatory rituals of their Mysteries.\n\nThe drugs were sometimes mixed with the food given to candidates, and at other times were presented in the form of sacred potions, the nature of which was explained.\n\nShortly after the drugs were administered to him, the neophyte was attacked by a spell of dizziness.\n\nHe found himself floating through space, and while his physical body was absolutely insensible (being guarded by priests that no ill should befall it) the candidate passed through a number of weird experiences, which he was able to relate after regaining consciousness.\n\nIn the light of present-day knowledge, it is difficult to appreciate an art so highly developed that by means of draughts, perfumes, and incenses any mental attitude desired could be induced almost instantaneously, yet such an art actually existed among the priestcraft of the early pagan world.\n\nConcerning this subject, H.\n\nP."

