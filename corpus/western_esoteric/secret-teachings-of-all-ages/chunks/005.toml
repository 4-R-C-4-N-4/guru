[content]
body = "When the great astronomer Laplace was asked by Napoleon why he had not mentioned God in his Traité de la Mécanique Céleste , the mathematician naively replied: \"Sire, I had no need for that hypothesis!\" In his treatise on Atheism, Sir Francis Bacon tersely summarizes the situation thus: \"A little philosophy inclineth man's mind to atheism; but depth in philosophy bringeth men's minds about to religion.\" The Metaphysics of Aristotle opens with these words: \"All men naturally desire to know.\" To satisfy this common urge the unfolding human intellect has explored the extremities of imaginable space without and the extremities of imaginable self within, seeking to estimate the relationship between the one and the all; the effect and the cause; Nature and the groundwork of Nature; the mind and the source of the mind; the spirit and the substance of the spirit; the illusion and the reality.\n\nAn ancient philosopher once said: \"He who has not even a knowledge of common things is a brute among men.\n\nHe who has an accurate knowledge of human concerns alone is a man among brutes.\n\nBut he who knows all that can be known by intellectual energy, is a God among men.\" Man's status in the natural world is determined, therefore, by the quality of his thinking.\n\nHe whose mind is enslaved to his bestial instincts is philosophically not superior to the brute-, he whose rational faculties ponder human affairs is a man; and he whose intellect is elevated to the consideration of divine realities is already a demigod, for his being partakes of the luminosity with which his reason has brought him into proximity.\n\nIn his encomium of \"the science of sciences\" Cicero is led to exclaim: \"O philosophy, life's guide!\n\nO searcher--out of virtue and expeller of vices!\n\nWhat could we and every age of men have been without thee?\n\nThou hast produced cities; thou hast called men scattered about into the social enjoyment of life.\" In this age the word philosophy has little meaning unless accompanied by some other qualifying term.\n\nThe body of philosophy has been broken up into numerous isms more or less antagonistic, which have become so concerned with the effort to disprove each other's fallacies that the sublimer issues of divine order and human destiny have suffered deplorable neglect.\n\nThe ideal function of philosophy is to serve as the stabilizing influence in human thought.\n\nBy virtue of its intrinsic nature it should prevent man from ever establishing unreasonable codes of life.\n\nPhilosophers themselves, however, have frustrated the ends of philosophy by exceeding in their woolgathering those untrained minds whom they are supposed to lead in the straight and narrow path of rational thinking.\n\nTo list and classify any but the more important of the now recognized schools of philosophy is beyond the space limitations of this volume.\n\nThe vast area of speculation covered by philosophy will be appreciated best after a brief consideration of a few of the outstanding systems of philosophic discipline which have swayed the world of thought during the last twenty-six centuries.\n\nThe Greek school of philosophy had its inception with the seven immortalized thinkers upon whom was first conferred the appellation of Sophos , \"the wise.\" According to Diogenes Laertius, these were Thales, Solon, Chilon, Pittacus, Bias, Cleobulus, and Periander.\n\nWater was conceived by Thales to be the primal principle or element, upon which the earth floated like a ship, and earthquakes were the result of disturbances in this universal sea.\n\nSince Thales was an Ionian, the school perpetuating his tenets became known as the Ionic.\n\nHe died in 546 B.C., and was succeeded by Anaximander, who in turn was followed by Anaximenes, Anaxagoras, and Archelaus, with whom the Ionic school ended."

