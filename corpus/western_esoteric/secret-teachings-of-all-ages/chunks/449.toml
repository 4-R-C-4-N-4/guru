body = "The construction of temples of the Ionic order to Juno, Diana, Father Bacchus, and the other gods of that kind, will be in keeping with the middle position which they hold; for the building of such will be an appropriate combination of the severity of the Doric and the delicacy of the Corinthian.\" In describing the societies of Ionian artificers, Joseph Da Costa declares the Dionysiac rites to have been founded upon the science of astronomy, which by the initiates of this order was correlated to the builder's art.\n\nIn various documents dealing with the origin of architecture are found hints to the effect that the great buildings erected by these initiated craftsmen were based upon geometrical patterns derived from the constellations.\n\nThus, a temple might be planned according to the constellation of Pegasus or a court of judgment modeled after the constellation of the Scales.\n\nThe Dionysians evolved a peculiar code by which they were able to communicate with one another in the dark and both the symbols and the terminology of their guild were derived, in the main, from the elements of architecture.\n\nWhile stigmatized as pagans by reason of their philosophic principles, it is noteworthy that these Dionysiac craftsmen were almost universally employed in the erection of early Christian abbeys and cathedrals, whose stones even to this very day bear distinguishing marks and symbols cut into their surfaces by these illustrious builders.\n\nAmong the ornate carvings upon the fronts of great churches of the Old World are frequently found representations of compasses, squares, rules, mallets, and clusters of builders' tools skillfully incorporated into mural decorations and even placed in the hands of the effigies of saints and prophets standing in exalted niches.\n\nA great mystery was contained in the ancient portals of the Cathedral Of Notre Dame which were destroyed during the French Revolution, for among their carvings were numerous Rosicrucian and Masonic emblems; and according to the records preserved by alchemists who studied their bas-reliefs, the secret processes for metallic transmutation were set forth in their grotesque yet most significant figures.\n\nThe checkerboard floor upon which the modern Freemasonic lodge stands is the old tracing board of the Dionysiac Architects, and while the modern organization is no longer limited to workmen's guilds it still preserves in its symbols the metaphysical doctrines of the ancient society of which it is presumably the outgrowth.\n\nThe investigator of the origin of Freemasonic symbolism who desires to trace the development of the order through the ages will find a practical suggestion in the following statement of Charles W.\n\nHeckethorn: \"But considering that Freemasonry is a tree the roots of which spread through so many soils, it follows that traces thereof must be found in its fruit; that its language and ritual should retain much of the various sects and institutions it has passed through before arriving at their present state, and in Masonry we meet with Indian, Egyptian, Jewish, and Christian ideas, terms therefrom the supreme ambition of their craft and symbols.\" (See The Secret Societies of All Ages and Countries .) The Roman Collegia of skilled architects were apparently a subdivision of the greater Ionian body, their principles and organization being practically identical with the older Ionian institution.\n\nIt has been suspected that the Dionysians also profoundly influenced early Islamic culture, for part of their symbolism found its way into the Mysteries of the dervishes.\n\nAt one time the Dionysians referred to themselves as Sons of Solomon, and one of the most important of their symbols was the Seal of Solomon--two interlaced triangles.\n\nThis motif is frequently seen in conspicuous parts of Mohammedan mosques.\n\nThe Knights Templars--who were suspected of anything and everything--are believed to have contacted these Dionysiac artificers and to have introduced many of their symbols and doctrines into mediæval Europe."

