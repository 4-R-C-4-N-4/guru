body = "THE COMTE DE ST.-GERMAIN During the early part of the eighteenth century there appeared in the diplomatic circles of Europe the most baffling personality of history--a man whose life was so near a synonym of mystery that the enigma of his true identity was as insolvable to his contemporaries as it has been to later investigators.\n\nThe Comte de St.-Germain was recognized as the outstanding scholar and linguist of his day.\n\nHis versatile accomplishments extended from chemistry and history to poetry and music.\n\nHe played several musical instruments with great skill and among his numerous compositions was a short opera.\n\nHe was also an artist of rare ability and the remarkably luminous effects which he created on canvas are believed to have been the result of his mixing powdered mother-of-pearl with his pigments.\n\nHe gained worldwide distinction for his ability to reproduce in his paintings the original luster of the precious stones appearing upon the costumes of his subjects.\n\nHis linguistic proficiency verged on the supernatural.\n\nHe spoke German, English, Italian, Portuguese, Spanish, French with a Piedmontese accent, Greek, Latin, Sanskrit, Arabic, and Chinese with such fluency that in every land he visited he was accepted as a native.\n\nHe was ambidextrous to such a degree that: he could write the same article with both hands simultaneously.\n\nWhen the two pieces of paper were afterwards placed together with a light behind them, the writing on one sheet exactly covered, letter for letter, the writing on the other.\n\nAs a historian, the Comte de St.-Germain possessed uncanny knowledge of every occurrence of the preceding two thousand years, and in his reminiscences he described in intimate detail events of previous centuries in which he had played important rôles.\n\nHe assisted Mesmer in developing the theory of mesmerism, and in all probability was the actual discoverer of that science.\n\nHis knowledge of chemistry was so profound that he could remove flaws from diamonds and other precious stones--a feat which he actually performed at the request of Louis XV in 1757.\n\nHe was also recognized as an art critic without a peer and was often consulted regarding paintings accredited to the great masters.\n\nHis claim to the possession of the fabled elixir of life was home witness to by Madame de Pompadour, who discovered, she declared, that he had presented a lady of the court with a certain priceless liquid which had had the effect of preserving her youthful vivacity and beauty for over twenty-five years beyond the normal term.\n\nThe startling accuracy of his prophetic utterances gained for him no small degree of fame.\n\nTo Marie Antoinette he predicted the fall of the French monarchy, and he was also aware of the unhappy fate of the royal family years before the Revolution actually took place.\n\nThe crowning evidence, however, of the Comte's genius was his penetrating grasp of the political situation of Europe and the consummate skill with which he parried the thrusts of his diplomatic adversaries.\n\nHe was employed by a number of European governments, including the French, as a secret agent, and at all times bore credentials which gave him entrée to the most exclusive circles.\n\nIn her excellent monograph, The Comte de St.-Germain, the Secret of Kings , Mrs.\n\nCooper-Oakley lists the most important names under which this amazing person masqueraded between the years 1710 and 1822.\n\n\"During this time,\" she writes, \"we have M.\n\nde St.-Germain as the Marquis de Montferrat, Comte Bellamarre or Aymar at Venice, Chevalier Schoening at Pisa, Chevalier Weldon at Milan and Leipzig, Comte Soltikoff at Genoa and Leghorn, Graf Tzarogy at Schwalbach and Triesdorf, Prinz Ragoczy at Dresden, and Comte de St.-Germain at Paris, The Hague, London, and St."

