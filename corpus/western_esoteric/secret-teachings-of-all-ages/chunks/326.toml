[content]
body = "In the pseudo-Egyptian Tarot the hanged man is suspended between two palm trees and signifies the Sun God who dies perennially for his world.\n\nThe thirteenth numbered major trump is called La Mort , Death, and portrays a reaping skeleton with a great scythe cutting off the heads, hands, and feet rising out of the earth about it.\n\nIn the course of its labors the skeleton has apparently cut off one of its own feet.\n\nNot all Tarot decks show this peculiarity, but this point well emphasizes the philosophic truth that unbalance and destructiveness are synonymous.\n\nThe skeleton is the proper emblem of the first and supreme Deity because it is the foundation of the body, as the Absolute is the foundation of creation.\n\nThe reaping skeleton physically signifies death but philosophically that irresistible impulse in Nature which causes every being to be ultimately absorbed into the divine condition in which it existed before the illusionary universe had been manifested.\n\nThe blade of the scythe is the moon with its crystallizing power.\n\nThe field in which death reaps is the universe, and the card discloses that all things growing out of the earth shall be cut down and return to earth again.\n\nKings, Queens, courtesans, and knaves are alike to death, the master of the visible and a parent parts of all creatures.\n\nIn some Tarot decks death is symbolized as a figure in armor mounted on a white horse which tramples under foot old and young alike.\n\nIn the pseudo-Egyptian Tarot a rainbow is seen behind the figure of death, thus signifying that the mortality of the body of itself achieves the immortality of the spirit.\n\nDeath, though it destroys form, can never destroy life, which continually renews itself.\n\nThis card is the symbol of the constant renovation of the universe--disintegration that reintegration may follow upon a higher level of expression.\n\nThe fourteenth numbered major trump is called La Temperance , Temperance, and portrays an angelic figure with the sun upon her forehead.\n\nShe carries two urns, one empty and the other full, and continually pours the contents of the upper into the lower, In some Tarot decks the flowing water takes the form of the symbol of Aquarius.\n\nNot one drop, however, of the living water is lost in this endless transference between the superior vessel and the inferior.\n\nWhen the lower urn is filled the vases are reversed, thus signifying that life pours first from the invisible into the visible, then from the visible back into the invisible.\n\nThe spirit controlling this flow is an emissary of the great Jehovah, Demiurgus of the world.\n\nThe sun, or light cluster, upon the woman's forehead controls the flow of water, which, being drawn upward into the air by the solar rays, descends upon the earth as rain, to drawn up and fall again ad infinitum .\n\nHerein is also shown the passage of the human life forces back and forth between positive and negative poles of the creative system.\n\nIn the pseudo-Egyptian Tarot the symbolism is the same, except that the winged figure is male instead of female.\n\nIt is surrounded by a solar nimbus and pours water from a golden urn into a silver one, typifying the descent of celestial forces into the sublunary spheres.\n\nThe fifteenth numbered major trump is called Le Diable , the Devil, and portrays a creature resembling Pan with the horns of a ram or deer, the arms and body of a man, and the legs and feet of a goat or dragon.\n\nThe figure stands upon a cubic stone, to a ring in the front of which are chained two satyrs.\n\nFor a scepter this so-called demon carries a lighted torch or candle.\n\nThe entire figure is symbolic of the magic powers of the astral light, or universal mirror, in which the divine forces are reflected in an inverted, or infernal, state."

