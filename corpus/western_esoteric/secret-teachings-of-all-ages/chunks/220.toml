body = "The cat was the only animal absent at the death of the great Buddha, because it had stopped on the way to chase a mouse.\n\nThat the symbol of the lower astral forces should not be present at the liberation of the Buddha is significant.\n\nRegarding the cat, Herodotus says: \"Whenever a fire breaks out, cats are agitated with a kind of divine motion, which they that keep them observe, neglecting the fire: The cats, however, in spite of their care, break from them, leaping even over the heads of their keepers to throw themselves into the fire.\n\nThe Egyptians then make great mourning for their death.\n\nIf a cat dies a natural death in a house, all they of that house shave their eyebrows: If a dog, they shave the head and all the body.\n\nThey used to embalm their dead cats, and carry them to Bubastis to be interred in a sacred house.\n\n(Montfaucon's Antiquities .) The most important of all symbolic animals was the Apis, or Egyptian bull of Memphis, which was regarded as the sacred vehicle for the transmigration of the soul of the god Osiris.\n\nIt was declared that the Apis was conceived by a bolt of lightning, and the ceremony attendant upon its selection and consecration was one of the most impressive in Egyptian ritualism.\n\nThe Apis had to be marked in a certain manner.\n\nHerodotus states that the bull must be black with a square white spot on his forehead, the form of an eagle (probably a vulture) on his back, a beetle upon (under) his tongue, and the hair of his tail lying two ways.\n\nOther writers declare that the sacred bull was marked with twenty-nine sacred symbols, his body was spotted, and upon his right side was a white mark in the form of a crescent.\n\nAfter its sanctification the Apis was kept in a stable adjacent to the temple and led in processionals through the streets of the city upon certain solemn occasions.\n\nIt was a popular belief among the Egyptians that any child upon whom the bull breathed would become illustrious.\n\nAfter reaching a certain age (twenty-five years) the Apis was taken either to the river Nile or to a sacred fountain (authorities differ on this point) and drowned, amidst the lamentations of the populace.\n\nThe mourning and wailing for his death continued until the new Apis was found, when it was declared that Osiris had reincarnated, whereupon rejoicing took the place of grief.\n\nThe worship of the bull was not confined to Egypt, but was prevalent in many nations of the ancient world.\n\nIn India, Nandi--the sacred white bull of Siva--is still the object of much veneration; and both the Persians and the Jews accepted the bull as an important religious symbol.\n\nThe Assyrians, Phœnicians, Chaldeans, and even the Greeks reverenced this animal, and Jupiter turned himself into a white bull to abduct Europa.\n\nThe bull was a powerful phallic emblem signifying the paternal creative power of the Demiurgus.\n\nAt his death he was frequently mummified and buried with the pomp and dignity of a god in a specially prepared sarcophagus.\n\nExcavations in the Serapeum at Memphis have uncovered the tombs of more than sixty of these sacred animals.\n\nAs the sign rising over the horizon at the vernal equinox constitutes the starry body for the annual incarnation of the sun, the bull not only was the celestial symbol of the Solar Man but, because the vernal equinox took place in the constellation of Taurus, was called the breaker or opener of the year.\n\nFor this reason in astronomical symbolism the bull is often shown breaking the annular egg with his horns."

