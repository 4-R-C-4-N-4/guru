[content]
body = "Henri Bergson, the intuitionalist, undoubtedly the greatest living French philosopher, presents a theory of mystic anti-intellectualism founded upon the premise of creative evolution, His rapid rise to popularity is due to his appeal to the finer sentiments in human nature, which rebel against the hopelessness and helplessness of materialistic science and realistic philosophy.\n\nBergson sees God as life continually struggling against the limitations of matter.\n\nHe even conceives the possible victory of life over matter, and in time the annihilation of death.\n\nApplying the Baconian method to the mind, John Locke, the great English philosopher, declared that everything which passes through the mind is a legitimate object of mental philosophy, and that these mental phenomena are as real and valid as the objects of any other science.\n\nIn his investigations of the origin of phenomena Locke departed from the Baconian requirement that it was first necessary to make a natural history of facts.\n\nThe mind was regarded by Locke to be blank until experience is inscribed upon it.\n\nThus the mind is built up of received impressions plus reflection.\n\nThe soul Locke believed to be incapable of apprehension of Deity, and man's realization or cognition of God to be merely an inference of the reasoning faculty.\n\nDavid Hume was the most enthusiastic and also the most powerful of the disciples of Locke.\n\nAttacking Locke's sensationalism, Bishop George Berkeley substituted for it a philosophy founded on Locke's fundamental premises but which he developed as a system of idealism.\n\nBerkeley held that ideas are the real objects of knowledge.\n\nHe declared it impossible to adduce proof that sensations are occasioned by material objects; he also attempted to prove that matter has no existence.\n\nBerkeleianism holds that the universe is permeated and governed by mind.\n\nThus the belief in the existence of material objects is merely a mental condition, and the objects themselves may well be fabrications of the mind.\n\nAt the same time Berkeley considered it worse than insanity to question the accuracy of the perceptions; for if the power of the perceptive faculties be questioned man is reduced to a creature incapable of knowing, estimating, or realizing anything whatsoever.\n\nIn the Associationalism of Hartley and Hume was advanced the theory that the association of ideas is the fundamental principle of psychology and the explanation for all mental phenomena.\n\nHartley held that if a sensation be repeated several times there is a tendency towards its spontaneous repetition, which may be awakened by association with some other idea even though the object causing the original reaction be absent.\n\nThe Utilitarianism of Jeremy Bentham, Archdeacon Paley, and James and John Stuart Mill declares that to be the greatest good which is the most useful to the greatest number.\n\nJohn Stuart Mill believed that if it is possible through sensation to secure knowledge of the properties of things, it is also possible through a higher state of the mind--that is, intuition or reason--to gain a knowledge of the true substance of things.\n\nDarwinism is the doctrine of natural selection and physical evolution.\n\nIt has been said of Charles Robert Darwin that he determined to banish spirit altogether from the universe and make the infinite and omnipresent Mind itself synonymous with the all-pervading powers of an impersonal Nature.\n\nAgnosticism and Neo-Hegelianism are also noteworthy products of this period of philosophic thought.\n\nThe former is the belief that the nature of ultimates is unknowable; the latter an English and American revival of Hegel's idealism.\n\nA CHRISTIAN TRINITY.\n\nFrom Hone's Ancient Mysteries Described.\n\nIn an effort to set forth in an appropriate figure the Christian doctrine of the Trinity, it was necessary to devise an image in which the three persons--Father, Son, and Holy Ghost--were separate and yet one.\n\nIn different parts of Europe may be seen figures similar to the above, wherein three faces are united in one head."

