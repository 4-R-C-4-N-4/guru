body = "Not having conquered himself, however, he ultimately failed.\n\nRegardless of his glory and power, the prophecies of the talking trees were fulfilled, and Alexander was cut down in the midst of his triumph.\n\n(There are persistent rumors to the effect that Alexander was an initiate of high order who failed because of his inability to withstand the temptations of power.) E.\n\nY.\n\nKenealy, quoting from the Cosmodromium of Doctor Gobelin Persona , describes the incident of Alexander and the talking trees, into the presence of which the King of Macedon is said to have been brought while on his campaign in India: \"And now Alexander marched into other quarters equally dangerous; at one time over the tops of mountains, at another through dark valleys, in which his army was attacked by serpents and wild beasts, until after three hundred days he came into a most pleasant mountain, on whose sides hung chains or ropes of gold.\n\nThis mountain had two thousand and fifty steps all of purest sapphire, by which one could ascend to the summit, and near this Alexander encamped.\n\nAnd on a day, Alexander with his Twelve Princes, ascended by the aforenamed steps to the top of the Mountain, and found there a Palace marvellously beautiful, having Twelve Gates, and seventy windows of the purest gold, and it was called the Palace of the Sun, and there was in it a Temple all of gold, before whose gates were vine trees bearing bunches of carbuncles and pearls, and Alexander and his Princes having entered the Palace, found there a Man lying on a golden bedstead; he was very stately and beautiful in appearance, and his head and beard were white as snow.\n\nThen Alexander and his princes bent the knee to the Sage who spake thus: 'Alexander, thou shalt now see what no earthly man hath ever before seen or heard.' To whom Alexander made answer: 'O, Sage, most happy, how dost thou know me?' He replied: 'Before the wave of the Deluge covered the face of the earth I knew thy works.' He added: 'Wouldst thou behold the most hallowed Trees of the Sun and Moon, which announce all future things?' Alexander made answer: 'It is well, my lord; greatly do we long to see them.' * * * \"Then the Sage said: 'Put away your rings and ornaments, and take off your shoes, and follow me.' And Alexander did so, and choosing out three from the Princes, and leaving the rest to await his return, he followed the Sage, and came to the Trees of the Sun and Moon.\n\nThe Tree of the Sun has leaves of red gold, the Tree of the Moon has leaves of silver, and they are very great, and Alexander, at the suggestion of the Sage questioned the Trees, asking if he should return in triumph to Macedon?\n\nto which the Trees gave answer, No, but that he should live yet another year and eight months, after which he should die by a poisoned cup.\n\nAnd when he inquired, Who was he who should give him that poison?\n\nhe received no reply, and the Tree of the Moon said to him, that his Mother, after a most shameful and unhappy death, should lie long unburied, but that happiness was in store for his sisters.\" (See The Book of Enoch, The Second Messenger of God .) In all probability, the so-called talking trees were merely strips of wood with tables of letters upon them, by means of which oracles were evoked.\n\nAt one time books written upon wood were called \"talking trees.\" The difficulty in deciding the origin of alchemy is directly due to ignoring the lost continent of Atlantis.\n\nTHE LEAVES OF HERMES' SACRED TREE.\n\nRedrawn from an original manuscript dated 1577."

