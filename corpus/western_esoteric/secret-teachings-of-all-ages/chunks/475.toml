body = "In his Ancient Freemasonry , Frank C.\n\nHiggins reproduces the Masonic apron of a colossal stone figure at Quirigua, Guatemala.\n\nThe central ornament of the apron is the three Passion nails, arranged exactly like the British broad arrow.\n\nThat three nails should be used to crucify the Christ, three murderers to kill CHiram Abiff, and three wounds to slay Prince Coh, the Mexican Indian Osiris, is significant.\n\nTHE CRUCIFIXION OF QUETZALCOATL.\n\n(From the Codex Borgianus.) From Kingsborough's Antiquities of Mexico.\n\nLord Kingsborough writes: \"May we not refer to the seventy-third page of the Borgian MS., which represents Quexalcoatl both crucified, and as it were cut in pieces for the cauldron, and with equal reason demand, whether anyone can help thinking that the Jews of the New World (Lord Kingsborough sought to prove that the Mexicans were descendants of the Jews] applied to their Messiah not only all the prophecies contained in the Old Testament relating to Christ, but likewise many of the incidents recorded of him in the Gospels.\" *** C.\n\nW.\n\nKing, in his Gnostics and Their Remains , thus describes a Gnostic gem: \"The Gnostic Pleroma, or combination of all the Æons [is] expressed by the outline of a man holding a scroll * * *.\n\nThe left hand is formed like three bent spikes or nails ; unmistakably the same symbol that Belus often holds in his extended hand on the Babylonian cylinders, afterwards discovered by the Jewish Cabalists in the points of the letter Shin, and by the mediæval mystics in o the Three Nails of the Cross.\" From this point Hargrave Jennings continues King's speculations, noting the resemblance of the nail to an obelisk, or pillar, and that the Qabbalistic value of the Hebrew letter Shin, or Sin, is 300, namely, 100 for each spike.\n\nThe Passion nails are highly important symbols, especially when it is realized that, according to the esoteric systems of culture, there are certain secret centers of force in the palms of the hands and in the soles of the feet.\n\nTHE CRUCIFIXION IN SPACE.\n\nFrom Higgins' Anacalypsis.\n\nOf this remarkable Oriental drawing, J.\n\nP.\n\nLundy has written:----It looks like a Christian crucifix in many respects, and in some others it does not.\n\nThe drawing, attitude, and the nail-marks in hands and feet, indicate a Christian origin; while the Parthian coronet of seven points, the absence of the wood and of the usual inscription, and the rays of glory above seem to point to some Christian origin.\n\nCan it be the Victim, Man, or the Priest and Victim both in one, of the Hindu mythology, who offered himself a sacrifice before the worlds were?\" *** The driving of the nails and the flow of blood and water from the wounds were symbolic of certain secret philosophic practices of the Temple.\n\nMany of the Oriental deities have mysterious symbols on the hands and feet.\n\nThe so-called footprints of Buddha are usually embellished with a magnificent sunburst at the point where the nail pierced the foot of Christ.\n\nIn his notes on the theology of Jakob Böhme, Dr.\n\nFranz Hartmann thus sums up the mystic symbolism of the crucifixion: \"The cross represents terrestrial life, and the crown of thorns the sufferings of the soul within the elementary body, but also the victory of the spirit over the elements of darkness.\n\nThe body is naked, to indicate that the candidate for immortality must divest himself of all desires for terrestrial things."

