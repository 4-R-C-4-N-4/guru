body = "The mount upon which stands the House of the Rosy Cross is still concealed by clouds, in which the Brethren hide both themselves and their secrets.\n\nMichael Maier writes: \"What is contained in the Fama and Confessio is true.\n\nIt is a very childish objection that the brotherhood have promised so much and performed so little.\n\nWith them, as elsewhere, many are called but few are chosen.\n\nThe masters of the order hold out the rose as the remote prize, but they impose the cross on those who are entering.\" (See Silentium post Clamores , by Maier, and The Rosicrucians and the Freemasons , by De Quincey.) THE ELEMENTARY WORLD.\n\nFrom Musæum Hermeticum Reformatum et Amplificatum.\n\nThe outer circle contains the figures of the Zodiac; the second, their signs and that part of the human body which they rule; the third, the months of the year, with brief notes concerning temperaments, etc.\n\nThe fourth circle contains the elements accompanied by their appropriate symbols, and the following seven circles mark the orbits of the planets; also the planetary angels, the seven major members of the Universal Man, and the seven metals, each division appearing under its appropriate element according to the elemental names in the fourth circle.\n\nIn the twelfth circle appear the words: \"There are Three Principles, Three Worlds, Three Ages, and Three Kingdoms.\" In the thirteenth circle appear the names of the twelve arts and sciences which are considered essential to spiritual growth.\n\nIn the fourteenth circle is the word Nature.\n\nThe fifteenth circle contains the following words.\n\n\"It is the great honour of faithful souls, that from their very birth an angel is appointed to preserve and keep each of them.\" (See first English translation, London, 1893.) *** The rose and the cross appear upon the stained glass windows of Lichfield Chapter House, where Walter Conrad Arensberg believes Lord Bacon and his mother to have been buried.\n\nA crucified rose within a heart is watermarked into the dedication page of the 1628 edition of Robert Burton's Anatomy of Melancholy .\n\nThe fundamental symbols of the Rosicrucians were the rose and the cross; the rose female and the cross male, both universal phallic emblems.\n\nWhile such learned gentlemen as Thomas Inman, Hargrave Jennings, and Richard Payne Knight have truly observed that the rose and the cross typify the generative processes, these scholars seem unable to pierce the veil of symbolism; they do not realize that the creative mystery in the material world is merely a shadow of the divine creative mystery in the spiritual world.\n\nBecause of the phallic significance of their symbols, both the Rosicrucians and the Templars have been falsely accused of practicing obscene rites in their secret ceremonials.\n\nWhile it is quite true that the alchemical retort symbolizes the womb, it also has a far more significant meaning concealed under the allegory of the second birth.\n\nAs generation is the key to material existence, it is natural that the Fraternity of R.C.\n\nshould adopt as its characteristic symbols those exemplifying the reproductive processes.\n\nAs regeneration is the key to spiritual existence, they therefore founded their symbolism upon the rose and the cross, which typify the redemption of man through the union of his lower temporal nature with his higher eternal nature.\n\nThe rosy cross is also a hieroglyphic figure representing the formula of the Universal Medicine."

