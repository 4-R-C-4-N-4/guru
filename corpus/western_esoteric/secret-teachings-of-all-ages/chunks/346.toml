body = "Upon moving the altar to one side a brass cover was disclosed.\n\nLifting this revealed a body, presumedly that of C.R.C., which, although it had lain there 120 years, was as well preserved as though it had just been interred.\n\nIt was ornamented and attired in the robes of the Order, and in one hand was clasped a mysterious parchment which, next to the Bible, was the most valued possession of the Society.\n\nAfter thoroughly investigating the contents of the secret chamber, the brass plate and altar were put back in place, the door of the vault was again sealed, and the Brothers went their respective ways, their spirits raised and their faith increased by the miraculous spectacle which they had beheld.\n\nThe document ends by saying in effect, \"In accordance with the will of Father C.R.C., the Fama has been prepared and sent forth to the wise and learned of all Europe in five languages, that all may know and understand the secrets of the august Fraternity.\n\nAll of sincere soul who labor for the glory of God are invited to communicate with the Brethren and are promised that their appeal shall be heard, regardless of where they are or how the messages are sent.\n\nAt the same time, those of selfish and ulterior motives are warned that only sorrow and misery will attend any who attempt to discover the Fraternity without a clean heart and a pure mind.\" Such, in brief, is the story of the Fama Fraternitatis .\n\nThose who accept it literally regard Father C.R.C.\n\nas the actual founder of the Brotherhood, which he is believed to have organized about 1400.\n\nThe fact that historical corroboration of the important points of the Fama has never been discovered is held against this theory.\n\nThere is no proof that Father C.R.C.\n\never approached the learned men of Spain.\n\nThe mysterious city of Damcar cannot be found, and there is no record that anywhere in Germany there existed a place where great numbers of the halt and sick came and were mysteriously healed.\n\nA.\n\nE.\n\nWaite's The Secret Tradition in Freemasonry contains a picture of Father C.R.C.\n\nshowing him with a long beard upon his breast, sitting before a table upon which burns a candle.\n\nOne hand is supporting his head and the other is resting the tip of its index finger on the temple of a human skull.\n\nThe picture, however (see plate at head of chapter), proves nothing.\n\nFather C.R.C.\n\nwas never seen by other than members of his own Order, and they did not preserve a description of him.\n\nThat his name was Christian Rosencreutz is most improbable, as the two were not even associated until the writing of the Chymical Nuptials .\n\nTHE SECOND POSTULATE Those Masonic brethren who have investigated the subject accept the historical existence of the \"Brotherhood of the Rose Cross\" but are divided concerning the origin of the Order.\n\nOne group holds the society originated in medieval Europe as an outgrowth of alchemical speculation.\n\nRobert Macoy, 33°, believes that Johann Valentin Andreæ, a German theologian, was the true founder, and he also believes it possible that this divine merely reformed and amplified an existing society which had been founded by Sir Henry Cornelius Agrippa.\n\nSome believe that Rosicrucianism represented the first European invasion of Buddhist and Brahmin culture.\n\nStill others hold the opinion that the \"Society of the Rose Cross\" was founded in Egypt during n the philosophic supremacy of that empire, and that it also perpetuated the Mysteries of ancient Persia and Chaldea."

