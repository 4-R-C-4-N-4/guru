body = "To speak of that part of the mystery which is concerned with the secret life principle within the actual nature of man, is forbidden, for it is decreed by the Masters of the art that each shall discover that for himself and on this subject it is unlawful to speak at greater length.\n\nPart 2 All true Philosophers of the natural or Hermetic sciences begin their labors with a prayer to the Supreme Alchemist of the Universe, beseeching His assistance in the consummation of the Magnum Opus.\n\nThe prayer that follows, written in a provincial German centuries ago by an adept now unknown, is representative: \"O holy and hallowed Trinity, Thou undivided and triple Unity!\n\nCause me to sink into the abyss of Thy limitless eternal Fire, for only in that Fire can the mortal nature of man be changed into humble dust, while the new body of the salt union lies in the light.\n\nOh, melt me and transmute me in this Thy holy Fire, so that on the day at Thy command the fiery waters of the Holy Spirit draw me out from the dark dust, giving me new birth and making me alive with His breath.\n\nMay I also be exalted through the humble humility of Thy Son, rising through His assistance out of the dust and ashes and changing into a pure spiritual body of rainbow colors like unto the transparent, crystal-like, paradisiacal gold, that my own nature may be redeemed and purified like the elements before me in these glasses and bottles.\n\nDiffuse me in the waters of life as though I were in the wine cellar of the eternal Solomon.\n\nHere the fire of Thy love will receive new fuel and will blaze forth so that no streams can extinguish it.\n\nThrough the aid of this divine fire, may I in the end be found worthy to be called into the illumination of the righteous.\n\nMay I then be sealed up with the light of the new world that I may also attain unto the immortality and glory where there shall be no more alternation of light and darkness.\n\nAmen.\" THE ORIGIN OF ALCHEMICAL FORMULÆ Apparently but few of the medieval alchemists discovered the Great Arcanum without aid, some authors declaring that none of them attained the desired end without the assistance of a Master or Teacher.\n\nIn every instance the identity of these Masters has been carefully concealed, and even during the Middle Ages speculation ran rife concerning them.\n\nIt was customary to call such illuminated sages adepts, a title which indicated that they possessed the true secrets of transmutation and multiplication.\n\nThese adepts were polyonymous individuals who unexpectedly appeared and disappeared again, leaving no trace of their whereabouts.\n\nThere are indications that a certain degree of organization existed among them.\n\nThe most powerful of the alchemical organizations were the Rosicrucians, the Illuminati, and certain Arabian and Syrian sects.\n\nI n the documents which follow, references are made to the \"Brethren \"or \"Brothers.\n\n\" These are to signify that those who had actually accomplished the Magnum Opus were banded together and known to each other by cipher codes and secret signs or symbols.\n\nApparently a number of these illuminated adepts dwelt in Arabia, for several of the great European alchemists were initiated in Asia Minor.\n\nWhen a disciple of the alchemical arts had learned the supreme secret, he guarded it jealously, revealing to no man his priceless treasure.\n\nHe was not permitted to disclose it even to the members of his immediate family.\n\nAs the years passed, one who had discovered the secret--or, more properly, one to whom it had been revealed--sought for some younger man worthy to be entrusted with the formulæ.\n\nTo this one, and to this one only, as a rule, the philosopher was permitted to disclose the arcanum.\n\nThe younger man then became the \"philosophical son\" of the old sage, and to him the latter bequeathed his secrets."

