body = "*** There is considerable evidence that the famous statue of Serapis in the Serapeum at Alexandria was originally worshiped under another name at Sinope, from which it was brought to Alexandria.\n\nThere is also a legend which tells that Serapis was a very early king of the Egyptians, to whom they owed the foundation of their philosophical and scientific power.\n\nAfter his death this king was elevated to the estate of a god.\n\nPhylarchus declared that the word Serapis means \"the power that disposed the universe into its present beautiful order.\" In his Isis and Osiris , Plutarch gives the following account of the origin of the magnificent statue of Serapis which stood in the Serapeum at Alexandria: While he was Pharaoh of Egypt, Ptolemy Soter had a strange dream in which he beheld a tremendous statue, which came to life and ordered the Pharaoh to bring it to Alexandria with all possible speed.\n\nPtolemy Soter, not knowing the whereabouts of the statue, was sorely perplexed as to how he could discover it.\n\nWhile the Pharaoh was relating his dream, a great traveler by the name of Sosibius, coming forward, declared that he had seen such an image at Sinope.\n\nThe Pharaoh immediately dispatched Soteles and Dionysius to negotiate for the removal of the figure to Alexandria.\n\nThree years elapsed before the image was finally obtained, the representatives of the Pharaoh finally stealing it and concealing the theft by spreading a story that the statue had come to life and, walking down the street leading from its temple, had boarded the ship prepared for its transportation to Alexandria.\n\nUpon its arrival in Egypt, the figure was brought into the presence of two Egyptian Initiates--the Eumolpid Timotheus and Manetho the Sebennite--who, immediately pronounced it to be Serapis.\n\nThe priests then declared that it was equipollent to Pluto.\n\nThis was a masterly stroke, for in Serapis the Greeks and Egyptians found a deity in common and thus religious unity was consummated between the two nations.\n\nSeveral figures of Serapis that stood in his various temples in Egypt and Rome have been described by early authors.\n\nNearly all these showed Grecian rather than Egyptian influence.\n\nIn some the body of the god was encircled by the coils of a great serpent.\n\nOthers showed him as a composite of Osiris and Apis.\n\nA description of the god that in all probability is reasonably accurate is that which represents him as a tall, powerful figure, conveying the twofold impression of manly strength and womanly grace.\n\nHis face portrayed a deeply pensive mood, the expression inclining toward sadness.\n\nHis hair was long and arranged in a somewhat feminine manner, resting in curls upon his breast and shoulders.\n\nThe face, save for its heavy beard, was also decidedly feminine.\n\nThe figure of Serapis was usually robed from head to foot in heavy draperies, believed by initiates to conceal the fact that his body was androgynous.\n\nVarious substances were used in making the statues of Serapis.\n\nSome undoubtedly were carved from stone or marble by skilled craftsmen; others may have been cast from base or precious metals.\n\nOne colossus of Serapis was composed of plates of various metals fitted together.\n\nIn a labyrinth sacred to Serapis stood a thirteen-foot statue of him reputed to have been made from a single emerald.\n\nModern writers, discussing this image, state that it was made of green glass poured into a mold.\n\nAccording to the Egyptians, however, it withstood all the tests of an actual emerald."

