body = "Those about to enter the cave drank first from these fountains, the waters of which seemed to possess peculiar occult properties.\n\nThe first contained the water of forgetfulness, and all who drank thereof forgot their earthly sorrows.\n\nFrom the second fountain flowed the sacred water of Mnemosyne, or remembrance, for later it enabled those who partook of it to recall their experiences while in the cave.\n\nThough its entrance was marked by two brass obelisks, the cave, surrounded by a wall of white stones and concealed in the heart of a grove of sacred trees, did not present an imposing appearance.\n\nThere is no doubt that those entering it passed through strange experiences, for they were obliged to leave at the adjacent temple a complete account of what they saw and heard while in the oracle.\n\nThe prophecies were given in the form of dreams and visions, and were accompanied by severe pains in the head; some never completely recovered from the after effects of their delirium.\n\nThe confused recital of their experiences was interpreted by the priests according to the question to be answered.\n\nWhile the priests probably used some unknown herb to produce the dreams or visions of the cavern, their skill in interpreting them bordered on the Supernatural.\n\nBefore consulting the oracle, it was necessary to offer a ram to the dæmon of the cave, and the priest decided by hieromancy whether the time chosen was propitious and the sacrifice was satisfactory.\n\nTHE SEVEN WONDERS OF THE WORLD Many of the sculptors and architects of the ancient world were initiates of the Mysteries, particularly the Eleusinian rites.\n\nSince the dawn of time, the truers of stone and the hewers of wood have constituted a divinely overshadowed caste.\n\nAs civilization spread slowly over the earth, cities were built and deserted; monuments were erected to heroes at present unknown; temples were built to gods who lie broken in the dust of the nations they inspired.\n\nResearch has proved not only that the builders of these cities and monuments and the sculptors who chiseled out the inscrutable faces of the gods were masters of their crafts, but that in the world today there are none to equal them.\n\nThe profound knowledge of mathematics and astronomy embodied in ancient architecture, and the equally profound knowledge of anatomy revealed in Greek statuary, prove that the fashioners of both were master minds, deeply cultured in the wisdom which constituted the arcana of the Mysteries .Thus was established the Guild of the Builders, progenitors of modern Freemasons.\n\nWhen employed to build palaces, temples or combs, or to carve statues for the wealthy, those initiated architects and artists concealed in their works the secret doctrine, so that now, long after their bones have returned to dust, the world realizes that those first artisans were indeed duly initiated and worthy to receive the wages of Master Masons.\n\nThe Seven Wonders of the World, while apparently designed for divers reasons, were really monuments erected to perpetuate the arcana of the Mysteries.\n\nThey were symbolic structures, placed in peculiar spots, and the real purpose of their erection can be sensed only by the initiated.\n\nÉliphas Lévi has noted the marked correspondence between these Seven Wonders and the seven planets.\n\nThe Seven Wonders of the World were built by Widow's sons in honor of the seven planetary genii.\n\nTheir secret symbolism is identical with that of the seven seals of Revelation and the seven churches of Asia.\n\n1.\n\nThe Colossus of Rhodes, a gigantic brass statue about 109 feet in height and requiring over twelve years to build, was the work of an initiated artist, Chares of Lindus.\n\nThe popular theory--accepted for several hundred years--that the figure stood with one foot on each side of the entrance to the harbor of Rhodes and that full-rigged ships passed between its feet, has never been substantiated."

