body = "In Longfellow's Song of Hiawatha the poet has cast the great Indian statesman in a charming setting of magic and enchantment; yet through the maze of symbol and allegory is ever faintly visible the figure of Hiawatha the initiate--the very personification of the red man and his philosophy.\n\nTHE POPOL VUH No other sacred book sets forth so completely as the Popol Vuh the initiatory rituals of a great school of mystical philosophy.\n\nThis volume alone is sufficient to establish incontestably the philosophical excellence of the red race.\n\n\"The Red 'Children of the Sun,'\" writes James Morgan Pryse, \"do not worship the One God.\n\nFor them that One God is absolutely impersonal, and all the Forces emanated from that One God are personal.\n\nThis is the exact reverse of the popular western conception of a personal God and impersonal working forces in nature.\n\nDecide for yourself which of these beliefs is the more philosophical.\n\nThese Children of the Sun adore the Plumèd Serpent, who is the messenger of the Sun.\n\nHe was the God Quetzalcoatl in Mexico, Gucumatz in Quiché; and in Peru he was called Amaru.\n\nFrom the latter name comes our word America.\n\nAmaruca is, literally translated, 'Land of the Plumèd Serpent.' The priests of this God of Peace, from their chief centre in the Cordilleras, once ruled both Americas.\n\nAll the Red men who have remained true to the ancient religion are still under their sway.\n\nOne of their strong centres was in Guatemala, and of their Order was the author of the book called Popol Vuh .\n\nIn the Quiché tongue Gucumatz is the exact equivalent of Quetzalcoatl in the Nahuatl language; quetzal , the bird of Paradise; coatl , serpent--'the Serpent veiled in plumes of the paradise-bird'!\" The Popol Vuh was discovered by Father Ximinez in the seventeenth century.\n\nIt was translated into French by Brasseur de Bourbourg and published in 1861.\n\nThe only complete English translation is that by Kenneth Sylvan Guthrie, which ran through the early files of The Word magazine and which is used as the basis of this article.\n\nA portion of the Popol Vuh was translated into English, with extremely valuable commentaries, by James Morgan Pryse, but unfortunately his translation was never completed.\n\nThe second book of the Popol Vuh is largely devoted to the initiatory rituals of the Quiché nation.\n\nThese ceremonials are of first importance to students of Masonic symbolism and mystical philosophy, since they establish beyond doubt the existence of ancient and divinely instituted Mystery schools on the American Continent.\n\nLewis Spence, in describing the Popol Vuh , gives a number of translations of the title of the manuscript itself.\n\nPassing over the renditions, \"The Book of the Mat\" and \"The Record of the Community,\" he considers it likely that the correct title is \"The Collection of Written Leaves,\" Popol signifying the \"prepared bark\" and Vuh, \"paper\" or \"book\" from the verb uoch , to write.\n\nDr."

