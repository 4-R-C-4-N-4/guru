body = "Beside the altar, which usually was in the center of each room, was the cistern of Nile water which flowed in and out through unseen pipes.\n\nHere also were images of the gods in concatenated series, accompanied by magical inscriptions.\n\nIn these temples, by use of symbols and hieroglyphics, neophytes were instructed in the secrets of the sacerdotal caste.\n\nThe Tablet of Isis was originally a table or altar, and its emblems were part of the mysteries explained by priests.\n\nTables were dedicated to the various gods and goddesses; in this case Isis was so honored.\n\nThe substances from which the tables were made differed according to the relative dignities of the deities.\n\nThe tables consecrated to Jupiter and Apollo were of gold; those to Diana, Venus, and Juno were of silver; those to the other superior gods, of marble; those to the lesser divinities, of wood.\n\nTables were also made of metals corresponding to the planets governed by the various celestials.\n\nAs food for the body is spread on a banquet table, so on these sacred altars were spread the symbols which, when understood, feed the invisible nature of man.\n\nIn his introduction to the Table, Kircher summarizes its symbolism thus: \"It teaches, in the first place, the whole constitution of the threefold world--archetypal, intellectual, and sensible.\n\nThe Supreme Divinity is shown moving from the center to the circumference of a universe made up of both sensible and inanimate things, all of which are animated and agitated by the one supreme power which they call the Father Mind and represented by a threefold symbol.\n\nHere also are shown three triads from the Supreme One, each manifesting one attribute of the first Trimurti.\n\nThese triads are called the Foundation , or the base of all things.\n\nIn the Table is also set forth the arrangement and distribution of those divine creatures that aid the Father Mind in the control of the universe.\n\nHere [in the upper panel] are to be seen the Governors of the worlds, each with its fiery, ethereal, and material insignia.\n\nHere also [in the lower panel] are the Fathers of Fountains , whose duty it is to care for and preserve the principles of all things and sustain the inviolable laws of Nature.\n\nHere are the gods of the spheres and also those who wander from place to place, laboring with all substances and forms (Zonia and Azonia), grouped together as figures of both sexes, with their faces turned to their superior deity.\" The Mensa Isiaca , which is divided horizontally into three chambers or panels, may represent the ground plan of the chambers in which the Isiac Mysteries were given.\n\nThe center panel is divided into seven parts or lesser rooms, and the lower has two gates, one at each end.\n\nThe entire Table contains forty-five figures of first importance and a number of lesser symbols.\n\nThe forty-five main figures are grouped into fifteen triads, of which four are in the upper panel, seven in the central, and four in the lower.\n\nAccording to both Kircher and Levi, the triads are divided in the following manner: In the upper section 1.\n\nP, S, V--Mendesian Triad.\n\n2.\n\nX, Z, A--Ammonian Triad.\n\n3.\n\nB, C, D--Momphtæan Triad.\n\n4.\n\nF, G, H-Omphtæan Triad.\n\nIn the center section 1.\n\nG, I, K--Isiac Triad.\n\n2.\n\nL, M, N--Hecatine Triad.\n\n3.\n\nO, Q, R--Ibimorphous Triad.\n\n4.\n\nV, S, W--Ophionic Triad.\n\n5.\n\nX, Y, Z--Nephtæan Triad.\n\n6."

