[content]
body = "PHILOSOPHY is the science of estimating values.\n\nThe superiority of any state or substance over another is determined by philosophy.\n\nBy assigning a position of primary importance to what remains when all that is secondary has been removed, philosophy thus becomes the true index of priority or emphasis in the realm of speculative thought.\n\nThe mission of philosophy a priori is to establish the relation of manifested things to their invisible ultimate cause or nature.\n\n\"Philosophy,\" writes Sir William Hamilton, \"has been defined [as]: The science of things divine and human, and of the causes in which they are contained [Cicero]; The science of effects by their causes [Hobbes]; The science of sufficient reasons [Leibnitz]; The science of things possible, inasmuch as they are possible [Wolf]; The science of things evidently deduced from first principles [Descartes]; The science of truths, sensible and abstract [de Condillac]; The application of reason to its legitimate objects [Tennemann]; The science of the relations of all knowledge to the necessary ends of human reason [Kant];The science of the original form of the ego or mental self [Krug]; The science of sciences [Fichte]; The science of the absolute [von Schelling]; The science of the absolute indifference of the ideal and real [von Schelling]--or, The identity of identity and non-identity [Hegel].\" (See Lectures on Metaphysics and Logic .) The six headings under which the disciplines of philosophy are commonly classified are: metaphysics , which deals with such abstract subjects as cosmology, theology, and the nature of being; logic , which deals with the laws governing rational thinking, or, as it has been called, \"the doctrine of fallacies\"; ethics , which is the science of morality, individual responsibility, and character--concerned chiefly with an effort to determine the nature of good; psychology , which is devoted to investigation and classification of those forms of phenomena referable to a mental origin; epistemology , which is the science concerned primarily with the nature of knowledge itself and the question of whether it may exist in an absolute form; and æsthetics , which is the science of the nature of and the reactions awakened by the beautiful, the harmonious, the elegant, and the noble.\n\nPlato regarded philosophy as the greatest good ever imparted by Divinity to man.\n\nIn the twentieth century, however, it has become a ponderous and complicated structure of arbitrary and irreconcilable notions--yet each substantiated by almost incontestible logic.\n\nThe lofty theorems of the old Academy which Iamblichus likened to the nectar and ambrosia of the gods have been so adulterated by opinion--which Heraclitus declared to be a falling sickness of the mind--that the heavenly mead would now be quite unrecognizable to this great Neo-Platonist.\n\nConvincing evidence of the increasing superficiality of modern scientific and philosophic thought is its persistent drift towards materialism."

