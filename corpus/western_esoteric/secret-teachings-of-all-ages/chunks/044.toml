body = "The first is from Richard Payne Knight's Symbolical Language of Ancient Art and Mythology : \"Hence Varro [in De Lingua Latina ] says that Cœlum and Terra, that is universal mind and productive body, were the Great Gods of the Samothracian Mysteries; and the same as the Serapis and Isis of the later Ægyptians: the Taautos and Astarte of the Phœnicians, and the Saturn and Ops of the Latins.\" The second quotation is from Albert Pike's Morals and Dogma : \"'Thee,' says Martianus Capella, in his hymn to the Sun, 'dwellers on the Nile adore as Serapis, and Memphis worships as Osiris: in the sacred rites of Persia thou art Mithras, in Phrygia, Atys, and Libya bows down to thee as Ammon, and Phœnician Byblos as Adonis; thus the whole world adores thee under different names.'\" THE ODINIC MYSTERIES The date of the founding of the Odinic Mysteries is uncertain, some writers declaring that they were established in the first century before Christ; others, the first century after Christ.\n\nRobert Macoy, 33°, gives the following description of their origin: \"It appears from the northern chronicles that in the first century of the Christian Era, Sigge, the chief of the Aser, an Asiatic tribe, emigrated from the Caspian sea and the Caucasus into northern Europe.\n\nHe directed his course northwesterly from the Black sea to Russia, over which, according to tradition, he placed one of his sons as a ruler, as he is said to have done over the Saxons and the Franks.\n\nHe then advanced through Cimbria to Denmark, which acknowledged his fifth son Skiold as its sovereign, and passed over to Sweden, where Gylf, who did homage to the wonderful stranger, and was initiated into his mysteries, then ruled.\n\nHe soon made himself master here, built Sigtuna as the capital of his empire, and promulgated a new code of laws, and established the sacred mysteries.\n\nHe, himself, assumed the name of Odin, founded the priesthood of the twelve Drottars (Druids?) who conducted the secret worship, and the administration of justice, and, as prophets, revealed the future.\n\nThe secret rites of these mysteries celebrated the death of Balder, the beautiful and lovely, and represented the grief of Gods and men at his death, and his restoration to life.\" ( General History of Freemasonry .) After his death, the historical Odin was apotheosized, his identity being merged into that of the mythological Odin, god of wisdom, whose cult he had promulgated.\n\nOdinism then supplanted the worship of Thor, the thunderer, the supreme deity of the ancient Scandinavian pantheon.\n\nThe mound where, according to legend, King Odin was buried is still to be seen near the site of his great temple at Upsala.\n\nThe twelve Drottars who presided over the Odinic Mysteries evidently personified the twelve holy and ineffable names of Odin.\n\nThe rituals of the Odinic Mysteries were very similar to those of the Greeks, Persians, and Brahmins, after which they were patterned.\n\nThe Drottars, who symbolized the signs of the zodiac, were the custodians of the arts and sciences, which they revealed to those who passed successfully the ordeals of initiation.\n\nLike many other pagan cults, the Odinic Mysteries, as an institution, were destroyed by Christianity, but the underlying cause of their fall was the corruption of the priesthood.\n\nMythology is nearly always the ritual and the symbolism of a Mystery school."

