body = "The only hieroglyphics to be found within the Pyramid are a few builders' marks sealed up in the chambers of construction , first opened by Howard Vyse.\n\nThese apparently were painted upon the stones before they were set in position, for in a number of instances the marks were either inverted or disfigured by the operation of fitting the blocks together.\n\nWhile Egyptologists have attempted to identify the crude dabs of paint as cartouches of Cheops, it is almost inconceivable that this ambitious ruler would have permitted his royal name to suffer such indignities.\n\nAs the most eminent authorities on the subject are still uncertain as to the true meaning of these crude markings, whatever proof they might be that the building was erected during the fourth dynasty is certainly offset by the sea shells at the base of the Pyramid which Mr.\n\nGab advances as evidence that it was erected before the Deluge--a theory substantiated by the much-abused Arabian traditions.\n\nOne Arabian historian declared that the Pyramid was built by the Egyptian sages as a refuge against the Flood, while another proclaimed it to have been the treasure house of the powerful antediluvian king Sheddad Ben Ad.\n\nA panel of hieroglyphs over the entrance, which the casual observer might consider to afford a solution of the mystery, unfortunately dates back no further than A.D.\n\n1843, having been cut at that time by Dr.\n\nLepsius as a tribute to the King of Prussia.\n\nCaliph al Mamoun, an illustrious descendant of the Prophet, inspired by stories of the immense treasures sealed within its depths, journeyed from Bagdad to Cairo, A.D.\n\n820, with a great force of workmen to open the mighty Pyramid.\n\nWhen Caliph al Mamoun first reached the foot of the \"Rock of Ages\" and gazed up at its smooth glistening surface, a tumult of emotions undoubtedly racked his soul.\n\nThe casing stones must have been in place at the time of his visit, for the Caliph could find no indication of an entrance--four perfectly smooth surfaces confronted him.\n\nFollowing vague rumors, he set his followers to work on the north side of the Pyramid, with instructions to keep on cutting and chiseling until they discovered something.\n\nTo the Moslems with their crude instruments and vinegar it was a herculean effort to tunnel a full hundred feet through the limestone.\n\nMany times they were on the point of rebellion, but the word of the Caliph was law and the hope of a vast fortune buoyed them up.\n\nAt last on the eve of total discouragement fate came to their rescue.\n\nA great stone was heard to fall somewhere in the wall near the toiling and disgruntled Arabs.\n\nPushing on toward the sound with renewed enthusiasm, they finally broke into the descending passage which leads into the subterranean chamber.\n\nThey then chiseled their way around the great stone portcullis which had fallen into a position barring their progress, and attacked and removed one after another the granite plugs which for a while continued to slide down the passage leading from the Queen's Chamber above.\n\nFinally no more blocks descended and the way was clear for the followers of the Prophet.\n\nBut where were the treasures?\n\nFrom room to room the frantic workmen rushed, looking in vain for loot.\n\nThe discontent of the Moslems reached such a height that Caliph al Mamoun--who had inherited much of the wisdom of his illustrious father, the Caliph al Raschid--sent to Bagdad for funds, which he caused to be secretly buried near the entrance of the Pyramid.\n\nHe then ordered his men to dig at that spot and great was their rejoicing when the treasure was discovered, the workmen being deeply impressed by the wisdom of the antediluvian monarch who had carefully estimated their wages and thoughtfully caused the exact amount to be buried for their benefit!\n\nŒDIPUS AND THE SPHINX."

