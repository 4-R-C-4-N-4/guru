body = "was awestruck by the glory of the throne room and especially by the magnificence of the Queen's robes, which were so dazzling that he could not gaze upon them.\n\nEach guest was presented to the King by one of the virgins and after this ceremony the Virgo Lucifera made a short speech in which she recited the achievements of the honest \"artists\" and begged that each be questioned as to whether she had properly fulfilled her duty.\n\nOld Atlas then stepped forward and in the name of their Royal Majesties greeted the intrepid band of philosophers and assured Virgo Lucifera that she should receive a royal reward.\n\nThe length of the throne room was five times its width.\n\nTo the west was a great porch in which stood three thrones, the central one elevated.\n\nOn each throne sat two persons: on the first an ancient king with a young consort; on the third a black king with a veiled matron beside him; and on the central throne two young persons over whose heads hung a large and costly crown, about which hovered a little Cupid who shot his arrows first at the two lovers and then about the hall.\n\nBefore the Queen a book bound in black velvet lay on a small altar, on which were golden decorations.\n\nBeside this were a burning candle, a celestial globe, a small striking-watch, a little crystal pipe from which ran a stream of clear blood-red liquor, and a skull with a white serpent crawling in and out of the orbits.\n\nAfter their presentations, the guests retired down the winding stairs to the great hall.\n\nKEY TO THE GREAT PHILOSOPHICAL SECRET.\n\nFrom Ashmole's Theatrum Chemicum Britannicum.\n\nThis plate, which is the key to mystic Christian alchemy, is missing from almost every copy of the Theatrum Chemicum Britannicum, a work compiled by Elias Ashmole and containing about a score of pieces by English poets treating of the Philosopher's Stone and the Hermetic mysteries.\n\nIn view of the consistent manner in which the plate disappeared, it is possible that the diagram was purposely removed because it revealed too plainly the Rosicrucian arcana.\n\nWorthy of notice also is the care with which owners' names have been effaced from early books pertaining to alchemy and Hermeticism.\n\nThe original names are usually rendered illegible being covered with heavy ink lines, the procedure often seriously defacing the volume, While an occasional exception is found, in practically every instance the mutilated books either deal with Rosicrucianism or contain cryptic writings of suspected Rosicrucian origin.\n\nIt is presumed that this Practice of obliterating the owners names was to prevent the early Rosicrucians and Hermetists from being discovered through the volumes composing their libraries.\n\nElias Ashmole's plate shows the analogies between the life of Christ and the four grand divisions of the alchemical process.\n\nHerein is also revealed the teaching that the Philosopher's Stone itself is a macrocosm and a microcosm, embodying the principles of astronomy and cosmogony, both universal and human.\n\n*** Later the Virgo Lucifera announced that a comedy was to be performed for the benefit of the six royal guests in a building called the House of the Sun.\n\nC.R.C.\n\nand his companions formed part of the royal procession, which after a considerable walk arrived at the theater.\n\nThe play was in seven acts, and after its happy ending all returned through the garden and up the winding stairs to the throne room.\n\nC.R.C.\n\nnoticed the young King was very sad and that at the banquet following he often sent meat to the white serpent in the skull."

