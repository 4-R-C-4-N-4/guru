body = "In his honor, great serpents carved from stone were placed in different parts of Mexico.\n\nThe cross of Quetzalcoatl became a sacred symbol among the Mayas, and according to available records the Maya Indian angels had crosses of various pigments painted on their foreheads.\n\nSimilar crosses were placed over the eyes of those initiated into their Mysteries.\n\nWhen Cortez arrived in Mexico, he brought with him the cross.\n\nRecognizing this, the natives believed that he was Quetzalcoatl returned, for the latter had promised to come back in the infinite future and redeem his people.\n\nIn Anacalypsis , Godfrey Higgins throws some light on the cross and its symbolism in America: \"The Incas had a cross of very fine marble, or beautiful jasper, highly polished, of one piece, three-fourths of an ell in length, and three fingers in width and thickness.\n\nIt was kept in a sacred chamber of a palace, and held in great veneration.\n\nThe Spaniards enriched this cross with gold and jewels, and placed it in the cathedral of Cuzco.\n\nMexican temples are in the form of a cross, and face the four cardinal points.\n\nQuexalcoatl is represented in the paintings of the Codex Borgianus nailed to the cross.\n\nSometimes even the two thieves are there crucified with him.\n\nIn Vol.\n\nII.\n\nplate 75, the God is crucified in the Heavens, in a circle of nineteen figures, the number of the Metonic cycle.\n\nA serpent is depriving him of the organs of generation.\n\nIn the Codex Borgianus, (pp.\n\n4, 72, 73, 75,) the Mexican God is represented crucified and nailed to the cross, and in another place hanging to it, with a cross in his hands.\n\nAnd in one instance, where the figure is not merely outlined, the cross is red, the clothes are coloured, and the face and hands quite black.\n\nIf this was the Christianity of the German Nestorius, how came he to teach that the crucified Savior was black?\n\nThe name of the God who was crucified was Quexalcoatl.\n\nThe crucifixion of the Word in space, the crucifixion of the dove often seen in religious symbolism--both of these are reminders of pagan overshadowing.\n\nThe fact that a cross is formed by the spread wings of a bird in relation to its body is no doubt one of the reasons why the Egyptians used a bird to symbolize the immortal nature of man, and often show it hovering over the mummified body of the dead and carrying in one of its claws the sign of life and in the other the sign of breath.\n\nTHE NAILS OF THE PASSION The three nails of the Passion have found their way into the symbolism of many races and faiths.\n\nThere are many legends concerning these nails.\n\nOne of these is to the effect that originally there were four nails, but one was dematerialized by a Hebrew Qabbalist and magician just as they were about to drive it through the foot of the Master.\n\nHence it was necessary to cross the feet.\n\nAnother legend relates that one of the nails was hammered into a crown and that it still exists as the imperial diadem of a European house.\n\nStill another story has it that the bit on the bridle of Constantine's horse was a Passion nail.\n\nIt is improbable, however, that the nails were made of iron, for at that time it was customary to use sharpened wooden pegs.\n\nHargrave Jennings, in his Rosicrucians, Their Rites and Mysteries , calls attention to the fact that the mark or sign used in England to designate royal property and called the broad arrow is nothing more nor less than the three nails of the crucifixion grouped together, and that by placing them point to point the ancient symbol of the Egyptian TAU cross is formed."

