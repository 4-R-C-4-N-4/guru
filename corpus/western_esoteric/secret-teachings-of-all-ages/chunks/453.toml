body = "And he left behind him the manner of using exorcisms, by which they drive away demons, so that they never return; and this method of cure is of great force unto this day.\" The mediæval alchemists were convinced that King Solomon understood the secret processes of Hermes by means of which it was possible to multiply metals.\n\nDr.\n\nBacstrom writes that the Universal Spirit (CHiram) assisted King Solomon to build his temple, because Solomon being wise in the wisdom of alchemy knew how to control this incorporeal essence and, setting it to work for him, caused the invisible universe to supply him with vast amounts of gold and silver which most people believed were mined by natural methods.\n\nThe mysteries of the Islamic faith are now in the keeping of the dervishes--men who, renouncing worldliness, have withstood the test of a thousand and one days of temptation.\n\nJelal-ud-din, the great Persian Sufic poet and philosopher, is accredited with having founded the Order of Mevlevi, or the \"dancing dervishes,\" whose movements exoterically signify the motions of the celestial bodies and esoterically result in the establishment of a rhythm which stimulates the centers of spiritual consciousness within the dancer's body.\n\n\"According to the mystical canon, there are always on earth a certain number of holy men who are admitted to intimate communion with the Deity.\n\nThe one who occupies the highest position among his contemporaries is called the 'Axis' (Qūtb) or 'Pole' of his time.\n\n* * * Subordinate to the Qūtb are two holy beings who bear the title of 'The Faithful Ones,' and are assigned places on his right and left respectively.\n\nBelow these is a quartette of 'Intermediate Ones' (Evtād); and on successively lower planes ate five 'Lights' (Envār), and seven 'Very Good' (Akhyār).\n\nThe next rank is filled by forty 'Absent Ones' (Rijal-i-ghaib), also termed 'Martyrs' (Shuheda).\n\nWhen an 'Axis' quits this earthly existence, he is succeeded by the 'Faithful One' who has occupied the place at his right hand.\n\n* * * For to these holy men, who also bear the collective titles of 'Lords of Souls,' and 'Directors,' is committed a spiritual supremacy over mankind far exceeding the temporal authority of earthly rulers.\" (See Mysticism and Magic in Turkey , by L.\n\nM.\n\nJ.\n\nGarnett.) The Axis is a mysterious individual who, unknown and unsuspected, mingles with mankind and who, according to tradition, has his favorite seat upon the roof of the Caaba.\n\nJ.\n\nP.\n\nBrown, in The Dervishes , gives a description of these \"Master Souls.\" FREEMASONRY'S PRICELESS HERITAGE The sanctum sanctorum of Freemasonry is ornamented with the gnostic jewels of a thousand ages; its rituals ring with the divinely inspired words of seers and sages.\n\nA hundred religious have brought their gifts of wisdom to its altar; arts and sciences unnumbered have contributed to its symbolism.\n\nFreemasonry is a world-wide university, teaching the liberal arts and sciences of the soul to all who will hearken to its words.\n\nIts chairs are seats of learning and its pillars uphold an arch of universal education.\n\nIts trestleboards are inscribed with the eternal verities of all ages and upon those who comprehend its sacred depths has dawned the realization that within the Freemasonic Mysteries lie hidden the long-lost arcana sought by all peoples since the genesis of human reason.\n\nThe philosophic power of Freemasonry lies in its symbols--its priceless heritage from the Mystery schools of antiquity."

