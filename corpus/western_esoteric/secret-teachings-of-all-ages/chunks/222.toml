body = "In Scandinavian mythology the Fenris Wolf was one of the sons of Loki, the infernal god of the fires.\n\nWith the temple of Asgard in flames about them, the gods under the command of Odin fought their last great battle against the chaotic forces of evil.\n\nWith frothing jowls the Fenris Wolf devoured Odin, the Father of the Gods, and thus destroyed the Odinic universe.\n\nHere the Fenris Wolf represents those mindless powers of Nature that overthrew the primitive creation.\n\nThe unicorn, or monoceros, was a most curious creation of the ancient initiates.\n\nIt is described by Thomas Boreman as \"a beast, which though doubted of by many writers, yet is by others thus described: He has but one horn, and that an exceedingly rich one, growing out of the middle of his forehead.\n\nHis head resembles an hart's, his feet an elephant's, his tail a boar's, and the rest of his body an horse's.\n\nThe horn is about a foot and half in length.\n\nHis voice is like the lowing of an ox.\n\nHis mane and hair are of a yellowish colour.\n\nHis horn is as hard as iron, and as rough as any file, twisted or curled, like a flaming sword; very straight, sharp, and every where black, excepting the point.\n\nGreat virtues are attributed to it, in expelling of poison and curing of several diseases.\n\nHe is not a beast of prey.\n\n\" (See Redgrove's Bygone Beliefs .) While the unicorn is mentioned several times in Scripture, no proof has yet been discovered of its existence.\n\nThere are a number of drinking horns in various museums presumably fashioned from its spike.\n\nIt is reasonably certain, however, that these drinking vessels were really made either from the tusks of some large mammal or the horn of a rhinoceros.\n\nJ.\n\nP.\n\nLundy believes that the horn of the unicorn symbolizes the hem of salvation mentioned by St.\n\nLuke which, pricking the hearts of men, turns them to a consideration of salvation through Christ.\n\nMediæval Christian mystics employed the unicorn as an emblem of Christ, and this creature must therefore signify the spiritual life in man.\n\nThe single horn of the unicorn may represent the pineal gland, or third eye, which is the spiritual cognition center in the brain.\n\nThe unicorn was adopted by the Mysteries as a symbol of the illumined spiritual nature of the initiate, the horn with which it defends itself being the flaming sword of the spiritual doctrine against, which nothing can prevail.\n\nÆNEAS AND THE HARPIES.\n\nFrom Virgil's Æneid.\n\n(Dryden's translation.) Among the mythological creatures of the Mysteries were the harpies--projections into material substance of beings existing in the invisible world of Nature.\n\nThey were described the Greeks as being composite, with the heads of maidens and the bodies of birds.\n\nThe wings of the harpies were composed of metal and their flight was, accompanied by a terrible clanging noise.\n\nDuring his wanderings, Æneas, the Trojan hero, landed on the island of the harpies, where he and his followers vainly battled with these monsters.\n\nOne of the harpies perched upon a cliff and there prophesied to Æneid that his attack upon them would bring dire calamity to the Trojans.\n\n*** In the Book of Lambspring , a rare Hermetic tract, appears an engraving showing a deer and a unicorn standing together in a wood.\n\nThe picture is accompanied by the following text: \"The Sages say truly that two animals are in this forest: One glorious, beautiful, and swift, a great and strong deer; the other an unicorn.\n\n* * * If we apply the parable of our art, we shall call the forest the body .\n\n* * * The unicorn will be the spirit at all times."

