body = "(2) Opinion follows upon sense and is superadded to sensation, and capable of truth or falsehood, (3) All opinion attested, or not contradicted by the evidence of sense, is true.\n\n(4) An opinion contradicted, or not attested by the evidence of sense, is false.\" Among the Epicureans of note were Metrodorus of Lampsacus, Zeno of Sidon, and Phædrus.\n\nEclecticism may be defined as the practice of choosing apparently irreconcilable doctrines from antagonistic schools and constructing therefrom a composite philosophic system in harmony with the convictions of the eclectic himself.\n\nEclecticism can scarcely be considered philosophically or logically sound, for as individual schools arrive at their conclusions by different methods of reasoning, so the philosophic product of fragments from these schools must necessarily be built upon the foundation of conflicting premises.\n\nEclecticism, accordingly, has been designated the layman's cult.\n\nIn the Roman Empire little thought was devoted to philosophic theory; consequently most of its thinkers were of the eclectic type.\n\nCicero is the outstanding example of early Eclecticism, for his writings are a veritable potpourri of invaluable fragments from earlier schools of thought.\n\nEclecticism appears to have had its inception at the moment when men first doubted the possibility of discovering ultimate truth.\n\nObserving all so-called knowledge to be mere opinion at best, the less studious furthermore concluded that the wiser course to pursue was to accept that which appeared to be the most reasonable of the teachings of any school or individual.\n\nFrom this practice, however, arose a pseudo-broadmindedness devoid of the element of preciseness found in true logic and philosophy.\n\nThe Neo-Pythagorean school flourished in Alexandria during the first century of the Christian Era.\n\nOnly two names stand out in connection with it--Apollonius of Tyana and Moderatus of Gades.\n\nNeo-Pythagoreanism is a link between the older pagan philosophies and Neo-Platonism.\n\nLike the former, it contained many exact elements of thought derived from Pythagoras and Plato; like the latter, it emphasized metaphysical speculation and ascetic habits.\n\nA striking similarity has been observed by several authors between Neo-Pythagoreanism and the doctrines of the Essenes.\n\nSpecial emphasis was laid upon the mystery of numbers, and it is possible that the Neo-Pythagoreans had a far wider knowledge of the true teachings of Pythagoras than is available today.\n\nEven in the first century Pythagoras was regarded more as a god than a man, and the revival of his philosophy was resorted to apparently in the hope that his name would stimulate interest in the deeper systems of learning.\n\nBut Greek philosophy had passed the zenith of its splendor; the mass of humanity was awakening to the importance of physical life and physical phenomena.\n\nThe emphasis upon earthly affairs which began to assert itself later reached maturity of expression in twentieth century materialism and commercialism, even though Neo-Platonism was to intervene and many centuries pass before this emphasis took definite form.\n\nAlthough Ammonius Saccus was long believed to be the founder of Neo-Platonism , the school had its true beginning in Plotinus (A.D.\n\n204-269?).\n\nProminent among the Neo-Platonists of Alexandria, Syria, Rome, and Athens were Porphyry, Iamblichus, Sallustius, the Emperor Julian, Plutarch, and Proclus.\n\nNeo-Platonism was the supreme effort of decadent pagandom to publish and thus preserve for posterity its secret (or unwritten) doctrine.\n\nIn its teachings ancient idealism found its most perfect expression.\n\nNeo-Platonism was concerned almost exclusively with the problems of higher metaphysics."

