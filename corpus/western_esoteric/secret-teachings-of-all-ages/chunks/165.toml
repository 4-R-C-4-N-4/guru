[content]
body = "For example: 1/2 of 28 = 14; 1/4 = 7; 1/7 = 4; 1/14 = 2; and 1/28 = 1.\n\nThe sum of these parts (14+7+4+2+1) is equal to 28.\n\nThe perfect numbers are extremely rare.\n\nThere is only one between 1 and 10, namely, 6; one between 10 and 100, namely, 28; one between 100 and 1,000, namely, 496; and one between 1,000 and 10,000, namely, 8,128.\n\nThe perfect numbers are found by the following rule: The first number of the evenly-even series of numbers (1, 2, 4, 8, 16, 32, and so forth) is added to the second number of the series, and if an incomposite number results it is multiplied by the last number of the series of evenly-even numbers whose sum produced it.\n\nThe product is the first perfect number.\n\nFor example: the first and second evenly-even numbers are 1 and 2.\n\nTheir sum is 3, an incomposite number.\n\nIf 3 be multiplied by 2, the last number of the series of evenly-even numbers used to produce it, the product is 6, the first perfect number.\n\nIf the addition of the evenly-even numbers does not result in an incomposite number, the next evenly-even number of the series must be added until an incomposite number results.\n\nThe second perfect number is found in the following manner: The sum of the evenly-even numbers 1, 2, and 4 is 7, an incomposite number.\n\nIf 7 be multiplied by 4 (the last of the series of evenly-even numbers used to produce it) the product is 28, the second perfect number.\n\nThis method of calculation may be continued to infinity.\n\nPerfect numbers when multiplied by 2 produce superabundant numbers, and when divided by 2 produce deficient numbers.\n\nThe Pythagoreans evolved their philosophy from the science of numbers.\n\nThe following quotation from Theoretic Arithmetic is an excellent example of this practice: \"Perfect numbers, therefore, are beautiful images of the virtues which are certain media between excess and defect, and are not summits, as by some of the ancients they were supposed to be.\n\nAnd evil indeed is opposed to evil, but both are opposed to one good.\n\nGood, however, is never opposed to good, but to two evils at one and the same time.\n\nThus timidity is opposed to audacity, to both [of] which the want of true courage is common; but both timidity and audacity are opposed to fortitude.\n\nCraft also is opposed to fatuity, to both [of] which the want of intellect is common; and both these are opposed to prudence.\n\nThus, too, profusion is opposed to avarice, to both [of] which illiberality is common; and both these are opposed to liberality.\n\nAnd in a similar manner in the other virtues; by all [of] which it is evident that perfect numbers have a great similitude to the virtues.\n\nBut they also resemble the virtues on another account; for they are rarely found, as being few, and they are generated in a very constant order."

