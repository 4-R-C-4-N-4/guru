body = "Theories concerning it are based (in most part) upon small ornamental tripods discovered in various temples.\n\n*** In England a curious tomb was found containing an automaton which moved when certain stones in the floor of the vault were stepped upon by an intruder.\n\nAt that time the Rosicrucian controversy was at its height, so it was decided that the tomb was that of a Rosicrucian initiate.\n\nA countryman, discovering the tomb and entering, found the interior brilliantly lighted by a lamp hanging from the ceiling.\n\nAs he walked, his weight depressed some of the floor stones.\n\nAt once a seated figure in heavy armor began to move.\n\nMechanically it rose to its feet and struck the lamp with an iron baton, completely destroying it, and thus effectually preventing the discovery of the secret substance which maintained the flame.\n\nHow long the lamp had burned is unknown, but certainly it had been for a considerable number of years.\n\nTHE DELPHIAN TRIPOD RESTORED.\n\nFrom Beaumont's Gleanings of Antiquities.\n\nAccording to Beaumont, the above is the most authentic form of the Delphian tripod extant; but as the tripod must have changed considerably during the life of the oracle, hasty conclusions are unwise.\n\nIn his description of the tripod, Beaumont divides it into four Parts: (1) a frame with three (2), a reverberating basin or bowl set in the frame; (e) a flat plate or table upon which the Pythia sat; and (4) a cone-shaped cover over the table, which completely concealed the priestess and from beneath which her voice sounded forth in weird and hollow tones, Attempts have been made to relate the Delphian tripod with the Jewish Ark of the Covenant.\n\nThe frame of three legs was likened to the Ark of the Covenant; the flat plate or table to the Mercy Seat; and the cone-shaped covering to the tent of the Tabernacle itself.\n\nThis entire conception differs widely from that popularly accepted, but discloses a valuable analogy between Jewish and Greek symbolism.\n\n*** It is related that among the tombs near Memphis and in the Brahmin temples of India lights have been found in sealed chambers and vessels, but sudden exposure to the air has extinguished them and caused their fuel to evaporate.\n\nIt is now believed that the wicks of these perpetual lamps were made of braided or woven asbestos, called by the alchemists salamander's wool , and that the fuel was one of the products of alchemical research.\n\nKircher attempted to extract oil from asbestos, being convinced that as the substance itself was indestructible by fire an oil extracted from it would supply the lamp with a fuel likewise indestructible.\n\nAfter spending two years in fruitless experimental work, he concluded that the task was impossible of accomplishment.\n\nSeveral formulæ for the making of the fuel for the lamps have been preserved.\n\nIn Isis Unveiled , H.\n\nP.\n\nBlavatsky reprints two of these formulæ from early authors--Tritenheim and Bartolomeo Korndorf.\n\nOne will suffice to give a general understanding of the process: \" Sulphur .\n\nAlum ust."

