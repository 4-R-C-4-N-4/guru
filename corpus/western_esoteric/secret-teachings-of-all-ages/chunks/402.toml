[content]
body = "It is an Herb easy to be found, but [for the fact] that men are blind discovers itself and shines after night like pearl.\n\nThe earth of these mountains is very red and soft beyond all expression.\n\nIt is full of crystalline rocks, which the philosophers call their glass and their stone: birds and fish (say they) bring it to them.\n\nOf these mountains speaks Hali the Arabian, a most excellent judicious author: 'Go, my son, to the Mountains of India, and to their quarries or caverns, and take thence our precious stones which dissolve or melt in water, when they are mingled therewith.\n\nMuch indeed might be spoken of these mountains, if it were lawful to publish their mysteries, but one thing I shall not forbear to tell you.\n\nThey are very dangerous places after night, for they are haunted with fires and other strange apparitions, (as a I am told by the Magi) by certain spirits, which dabble lasciviously with the sperm of the world and imprint their imaginations in, producing many times fantastic and monstrous generations.\n\nThe access and pilgrimage to this place, with the difficulties which attend them, are faithfully and magisterially described by the Brothers of R.C.\" (Set accompanying letter.) *** \"Now in the Name of God, take of this Dew-water as much as thou wilt, put in a clean dissolving glass, then cast a little of your forementioned powdered salt into it to be dissolved, and continue to put it in till your Dew-water will dissolve no more or till the salt lies in it four days without being dissolved, then it has enough, and unto your Dew is given its proper powder.\n\nOf this compounded water, take as much as thou wilt, I took about a pound and a half, and put it into a round vial with a short neck, fill it with out water and lute it with a good lute, a cover and stopple that fits it well, that the subtle and living spirit of the dew may not fume away, for if they should the soul of the salt will never be stirred up, nor the work ever brought to a right end.\n\nLet the lute dry very well of itself, and set it in the furnace of B.\n\nM.\n\nto putrefy.\n\nMake a slow fire and let it digest for forty days or fifty, and that the fume of the water be continually round about it, and you will see your matter grow black, which is a token of its putrefaction.\n\n\"As soon as you have taken it out, have your dry furnace ready.\n\nSet your glass with the matter into an inner globe to coagulate, give it a slow degree of fire, continue it equally for twelve or fifteen days, and your matter will begin to coagulate and to fasten round about your glass like a gray salt, which as soon as you see and before it be two days, slacken the fire that it may cool leisurely.\n\nThen have in readiness your putrefying furnace as before.\n\nSet your glass therein and give the same degree of fire as before.\n\nLet it stand twelve days, and again you will see the matter resolve and open as before, and open itself, but you must every time see that the lute and your glass is not hurt.\n\nWhen you set your glass in the putrefying furnace, take care that the neck of your glass is covered with a wooden or glass stopper that fits it exactly, that the moisture of the water may not come at it."

