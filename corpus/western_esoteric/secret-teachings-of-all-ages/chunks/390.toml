[content]
body = "It is clearly stated that \"the soul that sinneth, it shall die,\" but \"the spirit shall return unto God who gave it.\" The table of analogies, as nearly as they can be established, is as follows: The Triune Power in Four Worlds WORLD OF : 1.\n\nGod Father : Father Son : Son Mother : Holy Ghost WORLD OF : 2.\n\nMan Father : Spirit Son : Soul Mother : Body WORLD OF : 3.\n\nElements Father : Air Son : Fire Mother : Water WORLD OF : 4.\n\nChemicals Father : Mercury Son : Sulphur Mother : Salt The alternative renderings of 3 and 4 are: WORLD OF : 3.\n\nElements Father : Fire Son : Air Mother : Water WORLD OF : 4.\n\nChemicals Father : Sulphur Son : Mercury Mother : Salt Paracelsus made a different arrangement, somewhat Aristotelian, in which the three phases of the Triune God are omitted, combining only the elements of the second, third, and fourth worlds: WORLD OF : 2.\n\nMan Father : Spirit Son : Soul Mother : Body WORLD OF : 3.\n\nElements Father : Air Son : Water Mother : Earth WORLD OF : 4.\n\nChemicals Father : Sulphur Son : Mercury Mother : Salt The main point, however, is proved: the alchemical philosophers used the symbols of salt, sulphur, and mercury to represent not only chemicals but the spiritual and invisible principles of God, man, and the universe.\n\nThe three substances (salt, sulphur, and mercury) existing in four worlds, as shown in the table, sum up to the sacred number 12.\n\nAs these 12 are the foundations of the Great Work , they are called in Revelation the twelve foundation stones of the sacred city.\n\nIn line with the same idea Pythagoras asserted that the dodecahedron, or twelve-faced symmetrical geometric solid, was the foundation of the universe.\n\nMay there not be a relation also between this mysterious 3 times 4 and the four parties of three which in the legend of the third degree of Freemasonry go forth to the four angles of the cherubim, the composite creature of four parts?\n\nA TABLE OF MEDIÆVAL ALCHEMICAL SYMBOLS.\n\nFrom Valentine's The Last Will and Testament.\n\nHermetists used the curious symbols shown in this rare table to represent various chemical elements and alchemical processes.\n\nThe full meaning of these strange characters has never been revealed, the characters concealing effectually within their own forms the occult secrets regarding the spiritual nature of the metals and elements which they represent.\n\nIn their allegories the alchemists also wed human, animal, and plant emblems; sometimes weird composite figures, such as the dragon, the winged serpent, the unicorn, and the phœnix.\n\nIn almost every case they symbolized gold as a king with a crown on his head and often with a scepter in his hand.\n\nSometimes they depicted him with the ace of the solar disc surrounded by rays.\n\nSilver was personified as a woman who they called the queen.\n\nShe wore no crown but often stood upon a lunar crescent: much after the fashion of the Madonna.\n\nMercury was typified as a youth with wings, often with two heads, carrying serpents or sometimes the caduceus.\n\nLead they symbolized by an old man with a scythe in his hand; iron by a soldier dressed in armor.\n\nTo aqua fortis was given the curious name \"the ostrich's stomach,\" and to the attainment of the \"Great Work\" they assigned the symbol of the phœnix sitting upon a nest of fire.\n\nThe union of elements they symbolized by a marriage, the Process of putrefaction by a skull, antimony by a dragon."

