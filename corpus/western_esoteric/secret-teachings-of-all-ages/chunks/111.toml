body = "Thus a yellow flower generally yields a medicine that affects the constitution in a manner similar to yellow light or the musical tone mi .\n\nAn orange flower will influence in a manner similar to orange light and, being one of the so-called secondary colors, corresponds either to the tone re or to the chord of do and mi .\n\nThe ancients conceived the spirit of man to correspond with the color blue, the mind with yellow, and the body with red.\n\nHeaven is therefore blue, earth yellow, and hell--or the underworld--red.\n\nThe fiery condition of the inferno merely symbolizes the nature of the sphere or plane of force of which it is composed.\n\nIn the Greek Mysteries the irrational sphere was always considered as red, for it represented that condition in which the consciousness is enslaved by the lusts and passions of the lower nature.\n\nIn India certain of the gods--usually attributes of Vishnu--are depicted with blue skin to signify their divine and supermundane constitution.\n\nAccording to esoteric philosophy, blue is the true and sacred color of the sun.\n\nThe apparent orange-yellow shade of this orb is the result of its rays being immersed in the substances of the illusionary world.\n\nIn the original symbolism of the Christian Church, colors were of first importance and their use was regulated according to carefully prepared rules.\n\nSince the Middle Ages, however, the carelessness with which colors have been employed has resulted in the loss of their deeper emblematic meanings.\n\nIn its primary aspect, white or silver signified life, purity, innocence, joy, and light; red, the suffering and death of Christ and His saints, and also divine love, blood, and warfare or suffering; blue, the heavenly sphere and the states of godliness and contemplation; yellow or gold, glory, fruitfulness, and goodness; green, fecundity, youthfulness, and prosperity; violet, humility, deep affection, and sorrow; black, death, destruction, and humiliation.\n\nIn early church art the colors of robes and ornaments also revealed whether a saint had been martyred, as well as the character of the work that he had done to deserve canonization.\n\nIn addition to the colors of the spectrum there are a vast number of vibratory color waves, some too low and others too high to be registered by the human optical apparatus.\n\nIt is appalling to contemplate man's colossal ignorance concerning these vistas of abstract space.\n\nAs in the past man explored unknown continents, so in the future, armed with curious implements fashioned for the purpose, he will explore these little known fastnesses of light, color, sound, and consciousness.\n\nTHE SOLAR FACE.\n\nFrom Montfaucon's Antiquities.\n\nThe corona of the sun is here shown in the form of a lion's mane.\n\nThis is a subtle reminder of the fact that at one time the summer solstice took place in the sign of Leo, the Celestial Lion."

