body = "The attitude of Skepticism towards the knowable is summed up by Sextus Empiricus in the following words: \"But the chief ground of Skepticism is that to every reason there is an opposite reason equivalent, which makes us forbear to dogmatize.\" The Skeptics were strongly opposed to the Dogmatists and were agnostic in that they held the accepted theories regarding Deity to be self-contradictory and undemonstrable.\n\n\"How,\" asked the Skeptic, \"can we have indubitate knowledge of God, knowing not His substance, form or place; for, while philosophers disagree irreconcilably on these points, their conclusions cannot be considered as undoubtedly true?\" Since absolute knowledge was considered unattainable, the Skeptics declared the end of their discipline to be: \"In opinionatives, indisturbance; in impulsives, moderation; and in disquietives, suspension.\" The sect of the Stoics was founded by Zeno (340-265 B.C.), the Cittiean, who studied under Crates the Cynic, from which sect the Stoics had their origin.\n\nZeno was succeeded by Cleanthes, Chrysippus, Zeno of Tarsis, Diogenes, Antipater, Panætius, and Posidonius.\n\nMost famous of the Roman Stoics are Epictetus and Marcus Aurelius.\n\nThe Stoics were essentially pantheists, since they maintained that as there is nothing better than the world, the world is God.\n\nZeno declared that the reason of the world is diffused throughout it as seed.\n\nStoicism is a materialistic philosophy, enjoining voluntary resignation to natural law.\n\nChrysippus maintained that good and evil being contrary, both are necessary since each sustains the other.\n\nThe soul was regarded as a body distributed throughout the physical form and subject to dissolution with it.\n\nThough some of the Stoics held that wisdom prolonged the existence of the soul, actual immortality is not included in their tenets.\n\nThe soul was said to be composed of eight parts: the five senses, the generative power, the vocal power, and an eighth, or hegemonic, part.\n\nNature was defined as God mixed throughout the substance of the world.\n\nAll things were looked upon as bodies either corporeal or incorporeal.\n\nMeekness marked the attitude of the Stoic philosopher.\n\nWhile Diogenes was delivering a discourse against anger, one of his listeners spat contemptuously in his face.\n\nReceiving the insult with humility, the great Stoic was moved to retort: \"I am not angry, but am in doubt whether I ought to be so or not!\" Epicurus of Samos (341-270 B.C.) was the founder of the Epicurean sect, which in many respects resembles the Cyrenaic but is higher in its ethical standards.\n\nThe Epicureans also posited pleasure as the most desirable state, but conceived it to be a grave and dignified state achieved through renunciation of those mental and emotional inconstancies which are productive of pain and sorrow.\n\nEpicurus held that as the pains of the mind and soul are more grievous than those of the body, so the joys of the mind and soul exceed those of the body.\n\nThe Cyrenaics asserted pleasure to be dependent upon action or motion; the Epicureans claimed rest or lack of action to be equally productive of pleasure.\n\nEpicurus accepted the philosophy of Democritus concerning the nature of atoms and based his physics upon this theory.\n\nThe Epicurean philosophy may be summed up in four canons: \"(1) Sense is never deceived; and therefore every sensation and every perception of an appearance is true."

