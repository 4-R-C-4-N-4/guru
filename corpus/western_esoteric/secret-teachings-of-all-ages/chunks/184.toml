body = "Upon CHiram's refusal to reveal the Master's Word , the ruffian struck him on the throat with the rule, and the wounded Master then hastened to the west gate, where Jubelo, armed with a square, awaited him and made a similar demand.\n\nAgain CHiram was silent, and the second assassin struck him on the breast with the square.\n\nCHiram thereupon staggered to the east gate, only to be met there by Jubelum armed with a maul.\n\nWhen CHiram, refused him the Master's Word, Jubelum struck the Master between the eyes with the mallet and CHiram fell dead.\n\nA MASONIC APRON WITH SYMBOLIC FIGURES.\n\nFrom an early hand-painted Masonic apron.\n\nWhile the mystic symbolism of Freemasonry decrees that the apron shall be a simple square of white lambskin with appropriate flap, Masonic aprons are frequently decorated with curious and impressive figures.\n\n\"When silk cotton, or linen is worn,\" writes Albert Pike, \"the symbolism is lost.\n\nNor is one clothed who blots, defaces, and desecrates the white surface with ornamentation, figuring, or colors of any kind.\" (See Symbolism.) To Mars, the ancient plane of cosmic energy, the Atlantean and Chaldean \"star gazers\" assigned Aries as a diurnal throne and Scorpio as a nocturnal throne.\n\nThose not raised to spiritual life by initiation are described as \"dead from the sting of a scorpion,\" for they wander in the night side of divine power.\n\nThrough the mystery of the Paschal Lamb, or the attainment of the Golden Fleece, these soul are raised into the constructive day Power of Mars in Aries--the symbol of the Creator.\n\nWhen worn over the area related to the animal passions, the pure lambskin signifies the regeneration of the procreative forces and their consecration to the service of the Deity.\n\nThe size of the apron, exclusive of the flap, makes it the symbol of salvation, for the Mysteries declare that it must consist of 144 square inches.\n\nThe apron shown above contains a wealth of symbolism: the beehive, emblematic of the Masonic lodge itself, the trowel, the mallet, and the trestleboad; the rough and trued ashlars; the pyramids and hills of Lebanon; the pillars, the Temple, and checkerboard floor; and the blazing star and tools of the Craft.\n\nThe center of the apron is occupied by the compass and square, representative of the Macrocosm an the microcosm, and the alternately black and white serpent of astral light.\n\nBelow is an acacia branch with seven sprigs, signifying the life Centers of the superior and the inferior man.\n\nThe skull and cross bones are a continual reminder that the spiritual nature attains liberation only after the philosophical death of man's sensuous personality.\n\n*** The body of CHiram was buried by the murderers over the brow of Mount Moriah and a sprig of acacia placed upon the grave.\n\nThe murderers then sought to escape punishment for their crime by embarking for Ethiopia, but the port was closed.\n\nAll three were finally captured, and after admitting their guilt were duly executed.\n\nParties of three were then sent out by King Solomon, and one of these groups discovered the newly made grave marked by the evergreen sprig.\n\nAfter the Entered Apprentices and the Fellow-Craftsmen had failed to resurrect their Master from the dead he was finally raised by the Master Mason with the \"strong grip of a Lion's Paw.\" To the initiated Builder the name CHiram Abiff signifies \"My Father, the Universal Spirit, one in essence, three in aspect.\" Thus the murdered Master is a type of the Cosmic Martyr--the crucified Spirit of Good, the dying god --whose Mystery is celebrated throughout the world."

