[content]
body = "Then put this dissolution as before into a round Glass, fill it two thirds parts full, seal it hermetically as before, let your Sigillum be well dried.\n\nSet it in the furnace of Balneum Vapori, make a fire and let it remain forty days, as before, then will the Gold or Silver be dissolved radically and will turn of the deepest black in the world, which as soon as you see, have your other drying furnace in readiness.\" Continuing: \"Philosophers say there is no true solution of the body without a proceeding coagulation of the spirit, for they are interchangeably mixed in a due proportion, whereby the bodily essence becomes of a spiritual penetrating nature.\n\nOn the other hand, the incomprehensible spiritual essential virtue is also made corporeal by the fire, because there is made between them so near a relation or friendship, like as the heavens operate to the very Depth of Earth, and producing from thence all the treasures and riches of the whole World.\n\n\" Admirandum Naturæ Operationem in Archidoxes Cognitam .\n\n\" With this Powder --You may as follows project on metals.\n\nTake five parts of fine Gold or Silver according as you work, and melt it in a Crucible.\n\nWrap up your Medicine in Wax, cast it therein, give a strong fire for an hour, then take the Crucible out, as it were, calcined, then cast one part on ten parts of imperfect metals, be it what it will, and the same will be immediately changed into purer Metal, than what is brought out of the Mines and produced by Melting; and when you augment it in strength and virtue by resolving and coagulating, the fifth time it will resolve itself in three days and be coagulated in twenty-four hours time, to an incredible and most highly pellucid Stone or Red Shining burning Coal.\n\nFor the white work it will become like a white stream of Lightning.\n\n\"Of this last coagulation take one part, cast it upon five thousand of melted Gold or Silver as before.\n\nIt changes the same into perfect Medicine, one part whereof will tinge one hundred thousand parts of melted imperfect Metals into the very finest Gold or Silver.\n\nSo far I have brought and further I would not come, for as I would set in the matter [to distill] six times in twelve hours, it subtilized so highly that the most part (like somewhat most wonderful to behold) past through the Glass causing an inexpressible odoriferous Smell.\n\nTake heed that it happens not to you.\n\n\"Many more wonders of this holy Art might be added, namely how to prepare therewith all sorts of precious Stones, and other most admirable things, but it would require too great a book to express the whole as it ought to be, especially as the Art is endless and not to be apprehended with one view, and my purpose has been, Loving Cousin and Son, devoutly to lead thee into the Mysteries of Nature and this holy Science, and I have faithfully performed it.\" In conclusion, the letter states: \"Go thou to work as I have done before thee, fear God, Love thy neighbour from the bottom of thy Soul sincerely.\n\nSo will in the Manual operation, everything to thee, and when thou art at work therein many of our brethren will reveal themselves to thee, of our holy order, privately; For I have on my part by the Eternal God wrote the truth which I found out by prayer and searching into Nature, which work I have seen with my eyes, and with my hands extracted.\n\nTherefore also I have subscribed this Testament with my own blood, the last day of my Life on my deathbed.\n\nActum Leyden, 27 March 1662.\""

