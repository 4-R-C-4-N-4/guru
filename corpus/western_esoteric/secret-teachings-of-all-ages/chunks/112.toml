body = "IT is difficult for this age to estimate correctly the profound effect produced upon the religions, philosophies, and sciences of antiquity by the study of the planets, luminaries, and constellations.\n\nNot without adequate reason were the Magi of Persia called the Star Gazers.\n\nThe Egyptians were honored with a special appellation because of their proficiency in computing the power and motion of the heavenly bodies and their effect upon the destinies of nations and individuals.\n\nRuins of primitive astronomical observatories have been discovered in all parts of the world, although in many cases modern archæologists are unaware of the true purpose for which these structures were erected.\n\nWhile the telescope was unknown to ancient astronomers, they made many remarkable calculations with instruments cut from blocks of granite or pounded from sheets of brass and cop per.\n\nIn India such instruments are still in use, and they posses a high degree of accuracy.\n\nIn Jaipur, Rajputana, India, an observatory consisting largely of immense stone sundials is still in operation.\n\nThe famous Chinese observatory on the wall of Peking consists of immense bronze instruments, including a telescope in the form of a hollow tube without lenses.\n\nThe pagans looked upon the stars as living things, capable of influencing the destinies of individuals, nations, and races.\n\nThat the early Jewish patriarchs believed that the celestial bodies participated in the affairs of men is evident to any student of Biblical literature, as, for example, in the Book of Judges: \"They fought from heaven, even the stars in their courses fought against Sisera.\" The Chaldeans, Phœnicians, Egyptians, Persians, Hindus, and Chinese all had zodiacs that were much alike in general character, and different authorities have credited each of these nations with being the cradle of astrology and astronomy.\n\nThe Central and North American Indians also had an understanding of the zodiac, but the patterns and numbers of the signs differed in many details from those of the Eastern Hemisphere.\n\nThe word zodiac is derived from the Greek ζωδιακός ( zodiakos ), which means \"a circle of animals,\" or, as some believe, \"little animals.\" It is the name given by the old pagan astronomers to a band of fixed stars about sixteen degrees wide, apparently encircling the earth.\n\nRobert Hewitt Brown, 32°, states that the Greek word zodiakos comes from zo-on , meaning \"an animal.\" He adds: \"This latter word is compounded directly from the primitive Egyptian radicals, zo , life, and on , a being.\" The Greeks, and later other peoples influenced by their culture, divided the band of the zodiac into twelve sections, each being sixteen degrees in width and thirty degrees in length.\n\nThese divisions were called the Houses of the Zodiac.\n\nThe sun during its annual pilgrimage passed through each of these in turn, Imaginary creatures were traced in the Star groups bounded by these rectangles; and because most of them were animal--or part animal--in form, they later became known as the Constellations, or Signs, of the Zodiac.\n\nThere is a popular theory concerning the origin of the zodiacal creatures to the effect that they were products of the imagination of shepherds, who, watching their flocks at night, occupied their minds by tracing the forms of animals and birds in the heavens.\n\nThis theory is untenable, unless the \"shepherds\" be regarded as the shepherd priests of antiquity.\n\nIt is unlikely that the zodiacal signs were derived from the star groups which they now represent.\n\nIt is far more probable that the creatures assigned to the twelve houses are symbolic of the qualities and intensity of the sun's power while it occupies different parts of the zodiacal belt."

