[content]
body = "THE oldest, the most profound, the most universal of all symbols is the human body.\n\nThe Greeks, Persians, Egyptians, and Hindus considered a philosophical analysis of man's triune nature to be an indispensable part of ethical and religious training.\n\nThe Mysteries of every nation taught that the laws, elements, and powers of the universe were epitomized in the human constitution; that everything which existed outside of man had its analogue within man.\n\nThe universe, being immeasurable in its immensity and inconceivable in its profundity, was beyond mortal estimation.\n\nEven the gods themselves could comprehend but a part of the inaccessible glory which was their source.\n\nWhen temporarily permeated with divine enthusiasm, man may transcend for a brief moment the limitations of his own personality and behold in part that celestial effulgence in which all creation is bathed.\n\nBut even in his periods of greatest illumination man is incapable of imprinting upon the substance of his rational soul a perfect image of the multiform expression of celestial activity.\n\nRecognizing the futility of attempting to cope intellectually with that which transcends the comprehension of the rational faculties, the early philosophers turned their attention from the inconceivable Divinity to man himself, with in the narrow confines of whose nature they found manifested all the mysteries of the external spheres.\n\nAs the natural outgrowth of this practice there was fabricated a secret theological system in which God was considered as the Grand Man and, conversely, man as the little god.\n\nContinuing this analogy, the universe was regarded as a man and, conversely, man as a miniature universe.\n\nThe greater universe was termed the Macrocosm --the Great World or Body--and the Divine Life or spiritual entity controlling its functions was called the Macroprosophus .\n\nMan's body, or the individual human universe, was termed the Microcosm , and the Divine Life or spiritual entity controlling its functions was called the Microprosophus .\n\nThe pagan Mysteries were primarily concerned with instructing neophytes in the true relationship existing between the Macrocosm and the Microcosm --in other words, between God and man.\n\nAccordingly, the key to these analogies between the organs and functions of the Microcosmic man and those of the Macrocosmic Man constituted the most prized possession of the early initiates.\n\nIn Isis Unveiled , H.\n\nP.\n\nBlavatsky summarizes the pagan concept of man as follows: \"Man is a little world--a microcosm inside the great universe.\n\nLike a fetus, he is suspended, by all his three spirits, in the matrix of the macrocosmos; and while his terrestrial body is in constant sympathy with its parent earth, his astral soul lives in unison with the sidereal anima mundi .\n\nHe is in it, as it is in him, for the world-pervading element fills all space, and is space itself, only shoreless and infinite.\n\nAs to his third spirit, the divine, what is it but an infinitesimal ray, one of the countless radiations proceeding directly from the Highest Cause--the Spiritual Light of the World?\n\nThis is the trinity of organic and inorganic nature--the spiritual and the physical, which are three in one, and of which Proclus says that 'The first monad is the Eternal God; the second, eternity; the third, the paradigm, or pattern of the universe;' the three constituting the Intelligible Triad.\" Long before the introduction of idolatry into religion, the early priests caused the statue of a man to be placed in the sanctuary of the temple.\n\nThis human figure symbolized the Divine Power in all its intricate manifestations.\n\nThus the priests of antiquity accepted man as their textbook, and through the study of him learned to understand the greater and more abstruse mysteries of the celestial scheme of which they were a part."

