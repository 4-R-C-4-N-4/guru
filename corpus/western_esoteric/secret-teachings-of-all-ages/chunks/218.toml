body = "This is the mystery of initiation to which Christ referred when he said, \"Except a man be born again, he cannot see the kingdom of God\" (John iii.\n\n3).\n\nThe phœnix is a fitting symbol of this spiritual truth.\n\nEuropean mysticism was not dead at the time the United States of America was founded.\n\nThe hand of the Mysteries controlled in the establishment of the new government, for the signature of the Mysteries may still be seen on the Great Seal of the United States of America.\n\nCareful analysis of the seal discloses a mass of occult and Masonic symbols, chief among them the so-called American eagle--a bird which Benjamin Franklin declared unworthy to be chosen as the emblem of a great, powerful, and progressive people.\n\nHere again only the student of symbolism can see through the subterfuge and realize that the American eagle upon the Great Seal is but a conventionalized phœnix, a fact plainly discernible from an examination of the original seal.\n\nIn his sketch of The History of the Seal of the United States , Gaillard Hunt unwittingly brings forward much material to substantiate the belief that the original seal carried the Phœnix bird on its obverse surface and the Great Pyramid of Gizeh upon its reverse surface.\n\nIn a colored sketch submitted as a design for the Great Seal by William Barton in 1782, an actual phœnix appears sitting upon a nest of flames.\n\nThis itself demonstrates a tendency towards the use of this emblematic bird.\n\nPHŒNIX OR EAGLE, WHICH?\n\nOn the left is the bird's head from the first Great Seal of the United States (1782) and on the right the Great Seal of 1902.\n\nWhen the first great Seal was actually cut, the bird represented upon it was very different from the eagle which now appears; the neck was much longer and the tuft of feathers, at the upper back part of the head was quite noticeable; the beak bore little resemblance to that of the eagle; and the entire bird was much thinner and its wings shorter.\n\nIt requires very little imagination to trace in this first so-called eagle the mythological Phœnix of antiquity.\n\nWhat is more, there is every reason why a phœnix bird should be used to represent a new country rising out of an old, while as Benjamin Franklin caustically noted, the eagle was not a bird of good moral character!\n\n*** AN EGYPTIAN PHŒNIX.\n\nFrom Wilkinson's Manners and Customs of the Ancient Egyptians.\n\nThe Egyptians occasionally represented the Phœnix as having the body of a man and the wings of a bird.\n\nThis biform, creature had a tuft of feathers upon its head and its arms were upraised in an attitude of prayer.\n\nAs the phœnix was the symbol of regeneration, the tuft of feathers on the back of its head might well symbolize the activity of the Pineal gland, or third eye, the occult function of which was apparently well understood by the ancient priestcraft.\n\n*** If any one doubts the presence of Masonic and occult influences at the time the Great Seal was designed, he should give due consideration to the comments of Professor Charles Eliot Norton of Harvard, who wrote concerning the unfinished pyramid and the All-Seeing Eye which adorned the reverse of the seal, as follows: \"The device adopted by Congress is practically incapable of effective treatment; it can hardly (however artistically treated by the designer) look otherwise than as a dull emblem of a Masonic fraternity.\" (The History of the Seal of the United States .) THE OBVERSE AND REVERSE OF THE GREAT SEAL OF THE UNITED STATES OF AMERICA.\n\nFrom Hunt's History of the Seal of the United States.\n\nThe significance of the mystical number 13, which frequently appears upon the Great Seal of the United States, is not limited to the number of the original colonies."

