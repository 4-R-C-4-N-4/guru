body = "Some Church Fathers went so far as to declare that Hermes exhibited many symptoms of intelligence, and that if he had only been born in a more enlightened age so that he might have benefited by their instructions he would have been a really great man!\n\nHERMES MERCURIUS TRISMEGISTUS.\n\nFrom Historia Deorum Fatidicorum.\n\nMaster of all arts and sciences.\n\nperfect in all crafts, Ruler of the Three Worlds, Scribe of the Gods, and Keeper of the Books of Life, Thoth Hermes Trismegistus--the Three Times Greatest, the \"First Intelligencer\"--was regarded by the ancient Egyptians as the embodiment of the Universal Mind.\n\nWhile in all probability there actually existed a great sage and educator by the name of Hermes, it is impossible to extricate the historical man from the mass of legendary accounts which attempt to identify him with the Cosmic Principle of Thought.\n\n*** In his Stromata , Clement of Alexandria, one of the few chroniclers of pagan lore whose writings have been preserved to this age, gives practically all the information that is known concerning the original forty-two books of Hermes and the importance with which these books were regarded by both the temporal and spiritual powers of Egypt.\n\nClement describes one of their ceremonial processions as follows: \"For the Egyptians pursue a philosophy of their own.\n\nThis is principally shown by their sacred ceremonial.\n\nFor first advances the Singer, bearing some one of the symbols of music.\n\nFor they say that he must learn two of the books of Hermes, the one of which contains the hymns of the gods, the second the regulations for the king's life.\n\nAnd after the Singer advances the Astrologer, with a horologe in his hand, and a palm, the symbols of astrology.\n\nHe must have the astrological books of Hermes, which are four in number, always in his mouth.\n\nOf these, one is about the order of the fixed stars that are visible, and another about the conjunctions and luminous appearances of the sun and moon; and the rest respecting their risings.\n\nNext in order advances the sacred Scribe, with wings on his head, and in his hand a book and rule, in which were writing ink and the reed, with which they write.\n\nAnd he must be acquainted with what are called hieroglyphics, and know about cosmography and geography, the position of the sun and moon, and about the five planets; also the description of Egypt, and the chart of the Nile; and the description of the equipment of the priests and of the place consecrated to them, and about the measures and the things in use in the sacred rites.\n\nThen the Stole-keeper follows those previously mentioned, with the cubit of justice and the cup for libations.\n\nHe is acquainted with all points called Pædeutic (relating to training) and Moschophaltic (sacrificial).\n\nThere are also ten books which relate to the honour paid by them to their gods, and containing the Egyptian worship; as that relating to sacrifices, first-fruits, hymns, prayers, processions, festivals, and the like.\n\nAnd behind all walks the Prophet, with the water-vase carried openly in his arms; who is followed by those who carry the issue of loaves.\n\nHe, as being the governor of the temple, learns the ten books called 'Hieratic'; and they contain all about the laws, and the gods, and the whole of the training of the priests.\n\nFor the Prophet is, among the Egyptians, also over the distribution of the revenues."

