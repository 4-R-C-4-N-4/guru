body = "Laurentius Pignorius reproduced the Tablet in connection with a descriptive essay in 1605, but his timidly advanced explanations demonstrated his ignorance concerning the actual interpretation of the figures.\n\nTHE BEMBINE TABLE OF ISIS.\n\nConcerning the theurgic or magic sense in which the Egyptian priests exhibited in the Bembine Table of Isis the philosophy of sacrifice, rites, and ceremonies by a system of occult symbols, Athanasius Kircher writes: \"The early priests believed that a great spiritual power was invoked by correct and unabridged sacrificial ceremonies.\n\nIf one feature were lacking, the whole was vitiated, says Iamblichus.\n\nHence they were most careful in all details, for they considered it absolutely essential for the entire chain of logical connections to be exactly according to ritual.\n\nCertainly for no other reason did they prepare and prescribe for future use the manuals, as it were, for conducting the rites.\n\nThey learned, too, what the first hieromancers--possessed, as it were, by a divine fury--devised as a system of symbolism for exhibiting their mysteries.\n\nThese they placed in this Tablet of Isis, before the eyes of those admitted to the sanctum sanctorum in order to teach the nature of the Gods and the prescribed forms of sacrifice.\n\nSince each of the orders of Gods had its own peculiar symbols, gestures, costumes, and ornaments, they thought it necessary to observe these in the whole apparatus of worship, as nothing was more efficacious in drawing the benign attention of the deities and genii.\n\n* * * Thus their temples, remote from the usual haunts of men, contained representations of nearly every form in nature.\n\nFirst, in the pavement, they symbolized the physical economy of the world, using minerals, stones and other things suitable for ornaments, including little streams of water.\n\nThe walls showed the starry world, and the done the world of genii.\n\nIn the center was the altar, to suggest the emanations of the Supreme Mind from its center.\n\nThus the entire interior constituted a picture of the Universe of Worlds.\n\nThe priests in making sacrifices wore raiment adorned with figures similar to those attributed to the Gods.\n\nTheir bodies were partially bare like those of the deities, and they themselves were divested of all material cares and practices the strictest chastity.\n\n* * * Their heads were veiled to indicate their charge of earthly things.\n\nTheir heads and bodies were shaved, for they regarded hair as a useless excrescence.\n\nUpon the head they bore the same insignia as those attributed to the Gods.\n\nThus arrayed, they regarded themselves to be transformed into that intelligence with which they constantly desired to be identified.\n\nFor example, in order to call down to the world the soul and spirit of the Universe, they stood before the image shown in the center of our Tablet, wearing the same symbols as that figure and its attendants, and offered sacrifices.\n\nBy these and the accompanying singing of hymns they believed that they infallibly drew the God's attention to their prayer.\n\nAnd so they did in regard to other regions of the Tablet, believing of necessity the proper ritual properly carried out would evoke the deity desired.\n\nThat this was the origin of the science of oracles is apparent.\n\nAs a touched chord produces a harmony of sound, likewise the adjoining chords respond though not touched.\n\nSimilarly the idea they expressed by their concurrent acts while adoring the God came into accord with basic Idea and, by an intellectual union, it was returned to them deiformed, and they thus obtained the Idea of Ideas.\n\nHence there sprang up in their souls, they thought, the gift of prophecy and divination, and they believed they could foretell future events, impending evils, etc."

