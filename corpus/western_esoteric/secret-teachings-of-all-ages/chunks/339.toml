[content]
body = "Mystics have taught that man's physical body is surrounded by a series of invisible bodies of diverse colors and great splendor.\n\nIn the majority of people the spiritual nature is concealed and imprisoned in the material nature, but in a few this internal constitution has been objectified and the spiritual nature is outside, so that it surrounds man's personality with a great radiance.\n\nSilver, used as the capitals for the pillars, has its reference to the moon, which was sacred to the Jews and the Egyptians alike.\n\nThe priests held secret ritualistic ceremonies at the time of the new and the full moon, both of which periods were sacred to Jehovah.\n\nSilver, so the ancients taught, was gold with its sun-ray turned inward instead of objectified.\n\nWhile gold symbolized the spiritual soul, silver represented the purified and regenerated human nature of man.\n\nThe brass used in the outer altars was a composite substance consisting of an alloy of precious and base metals.\n\nThus, it represented the constitution of the average individual, who is a combination of both the higher and the lower elements.\n\nThe three divisions of the Tabernacle should have a special interest to Freemasons, for they represent the three degrees of the Blue Lodge, while the three orders of priests who served the Tabernacle are preserved to modern Masonry as the Entered Apprentice, the Fellow Craftsman, and the Master Mason.\n\nThe Hawaiian Islanders built a Tabernacle not unlike that of the Jews, except that their rooms were one above another and not one behind another, as in the case of the Tabernacle of the Israelites.\n\nThe three rooms are also the three important chambers of the Great Pyramid of Gizeh.\n\nTHE ROBES OF GLORY As explained in the quotation from Josephus, the robes and adornments of the Jewish priests had a secret significance, and even to this day there is a religious cipher language concealed in the colors, forms, and uses of sacred garments, not only among the Christian and Jewish priests but also among pagan religions.\n\nThe vestments of the Tabernacle priests were called Cahanææ ; those of the High Priest were termed Cahanææ Rabbæ .\n\nOver the Machanese , an undergarment resembling short trousers, they wore the Chethone , a finely woven linen robe, which reached to the ground and had long sleeves tied to the arms of the wearer.\n\nA brightly embroidered sash, twisted several times around the waist (a little higher than is customary), with one end pendent in front, and a closely fitting linen cap, designated Masnaemphthes , completed the costume of the ordinary priest.\n\nTHE GARMENTS OF GLORY.\n\nFrom Mosaize Historie der Hebreeuwse Kerke.\n\nTh.\n\nrobe of the High Priest of Israel were often called \"The Garments of Glory\", for they resembled the regenerated and spiritualized nature of man, symbolized by a vestment which all must weave from the threads of character and virtue before they can become High Priests after the Order of Melchizedek.\n\n*** The vestments of the High Priest were the same as those of the lesser degrees, except that certain garments and adornments were added.\n\nOver the specially woven white linen robe the High Priest wore a seamless and sleeveless habit, sky-blue in color and reaching nearly to his feet.\n\nThis was called the Meeir and was ornamented with a fringe of alternated golden bells and pomegranates."

