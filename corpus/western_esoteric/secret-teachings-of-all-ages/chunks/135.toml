body = "As Plato was for thirteen years under the instruction of the Magi Patheneith, Ochoaps, Sechtnouphis, and Etymon of Sebbennithis, his philosophy consequently is permeated with the Chaldean and Egyptian system of triads.\n\nThe Bembine Table is a diagrammatic exposition of the so-called Platonic philosophy, for in its design is epitomized the entire theory of mystic cosmogony and generation.\n\nThe most valuable guide to the interpretation of this Table is the Commentaries of Proclus on the Theology of Plato .\n\nThe Chaldean Oracles of Zoroaster also contains many allusions to the theogonic principles which are demonstrated by the Table.\n\nThe Theogony of Hesiod contains the most complete account of the Greek cosmogony myth.\n\nOrphic cosmogony has left its impress upon the various forms of philosophy and religion--Greek, Egyptian, and Syrian--which it contacted.\n\nChief of the Orphic symbols was the mundane egg from which Phanes sprang into light.\n\nThomas Taylor considers the Orphic egg to be synonymous with the mixture from bound and infinity mentioned by Plato in the Philebus .\n\nThe egg is furthermore the third Intelligible Triad and the proper symbol of the Demiurgus, whose auric body is the egg of the inferior universe.\n\nEusebius, on the authority of Porphyry, declared that the Egyptians acknowledged one intellectual Author or Creator of the world under the name of Cneph and that they worshiped him in a statue of human form and dark blue complexion, holding in his hand a girdle and a scepter, wearing on his head a royal plume, and thrusting forth an egg out of his mouth.\n\n(See An Analysis of the Egyptian Mythology ) While the Bembine Table is rectangular-shaped, it signifies philosophically the Orphic egg of the universe with its contents.\n\nIn the esoteric doctrines the supreme individual achievement is the breaking of the Orphic egg, which is equivalent to the return of the spirit to the Nirvana--the absolute condition--of the Oriental mystics.\n\nThe New Pantheon by Samuel Boyse contains three plates showing various sections of the Bembine Table.\n\nThe author, however, makes no important contribution to the knowledge of the subject.\n\nIn The Mythology and Fables of the Ancients Explained from History , the Abbé Banier devotes a chapter to a consideration of the Mensa Isiaca .\n\nAfter reviewing the conclusions of Montfaucon, Kircher, and Pignorius, he adds: \"I am of the opinion that: it was a votive table, which some prince or private person had consecrated to Isis, as an acknowledgment for some benefit which he believed she had conferred upon him.\""

