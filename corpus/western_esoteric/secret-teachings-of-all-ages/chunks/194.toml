body = "At regular intervals along this arm he attached four cords, all of like composition, size, and weight.\n\nTo the first of these he attached a twelve-pound weight, to the second a nine-pound weight, to the third an eight-pound weight, and to the fourth a six-pound weight.\n\nThese different weights corresponded to the sizes of the braziers' hammers.\n\nPythagoras thereupon discovered that the first and fourth strings when sounded together produced the harmonic interval of the octave, for doubling the weight had the same effect as halving the string.\n\nThe tension of the first string being twice that of the fourth string, their ratio was said to be 2:1, or duple.\n\nBy similar experimentation he ascertained that the first and third string produced the harmony of the diapente, or the interval of the fifth.\n\nThe tension of the first string being half again as much as that of the third string, their ratio was said to be 3:2, or sesquialter.\n\nLikewise the second and fourth strings, having the same ratio as the first and third strings, yielded a diapente harmony.\n\nContinuing his investigation, Pythagoras discovered that the first and second strings produced the harmony of the diatessaron, or the interval of the third; and the tension of the first string being a third greater than that of the second string, their ratio was said to be 4:3, or sesquitercian.\n\nThe third and fourth strings, having the same ratio as the first and second strings, produced another harmony of the diatessaron.\n\nAccording to Iamblichus, the second and third strings had the ratio of 8:9, or epogdoan.\n\nThe key to harmonic ratios is hidden in the famous Pythagorean tetractys, or pyramid of dots.\n\nThe tetractys is made up of the first four numbers--1, 2, 3, and 4--which in their proportions reveal the intervals of the octave, the diapente, and the diatessaron.\n\nWhile the law of harmonic intervals as set forth above is true, it has been subsequently proved that hammers striking metal in the manner described will not produce the various tones ascribed to them.\n\nIn all probability, therefore, Pythagoras actually worked out his theory of harmony from the monochord--a contrivance consisting of a single string stretched between two pegs and supplied with movable frets.\n\nTo Pythagoras music was one of the dependencies of the divine science of mathematics, and its harmonies were inflexibly controlled by mathematical proportions.\n\nThe Pythagoreans averred that mathematics demonstrated the exact method by which the good established and maintained its universe.\n\nNumber therefore preceded harmony, since it was the immutable law that governs all harmonic proportions.\n\nAfter discovering these harmonic ratios, Pythagoras gradually initiated his disciples into this, the supreme arcanum of his Mysteries.\n\nHe divided the multitudinous parts of creation into a vast number of planes or spheres, to each of which he assigned a tone, a harmonic interval, a number, a name, a color, and a form.\n\nHe then proceeded to prove the accuracy of his deductions by demonstrating them upon the different planes of intelligence and substance ranging from the most abstract logical premise to the most concrete geometrical solid.\n\nFrom the common agreement of these diversified methods of proof he established the indisputable existence of certain natural laws.\n\nTHE INTERVALS AND HARMONIES OF THE SPHERES.\n\nFrom Stanley's The History of Philosophy.\n\nIn the Pythagorean concept of the music of the spheres, the interval between the earth and the sphere of the fixed stars was considered to be a diapason--the most perfect harmonic interval."

