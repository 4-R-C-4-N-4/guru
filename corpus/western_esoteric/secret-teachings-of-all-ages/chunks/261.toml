[content]
body = "Some inhabit waterfalls, where they can be seen in the spray; others are indigenous to swiftly moving rivers; some have their habitat in dripping, oozing fens or marshes; while other groups dwell in clear mountain lakes.\n\nAccording to the philosophers of antiquity, every fountain had its nymph; every ocean wave its oceanid.\n\nThe water spirits were known under such names as oreades, nereides, limoniades, naiades, water sprites, sea maids, mermaids, and potamides.\n\nOften the water nymphs derived their names from the streams, lakes, or seas in which they dwelt.\n\nIn describing them, the ancients agreed on certain salient features.\n\nIn general, nearly all the undines closely resembled human beings in appearance and size, though the ones inhabiting small streams and fountains were of correspondingly lesser proportions.\n\nIt was believed that these water spirits were occasionally capable of assuming the appearance of normal human beings and actually associating with men and women.\n\nThere are many legends about these spirits and their adoption by the families of fishermen, but in nearly every case the undines heard the call of the waters and returned to the realm of Neptune, the King of the Sea.\n\nPractically nothing is known concerning the male undines.\n\nThe water spirits did not establish homes in the same way that the gnomes did, but lived in coral caves under the ocean or among the reeds growing on the banks of rivers or the shores of lakes.\n\nAmong the Celts there is a legend to the effect that Ireland was peopled, before the coming of its present inhabitants, by a strange race of semi-divine creatures; with the coming of the modem Celts they retired into the marshes and fens, where they remain even to this day.\n\nDiminutive undines lived under lily pads and in little houses of moss sprayed by waterfalls.\n\nThe undines worked with the vital essences and liquids in plants, animals, and human beings, and were present in everything containing water.\n\nWhen seen, the undines generally resembled the goddesses of Greek statuary.\n\nThey rose from the water draped in mist and could not exist very long apart from it.\n\nThere are many families of undines, each with its peculiar limitations, it is impossible to consider them here in detail.\n\nTheir ruler, Necksa , they love and honor, and serve untiringly.\n\nTheir temperament is said to be vital, and to them has been given as their throne the western corner of creation.\n\nThey are rather emotional beings, friendly to human life and fond of serving mankind.\n\nThey are sometimes pictured riding on dolphins or other great fish and seem to have a special love of flowers and plants, which they serve almost as devotedly and intelligently as the gnomes.\n\nAncient poets have said that the songs of the undines were heard in the West Wind and that their lives were consecrated to the beautifying of the material earth.\n\nTHE SALAMANDERS The third group of elementals is the salamanders, or spirits of fire, who live in that attenuated, spiritual ether which is the invisible fire element of Nature.\n\nWithout them material fire cannot exist; a match cannot be struck nor will flint and steel give off their spark without the assistance of a salamander, who immediately appears (so the medieval mystics believed), evoked by friction.\n\nMan is unable to communicate successfully with the salamanders, owing to the fiery element in which they dwell, for everything is resolved to ashes that comes into their presence.\n\nBy specially prepared compounds of herbs and perfumes the philosophers of the ancient world manufactured many kinds of incense.\n\nWhen incense was burned, the vapors which arose were especially suitable as a medium for the expression of these elementals, who, by borrowing the ethereal effluvium from the incense smoke, were able to make their presence felt."

