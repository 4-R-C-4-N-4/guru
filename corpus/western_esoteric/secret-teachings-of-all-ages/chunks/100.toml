body = "*** It is reasonably certain, however, that Pythagoras, who had been initiated in the Egyptian temples, when he promulgated the doctrine of metempsychosis, restated, in part at least, the teachings of the Egyptian initiates.\n\nThe popular supposition that the Egyptians mummified their dead in order to preserve the form for a physical resurrection is untenable in the light of modern knowledge regarding their philosophy of death.\n\nIn the fourth book of On Abstinence from Animal Food , Porphyry describes an Egyptian custom of purifying the dead by removing the contents of the abdominal cavity, which they placed in a separate chest.\n\nHe then reproduces the following oration which had been translated out of the Egyptian tongue by Euphantus: \"O sovereign Sun, and all ye Gods who impart life to men, receive me, and deliver me to the eternal Gods as a cohabitant.\n\nFor I have always piously worshipped those divinities which were pointed out to me by my parents as long as I lived in this age, and have likewise always honored those who procreated my body.\n\nAnd, with respect to other men, I have never slain any one, nor defrauded any one of what he deposited with me, nor have I committed any other atrocious deed.\n\nIf, therefore, during my life I have acted erroneously, by eating or drinking things which it is unlawful to cat or drink, I have not erred through myself, but through these\" (pointing to the chest which contained the viscera).\n\nThe removal of the organs identified as the seat of the appetites was considered equivalent to the purification of the body from their evil influences.\n\nSo literally did the early Christians interpret their Scriptures that they preserved the bodies of their dead by pickling them in salt water, so that on the day of resurrection the spirit of the dead might reenter a complete and perfectly preserved body.\n\nBelieving that the incisions necessary to the embalming process and the removal of the internal organs would prevent the return of the spirit to its body, the Christians buried their dead without resorting to the more elaborate mummification methods employed by the Egyptian morticians.\n\nIn his work on Egyptian Magic , S.S.D.D.\n\nhazards the following speculation concerning the esoteric purposes behind the practice of mummification.\n\n\"There is every reason to suppose,\" he says, \"that only those who had received some grade of initiation were mummified; for it is certain that, in the eyes of the Egyptians, mummification effectually prevented reincarnation.\n\nReincarnation was necessary to imperfect souls, to those who had failed to pass the tests of initiation; but for those who had the Will and the capacity to enter the Secret Adytum, there was seldom necessity for that liberation of the soul which is said to be effected by the destruction of the body.\n\nThe body of the Initiate was therefore preserved after death as a species of Talisman or material basis for the manifestation of the Soul upon earth.\" During the period of its inception mummification was limited to the Pharaoh and such other persons of royal rank as presumably partook of the attributes of the great Osiris, the divine, mummified King of the Egyptian Underworld."

