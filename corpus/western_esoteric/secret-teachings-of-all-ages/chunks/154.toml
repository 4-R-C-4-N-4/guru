body = "This fifth element, or ether, was called by the Hindus akasa .\n\nIt was closely correlated with the hypothetical ether of modern science, and was the interpenetrative substance permeating all of the other elements and acting as a common solvent and common denominator of them.\n\nThe twelve-faced solid also subtly referred to the Twelve Immortals who surfaced the universe, and also to the twelve convolutions of the human brain--the vehicles of those Immortals in the nature of man.\n\nWhile Pythagoras, in accordance with others of his day, practiced divination (possibly arithmomancy), there is no accurate information concerning the methods which he used.\n\nHe is believed to have had a remarkable wheel by means of which he could predict future events, and to have learned hydromancy from the Egyptians.\n\nHe believed that brass had oracular powers, because even when everything was perfectly still there was always a rumbling sound in brass bowls.\n\nHe once addressed a prayer to the spirit of a river and out of the water arose a voice, \"Pythagoras, I greet thee.\" It is claimed for him that he was able to cause dæmons to enter into water and disturb its surface, and by means of the agitations certain things were predicted.\n\nAfter having drunk from a certain spring one day, one of the Masters of Pythagoras announced that the spirit of the water had just predicted that a great earthquake would occur the next day--a prophecy which was fulfilled.\n\nIt is highly probable that Pythagoras possessed hypnotic power, not only over man but also over animals.\n\nHe caused a bird to change the course of its flight, a bear to cease its ravages upon a community, and a bull to change its diet, by the exercise of mental influence.\n\nHe was also gifted with second sight, being able to see things at a distance and accurately describe incidents that had not yet come to pass.\n\nTHE SYMBOLIC APHORISMS OF PYTHAGORAS Iamblichus gathered thirty-nine of the symbolic sayings of Pythagoras and interpreted them.\n\nThese have been translated from the Greek by Thomas Taylor.\n\nAphorismic statement was one of the favorite methods of instruction used in the Pythagorean university of Crotona.\n\nTen of the most representative of these aphorisms are reproduced below with a brief elucidation of their concealed meanings.\n\nI.\n\nDeclining from the public ways, walk in unfrequented paths .\n\nBy this it is to be understood that those who desire wisdom must seek it in solitude.\n\nNUMBER RELATED TO FORM.\n\nPythagoras taught that the dot symbolized the power of the number 1, the line the power of the number 2, the surface the power of the number 3, and the solid the power of the number 4.\n\n*** II.\n\nGovern your tongue before all other things, following the gods .\n\nThis aphorism warns man that his words, instead of representing him, misrepresent him, and that when in doubt as to what he should say, he should always be silent.\n\nIII.\n\nThe wind blowing, adore the sound .\n\nPythagoras here reminds his disciples that the fiat of God is heard in the voice of the elements, and that all things in Nature manifest through harmony, rhythm, order, or procedure the attributes of the Deity.\n\nIV.\n\nAssist a man in raising a burden; but do not assist him in laying it down .\n\nThe student is instructed to aid the diligent but never to assist those who seek to evade their responsibilities, for it is a great sin to encourage indolence.\n\nV.\n\nSpeak not about Pythagoric concerns without light .\n\nThe world is herein warned that it should not attempt to interpret the mysteries of God and the secrets of the sciences without spiritual and intellectual illumination.\n\nVI.\n\nHaving departed from your house, turn not back, for the furies will be your attendants ."

