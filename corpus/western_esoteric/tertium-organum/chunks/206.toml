[content]
body = "V It remains to say a few words upon the psychological origin of what is called in this book Cosmic Consciousness.\n\nAlthough in the birth of Cosmic Consciousness the moral nature plays an important part, it will be better for many reasons to confine our attention at present to the evolution of the intellect.\n\nIn this evolution there are four distinct steps.\n\nThe first of them was taken when upon the primary quality of excitability sensation was established.\n\nAt this point began the acquisition and more or less perfect registration of sense impressions—that is, of percepts.\n\nA percept is of course a sense impression.\n\nIf we could go back far enough we should find among our ancestors a creature whose whole intellect was made up simply of these percepts.\n\nBut this creature had in it what may be called an eligibility of growth, and what happened with it was something like this: Individually and from generation to generation it accumulated these percepts, the constant repetition of which, calling for further and further registration, led, in the struggle for existence and under the law of natural selection, to an accumulation of cells in the central sense ganglia; at last a condition was reached in which it became possible for our ancestor to combine groups of these percepts into what we today call a recept.\n\nThis process is very similar to that of composite photography.\n\nSimilar percepts (as of a tree) are registered one over the other until they are generalized into the percept of a tree.\n\nNow the work of accumulation begins again on a higher plane: the sensory organs keep steadily at work manufacturing percepts; the receptual centers keep steadily at work manufacturing more and yet more recepts from the old and the new percepts; the capacity of the central ganglia is constantly taxed to do necessary registration of percepts, the necessary elaboration of these into recepts; then as the ganglia by use and selection are p.\n\n317 improved they constantly manufacture from percepts and from the initial simple recepts, more and more complex, that is, higher and higher recepts.\n\nAt last, after many thousands of generations have lived and died, comes a time when the mind has reached the highest possible point of purely receptual intelligence; the accumulation of percepts and of recepts has gone on until no greater stores of impressions can be laid up and no further elaboration of these can be accomplished on the plane of receptual intelligence.\n\nThen another break is made and the higher recepts are replaced by concepts.\n\nThe relation of a concept to a recept is somewhat similar to the relation of algebra to arithmetic.\n\nA recept is a composite image of hundreds, perhaps thousands of percepts; it is itself an image abstracted from many images; but a concept is that same composite image—that same recept—named, ticketed, and, as it were, dismissed.\n\nA concept is in fact neither more nor less than a named recept —the name that is, the sign (as in algebra), standing henceforth for the thing itself, that is, for the recept.\n\nNow it is clear as day to any one who will give the least thought to the subject, that the revolution by which concepts are substituted for recepts increases the efficiency of the brain for thought as much as the introduction of machinery increases the capacity of the race for work—as much as the use of algebra increases the power of the mind in mathematical calculations.\n\nTo replace a great cumbersome recept by a simple sign was almost like re-placing actual goods—as wheat, fabrics and hardware—by entries in the ledger.\n\nBut, as hinted above, in order that a recept may be replaced by a concept it must be named, or, in other words, marked with a sign which stands for it—just as a check stands for a piece of goods; in other words, the race that is in possession of concepts is also, and necessarily, in possession of language."

