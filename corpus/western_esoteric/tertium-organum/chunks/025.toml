body = "A man easily admits his incompetency in music, dancing, or higher mathematics, but he always maintains the privilege of having an opinion and being a judge of questions relating to \"first principles.\" It is difficult to discuss with such men.\n\nFor how will you answer a man who looks at you in perplexity, knocks on the table with his fingers and says, \" This is matter .\n\nI know it; feel!\n\nHow can it be an abstract conception?\" To answer this is as difficult as to answer the man who says: \"I see that the sun rises and sets!\" ______ Returning to the consideration of space, we shall under no circumstances introduce unknown quantities in the definition of it.\n\nWe shall define it only in terms of those two data which we decided to accept at the very beginning.\n\nThe world and consciousness are the facts which we decided to recognize as existing.\n\nBy the world we mean the combination of all the causes of our sensations in general.\n\nBy the material world we mean the combination of causes of a definite series of sensations : those of sight, hearing, touch, smell, taste, sensations of weight, and so on.\n\nSpace is either a property of the world or a property of our knowledge of the world.\n\nThree-dimensional space is either a property of the material world or a property of our receptivity of the material world.\n\nOur inquiry is confined to the problem: how shall we approach the study of space?\n\nFootnotes 25:1 Italics by P.\n\nD.\n\nOuspensky.\n\nTransl .\n\n31:1 \"The Secret Doctrine,\" The Theosophical Publishing Society.\n\nThird Edition, p.\n\n271, vol.\n\nI.\n\n32:1 This is irony which the English speaking may easily fail to understand.\n\nSome unscrupulous monks of the monastery of Athos, famous throughout Greece and Russia, made a practice, it is said, of selling \"Egyptian darkness\" in little vials, thus making capital out of the credulity and piety of the illiterate Russian pilgrims who were wont to visit this monastery in great numbers.\n\nTransl ."

