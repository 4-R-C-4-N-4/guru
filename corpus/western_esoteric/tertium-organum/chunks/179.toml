[content]
body = "Now we have established that illogicality (from our standpoint) is the necessary condition of the knowledge of truth or of the real world.\n\nThis does not mean that everything that is illogical is true and real, but it means absolutely, that everything true and real is illogical from our standpoint.\n\nWe have established the fact that it is impossible to approach the truth with our logic, and we have also established the possibility of penetrating into these heretofore inaccessible regions by means of the new canon of thought .\n\nThe consciousness of the necessity for such an instrument of thought undoubtedly existed from far back.\n\nFor what, in substance, does the formula Tat twam asi represent if not THE FUNDAMENTAL AXIOM OF HIGHER LOGIC?\n\nThou art That means: thou art both thou and not thou , and corresponds to the super-logical formula, A is both A and Not-A .\n\nIf we examine ancient writings from this standpoint, then we shall understand that their authors were searching for a new logic , and were not satisfied with the logic of the things of the phenomenal world.\n\nThe seeming illogicality of ancient philosophical systems, p.\n\n279 which portrayed an ideal world, as it were, instead of an existing one, will then become comprehensible, for in these portrayals of an ideal world, systems of higher logic often lie concealed.\n\n______ One of such misunderstood attempts to construe a system of higher logic, to give a precise instrument of thought, penetrating beyond the limits of the visible world, is the treatise by Plotinus On Intelligible Beauty .\n\nDescribing HEAVEN and THE GODS, Plotinus says: All the gods are venerable and beautiful, and their beauty is immense.\n\nWhat else however is it but intellect through which they are such?\n\nAnd because intellect energizes in them in so great a degree as to render them visible (by its light)?\n\nFor it is not because their bodies are beautiful.\n\nFor these gods that have bodies do not through this derive their subsistence as gods; but these also are gods through intellect.\n\nFor they are not at one time wise, and at another destitute of wisdom; but they are always wise, in an impassive, stable and pure intellect.\n\nThey likewise know all things, not human concerns (precedaneously) but their own, which are divine, and such as intellect sees.\n\n.\n\n.\n\n.\n\nFor all things there are heaven, and there the earth is heaven, as also are the sea, animals, plants, and men.\n\nThe gods likewise that it contains do not think men undeserving of their regard, nor anything else that is there (because everything there is divine).\n\nAnd they occupy and pervade without ceasing the whole of that (blissful) region.\n\nFor the life which is there is unattended with labor, and truth (as Plato says in the \"Phædrus\") is their generator, and nutriment, their essence and nurse.\n\nThey likewise see all things, not those with which generation, but those with which essence is present.\n\nAnd they perceive themselves in others.\n\nFor all things there are diaphanous; and nothing is dark and resisting, but everything is apparent to everyone internally and throughout.\n\nFor light everywhere meets with light; since everything contains all things in itself and again sees all things in another.\n\nSo that all things are everywhere , and all is all.\n\nEach thing likewise is everything .\n\nAnd the splendor there is infinite.\n\nFor everything there is great, since even that which is small is great.\n\nThe sun too which is there is all the stars; and again each star is the sun and all the stars.\n\n.\n\n.\n\nIn each however, a different property predominates, but at the same time all things are visible in each .\n\nMotion likewise there is pure; for the motion is not confounded by a mover different from it."

