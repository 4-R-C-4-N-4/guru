body = "Phenomena and noumena of a two-dimensional being.\n\nHow could a plane being comprehend the third dimension?\n\n59 CHAPTER VII The impossibility of the mathematical definition of dimensions.\n\nWhy does not mathematics sense dimensions?\n\nThe entire conditionality of the representation of dimensions by powers.\n\nThe possibility of representing all powers on a line.\n\nKant and Lobachevsky.\n\nThe difference between non-Euclidian geometry and metageometry.\n\nWhere shall we find the explanation of the three-dimensionality of the world, if Kant's ideas are true?\n\nAre not the conditions of the three-dimensionality of the world confined to our receptive apparatus, to our psyche?\n\n73 CHAPTER VIII Our receptive apparatus.\n\nSensation.\n\nPerception.\n\nConception.\n\nIntuition.\n\nArt as the language of the future.\n\nTo what extent does the three-dimensionality of the world depend upon the properties of our receptive apparatus?\n\nWhat might prove this interdependence?\n\nWhere may we find the real affirmation of this interdependence?\n\nThe animal psyche.\n\nIn what does it differ from the human?\n\nReflex action.\n\nThe irritability of the cell.\n\nInstinct.\n\nPleasure-pain.\n\nEmotional thinking.\n\nThe absence of concepts.\n\nLanguage of animals.\n\nLogic of animals.\n\nDifferent degrees of psychic development in animals.\n\nThe goose, the cat, the dog and the monkey.\n\n80 CHAPTER IX The receptivity of the world by a man and by an animal.\n\nIllusions of the animal and its lack of control of the receptive faculties.\n\nThe world of moving planes.\n\nAngles and curves considered as motion.\n\nThe third dimension as motion.\n\nThe animal's two-dimensional view of our three-dimensional world.\n\nThe animal as a real two-dimensional being.\n\nLower animals as one-dimensional beings.\n\nThe time and space of a snail.\n\nThe time-sense as an imperfect space-sense.\n\nThe time and space of a dog.\n\nThe change in the world coincident with a change in the psychic apparatus.\n\nThe proof of Kant's problem.\n\nThe three-dimensional world—an illusionary perception.\n\n98 p.\n\nix CHAPTER X The spatial understanding of time.\n\nThe angles and curves of the fourth dimension in our life.\n\nDoes motion exist in the world or not?\n\nMechanical motion and \"life.\" Biological phenomena as the manifestation of motions going on in the higher dimension.\n\nEvolution of the space-sense.\n\nThe growth of the space-sense and the diminution of the time-sense.\n\nThe transformation of the time-sense into the space-sense.\n\nThe difficulties of our language and of our concepts.\n\nThe necessity for seeking a method of spatial expression for temporal concepts.\n\nScience in relation to the fourth dimension.\n\nThe solid of four dimensions.\n\nThe four-dimensional sphere.\n\n112 CHAPTER XI Science and the problem of the fourth dimension.\n\nThe address of Prof.\n\nN.\n\nA.\n\nOumoff before the Mendeleevskian Convention in 1911—\"The Characteristic Traits and Problems of Contemporary Scientific Thought.\" The new physics.\n\nThe electromagnetic theory.\n\nThe principle of relativity.\n\nThe works of Einstein and Minkowsky.\n\nSimultaneous existence of the past and the future.\n\nThe Eternal Now.\n\nVan Manen's book about occult experiences.\n\nThe drawing of a four-dimensional figure.\n\n124 CHAPTER XII Analysis of phenomena.\n\nWhat defines different orders of phenomena for us?\n\nMethods and forms of the transition of one order of phenomena into another.\n\nPhenomena of motion.\n\nPhenomena of life.\n\nPhenomena of consciousness.\n\nThe central question of our knowledge of the world: what mode of phenomena is generic and produces the others?\n\nCan the origin of everything lie in motion?\n\nThe laws of transformation of energy.\n\nSimple transformation and liberation of latent energy.\n\nDifferent liberating forces of different orders of phenomena.\n\nThe force of mechanical energy, the force of a living cell, the force of an idea.\n\nPhenomena and noumena of our world 136 CHAPTER XIII The apparent and hidden side of life."

