body = "p.\n\n98 CHAPTER IX The receptivity of the world by a man and by an animal.\n\nIllusions of the animal and its lack of control of the receptive faculties.\n\nThe world of moving planes.\n\nAngles and curves considered as motion.\n\nThe third dimension as motion.\n\nThe animal's two-dimensional view of our three-dimensional world.\n\nThe animal as a real two-dimensional being.\n\nLower animals as one-dimensional beings.\n\nThe time and space of a snail.\n\nThe time-sense as an imperfect space-sense.\n\nThe time and space of a dog.\n\nThe change in the world coincident with a change in the psychic apparatus.\n\nThe proof of Kant's problem.\n\nThe three-dimensional world—an illusionary perception.\n\nWE have established the enormous difference existing between the psychology of a man and of an animal.\n\nThis difference undoubtedly profoundly affects the receptivity of the outer world by the animal.\n\nBut how and in what?\n\nThis is exactly what we do not know, and what we shall try to discover.\n\nTo this end we shall return to our receptivity of the world, investigate in detail the nature of that receptivity, and then imagine how the animal, with its more limited psychic equipment, receives its impression of the world.\n\nLet us note first of all that we receive the most incorrect impressions of the world as regards its outer form and aspect.\n\nWe know that the world consists of solids, but we see and touch only surfaces .\n\nWe never see and touch a solid .\n\nThe solid—this is indeed a concept , composed of a series of perceptions, the result of reasoning and experience.\n\nFor immediate sensation, surfaces alone exist.\n\nSensations of gravity, mass, volume, which we mentally associate with the \"solid,\" are in reality associated with the sensations of surfaces.\n\nWe only know that the sensation comes from the solid, but the solid itself we never sense.\n\nPerhaps it would be possible to call the complex sensation of surfaces: weight, mass, density, resistance, \"the sensation of a solid,\" but rather do we combine mentally all these sensations into one, and call that composite sensation a solid.\n\nWe sense directly only surfaces; the weight and resistance of the solid, as such, we never separately sense.\n\np.\n\n99 But we know that the world does not consist of surfaces: we know that we see the world incorrectly, and that we never see it as it is , not alone in the philosophical meaning of the expression, but in the most simple geometrical meaning.\n\nWe have never seen a cube, a sphere , etc., but only their surfaces.\n\nKnowing this, we mentally correct that which we see.\n\nBehind the surfaces we think the solid.\n\nBut we can never even represent the solid to ourselves.\n\nWe cannot imagine the cube or the sphere seen, not in perspective, but simultaneously from all sides.\n\nIt is clear that the world does not exist in perspective; nevertheless we cannot see it otherwise.\n\nWe see everything only in perspective; that is, in the very act of receptivity the world is distorted in our eye, and we know that it is distorted.\n\nWe know that it is not such as it appears, and mentally we are continuously correcting that which the eye sees, substituting the real content for those symbols of things which sight reveals.\n\nOur sight is a complex faculty.\n\nIt consists of visual sensations plus the memory of sensations of touch.\n\nThe child tries to feel with its finger-tips everything that it sees—the nose of its nurse, the moon, the reflection of sun rays from the mirror on the wall.\n\nOnly gradually does it learn to discern the near and the distant by means of sight alone .\n\nBut we know that even in mature age we are easily subject to optical illusions.\n\nWe see distant objects as flat, even more incorrectly, because relief is after all a symbol revealing a certain property of objects.\n\nA man at a long distance is pictured to us in silhouette."

