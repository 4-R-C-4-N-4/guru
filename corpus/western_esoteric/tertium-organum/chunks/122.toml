[content]
body = "In our language only an eternally becoming universe exists.\n\nThe \"Eternal Now\" cannot be expressed in language.\n\nThus our language pictures to us beforehand a false universe— dual , when in reality it is one ; and eternally becoming when it is in reality eternally being .\n\nAnd if we come to realize the degree to which our language falsifies the real view of the world, then the understanding of this fact will enable us to see that it is not only difficult, but even absolutely impossible to express in language the correct relation of the things of the real world.\n\np.\n\n190 This difficulty can be conquered only by the formation of new concepts and by extended analogies.\n\nLater on the principles and methods of this expansion of what we already have, and what we can extract from our stores of knowledge will be made clear.\n\nFor the present it is only import-ant to establish one thing—THE NECESSITY FOR UNIFORMITY: the monism of the universe.\n\nAs a matter of principle it is not important which one we regard as first cause , spirit or matter.\n\nIt is essential to recognize their unity.\n\n______ — But what then is matter ?\n\nFrom one point of view, it is a logical concept , i.e., a form of thinking .\n\nNobody ever saw matter , nor will he ever—it is possible only to think matter.\n\nFrom another point of view it is an illusion accepted for reality.\n\nEven more truly, it is the incorrectly perceived form of that which exists in reality.\n\nMatter is a section of something; a non-existent, imaginary section.\n\nBut that of which matter is a section, exists.\n\nThis is the real, four-dimensional world.\n\nWood, the substance from which this table (for example) is made, exists; but the true nature of its existence we do not know.\n\nAll that we know about it is just the form of our receptivity of it.\n\nAnd if we should cease to exist, it would continue to exist, but only for a receptivity acting similarly to ours.\n\nBut in itself this substance exists in some other way—HOW, we do not know .\n\nCertainly not in space and time, for we ourselves impose these forms upon it.\n\nProbably all similar wood , of different centuries, and different parts of the world, constitutes one mass—one body—perhaps one being .\n\nCertainly that substance (or that part of it) of which this table is made, has no separate existence apart from our receptivity .\n\nWe fail to understand that a particular thing is merely an artificial definition by our senses, of some indefinable cause infinitely surpassing that thing .\n\nBut a thing may acquire its own individual and unique soul; and in that case the thing exists quite independently of our receptivity.\n\np.\n\n191 [paragraph continues] Many things possess such souls, especially old things —old houses, old books, works of art, etc.\n\n______ But what ground have we for thinking that there is psychic life in the world other than our human one, that of animals and of plants?\n\nFirst of all, of course, the thought that everything in the world is alive and animated and that manifestations of life and animatedness would naturally exist on all planes and in all forms.\n\nBut we can discern the psychic life only in forms analogous to ours.\n\nThe question stands in this way: how could we know about the existence of the psychic life of other sections of the world if they exist?\n\nBy two methods: through COMMUNICATION, EXCHANGE OF THOUGHTS, and through CONCLUSIONS BY ANALOGY.\n\nFor the first, it is necessary that our psyche should become similar to theirs, should transcend the limits of the three-dimensional world, i.e., it is necessary to change the form of receptivity and perception.\n\nThe second may result as a consequence of the gradual expansion of the faculty of drawing inferences by analogy."

