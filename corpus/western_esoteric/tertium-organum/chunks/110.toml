[content]
body = "Now if a merely negligible percentage of energy goes into the creation of the future by begetting, then the remainder must go into the creation of the future also, but in another way.\n\nWe have in the physical world many cases in which the direct function is effected by a very small percentage of the consumed energy, and the greater part is spent without return, as it were.\n\nBut of course this greater part of energy does not disappear, is not wasted, but accomplishes other results quite different from the direct function.\n\nTake the example of a common candle.\n\nIt gives light, but it also gives considerably more heat than light.\n\nLight is the direct function of a candle, heat the indirect, but we get more heat than light.\n\nA candle is a furnace adapted to the purpose of lighting.\n\nIn order to give light a candle must burn.\n\nCombustion is a necessary condition for the receiving of light from a candle; it is impossible to ignore this combustion; but the same combustion gives heat.\n\nAt first thought it appears that the heat from a candle is spent unproductively; sometimes it is superfluous, unpleasant, annoying; if a room is lighted by candles it will soon grow excessively hot.\n\nBut the fact remains that light is received from a candle only because of combustion —by the development of heat and the incandescence of volatilized gases.\n\np.\n\n170 The same thing is true in the case of love.\n\nWe may say that a merely negligible part of love's energy goes into posterity ; the greater part is spent by the fathers and mothers on their personal emotions as it were.\n\nBut this also is necessary.\n\nWithout this expenditure the principal thing could not be achieved.\n\nOnly because of these at first sight collateral results of love, only because of all this tempest of emotions, feelings, effervescences, desires, thoughts, dreams, fantasies, inner creations; only because of the beauty which it creates, can love fulfil its immediate function.\n\nMoreover—and this perhaps is the most important—the superfluous energy is not wasted at all, but is transformed into other forms of energy, possible to discover.\n\nGenerally speaking, the significance of the indirect results may very often be of more importance than the significance of direct ones.\n\nAnd since we are able to trace how the energy of love transforms itself into instincts, ideas, creative forces on different planes of life; into symbols of art, song, music, poetry; so can we easily imagine how the same energy may transform itself into a higher order of intuition, into a higher consciousness which will reveal to us a marvelous and mysterious world.\n\nIn all living nature (and perhaps also in that which we consider as dead) love is the motive force which drives the creative activity in the most diverse directions.\n\nIn springtime with the first awakening of love's emotions the birds begin to sing , and build nests .\n\nOf course a positivist would strive to explain all this very simply: singing acts as an attraction between the females and the males, and so forth.\n\nBut even a positivist will not be in a position to deny that there is a good deal more of this singing than is necessary for \"the continuation of the species.\" For a positivist, indeed, \"singing\" is merely \"an accident,\" a \"by-product.\" But in reality it may be that this singing is the principal function of a given species , the realization of its existence, the purpose pursued by nature in creating this species; and that this singing is necessary , not so much to attract the females, as for some general harmony of nature which we only rarely and imperfectly sense.\n\nThus in this case we observe that what appears to be a collateral p.\n\n171 function of love, from the standpoint of the individual, may serve as a principal function of the species.\n\nFurthermore, there are no fledglings as yet: there is even no intimation of them, but \"homes\" are prepared for them nevertheless."

