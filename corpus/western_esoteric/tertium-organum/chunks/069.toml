[content]
body = "For the animal it will be one phenomenon , just as for us all similar, simultaneous phenomena proceeding from a single point will be one phenomenon.\n\nTherefore the animal will see the world as a surface, and will measure this surface in two directions only.\n\nBut how is it possible to explain the fact that the animal, inhabiting a two-dimensional world, or rather, perceiving itself as in a two-dimensional world, is perfectly oriented in our three-dimensional world?\n\nHow explain the fact that the bird flies up and down, sideways and straight ahead—in all three directions; that the horse jumps over ditches and barriers; that the dog and cat appear to, understand the properties of depth and height simultaneously with those of length and breadth?\n\nIn order to explain these things it is necessary to return to the fundamental principles of animal psychology.\n\nIt has been previously shown that many properties of objects remembered by us as general properties of genus, class, species, are remembered by animals as individual properties of objects.\n\nTo orientate in this enormous reserve of individual properties preserved in the memory, animals are assisted by the emotional tone which is linked up in them with each perception and each remembered sensation.\n\nFor example, an animal knows two roads as two entirely separate phenomena having nothing in common; that is, one road consists of a series of definite perceptions colored by definite emotional tones; the other phenomenon—the other road—consists of another series of definite perceptions colored with other tones.\n\nWe say that this, that, and the other are roads.\n\nOne leads to one place, a second to another.\n\nFor an animal the two roads have nothing in p.\n\n104 common .\n\nBut it remembers in their proper sequence all the emotional tones which are linked with the first road and with the second one, and it therefore remembers both roads with their turns, ditches, fences, etc.\n\nThus the remembering of definite properties of observed objects helps the animal to find itself in the world of phenomena.\n\nBut as a rule before new phenomena an animal is much more helpless than a man.\n\nAn animal sees two dimensions; the third dimension it senses constantly, but does not see.\n\nIt senses the third dimension as something transient , just as we sense time .\n\nThe surfaces which an animal sees possess for it many strange properties; first of all, numerous and various motions .\n\nAs has been said already, all those illusory motions which seem to us real, but which we know to be illusory, are entirely real to the animal: the turning about of the houses as we ride past, the growth of a tree out of some corner, the passing of the moon between clouds, etc., etc.\n\nBut in addition to all this, many motions must exist for the animal of which we have no suspicion.\n\nThe fact is that innumerable objects quite immobile for us—properly all objects —must seem to the animal to be in motion ; AND THE THIRD DIMENSION OF SOLIDS WILL APPEAR TO IT IN THESE MOTIONS; i.e., THE THIRD DIMENSION OF SOLIDS WILL APPEAR TO IT AS A MOTION.\n\n______ Let us try to imagine how the animal perceives the objects of the outer world.\n\nSuppose it is confronted with a large disc, and simultaneously with a large sphere of the same diameter .\n\nStanding directly opposite them at a certain distance, the animal will see two circles.\n\nBeginning to walk around them, it will observe that the sphere remains a circle, while the disc gradually narrows, transforming itself into a narrow strip.\n\nOn moving farther around, the strip begins to expand and gradually transforms itself into a circle.\n\nThe sphere will not change during this circumambulation.\n\nBut when the animal approaches toward it certain strange phenomena ensue.\n\np.\n\n105 Let us try to understand how the animal will perceive the surface of the sphere as contrasted with the surface of the disc.\n\nOne thing is sure: it will perceive the spherical surface differently from us ."

