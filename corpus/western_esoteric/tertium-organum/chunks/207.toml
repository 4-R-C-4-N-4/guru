[content]
body = "Further, it should be noted, as the possession of concepts implies the possession of language, so the possession of concepts and language (which are in reality two aspects of the same thing) implies the possession of self-consciousness.\n\nAll this means that there is a moment in the evolution of mind when the receptual intellect, capable of simple consciousness only, becomes almost or quite instantaneously a conceptual intellect in possession of language and self-consciousness.\n\nOur intellect, then, today is made up of a very complex mixture of percepts, recepts and concepts.\n\nThe next chapter in the story is the accumulation of concepts.\n\nThis is a double process, each individual accumulates a larger and larger number while the individual concepts are becoming constantly more and more complex.\n\nIs there to be any limit to this growth of concepts in number and complexity?\n\nWhoever will seriously consider that question will see that there must be a limit.\n\nNo such process could go on to infinity.\n\nWe have seen that the expansion of the perceptual mind had a necessary limit: that its continued life led inevitably up to and into the receptual mind; p.\n\n318 that the receptual mind by its own growth was inevitably led up to and into the conceptual mind.\n\nA priori considerations make it certain that a corresponding outlet will be found for the conceptual mind.\n\nBut we do not need to depend upon abstract reasoning to demonstrate the necessary existence of the supra-conceptual mind, since it exists and can be studied with no more difficulty than other natural phenomena.\n\nThe supra-conceptual intellect, the elements of which instead of being concepts are intuitions, is already (in small numbers it is true) an established fact, and the form of consciousness that belongs to that intellect may be called and has been called—Cosmic Consciousness.\n\nThe basic fact in cosmic consciousness is implied in its name—that fact is consciousness of the cosmos—this is what is called in the East the \"Brahmic Splendor,\" which is in Dante's phrase capable of trans-humanizing a man into a god.\n\nWhitman, who has an immense deal to say about it, speaks of it in one place as \"ineffable light—light rare, untellable, lighting the very light—beyond all signs, description, languages.\" This consciousness shows the cosmos to consist not of dead matter governed by unconscious, rigid, and unintending law; it shows it on the contrary as entirely immaterial, entirely spiritual and entirely alive; it shows that death is an absurdity, that everyone and everything has eternal life; it shows that the universe is God and that God is the Universe.\n\n.\n\n.\n\n.\n\nA great deal of this is of course, from the point of view of self-consciousness, absurd; it is nevertheless undoubtedly true.\n\nNow all this does not mean that when a man has cosmic consciousness he knows everything about the universe.\n\nWe all know that when at three years of age we acquired self-consciousness, we did not at once know all about ourselves.\n\n.\n\n.\n\n.\n\nSo neither does a man know all about the cosmos merely because he becomes conscious of it.\n\n.\n\n.\n\n.\n\nIf it has taken the race several thousand years to learn a smattering of the science of humanity since its acquisition of self-consciousness, so it may take it millions of years to acquire cosmic consciousness.\n\nAs on self-consciousness is based the human world as we see it with all its works and ways, so on cosmic consciousness is based the higher religions and the higher philosophies and what comes from them, and on it will be based, when it becomes more general, a new world of which it would be idle to try to speak today.\n\nThe philosophy of the birth of cosmic consciousness in the individual is very similar to that of the birth of self-consciousness."

