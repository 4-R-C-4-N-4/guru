[content]
body = "\"The cause of all things is neither soul nor intellect; nor has it imagination, opinion, or reason, or intelligence; nor is it reason or intelligence; nor is it spoken or thought.\n\nIt is neither number, nor order, nor magnitude, nor littleness, nor equality, nor inequality, nor similarity, nor dissimilarity.\n\nIt neither stands, nor moves, nor rests.\n\n.\n\n.\n\n.\n\nIt is neither essence, nor eternity, nor time.\n\nEven intellectual contact does not belong to it.\n\nArt is neither science nor truth.\n\nIt is not even royalty or wisdom; not one; not unity; not divinity or goodness nor even spirit as we know it.\" ______ The writings of the mystics of the Greek Orthodox Church are collected in the books The Love of the Good , comprising five large and formidable volumes.\n\nI selected several examples of profound p.\n\n286 and fine mysticism from the book, Superconsciousness and the Paths to its Attainment , by M.\n\nV.\n\nLodizhensky (In Russian), who studied these books and found therein remarkable examples of philosophical thought.\n\nImagine a circle, says Avva Dorotheus (VII century), and in the middle of it a centre; and from this centre forthgoing radii-rays.\n\nThe farther these radii go from the centre, the more divergent and remote from one another they become; conversely, the nearer they approach to the centre, the more they come together among themselves.\n\nNow suppose that this circle is the world: the very middle of it, God; and the straight lines (radii) going from the centre to the circumference, or from the circumference to the centre, are the paths of life of men.\n\nAnd in this case also, to the extent that the saints approach the middle of the circle, desiring to approach God, do they, by so doing, come nearer to God and to one another.\n\n.\n\n.\n\n.\n\nReason similarly with regard to their withdrawing from God .\n\n.\n\n.\n\nthey withdraw also from one another, and by so much as they withdraw from one another do they withdraw from God.\n\nSuch is the attribute of love: to the extent that we are distant from God and do not love Him, each of us is far from his neighbor also.\n\nIf we love God, then to the extent that we approach to Him through love of Him, do we unite in love with our neighbors; and the closer our union with them, the closer is our union with God also.\n\n1 ( Superconsciousness , p.\n\n266) Hear now, says St.\n\nIsaac of Syria (VI century), how man becomes refined, acquires spirituality, and becomes like the invisible forces.\n\n.\n\n.\n\n.\n\nWhen the vision soars above things earthly, and above all troubles over earthly doings, and begins to experience revelations concerning that which is within, hidden from sight, and when it will turn its gaze upward, and experiences faith in the guidance of future ages, and the ardent desire for promised things, when it will search for hidden mysteries, then faith itself consumes this knowledge and so transforms and regenerates it that it becomes entirely spiritual.\n\nThen may the vision soar on pinions into regions incorporeal, may touch the depths of an inaccessible sea, participating p.\n\n287 in the mind Divine, and the miraculous acts of guidance in the hearts of thinking and feeling beings, discovering spiritual mysteries which become then comprehensible by the refined and simple mind.\n\nThen the inner senses are awakened to spirituality after the manner that they will be in the life immortal and incorruptible, for even here this redemption of the mind is a true symbol of the general redemption.\n\n( Superconsciousness , p.\n\n370) When the grace of the Holy Spirit, says Maxim Kapsokalivit, descends on anyone, there is shown to him nothing of the sensuous world, but that which he never saw or never imagined."

