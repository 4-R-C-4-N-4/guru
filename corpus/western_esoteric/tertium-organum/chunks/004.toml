body = "Positivism as the study of the phenomenal side of life.\n\nOf what does the \"two-dimensionality\" of positive philosophy consist?\n\nThe regarding of everything upon a single plane, in one physical sequence.\n\nThe streams which flow underneath the earth.\n\nWhat can the study of life, as a phenomenon, yield?\n\nThe artificial world which science erects for itself.\n\nThe unreality of finished and isolated phenomena.\n\nThe new apprehension of the world 143 CHAPTER XIV The voices of stones.\n\nThe wall of a church and the wall of a prison.\n\nThe mast of a ship and a gallows.\n\nThe shadow of a hangman and of an ascetic.\n\nThe soul of a hangman and of an ascetic.\n\nThe different combinations of known phenomena in higher space.\n\nThe relationship of phenomena which appear unrelated, and the difference between phenomena which appear similar.\n\nHow shall we approach the noumenal world?\n\nThe understanding of things outside the categories of space and time.\n\nThe reality of many \"figures of speech.\" The occult understanding of energy.\n\nThe letter of a Hindu occultist.\n\nArt as the knowledge of the noumenal world.\n\nWhat we see and what we do not see.\n\nPlato's dialogue about the cavern 156 p.\n\nx Occultism and love.\n\nLove and death.\n\nOur different relations to the problems of death and to the problems of love.\n\nWhat is lacking in our understanding of love?\n\nLove as an every-day and merely psychological phenomena.\n\nThe possibility of a spiritual understanding of love.\n\nThe creative force of love.\n\nThe negation of love.\n\nLove and mysticism.\n\nThe \"wondrous\" in love.\n\nNietzsche, Edward Carpenter and Schopenhauer on love.\n\n\"The Ocean of Sex.\" 166 CHAPTER XVI The phenomenal and noumenal side of man.\n\n\"Man-in-himself.\" How do we know the inner side of man?\n\nCan we know of the existence of consciousness in conditions of space not analogous to ours?\n\nBrain and consciousness.\n\nUnity of the world.\n\nLogical impossibility of the simultaneous existence of spirit and matter.\n\nEither all spirit or all matter.\n\nRational and irrational actions in nature and in the life of man.\n\nCan rational actions exist alongside irrational?\n\nThe world as an accidentally self-created mechanical toy.\n\nThe impossibility of reason in a mechanical universe.\n\nThe irreconcilability of mechanicalness with the existence of reason.\n\nKant concerning \"hosts.\" Spinoza on the knowledge of the invisible world.\n\nNecessity for the intellectual definition of that which can be, and that which cannot be, in the world of hidden.\n\n176 CHAPTER XVII A living and rational universe.\n\nDifferent forms and lines of rationality.\n\nAnimated nature.\n\nThe souls of stones and the souls of trees.\n\nThe soul of a forest.\n\nThe human \"I\" as a collective rationality.\n\nMan as a complex being.\n\n\"Humanity\" as a being.\n\nThe world's soul.\n\nThe face of Mahadeva .\n\nProf.\n\nJames on the consciousness of the universe.\n\nFechner's ideas.\n\nZendavesta .\n\nA living Earth.\n\n198 CHAPTER XVIII Rationality and life.\n\nLife as knowledge.\n\nIntellect and emotions.\n\nEmotion as an organ of knowledge.\n\nThe evolution of emotion from the standpoint of knowledge.\n\nPure and impure emotions.\n\nPersonal and impersonal emotions.\n\nPersonal and super-personal emotions.\n\nThe elimination of self-elements as a means of approach to true knowledge.\n\n\"Be as little children.\n\n.\n\n.\n\n\" \"Blessed are the pure in heart.\n\n.\n\n.\n\n.\" The value of morals from the standpoint of knowledge.\n\nThe defects of intellectualism.\n\nDreadnaughts as the crown of intellectual culture.\n\nThe dangers of morality.\n\nMoral esthetics.\n\nReligion and art as organized forms of emotional knowledge.\n\nThe knowledge of God and the knowledge of Beauty.\n\n213 CHAPTER XIX The intellectual method, objective knowledge.\n\nThe limits of objective knowledge.\n\nThe possibility of the expansion of the application of the psychological method."

