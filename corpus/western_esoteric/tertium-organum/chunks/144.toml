[content]
body = "And there are emotions which are unitive , harmonizing, making man feel himself to be a part of some great whole; such are love, sympathy, friendship, compassion, love of country, love of nature, love of humanity.\n\nThese emotions lead man out of the material world and show him the truth of the world of the wondrous.\n\nEmotions of this character liberate him more easily from self-elements than those of the former class.\n\nNevertheless there can be a quite impersonal pride—the pride in an heroic deed accomplished by another man .\n\nThere can even be p.\n\n223 impersonal envy, when we envy a man who has conquered himself, conquered his personal desire to live, sacrificed himself for that which everyone considers to be right and just, but which we cannot bring ourselves to do, cannot even think of doing, because of weakness, of love of life .\n\nThere can be impersonal hatred—of injustice, of brute force, anger against stupidity, dullness; aversion to nastiness, to hypocrisy.\n\nThese feelings undoubtedly elevate and purify the soul of man and help him to see things which he would not otherwise see.\n\nChrist driving the money-changers out of the temple, or expressing his opinion about the Pharisees, was not entirely meek and mild; and there are cases wherein meekness and mildness are not virtues at all.\n\nEmotions of love, sympathy, pity transform themselves very readily into sentimentality, into weakness; and thus transformed they contribute of course to nescience , i.e., matter .\n\nThe difficulty of dividing emotions into categories is increased by the fact that all emotions of the higher order, without exception, can also be personal and then their action partakes of the nature of this class.\n\n______ There is a division of emotions into pure and impure .\n\nWe all know this, we all use these words, but understand little of what they mean.\n\nTruly, what does \"pure\" or \"impure\" mean with reference to feeling?\n\nCommon morality divides, a priori, all emotions into pure and impure according to certain outward signs, just as Noah divided the animals in his ark.\n\nAll \"fleshly desires\" fall into the category of the \"impure.\" In reality indeed, \"fleshly desires\" are just as pure as is everything in nature.\n\nNevertheless emotions are pure and impure.\n\nWe know very well that there is truth in this classification.\n\nBut where is it, and what does it mean?\n\nOnly an analysis of emotions from the standpoint of knowledge can give the key to this.\n\nImpure emotion—this is quite the same thing as impure glass, impure water, or impure sound, i.e., emotion which is not pure, but containing sediments, deposits, or echoes of other emotions: IMPURE—MIXED.\n\nImpure emotion gives obscure, not pure knowledge, p.\n\n224 just as impure glass gives a confused image.\n\nPure emotion gives a clear pure image of that for the knowledge of which it is intended.\n\nThis is the only possible decision of the question.\n\nThe arrival at this conclusion saves us from the common mistake of moralists who divide arbitrarily all emotion into \"moral\" and \"immoral.\" But if we try for a moment to separate emotions from their usual moral frames, then we see that matters are considerably simpler, that there are no in their nature pure emotions, nor impure in their nature , but that each emotion will be pure or impure according to whether or not there are admixtures of other emotions in it.\n\nThere can be a pure sensuality, the sensuality of the Song of Songs , which initiates into the sensation of cosmic life and gives the power to hear the beating pulse of nature.\n\nAnd there can be an impure sensuality, mixed with other emotions good or bad from a moral standpoint but equally making muddy the fundamental feeling."

