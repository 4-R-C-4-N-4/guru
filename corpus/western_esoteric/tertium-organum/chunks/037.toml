[content]
body = "But taking into consideration the ideas expressed before it would be interesting to look at the world supposing that we are not in it but on the ether; where the \"ether\" is the surface of contact of two bodies of higher dimensions.\n\n1 Hinton here expresses an unusually interesting thought, and brings the idea of the \"ether\" nearer to the idea of time.\n\nThe materialistic, or even the energetic understanding of contemporary physics of the ether is perfectly fruitless—a dead-end siding.\n\nFor Hinton the ether is not a substance but only a \"surface,\" the \"boundary\" of something.\n\nBut of what?\n\nAgain not that of a substance , but the boundary, the surface, the limit of one form of receptivity and the beginning of another.\n\n.\n\n.\n\n.\n\nIn one sentence the walls and fences of the materialistic dead-end siding are broken down and before our thought open wide horizons of regions unexplored.\n\nFootnotes 51:1 Hinton, \"A New Era of Thought,\" pp.\n\n52, 56, 57."

