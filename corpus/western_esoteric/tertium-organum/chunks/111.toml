[content]
body = "Love inspires this orgy of activity, and instinct directs it, because it is expedient from the standpoint of the species.\n\nAt the first awakening of love this work begins.\n\nOne and the same desire creates a new generation and those conditions under which this new generation will live.\n\nOne and the same desire urges forward creative activity in all directions, brings the pairs together for the birth of a new generation, and makes them build and create for this same future generation.\n\nWe observe the same thing in the world of men: there too love is the creative force.\n\nAnd the creative activity of love does not manifest itself in one direction only, but in many ways.\n\nIt is indeed probable that by the spur of love, Eros , humanity is aroused to the fulfilment of its principal function , of which we know nothing, but only at times by glimpses hazily perceive.\n\nBut even without reference to the purpose of the existence of humanity, within the limits of the knowable we must recognize that all the creative activity of humanity results from love.\n\nOur entire world revolves around love as its centre.\n\nLove unfolds in a human being traits of his which he never knew in himself.\n\nIn love there is much both of the Stone Age and of the Witches' Sabbath.\n\nBy anything less than love many men cannot be induced to commit a crime, to be guilty of a treason, to reanimate in themselves such feelings as they thought to have killed out long ago.\n\nIn love is hidden an infinity of egoism, vanity and selfishness.\n\nLove is the potent force that tears off all masks, and men who run away from love do so in order that they may preserve their masks.\n\nIf creation, the birth of ideas , is the light which comes from love, then this light comes from a great fire .\n\nIn this eternally burning fire in which humanity and all the world are being incessantly purified, all the forces of the human spirit and of genius are being evolved and refined; and perhaps indeed, from this same fire or by its aid a new force will arise which shall deliver from the chains of matter all who follow where it leads.\n\np.\n\n172 Speaking not figuratively, but literally, it may be said that love, being the most powerful of all emotions, unveils in the soul of man all its qualities patent and latent; and it may also unfold those new potencies which even now constitute the object of occultism and mysticism—the development of powers in the human soul so deeply hidden that by the majority of men their very existence is denied.\n\n1 In the majority of cases love, as it exists in modern life, has become a trifling away of feelings, of sensations.\n\nIt is difficult, in the conditions which govern life in the world, to imagine such a love as will not interfere with mystical aspirations.\n\nTemples of love and the mystical celebration of love's mysteries exist in reality no longer: there is the \"every-day manner of life,\" and psychological labyrinths from which those who rise a little above the ordinary level can only desire to run away.\n\nFor this reason certain fine forms of asceticism are developing quite naturally.\n\nThis asceticism does not slander love, does not blaspheme against it, does not try to convince itself that love is an abomination from which it is necessary to run away.\n\nIt is Platonism rather than asceticism.\n\nIt recognizes that love is the sun, but often does not see its way to live in the sunlight, and so considers it better not to see the sun at all, to divine it in the soul only, rather than receive its light through darkened or smoked glasses.\n\nIn general, however, love represents for men too great an enigma; and often the denial of love and asceticism take on strange and unnatural forms, even with persons who are quite sincere, but unable to understand the great mystical aspect of love."

