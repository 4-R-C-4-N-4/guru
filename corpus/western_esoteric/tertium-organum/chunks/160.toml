body = "The chief of these conditional data consists in the fact that in problems of this mathematics there is always taken the t of the universe only , i.e., one section only of the universe is taken, p.\n\n249 which section is never taken in conjunction with another one.\n\nThis mathematics of finite and constant magnitudes studies an artificial universe , and is in itself something especially created on the basis of our observation of phenomena , and serves for the simplification of these observations.\n\nBeyond phenomena the mathematics of finite and constant numbers cannot go.\n\nIt is dealing with an imaginary world, with imaginary magnitudes.\n\nThe practical results of those applied sciences which are built upon mathematical science should not confuse the observer, because these are merely the solutions of problems in definite artificial conditions.\n\nThe other, the mathematics of infinite and variable magnitudes , represents something entirely real, built upon the reasonings in regard to a real world .\n\nThe first is related to the world of phenomena, which represents in itself nothing other than our incorrect apprehension and perception of the world.\n\nThe second is related to the world of noumena, which represents in itself the world as it is .\n\nThe first is unreal, it exists in our consciousness , in our imagination.\n\nThe second is real, it expresses the relations of a real world.\n\n_______ The mathematics of transfinite numbers , so called, may serve as an example of \"real mathematics,\" violating the fundamental axioms of our mathematics (and logic).\n\nBy transfinite numbers , as their name implies, is meant numbers beyond infinity.\n\nInfinity, as represented by the sign ∞ is the mathematical expression with which, as such, it is possible to perform all operations: divide, multiply, raise to powers.\n\nIt is possible to raise infinity to the power of infinity—it will be ∞ ∞ .\n\nThis magnitude is an infinite number of times greater than simple infinity.\n\nAnd at the same time they are both equal : ∞ = ∞ ∞ .\n\nAnd this is the most remarkable property of transfinite numbers.\n\nYou may perform with them any operations whatsoever, they will change in a corresponding manner, remaining at the same time equal .\n\nThis violates the fundamental laws of mathematics accepted for finite numbers.\n\nAfter a p.\n\n250 change, the finite number cannot be equal to itself.\n\nBut here we see how, changing , the transfinite number remains equal to itself.\n\nAfter all, transfinite numbers are entirely real.\n\nWe can find examples corresponding to the expression ∞ and even ∞ ∞ and ∞ ∞∞ in our world.\n\nLet us take a line—any segment of a line.\n\nWe know that the number of points on this line is equal to infinity, for a point has no dimension.\n\nIf our segment is equal to one inch, and beside it we shall imagine a segment a mile long, then in the little segment each point will correspond to a point in the large one.\n\nThe number of points in a segment one inch long is infinite.\n\nThe number of points in a segment one mile long is also infinite.\n\nWe get ∞ = ∞.\n\nLet us now imagine a square, one side of which is a given segment, a .\n\nThe number of lines in a square is infinite.\n\nThe number of points in each line is infinite.\n\nConsequently, the number of points in a square is equal to infinity multiplied by itself an infinite number of times ∞ ∞ .\n\nThis magnitude is undoubtedly infinitely greater than the first one: ∞, and at the same time they are equal, as all infinite magnitudes are equal, because, if there be an infinity, then it is one, and cannot change.\n\nUpon the square a 2 , let us construct a cube.\n\nThis cube consists of an infinite number of squares, just as a square consists of an infinite number of lines, and a line of an infinite number of points."

