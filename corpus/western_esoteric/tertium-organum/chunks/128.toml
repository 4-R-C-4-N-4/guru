[content]
body = "p.\n\n198 CHAPTER XVII A living and rational universe.\n\nDifferent forms and lines of rationality.\n\nAnimated nature.\n\nThe souls of stones and the souls of trees.\n\nThe soul of a forest.\n\nThe human \"I\" as a collective rationality.\n\nMan as a complex being.\n\n\"Humanity\" as a being.\n\nThe world's soul.\n\nThe face of Mahadeva .\n\nProf.\n\nJames on the consciousness of the universe.\n\nFechner's ideas.\n\nZendavesta .\n\nA living Earth.\n\nIF rationality exists in the world, then it must permeate everything, although manifesting itself variously.\n\nWe have accustomed ourselves to ascribe animism and rationality in this or that form to those things only which we designate as \"beings,\" i.e., to those whom we find analogous to ourselves in the functions which define ANIMISM in our eyes.\n\nInanimate objects and mechanical phenomena are to us lifeless and irrational.\n\nBut this cannot be so .\n\nIt is only for our limited mind, for our limited power of communion with other minds, for our limited skill in analogy that rationality and psychic life in general manifest only in certain classes of living creatures, alongside of which a long series of dead things and mechanical phenomena exist.\n\nBut if we could not converse among ourselves, if every one of us could not infer the existence of rationality and of psychic life in another by analogy with himself, then everyone would consider himself alone to be alive and animated, and he would relegate all the rest of humankind to mechanical, \"dead\" nature.\n\nIn other words, we recognize as animated only those beings which have psychic life accessible to our observation in three-dimensional sections of the world, i.e., beings whose psyche is analogous to ours.\n\nAbout other consciousness we do not know and cannot know.\n\nAll \"beings\" whose psychic does not manifest itself in the three-dimensional section of the world are inaccessible to us.\n\nIf they contact our life at all, then we necessarily regard their manifestations as those of dead and unconscious nature.\n\nOur power of analogy p.\n\n199 is limited to this section .\n\nWe cannot think logically outside of the conditions of the three-dimensional section.\n\nTherefore everything that lives, thinks and feels in a manner not analogous to us must appear dead and mechanical.\n\nBut sometimes we vaguely feel an intense life manifesting in the phenomena of nature, and sense a vivid emotionality the manifestations of which constitute the phenomena of (to us) inanimate nature.\n\nWhat I wish to convey is that behind the phenomena of visible manifestations is felt the noumenon of emotion.\n\nIn electrical discharges , in thunder and lightning, in the rush and howling of the wind, are seen flashes of the sensuous-nervous shudderings of some gigantic organism.\n\nA strange individuality which is all their own is sensed in certain days.\n\nThere are days brimming with the marvelous and the mystic, days having each its own individual and unique consciousness, its own emotions, its own thoughts.\n\nOne may almost commune with these days.\n\nAnd they will tell you that they live a long, long time, perhaps eternally, and that they have known and seen many, many things.\n\nIn the processional of the year; in the iridescent leaves of autumn, with their memory-laden smell; in the first snow, frosting the fields and communicating a strange freshness and sensitiveness to the air; in the spring freshets, in the warming sun, in the awakening but still naked branches through which gleams the turquoise sky; in the white nights of the north, and in the dark, humid, warm tropical nights spangled with stars—in all these are the thoughts, the emotions, the forms, peculiar to itself alone, of some great consciousness; or better, all this is the expression of the emotions, thoughts and forms of consciousness of a mysterious being—Nature.\n\nThere can be nothing dead or mechanical in nature."

