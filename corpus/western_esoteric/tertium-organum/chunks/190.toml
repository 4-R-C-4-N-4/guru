[content]
body = "This is at the same time a religious sect and a philosophical school of high idealistic character, which struggled against materialism and against the narrow fanaticism and the literal understanding of the Koran.\n\nThe Sufis interpreted the Koran mystically.\n\nSufism—this is the philosophical free-thinking of Mohammedanism, united p.\n\n295 with an entirely original symbolical and brightly sensuous poetry which has always a hidden mystical character.\n\nThe blossoming of Sufism occurred in the early centuries of the second millennium of the Christian era.\n\nSufism remained for a long time incomprehensible to European thought.\n\nFrom the point of view of Christian theology and Christian morality the mixing up of sensuousness and religious ecstacy is incomprehensible, but in the Orient the two coexisted with perfect harmony.\n\nIn the Christian world \"the flesh\" has always been regarded as inimical to \"the spirit.\" In the Moslem world the fleshly and sensuous was accepted as a symbol of spiritual things.\n\nThe expression of philosophical and religious truths \"in the language of love\" was a widely disseminated custom throughout the Orient.\n\nThese things are \"Oriental flowers of eloquence.\" All allegories, all metaphors were taken from \"love.\" \"Mohammed fell in love with God,\" the Arabs say, desiring to convey the brightness of the religious ardor of Mohammed.\n\n\" Select for thyself a new wife every spring of the new year, because last year's calendar is no good \"—says the Persian poet and philosopher Sa’di .\n\nAnd in such curious form Sa’di expresses the thought that Ibsen puts in the mouth of Dr.\n\nStockman: \" Truths are not as many believe like long-living Methuselahs.\n\nUnder normal conditions a truth may exist about seventeen or eighteen years, rarely longer .\" The poetry of the Sufis will become clearer to us if we always keep in mind this general sensuous character of the literary language of the Orient, the heritage of profound antiquity.\n\nA classic example of this ancient literature is the Song of Songs .\n\nMany parts of the Bible and all ancient myths and stories are distinguished by a sensuousness of form strange to us.\n\n\"The Persian mystical poetical Sufis wrote about the love of God in expressions applicable to their beautiful women,\" says the translator of Jami and other poets, Davis—\"because, as they explained this, nobody can write in heavenly language and be understood.\" ( Persian Mystics .) \"The idea of Sufism,\" Max Müller says, \" is a loving union of the soul with God .\" \"The Sufi holds that there is nothing in human language that can express the love between the soul and God so well as the love between man and woman and that if he is to speak of the union between the two at all, he can only do so in the p.\n\n296 symbolic language of earthly love.\" When we read some of the Sufi enraptured poetry, we must remember that the Sufi poets use a number of expressions which have a recognized meaning in their language.\n\nTheir sleep means meditation; perfume —hope of divine favor; kisses and embraces —the raptures of piety; wine means spiritual knowledge, etc.\n\nThe flowers which a lover of God had gathered in his rose-garden, and which he wished to give to his friends, so overpowered his mind by their fragrance that they fell out of his lap and withered, Sa’di says.\n\nA poet desires to express by this, that the glory of ecstatic visions pales and fades away when it has to be put into human language.—(Max Müller Theosophy .) Generally speaking, never and nowhere has poetry been so blended with mysticism as in Sufism."

