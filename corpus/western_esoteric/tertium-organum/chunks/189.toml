body = ".\n\n.\n\n.\n\nTo hear the voice of the silence is to understand that from within comes the only true guidance.\n\n.\n\n.\n\n.\n\nFor when the disciple is ready, the Master is ready also.\n\nHold fast to that which is neither substance nor existence.\n\nListen only to the voice which is soundless.\n\nLook only on that which is invisible.\n\n.\n\n.\n\n.\n\n______ Prof.\n\nJames calls attention in his book to the unusually vivid emotionality of mystic experiences, and to the quite unusual sensations felt by mystics.\n\nThe deliciousness of some of these states seems to be beyond anything known in ordinary consciousness.\n\nIt evidently involves organic sensibilities, for it is spoken of as something too extreme to be borne, and as verging on bodily pain.\n\nBut it is too subtle and piercing a delight for ordinary words to denote.\n\nGod's touches, the wounds of his spear, references to ebriety and to mystical union have to figure in the phraseology by which it is shadowed forth.\n\nThe joy of communion with God, described by St Simeon the New Theologian 1 (X century) may serve as an example of such an experience.\n\nI am wounded by the arrow of His love (writes St.\n\nSimeon).\n\nHe is Himself inside of me, in my heart; he embraces me, kisses me, fills me with light.\n\n.\n\n.\n\n.\n\nA new flower grows in me, new because it is joyous.\n\n.\n\n.\n\n.\n\nThis flower is of an unutterable form, is seen when it grows merely, then suddenly disappears .\n\n.\n\n.\n\nit is of indescribable appearance; attracts my mind to itself, causes forgetfulness of everything to do with fear, and then p.\n\n294 flies suddenly away.\n\nThen does the tree of fear remain again lacking fruit; I moan in sorrow and pray to thee, my Christ; again I see the flower amid the branches, Ii chain my attention to it alone, and see not the tree alone, but the brilliant flower attracting me to itself irresistibly; this flower grows in the end into the fruit of love.\n\n.\n\n.\n\n.\n\nIncomprehensible is it how from fear grows love.\n\nMysticism penetrates into all religions.\n\nIn India, [Prof.\n\nJames says] training in mystical insight has been known from time immemorial under the name of yoga.\n\nYoga means the experimental union of the individual with the divine.\n\nIt is based on per-severing exercise; and the diet, posture, breathing, intellectual concentration, and moral discipline vary slightly in the different systems which teach it.\n\nThe yogi, or disciple, who has by these means overcome the obscurations of his lower nature sufficiently, enters into the condition termed samadhi , \"and he comes face to face with facts which no instinct or reason can ever know.\" .\n\n.\n\n.\n\nWhen a man comes out of samadhi Vedântists assure us that he remains \"enlightened, a sage, a prophet, a saint, his whole character changed, his life changed, illumined.\" The Buddhists use the word samadhi as well as the Hindus; but dhyana is their special word for the higher states of contemplation.\n\nHigher stages still of contemplation are mentioned—a region where there exists nothing, and where the meditator says: \"There exists absolutely nothing,\" and stops.\n\nThen he reaches another region, he says: \"There are neither ideas nor absence of ideas,\" and stops again.\n\nThen another region where, \"having reached the end of both idea and perception, he stops finally.\" This would seem to be, not yet Nirvana , but as close an approach to it as this life affords.\n\n1 _____ In Mohammedanism there is much of mysticism also.\n\nThe most characteristic expression of Moslem mysticism is Persian Sufism ."

