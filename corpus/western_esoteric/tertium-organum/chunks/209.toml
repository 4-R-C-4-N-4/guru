[content]
body = "He does not come to believe merely; but he sees and knows that the cosmos, which to the self-conscious mind seems made up of dead matter, is in fact far otherwise—is in very truth a living presence.\n\nHe sees that in-stead of men being, as it were, patches of life scattered through an infinite sea of non-living substance, they are in reality specks of relative death in an infinite ocean of life.\n\nHe sees that the life which is in man is eternal, as all life is eternal, that the soul of man is as immortal as God is.\n\n.\n\n.\n\n.\n\nA man learns infinitely much of the new.\n\nEspecially does he obtain such a conception of THE WHOLE—or at least of an immense WHOLE—as dwarfs all conception, imagination or speculation, such a conception as makes the old attempts to mentally grasp the universe and its meaning petty and even ridiculous.\n\nThis expansion of the intellect enormously increases the capacity both for learning and initiating.\n\n______ The history of the development and appearance of cosmic consciousness in humanity is the same as that of the development of all the various psychic faculties.\n\nThese faculties appear first in certain exceptional individuals, then become more frequent, thereafter become susceptible of development in all, and at last begin to belong to all men from their birth.\n\nRare, exceptional, unique abilities appear in man in mature age, sometimes even in senility.\n\nBecoming more common they manifest as \"talents\" in younger men.\n\nAnd then they appear as \"abilities\" even in children.\n\nAt last they become the common property of all from their birth, and their absence is regarded as a monstrosity.\n\nSuch is the faculty of speech (i.e., the faculty of making concepts).\n\nProbably in a distant past, at the beginning of the appearance of self-consciousness, this faculty was the gift of a few exceptional individuals and it began then to appear perhaps in senility.\n\nAfter that it began to appear more frequently and to manifest itself earlier.\n\nProbably there was a period p.\n\n321 when speech was not a gift of all men just as are not now artistic talents, the musical sense, the sense of color and form.\n\nGradually it became possible for all and then inevitable and necessary, if some physical defect did not prevent its manifestation.\n\n______ COMMENTS ON THE QUOTATIONS FROM DR.\n\nBUCKE'S BOOK 1.\n\nThough I am quoting Dr.\n\nBucke's opinion regarding three coming revolutions, let me note that I do not at all share his optimism regarding social life, which, as follows from what he says, can and must change by reason of material causes (the conquest of the air and social revolution).\n\nThe only possible ground for favorable changes in the outer life (provided such changes are generally possible) can only be changes in the inner life—i.e., those changes which Dr.\n\nBucke calls the psychical revolution.\n\nThis is the only thing that can create a better future for men.\n\nAll cultural conquests in the realm of the material are double-edged, may equally serve for good or for evil.\n\nA change of consciousness can alone be a guarantee of the surcease of wilful misuses of the powers given by culture, and only thus will culture cease to be a \"growth of barbarity.\" Democratic organization and the nominal rule of the majority guarantee nothing: on the contrary, even now, where they are realized—though only in name—they create without delay, and promise in future to create on a larger scale, violence toward the minority, the limitation of the individual, and the curtailment of freedom.\n\n2.\n\nDr.\n\nBucke says that once human consciousness is attained, then further evolution is inevitable.\n\nIn this affirmation Dr.\n\nBucke makes a mistake common to all men who dogmatize about evolution."

