[content]
body = "This sensation of light and of unlimited joy is experienced at the moment of the expansion of consciousness (the unfoldment of the mystical lotus of the Hindu yogi), at the moment of the sensation of infinity, and it yields also the sensation of darkness and of unlimited horror.\n\nWhat does this mean?\n\nNow shall we reconcile the sensation of light with the sensation of darkness, the sensation of joy with that of horror?\n\nCan these exist simultaneously?\n\nDo they occur simultaneously?\n\nThey do so occur, and must be exactly thus.\n\nMystical literature gives us examples of it.\n\nThe simultaneous sensations of light and darkness, joy and horror, symbolize as it were the strange duality and contradiction of human life.\n\nIt may happen to a man of dual nature, who following one side of his nature has been led far into \"spirit,\" and on the other side is deeply immersed in \"matter,\" i.e., in illusion, in unreality—to one who believes too much in the reality of the unreal.\n\nGenerally speaking the sensation of light, of life, of consciousness penetrating all, of happiness, gives a new world.\n\nBut the same world to the unprepared mind will give the sensation of infinite darkness and horror.\n\nIn this case the sensation of horror will arise from the loss of everything real , from the disappearance of this world.\n\nIn order not to experience the horror of the new world, it is necessary to know it beforehand, either emotionally—by faith or love—or intellectually, by reason .\n\nAnd in order not to experience horror from the loss of the old world, it is necessary to have renounced it voluntarily either through faith or reason.\n\nOne must renounce all the beautiful, bright world in which we are living; one must admit that it is ghostly, phantasmal, unreal, p.\n\n260 deceitful, illusory, mayavic .\n\nOne must reconcile oneself to this unreality, not be afraid of it, but rejoice at it.\n\nOne must give up everything.\n\nOne must become POOR IN SPIRIT, i.e., make oneself poor by the effort of one's spirit.\n\nThis most profound philosophical truth is expressed in the beautiful evangelical symbol: Blessed are the poor in spirit: for theirs is the kingdom of heaven .\n\nThese words become clear in the sense of a renouncement of the material world only.\n\n\"Poor in spirit\" does not mean poor materially, in the worldly meaning of the word, and still less does it signify poverty of spirit .\n\nSpiritual poverty is the renouncement of matter; such \"poverty\" is his when a man has no earth under his feet, no sky above his head.\n\nFoxes have holes, and birds of the air have nests, but the Son of man hath not where to lay his head .\n\nThis is the poverty of the man who is entirely alone , because father, mother, other men, even the nearest here on earth he begins to regard differently, not as he regarded them before; and renounces them because he discerns the true substances that he is striving toward; just as, renouncing the phenomenal illusions of the world, he approaches the truly real.\n\nThe moment of transition—that terrible moment of the loss of the old and the unfoldment of the new —has been represented in innumerable allegories in ancient literature.\n\nTo make this transition easy was the purpose of the mysteries .\n\nIn India, in Egypt, in Greece, special preparatory rituals existed, sometimes merely symbolical, sometimes real, which actually brought a soul to the very portals of the new world, and opened these portals at the moment of initiation .\n\nBut no outward rituals and ceremonies could take the place of self-initiation.\n\nThe great work must have been going on inside the soul and mind of man.\n\n______ But how can logic help a man to pass to the consciousness of a new and higher world?\n\np.\n\n261 We have seen that MATHEMATICS has already found the path into that higher order of things."

