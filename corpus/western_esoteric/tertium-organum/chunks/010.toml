[content]
body = "Just as Goethe's Werther , with its sex-sentimentality, is said to have provoked an epidemic of suicides, so may Tertium Organum —which restores love to that high heaven from whence descend every beauty and benison—inaugurate a renascence of love and joy.\n\nFrom one point of view this is a terrible book: there is a revolution in it—a revolution of the very poles of thought.\n\nSome it will rob of their dearest illusions, it will cut the very ground from beneath their feet, it will consign them to the Abyss.\n\nIt is a great destroyer of complacency.\n\nYes, this is a dangerous book—but then, life is like that.\n\n_______ It is beyond the province of this Introduction either to outline the Ouspenskian philosophy at any length, or to discuss it critically; but some slight indication of its drift may be of assistance to the reader.\n\nThe book might have appropriately been called A Study of Consciousness , for Ouspensky comes early to the conclusion that all other methods of approach to an understanding of the \"enigmas of the world\" are vain.\n\nChapters I to VII, inclusive, deal with the problem of the world-order by the objective method.\n\nThe author erects an elaborate scaffolding for his future edifice, and after it has served its purpose, throws it down.\n\nAware of the deficiencies p.\n\n5 of the objective method and having made the reader conscious of them too, he suddenly alters his system of attack.\n\nFrom chapter VIII onward, he undertakes the study of the world-order from the standpoint of subjectivity—of consciousness.\n\nBy a method both ingenious and new he correlates the different grades of consciousness observable in nature—those of vegetable-animal, animal and man—with the space sense, showing that as consciousness changes and develops, the sense of space changes and develops too.\n\nThat is to say, the dimensionality of the world depends on the development of consciousness.\n\nMan, having reached the third stage in that development, has a sense of three-dimensional space—and for no other reason.\n\nOuspensky concludes that nothing except consciousness unfolds, develops, and as there appears to be no limit to this development, he conceives of space as the multi-dimensional mirror of consciousness and of time and motion as illusion—what appears to be time and motion being in reality only the movement of consciousness upon a higher space.\n\nThe problem of superior states of consciousness in which \"there shall be time no longer\" is thus directly opened up, and in discussing their nature and method of attainment, he quotes freely from the rich literature of mysticism.\n\nInstead of attempting to rationalize these higher states of consciousness, as some authors do, he applies to them the logic of intuition —\" Tertium Organum \"—paradoxical from the standpoint of ordinary reason, but true in relation to the noumenal world.\n\nJoseph Conrad and Ford Madox Hueffer once wrote a novel called The Inheritors and by this they meant the people of the fourth dimension.\n\nThough there is small resemblance between Ouspensky's \"superman\" and theirs, it is his idea also that those of this world who succeed in developing higher-dimensional, or \"cosmic\" consciousness will indeed inherit—will control and regulate human affairs by reason of their superior wisdom and power.\n\nIn this, and in this alone, dwells the \"salvation\" of the world.\n\nHis superman is the \"just man made perfect\" of the Evangelist.\n\nThe struggle for mastery between the blind and unconscious forces of materialism on the one hand, and the spiritually illumined on the other, is already upon us, and all conflicts between nations, peoples p.\n\n6 and classes must now be interpreted in terms of this greater warfare between \"two races\" of men, in which the superior minority will either conquer or disappear."

