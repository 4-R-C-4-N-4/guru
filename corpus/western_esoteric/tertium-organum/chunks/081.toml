[content]
body = "An age of great inspiration and unconscious productiveness is invariably followed by an age of criticism and consciousness.\n\nThe one affords material for the analyzing and critical intellect of the other.\n\nThus all those great characters who tower like giants in the history of mankind, like Buddha-Siddârtha, and Jesus, in the realm of spiritual, and Alexander the Macedonian and Napoleon the Great, in the realm of physical conquests, were but reflexed images of human types which had existed ten thousand years before, in the preceding decimillennium, reproduced by the mysterious powers controlling the destinies of our world.\n\nThere is no prominent character in all the annals of sacred or profane history whose prototype we cannot find in the half-fictitious and half-real traditions of bygone religions and mythologies.\n\nAs the star, glimmering at an immeasurable distance above our heads, in the boundless immensity of the sky, reflects itself in the smooth waters of a lake, so does the imagery of men of the antediluvian ages reflect itself in the periods we can embrace in an historical retrospect.\n\nAs above, so below.\n\nThat which has been will return again.\n\nAs in heaven, so on earth .\n\nAnything that can be said about the understanding of temporal relations is inevitably extremely vague.\n\nThis is because our language is absolutely inadequate to the spatial expression of temporal relations .\n\nWe lack the necessary words for it, we have no verbal forms, strictly speaking, for the expression of these relations which are new to us, and some other quite new forms— not verbal —are indispensable.\n\nThe language for the transmission of the new temporal relations must be a language without verbs.\n\nNew parts of speech are necessary, an infinite number of new words.\n\nAt present, in our human language we can speak about \"time\" by hints only.\n\nIts true essence is inexpressible for us.\n\np.\n\n123 We should never forget about this inexpressibility.\n\nThis is the sign of the truth , the sign of reality.\n\nThat which can be expressed, cannot be true.\n\nAll systems dealing with the relation of the human soul to time—all ideas of post-mortem existence, the theory of re-incarnation, that of the transmigration of souls, of karma —are symbols, trying to transmit relations which cannot be expressed directly because of the poverty and the weakness of our language.\n\nThey should not be understood literally any more than it is possible to understand the symbols and allegories of art literally.\n\nIt is necessary to search for their hidden meanings , that which cannot be expressed in words.\n\nThe literal understanding of these symbolical forms in certain lines of contemporary literature, and the union with them of ideas of \"evolution\" and \"morals\" taken in the most narrow, dualistic meaning, completely disfigures the inner content of these forms, and deprives them of their value and meaning.\n\nFootnotes 118:1 \"The Fourth Dimension,\" p.\n\n77."

