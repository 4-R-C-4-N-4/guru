[content]
body = "Consciousness as in sleep without dreams.\n\nSimple consciousness.\n\n\"It pains me,\" but the impossibility of saying, \"I am conscious that it pains me.\" The reflected state of consciousness.\n\nVision as in dreams.\n\nThe passive state of consciousness.\n\nThe ability to think of one's states of consciousness.\n\nThe division of I and Not-I.\n\nActive consciousness.\n\nThe moment when further evolution can be conscious only .\n\nThe commencement of self-consciousness.\n\nEcstatic states.\n\nTransitions to cosmic consciousness.\n\nFORMS OF KNOWLEDGE Unconscious receptivity of the environment, and unconscious reaction to it.\n\n\"ADAPTABILITY.\" The beginnings of attention.\n\nObservation.\n\nThe accumulation of instincts.\n\nThe recognition of everything sensed as real.\n\nThe failure to discriminate between that which is illusory and that which is real.\n\nExperience.\n\nExperimental knowledge.\n\nA complete and deep division and mutual misunderstanding between four forms of knowledge—religion, philosophy, science and art.\n\nThe beginning of the development of forms of knowledge.\n\nMystic knowledge.\n\nA new sensation of time.\n\nThe sensation of infinity.\n\nThe sensation of the unreality of the phenomenal, visible world.\n\nA knowledge of the hidden substance of things by their outer signs.\n\nUnfoldment of the \"world of the wondrous.\" Co-ordination in a complete whole of religion, philosophy, science and art.\n\nFORMS OF SCIENCE An accumulation of \"traces\" from the produced reflexes.\n\nThe appearance of instinct and the accumulation of simple instincts.\n\nPersonal knowledge.\n\nImpotence to communicate experience.\n\nThe beginnings of the communication of experience in the training of the young.\n\nPositive science.\n\nPositive philosophy.\n\nMaterialism.\n\nSpiritualistic philosophy.\n\nDogmatic religions.\n\nSpiritism and pseudo-occultism.\n\nSectarianism.\n\nDualism.\n\nMatter and spirit.\n\nSeparation of different forms of science.\n\nIdealistic philosophy.\n\nMathematics of the infinite.\n\nTertium Organum .\n\nMystical religion.\n\nGod and the Cosmos—one.\n\nThe sensation of a living and conscious universe.\n\nThe union of all sciences into one.\n\nOccultism.\n\nUnderstanding of \" Dharma ,\" i.e., of laws of relativity.\n\nDIFFERENT BEINGS The lower animal.\n\nCells of the tissues and organs of the body.\n\nThe one-dimensional being.\n\nVegetative or semi-vegetative life .\n\nThe higher animal.\n\nThe body of man.\n\nThe two-dimensional being.\n\nThe absence of duality, divisibility and disharmony.\n\nAnimal life .\n\nMan.\n\nA three-dimensional being outwardly and dual inwardly .\n\nInner warfare.\n\nThe impossibility of attaining inner harmony.\n\nThe \"soul\" as the battlefield of the \"spirit\" and the \"flesh.\" The kingdom of the personal.\n\nUnconscious automatism.\n\nThe absence of personal immortality.\n\nThe beginnings of the transition to a new type, and a new sensation of space.\n\nVictory of consciousness.\n\n\"Men of cosmical consciousness.\" Triumph of the super-personal principle.\n\nConscious automatism.\n\nThe attainment of inner unity and harmony.\n\nThe \"soul\" as the center of independent actions, The beginnings of personal immortality."

