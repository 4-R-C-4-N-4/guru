body = "p.\n\n143 CHAPTER XIII The apparent and the hidden side of life.\n\nPositivism as the study of the phenomenal side of life.\n\nOf what does the \"two-dimensionality\" of positive philosophy consist?\n\nThe regarding of everything upon a single plane, in one physical sequence.\n\nThe streams which flow underneath the earth.\n\nWhat can the study of life, as a phenomenon, yield?\n\nThe artificial world which science erects for itself.\n\nThe unreality of finished and isolated phenomena.\n\nThe new apprehension of the world.\n\nTHERE exist visible and hidden causes of phenomena; there exist also visible and hidden effects.\n\nLet us consider some one example.\n\nIn all textbooks on the history of literature we are told that in its time Goethe's Werther provoked an epidemic of suicides.\n\nWhat did provoke these suicides?\n\nLet us imagine that some \"scientist\" appears, who, being interested in the fact of the increase of suicides, begins to study the first edition of Werther according to the method of exact, positive science.\n\nHe weighs the book, measures it by the most precise instruments, notes the number of its pages, makes a chemical analysis of the paper and the ink, counts the number of lines on every page, the number of letters, and even how many times the letter A is repeated, how many times the letter B, and how many times the interrogation mark is used, and so on.\n\nIn other words he does everything that the pious Mohammedan performs with relation to the Koran of Mohammed, and on the basis of his investigations writes a treatise on the relation of the letter A of the German alphabet to suicide.\n\nOr let us imagine another scientist who studies the history of painting, and deciding to put it on a scientific basis, starts a lengthy series of analyses of the pigment used in the pictures of famous painters in order to discover the causes of the different impressions produced upon the beholder by different pictures.\n\nImagine a savage studying a watch.\n\nLet us admit that he is a wise and crafty savage.\n\nHe takes the watch apart and counts all p.\n\n144 its wheels and screws, counts the number of teeth in each gear, finds out its size and thickness.\n\nThe only thing that he does not know is what all these things are for .\n\nHe does not know that the hand completes the circuit of the dial in half of twenty-four hours, i.e., that it is possible to tell time by means of a watch .\n\nAll this is \"positivism.\" We are too familiar with \"positivistic\" methods, and so fail to realize that they end in absurdities and that if we are seeking to explain the meaning of anything, they do not lead to the goal at all.\n\nThe difficulty is that for the explanation of the meaning positivism is of no use.\n\nFor it nature is a closed book of which it studies the appearance only.\n\nIn the matter of the study of the operations of nature, the positive methods have achieved much, as is proven by the innumerable successes of modern technics, including the conquest of the air.\n\nBut everything in the world has its own definite sphere of action.\n\nPositivism is very good when it seeks an answer to the question of how something operates under given conditions; but when it makes the attempt to get outside of its definite conditions (space, time, causation), or presumes to affirm that nothing exists outside of these given conditions, then it is transcending its own proper sphere.\n\nIt is true that the more serious positive thinkers deny the possibility of including in \"positive investigation\" the question of why and what for .\n\nBut as a matter of fact the positive standpoint is not the only possible one.\n\nThe usual mistake of positivism consists in its not seeing anything except itself —it either considers everything as possible to it, or considers as generally impossible much that is entirely possible, but not for positive inquiry.\n\nHumanity will never cease to search, however, for answer to the questions why , and wherefore ."

