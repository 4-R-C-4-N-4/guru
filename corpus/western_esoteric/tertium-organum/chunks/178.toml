body = "It is in answering these questions that the various theologies perform their theoretic work, and that their divergencies most come to light.\n\nThey all agree that the \"more\" really exists; though some of them hold it to exist in the shape of a personal God or gods while others are satisfied to conceive it as a stream of ideal tendency.\n\n.\n\n.\n\n.\n\nIt is when they treat of the experience of \"union\" with it that their speculative differences appear most clearly.\n\nOver this point pantheism and theism, nature and second birth, works and grace and Karma, immortality and reincarnation, rationalism and mysticism, carry on inveterate disputes.\n\nAt the end of my lecture on Philosophy I held out the notion that an p.\n\n277 impartial science of religions might sift out from the midst of their discrepancies a common body of doctrine which she might also formulate on terms to which physical science need not object.\n\nThis, I said, she might adopt as her own reconciling hypothesis, and recommend it for general belief.\n\nLet me then propose as an hypothesis that whatever it may be on its farther side, the \"more\" with which in religious experience we feel ourselves connected is on its hither side the subconscious continuation of our conscious life.\n\nThe conscious person is continuous with a wider self.\n\n.\n\n.\n\n.\n\nThe further limits of our being plunge, it seems to me, into an altogether other dimension of existence from the sensible and merely \"understandable\" world.\n\nName it the mystical region, or the super-natural region.\n\n.\n\n.\n\n.\n\nWe be, long to it, in a more intimate sense than that in which we belong to thy, visible world, for we belong in the most intimate sense wherever our ideals belong.\n\n.\n\n.\n\n.\n\nThe communion with this invisible world is a real process with real results.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nPersonal religious experience has its roots and centre in mystical states of consciousness.\n\n______ But what, after all, is mysticism?\n\nReturning to the terminology established in the foregoing chapters, we may say that \"mystical states of consciousness\" are closely bound up with knowledge received under conditions of expanded receptivity.\n\nUntil quite recently psychology did not recognize the reality of the mystical experience and regarded all mystical states as pathological ones —unhealthy conditions of the normal consciousness.\n\nEven now, many positivist-psychologists hold to this opinion, embracing in one common classification real mystical states, pseudo-mystical perversions of the usual state, purely psychopathic states and more or less conscious deceit.\n\nThis of course can be of no assistance to a correct understanding of the question.\n\nBefore going further let us therefore establish certain criteria for the identification of real mystical states: Prof.\n\nJames enumerates the following: ineffability, noetic quality, transiency, passivity.\n\nBut some of these characteristics belong also to simple emotional states , and he fails to define exactly how mystical states can be distinguished from emotional ones of analogous character.\n\np.\n\n278 Considering mystical states as \"knowledge by expanded conscious.\n\nness,\" it is possible to give quite definite criteria for their discernment and their differentiation from the generality of psychic experiences.\n\n1.\n\nMystical states give knowledge WHICH NOTHING ELSE CAN GIVE.\n\n2.\n\nMystical states give knowledge of the real world with all its signs and characteristics.\n\n3.\n\nThe mystical states of men of different ages and different peoples exhibit an astonishing similarity, sometimes amounting to complete identity.\n\n4.\n\nThe results of the mystical experience are entirely illogical from our ordinary point of view.\n\nThey are super-logical , i.e., Tertium Organum , WHICH IS THE KEY TO MYSTICAL EXPERIENCE, is applicable to them in all its entirety.\n\n______ The last-named criterion is especially important—the illogicality of the data of mystical experience forced science to repudiate them."

