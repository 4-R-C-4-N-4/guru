[content]
body = "______ Whatever we may think of this philosophy, we cannot deny its metaphysical boldness and its logical consistency.\n\nIf Brahman is all in all, the One without a second, nothing can be said to exist that is not Brahman .\n\nthere is no room for anything outside the infinite and the Universal, nor is there room for two infinites, for the infinite in nature and the infinite in man.\n\nThere is and there can be one infinite, one Brahman only.\n\nThis is the beginning and the end of the Vedânta.\n\nAs the shortest summary of the ideas of the Vedânta two verses of Sankara , the commentator and interpreter of Vedânta are often quoted: Brahma is true, the world is false.\n\nThe soul is Brahma and is nothing else .\n\n[paragraph continues] This is really a very perfect summary.\n\nWhat truly and really exists is Brahman, the One Absolute Being; the world is false, or rather is not what it seems to be; that is, everything which is present to us by means of sense is phenomenal and relative, and can be nothing else.\n\nThe soul again, or rather every man's soul, though it may seem to be this or that, is in reality nothing but Brahma.\n\nIn relation to the question of the origin of the world two famous commentators of the Vedânta , Sankara and Râmânuga differ.\n\nRâmânuga holds to the theory of evolution, Sankara —to the theory of illusion.\n\nIt is very important to observe that the Vedântist does not go so far as certain Buddhist philosophers who look upon the phenomenal world as simply nothing .\n\nNo, their world is real, only it is not what it seems to be.\n\nSankara claims for the phenomenal world a reality sufficient for all practical purposes, sufficient to determine our practical life, our moral obligations.\n\nThere is a veil.\n\nBut the Vedânta-philosophy teaches us that the eternal light behind it can always be perceived more or less clearly through philosophical p.\n\n276 knowledge.\n\nIt can be perceived, because in reality it is always there.\n\nIt may seem strange to find the results of the philosophy of Kant and his followers thus anticipated under varying expressions in the Upanishads and in the Vedânta-philosophy of ancient India.\n\n______ In the chapters about the Logos and about Christian Theosophy Max Müller says that religion is the bridge between the Visible and the Invisible , between Finite and Infinite .\n\nIt may be truly said that the founders of the religions of the world have all been bridge-builders.\n\nAs soon as the existence of a Beyond, of a Heaven above the earth, of Powers above us and beneath us has been recognized, a great gulf seemed to be fixed.\n\nAmong contemporary thinkers the noted psychologist, Prof.\n\nWilliam James, approached nearer than all others to the ideas of Max Müller's theosophy.\n\nIn the last chapter of his book, The Varieties of Religious Experience , Prof.\n\nJames says: The warring gods and formulas of the various religions do indeed cancel each other, but there is a certain uniform deliverance in which religions all appear to meet—this is the liberation of the soul .\n\n.\n\n.\n\n.\n\nMan becomes conscious that if his higher part is conterminous and continuous with a MORE of the same quality, which is operative in the universe outside of him, and which he can keep in working touch with, and in a fashion get on board of, he can save himself when all his lower being has gone to pieces in the wreck.\n\nWhat is the objective \"Truth\" of content of religious experiences?\n\nIs such a \"more\" merely our own notion, or does it really exist?\n\nIf so, in what shape does it exist?\n\nAnd in what form should we conceive of that \"union\" with it of which religious geniuses are so convinced?"

