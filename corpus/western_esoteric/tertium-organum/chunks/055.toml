body = "p.\n\n80 CHAPTER VIII Our receptive apparatus.\n\nSensation.\n\nPerception.\n\nConception.\n\nIntuition.\n\nArt as the language of the future.\n\nTo what extent does the three-dimensionality of the world depend upon the properties of our receptive apparatus?\n\nWhat might prove this interdependence?\n\nWhere may we find the real affirmation of this interdependence?\n\nThe animal psyche.\n\nIn what does it differ from the human?\n\nReflex action.\n\nThe irritability of the cell.\n\nInstinct.\n\nPleasure-pain.\n\nEmotional thinking.\n\nThe absence of concepts.\n\nLanguage of animals.\n\nLogic of animals.\n\nDifferent degrees of psychic development in animals.\n\nThe goose, the cat, the dog and the monkey.\n\nIN order exactly to define the relation of our psyche to the external world, and to determine what, in our receptivity of the world, belongs to it, and what belongs to ourselves, let us turn to elementary psychology and examine the mechanism of our receptive apparatus.\n\nThe fundamental unit of our receptivity is a sensation .\n\nThis sensation is an elementary change in the state of our psyche, produced, as it seems to us, either by some change in the state of the external world in relation to our consciousness, or by a change in the state of our psyche in relation to the external world.\n\nSuch is the teaching of physics and psycho-physics.\n\nInto the consideration of the correctness or incorrectness of the construction of these sciences I shall not enter.\n\nSuffice it to define a sensation as an elementary change in the state of the psyche—as the element, that is, as the fundamental unit of this change.\n\nFeeling the sensation we assume that it appears, so to speak, as the reflection of some change in the external world.\n\nThe sensations felt by us leave a certain trace in our memory.\n\nThe accumulating memories of sensations begin to blend in consciousness into groups, and according to their similitude tend to associate, to sum up, to be opposed; the sensations which are usually felt in close connection with one another will arise in memory in the same connection.\n\nGradually, out of the memories of sensations, p.\n\n81 perceptions are compounded.\n\nPerceptions—these are so to speak the group memories of sensations.\n\nDuring the compounding of perceptions, sensations are polarizing in two clearly defined directions.\n\nThe first direction of this grouping will be according to the character of sensations .\n\n(The sensations of a yellow color will combine with the sensations of a yellow color; sensations of a sour taste with those of a sour taste.) The second direction will be according to the time of the reception of sensations .\n\nWhen various sensations, constituting a single group, and compounding one perception, enter simultaneously, then the memory of this definite group of sensations is ascribed to a common cause.\n\nThis \"common cause\" is projected into the outside world as the object, and it is assumed that the given perception itself reflects the real properties of this object.\n\nSuch group remembrance constitutes perception , the perception, for example, of a tree— that tree.\n\nInto this group enter the green color of the leaves, their smell, their shadows, their rustle in the wind, etc.\n\nAll these things taken together form as it were a focus of rays coming out of the psyche, gradually concentrated upon the outside object and coinciding with it either well or ill.\n\nIn the further complication of the psychic life, the memories of perception proceed as with the memories of sensations.\n\nMingling together, the memories of perceptions, or the \"images of perceptions,\" combine in various ways: they sum up, they stand opposed, they form groups, and in the end give rise to concepts.\n\nThus out of various sensations, experienced (in groups) at different times, a child gets the perception of a tree (that tree), and afterwards, out of the images of perceptions of different trees there emerges the concept of a tree , i.e., not \"that tree,\" but trees in general."

