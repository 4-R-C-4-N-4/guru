[content]
body = "Blood describes the value of the anæsthetic revelation for life as follows: \"The Anæsthetic Revelation is the initiation of man into the mystery of the open secret of Being, revealed as the inevitable vortex of continuity.\n\nInevitable is the word.\n\nIts motive is inherent—it is what has to be.\n\nIt is not for any love or hate, nor for joy or sorrow, nor good nor ill.\n\nEnd, beginning, or purpose, it knows not of.\n\n\"It affords no particular of the multiplicity and variety of things; but it fills the appreciation of the historical and the sacred with a secular and intimately personal illumination of the nature and motive of existence.\n\n.\n\n.\n\n.\n\n\"Although it is at first startling in its solemnity, it becomes directly such a matter of course—so old-fashioned, and so akin to proverbs, that it inspires exultation rather than fear, and the sense of safety, as identified with the aboriginal and the universal.\n\nBut no words may express the surpassing certainty of the patient that he is realizing the primordial Adamic surprise of life.\n\n\"Repetition of the experience finds it ever the same, and as if it could not possibly be otherwise.\n\nThe subject resumes his normal consciousness only to partially and fitfully remember its occurrence, and to try to formulate its baffling import—with this consolatory after-thought: that he has known the oldest truth, and that he has done with human theories as to the origin, meaning, or destiny of the race.\n\nHe is beyond instruction in 'spiritual things.' \"The lesson is one of central safety; the kingdom is within.\n\nAll days are judgment days: but there can be no climacteric purpose of eternity, nor any scheme of the whole.\n\nThe astronomer abridges the row of bewildering figures by increasing his unit of measurement: so may we reduce the distracting multiplicity of things to the unity for which each of us stands.\n\n\"This has been my moral sustenance since I have known of it.\n\nIn my first printed mention of it I declared: The world is no more the alien p.\n\n300 terror that was taught me.\n\nSpurning the cloud-grimed and still sultry battlements whence so lately Jehovan thunders boomed, my gray gull lifts her wings against the nightfall, and takes the dim leagues with a fearless eye.\n\nAnd now, after twenty-seven years of this experience, the wing is grayer, but the eye is fearless still, while I renew and doubly emphasize that declaration.\n\nI know—as having known—the meaning of existence: the sane center of the universe—at once the wonder and the assurance of the soul—for which the speech of reason has as yet no name but the Anæsthetic Revelations.\" I subjoin, Prof.\n\nJames says, another interesting anæsthetic revelation.\n\nThis is what the subject, a gifted woman, writes about her experience, when she was taking ether for a surgical operation.\n\n\"I wondered if I was in a prison being tortured, and why I remembered, having heard it said that people 'learn through suffering,' and in view of what I was seeing, the inadequacy of this saying struck me so much that I said, aloud, 'to suffer is to learn.' With that I became unconscious again, and my last dream immediately preceded my real coming to.\n\nIt only lasted a few seconds and was most vivid and real to me, though it may not be clear in words.\n\n\"A great Being or Power was traveling through the sky, his foot was on a kind of lightning as a wheel is on a rail, it was his pathway.\n\nThe lightning was made of innumerable spirits close to one another, and I was one of them.\n\nHe moved in a straight line, and each part of the streak or flash came into its short conscious existence only that he might travel."

