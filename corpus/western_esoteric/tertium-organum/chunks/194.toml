[content]
body = "I seemed to be directly under the foot of God, and I thought he was grinding his own life up out of my pain.\n\nThen I saw that what he had been trying with all his might to do was to change his course, to bend the line of lightning to which he was tied, in the direction in which he wanted to go.\n\nI felt my flexibility and helplessness, and I knew that he would succeed.\n\nHe bended me, turning his corner by means of my hurt, hurting me more than I had ever been hurt in my life, and at the acutest point of this, as he passed, I, SAW.\n\n\"I understood for a moment things that I have now forgotten, things that no one could remember while retaining sanity.\n\nThe angle was an obtuse angle, and I remember thinking as I woke that had he made it a right or acute angle, I should have both suffered and 'seen' still more, and should probably have died.\n\n\"He went on and I came to.\n\nIn that moment the whole of my life passed before me, including each little meaningless piece of distress, and I understood them.\n\nThis is what it had all meant, this was the piece of work it had all been contributing to do.\n\n\"I did not see God's purpose.\n\nI only saw his intentness and his entire relentlessness toward his means.\n\nHe thought no more of me than a man p.\n\n301 thinks of hurting a cartridge when he is firing.\n\nAnd yet, on waking, my first feeling was, and it came with tears, 'Domine non sum digna,' for I had been lifted into a position for which I was too small.\n\nI, realized that in that half hour under ether I had served God more distinctly and purely than I had ever done in my life before, or than I, am capable of desiring to do.\n\nI was the means of his achieving and revealing something, I know not what or to whom, and that to the exact extent of my capacity for suffering.\n\n\"While regaining consciousness L wondered why, since I had gone so deep, I had seen nothing of what saints call the love of God, nothing but his relentlessness.\n\nAnd then I heard an answer, which I could only just catch, saying, 'Knowledge and Love are One, and the measure is suffering'—I give the words as they came to me.\n\nWith that I came finally to into what seemed a dream world compared with the reality of what I, was leaving.\n\n.\n\n.\n\n.\" I.\n\nS.\n\nSymonds, whom Prof.\n\nJames mentions, tells of an interesting mystical experience with chloroform: \"After the choking and stifling had passed away, I seemed at first in a state of utter blankness, then came flashes of intense light, alternating with blackness, and with a keen vision of what was going on in the room around me, but no sensation of touch.\n\nI thought that I was near death; when suddenly, my soul became aware of God, who was manifestly dealing with me, handling me, so to speak, in an intense personal present reality.\n\nI felt him streaming in like light upon me.\n\nI cannot describe the ecstacy I felt.\n\nThen as I gradually awoke from the influence of the anæsthetic, the old sense of my relation to the world began to return, and the new sense of my relation to God began to fade.\n\nI suddenly leapt to my feet on the chair where I was sitting, and shrieked out, 'It is too horrible, it is too horrible, it is too horrible,' meaning that I could not bear this disillusionment.\n\nAt last I awoke .\n\n.\n\n.\n\ncalling to the two surgeons (who were frightened) 'why did you not kill me?\n\nWhy would you not let me die?\" Anæsthetic states are very similar to those strange moments experienced by epileptics during their fits of illness."

