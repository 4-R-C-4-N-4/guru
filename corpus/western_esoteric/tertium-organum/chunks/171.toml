[content]
body = "There cannot be anything which is measured by years, days, hours—there cannot be before, now, after.\n\nMoments of different epochs, divided by great intervals of time, exist simultaneously, and may touch one another.\n\nAlong with this, all the possibilities of a given moment, even those opposite to one another, and all their results up to infinity, must be actualized simultaneously with a given moment, but the length of a moment can be different on different planes.\n\n2.\n\nThere is nothing measurable by our measures, nothing commensurable with our objects, nothing greater or less than our objects.\n\nThere is nothing situated on the right or left side, above or below one of our objects.\n\nThere can be nothing similar to our objects, lines or figures and at the same time exist.\n\nDifferent points in our space, divided for us by enormous distances, may meet there.\n\n\"Distance\" or \"proximity\" are there defined by inner \"affinity\" or \"remoteness,\" by sympathy or antipathy, i.e., by properties which seem to us to be subjective.\n\n3.\n\nThere is neither matter nor motion.\n\nThere is nothing that could possibly be weighed or photographed, or expressed in the formulæ of physical energy.\n\nThere is nothing which has form , color or odor —nothing possessing the properties of physical bodies.\n\nNevertheless, the properties of the world of causes, granted an understanding of certain laws, can be considered in enumerated categories.\n\n4.\n\nThere is nothing dead or unconscious.\n\nEverything lives, everything breathes, thinks, feels; everything is conscious, and everything speaks.\n\n5.\n\nIn that world the axioms of our mathematics cannot be applied, p.\n\n269 because there is nothing finite .\n\nEverything there is infinite and, from our standpoint, variable .\n\n6.\n\nThe laws of our logic cannot act there.\n\nFrom the standpoint of our logic, that world is illogical .\n\nThis is the realm the laws of which are expressed in Tertium Organum .\n\n7.\n\nThe separateness of our world does not exist there.\n\nEverything is the whole .\n\nAnd each particle of dust, without mentioning of course every life and every conscious being, lives a life which is one with the whole and includes the whole within itself.\n\n8.\n\nIn that world the duality of our world cannot exist.\n\nThere being is not opposed to non-being .\n\nLife is not opposed to death .\n\nOn the contrary, the one includes the other within itself.\n\nThe unity and multiplicity of the I; the I and the Not-I; motion and immobility; union and separateness; good and evil; truth and falsehood—all these divisions are impossible there.\n\nEverything subjective is objective, and everything objective is subjective .\n\nThat world is the world of the unity of opposites .\n\n9.\n\nThe sensation of the reality of that world must be accompanied by the sensation of the unreality of this one.\n\nAt the same time the difference between real and unreal cannot exist there, just as the difference between subjective and objective cannot exist.\n\n10.\n\nThat world and our world are not two different worlds.\n\nThe world is one.\n\nThat which we call our world is merely our incorrect perception of the world : the world seen by us through a narrow slit.\n\nThat world begins to be sensed by us as the wondrous , i.e., as something opposite to the reality of this world , and at the same time this, our earthly world, begins to seem unreal.\n\nThe sense of the wondrous is the key to that world.\n\n11.\n\nBut everything that can be said about it will not define our relation to that world until we come to understand that even comprehending it we will not be able to grasp it as a whole, i.e., in all its variety of relations, but can think of it only in this or that aspect.\n\n12.\n\nEverything that is said about the world of causes refers also to the All .\n\nBut between our world and the All there may be many transitions."

