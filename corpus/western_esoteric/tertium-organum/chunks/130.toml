[content]
body = "The snail is a complex centre of transmutation of some physical energies into others.\n\nThis centre possesses a consciousness of its own.\n\nIt is for this reason that the snail is indivisible.\n\nIts psyche is infinitely higher than that of the stone.\n\nThe snail has the consciousness of form , i.e., the form of a snail is conscious of itself, as it were.\n\nThe form of a stone is not conscious of itself.\n\nIn organic nature where we see life, it is easier to assume the existence of a psyche.\n\nIn the snail, a living creature, we already admit without difficulty a certain kind of psyche.\n\nBut life belongs not alone to separate, individual organisms—anything indivisible is a living being.\n\nEach cell in an organism is a living being and it must have a certain psychic life.\n\nEach combination of cells having a definite function is a living being also.\n\nAnother higher combination—the organ—is a living being no less, and possesses a psychic life of its own.\n\nIndivisibility in our sphere is the sign of a definite function.\n\nIf a given phenomenon in our plane is a manifestation of that which exists on another plane, then on our side evidently, indivisibility corresponds to individuality on that other side.\n\nDivisibility on our side shows divisibility on that side.\n\nThe rationality of the divisible can express itself in a collective, non-individual reason only.\n\nBut even a complete organism is merely a section of a certain magnitude, of what we may call the life of this organism from birth to death.\n\nWe may imagine this life as a body of four dimensions extended in time.\n\nThe three-dimensional physical body is merely p.\n\n202 a section of the four-dimensional body, Linga-Sharîra .\n\nThe image of the man which we know, his \"personality,\" is also merely a section of his true personality, which undoubtedly has its separate psychic life.\n\nTherefore we may assume in man three psychic lives: first, the psychic life of the body , which manifests itself in instincts, and in the constant work of the body; second, his personality, a complex and constantly changing I, which we know, and in which we are conscious of ourselves; third, the consciousness of all life —a greater and higher I.\n\nIn our state of development these three psychic lives know one another only very imperfectly, communicating under narcosis only, in trance, in ecstacy, in sleep, in hypnotic and mediumistic states, i.e., in other states of consciousness.\n\nIn addition to our own psychic lives, with which we are indissolubly bound, but which we do not know, we are surrounded by various other psychic lives which we do not know either.\n\nThese lives we often feel , they are composed of our lives.\n\nWe enter into these lives as their component parts, just as into our life enter different other lives.\n\nThese lives are good or evil spirits, helping us or precipitating evil.\n\nFamily , clan, nation, race—any aggregate to which we belong (such an aggregate undoubtedly possesses a life of its own), any group of men having its separate function and feeling its inner connection and unity, such as a philosophical school, a \"church,\" a sect, a masonic order, a society, a party, etc., etc., is undoubtedly a living being possessing a certain rationality.\n\nA nation, a people, is a living being; humanity is a living being also.\n\nThis is the Grand Man , ADAM KADMON of the Kabalists.\n\nADAM KADMON is a being living in men, uniting in himself the lives of all men.\n\nUpon this subject, H.\n\nP.\n\nBlavatsky, in her great work, The Secret Doctrine (Vol.\n\nIII, p.\n\n146), has this to say: .\n\n.\n\n."

