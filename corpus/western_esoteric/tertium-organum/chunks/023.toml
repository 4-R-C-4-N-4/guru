[content]
body = "But if I should prove that a house, i.e., a physical fact, may exist, it does not at all mean that it exists really.\n\nIf I prove that a man may own the house it is no proof that he owns it.\n\nOur relation to an idea and to a house are quite different, It is possible by a certain effort to destroy a house—to burn, to wreck it.\n\nThe house will cease to exist.\n\nBut suppose you attempt to destroy, by an effort, an idea.\n\nThe more you try to contest, argue, refute, ridicule, the more the idea is likely to spread, grow, strengthen.\n\nAnd contrariwise, silence, oblivion, non-action , \"non-resistance\" will exterminate, or in any case will weaken the idea.\n\nSilence, oblivion, will not wreck a house, will not hurt a stone.\n\np.\n\n30 [paragraph continues] It is clear that the existence of a house and that of an idea are quite different existences.\n\nOf such different existences we know very many.\n\nA book exists, and also the contents of a book .\n\nNotes exist, and so does the music that the notes combine to make .\n\nA coin exists, and so does the purchasing value of a coin .\n\nA word exists, and the energy which it contains.\n\nWe discern on the one hand, a whole series of physical facts , and on the other hand, a series of metaphysical facts .\n\nAs facts of the first kind exist, so also do facts of the second kind exist, but differently.\n\nFrom the usual positivist point of view it will seem naive in the highest degree to speak of the purchasing value of a coin separately from the coin; of the energy of a word separately from the word; of the contents of a book separately from the book, and so on.\n\nWe all know that these are only \"what people say,\" that in reality purchasing value , energy of a word , and contents of a book do not exist, that by these conceptions we only denote a series of phenomena in some way linked with coin, word, book, but in substance quite separate from them.\n\nBut is it so?\n\nWe decided to accept nothing as given, consequently we shall not negate anything as given.\n\nWe see in things, in addition to what is external, something internal.\n\nWe know that this internal element in things constitutes a continuous part of things, usually their principal substance .\n\nAnd quite naturally we ask ourselves, where is this internal element, and what does it represent in and by itself.\n\nWe see that it is not embraced within our space.\n\nWe begin to conceive of the idea of a \"higher space\" possessing more dimensions than ours.\n\nOur space then appears to be somehow a part of higher space, i.e., we begin to believe that we know, feel, and measure only part of space, that part which is measurable in terms of length, width and height.\n\n______ As was said before, we usually regard space as a form of the universe, or as a form of the matter of the universe.\n\nTo make this p.\n\n31 clear it is possible to say that a \"cube\" is the form of the matter in a cube; a \"sphere\" is the form of the matter in a sphere; \"space\"—an infinite sphere—is the form of the entire matter of the universe.\n\nH.\n\nP.\n\nBlavatsky, in The Secret Doctrine , has this to say about space: The superficial absurdity of assuming that Space itself is measurable in any direction is of little consequence.\n\nThe familiar phrase (the fourth dimension of space) can only be an abbreviation of the fuller form—the \" Fourth dimension of Matter in Space .\".\n\n.\n\n.\n\nThe progress of evolution may be destined to introduce us to new characteristics of matter.\n\n.\n\n."

