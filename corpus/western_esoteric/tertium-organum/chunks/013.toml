[content]
body = "But such a procedure constitutes a departure from facts, and all such considerations of the world and of the self, to the ordinary non-philosophical mind, will not have the character of obviousness.\n\nOn the contrary the sole obvious fact remains the antithesis of I and Not-I —our inner psychic life and the outer world., Further on we shall return to this fundamental thesis.\n\nBut thus far we have no basis on which to found a contradiction of the obvious fact of the existence of ourselves —i.e., of our inner life—and of the world in which we live.\n\nThis we shall therefore accept as the given .\n\nThis however is the only thing that we have the right to accept as p.\n\n13 given: all the rest demands proof and definition in terms of these two given data.\n\nSpace , with its extension; time , with the idea of before , now , after ; quantity, mass, substantiality; number, equality and inequality; identity and difference; cause and effect; the ether, atoms, electrons, energy, life, death—all things that form the foundation of our so-called knowledge: these are the unknown things .\n\nThe existence in us of psychic life, i.e., of sensations, perceptions, conceptions, reasoning, feeling, desires etc., and the existence of the world outside of us—from these two fundamental data immediately proceed our common and clearly understood division of everything that we know into subjective and objective .\n\nEverything that we accept as a property of the world, we call objective; and everything that we accept as a property of our psyche, we call subjective.\n\nThe subjective world we recognize directly : it is in ourselves—we are one with it.\n\nThe objective world we picture to ourselves as existing somewhere outside of us—we and it are different things.\n\nIt seems to us that if we should close our eyes, then the objective world would continue to exist, such as we just saw it; and if our inner life were to disappear, so would the subjective world disappear—yet the objective world would exist as before, as it existed at the time when we were not; when our subjective world was not.\n\nOur relation to the objective world is most exactly defined by the fact that we perceive it as existing in time and space ; otherwise, out of these conditions, we can neither conceive nor imagine it.\n\nIn general, we say that the objective world consists of things and phenomena, i.e., things and changes in states of things.\n\nThe PHENOMENA exist for us in time; the THINGS, in space.\n\nBut such a division of the subjective and the objective world does not satisfy us.\n\nBy means of reasoning we can establish the fact that in reality we know only our own sensations, perceptions and conceptions, and we cognize the objective world by projecting outside of ourselves the causes of our sensations, presupposing them to contain these causes.\n\nThen we find that our knowledge of the subjective world, and of p.\n\n14 the objective world also, can be true and false , correct and incorrect.\n\nThe criterion for the definition of correctness or incorrectness of our knowledge of the subjective world is the form of the relations of one sensation to others, and the force and character of the sensation itself .\n\nIn other words, the correctness of one sensation is verified by the comparison of it with another of which we are more sure, or by the intensity and \"taste\" of a given sensation .\n\nThe criterion for the definition of correctness or incorrectness of our knowledge of the objective world is the very same .\n\nIt seems to us that we define the things and phenomena of the objective world by means of comparing them among themselves; and we think we find the laws of their existence outside of us , and independent of our perception of them.\n\nBut it is an illusion.\n\nWe know nothing about things separately from us ; and we have no other means of verifying the correctness of our knowledge of the objective world than BY SENSATIONS."

