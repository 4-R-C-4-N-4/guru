[content]
body = "Only after four days did he begin to discern them, and after an interval of two weeks, when his eyes were accustomed to the light, he started to use his sight practically, for the discernment of objects.\n\nHe was shown all the colors of the spectrum and he learned to distinguish them very soon, except yellow and green, which he confused for a long time.\n\nThe cube, sphere and pyramid, p.\n\n100 when placed before him seemed to him like the square, the flat disc, and the triangle.\n\nWhen the flat disc was put alongside the sphere he distinguished no difference between them.\n\nWhen asked what impression both kinds of figures produced on him just at first, he said that he noticed at once the difference between the cube and the sphere, and understood that they were not drawings, but was unable to deduce from them their relation to the square and to the circle, until he felt in his finger tips the desire to touch these objects.\n\nWhen he was allowed to take the cube, sphere and pyramid in his hands he at once identified these solids by the sense of touch, and wondered very much that he was unable to recognize them by sight.\n\nHe lacked the perception of space, perspective.\n\nAll objects seemed flat to him: though he knew that the nose protrudes, and that the eyes are located in cavities, the human face seemed flat to him.\n\nHe was delighted with his recovered vision, but in the beginning it fatigued him to exercise it: the impressions oppressed and exhausted him .\n\nFor this reason.\n\nthough possessing perfect sight, he sometimes turned to the sense of touch as to repose."

