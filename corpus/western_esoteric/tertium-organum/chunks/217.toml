body = "p.\n\n333 CONCLUSION In conclusion I wish to speak of those wonderful words, full of profound mystery from the Apocalypse and the apostle Paul's Epistle to the Ephesians , which are placed as the epigraph of this book.\n\nThe Apocalyptic angel swears that THERE SHALL BE TIME NO LONGER.\n\nWe know not what the author of the Apocalypse wanted to convey, but we do know those STATES OF SPIRIT when time disappears.\n\nWe know that in this very thing, in the change of the time-sense , the beginning of the fourth form of consciousness is expressed, the beginning of the transition to COSMIC CONSCIOUSNESS.\n\nIn this and in phrases similar to it, the profound philosophical content of the evangelical teaching sometimes flashes forth.\n\nAnd the understanding of the fact that the MYSTERY OF TIME is the first mystery to be revealed is the first step toward the development of cosmic consciousness along the intellectual path.\n\nBut what did the Apocalyptic sentence mean?\n\nDid it mean precisely what we are now able to construe in it—or was it simply a bit of verbal art, a rhetorical figure of speech, the accidental harping of a string which has continued to sound up to our own time, through centuries and millenniums, with such a wonderfully powerful, true and beautiful tone of thought?\n\nWe know not now, nor shall we ever, but the words are full of splendor, and we may accept them as a symbol of remote and inaccessible truth.\n\nThe apostle Paul's words are even more strange, even more startling by reason of their mathematical exactness.\n\n(A friend showed me these words in A.\n\nDobroluboff's From the Book Invisible , who saw in them a direct reference to \"the fourth measure of space.\") Truly, what does this mean?\n\n.\n\n.\n\n.\n\n.\n\nThat ye, being rooted and grounded in love , may be able to comprehend with all saints what is the BREADTH and LENGTH and DEPTH and HEIGHT.\n\np.\n\n334 First of all, what does the comprehension of breadth and length and depth and height mean?\n\nWhat is it but the comprehension of space?\n\nAnd we now know that the comprehension of the mysteries of space is the beginning of the higher comprehension.\n\nThe apostle says that \"being rooted and grounded in love , with all saints \" they may comprehend what space is .\n\nHere arises the question: why must love give comprehension?\n\nThat love leads to sanctity —this is easily understood.\n\nLove in the sense that the apostle Paul understands it (Chapter XIII of the First Epistle to the Corinthians ) is the highest of all emotions, the synthesis , the blending of all highest emotions.\n\nIncontestably, this leads to sanctity .\n\nSanctity : that is the state of the spirit liberated from the duality of man, from his eternal disharmony of soul and body.\n\nIn the language of the apostle Paul sanctity meant even a little less than in our contemporary language.\n\nHe called all members of his church saints ; sanctity meant to him righteousness, morality, religiosity.\n\nWe say that all this is merely the path to sanctity .\n\nSanctity is something more—something attained .\n\nBut it is after all immaterial how we shall understand his words—in his meaning or in ours—sanctity is a superhuman quality.\n\nIn the region of morality it corresponds to genius in the region of mind.\n\nLove is the path to sainthood .\n\nBut with sanctity the apostle Paul unites KNOWLEDGE.\n\nSaints comprehend what is the breadth and length and depth and height; and he says that all—through love—may comprehend this with them.\n\nBut may comprehend what, exactly?\n\nCOMPREHEND SPACE.\n\nBecause \"breadth and length and depth and height\" translated into our language of shorter definitions actually means space .\n\nThis last is the most strange.\n\nHow could the apostle Paul possibly KNOW that sanctity gives a new understanding of space?"

