body = "New forms of knowledge.\n\nThe ideas of Plotinus.\n\nDifferent forms of consciousness.\n\nSleep (the potential state of consciousness).\n\nDreams (consciousness en-closed in itself, reflected from itself).\n\nWaking consciousness (dualistic sensation of the world, the division of the I and the Not-I).\n\nEcstasy ( the liberation of the Self).\n\nTuriya (the absolute consciousness of all, as of the self).\n\n\"The dewdrop slips into the shining sea.\" Nirvana .\n\n232 CHAPTER XX The sense of infinity.\n\nThe neophyte's first ordeal.\n\nAn intolerable sadness.\n\nThe loss of everything real.\n\nWhat would an animal feel on becoming a man?\n\nThe p.\n\nxi transition to the new logic.\n\nOur logic as founded on the observation of the laws of the phenomenal world.\n\nIts invalidity for the study of the world of noumena.\n\nThe necessity for another logic.\n\nAnalogy between the axioms of logic and of mathematics.\n\nTWO MATHEMATICS.\n\nThe mathematics of real magnitudes (infinite and variable); and the mathematics of unreal, imaginary magnitudes (finite and constant).\n\nTransfinite numbers—numbers lying beyond INFINITY.\n\nThe possibility of different infinities.\n\n243 CHAPTER XXI Man's transition to a higher logic.\n\nThe necessity for rejecting everything \"real.\" \"Poverty of the spirit.\" The recognition of the infinite alone as real.\n\nLaws of the infinite.\n\nLogic of the finite—the Organon of Aristotle and the Novum Organum of Bacon.\n\nLogic of the infinite—Tertium Organum.\n\nThe higher logic as an instrument of thought, as a key to the mysteries of nature, to the hidden side of life, to the world of noumena.\n\nA definition of the world of noumena on the basis of all the foregoing.\n\nThe impression of the noumenal world on an unprepared consciousness.\n\n\"The thrice unknown darkness in the contemplation of which all knowledge is resolved into ignorance.\" 254 CHAPTER XXII Theosophy of Max Müller.\n\nAncient India.\n\nPhilosophy of the Vedânta.\n\nTat twam asi .\n\nKnowledge by means of the expansion of consciousness as a reality.\n\nMysticism of different ages and peoples.\n\nUnity of experiences.\n\nTertium Organum as a key to mysticism.\n\nSigns of the noumenal world.\n\nTreatise of Plotinus On Intelligible Beauty as a misunderstood system of higher logic Illumination in Jacob Boehme.\n\n\"A harp of many strings, of which each string is a separate instrument, while the whole is only one harp.\" Mystics of The Love of the Good .\n\nSt.\n\nAvva Dorotheus and others.\n\nClement of Alexandria.\n\nLao-Tzu^ and Chuang-Tzu.\n\nLight on the Path .\n\nThe Voice of the Silence .\n\nMohammedan mystics.\n\nPoetry of the Sufis.\n\nMystical states under narcotics.\n\nThe Anaestetic Revelation .\n\nExperiments of Prof.\n\nJames.\n\nDostoyevsky on \"time\" ( The Idiot ).\n\nInfluence of nature on the soul of man.\n\n270 CHAPTER XXIII Cosmic Consciousness of Dr.\n\nBucke.\n\nThe three forms of consciousness according to Dr.\n\nBucke.\n\nSimple consciousness, or the consciousness of animals.\n\nSelf-consciousness, or the consciousness of men.\n\nDr.\n\nBucke's fundamental error.\n\nCosmic consciousness.\n\nIn what is it expressed?\n\nSensation, perception, concept, higher MORAL concept—creative intuition.\n\nMen of cosmic consciousness.\n\nAdam's fall into sin.\n\nThe knowledge of good and evil.\n\nChrist and the salvation of man.\n\nCommentary on Dr.\n\nBucke's book.\n\nBirth of the new humanity.\n\nTwo races.\n\nSUPERMAN.\n\nTable of the four forms of the manifestation of consciousness 306 CONCLUSION 333 TABLE OF THE FOUR FORMS OF CONSCIOUSNESS 337"

