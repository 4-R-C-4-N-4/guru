body = "p.\n\n23 CHAPTER II A new view of the Kantian problem.\n\nThe books of Hinton.\n\nThe \"space-sense\" and its evolution.\n\nA system for the development of a sense of the fourth dimension by exercises with colored cubes.\n\nThe geometrical conception of space.\n\nThree perpendiculars—why three?\n\nCan everything existing be measured by three perpendiculars?\n\nThe indices of existence.\n\nReality of ideas.\n\nInsufficient evidence of the existence of matter and motion.\n\nMatter and motion are only logical concepts, like \"good\" and \"evil.\" AS already stated, Kant propounded the problem, but gave no solution of it, nor did he point the way to a solution.\n\nAnd not one of the known commentators, interpreters, followers or adversaries of Kant has found a solution, or the way to it.\n\nI find the first flashes of a right understanding of the Kantian problem, and the first suggestions in regard to a possible way toward its solution, in the attempts at a new treatment of the problem of space and time, involving the concept of the \"fourth dimension\" and higher dimensions in general.\n\nAn interesting synopsis of many things developed in this direction is that of C.\n\nH.\n\nHinton, author of the books, A New Era of Thought , and The Fourth Dimension .\n\nHinton notes, among other things, that in commenting upon Kantian ideas, only their negative side is usually insisted upon, namely, the fact that we can cognize things in a sensuous way, in terms of space and time only, is regarded as an obstacle , hindering us from seeing what things in themselves really are, preventing the possibility of cognizing them as they are, imposing upon them that which is not inherent in them, shutting them off from us.\n\nBut [says Hinton] if we take Kant's statement simply as it is—not seeing in the spatial conception a hindrance to right receptivity—that we apprehend things by means of space —then it is equally allowable to consider our space sense not as a negative condition, hindering our perception of the world, but as a positive means by which the mind grasps its experiences, i.e., by which we cognize the world.\n\np.\n\n24 There is, in so many books in which the subject is treated, a certain air of despondency—as if this space apprehension were a kind of veil which shut us off from nature.\n\nBut there is no need to adopt this feeling.\n\nThe first postulate of this book is a full recognition of the fact that it is by means of space that we apprehend what is.\n\nSpace is the instrument of the mind.\n\nVery often a statement which seems to be most deep and abstruse and hard to grasp, is simply the form into which deep thinkers have thrown a very simple and practical observation.\n\nAnd for the present let us look on Kant's great doctrine of space from a practical point of view, and it comes to this—it is important to develop the space sense, for it is the means by which we think about real things.\n\nNow according to Kant [Hinton goes on to say] the space sense, or the intuition of space, is the most fundamental power of the mind.\n\nBut I do not find anywhere a systematic and thorough-going education of the space sense.\n\nIt is left to be organized by accident.\n\nYet the special development of the space sense makes us acquainted with a whole series of new conceptions.\n\nFichte, Schelling, Hegel, have developed certain tendencies and have written remarkable books, but the true successors of Kant are Gauss and Lobachevsky.\n\nFor if our intuition of space is the means whereby we apprehend, then it follows that there may be different kinds of intuitions of space.\n\nWho can tell what the absolute space intuition is?\n\nThis intuition of space must be colored, so to speak, by the conditions (of psychical activity) of the being which uses it."

