[content]
body = "This was observed at the very dawn of the establishment of our experimental science—observed by Roger Bacon, and formulated several centuries later by his famous namesake, Francis Bacon, Lord Verulam, in the treatise Novum Organum —the \"New Instrument\" (of thought).\n\nBriefly, the formulation of Bacon may be reduced to the following: That which was A, will be A .\n\nThat which was Not-A, will be Not-A .\n\nEverything was and will be, either A or Not-A .\n\nUpon these formula, acknowledged or unacknowledged, all our scientific experience is built, and upon them, too, is shoe-making founded, because if a shoemaker could not be sure that the leather bought yesterday would be leather tomorrow, in all probability he would not venture to make a pair of shoes, but would find some other more profitable employment.\n\nThe formulæ of logic, such as those both of Aristotle and of Bacon, are themselves deduced from the observation of facts, and do not and cannot include anything except the contents of these facts.\n\nThey are not the laws of reasoning , but the laws of the outer world as it is perceived by us, or the laws of our relation to the outer world.\n\nCould we represent to ourselves the \"logic\" of an animal we should understand its relation to the outer world.\n\nOur cardinal error concerning the psychology of animals consists in the fact that p.\n\n94 we ascribe to them our own logic.\n\nWe assume that logic is one , that our logic is something absolute, existing outside and independent of us, while as a matter of fact, logic but formulates the laws of the relations of our psyche to the outside world, or the laws which our psyche discovers in the outside world.\n\nAnother psyche will discover other laws.\n\n______ The logic of animals will differ from ours, first of all, from the fact that it will not be general .\n\nIt will exist separately for each case, for each perception.\n\nCommon properties, class properties, and the generic and specific signs of categories will not exist for animals.\n\nEach object will exist in and by itself, and all its properties will be the specific properties of it alone.\n\nThis house and that house are entirely different objects for an animal, because one is its house and the other is a strange house.\n\nGenerally speaking, we recognize objects by the signs of their similarity; the animal must recognize them by the signs of their difference.\n\nIt remembers each object by that sign which had for it the greatest emotional meaning.\n\nIn such a manner, i.e., by their emotional tones, perceptions are stored in the memory of an animal.\n\nIt is clear that such perceptions are much more difficult to store up in the memory, and therefore the memory of an animal is more burdened than ours, although in the amount of knowledge and in the quantity of that which is preserved in the memory, it stands far below us.\n\nAfter seeing an object once, we refer it to a certain class, genus and species, place it under this or that concept, and fix it in the mind by means of some \"word,\" i.e., algebraical symbol; then by another, defining it, and so on.\n\nThe animal has no concepts: it has not that mental algebra by the help of which we think.\n\nIt must know always a given object , and must remember it with all its signs and peculiarities.\n\nNo forgotten sign will return.\n\nFor us, on the other hand, the principal signs are contained in the concept with which we have correlated that object, and we can find it in our memory by means of the sign for it.\n\nFrom this it is clear that the memory of an animal is more burdened than ours, and this is the principal hindering cause to the p.\n\n95 mental evolution of an animal.\n\nIts mind is too busy .\n\nIt has no time to develop."

