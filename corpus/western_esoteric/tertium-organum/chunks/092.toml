[content]
body = "The forces which are actually manifesting themselves in certain definite actions are called free, or live forces; but as regards free forces it is necessary to differentiate those forces which are liberating, setting free, from the forces which are liberated, or set free.\n\nAn enormous difference exists between the liberation of a force and its transformation into another.\n\nWhen one kind of motion transforms itself into another kind, the amount of free force remains the same; and contrariwise, when one force liberates another, the amount of free force changes.\n\nThe free force of an irritation liberates the tied-up forces of a nerve.\n\nAnd this liberation of tied-up forces is proceeding at each point of the nerve.\n\nThe first motion increases like a fire, like a snow-slide carrying along with it new and ever new drifts.\n\nIt is for this reason that the action (phenomenon) of sensation need not be exactly equal to the action of irritation.\n\nLet us look more broadly at the relation between liberated and liberating forces in the different kinds of phenomena.\n\nWe shall discover that sometimes an almost negligible amount of physical force may liberate an enormous, a colossal amount of physical energy.\n\nBut all that we can ever assemble of physical p.\n\n140 force is powerless to liberate a single iota of that vital energy necessary for the independent existence of a single microscopic living organism.\n\nThe force contained in living organisms , the vital force, is capable of liberating infinitely greater amounts of vital and also of physical energy than the force of motion.\n\nThe microscopic living cell is capable of infinite dissemination, to evolve new species, to cover continents with vegetation, to fill the oceans with seaweed, to build islands out of coral, to deposit powerful layers of coal, etc., etc.\n\nConcerning the latent energy contained in the phenomena of consciousness , i.e., in thoughts, feelings, desires, we discover that its potentiality is even more immeasurable, more boundless.\n\nFrom personal experience, from observation, from history, we know that ideas, feelings, desires, manifesting themselves, can liberate enormous quantities of energy, and create infinite series of phenomena.\n\nAn idea can act for centuries and millenniums and only grow and deepen, evoking ever new series of phenomena, liberating ever fresh energy.\n\nWe know that thoughts continue to live and act when even the very name of the man who created them has been converted into a myth, like the names of the founders of ancient religions, the creators of the immortal poetical works of antiquity—heroes, leaders, prophets.\n\nTheir words are repeated by innumerable lips, their ideas are studied and commented upon.\n\nTheir preserved works are translated, printed, read, studied, staged, illustrated.\n\nAnd this is done not only with the masterpieces of men of genius, but some single little verse may live millenniums, making hundreds of men work for it, serve it, in order to transmit it further.\n\nObserve how much of potential energy there is in some little verse of Pushkin or Lermontoff.\n\nThis energy acts not only upon the feelings of men, but by reason of its very existence it acts upon their will.\n\nSee how vital and immortal are the words, thoughts and feelings of half-mythical Homer—how much of \"motion\" each word of his, during the time of its existence, has evoked.\n\nUndoubtedly each thought of a poet contains enormous potential force, like the power confined in a piece of coal or in a living cell, but infinitely more subtle, imponderable and potent.\n\nThis remarkable correlation of phenomena may be expressed in the following terms: the farther a given phenomenon is from the p.\n\n141 visible and sensed—from the physical, the farther it is from matter—the more there is in it of hidden force, the greater the quantity of phenomena it can produce, can leave in its wake, the greater amount of energy it can liberate, and so the less it is dependent upon time."

