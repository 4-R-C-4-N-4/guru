[content]
body = "______ The formation of perceptions leads to the formation of words , and the appearance of speech .\n\nThe beginning of speech may appear on the lowest level of psychic life, during the period of living by sensations, and it will become more complex during the period of living by perceptions; p.\n\n82 but unless there be concepts it will not be speech in the true meaning of the word.\n\nOn the lower levels of psychic life certain sensations can be expressed by certain sounds.\n\nTherefore it is possible to express common impressions of horror, anger, pleasure.\n\nThese sounds may serve as signals of danger, as commands, demands, threats, etc., but it is impossible to say much by means of them.\n\nIn the further development of speech, if words or sounds express perceptions , as in the case of children, this means that the given sound or the given word designates only that object to which it refers.\n\nFor each new similar object must exist another new sound, or a new word.\n\nIf the speaker designates different objects by one and the same sound or word, it means that in his opinion the objects are the same, or that knowingly he is calling different objects by the same name.\n\nIn either case it will be difficult to understand him, and such speech cannot serve as an example of clear speech.\n\nFor instance, if a child call a tree by a certain sound or word, having in view that tree only, and not knowing other trees at all, then any new tree which he may see he will call by a new word, or else he will take it for the same tree.\n\nThe speech in which \"words\" correspond to perceptions is as it were made up of proper nouns.\n\nThere are no appellative nouns; and not only substantives, but verbs, adjectives and adverbs have the character of \"proper nouns\"—that is, they apply to a given action, to a given quality, or to a given property.\n\nThe appearance of words of a common meaning in human speech signifies the appearance of concepts in consciousness.\n\nSpeech consists of words, each word expressing a concept.\n\nConcept and word are in substance one and the same thing; only the first (the concept) represents, so to speak, the inner side, and the second (the word) the outer side.\n\nOr, as says Dr.\n\nR.\n\nM.\n\nBucke (the author of the book Cosmic Consciousness , about which I shall have much to say later on), \"A word (i.e., concept) is the algebraical sign of a thing.\" It has been noticed thousands of times that the brain of a thinking man does not exceed in size the brain of a non-thinking wild man in anything like the proportion in which the mind of the thinker exceeds the mind of the savage.\n\nThe reason is that the brain of a Herbert Spencer has very little more work to do than has the brain of a native Australian, for p.\n\n83 this reason, that Spencer does all his characteristic mental work by signs or counters which stand for concepts, while the savage does all or nearly all his by means of cumbersome recepts.\n\nThe savage is in a position comparable to that of the astronomer who makes his calculations by arithmetic, while Spencer is in the position of one who makes them by algebra.\n\nThe first will fill many great sheets of paper with figures and go through immense labor; the other will make the same calculations on an envelope and with comparatively little mental work.\n\n1 In our speech words express concepts or ideas.\n\nBy ideas are meant broader concepts, not representing the group sign of similar perceptions, but embracing various groups of perceptions, or even groups of concepts .\n\nTherefore an idea is a complex or an abstract concept."

