[content]
body = "And at last he will be able to see the sun, and not mere reflections of him in the water, but he will see him as he is in his own proper place, and not in another, and he will contemplate his nature.\n\nCertainly.\n\nAnd after this he will reason that the sun is he who gives the seasons and the years, and is the guardian of all that is in the visible world, and in a certain way the cause of all things which he and his fellows have been accustomed to behold?\n\nClearly, he said, he would come to the other first and to this afterwards.\n\nAnd when he remembered his old habitation, and the wisdom of the den and his fellow-prisoners, do you not suppose that he would felicitate himself on the change, and pity them?\n\nCertainly, he would.\n\nAnd if they were in the habit of conferring honors on those who were quickest to observe and remember and foretell which of the shadows went before, and which followed after, and which were together, do you think that he would care for such honors and glories, or envy the possessors of them?\n\nWould he not say with Homer,— \"Better to be a poor man, and have a poor master,\" and endure anything, than to think and live after their manner?\n\nYes, he said, I think that he would rather suffer anything than live after their manner.\n\nImagine once more, I said, that such an one coming suddenly out of the sun were to be replaced in his old situation, is he not certain to have his eyes full of darkness?\n\nVery true, he said.\n\nAnd if there were a contest, and he had to compete in measuring the shadows with the prisoners who have never moved out of the den, during the time that his sight is weak, and before his eyes are steady (and the time which would be needed to acquire this new habit of sight might be very considerable), would he not be ridiculous?\n\nMen would say of him that up he went and down he comes without his eyes; and that there was no use in even thinking of ascending: and if anyone tried to loose another and lead him up to the light, let them only catch the offender in the act, and they would put him to death.\n\nNo question, he said.\n\nThis allegory, I said, you may now append to the previous argument; the prison is the world of sight, the light of the fire is the sun, the ascent p.\n\n165 and vision of the things above you may truly regard as the upward progress of the soul into the intellectual world.\n\nAnd you will understand that those who attain to this beatific vision are unwilling to descend to human affairs; but their souls are ever hastening into the upper world in which they desire to dwell.\n\nAnd is there anything surprising in one who passes from divine contemplations to human things, misbehaving himself in a ridiculous manner.\n\nThere is nothing surprising in that, he replied.\n\nAny one who has common sense will remember that the bewilderments of the eyes are of two kinds, and arise from two causes, either from coming out of the light or from going into the light, which is true of the mind's eye, quite as much as of the bodily eye; and he who remembers this when he sees the soul of any one whose vision is perplexed and weak, will not be too ready to laugh; he will first ask whether that soul has come out of the brighter life, and is unable to see because unaccustomed to the dark, or having turned from darkness to the day is dazzled by excess of light.\n\nAnd then he will count one happy in his condition and state of being.\n\nFootnotes 162:1 \"The Dialogues of Plato,\" Transl.\n\nby B.\n\nJowett, Vol.\n\nII, pp.\n\n341-345, Chas.\n\nScribner's Sons, N.\n\nY.\n\n1911."

