[content]
body = "p.\n\n337 TABLE OF THE FOUR FORMS OF THE MANIFESTATION OF CONSCIOUSNESS For ease of online reading, I have exchanged the rows and columns in this chart.—JBH 1ST FORM 2ND FORM 3RD FORM 4TH FORM THE SENSE OF SPACE AND TIME The sense of one-dimensional space.\n\nThe world on the line.\n\nThe line as space, everything else as time.\n\nEverything except things lying on this line is in motion.\n\nThe sense of two-dimensional space.\n\nThe world on the plane.\n\nThe plane as space, everything else as time.\n\nAngles and curves as motions.\n\nThe sense of three-dimensional space.\n\nThe world in an infinite sphere.\n\nThe sphere as space.\n\nEverything else as time.\n\nPhenomena as motions.\n\nA becoming and changing universe.\n\nThe sense of four-dimensional space.\n\nSpatial sensation of time.\n\nPSYCHOLOGY Appearance of the first sensation.\n\nSensation a unit.\n\nIts division into two.\n\nThe gradual evolution of sensations and the accumulation of remembrances concerning them.\n\nPerception.\n\nThe expression of sensations by cries, sounds, motions.\n\nThe absence of words and speech.\n\nWere there speech it would consist of substantives only.\n\nConcept.\n\nWords.\n\nJudgment.\n\nSyllogism.\n\nReasoning.\n\nSpeech.\n\nWritten language.\n\nAllegory.\n\nEmotions.\n\nSelf-consciousness.\n\nNew sensations.\n\nHigher emotions.\n\nExpansion of concepts.\n\nDirect knowledge.\n\nSymbolism.\n\nCosmic consciousness.\n\nLOGIC The absence of thinking, or a confused thinking of the 2nd form.\n\nThis is this.\n\nThat is that.\n\nThis is not that.\n\nThe beginnings of logic.\n\nThe logic of the uniqueness of each separate thing.\n\nA is A.\n\nA is not Not-A.\n\nEverything is either A or Not-A.\n\nDualistic logic.\n\nA logic of antitheses.\n\nSyllogism.\n\nA is both A and Not-A.\n\nTat twam asi .\n\nThou art that .\n\n\"Tertium Organum.\" Logic of the unity of all.\n\nMATHEMATICS The absence of numeration, or a confused numeration of the 2nd form.\n\nThe comparison of separate visible objects or separate perceptions.\n\nThe direct sensation of quantity.\n\nComputation within the limits of this sensation.\n\nEvery magnitude is equal to itself.\n\nThe part is less than the whole, etc.\n\nFinite and constant numbers.\n\nThe geometry of Euclid.\n\nA magnitude can be not equal to itself.\n\nThe part can be equal to the whole, etc.\n\nMetageometry.\n\nMathematics of variable and infinite magnitudes.\n\nFORMS OF ACTIONS Reflex, unconscious, responsive action to external irritation.\n\nInstinct.\n\n\"Emotional\" end expedient action without consciousness of results.\n\nSeeming consciousness.\n\nInability to manipulate a lever.\n\nThe consciousness of the purpose of actions performed.\n\nThe possibility of a consciousness of results.\n\nThe cause of actions in the outer world in impressions received from the outer world.\n\nThe impossibility of in dependent actions without impulses coming from the outside.\n\nThe starting of conscious actions.\n\nThe starting of actions with the understanding of their cosmical meaning and purposes.\n\nThe commencement of independent actions proceeding from oneself .\n\nMAGIC.\n\nMORALS Unconscious actions (like the actions of a man asleep).\n\nThe beginnings of the maternal, family, and tribal instincts.\n\nLaws of the life of the species as a condition of evolution.\n\nThe unconscious submission to the \"group soul\" of the species manifesting through instincts.\n\nLogical and conventional division into good and evil.\n\nThe submission to the group consciousness of the family, of the clan, of the tribe, of the nation, of humanity, of the class, of the party, of a custom, of a fashion, etc.\n\nThe return to the law inside oneself.\n\nA new conscience .\n\nEmancipation from submission to the group-consciousness.\n\nThe realization of oneself as an independent unit.\n\nFORMS OF CONSCIOUSNESS Potential consciousness.\n\nConsciousness in a latent state—asleep."

