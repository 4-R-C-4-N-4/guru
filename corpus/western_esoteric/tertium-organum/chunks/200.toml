[content]
body = "For some strange reason men do not care to accept this answer; and they desire at all costs to receive an answer in some form that they like, refusing to recognize anything that is different from that form.\n\nThey require the solution of the destiny of man as they fancy him, and they do not want to recognize that man can and must become entirely different.\n\nIn him there are not as yet manifest those faculties which will create his future.\n\nMan must not and cannot remain such as he is now.\n\nTo think of the future of this man is just as absurd as to think of the future of a child as p.\n\n308 if it were always going to remain a child.\n\nThe analogy is not quite complete, for the reason that probably only a small part of humanity is capable of growth, but nevertheless this comparison paints a true picture of our usual attitude toward this question.\n\nAnd the fate of that greater part of humanity which will prove incapable of growth, depends not upon itself, but upon that minority which will progress.\n\nOnly inner growth, the unfoldment of new forces, will give to man a correct understanding of himself, his ways, his future, and give him power to organize life on earth.\n\nAt the present time the general concept \"man\" is too undifferentiated and includes within himself entirely different categories , those capable of development and those incapable.\n\nIn men capable of development, new faculties are stirring into life, though not as yet manifest, because for their manifestation they require a special culture, a special education.\n\nThe new conception of humanity disposes of the idea of equality , which after all does not exist, and it tries to establish the signs and facts of the differences between men, because humanity will need soon to divide the \"progressing\" from the \"incapable of progress\"— the wheat from the tares , for the tares are growing too fast, and choke the growth of the wheat.\n\nThis is the key to the understanding of our life, and this key was found long ago!\n\nThe enigma was solved long ago .\n\nBut different thinkers, living in different epochs, finding the solution, expressed it differently, and often, not knowing one another, trod the same path amid enormous difficulties, unaware of their predecessors and contemporaries who had gone and were going along the selfsame path.\n\nIn the world's literature there exist books, usually little known, which accidentally or by design may happen to be assembled on one shelf in one library.\n\nThese, taken together, will yield so clear and complete a picture of human existence, its path and its goal, that there will be no further doubts about the destiny of humanity (though only its minor part), but a destiny of quite a different sort from those hard labors of digging through the globe, which positive philosophy, \"historical materialism\" and \"socialism\" have in store for humankind .\n\nAnd if it seems to us that we do not as yet know our destiny, if we still doubt, and do not dare to part with the hopeless \"positivistic\" view of life, it is primarily because men of different categories, p.\n\n309 having quite different futures, are commingled into one in our perception; and secondarily because the necessary ideas by means of which we might understand the true relation of forces have not won for themselves their rightful place in official science—do not represent any recognized division or branch of science; it is rarely possible to find them all in one book and it is even rarely possible to find books expressing these ideas assembled together.\n\nWe do not understand many things because we too easily and too arbitrarily specialize.\n\nPhilosophy, religion, psychology, mathematics, the natural sciences, sociology, the history of culture, art—each has its own separate literature.\n\nThere is no complete whole at all.\n\nEven the little bridges between these separate literatures are built very badly and unsuccessfully, while they are often altogether absent."

