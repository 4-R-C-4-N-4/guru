[content]
body = "They may vary infinitely, i.e., may seem various, ever new from some new standpoint, but they cannot utterly vanish, any more than they can cease, come to an end.\n\nAll that is highest to which we shall come in the understanding of the meaning, the significance, of the soul of any phenomenon, will again have another meaning, from another, still higher standpoint, in still broader generalization— and there is no end to it!\n\nIn this is the majesty and the horror of infinity.\n\n______ Let us also remember that the world as we know it does not represent anything stable.\n\nIt must change with the slightest change in the foams of our knowledge.\n\nPhenomena which appear to us as unrelated can be seen by some other more inclusive consciousness as parts of a single whole.\n\nPhenomena which appear to us as similar may reveal themselves as entirely different.\n\nPhenomena which appear p.\n\n155 to us as complete and indivisible, may be in reality exceedingly complex, may include within themselves different elements, having nothing in common.\n\nAnd all these together may be one whole in a category quite incomprehensible to us.\n\nTherefore, beyond our view of things another view is possible—a view, as it were, from another world, from \" over there ,\" from \"the other side.\" Now \"over there\" does not mean some other place, but a new method of knowledge, a new understanding.\n\nAnd should we regard phenomena not as isolated, but bound together with inter-crossing chains of things and events, we would begin to regard them not from over here , but from over there .\n\nFootnotes 151:1 Theosophical Publishing Co., London, 1912, pp.\n\n96-98."

