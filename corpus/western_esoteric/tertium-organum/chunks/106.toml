[content]
body = "1 Behold!\n\nhuman beings living in a sort of underground den; they have been there from their childhood, and have their legs and necks chained—the chains are arranged in such a manner as to prevent them from turning round their heads.\n\nAt a distance above and behind them the light of a fire is blazing, and between the fire and the prisoners there is a raised way; and you will see, if you look, a low wall built along the way, like the screen which marionette players have before them, over which they show the puppets.\n\nImagine men passing along the wall carrying vessels, which appear over the wall; also figures of men and animals, made of wood p.\n\n163 and stone and various materials; and some of the passengers, as you would expect, are talking, and some of them are silent!\n\nThat is a strange image, he said, and they are strange prisoners.\n\nLike ourselves, I replied; and they see only their own shadows, or the shadows of one another, which the fire throws on the opposite wall of the cave?\n\nTrue, he said; how could they see anything but the shadows if they were never allowed to move their heads?\n\nAnd of the objects which are being carried in like manner they would only see the shadows?\n\nYes, he said.\n\nAnd if they were able to talk with one another, would they not suppose that they were naming what was actually before them?\n\nVery true.\n\nAnd suppose further that the prison had, an echo which came from the other side, would they not be sure to fancy that the voice which they heard was that of a passing shadow?\n\nNo question, he replied.\n\nThere can be no question, I said, that the truth would be to them just nothing but the shadows of the images.\n\nThat is certain.\n\nAnd now look again and see how they are released and cured of their folly.\n\nAt first, when any one of them is liberated and compelled suddenly to go up and turn his neck around and walk and look at the light, he will suffer sharp pains; the glare will distress him and he will be unable to see the realities of which in his former state he had seen the shadows; and then imagine someone saying to him, that what he saw before was an illusion, but that now he is approaching real being and has a truer sight and vision of more real things,—what will be his reply?\n\nAnd you may further imagine that his instructor is pointing to the objects as they pass and requiring him to name them,—will he not be in a difficulty?\n\nWill he not fancy that the shadows which he formerly saw are truer than the objects which are now shown to him?\n\nFar truer.\n\nAnd if he is compelled to look at the light, will he not have a pain in his eyes which will make him turn away to take refuge in the object of vision which he can see, and which he will conceive to be clearer than the things which are now being shown to him?\n\nTrue, he said.\n\nAnd suppose once more, that he is reluctantly dragged up a steep and rugged ascent, and held fast and forced into the presence of the sun himself, do you not think that he will be pained and irritated, and when he approaches the light he will have his eyes dazzled, and will not be able to see any of the realities which are now affirmed to be the truth?\n\nNot all in a moment, he said.\n\np.\n\n164 He will require to get accustomed to the sight of the upper world.\n\nAnd first he will see the shadows best, next the reflections of men and other objects in the water, and then the objects themselves; next he will gaze upon the light of the moon and the stars; and he will see the sky and the stars by night, better than the sun, or the light of the sun, by day?\n\nCertainly."

