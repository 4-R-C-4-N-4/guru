[content]
body = "I talked with him in January, 1912, and from our conversation I saw that he was stopping half way, as it were, between the ideas of the fourth dimension approximating p.\n\n126 those expressed by me in the first edition of Tertium Organum and those physical theories which still admit motion as an independent fact.\n\nWhat I wish to convey is that Prof.\n\nOumoff, admitting time as being the fourth dimension of space, did not regard motion as the illusion of our consciousness, but recognized the reality of motion in the world, as a fact independent of us and of our psyche.\n\nI speak of this, because later I shall quote extracts from Prof.\n\nOumoff's paper, choosing generally those places containing the ideas almost identical with the thoughts expressed in the preceding chapters.\n\nThat part of the address which pictures the evolution of modern physics from the atom to the electron I shall omit, because this seems to me somewhat artificially united to those ideas upon which I wish to dwell, and is not inwardly connected with them at all.\n\nFrom my standpoint it is immaterial whether we make the foundation of matter the atom or the electron.\n\nI believe that at the foundation of matter lies illusion , or, in other words, a form of perception.\n\nAnd the consistent development of those ideas of higher space which Prof.\n\nOumoff made the basis of his address leads, in my opinion, to the negation of motion ; just as the consistent development of the ideas of mathematical physics has led to the negation of matter as substance .\n\nHaving mentioned electrons , I may add that there is a method whereby modern scientific ideas and the data of the psychological method may be reconciled; namely, by the aid of the very ancient systems of the Kabala , Alchemy and so forth, which establish the foundation of the material world in four principles or elements, of which the first two—fire and water—correspond to the positive and negative electrons of modern physics.\n\nBut in such case the electrons must be regarded, not simply as electro-magnetic units , but as principles, i.e., as two opposite aspects or phases constituting the world.\n\nProf.\n\nOumoff's address is interesting and remarkable in that he stands already on the very threshold of metaphysics, and he is perhaps hindered from entering only by a lingering faith in the value of the positivistic method, which dies when the new watch-words of science are declared.\n\nThe introductory word to our forthcoming labors [says Prof.\n\nOumoff] it will be most proper to dedicate to the excursions of scientific thought p.\n\n127 in its search for the image of the world.\n\nThe necessity for scientific research along this path will become clear if we will turn to the covenants of our high priests of science.\n\nThese covenants convey the deep motives of active service to natural science and to men.\n\nIt is useful to express them in our time, wherein thought is preeminently directed to the questions of the organization of life.\n\nLet us remember the credo of the natural scientist: To establish the authority of man over energy, time and space: To know the architecture of the universe, and in this knowledge to find a basis of creative foresight.\n\nThis foresight inspires confidence that natural science continuing the great and responsible work of creation in the fields of nature which it has already made its own, will not fail to enter a new field adapted to the enlarged necessities of mankind.\n\nThis new nature has become a vital necessity of personal and public activity.\n\nBut its grandeur and power summon the mind as it were to tranquillity.\n\nThe demand for stability in the household and the brevity of the personal experience in comparison with the evolution of the earth lead men to faith, and create in them an image of the durability of the surrounding order of things not for the present only, but for the future."

