[content]
body = "We have that sense, therefore we sense motion.\n\nThe time-sense is the sensation of changing moments.\n\nIf we did not have this time-sense we could not feel motion.\n\nThe \"time-sense\" is itself, in substance, the limit or the surface of our \"space-sense.\" Where the \"space-sense\" ends, there the \"time-sense\" begins.\n\nIt has been made clear that \"time\" is identical in its properties with \"space,\" i.e., it has all the signs of space extension .\n\nHowever, we do not feel it as spatial extension, but we feel it as time, that is, as something specific, inexpressible—in other words, uninterruptedly bound up with \"motion.\" This inability to sense time spatially has its origin in the fact that the time-sense is a misty space-sense ; by means of our time-sense we feel obscurely the new characteristics of space, which extend out from the sphere of three dimensions.\n\nBut what is the time-sense and why does there arise the illusion of motion?\n\np.\n\n50 To answer this question at all satisfactorily is possible only by studying the forms and levels of psychic life.\n\n\"I\" is a complicated quantity, and within it goes on a continuous motion.\n\nAbout the nature of this motion we shall speak later, but this very motion inside of us creates the illusion of motion around us, motion in the material world.\n\n______ The noted mathematician Riemann understood that when higher dimensions of space are in question, time, by some means, translates itself into space , and he regarded the MATERIAL ATOM as the entrance of the fourth dimension into three-dimensional space .\n\nIn one of his books Hinton writes very interestingly about \"surface tensions.\" The relationship of a surface to a solid or of a solid to a higher solid is one which we often find in nature.\n\nA surface is nothing more nor less than the relation between two things.\n\nTwo bodies touch each other.\n\nThe surface is the relationship of one to the other.\n\nIf our space is in the same co-relation with higher space as is the surface to our space, then it may be that our space is really the surface, that is, the place of contact, of two higher-dimensional spaces.\n\nIt is a fact worthy of notice that in the surface of a fluid different laws obtain from those which hold throughout the mass.\n\nThere is a whole series of facts which are grouped together under the name of surface tensions, which are of great importance in physics, and by which the behavior of the surfaces of liquids is governed.\n\nAnd it may well be that the laws of our universe are the surface tensions of a higher universe.\n\nIf the surface be regarded as a medium lying between bodies, then indeed it will have no weight, but be a powerful means of transmitting vibrations.\n\nMoreover, it would be unlike any other substance, and it would be impossible to get rid of it.\n\nHowever perfect a vacuum be made, there would be in this vacuum just as much of this unknown medium (i.e., of that surface) as there was before.\n\nMatter would pass freely through this medium .\n\n.\n\n.\n\nvibrations of this medium would tear asunder portions of matter.\n\nAnd involuntarily the conclusion would be drawn that this medium was unlike any ordinary matter.\n\n.\n\n.\n\n.\n\nThese would be very different properties to reconcile in one and the same substance.\n\np.\n\n51 Now is there anything in our experience which corresponds to this medium?\n\n.\n\n.\n\n.\n\nDo we suppose the existence of any medium through which matter freely moves, which yet by its vibrations destroys the combinations of matter—some medium which is present in every vacuum however perfect, which penetrates all bodies, is weightless, and yet can never be laid hold of.\n\nThe \"substance\" which possesses all these qualities is called the \"ether.\" The properties of the ether are a perpetual object of investigation in science.\n\n.\n\n.\n\n."

