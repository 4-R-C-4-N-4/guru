[content]
body = "Having become indifferent to objects of perception, the pupil must seek out the Rajah of the senses, the Thought-Producer, him who awakes illusions.\n\nThe mind is the great slayer of the real.\n\nLet the Disciple slay the Slayer.\n\nForâ€” When to himself his form appears unreal, as do on waking all the forms he sees in dreams; When he ceases to hear the many, he may discern the ONEâ€”the inner sound which kills the outer.\n\np.\n\n292 Then only, not till then, shall he forsake the region of ASAT, the false, to come into the realm of SAT, the true.\n\nBefore the soul can see, the harmony within must be attained, and fleshly eyes be rendered blind to illusion.\n\nBefore the soul can hear, the image (man) has to become as deaf to warnings as to whispers, to cries of bellowing elephants as to the silvery buzzing of the golden firefly.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nAnd then to the inner ear will speakâ€” THE VOICE OF THE SILENCE And say: â€”If thy Soul smiles while bathing in the sunlight of thy life; if thy soul sings within her chrysalis of flesh and matter; if thy soul weeps inside her castle of illusion; if thy soul struggles to break the silver thread that binds her to the MASTER, know, O Disciple, thy soul is of the earth.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nGive up thy life, if thou wouldst live.\n\nLearn to discern the real from the false, the ever-fleeting from the ever-lasting.\n\nLearn above all to separate head-learning from soul-wisdom, the \"Eye\" from the \"Heart\" doctrine.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nLight on the Path , like The Voice of the Silence is full of symbols, hints and hidden meanings.\n\nThis is a little book which makes demands upon the reader.\n\nIts meaning is elusive, and it requires to be read in a fitting state of spirit.\n\nLight on the Path prepares the \"disciple\" to meet the \"Master,\" i.e., the ordinary consciousness for communion with the higher consciousness.\n\nAccording to the author of Light on the Path, the term \"THE MASTERS\" is a symbolical expression for the \"Divine Life.\" 1 Light on the Path Before the eyes can see they must be incapable of tears.\n\nBefore the ear can hear it must have lost its sensitiveness.\n\nBefore the voice can speak in the presence of the Masters it must have lost the power to wound.\n\nBefore the soul can stand in the presence of the Masters its feet must be washed in the blood of the heart.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nKill out all sense of separateness.\n\nDesire only that which is within you.\n\nDesire only that which is beyond you.\n\nDesire only that which is unattainable.\n\np.\n\n293 For within you is the light of the world.\n\n.\n\n.\n\n.\n\nIf you are unable to perceive it within you, it is useless to look for it elsewhere.\n\n.\n\n.\n\n.\n\nit is unattainable, because it forever recedes.\n\nYou will enter the light, but you will never touch the Flame.\n\n.\n\n.\n\n.\n\nSeek out the way.\n\nLook for the flower to bloom in the silence that follows the storm: not till then.\n\n.\n\n.\n\n.\n\nAnd on the deep silence the mysterious event will occur which will prove that the way has been found.\n\nCall it by what name you will, it speaks in a voice that speaks where there is none to speakâ€”it is a messenger that comes, a messenger without form or substance; or it is the flower of the soul that has opened.\n\nIt cannot be described by any metaphor.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n."

