body = "But why seven, exactly, he is unable to explain.\n\nFor physicists the rôle of the \"creation of the world\" is played by the atomic theory and the ether, with its wave-like vibrations, and further by the electrons, and the energetic, or electromagnetic theory of the world.\n\nOr sometimes it is even worse, for the physicist in the depth of his soul feels the falsity of all old and new scientific theories but fears to hang in the air, as it were; to take refuge in mere negation.\n\nHe has no system in place of that whose falsity he already feels; he is afraid to make a plunge into mere emptiness.\n\nLacking sufficient courage to declare that he believes in nothing at all , he accoutres himself in all contradictory theories, as in an official uniform, only because with this uniform are bound up certain rights and privileges, outer as well as inner, consisting of a certain confidence in himself and in his surroundings, to forego which he has no strength and determination.\n\nThe unbelieving positivist—this is the tragic figure of our times, analogous to the atheist or unbelieving priest of the times of Voltaire.\n\np.\n\n22 Out of this abhorrence of a vacuum come all dualistic theories which recognize \"spirit\" and \"matter\" existing simultaneously and independently of one another.\n\nIn general, to a disinterested observer, the state of our contemporary science should be of great psychological interest.\n\nIn all branches of scientific knowledge we are absorbing an enormous number of facts destructive of the harmony of existing systems.\n\nAnd these systems can maintain themselves only by reason of the heroic attempts of scientific men who are trying to close their eyes to a long series of new facts which threatens to submerge everything in an irresistible stream.\n\nIf in reality we were to collect these system-destroying facts they would be so numerous in every department of knowledge as to exceed those upon which existing systems are founded.\n\nThe systematization of that which we do not know may yield us more for the true understanding of the world and the self than the systematization of that which in the opinion of \"exact science\" we do know.\n\nFootnotes 21:1 Open Court Publishing Co.'s edition of Mach's work.\n\n1914, pages 41, 42, and 43."

