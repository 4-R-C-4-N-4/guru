[content]
body = "p.\n\nxiii AUTHOR'S PREFACE TO THE SECOND EDITION IN revising Tertium Organum for the second edition in English my chief concern has been to coördinate its terminology with the more developed terminology of those of my books written after the publication of the second Russian edition of Tertium Organum , from which the English translation was made.\n\nSuch a unity of terminology is the more necessary because I am obliged to lead the reader into regions of thought and knowledge where boundaries have not been clearly established, and where different authors—and often one and the same author, in different works and during different periods of his activity—have called the same thing by different names, or different things by the same name.\n\nIt must be admitted that language is a weak and inadequate vehicle even for the expression of our usual understanding of things, to say nothing of those moments when the understanding unexpectedly expands and becomes deeper, and we see revealed an entire series of facts and relations for the description of which we have neither words nor expressions.\n\nBut quite aside from this, in ordinary conditions of thinking and feeling, we are frequently at a loss for words, and we use one word at different times to describe different things.\n\nOn the other hand, it is no merit in an author to invent new words, or to use old words in new meanings which have nothing in common with the accepted ones—to create, in other words, a special terminology.\n\nI have always considered that it is necessary to write in the language which men commonly speak, and I have endeavored to do this, although in some cases it has been necessary to make some additions to and corrections of that language for the sake of exactness and lucidity.\n\nIn due time I shall separately consider the subject of language and the methods of its adaptation for the transmission of exact thought.\n\nFor the present I have reference only to the language of Tertium Organum .\n\np.\n\nxiv The first word demanding a more careful use is \"consciousness.\" In conversational language and in every-day psychology, even in psychology purporting to be scientific, the word consciousness is often used as a term for the designation of a complex of all psychic functions in general, or for their separate manifestations.\n\nAt present I have not access to the necessary books—I abandoned them all in Petrograd, four years ago—but to the best of my recollection Prof.\n\nWilliam James defined thought as \"a moment of consciousness.\" From my standpoint, which I shall elucidate in works now being prepared for the press, it is necessary to regard consciousness as distinct from the commonly understood psychic functions: thought, feeling and sensation.\n\nOver and above all this, consciousness has several exactly definable forms or phases, in each one of which thoughts, feelings and sensations can function, giving in each different results.\n\nThus consciousness (be it this or something other) is a background upon which thoughts, feelings and sensations reveal themselves.\n\nThis background can be more or less bright.\n\nBut as thoughts, feelings and sensations have their own separate life, and can be regarded independently of this background, so can it be regarded and studied independently of them.\n\nFor the present I shall not insist too strongly upon the idea of this ground as something separate in its substance from psychic functions.\n\nThe practical result is the same if we say that thoughts, feelings and sensations may have a different character , and that thoughts, feelings and sensations of this or that character create this or that state of consciousness.\n\nIt is important only to establish the fact that thoughts, feelings and sensations, i.e., psychic functions, are not consciousness, and that this or that state of consciousness is something pertaining to them, but separate from them, and in some cases capable of being separately observed.\n\nIn the early editions of Tertium Organum I have used the word consciousness in its generally accepted meaning, i.e., as a complex of psychic functions, or in the sense of their indication and contents."

