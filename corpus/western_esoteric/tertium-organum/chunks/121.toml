[content]
body = "188 So writes Schopenhauer in his Counsels and Maxims , and indeed it is very effectively expressed, but we have no foundation whatsoever for regarding man as the summit of that which nature has created.\n\nThis is only THE HIGHEST THAT WE KNOW.\n\nPositivism would be absolutely correct in its picture of the world, there would not be even one deficiency, if there were no reason in the world, anywhere or at any time .\n\nThen it would be necessary, nolens volens , to regard the universe as an accidentally self-created mechanical toy in space .\n\nBut the fact of the existence of psychic life \"spoils all the statistics.\" It is impossible to exclude it.\n\nWe are either forced to admit the existence of two principles—\"spirit\" and \"matter\"—or to select one of them.\n\nThen dualism annihilates itself, because if we admit the separate existence of spirit and matter, and reason further on this basis, it will be inevitably necessary to conclude, either that spirit is unreal and matter real; or that matter is unreal and spirit real—i.e., either that spirit is material or that matter is spiritual.\n\nConsequently it is necessary to select some one thing—spirit or matter.\n\nBut to think really MONISTICALLY is considerably more difficult than it seems.\n\nI have met many men who have called themselves \"monists,\" and sincerely considered themselves as such, but in reality they never departed from the most naive dualism, and no spark of understanding of the world's unity ever flashed upon them.\n\nPositivism, regarding \"motion\" or \"energy\" as the basis of everything, can never be \"monistic.\" It is impossible to annihilate the fact of psychic life.\n\nIf it were possible not to take this fact into consideration at all, then everything would be splendid, and the universe could be something like an accidentally self-created mechanical toy.\n\nBut to its sorrow, positivism cannot deny the existence of the psyche.\n\nIt can only try to degrade it as low as possible, calling it the reflection of reality, the substance of which consists of motion.\n\nBut how deal with the fact that the \"reflection\" possesses in this case an infinitely greater potentiality than the \"reality\"?\n\nHow can this be?\n\nFrom what does this reality reflect, or what is it refracted in, that in its reflected state it possesses infinitely greater potentiality than in its original state?\n\np.\n\n189 The consistent \"materialist-monist\" will be forced to say that \"reality\" reflects from itself, i.e., \"one motion\" reflects from another motion.\n\nBut this is merely dialectics, and fails to make clear the nature of psychic life, for it is something other than motion.\n\n______ No matter how hard we may try to define thought in terms of motion , we nevertheless know that they are two different things , different as regards our receptivity of them, belonging to different worlds, incommensurable, capable of existing simultaneously.\n\nMoreover, thought can exist without motion , but motion cannot exist without thought, because out of the psyche comes the necessary condition of motion—time: no psychic life—no time, as it exists for us; no time—no motion.\n\nWe cannot escape this fact, and thinking logically , we must inevitably recognize two principles .\n\nBut if we begin to consider the very recognition of two principles as illogical , then we must recognize THOUGHT as a single principle , and motion as AN ILLUSION OF THOUGHT.\n\nBut what does this mean?\n\nIt means that there can be no \"monistic materialism.\" Materialism can be only dualistic, i.e., it must recognize two principles : motion and thought.\n\nHere a new difficulty arises.\n\nOur concepts are limited by language.\n\nOur language is deeply dualistic.\n\nThis is indeed a terrible obstacle.\n\nI showed previously how language retards our thought, making it impossible to express the relations of a being universe."

