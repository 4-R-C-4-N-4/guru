[content]
body = "The mental development of a child may be arrested by making it memorize a series of words or a series of figures.\n\nThe animal is in just such a position.\n\nHerein lies the explanation of the strange fact that an animal is wiser when it is young .\n\nIn man the flower of intellectual force blooms at a mature age, often even in senility; in the animal, quite the reverse is true.\n\nIt is receptive only while it is young.\n\nAt maturity its development stops, and in old age it undoubtedly degenerates.\n\nThe logic of animals, were we to attempt to express it by means of formulæ similar to those employed by Aristotle and Bacon would be as follows: The formula A is A , the animal will understand.\n\nIt will say (as it were) I am I , etc.; but the formula, A is not Not-A , it will be incapable of understanding.\n\nNot Not-A is indeed the concept.\n\nThe animal will reason thus: This is this.\n\nThat is that.\n\nThis is not that .\n\nor, This man is this man.\n\nThat man is that man.\n\nThis man is not that man .\n\nI shall be obliged to return to the logic of animals later on; for the present it is only necessary to establish the fact that the psychology of animals is peculiar, and differs in a fundamental way from our own.\n\nAnd not only is it peculiar, but it is decidedly manifold .\n\nAmong the animals known to us, even among domestic animals, the psychological differences are so great as to differentiate them into entirely separate planes.\n\nWe ignore this, and place them all under a single rubric—\" animals .\" A goose, having entangled its foot in a piece of watermelon rind, drags it along by the web and thus cannot get it out, but it never thinks of raising its foot.\n\nThis indicates that its mind is so vague p.\n\n96 that it does not know its own body, scarcely distinguishing between it and other objects.\n\nThis would happen neither with a dog nor with a cat.\n\nThey know their bodies very well.\n\nBut in relation to outside objects the dog and the cat differ widely.\n\nI have observed a dog, a \"very intelligent\" setter.\n\nWhen the little rug on which he slept got folded and was uncomfortable to sleep on, he understood that the nuisance was outside of him , that it was in the rug, and in a certain definite position of the rug.\n\nTherefore he caught the rug in his teeth, turned it and pushed it here and there, the while growling, sighing, and moaning until some one came to his aid, for he was never able to rectify the difficulty.\n\nWith the cat such a question could not even appear.\n\nThe cat knows her body very well, but everything outside of herself she takes as her due, as given.\n\nTo correct the outside world, to accommodate it to her own comfort, never comes into the cat's head.\n\nPerhaps this is because she lives more in another world, in the world of dreams and fantasies, than in this.\n\nAccordingly, if there were something wrong with her bed the cat would turn herself about repeatedly until she could lie down comfortably, or she would go and lie in another place.\n\nThe monkey would spread the rug very easily indeed.\n\nHere we have four beings, all quite different; and this is only one example: it would be possible to collect others by the hundred.\n\nAnd meanwhile there is for us just one \"animal.\" We mix together many things that are entirely different; our \"divisions\" are often incorrect, and this hinders us when it comes to the examination of ourselves.\n\nTo declare that manifest differences determine the \"evolutionary grade,\" that animals of one type are \"higher\" or \"lower\" than those of another, would be entirely false."

