[content]
body = "\"It is not the Adam of dust (of Chapter II) who is thus made in the divine image, but the Divine Androgyne (of Chapter I), or Adam Kadmon.\" ADAM KADMON is HUMANITY, or humankind— Homo Sapiens —the SPHYNX, i.e., \"the being with the body of an animal and the face of a superman.\" Entering as a component part into different great and little lives man himself consists of an innumerable number of great and little I's.\n\nMany of the I's living in him do not even know one another, just as men who live in the same house may not know one another.\n\np.\n\n203 Expressed in terms of this analogy, it may be said that \"man\" has much in common with a house filled with inhabitants the most diverse.\n\nOr better, he is like a great ocean liner on which are many transient passengers, each going to his own place for his own purpose, each uniting in himself elements the most diverse.\n\nAnd each separate unit in the population of this steamer orientates himself, involuntarily and unconsciously regards himself as the very centre of the steamer.\n\nThis is a fairly true presentment of a human being.\n\nPerhaps it would be more correct to compare a man with some little separate place on earth, living a life of its own; with a forest lake, full of the most diverse life, reflecting the sun and stars, and hiding in its depths some incomprehensible phantasm, perhaps an undine, or a water-sprite.\n\nIf we abandon analogies and return to facts, so far as these are accessible to our observation, it then becomes necessary to begin with several somewhat artificial divisions of the human being.\n\nThe old division into body, soul and spirit, has in itself a certain authenticity, but leads often to confusion, because when such a division is attempted disagreements immediately arise as to where the body ends and where the soul begins, where the soul ends and the spirit begins, and so forth.\n\nThere are no strict limits at all, nor can there be.\n\nIn addition to this, confusion enters in by reason of the opposition of body, soul and spirit, which are recognized in this case as inimical principles.\n\nThis is entirely erroneous also, because the body is the expression of the soul, and the soul of the spirit.\n\nThe very terms, body, soul and spirit need explanation.\n\nThe \"body\" is the physical body with its (to us)little understood mind; the soul—the psyche studied by scientific psychology—is the reflected activity which is guided by impressions received from the external world and from the body.\n\nThe \"spirit\" comprises those higher principles which guide, or under certain conditions may guide, the soul-life.\n\nThus a human being contains in itself the following three categories.\n\nFirst: the body —the region of instincts, and the inner \"instinctive\" consciousnesses of the different organs, parts of the body, and the entire organism.\n\nSecond: the soul —consisting of sensations, perceptions, conceptions, thoughts, emotions and desires.\n\np.\n\n204 Third: the region of the unknown —consciousness, will, and the one I, i.e., those things which in ordinary man are in potentiality only.\n\nUnder the usual conditions of the average man the extremely misty focus of his consciousness is confined to the psyche perpetually going from one object to another.\n\nI wish to eat.\n\nI read a newspaper.\n\nI wait for a letter .\n\nOnly rarely does it touch the regions which give access to the religious, esthetic and moral emotions, and to the higher intellect, which expresses itself in abstract thinking, united with the moral and esthetic sense, i.e., the sense of the necessity of the co-ordination of thought, feeling, word and action."

