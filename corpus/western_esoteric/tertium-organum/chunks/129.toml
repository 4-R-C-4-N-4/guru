[content]
body = "If in general life and feeling exist, they must exist in all.\n\nLife and rationality make up the world.\n\nIf we consider nature from our side , from the side of phenomena, then it is necessary to say that each thing, each phenomenon , possesses a psyche of its own.\n\nA MOUNTAIN, A TREE, A RIVER, THE FISH WITHIN THE RIVER, DEW AND RAIN, PLANET, FIRE—each separately must possess a psyche of its own.\n\nIf we consider nature from the other side , from the side of noumena, p.\n\n200 then it is necessary to say that each thing and each phenomenon of our world is a manifestation in our section of a rationality incomprehensible to us, belonging to another section, the same having there functions incomprehensible to us.\n\nIn that section of space, one rationality is such and its function is such that it manifests itself here as a mountain , some other manifests as a tree , a third as a little fish , and so forth.\n\nThe phenomena of our world are very different from one another.\n\nIf they are nothing else but manifestations in our section of different rational beings, then these beings must be very different too.\n\nBetween the psyche of a mountain and the psyche of a man there must be the same difference as between a mountain and a man.\n\nWe have already admitted the possibility of different existences.\n\nWe said that a house exists, and that a man exists, and that an idea exists also—but they all exist differently.\n\nIf we pursue this thought, then we shall discover many kinds of different existences .\n\nThe fantasy of fairy tales, making all the world animate, ascribes to mountains, rivers, forests a psychic life similar to that of men.\n\nBut this is just as untrue as the complete denial of consciousness to inanimate nature.\n\nNoumena are as distinct and various as phenomena, which are their manifestation in our three-dimensional sphere.\n\nEach stone, each grain of sand, each planet has its noumenon, consisting of life and of psyche, binding them into certain wholes incomprehensible to us.\n\nThe activity of life of separate units may vary greatly.\n\nThe degree of the activity of life can be determined from the standpoint of its power of reproducing itself.\n\nIn inorganic, mineral nature, this activity is so insignificant that units of this nature accessible to our observation do not reproduce themselves, although it may only seem so to us because of the narrowness of our view in time and space.\n\nPerhaps if that view embraced hundreds of thousands of years and our entire planet simultaneously, we might then see the growth of minerals and metals.\n\nWere we to observe, from the inside , one cubic centimeter of the human body, knowing nothing of the existence of the entire body and of the man himself, then the phenomena going on in this little cube of flesh would seem like elemental phenomena in inanimate nature.\n\np.\n\n201 But in any case, for us phenomena are divided into living and mechanical, and visible objects are divided into organic and inorganic.\n\nThe latter are partitioned without resistance, remaining as they were before.\n\nIt is possible to break a stone in halves, and then there will be two stones.\n\nBut if one were to cut a snail in two, then there would not be two snails.\n\nThis means that the psyche of the stone is very simple, primitive—so simple that it may be fractured without change of state.\n\nBut a snail consists of living cells.\n\nEach living cell is a complex being, considerably more intricate than that of a stone.\n\nThe body of the snail possesses the power to move, to nourish itself, feel pleasure and pain, seek the first and avoid the last; and most important of all, it possesses the faculty to multiply, to create new forms similar to itself, to involve inorganic substance within these forms, subduing physical laws to its service."

