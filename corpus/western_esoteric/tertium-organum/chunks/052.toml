[content]
body = "But in the matter of dimensions it is as if mathematics sees more than we do, or farther than we do, through some boundaries which arrest us but not it—and sees that no realities whatever correspond to our concepts of dimensions.\n\nIf the three dimensions really corresponded to three powers, then we should have the right to say that only these three powers refer to geometry, and that all the other higher powers, beginning with the fourth, lie beyond geometry.\n\np.\n\n75 But even this is denied us.\n\nThe representation of dimensions by powers is perfectly arbitrary.\n\nMore accurately, geometry, from the standpoint of mathematics, is an artificial system for the solving of problems based on conditional data , deduced, probably, from the properties of our psyche.\n\nThe system of investigation of \"higher space\" Hinton calls metageometry , and with metageometry he connects the names of Lobachevsky, Gauss, and other investigators of non-Euclidian geometry.\n\nWe shall now consider in what relation the questions touched upon by us stand to the theories of these scientists.\n\nHinton deduces his ideas from Kant and Lobachevsky.\n\nOthers, on the contrary, place Kant's ideas in opposition to those of Lobachevsky.\n\nThus Roberto Bonola, in Non-Euclidian Geometry , declares that Lobachevsky's conception of space is contrary to that of Kant.\n\nHe says: The Kantian doctrine considered space as a subjective intuition, a necessary presupposition of every experience.\n\nLobachevsky's doctrine was rather allied to sensualism and the current empiricism, and compelled geometry to take its place again among the experienced sciences.\n\n1 Which of these views is true, and in what relation do Lobachevsky's ideas stand to our problem?\n\nThe correct answer to this question is: in no relation.\n\nNon-Euclidian geometry is not metageometry , and non-Euclidian geometry stands in the same relation to metageometry as Euclidian geometry itself.\n\nThe results of non-Euclidian geometry, which have submitted the fundamental axioms of Euclid to a revaluation, and which have found the most complete expression in the works of Bolyai, Gauss, and Lobachevsky, are embraced in the formula: The axioms of a given geometry express the properties of a given space .\n\nThus geometry on the plane accepts all three Euclidian axioms, i.e.: 1.\n\nA straight line is the shortest distance between two points.\n\np.\n\n76 2.\n\nAny figure may be transferred into another position without changing its properties.\n\n3.\n\nParallel lines do not meet.\n\n(This last axiom is formulated differently by Euclid.) In geometry on a sphere, or on a concave surface the first two axioms alone are true, because the meridians which are separated at the equator meet at the poles.\n\nIn geometry on the surface of irregular curvatures only the first axiom is true—the second, regarding the transference of figures, is impossible because the figure taken in one part of an irregular surface can change when transferred into another place.\n\nAlso, the sum of the angles of a triangle can be either more or less than two right angles.\n\nTherefore, axioms express the difference of properties of various kinds of surfaces.\n\nA geometrical axiom is a law of given surface.\n\nBut what is a surface?\n\nLobachevsky's merit consists in that he found it necessary to revise the fundamental concepts of geometry.\n\nBut he never went so far as to revalue these concepts from Kant's standpoint.\n\nAt the same time he is in no sense contradictory to Kant.\n\nA surface in the mind of Lobachevsky, as a geometrician , was only a means for the generalization of certain properties on which this or that geometrical system was constructed, or the generalization of the properties of certain given lines.\n\nAbout the reality or the unreality of a surface, he probably never thought."

