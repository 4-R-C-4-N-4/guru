[content]
body = "And these two kinds of motion will be incommensurable for it.\n\nThe animal will be in a position to measure an angle or a convex surface, though not understanding their true nature, and though regarding them as motion.\n\nBut true motion, i.e., that which is true motion to us, it will never be in a position to measure, because for this it is necessary to possess our concept of time , and to measure all motions with reference to some one more constant motion, i.e., to compare all motions with some one .\n\nWithout concepts the animal is powerless to do this.\n\nTherefore the (for us) real motions of objects will be incommensurable for it, and being incommensurable, will be incommensurable with other motions which are real and measurable for it, but which are illusory for us—motions which in reality represent the third dimension of solids.\n\nThis last conclusion is inevitable.\n\nIf the animal apprehends and measures as motion that which is not motion, clearly it cannot measure by one and the same standard that which is motion and that which is not motion.\n\nBut this does not mean that it cannot know the character of motions going on in the world and cannot conform itself to them.\n\nOn the contrary, we see that the animal orientates itself perfectly among the motions of the objects of our three-dimensional world.\n\nHere comes into play the aid of instinct, i.e., the ability, developed by millenniums of selection, to act expediently without consciousness of purpose.\n\nMoreover, the animal discerns perfectly the motions going on around it.\n\nBut discerning two kinds of phenomena, two kinds of motion , the p.\n\n109 animal will explain one of them by means of some incomprehensible inner property of objects, i.e., in all probability it will regard this motion as the result of the animation of objects, and the moving objects as animated beings .\n\nThe kitten plays with the ball or with its tail because ball and tail are running away from it .\n\nThe bear will fight with the beam which threatens to throw him off the tree, because in the swinging beam he senses something alive and hostile.\n\nThe horse is frightened by the bush because the hush unexpectedly turned and waved a branch.\n\nIn the last case the bush need not even have moved at all, for the horse was running, and it seemed therefore as though the bush moved, and consequently that it was animated.\n\nIn all probability all movement is thus animated for the animal.\n\nWhy does the dog bark so desperately at the passing carriage?\n\nThis is not entirely clear to us for we do not realize that to the eyes of the dog the carriage is turning, twisting, grimacing all over.\n\nIt is alive in every part—the wheels, the top, the mud-guards, seats, passengers—all these are moving, turning.\n\n______ Now let us draw certain conclusions from all of the foregoing.\n\nWe have established the fact that man possesses sensations, perceptions and concepts; that the higher animals possess sensations and perceptions, and the lower animals sensations only.\n\nThe conclusion that animals have no concepts we deduced from the fact that they have no speech.\n\nNext we have established that having no concepts, animals cannot comprehend the third dimension, but see the world as a surface; i.e., they have no means—no instrument—for the correction of their incorrect sensations of the world.\n\nFurthermore, we have found that seeing the world as a surface, animals see upon this surface many motions which for us are non-existent.\n\nThat is, all those properties of solids which we regard as the properties of three-dimensionality, animals represent to themselves as motions .\n\nThus the angle and the spherical surface appear to them as the movements of a plane.\n\nAfter that we came to the conclusion that everything which we regard as constant in the region of the third dimension, p.\n\n110 animals regard as transient things which happen to objects—temporal phenomena."

