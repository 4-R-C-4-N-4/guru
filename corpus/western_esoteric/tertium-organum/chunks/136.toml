[content]
body = "In ourselves, visual consciousness goes with our eyes, tactile consciousness with our skin.\n\nBut although neither skin nor eye knows aught of the sensations of the other, they come together and figure in some sort of relation and combination in the more inclusive consciousness which each of us names his self .\n\nQuite similarly, then, says Fechner, we must suppose that my consciousness of myself and yours of yourself, although in their immediacy they keep separate and know nothing of each other, are yet known and used together in a higher consciousness, that of the human race, say, into which they enter as constituent parts.\n\nSimilarly, the whole human and animal kingdoms come together as conditions of a consciousness of still wider scope.\n\nThis combines in the soul of the earth with the consciousness of the vegetable kingdom, which in turn contributes its share of experience to that of the whole solar system, etc.\n\nThe supposition of an earth-consciousness meets a strong instinctive prejudice.\n\nAll the consciousness we directly know seems told to brains.\n\nBut our brain, which primarily serves to correlate our muscular reactions with the external objects on which we depend, performs a function which the earth performs in an entirely different way.\n\nShe has no proper muscles or limbs of her own, and the only objects external to her are the other stars.\n\nTo these her whole mass reacts by most exquisite alterations in its total gait, and by still more exquisite vibratory responses in its substance.\n\nHer ocean reflects the lights of heaven as on a mighty mirror, her atmosphere refracts them like a monstrous lens, the clouds p.\n\n211 and snow-fields combine them into white, the woods and flowers disperse them into colors.\n\nPolarization, interference, absorption awaken sensibilities in matter of which our senses are too coarse to take any note.\n\nFor these cosmic relations of hers, then, she no more needs a special brain than she needs eyes or ears.\n\nOur brains do indeed unify and correlate innumerable functions.\n\nOur eyes know nothing of sound, our ears nothing of light, but having brains, we can feel sound and light together, and compare them .\n\n.\n\n.\n\n.\n\n.\n\nMust every higher means of unification between things be a literal brain-fibre?\n\nCannot the earth-mind know otherwise the contents of our minds together?\n\nIn a striking page Fechner relates one of his moments of direct vision of truth.\n\n\"On a certain morning I went out to walk.\n\nThe fields were green, the birds sang, the dew glistened, the smoke was rising, here and there a man appeared, a light as of transfiguration lay on all things.\n\nIt was only a little bit of earth; it was only one moment of her existence; and yet as my look embraced her more and more it seemed to me not only so beautiful an idea, but so true and clear a fact, that she is an angel—an angel carrying me along with her into Heaven.\n\n.\n\n.\n\n.\n\nI asked myself how the opinions of men could ever have so spun themselves away from life so far as to deem the earth only a dry clod .\n\n.\n\n.\n\nBut such an experience as this passes for fantasy.\n\nThe earth is a globular body, and what more she may be, one can find in mineralogical cabinets.\" The special thought of Fechner's is his belief that the more inclusive forms of consciousness are in part constituted by the more limited forms.\n\nNot that they are the mere sum of the more limited forms.\n\nAs our mind is not the bare sum of our sights plus our sounds, plus our pains, but in adding these terms together it also finds relations among them and weaves them into schemes and forms and objects of which no one sense in its separate estate knows anything, so the earth-soul traces relations between the contents of my mind and the contents of yours of which neither of our separate minds is conscious.\n\nIt has schemes, forms, and objects proportionate to its wider field, which our mental fields are far too narrow to cognize."

