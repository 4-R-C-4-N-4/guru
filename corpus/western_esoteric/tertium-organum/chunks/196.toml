[content]
body = "The comparison of the sensation of woman experienced by man, or vice versa , with the feeling for nature is met with very often.\n\nAnd it is really the same sensation as is given by forest, prairie, sea, mountains, only in this case it is even more intense, awakens more inner voices, forces the sounding of more inner strings.\n\nAnimals often give the mystical sensation of nature to men.\n\nAlmost everyone has his favorite animal, with which he has some inner affinity.\n\nIn these animals, or through them, men sense nature intimately and personally.\n\nIn Hindu occultism there is the belief that every man has his corresponding animal, through which it is possible to act upon him magically, through which he himself can act upon others, and into which he can transform himself or be by others transformed.\n\nEach Hindu deity has his own particular animal.\n\nBrahma has a goose; Vishnu an eagle; Shiva a bull; Indra an elephant; Kali ( Durga ) a tiger; Rama a buffalo; Ganesha a rat; Agni a ram; Kartikkeya (or Subrananyia ) a peacock, and Kama (the god of love) a parrot.\n\nThe same thing is true of Greece: all the deities of Olympus had their animals.\n\nIn the religion of Egypt sacred animals played an enormous part, and in Egypt the cat , the most magical of all animals, was held as sacred.\n\nThe sense of nature sometimes unfolds something infinitely new and profound in things which seemed to have been known a long time and in themselves contained nothing mystical.\n\nThe consciousness of God's nearness came to me sometimes [quotes Prof.\n\nJames] .\n\n.\n\n.\n\na presence , I might say .\n\n.\n\n.\n\nsomething in myself made p.\n\n304 me feel a part of something bigger than I, that was controlling.\n\nI felt myself one with the grass, the trees, birds, insects, everything in Nature.\n\nI exulted in the mere fact of existence, of being a part of it all—the drizzling rain, the shadow of the clouds, the tree-trunks, and so on.\n\nIn my own note book of 1908 I found a description of the same experienced state of consciousness.\n\nIt was in the sea of Marmora, on a rainy day of winter, the far-off high and rocky shores were of a pronounced violet color of every shade, including the most tender, fading into gray and blending with the gray sky.\n\nThe sea was the color of lead mixed with silver.\n\nI remember all these colors.\n\nThe steamer was going north.\n\nI, remained at the rail, looking at the waves.\n\nThe white crests of waves were running toward us.\n\nA wave would run at the ship, raised as if desiring to hurl its crest upon it, rushing up with a howl.\n\nThe steamer heeled, shuddered, and slowly straightened back; then from afar a new wave came running.\n\nI watched this play of the waves with the ship, and felt them draw me to themselves.\n\nIt was not at all that desire to jump down which one feels in mountains but something infinitely more subtle.\n\nThe waves were drawing my soul to themselves.\n\nAnd suddenly I felt that it went to them.\n\nIt lasted an instant, perhaps less than an instant, but I entered into the waves and with them rushed with a howl at the ship.\n\nAnd in that instant I became all .\n\nThe waves—they were myself: the far violet mountains, the wind, the clouds hurrying from the north, the great steamship, heeling and rushing irresistibly forward—all were myself."

