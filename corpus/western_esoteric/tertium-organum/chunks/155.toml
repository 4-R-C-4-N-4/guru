[content]
body = "In the objective world, indeed, this \"slipping of the dewdrop into the sea\" leads to the annihilation of the drop, to the absorption of it by the sea.\n\nWe have never observed another order of things in the objective world and therefore cannot imagine it.\n\nBut in the real , i.e., the subjective world, of course another order must exist and operate.\n\nThe DROP OF CONSCIOUSNESS merging with the SEA p.\n\n241 OF CONSCIOUSNESS knows it, but does not itself cease to exist because of that .\n\nTherefore undoubtedly, the sea is absorbed by the drop.\n\nIn the Letters to Flaccus of Plotinus, we find a wonderful description of a psychology and theory of knowledge founded exactly upon the idea of the expansion of receptivity.\n\nExternal objects present us only with appearances.\n\nConcerning them, therefore, we may be said to possess opinion rather than knowledge.\n\nThe distinctions in the actual world of appearance are of import only to ordinary and practical men.\n\nOur question lies with the ideal reality that exists behind appearance.\n\nHow does the mind perceive these ideas?\n\nAre they without us, and is the reason, like sensation, occupied with objects external to itself?\n\nWhat certainty would we then have—what assurance that our perception was infallible?\n\nThe object perceived would be a something different from the mind perceiving it.\n\nWe should have then an image instead of reality.\n\nIt would be monstrous to believe for a moment that the mind was unable to perceive ideal truth as it is, and that we had not certainty and real knowledge concerning the world of intelligence.\n\nIt follows, therefore, that this region of truth is not to be investigated as a thing external to us, and so only imperfectly known.\n\nIt is within us.\n\nHere the objects we contemplate and that which contemplates are identical—both are thought.\n\nThe subject cannot surely know an object different from itself.\n\nThe world of ideas lies within our intelligence.\n\nTruth, therefore, is not the agreement of our apprehension of an external object with the object itself.\n\nIt is the agreement of the mind with itself.\n\nConsciousness, therefore, is the sole basis of certainty.\n\nThe mind is its own witness.\n\nReason sees in itself that which is above itself and its source; and again, that which is below itself as still itself once more.\n\nKnowledge has three degrees—opinion, science, illumination.\n\nThe means or instrument of the first is sense; of the second dialectic; of the third intuition.\n\nTo the last I subordinate reason.\n\nIt is absolute knowledge founded on the identity of the mind knowing with the object known.\n\nThere is a raying out of all orders of existence, an external emanation from the ineffable One.\n\nThere is again a returning impulse, drawing all upward and inward toward the centre from whence all came.\n\n.\n\n.\n\n.\n\nThe wise man recognizes the idea of the good within him.\n\nThis he develops by withdrawal into the holy place of his own soul.\n\nHe who does not understand how the soul contains the beautiful within itself, seeks to realize beauty without by laborious production.\n\nHis aim should rather be to concentrate and simplify, and so to expand his being; instead of going out into the manifold, to forsake it for the One, and to float upwards p.\n\n242 toward the divine fount of being whose stream flows within him.\n\nYou ask, how can we know the Infinite?\n\nI, answer, not by reason.\n\nIt is the office of reason to distinguish and define.\n\nThe infinite, therefore, cannot be ranked among its objects.\n\nYou can only apprehend the infinite by a faculty superior to reason, by entering into a state in which you are your finite self no longer—in which the divine essence is communicated to you.\n\nThis is ecstasy.\n\nIt is the liberation of your mind from its finite consciousness.\n\nLike can only apprehend like; when you thus cease to be finite, you become one with the infinite."

