[content]
body = "Not that Ouspensky is a trafficker in the obvious—far from it: those who know most, think most, feel most, will get most out of his book—but a great sanity pervades his pages, and he never leads away into labyrinths where guide and follower alike lose their way and fail to come to any end.\n\n______ Leaving the average reader out of account for the moment, there are certain others whom the book should particularly interest—if only in the way of repulsion.\n\np.\n\n3 First of all come the mathematicians and the theoretical physicists, for they already, without knowing it, have invaded that \"dark backward and abysm of time\" which the Ouspenskian philosophy lights up—and are by way of losing themselves there.\n\nThat is to say, in certain of their calculations, they are employing four mutually interchangeable coördinates, three of space and one of time.\n\nIn other words, they use time as though it were a dimension of space.\n\nOuspensky tells them the reason they are able to do this.\n\nTime is the fourth dimension of space imperfectly sensed—apprehended by consciousness successively, and thereby creating the temporal illusion.\n\nMoreover, mathematicians are perforce concerning themselves with magnitudes to which the ordinary logic no longer applies.\n\nOuspensky presents a new logic, or rather, he presents anew an ancient logic—the logic of intuition—removing at a stroke all of the nightmare aspects, the preposterous paradoxes of the new mathematics, which by reason of its extraordinary development has shattered the old logic, as a growing oak shatters the containing jar.\n\nIt is from the philosophic camp, no doubt, that the book will receive its sharpest criticism, on account of the author's lèse-majesté toward so many of the crowned kings of philosophic thought, and his devastating assault on positivism—that inevitable by-product of our materialistic way of looking at the world.\n\nHis attempt to prove the Kantian problem—the subjectivity of space and time—doubtless will be acutely challenged, and with some chance of success, because the two chapters devoted to this are perhaps the least convincing of the book.\n\nBut no one heretofore has even attempted to demonstrate absolutely or successfully to controvert the staggering proposition advanced by Kant regarding space and time as forms of consciousness.\n\nWhatever the verdict of the philosophical pundits of the day and hour, whether favorable or otherwise, Ouspensky is sure of a place in the hierarchy of philosophers, for he has essayed to solve the most profound problems of human existence by the aid of the binocular vision of the mathematician and the mystic.\n\nStarting from the irreducible minimum of knowledge, he has carried philosophy into regions not hitherto explored.\n\np.\n\n4 To persons of an artistic or devotional bent the book will be as water in the desert.\n\nThese, always at a disadvantage among the purely practical-minded, by whom they are overwhelmingly out-numbered, will find in Ouspensky a champion whose weapon is mathematical certitude, the very thing by which the practical-minded swear.\n\nThese he puts to rout, holds up to ridicule, and applauds every effort to escape into the \"world of the wondrous.\" But most of all Ouspensky will be loved by all true lovers, for his chapter on the subject of love.\n\nWe have had Schopenhauer on love, and Freud on love, but what dusty answers do they give to the soul of a lover!\n\nEdward Carpenter comes much nearer the mark, but Ouspensky penetrates to its very center.\n\nIt is because our loves are so dampened by our egotisms, our cynicisms and our cowardices that we rot and smoulder instead of bursting into purifying flame."

