[content]
body = "We have become so accustomed to \"man\" that the strange perversions to which he is sometimes subject fail to startle us as curiosities.\n\nViolence in the name of freedom; violence in the name of love; the Gospel of Christianity with sword in hand; the stakes of the Inquisition for the glory of a God of Mercy; the oppression of thought and speech on the part of the ministers of religion —all these are incarnated absurdities of which humanity only is capable.\n\nA correct understanding of morality can preserve us in some degree from such perversions of thought.\n\nIn our life in general there is not much morality.\n\nEuropean culture has gone along the path of intellectual development.\n\nThe intellect invented and organized without considering the moral meaning of its own activity.\n\nOut of this arose the paradox that the crown of European culture is the \"dreadnaught.\" Many people realize all this, and on account of it assume a negative attitude to all culture.\n\nBut this is unjust.\n\nEuropean culture created much other than dreadnaughts that is new and valuable, facilitating life.\n\nThe elaboration of the principles of freedom and right; the abolition of slavery (though these are indeed nominal); the victory of man in many regions where nature presented to him a hostile front; the methods for the distribution of thought, the press; the miracles of contemporary medicine and surgery—all these are indisputably real conquests, and it is impossible not to take them into consideration.\n\nBut there is no morality in them , i.e., there is no truth but too much of falsehood.\n\nWe are satisfied with mere principles as such; we are content to think that eventually they will be introduced into life, and we neither marvel nor are disturbed at the thought that we ourselves (i.e., cultured humanity), developing beautiful principles, continually deny and controvert them in our lives.\n\nThe man of European culture invents with equal readiness a machine gun and p.\n\n227 a new surgical apparatus.\n\nEuropean culture began from the life of the savage, taking this life as an example as it were and starting to develop all its sides to the uttermost without thinking of their moral aspects.\n\nThe savage crushed the head of his enemy with a simple club.\n\nWe invented for this purpose complicated devices, making possible the crushing of hundreds and thousands of heads at once.\n\nTherefore such a thing as this happened: aerial navigation , toward which men had looked forward for millenniums, finally achieved, is used first of all for purposes of war.\n\nMorality should be the co-ordination and the necessity for the co-ordination of all sides of life, i.e., of the actions of man and humanity with the higher emotions and the higher comprehensions of the intellect.\n\nFrom this point of view the statement previously made, that morality is a form of esthetics, becomes clear.\n\nEsthetics—the sense of beauty—is the sensation of the relation of parts to a whole, and the perception of the necessity for a certain harmonious relation.\n\nAnd morality is the same.\n\nThose actions, thoughts and feelings are not moral which are not coördinated, which are not harmonious with the higher understanding and the higher sensations accessible to man.\n\nThe introduction of morality into our life would make it less paradoxical, less contradictory, more logical and—most important—more civilized ; because now our vaunted civilization is much compromised by \"dreadnaughts,\" i.e., war and everything that goes with it, as well as many things of \"peaceful\" life such as the death penalty, prisons, etc.\n\nMorality, or moral esthetics in such a sense as is here shown, is necessary to us.\n\nWithout it we too easily forget that the word has after all a certain relation to the act.\n\nWe are interested in many things, we enter into many things, but for some strange reason we fail to note the incongruity between our spiritual life and our life on earth.\n\nThus we create two lives."

