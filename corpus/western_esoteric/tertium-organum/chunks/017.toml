body = "Or, as a logical conclusion from Kant's ideas, shall we recognize the validity of Berkeley's idea, and deny the existence of the world itself except in imagination?\n\n______ Positive philosophy stands in a very ambiguous relation to Kant's views.\n\nIt accepts them and it does not accept them: it accepts, p.\n\n20 and considers them correct in their relation to the direct experience of the organs of sense—what we see, hear, touch.\n\nThat is, positive philosophy recognizes the subjectivity of our receptivity, and recognizes everything that we perceive in objects as imposed upon them by ourselves—but this in relation to the direct experience of the senses only.\n\nWhen it concerns itself with \"scientific experience\" however, in which precise instruments and calculations are used, positive philosophy evidently considers Kant's view in relation to that invalid, assuming that \"scientific experience\" makes known to us the very substance of things, the true causes of our sensations—or if it does not do so now, it brings us closer to the truth of things, and can inform us later.\n\nContrary to Kant, the positivists are sure that \"more clear knowledge of phenomena makes them acquainted with things in themselves.\" They think that in looking upon physical phenomena as the motions of the ether, or as electrical or magnetic phenomena, and calculating their motions, they begin to know the very substance of things, i.e., the causes of phenomena; in other words, they believe exactly in the possibility of what Kant denied—the comprehension of the true substance of things by means of the investigation of phenomena.\n\nMoreover many physicists do not consider it necessary even to know Kant; and they could not themselves exactly define in what relation they stand toward him.\n\nOf course it is possible not to know Kant, but it is impossible to controvert him.\n\nEvery description of physical phenomena, by its every word, is related to the problems set forth by Kant—remains in this or that relation to them.\n\nIn general, the position of \"science\" in regard to this question of \" subjectively imposed \" or \" objectively cognized \" is more than tottering, and in order to form its conclusions \"science\" is forced to accept many purely hypothetical suppositions as things known—as indubitable data , not demanding proof.\n\nMoreover, physicists forget one very significant fact: in his book, Analysis of Sensations , Mach says: In the investigation of purely physical processes we generally employ concepts of so abstract a character that as a rule we think only cursorily, or not at all, of the sensations (elements) that lie at their base.\n\n.\n\n.\n\np.\n\n21 [paragraph continues] The foundation of all purely physical operations is based upon an almost unending series of sensations, particularly if we take into consideration the adjustment of the apparatus which must precede the actual experiment.\n\nNow it can easily happen to the physicist who does not study the psychology of his operations, that he does not (to reverse a well-known saying) see the trees for the wood, that he overlooks the sensory element at the foundation of his work.\n\n.\n\n.\n\nPsychological analysis has taught us that this is not surprising, since the physicist is always operating with sensations.\n\n1 Mach here calls attention to a very important thing.\n\nPhysicists de not consider it necessary to know psychology and to deal with it in their conclusions.\n\nBut when they are more or less acquainted with psychology, with that part of it which treats of the forms of receptivity, and take it into consideration, then they hold the most fantastic duality of opinion, as in the case of the man of orthodox belief who tries to reconcile the dogmas of faith with the arguments of reason, and who is obliged to believe simultaneously in the creation of the world in seven days, seven thousand years ago, and in geological periods hundreds of thousands of years long, and in the evolutionary theory.\n\nHe is thus forced to resort to sophisms, and demonstrate that by seven days is meant seven periods ."

