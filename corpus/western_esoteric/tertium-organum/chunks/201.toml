[content]
body = "And this formation of special literatures is the chief evil and the chief obstacle to a correct understanding of things.\n\nEach \"literature\" elaborates its own terminology, its own language, which is incomprehensible to the students of other literatures, and does not coincide with other languages; by this it defines its own limits the more sharply, divides itself from others, and makes these limits impassable.\n\nBut there are movements of thought which strive not in words, but in action, to fight this specialization.\n\nBooks are appearing which it is impossible to refer to any accepted library classification, which it is impossible to \"enroll\" in any faculty.\n\nThese books are the forerunners of a new literature which will break down all fences built in the region of thought, and will clearly show to those who desire to know, where they are going and where they can go.\n\nThe names of the authors of these books yield the most unexpected combinations.\n\nI shall not now mention the names of these authors, or the titles of these books, but shall dwell only upon the writings of Edward Carpenter and Dr.\n\nR.\n\nM.\n\nBucke.\n\nEdward Carpenter, directly and without any allegories and symbols, formulated the thought that the existing consciousness by which contemporary man lives, is merely the transitory form of another higher consciousness, which even now is manifesting in certain men, after appropriate preparation and training.\n\nThis higher consciousness Edward Carpenter names cosmic consciousness .\n\np.\n\n310 Carpenter traveled in the Orient, visited India and Ceylon, and there he found men, yogis and ascetics, striving to achieve cosmic consciousness, and he holds the opinion that the path to cosmic consciousness is already found in the Orient.\n\nIn the book, From Adam's Peak to Elephanta , he says: The West seeks the individual consciousness—the enriched mind, ready perceptions and memories, individual hopes and fears, ambitions, loves, conquests—the self, the local self, in all its phases and forms—and sorely doubts whether such a thing as an universal consciousness exists.\n\nThe East seeks the universal consciousness, and in these cases where its quest succeeds individual self and life thin away to a mere film, and are only the shadows cast by the glory revealed beyond.\n\nThe individual consciousness takes the form of Thought , which is fluid and mobile like quicksilver, perpetually in a state of change and unrest, fraught with pain and effort; the other consciousness is not in the form of thought.\n\nIt touches, sees, hears, and is those things which it perceives, without motion, without change, without effort, without distinction of subject and object, but with a vast and incredible joy.\n\nThe individual consciousness is specially related to the body.\n\nThe organs of the body are in some degree its organs.\n\nBut the whole body is only as one organ of the cosmic consciousness.\n\nTo attain this latter one must have the power of knowing one's self separate from the body—of passing into a state of ecstasy , in fact.\n\nWithout this the cosmic consciousness cannot be experienced.\n\nAll the subsequent writings of Carpenter, and especially his book of free verse, Towards Democracy , deal with the psychology of ecstatic experiences and portray the path whereby man goes toward this principal aim of his existence , i.e., to a new consciousness.\n\nOnly the attainment of this principal aim will illumine for man the past and the future; it will be a seership, an awakening—without this, with only the ordinary sleepy, \"individual\" consciousness, man is blind, and cannot hope to know anything that he cannot feel with his stick.\n\nDr.\n\nBucke, in his book, Cosmic Consciousness , gives the psychological view of this awakening of the new consciousness.\n\nI shall give, in abbreviated form, several quotations from his book.\n\nI What is Cosmic Consciousness?\n\np.\n\n311 Cosmic Consciousness is a higher form of consciousness than that possessed by the ordinary man."

