[content]
body = "The dog and the monkey by their intellect , their aptness to imitate, and by reason of the dog's fidelity to man, are as it were higher than the cat, but the cat is infinitely superior to them in intuition, esthetic sense, independence, and force of will.\n\nThe dog and the monkey manifest themselves in toto : all that they have is seen.\n\nThe cat, on the other hand, is not without reason regarded as a magical and occult animal.\n\nIn her there is much hidden of which she herself does not know.\n\nIf one speaks in terms of evolution, it is more correct to say that the cat and the dog are animals of different evolutions, just as in all p.\n\n97 probability, not one, but several evolutions are simultaneously going forward in humanity.\n\nThe recognition of several independent and from one standpoint equivalent evolutions, developing entirely different properties, would lead us out of a labyrinth of endless contradictions in our understanding of man and would show us the path to the only real and important evolution for us—the evolution into superman.\n\nFootnotes 83:1 R.\n\nM.\n\nBucke.\n\n\"Cosmic Consciousness,\" p.\n\n12.\n\n90:1 Generally speaking, we do not observe these actions, because we confuse them with \"rational\" actions; the principal cause of this confusion is that we call \"rational\" actions conscious—which they are not."

