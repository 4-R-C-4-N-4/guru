[content]
body = "Studying man from one side only I should stand in the same position in relation to him as, according to Kant, we stand with relation to the world surrounding us.\n\nWe know merely the form of our knowledge of it.\n\nThe world-in-itself we do not know.\n\nThus the psyche, with all its functions and with all its contents—I have two methods—analogy with myself, and intercourse with him by the exchange of thoughts .\n\nWithout this, man is for me a phenomenon merely, a moving automaton.\n\nThe noumenon of a man is his psyche together with everything this psyche includes within itself and that with which it unites him.\n\nIn \"man\" are opened to us both worlds, though the noumenal p.\n\n178 world is open only slightly, because it is cognized by us through the phenomenal.\n\nNoumenal means apprehended by the mind ; and the characteristic property of the things of the noumenal world is that they cannot be comprehended by the same method by which the things of the phenomenal world are comprehended .\n\nWe may speculate about the things of the noumenal world; we may discover them by a process of reasoning, and by means of analogy; we may feel them, and enter into some sort of communion with them; but we can neither see, hear, touch, weigh, measure them; nor can we photograph them or decompose them into chemical elements or number their vibrations.\n\nThus, the psyche, with all its functions and with all its contents—thoughts, feelings, desires, will—does not relate itself to the world of phenomena.\n\nWe cannot know even a single element of the psyche objectively .\n\nEmotion as such is a thing which it is impossible to see, just as it is impossible to see the value of a coin .\n\nYou can see the stamp upon a coin, but you will never see its value .\n\nIt is just as impossible to photograph thought as it is to imagine \"Egyptian darkness\" in a vial.\n\nTo think otherwise, to experiment with the photographing of thought, simply means to be unable to think logically.\n\nOn a phonographic record are the tracings of the needle, elevations and depressions, but there is no sound .\n\nHe who holds a phonographic record to his ear, hoping to hear something, will be sure to listen in vain.\n\n______ Including within himself two worlds , the phenomenal and the noumenal, man gives us the opportunity to understand in what relation these worlds stand to one another everywhere throughout nature.\n\nIt is necessary however to remember, that defining a noumenon in terms of the psyche, we take but one of its infinity of aspects.\n\nWe have already arrived at the conclusion that the noumenon of a thing consists in its function in another sphere—in its meaning which is incomprehensible in a given section of the world.\n\n1 Next p.\n\n179 we came to the conclusion that the number of meanings of one and the same thing in different sections of the world must be infinitely great and infinitely various, that it must become its own opposite, return again to the beginning (from our standpoint), etc., etc., infinitely expanding, contracting again, and so forth.\n\nIt is necessary to remember that the noumenon and the phenomenon are not different things, but merely different aspects of one and the same thing .\n\nThus, each phenomenon is the finite expression , in the sphere of our knowledge through the organs of sense, of something infinite .\n\nA phenomenon is the three-dimensional expression of a given noumenon.\n\nThis three-dimensionality depends upon the three-dimensional forms of our knowledge, i.e., speaking simply, upon our brains, nerves, eyes, and finger-tips."

