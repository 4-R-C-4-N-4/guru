[content]
body = "Thus on the one hand, Bonola, who ascribed to Lobachevsky views opposite to Kant, and their nearness to \"sensualism\" and \"current empiricism,\" is quite wrong, while on the other hand, it is not impossible to conceive that Hinton entirely subjectively ascribes to Gauss and Lobachevsky their inauguration of a new era in philosophy .\n\nNon-Euclidian geometry, including that of Lobachevsky, has no relation to metageometry whatever.\n\nLobachevsky does not go outside of the three-dimensional sphere.\n\nMetageometry regards the three-dimensional sphere as a section of higher space.\n\nAmong mathematicians, Riemann, who understood the relation of time to space, was nearest of all to this idea.\n\np.\n\n77 The point, of three-dimensional space, is a section of a meta-geometrical line.\n\nIt is impossible to generalize on any surface whatever the lines considered in metageometry.\n\nPerhaps this last is the most important for the definition of the difference between geometries (Euclidian and non-Euclidian and metageometry).\n\nIt is impossible to regard metageometrical lines as distances between points in our space, and it is impossible to represent them as forming any figures in our space.\n\nThe consideration of the possible properties of lines lying out of our space, the relation of these lines and their angles to the lines, angles, surfaces and solids of our geometry, forms the subject of metageometry .\n\nThe investigators of non-Euclidian geometry could not bring themselves to reject the consideration of surfaces.\n\nThere is something almost tragic in this.\n\nSee what surfaces Beltrami invented in his investigations of non-Euclidian geometry—one of his surfaces resembles the surface of a ventilator , another, the inner surface of a funnel.\n\nBut he could not decide to reject the surface, to cast it aside once and for all, to imagine that the line can be independent of the surface , i.e., a series of lines which are parallel or nearly parallel cannot be generalized on any surface, or even in three-dimensional space.\n\nAnd because of this, both he and many other geometers, developing non-Euclidian geometry, could not transcend the three-dimensional world.\n\nMechanics recognizes the line in time , i.e., such a line as it is impossible by any means to imagine upon the surface, or as the distance between two points of space.\n\nThis line is taken into consideration in the calculations pertaining to machines.\n\nBut geometry never touched this line, and dealt always with its sections only.\n\n______ Now it is possible to return to the question: what is space?\n\nand to discover if the answer to this question has been found.\n\nThe answer would be the exact definition and explanation of the three-dimensionality of space as a property of the world.\n\np.\n\n78 But this is not the answer.\n\nThe three-dimensionality of space as an objective phenomenon remains just as enigmatical and inconceivable as before.\n\nIn relation to three-dimensionality it is necessary: Either to accept it as a thing given , and to add this to the two data which we established in the beginning.\n\nOr to recognize the fallacy of all objective methods of reasoning, and return to another method, outlined in the beginning of the book.\n\nThen, on the basis of the two fundamental data, the world and consciousness , it is necessary to establish whether three-dimensional space is a property of the world, or a property of our knowledge of the world .\n\nBeginning with Kant, who affirms that space is a property of the receptivity of the world by our consciousness , I intentionally deviated far from this idea and regarded space as a property of the world ."

