[content]
body = "p.\n\n156 CHAPTER XIV The voices of stones.\n\nThe wall of a church and the wall of a prison.\n\nThe mast of a ship and a gallows.\n\nThe shadow of a hangman and of an ascetic.\n\nThe soul of a hangman and of an ascetic.\n\nThe different combinations of known phenomena in higher space.\n\nThe relationship of phenomena which appear unrelated, and the difference between phenomena which appear similar.\n\nHow shall we approach the noumenal world?\n\nThe understanding of things outside the categories of space and time.\n\nThe reality of many \"figures of speech.\" The occult understanding of energy.\n\nThe letter of a Hindu occultist.\n\nArt as the knowledge of the noumenal world.\n\nWhat we see and what we do not see.\n\nPlato's dialogue about the cavern.\n\nIT seems to us that we see something and understand something.\n\nBut in reality all that proceeds around us we sense only very confusedly, just as a snail senses confusedly the sunlight, the darkness, and the rain.\n\nSometimes in things we sense confusedly their difference in function, i.e., their real difference.\n\nOn one occasion I was crossing the Neva with one of my friends, A, with whom I happened to have had many conversations upon the themes touched on in this book.\n\nWe had been talking, but both fell silent as we approached the fortress, gazing up at its walls and making probably the same reflection.\n\n\"Right there are also factory chimneys!\" said A.\n\nBehind the walls of the fortress indeed appeared some brick chimneys blackened by smoke.\n\nOn his saying this, I too sensed the difference between the chimneys and the prison walls with unusual clearness and like an electric shock.\n\nI realized the difference between the very bricks themselves , and it seemed to me that A realized this difference also.\n\nLater in conversation with A, I recalled this episode, and he told me that not only then, but always , he sensed these differences and was deeply convinced of their reality.\n\n\"Positivism assures itself that a stone is a stone and nothing more,\" he said, \"but any p.\n\n157 simple woman or child knows perfectly that a stone from the wall of a church and one from a prison wall are different things.\" It seems to me also, that in considering a given phenomenon in connection with all the chains of sequences of which it is a link, we shall see that the subjective sensation of the difference between two physically similar objects—which we are accustomed to think of only as poetic expression, metaphor , and the reality of which we deny— is entirely real ; we shall see that these objects are really different , just as different as the candle and the coin which appear as similar circles (moving lines) in the two-dimensional world of the plane-man.\n\nWe shall see that things of the same material constitution but different in their functions are really different , and that this difference goes so deep as to make different the very material which is physically the same.\n\nThere are differences in stone, in wood, in iron, in paper, which no chemistry will ever detect: but these differences exist, and there are men who feel and understand them.\n\nThe mast of a ship, a gallows, a crucifix at a cross-roads on the steppes—these may be made of the same kind of wood, but in reality they are different objects made of different material .\n\nThat which we see, touch, investigate, is nothing more than \"the circles on the plane\" made by the coin and the candle.\n\nThey are only the shadows of real things, the substance of which is contained in their function .\n\nThe shadow of a sailor, of a hangman, and of an ascetic may be quite similar—it is impossible to distinguish them by their shadows, just as it is impossible to find any difference between the wood of a mast, of a gallows and of a cross by chemical analysis.\n\nBut they are different men and different objects—their shadows only are equal and similar."

