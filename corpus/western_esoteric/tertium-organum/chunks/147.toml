[content]
body = "In one we are preternaturally strict with ourselves, analyze with great care every idea before we discuss it; in the other we permit with extreme ease any compromises, and easily keep from seeing that which we do not care to see.\n\nMoreover, we reconcile ourselves to this division.\n\nWe do not find it necessary seriously to introduce into our lives our higher ideals, and almost accept as a principle the division of the \"real\" from the \"spiritual.\" All of the indecencies of our life have arisen as a result of this; all of those infinite falsifications p.\n\n228 of our life—falsifications of the press, art, drama, science, politics—falsifications in which we suffocate as in a fetid swamp, but which we ourselves create, because we and none other are servants and ministers of those falsifications.\n\nWe have no sense of the necessity to introduce our ideals into life, to introduce them into our daily activity , and we even admit the possibility that this activity may go counter to our spiritual quests, in accordance with one of those established standards the harm of which we recognize, but for which no one holds himself responsible because he did not create them himself.\n\nWe have no sense of personal responsibility , no boldness, and we are even without the consciousness of their necessity.\n\nAll this would be very sad and hopeless if the concept \"we\" were not so dubious.\n\nIn reality, the correctness of the very expression \"we\" is subject to grave doubt.\n\nThe enormous majority of the population of this globe is engaged in effect in destroying, disfiguring, and falsifying the ideas of the minority.\n\nThe majority is without ideas.\n\nIt is incapable of understanding the ideas of the minority, and left to itself it must inevitably disfigure and destroy.\n\nImagine a menagerie full of monkeys.\n\nIn this menagerie a man is working.\n\nThe monkeys observe his movements and try to imitate him but they can imitate only his visible movements; the meaning and aim of these movements are closed to them; therefore their actions will have quite another result.\n\nAnd should the monkeys escape from their cages and get hold of the man's tools, then perhaps they will destroy all his work, and inflict great damage on themselves as well.\n\nBut they will never be able to create anything.\n\nTherefore a man would make a great mistake if he referred to their \"work,\" and spoke of them as \"we.\" Creation and destruction—or more correctly, the ability to create or the ability only to destroy—are the principal signs of the two types of men.\n\nMorality is necessary to \"man\": only by regarding everything from the standpoint of morality is it possible to differentiate unmistakably the work of man from the activity of apes.\n\nBut at the same time delusions are nowhere more easily created than in the region of morality.\n\nAllured by his own particular morality and moral gospel, a man forgets the aim of moral perfection, forgets that this aim consists in knowledge.\n\nHe begins to see an aim in morality itself .\n\nThen occurs the a priori division of the emotions p.\n\n229 into good and bad, \"moral\" and \"immoral.\" The correct understanding of the aim and meaning of the emotions is lost along with this.\n\nMan is charmed with his \"niceness.\" He desires that everyone else should be just as nice as he, or as that remote ideal created by himself.\n\nThen appears delight in morality for morality's sake, a sort of moral sport—the exercise of morality for morality's sake.\n\nA man under these circumstances begins to be afraid of everything.\n\nEverywhere, in all manifestations of life, something \"immoral\" begins to appear to him, threatening to dethrone him or others from that height to which they have risen or may rise.\n\nThis develops a preternaturally suspicious attitude toward the morality of others."

