[content]
body = "Doesn't this show a singularly indigent imagination?\n\nIsn't this brave universe made on a richer pattern, with room in it for a long hierarchy of beings?\n\nMaterialistic science makes it infinitely richer in terms, with its molecules, and ether, and electrons and what not.\n\nAbsolute idealism, thinking of reality only under intellectual forms, knows not what to do with bodies of any grade, and can make no use of any psycho-physical analogy or correspondence.\n\nFechner, from whose writings Prof.\n\nJames makes copious quotations, upheld quite a different view-point.\n\nFechner's ideas are so near to those which have been presented in the previous chapters that we shall dwell upon them more extensively.\n\nI use the words of Prof.\n\nJames: The original sin, according to Fechner, of both our popular and scientific thinking, is our inveterate habit of regarding the spiritual not as the rule but as an exception in the midst of nature.\n\nInstead of believing our life to be fed at the breasts of the greater life, our individuality to be sustained by the greater individuality, which must necessarily have more consciousness and more independence than all that it brings forth, we habitually treat whatever lies outside of our life as so much slag and ashes of life only.\n\nOr if we believe in Divine Spirit, we fancy it on the one side as bodiless, and nature as soulless on the other.\n\nWhat comfort, or peace, Fechner asks, can come from such a doctrine?\n\nThe flowers wither at its breath, the stars turn into stone; our own body grows unworthy of our spirit and sinks to a tenement for carnal senses only.\n\nThe book of nature turns into a volume on mechanics, in which whatever has life is treated as a sort of anomaly; a great chasm of separation yawns between us and all that is higher than ourselves; and God becomes a thinnest of abstractions.\n\nFechner's great instrument for verifying the daylight view is analogy, .\n\n.\n\n.\n\nBain defines genius as the power of seeing analogies .\n\nThe number that Fechner could perceive was prodigious; but he insisted on the differences as well .\n\nNeglect to make allowance for these, he said, is the common fallacy in analogical reasoning.\n\nMost of us, for example, reasoning justly that, since all the minds we know are connected with bodies, therefore God's mind should be connected with a body, proceed to suppose that that body must be just an animal body over again, and paint an altogether human picture of God.\n\np.\n\n210 [paragraph continues] But all that the analogy comports is a body—the particular features of our body are adaptations to a habitat so different from God's that if God have a physical body at all, it must be utterly different from ours in structure.\n\nThe vaster orders of mind go with the vaster orders of body.\n\nThe entire earth on which we live must have, according to Fechner, its own collective consciousness.\n\nSo must each sun, moon, planet; so must the whole solar system have its own wider consciousness, on which the consciousness of our earth plays one part.\n\nSo has the entire starry system as such its consciousness; and if that starry system be not the sum of all that IS , materially considered, then that whole system, along with whatever else may be, is the body of that absolutely totalized consciousness of the universe to which men give the name of God.\n\nSpeculatively Fechner is thus a monist in his theology; but there is room in his universe for every grade of spiritual being between man and the final all-inclusive God.\n\nThe earth-soul he passionately believes in; he treats the earth as our special human guardian angel; we can pray to the earth as men pray to their saints.\n\nHis most important conclusion is, that the constitution of the world is identical throughout."

