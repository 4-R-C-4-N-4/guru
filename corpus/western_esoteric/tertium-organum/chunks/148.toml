[content]
body = "In an ardor of proselytism, desiring to popularize his moral views, he begins quite definitely to regard everything which is not in accord with his morality as hostile to it.\n\nAll this becomes \"black\" in his eyes.\n\nStarting with the idea of utter freedom, by arguments, by compromises, he very easily convinces himself that it is necessary to fight freedom.\n\nHe already begins to admit a censure of thought.\n\nThe free expression of opinions contrary to his own seems to him inadmissible.\n\nAll this may be done with the best intentions, but the results of it are very well known.\n\nThere is no tyranny more ferocious than the tyranny of morality.\n\nEverything is sacrificed to it.\n\nAnd of course there is nothing so blind as such tyranny, as such \"morality.\" Nevertheless humanity needs morality, but of a different kind—such as is founded on the real data of superior knowledge.\n\nHumanity is passionately seeking for this, and perhaps will find it.\n\nThen on the basis of this new morality will occur a great division, and those few who will be able to follow it will begin to rule others, or they will disappear altogether.\n\nIn any case, because of this new morality and those forces which it will engender, the contradictions of life will disappear, and those biped animals which constitute the majority of humanity will have no opportunity to pose as men any longer.\n\n______ The organized forms of intellectual knowledge are: science , founded upon observation, calculation and experience; and philosophy , p.\n\n230 founded upon the speculative method of reasoning and drawing conclusions.\n\nThe organized forms of emotional knowledge are: religion and art .\n\nReligious teachings, taking on the character of different \"cults\" as they depart from the original \"revelation,\" are founded entirely upon the emotional nature of man.\n\nMagnificent temples, the gorgeous vestments of priests and acolytes, the solemn ritual of worship, processions, sacrifices, singing, music, dances—all these have as their aim the attuning of man in a certain way, the evoking in him of certain definite feelings.\n\nThe same purpose is served by religious myths, legends, stories of the lives of heroes and saints, prophecies, apocalypses—they all act upon the imagination, upon the feelings, although they fail to fulfil their original purpose, which is to transmit ideas, i.e., to serve knowledge.\n\nThe aim of it is to give God to man, to give him morality, i.e., to give him an accessible knowledge of the mysterious side of the world.\n\nReligion may deviate from its true aim, may serve earthly interests and purposes, but its foundation is the search for truth, for God.\n\nArt serves beauty , i.e., emotional knowledge of its own kind.\n\nArt discovers beauty in everything, and compels man to feel it and therefore to know .\n\nArt is a powerful instrument of knowledge of the noumenal world: mysterious depths, each one more amazing than the last, open to the vision of man when he holds in his hands this magical key.\n\nBut let him only think that this mystery is not for knowledge but for pleasure in it, and all the charm disappears at once.\n\nJust as soon as art begins to take delight in that beauty which is already found , instead of the search for new beauty an arrestment occurs and art becomes a superfluous estheticism, encompassing man's vision like a wall.\n\nThe aim of art is the search for beauty , just as the aim of religion is the search for God and truth.\n\nAnd exactly as art stops, so religion stops also as soon as it ceases to search for God and truth, thinking it has found them.\n\nThis idea is expressed in the precept: Seek .\n\n.\n\n.\n\nthe kingdom of God and his righteousness .\n\n.\n\n.\n\n.\n\nIt does not say, find; but merely, seek!\n\n______ p.\n\n231 Science, philosophy, religion and art are forms of knowledge."

