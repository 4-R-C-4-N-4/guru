[content]
body = "I shall quote in this connection a poem in prose by Edward Carpenter, from the book Towards Democracy .\n\nTHE OCEAN OF SEX To hold in continence the great sea, the great ocean of Sex, within one, With flux and reflux pressing on the bounds of the body, the beloved genitals, Vibrating, swaying emotional to the star-glint of the eyes of all human beings, Reflecting Heaven and all Creatures, How wonderful!\n\nScarcely a figure, male or female, approaches, but a tremor travels across it.\n\nAs when on the cliff which bounds the edge of a pond someone moves, then in the bowels of the water also there is a mirrored movement, So on the edge of this Ocean.\n\nThe glory of the human form, even faintly outlined under the trees or by the shore, convulses it with far reminiscences; (Yet strong and solid the sea-banks, not lightly overpassed); Till maybe to the touch, to the approach, to the incantation of the eyes of one, p.\n\n175 It bursts forth, uncontrollable.\n\nO wonderful ocean of Sex, Ocean of millions and millions of tiny seed-like human forms contained (if they be truly contained) within each person, Mirror of the very universe, Sacred temple and innermost shrine of each body, Ocean-river flowing ever on through the great trunk and branches of Humanity, From which after all the individual only springs like a leaf-bud!\n\nOcean which we so wonderfully contain (if indeed we do not contain thee), and yet who containest us!\n\nSometimes when I feel and know thee within, and identify myself with thee, Do I understand that I also am of the dateless brood of Heaven and Eternity.\n\nReturning to that from which I started, the relation between the fundamental laws of our existence, love and death , the true mutual correlation of which remains enigmatical and incomprehensible to us, I shall merely recall Schopenhauer's words with which he ends his Counsels and Maxims .\n\nI should point out how Beginning and End meet together, and how closely and intimately Eros is connected with Death; how Orcus, or Amenthes, as the Egyptians called him, is not only the receiver but the giver of all things .\n\n.\n\n.\n\nDeath is the great reservoir of Life.\n\nEverything comes from Orcus—everything that is alive now and was once there.\n\nCould we but understand the great trick by which that is done, all the world would be clear.\n\n1 Footnotes 166:1 Mitchell Kennerly, 1912, New York and London.\n\n167:1 A Russian journalist and author.\n\nTransl .\n\n172:1 In the first Russian edition of this book, in those sketches which took the place of the present chapter, among other things I made the attempt to classify love, and to differentiate between \"love\" (individualized feeling) and \"sexual emotion\" (not individualized and undiscriminating in its longing for the satisfaction of the purely physical desire).\n\nBut it seems to me now that this division, like all similar divisions, is unsatisfactory.\n\nThe difference is not in facts but in men .\n\nOn earth there are living two entirely different races of men; and the difficulty of making psychological distinctions depends, in great measure, upon the fact that we endeavor to impose on all men common characteristics which they do not possess.\n\n172:2 F.\n\nNietzsche: \"Thus spake Zarathustra.\" (Boni and Liveright New York), pp.\n\n195, 196.\n\n175:1 Transl.\n\nby T.\n\nB.\n\nSaunders, M.\n\nA.\n\nMacmillan Co., New York."

