[content]
body = "Penetrating there, it first of all renounces its fundamental axioms of identity and difference.\n\nIn the world of infinite and fluent magnitudes, a magnitude may be not equal to itself; a part may be equal to the whole; and of two equal magnitudes one may be infinitely greater than the other .\n\nAll this sounds like an absurdity from the standpoint of the mathematics of finite and constant numbers.\n\nBut the mathematics of finite and constant numbers is itself the calculation of relations between non-existent magnitudes, i.e., an absurdity.\n\nAnd therefore only that which from the standpoint of this mathematics seems an absurdity, can be the truth.\n\nLogic now goes along the same path.\n\nIt must renounce itself, come to perceive the necessity for its own annihilation—then out of it a new and higher logic can arise.\n\nIn his Critique of Pare Reason Kant proved the possibility of transcendental logic .\n\nBefore Bacon and earlier than Aristotle, in the ancient Hindu scriptures, the formulæ of this higher logic were given, opening the doors of mystery.\n\nBut the meaning of these formula was rapidly lost.\n\nThey were preserved in ancient books, but remained there as some strange mummeries of extinguished thought, the words without real content.\n\nNew thinkers again discovered these principles, and expressed them in new words, but again they remained incomprehensible, again they suffered transformation into some unnecessary ornamental form of words.\n\nBut the idea persisted .\n\nA consciousness of the possibility of finding and establishing the laws of the higher world was never lost.\n\nMystical philosophy never regarded the logic of Aristotle as all-embracing and all-powerful.\n\nIt built its system outside of logic or above logic, unconsciously going along those paths of thought paved in remote antiquity.\n\nThe higher logic existed before deductive and inductive logic was formulated.\n\nThis higher logic may be called intuitive logic—the logic of infinity, the logic of ecstasy.\n\nNot only is this logic possible, but it exists, and has existed from time immemorial; it has been formulated many times; it has entered into philosophical systems as their key—but for some strange reason has not been recognized as logic .\n\np.\n\n262 It is possible to deduce the system of this logic from many philosophical systems.\n\nThe most precise and complete formulation of the law of higher logic I find in the writing of Plotinus, in his On Intelligible Beauty .\n\nI shall quote this passage in the succeeding chapter.\n\nI have called this system of higher logic Tertium Organum because for us it is the third canon —third instrument— of thought after those of Aristotle and Bacon.\n\nThe first was the Organon , the second, Novum Organum .\n\nBut the third existed earlier than the first.\n\nMan, master of this instrument, of this key, may open the door of the world of causes without fear.\n\nThe axioms which Tertium Organum embraces cannot be formulated in our language.\n\nIf we attempt to formulate them in spite of this, they will produce the impression of absurdities.\n\nTaking the axioms of Aristotle as a model, we may express the principal axiom of the new logic in our poor earthly language in the following manner: A is both A and Not-A .\n\nor Everything is both A and Not-A .\n\nor, Everything is All .\n\nBut these axioms are in effect absolutely impossible.\n\nThey are not the axioms of higher logic , they are merely attempts to express the axioms of this logic in concepts.\n\nIn reality the ideas of higher logic are inexpressible in concepts.\n\nWhen we encounter such an inexpressibility it means that we have touched the world of causes.\n\nThe logical formula: A is both A and Not-A , corresponds to the mathematical formula: A magnitude can be greater or less than itself .\n\nThe absurdity of both these propositions shows that they cannot refer to our world."

