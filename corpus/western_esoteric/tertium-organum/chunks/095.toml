[content]
body = "The positivistic scientist finds himself in the presence of nature almost in the position of a savage in a library of rare and valuable books.\n\nFor a savage a book is a thing of definite size and weight.\n\nHowever long he may ask himself what purpose this strange thing serves, he will never discover the truth from its appearance; and the contents of the book will remain for him the incomprehensible noumenon .\n\nIn like manner the contents of nature are incomprehensible to the positivistic scientist.\n\nBut if a man knows of the existence of the contents of the book— p.\n\n145 the noumenon of life—if he knows that a mysterious meaning is hidden under visible phenomena, there is the possibility that in the long run he will discover the contents.\n\nFor success in this it is necessary to grasp the idea of the inner contents, i.e., the meaning of the thing in itself.\n\nThe scientist who discovers little tablets with hieroglyphics, or wedge-shaped inscriptions in an unknown language, deciphers and reads them after great labor.\n\nAnd in order to accomplish this he needs only one thing: it is necessary for him to know that these little signs represent an inscription .\n\nAs long as he regards them simply as an ornament, as the outside embellishment of little tablets, or as an accidental tracing without meaning—up to that time their meaning and significance will be closed to him absolutely.\n\nBut let him only assume the existence of that meaning and the possibility of its comprehension will be already within sight.\n\nNo secret cipher exists which cannot be solved without the aid of any key.\n\nBut it is necessary to know that it is a cipher .\n\nThis is the first and necessary condition.\n\nLacking this it is impossible to accomplish anything.\n\n______ The idea of the existence of the visible and the hidden sides of life was known to philosophy long ago.\n\nPhenomena were regarded as only one aspect of the world, and as being infinitely small compared to the hidden aspect— seeming , not existing really, arising in consciousness at the moment of its contact with the real world.\n\nAnother side, noumena , was recognized as really existing in itself, but inaccessible for our receptivity.\n\nBut there is no greater error than to regard the world as divided into phenomena and noumena—to conceive of phenomena and noumena apart from one another, and susceptible of being separately known.\n\nThis is philosophic illiteracy, which shows itself most clearly in the dualistic spiritistic theories.\n\nThe division into phenomena and noumena exists only in our minds.\n\nThe \"phenomenal world\" is simply our incorrect perception of the world.\n\nAs Carl DuPrel has said, \" The world beyond is this world, only perceived strangely .\" It would be more accurate to say, that this world is the world beyond perceived strangely .\n\np.\n\n146 Kant's idea is quite correct, that the study of the phenomenal side of the world will not bring us any nearer to the understanding of \"things-in-themselves.\" The \"thing-in-itself\"—that is the thing as it exists in itself, independently of us .\n\nThe \"phenomenon of the thing\"—that is the thing in such semblance as we perceive it.\n\nThe example of a book in the hands of an illiterate savage shows us quite clearly that it is sufficient not to know about the existence of the noumenon of a thing (the contents of the book in this case) in order that it shall not manifest itself in phenomena.\n\nOn the other hand, the knowledge of its existence is sufficient to make possible its discovery with the aid of the very phenomena which, without the knowledge of the noumenon, would be perfectly useless."

