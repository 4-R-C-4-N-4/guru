body = "p.\n\n306 CHAPTER XXIII Cosmic Consciousness of Dr.\n\nBucke.\n\nThe three forms of consciousness according to Dr.\n\nBucke.\n\nSimple consciousness, or the consciousness of animals.\n\nSelf-consciousness, or the consciousness of men.\n\nDr.\n\nBucke's fundamental error.\n\nCosmic consciousness.\n\nIn what is it expressed?\n\nSensation, perception, concept, higher MORAL concept—creative intuition.\n\nMen of cosmic consciousness.\n\nAdam's fall into sin.\n\nThe knowledge of good and evil.\n\nChrist and the salvation of man.\n\nCommentary on Dr.\n\nBucke's book.\n\nBirth of the new humanity.\n\nTwo races.\n\nSUPERMAN.\n\nTable of the four forms of the manifestation of consciousness.\n\nVERY many men believe that the fundamental problems of life are absolutely unsolvable, that humanity will never know why it is striving, or for what it is striving, for what it suffers, or whither it is bound.\n\nIt is regarded as almost indecent even to raise these questions.\n\nIt is decreed that we live \"so\"—that we \"simply live\" thinking of nothing or thinking only on that which yields a solution—on the surface at least.\n\nMen have des-paired of finding answers to fundamental questions and so have left them alone.\n\nYet at the same time men are not in the least aware of what really created in them such a sense of insolubility and despair.\n\nWhence comes this feeling that it is better not to think about many things ?\n\nIn reality we feel this despair only when we begin to regard man as something \"finite,\" finished; when we see nothing beyond man, and think that we already know everything about him.\n\nIn such form the problem is truly a desperate one.\n\nA cold wind blows on us from all those social theories promising incalculable welfare on earth, leaving a sense of dissatisfaction and chill even when we believe their promises.\n\nWhy?\n\nWhat is all this for?\n\nWell, everybody will be well fed and well taken care of—Splendid!\n\nBut after that, what ?\n\nLet us suppose—although it is difficult, almost impossible to imagine— p.\n\n307 that materialistic culture, of itself, has led men to a fortunate state of existence.\n\nOn earth, then, there exists an unadulterated civilization and culture.\n\nBut after that, what ?\n\nAfter that, many resounding phrases of \"incredible horizons\" opening before science .\n\n\"Communication with the planet Mars,\" \"The chemical synthesis of protoplasm,\" \"The utilization of the rotation of the earth around the sun,\" \"Energy imprisoned in an atom,\" \"Vaccine for all diseases,\" \" Life to the length of a hundred years \"—or even to one hundred and fifty!\n\nAfter that perhaps, \"The artificial creation of men\"—but beyond this imagination fails.\n\nIt is possible to dig through the earth, but that would be entirely useless.\n\nHere indeed we encounter that feeling of the insolubility of the main questions concerning the aims of existence, and that feeling of despair on account of our lack of understanding.\n\nTruly, suppose that we have dug completely through the earth—what then?\n\nShall we dig in another direction?\n\nBut it is all very wearisome after all.\n\nNevertheless the various positivistic social theories, \"historical materialism,\" and so forth, promise nothing better, and can promise nothing.\n\nTo get any answer at all to such tormenting questions we must turn in quite another direction: to the psychological method of study of man and of humanity.\n\nAnd here we see with amazement, that the psychological method gives an entirely satisfactory answer to those fundamental questions which seem to us quite insoluble, and around about which we fruitlessly wander equipped with the defective instrument of the positivistic method.\n\nThe psychological method gives a direct answer at least to the question of the immediate purpose of our existence."

