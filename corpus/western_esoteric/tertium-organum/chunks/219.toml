[content]
body = "And truth itself is motion, and can never lead to arrestment, to the cessation of search.\n\nALL THAT ARRESTS THE MOTION OF THOUGHT—IS FALSE.\n\nTherefore the true and real progress of thought is only in the broadest striving toward knowledge, that does not recognize the possibility of arrestment in any found forms of knowledge at all.\n\nThe meaning of life is in eternal search.\n\nAnd only in that search can we find something truly new."

