[content]
body = "1 This is the way a little girl thought, about whom I was reading, if I mistake not, in The Theosophical Review .\n\nThe girl was sitting near the fireplace, and beside her slept a cat.\n\n\"Well, the eat is sleeping,\" the girl reflected, \"perhaps she sees in a dream that she is not a cat, but a little girl.\n\nAnd maybe I am not a little girl at all, but a cat, and only see in a dream that I am a little girl .\n\n.\n\n.\n\n.\" The next moment the house resounds with a violent cry, and the parents of the little girl have a hard time to convince her that she is not a cat but really a little girl.\n\nAll this shows that it is necessary to philosophize with a certain amount of skill.\n\nOur thought is encompassed by many blind alleys, and positivism, always attempting to apply the rule of proportion, is in itself such a blind alley.\n\n______ Our analysis of phenomena, the relation which we have shown to exist between physical phenomena and those of life and of the psyche, permits us to assert quite definitely that psychic phenomena cannot be a function of physical phenomena—or phenomena of a lower order.\n\nWe established that the higher cannot be a function of the lower.\n\nAnd this division into higher and lower is also based upon the clear fact of the different potentialities of various orders of phenomena—of the different amount of latent force contained in them (or liberated by them).\n\nAnd of course we have the right to call those phenomena the higher which possess immeasurably greater potentiality, immeasurably more latent force; and to call those the lower which possess less potentiality, less latent force.\n\np.\n\n182 The phenomena of life are the higher in comparison with physical phenomena.\n\nPsychic phenomena are the higher , in comparison with the phenomena of life and physical phenomena.\n\nWhich must be the function of which is clear.\n\nWithout making a palpable logical mistake we cannot declare life and the psyche to be dependent functionally upon physical phenomena, i.e., to be a result of physical phenomena.\n\nThe truth is quite the opposite of this: everything forces us to recognize physical phenomena as the result of life, and life (in a biological sense) as the result of some form of psychic life, which is perhaps unknown to us.\n\nBut of which life, and of which psyche?\n\nHere lies the question.\n\nOf course it would be absurd to regard our planetary sphere as a function of the vegetable and animal life proceeding upon it —and the visible stellar universe as a function of the human psyche.\n\nBut nothing of this sort is meant.\n\nIn the occult understanding of things we speak always of another life and another psyche, the particular manifestation of which is our life and our psyche.\n\nIt is important to establish the general principle that physical phenomena, being the lower , depend upon the phenomena of life and of the psyche, which are higher .\n\nIf we admit this principle as established, then it is possible to proceed further.\n\nThe first question which arises is this: In what relation does the psychic life of man stand to his body and his brain?\n\nThis question has been answered differently in different times.\n\nPsychic life has been regarded as a direct function of the brain (\" Thought is the motion of brain substance \"), thus of course denying any possibility of thought without the existence of a brain.\n\nThen followed an attempt to establish a parallelism between psychic activity and the activity of the brain.\n\nBut the nature of this parallelism has always remained obscure.\n\nYes, evidently, the brain works parallel to thinking and feeling: an arrestment or a disorder of the activity of the brain brings as a consequence a visible arrestment or disorder of psychic activity.\n\nBut after all the activity of the brain is merely motion , i.e., an objective phenomenon, whereas the activity of the psyche is a phenomenon objectively undefinable, p.\n\n183 and at the same time more powerful than anything objective.\n\nHow shall we reconcile all this?"

