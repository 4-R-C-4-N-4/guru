[content]
body = "Emotions apparently the same may be united with the very small I's and with the very great and lofty I's; and so the rôle and meaning of such emotions in life may be very different.\n\nThe continual shifting of emotions, each of which calls itself I and strives to establish power over man, is the chief obstacle to the establishment of a constant I.\n\nAnd particularly does this interfere when the emotions are manifesting in and passing through the regions of the psyche connected with a certain kind of self-consciousness and self-assertion.\n\nThese are the so-called personal emotions .\n\nThe sign of the growth of the emotions is the liberation of them from the personal element, and their sublimation on the higher planes.\n\nThe liberation from personal elements augments the cognizing power of the emotions, because the more there are of pseudo-personal elements in emotion the greater the possibility of delusion.\n\nPersonal emotion is always partial , always unjust , by reason of the one fact that it opposes itself to all the rest.\n\nThus the cognitive power of the emotions is greater in proportion as there is less of self-elements in a given emotion, i.e., more consciousness that this emotion is not the I.\n\nWe have seen before in studying space and its laws, that the evolution of knowledge consists in a gradual withdrawing from oneself.\n\nHinton expresses this very well.\n\nHe says that only by withdrawing from ourselves do we begin to comprehend the world as it is.\n\nThe entire system of mental exercises with colored cubes invented by Hinton aims at the training of consciousness to look at things from other than the pseudo-personal standpoint.\n\nWhen we study a block of cubes, writes Hinton, (say a cube consisting of 27 lesser cubes) we first of all learn it by starting from a particular cube and axis, and learning how 26 others come with regard to that cube.\n\n.\n\n.\n\n.\n\nWe learn the block with regard to this axis, so that we can mentally conceive the disposition of every cube as it comes regarded from one point of view.\n\nNext we suppose ourselves to be in another p.\n\n222 cube at the extremity of another axis; and looking from this axis, we learn the aspect of all the cubes, and so on.\n\nThus we impress on the feelings what the block of cubes is like from every axis.\n\nIn this way we get a knowledge of the block of cubes.\n\nNow, to get the knowledge of humanity, we must study it from the standpoint of the individuals composing it.\n\nThe egotist may be compared with the man who knows a cube from one standpoint only.\n\nThose who feel superficially with a great many people, are like those learners who have a slight acquaintance with a block of cubes from many points of view.\n\nThose who have a few deep attachments are like those who know them well from only one or two points of view.\n\nAnd after all, perhaps the difference between the good and the rest of us, lies rather in the former being aware .\n\nThere is something outside them which draws them to it, which they see, while we do not .\n\n1 Just as it is incorrect in relation to oneself to evaluate everything from the standpoint of one emotion , contrasting it with all the rest, so is it correspondingly incorrect in relation to the world and men to evaluate everything from the standpoint of one's own accidental I, contrasting oneself of a given moment with the rest.\n\nThus the problem of correct emotional knowledge consists in the fact that one shall feel in relation to the world and men from some standpoint other than the personal .\n\nAnd the broader the circle becomes for which a person feels, the deeper becomes the knowledge which his emotions yield.\n\nBut not all emotions are of equal potency in liberating from self-elements .\n\nCertain emotions from their very nature are disruptive , separative, alienating, forcing man to feel himself as individualized and separate; such are hatred, fear, jealousy, pride, envy.\n\nThese are emotions of a materialistic order , forcing a belief in matter."

