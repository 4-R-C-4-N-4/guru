[content]
body = "By ourselves we are simply out of relation with each other, for we are both of us there, and different from each other, which is a positive relation.\n\nWhat we are without knowing, it knows that we are.\n\nIt is as if the total universe of inner life had a sort of grain or direction, a sort of valvular structure, permitting knowledge to flow in one way only, so that the wider might always have the narrower under observation, but never the narrower the wider.\n\nFechner likens our individual persons on the earth unto so many sense-organs of the earth-soul.\n\nWe add to its perceptive life.\n\n.\n\n.\n\n.\n\nIt absorbs our perceptions into its larger sphere of knowledge, and combines them with the other data there.\n\nThe memories and conceptual relations that have spun themselves round the perceptions of a certain p.\n\n212 person remain in the larger earth-life as distinct as ever, and form new relations.\n\n.\n\n.\n\n.\" Fechner's ideas are expounded in his book, Zendavesta .\n\nI have made such a lengthy quotation from Prof.\n\nJames' book in order to show that the ideas of the animism and of the rationality of the world are neither new nor paradoxical.\n\nIt is a natural and logical necessity, resulting from a broader view of the world than that which we usually permit ourselves to hold.\n\nLogically we must either recognize life and rationality in everything, in all \"dead nature,\" or deny them completely, even IN OURSELVES.\n\nFootnotes 208:1 \"The Great Initiates,\" by E.\n\nSchure."

