[content]
body = "Sensing lines only, the plane being will not sense them as we do.\n\nFirst of all, he will see no angle .\n\nIt is extremely easy for us to verify this by experiment.\n\nIf we will hold before our eyes two matches, inclined one to the other in a horizontal plane, then we shall see one line.\n\nTo see the angle we shall have to look from above .\n\nThe two-dimensional being cannot look from above and therefore cannot see the angle.\n\nBut measuring the distance between the lines of different \"solids\" of his world, the two-dimensional being will come continually in contact with the angle, and he will regard it as a strange property of the line, which is sometimes manifest and sometimes is not.\n\nThat is, he will refer the angle to time; he will regard it as a temporary, evanescent phenomenon, a change in the state of a \"solid,\" or as motion .\n\nIt is difficult for us to understand this.\n\nIt is difficult to imagine how the angle can be regarded as motion.\n\nBut it must be absolutely so, and cannot be otherwise.\n\nIf we try to represent to ourselves how the plane being studies the square, then certainly we shall find that for the plane being the square will be a moving body .\n\nLet us imagine that the plane being is opposite one of the angles of the square.\n\nHe does not see the angle—before him is a line, but a line possessing very curious properties.\n\nApproaching this line, the two-dimensional being observes that a strange thing is happening to the line.\n\nOne point remains in the same position, and other points are withdrawing back from both sides.\n\nWe repeat, that the two-dimensional being has no idea of an angle.\n\nApparently the line remains the same as it was, yet something is happening to it, without a doubt.\n\nThe plane being will say p.\n\n63 that the line is moving, but so rapidly as to be imperceptible to sight.\n\nIf the plane being goes away from the angle and follows along a side of the square, then the side will become immobile.\n\nWhen he comes to the angle, he will notice the motion again.\n\nAfter going around the square several times, he will establish the fact of regular, periodical motions of the line.\n\nQuite probably in the mind of the plane being the square will assume the form of a body possessing the property of periodical motions, invisible to the eye, but producing definite physical effects (molecular motion)—or it will remain there as a perception of periodical moments of rest and motion in one complex line, and still more probably it will seem to be a rotating body .\n\nQuite possibly the plane being will regard the angle as his own subjective perception, and will doubt whether any objective reality corresponds to this subjective perception.\n\nNevertheless he will reflect that if there is action , yielding to measurement, so must there be the cause of it, consisting in the change of the state of the line, i.e., in motion.\n\nThe lines visible to the plane being he may call matter , and the angles— motion .\n\nThat is, he may call the broken line with an angle, moving matter.\n\nAnd truly to him such a line by reason of its properties will be quite analogous to matter in motion.\n\nIf a cube were to rest upon the plane upon which the plane being lives, then this cube will not exist for the two-dimensional being, but only the square face of the cube in contact with the plane will exist for him—as a line, with periodical motions.\n\nCorrespondingly, all other solids lying outside of his plane., in contact with it, or passing through it, will not exist for the plane being.\n\nThe planes of contact or cross-sections of these bodies will alone be sensed.\n\nBut if these planes or sections move or change, then the two-dimensional being will think, indeed, that the cause of the change or motion is in the bodies themselves, i.e., right there on his plane."

