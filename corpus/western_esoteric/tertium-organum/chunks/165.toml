[content]
body = "All attempts to penetrate mentally into that higher, noumenal world, or world of causes, by means of the logic of the phenomenal world, if they did not fail altogether, or did not lead to castles in the air , gave only one result: in becoming conscious of a new order of things, a man lost the sense of the reality of the old order.\n\nThe visible world began to seem to him fantastic and unreal, everything all about him was disappearing, was vanishing like smoke, leaving a dreadful feeling of illusion .\n\nIn everything he felt the abyss of infinity, and everything was plunging into the abyss.\n\nThis sense of the infinite is the first and most terrible trial before initiation.\n\nNothing exists!\n\nA little miserable soul feels itself suspended in an infinite void.\n\nThen even this void disappears!\n\nNothing exists.\n\nThere is only infinity, a constant and continuous division and dissolution of everything.\n\nThe mystical literature of p.\n\n258 all peoples abounds in references to this sensation of darkness and emptiness .\n\nSuch was that mysterious deity of the ancient Egyptians, about which there exists a story in the Orpheus myth, in which it is de-scribed as a \" Thrice-unknown darkness in contemplation of which all knowledge is resolved into ignorance .\" 1 This means that man must have felt horror transcending all limits as he approached the world of causes with the knowledge of the world of phenomena only, his instrument of logic having proved useless, because all the new eluded him.\n\nIn the new as yet he sensed chaos only, the old had disappeared, gone away and become unreal.\n\nHorror and regret for the loss of the old mingled with horror of the new—unknown and terrible by its infinitude .\n\nAt this stage man experiences the same thing that an animal, becoming a man, would feel.\n\nHaving looked into a new world for an instant, it is attracted by the life left behind.\n\nThe world which it saw only for an instant seems but a dream, a vision, the creation of imagination, but the familiar old world, too, is never thereafter the same, it is too narrow, in it there is not sufficient room.\n\nThe awakening consciousness can no longer live the free life of the beast.\n\nAlready it knows something different, it hears some voices, even though the body holds it.\n\nAnd the animal does not know where or how it can escape from the body or from itself.\n\nA man on the threshold of a new world experiences literally the same thing.\n\nHe has heard celestial harmonies, and the wearisome songs of earth touch him no longer, nor do they move him—or if they touch and move him it is because they remind him of celestial harmonies, of the inaccessible, of the unknown.\n\nHe has experienced the sensation of an unusual EXPANSION of consciousness, when everything was clear to him for a moment, and he cannot reconcile himself to the sluggish earthly work of the brain.\n\nThese moments of the \"sensation of infinity\" are accompanied by unusual emotions.\n\nIn theosophical literature, and in books on occultism, it is often asserted that on entering into the \"astral\" world, man begins to see new colors, colors which are not in the solar spectrum.\n\n2 In p.\n\n259 this symbolism of the new colors of the \"astral sphere\" is conveyed the idea of those new emotions which man begins to feel along with the sensation of the expansion of consciousness—\"of the sea pouring into the drop.\" This is the \"strange bliss\" of which mystics speak, the \"heavenly light\" which saints \"see,\" the \"new\" sensations experienced by poets.\n\nEven conversational psychology identifies \"ecstasy\" with entirely unusual sensations, inaccessible and unknown to man in the life of every day."

