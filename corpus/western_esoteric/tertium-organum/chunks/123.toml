[content]
body = "By trying to think out of the usual categories, by trying to look at things and at ourselves from a new angle and simultaneously from many sides, by trying to liberate our thinking from its accustomed categories of perception in space and time, little by little we begin to notice analogies between things which we did not notice before.\n\nOur mind grows, and with it grows the power to discover analogies.\n\nThis ability, with each new step attained, expands and enriches the mind.\n\nEach minute we advance more rapidly, each new step makes the next more easy.\n\nOur psyche becomes different .\n\nThen, applying to ourselves this expanded ability to construct analogies, and looking about we suddenly perceive all around ourselves a psychic life the existence of which we were previously unaware.\n\nAnd we understand the reason for this unawareness: this psychic life belongs to another plane, and not to that to which our psychic life is native.\n\nThus in this case the ability to discover new analogies p.\n\n192 is the beginning of changes, which translate us into another plane of existence.\n\nThe thought of a man begins to penetrate into the world of noumena , which is in affinity with it.\n\nThen his point of view changes likewise with regard to the things and events of the phenomenal world .\n\nPhenomena may suddenly assume, to his eyes, quite a different grouping.\n\nAs already said, similar things may be different from one another in reality, different things may be similar; quite separate, disconnected things may be part of one great whole, of some entirely new category ; and things which appear inextricably united in one, constituting one whole, may in reality be manifestations of different beings having nothing in common among themselves, even knowing nothing whatever about the existence of one another.\n\nSuch indeed may be any whole of our world—man, animal, planet, planetary system—i.e., consisting of different psychic lives, a battle-field as it were of warring entities.\n\nIn each whole of our world we perceive a multitude of opposing tendencies, aspirations, efforts.\n\nEach aggregate is as it were an arena of struggle for multitudes of opposing forces, each of which acts by itself , is directed to its own goal , usually to the disruption of the whole.\n\nBut the interaction of these forces represents the life of the whole; and in everything something is always acting which limits the activity of separate tendencies.\n\nThis something is the psychic life of the whole.\n\nWe cannot establish the existence of such a life by analogy with ourselves, or by intercourse with it, or by exchange of thoughts, but a new path opens before us.\n\nWe perceive a certain separate and quite definite function (the preservation of the whole) .\n\nBehind this function we infer a certain separate something.\n\nA separate something having a definite function is impossible without a separate psychic life.\n\nIf the whole possesses its own psychic life then the separate tendencies or forces must also possess a psychic life of their own.\n\nA body or organism is the point of intersection of such lines of forces, a place of meeting, perhaps a battle-field .\n\nOur \"I\" is also that battle-field on which this or that emotion, this or that habit or inclination gains an advantage, subjecting to itself all of the rest at every given moment, and identifying itself with the I.\n\nOur I is a being , having its own life, imperfectly conscious of that of which it itself consists, and identifying p.\n\n193 itself with this or another portion of itself.\n\nHave we any warrant for supposing that the organs and members of a body, thoughts and emotions , are BEINGS also?\n\nWe have, because we know that there exists nothing purely mechanical; and any something, having a separate function , MUST BE animated and can be called a being ."

