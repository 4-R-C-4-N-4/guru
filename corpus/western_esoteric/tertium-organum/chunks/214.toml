body = "329 cases it is more correct to regard them all as the highest types in their own evolution.\n\nThe absence of intermediate forms makes this view much more probable than that which is usually accepted, and which gives such rich material for discussions about the obligatory and inevitable perfection of all—\"perfection\" from our standpoint.\n\nThe views propounded here are indeed more difficult than the usual evolutionary point of view, just as the conception of the living world as an entire organism is more difficult; but this difficulty must be surmounted.\n\nI have said already that the real world must be illogical from the usual points of view, and by no means can it be made simple and comprehensible to one and all.\n\nThe theory of evolution is in need of many corrections, additions, and much development.\n\nIf we consider the existing forms on any given plane, it will be quite impossible to declare that all these forms evolved from the simplest forms on this plane.\n\nSome undoubtedly evolved from the lowest ones; others resulted from the process of degeneration of the higher ones; a third class developed from the remnants of some evolved form—while a fourth class resulted as a consequence of the incursion into the given plane of the properties and characteristics of some higher plane.\n\nIt is certainly impossible to regard these complex forms as developed by an evolutionary process upon the given plane.\n\nThe below classification will show more clearly this correlation of forms of manifestation of consciousness, or of different states of consciousness.\n\nFirst form .\n\nA sense of one-dimensional space in relation to the outer world.\n\nEverything transpires on a line, as it were.\n\nSensations are not differentiated.\n\nConsciousness is immersed in itself, in its work of nutrition, digestion and assimilation of food, etc.\n\nThis is the state of the cell, the group of cells, of tissues and organs of the body of an animal, of plants and lower organisms.\n\nIn a man this is the \"instinctive mind.\" Second form .\n\nA sense of two-dimensional space.\n\nThis is the state of the animal.\n\nThat which is for us the third dimension, for it is motion.\n\nIt already senses, feels, but does not think.\n\nEverything that it sees appears to it as genuinely real.\n\nEmotional life and flashes of thought in a man.\n\nThird form .\n\nA sense of three-dimensional space.\n\nLogical p.\n\n330 thinking.\n\nPhilosophical division into I and Not-I.\n\nDogmatic religions or dualistic spiritism.\n\nCodified morality.\n\nDivision into spirit and matter.\n\nPositivistic science.\n\nThe idea of evolution.\n\nA mechanical universe.\n\nThe understanding of cosmic ideas as metaphors.\n\nImperialism, \"historical materialism,\" socialism, etc.\n\nSubjection of the personality to society and law.\n\nAutomatism.\n\nDeath as the extinction of the personality.\n\nIntellect and flashes of self-consciousness.\n\nFourth form .\n\nBeginning of the understanding of four-dimensional space.\n\nA new concept of time.\n\nThe possibility of more prolonged self-consciousness.\n\nFlashes of cosmic consciousness.\n\nThe idea and sometimes the sensation of a living universe.\n\nA striving toward the wondrous.\n\nSensation of infinity.\n\nBeginning of self-conscious will and moments of cosmic consciousness.\n\nPossibility of personal immortality.\n\nThus the third form includes that \"man\" whom science studies.\n\nBut the fourth form is characteristic of the man who is beginning to pass out of the field of observation of positivism and logical understanding.\n\nThe table at the end of the book is a summing up of the contents of the entire book, and shows more in detail the correlation of the observed forms of consciousness in the living world and in man.\" EVOLUTION OR CULTURE?"

