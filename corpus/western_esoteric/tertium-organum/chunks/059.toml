[content]
body = "Reflex actions are simply responses by motion , reactions upon external irritations, taking place always in the same way, regardless p.\n\n87 of their utility or futility, expediency or inexpediency in any given case.\n\nTheir origin and laws are due to the simple irritability of a cell.\n\nWhat is the irritability of a cell, and what are these laws?\n\nThe irritability of a cell is defined as its faculty to respond to external irritation by a motion.\n\nExperiments with the simplest mono-cellular organisms, have shown that this irritability acts according to definite laws.\n\nThe cell responds by a motion to outside irritation.\n\nThe force of the responsive motion increases as the force of the irritation is intensified, but in no definite proportionality.\n\nIn order to provoke the responsive movement the irritation must be of a sufficient intensity.\n\nEach experienced irritation leaves a certain trace in the cell, making it more receptive to the new irritations.\n\nIn this we see that the cell responds to the repetitive irritation of an equal force by a more forceful motion than the first one.\n\nAnd if the irritations be repeated further the cell will respond to them by more and more forceful motions, up to a certain limit.\n\nHaving reached this limit the cell experiences fatigue , and responds to the same irritation by more and more feeble reactions.\n\nIt is as if the cell becomes accustomed to the irritation.\n\nIt becomes for the cell part of a constant environment , and it ceases to react, because it is reacting generally only to changes in conditions which are constant.\n\nIf from the very beginning the irritation is so weak that it fails to provoke the responsive motion, it nevertheless leaves in the cell a certain invisible trace.\n\nThis can be inferred from the fact that by repeating these weak irritations, the cell finally begins to react to them.\n\nThus in the laws of irritability we observe, as it were, the beginnings of memory, fatigue, and habit.\n\nThe cell produces the illusion, if not of a conscious and reasoning being, at any rate of a remembering being, habit-forming, and susceptible to fatigue.\n\nIf we can be thus deceived by a cell, how much more liable are we to be deceived by the greater complexity of animal life.\n\nBut let us return to the analysis of actions .\n\nBy the reflex actions of an organism are meant actions in which either an entire organism or its separate parts acts as a cell , i.e., within the limits of the law of variability.\n\nWe observe such actions both in men and in animals.\n\nA man shudders all over from unexpected cold, or p.\n\n88 from a touch.\n\nHis eyelids wink at the swift approach or touch of some object.\n\nThe freely-hanging foot of a person in a sitting position moves forward if the leg be struck on the tendon below the knee.\n\nThese movements proceed independently of consciousness, they may even proceed counter to consciousness.\n\nUsually consciousness registers them as accomplished facts.\n\nMoreover these movements are not at all governed by expediency.\n\nThe foot moves forward in answer to the blow on the tendon even though a knife or a fire be in front of it.\n\nBy instinctive actions are meant actions governed by expediency, but made without conscious selection or without conscious aim .\n\nThey appear with the appearance of a sensuous tincture to sensations, i.e., from that moment when the sensation begins to be associated with a sense of pleasure or pain.\n\nAs a matter of fact, before the dawn of human intellect, throughout the entire animal kingdom \"actions\" were governed by the tendency to receive or to retain pleasure, or to escape pain."

