[content]
body = "p.\n\n112 CHAPTER X The spatial understanding of time.\n\nThe angles and curves of the fourth dimension in our life.\n\nDoes motion exist in the world or not?\n\nMechanical motion and \"life.\" Biological phenomena as the manifestation of motions going on in the higher dimension.\n\nEvolution of the space-sense.\n\nThe growth of the space-sense and the diminution of the time-sense.\n\nThe transformation of the time-sense into the space-sense.\n\nThe difficulties of our language and of our concepts.\n\nThe necessity for seeking a method of spatial expression for temporal concepts.\n\nScience in relation to the fourth dimension.\n\nThe solid of four dimensions.\n\nThe four-dimensional sphere.\n\nNOW from the basis of those conclusions already made, let us seek to define how we may discover the real four-dimensional world obscured from us by the illusory three-dimensional world.\n\n\"See\" it we may by two methods: either by sensing it directly, by developing the \"space-sense\" and other higher faculties, which will be discussed later; or by understanding it mentally by a perception of its possible properties through the exercise of the reason.\n\nBy abstract reasoning, we have already come to the conclusion that the fourth dimension of space must lie in time, i.e., that time is the fourth dimension of space.\n\nWe have already discovered psychological proofs of this thesis.\n\nComparing the receptivity of the world by living beings of different grades of consciousness—snail, dog and man—we have seen how different for them are the properties of one and the same world ; namely, those properties which are expressed for us in the concepts of time and space.\n\nWe have seen that time and space are sensed by each in a different manner: that what for the lower being (the snail) is time , for the being standing one degree higher (the dog) becomes space , and that the time of this being becomes space to a being standing still higher—man.\n\nThis is a confirmation of the supposition previously expressed, that our idea of time is complex in its nature, and that in it are properly included two ideas —that of a certain space and that of motion p.\n\n113 upon this space.\n\nOr to put the matter more exactly, the contact with a certain space of which we are not clearly conscious calls forth in us the sensation of motion upon that space; and all this taken together, i.e., the unclear consciousness of a certain space and the sensation of motion upon that space, we call time.\n\nThis last confirms the conception that the idea of time has not arisen from the observation of motion existing in nature, but that the very sensation and idea of motion has arisen from a \"time-sense\" existing in ourselves, which is an imperfect sense of space : the fringe, or limit of our space-sense.\n\nThe snail feels the line as space, i.e., as something constant.\n\nIt feels the rest of the world as time, i.e., as something eternally moving.\n\nThe horse feels the plane as space.\n\nIt feels the rest of the world as time.\n\nWe feel an infinite sphere as space; the rest of the world, that which was yesterday and that which will be tomorrow, we feel as time.\n\nIn other words, every being feels as space that which is grasped by his space-sense: the rest he refers to time; i.e., the imperfectly felt is referred to time .\n\nOr it is possible to formulate the matter thus: every being feels as space that which, by the aid of his space-sense he is able to represent to himself in form, outside of himself; and that which he is not able thus to represent he feels as time, i.e., eternally moving, impermanent, so unstable that it is impossible to imagine it in terms of form.\n\nTHE SENSE OF SPACE (SPACE-SENSE) IS THE POWER OF REPRESENTATION BY MEANS OF FORM."

