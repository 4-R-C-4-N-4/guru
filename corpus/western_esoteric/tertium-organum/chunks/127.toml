[content]
body = "The mystery of infinity —the greatest of all mysteries—it tells us that all the visible universe and its galaxies of stars have no dimension : that in relation to infinity they are equal to a point , a mathematical point which has no extension whatever, and that points which are not measurable for us may have a different extension and different dimensions.\n\nIn \"positive\" thinking we make the effort TO FORGET ABOUT ALL THIS: NOT TO THINK ABOUT IT.\n\nAt some future time positivism will be defined as a system by the aid of which it was possible not to think of real things and to limit oneself to the region of the unreal and illusory.\n\nFootnotes 178:1 The expression \"section of the world\" is taken as an indicator of the unreality of the forms of each section.\n\nThe world is infinite, and all forms are infinite, but to grasp them with the finite brain-consciousness, i.e., by consciousness reflected in the brain, we must imagine the infinite forms as being finite, and these are \"sections of the world.\" The p.\n\n179 world is one, but the number of possible sections is infinite.\n\nLet us imagine an apple: it is one, but we may imagine an infinite number of sections in all directions and these sections will differ from one another.\n\nIf instead of an apple we take a more complicated body, for instance the body of some animal: then the sections taken in different directions will be even more unlike one another.\n\n181:1 The incorrectness here is not in the idea itself, but in a literal analogy.\n\nThe thought itself, that molecules are worlds and worlds are but molecules, deserves attention and study.\n\n183:1 Frederick Myers, \"Essay on the Subliminal Consciousness,\" as quoted in William James' \"The Varieties of Religious Experience,\" Longmans, Green & Co., New York, p.\n\n512.\n\n183:2 In all the above it would be more correct to substitute for the word brain the word body —organism.\n\nThe present trend of scientific psychology leads to an understanding of the psychic importance of diverse physiological functions, previously unknown and even p.\n\n184 now but little investigated.\n\nThe psychic life is connected not with the brain only, but with the entire body, all its organs, all its tissues.\n\nThe study of the activity of glands, and of many other things with which science is now concerning itself, shows that the brain is by no means the only conductor of the psychic activity of man."

