[content]
body = "Therefore, the first emotion at the rising of the curtain on \"that world\"—i.e., this our world, but free of those limitations under which we usually regard it—must be of wonderment , and this wonderment must grow greater and greater according to our better acquaintance with it.\n\nAnd the better we know a certain thing or a certain relation of things—the nearer, the more familiar they are to us—the greater will be our wonder at the new and the unexpected therein revealed.\n\nDesiring to understand the noumenal world we must search for the hidden meaning in everything.\n\nAt present we are too heavily enchained by the habit of the positivistic method of searching always for the visible cause and the visible effect.\n\nUnder this weight of positivistic habit it is extremely difficult for us to comprehend certain ideas.\n\nAmong other things we have difficulty in understanding the reality of the difference in the noumenal world between objects of our world which are similar , but different in function.\n\nBut if we desire to approach to an understanding of the noumenal world, we must try with all our might to notice all those seeming, \"subjective\" differences between objects which astonish us sometimes, of which we are often painfully aware —those differences expressed in the symbols and metaphors of art which are often revelations of the world of reality.\n\nSuch differences are the realities of the noumenal world, far more real than all maya (illusion) of our phenomena.\n\nWe should endeavor to notice these realities and to develop p.\n\n160 within ourselves the ability to feel them, because exactly in this manner and only by such a method do we put ourselves in contact with the noumenal world or the world of causes.\n\n______ I find an interesting example of the understanding of the hidden meaning of phenomena contained in The Occult World in the letter of a Hindu occultist to the author of the book, A.\n\nP.\n\nSinnett.\n\nWe see a vast difference between the two qualities of two equal amounts of energy expended by two men, of whom one, let us suppose, is on his way to his daily quiet work, and another on his way to denounce a fellow creature at the police station, while the men of science see none; and we—not they—see a specific difference between the energy in the motion of the wind and that of a revolving wheel.\n\nEvery thought of man upon being evolved passes into the inner world, and becomes an active entity by associating itself, coalescing we might term it, with an elemental—that is to say, with one of the semi-intelligent forces of the kingdom.\n\nIf we ignore the last part of this quotation for the moment, and consider only the first part, we shall easily see that the \"man of science\" does not recognize the difference in the quality of the energy spent by two men going, one to his work, and another to denounce someone.\n\nFor the man of science this difference is negligible: science does not sense it and does not recognize it.\n\nBut perhaps the difference is much deeper and consists not in the difference between modes of energy but in the difference between men , one of whom is able to develop energy of one sort and another that of a different sort.\n\nNow we have a form of knowledge which senses this difference perfectly, knows and understands it.\n\nI am speaking of art.\n\nThe musician, the painter, the sculptor well understand that it is possible to walk differently—and even impossible not to walk differently: a workman and a spy cannot walk alike.\n\nBetter than all the actor understands this, or at least he should understand it better.\n\nThe poet understands that the mast of a ship, the gallows, and the cross are made of different wood .\n\nHe understands the difference p.\n\n161 between the stone from a church wall and the stone from a prison wall."

