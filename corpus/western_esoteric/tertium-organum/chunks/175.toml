[content]
body = "These Eleatic ideas—namely that there is and there can be only One Absolute Being, infinite., unchangeable, without a second, without parts and passions—are the same ideas which underlie the Upanishads and have been fully worked out in the Vedânta-Sutras .\n\n______ p.\n\n273 In most of the religions of the ancient world [says Müller] the relation between the soul and God has been represented as a return of the soul to God.\n\nA yearning for God, a kind of divine home-sickness, finds expression in most religions, but the road that is to lead us home, and the reception which the soul may expect in the Father's house have been represented in very different ways in different religions.\n\nAccording to some religious teachers, a return of the soul to God is possible after death only.\n\n.\n\n.\n\n.\n\nAccording to other religious teachers, the final beatitude of the soul can be achieved in this life.\n\n.\n\n.\n\n.\n\nThat beatitude requires knowledge only, knowledge of the necessary unity of what is divine in man with what is divine in God.\n\nThe Brahmins call it self-knowledge, that is to say, the knowledge that our true self, if it is anything, can only be that Self which is All in All, and beside which there is nothing else.\n\nSometimes this conception of the intimate relation between the human and the divine natures comes suddenly, as the result of an unexplained intuition or self-recollection.\n\nSometimes, however, it seems as if the force of logic had driven the human mind to the same result.\n\nIf God had once been recognized as the Infinite in nature and the soul as the Infinite in man, it seemed to follow that there could not be two Infinites.\n\nThe Eleatics had clearly passed through a similar phase of thought in their own philosophy.\n\nIf there is an Infinite, they said, it is one, for if there were two they could not be In-finite, but would be finite one toward the other.\n\nBut that which exists is infinite, and there cannot be more such.\n\nTherefore that which exists is one.\n\nNothing can be more definite than this Eleatic Monism, and with it the admission of a soul, the Infinite in man, as different from God, the Infinite in nature, would have been inconceivable.\n\nIn India it was so expressed that Brahman and Atman (the spirit) were in their nature one.\n\nThe early Christians also, at least those who had been brought up in the schools of Neo-platonist philosophy, had a clear perception that if the soul is infinite and immortal in its nature, it cannot be anything beside God, but that it must be of God and in God.\n\nSt.\n\nPaul gave but his own bold expression to the same faith or knowledge, when he uttered the words which have startled so many theologians: In Him we live and move and have our being .\n\nIf anyone else had uttered these words they would at once have been condemned as pantheism.\n\nNo doubt they are pantheism, and yet they express the very key-note of Christianity.\n\nThe divine sonship of man is only a metaphorical expression but it was meant originally to embody the same idea.\n\n.\n\n.\n\n.\n\nAnd when the question was asked how the consciousness of this divine sonship could ever have been lost, the answer given by Christianity was, by sin, the answer given by the Upanishads was, by avidya , nescience.\n\nThis marks the similarity, and at the same time the characteristic difference between these two religions.\n\nThe question how nescience laid hold on the human soul, and made it imagine that it could live or move or have its true p.\n\n274 being anywhere but in Brahman , remains as unanswerable in Hindu philosophy as in Christianity the question how sin first came into the world."

