[content]
body = "p.\n\n1 INTRODUCTION TO THE ENGLISH TRANSLATION IN naming his book Tertium Organum Ouspensky reveals at a stroke that astounding audacity which characterizes his thought throughout—an audacity which we are accustomed to associate with the Russian mind in all its phases.\n\nSuch a title says, in effect: \"Here is a book which will reorganize all knowledge.\n\nThe Organon of Aristotle formulated the laws under which the subject thinks; the Novum Organum of Bacon, the laws under which the object may be known; but The Third Canon of Thought existed before these two, and ignorance of its laws does not justify their violation.\n\nTertium Organum shall guide and govern human thought henceforth.\" How passing strange, in this era of negative thinking, of timid philosophizing, does such a challenge sound!\n\nAnd yet it has the echo in it of something heard before—what but the title of another volume, Hinton's A New Era of Thought ?\n\nOuspensky's Tertium Organum and Hinton's A New Era of Thought present substantially the same philosophy (though Hinton's book only sketchily), arrived at by the same route—mathematics.\n\nHere is food for thought.\n\nIn the words of Philip Henry Wynne, \"Mathematics possesses the most potent and perfect symbolism the intellect knows; and this symbolism has offered for generations certain concepts (of which hyper-dimensionality is only one) whose naming and envisagement by the human intellect is perhaps its loftiest achievement.\n\nMathematics presents the highest certitudes known to the intellect, and is becoming more and more the final arbiter and interpreter in physics, chemistry and astronomy.\n\nLike Aaron's rod it threatens to swallow all other knowledges as fast as they assume organized form.\n\nMathematics has already taken possession of great provinces of logic and psychology—will it embrace ethics, religion and philosophy?\" In Tertium Organum mathematics enters and pervades the field of philosophy; but so adroitly, so silently as it were, that one hardly p.\n\n2 knows that it is there.\n\nIt dwells more in Ouspensky's method than in his matter, because for the most part the mathematical ideas necessary for an understanding of his thesis are such as any intelligent high school student can comprehend.\n\nThe author puts to himself and to the reader certain questions, propounds certain problems, which have baffled the human mind for thousands of years—the problems of space, time, motion, causality, of free will and determination—and he deals with them according to the mathematical method: that is all.\n\nHe has sensed the truth that the problem of mathematics is the problem of the world order , and as such must deal with every aspect of human life.\n\nMathematics is a terrible word to those whose taste and training have led them into other fields, so lest the non-mathematical reader should be turned back at the very threshold, deciding too hastily that the book is not for him, let me dwell rather on its richly humanistic aspect.\n\nTo such as ask no \"key to the enigmas of the world,\" but only some light to live by, some mitigation of the daily grind, some glimpse of some more enlightened polity than that which rules the world today, this book should have an appeal.\n\nThe author has thrown overboard all the jargon of all the schools; he uses the language of common sense, and of every day; his illustrations and figures of speech are homely, taken from the life of every day.\n\nHe simply says to the reader, \"Come let us reason together,\" and leads him away from the haunted jungle of philosophical systems and metaphysical theories, out into the light of day, there to contemplate and to endeavor to understand those primal mysteries which puzzle the mind of a child or of a savage no less than that of the sophisticated and super-subtle ponderer on the enigmas of the world."

