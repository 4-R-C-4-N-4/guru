[content]
body = "These people of the fourth dimension are in the world but not of it: their range is far wider than this slum of space.\n\nIn them dormant faculties are alert.\n\nLike birds of the air, their fitting symbol, they are at home in realms which others cannot enter, even though already \"there.\" Nor are these heavenly eagles confined to the narrow prison of the breast.\n\nTheir bodies are as tools which they may take up or lay aside at will.\n\nThis phenomenal world, which seems so real, is to them as insubstantial as the image of a landscape in a lake.\n\nSuch is the Ouspenskian superman.\n\nThe entire book is founded upon a new generalization—new, that is, in philosophy, but already familiar to mathematicians and theoretical physicists.\n\nThis generalization involves startling and revolutionary ideas in regard to space, time and motion far removed from those of Euclidian geometry and classical physics.\n\nOuspensky handles these new ideas in an absolutely original way, making them the basis of an entire philosophy of life.\n\nTo the timid and purblind this philosophy will be nothing short of terrifying, but to the clear-eyed and steadfast watcher, shipwrecked on this shoal of time, these vistas, overflowing with beauty, strangeness, doubt, terror and divinity, will be more welcome than anything in life.\n\nFear not the new generalization .\n\n______ Ouspensky's clearness of thought is mirrored in a corresponding clarity of expression.\n\nHe sometimes repeats the difficult and important passages in an altered form of words, he uses short sentences and short paragraphs, and italicizes significant phrases and significant words.\n\nHe defines where definition is needed, and suggests collateral trains of thought with a skill which makes the reader who is intuitive a creator on his own account.\n\nSchopenhauer has said that it is always a sign of genius to treat difficult matters simply, as it is a sign of dullness to make simple matters appear recondite.\n\nOuspensky exhibits this order of genius, and that other, p.\n\n7 mentioned by Schopenhauer, which consists in choosing always the apt illustration, the illuminating simile.\n\nThe translators have tried to be rigidly true to the Russian original, and they have been at great pains to verify every English quotation so far as has been possible.\n\nIt is therefore a source of great gratification to them that their efforts should have received the unqualified endorsement of the author himself.\n\nCLAUDE BRAGDON Rochester, N.\n\nY.\n\nJanuary 31, 1922"

