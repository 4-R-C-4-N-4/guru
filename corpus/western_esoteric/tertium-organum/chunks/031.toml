[content]
body = "If, presupposing that we are moving upon a sphere, upon its equator or one of its parallels, then it will appear that we recognize as really existing only one meridian: those which are behind us have disappeared and those ahead of us have not appeared as yet.\n\n.\n\nWe are going forward like a blind man, who feels paving stones and lanterns and walls of houses with his stick and believes in the real existence of only that which he touches now , which he feels now .\n\nThat which has passed has disappeared and will never return!\n\nThat which has not as yet been does not exist.\n\nThe blind man remembers the route which he has traversed; he expects that ahead the way will continue, but he sees neither forward nor backward because he does not see anything ; because his instrument of knowledge—the stick—has a definite, and not very great length, and beyond the reach of his stick non-existence begins.\n\nWundt, in one of his books, called attention to the fact that our vaunted five organs of sense are in reality just feelers by which we feel the world around us.\n\nWe live groping about.\n\nWe never see anything .\n\nWe are always just feeling everything.\n\nWith the help of the microscope and the telescope, the telegraph and the telephone, we are extending our feelers a little, so to speak, but we are not beginning to see .\n\nTo say that we are seeing would be possible only in case we could know the past and the future.\n\nBut we do not see, and because of this we can never assure ourselves of that which we cannot feel .\n\np.\n\n42 This is the reason why we count as really existing only that circle which our feelers grasp at a given moment.\n\nBeyond that—darkness and non-existence.\n\nBut have we any right to think in this way?\n\nLet us imagine a consciousness that is not bound by the conditions of sensuous receptivity.\n\nSuch a consciousness can rise above the plane upon which we are moving; it can see far beyond the limits of the circle enlightened by our usual consciousness; it can see that not only does the line upon which we are moving exist, but also all lines perpendicular to it which we are intersecting, which we have ever intersected, and which we shall intersect.\n\nAfter rising above the plane this consciousness can see the plane, can convince itself that it is really a plane, and not a single line.\n\nThen it can see the past and the future, lying together and existing simultaneously.\n\nThat consciousness which is not bound by the conditions of sensuous receptivity can outrun the stupid traveller, ascend the mountain to see in the distance the town to which he is going, and be convinced that this town is not being built anew for his arrival, but exists quite independently of the stupid traveller.\n\nAnd that consciousness can look off and see on the horizon the towers of that city where that traveller had been, and be convinced that those towers have not fallen, that the city continues to stay and live just as it stayed and lived before the traveller's advent.\n\nIt can rise above the plane of time and see the spring behind and the autumn ahead, see simultaneously the budding flowers and ripening fruits.\n\nIt can make the blind man recover his sight and see the road along which he passed and that which still lies before him.\n\nThe past and the future cannot not exist , because if they do not exist then neither does the present exist.\n\nUnquestionably they exist somewhere together, but we do not see them.\n\nThe present, compared with the past and the future, is the most unreal of all unrealities.\n\nWe are forced to admit that the past, the present and the future do not differ in anything, one from another; there exists just one present — the Eternal Now of Hindu philosophy.\n\nBut we do not perceive this, because in every given moment we experience just a p."

