body = "I sensed the enormous heavy body— my body —all its motions, shudderings, waverings and vibrations, fire, pressure of steam and weight of engines were inside of me , the unmerciful and unyielding propelling screw which pushed and pushed me forward, never for a moment releasing me , the rudder which determined all my motion—all this was myself: also two sailors.\n\n.\n\n.\n\n.\n\nand the black snake of smoke coming in clouds out of the funnel .\n\n.\n\n.\n\nall.\n\nIt was an instant of unusual freedom, joy and expansion.\n\nA second—and the spell of charm disappeared.\n\nIt passed like a dream when one tries to remember it.\n\nBut the sensation was so powerful, so bright, and so unusual that I was afraid to move and waited for it to recur.\n\nBut it did not return, and a moment later I could not say that it had been—could not say whether it was a reality or merely the thought that, looking at the waves, it might be so.\n\nTwo years afterwards the yellowish waves of the Finnish gulf and a green sky gave me a taste of the same sensation, but this time it was dissipated almost before it appeared.\n\nThe examples given in this chapter do not by any means exhaust the mystical experience of humanity.\n\np.\n\n305 But what do we infer from them?\n\nFirst of all, unity of experience .\n\nIn mystical sensations all men feel definitely something in common, having a similar meaning and connection one with another.\n\nThe mystics of many ages and many peoples speak the same language and use the same words.\n\nThis is the first and most important thing that speaks for the reality of the mystical experience.\n\nNext is the complete harmony of data regarding such experience with the theoretically deduced conditions of the world causes ; the sensation of the unity of all , so characteristic of mysticism; a new sensation of time, the sense of infinity; joy or horror; knowledge of the whole in the part; infinite life and infinite consciousness.\n\nAll these are real sensed facts in the mystical experience.\n\nAnd these facts are theoretically correct .\n\nThey are such as they should be according to the conclusions of THE MATHEMATICS OF THE INFINITE AND OF THE HIGHER LOGIC.\n\nThis is all that is possible to say about them.\n\nFootnotes 271:1 Vedânta is the end of the Vedas , the abridgment and commentaries on the Vedas.\n\nP.\n\nOuspensky .\n\n280:1 Abridged quotation from \"Select Works of Plotinus,\" transl.\n\nby Thomas Taylor.\n\nBohn's Library, pp.\n\nlxxiii and lxxiiv.\n\n280:2 All the ensuing quotations are from the books of Prof.\n\nWilliam James, and of Dr.\n\nR.\n\nM.\n\nBucke.\n\n281:1 See quotation from Van Manen's book, Chap.\n\nxi.\n\np.\n\n125.\n\n286:1 The author of \"Superconsciousness,\" M.\n\nV.\n\nLodizhensky, told me that in the summer of 1910 he was in \"Yasnaya Poliana,\" the residence of L.\n\nTolstoy, and he conversed with him about the mystics and \"The Love of the Good.\" Tolstoy was at first very skeptical about them, but when Mr.\n\nLodizhensky read to him the quotation, given here, about the circle, Tolstoy became very enthusiastic, and ran into another room and got a letter in which a triangle was drawn.\n\nIt appeared that he had independently almost grasped the thought of Avva Dorotheus, and had written to some one that God was the apex of a triangle: men the points within the angles; approaching to one another they approach to God, approaching God, they do the same toward one another.\n\nSeveral days afterward Tolstoy rode over to Mr."

