[content]
body = "Form pertains to all things .\n\nWe say that everything consists of matter and form .\n\nUnder the category of \"matter,\" as already stated, the cause of a lengthy series of mixed sensations is predicated, but matter without form is not comprehensible to us; we cannot even think of matter without form.\n\nBut we can think and imagine form without matter.\n\nThe thing , i.e., the union of form and matter, is never constant ; p.\n\n54 it always changes in the course of time.\n\nThis idea afforded Newton the possibility of building his theory of fluents and fluxions .\n\nNewton came to the conclusion that constant quantities do not exist in nature.\n\nVariables do exist— flowing , fluents only.\n\nThe velocities with which different fluents change were called by Newton fluxions .\n\nFrom the standpoint of this theory all things known to us—men, plants, animals, planets—are fluents, and they differ by the magnitude of their fluxions.\n\nBut the thing , changing continuously in time, sometimes very much, and quickly, as in the case of a living body for example, still remains one and the same .\n\nThe body of a man in youth, and the body of a man in senility—these are one and the same, though we know that in the old body there is not one atom left that was in the young one.\n\nThe matter changes, but something remains one under all changes, this something is the Linga-Sharîra .\n\nNewton's theory is valid for the three-dimensional world existing in time.\n\nIn this world there is nothing constant.\n\nAll is variable because every consecutive moment the thing is already not that which it was before.\n\nWe never see the Linga-Sharîra , we see always its parts, and they appear to us variable.\n\nBut if we observe more attentively we shall see that it is an illusion.\n\nThings of three dimensions are unreal and variable.\n\nThey cannot be real because they do not exist in reality, just as the imaginary sections of a solid do not exist.\n\nFour-dimensional bodies alone are real.\n\nIn one of the lectures contained in the book, A Pluralistic Universe , Prof.\n\nJames calls attention to Prof.\n\nBergson's remark that science studies always only the t of the universe , i.e., not the universe in its entirety, but the moment , the \"temporal section\" of the universe.\n\n______ The properties of four-dimensional space will become clearer to us if we compare in detail three-dimensional space with the surface, and discover the differences existing between them.\n\nHinton, in his book, A New Era of Thought , examines these differences very attentively.\n\nHe represents to himself, on a plane, two equal rectangular triangles, cut out of paper, the right angles of which are placed in opposite directions.\n\nThese triangles will be p.\n\n55 equal, but for some reason quite different.\n\nThe right angle of one is directed to the right, that of the other to the left.\n\nIf anyone wants to make them quite similar, it is possible to do so only with the help of three-dimensional space.\n\nThat is, it is necessary to take one triangle, turn it over, and put it back on the plane.\n\nThen they will be two equal, and exactly similar triangles.\n\nBut in order to effect this, it was necessary to take one triangle from the plane into three-dimensional space, and turn it over in that space.\n\nIf the triangle is left on the plane, then it will never be possible to make it identical with the other, keeping the same relation of angles of the one to those of the other.\n\nIf the triangle is merely rotated in the plane this similarity will never be established.\n\nIn our world there are figures quite analogous to these two triangles.\n\nWe know certain shapes which are equal the one to the other, which are exactly similar, and yet which we cannot make fit into the same portion of space, either practically or by imagination."

