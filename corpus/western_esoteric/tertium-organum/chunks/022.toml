[content]
body = "But it can be measured in only three directions independent of one another—in length, breadth, and height; these directions we call the dimensions of space, and we say that our space has three dimensions: it is three-dimensional.\n\nBy independent direction we mean in this case a line at right angles to another line.\n\nOur geometry (or the science of measurement of the earth , or matter in space) knows only three such lines, which are mutually at right angles to one another and not parallel among themselves.\n\nBut why three only, and not ten or fifteen?\n\nThis we do not know.\n\nAnd here is another very significant fact: either because of some mysterious property of the universe, or because of some mental p.\n\n28 limitation, we cannot even imagine to ourselves more than three independent directions.\n\nBut we speak of the universe as infinite, and because the first condition of infinity is infinity in all directions and in all possible relations, so we must presuppose in space an infinite number of dimensions: that is, we must presuppose an infinite number of lines perpendicular and not parallel to each other; and yet out of these lines we know, for some reason , only three.\n\nIt is usually in some such guise that the question of higher dimensionality appears to normal human consciousness.\n\nSince we cannot construct more than three mutually independent perpendiculars, and if the three-dimensionality of our space is conditional upon this, we are forced to admit the indubitable fact of the limitedness of our space in relation to geometrical possibilities: though of course if the properties of space are created by some limitation of consciousness, then the limitedness lies in ourselves.\n\nNo matter what this limitedness depends on, it is a fact that it exists.\n\nA given point can be the vertex of only eight independent tetrahedrons.\n\nThrough a given point it is possible to draw only three perpendicular and not parallel straight lines.\n\nUpon this as a basis, we define the dimensionality of space by the number of lines it is possible to draw in it which are mutually at right angles one with another.\n\nThe line upon which there cannot be a perpendicular, that is, another line , constitutes linear, or one-dimensional space.\n\nUpon the surface two perpendiculars are possible.\n\nThis is superficial, or two-dimensional space.\n\nIn \"space\" three perpendiculars are possible.\n\nThis is solid, or three-dimensional space.\n\nThe idea of the fourth dimension arose from the assumption that in addition to the three dimensions known to our geometry there exists still a fourth, for some reason unknown and inaccessible to us, i.e., that in addition to the three known to us, a mysterious fourth perpendicular is possible.\n\nThis assumption is practically founded on the consideration p.\n\n29 that there are things and phenomena in the world undoubtedly really existing , but quite incommensurable in terms of length, breadth and thickness, and lying as it were outside of three-dimensional space.\n\n______ By really existing we understand that which produces definite action, which possesses certain functions, which appears to be the cause of something else.\n\nThat which does not exist cannot produce any action, has no function, cannot be a cause.\n\nBut there are different modes of existence.\n\nThere is physical existence, recognized by certain sorts of actions and functions, and there is metaphysical existence, recognized by its actions and its functions.\n\nA house exists , and the idea of good and evil exists.\n\nBut they do not exist in like manner.\n\nOne and the same method of proof of existence does not suffice for the proof of the existence of a house and for the proof of the existence of an idea.\n\nA house is a physical fact , an idea is a metaphysical fact .\n\nPhysical and metaphysical facts exist , but they exist differently.\n\nIn order to prove the idea of a division into good and evil, i.e., a metaphysical fact, I have only to prove its possibility .\n\nThis is already sufficiently established."

