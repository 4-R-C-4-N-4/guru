[content]
body = "In the reduction of your soul to its simplest self, its divine essence, you realize this union—this identity.\n\nBut this sublime condition is not of permanent duration.\n\nIt is only now and then that we can enjoy this elevation above the limits of the body and the world.\n\nI myself have realized it but three times as yet, and Porphyry hitherto not once.\n\nAll that tends to purify and elevate the mind will assist you in this attainment, and facilitate the approach and the recurrence of these happy intervals.\n\nThere are, then, different roads by which this end may be reached.\n\nThe love of beauty which exalts the poet; that devotion to the One and that ascent of science which makes the ambition of the philosopher, and that love and those prayers by which some devout and ardent soul tends in its moral purity towards perfection—these are the great highways conducting to the height above the actual and the particular, where we stand in the immediate presence of the Infinite, who shines out as from the depths of the soul.\n\nIn another place in his works, Plotinus defines the ecstatic knowledge more exactly, presenting such properties of it as to reveal to us quite clearly that the infinite expansion of subjective knowledge is there meant.\n\nWhen we see God [says Plotinus] we see him not by reason, but by something that is higher than reason.\n\nIt is impossible however to say about him who sees that he sees, because he does not behold and discern two different things (the seer and the thing seen).\n\nHe changes completely, ceases to be himself, preserves nothing of his I.\n\nImmersed in God, he constitutes one whole with Him; like the centre of a circle, which coincides with the centre of another circle.\n\nFootnotes 239:1 According to the interpretation of the Southern Hindu school of occultism, the four states of consciousness are understood in somewhat different order.\n\nThe most remote from the True, the most illusory, is the waking state; the second—sleep—is already nearer to the True; the third— deep sleep without dreams—contact with the True; and the fourth, sâmâdhi , or ecstasy—union with the True.\n\n240:1 The conceptions of the subjective and of the objective should undergo a change.\n\nThe usual terminology will be incorrect for an exact understanding.\n\nEverything phenomenal will become subjective; and the truly objective will be that which under ordinary conditions is regarded as subjective or non-existent."

