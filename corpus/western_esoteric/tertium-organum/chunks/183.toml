body = "Let not thy Left Eye deceive thee, by making continually one representation after another, and stirring up thereby an earnest longing in the self-propriety; but let thy Right Eye command back this Left .\n\n.\n\n.\n\nAnd only bringing the Eye of Time into the Eye of Eternity .\n\n.\n\n.\n\nand descending through the Light of God into the Light of Nature .\n\n.\n\n.\n\nshalt thou arrive at the Unity of Vision or Uniformity of Will.\n\nIn another dialogue the Disciple and the Master converse about heaven and hell.\n\nThe Disciple asked his Master: Whither go the souls when they leave these mortal bodies?\n\nHis Master answered: The soul needeth no going forth anywhere.\n\nDisciple —Does it not enter into heaven or hell?\n\nMaster —No, there is no such kind of entering.\n\n.\n\n.\n\n.\n\nThe soul hath heaven and hell in itself .\n\n.\n\n.\n\nand whether of the two states—either heaven or hell—shall be manifested in the soul, in that it standeth.\n\nThe quotations given here are sufficient to indicate the character of the writings of an unlearned shoemaker from a little provincial town in Germany of the XVI—XVII centuries.\n\nBoehme is remarkable for the bright intellectuality of his comprehensions, although there is in them a strong moral element also.\n\n______ In the book above mentioned ( The Varieties of Religious Experience ) Prof.\n\nJames dwells with great attention on Christian Mysticism, which afforded him much material for establishing the fact of the cognitive aspect of mysticism.\n\nI borrow from him the following description of the mystical experiences of certain Christian saints.\n\nSt.\n\nIgnatius confessed one day to Father Laynez that a single hour of meditation at Manfesa had taught him more truths about heavenly things than all the teachings of all the doctors put together could have taught him.\n\n.\n\n.\n\n.\n\nOne day in orison, on the steps of the choir of the Dominican Church, he saw in a distinct manner the plan of divine wisdom in the creation of the world.\n\nOn another occasion, during a procession, his spirit p.\n\n285 was ravished on God, and it was given him to contemplate, in a form and images fitted to the weak understanding of a dweller on earth, the deep mystery of the holy Trinity.\n\nThis last vision flooded his heart with such sweetness, that mere memory of it in after times made him shed abundant tears.\n\n\"One day, being in orison,\" Saint Teresa writes, \"it was granted me to perceive in one instant how all things are seen and contained in God.\n\nI did not perceive them in their proper form, and nevertheless the view I had of them was of a sovereign clearness and has remained vividly impressed upon my soul.\n\nIt is one of the most signal of all the graces which the Lord has granted me.\n\n.\n\n.\n\n.\n\nThe view was so subtle and delicate that the understanding cannot grasp it.\" She goes on to tell [Prof.\n\nJames writes] how it was as if the Deity was an enormous and sovereignly limpid diamond, in which all our actions were contained in such a way that their full sinfulness appeared evident as never before.\n\n\"Our Lord made me comprehend,\" she writes, \"in what way it is that one God can be in three Persons.\n\nHe made me see it so clearly that I remained as extremely surprised as I, was comforted .\n\n.\n\n.\n\nand now, when I think of the holy Trinity, or hear it spoken of, I understand how the three adorable Persons form only one God and I experienced an unspeakable happiness.\" Christian mysticism, as Prof.\n\nJames shows, is very near to the Vedânta and the Upanishads .\n\nThat fountain-head of Christian mysticism, Dionysius the Areopagite, tells about the absolute truth in negative formulæ only ."

