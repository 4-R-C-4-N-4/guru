[content]
body = "p.\n\n176 CHAPTER XVI The phenomenal and the noumenal side of man.\n\n\"Man-in-himself.\" How do we know the inner side of man?\n\nCan we know of the existence of consciousness in conditions of space not analogous to ours?\n\nBrain and consciousness.\n\nUnity of the world.\n\nLogical impossibility of the simultaneous existence of spirit and matter.\n\nEither all spirit or all matter.\n\nRational and irrational actions in nature and in the life of man.\n\nCan rational actions exist alongside irrational?\n\nThe world as an accidentally self-created mechanical toy.\n\nThe impossibility of reason in a mechanical universe.\n\nThe irreconcilability of mechanicalness with the existence of reason.\n\nKant concerning \"hosts.\" Spinoza on the knowledge of the invisible world.\n\nNecessity for the intellectual definition of that which can be, and that which cannot be, in the world of the hidden.\n\nWE know what man is only imperfectly; our conceptions regarding him are extremely fallacious and easily create new illusions.\n\nFirst of all, we are inclined to regard man as a certain unity, and to regard the different parts and functions of man as being bound together, and dependent upon one another.\n\nMoreover, in the physical apparatus, in man visible, we see the cause of all his properties and actions.\n\nIn reality, man is a very complicated something, and complicated in various meanings of the word.\n\nMany sides of the life of a man are not bound together among themselves at all, or are bound only by the fact that they belong to one man; but the life of man goes on simultaneously on different planes, as it were, while the phenomena of one plane only at times and partially touch those of another, and may not themselves touch at all.\n\nAnd the relations of the same man to the various sides of himself and to other men are entirely dissimilar.\n\nMan includes within himself all three of the above-mentioned orders of phenomena, i.e., he represents in himself the combination of physical phenomena with those of life and psychic phenomena.\n\nAnd the mutual relations between these three orders of phenomena are infinitely more complex than we are accustomed to think.\n\nPsychic phenomena we feel, sense and are conscious of in ourselves ; p.\n\n177 physical phenomena and the phenomena of life we observe and make conclusions about on the basis of experience.\n\nWe do not sense the psychic phenomena of others , i.e., the thoughts, feelings and desires of another man; but the fact that they exist in him we conclude from what he says, and by analogy with ourselves.\n\nWe know that in ourselves certain actions, certain thoughts, and feelings proceed, and when we observe the same actions in another man, we conclude that he has thought and felt like us.\n\nAnalogy with ourselves—this is our sole criterion and method of reasoning and drawing conclusions about the psychic life in other men if we cannot communicate with them, or do not wish to believe in what they tell us about themselves.\n\nSuppose that I should live among men without the possibility of communicating with them and having no way to make conclusions based upon analogy; in that case I should be surrounded by moving and acting automatons, the cause, purpose and meaning of whose actions would be perfectly incomprehensible to me.\n\nPerhaps I would explain their actions by \"molecular motion,\" perhaps by the \"influence of the planets,\" perhaps by \"spiritism,\" i.e., by the influence of \"spirits,\" possibly by \"chance\" or by a haphazard combination of causes—but in any case I should not and could not see the psychic life in the depth of these men's actions.\n\nConcerning the existence of thought and feeling I can usually only conclude by analogy with myself.\n\nI know that certain phenomena are connected in me with my possession of thought and feeling.\n\nWhen I see the same phenomena in another man I conclude that he also possesses thought and feeling.\n\nBut I cannot convince myself directly of the existence of psychic life in another man."

