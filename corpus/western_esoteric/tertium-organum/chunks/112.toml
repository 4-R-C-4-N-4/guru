[content]
body = "When one encounters these perversions of love, one involuntarily calls to mind the words of Zarathustra: 2 Voluptuousness: unto all hair-shirted despisers of the body, a string p.\n\n173 and stake; and cursed as \"the world\" by all backworldsmen : for it mocketh and befooleth all erring, misinferring teachers.\n\nVoluptuousness: to the rabble the slow fire at which it is burnt: to all wormy wood, to all stinking rags, the prepared heat and stew furnace.\n\nVoluptuousness: to free hearts, a thing innocent and free, the garden-happiness of the earth, all the future's thanks-overflow to the present.\n\nVoluptuousness: only to the withered a sweet poison: to the lion-willed, however, the great cordial, and the reverently saved wine of wines.\n\nVoluptuousness: the great symbolic happiness of a higher happiness and highest hope.\n\nFor to many is marriage promised and more than marriage—to many that are more unknown to each other than man and woman—and who hath fully understood how unknown to each other are man and woman.\n\n______ I have dwelt so long on the subject of the understanding of love because it has the most vital significance; because to the majority of men, approaching the threshold of the great mystery, much is closed or opened to them in this way, and because for many this question represents the greatest obstacle.\n\nIn love the most important element is that which is not , which absolutely does not exist from the usual worldly, materialistic point of view.\n\nIn this sensing of that which is not, and in the contact through it with the world of the wondrous, i.e., truly real, consists the principal element of love in human life.\n\nIt is a well-known psychological fact that in moments of powerful emotion, of great joy or great suffering, everything happening round about a man seems to him unreal —a dream.\n\nThis is the beginning of the soul's awakening.\n\nWhen a man in a dream begins to be conscious of the fact that he is asleep and that what he sees is a dream, then he is waking up; so also the soul, beginning to be conscious of the fact that all visible life is a dream, approaches its awakening.\n\nAnd the more powerful, the brighter the inner emotions are, so much the more quickly will the moment of consciousness of the unreality of life come.\n\nIt is very interesting to consider love and men's relation to love in the light of that method and those analogies which we have already applied to the comparative study of different dimensions.\n\nAgain it is necessary to imagine a world of plane beings, observing phenomena entering their plane from another unknowable p.\n\n174 world (such as the change of the color of lines on a plane, in reality depending upon the rotation through the plane of a wheel with many-coloured spokes).\n\nThe plane beings believe that the phenomena arise within the limits of their plane, from causes also belonging to the same plane, and that they are finished there.\n\nAlso, all similar phenomena are to them identical, such as two circles which in reality belong to two entirely different objects.\n\nOn this foundation they erect their science and their morality.\n\nYet if they would decide to discard their \"two-dimensional\" psychology and try to understand the true substance of these phenomena, then with the aid and by means of these phenomena they could sever their connection with their plane, arise, fly up above it, and discover a great unknown world.\n\nThe question of love holds exactly the same place in our life.\n\nOnly he who can see considerably beyond the facts discerns love's real meaning; and it is possible to illumine these very facts by the light of that which lies behind them.\n\nAnd he who is able to see beyond the \"facts\" begins to discern much of \"newness\" in love and through love ."

