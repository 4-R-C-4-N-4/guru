[content]
body = "This last is called Self Consciousness and is that faculty upon which rests all of our life (both subjective and objective) which is not common to us and the higher animals, except that small part of it which is derived from the few individuals who have had the higher consciousness above named.\n\nTo make the matter clear it must be understood that there are three forms or grades of consciousness.\n\n(1) Simple Consciousness , which is possessed by, say, the upper half of the animal kingdom.\n\n(2) Self Consciousness possessed by man in addition to the simple consciousness, which is similar in man and in animals.\n\n1 (3) Cosmic Consciousness .\n\nBy means of simple consciousness a dog or a horse is just as conscious of the things about him as a man is; he is also conscious of his own limbs and body and knows that these are a part of himself.\n\nBy virtue of self-consciousness man is not only conscious of trees, rocks, water, his own limbs and body, but he becomes conscious of himself as a distinct entity apart from all the rest of the universe.\n\nIt is as good as certain that no animal can realize himself in that way.\n\nFurther, by means of self-consciousness, man becomes capable of treating his own mental states as objects of consciousness.\n\nThe animal is, as it were, immersed in his consciousness as a fish in the sea; he cannot, even in imagination, get outside of it for one moment so as to realize it.\n\nBut man by virtue of self-consciousness can step aside, as it were, from himself and think: \"Yes, that thought that I had about that matter is true; I know it is true and I, know that I know it is true.\" There is no evidence that any animal can think, but if they could we should soon know it.\n\nBetween two creatures living together, as dogs or horses and men, and each self-conscious, it would be the simplest matter in the world to open up communication.\n\nWe do, by watching the dog's acts, enter into his mind pretty freely.\n\nIf he were self-conscious, we must have learned it long ago.\n\nWe have not learned it and it is as good as certain that no dog, horse, elephant or ape ever was self-conscious.\n\nAnother thing: on man's self-consciousness is built everything in and about us distinctly human.\n\nLanguage is the objective of which self-consciousness is the subjective, Self-consciousness and language (two in one for they are two halves of the same thing) are the sine qua non of human social life, of manners, of institutions, of industries of all kinds, of all arts useful and fine.\n\nIf any animal possessed self-consciousness it would build a superstructure of language.\n\n.\n\n.\n\nBut no animal has done this, therefore, we infer that no animal has self-consciousness.\n\nThe possession of self-consciousness and language (its other self) by man creates an enormous gap between him and the highest creature possessing simple consciousness merely.\n\np.\n\n312 Cosmic Consciousness is a third form, which is as far above Self Consciousness as is that above Simple Consciousness.\n\nThe prime characteristic Cosmic Consciousness is, as its name implies, a consciousness of the cosmos, that is, of the life and order of the universe.\n\nAlong with the consciousness of the cosmos there occurs an intellectual enlightenment or illumination which alone would place the individual on a new plane of existence—would make him almost a member of a new species.\n\nTo this is added a state of moral exaltation, an indescribable feeling of elevation, elation and joyousness, and a quickening of the moral sense, which is fully as striking and more important both to the individual and to the race than is the enhanced intellectual power.\n\nWith these come what may be called a sense of immortality, a consciousness of eternal life, not a conviction that he shall have this, but the consciousness that he has it already."

