body = "p.\n\n270 CHAPTER XXII Theosophy of Max Müller.\n\nAncient India.\n\nPhilosophy of the Vedânta.\n\nTat twam asi .\n\nKnowledge by means of the expansion of consciousness as a reality.\n\nMysticism of different ages and peoples.\n\nUnity of experiences.\n\nTertium Organum as a key to mysticism.\n\nSigns of the noumenal world.\n\nTreatise of Plotinus On Intelligible Beauty as a misunderstood system of higher logic.\n\nIllumination in Jacob Boehme.\n\n\"A harp of many strings, of which each string is a separate instrument, while the whole is only one harp.\" Mysticism of The Love of the Good .\n\nSt.\n\nAvva Dorotheus and others.\n\nClement of Alexandria.\n\nLao-Tzu and Chuang-Tzu.\n\nLight on the Path .\n\nThe Voice of the Silence .\n\nMohammedan mystics.\n\nPoetry of the Sufis.\n\nMystical states under narcotics.\n\nThe Anæsthetic Revelation .\n\nExperiments of Prof.\n\nJames.\n\nDostoyevsky on \"time\" ( The Idiot ).\n\nInfluence of nature on the soul of man.\n\nTO trace historically the process of the development of those ideas and systems founded upon higher logic or proceeding from it, would indeed be a matter of great interest and importance.\n\nBut this would be difficult and almost impossible of accomplishment because we lack definite knowledge of the time and origin, the means of transmitting, and the sequence of ideas in ancient philosophical systems and religious teachings.\n\nThere are innumerable guesses and speculations concerning the manner of this succession.\n\nMany of these guesses and speculations are accepted as unquestioned until new ones appear which controvert them.\n\nThe opinions of different investigators in regard to these questions are very divergent, and the truth is often difficult to determine—it would be more accurate to say \"impossible\" if conclusions had to be based upon the material accessible to logical investigation.\n\nI shall not dwell at all on the question of the succession of ideas , either from the historical or any other point of view.\n\nThe proposed outline of systems which refer to the world of noumena is not intended to be complete.\n\nThis is not \"the history of p.\n\n271 thought,\" but merely examples of movements of thought which have led to similar conclusions.\n\n______ In the book Theosophy ( or Psychological Religion ) the noted scholar Max Müller gives an interesting analysis of mystical religions and mystical philosophical systems.\n\nHe dwells much on India and her teachings.\n\nThat which we can study nowhere but in India is the all-absorbing influence which religion and philosophy may exercise on the human mind.\n\nSo far as we can judge a large class of people in India, not only the priestly class, but the nobility also, not men only but women, never looked upon their life on earth as something real.\n\nWhat was real to them was the invisible, the life to come.\n\nWhat formed the theme of their conversations, whet formed the subject of their meditations, was the real that alone lent some kind of reality to this unreal phenomenal world.\n\nWhoever was supposed to have caught a new ray of truth was visited by young and old, was honored by princes and by kings, was looked upon indeed as holding a position far above that of kings and princes.\n\nThis is the side of life of ancient India which deserves our study, because there has been nothing like it in the whole world, not even in Greece or Palestine.\n\nI know quite well, [says Müller] that there never can be a whole nation of philosophers or metaphysical dreamers .\n\n.\n\n.\n\nand we must never forget that all through history, it is the few, not the many, who impress their character on a nation, and have a right to represent it as a whole.\n\nWhat do we know of Greece at the time of the Ionian and Eleatic philosophers, except the utterances of Seven Sages?"

