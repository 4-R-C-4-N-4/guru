[content]
body = "But it does not bear fruit presently; and, though it blossoms, they fall off; also many a cold wind, frost and snow, puff upon it, before it comes to any growth and bearing of fruit.\n\nBoehme's books are full of wonderment before these mysteries with which he was confronted.\n\nI was as simple concerning the hidden mysteries as the meanest of all; but my vision of the wonders of God taught me, so that I must write of his wonders; though indeed my purpose is to write this for a memorandum for myself.\n\n.\n\n.\n\n.\n\nNot I, the I that I am, know these things: but God knows them in me .\n\nIf you will behold your own self and the outer world, and what is taking place thereon, you will find that you, with regard to your external being, are that external world.\n\nThe Dialogues between Disciple and Master are remarkable (Disciple p.\n\n283 and Master should be understood to refer to the lower and the higher consciousness of man).\n\nThe Disciple said to his Master: How may I come to the supersensual life, that I may see God and hear him speak?\n\nHis Master said: When thou canst throw thyself but for a moment into that where no creature dwelleth, then thou hearest what God speaketh.\n\nDisciple —Is that near at hand or far off?\n\nMaster —It is in thee.\n\nAnd if thou canst for a while but cease from all thy thinking and willing, then thou shalt hear the unspeakable words of God.\n\nDisciple —How can I hear him speak, when Ii stand still from thinking and willing?\n\nMaster —When thou standest still from the thinking of self, and the willing of self; \"When both thy intellect and will are quiet, and passive to the impressions of the Eternal Word and Spirit; And when thy soul is winged up, and above that which is temporal, the outward senses, and the imagination being locked up by holy abstraction,\" then the Eternal hearing, seeing, and speaking, will be revealed in thee; and so God \"heareth and seeth through thee,\" being now the organ of his spirit; and so God speaketh in thee, and whispereth to thy spirit, and thy spirit heareth his voice.\n\nBlessed art thou therefore if that thou canst stand still from self-thinking and self-willing, and canst stop the wheel of imagination and senses; forasmuch as hereby thou mayest arrive at length to see the great salvation of God, being made capable of all manner of Divine sensations and heavenly communications.\n\nSince it is naught indeed but thine own hearing and willing that do wonder thee, so that thou dost not see and hear God.\n\nDisciple —Loving Master, I can no more endure anything should divert me, how shall I find the nearest way to him?\n\nMaster —Where the way is hardest there walk thou, and take up what the world rejecteth; and what the world doth, that do not thou.\n\nWalk contrary to the world in all things.\n\nAnd then thou comest the nearest way to him.\n\n______ Disciple —.\n\n.\n\n.\n\nOh how may I arrive at the unity of will, and how come into the unity of vision?\n\nMaster —.\n\n.\n\n.\n\nMark now what I, say: The Right Eye looketh in thee into Eternity.\n\nThe Left Eye looketh backward in thee into time.\n\nIf now thou sufferest thyself to be always looking into nature, and the things of time, it will be impossible for thee ever to arrive at the unity, which thou wishest for.\n\nRemember this; and be upon thy watch.\n\nGive not thy mind p.\n\n284 leave to enter in, nor to fill itself with, that which is without thee; neither look thou backward upon thyself .\n\n.\n\n."

