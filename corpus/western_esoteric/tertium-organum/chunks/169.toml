[content]
body = "_______ Where are our \"idols?\" From what shall we liberate ourselves in order to pass to an understanding of the multi-dimensional world?\n\nFirst of all we must get rid of our assurance that we see and sense that which exists in reality, and that the real world is like the world which we see—i.e., we must rid ourselves of the illusion of the material world.\n\nWe must understand mentally all the illusoriness of the world perceived by us in space and time, and know that the real world cannot have anything in common with it; to understand that it is impossible to imagine the real world in terms of form; and finally we must perceive the conditionality of the axioms p.\n\n265 of our mathematics and logic, related as they are to the unreal phenomenal world.\n\nIn mathematics the idea of infinity will help us to do this.\n\nThe unreality of finite magnitudes in comparison with infinite ones is obvious.\n\nIn logic let us dwell upon the idea of monism , i.e., the fundamental unity of everything which exists, and consequently recognize the impossibility of constructing any axioms, which involve the idea of opposites—of theses and antitheses—upon which our logic is built.\n\nThe logic of Aristotle and of Bacon is at bottom dualistic .\n\nIf we really deeply assimilate the idea of monism, we shall dethrone the \"idol\" of this logic.\n\nThe fundamental axioms of our logic reduce themselves to identity and contradiction, just as do the axioms of mathematics.\n\nAt the bottom of them all lies the admission of our general axiom, namely, that every given something has something opposite to it; therefore every proposition has its anti-proposition, every thesis has its anti-thesis .\n\nTo the existence of any thing is opposed the non-existence of that thing.\n\nTo the existence of the world is opposed the non-existence of the world.\n\nObject is opposed to subject ; the objective world to the subjective; the I is opposed to the Not-I; to motion—immobility; to variability—constancy; to unity—heterogeneity; to truth—falsehood; to good—evil.\n\nAnd in conclusion, to every A in general is opposed Not-A .\n\nThe recognition of the reality of these divisions is necessary for the acceptance of the fundamental axioms of the logic of Aristotle and Bacon, i.e., the absolute and incontestable recognition of the duality of the world —of dualism.\n\nThe recognition of the unreality of these divisions and that of the unity of all opposites is necessary for the comprehension of higher logic .\n\n______ At the very beginning of this book the existence of THE WORLD and of THE PSYCHE was admitted, i.e., the reality of the dual division of everything existent, because all other opposites are derived from this opposition.\n\nDuality is the condition of our knowledge of the phenomenal (three-dimensional) world; this is the instrument of our knowledge p.\n\n266 of phenomena.\n\nBut when we come to the knowledge of the noumenal world (or the world of many dimensions), this duality begins to hinder us, appears as an obstacle to knowledge.\n\nDualism is the chief \"idol\"; let us free ourselves from it.\n\nThe two-dimensional being, in order to comprehend the relations of things in three dimensions and our logic, must renounce its \"idol\"—the absolute singularity of objects which permits it to call them solely by their proper names.\n\nWe, in order to comprehend the world of many dimensions, must renounce the idol of duality .\n\nBut the application of monism to practical thought meets the in-surmountable obstacle of our language.\n\nOur language is incapable of expressing the unity of opposites , just as it cannot express spatially the relation of cause to effect."

