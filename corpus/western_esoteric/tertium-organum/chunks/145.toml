[content]
body = "There can be pure sympathy, and there can be sympathy mixed with calculation to receive something for one's sympathy.\n\nThere can be pure love of knowledge, a thirst for knowledge for its own sake, and there can be an inclination to knowledge wherein considerations of utility or profit assume the chief importance.\n\nIn their outer manifestation pure and impure emotions may differ very little.\n\nTwo men may be playing chess, acting outwardly very similarly, but in one will burn self-love, desire of victory, and he will be full of different unpleasant feelings toward his rival—fear, envy of a clever move, spite, jealousy, animosity, or schemes to win, while the other will simply solve a complex mathematical problem which lies before him, not thinking about his rival at all.\n\nThe emotion of the first man will be impure, if only because it contains much of the mixed.\n\nThe emotion of the second will be pure.\n\nThe meaning of this is of course perfectly clear.\n\nExamples of a similar division of outwardly similar emotions may be constantly seen in the esthetic, literary, scientific, public and even the spiritual and religious activities of men.\n\nIn all regions of this activity only complete victory over the pseudo-personal elements leads a man to the correct understanding of the world and of himself.\n\nAll emotions colored by such SELF-ELEMENTS p.\n\n225 are like concave, convex, or otherwise curved glasses which refract rays incorrectly and distort the image of the world.\n\nTherefore the problem of emotional knowledge consists in a corresponding preparation of the emotions which serve as organs of knowledge.\n\nBecome as little children .\n\n.\n\n.\n\nand Blessed are the pure in heart.\n\n.\n\n.\n\n.\n\nIn these evangelical words is expressed first of all the idea of the purification of the emotions.\n\nIt is impossible to know through impure emotions.\n\nTherefore in the interests of a correct understanding of the world and of the self, man should undertake the purification and the elevation of his emotions.\n\nThis last leads to an entirely new view of morality .\n\nThat morality the aim of which is to establish a system of correct relations toward the emotions, and to assist in their purification and elevation, ceases in our eyes to be some wearisome and self-limiting exercise in virtue.\n\nMorality—this is a form of esthetics.\n\nThat which is not moral is first of all not beautiful, because not concordant, not harmonious.\n\nWe see all the enormous meaning that morality may have in our life; we see the meaning morality has for knowledge , for the reason that there are emotions by which we know , and there are emotions by which we delude ourselves.\n\nIf morality can actually help us to analyze these, then its value is indisputable from the standpoint of knowledge.\n\nCurrent popular psychology knows very well that malice, hatred, anger, jealousy BLIND a man, DARKEN his reason; it knows that fear DRIVES ONE INSANE, etc., etc.\n\nBut we also know that every emotion may serve either knowledge or nescience.\n\nLet us consider such an emotion—valuable and capable of high development—as the pleasure of activity .\n\nThis emotion is a powerful motive force in culture, and of service in the perfection of life and in the evolution of all higher faculties of man.\n\nBut it is also the cause of an infinite number of his delusions and faux pas for which he afterwards pays bitterly.\n\nIn the passion of activity man is easily inclined to forget the aim that started him to act; to accept p.\n\n226 the activity itself for the aim and even to sacrifice the aim in order to preserve the activity.\n\nThis is seen with especial clearness in the activity of various spiritual movements.\n\nMan, starting out in one direction, turns in the opposite one without himself noticing it, and often descends into the abyss thinking that he is scaling the heights.\n\nThere is nothing more contradictory, more paradoxical than the man who is enticed away by activity ."

