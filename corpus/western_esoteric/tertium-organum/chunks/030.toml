[content]
body = "The future also does not exist—it does not exist as yet.\n\nIt has not arrived, has not formed.\n\nBy the present we mean the moment of transition of the future into the past, i.e., the moment of transition of a phenomenon from one non-existence into another non-existence .\n\nFor that moment only does the phenomenon exist for us in reality; before, it existed in potentiality, afterward it will exist in remembrance.\n\nBut this short moment is after all only a fiction: it has no measurement.\n\nWe have a full right to say that p.\n\n40 the present does not exist.\n\nWe can never catch it.\n\nThat which we did catch is always the past !\n\nIf we are to stop at that we must admit that the world does not exist, or exists only in some phantasmagoria of illusions, flashing and disappearing.\n\nUsually we take no account of this, and do not reflect that our customary view of time leads to utter absurdity.\n\nLet us imagine a stupid traveller going from one city to another and half way between these two cities.\n\nA stupid traveller thinks that the city from which he has departed last week does not exist now : only the memory of it is left; the walls are ruined, the towers fallen, the inhabitants have either died or gone away.\n\nAlso, that city at which he is destined to arrive in several days does not exist now either, but is being hurriedly built for his arrival, and on the day of that arrival will be ready, populated, and set in order, and on the day after his departure will be destroyed just as was the first one.\n\nWe are thinking of things in time exactly in this way—everything passes away, nothing returns!\n\nThe spring has passed, it does not exist still .\n\nThe autumn has not come, it does not exist as yet .\n\nBut what does exist?\n\nThe present.\n\nBut the present is not a seizable moment, it is continuously transitory into the past.\n\nSo, strictly speaking, neither the past, nor the present, nor the future exists for us.\n\nNothing exists!\n\nAnd yet we are living, feeling, thinking—and something surrounds us.\n\nConsequently, in our usual attitude toward time there exists some mistake.\n\nThis error we shall endeavor to detect.\n\nWe accepted at the very beginning that something exists.\n\nWe called that something the world.\n\nHow then can the world exist if it is not existing in the past, in the present and in the future?\n\nThat conception of the world which we deduced from our usual view of time makes the world appear like a continuously gushing out igneous fountain of fireworks, each spark of which flashes for a moment and disappears, never to appear any more.\n\nFlashes are going on continuously, following one after another, there are an p.\n\n41 infinite number of sparks, and everything together produces the impression of a flame, though it does not exist in reality .\n\nThe autumn has not yet come.\n\nIt will be, but it does not exist now .\n\nAnd we give no thought to how that can appear which is not .\n\nWe are moving upon a plane, and recognize as really existing only the small circle lighted by our consciousness.\n\nEverything out of this circle, which we do not see, we negate; we do not like to admit that it exists.\n\nWe are moving upon the plane in one direction.\n\nThis direction we consider as eternal and infinite.\n\nBut the direction at right angles to it, those lines which we are intersecting, we do not like to recognize as eternal and infinite.\n\nWe imagine them as going into non-existence at once, as soon as we, have passed them, and that the lines before us have not as yet risen out of non-existence."

