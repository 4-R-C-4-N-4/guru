[content]
body = "______ In \"man\" we have found that one side of his noumenon is his psychic life, and that therefore in the psyche lies the beginning of the solution of the riddle of the functions and meanings of man which are incomprehensible from an outside point of view.\n\nWhat is the psyche of man if it is not his function—incomprehensible in the three-dimensional section of the world?\n\nTruly, if we shall study and observe man by all accessible means, objectively, from without, we shall never discover his psyche and shall never define the function of his consciousness.\n\nWe must first of all become aware of the existence of our own psyche, and then either begin a conversation (by signs, gestures, words) with another man, begin to exchange thoughts with him, and from his answers deduce the conclusion that he possesses the same thing that we do—or come to the conclusion about it from external indications (actions similar to ours in similar circumstances).\n\nBy the direct method of objective investigation, without the help of speech , or without the help of conclusions based upon analogy , we shall not discover the psyche in another man.\n\np.\n\n180 [paragraph continues] That which is inaccessible to the direct method of investigation, but exists , is NOUMENAL.\n\nConsequently we shall not be in a position to define the functions and meanings of man in another section of the world than that world of Euclidian geometry, solely accessible to the \"direct methods of investigation.\" Therefore we have a perfect right to regard \"the psyche of man\" as his function in some section of the world different from that three-dimensional section wherein \"the body of man\" functions.\n\nHaving established this much we may ask ourselves the question: Have we not the right to make a reverse conclusion, and regard as a psyche of its own kind the to us unknown function of the \"world\" and of \"things\" outside of their three-dimensional section?\n\n______ Our usual positivistic view regards psychic life as a function of the brain .\n\nWithout a brain we cannot imagine rationality.\n\nMax Nordau, when he wanted to imagine the world's consciousness (in Paradoxes ), was obliged to say that we cannot be certain that somewhere in the infinite space of the universe is not repeated on a grandiose scale the same combination of physical and chemical elements as constitutes our brains .\n\nThis is very characteristic and typical of \"positive science.\" Desiring to imagine the \"world's consciousness\" positivism is first of all forced to imagine a gigantic brain .\n\nDoes not this at once savor of the two-dimensional or plane world?\n\nSurely the idea of a gigantic brain somewhere beyond the stars reveals the appalling poverty and impotence of positivistic thought.\n\nThis thought cannot leave its usual grooves; it has no wings for a soaring flight.\n\nLet us imagine that some curious inhabitant of Europe in the seventeenth century should try to foresee the means of transportation in the twentieth century, and should picture to himself an enormous stage-coach, large as an hotel, harnessed to one thousand horses; he would be pretty near to the truth, but also at the same time infinitely far from it.\n\nAnd yet even in his time some minds which foresaw along correct lines already existed: already the idea of the steam engine had been broached and models were appearing.\n\nThe thought expressed by Nordau reminds one of a favorite concept of popular philosophy relating to an accidentally caught p.\n\n181 idea, that the planets and satellites of the solar system are merely molecules of some tremendous organism, an insignificant part of which that system represents.\n\n\"Perhaps the entire universe is located on the tip of the little finger of some great being,\" says such a philosophizer, \"and perhaps our molecules are also worlds.\" The deuce!\n\nPerhaps on my little finger there are several universes too!\n\nAnd such a philosophizer gets frightened.\n\nBut all such reasonings are merely the gigantic stage-coach over again."

