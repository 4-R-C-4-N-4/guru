[content]
body = "An artistic description of epileptic states we find in Dostoyevsky's, The Idiot .\n\nHe remembered among other things that he always had one minute just before the epileptic fit (if it came on while he was awake) when suddenly in the midst of sadness, spiritual darkness and oppression, there seemed at moments a flash of light on his brain and with extraordinary impetus all his vital forces suddenly began working at their highest tension.\n\nThe sense of life, the consciousness of self, were multiplied ten times at these p.\n\n302 moments which passed like a flash of lightning.\n\nHis mind and his heart were flooded with extraordinary light; all his uneasiness, all his doubts, all his anxieties were relieved at once; they were all merged in a lofty calm, full of serene, harmonious joy and hope.\n\nThinking of that moment later, when he was all right again, he often said to himself that all these gleams and flashes of the highest sensation of life and self-consciousness, and therefore also of the highest form of existence, were nothing but disease, the interruption of the normal condition.\n\n.\n\n.\n\n.\n\nAnd yet he came at last to an extremely paradoxical conclusion.\n\nWhat if it is disease?\n\nhe decided, if the result, if the minute of sensation, remembered and analyzed afterwards in health, turns out to be the acme of harmony and beauty, and gives a feeling, unknown and undivined till then, of completeness, of proportion, of reconciliation, and of ecstatic devotional merging in the highest synthesis of life?\n\nThese vague expressions seemed to him very comprehensible, though too weak.\n\nThat it was \"beauty and worship,\" that it really was the \"highest synthesis of life\" he could not doubt, and could not admit the possibility of doubt.\n\n.\n\n.\n\n.\n\nHe was quite capable of judging of that when the attack was over.\n\nThese moments were only an extraordinary quickening of self-consciousness—if the condition was to be expressed in one word—and at the same time of the direct sensation of existence in the most intense degree.\n\nSince at that second, that is at the very last conscious moment before the fit, he had time to say to himself clearly and consciously, \"Yet for this moment one might give ones whole life!\" then without doubt that moment was really worth the whole of life.\n\n.\n\n.\n\n.\n\nFor the very thing had happened; he actually had said to himself at that second, that, for the infinite happiness he had felt in it, that second really might well be worth the whole of life.\n\nAt that moment,\" as he told Rogozhin one day in Moscow .\n\n.\n\n.\n\n\"at that moment I seemed somehow to understand the extraordinary saying that there shall be time no longer .\n\nProbably,\" he added, smiling, \"this is the very second which was not long enough for the water to be spilt out of Mohammed's pitcher, though the epileptic prophet had time to gaze at all the habitations of Allah.\n\n1 Narcosis or epilepsy are not at all necessary conditions to induce mystical states in ordinary men.\n\n\"Certain aspects of nature appear to have the peculiar power of awakening such mystical moods,\" says James.\n\nIt would be more correct to say that in all conditions of encompassing nature this power lies concealed.\n\nThe change of the seasons—the first snow, the awakening of spring, the summer days, p.\n\n303 rainy and warm, the aroma of autumn—awakes in us strange \"moods\" which we ourselves do not understand.\n\nSometimes these moods intensify, and become the sensation of a complete oneness with nature.\n\nIn the life of every man there are moments which act upon him more powerfully than others.\n\nUpon one a thunderstorm acts mystically, upon another, sunrise, a third the sea, the forest, rocks, fire .\n\nThe voice of sex embraces much of that same mystical sense of nature .\n\nIn the sex impulse man puts himself in the most personal relation with nature."

