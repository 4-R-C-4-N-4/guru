[content]
body = "How many arguments, how many religious struggles, how much of violence toward the thoughts of others would be rendered unnecessary and impossible if men would only understand that nobody possesses truth, but all are seeking for it, each in his own way.\n\nThe ideas of Clement of Alexandria about God are highly interesting, and closely approximate to those of the Vedânta, and particularly to the ideas of the Chinese philosophers.\n\nThe discourse respecting God is the most difficult to handle.\n\nFor since the first principle of everything is difficult to find out, the absolutely first and the oldest principle, which is the cause of all other things being and p.\n\n289 having been, is difficult to exhibit.\n\nFor how can that be expressed which is neither genus, nor difference, nor species, nor individual, nor number; nay more, is neither an event, nor that to which an event happens?\n\nNo one can rightly express this wholly.\n\nFor on account of his greatness he is ranked as the All and is the Father of the universe.\n\nNor are any parts to be predicated of them.\n\nFor the one is indivisible, wherefore also it is infinite, not considered with reference to its being without dimensions, and not having a limit.\n\nAnd therefore it is without form and name.\n\nAnd if we name it, we do not do so properly, terming it either the one, or the good, or mind, or Absolute Being, or Father, or God, or Creator, or Lord.\n\nWe speak not as supplying His name; but for want, we use good names, in order that the mind may have these as points of support, so as not to err in other respects.\n\n1 Among Chinese mystical philosophers our attention is arrested by Lao-Tzu (VI cent.\n\nB.\n\nC.), and Chuang-Tzu^ (IV cent.\n\nB.\n\nC.) by the cleanliness of thought and the unusual simplicity with which they express the most profound doctrines of idealism.\n\nThe Sayings of Lao-Tzu^ The Tao, which can be expressed in words is not the eternal Tao; the name which can be uttered is not its eternal name.\n\n2 Tao eludes the sense of sight, and is therefore called colorless.\n\nIt eludes the sense of hearing, and is therefore called soundless.\n\nIt eludes the sense of touch, and is therefore called incorporeal.\n\nThese three qualities cannot be apprehended, and hence they may be blended into unity.\n\nCeaseless in action, it cannot be named, but returns again to nothingness.\n\nWe may call it the form of the formless, the image of the image-less, the fleeting and the indeterminable.\n\nThere is something chaotic, yet complete, which existed before heaven and earth.\n\nOh, how still it is, and formless, standing alone without changing, reaching everywhere, without suffering harm!\n\nIts name I know not.\n\nTo designate it I call it Tao.\n\nEndeavoring to describe it, I call it Great.\n\nBeing Great, it passes on; passing on, it becomes remote; having become remote it returns.\n\nThe law of Tao is its own spontaneity.\n\nTao in its unchanging aspect has no name.\n\nThe mightiest manifestations of active force flow from Tao.\n\np.\n\n290 Tao as it exists in the world is like great rivers and seas which receive the streams from the valleys.\n\nAll-pervading is the Great Tao.\n\nIt can be at once on the right hand and on the left.\n\nTao is a great square with no angles, a great sound which cannot be heard, a great image with no form.\n\nTao produced Unity; Unity produced Duality; Duality produced Trinity; and Trinity produced all existing objects.\n\nHe who acts in accordance with Tao, becomes one with Tao.\n\nAll the world says that my Tao is great, but unlike other teachings.\n\nIt is just because it is great that it appears unlike other teachings."

