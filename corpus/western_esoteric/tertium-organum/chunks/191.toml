[content]
body = "The Sufi poets frequently lived the strange lives of hermits, anchorites and wanderers, at the same time singing of love, the beauty of women, the aroma of roses and wine.\n\nJêlal eddîn describes as follows the communion of the soul with God: A loved one said to her lover to try him early one morning: \"O such a one, son of such a one, I marvel whether you hold me more dear, or yourself; tell me truly, O ardent lover!\" He answered: \"I am so entirely absorbed in you, that I am full of you from head to foot.\n\nOf my own existence nothing but the man remains, in my being is nothing beside you, O object of my desire.\n\nTherefore I am thus lost in you.\n\nAs a stone which has been changed into a pure ruby, is filled with the bright light of the sun.\"—(Max Müller.) In two well-known poems of Jami (XV century), Salaman and Abasl and Yusuf and Zulaikha , the \"ascending of the soul,\" its purification and its union with God, is represented in the most passionate forms.\n\n______ Prof.\n\nJames pays great attention in his book to mystical states under narcosis .\n\n\"This is a realm that public opinion and ethical philosophy have p.\n\n297 long since branded as pathological, though private practice and certain lyric strains of poetry seem still to bear witness of its ideality.\n\n\"Nitrous oxide and ether, especially nitrous oxide, when sufficiently diluted with air, stimulates the mystical consciousness in an extraordinary degree.\n\nDepth beyond depth of truth seems revealed to the inhaler.\n\nThis truth fades out, however, or escapes, at the moment of coming to; and if any words remain over in which it seemed to clothe itself, they prove to be the veriest nonsense.\n\nNevertheless, the sense of a profound meaning having been there persists; and I know more than one person who is persuaded that in the nitrous oxide trance we have a genuine metaphysical revelation.\n\n\"Some years ago I myself made some observations on this aspect of nitrous oxide intoxication, and reported them in print.\n\nOne conclusion was forced upon my mind at that time, and my impression of its truth has ever since remained unshaken.\n\nIt is that our normal waking consciousness, rational consciousness as we call it, is but one special type of consciousness , whilst all about it, parted from it by the filmiest of screens, there are potential forms of consciousness entirely different.\n\nWe may go through life without suspecting their existence, but apply the requisite stimulus and at a touch they are there in all their completeness, definite types of mentality which probably somewhere have their field of application and adaptation.\n\nNo account of the universe in its totality can be final which leaves these other forms of consciousness quite disregarded.\n\nAt any rate, they forbid a premature closing of our accounts with reality.\n\n\"The whole drift of my education goes to persuade me that the world of our present consciousness is only one out of many worlds of consciousness that exist, and that those other worlds must contain experiences which have a meaning for our life also.\n\n\"Looking back on my experiences, they all converge toward a kind of insight to which I cannot help ascribing some metaphysical significance.\n\nThe keynote of it is invariably a reconciliation.\n\nIt is as if the opposites of the world, whose contradictions and conflict make all our difficulties and troubles, were melted into unity.\n\nNot only do they, as contrasted species, belong to one and the same genus, but one of the species —the nobler p.\n\n298 and the better one— is itself the genus, so soaks up and absorbs its opposite into itself .\n\nThis is a dark saying, I know, when thus expressed in terms of common logic, but I cannot wholly escape from its authority."

