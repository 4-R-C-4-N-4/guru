body = "p.\n\n166 CHAPTER XV Occultism and love.\n\nLove and death.\n\nOur different relations to the problems of death and to the problems of love.\n\nWhat is lacking in our understanding of love?\n\nLove as an every-day and merely psychological phenomenon.\n\nThe possibility of a spiritual understanding of love.\n\nThe creative force of love.\n\nThe negation of love.\n\nLove and mysticism.\n\nThe \"wondrous\" in love.\n\nNietzsche, Edward Carpenter and Schopenhauer on love.\n\n\"The Ocean of Sex.\" THERE is not a single side of life which is not capable of revealing to us an infinity of the new and the unexpected, if we approach it with the knowledge that it is not exhausted by its visibility, that beyond this visibility there is a whole \"invisible world\"—a world of to us new and incomprehensible forces and relations.\n\nThe knowledge of the existence of this invisible world: this is the first key to it.\n\nA wealth of \"newness\" unfolds to us in the most mysterious sides of our existence, in those sides through which we come into direct contact with eternity —in love and in death.\n\nIn Hindu mythology love and death are the two faces of one deity .\n\nSiva , god of the creative force of nature, is at the same time the god of violent death, of murder and destruction.\n\nHis wife is Parvati , goddess of beauty, love and happiness, and she is also Kali or Durga —goddess of evil, of misfortune, of sickness and of death.\n\nTogether Siva and Kali are the gods of wisdom, the gods of the knowledge of good and evil.\n\nIn the beginning of his book, The Drama of Love and Death , 1 Edward Carpenter very well defines our relation to these deeply incomprehensible and enigmatical sides of existence: Love and death move through this world of ours like things apart—underrunning it truly, and everywhere present, yet seeming to belong to some other mode of existence.\n\np.\n\n167 And further: These figures, Love and Death, move through the world like closest friends indeed, never far separate, and together dominating it in a kind of triumphant superiority; and yet like bitterest enemies, dogging each other's footsteps, undoing each other's work, fighting for the bodies and souls of mankind.\n\nIn these few words is shown the contents of the enigma which confronts us, encompasses us, creates and annihilates us.\n\nBut man's relation to the two aspects of this enigma is not identical.\n\nStrange as it may seem, the face of death has ever been more attractive to the mystical imagination of men than the face of love .\n\nThere have always been many attempts to understand and define the hidden meaning of death; all religions, all religious doctrines begin with giving to man this or that idea about death.\n\nIt is impossible to construct any system of world-contemplation without some definition of death; and there are numerous systems such as contemporary spiritism which consist almost entirely of \"views upon death,\" of doctrines about death and post-mortem existence.\n\n(In one of his articles, V.\n\nV.\n\nRosanoff 1 observes that all religions consist in substance of teachings about death.) But the problem of love, in the contemporary way of looking at the world, is regarded as something given, as something already understood and known.\n\nDifferent systems contribute little that is enlightening to an understanding of love.\n\nSo although in reality love is for us the same enigma as is death, yet for some strange reason we think about it less.\n\nWe seem to have developed certain cut and dried standards in regard to an understanding of love, and men thoughtlessly accept this or that standard.\n\nArt.\n\nwhich from its very nature should have much to say on this subject, gives a great deal of attention to love; love ever has been, and perhaps still is, the principal theme of art."

