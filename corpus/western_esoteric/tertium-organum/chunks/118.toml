[content]
body = "Let us endeavor to consider the activity of the brain and the activity of the psyche from the standpoint of the existence of those two data, the \"world\" and \"consciousness,\" accepted by us at the very beginning.\n\nIf we consider the brain from the standpoint of consciousness, then the brain will be part of the \"world,\" i.e., part of the outer world lying outside of consciousness.\n\nTherefore the psyche and the brain are different things.\n\nBut the psyche, as experience and observation shows, can act only through the brain.\n\nThe brain is that necessary prism, passing through which, part of the psyche manifests itself to us as intellect .\n\nOr to put it a little differently, the brain is a mirror, reflecting psychic life in our three-dimensional section of the world .\n\nThis last means that in our three-dimensional section of the world not all of the psyche (the true dimensions of which we do not know) is acting, but only so much of it as can be reflected in a brain.\n\nIt is clear that if the mirror be broken, then the image will be broken too, or if the mirror be injured or imperfect, then the reflection will be blurred or distorted.\n\nBut there is absolutely no reason to believe that when the mirror is broken the object which it reflects is thereby destroyed, i.e., psychic life in the given case.\n\nThe psyche cannot suffer from any disorder of the brain, but the manifestations of it may suffer very much or may even disappear from the field of our observation altogether.\n\nTherefore it is clear that a disorder in the activity of the brain causes an enfeeblement or a distortion, or even a complete disappearance of the psychic faculties manifesting in our sphere.\n\nThe idea of the comparison between a three-dimensional body and a four-dimensional one enables us to affirm that not all the psychic activity goes through the brain, but a part of it only.\n\n1 Each of us is in reality an abiding physical entity far more extensive than he knows—an individuality which can never express itself completely through any corporeal manifestation.\n\nThe self manifests through the organism; but there is always some part of the self unmanifested.\n\n2 p.\n\n184 The \"positivist\" will remain unconvinced.\n\nHe will say: prove to me that thought can act without a brain, then I will believe it.\n\nI shall answer him by the question: WHAT, in the given case, will constitute a proof?\n\nThere are no proofs and there can not be any.\n\nThe existence of the psyche without a brain (without a body), if that be possible, is for us a fact which cannot be proven like a physical fact.\n\nAnd if my opponent will reason sincerely, then he will be convinced there can be no proof, because he himself has no means of being convinced of the existence of a psyche acting independently of a brain .\n\nLet us assume that the thought of a dead man (i.e., of a man whose brain has ceased to act) continues to function.\n\nHow can we convince ourselves of this?\n\nBy no possible means whatever .\n\nWe have means of communication (speech, writing) with beings which are in conditions similar to our own—i.e., acting through brains; concerning the existence of the psyche of those same beings we can conclude by analogy with ourselves; but concerning the existence of the psychic life of other beings, whether they do or they do not exist is immaterial , we can not by ordinary means convince ourselves that they exist .\n\nIt is exactly this that gives us a key to the understanding of the true relation of psychic life to the brain.\n\nOur psyche being a reflection from the brain, we can observe only those reflections which are similar to itself.\n\nWe have before established that we can make conclusions concerning the psychic life of other beings from the exchange of thoughts with them and from analogies with ourselves."

