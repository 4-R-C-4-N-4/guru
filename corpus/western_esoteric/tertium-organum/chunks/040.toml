[content]
body = "If we look at our two hands we see this clearly, though the two hands represent a complex case of a symmetrical similarity.\n\nNow there is one way in which the right hand and the left hand may practically be brought into likeness.\n\nIf we take the right hand glove and the left hand glove, they will not fit any more than the right hand will coincide with the left hand; but if we turn one glove inside out, then it will fit.\n\nNow suppose the same thing done with the solid hand as is done with the glove when it is turned inside out, we must suppose it, so to speak, pulled through itself.\n\n.\n\n.\n\n.\n\nIf such an operation were possible, the right hand would be turned into an exact model of the left hand.\n\n1 But such an operation would be possible in the higher dimensional space only, just as the overturning of the triangle is possible only in a space relatively higher than the plane.\n\nEven granting the existence of four-dimensional space, it is possible that the turning of the hand inside out and the pulling of it through itself is a practical impossibility on account of causes independent of geometrical conditions.\n\nBut this does not diminish its value as an example.\n\nThings like the turning of the hand inside out are possible theoretically in four-dimensional space because in this space different, and even distant points of our space and time touch, or have the possibility of contact.\n\nAll points of a sheet of paper lying on a table are separated p.\n\n56 one from another, but by taking the sheet from the table it is possible to fold it in such a way as to bring together any given points.\n\nIf on one corner is written St.\n\nPetersburg , and on another Madras , nothing prevents the putting together of these corners.\n\nAnd if on the third corner is written the year 1812, and on the fourth 1912, these corners can touch each other too.\n\nIf on one corner the year is written in red ink, and the ink has not yet dried, then the figures may imprint themselves on the other corner.\n\nAnd if afterwards the sheet is straightened out and laid on the table, it will be perfectly incomprehensible, to a man who has not followed the operation, how the figure from one corner could transfer itself to another corner.\n\nFor such a man the.\n\npossibility of the contact of remote points of the sheet will be incomprehensible, and it will remain incomprehensible so long as he thinks of the sheet in two-dimensional space only.\n\nThe moment he imagines the sheet in three-dimensional space this possibility will become real and obvious to him.\n\nIn considering the relation of the fourth dimension to the three known to us, we must conclude that our geometry is obviously insufficient for the investigation of higher space.\n\nAs before stated, a four-dimensional body is as incommensurable with a three-dimensional one as a year is incommensurable with St.\n\nPetersburg .\n\nIt is quite clear why this is so.\n\nThe four-dimensional body consists of on infinitely great number of three-dimensional bodies; accordingly, there cannot be a common measure for them.\n\nThe three-dimensional body, in comparison with the four-dimensional one is equivalent to the point in comparison with the line.\n\nAnd just as the point is incommensurable with the line, so is the line incommensurable with the surface; as the surface is incommensurable with the solid body, so is the three-dimensional body incommensurable with the four-dimensional one.\n\nIt is clear also why the geometry of three dimensions is insufficient for the definition of the position of the region of the fourth dimension in relation to three-dimensional space.\n\nJust as in the geometry of one dimension, that is, upon the line, it is impossible to define the position of the surface, the side of which constitutes the given line; just as in the geometry of two dimensions, p."

