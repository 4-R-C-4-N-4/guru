[content]
body = "We know that it must give it , but FROM WHAT could he know that?\n\nNone of his contemporaries ever united sanctity with the idea of the comprehension of space; and in general there was no discussion at all about \"space\" at that time, at least among the Greeks and Romans.\n\nOnly now, after Kant , and after we have had access to the treasures of thought of the Orient, do we understand that the transition into a new phase of consciousness is impossible without the expansion of the space-sense.\n\np.\n\n335 But we wonder if this is what the apostle Paul wanted to say—that strange man: Roman official, persecutor of the first Christianity who became its preacher, philosopher, mystic; the man who \"saw God,\" the bold reformer and moralist of his time, who fought for \"the spirit\" against \"the letter\" and was of course not responsible for the fact that he himself was understood by others not in \"the spirit,\" but in \"the letter.\" Is it this that he wanted to say?\n\nWe do not know.\n\nBut let us look at these words of the Apocalypse and the Epistles from the standpoint of our usual \"positivistic thinking,\" which sometimes condescendingly agrees to admit the \"metaphorical meaning\" of mysticism.\n\nWhat shall we see?\n\nWE SHALL SEE NOTHING!\n\nThe flash of mystery , which appeared just for an instant, will immediately disappear.\n\nThe words will be without any content, nothing in them will attract our wearied attention, which will merely glide over them as it glides over everything.\n\nWe will indifferently turn the page and indifferently close the book.\n\nAn interesting metaphor, yes: But nothing else!\n\nAnd we fail to observe that we rob ourselves, deprive life of all beauty, all mystery, all content; and wonder afterwards why everything is so uninteresting and detestable to us, why we do not desire to live, and why we do not understand anything around us; we wonder why brute force wins, or deceit and falsification, though to these things we have nothing to oppose.\n\nTHE METHOD IS NO GOOD.\n\nIn its time \"positivism\" appeared as something refreshing, sober, healthful and progressive , which explored new avenues of thought.\n\nAfter the sentimental speculations of naive dualism \"positivism\" was indeed a great step forward.\n\nPositivism became a symbol of the progress of thought.\n\nBut we see now that it inevitably leads to materialism .\n\nAnd in this form it arrests thought.\n\nFrom revolutionary, persecuted, anarchistic, free-thinking, positivism became the basis of official science.\n\nIt is decked-out in full dress.\n\nIt is given medals.\n\nThere are academies and universities dedicated to its service.\n\nIt is recognized; it teaches; it tyrannizes over thought.\n\nBut having attained to well-being and prosperity, positivism immediately opposed obstacles to the forward march of thought.\n\np.\n\n336 A Chinese wall of \"positivistic\" sciences and methods is built up around free investigation.\n\nEverything rising above this wall is condemned as unscientific .\n\nAnd seen in this way positivism, which before was a symbol of progress, now appears as conservative , reactionary .\n\nThe existing order is already established in the world of thought, and to fight against it is declared to be a crime.\n\nWith astonishing rapidity those principles which only yesterday expressed the highest radicalism in the region of thought have become the basis of opportunism in the region of ideas and serve as blind alleys, stopping the progress of thought.\n\nIn our eyes this occurred with the idea of evolution, on which it is now possible to build up anything, and with the help of which it is possible to tear down anything.\n\nBut thought, which is free, cannot be bound by any limits.\n\nThe true motion which lies at the foundation of everything, is the motion of thought .\n\nTrue energy is the energy of consciousness ."

