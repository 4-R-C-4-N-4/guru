body = "p.\n\n52 CHAPTER V Four-dimensional space.\n\n\"Temporal body\"— Linga Sharîra .\n\nThe form of a human body from birth to death.\n\nIncommensurability of three-dimensional and four-dimensional bodies.\n\nNewton's fluents.\n\nThe unreality of constant quantities in our world.\n\nThe right and the left hands in three-dimensional and in four-dimensional space.\n\nDifference between three-dimensional and four-dimensional space.\n\nNot two different spaces but different methods of receptitivity of one and the same world.\n\nFOUR-DIMENSIONAL space, if we try to imagine it to ourselves, will be the infinite repetition of our space, of our infinite three-dimensional sphere, as a line is the infinite repetition of a point.\n\nMany things that have been said before will become much clearer to us when we dwell on the fact that the fourth dimension must be sought for in time .\n\nIt will become clear what is meant by the fact that it is possible to regard a four-dimensional body as the tracing of the movement in space of a three-dimensional body in a direction not confined within that space.\n\nNow the direction not confined in three-dimensional space in which any three-dimensional body moves—this is the direction of time.\n\nAny three-dimensional body, existing , is at the same time moving in time and leaves as a tracing of its movement the temporal, or four-dimensional body.\n\nWe never see or feel this body, because of the limitations of our receptive apparatus, but we see the section of it only, which section we call the three-dimensional body.\n\nTherefore we are in error in thinking that the three-dimensional body is in itself something real.\n\nIt is the projection of the four-dimensional body—its picture—the image of it on our plane .\n\nThe four-dimensional body is the infinite number of three-dimensional bodies.\n\nThat is, the four-dimensional body is the infinite number of moments of existence of the three-dimensional one—its states and positions.\n\nThe three-dimensional body which we see p.\n\n53 appears as a single figure—one of a series of pictures on a cinematographic film as it were.\n\nFour-dimensional space (time) is really the distance between the forms, states, and positions of one and the same body (and different bodies, i.e., those seeming different to us).\n\nIt separates those states, forms, and positions each from the other, and it binds them also into some to us incomprehensible whole.\n\nThis incomprehensible whole can be formed in time out of one physical body—and out of different bodies.\n\nIt is easier for us to imagine the temporal whole as related to one physical body.\n\nIf we consider the physical body of a man, we shall find in it besides its \"matter\" something , it is true, changing, but undoubtedly one and the same from birth until death.\n\nThis something is the Linga-Sharîri of Hindu philosophy, i.e., the form on which our physical body is moulded .\n\n(H.\n\nP.\n\nBlavatsky: The Secret Doctrine .) Eastern philosophy regards the physical body as something impermanent which is in a condition of perpetual interchange with its surroundings.\n\nThe particles come and go.\n\nAfter one second the body is already not absolutely the same as it was one second before.\n\nToday it is in a considerable degree not that which it was yesterday.\n\nAfter seven years it is a quite different body .\n\nBut despite all this, something always persists from birth to death, changing its aspect a little, but remaining the same.\n\nThis is the Linga-Sharîra .\n\nThe Linga-Sharîra is the form, the image : it changes, but remains the same.\n\nThat image of a man which we are able to represent to ourselves is not the Linga-Sharîra .\n\nBut if we try to represent to ourselves mentally the image of a man from birth to death, with all the particularities and traits of childhood, manhood and senility, as if extended in time, when it will be the Linga-Sharîra ."

