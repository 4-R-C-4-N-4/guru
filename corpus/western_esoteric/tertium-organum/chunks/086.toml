[content]
body = "The transition from one point to another of this film corresponds to our concept of the flow of time.\n\nThis fourth dimension we will call, therefore, time.\n\nThe film of a cinematograph can replace the reel of any tape-measure, and contrariwise.\n\nThe ingenious mathematician, Minkowsky, who died too young, proved that all these four dimensions are equivalent.\n\nHow shall we comprehend this?\n\nPersons who arrive in St.\n\nPetersburg from Moscow have passed through Tver.\n\nThey are not at this station (Tver) any longer, but nevertheless it continues to exist.\n\nIn the same manner, that moment of time corresponding to some event which has already passed—the beginning of life on earth, for example—has not disappeared, it exists still.\n\nIt is not outlived by the universe, but only by the earth.\n\nThe place of this event is defined by a certain point in the four-dimensional universe and this point existed, is existing, and will exist; now through it, through this station passed by the earth, passes another wanderer.\n\nTime does not flow, any more than space flows.\n\nIt is we who are flowing, wanderers in a four-dimensional universe.\n\nTime is just the same measurement of space as is length, breadth and height.\n\nHaving changed them in the expression of some law of nature we are returning to the identical law.\n\nThese new concepts are embodied by Minkowsky in an elegant mathematical theory; we shall not enter the magnificent temple erected by his genius, from which proceeds this voice: \"In nature all is given: for her the past and future do not exist; she is the eternal present; she has no limits, either of space or of time.\n\nChanges are proceeding in individuals and correspond to their displacements upon world-ways in a four-dimensional eternal and limitless manifold.\n\nThese concepts in the region of philosophical thought will produce a revolution considerably greater than that caused by the displacement of the earth from the centre of the universe by Copernicus.\" From the times of Newton to those of natural science, more brilliant perspectives have never opened up.\n\nIs not the power of natural science proclaimed in the transition from the undoubted experimental fact—the impossibility of the absolute motion of the earth—to a problem of the soul!\n\nA contemporary philosopher exclaimed in his confusion, \"beyond truth and falsehood.\" When the cult of a new God is born his word is not perfectly understood; the true meaning only becomes clear after the lapse of time.\n\nI p.\n\n131 think that this is true also as regards the principle of relativity.\n\nThe elimination of anthropomorphism from scientific conceptions was of enormous service to science.\n\nOn the same path stands the principle of relativity showing the dependence of our observations on general conditions of phenomena.\n\nThe electro-magnetic theory of the world (and the principle of relativity) explains only those phenomena the place of which is defined by that part of the universe which is occupied by matter; the rest of it, which presents itself to our senses as a vacuum remains as yet beyond the reach of science.\n\nBut at the shores of the material world is changelessly dashing the surf of new energy from that deep ocean empty for our senses, but not for our reason.\n\nIs not this dualism of matter and vacuum the anthropomorphism of science, and the last one?\n\nLet us put the fundamental question: What part of the universe is filled by matter?\n\nLet us surround our planetary system with a sphere the radius of which is equal to half of the distance from the sun to the nearest stars: the length of this radius is traversed by a light-ray in one and a half years.\n\nThe volume of this sphere let us take as the volume of the world.\n\nLet us now describe, with the sun as a centre, another, lesser sphere with a radius equal to the distance of our sun to the outermost planet."

