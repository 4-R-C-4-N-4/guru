[content]
body = "The most interesting and important questions arising with regard to cosmic consciousness may be summed up as follows: 1.—Is the manifestation of cosmic consciousness a problem of the distant future, and of other generations—i.e., must cosmic consciousness appear as the result of an evolutionary process, after centuries and millenniums, and will it then become a common property or a property of the majority?\n\nAnd 2.—Can cosmic consciousness make its appearance now in contemporary man, i.e., at least as the result of a certain education and self-development which will aid the unfolding in him of dominant forces and capabilities, i.e., as the result of a certain culture ?\n\nIt seems to me that with regard to this, the following ideas are tenable: p.\n\n331 The possibility of the appearance or development of cosmic consciousness belongs to the few.\n\nBut even in the case of those men in whom cosmic consciousness may appear, certain quite definite inner and outer conditions are requisite for its manifestation—a certain culture , the education of those elements congenial to cosmic consciousness, and the elimination of those hostile to it.\n\nThe distinguishing signs of those men in whom cosmic consciousness is likely to manifest are not studied at all.\n\nThe first of these signs is the constant or frequent sensation that the world is not at all as it appears; that what is most important in it is not at all what is considered most important.\n\nThe quest of the wondrous, sensed as the only real and true, results from this impression of the unreality of the world and everything related thereto.\n\nHigh mental culture, high intellectual attainments, are not necessary conditions at all.\n\nThe example of many saints , who were not intellectual, but who undoubtedly attained cosmic consciousness, shows that cosmic consciousness may develop in purely emotional soil, i.e., in the given case as a result of religious emotion.\n\nCosmic consciousness is also possible of attainment through the emotion attendant upon creation—in painters, musicians and poets.\n\nArt in its highest manifestations is a path to cosmic consciousness.\n\nBut equally in all cases the unfoldment of cosmic consciousness demands a certain culture , a correspondent life.\n\nFrom all the examples cited by Dr.\n\nBucke, and all others that one might add, it would not be possible to select a single case in which cosmic consciousness unfolded in conditions of inner life adverse to it, i.e., in moments of absorption by the outer life, with its struggles, its emotions and interests.\n\nFor the manifestation of cosmic consciousness it is necessary that the center of gravity of everything shall lie for man in the inner world, in self-consciousness, and not in the outer world at all.\n\nIf we assume that Dr.\n\nBucke himself had been surrounded by entirely different conditions than those in which he found himself at the moment of experiencing cosmic consciousness, then in all probability his illumination would not have come at all.\n\nHe spent the evening reading poetry in the company of men of p.\n\n332 high intellectual and emotional development, and was returning home full of the thoughts and emotions of the evening.\n\nBut if instead of this he had spent the evening playing cards in the society of men whose interests were common and whose conversation was vulgar, or at a political meeting, or had he worked a night shift in a factory at a turning-lathe or written a newspaper editorial in which he himself did not believe and nobody else would believe—then we may declare with certainty that no cosmic consciousness would have appeared in him at all.\n\nFor it undoubtedly demands a great freedom, and concentration on the inner world.\n\nThis conclusion in regard to the necessity for special culture and definitely favorable inner and outer conditions does not necessarily mean that cosmic consciousness is likely to manifest in every man who is put in these conditions.\n\nThere are men, probably an enormous majority of contemporary humanity, in whom exists no such possibility at all."

