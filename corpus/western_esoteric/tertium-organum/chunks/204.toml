[content]
body = "Doubt of God and of eternal life will be as impossible as is now doubt of existence; the evidence of each will be the same.\n\nReligion will govern every minute of every day of all life.\n\nChurches, priests, forms, creeds, prayers, all agents, all intermediaries between the individual man and God will be permanently replaced by direct unmistakable intercourse.\n\nSin will no longer exist nor will salvation be desired.\n\nMen will not worry about death or a future, about the kingdom of heaven, about what may come with and after the cessation of the life of the present body.\n\nEach soul will feel and know itself to be immortal, will feel and know that the entire universe with all its good and with all its beauty is for it and belongs to it forever.\n\nThe world peopled by men possessing cosmic consciousness will be as far removed from the world p.\n\n314 of today as this is from the world as it was before the advent of self-consciousness.\n\nIII There is a tradition, probably very old, to the effect that the first man was innocent and happy until he ate of the fruit of the tree of the knowledge of good and evil.\n\nThat having eaten thereof he became aware that he was naked and was ashamed.\n\nFurther, that there sin was born into the world, the miserable sense whereof replaced man's former feeling of innocency; that then and not till then man began to labor and to cover his body.\n\nStranger than all, the story runs, that along with this change or immediately following upon it there came into man's mind the remarkable conviction which has never since left it, but which has been kept alive by its own inherent vitality and by the teaching of all true seers, prophets and poets that man will be saved by the rising up within him of a Savior—the Christ.\n\nMan's progenitor was a creature with simple consciousness merely.\n\nHe was (as are today the animals) incapable of sin and equally incapable of shame (at least in the human sense).\n\nHe had no feeling or knowledge of good and evil.\n\nHe as yet knew nothing of what we call work and had never labored.\n\nFrom this state he fell (or rose) into self-consciousness, his eyes were opened, he knew he was naked, he felt shame, acquired the sense of sin (became in fact what is called a sinner) and learned to do certain things in order to encompass certain ends—that is, he learned to labor.\n\nFor weary aeons this condition has lasted—the sense of sin still haunts his pathway—by the sweat of his brow he still eats bread—he is still ashamed.\n\nWhere is the deliverer, the Savior?\n\nWho or what?\n\nThe Savior of man is Cosmic Consciousness—in Paul's language, the Christ.\n\nThe cosmic sense (in whatever mind it appears) crushes the serpent's head—destroys sin, shame, the sense of good and evil, as contrasted one with the other, and will annihilate labor, though not human activity.\n\nIV A personal exposition of the writer's own experience of cosmic consciousness may help the reader to understand the meaning of the following facts: In childhood he was subject at times to a sort of ecstasy of curiosity and hope.\n\nAs on one special occasion when about ten years old he earnestly longed to die that the secrets of the beyond, if there were any beyond, might be revealed to him.\n\n.\n\n.\n\n.\n\nAt the age of thirty he fell in with \"Leaves of Grass,\" and at once saw that it contained, in greater measure than any book so far found, what he had so long been looking for.\n\nHe read the \"Leaves\" eagerly, even passionately, but for several years derived little from them.\n\nAt last light broke and there was revealed to him (as far perhaps as such things can be revealed) p.\n\n315 at least some of the meanings.\n\nThen occurred that to which the foregoing is the preface."

