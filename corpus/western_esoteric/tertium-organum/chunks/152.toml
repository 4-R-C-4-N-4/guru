[content]
body = "We all know this, and the only thing we can do is to try not to think about the existence of these problems, to forget about them.\n\nWe do so as a rule, but this does not annihilate them.\n\nThey continue to exist, and at any given moment we may turn to them and try on them the rigidity and force of our scientific method .\n\nAnd every time, at such an attempt, we find that our scientific method is not equal to these problems.\n\nBy its aid we can discover the chemical composition of remote stars; can photograph the skeleton within the human body, invisible to the human eye; can invent a floating mine which can be controlled from a distance by means of electrical waves, and can in this way annihilate in a moment hundreds of lives; but by the aid of this method we cannot tell what the man standing beside us is thinking about.\n\nNo matter how much we may weigh, sound or photograph a man, we shall never know his thoughts unless he himself tells them to us .\n\nBUT THIS IS TRULY QUITE A DIFFERENT METHOD.\n\nThe sphere of action of the method of exact science is strictly p.\n\n236 limited.\n\nThis sphere is the world of the immediate experience accessible for man.\n\nIn the world lying beyond the domain of usual experience exact science with its methods has never penetrated and will never penetrate .\n\nThe expansion of objective knowledge is possible only in case direct experience is expanded.\n\nBut in spite of all the growth of objective knowledge science has made not one step in this direction and the border-line of experience remains in the same place .\n\nCould science take a single step in this direction, were we able to feel or sense differently, then we might admit that science might move and take two, three, ten, and ten thousand steps.\n\nBut it has taken not even one , and it is therefore reasonable to believe that it will never take it.\n\nThe world outside the experience of the five senses is closed to objective investigation, and for this quite definite causes exist.\n\nBy no means everything that exists can be detected by any of five senses.\n\nObjective existence is a very narrowly defined form of existence, and does not by any means exhaust or comprehend existence as a whole.\n\nThe mistake of positivism consists in the fact that it has recognized as really existing only that which exists objectively, and it has even begun to deny the very existence of all the rest.\n\nBut what is objectivity?\n\nWe can define it in this way: because of the properties of our receptivity, or because of the conditions under which our psyche works, we segregate a small number of facts into a definite group.\n\nThis group of facts represents in itself the objective world, and is accessible to the investigation of science.\n\nBut in no case does this group represent in itself EVERYTHING THAT IS EXISTING.\n\nExtension in space and existence in time constitute the first condition of objective existence.\n\nAnd yet the forms of the extension of a thing in space, and those of its existence in time are created by the cognizing subject, and do not belong to the thing itself.\n\nMatter is first of all three-dimensional .\n\nThis three-dimensionality is the form of our receptivity.\n\nMatter of four dimensions would imply a change in the form of our receptivity.\n\nMateriality is the condition of existence in space and time, i.e., a condition of existence under which \"at one time, and in one place, two similar phenomena cannot occur.\" This is an exhaustive definition p.\n\n237 of materiality.\n\nIt is clear that under the conditions known to us, two similar phenomena, occurring simultaneously in one place, will compose one phenomenon.\n\nBut this is obligatory for those conditions of existence which we know, i.e., for such matter as we perceive.\n\nFor the universe it is absolutely not obligatory."

