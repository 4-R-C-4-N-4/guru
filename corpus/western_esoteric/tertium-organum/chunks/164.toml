[content]
body = "Science cannot deny the fact that mathematics grows, expands, and escapes from the limits of the visible and measurable world.\n\nEntire departments of mathematics take into consideration quantitative relations which did not and do not exist in the real world of p.\n\n256 positivism, i.e., relations which have no correspondence to any realities in the visible, three-dimensional world.\n\nBut there cannot be any mathematical relations to which the relation of some realities would not correspond.\n\nTherefore mathematics transcends the limits of our world, and penetrates into a world unknown.\n\nThis is the telescope , by the aid of which we begin to investigate the space of many dimensions with its worlds.\n\nMathematics goes ahead of our thought, ahead of our power of imagination and perception.\n\nEven now it is engaged in calculating relations which we cannot imagine or comprehend.\n\nIt is impossible to deny all this, even from the strictly \"positivistic,\" i.e., positive standpoint.\n\nThus science, having admitted the possibility of the expansion of mathematics beyond the limits of the sensuously perceived world—that is beyond the limits of a world accessible (though theoretically) to the organs of sense and their mechanical aids—must thereby recognize the expansion of the real world far beyond the limits of any \"infinite sphere\" or of our logic, i.e., must recognize the reality of \"the world of many dimensions.\" The recognition of the reality of the world of many dimensions is the already accomplished transition to, and understanding of, the world of the wondrous.\n\nAnd this transition to the wondrous is impossible without the recognition of the reality of new logical relations which are absurd and impossible from the standpoint of our logic.\n\nWhat are the laws of our logic?\n\nThey are the laws of our receptivity of the three-dimensional world , or the laws of our three-dimensional receptivity of the world .\n\nIf we desire to escape from the three-dimensional world and go farther, we must first of all work out the fundamental logical principles which would permit us to observe the relations of things in a world of many dimensions—seeing in them a certain reasonableness, and not complete absurdity.\n\nIf we enter there armed only with the principles of the logic of the three-dimensional world, these principles will drag us back, will not give us a chance to rise from the earth.\n\nFirst of all we must throw off the chains of our logic.\n\nThis is the first, the great, the chief liberation toward which humanity p.\n\n257 must strive.\n\nMan, throwing off the chains of \"three-dimensional\" logic, has already penetrated, in thought, into another world.\n\nAnd not only is this transition possible, but it is accomplished constantly.\n\nAlthough unhappily we are not entirely conscious of our rights in \"another world,\" and often sacrifice these rights, regarding ourselves as limited to this earthly world, paths nevertheless exist.\n\nPoetry, mysticism, the idealistic philosophy of all ages and peoples, preserve the traces of such transitions.\n\nFollowing these traces, we ourselves can find the path.\n\nAncient and modern thinkers have given us many keys with which we may open mysterious doors; many magical formulæ, before which these doors open of themselves.\n\nBut we have not understood either the purpose of these keys or the meaning of the formulæ.\n\nWe have also lost the understanding of magical ceremonies and rites of initiation into mysteries which had a single purpose: to help this transformation in the soul of man.\n\nTherefore the doors remained closed, and we even denied that there was anything whatever behind them; or, suspecting the existence of another world, we regarded it as similar to ours, and separate from ours, and tried to penetrate there unconscious of the fact that the chief obstacle in our path was our own division of the world into this world and that .\n\nThe world is one , only the ways of knowing it are different; and with imperfect methods of knowledge it is impossible to penetrate into that which is accessible to perfect methods only."

