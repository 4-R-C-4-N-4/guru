body = "p.\n\n213 CHAPTER XVIII Rationality and life.\n\nLife as knowledge.\n\nIntellect and emotions.\n\nEmotion as an organ of knowledge.\n\nThe evolution of emotion from the standpoint of knowledge.\n\nPure and impure emotions.\n\nPersonal and impersonal emotions.\n\nPersonal and super-personal emotions.\n\nThe elimination of self-elements as a means of approach to true knowledge.\n\n\"Be as little children.\n\n.\n\n.\n\n.\" \"Blessed are the pure in heart.\n\n.\n\n.\n\n.\" The value of morals from the standpoint of knowledge.\n\nThe defects of intellectualism.\n\nDreadnaughts as the crown of intellectual culture.\n\nThe dangers of morality.\n\nMoral esthetics.\n\nReligion and art as organized forms of emotional knowledge.\n\nThe knowledge of God and the knowledge of Beauty .\n\nTHE MEANING OF LIFE—this is the eternal theme of human meditation.\n\nAll philosophical systems, all religious teachings strive to find and give to men the answer to this question.\n\nSome say that the meaning of life is in service, in the surrender of self, in self-sacrifice, in the sacrifice of everything, even life itself .\n\nOthers declare that the meaning of life is in the delight of it, relieved against \"the expectation of the final horror of death.\" Some say that the meaning of life is perfection, and the creation of a better future beyond the grave , or in future lives for ourselves.\n\nOthers say that the meaning of life is in the approach to non-existence : still others, that the meaning of life is in the perfection of the race, in the organization of life on earth; while there are those who deny the possibility of even attempting to know its meaning.\n\nThe fault of all these explanations consists in the fact that they all attempt to discover the meaning of life outside of itself , either in the future of humanity, or in some problematical existence beyond the grave, or again in the evolution of the Ego throughout many successive incarnations—always in something outside of the present life of man.\n\nBut if instead of thus speculating about it, men would simply look within themselves, then they would see that in reality the meaning of life is not after all so obscure.\n\nIT CONSISTS IN KNOWLEDGE.\n\nAll life, through all its facts, events and incidents, excitements and attractions, inevitably leads us TO THE p.\n\n214 [paragraph continues] KNOWLEDGE OF SOMETHING.\n\nAll life-experience is KNOWLEDGE.\n\nThe most powerful emotion in man is his yearning toward the unknown.\n\nEVEN IN LOVE, the most powerful of all attractions, to which everything is sacrificed, is this yearning toward the unknown, toward the NEW— curiosity .\n\nThe Persian poet-philosopher, Al-Ghazzali, says: \" The highest function of man's soul is the perception of truth .\" 1 In the very beginning of this book PSYCHIC LIFE and THE WORLD were recognized as existing.\n\nThe world is everything that exists.\n\nThe function of psychic life may be defined as the realization of existence .\n\nMan realizes his existence and the existence of the world, a part of which he is.\n\nHis relation to himself and to the world is called knowledge.\n\nThe expansion and deepening of his relation to himself and to the world is the expansion of knowledge.\n\nAll the soul-properties of man, all the elements of his psyche—sensations, perceptions, conceptions, ideas, judgments, reasonings, feelings, emotions, even creation—all these are the INSTRUMENTS OF KNOWLEDGE which the I possesses.\n\nFeelings—from the simple emotions up to the most complex, such as esthetic, religious and moral emotion—and creation, from the creation of a savage making a stone hatchet for himself up to the creation of a Beethoven, indeed are means of knowledge .\n\nOnly to our narrow HUMAN view do they appear to serve other purposes—the preservation of life, the construction of something, or merely pleasure.\n\nIn reality all this conduces to knowledge.."

