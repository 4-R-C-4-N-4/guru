[content]
body = "But even art chiefly confines itself merely to descriptions and to the psychological analysis of love, seldom touching those infinite and eternal depths which love contains for man.\n\nIn reality love is a cosmic phenomenon , in which men, humanity, are merely accidents: a cosmic phenomenon which has nothing to do with either the lives or the souls of men, any more than because p.\n\n168 the sun is shining, by its light men may go about their little affairs, and may utilize it for their own purposes.\n\nIf men would only understand this, even with a part of their consciousness, a new world would open, and to look on life from all our usual angles would become very strange.\n\nFor then they would understand that love is something else, and of quite a different order from the petty phenomena of earthly life.\n\nPerhaps love is a world of strange spirits who at times take up their abode in men, subduing them to themselves, making them tools for the accomplishment of their inscrutable purposes.\n\nPerhaps it is some particular region of the inner world wherein the souls of men sometimes enter, and where they live according to the laws of that world, while their bodies remain on earth, bound by the laws of earth.\n\nPerhaps it is an alchemical work of some Great Master wherein the souls and bodies of men play the rôle of elements out of which is compounded a philosopher's stone, or an elixir of life , or some mysterious magnetic force necessary to someone for some incomprehensible purpose.\n\nLove in relation to our life is a deity, sometimes terrible, sometimes benevolent, but never subservient to us, never consenting to serve our purposes.\n\nMen strive to subordinate love to themselves, to warp it to the uses of their every-day mode of life, and to their souls' uses; but it is impossible to subordinate love to anything, and it mercilessly revenges itself upon those little mortals who would subordinate God to themselves and make Him serve them.\n\nIt confuses all their calculations, and forces them to do things which confound themselves, forcing them to serve itself , to do what it wants.\n\nMistaken about the origin of love, men are mistaken about its result .\n\nPositivistic and spiritistic morality equally recognize in love only one possible result—children, the propagation of the species.\n\nBut this objective result, which may or may not be, is in any case an effect of the outer, objective side of love, of the material fact of impregnation.\n\nIf it is possible to see in love nothing more than this material fact and the desire for it, so be it; but in reality love consists not at all in a material fact, and the results of it—except material ones—may manifest themselves on quite another plane.\n\nThis other plane, upon which love acts, and the p.\n\n169 ignored, hidden results of love, are not difficult to understand, even from the strictly positivistic, scientific standpoint.\n\nTo science, which studies life from this side, the purpose of love is the continuation of life.\n\nMore exactly, love is a link in the chain of facts supporting the continuation of life.\n\nThe force which attracts the two sexes to each other is acting in the interests of the continuation of the species, and is accordingly created by the forms of the continuation of the species.\n\nBut if we regard love in this way, then it is impossible not to recognize that there is much more of this force than is necessary .\n\nHerein lies the key to the correct understanding of the true nature of love.\n\nThere is more of this force than is necessary, infinitely more.\n\nIn reality only an infinitesimal part of love's force incarnate in humanity is utilized for the purpose of the continuation of the species.\n\nBut where does the major part of that force go?\n\nWe know that nothing can be lost.\n\nIf energy exists, then it must transform itself into something."

