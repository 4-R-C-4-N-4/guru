[content]
body = "As has been said, the two-dimensional being will regard the straight lines only as immobile matter; irregular lines and curves will seem to him as moving.\n\nSo far as really moving lines are concerned, that is, lines limiting the cross-sections or planes of contact passing through or moving along the plane, these will be for p.\n\n64 the two-dimensional being something inconceivable and incommensurable .\n\nIt will be as though there were in them the presence of something independent, depending upon itself only, animated .\n\nThis effect will proceed from two causes: He can measure the immobile angles and curves, the properties of which the two-dimensional being calls motion, for the reason that they are immobile; moving figures, on the contrary, he cannot measure, because the changes in them will be out of his control.\n\nThese changes will depend upon the properties of the whole body and its motion, and of that whole body the two-dimensional being will know only one side or section.\n\nNot perceiving the existence of this body, and contemplating the motion pertaining to the sides and sections he probably will regard them as living beings .\n\nHe will affirm that there is something in them which differentiates them from other bodies: vital energy, or even soul.\n\nThat something will be regarded as inconceivable, and really will be inconceivable to the two-dimensional being, because to him it is the result of an incomprehensible motion of inconceivable solids.\n\nIf we imagine an immobile circle upon the plane, then for the two-dimensional being it will appear as a moving line with some very strange and to him inconceivable motions.\n\nThe two-dimensional being will never see that motion.\n\nPerhaps he will call such motion molecular motion , i.e., the movement of minutest invisible particles of \"matter.\" Moreover, a circle rotating around an axis passing through its center, for the two-dimensional being will differ in some inconceivable way from the immobile circle.\n\nBoth will appear to be moving, but moving differently .\n\nFor the two-dimensional being a circle or a square, rotating around its centre, on, account of its double motion will be an inexplicable and incommensurable phenomenon, like a phenomenon of life for a modern physicist.\n\nTherefore, for a two-dimensional being, a straight line will be immobile matter; a broken or a curved line—matter in motion; and a moving line— living matter.\n\nThe centre of a circle or a square will be inaccessible to the plane being, just as the centre of a sphere or of a cube made of solid matter is inaccessible to us—and for the two-dimensional being even p.\n\n65 the idea of a centre will be incomprehensible, since he possesses no idea of a centre.\n\nHaving no idea of phenomena proceeding outside of the plane—that is, out of his \"space\"—the plane being will think of all phenomena as proceeding on his plane as has been stated.\n\nAnd all phenomena which he regards as proceeding on his plane, he will consider as being in causal interdependence one with another : that is, he will think that one phenomenon is the effect of another which has happened right there , and the cause of a third which will happen right on the same plane.\n\nIf a multi-colored cube passes through the plane, the plane being will perceive the entire cube and its motion as a change in color of lines lying in the plane.\n\nThus, if a blue line replaces a red one, then the plane being will regard the red line as a past event .\n\nHe will not be in a position to realize the idea that the red line is still existing somewhere.\n\nHe will say that the line is single, but that it becomes blue as a consequence of certain causes of a physical character.\n\nIf the cube moves backward so that the red line appears again after the blue one, then for the two-dimensional being this will constitute a new phenomenon .\n\nHe will say that the line became red again."

