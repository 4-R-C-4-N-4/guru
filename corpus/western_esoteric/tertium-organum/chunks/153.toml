[content]
body = "We constantly observe the conditions of materiality in those cases in which we must create in our life a sequence of phenomena or are obliged to select , because our matter does not permit us to juxtapose in a definite interval of time more than a certain number of phenomena.\n\nThe necessity for selection is perhaps the chief visible sign of materiality.\n\nOutside of matter, the necessity for.\n\nselection is done away with, and if we imagine the life of a feeling being, independent of the conditions of materiality, such a being will be capable of possessing simultaneously such faculties as from our standpoint are incompatible, opposite, and eliminative of one another: the power of being in several places at the same time; to command different views; to perform opposite and mutually exclusive actions simultaneously.\n\nIn speaking of matter it is necessary always to remember that matter is not a substance, but a condition.\n\nSuppose for example, that a man is blind.\n\nIt is impossible to regard this blindness as a substance; it is a condition of the existence of a given man.\n\nMatter is some sort of blindness.\n\nObjective knowledge can grow infinitely, its progress depending on the perfection of its instruments and the refinement of its methods of observation and experiment.\n\nOne thing only it cannot transcend—the limits of the three-dimensional sphere, i.e., the conditions of space and time, for the reason that objective knowledge is created under these conditions, and the conditions of the existence of the three-dimensional world are the conditions of its existence.\n\nObjective knowledge will always be subject to these conditions, for otherwise it would cease to exist.\n\nNo apparatus, no instrument, will ever conquer these conditions, for should they conquer they would destroy themselves first of all.\n\nPerpetual motion , i.e., the violation of the fundamental laws of the three-dimensional world as we know it, would be the only victory over the three-dimensional world in the three-dimensional world itself .\n\nBut it is necessary to remember that objective knowledge does not study facts, but only the perception of facts .\n\np.\n\n238 IN ORDER THAT OBJECTIVE KNOWLEDGE SHALL TRANSCEND THE LIMITS OF THE THREE-DIMENSIONAL SPHERE, IT IS NECESSARY THAT THE CONDITIONS OF PERCEPTION SHALL CHANGE.\n\nAs long as this does not happen, our objective knowledge is confined within the limits of an infinite three-dimensional sphere .\n\nIt can proceed infinitely upon the radii of that sphere, but it will never penetrate into that region a section of which constitutes our three-dimensional world.\n\nMoreover we know, from the preceding, that should our receptivity become more limited, then objective knowledge would be correspondingly limited also.\n\nIt is impossible to convey to a dog the idea of the sphericality of the earth; to make it remember the weight of the sun and the distances between the planets is equally impossible.\n\nIts objective knowledge is vastly more personal than ours; and the cause of it lies in the dog's more limited psyche.\n\nThus we see that objective knowledge depends upon the properties of the psyche.\n\nIndeed, between the objective knowledge of a savage and that of Herbert Spencer there is an enormous difference; but that of neither the one nor the other transcends the limit of the three-dimensional sphere, i.e., the limits of the \"conditional,\" the unreal.\n\nIn order to transcend the three-dimensional sphere it is necessary to expand or change the forms of receptivity.\n\nIs the expansion of the limits of receptivity possible?\n\nThe study of complex forms of consciousness assures us that it is possible.\n\nPlotinus, the famous Alexandrian philosopher (third century) affirmed that for perfect knowledge the subject and object must be united that the rational agent and the thing being comprehended must not be separate.\n\nFor that which sees is itself the thing, which IS SEEN.\n\n[ Select Works of Plotinus .\n\nBohn's Library, p.\n\n271.] Here it is indeed necessary to understand, \"to see\" other than in a literal sense."

