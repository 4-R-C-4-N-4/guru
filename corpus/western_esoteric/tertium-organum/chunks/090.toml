body = "p.\n\n136 CHAPTER XII Analysis of phenomena.\n\nWhat defines different orders of phenomena for us?\n\nMethods and forms of the transition of one order of phenomena into another.\n\nPhenomena of motion.\n\nPhenomena of life, Phenomena of consciousness.\n\nThe central question of our knowledge of the world: what mode of phenomena is generic and produces the others?\n\nCan the origin of everything lie in motion?\n\nThe laws of transformation of energy.\n\nSimple transformation and liberation of latent energy.\n\nDifferent liberating forces of different orders of phenomena.\n\nThe force of mechanical energy, the force of a living cell, the force of an idea.\n\nPhenomena and noumena of our world.\n\nTHE order of phenomena is defined for us, first, by the method of apprehending them, and second, by the form of the transition of one order of phenomena into another.\n\nAccording to our method of apprehending them and by the form of their transition into one another we discern three orders of phenomena: Physical phenomena (i.e., all phenomena studied by physics and chemistry); phenomena of life (all phenomena studied by biology and its subdivisions); psychic phenomena (thoughts, feelings, sensations, etc.).\n\nWe know physical phenomena by means of our sense organs or by the aid of apparatus.\n\nMany recognized physical phenomena are not observed directly; they are merely projections of the assumed causes of our sensations, or those of the causes of other phenomena.\n\nPhysics recognizes the existence of many phenomena which have never been observed by the sense organs or by means of apparatus (the temperature of absolute zero etc., for example).\n\nThe phenomena of life, as such, are not observed directly.\n\nWe cannot project them as the cause of definite sensations.\n\nBut certain groups of sensations force us to assume in certain groups of physical phenomena the presence of the phenomena of life.\n\nIt may be said that a certain grouping of physical phenomena forces us to assume the presence of the phenomena of life.\n\nWe define the cause of the phenomena of life as a something not capable of being p.\n\n137 grasped by the senses or by apparatus, and incommensurable with the causes of physical sensations.\n\nA sign of the presence of the phenomena of life consists in the power of organisms to reproduce themselves, i.e., the multiplication of them in the same forms, the indivisibility of separate units and their especial adaptability, which is not observed outside of life.\n\nPsychic phenomena are the feelings and the thoughts that we know in ourselves by direct sensation.\n\nWe assume their existence in others (1) from analogy with ourselves; (2) from their manifestation in actions and (3) from that which we gather by the aid of speech.\n\nBut, as has been shown by certain philosophical theories, it is impossible to establish strictly objectively, the presence of consciousness other than our own.\n\nA man establishes this usually because of his inner assurance of its truth.\n\nPhysical phenomena transform themselves into one another completely.\n\nIt is possible to transform heat into light, pressure into motion, etc.\n\nIt is possible to produce any physical phenomenon from other physical phenomena; to produce any chemical combination by the synthetic method, combining the composite parts in proper proportions and under proper physical conditions.\n\nModern physics assumes electro-magnetic phenomena as the basis of all physical phenomena.\n\nBut physical phenomena do not transform themselves into the phenomena of life .\n\nBy no combination of physical conditions can science create life, just as by chemical synthesis it cannot create living matter—protoplasm.\n\nWe can tell what amount of coal is necessary to generate the certain amount of heat necessary to transform a given quantity of ice into water; but we cannot tell what amount of coal is necessary to create the vital energy with which one living cell forms another living cell.\n\nIn similar manner physical, chemical and mechanical phenomena cannot themselves produce the phenomena of consciousness, i.e., of thought.\n\nWere it otherwise, a rotating wheel , after the expenditure of a certain amount of energy, or after the lapse of a certain time, could generate an idea ."

