body = "p.\n\nvii CONTENTS AUTHOR'S PREFACE TO THE SECOND EDITION xiii INTRODUCTION TO THE ENGLISH TRANSLATION 1 CHAPTER I What do we know and what do we not know?\n\nOur data, and the things for which we seek.\n\nThe unknown mistaken for the known.\n\nMatter and motion.\n\nWhat does the positive philosophy come to?\n\nIdentity of the unknown: x=y, y=x.\n\nWhat we really know.\n\nThe existence of consciousness in us, and of the world outside of us.\n\nDualism or monism.?\n\nSubjective and objective knowledge.\n\nWhere do the causes of the sensations lie?\n\nKant's system.\n\nTime and Space.\n\nKant and the \"ether.\" Mach's observation.\n\nWith what does the physicist really deal?\n\n11 CHAPTER II A new view of the Kantian problem.\n\nThe books of Hinton.\n\nThe \"space-sense\" and its evolution.\n\nA system for the development of a sense of the fourth dimension by exercises with colored cubes.\n\nThe geometrical conception of space.\n\nThree perpendiculars—why three?\n\nCan everything existing be measured by three perpendiculars?\n\nThe indices of existence.\n\nReality of ideas.\n\nInsufficient evidence of the existence of matter and motion.\n\nMatter and motion are only logical concepts, like \"good\" and \"evil.\" 23 CHAPTER III What may we learn about the fourth dimension by a study of the geometrical relations within our space?\n\nWhat should be the relation between a three-dimensional body and one of four dimensions?\n\nThe four-dimensional body as the tracing of the movement of a three-dimensional body in the direction which is not confined within it.\n\nA four-dimensional body as containing an infinite number of three-dimensional bodies.\n\nA three dimensional body as a section of a four-dimensional one.\n\nParts of bodies and entire bodies in three and in four dimensions.\n\nThe incommensurability of a three-dimensional and a four-dimensional body.\n\nA material atom as a section of a four-dimensional line.\n\n34 CHAPTER IV In what direction may the fourth dimension lie?\n\nWhat is motion?\n\nTwo kinds of motion—motion in space and motion in time—which are contained in every movement.\n\nWhat is time?\n\nTwo ideas contained in the conception of time.\n\nThe new dimension of space, and motion upon that dimension.\n\nTime as the fourth dimension of space.\n\nImpossibility of understanding the fourth dimension without the idea of motion.\n\nThe idea of motion and the \"time-sense.\" The time sense as a limit (surface) of the \"space-sense.\" Hinton on the law of surfaces.\n\np.\n\nviii The \"ether\" as a surface.\n\nRiemann's idea concerning the translation of time into space in the fourth dimension.\n\nPresent, past, and future.\n\nWhy do we not see the past and the future.\n\nLife as a feeling of one's way .\n\nWundt on the subject of our sensuous knowledge.\n\n33 CHAPTER V Four-dimensional space.\n\n\"Temporal body\"— Linga Sharîra .\n\nThe form of a human body from birth to death.\n\nIncommensurability of three-dimensional and four-dimensional bodies.\n\nNewton's fluents.\n\nThe unreality of constant quantities in our world.\n\nThe right and left hands in three-dimensional and in four dimensional space.\n\nDifference between three-dimensional and four-dimensional space.\n\nNot two different spaces but different methods of receptivity of one and the same world 52 CHAPTER VI Methods of investigation of the problem of higher dimensions.\n\nThe analogy between imaginary worlds of different dimensions.\n\nThe one-dimensional world on a line.\n\n\"Space\" and \"time\" of a one-dimensional being.\n\nThe two-dimensional world on a plane.\n\n\"Space\" and \"time,\" \"ether,\" \"matter,\" and \"motion\" of a two-dimensional being.\n\nReality and illusion on a plane.\n\nThe impossibility of seeing an \"angle.\" An angle as motion.\n\nThe incomprehensibility to a two-dimensional being of the functions of things in our world."

