[content]
body = "The mind becomes overcrowded (as it were) with concepts and these are constantly becoming larger, more numerous and more and more complex; some day (the conditions being all favorable) the fusion, or what might be called the chemical union, of several of them and of certain moral elements takes place; the result is an intuition and the establishment of the intuitional mind, or, in other words, cosmic consciousness.\n\n1 The scheme by which the mind is built up is uniform from beginning to p.\n\n319 end: a recept is made of many percepts; a concept of many or several recepts and percepts, and an intuition is made of many concepts, recepts and percepts together with other elements belonging to and drawn from the moral nature.\n\nThe cosmic vision or the cosmic intuition, from which what may be called the new mind takes its name, is thus seen to be simply the complex and union of all prior thought and experience—just as self-consciousness is the complex and union of all thought and experience prior to it.\n\n______ Cosmic consciousness, like other forms of consciousness, is capable of growth, it may have different forms, different degrees.\n\nIt must not be supposed that because a man has cosmic consciousness he is therefore omniscient or infallible.\n\nMen of cosmic consciousness have reached a higher level; but on that level there can be different degrees of consciousness.\n\nAnd it must be still more evident that, however godlike the faculty may be, those who first acquire it, living in diverse ages and countries, passing their life in different surroundings, brought up to view life from totally different points of view, must necessarily interpret somewhat differently those things which they see in the new world which they enter.\n\n______ Language corresponds to the intellect and is therefore capable of expressing it perfectly and directly; on the other hand, the functions of the moral nature are not connected with language and are only capable of indirect and imperfect expression by its agency.\n\nPerhaps music, which certainly has its roots in the moral nature, is, as at present existing, the beginning of a language which will tally and express emotions as words tally and express ideas.\n\n.\n\n.\n\n.\n\nLanguage is the exact tally of the intellect; for every concept there is a word or words and for every word there is a concept.\n\n.\n\n.\n\n.\n\nNo word can come into being except as the expression of a concept, neither can a new concept be formed without the formation (at the same time) of the new word which is its expression.\n\nBut as a matter of fact ninety-nine out of every hundred of our sense impressions and emotions have never been represented in the intellect by concepts and therefore remain unexpressed and inexpressible except by roundabout description and suggestion.\n\nAs the correspondence of words and concepts is not casual or temporary but resides in the nature of these and continues during all time and under all circumstances absolutely constant, so changes in one of the factors must correspond with changes in the other.\n\nSo evolution of intellect must be accompanied by evolution of language.\n\nAn evolution of language will be evidence of evolution of intellect.\n\n______ p.\n\n320 It seems that in every, or nearly every man who enters into cosmic consciousness apprehension is at first more or less excited, the person doubting whether the new sense may not be a symptom or form of insanity.\n\nMohammed was greatly alarmed.\n\nThe Apostle Paul was alarmed in the same manner.\n\nThe first thing each person asks himself upon experiencing the new sense is: Does what I see and feel represent reality or am I suffering from a delusion?\n\nThe fact that the new experience seems even more real than the old teachings of consciousness does not at first fully reassure him, because he knows the force of delusions.\n\nSimultaneously or instantly following the above sense and emotional experiences there comes to the person an intellectual illumination quite impossible to describe.\n\nLike a flash there is presented to his consciousness a clear conception (a vision) in outline of the meaning and drift of the universe."

