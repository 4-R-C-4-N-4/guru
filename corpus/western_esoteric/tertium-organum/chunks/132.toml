[content]
body = "\"In saying \"I,\" a man means, of course, not the total complex of all these regions, but that which in a given moment is in the focus of his consciousness.\n\n\" I wish \" (or more correctly, simply \"wish,\" because man very seldom says I wish): these words (or this word), playing the most important rôle in the life of man, usually refer not at all to every side of his being simultaneously, but merely to some small and insignificant facet, which at a given moment holds the focus of consciousness and subjects to itself all the rest, until it in turn is forced out by another equally insignificant facet.\n\nIn the psyche of man there occurs a continual shifting of view from one subject to another.\n\nThrough the focus of receptivity runs a continuous cinematographical film of feelings and impressions, and each separate impression defines the I of a given moment.\n\nFrom this point of view the psyche of man has often been compared to a dark, sleeping town in the midst of which night-guards with lanterns slowly move about, each lighting up a little circle around himself.\n\nThis is a perfectly true analogy.\n\nIn each given moment there are several such unsteadily lighted circles in the focus, and all the rest is enveloped in darkness.\n\nEach such little lighted circle represents an I, living its own life, p.\n\n205 sometimes very short.\n\nAnd there is continuous movement, either fast or slow, moving out into the light more of new and still new objects, or else old ones from the region of memory, or tormentingly revolving in a circle of the same fixed ideas.\n\nThis continuous motion going on in our psyche, this uninterrupted running over of the light from one I to another, perhaps explains the phenomenon of motion in the outer visible world.\n\nWe know already by our intellect , that there is no such motion.\n\nWe know that everything exists in infinite spaces of time, nothing is made, nothing becomes, all is .\n\nBut we do not see everything at once, and therefore it seems to us that everything moves, grows, is becoming.\n\nWe do not see everything at once, either in the outer world, or in the inner world; thence arises the illusion of motion.\n\nFor example, as we ride past a house the house turns behind us; but if we could see it, not with our eyes, not in perspective, but by some sort of vision, simultaneously from all sides, from below and from above and from the inside, we should no longer see that illusory motion, but would see the house entirely immobile, just as it is in reality.\n\nMentally, we know that the house did not move.\n\nIt is just the same with everything else.\n\nThe motion, growth, \"becoming,\" which is going on all around us in the world is no more real than the motion of a house which we are riding by, or the motion of trees and fields relative to the windows of a rapidly moving railway car.\n\nMotion goes on inside of us, and it creates the illusion of motion round about us.\n\nThe lighted circle runs quickly from one I to another—from one object, from one idea, from one perception or image to another: within the focus of consciousness rapidly changing I's succeed one another, a little of the light of consciousness going over from one I to another.\n\nThis is the true motion which alone exists in the world.\n\nShould this motion stop, should all I's simultaneously enter the focus of receptivity, should the light so expand as to illumine all at once that which is usually lighted bit by bit and gradually, and could a man grasp simultaneously by his reason all that ever entered or will enter his receptivity and all that which is never clearly illumined by thought (producing its action on the psyche nevertheless)—then would a man behold himself in the midst of an immobile universe , in which there would exist simultaneously p."

