[content]
body = "The bankruptcy of materialism, i.e., \"logical\" systems, when it comes to organizing life on earth is now evident in the bloody epoch which we are undergoing, even to those men who but yesterday were prating of \"culture\" and \"civilization.\" It became clearer and clearer that the changes in the outer life of the majority, when these changes come, will do so as a result of inner changes in a few.\n\nWe may say further with regard to Dr.\n\nBucke's entire book, that touching the idea of the natural growth of consciousness, he does not notice that these faculties do not unfold themselves perforce: conscious work on them is necessary.\n\nAnd he does not dwell at all on conscious efforts in this direction, on the idea of the culture of cosmic consciousness.\n\nMeanwhile there exists a whole series of psychological teachings (occultism, yoga, etc.) and a large literature having in view a systematic culture of the higher consciousness.\n\nDr.\n\nBucke does not remark this, and insists upon the idea of natural growth, although he himself several times touches upon the culture of consciousness.\n\nIn one portion of his book he speaks very contemptuously regarding the use of narcotics for the creation of ecstatic states, not taking into consideration the fact that narcotics cannot give anything which man does not possess (this is the explanation of the different action of narcotics on different men), but can only in certain cases unfold that which is already in the soul of man.\n\nThis entirely alters the point of view upon narcotics, as Prof.\n\nWilliam James has shown in his book, The Varieties of Religious Experience .\n\np.\n\n326 In general, allured by the evolutionary point of view, and looking at the future , Dr.\n\nBucke, like many others, does not pay sufficient attention to the present .\n\nThat new consciousness which men may discover or unfold in themselves now is indeed far more important than that which may or may not appear in other men millenniums hence.\n\n______ Regarding from different standpoints the complex forms of the manifestation of spirit, and analyzing the views and opinions of various authors, we are always confronted with what seem to be consecutive phases or consecutive stages of this unfoldment.\n\nAnd we find such phases or stages to be four in number.\n\nFurther consideration of the living world known to us, from the lower animal organisms up to the highly developed body of man, reveals the simultaneous existence of all four forms of consciousness to which all other aspects of the inner life correspond: the sense of space and time, the form of activity, etc.\n\nStill further consideration of man of the higher type reveals the presence of all the four forms of consciousness which are in living nature, with forms corresponding to them.\n\n(See table, p.\n\n327 .) The simultaneous coexistence of all four forms of consciousness at once, both in nature and in the higher type of man makes the exclusively evolutionary standpoint seem forced and artificial.\n\nThe evolutionary standpoint is often made the means of escape from difficult problems, and from hard thinking.\n\nSome people apply the evolutionary theory where there is no necessity for it whatever.\n\nIn many cases this is a compromise of thought.\n\nNot understanding the existing variety of forms, and not possessing the skill to think of all this as a unity , men have recourse to the evolutionary idea, and regard this great variety of forms as an ascending ladder—not because this conforms to facts, but from a desire to systematize the observed facts at all costs, though on entirely artificial foundations.\n\nIt appears to men that having built a system they already know something, whereas in reality the absence of a system is often much nearer to real knowledge than an artificial system.\n\np.\n\n327 FORMS OF CONSCIOUSNESS LIVING WORLD MAN OF HIGHER TYPE Latent Consciousness, similar to our instincts and subconscious feelings.\n\nCells, groups of cells, plants, lower animals, and organs and parts of body of higher animals and of man.\n\nCells, groups of cells, tissues and organs of the body."

