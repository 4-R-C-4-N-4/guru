[content]
body = "Yet we know perfectly well that the wheel can go on rotating for millions of years, and no single idea will be produced by it at all.\n\nThus we see that the phenomena of motion differ in a fundamental way from the phenomena of life and of consciousness.\n\nThe phenomena of life change into other phenomena of life, multiply infinitely, and transform themselves into physical phenomena , p.\n\n138 generating whole series of mechanical and chemical combinations.\n\nThe phenomena of life manifest themselves to us in physical phenomena, and in the existence of such phenomena.\n\nPsychic phenomena are sensed directly, and having enormous potential force, transform themselves into physical phenomena and into manifestations of life.\n\nWe know that at the basis of our procreative force lies desire —that is, a psychical state, or a phenomenon of consciousness.\n\nDesire is possessed of enormous potential force.\n\nOut of the united desire of a man and of a woman, a whole nation may come into being.\n\nAt the root of the active, constructive, creative force of man, that can change the course of rivers, unite oceans, cut through mountains, lies desire, i.e., again a psychical state, or a phenomenon of consciousness.\n\nThus psychic phenomena possess even greater unifying force with relation to physical phenomena than do the phenomena of life.\n\nPositive philosophy affirms that all three orders of phenomena proceed from one cause lying within the sphere of the study of physics .\n\nThis cause is called by different names at different times, but it is assumed to be identical with physical energy in general.\n\nSeriously analyzing such an affirmation, it is easily seen to be absolutely arbitrary, and not founded upon anything.\n\nPhysical phenomena of themselves, inside the limits of our existence and observation, never create the phenomena of life and the phenomena of consciousness.\n\nConsequently we may with greater right assume that in the phenomena of life and in the phenomena of consciousness there is something which does not exist in physical phenomena.\n\n_______ Moreover, we cannot measure physical, biological, and psychic phenomena by the same unit of measurement .\n\nOr more correctly, we cannot measure the phenomena of life and the phenomena of consciousness at all.\n\nIt is only the phenomena first mentioned, i.e., the physical, that we fancy we can measure, though this is very doubtful, too.\n\nIn any case we undoubtedly know that we can express neither the phenomena of life nor psychic phenomena in the formula of physical phenomena; and generally speaking we have for them no formulæ at all.\n\np.\n\n139 In order to clarify the relation between phenomena of different kinds, let us examine in detail the laws of their transformation one into another.\n\nFirst of all it is necessary to consider physical phenomena, and make a detailed study of the conditions and properties of their transformation one into another.\n\nIn an essay on Wundt ( The Northern Messenger , 1888) A.\n\nL.\n\nVolinsky, elucidating the principles of Wundt's physiological psychology, says: The actions of sensation are provoked by the actions of irritation.\n\nBut both these actions need not be at all equal.\n\nIt is possible to burn a whole city by a spark from a cigarette.\n\nIt is necessary to understand why this is possible.\n\nPlace a board upon the edge of some object scalewise, so that it will balance.\n\nOn both ends of the board put now an equal amount of weight.\n\nThe weights will not fall: although both of them will tend to fall, they balance one another.\n\nIf we lift the least weight from one end of the board, then the other end will overbalance, and the board will fall—i.e., the force of gravity which existed before as an invisible tendency, will have become a visible motive force.\n\nIf we put the board and weights on the earth, the force of gravity will not produce any action, but it will not be eliminated: it will only transform itself into other forces.\n\nThose forces which are only striving to produce motion are called constrained , or dead , forces."

