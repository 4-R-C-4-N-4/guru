[content]
body = "Then the understanding of such a man receives from the Holy Spirit the highest and hidden mysteries which according to the divine Paul, neither the human eye can understand nor the human reason comprehend unaided.\n\n(Ii Corinthians ii, 9).\n\nAnd that thou mayest understand how our reason sees them, try to apprehend that which I shall say to thee.\n\nWax, when it is placed far from fire, is solid, and it is possible to take it and hold it, but as soon as it is thrown in fire it immediately melts, takes fire, burns, blazes and ends thus in the midst of flames.\n\nSo also is human reason when it is alone by itself, ununited with God; then it comprehends in the usual way and according to its power all things surrounding it; but as it approaches the fire of Divinity and of the Holy Ghost, then is it entirely enveloped by that Divine fire, and immersed in Divine meditation, and then in that fire of Divinity it is impossible for it to think about its own affairs and about that which it desires.\n\n( Superconsciousness , p.\n\n370) St.\n\nBasil the Great says about the revelation of God: Absolutely unutterable and indescribable are the lightning-like splendors of Divine beauty; neither can speech express nor hearing apprehend.\n\nShall we name the brilliance of the morning star, the brightness of the moon, the radiance of the sun—the glory of all these is unworthy of being compared with the true light, standing farther from it than does the gloomiest night and the most terrible darkness from midday brightness.\n\nThis beauty, invisible to bodily eyes, comprehensible to soul and mind only, if it illumines some of the saints leaves in them an unbearable wound through their desire that this vision of Divine beauty should extend over an eternity of life; disturbed by this earthly life, they loathe it as thought it were a prison.\n\n( Superconsciousness , p.\n\n372) St.\n\nTheognis says: A strange word will I say to thee.\n\nThere is some hidden mystery which proceeds between God and the soul.\n\nThis is experienced by those who achieve the highest heights of perfect purity of p.\n\n288 love and faith, when man, changing completely unites with God, as His own, through ceaseless prayer and contemplation?\n\n( Superconsciousness , p.\n\n381) Certain parts of the writings of Clement of Alexandria (second century) are remarkably interesting.\n\nIt appears to us that painting appears to take in the whole field of view in the scenes represented.\n\nBut it gives a false description of the view, according to the rules of the art, employing the signs that result from the incidents of the lines of vision.\n\nBy this means, the higher and the lower points in the view, and those between, are preserved; and some objects seem to appear in the foreground, and others in the background, and others to appear in some other way, on the smooth and level surface.\n\nSo also philosophers copy the truth, after the manner of painting.\n\n1 Clement of Alexandria here reveals one very important aspect of truth , namely, its inexpressibility in words and the entire conditionality of all philosophical systems and formulations.\n\nDialectically truth is represented only in perspective—i.e., in an inevitably deformed shape—such is his idea.\n\nWhat time and labor would be saved, and from what enormous and unnecessary suffering would humanity save itself, could it but understand this one simple thing: that truth cannot be expressed in our language .\n\nThen would men cease to think that they possessed truth, would cease to force others to accept their truth at any cost, would see that others may approach truth from another direction , exactly as they themselves approach it, by a way of their own."

