[content]
body = "I admit that the matter of our world, collected in one place, will not take more than one-tenth of the volume of the planetary sphere: Ii think that this figure is considerably exaggerated.\n\nAfter calculations of volume it will appear that in our world the volume occupied by the matter will be related to the volume of the vacuum as the figure 1 to the number represented by the figure 3 with 13 zeros.\n\nThis relation is equivalent to the relation of one second to one million years.\n\nAccording to the calculations of Lord Kelvin, the density of matter corresponding to such a relation would be less than the density of water by ten thousand million times, i.e., it would be in an extreme degree of rarefaction.\n\n.\n\n.\n\n.\n\nProf.\n\nOumoff gives the example of such a number of balls as correspond to the number of seconds in one million years.\n\nUpon one of these balls (corresponding to the matter in the universe) is written all that we know, because all that we know is related to matter.\n\nAnd matter is only one ball among millions and millions of \"balls of vacuum.\" This is his conclusion; says he: Matter represents a highly improbable fact in the universe.\n\nThis event came into existence because small probability does not mean impossibility.\n\nBut where, and in what manner, are realized more probable events?\n\nIs it not in the domain of radiant energy?\n\nThe theory of probability includes the immense part of the universe—the vacuum—in the world of becoming.\n\nWe know that radiant energy possesses the preponderating mass.\n\nAmong the different phenomena in the world of inter-crossing rays, out of elements attracting one another are not the tiny fragments born which by their congregation compose our p.\n\n132 material world?\n\nIs not the vacuum the laboratory matter?\n\nThe material world corresponds to that limited horizon which is open to a man who has come out into a field.\n\nTo his senses life is teeming only within the limits of this horizon; outside of it for the senses of man there is only a vacuum.\n\nI do not desire to start a polemic about those thoughts in Prof.\n\nOumoff's address with which I do not agree.\n\nYet I shall mention and enumerate the questions which in my opinion are raised by the incompatibility of certain principles.\n\nThe contrast between the vacuum and the material world sounds almost naive after the just quoted words of Minkowsky concerning the necessity of a transfer of attention, on the part of science, from purely physical problems to questions of consciousness.\n\nMoreover I do not see any fundamental difference between the material, the mechanical, and the electro-magnetic universe.\n\nAll this is three-dimensional.\n\nIn the electro-magnetic universe there is as yet no true transition to the fourth dimension.\n\nAnd Prof.\n\nOumoff makes only one clear attempt to bind the electro-magnetic world with the higher dimensions.\n\nHe says: That sheet of paper, written in electro-magnetic symbols, with which we covered the vacuum, it is possible to regard as billions of separate superimposed sheets, but of which each one represents the field of one small electric quantity or charge.\n\nBut this is all.\n\nThe rest is just as three-dimensional as the theory of atoms and the ether.\n\n\"We are present at the funeral of the old physics,\" says Prof.\n\nOumoff, and this is true.\n\nBut the old physics is losing itself and disappears not in the electro-magnetic theory, but in the idea of a new dimension of space which up to the present has been called time and motion .\n\nTruly, the new physics will be that in which there will be no motion , i.e., there will be no dualism of rest and motion, and no dualism of matter and vacuum.\n\nUnderstanding the universe as thought and consciousness we completely divorce ourselves from the idea of a vacuum.\n\nAnd from this standpoint is explained the small probability of matter to which p.\n\n133 [paragraph continues] Prof.\n\nOumoff referred."

