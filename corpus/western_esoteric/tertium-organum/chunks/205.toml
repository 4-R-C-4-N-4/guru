[content]
body = "It was in the early spring, at the beginning of his thirty-sixth year.\n\nHe and two friends had spent the evening reading Wordsworth, Shelley, Keats, Browning, and especially Whitman.\n\nThey parted at midnight and he had a long drive in a hansom (it was in an English city).\n\nHis mind, deeply under the influence of the ideas, images and emotions called up by the reading and talk of the evening, was calm and peaceful.\n\nHe was in a state of quiet, almost passive enjoyment.\n\nAll at once, without warning of any kind, he found himself wrapped around as it were by a flame-colored cloud.\n\nFor an instant he thought of fire, some sudden conflagration in the great city; the next he knew the light was within himself.\n\nDirectly afterwards came upon him a sense of exultation, of immense joyousness accompanied or immediately followed by an intellectual illumination quite impossible to describe.\n\nInto his brain streamed one momentary lightning-flash of the Brahmic splendor which has ever since lightened his life; upon his heart fell one drop of Brahmic Bliss, leaving thenceforward for always an after taste of heaven.\n\nAmong other things he did not come to believe, he saw and knew that the cosmos is not dead matter but a living Presence, that the soul of man is immortal, that the universe is so built and ordered that without peradventure all things work together for the good of each and all, that the foundation principle of the world is what we call love and that the happiness of everyone in the long run is absolutely certain.\n\nHe claims he learned more within the few seconds during which the illumination lasted than in previous months or even years of study and that he learned much that no study could ever have taught.\n\nThe illumination itself continued not more than a few moments, but its effects proved ineffaceable; it was impossible for him ever to forget what he at that time saw and knew; neither did he, nor could he, ever doubt the truth of what was then presented to his mind.\n\nThere was no return that night or at any other time of the experience.\n\nThe supreme occurrence of that night was his real and sole initiation to the new and higher order of ideas.\n\nBut it was only an initiation.\n\nHe saw the light but had no more idea whence it came and what it meant than had the first creature that saw the light of the sun.\n\nYears afterwards he met a man who had had a large experience in the higher life.\n\nHis conversations with this man threw a flood of light upon the meaning of what he had himself experienced.\n\nLooking round then upon the world of man, he saw the significance of the subjective light in the case of Paul and in that of Mohammed.\n\nThe secret of Whitman's transcendent greatness was revealed to him.\n\nPersonal intercourse and conversations with men, 1 who had similar experiences assisted greatly in the broadening and clearing up of his speculations.\n\nAfter spending much time and labor in thinking he came to the conclusion p.\n\n316 that there exists a family sprung from, living among, but scarcely forming a part of ordinary humanity, whose members are spread abroad throughout the advanced races of mankind and throughout the last forty centuries of the world's history.\n\nThe trait that distinguishes these people from other men is this: Their spiritual eyes have been opened and they have seen.\n\nThe better known members of this group who, if they were collected together, could be accommodated all at one time in a modern drawing-room, have created all the great modern religions, beginning with Taoism and Buddhism, and speaking generally, have created, through religion and literature, modern civilization.\n\nNot that they have contributed any large numerical proportion of the books which have been written, but that they have produced the few books which have inspired the larger number of all that have been written in modern times.\n\nThese men dominate the last twenty-five, especially the last five centuries as stars of the first magnitude dominate the midnight sky."

