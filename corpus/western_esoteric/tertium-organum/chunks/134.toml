[content]
body = "The activity of the life of such a composite being as a forest is not the same as the activity of different species of plants and animals, and the activity of the life of a species is again different from the life of separate individuals.\n\nMoreover, the diversity of the functions expressed in different life-activities reveals the differences existing between the psychic lives of different \"organisms.\" The life-activity of a single leaf of a birch tree, is of course an infinitely lower form of activity than the life of the tree .\n\nThe activity of the life of the tree is not such as the activity of the life of the species, and the life of the species is not such as the life of the forest.\n\nThe functions of these four \"lives\" are entirely different, and their rationality must be correspondingly different also.\n\nThe rationality of a single cell of the human body must be as much lower in comparison with the rationality of the body—i.e., with the \"physical consciousness of man\"—as its life-activity is lower in comparison with the life-activity of the entire organism.\n\np.\n\n208 Therefore, from a certain standpoint, we may regard the noumenon of a phenomenon as the soul of that phenomenon, i.e., we may say that the hidden soul of a phenomenon is its noumenon.\n\nThe concept of the soul of a phenomenon or the noumenon of a phenomenon includes within itself both life and rationality together with their functions in sections of the world incomprehensible to us; and the manifestation of those in our sphere constitutes a phenomenon.\n\nThe idea of an animistic universe leads inevitably to the idea of a \"World-Soul\"—a \"Being\" whose manifestation is this visible universe.\n\nThe idea of the \"World-Soul\" was very picturesquely understood in the ancient religions of India.\n\nThe mystical poem, The Bhagavad Gitâ gives a remarkable presentment of Mahadeva , i.e., the great Deva whose life is this world.\n\nThus Krishna propounded his teaching to his disciples.\n\n.\n\n.\n\n.\n\npreparing them for an apprehension of those high spiritual truths which unfold before his inner sight in a moment of illumination.\n\nWhen he spoke of Mahadeva his voice became very deep, and his face was illuminated by an inner light.\n\nOnce Arjuna, in an impulse of boldness, said to him: Let us see Mahadeva in his divine form.\n\nMay we behold him?\n\nAnd then Krishna .\n\n.\n\n.\n\nbegan to speak of a being who breathes in every creature, has an hundred-fold and a thousand-fold forms, many-faced, many-eyed, facing everywhere, and who surpasses everything created by infinity, who envelops in his body the whole world, things still and animate.\n\nIf the radiance of a thousand suns should burst forth suddenly in the sky, it would not compare with the radiance of that Mighty Spirit.\n\nWhen Krishna spoke thus of Mahadeva, a beam of light of such tremendous force shone in his eyes, that his disciples could not endure the radiance of that light, and fell at Krishna's feet.\n\nFrom very fear the hair rose on Arjuna's head, and bowing low he said: Thy words are terrible, we cannot look upon such a being as Thou evokest before our eyes.\n\nHis form makes us tremble.\n\n1 In an interesting book of lectures by Prof.\n\nWilliam.\n\nJames, A Pluralistic Universe , there is a lecture on Fechner, devoted to \"a conscious universe.\" Ordinary monistic idealism leaves everything intermediary out.\n\nIt recognizes only extremes, as if, after the first rude face of the phenomenal p.\n\n209 world in all its particularity, nothing but the supreme in all its perfection could be found.\n\nFirst, you and I, just as we are in this room; and the moment we get below that surface, the unutterable itself!"

