[content]
body = "Evolutionists, followers of Darwin, say that the struggle for existence and the selection of the fittest created the mind and feeling of contemporary man—that mind and feeling SERVE LIFE, preserve the life of separate individuals and of the species—and that beyond this they have no meaning in themselves.\n\nBut it is possible to answer this with the same arguments before advanced against the mechanicality of the universe; namely, that if rationality exists, then nothing exists except rationality.\n\nThe struggle for existence and the survival of the fittest, if they truly play such a rôle in the creation of life, are also not merely accidents, but products of a mind, CONCERNING WHICH WE DO NOT KNOW; and they also conduce, like everything else, TO A KNOWLEDGE.\n\np.\n\n215 But we do not realize, do not discern the presence of rationality in the phenomena and laws of nature.\n\nThis happens because we study always not the whole but the part, and we do not divine that whole which we wish to study—by studying the little finger of a man we cannot discover his reason.\n\nIt is the same way in our relation to nature: we study always the little finger of nature.\n\nWhen we come to realize this and shall understand that EVERY LIFE IS THE MANIFESTATION OF A PART OF SOME WHOLE, then only the possibility of knowledge of that whole opens to us.\n\nIn order to comprehend the rationality of a given whole, it is necessary to understand the character of the whole and its functions.\n\nThus the function of man is knowledge; but without understanding \"man\" as a whole, it is impossible to understand his function.\n\nTo understand our psyche, the function of which is knowledge, it is necessary to clear up our relation to life.\n\nIn Chapter X an attempt was made—a very artificial one, founded upon the analogy with a world of two-dimensional beings—to define life as motion in a sphere higher in dimensionality in comparison with ours.\n\nFrom this standpoint every separate life is as it were the manifestation in our sphere of a part of one of the rational entities of another sphere.\n\nThese rationalities look in upon us, as it were, in these lives which we see.\n\nWhen a man dies, one eye of the Universe closes , says Fechner.\n\nEvery separate human life is a moment of the life of some great being , which lives in us.\n\nThe life of every separate tree is a moment of the life of a being, \"species\" or \"family.\" The rationalities of these higher beings do not exist independently of these lower lives.\n\nThey are two sides of one and the same thing.\n\nEvery single human psyche, in some other section of the world, may produce the illusion of many lives.\n\nThis is difficult to illustrate by an example.\n\nBut if we take Hinton's spiral, passing through a plane, and the point running in circles on the plane (see 70 ), and conceive of the spiral as the psyche, then the moving point of intersection of the spiral with the plane will be life .\n\nThis example illustrates a possible relation between the psyche and life.\n\nTo us, life and the psyche are different and separate from each other, because we are inept at seeing, inept at looking at things.\n\np.\n\n216 [paragraph continues] And this in turn depends upon the fact that it is very difficult for us to step outside the frames of our divisions .\n\nWe see the life of a tree, of this tree ; and if we are told that the life of a tree is a manifestation of some psychic life, then we understand it in such a way that the life of this tree is the manifestation of the psychic life of this tree .\n\nBut this is of course an absurdity resulting from \"three-dimensional thinking\"—the \"Euclidian\" mind.\n\nThe life of this tree is a manifestation of the psychic life of the species , or family, or perhaps of the psychic life of the entire vegetable kingdom ."

