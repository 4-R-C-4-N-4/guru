[content]
body = "And in those who do not possess it in some sort already, it cannot be created by any culture whatever, in the same way that no kind or amount of culture will make an animal speak the language of man.\n\nThe possibility of the manifestation of cosmic consciousness cannot be inoculated artificially.\n\nA man is either born with or without it.\n\nThis possibility can be throttled or developed, but it cannot be created.\n\nNot all can learn to discern the real from the false; but he who can will not receive this gift of discernment free.\n\nThis is a thing of great labor, a thing of great work, which demands boldness of thought and boldness of feeling.\n\nFootnotes 311:1 This division constitutes Dr.\n\nBucke's principal error.\n\nHuman consciousness, i.e., the consciousness of the enormous majority of men, is \"simple consciousness\"; \"self-consciousness,\" like \"cosmic consciousness,\" exists only in a flash.\n\n312:1 See the comment 1, p.\n\n321.\n\n313:1 See the comment 2, p.\n\n321.\n\n315:1 Among whom was Edward Carpenter.\n\n318:1 See the comment 3, p.\n\n322.\n\n322:1 See p.\n\n292.\n\nQuotation from Mabel Collins' book.\n\n324:1 Dr.\n\nBucke makes a very important error concerning self-consciousness.\n\nIn his opinion \"simple consciousness\" characterizes an animal and \"self-consciousness\" characterizes a man.\n\nBut as a matter of fact a prolonged self-consciousness during sensation, feeling or thinking is a very rare phenomenon in man, usually that which is called self-consciousness is simply thought and it goes post factum .\n\nTrue self-consciousness exists in man only potentially, and, if it manifests itself, it does so only by moments.\n\nThese moments of self-consciousness should not be identified with prolonged self consciousness.\n\nProlonged self-consciousness is already \"a new consciousness,\" and there is the possibility of moments of cosmic consciousness, which in the course of further development may, in turn, become prolonged."

