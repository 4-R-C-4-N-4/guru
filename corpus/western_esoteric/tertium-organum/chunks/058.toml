[content]
body = "That is to say, Kant's idea would be proven experimentally if we could be convinced that for the being possessing sensations only, the world is one-dimensional; for the being possessing sensations and perceptions the world is two-dimensional; and for the being possessing, in addition to concepts and ideas, the higher forms of knowledge the world is four-dimensional.\n\nOr, more exactly, Kant's thesis in regard to the subjectivity of space-perception could be regarded as proven (a) if for the being possessing sensations only, our entire world with all its variety of forms should seem a single line ; if the universe of this being should possess but one dimension, i.e., should this being be one-dimensional in the properties of its receptivity; and (b) if for the being possessing, in addition to the faculty of feeling sensations, the faculty of forming perceptions, the world should have a two-dimensional extension; if all our world with its blue sky, clouds, green trees, mountains and precipices, should seem to him one plane; if the universe of this being should have only two dimensions, i.e., if this being were two-dimensional in the properties of its receptivity.\n\nMore briefly, Kant's thesis would be proven could we be made to see that for the conscious being the number of characteristics of the world changes in accordance with the changes of its psychic apparatus.\n\nTo perform such an experiment, effecting the diminution of psychic characteristics is not possible under ordinary conditions—we cannot arbitrarily limit our own, or anyone else's psychic apparatus.\n\nExperiments with the augmentation of psychic characteristics have been made and are recorded, but in consequence of many diverse causes they are insufficiently convincing.\n\nThe chief reason for this is that the augmentation of psychic faculties yields, first of all, so much of newness in the psychic realm that this newness obscures the changes proceeding simultaneously in the p.\n\n86 previous perception of the world; one feels the new, but is not capable of defining the difference exactly .\n\nThe entire body of teachings of religio-philosophic movements have as their avowed or hidden purpose, the expansion of consciousness .\n\nThis also is the aim of mysticism of every age and of every faith, the aim of occultism, and of the Oriental yoga .\n\nBut the question of the expansion of consciousness demands special study; the final chapters of this book will be dedicated to it.\n\nFor the present, in proof of the above stated propositions with regard to the change of the world in relation to psychic changes, it is sufficient to consider the assumption concerning the possibility of a smaller number of psychic characteristics.\n\nIf experiments in this direction are impossible, perhaps observation may furnish what we seek.\n\nLet us put the question: Are there not beings in the world standing toward us in the necessary relation , whose psyche is of a lower grade than ours?\n\nSuch psychically inferior beings undoubtedly exist.\n\nThese are animals.\n\nOf the difference between the psychical nature of an animal and of a man we know very little: the usual \"conversational\" psychology deals with it not at all.\n\nUsually we deny altogether that animals have minds, or else we ascribe to them our own psychology, but \"limited\"—though how and in what we do not know.\n\nAgain, we say that animals do not possess reason, but are governed by instinct.\n\nAs to what exactly we mean by instinct we do not ourselves know.\n\nI am speaking not alone of popular, but so-called \"scientific\" psychology.\n\nLet us try to discover what instinct is, and learn something about animal psychology.\n\nFirst of all let us analyze the actions of animals, and see wherein they differ from ours.\n\nIf these actions are instinctive, what inference is to be drawn from the fact?\n\nWhat are those actions in general, and how do they differ?\n\nIn the actions of living beings within the limits of our usual observation we discriminate between those which are reflex, instinctive, rational and automatic."

