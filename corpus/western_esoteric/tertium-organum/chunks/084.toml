[content]
body = "The pioneers of natural science do not enjoy such a serene point of view, and to this circumstance the natural sciences are indebted for their continuous development.\n\nI venture to lift the brilliant and familiar veil and throw open the sanctuaries of scientific thought, now poised upon the summit of two contrasted contemplations of the world.\n\nThe steersman of science shall be ceaselessly vigilant, despite the felicity of his voyage; above him shall invariably shine the stars by which he finds his way upon the ocean of the unknown.\n\nAt the time in which we are living now the constellations in the skies of our science have changed, and a new star has flashed out, having no equal to itself in brightness.\n\nPersistent scientific investigation has expanded the volume of the knowable to dimensions which could scarcely be imagined only a short time—fifteen or twenty years—ago.\n\nNumber remains, as before, the lawmaker of nature, but, being capable of representation, it has escaped from that mode of contemplating the world which regarded as possible its representation by mechanical models.\n\nThis augmentation of knowledge gives a sufficient number of images for the construction of the world, but they destroy its architecture as that is known to us, and create as it were a new order, extending far, in its free lines, beyond the limits not only of the old visible world, but even beyond the fundamental forms of our thinking.\n\nI have now to lead you to the summits from which open the perspectives that are re-forming the very basis of our understanding of the world.\n\nThe ascent to them amid the ruins of classical physics is attended with p.\n\n128 no small difficulty, and I ask in advance your indulgence and shall exercise all my efforts to simplify and shorten our path as far as possible.\n\nProf.\n\nOumoff proceeds to picture the evolution of form \"from the atom to the electron,\" from materialistic and mechanistic ideas about the universe to the electro-magnetic theory.\n\nThe axioms of mechanics are only fragments, and their application may be compared to the judgment concerning the contents of an entire chapter by means of a single sentence.\n\nTherefore it is not strange that the attempt of the mechanistic explanation of the properties of the electro-magnetic ether by the aid of axioms in which these properties were either denied or one-sidedly predetermined was doomed to failure.\n\n.\n\n.\n\n.\n\nThe mechanistic contemplation of the world appeared as one-sided.\n\n.\n\n.\n\n.\n\nIn the image of the world, unity was not in evidence.\n\nThe electro-magnetic world could not remain as something quite alien, unrelated to matter.\n\nThe material mode of contemplating the world, with its fixed formula, had no sufficient flexibility to bring about unification through it and its principles.\n\nThere remained only one way out—to sacrifice one of the worlds—the material, the mechanistic, or the electro-magnetic.\n\nIt was necessary to find sufficient foundations for decision on the one side or on the other.\n\nThese were not slow to appear.\n\nThe consequent development of physics is a process against matter, which ended with its expulsion.\n\nBut along with this negative activity has gone the creative work of the reformation of electro-magnetic symbolics; it was forced to become adequate to express the properties of the material world: its atomic structure, inertia, radiation and absorption of energy, electromagnetic phenomena.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nOn the horizon of scientific thought was arising the electronic theory of matter.\n\nThrough electrical corpuscles was opening the connection between matter and vacuum.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nThe idea of a special substratum filling the vacuum—ether—became superfluous.\n\n.\n\n.\n\n.\n\nLight and heat are born by the motion of electrons.\n\nThey are the suns of microcosms.\n\n.\n\n.\n\n.\n\nThe universe consists of positive and negative corpuscles, bound by electro-magnetic fields."

