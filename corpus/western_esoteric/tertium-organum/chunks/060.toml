[content]
body = "We may declare with entire assurance that instinct is a pleasure-pain which, like the positive and negative poles of an electro-magnet, repels and attracts the animal in this or that direction, compelling it to perform whole series of complex actions, sometimes expedient to such a degree that they appear to be sensible, and not only sensible, but founded upon foresight of the future, almost upon some clairvoyance, like the migration of birds, the building of nests for the young which have not as yet appeared, the finding of the way south in the autumn, and north in the spring, etc.\n\nBut all these actions are explained in reality by a single instinct, i.e., by the subservience to pleasure-pain .\n\nDuring periods in which millenniums may be regarded as days, by selection among all animals the types have been perfected, living along the lines of this subservience.\n\nThis subservience is expedient, that is, the results of it lead to the desired goal.\n\nWhy this is so is clear.\n\nHad the sense of pleasure arisen from that which is detrimental, the given species could not live, and would quickly die out.\n\nInstinct is the guide of its life, but only as long as instinct is expedient solely; just as soon as it ceases to be expedient it becomes the guide of death, and the species soon dies out.\n\nNormally \"pleasure-pain\" is pleasant or unpleasant not for the usefulness p.\n\n89 or the harm which may result, but because of it.\n\nThose influences which proved to be beneficial for a given species during the vegetative life, with the transition to the more active and complex animal life begin to be sensed as pleasant , the detrimental influences as unpleasant.\n\nAs regards two different species, one and the same influence—say a certain temperature—may be useful and pleasant for one, and for another detrimental and unpleasant.\n\nIt is clear, therefore, that the subservience to \"pleasure-pain\" must be governed by expediency.\n\nThe pleasant is pleasant because it is beneficial , the unpleasant is unpleasant because it is harmful .\n\nNext after instinctive actions follow those actions which are rational and automatic.\n\nBy rational action is meant such an action as is known to the acting subject before its execution ; such an action as the acting subject can name , define , explain , can show its cause and purpose before its execution .\n\nAutomatic actions are actions which have been rational for a given subject, but because of frequent repetitions they have become habitual and are performed unconsciously.\n\nThe acquired automatic actions of trained animals were previously rational not in the animal, but in the trainer.\n\nSuch actions often appear as rational but this is a complete illusion.\n\nThe animal remembers the sequence of actions, and therefore its actions appear to be considered and expedient.\n\nThey really were considered, but not by it .\n\nAutomatic actions are often confounded with instinctive ones—in reality they resemble instinctive ones, but there is an enormous difference between them.\n\nAutomatic actions are developed by the subject during its own life, and for a long time before they become automatic it must be conscious of them.\n\nInstinctive actions, on the other hand, are developed during the life-periods of the species , and the aptitude for them is transmitted in a definite manner by heredity.\n\nIt is possible to call automatic actions instinctive actions worked out for itself by a given subject.\n\nIt is impossible , however, to call instinctive actions automatic actions worked out by a given species, because they never were rational in different individuals of a given species, but were compounded out of a series of complex reflexes.\n\nREFLEXES, INSTINCTIVE AND \"RATIONAL\" ACTIONS, ALL MAY BE REGARDED AS REFLECTED, i.e., AS NOT SELF-ORIGINATED.\n\nBOTH THESE AND OTHERS, AND STILL A THIRD CLASS, COME NOT FROM MAN p."

