body = "TERTIUM ORGANUM THE THIRD CANON OF THOUGHT A KEY TO THE ENIGMAS OF THE WORLD P. D. OUSPENSKY TRANSLATED FROM THE RUSSIAN BY NICHOLAS BESSARABOFF AND CLAUDE BRAGDON—WITH AN INTRODUCTION BY CLAUDE BRAGDON SECOND AMERICAN EDITION, AUTHORIZED AND REVISED THE MYSTERY OF SPACE AND TIME. SHADOWS AND REALITY, OCCULTISM AND LOVE. ANIMATED NATURE. VOICES OF THE STONES. MATHEMATICS OF THE INFINITE. THE LOGIC OF ECSTASY. MYSTICAL THEOSOPHY. COSMIC CONSCIOUSNESS. THE NEW MORALITY. BIRTH OF THE SUPERMAN. NEW YORK; ALFRED A KNOPF [1922] Scanned, proofed and formatted at sacred-texts.com, May 2005 by John Bruno Hare."

