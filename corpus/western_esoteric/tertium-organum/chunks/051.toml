body = "p.\n\n73 CHAPTER VII The impossibility of the mathematical definition of dimensions.\n\nWhy does not mathematics sense dimensions?\n\nThe entire conditionality of the representation of dimensions by powers.\n\nThe possibility of representing all powers on a line.\n\nKant and Lobachevsky.\n\nThe difference between non-Euclidian geometry and metageometry.\n\nWhere shall we find the explanation of the three-dimensionality of the world, if Kant's ideas are true?\n\nAre not the conditions of the three-dimensionality of the world confined to our receptive apparatus, to our psyche?\n\nNOW that we have studied those \"relations which our space itself bears within it\" we shall return to the questions: But what in reality do the dimensions of space represents—and why are there three of them ?\n\nThe fact that it is impossible to define three-dimensionality mathematically must appear most strange.\n\nWe are little conscious of this, and it seems to us a paradox, because we speak of the dimensions of space, but it remains a fact that mathematics does not sense the dimensions of space.\n\nThe question arises, how can such a fine instrument of analysis as mathematics not feel dimensions, if they represent some real properties of space?\n\nSpeaking of mathematics, it is necessary to recognize first of all, as a fundamental premise, that correspondent to each mathematical expression is always the relation of some realities .\n\nIf there is no such a thing, if it be not true—then there is no mathematics.\n\nThis is its principal substance, its principal contents.\n\nTo express the correlations of magnitudes is the problem of mathematics.\n\nBut these correlations must be between something.\n\nInstead of algebraical a, b and c it must be possible to substitute some reality.\n\nThis is the ABC of all mathematics; a, b and c are credit bills; they can be good ones only if behind them there is a real something , and they can be counterfeited if behind them there is no reality whatever.\n\np.\n\n74 \"Dimensions\" play here a very strange rôle.\n\nIf we designate them by the algebraic symbols a, b and c, they have the character of counterfeit credit bills.\n\nFor this a, b and c it is impossible to substitute any real magnitudes which are capable of expressing the correlations of dimensions.\n\nUsually dimensions are represented by powers: the first, the second, the third; that is, if a line is called a, then a square, the sides of which are equal to this line, is called a 2 , and a cube, the face of which is equal to this square, is called a 3 .\n\nThis among other things gave Hinton the foundation on which he constructed his theory of tesseracts , four-dimensional solids—a 4 .\n\nBut this is pure fantasy.\n\nFirst of all, because the representation of \"dimensions\" by powers is entirely conditional.\n\nIt is possible to represent all powers on a line.\n\nFor example, take the segment of a line equal to five millimetres; then a segment equal to twenty-five millimetres will be the square of it, i.e., a 2 and a segment of one hundred and twenty-five millimetres will be the cube—a 3 .\n\nHow shall we understand that mathematics does not feel dimensions—that it is impossible to express mathematically the difference between dimensions?\n\nIt is possible to understand and explain it by one thing only—namely, that this difference does not exist .\n\nWe really know that all three dimensions are in substance identical, that it is possible to regard each of the three dimensions either as following the sequence, the first, the second, the third , or the other way about.\n\nThis alone proves that dimensions are not mathematical magnitudes.\n\nAll the real properties of a thing can be expressed mathematically as quantities, i.e., numbers, showing the relation of these properties to other properties."

