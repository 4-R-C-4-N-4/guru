body = "p.\n\n38 CHAPTER IV In what direction may the fourth dimension lie?\n\nWhat is motion?\n\nTwo kinds of motion—motion in space and motion in time—which are contained in every movement.\n\nWhat is time?\n\nTwo ideas contained in the conception of time.\n\nThe new dimension of space, and motion upon that dimension.\n\nTime as the fourth dimension of space.\n\nImpossibility of understanding the fourth dimension without the idea of motion.\n\nThe idea of motion and the \"time-sense.\" The time-sense as a limit (surface) of the \"space-sense.\" Hinton on the law of surfaces.\n\nThe \"ether\" as a surface.\n\nRiemann's idea concerning the translation of time into space in the fourth dimension.\n\nPresent, past, and future.\n\nWhy we do not see the past and the future.\n\nLife as a feeling of one's way .\n\nWundt on the subject of our sensuous knowledge.\n\nWE have established by a comparison of the relation of lower dimensional figures to higher dimensional ones that it is possible to regard a four-dimensional body as the tracing of the motion of a three-dimensional body upon the dimension not contained in it; i.e., that the direction of the motion upon the fourth dimension lies outside of all the directions which are possible in three-dimensional space.\n\nBut in what direction is it?\n\nIn order to answer this question it will be necessary to discover whether we do not know some motion not confined in three-dimensional space.\n\nWe know that every motion in space is accompanied by that which we call motion in time .\n\nMoreover , we know that everything existing, even if not moving in space, moves eternally in time.\n\nAnd equally in all cases, whether speaking of motion or absence of motion, we have in mind an idea of what was before, what now becomes, and what will follow after.\n\nIn other words, we have in mind the idea of time.\n\nThe idea of motion of any kind, also the idea of absence of motion, is indissolubly bound up with the idea of time.\n\nAny motion or absence of motion proceeds in time and p.\n\n39 cannot proceed out of time.\n\nConsequently, before speaking of what motion is, we must answer the question, what is time?\n\nTime is the most formidable and difficult problem which confronts humanity.\n\nKant regards time as he does space: as a subjective form of our receptivity; i.e., he says that we create time ourselves, as a function of our receptive apparatus, for convenience in perceiving the outside world.\n\nReality is continuous and constant, but in order to make possible the perception of it, we must dissever it into separate moments; imagine it as an infinite series of separate moments out of which there exists for us only one.\n\nIn other words, we perceive reality as if through a narrow slit, and what we are seeing through this slit we call the present; what we did see and now do not see—the past; and what we do not quite see but are expecting—the future.\n\nRegarding each phenomenon as an effect of another, or others, and this in its turn as a cause of a third; that is, regarding all phenomena in functional interdependence one upon another, by this very act we are contemplating them in time, because we picture to ourselves quite clearly and precisely first a cause, then an effect; first an action, then its function; and cannot contemplate them otherwise.\n\nThus we may say that the idea of time is bound up with the idea of causation and functional interdependence.\n\nWithout time, causation cannot exist, just as without time, motion or the absence of motion cannot exist.\n\nBut our perception concerning our \"being in time\" is entangled and misty up to improbability.\n\nFirst of all let us analyze our relation toward the past, present and future.\n\nUsually we think that the past already does not exist .\n\nIt has passed, disappeared, altered, transformed itself into something else."

