[content]
body = "If it had this likeness, long ago would its smallness have been known.\n\nThe sage attends to the inner and not to the outer; he puts away the objective and holds to the subjective.\n\nThe sage occupies himself with inaction, and conveys instructions without words.\n\nWho is there that can make muddy water clear?\n\nBut if allowed to remain still it will gradually become clear of itself.\n\nWho is there that can secure a state of absolute repose?\n\nBut let time go on, and the state of repose will gradually arise.\n\nTao is eternally inactive, and yet it leaves nothing undone.\n\nThe pursuit of book-learning brings about daily increase (i.e., the increase of knowledge).\n\nThe practice of Tao brings about daily loss (i.e., the loss of ignorance).\n\nRepeat the loss again and again, and you arrive at inaction.\n\nPractice inaction, and there is nothing which cannot be done.\n\nPractice inaction, occupy yourself with doing nothing.\n\nLeave all things to take their natural course, and do not interfere.\n\nAll things in Nature work silently.\n\nAmong mankind, the recognition of beauty as such implies the idea of ugliness, and the recognition of good implies the idea of evil.\n\nCast off your holiness, rid yourself of sagacity, and the people will benefit a hundredfold.\n\nThose who know do not speak; those who speak do not know.\n\nHe who acts, destroys; he who grasps, loses.\n\nTherefore the sage does not act, and so he does not destroy; he does not grasp, and so he does not lose.\n\nThe soft overcomes the hard; the weak overcomes the strong.\n\nThere is no one in the world but knows this truth, and no one who can put it into practice.\n\nA Meditation of Chuang-Tzu^ You cannot speak of ocean to a well-frog—the creature of a narrower sphere.\n\nYou cannot speak of ice to a summer insect—the creature of a season.\n\nYou cannot speak of Tao to a pedagogue, his scope is too restricted.\n\np.\n\n291 But now that you have emerged from your narrow sphere and have seen the great ocean, you know your own significance, and I can speak to you of great principles.\n\n.\n\n.\n\n.\n\nDimensions are limitless; time is endless.\n\nConditions are not invariable; terms are not final.\n\nThere is nothing which is not objective; there is nothing which is not subjective.\n\nBut it is impossible to start from the objective.\n\nOnly from subjective knowledge is it possible to proceed to objective knowledge.\n\nWhen subjective and objective are both without their correlates, that is the very axis of Tao.\n\nTao has its laws and its evidences.\n\nIt is devoid both of action and of form.\n\nIt may be obtained but cannot be seen.\n\nSpiritual beings draw their spirituality from Tao.\n\nTo Tao no point in time is long ago.\n\nTao cannot be existent.\n\nIf it were existent, it could not be non-existent.\n\nThe very name of Tao is only adapted for convenience' sake.\n\nPredestination and chance are limited to material existences.\n\nHow can they bear upon the infinite?\n\nTao is something beyond material existences.\n\nIt cannot be conveyed either by words or by silence.\n\nIn that state which is neither speech nor silence, its transcendental nature may be apprehended.\n\n1 ______ In contemporary Theosophical literature, two little books stand out: The Voice of the Silence by H.\n\nP.\n\nBlavatsky, and Light on the Path by Mabel Collins.\n\nIn both of them there is much of real mystical sentiment.\n\nThe Voice of the Silence He who would hear the voice of the silence, the soundless sound, and comprehend it, he has to learn the nature of the perfect inward concentration of the mind, accompanied by complete abstraction from everything pertaining to the external Universe, or the world of senses."

