[content]
body = "These will be considered as temporal phenomena, beginning at that moment when they become visible, and ending— ceasing to exist —at that moment when they become invisible.\n\nThe one-dimensional being will not be in a position to imagine that the phenomenon goes on existing somewhere, though invisibly to him; or he will imagine it as existing somewhere on his line, far ahead of him.\n\nWe can imagine this one-dimensional being more vividly.\n\nLet us take an atom hovering in space, or simply a particle of dust, carried along by the air, and let us imagine that this atom or particle p.\n\n61 of dust possesses a consciousness, i.e., separates himself from the outside world, and is conscious only of that which lies in the line of his motion, and with which he himself comes in contact.\n\nHe will then be a one-dimensional being in the full sense of the word.\n\nHe can fly and move in all directions, but it will always seem to him that he is moving upon a single line; outside of this line will be for him only a great Nothingness —the whole universe will appear to him as one line.\n\nHe will feel none of the turns and angles of his line, for to feel an angle it is necessary to be conscious of that which lies to right or left, above or below.\n\nIn all other respects such a being will be absolutely identical with the before-described imaginary being living upon the imaginary line.\n\nEverything that he comes in contact with, that is, everything that he is conscious of, will seem to him to be emerging from time, i.e., from nothing, vanishing into time, i.e., into nothing.\n\nThis nothing will be all our world.\n\nAll our world except one line will be called time and will be counted as actually non-existent.\n\n______ Let us next consider the two-dimensional world, and the being living on a plane.\n\nThe universe of this being will be one great plane.\n\nLet us imagine beings on this plane having the shape of points, lines, and flat geometrical figures.\n\nThe objects and \"solids\" of that world will have the shape of flat geometrical figures too.\n\nIn what manner will a being living on such a plane universe cognize his world?\n\nFirst of all we can affirm that he will not feel the plane upon which he lives.\n\nHe will not do so because he will feel the objects, i.e., figures which are on this plane.\n\nHe will feel the lines which limit them, and for this reason he will not feel his plane, for in that case he would not be in a position to discern the lines.\n\nThe lines will differ from the plane in that they produce sensations; therefore they exist.\n\nThe plane does not produce sensations; therefore it does not exist.\n\nMoving on the plane, the two-dimensional being, feeling no sensations, will declare that nothing now exists.\n\nAfter having encountered some figure, having sensed its lines, he will say that something appeared.\n\nBut gradually, by a process of reasoning, the two-dimensional being will come to the conclusion that the figures p.\n\n62 he encounters exist on something , or in something .\n\nThereupon he may name such a plane (he will not know, indeed, that it is a plane) the \"ether.\" Accordingly he will declare that the \"ether\" fills all space, but differs in its qualities from \"matter.\" By \"matter\" he will mean lines.\n\nHaving come to this conclusion the two-dimensional being will regard all processes as happening in his \"ether,\" i.e., in his space.\n\nHe will not be in a position to imagine anything outside of this ether, that is, out of his plane.\n\nIf anything, proceeding out of his plane, comes in contact with his consciousness, then he will either deny it, or regard it as something subjective, the creation of his own imagination; or else he will believe that it is proceeding right on the plane, in the ether , as are all other phenomena."

