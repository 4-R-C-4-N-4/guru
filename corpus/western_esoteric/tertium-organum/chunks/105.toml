[content]
body = "He hears \"the voices of stones,\" understands the whisperings of ancient walls, of tumuli, of mountains, rivers, woods and plains.\n\nHe hears \" the voice of the silence ,\" understands the psychological difference between silences, knows that one silence can differ from another .\n\nAnd this poetical understanding of the world should be developed, strengthened and fortified, because only by its aid do we come in contact with the true world of reality.\n\nIn the real world, behind phenomena which appear to us similar, often stand noumena so different that only by our blindness is it possible to account for our idea of the similarity of those phenomena.\n\nThrough such a false idea the current belief in the similarity and equality of men must have arisen.\n\nIn reality the difference between a \"hangman,\" a \"sailor,\" and an \"ascetic\" is not an accidental difference of position, state and heredity, as material-ism tries to assure us; nor is it a difference between the stages of one and the same evolution, as theosophy affirms; but it is a deep and IMPASSABLE difference—such as exists between murder, work and prayer—involving entirely different worlds.\n\nThe representatives of these worlds may seem to us to be similar MEN, only because we see, not them, but their shadows only.\n\nIt is necessary to accustom oneself to the thought that this difference is not metaphysical but entirely real, more real than many visible differences between things and between phenomena.\n\nAll art, in essence, consists of the understanding and representation of these elusive differences.\n\nThe phenomenal world is merely a means for the artist—just as colors are for the painter, and sounds for the musician—a means for the understanding of the noumenal world and for the expression of that understanding.\n\nAt the present stage of our development we possess nothing so powerful, as an instrument of knowledge of the world of causes, as art.\n\nThe mystery of life dwells in the fact that the noumenon , i.e., the hidden meaning and the hidden function of a thing, is reflected in its phenomenon .\n\nA phenomenon is merely the reflection of a noumenon in our sphere.\n\nTHE PHENOMENON IS THE IMAGE OF THE NOUMENON.\n\nIt is possible to know the noumenon by the phenomenon.\n\nBut in this field the chemical reagents and spectroscopes can accomplish nothing.\n\nOnly that fine apparatus which is called the soul of an artist can understand and feel the reflection of the p.\n\n162 noumenon in the phenomenon.\n\nIn art it is necessary to study \"occultism\"—the hidden side of life.\n\nThe artist must be a clairvoyant: he must see that which others do not see; he must be a magician: must possess the power to make others see that which they do not themselves see, but which he does see.\n\nArt sees more and farther than we do.\n\nAs was said before, we usually see nothing, we merely feel our way ; therefore we do not notice those differences between things which cannot be expressed in terms of chemistry or physics.\n\nBut art is the beginning of vision ; it sees vastly more than the most perfect apparatus can discover; and it senses the infinite invisible facets of that crystal, one facet of which we call man.\n\nThe truth is that this earth is the scene of a drama of which we only perceive scattered portions, and in which the greater number of the actors are invisible to us.\n\nThus says the theosophical writer, Mabel Collins, the author of Light on the Path , in a little book, Illusions .\n\nAnd this is very true: we see only a little.\n\nBut art sees farther than merely human sight, and therefore concerning certain sides of life art alone can speak, and has the right to speak.\n\n_______ A remarkable attempt to portray our relation to the \"noumenal world\"—to that \"great life\"—is found in Book VII of Plato's Republic."

