[content]
body = "It is not true because our experimental knowledge is not a confused perception of a real world .\n\nIt is a very acute perception of an entirely unreal world appearing round about us at the moment of our contact with the world of true causes, to which we cannot find the way because we are lost in an unreal \"material\" world.\n\nFor this reason the extension of the objective sciences does not bring us any nearer to the knowledge of things in themselves , or of true causes .\n\nIn A Critique of Pure Reason Kant affirms that: Nothing which is intuited in space is a thing in itself, and space is not a form which belongs as a property to things; but objects are quite unknown to us in themselves, and what we call outward objects are nothing else but mere representations of our sensibility, whose form is space, but whose real correlated thing in itself is not known by means of these representations, nor ever can be, but respecting which, in experience, no inquiry is ever made.\n\nThe things which we intuit are not in themselves the same as our representation of them in intuition, nor are their relations in themselves so constituted as they appear to us; and if we take away the subject, or even only the subjective constitution of our senses in general, then not only the nature and relations of objects in space and time disappear, but even space and time themselves.\n\nWhat may be the nature of objects considered as things in themselves and without reference to the receptivity of our sensibility is quite unknown to us.\n\nWe know nothing more than our own mode of perceiving them, which is peculiar to us and which though not of necessity pertaining to every animated being, is so to the whole human race.\n\nSupposing that we should carry our empirical intuition even to the very highest degree of clearness we should not thereby advance one step nearer to the constitution of objects as things in themselves.\n\nTo say then that our sensibility is nothing but the confused representation of things containing exclusively that which belongs to them as things in themselves, and this under an accumulation of characteristic marks and partial representations which we cannot distinguish in consciousness, is a falsification of the conception of sensibility and phenomenization, which renders our whole doctrine thereof empty and p.\n\n19 useless.\n\nThe difference between a confused and a clear representation is merely logical, and has nothing to do with content.\n\n_______ Up to the present time Kant's propositions have remained in the very form that he left them.\n\nDespite the multiplicity of new philosophical systems which appeared during the nineteenth century, and despite the number of philosophers who have particularly studied, commented upon, and interpreted Kant's writings, Kant's principal propositions have remained quite undeveloped, primarily because most people do not know how to read Kant at all, and they therefore dwell upon the unimportant and non-essential, ignoring the substance.\n\nYet really Kant simply put the question, threw to the world the problem, demanding the solution but not pointing the way toward it.\n\nThis fact is usually omitted when speaking of Kant.\n\nHe propounded the riddle, but did not give the solution of it.\n\nAnd to the present day we repeat Kant's propositions, we consider them incontrovertible, but in the main we represent them to our understanding very badly, and they are not correlated with other departments of our knowledge.\n\nAll our positive science—physics (with chemistry) and biology—is built upon hypotheses CONTRADICTORY to Kant's propositions .\n\nMoreover, we do not realize how we ourselves impose upon the world the properties of space, i.e., extension; nor do we realize how the world—earth, sea, trees, men— cannot possess such extension.\n\nWe do not understand how we can see and measure that extension if it does not exist —nor what the world represents in itself, if it does not possess extension.\n\nBut does the world really exist?"

