[content]
body = "But as in my future works it will be necessary for me to use the word consciousness in its real and true meaning, I have tried in this revised text of Tertium Organum to substitute for the word consciousness (wherever it is used in the sense of a complex of psychic functions) p.\n\nxv such other words as psyche, or psychic life, which perfectly express my meaning in such cases.\n\nFurthermore, in my work of revision, I have found numerous instances of illustrations, examples, etc., having no direct connection with the main theme.\n\nI have found also that some of these introduced themes vitiate the correctness of the main line of thought, creating associations which lead too far away.\n\nOther themes also, accidentally touched upon, demand a considerably more extended treatment than can be given them within the limits of this book, but being inadequately developed they leave a wrong impression.\n\nIn such cases I consider it necessary to eliminate this extraneous matter in order to elucidate the principal thought more clearly and directly, particularly as some of the questions touched upon demanding more or different exposition are discussed at length in my forth-coming books.\n\nIn conclusion, let me express to Mr.\n\nNicholas Bessaraboff and to Mr.\n\nClaude Bragdon my deep appreciation of their labors on the translation of my book into English.\n\nThis translation, made without my knowledge and participation, at a time when I was cut off by war and revolution from the civilized world, transmits my thought so exactly that after a very attentive review of the book I could find only one word to correct.\n\nSuch a result could be achieved only because Mr.\n\nBessaraboff and Mr.\n\nBragdon were not translating words merely, but were grasping directly the thoughts back of them.\n\nAlso, it is especially pleasant for me to remember that a number of years ago Mr.\n\nBragdon's Man the Square reached me in Petrograd, and that I, not knowing Mr.\n\nBragdon's other works at all, selected this little book from a whole series received from abroad, as one which carried the message of a common thought, a common understanding.\n\nP.\n\nOUSPENSKY Constantinople, June 1921"

