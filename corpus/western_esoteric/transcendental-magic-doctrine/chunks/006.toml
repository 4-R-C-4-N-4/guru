[content]
body = "Here I must pause, and I fear that already I have said too much.\n\nI testify in fine that there is one sole, universal and imperishable dogma, strong as supreme reason; simple, like all that is great; intelligible, like all that is universally and absolutely true; and this dogma is the parent of all others.\n\nThere is also a science which confers on man powers apparently superhuman.\n\nThey are enumerated thus in a Hebrew manuscript of the sixteenth century: “Hereinafter follow the powers and privileges of him who holds in his right hand the Clavicles of Solomon, and in his left the Branch of the Blossoming Almond.\n\nא ALEPH.\n\n– He beholds God face to face, without dying.\n\nand converses familiarly with the seven genii who command the entire celestial army.\n\nב BETH.\n\n– He is above all griefs and all fears.\n\nג GHIMEL.\n\n– He reigns with all heaven and is served by all hell.\n\nד DALETH.\n\n– He rules his own health and life and can influence equally those of others.\n\nה HE.\n\n– He can neither be surprised by misfortune nor overwhelmed by disasters, nor can he be conquered by his enemies.\n\nו VAU.\n\n– He knows the reason of the past, present and future.\n\nז ZAIN.\n\n– He possesses the secret of the resurrection of the dead and the key of immortality.\n\nSuch are the seven chief privileges, and those which rank next are these: ח CHETH.\n\n– To find the Philosophical Stone.\n\nט TETH.\n\n– To possess the Universal Medicine.\n\nי IOD.\n\n– To know the laws of perpetual motion and to prove the quadrature of the circle.\n\nכ CAPH.\n\n– To change into gold not only all metals but also the earth itself, and even the refuse of the earth.\n\nל LAMED.\n\n– To subdue the most ferocious animals and have power to pronounce those words which paralyse and charm serpents.\n\nם MEM.\n\n– To have the ARS NOTORIA which gives the Universal Science.\n\nנ NUN.\n\n– To speak learnedly on all subjects, without preparation and without study.\n\nThese, finally, are the seven least powers of the Magus: ס SAMECH.\n\n– To know at a glance the deep things of the souls of men and the mysteries of the hearts of women.\n\nע AYIN.\n\n– To force Nature to make him free at his pleasure.\n\nפ PE.\n\n– To foresee all future events which do not depend on a superior free will, or on an undiscernible cause.\n\nצ TSADE.\n\n– To give at once and to all the most efficacious consolations and the most wholesome counsels.\n\nק KOPH.\n\n– To triumph over adversities.\n\nר RESH.\n\n– To conquer love and hate.\n\nש SHIN.\n\n– To have the secret of wealth, to be always its master and never its slave.\n\nTo enjoy even poverty and never become abject or miserable.\n\nת TAU.\n\n– Let us add to these three septenaries that the wise man rules the elements, stills tempests, cures the diseased by his touch and raises the dead!\n\nBut certain things have been sealed by Solomon with his triple seal.\n\nIt is enough that the initiates know; as for others, whether they deride, doubt or believe, whether they threaten or fear, what matters it to science or to us?” Such actually are the issues of occult philosophy, and we are in a position to meet the charge of insanity or the suspicion of imposture when we affirm that these privileges are real.\n\nTo demonstrate this is the sole end of our work on occult philosophy."

