[content]
body = "They have gathered again and have shared the fruits of the tree of knowledge, so that they might become masters of the world.\n\nThe judgement pronounced against them is higher and far older than the tribunal of pope or king: “On the day that thou eatest thereof, thou shalt surely die,” said God Himself, as we read in the Book of Genesis.\n\nWhat then is taking place in the world, and why do priests and potentates tremble?\n\nWhat secret power threatens tiaras and crowns?\n\nA few bedlamites are roaming from land to land, concealing, as they say, the Philosophical Stone under their ragged vesture.\n\nThey can change earth into gold, and they are without food or lodging!\n\nTheir brows are encircled by an aureole of glory and by a shadow of ignominy!\n\nOne has discovered the universal science and goes vainly seeking death to escape the agonies of his triumph: he is the Majorcan Raymond Lully.\n\nAnother heals imaginary diseases by fantastic remedies, belying beforehand that proverb which enforces the futility of a cautery on a wooden leg: he is the marvellous Paracelsus, always drunk and always lucid, like the heroes of Rabelais.\n\nHere is William Postel writing naively to the fathers of the Council of Trent, proclaiming that he has discovered the absolute doctrine, hidden from the foundation of the world, and is longing to share it with them.\n\nThe Council heeds not the maniac, does not vouchsafe to condemn him, but proceeds to examine the grave questions of efficacious grace and sufficing grace.\n\nHe whom we behold perishing poor and abandoned is Cornelius Agrippa, less of a magician than any, though the vulgar persist in regarding him as a more potent sorcerer than all because he was sometimes a cynic and mystifier.\n\nWhat secret do these men bear with them to their tomb?\n\nWhy are they wondered at without being understood?\n\nWhy are they condemned unheard?\n\nWhy are they initiates of those terrific secret sciences of which the Church and society are afraid?\n\nWhy are they acquainted with things of which others know nothing?\n\nWhy do they conceal what all men burn to know?\n\nWhy are they invested with a dread and unknown power?\n\nThe occult sciences!\n\nMagic!\n\nThese words will reveal all and give food for further thought!\n\nDe omni re scribili et quibusdum aliis.\n\nBut what, as a fact, was this Magic?\n\nWhat was the power of these men who were at once so proud and so persecuted?\n\nIf they were really strong, why did they not overcome their enemies?\n\nBut if they were impotent and foolish, why did people honour them by fearing them?\n\nDoes Magic exist?\n\nIs there an occult knowledge which is in truth a power and works wonders comparable to the miracles of authorized religions?\n\nTo these two palmary questions we make answer by an affirmation and a book.\n\nThe book shall justify the affirmation, and the affirmation is this: There was and there still is a potent and real Magic; all that is said of it in legend is true after a certain manner, yet - contrary to the common course of popular exaggeration - it falls below the truth.\n\nThere is indeed a formidable secret, the revelation of which has once already transformed the world, as testified in Egyptian religious tradition, summarized symbolically by Moses at the beginning of Genesis.\n\nThis secret constitutes the fatal Science of Good and Evil, and the consequence of its revelation is death.\n\nMoses depicts it under the figure of a Tree which stands in the midst of the Terrestrial Paradise, is in proximity to the Tree of Life and is joined at the root thereto.\n\nAt the foot of this tree is the source of the four mysterious rivers; it is guarded by the sword of fire and by the four symbolical forms of the Biblical sphinx, the Cherubim of Ezekiel .\n\n.\n\n.\n\n."

