body = "Hence I conclude that, for myself and for this year, experience confirms fully the precision of Cardan's astrological calculus, which connects furthermore with the climacteric years of ancient astrologers.\n\nThis term signifies arranged in scales or calculated on the degrees of a scale.\n\nJohannes Trithemius in his book on Secondary Causes has computed the recurrence of fortunate or calamitous years for all empires of the world.\n\nIn the twenty-first chapter of our “Ritual” we shall give an exact analysis of this work, together with a continuation of the labour of Trithemius to our own days and the application of his magical scale to contemporary events, so as to deduce the most striking probabilities relative to the immediate future of France, Europe and the world.\n\nAccording to all the grand masters in astrology, comets are the stars of exceptional heroes, and they visit earth only to signalize great changes; the planets preside over collective existences and modify the destinies of mankind in the aggregate; the fixed stars, more remote and more feeble in their action, attract individuals and determine their tendencies.\n\nSometimes a group of stars may combine to influence the destinies of a single man, while often a great number of souls are drawn by the distant rays of the same sun.\n\nWhen we die, our interior light in departing follows the attraction of its star, and thus it is that we live in other universes, where the soul makes for itself a new garment, analogous to the development or diminution of its beauty; for our souls, when separated from our bodies, resemble revolving stars; they are globules of animated light which always seek their centre for the recovery of their equilibrium and their true movement.\n\nBefore all things, however, they must liberate themselves from the folds of the serpent, that is, the unpurified Astral Light which envelops and imprisons them, unless the strength of their will can lift them beyond its reach.\n\nThe immersion of the living star in the dead light is a frightful torment, comparable to that of Mezentius.\n\nTherein the soul freezes and burns at the same time, and has no means of getting free except by re-entering the current of exterior forms and assuming a fleshly envelope, then energetically battling against instincts to strengthen that moral liberty which will permit it at the moment of its death to break the chains of earth and wing its flight in triumph towards the star of consolation which has smiled in light upon it.\n\nFollowing this clue, we can understand the nature of the fire of hell, which is identical with the demon or old serpent; we can gather also wherein consists the salvation and reprobation of men, all called and all elected successively, but in small number, after having risked falling into the eternal fire through their own fault.\n\nSuch is the great and sublime revelation of the Magi, a revelation which is the mother of all symbols, of all dogmas, of all religions.\n\nWe can realize already how far Dupuis was mistaken in regarding astronomy as the source of every cultus.\n\nIt is astronomy, on the contrary, which has sprung from astrology, and primitive astrology is one of the branches of the holy Kabalah, the science of sciences and the religion of religions.\n\nHence upon the seventeenth page of the Tarot we find an admirable allegory - a naked woman, typifying Truth, Nature and Wisdom at one and the same time, turns two ewers towards earth, and pours out fire and water upon it.\n\nAbove her head glitters the septenary, starred about an eight-pointed star, that of Venus, symbol of peace and love; the plants of earth are flourishing around the woman, and on one of them the butterfly of Psyche has alighted.\n\nThis emblem of the soul is replaced in some copies of the sacred book by a bird, which is a more Egyptian and probably a more ancient symbol."

