[content]
body = "I will go further and affirm that magical circles and magnetic currents establish themselves, and have an influence, according to fatal laws, upon those on whom they can act.\n\nEach one of us is drawn within a sphere of relations which constitutes his world and to the influence of which he is made subject.\n\nThe lawgiver of the French Revolution, that man whom the most spiritual nation in the whole world acknowledged as the incarnation of human reason, Jean Jacques Rousseau, was drawn into the most lamentable action of his life, the desertion of his children, by the magnetic influence of a libertine circle and a magical current of table-d'hote.\n\nHe describes it simply and ingenuously in his Confessions, but it is a fact which has remained unobserved.\n\nGreat circles very often make great men, and vice versa.\n\nThere are no unrecognized geniuses, there are eccentric men, and the term would seem to have been invented by an adept.\n\nThe man who is eccentric in his genius is one who attempts to form a circle by combating the central attractive force of established chains and currents.\n\nIt is his destiny to be broken or to succeed.\n\nNow, what is the twofold condition of success in such a case?\n\nA central point of stability and a persistent circular action of initiative.\n\nThe man of genius is one who has discovered a real law and is possessed thereby of an invincible active and directing force.\n\nHe may die in the midst of his work but that which he has willed comes to pass in spite of his death, and is indeed often insured thereby, because death is a veritable assumption for genius.\n\n“When I shall be lifted up from the earth,” said the greatest of the initiators, “I will draw all men after me.” The law of magnetic currents is that of the movement of the Astral Light itself, which is always double and augments in a contrary direction.\n\nA great action invariably paves the way for a reaction of equal magnitude, and the secret of phenomenal successes consists entirely in the foreknowledge of reactions.\n\nThus did Chateaubriand, penetrated with disgust at the Saturnalia of the Revolution, foresee and prepare the immense vogue of his Genius of Christianity.\n\nTo oppose one's self to a current at the beginning of its career is to court being destroyed by that current, like the great and unfortunate Emperor Julian; to oppose one's self to a current which has run its course is to take the lead of a contrary current.\n\nThe great man is he who comes seasonably and knows how to innovate opportunely.\n\nIn the days of the apostles, Voltaire would have found no echo for his utterances, and might have been merely an ingenious parasite at the banquets of Trimalcyon.\n\nNow, at the epoch wherein we live, everything is ripe for a fresh outburst of evangelical zeal and Christian self-devotion, precisely by reason of the prevailing general disillusion, egoistic positivism and public cynicism of the coarsest interests.\n\nThe success of certain books and the mystical tendencies of minds are unequivocal symptoms of this widespread disposition.\n\nWe restore and we build churches only to realize more keenly that we are void of belief, only to long the more for it; once again does the whole world await its Messiah, and he will not delay his advent.\n\nLet a man, for example, come forward, who by rank or by fortune is placed in an exalted position - a pope, a king, even a Jewish millionaire - and let this man sacrifice publicly and solemnly all his material interests for the weal of humanity; let him make himself the saviour of the poor, the promulgator and even the victim of doctrines of renunciation and charity, and he will draw round him an immense following: he will accomplish a complete moral revolution in the world."

