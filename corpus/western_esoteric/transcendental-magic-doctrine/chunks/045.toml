[content]
body = "HOD VIVENS CAUSES manifest by effects, and effects are proportioned to causes.\n\nThe Divine Word, the One Word, the Tetragram, is self-affirmed by tetradic creation.\n\nHuman fecundity proves divine fecundity; the JOD of the Divine Name is the eternal virility of the First Principle.\n\nMan understands that he was made in the image of God when he attains comprehension of God by increasing to infinity the idea which he forms of himself.\n\nWhen realizing God as the infinite man, man says unto himself: I am the finite God.\n\nMagic differs from mysticism because it judges nothing a priori until after it has established a posteriori the actual base of its judgements, that is to say, after having apprehended the cause by the effects contained in the energy of the cause itself, by means of the universal law of analogy.\n\nHence in the occult sciences all is real, and theories are established only on the foundations of experience.\n\nRealities alone constitute the proportions of the ideal, and the Magus admits nothing as certain in the domain of ideas save that which is demonstrated by realization.\n\nIn other words, what is true in the cause manifests in the effect.\n\nWhat is not realized does not exist.\n\nThe realization of speech is the logos properly so called.\n\nA thought is realized in becoming speech; it is realized also by signs, sounds and representations of signs: here is the first degree of realization.\n\nThen it is imprinted on the Astral Light by means of the signs of writing or speech; it influences other minds by reflections upon them; it is refracted by crossing the DIAPHANE of other men; it assumes new forms and proportions; it is translated into acts and modifies the world: this is the last degree of realization.\n\nMen who are born into a world modified by an idea bear away with them the mark thereof, and it is thus that the word is made flesh.\n\nThe mark of the disobedience of Adam, preserved in the Astral Light, could be effaced only by the stronger mark of the obedience of the Saviour, and thus the original sin and redemption of the world can be explained in a natural and magical sense.\n\nThe Astral Light, or Soul of the World, was the instrument of Adam's omnipotence; it became afterwards that of his punishment, being corrupted and troubled by his sin, which intermingled an impure reflection with those primitive images which composed the Book of Universal Science for his still virgin imagination.\n\nThe Astral Light, depicted in ancient symbols by the serpent devouring its tail, represents alternately malice and prudence, time and eternity, tempter and Redeemer; for this light, being the vehicle of life, is an auxiliary alike of good and evil, and may be taken not only for the fiery form of Satan but for the body of the Holy Ghost.\n\nIt is the instrument of warfare in angelic battles, and feeds indifferently both the flames of hell and the lightnings of St.\n\nMichael.\n\nIt may be compared to a horse having a nature analogous to the chameleon, ever reflecting the armour of his rider.\n\nThe Astral Light is the realization or form of intellectual light, as the latter is the realization or form of the Divine Light.\n\nThe Great Initiator of Christianity, seeing that the Astral Light was overcharged with the impure reflections of Roman debauchery, sought to separate His disciples from the circumambient sphere of reflections and to concentrate them only on the interior light, so that, through the medium of a common faith and enthusiasm, they might communicate together by new magnetic chains, which He termed grace, and thus overcome the dissolute currents, to which He gave the names of the devil and Satan, signifying their putrefaction.\n\nTo oppose current to current is to renew the power of fluidic life."

