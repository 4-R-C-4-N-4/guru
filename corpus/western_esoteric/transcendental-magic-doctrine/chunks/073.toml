[content]
body = "FONS OCULUS FULGUR WHEN A man gazes unchastely upon any woman he profanes that woman, said the Great Master.\n\nWhat is willed with persistence is done.\n\nEvery real will is confirmed by acts; every will confirmed by an act is an action.\n\nEvery action is subject to a judgement, and such judgement is eternal.\n\nThese are dogmas and principles from which it follows that the good or evil which we will, to others as to ourselves, according to the capacity of our will and within the sphere of our operation, must take place infallibly, if the will be confirmed and the determination fixed by acts.\n\nSuch acts should be analogous to the will.\n\nThe intent to do harm or to excite love, in order to be efficacious, must be confirmed by deeds of hatred or affection.\n\nWhatsoever bears the impression of a human soul belongs to that soul; whatsoever a man has appropriated after any manner becomes his body in the broader acceptation of the term, and anything which is done to the body of a man is felt, mediately or immediately, by his soul.\n\nIt is for this reason that every hostile deed committed against one's neighbour is regarded in moral theology as the beginning of homicide.\n\nBewitchment is a homicide, and the more infamous because it eludes self defence by the victim and punishment by law.\n\nThis principle being established to exonerate our conscience, and for the warning of weak vessels, let us affirm boldly that bewitchment is possible.\n\nLet us even go further and lay down that it is not only possible but in some sense necessary and fatal.\n\nIt is going on continually in the social world, unconsciously both to agents and patients.\n\nInvoluntary bewitchment is one of the most terrible dangers of human life.\n\nPassional sympathy inevitably subjects the most ardent desire to the strongest will.\n\nMoral maladies are more contagious than physical, and there are some triumphs of infatuation and fashion which are comparable to leprosy or choler.\n\nWe may die of an evil acquaintance as well as of a contagious touch, and the frightful plague which, during recent centuries only, has avenged in Europe the profanation of the mysteries of love, is a revelation of the analogical laws of Nature and at the same time offers only a feeble image of the moral corruptions which follow daily on an equivocal sympathy.\n\nThere is a story of a jealous and infamous man who, to avenge himself on a rival contracted an incurable disorder and made it the common scourge and anathema of a divided bed.\n\nThis atrocious history is that of every magician, or rather of every sorcerer who practises bewitchments.\n\nHe poisons himself in order that he may poison others; he damns himself that he may torture others; he draws in hell with his breath in order that he may expel it by his lungs; he wounds himself mortally that he may inflict death on others; but possessed of this unhappy courage, it is positive and certain that he will poison and slay by the mere projection of his perverse will.\n\nThere are some forms of love which are as deadly as hatred, and the bewitchments of goodwill are the torment of the wicked.\n\nThe prayers offered to God for the conversion of a man bring misfortune to that man if he will not repent.\n\nAs we have said, it is weariness and danger to strive against the fluidic currents stirred up by chains of wills in union.\n\nHence there are two kinds of bewitchment, voluntary and involuntary; physical and moral bewitchment may be distinguished in like manner.\n\nPower attracts power, life attracts life, health attracts health: this is a law of Nature.\n\nIf two children live, above all if they sleep together, and if one be weak while the other is strong, the strong will absorb the weak, and the latter will waste away."

