body = "DENTES FURCA AMENS THE AUTHOR of this book has dared many things in his life, and never has fear retained his thought a prisoner.\n\nIt is not at the same time without legitimate dread that he approaches the end of the magical doctrine.\n\nIt is a question now of revealing, or rather reveiling, the Great Secret, the terrible secret, the secret of life and death, expressed in the Bible by those formidable and symbolical words of the serpent, who was himself symbolical: I.\n\nNEQUAQUAM MORIEMINI; II.\n\nSED ERITIS; III.\n\nSICUT DII; IV.\n\nSCIENTES BONUM ET malum.\n\nOne of the privileges which belong to the initiate of the Great Arcanum, and that which sums them all, is DIVINATION.\n\nAccording to the vulgar comprehension of the term, to divine signifies to conjecture what is unknown, but its true sense is ineffable in its sublimity.\n\nTo divine (divinare) is to exercise divinity.\n\nThe word divinus in Latin signifies something far different from divus, which is equivalent to man-god.\n\nDevin, in French, contains the four letters of the word DIEU (God), plus the letter N, which corresponds in its form to the Hebrew Aleph א, and kabalistically and hieroglyphically expresses the Great Arcanum, the Tarot symbol of which is the Juggler.\n\nWhosoever understands perfectly the absolute numeral value of M multiplied by N, with the grammatical force of the N final in words which signify SCIENCE, ART or POWER, who subsequently adds the five letters of the word DEVIN, in such a way as to make five go into four, four into three, three into two and two into one, such a person, by translating the resultant number into primitive Hebrew characters, will write the occult name of the Great Arcanum, and will possess a word of which the Sacred Tetragram itself is only the equivalent and the image.\n\nTo be a diviner, according to the force of the term, is hence to be divine, and something more mysterious still.\n\nNow, the two signs of human divinity, or of divine humanity, are prophecies and miracles.\n\nTo be a prophet is to see beforehand the effects which exist in causes, to read in the Astral Light; to work miracles is to act upon the Universal Agent and subject it to our will.\n\nThe author of this book will be asked whether he is a prophet and thaumaturge.\n\nLet inquirers recur to all that he wrote before certain events took place in the world; and as to anything else that he may have said or done, would anyone believe his mere word if he made a sensational statement?\n\nFurthermore, one of the essential conditions of divination is not to be coerced, not to suffer temptation - in other words, not to be put to the test.\n\nNever have the masters of science yielded to the curiosity of anyone.\n\nThe sibyls burned their books when Tarquin refused to appraise them at their proper value; the Great Master was silent when He was asked for a sign of His Divine Mission; Agrippa perished of want rather than obey those who demanded a horoscope.\n\nTo furnish proofs of science to those who suspect the very existence of science is to initiate the unworthy, to profane the gold of the sanctuary, to deserve the excommunication of sages and the fate of betrayers.\n\nThe essence of divination, that is to say, the Great Magical Arcanum, is represented by all the symbols of science, and is connected intimately with the one and primeval doctrine of Hermes."

