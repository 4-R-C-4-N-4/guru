[content]
body = "His body and arms form the letter ALEPH, the first of that alphabet which the Jews borrowed from the Egyptians: to this symbol we shall have occasion to recur later on.\n\nThe Magus is truly that which the Hebrew Kabalists term Microprosopus - otherwise, the creator of the little world.\n\nThe first of all magical sciences being the knowledge of one's self, so is one's own creation first of all works of science; it comprehends the others and is the beginning of the Great Work.\n\nThe expression, however, requires explanation.\n\nSupreme Reason being the sole invariable and consequently imperishable principle - and death, as we call it, being change - it follows that the intelligence which cleaves closely to this principle and in a manner identifies itself therewith, does hereby make itself unchangeable and as a result immortal.\n\nTo cleave invariably to reason it will be understood that it is necessary to attain independence of all those forces which by their fatal and inevitable operation produce the alternatives of life and death.\n\nTo know how to suffer, to forbear and to die - such are the first secrets which place us beyond reach of affliction, the desires of the flesh and the fear of annihilation.\n\nThe man who seeks and finds a glorious death has faith in immortality and universal humanity believes in it with him and for him, raising altars and statues to his memory in token of eternal life.\n\nMan becomes king of the brutes only by subduing or taming them: otherwise he will be their victim or slave.\n\nBrutes are the type of our passions; they are the instinctive forces of Nature.\n\nThe world is a field of battle, where liberty struggles with inertia by the opposition of active force.\n\nPhysical laws are millstones; if you cannot be the miller you must be the grain.\n\nYou are called to be king of air, water, earth and fire; but to reign over these four living creatures of symbolism, it is necessary to conquer and enchain them.\n\nHe who aspires to be a sage and to know the Great Enigma of Nature must be the heir and despoiler of the sphinx: his the human head, in order to possess speech; his the eagle's wings, in order to scale the heights; his the bull's flanks, in order to furrow the depths; his the lion's talons, to make a way on the right and the left, before and behind.\n\nYou therefore who seek initiation, are you learned as Faust?\n\nAre you insensible as Job?\n\nNo, is it not so?\n\nBut you may become like unto both if you choose.\n\nHave you overcome the vortices of vague thoughts?\n\nAre you without indecision or capriciousness?\n\nDo you consent to pleasure only when you will, and do you wish for it only when you should?\n\nNo, is it not so?\n\nNot at least invariably, but this may come to pass if you choose.\n\nThe sphinx has not only a man's head, it has woman's breasts; do you know how to resist feminine charms?\n\nNo, is it not so?\n\nAnd you laugh outright in replying, parading your moral weakness for the glorification of your physical and vital force.\n\nBe it so: I allow you to render this homage to the ass of Sterne or Apuleius.\n\nThe ass has its merit, I agree; it was consecrated to Priapus as was the goat to the god of Mendes.\n\nBut take it for what it is worth, and decide whether ass or man shall be master.\n\nHe alone can possess truly the pleasure of love who has conquered the love of pleasure.\n\nTo be able and to forbear is to be twice able.\n\nWoman enchains you by your desires; master your desires and you will enchain her.\n\nThe greatest injury that can be inflicted on a man is to call him a coward.\n\nNow, what is a cowardly person?"

