[content]
body = "He will fail to understand it, and it will trouble him, while if he should divine the meaning, there will be a still greater source of disquietude.\n\nIf you hold by anything in the world more than by reason, truth and justice; if your will be uncertain and vacillating, either in good or evil; if logic alarm you, or the naked truth make you blush; if you are hurt when accepted errors are assailed; condemn this work straight away.\n\nDo not read it; let it cease to exist for you; but at the same time do not cry it down as dangerous.\n\nThe secrets which it records will be understood by an elect few and will be reserved by those who understand them.\n\nShow light to the birds of the night-time, and you hide their light; it is the light which blinds them and for them is darker than darkness.\n\nIt follows that I shall speak clearly and make known everything, with the firm conviction that initiates alone, or those who deserve initiation, will read all and understand in part.\n\nThere is a true and a false science, a Divine and an Infernal Magic - in other words, one which is delusive and tenebrous.\n\nIt is our task to reveal the one and to unveil the other, to distinguish the magician from the sorcerer and the adept from the charlatan.\n\nThe magician avails himself of a force which he knows, the sorcerer seeks to misuse that which he does not understand.\n\nIf it be possible in a scientific work to employ a term so vulgar and so discredited, then the devil gives himself to the magician and the sorcerer gives himself to the devil.\n\nThe magician is the sovereign pontiff of Nature, the sorcerer is her profaner only.\n\nThe sorcerer is in the same relation to the magician that a superstitious and fanatical person bears to a truly religious man.\n\nBefore proceeding further, let us define Magic in a sentence.\n\nMagic is the traditional science of the secrets of Nature which has been transmitted to us from the Magi.\n\nBy means of this science the adept is invested with a species of relative omnipotence and can operate superhumanly, that is, after a manner which transcends the normal possibility of men.\n\nThereby many illustrious hierophants, such as Mercurius Trismegistus, Osiris, Orpheus, Apollonius of Tyana, and others whom it might be dangerous or unwise to name, came after their death to be adored and invoked as gods.\n\nThereby others also - according to that ebb-and-flow of opinion which is responsible for the caprices of success - became emissaries of infernus or suspected adventurers, like the Emperor Julian, Apuleius, the enchanter Merlin and that arch sorcerer, as he was termed in his day, the illustrious and unfortunate Cornelius Agrippa.\n\nTo attain the SANCTUM REGNUM, in other words, the knowledge and power of the Magi, there are four indispensable conditions - an intelligence illuminated by study, an intrepidity which nothing can check, a will which cannot be broken, and a prudence which nothing can corrupt and nothing intoxicate.\n\nTO KNOW, TO DARE, TO WILL, TO KEEP SILENCE - such are the four words of the Magus, inscribed upon the four symbolical forms of the sphinx.\n\nThese maxims can be combined after four manners and explained four times by one another.\n\nOn the first page of the Book of Hermes the adept is depicted with a large hat, which, if turned down, would conceal his entire head.\n\nOne hand is raised towards heaven, which he seems to command with his wand, while the other is placed upon his breast; before him are the chief symbols or instruments of science, and he has others hidden in a juggler's wallet."

