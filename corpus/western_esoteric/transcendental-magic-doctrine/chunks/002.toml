[content]
body = "At length a universal cry of execration went up against Magic, the mere name became a crime and the common hatred was formulated in this sentence: “Magicians to the flames!” - as it was shouted some centuries earlier: “To the lions with the Christians!” Now the multitude never conspires except against real powers; it does not know what is true, but it has the instinct of what is strong.\n\nIt remained for the eighteenth century to deride both Christians and Magic, while infatuated with the disquisitions of Rousseau and the illusions of Cagliostro.\n\nScience, notwithstanding, is at the basis of Magic, as at the root of Christianity there is love, and in the Gospel symbols we find the Word Incarnate adored in His cradle by Three Magi, led thither by a star - the triad and the sign of the microcosm - and receiving their gifts of gold, frankincense and myrrh, a second mysterious triplicity, under which emblem the highest secrets of the Kabalah are allegorically contained.\n\nChristianity owes therefore no hatred to Magic, but human ignorance has ever stood in fear of the unknown.\n\nThe science was driven into hiding to escape the impassioned assaults of blind desire: it clothed itself with new hieroglyphics, falsified its intentions, denied its hopes.\n\nThen it was that the jargon of alchemy was created, an impenetrable illusion for the vulgar in their greed of gold, a living language only for the true disciple of Hermes.\n\nExtraordinary fact!\n\nAmong the sacred records of the Christians there are two texts which the infallible Church makes no claim to understand and has never attempted to expound: these are the Prophecy of Ezekiel and the Apocalypse, two Kabalistic Keys reserved assuredly in heaven for the commentaries of Magian Kings, books sealed as with seven seals for faithful believers, yet perfectly plain to an initiated infidel of the occult sciences.\n\nThere is also another work, but, although it is popular in a sense and may be found everywhere, this is of all most occult and unknown, because it is the key of the rest.\n\nIt is in public evidence without being known to the public; no one suspects its existence and no one dreams of seeking it where it actually is.\n\nThis book, which may be older than that of Enoch, actually has never been translated, but is still preserved unmutilated in primeval characters, on detached leaves, like the tablets of the ancients.\n\nThe fact has eluded notice, though a distinguished scholar has revealed, not indeed its secret, but its antiquity and singular preservation.\n\nAnother scholar, but of a mind more fantastic than judicious, passed years in the study of this masterpiece, and has merely suspected its plenary importance.\n\nIt is, in truth, a monumental and extraordinary work, strong and simple as the architecture of the pyramids, and consequently enduring like those - a book which is the summary of all sciences, which can resolve all problems by its infinite combinations, which speaks by evoking thought, is the inspirer and moderator of all possible conceptions, and the masterpiece perhaps of the human mind.\n\nIt is to be counted unquestionably among the very great gifts bequeathed to us by antiquity; it is a universal key, the name of which has been explained and comprehended only by the learned William Postel; it is a unique test, whereof the initial characters alone plunged into ecstasy the devout spirit of Saint-Martin, and might have restored reason to the sublime and unfortunate Swedenborg.\n\nWe shall recur to this book later on, for its mathematical and precise explanation will be the complement and crown of our conscientious undertaking."

