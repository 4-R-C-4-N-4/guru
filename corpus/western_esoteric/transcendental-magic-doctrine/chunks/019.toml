[content]
body = "There is only one dogma in Magic, and it is this: The visible is the manifestation of the invisible, or, in other terms, the perfect word, in things appreciable and visible, bears an exact proportion to the things which are inappreciable by our senses and unseen by our eyes.\n\nThe Magus raises one hand towards heaven and points down with the other to earth, saying: “Above, immensity: Below immensity still!\n\nImmensity equals immensity.” - This is true in things seen, as in things unseen.\n\nThe first letter in the alphabet of the sacred language, Aleph, א, represents a man extending one hand towards heaven and the other to earth.\n\nIt is an expression of the active principle in everything; it is creation in heaven corresponding to the omnipotence of the word below.\n\nThis letter is a pantacle in itself - that is, a character expressing the universal science.\n\nIt is supplementary to the sacred signs of the Macrocosm and Microcosm; it explains the Masonic double-triangle and five-pointed blazing star; for the word is one and revelation is one.\n\nBy endowing man with reason, God gave him speech; and revelation, manifold in its forms but one in its principle, consists entirely in the universal word, the interpreter of absolute reason.\n\nThis is the significance of that term so much misconstrued, CATHOLICITY, which, in modern hieratic language, means INFALLIBILITY.\n\nThe universal in reason is the Absolute, and the Absolute is the infallible.\n\nIf absolute reason impelled universal society to believe irresistibly the utterance of a child, that child would be infallible by the ordination of God and of all humanity.\n\nFaith is nothing else but reasonable confidence in this unity of reason and in this universality of the word.\n\nTo believe is to place confidence in that which as yet we do not know when reason assures us beforehand of ultimately knowing or at least recognizing it.\n\nAbsurd are the so-called philosophers who cry: “I will never believe in a thing which I do not know!” Shallow reasoners!\n\nIf you knew, would you need to believe?\n\nBut must I believe on chance and apart from reason?\n\nCertainly not.\n\nBlind and haphazard belief is superstition and folly.\n\nWe may have faith in causes which reason compels us to admit on the evidence of effects known and appreciated by science.\n\nScience!\n\nGreat word and great problem!\n\nWhat is science?\n\nWe shall answer in the second chapter of this book."

