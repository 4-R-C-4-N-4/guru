[content]
body = "Here let us state distinctly that this work is being performed continually in the world by some of the flower of mankind; that there is hence a permanent revelation by intuition; and that there is no insuperable barrier which separates souls, because there are no sudden interruptions and no high walls in Nature by which minds can be divided from one another.\n\nAll is transition and blending, wherefore, assuming the perfectibility, if not infinite at least indefinite, of human faculties, it will be understood that every person can attain to see all, and therefore to know all.\n\nThere is no void in Nature: all is peopled.\n\nThere is no true death in Nature: all is alive.\n\n“Seest thou that star?” asked Napoleon of Cardinal Fesch.\n\n“No, Sire.” “I see it,” said the Emperor, and he most certainly did.\n\nWhen great men are accused of superstition, it is because they behold what remains unseen by the crowd.\n\nMen of genius differ from simple seers by their faculty of communicating sensibly to others that which they themselves perceive, and of making themselves believed by the force of enthusiasm and sympathy.\n\nSuch persons are the media of the Divine Word.\n\nLet us now specify the manner in which visions operate.\n\nAll forms correspond to ideas, and there is no idea which has not its proper and peculiar form.\n\nThe primordial light, which is the vehicle of all ideas, is the mother of all forms, and transmits them from emanation to emanation, merely diminished or modified according to the density of the media.\n\nSecondary forms are reflections which return to the font of the emanated light.\n\nThe forms of objects, being a modification of light, remain in the light where the reflection consigns them.\n\nHence the Astral Light, or terrestrial fluid, which we call the Great Magnetic Agent, is saturated with all kinds of images or reflections.\n\nNow, our soul can evoke these, and subject them to its DIAPHANE, as the Kabalists term it.\n\nSuch images are always present before us, and are effaced only by the more powerful impressions of reality during waking hours, or by preoccupation of the mind, which makes our imagination inattentive to the fluidic panorama of the Astral Light.\n\nWhen we sleep, this spectacle presents itself spontaneously before us, and in this way dreams are produced - dreams vague and incoherent if some governing will do not remain active during the sleep, giving, even unconsciously to our intelligence, a direction to the dream, which then transforms into vision.\n\nAnimal Magnetism is nothing but an artificial sleep produced by the voluntary or enforced union of two wills, one of which is awake while the other slumbers - that is, one of which directs the other in the choice of reflections for the transformation of dreams into visions and the attainment of truth by means of images.\n\nThus, somnambulists do not actually travel to the place where they are sent by the magnetizer; they evoke its images in the Astral Light and can behold nothing which does not exist in that light.\n\nThe Astral Light has a direct action on the nerves, which are its conductors in the animal economy, transmitting it to the brain.\n\nIt follows that, in a state of somnambulism, it is possible to see by means of the nerves, without being dependent on radiant light, the astral fluid being a latent light, in the same way that physics recognize the existence of a latent caloric.\n\nMagnetism between two persons is certainly a wonderful discovery, but the magnetizing of a person by himself, awakening his own lucidity and directing it himself at will, is the perfection of magical art."

