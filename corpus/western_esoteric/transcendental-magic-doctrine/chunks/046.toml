[content]
body = "The revealers have therefore done scarcely more than divine, by the accuracy of their calculations, the appropriate moment for moral reactions.\n\nThe law of realization produces what we call magnetic breathing; places and objects become impregnated therewith, and this imparts to them an influence in conformity with our dominant desires, with those above all which are confirmed and realized by acts.\n\nAs a fact, the Universal Agent, or latent Astral Light, ever seeks equilibrium; it fills the void and draws in the plenitude, which makes vice contagious, like certain physical maladies, and works powerfully in the proselytism of virtue.\n\nHence it is that cohabitation with antipathetic beings is a torment; hence it is that relics, whether of saints or of great criminals, produce extraordinary results in sudden conversion and perversion; hence it is that sexual love is often awakened by a breath or a touch, and this not only by means of contact with the person himself, but with objects which he has unconsciously touched or magnetized.\n\nThere is an outbreathing and inbreathing of the soul, exactly like that of the body.\n\nWhatsoever it regards as felicity, that it inhales, and it breathes forth ideas which result from its inner sensations.\n\nDiseased souls have an evil breath and vitiate their moral atmosphere - that is, they combine impure reflections with the Astral Light which permeates them and establish unwholesome currents therein.\n\nWe are often assailed, to our astonishment, in society by evil thoughts which would have seemed antecedently impossible and are not aware that they are due to some morbid proximity.\n\nThis secret is of high importance, for it leads to the unveiling of consciences, one of the most incontestible and terrible powers of Magical Art.\n\nMagnetic respiration produces about the soul a radiation of which it is the centre, and thus surrounds it with the reflection of its own works, creating for it a heaven or hell.\n\nThere are no isolated acts, and it is impossible that there should be secret acts; whatsoever we will truly, that is, everything which we confirm by our acts, remains registered in the Astral Light, where our reflections are preserved.\n\nThese reflections influence our thought continually by the mediation of the DIAPHANE, and it is in this sense that we become and remain the children of our works.\n\nThe Astral Light, transformed at the moment of conception into human light, is the soul's first envelope, and, in combination with extremely subtle fluids, it forms the Ethereal Body or Sidereal Phantom, of which Paracelsus discourses in his philosophy of intuition - philosophia sagax.\n\nThis sidereal body, being liberated at death, attracts and for a long time preserves, through the sympathy of things homogeneous, the reflections of the past life; if drawn into a special current by a will which is powerfully sympathetic, it manifests naturally, for there is nothing more natural than prodigies.\n\nIt is thus apparitions are produced.\n\nBut we shall develop this point more fully in a chapter devoted to Necromancy.\n\nThe fluidic body, subject, like the mass of the Astral Light, to two contrary movements, attracting on the left and repelling on the right, or reciprocally, between the two sexes, begets various impulses within us, and contributes to solicitudes of conscience; it is influenced frequently by reflections of other minds, and thus temptations are produced on the one hand, and on the other profound and unexpected graces.\n\nThe traditional doctrine of two angels who sustain and tempt us is explained in this manner.\n\nThe two forces of the Astral Light may be represented by a balance wherein are weighed our good intentions for the triumph of justice and the emancipation of our liberty."

