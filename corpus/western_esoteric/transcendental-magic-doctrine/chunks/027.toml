body = "Matthew, and in several Hebrew copies, as follows: “The sacred word MALKUTH substituted for KETHER, which is its kabalistic correspondent, and the equipoise of GEBURAH and CHESED, repeating itself in the circles of heavens called eons by the Gnostics, provided the keystone of the whole Christian Temple in this occult versicle.\n\nIt has been retained by Protestants in their New Testament, but they have failed to discern its lofty and wonderful meaning, which would have unveiled to them all the Mysteries of the Apocalypse.\n\nThere is, however, a tradition in the Church that the manifestation of these mysteries is reserved till the last times.\n\nMALKUTH, based upon GEBURAH and CHESED, is the Temple of Solomon having JAKIN and BOAZ for its Pillars; it is Adamite dogma, founded, for the one part on the resignation of Abel and, for the other, on the labours and self reproach of Cain; it is the equilibrium of being established on necessity and liberty, stability and motion; it is the demonstration of the universal lever sought in vain by Archimedes.\n\nA scholar whose talents were employed in the culture of obscurity, who died without seeking to be understood, resolved this supreme equation, discovered by him in the Kabalah, and was in dread of its source transpiring if he expressed himself more clearly.\n\nWe have seen one of his disciples and admirers most indignant, perhaps in good faith, at the suggestion that his master was a Kabalist; but we can state notwithstanding, to the glory of the same learned man, that his researches have shortened appreciably our work on the occult sciences, and that the key of the transcendent Kabalah above all, indicated in the arcane versicle cited above, has been applied skillfully to an absolute reform of all sciences in the books of Hoene Wronski.\n\nThe secret virtue of the gospels is therefore contained in three words, and these three words have established three dogmas and three hierarchies.\n\nAll science reposes upon three principles, as the syllogism upon three terms.\n\nThere are also three distinct classes, or three original and natural ranks, among men, who are called to advance from the lower to the higher.\n\nThe Jews term these three series or degrees in the progress of spirits, ASSIAH, YETZIRAH and BRIAH.\n\nThe Gnostics, who were Christian Kabalists, called them HYLE, PSYCHE and GNOSIS; by the Jews the supreme circle was named ATZILUTH, and by the Gnostics PLEROMA.\n\nIn the Tetra-gram, the triad, taken at the beginning of the word, expresses the divine copulation; taken at the end, it expressed the female and maternity.\n\nEve has a name of three letters, but the primitive Adam is signified simply by the letter JOD, whence Jehovah should be pronounced Jeva, and this point leads us to the great and supreme mystery of Magic, embodied in the tetrad."

