[content]
body = "Now, created spirits, being called to emancipation by trial, are placed from their birth between these four forces, two positive and two negative, and have it in their power to affirm or deny good, to choose life or death.\n\nTo discover the fixed point, that is, the moral centre of the Cross, is the first problem which is given them to resolve; their initial conquest must be that of their own liberty.\n\nThey begin by being drawn, some to the North, others to the South; some to the right, others to the left; and in so far as they are not free, they cannot have the use of reason, nor can they take flesh otherwise than in animal forms.\n\nThese unemancipated spirits, slaves of the four elements, are those which the Kabalists call elementary daimons, and they people the elements which correspond to their state of servitude.\n\nSylphs, undines, gnomes and salamanders really exist therefore, some wandering and seeking incarnation, others incarnate and living on this earth.\n\nThese are vicious and imperfect men.\n\nWe shall return to this subject in the fifteenth chapter, which treats of enchantments and demons.\n\nThat is also an occult tradition by which the ancients were led to admit the existence of four ages in the world, only it was not made known to the vulgar that these ages are successive and are renewed, like the four seasons of the year.\n\nThus, the golden age has passed, and it is yet to come.\n\nThis, however, belongs to the spirit of prophecy, and we shall speak of it in the ninth chapter, which is concerned with the initiate and the seer.\n\nIf we now add the idea of unity to the tetrad, we shall have, together and separately, the conceptions of the divine synthesis and analysis, the god of the initiates and that of the profane.\n\nHere the doctrine becomes more popular, as it passes from the domain of the abstract: the grand hierophant intervenes."

