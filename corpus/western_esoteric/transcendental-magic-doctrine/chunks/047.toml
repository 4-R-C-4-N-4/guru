[content]
body = "The Astral Body is not always of the same sex as the terrestrial, that is, the proportions of the two forces, varying from right to left, seem frequently to belie the visible organization, producing seeming aberrations of human passion and explaining, while in no wise morally justifying, the amorous peculiarities of Anacreon or Sappho.\n\nA skilful magnetizer should take all these subtle distinctions into account, and we shall provide in our “Ritual” the rules for their recognition.\n\nThere are two kinds of realization, the true and the fantastic.\n\nThe first is the exclusive secret of magicians, the other belongs to enchanters and sorcerers.\n\nMythologies are fantastic realizations of religious dogma; superstitions are the sorcery of mistaken piety; but even mythologies and superstitions are more efficacious on human will than a purely speculative philosophy apart from any practice.\n\nHence St.\n\nPaul opposes the conquests of the folly of the Cross to the inertness of human wisdom.\n\nReligion realizes philosophy by adapting it to the weaknesses of the vulgar; such is for Kabalists the secret reason and occult explanation of the doctrines of incarnation and redemption.\n\nThoughts untranslated into speech are thoughts lost for humanity; words unconfirmed by acts are idle words, and the idle word is not far removed from falsehood.\n\nThought formulated by speech and confirmed by acts constitutes a good work or a crime.\n\nHence, whether in vice or virtue, there is no utterance for which we are not responsible; above all, there are no indifferent acts.\n\nCurses and blessings produce their consequence invariably, and every action, whatsoever its nature, whether inspired by love or hate, has effects analogous to its motive, its extent and its direction.\n\nWhen that emperor whose images had been mutilated, raising his hand to his face, exclaimed, “I do not feel that I am injured,” he was mistaken in his valuation and detracted thereby from the merit of his clemency.\n\nWhat man of honour could behold undisturbed an insult offered to his portrait?\n\nAnd did such insults, inflicted even unknown to ourselves, react on us by a fatal influence, were the effects of bewitchment actual, as indeed an adept cannot doubt, how much more imprudent and ill-advised would seem this utterance of the good emperor!\n\nThere are persons whom we can never offend with impunity, and if the injury we have done them is mortal, we begin forthwith to die.\n\nThere are those also whom we never meet in vain, whose mere glance alters the direction of our life.\n\nThe basilisk who slays by a look is no fable; it is a magical allegory.\n\nGenerally speaking, it is bad for health to have enemies, and we can never brave with impunity the reprobation of anyone.\n\nBefore opposing ourselves to a given force or current, we must be well assured that we possess the contrary force, or are with the stream of the contrary current; otherwise, we shall be crushed or struck down, and many sudden deaths have no other cause than this.\n\nThe terrible visitations of Nadab and Abihu, of Osa, of Ananias and Sapphira, were occasioned by electric currents of outraged convictions; the sufferings of the Ursulines of Loudun, the nuns of Louviers and the convulsionaries of Jansenism, were identical in principle and are explicable by the same occult natural laws."

