[content]
body = "The original alliance between Christianity and the Science of the Magi, once demonstrated fully, will be a discovery of no second-rate importance, and we do not doubt that the serious study of Magic and the Kabalah will lead earnest minds to a reconciliation of science and dogma, of reason and faith, heretofore regarded as impossible.\n\nWe have said that the Church, whose special office is the custody of the Keys, does not pretend to possess those of the Apocalypse or of Ezekiel.\n\nIn the opinion of Christians the scientific and magical Clavicles of Solomon are lost, which notwithstanding, it is certain that, in the domain of intelligence, ruled by the Word nothing that has been written can perish.\n\nWhatsoever men cease to understand exists for them no longer, at least in the order of the Word, and it passes then into the domain of enigma and mystery.\n\nFurthermore, the antipathy and even open war of the Official Church against all that belongs to the realm of Magic, which is a kind of personal and emancipated priesthood, is allied with necessary and even with inherent causes in the social and hierarchic constitution of Christian sacerdotalism.\n\nThe Church ignores Magic - for she must either ignore it or perish, as we shall prove later on; yet she does not recognize the less that her mysterious Founder was saluted in His cradle by Three Magi - that is to say, by the hieratic ambassadors of the three parts of the known world and the three analogical worlds of occult philosophy.\n\nIn the School of Alexandria, Magic and Christianity almost joined hands under the auspices of Ammonius Saccas and of Plato; the doctrine of Hermes is found almost in its entirety in the writings attributed to Dionysius the Areopagite; Synesius outlined the plan of a treatise on dreams, which was annotated subsequently by Cardan, and composed hymns that might have served for the liturgy of the Church of Swedenborg, could a church of the illuminated possess a liturgy.\n\nWith this period of fiery abstractions and impassioned warfare of words there must be connected also the philosophic reign of Julian, called the Apostate because in his youth he made unwilling profession of Christianity.\n\nEveryone is aware that Julian had the misfortune to be a hero out of season of Plutarch, and that he was, if one may say so, the Don Quixote of roman Chivalry; but what most people do not know is that he was one of the illuminated and an initiate of the first order: that he believed in the unity of God and in the universal doctrine of the Trinity; that, in a word, he regretted nothing of the old world but its magnificent symbols and its too gracious images.\n\nJulian was not a pagan; he was a Gnostic allured by the allegories of Greek polytheism, who had the misfortune to find the name of Jesus Christ less sonorous than that of Orpheus.\n\nThe Emperor paid in his person for the academical tastes of the philosopher and rhetorician, and after affording himself the spectacle and satisfaction of expiring like Epaminondas with the periods of Cato, he had in public opinion, by this time fully Christianized, but anathemas for his funeral oration and a scornful epithet for his ultimate memorial.\n\nLet us pass over the petty minds and small matters of the Bas-Empire, and proceed to the Middle Ages .\n\n.\n\n.\n\n.\n\nStay, take this book!\n\nGlance at the seventh page, then seat yourself on the mantle which I am spreading, and let each of us cover our eyes with one of its corners .\n\n.\n\n.\n\n.\n\nYour head swims, does it not, and the earth seems to fly beneath your feet?\n\nHold tightly, and do not look right or left .\n\n.\n\n.\n\n.\n\nThe vertigo ceases: we are here."

