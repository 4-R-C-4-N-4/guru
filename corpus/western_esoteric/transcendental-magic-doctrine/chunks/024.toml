[content]
body = "PLENITUDO VOCIS BINAH PHYSIS The perfect word is the triad, because it supposes an intelligent principle, a speaking principle and a principle spoken.\n\nThe Absolute, revealed by speech, endows this speech with a sense equivalent to itself, and in the understanding thereof creates its third self.\n\nSo also the sun manifests by its light and proves or makes this manifestation efficacious by heat.\n\nThe triad is delineated in space by the heavenly zenith, the infinite height, connected with East and West by two straight diverging lines.\n\nWith this visible triangle reason compares another which is invisible, but is assumed to be equal in dimension; the abyss is its apex and its reversed base is parallel to the horizontal line stretching from East to West.\n\nThese two triangles, combined in a single figure, which is the six-pointed star, form the sacred symbol of Solomon's Seal, the resplendent Star of the Macrocosm.\n\nThe notion of the Infinite and the Absolute is expressed by this sign, which is the grand pantacle - that is to say, the most simple and complete abridgement of the science of all things.\n\nGrammar itself attributes three persons to the verb.\n\nThe first is that which speaks, the second that which is spoken to, and the third the object.\n\nIn creating, the Infinite Prince speaks to Himself of Himself.\n\nSuch is the explanation of the triad and the origin of the dogma of the Trinity.\n\nThe magical dogma is also one in three and three in one.\n\nThat which is above is like or equal to that which is below.\n\nThus, two things which resemble one another and the word which signifies their resemblance make three.\n\nThe triad is the universal dogma.\n\nIn Magic - principle, realization, adaptation; in alchemy - azoth, incorporation, transmutation; in theology - God, incarnation, redemption; in the human soul - thought, love and action; in the family - father, mother and child.\n\nThe triad is the end and supreme expression of love; we seek one another as two only to become three.\n\nThere are three intelligible worlds which correspond one with another by hierarchic analogy; the natural or physical, the spiritual or metaphysical, and the divine or religious worlds.\n\nFrom this principle follows the hierarchy of spirits, divided into three orders, and again subdivided by the triad in each of these.\n\nAll these revelations are logical deductions from the first mathematical notions of being and number.\n\nUnity must multiply itself in order to become active.\n\nAn indivisible, motionless and sterile principle would be unity dead and incomprehensible.\n\nWere God only one He would never be Creator or Father.\n\nWere He two there would be antagonism or division in the infinite, which would mean the division also or death of all possible things.\n\nHe is therefore three for the creation by Himself and in His image of the infinite multitude of beings and numbers.\n\nSo is He truly one in Himself and triple in our conception, which also leads us to behold Him as triple in Himself and one in our intelligence and our love.\n\nThis is a mystery for the faithful and a logical necessity for the initiate into absolute and real sciences.\n\nThe Word manifested by life is realization or incarnation.\n\nThe life of the Word accomplishing its cyclic movement is adaptation or redemption.\n\nThis triple dogma was known in all sanctuaries illuminated by the tradition of the sages.\n\nDo you wish to ascertain which is the true religion?\n\nSeek that which realizes most in the Divine Order, which humanizes God and makes man divine, which preserves the triadic dogma intact, which clothes the Word with flesh by making God manifest to the hands and eyes of the most ignorant, which in fine appeals to all in its doctrine and can adapt itself to all - the religion which is hierarchic and cyclic, having allegories and images for children, an exalted philosophy for grown men, sublime hopes and sweet consolations for the old."

