body = "These shells, envelopes petrified or carnified, were such an expression possible, are the source of errors or of evil, which connects with the heaviness and hardness of animal envelopes.\n\nIn the book Zohar , and in that of the Revolution of Souls, perverse spirits or evil demons are never called otherwise than shells - cortices .\n\nThe cortices of the world of spirits are transparent, while those of the material world are opaque.\n\nBodies are only temporary shells, whence souls have to be liberated; but those who in this life obey the flesh build up an interior body or fluidic shell, which, after death, becomes their prison-house and torment, until the time arrives when they succeed in dissolving it in the warmth of the divine light, towards which, however, the burden of their grossness hinders them from ascending.\n\nIndeed, they can do so only after infinite struggles, and by the mediation of the just, who stretch forth their hands towards them.\n\nDuring the whole period of the process they are devoured by the interior activity of the captive spirit, as in a burning furnace.\n\nThose who attain the pyre of expiation burn themselves thereon, like Hercules upon Mount Oetna, and so are delivered from their sufferings; but the courage of the majority fails before this ordeal, which seems to them a second death more appalling than the first, and so they remain in hell, which is rightly and actually eternal; but souls are never precipitated nor even retained despite themselves therein.\n\nThe three worlds correspond together by means of the thirty-two paths of light, which are as steps of a sacred ladder.\n\nEvery true thought corresponds to a Divine Grace in heaven and a good work on earth; every Grace of God manifests a truth, and produces one or many acts; reciprocally, every act affects a truth or falsehood in the heavens, a grace or a punishment.\n\nWhen a man pronounces the Tetragram - say the Kabalists - the nine celestial realms sustain a shock, and then all spirits cry out one upon another: “Who is it thus disturbing the kingdom of heaven?” Then does the earth communicate unto the first sphere the sins of that rash being who takes the Eternal Name in vain, and the accusing word is transmitted from circle to circle, from star to star, and from hierarchy to hierarchy.\n\nEvery utterance possesses three senses, every act has a triple range, every form a triple idea, for the Absolute corresponds from world to world by its forms.\n\nEvery determination of human will modifies Nature, concerns philosophy and is written in heaven.\n\nThere are consequently two fatalities, one resulting from the Uncreated Will in harmony with its proper wisdom, the other from created wills in accordance with the necessity of secondary causes in their correspondence with the First Cause.\n\nThere is hence nothing indifferent in life, and our seeming most simple resolutions do often determine an incalculable series of benefits or evils, above all in the affinities of our DIAPHANE with the Great Magical Agent, as we shall explain elsewhere.\n\nThe triad, being the fundamental principle of the whole Kabalah, or Sacred Tradition of our fathers, was necessarily the fundamental dogma of Christianity, the apparent dualism of which it explains by the intervention of a harmonious and all-powerful unity.\n\nChrist did not put His teaching into writing, and only revealed it in secret to His favoured disciple, the one Kabalist, and he a great Kabalist, among the apostles.\n\nSo is the Apocalypse the book of the Gnosis or Secret Doctrine of the first Christians, and the key of this doctrine is indicated by an occult versicle of the Lord's Prayer, which the Vulgate leaves untranslated, while in the Greek Rite, which preserves the traditions of St.\n\nJohn, the priests only are permitted to pronounce it.\n\nThis versicle, completely kabalistic, is found in the Greek text of the Gospel according to St."

