[content]
body = "You are possibly without the materials; I should like to show you a complete magical cabinet, but I must exact beforehand the most inviolable silence.\n\nIf you will not give me this pledge upon your honour, I shall give orders for you to be driven to your hotel.” I made the required promise and keep it faithfully by not divulging the name, position or abode of this lady, whom I soon recognized as an initiate, not exactly of the first order, but still of a most exalted grade.\n\nWe had a number of long conversations, in the course of which she insisted always upon the necessity of practical experience to complete initiation.\n\nShe showed me a collection of magical vestments and instruments, lent me some rare books which I needed; in short, she determined me to attempt at her house the experiment of a complete evocation, for which I prepared during a period of twenty one days, scrupulously observing the rules laid down in the thirteenth chapter of the “Ritual”.\n\nThe preliminaries terminated on 2nd July; it was proposed to evoke the phantom of the divine Apollonius and interrogate it upon two secrets, one which concerned myself and one which interested the lady.\n\nShe had counted on taking part in the evocation with a trustworthy person, who, however, proved nervous at the last moment, and, as the triad or unity is indispensable for Magical Rites, I was left to my own resources.\n\nThe cabinet prepared for the evocation was situated in a turret; it contained four concave mirrors and a species of altar having a white marble top, encircled by a chain of magnetized iron.\n\nThe Sign of the Pentagram, as given in the fifth chapter of this work, was graven and gilded on the white marble surface; it was inscribed also in various colours upon a new white lambskin stretched beneath the altar.\n\nIn the middle of the marble table there was a small 1 copper chafing-dish, containing charcoal of alder and laurel wood; another chafing-dish was set before me on a tripod.\n\nI was clothed in a white garment, very similar to the alb of our catholic priests, but longer and wider, and I wore upon my head a crown of vervain leaves, intertwined with a golden chain.\n\nI held a new sword in one hand, and in the other the “Ritual”.\n\nI kindled two fires with the requisite prepared substances, and began reading the evocations of the “Ritual” in a voice at first low, but rising by degrees.\n\nThe smoke spread, the flame caused the objects upon which it fell to waver, then it went out, the smoke still floating white and slow about the marble altar; I seemed to feel a quaking of the earth, my ears tingled, my heart beat quickly.\n\nI heaped more twigs and perfumes on the chafing-dishes, and as the flame again burst up, I beheld distinctly, before the altar, the figure of a man of more than normal size, which dissolved and vanished away.\n\nI recommenced the evocations and placed myself within a circle which I had drawn previously between the tripod and the altar.\n\nThereupon the mirror which was behind the altar seemed to brighten in its depth, a wan form was outlined therein, which increased and seemed to approach by degrees.\n\nThree times, and with closed eyes, I invoked Apollonius.\n\nWhen I again looked forth there was a man in front of me, wrapped from head to foot in a species of shroud, which seemed more grey than white.\n\nHe was lean, melancholy and beardless, and did not altogether correspond to my preconceived notion of Apollonius.\n\nI experienced an abnormally cold sensation, and when I endeavoured to question the phantom I could not articulate a syllable."

