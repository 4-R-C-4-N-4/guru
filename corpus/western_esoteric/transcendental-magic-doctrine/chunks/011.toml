[content]
body = "The Kabalah alone consecrates the alliance of universal reason and the Divine Word; it establishes by the counterpoise of two forces in apparent opposition, the eternal balance of being; it alone reconciles reason with faith, power with liberty, science with mystery: it has the keys of the present, past and future!\n\nTo become initiated into the Kabalah it is insufficient to read and to meditate upon the writings of Reuchlin, Galatinus, Kircher, or Picus de Mirandola; it is necessary to study and understand the Hebrew writers in the collection of Pistorius, the Sepher Yetzirah above all; it is essential in particular to master the great book Zohar, to investigate the collection of 1684, entitled Kabbala Denudata, especially the treatise on “Kabalistic Pneumatics” and that on the “Revolution of Souls”; and afterwards to enter boldly into the luminous darkness of the whole dogmatic and allegorical body of the Talmud.\n\nWe shall be then in a position to understand William Postel, and shall admit secretly that - apart from his very premature and overgenerous dreams about the emancipation of women - this celebrated, learned, illuminated man could not have been so mad as is pretended by those who have not read him.\n\nWe have sketched rapidly the history of occult philosophy; we have indicated its sources and analysed in a few words its chief memorials.\n\nThe present division of our work refers only to the science, but Magic, or rather magical power, comprehends two things, a science and a force: without the force the science is nothing, or rather it is a danger.\n\nTo give knowledge to power alone, such is the supreme law of initiations.\n\nHence did the Great Revealer say: 'The kingdom of heaven suffereth violence, and the violent only shall carry it away.' The door of truth is closed, like the sanctuary of a virgin: he must be a man who would enter.\n\nAll miracles are promised to faith, and what is faith except the audacity of will which does not hesitate in the darkness, but advances towards the light in spite of all ordeals, and surmounting all obstacles?\n\nIt is unnecessary to repeat here the history of ancient initiations: the more dangerous and terrible they were, the greater was their efficacy.\n\nHence, in those days, the world had men to govern and instruct it.\n\nThe Sacerdotal Art and the Royal Art consisted above all in ordeals of courage, discretion and will.\n\nIt was a novitiate similar to that of those priests who, under the name of Jesuits, are so unpopular at the present day, but would govern the world notwithstanding, had they a truly wise and intelligent chief.\n\nAfter passing our life in the search for the Absolute in religion, science and justice; after revolving in the circle of Faust, we have reached the primal doctrine and the first book of humanity.\n\nAt this point we pause, having discovered the secret of human omnipotence and indefinite progress, the key of all symbolisms, the first and final doctrine: we have come to understand what was meant by that expression so often made use of in the Gospel - the Kingdom of God.\n\nTo provide a fixed point as a fulcrum for human activity is to solve the problem of Archimedes, by realizing the use of his famous lever.\n\nThis it is which was accomplished by the great initiators who have electrified the world, and they could not have done so except by means of the Great and Incommunicable Secret.\n\nHowever, as a guarantee of its renewed youth, the symbolical phoenix never reappeared before the eyes of the world without having consumed solemnly the remains and evidences of its previous life.\n\nSo also Moses saw to it that all those who had known Egypt and her mysteries should end their life in the desert; at Ephesus St."

