[content]
body = "Let the wise man seek it not, since he has already found it; let the profane seek for ever: they will never find.\n\nMetallic transmutation takes place spiritually and materially by the positive key of analogies.\n\nOccult medicine is simply the exercise of the will applied to the very source of life, to that Astral Light the existence of which is a fact, which has a movement conformed to calculations having the Great Magical Arcanum for their ascending and scale.\n\nThis Universal Arcanum, the final and eternal secret of transcendent initiation, is represented in the Tarot by a naked girl, who touches the earth only by one foot, has a magnetic rod in each hand, and seems to be running in a crown held up by an angel, an eagle, a bull and a lion.\n\nFundamentally, the figure is analogous to the cherub of Jekeskiel, of which a representation is given, and to the Indian symbol of ADDA-NARI, which again is analogous to the ADONAI of Jekeskiel, who is vulgarly called Ezekiel.\n\nThe comprehension of this figure is the key of all occult sciences.\n\nReaders of my book must already understand it philosophically if they are at all familiar with the symbolism of the Kabalah.\n\nIt remains for us now to realize what is the second and more important operation of the Great Work.\n\nIt is something undoubtedly to find the Philosophical Stone, but how is it to be ground into the powder of projection?\n\nWhat are the uses of the Magical Wand?\n\nWhat is the real power of the Divine Names in the Kabalah?\n\nThe initiates know, and those who are deserving of initiation will know in turn if they discover the Great Arcanum by means of the very numerous and precise indications which we have given them.\n\nWhy are these simple and pure truths for ever and of necessity concealed?\n\nBecause the elect of intelligence are always few on earth and are encompassed by the foolish and wicked, like Daniel in the den of lions.\n\nMoreover, analogy instructs us in the laws of the hierarchy, and absolute science, being an omnipotence, must be the exclusive possession of the most worthy.\n\nThe confusion of the hierarchy is the actual destruction of societies, for then the blind become leaders of the blind, according to the word of the Master.\n\nGive back initiation to priests and kings, and order will come forth anew.\n\nSo, in my appeal to the most worthy, and in exposing myself to all the dangers and anathemas which threaten revealers, I believe myself to have done a great and useful thing, directing the breath of God living in humanity upon the social chaos, and creating priests and kings for the world to come.\n\nA thing is not just because God wills it, but God wills it because it is just, said the angel of the schools.\n\nIt is as if he said: The Absolute is reason.\n\nReason is self-existent; it is because it is, and not because we suppose it; it is, or nothing is; and how should one desire anything to exist apart from reason?\n\nMadness itself does not occur without it.\n\nReason is necessity, is law, is the rule of all liberty and the direction of all initiative.\n\nIf God exists, it is by reason.\n\nThe conception of an absolute God outside or independent of reason is the idol of Black Magic and the phantom of the fiend.\n\nThe demon is death masquerading in the tattered garments of life, the spectre of Hirrenkesept throned upon the rubbish of ruined civilizations, and concealing a loathsome nakedness by the cast-off clothes of the incarnations of Vishnu."

