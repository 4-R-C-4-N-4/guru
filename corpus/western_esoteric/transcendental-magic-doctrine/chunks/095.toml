[content]
body = "SIGNA TROT PAN LET us now summarize the entire science by its principles.\n\nAnalogy is the final word of science and the first word of faith.\n\nHarmony consists in equilibrium, and equilibrium subsists by the analogy of contraries.\n\nAbsolute unity is the supreme and final reason of things.\n\nNow, this reason can be neither one person nor three persons: it is a reason, and reason at the highest.\n\nTo create equilibrium we must separate and unite - separate by the poles, unite by the centre.\n\nTo reason upon faith is to destroy faith; to create mysticism in philosophy is to assail reason.\n\nReason and faith, by their nature, mutually exclude one another, but they unite by analogy.\n\nAnalogy is the sole possible mediator between finite and infinite.\n\nDogma is the ever-ascending hypothesis of a presumable equation.\n\nFor the ignorant, it is the hypothesis which is the absolute affirmation, and the absolute affirmation which is hypothesis.\n\nHypotheses are necessary in science, and he who seeks to verify them enlarges science without decreasing faith, for on the farther side of faith is the infinite.\n\nWe believe in that which we do not know, but which reason leads us to admit.\n\nTo define and circumscribe the object of faith is therefore to formulate the unknown.\n\nProfessions of faith are formulations of the ignorance and aspirations of man.\n\nThe theorems of science are monuments of his conquests.\n\nThe man who denies God is not less fanatical than he who defines Him with pretended infallibility.\n\nGod is commonly defined by the enumeration of all that He is not.\n\nMan makes God by an analogy from the lesser to the greater, whence it results that the conception of God by man is ever that of an infinite man who makes man a finite god.\n\nMan can realize that which he believes in the measure of that which he knows, by reason of that which he knows not, and he can accomplish all that he wills in the measure of that which he believes and by reason of that which he knows.\n\nThe analogy of contraries is the relation of light and shade, of height and hollow, of plenum and void.\n\nAllegory, the mother of all dogmas, is the substitution of impressions for dies, of shadows for realities.\n\nIt is the fable of truth and the truth of fable.\n\nOne does not invent a dogma, one veils a truth, and a shade for weak eyes is produced.\n\nThe initiator is not an impostor, he is a revealer, that is, following the meaning of the Latin word revelare, a man who veils afresh.\n\nHe is the creator of a new shadow.\n\nAnalogy is the key of all secrets of Nature and the sole fundamental reason of all revelations.\n\nThat is why religions seem to be written in the heavens and in all Nature, which is just as it should be, for the work of God is the book of God, the expression of Whose thought should be seen in that which He writes, and so also of His being, since we conceive Him only as supreme thought.\n\nDupuis and Volney saw only a plagiarism in this splendid correspondence, which should have led them to acknowledge the catholicity, that is, the universality of the primeval, one, magical, kabalistic and immutable doctrine of revelation by analogy.\n\nAnalogy yields all forces of Nature to the Magus; analogy is the quintessence of the Philosophical Stone, the secret of perpetual motion, the quadrature of the circle, the Temple resting on the two pillars JAKIN and BOAZ, the key of the Great Arcanum, the root of the Tree of Life, the science of good and evil.\n\nTo find the exact scale of correspondences in things appreciable by science is to fix the bases of faith and thus become possessed of the rod of miracles.\n\nNow, there exists a principle and a rigorous formula, which is the Great Arcanum."

