[content]
body = "The Philosophical Stone, the Universal Medicine, the transmutation of metals, the quadrature of the circle and the secret of perpetual motion are neither mystifications of science nor dreams of delusion.\n\nThey are terms which must be understood in their proper sense; they formulate the varied applications of one and the same secret, the several aspects of a single operation, which is defined in a more comprehensive manner under the name of the Great Work.\n\nFurthermore, there exists in Nature a force which is immeasurably more powerful than steam, and a single man, who is able to adapt and direct it, might change thereby the face of the whole world.\n\nThis force was known to the ancients; it consists in a Universal Agent having equilibrium for its supreme law, while its direction is concerned immediately with the Great Arcanum of Transcendental Magic.\n\nBy the direction of this agent it is possible to modify the very order of the seasons; to produce at night the phenomena of day; to correspond instantaneously between one extremity of the earth and the other; to see, like Apollonius, what is taking place on the other side of the world; to heal or injure at a distance; to give speech a universal success and reverberation.\n\nThis agent, which barely manifests under the uncertain methods of Mesmer's followers, is precisely that which the adepts of the Middle Ages denominated the First Matter of the Great Work.\n\nThe Gnostics represented it as the fiery body of the Holy Spirit; it was the object of adoration in the Secret Rites of the Sabbath and the Temple, under the hieroglyphic figure of Baphomet or the Androgyne of Mendes.\n\nAll this will be proved.\n\nHere then are the secrets of occult philosophy, and such is Magic in history.\n\nLet us glance at it now as it appears in its books and its acts, in its Initiations and its Rites.\n\nThe key of all magical allegories is found in the tablets which we have mentioned, and these tablets we regard as the work of Hermes.\n\nAbout this book, which may be called the keystone of the whole edifice of occult science, are grouped innumerable legends that are either its partial translation or its commentary reproduced perpetually, under a thousand varied forms.\n\nSometimes the ingenious fables combine harmoniously into a great epic which characterizes an epoch, though how or why is not clear to the uninitiated.\n\nThus, the fabulous history of the Golden Fleece resumes and also veils the Hermetic and magical doctrines of Orpheus; and if we recur only to the mysterious poetry of Greece, it is because the sanctuaries of Egypt and India to some extent dismay us by their resources, leaving our choice embarrassed in the midst of such abundant wealth.\n\nWe are eager, moreover, to reach the Thebaid at once, that dread synthesis of all doctrine, past, present and future; that - so to speak - infinite fable, which reaches, like the Deity of Orpheus, to either end of the cycle of human life.\n\nExtraordinary fact!\n\nThe seven gates of Thebes, attacked and defended by seven chiefs who have sworn upon the blood of victims, possess the same significance as the seven seals of the Sacred Book interpreted by seven genii and assailed by a monster with seven heads, after being opened by a Lamb which liveth and was dead, in the allegorical work of St.\n\nJohn.\n\nThe mysterious origin of Oedipus, found hanging on the tree of Cithaeron like a bleeding fruit, recalls the symbols of Moses and the narratives of Genesis.\n\nHe makes war upon his father, whom he slays without knowing - tremendous prophecy of the blind emancipation of reason apart from science."

