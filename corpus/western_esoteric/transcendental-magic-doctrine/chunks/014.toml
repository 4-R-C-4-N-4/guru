[content]
body = "DISCIPLINA ENSOPH KETHERI WHEN a philosopher adopted as the basis for a new apocalypse of human wisdom the axiom: “I think, therefore I am”, in a measure he altered unconsciously, from the standpoint of Christian Revelation, the old conception of the Supreme Being.\n\nI am that I am, said the Being of beings of Moses.\n\nI am he who thinks, says the man of Descartes, and to think being to speak inwardly, such a one may affirm, like the God of St.\n\nJohn the Evangelist: I am he in whom and by whom the word manifests – In principio eras verbum.\n\nNow, what is this principle?\n\nIt is a groundwork of speech, it is a reason for the existence of the word.\n\nThe essence of the word is in the principle; the principle is that which is; intelligence is a principle which speaks.\n\nWhat further is intellectual light?\n\nIt is speech.\n\nWhat is revelation?\n\nIt is speech also, being is the principle, speech is the means, and the plenitude or development and perfection of being is the end.\n\nTo speak is to create.\n\nBut to say: “I think, therefore I exist”, is to argue from consequence to principle, and certain contradictions which have been adduced by a great writer, Lamennais, have proved abundantly the philosophical unsoundness of this method.\n\nI am, therefore something exists might seem to be a more primitive and simple foundation for experimental philosophy.\n\nI AM, THEREFORE BEING EXISTS.\n\nEgo sum qui sum, such is the first revelation of God in man and of man in the world, while it is also the first axiom of occult philosophy.\n\n.\n\nBeing is being.\n\nHence this philosophy, having that which is for its principle, can be in no sense hypothesis or guesswork.\n\nMercurius Trismegistus begins his admirable symbol known under the name of the “Emerald Table,” by this threefold affirmation: “It is true, it is certain without error, it is of all truth.” Thus, in physics, the true confirmed by experience; in philosophy, certitude purged from any alloy of error; in the domain of religion or the infinite, absolute truth indicated by analogy: such are the first necessities of true science, and Magic only can impart these to its adepts.\n\nBut you, before all things, who are you, thus taking this work in your hands and proposing to read it?\n\nOn the pediment of a temple consecrated by antiquity to the God of Light was an inscription of two words: “Know thyself.” I impress the same counsel on every man when he seeks to approach science.\n\nMagic, which the men of old denominated the SANCTUM REGNUM, the Holy Kingdom, or Kingdom of God, REGNUM Dei, exists only for kings and for priests.\n\nAre you priests?\n\nAre you kings?\n\nThe priesthood of Magic is not a vulgar priesthood, and its royalty enters not into competition with the princes of this world.\n\nThe monarchs of science are the priests of truth, and their sovereignty is hidden from the multitude, like their prayers and sacrifices.\n\nThe kings of science are men who know the truth and them the truth has made free, according to the specific promise given by the most mighty of all initiators.\n\nThe man who is enslaved by his passions or worldly prejudices can be initiated in no wise; he must reform or he will never attain; meanwhile he cannot be an adept, for this word signifies a person who has achieved by will and by work.\n\nThe man who loves his own opinions and fears to part with them, who suspects new truths, who is unprepared to doubt everything rather than admit anything on chance, should close this book: for him it is useless and dangerous."

