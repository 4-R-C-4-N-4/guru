[content]
body = "Thereafter he meets with the sphinx, that symbol of symbols, the eternal enigma of the vulgar, the granite pedestal of the sciences of the sages, the voracious and silent monster whose unchanging form expresses the one dogma of the Great Universal Mystery.\n\nHow is the tetrad changed into the duad and explained by the triad?\n\nIn more common but more emblematic terms, what is that animal which in the morning has four feet, two at noon, and three in the evening?\n\nPhilosophically speaking, how does the doctrine of elementary forces produce the dualism of Zoroaster, while it is summarized by the triad of Pythagoras and Plato?\n\nWhat is the ultimate reason of allegories and numbers, the final message of all symbolisms?\n\nOedipus replies with a simple and terrible word which destroys the sphinx and makes the diviner King of Thebes: the answer to the enigma is Man!\n\n.\n\n.\n\n.\n\nUnfortunate!\n\nHe has seen too much, and yet through a clouded glass.\n\nA little while and he will expiate his ominous and imperfect clairvoyance by a voluntary blindness, and then vanish in the midst of a storm, like all civilizations which - each in its own day - shall divine an answer to the riddle of the sphinx without grasping its whole import and mystery.\n\nEverything is symbolical and transcendental in this titanic epic of human destinies.\n\nThe two antagonistic brothers formulate the second part of the Grand Mystery, completed divinely by the sacrifice of Antigone.\n\nThere follows the last war; the brethren slay one another; Capaneus is destroyed by the lightning which he defies; Amphiaraus is swallowed by the earth; and all these are so many allegories which, by their truth and their grandeur, astonish those who can penetrate their triple hieratic sense.\n\nAeschylus, annotated by Ballanche, gives only a weak notion concerning them, whatever the primeval sublimities of the Greek poet or the ingenuities of the French critic.\n\nThe secret book of antique initiation was not unknown to Homer, who outlines its plan and chief figures on the shield of Achilles, with minute precision.\n\nBut the gracious Homeric fictions replaced too soon in popular memory the simple and abstract truths of primeval revelation.\n\nHumanity clung to the form and allowed the idea to be forgotten; signs lost power in their multiplication; Magic became corrupted also at this period, and degenerated with the sorcerers of Thessaly into the most profane enchantments.\n\nThe crime of Oedipus brought forth its deadly fruits, and the science of good and evil erected evil into a sacrilegious divinity.\n\nMen, weary of the light, took refuge in the shadow of bodily substance; the dream of that void which is filled by God seemed in their eyes to be greater than God Himself, and thus hell was created.\n\nWhen, in the course of this work, we make use of the consecrated terms God, Heaven and Hell, let it be understood, once and for all, that our meaning is as far removed from that which the profane attach to them as initiation is remote from vulgar thought.\n\nGod, for us, is the AZOT of the sages, the efficient and final principle of the Great Work.\n\nReturning to the fable of Oedipus, the crime of the King of Thebes was that he failed to understand the sphinx; that he destroyed the scourge of Thebes without being pure enough to complete the expiation in the name of his people.\n\nThe plague, in consequence, avenged speedily the death of the monster, and the King of Thebes, forced to abdicate, sacrificed himself to the terrible manes of the sphinx, more alive and voracious than ever when it had passed from the domain of form into that of idea."

