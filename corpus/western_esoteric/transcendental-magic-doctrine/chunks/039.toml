[content]
body = "Love is one of the great instruments of magical power, but it is categorically forbidden to the Magus, at least as an intoxication or passion.\n\nWoe to the Samson of the Kabalah if he permit himself to be put asleep by Delilah!\n\nThe Hercules of science, who exchanges his royal sceptre for the distaff of Omphale, will soon experience the vengeance of Dejanira, and nothing will be left for him but the pyre of Mount Oetna, in order to escape the devouring folds of the coat of Nessus.\n\nSexual love is ever an illusion, for it is the result of an imaginary mirage.\n\nThe Astral Light is the universal seducer, typified by the serpent of Genesis.' This subtle agent, ever active, ever vigorous, ever fruitful in alluring dreams and sensuous images; this force, which of itself is blind and subordinated to every will, whether for good or evil; this ever-renewing circulus of unbridled life, which produces vertigo in the imprudent; this corporeal spirit; this fiery body; this impalpable omnipresent ether; this monstrous seduction of Nature - how shall we define it comprehensively and how characterize its action?\n\nTo some extent indifferent in itself, it lends itself to good as to evil; it transmits light and propagates darkness; it may be called equally Lucifer and Lucifuge; it is a serpent but it is also an aureole; it is a fire, but it may belong equally to the torments of infernus or the sacrifice of incense offered up to heaven.\n\nTo dispose of it, we must, like the predestined woman, set our foot upon its head.\n\nIn the elementary world water corresponds to the kabalistic woman and fire to the serpent.\n\nTo subdue the serpent, that is, to govern the circle of the Astral Light, we must place ourselves outside its currents: in other words, we must isolate ourselves.\n\nFor this reason Apollonius of Tyana wrapped himself completely in a mantle of fine wool, setting his feet thereon and drawing it over his head.\n\nThen he bent his back in semicircular fashion, and closed his eyes, after performing certain rites - probably magnetic passes and sacramental words, designed to fix imagination and determine the action of will.\n\nThe woollen mantle is of great use in Magic and was the common conveyance of sorcerers on their way to the Sabbath, which proves that the sorcerers did not really go to the Sabbath, but the Sabbath came to the sorcerers, when isolated in their mantle, and brought before their TRANSLUCID images analogous to their magical preoccupations, combined with reflections of all kindred acts accomplished previously in the world.\n\nThis torrent of universal life is represented also in religious doctrines by the expiatory fire of hell.\n\nIt is the instrument of initiation, the monster to be overcome, the enemy to subdue; it is this which brings to our evocations and to the conjurations of Goetic Magic such swarms of larvae and phantoms.\n\nTherein are preserved all the fantastic and fortuitous assemblages of forms which people our nightmares with such abominable monstrosities.\n\nTo be sucked down by this whirling stream is to fall into abysses of madness, more frightful than those of death; to expel the shades of this chaos and compel it to give perfect forms to our thoughts - this is to be a man of genius; it is to create, it is to be victorious over hell!\n\nThe Astral Light directs the instincts of animals and offers battle to the intelligence of man, which it strives to pervert by the enticements of its reflections and the illusion of its images."

