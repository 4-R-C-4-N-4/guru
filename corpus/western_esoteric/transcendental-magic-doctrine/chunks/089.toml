[content]
body = "John; that one of its sides is inscribed with the name ShLMH and the other with that of GOD; that one of its facets bears the name of ADAM, a second that of HEVA, and the two others those of AZOT and INRI.\n\nAt the beginning of the French translation of a book by the Sieur de Nuisement on the Philosophical Salt, the spirit of the earth is represented standing on a cube over which tongues of flame are passing; the phallus is replaced by a caduceus; the sun and moon figure on the right and left breast; the figure is bearded, crowned and holds a sceptre in his hand.\n\nThis is the AzOTH of the sages on its pedestal of Salt and Sulphur.\n\nThe symbolic head of the goat of Mendes is occasionally given to this figure, and it is then the Baphomet of the Templars and the Word of the Gnostics, bizarre images which became scarecrows for the vulgar after affording food for reflection to sages - innocent hieroglyphs of thought and faith which have been a pretext for the rage of persecutions.\n\nHow pitiable are men in their ignorance, but how they would despise themselves if only they came to know!"

