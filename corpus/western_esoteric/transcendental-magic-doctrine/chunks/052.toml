body = "MALKUTH.-The Kingdom, meaning the universe, entire creation, the work and mirror of God, the proof of supreme reason, the formal consequence which compels us to have recourse to virtual premises, the enigma which has God for its answer - that is to say, Supreme and Absolute Reason.\n\nThese ten primary notions attached to the ten first characters of the primitive alphabet, signifying both principles and numbers, are called the ten SEPHIROTH by the masters in Kabalah.\n\nThe Sacred Tetragram, drawn in the following manner, indicates the number, source and correspondence of Divine Names.\n\nTo this name of JOTCHAVAH, written by these four-and-twenty signs, crowned with a triple flower of light, must be referred the twenty-four thrones of heaven and the twenty-four crowned elders in the Apocalypse.\n\nIn the Kabalah the occult principle is called the Ancient, and this principle, multiplied and, as it were, reflected in secondary causes, creates images of itself - that is to say, so many Ancients as there are diverse conceptions of its unique essence.\n\nThese images, less perfect in proportion as they are removed farther from their source, project upon the darkness an ultimate reflection or glimmer, representing a horrible and deformed Ancient, who is termed vulgarly the devil.\n\nHence an initiate has been bold enough to say: “The devil is God, as understood by the wicked”; while another has added, in words more bizarre but no less energetic: “The devil is composed of God's ruins.” We may sum up and explain these strikingly novel definitions by remarking that in symbolism itself the demon is an angel cast out of heaven for having sought to usurp divinity.\n\nThis belongs to the allegorical language of prophets and makers of legends.\n\nPhilosophically speaking, the devil is a human idea of divinity, which has been surpassed and dispossessed of heaven by the progress of science and reason.\n\nAmong primitive Oriental peoples, Moloch, Adramelek, Baal, were personifications of the one God, dishonoured by barbarous attributes.\n\nThe god of the Jansenists, creating hell for the majority of human beings and delighting in the eternal tortures of those he was unwilling to save, is a conception even more barbarous than that of Moloch: hence the god of the Jansenists is already a veritable Satan, fallen from heaven, in the sight of every wise and enlightened Christian.\n\nIn the multiplication of the Divine Names the Kabalists have connected them all, either with the unity of the Tetragram, the figure of the triad, or the sephirotic scale of the decad.\n\nThey arrange the scale of the Divine Names and numbers in a triangle, which may be presented in Roman characters as follows: The sum of all these Divine Names formed from the one Tetragram, but outside the Tetragram itself, is a basis of the Hebrew Ritual and constitutes the occult force which the kabalistic rabbins invoke under the title of Shemhamphoras.\n\nWe have now to concern ourselves with the Tarot from the kabalistic point of view, and have already indicated the occult source of the name.\n\nThis hieroglyphic book is composed of a kabalistic alphabet and of a wheel or circle of four decades, distinguished by four symbolical and typical figures, each having for its radius a scale of four progressive figures, which represent Humanity: man, woman, youth, child - master, mistress, knight, esquire.\n\nThe twenty-two figures of the alphabet represent, in the first place, the thirteen dogmas, and secondly, the nine beliefs authorized by that Jewish religion which is so strong and so firmly established on highest reason."

