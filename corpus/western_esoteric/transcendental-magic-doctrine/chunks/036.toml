body = "Arise!\n\nBathe, O adept of science, thy breast, still enveloped by an earthly veil, in the splendours of the dawning day!” (Faust, Part i.\n\nsc.\n\nI.) On 24 July in the year 1854, the author of this book, Eliphas Levi, made an experiment of evocation with the Pentagram, after due preparation according to all the Ceremonies indicated in the thirteenth chapter of the “Ritual”.\n\nThe success of this experiment, details of which, as regards its principles, will be found in the corresponding chapter of the present doctrinal part, establishes a new pathological fact, which men of true science will admit without difficulty.\n\nThe experience, repeated even to a third time, gave results truly extraordinary, but positive and unmixed with hallucination.\n\nWe invite sceptics to make a conscientious and intelligent trial on their own part before shrugging their shoulders and smiling.\n\nThe figure of the Pentagram, completed in accordance with science and used by the author in his experiment, is that which is found at the head of this chapter, and it is more perfect than any in the Keys of Solomon or in the Magical Calendars of Tycho Brahe and Duchentau.\n\nWe must remark, however, that the use of the Pentagram is most dangerous for operators who are not in possession of its complete and perfect understanding.\n\nThe direction of the points of the star is in no sense arbitrary, and may change the entire character of an operation, as we shall explain in the “Ritual”.\n\nParacelsus, that innovator in Magic, who surpassed all other initiates in his unaided practical success, affirms that every magical figure and every kabalistic sign of the pantacles which compel spirits, may be reduced to two, which are the synthesis of all the others; these are the Sign of the Macrocosm or the Seal of Solomon, the form of which we have given already, and that of the Microcosm, more potent even than the first - that is to say, the Pentagram, of which he provides a most minute description in his occult philosophy.\n\nIf it be asked how a sign can exercise so much power over spirits, we inquire in return why the whole Christian world bows down before that Sign of the Cross?\n\nThe sign is nothing by itself, and has no force apart from the doctrine of which it is the summary and the logos.\n\nNow, a sign which summarizes, in their expression, all the occult forces of Nature, a sign which has ever exhibited to elementary spirits and others a power greater than their own, fills them naturally with respect and fear, enforcing their obedience by the empire of science and of will over ignorance and weakness.\n\nBy the Pentagram also is measured the exact proportions of the great and unique Athanor necessary to the confection of the Philosophical Stone and the accomplishment of the Great Work.\n\nThe most perfect alembic in which the Quintessence can be elaborated is conformable to this figure, and the Quintessence itself is represented by the Sign of the Pentagram."

