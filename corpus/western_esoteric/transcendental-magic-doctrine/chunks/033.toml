[content]
body = "GEBURAH ECCE HEREUNTO we have exposed the magical dogma in its more arid and abstruse phases; now the enchantments begin; now we can proclaim wonders and reveal most secret things.\n\nThe Pentagram signifies the domination of the mind over the elements, and the demons of air, the spirits of fire, the phantoms of water and ghosts of earth are enchained by this sign.\n\nEquipped therewith, and suitably disposed, you may behold the infinite through the medium of that faculty which is like the soul's eye, and you will be ministered unto by legions of angels and hosts of fiends.\n\nBut here, in the first place, let us establish certain principles.\n\nThere is no invisible world; there are, however, many degrees of perfection in organs.\n\nThe body is the coarse and, as it were, the perishable cortex of the soul.\n\nThe soul can perceive of itself, and independently of the mediation of physical organs, by means of its sensibility and its DIAPHANE - the things, both spiritual and corporeal, which are existent in the universe.\n\nSpiritual and corporeal are simply terms which express the degrees of tenuity or density in substance.\n\nWhat is called the imagination within us is only the soul's inherent faculty of assimilating the images and reflections contained in the living light, being the Great Magnetic Agent.\n\nSuch images and reflections are revelations when science intervenes to reveal us their body or light.\n\nThe man of genius differs from the dreamer and the fool in this only, that his creations are analogous to truth, while those of the fool and the dreamer are lost reflections and betrayed images.\n\nHence, for the wise man, to imagine is to see, as, for the magician, to speak is to create.\n\nIt follows that, by means of the imagination, demons and spirits can be beheld really and in truth; but the imagination of the adept is diaphanous, whilst that of the crowd is opaque; the light of truth traverses the one as ordinary light passes through clear glass, and is refracted by the other, as when ordinary light impinges upon a vitreous block, full of scoriae and foreign matter.\n\nThat which most contributes to the errors of the vulgar is the reflection of depraved imaginations one in the other.\n\nBut in virtue of positive science, the seer knows that what he imagines is true, and the event invariably confirms his vision.\n\nWe shall state in the Ritual after what manner this lucidity can be acquired.\n\nIt is by means of this light that static visionaries place themselves in communication with all worlds, as so frequently occurred to Swedenborg, who notwithstanding was imperfectly lucid, seeing that he did not distinguish reflections from rays, and often intermingled chimerical fancies with his most admirable dreams.\n\nWe say dreams, because dream is the consequence of a natural and periodical ecstasy which we term sleep; to be in ecstasy is to sleep; magnetic somnambulism is a production and direction of ecstasy.\n\nThe errors which occur therein are occasioned by reflections from the DIAPHANE of waking persons, and, above all, of the magnetizer.\n\nDream is vision produced by the refraction of a ray of truth.\n\nChimerical fantasy is hallucination occasioned by a reflection.\n\nThe temptation of St.\n\nAnthony, with its nightmares and its monsters, represents the confusion of reflections with direct rays.\n\nSo long as the soul struggles it is reasonable; when it yields to this species of invading intoxication it becomes mad.\n\nTo disentangle the direct ray, and separate it from the reflection - such is the work of the initiate."

