[content]
body = "The perfect word, that which is adequate to the thought which it expresses, always contains virtually or supposes a tetrad: the idea, with its three necessary and correlated forms, then the image of the thing expressed, with the three terms of the judgement which qualifies it.\n\nWhen I say: “Being exists,” I affirm implicitly that the void is nonexistent.\n\nA height, a breadth which the height subdivides longitudinally, a depth separated from the height by the intersection of the breadth, such is the natural tetrad, composed of two lines at right angles one to another.\n\nNature has also four motions, products of two forces which sustain each other by their tendency in an opposite direction.\n\nNow, the law which rules bodies is analogous to that which governs minds, and that which governs minds is the very manifestation of God's secret - that is to say, of the mystery of the creation.\n\nImagine a watch having two parallel springs, with an engagement which makes them work in an opposite direction so that the one in unwinding winds up the other.\n\nIn this way, the watch will wind up itself, and you will have discovered perpetual motion.\n\nThe engagement should be at two ends and of extreme accuracy.\n\nIs this beyond attainment?\n\nWe think not.\n\nBut when it is discovered the inventor will understand by analogy all the secrets of Nature PROGRESS IN DIRECT PROPORTION TO RESISTANCE The absolute movement of life is thus the perpetual consequence of two contrary tendencies which are never opposed.\n\nWhen one seems to yield to the other, it is like a spring which is winding up, and you may expect a reaction, the moment and characteristics of which it is quite possible to foresee and determine.\n\nHence at the period of the greatest Christian fervour was the reign of ANTICHRIST known and predicted.\n\nBut Antichrist will prepare and determine the Second Advent and final triumph of the Man-God.\n\nThis again is a rigorous and kabalistical conclusion contained in the Gospel premises.\n\nHence the Christian prophecy comprises a fourfold revelation: I.\n\nFall of the old world and triumph of the Gospel under the First Advent; 2.\n\nGreat apostasy and coming of Antichrist; 3.\n\nFall of Antichrist and recurrence to Christian ideas; 4.\n\nDefinitive triumph of the Gospel, or Second Advent, designated under the name of the Last Judgement.\n\nThis fourfold prophecy contains, as will be seen, two affirmations and two negations, the idea of two ruins or universal deaths and of two resurrections; for to every conception which appears upon the social horizon an East and a West, a Zenith and a Nadir, may be ascribed without fear of error.\n\nThus is the Philosophical Cross the key of prophecy, and all gates of science may be opened with the pantacle of Ezekiel, the centre of which is a star formed by the interlacement of two crosses.\n\nDoes not human life present itself also under these four phases or successive transformations - birth, life, death, immortality?\n\nAnd remark here that the immortality of the soul, necessitated as a complement of the tetrad, is kabalistically proved by analogy, which is the sole dogma of truly universal religion, as it is the key of science and the universal law of Nature.\n\nAs a fact, death can be no more an absolute end than birth is a real beginning.\n\nBirth proves the preexistence of the human being, since nothing is produced from nothing, and death proves immortality, since being can no more cease from being than nothingness can cease to be nothingness."

