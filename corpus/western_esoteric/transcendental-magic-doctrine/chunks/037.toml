body = "TIPHERETH UNCUS SUPREME intelligence is necessarily reasonable.\n\nGod, in philosophy, may be only a hypothesis, but He is a hypothesis imposed by good sense on human reason.\n\nTo personify the Absolute Reason is to determine the Divine Ideal.\n\nNecessity, liberty and reason - these are the great and supreme triangle of the Kabalists, who name reason KETHER, necessity CHOKMAH, and liberty BINAH, in their first or Divine Triad.\n\nFatality, will and power, such is the magical triad, which corresponds in things human to the Divine Triad.\n\nFatality is the inevitable sequence of effects and causes in a determined order.\n\nWill is the directing faculty of intelligent forces for the conciliation of the liberty of persons with the necessity of things.\n\nPower is the wise application of will which enlists fatality itself in the accomplishment of the desires of the sage.\n\nWhen Moses smote the rock, he did not create the spring of water; he revealed it to the people, because occult science had made it known to himself by means of the divining rod.\n\nIt is in like manner with all miracles of Magic; a law exists, which is ignored by the vulgar and made use of by the initiate.\n\nOccult laws are often opposed diametrically to common ideas.\n\nFor example, the crowd believes in the sympathy of things which are alike and in the hostility of things contrary, but it is the opposite which is the true law.\n\nIt used to be affirmed that Nature abhors the void, but it should be said that Nature desires it, were the void not, in physics, the most irrational of fictions.\n\nIn all things the vulgar mind habitually takes shadow for reality, turns its back upon light and is reflected in the obscurity which it projects itself.\n\nThe forces of Nature are at the disposal of one who knows how to resist them.\n\nAre you master sufficiently of yourself to be never intoxicated?\n\nThen will you direct the terrible and fatal power of intoxication.\n\nIf you would make others drunk, possess them with the desire of drink, but do not partake of it yourself.\n\nThat man will dispose of the love of others who is master of his own.\n\nIf you would possess, do not give.\n\nThe world is magnetized by the light of the sun, and we are magnetized by the Astral Light of the world.\n\nThat which operates in the body of the planet repeats itself in us.\n\nWithin us there are three analogical and hierarchic worlds, as in all Nature.\n\nMan is the Microcosm or little world, and, according to the doctrine of analogies, whatsoever is in the great world is reproduced in the small.\n\nHence we have three centres of fluidic attraction and projection - the brain, the heart, or epigastric region, and the genital organ.\n\nEach of these instruments is one and twofold -in other words, we find the suggestion of the triad therein.\n\nEach attracts on one side and repels on the other.\n\nIt is by means of such apparatus that we place ourselves in communication with the universal fluid supplied to us by the nervous system.\n\nThese three centres are, moreover, the seat of a triple magnetic operation, as we shall explain elsewhere.\n\nWhen the Magus has attained lucidity, whether through the mediation of a pythoness or by his own development, he communicates and directs at will the magnetic vibrations in the whole mass of the Astral Light, the currents of which he divines by means of the Magic Wand, which is a perfected divining rod.\n\nBy the aid of these vibrations he influences the nervous system of persons made subject to his action, accelerates or suspends the currents of life, soothes or tortures, heals or hurts - in fine, slays or brings to life.\n\n..\n\n.Here, however, we pause in presence of the smile of incredulity."

