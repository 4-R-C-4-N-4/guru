body = "Eudes de Mirville, because it is not enough to enumerate phenomena and to prejudge their cause if we would influence serious people; we must study, explain and demonstrate such cause, and this is precisely what we are ourselves attempting.\n\nWill better success crown our own efforts?\n\nIt is possible to die through the love of certain people, even as by their hate.\n\nThere are absorbing passions, under the breath of which we feel ourselves depleted like the spouses of vampires.\n\nNot only do the wicked torment the good, but unconsciously the good torture the wicked.\n\nThe gentleness of Abel was a long and painful bewitchment for the ferocity of Cain.\n\nAmong evil men, the hatred of good originates in the very instinct of self-preservation; moreover, they deny that what torments them is good and are driven to deify and justify evil for their own peace.\n\nIn the sight of Cain, Abel was a hypocrite and coward, who abused the pride of humanity by his scandalous submissions.\n\nto Divinity.\n\nHow much must this first murderer have endured before making such a frightful attack upon his brother?\n\nHad Abel understood, he would have been afraid.\n\nAntipathy is the presentiment of a possible bewitchment, either of love or hatred, for we find love frequently succeeding repulsion.\n\nThe Astral Light warns us of coming influences by its action on the more or less sensible, more or less active, nervous system.\n\nInstantaneous sympathies, electric loves, are explosions of the Astral Light, which are as exactly and mathematically demonstrable as the discharge of strong magnetic batteries.\n\nThereby we may see what unexpected dangers threaten an uninitiated person who is perpetually fooling with fire in the neighbourhood of unseen powder magazines.\n\nWe are saturated with the Astral Light, and we project it unceasingly to make room for and to attract fresh supplies.\n\nThe nervous instruments which are specially designed either for attraction or projection are the eyes and hands.\n\nThe polarity of the hand is resident in the thumb, and hence, according to the magical tradition which still lingers in rural places, whenever anyone is in suspicious company, he should keep the thumb doubled up and hidden in the hand, and while in the main avoiding a fixed glance at anyone, still being the first to look at those whom we have reason to fear, so as to escape unexpected fluidic projections and fascinating regards.\n\nThere are certain animals which have the power of breaking the currents of Astral Light by an absorption peculiar to themselves.\n\nThey are violently antipathetic to us and possess a certain sorcery of the eye: the toad, the basilisk and the tard are instances.\n\nThese animals, when tamed and carried alive on the person, or kept in one's rooms, are a guarantee against the hallucinations and trickeries of ASTRAL INTOXICATION, a term made use of here for the first time and one which explains all phenomena of unbridled passions, mental exaltations and folly.\n\nTame toads and tards, my dear sir, the disciple of Voltaire will say to me: carry them about with you, but write no more.\n\nTo which I may answer, that I shall think seriously of so doing if ever I feel tempted to laugh at anything of which I am ignorant, or to treat those whose knowledge and wisdom I fail to understand as fools or as madmen.\n\nParacelsus, the greatest of the Christian Magi, opposed bewitchment by the practices of a contrary bewitchment.\n\nHe devised sympathetic remedies and applied them, not to the suffering members, but to representations of these, formed and con serrated according to magical ceremonial.\n\nHis successes were incredible, for never has any physician approached Paracelsus in his marvels of healing."

