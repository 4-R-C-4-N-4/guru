body = "Such is the mysterious language of the Kabalists in the Talmud, and on account of vulgar ignorance and malignity, it is impossible for us to explain or simplify it further.\n\nWhat then is creation?\n\nIt is the house of the creative Word.\n\nWhat is the cteis?\n\nIt is the house of the phallus.\n\nWhat is the nature of the active principle?\n\nTo diffuse.\n\nWhat is that of the passive?\n\nTo gather in and to fructify.\n\nWhat is man?\n\nHe who initiates, who toils, who furrows, who sows.\n\nWhat is woman?\n\nShe who forms, unites, irrigates and harvests.\n\nMan wages war, woman brings peace about; man destroys to create, woman builds up to preserve; man is revolution, woman is conciliation; man is the father of Cain, woman the mother of Abel.\n\nWhat also is wisdom?\n\nIt is the agreement and union of two principles, the mildness of Abel directing the activity of Cain, man guided by the sweet inspirations of woman, debauchery conquered by lawful marriage, revolutionary energy softened and subdued by the gentleness of order and peace, pride subjugated by love, science acknowledging the inspirations of faith.\n\nIt is then that science becomes wise and submits to the infallibility of universal reason, instructed by love or universal charity.\n\nThen it can assume the name of GNOSIS, because it knows at least that as yet it cannot boast of knowing perfectly.\n\nThe monad can manifest only by the duad; unity itself and the notion of unity at once constitute two.\n\nThe unity of the Macrocosm reveals itself by the two opposite points of two triangles.\n\nHuman unity fulfils itself to right and left.\n\nPrimitive man is androgynous.\n\nAll organs of the human body are disposed in pairs, excepting the nose, the tongue, the umbilicus and the kabalistic JOD.\n\nDivinity, one in its essence, has two essential conditions as the fundamental grounds of its being -necessity and liberty.\n\nThe laws of supreme reason necessitate and rule liberty in God, Who is of necessity wise and reasonable.\n\nTo make light visible God had only to postulate shadow.\n\nTo manifest the truth He permitted the possibility of doubt.\n\nThe shadow bodies forth the light, and the possibility of error is essential for the temporal manifestation of truth.\n\nIf the buckler of Satan did not intercept the spear of Michael, the might of the angel would be lost in the void or manifested by infinite destruction launched below from above.\n\nDid not the heel of Michael restrain Satan in his ascent, Satan would dethrone God, or rather he would lose himself in the abysses of the altitude.\n\nHence Satan is needful to Michael as the pedestal to the statue, and Michael is necessary to Satan as the brake to the locomotive.\n\nIn analogical and universal dynamics one leans only on that which resists.\n\nFurthermore, the universe is balanced by two forces which maintain it in equilibrium, being the force which attracts and that which repels.\n\nThey exist alike in physics, in philosophy and in religion; in physics they produce equilibrium, in philosophy criticism, in religion progressive revelation.\n\nThe ancients represented this mystery by the conflict between Eros and Anteros, the struggle between Jacob and the angel, and by the equilibrium of the golden mountain, which gods on the one side and demons on the other encircle with the symbolic serpent of India.\n\nIt is typified also by the caduceus of Hermanubis, by the two cherubim of the ark, by the twofold sphinx of the chariot of Osiris and by the two seraphim - respectively black and white.\n\nIts scientific reality is demonstrated by the phenomena of polarity, as also by the universal law of sympathies and antipathies."

