[content]
body = "The Great Magical Agent is the fourth emanation of the life-principle, of which the sun is the third form - see the initiates of the school of Alexandria and the dogma of Hermes Trismegistus.\n\nIn this way the eye of the world, as the ancients called it, is the mirage of the reflection of God, and the soul of the earth is a permanent glance of the sun which the earth conceives and guards by impregnation.\n\nThe moon concurs in this impregnation of the earth by reflecting a solar image during the night, so that Hermes was right when he said of the Great Agent: “The sun is its father, the moon its mother.” Then he adds: “The wind has borne it in the belly thereof,” because the atmosphere is the recipient and, as it were, the crucible of the solar rays, by means of which there forms that living image of the sun which penetrates the whole earth, fructifies it and determines all that is produced on its surface by its emanations and permanent currents, analogous to those of the sun itself.\n\nThis solar agent subsists by two contrary forces - one of attraction and one of projection, whence Hermes says that it ascends and descends eternally.\n\nThe force of attraction is always fixed at the centre of bodies, that of projection in their outlines or at their surface.\n\nBy this dual force all is created and all preserved.\n\nIts motion is a rolling up and an enrolling which are successive and unlimited, or, rather, Simultaneous and perpetual, by spirals of opposite movements which never meet.\n\nIt is the same movement as that of the sun, at once attracting and repelling all the planets of its system.\n\nTo be acquainted with the movement of this terrestrial sun in such a manner as to be able to apply its currents and direct them, is to have accomplished the Great Work and to be master of the world.\n\nArmed with such a force you may make yourself adored: the crowd will believe that you are God.\n\nThe absolute secret of this direction has been in the possession of certain men, and can yet be discovered.\n\nIt is the Great Magical Arcanum, depending on an incommunicable axiom and on an instrument which is the grand and unique athanor of the highest grade of Hermetists.\n\nThe incommunicable axiom is enclosed kabalistically in the four letters of the Tetragram, arranged in the following manner: In the letters of the words AZOTH and INRI written kabalistically; and in the monogram of Christ as embroidered on the Labarum, which the Kabalist Postel interprets by the word ROTA, whence the adepts have formed their Taro or Tarot, by the repetition of the first letter, thus indicating the circle, and suggesting that the word is read backwards.\n\nAll magical science is comprised in the knowledge of this secret.\n\nTo know it and have the courage to use it is human omnipotence; to reveal it to a profane person is to lose it; to reveal it even to a disciple is to abdicate in favour of that disciple, who, henceforward, possesses the right of life and death over his master - I am speaking from the magical standpoint - and will certainly slay him for fear of dying himself.\n\nBut this has nothing in common with deeds qualified as murder in criminal legislation; the practical philosophy which is the basis and point of departure for our laws does not recognize the facts of bewitchment and of occult influences.\n\nWe touch here upon extraordinary revelations, and are prepared for the unbelief and derision of incredulous fanaticism; voltairean religion has also its fanatics, pace the great shades who must now be lurking sullenly in the vaults of the Pantheon, while Catholicism, strong ever in its practices and prestige, chants the Office overhead."

