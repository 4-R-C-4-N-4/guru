[content]
body = "CHOKMAH DOMUS GNOSIS SCIENCE is the absolute and complete possession of truth.\n\nHence have the sages of all the centuries trembled before such an absolute and terrible word; they have hesitated in arrogating to themselves the first privilege of Divinity by assuming the possession of science, and have been contented, instead of the verb TO KNOW, with that which expresses learning, while, in place of the word SCIENCE, they have adopted that of GNOSIS, which represents simply the notion of learning by intuition.\n\nWhat, in fact, does man know?\n\nNothing, and at the same time he is allowed to ignore nothing.\n\nDevoid of knowledge, he is called upon to know all.\n\nNow, knowledge supposes the duad - a being who knows and an object known.\n\nThe duad is the generator of society and of law: it is also the number of the Gnosis.\n\nThe duad is unity multiplying itself in order to create, and hence in sacred symbolism Eve issues from the inmost bosom of Adam.\n\nAdam is the human tetra-gram, summed up in the mysterious JOD, type of the kabalistic phallus.\n\nBy adding to this JOD the triadic name of Eve, the name of Jehova is formed, the Divine Tetragram, which is eminently the kabalistic and magical word, being that which the high-priest in the temple pronounced JODCHEVA.\n\nSo unity, complete in the fruitfulness of the triad, forms therewith the tetrad, which is the key of all numbers, of all movements and of all forms.\n\nBy a revolution about its own centre, the square produces a circle equal to itself, and this is the quadrature of the circle, the circular movement of four equal angles around the same point.\n\n“That which is above equals that which is below,” says Hermes.\n\nHere then is the duad serving as the measure of unity, and the relation of equality between above and below forms with these the triad.\n\nThe creative principle is the ideal phallus; the created principle is the formal cteis.\n\nThe insertion of the vertical phallus into the horizontal cteis forms the stauros of the Gnostics, or the philosophical cross of Masons.\n\nThus, the intersection of two produces four, which, by its movement, defines the circle with all degrees thereof.\n\nא is man; ב is woman; I is the principle; 2 is the word; A is the active; B is the passive; the monad is BOAZ; the duad is JAKIN.\n\nIn the trigrams of Fohi, unity is the YANG and the duad is the YIN.\n\nBOAZ and JAKIN are the names of the two symbolical Pillars before the principal entrance of Solomon's Kabalistic Temple.\n\nIn the Kabalah these Pillars explain all mysteries of antagonism, whether natural, political or religious.\n\nThey elucidate also the procreative struggle between man and woman, for, according to the law of Nature, the woman must resist the man, and he must entice or overcome her.\n\nThe active principle seeks the passive principle, the plenum desires the void, the serpent's jaw attracts the serpent's tail, and in turning about upon himself, he, at the same time, flies and pursues himself.\n\nWoman is the creation of man, and universal creation is the bride of the First Principle.\n\nWhen the Supreme Being became a Creator, He erected a JOD or a phallus, and to provide a place in the fullness of the uncreated light, it was necessary to hollow out a cteis or trench of shadow equivalent to the dimension determined by his creative desire, and attributed by him to the ideal JOD of the radiating light."

