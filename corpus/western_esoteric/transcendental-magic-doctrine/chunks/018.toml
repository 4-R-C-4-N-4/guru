[content]
body = "Every figure is a character, every character derives from and returns into a word.\n\nFor this reason the ancient sages, of whom Trismegistus is the organ, formulated their sole dogma in these terms: “That which is above is like unto that which is below, and that which is below unto that which is above.” In other words, the form is proportional to the idea; the shadow is the measure of the body calculated in its relation to the luminous ray; the scabbard is as deep as the sword is long; the negation is in proportion to the contrary affirmation; production is equal to destruction in the movement which preserves life; and there is no point in infinite extension which may not be regarded as the centre of a circle having an expanding circumference receding indefinitely into space.\n\nEvery individuality is therefore indefinitely perfectible, since the moral order is analogous to the physical, and since we cannot conceive any point as unable to dilate, increase and radiate in a philosophically unlimited circle.\n\nWhat can be affirmed of the soul in its totality may be affirmed of each faculty of the soul.\n\nThe intelligence and will of man are instruments of incalculable power and capacity.\n\nBut intelligence and will possess as their help-mate and instrument a faculty which is too imperfectly known, the omnipotence of which belongs exclusively to the domain of Magic.\n\nI speak of the imagination, which the Kabalists term the DlAPHANE or TRANSLUCID.\n\nImagination, in effect, is like the soul's eye; therein forms are outlined and preserved; thereby we behold the reflections of the invisible world; it is the glass of visions and the apparatus of magical life.\n\nBy its intervention we heal diseases, modify the seasons, warn off death from the living and raise the dead to life, because it is the imagination which exalts will and gives it power over the Universal Agent.\n\nImagination determines the shape of the child in its mother's womb and decides the destiny of men; it lends wings to contagion and directs the arms of warfare.\n\nAre you exposed in battle?\n\nBelieve yourself to be invulnerable like Achilles, and you will be so, says Paracelsus.\n\nFear attracts bullets, but they are repelled by courage.\n\nIt is well known that persons with amputated limbs feel pain in the vicinity of members which they possess no longer.\n\nParacelsus operated upon living blood by medicating the product of a bleeding; he cured headache at a distance by treating hair cut from the patient.\n\nBy the science of the theoretical unity and solidarity between all parts of the body, he anticipated and outstripped the theories, or rather experiences, of our most celebrated magnetists.\n\nHence his cures were miraculous, and to his name of Philip Theophrastus Bombast, he deserved the addition of Aureolus Paracelsus, with the further epithet of divine!\n\nImagination is the instrument of THE ADAPTATION OF THE WORD.\n\nImagination applied to reason is genius.\n\nReason is one, as genius is one, in all the variety of its works.\n\nThere is one principle, there is one truth, there is one reason, there is one absolute and universal philosophy.\n\nWhatsoever is subsists in unity, considered as beginning, and returns into unity, considered as end.\n\nOne is in one; that is to say, all is in all.\n\nUnity is the principle of numbers; it is also the principle of motion and consequently of life., The entire human body is recapitulated in the unity of a single organ, which is the brain.\n\nAll religions are summed up in the unity of a single dogma, which is the affirmation of being and its equality with itself, and this constitutes its mathematical value."

