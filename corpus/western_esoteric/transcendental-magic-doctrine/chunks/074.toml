[content]
body = "For this reason, it is important that children should sleep always alone.\n\nIn conventional seminaries certain pupils absorb the intelligence of the others, and in every given circle of men one individual emerges who avails himself of the wills of the rest.\n\nBewitchment by means of currents is exceedingly common, as we have observed already; morally as well as physically, most of us are carried away by the crowd.\n\nWhat, however, we have proposed to exhibit more especially in this chapter is the almost absolute power of the human will upon the determination of its acts and the influence of every outward demonstration of will upon outward things.\n\nVoluntary bewitchments are still frequent in our rural places because natural forces, among ignorant and isolated persons, operate unreduced by any doubt or any diversion.\n\nA frank, absolute hatred, unleavened by rejected passion or personal cupidity, is, under certain given conditions, a death-sentence for its object.\n\nI say unmixed with amorous passion or cupidity, because a desire, being an attraction, counterbalances and annuls the power of projection.\n\nFor example, a jealous person will never efficaciously bewitch his rival, and a greedy heir will never by the mere fact of his will succeed in shortening the days of a miserly and long-lived uncle.\n\nBewitchments attempted under such conditions reflect upon the operator and help rather than hurt their object, setting him free from a hostile action which destroys itself by unmeasured exaggeration.\n\nThe term envoutement (bewitchment) so strong in its Gaelic simplicity, expresses admirably what it means, the act of enveloping someone, so to speak, in a formulated will.\n\nThe instrument of bewitchments is the Great Magical Agent which, under the influence of an evil will, becomes really and positively the demon.\n\nWitchcraft, properly so called, that is, ceremonial operation with intent to bewitch, acts only on the operator, and serves to fix and confirm his will, by formulating it with persistence and travail, the two conditions which make volition efficacious.\n\nThe more difficult or horrible the operation, the greater is its power, because it acts more strongly on the imagination and confirms effort in direct ratio of resistance.\n\nThis explains the bizarre nature and even atrocious character of the operations in Black Magic, as practised by the ancients and in the Middle Ages, the diabolical masses, administration of sacraments to reptiles, effusions of blood, human sacrifices and other monstrosities, which are the very essence and reality of Goetia or Nigromancy.\n\nSuch are the practices which from all time have brought down upon sorcerers the just repression of the laws.\n\nBlack Magic is really only a graduated combination of sacrileges and murders designed for the permanent perversion of a human will and for the realization in a living man of the hideous phantom of the demon.\n\nIt is therefore, properly speaking, the religion of the devil, the cultus of darkness, hatred of good carried to the height of paroxysm: it is the incarnation of death and the persistent creation of hell: The Kabalist Bodin who has been considered erroneously of a feeble and superstitious mind, had no other motive in writing his Demonomania than that of warning people against dangerous incredulity.' Initiated by the study of the Kabalah into the true secrets of Magic, he trembled at the danger to which society was exposed by the abandonment of this power to the wickedness of men.\n\nHence he attempted what at the present time M.\n\nEudes de Mirville is attempting amongst ourselves; he gathered facts without interpreting them and affirmed in the face of inattentive or preoccupied science the existence of the occult influences and criminal operations of Evil Magic.\n\nIn his own day Bodin attracted no more attention than will be given to M."

