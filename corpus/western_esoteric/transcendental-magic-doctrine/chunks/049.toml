[content]
body = "JESOD BONUM THE INITIATE is he who possesses the lamp of Trismegistus, the mantle of Apollonius, and the staff of the patriarchs.\n\nThe lamp of Trismegistus is reason illuminated by science; the mantle of Apollonius is full and complete self-possession, which isolates the sage from blind tendencies; and the staff of the patriarchs is the help of the secret and everlasting forces of Nature.\n\nThe lamp of Trismegistus enlightens present, past and future, lays bare the conscience of men and manifests the inmost recesses of the female heart.\n\nThe lamp burns with a triple flame, the mantle is thrice-folded and the staff is divided into three parts.\n\nThe number nine is that of divine reflections; it expresses the divine idea in all its abstract power, but it signifies also extravagance in belief, and hence superstition and idolatry.\n\nFor this reason Hermes made it the number of initiation, because the initiate reigns over superstition and by superstition: he alone can advance through the darkness, leaning on his staff, enveloped in his mantle and lighted by his lamp.\n\nReason has been given to all men, but all do not know how to make use of it: it is a science to be acquired.\n\nLiberty is offered to all, but not all can be free: it is a right that must be earned.\n\nForce is for all, but all do not know how to rest upon it: it is a power that must be won.\n\nWe attain nothing without more than one effort.\n\nThe destiny of man is to be enriched by his own earning and afterwards to have, like God, the glory and pleasure of dispensing it.\n\nMagic was called formerly the Sacerdotal Art and the Royal Art, because initiation gave empire over souls to the sage and the capacity for ruling wills.\n\nDivination is also one of the privileges of the initiate; now, divination is simply the knowledge of effects contained in causes and science applied to the facts of the universal dogma of analogy.\n\nHuman acts are not written in the Astral Light alone; their traces are left upon the face, they modify mien and carriage, they change the tone of the voice.\n\nThus every man bears about him the history of his life, which is legible for the initiate.\n\nNow, the future is ever the consequence of the past, and unexpected circumstances do not appreciably alter results reasonably calculated.\n\nThe destiny of each man can be therefore foretold him.\n\nAn entire existence may be judged by a single movement; a single oddity or weakness may be the presage of a long chain of misfortunes.\n\nCaesar was assassinated because he was ashamed of being bald; Napoleon ended his days at St.\n\nHeleua because he admired the poems of Ossian; Louis Philippe abdicated the throne as he did because he carried an umbrella.\n\nThese are paradoxes for the vulgar, who cannot grasp the occult relations of things, but they are causes for the adept, who understands all and is surprised at nothing.\n\nInitiation is a preservative against the false lights of mysticism; it equips human reason with its relative value and proportional infallibility, connecting it with supreme reason by the chain of analogies.\n\nHence the initiate knows no doubtful hopes, no absurd fears, because he has no irrational beliefs; he is acquainted with the extent of his power, and he can be bold without danger.\n\nFor him, therefore, to dare is to be able.\n\nHere, then, is a new interpretation of his attributes: his lamp represents learning; the mantle which enwraps him, his discretion; while his staff is the emblem of his strength and boldness.\n\nHe knows, he dares and is silent.\n\nHe knows the secrets of the future, he dares in the present, and he is silent on the past."

