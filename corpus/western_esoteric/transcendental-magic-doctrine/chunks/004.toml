[content]
body = "Stand up and open your eyes, but take care before all things to make no Christian sign and to pronounce no Christian words.\n\nWe are in a landscape of Salvator Rosa, a troubled wilderness which seems resting after a storm.\n\nThere is no moon in the sky, but you can distinguish little stars gleaming in the brushwood, and may hear about you the slow flight of great birds, which seem to whisper strange oracles as they pass.\n\nLet us approach silently that crossroad among the rocks.\n\nA harsh, funereal trumpet winds suddenly, and black torches flare up on every side.\n\nA tumultuous throng is surging round a vacant throne: all watch and wait.\n\nSuddenly they cast themselves on the ground.\n\nA goat-headed prince bounds forward among them; he ascends the throne, turns, and assuming a stooping posture, presents to the assembly a human face, which everyone comes forward to salute and to kiss, their black taper in their hands.\n\nWith a hoarse laugh he recovers an upright position, and then distributes gold, secret instructions, occult medicines and poisons to his faithful bondsmen.\n\nMeanwhile, fires are lighted of fern and alder, piled up with human bones and the fat of executed criminals.\n\nDruidesses, crowned with wild parsley and vervain, immolate unbaptized children with golden knives and prepare horrible love-feasts.\n\nTables are spread, masked men seat themselves by half-nude females, and a Bacchanalian orgy begins; there is nothing wanting but salt, the symbol of wisdom and immortality.\n\nWine flows in streams, leaving stains like blood; obscene advances and abandoned caresses begin.\n\nA little while, and the whole assembly is beside itself with drink and wantonness, with crimes and singing.\n\nThey rise, a disordered throng, and form infernal dances .\n\n.\n\n.\n\n.\n\nThen come all legendary monsters, all phantoms of nightmare; enormous toads play inverted flutes and thump with paws on flanks; limping scarabaei mingle in the dance; crabs play the castanets; crocodiles beat time on their scales; elephants and mammoths appear habited like Cupids and foot it in the ring: finally, the giddy circles break up and scatter on all sides .\n\n.\n\n.\n\n.\n\nEvery yelling dancer drags away a dishevelled female .\n\n.\n\n.\n\n.\n\nLamps and candles formed of human fat go out smoking in the darkness .\n\n.\n\n.\n\n.\n\nCries are heard here and there, mingled with peals of laughter, blasphemies and rattlings in the throat.\n\nCome, rouse yourself: do not make the sign of the cross!\n\nSee, I have brought you home.\n\nYou are in your bed, not a little worn out, possibly a trifle shattered, by your night's journey and its orgy; but you have beheld that of which everyone talks without knowledge; you have been initiated into secrets no less terrible than the grotto of Triphonius; you have been present at the Sabbath.\n\nIt remains for you now to preserve your wits, to have a wholesome dread of the law, and to keep at a respectful distance from the Church and her faggots.\n\nWould you care, as a change, to behold something less fantastic, more real and also more truly terrible?\n\nYou shall assist at the execution of Jacques de Molay and his accomplices or his brethren in martyrdom .\n\n.\n\n.\n\n.\n\nBe not misled, however; confuse not the guilty and the innocent!\n\nDid the Templars really adore Baphomet?\n\nDid they offer a shameful salutation to the buttocks of the goat of Mendes?\n\nWhat was actually this secret and potent association which imperilled Church and State, and was thus destroyed unheard?\n\nJudge nothing lightly; they are guilty of a great crime; they have exposed to profane eyes the sanctuary of antique initiation."

