[content]
body = "It is a fatal and inevitable operation, directed and made still more calamitous by elementary spirits and suffering souls, whose restless wills seek out sympathies in our weakness and tempt us, but not so much to destroy us as to win friends for themselves.\n\nThat book of consciences which, according to Christian doctrine, shall be opened at the last day, is no other than the Astral Light, which preserves the impress of every logos, that is to say, of all actions and all forms.\n\nOur acts modify our magnetic respiration in such a way that a seer, meeting any person for the first time, can tell whether he is innocent or criminal, and what are his virtues or his crimes.\n\nThis faculty, which belongs to divination, was called by the Christian mystics of the early Church the discernment of spirits.\n\nThose who abdicate the empire of reason and permit their wills to wander in pursuit of reflections in the Astral Light, are subject to alternations of mania and melancholy which have originated all the marvels of demoniacal possession, though it is true, at the same time, that by means of these reflections impure spirits can act upon such souls, make use of them as docile instruments and even habitually torment their organism, wherein they enter and reside by obsession, or embryonically.\n\nThese kabalistic terms are explained in the Hebrew book of the Revolution of Souls, of which our thirteenth chapter will contain a succinct analysis.\n\nIt is therefore extremely dangerous to make sport of the Mysteries of Magic; it is above all excessively rash to practise its rites from curiosity, by way of experiment and as if to exploit higher forces.\n\nThe inquisitive who, without being adepts, busy themselves with evocations or occult magnetism, are like children playing with fire in the neighbourhood of a cask of gunpowder; sooner or later they will fall victims to some terrible explosion.\n\nTo be isolated from the Astral Light it is not enough to envelop one's self in a woollen fabric; we must also, and above all, impose absolute tranquillity on mind and heart; we must have quitted the world of passions and be assured of perseverance in the spontaneous operations of an inflexible will.\n\nWe must reiterate frequently the acts of this will, for, as we shall see in the introduction to the “Ritual”, it is by acts only that confidence is assured to the will, as the power and perpetuity of religions depend on their Rites and Ceremonies.\n\nThere are intoxicating substances, which, by increasing nervous sensibility, exalt the power and consequently the allurements of astral representations; by the same means, but pursuing a contrary course, spirits may be terrified and disturbed.\n\nThese substances, of themselves magnetic and magnetized further by operators, are what people term philtres and enchanted potions.\n\nBut we shall not enter here upon this dangerous aspect of the practice, which Cornelius Agrippa himself terms venomous Magic.\n\nIt is true that there are no longer pyres for sorcerers, but always, and more than ever, are there penalties dealt out to malefactors.\n\nLet us confine ourselves therefore to stating, as the occasion offers, the reality of such power.\n\nTo direct the Astral Light we must understand also its twofold vibration, as well as the balance of forces termed magical equilibrium, expressed in the Kabalah by the senary.\n\nConsidered in its first cause, this equilibrium is the will of God; it is liberty in man and mathematical equilibrium in matter.\n\nEquilibrium produces stability and duration.\n\nLiberty generates the immortality of man,” and the will of God gives effect to the laws of Eternal Reason.\n\nEquilibrium in ideas is reason and in forces power.\n\nEquilibrium is exact; fulfil its law, and it is there; violate it, however slightly, and it is destroyed."

