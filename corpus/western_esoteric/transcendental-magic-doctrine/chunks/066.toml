[content]
body = "I therefore placed my hand upon the Sign of the Pentagram, and pointed the sword at the figure, commanding it mentally to obey and not alarm me, in virtue of the said sign.\n\nThe form thereupon became vague, and suddenly disappeared.\n\nI directed it to return, and presently felt, as it were, a breath close by me; something touched my hand which was holding the sword, and the arm became immediately benumbed as far as the elbow.\n\nI divined that the sword displeased the spirit, and I therefore placed it point downwards, close by me, within the circle.\n\nThe human figure reappeared immediately, but I experienced such an intense weakness in all my limbs, and a swooning sensation came so quickly over me, that I made two steps to sit down, whereupon I fell into a profound lethargy, accompanied by dreams, of which I had only a confused recollection when I came again to myself.\n\nFor several subsequent days my arm remained benumbed and painful.\n\nThe apparition did not speak to me, but it seemed that the questions I had designed to ask answered themselves in my mind.\n\nTo that of the lady an interior voice replied - Death!\n\n- it was concerning a man about whom she desired information.\n\nAs for myself, I sought to know whether reconciliation and forgiveness were possible between two persons who occupied my thoughts, and the same inexorable echo within me answered - Dead!\n\nI am stating facts as they occurred, but I would impose faith on no one.\n\nThe consequence of this experience on myself must be called inexplicable.\n\nI was no longer the same man; something of another world had passed into me; I was no longer either sad or cheerful, but I felt a singular attraction towards death, unaccompanied, however, by any suicidal tendency.\n\nI analysed my experience carefully, and, notwithstanding a lively nervous repugnance, I repeated the same experiment on two further occasions, allowing some days to elapse between each.\n\nThere was not, however, sufficient difference between the phenomena to warrant me in protracting a narrative which is perhaps already too long.\n\nBut the net result of these two additional evocations was for me the revelation of two kabalistic secrets which might change, in a short space of time, the foundations and laws of society at large, if they came to be known generally.\n\nAm I to conclude from all this that I really evoked, saw and touched the great Apollonius of Tyana?\n\nI am not so hallucinated as to affirm or so unserious as to believe it.\n\nThe effect of the preparations, the perfumes, the mirrors, the pantacles, is an actual drunkenness of the imagination, which must act powerfully upon a person otherwise nervous and impressionable.\n\nI do not explain the physical laws by which I saw and touched; I affirm solely that I did see and that I did touch, that I saw clearly and distinctly, apart from dreaming, and this is sufficient to establish the real efficacy of magical ceremonies.\n\nFor the rest, I regard the practice as destructive and dangerous; if it became habitual, neither moral nor physical health would be able to withstand it.\n\nThe elderly lady whom I have mentioned, and of whom I had reason to complain subsequently, was a case in point.\n\nDespite her asseverations to the contrary, I have no doubt that she was addicted to Necromancy and Goetia.\n\nAt times she talked complete nonsense, at others yielded to senseless fits of passion, for which it was difficult to discover a cause.\n\nI left London without bidding her adieu, and I adhere faithfully to my engagement by giving no clue to her identity, which might connect her name with practices, pursued in all probability without the knowledge of her family, which I believe to be numerous and of very honourable position."

