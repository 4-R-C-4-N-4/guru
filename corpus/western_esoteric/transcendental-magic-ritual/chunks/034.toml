[content]
body = "Many persons will say that it is difficult and even impossible to attain such resolution, that strength in volition and energy in character are natural gifts.\n\nI do not dispute it, but I would point out also that habit can reform nature; volition can be perfected by education, and, as intimated otherwise, all magical, like all religious, ceremonial has no other end but thus to test, exercise and habituate the will by perseverance and by force.\n\nThe more difficult and laborious the exercises, the greater their effect, as we have now advanced far enough to see.\n\nIf it have been hitherto impossible to direct the phenomena of magnetism, it is because an initiated and truly emancipated operator has not yet appeared.\n\nWho can boast that he is such?\n\nHave we not ever new self-conquests to make?\n\nAt the same time, it is certain that Nature will obey the sign and word of one who is strong enough to be convinced that she will.\n\nI say that Nature will obey; I do not say that she will belie herself or disturb the order of her possibilities.\n\nThe healing of nervous diseases by word, breath, or contact; resurrection in certain cases; resistance of evil wills sufficient to disarm and confound murderers; even the faculty of making one's self invisible by confusing the sight of those whom it is important to elude - all this is a natural effect of projecting or withdrawing the Astral Light.\n\nThus was Valentius dazzled and terror-struck on entering the temple of Cesarea, even as Heliodorus of old, overwhelmed by a sudden madness in the temple of Jerusalem, believed himself scourged and trampled by angels.\n\nThus also the Admiral de Coligny imposed respect on his assassins and could only be despatched by a madman who fell upon him with averted face.\n\nWhat rendered Joan of Arc invariably victorious was the fascination of her faith and the miracle of her audacity; she paralysed the arms of those who would have assailed her, and the English may have very well been sincere in regarding her as a witch or a sorceress.\n\nAs a fact, she was a sorceress unconsciously, herself believing that she acted supernaturally, while she was really disposing of an occult force which is universal and invariably governed by the same laws.\n\nThe Magus-magnetizer should have command of the natural medium, and consequently of that astral body by which our soul communicates with our organs.\n\nHe must say to the material body, “Sleep!” and to the sidereal body, “Dream!” Thereupon, the aspect of visible things changes, as in hashish-visions.\n\nCagliostro is thought to have possessed this power, and he increased its action by means of fumigations and perfumes; but true magnetic ability should transcend these auxiliaries, all more or less inimical to reason and destructive of health?\n\nM.\n\nRagon, in his learned work on Occult Masonry, gives the recipe for a series of medicaments calculated to induce the exaltation of somnambulism.\n\nIt is by no means a knowledge to be despised, but prudent magists should avoid its practice.\n\nThe Astral Light is projected by glance, by voice, and by the thumb and palm of the hand.\n\nMusic is a potent auxiliary of the voice, and hence comes the word enchantment.\n\nNo musical instrument is more bewitching than the human voice, but the far-away notes of a violin or harmonica may augment its power.\n\nThe patient whom it is proposed to subjugate is prepared in this way; and when he is half-stupefied, as it were, enveloped by the charm, the hands should be extended towards him; he should be commanded to sleep or to see, and he will obey despite himself."

