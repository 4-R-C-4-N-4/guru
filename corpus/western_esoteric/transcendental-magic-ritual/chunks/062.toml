[content]
body = "The chafing-dish containing the sacred fire should be in the centre of the oratory and the altar of perfumes hard by.\n\nThe operator must turn towards the east to pray, and the west to invoke; he must be either alone or assisted by two persons preserving the strictest silence; he must wear the magical vestments, which we have described in the seventh chapter, and must be crowned with vervain and gold.\n\nHe should bathe before the operation, and all his undergarments must be of the most intact and scrupulous cleanliness.\n\nThe ceremony should begin with a prayer suited to the genius of the spirit about to be invoked and one which would be approved by himself if he still lived.\n\nFor example, it would be impossible to evoke Voltaire by reciting prayers in the style of St.\n\nBridget.\n\nFor the great men of antiquity, we may use the Hymns of Cleanthes or Orpheus, with the oath terminating the Golden Verses of Pythagoras.\n\nIn our evocation of Apollonius, we used the Magical Philosophy of Patricius for the Ritual, containing the doctrines of Zoroaster and the writings of Hermes Trismegistus.\n\nWe recited the Nuctemeron of Apollonius in Greek with a loud voice and added a Conjuration beginning: “Let the Father of all be Counsellor and thrice-great Hermes guide.” For the evocation of spirits belonging to religions issued from Judaism, the following Kabalistic Invocation of Solomon should be used, either in Hebrew or in any other tongue with which the spirit in question is known to have been familiar: Powers of the Kingdom, be ye under my left foot and in my right hand!\n\nGlory and Eternity, take me by the two shoulders, and direct me in the paths of victory!\n\nMercy and Justice, be ye the equilibrium and splendor of my life!\n\nIntelligence and Wisdom, crown me!\n\nSpirits of Malkuth, lead me betwixt the two Pillars upon which rests the whole edifice of the Temple!\n\nAngels of Netzah and Hod, establish me upon the cubic stone of Yesod!\n\nO Gedulael!\n\nO Geburael!\n\nO Tiphereth!\n\nBinael, be thou my love; Ruach Hochmael, be thou my light; Be that which thou art and thou shalt be, O Ketheriel!\n\nIshim, assist me in the name of Shaddai!\n\nCherubim, be my strength in the name of Adonai!\n\nBeni-Elohim, be my brethren in the name of the Son, and by the powers of Eloah Elohim, drive me in the name of Tetragrammaton!\n\nMalachim, protect me in the name of Yod He Vau He!\n\nSeraphim, cleanse my love in the name of Eloah!\n\nHasmalim, enlighten me with the splendors of Eloi and Shekinah!\n\nAralim, act!\n\nOphanim, revolve and shine!\n\nZaphkiel ha Kadosh, cry, speak, roar!\n\nKadosh, Kadosh, Kadosh, Shaddai, Adonai, Jotchavah, Ehyezie.\n\nHallelujah, Hallelujah, Hallelujah.\n\nAmen.\n\nIt should be remembered, above all in conjurations, that the names of Satan, Beelzebub, Adramelek and others do not designate spiritual unities but legions of impure spirits.\n\n“Our name is legion, for we are many,” says the spirit of darkness in the Gospel.\n\nNumber constitutes law, and progress takes place inversely in hell as the domain of anarchy.\n\nThat is to say, the most advanced in Satanic development and consequently the most degraded and the least intelligent and feeblest."

