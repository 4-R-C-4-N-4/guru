[content]
body = "The milder and calmer you are, the more effective will be your anger; the more energetic you are, the more valuable will be your forbearance; the more skilful you are, the better will you profit by your intelligence and even by your virtues; the more indifferent you are, the more easily will you make yourself loved.\n\nThis is a matter of experience in the moral order, and is realized literally in the sphere of action.\n\nHuman passions produce blindly the opposites of their unbridled desire, when they act without direction.\n\nExcessive love arouses antipathy; blind hate counteracts and scourges itself; vanity leads to abasement and the most cruel humiliations.\n\nThus, the Great Master revealed a mystery of positive magical science when He said: “Forgive your enemies, do good to those that hate you; so shall ye heap coals of fire upon their heads.” Perhaps this kind of pardon may seem hypocrisy and bear a strong likeness to refined vengeance.\n\nBut we must remember that the Magus is sovereign, and a sovereign never avenges, because he has the right to punish; in the exercise of this right he performs his duty and is implacable as justice.\n\nLet it be observed, for the rest, so that no one may misinterpret my meaning, that it is a question of chastising evil by good and opposing mildness to violence.\n\nIf the exercise of virtue be a flagellation for vice, no one has the right to demand that the latter should be spared, or that we should take pity on its shame and its sufferings.\n\nThe man who dedicates himself to works of science must take moderate daily exercise, abstain from prolonged vigils, and follow a wholesome and regular rule of life.\n\nHe must avoid the effluvia of putrefaction, the neighborhood of stagnant water and indigestible or impure food.\n\nAbove all, he must seek daily relaxation from magical preoccupations amongst material cares, or in ordinary work, whether artistic, industrial or commercial.\n\nThe way to see well is not to be always looking; and he who spends his whole life upon one object will end without attaining it.\n\nAnother precaution must be observed equally, and that is never to experiment when ill.\n\nThe ceremonies being, as we have said, artificial methods for creating a habit of will, become unnecessary when the habit is confirmed.\n\nIt is in this sense, and addressing himself solely to perfect adepts, that Paracelsus proscribes ceremonial work in his Occult Philosophy.\n\nBut procedure must be simplified progressively before it is dispensed with altogether, in proportion to the experience we obtain in acquired powers, and established habit in the exercise of extranatural will."

