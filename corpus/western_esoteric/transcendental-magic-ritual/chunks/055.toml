body = "Here then is the great Hermetic Arcanum, and we reveal it for the first time clearly and devoid of mystical figures: that which the adepts term dead substances are bodies as found in Nature; living substances are those which have been assimilated and magnetized by the science and will of the operator.\n\nThere-fore the Great Work is something more than • chemical operation: it is an actual creation of the human Word initiated into the power of the Word of God Himself.\n\nThis Hebrew text, which we transcribe in proof of the authenticity and reality of our discovery, is derived from the rabbinical Jew Abraham, the master of Nicholas Flamel, and it is found in his occult commentary on the Sepher Yetzirah the sacred book of the Kabalah.\n\nThis commentary is extremely rare, but the sympathetic potencies of our chain led us to the discovery of a copy which has been preserved since the year 1643 in the Protestant church at Rouen.\n\nOn its first page there is written: Ex dono, then an illegible name, followed by Dei magni.\n\nThe creation of gold in the Great Work takes place by transmutation and multiplication.\n\nRaymund Lully states that in order to make gold we must have gold and mercury, while in order to make silver we must have silver and mercury.\n\nThen he adds: “By Mercury, I understand that mineral spirit which is so refined and purified that it gilds the seed of gold and silvers the seed of silver.” Doubtless he is here speaking of Od, or Astral Light.\n\nSalt and Sulphur are serviceable in the work only for the preparation of Mercury: it is with Mercury above all that the Magnetic Agent must be assimilated and as if incorporated.\n\nParacelsus, Raymund Lully and Nicholas Flamel seem alone to have understood this mystery perfectly.\n\nBasil Valentine and Trevisan indicate it after an incomplete manner, which might be capable of another interpretation.\n\nBut the most curious things which we have found on this subject are indicated by the mystical figures and magical legends in a book of Henry Khunrath, entitled Amphitheatrum Sapientae Aeternae.\n\nKhunrath represents and resumes the most learned Gnostic schools, and connects in symbology with the mysticism of Synesius.\n\nHe affects Christianity in expressions and in signs, but it is easy to see that his Christ is the ABRAXAS, the Luminous Pentagram radiating on the Astronomical Cross, the incarnation in humanity of the sovereign sun celebrated by the Emperor Julian; it is the luminous and living manifestation of that Ruach - Elohim which, according to Moses, brooded and worked upon the bosom of the waters at the birth of the world; it is the man-sun, the monarch of light, the supreme magus, the master and conqueror of the serpent, and in the fourfold legend of the evangelists, Khunrath finds the allegorical key of the Great Work.\n\nOne of the Pantacles of his magical book represents the Philosophical Stone erected in the middle of a fortress surrounded by a wall in which there are twenty impracticable gates.\n\nOne alone conducts to the sanctuary of the Great Work.\n\nAbove the Stone there is a triangle placed upon a winged dragon, and on the Stone is graven the name of Christ, qualified as the symbolical image of all Nature.\n\n“It is by Him alone,” he adds, “that thou canst obtain the Universal Medicine for men, animals, vegetables and minerals.” The Winged Dragon, dominated by the triangle, represents therefore the Christ of Khunrath - that is, the Sovereign Intelligence of Light and Life.\n\nIt is the secret of the Pentagram; it is the highest dogmatic and practical mystery of Traditional Magic.\n\nThence unto the grand and ever-incommunicable maxim there is only one step."

