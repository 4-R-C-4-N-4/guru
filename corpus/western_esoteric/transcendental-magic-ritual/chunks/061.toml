[content]
body = "Every evening at the same hour we must shut ourselves in the chamber consecrated to the memory of the lamented person, using only one small light, such as that of a funeral lamp or taper.\n\nThis light should be placed behind us, the portrait should be uncovered, and we should remain before it for an hour in silence; finally, we should fumigate the apartment with a little good incense, and go out backwards.\n\nOn the morning of the day fixed for the evocation, we should adorn ourselves as if for a festival, not salute anyone first, make but a single repast of bread, wine and roots, or fruits.\n\nThe cloth should be white, two covers should be laid, and one portion of the broken bread should be set aside; a little wine should be placed also in the glass of the person whom we design to invoke.\n\nThe meal must be eaten alone in the chamber of evocations and in presence of the veiled portrait; it must be all cleared away at the end, except the glass belonging to the dead person, and his portion of bread, which must be set before the portrait.\n\nIn the evening, at the hour for the regular visit, we must repair in silence to the chamber, light a clear fire of cypress-wood and cast incense seven times thereon, pronouncing the name of the person whom we desire to behold.\n\nThe lamp must then be extinguished, and the fire permitted to die out.\n\nOn this day the portrait must not be unveiled.\n\nWhen the flame dies down, put more incense on the ashes and invoke God according to the forms of that religion to which the dead person belonged, and according to the ideas which he himself possessed of God.\n\nWhile making this prayer, we must identify ourselves with the evoked person, speak as he spoke, believe in a sense as he believed.\n\nThen, after a silence of fifteen minutes, we must speak to him as if he were present, with affection and with faith, praying him to appear before us.\n\nRenew this prayer mentally, covering the face with both hands; then call him thrice with a loud voice; remain kneeling, the eyes closed or covered, for some minutes; then call again thrice upon him in a sweet and affectionate tone, and slowly open the eyes.\n\nShould nothing result, the same experiment must be renewed in the following year, and if necessary a third time, when it is certain that the desired apparition will be obtained, and the longer it has been delayed the more realistic and striking it will be.\n\nEvocations of knowledge and intelligence are performed with more solemn ceremonies.\n\nIf concerned with a celebrated personage, we must meditate for twenty-one days upon his life and writings, form an idea of his appearance, converse with him mentally and imagine his answers.\n\nWe must carry his portrait, or at least his name, about us, following a vegetarian diet for twenty-one days and a severe fast during the last seven.\n\nWe must next construct the magical oratory, described in the thirteenth chapter of our “Doctrine”, and see that all light is excluded therefrom.\n\nIf, however, the proposed operation is to take place in the day-time, we may leave a narrow aperture on the side where the sun will shine at the hour of evocation, place a triangular prism before this opening and a crystal globe filled with water facing the prism.\n\nIf the experiment has been arranged for night, the magic lamp must be so situated that its single ray shall fall upon the altar smoke.\n\nThe purpose of these preparations is to furnish the Magic Agents with elements of corporeal appearance, and to ease as much as possible the tension of imagination, which could not be exalted without danger into the absolute illusion of dream.\n\nFor the rest, it will be understood easily that a beam of sunlight or the ray of a lamp coloured variously and falling upon curling and irregular smoke can in no way create a perfect image."

