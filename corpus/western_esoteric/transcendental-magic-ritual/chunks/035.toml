[content]
body = "Should he resist, a fixed glance must be directed towards him, one thumb placed between his eyes and the other on his breast, so touching him lightly with a single and swift contact; the breath must be slowly drawn in and again breathed gently and warmly forth, repeating in a low voice, “Sleep!” or “See!”"

