[content]
body = "When, by means of absolute initiation, we can dispose of the forces of the Universal Agent, this Stone is always to our hand, for its extraction is then a simple and easy operation, far different from projection or metallic realization.\n\nThe Stone in its sublimated state must not be exposed to the air, which might dissolve it and spoil its virtue.\n\nMoreover, to inhale its exhalations is not devoid of danger.\n\nThe wise man more readily conserves it in the natural envelopes, knowing that he can extract it by a single effort of his will and by a single application of the Universal Agent to the envelopes, which Kaba-lists term shells.\n\nTo express hieroglyphically this law of prudence, the sages ascribed to their Mercury, personified in Egypt as Hermanubis, a dog's head, and to their Sulphur, represented by the Baphomet of the Temple or Prince of the Sabbath, that goat's head which brought such odium upon the occult associations of the middle ages.\n\nFor the mineral work, the First Matter is exclusively mineral, but it is not a metal.\n\nIt is a metallized salt.\n\nThis Matter is called vegetable because it resembles a fruit, and animal because it produces a kind of milk and blood.\n\nIt contains within itself the fire by which it must be dissolved."

