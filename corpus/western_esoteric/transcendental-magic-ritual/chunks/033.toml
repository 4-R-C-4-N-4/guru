[content]
body = "Archimedes postulated a fulcrum outside the world in order to raise the world.\n\nThe fulcrum of the Magus is the intellectual cubic stone, the Philosophical Stone of AzOTH - that is, the doctrine of absolute reason and universal harmonies by the sympathy of contraries.\n\nOne of our most fertile writers, and one of those who are least fixed in their ideas, M.\n\nEugene Sue, has founded a vast romance-epic upon an individuality whom he strives to render odious, who becomes interesting against the will of the novelist, so abundantly does he gift him with patience, audacity, intelligence and genius.\n\nWe are in the presence of a kind of Sixtus V - poor, temperate, passionless, holding the entire world entangled in the web of his skilful combinations.\n\nThis man excites at will the passions of his enemies, destroys them by means of one another, invariably reaches the point of view, and this without noise, without ostentation and without imposture.\n\nHis object is to free the world of a society which the author of the book believes to be dangerous and malignant, and to attain it no cost is too great.\n\nRodin is ill lodged, ill clothed, nourished like the refuse of humanity, but ever fixed upon his work.\n\nConsistently with his intention, the author depicts him as wretched, filthy, hideous, repulsive to the touch and horrible to the sight.\n\nBut supposing this very exterior is a means of disguising the enterprise and so of more surely attaining it, is it not proof positive of sublime courage?\n\nWhen Rodin becomes pope, do you think that he will be ill clothed and dirty?\n\nHence M.\n\nEugene Sue has missed his point; his object was to deride superstition and fanaticism, but that which he attacks is intelligence, strength, genius, the most signal human virtues.\n\nWere there many more Rodins among the Jesuits, were there one even, I would not give much for the success of the opposite party, in spite of the brilliant and maladroit special pleadings of its illustrious advocates.\n\nTo will well, to will long, to will always, but never to lust after anything, such is the secret of power, and this is the Magical Arcanum which Tasso brings forward in the persons of the two knights who come to deliver Rinaldo and to destroy the enchantments of Armida.\n\nThey withstand equally the most alluring nymphs and most terrible wild beasts.\n\nThey remain without desires and without fear, and hence they attain their end.\n\nDoes it follow from this that a true magician inspires more fear than love?\n\nI do not deny it, and while recognizing abundantly how sweet are the attractions of life, while doing full justice to the gracious genius of Anacreon and to all the youthful efflorescence of the poetry of love, I invite the estimable votaries of pleasure to regard the transcendental sciences merely as a matter of curiosity and never to approach the magical tripod: the great works of science are mortal to sense-enjoyment.\n\nThe man who has escaped from the chain of instincts will first of all realize his omnipotence by the obedience of animals.\n\nThe history of Daniel in the lions den is no fable, and more than once, during the persecutions of infant Christianity, this phenomenon recurred in the presence of the whole Roman people.\n\nA man seldom has anything to fear from an animal of which he is not afraid.\n\nThe bullets of Jules Gerard, the lion-killer, are magical and intelligent.\n\nOnly once did he run a real danger; he allowed a timid companion to accompany him, and, looking upon this imprudent person as lost beforehand, he also was afraid, not for himself but for his comrade."

