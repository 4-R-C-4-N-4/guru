[content]
body = "Mystification combined with it after wards, and even educated and intelligent persons were so infatuated with the novelty that they hoaxed themselves, and became the dupes of their own absurdity.\n\nThe oracles of the tables were answers more or less voluntarily suggested extracted by chance: they resembled the conversations which we hold or hear in dreams.\n\nOther and stranger phenomena may have been exteriorized products of imaginations at work in common.\n\nWe, however, by no means deny the possible intervention of elementary spirits in these occurrences, as in those of divination by cards or by dreams; but we do not believe that it has been in any sense proven, and we are therefore in no way obliged to admit it.\n\nOne of the most extraordinary powers of human imagination is the fulfilment of the desires of the will, or even of its apprehensions and fears.\n\nWe believe easily anything that we fear or desire, says a proverb; and it is true, because desire and fear impart to imagination a realizing power, the effects of which are incalculable.\n\nHow is one attacked, for example, by a disease about which one feels nervous?\n\nWe have cited already the opinions of Paracelsus on this point, and have established in our doctrinal part certain occult laws confirmed by experience; but in magnetic currents, and by mediation of the chain, the realizations are all the more strange because almost invariably unexpected, at least when the chain has not been formed by an intelligent, sympathetic and powerful leader.\n\nIn fact, they are the result of purely blind and fortuitous combinations.\n\nThe vulgar fear of superstitious guests when they find themselves thirteen at table, and their conviction that some misfortune threatens the youngest and weakest among them, like most superstitions, a remnant of magical science.\n\nThe duodenary, being a complete and cyclic number in the universal analogies of Nature, invariably attracts and absorbs the thirteenth, which is regarded as a sinister and superfluous number.\n\nIf the grindstone of a mill be represented by the number twelve, then thirteen is that of the grain which is to be ground.\n\nOn kindred considerations, the ancients established the distinctions between lucky and unlucky numbers, whence came the observance of days of good or evil augury.\n\nIt is over such matters above all that imagination is creative, so that both days and numbers seldom fail to be propitious or otherwise to those who believe in their influence.\n\nConsequently, Christianity was right in proscribing the divinatory sciences, for in thus diminishing the number of blind chances it gave further scope and empire to liberty.\n\nPrinting is an admirable instrument for the formation of the magic chain by the extension of speech.\n\nNo book is lost; as a fact, writings go invariably precisely where they should go, and the aspirations of thought attract speech.\n\nWe have proved this a hundred times in the course of our magical initiation; the rarest books have offered themselves without seeking as soon as they became indispensable.\n\nThus have we recovered intact that universal science which so many learned persons have regarded as engulfed by a number of successive cataclysms; thus have we entered the great magical chain which began with Hermes or Enoch and will end only with the world.\n\nThus have we been able to evoke and come face to face with the spirits of Apollonius, Plotinus, Synesius, Paracelsus, Cardanus, Cornelius Agrippa and others less or more known, but too religiously celebrated to make it possible for them to be named lightly.\n\nWe continue their great work, which others will take up after us.\n\nBut unto whom shall it be given to complete it?"

