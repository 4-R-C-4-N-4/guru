[content]
body = "THE Abbot Trithemius, who in Magic was the master of Cornelius Agrippa, explains, in his Steganography, the secret of Conjurations and Evocations after a very natural and philosophical manner, though possibly, for that very reason, too simply and too easily.\n\nHe tells us that to evoke a spirit is to enter into the dominant thought of that spirit, and if we raise ourselves morally higher along the same line, we shall draw the spirit away with us, and it will serve us.\n\nTo conjure is to oppose the resistance of a current and a chain to an isolated spirit-cum-jurare, to swear together, that is, to make a common act of faith.\n\nThe greater the strength and enthusiasm of this faith, the more efficacious is the conjuration.\n\nThis is why new-born Christianity silenced the oracles; it alone possessed inspiration, it only force.\n\nLater on, when St.\n\nPeter grew old, that is, when the world believed that it had a legal case against the Papacy, the spirit of prophecy came to replace the oracles.\n\nSavonarola, Joachim of Flores, John Huss and so many others influenced by turns the minds of men and interpreted, by lamentations and menaces, the secret anxieties and protestations of all hearts.\n\nWe may act individually when evoking a spirit, but to conjure we must speak in the name of a circle or an association: this is the significance of the hieroglyphical circle inscribed about the Magus who is operating, and out of which he must not pass unless he wishes at the same moment to be stripped of all his power.\n\nLet us deal at this point with the vital and palmary question, whether the real evocation and real conjuration of spirits are things possible, and whether such possibility can be demonstrated scientifically.\n\nTo the first part of the question it may be replied out of hand that everything which is not an evident impossibility can and must be admitted provisionally.\n\nAs to the second part, we affirm that in virtue of the Great Magical Dogma of the hierarchy and of universal analogy, the kabalistic possibility of real evocations can be demonstrated; concerning the phenomenal reality consequent upon magical operations accomplished with sincerity, this is a matter of experience.\n\nAs already narrated, we have established it in our own persons, and by means of this “Ritual” we shall place our readers in a position to renew and confirm our experiences.\n\nNothing perishes in Nature; whatsoever has lived goes on living, always under new forms; but even the anterior forms are not destroyed, since they remain in our memory.\n\nDo we not still see in imagination the child whom we once knew, though now he is an old man?\n\nThe very traces which we believe to be effaced from our memory are not in reality blotted out, for a fortuitous circumstance may evoke and recall them.\n\nBut after what manner do we see them?\n\nAs we have already said, it is in the Astral Light, which transmits them to our brain by the mechanism of the nervous system.\n\nOn the other hand, all forms are proportional and analogical to the idea which has determined them; they are the natural character, the signature of that idea, as the Magi term it, and so soon as the idea is evoked actively the form is realized and bodied forth.\n\nSchroepffer, the famous illumine of Leipzig, terrified all Germany with his evocations, and his audacity in magical experiments was so great that his reputation became an insupportable burden.\n\nHe allowed himself to be carried away by the immense current of hallucinations which he had produced; the visions of the other world disgusted him with this, and he killed himself.\n\nHis story should be a warning to those who are fascinated by Ceremonial Magic."

