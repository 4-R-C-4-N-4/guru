[content]
body = "If I weary in my long travellings, if my beauty be less mild than thine own, and if my garments are not unspotted, yet am I a noble daughter of heaven, even as thou art.\n\nLeave me the secret of my terrible destiny, leave me the dread which surrounds me, curse me even if thou canst not comprehend; I shall none the less accomplish my work, and continue my career under the impulse of the breath of God!\n\nHappy are the stars which rest, which shine like youthful queens in the peaceful society of the universe!\n\nI am the proscribed, the eternal wanderer, who has infinity for domain.\n\nThey accuse me of setting fire to the planets, the heat of which I renew; they accuse me of terrifying the stars which I enlighten; they chide me with breaking in upon universal harmony, because I do not revolve about their particular centres, though I join them one with another, directing my gaze towards the sole centre of all the suns.\n\nBe reassured, therefore, O beauteous fixed star!\n\nI shall not impoverish thy peaceful light; rather I shall expend in thy service my own life and heat.\n\nI shall disappear from heaven when I shall have consumed myself, and my doom will have been glorious enough!\n\nKnow that various fires burn in the temple of God, and do all give Him glory: ye are the light of golden candelabra; I am the flame of sacrifice.\n\nLet us each fulfil our destinies.” Having uttered these words, the comet tosses back her burning hair, uplifts her fiery shield and plunges into infinite space, seeming to be lost for ever.\n\nThus Satan appeared and disappeared in the allegorical narratives of the Bible.\n\n“Now there was a day,” says the book of Job, “when the sons of God came to present them selves before the Lord, and Satan came also among them.\n\nAnd the Lord said unto Satan: ‘Whence comest thou?’ Then Satan answered the Lord, and said: ‘From going to and fro in the earth, and from walking up and down in it.’” A Gnostic gospel, discovered in the East by a learned traveller of our acquaintance, explains the genesis of light to the profit of Lucifer, as follows: “Self-conscious truth is living thought.\n\nTruth is thought as it is in itself, and formulated thought is speech.\n\nWhen Eternal Thought desired a form, it said: ‘Let there be light.’ Now, this Thought which speaks is the Word, and the Word said: ‘Let there be light,’ because the Word itself is the light of minds.\n\nThe untreated light, which is the Divine Word, shines because it desires to be seen.\n\nWhen it says: ‘Let there be light!’ it ordains that eyes shall open; it creates intelligences.\n\nWhen God said: ‘Let there be light!’ Intelligence was made, and the light appeared.\n\nNow, the Intelligence which God diffused by the breath of His mouth, like a star given off from the sun, took the form of a splendid angel, who was saluted by heaven under the name of Lucifer.\n\nIntelligence awakened, and comprehended its nature completely by the understanding of that utterance of the Divine Word: ‘Let there be light!’ It felt itself to be free because God had called it into being, and, raising up its head, with both wings extended, it replied: ‘I will not be slavery.’ ‘Then shalt thou be suffering,’ said the Untreated Voice.\n\n‘I will be liberty,’ replied the light.\n\n‘Pride will seduce thee,’ said the Supreme Voice, ‘and thou wilt bring forth death.’ ‘I needs must strive with death to conquer life,’ again responded the created light."

