body = "We proceed to the explanation and consecration of the Sacred and Mysterious Pentagram.\n\nAt this point, let the ignorant and superstitious close the book; they will either see nothing but darkness, or they will be scandalized.\n\nThe Pentagram, which in Gnostic schools is called the Blazing Star, is the sign of intellectual omnipotence and autocracy.\n\nIt is the Star of the Magi; it is the sign of the Word made flesh; and, according to the direction of its points, this absolute magical symbol represents order or confusion, the Divine Lamb of Ormuz and St.\n\nJohn, or the accursed goat of Mendes.\n\nIt is initiation or profanation; it is Lucifer or Vesper, the star of morning or evening.\n\nIt is Mary or Lilith, victory or death, day or night.\n\nThe Pentagram with two points in the ascendant represents Satan as the goat of the Sabbath; when one point is in the ascendant, it is the sign of the Saviour.\n\nThe Pentagram is the figure of the human body, having the four limbs and a single point representing the head.\n\nA human figure head downwards naturally represents a demon that is, intellectual subversion, disorder or madness.\n\nNow, if Magic be a reality, if occult science be really the true law of the three worlds, this absolute sign, this sign ancient as history and more ancient, should and does exercise an incalculable influence upon spirits set free from their material envelope.\n\nThe sign of the Pentagram is called the Sign of the Microcosm, and it represents what the Kabalists of the book Zohar term the Microprosopus.\n\nThe complete comprehension of the Pentagram is the key of the two worlds.\n\nIt is absolute philosophy and natural science.\n\nThe sign of the Pentagram should be composed of the seven metals, or at least traced in pure gold upon white marble.\n\nIt may be also drawn with vermilion on an unblemished lambskin the symbol of integrity and light.\n\nThe marble should be virgin, that is, should never have been used for another purpose; the lambskin should be prepared under the auspices of the sun.\n\nThe lamb must have been slain at Paschal time with a new knife, and the skin must be salted with salt consecrated by magical operations.\n\nThe omission of even one of these difficult and apparently arbitrary ceremonies makes void the entire success of the great works of science.\n\nThe Pentagram is consecrated with the four elements; the magical figure is breathed on five times; it is sprinkled with holy water; it is dried by the smoke of five perfumes, namely, incense, myrrh, aloes, sulphur and camphor, to which a little white resin and ambergris may be added.\n\nThe five breathings are accompanied by the utterance of names attributed to the five genii, who are Gabriel, Raphael, Anael, Samael and Oriphiel.\n\nAfterwards the Pentacle is placed successively at the north, south, east, west and centre of the astronomical cross, pronouncing at the same time, one after another, the consonants of the Sacred Tetragram, and then, in an undertone, the blessed letters ALEPH and the mysterious TAU, united in the kabalistic name of AzOTH.\n\nThe Pentagram should be placed upon the altar of perfumes and under the tripod of evocations.\n\nThe operator should wear the sign also as well as that of the Macrocosm, which is composed of two crossed and superposed triangles.\n\nWhen a spirit of light is evoked, the head of the star - that is, one of its points - should be directed towards the tripod of evocations and the two inferior points towards the altar of perfumes."

