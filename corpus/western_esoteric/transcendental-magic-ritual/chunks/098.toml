[content]
body = "We have defined miracles as the natural effects of exceptional causes.\n\nThe immediate action of the human will upon bodies, or at least that action exercised without visible means, constitutes a miracle in the physical order.\n\nThe influence exercised upon wills or intelligences, either suddenly or within a given time, and capable of subjugating thoughts, changing the most determined resolutions, paralysing the most violent passions - this influence constitutes a miracle in the moral order.\n\nThe common error concerning miracles is to regard them as effects without causes, contradictions of Nature, sudden vagaries of the Divine Mind, not seeing that a single miracle of this class would destroy the universal harmony and reduce the universe to chaos.\n\nThere are miracles which are impossible even for God, namely, those that involve absurdity.\n\nCould God be absurd for one instant, neither Himself nor the world would be in existence the moment following.\n\nTo expect from the Divine Arbiter an effect having a disproportionate cause, or even no cause at all, is what is called tempting God: it is casting one's self into the void.\n\nGod operates by His works - in heaven by angels and on earth by men.\n\nHence, in the circle of angelic action, the angels can perform all that is possible for God, and in the human circle of action men can dispose equally of Divine Omnipotence.\n\nIn the heaven of human conceptions it is humanity which creates God, and men think that God has made them in His image because they have made Him in theirs.\n\nThe domain of man is all corporeal and visible Nature on earth, and if he cannot rule suns and stars, he can at least calculate their motion, compute their distances and identify his will with their influence.\n\nHe can modify the atmosphere, act up to a certain point upon the seasons, heal or harm his neighbours, preserve life and inflict death.\n\nBy the conservation of life we understand resurrection in certain cases, as already established.\n\nThe absolute in reason and volition is the greatest power which can be given any man to attain, and it is by means of this power that he performs what astonishes the multitude under the name of miracles.\n\nThe most perfect purity of intention is indispensable to the thaumaturge, and in the next place a favourable current and unlimited confidence.\n\nThe man who has come to fear nothing and desire nothing is master of all.\n\nThis is the meaning of that beautiful allegory of the Gospel, wherein the Son of God, thrice victor over the unclean spirit, receives ministration from angels in the wilderness.\n\nNothing on earth withstands a free and rational will.\n\nWhen the wise man says, “I will,” it is God Himself Who wills, and all that he commands takes place.\n\nIt is the knowledge and self-reliance of the physician which constitute the virtue of his prescriptions, whence thaumaturgy is the only real and efficacious remedy.\n\nIt follows that occult therapeutics are apart from all vulgar medication.\n\nIt makes use for the most part of words and insufflations, and communicates by will a diverse virtue to the simplest substances - water, oil, wine camphor, salt.\n\nThe water of homoeopathists is truly a magnetized and enchanted water, which works by means of faith.\n\nThe dynamic substances added in, so to speak, infinitesimal quantities are consecrations and signs of the physician's will.\n\nWhat is vulgarly called charlatanism is a great means of real success in medicine, assuming that it is sufficiently skilful to inspire great confidence and to form a circle of faith.\n\nIn medicine, above all, it is faith which saves.\n\nThere is scarcely a village which does not possess its male or female compounder of occult medicine, and these people are - almost everywhere and always - incomparably more successful than physicians approved by the faculty."

