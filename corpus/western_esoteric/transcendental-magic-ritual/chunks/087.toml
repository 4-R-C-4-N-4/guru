body = "This day is consecrated to mental enterprises and should be favourable for opportune innovations.\n\n2.\n\nPope Joan, or Occult Science.\n\nThe second day, the genius of which Enediel, was the fifth of creation, for the moon was made on the fourth day.\n\nThe birds and fishes, created on this day, are living hieroglyphs of magical analogies and of the universal doctrine of Hermes.\n\nThe water and air, which were filled thereby with forms of the Word, are elementary figures of the Mercury of the Sages, that is, of intelligence and speech.\n\nThis day is propitious to revelations, initiations and great discoveries of science.\n\n3.\n\nThe Celestial Mother, or Empress.\n\nThe third day was that of man's creation.\n\nSo is the moon called the MOTHER in Kabalah, when it is represented in association with the number 3.\n\nThis day is favourable to generation and generally to all productions, whether of body or mind.\n\n4.\n\nThe Emperor, or Ruler.\n\nThe fourth day is baleful: it was that of the birth of Cain; but it is favourable to unjust and tyrannical enterprises.\n\n5.\n\nThe Pope, or Hierophant.\n\nThe fifth day is fortunate; it was that of the birth of Abel.\n\n6.\n\nThe Lover, or Liberty.\n\nThe sixth day is a day of pride; it was that of the birth of Lamech, who said unto his wives: “I have slain a man to my wounding, and a young man to my hurt.\n\nIf Cain shall be avenged sevenfold, truly Lamech seventy and sevenfold.” This day is propitious for conspiracies and rebellions.\n\n7.\n\nThe Chariot.\n\nOn the seventh day, birth of Hebron, who gave his name to the first of the seven sacred cities of Israel.\n\na day of religion, prayers and success.\n\n8.\n\nJustice.\n\nMurder of Abel.\n\nDay of expiation.\n\n9.\n\nThe Old Man, or Hermit.\n\nBirth of Methuselah.\n\nDay of blessing for children.\n\n10.\n\nEzekiel's Wheel of Fortune.\n\nBirth of Nebuchadnezzar.\n\nReign of the Beast.\n\nFatal day.\n\n11.\n\nStrength.\n\nBirth of Noah.\n\nVisions on this day are deceitful, but it is one of health and long life for children born on it.\n\n12.\n\nThe Victim, or Hanged Man.\n\nBirth of Samuel.\n\nProphetic and kabalistic day, favourable to the fulfilment of the Great Work.\n\n13.\n\nDeath.\n\nBirthday of Canaan, the accursed son of Chain.\n\nBaleful day and fatal number.\n\n14.\n\nThe Angel of Temperance.\n\nBlessing of Noah on the fourteenth day of the moon.\n\nThis day is governed by the angel Cassiel of the hierarchy of Uriel.\n\n15.\n\nTyphon, or the Devil.\n\nBirth of Ishmael.\n\nDay of reprobation and exile.\n\n16.\n\nThe Blasted Tower.\n\nBirthday of Jacob and Esau; the day also of Jacob's predestination, to Esau's ruin.\n\n17.\n\nThe Glittering Star.\n\nFire from heaven burns Sodom and Gomorrah.\n\nDay of salvation for the good and ruin for the wicked: dangerous on a Saturday.\n\nIt is under the dominion of the Scorpion.\n\n18.\n\nThe Moon.\n\nBirth of Isaac.\n\nWife's triumph.\n\nDay of conjugal affection and good hope.\n\n19.\n\nThe Sun.\n\nBirth of Pharoah.\n\na beneficent or fatal day for the great of earth, according to the different merits of the great.\n\n20.\n\nThe Judgement.\n\nBirth of Jonah, the instrument of God's judgement.\n\nPropitious for Divine Revelations.\n\n21.\n\nThe World.\n\nBirth of Saul, material royalty.\n\nDanger to mind and reason.\n\n22.\n\nInfluence of Saturn.\n\nBirth of Job.\n\nDay of trial and suffering.\n\n23.\n\nInfluence of Tenus."

