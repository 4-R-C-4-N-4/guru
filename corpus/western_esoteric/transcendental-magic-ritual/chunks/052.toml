body = "The Great Work in Practical Magic, after the education of the will and the personal creation of the Magus, is the formation of the magnetic chain, and this secret is truly that of priesthood and of royalty.\n\nTo form the magnetic chain is to originate a current of ideas which produces faith and draws a large number of wills in a given circle of active manifestation.\n\na well-formed chain is like a whirlpool which sucks down and absorbs all.\n\nThe chain may be established in three ways - by signs, by speech and by contact.\n\nThe first is by inducing opinion to adopt some sign as the representation of a force.\n\nThus, all Christians communicate by the Sign of the Cross, Masons by that of the square beneath the sun, the Magi by that of the Microcosm, made by extending the five fingers, etc.\n\nOnce accepted and propagated, signs acquire force of themselves.\n\nIn the early centuries of our era, the sight and making of the Sign of the Cross was enough to bring proselytes to Christianity.\n\nWhat is called the miraculous medal continues in our own days to effect a great number of conversions by the same magnetic law.\n\nThe vision and illumination of the young Israelite, Alphonse de Ratisbonne, is the most remarkable fact of this kind.\n\nImagination is creative not only within us but without us by means of our fluidic projections, and undoubtedly the phenomena of the Labarum of Constantine and the Cross of Migne should be attributed to no other cause.\n\nThe magic chain of speech was typified among the ancients by chains of gold, which issued from the mouth of Hermes.\n\nNothing equals the electricity of eloquence.\n\nSpeech creates the highest intelligence in the most grossly constituted masses.\n\nEven those who are too remote for actual hearing understand by sympathy and are carried away with the crowd.\n\nPeter the Hermit convulsed Europe by his cry of “God wills it!” A single word of the Emperor electrified his army and made France invincible.\n\nProudhon destroyed socialism by his celebrated paradox: “Property is robbery.” A current saying is sufficient on occasion to demolish a reigning power.\n\nVoltaire knew this well - he who shook the world by sarcasms.\n\nSo, also, he who feared neither pope nor king, neither parliament nor Bastille, was afraid of a pun.\n\nWe are on the verge of fulfilling the intentions of that man whose sayings we repeat.\n\nThe third method of establishing the magic chain is by contact.\n\nBetween persons who meet frequently, the head of the current soon manifests, and the strongest will is not slow to absorb the others.\n\nThe direct and positive grasp of hand by hand completes the harmony of dispositions, and it is for this reason a mark of sympathy and intimacy.\n\nChildren, who are guided instinctively by Nature, form the magic chain by playing at base or rounds: then gaiety spreads, then laughter rings.\n\nCircular tables are more favourable to convivial meetings than those of any other shape.\n\nThe great circular dance of the Sabbath, which concluded the mysterious assemblies of adepts in the Middle Ages, was a magic chain: it joined all in the same intentions and the same acts.\n\nIt was formed by standing back to back and linking hands, the face outside the circle, in imitation of those antique sacred dances, representations of which are still found on the sculptures of old temples.\n\nThe electric furs of the lynx, panther and even domestic cat, were stitched to garments, in imitation of the ancient bacchanalia.\n\nHence comes the tradition that the Sabbath miscreants each wore a cat hung from the girdle, and that they danced in this guise.\n\nThe phenomena of tilting and talking tables have been fortuitous exhibitions of fluidic communication by means of the circular chain."

