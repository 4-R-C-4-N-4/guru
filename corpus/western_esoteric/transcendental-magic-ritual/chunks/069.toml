[content]
body = "We recur once more to that terrible number fifteen, symbolized in the Tarot by a monster throned upon an altar, mitred and horned, having a woman's breasts and the generative organs of a man - a chimera, a malformed sphinx, a synthesis of deformities.\n\nBelow this figure we read a frank and simple inscription - The Devil.\n\nYes, we confront here that phantom of all terrors, the dragon of all theogonies, the Ahriman of the Persians, the Typhon of the Egyptians, the Python of the Greeks, the old serpent of the Hebrews, the fantastic monster, the nightmare, the Croquemitaine, the gargoyle, the great beast of the Middle Ages, and - worse than all these - the Baphomet of the Templars, the bearded idol of the alchemist, the obscene deity of Mendes, the goat of the Sabbath.\n\nThe frontispiece to this “Ritual” reproduces the exact figure of the terrible emperor of night, with all his attributes and all his characters.\n\nLet us state now for the edification of the vulgar, for the satisfaction of M.\n\nle Comte de Mirville, for the justification of the demonologist Bodin, for the greater glory of the Church, which persecuted Templars, burnt magicians, excommunicated Freemasons, etc.\n\n- let us state boldly and precisely that all inferior initiates of the occult science and profaners of the Great Arcanum, not only did in the past but do now, and will ever, adore what is signified by this alarming symbol.\n\nYes, in our profound conviction, the Grand Masters of the Order of the Templars worshipped the Baphomet, and caused it to be worshipped by their initiates; yes, there existed in the past, and there may be still in the present, assemblies which are presided over by this figure, seated on a throne and having a flaming torch between the horns.\n\nBut the adorers of this sign do not consider, as do we, that it is a representation of the devil: on the contrary, for them it is that of the god Pan, the god of our modern schools of philosophy, the god of the Alexandrian theurgic school and of our own mystical Neoplatonists, the god of Lamartine and Victor Cousin, the god of Spinoza and Plato, the god of the primitive Gnostic schools; the Christ also of the dissident priesthood.\n\nThis last qualification, ascribed to the goat of Black Magic, will not astonish students of religious antiquities who are acquainted with the phases of symbolism and doctrine in their various transformations, whether in India, Egypt or Judea.\n\nThe bull, the dog and the goat are the three symbolical animals of Hermetic Magic, resuming all the traditions of Egypt and India.\n\nThe bull represents the Earth or Salt of the Philosophers; the dog is Hermanubis, the Mercury of the sages - otherwise, fluid, air and water; the goat represents fire and is at the same time the symbol of generation.\n\nTwo goats, one pure and one impure, were consecrated in Judea; the first was sacrificed in expiation for sins; the other, loaded with those sins by imprecation, was set at liberty in the desert - a strange ordinance, but one of deep symbolism, signifying reconciliation by sacrifice and expiation by liberty!\n\nNow, all the fathers of the Church, who have concerned themselves with Jewish symbolism, have recognized in the immolated goat the figure of Him Who assumed, as they say, the very form of sin.\n\nHence the Gnostics were not outside symbolical traditions when they assigned this same mystical figure to Christ the Liberator."

