[content]
body = "KNOWEST thou that old queen of the world who is on the march always and wearies never?\n\nEvery uncurbed passion, every selfish pleasure, every licentious energy of humanity, and all its tyrannous weakness, go before the sordid mistress of our tearful valley, and, scythe in hand, these indefatigable labourers reap their eternal harvest.\n\nThat queen is old as time, but her skeleton is concealed in the wreckage of women's beauty, which she abstracts from their youth and love.\n\nHer skull is adorned with lifeless tresses that are not her own.\n\nSpoliator of crowned heads, she is embellished with the plunder of queens, from the star-begemmed hair of Berenice to that-white, but not with age-which the executioner sheared from the brow of Marie Antoinette.\n\nHer livid and frozen body is clothed in faded garments and tattered winding-sheets.\n\nHer bony hands, covered with rings, hold diadems and chains, scepters and crossbones, jewels and ashes.\n\nWhen she goes by, doors open of themselves; she passes through walls; she penetrates to the cabinets of kings; she surprises the extortioners of the poor in their most secret orgies; she sits down at their board, pours out their wine, grins at their songs with her gumless teeth, takes the place of the lecherous courtesan hidden behind their curtains.\n\nShe delights to hover about sleeping voluptuaries; she seeks their caresses, as if she hoped to grow warm in their embrace; but she freezes all those whom she touches and herself never kindles.\n\nAt times, notwithstanding, one would think her seized with frenzy; she stalks slowly no longer; she runs; if her feet are too slow, she spurs a pale horse and charges all breathless through multitudes.\n\nMurder rides with her on a russet charger; shaking his mane of smoke, fire flies before her with wings of scarlet and black; famine and plague follow on diseased and emaciated steeds, gleaning the few sheaves which remain to complete her harvest.\n\nAfter this funereal procession come two little children, radiating with smiles and life, the intelligence and love of the coming century, the dual genius of a newborn humanity.\n\nThe shadows of death fold up before them, as does night before the morning star; with nimble feet they skim the earth and sow with full hands the hope of another year.\n\nBut death will come no more, impiteous and terrible, to mow like dry grass the ripe blades of the new age; it will give place to the angel of progress, who will gently liberate souls from mortal chains, so that they may ascend to God.\n\nWhen men know how to live they will die no longer; they will transform like the chrysalis, which becomes a splendid butterfly.\n\nThe terrors of death are daughters of ignorance, and death herself is only hideous by reason of the rubbish which covers her, and the sombre hues with which her images are surrounded.\n\nDeath, truly, is the birth-pang of life.\n\nThere is a force in Nature which dieth not, and this force perpetually transforms beings to preserve them.\n\nIt is the reason or word of Nature.\n\nIn man also there is a force analogous to that of Nature, and it is the reason or word of man.\n\nThe word of man is the expression of his will directed by reason, and it is omnipotent under this leading, for it is analogous to the word of God Himself.\n\nBy the word of his reason man becomes conqueror of life, and can triumph over death.\n\nThe entire life of man is either the parturition or miscarriage of his word.\n\nHuman beings who die without having understood or formulated the word of reason, die devoid of eternal hope."

