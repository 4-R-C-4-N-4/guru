body = "Can we be astonished after this at the spread of mediaeval superstition in our own day?\n\nOne thing only surprises me, that, believing in the devil and his agents, men do not rekindle the faggots.\n\nM.\n\nVeuillot is logical and demands it: one should honour men who have the courage of their opinions.\n\nPursuing our curious researches, we come now to the most atrocious mysteries of the Grimoire, those which are concerned with evocations of devils and pacts with hell.\n\nAfter attributing a real existence to the absolute negation of goodness, after having enthroned the absurd and created a god of falsehood, it remained for human folly to invoke the impossible idol, and this maniacs have done.\n\nWe were informed lately that the most reverend Father Ventura, formerly Superior of the Theatines, Bishops' Examiner, etc., after reading our “Doctrine”, declared that the Kabalah was in his opinion an invention of the devil and that the Star of Solomon was another diabolical device to persuade the world that Satan was the same as God.\n\nObserve what is taught seriously by those who are masters in Israel!\n\nThe ideal of nothingness and night inventing a sublime philosophy which is the universal basis of faith and the keystone of all temples!\n\nThe demon setting his signature by the side of God's!\n\nMy venerable masters in theology, you are greater sorcerers than you or others are aware, and He Who said: “The devil is a liar like his father,” would have had some observations to make on the decisions of your reverences.\n\nEvokers of the devil must before all things belong to a religion which admits a creative devil, who is also rival of God.\n\nTo invoke a power, we must believe in it.\n\nGiven such firm faith in the religion of the devil, we must proceed as follows to enter into correspondence with this pseudo-Deity: Magical Axiom Within the circle of its action, every word creates that which it affirms.\n\nDirect Consequence He who affirms the devil creates or makes the devil.\n\nConditions of Success in Infernal Evocations (i) Invincible obstinacy; (2) a conscience at once hardened to crime and most prone to remorse and fear; (3) affected or natural ignorance; (4) blind faith in all that is incredible; (5) an utterly false idea of God.\n\nWe must afterwards (i) profane the ceremonies of the cultus in which we believe; (2) offer a bloody sacrifice; (3) procure the magic fork, which is a branch of a single bough of hazel or almond, cut at one blow with the new knife used for the sacrifice.\n\nIt must terminate in a fork, which must be armoured with iron or steel, made from the blade of the knife before mentioned.\n\nA fast of fifteen days must be observed, taking a single unsalted repast after sundown.\n\nIt should consist of black bread and blood, seasoned with unsalted spices or black beans and milky and narcotic herbs.\n\nWe must get drunk every five days after sundown on wine in which five heads of black poppies and five ounces of pounded hemp-seed have been steeped for five hours, the infusion being strained through a cloth woven by a prostitute: strictly speaking, the first cloth which comes to hand may be used, should it have been woven by a woman.\n\nThe evocation should be performed on the night between Monday and Tuesday, or that between Friday and Saturday.\n\na solitary and forbidden spot must be chosen, such as a cemetery haunted by evil spirits, a dreaded ruin in the country, the vaults of an abandoned convent, a place where some murder has been committed, a druidic altar or an old temple of idols."

