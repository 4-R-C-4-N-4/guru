[content]
body = "We have defined a Pantacle as a synthetic character resuming the entire magical doctrine in one of its special conceptions.\n\nIt is therefore the full expression of a completed thought and will: it is the signature of a spirit.\n\nThe ceremonial consecration of this sign attaches to it still more strongly the intention of the operator and establishes a veritable magnetic chain between himself and the Pantacle.\n\nPantacles may be drawn upon virgin parchment, paper or metals.\n\nWhat is termed a talisman is a sheet of metal, bearing either Pantacles or characters and having received a special consecration for a defined intention.\n\nIn a learned work on magical antiquities, Gaffarel has demonstrated scientifically the real power of talismans, and the confidence in their virtue is otherwise so strong in Nature that we carry keepsakes of those we love, persuaded that they will preserve us from danger and increase our happiness.\n\nTalismans are made of the seven kabalistic metals, and, when the days and hours are favourable, the required and determined signs are engraved thereon.\n\nThe figures of the seven planets, with their magical squares according to Paracelsus, are found in the Little Albert: they are one of the very few serious items in this collection of vulgar Magic.\n\nIt should be observed that Paracelsus replaces the figure of Jupiter by that of a priest, a substitution not wanting in a well-defined mysterious intention.\n\nBut the allegorical and mythological figures of the Seven Spirits have become too classical and too familiar for their successful use on talismans: we must recur to more recondite and pregnant signs.\n\nThe Pentagram should be engraved invariably upon one side of the talisman, with a circle for the Sun, a crescent for the Moon, for Mars a sword, a G for Venus, for Jupiter a crown and a scythe for Saturn.\n\nThe reverse must bear the Sign of Solomon, that is, the six-pointed star composed of two superposed triangles; in the centre there is placed a human figure for the talismans of the Sun, a chalice for those of the Moon, a dog's head for those of Mercury, an eagle's for those of Jupiter, a lion's head for those of Mars, a dove's for those of Venus, and a bull's or goat's for those of Saturn.\n\nThe names of the seven angels must be added in Hebrew, in Arabic or in magical characters like those of the alphabet of Trithemius.\n\nThe two triangles of Solomon may be replaced by the double cross of the Wheels of Ezekiel, which is found on a great number of ancient Pantacles and is, as we have observed in our “Doctrine” the key to the trigrams of Fohi.\n\nPrecious stones may be also employed for amulets and talismans; but all objects of this nature, whether metals or gems, must be kept carefully in silken bags of a colour analogous to that of the spirit of the planet, perfumed with the perfumes of the corresponding day, and preserved from all impure glances and contacts.\n\nThus, Pantacles and talismans of the Sun must not be seen or touched by deformed or misshapen persons, or by immoral women; those of the Moon are profaned by the looks and hands of debauched men and menstruating females; those of Mercury lose their virtue if seen or touched by salaried priests; those of Mars must be concealed from cowards; those of Venus from depraved men and men under a vow of celibacy; those of Jupiter from the impious; those of Saturn from virgins and children, not that their looks or touches can ever be impure, but because the talisman would bring them misfortune and thus lose all its virtue."

