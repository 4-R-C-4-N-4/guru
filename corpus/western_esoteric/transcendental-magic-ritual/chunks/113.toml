[content]
body = "חBalance, attraction and repulsion, life, terror, promise and threat.\n\nHieroglyph, JUSTICE with sword and balance.\n\nט Good, horror of evil, morality, wisdom.\n\nHieroglyph, a sage leaning on his staff, holding a lamp in front of him and enveloped completely in his cloak.\n\nThe inscription is THE HERMIT or CAPUCHIN, on account of the hood of his oriental cloak.\n\nHis true name, however, is PRUDENCE, and he thus completes the four cardinal virtues which seemed imperfect to Court de Gebelin and Etteilla.\n\nיPrinciple, manifestation, praise, manly honour, phallus, virile fecundity, paternal sceptre.\n\nHieroglyph, THE WHEEL Of FORTUNE, that is to say, the cosmogonical wheel of Ezekiel, with a Hermanubis ascending on the right, a Typhon descending on the left and a sphinx in equilibrium above, holding a sword between his lion's claws -an admirable symbol, disfigured by Etteilla, who replaced Typhon by a wolf, Her-manubis by a mouse, and the sphinx by an ape, an allegory characteristic of Etteilla's Kabalah.\n\nכThe hand in the act of grasping and holding.\n\nHieroglyph, STRENGTH, a woman crowned with the vital [infinity sign] closes, quietly and without effort, the jaws of a raging lion.\n\nלExample, instruction, public teaching.\n\nSymbol, a man hanging by one foot, with his hands bound behind his back, so that his body makes a triangle, apex downwards, and his legs a cross above the triangle.\n\nThe gallows is in the form of a Hebrew TAU, and the two uprights are trees, from each of which six branches have been lopped.\n\nWe have explained already this symbol of sacrifice and the finished work.\n\nמThe heaven of Jupiter and Mars, domination and force, new birth, creation and destruction.\n\nHieroglyph, DEATH, reaping crowned heads in a meadow where men are growing.\n\nנThe heaven of the Sun, climates, seasons, motion, changes of life, which is ever new yet ever the same.\n\nHieroglyph, TEMPERANCE, an angel with the sign of the sun upon her forehead, and on the breast the square and triangle of the septenary, pours from one chalice into another the two essences which compose the Elixir of Life.\n\nסThe heaven of Mercury, occult science, Magic, commerce, eloquence, mystery, moral force.\n\nHieroglyph, THE DEVIL, the Goat of Mendes, or the Baphomet of the Temple, with all his pantheistic attributes.\n\nThis is the only hieroglyph which was properly understood and interpreted correctly by Etteilla.\n\nעThe heaven of the Moon, alterations, subversions, changes, failings.\n\nHieroglyph, a TOWER struck by lightning, probably that of Babel.\n\nTwo persons, doubtless Nimrod and his false Prophet or minister, are precipitated from the summit of the ruins.\n\nOne of the personages in his fall reproduces perfectly the letter Ayin.\n\nפHeaven of the soul, outpourings of thought, moral influence of idea on form, immortality.\n\nHieroglyph, the BLAZING STAR and eternal youth.\n\nWe have described this symbol previously.\n\nצThe elements, the visible world, reflected light, material forms, symbolism.\n\nHieroglyph, the MOON, dew, a crab rising in the water towards land, a dog and wolf barking at the moon and chained to the base of two towers, a path lost in the horizon and sprinkled with blood.\n\nקComposites, the head, apex, prince of heaven.\n\nHieroglyph, a radiant SUN and two naked children, taking hands in a fortified enclosure."

