[content]
body = "His feet represent the equilibrium of BRIAH, or the world of forms; his legs are the two Pillars of the Masonic Temple, JAKIN and BOAZ; his body, veiled by clouds, from which issues a hand holding a book, is the sphere of YETZIRAH, or initiatory ordeals; his solar head, crowned with the radiant septenary, is the world of ATZILUTH, or perfect revelation; and we can only express our astonishment that Hebrew Kabalists have not recognized and explained this symbolism, which so closely and inseparably connects the Highest Mysteries of Christianity with the secret but invariable doctrine of all the masters in Israel.\n\nThe beast with seven heads, in the symbolism of St.\n\nJohn, is the material and antagonistic negation of the luminous septenary; the Babylonian harlot corresponds after the same manner to the Woman clothed with the Sun; the four horsemen are analogous to the four allegorical living creatures; the seven angels with their seven trumpets, seven cups and seven swords characterize the absolute of the struggle of good against evil by speech, by religious association and by force.\n\nThus are the seven seals of the occult book opened successively, and universal initiation is accomplished.\n\nThe commentators who have sought anything else in this book of the transcendent Kabalah have lost their time and their trouble only to render themselves ridiculous.\n\nTo discover Napoleon in the angel Apollyon, Luther in the star which falls from heaven, Voltaire or Rousseau in the grasshoppers armed like warriors, is merely high fantasy.\n\nIt is the same with all the violence done to the names of celebrated persons so as to make them numerically equivalent to that fatal number 666, which we have already explained sufficiently.\n\nWhen we think that men like Bossuet and Newton amused themselves with such chimeras, we can understand that humanity is not so acute in its genius as might be supposed from the bearing of its vices."

