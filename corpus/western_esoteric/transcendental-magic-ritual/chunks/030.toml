body = "In the case of a spirit of darkness, the opposite course is pursued, but then the operator must be careful to set the end of the rod or the point of the sword upon the head of the Pentagram.\n\nWe have said that signs are the active voice of the word of will.\n\nNow, the word of will must be given in its completeness, so that it may be transformed into action; and a single negligence, representing an idle speech or a doubt, falsifies and paralyses the whole process, turning back upon the operator all the forces thus expended in vain.\n\nWe must therefore abstain absolutely from magical ceremonies or scrupulously and exactly fulfil them all.\n\nThe Pentagram, engraved in luminous lines upon glass by the electrical machine, exercises also a great influence upon spirits and terrifies phantoms.\n\nThe old magicians traced the sign of the Pentagram upon their doorsteps, to prevent evil spirits from entering and good spirits from departing.\n\nThis constraint followed from the direction of the points of the star.\n\nTwo points on the outer side drove away the evil; two points on the inner side imprisoned them; one only on the inner side held good spirits captive.\n\nAll these magical theories, based upon the one dogma of Hermes and on the analogical deductions of science, have been confirmed invariably by the visions of ecstatics and the paroxysms of cataleptics, declaring that they are possessed by spirits.\n\nThe G which Freemasons place in the middle of the Blazing Star signifies GNOSIS and GENERATION, the two sacred words of the ancient Kabalah.\n\nIt signifies also GRAND ARCHITECT, for the Pentagram on every side represents an A.\n\nBy placing it in such a manner that two of its points are in the ascendant and one is below, we may see the horns, ears and beard of the hierarchic Goat of Mendes, when it becomes the sign of infernal evocations.\n\nThe allegorical Star of the Magi is no other than the mysterious Pentagram; and those three kings, sons of Zoroaster, conducted by the Blazing Star to the cradle of the microcosmic God, are themselves a full demonstration of the kabalistic and magical beginnings of Christian doc-trine.\n\nOne of these kings is white, another black and the third brown.\n\nThe white king offers gold, symbol of light and life; the black king presents myrrh, image of death and of darkness; the brown king sacrifices incense, emblem of the conciliating doctrine of the two principles.\n\nThey return thereafter into their own land by another road, to show that a new cultus is only a new path, conducting man to one religion, being that of the sacred triad and the radiant Pentagram, the sole eternal catholicism.\n\nSt.\n\nJohn, in the Apocalypse, beholds this same star fall from heaven to earth.\n\nIt is then called absinthe or wormwood, and all the waters of the sea become bitter - a striking image of the materialization of dogma, which produces fanaticism and the acridities of controversy.\n\nThen unto Christianity itself may be applied those words of Isaiah: “How has thou fallen from heaven, bright star, which wast so splendid in thy prime!” But the Pentagram, profaned by men, burns ever unclouded in the right hand of the Word of Truth, and the inspired voice guarantees to him that overcometh the possession of the Morning Star - a solemn promise of restitution held out to the Star of Lucifer.\n\nAs will be seen, all Mysteries of Magic, all symbols of the Gnosis, all figures of occultism, all kabalistic keys of prophecy are summed up in the Sign of the Pentagram, which Paracelsus proclaims to be the greatest and most potent of all signs."

