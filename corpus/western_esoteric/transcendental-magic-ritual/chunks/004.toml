[content]
body = "Thereupon God loosed from His bosom the shining cord which restrained the superb angel, and beholding him plunge through the night, which he furrowed with glory, He loved the offspring of His thought, and said with an ineffable smile: ‘How beautiful was the light!’ “God has not created suffering; intelligence has accepted it to be free.\n\nAnd suffering has been the condition imposed upon freedom of being by Him who alone cannot err, because He is infinite.\n\nFor the essence of intelligence is judgement, and the essence of judgement is liberty.\n\nThe eye does not really possess light except by the faculty of closing or opening.\n\nWere it forced to be always open, it would be the slave and victim of the light, and would cease to see in order to escape the torment.\n\nThus, created Intelligence is not happy in affirming God, except by its liberty to deny Him.\n\nNow, the Intelligence which denies, invariably affirms something, since it is asserting its liberty.\n\nIt is for this reason that blasphemy glorifies God and that hell was indispensable to the happiness of heaven.\n\nWere the light unrepelled by shadow, there would be no visible forms.\n\nIf the first angels had not encountered the depths of darkness, the child-birth of God would have been incomplete, and there could have been no separation between the created and essential light.\n\nNever would Intelligence have known the goodness of God if it had never lost Him.\n\nNever would God's infinite love have shone forth in the joys of His mercy had the prodigal Son of Heaven remained in the House of His Father.\n\nWhen all was light, there was light nowhere; it filled the breast of God, who was labouring to bring it forth.\n\nAnd when He said: ‘Let there be light!’ He permitted the darkness to repel the light, and the universe issued from chaos.\n\nThe negation of the angel who at birth refused slavery constituted the equilibrium of the world, and the motion of the spheres commenced.\n\nThe infinite distances admired this love of liberty, which was vast enough to fill the void of eternal night and strong enough to bear the hatred of God.\n\nBut God could hate not the noblest of His children, and He proved him by His wrath only to confirm him in His power.\n\nSo also the Word of God Himself, as if jealous of Lucifer, willed to come down from heaven and pass triumphantly through the shadows of hell.\n\nHe willed to be proscribed and condemned; He premeditated that terrible hour when He should cry, in the throes of His agony: ‘My God, My God, why hast Thou forsaken Me?’ As the star of the morning goes before the sun, the rebellion of Lucifer announced to new-born Nature the coming incarnation of God.\n\nPossibly Lucifer, in his fall through night, carried with him a rain of suns and stars by the attraction of his glory.\n\nPossibly our sun is a demon among the stars, as Lucifer is a star among the angels.\n\nDoubtless it is for this reason that it lights so calmly the horrible anguish of humanity and the long agony of earth -because it is free in its solitude and possesses its light.” Such were the tendencies of the heresiarchs in the early centuries.\n\nSome, like the Ophites, adored the demon under the figure of a serpent; others, like the Cain-ites, justified the rebellion of the first angel and that of the first murderer.\n\nAll those errors, all those shadows, all those monstrous idols of anarchy which India opposes in its symbols to the magical Trimurti, have found priests and worshippers in Christianity.\n\nThe demon is mentioned nowhere in Genesis; an allegorical serpent deceives our first parents."

