body = "It should bear on the inner side the occult characters of the planets and on the outer their known signs, duplicated and in kabalistic opposition to each other; that is, five on the right and five on the left; the signs of the sun and moon resuming the four several intelligences of the seven planets.\n\nNow, this configuration is no other than that of a Pantacle signifying all mysteries of magical doctrine, and here is the occult significance of the ring: to exercise omnipotence, of which ocular fascination is one of the most difficult demonstrations to give, we must possess all science and know how to make use of it.\n\nFascination is accomplished by magnetism.\n\nThe Magus inwardly forbids a whole assembly to see him, and it does not see him.\n\nIn this manner he passes through guarded gates and comes out of prison in the face of his petrified gaolers.\n\nAt such times a strange numbness is experienced, and they recall having seen the Magus as if in a dream, but never till after he has gone.\n\nThe whole secret of invisibility consists therefore in a power which is capable of definition - being that of distracting or paralysing attention, so that light reaches the visual organ without impressing the eye of the soul.\n\nTo exercise this power we must possess a Will accustomed to sudden and energetic actions, great presence of mind and skill no less great in causing diversions among the crowd.\n\nLet a man, for example, who is being pursued by his intending murderers, dart into a side street, return immediately, and advance with perfect calmness towards his pursuers, or let him mix with them and seem intent on the chase, and he will certainly make himself invisible.\n\nA priest who was being hunted in '93, with the intention of hanging him from a lamp-post, fled down a certain street, assumed a stooping gait, and leaned against a corner with an intensely preoccupied expression; the crowd of his enemies swept past; not one saw him, or rather, it never struck anyone to recognize him: it was so unlikely to be he!\n\nThe person who desires to be seen always makes himself observed, but he who would remain unnoticed effaces himself and disappears.\n\nThe true Ring of Gyges is the will; it is also the wand of transformations, and by its precise and strong formulation it creates the magical word.\n\nThe omnipotent terms of enchantments are those which express this creative power of forms.\n\nThe Tetragram, which is the supreme word of Magic, signifies: “It is that which it shall be,” and if we apply it to any transformation whatsoever with full intelligence, it will renew and modify all things, even in the teeth of evidence and common sense.\n\nThe hoc est of the Christian sacrifice is a translation and application of the Tetragram: hence this simple utterance operates the most complete, most invisible, most incredible and most clearly affirmed of all transformations.\n\nA still stronger word than that of transformation has been judged necessary by councils to express the marvel - that of transubstantiation.\n\nThe Hebrew terms , have been considered by all Kaba-lists as the keys of magical transformation.\n\nThe Latin words, est, sit, esto, fiat, have the same force when pronounced with full understanding.\n\nMontalembert relates seriously, in his legend of St.\n\nElizabeth of Hungary, how one day this saintly lady, surprised by her noble husband, from whom she sought to conceal her good works, in the act of carrying bread to the poor in her apron, told him that she was carrying roses, and it proved on investigation that she had spoken truly; the loaves had changed into roses.\n\nThis story is a most gracious magical apologue, and signifies that the truly wise man cannot lie, that the word of wisdom determines the form of things, or even their substance independently of their forms.\n\nWhy, for example, should not the noble spouse of St."

