[content]
body = "Then, taking up the Pantacle and sprinkling it with some drops of magical water, say: In the name of Eloim and by the spirit of the living waters, be thou unto me a sign of light and a sacrament of will.\n\nPresenting it to the smoke of the perfumes: By the brazen serpent which destroyed the serpents of fire, be thou, etc.\n\nBreathing seven times upon the Pantacle or talisman: By the firmament and spirit of the voice, be thou, etc.\n\nLastly, placing some particles of purified earth or salt triadwise upon it: In the salt of earth, and by the virtue of eternal life, be thou, etc.\n\nThen recite the Conjuration of the Seven as follows, casting alternately a pastille of the seven perfumes into the sacred fire: In the name of Michael, may Jehovah command thee, and drive thee, hence, Chavaioth!\n\nIn the name of Gabriel, may Adonai command thee, and drive thee hence, Belial!\n\nIn the name of Raphael, begone before Elchim, Sachabiel!\n\nBy Samael Zeboath, and in the name of Eloim Gibor, get thee, hence, Adrameleck!\n\nBy Zachariel and Sachiel-Leleck, be obedient unto Eloah, Samgabiel!\n\nBy the divine and human name of Shaddai, and by the Sign of the Pentagram which I hold in my right hand; in the name of the angel Anael, by the power of Adam and of Heva, who are Jotchavah, begone, Lilith!\n\nLet us rest in peace, Nahemah!\n\nBy the holy Eloim and by the names of the genii Cassiel, Sehaltiel, Aphiel, and Zarahiel, at the command of Orifial, depart from us, Moloch!\n\nWe deny thee our children to devour.\n\nThe most important magical instruments are the wand, the sword, the lamp, the chalice, the altar and the tripod.\n\nIn the operations of Transcendental and Divine Magic, the lamp, wand and chalice are used; in the works of Black Magic, the wand is replaced by the sword and the lamp by the candle of Cardan.\n\nWe shall explain this difference in the chapter devoted to Black Magic.\n\nLet us come now to the description and consecration of the instruments.\n\nThe magical wand, which must not be confounded with the simple divining rod, with the fork of necromancers, or the trident of Paracelsus, the true and absolute magical wand must be one perfectly straight branch of almond or hazel, cut at a single blow with the magical pruning-knife or golden sickle, before the rising of the sun, at that moment when the tree is ready to blossom.\n\nIt must be pierced through its whole length without splitting or breaking it, and a long needle of magnetized iron must occupy its entire length.\n\nTo one of the extremities must be fitted a polyhedral prism, cut in a triangular shape, and to the other a similar figure of black resin.\n\nTwo rings, one of copper and one of zinc, must be placed at the centre of the wand; which afterwards must be gilt at the resin and silvered at the prism end as far as the ringed centre; it must then be covered with silk, the extremities not included.\n\nOn the copper ring these characters must be engraved: and on the zinc ring: The consecration of the wand must last seven days, beginning at the new moon, and should be made by an initiate possessing the great arcana, and having him self a consecrated wand.\n\nThis is the transmission of the magical secret, which has never ceased since the shrouded origin of the transcendent science."

