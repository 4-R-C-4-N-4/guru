[content]
body = "Fulfil, Judgment, by fire in the virtue of Michael.\n\nAngel of the blind eyes, obey, or pass away with this holy water!\n\nWork, Winged Bull, or revert to the earth, unless thou wilt that I should pierce thee with this sword!\n\nChained Eagle, obey my sign, or fly before this breathing!\n\nWrithing Serpent, crawl at my feet, or be tortured by the sacred fire and give way before the perfumes that I burn in it!\n\nWater, return to water; fire, burn; air, circulate; earth, revert to earth, by virtue of the Pentagram, which is the Morning Star, and by the name of the Tetragram, which is written in the center of the Cross of Light!\n\nAmen.\n\nThe Sign of the Cross adopted by Christians does not belong to them exclusively.\n\nThis also is kabalistic and represents the oppositions and tetradic equilibrium of the elements.\n\nWe see by the occult versicle of the Lord's Prayer, which we have cited in our “Doctrine”, that it was originally made after two manners, or at least that it was characterized by two entirely different formulae, one reserved for priests and initiates, the other imparted to neophytes and the profane.\n\nFor example, the initiate said raising his hand to his forehead, “For thine,” then added “is,” and continuing as he brought down his hand to his breast, “the kingdom,” then to the left shoulder, “the justice,” afterwards to the right shoulder, “and the mercy” - then clasping his hands, he added, “in the generating ages.” Tibi sunt Malkuth et Geburah et Chesed per aeonas - a Sign of the Cross which is absolutely and magnificently kabalistic, which the profanations of Gnosticism have lost completely to the official and militant Church.\n\nThis Sign, made after this manner, should precede and terminate the Conjuration of the Four.\n\nTo overcome and subjugate the elementary spirits, we must never yield to their characteristic defects.\n\nThus, a shallow and capricious mind will never rule the Sylphs; an irresolute, cold and fickle nature will never master the Undines; passion irritates the Salamanders; and avaricious greed makes its slaves the sport of Gnomes.\n\nBut we must be prompt and active, like the Sylphs; pliant and attentive to images, like the Undines; energetic and strong like the Salamanders; laborious and patient, like the Gnomes: in a word, we must overcome them in their strength without ever being overcome by their weaknesses.\n\nOnce we are well established in this disposition, the whole world will be at the service of the wise operator.\n\nHe will pass through the storm, and the rain will not moisten his head; the wind will not move even a fold of his garments; he will go through fire and not be burned; he will walk upon water and will behold diamonds within the crust of the earth.\n\nThese promises may appear hyperbolic, but only to vulgar understanding, for if the sage do not perform such things materially and actually, he accomplishes others which are much greater and more admirable.\n\nAt the same time, it is indubitable that we may direct the elements by our will up to a certain point and can really change or hinder their effects.\n\nFor example, if it be established that persons in an ecstatic state lose their weight for the time being, why should it be impossible to walk upon the water?\n\nThe convulsionaries of Saint Medard felt neither fire nor steel, and begged for the most violent blows and incredible tortures as a relief.\n\nThe extraordinary climbings and miraculous equilibrium of some somnambulists are a revelation of these concealed forces of Nature."

