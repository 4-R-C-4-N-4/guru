[content]
body = "Nor is such observance vain, for in the magical work all instruments of art are magnetized by the operator; the air is charged with his perfumes, the fire which he has consecrated is subject to his will, the forces of Nature seem to hear and answer him: he reads in all forms the modifications and complements of his thought.\n\nHe perceives the water agitated and, as it were, bubbling of itself, the fire blazing up or going out suddenly, the leaves of garlands rustling, the magical rod moving spontaneously and strange, unknown voices passing through the air.\n\nIt was in such evocations that Julian beheld the beloved phantoms of his dethroned gods, and was appalled at their decrepitude and pallor.\n\nI am aware that Christianity has for ever suppressed Ceremonial Magic, and that it proscribes the evocations and sacrifices of the old world.\n\nIt is not therefore our intention to furnish a new basis for their existence by revealing their antique mysteries after the lapse of so many centuries.\n\nEven in the order of facts, our experiments have been learned researches and nothing more.\n\nWe have verified facts that we might appreciate causes, and it has not been our pretension to restore Rites which are for ever destroyed.\n\nThe orthodoxy of Israel, that religion which is so rational, so divine and so ill known, condemns no less than Christianity the mysteries of Ceremonial Magic.\n\nFrom the standpoint of the tribe of Levi, the exercise of Transcendental Magic must be considered as a usurpation of the priesthood; and the same reason has caused the proscription of Operative Magic by every official cultus.\n\nTo demonstrate the natural foundation of the marvellous and to produce it at will is to annihilate for the vulgar mind that convincing evidence from miracles which is claimed by each religion as its exclusive property and its final argument.\n\nRespect for established religions, but room also for science!\n\nWe have passed, thank God, the days of inquisitions and pyres; unhappy men of learning are no longer murdered on the faith of a few distraught fanatics or hysterical girls.\n\nFor the rest, let it be understood clearly that our undertaking is concerned with curious studies and not with an impossible propaganda.\n\nThose who may blame us for daring to term ourselves Magician have nothing to fear from the example, it being wholly improbable that they will ever become sorcerers."

