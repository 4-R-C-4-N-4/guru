[content]
body = "TO be ever rich, to be always young and to die never: such, from all time, has been the dream of alchemists.\n\nTo change lead, mercury, and the other metals into gold, to possess the Universal Medicine and the Elixir of Life - such is the problem which must be solved to accomplish this desire and to realize this dream.\n\nLike all magical mysteries, the secrets of the Great Work have a triple meaning: they are religious, philosophical and natural.\n\nPhilosophical gold in religion is the Absolute and Supreme Reason; in philosophy, it is truth; in visible nature, it is the sun: in the subterranean and mineral world, it is the purest and most perfect gold.\n\nHence the search after the Great Work is called the Search for the Absolute, and this work itself is termed the operation of the sun.\n\nAll masters of science recognize that it is impossible to achieve material results until we have found the plenary analogies of the Universal Medicine and the Philosophical Stone in the two superior degrees.\n\nThen, it is affirmed, is the labour simple, light and inexpensive: otherwise, it consumes to no purpose the life and fortune of the bellows-blower.\n\nThe Universal Medicine is, for the soul, supreme reason and absolute justice; for the mind, it is mathematical and practical truth; for the body, it is the quintessence, which is a combination of gold and light.\n\nIn the superior world, the first matter of the Great Work is enthusiasm and activity; in the intermediate world, it is intelligence and industry; in the inferior world, it is labour; in science it is Sulphur, Mercury and Salt, which, volatilized and fixed alternately, compose the AZOTH of the sages.\n\nSulphur corresponds to the elementary form of fire, Mercury to air and water, Salt to earth.\n\nAll masters in alchemy who have written concerning the Great Work have employed symbolical and figurative expressions, and have been right in so doing, not only to deter the profane from operations which would be dangerous for them, but to make themselves intelligible to adepts by revealing the entire world of analogies which is ruled by the one and sovereign dogma of Hermes.\n\nFor such, gold and silver are the Sun and Moon, or the King and Queen; Sulphur is the Flying Eagle; Mercury is the winged and bearded Hermaphrodite, throned upon a cube and crowned with flames; matter or Salt is the Winged Dragon; metals in the molten state are Lions of various colours; finally, the whole work is symbolized by the Pelican and Phoenix.\n\nHermetic art is, therefore, at one and the same time, a religion, a philosophy and a natural science.\n\nConsidered as religion, it is that of the ancient Magi and the initiates of all the ages; as a philosophy, its principles may be found in the school of Alexandria and in the theories of Pythagoras; as science, its principles must be sought from Paracelsus, Nicholas Flamel and Raymund Lully.\n\nThe science is true only for those who accept and understand the philosophy and religion, while its processes are successful only for the adept who has attained sovereign volition, and has thus become monarch of the elementary world, for the Great Agent of the solar work is that force described in the Hermetic Symbol of the “Emerald Table”: it is universal magical power; it is the igneous spiritual motor; it is the OD of the Hebrews and the Astral Light, according to the expression which we have adopted in this work.\n\nThere is the secret, living and philosophical fire, of which all Hermetic philosophers speak only under the most mysterious reservations; there is the universal sperm, the secret of which they guarded, representing it only under the emblem of the caduceus of Hermes."

