[content]
body = "We have said that impassioned ecstasy may produce the same results as absolute superiority, and this is true as to the issue but not as to the direction of magical operations.\n\nPassion projects the Astral Light forcibly and impresses unforeseen movements on the Universal Agent, but it cannot curb with the facility that it impels, and then its destiny resembles that of Hippolytus dragged by his own horses, or Phalaris victimized himself by the instrument of torture which he had invented for others.\n\nHuman volition realized by action is like a cannon-ball and recedes before no obstacle.\n\nIt either passes through it or is buried in it; but if it advance with patience and perseverance, it is never lost: it is like the wave which returns incessantly and wears away iron in the end.\n\nMan can be modified by habit, which becomes, according to the proverb, his second nature.\n\nBy means of persevering and graduated athletics, the powers and activity of the body can be developed to an astonishing extent.\n\nIt is the same with the powers of the soul.\n\nWould you reign over yourselves and others?\n\nLearn how to will.\n\nHow can one learn to will?\n\nThis is the first arcanum of magical initiation, and that it might be realized fundamentally the ancient custodians of sacerdotal art surrounded the approaches of the sanctuary with so many terrors and illusions.\n\nThey recognized no will until it had produced its proofs, and they were right.\n\nPower is justified by attainment.\n\nIndolence and forgetfulness are enemies of will, and for this reason all religions have multiplied their observances and made their worship minute and difficult.\n\nThe more we deny ourselves for an idea, the greater is the strength we acquire within the scope of that idea.\n\nAre not mothers more partial to the children who have caused them most suffering and cost them most anxieties?\n\nSo does the power of religions reside exclusively in the inflexible will of those who practise them.\n\nSo long as there is one faithful person to believe in the Holy Sacrifice of the Mass, there will be a priest to celebrate it for him; and so long as there is a priest who daily recites his Breviary, there will be a pope in the world.\n\nObservances, apparently most insignificant and most foreign in themselves to the proposed end, lead notwithstanding to that end by education and exercise of will.\n\nIf a peasant rose up every morning at two or three o'clock and went a long distance from home to gather a sprig of the same herb before the rising of the sun, he would be able to perform a great number of prodigies by merely carrying this herb upon his person, for it would be the sign of his will, and in virtue thereof would be all that he required it to become in the interest of his desires.\n\nIn order to accomplish a thing we must believe in our possibility of doing it, and this faith must be translated at once into acts.\n\nWhen a child says: “I cannot,” his mother answers: “Try.” Faith does not even try; it begins with the certitude of finishing, and it proceeds calmly, as if omnipotence were at its disposal and eternity before it.\n\nWhat seek you therefore from the science of the Magi?\n\nDare to formulate your desire, then set to work at once, and do not cease acting after the same manner and for the same end.\n\nThat which you will shall come to pass, and for you and by you it has indeed already begun.\n\nSixtus V said, while watching his flocks: “I desire to be pope.” You are a beggar and you desire to make gold: set to work and never leave off.\n\nI promise you in the name of science all the treasures of Flamel and Raymund Lully.\n\n“What is the first thing to be done?” Believe in your power, then act."

