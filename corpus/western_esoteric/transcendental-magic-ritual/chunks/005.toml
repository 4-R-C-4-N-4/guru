[content]
body = "Here is the common translation of the sacred text: “Now, the serpent was more subtle than any beast of the field which the Lord God had made.” But this is what Moses says: This signifies, according to the version of Fabre d'Olivet: “Now, original attraction (cupidity) was the entraining passion of all elementary life (the interior activity of Nature), the work of Jhoah, the Being of beings.” But herein Fabre d'Olivet is beside the true interpretation, because he was unacquainted with the grand keys of the Kabalah.\n\nThe word Nahash, explained by the symbolical letters of the Tarot signifies rigorously 14 נ NUN.-The power which produces combinations.\n\n5 ה HE.-The recipient and passive producer of forms.\n\n21 ש SHIN.-The natural and central fire equilibrated by double polarization.\n\nThus, the word employed by Moses, read kabalistically, gives the description and definition of that magical Universal Agent, represented in all theogonies by the serpent; to this Agent the Hebrews applied the name of OD when it manifested its active force, of Ob when it exhibited its passive force, and of AOUR when it revealed itself wholly in its equilibrated power, as producer of light in heaven and gold among metals.\n\nIt is therefore that old serpent which encircles the world and places its devouring head beneath the foot of a Virgin, the type of initiation -that virgin who presents a little new-born child to the adoration of three Magi and receives from them, in exchange for this favour, gold, myrrh and frankincense.\n\nSo does doctrine serve in all hieratic religions to veil the secret of natural forces which the initiate has at his disposal.\n\nReligious formulae are the summaries of those words full of mystery and power which make the gods descend from heaven and become subject to the will of men.\n\nJudea borrowed its secrets from Egypt; Greece sent her hierophants and later her theosophists to the school of the great prophets; the Rome of the Caesars, mined by the initiation of the catacombs, collapsed one day into the Church, and a symbolism was reconstructed with the remnants of all worships which had been absorbed by the queen of the world.\n\nAccording to the Gospel narrative, the inscription which set forth the spiritual royalty of Christ was written in Hebrew, in Greek and in Latin: it was the expression of a universal synthesis.\n\nHellenism, in fact, that grand and beauteous religion of form, announced the coming of the Saviour no less than the prophets of Judaism.\n\nThe fable of Psyche is an ultra-Christian abstraction, and the cultus of the Pantheons, by rehabilitating Socrates, prepared altars for that unity of God, of which Israel had been the mysterious preserver.\n\nBut the synagogue denied its Messiah, and the Hebrew letters were effaced, at least for the blinded eyes of the Jews.\n\nThe Roman persecutors dishonoured Hellenism, and it could not be restored by the false moderation of the philosopher Julian, surnamed perhaps unjustly the Apostate, since his Christianity was never sincere.\n\nThe ignorance of the Middle Ages followed, opposing saints and virgins to gods, goddesses and nymphs; the deep sense of the Hellenic mysteries was less understood than ever; Greece herself did not only lose the traditions of her ancient cultus but separated from the Latin Church; and thus, for Latin eyes, the Greek letters were blotted out, as the Latin letters disappeared for Greek eyes.\n\nSo the inscription on the Cross of the Saviour vanished entirely, and nothing except mysterious initials remained."

