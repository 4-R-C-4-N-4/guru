[content]
body = "He created a new metal which resembles gold but is not gold, and hence has no value.\n\nRaymond Lully, Nicholas Flamel and most probably Henry Khun-rath made true gold, nor did they take away their secret with them, for it is enshrined in their symbols, and they have indicated, moreover, the sources from which they drew for its discovery and for the realization of its effects, It is this same secret which we ourselves make public now."

