body = "WE come now to that number which is attributed in the Tarot to the Sign of the Sun.\n\nThe denary of Pythagoras and the triad multiplied by itself represent wisdom in its application to the Absolute.\n\nIt is with the Absolute therefore that we are concerned here.\n\nTo discover such Absolute in the infinite, the indefinite and the finite, is the Great Work of the sages, that which is termed by Hermes the Work of the Sun.\n\nTo find the immovable foundations of true religious faith, of philosophical truth and of metallic transmutation, here is the whole secret of Hermes and here the Philosophical Stone.\n\nThis Stone is both one and manifold: it is decomposed by analysis and recomposed by synthesis.\n\nIn analysis it is a powder, the alchemical powder of projection; before analysis and in synthesis it is a stone.\n\nThe Philosophical Stone, say the masters, must not be exposed to the air, nor to the eyes of the profane; it must be kept in concealment and preserved carefully in the most secret receptacle of the laboratory, the key of the place being always carried upon the person.\n\nHe who possesses the Great Arcanum is truly king and is indeed above any king, for he is inaccessible to all fears and to all vain hopes.\n\nIn any malady of soul and body, a single fragment broken from the precious Stone, a single grain of the divine powder are more than sufficient for their cure.\n\n“He that hath ears to hear, let him hear,” as the Master said.\n\nSalt, Sulphur and Mercury are only accessory elements and passive instruments of the great enterprise.\n\nEverything depends, as we have said, upon the interior magnes of Paracelsus.\n\nThe work consists entirely in Projection, and Projection is accomplished perfectly by the effective and realizable intelligence of a single word.\n\nThere is but one important operation, and that is Sublimation, which is nothing less, according to Geber, than the elevation of the dry substance by means of fire, with adherence to its proper vessel.\n\nWhosoever would acquire understanding of the Great Word and possess the Great Arcanum, after studying the principles of our “Doctrine”, should read the Hermetic philosophers carefully, and he will doubtless attain initiation, as others have attained it; but for the key of their allegories he must take the one dogma of Hermes, contained in the “Emerald Table”, while to classify the knowledge and direct operation he must follow the order indicated in the kabalistic alphabet of the Tarot, of which an absolute and complete explanation will be given in the last chapter of this work.\n\nAmong the rare and priceless treatises which contain the mysteries of the Great Arcanum, the “Chemical Pathway or Manual” of Paracelsus must be placed in the first rank, as comprising all the mysteries of demonstrative physics and the most secret Kabalah.\n\nThis unique manuscript is preserved in the Vatican Library; a copy was transcribed by Sendivogius and was used by Baron Tschoudy when composing the Hermetic Catechism contained in his work entitled The Blazing Star.\n\nThis catechism, which we point out to instructed Kabalists as a substitute for the incomparable treatise of Paracelsus, expounds all the essential principles of the Great Work in a form so clear and complete that a person must be absolutely wanting in the quality of occult comprehension if he fail in attaining the absolute truth by its study.\n\nWe shall now give a succinct analysis of this work, together with a few words of commentary.\n\nRaymond Lully, one of the grand and sublime masters of science, says that before we can make gold we must have gold.\n\nOut of nothing we can make nothing; wealth is not created absolutely: it is increased and multiplied.\n\nHence let aspirants to knowledge understand and realize that neither miracles nor jugglers’ feats are demanded of the adept."

