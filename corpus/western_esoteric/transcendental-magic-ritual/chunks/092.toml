body = "Potions which enfeeble mind and disturb reason establish the empire already acquired by an evil will, and it was thus that the empress Caesonia is said to have fixed the savage love of Caligula.\n\nPrussic acid is the most terrible agent in these envenomings of thought; hence we should beware of all extractions with an almond flavour, and never tolerate in bedchambers the presence of bay-cherry, Datura stramonium, almond-soaps or washes, and generally all perfumes in which this odour predominates, above when its action on the brain is seconded by that of amber.\n\nTo weaken the activity of intelligence is to strengthen proportionally the forces of unreasoning passion.\n\nLove of that kind which the malefactors we are concerned with would inspire is a veritable stupefaction and the most shameful of moral bondages.\n\nThe more we enervate a slave, the more incapable we make him of freedom, and here lies the true secret of the sorceress in Apuleius and the potions of Circe.\n\nThe use of tobacco, by smoking or otherwise, is a dangerous auxiliary of stupefying philtres and brain poisons.\n\nNicotine, as we know, is not less deadly than prussic acid and is present in tobacco in larger quantities than is this acid in almonds.\n\nThe absorption of one will by another frequently changes a whole series of destinies, and not for ourselves only should we watch our relations, learning to distinguish pure from impure atmospheres, for the true philtres, and those most dangerous, are invisible.\n\nSuch are the currents of vital radiating light, which, mingling and inter-changing, produce attractions and sympathies, as magnetic experiments leave no room to doubt.\n\nThe history of the Church tells us that an archheretic named Marcos infatuated all women by breathing on them; but his power was destroyed when a valiant Christian female forestalled him in breathing, and said to him: “May God judge thee!” The Cure Gaufridy, who was burnt as a sorcerer, pretended to enamour all women who came in contact with his breath.\n\nThe notorious Father Girard, a Jesuit, was accused by his penitent, Mlle.\n\nCardier, of destroying her self-control by breathing on her.\n\nSuch a pretext was necessary to minimize the horrible and ridiculous nature of her accusations against this priest, whose guilt, moreover, has never been well established, though, consciously or unconsciously, he had certainly inspired an exceedingly shameful passion in the miserable girl.\n\n“Mlle.\n\nRanfaing, having become a widow in 16—,” says Dom Calmet in his Treatise on Apparitions, “was sought in marriage by a physician named Poirot.\n\nFailing to obtain a hearing, he thereupon gave her potions to induce love, and these caused extraordinary derangements in the health of the lady, increasing to such a degree that she was believed to be possessed, so that other physicians, baffled by her case, recommended her for the exorcisms of the Church.\n\nThereupon, by command of M.\n\nde Porcelets, Bishop of Toul, the following were named as her exorcists: M.\n\nViardin, doctor in theology, the state councillor of the Duke of Lorraine, a Jesuit and a capuchin.\n\nBut in the long course of these ceremonies, almost all the clergy of Nancy, the aforesaid Lord Bishop, the Bishop of Tripoli, suffragan of Strasbourg, M."

