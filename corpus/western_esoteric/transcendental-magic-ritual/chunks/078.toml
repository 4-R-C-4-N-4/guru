[content]
body = "This madman confessed at his trial that Satan had appeared to him frequently, but had always deceived him by promises of treasures which he had never delivered.\n\nIt transpired from the judicial informations that several hundred unfortunate children had fallen victims to the cupidity and atrocious fancies of this monster."

