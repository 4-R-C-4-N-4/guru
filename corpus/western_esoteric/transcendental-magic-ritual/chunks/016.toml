[content]
body = "The same manual gesture may assimilate and give forth alternately what we are accustomed to call the fluid, and the magnetizer will himself be warned of the result of his intention by an alternative sensation of warmth and cold in the hand, or in both hands when both are being used, which sensation the subject should experience at the same time, but in a contrary sense, that is, with a wholly opposite alternative.\n\nThe Pentagram, or Sign of the Microcosmos, represents, among other magical mysteries, the double sympathy of the human extremities with, each other and with the circulation of the Astral Light in the human body.\n\nThus, when a man is represented in the star of the Pentagram, as may be seen in the Occult Philosophy of Agrippa, it should be observed that the head corresponds in masculine sympathy with the right foot and in feminine sympathy with the left foot; that the right hand corresponds in the same way with the left hand and left foot, and reciprocally of the other hand.\n\nThis must be borne in mind when making magnetic passes, if we seek to govern the whole organism and bind all members by their proper chains of analogy and natural sympathy.\n\nSimilar knowledge is required for the use of the Pentagram in the Conjuration of Spirits, and in the evocation of forms errant in the Astral Light, vulgarly called Necromancy, as we shall explain in the fifth chapter of this “Ritual”.\n\nBut it is well to observe here that every action promotes a reaction, and that in magnetizing others, or influencing them magically, we establish between them and ourselves a current of contrary but analogous influence which may subject us to them instead of subjecting them to us, as happens frequently enough in those operations which have the sympathy of love for their object.\n\nHence it is highly essential to be on our guard while we are attacking, so as not to inspire on the left while we respire on the right.\n\nThe magical androgyne depicted in the frontispiece of the “Ritual” has SOLVE inscribed upon the right and COAGULA on the left arm, thus recalling the symbolical architects of the Second Temple, who bore the sword in one hand and their trowel in the other.\n\nWhile building they had also to defend their work and disperse their enemies.\n\nNature herself does likewise, destroying and regenerating at the same time.\n\nNow, according to the allegory of Duchentau’s Magical Calendar, man, that is to say, the initiate, is the ape of Nature, who confines himself by a chain but makes him act unceasingly, imitating the proceedings and works of his divine mistress and imperishable model.\n\nThe alternate use of contrary forces, warmth after cold, mildness after severity, love after anger, etc., is the secret of perpetual motion and the permanence of power.\n\nCoquettes know this instinctively, and hence they make their admirers pass from hope to fear, from joy to despondency.\n\nTo operate always on the same side and in the same manner is to overweight one basin of the balance, and complete destruction of equilibrium is a rapid result.\n\nContinual caressings beget satiety, disgust and antipathy, just as constant coldness and severity in the long run alienate and discourage affection.\n\nAn unvarying and ardent fire in alchemy calcines the First Matter and not seldom explodes the Hermetic Vessel: the heat of lime and mineral manure must be substituted at regular intervals for the heat of flame.\n\nAnd so also in Magic: works of wrath or severity must be tempered by those of beneficence and love.\n\nIf the will of the operator be ever at the same tension and directed along the same line, great weariness will ensue, together with a species of moral impotence."

