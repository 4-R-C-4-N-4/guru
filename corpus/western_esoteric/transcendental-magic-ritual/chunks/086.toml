body = "The Assyrians or Chaldeans, incited by Nebuchadnezzar or Salmanasor, gave fullest evidence of this truth by the destruction of the most splendid and most holy temple and city in the universe, and by the complete overthrow of a people whom God Himself had taken under His special protection and of whom He termed Himself Father especially.\n\nSo also that other Jerusalem, Rome the blessed, has it not too experienced frequently the violence of this evil northern race, when it beheld its altars demolished and the towers of its proud edifices brought level with the foundations, through the cruelty of Alaric, Genseric, Attila and other princes of the Goths, Huns, Vandals and Alani..\n\n.\n\n.\n\nVery properly therefore in the secrets of this celestial writing, do we read calamities and misfortunes on the northern side, since a sep-tentrione pandetur omne malum.\n\nNow, the word ThPThCh which we translate by pandetur, is also an equivalent of depingetur or scribetur, and the prophecy signifies equally: All misfortunes of the world are written in the northern sky.” We have transcribed this passage at length, because it is not without application in our own day, when the north once more seems to threaten Europe; but it is also the destiny of hoar-frost to be melted by the sun, and darkness disappears of itself when the light manifests.\n\nSuch is for us the last word of prophecy and the secret of the future.\n\nGaffarel adds yet another prognosis drawn from the stars, as, for example, the progressive weakening of the Ottoman empire; but, as mentioned already, his constellated letters are exceedingly arbitrary.\n\nHe states, for the rest, that he derived his predictions from a Hebrew Kabalist, Rabbi Chomer, but does not pretend to understand him especially well.\n\nHere follows a table of magical characters designed according to the zodiacal constellations by ancient astrologers: each of them represents the name of a genius, be he good or evil.\n\nIt is known that the Signs of the Zodiac correspond to various celestial influences and consequently signify an annual alternative of good or evil.\n\nThe names of the genii designated by the above characters are: For the Ram, SATAARAN and SARAHIEL; for the Bull, BAGDAL, and ARAZIEL; for the Twins, SAGRAS and SARAIEL; for the Crab, RAHDAR and.\n\nPHAKIEL; for the Lion, SAGHAM and SERATIEL; for the Virgin, IADARA and SCHALTIEL; for the Balance, GRASGAR-BEN and HADAKIEL; for the Scorpion, RIEHOL and SAISSAIEL; for the Archer, VHNORI and SARITAIEL; for the Goat, SAGDALON and SEMAKIEL; for the Water-Bearer, SSAKMAKILE; for the Fishes, RASAMASA and VACABIEL.\n\nThe wise man, seeking to read the sky, must observe also the days of the moon, the influence of which is very great in astrology.\n\nThe moon attracts and repels alternately the magnetic fluid of the earth, and thus produces the ebb and flow of the sea; we must be well acquainted therefore with its phases and be able to distinguish its days and hours.\n\nThe new moon is favourable at the beginning of all magical works: from first quarter to full moon its influence is warm; from full moon to third quarter it is dry; and from third quarter to last it is cold.\n\nHere follow the special characters of all days of the moon, distinguished by the twenty-two Tarot Keys and by the signs of the seven planets.\n\n1.\n\nThe Juggler, or Magus.\n\nThe first day of the moon is that of the creation of the moon itself."

