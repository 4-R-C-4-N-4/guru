[content]
body = "This empire will be political and religious; it will offer the solution of all problems agitated in our own days, and will endure for 354 years and 4 months, after which it will be succeeded by the return of the reign of Orifiel, an epoch of silence and night.\n\nThe coming universal empire, being under the reign of the Sun, will belong to him who holds the keys of the East, which are now being disputed by the princes of the world’s four quarters.\n\nBut intelligence and activity are the forces which rule the Sun in the superior kingdoms, and the nation which possesses at this time the initiative of intelligence and life will have also the keys of the East and will establish the universal kingdom.\n\nTo do this it may have to undergo previously a cross and martyrdom analogous to those of the Man-God; but, dead or living, its spirit will prevail among nations; all peoples will acknowledge and follow in four-and-twenty years the standard of France, ever victorious or miraculously raised from the dead.\n\nSuch is the prophecy of Trithemius, confirmed by all our previsions and rooted in all our hopes."

