[content]
body = "To withstand successfully the phantom of death, we must be identified with the realities of life.\n\nDoes it signify to God if an abortion wither, seeing that life is eternal?\n\nDoes it signify to Nature if unreason perish, since reason which never perishes still holds the keys of life?\n\nThe just and terrible force which destroys abortions eternally was called by the Hebrews Samael; by other easterns, Satan; and by the Latins, Lucifer.\n\nThe Lucifer of the Kabalah is not an accursed and ruined angel; he is the angel who enlightens, who regenerates by fire; he is to the angels of peace what the comet is to the mild stars of the spring-time constellations.\n\nThe fixed star is beautiful, radiant and calm; she drinks the celestial perfumes and gazes with love upon her sisters; clothed in her glittering robe, her forehead crowned with diamonds, she smiles as she chants her morning and evening canticle; she enjoys an eternal repose which nothing can disturb, and moves solemnly forward without departing from the rank assigned her among the sentinels of light.\n\nBut the wandering comet, dishevelled and of sanguinary aspect, plunges hurriedly from the depths of heaven and flings herself athwart the peaceful spheres, like a chariot of war between the ranks of a procession of vestals; she dares to face the burning spears of the solar guardians, and, like a bereft spouse who seeks the husband of her dreams during widowed nights, she penetrates even unto the inmost sanctuary of the god of day; again she escapes, exhaling the fires which consume her and trailing a long conflagration behind; the stars pale at her approach; constellate flocks, pasturing on flowers of light in the vast meadows of the sky, seem to flee before her terrible breath.\n\nThe grand council of spheres assembles, and there is universal consternation; at length the loveliest of the fixed stars is commissioned to speak in the name of all the firmament and offer peace to the headlong vagabond.\n\n“My sister,” she thus commences, “why dost thou disturb the harmony of the spheres?\n\nWhat evil have we wrought thee?\n\nAnd why, instead of wandering wildly, dost thou not fix thy place like us in the court of the sun?\n\nWhy dost thou not chant with us the evening hymn, clothed like ourselves in a white garment, fastened at the breast with a diamond clasp?\n\nWhy float thy tresses, adrip with fiery sweat, through the mists of the night?\n\nAh, wouldst thou but take thy place among the daughters of heaven, how much more beautiful wouldst thou be!\n\nThy face would burn no longer with the toil of thine incredible flights; thine eyes would be clear, thy smiling countenance white and red like that of thy happy sisters; all the stars would know thee, and, far from fearing thy flight, would rejoice at thine approach; for then thou wouldst be made one with us by the indestructible bonds of universal harmony, and thy peaceful existence would be one voice more in the canticle of infinite love.” And the comet replies to the fixed star: “Believe not, O my sister, that I am permitted to wander at will and vex the harmony of the spheres!\n\nGod hath appointed my path, even as thine, and if it appear to thee uncertain and vagrant, it is because thy beams cannot penetrate far enough to take in the circumference of the ellipse which has been allotted for my course.\n\nMy fiery hair is God's beacon; I am the messenger of the suns, and I renew my strength continually in their burning heat, that I may dispense it on my journey to young worlds which have as yet insufficient warmth, and to ancient stars which have grown cold in their solitude."

