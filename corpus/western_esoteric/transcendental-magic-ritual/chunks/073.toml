body = "The most simple, in our opinion, connects it with the Jewish Sabbath, for it is certain that the Jews, most faithful depositaries of the secrets of the Kabalah, were almost invariably the great masters in Magic during the Middle Ages.\n\nThe Sabbath was therefore the Sunday of Kabalists, the day of their religious festivals, or rather the night of their regular assembly.\n\nThis feast, surrounded with mysteries, had vulgar fright for its safeguard and escaped persecution by terror.\n\nAs to the diabolical Sabbath of necromancers, it was a counterfeit of that of the Magi, an assembly of malefactors who exploited idiots and fools.\n\nThere horrible rites were practised and abominable potions compounded; there sorcerers and sorceresses laid their plans and compared notes for the common support of their reputation in prophecy and divination.\n\nAt that period diviners were in general demand and followed a lucrative profession, while exercising a real power.\n\nSuch institutions neither had nor could possess any regular rites; everything depended on the caprice of the chiefs and the vertigo of the assembly.\n\nThe reports of some who had been present served as a type for all nightmares of hallucination, and from this chaos of impossible realities and demoniac dreams have issued the revolting and foolish histories of the Sabbath which figure in magical processes and in the books of such writers as Sprenger, Delancre, Delrio and Bodin.\n\nThe Rites of the Gnostic Sabbath were imported into Germany by an association which took the name of Mopses.\n\nIt replaced the kabalistic goat by the Hermetic dog, and the candidates, male or female - for the order initiated women -were brought in with eyes bandaged.\n\nThe same infernal noise was made about them which surrounded the name of Sabbath with so many inexplicable rumours; they were asked whether they were afraid of the devil, and were required abruptly to choose between kissing the posterior of the Grand Master and that of a small silk-covered figure of a dog, which was substituted for the old grand idol of the Goat of Mendes.\n\nThe sign of recognition was a ridiculous grimace, which recalls the phantasmagoria of the ancient Sabbath and the masks of its myrmidons.\n\nFor the rest, their doctrine is summed up in the cultus of love and licence.\n\nThe association came into existence when the Roman Church was persecuting Freemasonry.\n\nThe Mopses pretended to recruit only among Catholics, and for the penal pledge at reception they substituted a solemn engagement upon honour to reveal no secrets of the order.\n\nIt was more effectual than any oath and silenced religious objections.\n\nThe name of the Templar Baphomet, which should be spelt kabalistically backwards, is composed of three abbreviations: Tem.\n\nohp.\n\nAB., Templi omnium hominum pacts abbas, “the father of the temple of peace of all men”.\n\nAccording to some, the Baphomet was a monstrous head, but according to others, a demon in the form of a goat.\n\na sculptured coffer was disinterred recently in the ruins of an old Commandery of the Temple, and antiquaries observed upon it a baphometic figure, corresponding by its attributes to the goat of Mendes and the androgyne of Khunrath.\n\nIt was a bearded figure with a female body, holding the sun in one hand and the moon in the other, attached to chains.\n\nNow, this virile head is a beautiful allegory which attributes to thought alone the initiative and creative principle.\n\nHere the head represents spirit and the body matter.\n\nThe orbs enchained to the human form, and directed by that Nature of which intelligence is the head, are also magnificently allegorical.\n\nThe sign all the same was discovered to be obscene and diabolical by the learned men who examined it."

