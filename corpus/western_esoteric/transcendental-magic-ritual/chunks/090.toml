[content]
body = "Let us now adventure in Thessaly, the country of enchantments.\n\nHere was Apuleius beguiled, like the companions of Ulysses, and underwent a humiliating metamorphosis.\n\nHere all is magical - the birds that fly, the insects humming in the grass, even the trees and flowers.\n\nHere in the moon-light are brewed those potions which compel love; here spells are devised by stryges to render them young and lovely like Charites.\n\nO all ye youths, beware!\n\nThe art of poisoning reason, otherwise the art of philtres, seems indeed, if traditions may be trusted, to have developed its venomous efflorescence more abundantly in Thessaly than elsewhere.\n\nThere also magnetism played its most important part, for stimulating or narcotic plants, bewitched and harmful animal substances, derived all their power from enchantments - that is to say, from sacrifices accomplished and words pronounced by sorcerers when preparing philtres and beverages.\n\nInflaming substances, and those in which phosphorus predominates, are naturally aphrodisiacal.\n\nAnything which acts strongly on the nervous system may induce impassioned exaltation, and when a skilful and persevering will knows how to direct and influence these natural tendencies, it can use the desires of others to the profit of its own, and will soon reduce the most independent personalities into instruments of its pleasures.\n\nFrom such influence it behoves us to seek protection, and to give arms to the weak is our purpose in writing this chapter.\n\nHere, in the first place, are the devices of the enemy.\n\nThe man who seeks to compel love - we attribute such unlawful manoeuvres to men only, assuming that women can never have need of them - must in the first place make himself observed by the person whom he desires and must contrive to impress her imagination.\n\nHe must inspire her with admiration, astonishment, terror, and even with horror, failing all other resources; but at any cost he must set himself apart in her eyes from the rank of ordinary men and, with or against her will, must make himself a place in her memory, her apprehensions, her dreams.\n\nThe type of Lovelace is certainly not the admitted ideal of the type of Clarissa, but she thinks of him incessantly to condemn him, to execrate him, to compassionate his victims, to desire his conversion and repentance.\n\nNext she seeks his regeneration by devotion and forgiveness.\n\nLater on secret vanity whispers to her how grand it would be to fix the affections of a Lovelace, to love him and yet to withstand him.\n\nBehold, then, Clarissa surprised into loving Lovelace!\n\nShe chides herself, blushes, renounces a thousand times and loves him a thousand more.\n\nThen, at the supreme moment, she forgets to resist him.\n\nHad angels been women, represented by modern mysticism, Jehovah indeed would have acted as a wise and prudent Father by placing Satan at the gate of heaven.\n\nIt is a serious imposition on the self-love of some amiable women to find that man fundamentally good and honourable who enamoured them when they thought him a scapegrace.\n\nThe angel leaves him disdainfully, saying: “You are not the devil!” Play the devil as well as you can, if you wish to allure an angel.\n\nNo licence is possible to a virtuous man.\n\n“For what does he take us?” say women.\n\n“Does he think us less strict than he is?” But everything is forgiven in a rascal.\n\n“What else could you expect?” The part of a man with high principles and of rigid character can never be a power save with women whom one wishes to fascinate: the rest, without exception, adore reprobates.\n\nIt is quite the opposite with men, and this contrast has made modesty woman's dower, the first and most natural of her coquetries."

