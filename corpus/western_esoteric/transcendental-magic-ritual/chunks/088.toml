body = "Birth of Benjamin.\n\nDay of preference and tenderness.\n\n24.\n\nInfluence of Jupiter.\n\nBirth of Japhet.\n\n25.\n\nInfluence of Mercury.\n\nTenth plague of Egypt.\n\n26.\n\nInfluence of Mars.\n\nDeliverance of the Israelites and passage of the Red Sea.\n\n27.\n\nInfluence of Diana, or Hecate.\n\nSplendid victory achieved by Judas Maccabeus.\n\n28.\n\nInfluence of the Sun.\n\nSamson carries off the gates of Gaza.\n\nDay of strength and deliverance.\n\n29.\n\nThe Fool of the Tarot.\n\nDay of failure and miscarriage in all things.\n\nWe see from this rabbinical table, which John Belot and others borrowed from the Hebrew Kabalists, that these ancient masters concluded a posteriori from facts to presumable influences, which is completely within the logic of the occult sciences.\n\nWe see also what diverse significations are included in the twenty-two Keys which form the universal alphabet of the Tarot, together with the truth of our affirmation, that all secrets of the Kabalah and Magic, all mysteries of the elder world, all science of the patriarchs, all historical traditions of primeval times, are enclosed in this hieroglyphic book of Thoth, Enoch or Cadmus.\n\nAn exceedingly simple method of finding celestial horoscopes by onomancy is that which we are about to describe: it harmonizes Gaffarel with our own views, and its results are most astounding in their exactitude and depth.\n\nTake a black card; cut therein the name of the person for whom you wish to make the consultation; place this card at the end of a tube which must diminish towards the eye of the observer; then look through it alternately towards the four cardinal points, beginning at the east and finishing at the north.\n\nTake note of all the stars which you see through the letters; convert these letters into numbers, and, with the sum of the addition written down in the same manner, renew the operation; then compute the number of stars you have next, adding this number to that of the name; cast up again and write the sum of the two numbers in Hebrew characters.\n\nRenew the operation; inscribe separately the stars which you have noticed; find the names of all the stars in the planisphere; classify them according to their size and brightness, choosing the most brilliant of all as the pole-star of your astrological operation; find lastly, in the Egyptian planisphere, the names and figures of the genii to which these stars belong.\n\nA good example of the planisphere will be found in the atlas to the great work of Dupuis.\n\nYou will learn in this manner the fortunate and unfortunate signs enter into the name of the person, and what is their influence; whether in childhood, which is the name traced at the east; in youth, which is the name traced at the south; in mature age, which is the name at the west; in decline, which is the name at the north; or finally, during the whole life, obtained from the stars which enter into the entire number formed by the addition of letters and stars.\n\nThis astrological operation is simple, easy and calls for few calculations; it connects with the highest antiquity and belongs evidently to primitive patriarchal Magic, as will be seen by studying the works of Gaffarel and his master Rabbi Chomer.\n\nOnomantic astrology was practised by the old Hebrew Kabalists, as is proved from their observations by Rabbi Chomer, Rabbi Kapol, Rabbi Abjudan and other masters in Kabalah.\n\nThe menaces of the prophets uttered against various nations were based upon the characters of the stars found vertically over them in the permanent correspondence of the celestial and terrestrial spheres.\n\nThus, by writing in the sky of Greece the Hebrew name of that country or , and translating in numbers, they obtained the word ChRB, which signifies destroyed, desolated."

