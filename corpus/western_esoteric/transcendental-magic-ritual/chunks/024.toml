[content]
body = "Prayer of the Sylphs Spirit of Light, Spirit of Wisdom, Who breath gives and takes away the form of all things; Thou before Whom the life of every being is; a shadow which transforms and a vapour which passes away; Thou who ascendest upon the clouds and dost fly upon the wings of the wind; Thou who breathest forth and the limitless immensities are peopled: Thou who drawest in and all which came forth from Thee unto Thee returneth; endless movement in the eternal stability, be Thou blesses for ever!\n\nWe praise Thee, we bless Thee in the fleeting empire of created light, of shadows, reflections and images; and we aspire without ceasing towards Thine immutable and imperishable splendour.\n\nMay the ray of Thine intelligence and the warmth of Thy love descend on us: that which is volatile shall be fixed, the shadow shall become body, the spirit of the air shall receive a soul, and dream be though.\n\nWe shall be swept away no more before the tempest, but shall bridle the winged steeds of the morning and guide the course of the evening winds, that we may flee into Thy presence.\n\nO Spirit of Spirits, O eternal Soul of Souls, O imperishable Breath of life, O Creative Sigh, O Mouth which dost breathe forth and withdraw the life of all beings; in the ebb and flow of Thine eternal speech, which is; the divine ocean of movement and of truth!\n\nAmen.\n\nWater is exorcised by imposition of hands, breathing and speech; consecrated salt and a little of the ash which remains in the pan of incense are mingled also with it.\n\nThe aspergillus is formed of twigs of vervain, periwinkle, sage, mint, ash and basil, tied by a thread taken from a virgin's distaff and provided with a handle of hazelwood from a tree which has not yet fruited.\n\nThe characters of the seven spirits must be graven thereon with the magic bodkin.\n\nThe salt and ash must be consecrated separately, saying: Over the Salt May wisdom abide in this salt, and may it preserve our minds and bodies from all corruption, by Hochmael and in the virtue of Ruach Hochmael!\n\nMay the phantoms of Hule depart herefrom; that it may become a heavenly salt, salt of the earth and earth of salt; that it may feed the threshing ox, and strengthen our hope with the horns of the flying bull!\n\nAmen.\n\nOver the Ash May this ash return unto the fount of living waters; may it become a fertile earth; may it bring forth the Tree of Life, by the Three Names which are Netsah, Hod, and Jesod, in the beginning and in the end, by Alpha and Omega, which are in the spirit of Azoth!\n\nAmen.\n\nMingling the Water, Salt and Ash In the salt of eternal wisdom, in the water of regeneration, and in the ash whence the new earth springeth, be all things accomplished by Eloim, Gabriel, Raphael and Ariel, through the ages and aeons!\n\nAmen.\n\nExorcism of the Water Let there be a firmament in the midst of the waters, and let it divide the waters from the waters; the things which are above are like unto things which are below, and things below are like unto things above, for the performance of the wonders of one thing; the Sun is its Father, the Moon its Mother, the wind hath carried it in the belly thereof.\n\nIt ascendeth from earth to heaven, and again it descendeth from heaven to earth.\n\nI exorcise thee, creature of water, that thou mayest become unto men a mirror of the living God in his works, a fount of life and ablution of sins."

