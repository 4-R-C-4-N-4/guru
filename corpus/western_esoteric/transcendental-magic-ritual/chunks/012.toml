[content]
body = "“But how act?” Rise daily at the same hour, and that early; bathe at a spring before daybreak, and in all seasons; never wear soiled clothes: wash them yourself at need; practise voluntary privations, that you may be better able to bear those which come without seeking: then silence every desire which is foreign to the fulfilment of the Great Work.\n\n“What!\n\nBy bathing daily in a spring, I shall make gold?” You will work in order to make it.\n\n“It is a mockery!” No, it is an arcanum.\n\n“How can I make use of an arcanum which I fail to understand?” Believe and act; you will understand later.\n\nOne day a person said to me: “I would that I might be a fervent Catholic, but I am a Voltairean.\n\nWhat would I not give to have faith!” I replied: “Say ‘I would’ no longer; say ‘I will’, and I promise you that you will believe.\n\nYou tell me that you are a Voltairean, and of all the various presentations of faith that of the Jesuits is most repugnant to you, but at the same time seems the strongest and most desirable.\n\nPerform the exercises of St.\n\nIgnatius again and again, without allowing yourself to be discouraged, and you will attain the faith of a Jesuit.\n\nThe result is infallible, and should you then have the simplicity to ascribe it to a miracle, you deceive yourself now in thinking that you are a Voltairean.” An idle man will never become a magician.\n\nMagic is an exercise of all hours and all moments.\n\nThe operator of great works must be absolute master of himself; he must know how to repress the allurements of pleasure, appetite and sleep; he must be insensible to success and to indignity.\n\nHis life must be that of a will directed by one thought and served by entire Nature, which he will have made subject to mind in his own organs, and by sympathy in all the universal forces which are their correspondents.\n\nAll faculties and all senses should share in the work; nothing in the priest of Hermes has the right to remain idle; intelligence must be formulated by signs and summarized by characters or pantacles; will must be determined by words and must fulfil words by deeds.\n\nThe magical idea must be turned into light for the eyes, harmony for the ears, perfumes for the sense of smell, savours for the palate, objects for the touch.\n\nThe operator, in a word, must realize in his whole life that which he wishes to realize in the world without him; he must become a MAGNET to attract the desired thing; and when he shall be sufficiently magnetic, let him be assured that the thing will come of itself, and without thinking of it.\n\nIt is important for the Magus to be acquainted with the secrets of science, but he may know them by intuition, and without formal learning.\n\nSolitaries living in the habitual contemplation of Nature, frequently divine her harmonies and are more instructed in their simple good sense than doctors, whose natural discernment is falsified by the sophistries of the schools.\n\nTrue practical magicians are found almost invariably in the country, and are frequently uninstructed persons and simple shepherds.\n\nFurthermore, certain physical organizations are better adapted than others for the revelations of the occult world.\n\nThere are sensitive and sympathetic natures, with whom intuition in the Astral Light is, so to speak, inborn; certain afflictions and certain complaints react upon the nervous system and, independently of the concurrence of the will, may convert it into a divinatory apparatus of less or more perfection.\n\nBut these phenomena are exceptional, and generally magical power should and can be acquired by perseverance and labour."

