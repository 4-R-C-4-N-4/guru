[content]
body = "But we live in a century when no one has the courage to confess the wonders that he has witnessed, and did anyone say: “I have myself beheld or performed the things which I am describing,” he would be answered: “You are diverting yourself at our expense, or otherwise you are ill.” It is far better to be silent and to act.\n\nThe metals which correspond to the four elementary forms are gold and silver for the air, mercury for water, iron and copper for fire, lead for earth.\n\nTalismans are composed from these, relative to the forces which they signify and to the effects which it is designed to obtain from them.\n\nDivination by the four elementary forms, respectively known as aeromancy, hydromancy, pyromancy and geomancy, is performed after various manners, which all depend on the will and the TRANSLUCID or imagination of the operator.\n\nIn fact, the four elements are only instruments which assist second sight.\n\nNow, second sight is the faculty of seeing in the Astral Light, and it is as natural as the first or sensible and ordinary sight, but it can operate only by abstraction of the senses.\n\nSomnambulists and ecstatics enjoy second sight naturally, but this sight is more lucid when the abstraction is more complete.\n\nAbstraction is produced by astral intoxication, that is, by an excess of light which completely saturates, and hence stupefies, the nervous system.\n\nSanguine temperaments are disposed to Aeromancy, the bilious to pyromancy, the phlegmatic to hydromancy and the melancholic to geomancy.\n\nAeromancy is confirmed by oneiromancy, or divination by dreams; pyromancy is supplemented by magnetism; hydromancy by crystallomancy; and geomancy by cartomancy.\n\nThese are transpositions and complements of methods.\n\nBut divination, however operated, is dangerous, or to say the least useless, for it disheartens will, as a consequence impedes liberty and tires the nervous system."

