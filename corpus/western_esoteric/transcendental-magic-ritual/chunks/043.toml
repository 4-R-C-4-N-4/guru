[content]
body = "The Seal of Hermes must be engraved on the pedestal, over which must be the two-headed androgyne of Khunrath.\n\nA serpent devouring its own tail must encircle the lower part.\n\nThe Sign of Solomon must be inscribed on the reservoir.\n\nTwo globes must be fitted to this lamp, one adorned with a transparency, representing the seven genii, while the other, of larger size and duplicated, should contain variously tinted waters in four compartments.\n\nThe whole instrument should be placed in a wooden pillar, revolving on its own axis, and permitting a ray of light to escape, as required, and fall on the altar smoke at the moment of the invocations.\n\nThis lamp is a great aid to the intuitive working of slow imaginations and for the immediate creation in the presence of magnetized persons of forms alarming in their actuality, which, being multiplied by the mirrors, will magnify suddenly, and transform the operator's cabinet into a vast hall filled with visible souls.\n\nThe intoxication of the perfumes and the exaltation of the invocations will change this fantasia into a real dream; persons known formerly will be recognized; phantoms will speak; and something extraordinary and unexpected will follow the closing of the light within the pillar and the increase of the fumigations."

