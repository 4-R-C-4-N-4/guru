body = "Thus, a fatal law drives demons downward when they wish and believe themselves to be ascending.\n\nSo also those who term themselves chiefs are the most impotent and despised of all.\n\nAs to the horde of perverse spirits, they tremble before an unknown, invisible, incomprehensible, capricious, implacable chief, who never explains his laws, whose arm is ever stretched out to strike those who fail to understand him.\n\nThey give this phantom the names of Baal, Jupiter and even others more venerable, which cannot, without profanation, be pronounced in hell.\n\nBut this phantom is only the shadow and remnant of God, disfigured by wilful perversity, and persisting in imagination like a visitation of justice and a remorse of truth.\n\nWhen the evoked spirit of light manifests with sad or irritated countenance, we must offer him a moral sacrifice, that is, be inwardly disposed to renounce whatever offends him; and before leaving the oratory, we must dismiss him, saying: “May peace be with thee!\n\nI have not wished to trouble thee; do thou torment me not.\n\nI shall labour to improve myself as to anything that vexes thee.\n\nI pray and will still pray, with thee and for thee.\n\nPray thou also both with and for me, and return to thy great slumber, expecting that day when we shall awake together.\n\nSilence and adieu!” We must not close this chapter without giving some details on Black Magic for the benefit of the curious.\n\nThe practices of Thessalian sorcerers and Roman Canidias are described by several ancient authors.\n\nIn the first place, a pit was dug, at the mouth of which they cut the throat of a black sheep; the psyllae and larvae presumed to be present, and swarming round to drink the blood, were driven off with the magic sword; the triple Hecate and the infernal gods were evoked, and the phantom whose apparition was desired was called upon three times.\n\nIn the Middle Ages, necromancers violated tombs, composing philtres and unguents with the fat and blood of corpses combined with aconite, belladonna and poisonous fungi.\n\nThey boiled and skimmed these frightful compounds over fires fed with human bones and crucifixes stolen from churches; they added dust of dried toads and ash of consecrated hosts; they anointed their temples, hands, and breasts with the infernal unguent, traced diabolical Pantacles, evoked the dead beneath gibbets or in deserted graveyards.\n\nTheir howlings were heard from afar, and belated travellers imagined that legions of phantoms rose out of the earth.\n\nThe very trees, in their eyes, assumed appalling shapes; fiery orbs gleamed in the thickets; frogs in the marshes seemed to echo mysterious words of the Sabbath with croaking voices.\n\nIt was the magnetism of hallucination and the contagion of madness.\n\nThe end of procedure in Black Magic was to disturb reason and produce the feverish excitement which emboldens to great crimes.\n\nThe Grimoires, once seized and burnt by authority everywhere, are certainly not harmless books.\n\nSacrilege, murder, theft, are indicated or hinted as means to realization in almost all these works.\n\nThus, in the Grand Grimoire and its modern version the Red Dragon, there is a recipe entitled “Composition of Death, or Philosophical Stone”, a broth of aqua fortis, copper, arsenic and verdigris."

