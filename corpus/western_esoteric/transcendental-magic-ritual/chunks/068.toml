[content]
body = "Elizabeth, a good and firm Christian like herself, and believing implicitly in the Real Presence of the Saviour in true human body upon an altar where he beheld only a wheaten host, why should he not believe in the real presence of roses in his wife's apron under the appearances of bread?\n\nShe exhibited him loaves undoubtedly, but as she had said that they were roses, and as he believed her incapable of the smallest falsehood, he saw and wished to see roses only.\n\nThis is the secret of the miracle.\n\nAnother legend narrates how a saint, whose name has escaped me, finding nothing to eat on a Lenten day or a Friday, commanded the fowl to become a fish, and it became a fish.\n\nThe parable needs no interpretation, and it recalls a beautiful story of St.\n\nSpiridion of Tremithonte, the same who evoked the soul of his daughter Irene.\n\nOne Good Friday a traveller reached the abode of the holy bishop, and as bishops in those days took Christianity in earnest, and were consequently poor, Spiridion, who fasted religiously, had in his house only some salted bacon, which had been made ready for Easter.\n\nThe stranger was overcome with fatigue and famished with hunger; Spiridion offered him the meat, and himself shared the meal of charity, thus transforming the very flesh which the Jews regard as of all most impure into a feast of penitence, transcending the material law by the spirit of the law itself, and proving himself a true and intelligent disciple of the Man-God, who hath established His elect as the monarchs of Nature in the three worlds."

