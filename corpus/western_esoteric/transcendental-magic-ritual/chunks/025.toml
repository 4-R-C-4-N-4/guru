[content]
body = "Prayer of the Undines Dread King of the Sea, Who hast the keys of the floodgates of heaven and dost confine the waters of the underworld in the caverns of earth; King of the deluge and the floods of springtime; Thou Who dost unseal the sources of rivers and fountains; Thou Wo dost ordain moisture, which is like the blood of earth, to become the sap of plants: Thee We adore and Thee we invoke!\n\nSpeak unto us, Thine inconstant and unstable creatures, in the great tumults of the sea, and we shall tremble before Thee; speak unto us also in the murmur of limpid waters, and we shall yearn for Thy love!\n\nO Immensity into which flow all rivers of life, to be continually reborn in Thee!\n\nO ocean of infinite perfections!\n\nHeight which reflects Thee in the depth, depth which exhalts Thee to the height, lead us unto true life by intelligence and love!\n\nLead us to immortality by sacrifice, that we may be found worthy one Day to offer Thee water, blood and tears, for the remission of sins!\n\nAmen.\n\nFire is exorcised by the sprinkling of salt, incense, white resin, camphor and sulphur; by thrice pronouncing the three names of the genii of fire: MICHAEL, king of the sun and lightning; SAMAEL, king of volcanoes; and ANAEL, prince of the Astral Light; and, finally, by reciting the Prayer of the Salamanders Immortal, eternal, ineffable and uncreated father of all things, Who art borne upon the ever-rolling chariot of worlds which revolve unceasingly; Lord of ethereal immensities, where the throne of Thy power is exalted, from which height Thy terrible eyes Discern all thing and Thy holy and beautiful ears unto all things hearken, hear Thou Thy children, whom Thou didst love before the ages began, for Thy golden, Thy grand, Thine eternal majesty shines above the world and the heaven of stars!\n\nThou art exalted over them, O glittering fire!\n\nThere dost thou shine, there dost Thou commune with Thyself in Thine own splendour, and inexhaustible streams of Light pour from Thine essence for the nourishment of Thine Infinite Spirit, which itself doth nourish all things, and forms that inexhaustible treasure of substance ever ready for the generation which adapts it and appropriates the forms Thou hast impressed on it from the beginning!\n\nFrom this Spirit the three most holy kings, Who surround Thy throne and constitute Thy court, derive also their origin, O universal father!\n\nO sole and only father of blessed mortals and immortals!\n\nIn particular, Thou hast created powers Which are like marvelously like unto Thine eternal thought and Thine adorable essence; Thou hast established them higher than the angels, Who proclaim Thy Will to the World; finally, Thou hast created us third in rank within our elementary empire.\n\nThere our unceasing exercise is to praise Thee and adore Thy good pleasure; there we burn continually in our aspiration to possess Thee.\n\nO Father, O Mother, most tender of all mothers!\n\nO admirable archetype of maternity and of pure love!\n\nO Son, flower of sons!\n\nO form of all forms, soul, spirit, harmony and number of all things!\n\nAmen."

