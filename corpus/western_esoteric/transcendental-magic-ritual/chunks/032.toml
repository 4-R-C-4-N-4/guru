[content]
body = "TWO things, as we have shown, are necessary for the acquisition of magical power - the emancipation of will from servitude and its instruction in the art of domination.\n\nThe sovereign will is represented in our symbols by the Woman who crushes the serpent's head and by the radiant angel who restrains and constrains the dragon with lance and heel.\n\nIn this place let us affirm without evasion that the Great Magical Agent - the double current of light, the living and astral fire of the earth - was represented by the serpent with the head of an ox, goat or dog, in ancient theogonies.\n\nIt is the dual serpent of the caduceus, the old serpent of Genesis, but it is also the brazen serpent of Moses, twined about the Tau, that is, the generating lingam.\n\nIt is, moreover, the Goat of the Sabbath and the Baphomet of the Templars; it is the Hyle of the Gnostics; it is the double tail of the serpent which forms the legs of the solar cock of Abraxas.\n\nIn fine, it is the devil of M.\n\nEudes de Mirville and is really that blind force which souls must overcome if they would be freed from the chains of earth; for, unless their will can detach them from this fatal attraction, they will be absorbed in the current by the force which produced them, and will return to the central and eternal fire.\n\nThe whole magical work consists therefore in our liberation from the folds of the ancient serpent, then in setting foot upon its head and leading it where we will.\n\n“I will give thee all the kingdoms of the earth, if thou wilt fall down and adore me,” said this serpent in the evangelical mythos.\n\nThe initiate should make answer: “I will not kneel to thee, but thou shalt crouch at my feet; nothing shalt thou give me, but I will make use of thee, and will take that which I need, for I am thy lord and master” - a reply which, in a veiled manner, is contained in that of the Saviour.\n\nWe have said that there is no personal devil.\n\nIt is a misdirected force, as the name indicates.\n\nAn odic or magnetic current, formed by a chain of perverse wills, constitutes this evil spirit, which the Gospel calls legion, and this it is which precipitated the swine into the sea - another allegory of the attraction exercised on beings of inferior instincts by blind forces that can be put in operation by error and evil will.\n\nThis symbol may be compared with that of the comrades of Ulysses transformed into swine by the sorceress Circe.\n\nRemark what was done by Ulysses to preserve himself and deliver his associates: he refused the cup of the enchantress and commanded her with the sword.\n\nCirce is Nature, with all her delights and allurements: we must overcome her in order to enjoy.\n\nSuch is the significance of the Homeric fable, for the poems of Homer, those true sacred books of ancient Hellas, contain all the mysteries of high Eastern initiation.\n\nThe natural medium is therefore the ever active and ever seducing serpent of idle wills, which we must withstand by continual subjugation.\n\nAmorous, gluttonous, passionate, or idle magicians are impossible monstrosities.\n\nThe Magus thinks and wills; he loves nothing with desire; he rejects nothing in passion.\n\nThe latter word signifies a passive state, and the Magus is invariably active, invariably victorious.\n\nThe attainment of this realization is the crux of the transcendent sciences: so when the Magus accomplishes his own creation, the Great work is fulfilled, at least as concerns cause and instrument.\n\nThe Great Agent or natural mediator of human omnipotence cannot be overcome or directed save by an extra-natural mediator, which is an emancipated will."

