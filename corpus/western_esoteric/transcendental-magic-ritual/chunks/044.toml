body = "THE operations of science are not devoid of danger, as we have stated several times.\n\nThey may end in madness for those who are not established firmly on the basis of supreme, absolute and infallible reason.\n\nTerrible and incurable diseases can be occasioned by excessive nervous excitement.\n\nSwoons and death itself, as a consequence of cerebral congestion, may result from imagination when it is impressed and terrified unduly.\n\nWe cannot sufficiently dissuade nervous persons, and those who are naturally disposed to exaltation, women, young people and all who are not habituated in perfect self-control and command of fear.\n\nIn the same way, there can be nothing more dangerous than to make Magic a pastime, or, as some do, part of an evening's entertainment.\n\nEven magnetic experiments, performed under such conditions, can only exhaust the subjects, mislead opinions and defeat science.\n\nThe mysteries of life and death cannot be made sport of with impunity, and things which are to be taken seriously must be treated not only seriously but also with the greatest reserve.\n\nNever yield to the desire of convincing others by phenomena.\n\nThe most astounding would prove nothing to those who are not convinced already.\n\nThey can be attributed always to ordinary artifices and the Magus included among the more or less skilful followers of Robert Houdin or Hamilton.\n\nTo require prodigies as a warrant for believing in science is to show one's self unworthy or incapable of science.\n\nSANCTA SANCTIS.\n\nContemplate the twelfth figure of the Tarot-Keys, remember the grand symbol of Prometheus, and be silent.\n\nAll those Magi who divulged their works died violently, and many were driven to suicide, like Cardan, Schroepffer, Cagliostro, and others.\n\nThe Magus should live in retirement and be approached with difficulty.\n\nHere is the import of the ninth Key of the Tarot, where the initiate appears as a hermit enveloped completely in his cloak.\n\nThis notwithstanding, such retirement must not be one of isolation; attachments and friendships are necessary; but they must be chosen with care and preserved at all price.\n\nThe Magus must have also another avocation than that of magician.\n\nMagic is not a trade.\n\nIn order to devote ourselves to Ceremonial Magic, we must be free from anxious preoccupations; we must be in position to procure all instruments of the science and be able to make them when needed; we must possess, moreover, an inaccessible laboratory, in which there will be no danger of being ever surprised or disturbed.\n\nThen, and this is an indispensable condition, we must know how to equilibrate forces and restrain the zeal of our own initiative.\n\nThis is the meaning of the eighth Key of Hermes, wherein a woman is seated between two Pillars, with an upright sword in one hand and a balance in the other.\n\nTo equilibrate forces they must be maintained simultaneously and caused to act alternately: the use of the balance represents this double action.\n\nThe same arcanum is typified by the dual cross in the Pantacles of Pythagoras and Ezekiel: see the plate which appears at chapter 18 in the “Doctrine”, where the crosses equilibrate each other and the planetary signs are in permanent opposition.\n\nThus Venus is the equilibrium of the works of Mars; Mercury moderates and fulfils the operations of the Sun and Moon.\n\nSaturn balances Jupiter.\n\nIt was by means of this antagonism between the ancient gods that Prometheus, that is to say, the genius of science, contrived to enter Olympus and carry off fire from heaven.\n\nIs it necessary to speak more clearly?"

