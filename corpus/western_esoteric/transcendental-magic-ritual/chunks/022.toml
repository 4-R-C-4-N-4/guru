[content]
body = "The old sorceresses, when they spent the night at the meeting-place of three cross-roads, yelled three times in honour of triple Hecate.\n\nAll these figures, with the acts analogous thereto, all these dispositions of numbers and of characters, are, as we have said, so many instruments for the education of the will, by fixing and determining its habits.\n\nThey serve, furthermore, to combine all powers of the human soul in action and to increase the creative force of imagination.\n\nIt is the gymnastics of thought in training for realization: and hence the effect of these practices is infallible, like Nature, when they are fulfilled with absolute confidence and indomitable perseverance.\n\nThe Great Master tells us that faith could transplant trees into the sea and remove mountains.\n\nEven a superstitious and insensate practice is efficacious because it is a realization of will.\n\nHence a prayer is more powerful if we visit a church to say it than when it is recited at home, and it will work miracles if we fare to a famous sanctuary for the purpose-in other words, to one which is magnetized strongly by the great number of its frequenters--traversing two or three hundred leagues with bare feet and asking alms by the way.\n\nMen laugh at the simple woman who denies herself a pennyworth of milk in the morning that she may carry a penny taper to burn on the magic triangle in a chapel; but they who laugh are ignorant, and the simple woman does not pay too dearly for what she thus purchases of resignation and of courage.\n\nGreat minds pass by in great pride, shrugging their shoulders; they rise up against superstition with a din which shakes the world; and what happens?\n\nThe towers of great minds collapse, and their ruins revert to the providers and purchasers of penny tapers, who are content to hear it proclaimed everywhere that their reign is for ever ended, provided that they rule always.\n\nThe great religions have never had more than one serious rival, and this rival is Magic.\n\nMagic produced the occult associations which brought about the revolution termed the Renaissance; but it has been the doom of the human mind, blinded by insensate passions, to realize literally the allegorical history of the Hebrew Hercules: by over-throwing the pillars of the temple, it has been buried itself under the ruins.\n\nThe Masonic associations of the present time are no less ignorant of the high meaning of their symbols than are the rabbins of the Sepher Yetzirah and the Zohar concerning the ascending scale of the three degrees, with the transverse progression from right to left and from left to right of the kabalistic septenary.\n\nThe compass of the G.% A.% and the square of Solomon have become the gross and material level of unintelligent Jacobinism, realized by a steel triangle: this obtains both for heaven and earth.\n\nThe initiated divulgers to whom the illuminated Cazotte predicted a violent death have, in our own days, exceeded the sin of Adam; having rashly gathered the fruits of the Tree of Knowledge, which they did not know how to use for their nourishment, they have cast them to the beasts and reptiles of the earth.\n\nSo is the reign of superstition inaugurated, and it must persist until the period when true religion shall be constituted again on the eternal foundations of the hierarchy of three degrees and of the triple power which that hierarchy exercises blindly or providentially in the three worlds."

