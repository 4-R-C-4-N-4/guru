[content]
body = "Faith, hope and charity are three such inseparable sisters that they may be taken one for another.\n\nThus in religion universal and hierarchic orthodoxy, restoration of temples in all their splendour; reestablishment of high ceremonial in its primitive pomp; hierarchic instruction of symbols, mysteries, miracles; legends for children, light for grown men who will beware of scandalizing little ones in the simplicity of their faith: this in religion is our whole Utopia, as it is also the desire and need of humanity.\n\nComing now to philosophy, our own is that of realism and positivism.\n\nBeing is by reason of that Being of Whom no one doubts.\n\nAll exists for us by science.\n\nTo know is to be.\n\nScience and its object become identified in the intellectual life of him who knows.\n\nTo doubt is to be ignorant.\n\nNow, a thing of which we are ignorant does not as yet exist for us.\n\nTo live intellectually is to learn.\n\nBeing develops and amplifies by science.\n\nThe first conquest of science, and the first result of the exact sciences, is the sentiment of reason.\n\nThe laws of Nature are algebraic.\n\nThus the sole reasonable faith is the adhesion of the student to theorems, the entire essential justice of which lies outside his knowledge, though its applications and results are demonstrated adequately to his mind.\n\nSo does the true philosopher believe in that which is and does not admit a posteriori that all is reasonable.\n\nBut no more charlatanism in philosophy, no more empiricism, no more system!\n\nThe study of being and its compared realities!\n\nA metaphysic of Nature!\n\nThen away with mysticism!\n\nNo more dreams in philosophy; philosophy is not poesy but pure mathematics of realities, physical and moral.\n\nLeave unto religion the freedom of its infinite aspirations, and let it leave in turn to science the exact conclusions of absolute experimentalism.\n\nMan is the son of his works; he is what he wills to be; he is the image of the God he makes; he is the realization of his own ideal.\n\nShould that ideal lack basis, the whole edifice of his immortality collapses.\n\nPhilosophy is not the ideal, but ought to serve as its foundation.\n\nThe known is for us the measure of the unknown; by the visible we appreciate the invisible; sensations are to thoughts even as thoughts to aspirations.\n\nScience is a celestial trigonometry: one side of the absolute triangle is that Nature which is submitted to our investigations; the second is our soul, which embraces and reflects Nature; the third is the Absolute, in which our soul is magnified.\n\nNo more atheism possible henceforward, for we pretend no longer to define God.\n\nGod is for us the most perfect and best of intelligent beings, and the ascending hierarchy of beings demonstrates His existence amply.' Do not let us ask for more; but, to understand Him ever better, let us grow perfect by ascending towards Him.\n\nNo more ideology; being is being, and cannot perfectionize save according to real laws of being.\n\nObserve, and do not prejudge; exercise our faculties, do not falsify them; enlarge the domain of life in life; behold truth in truth!\n\nEverything is possible to him who wills only what is true!\n\nRest in Nature, study, know, then dare; dare to will, dare to act and be silent!\n\nNo more hatred of anyone.\n\nEveryone reaps what he sows.\n\nThe consequence of works is fatal: to judge and chastise the wicked is for the Supreme Reason.\n\nHe who enters into a blind alley must retrace his steps or be broken.\n\nWarn him gently, if he can still hear you, but human liberty must takes its course.\n\nWe are not the judges of one another.\n\nLife is a battlefield.\n\nDo not pause in the warfare on account of those who fall, but avoid trampling them."

