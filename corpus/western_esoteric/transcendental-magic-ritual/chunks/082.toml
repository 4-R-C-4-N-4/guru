body = "For bewitchment by the waxen figure, a more perfect figure must be made, and set about as far as possible with things belonging to the person; seven talismans must be hung round the neck; it must be placed in the middle of a great Pantacle representing the Pentagram, and each day must be rubbed slightly with a mixture of oil and balm, after reciting the Conjuration of the Four to turn aside the influence of elementary spirits.\n\nAt the end of seven days the image must be burnt in consecrated fire, and one may rest assured that the figure fabricated by that sorcerer will at such moment lose all its virtue.\n\nWe have mentioned already the Sympathetic Medicine of Paracelsus, who medicated waxen limbs and operated upon discharges of blood from wounds for the cure of wounds themselves.\n\nThis system permitted the employment of more than usually violent remedies, and the chief specifics were sublimate and vitriol.\n\nWe believe that homoeopathy is a reminiscence of the theories of Paracelsus and a return to his wise practices.\n\nBut we shall follow up this subject in a special treatise consecrated to occult medicine.\n\nContracts by parents forestalling the future of their children are bewitchments which cannot be condemned too strongly; children dedicated in white, for example, scarcely ever prosper; those who were formerly devoted to celibacy fell commonly into debauch, or ended in despair and madness.\n\nMan is not permitted to do violence to destiny, still less to impose bonds upon the lawful use of liberty.\n\nAs a supplement or appendix to this chapter, we will add a few words about mandragores and androids which several writers on Magic confound with waxen images serving the purposes of bewitchment.\n\nThe natural mandragore is a filamentous root which presents more or less as a whole either the figure of a man, or that of the virile members.\n\nIt is slightly narcotic and an aphrodisiacal virtue was ascribed to it by the ancients, who represented it as being sought by Thessalian sorcerers for the composition of philtres.\n\nIs this root the umbilical vestige of our terrestrial origin, as a certain magical mysticism has suggested?\n\nWe dare not affirm it seriously, but it is true all the same that man issued from the slime of earth and his first appearance must have been in the form of a rough sketch.\n\nThe analogies of Nature compel us to admit the notion, at least as a possibility.\n\nThe first men were, in this case, a family of gigantic, sensitive mandragores, animated by the sun, who rooted themselves up from the earth.\n\nSuch an assumption not only does not exclude, but on the contrary positively supposes, creative will and the providential co-operation of a First Cause, which we have REASON to call God.\n\nSome alchemists, impressed by this idea, indulged in reveries on the culture of the mandragore and experimented in the artificial reproduction of a soil sufficiently fruitful and a sun sufficiently active to humanize the said root, and thus create men without the concurrence of the female.\n\nOthers, who regarded humanity as the synthesis of animals, despaired about vitalizing the mandragore, but they crossed monstrous pairs and projected human seed into animal earth, only for the production of shameful crimes and barren deformities.\n\nThe third method of making the android was by galvanic machinery.\n\nOne of these almost intelligent automata was attributed to Albertus Magnus, and it is said that St.\n\nThomas destroyed it with one blow from a stick because he was perplexed by its answers.\n\nThis story is an allegory: the android was primitive scholasticism, which was broken by the SUMMA of St."

