[content]
body = "Crosses of honour and other kindred decorations are veritable talismans which increase personal value and merit; they are consecrated by solemn investiture, and public opinion can impart to them a prodigious power.\n\nSufficient attention has not been paid to the reciprocal influence of signs on ideas and of ideas on signs; it is not less true that the revolutionary work of modern times, for example, has been resumed symbolically in its entirety by the Napoleonic substitution of the Star of Honour for the Cross of St.\n\nLouis.\n\nIt is the Pentagram in place of the Labarum; it is the reconstitution of the symbol of light; it is the Masonic resurrection of Adonhiram.\n\nThey say that Napoleon believed in his star, and could he have been persuaded to explain what he meant thereby, it would have proved to be his genius; he was right therefore in adopting the Pentagram as his sign, because it is the symbol of human sovereignty acquired by intelligent initiative.\n\nThe mighty soldier of the Revolution knew little, but he divined almost everything; so was he the greatest instinctive and practical magician of modern times; the world is still full of his miracles, and the country people will never believe that he is dead.\n\nBlessed and indulgenced objects, touched by holy images or venerable persons; chaplets from Palestine; the Agnus Dei, composed of the wax of the Paschal candle and the annual remnants of holy chrism; scapulas and medals, are all true talismans.\n\nOne such medal has become popular in our own day, and even those who are devoid of religion suspend it from the necks of their children.\n\nMoreover, its figures are so perfectly kabalistic that it is truly a marvellous double Pantacle.\n\nOn the one side is the great initiatrix, the heavenly mother of the Zohar, the Isis of Egypt, the Venus-Urania of the Platonists, the Mary of Christianity, throned upon the world and setting one foot upon the head of the magical serpent.\n\nShe extends her two hands in such a manner as to form a triangle, of which her head is the apex; her hands are open and radiant, thus making a double triangle, with all its rays directed towards the earth, evidently representing the emancipation of intelligence by labour.\n\nOn the other side is the double TAU of the hierophants, the Lin-gam with the double Cteis or triple Phallus, supported, with interlacement and repeated insertion, by the kabalistic and masonic M, representing the square between the two Pillars JAKIN and BOAZ.\n\nBelow are placed, upon the same level, two loving and suffering hearts, encircled by twelve Pentagrams.\n\nEveryone will tell you that the wearers of this medal do not attach such significance to it, but on this account it is only more absolutely magical, having a dual sense and consequently a double virtue.\n\nThe ecstatic on the authority of whose revelations this talisman was engraved, had already beheld it existing perfectly in the Astral Light, which demonstrates once more the intimate connexion of ideas and signs, giving a new sanction to the symbolism of Universal Magic.\n\nThe greater the importance and solemnity brought to bear on the execution and consecration of talismans and Pantacles, the more virtue they acquire, as will be under stood upon the evidence of the principles which we have established.\n\nSuch consecration should take place on the days that we have indicated, with the apparatus which we have given in detail.\n\nTalismans are consecrated by the four exorcised elements, after conjuring the spirits of darkness by the CONJURATION Of THE Four."

