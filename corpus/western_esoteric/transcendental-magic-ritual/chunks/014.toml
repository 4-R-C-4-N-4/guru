[content]
body = "We must be mild and considerate to all, but in social relations must never permit ourselves to be absorbed, and must withdraw from circles in which we cannot acquire some initiative.\n\nFinally, we may and should fulfil the duties and practise the rites of the cultus to which we belong.\n\nNow, of all forms of worship the most magical is that which most realizes the miraculous, which bases the most inconceivable mysteries upon the highest reasons, which has lights equivalent to its shadows, which popularizes miracles, and incarnates God in all mankind by faith.\n\nThis religion has existed always in the world, and under many names has been ever the one and ruling religion.\n\nIt has now among the nations of the earth three apparently hostile forms, which are destined, however, to unite before long for the constitution of a universal Church.\n\nI refer to the Greek orthodoxy, Roman Catholicism and a final transfiguration of the religion of Buddha.\n\nHereunto therefore we have made it plain, as we believe, that our Magic is opposed to the goetic and necromantic kinds.\n\nIt is at once an absolute science and religion, which should not indeed destroy and absorb all opinions and all forms of worship, but should regenerate and direct them by reconstituting the circle of initiates, and thus providing the blind masses with wise and clear-seeing leaders.\n\nWe are living at a period when nothing remains to destroy and everything to remake.\n\n“Remake what?\n\nThe past?” No one can remake the past.\n\n“What, then, shall we reconstruct?\n\nTemples and thrones?” To what purpose, since the former ones have been cast down?\n\n“You might as well say: my house has collapsed from age, of what use is it to build another?” But will the house that you contemplate erecting be like that which has fallen?\n\nNo, for the one was old and the other will be new.\n\n“Notwithstanding, it will be always a house.” What else can you expect?"

