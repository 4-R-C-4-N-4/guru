[content]
body = "Then comes the victory, and the wounded on both sides, now brothers in suffering and before humanity, will meet in the ambulances of the conquerors.\n\nSuch are the consequences of the philosophical dogma of Hermes; such has been from all time the ethic of true adepts; such is the philosophy of the Rosicrucian inheritors of all the ancient wisdoms; such is the Secret Doctrine of those associations that are treated as subversive of the public order, and have ever been accused of conspiring against thrones and altars.\n\nThe true adept, far from disturbing the public order, is its firmest supporter.\n\nHe has too great a respect for liberty to desire anarchy: child of the light, he loves harmony and knows that darkness begets confusion.\n\nHe accepts everything that is and denies only what is not.\n\nHe wills true religion, practical, universal, full of faith, palpable, realized in all life; he wills it to have a wise and powerful priesthood, surrounded by all the virtues and all the prestige of faith.\n\nHe wills the universal orthodoxy, the absolute, hierarchic, apostolic, sacramental, incontestable and uncontested catholicity.\n\nHe wills an experimental philosophy, real, mathematical, modest in its conclusions, untiring in its researches, scientific in its progress.\n\nWho, therefore, can be against us if God and reason are with us?\n\nDoes it matter if man prejudge and slander us?\n\nOur entire justification is in our thoughts and our works.\n\nWe come not, like Oedipus, to destroy the sphinx of symbolism; we seek, on the contrary, to resuscitate it.\n\nThe sphinx devours only blind interpreters; and he who slays it has not known how to divine it properly; it must be subdued, enchained and compelled to follow us.\n\nThe sphinx is the living palladium of humanity, it is the conquest of the King of Thebes; it would have been the salvation of Oedipus, had Oedipus understood its whole enigma!\n\nIn the positive and material order, what must be concluded from this work?\n\nIs Magic a force which science may abandon to the boldest and wickedest?\n\nIs it a cheat and falsehood invented by rogues to cozen the ignorant and feeble?\n\nIs Philosophical Mercury the exploitation of credulity by address?\n\nThose who understand us know already how to answer these questions.\n\nIn these days, Magic can be no longer the art of fascinations and illusions: those only who wish to be deceived can be deceived now.\n\nBut the narrow and rash incredulity of the last century is denied in totality by Nature herself.\n\nWe are environed by prophecies and miracles; unbelief once denied them unwisely; now, science explains them.\n\nNo, M.\n\nle Comte de Mirville, a lost spirit is not allowed to disturb the empire of God!\n\nNo, things unknown cannot be explained by things impossible!\n\nNo, invisible beings are not permitted to deceive, torment, seduce and even kill the living creatures of God, poor human beings, so ignorant, as it is, so weak, scarce able to combat their own delusions!\n\nThose who told you all this in your childhood, M.\n\nle Comte, have deceived you, and if you were child enough once to listen, be man enough now to disbelieve.\n\nMan is himself the creator of his heaven and hell, and there are no demons except our own follies.\n\nMinds chastised by truth are corrected by that chastisement, and dream no more of disturbing the world.\n\nIf Satan exist, he can be only the most unfortunate, most ignorant, most humiliated and most impotent of beings.\n\nThe existence of a universal agent of life, a living fire, an Astral Light, is demonstrated by facts."

