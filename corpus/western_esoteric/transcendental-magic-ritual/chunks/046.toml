[content]
body = "THE science is preserved by silence and perpetuated by initiation.\n\nThe law of silence is not therefore absolute and inviolable, except relatively to the uninitiated multitude.\n\nSuch knowledge can be only transmitted by speech.\n\nThe sages therefore must speak occasionally.\n\nYes, they must speak, not, however, to disclose, but lead others to discover.\n\nNoli ire, fac venire, was the device of Rabelais, who, being master of all the sciences of his time, could not be unacquainted with Magic.\n\nWe have, consequently, to reveal here the mysteries of initiation.\n\nThe destiny of man, as we have said, is to make or create himself; he is and he will be the son of his works, both for time and eternity.\n\nAll men are called into the lists, but the number of the elect - that is, of those who succeed - is invariably small.\n\nIn other words, the men who are desirous to attain are numbered by multitudes, but the chosen are few.\n\nNow, the government of the world belongs by right to the flower of mankind, and when any combination or usurpation prevents their possessing it, a political or social cataclysm ensues.\n\nMen who are masters of themselves become easily masters of others; but it is possible for them to hinder one another if they disregard the laws of discipline and of the universal hierarchy.\n\nTo be subjects of a discipline in common, there must be a community of ideas and desires, and such a communion cannot be attained except by a common religion established on the very foundations of intelligence and reason.\n\nThis religion has existed always in the world, and is that only which can be called one, infallible, indefectible and veritably catholic - that is, universal.\n\nThis religion, of which all others have been successively the veils and shadows, is that which demonstrates being by being, truth by reason, reason by evidence and common sense.\n\nIt is that which proves by realities the reasonable basis of hypotheses, and forbids reasoning upon hypotheses independently of realities.\n\nIt is that which is grounded on the doctrine of universal analogies but never confounds the things of science with those of faith.\n\nIt can never be of faith that two and one make more or less than three; that in physics the contained can exceed the container; that a solid body, as such, can act like a fluidic or gaseous body; that, for example, a human body can pass through a closed door without dissolution or opening.\n\nTo say that one believes such a thing is to talk like a child or a fool; yet it is no less insensate to define the unknown and to argue from hypothesis to hypothesis, till we come to deny evidence a priori for the affirmation of precipitate suppositions.\n\nThe wise man affirms what he knows and believes in what he does not know only in proportion to the reasonable and known necessities of hypothesis.\n\nBut this reasonable religion is unadapted for the multitude; fables, mysteries, definite hopes and terrors having a physical basis, are needful for these.\n\nIt is for this reason that the priesthood has been established in the world.\n\nNow, the priesthood is recruited by initiation.\n\nReligious forms perish when initiation ceases in the sanctuary, whether by the betrayal of the Mysteries or by their neglect and oblivion.\n\nThe Gnostic disclosures, for example, alienated the Christian Church from the high truths of the Kabalah, which contains all secrets of transcendental theology.\n\nHence the blind, having become leaders of the blind, great obscurities, great lapses and deplorable scandals have followed.\n\nSubsequently, the sacred books, of which the keys are all kabalistic from Genesis to the Apocalypse, have become so little intelligible to Christians, that prudent pastors have judged it necessary to forbid them being read by the uninstructed among believers."

