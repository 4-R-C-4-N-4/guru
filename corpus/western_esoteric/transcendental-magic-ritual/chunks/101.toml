[content]
body = "Rabelais, who was a greater magician than he seemed, made pantagruelism his special panacea.\n\nHe compelled his patients to laugh, and all the remedies he administered subsequently succeeded the better in consequence.\n\nHe established a magnetic sympathy between himself and them, by means of which he imparted his own confidence and good humour; he flattered them in his prefaces, termed them his precious, most illustrious patients, and dedicated his books to them.\n\nSo are we convinced the Gargantua and Pantagruel cured more black humours, more tendencies to madness, more atrabilious whims, at that epoch of religious animosities and civil wars, than the whole Faculty of Medicine could boast.\n\nOccult Medicine is essentially sympathetic.\n\nReciprocal affection, or at least real goodwill, must exist between doctor and patient.\n\nSyrups and juleps have very little inherent virtue; they are what they become through the mutual opinion of operator and subject; hence homeopathic medicine dispenses with them and no serious inconvenience follows.\n\nOil and wine, combined with salt or camphor, are sufficient for the healing of all wounds and for all external frictions or soothing applications.\n\nOil and wine are the chief medicaments of Gospel tradition.\n\nThey formed the balm of the Good Samaritan, and in the Apocalypse - when describing the last plagues - the prophet prays the avenging powers to spare these substances, that is, to leave a hope and a remedy for so many wounds.\n\nWhat we term Extreme Unction was the pure and simple practice of the Master's Traditional Medicine, both for the early Christians and in the mind of the apostle Saint James, who has included the precept in his epistle to the faithful of the whole world.\n\n“If any man be sick among you,” he writes, “let him call in the priests of the church, and let them pray over him, anointing him with oil in the name of the Lord.” This divine therapeutic science was lost gradually, and Extreme Unction came to be regarded as a religious formality, a necessary preparation for death.\n\nAt the same time, the thaumaturgic virtue of consecrated oil could not be effaced altogether from remembrance by traditional doctrine, and it is perpetuated in the passage of the Catechism which refers to Extreme Unction.\n\nFaith and charity were the most signal healing powers among early Christians.\n\nThe source of most diseases is in moral disorders; we must begin by healing the soul, and then the cure of the body will follow quickly."

