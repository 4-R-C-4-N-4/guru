[content]
body = "St.\n\nAugustus speculates, as we have said, whether Apuleius could have been changed into an ass and then have resumed his human shape.\n\nThe same doctor might have concerned himself equally with the adventure of the comrades of Ulysses, transformed into swine by Circe.\n\nIn vulgar opinion, transmutations and metamorphoses have always been the very essence of Magic.\n\nNow, the crowd, being the echo of opinion, which is queen of the world, is never perfectly right or entirely wrong.\n\nMagic does change the nature of things, or rather modifies their appearances at pleasure, according to the strength of the operator's will and the fascination of ambitious adepts.\n\nThe spoken word creates its form, and when a person held infallible confers a name upon a given thing, the latter is really transformed into the substance signified by the name.\n\nThe masterpiece of speech and of faith in this order is the real transmutation of a substance without change in its externals.\n\nHad Apollonius offered a cup of wine to his disciples, and said to them: “This is my blood, of which ye shall drink hence-forth to perpetuate my life within you”; and had his disciples through centuries believed that they effected transformation by repeating the same words; had they taken the wine, despite its odor and taste, for the real, human and living blood of Apollonius, we should have to acknowledge this master in theurgy as the most accomplished of enchanters and most potent of all the Magi.\n\nIt would remain for us then to adore him.\n\nNow, it is well known that mesmerists impart for their somnambulists any taste that they chose to plain water; and if we assume a Magus with sufficient command over the astral fluid to magnetize at the same moment a whole assembly of persons, otherwise prepared for magnetism by extreme super-excitement, we shall be in a position to explain readily, not indeed the Gospel miracle of Cana but works of the same class.\n\nAre not the fascinations of love, which result from the universal Magic of Nature, truly prodigious, and do they not actually transform persons and things?\n\nLove is a dream of enchantments that transfigures the world; all becomes music and fragrance, all intoxication and felicity.\n\nThe beloved being is beautiful, is good, is sublime, is infallible, is radiant, glows with health and happiness.\n\nWhen the dream ends we seem to have fallen from the clouds; we are inspired with disgust for the brazen sorceress who took the place of the lovely Melusine, for the Thersites whom we deemed was Achilles or Nereus.\n\nWhat faith is that which we cannot inspire in those who love us?\n\nBut also what reason or justice can we instill into those who have finished with such love?\n\nLove begins magician and ends sorcerer.\n\nAfter creating the illusions of heaven on earth, it realizes those of hell.\n\nIts hatred is absurd like its ardour, because it is passional, that is, subject to the fatalities of its own influences.\n\nFor this cause it has been proscribed by sages, who declare it the enemy of reason.\n\nAre they to be envied or commiserated for thus condemning, doubtless without understanding, the most alluring of miscreants?\n\nAll that can be said is that when they spoke thus, either they had not yet loved or else they loved no longer.\n\nThings that are external are for us what our word internal makes them.\n\nTo believe that we are happy is to be happy; whatsoever we esteem becomes precious in proportion to the estimation itself: this is the sense in which we can say that Magic changes the nature of things.\n\nThe METAMORPHOSES of Ovid are true, but they are allegorical, like the GOLDEN ASS of rare Apuleius."

