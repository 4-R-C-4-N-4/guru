[content]
body = "There are also some substances which produce ecstasy and dispose towards the magnetic sleep; there are some which place at the service of imagination all the most lively and highly coloured reflections of the elementary light; but the use of such things is dangerous, for they tend to occasion stupefaction and intoxication.\n\nThey are used notwithstanding, but in carefully calculated quantities and under wholly exceptional circumstances.\n\nHe who decides to devote himself seriously to magical works, after fortifying his mind against all danger of hallucination and fright, must purify himself without and within for forty days.\n\nThe number forty is sacred, and its very figure is magical.\n\nIn Arabic numerals it consists of the circle, which is a type of the infinite, and of the 4, which sums the triad by unity.\n\nIn Roman numerals, arranged after the following manner, it represents the sign of the fundamental doctrine of Hermes and the character of the Seal of Solomon: The purification of the Magus consists in the renunciation of coarse enjoyments, in a temperate and vegetarian diet, in abstinence from intoxicating drink, and in regulating the hours of sleep.\n\nThis preparation has been imposed and represented in all forms of worship by a period of penitence and trials preceding the symbolical feasts of life-renewal.\n\nAs already stated, the most scrupulous external cleanliness must be observed: the poorest person can find spring water.\n\nAll clothes, furniture and vessels made use of must be also washed carefully, whether by ourselves or others.\n\nAll dirt is evidence of negligence, and negligence is deadly in Magic.\n\nThe atmosphere must be purified at rising and retiring with a perfume composed of the juice of laurels, salt, camphor, white resin and sulphur, repeating at the same time the four Sacred Words, while turning successively towards the four cardinal points.\n\nWe must divulge to no one the works that we accomplish, for, as specified in our “Doctrine”, mystery is the exact and essential condition of all operations of science.\n\nThe inquisitive must be misled by the pretence of other occupations and other researches, such as chemical experiments for industrial purposes, hygienic prescriptions, the investigation of some natural secrets, and so on; but the forbidden name of Magic must never be pronounced.\n\nThe Magus must be isolated at the beginning and difficult to approach, so that he may concentrate his power and select his points of contact; but in proportion as he is austere and inaccessible at first, so will he be popular and sought after when he shall have magnetized his chain and chosen his place in a current of ideas and of light.\n\nA laborious and poor existence is so favourable to practical initiation that the greatest masters have preferred it, even when the wealth of the world was at their disposal.\n\nThen it is that Satan, otherwise the spirit of ignorance, who scorns, suspects and detests science because at heart he fears it, comes to tempt the future master of the world by saying to him: “If thou art the Son of God, command these stones to become bread.” Then it is that mercenary men seek to humiliate the prince of knowledge by perplexing, depreciating, or sordidly exploiting his labour, the slice of bread that he deigns to need is broken into ten fragments, so that he may stretch forth his hand ten times.\n\nBut the Magus does not even smile at the absurdity, and calmly pursues his work.\n\nSo far as may be possible, we must avoid the sight of hideous objects and uncomely persons, must decline eating with those whom we do not esteem, and must live in the most uniform and studied manner.\n\nWe should hold ourselves in the highest respect and consider that we are dethroned sovereigns who consent to existence in order to reconquer our crowns."

