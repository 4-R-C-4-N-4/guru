[content]
body = "The earth is exorcised by aspersion of water, by breathing and by fire, with the perfumes proper for each day and the Prayer of the Gnomes King invisible, Who, taking the earth as a support, didst furrow the abysses to fil them with Thine omnipotence; Thou Whose name doth shake the vaults of the world, Thou Who causest the seven metals to flow through the veins of the rock, monarch of the seven lights, rewarder of the subterranean toilers, lead us unto the desirable air and to the realm of splendour.\n\nWe watch and we work unremittingly, we seek and we hope, by the twelve stones of the holy City, by the hidden talismans, by the pole of loadstone which passes through the center of the world!\n\nSavior, Savior, Savior, have pity on those who suffer, expand our hearts, detach and elevate our minds, enlarge our entire being!\n\nO stability and motion!\n\nO day clothed with night!\n\nO darkness veiled by splendour!\n\nO Master Who never keepest back the wages of Thy labourers!\n\nO silver whiteness!\n\nO golden splendour!\n\nO crown of living and melodious diamonds!\n\nThou Who wearest the heaven on Thy finger like a sapphire ring, Thou Who concealest under earth, in the stone kingdom, the marvellous seed of stars, live, reign, be the eternal dispenser of the wealth whereof Thou hast made us the wardens!\n\nAmen.\n\nIt must be borne in mind that the special kingdom of Gnomes is at the north, that of Salamanders at the south, that of Sylphs at the east, and that of Undines at the west.\n\nThese beings influence the four temperaments of man; that is to say, the Gnomes affect the melancholy, Salamanders the sanguine, Undines the phlegmatic and Sylphs the bilious.\n\nTheir signs are: the hieroglyphs of the Bull for the Gnomes, who are commanded with the sword; those of the Lion for Salamanders, who are commanded with the bifurcated rod or magic trident; those of the Eagle for the Sylphs, who are commanded by the holy pantacles; finally, those of the Water-Carrier for Undines, who are commanded by the cup of libations.\n\nTheir respective sovereigns are Gob for the Gnomes, Djin for the Salamanders, Paralda for the Sylphs and Nicksa for the Undines.\n\nWhen an elementary spirit torments, or at least vexes, the inhabitants of this world, it must be conjured by air, water, fire and earth; by breathing, sprinkling, burning of perfumes; and by tracing on the ground the Star of Solomon and the Sacred Pentagram.\n\nThese figures must be perfectly correct and drawn either with the charcoal of consecrated fire or with a reed dipped in various colours, mixed with powdered loadstone.\n\nThen, holding the Pantacle of Solomon in one hand and taking up successively the sword, rod and cup, the Conjuration of the Four should be recited with a loud voice, after the following manner: Caput mortuum, the Lord command thee by he living and votive serpent!\n\nCherub, the Lord command thee by Adam Jotchabah!\n\nWandering Eagle, the Lord command thee by the wings of the Bull!\n\nSerpent, the Lord Tetragrammaton command thee by the angel and the lion!\n\nMichael, Gabriel, Raphael, and Anael!\n\nFlow Moisture, by the spirit of Eloim.\n\nEarth, be established by Adam Jotchabah.\n\nSpread, firmament, by Jahubehu, Zebaoth."

