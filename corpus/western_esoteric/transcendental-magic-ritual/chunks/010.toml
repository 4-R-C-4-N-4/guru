[content]
body = "EVERY intention which does not assert itself by deeds is a vain intention, and the speech which expresses it is idle speech.\n\nIt is action which proves life and establishes will.\n\nHence it is said in the sacred and symbolical books that men will be judged, not according to their thoughts and their ideas, but according to their works.\n\nWe must do in order to be.\n\nWe have, therefore, to treat in this place of the grand and terrific question of magical works; we are concerned no longer with theories and abstractions; we approach realities, and we are about to place the wand of miracles in the hands of the adept, saying to him at the same time: “Be not satisfied with what we tell you: act for yourself.” We have to deal here with works of relative omnipotence, with the means of laying hold upon the greatest secrets of Nature and compelling them into the service of an enlightened and inflexible will.\n\nMost known Magical Rituals are either mystifications or enigmas, and we are about to rend for the first time, after so many centuries, the veil of the occult sanctuary.\n\nTo reveal the holiness of mysteries is to provide a remedy for their profanation.\n\nSuch is the thought which sustains our courage and enables us to face all the perils of this enterprise, possibly the most dangerous which it has been permitted the human mind to conceive and carry out.\n\nMagical operations are the exercise of a natural power, but one superior to the ordinary forces of Nature.\n\nThey are the result of a science and a practice which exalt human will beyond its normal limits.\n\nThe supernatural is only the natural in an extraordinary grade, or it is the exalted natural; a miracle is a phenomenon which impresses the multitude because it is unexpected; the astonishing is that which astonishes; miracles are effects which surprise those who are ignorant of their causes, or assign them causes which are not in proportion to effects.\n\nMiracles exist only for the ignorant, but as there is scarcely any absolute science among men, the supernatural can still obtain, and does so indeed for the whole world.\n\nLet us set out by saying that we believe in all miracles because we are convinced and certain, even from our own experience, of their entire possibility.\n\nThere are some which we do not explain, though we regard them as no less explicable.\n\nFrom the greater to the lesser, from the lesser to the greater, the consequences are related identically and the proportions progressively rigorous.\n\nBut in order to work miracles we must be outside the normal conditions of humanity; we must be either abstracted by wisdom or exalted by madness, either superior to all passions or outside them through ecstasy or frenzy.\n\nSuch is the first and most indispensable preparation of the operator.\n\nHence, by a providential or fatal law, the magician can only exercise omnipotence in inverse proportion to his material interest; the alchemist makes so much the more gold as he is the more resigned to privations, and the more esteems that poverty which protects the secrets of the magnum opus.\n\nOnly the adept whose heart is passionless will dispose of the love and hate of those whom he would make instruments of his science.\n\nThe myth of Genesis is eternally true, and God permits the tree of knowledge to be approached only by those men who are sufficiently strong and self-denying not to covet its fruits: Ye therefore who seek in science a means to satisfy your passions, pause in this fatal way: you will find nothing but madness or death.\n\nThis is the meaning of the vulgar tradition that the devil ends sooner or later by strangling sorcerers.\n\nThe Magus must be impassible, sober and chaste, disinterested, impenetrable and inaccessible to any kind of prejudice or terror.\n\nHe must be without bodily defects and proof against all contradictions and all difficulties.\n\nThe first and most important of magical operations is the attainment of this rare pre-eminence."

