[content]
body = "We have observed previously that in this sense the planets are only signs; they have the influence which universal faith attributes because they are more truly the stars of the human mind than the orbs of heaven.\n\nThe sun, which Antique Magic always regarded as fixed, could be only a planet for the vulgar; hence it represents that day of rest in the week which we term Sunday without knowing why, the day of the sun among the ancients.\n\nThe seven magical planets correspond to the seven colours of the spectrum and the seven notes of the musical octave; they represent also the seven virtues and by contrast the seven vices of Christian ethics.\n\nThe seven sacraments correspond equally to this great universal septenary.\n\nBaptism, which consecrates the element of water, is in analogy with the Moon; ascetic Penance is under the auspices of Samael, the angel of Mars; Confirmation, which imparts the spirit of understanding and communicates to the true believer the gift of tongues, is under the auspices of Raphael, the angel of Mercury; the Eucharist substitutes sacramental realization of God made man for the empire of Jupiter; Marriage is consecrated by the angel Anael, the purifying genius of Venus; Extreme Unction is the safe-guard of the sick about to fall under the scythe of Saturn; and Orders, consecrating the priesthood of light, is marked more especially by the characters of the Sun.\n\nAlmost all these analogies were observed by the learned Dupuis, who thence concluded that all religions were false, instead of recognizing the sanctity and perpetuity of a single dogma, ever reproduced in the universal symbolism of successive religious forms.\n\nHe failed to understand the permanent revelation transmitted to human genius by the harmonies of Nature, and beheld only a catalogue of errors in this chain of speaking images and eternal truths.\n\nMagical works are also seven in number: (i) works of light and riches, under the auspices of the Sun; (2) works of divination and mystery, under the invocation of the Moon; (3) works of skill, science and eloquence, under the protection of Mercury; (4) works of wrath and chastisement, consecrated to Mars; (5) works of love, favoured by Venus; (6) works of ambition and intrigue, under the influence of Jupiter; (7) works of malediction and death, under the patronage of Saturn.\n\nIn theological symbolism, the Sun represents the Word of Truth; the Moon, religion itself; Mercury, the interpretation and science of mysteries; Mars, justice; Venus, mercy and love; Jupiter, the risen and glorious Saviour; Saturn, God the Father, or the Jehovah of Moses.\n\nIn the human body, the Sun is analogous to the heart, the Moon to the brain, Jupiter to the right hand, Saturn to the left, Mars to the left foot, Venus to the right, Mercury to the generative organs, whence an androgyne figure is sometimes attributed to this planet.\n\nIn the human face, the Sun governs the forehead, Jupiter the right and Saturn the left eye; the Moon rules between both at the root of the nose, the two alae of which are governed by Mars and Venus; finally, the influence of Mercury is exercised over mouth and chin.\n\nAmong the ancients these notions constituted the occult science of physiognomy, afterwards recovered imperfectly by Lavater.\n\nThe Magus who intends undertaking the works of light must operate on a Sunday, from midnight to eight in the morning, or from three in the afternoon to ten in the evening.\n\nHe should wear a purple vestment, with tiara and bracelets of gold."

