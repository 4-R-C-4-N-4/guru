[content]
body = "All the Kabalah and all Magic, as a fact, are divided between the cultus of the immolated and that of the emissary goat.\n\nWe must recognize therefore a Magic of the Sanctuary and that of the wilderness, the White and the Black Church, the priesthood of public assemblies and the Sanhedrim of the Sabbath.\n\nThe goat which is represented in our frontispiece bears upon its forehead the Sign of the Pentagram with one point in the ascendant, which is sufficient to distinguish it as a symbol of the light.\n\nMoreover, the sign of occultism is made with both hands, pointing upward to the white moon of Chesed, and downward to the black moon of Geburah.\n\nThis sign expresses the perfect concord between mercy and justice.\n\nOne of the arms is feminine and the other masculine, as in the androgyne of Khunrath, those attributes we have combined with those of our goat, since they are one and the same symbol.\n\nThe torch of intelligence burning between the horns is the magical light of universal equilibrium; it is also the type of the soul, exalted above matter, even while cleaving to matter, as the flame cleaves to the torch.\n\nThe monstrous head of the animal expresses horror of sin, for which the material agent, alone responsible, must alone and for ever bear the penalty, because the soul is impassible in its nature and can suffer only by materializing.\n\nThe caduceus, which, replaces the generative organ, represents eternal life; the scale-covered belly typifies water; the circle above it is the atmosphere, the feathers still higher up signify the volatile; lastly, humanity is depicted by the two breasts and the androgyne arms of this sphinx of the occult sciences.\n\nBehold the shadows of the infernal sanctuary dissipated!\n\nBehold the sphinx of mediaeval terrors unveiled and cast from his throne!\n\nQuomodo cedidisti, Lucifer!\n\nThe dread Baphomet henceforth, like all monstrous idols, enigmas of antique science and its dreams, is only an innocent and even pious hieroglyph.\n\nHow should man adore the beast, since he exercises a sovereign power over it?\n\nLet us affirm, for the honour of humanity, that it has never worshipped dogs and goats any more than lambs or pigeons.\n\nIn the hieroglyphic orders, why not a goat as much as a lamb?\n\nOn the sacred stones of Gnostic Christians of the Basilidean sect there are representations of Christ under the diverse figures of kabalistic animals - sometimes a bird, at others a lion, and again a serpent with the head of lion or bull; but in all cases He bears invariably the same attributes of light, even as our goat, which cannot be confounded with fabulous images of Satan, owing to the Sign of the Pentagram.\n\nLet us affirm categorically, to combat the remnants of Manichaeanism which are appearing sporadically among Christians, that as a superior personality and power Satan does not exist.\n\nHe is the personification of all errors, perversities and consequently of all weaknesses.\n\nIf God may be defined as He Who exists of necessity, may we not define His antagonist and enemy as necessarily he who does not exist at all?\n\nThe absolute affirmation of good implies an absolute negation of evil: so also in the light, shadow itself is luminous.\n\nThus, erring spirits are good to the extent of their participation in being and in truth.\n\nThere are no shadows without reflections, no nights without moon, the planet of morning and stars.\n\nIf hell be just, it is good.\n\nNo one has ever blasphemed God.\n\nThe insults and mockeries addressed to His disfigured images attain Him not.\n\nWe have named Manichaeanism, and it is by this monstrous heresy that we shall explain the aberrations of Black Magic."

