body = "Thus the universal tradition of the one religion was broken for a moment, darkness or doubt spread over the whole earth, and it seemed in the eyes of ignorance, that true catholicism, the universal revelation, had disappeared for a space.\n\nThe explanation of the book of St.\n\nJohn by the characters of the Kabalah will be an entirely new revelation, though foreseen by several distinguished Magi, one among whom, M.\n\nAugustin Chaho, thus expresses himself: “The poem of the Apocalypse presupposes in the young evangelist a complete system and traditions individually developed by himself.\n\nIt is written in the form of a vision, and weaves into a brilliant framework of poetry the whole erudition, the whole thought of African civilization.\n\nAn inspired bard, the author touches upon a series of ruling events; he draws in bold outlines the history of society from cataclysm to cataclysm, and even further still.\n\nThe truths which he reveals are prophecies brought from far and wide, of which he is the resounding echo.\n\nHe is the voice which cries, the voice which chants the harmonies of the desert and prepares paths for the light.\n\nHis speech peals forth with mastery and compels faith, for he carries among savage nations the oracles of IAO, and unveils Him Who is the First-Born of the Sun for the admiration of civilizations to come.\n\nThe theory of the four ages is found in the Apocalypse, as it is also in the books of Zoroaster and in the Bible.\n\nThe gradual reconstruction of primeval federations, of the reign of God among peoples emancipated from the yoke of tyrants and the bonds of error, are foretold clearly for the end of the fourth age, and the recurrence of the cataclysm, exhibited at first from afar, is portrayed in the fulness of time.\n\nThe description of the cataclysm and its duration; the new world emerging from the waves and spreading in all its beauty under heaven; the great serpent, bound for a time by an angel in the depths of the abyss; finally, the dawn of that age to come, prophesied by the Word, Who appeared to the apostle at the beginning of the poem: ‘His head and his hairs were white like wool, as white as snow, and his eyes were as a flame of fire; and his feet like unto fine brass, as if they burned in a furnace; and his voice as the sound of many waters.\n\nAnd he had in his right hand seven stars: and out of his mouth went a sharp two-edged sword: and his countenance was as the sun shineth in his strength.’ Such is Ormuz, Osiris, Chourien, the Lamb, the Christ, the Ancient of Days, the Man of the time and the river celebrated by Daniel.\n\nHe is the first and the last, Who was, Who must be, ALPHA and OMEGA, beginning and end.\n\nHe holds the key of mysteries in His hands; He opens the great abyss of central fire, where death sleeps beneath the canopy of darkness, where sleeps the great serpent awaiting the wakening of the ages.” The author connects this sublime allegory of St.\n\nJohn with that of Daniel, wherein the four forms of the sphinx are applied to the chief periods of history, where the Man-Sun, the Word-Light, consoles and instructs the seer.\n\n“The prophet Daniel beholds a sea tossed by the four winds of heaven, and beasts differing one from another come out of the depths of the ocean.\n\nThe empire of all things on earth was given them for a time, two times, and the dividing of time.\n\nThey were four who so came forth.\n\nThe first beast, symbol of the solar race of seers, came from the region of Africa, resembling a lion and having eagle's wings: the heart of a man was given it."

