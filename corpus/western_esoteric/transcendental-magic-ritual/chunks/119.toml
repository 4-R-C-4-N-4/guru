body = "In the schools of seers the terrestrial globe was represented by an egg of pasteboard or painted wood, and when young children were asked, ‘What is this egg?’ they answered, ‘It is the earth.’ Those older children, the barbarians, hearing this, repeated, after the little children of the seers: ‘The world is an egg.’ But they understood thereby the physical, material world, while the seers meant the geographical, ideal, image-world, created by mind and the logos.\n\nAs a fact, the priests of Egypt represented mind, intelligence, Kneph, with an egg placed upon his lips, to express clearly that the egg was here only a form of comparison, an image, a mode of speech.\n\nChoumountou, the philosopher of the Ezour-Veda, explains after the same manner to the fanatic Biache what must be understood by the golden egg of Brahma.” We must not despair altogether of a period which still concerns itself with these serious and reasonable researches; we have therefore cited these pages of M.\n\nChaho with great mental satisfaction and profound sympathy.\n\nHere is no longer the negative and desolating criticism of Dupuis and Volney, but an effort towards one faith and one worship connecting all the future with all the past; it is an apology for all great men accused falsely of superstition and idolatry; it, is, finally, the justification of God Himself, that Sun of intelligences Who is never veiled for upright souls and pure hearts.\n\n“Great and pre-eminent is the seer, the initiate, the elect of Nature and of supreme reason,” cries the author once more, in concluding what we have just cited.\n\n“His alone is that faculty of imitation which is the principle of his perfection, while its inspirations, swift as a lightning flash, direct creations and discoveries.\n\nHis alone is a perfect Word of rightness, propriety, flexibility, wealth, creating harmony of thought by physical reaction-of thought, whereof the perceptions, as yet independent of language, ever reflect Nature exactly reproduced in its impressions, well judged and well expressed in its correspondences.\n\nHis alone are light, science, truth, because imagination, confined to its passive secondary part, never governs reason, the natural logic which results from the comparison of ideas; which come into being, extend in the same proportion as his needs, and which the circle of his knowledge enlarges thus by degrees without intermixture of false judgements and errors.\n\nHis alone is a light infinitely progressive, because the rapid increase of population, after terrestrial renovations, establishes in a few centuries a new society in all the imaginable moral and political correspondences of its destiny.\n\nWe might add, in fine, that his alone is absolute light.\n\nThe man of our time is immutable in himself; he changes no more than Nature, in which he is rooted.\n\nThe social conditions which surround him alone determine the degree of his perfection, of which the bounds are virtue, holiness of man and his happiness in the law.\n\n“ After such elucidations, will anyone ask the utility of the occult sciences?\n\nWill they treat with the disdain of mysticism and illuminism these living mathematics, these proportions of ideas and forms, this revelation permanent in the universal reason, this emancipation of mind, this immutable basis provided for faith, this omnipotence revealed to will?\n\nChildren in search of illusions, are you disappointed because we offer you marvels?\n\nOnce a man said to us, “Raise up the devil, and I will believe in you.” We answered, “You ask too little; we will not make the the devil appear but rather vanish from the whole world: we will chase him from your dreams!” The devil is ignorance, darkness, chaotic thought, deformity.\n\nAwake, sleeper of the Middle Ages!\n\nSee you not that it is day?\n\nSee you not the light of God filling all Nature?"

