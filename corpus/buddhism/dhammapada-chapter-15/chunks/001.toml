body = "p.\n\n53 CHAPTER XV.\n\nHAPPINESS.\n\n197.\n\nLet us live happily then, not hating those who hate us!\n\namong men who hate us let us dwell free from hatred!\n\n198.\n\nLet us live happily then, free from ailments among the ailing!\n\namong men who are ailing let us dwell free from ailments!\n\n199.\n\nLet us live happily then, free from greed among the greedy!\n\namong men who are greedy let us dwell free from greed!\n\n200.\n\nLet us live happily then, though we call nothing our own!\n\nWe shall be like the bright gods, feeding on happiness!\n\n201.\n\nVictory breeds hatred, for the conquered is unhappy.\n\nHe who has given up both victory and defeat, he, the contented, is happy.\n\n[198.\n\nThe ailment here meant is moral rather than physical.\n\nCf.\n\nMahâbh.\n\nXII, 9924, sa m pra s ânto nirâmaya h ; 9925, yo 'sau prâ n ântiko rogas tâ m t ri sh n â m tya g ata h sukham.\n\n200.\n\nThe words placed in the mouth of the king of Videha, while his residence Mithilâ was in flames, are curiously like our verse; cf.\n\nMahâbh.\n\nXII, 9917, Susukha m vata g îvâmi yasya me nâsti ki ñk ana, Mithilâyâm pradîptâyâ m na me dahyati ki ñk ana.\n\n'I live happily, indeed, for I have nothing; while Mithilâ is in flames, nothing of mine is burning.' Cf.\n\nMuir, Religious sentiments, p.\n\n106.\n\nThe âbhassara, i.e.\n\nâbhâsvara, 'the bright gods,' are frequently mentioned.\n\nCf.\n\nBurnouf, Introd.\n\np.\n\n611.\n\n201.\n\nThis verse is ascribed to Buddha, when he heard of the defeat of A g âta s atru by Prasena g it.\n\nIt exists in the Northern or Sanskrit and in the Southern or Pâli texts, i.e.\n\nin the Avadâna- s ataka, in the Sa m yutta-nikâya.\n\nSee Feer, Comptes Rendus, 1871, p.\n\n44.\n\nand Journal As.\n\n1880, p.\n\n509.\n\nIn the Avadâna- s ataka, the Sanskrit version is-- G ayo vairam prasavati, du h kha m sete parâ g ita h Upa s ânta h sukha m s ete hitvâ g ayaparâ g ayam.] p.\n\n54 202.\n\nThere is no fire like passion; there is no losing throw like hatred; there is no pain like this body; there is no happiness higher than rest.\n\n203.\n\nHunger is the worst of diseases, the body the greatest of pains; if one knows this truly, that is Nirvâ n a, the highest happiness.\n\n[202.\n\nI take kali in the sense of an unlucky die which makes a player lose his game.\n\nA real simile seems wanted here, as in verse 251 , where, for the same reason, I translate graha by 'shark,' not by 'captivitas,' as Dr.\n\nFausböll proposes.\n\nThe same scholar translates kali in our verse by 'peccatum.' If there is any objection to translating kali in Pâli by 'unlucky die,' I should still prefer to take it in the sense of the age of depravity, or the demon of depravity.\n\nTo judge from Abhidhânappadîpikâ, 1106, kali was used for parâ g aya, i.e."

