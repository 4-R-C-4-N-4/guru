body = "loss at game, a losing throw, and occurs in that sense again in verse 252 .\n\nThe Chinese translation has, 'there is no distress (poison) worse than hate.' A similar verse occurs Mahâbh.\n\nS ântip.\n\n175, v.\n\n35.\n\n'Body' for khandha is a free translation, but it is difficult to find any other rendering.\n\nThe Chinese translation also has 'body.' According to the Buddhists each sentient being consists of five khandhas (skandha), or aggregates, the organized body (rûpakhandha) with its four internal capacities of sensation (vedanâ), perception (sa ñgñ â), conception (sa m skâra), knowledge (vi gñ âna).\n\nSee Burnouf, Introd.\n\npp.\n\n589, 634; Lotus, p.\n\n335.\n\n203.\n\nSa m skâra is the fourth of the five khandhas, but the commentator takes it here, as well as in verse 255 , for the five khandhas together, in which case we can only translate it by 'body.' See also verse 278 .\n\nChilders proposes 'organic life'.\n\n(Notes on Dhammapada, p.\n\n1).\n\nThere is, however, another sa m skâra, that which follows inimediately upon avidyâ, 'ignorance,' as the second of the nidânas, or 'causes of existence,' and this too might be called the greatest pain, considering that it is the cause of birth, which is the cause of all pain.\n\nSa m skâra seems sometimes to have a different and less techninal meaning, being used in the sense of conceptions, plans, desires, as, for instance, in verse 368 , where sa n khârâna m khayam is used much like ta m hâkhaya.\n\nAgain, in his comment on verse 75, Buddhaghosa says, upadhiviveko sa n khârasa n ga n ika m vinodeti; and again, upadhiviveko k a nirupadhînâ m puggalâna m visa n khâragatânâm.\n\nFor a similar sentiment, see Stanislas Julien, Les Avadânas, vol.\n\ni.\n\np.\n\n40, 'Le corps est la plus grande source de souffrance,' &c.\n\nI should say that the khandhas in verse 202 and the sa n khâras in verse 203 are nearly, if not quite, synonymous.\n\nI should prefer to read g iga kkh â-paramâ as a compound.\n\nG iga kkh â, or as it is written in one MS., diga kkh â (Sk.\n\ng ighatsâ), means not only 'hunger,' but 'appetite; desire.'] p.\n\n55 204.\n\nHealth is the greatest of gifts, contentedness the best riches; trust is the best of relationships, Nirvâ n a the highest happiness.\n\n205.\n\nHe who has tasted the sweetness of solitude and tranquillity, is free from fear and free from sin, while he tastes the sweetness of drinking in the law.\n\n206.\n\nThe sight of the elect (Arya) is good, to live with them is always happiness; if a man does not see fools, he will be truly happy.\n\n207.\n\nHe who walks in the company of fools suffers a long way; company with fools, as with an enemy, is always painful; company with the wise is pleasure, like meeting with kinsfolk.\n\n208.\n\nTherefore, one ought to follow the wise, the intelligent, the learned, the much enduring, the dutiful, the elect; one ought to follow a good and wise man, as the moon follows the path of the stars.\n\n[204."

