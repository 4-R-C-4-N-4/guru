body = "(4) Arhat, the venerable, the perfect, who has reached the highest stage that can be reached, and from which Nirvâ n a is perceived (sukkhavipassanâ, Lotus, p.\n\n849).\n\nSee Hardy, Eastern Monachism, p.\n\n280; Burnouf, Introduction, p.\n\n209; Köppen, p.\n\n398; D'Alwis, Attanugaluvansa, p.\n\ncxxiv; Feer, Sutra en 42 articles, p.\n\n6.] Next: Chapter XIV.\n\nThe Buddha (The Awakened)."

