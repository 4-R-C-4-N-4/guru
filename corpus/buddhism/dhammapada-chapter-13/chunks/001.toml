body = "p.\n\n47 CHAPTER XIII.\n\nTHE WORLD.\n\n167.\n\nDo not follow the evil law!\n\nDo not live on in thoughtlessness!\n\nDo not follow false doctrine!\n\nBe not a friend of the world.\n\n168.\n\nRouse thyself!\n\ndo not be idle!\n\nFollow the law of virtue!\n\nThe virtuous rests in bliss in this world and in the next.\n\n169.\n\nFollow the law of virtue; do not follow that of sin.\n\nThe virtuous rests in bliss in this world and in the next.\n\n170.\n\nLook upon the world as a bubble, look upon it as a mirage: the king of death does not see him who thus looks down upon the world.\n\n171.\n\nCome, look at this glittering world, like unto a royal chariot; the foolish are immersed in it, but the wise do not touch it.\n\n172.\n\nHe who formerly was reckless and afterwards became sober, brightens up this world, like the moon when freed from clouds.\n\n173.\n\nHe whose evil deeds are covered by good deeds, brightens up this world, like the moon when freed from clouds.\n\n174.\n\nThis world is dark, few only can see here; a few only go to heaven, like birds escaped from the net.\n\n175.\n\nThe swans go on the path of the sun, they go through the ether by means of their miraculous [168, 169.\n\nSee Rhys Davids, Buddhism, p.\n\n65.\n\n170.\n\nSee Suttanipâta, v.\n\n1118 .\n\n175.\n\nHa m sa may be meant for the bird, whether flamingo, or swan, or ibis (see Hardy, Manual, p.\n\n17), but it may also, I believe, be taken in the sense of saint.\n\nAs to iddhi, 'magical power,' i.e.\n\nri ddhi, see Burnouf, Lotus, p.\n\n310; Spence Hardy, Manual, pp.\n\n498, 504; Legends, pp.\n\n55, 177; and note to verse 254 .] p.\n\n48 power; the wise are led out of this world, when they have conquered Mâra and his train.\n\n176.\n\nIf a man has transgressed one law, and speaks lies, and scoffs at another world, there is no evil he will not do.\n\n177.\n\nThe uncharitable do not go to the world of the gods; fools only do not praise liberality; a wise man rejoices in liberality, and through it becomes blessed in the other world.\n\n178.\n\nBetter than sovereignty over the earth, better than going to heaven, better than lordship over all worlds, is the reward of the first step in holiness.\n\n[178.\n\nSotâpatti, the technical term for the first step in thr path that leads to Nirvâ n a.\n\nThere are four such steps, or stages, and on entering each, a man receives a new title:-- (1) The S rotaâpanna, lit.\n\nhe who has got into the stream.\n\nA man may have seven more births before he reaches the other shore, i.e.\n\nNirvâ n a.\n\n(2) Sak ri dâgâmin, lit.\n\nhe who comes back once, so called because, after having entered this stage, a man is born only once more among men or gods.\n\nChilders shows that this involves really two more births, one in the deva world, the other in the world of men: Burnouf says the same, Introduction, p.\n\n293.\n\n(3) Anâgâmin, lit.\n\nhe who does not come back, so called because, after this stage, a man cannot be born again in a lower world; but can only be born into a Brahman world, before he reaches Nirvâ n a."

