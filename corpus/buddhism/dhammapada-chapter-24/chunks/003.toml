[content]
body = "Pleasures destroy the foolish, if they look not for the other shore; the foolish by his thirst for pleasures destroys himself, as if he were his own enemy.\n\n[352.\n\nAs to nirutti, and its technical meaning among the Buddhists, see Burnouf, Lotus, p.\n\n841.\n\nFausböll translates 'niruttis vocabulorum peritus,' which may be right, if we take nirutti in the sense of the language of the Scriptures.\n\nSee note to verse 363 .\n\nCould not sannipâta mean sa m hitâ or sannikarsha?\n\nSannipâta occurs in the S âkala-prâti s âkhya, but with a different meaning.\n\n353.\n\nCf.\n\nSuttanipâta, v.\n\n210 .\n\n354.\n\nThe dhammadâna, or 'gift of the law,' is the technical term for instruction in the Buddhist religion.\n\nSee Buddhaghosha's Parables, p.\n\n160, where the story of the Sakkadevarâ g a is told, and where a free rendering of our verse is given.] p.\n\n84 356.\n\nThe fields are damaged by weeds, mankind is damaged by passion: therefore a gift bestowed on the passionless brings great reward.\n\n357.\n\nThe fields are damaged by weeds, mankind is damaged by hatred: therefore a gift bestowed on those who do not hate brings great reward.\n\n358.\n\nThe fields are damaged by weeds, mankind is damaged by vanity: therefore a gift bestowed on those who are free from vanity brings great reward.\n\n359.\n\nThe fields are damaged by weeds, mankind is damaged by lust: therefore a gift bestowed on those who are free from lust brings great reward.\n\nNext: Chapter XXV.\n\nThe Bhikshu (Mendicant)."

