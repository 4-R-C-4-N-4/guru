body = "p.\n\n80 CHAPTER XXIV.\n\nTHIRST.\n\n334.\n\nThe thirst of a thoughtless man grows like a creeper; he runs from life to life, like a monkey seeking fruit in the forest.\n\n335.\n\nWhomsoever this fierce thirst overcomes, full of poison, in this world, his sufferings increase like the abounding Bîra n a grass.\n\n336.\n\nHe who overcomes this fierce thirst, difficult to be conquered in this world, sufferings fall off from him, like water-drops from a lotus leaf.\n\n337.\n\nThis salutary word I tell you, 'Do ye, as many as are here assembled, dig up the root of thirst, as he who wants the sweet-scented U s îra root must dig up the Bîra n a grass, that Mâra (the tempter) may not crush you again and again, as the stream crushes the reeds.' 338.\n\nAs a tree, even though it has been cut down, is firm so long as its root is safe, and grows again, thus, unless the feeders of thirst are destroyed, the pain (of life) will return again and again.\n\n339.\n\nHe whose thirst running towards pleasure is exceeding strong in the thirty-six channels, the [334.\n\nThis is explained by a story in the Chinese translation.\n\nBeal, Dhammapada, p.\n\n148.\n\n335.\n\nBîra n a grass is the Andropogon muricatum, and the scented root of it is called U s îra (cf.\n\nverse 337).\n\n338.\n\nOn Anusaya, i.e.\n\nAnu s aya (Anlage), see Wassiljew, Der Buddhismus, p.\n\n240 seq.\n\n339.\n\nThe thirty-six channels, or passions, which are divided by the commentator into eighteen external and eighteen internal, are explained by Burnouf (Lotus, p.\n\n649), from a gloss of the G ina-ala n kâra 'L'indication précise des affections dont un Buddha acte indépendant, affections qui sont au nombre de dix-huit, nous est fourni par la glose d'un livre appartenant aux Buddhistes de Ceylan,' &c.\n\nSubhûti gives the right reading as manâpassavanâ; cf.\n\nChilders, Notes, p.\n\n12.\n\nVâhâ, which Dr.\n\nFausböll translates by 'equi,' may be vahâ, 'undae.' Cf.\n\nSuttanipâta, v.\n\n1034 .] p.\n\n81 waves will carry away that misguided man, viz.\n\nhis desires which are set on passion.\n\n340.\n\nThe channels run everywhere, the creeper (of passion) stands sprouting; if you see the creeper springing up, cut its root by means of knowledge.\n\n341.\n\nA creature's pleasures are extravagant and luxurious; sunk in lust and looking for pleasure, men undergo (again and again) birth and decay.\n\n342.\n\nMen, driven on by thirst, run about like a snared hare; held in fetters and bonds, they undergo pain for a long time, again and again.\n\n343.\n\nMen, driven on by thirst, run about like a snared hare; let therefore the mendicant drive out thirst, by striving after passionlessness for himself.\n\n344.\n\nHe who having got rid of the forest (of lust) (i.e.\n\nafter having reached Nirvâ n a) gives himself over to forest-life (i.e.\n\nto lust), and who, when removed from the forest (i.e.\n\nfrom lust), runs to the forest (i.e.\n\nto lust), look at that man!\n\nthough free, he runs into bondage.\n\n[344."

