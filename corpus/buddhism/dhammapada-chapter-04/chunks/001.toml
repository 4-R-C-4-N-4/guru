body = "p.\n\n16 CHAPTER IV.\n\nFLOWERS .\n\n44.\n\nWho shall overcome this earth, and the world of Yama (the lord of the departed), and the world of the gods?\n\nWho shall find out the plainly shown path of virtue, as a clever man finds out the (right) flower?\n\n45.\n\nThe disciple will overcome the earth, and the world of Yama, and the world of the gods.\n\nThe disciple will find out the plainly shown path of virtue, as a clever man finds out the (right) flower.\n\n[1.\n\nSee Beal, Dhammapada, p.\n\n75.\n\n44, 45.\n\nIf I differ from the translation of Fausböll and Weber, it is because the commentary takes the two verbs, vi g essati and pa k essati, to mean in the end the same thing, i.e.\n\nsa kkh i-karissati, 'he will perceive.' I have not ventured to take vi g essate for vi g anissati, though it should be remembered that the overcoming of the earth and of the worlds below and above, as here alluded to, is meant to be achieved by means of knowledge.\n\nPa k essati, 'he will gather' (cf.\n\nvi- k i, Indische Sprüche, 4560), means also, like 'to gather' in English, 'he will perceive or understand,' and the dhammapada, or 'path of virtue,' is distinctly explained by Buddhaghosa as consisting of the thirty-seven states or stations which lead to Bodhi.\n\n(See Burnouf, Lotus, p.\n\n430; Hardy, Manual, p.\n\n497.) Dhammapada might, no doubt, mean also 'a law-verse,' and sudesita, 'well taught,' and this double meaning may be intentional here as elsewhere.\n\nBuddha himself is called Mârga-dar s aka and Mârga-de s ika (cf.\n\nLal.\n\nVist.\n\np.\n\n551).\n\nThere is a curions similarity between these verses and verses 6540-41, and 9939 of the S ânti-parva: Pushpâ n îva vi k invantam anyatragatamanasam, Anavâpteshu kâmeshu m ri tyur abhyeti mânavam.\n\n'Death approaches man like one who is gathering flowers, and whose mind is turned elsewhere, before his desires have been fulfilled.' Supta m vyâghra m mahaugho vâ m ri tyur âdâya ga kkh ati, Sa ñk invânakam evaina m kâmânâm avit ri ptikam.\n\n'As a stream (carries off) a sleeping tiger, death carries off this man who is gathering flowers, and who is not satiated in his pleasures.' This last verse, particularly, seems to me clearly a translation from Pâli, and the kam of sa ñk invânakam looks as if put in metri causâ.] p.\n\n17 46.\n\nHe who knows that this body is like froth, and has learnt that it is as unsubstantial as a mirage, will break the flower-pointed arrow of Mâra, and never see the king of death.\n\n47.\n\nDeath carries off a man who is gathering flowers and whose mind is distracted, as a flood carries off a sleeping village.\n\n48.\n\nDeath subdues a man who is gathering flowers, and whose mind is distracted, before he is satiated in his pleasures.\n\n49.\n\nAs the bee collects nectar and departs without injuring the flower, or its colour or scent, so let a sage dwell in his village.\n\n50.\n\nNot the perversities of others, not their sins [46."

