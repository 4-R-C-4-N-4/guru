body = "The flower-arrows of Mâra, the tempter, are borrowed from Kâma, the Hindu god of love.\n\nFor a similar expression see Lalita-vistara, ed.\n\nCalc.\n\np.\n\n40, l.\n\n20, mâyâmarî k isad ri sâ vidyutphenopamâ s k apalâ h .\n\nIt is on account of this parallel passage that I prefer to translate marî k i by 'mirage,' and not by 'sunbeam,' as Fausböll, or by 'solar atom,' as Weber proposes.\n\nThe expression, 'he will never see the king of death,' is supposed to mean Arhatship by Childers, s.v.\n\nnibbâna, p.\n\n270.\n\n47.\n\nSee Thiessen, Die Legende von Kisâgotamî, p.\n\n9.\n\n48.\n\nAntaka, 'death,' is given as an explanation of Mâra in the Amarakosha and Abhidhânappadîpika (cf.\n\nFausböll, p.\n\n210).\n\n49.\n\nSee Beal, Catena, p.\n\n159, where vv.\n\n49 and 50 are ascribed to Wessabhu, i.e.\n\nVi s vabhû.\n\nSee also Der Weise und der Thor, p.\n\n134.] p.\n\n18 of commission or omission, but his own misdeeds and negligences should a sage take notice of.\n\n51.\n\nLike a beautiful flower, full of colour, but without scent, are the fine but fruitless words of him who does not act accordingly.\n\n52.\n\nBut, like a beautiful flower, full of colour and full of scent, are the fine and fruitful words of him who acts accordingly.\n\n53.\n\nAs many kinds of wreaths can be made from a heap of flowers, so many good things may be achieved by a mortal when once he is born.\n\n54.\n\nThe scent of flowers does not travel against the wind, nor (that of) sandal-wood, or of Tagara and Mallikâ flowers; but the odour of good people travels even against the wind; a good man pervades every place.\n\n55.\n\nSandal-wood or Tagara, a lotus-flower, or a Vassikî, among these sorts of perfumes, the perfume of virtue is unsurpassed.\n\n56.\n\nMean is the scent that comes from Tagara and sandal-wood;--the perfume of those who possess virtue rises up to the gods as the highest.\n\n57.\n\nOf the people who possess these virtues, who live without thoughtlessness, and who are emancipated [51.\n\nSt.\n\nMatthew xxiii.\n\n3 , 'For they say, and do not.' 54.\n\nTagara, a plant from which a scented powder is made.\n\nMallaka or mallikâ, according to Benfey, is an oil vessel.\n\nHence tagaramallikâ was supposed to mean a bottle holding aromatic powder, or oil made of the Tagara.\n\nMallikâ, however, is given by Dr.\n\nEitel (Handbook of Chinese Buddhism) as the name of a flower now called Casturi (musk) on account of its rich odour, and Dr.\n\nMorris informs me that he has found mallikâ in Pâli as a name of jasmine.\n\nSee also Childers, s.v.; Notes, p.\n\n6 ; and Beal, Dhammapada, p.\n\n76.] p.\n\n19 through true knowledge, Mâra, the tempter, never finds the way.\n\n58., 59.\n\nAs on a heap of rubbish cast upon the highway the lily will grow full of sweet perfume and delight, thus the disciple of the truly enlightened Buddha shines forth by his knowledge among those who are like rubbish, among the people that walk in darkness.\n\n[58, 59.\n\nCf."

