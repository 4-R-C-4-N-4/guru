body = "p.\n\n74 CHAPTER XXII.\n\nTHE DOWNWARD COURSE.\n\n306.\n\nHe who says what is not, goes to hell; he also who, having done a thing, says I have not done it.\n\nAfter death both are equal, they are men with evil deeds in the next world.\n\n307.\n\nMany men whose shoulders are covered with the yellow gown are ill-conditioned and unrestrained; such evil-doers by their evil deeds go to hell.\n\n308.\n\nBetter it would be to swallow a heated iron ball, like flaring fire, than that a bad unrestrained fellow should live on the charity of the land.\n\n309.\n\nFour things does a wreckless man gain who covets his neighbour's wife,--a bad reputation, an uncomfortable bed, thirdly, punishment, and lastly, hell.\n\n[306.\n\nI translate niraya, 'the exit, the downward course, the evil path,' by 'hell,' because the meaning assigned to that ancient mythological name by Christian writers comes so near to the Buddhist idea of niraya, that it is difficult not to believe in some actual contact between these two streams of thought.\n\nSee also Mahâbh.\n\nXII, 7176.\n\nCf.\n\nG âtaka, vol.\n\nii.\n\np.\n\n416; Suttanipâta, v.\n\n660 .\n\n307, 308.\n\nThese two verses are said to be taken frorn the Vinaya-pi t aka I, 4, 1; D'Alwis, Nirvâ n a; p.\n\n29.\n\n308.\n\nThe charity of the land, i.e.\n\nthe alms given, from a sense of religious duty, to every mendicant that asks for it.\n\n309, 310.\n\nThe four things rnentioned in verse 309 seem to be repeated in verse 310.\n\nTherefore, apu ññ alâbha, 'bad fame,' is the same in both: gati pâpikâ must be niraya; da nd a must be nindâ, and râtî thokikâ explains the anikâmaseyya m .\n\nBuddhaghosa takes the same view of the meaning of anikâmaseyya, i.e.\n\nyathâ i kkh ati eva m seyyam alabhitvâ, ani kkh ita m parittakam eva kâla m seyya m labhati, 'not obtaining the rest as he wishes it, he obtains it, as he does not wish it, for a short time only.'] p.\n\n75 310.\n\nThere is bad reputation, and the evil way (to hell), there is the short pleasure of the frightened in the arms of the frightened, and the king imposes heavy punishment; therefore let no man think of his neighbour's wife.\n\n311.\n\nAs a grass-blade, if badly grasped, cuts the arm, badly-practised asceticism leads to hell.\n\n312.\n\nAn act carelessly performed, a broken vow, and hesitating obedience to discipline, all this brings no great reward.\n\n313.\n\nIf anything is to be done, let a man do it, let him attack it vigorously!\n\nA careless pilgrim only scatters the dust of his passions more widely.\n\n314.\n\nAn evil deed is better left undone, for a man repents of it afterwards; a good deed is better done, for having done it, one does not repent.\n\n315.\n\nLike a well-guarded frontier fort, with defences within and without, so let a man guard himself.\n\nNot a moment should escape, for they who allow the right moment to pass, suffer pain when they are in hell.\n\n316.\n\nThey who are ashamed of what they ought not to be ashamed of, and are not ashamed of what they ought to be ashamed of, such men, embracing false doctrines enter the evil path.\n\n317."

