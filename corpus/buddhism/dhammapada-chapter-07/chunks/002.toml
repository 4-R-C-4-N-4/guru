[content]
body = "Without the hints given by the commentator, we should probably take the three similes of this verse in their natural sense, as illustrating the imperturbable state of an Arahanta, or venerable person.\n\nThe earth is always represented as an emblem of patience; the bolt of Indra, if taken in its technical sense, as the bolt of a gate, might likewise suggest the idea of firmness; while the lake is a constant representative of serenity and purity.\n\nThe commentator, however, suggests that what is meant is, that the earth, though flowers are cast on it, does not feel pleasure, nor the bolt of Indra displeasure, although less savoury things are thrown upon it; and that in like manner a wise person is indifferent to honour and dishonour.\n\n96.\n\nThat this very natural threefold division, thought, word, and deed, the trividha-dvâra or the three doors of the Buddhists (Hardy, Manual, p.\n\n494), was not peculiar to the Buddhists or unknown to the Brahmans, has been proved against Dr.\n\nWeber by Professor Köppen in his 'Religion des Buddha,' I, p.\n\n445.\n\nHe particularly called attention to Manu XII, 4-8; and he might have added Mahâbh.\n\nXII, 4059, 6512, 6549, 6554; XIII, 5677, &c.\n\nDr.\n\nWeber has himself afterwards brought forward a passage from the Atharva-veda, VI, 96, 3 (ya k k akshushâ manasâ ya k k a vâ k â upârima), which, however, has a different meaning.\n\nA better one was quoted by him from the Taitt.\n\nAr.\n\nX, 1, 12 (yan me manasâ, vâ k â, karma n â vâ dushk ri ta m k ri tam).\n\nSimilar expressions have been shown to exist in the Zend-avesta, and among the Manichæans (Lassen, Indische Alterthumskunde, III, p.\n\n414; see also Boehtlingk's Dictionary, s.v.\n\nkâya, and Childers, s.v.\n\nkâyo).\n\nThere was no ground, therefore, for supposing that this formula had found its way into the Christian liturgy from Persia, for, as Professor Cowell remarks (Journal of Philology, vol.\n\nvii, p.\n\n215), Greek writers, such as Plato, employ very similar expressions, e.g.\n\nProtag.\n\np.\n\n348, 30, {Greek: pròs apan ergon kaì lógon kaì dianóhma }.\n\nIn fact, the opposition between words and deeds occurs in almost every writer, from Homer downwards; and the further distinction between thoughts and words is clearly implied even in such expressions as, 'they say in their heart.' That the idea of sin committed by thought was not a new idea, even to the Jews, may be seen from Prov.\n\nxxiv.\n\n9 , 'the thought of foolishness is sin.' In the Âpastamba-sûtras, lately edited by Professor Bühler, we find the expression, atho yatki ñk a manasâ vâ k â k akshushâ vâ sa n kalpayan dhyâyaty âhâbhivipa s yati vâ tathaiva tad bhavatîtyupadi s anti, 'they say that whatever a Brahman intending with his mind, voice, or eye, thinks, says, or looks, that will be.' This is clearly a very different division, and it is the same which is intended in the passage from the Atharva-veda, quoted above."

