body = "p.\n\n27 CHAPTER VII.\n\nTHE VENERABLE (ARHAT).\n\n90.\n\nThere is no suffering for him who has finished his journey, and abandoned grief, who has freed himself on all sides, and thrown off all fetters.\n\n91.\n\nThey depart with their thoughts well-collected, they are not happy in their abode; like swans who have left their lake, they leave their house and home.\n\n92.\n\nMen who have no riches, who live on recognised food, who have perceived void and unconditioned freedom (Nirvâ n a), their path is difficult to understand, like that of birds in the air.\n\n[91.\n\nSatîmanto, Sanskrit sm ri manta h , 'possessed of memory,' but here used in the technical sense of sati, the first of the Bodhya n gas.\n\nSee Burnouf, Introduction, p.\n\n797.\n\nClough translates it by 'intense thought,' and this is the original meaning of smar, even in Sanskrit.\n\nSee Lectures on the Science of Language, vol, ii.\n\np.\n\n332.\n\nUyyu ñg anti, which Buddhaghosa explains by 'they exert themselves,' seems to me to signify in this place 'they depart,' i.e.\n\nthey leave their family, and embrace an ascetic life.\n\nSee note to verse 235 .\n\nSee also Rhys Davids, Mahâparinibbâna-sutta, Sacred Books of the East, vol.\n\nxi.\n\np.\n\n22 .\n\n92.\n\nSu ññ ato and animitto are adjectives belonging to vimokho, one of the many names of Nirvâ n a, or, according to Childers, s.v.\n\nnibbâna, p, 270, Arhatship; see Burnouf, Introduction, pp.\n\n442, 462, on s ûnya.\n\nThe Sanskrit expression s ûnyatânimittâpra n ihitam occurs in L'enfant egaré, 5 a, l.\n\n4.\n\nNimitta is cause in the most general sense, i.e, what causes existence.\n\nThe commentator explains it chiefly in a moral sense: Râgâdinimittâbhâvena animitta m , tehi k a vimuttan ti animitto vimokho, i.e.\n\nowing to the absence of passion and other causes, without causation; because freed from these causes, therefore it is called freedom without causation.\n\nSee Childers, Pâli Dictionary, p.\n\n270, col.\n\n2, line 1.\n\nThe simile is intended to compare the ways of those who have obtained spiritual freedom to the flight of birds, it being difficult to understand how the birds move on without putting their feet on anything.\n\nThis, at least, is the explanation of the commentator; The same metaphor occurs Mahâbh.\n\nXII, 6763.\n\nChilders translates, 'leaving no more trace of existence than a bird in the air.'] p.\n\n28 93.\n\nHe whose appetites are stilled, who is not absorbed in enjoyment, who has perceived void and unconditioned freedom (Nirvâ n a), his path is difficult to understand, like that of birds in the air.\n\n94.\n\nThe gods even envy him whose senses, like horses well broken in by the driver, have been subdued, who is free from pride, and free from appetites.\n\n95.\n\nSuch a one who does his duty is tolerant like the earth, like Indra's bolt; he is like a lake without mud; no new births are in store for him.\n\n96.\n\nHis thought is quiet, quiet are his word and deed, when he has obtained freedom by true knowledge, when he has thus become a quiet man.\n\n[95."

