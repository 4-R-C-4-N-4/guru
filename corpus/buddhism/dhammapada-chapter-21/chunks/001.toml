body = "p.\n\n70 CHAPTER XXI.\n\nMISCELLANEOUS.\n\n290.\n\nIf by leaving a small pleasure one sees a great pleasure, let a wise man leave the small pleasure, and look to the great.\n\n291.\n\nHe who, by causing pain to others, wishes to obtain pleasure for himself, he, entangled in the bonds of hatred, will never be free from hatred.\n\n292.\n\nWhat ought to be done is neglected, what ought not to be done is done; the desires of unruly, thoughtless people are always increasing.\n\n293.\n\nBut they whose whole watchfulness is always directed to their body, who do not follow what ought not to be done, and who steadfastly do what ought to be done, the desires of such watchful and wise people will come to an end.\n\n294.\n\nA true Brâhma n a goes scatheless, though he have killed father and mother, and two valiant kings, though he has destroyed a kingdom with all its subjects.\n\n295.\n\nA true Brâhma n a goes scatheless, though he have killed father and mother, and two holy kings, and an eminent man besides.\n\n[292.\n\nCf.\n\nBeal, Catena, p.\n\n264.\n\n294, 295.\n\nThese two verses are either meant to show that a truly holy man who, by accident, commits all these crimes is guiltless, or they refer to some particular event in Buddha's history.\n\nThe commentator is so startled that he explains them allegorically.\n\nMr.\n\nD'Alwis is very indignant that I should have supposed Buddha capable of pardoning patricide.\n\n'Can it be believed,' he writes, 'that a Teacher, who held life, even the life of the minutest insect, nay, even a living tree, in such high estimation as to prevent its wanton destruction, has declared that the murder of a Brâhma n a, to whom he accorded reverence, along with his own Sangha, was blameless?' D'Alwis, Nirvâ n a, p.\n\n88.\n\nThough something might be said in reply, considering the antecedents of king A g âta s atru, the patron of Buddha, and stories such as that quoted by the commentator on the Dhammapada (Beal, l.c.\n\np.\n\n150), or in Der Weise und der Thor, p.\n\n306, still these two verses are startling, and I am not aware that Buddha has himself drawn the conclusion, which has been drawn by others, viz.\n\nthat those who have reached the highest Sambodhi, and are in fact no longer themselves, are outside the domain of good and bad, and beyond the reach of guilt.\n\nVerses like 39 and 412 admit of a different explanation.\n\nStill our verses being miscellaneous extracts, might possibly have been taken from a work in which such an opinion was advanced, and I find that Mr.\n\nChilders, no mean admirer of Buddha, was not shocked by my explanation.\n\n'In my judgment,' he says, 'this verse is intended to express in a forcible manner the Buddhist doctrine that the Arhat cannot commit a serious sin.' However, we have met before wilh far-fetched puns in these verses, and it is not impossible that the native commentators were right after all in seeing some puns or riddles in this verse.\n\nD'Alwis, following the commentary, explains mother as lust, father as pride, the two valiant klngs as heretical systems, and the realm as sensual pleasure, while veyyaggha is taken by him for a place infested wilh the tigers of obstruction against final beatitude.\n\nSome confirmation of this interpretation is supplied by a passage in the third book of the La n kâvatâra-sûtra, as quoted by Mr."

