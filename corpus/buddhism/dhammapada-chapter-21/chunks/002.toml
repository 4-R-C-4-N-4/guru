[content]
body = "Beal in his translation of the Dhammapada, Introduction, p.\n\n5.\n\nHere a stanza is quoted as having been recited by Buddha, in explanation of a similar startling utterance which he had made to Mahâmati: 'Lust, or carnal desire, this is the Mother, Ignorance, this is the Father, The highest point of knowledge, this is Buddha, All the kle s as, these are the Rahats, The five skandhas, these are the Priests; To commit the five unpardonable sins Is to destroy these five And yet not suffer the pains of hell.' The La n kâvatâra-sûtra was translated into Chinese by Bodhiru k i (508-511); when it was written is doubtful.\n\nSee also G âtaka, vol.\n\nii.\n\np.\n\n263.] p.\n\n71 296.\n\nThe disciples of Gotama (Buddha) are always well awake, and their thoughts day and night are always set on Buddha.\n\n297.\n\nThe disciples of Gotama are always well awake, and their thoughts day and night are always set on the law.\n\n298.\n\nThe disciples of Gotama are always well awake, and their thoughts day and night are always set on the church.\n\n299.\n\nThe disciples of Gotama are always well awake, and their thoughts day and night are always set on their body.\n\np.\n\n72 300.\n\nThe disciples of Gotama are always well awake, and their mind day and night always delights in compassion.\n\n301.\n\nThe disciples of Gotama are always well awake, and their mind day and night always delights in meditation.\n\n302.\n\nIt is hard to leave the world (to become a friar), it is hard to enjoy the world; hard is the monastery, painful are the houses; painful it is to dwell with equals (to share everything in common), and the itinerant mendicant is beset with pain.\n\nTherefore let no man be an itinerant mendicant and he will not be beset with pain.\n\n303.\n\nWhatever place a faithful, virtuous, celebrated, and wealthy man chooses, there he is respected.\n\n304.\n\nGood people shine from afar, like the snowy [302.\n\nThis verse is difficult, and I give my translation as tentative only.\n\nChilders (Notes, p.\n\n11) does not remove the difficulties, and I have been chiefly guided by the interpretation put on the verse by the Chinese translator; Beal, Dhammapada, p.\n\n137.] p.\n\n73 mountains; bad people are not seen, like arrows shot by night.\n\n305.\n\nHe alone who, without ceasing, practises the duty of sitting alone and sleeping alone, he, subduing himself, will rejoice in the destruction of all desires alone, as if living in a forest.\n\n[305.\n\nI have translated this verse so as to bring it into something like harmony with the preceding verses.\n\nVanânte, according to a pun pointed out before ( v.\n\n283 ), means both 'in the end of a forest,' and 'in the end of desires.']\n\nThe Downward Course."

