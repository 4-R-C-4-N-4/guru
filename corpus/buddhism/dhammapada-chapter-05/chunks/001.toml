body = "p.\n\n20 CHAPTER V.\n\nTHE FOOL.\n\n60.\n\nLong is the night to him who is awake; long is a mile to him who is tired; long is life to the foolish who do not know the true law.\n\n61.\n\nIf a traveller does not meet with one who is his better, or his equal, let him firmly keep to his solitary journey; there is no companionship with a fool.\n\n62.\n\n'These sons belong to me, and this wealth belongs to me,' with such thoughts a fool is tormented.\n\nHe himself does not belong to himself; how much less sons and wealth?\n\n63.\n\nThe fool who knows his foolishness, is wise at least so far.\n\nBut a fool who thinks himself wise, he is called a fool indeed.\n\n64.\n\nIf a fool be associated with a wise man even all his life, he will perceive the truth as little as a spoon perceives the taste of soup.\n\n65.\n\nIf an intelligent man be associated for one minute only with a wise man, he will soon perceive the truth, as the tongue perceives the taste of soup.\n\n66.\n\nFools of little understanding have themselves [60.\n\n'Life,' sa m sâra, is the constant revolution of birth and death which goes on for ever until the knowledge of the true law or the true doctrine of Buddha enables a man to free himself from sa m sâra, and to enter into Nirvâ n a.\n\nSee Buddhaghosha's Parables, Parable XIX, p.\n\n134.\n\n61.\n\nCf.\n\nSuttanipâta, v.\n\n46 .\n\n63.\n\nCf.\n\nBeal, Dhammapada, p.\n\n77.\n\n65.\n\nCf.\n\nBeal, Dhammapada, p.\n\n78.] p.\n\n21 for their greatest enemies, for they do evil deeds which must bear bitter fruits.\n\n67.\n\nThat deed is not well done of which a man must repent, and the reward of which he receives crying and with a tearful face.\n\n68.\n\nNo, that deed is well done of which a man does not repent, and the reward of which he receives gladly and cheerfully.\n\n69.\n\nAs long as the evil deed done does not bear fruit, the fool thinks it is like honey; but when it ripens, then the fool suffers grief.\n\n70.\n\nLet a fool month after month eat his food (like an ascetic) with the tip of a blade of Ku s a grass, yet he is not worth the sixteenth particle of those who have well weighed the law.\n\n71.\n\nAn evil deed, like newly-drawn milk, does not turn (suddenly); smouldering, like fire covered by ashes, it follows the fool.\n\n[67.\n\nSee Beal, l.c.\n\np.\n\n78.\n\n69.\n\nTaken from the Sa m yutta-nikâya, where, however, we read thânanhi instead of madhuvâ; see Feer, Comptes Rendus, 1871, p.\n\n64.\n\n70.\n\nThe commentator clearly takes sa n khâta in the sense of sa n khyâta, 'reckoned,' for he explains it by n âtadhammâ, tulitadhammâ.\n\nThe eating with the tip of Ku s a grass has reference to the fastings performed by the Brahmans, but disapproved of, except as a moderate discipline, by the followers of Buddha.\n\nThis verse seems to interrupt the continuity of the other verses which treat of the reward of evil deeds, or of the slow but sure ripening of every sinful act.\n\nSee Childers, s.v.\n\nsa n khâto.\n\n71.\n\nI am not at all certain of the simile, unless mu kk ati, as applied to milk, can be used in the sense of changing or turning sour."

