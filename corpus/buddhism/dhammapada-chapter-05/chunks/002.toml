[content]
body = "In Manu IV, 172, where a similar sentence occurs, the commentators are equally doubtful: Nâdharma s k arito loke sadya h phalati gaur iva, 'for an evil act committed in the world does not bear fruit at once, like a cow;' or 'like the earth (in due season);' or 'like milk.' See Childers, Notes, p.\n\n6.] p.\n\n22 72.\n\nAnd when the evil deed, after it has become known, brings sorrow to the fool, then it destroys his bright lot, nay, it cleaves his head.\n\n73.\n\nLet the fool wish for a false reputation, for precedence among the Bhikshus, for lordship in the convents, for worship among other people!\n\n74.\n\n'May both the layman and he who has left the world think that this is done by me; may they be subject to me in everything which is to be done or is not to be done,' thus is the mind of the fool, and his desire and pride increase.\n\n75.\n\n'One is the road that leads to wealth, another the road that leads to Nirvâ n a;' if the Bhikshu, the disciple of Buddha, has learnt this, he will not yearn for honour, he will strive after separation from the world.\n\n[72.\n\nI take ñ attam for gñ apitam, the causative of gñ âtam, for which in Sanskrit, too, we have the form without i, gñ aptam.\n\nThis gñ aptam, 'made known, revealed,' stands in opppsition to the kh anna, 'covered, hid,' of the preceding verse.\n\nSukka m sa, which Fausböll explains by s uklâ m sa, has probably a more technical and special meaning.\n\nChilders traces ñ attam to the Vedic gñ âtram, 'knowledge.' Fausböll refers to G âtaka, vol.\n\ni.\n\np.\n\n445, v.\n\n118.\n\n75.\n\nViveka, which in Sanskrit means chiefly understanding, has with the Buddhists the more technical meaning of separation, whether separation from the world and retirement to the solitude of the forest (kâya-viveka), or separalion from idle thoughts ( k itta-viveka), or the highest separation and freedom (Nirvâ n a).]"

