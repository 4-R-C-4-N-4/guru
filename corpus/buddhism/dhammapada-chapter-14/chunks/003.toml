body = "But that is not a safe refuge, that is not the best refuge; a man is not delivered from all pains after having gone to that refuge.\n\n190.\n\nHe who takes refuge with Buddha, the Law, [188-192.\n\nThese verses occur in Sanskrit in the Prâtihâryasûtra, translated by Burnouf, Introduction, pp.\n\n162-189; see p.\n\n186.\n\nBurnouf translates rukkha k etyâni by 'arbres consacrés;' properly, sacred shrines under or near a tree.\n\nSee also G âtaka vol.\n\ni.\n\np.\n\n97.\n\n190.\n\nBudda, Dharma, and Sa n gha are called the Tri s ara n a (cf.\n\nBurnouf, Introd.\n\np.\n\n630).\n\nThe four holy truths are the four statements that there is pain in this world, that the source of pain is desire, that desire can be annihilated, that there is a way (shown by Buddha) by which the annihilation of all desires can be achieved, and freedom be obtained.\n\nThat way consists of eight parts.\n\n(See Burnouf, Introduction, p.\n\n630.) The eightfold way forms the subject of Chapter XVIII.\n\n(See also Feer, Journal As.\n\n1870, p.\n\n418, and Chips from a German Workshop, 2nd ed.\n\nvol.\n\ni.\n\np.\n\n251 seq.)] p.\n\n52 and the Church; he who, with clear understanding, sees the four holy truths:-- 191.\n\nViz.\n\npain, the origin of pain, the destruction of pain, and the eightfold holy way that leads to the quieting of pain;-- 192.\n\nThat is the safe refuge, that is the best refuge; having gone to that refuge, a man is delivered from all pain.\n\n193.\n\nA supernatural person (a Buddha) is not easily found, he is not born everywhere.\n\nWherever such a sage is born, that race prospers.\n\n194.\n\nHappy is the arising of the awakened, happy is the teaching of the True Law, happy is peace in the church, happy is the devotion of those who are at peace.\n\n195., 196.\n\nHe who pays homage to those who deserve homage, whether the awakened (Buddha) or their disciples, those who have overcome the host (of evils), and crossed the flood of sorrow, he who pays homage to such as have found deliverance and know no fear, his merit can never be measured by anybody."

