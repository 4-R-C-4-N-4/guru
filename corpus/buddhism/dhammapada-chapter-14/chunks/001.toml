body = "p.\n\n49 CHAPTER XIV.\n\nTHE BUDDHA (THE AWAKENED).\n\n179.\n\nHe whose conquest is not conquered again, into whose conquest no one in this world enters, by what track can you lead him, the Awakened, the Omniscient, the trackless?\n\n180.\n\nHe whom no desire with its snares and poisons can lead astray, by what track can you lead him, the Awakened, the Omniscient, the trackless?\n\n181.\n\nEven the gods envy those who are awakened and not forgetful, who are given to meditation, who are wise, and who delight in the repose of retirement (from the world).\n\n182.\n\nDifficult (to obtain) is the conception of men, difficult is the life of mortals, difficult is the hearing of the True Law, difficult is the birth of the Awakened (the attainment of Buddhahood).\n\n[179, 180.\n\nBuddha, the Awakened, is to be taken as an appellative rather than as the proper name of the Buddha (see v.\n\n183).\n\nIt means, anybody who has arrived at complete knowledge.\n\nAnantago k aram I take in the sense of, possessed of unlimited knowledge.\n\nApadam, which Dr.\n\nFausböll takes as an epithet of Buddha and translates by 'non investigabilis,' is translated 'trackless,' in order to show the play on the word pada; see Childers, s.v.\n\nThe commentator says: 'The man who is possessed of even a single one of such conditions as râga, &c., him ye may lead forward; but the Buddha has not even one condition or basis of renewed existence, and therefore by what track will you lead this unconditioned Buddha?' Cf.\n\nDhp.\n\nvv.\n\n92 , 420 ; and G âtaka, vol.\n\ni.\n\npp.\n\n79, 313.\n\n182.\n\nMr.\n\nBeal (Dhammapada, p.\n\n110) states that this verse occurs in the Sûtra of the Forty-two Sections.] p.\n\n50 183.\n\nNot to commit any sin, to do good, and to purify one's mind, that is the teaching of (all) the Awakened.\n\n184.\n\nThe Awakened call patience the highest penance, long-suffering the highest Nirvâ n a; for he is not an anchorite (pravra g ita) who strikes others, he is not an ascetic ( s rama n a) who insults others.\n\n185.\n\nNot to blame, not to strike, to live restrained under the law, to be moderate in eating, to sleep and sit alone, and to dwell on the highest thoughts,--this is the teaching of the Awakened.\n\n[183.\n\nThis verse is again one of the most solemn verses among the Buddhists.\n\nAccording to Csoma Körösi, it ought to follow the famous Âryâ stanza, 'Ye dhammâ' (Lotus, p.\n\n522), and serve as its complement.\n\nBut though this may be the case in Tibet, it was not so originally.\n\nThe same verse (ascribed to Kanakamuni) occurs at the end of the Chinese translation of the Prâtimoksha.\n\n(Beal, J.\n\nR.\n\nA.\n\nS.\n\nXIX, p.\n\n473; Catena, p.\n\n159); in the Tibetan translation of the Gâthâsa n graha, v.\n\n14 (Schiefner, Mél.\n\nAsiat.\n\nI VIII, pp.\n\n568, 586; and Csoma Körösi, As.\n\nRes.\n\nXX, p.\n\n79).\n\nBurnouf has fully discussed the metre and meaning of our verse on pp."

