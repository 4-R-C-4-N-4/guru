body = "p.\n\n9 CHAPTER II.\n\nON EARNESTNESS [1] .\n\n21.\n\nEarnestness is the path of immortality (Nirvâ n a), thoughtlessness the path of death.\n\nThose who are in earnest do not die, those who are thoughtless are as if dead already.\n\n22.\n\nThose who are advanced in earnestness, having understood this clearly, delight in earnestness, and rejoice in the knowledge of the Ariyas (the elect).\n\n23.\n\nThese wise people, meditative, steady, always possessed of strong powers, attain to Nirvâ n a, the highest happiness.\n\n[1.\n\nThere is nothing in the tenth section of the Dhammapada, as translated by Beal, corresponding to the verses of this chapter.\n\n21.\n\nApramâda, which Fausböll translates by 'vigilantia,' Gogerly by 'religion,' Childers by 'diligence,' expresses literally the absence of that giddiness or thoughtlessness which characterizes the state of mind of worldly people.\n\nIt is the first entering into oneself, and hence all virtues are said to have their root in apramâda.\n\n(Ye ke k i kusalâ dhammâ sabbe te appamâdamûlakâ.) I have translated it by 'earnestness,' sometimes by 'reflection.' 'Immortality,' am ri ta, is explained by Buddhaghosa as Nirvâ n a.\n\nAm ri ta is used, no doubt, as a synonym of Nirvâ n a, but this very fact shows how many different conceptions entered from the very first into the Nirvâ n a of the Buddhists.\n\nSee Childers, s.v.\n\nnibbâna, p.\n\n269.\n\nThis verse, as recited to A s oka; occurs in the Dîpava m sa VI, 53, and in the Mahâva m sa, p.\n\n25.\n\nSee also Sanatsu g âtîya, translated by Telang, Sacred Books of the East, vol.\n\nviii.\n\np.\n\n138.\n\n22.\n\nThe Ariyas, the noble or elect, are those who have entered on the path that leads to Nirvâ n a; see Köppen, p.\n\n396.\n\nTheir knowledge and general status is minutely described; see Köppen, p.\n\n436.\n\n23.\n\nChilders, s.v.\n\nnibbâna, thinks that nibbâna here and in many other places means Arhatship.] p.\n\n10 24.\n\nIf an earnest person has roused himself, if he is not forgetful, if his deeds are pure, if he acts with consideration, if he restrains himself, and lives according to law,--then his glory will increase.\n\n25.\n\nBy rousing himself, by earnestness, by restraint and control, the wise man may make for himself an island which no flood can overwhelm.\n\n26.\n\nFools follow after vanity, men of evil wisdom.\n\nThe wise man keeps earnestness as his best jewel.\n\n27.\n\nFollow not after vanity, nor after the enjoyment of love and lust!\n\nHe who is earnest and meditative, obtains ample joy.\n\n28.\n\nWhen the learned man drives away vanity by earnestness, he, the wise, climbing the terraced heights of wisdom, looks down upon the fools, serene he looks upon the toiling crowd, as one that stands on a mountain looks down upon them that stand upon the plain.\n\n29.\n\nEarnest among the thoughtless, awake among the sleepers, the wise man advances like a racer, leaving behind the hack.\n\n30.\n\nBy earnestness did Maghavan (Indra) rise to the lordship of the gods.\n\nPeople praise earnestness; thoughtlessness is always blamed.\n\n31."

