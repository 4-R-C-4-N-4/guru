body = "p.\n\n31 CHAPTER VIII.\n\nTHE THOUSANDS.\n\n100.\n\nEven though a speech be a thousand (of words), but made up of senseless words, one word of sense is better, which if a man hears, he becomes quiet.\n\n101.\n\nEven though a Gâthâ (poem) be a thousand (of words), but made up of senseless words, one word of a Gâthâ is better, which if a man hears, he becomes quiet.\n\n102.\n\nThough a man recite a hundred Gâthâs made up of senseless words, one word of the law is better, which if a man hears, he becomes quiet.\n\n103.\n\nIf one man conquer in battle a thousand times thousand men, and if another conquer himself, he is the greatest of conquerors.\n\n104., 105.\n\nOne's own self conquered is better than all other people; not even a god, a Gandharva, not Mâra with Brahman could change into defeat the [100.\n\nThis Sahasravarga, or Chapter of the Thousands, is quoted by that name in the Mahâvastu (Minayeff, Mélanges Asiatiques, VI, p.\n\n583): Teshâm Bhagavâ ñ g a t ilânâ m Dharmapadeshu sahasravargam bhâshati: 'Sahasram api vâkânâm anarthapadasa m hitânâm, ekârthavati s reyâ yâ m s rutvâ upa s âmyati.\n\nSahasram api gâthânâm anarthapadasa m hitânâm, ekârthavati s reyâ yâ m s rutvâ upa s âmyati.' (MS.\n\nR.\n\nA.\n\nS.\n\nLond.) Here the Pâli text seems decidedly more original and perfect.\n\n104.\n\nG ita m , according to the commentator, stands for g ito (li n gavipallâso, i.e.\n\nviparyâsa); see also Senart in Journal Asiatique, 1880, p.\n\n500.\n\nThe Devas (gods), Gandharvas (fairies), and other fanciful beings of the Brahmanic religion, such as the Nâgas, Sarpas, Garu d as, &c., were allowed to continue in the traditional language of the people who had embraced Buddhism.\n\nSee the pertinent remarks of Burnouf, Introduction, pp.\n\n134 seq., 184.\n\nOn Mâra, the tempter, see v.\n\n7.\n\nSâstram Aiyar, On the G aina Religion, p.\n\nxx, says: 'Moreover as it is declared in the G aina Vedas that all the gods worshipped by the various Hindu sects, viz.\n\nS iva, Brahma, Vish n u, Ga n apati, Subramaniyan, and others, were devoted adherents of the above-mentioned Tîrtha n karas, the G ainas therefore do not consider them as unworthy of their worship; but as they are servants of Arugan, they consider them to be deities of their system, and accordingly perform certain pû g âs in honour of them, and worship them also.' The case is more doubtful with orthodox Buddhists.\n\n'Orthodox Buddhists,' as Mr.\n\nD'Alwis writes (Attanagalu-vansa, p.\n\n55), 'do not consider the worship of the Devas as being sanctioned by him who disclaimed for himself and all the Devas any power over man's soul.\n\nYet the Buddhists are everywhere idol-worshippers."

