body = "70-75.' I do not deny that this may have been the traditional interpretation, at all events since the days of Buddhaghosa, but the very legend quoted by Buddhaghosa in illustration of this verse shows that its simpler and purely moral interpretation was likewise supported by tradition, and I therefore adhere to my original translation.] p.\n\n4 2.\n\nAll that we are is the result of what we have thought: it is founded on our thoughts, it is made up of our thoughts.\n\nIf a man speaks or acts with a pure thought, happiness follows him, like a shadow that never leaves him.\n\n3.\n\n'He abused me, he beat me, he defeated me, he robbed me,'--in those who harbour such thoughts hatred will never cease.\n\n4.\n\n'He abused me, he beat me, he defeated me, he robbed me,'--in those who do not harbour such thoughts hatred will cease.\n\n[2.\n\nSee Beal, Dhammapada, p.\n\n169.\n\n3.\n\nOn akko kkh i, see Ka kk âyana VI, 4, 17.\n\nD'Alwis, Pâli Grammar, p.\n\n38 note, 'When akko kkh i means \"he abused,\" it is derived from kru s , not from krudh.' See Senart, Ka kk âyana, I.\n\nc.] p.\n\n5 5.\n\nFor hatred does not cease by hatred at any time: hatred ceases by love, this is an old rule.\n\n6.\n\nThe world does not know that we must all come to an end here;--but those who know it, their quarrels cease at once.\n\n7.\n\nHe who lives looking for pleasures only, his senses uncontrolled, immoderate in his food, idle, and weak, Mâra (the tempter) will certainly overthrow him, as the wind throws down a weak tree.\n\n8.\n\nHe who lives without looking for pleasures, his senses well controlled, moderate in his food, faithful and strong, him Mâra will certainly not overthrow, any more than the wind throws down a rocky mountain.\n\n9.\n\nHe who wishes to put on the yellow dress without having cleansed himself from sin, who disregards temperance and truth, is unworthy of the yellow dress.\n\n[6.\n\nPare is explained by 'fools,' but it has that meaning by implication only.\n\nIt is {Greek: oi pólloi }, cf.\n\nVinaya, ed.\n\nOldenberg, vol.\n\ni., p.\n\n5, l.\n\n4.\n\nYamâmase, a 1 pers.\n\nplur.\n\nimp.\n\nÂtm., but really a Le t in Pâli.\n\nSee Fausböll, Five G âtakas, p.\n\n38.\n\n7.\n\nMâra must be taken in the Buddhist sense of 'tempter,' or 'evil spirit.' See Burnouf, Introduction, p.\n\n76: 'Mâra est le démon de l'amour, du péché et de la mort; c'est le tentateur et l'ennemi de Buddha.' As to the definite meaning of vîrya, see Burnouf, Lotus, p.\n\n548.\n\nIn the Buddhistical Sanskrit, kusîda, 'idle,' is the exact counterpart of the Pâli kusîta; see Burnouf, Lotus, p.\n\n548.\n\nOn the change of Sanskrit d into Pâli t, see Kuhn, Beiträge zur Pali Grammatik, p.\n\n40; Weber, Ind.\n\nStudien, XIII, p.\n\n135.\n\n9.\n\nThe dark yellow dress, the Kâsâva or Kâshâya, is the distinctive garment of the Buddhist priests.\n\nSee Vish n u-sûtra LXIII, 36."

