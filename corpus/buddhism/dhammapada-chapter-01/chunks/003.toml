[content]
body = "The play on the words anikkasâvo kâsâvam, or in Sanskrit anishkashâya h kâshâyam, cannot be rendered in English.\n\nKashâya means 'impurity,' nish-kashâya, 'free from impurity,' anish-kashâya, 'not free from impurity,' while kâshâya is the name of the yellowish Buddhist garment.\n\nThe pun is evidently a favourite one, for, as Fausböll shows, it occurs also in the Mahâbhârata, XII, 568: Anishkashâye kâshâyam îhârtham iti viddhi tam, Dharmadhva g ânâ m mu nd ânâ m v ri ttyartham iti me mati h .\n\n'Know that this yellow-coloured garment on a man who is not free from impurity, serves only for the purpose or cupidity; my opinion is, that it is meant to supply the means of living to those shavelings, who carry their virtue or the dharma like a flag.' (I read v ri ttyartham, according to the Bombay edition, instead of k ri târtham, the reading of the Calcutta edition.) On the exact colour of the dress, see Bishop Bigandet, The Life or Legend or Gaudama, the Budha of the Burmese, Rangoon, 1866, p.\n\n504.\n\nCf.\n\nG âtaka, vol.\n\nii.\n\np.\n\n198.] p.\n\n6 10.\n\nBut he who has cleansed himself from sin, is well grounded in all virtues, and regards also temperance and truth, he is indeed worthy of the yellow dress.\n\n11.\n\nThey who imagine truth in untruth, and see untruth in truth, never arrive at truth, but follow vain desires.\n\n12.\n\nThey who know truth in truth, and untruth in untruth, arrive at truth, and follow true desires.\n\n13.\n\nAs rain breaks through an ill-thatched house, passion will break through an unreflecting mind.\n\n14.\n\nAs rain does not break through a well-thatched house, passion will not break through a well-reflecting mind.\n\n15.\n\nThe evil-doer mourns in this world, and he [10.\n\nWith regard to sîla, 'virtue,' see Burnouf, Lotus, p.\n\n547.\n\n11, 12.\n\nSâra, which I have translated by 'truth,' has many meanings in Sanskrit.\n\nIt means the sap of a thing, then essence or reality; in a metaphysical sense, the highest reality; in a moral sense, truth.\n\nIt is impossible in a translation to do more than indicate the meaning of such words, and in order to understand them fully, we must know not only their definition, but their history.\n\nSee Beal, Dhammapada, p.\n\n64.\n\n13.\n\nSee Beal, Dhammapada, p.\n\n65.\n\n15.\n\nKili tth a is klish t a, a participle of kli s .\n\nIt means literally, what is spoilt.\n\nThe abstract noun kle s a, 'evil or sin,' is contantly employed in Budddist works; see Burnouf, Lotus, p.\n\n443.] p.\n\n7 mourns in the next; he mourns in both.\n\nHe mourns and suffers when he sees the evil of his own work.\n\n16.\n\nThe virtuous man delights in this world, and he delights in the next; he delights in both.\n\nHe delights and rejoices, when he sees the purity of his own work.\n\n17.\n\nThe evil-doer suffers in this world, and he suffers in the next; he suffers in both."

