body = "He suffers when he thinks of the evil he has done; he suffers more when going on the evil path.\n\n18.\n\nThe virtuous man is happy in this world, and he is happy in the next; he is happy in both.\n\nHe is happy when he thinks of the good he has done; he is still more happy when going on the good path.\n\n19.\n\nThe thoughtless man, even if he can recite a large portion (of the law), but is not a doer of it, has no share in the priesthood, but is like a cowherd counting the cows of others.\n\n[16.\n\nLike klish t a in the preceding verse, vi s uddhi in the present has a technical meaning.\n\nOne of Buddhaghosa's most famous works is called Visuddhi-magga.\n\nSee Burnouf, Lotus, p.\n\n844; Beal, Dhammapada, p.\n\n67.\n\n17, 18.\n\n'The evil path and the good path' are technical expressions for the descending and ascending scale of worlds through which all beings have to travel upward or downward, according to their deeds; see Bigandet; Life of Gaudama, p.\n\n5, note 4, and p.\n\n449; Burnouf, Introduction, p.\n\n599; Lotus, p.\n\n865, l.\n\n7; l.\n\n11.\n\nFausböll translates 'heaven and hell,' which comes to the same; cf.\n\nvv.\n\n126 , 306 .\n\n19.\n\nIn taking sahitam in the sense of sa m hitam or sa m hitâ, I follow the commentator who says, Tepi t akassa Buddhava k anass' eta m nâma m , but I cannot find another passage where the Tipi t aka, or any portion of it, is called Sahita.\n\nSa m hita in vv.\n\n100-102 has a different meaning.\n\nThe fact that some followers of Buddha were allowed to learn short portions only of the sacred writings by heart, and to repeat them, while others had to learn a larger collection, is shown by the story of K akkhupâla, p.\n\n3.\n\nof Mahâkâla, p.\n\n26, &c.\n\nSee Childers, s.v.\n\nsahita.] p.\n\n8 20.\n\nThe follower of the law, even if he can recite only a small portion (of the law), but, having forsaken passion and hatred and foolishness, possesses true knowledge and serenity of mind, he, caring for nothing in this world or that to come, has indeed a share in the priesthood.\n\n[20.\n\nSâma ññ a, which I have rendered by 'priesthood,' expresses all that belongs to, or constitutes a real Sama n a or S rama n a, this being the Buddhist name corresponding to the Brâhma n a, or priest, of the orthodox Hindus.\n\nBuddha himself is frequently called the Good Sama n a.\n\nFausböll takes the abstract word sâma ññ a as corresponding to the Sanskrit sâmânya, 'community,' but Weber has well shown that it ought to be taken as representing s râma n ya.\n\nHe might have quoted the Sâma ññ a-phala-sutta, of which Burnouf has given such interesting details in his Lotus, p.\n\n449 seq.\n\nFausböll also, in his notes on v.\n\n332, rightly explains sâma ññ atâ by s râma n yatâ.\n\nSee Childers, s.v.\n\nsâma ññ a.\n\nAnupâdiyâno, which I have translated by 'caring for nothing,' has a technical meaning."

