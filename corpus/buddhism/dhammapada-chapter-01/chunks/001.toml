body = "p.\n\n3 DHAMMAPADA.\n\nCHAPTER I.\n\nTHE TWIN-VERSES.\n\n1.\n\nAll that we are is the result of what we have thought: it is founded on our thoughts, it is made up of our thoughts.\n\nIf a man speaks or acts with an evil thought, pain follows him, as the wheel follows the foot of the ox that draws the carriage.\n\n[1.\n\nDharma, though clear in its meaning, is difficult to translate.\n\nIt has different meanings in different systems of philosophy, and its peculiar application in the phraseology of Buddhism has been fully elucidated by Burnouf, Introduction à l'Histoire du Buddhisme, p.\n\n41 seq.\n\nHe writes: 'Je traduis ordinairement ce terme par condition, d'autres fois par lois, mais aucune de ces traductions n'est parfaitement complète; il faut entendre par dharma ce qui fait qu'une chose est ce qu'elle est, ce qui constitue sa nature propre, comme l'a bien montré Lassen, à l'occasion de la célèbre formule, \"Ye dharmâ hetuprabhavâ.\"' Etymologically the Latin for-ma expresses the same general idea which was expressed by dhar-ma.\n\nSee also Burnouf, Lotus de la bonne Loi, p.\n\n524.\n\nFausböll translates: 'Naturae a mente principium ducunt,' which shows that he rightly understood dharma in the Buddhist sense.\n\nGogerly (see Spence Hardy, Eastern Monachism, p.\n\n28) translates: 'Mind precedes action,' which, if not wrong, is at all events wrongly expressed; while Professor Weber's rendering, 'Die Pflichten aus dem Herz folgern,' is quite inadmissible.\n\nD'Alwis (Buddhist Nirwana, p.\n\n70 seq.), following the commentary, proposes to give a more technical interpretation of this verse, viz.\n\n'Mind is the leader or all its faculties.\n\nMind is the chief (of all its faculties).\n\nThe very mind is made up of those (faculties).\n\nIf one speaks or acts with a polluted mind, then affliction follows him as the wheel follows the feet of the bearer (the bullock).' To me this technical acceptation seems not applicable here, where we have to deal with the simplest moral precepts, and not with psychological niceties of Buddhist philosophy.\n\nIt should be stated, however, that Childers, who first (s.v.\n\ndhamma) approved of my translation, seems afterwards to have changed his opinion.\n\nOn p.\n\n120 of his excellent Pâli Dictionary he said: 'Three of the five khandhas, viz.\n\nvedanâ, sa ññ â, and sa n khâra, are collectively termed dhammâ (plur.), \"mental faculties,\" and in the first verse of Dhammapada the commentator takes the word dhammâ to mean those three faculties.\n\nBut this interpretation appears forced and unnatural, and I look upon Dr.\n\nMax Müller's translation, \"All that we are is the result of what we have thought,\" as the best possible rendering of the spirit of the phrase mano pubba n gamâ dhammâ.' But on p.\n\n577 the same scholar writes: 'Of the four mental khandhas the superiority of vi ññ â n a is strongly asserted in the first verse of Dhammapada, \"The mental faculties (vedanâ, sa ññ â, and sa n khâra) are dominated by Mind,\" they are governed by Mind, they are made up of Mind.\" That this is the true meaning of the passage I am now convinced; see D'Alwis, Nirwana, pp."

