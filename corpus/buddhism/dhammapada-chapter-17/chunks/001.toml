body = "p.\n\n58 CHAPTER XVII.\n\nANGER.\n\n221.\n\nLet a man leave anger, let him forsake pride, let him overcome all bondage!\n\nNo sufferings befall the man who is not attached to name and form, and who calls nothing his own.\n\n222.\n\nHe who holds back rising anger like a rolling chariot, him I call a real driver; other people are but holding the reins.\n\n223.\n\nLet a man overcome anger by love, let him overcome evil by good; let him overcome the greedy by liberality, the liar by truth!\n\n224.\n\nSpeak the truth, do not yield to anger; give, if thou art asked for little; by these three steps thou wilt go near the gods.\n\n225.\n\nThe sages who injure nobody, and who always control their body, they will go to the unchangeable place (Nirvâ n a), where, if they have gone, they will suffer no more.\n\n226.\n\nThose who are ever watchful, who study day and night, and who strive after Nirvâ n a, their passions will come to an end.\n\n227.\n\nThis is an old saying, O Atula, this is not only of to-day: 'They blame him who sits silent, [221.\n\n'Name and form' or 'mind and body' is the translation of nâma-rûpa, the ninth of the Buddhist Nidânas.\n\nCf.\n\nBurnouf, Introduction, p.\n\n501; see also Gogerly, Lecture on Buddhism, and Bigandet, The Life of Gaudama, p.\n\n454.\n\n223.\n\nMahâbh.\n\nXII, 3550, asâdhu m sadhunâ g ayet.\n\nCf.\n\nTen G âtakas, ed.\n\nFausböll, p.\n\n5.\n\n227.\n\nIt appears from the commentary that porâ n am and a gg atanam are neuters, referring to what happened formerly and what happens to-day, and that they are not to be taken as adjectives referring to âsînam, &c.\n\nThe commentator must have read atula instead of atulam, and he explains it as the name of a pupil whom Gautama addressed by that name.\n\nThis may be so (see note to verse 166 ); but atula may also be taken in the sense of incomparable (Mahâbh.\n\nXIII, 1937), and in that case we ought to supply, with Professor Weber, some such word as 'saw' or 'saying.'] p.\n\n59 they blame him who speaks much, they also blame him who says little; there is no one on earth who is not blamed.' 228.\n\nThere never was, there never will be, nor is there now, a man who is always blamed, or a man who is always praised.\n\n229., 230.\n\nBut he whom those who discriminate praise continually day after day, as without blemish, wise, rich in knowledge and virtue, who would dare to blame him, like a coin made of gold from the G ambû river?\n\nEven the gods praise him, he is praised even by Brahman.\n\n231.\n\nBeware of bodily anger, and control thy body!\n\nLeave the sins of the body, and with thy body practise virtue!\n\n232.\n\nBeware of the anger of the tongue, and control thy tongue!\n\nLeave the sins of the tongue, and practise virtue with thy tongue!\n\n233.\n\nBeware of the anger of the mind, and control thy mind!\n\nLeave the sins of the mind, and practise virtue with thy mind!\n\n234.\n\nThe wise who control their body, who control their tongue, the wise who control their mind, are indeed well controlled.\n\n[230.\n\nThe Brahman worlds are higher that the Deva worlds as the Brahman is higher than a Deva; see Hardy, Manual, p."

