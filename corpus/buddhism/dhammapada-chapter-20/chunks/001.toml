[content]
body = "p.\n\n67 CHAPTER XX.\n\nTHE WAY.\n\n273.\n\nThe best of ways is the eightfold; the best of truths the four words; the best of virtues passionlessness; the best of men he who has eyes to see.\n\n274.\n\nThis is the way, there is no other that leads to the purifying of intelligence.\n\nGo on this way!\n\nEverything else is the deceit of Mâra (the tempter).\n\n275.\n\nIf you go on this way, you will make an end of pain!\n\nThe way was preached by me, when I had understood the removal of the thorns (in the flesh).\n\n276.\n\nYou yourself must make an effort.\n\nThe Tathâgatas (Buddhas) are only preachers.\n\nThe thoughtful who enter the way are freed from the bondage of Mâra.\n\n277.\n\n'All created things perish,' he who knows and sees this becomes passive in pain; this is the way to purity.\n\n[273.\n\nThe eightfold or eight-membered way is the technical term for the way by which Nirvâ n a is attained.\n\n(See Burnouf, Lotus, p.\n\n519.) This very way constitutes the fourth of the Four Truths, or the four words of truth, viz.\n\nDu h kha, 'pain ;' Samudaya, 'origin;' Nirodha, 'destruction;' Mârga, 'road.' (Lotus, p.\n\n517.) See note to verse 178 .\n\nFor another explanation of the Mârga, or 'way,' see Hardy, Eastern Monachism, p.\n\n280.\n\n274.\n\nThe last line may mean, 'this way is the confusion of Mâra,' i.e.\n\nthe discomfiture of Mâra.\n\n275.\n\nThe s alyas, 'arrows or thorns,' are the s oka s alya, 'the arrows of grief.' Buddha himself is called mahâ s alya-hartâ, 'the great remover of thorns.' (Lalita-vistara, p.\n\n550; Mahâbh.\n\nXII, 5616.) 277.\n\nSee v.\n\n255 .] p.\n\n68 278.\n\n'All created things are grief and pain,' he who knows and sees this becomes passive in pain; this is the way that leads to purity.\n\n279.\n\n'All forms are unreal,' he who knows and sees this becomes passive in pain; this is the way that leads to purity.\n\n280.\n\nHe who does not rouse himself when it is time to rise, who, though young and strong, is full of sloth, whose will and thought are weak, that lazy and idle man will never find the way to knowledge.\n\n281.\n\nWatching his speech, well restrained in mind, let a man never commit any wrong with his body!\n\nLet a man but keep these three roads of action clear, and he will achieve the way which is taught by the wise.\n\n282.\n\nThrough zeal knowledge is gotten, through lack of zeal knowledge is lost; let a man who knows this double path of gain and loss thus place himself that knowledge may grow.\n\n283.\n\nCut down the whole forest (of lust), not a tree only!\n\nDanger comes out of the forest (of lust).\n\nWhen you have cut down both the forest (of lust) and its undergrowth, then, Bhikshus, you will be rid of the forest and free!\n\n[278.\n\nSee v.\n\n203 .\n\n279.\n\nDhamma is here explained, like sa n khâra, as the five khandha, i.e.\n\nas what constitutes a living body.\n\n281.\n\nCf.\n\nBeal, Catena, p.\n\n159.\n\n282.\n\nBhûri was rightly translated 'intelligentia' by Dr.\n\nFausböll.\n\nDr."

