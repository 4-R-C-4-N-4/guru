body = "Weber renders it by 'Gedeihen,' but the commentator distinctly explains it as 'vast knowledge,' and in the technical sense the word occurs after vidyâ and before medhâ, in the Lalita-vistara, p.\n\n541.\n\n283.\n\nA pun, vana meaning both 'lust' and 'forest.' See some mistaken remarks on this verse in D'Alwis, Nirvâ n a, p.\n\n86, and some good remarks in Childers, Notes, p.\n\n7.] p.\n\n69 284.\n\nSo long as the love of man towards women, even the smallest, is not destroyed, so long is his mind in bondage, as the calf that drinks milk is to its mother.\n\n285.\n\nCut out the love of self, like an autumn lotus, with thy hand!\n\nCherish the road of peace.\n\nNirvâ n a has been shown by Sugata (Buddha).\n\n286.\n\n'Here I shall dwell in the rain, here in winter and summer,' thus the fool meditates, and does not think of his death.\n\n287.\n\nDeath comes and carries off that man, praised for his children and flocks, his mind distracted, as a flood carries off a sleeping village.\n\n288.\n\nSons are no help, nor a father, nor relations; there is no help from kinsfolk for one whom death has seized.\n\n289.\n\nA wise and good man who knows the meaning of this, should quickly clear the way that leads to Nirvâ n a.\n\n[285.\n\nCf.\n\nG âtaka, vol.\n\ni.\n\np.\n\n183.\n\n286.\n\nAntarâya, according to the commentator, g ivitântarâya, i.e.\n\ninteritus, death.\n\nIn Sanskrit, antarita is used in the sense of 'vanished' or 'perished.' 287.\n\nSee notes to verse 47 , Thiessen, Kisâgotamî, p.\n\n11, and Mahâbh.\n\nXII, 9944, 6540.]"

