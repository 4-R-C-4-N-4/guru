[content]
body = "'Both' in the first edition of my translation was a misprint for 'birth.' 394.\n\nI have not copied the language of the Bible more than I was justified in.\n\nThe words are abbhantaran te gahana m , bâhira m parima gg asi, 'interna est abyssus, externum mundas.' Cf.\n\nG âtaka, vol.\n\ni.\n\np.\n\n481.\n\n395.\n\nThe expression Kisan dhamanisanthatam is the Sanskrit k ri sa m dhamanîsantatam, the frequent occurrence of which in the Mahâbhârata has been pointed out by Boehtlingk, s.v.\n\ndhamani.\n\nIt looks more like a Brâhmanic than like a Buddhist phrase.] p.\n\n91 emaciated and covered with veins, who lives alone in the forest, and meditates, him I call indeed a Brâhma n a.\n\n396.\n\nI do not call a man a Brâhma n a because of his origin or of his mother.\n\nHe is indeed arrogant, and he is wealthy: but the poor, who is free from all attachments, him I call indeed a Brâhma n a.\n\n397.\n\nHim I call indeed a Brâhma n a who has cut all fetters, who never trembles, is independent and unshackled.\n\n398.\n\nHim I call indeed a Brâhma n a who has cut the strap and the thong, the chain with all that pertains to it, who has burst the bar, and is awakened.\n\n399.\n\nHim I call indeed a Brâhma n a who, though he has committed no offence, endures reproach, bonds, and stripes, who has endurance for his force, and strength for his army.\n\n400.\n\nHim I call indeed a Brâhma n a who is free from anger, dutiful, virtuous, without appetite, who is subdued, and has received his last body.\n\n[396.\n\nFrom verse 396 to the first half of verse 423, the text of the Dhammapada agrees with the text of the Vasish th a-Bharadvâ g asûtra.\n\nThese verses are translated by D'Alwis in his Nirvâ n a, pp.\n\n113-118, and again by Fausböll, Suttanipâta, v.\n\n620 seq .\n\nThe text contains puns on ki ñk ana, which means 'wealth,' but also 'attachment;' cf.\n\nChilders, s.v.\n\n398.\n\nD'Alwis points out a double entendre in these words.\n\nNandhi may be either the strap that goes round a drum, or enmity; varatta may be either a thong or attachment; sandâna either chain or scepticism; sabanakkamam either due order or all its concomitants; paligha either bar or ignorance.\n\n399.\n\nThe exact meaning of balânîka is difficult to find.\n\nDoes it mean, possessed of a strong army, or facing a force, or leading a force?] p.\n\n92 401.\n\nHim I call indeed a Brâhma n a who does not cling to pleasures, like water on a lotus leaf, like a mustard seed on the point of a needle.\n\n402.\n\nHim I call indeed a Brâhma n a who, even here, knows the end of his suffering, has put down his burden, and is unshackled.\n\n403.\n\nHim I call indeed a Brâhma n a whose knowledge is deep, who possesses wisdom, who knows the right way and the wrong, and has attained the highest end.\n\n404.\n\nHim I call indeed a Brâhma n a who keeps aloof both from laymen and from mendicants, who frequents no houses, and has but few desires."

