[content]
body = "Him I call indeed a Brâhma n a who has left what gives pleasure and what gives pain, who is cold, and free from all germs (of renewed life), the hero who has conquered all the worlds.\n\n419.\n\nHim I call indeed a Brâhma n a who knows the destruction and the return of beings everywhere, who is free from bondage, welfaring (Sugata), and awakened (Buddha).\n\n[418.\n\nUpadhi, if not used in a technical sense, is best translated by 'passions or affections.' Technically there are four upadhis or substrata, viz.\n\nthe kandhas, kâma, 'desire,' kilesa, 'sin,' and kamma, 'work.' The Brâhmana may be called nirupadhi, as being free from desire, misery, and work and its consequences, but not yet of the kandhas, which end through death only.\n\nThe commentator explains nirupadhi by nirupakkilesa, 'free from sin.' See Childers, s.v.\n\nnibbâna, p.\n\n268 a.\n\n419.\n\nSugata is one of those many words in Buddhist literature which it is almost impossible to translate, because they have been taken in so many acceptations by the Buddhists themselves.\n\nSugata etymologically means 'one who has fared well,' sugati means 'happiness and blessedness.' It is wrong to translate it literally by 'welcome,' for that in Sanskrit is svâgata; and we cannot accept Dr.\n\nEitel's staternent (Handbook, p.\n\n138) that sugata stands incorrectly for svâgata.\n\nSugata is one of the not very numerous technical terms in Buddhism for which hitherto we know of no antecedents in earlier Brahmanism.\n\nIt may have been used in the sense of 'happy and blessed,' but it never became a title, while in Buddhism it has become, not only a title, but almost a proper name of Buddha.\n\nThe same applies to tathâgata, lit.\n\n'thus come,' but used in Sanskrit very much like tathâvidha, in the sense of talis, while in Buddhism it means a Buddha.\n\nThere are of course many interpretations of the word, and many reasons are given why Buddhas should be called Tathâgata (Burnouf, Introduction, p.\n\n75, &c.) Boehtlingk s.v.\n\nsupposed that, because Buddha had so many predicates, he was, for the sake of brevity, called 'such a one as he really is.' I think we may go a step further.\n\nAnother word, tâd ris a, meaning talis, becomes in Pâli, under the form of tâdi, a name of Buddha's disciples, and afterwards of Buddha himself.\n\nIf applied to Buddha's disciples, it may have meant originally 'such as he,' i.e.\n\nhis fellows; but when applied to Buddha himself, it can only mean 'such a one,' i.e.\n\n'so great a man.' The Sanskrit mârsha is probably the Pâli mâriso, which stands for mâdiso, Sk.\n\nmâd ris a, 'like me,' used in Pâli when a superior addresses others as his equals, and afterwards changed into a mere title of respect.] p.\n\n95 420.\n\nHim I call indeed a Brâhma n a whose path the gods do not know, nor spirits (Gandharvas), nor men, whose passions are extinct, and who is an Arhat (venerable).\n\n421."

