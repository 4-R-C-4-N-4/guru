body = "p.\n\n89 CHAPTER XXVI.\n\nTHE BRÂHMA N A (ARHAT).\n\n383.\n\nStop the stream valiantly, drive away the desires, O Brâhma n a!\n\nWhen you have understood the destruction of all that was made, you will understand that which was not made.\n\n384.\n\nIf the Brâhma n a has reached the other shore in both laws (in restraint and contemplation), all bonds vanish from him who has obtained knowledge.\n\n385.\n\nHe for whom there is neither this nor that shore, nor both, him, the fearless and unshackled, I call indeed a Brâhma n a.\n\n386.\n\nHe who is thoughtful, blameless, settled, dutiful, without passions, and who has attained the highest end, him I call indeed a Brâhma n a.\n\n387.\n\nThe sun is bright by day, the moon shines by night, the warrior is bright in his armour, the Brâhma n a is bright in his meditation; but Buddha, the Awakened, is bright with splendour day and night.\n\n388.\n\nBecause a man is rid of evil, therefore he is called Brâhma n a; because he walks quietly, therefore he is called Sama n a; because he has sent away his own impurities, therefore he is called Pravra g ita (Pabba g ita, a pilgrim).\n\n[385.\n\nThe exact meaning of the two shores is not quite clear, and the commentator who takes them in the sense of internal and external organs of sense can hardly be right.\n\nSee verse 86 .\n\n388.\n\nThese would-be etytmologies are again interesting as showing the decline of the etymlological life of the spoken language of India at the time when such etymologies became possible.\n\nIn order to derive Brâhma n a from vâh, it must have been pronounced bâhma n o; vâh, 'to remove,' occurs frequently in the Buddhistical Sanskrit.\n\nCf.\n\nLal.\n\nVist.\n\np.\n\n551, l.\n\n1; 553, l.\n\n7.\n\nSee note to verse 265 .] p.\n\n90 389.\n\nNo one should attack a Brâhma n a, but no Brâhma n a (if attacked) should let himself fly at his aggressor!\n\nWoe to him who strikes a Brâhma n a, more woe to him who flies at his aggressor!\n\n390.\n\nIt advantages a Brâhma n a not a little if he holds his mind back from the pleasures of life; when all wish to injure has vanished, pain will cease.\n\n391.\n\nHim I call indeed a Brâhma n a who does not offend by body, word, or thought, and is controlled on these three points.\n\n392.\n\nAfter a man has once understood the law as taught by the Well-awakened (Buddha), let him worship it carefully, as the Brâhma n a worships the sacrificial fire.\n\n393.\n\nA man does not become a Brâhma n a by his platted hair, by his family, or by birth; in whom there is truth and righteousness, he is blessed, he is a Brâhma n a.\n\n394.\n\nWhat is the use of platted hair, O fool!\n\nwhat of the raiment of goat-skins?\n\nWithin thee there is ravening, but the outside thou makest clean.\n\n395.\n\nThe man who wears dirty raiments, who is [390.\n\nI am afraid I have taken too much liberty with this verse.\n\nDr.\n\nFausböll translates, 'Non Brâhma n ae hoc paulo melius, quando retentio fit mentis a jucundis.' 393.\n\nFausböll proposes to read g a kk â ( g âtyâ)."

