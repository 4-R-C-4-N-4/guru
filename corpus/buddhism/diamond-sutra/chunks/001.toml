body = "Sacred Texts Buddhism Index Previous Next {p.\n\n111} THE VA G RA KKH EDIKÂ OR DIAMOND-CUTTER.\n\nADORATION to the blessed Ârya-pra gñ â-pâramitâ (perfection of wisdom).\n\nI.\n\nThus it was heard by me: At one time Bhagavat (the blessed Buddha) dwelt in S râvastî, in the grove of G eta[1], in the garden of Anâthapi nd ada[2], together with a large company of Bhikshus (mendicants), viz.\n\nwith 1250 Bhikshus[3], with many noble-minded Bodhisattvas[4].\n\n[1.\n\nG eta, son of king Prasena g it, to whom the park belonged before it was sold to Anâthapi nd ada.\n\n2.\n\nAnother name of Sudatta, meaning, literally, he who gives food to the poor.\n\n3.\n\nThe number of 1250 is explained by a Chinese priest Lun-hin, in his commentary on the Amitâyur-dhyâna-sûtra.\n\nAccording to the Dharmagupta-vinaya, which he quotes, the number consisted of 500 disciples of Uruvilva-kâ s yapa, 300 of Gayâ-kâ s yapa, 200 of Nadî-kâ s yapa, 150 of S âriputra, and 100 of Maudgalyâyana.\n\nThe Chinese translators often mistook the Sanskrit expression 'half-thirteen hundred,' i.e.\n\n1250.\n\nSee Bunyiu Nanjio, Catalogue of Tripitaka, p.\n\n6.\n\n4.\n\nHigher beings on the road to Bodhi or perfect knowledge.\n\nThey are destined hereafter to become Buddhas themselves.] {p.\n\n112} Then Bhagavat having in the forenoon put on his undergarment[1], and having taken his bowl and cloak, entered the great city of S râvastî to collect alms.\n\nThen Bhagavat, after he had gone to the great city of S râvastî to collect alms, performed the act of eating[2], and having returned from his round in the afternoon[3], he put away his bowl and cloak, washed his feet, and sat down on the seat intended[4] for him, crossing his legs[5], holding his body upright, and turning his reflection upon himself.\n\nThen many Bhikshus approached to where Bhagavat was, saluted his feet with their heads, turned three times round hira to the right, and sat down on one side.\n\n(1) II.\n\nAt that time again the venerable Subhûti came to that assembly and sat down.\n\nThen rising from his seat and putting his robe over one shoulder, kneeling on the earth with his right knee, he stretched out his folded hands towards Bhagavat and said to him: 'It is wonderful, O Bhagavat, it is exceedingly wonderful, O Sugata, how much the noble-minded Bodhisattvas have been favoured with the highest favour by the Tathâgata, the holy and [1.\n\nIn Pâli pubba m hasmaya m nivâsetva, the technical expression for putting on the robes early in the morning; see Childers, s.v.\n\nnivâseti.\n\n2.\n\nIn Pâli katabhattaki kk o, see Childers, s.v.\n\n3.\n\nIn Pâli pa kkh âbhatta m pi nd apâtapa t ikkânta, see Childers, s.v.\n\npi nd apâta.\n\nVi g ."

