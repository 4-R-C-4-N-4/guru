[content]
body = "Because, O Subhûti, if I at that time had had an idea of a self, I should also have had an idea of malevolence.\n\nIf I had had an idea of a being, or of a living being, or of a person, I should also have had an idea of malevolence.\n\nAnd why?\n\nBecause, O Subhûti, I remember the past 500 births, when I was the Ri shi Kshântivâdin (preacher of endurance).\n\nAt that time also, I had no idea of a self, of a being, of a living being, of a person.\n\nTherefore then, O Subhûti, a noble-minded Bodhisattva, after putting aside all ideas, should raise his mind to the highest perfect knowledge.\n\nHe should frame his mind so as not to believe (depend) in form, sound, smell, taste, or anything that can be touched, in something (dharma), in nothing or anything.\n\nAnd why?\n\nBecause what is believed is not believed (not to be depended on).\n\nTherefore the Tathâgata preaches: \"A gift should not be given by a Bodhisattva[1] who believes in anything, it should not be given by one who believes in form, sound, smell, taste, or anything that can be touched.\" 'And again, O Subhûti, a Bodhisattva should in such wise give his gift for the benefit of all beings.\n\nAnd why?\n\nBecause, O Subhûti, the idea of a being is no-idea.\n\nAnd those who are thus spoken of by the Tathâgata as all beings are indeed no-beings.\n\nAnd why?\n\nBecause, O Subhûti, a Tathâgata says what is real, says what is true, says the things as they are; a Tathâgata does not speak untruth.\n\n'But again, O Subhûti, whatever doctrine has been [1.\n\nSee before, chap.\n\niv.] {p.\n\n129} perceived, taught, and meditated on by a Tathâgata, in it there is neither truth nor falsehood.\n\nAnd as a man who has entered the darkness would not see anything, thus a Bodhisattva is to be considered who is immersed in objects, and who being immersed in objects gives a gift.\n\nBut as a man who has eyes would, when the night becomes light, and the sun has risen, see many things, thus a Bodhisattva is to be considered who is not immersed in objects, and who not being immersed in objects gives a gift.\n\n'And again, O Subhûti, if any sons or daughters of good families will learn this treatise of the Law, will remember, recite, and understand it, and fully explain it to others, they, O Subhûti, are known by the Tathâgata through his Buddha-knowledge, they are seen, O Subhûti, by the Tathâgata through his Buddha-eye.\n\nAll these beings, O Subhûti, will produce and hold fast an immeasurable and innumerable stock of merit.' (14) XV.\n\n'And if, O Subhûti, a woman or man sacrificed in the morning as many lives as there are grains of sand in the river Gangâ and did the same at noon and the same in the evening, and if in this way they sacrificed their lives for a hundred thousands of niyutas of ko t îs of ages, and if another, after hearing this treatise of the Law, should not oppose it, then the latter would on the strength of this produce a larger stock of merit, immeasurable and innumerable."

