[content]
body = "Because that Bodhisattva, O Subhûti, who gives a gift, without believing in anything, the measure of his stock of merit is not easy to learn.'--'What do you think, O Subhûti, is it easy to learn the measure of space in the eastern quarter?' Subhûti said: 'Not indeed, O Bhagavat.'--Bhagavat said: 'In like manner, is it easy to learn the measure of space in the southern, western, northern quarters, below and above (nadir and zenith), in quarters and subquarters, in the ten quarters all round?' Subhûti said: 'Not indeed, [1.\n\nTo believe here means to depend on or ta accept as real.] {p.\n\n115} O Bhagavat.' Bhagavat said: 'In the same manner, O Subhûti, the measure of the stock of merit of a Bodhisattva, who gives a gift without believing in anything, is not easy to learn.\n\nAnd thus indeed, O Subhûti, should one who has entered on the path of Bodhisattvas give a gift, that he should not believe even in the idea of cause.' (4) V.\n\n'Now, what do you think, O Subhûti, should a Tathâgata be seen (known) by the possession of signs[1]?' Subhûti said: 'Not indeed, O Bhagavat, a Tathâgata is not to be seen (known) by the possession of signs.\n\nAnd why?\n\nBecause what has been preached by the Tathâgata as the possession of signs, that is indeed the possession of no-signs.' After this, Bhagavat spoke thus to the venerable Subhûti: 'Wherever there is, O Subhûti, the possession of signs, there is falsehood; wherever there is no possession of signs, there is no falsehood.\n\nHence the Tathâgata is to be seen (known) from no-signs as signs[2].' (5) VI.\n\nAfter this, the venerable Subhûti spoke thus to the Bhagavat: 'Forsooth, O Bhagavat, will there be any beings in the future, in the last time, in the last moment, in the last 500 years[3], during the time [1.\n\nQualities by which he could be known.\n\n2.\n\nIt would be easier to read laksha n âlaksha n atvata h , from the signs having the character of no-signs.\n\nM.\n\nde Harlez translates rightly, 'c'est par le non-marque de marquer que la Tathâgata doit être vu et reconnu.' 3.\n\nI have changed Pa ñk â s atî into Pa ñk a s atî, because what is intended here is evidently the last of the periods of 500 years each, which, according to the Mahâyâna-Buddhists, elapsed after the death of Buddha.\n\nThe following extract from the Mahâsannipâta-sûtra (Ta-tsi-king, No.\n\n61 in Tripi t aka), given to me by Mr.\n\nB.\n\nNanjio, fully explains the subject.\n\n'It is stated in the fifty-first section of the Mahâsannipâta-sûtra, that Buddha said: \"After my Nirvâ n a, in the first 500 years, all the Bhikshus and others will be strong in deliberation in my correct Law.\n\n(Those who first obtain the 'holy fruit,' i.e."

