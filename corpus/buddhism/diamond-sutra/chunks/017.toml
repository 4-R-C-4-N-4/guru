[content]
body = "Because, O Subhûti, those who were preached as beings, beings indeed, they were preached as no-beings by the Tathâgata, and therefore they are called beings.' (2 1) XXII.\n\n'What do you think then, O Subhûti, is there anything which has been known by the Tathâgata in the form of the highest perfect knowledge?' The venerable Subhûti said: 'Not indeed, O Bhagavat, there is nothing, O Bhagavat, that has been known by the Tathâgata in the form of the highest perfect knowledge.' Bhagavat said: 'So it is, Subhûti, so it is.\n\nEven the smallest thing is not known or perceived there, therefore it is called the highest perfect knowledge.' (22) XXIII.\n\n'Also, Subhûti, all is the same there, there is no difference there, and therefore it is called the highest perfect knowledge.\n\nFree from self, free from being, free from life, free from personality, that {p.\n\n139} highest perfect knowledge is always the same, and thus known with all good things.\n\nAnd why?\n\nBecause, what were preached as good things, good things indeed, O Subhûti, they were preached as no-things by the Tathâgata, and therefore they are called good things.' (23) XXIV.\n\n'And if, O Subhûti, a woman or man, putting together as many heaps of the seven treasures as there are Sumerus, kings of mountains, in the sphere of a million millions of worlds, should give them as a gift to holy and fully enlightened Tathâgatas; and, if a son or a daughter of a good family, after taking from this treatise of the Law, this Pra gñ âpâramitâ, one Gâthâ of four lines only, should teach it to others, then, O Subhûti, compared with his stock of merit, the former stock of merit would not come to the one hundredth part,' &c.[1], till 'it will not bear an approach.' (24) XXV.\n\n'What do you think then, O Subhûti, does a Tathâgatas think in this wise: Beings have been delivered by me?\n\nYou should not think so, O Subhûti.\n\nAnd why?\n\nBecause there is no being, O Subhûti, that has been delivered by the Tathâgata.\n\nAnd, if there were a being, O Subhûti, that has been delivered by the Tathâgatas, then the Tathâgata would believe in self, believe in a being, believe in a living being, and believe in a person.\n\nAnd what is called a belief in self, O Subhûti, that is preached [1.\n\nAs before, in chap.\n\nxvi.] {p.\n\n140} as no-belief by the Tathâgata.\n\nAnd this is learned by children and ignorant persons; and they who were preached as children and ignorant persons, O Subhûti, were preached as no-persons by the Tathâgata, and therefore they are called children and ignorant persons.' (25) XXVI.\n\n'What do you think then, O Subhûti, is the Tathâgata to be seen (known) by the possession of signs?' Subhûti said: 'Not indeed, O Bhagavat."

