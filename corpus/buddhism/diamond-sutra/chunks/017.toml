[content]
body = "Free from self, free from being, free from life, free from personality, that highest perfect knowledge is always the same, and thus known with all good things.\n\nAnd why?\n\nBecause, what were preached as good things, good things indeed, O Subhûti, they were preached as no-things by the Tathâgata, and therefore they are called good things.' (23) XXIV.\n\n'And if, O Subhûti, a woman or man, putting together as many heaps of the seven treasures as there are Sumerus, kings of mountains, in the sphere of a million millions of worlds, should give them as a gift to holy and fully enlightened Tathâgatas; and, if a son or a daughter of a good family, after taking from this treatise of the Law, this Pra gñ âpâramitâ, one Gâthâ of four lines only, should teach it to others, then, O Subhûti, compared with his stock of merit, the former stock of merit would not come to the one hundredth part,' &c., till 'it will not bear an approach.' (24) XXV.\n\n'What do you think then, O Subhûti, does a Tathâgatas think in this wise: Beings have been delivered by me?\n\nYou should not think so, O Subhûti.\n\nAnd why?\n\nBecause there is no being, O Subhûti, that has been delivered by the Tathâgata.\n\nAnd, if there were a being, O Subhûti, that has been delivered by the Tathâgatas, then the Tathâgata would believe in self, believe in a being, believe in a living being, and believe in a person.\n\nAnd what is called a belief in self, O Subhûti, that is preached [1.\n\nAs before, in chap.\n\nxvi.] as no-belief by the Tathâgata.\n\nAnd this is learned by children and ignorant persons; and they who were preached as children and ignorant persons, O Subhûti, were preached as no-persons by the Tathâgata, and therefore they are called children and ignorant persons.' (25) XXVI.\n\n'What do you think then, O Subhûti, is the Tathâgata to be seen (known) by the possession of signs?' Subhûti said: 'Not indeed, O Bhagavat.\n\nSo far as I know the meaning of the preaching of the Bhagavat, the Tathâgata is not to be seen (known) by the possession of signs.' Bhagavat said: 'Good, good, Subhûti, so it is, Subhûti; so it is, as you say; a Tathâgata is not to be seen (known) by the possession of signs.\n\nAnd why?\n\nBecause, O Subhûti, if the Tathâgata were to be seen (known) by the possession of signs, a wheel-turning king also would be a Tathâgata; therefore a Tathâgata is not to be seen (known) by the possession of signs.' The venerable Subhûti spoke thus to the Bhagavat: 'As I understand the meaning of the preaching of the Bhagavat, a Tathâgata is not to be seen (known) by the possession of signs.' Then the Bhagavat at that moment preached these two Gâthâs: They who saw me by form, and they who heard me by sound, They engaged in false endeavours, will not see me.\n\n[1."

