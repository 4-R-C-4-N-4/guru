[content]
body = "Because, O Bhagavat, if there were a sphere of worlds, there would exist a belief in matter; and what was preached as a belief in matter by the Tathâgata, that was  preached as no-belief by the Tathâgata; and therefore it is called a belief in matter.' Bhagavat said: 'And a belief in matter itself, O Subhûti, is unmentionable and inexpressible; it is neither a thing nor no-thing, and this is known by children and ignorant persons.' (30) XXXI.\n\n'And why?\n\nBecause, O Subhûti, if a man were to say that belief in self, belief in a being, belief in life, belief in personality had been preached by the Tathâgata, would he be speaking truly?' Subhûti said: 'Not indeed, Bhagavat, not indeed, Sugata; he would not be speaking truly.\n\nAnd why?\n\nBecause, O Bhagavat, what was preached by the Tathâgata as a belief in self, that was preached by the Tathâgata as no-belief; therefore it is called belief in self.' Bhagavat said: 'Thus then, O Subhûti, are all things to be perceived, to be looked upon, and to be believed by one who has entered on the path of the Bodhisattvas.\n\nAnd in this wise are they to be perceived, to be looked upon, and to be believed, that a man should believe neither in the idea of a thing nor in the idea of a no-thing.\n\nAnd why?\n\nBecause, by saying: The idea of a thing, the idea of a thing indeed, it has been preached by the Tathâgata as no-idea of a thing.' (31) XXXII.\n\n'And, O Subhûti, if a noble-minded Bodhisattva were to fill immeasurable and innumerable spheres of worlds with the seven treasures, and give them as a gift to holy and fully enlightened Tathâgatas;  and if a son or a daughter of a good family, after taking from this treatise of the Law, this Pra gñ âpâramitâ, one Gâthâ of four lines only, should learn it, repeat it, understand it, and fully explain it to others, then the latter would on the strength of this produce a larger stock of merit, immeasurable and innumerable.\n\nAnd how should he explain it?\n\nAs in the sky: Stars, darkness, a lamp, a phantom, dew, a bubble.\n\nA dream, a flash of lightning, and a cloud--thus we should look upon the world (all that was made).\n\nThus he should explain; therefore it is said: He should explain.' Thus spoke the Bhagavat enraptured.\n\nThe elder Subhûti, and the friars, nuns, the faithful laymen and women, and the Bodhisattvas also, and the whole world of gods, men, evil spirits and fairies, praised the preaching of the Bhagavat.\n\n(32) Thus is finished the Diamond-cutter, the blessed Pra gñ âpâramitâ.\n\nNext: The Larger Pra gñ â-pâramitâ-h ri daya-sûtra"

