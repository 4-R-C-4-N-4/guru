[content]
body = "'And again, O Subhûti, if a son or a daughter of a good family were to take as many worlds as there are grains of earth-dust in this sphere of a million millions of worlds, and reduce them to such fine dust as can be made with immeasurable strength, like what is called a mass of the smallest atoms, do you think, O Subhûti, would that be a mass of many atoms?' Subhûti said: 'Yes, Bhagavat, yes, Sugata, that would be a mass of many atoms.\n\nAnd why?\n\nBecause, O Bhagavat, if it were a mass of many atoms, Bhagavat would not call it a mass of many atoms.\n\nAnd why?\n\nBecause, what was preached as a mass of many atoms by the Tathâgata, that was preached as no-mass of atoms by the Tathâgata; and therefore it is called a mass of many atoms.\n\nAnd what was preached by the Tathâgata as the sphere of a million millions of worlds, that was preached by the Tathâgata as no-sphere of worlds; and therefore it is called the sphere of a million millions of worlds.\n\nAnd why?\n\nBecause, O Bhagavat, if there were a sphere of worlds, there would exist a belief in matter; and what was preached as a belief in matter by the Tathâgata, that was {p.\n\n143} preached as no-belief by the Tathâgata; and therefore it is called a belief in matter.' Bhagavat said: 'And a belief in matter itself, O Subhûti, is unmentionable and inexpressible; it is neither a thing nor no-thing, and this is known by children and ignorant persons.' (30) XXXI.\n\n'And why?\n\nBecause, O Subhûti, if a man were to say that belief in self, belief in a being, belief in life, belief in personality had been preached by the Tathâgata, would he be speaking truly?' Subhûti said: 'Not indeed, Bhagavat, not indeed, Sugata; he would not be speaking truly.\n\nAnd why?\n\nBecause, O Bhagavat, what was preached by the Tathâgata as a belief in self, that was preached by the Tathâgata as no-belief; therefore it is called belief in self.' Bhagavat said: 'Thus then, O Subhûti, are all things to be perceived, to be looked upon, and to be believed by one who has entered on the path of the Bodhisattvas.\n\nAnd in this wise are they to be perceived, to be looked upon, and to be believed, that a man should believe neither in the idea of a thing nor in the idea of a no-thing.\n\nAnd why?\n\nBecause, by saying: The idea of a thing, the idea of a thing indeed, it has been preached by the Tathâgata as no-idea of a thing.' (31) XXXII.\n\n'And, O Subhûti, if a noble-minded Bodhisattva were to fill immeasurable and innumerable spheres of worlds with the seven treasures, and give them as a gift to holy and fully enlightened Tathâgatas; {p.\n\n144} and if a son or a daughter of a good family, after taking from this treatise of the Law, this Pra gñ âpâramitâ, one Gâthâ of four lines only, should learn it, repeat it, understand it, and fully explain it to others, then the latter would on the strength of this produce a larger stock of merit, immeasurable and innumerable.\n\nAnd how should he explain it?"

