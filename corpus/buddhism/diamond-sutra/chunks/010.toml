[content]
body = "Therefore the Tathâgata preaches: \"A true idea, a true idea indeed!\" 'It is no wonder to me, O Bhagavat, that I accept and believe this treatise of the Law, which has been preached.\n\nAnd those beings also, O Bhagavat, [1.\n\nWill possess miraculous powers, and will be admired.]  who will exist in the future, in the last time, in the last moment, in the last 500 years, during the time of the decay of the good Law, who will learn this treatise of the Law, O Bhagavat, remember it, recite it, understand it, and fully explain it to others, they will indeed be endowed with the highest wonder.\n\n'But, O Bhagavat, there will not arise in them any idea of a self, any idea of a being, of a living being, or a person, nor does there exist for them any idea or no-idea.\n\nAnd why?\n\nBecause, O Bhagavat, the idea of a self is no-idea, and the idea of a being, or a living being, or a person is no-idea.\n\nAnd why?\n\nBecause the blessed Buddhas are freed from all ideas.' After these words, Bhagavat thus spoke to the venerable Subhûti: 'So it is, O Subhûti, so it is.\n\nThose beings, O Subhûti, who when this Sûtra was being recited here will not be disturbed or frightened or become alarmed, will be endowed with the highest wonder.\n\nAnd why?\n\nBecause, O Subhûti, this was preached by the Tathâgata, as the Paramapâramitâ, which is no-Pâramitâ.\n\nAnd, O Subhûti, what the Tathâgata preaches as the Paramapâramitâ, that was preached also by immeasurable blessed Buddhas.\n\nTherefore it is called the Paramapâramitâ.\n\n'And, O Subhûti, the Pâramitâ or the highest perfection of endurance (kshânti) belonging to a Tathâgata, that also is no-Pâramitâ.\n\nAnd why?\n\nBecause, O Subhûti, at the time when the king of Kalinga[1] cut my flesh from every limb, I had no idea of a self, of a being, of a living being, or of [1.\n\nThe Chinese text points to Kalirâ g â.\n\nOn this Kalirâ g â or Kalin ri pa see Lalita-vistara, p.\n\n191.]  a person; I had neither an idea nor no-idea.\n\nAnd why?\n\nBecause, O Subhûti, if I at that time had had an idea of a self, I should also have had an idea of malevolence.\n\nIf I had had an idea of a being, or of a living being, or of a person, I should also have had an idea of malevolence.\n\nAnd why?\n\nBecause, O Subhûti, I remember the past 500 births, when I was the Ri shi Kshântivâdin (preacher of endurance).\n\nAt that time also, I had no idea of a self, of a being, of a living being, of a person.\n\nTherefore then, O Subhûti, a noble-minded Bodhisattva, after putting aside all ideas, should raise his mind to the highest perfect knowledge.\n\nHe should frame his mind so as not to believe (depend) in form, sound, smell, taste, or anything that can be touched, in something (dharma), in nothing or anything.\n\nAnd why?\n\nBecause what is believed is not believed (not to be depended on)."

