[content]
body = "At that time, the venerable Subhûti was moved by the power of the Law, shed tears, and having wiped his tears, he thus spoke to Bhagavat: 'It is wonderful, O Bhagavat, it is exceedingly wonderful, O Sugata, how fully this teaching of the Law has been preached by the Tathâgata for the benefit of those beings who entered on the foremost path (the path that leads to Nirvâ n a), and who entered on the best path, from whence, O Bhagavat, knowledge has been produced in me.\n\nNever indeed, O Bhagavat, has such a teaching of the Law been heard by me before.\n\nThose Bodhisattvas, O Bhagavat, will be endowed with the highest wonder[1], who when this Sûtra is being preached hear it and will frame to themselves a true idea.\n\nAnd why?\n\nBecause what is a true idea is not a true idea.\n\nTherefore the Tathâgata preaches: \"A true idea, a true idea indeed!\" 'It is no wonder to me, O Bhagavat, that I accept and believe this treatise of the Law, which has been preached.\n\nAnd those beings also, O Bhagavat, [1.\n\nWill possess miraculous powers, and will be admired.] {p.\n\n127} who will exist in the future, in the last time, in the last moment, in the last 500 years, during the time of the decay of the good Law, who will learn this treatise of the Law, O Bhagavat, remember it, recite it, understand it, and fully explain it to others, they will indeed be endowed with the highest wonder.\n\n'But, O Bhagavat, there will not arise in them any idea of a self, any idea of a being, of a living being, or a person, nor does there exist for them any idea or no-idea.\n\nAnd why?\n\nBecause, O Bhagavat, the idea of a self is no-idea, and the idea of a being, or a living being, or a person is no-idea.\n\nAnd why?\n\nBecause the blessed Buddhas are freed from all ideas.' After these words, Bhagavat thus spoke to the venerable Subhûti: 'So it is, O Subhûti, so it is.\n\nThose beings, O Subhûti, who when this Sûtra was being recited here will not be disturbed or frightened or become alarmed, will be endowed with the highest wonder.\n\nAnd why?\n\nBecause, O Subhûti, this was preached by the Tathâgata, as the Paramapâramitâ, which is no-Pâramitâ.\n\nAnd, O Subhûti, what the Tathâgata preaches as the Paramapâramitâ, that was preached also by immeasurable blessed Buddhas.\n\nTherefore it is called the Paramapâramitâ.\n\n'And, O Subhûti, the Pâramitâ or the highest perfection of endurance (kshânti) belonging to a Tathâgata, that also is no-Pâramitâ.\n\nAnd why?\n\nBecause, O Subhûti, at the time when the king of Kalinga[1] cut my flesh from every limb, I had no idea of a self, of a being, of a living being, or of [1.\n\nThe Chinese text points to Kalirâ g â.\n\nOn this Kalirâ g â or Kalin ri pa see Lalita-vistara, p.\n\n191.] {p.\n\n128} a person; I had neither an idea nor no-idea.\n\nAnd why?"

