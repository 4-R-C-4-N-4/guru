[content]
body = "And if, O Subhûti, anything had been adopted by the Tathâgata, the Tathâgata Dîpankara would not have prophesied of me, saying[1]: \"Thou, O boy, wilt be in the future the holy and fully enlightened Tathâgata called S âkyamuni.\" Because then, O Subhûti, there is nothing that has been adopted by the holy and fully enlightened Tathâgata with regard to the highest perfect knowledge, therefore I was prophesied by the Tathâgata Dîpankara, saying: \"Thou, boy, wilt be in the future the holy and fully enlightened Tathâgata called S âkyamuni.\" 'And why, O Subhûti, the name of Tathâgata?\n\nIt expresses true suchness.\n\nAnd why Tathâgata, O Subhûti?\n\nIt expresses that he had no origin.\n\nAnd why Tathâgata, O Subhûti?\n\nIt expresses the destruction of all qualities.\n\nAnd why Tathâgata, O Subhûti?\n\nIt expresses one who had no origin whatever.\n\nAnd why this?\n\nBecause, O Subhûti, no-origin is the highest goal.\n\n'And whosoever, O Subhûti, should say that, by the holy and fully enlightened Tathâgata, the highest [1.\n\nThis prophecy is supposed to have been addressed by Dîpankara to S âkyamuni, before he had become a Buddha.] {p.\n\n134} perfect knowledge has been known, he would speak an untruth, and would slander me, O Subhûti, with some untruth that he has learned.\n\nAnd why?\n\nBecause there is no such thing, O Subhûti, as has been known by the Tathâgata with regard to the highest perfect knowledge.\n\nAnd in that, O Subhûti, which has been known and taught by the Tathâgata, there is neither truth nor falsehood.\n\nThetefore the Tathâgata preaches: \"All things are Buddha-things.\" And why?\n\nBecause what was preached by the Tathâgata, O Subhûti, as all things, that was preached as no-things; and therefore all things are called Buddha-things.\n\n'Now, O Subhûti, a man might have a body and a large body.' The venerable Subhûti said: That man who was spoken of by the Tathâgata as a man with a body, with a large body, he, O Bhagavat, was spoken of by the Tathâgata as without a body, and therefore he is called a man with a body and with a large body.' Bhagavat said: 'So it is, O Subhûti; and if a Bodhisattva were to say: \"I shall deliver all beings,\" he ought not to be called a Bodhisattva.\n\nAnd why?\n\nIs there anything, O Subhûti, that is called a Bodhisattva?' Subhûti said: 'Not indeed, Bhagavat, there is nothing which is called a Bodhisattva.' Bhagavat said: 'Those who were spoken of as beings, beings indeed, O Subhûti, they were spoken of as no-beings by the Tathâgata, and therefore they are called beings.\n\nTherefore the Tathâgata says: \"All beings are without self all beings are without life, without manhood[1], without a personality.\" [1.\n\nSans croissance, Harlez; see Childers, s.v.\n\nporiso.] {p."

