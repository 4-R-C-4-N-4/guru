[content]
body = "What should we say then of him who after having written it, learns it, remembers it, understands it, and fully explains it to others?\n\n'And again, O Subhûti, this treatise of the Law is {p.\n\n130} incomprehensible and incomparable.\n\nAnd this treatise of the Law has been preached by the Tathâgata for the benefit of those beings who entered on the foremost path (the path that leads to Nirvâ n a), and who entered on the best path.\n\nAnd those who will learn this treatise of the Law, who will remember it, recite it, understand it, and fully explain it to others, they are known, O Subhûti, by the Tathâgata through his Buddha-knowledge, they are seen, O Subhûti, by the Tathâgata through his Buddha-eye.\n\nAll these beings, O Subhûti, will be endowed with an immeasurable stock of merit, they will be endowed with an incomprehensible, incomparable, immeasurable and unmeasured stock of merit.\n\nAll these beings, O Subhûti, will equally remember the Bodhi (the highest Buddha-knowledge), will recite it, and understand it.\n\nAnd why?\n\nBecause it is not possible, O Subhûti, that this treatise of the Law should be heard by beings of little faith, by those who believe in self, in beings, in living beings, and in persons.\n\nIt is impossible that this treatise of the Law should be heard by beings who have not acquired the knowledge of Bodhisattvas, or that it should be learned, remembered, recited, and understood by them.\n\nThe thing is impossible.\n\n'And again, O Subhûti, that part of the world in which this Sûtra will be propounded, will have to be honoured by the whole world of gods, men, and evil spirits, will have to be worshipped, and will become like a K aitya (a holy sepulchre).' (15) XVI.\n\nAnd, O Subhûti, sons or daughters of a good family who will learn these very Sûtras, who will {p.\n\n131} remember them.\n\nrecite them, understand them, thoroughly take them to heart, and fully explain them to others, they will be overcome[1], they will be greatly overcome.\n\nAnd why?\n\nBecause, O Subhûti, whatever evil deeds these beings have done in a former birth, deeds that must lead to suffering, those deeds these beings, owing to their being overcome, after they have seen the Law, will destroy, and they will obtain the knowledge of Buddha.\n\n'I remember, O Subhûti, in the past, before innumerable and more than innumerable kalpas, there were eighty-four hundred thousands of niyutas of ko t îs of Buddhas following after the venerable and fully enlightened Tathâgata Dîpankara, who were pleased by me, and after being pleased were not displeased."

