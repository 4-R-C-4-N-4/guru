[content]
body = "All these beings, O Subhûti, will equally remember the Bodhi (the highest Buddha-knowledge), will recite it, and understand it.\n\nAnd why?\n\nBecause it is not possible, O Subhûti, that this treatise of the Law should be heard by beings of little faith, by those who believe in self, in beings, in living beings, and in persons.\n\nIt is impossible that this treatise of the Law should be heard by beings who have not acquired the knowledge of Bodhisattvas, or that it should be learned, remembered, recited, and understood by them.\n\nThe thing is impossible.\n\n'And again, O Subhûti, that part of the world in which this Sûtra will be propounded, will have to be honoured by the whole world of gods, men, and evil spirits, will have to be worshipped, and will become like a K aitya (a holy sepulchre).' (15) XVI.\n\nAnd, O Subhûti, sons or daughters of a good family who will learn these very Sûtras, who will  remember them.\n\nrecite them, understand them, thoroughly take them to heart, and fully explain them to others, they will be overcome[1], they will be greatly overcome.\n\nAnd why?\n\nBecause, O Subhûti, whatever evil deeds these beings have done in a former birth, deeds that must lead to suffering, those deeds these beings, owing to their being overcome, after they have seen the Law, will destroy, and they will obtain the knowledge of Buddha.\n\n'I remember, O Subhûti, in the past, before innumerable and more than innumerable kalpas, there were eighty-four hundred thousands of niyutas of ko t îs of Buddhas following after the venerable and fully enlightened Tathâgata Dîpankara, who were pleased by me, and after being pleased were not displeased.\n\nAnd if, O Subhûti, these blessed Buddhas were pleased by me, and after being pleased were not displeased, and if on the other hand people at the last time, at the last moment, in the last 500 years, during the time of the decay of the good Law, will learn these very Sûtras, remember them, recite them, understand them, and fully explain them to others, then, O Subhûti, in comparison with their stock of merit that former stock of merit will not come to one hundredth part, nay, not to one thousandth part, not to a hundred thousandth part, not to a ten millionth part, not to a hundred millionth part, not to a hundred thousand ten millionth part, not to a hundred thousands of niyutas ten millionth part.\n\nIt will not bear number, nor fraction, nor counting, nor comparison, nor approach, nor analogy.\n\n'And if, O Subhûti, I were to tell you the stock of [1.\n\nParibhûta is explained by despised, but the sense, or even the non-sense, is difficult to understand.]  merit of those sons or daughters of good families, and how large a stock of merit those sons or daughters of good families will produce, and hold fast at that time, people would become distracted and their thoughts would become bewildered.\n\nAnd again, O Subhûti, as this treatise of the Law preached by the Tathâgata is incomprehensible and incomparable, its rewards also must be expected (to be) incomprehensible.' (16) XVII."

