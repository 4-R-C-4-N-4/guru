[content]
body = "'What do you think, O Subhûti, if a son or a daughter of a good family should fill this sphere of a million millions of worlds with the seven treasures, and give it as a gift to holy and fully enlightened Buddhas, would that son or daughter of a good family produce on the strength of this a large stock of merit?' Subhûti said: 'Yes, a large one.' Bhagavat said: 'So it is, Subhûti, so it is; that son or daughter of a good family would produce on the strength of this a large stock of merit, immeasurable and innumerable.\n\nAnd why?\n\nBecause what was preached as a stock of merit, a stock of merit indeed, O Subhûti, that was preached as no-stock {p.\n\n137} of merit by the Tathâgata, and therefore it is called a stock of merit.\n\nIf, O Subhûti, there existed a stock of merit, the Tathâgata would not have preached: \"A stock of merit, a stock of merit indeed!\"'(19) XX.\n\n'What do you think then, O Subhûti, is a Tathâgata to be seen (known) by the shape of his visible body?' Subhûti said: 'Not indeed, O Bhagavat, a Tathâgata is not to be seen (known) by the shape of his visible body.\n\nAnd why?\n\nBecause, what was preached, O Bhagavat, as the shape of the visible body, the shape of the visible body indeed, that was preached by the Tathâgata as no-shape of the visible body, and therefore it is called the shape of the visible body.' Bhagavat said: 'What do you think, O Subhûti, should a Tathâgata be seen (known) by the possession of signs?' Subhûti said: 'Not indeed, O Bhagavat, a Tathâgata is not to be seen (known) by the possession of signs.\n\nAnd why?\n\nBecause, what was preached by the Tathâgata as the possession of signs, that was preached as no-possession of signs by the Tathâgata, and therefore it is called the possession of signs.' (20) XXI.\n\nBhagavat said: 'What do you think, O Subhûti, does the Tathâgata think in this wise: The Law has been taught by me?' Subhûti said: 'Not indeed, O Bhagavat, does the Tathâgata think in this wise: The Law has been taught by me.' Bhagavat said: 'If a man should say that the Law has been taught by the Tathâgata, he would say what is not true; he {p.\n\n138} would slander me with untruth which he has learned.\n\nAnd why?\n\nBecause, O Subhûti, it is said the teaching of the Law, the teaching of the Law indeed.\n\nO Subhûti, there is nothing that can be perceived by the name of the teaching of the Law.' After this, the venerable Subhûti spoke thus to the Bhagavat: 'Forsooth, O Bhagavat, will there be any beings in the future, in the last time, in the last moment, in the last 500 years, during the time of the decay of the good Law, who, when they have heard these very Laws, will believe?' Bhagavat said: 'These, O Subhûti, are neither beings nor no-beings.\n\nAnd why?"

