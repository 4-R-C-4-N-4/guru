[content]
body = "observes that pa kkh abhatta m pi nd apâtapa t ikkânto is a {Greek ú!oteron próteron }, as it means, having returned from his rounds, and then made his meal on the food obtained on his rounds.\n\n4.\n\nPâli pa ññ ata.\n\n5.\n\nBurnouf, Lotus, p.\n\n334.] {p.\n\n113} fully enlightened!\n\nIt is wonderful how much the noble-minded Bodhisattvas have been instructed[1] with the highest instruction by the Tathâgata, the holy and fully enlightened!\n\nHow then, O Bhagavat, should the son or the daughter of a good family, after having entered on the path of the Bodhisattvas, behave, how should he advance, and how should he restrain his thoughts?' After the venerable Subhûti had thus spoken, Bhagavat said to him: 'Well said, well said, Subhûti!\n\nSo it is, Subhûti, so it is, as you say.\n\nThe noble-minded Bodhisattvas have been favoured with the highest favour by the Tathâgata, the noble-minded Bodhisattvas have been instructed with the highest instruction by the Tathâgata.\n\nTherefore, O Subhûti, listen and take it to heart, well and rightly.\n\nI shall tell you, how any one who has entered on the path of Bodhisanvas should behave, how he should advance, and how he should restrain his thoughts.' Then the venerable Subhûti answered the Bhagavat and said: 'So be it, O Bhagavat.' (2) III.\n\nThen the Bhagavat thus spoke to him: 'Any one, O Subhûti, who has entered here on the path of the Bodhisattvas must thus frame his thought: As many beings as there are in this world of beings, comprehended under the term of beings (either born of eggs, or from the womb, or from moisture, or miraculously), with form or without form, with name or without name, or neither with nor without name, as far as [1.\n\nI have followed the Chinese translator, who translates parîndita by instructed, entrusted, not by protected.] {p.\n\n114} any known world of beings is known, all these must be delivered by me in the perfect world of Nirvâ n a.\n\nAnd yet, after I have thus delivered immeasurable beings, not one single being has been delivered.\n\nAnd why?\n\nIf, O Subhûti, a Bodhisattva had any idea of (belief in) a being, he could not be called a Bodhisattva (one who is fit to become a Buddha).\n\nAnd why?\n\nBecause, O Subhûti, no one is to be called a Bodhisattva, for whom there should exist the idea of a being, the idea of a living being, or the idea of a person.' (3) IV.\n\n'And again, O Subhûti, a gift should not be given by a Bodhisattva, while he believes[1] in objects; a gift should not be given by him, while he believes in anything; a gift should not be given by him, while he believes in form; a gift should not be given by him, while he believes in the special qualities of sound, smell, taste, and touch.\n\nFor thus, O Subhûti, should a gift be given by a noble-minded Bodhisattva, that he should not believe even in the idea of cause.\n\nAnd why?"

