[content]
body = "Therefore it is called the Pra gñ â-pâramitâ.\n\n'Then, what do you think, O Subhûti, is there anything (dharma) that was preached by the Tathâgata?' Subhûti said: 'Not indeed, O Bhagvat, there is not anything that was preached by the Tathâgata.' Bhagavat said.\n\n'What do you think then, O Subhûti,--the dust of the earth which is found in this sphere of a million millions of worlds, is that much?' Subhûti said: 'Yes, O Bhagavat, yes, O Sugata, that dust of the earth would be much.\n\nAnd why?\n\nBecause, O Bhagavat, what was preached by the Tathâgata as the dust of the earth, that was preached by the Tathâgata as no-dust.\n\nTherefore it is called the dust of the earth.\n\nAnd what was preached by the Tathâgata as the sphere of worlds, that was preached by the Tathâgata as no-sphere.\n\nTherefore it is called the sphere of worlds.' Bhagavat said: 'What do you think, O Subhûti, is a holy and fully enlightened Tathâgata to be seen (known) by the thirty-two signs of a hero?' Subhûti said: 'No indeed, O Bhagavat; a holy and fully enlightened Tathâgata is not to be seen (known) by the thirty-two signs of a hero.\n\nAnd why?\n\nBecause what was preached by the Tathâgata as the thirty-two signs of a hero, that was preached by the Tathâgata as no-signs.\n\nTherefore they are called the thirty-two signs of a hero.' Bhagavat said: 'If, O Subhûti, a woman or man should day by day sacrifice his life (selfhood[1]) as [1.\n\nÂtmabhâva seems to refer here to the living body, not to the spiritual Âtman, which, according to Buddha, can be got rid of by knowledge only.\n\nBuddha himself sacrificed his life again and again, and a willingness to die would probably be accepted for the deed.] many times as there are grains of sand in the river Gangâ, and if he should thus sacrifice his life for as many kalpas as there are grains of sand in the river Gangâ, and if another man, after taking from this treatise of the Law one Gâthâ of four lines only, should fully teach others and explain it, he indeed would on the strength of this produce a larger stock of merit, immeasurable and innumerable.' (13) XIV.\n\nAt that time, the venerable Subhûti was moved by the power of the Law, shed tears, and having wiped his tears, he thus spoke to Bhagavat: 'It is wonderful, O Bhagavat, it is exceedingly wonderful, O Sugata, how fully this teaching of the Law has been preached by the Tathâgata for the benefit of those beings who entered on the foremost path (the path that leads to Nirvâ n a), and who entered on the best path, from whence, O Bhagavat, knowledge has been produced in me.\n\nNever indeed, O Bhagavat, has such a teaching of the Law been heard by me before.\n\nThose Bodhisattvas, O Bhagavat, will be endowed with the highest wonder[1], who when this Sûtra is being preached hear it and will frame to themselves a true idea.\n\nAnd why?\n\nBecause what is a true idea is not a true idea."

