[content]
body = "Because, O Subhûti, when the Tathâgata preached: Numbers of worlds, numbers of worlds indeed!\n\nthey were preached by him as no-numbers.\n\nTherefore they are called numbers of worlds.\n\n'Therefore, O Subhûti, a noble-minded Bodhisattva should in this wise frame an independent [1.\n\nA former Buddha.] {p.\n\n123} mind, which is to be framed as a mind not believing in anything, not believing in form, not believing in sound, smell, taste, and anything that can be touched.\n\nNow, for instance, O Subhûti, a man might have a body and a large body, so that his size should be as large as the king of mountains, Sumeru.\n\nDo you think then, O Subhûti, that his selfhood (he himself) would be large?' Subhûti said: 'Yes, O Bhagavat, yes, O Sugata, his selfhood would be large.\n\nAnd why?\n\nBecause, O Bhagavat, when the Tathâgata preached: \"Selfhood, selfhood indeed!\" it was preached by him as no-selfhood.\n\nTherefore it is called selfhood.' (10) XI.\n\nBhagavat said: 'What do you think, O Subhûti, if there were as many Gangâ rivers as there are grains of sand in the large river Gangâ, would the grains of sand be many?' Subhûti said: 'Those Gangâ rivers would indeed be many, much more the grains of sand in those Gangâ rivers.' Bhagavat said: 'I tell you, O Subhûti, I announce to you, If a woman or man were to fill with the seven treasures as many worlds as there would be grains of sand in those Gangâ rivers and present them as a gift to the holy and fully enlightened Tathâgatas--What do you think, O Subhûti, would that woman or man on the strength of this produce a large stock of merit?' Subhûti said: 'Yes, O Bhagavat, yes, O Sugata, that woman or man would on the strength of this produce a large stock of merit, immeasurable and innumerable.' Bhagavat said: 'And if, O Subhûti, a woman or man having filled so many worlds with the seven treasures should give them as a gift to the holy and enlightened Tathâgatas, {p.\n\n124} and if another son or daughter of a good family, after taking from this treatise of the Law one Gâthâ of four lines only, should fully teach others and explain it, he, indeed, would on the strength of this produce a larger stock of merit, immeasurable and innumerable.' (11) XII.\n\n'Then again, O Subhûti, that part of the world in which, after taking from this treatise of the Law one Gâthâ of four lines only, it should be preached or explained, would be like a K aitya (holy shrine) for the whole world of gods, men, and spirits; what should we say then of those who learn the whole of this treatise of the Law to the end, who repeat it, understand it, and fully explain it to others?\n\nThey, O Subhûti, will be endowed with the highest wonder[1].\n\nAnd in that place, O Subhûti, there dwells the teacher[2], or one after another holding the place of the wise preceptor[3].' (12) XIII."

