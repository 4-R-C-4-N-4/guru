[content]
body = "And if, O Subhûti, these blessed Buddhas were pleased by me, and after being pleased were not displeased, and if on the other hand people at the last time, at the last moment, in the last 500 years, during the time of the decay of the good Law, will learn these very Sûtras, remember them, recite them, understand them, and fully explain them to others, then, O Subhûti, in comparison with their stock of merit that former stock of merit will not come to one hundredth part, nay, not to one thousandth part, not to a hundred thousandth part, not to a ten millionth part, not to a hundred millionth part, not to a hundred thousand ten millionth part, not to a hundred thousands of niyutas ten millionth part.\n\nIt will not bear number, nor fraction, nor counting, nor comparison, nor approach, nor analogy.\n\n'And if, O Subhûti, I were to tell you the stock of [1.\n\nParibhûta is explained by despised, but the sense, or even the non-sense, is difficult to understand.] {p.\n\n132} merit of those sons or daughters of good families, and how large a stock of merit those sons or daughters of good families will produce, and hold fast at that time, people would become distracted and their thoughts would become bewildered.\n\nAnd again, O Subhûti, as this treatise of the Law preached by the Tathâgata is incomprehensible and incomparable, its rewards also must be expected (to be) incomprehensible.' (16) XVII.\n\nAt that time the venerable Subhûti thus spoke to the Bhagavat: 'How should a person, after having entered on the path of the Bodhisattvas, behave, how should he advance, and how should he restrain his thoughts?' Bhagavat said: 'He who has entered on the path of the Bodhisativas should thus frame his thought: All beings must be delivered by me in the perfect world of Nirvâ n a; and yet after I have thus delivered these beings, no being has been delivered.\n\nAnd why?\n\nBecause, O Subhûti, if a Bodhisattva had any idea of beings, he could not be called a Bodhisattva, and so on[1] from the idea of a living being to the idea of a person; if he had any such idea, he could not be called a Bodhisattva.\n\nAnd why?\n\nBecause, O Subhûti, there is no such thing (dharma) as one who has entered on the path of the Bodhisattvas.\n\n'What do you think, O Subhûti, is there anything which the Tathâgata has adopted from the Tathâgata Dîpankara with regard to the highest perfect knowledge?\n\n'After this, the venerable Subhûti [1.\n\nSee chap.\n\niii, p.\n\n114.] {p.\n\n133} spoke thus to the Bhagavat: 'As far as I, O Bhagavat, understand the meaning of the preaching of the Bhagavat, there is nothing which has been adopted by the Tathâgata from the holy and fully enlightened Tathâgata Dîpankara with regard to the highest perfect knowledge.' After this, Bhagavat thus spoke to the venerable Subhûti: 'So it is, Subhûti, so it is.\n\nThere is not, O Subhûti, anything which has been adopted by the Tathâgata from the holy and fully enlightened Tathâgata Dîpankara with regard to the highest perfect knowledge."

