[content]
body = "At that time the venerable Subhûti thus spoke to the Bhagavat: 'How should a person, after having entered on the path of the Bodhisattvas, behave, how should he advance, and how should he restrain his thoughts?' Bhagavat said: 'He who has entered on the path of the Bodhisativas should thus frame his thought: All beings must be delivered by me in the perfect world of Nirvâ n a; and yet after I have thus delivered these beings, no being has been delivered.\n\nAnd why?\n\nBecause, O Subhûti, if a Bodhisattva had any idea of beings, he could not be called a Bodhisattva, and so on[1] from the idea of a living being to the idea of a person; if he had any such idea, he could not be called a Bodhisattva.\n\nAnd why?\n\nBecause, O Subhûti, there is no such thing (dharma) as one who has entered on the path of the Bodhisattvas.\n\n'What do you think, O Subhûti, is there anything which the Tathâgata has adopted from the Tathâgata Dîpankara with regard to the highest perfect knowledge?\n\n'After this, the venerable Subhûti [1.\n\nSee chap.\n\niii, p.\n\n114.] spoke thus to the Bhagavat: 'As far as I, O Bhagavat, understand the meaning of the preaching of the Bhagavat, there is nothing which has been adopted by the Tathâgata from the holy and fully enlightened Tathâgata Dîpankara with regard to the highest perfect knowledge.' After this, Bhagavat thus spoke to the venerable Subhûti: 'So it is, Subhûti, so it is.\n\nThere is not, O Subhûti, anything which has been adopted by the Tathâgata from the holy and fully enlightened Tathâgata Dîpankara with regard to the highest perfect knowledge.\n\nAnd if, O Subhûti, anything had been adopted by the Tathâgata, the Tathâgata Dîpankara would not have prophesied of me, saying[1]: \"Thou, O boy, wilt be in the future the holy and fully enlightened Tathâgata called S âkyamuni.\" Because then, O Subhûti, there is nothing that has been adopted by the holy and fully enlightened Tathâgata with regard to the highest perfect knowledge, therefore I was prophesied by the Tathâgata Dîpankara, saying: \"Thou, boy, wilt be in the future the holy and fully enlightened Tathâgata called S âkyamuni.\" 'And why, O Subhûti, the name of Tathâgata?\n\nIt expresses true suchness.\n\nAnd why Tathâgata, O Subhûti?\n\nIt expresses that he had no origin.\n\nAnd why Tathâgata, O Subhûti?\n\nIt expresses the destruction of all qualities.\n\nAnd why Tathâgata, O Subhûti?\n\nIt expresses one who had no origin whatever.\n\nAnd why this?\n\nBecause, O Subhûti, no-origin is the highest goal.\n\n'And whosoever, O Subhûti, should say that, by the holy and fully enlightened Tathâgata, the highest [1."

