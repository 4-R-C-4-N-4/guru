[content]
body = "the Srota-âpannas, are called those who have obtained deliberation.) In the next or second 500 years, they will be strong in meditation.\n\nIn the next or third 500 years, they will be strong in 'much learning,' i.e.\n\nbahu s ruta, religious knowledge.\n\nIn the next or fourth 500 years, they will be strong in founding monasteries, &c.\n\nIn the last or fifth 500 years, they will be strong in fighting and reproving.\n\nThe pure (lit.\n\nwhite) Law will then become invisible.\"' The question therefore amounts to this, whether in that corrupt age the law of Buddha will be understood?\n\nand the answer is, that there will be always some excellent Boddhisatvas who, even in the age of corruption, can understand the preaching of the Law.] {p.\n\n116} of the decay of the good Law, who, when these very words of the Sûtras are being preached, will frame a true idea[1]?' The Bhagavat said: 'Do not speak thus, Subhûti.\n\nYes, there will be some beings in the future, in the last time, in the last moment, in the last 500 years, during the decay of the good Law, who will frame a true idea when these very words are being preached.\n\n'And again, O Subhûti, there will be noble-minded Bodhisattvas, in the future, in the last time, in the last moment, in the last 500 years, during the decay of the good Law, there will be strong and good and wise beings, who, when these very words of the Sûtras are being preached, will frame a true idea.\n\nBut those noble-minded Bodhisattvas, O Subhûti, will not have served one Buddha only, and the stock [1.\n\nWill understand them properly.] {p.\n\n117} of their merit will not have been accumulated under one Buddha only; on the contrary, O Subhûti, those noble-minded Bodhisattvas will have served many hundred thousands of Buddhas, and the stock of their merit will have been accumulated under many hundred thousands of Buddhas; and they, when these very words of the Sûtras are being preached, will obtain one and the same faith[1].\n\nThey are known, O Subhûti, by the Tathâgata through his Buddha-knowledge; they are seen, O Subhûti, by the Tathâgata through his Buddha-eye; they are understood, O Subhûti, by the Tathâgata.\n\nAll these, O Subhûti, will produce and will hold fast an immeasurable and innumerable stock of merit.\n\nAnd why?\n\nBecause, O Subhûti, there does not exist in those noble-minded Bodhisattvas the idea of self, there does not exist the idea of a being, the idea of a living being, the idea of a person.\n\nNor does there exist, O Subhûti, for these noble-minded Bodhisattvas the idea of quality (dharma), nor of no-quality.\n\nNeither does there exist, O Subhûti, any idea (sa mgñ â) or no-idea.\n\nAnd why?\n\nBecause, O Subhûti, if there existed for these noble-minded Bodhisattvas the idea of quality, then they would believe in a self, they would believe in a being, they would believe in a living being, they would believe in a person.\n\nAnd if there existed for them the idea of no-quality, even then they would believe in a self, [1.\n\nI am doubtful about the exact meaning of eka k ittaprasâda."

