[content]
body = "Therefore the Tathâgata preaches: \"A stock of merit, a stock of merit indeed!\"' Bhagavat said: 'And if, O Subhûti, the son or daughter of a good family should fill this sphere of a million millions of worlds with the seven treasures and should give it as a gift to the holy and enlightened Tathâgatas, and if another after taking from this treatise of the Law one Gâthâ of four lines only should fully teach others and explain it, he indeed would on the strength of this produce a larger stock of merit immeasurable and innumerable.\n\nAnd why?\n\nBecause, O Subhûti, the highest perfect knowledge of the holy and enlightened Tathâgatas is produced from it; the blessed Buddhas are produced from it.\n\nAnd why?\n\nBecause, O Subhûti, when the Tathâgata preached: [1.\n\nSee Childers, s.v.\n\nLokadhâtu.\n\n2.\n\nOr should it be, bhâshate*pu n yaskandha h pu n yaskandha iti, i.e.\n\nhe preaches no-stock of merit is the stock of merit?\n\nIt would not be applicable to later passages, but the style of the Sûtras varies.] {p.\n\n120} \"The qualities of Buddha, the qualities of Buddha indeed!\" they were preached by him as no-qualities of Buddha.\n\nTherefore they are called the qualities of Buddha.' (8) IX.\n\nBhagavat said: 'Now, what do you think, O Subhûti, does a Srota-âpanna think in this wise: The fruit of Srota-âpatti has been obtained by me?' Subhûti said: 'Not indeed, O Bhagavat, a Srota-âpanna does not think in this wise: The fruit of Srota-âpatti has been obtained by me.\n\nAnd why?\n\nBecause, O Bhagavat, he has not obtained any particular state (dharma).\n\nTherefore he is called a Srota-âpanna.\n\nHe has not obtained any form, nor sounds, nor smells, nor tastes, nor things that can be touched.\n\nTherefore he is called a Srota-âpanna.\n\nIf, O Bhagavat, a Srota-âpanna were to think in this wise: The fruit of Srota-âpatti has been obtained by me, he would believe in a self, he would believe in a being, he would believe in a living being, he would believe in a person.' Bhagavat said: 'What do you think, O Subhûti, does a Sak ri dâgâmin think in this wise: The fruit of a Sak ri dâgâmin has been obtained by me?' Subhûti said: 'Not indeed, O Bhagavat, a Sak ri dâgâmin [1.\n\nThis phrase is wanting in the Sanskrit MSS., but it is found in the Chinese translation of Dharmagupta, of the Sui dynasty (A.\n\nD.\n\n589-618).\n\n2.\n\nSrota-âpanna, a man who has obtained the first grade of sanctification, literally, who has entered the stream.\n\nThe second grade is that of the Sak ri dâgâmin, who returns once.\n\nThe third grade is that of the Anâgâmin, who does not return at all, but is born in the Brahman world from whence he becomes an Arhat and may obtain Nirvâ n a.] {p.\n\n121} does not think in this wise: The fruit of a Sak ri dâgâmin has been obtained by me.\n\nAnd why?"

