[content]
body = "Because he is not an individual being (dharma), who has obtained the state of a Sak ri dâgâmin.\n\nTherefore he is called a Sak ri dâgâmin.' Bhagavat said: 'What do you think, O Subhûti, does an Anâgâmin think in this wise: The fruit of an Anâgâmin has been obtained by me?' Subhûti said: 'Not indeed, O Bhagavat, an Anâgâmin does not think in this wise: The fruit of an Anâgâmin has been obtained by me.\n\nAnd why?\n\nBecause he is not an individual being, who has obtained the state of an Anâgâmin.\n\nTherefore he is called an Anâgâmin.' Bhagavat said: 'What do you think, O Subhûti, does an Arhat think in this wise: The fruit of an Arhat has been obtained by me?' Subhûti said: 'Not indeed, O Bhagavat, an Arhat does not think in this wise: The fruit of an Arhat has been obtained by me.\n\nAnd why?\n\nBecause he is not an individual being, who is called an Arhat.\n\nTherefore he is called an Arhat.\n\nAnd if, O Bhagavat, an Arhat were to think in this wise: The state of an Arhat has been obtained by me, he would believe in a self, he would believe in a being, he would believe in a living being, he would believe in a person.\n\n'And why?\n\nI have been pointed out, O Bhagavat, by the holy and fully enlightened Tathâgata, as the foremost of those who dwell in virtue[1].\n\n[1.\n\nAra n âvihârin.\n\nRa n a is strife, then sin, therefore ara n a might be peace and virtue, only the a would be short.\n\nProbably ara n avihârin was formed with reference to âra n ya-vihârin, living in the forest, retired from the world, and in peace, just as arhan, worthy, was changed into arahan, the destroyer of sin.\n\nBeal translates, 'one who delights in the mortification of an Ara n yaka (forest devotee).' De Harlez: 'chey de ceux qui ne sont plus attachés à la jouissance.'] {p.\n\n122} I, O Bhagavat, am an Arhat, freed from passion.\n\nAnd yet, O Bhagavat, I do not think in this wise: I am an Arhat, I am freed from passion.\n\nIf, O Bhagavat, I should think in this wise, that the state of an Arhat has been obtained by me, then the Tathâgata would not have truly prophesied of me, saying: \"Subhûti, the son of a good family, the foremost of those dwelling in virtue, does not dwell anywhere, and therefore he is called a dweller in virtue, a dweller in virtue indeed!\"' (9) X.\n\nBhagavat said: 'What do you think, O Subhûti, is there anything (dharma) which the Tathâgata has adopted from the Tathâgata Dîpankara[1], the holy and fully enlightened?' Subhûti said: 'Not indeed, O Bhagavat; there is not anything which the Tathâgata has adopted from the Tathâgata Dîpankara, the holy and fully enlightened.' Bhagavat said: 'If, O Subhûti, a Bodhisattva should say: \"I shall create numbers of worlds,\" he would say what is untrue.\n\nAnd why?"

