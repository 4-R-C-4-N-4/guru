[content]
body = "Childers gives eka k itta, as an adjective, with the meaning of 'having the same thought,' and k ittaprasâda, as faith in Buddha.\n\nBut eka k ittaprasâda may also be 'faith producted by one thought,' 'immediate faith,' and this too is a recognised form of faith in Buddhism.\n\nSee Sukhâvatî, pp.\n\n71, 108.] {p.\n\n118} they would believe in a being, they would believe in a living being, they would believe in a person.\n\nAnd why?\n\nBecause, O Subhûti, neither quality nor no-quality is to be accepted by a noble-minded Bodhisattva.\n\nTherefore this hidden saying has been preached by the Tathâgata: \"By those who know the teaching of the Law, as like unto a raft, all qualities indeed must be abandoned; much more no-qualities[1]\"' (6) VII.\n\nAnd again Bhagavat spoke thus to the venerable Subhûti: 'What do you think, O Subhûti, is there anything (dharma) that was known by the Tathâgata under the name of the highest perfect knowledge, or anything that was taught by the Tathâgata?' After these words, the venerable Subhûti spoke thus to Bhagavat: 'As I, O Bhagavat, understand the meaning of the preaching of the Bhagavat, there is nothing that was known by the Tathâgata under the name of the highest perfect knowledge, nor is there anything that is taught by the Tathâgata.\n\nAnd why?\n\nBecause that thing which was known or taught by the Tathâgata is incomprehensible and inexpressible.\n\nIt is neither a thing nor no-thing.\n\nAnd why?\n\nBecause the holy persons[2] are of imperfect power[3].' (7) [1.\n\nThe same line is quoted in the Abhidharmakosha-vyâkhyâ.\n\n2.\n\nÂryapudgala need not be Bodhisattvas, but all who have entered on the path leading to Nirvâ n a.\n\n3.\n\nHarlez: 'Parceque les entités supérieures sont produites telles sans être réelles et parfaites pour cela.' If sa m sk ri ta can be used in Buddhist literature in the sense of perfect, and prabhâvitâ as power, my translation might pass, but even then the 'because' remains difficult.] {p.\n\n119} VIII.\n\nBhagavat said: 'What do you think, O Subhûti, if a son or daughter of a good family filled this sphere of a million millions of worlds with the seven gems or treasures, and gave it as a gift to the holy and enlightened Tathâgatas, would that son or daughter of a good family on the strength of this produce a large stock of merit?' Subhûti said: 'Yes, O Bhagavat, yes, O Sugata, that son or daughter of a good family would on the strength of this produce a large stock of merit.\n\nAnd why?\n\nBecause, O Bhagavat, what was preached by the Tathâgata as the stock of merit, that was preached by the Tathâgata as no-stock of merit."

