[content]
body = "Fausböll seems inclined to take âsava in this passage, and in the other passages where it occurs, as the Pâli representative of â s raya.\n\nBut â s raya, in Buddhist phraseology, means rather the five organs of sense with manas, 'the soul,' and these are kept distinct from the âsavas, 'the inclinations, the appetites, passions, or vices.' The commentary on the Abhidharma, when speaking of the Yogâ k âras, says, 'En réunissant ensemble les réceptacles (â s r ya), les choses reçues (â s rita) et les supports (âlambana), qui sont chacun composés de six termes, on a dix-huit termes qu'on appelle \"Dhâtus\" ou contenants.\n\nLa collection des six réceptacles, ce sont les organes de la vue, de l'ouïe, de l'odorat, du goût, du toucher, et le \"manas\" (ou l'organe du coeur), qui est le dernier.\n\nLa collection des six choses reçues, c'est la connaissance produite par la vue et par les autres sens jusqu'au \"manas\" inclusivement.\n\nLa collection des six supports, ce sont la forme et les autres attributs sensibles jusqu'au \"Dharma\" (la loi ou l'être) inclusivement.' See Burnouf, Introduction, p.\n\n449.\n\nParinibbuta is again a technical term, the Sanskrit pariniv ri ta meaning 'freed from all worldly fetters,' like vimukta.\n\nSee Burnouf, Introduction, p.\n\n590.\n\nSee Childers, s.v.\n\nnibbâna, p.\n\n270, and Notes on Dhammapada, p.\n\n3; and D'Alwis, Buddhist Nirvâ n a, p.\n\n75.] p.\n\n26 to anything, rejoice in freedom from attachment, whose appetites have been conquered, and who are full of light, are free (even) in this world.\n\nThe Venerable (Arhat)."

