body = "p.\n\n12 CHAPTER III.\n\nTHOUGHT.\n\n33.\n\nAs a fletcher makes straight his arrow, a wise man makes straight his trembling and unsteady thought, which is difficult to guard, difficult to hold back.\n\n34.\n\nAs a fish taken from his watery home and thrown on dry ground, our thought trembles all over in order to escape the dominion of Mâra (the tempter).\n\n35.\n\nIt is good to tame the mind, which is difficult to hold in and flighty, rushing wherever it listeth; a tamed mind brings happiness.\n\n36.\n\nLet the wise man guard his thoughts, for they are difficult to perceive, very artful, and they rush wherever they list: thoughts well guarded bring happiness.\n\n37.\n\nThose who bridle their mind which travels far, moves about alone, is without a body, and hides in the chamber (of the heart), will be free from the bonds of Mâra (the tempter).\n\n38.\n\nIf a man's thoughts are unsteady, if he does not know the true law, if his peace of mind is troubled, his knowledge will never be perfect.\n\n39.\n\nIf a man's thoughts are not dissipated, if [33.\n\nCf.\n\nG âtaka, vol.\n\ni.\n\np.\n\n400.\n\n34.\n\nOn Mâra, see verses 7 and 8 .\n\n35-39.\n\nCf.\n\nG âtaka, vol.\n\ni.\n\npp.\n\n312, 400.\n\n39.\n\nFausböll traces anavassuta, 'dissipated,' back to the Sanskrit root s yai, 'to become rigid;' but the participle of that root would be s îta, not s yuta.\n\nProfessor Weber suggests that anavassuta stands for the Sanskrit anavasruta, which he translates unbefleckt, 'unspotted.' If avasruta were the right word; it might be taken in the sense of 'not fallen off, not fallen away,' but it could not mean 'unspotted;' cf.\n\ndhairya m no 'susruvat, 'our firmness ran away.' I have little doubt, however, that avassuta represents the Sanskrit ava s ruta, and is derived from the root s ru, here used in its technical sense, peculiar to the Buddhist literature, and so well explained by Burnouf in his Appendix XIV (Lotus, p.\n\n820).\n\nHe shows that, according to Hema k andra and the G ina-ala n kâra, â s ravakshaya, Pâli âsavasa m khaya is counted as the sixth abhi gñ â, wherever six of these intellectual powers are mentioned, instead of five.\n\nThe Chinese translate the term in their Own Chinese fashion by 'stillationis finis,' but Burnouf claims for it the definite sense of destruction of faults or vices.\n\nHe quotes from the Lalita-vistara (Adhyâya XXII, ed.\n\nRâjendra Lal Mittra, p.\n\n448) the words uttered by Buddha when he arrived at his complete Buddhahood:-- S ushkâ â s ravâ na puna h s ravanti, 'The vices are dried up, they will not flow again;' and he shows that the Pâli Dictionary, the Abhidhânappadîpikâ, explains âsava simply by kâma, 'love, pleasure of the senses.' In the Mahâparinibbâna-sutta, three classes of âsava are distinguished, the kâmâsavâ, the bhavâsavâ, and the avi gg âsavâ.\n\nSee also Burnouf, Lotus, p.\n\n665; Childers, s.v.\n\nâsavo."

