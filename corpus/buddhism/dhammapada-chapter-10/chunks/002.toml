body = "He who inflicts pain on innocent and harmless persons, will soon come to one of these ten states: [133.\n\nSee Mahâbhârata XII, 4056.\n\n134.\n\nSee Childers, s.v.\n\nnibbâna, p.\n\n270, and s.v.\n\nkâ m so; D'Alwis, Buddhist Nirvâ n a, p.\n\n35.\n\n136.\n\nThe metaphor of 'burning' for 'suffering' is very common in Buddhist literature.\n\nEverything burns, i.e.\n\neverything suffers, was one of the first experiences of Buddha himself.\n\nSee v.\n\n146 .] p.\n\n38 138.\n\nHe will have cruel suffering, loss, injury of the body, heavy affliction, or loss of mind, 139.\n\nOr a misfortune coming from the king, or a fearful accusation, or loss of relations, or destruction of treasures, 140.\n\nOr lightning-fire will burn his houses; and when his body is destroyed, the fool will go to hell.\n\n141.\n\nNot nakedness, not platted hair, not dirt, not fasting, or lying on the earth, not rubbing with dust, [138.\n\n'Cruel suffering' is explained by sîsaroga, 'headache,' &c.\n\n'Loss' is taken for loss of money.\n\n'Injury of the body' is held to be the cutting off of the arm, and other limbs.\n\n'Heavy afflictions' are, again, various kinds of diseases.\n\n139.\n\nUpasarga means 'accident, misfortune.' Dr.\n\nFausböll translates râ g ato va upassaggam by 'fulgentis (lunae) defectionem;' Dr.\n\nWeber by 'Bestrafung vom König;' Beal by 'some governmental difficulty.' Abbhakkhânam, Sanskrit abhyâkhyânam, is a heavy accusation for high treason, or similar offences.\n\nBeal translates, 'some false accusation.' The 'destruction of pleasures or treasures' is explained by gold being changed to coals (see Buddhaghosha's Parables, p.\n\n98; Thiessen, Kisâgotamî, p.\n\n6), pearls to cotton seed, corn to potsherds, and by men and cattle becoming blind, lame, &c.\n\n141.\n\nCf.\n\nHibbert Lectures, p.\n\n355.\n\nDr.\n\nFausböll has pointed out that the same or avery similar verse occurs in a legend taken from the Divyâvadâna, and translated by Burnouf (Introduction, p.\n\n313 seq.) Burnouf translates the verse: 'Ce n'est ni la coutume de marcher nu, ni les cheveux nattés, ni l'usage d'argile, ni le choix des diverses espèces d'aliments, ni l'habitude de coucher sur la terre nue, ni la poussière, ni la malpropreté, ni l'attention à fuir l'abri d'un toit, qui sont capables de dissiper le trouble dans lequel nous jettent les désirs non-satisfaits; mais qu'un homme, maître de ses sens, calme, recueilli, chaste, évitant de faire du mal à aucune créature, accomplisse la Loi, et il sera, quoique paré d'ornements, un Brâhmane, un Çramana, un Religieux.' See also Suttanipâta, v.\n\n248 .\n\nWalking naked and the other things mentioned in our verse are outward signs of a saintly life, and these Buddha rejects because they do not calm the passions."

