[content]
body = "(See Lassen, Indische Alterthumskunde, II, 700.) The Chinese Shamen and the Tungusian Shamen come from the same source, though the latter has sometimes been doubted.\n\nSee Schott, Über die doppelte Bedeutung des Wortes Schamane, in the Philosophical Transactions of the Berlin Academy, 1842, p.\n\n463 seq.\n\n266-270.\n\nThe etymologies here given of the ordinary titles of the followers of Buddha are entirely fanciful, and are curious only as showing how the people who spoke Pâli had lost the etymological consciousness of their language.\n\nA Bhikshu is a beggar, i.e.\n\na Buddhist friar who bas left his family and lives entirely on alms.\n\nMuni is a sage, hence S âkya-muni, a name of Gautama.\n\nMuni comes from man, 'to think,' and from muni comes mauna, 'silence.' Ariya, again, is the general name of those who embrace a religious life.\n\nIt meant originally 'respectable, noble.' In verse 270 it seems as if the writer wished to guard against deriving ariya from ari, 'enemy.' See note to verse 22 .] p.\n\n66 and ignorant; but the wise who, taking the balance, chooses the good and avoids evil, he is a Muni, and is a Muni thereby; he who in this world weighs both sides is called a Muni.\n\n270.\n\nA man is not an elect (Ariya) because he injures living creatures; because he has pity on all living creatures, therefore is a man called Ariya.\n\n271., 272.\n\nNot only by discipline and vows, not only by much learning, not by entering into a trance, not by sleeping alone, do I earn the happiness of release which no worldling can know.\n\nBhikshu, be not confident as long as thou hast not attained the extinction of desires.\n\n[272.\n\nSee Childers, Notes, p.\n\n7.]"

