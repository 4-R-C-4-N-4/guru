[content]
body = "p.\n\n64 CHAPTER XIX.\n\nTHE JUST.\n\n256., 257.\n\nA man is not just if he carries a matter by violence; no, he who distinguishes both right and wrong, who is learned and leads others, not by violence, but by law and equity, and who is guarded by the law and intelligent, he is called just.\n\n258.\n\nA man is not learned because he talks much; he who is patient, free from hatred and fear, he is called learned.\n\n259.\n\nA man is not a supporter of the law because he talks much; even if a man has learnt little, but sees the law bodily, he is a supporter of the law, a man who never neglects the law.\n\n260.\n\nA man is not an elder because his head is grey; his age may be ripe, but he is called 'Old-in-vain.' 261.\n\nHe in whom there is truth, virtue, love, restraint, moderation, he who is free from impurity and is wise, he is called an elder.\n\n262.\n\nAn envious, greedy, dishonest man does not become respectable by means of much talking only, or by the beauty of his complexion.\n\n263.\n\nHe in whom all this is destroyed, and taken out with the very root, he, when freed from hatred and wise, is called respectable.\n\n[259.\n\nBuddhaghosa here takes law (dhamma) in the sense of the four great truths, see note to verse 190 .\n\nCould dhamma m kâyena passati mean, 'he observes the law in his acts?' Hardly, if we compare expressions like dhamma m vipassato, v.\n\n373 .] p.\n\n65 264.\n\nNot by tonsure does an undisciplined man who speaks falsehood become a Sama n a; can a man be a Sama n a who is still held captive by desire and greediness?\n\n265.\n\nHe who always quiets the evil, whether small or large, he is called a Sama n a (a quiet man), because he has quieted all evil.\n\n266.\n\nA man is not a mendicant (Bhikshu) simply because he asks others for alms; he who adopts the whole law is a Bhikshu, not he who only begs.\n\n267.\n\nHe who is above good and evil, who is chaste, who with knowledge passes through the world, he indeed is called a Bhikshu.\n\n268., 269.\n\nA man is not a Muni because he observes silence (mona, i.e.\n\nmauna), if he is foolish [265.\n\nThis is a curious etymology, because it shows that at the time when this verse was written, the original meaning of s rama n a had been forgotten.\n\nS rama n a meant originally, in the language br the Brahmans, a man who performed hard penances, from s ram, 'to work hard,' &c.\n\nWhen it became the name of the Buddhist ascetics, the language had changed, and s rama n a was pronounced sama n a.\n\nNow there is another Sanskrit root, s am, 'to quiet,' which in Pâli becomes likewise sam, and from this root sam, 'to quiet,' and not from s ram, 'to tire,' did the popular etymology of the day and the writer of our verse derive the title of the Buddhist priests.\n\nThe original form s rama n a became known to the Greeks as {Greek: Sarmanai }, that of sama n a as {Greek: Samanaioi }; the former through Megasthenes, the latter through Bardesanes, 80-60 B.C."

