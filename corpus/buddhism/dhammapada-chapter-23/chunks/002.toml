[content]
body = "281) shows clearly that it meant 'origin,' or 'cause.' Yoniso occurs frequently as a mere adverb, meaning 'thoroughly, radically' (Dhammapada, p.\n\n359), and yoniso manasikâra (Dhammapada, p.\n\n110) means 'taking to heart' or 'minding thoroughly,' or, what is nearly the same, 'wisely.' In the Lalita-vistara, p.\n\n41, the commentator has clearly mistaken yoni s a h , changing it to ye 'ni s o, and explaining it by yamni s am, whereas M.\n\nFoucaux has rightly translated it by 'depuis l'origine.' Professor Weber suspected in yoni s a h a double entendre, but even grammar would show that our author is innocent of it.\n\nIn Lalita-vistara, p.\n\n544, l.\n\n4, ayoni s a occurs in the sense of error.\n\n328, 329.\n\nCf.\n\nSuttanipâta, vv.\n\n44, 45 .] p.\n\n79 331.\n\nIf an occasion arises, friends are pleasant; enjoyment is pleasant, whatever be the cause; a good work is pleasant in the hour of death; the giving up of all grief is pleasant.\n\n332.\n\nPleasant in the world is the state of a mother, pleasant the state of a father, pleasant the state of a Sama n a, pleasant the state of a Brâhma n a.\n\n333.\n\nPleasant is virtue lasting to old age, pleasant is a faith firmly rooted; pleasant is attainment of intelligence, pleasant is avoiding of sins.\n\n[332.\n\nThe commentator throughout takes these words, like matteyyatâ, &c., to signify, not the status of a mother, or maternity, but reverence shown to a mother.]"

