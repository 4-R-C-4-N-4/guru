body = "p.\n\n77 CHAPTER XXIII.\n\nTHE ELEPHANT.\n\n320.\n\nSilently shall I endure abuse as the elephant in battle endures the arrow sent from the bow: for the world is ill-natured.\n\n321.\n\nThey lead a tamed elephant to battle, the king mounts a tamed elephant; the tamed is the best among men, he who silently endures abuse.\n\n322.\n\nMules are good, if tamed, and noble Sindhu horses, and elephants with large tusks; but he who tames himself is better still.\n\n323.\n\nFor with these animals does no man reach the untrodden country (Nirvâ n a), where a tamed man goes on a tamed animal, viz.\n\non his own well-tamed self.\n\n324.\n\nThe elephant called Dhanapâlaka, his temples running with sap, and difficult to hold, does not eat a morsel when bound; the elephant longs for the elephant grove.\n\n[320.\n\nThe elephant is with the Buddhists the emblem of endurance and self-restraint.\n\nThus Buddha himseIf is called Nâga, 'the Elephant' (Lal.\n\nVist.\n\np.\n\n553), or Mahânâga, 'the great Elephant' (Lal.\n\nVist.\n\np.\n\n553), and in one passage (Lal.\n\nVist.\n\np.\n\n554) the reason of this name is given, by stating that Buddha was sudânta, 'well-tamed,' like an elephant.\n\nHe descended from heaven in the form of an elephant to be born on earth.\n\nCf.\n\nManu VI, 47, ativâdâ m s titiksheta.\n\n323.\n\nI read, as suggested by Dr.\n\nFausböll, yath' attanâ sudantena danto dantena ga kkh ati' (cf.\n\nverse 160 ).\n\nThe India Office MS.\n\nreads na hi etehi th ânehi ga kkh eya agata m disam, yath' attâna m sudantena danto dantena ga kkh ati.\n\nAs to th ânehi instead of yânehi, see verse 224 .] p.\n\n78 325.\n\nIf a man becomes fat and a great eater, if he is sleepy and rolls himself about, that fool, like a hog fed on wash, is born again and again.\n\n326.\n\nThis mind of mine went formerly wandering about as it liked, as it listed, as it pleased; but I shall now hold it in thoroughly, as the rider who holds the hook holds in the furious elephant.\n\n327.\n\nBe not thoughtless, watch your thoughts!\n\nDraw yourself out of the evil way, like an elephant sunk in mud.\n\n328.\n\nIf a man find a prudent companion who walks with him, is wise, and lives soberly, he may walk with him, overcoming all dangers, happy, but considerate.\n\n329.\n\nIf a man find no prudent companion who walks with him, is wise, and lives soberly, let him walk alone, like a king who has left his conquered country behind,--like an elephant in the forest.\n\n330.\n\nIt is better to live alone, there is no companionship with a fool; let a man walk alone, let him commit no sin, with few wishes, like an elephant in the forest.\n\n[326.\n\nYoniso, i.e.\n\nyoni s a h , is rendered by Dr.\n\nFausböll 'sapientiâ,' and this is the meaning ascribed to yoni by many Buddhist authorities.\n\nBut the reference to Hema k andra (ed.\n\nBoehtlingk and Rieu, p."

