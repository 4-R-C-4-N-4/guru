[content]
body = "Nâmarûpa is here used again in its technical sense of mind and body, neither of which, however, is with the Buddhists âtman, or 'self.' Asat, 'what is not,' may therefore mean the same as nâmarûpa, or we may take it in the sense of what is no more, as, for instance, the beauty or youth of the body, the vigour of the mind, &c.\n\n368.\n\nSee Childers, Notes, p.\n\n11.\n\n371.\n\nThe swallowing of hot iron balls is considered as a punishment in hell; see verse 308 .\n\nProfessor Weber has perceived the right meaning of bhavassu, which can only be bhâvayasva, but I doubt whether the rest of his rendering is right, for who would swallow an iron ball by accident?] p.\n\n87 372.\n\nWithout knowledge there is no meditation, without meditation there is no knowledge: he who has knowledge and meditation is near unto Nirvâ n a.\n\n373.\n\nA Bhikshu who has entered his empty house, and whose mind is tranquil, feels a more than human delight when he sees the law clearly.\n\n374.\n\nAs soon as he has considered the origin and destruction of the elements (khandha) of the body, he finds happiness and joy which belong to those who know the immortal (Nirvâ n a).\n\n375.\n\nAnd this is the beginning here for a wise Bhikshu: watchfulness over the senses, contentedness, restraint under the law; keep noble friends whose life is pure, and who are not slothful.\n\n376.\n\nLet him live in charity, let him be perfect in his duties; then in the fulness of delight he will make an end of suffering.\n\n377.\n\nAs the Vassika plant sheds its withered flowers, men should shed passion and hatred, O ye Bhikshus!\n\n378.\n\nThe Bhikshu whose body and tongue and mind are quieted, who is collected, and has rejected the baits of the world, he is called quiet.\n\n379.\n\nRouse thyself by thyself, examine thyself by thyself, thus self-protected and attentive wilt thou live happily, O Bhikshu!\n\n380.\n\nFor self is the lord of self, self is the refuge of self; therefore curb thyself as the merchant curbs a good horse.\n\n[372.\n\nCf.\n\nBeal, Catena, p.\n\n247.\n\n375.\n\nCf.\n\nSuttanipâta, v.\n\n337 .] p.\n\n88 381.\n\nThe Bhikshu, full of delight, who is calm in the doctrine of Buddha will reach the quiet place (Nirvâ n a), cessation of natural desires, and happiness.\n\n382.\n\nHe who, even as a young Bhikshu, applies himself to the doctrine of Buddha, brightens up this world, like the moon when free from clouds.\n\n[381.\n\nSee verse 368 .\n\nD'Alwis translates, 'dissolution of the sa n khâras (elements of existence).'] Next: Chapter XXVI.\n\nThe Brâhmana (Arhat)."

