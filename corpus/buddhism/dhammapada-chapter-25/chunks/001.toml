[content]
body = "p.\n\n85 CHAPTER XXV.\n\nTHE BHIKSHU (MENDICANT).\n\n360.\n\nRestraint in the eye is good, good is restraint in the ear, in the nose restraint is good, good is restraint in the tongue.\n\n361.\n\nIn the body restraint is good, good is restraint in speech, in thought restraint is good, good is restraint in all things.\n\nA Bhikshu, restrained in all things, is freed from all pain.\n\n362.\n\nHe who controls his hand, he who controls his feet, he who controls his speech, he who is well controlled, he who delights inwardly, who is collected, who is solitary and content, him they call Bhikshu.\n\n363.\n\nThe Bhikshu who controls his mouth, who speaks wisely and calmly, who teaches the meaning and the law, his word is sweet.\n\n364.\n\nHe who dwells in the law, delights in the law, meditates on the law, follows the law, that Bhikshu will never fall away from the true law.\n\n365.\n\nLet him not despise what he has received, [363.\n\nOn artha and dharma, see Stanislas Julien, Les Avadânas, I, 217, note; 'Les quatre connaissances sont; 1&deg; la connaissance du sens (artha); 2&deg; la connaissance de la Loi (dharma); 3&deg; la connaissance des explications (niroukti); 4&deg; la connaissance de l'intelligence (prâtibhâna).' 364.\n\nThe expression dhammârâmo, 'having his garden or delight (Lustgarten) in the law,' is well matched by the Brahmanic expression ekârâma, i.e.\n\nnirdvandva (Mahâbh.\n\nXIII, 1930).\n\nCf.\n\nSuttanipâta, v.\n\n326 ; Dhammapada, v.\n\n32 .] p.\n\n86 nor ever envy others: a mendicant who envies others does not obtain peace of mind.\n\n366.\n\nA Bhikshu who, though he receives little, does not despise what he has received, even the gods will praise him, if his life is pure, and if he is not slothful.\n\n367.\n\nHe who never identifies himself with name and form, and does not grieve over what is no more, he indeed is called a Bhikshu.\n\n368.\n\nThe Bhikshu who acts with kindness, who is calm in the doctrine of Buddha, will reach the quiet place (Nirvâ n a), cessation of natural desires, and happiness.\n\n369.\n\nO Bhikshu, empty this boat!\n\nif emptied, it will go quickly; having cut off passion and hatred thou wilt go to Nirvâ n a.\n\n370.\n\nCut off the five (senses), leave the five, rise above the five.\n\nA Bhikshu, who has escaped from the five fetters, he is called Oghati nn a, 'saved from the flood.' 371.\n\nMeditate, O Bhikshu, and be not heedless!\n\nDo not direct thy thought to what gives pleasure that thou mayest not for thy heedlessness have to swallow the iron ball (in hell), and that thou mayest not cry out when burning, 'This is pain.' [367."

