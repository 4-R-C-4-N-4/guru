[content]
body = "'Therefore we ought to know the great verse of the Pra gñ âpâramitâ, the verse of the great wisdom, the unsurpassed verse, the verse which appeases  all pain--it is truth, because it is not false[1]--the verse proclaimed in the Pra gñ âpâramitâ[2]: \"O wisdom, gone, gone, gone to the other shore, landed at the other shore, Svâhâ!\" 'Thus, O Sâriputra, should a Bodhisattva teach in the study of the deep Pra gñ âpâramitâ.' Then when the Bhagavat had risen from that meditation, he gave his approval to the venerable Bodhisattva Avalokite s vara, saying: 'Well done, well done, noble son!\n\nSo it is, noble son.\n\nSo indeed must this study of the deep Pra gñ âpâramitâ be performed.\n\nAs it has been described by thee, it is applauded by Arhat Tathâgatas.' Thus spoke Bhagavat with joyful mind.\n\nAnd the venerable Sâriputra, and the honourable Bodhisattva Avalokite s vara, and the whole assembly, and the world of gods, men, demons, and fairies praised the speech of the Bhagavat.\n\nHere ends the Pra gñ âpâramitâh ri dayasûtra.\n\n[1.\n\nIt is truth, not falsehood, W text.\n\n2.\n\nFit for obtaining Pra gñ âpâramitâ, W text.] Next: The Smaller Pra gñ â-pâramitâ-h ri daya-sûtra"

