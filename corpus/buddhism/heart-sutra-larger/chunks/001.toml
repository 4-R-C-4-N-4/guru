[content]
body = "THE LARGER PRA GÑ Â-PÂRAMITÂ- H RI DAYA-SÛTRA.\n\nADORATION TO THE OMNISCIENT!\n\nThis I heard: At one time the Bhagavat dwelt at Râ g ag ri ha, on the hill G ri dhrakû t a, together with a large number of Bhikshus and a large number of Bodhisattvas.\n\nAt that time the Bhagavat was absorbed in a meditation, called Gambhîrâvasambodha.\n\nAnd at the same time the great Bodhisattva Âryâvalokite s vara, performing his study in the deep Pra gñ âpâramitâ, thought thus: 'There are the five Skandhas, and those he (the Buddha?) considered as something by nature empty.' Then the venerable S âriputra, through Buddha's power, thus spoke to the Bodhisattva Âryâvalokite s vara: 'If the son or daughter of a family wishes to perform the study in the deep Pra gñ âpâramitâ, how is he to be taught?' On this the great Bodhisattva Âryâvalokite s vara thus spoke to the venerable S âriputra: 'If the son or daughter of a family wishes to perform the study in the deep Pra gñ âpâramitâ, he must think thus: 'There are five Skandhas, and these he considered as by their nature empty.\n\nForm is emptiness, and  emptiness indeed is form.\n\nEmptiness is not different from form, form is not different from emptiness.\n\nWhat is form that is emptiness, what is emptiness that is form.\n\nThus perception, name, conception, and knowledge also are emptiness.\n\nThus, O S âriputra, all things have the character of emptiness, they have no beginning, no end, they are faultless and not faultless, they are not imperfect and not perfect.\n\nTherefore, O S âriputra, here in this emptiness there is no form, no perception, no name, no concept, no knowledge.\n\nNo eye, ear, nose, tongue, body, and mind.\n\nNo form, sound, smell, taste, touch, and objects.\n\nThere is no eye,' &c., till we come to 'there is no mind, no objects, no mind-knowledge.\n\nThere is no knowledge, no ignorance, no destruction (of ignorance),' till we come to 'there is no decay and death, no destruction of decay and death; there are not (the Four Truths, viz.) that there is pain, origin of pain, stoppage of pain, and the path to it.\n\nThere is no knowledge, no obtaining, no not-obtaining of Nirvâ n a.\n\nTherefore, O S âriputra, as there is no obtaining (of Nirvâ n a), a man who has approached the Pra gñ âpâramitâ of the Bodhisattvas, dwells (for a time) enveloped in consciousness.\n\nBut when the envelopment of consciousness has been annihilated, then he becomes free of all fear, beyond the reach of change, enjoying final Nirvâ n a.\n\n'All Buddhas of the past, present, and future, after approaching the Pra gñ âpâramitâ, have awoke to the highest perfect knowledge."

