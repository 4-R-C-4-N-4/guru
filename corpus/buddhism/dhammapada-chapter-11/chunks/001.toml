body = "p.\n\n41 CHAPTER XI.\n\nOLD AGE.\n\n146.\n\nHow is there laughter, how is there joy, as this world is always burning?\n\nWhy do you not seek a light, ye who are surrounded by darkness?\n\n147.\n\nLook at this dressed-up lump, covered with wounds, joined together, sickly, full of many thoughts, which has no strength, no hold!\n\n148.\n\nThis body is wasted, full of sickness, and frail; this heap of corruption breaks to pieces, life indeed ends in death.\n\n[148.\n\nDr.\n\nFausböll informs me that Childers proposed the emendation mara n anta m hi g îvita m .\n\nThe following extract from a letter, addressed by Childers to Dr.\n\nFausböll, will be read with interest:--'As regards Dhp.\n\nv.\n\n148, I have no doubt whatever.\n\nI quite agree with you that the idea (mors est vita ejus) is a profound and noble one, but the question is, Is the idea there?\n\nI think not.\n\nMara n a m tamhi g îvita m is not Pâli, I mean not a Pâli construction, and years ago even it grated on my ear as a harsh phrase.\n\nThe reading of your MSS.\n\nof the texts is nothing; your MSS.\n\nof Dhammapada are very bad ones, and it is merely the vicious Sinhalese spelling of bad MSS., like kamma m ta m for kammanta m .\n\nBut the comment sets the question at rest at once, for it explains mara n anta m by mara n apariyosâna m , which is exactly the same.\n\nI see there is one serious difficulty left, that all your MSS.\n\nseem to have tamhi, and not ta m hi; but are you sure it is so?\n\nThere was a Dhammapada in the India Office Library, and I had a great hunt for it a few days ago, but to my deep disappointment it is missing.\n\nI do not agree with you that the sentence \"All Life is bounded by Death,\" is trivial: it is a truism, but half the noblest passages in poetry are truisms, and unless I greatly mistake, this very passage will be found in many other literatures.' Dr.\n\nFausböll adds:-- 'I have still the same doubt as before, because of all my MSS.\n\nreading mara n a m tamhi.\n\nI do not know the readings of the London MSS.\n\nThe explanation of the commentary does not settle the question, as it may as well be considered an explanation of my reading as of the reading which Childers proposed.--V.\n\nFAUSBÖLL.'] p.\n\n42 149.\n\nThose white bones, like gourds thrown away in the autumn, what pleasure is there in looking at them?\n\n150.\n\nAfter a stronghold has been made of the bones, it is covered with flesh and blood, and there dwell in it old age and death, pride and deceit.\n\n151.\n\nThe brilliant chariots of kings are destroyed, the body also approaches destruction, but the virtue of good people never approaches destruction,--thus do the good say to the good.\n\n152.\n\nA man who has learnt little, grows old like an ox; his flesh grows, but his knowledge does not grow.\n\n153., 154.\n\nLooking for the maker of this tabernacle, I shall have to run through a course of many births, so long as I do not find (him); and painful is birth again and again.\n\nBut now, maker of the tabernacle, thou hast been seen; thou shalt not make up [149."

