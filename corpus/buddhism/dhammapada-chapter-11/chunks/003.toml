[content]
body = "I had formerly translated anibbisan, as not resting (anirvi s an), but the commentator seems to authorise the meaning of not finding (avindanto, alabhanto), and in that case all the material difficulties of the verse seem to me to disappear.\n\n'The maker of the tabernacle' is explained as a poetical expression for the cause of new births, at least according to the views of Buddha's followers, whatever his own views may have been.\n\nBuddha had conquered Mâra, the representative of worldly temptations, the father of worldly desires, and as desires (ta m hâ) are, by means of upâdâna and bhava, the cause of g âti, or 'birth,' the destruction of desires and the conquest of Mâra are nearly the same thing, though expressed differently in the philosophical and legendary language of the Buddhists.\n\nTa m hâ, 'thirst' or 'desire,' is mentioned as serving in the army of Mâra.\n\n(Lotus, p.\n\n443.)] p.\n\n43 this tabernacle again.\n\nAll thy rafters are broken, thy ridge-pole is sundered; the mind, approaching the Eternal (visa n khâra, nirvâ n a), has attained to the extinction of all desires.\n\np.\n\n44 155.\n\nMen who have not observed proper discipline, and have not gained treasure in their youth, perish like old herons in a lake without fish.\n\n156.\n\nMen who have not observed proper discipline, and have not gained treasure in their youth, lie, like broken bows, sighing after the past.\n\n[155.\n\nOn gh âyanti, i.e.\n\nkshâyanti, see Dr.\n\nBollensen's learned remarks, Zeitschrift der Deutschen Morgenl.\n\nGesellschaft, XVIII, 834, and Boehtlingk-Roth, s.v.\n\nkshâ.]"

