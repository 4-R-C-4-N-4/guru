body = "In the Rudrâya n âvadâna of the Divyâvadâna this verse appears as, Yânîmâny apariddhâni vikshiptâni di s o di s a h , Kapotavar n âny asthîni tâni d ri sh t vaiha kâ rati h .\n\nSee Schiefner, Mél.\n\nAsiat.\n\nVIII, p.\n\n589; G âtaka, vol.\n\ni.\n\np.\n\n322.\n\n150.\n\nThe expression ma m salohitalepanam is curiously like the expression used in Manu VI, 76, mâ m sa s o n italepanam, and in several passages of the Mahâbhârata, XII, 12462, 12053, as pointed out by Dr.\n\nFausböll.\n\n153, 154.\n\nThese two verses are famous among Buddhists, for they are the words which the founder of Buddhism is supposed to have uttered at the moment he attained to Buddhahood.\n\n(See Spence Hardy, Manual; p.\n\n180.) According to the Lalita-vistara, however, the words uttered on that solemn occasion were those quoted in the note to verse 39 .\n\nIn the commentary on the Brahma g âla this verse is called the first speech of Buddha, his last speech being the words in the Mabâparinibbâna-sutta, 'Life is subject to age; strive in earnest.' The words used in the Mahâparinibbâna-sutta, Chap.\n\nIV, 2, K atunna m dhammânam ananubodhâ appa t ivedhâ evam ida m dîgham addhâna m sandhâvita m sa m sârita m mama ñ k ' eva tumhâka ñ k a, answer to the anticipation expressed in our verse.\n\nThe exact rendering of this verse has been much discussed, chiefly by Mr.\n\nD'Alwis in the Attanugaluvansa, p.\n\ncxxviii, and again in his Buddhist Nirvâ n a, p.\n\n78; also by Childers, Notes on Dhammapada, p.\n\n4, and in his Dictionary.\n\nGogerly translated: 'Through various transmigrations I must travel, if I do not discover the builder whom I seek.' Spence Hardy: 'Through many different births I have run (to me not having found), seeking the architect of the desire-resembling house.' Fausböll: 'Multiplices generationis revolutiones percurreram, non inveniens, domus (corporis) fabricatorem quaerens.' And again (p.\n\n322): 'Multarum generationum revolutio mihi subeunda esset, nisi invenissem domus fabricatorem.' Childers: 'I have run through the revolution of countless births, seeking the architect of this dwelling and finding him not.' D'Alwis: 'Through transmigrations of numerous births have I run, not discovering, (though) seeking the house-builder.' All depends on how we take sandhavissam, which Fausböll takes as a conditional, Childers, following Trenckner, as an aorist, because the sense imperatively requires an aorist.\n\nIn either case, the dropping of the augment and the doubling of the s are, however, irregular.\n\nSandhavissam is the regular form of the future, and as such I translate it, qualifying, however, the future, by the participle present anibbisan, i.e.\n\nnot finding, and taking it in the sense of, if or so long as I do not find the true cause of existence."

