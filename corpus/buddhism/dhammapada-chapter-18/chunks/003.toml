[content]
body = "As to bahira, I should take it in the sense of 'external,' as opposed to adhyâtmika, or 'internal;' and the meaning would be, 'a Sama n a is not a Sama n a by outward acts, but by his heart.' D'Alwis translates (p.\n\n85): 'There is no footprint in the air; there is not a Sama n a out of the pale of the Buddhist community.' Prapa ñk a, which I have here translated by 'vanity,' seems to include the whole host of human weaknesses; cf.\n\nv.\n\n196 , where it is explained by ta m hâdi tth imânapapa ñk a; in our verse by ta m hâdisu papa ñk esu: cf.\n\nLalita-vistara, p.\n\n564, anâlaya m nishprapa ñk am anutpâdam asambhavam (dharma k akram).\n\nAs to Tathâgata, a name of Buddha, cf.\n\nBurnouf, Introd.\n\np.\n\n75.] p.\n\n63 delights in vanity, the Tathâgatas (the Buddhas) are free from vanity.\n\n255.\n\nThere is no path through the air, a man is not a Sama n a by outward acts.\n\nNo creatures are eternal; but the awakened (Buddha) are never shaken.\n\n[255.\n\nSa n khâra for sa m skâra; cf.\n\nnote to verse 203 .\n\nCreature does not, as Mr.\n\nD'Alwis (p.\n\n69) supposes, involve the Christian conception of creation.]"

