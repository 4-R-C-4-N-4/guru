body = "On the five principal commandments which are recapitulated in verses 246 and 247, see Buddhaghosha's Parables, p.\n\n153.\n\n248.\n\nCf.\n\nMahâbhârata XII, 4055, yeshâ m v ri ttis k a sa m yatâ.\n\nSee also verse 307 .] p.\n\n62 249.\n\nThe world gives according to their faith or according to their pleasure: if a man frets about the food and the drink given to others, he will find no rest either by day or by night.\n\n250.\n\nHe in whom that feeling is destroyed, and taken out with the very root, finds rest by day and by night.\n\n251.\n\nThere is no fire like passion, there is no shark like hatred, there is no snare like folly, there is no torrent like greed.\n\n252.\n\nThe fault of others is easily perceived, but that of oneself is difficult to perceive; a man winnows his neighbour's faults like chaff, but his own fault he hides, as a cheat hides the bad die from the gambler.\n\n253.\n\nIf a man looks after the faults of others, and is always inclined to be offended, his own passions will grow, and he is far from the destruction of passions.\n\n254.\n\nThere is no path through the air, a man is not a Sama n a by outward acts.\n\nThe world [249.\n\nThis verse has evidently regard to the feelings of the Bhikshus or mendicants who receive either much or little, and who are exhorted not to be envious if others receive more than they themselves.\n\nSeveral of the Parables illustrate this feeling.\n\n251.\n\nDr.\n\nFausböll translates gaho by 'captivitas,' Dr.\n\nWeber by 'fetter.' I take it in the same sense as grâha in Manu VI, 78; and Buddhaghosa does the same, though he assigns to grâha a more general meaning, viz.\n\nanything that seizes, whether an evil spirit (yakkha), a serpent (a g agara), or a crocodile (kumbhîla).\n\nGreed or thirst is represented as a river in Lalita-vistara, ed.\n\nCalc.\n\np.\n\n482, trish n â-nadî tivegâ pra s oshitâ me gñ ânasûrye n a, 'the wild river of thirst is dried up by the sun of my knowledge.' 252.\n\nSee Childers, Notes, p.\n\n7; St.\n\nMatthew vii.\n\n3 .\n\n253.\n\nAs to âsava, 'appetite, passion,' see note to verse 39 .\n\n254.\n\nI have translated this verse very freely, and not in accordance with Buddhaghosa's commentary.\n\nDr.\n\nFausböll proposed to translate, 'No one who is outside the Buddhist community can walk through the air, but only a Sama n a;' and the same view is taken by Professor Weber, though he arrives at it by a different construction.\n\nNow it is perfectly true that the idea of magical powers ( ri ddhi) which enable saints to walk through the air, &c., occurs in the Dhammapada, see v.\n\n175 , note.\n\nBut the Dhammapada may contain earlier and later verses, and in that case our verse might be an early protest on the part of Buddha against the belief in such miraculous powers.\n\nWe know how Buddha himself protested against his disciples being called upon to perform vulgar miracles.\n\n'I command my disciples not to work miracles,' he said, 'but to hide their good deeds, and to show their sins' (Burnouf, Introd.\n\np.\n\n170).\n\nIt would be in harmony with this sentiment if we translated our verse as I have done."

