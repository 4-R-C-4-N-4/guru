[content]
body = "p.\n\n60 CHAPTER XVIII.\n\nIMPURITY.\n\n235.\n\nThou art now like a sear leaf, the messengers of death (Yama) have come near to thee; thou standest at the door of thy departure, and thou hast no provision for thy journey.\n\n236.\n\nMake thyself an island, work hard, be wise!\n\nWhen thy impurities are blown away, and thou art free from guilt, thou wilt enter into the heavenly world of the elect (Ariya).\n\n237.\n\nThy life has come to an end, thou art come near to death (Yama), there is no resting-place for thee on the road, and thou hast no provision for thy journey.\n\n238.\n\nMake thyself an island, work hard, be wise!\n\nWhen thy impurities are blown away, and thou art free from guilt, thou wilt not enter again into birth and decay.\n\n239.\n\nLet a wise man blow off the impurities of his self, as a smith blows off the impurities of silver one by one, little by little, and from time to time.\n\n240.\n\nAs the impurity which springs from the iron, [235.\n\nUyyoga seems to mean departure.\n\nSee Buddhaghosa's commentary on verse 152, p.\n\n319, l.\n\n1; Fausböll, Five G âtakas, p.\n\n35.\n\n236.\n\n'An island,' for a drowning man to save himself; (see verse 25.) Dîpa n kara is the name of one of the former Buddhas, and it is also used as an appellative of the Buddha, but is always derived from dîpo, 'a lamp.' 239.\n\nThis verse is the foundation of the thirty-fourth section of the Sûtra of the forty-two sections; see Beal, Catena, p.\n\n201; Sutta-nipâta, v.\n\n962 .] p.\n\n61 when it springs from it, destroys it; thus do a transgressor's own works lead him to the evil path.\n\n241.\n\nThe taint of prayers is non-repetition; the taint of houses, non- repair; the taint of the body is sloth; the taint of a watchman, thoughtlessness.\n\n242.\n\nBad conduct is the taint of woman, greediness the taint of a benefactor; tainted are all evil ways in this world and in the next.\n\n243.\n\nBut there is a taint worse than all taints,--ignorance is the greatest taint.\n\nO mendicants!\n\nthrow off that taint, and become taintless!\n\n244.\n\nLife is easy to live for a man who is without shame, a crow hero, a mischief-maker, an insulting, bold, and wretched fellow.\n\n245.\n\nBut life is hard to live for a modest man, who always looks for what is pure, who is disinterested, quiet, spotless, and intelligent.\n\n246.\n\nHe who destroys life, who speaks untruth, who in this world takes what is not given him, who goes to another man's wife; 247.\n\nAnd the man who gives himself to drinking intoxicating liquors, he, even in this world, digs up his own root.\n\n248.\n\nO man, know this, that the unrestrained are in a bad state; take care that greediness and vice do not bring thee to grief for a long time!\n\n[244.\n\nPakkhandin is identified by Dr.\n\nFausböll with praskandin, one who jumps forward, insults, or, as Buddhaghosa explains it, one who meddles with other people's business, an interloper.\n\nAt all events, it is a term of reproach, and, as it would seem, of theological reproach.\n\n246."

