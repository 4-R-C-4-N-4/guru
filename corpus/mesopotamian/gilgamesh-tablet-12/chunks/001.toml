body = "The Epic of Gilgamish , tr.\n\nby R.\n\nCampbell Thompson [1928], at sacred-texts.com THE TWELFTH TABLET.\n\nGILGAMISH, IN DESPAIR, ENQUIRES OF THE DEAD.\n\nColumn I .\n\n( How the dead haunt the living ).\n\n(Then), what time that the seine had pass’d through the Architect 's dwelling, (Aye, and) the net [had taken its toll] .\n\n.\n\n.\n\n.\n\n[said he]: \"Lord, what [is’t I may do] .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n(Now, what time that) the seine hath [pass’d through the Architect's dwelling], 5.\n\n(Aye and) the net [hath taken its toll] .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\" Gilgamish [unto him spake] .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n\"If unto .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n( About two lines wanting, in which Gilgamish presumably asks how the dead may be made to haunt the mourner ).\n\n\"Gilgamish, .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\" ( The Mourner's Duty ).\n\n\"If to the .\n\n.\n\n.\n\n[thou drawest], unto the temple .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n15.\n\nRaiment clean [shalt not don], (but) like to a townsman shalt .\n\n.\n\n.\n\n.\n\nNor with sweet oil from the cruse be anointed, (lest) at its fragrance Round thee they gather: nor mayst thou set bow to the earth, (lest) around thee 20.\n\nCircle those shot by the bow; nor a stick in thy hand mayst thou carry, (Lest) (stricken) ghosts should gibber against thee: nor shoe to thy footsole Put on, nor make on the ground a (loud) echo: thy wife, whom thou lovest, 25.\n\nKiss (her) thou mayst not, thy wife whom thou hatest—thou mayst not chastise (her), (Aye, and) thy child whom thou lovest not kiss, nor thy child whom thou hatest Mayst not chastise, (for) the mourning of earth doth hold thee enthralléd.\n\n\"She who dead lieth, She who dead lieth, Mother of Ninazu, She who dead lieth, 30.\n\nNo more with mantle are Veil’d her fair shoulders, No more her bosom Drawn , like the lard cruse!\" ( Gilgamish by contravening these customs attempts to raise Enkidu ).\n\n(So) did he draw [the .\n\n.\n\n.\n\nto .\n\n.\n\n., and came to the temples, [Put on clean raiment] .\n\n.\n\n.\n\n(and) like to a townsman .\n\n.\n\n.\n\n35.\n\n(Aye), with [sweet] oil from the cruse [was] anointed: (then) at [its] fragrance Round him they gather 'd: the bow did he set (?) [to the earth], and around him Circled the spirits, (yea,) those who were [shot] by the bow at him gibber’d, [Carried] a stick in his hand [and the (stricken) ghosts at him gibber’d(?)].\n\n40.\n\n[Put on] a shoe to [his foot-sole, and made on the ground a (loud)] echo.\n\n[Kiss’d he] his wife [whom he lovéd, chastiséd his] wife whom he hated, 45.\n\n[Kiss’d he his child] whom he lovéd, chastiséd [his] child whom he hated."

