[content]
body = "Cried(?) [he] (for) Enkidu out of the earth to ascend: \"[Not] (the Plague-god), Namtar, hath [seized] him, nor fever, (but only) the earth: nor the Croucher, [Nergal], the ruthless, hath seized him, (but only) the earth: neither fell he There where was [battle] of mortals; ’twas only the earth [which hath seized him.] \"3 (So) .\n\n.\n\n.\n\nfor his servitor Enkidu sorrow’d the offspring of Nin-sun, 55.\n\n(Aye), as he went all alone unto [Ekur], the temple of Enlil: \"[Enlil], (my) Father, (’tis now) that the seine hath stricken me also, Down to the earth—the net to the earth hath stricken me also.\n\nEnkidu ’tis—whom [I pray thee] to raise [from the earth]—not (the Plague-god), 60.\n\nNamtar, hath seized him, nor fever, [but only the earth]: nor the Croucher, Nergal, the ruthless, hath seized shim, but only the earth]: [neither fell he] There where was battle of mortals: [’twas only the earth which hath seized him].\" (But) no answer did Enlil, the father vouchsafe.\n\n[To the Moon-god he hied him (?)]: \"Moon-god, (my) Father, (’tis now) that the seine [hath stricken me also, Down to the earth]—the net [to the earth hath stricken me also].\n\n65.\n\nEnkidu ’tis—whom [I pray thee] to raise [from the earths—not (the Plague-god), Namtar, hath seized him, [nor] fever, [but only the earth: nor] the Croucher, Nergal, [the ruthless, hath seized him, but only the earth]: [neither fell he] There where [was battle of mortals: ’twas only the earth which hath seized him.\" 70.\n\n[(But) no answer the Moon-god vouchsafed: (Then) to Ea he hied him:] [\"Ea, (my) Father, ’tis now that the seine hath stricken me also,] [Down to the earth—the net to the earth hath stricken me also.] [Enkidu ’tis,—whom I pray thee to raise from the earth—not (the Plague-god),] 75.\n\nNam[tar, hath seized him, nor fever, but only the earth: nor] the Croucher, Nergal, the ruthless, [hath seized him, but only the earth: neither fell he] There where was battle of mortals: [’twas only the earth which hath seized him].\" Ea, the father, [gave ear (and) to Nergal], the warrior-hero, [Spake he]: \"O Nergal, O warrior-hero, [give ear to my speaking(?)]!\n\n80.\n\n[Ope now,] a hole [in the earth], that the spirit of [Enkidu, (rising)], [May from the earth issue forth, and so have speech] with [his] brother.\" Nergal, the warrior-hero, [gave ear to the speaking of Ea], 85.\n\nOped, then, a hole in the earth, and the spirit of Enkidu issued Forth from the earth like a wind.\n\nThey embraced and .\n\n.\n\n.\n\n.\n\n.\n\nCommuned together, mourning."

