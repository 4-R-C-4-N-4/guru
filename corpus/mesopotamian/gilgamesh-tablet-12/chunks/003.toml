body = "[Ope now,] a hole [in the earth], that the spirit of [Enkidu, (rising)], [May from the earth issue forth, and so have speech] with [his] brother.\" Nergal, the warrior-hero, [gave ear to the speaking of Ea], 85.\n\nOped, then, a hole in the earth, and the spirit of Enkidu issued Forth from the earth like a wind.\n\nThey embraced and .\n\n.\n\n.\n\n.\n\n.\n\nCommuned together, mourning.\n\n\"Tell, O my friend, O tell, O my friend, (O) tell (me, I pr’y thee), What thou hast seen of the laws of the Underworld?\" \"(Nay, then,) O comrade; 90.\n\nI will not tell thee, (yea,) I will not tell thee—(for), were I to tell thee, What I have seen of the laws of the Underworld,—sit thee down weeping!\" \"(Then) let me sit me down weeping.\" ( The wretched lot of all who must die ).\n\n\"(So be it): [the friend(?)] thou didst fondle (Thereby) rejoicing thee—[into his body(?), as though ’twere a] mantle 95.\n\nOld, hath the worm made its entry: (in sooth, then) [the bride(?)] thou didst fondle, (Thereby) rejoicing thee—fill’d with the dust [is her body] .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nhe hath spoken and [into the\"' ground (?) is he sunken, .\n\n.\n\n.\n\nhe hath spoken and [into the ground (?) is he sunken.\" \"[He who fell in .\n\n.\n\n.\n\n.] 100.\n\n[Didst thou see him?].\" \"(Aye), I saw .\n\n.\n\n.\n\n.\" ( About seventeen lines missing ).\n\n118.\n\n\"As a pillar beautiful [Props?] an inner por[tico (?)] .\n\n.\n\n.\n\n( About twenty-five lines missing ).\n\n145.\n\n\"He who falleth from a pole Didst thou see him?\n\n\"(Aye), I saw]: Straightway for .\n\n.\n\n.\n\n.\n\nBy removal of a plug .\n\n.\n\n.\n\n.\n\n.\n\n.\" \"He whom death .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n\"Didst thou see him?\" \"[(Aye) I saw]: He's at rest upon a couch, Limpid water doth he drink.\" \"(Then, the hero) slain in fight, Didst thou see him?\" \"(Aye) I saw: 150.\n\nFather, mother raise his head, O’er him wife [in bitter woe].\" \"He whose corpse in desert lieth, Hast thou seen him?\" \"(Aye), I saw; Not in earth doth rest his spirit.\" \"He whose ghost hath none to tend, Didst thou see him?\" \"(Aye), I saw, Lees of cup, and broken bread Thrown into the street he eateth.\" THE END OF THE EPIC OF GILGAMISH.\n\nSHARP AND SONS, BATH"

