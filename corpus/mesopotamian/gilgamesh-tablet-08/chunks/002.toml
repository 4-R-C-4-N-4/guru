body = "[Making them mourn thee], (and) damsels(and)heroes[constrain to thy service], While I myself for thy sake [will cause my body to carry] [Stains], (and) will put on the skin of a [lion , and range o’er the desert].\" ________________________________ Then when something of morning had dawn’d did [Gilgamish] .\n\n.\n\n.\n\n.\n\nLoosing his girdle .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n( Column IV has only five fragmentary lines at the end, mentioning \"to my friend,\" \"thy sword,\" \"likeness,\" and \"to the god Bibbu,\" i.e., a planet or Mercury.\n\nColumn V has only a bare dozen fragmentary lines at the end ): Column V .\n\n43.\n\n\" .\n\n.\n\n.\n\nJudge of the Anunnaki .\n\n.\n\n.\" (Then), when Gilgamish heard this, he form’d of the slaying a concept .\n\n________________________________ 45.\n\n(Then), with the dawn of the morning did Gilgamish fashion a .\n\n.\n\n.\n\nBrought out also a mighty platter of wood from the highlands .\n\nFill’d he with honey a bowl of (bright) ruby , a bowl (too) of azure, Fill’d he with cream; (and) adorn’d he the .\n\n.\n\n., and Shamash instructed ..\n\n( One line lost at end of Column.\n\nColumn VI is all lost )."

