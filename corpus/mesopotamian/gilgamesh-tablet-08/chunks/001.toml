[content]
body = "THE EIGHTH TABLET. OF THE MOURNING OF GILGAMISH, AND WHAT CAME OF IT. : \"Unto me hearken, O Elders, to me, aye, me [shall ye listen], ’Tis that I weep for my [comrade] Enkidu, bitterly crying Like to a wailing woman: my grip is [slack’d] on the curtleaxe 5. (Slung at) my thigh, (and) the brand at my belt from my sight [is removed]. (Aye, and) my festal attire [lends nought of its aid for] my pleasure, Me, me hath [sorrow] assailed, and [cast] me [down in affliction]. ________________________________ Comrade (and) henchman, who chased the wild ass , the pard of the desert, Comrade (and) henchman, who chased the wild ass , the pard of the desert, 10. Enkidu—we who all [haps] overcame, ascending [the mountains]. Captured the Heavenly Bull, and [destroy’d (him)]: we o’erthrew Humbaba, He who [abode] in the Forest [of Cedars —O, what is this slumber Now hath o’ercome [thee], (for now) art thou dark, nor art able to hear [me]?\" 15. Natheless he raised not [his eyes, and] his heart, (when Gilgamish) felt (it), Made no beat. Then he veil’d (his) friend like a bride .. Lifted his voice like a lion . . . . . . . . [Roar’d] like a lioness robb’d of [her] whelps. In front of his [comrade] 20. Paced he backwards and forwards, tearing and casting his ringlets(?), Plucking and casting away (all) the grace of his . . . . ________________________________ Then when something of morning had dawn’d, did Gilgamish . . . . : . 49-50. \"[O, on a couch of great size will I, thy friend and thy brother, [Gilgamish, grant thee to lie], on [a handsome] couch [will I grant thee Rest, and] to sit on [a throne of great size, a throne at (my) left hand], So that the princes of Hades [may kiss thy feet (in their homage)]; I, too, will make (all) [the people of Erech] lament in thy (honour), 5. [Making them mourn thee], (and) damsels(and)heroes[constrain to thy service], While I myself for thy sake [will cause my body to carry] [Stains], (and) will put on the skin of a [lion , and range o’er the desert].\" ________________________________ Then when something of morning had dawn’d did [Gilgamish] . . . . Loosing his girdle . . . . . . . . . . . . . . . : 43. \" . . . Judge of the Anunnaki . . .\" (Then), when Gilgamish heard this, he form’d of the slaying a concept . ________________________________ 45. (Then), with the dawn of the morning did Gilgamish fashion a . . . Brought out also a mighty platter of wood from the highlands . Fill’d he with honey a bowl of (bright) ruby , a bowl (too) of azure, Fill’d he with cream; (and) adorn’d he the . . ., and Shamash instructed .. ."

