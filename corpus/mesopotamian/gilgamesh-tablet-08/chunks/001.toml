body = "The Epic of Gilgamish , tr.\n\nby R.\n\nCampbell Thompson [1928], at sacred-texts.com THE EIGHTH TABLET.\n\nOF THE MOURNING OF GILGAMISH, AND WHAT CAME OF IT.\n\n( The first Column is badly mutilated, and all we can glean from it is that \"as soon as something of morning has dawned,\" Gilgamish addressing Enkidu, compares him to a gazelle, and promises to glorify him.\n\nThen follows apparently a recital by Gilgamish of their exploits together, \"mountains [ we ascended , we reach’d ] the Forest of Cedars, [ travelling ] night and day .\n\n.\n\n.\n\n[ with wild beasts ( ?\n\n)] drawing nigh after us.\" Enkidu is lying dying or dead, and Column II begins with Gilgamish keening over his dead friend before the Elders of Erech ): \"Unto me hearken, O Elders, to me, aye, me [shall ye listen], ’Tis that I weep for my [comrade] Enkidu, bitterly crying Like to a wailing woman: my grip is [slack’d] on the curtleaxe 5.\n\n(Slung at) my thigh, (and) the brand at my belt from my sight [is removed].\n\n(Aye, and) my festal attire [lends nought of its aid for] my pleasure, Me, me hath [sorrow] assailed, and [cast] me [down in affliction].\n\n________________________________ Comrade (and) henchman, who chased the wild ass , the pard of the desert, Comrade (and) henchman, who chased the wild ass , the pard of the desert, 10.\n\nEnkidu—we who all [haps] overcame, ascending [the mountains].\n\nCaptured the Heavenly Bull, and [destroy’d (him)]: we o’erthrew Humbaba, He who [abode] in the Forest [of Cedars —O, what is this slumber Now hath o’ercome [thee], (for now) art thou dark, nor art able to hear [me]?\" 15.\n\nNatheless he raised not [his eyes, and] his heart, (when Gilgamish) felt (it), Made no beat.\n\nThen he veil’d (his) friend like a bride ..\n\nLifted his voice like a lion .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n[Roar’d] like a lioness robb’d of [her] whelps.\n\nIn front of his [comrade] 20.\n\nPaced he backwards and forwards, tearing and casting his ringlets(?), Plucking and casting away (all) the grace of his .\n\n.\n\n.\n\n.\n\n________________________________ Then when something of morning had dawn’d, did Gilgamish .\n\n.\n\n.\n\n.\n\n( Column II here breaks off.\n\nColumn III begins with Gilgamish still mourning, telling his dead friend all he will do for him in the words of Shamash in the preceding tablet, so that we may supply the last two ( ?\n\n) lines of Column II as follow ): Column II .\n\n( The Lament of Gilgamish ).\n\n49-50.\n\n\"[O, on a couch of great size will I, thy friend and thy brother, Column III .\n\n[Gilgamish, grant thee to lie], on [a handsome] couch [will I grant thee Rest, and] to sit on [a throne of great size, a throne at (my) left hand], So that the princes of Hades [may kiss thy feet (in their homage)]; I, too, will make (all) [the people of Erech] lament in thy (honour), 5."

