[content]
body = "THE FIFTH TABLET.\n\nOF THE FIGHT WITH HUMBABA.\n\n.\n\nStood they and stared at the Forest, they gazed at the height of the Cedars, Scanning the avenue into the Forest: (and there) where Humbaba 5.\n\nStalk’d, was a path, (and) straight were his tracks, and good was the passage.\n\n(Eke) they beheld the Mount of the Cedar, the home of th’ Immortals, Shrine [of Irnini , the Cedar uplifting its pride ’gainst the mountain, Fair was its shade, (all) full of delight, with bushes (there) spreading, Spread, too, the .\n\n.\n\n.\n\n.\n\nthe Cedar the incense .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n32.\n\n\"[ Then came another dream to me, comrade, and this second] vision [Pleasant, indeed], which I saw, (for) we (?) [twain were standing together] [High on (?) a] peak of the mountains, [and then did the mountain peak] topple, 35.\n\n[Leaving us twain (?)] to be like .\n\n.\n\n.\n\n(?) which are born in the desert.\" Enkidu spake to his comrade the dream (?) [to interpret], (thus saying): \"Comrade, (in sooth, this) vision [of thine unto us] good fortune (forbodeth), (Aye), ’tis a dream of great gain [thou didst see], (for, bethink you), O comrade, 40.\n\n(Surely) the mountain which thou hast beholden [must needs be Humbaba(?)].\n\n(Thus doth it mean) we shall capture Humbaba, (and) [throw down his] carcase, [Leaving] his corpse in abasement—to-morrow 's (outcome) will I [shew thee]\".\n\n________________________________ (Now) at the fortieth league did they break their fast [with a morsel], 45.\n\n(Now) at the sixtieth rested, and hollow’d a pit in the sunshine .\n\n.\n\n.\n\nGilgamish mounted above [it] .\n\n.\n\n.\n\n(and) pour’d out his meal [for the mountain]: 50.\n\n\"Mountain, a dream do thou grant .\n\n.\n\n.\n\nbreathe on him .\n\n.\n\n.\" Granted [the mountain] a dream .\n\n.\n\n.\n\nit breathed on him .\n\n.\n\n.\n\nThen a chill wind-blast [up]-sprang (and) [a gust] passing over .\n\n.\n\n.\n\n5.\n\n[Made] him to cower, and .\n\n.\n\n.\n\n[thereat he sway’d] like the corn of the mountains .\n\n.\n\n.\n\nGilgamish, [squatting] bent-kneed, supported his haunches, (and straightway) Sleep (such as) floweth on man descended upon him: [at] midnight Ending his slumber (all sudden), he hied him to speak to his comrade: 10.\n\n\"Didst thou not call me, O friend?\n\n(O), why am I waken’d (from slumber)?\n\nDidst thou not touch me—(for), why am I fearful(?), (or) hath not some spirit Pass’d (me)?\n\n(Or,) why is my flesh (all) a-quiver?\n\n.\n\nA third dream, O comrade, I have beheld: but all awesome (this) dream which I have beholden: 15.\n\n(Loud) did the firmament roar, (and) earth (with the echo) resounded, Sombre the day, with darkness uprising, (and) levin bolts flashing, Kindled were flames, [and there, too, was Pestilence (?)] fill’d to o’erflowing, Gorgéd was Death!"

