[content]
body = "(Then) [faded] the glare, (then) faded the fires, 20.\n\nFalling, [the brands] turn’d to ashes—[Come, let us go] down to the desert, That we may counsel together.\" Enkidu (now) to interpret his dream unto Gilgamish speaketh: .\n\n.\n\n.\n\nIn the following manner .\n\n.\n\n.\n\nthe Sun-god in heaven .\n\n.\n\n.\n\nthe trees: He saw [Gilgamish]: of the Sun-god in heaven in .\n\n.\n\n.\n\n5.\n\nAnd [shew’d him] the dam on the ditches.\n\nGilgamish [spake] then [in orison] unto the Sun-god in heaven; \"Lo, on that day to the city .\n\n.\n\n.\n\n.\n\nwhich is in the city: 10.\n\nI in sooth [pray] to the Sun-god in heaven: I on a road have now started, .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\" Unto th’ entreaty of Gilgamish hearken’d the Sun-god in heaven, Wherefore against Humbaba he raised mighty winds: (yea), a great wind, Wind from the North, (aye), [a wind from the South], yea [a tempest] (and) storm wind, 15.\n\nChill wind, (and) whirlwind, a wind of (all) evil: ’twas eight winds he raiséd, Seizing [Humbaba] before and behind, so that nor to go forwards, Nor to go back was he able: and then Humbaba surrender’d.\n\n20.\n\nWherefore to Gilgamish spake (thus) Humbaba: \"O Gilgamish, (pr’y thee), Stay, (now, thy hand): be [thou] now my [master], and I'll be thy henchman: [O disregard] (all) [the words which I spake [(so) boastfull against thee, 25.\n\nWeighty .\n\n.\n\n.\n\nI would lay me down .\n\n.\n\n.\n\nand the Palace.\n\nThereat to [Gilgamish] Enkidu [spake]: \"[Of the rede which] Humbaba [Maketh to thee] thou darest in nowise offer acceptance.\n\n(Aye, for) Humbaba [must] not [remain alive] .\n\n.\n\n.\n\n.\" .\n\n.\n\n.\n\n.\n\n.\n\n[they cut off] the head of Humbaba."

