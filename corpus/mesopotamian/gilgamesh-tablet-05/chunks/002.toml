body = "A third dream, O comrade, I have beheld: but all awesome (this) dream which I have beholden: 15.\n\n(Loud) did the firmament roar, (and) earth (with the echo) resounded, Sombre the day, with darkness uprising, (and) levin bolts flashing, Kindled were flames, [and there, too, was Pestilence (?)] fill’d to o’erflowing, Gorgéd was Death!\n\n(Then) [faded] the glare, (then) faded the fires, 20.\n\nFalling, [the brands] turn’d to ashes—[Come, let us go] down to the desert, That we may counsel together.\" Enkidu (now) to interpret his dream unto Gilgamish speaketh: ( Remainder of Column III broken away ).\n\n( A variant version is found on one of the Semitic tablets from Boghaz Keui .\n\nWhere the sense becomes connected it briefly describes how the heroes halt for the night and at midnight sleep departs from the hero who tells his dream to Enkidu, after asking much in the same way why he is frightened at waking from his dream.\n\n\"Besides my first dream a second .\n\n.\n\n.\n\nIn my dream, O friend, a mountain .\n\n.\n\n.\n\nhe cast me down, seized my feet .\n\n.\n\n.\n\nThe brilliance increased: a man .\n\n.\n\n., most comely of all the land was his beauty .\n\n.\n\n.\n\nBeneath the mountain he drew me, and .\n\n.\n\n.\n\nwater he gave me to drink, and my desire [was assuaged]; to earth he set [my] feet .\n\n.\n\n.\n\nEnkidu unto this god .\n\n.\n\n.\n\nunto Gilgamish spake: \"My friend, we will go .\n\n.\n\n.\n\nwhatever is hostile .\n\n.\n\n.\n\nNot the mountain .\n\n.\n\n.\n\nCome, lay aside fear .\n\n.\n\n.\n\n\" The rest after about mutilated seven lines is lost ).\n\n( Column IV is all lost, and hardly anything of Column V remains.\n\nColumn VI once contained the story of the great fight, but except for a few broken lines at the end it is all lost.\n\nBut we can fortunately replace it from the Hittite version from Boghaz Keui ) Column VI .\n\n( The Fight with Humbaba ).\n\nIn the following manner .\n\n.\n\n.\n\nthe Sun-god in heaven .\n\n.\n\n.\n\nthe trees: He saw [Gilgamish]: of the Sun-god in heaven in .\n\n.\n\n.\n\n5.\n\nAnd [shew’d him] the dam on the ditches.\n\nGilgamish [spake] then [in orison] unto the Sun-god in heaven; \"Lo, on that day to the city .\n\n.\n\n.\n\n.\n\nwhich is in the city: 10.\n\nI in sooth [pray] to the Sun-god in heaven: I on a road have now started, .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\" Unto th’ entreaty of Gilgamish hearken’d the Sun-god in heaven, Wherefore against Humbaba he raised mighty winds: (yea), a great wind, Wind from the North, (aye), [a wind from the South], yea [a tempest] (and) storm wind, 15.\n\nChill wind, (and) whirlwind, a wind of (all) evil: ’twas eight winds he raiséd, Seizing [Humbaba] before and behind, so that nor to go forwards, Nor to go back was he able: and then Humbaba surrender’d.\n\n20."

