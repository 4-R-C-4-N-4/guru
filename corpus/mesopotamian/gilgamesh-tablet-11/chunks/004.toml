[content]
body = "Then, on arriving, the Queen (of the gods) the magnificent jewels Lifted on high, which Anu had made in accord with her wishes; 'O ye Gods!\n\nI will (rather) forget (this) my necklet of sapphires, 165.\n\nThan not maintain these days in remembrance, nor ever forget them.\n\n(So), though (the rest of) the gods may present themselves at the off’ring, Enlil (alone of the gods) may (himself) not come to the off’ring, Because he, unreasoning, brought on a deluge, and therefore my people Unto destruction consign’d.' 170.\n\nThen Enlil, on his arrival, Spied out the vessel, and (straightway) did Enlil burst into anger, Swollen with wrath ’gainst the gods, the Igigi : 'Hath any of mortals ’Scaped?\n\nSooth, never a man could have lived through (the welter of) ruin.' (Then) did Ninurta make answer and speak unto warrior Enlil, 175.\n\nSaying: 'O, who can there be to devise such a plan, except Ea?\n\nSurely, ’tis Ea is privy to ev’ry design.' Whereat Ea Answer’d and spake unto Enlil, the warrior, saying: 'O chieftain Thou of the gods, thou warrior!\n\nHow, forsooth, how (all) uncounsell’d 150.\n\nCouldst thou a deluge bring on?\n\n(Aye,) visit his sin on the sinner Visit his guilt on the guilty, (but) O, have mercy, that (thereby) He shall not be cut off; be clement, that he may not [perish].\n\nO, instead of thy making a flood, let a lion come, man to diminish; O, instead of thy making a flood, let a jackal come, man to diminish; O, instead of thy making a flood, let a famine occur, that the country 185.\n\nMay be [devour’d(?)]; instead of thy making a flood, let the Plague-god Come and the people [o’erwhelm]; Sooth, indeed ’twas not I of the Great Gods the secret revealéd, (But) to th’ Abounding in Wisdom vouchsafed I a dream, and (in this wise) He of the gods heard the secret.\n\nDeliberate, now, on his counsel'.\n\n190.\n\n(Then) to the Ark came up Enlil; my hand did he grasp, and uplifted Me, even me, and my wife, too, he raised, and, bent-kneed beside me, Made her to kneel; our foreheads he touch’d as he stood there between us, Blessing us; 'Uta-Napishtim hath hitherto only been mortal, Now, indeed, Uta-Napishtim and (also) his wife shall be equal 195.\n\nLike to us gods; in the distance afar at the mouth of the rivers Uta-Napishtim shall dwell'.\n\n(So) they took me and (there) in the distance Caused me to dwell at the mouth of the rivers.\n\nBut thee, as for thee, pray, Who will assemble the gods for thy (need), that the life which thou seekest Thou mayst discover?\n\nCome, fall not asleep for six days, aye, a se’nnight!\" ( But Gilgamish is too mortal to resist even sleep ).\n\n200.\n\n(Then), while he sat on his haunches a sleep like a breeze breathed upon him."

