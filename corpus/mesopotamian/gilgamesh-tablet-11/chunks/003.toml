[content]
body = "Nor could a brother distinguish his brother ; from heaven were mortals Not to be spied.\n\nO, were stricken with terror the gods at the Deluge, Fleeing, they rose to the Heaven of Anu, and crouch’d in the outskirts, 115.\n\nCow 'ring like curs were the gods (while) like to a woman in travail Ishtar did cry, she shrieking aloud, (e’en) the sweet-spoken Lady (She of the gods): 'May that day turn to dust, because I spake evil 120.\n\n(There) in th’ Assemblage of Gods!\n\nO, how could I utter (such) evil (There) in the Assemblage of Gods, (so) to blot out my people, ordaining Havoc!\n\nSooth, then, am I to give birth, unto (these) mine own people Only to glut (with their bodies) the Sea as though they were fish-spawn?' 125.\n\nGods—Anunnaki—wept with her, the gods were sitting (all) humbled, (Aye), in (their) weeping, (and) closed were their lips amid(?)]the Assemblage.\n\nSix days, a se’nnight the hurricane, deluge, (and) tempest continued Sweeping the land: when the seventh day came, were quelléd the warfare, 130.\n\nTempest (and) deluge which like to an army embattail’d were fighting.\n\nLull’d was the sea, (all) spent was the gale, assuaged was the deluge, (So) did I look on the day; (lo), sound was (all) still’d; and all human Back to (its) clay was return’d, and fen was level with roof-tree.\n\n135.\n\n(Then) I open’d a hatchway, and down on my cheek stream’d the sunlight, Bowing myself, I sat weeping, my tears o’er my cheek(s) overflowing, Into the distance I gazed, to the furthest bounds of the Ocean, 140.\n\nLand was uprear’d at twelve (points), and the Ark on the Mountain of Nisir Grounded; the Mountain of Nisir held fast, nor gave lease to her shifting.\n\nOne day, (nay,) two, did Nisir hold fast, nor give lease to her shifting.\n\nThree days, (nay), four, did Nisir hold fast, nor give lease to her shifting, Five days, (nay,) six, did Nisir hold fast, nor give lease to her shifting.\n\n145.\n\n(Then), when the seventh day dawn’d, I put forth a dove, and released (her), (But) to and fro went the dove, and return’d (for) a resting-place was not.\n\n150 (Then) I a swallow put forth and released; to and fro went the swallow, She (too) return’d, (for) a resting-place was not; I put forth a raven, Her, (too,) releasing; the raven went, too, and th’ abating of waters Saw; and she ate as she waded (and) splash’d, (unto me) not returning.\n\n155.\n\nUnto the four winds (of heaven) I freed (all the beasts), and an off’ring Sacrificed, and a libation I pour’d on the peak of the mountain, Twice seven flagons devoting, (and) sweet cane, (and) cedar, and myrtle, 160.\n\nHeap’d up beneath them; the gods smelt the savour, the gods the sweet savour Smelt; (aye,) the gods did assemble like flies o’er him making the off’ring."

