[content]
body = "Spake to her, Uta-Napishtim, yea, unto his wife: \"O, behold him, E’en the strong fellow who asketh for life, (how) hath breathéd upon him 205.\n\nSleep like a breeze!\" (Then) his wife unto Uta-Napishtim the Distant Answer 'd: \"O, touch him, and let the man wake, that the road he hath traversed He may betake himself homeward in peace, that he by the portal Whence he fared forth may return to his land.\" Spake Uta-Napishtim, 210.\n\n(Yea), to his wife: \"(How) the troubles of mortals do trouble thee also!\n\nBake then his flour (and) put at his head, but the time he is sleeping On the house-wall do thou mark it.\n\n\" (So straightway) she (did so), his flour Baked she (and) set at his head, but the time he was sleeping she noted 215.\n\nOn the house-wall.\n\n(So), first was collected his flour, (then) secondly sifted, Thirdly , ’twas moisten’d, and fourthly she kneaded his dough, and so fifthly Leaven she added, and sixthly ’twas baked; (then) seventh —he touch’d him, All on a sudden, and (so from his slumber) awoke the (great) fellow!\n\n________________________________ Gilgamish unto him spake, (yea) to Uta-Napishtim the Distant: 220.\n\n\"(Tell me), I pr’ythee (?), was 't thou, who when sleep was shower’d upon me All on a sudden didst touch me, and (straightway) rouse me (from slumber)?\" Uta-Napishtim to Gilgamish [spake, (yea), unto him spake he]: \"Gilgamish, told was the tale of thy meal .\n\n.\n\n.\n\nand (then) did I wake thee: 225.\n\n[ 'One' —was collected] thy flour: [(then) 'two' ]—it was sifted; (and) 'thirdly' — Moisten’d: (and) 'fourthly' —she kneaded thy dough [(and) 'fifthly' ] the leaven Added: (and) 'sixthly' —’twas baked: [(and) 'seventh' ] —’twas I on a sudden Touch’d thee and thou didst awake.\" To Uta-Napishtim, the Distant, 230.\n\nGilgamish answer'd: \"O, [how] shall I act, (or) where shall I hie me, Uta-Napishtim?\n\nA Robber (from me) hath ravish’d my [courage,] Death [in] my bed-chamber broodeth, and Death is wherever I [listen] .\" ________________________________ [Spake] to [him, (yea),] to the boatman Ur-Shanabi Uta-Napishtim: 235.\n\n\"’Tis thou, Ur-Shanabi .\n\n.\n\n.\n\nthe crossing, will hate thee, (Sooth), to all those who come to its marge, doth its marge set a limit: (This) man for whom thou wert guide—are stains to cover his body, Or shall a skin hide the grace of his limbs?\n\nUr-Shanabi, take him, 240."

