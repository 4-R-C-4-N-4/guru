[content]
body = "(Then) on the fifth day (after) I laid out the shape (of my vessel), Ten gar each was the height of her sides, in accord with her planning(?), Ten gar to match was the size of her deck (?), and the shape of the forepart (?) 60.\n\nDid I lay down, (and) the same did I fashion; (aye), six times cross-pinn’d her, Sevenfold did I divide her .\n\n.\n\n.\n\n., divided her inwards Ninefold: hammer’d the caulking within her, (and) found me a quant-pole, 65.\n\n(All) that was needful I added; the hull with six shar of bitumen Smear’d I, (and) three shar of pitch [did I smear] on the inside; some people, Bearing a vessel of grease, three shar of it brought (me); (and) one shar (Out of this) grease did I leave, which the tackling (?) consumed; (and) the boatman 70.\n\nTwo shar of grease stow’d away; (yea), beeves for the .\n\n.\n\n.\n\nI slaughter’d, Each day lambs did I slay: mead, beer, oil, wine, too, the workmen [Drank] as though they were water , and made a great feast like the New Year, ( Five mutilated lines \"I added salve for the hand(s),\" \"the vessel was finish’d .\n\n.\n\n.\n\nShamash the great.\" \"was difficult,\" \" .\n\n.\n\n?\n\nI caused to bring above and below,\" \"two-thirds of it\" ): ________________________________ 80.\n\n[All I possess’d I] laded aboard her; the silver I laded All I possess'd; gold, all I possess’d I laded aboard her, All I possess’d of the seed of all living [I laded aboard] her.\n\nInto the ship I embark’d all my kindred and family (with me), 85.\n\nCattle (and) beasts of the field (and) all handicraftsmen embarking.\n\n(Then) decreed Shamash the hour: \" .\n\n.\n\n.\n\n.\n\n(?) Shall in the night let a plentiful rainfall(?) pour down .\n\n.\n\n.\n\n.\n\n(Then) do thou enter the vessel, and (straightway) shut down thy hatchway.\" 90.\n\nCame (then) that hour (appointed), .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n(?) Did in the night let a plentiful rainfall(?) pour down .\n\n.\n\n.\n\n.\n\n(?) View’d I the aspect of day: to look on the day bore a horror, (Wherefore) I enter’d the vessel, and (straightway) shut down my hatchway, (So, too) to shut down the vessel to Puzur-Amurri (?), the boatman, 95.\n\nDid I deliver the poop (of the ship), besides its equipment.\n\n________________________________ (Then), when something of dawn had appear’d, from out the horizon Rose a cloud darkling; (lo), Adad (the storm-god) was rumbling within it, 100.\n\nNabu and Sharru were leading the vanguard, and coming as heralds Over the hills and the levels: (then) Irragal wrench’d out the bollards; Havoc Ninurta let loose as he came, th’ Anunnaki their torches 105.\n\nBrandish’d, and shrivell’d the land with their flames; desolation from Adad Stretch’d to (high) Heaven, (and) all that was bright was turn’d into darkness.\n\n( Four lines mutilated \"the land like .\n\n.\n\n.,\" \"for one day the st[orm] .\n\n.\n\n., \" \"fiercely blew .\n\n.\n\n.\n\n.\n\n\" \"like a battle .\n\n.\n\n.\n\n\" )."

