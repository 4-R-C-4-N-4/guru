[content]
body = "Lead him to where he may bathe, that he wash off his stains in the water (White) as the snow: let him cast off his pelt(s) that the sea may remove (them); Fair let his body appear: of his head be the fillet renewéd, Let him, as clothes for his nakedness, garb himself in a mantle, 245.\n\nSuch that, or ever he come to his city, and finish his journey, No (sign of) age shall the mantle betray, but preserve (all) its freshness.\" Wherefore Ur-Shanabi took him, and where he might bathe did he lead him, Washing his stains in the [water] like snow, his pelt(s), [too], discarding, 250.\n\nSo that the sea might bear them away; (and) his body appearéd Fair; [of] his head he [the fillet] renewed, and himself in a mantle Garb’d, as the clothes for his nakedness, [such that or ever his city Reach he], or ever he finish his journey, [the mantle betray not 255.\n\nAge, but] preserve [(all) its freshness].\n\n(So) into their vessel embarkéd Gilgamish, (aye), and Ur-Shanabi, launching (their) craft [on the billow], They themselves riding aboard (her).\n\n( The magic gift of restored youth ).\n\nTo Uta-Napishtim, the Distant , Spake (then) his wife: \"Came Gilgamish (hither) aweary with rowing, 260.\n\nWhat wilt thou give wherewith he return to his land?\" and the meanwhile Gilgamish, lifting his pole, was pushing the boat at the seashore.\n\n(Then answer'd) Uta-Napishtim to him, (yea), [to] Gilgamish [spake he]: \"Gilgamish, (hither) didst come (all) aweary with rowing; (O, tell me), 265.\n\nWhat shall I give thee (as gift) wherewith to return to thy country?\n\nGilgamish, I will reveal thee a hidden matter .\n\n.\n\n.\n\nI'll tell thee: There is a plant like a thorn with its root (?) [deep down in the ocean], Like unto those of the briar (in sooth) its prickles will scratch [thee], 270.\n\n(Yet) if thy hand reach this plant, [thou’lt surely find life (everlasting)] .\" (Then), when Gilgamish heard this, he loosen’d) [his girdle about him], Bound heavy stones [on his feet], which dragg’d him down to the sea-deeps, [Found he the plant]; as he seized on the plant, (lo), [its prickles did scratch him].\n\n275.\n\nCut he the heavy stones [from his feet] that again it restore him Unto its shore.\n\n________________________________ Gilgamish spake to him, (yea), to the boatman Ur-Shanabi (this wise): \"(Nay, but) this plant is a plant of great wonder(?), Ur-Shanabi,\" said he, \"Whereby a man may attain his desire—I'll take it to Erech, 280.\n\n(Erech), the high-wall’d, and give it to eat [unto .\n\n.\n\n.\n\n.].\n\n'Greybeard-who-turneth-to-man-in-his-prime' is its name and I'll eat it I myself, that again I may come to my youthful condition.\" ( The Quest ends in Tragedy ).\n\nBroke they their fast at the fortieth hour: at the sixtieth rested.\n\n285.\n\nGilgamish spied out a pool of cool water, (and) therein descending Bathed in the water."

