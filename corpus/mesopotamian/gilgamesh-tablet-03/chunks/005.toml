[content]
body = "We, O King, in our conclave have paid deep heed to thy welfare, Thou, O King, in return with an (equal) heed shalt requite us.\" Gilgamish open’d his mouth, and spake unto Enkidu, saying: 15.\n\n\"Unto the Palace of Splendour, O friend, come, let us betake us, Unto the presence of Nin-sun, the glorious Queen, (aye) to Nin-sun, Wisest of (all) clever women, all-knowing; a well-devised pathway She will prescribe for our feet.\" 20.\n\nClasp’d they their hands, each to each, and went to the Palace of Splendour, Gilgamish , Enkidu.\n\nUnto the glorious Queen, (aye) to Nin-sun Gilgamish came, and he enter’d in unto [the presence of Nin-sun]: \"Nin-sun, O fain would I tell thee [how] I a far journey [am going], 25.\n\n(Unto) the home [of Humbaba to counter a] warfare I know not, [Follow a road] which I [know] not, [(aye) from the time of my starting], [Till my return, until I arrive at the Forest of Cedars,] [Till I o’erthrow Humbaba, the Fierce, and destroy from the country.] [All that the Sun-god abhorreth of evil]\" .\n\n.\n\n.\n\n.\n\n( The rest of the speech of Gilgamish is lost until the end of the Column, where we find him still addressing his mother, and apparently asking that she shall garb herself in festal attire to beg a favour of the Sun-god ).\n\n\" .\n\n.\n\n.\n\ngarb thyself; .\n\n.\n\n.\n\nin thy presence.\n\n(So) to her offspring, to Gilgamish [Nin-sun] gave ear .\n\n.\n\n.\n\n-ly, Column II .\n\nEnter’d [her chamber] .\n\n.\n\n.\n\n[and deck’d herself] with the flowers of Tulal (?), [Put on] the festal garb of her body .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n5.\n\n[Put on] the festal garb of her bosom .\n\n.\n\n., her head [with a circlet] Crown’d, and .\n\n.\n\n.\n\nthe ground ipirani .\n\nClimb’d [she the stairway], ascended the roof, and [the parapet(?)] mounted, Offer’d her incense to Shamash, (her) sacrifice offer’d [to Shamash], (Then) towards Shamash her hands she uplifted (in orison saying): 10.\n\n\"Why didst thou give (this) restlessness of spirit With which didst dower Gilgamish, [my] son?\n\nThat now thou touchest him, and (straight) he starteth A journey far to where Humbaba (dwelleth), To counter warfare which he knoweth not, Follow a pathway which he knoweth not, 15.\n\n(Aye), from the very day on which he starteth, Till he return, till to the Cedar Forest He reach; till he o’erthrow the fierce Humbaba, And from the land destroy all evil things Which thou abhor’st; the day which [thou hast set] 20.\n\nAs term, of (that) strong man (who) feareth thee, May Aa , (thy) bride, be [thy] remembrancer.\n\nHe the night-watches .\n\n.\n\n.\n\n.\n\n.\" ( Columns III, IV, and V are much mutilated."

