body = "The Epic of Gilgamish , tr.\n\nby R.\n\nCampbell Thompson [1928], at sacred-texts.com THE THIRD TABLET.\n\nTHE EXPEDITION TO THE FOREST OF CEDARS AGAINST HUMBABA.\n\n( About a column and a half of the beginning of the Old Babylonian version on the Yale tablet are so broken that almost all the text is lost.\n\nGilgamish and Enkidu have now become devoted friends, thus strangely stultifying the purpose for which Enkidu was created, and now is set afoot the great expedition against the famous Cedar Forest guarded by the Ogre Humbaba.\n\nThe courtesan has now for a brief space left the scene, having deserted Enkidu, much to his sorrow.\n\nThe mutilated Assyrian Version gives a hint that the mother of Gilgamish is now describing the fight to one of her ladies(?) Rishat-Nin .\n\n.\n\n.\n\nand where her recital becomes connected the story runs thus ).\n\nColumn II .\n\n( The Tale of the Fight ).\n\n\"He lifted up [his foot, to the door .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n21.\n\n(?) They raged furiously .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nEnkidu hath not [his equal] .\n\n.\n\n.\n\nunkempt is the hair .\n\n.\n\n.\n\n(Aye) he was born in the desert, and [no] one [his presence can equal].\" ( Enkidu's sorrow at the loss of his Love ).\n\nEnkidu (there) as he stood gave ear [to his utterance (?)], grieving 26.\n\nSitting [in sorrow]: his eyes fill‚Äôd [with tears], and his arms lost their power, [Slack‚Äôd was his bodily vigour].\n\nEach clasp]d [the hand of] the other.\n\n37.\n\n[Holding] like [brothers] their grip .\n\n.\n\n.\n\n[(and) to Gilgamish] Enkidu answer‚Äôd: 40.\n\n\"Friend, ‚Äôtis my darling hath circled (her arms) round my neck (to farewell me) , (Wherefore) my arms lose their power, my bodily vigour is slacken 'd.\" ( The Ambition of Gilgamish ).\n\n45.\n\nGilgamish open‚Äôd his mouth, and to Enkidu spake he (in this wise): Column III .\n\n( Gap of about two lines ) \"[I, O my friend, am determined to go to the Forest of Cedars], 5.\n\n[(Aye) and] Humbaba the Fierce [will] o‚Äôercome and destroy [what is evil] 10.\n\n[(Then) will I cut down] the Cedar .\n\n.\n\n.\n\n.\n\n.\" Enkidu open‚Äôd his mouth, and to Gilgamish spake he (in this wise), 15.\n\n\"Know, then, my friend, what time I was roaming with kine in the mountains I for a distance of two hours' march from the skirts of the Forest Into its depths would go down.\n\nHumbaba‚Äîhis roar was a whirlwind, 20.\n\nFlame (in) his jaws, and his very breath Death!\n\nO, why hast desired This to accomplish?\n\nTo meet(?) with Humbaba were conflict unequall‚Äôd.\" 25.\n\nGilgamish open‚Äôd his mouth and to Enkidu spake he (in this wise): \"[Tis that I need] the rich yield of its mountains [I go to the Forest]\" .\n\n.\n\n.\n\n.\n\n( Seven mutilated lines continuing the speech of Gilgamish, and mentioning \"the dwelling [ of the gods?\n\n] \" (of the beginning of the Fifth Tablet), and \"the axe,\" for cutting down the Cedars ).\n\n36.\n\nEnkidu open‚Äôd his mouth [and] to Gilgamish spake he (in this wise): 40."

