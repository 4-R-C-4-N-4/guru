[content]
body = "THE THIRD TABLET.\n\nTHE EXPEDITION TO THE FOREST OF CEDARS AGAINST HUMBABA.\n\n.\n\n.\n\n\"He lifted up [his foot, to the door .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n21.\n\n(?) They raged furiously .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nEnkidu hath not [his equal] .\n\n.\n\n.\n\nunkempt is the hair .\n\n.\n\n.\n\n(Aye) he was born in the desert, and [no] one [his presence can equal].\" .\n\nEnkidu (there) as he stood gave ear [to his utterance (?)], grieving 26.\n\nSitting [in sorrow]: his eyes fill’d [with tears], and his arms lost their power, [Slack’d was his bodily vigour].\n\nEach clasp]d [the hand of] the other.\n\n37.\n\n[Holding] like [brothers] their grip .\n\n.\n\n.\n\n[(and) to Gilgamish] Enkidu answer’d: 40.\n\n\"Friend, ’tis my darling hath circled (her arms) round my neck (to farewell me) , (Wherefore) my arms lose their power, my bodily vigour is slacken 'd.\" .\n\n45.\n\nGilgamish open’d his mouth, and to Enkidu spake he (in this wise):   \"[I, O my friend, am determined to go to the Forest of Cedars], 5.\n\n[(Aye) and] Humbaba the Fierce [will] o’ercome and destroy [what is evil] 10.\n\n[(Then) will I cut down] the Cedar .\n\n.\n\n.\n\n.\n\n.\" Enkidu open’d his mouth, and to Gilgamish spake he (in this wise), 15.\n\n\"Know, then, my friend, what time I was roaming with kine in the mountains I for a distance of two hours' march from the skirts of the Forest Into its depths would go down.\n\nHumbaba—his roar was a whirlwind, 20.\n\nFlame (in) his jaws, and his very breath Death!\n\nO, why hast desired This to accomplish?\n\nTo meet(?) with Humbaba were conflict unequall’d.\" 25.\n\nGilgamish open’d his mouth and to Enkidu spake he (in this wise): \"[Tis that I need] the rich yield of its mountains [I go to the Forest]\" .\n\n.\n\n.\n\n.\n\n.\n\n36.\n\nEnkidu open’d his mouth [and] to Gilgamish spake he (in this wise): 40.\n\n\"(But) when we go to the Forest [of Cedars] .\n\n.\n\n.\n\nits guard is a [Fighter], Strong, never [sleeping], O Gilgamish .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n1.\n\nSo that he safeguard the Forest of Cedars a terror to mortals Him hath Enlil appointed—Humbaba, his roar is a whirlwind, Flame (in) his jaws, and his very breath Death!\n\n(Aye), if he in the Forest.\n\nHear (but) a tread(?) on the road—'Who is this come down to his Forest?' So that he safeguard the Forest of Cedars, a terror to mortals, Him hath Enlil appointed, and fell hap will seize him who cometh Down to his Forest.\" 3.\n\nGilgamish open’d his mouth and to Enkidu spake he (in this wise): 5.\n\n\"Who, O my friend, is unconquer’d by [death]?\n\nA divinity, certes, Liveth for aye in the daylight, but mortals—their days are (all) number’d, All that they do is (but) wind—But to thee, now death thou art dreading, 10."

