[content]
body = "(Now) do the [Elders] farewell him with blessings, to Gilgamish giving Counsel [concerning] the road: \"O Gilgamish, to thine own power Trust not (alone); (but at least) let thy [road] be traversed [before] thee, Guard thou thy person; let Enkidu go before thee (as vaward).\n\n(Aye, for) ’twas he hath discover’d the [way], the road he hath travell’d.\n\n25.\n\n(Sooth), of the Forest the passes are all under sway (?) [of] Humbaba, [(Yea), he who goeth] as vaward is (able) to safeguard a comrade, O that the Sun-god [may grant] thee [success to attain] thine [ambition], 30.\n\n0 that he grant that thine eyes see (consummate) the words of thy utt’rance O that he level the path that is block’d, cleave a road for thy treading, 35.\n\nCleave, too, the berg for thy foot!\n\nMay the god Lugal-banda Bring in thy night-time a message to thee, with which shalt be gladden’d, So that it help thine ambition , (for), like a boy thine ambition On the o’erthrow of Humbaba thou fixest, as thou hast settled.\n\n40.\n\nWash, (then), thy feet : when thou haltest , shalt hollow a pool, so that ever Pure be the water within thy skin-bottle, (aye), cool be the water Unto the Sun-god thou pourest, (and thus) shalt remind Lugal-banda.\" 45.\n\nEnkidu open’d his mouth, and spake unto Gilgamish, (saying): \"[Gilgamish], art (?) thou (in truth) full equal to making (this) foray?\n\nLet [not] thy heart be afraid; trust me.\" On (his) shoulder his mantle 50.\n\n[Drew] he, (and now) [on the road] to Humbaba they set forth (together).\n\n( Five lines mutilated; the two heroes meet a man who sets them on their way ).\n\n56.\n\n\" .\n\n.\n\n.\n\nthey went with me .\n\n.\n\n.\n\n[tell] you .\n\n.\n\nin joy of heart.\" 60.\n\n[So when he heard this his word, the man on his way did [direct him]: \"Gilgamish, go, .\n\n.\n\n.\n\nlet thy brother (?) precede [thee] .\n\n.\n\n.\n\n[(and) in thine ambition].\n\n[O that the Sun-god (?)] may shew [thee] success!\" ( The Old Babylonian Version breaks off after three more fragmentary lines.\n\nThe following is the Assyrian Version of Column VI , l .\n\n21, and onwards of the preceding text.\n\nIt marks the beginning of the Third Tablet in the Assyrian Version, opening with the episode of the conclave of the Elders ).\n\n\"Gilgamish, put not thy faith in the strength of thine own person (solely), Quench’d be thy wishes to trusting(?\n\n(o’ermuch) in thy (shrewdness in) smiting.\n\n(Sooth), he who goeth as vaward is able to safeguard a comrade, 5.\n\nHe who doth know how to guide hath guarded his friend; (so) before thee, Do thou let Enkidu go, (for ’tis) he to the Forest of Cedars Knoweth the road: ’tis he lusteth for battle, and threateneth combat.\n\nEnkidu—he would watch over a friend, would safeguard a comrade, 10.\n\n(Aye, such an one) would deliver his person from out of the pitfalls."

