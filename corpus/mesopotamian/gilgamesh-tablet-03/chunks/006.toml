[content]
body = "There is the remnant of a passage in Assyrian, corresponding to the Third Tablet of the Old Babylonian Version, Column III, 15 , which gives Enkidu's speech about \"the mountains,\" \"the cattle of the field,\" and how \"he waited\": then follows another fragment with a mention of the \"corpse\" [ of Humbaba ] and of the Anunnaki (the Spirits of Heaven), and a repetition of the line \"that strong man (who) feareth [ thee ] .\" Then a reference to \"the journey\" until [ Gilgamish shall have overthrown the fierce Humbaba ] , be it after an interval of days, months, or years; and another fragment probably part of the previous text, where someone \"heaps up incense\" [ to a god ] , and Enkidu again speaks with someone, but the mutilated text does not allow us much light on its connection, and although there is another fragment, the connection again is not obvious.\n\nThe last column is a repetition of what the Elders said to Gilgamish ): \"(Aye, such an one) [would deliver his person] from out of the pitfalls.\n\n10.\n\n[We, O King], in our conclave [have paid deep heed to thy welfare], (Now), O King, in thy turn with an (equal) heed] shalt requite us.\" Enkidu [open'd] his mouth [and spake unto Gilgamish, saying]: \"Turn, O my friend .\n\n.\n\n.\n\n.\n\na road not .\n\n.\n\n.\n\n.\""

