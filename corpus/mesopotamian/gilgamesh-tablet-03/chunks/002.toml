[content]
body = "\"(But) when we go to the Forest [of Cedars] .\n\n.\n\n.\n\nits guard is a [Fighter], Strong, never [sleeping], O Gilgamish .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n( Three mutilated lines, apparently explaining the powers which Shamash (?), the Sun-god, and Adad, the Storm-god, have bestow’d on Humbaba ).\n\nColumn IV .\n\n1.\n\nSo that he safeguard the Forest of Cedars a terror to mortals Him hath Enlil appointed—Humbaba, his roar is a whirlwind, Flame (in) his jaws, and his very breath Death!\n\n(Aye), if he in the Forest.\n\nHear (but) a tread(?) on the road—'Who is this come down to his Forest?' So that he safeguard the Forest of Cedars, a terror to mortals, Him hath Enlil appointed, and fell hap will seize him who cometh Down to his Forest.\" 3.\n\nGilgamish open’d his mouth and to Enkidu spake he (in this wise): 5.\n\n\"Who, O my friend, is unconquer’d by [death]?\n\nA divinity, certes, Liveth for aye in the daylight, but mortals—their days are (all) number’d, All that they do is (but) wind—But to thee, now death thou art dreading, 10.\n\nProffereth nothing of substance thy courage—I, I'll be thy va ward!\n\n’Tis thine own mouth shall tell thou didst fear the onslaught (of battle), (I, forsooth), if I should fall, my name will have stablish’d (for ever).\n\n15.\n\nGilgamish ’twas, who fought with Humbaba, the Fierce!\n\n(In the future), After my children are born to my house, and climb up thee, (saying): 'Tell to us all that thou knowest' .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n( Four lines mutilated ).\n\n[(Yea), when thou] speakest [in this wise], thou grievest my heart (for) the Cedar 25.\n\n[I am] determined [to fell], that I may gain [fame] everlasting.\n\n( The Weapons are cast for the Expedition ).\n\n(Now), O my friend, [my charge] to the craftsmen I fain would deliver, So that they cast in our presence [our weapons].\" [The charge] they deliver’d 30.\n\nUnto the craftsmen: the mould (?) did the workmen prepare, and the axes Monstrous they cast: (yea), the celts did they cast, each (weighing) three talents; Glaives, (too,) monstrous they cast, with hilts each (weighing) two talents, 35.\n\nBlades, thirty manas to each, corresponding to fit them: [the inlay(?)], Gold thirty manas (each) sword: (so) were Gilgamish , Enkidu laden Each with ten talents.\n\n( Gilgamish takes counsel with the Elders ).\n\n(And now) [in] the Seven Bolt [Portal of Erech] Hearing [the bruit(?)] did the artisans gather, [assembled the people(?)] , 40.\n\n(There) in the streets of broad-marketed Erech, [in] Gilgamish’ honour(?)] , [So did the Elders of Erech] broad-marketed take seat before him.\n\n[Gilgamish] spake [thus: \"O Elders of Erech] broad-marketed, [hear me!] 45.\n\n[I go against Humbaba, the Fierce, who shall say, when he heareth] , Column V ."

