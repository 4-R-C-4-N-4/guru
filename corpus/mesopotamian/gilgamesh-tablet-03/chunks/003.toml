[content]
body = "'(Ah), let me look on (this) Gilgamish, he of whom (people) are speaking, He with whose fame the countries are fill’d'—’Tis I will o’erwhelm him, 5.\n\n(There) in the Forest of Cedars—I'll make the land hear (it) (How) like a giant the Scion of Erech is—(yea, for) the Cedars I am determined to fell, that I may gain fame everlasting.\" Gilgamish (thus) did the Elders of Erech broad-marketed answer: 10.\n\n\"Gilgamish, ’tis thou art young, that thy valour (o’ermuch) doth uplift thee, Nor dost thou know to the full what thou dost seek to accomplish.\n\nUnto our ears hath it come of Humbaba, his likeness is twofold.\n\n15.\n\nWho (of free will) then would [seek to] oppose [in encounter] his weapons?\n\nWho for a distance of two hours’ march from the skirts of the Forest Unto its depths would [go] down?\n\nHumbaba, his roar is a whirlwind, Flame (in) his jaws, and his very breath Death!\n\n(O), why hast desired.\n\nThis to accomplish?\n\nTo meet(?) with Humbaba were conflict unequall’d.\" 20.\n\nGilgamish unto the rede of his counsellors hearken’d and ponder’d, Cried to [his] friend: \"Now, indeed, O [my] fried, [will I] thus [voice opinion].\n\nI (forsooth) dread him, and (yet) to [(the depths of the) Forest] I'll take [me] .\n\n.\" ( About seven lines mutilated or missing in which the Elders bless Gilgamish in farewell ).\n\n\" .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nmay thy god (so) [protect] thee, Bringing thee back [(safe and)] sound to the walls of [broad-marketed] Erech.\" 35.\n\nGilgamish knelt [before Shamash] a word [in his presence] to utter: \"Here I present myself, Shamash, [to lift up] my hands (in entreaty), O that hereafter my life may be spared, to the ramparts of [Erech] 40.\n\nBring me again: spread thine aegis [upon me] .\" And Shamash made answer, [Speaking] his oracle .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n( About six lines mutilated or missing ).\n\nColumn VI .\n\nTears adown Gilgamish’ [cheeks were (now)] streaming: \"A road I have never Traversed [I go, on a passage(?)] I know not, (but if) I be spared 5.\n\n(So) in content [will I] come [and will pay thee(?)] due meed (?) of thy homage.\" ( Two mutilated lines with the words \"on seats\" and \"his equipment.\" ) 10.\n\nMonstrous [the axes they brought(?)], they deliver’d [the bow] and the quiver [Into] (his) hand; (so) taking a celt, [he slung on (?)] his quiver, 15.\n\n[Grasping] another [celt(?) he fasten’d his glaive] to his baldrick.\n\n[But, or ever the twain] had set forth on their journey, they offer’d [Gifts] to the Sun-god, that home he might bring them to Erech (in safety).\n\n( The Departure of the two Heroes ).\n\n20."

