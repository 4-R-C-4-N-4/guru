body = "I (forsooth) dread him, and (yet) to [(the depths of the) Forest] I'll take [me] .\n\n.\" .\n\n\" .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nmay thy god (so) [protect] thee, Bringing thee back [(safe and)] sound to the walls of [broad-marketed] Erech.\" 35.\n\nGilgamish knelt [before Shamash] a word [in his presence] to utter: \"Here I present myself, Shamash, [to lift up] my hands (in entreaty), O that hereafter my life may be spared, to the ramparts of [Erech] 40.\n\nBring me again: spread thine aegis [upon me] .\" And Shamash made answer, [Speaking] his oracle .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nTears adown Gilgamish’ [cheeks were (now)] streaming: \"A road I have never Traversed [I go, on a passage(?)] I know not, (but if) I be spared 5.\n\n(So) in content [will I] come [and will pay thee(?)] due meed (?) of thy homage.\" 10.\n\nMonstrous [the axes they brought(?)], they deliver’d [the bow] and the quiver [Into] (his) hand; (so) taking a celt, [he slung on (?)] his quiver, 15.\n\n[Grasping] another [celt(?) he fasten’d his glaive] to his baldrick.\n\n[But, or ever the twain] had set forth on their journey, they offer’d [Gifts] to the Sun-god, that home he might bring them to Erech (in safety).\n\n.\n\n20.\n\n(Now) do the [Elders] farewell him with blessings, to Gilgamish giving Counsel [concerning] the road: \"O Gilgamish, to thine own power Trust not (alone); (but at least) let thy [road] be traversed [before] thee, Guard thou thy person; let Enkidu go before thee (as vaward).\n\n(Aye, for) ’twas he hath discover’d the [way], the road he hath travell’d.\n\n25.\n\n(Sooth), of the Forest the passes are all under sway (?) [of] Humbaba, [(Yea), he who goeth] as vaward is (able) to safeguard a comrade, O that the Sun-god [may grant] thee [success to attain] thine [ambition], 30.\n\n0 that he grant that thine eyes see (consummate) the words of thy utt’rance O that he level the path that is block’d, cleave a road for thy treading, 35.\n\nCleave, too, the berg for thy foot!\n\nMay the god Lugal-banda Bring in thy night-time a message to thee, with which shalt be gladden’d, So that it help thine ambition , (for), like a boy thine ambition On the o’erthrow of Humbaba thou fixest, as thou hast settled.\n\n40.\n\nWash, (then), thy feet : when thou haltest , shalt hollow a pool, so that ever Pure be the water within thy skin-bottle, (aye), cool be the water Unto the Sun-god thou pourest, (and thus) shalt remind Lugal-banda.\" 45.\n\nEnkidu open’d his mouth, and spake unto Gilgamish, (saying): \"[Gilgamish], art (?) thou (in truth) full equal to making (this) foray?\n\nLet [not] thy heart be afraid; trust me.\" On (his) shoulder his mantle 50."

