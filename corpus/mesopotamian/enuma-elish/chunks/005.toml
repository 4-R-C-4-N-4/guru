[content]
body = "Be thou exalted, thou my chosen spouse, May they magnify thy name over all of them ...\n\nthe Anunnaki.\" She hath given him the Tablets of Destiny, on his breast she laid them, saying: Thy command shall not be without avail, and the word of thy mouth shall be established.\" Now Kingu, thus exalted, having received the power of Anu, Decreed the fate for the gods, her sons, saving: Let the opening of your mouth quench the Fire-god; Whoso is exalted in the battle, let him display his might!\" I sent Anu, but he could not withstand her; Nudimmud was afraid and turned back.\n\nBut Marduk hath set out, the director of the gods, your son; To set out against Tiamat his heart hath prompted him.\n\nHe opened his mouth and spake unto me, saying: \"If I, your avenger, Conquer Tiamat and give you life, Appoint an assembly, make my fate preeminent and proclaim it.\n\nIn Upsukkinaku seat yourself joyfully together; With my word in place of you will I decree fate.\n\nMay whatsoever I do remain unaltered, May the word of my lips never be changed nor made of no avail.\"' Hasten, therefore, and swiftly decree for him the fate which you bestow, That he may go and fight your strong enemy.\n\nGaga went, he took his way and Humbly before Lahmu and Lahamu, the gods, his fathers, He made obeisance, and he kissed the ground at their feet.\n\nHe humbled himself; then he stood up and spake unto them saying: \"Ansar, your son, hath sent me, The purpose of his heart he hath made known unto me.\n\nHe saith that Tiamat our mother hath conceived a hatred for us, With all her force she rageth, full of wrath.\n\nAll the gods have turned to her, With those, whom ye created, they go at her side.\n\nThey are banded together and at the side of Tiamat they advance; They are furious, they devise mischief without resting night and day.\n\nThey prepare for battle, fuming and raging; They have joined their forces and are making war.\n\nUmmu-Hubur, who formed all things, Hath made in addition weapons invincible; she hath spawned monster-serpents, Sharp of tooth and merciless of fang.\n\nWith poison, instead of blood, she hath filled their bodies.\n\nFierce monster-vipers she hath clothed with terror, With splendor she hath decked them, she hath made them of lofty stature.\n\nWhoever beboldeth them, terror overcometh him, Their bodies rear up and none can withstand their attack.\n\nShe hath set up vipers, and dragons, and the monster Lahamu, And hurricanes, and raging hounds, and scorpion-men, And mighty tempests, and fish-men, and rams; They bear merciless weapons, without fear of the fight.\n\nHer commands are mighty; none can resist them; After this fashion, huge of stature, hath she made eleven monsters.\n\nAmong the gods who are her sons, inasmuch as he hath given her support, She hath exalted Kingu; in their midst she hath raised him to power.\n\nTo march before the forces, to lead the host, To give the battle-signal, to advance to the attack, To direct the battle, to control the fight, Unto him hath she entrusted; in costlv raiment she hath made him sit, saving: I have uttered thy spell; in the assembly of the gods I have raised thee to power, The dominion over all the gods have I entrusted unto thee.\n\nBe thou exalted, thou my chosen spouse, May they magnify thy name over all of them...the Anunnaki."

