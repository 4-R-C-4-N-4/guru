[content]
body = "let us wage war!\" ...\n\nthe gods in the midst of...\n\n...\n\nfor the gods did she create.\n\nThey banded themselves together and at the side of Tiamat they advanced; They were furious; they devised mischief without resting night and day.\n\nThey prepared for battle, fuming and raging; They joined their forces and made war, Ummu-Hubur [Tiamat] who formed all things, Made in addition weapons invincible; she spawned monster-serpents, Sharp of tooth, and merciless of fang; With poison, instead of blood, she filled their bodies.\n\nFierce monster-vipers she clothed with terror, With splendor she decked them, she made them of lofty stature.\n\nWhoever beheld them, terror overcame him, Their bodies reared up and none could withstand their attack.\n\nShe set up vipers and dragons, and the monster Lahamu, And hurricanes, and raging hounds, and scorpion-men, And mighty tempests, and fish-men, and rams; They bore cruel weapons, without fear of the fight.\n\nHer commands were mighty, none could resist them; After this fashion, huge of stature, she made eleven [kinds of] monsters.\n\nAmong the gods who were her sons, inasmuch as he had given her support, She exalted Kingu; in their midst she raised him to power.\n\nTo march before the forces, to lead the host, To give the battle-signal, to advance to the attack, To direct the battle, to control the fight, Unto him she entrusted; in costly raiment she made him sit, saying: I have uttered thy spell, in the assembly of the gods I have raised thee to power.\n\nThe dominion over all the gods have I entrusted unto him.\n\nBe thou exalted, thou my chosen spouse, May they magnify thy name over all of them the Anunnaki.\" She gave him the Tablets of Destiny, on his breast she laid them, saying: Thy command shall not be without avail, and the word of thy mouth shall be established.\" Now Kingu, thus exalted, having received the power of Anu, Decreed the fate among the gods his sons, saying: \"Let the opening of your mouth quench the Fire-god; Whoso is exalted in the battle, let him display his might!\" THE SECOND TABLET Tiamat made weighty her handiwork, Evil she wrought against the gods her children.\n\nTo avenge Apsu, Tiamat planned evil, But how she had collected her forces, the god unto Ea divulged.\n\nEa harkened to this thing, and He was grievously afflicted and he sat in sorrow.\n\nThe days went by, and his anger was appeased, And to the place of Ansar his father he took his way.\n\nHe went and, standing before Ansar, the father who begat him, All that Tiamat had plotted he repeated unto him, Saying, \"Tiamat our mother hath conceived a hatred for us, With all her force she rageth, full of wrath.\n\nAll the gods have turned to her, With those, whom ye created, thev go at her side.\n\nThey are banded together and at the side of Tiamat they advance; They are furious, they devise mischief without resting night and day.\n\nThey prepare for battle, fuming and raging; They have joined their forces and are making war.\n\nUmmu-Hubur, who formed all things, Hath made in addition weapons invincible; she hath spawned monster-serpents, Sharp of tooth, and merciless of fang.\n\nWith poison, instead of blood, she hath filled their bodies.\n\nFierce monster-vipers she hath clothed with terror, With splendor she hath decked them; she hath made them of lofty stature."

