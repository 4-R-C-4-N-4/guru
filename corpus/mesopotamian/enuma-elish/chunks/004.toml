[content]
body = "rejoice and be glad; The neck of Tiamat shalt thou swiftly trample under foot.\n\n...\n\nrejoice and be glad; The neck of Tiamat shalt thou swiftly trample under foot.\n\n0 my son, who knoweth all wisdom, Pacify Tiamat with thy pure incantation.\n\nSpeedily set out upon thy way, For thy blood shall not be poured out; thou shalt return again.\" The lord rejoiced at the word of his father, His heart exulted, and unto his father he spake: \"O Lord of the gods, Destiny of the great gods, If I, your avenger, Conquer Tiamat and give you life, Appoint an assembly, make my fate preeminent and proclaim it.\n\nIn Upsukkinaku seat yourself joyfully together, With my word in place of you will I decree fate.\n\nMay whatsoever I do remain unaltered, May the word of my lips never be chanced nor made of no avail.\" THE THIRD TABLET Ansar opened his mouth, and Unto Gaga, his minister, spake the word.\n\n\"O Gaga, thou minister that rejoicest my spirit, Unto Lahmu and Lahamu will I send thee.\n\n...\n\nthou canst attain, ...\n\nthou shalt cause to be brought before thee.\n\n...\n\nlet the gods, all of them, Make ready for a feast, at a banquet let them sit, Let them eat bread, let them mix wine, That for Marduk, their avenger they may decree the fate.\n\nGo, Gaga, stand before them, And all that I tell thee, repeat unto them, and say: 'Ansar, vour son, hath sent me, The purpose of his heart he hath made known unto me.\n\nThe purpose of his heart he hath made known unto me.\n\nHe saith that Tiamat our mother hath conceived a hatred for us, With all her force she rageth, full of wrath.\n\nAll the gods have turned to her, With those, whom ye created, they go at her side.\n\nThey are banded together, and at the side of Tiamat they advance; They are furious, they devise mischief without resting night and day.\n\nThey prepare for battle, fuming and raging; They have joined their forces and are making war.\n\nUmmu-Hubur, who formed all things, Hath made in addition weapons invincible; she hath spawned monster-serpents, Sharp of tooth and merciless of fang.\n\nWith poison, instead of blood, she hath filled their bodies.\n\nFierce monster-vipers she hath clothed with terror, With splendor she hath decked them; she hath made them of lofty stature.\n\nWhoever beboldeth them, terror overcometh him, Their bodies rear up and none can withstand their attack.\n\nShe hath set up vipers, and dragons, and the monster Lahamu, And hurricanes, and raging bounds, and scorpion-men, And mighty tempests, and fish-men, and rams; They bear merciless weapons, without fear of the fight.\n\nHer commands are miahty; none can.\n\nresist them; After this fashion, huge of stature, hath she made eleven monsters.\n\nAmong the gods who are her sons, inasmuch as he hath given her support, She hath exalted Kingu; in their midst she hath raised him to power.\n\nTo march before the forces, to lead the host, To give the battle-signal, to advance to the attack, To direct the battle, to control the fight, Unto him hath she entrusted; in costly raiment she hath made him sit, saying: I have uttered thy spell; in the assembly of the gods I have raised thee to power, The dominion over all the gods have I entrusted unto thee."

