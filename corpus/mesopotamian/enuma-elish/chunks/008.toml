[content]
body = "She recited an incantation, she pronounced her spell, And the gods of the battle cried out for their weapons.\n\nThen advanced Tiamat and Marduk, the counselor of the gods; To the fight they came on, to the battle they drew nigh.\n\nThe lord spread out his net and caught her, And the evil wind that was behind him he let loose in her face.\n\nAs Tiamat opened her mouth to its full extent, He drove in the evil wind, while as yet she had not shut her lips.\n\nThe terrible winds filled her belly, And her courage was taken from her, and her mouth she opened wide.\n\nHe seized the spear and burst her belly, He severed her inward parts, he pierced her heart.\n\nHe overcame her and cut off her life; He cast down her body and stood upon it.\n\nWhen he had slain Tiamat, the leader, Her might was broken, her host was scattered.\n\nAnd the gods her helpers, who marched by her side, Trembled, and were afraid, and turned back.\n\nThey took to flight to save their lives; But they were surrounded, so that they could not escape.\n\nHe took them captive, he broke their weapons; In the net they were caught and in the snare they sat down.\n\nThe ...\n\nof the world they filled with cries of grief.\n\nThey received punishment from him, they were held in bondage.\n\nAnd on the eleven creatures which she had filled with the power of striking terror, Upon the troop of devils, who marched at her..., He brought affliction, their strength he...; Them and their opposition he trampled under his feet.\n\nMoreover, Kingu, who had been exalted over them, He conquered, and with the god Dug-ga he counted him.\n\nHe took from him the Tablets of Destiny that were not rightly his, He sealed them with a seal and in his own breast he laid them.\n\nNow after the hero Marduk had conquered and cast down his enemies, And had made the arrogant foe even like And had fully established Ansar's triumph over the enemy And had attained the purpose of Nudimmud, Over the captive gods he strengthened his durance, And unto Tiamat, whom he had conquered, he returned.\n\nAnd the lord stood upon Tiamat's hinder parts, And with his merciless club he smashed her skull.\n\nHe cut through the channels of her blood, And he made the North wind bear it away into secret places.\n\nHis fathers beheld, and they rejoiced and were glad; Presents and gifts they brought unto him.\n\nThen the lord rested, gazing upon her dead body, While he divided the flesh of the ...\n\n, and devised a cunning plan.\n\nHe split her up like a flat fish into two halves; One half of her he stablished as a covering for heaven.\n\nHe fixed a bolt, he stationed a watchman, And bade them not to let her waters come forth.\n\nHe passed through the heavens, he surveyed the regions thereof, And over against the Deep he set the dwelling of Nudimmud.\n\nAnd the lord measured the structure of the Deep, And he founded E-sara, a mansion like unto it.\n\nThe mansion E-sara which he created as heaven, He caused Anu, Bel, and Ea in their districts to inhabit.\n\nTHE FIFTH TABLET He (Marduk) made the stations for the great gods; The stars, their images, as the stars of the Zodiac, he fixed.\n\nHe ordained the year and into sections he divided it; For the twelve months he fixed three stars.\n\nAfter he had ...\n\nthe days of the year ...\n\nimages, He founded the station of Nibir [the planet Jupiter] to determine their bounds; That none might err or go astray, He set the station of Bel and Ea along with him."

