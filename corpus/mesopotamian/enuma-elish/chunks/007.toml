[content]
body = "When the gods, his fathers, beheld the fulfillment of his word, They rejoiced, and they did homage unto him, saying, \" Marduk is king!\" They bestowed upon him the scepter, and the throne, and the ring, They give him an invincible weapony which overwhelmeth the foe.\n\nGo, and cut off the life of Tiamat, And let the wind carry her blood into secret places.\" After the gods his fathers had decreed for the lord his fate, They caused him to set out on a path of prosperity and success.\n\nHe made ready the bow, he chose his weapon, He slung a spear upon him and fastened it...\n\nHe raised the club, in his right hand he grasped it, The bow and the quiver he hung at his side.\n\nHe set the lightning in front of him, With burning flame he filled his body.\n\nHe made a net to enclose the inward parts of Tiamat, The four winds he stationed so that nothing of her might escape; The South wind and the North wind and the East wind and the West wind He brought near to the net, the gift of his father Anu.\n\nHe created the evil wind, and the tempest, and the hurricane, And the fourfold wind, and the sevenfold wind, and the whirlwind, and the wind which had no equal; He sent forth the winds which he had created, the seven of them; To disturb the inward parts of Tiamat, they followed after him.\n\nThen the lord raised the thunderbolt, his mighty weapon, He mounted the chariot, the storm unequaled for terror, He harnessed and yoked unto it four horses, Destructive, ferocious, overwhelming, and swift of pace; ...\n\nwere their teeth, they were flecked with foam; They were skilled in...\n\n, they had been trained to trample underfoot.\n\n...\n\n.\n\nmighty in battle, Left and right....\n\nHis garment was...\n\n, he was clothed with terror, With overpowering brightness his head was crowned.\n\nThen he set out, he took his way, And toward the raging Tiamat he set his face.\n\nOn his lips he held ..., ...\n\nhe grasped in his hand.\n\nThen they beheld him, the gods beheld him, The gods his fathers beheld him, the gods beheld him.\n\nAnd the lord drew nigh, he gazed upon the inward parts of Tiamat, He perceived the muttering of Kingu, her spouse.\n\nAs Marduk gazed, Kingu was troubled in his gait, His will was destroyed and his motions ceased.\n\nAnd the gods, his helpers, who marched by his side, Beheld their leader's..., and their sight was troubled.\n\nBut Tiamat...\n\n, she turned not her neck, With lips that failed not she uttered rebellious words: \"...\n\nthy coming as lord of the gods, From their places have they gathered, in thy place are they!\n\n\" Then the lord raised the thunderbolt, his mighty weapon, And against Tiamat, who was raging, thus he sent the word: Thou art become great, thou hast exalted thyself on high, And thy heart hath prompted thee to call to battle.\n\n...\n\ntheir fathers..., ...\n\ntheir...\n\nthou hatest...\n\nThou hast exalted Kingu to be thy spouse, Thou hast...\n\nhim, that, even as Anu, he should issue deerees.\n\nthou hast followed after evil, And against the gods my fathers thou hast contrived thy wicked plan.\n\nLet then thy host be equipped, let thy weapons be girded on!\n\nStand!\n\nI and thou, let us join battle!\n\nWhen Tiamat heard these words, She was like one posessed, .she lost her reason.\n\nTiamat uttered wild, piercing cries, She trembled and shook to her very foundations."

