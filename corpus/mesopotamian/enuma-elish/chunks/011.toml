[content]
body = "May he hold the Beginning and the Future, may they pay homage unto him, Saying, \"He who forced his way through the midst of Tiamat without resting, Let his name be Nibiru, 'the Seizer of the Midst'!\n\nFor the stars of heaven he upheld the paths, He shepherded all the gods like sheep!\n\nHe conquered Tiamat, he troubled and ended her life,\" In the future of mankind, when the days grow old, May this be heard without ceasing; may it hold sway forever!\n\nSince he created the realm of heaven and fashioned the firm earth, The Lord of the World,\" the father Bel hath called his name.\n\nThis title, which all the Spirits of Heaven proclaimed, Did Ea hear, and his spirit was rejoiced, and he said: \"He whose name his fathers have made glorious, Shall be even as I, his name shall be Ea!\n\nThe binding of all my decrees shall he control, All my commands shall he make known!\n\n\" By the name of \"Fifty \" did the great gods Proclaim his fifty names, they, made his path preeminent.\n\nEPILOGUE Let them [i.e.\n\nthe names of Marduk] be held in remembrances and let the first man proclaim them; Let the wise and the understanding consider them together!\n\nLet the father repeat them and teach them to his son; Let them be in the ears of the pastor and the shepherd!\n\nLet a man rejoice in Marduk, the Lord of the gods, That be may cause his land to be fruitful, and that he himself may have prosperity!\n\nHis word standeth fast, his command is unaltered; The utterance of his mouth hath no god ever annulled.\n\nHe gazed in his anger, he turned not his neck; When he is wroth, no god can withstand his indignation.\n\nWide is his heart, broad is his compassion; The sinner and evil-doer in his presence...\n\nThey received instruction, they spake before him, ...\n\nunto...\n\n...\n\nof Marduk may the gods...; ...\n\nMay they ...\n\nhis name...\n\n!\n\n...\n\nthey took and...\n\n...................................!\n\nEND OF THE CREATION EPIC THE FIGHT WITH TIAMAT (ANOTHER VERSION) [Note: Strictly speaking, the text is not a creation-legend, though it gives a variant form of the principal incident in the history of the creation according to the Enuma Elish.\n\nHere the fight with the dragon did not precede the creation of the world, but took place after men had been created and cities had been built.] The cities sighed, men ...\n\nMen uttered lamentation, they ...\n\nFor their lamentation there was none to help, For their grief there was none to take them by the hand.\n\n· Who was the dragon...\n\n?\n\nTiamat was the dragon.....\n\nBel in heaven hath formed.....\n\nFifty kaspu [A kaspu is the space that can be covered in two hours travel, i.e.\n\nsix or seven miles] in his length, one kaspu in his height, Six cubits is his mouth, twelve cubits his..., Twelve cubits is the circuit of his ears...; For the space of sixty cubits he ...\n\na bird; In water nine cubits deep he draggeth....\" He raiseth his tail on high...; All the gods of heaven...\n\nIn heaven the gods bowed themselves down before the Moon-god...; The border of the Moon-god's robe they hastily grasped: \"Who will go and slay the dragon,\" And deliver the broad land from...\n\nAnd become king over...\n\n?\n\n\" Go, Tishu, slav the dragon, And deliver the broad land from..., And become king over...!\" Thou hast sent me, O Lord, to...\n\nthe raging creatures of the river, But I know not the...\n\nof the Dragon!"

