[content]
body = "Sacred-Texts Ancient Near East ENUMA ELISH THE EPIC OF CREATION L.W.\n\nKing Translator (from The Seven Tablets of Creation, London 1902) A more complete etext of the Seven Tablets of Creation is also available here.\n\nTHE FIRST TABLET When in the height heaven was not named, And the earth beneath did not yet bear a name, And the primeval Apsu, who begat them, And chaos, Tiamut, the mother of them both Their waters were mingled together, And no field was formed, no marsh was to be seen; When of the gods none had been called into being, And none bore a name, and no destinies were ordained; Then were created the gods in the midst of heaven, Lahmu and Lahamu were called into being...\n\nAges increased,...\n\nThen Ansar and Kisar were created, and over them....\n\nLong were the days, then there came forth.....\n\nAnu, their son,...\n\nAnsar and Anu...\n\nAnd the god Anu...\n\nNudimmud, whom his fathers, his begetters.....\n\nAbounding in all wisdom,...' He was exceeding strong...\n\nHe had no rival - Thus were established and were...\n\nthe great gods.\n\nBut Tiamat and Apsu were still in confusion...\n\nThey were troubled and...\n\nIn disorder...\n\nApru was not diminished in might...\n\nAnd Tiamat roared...\n\nShe smote, and their deeds...\n\nTheir way was evil...\n\nThen Apsu, the begetter of the great gods, Cried unto Mummu, his minister, and said unto him: \"O Mummu, thou minister that rejoicest my spirit, Come, unto Tiamut let us go!\n\nSo they went and before Tiamat they lay down, They consulted on a plan with regard to the gods, their sons.\n\nApsu opened his mouth and spake, And unto Tiamut, the glistening one, he addressed the word: ...their way...\n\nBy day I can not rest, by night I can not lie down in peace.\n\nBut I will destroy their way, I will...\n\nLet there be lamentation, and let us lie down again in peace.\" When Tiamat heard these words, She raged and cried aloud...\n\nShe...\n\ngrievously..., She uttered a curse, and unto Apsu she spake: \"What then shall we do?\n\nLet their way be made difficult, and let us lie down again in peace.\" Mummu answered, and gave counsel unto Apsu, ...and hostile to the gods was the counsel Mummu gave: Come, their way is strong, but thou shalt destroy it; Then by day shalt thou have rest, by night shalt thou lie down in peace.\" Apsu harkened unto him and his countenance grew bright, Since he (Mummu) planned evil against the gods his sons.\n\n...\n\nhe was afraid..., His knees became weak; they gave way beneath him, Because of the evil which their first-born had planned.\n\n...\n\ntheir...\n\nthey altered.\n\n...\n\nthey..., Lamentation they sat in sorrow ..................\n\nThen Ea, who knoweth all that is, went up and he beheld their muttering.\n\n[about 30 illegible lines] ...\n\nhe spake: ...\n\nthy...\n\nhe hath conquered and ...\n\nhe weepeth and sitteth in tribulation.\n\n...\n\nof fear, ...\n\nwe shall not lie down in peace.\n\n...\n\nApsu is laid waste, ...\n\nand Mummu, who were taken captive, in...\n\n...\n\nthou didst...\n\n...\n\nlet us lie down in peace.\n\n...\n\nthey will smite....\n\n...\n\nlet us lie down in peace.\n\n...\n\nthou shalt take vengeance for them, ...\n\nunto the tempest shalt thou...!\" And Tiamat harkened unto the word of the bright god, and said: ...\n\nshalt thou entrust!"

