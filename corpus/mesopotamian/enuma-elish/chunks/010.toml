[content]
body = "Tutu [Marduk] is \"He who created them anew\"; Should their wants be pure, then are they satisfied; Should he make an incantation, then are the gods appeased; Should they attack him in anger, he withstandeth their onslaught!\n\nLet him therefore be exalted, and in the assembly of the gods let him...\n\n; None among the gods can rival him!\n\n15 Tutu [Marduk] is Zi-ukkina, \"the Life of the host of the gods,\" Who established for the gods the bright heavens.\n\nHe set them on their way, and ordained their path; Never shall his ...\n\ndeeds be forgotten among men.\n\nTutu as Zi-azag thirdly they named, \"the Bringer of Purification,\" \"The God of the Favoring Breeze,\" \"the Lord of Hearing and Mercy,\" \"The Creator of Fulness and Abundance,\" \" the Founder of Plenteousness,\" \"Who increaseth all that is small.\" In sore distress we felt his favoring breeze,\" Let them say, let them pay reverence, let them bow in humility before him!\n\nTutu as Aga-azag may mankind fourthly magnify!\n\n\"The Lord of the Pure Incantation,\" \" the Quickener of the Dead,\" \"Who had mercy upon the captive gods,\" \"Who removed the yoke from upon the gods his enemies,\" \"For their forgiveness did he create mankind,\" \"The Merciful One, with whom it is to bestow life!\" May his deeds endure, may they never be forgotten , In the mouth of mankind whom his hands have made!\n\nTutu as Mu-azag, fifthly, his \"Pure incantation\" may their mouth proclaim, Who through his Pure Incantation hath destroyed all the evil ones!\" Sag-zu, [Marduk] \"who knoweth the heart of the gods,\" \" who seeth through the innermost part!\" \"The evil-doer he hath not caused to go forth with him!\" \"Founder of the assembly of the gods,\" who ...\n\ntheir heart!\" \"Subduer of the disobedient,\" \"...!\" \"Director of Righteousness,\" \"...,\" \" Who rebellion and...!\" Tutu as Zi-si, \"the ...,\" \"Who put an end to anger,\" \"who...!\" Tutu as Suh-kur, thirdly, \"the Destroyer of the foe,\" \"Who put their plans to confusion,\" \"Who destroyed all the wicked,\" \"...,\" ...\n\nlet them...\n\n!\n\n[There is a gap here of sixty lines.\n\nBut somewhere among the lost lines belong the following fragments.] who...\n\nHe named the four quarters of the world, mankind hecreated, And upon him understanding...\n\n\"The mighty one...!\" Agil...\n\n\"The Creator of the earth...!\" Zulummu...\n\n.\n\n\"The Giver of counsel and of whatsoever...!\" Mummu, \" the Creator of...!\" Mulil, the heavens..., \"Who for...!\" Giskul, let..., \"Who brought the gods to naught....!\" ...............\n\n...\n\n\" the Chief of all lords,\" ...\n\nsupreme is his might!\n\nLugal-durmah, \"the King of the band of the gods,\" \" the Lord of rulers.\" \"Who is exalted in a royal habitation,\" \"Who among the gods is gloriously supreme!\n\nAdu-nuna, \" the Counselor of Ea,\" who created the gods his fathers, Unto the path of whose majesty No god can ever attain!\n\n...\n\nin Dul-azag be made it known, ...\n\npure is his dwelling!\n\n...\n\nthe...\n\nof those without understanding is Lugaldul-azaga!\n\n...\n\nsupreme is his might!\n\n...\n\ntheir...\n\nin the midst of Tiamat, ...\n\nof the battle!\n\n[Here follows the better-preserved ending.] ...\n\nthe star, which shineth in the heavens."

