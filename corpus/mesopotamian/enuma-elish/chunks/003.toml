[content]
body = "Whoever beholdeth them is overcome by terror, Their bodies rear up and none can withstand their attack.\n\nShe hath set up vipers, and dragons, and the monster Lahamu, And hurricanes and raging hounds, and scorpion-men, And mighty tempests, and fish-men and rams; They bear cruel weapons, without fear of the fight.\n\nHer commands are mighty; none can resist them; After this fashion, huge of stature, hath she made eleven monsters.\n\nAmong the gods who are her sons, inasmuch as he hath given her support, She hath exalted Kingu; in their midst she hath raised him to power.\n\nTo march before the forces, to lead the host, To give the battle-signal, to advance to the attack.\n\nTo direct the battle, to control the fight, Unto him hath she entrusted; in costly raiment she hath made him sit, saving:.\n\nI have uttered thy spell; in the assembly of the gods I have raised thee to power, The dominion over all the gods have I entrusted unto thee.\n\nBe thou exalted, thou my chosen spouse, May they magnify thy name over all of them She hath given him the Tablets of Destiny, on his breast she laid them, saying: 'Thy command shall not be without avail, and the word of thy mouth shall be established.' Now Kingu, thus exalted, having received the power of Anu, Decreed the fate for the gods, her sons, saying: 'Let the opening of your mouth quench the Fire-god; Whoso is exalted in the battle, let him display his might!'\" When Ansar heard how Tiamat was mightily in revolt, he bit his lips, his mind was not at peace, ..., he made a bitter lamentation: ...\n\nbattle, ...\n\nthou...\n\nMummu and Apsu thou hast smitten But Tiamat hath exalted Kingu, and where is one who can oppose her?\n\n...\n\ndeliberation ...\n\nthe ...\n\nof the gods, -Nudimmud.\n\n[A gap of about a dozen lines occurs here.] Ansar unto his son addressed the word: \"...\n\nmy mighty hero, Whose strength is great and whose onslaught can not be withstood, Go and stand before Tiamat, That her spirit may be appeased, that her heart may be merciful.\n\nBut if she will not harken unto thy word, Our word shalt thou speak unto her, that she may be pacified.\" He heard the word of his father Ansar And he directed his path to her, toward her he took the way.\n\nAnn drew nigh, he beheld the muttering of Tiamat, But he could not withstand her, and he turned back.\n\n...\n\nAnsar ...\n\nhe spake unto him: [A gap of over twenty lines occurs here.] an avenger...\n\n...\n\nvaliant ...\n\nin the place of his decision ...\n\nhe spake unto him: ...\n\nthy father \" Thou art my son, who maketh merciful his heart.\n\n...\n\nto the battle shalt thou draw nigh, he that shall behold thee shall have peace.\" And the lord rejoiced at the word of his father, And he drew nigh and stood before Ansar.\n\nAnsar beheld him and his heart was filled with joy, He kissed him on the lips and his fear departed from him.\n\n\"O my father, let not the word of thy lips be overcome, Let me go, that I may accomplish all that is in thy heart.\n\nO Ansar, let not the word of thy lips be overcome, Let me go, that I may accomplish all that is in thy heart.\" What man is it, who hath brought thee forth to battle?\n\n...\n\nTiamat, who is a woman, is armed and attacketh thee.\n\n..."

