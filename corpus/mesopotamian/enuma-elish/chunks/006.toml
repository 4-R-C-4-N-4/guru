[content]
body = "She hath given him the Tablets of Destiny on his breast she laid them, saving: Thy command shall not be without avail, and the word of thy mouth shall be established.' Now Kingu, thus exalted, having received the power of Anu, Decreed the fate for the gods, her sons, saying: 'Let the opening of your mouth quench the Fire-god; Whoso is exalted in the battle, let him display his might!' I sent Anu, but he could not withstand her; Nudimmud was afraid and turned back.\n\nBut Marduk hath set out, the director of the gods, your son; To set out against Tiamat his heart hath prompted him.\n\nHe opened his mouth and spake unto me, saying: 'If I, your avenger, Conquer Tiamat and give you life, Appoint an assembly, make my fate preeminent and proclaim it.\n\nIn Upsukkinaku seat yourselves joyfully together; With my word in place of you will I decree fate.\n\nMay, whatsoever I do remain unaltered, May the word of my lips never be changed nor made of no avail.' Hasten, therefore, and swiftly decree for him the fate which you bestow, That he may go and fight your strong enemy!\n\nLahmu and Lahamu heard and cried aloud All of the Igigi [The elder gods] wailed bitterly, saying: What has been altered so that they should We do not understand the deed of Tiamat!\n\nThen did they collect and go, The great gods, all of them, who decree fate.\n\nThey entered in before Ansar, they filled...\n\nThey kissed one another, in the assembly...; They made ready for the feast, at the banquet they sat; They ate bread, they mixed sesame-wine.\n\nThe sweet drink, the mead, confused their...\n\nThey were drunk with drinking, their bodies were filled.\n\nThey were wholly at ease, their spirit was exalted; Then for Marduk, their avenger, did they decree the fate.\n\nTHE FOURTH TABLET They prepared for him a lordly chamber, Before his fathers as prince he took his place.\n\n\"Thou art chiefest among the great gods, Thy fate is unequaled, thy word is Anu!\n\nO Marduk, thou art chiefest among the great gods, Thy fate is unequaled, thy word is Anu!\n\nHenceforth not without avail shall be thy command, In thy power shall it be to exalt and to abase.\n\nEstablished shall be the word of thy mouth, irresistible shall be thy command, None among the gods shall transgress thy boundary.\n\nAbundance, the desire of the shrines of the gods, Shall be established in thy sanctuary, even though they lack offerings.\n\nO Marduk, thou art our avenger!\n\nWe give thee sovereignty over the whole world.\n\nSit thou down in might; be exalted in thy command.\n\nThy weapon shall never lose its power; it shall crush thy foe.\n\nO Lord, spare the life of him that putteth his trust in thee, But as for the god who began the rebellion, pour out his life.\" Then set they in their midst a garment, And unto Marduk,- their first-born they spake: \"May thy fate, O lord, be supreme among the gods, To destroy and to create; speak thou the word, and thy command shall be fulfilled.\n\nCommand now and let the garment vanish; And speak the word again and let the garment reappear!\n\nThen he spake with his mouth, and the garment vanished; Again he commanded it, and.\n\nthe garment reappeared."

