body = "The Epic of Gilgamish , tr.\n\nby R.\n\nCampbell Thompson [1928], at sacred-texts.com THE SEVENTH TABLET.\n\nTHE DEATH OF ENKIDU.\n\nColumn I .\n\n( Enkidu's dream ).\n\n\"Why, O my friend, do the great gods (now) take counsel together?\" ( The remainder of the Column is lost in the Assyrian, but it can be partially supplied from the Hittite Version: \" .\n\n.\n\n.\n\nThen came the day .\n\n.\n\n.\n\n[ Enkidu ] answered Gilgamish: ' [ Gilgamish, hear the ] dream which I [ saw ] in the night: [ Now Enlil ] , Ea, and the Sun-god of heaven .\n\n.\n\n.\n\n.\n\n[ the Sun-god (?) ] Enlil spake in return: \" [ These who the heavenly ] Bull have kill’d [ and Humbaba have smitten ] :.\n\n.\n\n.\n\nwhich help’d at the cedar .\n\n.\n\n.\n\n[ Enlil hath said ( ?\n\n)] 'Enkidu shall die: [ but Gilgamish ] shall not die.'\" Then answer’d Enlil boldly ' [ O Sun-god ] , at thy behest did they slay the Heavenly Bull and Humbaba.\n\nBut now shall Enkidu die.' But Enlil turn’d angrily to the Sun-god: 'What dost thou them as befitting .\n\n.\n\n.?\n\nWith his comrade thou settest out daily.\n\n'\" But Enkidu laid himself down to rest before Gilgamish, and by the dam .\n\n.\n\n.\n\nhim the ditch: 'My brother, of ( great ) worth is my [ dream ] .'\" It breaks off after a few mutilated lines more ).\n\n( Column II entirely lost.\n\nFrom the Hittite it is clear that Enkidu has dreamt that the gods have taken counsel together, that Enkidu is to die, but Gilgamish remain alive.\n\nIt would appear from the succeeding material that Enkidu, stricken presumably by fever, attributes all his misfortunes to the hetaera whom he loads with curses.\n\nThe first part of the next fragment begins \"destroy his power, weaken his strength,\" probably referring to Enkidu.\n\nThen says Enkidu, after three broken lines: \".\n\n.\n\n.\n\n.\n\nthe hetaera .\n\n.\n\n.\n\n.\n\nwho has brought ( ?\n\n) a curse, 'O hetaera, I will decree ( thy ) [ fate ( ?\n\n)] for thee—thy woes ( ?\n\n)] .\n\n.\n\n.\n\nshall never end for all eternity.\n\n[ Come ] , I will curse thee with a bitter curse, .\n\n.\n\n.\n\nwith desolation shall its curse come on thee: [ may there never be ] satisfaction of thy desire' —and then follow the broken ends of six lines and then—\"' [ May .\n\n.\n\n.\n\n] fall on thy house, may the .\n\n.\n\nof the street be thy dwelling, [ may the shade of the wall be thy ] abode, .\n\n.\n\n.\n\nfor thy feet, [ may scorching heat and thirsty smite thy strength'\" The rest of the curse is badly broken, but it is exceeding probable that the following are the fragments which should be assigned here ).\n\n( The End of Enkidu's curse on the Hetaera ).\n\n30.\n\n\"Of want .\n\n.\n\n.\n\n.\n\nsince me it is that .\n\n.\n\n.hath .\n\n.\n\n.\n\n.\n\nAnd me the fever [hath laid] on my back.\" ________________________________ ( The Answer of Shamash ).\n\nHeard him the Sun-god, and open’d his mouth, and from out of the heavens (Straightway) he call’d him: \"O Enkidu, why dost thou curse the hetaera?\n\n35."

