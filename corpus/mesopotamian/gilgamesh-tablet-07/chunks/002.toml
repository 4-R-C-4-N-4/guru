body = "She ‚Äôtwas who made thee eat bread, for divinity proper: (aye), wine (too), She made thee drink, (‚Äôtwas) for royalty proper: a generous mantle Put on thee, (aye), and for comrade did give to thee Gilgamish splendid.\n\n40.\n\nNow on a couch of great size will he, (thy) friend (and) thy brother Gilgamish, grant thee to lie, on a handsome couch will he grant thee Rest, and to sit on a throne of great ease, a throne at (his) left hand, So that the princes of Hades may kiss thy feet (in their homage); He, too, will make (all) the people of Erech lament in thy (honour), 45.\n\nMaking them mourn thee, (and) damsels (and) heroes constrain to thy service, [While he himself for thy sake will cause his body to carry Stains, [(and) will put on] the skin of a lion , and range o‚Äôer the desert.\" ________________________________ Enkidu [(then) giving ear] to the words of the valiant Shamash Speaking .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nhis wrath was appeased.\n\n( One or two lines missing ).\n\nColumn IV .\n\n(Enkidu, relenting, regrets his curse, and blesses the Hetaera).\n\n\" .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nmay .\n\n.\n\n.\n\nrestore to thy place!\n\n[(So, too), may monarchs and princes] and chiefs be with love [for thee] smitten; [None smite (?)] his breech [in disgust (?); against thee; and for thee may the hero] Comb out his locks; .\n\n.\n\n.\n\nwho would embrace [thee], 5.\n\nLet him his girdle unloose .\n\n.\n\n.\n\nand thy [bed] be azure and golden; May .\n\n.\n\n.\n\nentreat thee kindly (?), .\n\n.\n\n.\n\n.\n\nare heap‚Äôd his ishshikku May the gods make thee enter .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n10.\n\n[Mayst thou] be left as the mother of seven brides .\n\n.\n\n.\" ( Enkidu, sorrowful at his approaching end, sleeps alone and dreams ).\n\n[Enkidu] .\n\n.\n\n.\n\nwoe in his belly .\n\n.\n\n.\n\nsleeping alone, [Came] in the night [to discover] his heaviness unto his comrade: \"[Friend], (O) a dream I have seen in my night-time: the firmament [roaring], 15.\n\nEcho‚Äôd the earth, and I [by myself was standing(?) .\n\n.\n\n.\n\n[When perceived I a man (?)], (all) dark was his face, [and] was liken 'd [Unto] .\n\n.\n\n.his face, .\n\n.\n\n.\n\n[and] his nails like claws of a lion.\n\n20.\n\nMe did he overcome .\n\n.\n\n.\n\nclimbing up .\n\n.\n\n.\n\npress‚Äôd me down, Upon me .\n\n.\n\n.\n\nmy (?) body .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n( Here follows a gap of perhaps three lines, until what is still presumably the dream is again taken up by the other half of the Column at l.\n\n31 ( ?\n\n) with a description of the Underworld which is being shewn to Enkidu in premonition of his death ).\n\n33.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nlike birds my hands: (and) he seized (?) me, Me did he lead to the Dwelling of Darkness, the home of Irkalla, 35.\n\nUnto the Dwelling from which he who entereth cometh forth never!"

