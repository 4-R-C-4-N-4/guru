[content]
body = "(Aye), by the road on the passage whereof there can be no returning, Unto the Dwelling whose tenants are (ever) bereft of the daylight, Where for their food is the dust, and the mud is their sustenance: bird-like 40.\n\nWear they a garment of feathers: and, sitting (there) in the darkness, Never the light will they see.\n\nOn the Gate .\n\n.\n\n.\n\n.\n\nwhen I enter’d On the house (?) .\n\n.\n\n.\n\n.\n\nwas humbled the crown, For .\n\n.\n\n.\n\nthose who (wore) crowns, who of old ruled over the country, .\n\n.\n\n.\n\n.\n\nof Anu and Enlil ’twas they set the bakemeats, 45.\n\nSet .\n\n.\n\n.\n\n., cool was the water they served from the skins.\n\nWhen I enter’d Into (this) House of the Dust, were High Priest and acolyte sitting, Seer and magician , the priest who the Sea of the great gods anointed , (Here) sat Etana , Sumuqan; the Queen of the Underworld (also), Ereshkigal , in whose presence doth bow the Recorder of Hades, [Belit]-seri, and readeth before her; [she lifted] her head (and) beheld me, .\n\n.\n\n.\n\nand took this .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n."

