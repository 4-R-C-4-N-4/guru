[content]
body = ".\" Then the Scorpion-man, with a final word about the mountains of Mashu, farewells him, wishing him success.\n\n\" [( Then ) when ] Gilgamish [ heard this ] , [ he set off ] at the word of the Scorpion-man, taking ] the Road of the Sun .\n\n.\n\n.\" The first two hours are in deep darkness, without light, which did not allow [ him to see .\n\n.\n\n.\n\nbehind him ] .\n\n.\n\n.\" Each succeeding period of two hours is the same until the eighth is reached and passed, and by the ninth he apparently comes to the first glimmer of light.\n\nFinally, with the twelfth double hour, he reaches the full blaze of the sun, and there he beholds the Tree of the Gods, the description of which is given in the only four complete lines, 48-51 , of Column V.\n\nIt is conceivable that this is the Vine, the Tree of Life, whence Siduri, the Maker of Wine, plucks the fruit for her trade ).\n\nBearing its fruit (all) ruby, and hung about with (its) tendrils.\n\n50.\n\nFair for beholding, and azure the boskage it bore; (aye), ’twas bearing Fruits (all) desirable unto the eye.\n\n( Column VI in the Assyrian is nearly all lost, and it is uncertain what part the Tree plays: but at this point a third Old Babylonian tablet helps us out.\n\nAt this point, according to this early version the Sun-god takes pity on the hero ).\n\n\"[He of the wild things hath dresséd] their pelts and the flesh of them eateth.\n\nGilgamish, [never] a crossing [shall be (?)] where none hath been ever, (No), [so long] as the gale driveth water.\" 5.\n\nShamash was touch’d, that he summon’d him, (thus) unto Gilgamish speaking: \"Gilgamish, why dost thou run, (forasmuch as) the life which thou seekest Thou shalt not find?\" (Whereat) Gilgamish answer’d the warrior Shamash: 10.\n\n\"Shall I, after I roam up and down o’er the waste as a wand’rer, Lay my head in the bowels of earth, and throughout the years slumber Ever and aye?\n\nLet mine eyes see the Sun and be sated with brightness, (Yea, for) the darkness is (banish’d) afar, if wide be the brightness.\n\nWhen will the man who is dead (ever) look on the light of the Sunshine?\" ( With this ends all our connected text of Column VI, the Assyrian Version ending with about a dozen mutilated lines containing a mention of numerous minerals and stones, and evidently Gilgamish has now come to the girl Siduri the sabitu, which last word is generally taken to mean a provider of strong waters )."

