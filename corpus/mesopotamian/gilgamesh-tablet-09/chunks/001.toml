body = "The Epic of Gilgamish , tr.\n\nby R.\n\nCampbell Thompson [1928], at sacred-texts.com THE NINTH TABLET.\n\nGILGAMISH IN TERROR OF DEATH SEEKS ETERNAL LIFE.\n\nColumn I .\n\n( Gilgamish determines to seek Eternal Life ).\n\nGilgamish bitterly wept for his comrade, (for) Enkidu, ranging Over the desert: \"I, too—shall I not die like Enkidu also?\n\n5.\n\nSorrow hath enter’d my heart; I fear death as I range o’er the desert, I will get hence on the road to the presence of Uta-Napishtim , —Offspring of Ubara-Tutu is he—and with speed will I travel.\n\n(If) ’tis in darkness that I shall arrive at the Gates of the Mountains, 10.\n\nMeeting with lions, then terror fall on me, I'll lift my head (skywards), Offer my prayer to the Moon-god, (or else) to .\n\n.\n\nthe gods let my orison Come .\n\n.\n\n.\n\n'O deliver me!'\" .\n\n.\n\n.\n\nHe slept .\n\n.\n\n.\n\n(and) a dream .\n\n.\n\n.\n\n[Saw he] .\n\n.\n\n.\n\nwhich were rejoicing in life, 15.\n\nPoised he [his] axe .\n\n.\n\n.\n\nin his hand, (and) drew [his glaive from] his baldric, Lance-like leapt he amongst them .\n\n.\n\n.\n\nsmiting, .\n\n.\n\n.\n\n(and) crushing.\n\n( The rest of the Column is mutilated ).\n\nColumn II .\n\n( The hero reaches the Mountains of Mashu ).\n\nMashu the name of the hills; as he reach’d the Mountains of Mashu, Where ev’ry day they keep watch o’er [the Sun-god's] rising [and setting], 5.\n\nUnto the Zenith of Heaven [uprear’d are] their summits, (and) downwards (Deep) unto Hell reach their breasts: (and there) at their portals stand sentry Scorpion-men, awful in terror, their (very) glance Death: (and) tremendous, Shaking the hills, their magnificence; they are the Wardens of Shamash, 10.\n\nBoth at his rising and setting.\n\n(No sooner) did Gilgamish see them\" (Than) from alarm and dismay was his countenance stricken with pallor, Senseless, he grovell’d before them.\n\n(Then) unto his wife spake the Scorpion: \"Lo, he that cometh to us—’tis the flesh of the gods is his body.\" 15.\n\n(Then) to the Scorpion-man answer]d his wife: \"Two parts of him god-(like), (Only) a third of him human.\" ( Eight broken lines remain, in which the Scorpion-man addresses presumably Gilgamish, asking him [ why he has goner a far journey, and telling him how hard the traverse is.\n\nColumn III begins with the third line in which Gilgamish is evidently telling the Scorpion-man that he proposes to cask ( ?\n\n)] Uta-Napishtim about death and life.\n\nBut the Scorpion-man says that [ the journey has never before been made, that none [ has crossed ] the mountains.\n\nThe traverse is by the Road of the Sun by a journey of twenty-four hours, beginning with deep darkness.\n\nThe last half of this Column and the first half of Column IV are lost, but it would appear that the Scorpion-man describes the journey hour by hour, and that Gilgamish accepts the trial of his strength \" [ even though it be ] in pain .\n\n., [ though my face be weather ] d ] with cold [ and heat ] [paragraph continues] ( and ) in grief [ I go ] .\n\n."

