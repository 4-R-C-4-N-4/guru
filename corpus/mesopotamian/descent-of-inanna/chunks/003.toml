[content]
body = "Sprinkle Ishtar with the waters of life and take her out of my presence.\n\nNamtar went, knocked at the strong palace, Tapped on the threshold of precious stones.\n\nHe brought out the Anunnaki and placed them on golden thrones, He sprinkled Ishtar with the waters of life and took hold of her.\n\nThrough the first gate he led her out and returned to her her loin-cloth.\n\nThrough the second gate he led her out and returned to her the spangles of her hands and feet Through the third gate he led her out and returned to her the girdle of her body, studded with birth-stones.\n\nThrough the fourth gate he led her out and returned to her the ornaments of her breast.\n\nThrough the fifth gate he led her out and returned to her her necklace.\n\nThrough the sixth gate he led her out and returned her earrings.\n\nThrough the seventh gate he led her out and returned to her the large crown for her head.\n\n[The following lines are in the form of an address -apparently to some one who has sought release for a dear one from the portals of the lower world.] \"If she (Ishtar) will not grant thee her release, To Tammuz, the lover of her youth, Pour out pure waters, pour out fine oil; With a festival garment deck him that he may play on the flute of lapis lazuli, That the votaries may cheer his liver.\n\n[his spirit] Belili [sister of Tammuz] had gathered the treasure, With precious stones filled her bosom.\n\nWhen Belili heard the lament of her brother, she dropped her treasure, She scattered the precious stones before her, \"Oh, my only brother, do not let me perish!\n\nOn the day when Tammuz plays for me on the flute of lapis lazuli, playing it for me with the porphyry ring.\n\nTogether with him, play ye for me, ye weepers and lamenting women!\n\nThat the dead may rise up and inhale the incense.\""

