[content]
body = "\"Why, O gatekeeper, dost thou remove the girdle of my body, studded with birth-stones?\" \"Enter, O lady, for such are the decrees of Ereshkigal.\" The sixth gate, he bade her enter, opened it wide, and removed the spangles off her hands and feet.\n\n\"Why, O gatekeeper, dost thou remove the spangles off my hands and feet?\" \"Enter, O lady, for thus are the decrees of Ereiihkigal.\" The seventh gate he bade her enter, opened it wide, and removed her loin-cloth.\n\n\"Why, O gatekeeper, dost thou remove my loin-cloth ?\" \"Enter, O lady, for such are the decrees of Ereshkigal.\" Now when Ishtar had gone down into the land of no return, Ereshkigal saw her and was angered at her presence.\n\nIshtar, without reflection, threw herself at her [in a rage].\n\nEreshkigal opened her mouth and spoke, To Namtar, her messenger, she addressed herself: \"Go Namtar, imprison her in my palace.\n\nSend against her sixty disease, to punish Ishtar.\n\nEye-disease against her eyes, Disease of the side against her side, Foot-disease against her foot, Heart-disease against her heart, Head-disease against her head, Against her whole being, against her entire body.\" After the lady Ishtar had gone down into the land of no return, The bull did not mount the cow, the ass approached not the she-ass, To the maid in the street, no man drew near The man slept in his apartment, The maid slept by herself.\n\n[The second half of the poem, the reverse of the tablet, continues is follows:] The countenance of Papsukal, the messenger of the great gods, fell, his face was troubled.\n\nIn mourning garb he was clothed, in soiled garments clad.\n\nShamash [the sun-god] went to Sin [the moon-god], his father, weeping, In the presence of Ea, the King, he went with flowing tears.\n\n\"Ishtar has descended into the earth and has not come up.\n\nThe bull does not mount the cow, the ass does not approach the she-ass.\n\nThe man does not approach the maid in the street, The man sleeps in his apartment, The maid sleeps by herself.\" Ea, in the wisdom of his heart, formed a being, He formed Asu-shu-namir the eunuch.\n\nGo, Asu-shu-namir, to the land of no return direct thy face!\n\nThe seven gates of the land without return be opened before thee, May Eresbkigal at sight of thee rejoice!\n\nAfter her heart has been assuaged, her liver quieted, Invoke against her the name of the great gods, Raise thy head direct thy attention to the khalziku skin.\n\n\"Come, lady, let them give me the khalziku skin, that I may drink water out of it.\" When Ereshkigal heard this, she struck her side, bit her finger, Thou hast expressed a wish that can not be granted.\n\nGo, Asu-sbu-iaamir, I curse thee with a great curse, The sweepings of the gutters of the city be thy food, The drains of the city be thy drink, The shadow of the wall be thy abode, The thresholds be thy dwelling-place; Drunkard and sot strike thy cheek!\" Ereshkigal opened her mouth and spoke, To Namtar, her messenger, she addressed herself.\n\n\"Go, Namtar, knock at the strong palace, Strike the threshold of precious stones, Bring out the Anunnaki, seat them on golden thrones."

