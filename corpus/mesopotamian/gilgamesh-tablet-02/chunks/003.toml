[content]
body = "Gilgamish bent his leg to the ground: (so) his fury abated, (Aye, and) his ardour was quell’d: so soon as was quelled his ardour, 30.\n\nEnkidu (thus) unto Gilgamish spake: \"(Of a truth), did thy mother Bear thee as one, and one only: (that choicest) cow of the steer-folds, 35.\n\nNin-sun exalted thy head above heroes, and Enlil hath dower'd Thee with the kingship o’er men.\""

