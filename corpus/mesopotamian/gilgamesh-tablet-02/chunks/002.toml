[content]
body = "I would know his intention.\" The woman the fellow Call’d that he come to him, that he might see him: \"O, why art thou seeking, Sir?\n\n(Pray), which is the way to thy rest-house?\" 20.\n\nThe man spake, addressing Enkidu: \"You to the House of Community [Gilgamish calleth], (This is) the custom of men, and a homage (too) to the great ones: 25.\n\nCome, then, and heap up the offerings such as are due to the city, Come, on behalf of the common weal bring in the food of the city.\n\n(’Tis) for the king of broad-marketed Erech to look on thy greeting, 30.\n\nGilgamish, king of broad-marketed Erech to look on thy greeting; First doth he mate with the woman allotted by fate, and then after Speak by the counsel of god, and so from the shape of the omens (Utter the rede of) his destiny.\" (So) at the words of the fellow Went they before him.\n\n.\n\n.\n\n7.\n\n[Enkidu] going [in front], with the courtesan coming behind him, 10.\n\nEnter’d broad-marketed Erech; the populace gather’d behind him, (Then), as he stopp’d in the street of broad-marketed Erech, the people 15.\n\nThronging, behind him exclaim’d \"Of a truth, like to Gilgamish is he, Shorter in stature a trifle, [his] composition is stronger.\n\n20.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n[(once)] like a [weakling] baby he suck’d the milk of the wild things!\n\nEver the bread-cakes in Erech give glorious (climax) to manhood!\n\n25.\n\nHe a (mere) savage becometh a hero of proper appearance, (Now) unto Gilgamish, god-like, his composition is equal.\" .\n\n30.\n\nStrewn is the couch for the love-rites, and Gilgamish (now) in the night-time Cometh to sleep, to delight in the woman : (but) [Enkidu], coming 35.\n\n(There) in the highway, doth block up the passage to Gilgamish, [threat’ning] He with his strength .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n6.\n\nGilgamish .\n\n.\n\n.\n\nbehind him .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n10.\n\nBurgeon’d [his rage], (and) he rush’d to [attack] him: they met in the highway.\n\nEnkidu barr’d up the door with his foot, (and) to Gilgamish entry— 15.\n\nWould not concede: they grappled and snorted(?) like bulls, (and) the threshold Shatter’d: the (very) wall quiver’d as Gilgamish , Enkidu grappled, 20.\n\nSnorting(?) like bulls, (and) the threshold they shatter’d, the (very) wall quiver'd.\n\n.\n\n25.\n\nGilgamish bent his leg to the ground: (so) his fury abated, (Aye, and) his ardour was quell’d: so soon as was quelled his ardour, 30.\n\nEnkidu (thus) unto Gilgamish spake: \"(Of a truth), did thy mother Bear thee as one, and one only: (that choicest) cow of the steer-folds, 35.\n\nNin-sun exalted thy head above heroes, and Enlil hath dower'd Thee with the kingship o’er men.\""

