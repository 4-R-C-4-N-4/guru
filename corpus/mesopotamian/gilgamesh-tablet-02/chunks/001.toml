[content]
body = "THE SECOND TABLET OF THE MEETING OF GILGAMISH AND ENKIDU.\n\n2.\n\nWhile Gilgamish (thus) is the vision revealing Enkidu sitteth before the hetaera, and she [displaying her] bosom, 5.\n\nShewing [her beauty (?)], the place of his birth he forgetteth.\n\n(So) Enkidu dallied (Thus) for six days, seven nights, with the courtesan-girl in his mating.\n\n10.\n\nBroke into [speech] then, the nymph, and (thus) unto Enkidu spake she: \"(Yea, as) I view thee, (e’en) like a god, O Enkidu, shalt be, Why with the beasts (of the field) dost thou (ever) range over the desert?\n\n15.\n\nUp, for I'll lead thee to [Erech] broad-marketed, (aye), to the Temple Sacred, the dwelling of Anu—O Enkidu, come, that I guide thee, Unto E-Anna, the dwelling of Anu, where [Gilgamish] (liveth), 20.\n\n(He), the supreme of creation; and thou, aye, thou wilt [embrace him] Like [to a woman], (and e’en) [as] thyself thou shalt [love him].\n\nO, rouse thee Up from the ground—’tis a shepherd's bed (only).\" Her utterance heard he, 25.\n\nWelcomed her rede: the advice of the woman struck home in his bosom.\n\nShe one garment took off wherewith she might clothe him: the other 30.\n\nShe herself wore, (and so) taking her hand like a brother she led him (Thus) to the booths(?) of the shepherds, the place of the sheepfolds.\n\nThe shepherds 35.\n\nGather]d at sight of him .\n\nHe (in the past) of the milk of the wild things to suck was accustom’d!\n\n5.\n\nBread which she set before him he broke, but he gazed and he stared: Enkidu bread did not know how to eat, nor had he the knowledge Mead how to quaff!\n\n10.\n\n(Then) the woman made answer, to Enkidu speaking, \"Enkidu, taste of the bread, (for) of life ’tis; (forsooth), the essential, Drink thou, (too), of the mead, ’tis the wonted use of the country.\" 15.\n\nEnkidu ate of the bread, (aye, ate) until he was gorged, Drank of the mead seven bumpers; his spirits rose, (and), exultant, 20.\n\nGlad was his heart, and cheerful his face: [himself(?)] was he rubbing, 25.\n\nOil on the hair of his body anointed: and (thus) became human.\n\nDonn’d he a garment to be like a man , (and) taking his weapon, 30.\n\nHunted the lions, which harried the shepherds o’ nights: and the jackals Caught he.\n\n(So) he, having mastered the lions, the shepherds slept soundly .\n\n35.\n\nEnkidu—(he) was their warden—(becometh) a man of full vigour.\n\n(Now) is one of the heroes speaking to [Gilgamish(?)] .\n\n.\n\n.\n\n.\n\n.\n\n10.\n\n(Then while) he pleasured, he lifted his eyes, (and), observing the fellow, Spake he unto the woman: \"O doxy, bring me (this) fellow, 15.\n\nWhy hath he come?"

