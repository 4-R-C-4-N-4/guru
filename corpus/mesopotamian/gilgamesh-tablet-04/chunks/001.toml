body = "The Epic of Gilgamish , tr.\n\nby R.\n\nCampbell Thompson [1928], at sacred-texts.com THE FOURTH TABLET.\n\nTHE ARRIVAL AT THE GATE OF THE FOREST.\n\n( Of Column I about ll.\n\n1-36 are mutilated or missing, there being actually the beginnings of only sixteen lines.\n\nWhen the text becomes connected the heroes have reached the Gate of the Forest ).\n\nColumn I .\n\n( Enkidu addresses the Gate ).\n\n36.\n\nEnkidu lifted [his eyes] .\n\n.\n\n.\n\nand spake with the Gate as [’t were human(?)]: \"O thou Gate of the Forest without understanding(?\n\n.\n\n.\n\n.\n\nSentience which thou hast not, .\n\n.\n\n.\n\n.\n\n40.\n\nI for (full) forty leagues have admired thy [wonderful] timber, (Aye), till I sighted the towering Cedar .\n\n.\n\n.\n\n.\n\n(O but) thy wood hath no peer (in the country) .\n\n.\n\n.\n\nSix gar thy height, and two gar thy breadth .\n\n.\n\n.\n\n45.\n\n(Sooth, but) thy stanchion (?), thy socket (?), thy pivot (?), thy lock (?), and thy shutter (?), [(All of them) must have been fashion’d for thee] in the City of Nippur!\n\nO, if I had but known, O Gate, that this was [thy grandeur], This, too, the grace [of thy structure], then either an axe had I lifted 50.\n\nOr I had .\n\n.\n\n.\n\nor bound together .\n\n.\n\n.\n\n.\" ( Of the next Column remains a fragment, and that only presumed to belong to one of the above fragments from its appearance, which speaks of terror, a dream, and sorrow: \"let me pray the gods .\n\n.\n\n.\n\n.\n\nmay thy?\n\ngod be .\n\n.\n\n.\n\nthe father of the gods.\" Again, of the third Column there is only a small portion left of the right half ( this fragment, too, being also presumed to belong to the same tablet as that above-mentioned ) , speaking of Gilgamish, the Forest, and Enkidu.\n\nThe fourth Column is entirely lost.\n\nOf Column V the latter part survives, in this case without any uncertainty.\n\nAfter a few broken lines it runs as follows, the first speaker being probably Enkidu, and the scene the Gate of the Forest ): 6.\n\n\".\n\n.\n\n.\n\n[O, haste] thee, withstand him, he will not [pursue(?) thee], [We will] go on down into the wood not daunted, together (?)].\n\n.\n\n.\n\n.\n\nThou shall put on seven garments ..\n\n.\n\n.\n\n.\n\nputting on, and six .\n\n.\n\n.\n\n(?) .\n\n.\n\n.\n\n\" 10.\n\nHe like a mighty wild bull .\n\n.\n\n.\n\nFlung he the Portal afar, and [his] mouth was fill’d (with his challenge), Cried to the Guard of the Forest: \"Up (?) .\n\n.\n\n.\n\n!\n\n[’Tis I will challenge] Humbaba like to a .\n\n.\n\n.\" ( A small gap .) Column VI .\n\n( Enkidu is speaking ) \"Trouble (?) [I foresee(?)] wherever I go .\n\n.\n\n.\n\n.\n\n5.\n\nO my friend, I have [seen] a dream which un- .\n\n.\n\n.\n\n.\" The day of the dream he had seen fulfilled .\n\n.\n\n.\n\n.\n\n(Enkidu is stricken with fear at thought of the combat).\n\nEnkidu lay for a day, [yea, a second]—for Enkidu [lying] 10.\n\n(Prone) on his couch, was a third and a fourth day .\n\n.\n\n., a fifth, sixth and seventh, Eighth, ninth, [and tenth].\n\nWhile Enkidu [lay in his] sickness .\n\n.\n\n., th’ eleventh, (Aye, till) the twelfth .\n\n.\n\n.\n\non [his] couch was Enkidu [lying].\n\n15."

