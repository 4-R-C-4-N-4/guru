body = "THE FOURTH TABLET.\n\nTHE ARRIVAL AT THE GATE OF THE FOREST.\n\n.\n\n.\n\n36.\n\nEnkidu lifted [his eyes] .\n\n.\n\n.\n\nand spake with the Gate as [’t were human(?)]: \"O thou Gate of the Forest without understanding(?\n\n.\n\n.\n\n.\n\nSentience which thou hast not, .\n\n.\n\n.\n\n.\n\n40.\n\nI for (full) forty leagues have admired thy [wonderful] timber, (Aye), till I sighted the towering Cedar .\n\n.\n\n.\n\n.\n\n(O but) thy wood hath no peer (in the country) .\n\n.\n\n.\n\nSix gar thy height, and two gar thy breadth .\n\n.\n\n.\n\n45.\n\n(Sooth, but) thy stanchion (?), thy socket (?), thy pivot (?), thy lock (?), and thy shutter (?), [(All of them) must have been fashion’d for thee] in the City of Nippur!\n\nO, if I had but known, O Gate, that this was [thy grandeur], This, too, the grace [of thy structure], then either an axe had I lifted 50.\n\nOr I had .\n\n.\n\n.\n\nor bound together .\n\n.\n\n.\n\n.\" : 6.\n\n\".\n\n.\n\n.\n\n[O, haste] thee, withstand him, he will not [pursue(?) thee], [We will] go on down into the wood not daunted, together (?)].\n\n.\n\n.\n\n.\n\nThou shall put on seven garments ..\n\n.\n\n.\n\n.\n\nputting on, and six .\n\n.\n\n.\n\n(?) .\n\n.\n\n.\n\n\" 10.\n\nHe like a mighty wild bull .\n\n.\n\n.\n\nFlung he the Portal afar, and [his] mouth was fill’d (with his challenge), Cried to the Guard of the Forest: \"Up (?) .\n\n.\n\n.\n\n!\n\n[’Tis I will challenge] Humbaba like to a .\n\n.\n\n.\" \"Trouble (?) [I foresee(?)] wherever I go .\n\n.\n\n.\n\n.\n\n5.\n\nO my friend, I have [seen] a dream which un- .\n\n.\n\n.\n\n.\" The day of the dream he had seen fulfilled .\n\n.\n\n.\n\n.\n\n.\n\nEnkidu lay for a day, [yea, a second]—for Enkidu [lying] 10.\n\n(Prone) on his couch, was a third and a fourth day .\n\n.\n\n., a fifth, sixth and seventh, Eighth, ninth, [and tenth].\n\nWhile Enkidu [lay in his] sickness .\n\n.\n\n., th’ eleventh, (Aye, till) the twelfth .\n\n.\n\n.\n\non [his] couch was Enkidu [lying].\n\n15.\n\nCall’d he to Gilgamish, .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n\"(O but), my comrade, .\n\n.\n\n.\n\nhateth me .\n\n.\n\nbecause within Erech I was afraid of the combat, and .\n\n.\n\n.\n\nMy friend, who in battle .\n\n.\n\n.\" : 26.\n\n[Enkidu open’d] his [mouth] and spake [unto Gilgamish, saying]: (\"Nay, but), [my friend, let us no wise] go down [to the depths of the Forest], (For) ’tis my hands [have grown weak], and [my arms] are stricken with palsy.\" ________________________________ Gilgamish open’d his mouth and spake [unto Enkidu], saying: 30.\n\n\"Shall we, O friend, [play] the coward?\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nthou shalt surpass them all(?) .\n\n.\n\n.\n\n.\n\n[Thou, O] my friend, art cunning in warfare, art [shrewd(?)] in the battle, (So) shalt thou touch the .\n\n.\n\n.\n\nand of [death] have no terror, .\n\n[So that] the palsy (now striking) thine arms [may] depart, and the weakness Pass [from thy hands]!"

