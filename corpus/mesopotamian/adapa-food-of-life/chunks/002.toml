[content]
body = "to heaven When thou comest up, and when thou approachest the door of Anu, At the door of Anu, Tammuz and Gishzida are standing, \"they will see thee, they will ask thee; 'Sir,' For whose sake dost thou so appear, Adapa?\n\nFor whom Art thou clad in a mourning garment?' 'In our country two gods have vanished, therefore Am I so.' 'Who are the two gods, who in the land Have vanished?' 'Tammuz and Gishzida.' They will look at one another and Be astonished.\n\nGood words They will speak to Anu.\n\nA good countenance of Anu They will show thee.\n\nWhen thou standest before Anu Food of death they will set before thee, Eat not.\n\nWater of death they will set before thee, Drink not.\n\nGarments they will set before thee, Put them on.\n\nOil they will set before thee, anoint thyself.\n\nThe counsel that I have given thee, forget not.\n\nThe words Which I have spoken, hold fast.\" The messenger Of Anu came: \"Adapa has broken The wing of the South wind.\n\nBring him before me.\" The road to Heaven he made him take, and to Heaven he ascended.\n\nWhen he came to Heaven, when he approached the door of Anu, At the door of Ann, Tammuz and Gisbzida are standing.\n\nWhen they saw him, Adapa, they cried: \" Help, Sir, for whom dost thou so appear?\n\nAdapa, For whom art thou clad in a mourning garment?\" In the country two gods have vanished; therefore am I clad In mourning garments.\" \"Who are the two gods, who have vanished from the land?\" \"Tammuz and Gishzida.\" They looked at one another and Were astonished.\n\nWhen Adapa before Anu, the King, Drew near, and Anu saw him, he cried: \" Come hither, Adapa.\n\nWhy hast thou broken the wings Of the South wind?\n\n\" Adapa answered Ann: \" My lord, For the house of my lord in the midst of the sea, I was catching fish.\n\nThe sea was like a mirror, The South wind blew, and capsized me.\n\nTo the house of my lord was I driven.\n\nIn the anger of my heart, I took heed.\" Tammuz and Gishzida Answered ...\n\n\"art thou.\" To Anu They speak.\n\nHe calmed himself, his heart was .\n\n.\n\n.\n\n\"Why has Ea revealed to impure mankind The heart of heaven and earth?\n\nA heart ...\n\nhas created within him, has made him a name?\n\nWhat can we do with him?\n\nFood of life Bring him, that be man, eat.\"Food of life They brought him, but he ate not.\n\nWater of life They brought him, but he drank not.\n\nGarments They brought him.\n\nHe clothed himself.\n\nOil They brought him.\n\nHe anointed himself.\n\nAnu looked at him; he wondered at him.\n\n\" Come, Adapa, why hast thou not eaten, not drunken?\n\nNow thou shalt not live.\" ...\n\nmen ...Ea, my lord Said: \"Eat not, drink not.\" Take him and bring him back to his earth.\n\n...\n\nlooked upon him.\n\nTABLET NO.\n\n3 \"When heard that In the anger of his heart His messenger he sent.\n\nHe who knows the heart of the great gods ............\n\nTo King Ea to come, To him, he caused words to be borne.\n\n...\n\nto him, to King Ea.\n\nHe sent a messenger With a wide ear, knowing the heart of the great gods, ...\n\nof the heavens be fixed.\n\nA soiled garment he made him wear, With a mourning garment he clad him, A word he spoke to him."

