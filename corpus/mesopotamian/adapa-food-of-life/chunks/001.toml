[content]
body = "Return to Main index Return to Ancient Near East index ADAPA AND THE FOOD OF LIFE [from \"Cuneiform Parallels to the Old Testament \" by R.W.\n\nRogers, 1912].\n\n[Summary: Adapa, or perhaps Adamu, son of Ea, had recieved from his father, the god Ea, wisdom, but not eternal life.\n\nHe was a semi-divine being and was the wise man and priest of the temple of Ea at Eridu, which he provided with the ritual bread and water.\n\nIn the exercise of this duty he carried on fishing upon the Persian Gulf.\n\nWhen Adapa was fishing one day on a smooth sea, the south wind rose suddenly and overturned his boat, so that the was thrown into the sea.\n\nAngered by the mishap, he broke the wings of the south wind so that for seven days it could not blow the sea's coolness over the hot land.\n\nAnu calls Adapa to account for this misdeed, and his father Ea warns him as to what should befall him.\n\nHe tells him how to fool Tammuz and Gishzida, who will meet him at the gate of heaven.\n\nEa cautions him not to eat or drink anything in heaven, as Ea fears that the food and drink of death will be set before Adapa.\n\nHowever, the food and drink of eternal life are set before him instead, and Adapa's over-caution deprives him of immortality.\n\nHe has to return to Earth instead.] TABLET NO.1 He possessed intelligence .\n\n.\n\n.\n\n, His command like the command of Anu ...\n\nHe (Ea) granted him a wide ear to reveal the destiny of the land, He granted him wisdom, but he did not grant him eternal life.\n\nIn those davs, in those years the wise man of Eridu, Ea had created him as chief among men, A wise man whose command none should oppose, The prudent, the most wise among the Anunnaki was he, Blameless, of clean hands, anointed, observer of the divine statutes, With the bakers he made bread With the bakers of Eridu, he made bread, The food and the water for Eridu he made daily, With his clean hands he prepared the table, And without him the table was not cleared.\n\nThe ship he steered, fishing and hunting for Eridu he did.\n\nThen Adapa of Eridu While Ea, ...\n\nin the chamber, upon the bed.\n\nDaily the closing of Eridu he attended to.\n\nUpon the pure dam, the new moon dam) he embarked upon the ship, The wind blew and his ship departed, With the oar, be steered his ship Upon the broad sea .\n\n.\n\n.\n\nTABLET NO.\n\n2 .................\n\nThe south wind ....\n\nwhen He had driven me to the house of my lord, I said, O South wind, on the way I shall to thee ...\n\neverything that, Thy wing, will I break.\" As be spoke with his mouth, The wing of the South wind was broken, seven davs The South wind blew not upon the land.\n\nAnu Called to his messenger Ilabrat: Why has the South wind not blown upon the land for seven davs?\n\nHis messenger Ilabrat answered him: \"My lord, Adapa, the son of Ea, the wing of the South wind Has broken.\" When Anu heard these words He cried, Help!\" He ascended his throne, \"Let some one bring him,\" Likewise Ea, who knows the heaven.\n\nHe roused him ...\n\nhe caused him to wear.\n\nWith a mourning garment He garbed him, and gave him counsel Saying: \" Adapa, before the face of Anu the King thou art to go ..."

