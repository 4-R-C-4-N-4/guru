[content]
body = "[whatever] there be, that would I know.\" \"Enkidu, come (then) to [Erech], the high-wall‚Äôd, [where] people [array] them [Gorgeous] in festal attire, (and) each day the day is a revel, 10.\n\n[Eunuch]-priests [clashing] (their) cymbals, and [dancing]-girls .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nflown with their wantoning, gleeful, and keeping the nobles Out of their beds !\n\n(Nay), Enkidu, [joy] in thy life (to its fullest) [Thou shalt] taste‚Äî(forsooth) will I shew thee a man who is happy, 15.\n\nGilgamish!\n\nView him, O look on his face, (how) comely his manhood!\n\nDower‚Äôd with lustiness is he, the whole of his body with power Brimming, [his] vigour is stronger than thine, (all) day and night restless!\n\n20.\n\nEnkidu, temper thine arrogance‚ÄîGilgamish, loveth him Shamash, Anu, (and) Enlil , and Ea have dower‚Äôd his wisdom with largesse.\n\n.\n\n(Sooth), or ever from out of thy mountains thou camest, in Erech 25.\n\nGilgamish thee had beheld in a dream; so, Gilgamish coming Spake to his mother, the dream to reveal.\n\n'O my mother, a vision Which I beheld in my night-time.\n\n(Behold), there were stars of the heavens, When something like unto Anu's own self fell down on my shoulders, 30.\n\n(Ah, though) I heaved him, he was o‚Äôerstrong for me, (and though) his grapple Loosed I, I was unable to shake him (from off me): (and now, all the meanwhile), People from Erech were standing about [him , the] artisans [pressing].\n\n35.\n\nOn [him behind], (while) throng‚Äôd him [the heroes]; my (very) companions Kissing [his] feet; [I, I to my breast] like a woman did hold him, (Then) [I] presented him low at [thy] feet, [that] as mine own equal.\n\n[Thou] might‚Äôst account him.' [She] who knoweth all wisdom (thus) to her Seigneur she answer‚Äôd, 40.\n\n[She] who knoweth all wisdom, to Gilgamish (thus) did she answer: '(Lo), by the stars of the heavens are represented thy [comrades], [That which was like unto] Anu's [own self], which fell on thy shoulders, [Which thou didst heave, but he was, o‚Äôerstrong for thee, [(aye), though his grapple Thou didst unloose], but to shake him from off thee thou wert [un] able, 45.\n\n[So didst present] him low at my feet, [that] as thine own equal [I might] account him‚Äî[and thou to thy breast like a woman] didst hold him:  [This is a stoutheart, a] friend, one ready to stand by [a comrade], One whose strength [is the greatest, (the length and breadth) of the country], [Like to a double of Anu's own self his] strength is enormous.\n\n[(Now), since thou] to thy breast didst hold him [the way of a woman], 5."

