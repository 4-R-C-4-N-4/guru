[content]
body = "Her counsel E’en as she spake it found favour, (for) conscious he was of his longing Some companion to seek; so unto the courtesan spake he : \"Up, then, O girl, to the Temple, the holy (and) sacred, invite me, 45.\n\nMe, to the dwelling of Anu and Ishtar, where, highest in power, Gilgamish is, and prevaileth o’er men like an aurochs—for I, too, Column V .\n\nI, I will summon him, challenging boldly (and) crying through Erech, 'I too, am mighty!' Nay, I, forsooth [I], will (e’en) destiny alter— (Truly), ’tis he who is born in the desert whose vigour [is greatest!] .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nI will [please] thee, 5.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n[whatever] there be, that would I know.\" \"Enkidu, come (then) to [Erech], the high-wall’d, [where] people [array] them [Gorgeous] in festal attire, (and) each day the day is a revel, 10.\n\n[Eunuch]-priests [clashing] (their) cymbals, and [dancing]-girls .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nflown with their wantoning, gleeful, and keeping the nobles Out of their beds !\n\n(Nay), Enkidu, [joy] in thy life (to its fullest) [Thou shalt] taste—(forsooth) will I shew thee a man who is happy, 15.\n\nGilgamish!\n\nView him, O look on his face, (how) comely his manhood!\n\nDower’d with lustiness is he, the whole of his body with power Brimming, [his] vigour is stronger than thine, (all) day and night restless!\n\n20.\n\nEnkidu, temper thine arrogance—Gilgamish, loveth him Shamash, Anu, (and) Enlil , and Ea have dower’d his wisdom with largesse.\n\n( How Gilgamish dreamt of Enkidu ).\n\n(Sooth), or ever from out of thy mountains thou camest, in Erech 25.\n\nGilgamish thee had beheld in a dream; so, Gilgamish coming Spake to his mother, the dream to reveal.\n\n'O my mother, a vision Which I beheld in my night-time.\n\n(Behold), there were stars of the heavens, When something like unto Anu's own self fell down on my shoulders, 30.\n\n(Ah, though) I heaved him, he was o’erstrong for me, (and though) his grapple Loosed I, I was unable to shake him (from off me): (and now, all the meanwhile), People from Erech were standing about [him , the] artisans [pressing].\n\n35.\n\nOn [him behind], (while) throng’d him [the heroes]; my (very) companions Kissing [his] feet; [I, I to my breast] like a woman did hold him, (Then) [I] presented him low at [thy] feet, [that] as mine own equal.\n\n[Thou] might’st account him.' [She] who knoweth all wisdom (thus) to her Seigneur she answer’d, 40."

