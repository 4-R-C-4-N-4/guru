[content]
body = "Ever (?) [he rangeth at large] o’er the mountains, [(and) ever] with cattle [Grazeth on herbage (and) ever he setteth] his foot to the water, [So that I fear] to approach him.\n\nThe pits which I [myself] hollow’d 10.\n\n[(With mine own hands) hath he fill’d in (again)], (and) the traps of my [setting] [Torn up, (and) out of my clutches hath holpen escape] (all) the cattle, Beasts of the desert: to work at my fieldcraft [he will not allow] me.\" [Open’d his mouth (then) his father, and spake], addressing the hunter: 15.\n\n\"Gilgamish [dwelleth] in Erech, [my son, whom no one] hath vanquish’d, [(Nay, but) ’tis his strength is greatest (the length and breadth) of the country] [Like to a double of Anu's own self], his strength is [enormous], [Go, set] thy face [towards Erech: and when he hears of] a monster, [He will say 'Go, O hunter, a courtesan-girl, a hetaera] 20.\n\nTake [with thee] .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nlike a strong one; [When he the cattle shall gather again] to the place of (their) drinking, [So shall she put off] her [mantle] (the charm of) her beauty [revealing]; [(Then) shall he spy her, and (sooth) will embrace her, (and thenceforth) his cattle, [Which in] his very own deserts [were rear’d], will (straightway) deny him.'\" ( How Gilgamish first heard of Enkidu ).\n\n25.\n\nUnto the rede of his father the hunter [hath hearken’d, (and straightway)] He will away [unto Gilgamish] .\n\nTaking the road towards Erech Turn’d he [his steps, and to] Gilgamish [came, his speech thus addressing]: (Saying): \"There is a great fellow [come forth from out of the mountains], 30.\n\n[(O, but) his strength] is the greatest, (the length and breadth) of the country, Like to a double of Anu's own self [his strength] is enormous, [Ever (?)] he rangeth at large o’er the mountains, (and) ever with cattle [Grazeth on herbage, (and)] ever [he setteth] his foot to the water, 35.\n\nSo that I fear to approach [him] .\n\nThe pits which I [myself] hollow’d (With mine own hands) hath he fill’d in (again, and) the traps of my [setting] Torn up, (and) out of my clutches hath holpen escape (all) the cattle, Beasts [of the desert]: to work at my fieldcraft he will not allow me.\" 40.\n\nGilgamish unto him, unto the hunter made answer (in this wise): \"Go, (good) my hunter, take with thee a courtesan-girl, a hetaera, When he the cattle shall [gather] again to the place of (their) drinking, So shall she put off her mantle, (the charm of her) beauty [revealing], 45.\n\n(Then) shall he spy her, and (sooth) will embrace her, (and thenceforth) his cattle Which in his very own deserts were rear’d will (straightway) deny him.\n\n\" ( The Seduction of Enkidu )."

