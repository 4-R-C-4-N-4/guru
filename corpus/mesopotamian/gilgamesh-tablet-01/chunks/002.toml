[content]
body = "Gilgamish leaveth no son to his father, [his arrogance swelling] (Each) day and night; aye, he is the shepherd of Erech, [the high-wall’d], 25.\n\nHe is their shepherd .\n\n.\n\n.\n\nmasterful, dominant, subtle .\n\n.\n\n.\n\nGilgamish leaveth no maid to [her mother], nor daughter to hero, (Nay), nor a spouse to a [husband].\" (And so), to (th’ appeal of) their wailing 30.\n\n[Anu] gave ear, call’d the lady Aruru : \"’Twas thou, O Aruru, Madest [(primeval seed of) mankind(?)]: do now make its fellow, So that he [happen on Gilgamish], yea, on the day of his pleasure, So that they strive with each other, and he unto Erech give [surcease].\" .\n\nSo when the goddess Aruru heard this, in her mind she imagined (Straightway, this) Concept of Anu, and, washing her hands, (then) Aruru Finger’d some clay, on the desert she moulded (it): [(thus) on the desert] 35.\n\nEnkidu made she, a warrior, (as he were) born (and) begotten, (Yea), of Ninurta the double, [and put forth] the whole of his body Hair: in the way of a woman he snooded his locks (in a fillet); Sprouted luxuriant growth of his hair-like (the awns of) the barley, Nor knew he people nor land; he was clad in a garb like Sumuqan .\n\n40.\n\nE’en with gazelles did he pasture on herbage, along with the cattle Drank he his fill, with the beasts did his heart delight at the water.\n\n.\n\n(Then) did a hunter, a trapper, come face to face with this (fellow), Came on him [one], two, three days, at the place where (the beasts) drank (their) water ; 45.\n\n(Sooth), when the hunter espied him, his face o’ermantled with terror, He and his cattle went unto his steading, [dismay’d] (and) affrighted, Crying aloud, [distress’d in, his heart, and) his face overclouded, .\n\n.\n\n.\n\n.\n\nwoe in his belly .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n50.\n\n(Aye, and) his face was the same as of one [who hath gone] a far [journey].\n\nOpen’d [his mouth (then)] the hunter, and spake, addressing [his father]: \"Father, there is [a] great fellow come [forth from out of the mountains], (O, but) [his] strength is the greatest [(the length and breadth) of the country], [Like to a double] of Anu's own self [his strength] is enormous, 5.\n\nEver (?) [he rangeth at large] o’er the mountains, [(and) ever] with cattle [Grazeth on herbage (and) ever he setteth] his foot to the water, [So that I fear] to approach him.\n\nThe pits which I [myself] hollow’d 10.\n\n[(With mine own hands) hath he fill’d in (again)], (and) the traps of my [setting] [Torn up, (and) out of my clutches hath holpen escape] (all) the cattle, Beasts of the desert: to work at my fieldcraft [he will not allow] me.\" [Open’d his mouth (then) his father, and spake], addressing the hunter: 15."

