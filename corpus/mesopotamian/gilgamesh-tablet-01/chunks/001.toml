body = "THE EPIC OF GILGAMISH.\n\nTHE FIRST TABLET OF THE TYRANNY OF GILGAMISH, AND THE CREATION OF ENKIDU.\n\n.\n\nHe who (the heart of) all matters hath proven let him [teach] the nation, [He who all] knowledge possesseth, therein shall he [school] all the people, [He shall his wisdom impart (?)] and (so) shall they ]share it] together.\n\n[Gilgamish(?)] —he was the [Master] of wisdom, with [knowledge of all things, 5.\n\nHe ’twas discovered the secret concealed .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n(Aye), handed down the tradition relating to (things) prediluvian, Went on a journey afar, (all) aweary and [worn with his toiling(?)], 10.\n\n[Graved] on a table of stone all the travail.\n\nOf Erech, the high-wall’d, He (it was) built up the ramparts; (and) he (it was) clamp’d the foundation, Like unto brass, of [E]-Anna , the sacred, the treasury hallow’d, [Strengthen’d] its base to grant wayleave to no [one] .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nthe threshold which from [of old (?)] .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n[E]-Anna .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n15 .\n\n.\n\n.\n\n.\n\n.\n\nto grant wayleave [to no one (?)] .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nTwo-thirds of him are divine, and [one-third of him human,] .\n\n.\n\n.\n\nThe form of his body .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nHe hath forced to take .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n7.\n\n\".\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nof Erech ’tis he who hath [taken], .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n(while) tow’reth [his] crest like an aurochs, 10.\n\nNe’er hath the shock of [his] weapons (its) [peer]; are driven [his] fellows Into the toils , while cow’d are the heroes of Erech un- .\n\n.\n\n.\n\n.\n\n.\n\nGilgamish leaveth no son to [his] father, [his] arrogance swelling (Each) day and [night]; [aye, he] is the shepherd of Erech, the high-[wall’d], 15.\n\nHe is [our(?)] shepherd .\n\n.\n\n.\n\n.\n\n[masterful, dominant, subtle] .\n\n.\n\n.\n\n[Gilgamish] leaveth no [maid to her mother, nor] daughter to [hero], [(Nay), nor a spouse to a husband]\" (And so), to (th’ appeal of) their wailing [Gave ear th’ Immortals]: the gods of high heaven address’d the god Anu], 20.\n\n(Him who was) Seigneur of Erech: \"’Tis thou a son hast begotten, (Aye, in sooth, all) tyrannous, [while tow’reth his crest like an aurochs], Ne’er hath [the shock of his weapons] (its) peer; are driven [his fellows] Into the toils, awhile cow’d are the heroes of Erech un- .\n\n.\n\n.\n\n.] ."

