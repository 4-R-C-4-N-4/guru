[content]
body = "[This is a sign that] thou art the one he will [never] abandon: [This] of thy dream is the [meaning].' [Again he spake] to his mother, '[Mother], a second dream [did I] see: [Into Erech, the high-wall'd], 10.\n\nHurtled an axe, and they gather’d about it: [the meanwhile, from Erech] [People] were standing about it, [the people] (all) thronging before it, [Artisans pressing] behind it, [while] I at thy feet did present it, 15.\n\n[I], like a woman I held it to me [that] thou might’st account it, As mine own equal.' [She the [all]-wise, who knoweth all wisdom, (thus) answer’d her offspring, [She the all-wise] who knoweth all wisdom, to Gilgamish answer'd: '(Lo, that) [Axe] thou didst see (is) a Man; like a woman didst hold him, 20.\n\nUnto thy breast, [that] as thine own equal I might account him, [This] is a stoutheart, a friend, one ready to stand by a comrade, One whose strength is the [greatest (the length and breadth) of the country], (Like to a double of] Anu's [own self], his strength is enormous.' [Gilgamish open’d his mouth, and] addressing his mother, (thus spake he): '[Though] great [danger (?)] befall, [a friend (?)] shall I have .\n\n.\n\n.\n\n'\" ."

