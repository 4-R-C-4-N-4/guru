[content]
body = "Drank he his fill , with the beasts did his heart delight at the water, So beheld him the courtesan-girl, the lusty great fellow, (O but) a monster (all) savage from out of the depths of the desert!\n\n\"’Tis he, O girl!\n\nO, discover thy beauty, thy comeliness shew (him), 10.\n\nSo that thy loveliness he may possess—(O), in no wise be bashful, Ravish the soul of him—(certes), as soon as his eye on thee falleth, He, forsooth, will approach thee, and thou—O, loosen thy mantle, So that he clasp thee, and (then) with the wiles of a woman shalt ply him; (Wherefore) his animals, bred in his desert, will (straightway) deny him, 15.\n\n(Since) to his breast he hath held thee.\" The girl, displaying her bosom, Shew’d him her comeliness, (yea) so that he of her beauty possess’d him, Bashful she was not, (but) ravish’d the soul of him, loosing her mantle, So that he clasp’d her, (and then) with the wiles of a woman she plied him, 20.\n\nHolding her unto his breast.\n\n(’Twas thus that) Enkidu dallied Six days, (aye) seven nights, with the courtesan-girl in his mating.\n\n.\n\nSated at length with her charms, he turn’d his face to his cattle, O the gazelles, (how) they scamper’d away, as soon as they saw him!\n\n25.\n\nHim, yea, Enkidu,—fled from his presence the beasts of the desert!\n\nEnkidu losing his innocence —so, when the cattle fled from him, Failed his knees, and he slack’d in his running, (not) as aforetime: Natheless he (thus) hath attain’d his full growth and hath broaden’d (his) wisdom.\n\n30.\n\nSat he again at the feet of the woman, the woman his features Scanning, and, while she was speaking, his ears heard (the words) she was saying: \"Comely thou art, e’en like to a god, O Enkidu, shalt be, 35.\n\nWhy with the beasts (of the field) dost thou (ever) range over the desert?\n\nUp!\n\nfor I'll lead thee to Erech, the high-wall'd—(in sooth), to the Temple Sacred, the dwelling of Anu and Ishtar, where, highest in power, Gilgamish is, and prevaileth o’er men like an aurochs.\" 40.\n\nHer counsel E’en as she spake it found favour, (for) conscious he was of his longing Some companion to seek; so unto the courtesan spake he : \"Up, then, O girl, to the Temple, the holy (and) sacred, invite me, 45.\n\nMe, to the dwelling of Anu and Ishtar, where, highest in power, Gilgamish is, and prevaileth o’er men like an aurochs—for I, too,  I, I will summon him, challenging boldly (and) crying through Erech, 'I too, am mighty!' Nay, I, forsooth [I], will (e’en) destiny alter— (Truly), ’tis he who is born in the desert whose vigour [is greatest!] .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nI will [please] thee, 5.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n."

