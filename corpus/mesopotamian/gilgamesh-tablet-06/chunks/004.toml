[content]
body = "(Then) Gilgamish utter’d a riddle Unto the notables (?): Who, pr’ythee, is most splendid of heroes , Who, pr’ythee, is most famous of giants?\n\nGilgamish—he is most splendid of heroes , 185.\n\n[ Enkidu—he is most ] famous of giants .\n\n________________________________ 190.\n\nSo in his palace did Gilgamish hold high revel: (thereafter), (While all) the heroes asleep, on their nightly couches were lying Enkidu, too, was asleep, and a vision beheld, and (so) coming Enkidu (now) his dream to reveal: (thus) spake he unto his comrade."

