body = "But if thou’lt [not] make [this Bull], then .\n\n.\n\n.\n\n.\n\nI'll smite .\n\n.\n\n.\n\n., I'll put .\n\n.\n\n.\n\n., I'll .\n\n.\n\n.\n\n.\n\n100.\n\nMore than the .\n\n.\n\n.\n\nwill be the .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n________________________________ Anu [made answer, (thus) speaking, and said unto] Ishtar, the Lady: \"[If I the Heavenly Bull shall create, for which] thou dost ask me, (Then) seven years of (leer) husks [must needs follow after his onslaught (?)].\n\n105.\n\nWilt thou [for man] gather [corn (?)], and increase [for the cattle(?)] the fodder (?).\" [Ishtar made answer, (thus) speaking [and said unto] Anu, her father: \"[Corn for mankind] have I hoarded, have grown [for the cattle the fodder], 110.\n\n[If seven] years of (leer) husks [must needs follow after his onslaught (?)] [I will for man] gather [corn and increase for the cattle] the fodder.\"  .\n\n130.\n\nEnkidu girded (?) his middle; (and straightway) Enkidu, leaping, Seized on the Heavenly Bull by [his] horns, and (headlong) before him Cast down the Heavenly Bull his full length, .\n\n.\n\n.\n\n.\n\n(Aye), by the thick of his tail.\n\n147.\n\nChased him did Enkidu, .\n\n.\n\n.\n\nthe Heavenly Bull .\n\n.\n\n.\n\nSeized him and by [the thick] of his tail .\n\n.\n\n.\n\n.\n\n153.\n\n(So), what time they the Bull of the Heavens had kill’d, its heart they removéd, Unto the Sun-god they offer’d in sacrifice; when the libation 155.\n\nUnto the Sun they had voided, they sate them down, the two brothers.\n\n________________________________ .\n\n(Then) mounted Ishtar (the crest of) the ramparts of Erech, the high-wall’d, (So) to the roof-top ascended, (and there) gave voice to her wailing; 160.\n\n\"Woe unto Gilgamish—he who by killing the Bull of the Heavens, Made me lament.\" When Enkidu heard this, the shrieking of Ishtar, Wrenching the member from out of the Bull, he toss’d (it) before her; 165.\n\n\"If I could only have reach’d thee, i’faith, I’d ha’ served thee the same way, I’d ha’ let dangle his guts on thy flanks (as a girdle about thee).\" Ishtar assembled the girl-devotees, the hetaerae and harlots, Over the member (torn out) from the Bull she led the lamenting.\n\n.\n\n170.\n\nGilgamish call’d to the masters of craft, the artists, (yea), all of them, That at the size of its horns (all) the guilds of the crafts speak their praises Each had of azure in weight thirty minas to be as their setting, Two fingers their .\n\n...\n\n...\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n175.\n\nBoth of them held six measures of oil; to his god Lugal-banda He for (his) unguent devoting, brought in, and (thus) let them hang (there), (There) in the shrine of his forbears.\n\n(And now) in the River Euphrates Washing their hands, they start (on their progress) and come (to the city); (Now) are they striding the highway of Erech, the heroes of Erech 180.\n\nThronging (about them) to see them."

