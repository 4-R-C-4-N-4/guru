body = "Who hath been ever thy lord who hath gainŌĆÖd [over thee the advantage?\n\nCome, and I will unfold thee [the endless tale] of thy husbands.\n\n________________________________ 45.\n\n(Sooth), thou shalt vouch (?) for the truth (?) of (this) listŌĆöThy maidenhood's consort, Tammuz, each year dost make him the cause of Wailing , (then cometh Next) the bird Roller gay-featherŌĆÖd thou lovedst, and (yet) thou didst smite him 50.\n\nBreaking his wing: in the grove doth he stand, crying kappi 'my wing!' Lovedst thou also a Lion, in (all) the full strength of (his) vigour, (Yet) thou didst dig for him seven and seven (deep) pits (to entrap him).\n\nLovedst thou also a Stallion, magnificent he in the battle, Thou wert the cause of a bridle, a spur, and a whip to him: (also) 55.\n\nThou wert the cause of his fifty miles galloping; thou wert the cause, too, (Eke), of exhaustion and sweating (?); (thereafter), ŌĆÖtwas thou who didst (also) Unto his mother Silili give cause for (her deep) lamentation.\n\nLovedst thou also a Shepherd, a neatherd, for thee without ceasing 60.\n\nEach day to sacrifice yeanlings for thee would heap thee his charcoal, (Yet) thou didst smite him, transforming him into a jackal: his herd boy Yea, his own herd boy drove him away, and his dogs tore his buttocks.\n\nLovedst thou, too, Ishullanu, the gardener he of thy sire, 65.\n\nBringing delights (?) to thee ceaseless, while daily he garnishŌĆÖd thy platter; ŌĆÖTwas for thee only to cast thine eyes on him, and with him be smitten .\n\n'O Ishullanu of mine, come, let me taste of thy vigour, Put forth thy hand, too, .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n' 70.\n\nBut he, Ishullanu, Said to thee 'What dost thou ask me?\n\nSave only my mother hath baked (it), Nought have I eatenŌĆö(and) what I should eat would be bread of transgression, (Aye) and iniquity!\n\n(Further), the reeds are a cloak against winter.\n\n' 75.\n\nThou this [his answer] didst hear, didst smite him and make him a spider(?) , Making him lodge midway up a [dwelling(?)] ŌĆönot to move upwards Lest there be drainage ; nor down, lest a crushing [oŌĆÖerwhelm him].\n\nSo, too, me in my turn thou wouldst love and (then) [reckon] me like them.\" ________________________________ 80.\n\n[Heard] this (then) Ishtar: she burst into rage and [went up] to Heaven, Hied her (thus) Ishtar to Anu, [her father], to Antu, her mother, 85.\n\nCame she [to tell (them)]: \"O father, doth Gilgamish load me with insult, Gilgamish tale of my sins, my sins and iniquities telleth.\" ________________________________ Anu made answer, (thus) speaking, and said unto Ishtar the Lady: \"Nay, thou didst ask him [to grant thee largesse of the fruit of his body], 90.\n\n(Hence) he the tale of thy sins, thy sins and iniquities telleth.\" ( The Creation of the Divine Bull which is to destroy the heroes )."

