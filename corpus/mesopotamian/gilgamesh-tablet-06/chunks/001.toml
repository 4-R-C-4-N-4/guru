body = "The Epic of Gilgamish , tr.\n\nby R.\n\nCampbell Thompson [1928], at sacred-texts.com THE SIXTH TABLET.\n\nOF THE GODDESS ISHTAR, WHO FELL IN LOVE WITH THE HERO AFTER HIS EXPLOIT AGAINST HUMBABA.\n\nColumn I .\n\n( Gilgamish is removing the stains of combat ).\n\n(Now) is he washing his stains, (and) is cleansing his garments in tatters, Braiding (?) (the locks of) his hair (to descend loose) over his shoulders, Laying aside his garments besmirchen, (and) donning his clean ones, Putting on armlets (?), and girding his body about with a baldric, 5.\n\nGilgamish bindeth his fillet, and girdeth himself with a baldric.\n\n( Ishtar sees him and seeks to wed him ).\n\n(Now) Lady Ishtar espieth the beauty of Gilgamish: (saith she), \"Gilgamish, come, be a bridegroom, to me of the fruit (of thy body) Grant me largesse: (for) my husband shalt be and I'll be thy consort.\n\n10.\n\nO, but I'll furnish a chariot for thee, (all) azure and golden, Golden its wheel, and its yoke precious stones , each day to be harness'd Unto great mules: (O), enter our house with the fragrance of cedar.\n\n15.\n\n(So) when thou enterest into our house shall threshold and dais Kiss thy feet, (and) beneath thee do homage kings, princes, and rulers, Bringing thee yield of the mountains and plains as a tribute: thy she-goats Bring forth in plenty, thy ewes shall bear twins, thy asses attaining 20.\n\n(Each) to the size of a mule, (and) thy steeds in thy chariot winning Fame for their gallop: [thy mules ] in the yoke shall ne’er have a rival.\" ________________________________ [Gilgamish] open’d his mouth in reply, Lady Ishtar [to answer]: \"Aye, but what must I give] thee, (if (?)) I should take thee in marriage?\n\n25.\n\n[I must provide thee with oil] for (thy) body, and clothing: (aye, also) [Give thee (thy)] bread and (thy) victual: (sooth), must be sustenance [ample] Meet for divinity—[I, (too), must give thee (thy) drink] fit for royalty.\n\n30.\n\n.\n\n.\n\n.\n\n.\n\nI shall be bound, .\n\n.\n\n.\n\nlet us amass (?), .\n\n.\n\n.\n\nclothe with a garment.\n\n[What, then, will be my advantage, supposing) I take thee in marriage?\n\n[Thou’rt but a ruin which giveth no shelter (?) to man] from the weather, Thou’rt but a back door [not] giving resistance to blast or to windstorm, 35.\n\nThou’rt but a palace which dasheth the heroes [within it to pieces], Thou’rt but a pitfall (which letteth) its covering [give way (all treach’rous)], Thou art but pitch which [defileth] the man who doth carry it with him, Thou’rt but a bottle which [leaketh] on him who doth carry it with him, Thou art but limestone which [letteth] stone ramparts [fall crumbling in ruin].\n\n40.\n\nThou’rt but chalcedony [failing to guard (?)] in an enemy's country, Thou’rt but a sandal which causeth its owner [to trip (by the wayside)].\n\nWho was ever [thy] husband [thou faithfully lovedst] for all time?"

