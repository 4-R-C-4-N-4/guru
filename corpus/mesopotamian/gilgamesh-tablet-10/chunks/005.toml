[content]
body = "Saith (on the matter) .\n\n(And so), again (?) I came through all countries, Travell’d o’er difficult mountains, (aye), [and] all seas have I traversed, Nor hath (ever) my face had its fill of gentle sleep (?): (but) with hardship Have I exhausted myself, (and) my flesh have I laden with sorrow.\n\n30.\n\nEre I had come to the [House(?)] of the Wine-Maker, spent were my garments, .\n\n.\n\n.\n\nOwl, bat, lion, pard, wild cat, deer, ibex, and .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n[Flesh] of them (all) have I eaten, (and eke) their pelts have I dress’d (?) [me].\" ( The remainder of the Column is mutilated: there is some mention of \"let them bolt her gate .\n\n.\n\n.; with pitch and bitumen .\n\n.\n\n.\n\n.\" in l.\n\n33 , and then nothing which gives connected sense until Column VI, ll .\n\n26-39): Column VI .\n\n26.\n\n\"Shall we for ever build house(s), for ever set signet (to contract), Brothers continue to share, or among [foes (?)] always be hatred?\n\n(Or) will for ever the stream (that hath risen) in spate bring a torrent, Kulilu -bird [to] Kirippu -bird .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n?\n\nFace which doth look on the sunlight .\n\n.\n\n.\n\npresently (?) shall not be .\n\n.\n\n.\n\nSleeping and dead [are]r alike, from Death they mark no distinction Servant and master, when once thy have reach’d [their full span allotted], Then do the Anunnaki, great gods, .\n\n.\n\n.\n\n.\n\n.\n\n.\n\nMammetum, Maker of Destiny with them, doth destiny settle, Death, (aye), and Life they determine; of Death is the day not revealéd.\""

