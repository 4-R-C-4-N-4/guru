body = "THE TENTH TABLET.\n\nHOW GILGAMISH REACHED UTA-NAPISHTIM.\n\n.\n\nDwelt Siduri, the maker of wine .\n\n.\n\n.\n\n.\n\nWine(?) was her trade, her trade was .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nCover’d she was with a veil and .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n5.\n\nGilgamish wander’d [towards her] .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nPelts was he wearing .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nFlesh of the gods in [his body] possessing, but woe in [his belly], (Aye), and his countenance like to a (man) who hath gone a far journey.\n\n10.\n\nLook’d in the distance the maker of wine, (and) a word in her bosom Quoth she, in thought with herself: \"This is one who would ravish (?) [a woman], 15.\n\nWhither doth he advance in .\n\n.\n\n.\n\n?\" As soon as the Wine-maker saw him, Barr’d she [her postern], barr’d she her inner door, barr’d she [her chamber(?)].\n\nStraightway did Gilgamish, too, in his turn catch the sound [of her shutting(?)], Lifted his chin, and so did he let [his attention fall on her].\n\n________________________________ Unto her (therefore) did Gilgamish speak, to the Wine-maker saying]: 20.\n\n\"Wine-maker, what didst thou see, that [thy postern (now)] thou hast barréd, Barréd thine inner door, [-barréd thy chamber(?)]?\n\nO, I'll smite [thy] portal, [Breaking the bolt] .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n[Unto him (answer 'd) the Wine-maker, speaking to Gilgamish, (saying): \"Why is thy vigour (so) wasted, (or why) is thy countenance sunken, (Why) hath thy spirit a sorrow (?), (or why) hath thy cheerfulness surcease?\n\n35.\n\n(O, but) there's woe in thy belly!\n\nLike one who hath gone a far journey (So) is thy face—(O,) with cold and with heat is thy countenance weather’d, .\n\n.\n\n.\n\nthat thou shouldst range over the desert.\" Gilgamish unto her (answer’d and) spake to the Wine-maker, saying: 40.\n\n\"Wine-maker, ’tis not my vigour is wasted, nor countenance sunken, Nor hath my spirit a sorrow (?), (forsooth), nor my cheerfulness surcease, No, ’tis not woe in my belly: nor doth my visage resemble One who hath gone a far journey—nor is my countenance weather'd 45.\n\nEither by cold or by heat .\n\n.\n\n.\n\nthat (thus) I range over the desert.\n\nComrade (and) henchman, who chased the wild ass, the pard of the desert, Comrade (and) henchman, who chased the wild ass, the pard of the desert, Enkidu—we who all haps overcame, ascending the mountains, 50.\n\nCaptured the Heavenly Bull, and destroy’d him]: we [o’erthrew Humbaba, He who abode in the Forest of Cedars; we slaughter’d the lions  There in the Gates (?) of the mountains (?); with me enduring all hardships, Enkidu, (he was) my comrade—the lions we slaughter’d (together), (Aye), enduring all hardships—and him his fate hath o’ertaken.\n\n(So) did I mourn him six days, (yea), a se’nnight, until unto burial I could consign (?) him .\n\n.\n\n.\n\n."

