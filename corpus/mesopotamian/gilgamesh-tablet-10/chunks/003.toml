[content]
body = "Gilgamish, if perchance thou succeed in traversing the Ocean, What wilt thou do, when unto the Waters of Death thou arrivest?\n\nGilgamish, there is Ur-Shanabi, boatman to Uta-Napishtim, He with whom sails (?) are, the urnu of which in the forest he plucketh, 30.\n\n(Now) let him look on thy presence, (and) [if it be] possible with him Cross—(but) if it be not, (then) do thou retrace thy steps (homewards).\" [paragraph continues] Gilgamish, hearing this, [taketh] (his) axe in his [hand], awhile he draweth Glaive from his baldric (?)].\n\n(Then) did Ur-Shanabi speak to him (yea), unto Gilgamish, (saying): \"Tell to me what is thy name, (for) I am Ur-Shanabi, (henchman), (Aye), of far Uta-Napishtim .\" To him did Gilgamish answer: 5.\n\n\"Gilgamish, (that) is my name, come hither from Erech(?), E-Anni (?), (One) who hath traversed the Mountains, a wearisome journey of Sunrise, 10.\n\nNow that I look on thy face, Ur-Shanabi—Uta-Napishtim Let me see also—the Distant one!\" Him did Ur-Shanabi [answer], Gilgamish: .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\" : (Thus) did Ur-Shanabi speak to him, (yea), unto Gilgamish, (saying) \"Why is thy vigour all wasted .\n\n.\n\n.\" : 32.\n\nGilgamish (thus) continued his speech to Ur-Shanabi, (saying) \"Pr’ythee, Ur-Shanabi, which is [the way unto Uta-Napishtim ?\n\nWhat is its token, I pr’ythee, vouchsafe me, vouchsafe me nits token].\n\nIf it be possible (even) the Ocean (itself) will I traverse, 35.\n\nBut if it should be impossible, [(then) will I range o’er the desert].\" ________________________________ (Thus) did Ur-Shanabi speak to him, (yea), unto Gilgamish, (saying): \"Gilgamish, ’tis thine own hand hath hinder’d [thy crossing the Ocean], Thou hast destroyéd the sails(?), (and) hast piercéd (?) the .\n\n.\n\n.\n\n(Now) destroy’d are the sails(?), and the urnu not .\n\n.\n\n.\n\n.\n\n.\n\n40.\n\nGilgamish, take thee thy axe in [thy] hand; O, descend to the forest, [Fashion thee] poles each of five gar in length; make (knops of) bitumen, Sockets, (too), add (to them) : bring [them me].\" (Thereat), when Gilgamish [heard this], Took he the axe in his hand, (and) [the glaive] drew forth [from his baldric], 45.\n\nWent to the forest, and poles each of five gar in length [did he fashion], (Knops of) bitumen he made, and he added (their) sockets: and brought them .\n\n.\n\n, Gilgamish (then), and Ur-Shanabi fared them forth [in their vessel], Launch’d they the boat on the billow, and they themselves [in her embarking].\n\nAfter the course of a month and a half he saw on the third day 50.\n\nHow that Ur-Shanabi (now) at the Waters of Death had arrivéd."

