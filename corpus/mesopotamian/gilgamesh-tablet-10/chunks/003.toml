body = "If it be possible (even) the Ocean (itself) will I traverse, (But) if it should be impossible, (then) will I range o’er the desert.\" ________________________________ ( The Wine-maker, in accordance with tradition, attempts to dissuade him ).\n\n20.\n\n(Thus) did the Wine-maker answer to him, unto Gilgamish (saying), \"There hath been never a crossing, O Gilgamish: never aforetime Anyone, coming thus far, hath been able to traverse the Ocean: Warrior Shamash doth cross it , ’tis true, but who besides Shamash Maketh the traverse?\n\n(Yea), rough is the ferry, (and) rougher its passage, 25.\n\n(Aye), too, ’tis deep are the Waters of Death, which bar its approaches .\n\nGilgamish, if perchance thou succeed in traversing the Ocean, What wilt thou do, when unto the Waters of Death thou arrivest?\n\nGilgamish, there is Ur-Shanabi, boatman to Uta-Napishtim, He with whom sails (?) are, the urnu of which in the forest he plucketh, 30.\n\n(Now) let him look on thy presence, (and) [if it be] possible with him Cross—(but) if it be not, (then) do thou retrace thy steps (homewards).\" [paragraph continues] Gilgamish, hearing this, [taketh] (his) axe in his [hand], awhile he draweth Glaive from his baldric (?)].\n\n( The remainder of this Column in the Assyrian Version is so much mutilated that little can be made out, but what is obviously essential is that Gilgamish meets Ur-Shanabi, but destroys the sails ( ?\n\n) of the boat for some reason.\n\nBefore going on with the restoration of the Assyrian Version, we can interpolate Column IV from the Old Babylonian Version of the Berlin Tablet ) (Then) did Ur-Shanabi speak to him (yea), unto Gilgamish, (saying): \"Tell to me what is thy name, (for) I am Ur-Shanabi, (henchman), (Aye), of far Uta-Napishtim .\" To him did Gilgamish answer: 5.\n\n\"Gilgamish, (that) is my name, come hither from Erech(?), E-Anni (?), (One) who hath traversed the Mountains, a wearisome journey of Sunrise, 10.\n\nNow that I look on thy face, Ur-Shanabi—Uta-Napishtim Let me see also—the Distant one!\" Him did Ur-Shanabi [answer], Gilgamish: .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\" ( In the Assyrian Version Ur-Shanabi presently addresses Gilgamish in exactly the same words as Siduri, the Wine-maker, with the same astonishment at his weather-beaten appearance ): Column III .\n\n(Thus) did Ur-Shanabi speak to him, (yea), unto Gilgamish, (saying) \"Why is thy vigour all wasted .\n\n.\n\n.\" ( It continues thus, to be supplied for ll.\n\n2-31 from Columns I, 33 -II, 14 with due bracketing for the last words, and then the text goes on ): 32.\n\nGilgamish (thus) continued his speech to Ur-Shanabi, (saying) \"Pr’ythee, Ur-Shanabi, which is [the way unto Uta-Napishtim ?\n\nWhat is its token, I pr’ythee, vouchsafe me, vouchsafe me nits token].\n\nIf it be possible (even) the Ocean (itself) will I traverse, 35."

