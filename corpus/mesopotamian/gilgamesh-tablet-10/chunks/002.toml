[content]
body = "There in the Gates (?) of the mountains (?); with me enduring all hardships, Enkidu, (he was) my comrade—the lions we slaughter’d (together), (Aye), enduring all hardships—and him his fate hath o’ertaken.\n\n(So) did I mourn him six days, (yea), a se’nnight, until unto burial I could consign (?) him .\n\n.\n\n.\n\n.\n\n(then) did I fear .\n\n.\n\n.\n\n.\n\n.\n\nDeath did I dread, that I range o’er the desert]: the hap of my comrade [Lay on me heavy(?)—O ’tis a long road that I range o’er] the desert!\n\nEnkidu, (yea), [of my comrade the hap lay heavy (?) upon me]— 10.\n\n[’Tis a long road] that I range o’er the desert—O, how to be silent], (Aye, or) how to give voice?\n\n[(For) the comrade I ha’ (so) lovéd] Like to the dust [hath become]; O Enkidu, (he was) my comrade, He whom I loved hath become alike the dust]—[I,] shall I not, also, Lay me down [like him], throughout all eternity [never returning]?\" ________________________________ ( Here may be interpolated, for convenience, the Old Babylonian Version of this episode in the Berlin tablet of 2000 B.C.\n\nColumn II, 1 ,-III, 14): Column II .\n\n\"He who enduréd all hardships with me, whom I lovéd dearly, Enkidu,—he who enduréd all hardships with me (is now perish’d), Gone to the common lot of mankind!\n\n(And) I have bewail’d him 5.\n\nDay and night long: (and) unto the tomb I have not consign’d him.\n\n(O but) my friend cometh not (?) to my call—six days, (yea), a se’nnight 10.\n\nHe like a worm hath lain on his face—(and) I for this reason Find no life, (but must needs) roam the desert like to a hunter, (Wherefore), O Wine-maker, now that (at last) I look on thy visage, Death which I dread I will see not!\" ( The Philosophy of the Wine-maker ).\n\nThe Wine-maker Gilgamish answer’d: Column III .\n\n\"Gilgamish, why runnest thou, (inasmuch as) the life which thou seekest, Thou canst not find?\n\n(For) the gods, in their (first) creation of mortals, 5.\n\nDeath allotted to man, (but) life they retain’d in their keeping.\n\nGilgamish, full be thy belly, Each day and night be thou merry, (and) daily keep holiday revel, 10.\n\nEach day and night do thou dance and rejoice; (and) fresh be thy raiment, (Aye), let thy head be clean washen, (and) bathe thyself in the water, Cherish the little one holding thy hand; be thy spouse in thy bosom Happy—(for) this is the dower [of man] .\n\n.\n\n.\n\n.\n\n.\n\n( Here the Old Babylonian Version breaks off and we must return to the Assyrian ).\n\n( Gilgamish, dissatisfied with a Wine-maker's philosophy, would seek further afield ).\n\n15.\n\n[Gilgamish] (thus) continued his speech to the Wine-maker, (saying), \"[Pr’ythee, then], Wine-maker, which is the way unto Uta-Napishtim?\n\n[What (is)] its token, I pr’ythee, vouchsafe me, vouchsafe me its token."

