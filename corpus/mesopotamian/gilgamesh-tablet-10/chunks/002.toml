[content]
body = "(then) did I fear .\n\n.\n\n.\n\n.\n\n.\n\nDeath did I dread, that I range o’er the desert]: the hap of my comrade [Lay on me heavy(?)—O ’tis a long road that I range o’er] the desert!\n\nEnkidu, (yea), [of my comrade the hap lay heavy (?) upon me]— 10.\n\n[’Tis a long road] that I range o’er the desert—O, how to be silent], (Aye, or) how to give voice?\n\n[(For) the comrade I ha’ (so) lovéd] Like to the dust [hath become]; O Enkidu, (he was) my comrade, He whom I loved hath become alike the dust]—[I,] shall I not, also, Lay me down [like him], throughout all eternity [never returning]?\" ________________________________ : \"He who enduréd all hardships with me, whom I lovéd dearly, Enkidu,—he who enduréd all hardships with me (is now perish’d), Gone to the common lot of mankind!\n\n(And) I have bewail’d him 5.\n\nDay and night long: (and) unto the tomb I have not consign’d him.\n\n(O but) my friend cometh not (?) to my call—six days, (yea), a se’nnight 10.\n\nHe like a worm hath lain on his face—(and) I for this reason Find no life, (but must needs) roam the desert like to a hunter, (Wherefore), O Wine-maker, now that (at last) I look on thy visage, Death which I dread I will see not!\" .\n\nThe Wine-maker Gilgamish answer’d: \"Gilgamish, why runnest thou, (inasmuch as) the life which thou seekest, Thou canst not find?\n\n(For) the gods, in their (first) creation of mortals, 5.\n\nDeath allotted to man, (but) life they retain’d in their keeping.\n\nGilgamish, full be thy belly, Each day and night be thou merry, (and) daily keep holiday revel, 10.\n\nEach day and night do thou dance and rejoice; (and) fresh be thy raiment, (Aye), let thy head be clean washen, (and) bathe thyself in the water, Cherish the little one holding thy hand; be thy spouse in thy bosom Happy—(for) this is the dower [of man] .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n15.\n\n[Gilgamish] (thus) continued his speech to the Wine-maker, (saying), \"[Pr’ythee, then], Wine-maker, which is the way unto Uta-Napishtim?\n\n[What (is)] its token, I pr’ythee, vouchsafe me, vouchsafe me its token.\n\nIf it be possible (even) the Ocean (itself) will I traverse, (But) if it should be impossible, (then) will I range o’er the desert.\" ________________________________ .\n\n20.\n\n(Thus) did the Wine-maker answer to him, unto Gilgamish (saying), \"There hath been never a crossing, O Gilgamish: never aforetime Anyone, coming thus far, hath been able to traverse the Ocean: Warrior Shamash doth cross it , ’tis true, but who besides Shamash Maketh the traverse?\n\n(Yea), rough is the ferry, (and) rougher its passage, 25.\n\n(Aye), too, ’tis deep are the Waters of Death, which bar its approaches ."

