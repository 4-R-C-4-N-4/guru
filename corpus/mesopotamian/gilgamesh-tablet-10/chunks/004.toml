[content]
body = "But if it should be impossible, [(then) will I range o’er the desert].\" ________________________________ (Thus) did Ur-Shanabi speak to him, (yea), unto Gilgamish, (saying): \"Gilgamish, ’tis thine own hand hath hinder’d [thy crossing the Ocean], Thou hast destroyéd the sails(?), (and) hast piercéd (?) the .\n\n.\n\n.\n\n(Now) destroy’d are the sails(?), and the urnu not .\n\n.\n\n.\n\n.\n\n.\n\n40.\n\nGilgamish, take thee thy axe in [thy] hand; O, descend to the forest, [Fashion thee] poles each of five gar in length; make (knops of) bitumen, Sockets, (too), add (to them) : bring [them me].\" (Thereat), when Gilgamish [heard this], Took he the axe in his hand, (and) [the glaive] drew forth [from his baldric], 45.\n\nWent to the forest, and poles each of five gar in length [did he fashion], (Knops of) bitumen he made, and he added (their) sockets: and brought them .\n\n.\n\n, Gilgamish (then), and Ur-Shanabi fared them forth [in their vessel], Launch’d they the boat on the billow, and they themselves [in her embarking].\n\nAfter the course of a month and a half he saw on the third day 50.\n\nHow that Ur-Shanabi (now) at the Waters of Death had arrivéd.\n\nColumn IV .\n\n(Thus) did Ur-Shanabi [answer] him, [(yea), unto Gilgamish, (saying)]: \"Gilgamish, take the .\n\n.\n\n.\n\n.\n\naway .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nLet not the Waters of Death touch thy hand .\n\n.\n\n.\n\n.\n\n.\n\n.\n\nGilgamish, take thou a second, a third, and a fourth pole (for thrusting), 5.\n\nGilgamish, take thou a fifth, (and) a sixth, and a seventh (for thrusting), Gilgamish, take thou an eighth, (and) a ninth, and a tenth pole (for thrusting), Gilgamish, take an eleventh, a twelfth pole!\" He ceased from (his) poling, (Aye) with twice-sixty (thrusts); (then) ungirded his loins .\n\n.\n\n.\n\n.\n\n10.\n\nGilgamish .\n\n.\n\n.\n\n.\n\n(?), and set up the mast in its socket.\n\n( He reaches Uta-Napishtim ).\n\nUta-Napishtim look’d into the distance and, inwardly musing, 15.\n\nSaid to himself: \"(Now), why are [the sails(?)] of the vessel destroyéd, Aye, and one who is not of my .\n\n.\n\n.\n\n(?) doth ride on the vessel?\n\n(This) is no mortal who cometh: nor .\n\n.\n\n.\n\n.\n\nI look, but (this) is no [mortal] .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n20.\n\nI look, but .\n\n.\n\n.\n\n.\n\n.\n\nI look but .\n\n.\n\n.\n\n.\n\n.\n\n( Remainder of Column lost, but about l.\n\n42 it becomes apparent that Uta-Napishtim is asking Gilgamish in exactly the same words as Siduri, the Wine-maker, and Ur-Shanabi \"Why is thy vigour ( all ) wasted?\" and so on, down to Column V, l.\n\n22 \" [ I ] , shall I not also lay me down like him, throughout all eternity never returning?\" ): 23.\n\nGilgamish (thus) continued his speech unto Uta-Napishtim, \"Then [I bethought me], I'll get hence and see what far Uta-Napishtim 25."

