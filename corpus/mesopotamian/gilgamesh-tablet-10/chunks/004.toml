[content]
body = "(Thus) did Ur-Shanabi [answer] him, [(yea), unto Gilgamish, (saying)]: \"Gilgamish, take the .\n\n.\n\n.\n\n.\n\naway .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nLet not the Waters of Death touch thy hand .\n\n.\n\n.\n\n.\n\n.\n\n.\n\nGilgamish, take thou a second, a third, and a fourth pole (for thrusting), 5.\n\nGilgamish, take thou a fifth, (and) a sixth, and a seventh (for thrusting), Gilgamish, take thou an eighth, (and) a ninth, and a tenth pole (for thrusting), Gilgamish, take an eleventh, a twelfth pole!\" He ceased from (his) poling, (Aye) with twice-sixty (thrusts); (then) ungirded his loins .\n\n.\n\n.\n\n.\n\n10.\n\nGilgamish .\n\n.\n\n.\n\n.\n\n(?), and set up the mast in its socket.\n\n.\n\nUta-Napishtim look’d into the distance and, inwardly musing, 15.\n\nSaid to himself: \"(Now), why are [the sails(?)] of the vessel destroyéd, Aye, and one who is not of my .\n\n.\n\n.\n\n(?) doth ride on the vessel?\n\n(This) is no mortal who cometh: nor .\n\n.\n\n.\n\n.\n\nI look, but (this) is no [mortal] .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n20.\n\nI look, but .\n\n.\n\n.\n\n.\n\n.\n\nI look but .\n\n.\n\n.\n\n.\n\n.\n\n: 23.\n\nGilgamish (thus) continued his speech unto Uta-Napishtim, \"Then [I bethought me], I'll get hence and see what far Uta-Napishtim 25.\n\nSaith (on the matter) .\n\n(And so), again (?) I came through all countries, Travell’d o’er difficult mountains, (aye), [and] all seas have I traversed, Nor hath (ever) my face had its fill of gentle sleep (?): (but) with hardship Have I exhausted myself, (and) my flesh have I laden with sorrow.\n\n30.\n\nEre I had come to the [House(?)] of the Wine-Maker, spent were my garments, .\n\n.\n\n.\n\nOwl, bat, lion, pard, wild cat, deer, ibex, and .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n[Flesh] of them (all) have I eaten, (and eke) their pelts have I dress’d (?) [me].\" : 26.\n\n\"Shall we for ever build house(s), for ever set signet (to contract), Brothers continue to share, or among [foes (?)] always be hatred?\n\n(Or) will for ever the stream (that hath risen) in spate bring a torrent, Kulilu -bird [to] Kirippu -bird .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n?\n\nFace which doth look on the sunlight .\n\n.\n\n.\n\npresently (?) shall not be .\n\n.\n\n.\n\nSleeping and dead [are]r alike, from Death they mark no distinction Servant and master, when once thy have reach’d [their full span allotted], Then do the Anunnaki, great gods, .\n\n.\n\n.\n\n.\n\n.\n\n.\n\nMammetum, Maker of Destiny with them, doth destiny settle, Death, (aye), and Life they determine; of Death is the day not revealéd.\""

