[content]
body = "Gwenllian Deg the majestic maiden.\n\nCreiddylad the daughter of Lludd Llaw Ereint.\n\n(She was the most splendid maiden in the three Islands of the mighty, and in the three Islands adjacent, and for her Gwythyr the son of Greidawl and Gwynn the son of Nudd fight every first of May until the day of doom.) Ellylw the daughter of Neol Kynn-Crog (she lived three ages).\n\nEssyllt Vinwen and Essyllt Vingul.” And all these did Kilhwch the son of Kilydd adjure to obtain his boon.\n\nThen said Arthur, “Oh!\n\nchieftain, I have never heard of the maiden of whom thou speakest, nor of her kindred, but I will gladly send messengers in search of her.\n\nGive me time to seek her.” And the youth said, “I will willingly grant from this night to that at the end of the year to do so.” Then Arthur sent messengers to every land within his dominions to seek for the maiden; and at the end of the year Arthur’s messengers returned without having gained any knowledge or intelligence concerning Olwen more than on the first day.\n\nThen said Kilhwch, “Every one has received his boon, and I yet lack mine.\n\nI will depart and bear away thy honour with me.” Then said Kai, “Rash chieftain!\n\ndost thou reproach Arthur?\n\nGo with us, and we will not part until thou dost either confess that the maiden exists not in the world, or until we obtain her.” Thereupon Kai rose up.\n\nKai had this peculiarity, that his breath lasted nine nights and nine days under water, and he could exist nine nights and nine days without sleep.\n\nA wound from Kai’s sword no physician could heal.\n\nVery subtle was Kai.\n\nWhen it pleased him he could render himself as tall as the highest tree in the forest.\n\nAnd he had another peculiarity,—so great was the heat of his nature, that, when it rained hardest, whatever he carried remained dry for a handbreadth above and a handbreadth below his hand; and when his companions were coldest, it was to them as fuel with which to light their fire.\n\nAnd Arthur called Bedwyr, who never shrank from any enterprise upon which Kai was bound.\n\nNone was equal to him in swiftness throughout this island except Arthur and Drych Ail Kibddar.\n\nAnd although he was one-handed, three warriors could not shed blood faster than he on the field of battle.\n\nAnother property he had; his lance would produce a wound equal to those of nine opposing lances.\n\nAnd Arthur called to Kynddelig the Guide, “Go thou upon this expedition with the chieftain.” For as good a guide was he in a land which he had never seen as he was in his own.\n\nHe called Gwrhyr Gwalstawt Ieithoedd, because he knew all tongues.\n\nHe called Gwalchmai the son of Gwyar, because he never returned home without achieving the adventure of which he went in quest.\n\nHe was the best of footmen and the best of knights.\n\nHe was nephew to Arthur, the son of his sister, and his cousin.\n\nAnd Arthur called Menw the son of Teirgwaedd, in order that if they went into a savage country, he might cast a charm and an illusion over them, so that none might see them whilst they could see every one.\n\nThey journeyed until they came to a vast open plain, wherein they saw a great castle, which was the fairest of the castles of the world.\n\nAnd they journeyed that day until the evening, and when they thought they were nigh to the castle, they were no nearer to it than they had been in the morning."

