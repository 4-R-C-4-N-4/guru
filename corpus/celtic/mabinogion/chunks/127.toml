[content]
body = "“Lord,” said they, “thy wisdom was never so great, and thou wast never so kind or so free in bestowing thy gifts, and thy justice was never more worthily seen than in this year.” “By Heaven,” said he, “for all the good you have enjoyed, you should thank him who hath been with you; for behold, thus hath this matter been.” And thereupon Pwyll related the whole unto them.\n\n“Verily, Lord,” said they, “render thanks unto Heaven that thou hast such a fellowship, and withhold not from us the rule which we have enjoyed for this year past.” “I take Heaven to witness that I will not withhold it,” answered Pwyll.\n\nAnd thenceforth they made strong the friendship that was between them, and each sent unto the other horses, and greyhounds, and hawks, and all such jewels as they thought would be pleasing to each other.\n\nAnd by reason of his having dwelt that year in Annwvyn, and having ruled there so prosperously, and united the two kingdoms in one day by his valour and prowess, he lost the name of Pwyll Prince of Dyved, and was called Pwyll Chief of Annwvyn from that time forward.\n\nOnce upon a time, Pwyll was at Narberth his chief palace, where a feast had been prepared for him, and with him was a great host of men.\n\nAnd after the first meal, Pwyll arose to walk, and he went to the top of a mound that was above the palace, and was called Gorsedd Arberth.\n\n“Lord,” said one of the Court, “it is peculiar to the mound that whosoever sits upon it cannot go thence, without either receiving wounds or blows, or else seeing a wonder.” “I fear not to receive wounds and blows in the midst of such a host as this, but as to the wonder, gladly would I see it.\n\nI will go therefore and sit upon the mound.” And upon the mound he sat.\n\nAnd while he sat there, they saw a lady, on a pure white horse of large size, with a garment of shining gold around her, coming along the highway that led from the mound; and the horse seemed to move at a slow and even pace, and to be coming up towards the mound.\n\n“My men,” said Pwyll, “is there any among you who knows yonder lady?” “There is not, Lord,” said they.\n\n“Go one of you and meet her, that we may know who she is.” And one of them arose, and as he came upon the road to meet her, she passed by, and he followed as fast as he could, being on foot; and the greater was his speed, the further was she from him.\n\nAnd when he saw that it profited him nothing to follow her, he returned to Pwyll, and said unto him, “Lord, it is idle for any one in the world to follow her on foot.” “Verily,” said Pwyll, “go unto the palace, and take the fleetest horse that thou seest, and go after her.” And he took a horse and went forward.\n\nAnd he came to an open level plain, and put spurs to his horse; and the more he urged his horse, the further was she from him.\n\nYet she held the same pace as at first.\n\nAnd his horse began to fail; and when his horse’s feet failed him, he returned to the place where Pwyll was.\n\n“Lord,” said he, “it will avail nothing for any one to follow yonder lady.\n\nI know of no horse in these realms swifter than this, and it availed me not to pursue her.” “Of a truth,” said Pwyll, “there must be some illusion here."

