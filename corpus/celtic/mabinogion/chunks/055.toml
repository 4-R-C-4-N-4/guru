[content]
body = "“Then will I go,” said she.\n\nAnd Gwalchmai said to Arthur, “Lord, if it seem well to thee, permit that into whose hunt soever the stag shall come, that one, be he a knight, or one on foot, may cut off his head, and give it to whom he pleases, whether to his own lady-love, or to the lady of his friend.” “I grant it gladly,” said Arthur, “and let the Steward of the Household be chastised, if all are not ready to-morrow for the chase.” And they passed the night with songs, and diversions, and discourse, and ample entertainment.\n\nAnd when it was time for them all to go to sleep, they went.\n\nAnd when the next day came, they arose; and Arthur called the attendants, who guarded his couch.\n\nAnd these were four pages, whose names were Cadyrnerth the son of Porthawr Gandwy, and Ambreu the son of Bedwor, and Amhar the son of Arthur, and Goreu the son of Custennin.\n\nAnd these men came to Arthur and saluted him, and arrayed him in his garments.\n\nAnd Arthur wondered that Gwenhwyvar did not awake, and did not move in her bed; and the attendants wished to awaken her.\n\n“Disturb her not,” said Arthur, “for she had rather sleep than go to see the hunting.” Then Arthur went forth, and he heard two horns sounding, one from near the lodging of the chief huntsman, and the other from near that of the chief page.\n\nAnd the whole assembly of the multitudes came to Arthur, and they took the road to the Forest.\n\nAnd after Arthur had gone forth from the palace, Gwenhwyvar awoke, and called to her maidens, and apparelled herself.\n\n“Maidens,” said she, “I had leave last night to go and see the hunt.\n\nGo one of you to the stable, and order hither a horse such as a woman may ride.” And one of them went, and she found but two horses in the stable, and Gwenhwyvar and one of her maidens mounted them, and went through the Usk, and followed the track of the men and the horses.\n\nAnd as they rode thus, they heard a loud and rushing sound; and they looked behind them, and beheld a knight upon a hunter foal of mighty size; and the rider was a fair-haired youth, bare-legged, and of princely mien, and a golden-hilted sword was at his side, and a robe and a surcoat of satin were upon him, and two low shoes of leather upon his feet; and around him was a scarf of blue purple, at each corner of which was a golden apple.\n\nAnd his horse stepped stately, and swift, and proud; and he overtook Gwenhwyvar, and saluted her.\n\n“Heaven prosper thee, Geraint,” said she, “I knew thee when first I saw thee just now.\n\nAnd the welcome of Heaven be unto thee.\n\nAnd why didst thou not go with thy lord to hunt?” “Because I knew not when he went,” said he.\n\n“I marvel, too,” said she, “how he could go unknown to me.” “Indeed, lady,” said he.\n\n“I was asleep, and knew not when he went; but thou, O young man, art the most agreeable companion I could have in the whole kingdom; and it may be, that I shall be more amused with the hunting than they; for we shall hear the horns when they sound, and we shall hear the dogs when they are let loose, and begin to cry.” So they went to the edge of the Forest, and there they stood."

