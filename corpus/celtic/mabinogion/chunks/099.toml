[content]
body = "It is needful for me to wash my head, and shave my beard, and I require the tusk of Yskithyrwyn Penbaedd to shave myself withal, neither shall I profit by its use if it be not plucked alive out of his head.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get.\n\nThere is no one in the world that can pluck it out of his head except Odgar the son of Aedd, king of Ireland.” “It will be easy for me to compass this.” “Though thou get this, there is yet that which thou wilt not get.\n\nI will not trust any one to keep the tusk except Gado of North Britain.\n\nNow the threescore Cantrevs of North Britain are under his sway, and of his own free will he will not come out of his kingdom, and thou wilt not be able to compel him.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get.\n\nI must spread out my hair in order to shave it, and it will never be spread out unless I have the blood of the jet-black sorceress, the daughter of the pure white sorceress, from Pen Nant Govid, on the confines of Hell.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get.\n\nI will not have the blood unless I have it warm, and no vessels will keep warm the liquid that is put therein except the bottles of Gwyddolwyd Gorr, which preserve the heat of the liquor that is put into them in the east, until they arrive at the west.\n\nAnd he will not give them of his own free will, and thou wilt not be able to compel him.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get.\n\nSome will desire fresh milk, and it will not be possible to have fresh milk for all, unless we have the bottles of Rhinnon Rhin Barnawd, wherein no liquor ever turns sour.\n\nAnd he will not give them of his own free will, and thou wilt not be able to compel him.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get.\n\nThroughout the world there is not a comb or scissors with which I can arrange my hair, on account of its rankness, except the comb and scissors that are between the two ears of Twrch Trwyth, the son of Prince Tared.\n\nHe will not give them of his own free will, and thou wilt not be able to compel him.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get.\n\nIt will not be possible to hunt Twrch Trwyth without Drudwyn the whelp of Greid, the son of Eri.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get."

