[content]
body = "“Oh, my lord,” said she, “what dost thou do here?” And she took hold of the bowl with him; and as she did so her hands became fast to the bowl, and her feet to the slab, and she was not able to utter a word.\n\nAnd with that, as it became night, lo, there came thunder upon them, and a fall of mist, and thereupon the castle vanished, and they with it.\n\nWhen Kicva the daughter of Gwynn Gloyw saw that there was no one in the palace but herself and Manawyddan, she sorrowed so that she cared not whether she lived or died.\n\nAnd Manawyddan saw this.\n\n“Thou art in the wrong,” said he, “if through fear of me thou grievest thus.\n\nI call Heaven to witness that thou hast never seen friendship mere pure than that which I will bear thee, as long as Heaven will that thou shouldst be thus.\n\nI declare to thee that were I in the dawn of youth I would keep my faith unto Pryderi, and unto thee also will I keep it.\n\nBe there no fear upon thee, therefore,” said he, “for Heaven is my witness that thou shalt meet with all the friendship thou canst wish, and that it is in my power to show thee, as long as it shall please Heaven to continue us in this grief and woe.” “Heaven reward thee,” she said, “and that is what I deemed of thee.” And the damsel thereupon took courage and was glad.\n\n“Truly, lady,” said Manawyddan, “it is not fitting for us to stay here, we have lost our dogs, and we cannot get food.\n\nLet us go into Lloegyr; it is easiest for us to find support there.” “Gladly, lord,” said she, “we will do so.” And they set forth together to Lloegyr.\n\n“Lord,” said she, “what craft wilt thou follow?\n\nTake up one that is seemly.” “None other will I take,” answered he, “save that of making shoes, as I did formerly.” “Lord,” said she, “such a craft becomes not a man so nobly born as thou.” “By that however will I abide,” said he.\n\nSo he began his craft, and he made all his work of the finest leather he could get in the town, and, as he had done at the other place, he caused gilded clasps to be made for the shoes.\n\nAnd except himself all the cordwainers in the town were idle, and without work.\n\nFor as long as they could be had from him, neither shoes nor hose were bought elsewhere.\n\nAnd thus they tarried there a year, until the cordwainers became envious, and took counsel concerning him.\n\nAnd he had warning thereof, and it was told him how the cordwainers had agreed together to slay him.\n\n“Lord,” said Kicva, “wherefore should this be borne from these boors?” “Nay,” said he, “we will go back unto Dyved.” So towards Dyved they set forth.\n\nNow Manawyddan, when he set out to return to Dyved, took with him a burden of wheat.\n\nAnd he proceeded towards Narberth, and there he dwelt.\n\nAnd never was he better pleased than when he saw Narberth again, and the lands where he had been wont to hunt with Pryderi and with Rhiannon.\n\nAnd he accustomed himself to fish, and to hunt the deer in their covert.\n\nAnd then he began to prepare some ground, and he sowed a croft, and a second, and a third.\n\nAnd no wheat in the world ever sprung up better.\n\nAnd the three crofts prospered with perfect growth, and no man ever saw fairer wheat than it."

