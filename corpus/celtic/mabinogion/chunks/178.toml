[content]
body = "And last of all, after wearying themselves with fierce and furious fighting, they will fall in the form of two pigs upon the covering, and they will sink in, and the covering with them, and they will draw it down to the very bottom of the cauldron.\n\nAnd they will drink up the whole of the mead; and after that they will sleep.\n\nThereupon do thou immediately fold the covering around them, and bury them in a kistvaen, in the strongest place thou hast in thy dominions, and hide them in the earth.\n\nAnd as long as they shall bide in that strong place no plague shall come to the Island of Britain from elsewhere.\n\n“The cause of the third plague,” said he, “is a mighty man of magic, who take thy meat and thy drink and thy store.\n\nAnd he through illusions and charms causes every one to sleep.\n\nTherefore it is needful for thee in thy own person to watch thy food and thy provisions.\n\nAnd lest he should overcome thee with sleep, be there a cauldron of cold water by thy side, and when thou art oppressed with sleep, plunge into the cauldron.” Then Lludd returned back unto his land.\n\nAnd immediately he summoned to him the whole of his own race and of the Coranians.\n\nAnd as Llevelys had taught him, he bruised the insects in water, the which he cast over them all together, and forthwith it destroyed the whole tribe of the Coranians, without hurt to any of the Britons.\n\nAnd some time after this, Lludd caused the Island to be measured in its length and in its breadth.\n\nAnd in Oxford he found the central point, and in that place he caused the earth to be dug, and in that pit a cauldron to be set, full of the best mead that could be made, and a covering of satin over the face of it.\n\nAnd he himself watched that night.\n\nAnd while he was there, he beheld the dragons fighting.\n\nAnd when they were weary they fell, and came down upon the top of the satin, and drew it with them to the bottom of the cauldron.\n\nAnd when they had drunk the mead they slept.\n\nAnd in their sleep, Lludd folded the covering around them, and in the securest place he had in Snowdon, he hid them in a kistvaen.\n\nNow after that this spot was called Dinas Emreis, but before that, Dinas Ffaraon.\n\nAnd thus the fierce outcry ceased in his dominions.\n\nAnd when this was ended, King Lludd caused an exceeding great banquet to be prepared.\n\nAnd when it was ready, he placed a vessel of cold water by his side, and he in his own proper person watched it.\n\nAnd as he abode thus clad with arms, about the third watch of the night, lo, he heard many surpassing fascinations and various songs.\n\nAnd drowsiness urged him to sleep.\n\nUpon this, lest he should be hindered from his purpose and be overcome by sleep, he went often into the water.\n\nAnd at last, behold, a man of vast size, clad in strong, heavy armour, came in, bearing a hamper.\n\nAnd, as he was wont, he put all the food and provisions of meat and drink into the hamper, and proceeded to go with it forth.\n\nAnd nothing was ever more wonderful to Lludd, than that the hamper should hold so much.\n\nAnd thereupon King Lludd went after him and spoke unto him thus.\n\n“Stop, stop,” said he, “though thou hast done many insults and much spoil erewhile, thou shalt not do so any more, unless thy skill in arms and thy prowess be greater than mine.” Then he instantly put down the hamper on the floor, and awaited him."

