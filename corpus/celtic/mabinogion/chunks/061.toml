[content]
body = "“Where is the Earl Ynywl,” said Geraint, “and his wife, and his daughter?” “They are in the chamber yonder,” said the Earl’s chamberlain, “arraying themselves in garments which the Earl has caused to be brought for them.” “Let not the damsel array herself,” said he, “except in her vest and her veil, until she come to the Court of Arthur, to be clad by Gwenhwyvar in such garments as she may choose.” So the maiden did not array herself.\n\nThen they all entered the hall, and they washed, and went, and sat down to meat.\n\nAnd thus were they seated.\n\nOn one side of Geraint sat the young Earl, and Earl Ynywl beyond him; and on the other side of Geraint were the maiden and her mother.\n\nAnd after these all sat according to their precedence in honour.\n\nAnd they ate.\n\nAnd they were served abundantly, and they received a profusion of divers kind of gifts.\n\nThen they conversed together.\n\nAnd the young Earl invited Geraint to visit him next day.\n\n“I will not, by Heaven,” said Geraint.\n\n“To the Court of Arthur will I go with this maiden to-morrow.\n\nAnd it is enough for me, as long as Earl Ynywl is in poverty and trouble; and I go chiefly to seek to add to his maintenance.” “Ah, chieftain,” said the young Earl, “it is not by my fault that Earl Ynywl is without his possessions.” “By my faith,” said Geraint, “he shall not remain without them, unless death quickly takes me hence.” “Oh, chieftain,” said he, “with regard to the disagreement between me and Ynywl, I will gladly abide by thy counsel, and agree to what thou mayest judge right between us.” “I but ask thee,” said Geraint, “to restore to him what is his, and what he should have received from the time he lost his possessions, even until this day.” “That I will do gladly, for thee,” answered he.\n\n“Then,” said Geraint, “whosoever is here who owes homage to Ynywl, let him come forward, and perform it on the spot.” And all the men did so.\n\nAnd by that treaty they abided.\n\nAnd his castle, and his town, and all his possessions were restored to Ynywl.\n\nAnd he received back all that he had lost, even to the smallest jewel.\n\nThen spoke Earl Ynywl to Geraint.\n\n“Chieftain,” said he, “behold the maiden for whom thou didst challenge at the tournament, I bestow her upon thee.” “She shall go with me,” said Geraint, “to the Court of Arthur; and Arthur and Gwenhwyvar they shall dispose of her as they will.” And the next day they proceeded to Arthur’s Court.\n\nSo far concerning Geraint.\n\nNow, this is how Arthur hunted the stag.\n\nThe men and the dogs were divided into hunting parties, and the dogs were let loose upon the stag.\n\nAnd the last dog that was let loose was the favourite dog of Arthur.\n\nCavall was his name.\n\nAnd he left all the other dogs behind him, and turned the stag.\n\nAnd at the second turn, the stag came towards the hunting party of Arthur.\n\nAnd Arthur set upon him.\n\nAnd before he could be slain by any other, Arthur cut off his head.\n\nThen they sounded the death horn for slaying, and they all gathered round.\n\nThen came Kadyrieith to Arthur, and spoke to him."

