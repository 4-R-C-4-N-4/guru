[content]
body = "And all the hosts came together, and they all became reconciled to each other.\n\nAnd the Earl invited Geraint and the Little King to stay with him that night.\n\nAnd the next morning they separated.\n\nAnd Geraint went towards his own dominions; and thenceforth he reigned prosperously, and his warlike fame and splendour lasted with renown and honour both to him and to Enid from that time forth."

