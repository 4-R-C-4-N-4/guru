[content]
body = "Of his own free will he will not give it, either for a price or as a gift, and thou wilt never be able to compel him.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get.\n\nDifficulties shalt thou meet with, and nights without sleep, in seeking this, and if thou obtain it not, neither shalt thou obtain my daughter.” “Horses shall I have, and chivalry; and my lord and kinsman Arthur will obtain for me all these things.\n\nAnd I shall gain thy daughter, and thou shalt lose thy life.” “Go forward.\n\nAnd thou shalt not be chargeable for food or raiment for my daughter while thou art seeking these things; and when thou hast compassed all these marvels, thou shalt have my daughter for thy wife.” All that day they journeyed until the evening, and then they beheld a vast castle, which was the largest in the world.\n\nAnd lo, a black man, huger than three of the men of this world, came out from the castle.\n\nAnd they spoke unto him, “Whence comest thou, O man?” “From the castle which you see yonder.” “Whose castle is that?” asked they.\n\n“Stupid are ye truly, O men.\n\nThere is no one in the world that does not know to whom this castle belongs.\n\nIt is the castle of Gwrnach the Giant.” “What treatment is there for guests and strangers that alight in that castle?” “Oh!\n\nChieftain, Heaven protect thee.\n\nNo guest ever returned thence alive, and no one may enter therein unless he brings with him his craft.” Then they proceeded towards the gate.\n\nSaid Gwrhyr Gwalstawt Ieithoedd, “Is there a porter?” “There is.\n\nAnd thou, if thy tongue be not mute in thy head, wherefore dost thou call?” “Open the gate.” “I will not open it.” “Wherefore wilt thou not?” “The knife is in the meat, and the drink is in the horn, and there is revelry in the hall of Gwrnach the Giant, and except for a craftsman who brings his craft, the gate will not be opened to-night.” “Verily, porter,” then said Kai, “my craft bring I with me.” “What is thy craft?” “The best burnisher of swords am I in the world.” “I will go and tell this unto Gwrnach the Giant, and I will bring thee an answer.” So the porter went in, and Gwrnach said to him, “Hast thou any news from the gate?” “I have.\n\nThere is a party at the door of the gate who desire to come in.” “Didst thou inquire of them if they possessed any art?” “I did inquire,” said he, “and one told me that he was well skilled in the burnishing of swords.” “We have need of him then.\n\nFor some time have I sought for some one to polish my sword, and could find no one.\n\nLet this man enter, since he brings with him his craft.” The porter thereupon returned and opened the gate.\n\nAnd Kai went in by himself, and he saluted Gwrnach the Giant.\n\nAnd a chair was placed for him opposite to Gwrnach.\n\nAnd Gwrnach said to him, “Oh man!\n\nis it true that is reported of thee, that thou knowest how to burnish swords?” “I know full well how to do so,” answered Kai.\n\nThen was the sword of Gwrnach brought to him.\n\nAnd Kai took a blue whetstone from under his arm, and asked him whether he would have it burnished white or blue."

