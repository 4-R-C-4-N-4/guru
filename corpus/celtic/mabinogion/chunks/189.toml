[content]
body = "And the king caused them to fetch Elphin in haste from his dungeon, and placed him before Taliesin.\n\nAnd it is said, that immediately he sang a verse, so that the chains opened from about his feet.\n\n“I adore the Supreme, Lord of all animation,— Him that supports the heavens, Ruler of every extreme, Him that made the water good for all, Him who has bestowed each gift, and blesses it;— May abundance of mead be given Maelgwn of Anglesey, who supplies us, From his foaming meadhorns, with the choicest pure liquor.\n\nSince bees collect, and do not enjoy, We have sparkling distilled mead, which is universally praised.\n\nThe multitude of creatures which the earth nourishes God made for man, with a view to enrich him;— Some are violent, some are mute, he enjoys them, Some are wild, some are tame; the Lord makes them;— Part of their produce becomes clothing; For food and beverage till doom will they continue.\n\nI entreat the Supreme, Sovereign of the region of peace, To liberate Elphin from banishment, The man who gave me wine, and ale, and mead, With large princely steeds, of beautiful appearance; May he yet give me; and at the end, May God of his good will grant me, in honour, A succession of numberless ages, in the retreat of tranquillity.\n\nElphin, knight of mead, late be thy dissolution!” And afterwards he sang the ode which is called “The Excellence of the Bards.” “What was the first man Made by the God of heaven; What the fairest flattering speech That was prepared by leuav; What meat, what drink, What roof his shelter; What the first impression Of his primary thinking; What became his clothing; Who carried on a disguise, Owing to the wilds of the country, In the beginning?\n\nWherefore should a stone be hard; Why should a thorn be sharp-pointed?\n\nWho is hard like a flint; Who is salt like brine; Who sweet like honey; Who rides on the gale; Why ridged should be the nose; Why should a wheel be round; Why should the tongue be gifted with speech Rather than another member?\n\nIf thy bards, Heinin, be competent, Let them reply to me, Taliesin.” And after that he sang the address which is called “The Reproof of the Bards.” “If thou art a bard completely imbued With genius not to be controlled, Be thou not untractable Within the court of thy king; Until thy rigmarole shall be known, Be thou silent, Heinin, As to the name of thy verse, And the name of thy vaunting; And as to the name of thy grandsire Prior to his being baptized.\n\nAnd the name of the sphere, And the name of the element, And the name of thy language, And the name of thy region.\n\nAvaunt, ye bards above, Avaunt, ye bards below!\n\nMy beloved is below, In the fetter of Arianrod It is certain you know not How to understand the song I utter, Nor clearly how to discriminate Between the truth and what is false; Puny bards, crows of the district, Why do you not take to flight?"

