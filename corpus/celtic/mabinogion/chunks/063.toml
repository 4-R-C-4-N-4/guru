[content]
body = "And there were none with him save three persons, of a mean and tattered condition.\n\nAnd these were an aged, hoary-headed man, and a woman advanced in years, and a fair young maiden, clad in worn-out garments.\n\nAnd it was for the avouchment of the love of that maiden that Geraint jousted for the Sparrow-Hawk at the tournament, for he said that that maiden was better entitled to the Sparrow-Hawk than this maiden who was with me.\n\nAnd thereupon we encountered each other, and he left me, Lady, as thou seest.” “Sir,” said she, “when thinkest thou that Geraint will be here?” “To-morrow, Lady, I think he will be here with the maiden.” Then Arthur came to him, and he saluted Arthur; and Arthur gazed a long time upon him, and was amazed to see him thus.\n\nAnd thinking that he knew him, he inquired of him, “Art thou Edeyrn the son of Nudd?” “I am, Lord,” said he, “and I have met with much trouble, and received wounds unsupportable.” Then he told Arthur all his adventure.\n\n“Well,” said Arthur, “from what I hear, it behoves Gwenhwyvar to be merciful towards thee.” “The mercy which thou desirest, Lord,” said she, “will I grant to him, since it is as insulting to thee that an insult should be offered to me as to thyself.” “Thus will it be best to do,” said Arthur; “let this man have medical care until it be known whether he may live.\n\nAnd if he live, he shall do such satisfaction as shall be judged best by the men of the Court; and take thou sureties to that effect.\n\nAnd if he die, too much will be the death of such a youth as Edeyrn for an insult to a maiden.” “This pleases me,” said Gwenhwyvar.\n\nAnd Arthur became surety for Edeyrn, and Caradawc the son of Llyr, Gwallawg the son of Llenawg, and Owain the son of Nudd, and Gwalchmai, and many others with them.\n\nAnd Arthur caused Morgan Tud to be called to him.\n\nHe was the chief physician.\n\n“Take with thee Edeyrn the son of Nudd, and cause a chamber to be prepared for him, and let him have the aid of medicine as thou wouldst do unto myself, if I were wounded, and let none into his chamber to molest him, but thyself and thy disciples, to administer to him remedies.” “I will do so gladly, Lord,” said Morgan Tud.\n\nThen said the steward of the household, “Whither is it right, Lord, to order the maiden?” “To Gwenhwyvar and her handmaidens,” said he.\n\nAnd the steward of the household so ordered her.\n\nThus far concerning them.\n\nThe next day came Geraint towards the Court; and there was a watch set on the ramparts by Gwenhwyvar, lest he should arrive unawares.\n\nAnd one of the watch came to the place where Gwenhwyvar was.\n\n“Lady,” said he, “methinks that I see Geraint, and the maiden with him.\n\nHe is on horseback, but he has his walking gear upon him, and the maiden appears to be in white, seeming to be clad in a garment of linen.” “Assemble all the women,” said Gwenhwyvar, “and come to meet Geraint, to welcome him, and wish him joy.” And Gwenhwyvar went to meet Geraint and the maiden.\n\nAnd when Geraint came to the place where Gwenhwyvar was, he saluted her.\n\n“Heaven prosper thee,” said she, “and welcome to thee."

