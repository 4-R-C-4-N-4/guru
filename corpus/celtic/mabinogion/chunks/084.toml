[content]
body = "OR THE TWRCH TRWYTH Kilydd the son of Prince Kelyddon desired a wife as a helpmate, and the wife that he chose was Goleuddydd, the daughter of Prince Anlawdd.\n\nAnd after their union, the people put up prayers that they might have an heir.\n\nAnd they had a son through the prayers of the people.\n\nFrom the time of her pregnancy Goleuddydd became wild, and wandered about, without habitation; but when her delivery was at hand, her reason came back to her.\n\nThen she went to a mountain where there was a swineherd, keeping a herd of swine.\n\nAnd through fear of the swine the queen was delivered.\n\nAnd the swineherd took the boy, and brought him to the palace; and he was christened, and they called him Kilhwch, because he had been found in a swine’s burrow.\n\nNevertheless the boy was of gentle lineage, and cousin unto Arthur; and they put him out to nurse.\n\nAfter this the boy’s mother, Goleuddydd, the daughter of Prince Anlawdd, fell sick.\n\nThen she called her husband unto her, and said to him, “Of this sickness I shall die, and thou wilt take another wife.\n\nNow wives are the gift of the Lord, but it would be wrong for thee to harm thy son.\n\nTherefore I charge thee that thou take not a wife until thou see a briar with two blossoms upon my grave.” And this he promised her.\n\nThen she besought him to dress her grave every year, that nothing might grow thereon.\n\nSo the queen died.\n\nNow the king sent an attendant every morning to see if anything were growing upon the grave.\n\nAnd at the end of the seventh year the master neglected that which he had promised to the queen.\n\nOne day the king went to hunt, and he rode to the place of burial to see the grave, and to know if it were time that he should take a wife; and the king saw the briar.\n\nAnd when he saw it, the king took counsel where he should find a wife.\n\nSaid one of his counsellors, “I know a wife that will suit thee well, and she is the wife of King Doged.” And they resolved to go to seek her; and they slew the king, and brought away his wife and one daughter that she had along with her.\n\nAnd they conquered the king’s lands.\n\nOn a certain day, as the lady walked abroad, she came to the house of an old crone that dwelt in the town, and that had no tooth in her head.\n\nAnd the queen said to her, “Old woman, tell me that which I shall ask thee, for the love of Heaven.\n\nWhere are the children of the man who has carried me away by violence?” Said the crone, “He has not children.” Said the queen, “Woe is me, that I should have come to one who is childless!” Then said the hag, “Thou needest not lament on account of that, for there is a prediction he shall have an heir by thee, and by none other.\n\nMoreover, be not sorrowful, for he has one son.” The lady returned home with joy; and she asked her consort, “Wherefore hast thou concealed thy children from me?” The king said, “I will do so no longer.” And he sent messengers for his son, and he was brought to the Court.\n\nHis stepmother said unto him, “It were well for thee to have a wife, and I have a daughter who is sought of every man of renown in the world.” “I am not yet of an age to wed,” answered the youth."

