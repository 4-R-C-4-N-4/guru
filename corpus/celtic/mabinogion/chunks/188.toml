[content]
body = "The names of the three springs From the midst of the ocean; One generated brine Which is from the Corina, To replenish the flood Over seas disappearing; The second, without injury It will fall on us, When there is rain abroad, Through the whelming sky; The third will appear Through the mountain veins, Like a flinty banquet, The work of the King of kings, You are blundering bards, In too much solicitude; You cannot celebrate The kingdom of the Britons; And I am Taliesin, Chief of the bards of the west, Who will loosen Elphin Out of the golden fetter.” * * * * * “Be silent, then, ye unlucky rhyming bards, For you cannot judge between truth and falsehood.\n\nIf you be primary bards formed by heaven, Tell your king what his fate will be.\n\nIt is I who am a diviner and a leading bard, And know every passage in the country of your king; I shall liberate Elphin from the belly of the stony tower; And will tell your king what will befall him.\n\nA most strange creature will come from the sea marsh of Rhianedd As a punishment of iniquity on Maelgwn Gwynedd; His hair, his teeth, and his eyes being as gold, And this will bring destruction upon Maelgwn Gwynedd.” * * * * * “Discover thou what is The strong creature from before the flood, Without flesh, without bone, Without vein, without blood, Without head, without feet, It will neither be older nor younger Than at the beginning; For fear of a denial, There are no rude wants With creatures.\n\nGreat God!\n\nhow the sea whitens When first it comes!\n\nGreat are its gusts When it comes from the south; Great are its evaporations When it strikes on coasts.\n\nIt is in the field, it is in the wood, Without hand, and without foot, Without signs of old age, Though it be co-æval With the five ages or periods And older still, Though they be numberless years.\n\nIt is also so wide As the surface of the earth; And it was not born, Nor was it seen.\n\nIt will cause consternation Wherever God willeth.\n\nOn sea, and on land, It neither sees, nor is seen.\n\nIts course is devious, And will not come when desired; On land and on sea, It is indispensable.\n\nIt is without an equal, It is four-sided; It is not confined, It is incomparable; It comes from four quarters; It will not be advised, It will not be without advice.\n\nIt commences its journey Above the marble rock, It is sonorous, it is dumb, It is mild, It is strong, it is bold, When it glances over the land, It is silent, it is vocal, It is clamorous, It is the most noisy On the face of the earth.\n\nIt is good, it is bad, It is extremely injurious.\n\nIt is concealed, Because sight cannot perceive it.\n\nIt is noxious, it is beneficial; It is yonder, it is here; It will discompose, But will not repair the injury; It will not suffer for its doings, Seeing it is blameless.\n\nIt is wet, it is dry, It frequently comes, Proceeding from the heat of the sun, And the coldness of the moon.\n\nThe moon is less beneficial, Inasmuch as her heat is less.\n\nOne Being has prepared it, Out of all creatures, By a tremendous blast, To wreak vengeance On Maelgwn Gwynedd.” And while he was thus singing his verse near the door, there arose a mighty storm of wind, so that the king and all his nobles thought that the castle would fall on their heads."

