[content]
body = "Under this tree is a fountain, and by the side of the fountain a marble slab, and on the marble slab a silver bowl, attached by a chain of silver, so that it may not be carried away.\n\nTake the bowl and throw a bowlful of water upon the slab, and thou wilt hear a mighty peal of thunder, so that thou wilt think that heaven and earth are trembling with its fury.\n\nWith the thunder there will come a shower so severe that it will be scarce possible for thee to endure it and live.\n\nAnd the shower will be of hailstones; and after the shower, the weather will become fair, but every leaf that was upon the tree will have been carried away by the shower.\n\nThen a flight of birds will come and alight upon the tree; and in thine own country thou didst never hear a strain so sweet as that which they will sing.\n\nAnd at the moment thou art most delighted with the song of the birds, thou wilt hear a murmuring and complaining coming towards thee along the valley.\n\nAnd thou wilt see a knight upon a coal-black horse, clothed in black velvet, and with a pennon of black linen upon his lance; and he will ride unto thee to encounter thee with the utmost speed.\n\nIf thou fleest from him he will overtake thee, and if thou abidest there, as sure as thou art a mounted knight, he will leave thee on foot.\n\nAnd if thou dost not find trouble in that adventure, thou needest not seek it during the rest of thy life.’ “So I journeyed on, until I reached the summit of the steep, and there I found everything as the black man had described it to me.\n\nAnd I went up to the tree, and beneath it I saw the fountain, and by its side the marble slab, and the silver bowl fastened by the chain.\n\nThen I took the bowl, and cast a bowlful of water upon the slab; and thereupon, behold, the thunder came, much more violent than the black man had led me to expect; and after the thunder came the shower; and of a truth I tell thee, Kai, that there is neither man nor beast that can endure that shower and live.\n\nFor not one of those hailstones would be stopped, either by the flesh or by the skin, until it had reached the bone.\n\nI turned my horse’s flank towards the shower, and placed the beak of my shield over his head and neck, while I held the upper part of it over my own head.\n\nAnd thus I withstood the shower.\n\nWhen I looked on the tree there was not a single leaf upon it, and then the sky became clear, and with that, behold the birds lighted upon the tree, and sang.\n\nAnd truly, Kai, I never heard any melody equal to that, either before or since.\n\nAnd when I was most charmed with listening to the birds, lo, a murmuring voice was heard through the valley, approaching me and saying, ‘Oh, Knight, what has brought thee hither?\n\nWhat evil have I done to thee, that thou shouldst act towards me and my possessions as thou hast this day?\n\nDost thou not know that the shower to-day has left in my dominions neither man nor beast alive that was exposed to it?’ And thereupon, behold, a Knight on a black horse appeared, clothed in jet-black velvet, and with a tabard of black linen about him.\n\nAnd we charged each other, and, as the onset was furious, it was not long before I was overthrown.\n\nThen the Knight passed the shaft of his lance through the bridle rein of my horse, and rode off with the two horses, leaving me where I was.\n\nAnd he did not even bestow so much notice upon me as to imprison me, nor did he despoil me of my arms."

