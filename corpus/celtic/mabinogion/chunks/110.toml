[content]
body = "And he slew Huandaw, and Gogigwr, and Penpingon, three attendants upon Glewlwyd Gavaelvawr, so that Heaven knows he had not an attendant remaining, excepting only Llaesgevyn, a man from whom no one ever derived any good.\n\nAnd together with these he slew many of the men of that country, and Gwlydyn Saer, Arthur’s chief Architect.\n\nThen Arthur overtook him at Pelumyawc, and there he slew Madawc the son of Teithyon, and Gwyn the son of Tringad, the son of Neved, and Eiryawn Penllorau.\n\nThence he went to Aberteivi, where he made another stand, and where he slew Kyflas the son of Kynan, and Gwilenhin king of France.\n\nThen he went as far as Glyn Ystu, and there the men and the dogs lost him.\n\nThen Arthur summoned unto him Gwyn ab Nudd, and he asked him if he knew aught of Twrch Trwyth.\n\nAnd he said that he did not.\n\nAnd all the huntsmen went to hunt the swine as far as Dyffryn Llychwr.\n\nAnd Grugyn Gwallt Ereint and Llwydawg Govynnyad closed with them and killed all the huntsmen, so that there escaped but one man only.\n\nAnd Arthur and his hosts came to the place where Grugyn and Llwydawg were.\n\nAnd there he let loose the whole of the dogs upon them, and with the shout and barking that was set up, Twrch Trwyth came to their assistance.\n\nAnd from the time that they came across the Irish sea, Arthur had never got sight of him until then.\n\nSo he set men and dogs upon him, and thereupon he started off and went to Mynydd Amanw.\n\nAnd there one of his young pigs was killed.\n\nThen they set upon him life for life, and Twrch Llawin was slain, and then there was slain another of the swine, Gwys was his name.\n\nAfter that he went on to Dyffryn Amanw, and there Banw and Bennwig were killed.\n\nOf all his pigs there went with him alive from that place none save Grugyn Gwallt Ereint and Llwydawg Govynnyad.\n\nThence he went on to Llwch Ewin, and Arthur overtook him there, and he made a stand.\n\nAnd there he slew Echel Forddwytwll, and Garwyli the son of Gwyddawg Gwyr, and many men and dogs likewise.\n\nAnd thence they went to Llwch Tawy.\n\nGrugyn Gwrych Ereint parted from them there, and went to Din Tywi.\n\nAnd thence he proceeded to Ceredigiawn, and Eli and Trachmyr with him, and a multitude likewise.\n\nThen he came to Garth Gregyn, and there Llwydawg Govynnyad fought in the midst of them, and slew Rhudvyw Rhys and many others with him.\n\nThen Llwydawg went thence to Ystrad Yw, and there the men of Armorica met him, and there he slew Hirpeissawg the king of Armorica, and Llygatrudd Emys, and Gwrbothu, Arthur’s uncles, his mother’s brothers, and there was he himself slain."

