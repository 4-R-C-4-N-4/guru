[content]
body = "And he desired Enid to mount her horse, and to ride forward, and to keep a long way before him.\n\n“And whatever thou mayest see, and whatever thou mayest hear concerning me,” said he, “do thou not turn back.\n\nAnd unless I speak unto thee, say not thou one word either.” And they set forward.\n\nAnd he did not choose the pleasantest and most frequented road, but that which was the wildest and most beset by thieves, and robbers, and venomous animals.\n\nAnd they came to a high road, which they followed till they saw a vast forest, and they went towards it, and they saw four armed horsemen come forth from the forest.\n\nWhen the horsemen had beheld them, one of them said to the others, “Behold, here is a good occasion for us to capture two horses and armour, and a lady likewise; for this we shall have no difficulty in doing against yonder single knight, who hangs his head so pensively and heavily.” And Enid heard this discourse, and she knew not what she should do through fear of Geraint, who had told her to be silent.\n\n“The vengeance of Heaven be upon me,” she said, “if I would not rather receive my death from his hand than from the hand of any other; and though he should slay me yet will I speak to him, lest I should have the misery to witness his death.” So she waited for Geraint until he came near to her.\n\n“Lord,” said she, “didst thou hear the words of those men concerning thee?” Then he lifted up his eyes, and looked at her angrily.\n\n“Thou hadst only,” said he, “to hold thy peace as I bade thee.\n\nI wish but for silence, and not for warning.\n\nAnd though thou shouldest desire to see my defeat and my death by the hands of those men, yet do I feel no dread.” Then the foremost of them couched his lance, and rushed upon Geraint.\n\nAnd he received him, and that not feebly.\n\nBut he let the thrust go by him, while he struck the horseman upon the centre of his shield in such a manner that his shield was split, and his armour broken, and so that a cubit’s length of the shaft of Geraint’s lance passed through his body, and sent him to the earth, the length of the lance over his horse’s crupper.\n\nThen the second horseman attacked him furiously, being wroth at the death of his companion.\n\nBut with one thrust Geraint overthrew him also, and killed him as he had done the other.\n\nThen the third set upon him, and he killed him in like manner.\n\nAnd thus also he slew the fourth.\n\nSad and sorrowful was the maiden as she saw all this.\n\nGeraint dismounted from his horse, and took the arms of the men he had slain, and placed them upon their saddles, and tied together the reins of their horses, and he mounted his horse again.\n\n“Behold what thou must do,” said he; “take the four horses, and drive them before thee, and proceed forward, as I bade thee just now.\n\nAnd say not one word unto me, unless I speak first unto thee.\n\nAnd I declare unto Heaven,” said he, “if thou doest not thus, it will be to thy cost.” “I will do, as far as I can, Lord,” said she, “according to thy desire.” Then they went forward through the forest; and when they left the forest, they came to a vast plain, in the centre of which was a group of thickly tangled copse-wood; and from out thereof they beheld three horsemen coming towards them, well equipped with armour, both they and their horses."

