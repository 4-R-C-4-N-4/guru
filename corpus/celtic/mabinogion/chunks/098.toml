[content]
body = "And these are Nynniaw and Peibaw whom God turned into oxen on account of their sins.” “It will be easy for me to compass this.” “Though thou get this, there is yet that which thou wilt not get.\n\nSeest thou yonder red tilled ground?” “I see it.” “When first I met the mother of this maiden, nine bushels of flax were sown therein, and none has yet sprung up, neither white nor black; and I have the measure by me still.\n\nI require to have the flax to sow in the new land yonder, that when it grows up it may make a white wimple for my daughter’s head, on the day of thy wedding.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get.\n\nHoney that is nine times sweeter than the honey of the virgin swarm, without scum and bees, do I require to make bragget for the feast.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “The vessel of Llwyr the son of Llwyryon, which is of the utmost value.\n\nThere is no other vessel in the world that can hold this drink.\n\nOf his free will thou wilt not get it, and thou canst not compel him.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get.\n\nThe basket of Gwyddneu Garanhir, if the whole world should come together, thrice nine men at a time, the meat that each of them desired would be found within it.\n\nI require to eat therefrom on the night that my daughter becomes thy bride.\n\nHe will give it to no one of his own free will, and thou canst not compel him.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get.\n\nThe horn of Gwlgawd Gododin to serve us with liquor that night.\n\nHe will not give it of his own free will, and thou wilt not be able to compel him.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get.\n\nThe harp of Teirtu to play to us that night.\n\nWhen a man desires that it should play, it does so of itself, and when he desires that it should cease, it ceases.\n\nAnd this he will not give of his own free will, and thou wilt not be able to compel him.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get.\n\nThe cauldron of Diwrnach Wyddel, the steward of Odgar the son of Aedd, king of Ireland, to boil the meat for thy marriage feast.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get."

