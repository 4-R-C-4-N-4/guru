[content]
body = "And if, when the appointed time shall come to-morrow, thou wilt permit me, Sir, to challenge for yonder maiden that is thy daughter, I will engage, if I escape from the tournament, to love the maiden as long as I live; and if I do not escape, she will remain unsullied as before.” “Gladly will I permit thee,” said the hoary-headed man, “and since thou dost thus resolve, it is necessary that thy horse and arms should be ready to-morrow at break of day.\n\nFor then the Knight of the Sparrow-Hawk will make proclamation, and ask the lady he loves best to take the Sparrow-Hawk.\n\n‘For,’ will he say to her, ‘thou art the fairest of women, and thou didst possess it last year, and the year previous; and if any deny it thee to-day, by force will I defend it for thee.’ And therefore,” said the hoary-headed man, “it is needful for thee to be there at daybreak; and we three will be with thee.” And thus was it settled.\n\nAnd at night, lo!\n\nthey went to sleep; and before the dawn they arose, and arrayed themselves; and by the time that it was day, they were all four in the meadow.\n\nAnd there was the Knight of the Sparrow-Hawk making the proclamation, and asking his lady-love to fetch the Sparrow-Hawk.\n\n“Fetch it not,” said Geraint, “for there is here a maiden, who is fairer, and more noble, and more comely, and who has a better claim to it than thou.” “If thou maintainest the Sparrow-Hawk to be due to her, come forward, and do battle with me.” And Geraint went forward to the top of the meadow, having upon himself and upon his horse armour which was heavy, and rusty, and worthless, and of uncouth shape.\n\nThen they encountered each other, and they broke a set of lances, and they broke a second set, and a third.\n\nAnd thus they did at every onset, and they broke as many lances as were brought to them.\n\nAnd when the Earl and his company saw the Knight of the Sparrow-Hawk gaining the mastery, there was shouting, and joy, and mirth amongst them.\n\nAnd the hoary-headed man, and his wife, and his daughter were sorrowful.\n\nAnd the hoary-headed man served Geraint lances as often as he broke them, and the dwarf served the Knight of the Sparrow-Hawk.\n\nThen the hoary-headed man came to Geraint.\n\n“Oh!\n\nchieftain,” said he, “since no other will hold with thee, behold, here is the lance which was in my hand on the day when I received the honour of knighthood; and from that time to this I never broke it.\n\nAnd it has an excellent point.” Then Geraint took the lance, thanking the hoary-headed man.\n\nAnd thereupon the dwarf also brought a lance to his lord.\n\n“Behold, here is a lance for thee, not less good than his,” said the dwarf.\n\n“And bethink thee, that no knight ever withstood thee before so long as this one has done.” “I declare to Heaven,” said Geraint, “that unless death takes me quickly hence, he shall fare never the better for thy service.” And Geraint pricked his horse towards him from afar, and warning him, he rushed upon him, and gave him a blow so severe, and furious, and fierce, upon the face of his shield, that he cleft it in two, and broke his armour, and burst his girths, so that both he and his saddle were borne to the ground over the horse’s crupper.\n\nAnd Geraint dismounted quickly."

