[content]
body = "“Verily,” said Blodeuwedd, “the Chieftain will speak ill of us if we let him at this hour depart to another land without inviting him in.” “Yes, truly, lady,” said they, “it will be most fitting to invite him.” Then went messengers to meet him and bid him in.\n\nAnd he accepted her bidding gladly, and came to the Court, and Blodeuwedd went to meet him, and greeted him, and bade him welcome.\n\n“Lady,” said he, “Heaven repay thee thy kindness.” When they had disaccoutred themselves, they went to sit down.\n\nAnd Blodeuwedd looked upon him, and from the moment that she looked on him she became filled with his love.\n\nAnd he gazed on her, and the same thought came unto him as unto her, so that he could not conceal from her that he loved her, but he declared unto her that he did so.\n\nThereupon she was very joyful.\n\nAnd all their discourse that night was concerning the affection and love which they felt one for the other, and which in no longer space than one evening had arisen.\n\nAnd that evening passed they in each other’s company.\n\nThe next day he sought to depart.\n\nBut she said, “I pray thee go not from me to-day.” And that night he tarried also.\n\nAnd that night they consulted by what means they might always be together.\n\n“There is none other counsel,” said he, “but that thou strive to learn from Llew Llaw Gyffes in what manner he will meet his death.\n\nAnd this must thou do under the semblance of solicitude concerning him.” The next day Gronw sought to depart.\n\n“Verily,” said she, “I will counsel thee not to go from me to-day.” “At thy instance will I not go,” said he, “albeit, I must say, there is danger that the chief who owns the palace may return home.” “To-morrow,” answered she, “will I indeed permit thee to go forth.” The next day he sought to go, and she hindered him not.\n\n“Be mindful,” said Gronw, “of what I have said unto thee, and converse with him fully, and that under the guise of the dalliance of love, and find out by what means he may come to his death.” That night Llew Llaw Gyffes returned to his home.\n\nAnd the day they spent in discourse, and minstrelsy, and feasting.\n\nAnd at night they went to rest, and he spoke to Blodeuwedd once, and he spoke to her a second time.\n\nBut, for all this, he could not get from her one word.\n\n“What aileth thee?” said he, “art thou well?” “I was thinking,” said she, “of that which thou didst never think of concerning me; for I was sorrowful as to thy death, lest thou shouldst go sooner than I.” “Heaven reward thy care for me,” said he, “but until Heaven take me I shall not easily be slain.” “For the sake of Heaven, and for mine, show me how thou mightest be slain.\n\nMy memory in guarding is better than thine.” “I will tell thee gladly,” said he.\n\n“Not easily can I be slain, except by a wound.\n\nAnd the spear wherewith I am struck must be a year in the forming.\n\nAnd nothing must be done towards it except during the sacrifice on Sundays.” “Is this certain?” asked she.\n\n“It is in truth,” he answered.\n\n“And I cannot be slain within a house, nor without.\n\nI cannot be slain on horseback nor on foot.” “Verily,” said she, “in what manner then canst thou be slain?” “I will tell thee,” said he."

