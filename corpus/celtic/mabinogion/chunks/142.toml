[content]
body = "And thus was the banquet carried on with joyousness; and when it was finished, Matholwch journeyed towards Ireland, and Branwen with him, and they went from Aber Menei with thirteen ships, and came to Ireland.\n\nAnd in Ireland was there great joy because of their coming.\n\nAnd not one great man or noble lady visited Branwen unto whom she gave not either a clasp, or a ring, or a royal jewel to keep, such as it was honourable to be seen departing with.\n\nAnd in these things she spent that year in much renown, and she passed her time pleasantly, enjoying honour and friendship.\n\nAnd in the meanwhile it chanced that she became pregnant, and in due time a son was born unto her, and the name that they gave him was Gwern the son of Matholwch, and they put the boy out to be foster-nursed, in a place where were the best men of Ireland.\n\nAnd behold in the second year a tumult arose in Ireland, on account of the insult which Matholwch had received in Cambria, and the payment made him for his horses.\n\nAnd his foster-brothers, and such as were nearest unto him, blamed him openly for that matter.\n\nAnd he might have no peace by reason of the tumult until they should revenge upon him this disgrace.\n\nAnd the vengeance which they took was to drive away Branwen from the same chamber with him, and to make her cook for the Court; and they caused the butcher after he had cut up the meat to come to her and give her every day a blow on the ear, and such they made her punishment.\n\n“Verily, lord,” said his men to Matholwch, “forbid now the ships and the ferry boats and the coracles, that they go not into Cambria, and such as come over from Cambria hither, imprison them that they go not back for this thing to be known there.” And he did so; and it was thus for not less than three years.\n\nAnd Branwen reared a starling in the cover of the kneading trough, and she taught it to speak, and she taught the bird what manner of man her brother was.\n\nAnd she wrote a letter of her woes, and the despite with which she was treated, and she bound the letter to the root of the bird’s wing, and sent it towards Britain.\n\nAnd the bird came to this island, and one day it found Bendigeid Vran at Caer Seiont in Arvon, conferring there, and it alighted upon his shoulder and ruffled its feathers, so that the letter was seen, and they knew that the bird had been reared in a domestic manner.\n\nThen Bendigeid Vran took the letter and looked upon it.\n\nAnd when he had read the letter he grieved exceedingly at the tidings of Branwen’s woes.\n\nAnd immediately he began sending messengers to summon the island together.\n\nAnd he caused sevenscore and four countries to come unto him, and he complained to them himself of the grief that his sister endured.\n\nSo they took counsel.\n\nAnd in the council they resolved to go to Ireland, and to leave seven men as princes here, and Caradawc, the son of Bran, as the chief of them, and their seven knights.\n\nIn Edeyrnion were these men left.\n\nAnd for this reason were the seven knights placed in the town."

