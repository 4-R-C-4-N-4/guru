[content]
body = "And when they looked at the couch, it seemed to be made but of a little coarse straw full of dust and vermin, with the stems of boughs sticking up there-through, for the cattle had eaten all the straw that was placed at the head and the foot.\n\nAnd upon it was stretched an old russet-coloured rug, threadbare and ragged; and a coarse sheet, full of slits, was upon the rug, and an ill-stuffed pillow, and a worn-out cover upon the sheet.\n\nAnd after much suffering from the vermin, and from the discomfort of their couch, a heavy sleep fell on Rhonabwy’s companions.\n\nBut Rhonabwy, not being able either to sleep or to rest, thought he should suffer less if he went to lie upon the yellow calf-skin that was stretched out on the floor.\n\nAnd there he slept.\n\nAs soon as sleep had come upon his eyes, it seemed to him that he was journeying with his companions across the plain of Argyngroeg, and he thought that he went towards Rhyd y Groes on the Severn.\n\nAs he journeyed, he heard a mighty noise, the like whereof heard he never before; and looking behind him, he beheld a youth with yellow curling hair, and with his beard newly trimmed, mounted on a chestnut horse, whereof the legs were grey from the top of the forelegs, and from the bend of the hindlegs downwards.\n\nAnd the rider wore a coat of yellow satin sewn with green silk, and on his thigh was a gold-hilted sword, with a scabbard of new leather of Cordova, belted with the skin of the deer, and clasped with gold.\n\nAnd over this was a scarf of yellow satin wrought with green silk, the borders whereof were likewise green.\n\nAnd the green of the caparison of the horse, and of his rider, was as green as the leaves of the fir-tree, and the yellow was as yellow as the blossom of the broom.\n\nSo fierce was the aspect of the knight, that fear seized upon them, and they began to flee.\n\nAnd the knight pursued them.\n\nAnd when the horse breathed forth, the men became distant from him, and when he drew in his breath, they were drawn near to him, even to the horse’s chest.\n\nAnd when he had overtaken them, they besought his mercy.\n\n“You have it gladly,” said he, “fear nought.” “Ha, chieftain, since thou hast mercy upon me, tell me also who thou art,” said Rhonabwy.\n\n“I will not conceal my lineage from thee, I am Iddawc the son of Mynyo, yet not by my name, but by my nickname am I best known.” “And wilt thou tell us what thy nickname is?” “I will tell you; it is Iddawc Cordd Prydain.” “Ha, chieftain,” said Rhonabwy, “why art thou called thus?” “I will tell thee.\n\nI was one of the messengers between Arthur and Medrawd his nephew, at the battle of Camlan; and I was then a reckless youth, and through my desire for battle, I kindled strife between them, and stirred up wrath, when I was sent by Arthur the Emperor to reason with Medrawd, and to show him, that he was his foster-father and his uncle, and to seek for peace, lest the sons of the Kings of the Island of Britain, and of the nobles, should be slain.\n\nAnd whereas Arthur charged me with the fairest sayings he could think of, I uttered unto Medrawd the harshest I could devise.\n\nAnd therefore am I called Iddawc Cordd Prydain, for from this did the battle of Camlan ensue."

