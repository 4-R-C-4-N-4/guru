[content]
body = "And the maiden went before her father, and asked him wherefore he had caused the youth from Arthur’s Court to be imprisoned.\n\n“In truth,” he answered, “he shall not be free to-night, nor to-morrow, nor the day following, and he shall not come from where he is.” She replied not to what the King had said, but she went to the youth.\n\n“Is it unpleasant to thee to be here?” said she.\n\n“I should not care if I were not,” he replied.\n\n“Thy couch and thy treatment shall be in no wise inferior to that of the King himself, and thou shalt have the best entertainment that the palace affords.\n\nAnd if it were more pleasing to thee that my couch should be here, that I might discourse with thee, it should be so, cheerfully.” “This can I not refuse,” said Peredur.\n\nAnd he remained in prison that night.\n\nAnd the maiden provided all that she had promised him.\n\nAnd the next day Peredur heard a tumult in the town.\n\n“Tell me, fair maiden, what is that tumult?” said Peredur.\n\n“All the King’s hosts and his forces have come to the town to-day.” “And what seek they here?” he inquired.\n\n“There is an Earl near this place who possesses two Earldoms, and is as powerful as a King; and an engagement will take place between them to-day.” “I beseech thee,” said Peredur, “to cause a horse and arms to be brought, that I may view the encounter, and I promise to come back to my prison again.” “Gladly,” said she, “will I provide thee with horse and arms.” So she gave him a horse and arms, and a bright scarlet robe of honour over his armour, and a yellow shield upon his shoulder.\n\nAnd he went to the combat; and as many of the Earl’s men as encountered him that day he overthrew; and he returned to his prison.\n\nAnd the maiden asked tidings of Peredur, and he answered her not a word.\n\nAnd she went and asked tidings of her father, and inquired who had acquitted himself best of the household.\n\nAnd he said that he knew not, but that it was a man with a scarlet robe of honour over his armour, and a yellow shield upon his shoulder.\n\nThen she smiled, and returned to where Peredur was, and did him great honour that night.\n\nAnd for three days did Peredur slay the Earl’s men; and before any one could know who he was, he returned to his prison.\n\nAnd the fourth day Peredur slew the Earl himself.\n\nAnd the maiden went unto her father, and inquired of him the news.\n\n“I have good news for thee,” said the King; “the Earl is slain, and I am the owner of his two Earldoms.” “Knowest thou, lord, who slew him?” “I do not know,” said the King.\n\n“It was the knight with the scarlet robe of honour and the yellow shield.” “Lord,” said she, “I know who that is.” “By Heaven!” he exclaimed, “who is he?” “Lord,” she replied, “he is the knight whom thou hast imprisoned.” Then he went unto Peredur, and saluted him, and told him that he would reward the service he had done him, in any way he might desire.\n\nAnd when they went to meat, Peredur was placed beside the King, and the maiden on the other side of Peredur."

