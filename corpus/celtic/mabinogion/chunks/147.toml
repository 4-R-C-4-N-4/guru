[content]
body = "And there they remained fourscore years, unconscious of having ever spent a time more joyous and mirthful.\n\nAnd they were not more weary than when first they came, neither did they, any of them, know the time they had been there.\n\nAnd it was not more irksome to them having the head with them, than if Bendigeid Vran had been with them himself.\n\nAnd because of these fourscore years, it was called “the Entertaining of the noble Head.” The entertaining of Branwen and Matholwch was in the time that they went to Ireland.\n\nOne day said Heilyn the son of Gwynn, “Evil betide me, if I do not open the door to know if that is true which is said concerning it.” So he opened the door and looked towards Cornwall and Aber Henvelen.\n\nAnd when they had looked, they were as conscious of all the evils they had ever sustained, and of all the friends and companions they had lost, and of all the misery that had befallen them, as if all had happened in that very spot; and especially of the fate of their lord.\n\nAnd because of their perturbation they could not rest, but journeyed forth with the head towards London.\n\nAnd they buried the head in the White Mount, and when it was buried, this was the third goodly concealment; and it was the third ill-fated disclosure when it was disinterred, inasmuch as no invasion from across the sea came to this island while the head was in that concealment.\n\nAnd thus is the story related of those who journeyed over from Ireland.\n\nIn Ireland none were left alive, except five pregnant women in a cave in the Irish wilderness; and to these five women in the same night were born five sons, whom they nursed until they became grown-up youths.\n\nAnd they thought about wives, and they at the same time desired to possess them, and each took a wife of the mothers of their companions, and they governed the country and peopled it.\n\nAnd these five divided it amongst them, and because of this partition are the five divisions of Ireland still so termed.\n\nAnd they examined the land where the battles had taken place, and they found gold and silver until they became wealthy.\n\nAnd thus ends this portion of the Mabinogi, concerning the blow given to Branwen, which was the third unhappy blow of this island; and concerning the entertainment of Bran, when the hosts of sevenscore countries and ten went over to Ireland to revenge the blow given to Branwen; and concerning the seven years’ banquet in Harlech, and the singing of the birds of Rhiannon, and the sojourning of the head for the space of fourscore years."

