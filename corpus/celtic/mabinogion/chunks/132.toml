[content]
body = "“And gladly will I accept it,” said Pwyll, “since it is the counsel of Heveydd and Rhiannon.” “Such then is our counsel,” answered they.\n\n“I accept it,” said Pwyll.\n\n“Seek thyself sureties.” “We will be for him,” said Heveydd, “until his men be free to answer for him.” And upon this he was let out of the bag, and his liegemen were liberated.\n\n“Demand now of Gwawl his sureties,” said Heveydd, “we know which should be taken for him.” And Heveydd numbered the sureties.\n\nSaid Gwawl, “Do thou thyself draw up the covenant.” “It will suffice me that it be as Rhiannon said,” answered Pwyll.\n\nSo unto that covenant were the sureties pledged.\n\n“Verily, Lord,” said Gwawl, “I am greatly hurt, and I have many bruises.\n\nI have need to be anointed; with thy leave I will go forth.\n\nI will leave nobles in my stead, to answer for me in all that thou shalt require.” “Willingly,” said Pwyll, “mayest thou do thus.” So Gwawl went towards his own possessions.\n\nAnd the hall was set in order for Pwyll and the men of his host, and for them also of the palace, and they went to the tables and sat down.\n\nAnd as they had sat that time twelvemonth, so sat they that night.\n\nAnd they ate, and feasted, and spent the night in mirth and tranquillity.\n\nAnd the time came that they should sleep, and Pwyll and Rhiannon went to their chamber.\n\nAnd next morning at the break of day, “My Lord,” said Rhiannon, “arise and begin to give thy gifts unto the minstrels.\n\nRefuse no one to-day that may claim thy bounty.” “Thus shall it be gladly,” said Pwyll, “both to-day and every day while the feast shall last.” So Pwyll arose, and he caused silence to be proclaimed, and desired all the suitors and the minstrels to show and to point out what gifts were to their wish and desire.\n\nAnd this being done, the feast went on, and he denied no one while it lasted.\n\nAnd when the feast was ended, Pwyll said unto Heveydd, “My Lord, with thy permission I will set out for Dyved to-morrow.” “Certainly,” said Heveydd, “may Heaven prosper thee.\n\nFix also a time when Rhiannon may follow thee.” “By Heaven,” said Pwyll, “we will go hence together.” “Willest thou this, Lord?” said Heveydd.\n\n“Yes, by Heaven,” answered Pwyll.\n\nAnd the next day, they set forward towards Dyved, and journeyed to the palace of Narberth, where a feast was made ready for them.\n\nAnd there came to them great numbers of the chief men and the most noble ladies of the land, and of these there was none to whom Rhiannon did not give some rich gift, either a bracelet, or a ring, or a precious stone.\n\nAnd they ruled the land prosperously both that year and the next.\n\nAnd in the third year the nobles of the land began to be sorrowful at seeing a man whom they loved so much, and who was moreover their lord and their foster-brother, without an heir.\n\nAnd they came to him.\n\nAnd the place where they met was Preseleu, in Dyved.\n\n“Lord,” said they, “we know that thou art not so young as some of the men of this country, and we fear that thou mayest not have an heir of the wife whom thou hast taken."

