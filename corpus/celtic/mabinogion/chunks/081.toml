[content]
body = "Then the Little King said to Geraint, “Now will we go towards my own Court, to take rest, and amuse ourselves.” “Not so,” said Geraint, “we will first journey for one day more, and return again.” “With all my heart,” said the Little King, “do thou go then.” And early in the day they set forth.\n\nAnd more gladly and more joyfully did Enid journey with them that day than she had ever done.\n\nAnd they came to the main road.\n\nAnd when they reached a place where the road divided in two, they beheld a man on foot coming towards them along one of these roads, and Gwiffert asked the man whence he came.\n\n“I come,” said he, “from an errand in the country.” “Tell me,” said Geraint, “which is the best for me to follow of these two roads?” “That is the best for thee to follow,” answered he, “for if thou goest by this one, thou wilt never return.\n\nBelow us,” said he, “there is a hedge of mist, and within it are enchanted games, and no one who has gone there has ever returned.\n\nAnd the Court of the Earl Owain is there, and he permits no one to go to lodge in the town, except he will go to his Court.” “I declare to Heaven,” said Geraint, “that we will take the lower road.” And they went along it until they came to the town.\n\nAnd they took the fairest and pleasantest place in the town for their lodging.\n\nAnd while they were thus, behold, a young man came to them, and greeted them.\n\n“Heaven be propitious to thee,” said they.\n\n“Good Sirs,” said he, “what preparations are you making here?” “We are taking up our lodging,” said they, “to pass the night.” “It is not the custom with him who owns the town,” he answered, “to permit any of gentle birth, unless they come to stay in his Court, to abide here; therefore, come ye to the Court.” “We will come, gladly,” said Geraint.\n\nAnd they went with the page, and they were joyfully received.\n\nAnd the Earl came to the hall to meet them, and he commanded the tables to be laid.\n\nAnd they washed, and sat down.\n\nAnd this is the order in which they sat: Geraint on one side of the Earl, and Enid on the other side, and next to Enid the Little King, and then the Countess next to Geraint; and all after that as became their rank.\n\nThen Geraint recollected the games, and thought that he should not go to them; and on that account he did not eat.\n\nThen the Earl looked upon Geraint, and considered, and he bethought him that his not eating was because of the games, and it grieved him that he had ever established those games, were it only on account of losing such a youth as Geraint.\n\nAnd if Geraint had asked him to abolish the games, he would gladly have done so.\n\nThen the Earl said to Geraint, “What thought occupies thy mind, that thou dost not eat?\n\nIf thou hesitatest about going to the games, thou shalt not go, and no other of thy rank shall ever go either.” “Heaven reward thee,” said Geraint, “but I wish nothing better than to go to the games, and to be shown the way thither.” “If that is what thou dost prefer, thou shalt obtain it willingly.” “I do prefer it, indeed,” said he.\n\nThen they ate, and they were amply served, and they had a variety of gifts, and abundance of liquor.\n\nAnd when they had finished eating they arose."

