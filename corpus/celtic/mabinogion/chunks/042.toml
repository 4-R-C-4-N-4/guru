[content]
body = "Thou seest the many lovely maidens that there are in this Court; thou shalt have her whom thou best likest for the lady of thy love.” “Lady, I came not hither from my country to woo; but match yourselves as it liketh you with the comely youths I see here; and none of your goods do I desire, for I need them not.” Then Peredur rode forward, and he came to the Palace of the Sons of the King of the Tortures; and when he entered the Palace, he saw none but women; and they rose up, and were joyful at his coming; and as they began to discourse with him, he beheld a charger arrive, with a saddle upon it, and a corpse in the saddle.\n\nAnd one of the women arose, and took the corpse from the saddle, and anointed it in a vessel of warm water, which was below the door, and placed precious balsam upon it; and the man rose up alive, and came to the place where Peredur was, and greeted him, and was joyful to see him.\n\nAnd two other men came in upon their saddles, and the maiden treated these two in the same manner as she had done the first.\n\nThen Peredur asked the chieftain wherefore it was thus.\n\nAnd they told him, that there was an Addanc in a cave, which slew them once every day.\n\nAnd thus they remained that night.\n\nAnd next morning the youths arose to sally forth, and Peredur besought them, for the sake of the ladies of their love, to permit him to go with them; but they refused him, saying, “If thou shouldst be slain there, thou hast none to bring thee back to life again.” And they rode forward, and Peredur followed after them; and, after they had disappeared out of his sight, he came to a mound, whereon sat the fairest lady he had ever beheld.\n\n“I know thy quest,” said she; “thou art going to encounter the Addanc, and he will slay thee, and that not by courage, but by craft.\n\nHe has a cave, and at the entrance of the cave there is a stone pillar, and he sees every one that enters, and none see him; and from behind the pillar he slays every one with a poisonous dart.\n\nAnd if thou wouldst pledge me thy faith to love me above all women, I would give thee a stone, by which thou shouldst see him when thou goest in, and he should not see thee.” “I will, by my troth,” said Peredur, “for when first I beheld thee I loved thee; and where shall I seek thee?” “When thou seekest me, seek towards India.” And the maiden vanished, after placing the stone in Peredur’s hand.\n\nAnd he came towards a valley, through which ran a river; and the borders of the valley were wooded, and on each side of the river were level meadows.\n\nAnd on one side of the river he saw a flock of white sheep, and on the other a flock of black sheep.\n\nAnd whenever one of the white sheep bleated, one of the black sheep would cross over and become white; and when one of the black sheep bleated, one of the white sheep would cross over and become black.\n\nAnd he saw a tall tree by the side of the river, one half of which was in flames from the root to the top, and the other half was green and in full leaf.\n\nAnd nigh thereto he saw a youth sitting upon a mound, and two greyhounds, white-breasted and spotted, in leashes, lying by his side.\n\nAnd certain was he that he had never seen a youth of so royal a bearing as he."

