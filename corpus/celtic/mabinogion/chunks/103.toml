[content]
body = "“Do with it as it seems good to thee, and as thou wouldest if it were thine own.” Then Kai polished one half of the blade and put it in his hand.\n\n“Will this please thee?” asked he.\n\n“I would rather than all that is in my dominions that the whole of it were like unto this.\n\nIt is a marvel to me that such a man as thou should be without a companion.” “Oh!\n\nnoble sir, I have a companion, albeit he is not skilled in this art.” “Who may he be?” “Let the porter go forth, and I will tell him whereby he may know him.\n\nThe head of his lance will leave its shaft, and draw blood from the wind, and will descend upon its shaft again.” Then the gate was opened, and Bedwyr entered.\n\nAnd Kai said, “Bedwyr is very skilful, although he knows not this art.” And there was much discourse among those who were without, because that Kai and Bedwyr had gone in.\n\nAnd a young man who was with them, the only son of Custennin the herdsman, got in also.\n\nAnd he caused all his companions to keep close to him as he passed the three wards, and until he came into the midst of the castle.\n\nAnd his companions said unto the son of Custennin, “Thou hast done this!\n\nThou art the best of all men.” And thenceforth he was called Goreu, the son of Custennin.\n\nThen they dispersed to their lodgings, that they might slay those who lodged therein, unknown to the Giant.\n\nThe sword was now polished, and Kai gave it unto the hand of Gwrnach the Giant, to see if he were pleased with his work.\n\nAnd the Giant said, “The work is good, I am content therewith.” Said Kai, “It is thy scabbard that hath rusted thy sword, give it to me that I may take out the wooden sides of it and put in new ones.” And he took the scabbard from him, and the sword in the other hand.\n\nAnd he came and stood over against the Giant, as if he would have put the sword into the scabbard; and with it he struck at the head of the Giant, and cut off his head at one blow.\n\nThen they despoiled the castle, and took from it what goods and jewels they would.\n\nAnd again on the same day, at the beginning of the year, they came to Arthur’s Court, bearing with them the sword of Gwrnach the Giant.\n\nNow, when they told Arthur how they had sped, Arthur said, “Which of these marvels will it be best for us to seek first?” “It will be best,” said they, “to seek Mabon the son of Modron; and he will not be found unless we first find Eidoel the son of Aer, his kinsman.” Then Arthur rose up, and the warriors of the Islands of Britain with him, to seek for Eidoel; and they proceeded until they came before the Castle of Glivi, where Eidoel was imprisoned.\n\nGlivi stood on the summit of his castle, and he said, “Arthur, what requirest thou of me, since nothing remains to me in this fortress, and I have neither joy nor pleasure in it; neither wheat nor oats?"

