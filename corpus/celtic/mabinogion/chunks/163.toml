[content]
body = "“Who is the boy that followeth thee?” she asked.\n\n“This youth, he is thy son,” he answered.\n\n“Alas,” said she, “what has come unto thee that thou shouldst shame me thus?\n\nwherefore dost thou seek my dishonour, and retain it so long as this?” “Unless thou suffer dishonour greater than that of my bringing up such a boy as this, small will be thy disgrace.” “What is the name of the boy?” said she.\n\n“Verily,” he replied, “he has not yet a name.” “Well,” she said, “I lay this destiny upon him, that he shall never have a name until he receives one from me.” “Heaven bears me witness,” answered he, “that thou art a wicked woman.\n\nBut the boy shall have a name how displeasing soever it may be unto thee.\n\nAs for thee, that which afflicts thee is that thou art no longer called a damsel.” And thereupon he went forth in wrath, and returned to Caer Dathyl and there he tarried that night.\n\nAnd the next day he arose and took the boy with him, and went to walk on the seashore between that place and Aber Menei.\n\nAnd there he saw some sedges and seaweed, and he turned them into a boat.\n\nAnd out of dry sticks and sedges he made some Cordovan leather, and a great deal thereof, and he coloured it in such a manner that no one ever saw leather more beautiful than it.\n\nThen he made a sail to the boat, and he and the boy went in it to the port of the castle of Arianrod.\n\nAnd he began forming shoes and stitching them, until he was observed from the castle.\n\nAnd when he knew that they of the castle were observing him, he disguised his aspect, and put another semblance upon himself, and upon the boy, so that they might not be known.\n\n“What men are those in yonder boat?” said Arianrod.\n\n“They are cordwainers,” answered they.\n\n“Go and see what kind of leather they have, and what kind of work they can do.” So they came unto them.\n\nAnd when they came he was colouring some Cordovan leather, and gilding it.\n\nAnd the messengers came and told her this.\n\n“Well,” said she, “take the measure of my foot, and desire the cordwainer to make shoes for me.” So he made the shoes for her, yet not according to the measure, but larger.\n\nThe shoes then were brought unto her, and behold they were too large.\n\n“These are too large,” said she, “but he shall receive their value.\n\nLet him also make some that are smaller than they.” Then he made her others that were much smaller than her foot, and sent them unto her.\n\n“Tell him that these will not go on my feet,” said she.\n\nAnd they told him this.\n\n“Verily,” said he, “I will not make her any shoes, unless I see her foot.” And this was told unto her.\n\n“Truly,” she answered, “I will go unto him.” So she went down to the boat, and when she came there, he was shaping shoes and the boy stitching them.\n\n“Ah, lady,” said he, “good day to thee.” “Heaven prosper thee,” said she.\n\n“I marvel that thou canst not manage to make shoes according to a measure.” “I could not,” he replied, “but now I shall be able.” Thereupon behold a wren stood upon the deck of the boat, and the boy shot at it, and hit it in the leg between the sinew and the bone.\n\nThen she smiled.\n\n“Verily,” said she, “with a steady hand did the lion aim at it.” “Heaven reward thee not, but now has he got a name."

