[content]
body = "I will supplicate my Lord that I get refuge in him, A regard I may obtain in his grace; The Son of Mary is my trust, great in him is my delight, For in him is the world continually upholden.\n\nGod has been to instruct me and to raise my expectation, The true Creator of heaven, who affords me protection; It is rightly intended that the saints should daily pray, For God, the renovator, will bring them to him.” And forthwith Elphin gave his haul to his wife, and she nursed him tenderly and lovingly.\n\nThenceforward Elphin increased in riches more and more day after day, and in love and favour with the king, and there abode Taliesin until he was thirteen years old, when Elphin son of Gwyddno went by a Christmas invitation to his uncle, Maelgwn Gwynedd, who some time after this held open court at Christmastide in the castle of Dyganwy, for all the number of his lords of both degrees, both spiritual and temporal, with a vast and thronged host of knights and squires.\n\nAnd amongst them there arose a discourse and discussion.\n\nAnd thus was it said.\n\n“Is there in the whole world a king so great as Maelgwn, or one on whom Heaven has bestowed so many spiritual gifts as upon him?\n\nFirst, form, and beauty, and meekness, and strength, besides all the powers of the soul!” And together with these they said that Heaven had given one gift that exceeded all the others, which was the beauty, and comeliness, and grace, and wisdom, and modesty of his queen; whose virtues surpassed those of all the ladies and noble maidens throughout the whole kingdom.\n\nAnd with this they put questions one to another amongst themselves: Who had braver men?\n\nWho had fairer or swifter horses or greyhounds?\n\nWho had more skilful or wiser bards—than Maelgwn?\n\nNow at that time the bards were in great favour with the exalted of the kingdom; and then none performed the office of those who are now called heralds, unless they were learned men, not only expert in the service of kings and princes, but studious and well versed in the lineage, and arms, and exploits of princes and kings, and in discussions concerning foreign kingdoms, and the ancient things of this kingdom, and chiefly in the annals of the first nobles; and also were prepared always with their answers in various languages, Latin, French, Welsh, and English.\n\nAnd together with this they were great chroniclers, and recorders, and skilful in framing verses, and ready in making englyns in every one of those languages.\n\nNow of these there were at that feast within the palace of Maelgwn as many as four-and-twenty, and chief of them all was one named Heinin Vardd.\n\nWhen they had all made an end of thus praising the king and his gifts, it befell that Elphin spoke in this wise.\n\n“Of a truth none but a king may vie with a king; but were he not a king, I would say that my wife was as virtuous as any lady in the kingdom, and also that I have a bard who is more skilful than all the king’s bards.” In a short space some of his fellows showed the king all the boastings of Elphin; and the king ordered him to be thrown into a strong prison, until he might know the truth as to the virtues of his wife, and the wisdom of his bard."

