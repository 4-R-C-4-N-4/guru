[content]
body = "And although fearful of her errand, she came to the side of Geraint’s bed; and she spoke to him softly and gently, saying, “My Lord, arise, and clothe thyself, for these were the words of the Earl to me, and his intention concerning me.” So she told Geraint all that had passed.\n\nAnd although he was wroth with her, he took warning, and clothed himself.\n\nAnd she lighted a candle, that he might have light to do so.\n\n“Leave there the candle,” said he, “and desire the man of the house to come here.” Then she went, and the man of the house came to him.\n\n“Dost thou know how much I owe thee?” asked Geraint.\n\n“I think thou owest but little.” “Take the eleven horses and the eleven suits of armour.” “Heaven reward thee, lord,” said he, “but I spent not the value of one suit of armour upon thee.” “For that reason,” said he, “thou wilt be the richer.\n\nAnd now, wilt thou come to guide me out of the town?” “I will, gladly,” said he, “and in which direction dost thou intend to go?” “I wish to leave the town by a different way from that by which I entered it.” So the man of the lodgings accompanied him as far as he desired.\n\nThen he bade the maiden to go on before him; and she did so, and went straight forward, and his host returned home.\n\nAnd he had only just reached his house, when, behold, the greatest tumult approached that was ever heard.\n\nAnd when he looked out, he saw fourscore knights in complete armour around the house, with the Earl Dwnn at their head.\n\n“Where is the knight that was here?” said the Earl.\n\n“By thy hand,” said he, “he went hence some time ago.” “Wherefore, villain,” said he, “didst thou let him go without informing me?” “My Lord, thou didst not command me to do so, else would I not have allowed him to depart.” “What way dost thou think that he took?” “I know not, except that he went along the high road.” And they turned their horses’ heads that way, and seeing the tracks of the horses upon the high road, they followed.\n\nAnd when the maiden beheld the dawning of the day, she looked behind her, and saw vast clouds of dust coming nearer and nearer to her.\n\nAnd thereupon she became uneasy, and she thought that it was the Earl and his host coming after them.\n\nAnd thereupon she beheld a knight appearing through the mist.\n\n“By my faith,” said she, “though he should slay me, it were better for me to receive my death at his hands, than to see him killed without warning him.\n\nMy Lord,” she said to him, “seest thou yonder man hastening after thee, and many others with him?” “I do see him,” said he; “and in despite of all my orders, I see that thou wilt never keep silence.” Then he turned upon the knight, and with the first thrust he threw him down under his horse’s feet.\n\nAnd as long as there remained one of the fourscore knights, he overthrew every one of them at the first onset.\n\nAnd from the weakest to the strongest, they all attacked him one after the other, except the Earl: and last of all the Earl came against him also.\n\nAnd he broke his lance, and then he broke a second.\n\nBut Geraint turned upon him, and struck him with his lance upon the centre of his shield, so that by that single thrust the shield was split, and all his armour broken, and he himself was brought over his horse’s crupper to the ground, and was in peril of his life."

