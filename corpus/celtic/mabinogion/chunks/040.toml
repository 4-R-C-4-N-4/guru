[content]
body = "And Peredur spurred his horse, and ran at him wrathfully, furiously, fiercely, desperately, and with mighty rage, and he gave him a thrust, deadly-wounding, severe, furious, adroit, and strong, under his jaw, and raised him out of his saddle, and cast him a long way from him.\n\nAnd Peredur went back, and left the horse and the arms with the attendant as before, and he went on foot to the Palace.\n\nThen Peredur went by the name of the Dumb Youth.\n\nAnd behold, Angharad Law Eurawc met him.\n\n“I declare to Heaven, chieftain,” said she, “woful is it that thou canst not speak; for couldst thou speak, I would love thee best of all men; and by my faith, although thou canst not, I do love thee above all.” “Heaven reward thee, my sister,” said Peredur, “by my faith I also do love thee.” Thereupon it was known that he was Peredur.\n\nAnd then he held fellowship with Gwalchmai, and Owain the son of Urien, and all the household, and he remained in Arthur’s Court.\n\nArthur was in Caerlleon upon Usk; and he went to hunt, and Peredur went with him.\n\nAnd Peredur let loose his dog upon a hart, and the dog killed the hart in a desert place.\n\nAnd a short space from him he saw signs of a dwelling, and towards the dwelling he went, and he beheld a hall, and at the door of the hall he found bald swarthy youths playing at chess.\n\nAnd when he entered, he beheld three maidens sitting on a bench, and they were all clothed alike, as became persons of high rank.\n\nAnd he came, and sat by them upon the bench; and one of the maidens looked steadfastly upon Peredur, and wept.\n\nAnd Peredur asked her wherefore she was weeping.\n\n“Through grief, that I should see so fair a youth as thou art, slain.” “Who will slay me?” inquired Peredur.\n\n“If thou art so daring as to remain here to-night, I will tell thee.” “How great soever my danger may be from remaining here, I will listen unto thee.” “This Palace is owned by him who is my father,” said the maiden, “and he slays every one who comes hither without his leave.” “What sort of a man is thy father, that he is able to slay every one thus?” “A man who does violence and wrong unto his neighbours, and who renders justice unto none.” And hereupon he saw the youths arise and clear the chessmen from the board.\n\nAnd he heard a great tumult; and after the tumult there came in a huge black one-eyed man, and the maidens arose to meet him.\n\nAnd they disarrayed him, and he went and sat down; and after he had rested and pondered awhile, he looked at Peredur, and asked who the knight was.\n\n“Lord,” said one of the maidens, “he is the fairest and gentlest youth that ever thou didst see.\n\nAnd for the sake of Heaven, and of thine own dignity, have patience with him.” “For thy sake I will have patience, and I will grant him his life this night.” Then Peredur came towards them to the fire, and partook of food and liquor, and entered into discourse with the ladies."

