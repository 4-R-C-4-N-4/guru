[content]
body = "“By making a bath for me by the side of a river, and by putting a roof over the cauldron, and thatching it well and tightly, and bringing a buck, and putting it beside the cauldron.\n\nThen if I place one foot on the buck’s back, and the other on the edge of the cauldron, whosoever strikes me thus will cause my death.” “Well,” said she, “I thank Heaven that it will be easy to avoid this.” No sooner had she held this discourse than she sent to Gronw Pebyr.\n\nGronw toiled at making the spear, and that day twelvemonth it was ready.\n\nAnd that very day he caused her to be informed thereof.\n\n“Lord,” said Blodeuwedd unto Llew, “I have been thinking how it is possible that what thou didst tell me formerly can be true; wilt thou show me in what manner thou couldst stand at once upon the edge of a cauldron and upon a buck, if I prepare the bath for thee?” “I will show thee,” said he.\n\nThen she sent unto Gronw, and bade him be in ambush on the hill which is now called Bryn Kyvergyr, on the bank of the river Cynvael.\n\nShe caused also to be collected all the goats that were in the Cantrev, and had them brought to the other side of the river, opposite Bryn Kyvergyr.\n\nAnd the next day she spoke thus.\n\n“Lord,” said she, “I have caused the roof and the bath to be prepared, and lo!\n\nthey are ready.” “Well,” said Llew, “we will go gladly to look at them.” The day after they came and looked at the bath.\n\n“Wilt thou go into the bath, lord?” said she.\n\n“Willingly will I go in,” he answered.\n\nSo into the bath he went, and he anointed himself.\n\n“Lord,” said she, “behold the animals which thou didst speak of as being called bucks.” “Well,” said he, “cause one of them to be caught and brought here.” And the buck was brought.\n\nThen Llew rose out of the bath, and put on his trowsers, and he placed one foot on the edge of the bath and the other on the buck’s back.\n\nThereupon Gronw rose up from the bill which is called Bryn Kyvergyr, and he rested on one knee, and flung the poisoned dart and struck him on the side, so that the shaft started out, but the head of the dart remained in.\n\nThen he flew up in the form of an eagle and gave a fearful scream.\n\nAnd thenceforth was he no more seen.\n\nAs soon as he departed Gronw and Blodeuwedd went together unto the palace that night.\n\nAnd the next day Gronw arose and took possession of Ardudwy.\n\nAnd after he had overcome the land, he ruled over it, so that Ardudwy and Penllyn were both under his sway.\n\nThen these tidings reached Math the son of Mathonwy.\n\nAnd heaviness and grief came upon Math, and much more upon Gwydion than upon him.\n\n“Lord,” said Gwydion, “I shall never rest until I have tidings of my nephew.” “Verily,” said Math, “may Heaven be thy strength.” Then Gwydion set forth and began to go forward.\n\nAnd he went through Gwynedd and Powys to the confines.\n\nAnd when he had done so, he went into Arvon, and came to the house of a vassal, in Maenawr Penardd.\n\nAnd he alighted at the house, and stayed there that night.\n\nThe man of the house and his house-hold came in, and last of all came there the swineherd."

