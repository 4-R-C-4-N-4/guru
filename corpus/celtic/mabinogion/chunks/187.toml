[content]
body = "I have been with my Lord in the manger of the ass: I strengthened Moses through the water of Jordan; I have been in the firmament with Mary Magdalene; I have obtained the muse from the cauldron of Caridwen; I have been bard of the harp to Lleon of Lochlin.\n\nI have been on the White Hill, in the court of Cynvelyn, For a day and a year in stocks and fetters, I have suffered hunger for the Son of the Virgin, I have been fostered in the land of the Deity, I have been teacher to all intelligences, I am able to instruct the whole universe.\n\nI shall be until the day of doom on the face of the earth; And it is not known whether my body is flesh or fish.\n\nThen I was for nine months In the womb of the hag Caridwen; I was originally little Gwion, And at length I am Taliesin.” And when the king and his nobles had heard the song, they wondered much, for they had never heard the like from a boy so young as he.\n\nAnd when the king knew that he was the bard of Elphin, he bade Heinin, his first and wisest bard, to answer Taliesin and to strive with him.\n\nBut when he came, he could do no other but play “blerwm” on his lips; and when he sent for the others of the four-and-twenty bards they all did likewise, and could do no other.\n\nAnd Maelgwn asked the boy Taliesin what was his errand, and he answered him in song.\n\n“Puny bards, I am trying To secure the prize, if I can; By a gentle prophetic strain I am endeavouring to retrieve The loss I may have suffered; Complete the attempt I hope, Since Elphin endures trouble In the fortress of Teganwy, On him may there not be laid Too many chains and fetters; The Chair of the fortress of Teganwy Will I again seek; Strengthened by my muse I am powerful; Mighty on my part is what I seek, For three hundred songs and more Are combined in the spell I sing.\n\nThere ought not to stand where I am Neither stone, neither ring; And there ought not to be about me Any bard who may not know That Elphin the son of Gwyddno Is in the land of Artro, Secured by thirteen locks, For praising his instructor; And then I Taliesin, Chief of the bards of the west, Shall loosen Elphin Out of a golden fetter.” * * * * * “If you be primary bards To the master of sciences, Declare ye mysteries That relate to the inhabitants of the world; There is a noxious creature, From the rampart of Satanas, Which has overcome all Between the deep and the shallow; Equally wide are his jaws As the mountains of the Alps; Him death will not subdue, Nor hand or blades; There is the load of nine hundred wagons In the hair of his two paws; There is in his head an eye Green as the limpid sheet of icicle; Three springs arise In the nape of his neck; Sea-roughs thereon Swim through it; There was the dissolution of the oxen Of Deivrdonwy the water-gifted."

