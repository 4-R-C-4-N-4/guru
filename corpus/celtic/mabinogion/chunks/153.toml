[content]
body = "And thus passed the seasons of the year until the harvest came.\n\nAnd he went to look at one of his crofts, and behold it was ripe.\n\n“I will reap this to-morrow,” said he.\n\nAnd that night he went back to Narberth, and on the morrow in the grey dawn he went to reap the croft, and when he came there he found nothing but the bare straw.\n\nEvery one of the ears of the wheat was cut from off the stalk, and all the ears carried entirely away, and nothing but the straw left.\n\nAnd at this he marvelled greatly.\n\nThen he went to look at another croft, and behold that also was ripe.\n\n“Verily,” said he, “this will I reap to-morrow.” And on the morrow he came with the intent to reap it, and when he came there he found nothing but the bare straw.\n\n“Oh, gracious Heaven,” he exclaimed, “I know that whosoever has begun my ruin is completing it, and has also destroyed the country with me.” Then he went to look at the third croft, and when he came there, finer wheat had there never been seen, and this also was ripe.\n\n“Evil betide me,” said he, “if I watch not here to-night.\n\nWhoever carried off the other corn will come in like manner to take this.\n\nAnd I will know who it is.” So he took his arms, and began to watch the croft.\n\nAnd he told Kicva all that had befallen.\n\n“Verily,” said she, “what thinkest thou to do?” “I will watch the croft to-night,” said he.\n\nAnd he went to watch the croft.\n\nAnd at midnight, lo, there arose the loudest tumult in the world.\n\nAnd he looked, and behold the mightiest host of mice in the world, which could neither be numbered nor measured.\n\nAnd he knew not what it was until the mice had made their way into the croft, and each of them climbing up the straw and bending it down with its weight, had cut off one of the ears of wheat, and had carried it away, leaving there the stalk, and he saw not a single stalk there that had not a mouse to it.\n\nAnd they all took their way, carrying the ears with them.\n\nIn wrath and anger did he rush upon the mice, but he could no more come up with them than if they had been gnats, or birds in the air, except one only, which though it was but sluggish, went so fast that a man on foot could scarce overtake it.\n\nAnd after this one he went, and he caught it and put it in his glove, and tied up the opening of the glove with a string, and kept it with him, and returned to the palace.\n\nThen he came to the hall where Kicva was, and he lighted a fire, and hung the glove by the string upon a peg.\n\n“What hast thou there, lord?” said Kicva.\n\n“A thief,” said he, “that I found robbing me.” “What kind of thief may it be, lord, that thou couldst put into thy glove?” said she.\n\n“Behold I will tell thee,” he answered.\n\nThen he showed her how his fields had been wasted and destroyed, and how the mice came to the last of the fields in his sight.\n\n“And one of them was less nimble than the rest, and is now in my glove; to-morrow I will hang it, and before Heaven, if I had them, I would hang them all.” “My lord,” said she, “this is marvellous; but yet it would be unseemly for a man of dignity like thee to be hanging such a reptile as this."

