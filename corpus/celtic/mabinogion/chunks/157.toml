[content]
body = "THIS IS THE FOURTH PORTION OF THE MABINOGI Math the son of Mathonwy was lord over Gwynedd, and Pryderi the son of Pwyll was lord over the one-and-twenty Cantrevs of the South; and these were the seven Cantrevs of Dyved, and the seven Cantrevs of Morganwc, the four Cantrevs of Ceredigiawn, and the three of Ystrad Tywi.\n\nAt that time, Math the son of Mathonwy could not exist unless his feet were in the lap of a maiden, except only when he was prevented by the tumult of war.\n\nNow the maiden who was with him was Goewin, the daughter of Pebin of Dôl Pebin, in Arvon, and she was the fairest maiden of her time who was known there.\n\nAnd Math dwelt always at Caer Dathyl, in Arvon, and was not able to go the circuit of the land, but Gilvaethwy the son of Don, and Eneyd the son of Don, his nephews, the sons of his sisters, with his household, went the circuit of the land in his stead.\n\nNow the maiden was with Math continually, and Gilvaethwy the son of Don set his affections upon her, and loved her so that he knew not what he should do because of her, and therefrom behold his hue, and his aspect, and his spirits changed for love of her, so that it was not easy to know him.\n\nOne day his brother Gwydion gazed steadfastly upon him.\n\n“Youth,” said he, “what aileth thee?” “Why,” replied he, “what seest thou in me?” “I see,” said he, “that thou hast lost thy aspect and thy hue; what, therefore, aileth thee?” “My lord brother,” he answered, “that which aileth me, it will not profit me that I should own to any.” “What may it be, my soul?” said he.\n\n“Thou knowest,” he said, “that Math the son of Mathonwy has this property, that if men whisper together, in a tone how low soever, if the wind meet it, it becomes known unto him.” “Yes,” said Gwydion, “hold now thy peace, I know thy intent, thou lovest Goewin.” When he found that his brother knew his intent, he gave the heaviest sigh in the world.\n\n“Be silent, my soul, and sigh not,” he said.\n\n“It is not thereby that thou wilt succeed.\n\nI will cause,” said he, “if it cannot be otherwise, the rising of Gwynedd, and Powys, and Deheubarth, to seek the maiden.\n\nBe thou of glad cheer therefore, and I will compass it.” So they went unto Math the son of Mathonwy.\n\n“Lord,” said Gwydion, “I have heard that there have come to the South some beasts, such as were never known in this island before.” “What are they called?” he asked.\n\n“Pigs, lord.” “And what kind of animals are they?” “They are small animals, and their flesh is better than the flesh of oxen.” “They are small, then?” “And they change their names."

