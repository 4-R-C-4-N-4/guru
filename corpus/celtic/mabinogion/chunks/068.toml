[content]
body = "And after that he began to shut himself up in the chamber of his wife, and he took no delight in anything besides, insomuch that he gave up the friendship of his nobles, together with his hunting and his amusements, and lost the hearts of all the host in his Court; and there was murmuring and scoffing concerning him among the inhabitants of the palace, on account of his relinquishing so completely their companionship for the love of his wife.\n\nAnd these tidings came to Erbin.\n\nAnd when Erbin had heard these things, he spoke unto Enid, and inquired of her whether it was she that had caused Geraint to act thus, and to forsake his people and his hosts.\n\n“Not I, by my confession unto Heaven,” said she, “there is nothing more hateful to me than this.” And she knew not what she should do, for, although it was hard for her to own this to Geraint, yet was it not more easy for her to listen to what she heard, without warning Geraint concerning it.\n\nAnd she was very sorrowful.\n\nAnd one morning in the summer time, they were upon their couch, and Geraint lay upon the edge of it.\n\nAnd Enid was without sleep in the apartment, which had windows of glass.\n\nAnd the sun shone upon the couch.\n\nAnd the clothes had slipped from off his arms and his breast, and he was asleep.\n\nThen she gazed upon the marvellous beauty of his appearance, and she said, “Alas, and am I the cause that these arms and this breast have lost their glory and the warlike fame which they once so richly enjoyed!” And as she said this, the tears dropped from her eyes, and they fell upon his breast.\n\nAnd the tears she shed, and the words she had spoken, awoke him; and another thing contributed to awaken him, and that was the idea that it was not in thinking of him that she spoke thus, but that it was because she loved some other man more than him, and that she wished for other society, and thereupon Geraint was troubled in his mind, and he called his squire; and when he came to him, “Go quickly,” said he, “and prepare my horse and my arms, and make them ready.\n\nAnd do thou arise,” said he to Enid, “and apparel thyself; and cause thy horse to be accoutred, and clothe thee in the worst riding-dress that thou hast in thy possession.\n\nAnd evil betide me,” said he, “if thou returnest here until thou knowest whether I have lost my strength so completely as thou didst say.\n\nAnd if it be so, it will then be easy for thee to seek the society thou didst wish for of him of whom thou wast thinking.” So she arose, and clothed herself in her meanest garments.\n\n“I know nothing, Lord,” said she, “of thy meaning.” “Neither wilt thou know at this time,” said he.\n\nThen Geraint went to see Erbin.\n\n“Sir,” said he, “I am going upon a quest, and I am not certain when I may come back.\n\nTake heed, therefore, unto thy possessions, until my return.” “I will do so,” said he, “but it is strange to me that thou shouldest go so suddenly.\n\nAnd who will proceed with thee, since thou art not strong enough to traverse the land of Lloegyr alone?” “But one person only will go with me.” “Heaven counsel thee, my son,” said Erbin, “and may many attach themselves to thee in Lloegyr.” Then went Geraint to the place where his horse was, and it was equipped with foreign armour, heavy and shining."

