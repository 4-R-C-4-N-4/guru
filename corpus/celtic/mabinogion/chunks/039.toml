[content]
body = "And we will go to do homage to Arthur, and to embrace the faith and be baptized.” Then said Peredur, “To Heaven I render thanks that I have not broken my vow to the lady that best I love, which was, that I would not speak one word unto any Christian.” That night they tarried there.\n\nAnd the next day, in the morning, the grey man, with his company, set forth to Arthur’s Court; and they did homage unto Arthur, and he caused them to be baptized.\n\nAnd the grey man told Arthur that it was Peredur that had vanquished them.\n\nAnd Arthur gave the valley to the grey man and his company, to hold it of him as Peredur had besought.\n\nAnd with Arthur’s permission, the grey man went back to the Round Valley.\n\nPeredur rode forward next day, and he traversed a vast tract of desert, in which no dwellings were.\n\nAnd at length he came to a habitation, mean and small.\n\nAnd there he heard that there was a serpent that lay upon a gold ring, and suffered none to inhabit the country for seven miles around.\n\nAnd Peredur came to the place where he heard the serpent was.\n\nAnd angrily, furiously, and desperately fought he with the serpent; and at last he killed it, and took away the ring.\n\nAnd thus he was for a long time without speaking a word to any Christian.\n\nAnd therefrom he lost his colour and his aspect, through extreme longing after the Court of Arthur, and the society of the lady whom best he loved, and of his companions.\n\nThen he proceeded forward to Arthur’s Court, and on the road there met him Arthur’s household going on a particular errand, with Kai at their head.\n\nAnd Peredur knew them all, but none of the household recognized him.\n\n“Whence comest thou, chieftain?” said Kai.\n\nAnd this he asked him twice and three times, and he answered him not.\n\nAnd Kai thrust him through the thigh with his lance.\n\nAnd lest he should be compelled to speak, and to break his vow, he went on without stopping.\n\n“Then,” said Gwalchmai, “I declare to Heaven, Kai, that thou hast acted ill in committing such an outrage on a youth like this, who cannot speak.” And Gwalchmai returned back to Arthur’s Court.\n\n“Lady,” said he to Gwenhwyvar, “seest thou how wicked an outrage Kai has committed upon this youth who cannot speak; for Heaven’s sake, and for mine, cause him to have medical care before I come back, and I will repay thee the charge.” And before the men returned from their errand, a knight came to the meadow beside Arthur’s Palace, to dare some one to the encounter.\n\nAnd his challenge was accepted; and Peredur fought with him, and overthrew him.\n\nAnd for a week he overthrew one knight every day.\n\nAnd one day, Arthur and his household were going to Church, and they beheld a knight who had raised the signal for combat.\n\n“Verily,” said Arthur, “by the valour of men, I will not go hence until I have my horse and my arms to overthrow yonder boor.” Then went the attendants to fetch Arthur’s horse and arms.\n\nAnd Peredur met the attendants as they were going back, and he took the horse and arms from them, and proceeded to the meadow; and all those who saw him arise and go to do battle with the knight, went upon the tops of the houses, and the mounds, and the high places, to behold the combat.\n\nAnd Peredur beckoned with his hand to the knight to commence the fight.\n\nAnd the knight thrust at him, but he was not thereby moved from where he stood."

