[content]
body = "And thus did they, and they caused the boy to be baptized, and the ceremony was performed there; and the name which they gave unto him was Gwri Wallt Euryn, because what hair was upon his head was as yellow as gold.\n\nAnd they had the boy nursed in the Court until he was a year old.\n\nAnd before the year was over he could walk stoutly.\n\nAnd he was larger than a boy of three years old, even one of great growth and size.\n\nAnd the boy was nursed the second year, and then he was as large as a child six years old.\n\nAnd before the end of the fourth year, he would bribe the grooms to allow him to take the horses to water.\n\n“My lord,” said his wife unto Teirnyon, “where is the colt which thou didst save on the night that thou didst find the boy?” “I have commanded the grooms of the horses,” said he, “that they take care of him.” “Would it not be well, lord,” said she, “if thou wert to cause him to be broken in, and given to the boy, seeing that on the same night that thou didst find the boy, the colt was foaled and thou didst save him?” “I will not oppose thee in this matter,” said Teirnyon.\n\n“I will allow thee to give him the colt.” “Lord,” said she, “may Heaven reward thee; I will give it him.” So the horse was given to the boy.\n\nThen she went to the grooms and those who tended the horses, and commanded them to be careful of the horse, so that he might be broken in by the time that the boy could ride him.\n\nAnd while these things were going forward, they heard tidings of Rhiannon and her punishment.\n\nAnd Teirnyon Twryv Vliant, by reason of the pity that he felt on hearing this story of Rhiannon and her punishment, inquired closely concerning it, until he had heard from many of those who came to his court.\n\nThen did Teirnyon, often lamenting the sad history, ponder within himself, and he looked steadfastly on the boy, and as he looked upon him, it seemed to him that he had never beheld so great a likeness between father and son, as between the boy and Pwyll the Chief of Annwvyn.\n\nNow the semblance of Pwyll was well known to him, for he had of yore been one of his followers.\n\nAnd thereupon he became grieved for the wrong that he did, in keeping with him a boy whom he knew to be the son of another man.\n\nAnd the first time that he was alone with his wife, he told her that it was not right that they should keep the boy with them, and suffer so excellent a lady as Rhiannon to be punished so greatly on his account, whereas the boy was the son of Pwyll the Chief of Annwvyn.\n\nAnd Teirnyon’s wife agreed with him, that they should send the boy to Pwyll.\n\n“And three things, lord,” said she, “shall we gain thereby.\n\nThanks and gifts for releasing Rhiannon from her punishment; and thanks from Pwyll for nursing his son and restoring him unto him; and thirdly, if the boy is of gentle nature, he will be our foster-son, and he will do for us all the good in his power.” So it was settled according to this counsel.\n\nAnd no later than the next day was Teirnyon equipped, and two other knights with him.\n\nAnd the boy, as a fourth in their company, went with them upon the horse which Teirnyon had given him.\n\nAnd they journeyed towards Narberth, and it was not long before they reached that place."

