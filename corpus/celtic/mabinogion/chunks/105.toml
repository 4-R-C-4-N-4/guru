[content]
body = "Nevertheless, I will be the guide of Arthur’s embassy until you come to the place where is the oldest animal in this world, and the one that has travelled most, the Eagle of Gwern Abwy.” Gwrhyr said, “Eagle of Gwern Abwy, we have come to thee an embassy from Arthur, to ask thee if thou knowest aught of Mabon the son of Modron, who was taken from his mother when he was three nights old.” The Eagle said, “I have been here for a great space of time, and when I first came hither there was a rock here, from the top of which I pecked at the stars every evening; and now it is not so much as a span high.\n\nFrom that day to this I have been here, and I have never heard of the man for whom you inquire, except once when I went in search of food as far as Llyn Llyw.\n\nAnd when I came there, I struck my talons into a salmon, thinking he would serve me as food for a long time.\n\nBut he drew me into the deep, and I was scarcely able to escape from him.\n\nAfter that I went with my whole kindred to attack him, and to try to destroy him, but he sent messengers, and made peace with me; and came and besought me to take fifty fish spears out of his back.\n\nUnless he know something of him whom you seek, I cannot tell who may.\n\nHowever, I will guide you to the place where he is.” So they went thither; and the Eagle said, “Salmon of Llyn Llyw, I have come to thee with an embassy from Arthur, to ask thee if thou knowest aught concerning Mabon the son of Modron, who was taken away at three nights old from his mother.” “As much as I know I will tell thee.\n\nWith every tide I go along the river upwards, until I come near to the walls of Gloucester, and there have I found such wrong as I never found elsewhere; and to the end that ye may give credence thereto, let one of you go thither upon each of my two shoulders.” So Kai and Gwrhyr Gwalstawt Ieithoedd went upon the two shoulders of the salmon, and they proceeded until they came unto the wall of the prison, and they heard a great wailing and lamenting from the dungeon.\n\nSaid Gwrhyr, “Who is it that laments in this house of stone?” “Alas, there is reason enough for whoever is here to lament.\n\nIt is Mabon the son of Modron who is here imprisoned; and no imprisonment was ever so grievous as mine, neither that of Lludd Llaw Ereint, nor that of Greid the son of Eri.” “Hast thou hope of being released for gold or for silver, or for any gifts of wealth, or through battle and fighting?” “By fighting will whatever I may gain be obtained.” Then they went thence, and returned to Arthur, and they told him where Mabon the son of Modron was imprisoned.\n\nAnd Arthur summoned the warriors of the Island, and they journeyed as far as Gloucester, to the place where Mabon was in prison.\n\nKai and Bedwyr went upon the shoulders of the fish, whilst the warriors of Arthur attacked the castle.\n\nAnd Kai broke through the wall into the dungeon, and brought away the prisoner upon his back, whilst the fight was going on between the warriors.\n\nAnd Arthur returned home, and Mabon with him at liberty."

