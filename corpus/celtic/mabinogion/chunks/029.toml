[content]
body = "“Tell me, my soul,” said the man, “which of the youths thinkest thou plays best.” “I think,” said Peredur, “that the yellow-haired youth could draw blood from the other, if he chose.” “Arise thou, my life, and take the cudgel and the shield from the hand of the youth with the auburn hair, and draw blood from the yellow-haired youth if thou canst.” So Peredur arose, and went to play with the yellow-haired youth; and he lifted up his arm, and struck him such a mighty blow, that his brow fell over his eye, and the blood flowed forth.\n\n“Ah, my life,” said the man, “come now, and sit down, for thou wilt become the best fighter with the sword of any in this island; and I am thy uncle, thy mother’s brother.\n\nAnd with me shalt thou remain a space, in order to learn the manners and customs of different countries, and courtesy, and gentleness, and noble bearing.\n\nLeave, then, the habits and the discourse of thy mother, and I will be thy teacher; and I will raise thee to the rank of knight from this time forward.\n\nAnd thus do thou.\n\nIf thou seest aught to cause thee wonder, ask not the meaning of it; if no one has the courtesy to inform thee, the reproach will not fall upon thee, but upon me that am thy teacher.” And they had abundance of honour and service.\n\nAnd when it was time they went to sleep.\n\nAt the break of day, Peredur arose, and took his horse, and with his uncle’s permission he rode forth.\n\nAnd he came to a vast desert wood, and at the further end of the wood was a meadow, and on the other side of the meadow he saw a large castle.\n\nAnd thitherward Peredur bent his way, and he found the gate open, and he proceeded to the hall.\n\nAnd he beheld a stately hoary-headed man sitting on one side of the hall, and many pages around him, who arose to receive and to honour Peredur.\n\nAnd they placed him by the side of the owner of the palace.\n\nThen they discoursed together; and when it was time to eat, they caused Peredur to sit beside the nobleman during the repast.\n\nAnd when they had eaten and drunk as much as they desired, the nobleman asked Peredur whether he could fight with a sword?\n\n“Were I to receive instruction,” said Peredur, “I think I could.” Now, there was on the floor of the hall a huge staple, as large as a warrior could grasp.\n\n“Take yonder sword,” said the man to Peredur, “and strike the iron staple.” So Peredur arose and struck the staple, so that he cut it in two; and the sword broke into two parts also.\n\n“Place the two parts together, and reunite them,” and Peredur placed them together, and they became entire as they were before.\n\nAnd a second time he struck upon the staple, so that both it and the sword broke in two, and as before they reunited.\n\nAnd the third time he gave a like blow, and placed the broken parts together, and neither the staple nor the sword would unite as before.\n\n“Youth,” said the nobleman, “come now, and sit down, and my blessing be upon thee.\n\nThou fightest best with the sword of any man in the kingdom.\n\nThou hast arrived at two-thirds of thy strength, and the other third thou hast not yet obtained; and when thou attainest to thy full power, none will be able to contend with thee."

