[content]
body = "Were he alive, thy death he’d be.\n\nAnd thereupon Kai was wroth, so that the warriors of the Island could scarcely make peace between Kai and Arthur.\n\nAnd thenceforth, neither in Arthur’s troubles, nor for the slaying of his men, would Kai come forward to his aid for ever after.\n\nSaid Arthur, “Which of the marvels is it best for us now to seek?” “It is best for us to seek Drudwyn, the cub of Greid the son of Eri.” A little while before this, Creiddylad the daughter of Lludd Llaw Ereint, and Gwythyr the son of Greidawl, were betrothed.\n\nAnd before she had become his bride, Gwyn ap Nudd came and carried her away by force; and Gwythyr the son of Greidawl gathered his host together, and went to fight with Gwyn ap Nudd.\n\nBut Gwyn overcame him, and captured Greid the son of Eri, and Glinneu the son of Taran, and Gwrgwst Ledlwm, and Dynvarth his son.\n\nAnd he captured Penn the son of Nethawg, and Nwython, and Kyledyr Wyllt his son.\n\nAnd they slew Nwython, and took out his heart, and constrained Kyledyr to eat the heart of his father.\n\nAnd therefrom Kyledyr became mad.\n\nWhen Arthur heard of this, he went to the North, and summoned Gwyn ap Nudd before him, and set free the nobles whom he had put in prison, and made peace between Gwyn ap Nudd and Gwythyr the son of Griedawl.\n\nAnd this was the peace that was made:—that the maiden should remain in her father’s house, without advantage to either of them, and that Gwyn ap Nudd and Gwythyr the son of Greidawl should fight for her every first of May, from thenceforth until the day of doom, and that whichever of them should then be conqueror should have the maiden.\n\nAnd when Arthur had thus reconciled these chieftains, he obtained Mygdwn, Gweddw’s horse, and the leash of Cwrs Cant Ewin.\n\nAnd after that Arthur went into Armorica, and with him Mabon the son of Mellt, and Gware Gwallt Euryn, to seek the two dogs of Glythmyr Ledewic.\n\nAnd when he had got them, he went to the West of Ireland, in search of Gwrgi Seven; and Odgar the son of Aedd king of Ireland went with him.\n\nAnd thence went Arthur into the North, and captured Kyledyr Wyllt; and he went after Yskithyrwyn Penbaedd.\n\nAnd Mabon the son of Mellt came with the two dogs of Glythmyr Ledewic in his hand, and Drudwyn, the cub of Greid the son of Eri.\n\nAnd Arthur went himself to the chase, leading his own dog Cavall.\n\nAnd Kaw, of North Britain, mounted Arthur’s mare Llamrei, and was first in the attack.\n\nThen Kaw, of North Britain, wielded a mighty axe, and absolutely daring he came valiantly up to the boar, and clave his head in twain.\n\nAnd Kaw took away the tusk.\n\nNow the boar was not slain by the dogs that Yspaddaden had mentioned, but by Cavall, Arthur’s own dog.\n\nAnd after Yskithyrwyn Penbaedd was killed, Arthur and his host departed to Gelli Wic in Cornwall."

