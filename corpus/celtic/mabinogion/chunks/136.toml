[content]
body = "And as they drew near to the palace, they beheld Rhiannon sitting beside the horseblock.\n\nAnd when they were opposite to her, “Chieftain,” said she, “go not further thus, I will bear every one of you into the palace, and this is my penance for slaying my own son and devouring him.” “Oh, fair lady,” said Teirnyon, “think not that I will be one to be carried upon thy back.” “Neither will I,” said the boy.\n\n“Truly, my soul,” said Teirnyon, “we will not go.” So they went forward to the palace, and there was great joy at their coming.\n\nAnd at the palace a feast was prepared, because Pywll was come back from the confines of Dyved.\n\nAnd they went into the hall and washed, and Pwyll rejoiced to see Teirnyon.\n\nAnd in this order they sat.\n\nTeirnyon between Pwyll and Rhiannon, and Teirnyon’s two companions on the other side of Pwyll, with the boy between them.\n\nAnd after meat they began to carouse and to discourse.\n\nAnd Teirnyon’s discourse was concerning the adventure of the mare and the boy, and how he and his wife had nursed and reared the child as their own.\n\n“And behold here is thy son, lady,” said Teirnyon.\n\n“And whosoever told that lie concerning thee, has done wrong.\n\nAnd when I heard of thy sorrow, I was troubled and grieved.\n\nAnd I believe that there is none of this host who will not perceive that the boy is the son of Pwyll,” said Teirnyon.\n\n“There is none,” said they all, “who is not certain thereof.” “I declare to Heaven,” said Rhiannon, “that if this be true, there is indeed an end to my trouble.” “Lady,” said Pendaran Dyved, “well hast thou named thy son Pryderi, [3] and well becomes him the name of Pryderi son of Pwyll Chief of Annwvyn.” “Look you,” said Rhiannon, “will not his own name become him better?” “What name has he?” asked Pendaran Dyved.\n\n“Gwri Wallt Euryn is the name that we gave him.” “Pryderi,” said Pendaran, “shall his name be.” “It were more proper,” said Pwyll, “that the boy should take his name from the word his mother spoke when she received the joyful tidings of him.” And thus was it arranged.\n\n“Teirnyon,” said Pwyll, “Heaven reward thee that thou hast reared the boy up to this time, and, being of gentle lineage, it were fitting that he repay thee for it.” “My lord,” said Teirnyon, “it was my wife who nursed him, and there is no one in the world so afflicted as she at parting with him.\n\nIt were well that he should bear in mind what I and my wife have done for him.” “I call Heaven to witness,” said Pwyll, “that while I live I will support thee and thy possessions, as long as I am able to preserve my own.\n\nAnd when he shall have power, he will more fitly maintain them than I.\n\nAnd if this counsel be pleasing unto thee, and to my nobles, it shall be that, as thou hast reared him up to the present time, I will give him to be brought up by Pendaran Dyved, from henceforth.\n\nAnd you shall be companions, and shall both be foster-fathers unto him.” “This is good counsel,” said they all."

