body = "Lo, I hear the tumult of the men approaching.” “I will do so, gladly.” So she armed him fully, and that right cheerfully.\n\n“Hast thou finished arming the youth?” said he.\n\n“I have finished,” she answered.\n\n“I likewise have finished,” said Gwydion.\n\n“Let us now take off our arms, we have no need of them.” “Wherefore?” said she.\n\n“Here is the army around the house.” “Oh, lady, there is here no army.” “Oh,” cried she, “whence then was this tumult?” “The tumult was but to break thy prophecy and to obtain arms for thy son.\n\nAnd now has he got arms without any thanks unto thee.” “By Heaven,” said Arianrod, “thou art a wicked man.\n\nMany a youth might have lost his life through the uproar thou hast caused in this Cantrev to-day.\n\nNow will I lay a destiny upon this youth,” she said, “that he shall never have a wife of the race that now inhabits this earth.” “Verily,” said he, “thou wast ever a malicious woman, and no one ought to support thee.\n\nA wife shall he have notwithstanding.” They went thereupon unto Math the son of Mathonwy, and complained unto him most bitterly of Arianrod.\n\nGwydion showed him also how he had procured arms for the youth.\n\n“Well,” said Math, “we will seek, I and thou, by charms and illusion, to form a wife for him out of flowers.\n\nHe has now come to man’s stature, and he is the comeliest youth that was ever beheld.” So they took the blossoms of the oak, and the blossoms of the broom, and the blossoms of the meadow-sweet, and produced from them a maiden, the fairest and most graceful that man ever saw.\n\nAnd they baptized her, and gave her the name of Blodeuwedd.\n\nAfter she had become his bride, and they had feasted, said Gwydion, “It is not easy for a man to maintain himself without possessions.” “Of a truth,” said Math, “I will give the young man the best Cantrev to hold.” “Lord,” said he, “what Cantrev is that?” “The Cantrev of Dinodig,” he answered.\n\nNow it is called at this day Eivionydd and Ardudwy.\n\nAnd the place in the Cantrev where he dwelt, was a palace of his in a spot called Mur y Castell, on the confines of Ardudwy.\n\nThere dwelt he and reigned, and both he and his sway were beloved by all.\n\nOne day he went forth to Caer Dathyl, to visit Math the son of Mathonwy.\n\nAnd on the day that he set out for Caer Dathyl, Blodeuwedd walked in the Court.\n\nAnd she heard the sound of a horn.\n\nAnd after the sound of the horn, behold a tired stag went by, with dogs and huntsmen following it.\n\nAnd after the dogs and the huntsmen there came a crowd of men on foot.\n\n“Send a youth,” said she, “to ask who yonder host may be.” So a youth went, and inquired who they were.\n\n“Gronw Pebyr is this, the lord of Penllyn,” said they.\n\nAnd thus the youth told her.\n\nGronw Pebyr pursued the stag, and by the river Cynvael he overtook the stag and killed it.\n\nAnd what with flaying the stag and baiting his dogs, he was there until the night began to close in upon him.\n\nAnd as the day departed and the night drew near, he came to the gate of the Court."

