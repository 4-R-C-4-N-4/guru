[content]
body = "But the third turned upon him, and struck him with his club, so that he split his shield, and crushed his shoulder, and opened his wounds anew, and all his blood began to flow from him.\n\nBut Geraint drew his sword, and attacked the giant, and gave him a blow on the crown of his head so severe, and fierce, and violent, that his head and his neck were split down to his shoulders, and he fell dead.\n\nSo Geraint left him thus, and returned to Enid.\n\nAnd when he saw her, he fell down lifeless from his horse.\n\nPiercing, and loud, and thrilling was the cry that Enid uttered.\n\nAnd she came and stood over him where he had fallen.\n\nAnd at the sound of her cries came the Earl of Limours, and the host that journeyed with him, whom her lamentations brought out of their road.\n\nAnd the Earl said to Enid, “Alas, Lady, what hath befallen thee?” “Ah!\n\ngood Sir,” said she, “the only man I have loved, or ever shall love, is slain.” Then he said to the other, “And what is the cause of thy grief?” “They have slain my beloved husband also,” said she.\n\n“And who was it that slew them?” “Some giants,” she answered, “slew my best-beloved, and the other knight went in pursuit of them, and came back in the state thou seest, his blood flowing excessively; but it appears to me that he did not leave the giants without killing some of them, if not all.” The Earl caused the knight that was dead to be buried, but he thought that there still remained some life in Geraint; and to see if he yet would live, he had him carried with him in the hollow of his shield, and upon a bier.\n\nAnd the two damsels went to the Court; and when they arrived there, Geraint was placed upon a litter-couch in front of the table that was in the hall.\n\nThen they all took off their travelling gear, and the Earl besought Enid to do the same, and to clothe herself in other garments.\n\n“I will not, by Heaven,” said she.\n\n“Ah!\n\nLady,” said he, “be not so sorrowful for this matter.” “It were hard to persuade me to be otherwise,” said she.\n\n“I will act towards thee in such wise, that thou needest not be sorrowful, whether yonder knight live or die.\n\nBehold, a good Earldom, together with myself, will I bestow on thee; be, therefore, happy and joyful.” “I declare to Heaven,” said she, “that henceforth I shall never be joyful while I live.” “Come, then,” said he, “and eat.” “No, by Heaven, I will not,” she answered.\n\n“But, by Heaven, thou shalt,” said he.\n\nSo he took her with him to the table against her will, and many times desired her to eat.\n\n“I call Heaven to witness,” said she, “that I will not eat until the man that is upon yonder bier shall eat likewise.” “Thou canst not fulfil that,” said the Earl, “yonder man is dead already.” “I will prove that I can,” said she.\n\nThen he offered her a goblet of liquor.\n\n“Drink this goblet,” he said, “and it will cause thee to change thy mind.” “Evil betide me,” she answered, “if I drink aught until he drink also.” “Truly,” said the Earl, “it is of no more avail for me to be gentle with thee than ungentle.” And he gave her a box on the ear."

