[content]
body = "Let us go towards the palace.” So to the palace they went, and they spent that day.\n\nAnd the next day they arose, and that also they spent until it was time to go to meat.\n\nAnd after the first meal, “Verily,” said Pwyll, “we will go the same party as yesterday to the top of the mound.\n\nAnd do thou,” said he to one of his young men, “take the swiftest horse that thou knowest in the field.” And thus did the young man.\n\nAnd they went towards the mound, taking the horse with them.\n\nAnd as they were sitting down they beheld the lady on the same horse, and in the same apparel, coming along the same road.\n\n“Behold,” said Pwyll, “here is the lady of yesterday.\n\nMake ready, youth, to learn who she is.” “My lord,” said he, “that will I gladly do.” And thereupon the lady came opposite to them.\n\nSo the youth mounted his horse; and before he had settled himself in his saddle, she passed by, and there was a clear space between them.\n\nBut her speed was no greater than it had been the day before.\n\nThen he put his horse into an amble, and thought that notwithstanding the gentle pace at which his horse went, he should soon overtake her.\n\nBut this availed him not; so he gave his horse the reins.\n\nAnd still he came no nearer to her than when he went at a foot’s pace.\n\nAnd the more he urged his horse, the further was she from him.\n\nYet she rode not faster than before.\n\nWhen he saw that it availed not to follow her, he returned to the place where Pwyll was.\n\n“Lord,” said he, “the horse can no more than thou hast seen.” “I see indeed that it avails not that any one should follow her.\n\nAnd by Heaven,” said he, “she must needs have an errand to some one in this plain, if her haste would allow her to declare it.\n\nLet us go back to the palace.” And to the palace they went, and they spent that night in songs and feasting, as it pleased them.\n\nAnd the next day they amused themselves until it was time to go to meat.\n\nAnd when meat was ended, Pwyll said, “Where are the hosts that went yesterday and the day before to the top of the mound?” “Behold, Lord, we are here,” said they.\n\n“Let us go,” said he, “to the mound, to sit there.\n\nAnd do thou,” said he to the page who tended his horse, “saddle my horse well, and hasten with him to the road, and bring also my spurs with thee.” And the youth did thus.\n\nAnd they went and sat upon the mound; and ere they had been there but a short time, they beheld the lady coming by the same road, and in the same manner, and at the same pace.\n\n“Young man,” said Pwyll, “I see the lady coming; give me my horse.” And no sooner had he mounted his horse than she passed him.\n\nAnd he turned after her and followed her.\n\nAnd he let his horse go bounding playfully, and thought that at the second step or the third he should come up with her.\n\nBut he came no nearer to her than at first.\n\nThen he urged his horse to his utmost speed, yet he found that it availed nothing to follow her.\n\nThen said Pwyll, “O maiden, for the sake of him whom thou best lovest, stay for me.” “I will stay gladly,” said she, “and it were better for thy horse hadst thou asked it long since.” So the maiden stopped, and she threw back that part of her headdress which covered her face."

