[content]
body = "“I will give thee,” said the King, “my daughter in marriage, and half my kingdom with her, and the two Earldoms as a gift.” “Heaven reward thee, lord,” said Peredur, “but I came not here to woo.” “What seekest thou then, chieftain?” “I am seeking tidings of the Castle of Wonders.” “Thy enterprise is greater, chieftain, than thou wilt wish to pursue,” said the maiden, “nevertheless, tidings shalt thou have of the Castle, and thou shalt have a guide through my father’s dominions, and a sufficiency of provisions for thy journey, for thou art, O chieftain, the man whom best I love.” Then she said to him, “Go over yonder mountain, and thou wilt find a lake, and in the middle of the lake there is a Castle, and that is the Castle that is called the Castle of Wonders; and we know not what wonders are therein, but thus is it called.” And Peredur proceeded towards the Castle, and the gate of the Castle was open.\n\nAnd when he came to the hall, the door was open, and he entered.\n\nAnd he beheld a chessboard in the hall, and the chessmen were playing against each other, by themselves.\n\nAnd the side that he favoured lost the game, and thereupon the others set up a shout, as though they had been living men.\n\nAnd Peredur was wroth, and took the chessmen in his lap, and cast the chessboard into the lake.\n\nAnd when he had done thus, behold the black maiden came in, and she said to him, “The welcome of Heaven be not unto thee.\n\nThou hadst rather do evil than good.” “What complaint hast thou against me, maiden?” said Peredur.\n\n“That thou hast occasioned unto the Empress the loss of her chessboard, which she would not have lost for all her empire.\n\nAnd the way in which thou mayest recover the chessboard is, to repair to the Castle of Ysbidinongyl, where is a black man, who lays waste the dominions of the Empress; and if thou canst slay him, thou wilt recover the chessboard.\n\nBut if thou goest there, thou wilt not return alive.” “Wilt thou direct me thither?” said Peredur.\n\n“I will show thee the way,” she replied.\n\nSo he went to the Castle of Ysbidinongyl, and he fought with the black man.\n\nAnd the black man besought mercy of Peredur.\n\n“Mercy will I grant thee,” said he, “on condition that thou cause the chessboard to be restored to the place where it was when I entered the hall.” Then the maiden came to him, and said, “The malediction of Heaven attend thee for thy work, since thou hast left that monster alive, who lays waste all the possessions of the Empress.” “I granted him his life,” said Peredur, “that he might cause the chessboard to be restored.” “The chessboard is not in the place where thou didst find it; go back, therefore, and slay him,” answered she.\n\nSo Peredur went back, and slew the black man.\n\nAnd when he returned to the palace, he found the black maiden there.\n\n“Ah!\n\nmaiden,” said Peredur, “where is the Empress?” “I declare to Heaven that thou wilt not see her now, unless thou dost slay the monster that is in yonder forest.” “What monster is there?” “It is a stag that is as swift as the swiftest bird; and he has one horn in his forehead, as long as the shaft of a spear, and as sharp as whatever is sharpest."

