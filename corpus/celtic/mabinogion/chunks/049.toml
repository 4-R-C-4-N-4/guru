[content]
body = "And as he traversed the valley he beheld a horseman coming towards him, and wearing the garments of a priest; and he besought his blessing.\n\n“Wretched man,” said he, “thou meritest no blessing, and thou wouldest not be profited by one, seeing that thou art clad in armour on such a day as this.” “And what day is to-day?” said Peredur.\n\n“To-day is Good Friday,” he answered.\n\n“Chide me not that I knew not this, seeing that it is a year to-day since I journeyed forth from my country.” Then he dismounted, and led his horse in his hand.\n\nAnd he had not proceeded far along the high road before he came to a cross road, and the cross road traversed a wood.\n\nAnd on the other side of the wood he saw an unfortified castle, which appeared to be inhabited.\n\nAnd at the gate of the castle there met him the priest whom he had seen before, and he asked his blessing.\n\n“The blessing of Heaven be unto thee,” said he, “it is more fitting to travel in thy present guise than as thou wast erewhile; and this night thou shalt tarry with me.” So he remained there that night.\n\nAnd the next day Peredur sought to go forth.\n\n“To-day may no one journey.\n\nThou shalt remain with me to-day and to-morrow, and the day following, and I will direct thee as best I may to the place which thou art seeking.” And the fourth day Peredur sought to go forth, and he entreated the priest to tell him how he should find the Castle of Wonders.\n\n“What I know thereof I will tell thee,” he replied.\n\n“Go over yonder mountain, and on the other side of the mountain thou wilt come to a river, and in the valley wherein the river runs is a King’s palace, wherein the King sojourned during Easter.\n\nAnd if thou mayest have tidings anywhere of the Castle of Wonders, thou wilt have them there.” Then Peredur rode forward.\n\nAnd he came to the valley in which was the river, and there met him a number of men going to hunt, and in the midst of them was a man of exalted rank, and Peredur saluted him.\n\n“Choose, chieftain,” said the man, “whether thou wilt go with me to the chase, or wilt proceed to my palace, and I will dispatch one of my household to commend thee to my daughter, who is there, and who will entertain thee with food and liquor until I return from hunting; and whatever may be thine errand, such as I can obtain for thee thou shalt gladly have.” And the King sent a little yellow page with him as an attendant; and when they came to the palace the lady had arisen, and was about to wash before meat.\n\nPeredur went forward, and she saluted him joyfully, and placed him by her side.\n\nAnd they took their repast.\n\nAnd whatsoever Peredur said unto her, she laughed loudly, so that all in the palace could hear.\n\nThen spoke the yellow page to the lady.\n\n“By my faith,” said he, “this youth is already thy husband; or if he be not, thy mind and thy thoughts are set upon him.” And the little yellow page went unto the King, and told him that it seemed to him that the youth whom he had met with was his daughter’s husband, or if he were not so already that he would shortly become so unless he were cautious.\n\n“What is thy counsel in this matter, youth?” said the King.\n\n“My counsel is,” he replied, “that thou set strong men upon him, to seize him, until thou hast ascertained the truth respecting this.” So he set strong men upon Peredur, who seized him and cast him into prison."

