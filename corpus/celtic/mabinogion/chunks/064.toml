[content]
body = "And thy career has been successful, and fortunate, and resistless, and glorious.\n\nAnd Heaven reward thee, that thou hast so proudly caused me to have retribution.” “Lady,” said he, “I earnestly desired to obtain thee satisfaction according to thy will; and, behold, here is the maiden through whom thou hadst thy revenge.” “Verily,” said Gwenhwyvar, “the welcome of Heaven be unto her; and it is fitting that we should receive her joyfully.” Then they went in, and dismounted.\n\nAnd Geraint came to where Arthur was, and saluted him.\n\n“Heaven protect thee,” said Arthur, “and the welcome of Heaven be unto thee.\n\nAnd since Edeyrn the son of Nudd has received his overthrow and wounds from thy hands, thou hast had a prosperous career.” “Not upon me be the blame,” said Geraint, “it was through the arrogance of Edeyrn the son of Nudd himself that we were not friends.\n\nI would not quit him until I knew who he was, and until the one had vanquished the other.” “Now,” said Arthur, “where is the maiden for whom I heard thou didst give challenge?” “She is gone with Gwenhwyvar to her chamber.” Then went Arthur to see the maiden.\n\nAnd Arthur, and all his companions, and his whole Court, were glad concerning the maiden.\n\nAnd certain were they all, that had her array been suitable to her beauty, they had never seen a maid fairer than she.\n\nAnd Arthur gave away the maiden to Geraint.\n\nAnd the usual bond made between two persons was made between Geraint and the maiden, and the choicest of all Gwenhwyvar’s apparel was given to the maiden; and thus arrayed, she appeared comely and graceful to all who beheld her.\n\nAnd that day and that night were spent in abundance of minstrelsy, and ample gifts of liquor, and a multitude of games.\n\nAnd when it was time for them to go to sleep, they went.\n\nAnd in the chamber where the couch of Arthur and Gwenhwyvar was, the couch of Geraint and Enid was prepared.\n\nAnd from that time she became his bride.\n\nAnd the next day Arthur satisfied all the claimants upon Geraint with bountiful gifts.\n\nAnd the maiden took up her abode in the palace; and she had many companions, both men and women, and there was no maiden more esteemed than she in the Island of Britain.\n\nThen spake Gwenhwyvar.\n\n“Rightly did I judge,” said she, “concerning the head of the stag, that it should not be given to any until Geraint’s return; and, behold, here is a fit occasion for bestowing it.\n\nLet it be given to Enid the daughter of Ynywl, the most illustrious maiden.\n\nAnd I do not believe that any will begrudge it her, for between her and every one here there exists nothing but love and friendship.” Much applauded was this by them all, and by Arthur also.\n\nAnd the head of the stag was given to Enid.\n\nAnd thereupon her fame increased, and her friends thenceforward became more in number than before.\n\nAnd Geraint from that time forth loved the stag, and the tournament, and hard encounters; and he came victorious from them all.\n\nAnd a year, and a second, and a third, he proceeded thus, until his fame had flown over the face of the kingdom.\n\nAnd once upon a time Arthur was holding his Court at Caerlleon upon Usk, at Whitsuntide.\n\nAnd, behold, there came to him ambassadors, wise and prudent, full of knowledge, and eloquent of speech, and they saluted Arthur.\n\n“Heaven prosper you,” said Arthur, “and the welcome of Heaven be unto you."

