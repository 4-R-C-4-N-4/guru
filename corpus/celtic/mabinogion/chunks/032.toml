[content]
body = "“My sister,” said Peredur, “I will share out the food and the liquor.” “Not so, my soul,” said she.\n\n“By my faith but I will.” So Peredur took the bread, and he gave an equal portion of it to each alike, as well as a cup full of the liquor.\n\nAnd when it was time for them to sleep, a chamber was prepared for Peredur, and he went to rest.\n\n“Behold, sister,” said the youths to the fairest and most exalted of the maidens, “we have counsel for thee.” “What may it be?” she inquired.\n\n“Go to the youth that is in the upper chamber, and offer to become his wife, or the lady of his love, if it seem well to him.” “That were indeed unfitting,” said she.\n\n“Hitherto I have not been the lady-love of any knight, and to make him such an offer before I am wooed by him, that, truly, can I not do.” “By our confession to Heaven, unless thou actest thus, we will leave thee here to thy enemies, to do as they will with thee.” And through fear of this, the maiden went forth; and shedding tears, she proceeded to the chamber.\n\nAnd with the noise of the door opening, Peredur awoke; and the maiden was weeping and lamenting.\n\n“Tell me, my sister,” said Peredur, “wherefore dost thou weep?” “I will tell thee, lord,” said she.\n\n“My father possessed these dominions as their chief, and this palace was his, and with it he held the best earldom in the kingdom; then the son of another earl sought me of my father, and I was not willing to be given unto him, and my father would not give me against my will, either to him or any earl in the world.\n\nAnd my father had no child except myself.\n\nAnd after my father’s death, these dominions came into my own hands, and then was I less willing to accept him than before.\n\nSo he made war upon me, and conquered all my possessions, except this one house.\n\nAnd through the valour of the men whom thou hast seen, who are my foster-brothers, and the strength of the house, it can never be taken while food and drink remain.\n\nAnd now our provisions are exhausted; but, as thou hast seen, we have been fed by the nuns, to whom the country is free.\n\nAnd at length they also are without supply of food or liquor.\n\nAnd at no later date than to-morrow, the earl will come against this place with all his forces; and if I fall into his power, my fate will be no better than to be given over to the grooms of his horses.\n\nTherefore, lord, I am come to offer to place myself in thy hands, that thou mayest succour me, either by taking me hence, or by defending me here, whichever may seem best unto thee.” “Go, my sister,” said he, “and sleep; nor will I depart from thee until I do that which thou requirest, or prove whether I can assist thee or not.” The maiden went again to rest; and the next morning she came to Peredur, and saluted him.\n\n“Heaven prosper thee, my soul, and what tidings dost thou bring?” “None other, than that the earl and all his forces have alighted at the gate, and I never beheld any place so covered with tents, and thronged with knights challenging others to the combat.” “Truly,” said Peredur, “let my horse be made ready.” So his horse was accoutred, and he arose and sallied forth to the meadow."

