[content]
body = "And some of the dogs ran before them and came to a small bush which was near at hand; but as soon as they were come to the bush, they hastily drew back and returned to the men, their hair bristling up greatly.\n\n“Let us go near to the bush,” said Pryderi, “and see what is in it.” And as they came near, behold, a wild boar of a pure white colour rose up from the bush.\n\nThen the dogs, being set on by the men, rushed towards him; but he left the bush and fell back a little way from the men, and made a stand against the dogs without retreating from them, until the men had come near.\n\nAnd when the men came up, he fell back a second time, and betook him to flight.\n\nThen they pursued the boar until they beheld a vast and lofty castle, all newly built, in a place where they had never before seen either stone or building.\n\nAnd the boar ran swiftly into the castle and the dogs after him.\n\nNow when the boar and the dogs had gone into the castle, they began to wonder at finding a castle in a place where they had never before seen any building whatsoever.\n\nAnd from the top of the Gorsedd they looked and listened for the dogs.\n\nBut so long as they were there they heard not one of the dogs nor aught concerning them.\n\n“Lord,” said Pryderi, “I will go into the castle to get tidings of the dogs.” “Truly,” he replied, “thou wouldst be unwise to go into this castle, which thou hast never seen till now.\n\nIf thou wouldst follow my counsel, thou wouldst not enter therein.\n\nWhosoever has cast a spell over this land has caused this castle to be here.” “Of a truth,” answered Pryderi, “I cannot thus give up my dogs.” And for all the counsel that Manawyddan gave him, yet to the castle he went.\n\nWhen he came within the castle, neither man nor beast, nor boar nor dogs, nor house nor dwelling saw he within it.\n\nBut in the centre of the castle floor he beheld a fountain with marble work around it, and on the margin of the fountain a golden bowl upon a marble slab, and chains hanging from the air, to which he saw no end.\n\nAnd he was greatly pleased with the beauty of the gold, and with the rich workmanship of the bowl, and he went up to the bowl and laid hold of it.\n\nAnd when he had taken hold of it his hands stuck to the bowl, and his feet to the slab on which the howl was placed, and all his joyousness forsook him, so that he could not utter a word.\n\nAnd thus he stood.\n\nAnd Manawyddan waited for him till near the close of the day.\n\nAnd late in the evening, being certain that he should have no tidings of Pryderi or of the dogs, he went back to the palace.\n\nAnd as he entered, Rhiannon looked at him.\n\n“Where,” said she, “are thy companion and thy dogs?” “Behold,” he answered, “the adventure that has befallen me.” And he related it all unto her.\n\n“An evil companion hast thou been,” said Rhiannon, “and a good companion hast thou lost.” And with that word she went out, and proceeded towards the castle according to the direction which he gave her.\n\nThe gate of the castle she found open.\n\nShe was nothing daunted, and she went in.\n\nAnd as she went in, she perceived Pryderi laying hold of the bowl, and she went towards him."

