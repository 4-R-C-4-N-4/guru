[content]
body = "It has been robbing me, and I am inflicting upon it the doom of a thief.” “Lord,” said he, “rather than see thee touch this reptile, I would purchase its freedom.” “By my confession to Heaven, neither will I sell it nor set it free.” “It is true, lord, that it is worth nothing to buy; but rather than see thee defile thyself by touching such a reptile as this, I will give thee three pounds to let it go.” “I will not, by Heaven,” said he, “take any price for at.\n\nAs it ought, so shall it be hanged.” “Willingly, lord, do thy good pleasure.” And the priest went his way.\n\nThen he noosed the string around the mouse’s neck, and as he was about to draw it up, behold, he saw a bishop’s retinue with his sumpter-horses, and his attendants.\n\nAnd the bishop himself came towards him.\n\nAnd he stayed his work.\n\n“Lord bishop,” said he, “thy blessing.” “Heaven’s blessing be unto thee,” said he; “what work art thou upon?” “Hanging a thief that I caught robbing me,” said he.\n\n“Is not that a mouse that I see in thy hand?” “Yes,” answered he.\n\n“And she has robbed me.” “Aye,” said he, “since I have come at the doom of this reptile, I will ransom it of thee.\n\nI will give thee seven pounds for it, and that rather than see a man of rank equal to thine destroying so vile a reptile as this.\n\nLet it loose and thou shalt have the money.” “I declare to Heaven that I will not set it loose.” “If thou wilt not loose it for this, I will give thee four-and-twenty pounds of ready money to set it free.” “I will not set it free, by Heaven, for as much again,” said he.\n\n“If thou wilt not set it free for this, I will give thee all the horses that thou seest in this plain, and the seven loads of baggage, and the seven horses that they are upon.” “By Heaven, I will not,” he replied.\n\n“Since for this thou wilt not, do so at what price soever thou wilt.” “I will do so,” said he.\n\n“I will that Rhiannon and Pryderi be free,” said he.\n\n“That thou shalt have,” he answered.\n\n“Not yet will I loose the mouse, by Heaven.” “What then wouldst thou?” “That the charm and the illusion be removed from the seven Cantrevs of Dyved.” “This shalt thou have also; set therefore the mouse free.” “I will not set it free, by Heaven,” said he.\n\n“I will know who the mouse may be.” “She is my wife.” “Even though she be, I will not set her free.\n\nWherefore came she to me?” “To despoil thee,” he answered.\n\n“I am Llwyd the son of Kilcoed, and I cast the charm over the seven Cantrevs of Dyved.\n\nAnd it was to avenge Gwawl the son of Clud, from the friendship I had towards him, that I cast the charm.\n\nAnd upon Pryderi did I revenge Gwawl the son of Clud, for the game of Badger in the Bag, that Pwyll Pen Annwvyn played upon him, which he did unadvisedly in the Court of Heveydd Hên.\n\nAnd when it was known that thou wast come to dwell in the land, my household came and besought me to transform them into mice, that they might destroy thy corn.\n\nAnd it was my own household that went the first night.\n\nAnd the second night also they went, and they destroyed thy two crofts."

