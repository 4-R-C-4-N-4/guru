[content]
body = "Throughout the world there is not a leash that can hold him, except the leash of Cwrs Cant Ewin.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get.\n\nThroughout the world there is no collar that will hold the leash except the collar of Canhastyr Canllaw.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get.\n\nThe chain of Kilydd Canhastyr to fasten the collar to the leash.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get.\n\nThroughout the world there is not a huntsman who can hunt with this dog, except Mabon the son of Modron.\n\nHe was taken from his mother when three nights old, and it is not known where he now is, nor whether he is living or dead.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get.\n\nGwynn Mygdwn, the horse of Gweddw, that is as swift as the wave, to carry Mabon the son of Modron to hunt the boar Trwyth.\n\nHe will not give him of his own free will, and thou wilt not be able to compel him.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get.\n\nThou wilt not get Mabon, for it is not known where he is, unless thou find Eidoel, his kinsman in blood, the son of Aer.\n\nFor it would be useless to seek for him.\n\nHe is his cousin.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get.\n\nGarselit the Gwyddelian is the chief huntsman of Ireland; the Twrch Trwyth can never be hunted without him.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get.\n\nA leash made from the beard of Dillus Varvawc, for that is the only one that can hold those two cubs.\n\nAnd the leash will be of no avail unless it be plucked from his beard while he is alive, and twitched out with wooden tweezers.\n\nWhile he lives he will not suffer this to be done to him, and the leash will be of no use should he be dead, because it will be brittle.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get.\n\nThroughout the world there is no huntsman that can hold those two whelps except Kynedyr Wyllt, the son of Hettwn Glafyrawc; he is nine times more wild than the wildest beast upon the mountains.\n\nHim wilt thou never get, neither wilt thou ever get my daughter.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get."

