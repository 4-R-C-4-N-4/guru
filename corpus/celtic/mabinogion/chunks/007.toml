[content]
body = "And they had daggers with blades of gold, and with hilts of the bone of the whale.\n\nAnd they were shooting their daggers.\n\n“And a little way from them I saw a man in the prime of life, with his beard newly shorn, clad in a robe and a mantle of yellow satin; and round the top of his mantle was a band of gold lace.\n\nOn his feet were shoes of variegated leather, fastened by two bosses of gold.\n\nWhen I saw him, I went towards him and saluted him, and such was his courtesy that he no sooner received my greeting than he returned it.\n\nAnd he went with me towards the Castle.\n\nNow there were no dwellers in the Castle except those who were in one hall.\n\nAnd there I saw four-and-twenty damsels, embroidering satin at a window.\n\nAnd this I tell thee, Kai, that the least fair of them was fairer than the fairest maid thou hast ever beheld in the Island of Britain, and the least lovely of them was more lovely than Gwenhwyvar, the wife of Arthur, when she has appeared loveliest at the Offering, on the day of the Nativity, or at the feast of Easter.\n\nThey rose up at my coming, and six of them took my horse, and divested me of my armour; and six others took my arms, and washed them in a vessel until they were perfectly bright.\n\nAnd the third six spread cloths upon the tables and prepared meat.\n\nAnd the fourth six took off my soiled garments, and placed others upon me; namely, an under-vest and a doublet of fine linen, and a robe, and a surcoat, and a mantle of yellow satin with a broad gold band upon the mantle.\n\nAnd they placed cushions both beneath and around me, with coverings of red linen; and I sat down.\n\nNow the six maidens who had taken my horse, unharnessed him, as well as if they had been the best squires in the Island of Britain.\n\nThen, behold, they brought bowls of silver wherein was water to wash, and towels of linen, some green and some white; and I washed.\n\nAnd in a little while the man sat down to the table.\n\nAnd I sat next to him, and below me sat all the maidens, except those who waited on us.\n\nAnd the table was of silver, and the cloths upon the table were of linen; and no vessel was served upon the table that was not either of gold or of silver, or of buffalo-horn.\n\nAnd our meat was brought to us.\n\nAnd verily, Kai, I saw there every sort of meat and every sort of liquor that I have ever seen elsewhere; but the meat and the liquor were better served there than I have ever seen them in any other place.\n\n“Until the repast was half over, neither the man nor any one of the damsels spoke a single word to me; but when the man perceived that it would be more agreeable to me to converse than to eat any more, he began to inquire of me who I was.\n\nI said I was glad to find that there was some one who would discourse with me, and that it was not considered so great a crime at that Court for people to hold converse together.\n\n‘Chieftain,’ said the man, ‘we would have talked to thee sooner, but we feared to disturb thee during thy repast; now, however, we will discourse.’ Then I told the man who I was, and what was the cause of my journey; and said that I was seeking whether any one was superior to me, or whether I could gain the mastery over all."

