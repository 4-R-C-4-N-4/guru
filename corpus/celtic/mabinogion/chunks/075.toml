[content]
body = "And Geraint drew near to him; and at the noise of the trampling of his horse the Earl revived.\n\n“Mercy, Lord,” said he to Geraint.\n\nAnd Geraint granted him mercy.\n\nBut through the hardness of the ground where they had fallen, and the violence of the stroke which they had received, there was not a single knight amongst them that escaped without receiving a fall, mortally severe, and grievously painful, and desperately wounding, from the hand of Geraint.\n\nAnd Geraint journeyed along the high road that was before him, and the maiden went on first; and near them they beheld a valley which was the fairest ever seen, and which had a large river running through it; and there was a bridge over the river, and the high road led to the bridge.\n\nAnd above the bridge upon the opposite side of the river, they beheld a fortified town, the fairest ever seen.\n\nAnd as they approached the bridge, Geraint saw coming towards him from a thick copse a man mounted upon a large and lofty steed, even of pace and spirited though tractable.\n\n“Ah, knight,” said Geraint, “whence comest thou?” “I come,” said he, “from the valley below us.” “Canst thou tell me,” said Geraint, “who is the owner of this fair valley and yonder walled town?” “I will tell thee, willingly,” said he.\n\n“Gwiffert Petit he is called by the Franks, but the Cymry call him the Little King.” “Can I go by yonder bridge,” said Geraint, “and by the lower highway that is beneath the town?” Said the knight, “Thou canst not go by his tower on the other side of the bridge, unless thou dost intend to combat him; because it is his custom to encounter every knight that comes upon his lands.” “I declare to Heaven,” said Geraint, “that I will, nevertheless, pursue my journey that way.” “If thou dost so,” said the knight, “thou wilt probably meet with shame and disgrace in reward for thy daring.” Then Geraint proceeded along the road that led to the town, and the road brought him to a ground that was hard, and rugged, and high, and ridgy.\n\nAnd as he journeyed thus, he beheld a knight following him upon a warhorse, strong, and large, and proudly-stepping, and wide-hoofed, and broad-chested.\n\nAnd he never saw a man of smaller stature than he who was upon the horse.\n\nAnd both he and his horse were completely armed.\n\nWhen he had overtaken Geraint, he said to him, “Tell me, chieftain, whether it is through ignorance or through presumption that thou seekest to insult my dignity, and to infringe my rules.” “Nay,” answered Geraint, “I knew not this road was forbid to any.” “Thou didst know it,” said the other; “come with me to my Court, to give me satisfaction.” “That will I not, by my faith,” said Geraint; “I would not go even to thy Lord’s Court, excepting Arthur were thy Lord.” “By the hand of Arthur himself,” said the knight, “I will have satisfaction of thee, or receive my overthrow at thy hands.” And immediately they charged one another.\n\nAnd a squire of his came to serve him with lances as he broke them.\n\nAnd they gave each other such hard and severe strokes that their shields lost all their colour.\n\nBut it was very difficult for Geraint to fight with him on account of his small size, for he was hardly able to get a full aim at him with all the efforts he could make."

