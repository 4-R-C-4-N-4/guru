[content]
body = "And following the train, he beheld a lady with yellow hair falling over her shoulders, and stained with blood; and about her a dress of yellow satin, which was torn.\n\nUpon her feet were shoes of variegated leather.\n\nAnd it was a marvel that the ends of her fingers were not bruised, from the violence with which she smote her hands together.\n\nTruly she would have been the fairest lady Owain ever saw, had she been in her usual guise.\n\nAnd her cry was louder than the shout of the men, or the clamour of the trumpets.\n\nNo sooner had he beheld the lady, than he became inflamed with her love, so that it took entire possession of him.\n\nThen he inquired of the maiden who the lady was.\n\n“Heaven knows,” replied the maiden, “she may be said to be the fairest, and the most chaste, and the most liberal, and the wisest, and the most noble of women.\n\nAnd she is my mistress; and she is called the Countess of the Fountain, the wife of him whom thou didst slay yesterday.” “Verily,” said Owain, “she is the woman that I love best.” “Verily,” said the maiden, “she shall also love thee not a little.” And with that the maid arose, and kindled a fire, and filled a pot with water, and placed it to warm; and she brought a towel of white linen, and placed it around Owain’s neck; and she took a goblet of ivory, and a silver basin, and filled them with warm water, wherewith she washed Owain’s head.\n\nThen she opened a wooden casket, and drew forth a razor, whose haft was of ivory, and upon which were two rivets of gold.\n\nAnd she shaved his beard, and she dried his head, and his throat, with the towel.\n\nThen she rose up from before Owain, and brought him to eat.\n\nAnd truly Owain had never so good a meal, nor was he ever so well served.\n\nWhen he had finished his repast, the maiden arranged his couch.\n\n“Come here,” said she, “and sleep, and I will go and woo for thee.” And Owain went to sleep, and the maiden shut the door of the chamber after her, and went towards the Castle.\n\nWhen she came there, she found nothing but mourning, and sorrow; and the Countess in her chamber could not bear the sight of any one through grief.\n\nLuned came and saluted her, but the Countess answered her not.\n\nAnd the maiden bent down towards her, and said, “What aileth thee, that thou answerest no one to-day?” “Luned,” said the Countess, “what change hath befallen thee, that thou hast not come to visit me in my grief?\n\nIt was wrong in thee, and I having made thee rich; it was wrong in thee that thou didst not come to see me in my distress.\n\nThat was wrong in thee.” “Truly,” said Luned, “I thought thy good sense was greater than I find it to be.\n\nIs it well for thee to mourn after that good man, or for anything else, that thou canst not have?” “I declare to heaven,” said the Countess, “that in the whole world there is not a man equal to him.” “Not so,” said Luned, “for an ugly man would be as good as, or better than he.” “I declare to heaven,” said the Countess, “that were it not repugnant to me to cause to be put to death one whom I have brought up, I would have thee executed, for making such a comparison to me."

