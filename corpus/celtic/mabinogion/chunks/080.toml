[content]
body = "Thereupon she raised a loud and piercing shriek, and her lamentations were much greater than they had been before, for she considered in her mind that had Geraint been alive, he durst not have struck her thus.\n\nBut, behold, at the sound of her cry, Geraint revived from his swoon, and he sat up on the bier, and finding his sword in the hollow of his shield, he rushed to the place where the Earl was, and struck him a fiercely-wounding, severely-venomous, and sternly-smiting blow upon the crown of his head, so that he clove him in twain, until his sword was stayed by the table.\n\nThen all left the board, and fled away.\n\nAnd this was not so much through fear of the living as through the dread they felt at seeing the dead man rise up to slay them.\n\nAnd Geraint looked upon Enid, and he was grieved for two causes; one was, to see that Enid had lost her colour and her wonted aspect, and the other, to know that she was in the right.\n\n“Lady,” said he, “knowest thou where our horses are?” “I know, Lord, where thy horse is,” she replied, “but I know not where is the other.\n\nThy horse is in the house yonder.” So he went to the house, and brought forth his horse, and mounted him, and took up Enid from the ground, and placed her upon the horse with him.\n\nAnd he rode forward.\n\nAnd their road lay between two hedges.\n\nAnd the night was gaining on the day.\n\nAnd lo!\n\nthey saw behind them the shafts of spears betwixt them and the sky, and they heard the trampling of horses, and the noise of a host approaching.\n\n“I hear something following us,” said he, “and I will put thee on the other side of the hedge.” And thus he did.\n\nAnd thereupon, behold, a knight pricked towards him, and couched his lance.\n\nWhen Enid saw this, she cried out, saying, “Oh!\n\nchieftain, whoever thou art, what renown wilt thou gain by slaying a dead man?” “Oh!\n\nHeaven,” said he, “is it Geraint?” “Yes, in truth,” said she.\n\n“And who art thou?” “I am the Little King,” he answered, “coming to thy assistance, for I heard that thou wast in trouble.\n\nAnd if thou hadst followed my advice, none of these hardships would have befallen thee.” “Nothing can happen,” said Geraint, “without the will of Heaven, though much good results from counsel.” “Yes,” said the Little King, “and I know good counsel for thee now.\n\nCome with me to the court of a son-in-law of my sister, which is near here, and thou shalt have the best medical assistance in the kingdom.” “I will do so gladly,” said Geraint.\n\nAnd Enid was placed upon the horse of one of the Little King’s squires, and they went forward to the Baron’s palace.\n\nAnd they were received there with gladness, and they met with hospitality and attention.\n\nAnd the next morning they went to seek physicians; and it was not long before they came, and they attended Geraint until he was perfectly well.\n\nAnd while Geraint was under medical care, the Little King caused his armour to be repaired, until it was as good as it had ever been.\n\nAnd they remained there a fortnight and a month."

