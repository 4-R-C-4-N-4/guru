[content]
body = "Now the names of these seven men were, Caradawc the son of Bran, and Heveydd Hir, and Unic Glew Ysgwyd, and Iddic the son of Anarawc Gwalltgrwn, and Fodor the son of Ervyll, and Gwlch Minascwrn, and Llassar the son of Llaesar Llaesgygwyd, and Pendaran Dyved as a young page with them.\n\nAnd these abode as seven ministers to take charge of this island; and Caradawc the son of Bran was the chief amongst them.\n\nBendigeid Vran, with the host of which we spoke, sailed towards Ireland, and it was not far across the sea, and he came to shoal water.\n\nIt was caused by two rivers; the Lli and the Archan were they called; and the nations covered the sea.\n\nThen he proceeded with what provisions he had on his own back, and approached the shore of Ireland.\n\nNow the swineherds of Matholwch were upon the seashore, and they came to Matholwch.\n\n“Lord,” said they, “greeting be unto thee.” “Heaven protect you,” said he, “have you any news?” “Lord,” said they, “we have marvellous news, a wood have we seen upon the sea, in a place where we never yet saw a single tree.” “This is indeed a marvel,” said he; “saw you aught else?” “We saw, lord,” said they, “a vast mountain beside the wood, which moved, and there was a lofty ridge on the top of the mountain, and a lake on each side of the ridge.\n\nAnd the wood, and the mountain, and all these things moved.” “Verily,” said he, “there is none who can know aught concerning this, unless it be Branwen.” Messengers then went unto Branwen.\n\n“Lady,” said they, “what thinkest thou that this is?” “The men of the Island of the Mighty, who have come hither on hearing of my ill-treatment and my woes.” “What is the forest that is seen upon the sea?” asked they.\n\n“The yards and the masts of ships,” she answered.\n\n“Alas,” said they, “what is the mountain that is seen by the side of the ships?” “Bendigeid Vran, my brother,” she replied, “coming to shoal water; there is no ship that can contain him in it.” “What is the lofty ridge with the lake on each side thereof?” “On looking towards this island he is wroth, and his two eyes, one on each side of his nose, are the two lakes beside the ridge.” The warriors and the chief men of Ireland were brought together in haste, and they took counsel.\n\n“Lord,” said the nobles unto Matholwch, “there is no other counsel than to retreat over the Linon (a river which is in Ireland), and to keep the river between thee and him, and to break down the bridge that is across the river, for there is a loadstone at the bottom of the river that neither ship nor vessel can pass over.” So they retreated across the river, and broke down the bridge.\n\nBendigeid Vran came to land, and the fleet with him by the bank of the river.\n\n“Lord,” said his chieftains, “knowest thou the nature of this river, that nothing can go across it, and there is no bridge over it?” “What,” said they, “is thy counsel concerning a bridge?” “There is none,” said he, “except that he who will be chief, let him be a bridge.\n\nI will be so,” said he."

