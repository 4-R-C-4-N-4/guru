[content]
body = "Garanwyn the son of Kai, and Amren the son of Bedwyr, and Ely Amyr, and Rheu Rhwyd Dyrys, and Rhun Rhudwern, and Eli, and Trachmyr (Arthur’s chief huntsmen).\n\nAnd Llwyddeu the son of Kelcoed, and Hunabwy the son of Gwryon, and Gwynn Godyvron, and Gweir Datharwenniddawg, and Gweir the son of Cadell the son of Talaryant, and Gweir Gwrhyd Ennwir, and Gweir Paladyr Hir (the uncles of Arthur, the brothers of his mother).\n\nThe sons of Llwch Llawwynnyawg (from beyond the raging sea).\n\nLlenlleawg Wyddel, and Ardderchawg Prydain.\n\nCas the son of Saidi, Gwrvan Gwallt Avwyn, and Gwyllennhin the king of France, and Gwittart the son of Oedd king of Ireland.\n\nGarselit Wyddel, Panawr Pen Bagad, and Ffleudor the son of Nav, Gwynnhyvar mayor of Cornwall and Devon (the ninth man that rallied the battle of Camlan).\n\nKeli and Kueli, and Gilla Coes Hydd (he would clear three hundred acres at one bound: the chief leaper of Ireland was he).\n\nSol, and Gwadyn Ossol, and Gwadyn Odyeith.\n\n(Sol could stand all day upon one foot.\n\nGwadyn Ossol, if he stood upon the top of the highest mountain in the world, it would become a level plain under his feet.\n\nGwadyn Odyeith, the soles of his feet emitted sparks of fire when they struck upon things hard, like the heated mass when drawn out of the forge.\n\nHe cleared the way for Arthur when he came to any stoppage.) Hirerwm and Hiratrwm.\n\n(The day they went on a visit three Cantrevs provided for their entertainment, and they feasted until noon and drank until night, when they went to sleep.\n\nAnd then they devoured the heads of the vermin through hunger, as if they had never eaten anything.\n\nWhen they made a visit they left neither the fat nor the lean, neither the hot nor the cold, the sour nor the sweet, the fresh nor the salt, the boiled nor the raw.) Huarwar the son of Aflawn (who asked Arthur such a boon as would satisfy him.\n\nIt was the third great plague of Cornwall when he received it.\n\nNone could get a smile from him but when he was satisfied).\n\nGware Gwallt Euryn.\n\nThe two cubs of Gast Rhymi, Gwyddrud and Gwyddneu Astrus.\n\nSugyn the son of Sugnedydd (who would suck up the sea on which were three hundred ships so as to leave nothing but a dry strand.\n\nHe was broad-chested).\n\nRhacymwri, the attendant of Arthur (whatever barn he was shown, were there the produce of thirty ploughs within it, he would strike it with an iron flail until the rafters, the beams, and the boards were no better than the small oats in the mow upon the floor of the barn).\n\nDygyflwng and Anoeth Veidawg.\n\nAnd Hir Eiddyl, and Hir Amreu (they were two attendants of Arthur).\n\nAnd Gwevyl the son of Gwestad (on the day that he was sad, he would let one of his lips drop below his waist, while he turned up the other like a cap upon his head)."

