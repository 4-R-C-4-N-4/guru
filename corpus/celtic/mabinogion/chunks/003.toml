[content]
body = "This contains, besides poems, the prose romances known as Mabinogion.\n\nThe Black Book of Caermarthen, preserved at Hengwrt, and considered not to be of later date than the twelfth century, is said to contain poems only.\n\n[1] The Mabinogion, however, though thus early recorded in the Welsh tongue, are in their existing form by no means wholly Welsh.\n\nThey are of two tolerably distinct classes.\n\nOf these, the older contains few allusions to Norman customs, manners, arts, arms, and luxuries.\n\nThe other, and less ancient, are full of such allusions, and of ecclesiastical terms.\n\nBoth classes, no doubt, are equally of Welsh root, but the former are not more overlaid or corrupted, than might have been expected, from the communication that so early took place between the Normans and the Welsh; whereas the latter probably migrated from Wales, and were brought back and re-translated after an absence of centuries, with a load of Norman additions.\n\nKilhwch and Olwen, and the dream of Rhonabwy, may be cited as examples of the older and purer class; the Lady of the Fountain, Peredur, and Geraint ab Erbin, of the later, or decorated.\n\nBesides these, indeed, there are a few tales, as Amlyn and Amic, Sir Bevis of Hamtoun, the Seven Wise Masters, and the story of Charlemagne, so obviously of foreign extraction, and of late introduction into Wales, not presenting even a Welsh name, or allusion, and of such very slender intrinsic merit, that although comprised in the Llyvr Coch, they have not a shadow of claim to form part of the Canon of Welsh Romance.\n\nTherefore, although I have translated and examined them, I have given them no place in these volumes.\n\nThere is one argument in favour of the high antiquity in Wales of many of the Mabinogion, which deserves to be mentioned here.\n\nThis argument is founded on the topography of the country.\n\nIt is found that Saxon names of places are very frequently definitions of the nature of the locality to which they are attached, as Clifton, Deepden, Bridge-ford, Thorpe, Ham, Wick, and the like; whereas those of Wales are more frequently commemorative of some event, real or supposed, said to have happened on or near the spot, or bearing allusion to some person renowned in the story of the country or district.\n\nSuch are “Llyn y Morwynion,” the Lake of the Maidens; “Rhyd y Bedd,” the Ford of the Grave; “Bryn Cyfergyr,” the Hill of Assault; and so on.\n\nBut as these names could not have preceded the events to which they refer, the events themselves must be not unfrequently as old as the early settlement in the country.\n\nAnd as some of these events and fictions are the subjects of, and are explained by, existing Welsh legends, it follows that the legends must be, in some shape or other, of very remote antiquity.\n\nIt will be observed that this argument supports remote antiquity only for such legends as are connected with the greater topographical features, as mountains, lakes, rivers, seas, which must have been named at an early period in the inhabitation of the country by man."

