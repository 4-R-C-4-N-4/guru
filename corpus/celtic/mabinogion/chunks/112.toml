[content]
body = "And Kacmwri caught her by the hair of her head, and dragged her to the earth from off Hygwyd, but she turned again upon them both, and drove them both out with kicks and with cuffs.\n\nAnd Arthur was wroth at seeing his two attendants almost slain, and he sought to enter the cave; but Gwyn and Gwythyr said unto him, “It would not be fitting or seemly for us to see thee squabbling with a hag.\n\nLet Hiramreu and Hireidil go to the cave.” So they went.\n\nBut if great was the trouble of the first two that went, much greater was that of these two.\n\nAnd Heaven knows that not one of the four could move from the spot, until they placed them all upon Llamrei, Arthur’s mare.\n\nAnd then Arthur rushed to the door of the cave, and at the door he struck at the witch, with Carnwennan his dagger, and clove her in twain, so that she fell in two parts.\n\nAnd Kaw, of North Britain, took the blood of the witch and kept it.\n\nThen Kilhwch set forward, and Goreu the son of Custennin with him, and as many as wished ill to Yspaddaden Penkawr.\n\nAnd they took the marvels with them to his court.\n\nAnd Kaw of North Britain came and shaved his beard, skin, and flesh clean off to the very bone from ear to ear.\n\n“Art thou shaved, man?” said Kilhwch.\n\n“I am shaved,” answered he.\n\n“Is thy daughter mine now?” “She is thine,” said he, “but therefore needest thou not thank me, but Arthur who hath accomplished this for thee.\n\nBy my free will thou shouldest never have had her, for with her I lose my life.” Then Goreu the son of Custennin seized him by the hair of his head, and dragged him after him to the keep, and cut off his head and placed it on a stake on the citadel.\n\nThen they took possession of his castle, and of his treasures.\n\nAnd that night Olwen became Kilhwch’s bride, and she continued to be his wife as long as she lived.\n\nAnd the hosts of Arthur dispersed themselves, each man to his own country.\n\nAnd thus did Kilhwch obtain Olwen, the daughter of Yspaddaden Penkawr."

