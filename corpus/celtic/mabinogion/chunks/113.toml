[content]
body = "Madawc the son of Maredudd possessed Powys within its boundaries, from Porfoed to Gwauan in the uplands of Arwystli.\n\nAnd at that time he had a brother, Iorwerth the son of Maredudd, in rank not equal to himself.\n\nAnd Iorwerth had great sorrow and heaviness because of the honour and power that his brother enjoyed, which he shared not.\n\nAnd he sought his fellows and his foster-brothers, and took counsel with them what he should do in this matter.\n\nAnd they resolved to dispatch some of their number to go and seek a maintenance for him.\n\nThen Madawc offered him to become Master of the Household and to have horses, and arms, and honour, and to fare like as himself.\n\nBut Iorwerth refused this.\n\nAnd Iorwerth made an inroad into Loegria, slaying the inhabitants, and burning houses, and carrying away prisoners.\n\nAnd Madawc took counsel with the men of Powys, and they determined to place an hundred men in each of the three Commots of Powys to seek for him.\n\nAnd thus did they in the plains of Powys from Aber Ceirawc, and in Allictwn Ver, and in Rhyd Wilure, on the Vyrnwy, the three best Commots of Powys.\n\nSo he was none the better, he nor his household, in Powys, nor in the plains thereof.\n\nAnd they spread these men over the plains as far as Nillystwn Trevan.\n\nNow one of the men who was upon this quest was called Rhonabwy.\n\nAnd Rhonabwy and Kynwrig Vrychgoch, a man of Mawddwy, and Cadwgan Vras, a man of Moelvre in Kynlleith, came together to the house of Heilyn Goch the son of Cadwgan the son of Iddon.\n\nAnd when they came near to the house, they saw an old hall, very black and having an upright gable, whence issued a great smoke; and on entering, they found the floor full of puddles and mounds; and it was difficult to stand thereon, so slippery was it with the mire of cattle.\n\nAnd where the puddles were, a man might go up to his ankles in water and dirt.\n\nAnd there were boughs of holly spread over the floor, whereof the cattle had browsed the sprigs.\n\nWhen they came to the hall of the house, they beheld cells full of dust, and very gloomy, and on one side an old hag making a fire.\n\nAnd whenever she felt cold, she cast a lapful of chaff upon the fire, and raised such a smoke, that it was scarcely to be borne, as it rose up the nostrils.\n\nAnd on the other side was a yellow calf-skin on the floor; a main privilege was it to any one who should get upon that hide.\n\nAnd when they had sat down, they asked the hag where were the people of the house.\n\nAnd the hag spoke not, but muttered.\n\nThereupon behold the people of the house entered; a ruddy, clownish, curly-headed man, with a burthen of faggots on his back, and a pale slender woman, also carrying a bundle under her arm.\n\nAnd they barely welcomed the men, and kindled a fire with the boughs.\n\nAnd the woman cooked something, and gave them to eat, barley bread, and cheese, and milk and water.\n\nAnd there arose a storm of wind and rain, so that it was hardly possible to go forth with safety.\n\nAnd being weary with their journey, they laid themselves down and sought to sleep."

