[content]
body = "But first I will cause thee to have compensation, and then will I have amends made unto myself.\n\nAs for thee, I will take thee to be my wife, and the possession of my dominions will I give unto thy hands.” And Gwydion and Gilvaethwy came not near the Court, but stayed in the confines of the land until it was forbidden to give them meat and drink.\n\nAt first they came not near unto Math, but at the last they came.\n\n“Lord,” said they, “good day to thee.” “Well,” said he, “is it to make me compensation that ye are come?” “Lord,” they said, “we are at thy will.” “By my will I would not have lost my warriors, and so many arms as I have done.\n\nYou cannot compensate me my shame, setting aside the death of Pryderi.\n\nBut since ye come hither to be at my will, I shall begin your punishment forthwith.” Then he took his magic wand, and struck Gilvaethwy, so that he became a deer, and he seized upon the other hastily lest he should escape from him.\n\nAnd he struck him with the same magic wand, and he became a deer also.\n\n“Since now ye are in bonds, I will that ye go forth together and be companions, and possess the nature of the animals whose form ye bear.\n\nAnd this day twelvemonth come hither unto me.” At the end of a year from that day, lo there was a loud noise under the chamber wall, and the barking of the dogs of the palace together with the noise.\n\n“Look,” said he, “what is without.” “Lord,” said one, “I have looked; there are there two deer, and a fawn with them.” Then he arose and went out.\n\nAnd when he came he beheld the three animals.\n\nAnd he lifted up his wand.\n\n“As ye were deer last year, be ye wild hogs each and either of you, for the year that is to come.” And thereupon he struck them with the magic wand.\n\n“The young one will I take and cause to be baptized.” Now the name that he gave him was Hydwn.\n\n“Go ye and be wild swine, each and either of you, and be ye of the nature of wild swine.\n\nAnd this day twelvemonth be ye here under the wall.” At the end of the year the barking of dogs was heard under the wall of the chamber.\n\nAnd the Court assembled, and thereupon he arose and went forth, and when he came forth he beheld three beasts.\n\nNow these were the beasts that he saw; two wild hogs of the woods, and a well-grown young one with them.\n\nAnd he was very large for his age.\n\n“Truly,” said Math, “this one will I take and cause to be baptized.” And he struck him with his magic wand, and he become a fine fair auburn-haired youth, and the name that he gave him was Hychdwn.\n\n“Now as for you, as ye were wild hogs last year, be ye wolves each and either of you for the year that is to come.” Thereupon he struck them with his magic wand, and they became wolves.\n\n“And be ye of like nature with the animals whose semblance ye bear, and return here this day twelvemonth beneath this wall.” And at the same day at the end of the year, he heard a clamour and a barking of dogs under the wall of the chamber.\n\nAnd he rose and went forth.\n\nAnd when he came, behold, he saw two wolves, and a strong cub with them.\n\n“This one will I take,” said Math, “and I will cause him to be baptized; there is a name prepared for him, and that is Bleiddwn."

