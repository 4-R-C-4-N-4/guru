[content]
body = "Swine are they now called.” “Who owneth them?” “Pryderi the son of Pwyll; they were sent him from Annwvyn, by Arawn the king of Annwvyn, and still they keep that name, half hog, half pig.” “Verily,” asked he, “and by what means may they be obtained from him?” “I will go, lord, as one of twelve, in the guise of bards, to seek the swine.” “But it may be that he will refuse you,” said he.\n\n“My journey will not be evil, lord,” said he; “I will not come back without the swine.” “Gladly,” said he, “go thou forward.” So he and Gilvaethwy went, and ten other men with them.\n\nAnd they came into Ceredigiawn, to the place that is now called Rhuddlan Teivi, where the palace of Pryderi was.\n\nIn the guise of bards they came in, and they were received joyfully, and Gwydion was placed beside Pryderi that night.\n\n“Of a truth,” said Pryderi, “gladly would I have a tale from some of your men yonder.” “Lord,” said Gwydion, “we have a custom that the first night that we come to the Court of a great man, the chief of song recites.\n\nGladly will I relate a tale.” Now Gwydion was the best teller of tales in the world, and he diverted all the Court that night with pleasant discourse and with tales, so that he charmed every one in the Court, and it pleased Pryderi to talk with him.\n\nAnd after this, “Lord,” said he unto Pryderi, “were it more pleasing to thee, that another should discharge my errand unto thee, than that I should tell thee myself what it is?” “No,” he answered, “ample speech hast thou.” “Behold then, lord,” said he, “my errand.\n\nIt is to crave from thee the animals that were sent thee from Annwvyn.” “Verily,” he replied, “that were the easiest thing in the world to grant, were there not a covenant between me and my land concerning them.\n\nAnd the covenant is that they shall not go from me, until they have produced double their number in the land.” “Lord,” said he, “I can set thee free from those words, and this is the way I can do so; give me not the swine to-night, neither refuse them unto me, and to-morrow I will show thee an exchange for them.” And that night he and his fellows went unto their lodging, and they took counsel.\n\n“Ah, my men,” said he, “we shall not have the swine for the asking.” “Well,” said they, “how may they be obtained?” “I will cause them to be obtained,” said Gwydion.\n\nThen he betook himself to his arts, and began to work a charm.\n\nAnd he caused twelve chargers to appear, and twelve black greyhounds, each of them white-breasted, and having upon them twelve collars and twelve leashes, such as no one that saw them could know to be other than gold.\n\nAnd upon the horses twelve saddles, and every part which should have been of iron was entirely of gold, and the bridles were of the same workmanship.\n\nAnd with the horses and the dogs he came to Pryderi.\n\n“Good day unto thee, lord,” said he.\n\n“Heaven prosper thee,” said the other, “and greetings be unto thee.” “Lord,” said he, “behold here is a release for thee from the word which thou spakest last evening concerning the swine; that thou wouldst neither give nor sell them."

