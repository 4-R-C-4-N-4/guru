[content]
body = "And if thou doest right, thou wilt not meddle with the creature, but wilt let it go.” “Woe betide me,” said he, “if I would not hang them all could I catch them, and such as I have I will hang.” “Verily, lord,” said she, “there is no reason that I should succour this reptile, except to prevent discredit unto thee.\n\nDo therefore, lord, as thou wilt.” “If I knew of any cause in the world wherefore thou shouldst succour it, I would take thy counsel concerning it,” said Manawyddan, “but as I know of none, lady, I am minded to destroy it.” “Do so willingly then,” said she.\n\nAnd then he went to the Gorsedd of Narberth, taking the mouse with him.\n\nAnd he set up two forks on the highest part of the Gorsedd.\n\nAnd while he was doing this, behold he saw a scholar coming towards him, in old and poor and tattered garments.\n\nAnd it was now seven years since he had seen in that place either man or beast, except those four persons who had remained together until two of them were lost.\n\n“My lord,” said the scholar, “good day to thee.” “Heaven prosper thee, and my greeting be unto thee.\n\nAnd whence dost thou come, scholar?” asked he.\n\n“I come, lord, from singing in Lloegyr; and wherefore dost thou inquire?” “Because for the last seven years,” answered he, “I have seen no man here save four secluded persons, and thyself this moment.” “Truly, lord,” said he, “I go through this land unto mine own.\n\nAnd what work art thou upon, lord?” “I am hanging a thief that I caught robbing me,” said he.\n\n“What manner of thief is that?” asked the scholar.\n\n“I see a creature in thy hand like unto a mouse, and ill does it become a man of rank equal to thine to touch a reptile such as this.\n\nLet it go forth free.” “I will not let it go free, by Heaven,” said he; “I caught it robbing me, and the doom of a thief will I inflict upon it, and I will hang it.” “Lord,” said he, “rather than see a man of rank equal to thine at such a work as this, I would give thee a pound which I have received as alms, to let the reptile go forth free.” “I will not let it go free,” said he, “by Heaven, neither will I sell it.” “As thou wilt, lord,” he answered; “except that I would not see a man of rank equal to thine touching such a reptile, I care nought.” And the scholar went his way.\n\nAnd as he was placing the crossbeam upon the two forks, behold a priest came towards him upon a horse covered with trappings.\n\n“Good day to thee, lord,” said he.\n\n“Heaven prosper thee,” said Manawyddan; “thy blessing.” “The blessing of Heaven be upon thee.\n\nAnd what, lord, art thou doing?” “I am hanging a thief that I caught robbing me,” said he.\n\n“What manner of thief, lord?” asked he.\n\n“A creature,” he answered, “in form of a mouse."

