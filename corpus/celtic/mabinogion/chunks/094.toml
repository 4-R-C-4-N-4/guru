[content]
body = "And the second and the third day they journeyed, and even then scarcely could they reach so far.\n\nAnd when they came before the castle, they beheld a vast flock of sheep, which was boundless and without an end.\n\nAnd upon the top of a mound there was a herdsman, keeping the sheep.\n\nAnd a rug made of skins was upon him; and by his side was a shaggy mastiff, larger than a steed nine winters old.\n\nNever had he lost even a lamb from his flock, much less a large sheep.\n\nHe let no occasion ever pass without doing some hurt and harm.\n\nAll the dead trees and bushes in the plain he burnt with his breath down to the very ground.\n\nThen said Kai, “Gwrhyr Gwalstawt Ieithoedd, go thou and salute yonder man.” “Kai,” said he, “I engaged not to go further than thou thyself.” “Let us go then together,” answered Kai.\n\nSaid Menw the son of Teirgwaedd, “Fear not to go thither, for I will cast a spell upon the dog, so that he shall injure no one.” And they went up to the mound whereon the herdsman was, and they said to him, “How dost thou fare, O herdsman?” “No less fair be it to you than to me.” “Truly, art thou the chief?” “There is no hurt to injure me but my own.” “Whose are the sheep that thou dost keep, and to whom does yonder castle belong?” “Stupid are ye, truly!\n\nThrough the whole world is it known that this is the castle of Yspaddaden Penkawr.” “And who art thou?” “I am called Custennin the son of Dyfnedig, and my brother Yspaddaden Penkawr oppressed me because of my possessions.\n\nAnd ye also, who are ye?” “We are an embassy from Arthur, come to seek Olwen the daughter of Yspaddaden Penkawr.” “Oh men!\n\nthe mercy of Heaven be upon you, do not that for all the world.\n\nNone who ever came hither on this quest has returned alive.” And the herdsman rose up.\n\nAnd as he arose, Kilhwch gave unto him a ring of gold.\n\nAnd he sought to put on the ring, but it was too small for him, so he placed it in the finger of his glove.\n\nAnd he went home, and gave the glove to his spouse to keep.\n\nAnd she took the ring from the glove when it was given her, and she said, “Whence came this ring, for thou art not wont to have good fortune?” “I went,” said he, “to the sea to seek for fish, and lo, I saw a corpse borne by the waves.\n\nAnd a fairer corpse than it did I never behold.\n\nAnd from its finger did I take this ring.” “O man!\n\ndoes the sea permit its dead to wear jewels?\n\nShow me then this body.” “Oh wife, him to whom this ring belonged thou shalt see here in the evening.” “And who is he?” asked the woman, “Kilhwch the son of Kilydd, the son of Prince Kelyddon, by Goleuddydd the daughter of Prince Anlawdd, his mother, who is come to seek Olwen as his wife.” And when she heard that, her feelings were divided between the joy that she had that her nephew, the son of her sister, was coming to her, and sorrow because she had never known any one depart alive who had come on that quest.\n\nAnd they went forward to the gate of Custennin the herdsman’s dwelling.\n\nAnd when she heard their footsteps approaching, she ran out with joy to meet them."

