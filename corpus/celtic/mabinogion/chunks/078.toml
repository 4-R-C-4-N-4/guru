[content]
body = "Enid,” said Arthur, “what expedition is this?” “I know not, Lord,” said she, “save that it behoves me to journey by the same road that he journeys.” “My Lord,” said Geraint, “with thy permission we will depart.” “Whither wilt thou go?” said Arthur.\n\n“Thou canst not proceed now, unless it be unto thy death.” “He will not suffer himself to be invited by me,” said Gwalchmai.\n\n“But by me he will,” said Arthur; “and, moreover, he does not go from here until he is healed.” “I had rather, Lord,” said Geraint, “that thou wouldest let me go forth.” “That will I not, I declare to Heaven,” said he.\n\nThen he caused a maiden to be sent for to conduct Enid to the tent where Gwenhwyvar’s chamber was.\n\nAnd Gwenhwyvar and all her women were joyful at her coming; and they took off her riding-dress, and placed other garments upon her.\n\nArthur also called Kadyrieith, and ordered him to pitch a tent for Geraint and the physicians; and he enjoined him to provide him with abundance of all that might be requisite for him.\n\nAnd Kadyrieith did as he had commanded him.\n\nAnd Morgan Tud and his disciples were brought to Geraint.\n\nAnd Arthur and his hosts remained there nearly a month, whilst Geraint was being healed.\n\nAnd when he was fully recovered, Geraint came to Arthur, and asked his permission to depart.\n\n“I know not if thou art quite well.” “In truth I am, Lord,” said Geraint.\n\n“I shall not believe thee concerning that, but the physicians that were with thee.” So Arthur caused the physicians to be summoned to him, and asked them if it were true.\n\n“It is true, Lord,” said Morgan Tud.\n\nSo the next day Arthur permitted him to go forth, and he pursued his journey.\n\nAnd on the same day Arthur removed thence.\n\nAnd Geraint desired Enid to go on, and to keep before him, as she had formerly done.\n\nAnd she went forward along the high road.\n\nAnd as they journeyed thus, they heard an exceeding loud wailing near to them.\n\n“Stay thou here,” said he, “and I will go and see what is the cause of this wailing.” “I will,” said she.\n\nThen he went forward unto an open glade that was near the road.\n\nAnd in the glade he saw two horses, one having a man’s saddle, and the other a woman’s saddle upon it.\n\nAnd, behold, there was a knight lying dead in his armour, and a young damsel in a riding-dress standing over him, lamenting.\n\n“Ah!\n\nLady,” said Geraint, “what hath befallen thee?” “Behold,” she answered, “I journeyed here with my beloved husband, when, lo!\n\nthree giants came upon us, and without any cause in the world, they slew him.” “Which way went they hence?” said Geraint.\n\n“Yonder by the high road,” she replied.\n\nSo he returned to Enid.\n\n“Go,” said he, “to the lady that is below yonder, and await me there till I come.” She was sad when he ordered her to do thus, but nevertheless she went to the damsel, whom it was ruth to hear, and she felt certain that Geraint would never return.\n\nMeanwhile Geraint followed the giants, and overtook them.\n\nAnd each of them was greater of stature than three other men, and a huge club was on the shoulder of each.\n\nThen he rushed upon one of them, and thrust his lance through his body.\n\nAnd having drawn it forth again, he pierced another of them through likewise."

