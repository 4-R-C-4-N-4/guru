[content]
body = "But thou art young, and in the flower of thy vigour and of thy youth; henceforth do thou preserve thy possessions.” “Truly,” said Geraint, “with my consent thou shalt not give the power over thy dominions at this time into my hands, and thou shalt not take me from Arthur’s Court.” “Into thy hands will I give them,” said Erbin, “and this day also shalt thou receive the homage of thy subjects.” Then said Gwalchmai, “It were better for thee to satisfy those who have boons to ask, to-day, and to-morrow thou canst receive the homage of thy dominions.” So all that had boons to ask were summoned into one place.\n\nAnd Kadyrieith came to them, to know what were their requests.\n\nAnd every one asked that which he desired.\n\nAnd the followers of Arthur began to make gifts, and immediately the men of Cornwall came, and gave also.\n\nAnd they were not long in giving, so eager was every one to bestow gifts.\n\nAnd of those who came to ask gifts, none departed unsatisfied.\n\nAnd that day and that night were spent in the utmost enjoyment.\n\nAnd the next day, at dawn, Erbin desired Geraint to send messengers to the men, to ask them whether it was displeasing to them that he should come to receive their homage, and whether they had anything to object to him.\n\nThen Geraint sent ambassadors to the men of Cornwall, to ask them this.\n\nAnd they all said that it would be the fulness of joy and honour to them for Geraint to come and receive their homage.\n\nSo he received the homage of such as were there.\n\nAnd they remained with him till the third night.\n\nAnd the day after the followers of Arthur intended to go away.\n\n“It is too soon for you to go away yet,” said he, “stay with me until I have finished receiving the homage of my chief men, who have agreed to come to me.” And they remained with him until he had done so.\n\nThen they set forth towards the Court of Arthur; and Geraint went to bear them company, and Enid also, as far as Diganhwy: there they parted.\n\nThen Ondyaw the son of the duke of Burgundy said to Geraint, “Go first of all and visit the uppermost parts of thy dominions, and see well to the boundaries of thy territories; and if thou hast any trouble respecting them, send unto thy companions.” “Heaven reward thee,” said Geraint, “and this will I do.” And Geraint journeyed to the uttermost part of his dominions.\n\nAnd experienced guides, and the chief men of his country, went with him.\n\nAnd the furthermost point that they showed him he kept possession of.\n\nAnd, as he had been used to do when he was at Arthur’s Court, he frequented tournaments.\n\nAnd he became acquainted with valiant and mighty men, until he had gained as much fame there as he had formerly done elsewhere.\n\nAnd he enriched his Court, and his companions, and his nobles, with the best horses and the best arms, and with the best and most valuable jewels, and he ceased not until his fame had flown over the face of the whole kingdom.\n\nAnd when he knew that it was thus, he began to love ease and pleasure, for there was no one who was worth his opposing.\n\nAnd he loved his wife, and liked to continue in the palace, with minstrelsy and diversions.\n\nAnd for a long time he abode at home."

