[content]
body = "And the lion fought with the giant much more fiercely than Owain did.\n\n“Truly,” said the giant, “I should find no difficulty in fighting with thee, were it not for the animal that is with thee.” Upon that Owain took the lion back to the Castle and shut the gate upon him, and then he returned to fight the giant, as before.\n\nAnd the lion roared very loud, for he heard that it went hard with Owain.\n\nAnd he climbed up till he reached the top of the Earl’s hall, and thence he got to the top of the Castle, and he sprang down from the walls and went and joined Owain.\n\nAnd the lion gave the giant a stroke with his paw, which tore him from his shoulder to his hip, and his heart was laid bare, and the giant fell down dead.\n\nThen Owain restored the two youths to their father.\n\nThe Earl besought Owain to remain with him, and he would not, but set forward towards the meadow where Luned was.\n\nAnd when he came there he saw a great fire kindled, and two youths with beautiful curling auburn hair were leading the maiden to cast her into the fire.\n\nAnd Owain asked them what charge they had against her.\n\nAnd they told him of the compact that was between them, as the maiden had done the night before.\n\n“And,” said they, “Owain has failed her, therefore we are taking her to be burnt.” “Truly,” said Owain, “he is a good knight, and if he knew that the maiden was in such peril, I marvel that he came not to her rescue; but if you will accept me in his stead, I will do battle with you.” “We will,” said the youths, “by him who made us.” And they attacked Owain, and he was hard beset by them.\n\nAnd with that the lion came to Owain’s assistance, and they two got the better of the young men.\n\nAnd they said to him, “Chieftain, it was not agreed that we should fight save with thyself alone, and it is harder for us to contend with yonder animal than with thee.” And Owain put the lion in the place where the maiden had been imprisoned, and blocked up the door with stones, and he went to fight with the young men, as before.\n\nBut Owain had not his usual strength, and the two youths pressed hard upon him.\n\nAnd the lion roared incessantly at seeing Owain in trouble; and he burst through the wall until he found a way out, and rushed upon the young men, and instantly slew them.\n\nSo Luned was saved from being burned.\n\nThen Owain returned with Luned to the dominions of the Countess of the Fountain.\n\nAnd when he went thence he took the Countess with him to Arthur’s Court, and she was his wife as long as she lived.\n\nAnd then he took the road that led to the Court of the savage black man, and Owain fought with him, and the lion did not quit Owain until he had vanquished him.\n\nAnd when he reached the Court of the savage black man he entered the hall, and beheld four-and-twenty ladies, the fairest that could be seen.\n\nAnd the garments which they had on were not worth four-and-twenty pence, and they were as sorrowful as death.\n\nAnd Owain asked them the cause of their sadness.\n\nAnd they said, “We are the daughters of Earls, and we all came here with our husbands, whom we dearly loved.\n\nAnd we were received with honour and rejoicing."

