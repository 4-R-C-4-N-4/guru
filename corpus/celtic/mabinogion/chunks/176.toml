[content]
body = "Beli the Great, the son of Manogan, had three sons, Lludd, and Caswallawn, and Nynyaw; and according to the story he had a fourth son called Llevelys.\n\nAnd after the death of Beli, the kingdom of the Island of Britain fell into the hands of Lludd his eldest son; and Lludd ruled prosperously, and rebuilt the walls of London, and encompassed it about with numberless towers.\n\nAnd after that he bade the citizens build houses therein, such as no houses in the kingdoms could equal.\n\nAnd moreover he was a mighty warrior, and generous and liberal in giving meat and drink to all that sought them.\n\nAnd though he had many castles and cities this one loved he more than any.\n\nAnd he dwelt therein most part of the year, and therefore was it called Caer Lludd, and at last Caer London.\n\nAnd after the stranger-race came there, it was called London, or Lwndrys.\n\nLludd loved Llevelys best of all his brothers, because he was a wise and discreet man.\n\nHaving heard that the king of France had died, leaving no heir except a daughter, and that he had left all his possessions in her hands, he came to Lludd his brother, to beseech his counsel and aid.\n\nAnd that not so much for his own welfare, as to seek to add to the glory and honour and dignity of his kindred, if he might go to France to woo the maiden for his wife.\n\nAnd forthwith his brother conferred with him, and this counsel was pleasing unto him.\n\nSo he prepared ships and filled them with armed knights, and set forth towards France.\n\nAnd as soon as they had landed, they sent messengers to show the nobles of France the cause of the embassy.\n\nAnd by the joint counsel of the nobles of France and of the princes, the maiden was given to Llevelys, and the crown of the kingdom with her.\n\nAnd thenceforth he ruled the land discreetly, and wisely, and happily, as long as his life lasted.\n\nAfter a space of time had passed, three plagues fell on the Island of Britain, such as none in the islands had ever seen the like of.\n\nThe first was a certain race that came, and was called the Coranians; and so great was their knowledge, that there was no discourse upon the face of the Island, however low it might be spoken, but what, if the wind met it, it was known to them.\n\nAnd through this they could not be injured.\n\n[4] The second plague was a shriek which came on every May-eve, over every hearth in the Island of Britain.\n\nAnd this went through people’s hearts, and so scared them, that the men lost their hue and their strength, and the women their children, and the young men and the maidens lost their senses, and all the animals and trees and the earth and the waters, were left barren.\n\nThe third plague was, that however much of provisions and food might be prepared in the king’s courts, were there even so much as a year’s provision of meat and drink, none of it could ever be found, except what was consumed in the first night.\n\nAnd two of these plagues, no one ever knew their cause, therefore was there better hope of being freed from the first than from the second and third.\n\nAnd thereupon King Lludd felt great sorrow and care, because that he knew not how he might be freed from these plagues.\n\nAnd he called to him all the nobles of his kingdom, and asked counsel of them what they should do against these afflictions."

