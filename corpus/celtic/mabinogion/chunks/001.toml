[content]
body = "Whilst engaged on the Translations contained in these volumes, and on the Notes appended to the various Tales, I have found myself led unavoidably into a much more extensive course of reading than I had originally contemplated, and one which in great measure bears directly upon the earlier Mediæval Romance.\n\nBefore commencing these labours, I was aware, generally, that there existed a connexion between the Welsh Mabinogion and the Romance of the Continent; but as I advanced, I became better acquainted with the closeness and extent of that connexion, its history, and the proofs by which it is supported.\n\nAt the same time, indeed, I became aware, and still strongly feel, that it is one thing to collect facts, and quite another to classify and draw from them their legitimate conclusions; and though I am loth that what has been collected with some pains, should be entirely thrown away, it is unwillingly, and with diffidence, that I trespass beyond the acknowledged province of a translator.\n\nIn the twelfth and thirteenth centuries there arose into general notoriety in Europe, a body of “Romance,” which in various forms retained its popularity till the Reformation.\n\nIn it the plot, the incidents, the characters, were almost wholly those of Chivalry, that bond which united the warriors of France, Spain, and Italy, with those of pure Teutonic descent, and embraced more or less firmly all the nations of Europe, excepting only the Slavonic races, not yet risen to power, and the Celts, who had fallen from it.\n\nIt is not difficult to account for this latter omission.\n\nThe Celts, driven from the plains into the mountains and islands, preserved their liberty, and hated their oppressors with fierce, and not causeless, hatred.\n\nA proud and free people, isolated both in country and language, were not likely to adopt customs which implied brotherhood with their foes.\n\nSuch being the case, it is remarkable that when the chief romances are examined, the name of many of the heroes and their scenes of action are found to be Celtic, and those of persons and places famous in the traditions of Wales and Brittany.\n\nOf this the romances of Ywaine and Gawaine, Sir Perceval de Galles, Eric and Enide, Mort d’Arthur, Sir Lancelot, Sir Tristan, the Graal, &c., may be cited as examples.\n\nIn some cases a tendency to triads, and other matters of internal evidence, point in the same direction.\n\nIt may seem difficult to account for this.\n\nAlthough the ancient dominion of the Celts over Europe is not without enduring evidence in the names of the mountains and streams, the great features of a country, yet the loss of their prior language by the great mass of the Celtic nations in Southern Europe (if indeed their successors in territory be at all of their blood), prevents us from clearly seeing, and makes us wonder, how stories, originally embodied in the Celtic dialects of Great Britain and France, could so influence the literature of nations to whom the Celtic languages were utterly unknown.\n\nWhence then came these internal marks, and these proper names of persons and places, the features of a story usually of earliest date and least likely to change?\n\nThese romances were found in England, France, Germany, Norway, Sweden, and even Iceland, as early as the beginning of the thirteenth and end of the twelfth century.\n\nThe Germans, who propagated them through the nations of the North, derived them certainly from France.\n\nRobert Wace published his Anglo-Norman Romance of the Brut d’Angleterre about 1155.\n\nSir Tristan was written in French prose in 1170; and The Chevalier au Lion, Chevalier de l’Epée, and Sir Lancelot du Lac, in metrical French, by Chrestien de Troyes, before 1200."

