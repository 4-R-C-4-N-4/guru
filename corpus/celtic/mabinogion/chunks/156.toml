body = "And the third night came unto me my wife and the ladies of the Court, and besought me to transform them.\n\nAnd I transformed them.\n\nNow she is pregnant.\n\nAnd had she not been pregnant thou wouldst not have been able to overtake her; but since this has taken place, and she has been caught, I will restore thee Pryderi and Rhiannon; and I will take the charm and illusion from off Dyved.\n\nI have now told thee who she is.\n\nSet her therefore free.” “I will not set her free, by Heaven,” said he.\n\n“What wilt thou more?” he asked.\n\n“I will that there be no more charm upon the seven Cantrevs of Dyved, and that none shall be put upon it henceforth.” “This thou shalt have,” said he.\n\n“Now set her free.” “I will not, by my faith,” he answered.\n\n“What wilt thou furthermore?” asked he.\n\n“Behold,” said he, “this will I have; that vengeance be never taken for this, either upon Pryderi or Rhiannon, or upon me.” “All this shalt thou have.\n\nAnd truly thou hast done wisely in asking this.\n\nUpon thy head would have lighted all this trouble.” “Yea,” said he, “for fear thereof was it, that I required this.” “Set now my wife at liberty.” “I will not, by Heaven,” said he, “until I see Pryderi and Rhiannon with me free.” “Behold, here they come,” he answered.\n\nAnd thereupon behold Pryderi and Rhiannon.\n\nAnd he rose up to meet them, and greeted them, and sat down beside them.\n\n“Ah, Chieftain, set now my wife at liberty,” said the bishop.\n\n“Hast thou not received all thou didst ask?” “I will release her gladly,” said he.\n\nAnd thereupon he set her free.\n\nThen Llwyd struck her with a magic wand, and she was changed back into a young woman, the fairest ever seen.\n\n“Look around upon thy land,” said he, “and then thou wilt see it all tilled and peopled, as it was in its best state.” And he rose up and looked forth.\n\nAnd when he looked he saw all the lands tilled, and full of herds and dwellings.\n\n“What bondage,” he inquired, “has there been upon Pryderi and Rhiannon?” “Pryderi has had the knockers of the gate of my palace about his neck, and Rhiannon has had the collars of the asses, after they have been carrying hay, about her neck.” And such had been their bondage.\n\nAnd by reason of this bondage is this story called the Mabinogi of Mynnweir and Mynord.\n\nAnd thus ends this portion of the Mabinogi."

