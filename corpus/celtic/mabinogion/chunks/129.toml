[content]
body = "And she fixed her eyes upon him, and began to talk with him.\n\n“Lady,” asked he, “whence comest thou, and whereunto dost thou journey?” “I journey on mine own errand,” said she, “and right glad am I to see thee.” “My greeting be unto thee,” said he.\n\nThen he thought that the beauty of all the maidens, and all the ladies that he had ever seen, was as nothing compared to her beauty.\n\n“Lady,” he said, “wilt thou tell me aught concerning thy purpose?” “I will tell thee,” said she.\n\n“My chief quest was to seek thee.” “Behold,” said Pwyll, “this is to me the most pleasing quest on which thou couldst have come; and wilt thou tell me who thou art?” “I will tell thee, Lord,” said she.\n\n“I am Rhiannon, the daughter of Heveydd Hên, and they sought to give me to a husband against my will.\n\nBut no husband would I have, and that because of my love for thee, neither will I yet have one unless thou reject me.\n\nAnd hither have I come to hear thy answer.” “By Heaven,” said Pwyll, “behold this is my answer.\n\nIf I might choose among all the ladies and damsels in the world, thee would I choose.” “Verily,” said she, “if thou art thus minded, make a pledge to meet me ere I am given to another.” “The sooner I may do so, the more pleasing will it be unto me,” said Pwyll, “and wheresoever thou wilt, there will I meet with thee.” “I will that thou meet me this day twelvemonth at the palace of Heveydd.\n\nAnd I will cause a feast to be prepared, so that it be ready against thou come.” “Gladly,” said he, “will I keep this tryst.” “Lord,” said she, “remain in health, and be mindful that thou keep thy promise; and now I will go hence.” So they parted, and he went back to his hosts and to them of his household.\n\nAnd whatsoever questions they asked him respecting the damsel, he always turned the discourse upon other matters.\n\nAnd when a year from that time was gone, he caused a hundred knights to equip themselves and to go with him to the palace of Heveydd Hên.\n\nAnd he came to the palace, and there was great joy concerning him, with much concourse of people and great rejoicing, and vast preparations for his coming.\n\nAnd the whole Court was placed under his orders.\n\nAnd the hall was garnished and they went to meat, and thus did they sit; Heveydd Hên was on one side of Pwyll, and Rhiannon on the other.\n\nAnd all the rest according to their rank.\n\nAnd they ate and feasted and talked one with another, and at the beginning of the carousal after the meat, there entered a tall auburn-haired youth, of royal bearing, clothed in a garment of satin.\n\nAnd when he came into the hall, he saluted Pwyll and his companions.\n\n“The greeting of Heaven be unto thee, my soul,” said Pwyll, “come thou and sit down.” “Nay,” said he, “a suitor am I, and I will do mine errand.” “Do so willingly,” said Pwyll.\n\n“Lord,” said he, “my errand is unto thee, and it is to crave a boon of thee that I come.” “What boon soever thou mayest ask of me, as far as I am able, thou shalt have.” “Ah,” said Rhiannon, “wherefore didst thou give that answer?” “Has he not given it before the presence of these nobles?” asked the youth."

