[content]
body = "The garments of the youths were of jet-black satin, and chaplets of ruddy gold bound their hair, whereon were sparkling jewels of great price, rubies, and gems, alternately with imperial stones.\n\nBuskins of new Cordovan leather on their feet, fastened by slides of red gold.\n\nAnd beside a pillar in the hall he saw a hoary-headed man, in a chair of ivory, with the figures of two eagles of ruddy gold thereon.\n\nBracelets of gold were upon his arms, and many rings were on his hands, and a golden torque about his neck; and his hair was bound with a golden diadem.\n\nHe was of powerful aspect.\n\nA chessboard of gold was before him, and a rod of gold, and a steel file in his hand.\n\nAnd he was carving out chessmen.\n\nAnd he saw a maiden sitting before him in a chair of ruddy gold.\n\nNot more easy than to gaze upon the sun when brightest, was it to look upon her by reason of her beauty.\n\nA vest of white silk was upon the maiden, with clasps of red gold at the breast; and a surcoat of gold tissue upon her, and a frontlet of red gold upon her head, and rubies and gems were in the frontlet, alternating with pearls and imperial stones.\n\nAnd a girdle of ruddy gold was around her.\n\nShe was the fairest sight that man ever beheld.\n\nThe maiden arose from her chair before him, and he threw his arms about the neck of the maiden, and they two sat down together in the chair of gold: and the chair was not less roomy for them both, than for the maiden alone.\n\nAnd as he had his arms about the maiden’s neck, and his cheek by her cheek, behold, through the chafing of the dogs at their leashing, and the clashing of the shields as they struck against each other, and the beating together of the shafts of the spears, and the neighing of the horses and their prancing, the emperor awoke.\n\nAnd when he awoke, nor spirit nor existence was left him, because of the maiden whom he had seen in his sleep, for the love of the maiden pervaded his whole frame.\n\nThen his household spake unto him.\n\n“Lord,” said they, “is it not past the time for thee to take thy food?” Thereupon the emperor mounted his palfrey, the saddest man that mortal ever saw, and went forth towards Rome.\n\nAnd thus he was during the space of a week.\n\nWhen they of the household went to drink wine and mead out of golden vessels, he went not with any of them.\n\nWhen they went to listen to songs and tales, he went not with them there; neither could he be persuaded to do anything but sleep.\n\nAnd as often as he slept, he beheld in his dreams the maiden he loved best; but except when he slept he saw nothing of her, for he knew not where in the world she was.\n\nOne day the page of the chamber spake unto him; now, although he was page of the chamber, he was king of the Romans.\n\n“Lord,” said he, “all the people revile thee.” “Wherefore do they revile me?” asked the emperor.\n\n“Because they can get neither message nor answer from thee as men should have from their lord.\n\nThis is the cause why thou art spoken evil of.” “Youth,” said the emperor, “do thou bring unto me the wise men of Rome, and I will tell them wherefore I am sorrowful.” Then the wise men of Rome were brought to the emperor, and he spake to them.\n\n“Sages of Rome,” said he, “I have seen a dream."

