[content]
body = "And Kai snatched a billet out of the pile.\n\nAnd when she met them she sought to throw her arms about their necks.\n\nAnd Kai placed the log between her two hands, and she squeezed it so that it became a twisted coil.\n\n“Oh woman,” said Kai, “if thou hadst squeezed me thus, none could ever again have set their affections on me.\n\nEvil love were this.” They entered into the house, and were served; and soon after they all went forth to amuse themselves.\n\nThen the woman opened a stone chest that was before the chimney-corner, and out of it arose a youth with yellow curling hair.\n\nSaid Gwrhyr, “It is a pity to hide this youth.\n\nI know that it is not his own crime that is thus visited upon him.” “This is but a remnant,” said the woman.\n\n“Three-and-twenty of my sons has Yspaddaden Penkawr slain, and I have no more hope of this one than of the others.” Then said Kai, “Let him come and be a companion with me, and he shall not be slain unless I also am slain with him.” And they ate.\n\nAnd the woman asked them, “Upon what errand come you here?” “We come to seek Olwen for this youth.” Then said the woman, “In the name of Heaven, since no one from the castle hath yet seen you, return again whence you came.” “Heaven is our witness, that we will not return until we have seen the maiden.” Said Kai, “Does she ever come hither, so that she may be seen?” “She comes here every Saturday to wash her head, and in the vessel where she washes, she leaves all her rings, and she never either comes herself or sends any messengers to fetch them.” “Will she come here if she is sent to?” “Heaven knows that I will not destroy my soul, nor will I betray those that trust me; unless you will pledge me your faith that you will not harm her, I will not send to her.” “We pledge it,” said they.\n\nSo a message was sent, and she came.\n\nThe maiden was clothed in a robe of flame-coloured silk, and about her neck was a collar of ruddy gold, on which were precious emeralds and rubies.\n\nMore yellow was her head than the flower of the broom, and her skin was whiter than the foam of the wave, and fairer were her hands and her fingers than the blossoms of the wood anemone amidst the spray of the meadow fountain.\n\nThe eye of the trained hawk, the glance of the three-mewed falcon was not brighter than hers.\n\nHer bosom was more snowy than the breast of the white swan, her cheek was redder than the reddest roses.\n\nWhoso beheld her was filled with her love.\n\nFour white trefoils sprung up wherever she trod.\n\nAnd therefore was she called Olwen.\n\nShe entered the house, and sat beside Kilhwch upon the foremost bench; and as soon as he saw her he knew her.\n\nAnd Kilhwch said unto her, “Ah!\n\nmaiden, thou art she whom I have loved; come away with me, lest they speak evil of thee and of me.\n\nMany a day have I loved thee.” “I cannot do this, for I have pledged my faith to my father not to go without his counsel, for his life will last only until the time of my espousals.\n\nWhatever is, must be.\n\nBut I will give thee advice if thou wilt take it."

