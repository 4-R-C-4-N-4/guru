[content]
body = "And the road they took was below the palace of Caerlleon, and across the ford of the Usk; and they went along a fair, and even, and lofty ridge of ground, until they came to a town, and at the extremity of the town they saw a Fortress and a Castle.\n\nAnd they came to the extremity of the town.\n\nAnd as the knight passed through it, all the people arose, and saluted him, and bade him welcome.\n\nAnd when Geraint came into the town, he looked at every house, to see if he knew any of those whom he saw.\n\nBut he knew none, and none knew him to do him the kindness to let him have arms either as a loan or for a pledge.\n\nAnd every house he saw was full of men, and arms, and horses.\n\nAnd they were polishing shields, and burnishing swords, and washing armour, and shoeing horses.\n\nAnd the knight, and the lady, and the dwarf rode up to the Castle that was in the town, and every one was glad in the Castle.\n\nAnd from the battlements and the gates they risked their necks, through their eagerness to greet them, and to show their joy.\n\nGeraint stood there to see whether the knight would remain in the Castle; and when he was certain that he would do so, he looked around him; and at a little distance from the town he saw an old palace in ruins, wherein was a hall that was falling to decay.\n\nAnd as he knew not any one in the town, he went towards the old palace; and when he came near to the palace, he saw but one chamber, and a bridge of marble-stone leading to it.\n\nAnd upon the bridge he saw sitting a hoary-headed man, upon whom were tattered garments.\n\nAnd Geraint gazed steadfastly upon him for a long time.\n\nThen the hoary-headed man spoke to him.\n\n“Young man,” he said, “wherefore art thou thoughtful?” “I am thoughtful,” said he, “because I know not where to go to-night.” “Wilt thou come forward this way, chieftain?” said he, “and thou shalt have of the best that can be procured for thee.” So Geraint went forward.\n\nAnd the hoary-headed man preceded him into the hall.\n\nAnd in the hall he dismounted, and he left there his horse.\n\nThen he went on to the upper chamber with the hoary-headed man.\n\nAnd in the chamber he beheld an old decrepit woman, sitting on a cushion, with old, tattered garments of satin upon her; and it seemed to him that he had never seen a woman fairer than she must have been, when in the fulness of youth.\n\nAnd beside her was a maiden, upon whom were a vest and a veil, that were old, and beginning to be worn out.\n\nAnd truly, he never saw a maiden more full of comeliness, and grace, and beauty than she.\n\nAnd the hoary-headed man said to the maiden, “There is no attendant for the horse of this youth but thyself.” “I will render the best service I am able,” said she, “both to him and to his horse.” And the maiden disarrayed the youth, and then she furnished his horse with straw and with corn.\n\nAnd she went to the hall as before, and then she returned to the chamber.\n\nAnd the hoary-headed man said to the maiden, “Go to the town,” said he, “and bring hither the best that thou canst find both of food and of liquor.” “I will, gladly, Lord,” said she.\n\nAnd to the town went the maiden.\n\nAnd they conversed together while the maiden was at the town.\n\nAnd, behold!"

