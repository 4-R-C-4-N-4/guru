[content]
body = "“I must go,” said the youth, “to wait on him in the evening.” “Go,” answered the Earl, “and greet him well from me, and tell him that in the evening I will go to see him.” “This will I do,” said the youth.\n\nSo he came when it was time for them to awake.\n\nAnd they arose, and went forth.\n\nAnd when it was time for them to take their food, they took it.\n\nAnd the youth served them.\n\nAnd Geraint inquired of the man of the house, whether there were any of his companions that he wished to invite to him, and he said that there were.\n\n“Bring them hither, and entertain them at my cost with the best thou canst buy in the town.” And the man of the house brought there those whom he chose, and feasted them at Geraint’s expense.\n\nThereupon, behold, the Earl came to visit Geraint, and his twelve honourable knights with him.\n\nAnd Geraint rose up, and welcomed him.\n\n“Heaven preserve thee,” said the Earl.\n\nThen they all sat down according to their precedence in honour.\n\nAnd the Earl conversed with Geraint, and inquired of him the object of his journey.\n\n“I have none,” he replied, “but to seek adventures, and to follow my own inclination.” Then the Earl cast his eye upon Enid, and he looked at her steadfastly.\n\nAnd he thought he had never seen a maiden fairer or more comely than she.\n\nAnd he set all his thoughts and his affections upon her.\n\nThen he asked of Geraint, “Have I thy permission to go and converse with yonder maiden, for I see that she is apart from thee?” “Thou hast it gladly,” said he.\n\nSo the Earl went to the place where the maiden was, and spake with her.\n\n“Ah, maiden,” said he, “it cannot be pleasant to thee to journey thus with yonder man!” “It is not unpleasant to me,” said she, “to journey the same road that he journeys.” “Thou hast neither youths nor maidens to serve thee,” said he.\n\n“Truly,” she replied, “it is more pleasant for me to follow yonder man, than to be served by youths and maidens.” “I will give thee good counsel,” said he.\n\n“All my Earldom will I place in thy possession, if thou wilt dwell with me.” “That will I not, by Heaven,” she said; “yonder man was the first to whom my faith was ever pledged; and shall I prove inconstant to him!” “Thou art in the wrong,” said the Earl; “if I slay the man yonder, I can keep thee with me as long as I choose; and when thou no longer pleasest me I can turn thee away.\n\nBut if thou goest with me by thine own good will, I protest that our union shall continue eternal and undivided as long as I remain alive.” Then she pondered these words of his, and she considered that it was advisable to encourage him in his request.\n\n“Behold, then, chieftain, this is most expedient for thee to do to save me any needless imputation; come here to-morrow, and take me away as though I knew nothing thereof.” “I will do so,” said he.\n\nSo he arose, and took his leave, and went forth with his attendants.\n\nAnd she told not then to Geraint any of the conversation which she had had with the Earl, lest it should rouse his anger, and cause him uneasiness and care.\n\nAnd at the usual hour they went to sleep.\n\nAnd at the beginning of the night Enid slept a little; and at midnight she arose, and placed all Geraint’s armour together, so that it might be ready to put on."

