[content]
body = "My Lord,” he added, “will it be displeasing to thee if I ask whence thou comest also?” “By no means—through yonder wood did I come.” “Thou camest not through the wood to-day.” “No,” he replied, “we were in the wood last night.” “I warrant,” said the youth, “that thy condition there last night was not the most pleasant, and that thou hadst neither meat nor drink.” “No, by my faith,” said he.\n\n“Wilt thou follow my counsel,” said the youth, “and take thy meal from me?” “What sort of meal?” he inquired.\n\n“The breakfast which is sent for yonder mowers, nothing less than bread and meat and wine; and if thou wilt, Sir, they shall have none of it.” “I will,” said he, “and Heaven reward thee for it.” So Geraint alighted, and the youth took the maiden from off her horse.\n\nThen they washed, and took their repast.\n\nAnd the youth cut the bread in slices, and gave them drink, and served them withal.\n\nAnd when they had finished, the youth arose, and said to Geraint, “My Lord, with thy permission, I will now go and fetch some food for the mowers.” “Go, first, to the town,” said Geraint, “and take a lodging for me in the best place that thou knowest, and the most commodious one for the horses, and take thou whichever horse and arms thou choosest in payment for thy service and thy gift.” “Heaven reward thee, Lord,” said the youth, “and this would be ample to repay services much greater than those I have rendered unto thee.” And to the town went the youth, and he took the best and the most pleasant lodgings that he knew; and after that he went to the palace, having the horse and armour with him, and proceeded to the place where the Earl was, and told him all his adventure.\n\n“I go now, Lord,” said he, “to meet the young man, and to conduct him to his lodging.” “Go, gladly,” said the Earl, “and right joyfully shall he be received here, if he so come.” And the youth went to meet Geraint, and told him that he would be received gladly by the Earl in his own palace; but he would go only to his lodgings.\n\nAnd he had a goodly chamber, in which was plenty of straw, and drapery, and a spacious and commodious place he had for the horses; and the youth prepared for them plenty of provender.\n\nAnd after they had disarrayed themselves, Geraint spoke thus to Enid: “Go,” said he, “to the other side of the chamber, and come not to this side of the house; and thou mayest call to thee the woman of the house, if thou wilt.” “I will do, Lord,” said she, “as thou sayest.” And thereupon the man of the house came to Geraint, and welcomed him.\n\n“Oh, chieftain,” he said, “hast thou taken thy meal?” “I have,” said he.\n\nThen the youth spoke to him, and inquired if he would not drink something before he met the Earl.\n\n“Truly I will,” said he.\n\nSo the youth went into the town, and brought them drink.\n\nAnd they drank.\n\n“I must needs sleep,” said Geraint.\n\n“Well,” said the youth; “and whilst thou sleepest, I will go to see the Earl.” “Go, gladly,” he said, “and come here again when I require thee.” And Geraint went to sleep; and so did Enid also.\n\nAnd the youth came to the place where the Earl was, and the Earl asked him where the lodgings of the knight were, and he told him."

