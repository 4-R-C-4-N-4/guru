[content]
body = "It is not possible to hunt the boar Trwyth without Gwynn the son of Nudd, whom God has placed over the brood of devils in Annwvyn, lest they should destroy the present race.\n\nHe will never be spared thence.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get.\n\nThere is not a horse in the world that can carry Gwynn to hunt the Twrch Trwyth, except Du, the horse of Mor of Oerveddawg.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get.\n\nUntil Gilennhin the king of France shall come, the Twrch Trwyth cannot be hunted.\n\nIt will be unseemly for him to leave his kingdom for thy sake, and he will never come hither.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get.\n\nThe Twrch Trwyth can never be hunted without the son of Alun Dyved; he is well skilled in letting loose the dogs.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get.\n\nThe Twrch Trwyth cannot be hunted unless thou get Aned and Aethlem.\n\nThey are as swift as the gale of wind, and they were never let loose upon a beast that they did not kill him.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get; Arthur and his companions to hunt the Twrch Trwyth.\n\nHe is a mighty man, and he will not come for thee, neither wilt thou be able to compel him.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get.\n\nThe Twrch Trwyth cannot be hunted unless thou get Bwlch, and Kyfwlch [and Sefwlch], the grandsons of Cleddyf Difwlch.\n\nTheir three shields are three gleaming glitterers.\n\nTheir three spears are three pointed piercers.\n\nTheir three swords are three griding gashers, Glas, Glessic, and Clersag.\n\nTheir three dogs, Call, Cuall, and Cavall.\n\nTheir three horses, Hwyrdydwg, and Drwgdydwg, and Llwyrdydwg.\n\nTheir three wives, Och, and Garam, and Diaspad.\n\nTheir three grandchildren, Lluched, and Vyned, and Eissiwed.\n\nTheir three daughters, Drwg, and Gwaeth, and Gwaethav Oll.\n\nTheir three hand-maids [Eheubryd, the daughter of Kyfwlch; Gorasgwrn, the daughter of Nerth; and Gwaedan, the daughter of Kynvelyn].\n\nThese three men shall sound the horn, and all the others shall shout, so that all will think that the sky is falling to the earth.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get.\n\nThe sword of Gwrnach the Giant; he will never be slain except therewith."

