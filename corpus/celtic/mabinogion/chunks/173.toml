[content]
body = "Thou shalt have of us therefore the choice, lady, whether thou wilt go with us and be made empress of Rome, or that the emperor come hither and take thee for his wife?” “Ha, lords,” said the maiden, “I will not deny what ye say, neither will I believe it too well.\n\nIf the emperor love me, let him come here to seek me.” And by day and night the messengers hied them back.\n\nAnd when their horses failed, they bought other fresh ones.\n\nAnd when they came to Rome, they saluted the emperor, and asked their boon, which was given to them according as they named it.\n\n“We will be thy guides, lord,” said they, “over sea and over land, to the place where is the woman whom best thou lovest, for we know her name, and her kindred, and her race.” And immediately the emperor set forth with his army.\n\nAnd these men were his guides.\n\nTowards the Island of Britain they went over the sea and the deep.\n\nAnd he conquered the Island from Beli the son of Manogan, and his sons, and drove them to the sea, and went forward even unto Arvon.\n\nAnd the emperor knew the land when he saw it.\n\nAnd when he beheld the castle of Aber Sain, “Look yonder,” said he, “there is the castle wherein I saw the damsel whom I best love.” And he went forward into the castle and into the hall, and there he saw Kynan the son of Eudav, and Adeon the son of Eudav, playing at chess.\n\nAnd he saw Eudav the son of Caradawc, sitting on a chair of ivory carving chessmen.\n\nAnd the maiden whom he had beheld in his sleep, he saw sitting on a chair of gold.\n\n“Empress of Rome,” said he, “all hail!” And the emperor threw his arms about her neck; and that night she became his bride.\n\nAnd the next day in the morning, the damsel asked her maiden portion.\n\nAnd he told her to name what she would.\n\nAnd she asked to have the Island of Britain for her father, from the Channel to the Irish Sea, together with the three adjacent Islands, to hold under the empress of Rome; and to have three chief castles made for her, in whatever places she might choose in the Island of Britain.\n\nAnd she chose to have the highest castle made at Arvon.\n\nAnd they brought thither earth from Rome that it might be more healthful for the emperor to sleep, and sit, and walk upon.\n\nAfter that the two other castles were made for her, which were Caerlleon and Caermarthen.\n\nAnd one day the emperor went to hunt at Caermarthen, and he came so far as the top of Brevi Vawr, and there the emperor pitched his tent.\n\nAnd that encamping place is called Cadeir Maxen, even to this day.\n\nAnd because that he built the castle with a myriad of men, he called it Caervyrddin.\n\nThen Helen bethought her to make high roads from one castle to another throughout the Island of Britain.\n\nAnd the roads were made.\n\nAnd for this cause are they called the roads of Helen Luyddawc, that she was sprung from a native of this island, and the men of the Island of Britain would not have made these great roads for any save for her.\n\nSeven years did the emperor tarry in this Island.\n\nNow, at that time, the men of Rome had a custom, that whatsoever emperor should remain in other lands more than seven years should remain to his own overthrow, and should never return to Rome again.\n\nSo they made a new emperor.\n\nAnd this one wrote a letter of threat to Maxen.\n\nThere was nought in the letter but only this."

