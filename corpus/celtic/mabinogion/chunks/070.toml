[content]
body = "Then the maiden looked steadfastly upon them; and when they had come near, she heard them say one to another, “Behold, here is a good arrival for us; here are coming for us four horses and four suits of armour.\n\nWe shall easily obtain them spite of yonder dolorous knight, and the maiden also will fall into our power.” “This is but too true,” said she to herself, “for my husband is tired with his former combat.\n\nThe vengeance of Heaven will be upon me, unless I warn him of this.” So the maiden waited until Geraint came up to her.\n\n“Lord,” said she, “dust thou not hear the discourse of yonder men concerning thee?” “What was it?” asked he.\n\n“They say to one another, that they will easily obtain all this spoil.” “I declare to Heaven,” he answered, “that their words are less grievous to me than that thou wilt not be silent, and abide by my counsel.” “My Lord,” said she, “I feared lest they should surprise thee unawares.” “Hold thy peace, then,” said he, “do not I desire silence?” And thereupon one of the horsemen couched his lance, and attacked Geraint.\n\nAnd he made a thrust at him, which he thought would be very effective; but Geraint received it carelessly, and struck it aside, and then he rushed upon him, and aimed at the centre of his person, and from the shock of man and horse, the quantity of his armour did not avail him, and the head of the lance and part of the shaft passed through him, so that he was carried to the ground an arm and a spear’s length over the crupper of his horse.\n\nAnd both the other horsemen came forward in their turn, but their onset was not more successful than that of their companion.\n\nAnd the maiden stood by, looking at all this; and on the one hand she was in trouble lest Geraint should be wounded in his encounter with the men, and on the other hand she was joyful to see him victorious.\n\nThen Geraint dismounted, and bound the three suits of armour upon the three saddles, and he fastened the reins of all the horses together, so that he had seven horses with him.\n\nAnd he mounted his own horse, and commanded the maiden to drive forward the others.\n\n“It is no more use for me to speak to thee than to refrain, for thou wilt not attend to my advice.” “I will do so, as far as I am able, Lord,” said she; “but I cannot conceal from thee the fierce and threatening words which I may hear against thee, Lord, from such strange people as those that haunt this wilderness.” “I declare to Heaven,” said he, “that I desire nought but silence; therefore, hold thy peace.” “I will, Lord, while I can.” And the maiden went on with the horses before her, and she pursued her way straight onwards.\n\nAnd from the copse-wood already mentioned, they journeyed over a vast and dreary open plain.\n\nAnd at a great distance from them they beheld a wood, and they could see neither end nor boundary to the wood, except on that side that was nearest to them, and they went towards it.\n\nThen there came from out the wood five horsemen, eager, and bold, and mighty, and strong, mounted upon chargers that were powerful, and large of bone, and high-mettled, and proudly snorting, and both the men and the horses were well equipped with arms."

