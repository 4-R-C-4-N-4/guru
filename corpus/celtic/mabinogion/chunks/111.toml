[content]
body = "Twrch Trwyth went from there to between Tawy and Euyas, and Arthur summoned all Cornwall and Devon unto him, to the estuary of the Severn, and he said to the warriors of this Island, “Twrch Trwyth has slain many of my men, but, by the valour of warriors, while I live he shall not go into Cornwall.\n\nAnd I will not follow him any longer, but I will oppose him life to life.\n\nDo ye as ye will.” And he resolved that he would send a body of knights, with the dogs of the Island, as far as Euyas, who should return thence to the Severn, and that tried warriors should traverse the Island, and force him into the Severn.\n\nAnd Mabon the son of Modron came up with him at the Severn, upon Gwynn Mygdwn, the horse of Gweddw, and Goreu the son of Custennin, and Menw the son of Teirgwaedd; this was betwixt Llyn Lliwan and Aber Gwy.\n\nAnd Arthur fell upon him together with the champions of Britain.\n\nAnd Osla Kyllellvawr drew near, and Manawyddan the son of Llyr, and Kacmwri the servant of Arthur, and Gwyngelli, and they seized hold of him, catching him first by his feet, and plunged him in the Severn, so that it overwhelmed him.\n\nOn the one side, Mabon the son of Modron spurred his steed and snatched his razor from him, and Kyledyr Wyllt came up with him on the other side, upon another steed, in the Severn, and took from him the scissors.\n\nBut before they could obtain the comb, he had regained the ground with his feet, and from the moment that he reached the shore, neither dog, nor man, nor horse could overtake him until he came to Cornwall.\n\nIf they had had trouble in getting the jewels from him, much more had they in seeking to save the two men from being drowned.\n\nKacmwri, as they drew him forth, was dragged by two millstones into the deep.\n\nAnd as Osla Kyllellvawr was running after the boar, his knife had dropped out of the sheath, and he had lost it, and after that, the sheath became full of water, and its weight drew him down into the deep, as they were drawing him forth.\n\nThen Arthur and his hosts proceeded until they overtook the boar in Cornwall, and the trouble which they had met with before was mere play to what they encountered in seeking the comb.\n\nBut from one difficulty to another, the comb was at length obtained.\n\nAnd then he was hunted from Cornwall, and driven straight forward into the deep sea.\n\nAnd thenceforth it was never known whither he went; and Aned and Aethlem with him.\n\nThen went Arthur to Gelli Wic, in Cornwall, to anoint himself, and to rest from his fatigues.\n\nSaid Arthur, “Is there any one of the marvels yet unobtained?” Said one of his men, “There is—the blood of the witch Orddu, the daughter of the witch Orwen, of Pen Nant Govid, on the confines of Hell.” Arthur set forth towards the North, and came to the place where was the witch’s cave.\n\nAnd Gwyn ab Nudd, and Gwythyr the son of Greidawl, counselled him to send Kacmwri, and Hygwyd his brother, to fight with the witch.\n\nAnd as they entered the cave, the witch seized upon them, and she caught Hygwyd by the hair of his head, and threw him on the floor beneath her."

