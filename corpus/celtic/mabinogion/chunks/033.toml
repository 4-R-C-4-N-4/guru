[content]
body = "And there was a knight riding proudly along the meadow, having raised the signal for battle.\n\nAnd they encountered, and Peredur threw the knight over his horse’s crupper to the ground.\n\nAnd at the close of the day, one of the chief knights came to fight with him, and he overthrew him also, so that he besought his mercy.\n\n“Who art thou?” said Peredur.\n\n“Verily,” said he, “I am Master of the Household to the earl.” “And how much of the countess’s possessions is there in thy power?” “The third part, verily,” answered he.\n\n“Then,” said Peredur, “restore to her the third of her possessions in full, and all the profit thou hast made by them, and bring meat and drink for a hundred men, with their horses and arms, to her court this night.\n\nAnd thou shalt remain her captive, unless she wish to take thy life.” And this he did forthwith.\n\nAnd that night the maiden was right joyful, and they fared plenteously.\n\nAnd the next day Peredur rode forth to the meadow; and that day he vanquished a multitude of the host.\n\nAnd at the close of the day, there came a proud and stately knight, and Peredur overthrew him, and he besought his mercy.\n\n“Who art thou?” said Peredur.\n\n“I am Steward of the Palace,” said he.\n\n“And how much of the maiden’s possessions are under thy control?” “One-third part,” answered he.\n\n“Verily,” said Peredur, “thou shalt fully restore to the maiden her possessions, and, moreover, thou shalt give her meat and drink for two hundred men, and their horses and their arms.\n\nAnd for thyself, thou shalt be her captive.” And immediately it was so done.\n\nAnd the third day Peredur rode forth to the meadow; and he vanquished more that day than on either of the preceding.\n\nAnd at the close of the day, an earl came to encounter him, and he overthrew him, and he besought his mercy.\n\n“Who art thou?” said Peredur.\n\n“I am the earl,” said he.\n\n“I will not conceal it from thee.” “Verily,” said Peredur, “thou shalt restore the whole of the maiden’s earldom, and shalt give her thine own earldom in addition thereto, and meat and drink for three hundred men, and their horses and arms, and thou thyself shalt remain in her power.” And thus it was fulfilled.\n\nAnd Peredur tarried three weeks in the country, causing tribute and obedience to be paid to the maiden, and the government to be placed in her hands.\n\n“With thy leave,” said Peredur, “I will go hence.” “Verily, my brother, desirest thou this?” “Yes, by my faith; and had it not been for love of thee, I should not have been here thus long.” “My soul,” said she, “who art thou?” “I am Peredur the son of Evrawc from the North; and if ever thou art in trouble or in danger, acquaint me therewith, and if I can, I will protect thee.” So Peredur rode forth.\n\nAnd far thence there met him a lady, mounted on a horse that was lean, and covered with sweat; and she saluted the youth.\n\n“Whence comest thou, my sister?” Then she told him the cause of her journey.\n\nNow she was the wife of the Lord of the Glade."

