[content]
body = "Nevertheless he cannot recall the insult.” These men returned with that answer to the place where Bendigeid Vran was, and they told him what reply Matholwch had given them.\n\n“Truly,” said he, “there are no means by which we may prevent his going away at enmity with us, that we will not take.” “Well, lord,” said they, “send after him another embassy.” “I will do so,” said he.\n\n“Arise, Manawyddan son of Llyr, and Heveydd Hir, and Unic Glew Ysgwyd, and go after him, and tell him that he shall have a sound horse for every one that has been injured.\n\nAnd beside that, as an atonement for the insult, he shall have a staff of silver, as large and as tall as himself, and a plate of gold of the breadth of his face.\n\nAnd show unto him who it was that did this, and that it was done against my will; but that he who did it is my brother, by the mother’s side, and therefore it would be hard for me to put him to death.\n\nAnd let him come and meet me,” said he, “and we will make peace in any way he may desire.” The embassy went after Matholwch, and told him all these sayings in a friendly manner, and he listened thereunto.\n\n“Men,” said he, “I will take counsel.” So to the council he went.\n\nAnd in the council they considered that if they should refuse this, they were likely to have more shame rather than to obtain so great an atonement.\n\nThey resolved therefore to accept it, and they returned to the Court in peace.\n\nThen the pavilions and the tents were set in order after the fashion of a hall; and they went to meat, and as they had sat at the beginning of the feast, so sat they there.\n\nAnd Matholwch and Bendigeid Vran began to discourse; and behold it seemed to Bendigeid Vran, while they talked, that Matholwch was not so cheerful as he had been before.\n\nAnd he thought that the chieftain might be sad, because of the smallness of the atonement which he had, for the wrong that had been done him.\n\n“Oh, man,” said Bendigeid Vran, “thou dost not discourse to-night so cheerfully as thou wast wont.\n\nAnd if it be because of the smallness of the atonement, thou shalt add thereunto whatsoever thou mayest choose, and to-morrow I will pay thee the horses.” “Lord,” said he, “Heaven reward thee.” “And I will enhance the atonement,” said Bendigeid Vran, “for I will give unto thee a cauldron, the property of which is, that if one of thy men be slain to-day, and be cast therein, to-morrow he will be as well as ever he was at the best, except that he will not regain his speech.” And thereupon he gave him great thanks, and very joyful was he for that cause.\n\nAnd the next morning they paid Matholwch the horses as long as the trained horses lasted.\n\nAnd then they journeyed into another commot, where they paid him with colts until the whole had been paid, and from thenceforth that commot was called Talebolion.\n\nAnd a second night sat they together.\n\n“My lord,” said Matholwch, “whence hadst thou the cauldron which thou hast given me?” “I had it of a man who had been in thy land,” said he, “and I would not give it except to one from there.” “Who was it?” asked he."

