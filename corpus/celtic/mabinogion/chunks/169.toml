[content]
body = "And they passed through the river Cynvael, and went towards a court that there was upon the mountain, and through fear they could not proceed except with their faces looking backwards, so that unawares they fell into the lake.\n\nAnd they were all drowned except Blodeuwedd herself, and her Gwydion overtook.\n\nAnd he said unto her, “I will not slay thee, but I will do unto thee worse than that.\n\nFor I will turn thee into a bird; and because of the shame thou hast done unto Llew Llaw Gyffes, thou shalt never show thy face in the light of day henceforth; and that through fear of all the other birds.\n\nFor it shall be their nature to attack thee, and to chase thee from wheresoever they may find thee.\n\nAnd thou shalt not lose thy name, but shalt be always called Blodeuwedd.” Now Blodeuwedd is an owl in the language of this present time, and for this reason is the owl hateful unto all birds.\n\nAnd even now the owl is called Blodeuwedd.\n\nThen Gronw Pebyr withdrew unto Penllyn, and he dispatched thence an embassy.\n\nAnd the messengers he sent asked Llew Llaw Gyffes if he would take land, or domain, or gold, or silver, for the injury he had received.\n\n“I will not, by my confession to Heaven,” said he.\n\n“Behold this is the least that I will accept from him; that he come to the spot where I was when he wounded me with the dart, and that I stand where he did, and that with a dart I take my aim at him.\n\nAnd this is the very least that I will accept.” And this was told unto Gronw Pebyr.\n\n“Verily,” said he, “is it needful for me to do thus?\n\nMy faithful warriors, and my household, and my foster-brothers, is there not one among you who will stand the blow in my stead?” “There is not, verily,” answered they.\n\nAnd because of their refusal to suffer one stroke for their lord, they are called the third disloyal tribe even unto this day.\n\n“Well,” said he, “I will meet it.” Then they two went forth to the banks of the river Cynvael, and Gronw stood in the place where Llew Llaw Gyffes was when he struck him, and Llew in the place where Gronw was.\n\nThen said Gronw Pebyr unto Llew, “Since it was through the wiles of a woman that I did unto thee as I have done, I adjure thee by Heaven to let me place between me and the blow, the slab thou seest yonder on the river’s bank.” “Verily,” said Llew, “I will not refuse thee this.” “Ah,” said he, “may Heaven reward thee.” So Gronw took the slab and placed it between him and the blow.\n\nThen Llew flung the dart at him, and it pierced the slab and went through Gronw likewise, so that it pierced through his back.\n\nAnd thus was Gronw Pebyr slain.\n\nAnd there is still the slab on the bank of the river Cynvael, in Ardudwy, having the hole through it.\n\nAnd therefore is it even now called Llech Gronw.\n\nA second time did Llew Llaw Gyffes take possession of the land, and prosperously did he govern it.\n\nAnd, as the story relates, he was lord after this over Gwynedd.\n\nAnd thus ends this portion of the Mabinogi."

