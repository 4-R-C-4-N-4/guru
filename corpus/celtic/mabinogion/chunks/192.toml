[content]
body = "containing the Graal in Welsh, as early as the time of Henry I.\n\nI had hoped to have added this to the present collection; but the death of Col.\n\nVaughan, to whom I applied, and other subsequent circumstances, have prevented me from obtaining access to it.\n\nHades.\n\nThe word “Pryder” or “Pryderi” means anxiety.\n\nThe version in the Greal adds, “And their coin was fairy money;” literally, dwarf’s money: that is, money which, when received, appeared to be good coin, but which, if kept, turned into pieces of fungus, &c.\n\nThis dialogue consists of a series of repartees with a play upon words, which it is impossible to follow in the translation.\n\nTaliesin.\n\nThe mention of Gwyddno Garanhir instead of Elphin ab Gwyddno in this place is evidently an error of some transcriber of the MS."

