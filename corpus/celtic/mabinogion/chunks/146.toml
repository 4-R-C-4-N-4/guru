[content]
body = "“And take you my head,” said he, “and bear it even unto the White Mount, in London, and bury it there, with the face towards France.\n\nAnd a long time will you be upon the road.\n\nIn Harlech you will be feasting seven years, the birds of Rhiannon singing unto you the while.\n\nAnd all that time the head will be to you as pleasant company as it ever was when on my body.\n\nAnd at Gwales in Penvro you will be fourscore years, and you may remain there, and the head with you uncorrupted, until you open the door that looks towards Aber Henvelen, and towards Cornwall.\n\nAnd after you have opened that door, there you may no longer tarry, set forth then to London to bury the head, and go straight forward.” So they cut off his head, and these seven went forward therewith.\n\nAnd Branwen was the eighth with them, and they came to land at Aber Alaw, in Talebolyon, and they sat down to rest.\n\nAnd Branwen looked towards Ireland and towards the Island of the Mighty, to see if she could descry them.\n\n“Alas,” said she, “woe is me that I was ever born; two islands have been destroyed because of me!” Then she uttered a loud groan, and there broke her heart.\n\nAnd they made her a four-sided grave, and buried her upon the banks of the Alaw.\n\nThen the seven men journeyed forward towards Harlech, bearing the head with them; and as they went, behold there met them a multitude of men and of women.\n\n“Have you any tidings?” asked Manawyddan.\n\n“We have none,” said they, “save that Caswallawn the son of Beli has conquered the Island of the Mighty, and is crowned king in London.” “What has become,” said they, “of Caradawc the son of Bran, and the seven men who were left with him in this island?” “Caswallawn came upon them, and slew six of the men, and Caradawc’s heart broke for grief thereof; for he could see the sword that slew the men, but knew not who it was that wielded it.\n\nCaswallawn had flung upon him the Veil of Illusion, so that no one could see him slay the men, but the sword only could they see.\n\nAnd it liked him not to slay Caradawc, because he was his nephew, the son of his cousin.\n\nAnd now he was the third whose heart had broke through grief.\n\nPendaran Dyved, who had remained as a young page with these men, escaped into the wood,” said they.\n\nThen they went on to Harlech, and there stopped to rest, and they provided meat and liquor, and sat down to eat and to drink.\n\nAnd there came three birds, and began singing unto them a certain song, and all the songs they had ever heard were unpleasant compared thereto; and the birds seemed to them to be at a great distance from them over the sea, yet they appeared as distinct as if they were close by, and at this repast they continued seven years.\n\nAnd at the close of the seventh year they went forth to Gwales in Penvro.\n\nAnd there they found a fair and regal spot overlooking the ocean; and a spacious hall was therein.\n\nAnd they went into the hall, and two of its doors were open, but the third door was closed, that which looked towards Cornwall.\n\n“See, yonder,” said Manawyddan, “is the door that we may not open.” And that night they regaled themselves and were joyful.\n\nAnd of all they had seen of food laid before them, and of all they had heard of, they remembered nothing; neither of that, nor of any sorrow whatsoever."

