[content]
body = "And whence do you come?” “We come, Lord,” said they, “from Cornwall; and we are ambassadors from Erbin the son of Custennin, thy uncle, and our mission is unto thee.\n\nAnd he greets thee well, as an uncle should greet his nephew, and as a vassal should greet his lord.\n\nAnd he represents unto thee that he waxes heavy and feeble, and is advancing in years.\n\nAnd the neighbouring chiefs, knowing this, grow insolent towards him, and covet his land and possessions.\n\nAnd he earnestly beseeches thee, Lord, to permit Geraint his son to return to him, to protect his possessions, and to become acquainted with his boundaries.\n\nAnd unto him he represents that it were better for him to spend the flower of his youth and the prime of his age in preserving his own boundaries, than in tournaments, which are productive of no profit, although he obtains glory in them.” “Well,” said Arthur, “go, and divest yourselves of your accoutrements, and take food, and refresh yourselves after your fatigues; and before you go forth hence you shall have an answer.” And they went to eat.\n\nAnd Arthur considered that it would go hard with him to let Geraint depart from him and from his Court; neither did he think it fair that his cousin should be restrained from going to protect his dominions and his boundaries, seeing that his father was unable to do so.\n\nNo less was the grief and regret of Gwenhwyvar, and all her women, and all her damsels, through fear that the maiden would leave them.\n\nAnd that day and that night were spent in abundance of feasting.\n\nAnd Arthur showed Geraint the cause of the mission, and of the coming of the ambassadors to him out of Cornwall.\n\n“Truly,” said Geraint, “be it to my advantage or disadvantage, Lord, I will do according to thy will concerning this embassy.” “Behold,” said Arthur, “though it grieves me to part with thee, it is my counsel that thou go to dwell in thine own dominions, and to defend thy boundaries, and to take with thee to accompany thee as many as thou wilt of those thou lovest best among my faithful ones, and among thy friends, and among thy companions in arms.” “Heaven reward thee; and this will I do,” said Geraint.\n\n“What discourse,” said Gwenhwyvar, “do I hear between you?\n\nIs it of those who are to conduct Geraint to his country?” “It is,” said Arthur.\n\n“Then it is needful for me to consider,” said she, “concerning companions and a provision for the lady that is with me?” “Thou wilt do well,” said Arthur.\n\nAnd that night they went to sleep.\n\nAnd the next day the ambassadors were permitted to depart, and they were told that Geraint should follow them.\n\nAnd on the third day Geraint set forth, and many went with him."

