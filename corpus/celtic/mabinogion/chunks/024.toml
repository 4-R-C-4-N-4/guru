[content]
body = "Earl Evrawc owned the Earldom of the North.\n\nAnd he had seven sons.\n\nAnd Evrawc maintained himself not so much by his own possessions as by attending tournaments, and wars, and combats.\n\nAnd, as it often befalls those who join in encounters and wars, he was slain, and six of his sons likewise.\n\nNow the name of his seventh son was Peredur, and he was the youngest of them.\n\nAnd he was not of an age to go to wars and encounters, otherwise he might have been slain as well as his father and brothers.\n\nHis mother was a scheming and thoughtful woman, and she was very solicitous concerning this her only son and his possessions.\n\nSo she took counsel with herself to leave the inhabited country, and to flee to the deserts and unfrequented wildernesses.\n\nAnd she permitted none to bear her company thither but women and boys, and spiritless men, who were both unaccustomed and unequal to war and fighting.\n\nAnd none dared to bring either horses or arms where her son was, lest he should set his mind upon them.\n\nAnd the youth went daily to divert himself in the forest, by flinging sticks and staves.\n\nAnd one day he saw his mother’s flock of goats, and near the goats two hinds were standing.\n\nAnd he marvelled greatly that these two should be without horns, while the others had them.\n\nAnd he thought they had long run wild, and on that account they had lost their horns.\n\nAnd by activity and swiftness of foot, he drove the hinds and the goats together into the house which there was for the goats at the extremity of the forest.\n\nThen Peredur returned to his mother.\n\n“Ah, mother,” said he, “a marvellous thing have I seen in the wood; two of thy goats have run wild, and lost their horns, through their having been so long missing in the wood.\n\nAnd no man had ever more trouble than I had to drive them in.” Then they all arose and went to see.\n\nAnd when they beheld the hinds they were greatly astonished.\n\nAnd one day they saw three knights coming along the horse-road on the borders of the forest.\n\nAnd the three knights were Gwalchmai the son of Gwyar, and Geneir Gwystyl, and Owain the son of Urien.\n\nAnd Owain kept on the track of the knight who had divided the apples in Arthur’s Court, whom they were in pursuit of.\n\n“Mother,” said Peredur, “what are those yonder?” “They are angels, my son,” said she.\n\n“By my faith,” said Peredur, “I will go and become an angel with them.” And Peredur went to the road, and met them.\n\n“Tell me, good soul,” said Owain, “sawest thou a knight pass this way, either to-day or yesterday?” “I know not,” answered he, “what a knight is.” “Such an one as I am,” said Owain.\n\n“If thou wilt tell me what I ask thee, I will tell thee that which thou askest me.” “Gladly will I do so,” replied Owain.\n\n“What is this?” demanded Peredur, concerning the saddle.\n\n“It is a saddle,” said Owain.\n\nThen he asked about all the accoutrements which he saw upon the men, and the horses, and the arms, and what they were for, and how they were used.\n\nAnd Owain shewed him all these things fully, and told him what use was made of them."

