[content]
body = "“Lord,” said he, “behold, yonder is Gwenhwyvar, and none with her save only one maiden.” “Command Gildas the son of Caw, and all the scholars of the Court,” said Arthur, “to attend Gwenhwyvar to the palace.” And they did so.\n\nThen they all set forth, holding converse together concerning the head of the stag, to whom it should be given.\n\nOne wished that it should be given to the lady best beloved by him, and another to the lady whom he loved best.\n\nAnd all they of the household, and the knights, disputed sharply concerning the head.\n\nAnd with that they came to the palace.\n\nAnd when Arthur and Gwenhwyvar heard them disputing about the head of the stag, Gwenhwyvar said to Arthur, “My lord, this is my counsel concerning the stag’s head; let it not be given away until Geraint the son of Erbin shall return from the errand he is upon.” And Gwenhwyvar told Arthur what that errand was.\n\n“Right gladly shall it be so,” said Arthur.\n\nAnd thus it was settled.\n\nAnd the next day Gwenhwyvar caused a watch to be set upon the ramparts for Geraint’s coming.\n\nAnd after mid-day they beheld an unshapely little man upon a horse, and after him, as they supposed, a dame or a damsel, also on horseback, and after her a knight of large stature, bowed down, and hanging his head low and sorrowfully, and clad in broken and worthless armour.\n\nAnd before they came near to the gate, one of the watch went to Gwenhwyvar, and told her what kind of people they saw, and what aspect they bore.\n\n“I know not who they are,” said he.\n\n“But I know,” said Gwenhwyvar; “this is the knight whom Geraint pursued, and methinks that he comes not here by his own free will.\n\nBut Geraint has overtaken him, and avenged the insult to the maiden to the uttermost.” And thereupon, behold a porter came to the spot where Gwenhwyvar was.\n\n“Lady,” said he, “at the gate there is a knight, and I saw never a man of so pitiful an aspect to look upon as he.\n\nMiserable and broken is the armour that he wears, and the hue of blood is more conspicuous upon it than its own colour.” “Knowest thou his name?” said she.\n\n“I do,” said he; “he tells me that he is Edeyrn the son of Nudd.” Then she replied, “I know him not.” So Gwenhwyvar went to the gate to meet him, and he entered.\n\nAnd Gwenhwyvar was sorry when she saw the condition he was in, even though he was accompanied by the churlish dwarf.\n\nThen Edeyrn saluted Gwenhwyvar.\n\n“Heaven protect thee,” said she.\n\n“Lady,” said he, “Geraint the son of Erbin, thy best and most valiant servant, greets thee.” “Did he meet thee?” she asked.\n\n“Yes,” said he, “and it was not to my advantage; and that was not his fault, but mine, Lady.\n\nAnd Geraint greets thee well; and in greeting thee he compelled me to come hither to do thy pleasure for the insult which thy maiden received from the dwarf.\n\nHe forgives the insult to himself, in consideration of his having put me in peril of my life.\n\nAnd he imposed on me a condition, manly, and honourable, and warrior-like, which was to do thee justice, Lady.” “Now, where did he overtake thee?” “At the place where we were jousting, and contending for the Sparrow-Hawk, in the town which is now called Cardiff."

