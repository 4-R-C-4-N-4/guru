[content]
body = "During his whole life, a blade of reed grass bent not beneath his feet, much less did one ever break, so lightly did he tread.) Teithi Hên the son of Gwynhan (his dominions were swallowed up by the sea, and he himself hardly escaped, and he came to Arthur; and his knife had this peculiarity, that from the time that he came there no haft would ever remain upon it, and owing to this a sickness came over him, and he pined away during the remainder of his life, and of this he died).\n\nAnd Carneddyr the son of Govynyon Hên, and Gwenwynwyn the son of Nav Gyssevin, Arthur’s champion, and Llysgadrudd Emys, and Gwrbothu Hên (uncles unto Arthur were they, his mother’s brothers).\n\nKulvanawyd the son of Goryon, and Llenlleawg Wyddel from the headland of Ganion, and Dyvynwal Moel, and Dunard king of the North, Teirnon Twryf Bliant, and Tegvan Gloff, and Tegyr Talgellawg, Gwrdinal the son of Ebrei, and Morgant Hael, Gwystyl the son of Rhun the son of Nwython, and Llwyddeu the son of Nwython, and Gwydre the son of Llwyddeu (Gwenabwy the daughter of [Kaw] was his mother, Hueil his uncle stabbed him, and hatred was between Hueil and Arthur because of the wound).\n\nDrem the son of Dremidyd (when the gnat arose in the morning with the sun, he could see it from Gelli Wic in Cornwall, as far off as Pen Blathaon in North Britain).\n\nAnd Eidyol the son of Ner, and Glwyddyn Saer (who constructed Ehangwen, Arthur’s Hall).\n\nKynyr Keinvarvawc (when he was told he had a son born he said to his wife, ‘Damsel, if thy son be mine, his heart will be always cold, and there will be no warmth in his hands; and he will have another peculiarity, if he is my son he will always be stubborn; and he will have another peculiarity, when he carries a burden, whether it be large or small, no one will be able to see it, either before him or at his back; and he will have another peculiarity, no one will be able to resist fire and water so well as he will; and he will have another peculiarity, there will never be a servant or an officer equal to him’).\n\nHenwas, and Henwyneb (an old companion to Arthur).\n\nGwallgoyc (another; when he came to a town, though there were three hundred houses in it, if he wanted anything, he would not let sleep come to the eyes of any one whilst he remained there).\n\nBerwyn the son of Gerenhir, and Paris king of France, and Osla Gyllellvawr (who bore a short broad dagger.\n\nWhen Arthur and his hosts came before a torrent, they would seek for a narrow place where they might pass the water, and would lay the sheathed dagger across the torrent, and it would form a bridge sufficient for the armies of the three Islands of Britain, and of the three islands adjacent, with their spoil).\n\nGwyddawg the son of Menestyr (who slew Kai, and whom Arthur slew, together with his brothers, to revenge Kai)."

