[content]
body = "“Llassar Llaesgyvnewid; he came here from Ireland with Kymideu Kymeinvoll, his wife, who escaped from the Iron House in Ireland, when it was made red hot around them, and fled hither.\n\nAnd it is a marvel to me that thou shouldst know nothing concerning the matter.” “Something I do know,” said he, “and as much as I know I will tell thee.\n\nOne day I was hunting in Ireland, and I came to the mound at the head of the lake, which is called the Lake of the Cauldron.\n\nAnd I beheld a huge yellow-haired man coming from the lake with a cauldron upon his back.\n\nAnd he was a man of vast size, and of horrid aspect, and a woman followed after him.\n\nAnd if the man was tall, twice as large as he was the woman, and they came towards me and greeted me.\n\n‘Verily,’ asked I, ‘wherefore are you journeying?’ ‘Behold, this,’ said he to me, ‘is the cause that we journey.\n\nAt the end of a month and a fortnight this woman will have a son; and the child that will be born at the end of the month and the fortnight will be a warrior fully armed.’ So I took them with me and maintained them.\n\nAnd they were with me for a year.\n\nAnd that year I had them with me not grudgingly.\n\nBut thenceforth was there murmuring, because that they were with me.\n\nFor, from the beginning of the fourth month they had begun to make themselves hated and to be disorderly in the land; committing outrages, and molesting and harassing the nobles and ladies; and thenceforward my people rose up and besought me to part with them, and they bade me to choose between them and my dominions.\n\nAnd I applied to the council of my country to know what should be done concerning them; for of their own free will they would not go, neither could they be compelled against their will, through fighting.\n\nAnd [the people of the country] being in this strait, they caused a chamber to be made all of iron.\n\nNow when the chamber was ready, there came there every smith that was in Ireland, and every one who owned tongs and hammer.\n\nAnd they caused coals to be piled up as high as the top of the chamber.\n\nAnd they had the man, and the woman, and the children, served with plenty of meat and drink; but when it was known that they were drunk, they began to put fire to the coals about the chamber, and they blew it with bellows until the house was red hot all around them.\n\nThen was there a council held in the centre of the floor of the chamber.\n\nAnd the man tarried until the plates of iron were all of a white heat; and then, by reason of the great heat, the man dashed against the plates with his shoulder and struck them out, and his wife followed him; but except him and his wife none escaped thence.\n\nAnd then I suppose, lord,” said Matholwch unto Bendigeid Vran, “that he came over unto thee.” “Doubtless he came here,” said he, “and gave unto me the cauldron.” “In what manner didst thou receive them?” “I dispersed them through every part of my dominions, and they have become numerous and are prospering everywhere, and they fortify the places where they are with men and arms, of the best that were ever seen.” That night they continued to discourse as much as they would, and had minstrelsy and carousing, and when it was more pleasant to them to sleep than to sit longer, they went to rest."

