[content]
body = "“My lord,” said he, “I know the meaning of all this, and my request is, that thou wilt permit me to throw the water on the slab, and to receive the first adventure that may befall.” And Arthur gave him leave.\n\nThen Kai threw a bowlful of water upon the slab, and immediately there came the thunder, and after the thunder the shower.\n\nAnd such a thunderstorm they had never known before, and many of the attendants who were in Arthur’s train were killed by the shower.\n\nAfter the shower had ceased the sky became clear; and on looking at the tree they beheld it completely leafless.\n\nThen the birds descended upon the tree, and the song of the birds was far sweeter than any strain they had ever heard before.\n\nThen they beheld a knight on a coal-black horse, clothed in black satin, coming rapidly towards them.\n\nAnd Kai met him and encountered him, and it was not long before Kai was overthrown.\n\nAnd the knight withdrew, and Arthur and his host encamped for the night.\n\nAnd when they arose in the morning, they perceived the signal of combat upon the lance of the Knight.\n\nAnd Kai came to Arthur, and spoke to him: “My lord,” said he, “though I was overthrown yesterday, if it seem good to thee, I would gladly meet the Knight again to-day.” “Thou mayst do so,” said Arthur.\n\nAnd Kai went towards the Knight.\n\nAnd on the spot he overthrew Kai, and struck him with the head of his lance in the forehead, so that it broke his helmet and the head-piece, and pierced the skin and the flesh, the breadth of the spear-head, even to the bone.\n\nAnd Kai returned to his companions.\n\nAfter this, all the household of Arthur went forth, one after the other, to combat the Knight, until there was not one that was not overthrown by him, except Arthur and Gwalchmai.\n\nAnd Arthur armed himself to encounter the Knight.\n\n“Oh, my lord,” said Gwalchmai, “permit me to fight with him first.” And Arthur permitted him.\n\nAnd he went forth to meet the Knight, having over himself and his horse a satin robe of honour which had been sent him by the daughter of the Earl of Rhangyw, and in this dress he was not known by any of the host.\n\nAnd they charged each other, and fought all that day until the evening, and neither of them was able to unhorse the other.\n\nThe next day they fought with strong lances, and neither of them could obtain the mastery.\n\nAnd the third day they fought with exceeding strong lances.\n\nAnd they were incensed with rage, and fought furiously, even until noon.\n\nAnd they gave each other such a shock that the girths of their horses were broken, so that they fell over their horses’ cruppers to the ground.\n\nAnd they rose up speedily, and drew their swords, and resumed the combat; and the multitude that witnessed their encounter felt assured that they had never before seen two men so valiant or so powerful.\n\nAnd had it been midnight, it would have been light from the fire that flashed from their weapons.\n\nAnd the Knight gave Gwalchmai a blow that turned his helmet from off his face, so that the Knight knew that it was Gwalchmai.\n\nThen Owain said, “My lord Gwalchmai, I did not know thee for my cousin, owing to the robe of honour that enveloped thee; take my sword and my arms.” Said Gwalchmai, “Thou, Owain, art the victor; take thou my sword.” And with that Arthur saw that they were conversing, and advanced towards them."

