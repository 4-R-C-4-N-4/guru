[content]
body = "“My lord Arthur,” said Gwalchmai, “here is Owain, who has vanquished me, and will not take my arms.” “My lord,” said Owain, “it is he that has vanquished me, and he will not take my sword.” “Give me your swords,” said Arthur, “and then neither of you has vanquished the other.” Then Owain put his arms around Arthur’s neck, and they embraced.\n\nAnd all the host hurried forward to see Owain, and to embrace him; and there was nigh being a loss of life, so great was the press.\n\nAnd they retired that night, and the next day Arthur prepared to depart.\n\n“My lord,” said Owain, “this is not well of thee; for I have been absent from thee these three years, and during all that time, up to this very day, I have been preparing a banquet for thee, knowing that thou wouldst come to seek me.\n\nTarry with me, therefore, until thou and thy attendants have recovered the fatigues of the journey, and have been anointed.” And they all proceeded to the Castle of the Countess of the Fountain, and the banquet which had been three years preparing was consumed in three months.\n\nNever had they a more delicious or agreeable banquet.\n\nAnd Arthur prepared to depart.\n\nThen he sent an embassy to the Countess, to beseech her to permit Owain to go with him for the space of three months, that he might show him to the nobles and the fair dames of the Island of Britain.\n\nAnd the Countess gave her consent, although it was very painful to her.\n\nSo Owain came with Arthur to the Island of Britain.\n\nAnd when he was once more amongst his kindred and friends, he remained three years, instead of three months, with them.\n\nAnd as Owain one day sat at meat, in the city of Caerlleon upon Usk, behold a damsel entered upon a bay horse, with a curling mane and covered with foam, and the bridle and so much as was seen of the saddle were of gold.\n\nAnd the damsel was arrayed in a dress of yellow satin.\n\nAnd she came up to Owain, and took the ring from off his hand.\n\n“Thus,” said she, “shall be treated the deceiver, the traitor, the faithless, the disgraced, and the beardless.” And she turned her horse’s head and departed.\n\nThen his adventure came to Owain’s remembrance, and he was sorrowful; and having finished eating he went to his own abode and made preparations that night.\n\nAnd the next day he arose but did not go to the Court, but wandered to the distant parts of the earth and to uncultivated mountains.\n\nAnd he remained there until all his apparel was worn out, and his body was wasted away, and his hair was grown long.\n\nAnd he went about with the wild beasts and fed with them, until they became familiar with him; but at length he grew so weak that he could no longer bear them company.\n\nThen he descended from the mountains to the valley, and came to a park that was the fairest in the world, and belonged to a widowed Countess.\n\nOne day the Countess and her maidens went forth to walk by a lake, that was in the middle of the park.\n\nAnd they saw the form of a man.\n\nAnd they were terrified.\n\nNevertheless they went near him, and touched him, and looked at him.\n\nAnd they saw that there was life in him, though he was exhausted by the heat of the sun.\n\nAnd the Countess returned to the Castle, and took a flask full of precious ointment, and gave it to one of her maidens."

