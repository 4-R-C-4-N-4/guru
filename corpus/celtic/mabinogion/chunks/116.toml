[content]
body = "And this they merit, for they were ever in the front and the rear in every peril.” And he saw but one hue upon the men and the horses of this troop, for they were all as red as blood.\n\nAnd when one of the knights rode forth from the troop, he looked like a pillar of fire glancing athwart the sky.\n\nAnd this troop encamped above the ford.\n\nThen they beheld another troop coming towards the ford, and these from their horses’ chests upwards were whiter than the lily, and below blacker than jet.\n\nAnd they saw one of these knights go before the rest, and spur his horse into the ford in such a manner that the water dashed over Arthur and the Bishop, and those holding counsel with them, so that they were as wet as if they had been drenched in the river.\n\nAnd as he turned the head of his horse, the youth who stood before Arthur struck the horse over the nostrils with his sheathed sword, so that, had it been with the bare blade, it would have been a marvel if the bone had not been wounded as well as the flesh.\n\nAnd the knight drew his sword half out of the scabbard, and asked of him, “Wherefore didst thou strike my horse?\n\nWhether was it in insult or in counsel unto me?” “Thou dost indeed lack counsel.\n\nWhat madness caused thee to ride so furiously as to dash the water of the ford over Arthur, and the consecrated Bishop, and their counsellors, so that they were as wet as if they had been dragged out of the river?” “As counsel then will I take it.” So he turned his horse’s head round towards his army.\n\n“Iddawc,” said Rhonabwy, “who was yonder knight?” “The most eloquent and the wisest youth that is in this island; Adaon, the son of Taliesin.” “Who was the man that struck his horse?” “A youth of froward nature; Elphin, the son of Gwyddno.” Then spake a tall and stately man, of noble and flowing speech, saying that it was a marvel that so vast a host should be assembled in so narrow a space, and that it was a still greater marvel that those should be there at that time who had promised to be by mid-day in the battle of Badon, fighting with Osla Gyllellvawr.\n\n“Whether thou mayest choose to proceed or not, I will proceed.” “Thou sayest well,” said Arthur, “and we will go altogether.” “Iddawc,” said Rhonabwy, “who was the man who spoke so marvellously unto Arthur erewhile?” “A man who may speak as boldly as he listeth, Caradawc Vreichvras, the son of Llyr Marini, his chief counsellor and his cousin.” Then Iddawc took Rhonabwy behind him on his horse, and that mighty host moved forward, each troop in its order, towards Cevndigoll.\n\nAnd when they came to the middle of the ford of the Severn, Iddawc turned his horse’s head, and Rhonabwy looked along the valley of the Severn.\n\nAnd he beheld two fair troops coming towards the ford.\n\nOne troop there came of brilliant white, whereof every one of the men had a scarf of white satin with jet-black borders.\n\nAnd the knees and the tops of the shoulders of their horses were jet-black, though they were of a pure white in every other part.\n\nAnd their banners were pure white, with black points to them all.\n\n“Iddawc,” said Rhonabwy, “who are yonder pure white troop?” “They are the men of Norway, and March the son of Meirchion is their prince."

