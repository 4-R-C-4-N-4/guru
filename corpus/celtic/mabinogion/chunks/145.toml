[content]
body = "And then he sang an Englyn:— “There is in this bag a different sort of meal, The ready combatant, when the assault is made By his fellow-warriors, prepared for battle.” Thereupon came the hosts unto the house.\n\nThe men of the Island of Ireland entered the house on the one side, and the men of the Island of the Mighty on the other.\n\nAnd as soon as they had sat down there was concord between them; and the sovereignty was conferred upon the boy.\n\nWhen the peace was concluded, Bendigeid Vran called the boy unto him, and from Bendigeid Vran the boy went unto Manawyddan, and he was beloved by all that beheld him.\n\nAnd from Manawyddan the boy was called by Nissyen the son of Eurosswydd, and the boy went unto him lovingly.\n\n“Wherefore,” said Evnissyen, “comes not my nephew the son of my sister unto me?\n\nThough he were not king of Ireland, yet willingly would I fondle the boy.” “Cheerfully let him go to thee,” said Bendigeid Vran, and the boy went unto him cheerfully.\n\n“By my confession to Heaven,” said Evnissyen in his heart, “unthought of by the household is the slaughter that I will this instant commit.” Then he arose and took up the boy by the feet, and before any one in the house could seize hold of him, he thrust the boy headlong into the blazing fire.\n\nAnd when Branwen saw her son burning in the fire, she strove to leap into the fire also, from the place where she sat between her two brothers.\n\nBut Bendigeid Vran grasped her with one hand, and his shield with the other.\n\nThen they all hurried about the house, and never was there made so great a tumult by any host in one house as was made by them, as each man armed himself.\n\nThen said Morddwydtyllyon, “The gadflies of Morddwydtyllyon’s Cow!” And while they all sought their arms, Bendigeid Vran supported Branwen between his shield and his shoulder.\n\nThen the Irish kindled a fire under the cauldron of renovation, and they cast the dead bodies into the cauldron until it was full, and the next day they came forth fighting-men as good as before, except that they were not able to speak.\n\nThen when Evnissyen saw the dead bodies of the men of the Island of the Mighty nowhere resuscitated, he said in his heart, “Alas!\n\nwoe is me, that I should have been the cause of bringing the men of the Island of the Mighty into so great a strait.\n\nEvil betide me if I find not a deliverance therefrom.” And he cast himself among the dead bodies of the Irish, and two unshod Irishmen came to him, and, taking him to be one of the Irish, flung him into the cauldron.\n\nAnd he stretched himself out in the cauldron, so that he rent the cauldron into four pieces, and burst his own heart also.\n\nIn consequence of that the men of the Island of the Mighty obtained such success as they had; but they were not victorious, for only seven men of them all escaped, and Bendigeid Vran himself was wounded in the foot with a poisoned dart.\n\nNow the seven men that escaped were Pryderi, Manawyddan, Gluneu Eil Taran, Taliesin, Ynawc, Grudyen the son of Muryel, and Heilyn the son of Gwynn Hen.\n\nAnd Bendigeid Vran commanded them that they should cut off his head."

