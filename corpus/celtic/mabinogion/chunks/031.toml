[content]
body = "“Mercy shalt thou have,” said he, “upon these terms, that thou take this woman in marriage, and do her all the honour and reverence in thy power, seeing thou hast, without cause, slain her wedded husband; and that thou go to Arthur’s Court, and shew him that it was I that overthrew thee, to do him honour and service; and that thou tell him that I will never come to his Court again until I have met with the tall man that is there, to take vengeance upon him for his insult to the dwarf and dwarfess.” And he took the knight’s assurance, that he would perform all this.\n\nThen the knight provided the lady with a horse and garments that were suitable for her, and took her with him to Arthur’s Court.\n\nAnd he told Arthur all that had occurred, and gave the defiance to Kai.\n\nAnd Arthur and all his household reproved Kai, for having driven such a youth as Peredur from his Court.\n\nSaid Owain the son of Urien, “This youth will never come into the Court until Kai has gone forth from it.” “By my faith,” said Arthur, “I will search all the deserts in the Island of Britain, until I find Peredur, and then let him and his adversary do their utmost to each other.” Then Peredur rode forward.\n\nAnd he came to a desert wood, where he saw not the track either of men or animals, and where there was nothing but bushes and weeds.\n\nAnd at the upper end of the wood he saw a vast castle, wherein were many strong towers; and when he came near the gate, he found the weeds taller than he had seen them elsewhere.\n\nAnd he struck the gate with the shaft of his lance, and thereupon behold a lean, auburn-haired youth came to an opening in the battlements.\n\n“Choose thou, chieftain,” said he, “whether shall I open the gate unto thee, or shall I announce unto those that are chief, that thou art at the gateway?” “Say that I am here,” said Peredur, “and if it is desired that I should enter, I will go in.” And the youth came back, and opened the gate for Peredur.\n\nAnd when he went into the hall, he beheld eighteen youths, lean and red-headed, of the same height, and of the same aspect, and of the same dress, and of the same age as the one who had opened the gate for him.\n\nAnd they were well skilled in courtesy and in service.\n\nAnd they disarrayed him.\n\nThen they sat down to discourse.\n\nThereupon, behold five maidens came from the chamber into the hall.\n\nAnd Peredur was certain that he had never seen another of so fair an aspect as the chief of the maidens.\n\nAnd she had an old garment of satin upon her, which had once been handsome, but was then so tattered, that her skin could be seen through it.\n\nAnd whiter was her skin than the bloom of crystal, and her hair and her two eyebrows were blacker than jet, and on her cheeks were two red spots, redder than whatever is reddest.\n\nAnd the maiden welcomed Peredur, and put her arms about his neck, and made him sit down beside her.\n\nNot long after this he saw two nuns enter, and a flask full of wine was borne by one, and six loaves of white bread by the other.\n\n“Lady,” said they, “Heaven is witness, that there is not so much of food and liquor as this left in yonder Convent this night.” Then they went to meat, and Peredur observed that the maiden wished to give more of the food and of the liquor to him than to any of the others."

