[content]
body = "And three nights before the end of the battle of Camlan I left them, and went to the Llech Las in North Britain to do penance.\n\nAnd there I remained doing penance seven years, and after that I gained pardon.” Then lo!\n\nthey heard a mighty sound which was much louder than that which they had heard before, and when they looked round towards the sound, they beheld a ruddy youth, without beard or whiskers, noble of mien, and mounted on a stately courser.\n\nAnd from the shoulders and the front of the knees downwards the horse was bay.\n\nAnd upon the man was a dress of red satin wrought with yellow silk, and yellow were the borders of his scarf.\n\nAnd such parts of his apparel and of the trappings of his horse as were yellow, as yellow were they as the blossom of the broom, and such as were red, were as ruddy as the ruddiest blood in the world.\n\nThen, behold the horseman overtook them, and he asked of Iddawc a share of the little men that were with him.\n\n“That which is fitting for me to grant I will grant, and thou shalt be a companion to them as I have been.” And the horseman went away.\n\n“Iddawc,” inquired Rhonabwy, “who was that horseman?” “Rhuvawn Pebyr the son of Prince Deorthach.” And they journeyed over the plain of Argyngroeg as far as the ford of Rhyd y Groes on the Severn.\n\nAnd for a mile around the ford on both sides of the road, they saw tents and encampments, and there was the clamour of a mighty host.\n\nAnd they came to the edge of the ford, and there they beheld Arthur sitting on a flat island below the ford, having Bedwini the Bishop on one side of him, and Gwarthegyd the son of Kaw on the other.\n\nAnd a tall, auburn-haired youth stood before him, with his sheathed sword in his hand, and clad in a coat and cap of jet-black satin.\n\nAnd his face was white as ivory, and his eyebrows black as jet, and such part of his wrist as could be seen between his glove and his sleeve, was whiter than the lily, and thicker than a warrior’s ankle.\n\nThen came Iddawc and they that were with him, and stood before Arthur and saluted him.\n\n“Heaven grant thee good,” said Arthur.\n\n“And where, Iddawc, didst thou find these little men?” “I found them, lord, up yonder on the road.” Then the Emperor smiled.\n\n“Lord,” said Iddawc, “wherefore dost thou laugh?” “Iddawc,” replied Arthur, “I laugh not; but it pitieth me that men of such stature as these should have this island in their keeping, after the men that guarded it of yore.” Then said Iddawc, “Rhonabwy, dost thou see the ring with a stone set in it, that is upon the Emperor’s hand?” “I see it,” he answered.\n\n“It is one of the properties of that stone to enable thee to remember that thou seest here to-night, and hadst thou not seen the stone, thou wouldest never have been able to remember aught thereof.” After this they saw a troop coming towards the ford.\n\n“Iddawc,” inquired Rhonabwy, “to whom does yonder troop belong?” “They are the fellows of Rhuvawn Pebyr the son of Prince Deorthach.\n\nAnd these men are honourably served with mead and bragget, and are freely beloved by the daughters of the kings of the Island of Britain."

