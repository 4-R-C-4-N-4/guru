body = "And Kilhwch caught it and threw it vigorously, and wounded him through the eyeball, so that the dart came out at the back of his head.\n\n“A cursed ungentle son-in-law, truly!\n\nAs long as I remain alive, my eyesight will be the worse.\n\nWhenever I go against the wind, my eyes will water; and peradventure my head will burn, and I shall have a giddiness every new moon.\n\nCursed be the fire in which it was forged.\n\nLike the bite of a mad dog is the stroke of this poisoned iron.” And they went to meat.\n\nAnd the next day they came again to the palace, and they said, “Shoot not at us any more, unless thou desirest such hurt, and harm, and torture as thou now hast, and even more.” “Give me thy daughter, and if thou wilt not give her, thou shalt receive thy death because of her.” “Where is he that seeks my daughter?\n\nCome hither where I may see thee.” And they placed him a chair face to face with him.\n\nSaid Yspaddaden Penkawr, “Is it thou that seekest my daughter?” “It is I,” answered Kilhwch.\n\n“I must have thy pledge that thou wilt not do towards me otherwise than is just, and when I have gotten that which I shall name, my daughter thou shalt have.” “I promise thee that willingly,” said Kilhwch, “name what thou wilt.” “I will do so,” said he.\n\n“Seest thou yonder vast hill?” “I see it.” “I require that it be rooted up, and that the grubbings be burned for manure on the face of the land, and that it be ploughed and sown in one day, and in one day that the grain ripen.\n\nAnd of that wheat I intend to make food and liquor fit for the wedding of thee and my daughter.\n\nAnd all this I require done in one day.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though this be easy for thee, there is yet that which will not be so.\n\nNo husbandman can till or prepare this land, so wild is it, except Amaethon the son of Don, and he will not come with thee by his own free will, and thou wilt not be able to compel him.” “It will be easy for me to compass this, although thou mayest think that it will not be easy.” “Though thou get this, there is yet that which thou wilt not get.\n\nGovannon the son of Don to come to the headland to rid the iron, he will do no work of his own good will except for a lawful king, and thou wilt not be able to compel him.” “It will be easy for me to compass this.” “Though thou get this, there is yet that which thou wilt not get; the two dun oxen of Gwlwlyd, both yoked together, to plough the wild land yonder stoutly.\n\nHe will not give them of his own free will, and thou wilt not be able to compel him.” “It will be easy for me to compass this.” “Though thou get this, there is yet that which thou wilt not get; the yellow and the brindled bull yoked together do I require.” “It will be easy for me to compass this.” “Though thou get this, there is yet that which thou wilt not get; the two horned oxen, one of which is beyond, and the other this side of the peaked mountain, yoked together in the same plough."

