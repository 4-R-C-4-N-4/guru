[content]
body = "Gwalchmai the son of Gwyar, and Riogonedd the son of the king of Ireland, and Ondyaw the son of the duke of Burgundy, Gwilim the son of the ruler of the Franks, Howel the son of Emyr of Brittany, Elivry, and Nawkyrd, Gwynn the son of Tringad, Goreu the son of Custennin, Gweir Gwrhyd Vawr, Garannaw the son of Golithmer, Peredur the son of Evrawc, Gwynnllogell, Gwyr a judge in the Court of Arthur, Dyvyr the son of Alun of Dyved, Gwrei Gwalstawd Ieithoedd, Bedwyr the son of Bedrawd, Hadwry the son of Gwryon, Kai the son of Kynyr, Odyar the Frank, the Steward of Arthur’s Court, and Edeyrn the son of Nudd.\n\nSaid Geraint, “I think that I shall have enough of knighthood with me.” “Yes,” said Arthur, “but it will not be fitting for thee to take Edeyrn with thee, although he is well, until peace shall be made between him and Gwenhwyvar.” “Gwenhwyvar can permit him to go with me, if he give sureties.” “If she please, she can let him go without sureties, for enough of pain and affliction has he suffered for the insult which the maiden received from the dwarf.” “Truly,” said Gwenhwyvar, “since it seems well to thee and to Geraint, I will do this gladly, Lord.” Then she permitted Edeyrn freely to depart.\n\nAnd many there were who accompanied Geraint, and they set forth; and never was there seen a fairer host journeying towards the Severn.\n\nAnd on the other side of the Severn were the nobles of Erbin the son of Custennin, and his foster-father at their head, to welcome Geraint with gladness; and many of the women of the Court, with his mother, came to receive Enid the daughter of Ynywl, his wife.\n\nAnd there was great rejoicing and gladness throughout the whole Court, and throughout all the country, concerning Geraint, because of the greatness of their love towards him, and of the greatness of the fame which he had gained since he went from amongst them, and because he was come to take possession of his dominions and to preserve his boundaries.\n\nAnd they came to the Court.\n\nAnd in the Court they had ample entertainment, and a multitude of gifts and abundance of liquor, and a sufficiency of service, and a variety of minstrelsy and of games.\n\nAnd to do honour to Geraint, all the chief men of the country were invited that night to visit him.\n\nAnd they passed that day and that night in the utmost enjoyment.\n\nAnd at dawn next day Erbin arose, and summoned to him Geraint, and the noble persons who had borne him company.\n\nAnd he said to Geraint, “I am a feeble and aged man, and whilst I was able to maintain the dominion for thee and for myself, I did so."

