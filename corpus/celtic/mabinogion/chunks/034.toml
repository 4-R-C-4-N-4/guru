[content]
body = "“Behold,” said he, “I am the knight through whom thou art in trouble, and he shall repent it, who has treated thee thus.” Thereupon, behold a knight rode up, and he inquired of Peredur, if he had seen a knight such as he was seeking.\n\n“Hold thy peace,” said Peredur, “I am he whom thou seekest; and by my faith, thou deservest ill of thy household for thy treatment of the maiden, for she is innocent concerning me.” So they encountered, and they were not long in combat ere Peredur overthrew the knight, and he besought his mercy.\n\n“Mercy thou shalt have,” said Peredur, “so thou wilt return by the way thou camest, and declare that thou holdest the maiden innocent, and so that thou wilt acknowledge unto her the reverse thou hast sustained at my hands.” And the knight plighted him his faith thereto.\n\nThen Peredur rode forward.\n\nAnd above him he beheld a castle, and thitherward he went.\n\nAnd he struck upon the gate with his lance, and then, behold, a comely auburn-haired youth opened the gate, and he had the stature of a warrior, and the years of a boy.\n\nAnd when Peredur came into the hall, there was a tall and stately lady sitting in a chair, and many handmaidens around her; and the lady rejoiced at his coming.\n\nAnd when it was time, they went to meat.\n\nAnd after their repast was finished, “It were well for thee, chieftain,” said she, “to go elsewhere to sleep.” “Wherefore can I not sleep here?” said Peredur.\n\n“Nine sorceresses are here, my soul, of the sorceresses of Gloucester, and their father and their mother are with them; and unless we can make our escape before daybreak, we shall be slain; and already they have conquered and laid waste all the country, except this one dwelling.” “Behold,” said Peredur, “I will remain here to-night, and if you are in trouble, I will do you what service I can; but harm shall you not receive from me.” So they went to rest.\n\nAnd with the break of day, Peredur heard a dreadful outcry.\n\nAnd he hastily arose, and went forth in his vest and his doublet, with his sword about his neck, and he saw a sorceress overtake one of the watch, who cried out violently.\n\nPeredur attacked the sorceress, and struck her upon the head with his sword, so that he flattened her helmet and her head-piece like a dish upon her head.\n\n“Thy mercy, goodly Peredur, son of Evrawc, and the mercy of Heaven.” “How knowest thou, hag, that I am Peredur?” “By destiny, and the foreknowledge that I should suffer harm from thee.\n\nAnd thou shalt take a horse and armour of me; and with me thou shalt go to learn chivalry and the use of thy arms.” Said Peredur, “Thou shalt have mercy, if thou pledge thy faith thou wilt never more injure the dominions of the Countess.” And Peredur took surety of this, and with permission of the Countess, he set forth with the sorceress to the palace of the sorceresses.\n\nAnd there he remained for three weeks, and then he made choice of a horse and arms, and went his way.\n\nAnd in the evening he entered a valley, and at the head of the valley he came to a hermit’s cell, and the hermit welcomed him gladly, and there he spent the night."

