[content]
body = "And they went, together with the miller.\n\nAnd Peredur went and sat down in the outer chamber of the tent, and she came and placed herself by his side.\n\nAnd there was but little discourse between them.\n\nAnd Peredur took his leave, and went to his lodging.\n\nAnd the next day he came to visit her, and when he came into the tent there was no one chamber less decorated than the others.\n\nAnd they knew not where he would sit.\n\nAnd Peredur went and sat beside the Empress, and discoursed with her courteously.\n\nAnd while they were thus, they beheld a black man enter with a goblet full of wine in his hand.\n\nAnd he dropped upon his knee before the Empress, and besought her to give it to no one who would not fight with him for it.\n\nAnd she looked upon Peredur.\n\n“Lady,” said he, “bestow on me the goblet.” And Peredur drank the wine, and gave the goblet to the miller’s wife.\n\nAnd while they were thus, behold there entered a black man of larger stature than the other, with a wild beast’s claw in his hand, wrought into the form of a goblet and filled with wine.\n\nAnd he presented it to the Empress, and besought her to give it to no one but the man who would fight with him.\n\n“Lady,” said Peredur, “bestow it on me.” And she gave it to him.\n\nAnd Peredur drank the wine, and sent the goblet to the wife of the miller.\n\nAnd while they were thus, behold a rough-looking, crisp-haired man, taller than either of the others, came in with a bowl in his hand full of wine; and he bent upon his knee, and gave it into the hands of the Empress, and he besought her to give it to none but him who would fight with him for it; and she gave it to Peredur, and he sent it to the miller’s wife.\n\nAnd that night Peredur returned to his lodging; and the next day he accoutred himself and his horse, and went to the meadow and slew the three men.\n\nThen Peredur proceeded to the tent, and the Empress said to him, “Goodly Peredur, remember the faith thou didst pledge me when I gave thee the stone, and thou didst kill the Addanc.” “Lady,” answered he, “thou sayest truth, I do remember it.” And Peredur was entertained by the Empress fourteen years, as the story relates.\n\nArthur was at Caerlleon upon Usk, his principal palace; and in the centre of the floor of the hall were four men sitting on a carpet of velvet, Owain the son of Urien, and Gwalchmai the son of Gwyar, and Howel the son of Emyr Llydaw, and Peredur of the long lance.\n\nAnd thereupon they saw a black curly-headed maiden enter, riding upon a yellow mule, with jagged thongs in her hand to urge it on; and having a rough and hideous aspect.\n\nBlacker were her face and her two hands than the blackest iron covered with pitch; and her hue was not more frightful than her form.\n\nHigh cheeks had she, and a face lengthened downwards, and a short nose with distended nostrils.\n\nAnd one eye was of a piercing mottled grey, and the other was as black as jet, deep-sunk in her head.\n\nAnd her teeth were long and yellow, more yellow were they than the flower of the broom.\n\nAnd her stomach rose from the breast-bone, higher than her chin.\n\nAnd her back was in the shape of a crook, and her legs were large and bony."

