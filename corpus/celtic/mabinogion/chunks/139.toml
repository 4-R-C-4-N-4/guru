[content]
body = "The King of the Island of the Mighty and Manawyddan the son of Llyr on one side, and Matholwch on the other side, and Branwen the daughter of Llyr beside him.\n\nAnd they were not within a house, but under tents.\n\nNo house could ever contain Bendigeid Vran.\n\nAnd they began the banquet and caroused and discoursed.\n\nAnd when it was more pleasing to them to sleep than to carouse, they went to rest, and that night Branwen became Matholwch’s bride.\n\nAnd next day they arose, and all they of the Court, and the officers began to equip and to range the horses and the attendants, and they ranged them in order as far as the sea.\n\nAnd behold one day, Evnissyen, the quarrelsome man of whom it is spoken above, came by chance into the place, where the horses of Matholwch were, and asked whose horses they might be.\n\n“They are the horses of Matholwch king of Ireland, who is married to Branwen, thy sister; his horses are they.” “And is it thus they have done with a maiden such as she, and moreover my sister, bestowing her without my consent?\n\nThey could have offered no greater insult to me than this,” said he.\n\nAnd thereupon he rushed under the horses and cut off their lips at the teeth, and their ears close to their heads, and their tails close to their backs, and wherever he could clutch their eyelids, he cut them to the very bone, and he disfigured the horses and rendered them useless.\n\nAnd they came with these tidings unto Matholwch, saying that the horses were disfigured, and injured so that not one of them could ever be of any use again.\n\n“Verily, lord,” said one, “it was an insult unto thee, and as such was it meant.” “Of a truth, it is a marvel to me, that if they desire to insult me, they should have given me a maiden of such high rank and so much beloved of her kindred, as they have done.” “Lord,” said another, “thou seest that thus it is, and there is nothing for thee to do but to go to thy ships.” And thereupon towards his ships he set out.\n\nAnd tidings came to Bendigeid Vran that Matholwch was quitting the Court without asking leave, and messengers were sent to inquire of him wherefore he did so.\n\nAnd the messengers that went were Iddic the son of Anarawd, and Heveydd Hir.\n\nAnd these overtook him and asked of him what he designed to do, and wherefore he went forth.\n\n“Of a truth,” said he, “if I had known I had not come hither.\n\nI have been altogether insulted, no one had ever worse treatment than I have had here.\n\nBut one thing surprises me above all.” “What is that?” asked they.\n\n“That Branwen the daughter of Llyr, one of the three chief ladies of this island, and the daughter of the King of the Island of the Mighty, should have been given me as my bride, and that after that I should have been insulted; and I marvel that the insult was not done me before they had bestowed upon me a maiden so exalted as she.” “Truly, lord, it was not the will of any that are of the Court,” said they, “nor of any that are of the council, that thou shouldest have received this insult; and as thou hast been insulted, the dishonour is greater unto Bendigeid Vran than unto thee.” “Verily,” said he, “I think so."

