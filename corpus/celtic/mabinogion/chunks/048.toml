[content]
body = "And he beheld a knight coming out to hunt from the other side, mounted on a spirited black snorting palfrey, that advanced at a prancing pace, proudly stepping, and nimbly bounding, and sure of foot; and this was the man to whom the palace belonged.\n\nAnd Gwalchmai saluted him.\n\n“Heaven prosper thee, chieftain,” said he, “and whence comest thou?” “I come,” answered Gwalchmai, “from the Court of Arthur.” “And art thou Arthur’s vassal?” “Yes, by my faith,” said Gwalchmai.\n\n“I will give thee good counsel,” said the knight.\n\n“I see that thou art tired and weary; go unto my palace, if it may please thee, and tarry there to-night.” “Willingly, lord,” said he, “and Heaven reward thee.” “Take this ring as a token to the porter, and go forward to yonder tower, and therein thou wilt find my sister.” And Gwalchmai went to the gate, and showed the ring, and proceeded to the tower.\n\nAnd on entering he beheld a large blazing fire, burning without smoke and with a bright and lofty flame, and a beauteous and stately maiden was sitting on a chair by the fire.\n\nAnd the maiden was glad at his coming, and welcomed him, and advanced to meet him.\n\nAnd he went and sat beside the maiden, and they took their repast.\n\nAnd when their repast was over, they discoursed pleasantly together.\n\nAnd while they were thus, behold there entered a venerable hoary-headed man.\n\n“Ah!\n\nbase girl,” said he, “if thou didst think it was right for thee to entertain and to sit by yonder man, thou wouldest not do so.” And he withdrew his head, and went forth.\n\n“Ah!\n\nchieftain,” said the maiden, “if thou wilt do as I counsel thee, thou wilt shut the door, lest the man should have a plot against thee.” Upon that Gwalchmai arose, and when he came near unto the door, the man, with sixty others, fully armed, were ascending the tower.\n\nAnd Gwalchmai defended the door with a chessboard, that none might enter until the man should return from the chase.\n\nAnd thereupon, behold the Earl arrived.\n\n“What is all this?” asked he.\n\n“It is a sad thing,” said the hoary-headed man; “the young girl yonder has been sitting and eating with him who slew your father.\n\nHe is Gwalchmai, the son of Gwyar.” “Hold thy peace, then,” said the Earl, “I will go in.” And the Earl was joyful concerning Gwalchmai.\n\n“Ha!\n\nchieftain,” said he, “it was wrong of thee to come to my court, when thou knewest that thou didst slay my father; and though we cannot avenge him, Heaven will avenge him upon thee.” “My soul,” said Gwalchmai, “thus it is: I came not here either to acknowledge or to deny having slain thy father; but I am on a message from Arthur, and therefore do I crave the space of a year until I shall return from my embassy, and then, upon my faith, I will come back unto this palace, and do one of two things, either acknowledge it, or deny it.” And the time was granted him willingly; and he remained there that night.\n\nAnd the next morning he rode forth.\n\nAnd the story relates nothing further of Gwalchmai respecting this adventure.\n\nAnd Peredur rode forward.\n\nAnd he wandered over the whole island, seeking tidings of the black maiden, and he could meet with none.\n\nAnd he came to an unknown land, in the centre of a valley, watered by a river."

