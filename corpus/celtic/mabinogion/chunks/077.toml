body = "And Geraint became wroth, and he struck him with the shaft of his lance, so that he rolled headlong to the ground.\n\nBut chastisement worse than this would he not inflict on him.\n\nScared and wildly Kai arose, and he mounted his horse, and went back to his lodging.\n\nAnd thence he proceeded to Gwalchmai’s tent.\n\n“Oh, Sir,” said he to Gwalchmai, “I was told by one of the attendants, that he saw in the wood above a wounded knight, having on battered armour; and if thou dost right, thou wilt go and see if this be true.” “I care not if I do so,” said Gwalchmai.\n\n“Take, then, thy horse, and some of thy armour,” said Kai; “for I hear that he is not over courteous to those who approach him.” So Gwalchmai took his spear and his shield, and mounted his horse, and came to the spot where Geraint was.\n\n“Sir Knight,” said he, “wherefore is thy journey?” “I journey for my own pleasure, and to seek the adventures of the world.” “Wilt thou tell me who thou art; or wilt thou come and visit Arthur, who is near at hand?” “I will make no alliance with thee, nor will I go and visit Arthur,” said he.\n\nAnd he knew that it was Gwalchmai, but Gwalchmai knew him not.\n\n“I purpose not to leave thee,” said Gwalchmai, “till I know who thou art.” And he charged him with his lance, and struck him on his shield, so that the shaft was shivered into splinters, and their horses were front to front.\n\nThen Gwalchmai gazed fixedly upon him, and he knew him.\n\n“Ah, Geraint,” said he, “is it thou that art here?” “I am not Geraint,” said he.\n\n“Geraint thou art, by Heaven,” he replied, “and a wretched and insane expedition is this.” Then he looked around, and beheld Enid, and he welcomed her gladly.\n\n“Geraint,” said Gwalchmai, “come thou and see Arthur; he is thy lord and thy cousin.” “I will not,” said he, “for I am not in a fit state to go and see any one.” Thereupon, behold, one of the pages came after Gwalchmai to speak to him.\n\nSo he sent him to apprise Arthur that Geraint was there wounded, and that he would not go to visit him, and that it was pitiable to see the plight that he was in.\n\nAnd this he did without Geraint’s knowledge, inasmuch as he spoke in a whisper to the page.\n\n“Entreat Arthur,” said he, “to have his tent brought near to the road, for he will not meet him willingly, and it is not easy to compel him in the mood he is in.” So the page came to Arthur, and told him this.\n\nAnd he caused his tent to be removed unto the side of the road.\n\nAnd the maiden rejoiced in her heart.\n\nAnd Gwalchmai led Geraint onwards along the road, till they came to the place where Arthur was encamped, and the pages were pitching his tent by the roadside.\n\n“Lord,” said Geraint, “all hail unto thee.” “Heaven prosper thee; and who art thou?” said Arthur.\n\n“It is Geraint,” said Gwalchmai, “and of his own free will would he not come to meet thee.” “Verily,” said Arthur, “he is bereft of his reason.” Then came Enid, and saluted Arthur.\n\n“Heaven protect thee,” said he.\n\nAnd thereupon he caused one of the pages to take her from her horse.\n\n“Alas!"

