[content]
body = "Then said she unto him, “I declare to thee, that it is thy destiny not to be suited with a wife until thou obtain Olwen, the daughter of Yspaddaden Penkawr.” And the youth blushed, and the love of the maiden diffused itself through all his frame, although he had never seen her.\n\nAnd his father inquired of him, “What has come over thee, my son, and what aileth thee?” “My stepmother has declared to me that I shall never have a wife until I obtain Olwen, the daughter of Yspaddaden Penkawr.” “That will be easy for thee,” answered his father.\n\n“Arthur is thy cousin.\n\nGo, therefore, unto Arthur, to cut thy hair, and ask this of him as a boon.” And the youth pricked forth upon a steed with head dappled grey, of four winters old, firm of limb, with shell-formed hoofs, having a bridle of linked gold on his head, and upon him a saddle of costly gold.\n\nAnd in the youth’s hand were two spears of silver, sharp, well-tempered, headed with steel, three ells in length, of an edge to wound the wind, and cause blood to flow, and swifter than the fall of the dewdrop from the blade of reed-grass upon the earth when the dew of June is at the heaviest.\n\nA gold-hilted sword was upon his thigh, the blade of which was of gold, bearing a cross of inlaid gold of the hue of the lightning of heaven: his war-horn was of ivory.\n\nBefore him were two brindled white-breasted greyhounds, having strong collars of rubies about their necks, reaching from the shoulder to the ear.\n\nAnd the one that was on the left side bounded across to the right side, and the one on the right to the left, and like two sea-swallows sported around him.\n\nAnd his courser cast up four sods with his four hoofs, like four swallows in the air, about his head, now above, now below.\n\nAbout him was a four-cornered cloth of purple, and an apple of gold was at each corner, and every one of the apples was of the value of an hundred kine.\n\nAnd there was precious gold of the value of three hundred kine upon his shoes, and upon his stirrups, from his knee to the tip of his toe.\n\nAnd the blade of grass bent not beneath him, so light was his courser’s tread as he journeyed towards the gate of Arthur’s Palace.\n\nSpoke the youth, “Is there a porter?” “There is; and if thou holdest not thy peace, small will be thy welcome.\n\nI am Arthur’s porter every first day of January.\n\nAnd during every other part of the year but this, the office is filled by Huandaw, and Gogigwc, and Llaeskenym, and Pennpingyon, who goes upon his head to save his feet, neither towards the sky nor towards the earth, but like a rolling stone upon the floor of the court.” “Open the portal.” “I will not open it.” “Wherefore not?” “The knife is in the meat, and the drink is in the horn, and there is revelry in Arthur’s Hall, and none may enter therein but the son of a king of a privileged country, or a craftsman bringing his craft.\n\nBut there will be refreshment for thy dogs, and for thy horses; and for thee there will be collops cooked and peppered, and luscious wine and mirthful songs, and food for fifty men shall be brought unto thee in the guest chamber, where the stranger and the sons of other countries eat, who come not unto the precincts of the Palace of Arthur."

