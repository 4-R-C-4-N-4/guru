[content]
body = "HERE IS THE SECOND PORTION OF THE MABINOGI Bendigeid Vran, the son of Llyr, was the crowned king of this island, and he was exalted from the crown of London.\n\nAnd one afternoon he was at Harlech in Ardudwy, at his Court, and he sat upon the rock of Harlech, looking over the sea.\n\nAnd with him were his brother Manawyddan the son of Llyr, and his brothers by the mother’s side, Nissyen and Evnissyen, and many nobles likewise, as was fitting to see around a king.\n\nHis two brothers by the mother’s side were the sons of Eurosswydd, by his mother, Penardun, the daughter of Beli son of Manogan.\n\nAnd one of these youths was a good youth and of gentle nature, and would make peace between his kindred, and cause his family to be friends when their wrath was at the highest; and this one was Nissyen; but the other would cause strife between his two brothers when they were most at peace.\n\nAnd as they sat thus, they beheld thirteen ships coming from the south of Ireland, and making towards them, and they came with a swift motion, the wind being behind them, and they neared them rapidly.\n\n“I see ships afar,” said the king, “coming swiftly towards the land.\n\nCommand the men of the Court that they equip themselves, and go and learn their intent.” So the men equipped themselves and went down towards them.\n\nAnd when they saw the ships near, certain were they that they had never seen ships better furnished.\n\nBeautiful flags of satin were upon them.\n\nAnd behold one of the ships outstripped the others, and they saw a shield lifted up above the side of the ship, and the point of the shield was upwards, in token of peace.\n\nAnd the men drew near that they might hold converse.\n\nThen they put out boats and came towards the land.\n\nAnd they saluted the king.\n\nNow the king could hear them from the place where he was, upon the rock above their heads.\n\n“Heaven prosper you,” said he, “and be ye welcome.\n\nTo whom do these ships belong, and who is the chief amongst you?” “Lord,” said they, “Matholwch, king of Ireland, is here, and these ships belong to him.” “Wherefore comes he?” asked the king, “and will he come to the land?” “He is a suitor unto thee, lord,” said they, “and he will not land unless he have his boon.” “And what may that be?” inquired the king.\n\n“He desires to ally himself with thee, lord,” said they, “and he comes to ask Branwen the daughter of Llyr, that, if it seem well to thee, the Island of the Mighty may be leagued with Ireland, and both become more powerful.” “Verily,” said he, “let him come to land, and we will take counsel thereupon.” And this answer was brought to Matholwch.\n\n“I will go willingly,” said he.\n\nSo he landed, and they received him joyfully; and great was the throng in the palace that night, between his hosts and those of the Court; and next day they took counsel, and they resolved to bestow Branwen upon Matholwch.\n\nNow she was one of the three chief ladies of this island, and she was the fairest damsel in the world.\n\nAnd they fixed upon Aberffraw as the place where she should become his bride.\n\nAnd they went thence, and towards Aberffraw the hosts proceeded; Matholwch and his host in their ships; Bendigeid Vran and his host by land, until they came to Aberffraw.\n\nAnd at Aberffraw they began the feast and sat down.\n\nAnd thus sat they."

