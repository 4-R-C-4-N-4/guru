[content]
body = "And thence he sent Menw the son of Teirgwaedd to see if the precious things were between the two ears of Twrch Trwyth, since it were useless to encounter him if they were not there.\n\nAlbeit it was certain where he was, for he had laid waste the third part of Ireland.\n\nAnd Menw went to seek for him, and he met with him in Ireland, in Esgeir Oervel.\n\nAnd Menw took the form of a bird; and he descended upon the top of his lair, and strove to snatch away one of the precious things from him, but he carried away nothing but one of his bristles.\n\nAnd the boar rose up angrily and shook himself so that some of his venom fell upon Menw, and he was never well from that day forward.\n\nAfter this Arthur sent an embassy to Odgar, the son of Aedd king of Ireland, to ask for the cauldron of Diwrnach Wyddel, his purveyor.\n\nAnd Odgar commanded him to give it.\n\nBut Diwrnach said, “Heaven is my witness, if it would avail him anything even to look at it, he should not do so.” And the embassy of Arthur returned from Ireland with this denial.\n\nAnd Arthur set forward with a small retinue, and entered into Prydwen, his ship, and went over to Ireland.\n\nAnd they proceeded into the house of Diwrnach Wyddel.\n\nAnd the hosts of Odgar saw their strength.\n\nWhen they had eaten and drunk as much as they desired, Arthur demanded to have the cauldron.\n\nAnd he answered, “If I would have given it to any one, I would have given it at the word of Odgar king of Ireland.” When he had given them this denial, Bedwyr arose and seized hold of the cauldron, and placed it upon the back of Hygwyd, Arthur’s servant, who was brother, by the mother’s side, to Arthur’s servant, Cachamwri.\n\nHis office was always to carry Arthur’s cauldron, and to place fire under it.\n\nAnd Llenlleawg Wyddel seized Caledvwlch, and brandished it.\n\nAnd they slew Diwrnach Wyddel and his company.\n\nThen came the Irish and fought with them.\n\nAnd when he had put them to flight, Arthur with his men went forward to the ship, carrying away the cauldron full of Irish money.\n\nAnd he disembarked at the house of Llwydden the son of Kelcoed, at Porth Kerddin in Dyved.\n\nAnd there is the measure of the cauldron.\n\nThen Arthur summoned unto him all the warriors that were in the three Islands of Britain, and in the three Islands adjacent, and all that were in France and in Armorica, in Normandy and in the Summer Country, and all that were chosen footmen and valiant horsemen.\n\nAnd with all these he went into Ireland.\n\nAnd in Ireland there was great fear and terror concerning him.\n\nAnd when Arthur had landed in the country, there came unto him the saints of Ireland and besought his protection.\n\nAnd he granted his protection unto them, and they gave him their blessing.\n\nThen the men of Ireland came unto Arthur, and brought him provisions.\n\nAnd Arthur went as far as Esgeir Oervel in Ireland, to the place where the Boar Trwyth was with his seven young pigs.\n\nAnd the dogs were let loose upon him from all sides.\n\nThat day until evening the Irish fought with him, nevertheless he laid waste the fifth part of Ireland.\n\nAnd on the day following the household of Arthur fought with him, and they were worsted by him, and got no advantage."

