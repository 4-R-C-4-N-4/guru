[content]
body = "And the third day Arthur himself encountered him, and he fought with him nine nights and nine days without so much as killing even one little pig.\n\nThe warriors inquired of Arthur what was the origin of that swine; and he told them that he was once a king, and that God had transformed him into a swine for his sins.\n\nThen Arthur sent Gwrhyr Gwalstawt Ieithoedd, to endeavour to speak with him.\n\nAnd Gwrhyr assumed the form of a bird, and alighted upon the top of the lair, where he was with the seven young pigs.\n\nAnd Gwrhyr Gwalstawt Ieithoedd asked him, “By him who turned you into this form, if you can speak, let some one of you, I beseech you, come and talk with Arthur.” Grugyn Gwrych Ereint made answer to him.\n\n(Now his bristles were like silver wire, and whether he went through the wood or through the plain, he was to be traced by the glittering of his bristles.) And this was the answer that Grugyn made: “By him who turned us into this form, we will not do so, and we will not speak with Arthur.\n\nThat we have been transformed thus is enough for us to suffer, without your coming here to fight with us.” “I will tell you.\n\nArthur comes but to fight for the comb, and the razor, and the scissors which are between the two ears of Twrch Trwyth.” Said Grugyn, “Except he first take his life, he will never have those precious things.\n\nAnd to-morrow morning we will rise up hence, and we will go into Arthur’s country, and there will we do all the mischief that we can.” So they set forth through the sea towards Wales.\n\nAnd Arthur and his hosts, and his horses and his dogs, entered Prydwen, that they might encounter them without delay.\n\nTwrch Trwyth landed in Porth Cleis in Dyved, and Arthur came to Mynyw.\n\nThe next day it was told to Arthur that they had gone by, and he overtook them as they were killing the cattle of Kynnwas Kwrr y Vagyl, having slain all that were at Aber Gleddyf, of man and beast, before the coming of Arthur.\n\nNow when Arthur approached, Twrch Trwyth went on as far as Preseleu, and Arthur and his hosts followed him thither, and Arthur sent men to hunt him; Eli and Trachmyr, leading Drudwyn the whelp of Greid the son of Eri, and Gwarthegyd the son of Kaw, in another quarter, with the two dogs of Glythmyr Ledewic, and Bedwyr leading Cavall, Arthur’s own dog.\n\nAnd all the warriors ranged themselves around the Nyver.\n\nAnd there came there the three sons of Cleddyf Divwlch, men who had gained much fame at the slaying of Yskithyrwyn Penbaedd; and they went on from Glyn Nyver, and came to Cwm Kerwyn.\n\nAnd there Twrch Trwyth made a stand, and slew four of Arthur’s champions, Gwarthegyd the son of Kaw, and Tarawc of Allt Clwyd, and Rheidwn the son of Eli Atver, and Iscovan Hael.\n\nAnd after he had slain these men, he made a second stand in the same place.\n\nAnd there he slew Gwydre the son of Arthur, and Garselit Wyddel, and Glew the son of Ysgawd, and Iscawyn the son of Panon; and there he himself was wounded.\n\nAnd the next morning before it was day, some of the men came up with him."

