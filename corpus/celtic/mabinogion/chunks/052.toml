[content]
body = "And he destroys the branches of the best trees in the forest, and he kills every animal that he meets with therein; and those that he doth not slay perish of hunger.\n\nAnd what is worse than that, he comes every night, and drinks up the fish-pond, and leaves the fishes exposed, so that for the most part they die before the water returns again.” “Maiden,” said Peredur, “wilt thou come and show me this animal?” “Not so,” said the maiden, “for he has not permitted any mortal to enter the forest for above a twelvemonth.\n\nBehold, here is a little dog belonging to the Empress, which will rouse the stag, and will chase him towards thee, and the stag will attack thee.” Then the little dog went as a guide to Peredur, and roused the stag, and brought him towards the place where Peredur was.\n\nAnd the stag attacked Peredur, and he let him pass by him, and as he did so, he smote off his head with his sword.\n\nAnd while he was looking at the head of the stag, he saw a lady on horseback coming towards him.\n\nAnd she took the little dog in the lappet of her cap, and the head and the body of the stag lay before her.\n\nAnd around the stag’s neck was a golden collar.\n\n“Ha!\n\nchieftain,” said she, “uncourteously hast thou acted in slaying the fairest jewel that was in my dominions.” “I was entreated so to do; and is there any way by which I can obtain thy friendship?” “There is,” she replied.\n\n“Go thou forward unto yonder mountain, and there thou wilt find a grove; and in the grove there is a cromlech; do thou there challenge a man three times to fight, and thou shalt have my friendship.” So Peredur proceeded onward, and came to the side of the grove, and challenged any man to fight.\n\nAnd a black man arose from beneath the cromlech, mounted upon a bony horse, and both he and his horse were clad in huge rusty armour.\n\nAnd they fought.\n\nAnd as often as Peredur cast the black man to the earth, he would jump again into his saddle.\n\nAnd Peredur dismounted, and drew his sword; and thereupon the black man disappeared with Peredur’s horse and his own, so that he could not gain sight of him a second time.\n\nAnd Peredur went along the mountain, and on the other side of the mountain he beheld a castle in the valley, wherein was a river.\n\nAnd he went to the castle; and as he entered it, he saw a hall, and the door of the hall was open, and he went in.\n\nAnd there he saw a lame grey-headed man sitting on one side of the hall, with Gwalchmai beside him.\n\nAnd Peredur beheld his horse, which the black man had taken, in the same stall with that of Gwalchmai.\n\nAnd they were glad concerning Peredur.\n\nAnd he went and seated himself on the other side of the hoary-headed man.\n\nThen, behold a yellow-haired youth came, and bent upon the knee before Peredur, and besought his friendship.\n\n“Lord,” said the youth, “it was I that came in the form of the black maiden to Arthur’s Court, and when thou didst throw down the chessboard, and when thou didst slay the black man of Ysbidinongyl, and when thou didst slay the stag, and when thou didst go to fight the black man of the cromlech."

