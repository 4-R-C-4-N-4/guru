[content]
body = "Take therefore another wife of whom thou mayest have heirs.\n\nThou canst not always continue with us, and though thou desire to remain as thou art, we will not suffer thee.” “Truly,” said Pwyll, “we have not long been joined together, and many things may yet befall.\n\nGrant me a year from this time, and for the space of a year we will abide together, and after that I will do according to your wishes.” So they granted it.\n\nAnd before the end of a year a son was born unto him.\n\nAnd in Narberth was he born; and on the night that he was born, women were brought to watch the mother and the boy.\n\nAnd the women slept, as did also Rhiannon, the mother of the boy.\n\nAnd the number of the women that were brought into the chamber was six.\n\nAnd they watched for a good portion of the night, and before midnight every one of them fell asleep, and towards break of day they awoke; and when they awoke, they looked where they had put the boy, and behold he was not there.\n\n“Oh,” said one of the women, “the boy is lost?” “Yes,” said another, “and it will be small vengeance if we are burnt or put to death because of the child.” Said one of the women, “Is there any counsel for us in the world in this matter?” “There is,” answered another, “I offer you good counsel.” “What is that?” asked they.\n\n“There is here a stag-hound bitch, and she has a litter of whelps.\n\nLet us kill some of the cubs, and rub the blood on the face and hands of Rhiannon, and lay the bones before her, and assert that she herself hath devoured her son, and she alone will not be able to gainsay us six.” And according to this counsel it was settled.\n\nAnd towards morning Rhiannon awoke, and she said, “Women, where is my son?” “Lady,” said they, “ask us not concerning thy son, we have nought but the blows and the bruises we got by struggling with thee, and of a truth we never saw any woman so violent as thou, for it was of no avail to contend with thee.\n\nHast thou not thyself devoured thy son?\n\nClaim him not therefore of us.” “For pity’s sake,” said Rhiannon; “the Lord God knows all things.\n\nCharge me not falsely.\n\nIf you tell me this from fear, I assert before Heaven that I will defend you.” “Truly,” said they, “we would not bring evil on ourselves for any one in the world.” “For pity’s sake,” said Rhiannon, “you will receive no evil by telling the truth.” But for all her words, whether fair or harsh, she received but the same answer from the women.\n\nAnd Pwyll the chief of Annwvyn arose, and his household, and his hosts.\n\nAnd this occurrence could not be concealed, but the story went forth throughout the land, and all the nobles heard it.\n\nThen the nobles came to Pwyll, and besought him to put away his wife, because of the great crime which she had done.\n\nBut Pwyll answered them, that they had no cause wherefore they might ask him to put away his wife, save for her having no children.\n\n“But children has she now had, therefore will I not put her away; if she has done wrong, let her do penance for it.” So Rhiannon sent for the teachers and the wise men, and as she preferred doing penance to contending with the women, she took upon her a penance."

