[content]
body = "Uchtryd Varyf Draws (who spread his red untrimmed beard over the eight-and-forty rafters which were in Arthur’s Hall).\n\nElidyr Gyvarwydd.\n\nYskyrdav and Yscudydd (two attendants of Gwenhwyvar were they.\n\nTheir feet were swift as their thoughts when bearing a message).\n\nBrys the son of Bryssethach (from the Hill of the Black Fernbrake in North Britain).\n\nAnd Grudlwyn Gorr.\n\nBwlch, and Kyfwlch, and Sefwlch, the sons of Cleddyf Kyfwlch, the grandsons of Cleddyf Difwlch.\n\n(Their three shields were three gleaming glitterers; their three spears were three pointed piercers; their three swords were three grinding gashers; Glas, Glessic, and Gleisad.\n\nTheir three dogs, Call, Cuall, and Cavall.\n\nTheir three horses, Hwyrdyddwd, and Drwgdyddwd, and Llwyrdyddwg.\n\nTheir three wives, Och, and Garym, and Diaspad.\n\nTheir three grandchildren, Lluched, and Neved, and Eissiwed.\n\nTheir three daughters, Drwg, and Gwaeth, and Gwaethav Oll.\n\nTheir three hand-maids, Eheubryd the daughter of Kyfwlch, Gorascwrn the daughter of Nerth, Ewaedan the daughter of Kynvelyn Keudawd Pwyll the half-man.) Dwnn Diessic Unbenn, Eiladyr the son of Pen Llarcau, Kynedyr Wyllt the son of Hettwn Talaryant, Sawyl Ben Uchel, Gwalchmai the son of Gwyar, Gwalhaved the son of Gwyar, Gwrhyr Gwastawd Ieithoedd (to whom all tongues were known), and Kethcrwm the Priest.\n\nClust the son of Clustveinad (though he were buried seven cubits beneath the earth, he would hear the ant fifty miles off rise from her nest in the morning).\n\nMedyr the son of Methredydd (from Gelli Wic he could, in a twinkling, shoot the wren through the two legs upon Esgeir Oervel in Ireland).\n\nGwiawn Llygad Cath (who could cut a haw from the eye of the gnat without hurting him).\n\nOl the son of Olwydd (seven years before he was born his father’s swine were carried off, and when he grew up a man he tracked the swine, and brought them back in seven herds).\n\nBedwini the Bishop (who blessed Arthur’s meat and drink).\n\nFor the sake of the golden-chained daughters of this island.\n\nFor the sake of Gwenhwyvar its chief lady, and Gwennhwyach her sister, and Rathtyeu the only daughter of Clemenhill, and Rhelemon the daughter of Kai, and Tannwen the daughter of Gweir Datharwenîddawg.\n\nGwenn Alarch the daughter of Kynwyl Canbwch.\n\nEurneid the daughter of Clydno Eiddin.\n\nEneuawc the daughter of Bedwyr.\n\nEnrydreg the daughter of Tudvathar.\n\nGwennwledyr the daughter of Gwaledyr Kyrvach.\n\nErddudnid the daughter of Tryffin.\n\nEurolwen the daughter of Gwdolwyn Gorr.\n\nTeleri the daughter of Peul.\n\nIndeg the daughter of Garwy Hir.\n\nMorvudd the daughter of Urien Rheged."

