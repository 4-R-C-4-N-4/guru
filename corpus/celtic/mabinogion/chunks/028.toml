[content]
body = "And say that I will not come to his Court until I have encountered the tall man that is there, to revenge the injury he did to the dwarf and dwarfess.” And Owain went back to the Court, and related all these things to Arthur and Gwenhwyvar, and to all the household.\n\nAnd Peredur rode forward.\n\nAnd as he proceeded, behold a knight met him.\n\n“Whence comest thou?” said the knight.\n\n“I come from Arthur’s Court,” said Peredur.\n\n“Art thou one of his men?” asked he.\n\n“Yes, by my faith,” he answered.\n\n“A good service, truly, is that of Arthur.” “Wherefore sayest thou so?” said Peredur.\n\n“I will tell thee,” said he; “I have always been Arthur’s enemy, and all such of his men as I have ever encountered I have slain.” And without further parlance they fought, and it was not long before Peredur brought him to the ground, over his horse’s crupper.\n\nThen the knight besought his mercy.\n\n“Mercy thou shalt have,” said Peredur, “if thou wilt make oath to me, that thou wilt go to Arthur’s Court, and tell him that it was I that overthrew thee, for the honour of his service; and say, that I will never come to the Court until I have avenged the insult offered to the dwarf and dwarfess.” The knight pledged him his faith of this, and proceeded to the Court of Arthur, and said as he had promised, and conveyed the threat to Kai.\n\nAnd Peredur rode forward.\n\nAnd within that week he encountered sixteen knights, and overthrew them all shamefully.\n\nAnd they all went to Arthur’s Court, taking with them the same message which the first knight had conveyed from Peredur, and the same threat which he had sent to Kai.\n\nAnd thereupon Kai was reproved by Arthur; and Kai was greatly grieved thereat.\n\nAnd Peredur rode forward.\n\nAnd he came to a vast and desert wood, on the confines of which was a lake.\n\nAnd on the other side was a fair castle.\n\nAnd on the border of the lake he saw a venerable, hoary-headed man, sitting upon a velvet cushion, and having a garment of velvet upon him.\n\nAnd his attendants were fishing in the lake.\n\nWhen the hoary-headed man beheld Peredur approaching, he arose and went towards the castle.\n\nAnd the old man was lame.\n\nPeredur rode to the palace, and the door was open, and he entered the hall.\n\nAnd there was the hoary-headed man sitting on a cushion, and a large blazing fire burning before him.\n\nAnd the household and the company arose to meet Peredur, and disarrayed him.\n\nAnd the man asked the youth to sit on the cushion; and they sat down, and conversed together.\n\nWhen it was time, the tables were laid, and they went to meat.\n\nAnd when they had finished their meal, the man inquired of Peredur if he knew well how to fight with the sword.\n\n“I know not,” said Peredur, “but were I to be taught, doubtless I should.” “Whoever can play well with the cudgel and shield, will also be able to fight with a sword.” And the man had two sons; the one had yellow hair, and the other auburn.\n\n“Arise, youths,” said he, “and play with the cudgel and the shield.” And so did they."

