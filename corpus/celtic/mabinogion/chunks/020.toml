[content]
body = "And I told them that they two were not a match for him alone.\n\nSo they imprisoned me in the stone vault, and said that I should be put to death, unless he came himself to deliver me, by a certain day; and that is no further off than the day after to-morrow.\n\nAnd I have no one to send to seek him for me.\n\nAnd his name is Owain the son of Urien.” “And art thou certain that if that knight knew all this, he would come to thy rescue?” “I am most certain of it,” said she.\n\nWhen the collops were cooked, Owain divided them into two parts, between himself and the maiden; and after they had eaten, they talked together, until the day dawned.\n\nAnd the next morning Owain inquired of the damsel, if there was any place where he could get food and entertainment for that night.\n\n“There is, Lord,” said she; “cross over yonder, and go along the side of the river, and in a short time thou wilt see a great Castle, in which are many towers, and the Earl who owns that Castle is the most hospitable man in the world.\n\nThere thou mayst spend the night.” Never did sentinel keep stricter watch over his lord, than the lion that night over Owain.\n\nAnd Owain accoutred his horse, and passed across by the ford, and came in sight of the Castle.\n\nAnd he entered it, and was honourably received.\n\nAnd his horse was well cared for, and plenty of fodder was placed before him.\n\nThen the lion went and lay down in the horse’s manger; so that none of the people of the Castle dared to approach him.\n\nThe treatment which Owain met with there was such as he had never known elsewhere, for every one was as sorrowful as though death had been upon him.\n\nAnd they went to meat; and the Earl sat upon one side of Owain, and on the other side his only daughter.\n\nAnd Owain had never seen any more lovely than she.\n\nThen the lion came and placed himself between Owain’s feet, and he fed him with every kind of food that he took himself.\n\nAnd he never saw anything equal to the sadness of the people.\n\nIn the middle of the repast the Earl began to bid Owain welcome.\n\n“Then,” said Owain, “behold, it is time for thee to be cheerful.” “Heaven knows,” said the Earl, “that it is not thy coming that makes us sorrowful, but we have cause enough for sadness and care.” “What is that?” said Owain.\n\n“I have two sons,” replied the Earl, “and yesterday they went to the mountains to hunt.\n\nNow there is on the mountain a monster who kills men and devours them, and he seized my sons; and to-morrow is the time he has fixed to be here, and he threatens that he will then slay my sons before my eyes, unless I will deliver into his hands this my daughter.\n\nHe has the form of a man, but in stature he is no less than a giant.” “Truly,” said Owain, “that is lamentable.\n\nAnd which wilt thou do?” “Heaven knows,” said the Earl, “it will be better that my sons should be slain against my will, than that I should voluntarily give up my daughter to him to ill-treat and destroy.” Then they talked about other things, and Owain stayed there that night.\n\nThe next morning they heard an exceeding great clamour, which was caused by the coming of the giant with the two youths.\n\nAnd the Earl was anxious both to protect his Castle and to release his two sons.\n\nThen Owain put on his armour and went forth to encounter the giant, and the lion followed him.\n\nAnd when the giant saw that Owain was armed, he rushed towards him and attacked him."

