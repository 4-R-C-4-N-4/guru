body = "goodly Peredur, son of Evrawc; the welcome of Heaven be unto thee, flower of knights, and light of chivalry.” “Of a truth, maiden,” said Kai, “thou art ill-bred to remain mute for a year at the Court of Arthur, and then to speak as thou dost of such a man as this.” And Kai kicked her with his foot, so that she fell to the ground senseless.\n\n“Tall man,” said Peredur, “shew me which is Arthur.” “Hold thy peace,” said Kai, “and go after the knight who went hence to the meadow, and take from him the goblet, and overthrow him, and possess thyself of his horse and arms, and then thou shalt receive the order of knighthood.” “I will do so, tall man,” said Peredur.\n\nSo he turned his horse’s head towards the meadow.\n\nAnd when he came there, the knight was riding up and down, proud of his strength, and valour, and noble mien.\n\n“Tell me,” said the knight, “didst thou see any one coming after me from the Court?” “The tall man that was there,” said he, “desired me to come, and overthrow thee, and to take from thee the goblet, and thy horse and thy armour for myself.” “Silence!” said the knight; “go back to the Court, and tell Arthur, from me, either to come himself, or to send some other to fight with me; and unless he do so quickly, I will not wait for him.” “By my faith,” said Peredur, “choose thou whether it shall be willingly or unwillingly, but I will have the horse, and the arms, and the goblet.” And upon this the knight ran at him furiously, and struck him a violent blow with the shaft of his spear, between the neck and the shoulder.\n\n“Haha!\n\nlad,” said Peredur, “my mother’s servants were not used to play with me in this wise; therefore, thus will I play with thee.” And thereupon he struck him with a sharp-pointed fork, and it hit him in the eye, and came out at the back of his neck, so that he instantly fell down lifeless.\n\n“Verily,” said Owain the son of Urien to Kai, “thou wert ill-advised, when thou didst send that madman after the knight.\n\nFor one of two things must befall him.\n\nHe must either be overthrown, or slain.\n\nIf he is overthrown by the knight, he will be counted by him to be an honourable person of the Court, and an eternal disgrace will it be to Arthur and his warriors.\n\nAnd if he is slain, the disgrace will be the same, and moreover, his sin will be upon him; therefore will I go to see what has befallen him.” So Owain went to the meadow, and he found Peredur dragging the man about.\n\n“What art thou doing thus?” said Owain.\n\n“This iron coat,” said Peredur, “will never come from off him; not by my efforts, at any rate.” And Owain unfastened his armour and his clothes.\n\n“Here, my good soul,” said he, “is a horse and armour better than thine.\n\nTake them joyfully, and come with me to Arthur, to receive the order of knighthood, for thou dost merit it.” “May I never shew my face again if I go,” said Peredur; “but take thou the goblet to Gwenhwyvar, and tell Arthur, that wherever I am, I will be his vassal, and will do him what profit and service I am able."

