[content]
body = "“Go with this,” said she, “and take with thee yonder horse and clothing, and place them near the man we saw just now.\n\nAnd anoint him with this balsam, near his heart; and if there is life in him, he will arise through the efficacy of this balsam.\n\nThen watch what he will do.” And the maiden departed from her, and poured the whole of the balsam upon Owain, and left the horse and the garments hard by, and went a little way off, and hid herself to watch him.\n\nIn a short time she saw him begin to move his arms; and he rose up, and looked at his person, and became ashamed of the unseemliness of his appearance.\n\nThen he perceived the horse and the garments that were near him.\n\nAnd he crept forward till he was able to draw the garments to him from off the saddle.\n\nAnd he clothed himself, and with difficulty mounted the horse.\n\nThen the damsel discovered herself to him, and saluted him.\n\nAnd he was rejoiced when he saw her, and inquired of her, what land and what territory that was.\n\n“Truly,” said the maiden, “a widowed Countess owns yonder Castle; at the death of her husband, he left her two Earldoms, but at this day she has but this one dwelling that has not been wrested from her by a young Earl, who is her neighbour, because she refused to become his wife.” “That is pity,” said Owain.\n\nAnd he and the maiden proceeded to the Castle; and he alighted there, and the maiden conducted him to a pleasant chamber, and kindled a fire and left him.\n\nAnd the maiden came to the Countess, and gave the flask into her hand.\n\n“Ha!\n\nmaiden,” said the Countess, “where is all the balsam?” “Have I not used it all?” said she.\n\n“Oh, maiden,” said the Countess, “I cannot easily forgive thee this; it is sad for me to have wasted seven-score pounds’ worth of precious ointment upon a stranger whom I know not.\n\nHowever, maiden, wait thou upon him, until he is quite recovered.” And the maiden did so, and furnished him with meat and drink, and fire, and lodging, and medicaments, until he was well again.\n\nAnd in three months he was restored to his former guise, and became even more comely than he had ever been before.\n\nOne day Owain heard a great tumult, and a sound of arms in the Castle, and he inquired of the maiden the cause thereof.\n\n“The Earl,” said she, “whom I mentioned to thee, has come before the Castle, with a numerous army, to subdue the Countess.” And Owain inquired of her whether the Countess had a horse and arms in her possession.\n\n“She has the best in the world,” said the maiden.\n\n“Wilt thou go and request the loan of a horse and arms for me,” said Owain, “that I may go and look at this army?” “I will,” said the maiden.\n\nAnd she came to the Countess, and told her what Owain had said.\n\nAnd the Countess laughed.\n\n“Truly,” said she, “I will even give him a horse and arms for ever; such a horse and such arms had he never yet, and I am glad that they should be taken by him to-day, lest my enemies should have them against my will to-morrow.\n\nYet I know not what he would do with them.” The Countess bade them bring out a beautiful black steed, upon which was a beechen saddle, and a suit of armour, for man and horse.\n\nAnd Owain armed himself, and mounted the horse, and went forth, attended by two pages completely equipped, with horses and arms."

