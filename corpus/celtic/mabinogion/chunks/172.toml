[content]
body = "And in the dream I beheld a maiden, and because of the maiden is there neither life, nor spirit, nor existence within me.” “Lord,” they answered, “since thou judgest us worthy to counsel thee, we will give thee counsel.\n\nAnd this is our counsel; that thou send messengers for three years to the three parts of the world to seek for thy dream.\n\nAnd as thou knowest not what day or what night good news may come to thee, the hope thereof will support thee.” So the messengers journeyed for the space of a year, wandering about the world, and seeking tidings concerning his dream.\n\nBut when they came back at the end of the year, they knew not one word more than they did the day they set forth.\n\nAnd then was the emperor exceeding sorrowful, for he thought that he should never have tidings of her whom best he loved.\n\nThen spoke the king of the Romans unto the emperor.\n\n“Lord,” said he, “go forth to hunt by the way thou didst seem to go, whether it were to the east, or to the west.” So the emperor went forth to the hunt, and he came to the bank of the river.\n\n“Behold,” said he, “this is where I was when I saw the dream, and I went towards the source of the river westward.” And thereupon thirteen messengers of the emperor’s set forth, and before them they saw a high mountain, which seemed to them to touch the sky.\n\nNow this was the guise in which the messengers journeyed; one sleeve was on the cap of each of them in front, as a sign that they were messengers, in order that through what hostile land soever they might pass no harm might be done them.\n\nAnd when they were come over this mountain, they beheld vast plains, and large rivers flowing there through.\n\n“Behold,” said they, “the land which our master saw.” And they went along the mouths of the rivers, until they came to the mighty river which they saw flowing to the sea, and the vast city, and the many-coloured high towers in the castle.\n\nThey saw the largest fleet in the world, in the harbour of the river, and one ship that was larger than any of the others.\n\n“Behold again,” said they, “the dream that our master saw.” And in the great ship they crossed the sea, and came to the Island of Britain.\n\nAnd they traversed the island until they came to Snowdon.\n\n“Behold,” said they, “the rugged land that our master saw.” And they went forward until they saw Anglesey before them, and until they saw Arvon likewise.\n\n“Behold,” said they, “the land our master saw in his sleep.” And they saw Aber Sain, and a castle at the mouth of the river.\n\nThe portal of the castle saw they open, and into the castle they went, and they saw a hall in the castle.\n\nThen said they, “Behold, the hall which he saw in his sleep.” They went into the hall, and they beheld two youths playing at chess on the golden bench.\n\nAnd they beheld the hoary-headed man beside the pillar, in the ivory chair, carving chessmen.\n\nAnd they beheld the maiden sitting on a chair of ruddy gold.\n\nThe messengers bent down upon their knees.\n\n“Empress of Rome, all hail!” “Ha, gentles,” said the maiden, “ye bear the seeming of honourable men, and the badge of envoys, what mockery is this ye do to me?” “We mock thee not, lady; but the Emperor of Rome hath seen thee in his sleep, and he has neither life nor spirit left because of thee."

