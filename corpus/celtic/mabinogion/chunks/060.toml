[content]
body = "And he was wroth, and he drew his sword, and rushed fiercely upon him.\n\nThen the knight also arose, and drew his sword against Geraint.\n\nAnd they fought on foot with their swords until their arms struck sparks of fire like stars from one another; and thus they continued fighting until the blood and sweat obscured the light from their eyes.\n\nAnd when Geraint prevailed, the hoary-headed man, and his wife, and his daughter were glad; and when the knight prevailed, it rejoiced the Earl and his party.\n\nThen the hoary-headed man saw Geraint receive a severe stroke, and he went up to him quickly, and said to him, “Oh, chieftain, remember the treatment which thou hadst from the dwarf; and wilt thou not seek vengeance for the insult to thyself, and for the insult to Gwenhwyvar the wife of Arthur!” And Geraint was roused by what he said to him, and he called to him all his strength, and lifted up his sword, and struck the knight upon the crown of his head, so that he broke all his head-armour, and cut through all the flesh and the skin, even to the skull, until he wounded the bone.\n\nThen the knight fell upon his knees, and cast his sword from his hand, and besought mercy of Geraint.\n\n“Of a truth,” said he, “I relinquish my overdaring and my pride in craving thy mercy; and unless I have time to commit myself to Heaven for my sins, and to talk with a priest, thy mercy will avail me little.” “I will grant thee grace upon this condition,” said Geraint, “that thou wilt go to Gwenhwyvar the wife of Arthur, to do her satisfaction for the insult which her maiden received from thy dwarf.\n\nAs to myself, for the insult which I received from thee and thy dwarf, I am content with that which I have done unto thee.\n\nDismount not from the time thou goest hence until thou comest into the presence of Gwenhwyvar, to make her what atonement shall be adjudged at the Court of Arthur.” “This will I do gladly.\n\nAnd who art thou?” said he.\n\n“I am Geraint the son of Erbin.\n\nAnd declare thou also who thou art.” “I am Edeyrn the son of Nudd.” Then he threw himself upon his horse, and went forward to Arthur’s Court, and the lady he loved best went before him and the dwarf, with much lamentation.\n\nAnd thus far this story up to that time.\n\nThen came the little Earl and his hosts to Geraint, and saluted him, and bade him to his castle.\n\n“I may not go,” said Geraint, “but where I was last night, there will I be to-night also.” “Since thou wilt none of my inviting, thou shalt have abundance of all that I can command for thee, in the place thou wast last night.\n\nAnd I will order ointment for thee, to recover thee from thy fatigues, and from the weariness that is upon thee.” “Heaven reward thee,” said Geraint, “and I will go to my lodging.” And thus went Geraint, and Earl Ynywl, and his wife, and his daughter.\n\nAnd when they reached the chamber, the household servants and attendants of the young Earl had arrived at the Court, and they arranged all the houses, dressing them with straw and with fire; and in a short time the ointment was ready, and Geraint came there, and they washed his head.\n\nThen came the young Earl, with forty honourable knights from among his attendants, and those who were bidden to the tournament.\n\nAnd Geraint came from the anointing.\n\nAnd the Earl asked him to go to the hall to eat."

