[content]
body = "“If thou comest, and if thou ever comest to Rome.” And even unto Caerlleon came this letter to Maxen, and these tidings.\n\nThen sent he a letter to the man who styled himself emperor in Rome.\n\nThere was nought in that letter also but only this.\n\n“If I come to Rome, and if I come.” And thereupon Maxen set forth towards Rome with his army, and vanquished France and Bugundy, and every land on the way, and sat down before the city of Rome.\n\nA year was the emperor before the city, and he was no nearer taking it than the first day.\n\nAnd after him there came the brothers of Helen Luyddawc from the Island of Britain, and a small host with them, and better warriors were in that small host than twice as many Romans.\n\nAnd the emperor was told that a host was seen, halting close to his army and encamping, and no man ever saw a fairer or better appointed host for its size, nor more handsome standards.\n\nAnd Helen went to see the hosts, and she knew the standards of her brothers.\n\nThen came Kynan the son of Eudav, and Adeon the son of Eudav, to meet the emperor.\n\nAnd the emperor was glad because of them, and embraced them.\n\nThen they looked at the Romans as they attacked the city.\n\nSaid Kynan to his brother, “We will try to attack the city more expertly than this.” So they measured by night the height of the wall, and they sent their carpenters to the wood, and a ladder was made for every four men of their number.\n\nNow when these were ready, every day at mid-day the emperors went to meat, and they ceased to fight on both sides till all had finished eating.\n\nAnd in the morning the men of Britain took their food and they drank until they were invigorated.\n\nAnd while the two emperors were at meat, the Britons came to the city, and placed their ladders against it, and forthwith they came in through the city.\n\nThe new emperor had no time to arm himself when they fell upon him, and slew him, and many others with him.\n\nAnd three nights and three days were they subduing the men that were in the city and taking the castle.\n\nAnd others of them kept the city, lest any of the host of Maxen should come therein, until they had subjected all to their will.\n\nThen spake Maxen to Helen Luyddawc.\n\n“I marvel, lady,” said he, “that thy brothers have not conquered this city for me.” “Lord, emperor,” she answered, “the wisest youths in the world are my brothers.\n\nGo thou thither and ask the city of them, and if it be in their possession thou shalt have it gladly.” So the emperor and Helen went and demanded the city.\n\nAnd they told the emperor that none had taken the city, and that none could give it him, but the men of the Island of Britain.\n\nThen the gates of the city of Rome were opened, and the emperor sat on the throne, and all the men of Rome submitted them selves unto him.\n\nThe emperor then said unto Kynan and Adeon, “Lords,” said he, “I have now had possession of the whole of my empire.\n\nThis host give I unto you to vanquish whatever region ye may desire in the world.” So they set forth and conquered lands, and castles, and cities.\n\nAnd they slew all the men, but the women they kept alive.\n\nAnd thus they continued until the young men that had come with them were grown grey-headed, from the length of time they were upon this conquest."

