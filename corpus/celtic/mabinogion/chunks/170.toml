[content]
body = "Maxen Wledig was emperor of Rome, and he was a comelier man, and a better and a wiser than any emperor that had been before him.\n\nAnd one day he held a council of kings, and he said to his friends, “I desire to go to-morrow to hunt.” And the next day in the morning he set forth with his retinue, and came to the valley of the river that flowed towards Rome.\n\nAnd he hunted through the valley until mid-day.\n\nAnd with him also were two-and-thirty crowned kings, that were his vassals; not for the delight of hunting went the emperor with them, but to put himself on equal terms with those kings.\n\nAnd the sun was high in the sky over their heads and the heat was great.\n\nAnd sleep came upon Maxen Wledig.\n\nAnd his attendants stood and set up their shields around him upon the shafts of their spears to protect him from the sun, and they placed a gold enamelled shield under his head; and so Maxen slept.\n\nAnd he saw a dream.\n\nAnd this is the dream that he saw.\n\nHe was journeying along the valley of the river towards its source; and he came to the highest mountain in the world.\n\nAnd he thought that the mountain was as high as the sky; and when he came over the mountain, it seemed to him that he went through the fairest and most level regions that man ever yet beheld, on the other side of the mountain.\n\nAnd he saw large and mighty rivers descending from the mountain to the sea, and towards the mouths of the rivers he proceeded.\n\nAnd as he journeyed thus, he came to the mouth of the largest river ever seen.\n\nAnd he beheld a great city at the entrance of the river, and a vast castle in the city, and he saw many high towers of various colours in the castle.\n\nAnd he saw a fleet at the mouth of the river, the largest ever seen.\n\nAnd he saw one ship among the fleet; larger was it by far, and fairer than all the others.\n\nOf such part of the ship as he could see above the water, one plank was gilded and the other silvered over.\n\nHe saw a bridge of the bone of a whale from the ship to the land, and he thought that he went along the bridge, and came into the ship.\n\nAnd a sail was hoisted on the ship, and along the sea and the ocean was it borne.\n\nThen it seemed that he came to the fairest island in the whole world, and he traversed the island from sea to sea, even to the furthest shore of the island.\n\nValleys he saw, and steeps, and rocks of wondrous height, and rugged precipices.\n\nNever yet saw he the like.\n\nAnd thence he beheld an island in the sea, facing this rugged land.\n\nAnd between him and this island was a country of which the plain was as large as the sea, the mountain as vast as the wood.\n\nAnd from the mountain he saw a river that flowed through the land and fell into the sea.\n\nAnd at the mouth of the river he beheld a castle, the fairest that man ever saw, and the gate of the castle was open, and he went into the castle.\n\nAnd in the castle he saw a fair hall, of which the roof seemed to be all gold, the walls of the hall seemed to be entirely of glittering precious gems, the doors all seemed to be of gold.\n\nGolden seats he saw in the hall, and silver tables.\n\nAnd on a seat opposite to him he beheld two auburn-haired youths playing at chess.\n\nHe saw a silver board for the chess, and golden pieces thereon."

