[content]
body = "And Peredur and the maiden were placed together, and the two young pages served them.\n\nAnd the maiden gazed sorrowfully upon Peredur, and Peredur asked the maiden wherefore she was sad.\n\n“For thee, my soul; for, from when I first beheld thee, I have loved thee above all men.\n\nAnd it pains me to know that so gentle a youth as thou should have such a doom as awaits thee to-morrow.\n\nSawest thou the numerous black houses in the bosom of the wood?\n\nAll these belong to the vassals of the grey man yonder, who is my father.\n\nAnd they are all giants.\n\nAnd to-morrow they will rise up against thee, and will slay thee.\n\nAnd the Round Valley is this valley called.” “Listen, fair maiden, wilt thou contrive that my horse and arms be in the same lodging with me to-night?” “Gladly will I cause it so to be, by Heaven, if I can.” And when it was time for them to sleep rather than to carouse, they went to rest.\n\nAnd the maiden caused Peredur’s horse and arms to be in the same lodging with him.\n\nAnd the next morning Peredur heard a great tumult of men and horses around the castle.\n\nAnd Peredur arose, and armed himself and his horse, and went to the meadow.\n\nThen the aged woman and the maiden came to the grey man: “Lord,” said they, “take the word of the youth, that he will never disclose what he has seen in this place, and we will be his sureties that he keep it.” “I will not do so, by my faith,” said the grey man.\n\nSo Peredur fought with the host, and towards evening he had slain the one-third of them without receiving any hurt himself.\n\nThen said the aged woman, “Behold, many of thy host have been slain by the youth; do thou, therefore, grant him mercy.” “I will not grant it, by my faith,” said he.\n\nAnd the aged woman and the fair maiden were upon the battlements of the castle, looking forth.\n\nAnd at that juncture, Peredur encountered the yellow-haired youth and slew him.\n\n“Lord,” said the maiden, “grant the young man mercy.” “That will I not do, by Heaven,” he replied; and thereupon Peredur attacked the auburn-haired youth, and slew him likewise.\n\n“It were better that thou hadst accorded mercy to the youth before he had slain thy two sons; for now scarcely wilt thou thyself escape from him.” “Go, maiden, and beseech the youth to grant mercy unto us, for we yield ourselves into his hands.” So the maiden came to the place where Peredur was, and besought mercy for her father, and for all such of his vassals as had escaped alive.\n\n“Thou shalt have it, on condition that thy father and all that are under him go and render homage to Arthur, and tell him that it was his vassal Peredur that did him this service.” “This will we do willingly, by Heaven.” “And you shall also receive baptism; and I will send to Arthur, and beseech him to bestow this valley upon thee and upon thy heirs after thee for ever.” Then they went in, and the grey man and the tall woman saluted Peredur.\n\nAnd the grey man said unto him, “Since I have possessed this valley I have not seen any Christian depart with his life, save thyself."

