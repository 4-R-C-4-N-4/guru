[content]
body = "Then said Kilhwch, “Greeting be unto thee, Sovereign Ruler of this Island; and be this greeting no less unto the lowest than unto the highest, and be it equally unto thy guests, and thy warriors, and thy chieftains—let all partake of it as completely as thyself.\n\nAnd complete be thy favour, and thy fame, and thy glory, throughout all this Island.” “Greeting unto thee also,” said Arthur; “sit thou between two of my warriors, and thou shalt have minstrels before thee, and thou shalt enjoy the privileges of a king born to a throne, as long as thou remainest here.\n\nAnd when I dispense my presents to the visitors and strangers in this Court, they shall be in thy hand at my commencing.” Said the youth, “I came not here to consume meat and drink; but if I obtain the boon that I seek, I will requite it thee, and extol thee; and if I have it not, I will bear forth thy dispraise to the four quarters of the world, as far as thy renown has extended.” Then said Arthur, “Since thou wilt not remain here, chieftain, thou shalt receive the boon whatsoever thy tongue may name, as far as the wind dries, and the rain moistens, and the sun revolves, and the sea encircles, and the earth extends; save only my ship; and my mantle; and Caledvwlch, my sword; and Rhongomyant, my lance; and Wynebgwrthucher, my shield; and Carnwenhau, my dagger; and Gwenhwyvar, my wife.\n\nBy the truth of Heaven, thou shalt have it cheerfully, name what thou wilt.” “I would that thou bless my hair.” “That shall be granted thee.” And Arthur took a golden comb, and scissors, whereof the loops were of silver, and he combed his hair.\n\nAnd Arthur inquired of him who he was.\n\n“For my heart warms unto thee, and I know that thou art come of my blood.\n\nTell me, therefore, who thou art.” “I will tell thee,” said the youth.\n\n“I am Kilhwch, the son of Kilydd, the son of Prince Kelyddon, by Goleuddydd, my mother, the daughter of Prince Anlawdd.” “That is true,” said Arthur; “thou art my cousin.\n\nWhatsoever boon thou mayest ask, thou shalt receive, be it what it may that thy tongue shall name.” “Pledge the truth of Heaven and the faith of thy kingdom thereof.” “I pledge it thee, gladly.” “I crave of thee then, that thou obtain for me Olwen, the daughter of Yspaddaden Penkawr; and this boon I likewise seek at the hands of thy warriors."

