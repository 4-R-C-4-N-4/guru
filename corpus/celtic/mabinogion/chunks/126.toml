[content]
body = "And when he came to the Ford, a knight arose and spake thus.\n\n“Lords,” said he, “listen well.\n\nIt is between two kings that this meeting is, and between them only.\n\nEach claimeth of the other his land and territory, and do all of you stand aside and leave the fight to be between them.” Thereupon the two kings approached each other in the middle of the Ford, and encountered, and at the first thrust, the man who was in the stead of Arawn struck Havgan on the centre of the boss of his shield, so that it was cloven in twain, and his armour was broken, and Havgan himself was borne to the ground an arm’s and a spear’s length over the crupper of his horse, and he received a deadly blow.\n\n“O Chieftain,” said Havgan, “what right hast thou to cause my death?\n\nI was not injuring thee in anything, and I know not wherefore thou wouldest slay me.\n\nBut, for the love of Heaven, since thou hast begun to slay me, complete thy work.” “Ah, Chieftain,” he replied, “I may yet repent doing that unto thee, slay thee who may, I will not do so.” “My trusty Lords,” said Havgan, “bear me hence.\n\nMy death has come.\n\nI shall be no more able to uphold you.” “My Nobles,” also said he who was in the semblance of Arawn, “take counsel and know who ought to be my subjects.” “Lord,” said the Nobles, “all should be, for there is no king over the whole of Annwvyn but thee.” “Yes,” he replied, “it is right that he who comes humbly should be received graciously, but he that doth not come with obedience, shall be compelled by the force of swords.” And thereupon he received the homage of the men, and he began to conquer the country; and the next day by noon the two kingdoms were in his power.\n\nAnd thereupon he went to keep his tryst, and came to Glyn Cuch.\n\nAnd when he came there, the King of Annwvyn was there to meet him, and each of them was rejoiced to see the other.\n\n“Verily,” said Arawn, “may Heaven reward thee for thy friendship towards me.\n\nI have heard of it.\n\nWhen thou comest thyself to thy dominions,” said he, “thou wilt see that which I have done for thee.” “Whatever thou hast done for me, may Heaven repay it thee.” Then Arawn gave to Pwyll Prince of Dyved his proper form and semblance, and he himself took his own; and Arawn set forth towards the Court of Annwvyn; and he was rejoiced when he beheld his hosts, and his household, whom he had not seen so long; but they had not known of his absence, and wondered no more at his coming than usual.\n\nAnd that day was spent in joy and merriment; and he sat and conversed with his wife and his nobles.\n\nAnd when it was time for them rather to sleep than to carouse, they went to rest.\n\nPwyll Prince of Dyved came likewise to his country and dominions, and began to inquire of the nobles of the land, how his rule had been during the past year, compared with what it had been before."

