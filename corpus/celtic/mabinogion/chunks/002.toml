[content]
body = "From these facts it is to be argued that the further back these romances are traced, the more clearly does it appear that they spread over the Continent from the North-west of France.\n\nThe older versions, it may be remarked, are far more simple than the later corruptions.\n\nIn them there is less allusion to the habits and usages of Chivalry, and the Welsh names and elements stand out in stronger relief.\n\nIt is a great step to be able to trace the stocks of these romances back to Wace, or to his country and age.\n\nFor Wace’s work was not original.\n\nHe himself, a native of Jersey, appears to have derived much of it from the “Historia Britonum” of Gruffydd ab Arthur, commonly known as “Geoffrey of Monmouth,” born 1128, who himself professes to have translated from a British original.\n\nIt is, however, very possible that Wace may have had access, like Geoffrey, to independent sources of information.\n\nTo the claims set up on behalf of Wace and Geoffrey, to be regarded as the channels by which the Cymric tales passed into the Continental Romance, may be added those of a third almost contemporary author.\n\nLayamon, a Saxon priest, dwelling, about 1200, upon the banks of the upper Severn, acknowledges for the source of his British history, the English Bede, the Latin Albin, and the French Wace.\n\nThe last-named however is by very much his chief, and, for Welsh matters, his only avowed authority.\n\nHis book, nevertheless, contains a number of names and stories relating to Wales, of which no traces appear in Wace, or indeed in Geoffrey, but which he was certainly in a very favourable position to obtain for himself.\n\nLayamon, therefore, not only confirms Geoffrey in some points, but it is clear, that, professing to follow Wace, he had independent access to the great body of Welsh literature then current.\n\nSir F.\n\nMadden has put this matter very clearly, in his recent edition of Layamon.\n\nThe Abbé de la Rue, also, was of opinion that Gaimar, an Anglo-Norman, in the reign of Stephen, usually regarded as a translator of Geoffrey of Monmouth, had access to a Welsh independent authority.\n\nIn addition to these, is to be mentioned the English version of Sir Tristrem, which Sir Walter Scott considered to be derived from a distinct Celtic source, and not, like the later Amadis, Palmerin, and Lord Berners’s Canon of Romance, imported into English literature by translation from the French.\n\nFor the Auntours of Arthur, recently published by the Camden Society, their Editor, Mr.\n\nRobson, seems to hint at a similar claim.\n\nHere then are various known channels, by which portions of Welsh and Armoric fiction crossed the Celtic border, and gave rise to the more ornate, and widely-spread romance of the Age of Chivalry.\n\nIt is not improbable that there may have existed many others.\n\nIt appears then that a large portion of the stocks of Mediæval Romance proceeded from Wales.\n\nWe have next to see in what condition they are still found in that country.\n\nThat Wales possessed an ancient literature, containing various lyric compositions, and certain triads, in which are arranged historical facts or moral aphorisms, has been shown by Sharon Turner, who has established the high antiquity of many of these compositions.\n\nThe more strictly Romantic Literature of Wales has been less fortunate, though not less deserving of critical attention.\n\nSmall portions only of it have hitherto appeared in print, the remainder being still hidden in the obscurity of ancient Manuscripts: of these the chief is supposed to be the Red Book of Hergest, now in the Library of Jesus College, Oxford, and of the fourteenth century."

