[content]
body = "And in the morning he arose, and when he went forth, behold a shower of snow had fallen the night before, and a hawk had killed a wild fowl in front of the cell.\n\nAnd the noise of the horse scared the hawk away, and a raven alighted upon the bird.\n\nAnd Peredur stood, and compared the blackness of the raven and the whiteness of the snow, and the redness of the blood, to the hair of the lady that best he loved, which was blacker than jet, and to her skin which was whiter than the snow, and to the two red spots upon her cheeks, which were redder than the blood upon the snow appeared to be.\n\nNow Arthur and his household were in search of Peredur.\n\n“Know ye,” said Arthur, “who is the knight with the long spear that stands by the brook up yonder?” “Lord,” said one of them, “I will go and learn who he is.” So the youth came to the place where Peredur was, and asked him what he did thus, and who he was.\n\nAnd from the intensity with which he thought upon the lady whom best he loved, he gave him no answer.\n\nThen the youth thrust at Peredur with his lance, and Peredur turned upon him, and struck him over his horse’s crupper to the ground.\n\nAnd after this, four-and-twenty youths came to him, and he did not answer one more than another, but gave the same reception to all, bringing them with one single thrust to the ground.\n\nAnd then came Kai, and spoke to Peredur rudely and angrily; and Peredur took him with his lance under the jaw, and cast him from him with a thrust, so that he broke his arm and his shoulder-blade, and he rode over him one-and-twenty times.\n\nAnd while he lay thus, stunned with the violence of the pain that he had suffered, his horse returned back at a wild and prancing pace.\n\nAnd when the household saw the horse come back without his rider, they rode forth in haste to the place where the encounter had been.\n\nAnd when they first came there, they thought that Kai was slain; but they found that if he had a skilful physician, he yet might live.\n\nAnd Peredur moved not from his meditation, on seeing the concourse that was around Kai.\n\nAnd Kai was brought to Arthur’s tent, and Arthur caused skilful physicians to come to him.\n\nAnd Arthur was grieved that Kai had met with this reverse, for he loved him greatly.\n\n“Then,” said Gwalchmai, “it is not fitting that any should disturb an honourable knight from his thought unadvisedly; for either he is pondering some damage that he has sustained, or he is thinking of the lady whom best he loves.\n\nAnd through such ill-advised proceeding, perchance this misadventure has befallen him who last met with him.\n\nAnd if it seem well to thee, lord, I will go and see if this knight hath changed from his thought; and if he has, I will ask him courteously to come and visit thee.” Then Kai was wroth, and he spoke angry and spiteful words.\n\n“Gwalchmai,” said he, “I know that thou wilt bring him because he is fatigued.\n\nLittle praise and honour, nevertheless, wilt thou have from vanquishing a weary knight, who is tired with fighting.\n\nYet thus hast thou gained the advantage over many."

