[content]
body = "And as long as thou concealest it, it will conceal thee.\n\nWhen they have consulted together, they will come forth to fetch thee, in order to put thee to death; and they will be much grieved that they cannot find thee.\n\nAnd I will await thee on the horseblock yonder; and thou wilt be able to see me, though I cannot see thee; therefore come and place thy hand upon my shoulder, that I may know that thou art near me.\n\nAnd by the way that I go hence, do thou accompany me.” Then she went away from Owain, and he did all that the maiden had told him.\n\nAnd the people of the Castle came to seek Owain, to put him to death, and when they found nothing but the half of his horse, they were sorely grieved.\n\nAnd Owain vanished from among them, and went to the maiden, and placed his hand upon her shoulder; whereupon she set off, and Owain followed her, until they came to the door of a large and beautiful chamber, and the maiden opened it, and they went in, and closed the door.\n\nAnd Owain looked around the chamber, and behold there was not even a single nail in it that was not painted with gorgeous colours; and there was not a single panel that had not sundry images in gold portrayed upon it.\n\nThe maiden kindled a fire, and took water in a silver bowl, and put a towel of white linen on her shoulder, and gave Owain water to wash.\n\nThen she placed before him a silver table, inlaid with gold; upon which was a cloth of yellow linen; and she brought him food.\n\nAnd of a truth, Owain had never seen any kind of meat that was not there in abundance, but it was better cooked there than he had ever found it in any other place.\n\nNor did he ever see so excellent a display of meat and drink, as there.\n\nAnd there was not one vessel from which he was served, that was not of gold or of silver.\n\nAnd Owain ate and drank, until late in the afternoon, when lo, they heard a mighty clamour in the Castle; and Owain asked the maiden what that outcry was.\n\n“They are administering extreme unction,” said she, “to the Nobleman who owns the Castle.” And Owain went to sleep.\n\nThe couch which the maiden had prepared for him was meet for Arthur himself; it was of scarlet, and fur, and satin, and sendal, and fine linen.\n\nIn the middle of the night they heard a woful outcry.\n\n“What outcry again is this?” said Owain.\n\n“The Nobleman who owned the Castle is now dead,” said the maiden.\n\nAnd a little after daybreak, they heard an exceeding loud clamour and wailing.\n\nAnd Owain asked the maiden what was the cause of it.\n\n“They are bearing to the church the body of the Nobleman who owned the Castle.” And Owain rose up, and clothed himself, and opened a window of the chamber, and looked towards the Castle; and he could see neither the bounds, nor the extent of the hosts that filled the streets.\n\nAnd they were fully armed; and a vast number of women were with them, both on horseback and on foot; and all the ecclesiastics in the city, singing.\n\nAnd it seemed to Owain that the sky resounded with the vehemence of their cries, and with the noise of the trumpets, and with the singing of the ecclesiastics.\n\nIn the midst of the throng, he beheld the bier, over which was a veil of white linen; and wax tapers were burning beside and around it, and none that supported the bier was lower in rank than a powerful Baron.\n\nNever did Owain see an assemblage so gorgeous with satin, and silk, and sendal."

