[content]
body = "Now these three, such are they:— The three sons of Gilvaethwy the false, The three faithful combatants, Bleiddwn, Hydwn, and Hychdwn the Tall.” Then he struck the two with his magic wand, and they resumed their own nature.\n\n“Oh men,” said he, “for the wrong that ye did unto me sufficient has been your punishment and your dishonour.\n\nPrepare now precious ointment for these men, and wash their heads, and equip them.” And this was done.\n\nAnd after they were equipped, they came unto him.\n\n“Oh men,” said he, “you have obtained peace, and you shall likewise have friendship.\n\nGive your counsel unto me, what maiden I shall seek.” “Lord,” said Gwydion the son of Don, “it is easy to give thee counsel; seek Arianrod, the daughter of Don, thy niece, thy sister’s daughter.” And they brought her unto him, and the maiden came in.\n\n“Ha, damsel,” said he, “art thou the maiden?” “I know not, lord, other than that I am.” Then he took up his magic wand, and bent it.\n\n“Step over this,” said he, “and I shall know if thou art the maiden.” Then stepped she over the magic wand, and there appeared forthwith a fine chubby yellow-haired boy.\n\nAnd at the crying out of the boy, she went towards the door.\n\nAnd thereupon some small form was seen; but before any one could get a second glimpse of it, Gwydion had taken it, and had flung a scarf of velvet around it and hidden it.\n\nNow the place where he hid it was the bottom of a chest at the foot of his bed.\n\n“Verily,” said Math the son of Mathonwy, concerning the fine yellow-haired boy, “I will cause this one to be baptized, and Dylan is the name I will give him.” So they had the boy baptized, and as they baptized him he plunged into the sea.\n\nAnd immediately when he was in the sea, he took its nature, and swam as well as the best fish that was therein.\n\nAnd for that reason was he called Dylan, the son of the Wave.\n\nBeneath him no wave ever broke.\n\nAnd the blow whereby he came to his death, was struck by his uncle Govannon.\n\nThe third fatal blow was it called.\n\nAs Gwydion lay one morning on his bed awake, he heard a cry in the chest at his feet; and though it was not loud, it was such that he could hear it.\n\nThen he arose in haste, and opened the chest: and when he opened it, he beheld an infant boy stretching out his arms from the folds of the scarf, and casting it aside.\n\nAnd he took up the boy in his arms, and carried him to a place where he knew there was a woman that could nurse him.\n\nAnd he agreed with the woman that she should take charge of the boy.\n\nAnd that year he was nursed.\n\nAnd at the end of the year he seemed by his size as though he were two years old.\n\nAnd the second year he was a big child, and able to go to the Court by himself.\n\nAnd when he came to the Court, Gwydion noticed him, and the boy became familiar with him, and loved him better than any one else.\n\nThen was the boy reared at the Court until he was four years old, when he was as big as though he had been eight.\n\nAnd one day Gwydion walked forth, and the boy followed him, and he went to the Castle of Arianrod, having the boy with him; and when he came into the Court, Arianrod arose to meet him, and greeted him and bade him welcome.\n\n“Heaven prosper thee,” said he."

