[content]
body = "And they fled unto the place which is still called Nantcall.\n\nAnd thither did they follow them, and they made a vast slaughter of them there, so that they fled again as far as the place called Dol Pen Maen, and there they halted and sought to make peace.\n\nAnd that he might have peace, Pryderi gave hostages, Gwrgi Gwastra gave he and three-and-twenty others, sons of nobles.\n\nAnd after this they journeyed in peace even unto Traeth Mawr; but as they went on together towards Melenryd, the men on foot could not be restrained from shooting.\n\nPryderi dispatched unto Math an embassy to pray him to forbid his people, and to leave it between him and Gwydion the son of Don, for that he had caused all this.\n\nAnd the messengers came to Math.\n\n“Of a truth,” said Math, “I call Heaven to witness, if it be pleasing unto Gwydion the son of Don, I will so leave it gladly.\n\nNever will I compel any to go to fight, but that we ourselves should do our utmost.” “Verily,” said the messengers, “Pryderi saith that it were more fair that the man who did him this wrong should oppose his own body to his, and let his people remain unscathed.” “I declare to Heaven, I will not ask the men of Gwynedd to fight because of me.\n\nIf I am allowed to fight Pryderi myself, gladly will I oppose my body to his.” And this answer they took back to Pryderi.\n\n“Truly,” said Pryderi, “I shall require no one to demand my rights but myself.” Then these two came forth and armed themselves, and they fought.\n\nAnd by force of strength, and fierceness, and by the magic and charms of Gwydion, Pryderi was slain.\n\nAnd at Maen Tyriawc, above Melenryd, was he buried, and there is his grave.\n\nAnd the men of the South set forth in sorrow towards their own land; nor is it a marvel that they should grieve, seeing that they had lost their lord, and many of their best warriors, and for the most part their horses and their arms.\n\nThe men of Gwynedd went back joyful and in triumph.\n\n“Lord,” said Gwydion unto Math, “would it not be right for us to release the hostages of the men of the South, which they pledged unto us for peace?\n\nfor we ought not to put them in prison.” “Let them then be set free,” saith Math.\n\nSo that youth, and the other hostages that were with him, were set free to follow the men of the South.\n\nMath himself went forward to Caer Dathyl.\n\nGilvaethwy the son of Don, and they of the household that were with him, went to make the circuit of Gwynedd as they were wont, without coming to the Court.\n\nMath went into his chamber, and caused a place to be prepared for him whereon to recline, so that he might put his feet in the maiden’s lap.\n\n“Lord,” said Goewin, “seek now another to hold thy feet, for I am now a wife.” “What meaneth this?” said he.\n\n“An attack, lord, was made unawares upon me; but I held not my peace, and there was no one in the Court who knew not of it.\n\nNow the attack was made by thy nephews, lord, the sons of thy sister, Gwydion the son of Don, and Gilvaethwy the son of Don; unto me they did wrong, and unto thee dishonour.” “Verily,” he exclaimed, “I will do to the utmost of my power concerning this matter."

