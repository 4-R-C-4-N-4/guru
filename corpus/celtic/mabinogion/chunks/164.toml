[content]
body = "And a good enough name it is.\n\nLlew Llaw Gyffes be he called henceforth.” Then the work disappeared in seaweed and sedges, and he went on with it no further.\n\nAnd for that reason was he called the third Gold-shoemaker.\n\n“Of a truth,” said she, “thou wilt not thrive the better for doing evil unto me.” “I have done thee no evil yet,” said he.\n\nThen he restored the boy to his own form.\n\n“Well,” said she, “I will lay a destiny upon this boy, that he shall never have arms and armour until I invest him with them.” “By Heaven,” said he, “let thy malice be what it may, he shall have arms.” Then they went towards Dinas Dinllev, and there he brought up Llew Llaw Gyffes, until he could manage any horse, and he was perfect in features, and strength, and stature.\n\nAnd then Gwydion saw that he languished through the want of horses and arms.\n\nAnd he called him unto him.\n\n“Ah, youth,” said he, “we will go to-morrow on an errand together.\n\nBe therefore more cheerful than thou art.” “That I will,” said the youth.\n\nNext morning, at the dawn of day, they arose.\n\nAnd they took way along the sea coast, up towards Bryn Aryen.\n\nAnd at the top of Cevn Clydno they equipped themselves with horses, and went towards the Castle of Arianrod.\n\nAnd they changed their form, and pricked towards the gate in the semblance of two youths, but the aspect of Gwydion was more staid than that of the other.\n\n“Porter,” said he, “go thou in and say that there are here bards from Glamorgan.” And the porter went in.\n\n“The welcome of Heaven be unto them, let them in,” said Arianrod.\n\nWith great joy were they greeted.\n\nAnd the hall was arranged, and they went to meat.\n\nWhen meat was ended, Arianrod discoursed with Gwydion of tales and stories.\n\nNow Gwydion was an excellent teller of tales.\n\nAnd when it was time to leave off feasting, a chamber was prepared for them, and they went to rest.\n\nIn the early twilight Gwydion arose, and he called unto him his magic and his power.\n\nAnd by the time that the day dawned, there resounded through the land uproar, and trumpets and shouts.\n\nWhen it was now day, they heard a knocking at the door of the chamber, and therewith Arianrod asking that it might be opened.\n\nUp rose the youth and opened unto her, and she entered and a maiden with her.\n\n“Ah, good men,” she said, “in evil plight are we.” “Yes, truly,” said Gwydion, “we have heard trumpets and shouts; what thinkest thou that they may mean?” “Verily,” said she, “we cannot see the colour of the ocean by reason of all the ships, side by side.\n\nAnd they are making for the land with all the speed they can.\n\nAnd what can we do?” said she.\n\n“Lady,” said Gwydion, “there is none other counsel than to close the castle upon us, and to defend it as best we may.” “Truly,” said she, “may Heaven reward you.\n\nAnd do you defend it.\n\nAnd here may you have plenty of arms.” And thereupon went she forth for the arms, and behold she returned, and two maidens, and suits of armour for two men, with her.\n\n“Lady,” said he, “do you accoutre this stripling, and I will arm myself with the help of thy maidens."

