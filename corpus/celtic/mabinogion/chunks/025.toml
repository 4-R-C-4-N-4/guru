[content]
body = "“Go forward,” said Peredur, “for I saw such an one as thou inquirest for, and I will follow thee.” Then Peredur returned to his mother and her company, and he said to her, “Mother, those were not angels, but honourable knights.” Then his mother swooned away.\n\nAnd Peredur went to the place where they kept the horses that carried firewood, and that brought meat and drink from the inhabited country to the desert.\n\nAnd he took a bony piebald horse, which seemed to him the strongest of them.\n\nAnd he pressed a pack into the form of a saddle, and with twisted twigs he imitated the trappings which he had seen upon the horses.\n\nAnd when Peredur came again to his mother, the Countess had recovered from her swoon.\n\n“My son,” said she, “desirest thou to ride forth?” “Yes, with thy leave,” said he.\n\n“Wait, then, that I may counsel thee before thou goest.” “Willingly,” he answered; “speak quickly.” “Go forward, then,” she said, “to the Court of Arthur, where there are the best, and the boldest, and the most bountiful of men.\n\nAnd wherever thou seest a church, repeat there thy Paternoster unto it.\n\nAnd if thou see meat and drink, and have need of them, and none have the kindness or the courtesy to give them to thee, take them thyself.\n\nIf thou hear an outcry, proceed towards it, especially if it be the outcry of a woman.\n\nIf thou see a fair jewel, possess thyself of it, and give it to another, for thus thou shalt obtain praise.\n\nIf thou see a fair woman, pay thy court to her, whether she will or no; for thus thou wilt render thyself a better and more esteemed man than thou wast before.” After this discourse, Peredur mounted the horse, and taking a handful of sharp-pointed forks in his hand, he rode forth.\n\nAnd he journeyed two days and two nights in the woody wildernesses, and in desert places, without food and without drink.\n\nAnd then he came to a vast wild wood, and far within the wood he saw a fair even glade, and in the glade he saw a tent, and the tent seeming to him to be a church, he repeated his Paternoster to it.\n\nAnd he went towards it, and the door of the tent was open.\n\nAnd a golden chair was near the door.\n\nAnd on the chair sat a lovely auburn-haired maiden, with a golden frontlet on her forehead, and sparkling stones in the frontlet, and with a large gold ring on her hand.\n\nAnd Peredur dismounted, and entered the tent.\n\nAnd the maiden was glad at his coming, and bade him welcome.\n\nAt the entrance of the tent he saw food, and two flasks full of wine, and two loaves of fine wheaten flour, and collops of the flesh of the wild boar.\n\n“My mother told me,” said Peredur, “wheresoever I saw meat and drink, to take it.” “Take the meat and welcome, chieftain,” said she.\n\nSo Peredur took half of the meat and of the liquor himself, and left the rest to the maiden.\n\nAnd when Peredur had finished eating, he bent upon his knee before the maiden.\n\n“My mother,” said he, “told me, wheresoever I saw a fair jewel, to take it.” “Do so, my soul,” said she.\n\nSo Peredur took the ring.\n\nAnd he mounted his horse, and proceeded on his journey.\n\nAfter this, behold the knight came to whom the tent belonged; and he was the Lord of the Glade."

