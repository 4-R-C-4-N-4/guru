[content]
body = "And they fought thus until their horses were brought down upon their knees; and at length Geraint threw the knight headlong to the ground; and then they fought on foot, and they gave one another blows so boldly fierce, so frequent, and so severely powerful, that their helmets were pierced, and their skullcaps were broken, and their arms were shattered, and the light of their eyes was darkened by sweat and blood.\n\nAt the last Geraint became enraged, and he called to him all his strength; and boldly angry, and swiftly resolute, and furiously determined, he lifted up his sword, and struck him on the crown of his head a blow so mortally painful, so violent, so fierce, and so penetrating, that it cut through all his head armour, and his skin, and his flesh, until it wounded the very bone, and the sword flew out of the hand of the Little King to the furthest end of the plain, and he besought Geraint that he would have mercy and compassion upon him.\n\n“Though thou hast been neither courteous nor just,” said Geraint, “thou shalt have mercy, upon condition that thou wilt become my ally, and engage never to fight against me again, but to come to my assistance whenever thou hearest of my being in trouble.” “This will I do, gladly, Lord,” said he.\n\nSo he pledged him his faith thereof.\n\n“And now, Lord, come with me,” said he, “to my Court yonder, to recover from thy weariness and fatigue.” “That will I not, by Heaven,” said he.\n\nThen Gwiffert Petit beheld Enid where she stood, and it grieved him to see one of her noble mien appear so deeply afflicted.\n\nAnd he said to Geraint, “My Lord, thou doest wrong not to take repose, and refresh thyself awhile; for, if thou meetest with any difficulty in thy present condition, it will not be easy for thee to surmount it.” But Geraint would do no other than proceed on his journey, and he mounted his horse in pain, and all covered with blood.\n\nAnd the maiden went on first, and they proceeded towards the wood which they saw before them.\n\nAnd the heat of the sun was very great, and through the blood and sweat, Geraint’s armour cleaved to his flesh; and when they came into the wood, he stood under a tree, to avoid the sun’s heat; and his wounds pained him more than they had done at the time when he received them.\n\nAnd the maiden stood under another tree.\n\nAnd lo!\n\nthey heard the sound of horns, and a tumultuous noise; and the occasion of it was, that Arthur and his company had come down to the wood.\n\nAnd while Geraint was considering which way he should go to avoid them, behold, he was espied by a foot-page, who was an attendant on the Steward of the Household; and he went to the Steward, and told him what kind of man he had seen in the wood.\n\nThen the Steward caused his horse to be saddled, and he took his lance and his shield, and went to the place where Geraint was.\n\n“Ah, knight!” said he, “what dost thou here?” “I am standing under a shady tree, to avoid the heat and the rays of the sun.” “Wherefore is thy journey, and who art thou?” “I seek adventures, and go where I list.” “Indeed,” said Kai; “then come with me to see Arthur, who is here hard by.” “That will I not, by Heaven,” said Geraint.\n\n“Thou must needs come,” said Kai.\n\nThen Geraint knew who he was, but Kai did not know Geraint.\n\nAnd Kai attacked Geraint as best he could."

