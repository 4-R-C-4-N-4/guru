[content]
body = "“Show me how I may.” “I will show thee.\n\nBehold thus it is thou mayest.\n\nI will make firm friendship with thee; and this will I do.\n\nI will send thee to Annwvyn in my stead, and I will give thee the fairest lady thou didst ever behold to be thy companion, and I will put my form and semblance upon thee, so that not a page of the chamber, nor an officer, nor any other man that has always followed me shall know that it is not I.\n\nAnd this shall be for the space of a year from to-morrow, and then we will meet in this place.” “Yes,” said he; “but when I shall have been there for the space of a year, by what means shall I discover him of whom thou speakest?” “One year from this night,” he answered, “is the time fixed between him and me that we should meet at the Ford; be thou there in my likeness, and with one stroke that thou givest him, he shall no longer live.\n\nAnd if he ask thee to give him another, give it not, how much soever he may entreat thee, for when I did so, he fought with me next day as well as ever before.” “Verily,” said Pwyll, “what shall I do concerning my kingdom?” Said Arawn, “I will cause that no one in all thy dominions, neither man nor woman, shall know that I am not thou, and I will go there in thy stead.” “Gladly then,” said Pwyll, “will I set forward.” “Clear shall be thy path, and nothing shall detain thee, until thou come into my dominions, and I myself will be thy guide!” So he conducted him until he came in sight of the palace and its dwellings.\n\n“Behold,” said he, “the Court and the kingdom in thy power.\n\nEnter the Court, there is no one there who will know thee, and when thou seest what service is done there, thou wilt know the customs of the Court.” So he went forward to the Court, and when he came there, he beheld sleeping-rooms, and halls, and chambers, and the most beautiful buildings ever seen.\n\nAnd he went into the hall to disarray, and there came youths and pages and disarrayed him, and all as they entered saluted him.\n\nAnd two knights came and drew his hunting-dress from about him, and clothed him in a vesture of silk and gold.\n\nAnd the hall was prepared, and behold he saw the household and the host enter in, and the host was the most comely and the best equipped that he had ever seen.\n\nAnd with them came in likewise the Queen, who was the fairest woman that he had ever yet beheld.\n\nAnd she had on a yellow robe of shining satin; and they washed and went to the table, and sat, the Queen upon one side of him, and one who seemed to be an Earl on the other side.\n\nAnd he began to speak with the Queen, and he thought, from her speech, that she was the seemliest and most noble lady of converse and of cheer that ever was.\n\nAnd they partook of meat, and drink, with songs and with feasting; and of all the Courts upon the earth, behold this was the best supplied with food and drink, and vessels of gold and royal jewels.\n\nAnd the year he spent in hunting, and minstrelsy, and feasting, and diversions, and discourse with his companions until the night that was fixed for the conflict.\n\nAnd when that night came, it was remembered even by those who lived in the furthest part of his dominions, and he went to the meeting, and the nobles of the kingdom with him."

