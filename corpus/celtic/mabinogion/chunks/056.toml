[content]
body = "“From this place,” said she, “we shall hear when the dogs are let loose.” And thereupon, they heard a loud noise, and they looked towards the spot whence it came, and they beheld a dwarf riding upon a horse, stately, and foaming, and prancing, and strong, and spirited.\n\nAnd in the hand of the dwarf was a whip.\n\nAnd near the dwarf they saw a lady upon a beautiful white horse, of steady and stately pace; and she was clothed in a garment of gold brocade.\n\nAnd near her was a knight upon a warhorse of large size, with heavy and bright armour both upon himself and upon his horse.\n\nAnd truly they never before saw a knight, or a horse, or armour, of such remarkable size.\n\nAnd they were all near to each other.\n\n“Geraint,” said Gwenhwyvar, “knowest thou the name of that tall knight yonder?” “I know him not,” said he, “and the strange armour that he wears prevents my either seeing his face or his features.” “Go, maiden,” said Gwenhwyvar, “and ask the dwarf who that knight is.” Then the maiden went up to the dwarf; and the dwarf waited for the maiden, when he saw her coming towards him.\n\nAnd the maiden inquired of the dwarf who the knight was.\n\n“I will not tell thee,” he answered.\n\n“Since thou art so churlish as not to tell me,” said she, “I will ask him himself.” “Thou shalt not ask him, by my faith,” said he.\n\n“Wherefore?” said she.\n\n“Because thou art not of honour sufficient to befit thee to speak to my Lord.” Then the maiden turned her horse’s head towards the knight, upon which the dwarf struck her with the whip that was in his hand across the face and the eyes, until the blood flowed forth.\n\nAnd the maiden, through the hurt she received from the blow, returned to Gwenhwyvar, complaining of the pain.\n\n“Very rudely has the dwarf treated thee,” said Geraint.\n\n“I will go myself to know who the knight is.” “Go,” said Gwenhwyvar.\n\nAnd Geraint went up to the dwarf.\n\n“Who is yonder knight?” said Geraint.\n\n“I will not tell thee,” said the dwarf.\n\n“Then will I ask him himself,” said he.\n\n“That wilt thou not, by my faith,” said the dwarf, “thou art not honourable enough to speak with my Lord.” Said Geraint, “I have spoken with men of equal rank with him.” And he turned his horse’s head towards the knight; but the dwarf overtook him, and struck him as he had done the maiden, so that the blood coloured the scarf that Geraint wore.\n\nThen Geraint put his hand upon the hilt of his sword, but he took counsel with himself, and considered that it would be no vengeance for him to slay the dwarf, and to be attacked unarmed by the armed knight, so he returned to where Gwenhwyvar was.\n\n“Thou hast acted wisely and discreetly,” said she.\n\n“Lady,” said he, “I will follow him yet, with thy permission; and at last he will come to some inhabited place, where I may have arms either as a loan or for a pledge, so that I may encounter the knight.” “Go,” said she, “and do not attack him until thou hast good arms, and I shall be very anxious concerning thee, until I hear tidings of thee.” “If I am alive,” said he, “thou shalt hear tidings of me by to-morrow afternoon;” and with that he departed."

