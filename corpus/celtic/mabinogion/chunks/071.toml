[content]
body = "And when they drew near to them, Enid heard them say, “Behold, here is a fine booty coming to us, which we shall obtain easily and without labour, for we shall have no trouble in taking all those horses and arms, and the lady also, from yonder single knight, so doleful and sad.” Sorely grieved was the maiden upon hearing this discourse, so that she knew not in the world what she should do.\n\nAt last, however, she determined to warn Geraint; so she turned her horse’s head towards him.\n\n“Lord,” said she, “if thou hadst heard as I did what yonder horsemen said concerning thee, thy heaviness would be greater than it is.” Angrily and bitterly did Geraint smile upon her, and he said, “Thee do I hear doing everything that I forbade thee; but it may be that thou will repent this yet.” And immediately, behold, the men met them, and victoriously and gallantly did Geraint overcome them all five.\n\nAnd he placed the five suits of armour upon the five saddles, and tied together the reins of the twelve horses, and gave them in charge to Enid.\n\n“I know not,” said he, “what good it is for me to order thee; but this time I charge thee in an especial manner.” So the maiden went forward towards the wood, keeping in advance of Geraint, as he had desired her; and it grieved him as much as his wrath would permit, to see a maiden so illustrious as she having so much trouble with the care of the horses.\n\nThen they reached the wood, and it was both deep and vast; and in the wood night overtook them.\n\n“Ah, maiden,” said he, “it is vain to attempt proceeding forward!” “Well, Lord,” said she, “whatsoever thou wishest, we will do.” “It will be best for us,” he answered, “to turn out of the wood, and to rest, and wait for the day, in order to pursue our journey.” “That will we, gladly,” said she.\n\nAnd they did so.\n\nHaving dismounted himself, he took her down from her horse.\n\n“I cannot, by any means, refrain from sleep, through weariness,” said he.\n\n“Do thou, therefore, watch the horses, and sleep not.” “I will, Lord,” said she.\n\nThen he went to sleep in his armour, and thus passed the night, which was not long at that season.\n\nAnd when she saw the dawn of day appear, she looked around her, to see if he were waking, and thereupon he woke.\n\n“My Lord,” she said, “I have desired to awake thee for some time.” But he spake nothing to her about fatigue, as he had desired her to be silent.\n\nThen he arose, and said unto her, “Take the horses, and ride on; and keep straight on before thee as thou didst yesterday.” And early in the day they left the wood, and they came to an open country, with meadows on one hand, and mowers mowing the meadows.\n\nAnd there was a river before them, and the horses bent down, and drank the water.\n\nAnd they went up out of the river by a lofty steep; and there they met a slender stripling, with a satchel about his neck, and they saw that there was something in the satchel, but they knew not what it was.\n\nAnd he had a small blue pitcher in his hand, and a bowl on the mouth of the pitcher.\n\nAnd the youth saluted Geraint.\n\n“Heaven prosper thee,” said Geraint, “and whence dost thou come?” “I come,” said he, “from the city that lies before thee."

