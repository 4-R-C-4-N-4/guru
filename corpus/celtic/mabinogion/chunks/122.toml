[content]
body = "Bedwini, the Bishop, and Gwarthegyd the son of Kaw, and March the son of Meirchawn, and Caradawc Vreichvras, and Gwalchmai the son of Gwyar, and Edeyrn the son of Nudd, and Rhuvawn Pebyr the son of Prince Deorthach, and Rhiogan the son of the King of Ireland, and Gwenwynwyn the son of Nav, Howel the son of Emyr Llydaw, Gwilym the son of Rhwyf Freinc, and Daned the son of Ath, and Goreu Custennin, and Mabon the son of Modron, and Peredur Paladyr Hir, and Hyveidd Unllenn, and Twrch the son of Perif, and Nerth the son of Kadarn, and Gobrwy the son of Echel Vorddwyttwll, Gwair the son of Gwestyl, and Gadwy the son of Geraint, Trystan the son of Tallwch, Moryen Manawc, Granwen the son of Llyr, and Llacheu the son of Arthur, and Llawvrodedd Varvawc, and Kadwr Earl of Cornwall, Morvran the son of Tegid, and Rhyawd the son of Morgant, and Dyvyr the son of Alun Dyved, Gwrhyr Gwalstawd Ieithoedd, Adaon the son of Taliesin, Llary the son of Kasnar Wledig, and Fflewddur Fflam, and Greidawl Galldovydd, Gilbert the son of Kadgyffro, Menw the son of Teirgwaedd, Gwrthmwl Wledig, Cawrdav the son of Caradawc Vreichvras, Gildas the son of Kaw, Kadyriaith the son of Saidi, and many of the men of Norway and Denmark, and many of the men of Greece, and a crowd of the men of the host came to that council.\n\n“Iddawc,” said Rhonabwy, “who was the auburn haired man to whom they came just now?” “Rhun the son of Maelgwn Gwynedd, a man whose prerogative it is, that he may join in counsel with all.” “And wherefore did they admit into counsel with men of such dignity as are yonder a stripling so young as Kadyriaith the son of Saidi?” “Because there is not throughout Britain a man better skilled in counsel than he.” Thereupon, behold, bards came and recited verses before Arthur, and no man understood those verses but Kadyriaith only, save that they were in Arthur’s praise.\n\nAnd lo, there came four-and-twenty asses with their burdens of gold and of silver, and a tired way-worn man with each of them, bringing tribute to Arthur from the Islands of Greece.\n\nThen Kadyriaith the son of Saidi besought that a truce might be granted to Osla Gyllellvawr for the space of a fortnight and a month, and that the asses and the burdens they carried might be given to the bards, to be to them as the reward for their stay and that their verse might be recompensed during the time of the truce.\n\nAnd thus it was settled."

