[content]
body = "Said the man of the house to the swineherd, “Well, youth, hath thy sow come in to-night?” “She hath,” said he, “and is this instant returned to the pigs.” “Where doth this sow go to?” said Gwydion.\n\n“Every day, when the sty is opened, she goeth forth and none can catch sight of her, neither is it known whither she goeth more than if she sank into the earth.” “Wilt thou grant unto me,” said Gwydion, “not to open the sty until I am beside the sty with thee?” “This will I do, right gladly,” he answered.\n\nThat night they went to rest; and as soon as the swineherd saw the light of day, he awoke Gwydion.\n\nAnd Gwydion arose and dressed himself, and went with the swineherd, and stood beside the sty.\n\nThen the swineherd opened the sty.\n\nAnd as soon as he opened it, behold she leaped forth, and set off with great speed.\n\nAnd Gwydion followed her, and she went against the course of a river, and made for a brook, which is now called Nant y Llew.\n\nAnd there she halted and began feeding.\n\nAnd Gwydion came under the tree, and looked what it might be that the sow was feeding on.\n\nAnd he saw that she was eating putrid flesh and vermin.\n\nThen looked he up to the top of the tree, and as he looked he beheld on the top of the tree an eagle, and when the eagle shook itself, there fell vermin and putrid flesh from off it, and these the sow devoured.\n\nAnd it seemed to him that the eagle was Llew.\n\nAnd he sang an Englyn:— “Oak that grows between the two banks; Darkened is the sky and hill!\n\nShall I not tell him by his wounds, That this is Llew?” Upon this the eagle came down until he reached the centre of the tree.\n\nAnd Gwydion sang another Englyn:— “Oak that grows in upland ground, Is it not wetted by the rain?\n\nHas it not been drenched By nine score tempests?\n\nIt bears in its branches Llew Llaw Gyffes!” Then the eagle came down until he was on the lowest branch of the tree, and thereupon this Englyn did Gwydion sing:— “Oak that grows beneath the steep; Stately and majestic is its aspect!\n\nShall I not speak it?\n\nThat Llew will come to my lap?” And the eagle came down upon Gwydion’s knee.\n\nAnd Gwydion struck him with his magic wand, so that he returned to his own form.\n\nNo one ever saw a more piteous sight, for he was nothing but skin and bone.\n\nThen he went unto Caer Dathyl, and there were brought unto him good physicians that were in Gwynedd, and before the end of the year he was quite healed.\n\n“Lord,” said he unto Math the son of Mathonwy, “it is full time now that I have retribution of him by whom I have suffered all this woe.” “Truly,” said Math, “he will never be able to maintain himself in the possession of that which is thy right.” “Well,” said Llew, “the sooner I have my right, the better shall I be pleased.” Then they called together the whole of Gwynedd, and set forth to Ardudwy.\n\nAnd Gwydion went on before and proceeded to Mur y Castell.\n\nAnd when Blodeuwedd heard that he was coming, she took her maidens with her, and fled to the mountain."

