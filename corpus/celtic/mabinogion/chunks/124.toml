[content]
body = "Pwyll Prince of Dyved was lord of the seven Cantrevs of Dyved; and once upon a time he was at Narberth his chief palace, and he was minded to go and hunt, and the part of his dominions in which it pleased him to hunt was Glyn Cuch.\n\nSo he set forth from Narberth that night, and went as far as Llwyn Diarwyd.\n\nAnd that night he tarried there, and early on the morrow he rose and came to Glyn Cuch, when he let loose the dogs in the wood, and sounded the horn, and began the chase.\n\nAnd as he followed the dogs, he lost his companions; and whilst he listened to the hounds, he heard the cry of other hounds, a cry different from his own, and coming in the opposite direction.\n\nAnd he beheld a glade in the wood forming a level plain, and as his dogs came to the edge of the glade, he saw a stag before the other dogs.\n\nAnd lo, as it reached the middle of the glade, the dogs that followed the stag overtook it and brought it down.\n\nThen looked he at the colour of the dogs, staying not to look at the stag, and of all the hounds that he had seen in the world, he had never seen any that were like unto these.\n\nFor their hair was of a brilliant shining white, and their ears were red; and as the whiteness of their bodies shone, so did the redness of their ears glisten.\n\nAnd he came towards the dogs, and drove away those that had brought down the stag, and set his own dogs upon it.\n\nAnd as he was setting on his dogs he saw a horseman coming towards him upon a large light-grey steed, with a hunting horn round his neck, and clad in garments of grey woollen in the fashion of a hunting garb.\n\nAnd the horseman drew near and spoke unto him thus.\n\n“Chieftain,” said he, “I know who thou art, and I greet thee not.” “Peradventure,” said Pwyll, “thou art of such dignity that thou shouldest not do so.” “Verily,” answered he, “it is not my dignity that prevents me.” “What is it then, O Chieftain?” asked he.\n\n“By Heaven, it is by reason of thine own ignorance and want of courtesy.” “What discourtesy, Chieftain, hast thou seen in me?” “Greater discourtesy saw I never in man,” said he, “than to drive away the dogs that were killing the stag and to set upon it thine own.\n\nThis was discourteous, and though I may not be revenged upon thee, yet I declare to Heaven that I will do thee more dishonour than the value of an hundred stags.” “O Chieftain,” he replied, “if I have done ill I will redeem thy friendship.” “How wilt thou redeem it?” “According as thy dignity may be, but I know not who thou art?” “A crowned king am I in the land whence I come.” “Lord,” said he, “may the day prosper with thee, and from what land comest thou?” “From Annwvyn,” [2] answered he; “Arawn, a King of Annwvyn, am I.” “Lord,” said he, “how may I gain thy friendship?” “After this manner mayest thou,” he said.\n\n“There is a man whose dominions are opposite to mine, who is ever warring against me, and he is Havgan, a King of Annwvyn, and by ridding me of this oppression, which thou canst easily do, shalt thou gain my friendship.” “Gladly will I do this,” said he."

