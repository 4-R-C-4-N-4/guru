[content]
body = "And her figure was very thin and spare, except her feet and her legs, which were of huge size.\n\nAnd she greeted Arthur and all his household except Peredur.\n\nAnd to Peredur she spoke harsh and angry words.\n\n“Peredur, I greet thee not, seeing that thou dost not merit it.\n\nBlind was fate in giving thee fame and favour.\n\nWhen thou wast in the Court of the Lame King, and didst see there the youth bearing the streaming spear, from the points of which were drops of blood flowing in streams, even to the hand of the youth, and many other wonders likewise, thou didst not inquire their meaning nor their cause.\n\nHadst thou done so, the King would have been restored to health, and his dominions to peace.\n\nWhereas from henceforth, he will have to endure battles and conflicts, and his knights will perish, and wives will be widowed, and maidens will be left portionless, and all this is because of thee.” Then said she unto Arthur, “May it please thee, lord, my dwelling is far hence, in the stately castle of which thou hast heard, and therein are five hundred and sixty-six knights of the order of Chivalry, and the lady whom best he loves with each; and whoever would acquire fame in arms, and encounters, and conflicts, he will gain it there, if he deserve it.\n\nAnd whoso would reach the summit of fame and of honour, I know where he may find it.\n\nThere is a castle on a lofty mountain, and there is a maiden therein, and she is detained a prisoner there, and whoever shall set her free will attain the summit of the fame of the world.” And thereupon she rode away.\n\nSaid Gwalchmai, “By my faith, I will not rest tranquilly until I have proved if I can release the maiden.” And many of Arthur’s household joined themselves with him.\n\nThen, likewise, said Peredur, “By my faith, I will not rest tranquilly until I know the story and the meaning of the lance whereof the black maiden spoke.” And while they were equipping themselves, behold a knight came to the gate.\n\nAnd he had the size and the strength of a warrior, and was equipped with arms and habiliments.\n\nAnd he went forward, and saluted Arthur and all his household, except Gwalchmai.\n\nAnd the knight had upon his shoulder a shield, ingrained with gold, with a fesse of azure blue upon it, and his whole armour was of the same hue.\n\nAnd he said to Gwalchmai, “Thou didst slay my lord by thy treachery and deceit, and that will I prove upon thee.” Then Gwalchmai rose up.\n\n“Behold,” said he, “here is my gage against thee, to maintain, either in this place or wherever else thou wilt, that I am not a traitor or deceiver.” “Before the King whom I obey, will I that my encounter with thee take place,” said the knight.\n\n“Willingly,” said Gwalchmai; “go forward, and I will follow thee.” So the knight went forth, and Gwalchmai accoutred himself, and there was offered unto him abundance of armour, but he would take none but his own.\n\nAnd when Gwalchmai and Peredur were equipped, they set forth to follow him, by reason of their fellowship and of the great friendship that was between them.\n\nAnd they did not go after him in company together, but each went his own way.\n\nAt the dawn of day Gwalchmai came to a valley, and in the valley he saw a fortress, and within the fortress a vast palace and lofty towers around it."

