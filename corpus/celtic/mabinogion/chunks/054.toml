[content]
body = "Arthur was accustomed to hold his Court at Caerlleon upon Usk.\n\nAnd there he held it seven Easters and five Christmases.\n\nAnd once upon a time he held his Court there at Whitsuntide.\n\nFor Caerlleon was the place most easy of access in his dominions, both by sea and by land.\n\nAnd there were assembled nine crowned kings, who were his tributaries, and likewise earls and barons.\n\nFor they were his invited guests at all the high festivals, unless they were prevented by any great hindrance.\n\nAnd when he was at Caerlleon, holding his Court, thirteen churches were set apart for mass.\n\nAnd thus were they appointed: one church for Arthur, and his kings, and his guests; and the second for Gwenhwyvar and her ladies; and the third for the Steward of the Household and the suitors; and the fourth for the Franks and the other officers; and the other nine churches were for the nine Masters of the Household and chiefly for Gwalchmai; for he, from the eminence of his warlike fame, and from the nobleness of his birth, was the most exalted of the nine.\n\nAnd there was no other arrangement respecting the churches than that which we have mentioned above.\n\nGlewlwyd Gavaelvawr was the chief porter; but he did not himself perform the office, except at one of the three high festivals, for he had seven men to serve him, and they divided the year amongst them.\n\nThey were Grynn, and Pen Pighon, and Llaes Cymyn, and Gogyfwlch, and Gwrdnei with cat’s eyes, who could see as well by night as by day, and Drem the son of Dremhitid, and Clust the son of Clustveinyd; and these were Arthur’s guards.\n\nAnd on Whit-Tuesday, as the King sat at the banquet, lo!\n\nthere entered a tall, fair-headed youth, clad in a coat and a surcoat of diapered satin, and a golden-hilted sword about his neck, and low shoes of leather upon his feet.\n\nAnd he came, and stood before Arthur.\n\n“Hail to thee, Lord!” said he.\n\n“Heaven prosper thee,” he answered, “and be thou welcome.\n\nDost thou bring any new tidings?” “I do, Lord,” he said.\n\n“I know thee not,” said Arthur.\n\n“It is a marvel to me that thou dost not know me.\n\nI am one of thy foresters, Lord, in the Forest of Dean, and my name is Madawc, the son of Twrgadarn.” “Tell me thine errand,” said Arthur.\n\n“I will do so, Lord,” said he.\n\n“In the Forest I saw a stag, the like of which beheld I never yet.” “What is there about him,” asked Arthur, “that thou never yet didst see his like?” “He is of pure white, Lord, and he does not herd with any other animal through stateliness and pride, so royal is his bearing.\n\nAnd I come to seek thy counsel, Lord, and to know thy will concerning him.” “It seems best to me,” said Arthur, “to go and hunt him to-morrow at break of day; and to cause general notice thereof to be given to-night in all quarters of the Court.” And Arryfuerys was Arthur’s chief huntsman, and Arelivri was his chief page.\n\nAnd all received notice; and thus it was arranged.\n\nAnd they sent the youth before them.\n\nThen Gwenhwyvar said to Arthur, “Wilt thou permit me, Lord,” said she, “to go to-morrow to see and hear the hunt of the stag of which the young man spoke?” “I will gladly,” said Arthur."

