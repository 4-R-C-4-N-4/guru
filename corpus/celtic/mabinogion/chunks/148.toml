[content]
body = "HERE IS THE THIRD PORTION OF THE MABINOGI When the seven men of whom we spoke above had buried the head of Bendigeid Vran, in the White Mount in London, with its face towards France; Manawyddan gazed upon the town of London, and upon his companions, and heaved a great sigh; and much grief and heaviness came upon him.\n\n“Alas, Almighty Heaven, woe is me,” he exclaimed, “there is none save myself without a resting-place this night.” “Lord,” said Pryderi, “be not so sorrowful.\n\nThy cousin is king of the Island of the Mighty, and though he should do thee wrong, thou hast never been a claimant of land or possessions.\n\nThou art the third disinherited prince.” “Yea,” answered he, “but although this man is my cousin, it grieveth me to see any one in the place of my brother Bendigeid Vran, neither can I be happy in the same dwelling with him.” “Wilt thou follow the counsel of another?” said Pryderi.\n\n“I stand in need of counsel,” he answered, “and what may that counsel be?” “Seven Cantrevs remain unto me,” said Pryderi, “wherein Rhiannon my mother dwells.\n\nI will bestow her upon thee and the seven Cantrevs with her, and though thou hadst no possessions but those Cantrevs only, thou couldst not have seven Cantrevs fairer than they.\n\nKicva, the daughter of Gwynn Gloyw, is my wife, and since the inheritance of the Cantrevs belongs to me, do thou and Rhiannon enjoy them, and if thou ever desire any possessions thou wilt take these.” “I do not, Chieftain,” said he; “Heaven reward thee for thy friendship.” “I would show thee the best friendship in the world if thou wouldst let me.” “I will, my friend,” said he, “and Heaven reward thee.\n\nI will go with thee to seek Rhiannon and to look at thy possessions.” “Thou wilt do well,” he answered.\n\n“And I believe that thou didst never hear a lady discourse better than she, and when she was in her prime none was ever fairer.\n\nEven now her aspect is not uncomely.” They set forth, and, however long the journey, they came at length to Dyved, and a feast was prepared for them against their coming to Narberth, which Rhiannon and Kicva had provided.\n\nThen began Manawyddan and Rhiannon to sit and to talk together, and from their discourse his mind and his thoughts became warmed towards her, and he thought in his heart he had never beheld any lady more fulfilled of grace and beauty than she.\n\n“Pryderi,” said he, “I will that it be as thou didst say.” “What saying was that?” asked Rhiannon.\n\n“Lady,” said Pryderi, “I did offer thee as a wife to Manawyddan the son of Llyr.” “By that will I gladly abide,” said Rhiannon.\n\n“Right glad am I also,” said Manawyddan; “may Heaven reward him who hath shown unto me friendship so perfect as this.” And before the feast was over she became his bride.\n\nSaid Pryderi, “Tarry ye here the rest of the feast, and I will go into Lloegyr to tender my homage unto Caswallawn the son of Beli.” “Lord,” said Rhiannon, “Caswallawn is in Kent, thou mayest therefore tarry at the feast, and wait until he shall be nearer.” “We will wait,” he answered.\n\nSo they finished the feast."

