[content]
body = "King Arthur was at Caerlleon upon Usk; and one day he sat in his chamber; and with him were Owain the son of Urien, and Kynon the son of Clydno, and Kai the son of Kyner; and Gwenhwyvar and her handmaidens at needlework by the window.\n\nAnd if it should be said that there was a porter at Arthur’s palace, there was none.\n\nGlewlwyd Gavaelvawr was there, acting as porter, to welcome guests and strangers, and to receive them with honour, and to inform them of the manners and customs of the Court; and to direct those who came to the Hall or to the presence-chamber, and those who came to take up their lodging.\n\nIn the centre of the chamber King Arthur sat upon a seat of green rushes, over which was spread a covering of flame-coloured satin, and a cushion of red satin was under his elbow.\n\nThen Arthur spoke, “If I thought you would not disparage me,” said he, “I would sleep while I wait for my repast; and you can entertain one another with relating tales, and can obtain a flagon of mead and some meat from Kai.” And the King went to sleep.\n\nAnd Kynon the son of Clydno asked Kai for that which Arthur had promised them.\n\n“I, too, will have the good tale which he promised to me,” said Kai.\n\n“Nay,” answered Kynon, “fairer will it be for thee to fulfill Arthur’s behest, in the first place, and then we will tell thee the best tale that we know.” So Kai went to the kitchen and to the mead-cellar, and returned bearing a flagon of mead and a golden goblet, and a handful of skewers, upon which were broiled collops of meat.\n\nThen they ate the collops and began to drink the mead.\n\n“Now,” said Kai, “it is time for you to give me my story.” “Kynon,” said Owain, “do thou pay to Kai the tale that is his due.” “Truly,” said Kynon, “thou are older, and art a better teller of tales, and hast seen more marvellous things than I; do thou therefore pay Kai his tale.” “Begin thyself,” quoth Owain, “with the best that thou knowest.” “I will do so,” answered Kynon.\n\n“I was the only son of my mother and father, and I was exceedingly aspiring, and my daring was very great.\n\nI thought there was no enterprise in the world too mighty for me, and after I had achieved all the adventures that were in my own country, I equipped myself, and set forth to journey through deserts and distant regions.\n\nAnd at length it chanced that I came to the fairest valley in the world, wherein were trees of equal growth; and a river ran through the valley, and a path was by the side of the river.\n\nAnd I followed the path until mid-day, and continued my journey along the remainder of the valley until the evening; and at the extremity of a plain I came to a large and lustrous Castle, at the foot of which was a torrent.\n\nAnd I approached the Castle, and there I beheld two youths with yellow curling hair, each with a frontlet of gold upon his head, and clad in a garment of yellow satin, and they had gold clasps upon their insteps.\n\nIn the hand of each of them was an ivory bow, strung with the sinews of the stag; and their arrows had shafts of the bone of the whale, and were winged with peacock’s feathers; the shafts also had golden heads."

