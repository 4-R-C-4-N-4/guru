[content]
body = "“I am the chief miller,” said he, “of all the mills yonder.” “Wilt thou give me lodging?” said Peredur.\n\n“I will, gladly,” he answered.\n\nAnd Peredur came to the miller’s house, and the miller had a fair and pleasant dwelling.\n\nAnd Peredur asked money as a loan from the miller, that he might buy meat and liquor for himself and for the household, and he promised that he would pay him again ere he went thence.\n\nAnd he inquired of the miller, wherefore such a multitude was there assembled.\n\nSaid the miller to Peredur, “One thing is certain: either thou art a man from afar, or thou art beside thyself.\n\nThe Empress of Cristinobyl the Great is here; and she will have no one but the man who is most valiant; for riches does she not require.\n\nAnd it was impossible to bring food for so many thousands as are here, therefore were all these mills constructed.” And that night they took their rest.\n\nAnd the next day Peredur arose, and he equipped himself and his horse for the tournament.\n\nAnd among the other tents he beheld one, which was the fairest he had ever seen.\n\nAnd he saw a beauteous maiden leaning her head out of a window of the tent, and he had never seen a maiden more lovely than she.\n\nAnd upon her was a garment of satin.\n\nAnd he gazed fixedly on the maiden, and began to love her greatly.\n\nAnd he remained there, gazing upon the maiden from morning until mid-day, and from mid-day until evening; and then the tournament was ended and he went to his lodging and drew off his armour.\n\nThen he asked money of the miller as a loan, and the miller’s wife was wroth with Peredur; nevertheless, the miller lent him the money.\n\nAnd the next day he did in like manner as he had done the day before.\n\nAnd at night he came to his lodging, and took money as a loan from the miller.\n\nAnd the third day, as he was in the same place, gazing upon the maiden, he felt a hard blow between the neck and the shoulder, from the edge of an axe.\n\nAnd when he looked behind him, he saw that it was the miller; and the miller said to him, “Do one of two things: either turn thy head from hence, or go to the tournament.” And Peredur smiled on the miller, and went to the tournament; and all that encountered him that day he overthrew.\n\nAnd as many as he vanquished he sent as a gift to the Empress, and their horses and arms he sent as a gift to the wife of the miller, in payment of the borrowed money.\n\nPeredur attended the tournament until all were overthrown, and he sent all the men to the prison of the Empress, and the horses and arms to the wife of the miller, in payment of the borrowed money.\n\nAnd the Empress sent to the Knight of the Mill, to ask him to come and visit her.\n\nAnd Peredur went not for the first nor for the second message.\n\nAnd the third time she sent a hundred knights to bring him against his will, and they went to him and told him their mission from the Empress.\n\nAnd Peredur fought well with them, and caused them to be bound like stags, and thrown into the mill-dyke.\n\nAnd the Empress sought advice of a wise man who was in her counsel; and he said to her, “With thy permission, I will go to him myself.” So he came to Peredur, and saluted him, and besought him, for the sake of the lady of his love, to come and visit the Empress."

