[content]
body = "And in the wood opposite he heard hounds raising a herd of deer.\n\nAnd Peredur saluted the youth, and the youth greeted him in return.\n\nAnd there were three roads leading from the mound; two of them were wide roads, and the third was more narrow.\n\nAnd Peredur inquired where the three roads went.\n\n“One of them goes to my palace,” said the youth; “and one of two things I counsel thee to do; either to proceed to my palace, which is before thee, and where thou wilt find my wife, or else to remain here to see the hounds chasing the roused deer from the wood to the plain.\n\nAnd thou shalt see the best greyhounds thou didst ever behold, and the boldest in the chase, kill them by the water beside us; and when it is time to go to meat, my page will come with my horse to meet me, and thou shalt rest in my palace to-night.” “Heaven reward thee; but I cannot tarry, for onward must I go.” “The other road leads to the town, which is near here, and wherein food and liquor may be bought; and the road which is narrower than the others goes towards the cave of the Addanc.” “With thy permission, young man, I will go that way.” And Peredur went towards the cave.\n\nAnd he took the stone in his left hand, and his lance in his right.\n\nAnd as he went in he perceived the Addanc, and he pierced him through with his lance, and cut off his head.\n\nAnd as he came from the cave, behold the three companions were at the entrance; and they saluted Peredur, and told him that there was a prediction that he should slay that monster.\n\nAnd Peredur gave the head to the young men, and they offered him in marriage whichever of the three sisters he might choose, and half their kingdom with her.\n\n“I came not hither to woo,” said Peredur, “but if peradventure I took a wife, I should prefer your sister to all others.” And Peredur rode forward, and he heard a noise behind him.\n\nAnd he looked back, and saw a man upon a red horse, with red armour upon him; and the man rode up by his side, and saluted him, and wished him the favour of Heaven and of man.\n\nAnd Peredur greeted the youth kindly.\n\n“Lord, I come to make a request unto thee.” “What wouldest thou?” “That thou shouldest take me as thine attendant.” “Whom then should I take as my attendant, if I did so?” “I will not conceal from thee what kindred I am of.\n\nEtlym Gleddyv Coch am I called, an Earl from the East Country.” “I marvel that thou shouldest offer to become attendant to a man whose possessions are no greater than thine own; for I have but an earldom like thyself.\n\nBut since thou desirest to be my attendant, I will take thee joyfully.” And they went forward to the Court of the Countess, and all they of the Court were glad at their coming; and they were told it was not through disrespect they were placed below the household, but that such was the usage of the Court.\n\nFor, whoever should overthrow the three hundred men of her household, would sit next the Countess, and she would love him above all men."

