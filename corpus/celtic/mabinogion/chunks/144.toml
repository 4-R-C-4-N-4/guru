[content]
body = "And then was that saying first uttered, and it is still used as a proverb.\n\nAnd when he had lain down across the river, hurdles were placed upon him, and the host passed over thereby.\n\nAnd as he rose up, behold the messengers of Matholwch came to him, and saluted him, and gave him greeting in the name of Matholwch, his kinsman, and showed how that of his goodwill he had merited of him nothing but good.\n\n“For Matholwch has given the kingdom of Ireland to Gwern the son of Matholwch, thy nephew and thy sister’s son.\n\nAnd this he places before thee, as a compensation for the wrong and despite that has been done unto Branwen.\n\nAnd Matholwch shall be maintained wheresoever thou wilt, either here or in the Island of the Mighty.” Said Bendigeid Vran, “Shall not I myself have the kingdom?\n\nThen peradventure I may take counsel concerning your message.\n\nFrom this time until then no other answer will you get from me.” “Verily,” said they, “the best message that we receive for thee, we will convey it unto thee, and do thou await our message unto him.” “I will wait,” answered he, “and do you return quickly.” The messengers set forth and came to Matholwch.\n\n“Lord,” said they, “prepare a better message for Bendigeid Vran.\n\nHe would not listen at all to the message that we bore him.” “My friends,” said Matholwch, “what may be your counsel?” “Lord,” said they, “there is no other counsel than this alone.\n\nHe was never known to be within a house, make therefore a house that will contain him and the men of the Island of the Mighty on the one side, and thyself and thy host on the other; and give over thy kingdom to his will, and do him homage.\n\nSo by reason of the honour thou doest him in making him a house, whereas he never before had a house to contain him, he will make peace with thee.” So the messengers went back to Bendigeid Vran, bearing him this message.\n\nAnd he took counsel, and in the council it was resolved that he should accept this, and this was all done by the advice of Branwen, and lest the country should be destroyed.\n\nAnd this peace was made, and the house was built both vast and strong.\n\nBut the Irish planned a crafty device, and the craft was that they should put brackets on each side of the hundred pillars that were in the house, and should place a leathern bag on each bracket, and an armed man in every one of them.\n\nThen Evnissyen came in before the host of the Island of the Mighty, and scanned the house with fierce and savage looks, and descried the leathern bags which were around the pillars.\n\n“What is in this bag?” asked he of one of the Irish.\n\n“Meal, good soul,” said he.\n\nAnd Evnissyen felt about it until he came to the man’s head, and he squeezed the head until he felt his fingers meet together in the brain through the bone.\n\nAnd he left that one and put his hand upon another, and asked what was therein.\n\n“Meal,” said the Irishman.\n\nSo he did the like unto every one of them, until he had not left alive, of all the two hundred men, save one only; and when he came to him, he asked what was there.\n\n“Meal, good soul,” said the Irishman.\n\nAnd he felt about until he felt the head, and he squeezed that head as he had done the others.\n\nAnd, albeit he found that the head of this one was armed, he left him not until he had killed him."

