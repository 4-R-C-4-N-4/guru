[content]
body = "And Peredur having overthrown the three hundred men of her household, sat down beside her, and the Countess said, “I thank Heaven that I have a youth so fair and so valiant as thou, since I have not obtained the man whom best I love.” “Who is he whom best thou lovest?” “By my faith, Etlym Gleddyv Coch is the man whom I love best, and I have never seen him.” “Of a truth, Etlym is my companion; and behold here he is, and for his sake did I come to joust with thy household.\n\nAnd he could have done so better than I, had it pleased him.\n\nAnd I do give thee unto him.” “Heaven reward thee, fair youth, and I will take the man whom I love above all others.” And the Countess became Etlym’s bride from that moment.\n\nAnd the next day Peredur set forth towards the Mound of Mourning.\n\n“By thy hand, lord, but I will go with thee,” said Etlym.\n\nThen they went forwards till they came in sight of the mound and the tents.\n\n“Go unto yonder men,” said Peredur to Etlym, “and desire them to come and do me homage.” So Etlym went unto them, and said unto them thus,—“Come and do homage to my lord.” “Who is thy lord?” said they.\n\n“Peredur with the long lance is my lord,” said Etlym.\n\n“Were it permitted to slay a messenger, thou shouldest not go back to thy lord alive, for making unto Kings, and Earls, and Barons so arrogant a demand as to go and do him homage.” Peredur desired him to go back to them, and to give them their choice, either to do him homage, or to do battle with him.\n\nAnd they chose rather to do battle.\n\nAnd that day Peredur overthrew the owners of a hundred tents; and the next day he overthrew the owners of a hundred more; and the third day the remaining hundred took counsel to do homage to Peredur.\n\nAnd Peredur inquired of them, wherefore they were there.\n\nAnd they told him they were guarding the serpent until he should die.\n\n“For then should we fight for the stone among ourselves, and whoever should be conqueror among us would have the stone.” “Await here,” said Peredur, “and I will go to encounter the serpent.” “Not so, lord,” said they; “we will go altogether to encounter the serpent.” “Verily,” said Peredur, “that will I not permit; for if the serpent be slain, I shall derive no more fame therefrom than one of you.” Then he went to the place where the serpent was, and slew it, and came back to them, and said, “Reckon up what you have spent since you have been here, and I will repay you to the full.” And he paid to each what he said was his claim.\n\nAnd he required of them only that they should acknowledge themselves his vassals.\n\nAnd he said to Etlym, “Go back unto her whom thou lovest best, and I will go forwards, and I will reward thee for having been my attendant.” And he gave Etlym the stone.\n\n“Heaven repay thee and prosper thee,” said Etlym.\n\nAnd Peredur rode thence, and he came to the fairest valley he had ever seen, through which ran a river; and there he beheld many tents of various colours.\n\nAnd he marvelled still more at the number of water-mills and of wind-mills that he saw.\n\nAnd there rode up with him a tall auburn-haired man, in workman’s garb, and Peredur inquired of him who he was."

