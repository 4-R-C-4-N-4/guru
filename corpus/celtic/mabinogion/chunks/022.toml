body = "And we were thrown into a state of stupor, and while we were thus, the demon who owns this Castle slew all our husbands, and took from us our horses, and our raiment, and our gold, and our silver; and the corpses of our husbands are still in this house, and many others with them.\n\nAnd this, Chieftain, is the cause of our grief, and we are sorry that thou art come hither, lest harm should befall thee.” And Owain was grieved when he heard this.\n\nAnd he went forth from the Castle, and he beheld a knight approaching him, who saluted him in a friendly and cheerful manner, as if he had been a brother.\n\nAnd this was the savage black man.\n\n“In very sooth,” said Owain, “it is not to seek thy friendship that I am here.” “In sooth,” said he, “thou shalt not find it then.” And with that they charged each other, and fought furiously.\n\nAnd Owain overcame him, and bound his hands behind his back.\n\nThen the black savage besought Owain to spare his life, and spoke thus: “My lord Owain,” said he, “it was foretold that thou shouldst come hither and vanquish me, and thou hast done so.\n\nI was a robber here, and my house was a house of spoil; but grant me my life, and I will become the keeper of an Hospice, and I will maintain this house as an Hospice for weak and for strong, as long as I live, for the good of thy soul.” And Owain accepted this proposal of him, and remained there that night.\n\nAnd the next day he took the four-and-twenty ladies, and their horses, and their raiment, and what they possessed of goods and jewels, and proceeded with them to Arthur’s Court.\n\nAnd if Arthur was rejoiced when he saw him, after he had lost him the first time, his joy was now much greater.\n\nAnd of those ladies, such as wished to remain in Arthur’s Court remained there, and such as wished to depart departed.\n\nAnd thenceforward Owain dwelt at Arthur’s Court greatly beloved, as the head of his household, until he went away with his followers; and those were the army of three hundred ravens which Kenverchyn had left him.\n\nAnd wherever Owain went with these he was victorious.\n\nAnd this is the tale of"

