[content]
body = "And the penance that was imposed upon her was, that she should remain in that palace of Narberth until the end of seven years, and that she should sit every day near unto a horseblock that was without the gate.\n\nAnd that she should relate the story to all who should come there, whom she might suppose not to know it already; and that she should offer the guests and strangers, if they would permit her, to carry them upon her back into the palace.\n\nBut it rarely happened that any would permit.\n\nAnd thus did she spend part of the year.\n\nNow at that time Teirnyon Twryv Vliant was Lord of Gwent Is Coed, and he was the best man in the world.\n\nAnd unto his house there belonged a mare, than which neither mare nor horse in the kingdom was more beautiful.\n\nAnd on the night of every first of May she foaled, and no one ever knew what became of the colt.\n\nAnd one night Teirnyon talked with his wife: “Wife,” said he, “it is very simple of us that our mare should foal every year, and that we should have none of her colts.” “What can be done in the matter?” said she.\n\n“This is the night of the first of May,” said he.\n\n“The vengeance of Heaven be upon me, if I learn not what it is that takes away the colts.” So he caused the mare to be brought into a house, and he armed himself, and began to watch that night.\n\nAnd in the beginning of the night, the mare foaled a large and beautiful colt.\n\nAnd it was standing up in the place.\n\nAnd Teirnyon rose up and looked at the size of the colt, and as he did so he heard a great tumult, and after the tumult behold a claw came through the window into the house, and it seized the colt by the mane.\n\nThen Teirnyon drew his sword, and struck off the arm at the elbow, so that portion of the arm together with the colt was in the house with him.\n\nAnd then did he hear a tumult and wailing, both at once.\n\nAnd he opened the door, and rushed out in the direction of the noise, and he could not see the cause of the tumult because of the darkness of the night, but he rushed after it and followed it.\n\nThen he remembered that he had left the door open, and he returned.\n\nAnd at the door behold there was an infant boy in swaddling-clothes, wrapped around in a mantle of satin.\n\nAnd he took up the boy, and behold he was very strong for the age that he was of.\n\nThen he shut the door, and went into the chamber where his wife was.\n\n“Lady,” said he, “art thou sleeping?” “No, lord,” said she, “I was asleep, but as thou camest in I did awake.” “Behold, here is a boy for thee if thou wilt,” said he, “since thou hast never had one.” “My lord,” said she, “what adventure is this?” “It was thus,” said Teirnyon; and he told her how it all befell.\n\n“Verily, lord,” said she, “what sort of garments are there upon the boy?” “A mantle of satin,” said he.\n\n“He is then a boy of gentle lineage,” she replied.\n\n“My lord,” she said, “if thou wilt, I shall have great diversion and mirth.\n\nI will call my women unto me, and tell them that I have been pregnant.” “I will readily grant thee to do this,” he answered."

