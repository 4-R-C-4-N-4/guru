[content]
body = "And Peredur put on garments like those that Gwalchmai wore, and they went together unto Arthur, and saluted him.\n\n“Behold, lord,” said Gwalchmai, “him whom thou hast sought so long.” “Welcome unto thee, chieftain,” said Arthur.\n\n“With me thou shalt remain; and had I known thy valour had been such, thou shouldst not have left me as thou didst; nevertheless, this was predicted of thee by the dwarf and the dwarfess, whom Kai ill-treated and whom thou hast avenged.” And hereupon, behold there came the Queen and her handmaidens, and Peredur saluted them.\n\nAnd they were rejoiced to see him, and bade him welcome.\n\nAnd Arthur did him great honour and respect, and they returned towards Caerlleon.\n\nAnd the first night Peredur came to Caerlleon to Arthur’s Court, and as he walked in the city after his repast, behold, there met him Angharad Law Eurawc.\n\n“By my faith, sister,” said Peredur, “thou art a beauteous and lovely maiden; and, were it pleasing to thee, I could love thee above all women.” “I pledge my faith,” said she, “that I do not love thee, nor will I ever do so.” “I also pledge my faith,” said Peredur, “that I will never speak a word to any Christian again, until thou come to love me above all men.” The next day Peredur went forth by the high road, along a mountain-ridge, and he saw a valley of a circular form, the confines of which were rocky and wooded.\n\nAnd the flat part of the valley was in meadows, and there were fields betwixt the meadows and the wood.\n\nAnd in the bosom of the wood he saw large black houses of uncouth workmanship.\n\nAnd he dismounted, and led his horse towards the wood.\n\nAnd a little way within the wood he saw a rocky ledge, along which the road lay.\n\nAnd upon the ledge was a lion bound by a chain, and sleeping.\n\nAnd beneath the lion he saw a deep pit of immense size, full of the bones of men and animals.\n\nAnd Peredur drew his sword and struck the lion, so that he fell into the mouth of the pit and hung there by the chain; and with a second blow he struck the chain and broke it, and the lion fell into the pit; and Peredur led his horse over the rocky ledge, until he came into the valley.\n\nAnd in the centre of the valley he saw a fair castle, and he went towards it.\n\nAnd in the meadow by the castle he beheld a huge grey man sitting, who was larger than any man he had ever before seen.\n\nAnd two young pages were shooting the hilts of their daggers, of the bone of the sea-horse.\n\nAnd one of the pages had red hair, and the other auburn.\n\nAnd they went before him to the place where the grey man was, and Peredur saluted him.\n\nAnd the grey man said, “Disgrace to the beard of my porter.” Then Peredur understood that the porter was the lion.—And the grey man and the pages went together into the castle, and Peredur accompanied them; and he found it a fair and noble place.\n\nAnd they proceeded to the hall, and the tables were already laid, and upon them was abundance of food and liquor.\n\nAnd thereupon he saw an aged woman and a young woman come from the chamber; and they were the most stately women he had ever seen.\n\nThen they washed and went to meat, and the grey man sat in the upper seat at the head of the table, and the aged woman next to him."

