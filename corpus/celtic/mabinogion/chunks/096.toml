[content]
body = "Go, ask me of my father, and that which he shall require of thee, grant it, and thou wilt obtain me; but if thou deny him anything, thou wilt not obtain me, and it will be well for thee if thou escape with thy life.” “I promise all this, if occasion offer,” said he.\n\nShe returned to her chamber, and they all rose up and followed her to the castle.\n\nAnd they slew the nine porters that were at the nine gates in silence.\n\nAnd they slew the nine watch-dogs without one of them barking.\n\nAnd they went forward to the hall.\n\n“The greeting of Heaven and of man be unto thee, Yspaddaden Penkawr,” said they.\n\n“And you, wherefore come you?” “We come to ask thy daughter Olwen, for Kilhwch the son of Kilydd, the son of Prince Kelyddon.” “Where are my pages and my servants?\n\nRaise up the forks beneath my two eyebrows which have fallen over my eyes, that I may see the fashion of my son-in-law.” And they did so.\n\n“Come hither to-morrow, and you shall have an answer.” They rose to go forth, and Yspaddaden Penkawr seized one of the three poisoned darts that lay beside him, and threw it after them.\n\nAnd Bedwyr caught it, and flung it, and pierced Yspaddaden Penkawr grievously with it through the knee.\n\nThen he said, “A cursed ungentle son-in-law, truly.\n\nI shall ever walk the worse for his rudeness, and shall ever be without a cure.\n\nThis poisoned iron pains me like the bite of a gadfly.\n\nCursed be the smith who forged it, and the anvil whereon it was wrought!\n\nSo sharp is it!” That night also they took up their abode in the house of Custennin the herdsman.\n\nThe next day with the dawn they arrayed themselves in haste and proceeded to the castle, and entered the hall, and they said, “Yspaddaden Penkawr, give us thy daughter in consideration of her dower and her maiden fee, which we will pay to thee and to her two kinswomen likewise.\n\nAnd unless thou wilt do so, thou shalt meet with thy death on her account.” Then he said, “Her four great-grandmothers, and her four great-grandsires are yet alive, it is needful that I take counsel of them.” “Be it so,” answered they, “we will go to meat.” As they rose up, he took the second dart that was beside him, and cast it after them.\n\nAnd Menw the son of Gwaedd caught it, and flung it back at him, and wounded him in the centre of the breast, so that it came out at the small of his back.\n\n“A cursed ungentle son-in-law, truly,” said he, “the hard iron pains me like the bite of a horse-leech.\n\nCursed be the hearth whereon it was heated, and the smith who formed it!\n\nSo sharp is it!\n\nHenceforth, whenever I go up a hill, I shall have a scant in my breath, and a pain in my chest, and I shall often loathe my food.” And they went to meat.\n\nAnd the third day they returned to the palace.\n\nAnd Yspaddaden Penkawr said to them, “Shoot not at me again unless you desire death.\n\nWhere are my attendants?\n\nLift up the forks of my eyebrows which have fallen over my eyeballs, that I may see the fashion of my son-in-law.” Then they arose, and, as they did so, Yspaddaden Penkawr took the third poisoned dart and cast it at them."

