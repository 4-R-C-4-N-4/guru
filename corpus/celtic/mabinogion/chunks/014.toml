body = "As it is, I will banish thee.” “I am glad,” said Luned, “that thou hast no other cause to do so, than that I would have been of service to thee where thou didst not know what was to thine advantage.\n\nAnd henceforth evil betide whichever of us shall make the first advance towards reconciliation to the other; whether I should seek an invitation from thee, or thou of thine own accord shouldst send to invite me.” With that Luned went forth: and the Countess arose and followed her to the door of the chamber, and began coughing loudly.\n\nAnd when Luned looked back, the Countess beckoned to her; and she returned to the Countess.\n\n“In truth,” said the Countess, “evil is thy disposition; but if thou knowest what is to my advantage, declare it to me.” “I will do so,” quoth she.\n\n“Thou knowest that except by warfare and arms it is impossible for thee to preserve thy possessions; delay not, therefore, to seek some one who can defend them.” “And how can I do that?” said the Countess.\n\n“I will tell thee,” said Luned.\n\n“Unless thou canst defend the fountain, thou canst not maintain thy dominions; and no one can defend the fountain, except it be a knight of Arthur’s household; and I will go to Arthur’s Court, and ill betide me, if I return thence without a warrior who can guard the fountain as well as, or even better than, he who defended it formerly.” “That will be hard to perform,” said the Countess.\n\n“Go, however, and make proof of that which thou hast promised.” Luned set out, under the pretence of going to Arthur’s Court; but she went back to the chamber where she had left Owain; and she tarried there with him as long as it might have taken her to have travelled to the Court of King Arthur.\n\nAnd at the end of that time, she apparelled herself and went to visit the Countess.\n\nAnd the Countess was much rejoiced when she saw her, and inquired what news she brought from the Court.\n\n“I bring thee the best of news,” said Luned, “for I have compassed the object of my mission.\n\nWhen wilt thou, that I should present to thee the chieftain who has come with me hither?” “Bring him here to visit me to-morrow, at mid-day,” said the Countess, “and I will cause the town to be assembled by that time.” And Luned returned home.\n\nAnd the next day, at noon, Owain arrayed himself in a coat, and a surcoat, and a mantle of yellow satin, upon which was a broad band of gold lace; and on his feet were high shoes of variegated leather, which were fastened by golden clasps, in the form of lions.\n\nAnd they proceeded to the chamber of the Countess.\n\nRight glad was the Countess of their coming, and she gazed steadfastly upon Owain, and said, “Luned, this knight has not the look of a traveller.” “What harm is there in that, lady?” said Luned.\n\n“I am certain,” said the Countess, “that no other man than this chased the soul from the body of my lord.” “So much the better for thee, lady,” said Luned, “for had he not been stronger than thy lord he could not have deprived him of life."

