[content]
body = "And when they came near to the Earl’s army, they could see neither its extent nor its extremity.\n\nAnd Owain asked the pages in which troop the Earl was.\n\n“In yonder troop,” said they, “in which are four yellow standards.\n\nTwo of them are before, and two behind him.” “Now,” said Owain, “do you return and await me near the portal of the Castle.” So they returned, and Owain pressed forward until he met the Earl.\n\nAnd Owain drew him completely out of his saddle, and turned his horse’s head towards the Castle, and though it was with difficulty, he brought the Earl to the portal, where the pages awaited him.\n\nAnd in they came.\n\nAnd Owain presented the Earl as a gift to the Countess.\n\nAnd said to her, “Behold a requital to thee for thy blessed balsam.” The army encamped around the Castle.\n\nAnd the Earl restored to the Countess the two Earldoms he had taken from her, as a ransom for his life; and for his freedom he gave her the half of his own dominions, and all his gold, and his silver, and his jewels, besides hostages.\n\nAnd Owain took his departure.\n\nAnd the Countess and all her subjects besought him to remain, but Owain chose rather to wander through distant lands and deserts.\n\nAnd as he journeyed, he heard a loud yelling in a wood.\n\nAnd it was repeated a second and a third time.\n\nAnd Owain went towards the spot, and beheld a huge craggy mound, in the middle of the wood; on the side of which was a grey rock.\n\nAnd there was a cleft in the rock, and a serpent was within the cleft.\n\nAnd near the rock stood a black lion, and every time the lion sought to go thence, the serpent darted towards him to attack him.\n\nAnd Owain unsheathed his sword, and drew near to the rock; and as the serpent sprang out, he struck him with his sword, and cut him in two.\n\nAnd he dried his sword, and went on his way, as before.\n\nBut behold the lion followed him, and played about him, as though it had been a greyhound that he had reared.\n\nThey proceeded thus throughout the day, until the evening.\n\nAnd when it was time for Owain to take his rest, he dismounted, and turned his horse loose in a flat and wooded meadow.\n\nAnd he struck fire, and when the fire was kindled, the lion brought him fuel enough to last for three nights.\n\nAnd the lion disappeared.\n\nAnd presently the lion returned, bearing a fine large roebuck.\n\nAnd he threw it down before Owain, who went towards the fire with it.\n\nAnd Owain took the roebuck, and skinned it, and placed collops of its flesh upon skewers, around the fire.\n\nThe rest of the buck he gave to the lion to devour.\n\nWhile he was doing this, he heard a deep sigh near him, and a second, and a third.\n\nAnd Owain called out to know whether the sigh he heard proceeded from a mortal; and he received answer that it did.\n\n“Who art thou?” said Owain.\n\n“Truly,” said the voice, “I am Luned, the handmaiden of the Countess of the Fountain.” “And what dost thou here?” said Owain.\n\n“I am imprisoned,” said she, “on account of the knight who came from Arthur’s Court, and married the Countess.\n\nAnd he stayed a short time with her, but he afterwards departed for the Court of Arthur, and has not returned since.\n\nAnd he was the friend I loved best in the world.\n\nAnd two of the pages in the Countess’s chamber traduced him, and called him a deceiver."

