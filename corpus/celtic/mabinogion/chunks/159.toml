[content]
body = "Thou mayest exchange them for that which is better.\n\nAnd I will give these twelve horses, all caparisoned as they are, with their saddles and their bridles, and these twelve greyhounds, with their collars and their leashes as thou seest, and the twelve gilded shields that thou beholdest yonder.” Now these he had formed of fungus.\n\n“Well,” said he, “we will take counsel.” And they consulted together, and determined to give the swine to Gwydion, and to take his horses and his dogs and his shields.\n\nThen Gwydion and his men took their leave, and began to journey forth with the pigs.\n\n“Ah, my comrades,” said Gwydion, “it is needful that we journey with speed.\n\nThe illusion will not last but from the one hour to the same to-morrow.” And that night they journeyed as far as the upper part of Ceredigiawn, to the place which, from that cause, is called Mochdrev still.\n\nAnd the next day they took their course through Melenydd, and came that night to the town which is likewise for that reason called Mochdrev between Keri and Arwystli.\n\nAnd thence they journeyed forward; and that night they came as far as that Commot in Powys, which also upon account thereof is called Mochnant, and there tarried they that night.\n\nAnd they journeyed thence to the Cantrev of Rhos, and the place where they were that night is still called Mochdrev.\n\n“My men,” said Gwydion, “we must push forward to the fastnesses of Gwynedd with these animals, for there is a gathering of hosts in pursuit of us.” So they journeyed on to the highest town of Arllechwedd, and there they made a sty for the swine, and therefore was the name of Creuwyryon given to that town.\n\nAnd after they had made the sty for the swine, they proceeded to Math the son of Mathonwy, at Caer Dathyl.\n\nAnd when they came there, the country was rising.\n\n“What news is there here?” asked Gwydion.\n\n“Pryderi is assembling one-and-twenty Cantrevs to pursue after you,” answered they.\n\n“It is marvellous that you should have journeyed so slowly.” “Where are the animals whereof you went in quest?” said Math.\n\n“They have had a sty made for them in the other Cantrev below,” said Gwydion.\n\nThereupon, lo, they heard the trumpets and the host in the land, and they arrayed themselves and set forward and came to Penardd in Arvon.\n\nAnd at night Gwydion the son of Don, and Gilvaethwy his brother, returned to Caer Dathyl; and Gilvaethwy took Math the son of Mathonwy’s couch.\n\nAnd while he turned out the other damsels from the room discourteously, he made Goewin unwillingly remain.\n\nAnd when they saw the day on the morrow, they went back unto the place where Math the son of Mathonwy was with his host; and when they came there, the warriors were taking counsel in what district they should await the coming of Pryderi, and the men of the South.\n\nSo they went in to the council.\n\nAnd it was resolved to wait in the strongholds of Gwynedd, in Arvon.\n\nSo within the two Maenors they took their stand, Maenor Penardd and Maenor Coed Alun.\n\nAnd there Pryderi attacked them, and there the combat took place.\n\nAnd great was the slaughter on both sides; but the men of the South were forced to flee."

