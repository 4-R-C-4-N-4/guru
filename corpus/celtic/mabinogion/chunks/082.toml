[content]
body = "And Geraint called for his horse and his armour, and he accoutred both himself and his horse.\n\nAnd all the hosts went forth until they came to the side of the hedge, and the hedge was so lofty, that it reached as high as they could see in the air, and upon every stake in the hedge, except two, there was the head of a man, and the number of stakes throughout the hedge was very great.\n\nThen said the Little King, “May no one go in with the chieftain?” “No one may,” said Earl Owain.\n\n“Which way can I enter?” inquired Geraint.\n\n“I know not,” said Owain, “but enter by the way that thou wilt, and that seemeth easiest to thee.” Then fearlessly and unhesitatingly Geraint dashed forward into the mist.\n\nAnd on leaving the mist, he came to a large orchard; and in the orchard he saw an open space, wherein was a tent of red satin; and the door of the tent was open, and an apple-tree stood in front of the door of the tent; and on a branch of the apple-tree hung a huge hunting-horn.\n\nThen he dismounted, and went into the tent; and there was no one in the tent save one maiden sitting in a golden chair, and another chair was opposite to her, empty.\n\nAnd Geraint went to the empty chair, and sat down therein.\n\n“Ah!\n\nchieftain,” said the maiden, “I would not counsel thee to sit in that chair.” “Wherefore?” said Geraint.\n\n“The man to whom that chair belongs has never suffered another to sit in it.” “I care not,” said Geraint, “though it displease him that I sit in the chair.” And thereupon they heard a mighty tumult around the tent.\n\nAnd Geraint looked to see what was the cause of the tumult.\n\nAnd he beheld without a knight mounted upon a warhorse, proudly snorting, high-mettled, and large of bone; and a robe of honour in two parts was upon him and upon his horse, and beneath it was plenty of armour.\n\n“Tell me, chieftain,” said he to Geraint, “who it was that bade thee sit there?” “Myself,” answered he.\n\n“It was wrong of thee to do me this shame and disgrace.\n\nArise, and do me satisfaction for thine insolence.” Then Geraint arose; and they encountered immediately; and they broke a set of lances, and a second set, and a third; and they gave each other fierce and frequent strokes; and at last Geraint became enraged, and he urged on his horse, and rushed upon him, and gave him a thrust on the centre of his shield, so that it was split, and so that the head of his lance went through his armour, and his girths were broken, and he himself was borne headlong to the ground the length of Geraint’s lance and arm, over his horse’s crupper.\n\n“Oh, my Lord!” said he, “thy mercy, and thou shalt have what thou wilt.” “I only desire,” said Geraint, “that this game shall no longer exist here, nor the hedge of mist, nor magic, nor enchantment.” “Thou shalt have this gladly, Lord,” he replied.\n\n“Cause, then, the mist to disappear from this place,” said Geraint.\n\n“Sound yonder horn,” said he, “and when thou soundest it, the mist will vanish; but it will not go hence unless the horn be blown by the knight by whom I am vanquished.” And sad and sorrowful was Enid where she remained, through anxiety concerning Geraint.\n\nThen Geraint went and sounded the horn.\n\nAnd at the first blast he gave, the mist vanished."

