body = "And he saw the track of the horse, and he said to the maiden, “Tell me who has been here since I departed.” “A man,” said she, “of wonderful demeanour.” And she described to him what Peredur’s appearance and conduct had been.\n\n“Tell me,” said he, “did he offer thee any wrong?” “No,” answered the maiden, “by my faith, he harmed me not.” “By my faith, I do not believe thee; and until I can meet with him, and revenge the insult he has done me, and wreak my vengeance upon him, thou shalt not remain two nights in the same house.” And the knight arose, and set forth to seek Peredur.\n\nMeanwhile Peredur journeyed on towards Arthur’s Court.\n\nAnd before he reached it, another knight had been there, who gave a ring of thick gold at the door of the gate for holding his horse, and went into the Hall where Arthur and his household, and Gwenhwyvar and her maidens, were assembled.\n\nAnd the page of the chamber was serving Gwenhwyvar with a golden goblet.\n\nThen the knight dashed the liquor that was therein upon her face, and upon her stomacher, and gave her a violent blow on the face, and said, “If any have the boldness to dispute this goblet with me, and to revenge the insult to Gwenhwyvar, let him follow me to the meadow, and there I will await him.” So the knight took his horse, and rode to the meadow.\n\nAnd all the household hung down their heads, lest any of them should be requested to go and avenge the insult to Gwenhwyvar.\n\nFor it seemed to them, that no one would have ventured on so daring an outrage, unless he possessed such powers, through magic or charms, that none could be able to take vengeance upon him.\n\nThen, behold, Peredur entered the Hall, upon the bony piebald horse, with the uncouth trappings upon it; and in this way he traversed the whole length of the Hall.\n\nIn the centre of the Hall stood Kai.\n\n“Tell me, tall man,” said Peredur, “is that Arthur yonder?” “What wouldest thou with Arthur?” asked Kai.\n\n“My mother told me to go to Arthur, and receive the honour of knighthood.” “By my faith,” said he, “thou art all too meanly equipped with horse and with arms.” Thereupon he was perceived by all the household, and they threw sticks at him.\n\nThen, behold, a dwarf came forward.\n\nHe had already been a year at Arthur’s Court, both he and a female dwarf.\n\nThey had craved harbourage of Arthur, and had obtained it; and during the whole year, neither of them had spoken a single word to any one.\n\nWhen the dwarf beheld Peredur, “Haha!” said he, “the welcome of Heaven be unto thee, goodly Peredur, son of Evrawc, the chief of warriors, and flower of knighthood.” “Truly,” said Kai, “thou art ill-taught to remain a year mute at Arthur’s Court, with choice of society; and now, before the face of Arthur and all his household, to call out, and declare such a man as this the chief of warriors, and the flower of knighthood.” And he gave him such a box on the ear that he fell senseless to the ground.\n\nThen exclaimed the female dwarf, “Haha!"

