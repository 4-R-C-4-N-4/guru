[content]
body = "Knowest how one shall write, | knowest how one shall rede?\n\nKnowest how one shall tint, | knowest how one makes trial?\n\nKnowest how one shall ask, | knowest how one shall offer?\n\nKnowest how one shall send, | knowest how one shall sacrifice?\n\n[144.\n\nDain and Dvalin : dwarfs; cf.\n\nVoluspo , 14, and note.\n\nDain, however, may here be one of the elves rather than the dwarf of.\n\nthat name.\n\nThe two names also appear together in Grimnismol , 33, where they are applied to two of the four harts that nibble at the topmost twigs of Yggdrasil.\n\nAlsvith (\"the All Wise\") appears nowhere else as a giant's name.\n\nMyself : Othin.\n\nWe have no further information concerning the list of those who wrote the runes for the various races, and these four lines seem like a confusion of names in the rather hazy mind of some reciter.\n\n145.\n\nThis Malahattr stanza appears to be a regular religious formula, concerned less with the runes which one \"writes\" and \"tints\" (cf.\n\nstanza 79) than with the prayers which one \"asks\" and the sacrifices which one \"offers\" and \"sends.\" Its origin is wholly uncertain, but it is clearly an interpolation here.\n\nIn the manuscript the phrase \"knowest?\" is abbreviated after the first line.] p.\n\n63 146.\n\nBetter no prayer | than too big an offering, By thy getting measure thy gift; Better is none | than too big a sacrifice, .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nSo Thund of old wrote | ere man's race began, Where he rose on high | when home he came.\n\n* * * 147.\n\nThe songs I know | that king's wives know not, Nor men that are sons of men; The first is called help, | and help it can bring thee In sorrow and pain and sickness.\n\n148.\n\nA second I know, | that men shall need Who leechcraft long to use; .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n[146.\n\nThis stanza as translated here follows the manuscript reading, except in assuming a gap between lines 3 and 5.\n\nIn Vigfusson and Powell's Corpus Poeticum Boreale the first three lines have somehow been expanded into eight.\n\nThe last two lines are almost certainly misplaced; Bugge suggests that they belong at the end of stanza 144.\n\nThund : another name for Othin.\n\nWhen home he came : presumably after obtaining the runes as described in stanzas 139 and 140.\n\n147.\n\nWith this stanza begins the Ljothatal , or list of charms.\n\nThe magic songs themselves are not given, but in each case the peculiar application of the charm is explained.\n\nThe passage, which is certainly approximately complete as far as it goes, runs to the end of the poem.\n\nIn the manuscript and in most editions line 4 falls into two half-lines, running: \"In sickness and pain | and every sorrow.\" ] p.\n\n64 149.\n\nA third I know, | if great is my need Of fetters to hold my foe; Blunt do I make | mine enemy's blade, Nor bites his sword or staff.\n\n150.\n\nA fourth I know, | if men shall fasten Bonds on my bended legs; So great is the charm | that forth I may go, The fetters spring from my feet, Broken the bonds from my hands.\n\n152.\n\nA fifth I know, | if I see from afar An arrow fly 'gainst the folk; It flies not so swift | that I stop it not, If ever my eyes behold it.\n\n152."

