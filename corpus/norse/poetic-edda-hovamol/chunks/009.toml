[content]
body = "50 Foul scorn was my meed | from the crafty maid, And nought from the woman I won.\n\n* * * 103.\n\nThough glad at home, | and merry with guests, A man shall be wary and wise; The sage and shrewd, | wide wisdom seeking, Must see that his speech be fair; A fool is he named | who nought can say, For such is the way of the witless.\n\n104.\n\nI found the old giant, | now back have I fared, Small gain from silence I got; Full many a word, | my will to get, I spoke in Suttung's hall.\n\n105.\n\nThe mouth of Rati | made room for my passage, And space in the stone he gnawed; [103.\n\nWith this stanza the subject changes abruptly, and apparently the virtues of fair speech, mentioned in the last three lines, account for the introduction, from what source cannot be known, of the story of Othin and the mead of song (stanzas 104-110).\n\n104.\n\nThe giant Suttung (\"the old giant\") possessed the magic mead, a draught of which conferred the gift of poetry.\n\nOthin, desiring to obtain it, changed himself into a snake, bored his way through a mountain into Suttung's home, made love to the giant's daughter, Gunnloth, and by her connivance drank up all the mead.\n\nThen he flew away in the form of an eagle, leaving Gunnloth to her fate.\n\nWhile with Suttung he assumed the name of Bolverk (\"the Evil-Doer\").\n\n105.\n\nRati (\"the Traveller\"): the gimlet with which Othin bored through the mountain to reach Suttung's home.] p.\n\n51 Above and below | the giants' paths lay, So rashly I risked my head.\n\n106.\n\nGunnloth gave | on a golden stool A drink of the marvelous mead; A harsh reward | did I let her have For her heroic heart, And her spirit troubled sore.\n\n107.\n\nThe well-earned beauty | well I enjoyed, Little the wise man lacks; So Othrörir now | has up been brought To the midst of the men of earth.\n\n108.\n\nHardly, methinks, | would I home have come, And left the giants' land, Had not Gunnloth helped me, | the maiden good, Whose arms about me had been.\n\n109.\n\nThe day that followed, | the frost-giants came, Some word of Hor to win, (And into the hall of Hor;) [106.\n\nProbably either the fourth or the fifth line is a spurious addition.\n\n107.\n\nOthrörir : here the name of the magic mead itself, whereas in stanza 141 it is the name of the vessel containing it.\n\nOthin had no intention of bestowing any of the precious mead upon men, but as he was flying over the earth, hotly pursued by Suttung, he spilled some of it out of his mouth, and in this way mankind also won the gift of poetry.\n\n108.\n\nHor : Othin (\"the High One\").\n\nThe frost-giants, Suttung's kinsmen, appear not to have suspected Othin of being [fp.\n\n52] identical with Bolverk, possibly because the oath referred to in stanza I to was an oath made by Othin to Suttung that there was no such person as Bolverk among the gods.\n\nThe giants, of course, fail to get from Othin the information they seek concerning Bolverk, but Othin is keenly conscious of having violated the most sacred of oaths, that sworn on his ring.] p.\n\n52 Of Bolverk they asked, | were he back midst the gods, Or had Suttung slain him there?\n\n110."

