[content]
body = "I saw a man | who was wounded sore By an evil woman's word; A lying tongue | his death-blow launched, And no word of truth there was.\n\n119.\n\nI rede thee, Loddfafnir!\n\n| and hear thou my rede,-- Profit thou hast if thou hearest, Great thy gain if thou learnest: If a friend thou hast | whom thou fully wilt trust, Then fare to find him oft; For brambles grow | and waving grass On the rarely trodden road.\n\np.\n\n55 120.\n\nI rede thee, Loddfafnir!\n\n| and hear thou my rede,-- Profit thou hast if thou hearest, Great thy gain if thou learnest: A good man find | to hold in friendship, And give heed to his healing charms.\n\n121.\n\nI rede thee, Loddfafnir!\n\n| and hear thou my rede,- Profit thou hast if thou hearest, Great thy gain if thou learnest: Be never the first | to break with thy friend The bond that holds you both; Care eats the heart | if thou canst not speak To another all thy thought.\n\n122.\n\nI rede thee, Loddfafnir!\n\n| and hear thou my rede,-- Profit thou hast if thou hearest, Great thy gain if thou learnest: Exchange of words | with a witless ape Thou must not ever make.\n\n123.\n\nFor never thou mayst | from an evil man A good requital get; But a good man oft | the greatest love Through words of praise will win thee.\n\n124.\n\nMingled is love | when a man can speak To another all his thought; p.\n\n56 Nought is so bad | as false to be, No friend speaks only fair.\n\n125.\n\nI rede thee, Loddfafnir!\n\n| and hear thou my rede,-- Profit thou hast if thou hearest, Great thy gain if thou learnest: With a worse man speak not | three words in dispute, Ill fares the better oft When the worse man wields a sword.\n\n126.\n\nI rede thee, Loddfafnir!\n\n| and hear thou my rede,- Profit thou hast if thou hearest, Great thy gain if thou learnest: A shoemaker be, | or a maker of shafts, For only thy single self; If the shoe is ill made, | or the shaft prove false, Then evil of thee men think.\n\n127.\n\nI rede thee, Loddfafnir!\n\n| and hear thou my rede,-- Profit thou hast if thou hearest, Great thy gain if thou learnest: If evil thou knowest, | as evil proclaim it, And make no friendship with foes.\n\n128.\n\nI rede thee, Loddfafnir!\n\n| and hear thou my rede,-- Profit thou hast if thou hearest, p.\n\n57 Great thy gain if thou learnest: In evil never | joy shalt thou know, But glad the good shall make thee.\n\n129.\n\nI rede thee, Loddfafnir!\n\n| and hear thou my rede,-- Profit thou hast if thou hearest, Great thy gain if thou learnest: Look not up | when the battle is on,-- (Like madmen the sons | of men become,--) Lest men bewitch thy wits.\n\n130.\n\nI rede thee, Loddfafnir!\n\n| and hear thou my rede,- Profit thou hast if thou hearest, Great thy gain if thou learnest: If thou fain wouldst win | a woman's love, And gladness get from her, Fair be thy promise | and well fulfilled; None loathes what good he gets.\n\n131.\n\nI rede thee, Loddfafnir!"

