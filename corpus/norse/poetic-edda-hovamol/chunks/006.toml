[content]
body = "Fire for men | is the fairest gift, And power to see the sun; Health as well, | if a man may have it, And a life not stained with sin.\n\n69.\n\nAll wretched is no man, | though never so sick; Some from their sons have joy, Some win it from kinsmen, | and some from their wealth, And some from worthy works.\n\n70.\n\nIt is better to live | than to lie a corpse, The live man catches the cow; I saw flames rise | for the rich man's pyre, And before his door he lay dead.\n\n71.\n\nThe lame rides a horse, | the handless is herdsman, The deaf in battle is bold; The blind man is better | than one that is burned, No good can come of a corpse.\n\n[70.\n\nThe manuscript has \"and a worthy life\" in place of \"than to lie a corpse\" in line I, but Rask suggested the emendation as early as 1818, and most editors have followed him.] p.\n\n43 72.\n\nA son is better, | though late he be born, And his father to death have fared; Memory-stones | seldom stand by the road Save when kinsman honors his kin.\n\n73.\n\nTwo make a battle, | the tongue slays the head; In each furry coat | a fist I look for.\n\n74.\n\nHe welcomes the night | whose fare is enough, (Short are the yards of a ship,) Uneasy are autumn nights; Full oft does the weather | change in a week, And more in a month's time.\n\n75.\n\nA man knows not, | if nothing he knows, That gold oft apes begets; One man is wealthy | and one is poor, Yet scorn for him none should know.\n\n76.\n\nAmong Fitjung's sons | saw I well-stocked folds,-- Now bear they the beggar's staff; [73-74.\n\nThese seven lines are obviously a jumble.\n\nThe two lines of stanza 73 not only appear out of place, but the verse form is unlike that of the surrounding stanzas.\n\nIn 74, the second line is clearly interpolated, and line I has little enough connection with lines 3, 4 and 5.\n\nIt looks as though some compiler (or copyist) had inserted here various odds and ends for which he could find no better place.\n\n75.\n\nThe word \"gold\" in line 2 is more or less conjectural, the manuscript being obscure.\n\nThe reading in line 4 is also doubtful.] p.\n\n44 Wealth is as swift | as a winking eye, Of friends the falsest it is.\n\n77.\n\nCattle die, | and kinsmen die, And so one dies one's self; But a noble name | will never die, If good renown one gets.\n\n78.\n\nCattle die, | and kinsmen die, And so one dies one's self; One thing now | that never dies, The fame of a dead man's deeds.\n\n79.\n\nCertain is that | which is sought from runes, That the gods so great have made, And the Master-Poet painted; .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nof the race of gods: Silence is safest and best.\n\n80.\n\nAn unwise man, | if a maiden's love Or wealth he chances to win, [76.\n\nin the manuscript this stanza follows 79, the order being: 77, 78, 76, 80, 79, 81.\n\nFitjung (\"the Nourisher\"): Earth.\n\n79.\n\nThis stanza is certainly in bad shape, and probably out of place here.\n\nIts reference to runes as magic signs suggests that it properly belongs in some list of charms like the Ljothatal (stanzas 147-165)."

