[content]
body = "I ween that I hung | on the windy tree, Hung there for nights full nine; With the spear I was wounded, | and offered I was To Othin, myself to myself, On the tree that none | may ever know What root beneath it runs.\n\n[138.\n\nIn the manuscript this stanza comes at the end of the entire poem, following stanza 165.\n\nMost recent editors have followed Müllenhoff in shifting it to this position, as it appears to conclude the passage introduced by the somewhat similar stanza 111.\n\n139.\n\nWith this stanza begins the most confusing part of the Hovamol : the group of eight stanzas leading up to the Ljothatal, or list of charms.\n\nCertain paper manuscripts have before this stanza a title: \"Othin's Tale of the Runes.\" Apparently stanzas 139, 140 and 142 are fragments of an account of how Othin obtained the runes; 141 is erroneously inserted from some version of the magic mead story (cf.\n\nstanzas 104-110); and stanzas 143, 144, 145, and 146 are from miscellaneous sources, all, however, dealing with the general subject of runes.\n\nWith stanza 147 a clearly continuous passage begins once more.\n\nThe windy tree : the ash Yggdrasil (literally \"the Horse of Othin,\" so called be cause of this story), on which Othin, in order to win the magic runes, hanged himself as an offering to himself, and wounded himself with his own spear.\n\nLines 5 and 6 have presumably been borrowed from Svipdagsmol , 30.] p.\n\n61 140.\n\nNone made me happy | with loaf or horn, And there below I looked; I took up the runes, | shrieking I took them, And forthwith back I fell.\n\n141.\n\nNine mighty songs | I got from the son Of Bolthorn, Bestla's father; And a drink I got | of the goodly mead Poured out from Othrörir.\n\n142.\n\nThen began I to thrive, | and wisdom to get, I grew and well I was; Each word led me on | to another word, Each deed to another deed.\n\n143.\n\nRunes shalt thou find, | and fateful signs, That the king of singers colored, And the mighty gods have made; [141.\n\nThis stanza, interrupting as it does the account of Othin's winning the runes, appears to be an interpolation.\n\nThe meaning of the stanza is most obscure.\n\nBolthorn was Othin's grandfather, and Bestla his mother.\n\nWe do not know the name of the uncle here mentioned, but it has been suggested that this son of Bolthorn was Mimir (cf.\n\nVoluspo , 27 and note, and 47 and note).\n\nIn any case, the nine magic songs which he learned from his uncle seem to have enabled him to win the magic mead (cf.\n\nstanzas 104-110).\n\nConcerning Othrörir , here used as the name of the vessel containing the mead, cf.\n\nstanza 107 and note.\n\n143.\n\nThis and the following stanza belong together, and in many editions appear as a single stanza.\n\nThey presumably come from some lost poem on the authorship of the runes.\n\nLines 2 and 3 follow line 4 in the manuscript; the transposition was suggested by Bugge.\n\nThe king of singers : Othin.\n\nThe magic signs (runes) were commonly carved in wood, then colored red.] p.\n\n62 Full strong the signs, | full mighty the signs That the ruler of gods doth write.\n\n144.\n\nOthin for the gods, | Dain for the elves, And Dvalin for the dwarfs, Alsvith for giants | and all mankind, And some myself I wrote.\n\n145."

