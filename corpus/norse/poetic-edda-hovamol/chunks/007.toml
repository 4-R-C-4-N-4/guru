[content]
body = "The stanza-form is so irregular as to show either that something has been lost or that there have been interpolations.\n\nThe manuscript indicates no lacuna; Gering fills out the assumed gap as follows: \"Certain is that which is sought from runes, The runes--,\" etc.\n\n] p.\n\n45 His pride will wax, but his wisdom never, Straight forward he fares in conceit.\n\n* * * 81.\n\nGive praise to the day at evening, | to a woman on her pyre, To a weapon which is tried, | to a maid at wed lock, To ice when it is crossed, | to ale that is drunk.\n\n82.\n\nWhen the gale blows hew wood, | in fair winds seek the water; Sport with maidens at dusk, | for day's eyes are many; From the ship seek swiftness, | from the shield protection, Cuts from the sword, | from the maiden kisses.\n\n83.\n\nBy the fire drink ale, | over ice go on skates; Buy a steed that is lean, | and a sword when tarnished, [81.\n\nWith this stanza the verse-form, as indicated in the translation, abruptly changes to Malahattr.\n\nWhat has happened seems to have been something like this.\n\nStanza 80 introduces the idea of man's love for woman.\n\nConsequently some reciter or compiler (or possibly even a copyist) took occasion to insert at this point certain stanzas concerning the ways of women.\n\nThus stanza 80 would account for the introduction of stanzas 81 and 82, which, in turn, apparently drew stanza 83 in with them.\n\nStanza 84 suggests the fickleness of women, and is immediately followed--again with a change of verse-form--by a list of things equally untrustworthy (stanzas 85-90).\n\nThen, after a few more stanzas on love in the regular measure of the Hovamol (stanza 91-9s), is introduced, by way of illustration, Othin's story of his [fp.\n\n46] adventure with Billing's daughter (stanzas 96-102).\n\nSome such process of growth, whatever its specific stages may have been, must be assumed to account for the curious chaos of the whole passage from stanza 81 to stanza 102.] p.\n\n46 The horse at home fatten, | the hound in thy dwelling.\n\n* * * 84.\n\nA man shall trust not | the oath of a maid, Nor the word a woman speaks; For their hearts on a whirling | wheel were fashioned, And fickle their breasts were formed.\n\n85.\n\nIn a breaking bow | or a burning flame, A ravening wolf | or a croaking raven, In a grunting boar, | a tree with roots broken, In billowy seas | or a bubbling kettle, 86.\n\nIn a flying arrow | or falling waters, In ice new formed | or the serpent's folds, In a bride's bed-speech | or a broken sword, In the sport of bears | or in sons of kings, 87.\n\nIn a calf that is sick | or a stubborn thrall, A flattering witch | or a foe new slain.\n\n[84.\n\nLines 3 and 4 are quoted in the Fostbræthrasaga .\n\n85.\n\nStanzas 85-88 and go are in Fornyrthislag, and clearly come from a different source from the rest of the Hovamol .\n\n87.\n\nThe stanza is doubtless incomplete.\n\nSome editors add from a late paper manuscript two lines running: \"In a light, clear sky | or a laughing throng, In the bowl of a dog | or a harlot's grief!\" ] p.\n\n47 88."

