[content]
body = "On his ring swore Othin | the oath, methinks; Who now his troth shall trust?\n\nSuttung's betrayal | he sought with drink, And Gunnloth to grief he left.\n\n* * * 111.\n\nIt is time to chant | from the chanter's stool; By the wells of Urth I was, I saw and was silent, | I saw and thought, And heard the speech of Hor.\n\n(Of runes heard I words, | nor were counsels wanting, At the hall of Hor, In the hall of Hor; Such was the speech I heard.) [111.\n\nWith this stanza begins the Loddfafnismol (stanzas 111-138).\n\nLoddfafnir is apparently a wandering singer, who, from his \"chanter's stool,\" recites the verses which he claims to have received from Othin.\n\nWells of Urth : cf.\n\nVoluspo , 19 and note.\n\nUrth (\"the Past\") is one of the three Norns.\n\nThis stanza is apparently in corrupt form, and editors have tried many experiments with it, both in rejecting lines as spurious and in rear ranging the words and punctuation.\n\nIt looks rather as though the first four lines formed a complete stanza, and the last four had crept in later.\n\nThe phrase translated \"the speech of Hor\" is \"Hova mol,\" later used as the title for the entire poem.] p.\n\n53 112.\n\nI rede thee, Loddfafnir!\n\n| and hear thou my rede,--- Profit thou hast if thou hearest, Great thy gain if thou learnest: Rise not at night, | save if news thou seekest, Or fain to the outhouse wouldst fare.\n\n113.\n\nI rede thee, Loddfafnir!\n\n| and hear thou my rede,-- Profit thou hast if thou hearest, Great thy gain if thou learnest: Beware of sleep | on a witch's bosom, Nor let her limbs ensnare thee.\n\n114.\n\nSuch is her might | that thou hast no mind For the council or meeting of men; Meat thou hatest, | joy thou hast not, And sadly to slumber thou farest.\n\n115.\n\nI rede thee, Loddfafnir!\n\n| and hear thou my rede,-- Profit thou hast if thou hearest, Great thy gain if thou learnest: [112.\n\nLines 1-3 are the formula, repeated (abbreviated in the manuscript) in most of the stanzas, with which Othin prefaces his counsels to Loddfafnir, and throughout this section, except in stanzas 111 and 138, Loddfafnir represents himself as simply quoting Othin's words.\n\nThe material is closely analogous to that contained in the first eighty stanzas of the poem.\n\nIn some cases (e.\n\ng., stanzas 117, 119, 121, 126 and 130) the formula precedes a full four-line stanza instead of two (or three) lines.] p.\n\n54 Seek never to win | the wife of another, Or long for her secret love.\n\n116.\n\nI rede thee, Loddfafnir!\n\n| and hear thou my rede,-- Profit thou hast if thou hearest, Great thy gain if thou learnest: If o'er mountains or gulfs | thou fain wouldst go, Look well to thy food for the way.\n\n117.\n\nI rede thee, Loddfafnir!\n\n| and hear thou my rede,-- Profit thou hast if thou hearest, Great thy gain if thou learnest: An evil man | thou must not let Bring aught of ill to thee; For an evil man | will never make Reward for a worthy thought.\n\n118."

