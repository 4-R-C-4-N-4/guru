[content]
body = "Here the Volva turns from her memories of the past to a statement of some of Othin's own secrets in his eternal search for knowledge (stanzas 27-29).\n\nBugge puts this stanza after stanza 29.\n\nThe horn of Heimdall : the Gjallarhorn (\"Shrieking Horn\"), with which Heimdall, watchman of the gods, will summon them to the last battle.\n\nTill that time the horn is buried under Yggdrasil.\n\nValfather's pledge : Othin's eye (the sun?), which he gave to the water-spirit Mimir (or Mim) in exchange for the latter's wisdom.\n\nIt appears here and in stanza 29 as a drinking-vessel, from which Mimir drinks the magic mead, and from which he pours water on the ash Yggdrasil.\n\nOthin's sacrifice of his eye in order to gain knowledge of his final doom is one of the series of disasters leading up to the destruction of the gods.\n\nThere were several differing versions of the story of Othin's relations with Mimir; another one, quite incompatible with this, appears in stanza 47.\n\nIn the manuscripts I know and I see appear as \"she knows\" and \"she sees\" (cf.\n\nnote on 21).] p.\n\n13 28.\n\nAlone I sat | when the Old One sought me, The terror of gods, | and gazed in mine eyes: \"What hast thou to ask?\n\n| why comest thou hither?\n\nOthin, I know | where thine eye is hidden.\" 29.\n\nI know where Othin's | eye is hidden, Deep in the wide-famed | well of Mimir; Mead from the pledge | of Othin each mom Does Mimir drink: | would you know yet more?\n\n30.\n\nNecklaces had I | and rings from Heerfather, Wise was my speech | and my magic wisdom; .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nWidely I saw | over all the worlds.\n\n[28.\n\nThe Hauksbok version omits all of stanzas 28-34, stanza 27 being there followed by stanzas 40 and 41.\n\nRegius indicates stanzas 28 and 29 as a single stanza.\n\nBugge puts stanza 28 after stanza 22, as the second stanza of his reconstructed poem.\n\nThe Volva here addresses Othin directly, intimating that, although he has not told her, she knows why he has come to her, and what he has already suffered in his search for knowledge regarding his doom.\n\nHer reiterated \"would you know yet more?\" seems to mean: \"I have proved my wisdom by telling of the past and of your own secrets; is it your will that I tell likewise of the fate in store for you?\" The Old One : Othin.\n\n29.\n\nThe first line, not in either manuscript, is a conjectural emendation based on Snorri's paraphrase.\n\nBugge puts this stanza after stanza 20.\n\n30.\n\nThis is apparently the transitional stanza, in which the Volva, rewarded by Othin for her knowledge of the past (stanzas 1-29), is induced to proceed with her real prophecy (stanzas 31-66).\n\nSome editors turn the stanza into the third person, making it a narrative link.\n\nBugge, on the other hand, puts it [fp.\n\n14] after stanza 28 as the third stanza of the poem.\n\nNo lacuna is indicated in the manuscripts, and editors have attempted various emendations.\n\nHeerfather (\"Father of the Host\"): Othin.] p.\n\n14 31."

