[content]
body = "On all sides saw I | Valkyries assemble, Ready to ride | to the ranks of the gods; Skuld bore the shield, | and Skogul rode next, Guth, Hild, Gondul, | and Geirskogul.\n\nOf Herjan's maidens | the list have ye heard, Valkyries ready | to ride o'er the earth.\n\n32.\n\nI saw for Baldr, | the bleeding god, The son of Othin, | his destiny set: [31.\n\nValkyries : these \"Choosers of the Slain\" (cf.\n\nstanza I, note) bring the bravest warriors killed in battle to Valhall, in order to re-enforce the gods for their final struggle.\n\nThey are also called \"Wish-Maidens,\" as the fulfillers of Othin's wishes.\n\nThe conception of the supernatural warrior-maiden was presumably brought to Scandinavia in very early times from the South-Germanic races, and later it was interwoven with the likewise South-Germanic tradition of the swan-maiden.\n\nA third complication developed when the originally quite human women of the hero-legends were endowed with the qualities of both Valkyries and swan-maidens, as in the cases of Brynhild (cf.\n\nGripisspo , introductory note), Svava (cf.\n\nHelgakvitha Hjorvarthssonar , prose after stanza 5 and note) and Sigrun (cf.\n\nHelgakvitha Hundingsbana I, 17 and note).\n\nThe list of names here given may be an interpolation; a quite different list is given in Grimnismol , 36.\n\nRanks of the gods : some editors regard the word thus translated as a specific place name.\n\nHerjan (\"Leader of Hosts\"): Othin.\n\nIt is worth noting that the name Hild (\"Warrior\") is the basis of Bryn-hild (\"Warrior in Mail Coat\").\n\n32.\n\nBaldr: The death of Baldr, the son of Othin and Frigg, was the first of the great disasters to the gods.\n\nThe story is fully told by Snorri.\n\nFrigg had demanded of all created things, saving only the mistletoe, which she thought too weak to be worth troubling [fp.\n\n15] about, an oath that they would not harm Baldr.\n\nThus it came to he a sport for the gods to hurl weapons at Baldr, who, of course, was totally unharmed thereby.\n\nLoki, the trouble-maker, brought the mistletoe to Baldr's blind brother, Hoth, and guided his hand in hurling the twig.\n\nBaldr was slain, and grief came upon all the gods.\n\nCf.\n\nBaldrs Draumar .] p.\n\n15 Famous and fair | in the lofty fields, Full grown in strength | the mistletoe stood.\n\n33.\n\nFrom the branch which seemed | so slender and fair Came a harmful shaft | that Hoth should hurl; But the brother of Baldr | was born ere long, And one night old | fought Othin's son.\n\n34.\n\nHis hands he washed not, | his hair he combed not, Till he bore to the bale-blaze | Baldr's foe.\n\nBut in Fensalir | did Frigg weep sore For Valhall's need: | would you know yet more?\n\n35.\n\nOne did I see | in the wet woods bound, A lover of ill, | and to Loki like; [33.\n\nThe lines in this and the following stanza have been combined in various ways by editors, lacunae having been freely conjectured, but the manuscript version seems clear enough.\n\nThe brother of Baldr : Vali, whom Othin begot expressly to avenge Baldr's death."

