[content]
body = "Fili, Kili, | Fundin, Nali, Heptifili, | Hannar, Sviur, Frar, Hornbori, | Fræg and Loni, Aurvang, Jari, | Eikinskjaldi.\n\n14.\n\nThe race of the dwarfs | in Dvalin's throng Down to Lofar | the list must I tell; The rocks they left, | and through wet lands They sought a home | in the fields of sand.\n\n15.\n\nThere were Draupnir | and Dolgthrasir, Hor, Haugspori, | Hlevang, Gloin, [12.\n\nThe order of the lines in this and the succeeding four stanzas varies greatly in the manuscripts and editions, and the names likewise appear in many forms.\n\nRegin : probably not identical with Regin the son of Hreithmar, who plays an important part in the Reginsmol and Fafnismol , but cf.\n\nnote on Reginsmol , introductory prose.\n\n14.\n\nDvalin : in Hovamol, 144, Dvalin seems to have given magic runes to the dwarfs, probably accounting for their skill in craftsmanship, while in Fafnismol , 13, he is mentioned as the father of some of the lesser Norns.\n\nThe story that some of the dwarfs left the rocks and mountains to find a new home on the sands is mentioned, but unexplained, in Snorri's Edda; of Lofar we know only that he was descended from these wanderers.] p.\n\n8 Dori, Ori, | Duf, Andvari, Skirfir, Virfir, | Skafith, Ai.\n\n16.\n\nAlf and Yngvi, | Eikinskjaldi, Fjalar and Frosti, | Fith and Ginnar; So for all time | shall the tale be known, The list of all | the forbears of Lofar.\n\n17.\n\nThen from the throng | did three come forth, From the home of the gods, | the mighty and gracious; Two without fate | on the land they found, Ask and Embla, | empty of might.\n\n18.\n\nSoul they had not, | sense they had not, Heat nor motion, | nor goodly hue; Soul gave Othin, | sense gave Hönir, Heat gave Lothur | and goodly hue.\n\n[15.\n\nAndvari : this dwarf appears prominently in the Reginsmol , which tells how the god Loki treacherously robbed him of his wealth; the curse which he laid on his treasure brought about the deaths of Sigurth, Gunnar, Atli, and many others.\n\n17.\n\nHere the poem resumes its course after the interpolated section.\n\nProbably, however, something has been lost, for there is no apparent connection between the three giant-maids of stanza 8 and the three gods, Othin, Hönir and Lothur, who in stanza 17 go forth to create man and woman.\n\nThe word \"three\" in stanzas 9 and 17 very likely confused some early reciter, or perhaps the compiler himself.\n\nAsk and Embla : ash and elm; Snorri gives them simply as the names of the first man and woman, but says that the gods made this pair out of trees.\n\n18.\n\nHönir : little is known of this god, save that he occasion ally appears in the poems in company with Othin and Loki, and [fp.\n\n9] that he survives the destruction, assuming in the new age the gift of prophesy (cf.\n\nstanza 63).\n\nHe was given by the gods as a hostage to the Wanes after their war, in exchange for Njorth (cf.\n\nstanza 21 and note)."

