[content]
body = "Lines 5-6, one or both of them probably interpolated, seem to symbolize the refining of gold by fire.\n\nHor (\"The High One\"): Othin.\n\n22.\n\nHeith (\"Shining One\"?): a name often applied to wise women and prophetesses.\n\nThe application of this stanza to Gollveig is far from clear, though the reference may be to the [fp.\n\n11] magic and destructive power of gold.\n\nIt is also possible that the stanza is an interpolation.\n\nBugge maintains that it applies to the Volva who is reciting the poem, and makes it the opening stanza, following it with stanzas 28 and 30, and then going on with stanzas I ff.\n\nThe text of line 2 is obscure, and has been variously emended.] p.\n\n11 23.\n\nOn the host his spear | did Othin hurl, Then in the world | did war first come; The wall that girdled | the gods was broken, And the field by the warlike | Wanes was trodden.\n\n24.\n\nThen sought the gods | their assembly-seats, The holy ones, | and council held, Whether the gods | should tribute give, Or to all alike | should worship belong.\n\n25.\n\nThen sought the gods | their assembly-seats, The holy ones, | and council held, To find who with venom | the air had filled, Or had given Oth's bride | to the giants' brood.\n\n[23.\n\nThis stanza and stanza 24 have been transposed from the order in the manuscripts, for the former describes the battle and the victory of the Wanes, after which the gods took council, debating whether to pay tribute to the victors, or to admit them, as was finally done, to equal rights of worship.\n\n25.\n\nPossibly, as Finn Magnusen long ago suggested, there is something lost after stanza 24, but it was not the custom of the Eddic poets to supply transitions which their hearers could generally be counted on to understand.\n\nThe story referred to in stanzas 25-26 (both quoted by Snorri) is that of the rebuilding of Asgarth after its destruction by the Wanes.\n\nThe gods employed a giant as builder, who demanded as his reward the sun and moon, and the goddess Freyja for his wife.\n\nThe gods, terrified by the rapid progress of the work, forced Loki, who had advised the bargain, to delay the giant by a trick, so that the [fp.\n\n12] work was not finished in the stipulated time (cf.\n\nGrimnismol , 44, note).\n\nThe enraged giant then threatened the gods, whereupon Thor slew him.\n\nOth's bride : Freyja; of Oth little is known beyond the fact that Snorri refers to him as a man who \"went away on long journeys.\"] p.\n\n12 26.\n\nIn swelling rage | then rose up Thor,-- Seldom he sits | when he such things hears,-- And the oaths were broken, | the words and bonds, The mighty pledges | between them made.\n\n27.\n\nI know of the horn | of Heimdall, hidden Under the high-reaching | holy tree; On it there pours | from Valfather's pledge A mighty stream: | would you know yet more?\n\n[26.\n\nThor : the thunder-god, son of Othin and Jorth (Earth) cf.\n\nparticularly Harbarthsljoth and Thrymskvitha, passim.\n\nOaths , etc.: the gods, by violating their oaths to the giant who rebuilt Asgarth, aroused the undying hatred of the giants' race, and thus the giants were among their enemies in the final battle.\n\n27."

