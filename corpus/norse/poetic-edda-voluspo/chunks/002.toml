[content]
body = "The roving Norsemen of the tenth century, very few of whom had as yet accepted Christianity, were nevertheless in close contact with Celtic races which had already been converted, and in many ways the Celtic influence was strongly felt.\n\nIt seems likely, then, that the Voluspo was the work of a poet living chiefly in Iceland, though possibly in the \"Western Isles,\" in the middle of the tenth century, a vigorous believer in the old gods, and yet with an imagination active enough to be touched by the vague tales of a different religion emanating from his neighbor Celts.\n\nHow much the poem was altered during the two hundred years between its composition and its first being committed to writing is largely a matter of guesswork, but, allowing for such an obvious interpolation as the catalogue of dwarfs, and for occasional lesser errors, it seems quite needless to assume such great changes as many editors do.\n\nThe poem was certainly not composed to tell a story with which its early hearers were quite familiar; the lack of continuity which baffles modern readers presumably did not trouble them in the least.\n\nIt is, in effect, a series of gigantic pictures, put into words with a directness and sureness which bespeak the poet of genius.\n\nIt is only after the reader, with the help of the many notes, has--familiarized him self with the names and incidents involved that he can begin to understand the effect which this magnificent poem must have produced on those who not only understood but believed it.\n\np.\n\n3 1.\n\nHearing I ask | from the holy races, From Heimdall's sons, | both high and low; Thou wilt, Valfather, | that well I relate Old tales I remember | of men long ago.\n\n2.\n\nI remember yet | the giants of yore, Who gave me bread | in the days gone by; Nine worlds I knew, | the nine in the tree With mighty roots | beneath the mold.\n\n[1.\n\nA few editors, following Bugge, in an effort to clarify the poem, place stanzas 22, 28 and 30 before stanzas 1-20, but the arrangement in both manuscripts, followed here, seems logical.\n\nIn stanza I the Volva, or wise-woman, called upon by Othin, answers him and demands a hearing.\n\nEvidently she be longs to the race of the giants (cf.\n\nstanza 2), and thus speaks to Othin unwillingly, being compelled to do so by his magic power.\n\nHoly: omitted in Regius ; the phrase \"holy races\" probably means little more than mankind in general.\n\nHeimdall: the watchman of the gods; cf.\n\nstanza 46 and note.\n\nWhy mankind should be referred to as Heimdall's sons is uncertain, and the phrase has caused much perplexity.\n\nHeimdall seems to have had various at tributes, and in the Rigsthula, wherein a certain Rig appears as the ancestor of the three great classes of men, a fourteenth century annotator identifies Rig with Heimdall, on what authority we do not know, for the Rig of the poem seems much more like Othin (cf.\n\nRigsthula, introductory prose and note).\n\nValfather (\"Father of the Slain\"): Othin, chief of the gods, so called because the slain warriors were brought to him at Valhall (\"Hall of the Slain\") by the Valkyries (\"Choosers of the Slain\").\n\n2.\n\nNine worlds: the worlds of the gods (Asgarth), of the Wanes (Vanaheim, cf.\n\nstanza 21 and note), of the elves (Alfheim), of men (Mithgarth), of the giants (Jotunheim), of fire (Muspellsheim, cf."

