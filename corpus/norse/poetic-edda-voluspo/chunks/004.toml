[content]
body = "Ithavoll (\"Field of Deeds\"?): mentioned only here and in stanza 60 as the meeting-place of the gods; it appears in no other connection.\n\n8.\n\nTables : the exact nature of this game, and whether it more closely resembled chess or checkers, has been made the subject of a 400-page treatise, Willard Fiske's \"Chess in Iceland.\" Giant-maids : perhaps the three great Norns, corresponding to the three fates; cf.\n\nstanza 20, and note.\n\nPossibly, however, something has been lost after this stanza, and the missing passage, replaced by the catalogue of the dwarfs (stanzas 9-16), may have explained the \"giant-maids\" otherwise than as Norns.\n\nIn Vafthruthnismol , 49, the Norms (this time \"three throngs\" in stead of simply \"three\") are spoken of as giant-maidens; [fp.\n\n6] Fafnismol , 13, indicates the existence of many lesser Norns, belonging to various races.\n\nJotunheim : the world of the giants.] p.\n\n6 9.\n\nThen sought the gods | their assembly-seats, The holy ones, | and council held, To find who should raise | the race of dwarfs Out of Brimir's blood | and the legs of Blain.\n\n10.\n\nThere was Motsognir | the mightiest made Of all the dwarfs, | and Durin next; Many a likeness | of men they made, The dwarfs in the earth, | as Durin said.\n\n11.\n\nNyi and Nithi, | Northri and Suthri, Austri and Vestri, | Althjof, Dvalin, Nar and Nain, | Niping, Dain, Bifur, Bofur, | Bombur, Nori, An and Onar, | Ai, Mjothvitnir.\n\n[9.\n\nHere apparently begins the interpolated catalogue of the dwarfs, running through stanza 16; possibly, however, the interpolated section does not begin before stanza 11.\n\nSnorri quotes practically the entire section, the names appearing in a some what changed order.\n\nBrimir and Blain : nothing is known of these two giants, and it has been suggested that both are names for Ymir (cf.\n\nstanza 3).\n\nBrimir, however, appears in stanza 37 in connection with the home of the dwarfs.\n\nSome editors treat the words as common rather than proper nouns, Brimir meaning \"the bloody moisture\" and Blain being of uncertain significance.\n\n10.\n\nVery few of the dwarfs named in this and the following stanzas are mentioned elsewhere.\n\nIt is not clear why Durin should have been singled out as authority for the list.\n\nThe occasional repetitions suggest that not all the stanzas of the catalogue came from the same source.\n\nMost of the names presumably had some definite significance, as Northri, Suthri, Austri, and Vestri (\"North,\" \"South\", \"East,\" and \"West\"), [fp.\n\n7] Althjof (\"Mighty Thief'), Mjothvitnir (\"Mead-Wolf\"), Gandalf (\"Magic Elf'), Vindalf (\"Wind Elf'), Rathwith (\"Swift in Counsel\"), Eikinskjaldi (\"Oak Shield\"), etc., but in many cases the interpretations are sheer guesswork.] p.\n\n7 12.\n\nVigg and Gandalf) | Vindalf, Thrain, Thekk and Thorin, | Thror, Vit and Lit, Nyr and Nyrath,-- | now have I told-- Regin and Rathsvith-- | the list aright.\n\n13."

