[content]
body = "p.\n\nxxix THE POETIC EDDA VOLUME I LAYS OF THE GODS p.\n\nxxx p.\n\n1 VOLUSPO The Wise-Woman's Prophecy INTRODUCTORY NOTE At the beginning of the collection in the Codex Regius stands the Voluspo, the most famous and important, as it is likewise the most debated, of all the Eddic poems.\n\nAnother version of it is found in a huge miscellaneous compilation of about the year 1300, the Hauksbok , and many stanzas are included in the Prose Edda of Snorri Sturluson.\n\nThe order of the stanzas in the Hauksbok version differs materially from that in the Codex Regius , and in the published editions many experiments have been attempted in further rearrangements.\n\nOn the whole, how ever, and allowing for certain interpolations, the order of the stanzas in the Codex Regius seems more logical than any of the wholesale \"improvements\" which have been undertaken.\n\nThe general plan of the Voluspo is fairly clear.\n\nOthin, chief of the gods, always conscious of impending disaster and eager for knowledge, calls on a certain \"Volva,\" or wise-woman, presumably bidding her rise from the grave.\n\nShe first tells him of the past, of the creation of the world, the beginning of years, the origin of the dwarfs (at this point there is a clearly interpolated catalogue of dwarfs' names, stanzas 10-16), of the first man and woman, of the world-ash Yggdrasil, and of the first war, between the gods and the Vanir, or, in Anglicized form, the Wanes.\n\nThen, in stanzas 27-29, as a further proof of her wisdom, she discloses some of Othin's own secrets and the details of his search for knowledge.\n\nRewarded by Othin for what she has thus far told (stanza 30), she then turns to the real prophesy, the disclosure of the final destruction of the gods.\n\nThis final battle, in which fire and flood overwhelm heaven and earth as the gods fight with their enemies, is the great fact in Norse mythology; the phrase describing it, ragna rök , \"the fate of the gods,\" has become familiar, by confusion with the word rökkr, \"twilight,\" in the German Göterdämmerung .\n\nThe wise-woman tells of the Valkyries who bring the slain warriors to support Othin and the other gods in the battle, of the slaying of Baldr, best and fairest of the gods, through the wiles of Loki, of the enemies of the gods, of the summons to battle on both sides, and of the mighty struggle, till Othin is slain, and \"fire leaps high p.\n\n2 about heaven itself\" (stanzas 31-58).\n\nBut this is not all.\n\nA new and beautiful world is to rise on the ruins of the old; Baldr comes back, and \"fields unsowed bear ripened fruit\" (stanzas 59-66).\n\nThis final passage, in particular, has caused wide differences of opinion as to the date and character of the poem.\n\nThat the poet was heathen and not Christian seems almost beyond dispute; there is an intensity and vividness in almost every stanza which no archaizing Christian could possibly have achieved.\n\nOn the other hand, the evidences of Christian influence are sufficiently striking to outweigh the arguments of Finnur Jonsson, Müllenhoff and others who maintain that the Voluspo is purely a product of heathendom."

