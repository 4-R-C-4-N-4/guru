[content]
body = "44.\n\nNow Garm howls loud | before Gnipahellir, The fetters will burst, | and the wolf run free; Much do I know, | and more can see Of the fate of the gods, | the mighty in fight.\n\n45.\n\nBrothers shall fight | and fell each other, And sisters' sons | shall kinship stain; [43.\n\nGollinkambi (\"Gold-Comb\"): the cock who wakes the gods and heroes, as Fjalar does the giants.\n\nThe rust-red bird : the name of this bird, who wakes the people of Hel's domain, is nowhere stated.\n\n44.\n\nThis is a refrain-stanza.\n\nIn Regius it appears in full only at this point, but is repeated in abbreviated form before stanzas 50 and 59.\n\nIn the Hauksbok version the full stanza comes first between stanzas 35 and 42, then, in abbreviated form, it occurs four times: before stanzas 45, 50, 55, and 59.\n\nIn the Hauksbok line 3 runs: \"Farther I see and more can say.\" Garm : the dog who guards the gates of Hel's kingdom; cf.\n\nBaldrs Draumar, 2 ff., and Grimnismol , 44.\n\nGniparhellir (\"the Cliff-Cave\"): the entrance to the world of the dead.\n\nThe wolf : Fenrir; cf.\n\nstanza 39 and note.\n\n45.\n\nFrom this point on through stanza 57 the poem is quoted by Snorri, stanza 49 alone being omitted.\n\nThere has been much discussion as to the status of stanza 45.\n\nLines 4 and 5 look like an interpolation.\n\nAfter line 5 the Hauksbok has a line running: \"The world resounds, the witch is flying.\" Editors have arranged these seven lines in various ways, with lacunae freely indicated.\n\nSisters' sons : in all Germanic countries the relations between uncle and nephew were felt to be particularly close.] p.\n\n20 Hard is it on earth, | with mighty whoredom; Axe-time, sword-time, | shields are sundered, Wind-time, wolf-time, | ere the world falls; Nor ever shall men | each other spare.\n\n46.\n\nFast move the sons | of Mim, and fate Is heard in the note | of the Gjallarhorn; Loud blows Heimdall, | the horn is aloft, In fear quake all | who on Hel-roads are.\n\n47.\n\nYggdrasil shakes, | and shiver on high The ancient limbs, | and the giant is loose; To the head of Mim | does Othin give heed, But the kinsman of Surt | shall slay him soon.\n\n[46.\n\nRegius combines the first three lines of this stanza with lines 3, 2, and I of stanza 47 as a single stanza.\n\nLine 4, not found in Regius , is introduced from the Hauksbok version, where it follows line 2 of stanza 47.\n\nThe sons of Mim : the spirits of the water.\n\nOn Mini (or Mimir) cf.\n\nstanza 27 and note.\n\nGjallarhorn: the \"Shrieking Horn\" with which Heimdall, the watchman of the gods, calls them to the last battle.\n\n47.\n\nIn Regius lines 3, 2, and I, in that order, follow stanza 46 without separation.\n\nLine 4 is not found in Regius , but is introduced from the Hauksbok version.\n\nYggdrasil : cf.\n\nstanza 19 and note, and Grimnismol , 29-35.\n\nThe giant : Fenrir.\n\nThe head of Mim : various myths were current about Mimir."

