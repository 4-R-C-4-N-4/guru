[content]
body = "This stanza refers to the story that he was sent by the gods with Hönir as a hostage to the Wanes after their war (cf.\n\nstanza 21 and note), and that the Wanes cut off his head and returned it to the gods.\n\nOthin embalmed the head, and by magic gave it the power of speech, thus making Mimir's noted wisdom always available.\n\nof course this story does not fit with that underlying the references to Mimir in stanzas 27 and 29.\n\nThe kinsman of Surt : the wolf [fp.\n\n21] Fenrir, who slays Othin in the final struggle; cf.\n\nstanza 53.\n\nSurt is the giant who rules the fire-world, Muspellsheim; cf.\n\nstanza 52.] p.\n\n21 48.\n\nHow fare the gods?\n\n| how fare the elves?\n\nAll Jotunheim groans, | the gods are at council; Loud roar the dwarfs | by the doors of stone, The masters of the rocks: | would you know yet more?\n\n49.\n\nNow Garm howls loud | before Gnipahellir, The fetters will burst, | and the wolf run free Much do I know, | and more can see Of the fate of the gods, | the mighty in fight.\n\n50.\n\nFrom the east comes Hrym | with shield held high; In giant-wrath | does the serpent writhe; O'er the waves he twists, | and the tawny eagle Gnaws corpses screaming; | Naglfar is loose.\n\n[48.\n\nThis stanza in Regius follows stanza 51; in the Hauksbok it stands, as here, after 47.\n\nJotunheim : the land of the giants.\n\n49.\n\nIdentical with stanza 44.\n\nIn the manuscripts it is here abbreviated.\n\n50.\n\nHrym : the leader of the giants, who comes as the helmsman of the ship Naglfar (line 4).\n\nThe serpent : Mithgarthsorm, one of the children of Loki and Angrbotha (cf.\n\nstanza 39, note).\n\nThe serpent was cast into the sea, where he completely encircles the land; cf.\n\nespecially Hymiskvitha , passim.\n\nThe eagle : the giant Hræsvelg, who sits at the edge of heaven in the form of an eagle, and makes the winds with his wings; cf.\n\nVafthruthnismol , 37, and Skirnismol , 27.\n\nNaglfar : the ship which was made out of dead men's nails to carry the giants to battle.] p.\n\n22 51.\n\nO'er the sea from the north | there sails a ship With the people of Hel, | at the helm stands Loki; After the wolf | do wild men follow, And with them the brother | of Byleist goes.\n\n52.\n\nSurt fares from the south | with the scourge of branches, The sun of the battle-gods | shone from his sword; The crags are sundered, | the giant-women sink, The dead throng Hel-way, | and heaven is cloven.\n\n53.\n\nNow comes to Hlin | yet another hurt, When Othin fares | to fight with the wolf, And Beli's fair slayer | seeks out Surt, For there must fall | the joy of Frigg.\n\n[51.\n\nNorth : a guess; the manuscripts have \"east,\" but there seems to be a confusion with stanza 50, line 1.\n\nPeople of Hel : the manuscripts have \"people of Muspell,\" but these came over the bridge Bifrost (the rainbow), which broke beneath them, whereas the people of Hel came in a ship steered by Loki.\n\nThe wolf : Fenrir.\n\nThe brother of Byleist : Loki."

