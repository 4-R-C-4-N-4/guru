[content]
body = "More fair than the sun, | a hall I see, Roofed with gold, | on Gimle it stands; There shall the righteous | rulers dwell, And happiness ever | there shall they have.\n\n65.\n\nThere comes on high, | all power to hold, A mighty lord, | all lands he rules.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n66.\n\nFrom below the dragon | dark comes forth, Nithhogg flying | from Nithafjoll; The bodies of men on | his wings he bears, The serpent bright: | but now must I sink.\n\n[64.\n\nThis stanza is quoted by Snorri.\n\nGimle : Snorri makes this the name of the hall itself, while here it appears to refer to a mountain on which the hall stands.\n\nIt is the home of the happy, as opposed to another hall, not here mentioned, for the dead.\n\nSnorri's description of this second hall is based on Voluspo , 38, which he quotes, and perhaps that stanza properly belongs after 64.\n\n65.\n\nThis stanza is not found in Regius , and is probably spurious.\n\nNo lacuna is indicated in the Hauksbok version, but late paper manuscripts add two lines, running: \"Rule he orders, | and rights he fixes, Laws he ordains | that ever shall live.\" The name of this new ruler is nowhere given, and of course the suggestion of Christianity is unavoidable.\n\nIt is not certain, how ever, that even this stanza refers to Christianity, and if it does, it may have been interpolated long after the rest of the poem was composed.\n\n66.\n\nThis stanza, which fits so badly with the preceding ones, [fp.\n\n27] may well have been interpolated.\n\nIt has been suggested that the dragon, making a last attempt to rise, is destroyed, this event marking the end of evil in the world.\n\nBut in both manuscripts the final half-line does not refer to the dragon, but, as the gender shows, to the Volva herself, who sinks into the earth; a sort of conclusion to the entire prophecy.\n\nPresumably the stanza (barring the last half-line, which was probably intended as the conclusion of the poem) belongs somewhere in the description of the great struggle.\n\nNithhogg : the dragon at the roots of Yggdrasil; cf.\n\nstanza 39 and note.\n\nNithafjoll (\"the Dark Crags\"); nowhere else mentioned.\n\nMust I : the manuscripts have \"must she.\"] Next: Hovamol"

