[content]
body = "Nastrond (\"Corpse-Strand\"): the land of the dead, ruled by the goddess Hel.\n\nHere the wicked undergo tortures.\n\nSmoke vent : the phrase gives a picture of the Icelandic house, with its opening in the roof serving instead of a chimney.\n\n39.\n\nThe stanza is almost certainly in corrupt form.\n\nThe third line is presumably an interpolation, and is lacking in most of the late, paper manuscripts.\n\nSome editors, however, have called lines 1-3 the remains of a full.\n\nstanza, with the fourth line lacking, and lines 4-5 the remains of another.\n\nThe stanza depicts the torments of the two worst classes of criminals known to Old Norse morality--oath-breakers and murderers.\n\nNithhogg (\"the Dread Biter\"): the dragon that lies beneath the ash Yggdrasil and gnaws at its roots, thus symbolizing the destructive elements in the universe; cf.\n\nGrimnismol , 32, 35.\n\nThe wolf : presumably the wolf Fenrir, one of the children of Loki and the giantess Angrbotha (the others being Mithgarthsorm and the goddess Hel), who was chained by the gods with the marvelous chain Gleipnir, fashioned by a dwarf \"out of six things: the [fp.\n\n18] noise of a cat's step, the beards of women, the roots of mountains, the nerves of bears, the breath of fishes, and the spittle of birds.\" The chaining of Fenrir cost the god Tyr his right hand; cf.\n\nstanza 44.] p.\n\n18 40.\n\nThe giantess old | in Ironwood sat, In the east, and bore | the brood of Fenrir; Among these one | in monster's guise Was soon to steal | the sun from the sky.\n\n41.\n\nThere feeds he full | on the flesh of the dead, And the home of the gods | he reddens with gore; Dark grows the sun, | and in summer soon Come mighty storms: | would you know yet more?\n\n42.\n\nOn a hill there sat, | and smote on his harp, Eggther the joyous, | the giants' warder; Above him the cock | in the bird-wood crowed, Fair and red | did Fjalar stand.\n\n[40.\n\nThe Hauksbok version inserts after stanza 39 the refrain stanza (44), and puts stanzas 40 and 41 between 27 and 21.\n\nWith this stanza begins the account of the final struggle itself.\n\nThe giantess : her name is nowhere stated, and the only other reference to Ironwood is in Grimnismol , 39, in this same connection.\n\nThe children of this giantess and the wolf Fenrir are the wolves Skoll and Hati, the first of whom steals the sun, the second the moon.\n\nSome scholars naturally see here an eclipse myth.\n\n41.\n\nIn the third line many editors omit the comma after \"sun,\" and put one after \"soon,\" making the two lines run: \"Dark grows the sun | in summer soon, / Mighty storms--\" etc.\n\nEither phenomenon in summer would be sufficiently striking.\n\n42.\n\nIn the Hauksbok version stanzas 42 and 43 stand between stanzas 44 and 38.\n\nEggther : this giant, who seems to be the watchman of the giants, as Heimdall is that of the gods and Surt of the dwellers in the fire-world, is not mentioned elsewhere in [fp.\n\n19] the poems.\n\nFjalar , the cock whose crowing wakes the giants for the final struggle.] p.\n\n19 43.\n\nThen to the gods | crowed Gollinkambi, He wakes the heroes | in Othin's hall; And beneath the earth | does another crow, The rust-red bird | at the bars of Hel."

