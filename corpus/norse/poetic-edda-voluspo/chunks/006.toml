[content]
body = "Lothur : apparently an older name for Loki, the treacherous but ingenious son of Laufey, whose divinity Snorri regards as somewhat doubtful.\n\nHe was adopted by Othin, who subsequently had good reason to regret it.\n\nLoki probably represents the blending of two originally distinct figures, one of them an old fire-god, hence his gift of heat to the newly created pair.] p.\n\n9 19.\n\nAn ash I know, | Yggdrasil its name, With water white | is the great tree wet; Thence come the dews | that fall in the dales, Green by Urth's well | does it ever grow.\n\n20.\n\nThence come the maidens | mighty in wisdom, Three from the dwelling | down 'neath the tree; Urth is one named, | Verthandi the next,-- On the wood they scored,-- | and Skuld the third.\n\nLaws they made there, and life allotted To the sons of men, and set their fates.\n\n[19.\n\nYggdrasil : cf.\n\nstanza 2 and note, and Grimnismol , 29-35 and notes.\n\nUrth (\"The Past\"): one of the three great Norns.\n\nThe world-ash is kept green by being sprinkled with the marvelous healing water from her well.\n\n20.\n\nThe maidens : the three Norns; possibly this stanza should follow stanza 8.\n\nDwelling: Regius has \"sæ\" (sea) instead of \"sal\" (hall, home), and many editors have followed this reading, although Snorri's prose paraphrase indicates \"sal.\" Urth, Verthandi and Skuld : \"Past,\" \"Present\" and \"Future.\" Wood , etc.: the magic signs (runes) controlling the destinies of men were cut on pieces of wood.\n\nLines 3-4 are probably interpolations from some other account of the Norns.] p.\n\n10 21.\n\nThe war I remember, | the first in the world, When the gods with spears | had smitten Gollveig, And in the hall | of Hor had burned her, Three times burned, | and three times born, Oft and again, | yet ever she lives.\n\n22.\n\nHeith they named her | who sought their home, The wide-seeing witch, | in magic wise; Minds she bewitched | that were moved by her magic, To evil women | a joy she was.\n\n[21.\n\nThis follows stanza 20 in Regius ; in the Hauksbok version stanzas 25, 26, 27, 40, and 41 come between stanzas 20 and 21.\n\nEditors have attempted all sorts of rearrangements.\n\nThe war : the first war was that between the gods and the Wanes.\n\nThe cult of the Wanes (Vanir) seems to have originated among the seafaring folk of the Baltic and the southern shores of the North Sea, and to have spread thence into Norway in opposition to the worship of the older gods; hence the \"war.\" Finally the two types of divinities were worshipped in common; hence the treaty which ended the war with the exchange of hostages.\n\nChief among the Wanes were Njorth and his children, Freyr and Freyja, all of whom became conspicuous among the gods.\n\nBeyond this we know little of the Wanes, who seem originally to have been water-deities.\n\nI remember : the manuscripts have \"she remembers,\" but the Volva is apparently still speaking of her own memories, as in stanza 2.\n\nGollveig (\"Gold-Might\"): apparently the first of the Wanes to come among the gods, her ill treatment being the immediate cause of the war.\n\nMüllenhoff maintains that Gollveig is another name for Freyja."

