[content]
body = "The sun turns black, | earth sinks in the sea, The hot stars down | from heaven are whirled; Fierce grows the steam | and the life-feeding flame, Till fire leaps high | about heaven itself.\n\n58.\n\nNow Garm howls loud | before Gnipahellir, The fetters will burst, | and the wolf run free; Much do I know, | and more can see Of the fate of the gods, | the mighty in fight.\n\n59.\n\nNow do I see | the earth anew Rise all green | from the waves again; The cataracts fall, | and the eagle flies, And fish he catches | beneath the cliffs.\n\n60.\n\nThe gods in Ithavoll | meet together, Of the terrible girdler | of earth they talk, [57.\n\nWith this stanza ends the account of the destruction.\n\n58.\n\nAgain the refrain-stanza (cf.\n\nstanza 44 and note), abbreviated in both manuscripts, as in the case of stanza 49.\n\nIt is probably misplaced here.\n\n59.\n\nHere begins the description of the new world which is to rise out of the wreck of the old one.\n\nIt is on this passage that a few critics have sought to base their argument that the poem is later than the introduction of Christianity ( circa 1000), but this theory has never seemed convincing (cf.\n\nintroductory note).\n\n60.\n\nThe third line of this stanza is not found in Regius .\n\nIthavoll : cf.\n\nstanza 7 and note.\n\nThe girdler of earth : Mithgarthsorm : [fp.\n\n25], who, lying in the sea, surrounded the land.\n\nThe Ruler of Gods : Othin.\n\nThe runes were both magic signs, generally carved on wood, and sung or spoken charms.] p.\n\n25 And the mighty past | they call to mind, And the ancient runes | of the Ruler of Gods.\n\n61.\n\nIn wondrous beauty | once again Shall the golden tables | stand mid the grass, Which the gods had owned | in the days of old, .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n62.\n\nThen fields unsowed | bear ripened fruit, All ills grow better, | and Baldr comes back; Baldr and Hoth dwell | in Hropt's battle-hall, And the mighty gods: | would you know yet more?\n\n63.\n\nThen Hönir wins | the prophetic wand, .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nAnd the sons of the brothers | of Tveggi abide In Vindheim now: | would you know yet more?\n\n[61.\n\nThe Hauksbok version of the first two lines runs: \"The gods shall find there, | wondrous fair, The golden tables | amid the grass.\" No lacuna (line 4) is indicated in the manuscripts.\n\nGolden tables : cf.\n\nstanza 8 and note.\n\n62.\n\nBaldr : cf.\n\nstanza 32 and note.\n\nBaldr and his brother, Hoth, who unwittingly slew him at Loki's instigation, return together, their union being a symbol of the new age of peace.\n\nHropt : another name for Othin.\n\nHis \"battle-hall\" is Valhall.\n\n63.\n\nNo lacuna (line 2) indicated in the manuscripts.\n\nHönir : cf.\n\nstanza 18 and note.\n\nIn this new age he has the gift of foretelling the future.\n\nTveggi (\"The Twofold\"): another name for [fp.\n\n26] Othin.\n\nHis brothers are Vili and Ve (cf.\n\nLokasenna , 26, and note).\n\nLittle is known of them, and nothing, beyond this reference, of their sons.\n\nVindheim (\"Home of the Wind\"): heaven.] p.\n\n26 p.\n\n27 64."

