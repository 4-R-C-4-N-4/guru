[content]
body = "Vengo a fare, e tre marroni d'India, Nel tuo letto vengo a posare, E questa finestra aperta che la Luna, Su il tuo letto risplende, Come risplende il nostro amore La, e la prego con gran calore, Che voglia dare sfogo a queste due cuore, Che tanto ci amiamo, e se questa grazia, Mi verrà fatta chiunque sia innamorata, Se mi scongiurera In suo aiuto correro!\n\nEndamone, Endamone, Endamone!\n\nSopra te io mi metto al lume, Il tuo (cuore) io dimeno, E mi dimeno io pure e cosi, E cosi tanto farò, Tanto farò e tanto faremmo, Che uniti ne veremmo.\n\nThe Counter-Charm.\n\nEndamone, Endamone, Endamone!\n\nBy the love I feel, which I Shall ever feel until I die, Three crosses on thy bed I make, And then three wild horse-chestnuts take; In that bed the nuts I hide, And then the window open wide, That the full moon may cast her light Upon a love as fair and bright, And so I pray to her above To give wild rapture to our love, And cast her fire in either heart, Which wildly loves to never part; And one thing more I beg of thee!\n\nIf any one enamoured be, And in my aid his love hath placed, Unto his call I'll come in haste.\n\nSo it came to pass that the fair goddess made love with Endamone as if they had been awake (yet communing in dreams).\n\nAnd so it is to this day, that who ever would make love with him or her who sleeps, should have recourse to the beautiful Tana , and so doing there will be success.\n\nThis legend, while agreeing in many details with the classical myth, is strangely intermingled with practices of witchcraft, but even these, if investigated, would all prove to be as ancient as the rest of the text.\n\nThus the sheep's intestine used instead of the red woollen bag which is employed in beneficent magic-the red and black ribbon, which mingles threads of joy and woe--the (peacock's) feather or la penna maligna --pepper and salt, occur in many other incantations, but always to bring evil and cause suffering.\n\nI have never seen it observed, but it is true, that Keats in his exquisite poem of Endymion completely departs from or ignores the whole spirit and meaning of the ancient myth, while in this rude witch-song it is minutely developed.\n\nThe conception is that of a beautiful youth furtively kissed in his slumber by Dian of reputed chastity."

