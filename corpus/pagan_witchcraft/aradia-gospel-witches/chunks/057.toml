[content]
body = "APPENDIX Comments on the Foregoing Texts So long ago as the year 1886 I learned that there was in existence a manuscript setting forth the doctrines of Italian witchcraft, and I was promised that, if possible, it should be obtained for me.\n\nIn this I was for a time disappointed.\n\nBut having urged it on Maddalena, my collector of folk-lore, while she was leading a wandering life in Tuscany, to make an effort to obtain or recover something of the kind, I at last received from her, on January 1, 1897, entitled Aradia, or the Gospel of the Witches .\n\nNow be it observed, that every leading point which forms the plot or centre of the Vangel , such as that Diana is Queen of the Witches; an associate of Herodias (Aradia) in her relations to sorcery; that she bore a child to her brother the Sun (here Lucifer ); that as a moon-goddess she is in some relation to Cain, who dwells as prisoner in the moon, and that the witches of old were people oppressed by feudal lands, the former revenging themselves in every way, and holding orgies to Diana which the Church represented as being the worship of Satan--all of this, I repeat, had been told or written out for me in fragments by Maddalena (not to speak of other authorities), even as it had been chronicled by Horst or Michelet; therefore all this is in the present document of minor importance.\n\nAll of this I expected, but what I did not expect, and what was new to me, was that portion which is given as prose-poetry and which I have rendered in metre or verse.\n\nThis being traditional, and taken down from wizards, is extremely curious and interesting, since in it are preserved many relics of lore which, as may be verified from records, have come down from days of yore.\n\nAradia is evidently enough Herodias , who was regarded in the beginning as associated with Diana as chief of the witches.\n\nThis was not, as I opine, derived from the Herodias of the New Testament, but from an earlier replica of Lilith , bearing the same name.\n\nIt is, in fact, an identification or twin-ing of the Aryan and Shemitic Queens of Heaven, or of Night and of Sorcery, and it may be that this was known to the earliest myth-makers.\n\nSo far back as the sixth century the worship of Herodias and Diana by witches was condemned by a Church Council at Ancyra.\n\nPipernus and other writers have noted the evident identity of Herodias with Lilith .\n\nIsis preceded both."

