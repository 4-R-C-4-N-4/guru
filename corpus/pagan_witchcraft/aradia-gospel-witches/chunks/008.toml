[content]
body = "Quando i nobili e prete vi diranno Dovete credere nel Padre, Figlio, E Maria, rispondete gli sempre, \"IL vostro dio Padre e Maria Sono tre diavoli...\n\nIl vero dio Padre non e il vostro-- Il vostro dio--io sono venuta Per distruggere la gente cattiva E la distruggero....\n\n\"Voi altri poveri soffrite anche la fame, E lavorato malo e molte volte; Soffrite anche la prigione; Mapero avete una anima, Una anima più buona, e nell'altra, Nell'altra mondo voi starete bene, E gli altri male.\"...\n\nTranslation.\n\n'Tis true indeed that thou a spirit art, But thou wert born but to become again A mortal; thou must go to earth below To be a teacher unto women and men Who fain would study witchcraft in thy school Yet like Cain's daughter thou shalt never be, Nor like the race who have become at last Wicked and infamous from suffering, As are the Jews and wandering Zingari, Who are all thieves and knaves; like unto them Ye shall not be....\n\nAnd thou shalt be the first of witches known; And thou shalt be the first of all i' the world; And thou shalt teach the art of poisoning, Of poisoning those who are great lords of all; Yea, thou shalt make them die in their palaces; And thou shalt bind the oppressor's soul (with power); And when ye find a peasant who is rich, Then ye shall teach the witch, your pupil, how To ruin all his crops with tempests dire, With lightning and with thunder (terrible), And the hall and wind....\n\nAnd when a priest shall do you injury By his benedictions, ye shall do to him Double the harm, and do it in the name Of me, Diana , Queen of witches all!\n\nAnd when the priests or the nobility Shall say to you that you should put your faith In the Father, Son, and Mary, then reply: \"Your God, the Father, and Maria are Three devils....\n\n\"For the true God the Father is not yours; For I have come to sweep away the bad, The men of evil, all will I destroy!"

