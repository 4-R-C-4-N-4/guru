[content]
body = "And in the morning, when all spirits go To their repose, do thou, ere thou return'st Into thy stone, carry her home again, And leave her there asleep.\n\nTherefore, O Sprite!\n\nI beg thee in this pebble make thy home!\n\nObey in every way all I command.\n\nSo in my pocket thou shalt ever be, And thou and I will ne'er part company!"

