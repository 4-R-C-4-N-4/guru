[content]
body = "CHAPTER X Madonna Diana \"The Madonna is essentially the goddess of the moon.\" --\" Naples in the Nineties, \" by E.\n\nN.\n\nRolfe.\n\nOnce there was, in the very old time in Cettardo Alto, a girl of astonishing beauty, and she was betrothed to a young man who was as remarkable for good looks as herself; but though well born and bred, the fortune or misfortunes of war or fate had made them both extremely poor.\n\nAnd if the young lady had one fault, it was her great pride, nor would she willingly be married unless in good style, with luxury and festivity, in a fine garment, with many bridesmaids of rank.\n\nAnd this became to the beautiful Rorasa --for such was her name--such an object of desire, that her head was half turned with it, and the other girls of her acquaintance, to say nothing of the many men whom she had refused, mocked her so bitterly, asking her when the fine wedding was to be, with many other jeers and sneers, that at last in a moment of madness she went to the top of a high tower, whence she cast herself; and to make it worse, there was below a terrible ravine (balza), into which she fell.\n\nYet she took no harm, for as she fell there appeared to her a very beautiful woman, truly not of earth, who took her by the hand and bore her through the air to a safe place.\n\nThen all the people round about who saw or heard of this thing cried out, \"Lo, a miracle!\" and they came and made a great festival, and would fain persuade Rorasa that she had been saved by the Madonna.\n\nBut the lady who had saved her, coming to her secretly, said: \"If thou hast any desire, follow the Gospel of Diana, or what is called the Gospel of the Witches ( Il Vangelo delle Strege ), who worship the moon.\" \"Se la Luna adorerai Tutto tu otterai\" \"If thou adorest Luna, then What thou desir'st thou shalt obtain!\" Then the beautiful girl went forth alone by night to the fields, and kneeling on a stone in an old ruin, she worshipped the moon and invoked Diana thus:-- Diana, bella Diana!\n\nTu che della grande caduta Mi ai bene salvata!\n\nTi prego di farmi una altra grazia, Di farmi far' un bello sposalizio, Una sposalizio ricco e 'compagnato Da molte signore...\n\nSe questa grazia mi farai Sempre il Vangelo delle Strege lo asseriro.\n\nDiana, beautiful Diana!\n\nThou who didst save from a dreadful death When I did fall into the dark ravine!\n\nI pray thee grant me still another grace."

