[content]
body = "And it may be observed that during the Middle Ages, and even so late as the intense excitements which inspired the French Huguenots, the Jansenists and the Anabaptists, Woman always came forth more prominently or played a far greater part than she had done in social or political life.\n\nThis was also the case in the Spiritualism founded by the Fox sisters of Rochester, New York, and it is manifesting itself in many ways in the Fin de Siècle , which is also a nervous chaos according to Nordau ,--Woman being evidently a fish who shows herself most when the waters are troubled:-- \"Oh, Woman, in our hours of ease!\" The reader will remember the rest.\n\nbut we should also remember that in the earlier ages the vast majority of mankind itself, suppressed by the too great or greatly abused power of Church and State, only manifested itself at such periods of rebellion against forms or ideas grown old.\n\nAnd with every new rebellion, every fresh outburst or debâcle or wild inundation and bursting over the barriers, humanity and woman gain something, that is to say, their just dues or rights.\n\nFor as every freshet spreads more widely its waters over the fields, which are in due time the more fertilised thereby, so the world at large gains by every Revolution, however terrible or repugnant it may be for a time.\n\nThe Emancipated or Woman's Rights woman, when too enthusiastic, generally considers man as limited, while Woman is destined to gain on him.\n\nIn earlier ages a contrary opinion prevailed, and both are, or were, apparently in the wrong, so far as the future is concerned.\n\nFor in truth both sexes are progressive, and progress in this respect means not a conflict of the male and female principle, such as formed the basis of the Mahabarata , but a gradual ascertaining of true ability and adjustment of relations or co-ordination of powers--in doing which on a scientific basis all conflict ceases.\n\nThese remarks are appropriate to my text and subject, because it is in studying the epochs when woman has made herself prominent and influential that we learn what the capacities of the female sex truly are.\n\nAmong these, that of Witchcraft as it truly was--not as it is generally quite misunderstood--is as deeply interesting as any other.\n\n[paragraph continues] For the Witch --laying aside all question as to magic or its non-existence--was once a real factor or great power in rebellious social life, and to this very day--as most novels bear witness--it is recognised that there is something uncanny, mysterious, and incomprehensible in woman, which neither she herself nor man can explain."

