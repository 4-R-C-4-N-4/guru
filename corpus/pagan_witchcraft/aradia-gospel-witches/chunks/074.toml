[content]
body = "Mayest thou hereby become A beautiful young man, Red and white in hue, Like to milk and blood!\" After this he found the goat and conjured it in like manner, and it replied:-- \"In the name of the Fairy Diana!\n\nBe thou attired more richly than a prince!\" So he passed to the hall, where he was wooed by beautiful ladies, but his answer to them all was that his love was at Monterone.\n\nThen he saw or knew no more, but on awaking found himself in Monterone, and so changed to a handsome youth that no one knew him.\n\nSo he married his beautiful lady, and all lived the hidden life of witches and wizards from that day, and are now in Fairy Land.\n\nNext: Note"

