[content]
body = "[paragraph continues] However, everything this world does not go exactly as we would have it, and no one knows what fish or crab may hide under a rock in a river.\n\nFor it so happened that the governess was not a Catholic at all, as will presently appear, and did not vex her pupil with any threats of a nun's life, nor even with an approval of it.\n\nIt came to pass that the young lady, who was in the habit of lying awake on moonlight nights to hear the nightingales sing, thought she heard her governess in the next room, of which the door was open, rise and go forth on the great balcony.\n\nThe next night the same thing took place, and rising very softly and unseen, she beheld the lady praying, or at least kneeling in the moonlight, which seemed to her to be very singular conduct, the more so because the lady kneeling uttered words which the younger could not understand, and which certainly formed no part of the Church service.\n\nAnd being much exercised over the strange occurrence, she at last, with timid excuses, told her governess what she had seen.\n\nThen the latter, after a little reflection, first binding her to a secrecy of life and death, for, as she declared, it was a matter of great peril, spoke a follows:-- \"I, like thee, was instructed when young by priests to worship an invisible god.\n\nBut an old woman in whom I had great confidence once said to me, 'Why worship a deity whom you cannot see, when there is the Moon in all her splendour visible?\n\nWorship her.\n\nInvoke Diana , the goddess of the Moon, and she will grant your prayers.' This shalt thou do, obeying the Vangelo , the Gospel of (the [paragraph continues] Witches and of) Diana , who is Queen of the Fairies and of the Moon.\" Now the young lady being persuaded, was converted to the worship of Diana and the Moon, and having prayed with all her heart for a lover (having learned the conjuration to the goddess), was soon rewarded by the attention and devotion of a brave and wealthy cavalier, who was indeed as admirable a suitor as any one could desire.\n\nBut the mother, who was far more bent on gratifying vindictiveness and cruel vanity than on her daughter's happiness, was infuriated at this, and when the gentleman came to her, she bade him begone, for her daughter was vowed to become a nun, and a nun she should be or die.\n\nThen the young lady was shut up in a cell in a tower, without even the company of her governess, and put to strong and hard pain, being made to sleep on the stone floor, and would have died of hunger had her mother had her way.\n\nThen in this dire need she prayed to Diana to set her free; when lo!"

