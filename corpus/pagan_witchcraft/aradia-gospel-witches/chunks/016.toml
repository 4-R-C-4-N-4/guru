[content]
body = "And thus it came to pass one night, at the meeting of all the sorceresses and fairies, she declared that she would darken the heavens and turn all the stars into mice.\n\nAll those who were present said-- \"If thou canst do such a strange thing, having risen to such power, thou shalt be our queen.\" Diana went into the street; she took the bladder of an ox and a piece of witch-money, which has an edge like a knife--with such money witches cut the earth from men's foot-tracks--and she cut the earth, and with it and many mice she filled the bladder, and blew into the bladder till it burst.\n\nAnd there came a great marvel, for the earth which was in the bladder became the round heaven above, and for three days there was a great rain; the mice became stars or rain.\n\nAnd having made the heaven and the stars and the rain, Diana became Queen of the Witches; she was the cat who ruled the star-mice, the heaven and the rain.\n\nNext: Chapter IV.The Charm of the Stones Consecrated to Diana"

