[content]
body = "CHAPTER XI The House of the Wind \"List to the whoop and whistle of the winds, Their hollow drone as they come roaring on, For strength hath many a voice, and when aroused The flying tempest calls with awful joy And echoes as it strikes the mountain-side, Then crashes in the forest.\n\nHear the cry!\n\nSurely a god hath set his lions loose And laughs to hear them as they rage afar.\" --C.\n\nG.\n\nLeland.\n\nThe following story does not belong to the Gospel of the Witches, but I add it as it confirms the fact that the worship of Diana existed for a long time contemporary with Christianity.\n\nIts full title in the original MS., which was written out by Maddalena, after hearing it from a man who was native of Volterra, is La Pellegrina delta Casa al Vento --\"The Female Pilgrim of the House of the Wind.\" It may be added that, as the tale declares, the house in question is still standing.\n\nThere is a peasant's house at the beginning of the hill or ascent leading to Volterra, and it is called the House of the Wind.\n\nNear it there once stood a small place, wherein dwelt a married couple, who had but one child, a daughter, whom they adored.\n\nTruly if the child had but a headache, they each had a worse attack from fear.\n\nLittle by little the girl grew older, and all the thought of the mother, who was very devout, was that she should become a nun.\n\nBut the girl did not like this, and declared that she hoped to be married like others.\n\nAnd when looking from her window one day, she saw and heard the birds singing in the vines and among the trees all so merrily, she said to her mother that she hoped some day to have a family of little birds of her own, singing round her in a cheerful nest.\n\nAt which the mother was so angry that she gave her daughter a cuff.\n\nAnd the young lady wept, but replied with spirit, that if beaten or treated in any such manner, that she would certainly soon find some way to escape and get married, for she had no idea of being made a nun of against her will.\n\nAt hearing this the mother was seriously frightened, for she knew the spirit of her child, and was afraid lest the girl already had a lover, and would make a great scandal over the blow; and turning it all over, she thought of an elderly lady of good family, but much reduced, who was famous for her intelligence, learning, and power of persuasion, and she thought, \"This will be just the person to induce my daughter to become pious, and fill her head with devotion and make a nun of her.\" So she sent for this clever person, who was at once appointed the governess and constant attendant of the young lady, who, instead of quarrelling with her guardian, became devoted to her."

