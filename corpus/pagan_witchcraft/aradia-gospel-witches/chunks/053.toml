[content]
body = "\"At the same time Laverna went to a great lord and bought of him a castle, well-furnished within and broad rich lands without.\n\n\"But this time she swore on her head to pay in full in six months.\n\n\"And as she had done by the priest, so she acted to the lord of the castle, and stole and sold every stick, furniture, cattle, men, and mice--there was not left wherewith to feed a fly.\n\n\"Then the priest and the lord, finding out who this was, appealed to the gods, complaining that they had been robbed by a goddess.\n\n\"And it was soon made known to them all that this was Laverna .\n\n\"Therefore she was called to judgment before all the gods.\n\n\"And when she was asked what she had done with the property of the priest, unto whom she had sworn by her body to make payment at the time appointed (and why had she broken her oath)?\n\n\"She replied by a strange deed which amazed them all, for she made her body disappear, so that only her head remained visible, and it cried:-- \"'Behold me!\n\nI swore by my body, but body have I none!' \"Then all the gods laughed.\n\n\"After the priest came the lord who had also been tricked, and to whom she had sworn by her head.\n\nAnd in reply to him Laverna showed to all present her whole body without mincing matters, and it was one of extreme beauty, but without a head; and from the neck thereof came a voice which said:-- 'Behold me, for I am Laverna , who Have come to answer to that lord's complaint, Who swears that I contracted debt to him, And have not paid although the time is o'er, And that I am a thief because I swore Upon my head --but, as you all can see, I have no head at all, and therefore I Assuredly ne'er swore by such an oath.' \"Then there was indeed a storm of laughter among the gods, who made the matter right by ordering the head to join the body, and bidding Laverna pay up her debts, which she did.\n\n\"Then Jove spoke and said:-- \"'Here is a roguish goddess without a duty (or a worshipper), while there are in Rome innumerable thieves, sharpers, cheats, and rascals-- ladri , bindolini , truffatori e scrocconi --who live by deceit.\n\n\"'These good folk have neither a church nor a god, and it is a great pity, for even the very devils have their master, Satan, as the head of the family."

