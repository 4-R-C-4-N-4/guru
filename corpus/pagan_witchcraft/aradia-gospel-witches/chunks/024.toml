[content]
body = "CHAPTER VI A Spell To Win Love When a wizard, a worshipper of Diana , one who worships the Moon, desires the love of a woman, he can change her into the form of a dog, when she, forgetting who she is, and all things besides, will at once come to his house, and there, when by him, take on again her natural form and remain with him.\n\nAnd when it is time for her to depart, she will again become a dog and go home, where she will turn into a girl.\n\nAnd she will remember nothing of what has taken place, or at least but little or mere fragments, which will seem as a confused dream.\n\nAnd she will take the form of a dog because Diana has ever a dog by her side.\n\nAnd this is the spell to be repeated by him who would bring a love to his home.\n\nTo day is Friday, and I wish to rise very early, not having been able to sleep all night, having seen a very beautiful girl, the daughter of a rich lord, whom I dare not hope to win.\n\nWere she poor, I could gain her with money; but as she is rich, I have no hope to do so.\n\n(Therefore will I conjure Diana to aid me.) Scongiurazione a Diana.\n\nDiana, bella Diana!\n\nChe tanto bella e, buona siei, E tanto ti é piacere Ti ho fatto, Anche a te di fare al amore, Dunque spero che anche in questa cosa Tu mi voglia aiutare, E se tu vorrai Tutto tu potrai, Se questa grazia mi vorrai fare: Chiamerai tua figlia Aradia , Al letto della bella fanciulla La mandera Aradia , La fanciulla in una canina convertira, Alla camera mia la mandera, Ma entrata in camera mia, Non sara più una canina, Ma tornerà una bella fanciulla, Bella cane era prima, E cosi potrò fare al amore A mio piacimento, Come a me piacera.\n\nQuando mi saro divertito A mi piacere dirò.\n\n\"Per volere della Fata Diana, E di sua figlia Aradia, Torna una canina Come tu eri prima!\" Invocation to Diana.\n\nDiana, beautiful Diana!\n\nWho art indeed as good as beautiful, By all the worship I have given thee, And all the joy of love which thou hast known, I do implore thee aid me in my love!"

