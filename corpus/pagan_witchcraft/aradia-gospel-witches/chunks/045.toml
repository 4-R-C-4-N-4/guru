[content]
body = "Browning, she leaves out Syrinx altogether, that is to say, the voice of the nymph still lingering in the pipe which had been her body.\n\nNow to my mind the old prose narrative of these myths is much more deeply poetical and moving, and far more inspired with beauty and romance, than are the well-rhymed and measured, but very imperfect versions given by our poets.\n\nAnd in fact, such want of intelligence or perception may be found in all the \"classic\" poems, not only of Keats, but of almost every poet of the age who has dealt in Greek subjects.\n\nGreat license is allowed to painters and poets, but when they take a subject, especially a deep tradition, and fail to perceive its real meaning or catch its point, and simply give us something very pretty, but not so inspired with meaning as the original, it can hardly be claimed that they have done their work as it might, or, in fact, should have been done.\n\nI find that this fault does not occur in the Italian or Tuscan witch-versions of the ancient fables; on the contrary, they keenly appreciate, and even expand, the antique spirit.\n\nHence I have often had occasion to remark that it was not impossible that in some cases popular tradition, even as it now exists, has been preserved more fully and accurately than we find it in any Latin writer.\n\nNow apropos of missing the point, I would remind certain very literal readers that if they find many faults of grammar, mis-spelling, and worse in the Italian texts in this book, they will not, as a distinguished reviewer has done, attribute them all to the ignorance of the author, but to the imperfect education of the person who collected and recorded them.\n\nI am reminded of this by having seen in a circulating library a copy of my Legends of Florence , in which some good careful soul had taken pains with a pencil to correct all the archaisms.\n\nWherein he or she was like a certain Boston proof-reader, who in a book of mine changed the spelling of many citations from Chaucer, Spenser, and others into the purest, or impurest, Webster; he being under the impression that I was extremely ignorant of orthography.\n\nAs for the writing in or injuring books, which always belong partly to posterity, it is a sin of vulgarity as well as morality, and indicates what people are more than they dream.\n\n\"Only a cad as low as a thief Would write in a book or turn down a leaf, Since 'tis thievery, as well is known, To make free with that which is not our own.\" Next: Chapter XIII.\n\nDiana and the Children"

