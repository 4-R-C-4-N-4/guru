[content]
body = "It cannot fail to strike the reader that this ceremony is strangely like that of the Italian invocation, the only difference being that in one the Sun, and in the other the Moon is invoked to secure a good harvest.\n\nIn the Legends of Florence there is one of the Via del Corno, in which the hero, falling into a vast tun or tina of wine, is saved from drowning by sounding a horn with tremendous power.\n\nAt the sound, which penetrates to an incredible distance, even to unknown lands, all come rushing as if enchanted to save him.\n\nIn this conjuration, Diana , in the depths of heaven, is represented as rushing at the sound of the horn, and leaping through doors or windows to save the vintage of the one who blows.\n\nThere is a certain singular affinity in these stories.\n\nIn the story of the Via del Corno , the hero is saved by the Red Goblin or Robin Goodfellow, who gives him a horn, and it is the same sprite who appears in the conjuration of the Round Stone, which is sacred to Diana.\n\nThis is because the spirit is nocturnal, and attendant on Diana Titania.\n\nKissing the hand to the new moon is a ceremony of unknown antiquity, and Job, even in his time, regarded it as heathenish and forbidden which always means antiquated and out of fashion--as when he declared (xxxi.\n\n26, 27), \"If I beheld the moon walking in brightness...\n\nand my heart hath been secretly enticed or my mouth hath kissed my hand...\n\nthis also were an iniquity to be punished by the Judge, for I should have denied the God that is above.\" From which it may or ought to be inferred that Job did not understand that God made the moon and appeared in all His works, or else he really believed the moon was an independent deity.\n\nIn any case, it is curious to see the old forbidden rite still living, and as heretical as ever.\n\nThe tradition, as given to me, very evidently omits a part of the ceremony, which may be supplied from classic authority.\n\nWhen the peasant performs the rite, he must not act as once a certain African, who was a servant of a friend of mine, did.\n\nThe coloured man's duty was to pour out every morning a libation of rum to a fetish and he poured it down his own throat.\n\nThe peasant should also sprinkle the vines, just as the Devonshire farmers, who observed all Christmas ceremonies, sprinkled, also from a horn, their apple-trees."

