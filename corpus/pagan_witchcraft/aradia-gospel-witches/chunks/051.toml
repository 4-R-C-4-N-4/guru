[content]
body = "In this story we clearly have the dog made by Vulcan and the wolf-Jupiter settled the question by petrifying them-as you may read in Julius Pollux his fifth book, or any other on mythology.\n\nIs canis fuit postea à Jove in lapidem conversus .\n\n'Which hunting hound, as well is known, Was changed by Jupiter to stone.\" It is remarkable that in this story the moon is compared to an onion.\n\n\"The onion,\" says Friedrich ( Symbolik der Natur , p.\n\n348), \"was, on account of its many skins, among the Egyptians the emblem and hieroglyph of the many-formed moon, whose different phases are so clearly seen in the root when it is cut through, also because its growth or decrease corresponds with that of the planet.\n\nTherefore it was dedicated to Isis, the Moon-Goddess.\" And for this reason the onion was so holy as to be regarded as having in itself something of deity; for which reason Juvenal remarks that the Egyptians were happy people to have gods growing in their gardens.\n\nNext: Chapter XV.\n\nLaverna"

