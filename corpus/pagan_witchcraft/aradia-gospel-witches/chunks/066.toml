body = "The women or witches, having more vitality, will last a little longer--I mean the traditional kind; for as regards innate natural development of witchcraft and pure custom, we shall always have with us sorceresses, even as we shall have the poor--until we all go up together.\n\nWhat is very remarkable, even to the being difficult to understand, is the fact that so much antique tradition survived with so little change among the peasantry.\n\nBut legends and spells in families of hereditary witches are far more likely to live than fashions in art, yet even the latter have been kept since 2000 years.\n\nThus, as E.\n\nNeville Rolfe writes: \"The late Signor Castellani, who was the first to reproduce with fidelity the jewellery found in the tombs of Etruria and Greece, made up his mind that some survival of this ancient and exquisite trade must still exist somewhere in Italy.\n\nHe accordingly made diligent search...\n\nand in an out of the way village discovered goldsmiths who made ornaments for the peasants, which in their character indicated a strong survival of early Etruscan art.\" And here I would remark, that where I have written perhaps a little too bitterly of the indifference of scholars to the curious traditions preserved by wizards and witches, I refer to Rome, and especially to Northern Italy.\n\nG.\n\nPitré did all that was possible for one man as regards the South.\n\nSince the foregoing chapters were written, I received Naples in the Nineties , by E.\n\nNeville Rolfe, B.A., in which a deep and intelligent interest in the subject is well supported by extensive knowledge.\n\nWhat will be to the reader of my book particularly interesting is the amount of information which Mr.\n\nRolfe gives regarding the connection of Diana with witchcraft, and how many of her attributes became those of the Madonna.\n\n\"The worship of Diana,\" as he says, \"prevailed very extensively...\n\nso much so, that when Christianity superseded Paganism, much of the heathen symbolism was adapted to the new rites, and the transition from the worship of Diana to that of the Madonna was made comparatively simple.\" Mr.\n\nRolfe speaks of the key, rue, and verbena as symbols of Diana; of all of these I have incantations, apparently very ancient, and identified with Diana.\n\nI have often found rue in houses in Florence, and had it given to me as a special favour.\n\nIt is always concealed in some dark corner, because to take any away is to take luck.\n\nThe bronze frog was an emblem of Diana; hence the Latin proverb, \"'He who loves a frog regards it as Diana.\" It was made till recent times as an amulet.\n\nI have one as a paper-weight now before me.\n\nThere is also an incantation to the frog.\n\nThat wherein Mr."

