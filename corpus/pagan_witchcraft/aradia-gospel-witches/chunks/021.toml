[content]
body = "CHAPTER V The Conjuration of the Lemon and Pins Scongiurazione al Limone appuntato un Spille.\n\nSacred to Diana.\n\nA lemon stuck full of pins of different colours always brings good fortune.\n\nIf you receive as a gift a lemon full of pins of divers colours, without any black ones among them, it signifies that your life will be perfectly happy and prosperous and joyful.\n\nBut if some black pins are among them, you may enjoy good fortune and health, yet mingled with troubles which may be of small account.\n\n[However, to lessen their influence, you must perform the following ceremony, and pronounce this incantation, wherein all is also described.\n\n] The Incantation to Diana.\n\nAl punto di mezza notte Un limone ho raccolto, Lo raccolto nel giardino Ho raccolto un limone, [paragraph continues] Un arancio e un mandarino, Cogliendo queste cose, Cogliendo, io ho detto; Tu, o Regina del sole Delia luna e delle stelle, Ti chiamo in mio ajuto E con quanta forza ho a te scongiuro Che una grazia tu mi voglia fare, Tre cose ho racolto nel giardino; Un limone, un arancio, E un mandarino; una Di queste cose per mia fortuna, Voglio tenere due Di questi oggetti di mano, E quello che dovra servirmi Per la buona fortuna Regina delle stelle: Fa lo rimanare in mia mano!\n\nAt the instant when the midnight came, I have picked a lemon in the garden, I have picked a lemon, and with it An orange and a (fragrant) mandarin.\n\nGathering with care these (precious) things, And while gathering I said with care: \"Thou who art Queen of the sun and of the moon And of the stars--lo!\n\nhere I call to thee!\n\nAnd with what power I have I conjure thee To grant to me the favour I implore!\n\nThree things I've gathered in the garden here: A lemon, orange, and a mandarin; I've gathered them to bring good luck to me.\n\nTwo of them I do grasp here in my hand, And that which is to serve me for my fate, Queen of the stars!\n\nThen make that fruit remain firm in my grasp.\n\n[Something is here omitted in the MS.\n\nI conjecture that the two are tossed without seeing them into the air, and if the lemon remains, the ceremony proceeds as follows."

