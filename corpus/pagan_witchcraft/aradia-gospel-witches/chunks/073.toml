[content]
body = "Then he was overwhelmed with shame, and said, \"Ere long the whole town will be here to witness my defeat.\n\nHowever, I will make one last appeal.\" So he cried:-- \"Oh, vecchia !\n\nthou who didst mean me more kindly than I knew, pardon me, I beg thee, and rescue me from this trouble!\n\nAnd if, as I well ween, thou art a witch, and if I, by becoming a wizard, may be freed from my trials and troubles, then I pray thee teach me how it may be done, so that I may win the young lady, since I now see that she is of thy kind, and that I must be of it to be worthy of her.\" Then Gianni saw the old woman sweep like a flash of light from a lantern up from the ground, and, touching him, bore him away from the ladder, when lo!\n\nthe light was a cat, who had been anon the witch, and she said:-- \"Thou wilt soon set forth on a long journey, and in thy way thou wilt find a wretched worn-out horse, when thou must say:-- \"'Fata Diana!\n\nFata Diana!\n\nFata Diana!\n\nIo vi scongiuro Di dare un po di bene, A quella povera bestia!' E poi si trovera Una grossa capra, Ma un vero caprone, E tu dirai: 'Bona sera, bel caprone,' E questo ti risponderà 'Buona sera galantuomo Sono tanto stanco, io Che non mi sento-- Di andare più avanti.' E risponderai al solito, 'Fata Diana vi scongiuro, Di dare pace e bene A questo caprone!' \"'Fairy Diana!\n\nFairy Diana!\n\nFairy Diana!\n\nI conjure thee to do some little good To this poor beast.' Then thou wilt find A great goat, A true he-goat, And thou shalt say, 'Good evening, fair goat!' And he will reply, 'Good evening, fair sir!\n\nI am so weary That I can go no farther.' And thou shalt reply as usual, 'Fairy Diana, I conjure thee To give to this goat relief and peace!' \"Then will we enter in a great hall where thou wilt see many beautiful ladies who will try to fascinate thee; but let thy answer ever be, 'She whom I love is her of Monteroni.' \"And now, Gianni, to horse; mount and away!\" So he mounted the cat, which flew as quick as thought, and found the mare, and having pronounced over it the incantation, it became a woman and said:-- \"In nome della Fata Diana!\n\nTu possa divenire Un giovane bello Bianco e rosso!\n\nDi latte e sangue!\" \"In the name of the Fairy Diana!"

