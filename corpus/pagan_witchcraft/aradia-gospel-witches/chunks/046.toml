[content]
body = "CHAPTER XIII Diana and the Children \"And there withall Diana gan appere With bowe in hand right as an Hunteresse, And saydê, 'Daughter, stint thine heavinesse!' And forth she wente and made a vanishing.\" --Chaucer ( C.\n\nT.\n\n), \" The Knight's Tale.\n\n\" There was in Florence in the oldest time a noble family, but grown so poor that their giorni di festa or feast-days were few and far between.\n\nHowever, they dwelt in their old palace (which was in the street now called La Via Cittadella), which was a fine old building, and so they kept up a brave show before the world, when many a day they hardly had anything to eat.\n\nRound this palace was a large garden, in which stood an ancient marble statue of Diana , like a beautiful woman who seemed to be running with a dog by her side.\n\nShe held in her hand a bow, and on her forehead was a small moon.\n\nAnd it was said that by night, when all was still, the statue became like life, and fled, and did not return till the moon set or the sun rose.\n\nThe father of the family had two children, who were good and intelligent.\n\nOne day they came home with many flowers which had been given to them, and the little girl said to her brother:-- \"The beautiful lady with the bow ought to have some of these!\" Saying this, they laid flowers before the stature and made a wreath which the boy placed on her head.\n\nJust then the great poet and magician Virgil, who knew everything about the gods and fairies, entered the garden and said, smiling:-- \"You have made, the offering of flowers to the goddess quite correctly, as they did of old; all that remains is to pronounce the prayer properly, and it is this:\" So he repeated the Invocation to Diana.\n\nBella dea dell'arco!\n\nBella dea delle freccie!\n\nDella caccia e dei cani!\n\nTu vegli colle stelle, Quando il sole va dormir Tu colla luna in fronte Cacci la notte meglio del di.\n\nColle tue Ninfe, al suono Di trombe--Sei la regina Dei cacciatori--regina delle notte, Tu che sei la cacciatrice Più potente di ogni, Cacciator--ti prego Pensa un poco a noi!\n\nTo Diana.\n\nLovely Goddess of the bow!\n\nLovely Goddess of the arrows!"

