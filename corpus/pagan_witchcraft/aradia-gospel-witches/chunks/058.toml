[content]
body = "Diana is very vigorously, even dramatically, set forth in this poem as the goddess of the god-forsaken and ungodly, of thieves, harlots, and, truth fully enough, of the \"minions of the moon,\" as Falstaff would have fain had them called.\n\nIt was recognised in ancient Rome, as it is in modern India, that no human being can be so bad or vile as to have forfeited all right to divine protection of some kind or other, and Diana was this protectress.\n\nIt may be as well to observe here, that among all free-thinking philosophers, educated parias , and literary or book-Bohemians, there has ever been a most unorthodox tendency to believe that the faults and errors of humanity are more due (if not altogether due) to unavoidable causes which we cannot help, as, for instance, heredity, the being born savages, or poor, or in vice, or unto \"bigotry and virtue\" in excess, or unto inquisitioning--that is to say, when we are so overburdened with innately born sin that all our free will cannot set us free from it.\n\nIt was during the so-called Dark Ages, or from the downfall of the Roman Empire until the thirteenth century, that the belief that all which was worst in man owed its origin solely to the monstrous abuses and tyranny of Church and State.\n\nFor then, at every turn in life, the vast majority encountered downright shameless, palpable iniquity and injustice, with no law for the weak who were without patrons.\n\nThe perception of this drove vast numbers of the discontented into rebellion, and as they could not prevail by open warfare, they took their hatred out in a form of secret anarchy, which was, however, intimately blended with superstition and fragments of old tradition.\n\nProminent in this, and naturally enough, was the worship of Diana the protectress--for the alleged adoration of Satan was a far later invention of the Church, and it has never really found a leading place in Italian witchcraft to this day.\n\nThat is to say, purely diabolical witchcraft did not find general acceptance till the end of the fifteenth century, when it was, one may almost say, invented in Rome to supply means wherewith to destroy the threatening heresy of Germany.\n\nThe growth of Sentiment is the increase of suffering; man is never entirely miserable until he finds out how wronged he is and fancies that he sees far ahead a possible freedom.\n\nIn ancient times men as slaves suffered less under even more abuse, because they believed they were born to low conditions of life.\n\nEven the best reform brings pain with it, and the great awakening of man was accompanied with griefs, many of which even yet endure.\n\nPessimism is the result of too much culture and introversion ."

