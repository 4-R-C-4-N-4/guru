[content]
body = "It is a realisation of forbidden or secret love, with attraction to the dimly seen beautiful--by moonlight, with the fairy or witch-like charm of the supernatural--a romance all combined in a single strange form--the spell of Night!\n\n\"There is a dangerous silence in that hour, A stillness which leaves room for the full soul To open all itself, without the power Of calling wholly back its self-control; The silver light which, hallowing tree and tower, Sheds beauty and deep softness o'er the whole, Breathes also to the heart, and o'er it throws A loving languor which is not repose.\" This is what is meant by the myth of Diana and Endymion.\n\nIt is the making divine or æsthetic (which to the Greeks was one and the same) that which is impassioned, secret, and forbidden.\n\nIt was the charm of the stolen waters which are sweet, intensified to poetry.\n\nAnd it is remarkable that it has been so strangely preserved in Italian witch traditions."

