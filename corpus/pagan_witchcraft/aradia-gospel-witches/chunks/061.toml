[content]
body = "This is all classic.\n\nNo one ever heard of a Satanic witch invoking or threatening the Trinity, or Christ or even the angels or saints.\n\nIn fact, they cannot even compel the devil or his imps to obey--they work entirely by his good-will as slaves.\n\nBut in the old Italian lore the sorcerer or witch is all or nothing, and aims at limitless will or power.\n\nOf the ancient belief in the virtues of a perforated stone I need not speak.\n\nBut it is to be remarked that in the invocation the witch goes forth in the earliest morning to seek for verbena or vervain.\n\nThe ancient Persian magi, or rather their daughters, worshipped the sun as it rose by waving freshly plucked verbena, which was one of the seven most powerful plants in magic.\n\nThese Persian priestesses were naked while they thus worshipped, nudity being a symbol of truth and sincerity.\n\nThe extinguishing the lights, nakedness, and the orgie, were regarded as symbolical of the body being laid in the ground, the grain being planted, or of entering into darkness and death, to be revived in new forms, or regeneration and light.\n\nIt was the laying aside of daily life.\n\nThe Gospel of the Witches, as I have given it, is in reality only the initial chapter of the collection of ceremonies, \"cantrips,\" incantations, and traditions current in the fraternity or sisterhood, the whole of which are in the main to be found in my Etruscan Roman Remains and Florentine Legends .\n\nI have, it is true, a great number as yet unpublished, and there are more ungathered, but the whole scripture of this sorcery, all its principal tenets, formulas, medicaments, and mysteries may be found in what I have collected and printed.\n\nYet I would urge that it would be worth while to arrange and edit it all into one work, because it would be to every student of archæology, folk-lore, or history of great value.\n\nIt has been the faith of millions in the past; it has made itself felt in innumerable traditions, which deserve to be better understood than they are, and I would gladly undertake the work if I believed that the public would make it worth the publisher's outlay and pains.\n\nIt may be observed with truth that I have not treated this Gospel, nor even the subject of witchcraft, entirely as folk-lore , as the word is strictly defined and carried out; that is, as a mere traditional fact or thing to be chiefly regarded as a variant like or unlike sundry other traditions, or to be tabulated and put away in pigeon-holes for reference.\n\nThat it is useful and sensible to do all this is perfectly true, and it has led to an immense amount of valuable search, collection, and preservation."

