[content]
body = "Dimmi perche e fatato Che io gnente (niente) ho guadagnato?\" \"Moon, O Moon, whom I by far Love beyond another star, Tell me why it was ordained That I this month have nothing gained?\" Then there appeared to him a little shining elf, who said:-- \"Tu non devi aspettare Altro che l'aiutare, Quando fai ben lavorare.\" \"Money will not come to thee, Nor any help or aid can'st see, Unless you work industriously.\" Then added:-- Io non daro mai denaro Ma l'aiuto, mio caro!\" \"Money I ne'er give, 'tis clear, Only help to thee, my dear!\" Then the youth understood that the Moon, like God and Fortune, does the most for those who do the most for themselves.\n\n\"Come l'appetito viene mangiando, E viene il guadagno lavorando e risparmiando.\" \"As appetite comes by eating and craving, Profit results from labour and saving.\" To be born in a full moon means to have an enlightened mind, and a high tide signifies an exalted intellect and full of thought.\n\nIt is not enough to have a fine boat of Fortune.\n\n\"Bisogna anche lavorare Per farla bene andare.\" \"You must also bravely row, If you wish the bark to go.\" \"Ben faremmo e ben diremmo, Mal va la barca senza remo.\" \"Do your best, or talk, but more To row the boat you'll need an oar.\" And, as it is said-- \"La fortuna a chi dà A chi toglie cosi sta, Qualche volta agli oziosi Ma il più ai laboriosi.\" \"Fortune gives and Fortune takes, And to man a fortune makes, Sometimes to those who labour shirk, But oftener to those who work.\""

