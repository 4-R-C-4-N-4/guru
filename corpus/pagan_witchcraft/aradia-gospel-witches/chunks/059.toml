[content]
body = "It appears to be strangely out of sight and out of mind with all historians, that the sufferings of the vast majority of mankind, or the enslaved and poor, were far greater under early Christianity, or till the end of the Middle Ages and the Emancipation of Serfs, than they were before.\n\nThe reason for this was that in the old \"heathen\" time the humble did not know, or even dream, that all are equal before God, or that they had many rights , even here on earth, as slaves; for, in fact, the whole moral tendency of the New Testament is utterly opposed to slavery, or even severe servitude.\n\nEvery word uttered teaching Christ's mercy and love, humility and charity, was, in fact, a bitter reproof, not only to every lord in the land, but to the Church itself, and its arrogant prelates.\n\nThe fact that many abuses had been mitigated and that there were benevolent saints, does not affect the fact that, on the whole, mankind was for a long time worse off than before, and the greatest cause of this suffering was what may be called a sentimental one, or a newly-born consciousness of rights withheld, which is always of itself a torture.\n\nAnd this was greatly aggravated by the endless preaching to the people that it was a duty to suffer and endure oppression and tyranny, and that the rights of Authority of all kinds were so great that they on the whole even excused their worst abuses.\n\nFor by upholding Authority in the nobility the Church maintained its own.\n\nThe result of it all was a vast development of rebels, outcasts, and all the discontented, who adopted witchcraft or sorcery for a religion, and wizards as their priests.\n\nThey had secret meetings in desert places, among old ruins accursed by priests as the haunt of evil spirits or ancient heathen gods, or in the mountains.\n\nTo this day the dweller in Italy may often find secluded spots environed by ancient chestnut forests, rocks, and walls, which suggest fit places for the Sabbat , and are sometimes still believed by tradition to be such.\n\nAnd I also believe that in this Gospel of the Witches we have a trustworthy outline at least of the doctrine and rites observed at these meetings.\n\nThey adored forbidden deities and practised forbidden deeds, inspired as much by rebellion against Society as by their own passions."

