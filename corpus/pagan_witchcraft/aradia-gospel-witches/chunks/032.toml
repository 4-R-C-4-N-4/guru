[content]
body = "CHAPTER IX Tana and Endamone, or Diana and Endymion \"Hic ultra Endymionem indormit negligentiæ.\" \"Now it is fabled that Endymion, admitted to Olympus, whence he was expelled for want of respect to Juno, was banished for thirty years to earth.\n\nAnd having been allowed to sleep this time in a cave of Mount Latmos, Diana , smitten with his beauty, visited him every night till she had by him fifty daughters and one son.\n\nAnd after this Endymion was recalled to Olympus.\" -- Diz.\n\nStor.\n\nMitol.\n\nThe following legend and the spells were given under the name or title of Tana.\n\nThis was the old Etruscan name for Diana , which is still preserved in the Romagna Toscana.\n\nIn more than one Italian and French work I have found some account or tale how a witch charmed a girl to sleep for a lover, but this is the only explanation of the whole ceremony known to me.\n\nTana.\n\nTana is a beautiful goddess, and she loved a marvelously handsome youth named Endamone; but her love was crossed by a witch who was her rival, although Endamone did not care for the latter.\n\nBut the witch resolved to win him, whether he would or not, and with this intent she induced the servant of Endamone to let her pass the night in the latter's room.\n\nAnd when there, she assumed the appearance of Tana, whom he loved, so that he was delighted to behold her, as he thought, and welcomed her with passionate embraces.\n\nYet this gave him into her power, for it enabled her to perform a certain magic spell by clipping a lock of his hair.\n\nThen she went home, and taking a piece of sheep's intestine, formed of it a purse, and in this she put that which she had taken, with a red and a black ribbon bound together, with a feather, and pepper and salt, and then sang a song.\n\nThese were the words, a song of witchcraft of the very old time.\n\nScongiurazione.\n\nHo formato questo sachetto a Endamone, E la mia vendetta per l'amore, Ch'io ti portavo, e non ero corrisposta, Una altra tu l'amavi: La bella dea Tana tu amavi, E tu non l'avrai: di passione Ti struggerai, volonta di fare, Di fare al amore tu avrai, [paragraph continues] E non la potrai fare."

