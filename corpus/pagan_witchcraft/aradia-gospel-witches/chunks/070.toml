[content]
body = "Diana, Queen of the Serpents, Giver of the Gift of Languages In a long and strange legend of Melambo , a magian and great physician of divine birth, there is an invocation to Diana which has a proper place in this work.\n\nThe incident in which it occurs is as follows:-- One day Melambo asked his mother how it was that while it had been promised that he should know the language of all living things, it had not yet come to pass.\n\nAnd his mother replied:-- \"Patience, my son, for it is by waiting and watching ourselves that we learn how to be taught.\n\nAnd thou hast within thee the teachers who can impart the most, if thou wilt seek to hear them, yes, the professors who can teach thee more in a few minutes than others learn in a life.\" It befell that one evening Melambo, thinking on this while playing with a nest of young serpents which his servant had found in a hollow oak, said:-- \"I would that I could talk with you Well I know that ye have language, As graceful as your movement, As brilliant as your colour.\" Then he fell asleep, and the young serpents twined in his hair and began to lick his lips and eyes, while their mother sang:-- \"Diana!\n\nDiana!\n\nDiana!\n\nRegina delle strege!\n\nE della notte oscura, E di tutta la natura!\n\nDelle stelle e della luna, E di tutta la fortuna!\n\nTu che reggi la marea, Che risplendi il mare nella sera!\n\nColla luce sulle onde, La padrona sei del oceano, Colla tua barca, fatta, Fatta à mezza luna, La tua barca rilucente, Barca e luna crescente; Fai sempre velo in cielo, E in terra sulla sera, E anche à navigare Riflettata sulla mare, Preghiamo di dare a questo, Questo buon Melambo, Qualunque parlare Di qualunque animali!\" The Invocation of the Serpents' Mother to Diana.\n\n\"Diana!\n\nDiana!\n\nDiana!\n\nQueen of all enchantresses And of the dark night, And of all nature, Of the stars and of the moon, And of all fate or fortune!"

