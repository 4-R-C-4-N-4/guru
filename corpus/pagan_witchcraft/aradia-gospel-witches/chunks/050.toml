[content]
body = "CHAPTER XIV The Goblin Messengers of Diana and Mercury The following tale was not given to me as connected with the Gospel of the Witches, but as Diana appears in it, and as the whole conception is that of Diana and Apollo in another form, I include it in the series.\n\nMany centuries ago there was a folletto , goblin, or spirit, or devil-angel-- chi sa?\n\n--who knows what?\n\nand Mercurio , who was the god of speed and of quickness, being much pleased with this imp, bestowed on him the gift of running like the wind, with the privilege that whatever he pursued, be it spirit, a human being, or animal, he should certainly overtake or catch it.\n\nThis folletto had a beautiful sister, who, like him, ran errands, not for the.\n\ngods, but for the goddess (there was a female god for every male, even down to the small spirits); and Diana on the same day gave to this fairy the power that, whoever might chase her, she should, if pursued, never be overtaken.\n\nOne day the brother saw his sister speeding like a flash of lightning across the heaven, and he felt a sudden strange desire in rivalry to overtake her.\n\nSo he dashed after as she flitted on; but though it was his destiny to catch, she had been fated never to be caught, and so the will of one supreme god was balanced by that of another.\n\nSo the two kept flying round and round the edge of heaven, and at first all the gods roared with laughter, but when they understood the case, they grew serious, and asked one another how it was to end.\n\nThen the great father-god said:-- \"Behold the earth, which is in darkness and gloom!\n\nI will change the sister into a moon, and her brother into a sun.\n\nAnd so shall she ever escape him, yet will he ever catch her with his light, which shall fall on her from afar; for the rays of the sun are his hands, which reach forth with burning grasp, yet which are ever eluded.\" And thus it is said that this race begins anew with the first of every month, when the moon being cold, is covered with as many coats as an onion .\n\nBut while the race is being run, as the moon becomes warm she casts off one garment after another, till she is naked and then stops, and then when dressed the race begins again.\n\nAs the vast storm-cloud falls in glittering drops, even so the great myths of the olden time are broken up into small fairy-tales, and as these drops in turn reunite \"En rivière ou sur l'estang,\" (\"On silent lake or streamlet lone,\") as Villon hath it, even so minor myths are again formed from the fallen waters."

