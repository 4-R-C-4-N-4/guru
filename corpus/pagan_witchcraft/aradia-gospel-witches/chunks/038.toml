[content]
body = "Give me one glorious wedding, and with it Full many bridesmaids, beautiful and grand; And if this favour thou wilt grant to me, True to the Witches' Gospel I will be!\n\nWhen Rorasa awoke in the morning, she found her self in another house, where all was far more magnificent, and having risen, a beautiful maid led her into another room, where she was dressed in a superb wedding-garment of white silk with diamonds, for it was her wedding-dress indeed.\n\nThen there appeared ten young ladies, all splendidly attired, and with them and many distinguished persons she went to the church in a carriage.\n\nAnd all the streets were filled with music and people bearing flowers.\n\nSo she found the bridegroom, and was wedded to her heart's desire, ten times more grandly than she had ever dreamed of.\n\nThen, after the ceremony, there was spread a feast at which all the nobility of Cettardo were present, and, moreover, the whole town, rich and poor, were feasted.\n\nWhen the wedding was finished, the bridesmaids made every one a magnificent present to the bride--one gave diamonds, another a parchment (written) in gold, after which they asked permission to go all together into the sacristy.\n\nAnd there they remained for some hours undisturbed, till the priest sent his chierico to inquire whether they wanted anything.\n\nBut what was the youth's amazement at beholding, not the ten bridesmaids, but their ten images or likenesses in wood and in terra-cotta, with that of Diana standing on a moon, and they were all so magnificently made and adorned as to be of immense value.\n\nTherefore the priest put these images into the church, which is the most ancient in Cettardo, and now in many churches you may see the Madonna and the Moon, but it is Diana --la Dea della Luna .\n\nThe name Rorasa seems to indicate the Latin ros the dew, rorare , to bedew, rorulenta , bedewed--in fact, the goddess of the dew.\n\nHer great fall and being lifted by Diana suggest the fall of dew by night, and its rising in vapour under the influence of the moon.\n\nIt is possible that this is a very old Latin mythic tale.\n\nThe white silk and diamonds indicate the dew.\n\nNext: Chapter XI.\n\nThe House of the Wind"

