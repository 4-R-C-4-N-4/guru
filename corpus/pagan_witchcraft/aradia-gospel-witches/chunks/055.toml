[content]
body = "Bollo la paura che possa tenere lontano Qualunque persona e se le viene L'idea a qualchuno di avvicinarsi, Possa essere preso da paura E fuggire lontano!\n\nIncantation.\n\nI boil the cluster of concordia To keep in concord and at peace with me Laverna , that she may restore to me My child, and that she by her favouring care May guard me well from danger all my life!, I boil this herb, yet 'tis not it which boils; I boll the fear , that it may keep afar Any intruder, and if such should come (To spy upon my rite), may he be struck With fear and in his terror haste away!\n\nHaving said thus, put the boiled herbs in a bottle and spread the cards on the table one by one, saying:-- Battezzo queste quaranta carte!\n\nMa non batezzo le quaranta carte, Battezzo quaranta dei superi, Alla dea Laverna che le sue Persone divengono un Vulcano Fino che la Laverna non sara Venuta da me colla mia creatura, E questi dei dal naso dalla bocca, E dal' orecchio possino buttare Fiammi di fuoco e cenere, [paragraph continues] E lasciare pace e bene alla dea Laverna , che possa anche essa Abbraciare i suoi fighi A sua volunta!\n\nIncantation.\n\nI spread before me now the forty cards, Yet 'tis not forty cards which here I spread, But forty of the gods superior To the deity Laverna , that their forms May each and all become volcanoes hot, Until Laverna comes and brings my child; And 'till 'tis done may they all cast at her Hot flames of fire, and with them glowing coals From noses, mouths, and ears (until she yields); Then may they leave Laverna to her peace, Free to embrace her children at her will!\n\n\" Laverna was the Roman goddess of thieves, pickpockets, shopkeepers or dealers, plagiarists, rascals, and hypocrites.\n\nThere was near Rome a temple in a grove where robbers went to divide their plunder.\n\nThere was a statue of the goddess.\n\nHer image, according to some, was a head without a body; according to others, a body without a head; but the epithet of 'beautiful' applied to her by Horace indicates that she who gave disguises to her worshippers had kept one to her self.\" She was worshipped in perfect silence.\n\nThis is confirmed by a passage in Horace ( Epist .\n\n16, lib."

