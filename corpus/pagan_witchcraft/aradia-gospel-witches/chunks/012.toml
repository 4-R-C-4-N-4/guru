[content]
body = "Tuo Caïno, tu non possa aver Ne pace e ne bene fino che Dal sole andate non sarai coi piedi Correndo, le mani battendo, E pregarlo per me che mi faccia sapere, Il mio destino, se cattiva fosse, Allora me to faccia cambiare, Se questa grazia mi farete, L'acqua al lo splendor del sol la guardero: E tu Caïno colla tua bocca mi dirai Il mio destino quale sarà: Se questa grazia o Caïno non mi farai, Pace e bene non avrai!\n\nThe Conjuration of Cain.\n\nI conjure thee, O Cain, as thou canst ne'er Have rest or peace until thou shalt be freed From the sun where thou art prisoned, and must go Beating thy hands and running fast meanwhile: I pray thee let me know my destiny; And if 'tis evil, change its course for me!\n\nIf thou wilt grant this grace, I'll see it clear In the water in the splendour of the sun; and thou, O Cain, shalt tell by word of mouth Whatever this my destiny is to be.\n\nAnd unless thou grantest this, May'st thou ne'er know peace or bliss!\n\nThen shall follow the Conjuration of Diana.\n\nScongiurazione a Diana.\n\nYou shall make cakes of meal, wine, salt, and honey in the shape of a (crescent or horned) moon, and then put them to bake, and say: Non cuoco ne il pane ne il sale, Non cuoco ne il vino ne il miele, Cuoco il corpo il sangue e l'anima, L'anima di Diana , che non possa Avere ne la pace e ne bene, Possa essere sempre in mezzo alle pene Fino che la grazia non mi farà, Che glielo chiesta egliela chiedo di cuore!\n\nSe questa grazia, o Diana , mi farai, La cena in tua lode in molti la faremo, Mangiaremo, beveremo, Balleremo, salteremo, Se questa grazia che ti ho chiesta, Se questa grazia tu mi farai, Nel tempo che balliamo, Il lume spengnerai, Cosi al l'amore Liberamente la faremo!\n\nConjuration of Diana.\n\nI do not bake the bread, nor with it salt, Nor do I cook the honey with the wine, I bake the body and the blood and soul, The soul of (great) Diana , that she shall Know neither rest nor peace, and ever be In cruel suffering till she will grant What I request, what I do most desire, I beg it of her from my very heart!\n\nAnd if the grace be granted, O Diana !"

