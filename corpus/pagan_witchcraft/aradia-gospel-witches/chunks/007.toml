[content]
body = "ARADIA OR THE GOSPEL OF THE WITCHES CHAPTER I How Diana Gave Birth to Aradia (Herodias) \"It is Diana!\n\nLo!\n\nShe rises crescented.\" --Keats' Endymion \"Make more bright The Star Queen's crescent on her marriage night.\" -- Ibid .\n\nThis is the Gospel ( Vangelo ) of the Witches: Diana greatly loved her brother Lucifer, the god of the Sun and of the Moon, the god of Light ( Splendor ), who was so proud of his beauty, and who for his pride was driven from Paradise.\n\nDiana had by, her brother a daughter, to whom they gave the name of Aradia [ i.e.\n\nHerodias].\n\nIn those days there were on earth many rich and many poor.\n\nThe rich made slaves of all the poor.\n\nIn those days were many slaves who were cruelly treated; in every palace tortures, in every castle prisoners.\n\nMany slaves escaped.\n\nThey fled to the country; thus they became thieves and evil folk.\n\nInstead of sleeping by night, they plotted escape and robbed their masters, and then slew them.\n\nSo they dwelt in the mountains and forests as robbers and assassins, all to avoid slavery.\n\nDiana said one day to her daughter Aradia: E vero che tu sei uno spirito, Ma tu set nata per essere ancora.\n\nMortale, e tu devi andare Sulla terra e fare da maestra A donne e a' uomini che avranno Volentà di inparare la tua scuola Che sara composta di stregonerie.\n\nNon devi essere come la figlia di Caino, E della razza che sono devenuti Scellerati infami a causa dei maltrattamenti, Come Giudei e Zingari, Tutti ladri e briganti, Tu non divieni...\n\nTu sarai (sempre) la prima strega, La prima strega divenuta nel mondo, Tu insegnerai l'arte di avvelenare, Di avvelenare (tutti) i signori, Di farli morti nei loro palazzi, Di legare il spirito del oppressore, E dove si trova un contadino ricco e avaro, Insegnare alle strege tue alunne, Come rovinare suo raccolto Con tempesta, folgore e balen, Con grandine e vento.\n\nQuando un prete ti fara del male, Del male colle sue bene di'Zioni, Tu le farei (sempre) un doppio male Col mio nome, col nome di Diana , Regina delle streghe..."

