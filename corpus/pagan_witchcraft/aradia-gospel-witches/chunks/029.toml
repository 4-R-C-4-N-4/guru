[content]
body = "CHAPTER VIII To Have a Good Vintage and Very Good Wine by the Aid of Diana \"Sweet is the vintage when the showering grapes In Bacchanal profusion reel to earth, Purple and gushing.\" --Byron, Don Juan , c.\n\n124.\n\n\"Vinum bonum et suave, Bonis bonum, pravis prave, O quam dulcis sapor--ave!\n\nMundana lætitia!\" -- Latin Songs, E.\n\ndu Meril .\n\nHe who would have a good vintage and fine wine, should take a horn full of wine and with this go into the vineyards or farms wherever vines grow, and then drinking from the horn, say:-- Bevo ma non bevo il vino, Bevo il sangue di Diana , Che da vino nel sangue di Diana Si deve convertire, E in tutte le mie viti Lo spandera, E buona raccolta nu verra E quando avro avuto buona raccolta, Non saro ancora fuori di sciagura, Perche il vino cattivo mi puol venire Perche puol nascere l'uva A luna vecchia...\n\nE cosi il mio vino puole sempre andare In malora--ma io bevendo In questo corno, e bevendo il sangue, Il sangue di Diana col suo aiuto La mano alla Luna nuova io bacero, Che la mia uva possa guardare, Al momento che crea l'occhiolo Alla crescenza del uva E fino alla raccolta, Che possa venire il mio vino buono, E che si possa mantenere Da prendere molti quattrini, E possa entrare la buona fortuna Nelle mi e vigne, E nel miei poderi!\n\nQuando il mio vino pendera Di andare male, il corno prendero, E forte, forte lo suonero, Nel punto della mezza notte, Dentro alla mia cantina lo suonero, Lo suonero tanto forte Che tu bella Diana anche da molto lontano, Tu lo possa sentire, E finestre e porte Con gran forza tu possa spalancare, A gran corsa tu mi possa venire, A trovare, e tu possa salvarmi Il mio vino, e tu possa salvare, Salvare me da grande sciagura, Perche se il mio vino a male andera La miseria mi prendera.\n\nE col tuo aiuto bella Diana , Io saro salvato."

