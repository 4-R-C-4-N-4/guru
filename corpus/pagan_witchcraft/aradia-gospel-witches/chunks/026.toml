[content]
body = "CHAPTER VII To Find or Buy Anything, or to Have Good Fortune Thereby An Invocation or Incantation to Diana.\n\nThe man or woman who, when about to go forth into the town, would fain be free from danger or risk of an accident: or to have good fortune in buying, as, for instance, if a scholar hopes that he may find some rare old book or manuscript for sale very cheaply, or if any one wishes to buy anything very desirable or to find bargains or rarities.\n\nThis scongiurazione one serves for good health, cheerfulness of heart, and absence of evil or the overcoming enmity.\n\nThese are words of gold unto the believer.\n\nThe Invocation.\n\nSiamo di Martedi e a buon ora Mi voglio levare la buona fortuna, Voglio andare e cercare, E coll aiuto della bella Diana , La voglio trovare prima d'andare, Prima di sortir di casa Il malocchio mi levero Con tre gocciole d'olio, E te bella Diana io invoco Che tu possa mandarmi via Il malocchio da dosse a me E mandala al mio più nemico!\n\nQuando il malocchio Mi saro levato In mezza alla via lo gettero, Se questa grazia mi farei Diana bella, Tutti i campanelli Di mia casa bene suonerai, Allora contento di casa me ne andro, Perche col tuo aiuto (saro) certo di trovare, Buona fortuna, certo di trovare Un bel libro antico, E a buon mercato Me lo farai comprare!\n\nTu stessa dal proprietario Che avra il libro Te ne andrai tu stessa Lo troverai e lo farei, [paragraph continues] Capitare in mano al padrone, E le farai capitare In mano al padrone, E le farai entrare Nel cervello che se di quel libro Non si disfara la scomunica, Le portera, cosi questo dell'libro, Verra disfarsi e col tuo aiuto, Verra portato alla mia presenza, E a poco me to vendera, Oppure se e'un manoscritto , Invece di libro per la via lo gettera, E col tuo aiuto verra in mia presenza, E potrò acquistarlo Senza nessuna spesa; E cosi per me Sara grande fortuna!\n\nTo Diana.\n\n'Tis Tuesday now, and at an early hour I fain would turn good fortune to myself, Firstly at home and then when I go forth, And with the aid of beautiful Diana I pray for luck ere I do leave this house!"

