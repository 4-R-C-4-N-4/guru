[content]
body = "Tu mi hai fatto L'offrando--tu avrai La tua porzione Della mia caccia.\n\nAspetta!\" It is well!\n\nI give thee warning, Since thou hast made thy offering, Sonic of the game to thee I'll bring; Thou'lt have thy share in the morning.\n\nAll that night the priest suffered from horrible dreams and dread, and when at last, just before three o'clock, he fell asleep, he suddenly awoke from a nightmare in which it seemed as if something heavy rested on his chest.\n\nAnd something indeed fell from him and rolled on the floor.\n\nAnd when he rose and picked it up, and looked at it by the light of the moon, he saw that it was a human head, half decayed.\n\nAnother priest, who had heard his cry of terror, entered his room, and having looked at the head, said:-- \"I know that face!\n\nIt is of a man whom I confessed, and who was beheaded three months ago at Siena.\" And three days after the priest who had insulted the goddess died.\n\nThe foregoing tale was not given to me as belonging to the Gospel of the Witches, but as one of a very large series of traditions relating to Virgil as a magician.\n\nBut it has its proper place in this book, because it contains the invocation to and incantation of Diana, these being remarkably beautiful and original.\n\nWhen we remember how these \"hymns\" have been handed down or preserved by old women, and doubtless much garbled, changed, and deformed by transmission, it cannot but seem wonderful that so much classic beauty still remains in them, as, for instance, in \"Lovely goddess of the bow!\n\nLovely goddess of the arrow!\n\nThou who walk'st in starry heaven!\" Robert Browning was a great poet, but if we compare all the Italian witch-poems of and to Diana with the former's much-admired speech of Diana-Artemis, it will certainly be admitted by impartial critics that the spells are fully equal to the following by the bard-- \"I am a goddess of the ambrosial courts, And save by Here, Queen of Pride, surpassed By none whose temples whiten this the world: Through Heaven I roll my lucid moon along, I shed in Hell o'er my pate people peace, On Earth, I, caring for the creatures, guard Each pregnant yellow wolf and fox-bitch sleek, And every feathered mother's callow brood, And all the love green haunts and loneliness.\" This is pretty, but it is only imitation, and neither in form or spirit really equal to the incantations, which are sincere in faith."

