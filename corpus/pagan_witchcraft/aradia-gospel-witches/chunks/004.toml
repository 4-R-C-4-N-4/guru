[content]
body = "Unfortunately, notwithstanding his extensive knowledge of the subject, it never seems to have once occurred to the narrator that these traditions were anything but noxious nonsense or abominably un-Christian folly.\n\nThat there exists in them marvellous relics of ancient mythology and valuable folklore, which is the very cor cordium of history, is as uncared for by him as it would be by a common Zoccolone or tramping Franciscan.\n\nOne would think it might have been suspected by a man who knew that a witch really endeavoured to kill seven people as a ceremony or rite, in order to get the secret of endless wealth, that such a sorceress must have had a store of wondrous legends; but of all this there is no trace, and it is very evident that nothing could be further from his mind than that there was anything interesting from a higher or more genial point of view in it all.\n\nHis book, in fine, belongs to the very great number of those written on ghosts and superstition since the latter has fallen into discredit, in which the authors indulge in much satirical and very safe but cheap ridicule of what to them is merely vulgar and false.\n\nLike Sir Charles Coldstream, they have peeped into the crater of Vesuvius after it had ceased to \"erupt,\" and found \"nothing in it.\" But there was something in it once; and the man of science, which Sir Charles was not, still finds a great deal in the remains, and the antiquarian a Pompeii or a Herculaneum--'tis said there are still seven buried cities to unearth.\n\nI have done what little (it is really very little) I could, to disinter something from the dead volcano of Italian sorcery.\n\nIf this be the manner in which Italian witchcraft is treated by the most intelligent writer who has depicted it, it will not be deemed remarkable that there are few indeed who will care whether there is a veritable Gospel of Witches, apparently of extreme antiquity, embodying the belief in a strange counter-religion which has held its own from pre-historic time to the present day.\n\n\"Witchcraft is all rubbish, or something worse,\" said old writers, \"and therefore all books about it are nothing better.\" I sincerely trust, however, that these pages may fall into the hands of at least a few who will think better of them.\n\nI should, however, in justice to those who do care to explore dark and bewildering paths, explain clearly that witch-lore is hidden with most scrupulous care from all save a very few in Italy, just as it is among the Chippeway Medas or the Black Voodoo.\n\nIn the novel to the life of I Settimani an aspirant is represented as living with a witch and acquiring or picking up with pain, scrap by scrap, her spells and incantations, giving years to it."

