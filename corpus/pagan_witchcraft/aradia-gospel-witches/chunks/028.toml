[content]
body = "The reader, however, who has devout faith, can, as the witches declare, apply this spell daily before going forth to procuring or obtaining any kind of bargains at shops, to picking up or discovering lost objects, or, in fact, to finds of any kind.\n\nIf he incline to beauty in female form, he will meet with bonnes fortunes ; if a man of business, bargains will be his.\n\nThe botanist who repeats it before going into the fields will probably discover some new plant, and the astronomer by night be almost certain to run against a brand new planet, or at least an asteroid.\n\nIt should be repeated before going to the races, to visit friends, places of amusement, to buy or sell, to make speeches, and specially before hunting or any nocturnal goings--forth, since Diana is the goddess of the chase and of night.\n\nBut woe to him who does it for a jest!"

