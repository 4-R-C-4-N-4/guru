[content]
body = "Of all hounds and of all hunting Thou who wakest in starry heaven When the sun is sunk in slumber Thou with moon upon they forehead, Who the chase by night preferrest Unto hunting in the daylight, With thy nymphs unto the music Of the horn--thyself the huntress, And most powerful: I pray thee Think, although but for an instant, Upon us who pray unto thee!\n\nThen Virgil taught them also the Scongiurazione or spell to be uttered when good fortune or aught is specially required.\n\nThe Conjuration of Diana.\n\n\"Bella dea del arco del cielo!\n\nDelle stelle e della luna!\n\nLa regina più potente Del cacciatori e della notte!\n\nA te ricorriamo, E chiediamo il tuo aiuto Che tu possa darci Sempre la buona fortuna!\" Fair goddess of the rainbow, Of the stars and of the moon!\n\nThe queen most powerful Of hunters and the night!\n\nWe beg of thee thy aid, That thou may'st give to us The best of fortune ever!\n\nThen he added.\n\nthe conclusion:-- \"Se la nostra scongiurazione Ascolterai, E buona fortuna ci darei, Un segnale a noi lo darei!\" If thou heed'st our evocation And wilt give good fortune to us, Then in proof give us a token!\n\nAnd having taught them this, Virgil departed.\n\nThen the children ran to tell their parents all that had happened, and the latter impressed it on them to keep it a secret, nor breathe a word or hint thereof to any one.\n\nBut what was their amazement when they found early the next morning before the statue a deer freshly killed, which gave them good dinners for many a day; nor did they want thereafter at any time game of all kinds, when the prayer had been devoutly pronounced.\n\nThere was a neighbour of this family, a priest, who held in hate all the ways and worship of the gods of the old time, and whatever did not belong to his religion, and he, passing the garden one day, beheld the statue of Diana crowned with roses and other flowers.\n\nAnd being in a rage, and seeing in the street a decayed cabbage, he rolled it in the mud, and threw it all dripping at the face Of the goddess, saying:-- \"Ecco mala bestia d'idoli!\n\nQuesto e l'omaggio che io ti do, Gia che il diavolo ti aiuta!\" Behold, thou vile beast of idolatry, This is the worship which thou hast from me, And the devil do the rest for thee!\n\nThen the priest heard a voice in the gloom where the leaves were dense, and it said:-- \"Bene, bene!"

