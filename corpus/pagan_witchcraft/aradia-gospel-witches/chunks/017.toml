[content]
body = "CHAPTER IV The Charm of the Stones Consecrated to Diana To find a stone with a hole in it is a special sign of the favour of Diana.\n\nHe who does so shall take it in his hand and repeat the following, having observed the ceremony as enjoined:-- Scongiurazione della pietra bucata.\n\nUna pietra bucata L'ho trovato; Ne ringrazio il destin, E lo spirito che su questa via Mi ha portata, Che passa essere il mio bene, E la mia buona fortuna!\n\nMi alzo la mattina al alba, E a passegio me ne vo Nelle valli, monti e campi, La fortuna cercarvo Della ruta e la verbena, Quello so porta fortuna Me lo tengo in senno chiuso E saperlo nessuno no le deve, E cosi cio che commendo, La verbena far ben per me!\n\nBenedica quella strege!\n\nQuella fàta che mi segna!\" Diana fu quella Che mi venne la notte in sogno E mi disse: \"Se tu voir tener, Le cattive persone da te lontano, Devi tenere sempre ruta con te, Sempre ruta con te e verbena!\" Diana , tu che siei la regina Del cielo e della terra e dell'inferno, E siei la prottetrice degli infelici, Dei ladri, degli assassini, e anche Di donne di mali affari se hai conosciuto, Che non sia stato l'indole cattivo Delle persone, tu Diana , Diana il hai fatti tutti felici!\n\nUna altra volta ti scongiuro Che tu non abbia ne pace ne bene, Tu possa essere sempre in mezzo alle pene, Fino che la grazia che io ti chiedo Non mi farai!\n\nInvocation to the Holy-Stone.\n\nI have found A holy-stone upon the ground.\n\nO Fate!\n\nI thank thee for the happy find, Also the spirit who upon this road Hath given it to me; And may it prove to be for my true good And my good fortune!\n\nI rise in the morning by the earliest dawn, And I go forth to walk through (pleasant) vales, All in the mountains or the meadows fair, Seeking for luck while onward still I roam, Seeking for rue and vervain scented sweet, Because they bring good fortune unto all.\n\nI keep them safely guarded in my bosom, That none may know it--'tis a secret thing, And sacred too, and thus I speak the spell: \"O vervain!"

