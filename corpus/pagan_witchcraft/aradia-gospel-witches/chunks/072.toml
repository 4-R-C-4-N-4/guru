[content]
body = "Diana as Giving Beauty and Restoring Strength Diana hath power to do all things, to give glory to the lowly, wealth to the poor, joy to the afflicted, beauty to the ugly.\n\nBe not in grief, if you are her follower; though you be in prison and in darkness, she will bring light: many there are whom she sinks that they may rise the higher.\n\nThere was of old in Monteroni a young man so ugly that when a stranger was passing through the town he was shown this Gianni, for such was his name, as one of the sights of the place.\n\nYet, hideous as he was, because he was rich, though of no family, he had confidence, and hoped boldly to win and wed some beautiful young lady of rank.\n\nNow there came to dwell in Monteroni a wonder fully beautiful biondina , or blonde young lady of culture and condition, to whom Gianni, with his usual impudence, boldly made love, getting, as was also usual, a round No for his reply.\n\nBut this time, being more than usually fascinated in good truth, for there were influences at work he knew not of, he became as one possessed or mad with passion, so that he hung about the lady's house by night and day, seeking indeed an opportunity to rush in and seize her, or by some desperate trick to master and bear her away.\n\nBut here his plans were defeated, because the lady had ever by her a great cat which seemed to be of more than human intelligence, and, whenever Gianni approached her or her home, it always espied him and gave the alarm with a terrible noise.\n\nAnd there was indeed something so unearthly in its appearance, and something so awful in its great green eyes which shone like torches, that the boldest man might have been appalled by them.\n\nBut one evening Gianni reflected that it was foolish to be afraid of a mere cat, which need only scare a boy, and so he boldly ventured on an attack.\n\nSo going forth, he took a ladder, which he carried and placed against the lady's window.\n\nBut while he stood at the foot, he found by him an old woman, who earnestly began to beg him not to persevere in his intention.\n\n\"For thou knowest well, Gianni,\" she said, \"that the lady will have none of thee; thou art a terror to her.\n\nDo but go home and look in the glass, and it will seem to thee that thou art looking on mortal sin in human form.\" Then Gianni in a roaring rage cried, I will have my way and my will, thou old wife of the devil, if I must kill thee and the girl too!\" Saying which, he rushed up the ladder; but before he had opened or could enter the window, and was at the top, he found himself as it were turned to wood or stone, unable to move."

