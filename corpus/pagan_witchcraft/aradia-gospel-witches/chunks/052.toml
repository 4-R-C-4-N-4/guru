[content]
body = "CHAPTER XV Laverna The following very curious tale, with the incantation, was not in the text of the Vangelo , but it very evidently belongs to the cycle or series of legends connected with it.\n\nDiana is declared to be the protectress of all outcasts, those to whom the night is their day, consequently of thieves; and Laverna , as we may learn from Horace ( Epistles , 16, 1) and Plautus , was preeminently the patroness of pilfering and all rascality.\n\nIn this story she also appears as a witch and humourist.\n\nIt was given to me as a tradition of Virgil , who often appears as one familiar with the marvellous and hidden lore of the olden time.\n\nIt happened on a time that Virgil, who knew all things hidden or magical, he who was a magician and poet, having heard a speech (or oration) by a famous talker who had not much in him, was asked what he thought of it?\n\nAnd he replied:-- \"It seems to me to be impossible to tell whether it was all introduction or all conclusion; certainly there was no body in it.\n\nIt was like certain fish of whom one is in doubt whether they are all head or all tall, or only head and tall; or the goddess Laverna, of whom no one ever knew whether she was all head or all body, or neither or both.\" Then the emperor inquired who this deity might be, for he had never heard of her.\n\nAnd Virgil replied:-- \"Among the gods or spirits who were of ancient times--may they be ever favourable to us!\n\nAmong them (was) one female who was the craftiest and most knavish of them all.\n\nShe was called Laverna .\n\nShe was a thief, and very little known to the other deities, who were honest and dignified, for she was rarely in heaven or in the country of the fairies.\n\n\"She was almost always on earth, among thieves, pickpockets, and panders--she lived in darkness.\n\nOnce it happened that she went (to a mortal), a great priest in the form and guise of a very beautiful stately priestess (of some goddess), and said to him:-- \"'You have an estate which I wish to buy.\n\nI intend to build on it a temple to (our) God.\n\nI swear to you on my body that I will pay thee within a year.' \"Therefore the priest transferred to her the estate.\n\n\"And very soon Laverna had sold off all the crops, grain, cattle, wood, and poultry.\n\nThere was not left the value of four farthings.\n\n\"But on the day fixed for payment there was no Laverna to be seen.\n\nThe goddess was far away, and had left her creditor in asso --in the lurch!"

