[content]
body = "\"For every woman is at heart a witch.\" We have banished the broom and the cat and the working miracles, the Sabbat and pacts with Satan, but the mystery or puzzle is as great as ever; no one living knows to what it is destined to lead.\n\nAre not the charms of love of every kind, and the enjoyment of beauty in all its forms in nature, mysteries, miracles, or magical?\n\nTo all who are interested in this subject of woman's influence and capacity, this Evangel of the Witches will be of value as showing that there have been strange thinkers who regarded creation as a feminine development or parthenogenesis from which the masculine principle was born.\n\nLucifer, or Light, lay hidden in the darkness of Diana, as heat is hidden in lee.\n\nBut the regenerator or Messiah of this strange doctrine is a woman Aradia, though the two, mother and daughter, are confused or reflected in the different tales, even as Jahveh is confused with the Elohim .\n\n\"Remains to be said\"--that the Adam-nable and Eve-il, or Adamite assemblages enjoined in the Gospel of Sorcery, are not much, if at all, kept up by the now few and far between old or young witches and venerable wizards of the present day.\n\nThat is to say, not to my knowledge in Central or Northern Italy.\n\nBut among the roués , viveurs , and fast women of Florence and Milan--where they are not quite as rare as eclipses--such assemblies are called balli angelici or angels' balls.\n\nThey are indeed far from being unknown in any of the great cities of the world.\n\nA few years ago a Sunday newspaper in an American city published a detailed account of them in the \"dance-houses\" of the town, declaring that they were of very frequent occurrence, which was further verified to me by men familiar with them.\n\nA very important point to all who regard the finds or discoveries of ancient tradition as of importance, is that a deep and extensive study of the Italian witch-traditions which I have collected, a comparison of them one with the other, and of the whole with what resembles it in the writings of Ovid and other mythologists, force the conviction (which I have often expressed, but not too frequently) that there are in these later records many very valuable and curious remains of ancient Latin or Etruscan lore, in all probability entire poems, tales, and invocations which have passed over from the ancient tongue.\n\nIf this be true , and when it shall come to pass that scholars will read with interest what is here given, then most assuredly there will be critical examination and verification of what is ancient in it, and it will be discovered what marvels of tradition still endure."

