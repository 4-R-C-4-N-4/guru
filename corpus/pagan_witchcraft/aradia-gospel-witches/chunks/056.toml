[content]
body = "I), where an impostor, hardly daring to move his lips, repeats the following prayer or incantation:-- \"O Goddess Laverna !\n\nGive me the art of cheating and deceiving, Of making men believe that I am just, Holy, and innocent!\n\nextend all darkness And deep obscurity o'er my misdeeds!\" It is interesting to compare this unquestionably ancient classic invocation to Laverna with the one which is before given.\n\nThe goddess was extensively known to the lower orders, and in Plautus a cook who has been robbed of his implements calls on her to revenge him.\n\nI call special attention to the fact that in this, as in a great number of Italian witch-incantations, the deity or spirit who is worshipped, be it Diana herself or Laverna , is threatened with torment by a higher power until he or she grants the favour demanded.\n\nThis is quite classic, i.e.\n\n, Græco-Roman or Oriental, in all of which sources the magician relies not on favour, aid, or power granted by either God or Satan, but simply on what he has been able to wrench and wring, as it were, out of infinite nature or the primal source by penance and study.\n\nI mention this because a reviewer has reproached me with exaggerating the degree to which diabolism --introduced by the Church since 1500--is deficient in Italy.\n\nBut in fact, among the higher class of witches, or in their traditions, it is hardly to be found at all.\n\nIn Christian diabolism the witch never dares to threaten Satan or God, or any of the Trinity or angels, for the whole system is based on the conception of a Church and of obedience.\n\nThe herb concordia probably takes its name from that of the goddess Concordia, who was represented as holding a branch.\n\nIt plays a great part in witchcraft, after verbena and rue."

