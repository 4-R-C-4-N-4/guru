[content]
body = "In honour of thee I will hold this feast, Feast and drain the goblet deep, We, will dance and wildly leap, And if thou grant'st the grace which I require, Then when the dance is wildest, all the lamps Shall be extinguished and we'll freely love!\n\nAnd thus shall it be done: all shall sit down to the supper all naked, men and women, and, the feast over, they shall dance, sing, make music, and then love in the darkness, with all the lights extinguished: for it is the Spirit of Diana who extinguishes them, and so they will dance and make music in her praise.\n\nAnd it came to pass that Diana, after her daughter had accomplished her mission or spent her time on earth among the living (mortals), recalled her, and gave her the power that when she had been invoked...\n\nhaving done some good deed...\n\nshe gave her the power to gratify those who had conjured her by granting her or him success in love: To bless or curse with power friends or enemies [to do good or evil].\n\nTo converse with spirits.\n\nTo find hidden treasures in ancient ruins.\n\nTo conjure the spirits of priests who died leaving treasures.\n\nTo understand the voice of the wind.\n\nTo change water into wine.\n\nTo divine with cards.\n\nTo know the secrets of the hand (palmistry).\n\nTo cure diseases.\n\nTo make those who are ugly beautiful.\n\nTo tame wild beasts.\n\nWhatever thing should be asked from the spirit of Aradia , that should be granted unto those who merited her favour.\n\nAnd thus must they invoke her: Thus do I seek Aradia!\n\nAradia!\n\nAradia!\n\nAt midnight, at midnight I go into a field, and with me I bear water, wine, and salt, I bear water, wine, and salt , and my talisman-- my talisman, my talisman , and a red small bag which I ever hold in my hand con dentro, con dentro, sale, with salt in it, in it .\n\nWith the water and wine I bless myself, I bless myself with devotion to implore a favour from Aradia, Aradia.\n\nSconjurazione di Aradia.\n\nAradia, Aradia mia!\n\nTu che siei figlia del più peggiore Che si trova nell Inferno, Che dal Paradiso fu discacciata, [paragraph continues] E con una sorella, te ha creata, Ma tua madre pentita del suo fallo, A voluto di fare di te uno spirito, Un spirito benigno, E non maligno!\n\nAradia!\n\nAradia!"

