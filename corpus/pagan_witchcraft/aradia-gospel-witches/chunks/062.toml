[content]
body = "But there is this to be said--and I have observed that here and there a few genial minds are beginning to awake to it--that the mere study of the letter in this way has developed a great indifference to the spirit, going in many cases so far as to produce, like Realism in Art (to which it is allied), even a contempt for the matter or meaning of it, as originally believed in.\n\nI was lately much struck by the fact that in a very learned work on Music, the author, in discussing that of ancient times and of the East, while extremely accurate and minute in determining pentatonic and all other scales, and what may be called the mere machinery and history of composition, showed that he was utterly ignorant of the fundamental fact that notes and chords, bars and melodies, were in themselves ideas or thoughts.\n\nThus Confucius is said to have composed a melody which was a personal description of himself.\n\nNow if this be not understood, we can not understand the soul of early music, and the folk-lorist who cannot get beyond the letter and fancies himself \"scientific\" is exactly like the musician who has no idea of how or why melodies were anciently composed.\n\nThe strange and mystical chapter \"How Diana made the Stars and the Rain\" is the same given in my Legends of Florence , vol.\n\nii.\n\np.\n\n229, but much enlarged, or developed to a cosmogonic-mythologic sketch.\n\nAnd here a reflection occurs which is perhaps the most remarkable which all this Witch Evangel suggests.\n\nIn all other Scriptures of all races, it is the male, Jehovah, Buddha, or Brahma, who creates the universe; in Witch Sorcery it is the female who is the primitive principle.\n\nWhenever in history there is a period of radical intellectual rebellion against long-established conservatism, hierarchy, and the like, there is always an effort to regard Woman as the fully equal, which means the superior sex.\n\nThus in the extraordinary war of conflicting elements, strange schools of sorcery, Neo-Platonism, Cabala, Heretic Christianity, Gnosticism, Persian Magism and Dualism, with the remains of old Greek and Egyptian theologies in the third and fourth centuries at Alexandria, and in the House of Light of Cairo in the ninth, the equality of Woman was a prominent doctrine.\n\nIt was Sophia or Helena, the enfranchised, who was then the true Christ who was to save mankind.\n\nWhen Illumination or Illuminé-ism, in company with magic and mysticism, and a resolve to regenerate society according to extreme free thought, inspired the Templars to the hope that they would master the Church and the world, the equality of Woman, derived from the Cairene traditions, again received attention."

