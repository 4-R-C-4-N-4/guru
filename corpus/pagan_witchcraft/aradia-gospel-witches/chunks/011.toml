[content]
body = "Who art indeed our body, since without thee We could not live, thou who (at first as seed) Before becoming flower went in the earth, Where all deep secrets hide, and then when ground Didst dance like, dust in the wind, and yet meanwhile Didst bear with thee in flitting, secrets strange!\n\nAnd yet erewhile, when thou wert in the ear, Even as a (golden) glittering grain, even then The fireflies came to cast on thee their light And aid thy growth, because without their help Thou couldst not grow nor beautiful become; Therefore thou dost belong unto the race Of witches or fairies, and because The fireflies do belong unto the sun....\n\n.\n\n.\n\n.\n\n.\n\n.\n\nQueen of the Fireflies!\n\nhurry apace, Come to me now as if running a race, Bridle the horse as you hear me now sing!\n\nBridle, O bridle the son of the king!\n\nCome in a hurry and bring him to me!\n\nThe son of the king will ere long set thee free!\n\nAnd because thou for ever art brilliant and fair, Under a glass I will keep thee; while there, With a lens I will study thy secrets concealed, Till all their bright mysteries are fully revealed, Yea, all the wondrous lore perplexed Of this life of our cross and of the next.\n\nThus to all mysteries I shall attain, Yea, even to that at last of the grain; And when this at last I shall truly know, Firefly, freely I'll let thee go!\n\nWhen Earth's dark secrets are known to me, My blessing at last I will give to thee!\n\nHere follows the Conjuration of the Salt.\n\nConjuration of the Salt.\n\nI do conjure thee, salt, lo!\n\nhere at noon, Exactly in the middle of a stream I take my place and see the water round, Likewise the sun, and think of nothing else While here besides the water and the sun: For all my soul is turned in truth to them; I do indeed desire no other thought, I yearn to learn the very truth of truths, For I have suffered long with the desire To know my future or my coming fate, If good or evil will prevail in it.\n\nWater and sun, be gracious unto me!\n\nHere follows the Conjuration of Cain.\n\nScongiurazione di Caïno."

