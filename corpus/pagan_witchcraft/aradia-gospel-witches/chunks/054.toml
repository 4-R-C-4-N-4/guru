[content]
body = "Therefore, I command that in future Laverna shall be the goddess of all the knaves or dishonest tradesmen, with the whole rubbish and refuse of the human race, who have been hitherto without a god or a devil, inasmuch as they have been too despicable for the one or the other.' \"And so Laverna became the goddess of all dishonest and shabby people.\n\n\"Whenever any one planned or intended any knavery or aught wicked, he entered her temple, and invoked Laverna , who appeared to him as a woman's head.\n\nBut if he did his work of knavery badly or maladroitly, when he again invoked her he saw only the body; but if he was clever, then he beheld the whole goddess, head and body.\n\n\" Laverna was no more chaste than she was honest, and had many lovers and many children.\n\nIt was said that not being bad at heart or cruel, she often repented her life and sins; but do what she might, she could not reform, because her passions were so inveterate.\n\n\"And if a man had got any woman with child or any maid found herself enceinte , and would hide it from the world and escape scandal, they would go every day to invoke Laverna .\n\n\"Then when the time came for the suppliant to be delivered, Laverna would bear her in sleep during the night to her temple, and after the birth cast her into slumber again, and bear her back to her bed at home, and when she awoke in the morning, she was ever in vigorous health and felt no weariness, and all seemed to her as a dream.\n\n\"But to those who desired in time to reclaim their children, Laverna was indulgent if they led such lives as pleased her and faithfully worshiped her.\n\n\"And this is the ceremony to be performed and the incantation to be offered every night to Laverna .\n\n\"There must be a set place devoted to the goddess, be it a room, a cellar, or a grove, but ever a solitary place.\n\n\"Then take a small table of the size of forty playing-cards set close together, and this must be hid in the same place, and going there at night...\n\n\"Take forty cards and spread them on the table, making of them a close carpet or cover on it.\n\n\"Take of the herbs Paura and concordia , and boil the two together, repeating meanwhile the following:-- Scongiurazione.\n\nFa bollire la mano della concordia, Per tenere a me concordo, La Laverna che possa portare a me Il mio figlio, e che possa Guardarmele da qualun pericolo.\n\nBollo questa erba, man non bollo l'erba."

