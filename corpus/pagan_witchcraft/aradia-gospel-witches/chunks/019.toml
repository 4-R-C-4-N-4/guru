[content]
body = "Se dorme to desterai, Panni dal letto laceraì, Le farai tanta paura Che allora di andare a dormire, Andra alle bische a giuocare, E tu nunqua lo seguirai.\n\nE tu col tuo Brié-brié , le dirai, Chi non paga deliti Avranno pene e guai.\n\nCosi il debitare il giorno appresso, O mi portera i danari, O mi il mandera; E cosi, folletino rosso!\n\nMi farai felice in mia vita, Perche in qualcunque mia bisogna, Verai in mio soccorso!\n\nSe colla mia amante saro' adirato, Tu spirito del buon augurio mio!\n\nAndrai la notte da lei Per i capelli la prenderai, E nel letto mio la porterai; E la mattina quando tutti gli spiriti Vanno a riposare, Tu prima di si' entrare Nella tua palla si porterai La mia bella nel suo letto, Cosi te prego folletino, Di entrare in questa mia palla!\n\nE di ubbidire a tutti miei commandi!\n\nEd io ti porteró Sempre nella tasca mia, Che tu non mi vada via.\n\nThe Conjuration.\n\nSpirit of good omen, Who art come to aid me, Believe I had great need of thee.\n\nSpirit of the Red Goblin, Since thou hast come to aid me in my need, I pray of thee do not abandon me: I beg of thee to enter now this stone, That in my pocket I may carry thee, And so when anything is needed by me, I can call unto thee: be what it may, Do not abandon me by night or day.\n\nShould I lend money unto any man Who will not pay when due, I pray of thee, Thou the Red Goblin, make him pay his debt!\n\nAnd if he will not and is obstinate, Go at him with thy cry of \" Brié--brié!\n\n\" And if he sleeps, awake him with a twitch, And pull the covering off and frighten him!\n\nAnd follow him about where'er he goes.\n\nSo teach him with thy ceaseless \" Brié--brié!\n\n\" That he who obligation e'er forgets Shall be in trouble till he pays his debts.\n\nAnd so my debtor on the following day Shall either bring the money which he owes, Or send it promptly: so I pray of thee, O my Red Goblin, come unto my aid!\n\nOr should I quarrel with her whom I love, Then, spirit of good luck, I pray thee go To her while sleeping--pull her by the hair, And bear her through the night unto my bed!"

