[content]
body = "It is true that there are in it no detailed descriptions of scenery, skies, trees, or clouds--and a great deal might be made of Volterra in that way--but it is prolonged in a manner which shows a gift for it.\n\nHowever, the narrative itself is strangely original and vigorous, for it is such a relic of pure classic heathenism, and such a survival of faith in the old mythology, as all the reflected second-hand Hellenism of the Æsthetes cannot equal.\n\nThat a real worship of or belief in classic divinities should have survived to the present day in the very land of Papacy itself, is a much more curious fact than if a living mammoth had been discovered in some out of the way corner of the earth, because the former is a human phenomenon.\n\nI foresee that the day will come, and that perhaps not so very far distant, when the world of scholars will be amazed to consider to what a late period an immense body of antique tradition survived in Northern Italy, and how indifferent the learned were regarding it; there having been in very truth only one man, and he a foreigner, who earnestly occupied himself with collecting and preserving it.\n\nIt is very probably that there were as many touching episodes among the heathen martyrs who were forced to give up their beloved deities, such as Diana, Venus, the Graces, and others, who were worshipped for beauty, as there were even among the Christians who were thrown to the lions.\n\nFor the heathen loved their gods with a human personal sympathy, without mysticism or fear, as if they had been blood-relations; and there were many among them who really believed that such was the case when some damsel who had made a faux pas got out of it by attributing it all to some god, faun, or satyr; which is very touching.\n\nThere is a great deal to be said for as well as against the idolaters or worshippers of dolls, as I heard a small girl define them."

