[content]
body = "she found the prison door unfastened, and easily escaped.\n\nThen having obtained a pilgrim's dress, she travelled far and wide, teaching and preaching the religion of old times, the religion of Diana , the Queen of the Fairies and of the Moon, the goddess of the poor and the oppressed.\n\nAnd the fame of her wisdom and beauty went forth over all the land, and people worshipped her, calling her La Bella Pellegrina .\n\nAt last her mother, hearing of her, was in a greater rage than ever, and, in fine, after much trouble, succeeded in having her again arrested and cast into prison.\n\nAnd then in evil temper indeed she asked her whether she would become a nun; to which she replied that it was not possible, because she had left the Catholic Church and become a worshipper of Diana and of the Moon.\n\nAnd the end of it was that the mother, regarding her daughter as lost, gave her up to the priests to be put to torture and death, as they did all who would not agree with them or who left their religion.\n\nBut the people were not well pleased with this, be cause.\n\nthey adored her beauty and goodness, and there were few who had not enjoyed her charity.\n\nBut by the aid of her lover she obtained, as a last grace, that on the night before she was to be tortured and executed she might, with a guard, go forth into the garden of the palace and pray.\n\nThis she did, and standing by the door of the house, which is still there, prayed in the light of the full moon to Diana , that she might be delivered from the dire persecution to which she had been subjected, since even her own parents had willingly given her over to an awful death.\n\nNow her parents and the priests, and all who sought her death, were in the palace watching lest she should escape.\n\nWhen lo!\n\nin answer to her prayer there came a terrible tempest and overwhelming wind, a storm such as man had never seen before, which overthrew and swept away the palace with all who were in it; there was not one stone left upon another, nor one soul alive of all who were there.\n\nThe gods had replied to the prayer.\n\nThe young lady escaped happily with her lover, wedded him, and the house of the peasant where the lady stood is still called La Casa al Vento , or the House of the Wind.\n\nThis is very accurately the story as I received it, but I freely admit that I have very much condensed the language of the original text, which consists of twenty pages, and which, as regards needless padding, indicates a capacity on the part of the narrator to write an average modern fashionable novel, even a second-rate French one, which is saying a great deal."

