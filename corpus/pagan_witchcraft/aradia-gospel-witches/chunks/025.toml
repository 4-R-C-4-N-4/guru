[content]
body = "What thou wilt 'tis true Thou canst ever do: And if the grace I seek thou'lt grant to me, Then call, I pray, thy daughter Aradia, And send her to the bedside of the girl, And give that girl the likeness of a dog, And make her then come to me in my room, But when she once has entered it, I pray That she may reassume her human form, As beautiful as e'er she was before, And may I then make love to her until Our souls with joy are fully satisfied.\n\nThen by the aid of the great Fairy Queen And of her daughter, fair Aradia , May she be turned into a dog again, And then to human form as once before!\n\nThus it will come to pass that the girl as a dog will return to her home unseen and unsuspected, for thus will it be effected by Aradia; and the girl will think it is all a dream, because she will have been enchanted by Aradia."

