[content]
body = "Tanto ti prego Per l'amore che por ti ha tua madre, E a l'amor tuo che tanto l'ami, Ti prego di farmi la grazia, La grazia che io ti chiedo Se questa grazia mi farei, Tre cose mi farai vedere, Serpe strisciare, Lucciola volare, E rana cantare Se questa grazia non mi farai, Desidero tu non possa avere, Avere più pace e ne bene, E che da lontano tu debba scomodarti.\n\nE a me raccomodarti, Che ti obri...\n\nche tu possa torrnar Presto al tuo destino.\n\nThe Invocation to Aradia.\n\nAradia!\n\nmy Aradia!\n\nThou who art daughter unto him who was Most evil of all spirits, who of old Once reigned in hell when driven away from heaven, Who by his sister did thy sire become, But as thy mother did repent her fault, And wished to mate thee to a spirit who Should be benevolent, And not malevolent!\n\nAradia, Aradia!\n\nI implore Thee by the love which she did bear for thee!\n\nAnd by the love which I too feel for thee!\n\nI pray thee grant the grace which I require!\n\nAnd if this grace be granted, may there be One of three signs distinctly clear to me: The hiss of a serpent, The light of a firefly, The sound of a frog!\n\nBut if you do refuse this favour, then May you in future know no peace not- joy, And be obliged to seek me from afar, Until you come to grant me my desire, In haste, and then thou may'st return again Unto thy destiny.\n\nTherewith, Amen!"

