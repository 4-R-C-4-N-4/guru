[content]
body = "That the witches even yet form a fragmentary secret society or sect, that they call it that of the Old Religion, and that there are in the Romagna entire villages in which the people are completely heathen, and almost entirely governed by Settimani or \"seven months' children,\" may be read in the novel of the name, as well as several papers published in divers magazines, or accepted from my own personal knowledge.\n\nThe existence of a religion supposes a Scripture, and in this case it may be admitted, almost without severe verification, that the Evangel of the Witches is really a very old work.\n\nThus it is often evident that where a tradition has been taken down from verbal delivery, the old woman repeats words or sentences by whole chapters which she does not fully understand, but has heard and learned.\n\nThese are to be verified by correlation or comparison with other tales and texts.\n\nNow considering all this most carefully and critically, or severely yet impartially, no one can resist the conviction that in the Gospel of the Witches we have a book which is in all probability the translation of some early or later Latin work, since it seems most probable that every fixed faith finds its record.\n\nThere are literary men among the Pariahs of India; there were probably many among the minions of the moon, or nocturnal worshippers of Diana .\n\nIn fact, I am not without hope that research may yet reveal in the writings of some long-forgotten heretic or mystic of the dark ages the parallel of many passages in this text, if not the whole of it.\n\nYet a few years, reader, and all this will have vanished from among the Italians before the newspaper and railroad, even as a light cloud is driven before a gale, or pass away like snowflakes in a pond.\n\nOld traditions are, in fact, disappearing with such incredible rapidity that I am assured on best authority--and can indeed see for myself that what I collected or had recorded for me ten years ago in the Romagna Toscana, with exceptionably skilful aid, could not now be gathered at all by anybody, since it no longer exists, save in the memories of a few old sorcerers who are daily disappearing, leaving no trace behind.\n\nIt is going--going--it is all but gone; in fact, I often think that, old as I am (and I am twelve years beyond the limit of extreme old age as defined by the Duke of Marlborough in his defence), I shall yet live to hear the rap of the auctioneer Time as he bids off the last real Latin sorcerer to Death!\n\nIt may be that he is passing in his checks even as I write."

