[content]
body = "Sempre addormentato resterai, Di un sonno che tutto sentirai, E la tua bella tu vedrai, Ma parlare non potrai Nel vedere la tua bella, Volontà di fare al amore Verra e non la potrai fare Come una candela ti struggera, Ti struggerai poco a poco, Come una candele a fuoco, Tu non potrai vivère Tu non potrai stare, Ti sentirai mancare, Che il tuo cuore ritto sempre possa stare E al amore più non potrai fare Per l'amore che io te ho portata vo, Sia convertito intanto odio Che questo Endamone e la mia vendetta, E cosi sono contenta.\n\nThe Spell.\n\nThis bag for Endamon' I wove, It is my vengeance for the love, For the deep love I had for thee, Which thou would'st not return to me, But bore it all to Tana's shrine., And Tana never shall be thine!\n\nNow every night in agony By me thou shalt oppressed be!\n\nFrom day to day, from hour to hour, I'll make thee feel the witch's power, With passion thou shalt be tormented, And yet with pleasure ne'er contented; Enwrapped in slumber thou shalt lie, To know that thy beloved is by, And, ever dying, never die, Without the power to speak a word, Nor shall her voice by thee be heard; Tormented by Love's agony, There shall be no relief for thee!\n\nFor my strong spell thou canst not break, And from that sleep thou ne'er shalt wake: Little by little thou shalt waste, Like taper by the embers placed.\n\nLittle by little thou shalt die, Yet, ever living, tortured lie, Strong in desire, yet ever weak, Without the power to move or speak, With all the love I had for thee Shalt thou thyself tormented be, Since all the love I felt of late I'll make thee feel in burning hate, For ever on thy torture bent, I am revenged, and now content.\n\nBut Tana, who was far more powerful than the witch, though not able to break the spell by which he was compelled to sleep, took from him all pain (he knew her in dreams), and embracing him, she sang this counter-charm.\n\nThe Song of Diana.\n\nEndamone, Endamone, Endamone!\n\nPer l'amore chi mi porti e che io pure, Ti porto tre croci su questo letto!"

