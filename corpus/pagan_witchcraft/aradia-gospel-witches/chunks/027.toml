[content]
body = "First with three drops of oil I do remove All evil influence, and I humbly pray, O beautiful Diana , unto thee That thou wilt take it all away from me, And send it all to my worst enemy!\n\nWhen the evil fortune Is taken from me, I'll cast it out to the middle of the street: And if thou wilt grant me this favour, O beautiful Diana, Every bell in my house shall merrily ring!\n\nThen well contented I will go forth to roam, Because I shall be sure that with thy aid I shall discover ere I return Some fine and ancient books, And at a moderate price.\n\nAnd thou shalt find the man, The one who owns the book, And thou thyself wilt go And put it in his mind, Inspiring him to know What 'tis that thou would'st find And move him into doing All that thou dost require.\n\nOr if a manuscript Written in ancient days, Thou'lt gain it all the same, It shall come in thy way, And thus at little cost.\n\nThou shalt buy what thou wilt, By great Diana's aid.\n\nThe foregoing was obtained, after some delay, in reply to a query as to what conjuration would be required before going forth, to make sure that one should find for sale some rare book, or other object desired, at a very moderate price.\n\nTherefore the invocation has been so worded as to make it applicable to literary finds; but those who wish to buy anything whatever on equally favourable terms, have but to vary the request, retaining the introduction, in which the magic virtue consists.\n\nI cannot, however, resist the conviction that it is most applicable to, and will succeed best with, researches for objects of antiquity, scholarship, and art, and it should accordingly be deeply impressed on the memory of every bric-à-brac hunter and bibliographer.\n\nIt should be observed, and that earnestly, that the prayer, far from being answered, will turn to the contrary or misfortune, unless the one who repeats it does so in fullest faith, and this cannot be acquired by merely saying to oneself, \"I believe.\" For to acquire real faith in anything requires long and serious mental discipline, there being, in fact, no subject which is so generally spoken of and so little understood.\n\nHere, indeed, I am speaking seriously, for the man who can train his faith to actually believe in and cultivate or develop his will can really work what the world by common consent regards as miracles.\n\nA time will come when this principle will form not only the basis of all education, but also that of all moral and social culture.\n\nI have, I trust, fully set it forth in a work entitled \"Have you a Strong Will?\n\nor how to Develop it or any other Faculty or Attribute of the Mind, and render it Habitual,\" &c.\n\nLondon: George Redway."

