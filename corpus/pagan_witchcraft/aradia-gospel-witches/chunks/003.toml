[content]
body = "With one of these I became intimately acquainted in 1886, and have ever since employed her specially to collect among her sisters of the hidden spell in many places all the traditions of the olden time known to them.\n\nIt is true that I have drawn from other sources, but this woman by long practice has perfectly learned what few understand, or just what I want, and how to extract it from those of her kind.\n\nAmong other strange relics, she succeeded, after many years, in obtaining the following \"Gospel,\" which I have in her handwriting.\n\nA full account of its nature with many details will be found in an Appendix.\n\nI do not know definitely whether my informant derived a part of these traditions from written sources or oral narration, but believe it was chiefly the latter.\n\nHowever, there are a few wizards who copy or preserve documents relative to their art.\n\nI have not seen my collector since the \"Gospel\" was sent to me.\n\nI hope at some future time to be better informed.\n\nFor brief explanation I may say that witch craft is known to its votaries as la vecchia religione , or the old religion, of which Diana is the Goddess, her daughter Aradia (or Herodias) the female Messiah, and that this little work sets forth how the latter was born, came down to earth, established witches and witchcraft, and then returned to heaven.\n\nWith it are given the ceremonies and invocations or incantations to be addressed to Diana and Aradia , the exorcism of Cain, and the spells of the holy-stone, rue, and verbena, constituting, as the text declares, the regular church-service, so to speak, which is to be chanted or pronounced at the witch-meetings.\n\nThere are also included the very curious incantations or benedictions of the honey, meal, and salt, or cakes of the witch-supper, which is curiously classical, and evidently a relic of the Roman Mysteries.\n\nThe work could have been extended ad infinitum by adding to it the ceremonies and incantations which actually form a part of the Scripture of Witchcraft, but as these are nearly all--or at least in great number--to be found in my works entitled Etruscan-Roman Remains and Legends of Florence , I have hesitated to compile such a volume before ascertaining whether there is a sufficiently large number of the public who would buy such a work.\n\nSince writing the foregoing I have met with and read a very clever and entertaining work entitled Il Romanzo dei Settimani , G.\n\nCavagnari, 1889, in which the author, in the form of a novel, vividly depicts the manners, habits of thought, and especially the nature of witchcraft, and the many superstitions current among the peasants in Lombardy."

