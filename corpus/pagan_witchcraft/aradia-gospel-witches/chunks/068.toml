[content]
body = "The Children of Diana, or How the Fairies Were Born All things were made by Diana, the great spirits of the stars, men in their time and place, the giants which were of old, and the dwarfs who dwell in the rocks, and once a month worship her with cakes.\n\nThere was once a young man who was poor, with out parents, yet was he good.\n\nOne night he sat in a lonely place, yet it was very beautiful, and there he saw a thousand little fairies, shining white, dancing in the light of the full moon.\n\n\"Gladly would I be like you, O fairies!\" said the youth, \"free from care, needing no food.\n\nBut what are ye?\" \"We are moon-rays, the children of Diana,\" replied one:-- \"We are children of the Moon; We are born of shining light; When the Moon shoots forth a ray, Then it takes a fairy's form.\n\n\"And thou art one of us because thou wert born when the Moon, our mother Diana, was full; yes, our brother, kin to us, belonging to our band.\n\n\"And if thou art hungry and poor...\n\nand wilt have money in thy pocket, then think upon the Moon, on Diana, unto who thou wert born; then repeat these words:-- \"'Luna mia, bella Luna!\n\nPiù di una altra stella; Tu sei sempre bella!\n\nPortatemi la buona fortuna!' \"'Moon, Moon, beautiful Moon!\n\nFairer far than any star; Moon, O Moon, if it may be, Bring good fortune unto me!' \"And then, if thou has money in thy pocket, thou wilt have it doubled.\n\n\"For the children who are born in a full moon are sons or daughters of the Moon, especially when they are born of a Sunday when there is a high tide.\n\n\"'Alta marea, luna piena, sai, Grande uomo sicuro tu sarei.' \"'Full moon, high sea, Great man shalt thou be!' Then the young man, who had only a paolo in his purse, touched it, saying:-- \"Luna mia, bella Luna, Mia sempre bella Luna!\" \"Moon, Moon, beautiful Moon, Ever be my lovely Moon!\" And so the young man, wishing to make money, bought and sold and made money, which he doubled every month.\n\nBut it came to pass that after a time, during one month he could sell nothing, so made nothing.\n\nSo by night he said to the Moon-- \"Luna mia, Luna bella!\n\nChe io amo più di altra stella!"

