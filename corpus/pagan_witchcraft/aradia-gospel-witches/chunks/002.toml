[content]
body = "PREFACE If the reader has ever met with the works of the learned folk-lorist G.\n\nPitré, or the articles contributed by \"Lady Vere De Vere\" to the Italian Rivista , or that of J.\n\nH.\n\nAndrews to Folk-Lore , he will be aware that there are in Italy great numbers of strege , fortune-tellers or witches, who divine by cards, perform strange ceremonies in which spirits are supposed to be invoked, make and sell amulets, and, in fact, comport themselves generally as their reputed kind are wont to do, be they Black Voodoos in America or sorceresses anywhere.\n\nBut the Italian strega or sorceress is in certain respects a different character from these.\n\nIn most cases she comes of a family in which her calling or art has been practised for many generations.\n\nI have no doubt that there are in stances in which the ancestry remounts to mediæval, Roman, or it may be Etruscan times.\n\nThe result has naturally been the accumulation in such families of much tradition.\n\nBut in Northern Italy, as its literature indicates, though there has been some slight gathering of fairy tales and popular superstitions by scholars, there has never existed the least interest as regarded the strange lore of the witches, nor any suspicion that it embraced an incredible quantity of old Roman minor myths and legends, such as Ovid has recorded, but of which much escaped him and all other Latin writers.\n\nThis ignorance was greatly aided by the wizards themselves, in making a profound secret of all their traditions, urged thereto by fear of the priests.\n\nIn fact, the latter all unconsciously actually contributed immensely to the preservation of such lore, since the charm of the forbidden is very great, and witchcraft, like the truffle, grows best and has its raciest flavour when most deeply hidden.\n\nHowever this may be, both priest and wizard are vanishing now with incredible rapidity--it has even struck a French writer that a Franciscan in a railway carriage is a strange anomaly--and a few more years of newspapers and bicycles (Heaven knows what it will be when flying-machines appear!) will probably cause an evanishment of all.\n\nHowever, they die slowly, and even yet there are old people in the Romagna of the North who know the Etruscan names of the Twelve Gods, and invocations to Bacchus, Jupiter, and Venus, Mercury, and the Lares or ancestral spirits, and in the cities are women who prepare strange amulets, over which they mutter spells, all known in the old Roman time, and who can astonish even the learned by their legends of Latin gods, mingled with lore which may be found in Cato or Theocritus."

