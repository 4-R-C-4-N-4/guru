[content]
body = "CHAPTER II The Sabbat: Treguenda or Witch-Meeting--How to Consecrate the Supper Here follows the supper, of what it must consist, and what shall be said and done to consecrate it to Diana.\n\nYou shall take meal and salt, honey and water, and make this incantation: Scongiurazione della Farina.\n\nScongiuro te, o farina!\n\nChe sei il corpo nostro--senza di te Non si potrebbe vivere--tu che Prima di divenire la farina, Sei stata sotto terra, dove tutti Sono nascosti tutti in segreti, Maccinata che siei a metterte al vento, Tu spolveri per l'aria e te ne fuggi Portando con te i tuoi segreti!\n\nMa quando grano sarai in spighe, In spige belle che le lucciole, Vengeno a farti lume perche tu Possa crescere piú bella, altrimenti Tu non potresti crescere a divenire bella, Dunque anche tu appartieni Alle Strege o alle Fate, perche Le lucciole appartengono Al sol...\n\nLucciola caporala, Vieni corri e vieni a gara, Metti la briglia a la cavalla!\n\nMetti la briglia al figluolo del ré!\n\nVieni, corri e portala a mé!\n\nIl figluol del ré te lasciera andare Pero voglio te pigliare, Giache siei bella e lucente, Ti voglio mettere sotto un bicchiere E quardarti colla lente; Sotto un bicchiere in staraí Fino che tutti i segreti, Di questo mondo e di quell'altro non mi farai Sapere e anche quelle del grano, E della farina appena, Questi segreti io saprò, Lucciola mia libera ti lascieró Quando i segreti della terra io sapró Tu sia benedetta ti diro!\n\nScongiurazione del Sale.\n\nScongiuro il sale suona mezza giòrno, In punto in mezzo a un fiume, Entro e qui miro l'acqua.\n\nL'acqua e al sol altro non penso, Che a l'acqua e al sol, alloro La mia menta tutta e rivolta, Altro pensier non ho desidero, Saper la verissima che tanto tempo é Che soffro, vorrei saper il mio avenir, Se cattivo fosse, acqua e sol Migliorate il destino mio!\n\nThe Conjuration of Meal.\n\nI conjure thee, O Meal!"

