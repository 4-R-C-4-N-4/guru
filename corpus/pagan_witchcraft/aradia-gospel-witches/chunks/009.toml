[content]
body = "\"Ye who are poor suffer with hunger keen, And toll in wretchedness, and suffer too Full oft imprisonment; yet with it all Ye have a soul, and for your sufferings Ye shall be happy in the other world, But ill the fate of all who do ye wrong!\" Now when Aradia had been taught, taught to work all witchcraft, how to destroy the evil race (of oppressors) she (imparted it to her pupils) and said unto them: Quando io saro partita da questo mondo, Qualunque cosa che avrete bisogna, Una volta al mese quando la luna E piena...\n\nDovete venire in luogo deserto, In una selva tutte insieme, E adorare lo spirito potente Di mia madre Diana, e chi vorra Imparare la stregonerie, Che non la sopra, Mia madre le insegnera, Tutte cose....\n\nSarete liberi della schiavitù!\n\nE cosi diverrete tutti liberi!\n\nPero uomini e donne Sarete tutti nudi, per fino.\n\nChe non sara morto l'ultimo Degli oppressori e morto, Farete il giuoco della moccola Di Benevento, e farete poi Una cena cosi: Translation.\n\nWhen I shall have departed from this world, Whenever ye have need of anything, Once in the month, and when the moon is full, Ye shall assemble in some desert place, Or in a forest all together join To adore the potent spirit of your queen, My mother, great Diana .\n\nShe who fain Would learn all sorcery yet has not won Its deepest secrets, them my mother will Teach her, in truth all things as yet unknown.\n\nAnd ye shall all be freed from slavery, And so ye shall be free in everything; And as the sign that ye are truly free, Ye shall be naked in your rites, both men And women also: this shall last until The last of your oppressors shall be dead; And ye shall make the game of Benevento, Extinguishing the lights, and after that Shall hold your supper thus:"

