[content]
body = "Though the air be set to a different key, this is a poem of pure melody, and the same as Wordsworth's \"Goody Blake and Harry Gill.\" Both Tana and the old dame are surprised and terrified; both pray to a power above:-- \"The cold, cold moon above her head, Thus on her knees did Goody pray; Young Harry heard what she had said, And icy cold he turned away.\" The dramatic centre is just the same in both.\n\nThe English ballad soberly turns into an incurable fit of ague inflicted on a greedy young boor; the Italian witch-poetess, with finer sense, or with more sympathy for the heroine, casts the brute aside without further mention, and apotheosises the maiden, identifying her with the Moon.\n\nThe former is more practical and probable, the latter more poetical .\n\nAnd here it is worth while, despite digression, to remark what an immense majority there are of people who can perceive, feel, and value poetry in mere words or form --that is to say, objectively--and hardly know or note it when it is presented subjectively or as thought, but not put into some kind of verse or measure, or regulated form.\n\nThis is a curious experiment and worth studying.\n\nTake a passage from some famous poet; write it out in pure simple prose, doing full justice to its real meaning, and if it still actually thrills or moves as poetry, then it is of the first class.\n\nBut if it has lost its glamour absolutely, it is second-rate or inferior; for the best cannot be made out of mere words varnished with associations, be they of thought or feeling.\n\nThis is not such a far cry from the subject as might be deemed.\n\nReading and feeling them subjectively, I am often struck by the fact that in these witch traditions which I have gathered there is a wondrous poetry of thought, which far excels the efforts of many modern bards, and which only requires the aid of some clever workman in words to assume the highest rank.\n\nA proof of what I have asserted may be found in the fact that, in such famous poems as the Finding of the Lyre , by James Russell Lowell, and that on the invention of the pipe by Pan, by Mrs.\n\nBrowning, that which formed the most exquisite and refined portion of the original myths is omitted by both authors, simply because they missed or did not perceive it.\n\nFor in the former we are not told that it was the breathing of the god Air (who was the inspiring soul of ancient music, and the Bellaria of modern witch-mythology) on the dried filament of the tortoise, which suggested to Hermes the making an instrument wherewith he made the music of the spheres and guided the course of the planets.\n\nAs for Mrs."

