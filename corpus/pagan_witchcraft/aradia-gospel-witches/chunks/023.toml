[content]
body = "If this grace I gain from thee Give a sign, I pray, to me!\n\nEre the third day Shall pass away, Let me either hear or see A roaring wind, a rattling rain, Or hall a clattering on the plain; Till one of these three signs you show, Peace, Diana , thou shalt not know.\n\nAnswer well the prayer I've sent thee, Or day and night will I torment thee!\n\nAs the orange was the fruit of the Sun, so is the lemon suggestive of the Moon or Diana, its colour being of the lighter yellow.\n\nHowever, the lemon specially chosen for the charm is always a green one, because it \"sets hard\" and turns black.\n\nIt is not generally known that orange and lemon peel, subjected to pressure and combined with an adhesive may be made into a hard substance which can be moulded or used for many purposes.\n\nI have devoted a chapter to this in an as yet unpublished work entitled One Hundred Minor Arts .\n\nThis was suggested to me by the hardened lemon given to me for a charm by a witch."

