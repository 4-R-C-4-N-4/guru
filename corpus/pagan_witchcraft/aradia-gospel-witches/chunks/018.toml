[content]
body = "ever be a benefit, And may thy blessing be upon the witch Or on the fairy who did give thee to me!\" It was Diana who did come to me, All in the night in a dream, and said to me: \"If thou would'st keep all evil folk afar, Then ever keep the vervain and the rue Safely beside thee!\" Great Diana !\n\nthou Who art the queen of heaven and of earth, And of the infernal lands--yea, thou who art Protectress of all men unfortunate, Of thieves and murderers, and of women too Who lead an evil life, and yet hast known That their nature was not evil, thou, Diana, Hast still conferred on them some joy in life.\n\nOr I may truly at another time So conjure thee that thou shalt have no peace Or happiness, for thou shalt ever be In suffering until thou grantest that Which I require in strictest faith from thee!\n\n[Here we have again the threatening the deity, just as in Eskimo or other Shamanism, which represents the rudest primitive form of conjuring, the spirits are menaced.\n\nA trace of this is to be found among rude Roman Catholics.\n\nThus when St.\n\nBruno, some years ago, at a town in the Romagna, did not listen to the prayers of his devotees for rain, they stuck his image in the mud of the river, head downwards.\n\nA rain speedily followed, and the saint was restored in honour to his place in the church.] The Spell or Conjuration of the Round Stone.\n\nThe finding a round stone, be it great or small, is a good sign ( e buono augurio ), but it should never be given away, because the receiver will then get the good luck, and some disaster befall the giver.\n\nOn finding a round stone, raise the eyes to heaven, and throw the stone up three times (catching it every time), and say:-- Spirito del buono augurio!\n\nSei venuto in mio soccorso, Credi ne avevo gran bisogno, Spirito del folletino rosso Giacche sei venuto in mio soccorso, Ti prego di non mi abbandonare!\n\nTi prego dentro questa palla d'intrare, E nella mia tasca tu possa portare, Cosi in qualunque mia bisogna, In mio aiuto ti posso chiamare, E di giorno e di notte, Tu non mi possa abbandonare.\n\nSe danari da qualchuno avanzerò E non mi vorra pagare, Tu folletino rosso me il farei dare!\n\nSi questo di non darmeli, Si in testera tu vi anderai E col tua Brié--brié!"

