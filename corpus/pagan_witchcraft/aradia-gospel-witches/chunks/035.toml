[content]
body = "The ancient myth is, to begin with, one of darkness and light, or day and night, from which are born the fifty-one (now fifty-two) weeks of the year.\n\nThis is Diana, the night, and Apollo, the sun, or light in another form.\n\nIt is expressed as love-making during sleep, which, when it occurs in real life, generally has for active agent some one who, without being absolutely modest, wishes to preserve appearances.\n\nThe established character of Diana among the Initiated (for which she was bitterly reviled by the Fathers of the Church) was that of a beautiful hypocrite who pursued amours in silent secrecy.\n\n\"Thus as the moon Endymion lay with her, So did Hippolytus and Verbio.\" (On which the reader may consult Tertullian, De Falsa Religione , lib.\n\nii.\n\ncap.\n\n17, and Pico de Mirandula, La Strega .) But there is an exquisitely subtle, delicately strange idea or ideal in the conception of the apparently chaste \"clear cold moon\" casting her living light by stealth into the hidden recesses of darkness and acting in the occult mysteries of love or dreams.\n\nSo it struck Byron as an original thought that the sun does not shine on half the forbidden deeds which the moon witnesses, and this is emphasised in the Italian witch-poem.\n\nIn it the moon is distinctly invoked as the protectress of a strange and secret amour, and as the deity to be especially invoked for such love-making.\n\nThe one invoking says that the window is opened, that the moon may shine splendidly on the bed, even as our love is bright and beautiful...\n\nand I pray her to give great rapture-- sfogo --to us.\n\nThe quivering, mysteriously beautiful light of the moon, which seems to cast a spirit of intelligence or emotion over silent Nature, and dimly half awaken it--raising shadows into thoughts and causing every tree and rock to assume the semblance of a living form, but one which, while shimmering and breathing, still sleeps in a dream--could not escape the Greeks, and they expressed it as Diana embracing Endymion.\n\nBut as night is the time sacred to secrecy, and as the true Diana of the Mysteries was the Queen of Night, who wore the crescent moon, and mistress of all hidden things, including \"sweet secret sins and loved iniquities,\" there was attached to this myth far more than meets the eye.\n\nAnd Just in the degree to which Diana was believed to be Queen of the emancipated witches and of Night, or the nocturnal Venus-Astarte herself, so far would the love for the sleeping Endymion be understood as sensual, yet sacred and allegorical.\n\nand it is entirely in this sense that the witches in Italy, who, may claim with some right to be its true inheritors, have preserved and understood the myth."

