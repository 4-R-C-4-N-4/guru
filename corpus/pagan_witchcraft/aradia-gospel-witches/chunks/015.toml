[content]
body = "CHAPTER III How Diana Made the Stars and the Rain Diana was the first created before all creation; in her were all things; out of herself, the first darkness, she divided herself; into darkness and light she was divided.\n\nLucifer, her brother and son, herself and her other half, was the light.\n\nAnd when Diana saw that the light was so beautiful, the light which was her other half, her brother Lucifer, she yearned for it with exceeding great desire.\n\nWishing to receive the light again into her darkness, to swallow it up in rapture, in delight, she trembled with desire.\n\nThis desire was the Dawn.\n\nBut Lucifer, the light, fled from her, and would not yield to her wishes; he was the light which files into the most distant parts of heaven, the mouse which flies before the cat.\n\nThen Diana went to the fathers of the Beginning, to the mothers, the spirits who were before the first spirit, and lamented unto them that she could not prevail with Lucifer.\n\nAnd they praised her for her courage, they told her that to rise she must fall; to become the chief of goddesses she must become a mortal.\n\nAnd in the ages, in the course of time, when the world was made, Diana went on earth, as did Lucifer, who had fallen, and Diana taught magic and sorcery, whence came witches and fairies and goblins--all that is like man, yet not mortal.\n\nAnd it came thus that Diana took the form of a cat.\n\nHer brother had a cat whom he loved beyond all creatures, and it slept every night on his bed, a cat beautiful beyond all other creatures, a fairy: he did not know it.\n\nDiana prevailed with the cat to change forms with her, so she lay with her brother, and in the darkness assumed her own form, and so by Lucifer became the mother of Aradia.\n\nBut when in the morning he found that he lay by his sister, and that light had been conquered by darkness, Lucifer was extremely angry; but Diana sang to him a spell, a song of power, and he was silent, the song of the night which soothes to sleep; he could say nothing.\n\nSo Diana with her wiles of witchcraft so charmed him that he yielded to her love.\n\nThis was the first fascination, she hummed the song, it was as the buzzing of bees (or a top spinning round), a spinning-wheel spinning life.\n\nShe spun the lives of all men; all things were spun from the wheel of Diana .\n\nLucifer turned the wheel.\n\nDiana was not known to the witches and spirits, the fairies and elves who dwell in desert place, the goblins, as their mother; she hid herself in humility and was a mortal, but by her will she rose again above all.\n\nShe had such passion for witchcraft, and became so powerful therein, that her greatness could not be hidden."

