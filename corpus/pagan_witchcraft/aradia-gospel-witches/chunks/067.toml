[content]
body = "Rolfe tacitly and unconsciously confirms what I have written, and what is most remarkable in this my own work, is that the wizards in Italy form a distinct class, still exercising great power in Naples and Sicily, and even possessing very curious magical documents and cabalistic charts, one of which (familiar to those who have seen it among the Takruri and Arab sorcerers in Cairo, in their books) he gives.\n\nThese probably are derived from Malta.\n\nTherefore it will not seem astonishing to the reader that this Gospel of the Witches should have been preserved, even as I have given it.\n\nThat I have not had or seen it in an old MS.\n\nis certainly true, but that it has been written of yore, and is still repeated here and there orally, in separate parts, I am sure.\n\nIt would be a great gratification to me if any among those into whose hands this book may fall, who may possess information confirming what is here set forth, would kindly either communicate it or publish it in some form, so that it may not be lost."

