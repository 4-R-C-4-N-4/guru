[content]
body = "Thou who rulest the tide, Who shinest by night on the sea, Casting light upon the waters; Thou who art mistress of the ocean In thy boat made like a crescent, Crescent moon-bark brightly gleaming, Ever smiling high in heaven, Sailing too on earth, reflected In the ocean, on its water; We implore thee give this sleeper, Give unto this good Melambo The great gift of understanding What all creatures say while talking!\" This legend contains much that is very curious; among other things an invocation to the firefly, one to Mefitia, the goddess of malaria, and a long poetic prophecy relative to the hero.\n\nIt is evidently full of old Latin mythologic lore of a very marked character.\n\nThe whole of it may be found in a forthcoming work by the writer of the book, entitled, \"The Unpublished Legends of Virgil.\" London, Elliot Stock.\n\nNext: Diana as Giving Beauty and Restoring Strength"

