[content]
body = "I drink, and yet it is not wine I drink, I drink the blood of Diana , Since from wine it has changed into her blood, And spread itself through all my growing vines, Whence it will give me good return in wines, Though even if good vintage should be mine, I'll not be free from care, for should it chance That the grape ripens in the waning moon, Then all the wine would come to sorrow, but If drinking from this horn I drink the blood-- The blood of great Diana --by her aid-- If I do kiss my hand to the new moon, Praying the Queen that she will guard my grapes, Even from the instant when the bud is horn Until it is a ripe and perfect grape, And onward to the vintage, and to the last Until the wine is made--may it be good!\n\nAnd may it so succeed that I from it May draw good profit when at last 'tis sold, So may good fortune come unto my vines, And into all my land where'er it be!\n\nBut should my vines seem in an evil way, I'll take my horn, and bravely will I blow In the wine-vault at midnight, and I'll make Such a tremendous and a terrible sound That thou, Diana fair, however far Away thou may'st be, still shalt hear the call, And casting open door or window wide, Shalt headlong come upon the rushing wind, And find and save me--that is, save my vines, Which will be saving me from dire distress; For should I lose them I'd be lost myself, But with thy aid, Diana , I'll be saved .\n\nThis is a very interesting invocation and tradition, and probably of great antiquity from very striking intrinsic evidence.\n\nFor it is firstly devoted to a subject which has received little attention--the connection of Diana as the moon with Bacchus, although in the great Dizionario Storico Mitologico , by Pozzoli and others, it is expressly asserted that in Greece her worship was associated with that of Bacchus, Esculapius, and Apollo.\n\nThe connecting link is the horn .\n\nIn a medal of Alexander Severus, Diana of Ephesus bears the horn of plenty.\n\nThis is the horn or horns of the new moon, sacred to Diana.\n\nAccording to Callimachus, Apollo himself built an altar consisting entirely of horns to Diana .\n\nThe connection of the horn with wine is obvious.\n\nIt was usual among the old Slavonians for the priest of Svantevit, the Sun-god, to see if the horn which the idol held in his hand was full of wine, in order to prophesy a good harvest for the coming year.\n\nIf it was filled, all was right; if not, he filled the horn, drank from it, and replaced the horn in the hand, and predicted that all would eventually go well."

