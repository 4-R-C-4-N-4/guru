[content]
body = "There is, however, in the Evangel of the Witches an effort made to distinguish between the naturally wicked or corrupt and those who are outcasts or oppressed, as appears from the passage:-- \"Yet like Cain's daughter (offspring) thou shalt never be, Nor like the race who have become at last Wicked and infamous from suffering, As are the Jews and wandering Zingari, Who are all thieves: like them ye shall not be.\" The supper of the Witches, the cakes of meal, salt, and honey, in the form of crescent moons, are known to every classical scholar.\n\nThe moon or horn-shaped cakes are still common.\n\nI have eaten of them this very day, and though they are known all over the world, I believe they owe their fashion to tradition.\n\nIn the conjuration of the meal there is a very curious tradition introduced to the effect that the spige or glittering grains of wheat from which spikes shoot like sun-rays, owe their brilliant like ness to a resemblance to the fire-fly, \"who comes to give them light.\" We have, I doubt not, in this a classic tradition, but I cannot verify it.\n\nHere upon the Vangelo cites a common nursery-rhyme, which may also be found in a nursery-tale, yet which, like others, is derived from witch-lore, by which the lucciola is put under a glass and conjured to give by its light certain answers.\n\nThe conjuration of the meal or bread, as being literally our body as contributing to form it, and deeply sacred because it had lain in the earth, where dark and wondrous secrets bide, seems to cast a new light on the Christian sacrament.\n\nIt is a type of resurrection from the earth, and was therefore used at the Mysteries and Holy Supper, and the grain had pertained to chthonic secrets, or to what had been under the earth in darkness.\n\nThus even earth-worms are invoked in modern witchcraft as familiar with dark mysteries, and the shepherd's pipe to win the Orphic power must be buried three days in the earth.\n\nAnd so all was, and is, in sorcery a kind of wild poetry based on symbols, all blending into one another, light and darkness, fire-flies and grain, life and death.\n\nVery strange indeed, but very strictly according to ancient magic as described by classic authorities, is the threatening Diana , in case she will not grant a prayer.\n\nThis recurs continually in the witch-exorcisms or spells.\n\nThe magus , or witch, worships the spirit, but claims to have the right, drawn from a higher power, to compel even the Queen of Earth, Heaven, and Hell to grant the request.\n\n\"Give me what I ask, and thou shalt have honour and offerings; refuse, and I will vex thee by insult.\" So Canidia and her kind boasted that they could compel the gods to appear."

