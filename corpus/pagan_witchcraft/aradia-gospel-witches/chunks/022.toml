[content]
body = "This is evident, since in it the incantation is confused with a prose direction how to act.] Saying this, one looks up at the sky, and I found the lemon in one hand, and a voice said to me-- \"Take many pins, and carefully stick them in the lemon, pins of many colours; and as thou wilt have good luck, and if thou desirest to give the lemon to any one or to a friend, thou shouldst stick in it many pins of varied colours.\n\n\"But if thou wilt that evil befall any one, put in it black pins.\n\n\"But for this thou must pronounce a different incantation (thus)\":-- Dia Diana , a te scongiuro!\n\nE te chiamo ad alta voce!\n\nChe tu non abbia pace ne bene Se non viene in mio aiuto Domani al punto di mezzo giorno, Ti aspetto a quello punto Un bicchiere di vino portero, E una piccola lente al occhio E dentro tredici spilli, Spilli neri vi metterò, E tu Diana tutti I diavoli dell' inferno chiamerai, E in compagnia del sole il manderai, E tutto il fuoco dell'inferno preso di se Lo porteranno, e daranno forza, Al sole di farmi questo vino bollire, Perche questi spilli possano arroventire, E con questi il limone apunteró Per non dare più pace, E ne bene alla persona Che questo limone le presenterò!\n\nSe questa grazia mi farete, Un segnale mi darete, Dentro tre giorni, Una cosa voglio vedere, O vento, o acqua, o grandine, Se questo segnale non avró, Piu pace Diana non te darò, Tanto di giorno che di notte, Sempre ti tormenterò.\n\nThe Invocation to Diana.\n\nGoddess Diana, I do conjure thee And with uplifted voice to thee I call, That thou shalt never have content or peace Until thou comest to give me all thy aid.\n\nTherefore to-morrow at the stroke of noon I'll wait for thee, bearing a cup of wine, Therewith a lens or a small burning-glass.\n\nAnd thirteen pins I'll put into the charm; Those which I put shall all indeed be black, But thou, Diana , thou wilt place them all!\n\nAnd thou shalt call for me the fiends from hell; Thou'lt send them as companions of the Sun, And all the fire infernal of itself Those fiends shall bring, and bring with it the, power Unto the Sun to make this (red) wine boil, So that these pins by heat may be red-hot, And with them I do fill the lemon here, That unto her or him to who 'tis given is Peace and prosperity shall be unknown."

