[content]
body = "In the case of fire and water we would admit contrariety if it were not for their common element, the Matter, about which are gathered the warmth and dryness of one and the dampness and cold of the other: if there were only present what constitutes their distinct kinds, the common ground being absent, there would be, here also, essence contrary to essence.\n\nIn sum, things utterly sundered, having nothing in common, standing at the remotest poles, are opposites in nature: the contrariety does not depend upon quality or upon the existence of a distinct genus of beings, but upon the utmost difference, clash in content, clash in effect.\n\nNext: Section 7"

