[content]
body = "The rise of all these forms of being and their modification, whether to their loss or gain, all goes to the fulfillment of the natural unhindered life of that one living being: for it was not possible for the single thing to be as if it stood alone; the final purpose could not serve to that only end, intent upon the partial: the concern must be for the whole to which each item is member: things are different both from each other and in their own stages, therefore cannot be complete in one unchanging form of life; nor could anything remain utterly without modification if the All is to be durable; for the permanence of an All demands varying forms.\n\nNext: Section 33"

