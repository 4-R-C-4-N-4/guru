[content]
body = "He had my work read to him by Amelius: at the end he smiled and said: 'You must clear up these difficulties, Amelius: Porphyry doesn't understand our position.' Amelius wrote a tract of considerable length In answer to Porphyry's Objections ; I wrote a reply to the reply: Amelius replied to my reply; at my third attempt I came, though even so with difficulty, to grasp the doctrine: then only, I was converted, wrote a recantation, and read it before the circle.\n\nFrom that time on I was entrusted with Plotinus' writings and sought to stir in the master himself the ambition of organizing his doctrine and setting it down in more extended form.\n\nAmelius, too, under my prompting, was encouraged in composition.\n\n19.\n\nLonginus' estimate of Plotinus, formed largely upon indications I myself had given him in my letters, will be gathered from the following extract from one of his to me.\n\nHe is asking me to leave Sicily and join him in Phoenicia, and to bring Plotinus' works with me.\n\nHe says: 'And send them at your convenience or, better, bring them; for I can never cease urging you to give the road towards us the preference over any other.\n\nIf there is no better reason--and what intellectual gain can you anticipate form a visit to us?--at least there are old acquaintances and the mild climate which would do you good in the weak state of health you report.\n\nWhatever else you may be expecting, do not hope for anything new of my own, or even for the earlier works which you tell me you have lost; for there is a sad dearth of copyists here.\n\nI assure you it has taken me all this time to complete my set of Plotinus, and it was done only by calling off my scribe from all his routine work, and keeping him steadily to this one task.\n\n'I think that now, with what you have sent me, I have everything, though in a very imperfect state, for the manuscript is exceeding faulty.\n\nI had expected our friend Amelius to correct the scribal errors, but he evidently had something better to do.\n\nThe copies are quite useless to me; I have been especially eager to examine the treatises On the Soul and On the Authentic-Existent , and these are precisely the most corrupted.\n\nIt would be a great satisfaction to me if you would send me faithful transcripts for collation and return--though again I suggest to you not to send but to come in person, bringing me the correct copies of these treatises and of any that Amelius may have passed over.\n\nAll that he brought with him I have been careful to make my own: how could I be content not to possess myself of all the writings of a man so worthy of the deepest veneration?\n\n'I repeat, what I have often said in your presence and in your absence, as on that occasion when you were at Tyre, that while much of the theory does not convince me, yet I am filled with admiration and delight over the general character of the work, the massive thinking of the man, the philosophic handling of problems; in my judgement investigators must class Plotinus' work with that holding the very highest rank.' 20.\n\nThis extended quotation from the most acute of the critics of our day--a writer who has passed judgement on nearly all his contemporaries--serves to show the estimate he came to set upon Plotinus of whom, at first, misled by ignorant talk, he had held a poor opinion.\n\nHis notion, by the way, that the transcripts he acquired from Amelius were faulty sprang from his misunderstanding of Plotinus' style and phraseology; if there were ever any accurate copies, these were they, faithful reproductions from the author's own manuscript."

