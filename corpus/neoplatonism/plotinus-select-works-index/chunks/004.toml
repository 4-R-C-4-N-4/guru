[content]
body = "From the first year of Gallienus Plotinus had begun to write upon such subjects as had arisen at the Conferences: when I first came to know him in this tenth year of the reign he had composed twenty-one treatises.\n\nThey were, as I was able to establish, by no means given about freely.\n\nIn fact the distribution was still grudging and secret; those that obtained them had passed the strictest scrutiny.\n\nPlotinus had given no titles to these treatises; everybody headed them for himself: I cite them here under the titles which finally prevailed, quoting the first words of each to facilitate identification.\n\n1 1.\n\nOn Beauty (I.6) 2.\n\nOn the Immortality of the Soul (IV.7) 3.\n\nOn Fate (III.1) 4.\n\nOn the Essence of the Soul (IV.2) 5.\n\nOn the Intellectual-Principle, on the Ideas, and on the Authentic-Existent (V.9) 6.\n\nOn the Descent of the Soul into Bodies (IV.8) 7.\n\nHow the Post-Primal derives from the Primal; and on The One(V.4) 8.\n\nWhether all the Souls are One (IV.9) 9.\n\nOn the Good or the One (VI.9) 10.\n\nON the Three Primal Hypostases (V.1) 11.\n\nOn the Origin and Order of the Post-Primals (V.2) 12.\n\nOn the Two Orders of Matter (II.4) 13.\n\nVarious Questions (III.4) 14.\n\nOn the Circular Movement (II.2) 15.\n\nOn our Tutelary Spirit (III.4) 16.\n\nOn the Reasoned Dismissal (I.9) 17.\n\nOn Quality (II.6) 18.\n\nWhether there are Ideas even of Particulars (V.7) 19.\n\nOn the Virtues (I.2) 20.\n\nOn Dialectic (I.3) 21.\n\nWhy the Soul is described as Intermediate between the Existent having parts and the undisparted Existent (IV.1) These are the twenty-one treatises which, as I have said, Plotinus had already written, by his fifty-ninth year, when I first came to him.\n\n5.\n\nI had been, it is true, in Rome a little before this tenth year of Gallienus, but at that time Plotinus was taking a summer holiday, engaging merely in conversation with his friends.\n\nAfter coming to know him I passed six years in close relation with him.\n\nMany question were threshed out in the Conferences of those six years and, under persuasion from Amelius and myself, he composed two treatises to establish: 22, 23.\n\nThat the Authentic-Existent is universally an integral, self-indentical Unity (VI.4,5) In immediate succession to these he composed two more: one is entitled: 24.\n\nThat there is no Intellectual Act in the Principle which transcends the Authentic-Existent; and on the Nature that has the Intellectual Act Primally and that which has it Secondarily (V.6) The other: 25.\n\nOn Potentiality and Actuality (II.5) After these come the following twenty: 26.\n\nOn the Impassibility of the Bodiless (III.6) 27.\n\nOn the Soul, First (IV.3) 28.\n\nOn the Soul, Second (IV.4) 29.\n\nOn the Soul, Third; or, How We See (IV.5) 30.\n\nOn Contemplation (III.8) 31.\n\nOn Intellectual Beauty (V.8) 32.\n\nThat the Intelligibles are not outside the Intellectual-Principle; and on the Good (V.5) 33."

