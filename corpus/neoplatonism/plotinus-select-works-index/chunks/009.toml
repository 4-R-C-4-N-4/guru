[content]
body = "At the Conferences he used to have treatises by various authors read aloud--among the Platonists it might be Severus of Cronius, Numenius, Gaius, or Atticus; and among the Peripatetics Aspasius, Alexander, Adrastus, or some such writer, at the call of the moment.\n\nBut it was far from his way to follow any of these authors blindly; he took a personal, original view, applying Ammonius' method to the investigation of every problem.\n\nHe was quick to absorb; a few words sufficed him to make clear the significance of some profound theory and so to pass on.\n\nAfter hearing Longinus' work On Causes and his Antiquary , he remarked: 'Longinus is a man of letters, but in no sense a philosopher.' One day Origen came to the conference-room; Plotinus blushed deeply and was on the point of bringing his lecture to an end; when Origen begged him to continue, he said: 'The zest dies down when the speaker feels that his hearers have nothing to learn from him.' 15.\n\nOnce on Plato's feast I read a poem, 'The Sacred Marriage'; my piece abounded in mystic doctrine conveyed in veiled words and was couched in terms of enthusiasm; someone exclaimed: 'Porphyry has gone mad'; Plotinus said to me so that all might hear: 'You have shown yourself at once poet, philosopher and hierophant.' The orator Diophanes one day read a justification of the Alcibiades of Plato's Banquet and maintained that the pupil, for the sake of advancement in virtue, should submit to the teacher without reserve, even to the extent of carnal commerce: Plotinus started up several times to leave the room but forced himself to remain; on the breaking up of the company he directed me to write a refutation.\n\nDiophanes refused to lend me his address and I had to depend on my recollection of his argument; but my refutation, delivered before the same audience, delighted Plotinus so much that during the very reading he repeatedly quoted: 'So strike and be a light to men.' When Eubulus, the Platonic Successor, wrote from Athens, sending treatises on some questions in Platonism.\n\nPlotinus had the writings put into my hands with instructions to examine them and report to him upon them.\n\nHe paid some attention to the principles of Astronomy though he did not study the subject very deeply on the mathematical side.\n\nHe went more searchingly into Horoscopy; when once he was convinced that its results were not to be trusted he had no hesitation in attacking the system frequently both at the Conferences and in his writings.\n\n16.\n\nMany Christians of this period--amongst them sectaries who had abandoned the old philosophy, men of the schools of Adelphius and Aquilinus--had possessed themselves of works by Alexander of Libya, by Philocomus, by Demostratus, and bby Lydus, and exhibited also Revelations bearing the names of Zoroaster, Zostrianus, Nicotheus, Allogenes, Mesus, and others of that order.\n\nThus they fooled many, themselves fooled first; Plato, according to them, had failed to penetrate into the depth of Intellectual Being.\n\nPlotinus fequently attacked their position at the Conferences and finally wrote the treatise which I have headed Against the Gnostics : he left to us of the circle the task of examining what he himself passed over.\n\nAmelius proceeded as far as a fortieth treatise in refutation of the book of Zostrianus: I myself have shown on many counts that the Zoroastrian volume is spurious and modern, concocted by the sectaries in order to pretend that the doctrines they had embraced were those of the ancient sage.\n\n17."

