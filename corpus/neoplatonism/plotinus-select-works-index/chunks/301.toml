[content]
body = "No: for there is no first Idea except the Ideal Principle of the Universe- and, by this Idea, Matter is [the seat of] all things at once and of the particular thing in its parts- for the Matter of a living being is disparted according to the specific parts of the organism: if there were no such partition nothing would exist but the Reason-Principle.\n\nNext: Section 19"

