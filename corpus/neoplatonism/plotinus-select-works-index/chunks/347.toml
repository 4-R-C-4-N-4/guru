[content]
body = "Sacred Texts Classics Index Previous Next Section 1 1.\n\nIn our attempt to elucidate the Essence of the soul, we show it to be neither a material fabric nor, among immaterial things, a harmony.\n\nThe theory that it is some final development, some entelechy, we pass by, holding this to be neither true as presented nor practically definitive.\n\nNo doubt we make a very positive statement about it when we declare it to belong to the Intellectual Kind, to be of the divine order; but a deeper penetration of its nature is demanded.\n\nIn that allocation we were distinguishing things as they fall under the Intellectual or the sensible, and we placed the soul in the former class; now, taking its membership of the Intellectual for granted, we must investigate by another path the more specific characteristics of its nature.\n\nThere are, we hold, things primarily apt to partition, tending by sheer nature towards separate existence: they are things in which no part is identical either with another part or with the whole, while, also their part is necessarily less than the total and whole: these are magnitudes of the realm of sense, masses, each of which has a station of its own so that none can be identically present in entirety at more than one point at one time.\n\nBut to that order is opposed Essence [Real-Being]; this is in no degree susceptible of partition; it is unparted and impartible; interval is foreign to it, cannot enter into our idea of it: it has no need of place and is not, in diffusion or as an entirety, situated within any other being: it is poised over all beings at once, and this is not in the sense of using them as a base but in their being neither capable nor desirous of existing independently of it; it is an essence eternally unvaried: it is common to all that follows upon it: it is like the circle's centre to which all the radii are attached while leaving it unbrokenly in possession of itself, the starting point of their course and of their essential being, the ground in which they all participate: thus the indivisible is the principle of these divided existences and in their very outgoing they remain enduringly in contact with that stationary essence.\n\nSo far we have the primarily indivisible- supreme among the Intellectual and Authentically Existent- and we have its contrary, the Kind definitely divisible in things of sense; but there is also another Kind, of earlier rank than the sensible yet near to it and resident within it- an order, not, like body, primarily a thing of part, but becoming so upon incorporation.\n\nThe bodies are separate, and the ideal form which enters them is correspondingly sundered while, still, it is present as one whole in each of its severed parts, since amid that multiplicity in which complete individuality has entailed complete partition, there is a permanent identity; we may think of colour, qualities of all kinds, some particular shape, which can be present in many unrelated objects at the one moment, each entire and yet with no community of experience among the various manifestations.\n\nIn the case of such ideal-forms we may affirm complete partibility.\n\nBut, on the other hand, that first utterly indivisible Kind must be accompanied by a subsequent Essence, engendered by it and holding indivisibility from it but, in virtue of the necessary outgo from source, tending firmly towards the contrary, the wholly partible; this secondary Essence will take an intermediate Place between the first substance, the undivided, and that which is divisible in material things and resides in them.\n\nIts presence, however, will differ in one respect from that of colour and quantity; these, no doubt, are present identically and entire throughout diverse material masses, but each several manifestation of them is as distinct from every other as the mass is from the mass."

