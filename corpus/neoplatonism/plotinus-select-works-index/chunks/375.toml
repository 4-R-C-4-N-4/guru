[content]
body = "Because the soul is not seen and the body is: we perceive the body, and by its movement and sensation we understand that it is ensouled, and we say that it possesses a soul; to speak of residence is a natural sequence.\n\nIf the soul were visible, an object of the senses, radiating throughout the entire life, if it were manifest in full force to the very outermost surface, we would no longer speak of soul as in body; we would say the minor was within the major, the contained within the container, the fleeting within the perdurable.\n\nNext: Section 21"

