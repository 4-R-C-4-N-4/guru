[content]
body = "This is what is conveyed where we are told that the separation is the work of the third Principle and begins within the Third: for to this Third belongs the discursive reasoning which is no function of the Intellectual-Principle but characteristic of its secondary, of Soul, to which precisely, divided by its own Kind, belongs the Act of division.\n\nNext: Section 2"

