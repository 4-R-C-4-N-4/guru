[content]
body = "And again, if that secondary is all things, and if above its multiplicity there is a unity not ranking among those things, once more this unity transcends Real Being and therefore transcends the Intellectual-Principle as well.\n\nThere is thus something transcending Intellectual-Principle, for we must remember that real being is no corpse, the negation of life and of intellection, but is in fact identical with the Intellectual-Principle.\n\nThe Intellectual-Principle is not something taking cognisance of things as sensation deals with sense objects existing independently of sense: on the contrary, it actually is the things it knows: the ideas constituting them it has not borrowed: whence could it have taken them?\n\nNo: it exists here together with the things of the universe, identical with them, making a unity with them; and the collective knowledge [in the divine mind] of the immaterial is the universe of things.\n\nNext: FIFTH TRACTATE"

