[content]
body = "When you enumerate two things- say, animal and beauty- each of these remains one thing; the number is your production; it lay within yourself; it is you that elaborate quantity, here the dyad.\n\nBut when you declare virtue to be a Tetrad, you are affirming a Tetrad which does actually exist; the parts, so to speak, make one thing; you are taking as the object of your act a Unity- Tetrad to which you accommodate the Tetrad within yourself.\n\nNext: Section 17"

