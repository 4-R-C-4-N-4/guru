[content]
body = "Sacred Texts Classics Index Previous Next Section 1 1.\n\nAre not Being and Reality (to on and he ousia) distinct; must we not envisage Being as the substance stripped of all else, while Reality is this same thing, Being, accompanied by the others- Movement, Rest, Identity, Difference- so that these are the specific constituents of Reality?\n\nThe universal fabric, then, is Reality in which Being, Movement, and so on are separate constituents.\n\nNow Movement has Being as an accident and therefore should have Reality as an accident; or is it something serving to the completion of Reality?\n\nNo: Movement is a Reality; everything in the Supreme is a Reality.\n\nWhy, then, does not Reality reside, equally, in this sphere?\n\nIn the Supreme there is Reality because all things are one; ours is the sphere of images whose separation produces grades of difference.\n\nThus in the spermatic unity all the human members are present undistinguishably; there is no separation of head and hand: their distinct existence begins in the life here, whose content is image, not Authentic Existence.\n\nAnd are the distinct Qualities in the Authentic Realm to be explained in the same way?\n\nAre they differing Realities centred in one Reality or gathered round Being- differences which constitute Realities distinct from each other within the common fact of Reality?\n\nThis is sound enough; but it does not apply to all the qualities of this sphere, some of which, no doubt, are differentiations of Reality- such as the quality of two-footedness or four-footedness- but others are not such differentiations of Reality and, because they are not so, must be called qualities and nothing more.\n\nOn the other hand, one and the same thing may be sometimes a differentiation of Reality and sometimes not- a differentiation when it is a constitutive element, and no differentiation in some other thing, where it is not a constitutive element but an accidental.\n\nThe distinction may be seen in the [constitutive] whiteness of a swan or of ceruse and the whiteness which in a man is an accidental.\n\nWhere whiteness belongs to the very Reason-Form of the thing it is a constitutive element and not a quality; where it is a superficial appearance it is a quality.\n\nIn other words, qualification may be distinguished.\n\nWe may think of a qualification that is of the very substance of the thing, something exclusively belonging to it.\n\nAnd there is a qualifying that is nothing more, [not constituting but simply] giving some particular character to the real thing; in this second case the qualification does not produce any alteration towards Reality or away from it; the Reality has existed fully constituted before the incoming of the qualification which- whether in soul or body- merely introduces some state from outside, and by this addition elaborates the Reality into the particular thing.\n\nBut what if [the superficial appearance such as] the visible whiteness in ceruse is constitutive?\n\nIn the swan the whiteness is not constitutive since a swan need not be white: it is constitutive in ceruse, just as warmth is constitutive of the Reality, fire.\n\nNo doubt we may be told that the Reality in fire is [not warmth but] fieriness and in ceruse an analogous abstraction: yet the fact remains that in visible fire warmth or fieriness is constitutive and in the ceruse whiteness.\n\nThus the same entities are represented at once as being not qualities but constituents of Reality and not constituents but qualities.\n\nNow it is absurd to talk as if one identical thing changed its own nature according to whether it is present as a constituent or as an accidental.\n\nThe truth is that while the Reason-Principles producing these entities contain nothing but what is of the nature of Reality, yet only in the Intellectual Realm do the produced things possess real existence: here they are not real; they are qualified."

