[content]
body = "Unity, self-present, it has no need of self-intellection: indeed this \"self-presence\" were better left out, the more surely to preserve the unity; we must eliminate all knowing and all association, all intellection whether internal or external.\n\nIt is not to be though of as having but as being Intellection; Intellection does not itself perform the intellective act but is the cause of the act in something else, and cause is not to be identified with caused: most assuredly the cause of all is not a thing within that all.\n\nThis Principle is not, therefore, to be identified with the good of which it is the source; it is good in the unique mode of being The Good above all that is good.\n\nNext: Section 7"

