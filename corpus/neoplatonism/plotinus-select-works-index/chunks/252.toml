[content]
body = "Thus a patient following his treatment is himself an agent and yet is acting in accordance with the doctor's method inspired by the art concerned with the causes of health and sickness: what one does against the laws of health is one's act, but an act conflicting with the Providence of medicine.\n\nNext: Section 6"

