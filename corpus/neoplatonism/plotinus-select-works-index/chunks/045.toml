[content]
body = "Sacred Texts Classics Index Previous Next Section 3 3. The metaphysician, equipped by that very character, winged already and not like those others, in need of disengagement, stirring of himself towards the supernal but doubting of the way, needs only a guide. He must be shown, then, and instructed, a willing wayfarer by his very temperament, all but self-directed. Mathematics, which as a student by nature he will take very easily, will be prescribed to train him to abstract thought and to faith in the unembodied; a moral being by native disposition, he must be led to make his virtue perfect; after the Mathematics he must be put through a course in Dialectic and made an adept in the science. Next: Section 4"

