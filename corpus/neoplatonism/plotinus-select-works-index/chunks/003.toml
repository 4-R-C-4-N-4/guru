body = "204-5); but he never disclosed the month or day.\n\nThis was because he did not desire any birthday sacrifice or feast; yet he himself sacrificed on the traditional birthdays of Plato and of Socrates, afterwards giving a banquet at which every member of the circle who was able was expected to deliver an address.\n\n3.\n\nDespite his general reluctance to talk of his own life, some few details he did often relate to us in the course of conversation.\n\nThus he told how, at the age of eight, when he was already going to school, he still clung about his nurse and loved to bare her breasts and take suck: one day he was told he was a 'perverted imp', and so was shamed out of the trick.\n\nAt twenty-seven he was caught by the passion for philosophy: he was directed to the most highly reputed professors to be found at Alexandria; but he used to come from their lectures saddened and discouraged.\n\nA friend to whom he opened his heart divined his temperamental craving and suggested Ammonius, whom he had not yet tried.\n\nPlotinus went, heard a lecture, and exclaimed to his comrade: 'This was the man I was looking for.' From that day he followed Ammonius continuously, and under his guidance made such progress in philosophy that he became eager to investigate the Persian methods and the system adopted among the Indians.\n\nIt happened that the Emperor Gordian was at that time preparing his campaign against Persia; Plotinus joined the army and went on the expedition.\n\nHe was then thirty-eight, for he had passed eleven entire years under Ammonius.\n\nWhen Gordian was killed in Mesopotamia, it was only with great difficulty that Plotinus came off safe to Antioch.\n\nAt forty, in the reign of Philip, he settled in Rome.\n\nErennius, Origen, and Plotinus had made a compact not to disclose any of the doctrines which Ammonius had revealed to them.\n\nPlotinus kept faith, and in all his intercourse with his associates divulged nothing of Ammonius' system.\n\nBut the compact was broken, first by Erennius and then by Origen following suit: Origen, it is true, put in writing nothing but the treatise On the Spirit-Beings , and in Gallienus' reign that entitled The King the Sole Creator .\n\nPlotinus himself remained a long time without writing, but he began to base his Conferences on what he had gathered from his studies under Ammonius.\n\nIn this way, writing nothing but constantly conferring with a certain group of associates, he passed ten years.\n\nHe used to encourage his hearers to put questions, a liberty which, as Amelius told me, led to a great deal of wandering and futile talk.\n\nAmelius had entered the circle in the third year of Philip's reign, the third, too, of Plotinus' residence in Rome, and remained about him until the first year of Claudius, twenty-four years in all.\n\nHe had come to Plotinus after an efficient training under Lysimachus: in laborious diligence he surpassed all his contemporaries; for example, he transcribed and arranged nearly all the works of Numenius, and was not far from having most of them off by heart.\n\nHe also took notes of the Conferences and wrote them out in something like a hundred treatises which he has since presented to Hostilianus Hesychius of Apamea, his adopted son.\n\n4.\n\nI myself arrived from Greece in the tenth year of Gallienus' reign, accompanied by Antonius of Rhodes, and found Amelius an eighteen-years' associate of Plotinus, but still lacking the courage to write anything except for the notebooks, which had not reached their century.\n\nPlotinus, in this tenth year of Gallienus, was about fifty-nine: when I first met him I was thirty."

