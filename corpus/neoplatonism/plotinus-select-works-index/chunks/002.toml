body = "Sacred Texts Classics Index Previous Next Porphyry: On the Life of Plotinus and the Arrangement of his Work from Plotinus: The Enneads translated by Stephen MacKenna Typed by Owlsmirror/crows -- January 2004 1.\n\nPlotinus, the philosopher our contemporary, seemed ashamed of being in the body.\n\nSo deeply rooted was this feeling that he could never be induced to tell of his ancestry, his parentage, or his birthplace.\n\nHe showed, too, an unconquerable reluctance to sit to a painter of a sculptor, and when Amelius persisted in urging him to allow of a portrait being made he asked him, 'Is it not enough to carry about this image in which nature has enclosed us?\n\nDo you really think I must also consent to leave, as a desired spectacle to posterity, an image of the image?' In view of this determined refusal Amelius brought his friend Carterius, the best artist of the day, to the Conferences, which were open to every comer, and saw to it that by long observation of the philosopher he caught his most striking personal traits.\n\nFrom the impressions thus stored in mind the artist drew a first sketch; Amelius made various suggestions towards bringing our the resemblance, and in this way, without the knowledge of Plotinus, the genius of Carterius gave us a lifelike portrait.\n\n2.\n\nPlotinus was often distressed by an intestinal complaint, but declined clysters, pronouncing the use of such remedies unbecoming in an elderly man: in the same way he refused such medicaments as contain any substance taken from wild beasts or reptiles: all the more, he remarked, since he could not approve of eating the flesh of animals reared for the table.\n\nHe abstained from the use of the bath, contenting himself with a daily massage at home: when the terrible epidemic carried off his masseurs he renounced all such treatment: in a short while he contracted malign diphtheria.\n\nDuring the time I was about him there was no sign of any such malady, but after I sailed for Sicily the condition grew acute: his intimate, Eustochius, who was with him till his death, told me, on my return to Rome, that he became hoarse, so that his voice quite lost its clear and sonorous note, his sight grew dim and ulcers formed on his hands and feet.\n\nAs he still insisted on addressing everyone by word of mouth, his condition prompted his friends to withdraw from his society: he therefore left Rome for Campania, retiring to a property which had belonged to Zethos, an old friend of his at this time dead.\n\nHis wants were provided in part out of Zethos' estate, and for the rest were furnished form Minturnae, where Castricius' property lay.\n\nOf Plotinus' last moments Eustochius has given me an account.\n\nHe himself was staying at Puteoli and was late in arriving: when he at last came, Plotinus said: 'I have been a long time waiting for you; I am striving to give back the Divine in myself to the Divine in the All.' As he spoke a snake crept under the bed on which he lay and slipped away into a hole in the wall: at the same moment Plotinus died.\n\nThis was at the end of the second year of the reign of Claudius (A.D.\n\n270), and, as Eustochius tells me, Plotinus was then sixty-six, I myself was at Lilybaeum at the time, Amelius at Apamea in Syria, Castricius at Rome; only Eustochius was by his side.\n\nCounting sixty-six years back from the second year of Claudius, we can fix Plotinus' birth at the thirteenth year of Severus (A.D."

