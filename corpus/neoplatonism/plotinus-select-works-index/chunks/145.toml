[content]
body = "The better elements are compelled into existence and moulded to their function by the Reason-Principle directly; the less good are potentially present in the Reason-Principles, actually present in the phenomena themselves; the Soul's power had reached its limit, and failed to bring the Reason-Principles into complete actuality since, amid the clash of these antecedent Principles, Matter had already from its own stock produced the less good.\n\nYet, with all this, Matter is continuously overruled towards the better; so that out of the total of things- modified by Soul on the one hand and by Matter on the other hand, and on neither hand as sound as in the Reason-Principles- there is, in the end, a Unity.\n\nNext: Section 17"

