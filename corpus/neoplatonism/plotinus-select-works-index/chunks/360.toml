[content]
body = "Sacred Texts Classics Index Previous Next Section 8 8.\n\nThese considerations, amounting to the settlement of the question, are not countered by the phenomenon of sympathy; the response between soul and soul is due to the mere fact that all spring from that self-same soul [the next to Divine Mind] from which springs the Soul of the All.\n\nWe have already stated that the one soul is also multiple; and we have dealt with the different forms of relationship between part and whole: we have investigated the different degrees existing within soul; we may now add, briefly, that differences might be induced, also, by the bodies with which the soul has to do, and, even more, by the character and mental operations carried over from the conduct of the previous lives.\n\n\"The life-choice made by a soul has a correspondence\"- we read- \"with its former lives.\" As regards the nature of soul in general, the differences have been defined in the passage in which we mentioned the secondary and tertiary orders and laid down that, while all souls are all-comprehensive, each ranks according to its operative phase- one becoming Uniate in the achieved fact, another in knowledge, another in desire, according to the distinct orientation by which each is, or tends to become, what it looks upon.\n\nThe very fulfillment and perfectionment attainable by souls cannot but be different.\n\nBut, if in the total the organization in which they have their being is compact of variety- as it must be since every Reason-Principle is a unity of multiplicity and variety, and may be thought of as a psychic animated organism having many shapes at its command- if this is so and all constitutes a system in which being is not cut adrift from being, if there is nothing chance- borne among beings as there is none even in bodily organisms, then it follows that Number must enter into the scheme; for, once again, Being must be stable; the members of the Intellectual must possess identity, each numerically one; this is the condition of individuality.\n\nWhere, as in bodily masses, the Idea is not essentially native, and the individuality is therefore in flux, existence under ideal form can rise only out of imitation of the Authentic Existences; these last, on the contrary, not rising out of any such conjunction [as the duality of Idea and dead Matter] have their being in that which is numerically one, that which was from the beginning, and neither becomes what it has not been nor can cease to be what it is.\n\nEven supposing Real-Beings [such as soul] to be produced by some other principle, they are certainly not made from Matter; or, if they were, the creating principle must infuse into them, from within itself, something of the nature of Real-Being; but, at this, it would itself suffer change, as it created more or less.\n\nAnd, after all, why should it thus produce at any given moment rather than remain for ever stationary?\n\nMoreover the produced total, variable from more to less, could not be an eternal: yet the soul, it stands agreed, is eternal.\n\nBut what becomes of the soul's infinity if it is thus fixed?\n\nThe infinity is a matter of power: there is question, not of the soul's being divisible into an infinite number of parts, but of an infinite possible effectiveness: it is infinity in the sense in which the Supreme God, also, is free of all bound."

