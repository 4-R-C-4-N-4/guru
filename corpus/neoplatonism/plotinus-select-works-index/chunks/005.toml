body = "Against the Gnostics (II.9) 34.\n\nOn Numbers (VI.6) 35.\n\nWhy Distant Objects appear Small (II.8) 36.\n\nWhether Happiness depends upon Extension of Time (I.5) 37.\n\nOn Coalescence (II.7) 38.\n\nHow the Multitude of Ideas Exists; and on the Good (VI.7) 39.\n\nOn Free-Will (VI.8) 40.\n\nOn the World (II.1) 41.\n\nOn Sensation and Memory (IV.6) 42.\n\nOn the Kinds of Being, First (VI.6) 43.\n\nOn the Kinds of Being, Second (VI.2) 44.\n\nOn the Kinds of Being, Third (VI.3) 45.\n\nOn Eternity and Time (III.7) Thus we have twenty-four treatises composed during the six years of my association with him and dealing, as the titles indicate, with such problems as happened to arise at the Conferences; add the twenty-one composed before my arrival, and we have accounted for forty-five treatises.\n\n6.\n\nThe following five more Plotinus wrote and sent to me while I was living in Sicily, where I had gone about the fifteenth year of Gallienus: 46.\n\nOn Happiness (I.4) 47.\n\nOn Providence, First (III.2) 48.\n\nOn Providence, Second (III.3) 49.\n\nOn the Conscious Hypostases and the All-Transcending (V.3) 50.\n\nOn Love (III.5) These five he sent me in the first year of Claudius: in the early months of the second year, shortly before his death, I received the following four: 51.\n\nOn Evil (I.8) 52.\n\nWhether the Stars have Causal Operation (II.3) 53.\n\nOn the Animate (I.1) 54.\n\nOn Happiness (I.7) Adding these nine to the forty-five of the first and second sets we have a total of fifty-four treatises.\n\nAccording to the time of writing--early manhood, vigorous prime, worn-out constitution--so the tractates vary in power.\n\nThe first twenty-one pieces manifest a slighter capacity, the talent being not yet matured to the fulness of nervous strength.\n\nThe twenty-four produced in the mid-period display the utmost reach of the powers, and except for the short treatises among them, attain the highest perfection.\n\nThe last nine were written when the mental strength was already waning, and of these the last four show less vigour even than the five preceding.\n\n7.\n\nPlotinus had a large following.\n\nNotable among the more zealous students, really devoted to philosophy, was Amelius of Tuscany, whose family name was Gentilianus.\n\nAmelius preferred to call himself Amerius, changing L for R, because, as he explained, it suited him better to be named from Amereia, Unification, then from Ameleia, Indifference.\n\nThe group included also one Paulinus, a doctor of Scythopolis, whom Amelius used to call Mikkalos in allusion to his blundering habit of mind.\n\nAmong closer personal friends was Eustochius of Alexandria, also a doctor, who came to know Plotinus towards the end of his life, and attended him until his death: Eutochius consecrated himself exclusively to Plotinus' system and became a veritable philosopher.\n\nThen there was Zoticus, at once critic and poet, who has amended the text of Antimachus' works and is the author of an exquisite poem upon the Atlantis story: is sight failed, and he died a little before Plotinus, as also did Paulinus."

