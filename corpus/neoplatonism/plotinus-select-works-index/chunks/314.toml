[content]
body = "Sacred Texts Classics Index Previous Next Section 9 9.\n\n\"A Number, a Measure, belonging to Movement?\" This, at least, is plausible since Movement is a continuous thin; but let us consider.\n\nTo begin with, we have the doubt which met us when we probed its identification with extent of Movement: is Time the measure of any and every Movement?\n\nHave we any means of calculating disconnected and lawless Movement?\n\nWhat number or measure would apply?\n\nWhat would be the principle of such a Measure?\n\nOne Measure for movement slow and fast, for any and every movement: then that number and measure would be like the decade, by which we reckon horses and cows, or like some common standard for liquids and solids.\n\nIf Time is this Kind of Measure, we learn, no doubt, of what objects it is a Measure- of Movements- but we are no nearer understanding what it is in itself.\n\nOr: we may take the decade and think of it, apart from the horses or cows, as a pure number; this gives us a measure which, even though not actually applied, has a definite nature.\n\nIs Time, perhaps, a Measure in this sense?\n\nNo: to tell us no more of Time in itself than that it is such a number is merely to bring us back to the decade we have already rejected, or to some similar collective figure.\n\nIf, on the other hand, Time is [not such an abstraction but] a Measure possessing a continuous extent of its own, it must have quantity, like a foot-rule; it must have magnitude: it will, clearly, be in the nature of a line traversing the path of Movement.\n\nBut, itself thus sharing in the movement, how can it be a Measure of Movement?\n\nWhy should the one of the two be the measure rather than the other?\n\nBesides an accompanying measure is more plausibly considered as a measure of the particular movement it accompanies than of Movement in general.\n\nFurther, this entire discussion assumes continuous movement, since the accompanying principle; Time, is itself unbroken [but a full explanation implies justification of Time in repose].\n\nThe fact is that we are not to think of a measure outside and apart, but of a combined thing, a measured Movement, and we are to discover what measures it.\n\nGiven a Movement measured, are we to suppose the measure to be a magnitude?\n\nIf so, which of these two would be Time, the measured movement or the measuring magnitude?\n\nFor Time [as measure] must be either the movement measured by magnitude, or the measuring magnitude itself or something using the magnitude like a yard-stick to appraise the movement.\n\nIn all three cases, as we have indicated, the application is scarcely plausible except where continuous movement is assumed: unless the Movement proceeds smoothly, and even unintermittently and as embracing the entire content of the moving object, great difficulties arise in the identification of Time with any kind of measure.\n\nLet us, then, suppose Time to be this \"measured Movement,\" measured by quantity.\n\nNow the Movement if it is to be measured requires a measure outside itself; this was the only reason for raising the question of the accompanying measure.\n\nIn exactly the same way the measuring magnitude, in turn, will require a measure, because only when the standard shows such and such an extension can the degree of movement be appraised.\n\nTime then will be, not the magnitude accompanying the Movement, but that numerical value by which the magnitude accompanying the Movement is estimated.\n\nBut that number can be only the abstract figure which represents the magnitude, and it is difficult to see how an abstract figure can perform the act of measuring."

