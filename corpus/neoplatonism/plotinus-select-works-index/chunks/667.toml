[content]
body = "Similarly, this likeness of the Intellectual realm carries images, not of the creative element, but of the entities contained in that creator, including Man with every other living being: creator and created are alike living beings, though of a different life, and both coexist in the Intellectual realm.\n\nNext: THIRD TRACTATE"

