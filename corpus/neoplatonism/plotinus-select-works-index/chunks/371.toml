[content]
body = "It is not to be thought that such beings engage themselves in human affairs in the sense of making men thieves, slave-dealers, burglars, temple-strippers, or debased effeminates practising and lending themselves to disgusting actions: that is not merely unlike gods; it is unlike mediocre men; it is, perhaps, beneath the level of any existing being where there is not the least personal advantage to be gained."

