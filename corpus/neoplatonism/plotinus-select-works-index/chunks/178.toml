[content]
body = "In what they say of the spreading out of masses they cannot be thought very plausible; the extension would have to be considerable indeed in the case of a very small quantity [to be in true mixture with a very large mass]; for they do not suggest any such extension by change as that of water into air.\n\nNext: Section 2"

