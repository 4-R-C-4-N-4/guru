[content]
body = "The why is inherent, therefore, in the entity, that is to say in every thought and activity of the Intellectual-Principle.\n\nTake for example the Idea of Man; Man entire is found to contribute to it; he is in that Idea in all his fulness including everything that from the beginning belonged to Man.\n\nIf Man were not complete There, so that there were something to be added to the Idea, that additional must belong to a derivative; but Man exists from eternity and must therefore be complete; the man born is the derivative.\n\nNext: Section 3"

