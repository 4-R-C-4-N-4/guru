[content]
body = "Sacred Texts Classics Index Previous Next Section 11 11.\n\nTo this end we must go back to the state we affirmed of Eternity, unwavering Life, undivided totality, limitless, knowing no divagation, at rest in unity and intent upon it.\n\nTime was not yet: or at least it did not exist for the Eternal Beings, though its being was implicit in the Idea and Principle of progressive derivation.\n\nBut from the Divine Beings thus at rest within themselves, how did this Time first emerge?\n\nWe can scarcely call upon the Muses to recount its origin since they were not in existence then- perhaps not even if they had been.\n\nThe engendered thing, Time, itself, can best tell us how it rose and became manifest; something thus its story would run: Time at first- in reality before that \"first\" was produced by desire of succession- Time lay, self-concentrated, at rest within the Authentic Existent: it was not yet Time; it was merged in the Authentic and motionless with it.\n\nBut there was an active principle there, one set on governing itself and realizing itself [= the All-Soul], and it chose to aim at something more than its present: it stirred from its rest, and Time stirred with it.\n\nAnd we, stirring to a ceaseless succession, to a next, to the discrimination of identity and the establishment of ever-new difference, traversed a portion of the outgoing path and produced an image of Eternity, produced Time.\n\nFor the Soul contained an unquiet faculty, always desirous of translating elsewhere what it saw in the Authentic Realm, and it could not bear to retain within itself all the dense fullness of its possession.\n\nA Seed is at rest; the nature-principle within, uncoiling outwards, makes way towards what seems to it a large life; but by that partition it loses; it was a unity self-gathered, and now, in going forth from itself, it fritters its unity away; it advances into a weaker greatness.\n\nIt is so with this faculty of the Soul, when it produces the Kosmos known to sense- the mimic of the Divine Sphere, moving not in the very movement of the Divine but in its similitude, in an effort to reproduce that of the Divine.\n\nTo bring this Kosmos into being, the Soul first laid aside its eternity and clothed itself with Time; this world of its fashioning it then gave over to be a servant to Time, making it at every point a thing of Time, setting all its progressions within the bournes of Time.\n\nFor the Kosmos moves only in Soul- the only Space within the range of the All open to it to move in- and therefore its Movement has always been in the Time which inheres in Soul.\n\nPutting forth its energy in act after act, in a constant progress of novelty, the Soul produces succession as well as act; taking up new purposes added to the old it brings thus into being what had not existed in that former period when its purpose was still dormant and its life was not as it since became: the life is changed and that change carries with it a change of Time.\n\nTime, then, is contained in differentiation of Life; the ceaseless forward movement of Life brings with it unending Time; and Life as it achieves its stages constitutes past Time.\n\nWould it, then, be sound to define Time as the Life of the Soul in movement as it passes from one stage of act or experience to another?\n\nYes; for Eternity, we have said, is Life in repose, unchanging, self-identical, always endlessly complete; and there is to be an image of Eternity-Time- such an image as this lower All presents of the Higher Sphere."

