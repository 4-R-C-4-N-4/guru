[content]
body = "On the Reasoned Withdrawal from Life.\n\nTHE SECOND ENNEAD, following the more strictly ethical First, is physical, containing the disquisitions on the world and all that belongs to the world: 1.\n\nOn the World.\n\n2.\n\nOn the Circular Movement.\n\n3.\n\nWhether the Stars have Causal Operation.\n\n4.\n\nOn the Two Orders of Matter.\n\n5.\n\nOn Potentiality and Actuality.\n\n6.\n\nOn Quality and Form.\n\n7.\n\nOn Coalescence.\n\n8.\n\nWhy Distant Objects appear Small.\n\n9.\n\nAgainst those Declaring the Creator of the World, and the World itself, to be Evil.\n\nTHE THIRD ENNEAD, still keeping to the World, discusses the philosophical implications of some of its features: 1.\n\nOn Fate.\n\n2.\n\nThe First Treatise on Providence.\n\n3.\n\nThe Second Treatise on Providence.\n\n4.\n\nOn Our Tutelary Spirit.\n\n5.\n\nOn Love.\n\n6.\n\nOn the Impassibility of the Bodiless.\n\n7.\n\nOn Eternity and Time.\n\n8.\n\nOn Nature, Contemplation, and The One.\n\n9.\n\nVarious Questions.\n\n25.\n\nThese first three Enneads constitute in my arrangement one self-contained section.\n\nThe treatise on Our Tutelary Spirit is placed in the Third Ennead because this Spirit is not discussed as it is in itself, and the essay by its main content falls into the class dealing with the origin of man.\n\nSimilar reasons determined the inclusion in this set of the treatise on Love.\n\nThat on Eternity and Time is placed in this Third Ennead in virtue of its treatment of Time: that on Nature, Contemplation, and The One, because of the discussion of Nature contained in it.\n\nNext to the two dealing with the world comes the FOURTH ENNEAD containing the treatises dealing with the Soul: 1.\n\nOn the Essence of the Soul (I) 2.\n\nOn the Essence of the Soul (II) 3.\n\nQuestions referring to the Soul (I) 4.\n\nQuestions referring to the Soul (II) 5.\n\nQuestions referring to the Soul (III) 6.\n\nOn Sensation and Memory.\n\n7.\n\nOn the Immortality of the Soul.\n\n8.\n\nOn the Descent of the Soul into Bodies.\n\n9.\n\nWhether all Souls are One.\n\nTHE FIFTH ENNEAD--following upon that dealing with the Soul--contains the treatises upon the Intellectual-Principle, each of which had also some reference to the All-Transcending and to the Intellectual-Principle in the Soul, and to the Ideas: 1.\n\nOn the three Primal Hypostases.\n\n2.\n\nOn the Origin and Order of the Post-Primals.\n\n3.\n\nOn the Conscious Hypostases and the All-Transcending.\n\n4.\n\nHow the Post-Primal derives from the Primal, and on the One.\n\n5.\n\nThat the Intelligibles are not outside the Intellectual-Principle, and on the Good.\n\n6.\n\nThat there is no Intellectual Act in the Principle which transcends the Authentic-Existent; and on the Nature that has the Intellectual Act Primally and that which has it Secondarily.\n\n7.\n\nWhether there are Ideas even of Particulars.\n\n8.\n\nOn Intellectual Beauty.\n\n9.\n\nOn the Intellectual-Principle, on the Ideas, and on the Authentic-Existent.\n\n26.\n\nThese Fourth and Fifth Enneads, again, I have arranged in the form of one distinct section.\n\nThe last Ennead, the Sixth, constitutes one other section, so that we have the entire work of Plotinus in three sections, the first containing three Enneads, the second two, the third one Ennead.\n\nThe content of the third section, that is of the SIXTH ENNEAD, is as follows: 1,2,3.\n\nOn the Kinds of Being.\n\n4,5."

