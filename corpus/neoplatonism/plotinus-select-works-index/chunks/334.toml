[content]
body = "In its character as Life, as emanation, as containing all things in their precise forms and not merely in the agglomerate mass- for this would be to contain them imperfectly and inarticulately- it must of necessity derive from some other Being, from one that does not emanate but is the Principle of Emanation, of Life, of Intellect and of the Universe.\n\nFor the Universe is not a Principle and Source: it springs from a source, and that source cannot be the All or anything belonging to the All, since it is to generate the All, and must be not a plurality but the Source of plurality, since universally a begetting power is less complex than the begotten.\n\nThus the Being that has engendered the Intellectual-Principle must be more simplex than the Intellectual-Principle.\n\nWe may be told that this engendering Principle is the One-and-All.\n\nBut, at that, it must be either each separate entity from among all or it will be all things in the one mass.\n\nNow if it were the massed total of all, it must be of later origin than any of the things of which it is the sum; if it precedes the total, it differs from the things that make up the total and they from it: if it and the total of things constitute a co-existence, it is not a Source.\n\nBut what we are probing for must be a Source; it must exist before all, that all may be fashioned as sequel to it.\n\nAs for the notion that it may be each separate entity of the All, this would make a self-Identity into a what you like, where you like, indifferently, and would, besides, abolish all distinction in things themselves.\n\nOnce more we see that this can be no thing among things but must be prior to all things.\n\nNext: Section 10"

