[content]
body = "It cannot be, itself, The Good, since then it would not need to see or to perform any other Act; for The Good is the centre of all else, and it is by means of The Good that every thing has Act, while the Good is in need of nothing and therefore possesses nothing beyond itself.\n\nOnce you have uttered \"The Good,\" add no further thought: by any addition, and in proportion to that addition, you introduce a deficiency.\n\nDo not even say that it has Intellection; you would be dividing it; it would become a duality, Intellect and the Good.\n\nThe Good has no need of the Intellectual-Principle which, on the contrary, needs it, and, attaining it, is shaped into Goodness and becomes perfect by it: the Form thus received, sprung from the Good, brings it to likeness with the Good.\n\nThus the traces of the Good discerned upon it must be taken as indication of the nature of that Archetype: we form a conception of its Authentic Being from its image playing upon the Intellectual-Principle.\n\nThis image of itself, it has communicated to the Intellect that contemplates it: thus all the striving is on the side of the Intellect, which is the eternal striver and eternally the attainer.\n\nThe Being beyond neither strives, since it feels no lack, nor attains, since it has no striving.\n\nAnd this marks it off from the Intellectual-Principle, to which characteristically belongs the striving, the concentrated strain towards its Form.\n\nYet: The Intellectual-Principle; beautiful; the most beautiful of all; lying lapped in pure light and in clear radiance; circumscribing the Nature of the Authentic Existents; the original of which this beautiful world is a shadow and an image; tranquil in the fullness of glory since in it there is nothing devoid of intellect, nothing dark or out of rule; a living thing in a life of blessedness: this, too, must overwhelm with awe any that has seen it, and penetrated it, to become a unit of its Being.\n\nBut: As one that looks up to the heavens and sees the splendour of the stars thinks of the Maker and searches, so whoever has contemplated the Intellectual Universe and known it and wondered for it must search after its Maker too.\n\nWhat Being has raised so noble a fabric?\n\nAnd where?\n\nAnd how?\n\nWho has begotten such a child, this Intellectual-Principle, this lovely abundance so abundantly endowed?\n\nThe Source of all this cannot be an Intellect; nor can it be an abundant power: it must have been before Intellect and abundance were; these are later and things of lack; abundance had to be made abundant and Intellection needed to know.\n\nThese are very near to the un-needing, to that which has no need of Knowing, they have abundance and intellection authentically, as being the first to possess.\n\nBut, there is that before them which neither needs nor possesses anything, since, needing or possessing anything else, it would not be what it is- the Good.\n\nNext: NINTH TRACTATE"

