[content]
body = "Another friend was Zethos, an Arabian by descent, who married a daughter of Ammonius' friend Theodosius.\n\nZethos, too, was a doctor.\n\nPlotinus was deeply attached to him and was always trying to divert him from the political career in which he stood high.\n\nPlotinus was on the most familiar terms with him, and used to stay with him at his country place, six miles from Minturnae, a property which had formerly belonged to Castricius Firmus.\n\nCastricius was excelled by none of the group in appreciation of the finer side of life: he venerated Plotinus; he devoted himself in the most faithful comradeship to Amelius in every need, and was in all matters as loyal to myself as though I were his own brother.\n\nThis was another example of a politician venerating the philosopher.\n\nThere were also among Plotinus' hearers not a few members of the Senate, amongst whom Marcellus Orontius and Sabinillus showed the greatest assiduity in philosophical studies.\n\nAnother Senator, Rogatianus, advanced to such detachment from political ambitions that he gave up all his property, dismissed all his slaves, renounced every dignity, and, on the point of taking up his praetorship, the lictors already at the door, refused to come out or to have anything to do with the office.\n\nHe even abandoned his own house, spending his time here and there at this friends' and acquaintances', sleeping and eating with them and taking, at that, only one meal every other day.\n\nHe had been a victim of gout, carried in a chair, but this new regime of abstinence and abnegation restored his health: he had been unable to stretch out his hands; he came to use them as freely as men living by manual labour.\n\nPlotinus took a great liking to Rogatianus and frequently praised him very highly, holding him up as a model to those aiming at the philosophical life.\n\nThen there was Serapion, an Alexandrian, who began life as a professional orator and later took to the study of philosophy, but was never able to conquer the vices of avarice and usury.\n\nI myself, Porphyry of Tyre, was one of Plotinus' very closest friends, and it was to me he entrusted the task of revising his writings.\n\n8.\n\nSuch revision was necessary: Plotinus could not bear to go back on his work even for one re-reading; and indeed the condition of his sight would scarcely allow it: his handwriting was slovenly; he misjoined his words; he cared nothing about spelling; his one concern was for the idea: in these habits, to our general surprise, he remained unchanged to the very end.\n\nHe used to work out his design mentally from first to last: when he came to set down his ideas, he wrote out at one jet all he had stored in mind as though he were copying from a book.\n\nInterrupted, perhaps, by someone entering on business, he never lost hold of his plan; he was able to meet all the demands of the conversation and still keep his own train of thought clearly before him; when he was fee again, he never looked over what he had previously written--his sight, it has been mentioned, did not allow of such re-reading--but he linked on what was to follow as if no distraction had occurred.\n\nThus he was able to live at once within himself and for others; he never relaxed from his interior attention unless in sleep; and even his sleep was kept light be an abstemiousness that often prevented him taking as much as a piece of bread, and by this unbroken concentration upon his own highest nature.\n\n9."

