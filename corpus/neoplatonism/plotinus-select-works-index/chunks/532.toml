[content]
body = "In sum, then, a knowing principle must handle distinct items: its object must, at the moment of cognition, contain diversity; otherwise the thing remains unknown; there is mere conjunction, such a contact, without affirmation or comprehension, as would precede knowledge, the intellect not yet in being, the impinging agent not percipient.\n\nSimilarly the knowing principle itself cannot remain simplex, especially in the act of self-knowing: all silent though its self-perception be, it is dual to itself.\n\nOf course it has no need of minute self-handling since it has nothing to learn by its intellective act; before it is [effectively] Intellect, it holds knowledge of its own content.\n\nKnowledge implies desire, for it is, so to speak, discovery crowning a search; the utterly undifferentiated remains self-centred and makes no enquiry about that self: anything capable of analysing its content, must be a manifold.\n\nNext: Section 11"

