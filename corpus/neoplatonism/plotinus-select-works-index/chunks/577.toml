[content]
body = "The greatness and power of the wisdom There we may know from this, that is embraces all the real Beings, and has made all, and all follow it, and yet that it is itself those beings, which sprang into being with it, so that all is one, and the essence There is wisdom.\n\nIf we have failed to understand, it is that we have thought of knowledge as a mass of theorems and an accumulation of propositions, though that is false even for our sciences of the sense-realm.\n\nBut in case this should be questioned, we may leave our own sciences for the present, and deal with the knowing in the Supreme at which Plato glances where he speaks of \"that knowledge which is not a stranger in something strange to it\"- though in what sense, he leaves us to examine and declare, if we boast ourselves worthy of the discussion.\n\nThis is probably our best starting-point.\n\nNext: Section 5"

