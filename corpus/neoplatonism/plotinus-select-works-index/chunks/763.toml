[content]
body = "Sacred Texts Classics Index Previous Next Section 11 11.\n\nThe very heavens, patently multiple, cannot be thought to disdain any form of life since this universe holds everything.\n\nNow how do these things come to be here?\n\nDoes the higher realm contain all of the lower?\n\nAll that has been shaped by Reason-Principle and conforms to Idea.\n\nBut, having fire [warmth] and water, it will certainly have vegetation; how does vegetation exist There?\n\nEarth, too?\n\neither these are alive or they are There as dead things and then not everything There has life.\n\nHow in sum can the things of this realm be also There?\n\nVegetal life we can well admit, for the plant is a Reason-Principle established in life.\n\nIf in the plant the Reason-Principle, entering Matter and constituting the plant, is a certain form of life, a definite soul, then, since every Reason-Principle is a unity, then either this of plant-life is the primal or before it there is a primal plant, source of its being: that first plant would be a unity; those here, being multiple, must derive from a unity.\n\nThis being so, that primal must have much the truer life and be the veritable plant, the plants here deriving from it in the secondary and tertiary degree and living by a vestige of its life.\n\nBut earth; how is there earth There: what is the being of earth and how are we to represent to ourselves the living earth of that realm?\n\nFirst, what is it, what the mode of its being?\n\nEarth, here and There alike, must possess shape and a Reason-Principle.\n\nNow in the case of the vegetal, the Reason-Principle of the plant here was found to be living in that higher realm: is there such a Reason-Principle in our earth?\n\nTake the most earthy of things found shaped in earth and they exhibit, even they, the indwelling earth-principle.\n\nThe growing and shaping of stones, the internal moulding of mountains as they rise, reveal the working of an ensouled Reason-Principle fashioning them from within and bringing them to that shape: this, we must take it, is the creative earth-principle corresponding to what we call the specific principle of a tree; what we know as earth is like the wood of the tree; to cut out a stone is like lopping a twig from a tree, except of course that there is no hurt done, the stone remaining a member of the earth as the twig, uncut, of the tree.\n\nRealizing thus that the creative force inherent in our earth is life within a Reason-Principle, we are easily convinced that the earth There is much more primally alive, that it is a reasoned Earth-Livingness, the earth of Real-Being, earth primally, the source of ours.\n\nFire, similarly, with other such things, must be a Reason-Principle established in Matter: fire certainly does not originate in the friction to which it may be traced; the friction merely brings out a fire already existent in the scheme and contained in the materials rubbed together.\n\nMatter does not in its own character possess this fire-power: the true cause is something informing the Matter, that is to say, a Reason-Principle, obviously therefore a soul having the power of bringing fire into being; that is, a life and a Reason-Principle in one.\n\nIt is with this in mind that Plato says there is soul in everything of this sphere.\n\nThat soul is the cause of the fire of the sense-world; the cause of fire here is a certain Life of fiery character, the more authentic fire.\n\nThat transcendent fire being more truly fire will be more veritably alive; the fire absolute possesses life.\n\nAnd the same principles apply to the other elements, water and air."

