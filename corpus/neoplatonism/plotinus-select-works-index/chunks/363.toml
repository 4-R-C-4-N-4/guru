[content]
body = "The universe spreads as broad as the presence of soul; the bound of its expansion is the point at which, in its downward egression from the Supreme, it still has soul to bind it in one: it is a shadow as broad as the Reason-Principle proceeding from soul; and that Reason-Principle is of scope to generate a kosmic bulk as vast as lay in the purposes of the Idea [the Divine forming power] which it conveys.\n\nNext: Section 10"

