[content]
body = "So with us: it is from the Supreme that we derive order and distribution and harmony, which are virtues in this sphere: the Existences There, having no need of harmony, order or distribution, have nothing to do with virtue; and, none the less, it is by our possession of virtue that we become like to Them.\n\nThus much to show that the principle that we attain Likeness by virtue in no way involves the existence of virtue in the Supreme.\n\nBut we have not merely to make a formal demonstration: we must persuade as well as demonstrate.\n\nNext: Section 2"

