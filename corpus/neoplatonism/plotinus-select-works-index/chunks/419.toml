[content]
body = "Sacred Texts Classics Index Previous Next Section 28 28.\n\nThus much established, we may return on our path: we have to discuss the seat of the passionate element in the human being.\n\nPleasures and pains- the conditions, that is, not the perception of them- and the nascent stage of desire, we assigned to the body as a determined thing, the body brought, in some sense, to life: are we entitled to say the same of the nascent stage of passion?\n\nAre we to consider passion in all its forms as vested in the determined body or in something belonging to it, for instance in the heart or the bile necessarily taking condition within a body not dead?\n\nOr are we to think that just as that which bestows the vestige of the soul is a distinct entity, so we may reason in this case- the passionate element being one distinct thing, itself, and not deriving from any passionate or percipient faculty?\n\nNow in the first case the soul-principle involved, the vegetal, pervades the entire body, so that pain and pleasure and nascent desire for the satisfaction of need are present all over it- there is possibly some doubt as to the sexual impulse, which, however, it may suffice to assign to the organs by which it is executed- but in general the region about the liver may be taken to be the starting point of desire, since it is the main acting point of the vegetal principle which transmits the vestige phase of the soul to the liver and body- the seat, because the spring.\n\nBut in this other case, of passion, we have to settle what it is, what form of soul it represents: does it act by communicating a lower phase of itself to the regions round the heart, or is it set in motion by the higher soul-phase impinging upon the Conjoint [the animate-total], or is there, in such conditions no question of soul-phase, but simply passion itself producing the act or state of [for example] anger?\n\nEvidently the first point for enquiry is what passion is.\n\nNow we all know that we feel anger not only over our own bodily suffering, but also over the conduct of others, as when some of our associates act against our right and due, and in general over any unseemly conduct.\n\nIt is at once evident that anger implies some subject capable of sensation and of judgement: and this consideration suffices to show that the vegetal nature is not its source, that we must look for its origin elsewhere.\n\nOn the other hand, anger follows closely upon bodily states; people in whom the blood and the bile are intensely active are as quick to anger as those of cool blood and no bile are slow; animals grow angry though they pay attention to no outside combinations except where they recognize physical danger; all this forces us again to place the seat of anger in the strictly corporeal element, the principle by which the animal organism is held together.\n\nSimilarly, that anger or its first stirring depends upon the condition of the body follows from the consideration that the same people are more irritable ill than well, fasting than after food: it would seem that the bile and the blood, acting as vehicles of life, produce these emotions.\n\nOur conclusion [reconciling with these corporeal facts the psychic or mental element indicated] will identify, first, some suffering in the body answered by a movement in the blood or in the bile: sensation ensues and the soul, brought by means of the representative faculty to partake in the condition of the affected body, is directed towards the cause of the pain: the reasoning soul, in turn, from its place above the phase not inbound with body-acts in its own mode when the breach of order has become manifest to it: it calls in the alliance of that ready passionate faculty which is the natural combatant of the evil disclosed."

