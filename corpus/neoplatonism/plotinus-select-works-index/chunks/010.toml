[content]
body = "Some of the Greeks began to accuse Plotinus of appropriating the ideas of Numenius.\n\nAmelius, being informed of this charge by the Stoic and Platonist Trypho, challenged it in a treatise which he entitled The Difference between the Doctrines of Plotinus and Numenius .\n\nHe dedicated the work to me, under the name of Basileus (or King).\n\nThis really is my name; it is equivalent to Porphyry (Purple-robed) and translates the name I bear in my own tongue; for I am called Malchos, like my father, and 'Malchos' would give 'Basileus' in Greek.\n\nLonginus, in dedicating his work On Impulse to Cleodamus and myself, addressed us as 'Cleodamus and Malchus', just as Numenius translated the Latin 'Maximus' into its Greek equivalent 'Megalos'.\n\nHere followed Amelius' letter: 'Amelius to Basileus, with all good wishes.\n\n'You have been, in your own phrase, pestered by the persistent assertion that our friend's doctrine is to be traced to Numenius of Apamea.\n\n'Now, if it were merely for those illustrious personages who spread this charge, you may be very sure I would never utter a word in reply.\n\nIt is sufficiently clear that they are actuated solely by the famous and astonishing facility of speech of theirs when they assert, at one moment, that he is an idle babbler, next that he is a plagiarist, and finally that his plagiarisms are feeble in the extreme.\n\nClearly in all this we have nothing but scoffing and abuse.\n\n'But your judgement has persuaded me that we should profit by this occasion firstly to provide ourselves with a useful memorandum of the doctrines that have won our adhesion, and secondly to bring about a more complete knowledge of the system--long celebrated thought it be--to the glory of our friend, a man so great as Plotinus.\n\n'Hence I now bring you the promised Reply, executed, as you and your self know, in three days.\n\nYou must judge it with reasonable indulgence; this is no orderly and elaborate defence composed in step-by-step correspondence with the written indictment: I have simply set down, as they occurred to me, my recollections of our frequent discussions.\n\nYou will admit, also, that it is by no means easy to grasp the meaning of a writer who (like Numenius), now credited with the opinion we also hold, varies in the terms he uses to express the one idea.\n\n'If I have falsified any essential of the doctrine, I trust to your good nature to set me right: I am reminded of the phrase in the tragedy: A busy man and far from the teachings of our master I must needs correct and recant.\n\nJudge how much I wish to give you pleasure.\n\nGood health.' 18.\n\nThis letter seemed worth insertion as showing, not merely that some contemporary judgement pronounced Plotinus to be parading on the strength of Numenius' ideas, but that he was even despised as a word-spinner.\n\nThe fact is that these people did not understand his teaching: he was entirely free from all the inflated pomp of the professor: his lectures had the air of conversation, and he never forced upon his hearers the severely logical substructure of his thesis.\n\nI myself, when I first heard him, had the same experience.\n\nIt led me to combat his doctrine in a paper in which I tried to show that the Intelligibles exist outside of the Intellectual-Principle."

