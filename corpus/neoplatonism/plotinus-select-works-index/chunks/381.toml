[content]
body = "Sacred Texts Classics Index Previous Next Section 26 26.\n\nNow if sensations of the active order depend upon the Couplement of soul and body, sensation must be of that double nature.\n\nHence it is classed as one of the shared acts: the soul, in the feeling, may be compared to the workman in such operations as boring or weaving, the body to the tool employed: the body is passive and menial; the soul is active, reading such impressions as are made upon the body or discerned by means of the body, perhaps entertaining only a judgement formed as the result of the bodily experiences.\n\nIn such a process it is at once clear that the sensation is a shared task; but the memory is not thus made over to the Couplement, since the soul has from the first taken over the impression, either to retain or to reject.\n\nIt might be ventured that memory, no less than sensation, is a function of the Couplement, on the ground that bodily constitution determines our memories good or bad; but the answer would come that, whether the body happens or not to be a hindrance, the act of remembering would still be an act of the soul.\n\nAnd in the case of matters learned [and not merely felt, as corporeal experiences], how can we think of the Couplement of soul and body as the remembering principle?\n\nHere, surely, it must be soul alone?\n\nWe may be told that the living-being is a Couplement in the sense of something entirely distinct formed from the two elements [so that it might have memory though neither soul nor body had it].\n\nBut, to begin with, it is absurd to class the living-being as neither body nor soul; these two things cannot so change as to make a distinct third, nor can they blend so utterly that the soul shall become a mere faculty of the animate whole.\n\nAnd, further, supposing they could so blend, memory would still be due to the soul just as in honey-wine all the sweetness will be due to the honey.\n\nIt may be suggested the while the soul is perhaps not in itself a remembering principle, yet that, having lost its purity and acquired some degree of modification by its presence in body, it becomes capable of reproducing the imprints of sensible objects and experiences, and that, seated, as roughly speaking it is, within the body, it may reasonably be thought capable of accepting such impressions, and in such a manner as to retain them [thus in some sense possessing memory].\n\nBut, to begin with, these imprints are not magnitudes [are not of corporeal nature at all]; there is no resemblance to seal impressions, no stamping of a resistant matter, for there is neither the down-thrust [as of the seal] nor [the acceptance] as in the wax: the process is entirely of the intellect, though exercised upon things of sense; and what kind of resistance [or other physical action] can be affirmed in matters of the intellectual order, or what need can there be of body or bodily quality as a means?\n\nFurther there is one order of which the memory must obviously belong to the soul; it alone can remember its own movements, for example its desires and those frustrations of desire in which the coveted thing never came to the body: the body can have nothing to tell about things which never approached it, and the soul cannot use the body as a means to the remembrance of what the body by its nature cannot know.\n\nIf the soul is to have any significance- to be a definite principle with a function of its own- we are forced to recognize two orders of fact, an order in which the body is a means but all culminates in soul, and an order which is of the soul alone."

