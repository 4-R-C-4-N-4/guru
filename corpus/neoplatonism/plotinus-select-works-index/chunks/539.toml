[content]
body = "We may take it as proved that the emanation of the Transcendent must be a Not-One something other than pure unity, but that it is a multiplicity, and especially that it is such a multiplicity as is exhibited in the sequent universe, this is a statement worthy of deliberation: some further enquiry must be made, also, as to the necessity of any sequel to the First.\n\nNext: Section 16"

