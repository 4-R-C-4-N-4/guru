[content]
body = "Sacred Texts Classics Index Previous Next Section 3 3.\n\n(A)...\n\nHow, then, does Unity give rise to Multiplicity?\n\nBy its omnipresence: there is nowhere where it is not; it occupies, therefore, all that is; at once, it is manifold- or, rather, it is all things.\n\nIf it were simply and solely everywhere, all would be this one thing alone: but it is, also, in no place, and this gives, in the final result, that, while all exists by means of it, in virtue of its omnipresence, all is distinct from it in virtue of its being nowhere.\n\nBut why is it not merely present everywhere but in addition nowhere-present?\n\nBecause, universality demands a previous unity.\n\nIt must, therefore, pervade all things and make all, but not be the universe which it makes.\n\n(B) The Soul itself must exist as Seeing- with the Intellectual-Principle as the object of its vision- it is undetermined before it sees but is naturally apt to see: in other words, Soul is Matter to [its determinant] the Intellectual-Principle.\n\n(C) When we exercise intellection upon ourselves, we are, obviously, observing an intellective nature, for otherwise we would not be able to have that intellection.\n\nWe know, and it is ourselves that we know; therefore we know the reality of a knowing nature: therefore, before that intellection in Act, there is another intellection, one at rest, so to speak.\n\nSimilarly, that self-intellection is an act upon a reality and upon a life; therefore, before the Life and Real-Being concerned in the intellection, there must be another Being and Life.\n\nIn a word, intellection is vested in the activities themselves: since, then, the activities of self-intellection are intellective-forms, We, the Authentic We, are the Intelligibles and self-intellection conveys the Image of the Intellectual Sphere.\n\n(D) The Primal is a potentiality of Movement and of Repose- and so is above and beyond both- its next subsequent has rest and movement about the Primal.\n\nNow this subsequent is the Intellectual-Principle- so characterized by having intellection of something not identical with itself whereas the Primal is without intellection.\n\nA knowing principle has duality [that entailed by being the knower of something) and, moreover, it knows itself as deficient since its virtue consists in this knowing and not in its own bare Being.\n\n(E) In the case of everything which has developed from possibility to actuality the actual is that which remains self-identical for its entire duration- and this it is which makes perfection possible even in things of the corporeal order, as for instance in fire but the actual of this kind cannot be everlasting since [by the fact of their having once existed only in potentiality] Matter has its place in them.\n\nIn anything, on the contrary, not composite [= never touched by Matter or potentiality] and possessing actuality, that actual existence is eternal...\n\nThere is, however, the case, also in which a thing, itself existing in actuality, stands as potentiality to some other form of Being.\n\n(F)...\n\nBut the First is not to be envisaged as made up from Gods of a transcendent order: no; the Authentic Existents constitute the Intellectual-Principle with Which motion and rest begin.\n\nThe Primal touches nothing, but is the centre round which those other Beings lie in repose and in movement.\n\nFor Movement is aiming, and the Primal aims at nothing; what could the Summit aspire to?\n\nHas It, even, no Intellection of Itself?\n\nIt possesses Itself and therefore is said in general terms to know itself..."

