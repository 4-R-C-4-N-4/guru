[content]
body = "In sum, the unity exhibited in Being on the one hand approximates to Unity-Absolute and on the other tends to identify itself with Being: Being is a unity in relation to the Absolute, is Being by virtue of its sequence upon that Absolute: it is indeed potentially a plurality, and yet it remains a unity and rejecting division refuses thereby to become a genus.\n\nNext: Section 10"

