[content]
body = "This universe, characteristically participant in images, shows how the image differs from the authentic beings: against the variability of the one order, there stands the unchanging quality of the other, self-situate, not needing space because having no magnitude, holding an existent intellective and self-sufficing.\n\nThe body-kind seeks its endurance in another kind; the Intellectual-Principle, sustaining by its marvellous Being, the things which of themselves must fall, does not itself need to look for a staying ground.\n\nNext: Section 6"

