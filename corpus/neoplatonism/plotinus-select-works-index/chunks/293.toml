[content]
body = "Surely the bodily modification and other experience that have accompanied the sundering, must have occurred, identically, within the Matter?\n\nThis reasoning would force the destructibility of Matter upon us: \"the body is dissolved; then the Matter is dissolved.\" We would have to allow Matter to be a thing of quantity, a magnitude.\n\nBut since it is not a magnitude it could not have the experiences that belong to magnitude and, on the larger scale, since it is not body it cannot know the experiences of body.\n\nIn fact those that declare Matter subject to modification may as well declare it body right out.\n\nNext: Section 13"

