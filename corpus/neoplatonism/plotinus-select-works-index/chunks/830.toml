[content]
body = "Sacred Texts Classics Index Previous Next Section 6 6.\n\nIn what sense, then, do we assert this Unity, and how is it to be adjusted to our mental processes?\n\nIts oneness must not be entitled to that of monad and point: for these the mind abstracts extension and numerical quantity and rests upon the very minutest possible, ending no doubt in the partless but still in something that began as a partible and is always lodged in something other than itself.\n\nThe Unity was never in any other and never belonged to the partible: nor is its impartibility that of extreme minuteness; on the contrary it is great beyond anything, great not in extension but in power, sizeless by its very greatness as even its immediate sequents are impartible not in mass but in might.\n\nWe must therefore take the Unity as infinite not in measureless extension or numerable quantity but in fathomless depths of power.\n\nThink of The One as Mind or as God, you think too meanly; use all the resources of understanding to conceive this Unity and, again, it is more authentically one than God, even though you reach for God's unity beyond the unity the most perfect you can conceive.\n\nFor This is utterly a self-existent, with no concomitant whatever.\n\nThis self-sufficing is the essence of its unity.\n\nSomething there must be supremely adequate, autonomous, all-transcending, most utterly without need.\n\nAny manifold, anything beneath The Unity, is dependent; combined from various constituents, its essential nature goes in need of unity; but unity cannot need itself; it stands unity accomplished.\n\nAgain, a manifold depends upon all its factors; and furthermore each of those factors in turn- as necessarily inbound with the rest and not self-standing- sets up a similar need both to its associates and to the total so constituted.\n\nThe sovranly self-sufficing principle will be Unity-Absolute, for only in this Unity is there a nature above all need, whether within itself or in regard to the rest of things.\n\nUnity seeks nothing towards its being or its well-being or its safehold upon existence; cause to all, how can it acquire its character outside of itself or know any good outside?\n\nThe good of its being can be no borrowing: This is The Good.\n\nNor has it station; it needs no standing ground as if inadequate to its own sustaining; what calls for such underpropping is the soulless, some material mass that must be based or fall.\n\nThis is base to all, cause of universal existence and of ordered station.\n\nAll that demands place is in need; a First cannot go in need of its sequents: all need is effort towards a first principle; the First, principle to all, must be utterly without need.\n\nIf the Unity be seeking, it must inevitably be seeking to be something other than itself; it is seeking its own destroyer.\n\nWhatever may be said to be in need of a good is needing a preserver; nothing can be a good to The Unity, therefore.\n\nNeither can it have will to anything; it is a Beyond-Good, not even to itself a good but to such beings only as may be of quality to have part with it.\n\nNor has it Intellection; that would comport diversity: nor Movement; it is prior to Movement as to Intellection.\n\nTo what could its Intellection be directed?\n\nTo itself?\n\nBut that would imply a previous ignorance; it would be dependent upon that Intellection in order to knowledge of itself; but it is the self-sufficing.\n\nYet this absence of self-knowing does not comport ignorance; ignorance is of something outside- a knower ignorant of a knowable- but in the Solitary there is neither knowing nor anything unknown."

