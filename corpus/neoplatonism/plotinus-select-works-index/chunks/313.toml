[content]
body = "That definite Quantity is merely something occurring within Time, for, otherwise Time is not everywhere but is something belonging to Movement which thus would be its substratum or basic-stuff: once more, then, we would be making Time identical with Movement; for the extent of Movement is not something outside it but is simply its continuousness, and we need not halt upon the difference between the momentary and the continuous, which is simply one of manner and degree.\n\nThe extended movement and its extent are not Time; they are in Time.\n\nThose that explain Time as extent of Movement must mean not the extent of the movement itself but something which determines its extension, something with which the movement keeps pace in its course.\n\nBut what this something is, we are not told; yet it is, clearly, Time, that in which all Movement proceeds.\n\nThis is what our discussion has aimed at from the first: \"What, essentially, is Time?\" It comes to this: we ask \"What is Time?\" and we are answered, \"Time is the extension of Movement in Time!\" On the one hand Time is said to be an extension apart from and outside that of Movement; and we are left to guess what this extension may be: on the other hand, it is represented as the extension of Movement; and this leaves the difficulty what to make of the extension of Rest- though one thing may continue as long in repose as another in motion, so that we are obliged to think of one thing Time that covers both Rest and Movements, and, therefore, stands distinct from either.\n\nWhat then is this thing of extension?\n\nTo what order of beings does it belong?\n\nIt obviously is not spatial, for place, too, is something outside it.\n\nNext: Section 9"

