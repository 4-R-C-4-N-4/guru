[content]
body = "And, further, once we reject the theory that these images reach us by way of some outstreaming from the objects seen, there is no reason to think of the air being affected and passing on to us, in a progression of impression, what has been impressed upon itself.\n\nIf our perception is to depend upon previous impressions made upon the air, then we have no direct knowledge of the object of vision, but know it only as through an intermediary, in the same way as we are aware of warmth where it is not the distant fire itself that warms us, but the warmed intervening air.\n\nThat is a matter of contact; but sight is not produced by contact: the application of an object to the eye would not produce sight; what is required is the illumination of the intervening medium; for the air in itself is a dark substance: If it were not for this dark substance there would probably be no reason for the existence of light: the dark intervening matter is a barrier, and vision requires that it be overcome by light.\n\nPerhaps also the reason why an object brought close to the eye cannot be seen is that it confronts us with a double obscuration, its own and that of the air.\n\nNext: Section 3"

