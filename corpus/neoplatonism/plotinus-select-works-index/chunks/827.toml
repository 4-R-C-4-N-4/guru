[content]
body = "Note, similarly, that, when we speak of this First as Cause, we are affirming something happening not to it but to us, the fact that we take from this Self-Enclosed: strictly we should put neither a This nor a That to it; we hover, as it were, about it, seeking the statement of an experience of our own, sometimes nearing this Reality, sometimes baffled by the enigma in which it dwells.\n\nNext: Section 4"

