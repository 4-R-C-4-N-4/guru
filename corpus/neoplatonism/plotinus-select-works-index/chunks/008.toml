[content]
body = "Once a valuable necklace was stolen from Chione, who was living in honourable widowhood with her children in the same house as Plotinus: the servants were called before him: he scrutinized them all, then indicated one: 'This man is the thief.' The man was whipped but for some time persisted in denial: finally, however, he confessed, and restored the necklace.\n\nPlotinus foretold also the future of each of the children in the household: for instance, when questioned as to Polemon's character and destiny he said: 'He will be amorous and short-lived': and so it proved.\n\nI myself at one period had formed the intention of ending my life; Plotinus discerned my purpose; he came unexpectedly to my house where I had secluded myself, told me that my decision sprang not from reason but from mere melancholy and advised me to leave Rome.\n\nI obeyed and left for Sicily, which I chose because I heard that one Probus, a man of scholarly repute, was living there not far from Lilybaeum.\n\nThus I was induced to abandon my first intention but was prevented from being with Plotinus between that time and his death.\n\n12.\n\nThe Emperor Gallienus and his wife Salonina greatly honoured and venerated Plotinus, who thought to turn their friendly feeling to some good purpose.\n\nIn Campania there had once stood, according to tradition, a City of Philosophers, a ruin now; Plotinus asked the Emperor to rebuild this city and to make over the surrounding district to the new-founded state; the population was to live under Plato's laws: the city was to be called Platonopolis; and Plotinus undertook to settle down there with his associates.\n\nHe would have had his way without more ado but that opposition at court, prompted by jealousy, spite, or some such paltry motive, put an end to the plan.\n\n13.\n\nAt the Conferences he showed the most remarkable power of going to the heart of a subject, whether in exposition or in explanation, and his phrasing was apt; but he made mistakes in certain words; for example, he said 'anamnemisketai' for 'anamimnesketai'--just such errors as he committed in his writing.\n\nWhen he was speaking his intellect visibly illuminated his face: always of winning presence, he became at these times still more engaging: a slight moisture gathered on his forehead; he radiated benignity.\n\nHe was always as ready to entertain objections as he was powerful in meeting them.\n\nAt one time I myself kept interrogating him during three days as to how the soul is associated with the body, and he continued explaining; a man called Thaumasius entered in the midst of our discussions; the visitor was more interested in the general drift of the system than in particular points, and said he wished to hear Plotinus expounding some theory as he would in a set treatise, but that he could not endure Porphyry's questions and answers: Plotinus asked, 'But if we cannot first solve the difficulties Porphyry raises what could go into the treatise?' 14.\n\nIn style Plotinus is concise, dense with thought, terse, more lavish of ideas than of words, most often expressing himself with a fervid inspiration.\n\nHe followed his own path rather than that of tradition, but in his writings both the Stoic and Peripatetic doctrines are sunk; Aristotle's Metaphysics, especially, is condensed in them, all but entire.\n\nHe had a thorough theoretical knowledge of Geometry, Mechanics, Optics, and Music, though it was not in his temperament to go practically into these subjects."

