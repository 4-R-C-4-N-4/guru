[content]
body = "And if it is in eternal perfection, it has no points of time and place at which it will achieve perfection; it will, therefore, have no concern about attaining to any such points: it will, therefore, make no measurements of time or place; it will have, therefore, no memory of time and place.\n\nIf the stars live a blessed life in their vision of the life inherent in their souls, and if, by force of their souls' tendency to become one, and by the light they cast from themselves upon the entire heavens, they are like the strings of a lyre which, being struck in tune, sing a melody in some natural scale...\n\nif this is the way the heavens, as one, are moved, and the component parts in their relation to the whole- the sidereal system moving as one, and each part in its own way, to the same purpose, though each, too, hold its own place- then our doctrine is all the more surely established; the life of the heavenly bodies is the more clearly an unbroken unity.\n\nNext: Section 9"

