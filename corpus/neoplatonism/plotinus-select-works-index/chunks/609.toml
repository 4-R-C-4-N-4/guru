[content]
body = "True, greatness and smallness are not claimed to be quantities, but relations: but it is by their apparent possession of quantity that they are thought of as relations.\n\nAll this, however, needs more careful examination.\n\nIn sum, we hold that there is no single genus of Quantity.\n\nOnly number is Quantity, the rest [magnitudes, space, time, motion] quantities only in a secondary degree.\n\nWe have therefore not strictly one genus, but one category grouping the approximate with the primary and the secondary.\n\nWe have however to enquire in what sense the abstract numbers are substances.\n\nCan it be that they are also in a manner quantitative?\n\nInto whatever category they fall, the other numbers [those inherent in objects] can have nothing in common with them but the name.\n\n5.\n\nSpeech, time, motion- in what sense are these quantities?\n\nLet us begin with speech.\n\nIt is subject to measurement, but only in so far as it is sound; it is not a quantity in its essential nature, which nature is that it be significant, as noun and verb are significant.\n\nThe air is its Matter, as it is Matter to verb and noun, the components of speech.\n\nTo be more precise, we may define speech as an impact [made upon the outer air by the breath], though it is not so much the impact as the impression which the impact produces and which, as it were, imposes Form [upon the air].\n\nSpeech, thus, is rather an action than a quantity- an action with a significance.\n\nThough perhaps it would be truer to say that while this motion, this impact, is an action, the counter-motion is an experience [or Passion]; or each may be from different points of view either an action or an experience: or we may think of speech as action upon a substrate [air] and experience within that substrate.\n\nIf however voice is not characteristically impact, but is simply air, two categories will be involved: voice is significant, and the one category will not be sufficient to account for this significance without associating with a second.\n\nWith regard to time, if it is to be thought of as a measure, we must determine what it is that applies this measure.\n\nIt must clearly be either Soul or the Present Moment.\n\nIf on the contrary we take time to be something measured and regard it as being of such and such extension- a year, for example- then we may consider it as a quantity: essentially however time is of a different nature; the very fact that we can attribute this or that length to it shows us that it is not length: in other words, time is not Quantity.\n\nQuantity in the strict sense is the Quantity not inbound with things; if things became quantities by mere participation in Quantity, then Substance itself would be identical with Quantity.\n\nEquality and inequality must be regarded as properties of Quantity-Absolute, not of the participants, or of them not essentially but only accidentally: such participants as \"three yards' length,\" which becomes a quantity, not as belonging to a single genus of Quantity, but by being subsumed under the one head, the one category.\n\nNext: Section 6"

