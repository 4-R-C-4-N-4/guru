[content]
body = "That one Reason-Principle, then, must be the unification of conflicting Reason-Principles whose very opposition is the support of its coherence and, almost, of its Being.\n\nAnd indeed, if it were not multiple, it could not be a Universal Principle, it could not even be at all a Reason-Principle; in the fact of its being a Reason-Principle is contained the fact of interior difference.\n\nNow the maximum of difference is contrariety; admitting that this differentiation exists and creates, it will create difference in the greatest and not in the least degree; in other words, the Reason-Principle, bringing about differentiation to the uttermost degree, will of necessity create contrarieties: it will be complete only by producing itself not in merely diverse things but in contrary things.\n\nNext: Section 17"

