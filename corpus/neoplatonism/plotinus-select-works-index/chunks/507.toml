[content]
body = "Sacred Texts Classics Index Previous Next Section 6 6.\n\nBut how and what does the Intellectual-Principle see and, especially, how has it sprung from that which is to become the object of its vision?\n\nThe mind demands the existence of these Beings, but it is still in trouble over the problem endlessly debated by the most ancient philosophers: from such a unity as we have declared The One to be, how does anything at all come into substantial existence, any multiplicity, dyad, or number?\n\nWhy has the Primal not remained self-gathered so that there be none of this profusion of the manifold which we observe in existence and yet are compelled to trace to that absolute unity?\n\nIn venturing an answer, we first invoke God Himself, not in loud word but in that way of prayer which is always within our power, leaning in soul towards Him by aspiration, alone towards the alone.\n\nBut if we seek the vision of that great Being within the Inner Sanctuary- self-gathered, tranquilly remote above all else- we begin by considering the images stationed at the outer precincts, or, more exactly to the moment, the first image that appears.\n\nHow the Divine Mind comes into being must be explained: Everything moving has necessarily an object towards which it advances; but since the Supreme can have no such object, we may not ascribe motion to it: anything that comes into being after it can be produced only as a consequence of its unfailing self-intention; and, of course, we dare not talk of generation in time, dealing as we are with eternal Beings: where we speak of origin in such reference, it is in the sense, merely, of cause and subordination: origin from the Supreme must not be taken to imply any movement in it: that would make the Being resulting from the movement not a second principle but a third: the Movement would be the second hypostasis.\n\nGiven this immobility in the Supreme, it can neither have yielded assent nor uttered decree nor stirred in any way towards the existence of a secondary.\n\nWhat happened then?\n\nWhat are we to conceive as rising in the neighbourhood of that immobility?\n\nIt must be a circumradiation- produced from the Supreme but from the Supreme unaltering- and may be compared to the brilliant light encircling the sun and ceaselessly generated from that unchanging substance.\n\nAll existences, as long as they retain their character, produce- about themselves, from their essence, in virtue of the power which must be in them- some necessary, outward-facing hypostasis continuously attached to them and representing in image the engendering archetypes: thus fire gives out its heat; snow is cold not merely to itself; fragrant substances are a notable instance; for, as long as they last, something is diffused from them and perceived wherever they are present.\n\nAgain, all that is fully achieved engenders: therefore the eternally achieved engenders eternally an eternal being.\n\nAt the same time, the offspring is always minor: what then are we to think of the All-Perfect but that it can produce nothing less than the very greatest that is later than itself.\n\nThe greatest, later than the divine unity, must be the Divine Mind, and it must be the second of all existence, for it is that which sees The One on which alone it leans while the First has no need whatever of it.\n\nThe offspring of the prior to Divine Mind can be no other than that Mind itself and thus is the loftiest being in the universe, all else following upon it- the soul, for example, being an utterance and act of the Intellectual-Principle as that is an utterance and act of The One."

