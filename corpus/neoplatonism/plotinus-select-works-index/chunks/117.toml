[content]
body = "Sacred Texts Classics Index Previous Next Section 6 6.\n\nWe may now consider the question whether fire is the sole element existing in that celestial realm and whether there is any outgoing thence with the consequent need of renewal.\n\nTimaeus pronounced the material frame of the All to consist primarily of earth and fire for visibility, earth for solidity- and deduced that the stars must be mainly composed of fire, but not solely since there is no doubt they are solid.\n\nAnd this is probably a true account.\n\nPlato accepts it as indicated by all the appearances.\n\nAnd, in fact, to all our perception- as we see them and derive from them the impression of illumination- the stars appear to be mostly, if not exclusively, fire: but on reasoning into the matter we judge that since solidity cannot exist apart from earth-matter, they must contain earth as well.\n\nBut what place could there be for the other elements?\n\nIt is impossible to imagine water amid so vast a conflagration; and if air were present it would be continually changing into fire.\n\nAdmitting [with Timaeus; as a logical truth] that two self-contained entities, standing as extremes to each other need for their coherence two intermediaries; we may still question whether this holds good with regard to physical bodies.\n\nCertainly water and earth can be mixed without any such intermediate.\n\nIt might seem valid to object that the intermediates are already present in the earth and the water; but a possible answer would be, \"Yes, but not as agents whose meeting is necessary to the coherence of those extremes.\" None the less we will take it that the coherence of extremes is produced by virtue of each possessing all the intermediates.\n\nIt is still not proven that fire is necessary to the visibility of earth and earth to the solidarity of fire.\n\nOn this principle, nothing possesses an essential-nature of its very own; every several thing is a blend, and its name is merely an indication of the dominant constituent.\n\nThus we are told that earth cannot have concrete existence without the help of some moist element- the moisture in water being the necessary adhesive- but admitting that we so find it, there is still a contradiction in pretending that any one element has a being of its own and in the same breath denying its self-coherence, making its subsistence depend upon others, and so, in reality, reducing the specific element to nothing.\n\nHow can we talk of the existence of the definite Kind, earth- earth essential- if there exists no single particle of earth which actually is earth without any need of water to secure its self-cohesion?\n\nWhat has such an adhesive to act upon if there is absolutely no given magnitude of real earth to which it may bind particle after particle in its business of producing the continuous mass?\n\nIf there is any such given magnitude, large or small, of pure earth, then earth can exist in its own nature, independently of water: if there is no such primary particle of pure earth, then there is nothing whatever for the water to bind.\n\nAs for air- air unchanged, retaining its distinctive quality- how could it conduce to the subsistence of a dense material like earth?\n\nSimilarly with fire.\n\nNo doubt Timaeus speaks of it as necessary not to the existence but to the visibility of earth and the other elements; and certainly light is essential to all visibility- we cannot say that we see darkness, which implies, precisely, that nothing is seen, as silence means nothing being heard.\n\nBut all this does not assure us that the earth to be visible must contain fire: light is sufficient: snow, for example, and other extremely cold substances gleam without the presence of fire- though of course it might be said that fire was once there and communicated colour before disappearing.\n\nAs to the composition of water, we must leave it an open question whether there can be such a thing as water without a certain proportion of earth."

