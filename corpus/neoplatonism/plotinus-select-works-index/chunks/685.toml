[content]
body = "But we refrain from assigning Soul to Sensible Substance, on the ground that we have already referred to Quality [which is Sensible] those affections of Soul which are related to body.\n\nOn the contrary, Soul, conceived apart from affection and Reason-Principle, we have restored to its origin, leaving in the lower realm no substance which is in any sense Intellectual.\n\nNext: Section 17"

