[content]
body = "Some questions of detail remain for consideration elsewhere: Is it necessary that the object upon which judgement or perception is to take place should be in contact with the organ of perception, or can the process occur across space upon an object at a distance?\n\nThus, is the heat of a fire really at a distance from the flesh it warms, the intermediate space remaining unmodified; is it possible to see colour over a sheer blank intervening between the colour and the eye, the organ of vision reaching to its object by its own power?\n\nFor the moment we have one certainty, that perception of things of sense belongs to the embodied soul and takes place through the body.\n\nNext: Section 24"

