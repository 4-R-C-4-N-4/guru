[content]
body = "There is no reason why it should be expectant of evil with regard to such a body nor is there any such preoccupied concern, bringing about a veritable descent, as to withdraw it from its noblest and most blessed vision; it remains always intent upon the Supreme, and its governance of this universe is effected by a power not calling upon act.\n\nNext: Section 3"

