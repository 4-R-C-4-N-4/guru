[content]
body = "Thus, is the heat of a fire really at a distance from the flesh it warms, the intermediate space remaining unmodified; is it possible to see colour over a sheer blank intervening between the colour and the eye, the organ of vision reaching to its object by its own power?\n\nFor the moment we have one certainty, that perception of things of sense belongs to the embodied soul and takes place through the body.\n\nNext: Section 24"

