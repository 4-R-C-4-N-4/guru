[content]
body = "This means that it is no external limit that defines the individual being or the extension of souls any more than of God; on the contrary each in right of its own power is all that it chooses to be: and we are not to think of it as going forth from itself [losing its unity by any partition]: the fact is simply that the element within it, which is apt to entrance into body, has the power of immediate projection any whither: the soul is certainly not wrenched asunder by its presence at once in foot and in finger.\n\nIts presence in the All is similarly unbroken; over its entire range it exists in every several part of everything having even vegetal life, even in a part cut off from the main; in any possible segment it is as it is at its source.\n\nFor the body of the All is a unit, and soul is everywhere present to it as to one thing.\n\nWhen some animal rots and a multitude of others spring from it, the Life-Principle now present is not the particular soul that was in the larger body; that body has ceased to be receptive of soul, or there would have been no death; what happens is that whatsoever in the product of the decay is apt material for animal existence of one kind or another becomes ensouled by the fact that soul is nowhere lacking, though a recipient of soul may be.\n\nThis new ensouling does not mean, however, an increase in the number of souls: all depend from the one or, rather, all remains one: it is as with ourselves; some elements are shed, others grow in their place; the soul abandons the discarded and flows into the newcoming as long as the one soul of the man holds its ground; in the All the one soul holds its ground for ever; its distinct contents now retain soul and now reject it, but the total of spiritual beings is unaffected.\n\nNext: Section 9"

