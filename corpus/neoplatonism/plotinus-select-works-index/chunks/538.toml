[content]
body = "Sacred Texts Classics Index Previous Next Section 15 15.\n\nConferring- but how?\n\nAs itself possessing them or not?\n\nHow can it convey what it does not possess, and yet if it does possess how is it simplex?\n\nAnd if, again, it does not, how is it the source of the manifold?\n\nA single, unmanifold emanation we may very well allow- how even that can come from a pure unity may be a problem, but we may always explain it on the analogy of the irradiation from a luminary- but a multitudinous production raises question.\n\nThe explanation is that what comes from the Supreme cannot be identical with it and assuredly cannot be better than it- what could be better than The One or the utterly transcendent?\n\nThe emanation, then, must be less good, that is to say, less self-sufficing: now what must that be which is less self-sufficing than The One?\n\nObviously the Not-One, that is to say, multiplicity, but a multiplicity striving towards unity; that is to say, a One-that-is-many.\n\nAll that is not One is conserved by virtue of the One, and from the One derives its characteristic nature: if it had not attained such unity as is consistent with being made up of multiplicity we could not affirm its existence: if we are able to affirm the nature of single things, this is in virtue of the unity, the identity even, which each of them possesses.\n\nBut the all-transcendent, utterly void of multiplicity, has no mere unity of participation but is unity's self, independent of all else, as being that from which, by whatever means, all the rest take their degree of unity in their standing, near or far, towards it.\n\nIn virtue of the unity manifested in its variety it exhibits, side by side, both an all-embracing identity and the existence of the secondary: all the variety lies in the midst of a sameness, and identity cannot be separated from diversity since all stands as one; each item in that content, by the fact of participating in life, is a One-many: for the item could not make itself manifest as a One-and-all.\n\nOnly the Transcendent can be that; it is the great beginning, and the beginning must be a really existent One, wholly and truly One, while its sequent, poured down in some way from the One, is all, a total which has participation in unity and whose every member is similarly all and one.\n\nWhat then is the All?\n\nThe total of which the Transcendent is the Source.\n\nBut in what way is it that source?\n\nIn the sense, perhaps, of sustaining things as bestower of the unity of each single item?\n\nThat too; but also as having established them in being.\n\nBut how?\n\nAs having, perhaps, contained them previously?\n\nWe have indicated that, thus, the First would be a manifold.\n\nMay we think, perhaps, that the First contained the universe as an indistinct total whose items are elaborated to distinct existence within the Second by the Reason-Principle there?\n\nThat Second is certainly an Activity; the Transcendent would contain only the potentiality of the universe to come.\n\nBut the nature of this contained potentiality would have to be explained: it cannot be that of Matter, a receptivity, for thus the Source becomes passive- the very negation of production.\n\nHow then does it produce what it does not contain?\n\nCertainly not at haphazard and certainly not by selection.\n\nHow then?\n\nWe have observed that anything that may spring from the One must be different from it.\n\nDiffering, it is not One, since then it would be the Source.\n\nIf unity has given place to duality, from that moment there is multiplicity; for here is variety side by side with identity, and this imports quality and all the rest."

