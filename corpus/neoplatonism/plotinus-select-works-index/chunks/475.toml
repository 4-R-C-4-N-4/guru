[content]
body = "Clearly it is what we describe as Veritable Essence.\n\nThe other order, the entire corporeal Kind, is process; it appears and it perishes; in reality it never possesses Being, but is merely protected, in so far as it has the capacity, by participating in what authentically is.\n\nNext: Section 9"

