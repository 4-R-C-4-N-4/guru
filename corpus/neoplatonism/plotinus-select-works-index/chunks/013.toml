[content]
body = "'Plotinus, it would seem, set the principles of Pythagoras and of Plato in a clearer light than anyone before him; on the same subjects, Numenius, Cronius, Moderatus, and Thrasyllus fall far short of him in precision and fullness.\n\nAmelius set himself to walk in Plotinus' steps and adopted most of Plotinus' opinions; his method, however, was diffuse an, unlike his friend, he indulges in an extravagance of explanation.\n\n'Only these two seem to me worth study.\n\nWhat profit can anyone expect from troubling the works of any of the others to the neglect of the originals on which they drew?\n\nThey bring us nothing of their own, not even a novel augment, much less a leading idea, and are too unconcerned even to set side by side the most generally adopted theories or to choose the better among them.\n\n'My own method has been different; as for example when I replied to Gentilianus upon Plato's treatment of Justice and in a review I undertook of Plotinus' work On the Ideas .\n\nThis latter was in the form of a reply to Basileus of Tyre, my friend as theirs.\n\nHe had preferred Plotinus' system to mine and had written several works in the manner of his master, amongst them a treatise supporting Plotinus' theory of the Idea against that which I taught.\n\nI endeavoured, not, I think, unsuccessfully, to show that his change of mind was mistaken.\n\n'In these two essays I have ranged widely over the doctrines of this school, as also in my Letter to Amelius which, despite the simple title with which I contented myself, has the dimensions of a book, being a reply to a treatise he addressed to me from Rome under the title On Plotinus' Philosophic Method .' 21.\n\nThis Preface leaves no doubt of Longinus' final verdict: he ranks Plotinus and Amelius above all authors of his time in the multitude of questions they discuss; he credits them with an original method of investigation: in his judgement they by no means took their system from Numenius or gave a first place to his opinions, but followed the Pythagorean and Platonic schools; finally he declares the writings of Numenius, Cronius, Moderatus, and Thrasyllus greatly inferior in precision and fullness to those of Plotinus.\n\nNotice, by the way, that while AMelius id described as following in Plotinus' footsteps, it is indicated that his temperamental prolixity led him to delight in an extravagance of explanation foreign to his master: in the reference to myself, though I was then only at the beginning of my association with Plotinus--'Basileus of Tyre, my friend as theirs, who has written a good deal, has taken Plotinus as his model'--Longinus recognizes that I entirely avoided Amelius' unphilosophical prolixity and made Plotinus' manner my standard.\n\nSuch a pronouncement upon the value of Plotinus' work, coming from so great an authority, the first of critics then as now, must certainly carry weight, and I may remark that if I had been able to confer with him, during such a visit as he proposed, he would not have written to combat doctrines which he had not thoroughly penetrated.\n\n22.\n\nBut why talk, to use Hesiod's phrase, 'About Oak and Rock'?\n\nIf we are to accept the evidence of the wise--who could be wiser than a God?\n\nAnd here the witness is the same God that said with truth: 'I have numbered the sands and taken the measure of the sea; I understand the dumb and hear where there has been no speech.' Apollo was consulted by Amelius, who desired to learn where Plotinus' soul had gone."

