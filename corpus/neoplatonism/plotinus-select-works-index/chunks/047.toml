[content]
body = "Section 3 3. Yes, but if the well-being has lasted a long time, if that present spectacle has been a longer time before the eyes? If in the greater length of time the man has seen more deeply, time has certainly done something for him, but if all the process has brought him no further vision, then one glance would give all he has had."

