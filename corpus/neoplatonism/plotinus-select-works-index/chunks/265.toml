[content]
body = "Where the procreative desire is lawless or against the purposes of nature, the first inspiration has been natural, but they have diverged from the way, they have slipped and fallen, and they grovel; they neither understand whither Love sought to lead them nor have they any instinct to production; they have not mastered the right use of the images of beauty; they do not know what the Authentic Beauty is.\n\nThose that love beauty of person without carnal desire love for beauty's sake; those that have- for women, of course- the copulative love, have the further purpose of self-perpetuation: as long as they are led by these motives, both are on the right path, though the first have taken the nobler way.\n\nBut, even in the right, there is the difference that the one set, worshipping the beauty of earth, look no further, while the others, those of recollection, venerate also the beauty of the other world while they, still, have no contempt for this in which they recognize, as it were, a last outgrowth, an attenuation of the higher.\n\nThese, in sum, are innocent frequenters of beauty, not to be confused with the class to whom it becomes an occasion of fall into the ugly- for the aspiration towards a good degenerates into an evil often.\n\nSo much for love, the state.\n\nNow we have to consider Love, the God.\n\nNext: Section 2"

