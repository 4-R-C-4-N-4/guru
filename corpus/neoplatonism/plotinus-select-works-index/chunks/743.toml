[content]
body = "If Unity is necessary to the substantial existence of all that really is- and nothing exists which is not one- Unity must precede Reality and be its author.\n\nIt is therefore, an existent Unity, not an existent that develops Unity; considered as Being-with-Unity it would be a manifold, whereas in the pure Unity there is no Being save in so far as Unity attends to producing it.\n\nAs regards the word \"This,\" it is nat a bare word; it affirms an indicated existence without using the name, it tells of a certain presence, whether a substance or some other existent; any This must be significant; it is no attitude of the mind applying itself to a non-existent; the This shows a thing present, as much as if we used the strict name of the object.\n\nNext: Section 14"

