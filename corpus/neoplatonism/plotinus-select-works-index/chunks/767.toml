[content]
body = "To a traveller over land, all is earth but earth abounding in difference: so in this journey the life through which Intellectual-Principle passes is one life but, in its ceaseless changing, a varied life.\n\nThroughout this endless variation it maintains the one course because it is not, itself, subject to change but on the contrary is present as identical and unvarying Being to the rest of things.\n\nFor if there be no such principle of unchanging identity to things, all is dead, activity and actuality exist nowhere.\n\nThese \"other things\" through which it passes are also Intellectual-Principle itself; otherwise it is not the all-comprehending principle: if it is to be itself, it must be all-embracing; failing that, it is not itself.\n\nIf it is complete in itself, complete because all-embracing, and there is nothing which does not find place in this total, then there can be nothing belonging to it which is not different; only by difference can there be such co-operation towards a total.\n\nIf it knew no otherness but was pure identity its essential Being would be the less for that failure to fulfil the specific nature which its completion requires.\n\nNext: Section 14"

