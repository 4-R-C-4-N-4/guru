[content]
body = "In some cases it communicates its force by permanent presence the life principle in plants for instance- in other cases it withdraws after imparting its virtue- for instance where from the putridity of dead animal or vegetable matter a multitudinous birth is produced from one organism.\n\nA power corresponding to this in the All must reach down and co-operate in the life of our world- in fact the very same power.\n\nIf the Soul returns to this Sphere it finds itself under the same Spirit or a new, according to the life it is to live.\n\nWith this Spirit it embarks in the skiff of the universe: the \"spindle of Necessity\" then takes control and appoints the seat for the voyage, the seat of the lot in life.\n\nThe Universal circuit is like a breeze, and the voyager, still or stirring, is carried forward by it.\n\nHe has a hundred varied experiences, fresh sights, changing circumstances, all sorts of events.\n\nThe vessel itself furnishes incident, tossing as it drives on.\n\nAnd the voyager also acts of himself in virtue of that individuality which he retains because he is on the vessel in his own person and character.\n\nUnder identical circumstances individuals answer very differently in their movements and acts: hence it comes about that, be the occurrences and conditions of life similar or dissimilar, the result may differ from man to man, as on the other hand a similar result may be produced by dissimilar conditions: this (personal answer to incident) it is that constitutes destiny.\n\nNext: FIFTH TRACTATE"

