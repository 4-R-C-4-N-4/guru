[content]
body = "Doubtless the truth is that every quality performs its own function independently of a standard; for in no case could it produce an effect outside of its power.\n\nEven beauty would seem to have a power of its own.\n\nDoes this apply to triangularity?\n\nPerhaps, after all, it is not a power we must consider, but a disposition.\n\nThus, qualities will be determined by the forms and characteristics of the object qualified: their common element, then, will be Form and ideal type, imposed upon Substance and posterior to it.\n\nBut then, how do we account for the powers?\n\nWe may doubtless remark that even the natural boxer is so by being constituted in a particular way; similarly, with the man unable to box: to generalize, the quality is a characteristic non-essential.\n\nWhatever is seen to apply alike to Being and to non-Being, as do heat and whiteness and colours generally, is either different from Being- is, for example, an Act of Being- or else is some secondary of Being, derived from it, contained in it, its image and likeness.\n\nBut if Quality is determined by formation and characteristic and Reason-Principle, how explain the various cases of powerlessness and deformity?\n\nDoubtless we must think of Principles imperfectly present, as in the case of deformity.\n\nAnd disease- how does that imply a Reason-Principle?\n\nHere, no doubt, we must think of a principle disturbed, the Principle of health.\n\nBut it is not necessary that all qualities involve a Reason-Principle; it suffices that over and above the various kinds of disposition there exist a common element distinct from Substance, and it is what comes after the substance that constitutes Quality in an object.\n\nBut triangularity is a quality of that in which it is present; it is however no longer triangularity as such, but the triangularity present in that definite object and modified in proportion to its success in shaping that object.\n\nNext: Section 11"

