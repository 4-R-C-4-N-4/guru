[content]
body = "Clearly nothing may legitimately be excluded [from Being], for the whole must be complete in the higher sphere which, otherwise, would not be the whole.\n\nLife, too, burst upon Being, or rather was inseparably bound up with it; and thus it was that all living things of necessity came to be.\n\nBody too was there, since Matter and Quality were present.\n\nEverything exists forever, unfailing, involved by very existence in eternity.\n\nIndividuals have their separate entities, but are at one in the [total] unity.\n\nThe complex, so to speak, of them all, thus combined, is Intellect; and Intellect, holding all existence within itself, is a complete living being, and the essential Idea of Living Being.\n\nIn so far as Intellect submits to contemplation by its derivative, becoming an Intelligible, it gives that derivative the right also to be called \"living being.\" Next: Section 22"

