[content]
body = "Several women were greatly attached to him, amongst them Gemina, in whose house he lived, and her daughter, called Gemina, too, after the mother, and Amphiclea, the wife Ariston, son Iamblichus; all three devoted themselves assiduously to philosophy.\n\nNot a few men and women of position, on the approach of death, had left their boys and girls, with all their property, in his care, feeling that with Plotinus for guardian the children would be in holy hands.\n\nHis house therefore was filled with lads lasses, amongst them Potamon, in whose education he took such interest as often to hear the boy recite verses of his own composition.\n\nHe always found time for those that came to submit returns of the children's property, and he looked closely to the accuracy of the accounts: 'Until the young people take to philosophy,' he used to say, 'their fortunes and revenues must be kept intact for them.' And yet all this labour and thought over the worldly interests of so many people never interrupted, during waking hours, his intention towards the Supreme.\n\nHe was gentle, and always at the call of those having the slightest acquaintance with him.\n\nAfter spending twenty-six years in Rome, acting, too, as arbiter in many differences, he had never made an enemy of any citizen.\n\n10.\n\nAmong those making profession of Philosophy at Rome was one Olympius, an Alexandrian, who had been for a little while a pupil of Ammonius.\n\nThis man's jealous envy showed itself in continual insolence, and finally he grew so bitter that he even ventured sorcery, seeking to crush Plotinus by star-spells.\n\nBut he found his experiments recoiling upon himself, and he confessed to his associates that Plotinus possessed 'a mighty soul, so powerful, as to be able to hurl every assault back upon those that sought his ruin'.\n\nPlotinus had felt the operation and declared that at that moment Olympius' 'limbs were convulsed and his body shrivelling like a money-bag pulled tight'.\n\nOlympius, perceiving on several attempts that he was endangering himself rather than Plotinus, desisted.\n\nIn fact Plotinus possessed by birth something more than is accorded to other men.\n\nAn Egyptian priest who had arrived in Rome and, through some friend, had been presented to the philosopher, became desirous of displaying his powers to him, and he offered to evoke a visible manifestation of Plotinus' presiding spirit.\n\nPlotinus readily consented and the evocation was made in the Temple of Isis, the only place, they say, which the Egyptian could find pure in Rome.\n\nAt the summons a Divinity appeared, not a being of the spirit-ranks, and the Egyptian exclaimed: 'You are singularly graced; the guiding-spirit within you is not of the lower degree but a God.' It was not possible, however, to interrogate or even to contemplate this God any further, for the priest's assistant, who had been holding the birds to prevent them flying away, strangled them, whether through jealousy or in terror.\n\nThus Plotinus had for indwelling spirit a Being of the more divine degree, and he kept his own divine spirit unceasingly intent upon that inner presence.\n\nIt was this preoccupation that led him to write his treatise upon Our Tutelary Spirit , an essay in the explanation of the differences among spirit-guides.\n\nAmelius was scrupulous in observing the day of the New-Moon and other holy-days, and once asked Plotinus to join in some such celebration: Plotinus refused: 'It is for those Beings to come to me, not for me to go to them.' What was in his mind in so lofty an utterance we could not explain to ourselves and we dared not ask him.\n\n11.\n\nHe had a remarkable penetration into character."

