[content]
body = "But in soul the utterance is obscured, for soul is an image and must look to its own original: that Principle, on the contrary, looks to the First without mediation- thus becoming what it is- and has that vision not as from a distance but as the immediate next with nothing intervening, close to the One as Soul to it.\n\nThe offspring must seek and love the begetter; and especially so when begetter and begotten are alone in their sphere; when, in addition, the begetter is the highest good, the offspring [inevitably seeking its Good] is attached by a bond of sheer necessity, separated only in being distinct.\n\nNext: Section 7"

