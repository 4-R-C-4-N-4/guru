[content]
body = "Why, then, are water and air not ensouled as earth is?\n\nNow, it is quite certain that these are equally within the living total, parts of the living all; life does not appear visibly in them; but neither does it in the case of the earth where its presence is inferred by what earth produces: but there are living things in fire and still more manifestly in water and there are systems of life in the air.\n\nThe particular fire, rising only to be quenched, eludes the soul animating the universe; it slips away from the magnitude which would manifest the soul within it; so with air and water.\n\nIf these Kinds could somehow be fastened down to magnitude they would exhibit the soul within them, now concealed by the fact that their function requires them to be loose or flowing.\n\nIt is much as in the case of the fluids within ourselves; the flesh and all that is formed out of the blood into flesh show the soul within, but the blood itself, not bringing us any sensation, seems not to have soul; yet it must; the blood is not subject to blind force; its nature obliges it to abstain from the soul which nonetheless is indwelling in it.\n\nThis must be the case with the three elements; it is the fact that the living beings formed from the close conglomeration of air [the stars] are not susceptible to suffering.\n\nBut just as air, so long as it remains itself, eludes the light which is and remains unyielding, so too, by the effect of its circular movement, it eludes soul- and, in another sense, does not.\n\nAnd so with fire and water.\n\nNext: Section 12"

