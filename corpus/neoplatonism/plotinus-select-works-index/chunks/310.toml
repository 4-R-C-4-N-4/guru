[content]
body = "But the conception of Eternity demands something which is in its nature complete without sequence; it is not satisfied by something measured out to any remoter time or even by something limitless, but, in its limitless reach, still having the progression of futurity: it requires something immediately possessed of the due fullness of Being, something whose Being does not depend upon any quantity [such as instalments of time] but subsists before all quantity.\n\nItself having no quantity, it can have no contact with anything quantitative since its Life cannot be made a thing of fragments, in contradiction to the partlessness which is its character; it must be without parts in the Life as in the essence.\n\nThe phrase \"He was good\" [used by Plato of the Demiurge] refers to the Idea of the All; and its very indefiniteness signifies the utter absense of relation to Time: so that even this Universe has had no temporal beginning; and if we speak of something \"before\" it, that is only in the sense of the Cause from which it takes its Eternal Existence.\n\nPlato used the word merely for the convenience of exposition, and immediately corrects it as inappropriate to the order vested with the Eternity he conceives and affirms.\n\nNext: Section 7"

