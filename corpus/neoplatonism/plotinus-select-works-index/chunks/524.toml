[content]
body = "Sacred Texts Classics Index Previous Next Section 5 5.\n\nDoes it all come down, then, to one phase of the self knowing another phase?\n\nThat would be a case of knower distinguished from known, and would not be self-knowing.\n\nWhat, then, if the total combination were supposed to be of one piece, knower quite undistinguished from known, so that, seeing any given part of itself as identical with itself, it sees itself by means of itself, knower and known thus being entirely without differentiation?\n\nTo begin with, the distinction in one self thus suggested is a strange phenomenon.\n\nHow is the self to make the partition?\n\nThe thing cannot happen of itself.\n\nAnd, again, which phase makes it?\n\nThe phase that decides to be the knower or that which is to be the known?\n\nThen how can the knowing phase know itself in the known when it has chosen to be the knower and put itself apart from the known?\n\nIn such self-knowledge by sundering it can be aware only of the object, not of the agent; it will not know its entire content, or itself as an integral whole; it knows the phase seen but not the seeing phase and thus has knowledge of something else, not self-knowledge.\n\nIn order to perfect self-knowing it must bring over from itself the knowing phase as well: seeing subject and seen objects must be present as one thing.\n\nNow if in this coalescence of seeing subject with seen objects, the objects were merely representations of the reality, the subject would not possess the realities: if it is to possess them it must do so not by seeing them as the result of any self-division but by knowing them, containing them, before any self-division occurs.\n\nAt that, the object known must be identical with the knowing act [or agent], the Intellectual-Principle, therefore, identical with the Intellectual Realm.\n\nAnd in fact, if this identity does not exist, neither does truth; the Principle that should contain realities is found to contain a transcript, something different from the realities; that constitutes non-Truth; Truth cannot apply to something conflicting with itself; what it affirms it must also be.\n\nThus we find that the Intellectual-Principle, the Intellectual Realm and Real Being constitute one thing, which is the Primal Being; the primal Intellectual-Principle is that which contains the realities or, rather, which is identical with them.\n\nBut taking Primal Intellection and its intellectual object to be a unity, how does that give an Intellective Being knowing itself?\n\nAn intellection enveloping its object or identical with it is far from exhibiting the Intellectual-Principle as self-knowing.\n\nAll turns on the identity.\n\nThe intellectual object is itself an activity, not a mere potentiality; it is not lifeless; nor are the life and intellection brought into it as into something naturally devoid of them, some stone or other dead matter; no, the intellectual object is essentially existent, the primal reality.\n\nAs an active force, the first activity, it must be, also itself, the noblest intellection, intellection possessing real being since it is entirely true; and such an intellection, primal and primally existent, can be no other than the primal principle of Intellection: for that primal principle is no potentiality and cannot be an agent distinct from its act and thus, once more, possessing its essential being as a mere potentiality.\n\nAs an act- and one whose very being is an act- it must be undistinguishably identical with its act: but Being and the Intellectual object are also identical with that act; therefore the Intellectual-Principle, its exercise of intellection and the object of intellection all are identical."

