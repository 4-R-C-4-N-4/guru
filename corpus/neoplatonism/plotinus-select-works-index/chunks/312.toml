[content]
body = "Sacred Texts Classics Index Previous Next Section 8 8.\n\nMovement Time cannot be- whether a definite act of moving is meant or a united total made up of all such acts- since movement, in either sense, takes place in Time.\n\nAnd, of course, if there is any movement not in Time, the identification with Time becomes all the less tenable.\n\nIn a word, Movement must be distinct from the medium in which it takes place.\n\nAnd, with all that has been said or is still said, one consideration is decisive: Movement can come to rest, can be intermittent; Time is continuous.\n\nWe will be told that the Movement of the All is continuous [and so may be identical with Time].\n\nBut, if the reference is to the Circuit of the heavenly system [it is not strictly continuous, or equable, since] the time taken in the return path is not that of the outgoing movement; the one is twice as long as the other: this Movement of the All proceeds, therefore, by two different degrees; the rate of the entire journey is not that of the first half.\n\nFurther, the fact that we hear of the Movement of the outermost sphere being the swiftest confirms our theory.\n\nObviously, it is the swiftest of movements by taking the lesser time to traverse the greater space the very greatest- all other moving things are slower by taking a longer time to traverse a mere segment of the same extension: in other words, Time is not this movement.\n\nAnd, if Time is not even the movement of the Kosmic Sphere much less is it the sphere itself though that has been identified with Time on the ground of its being in motion.\n\nIs it, then, some phenomenon or connection of Movement?\n\nLet us, tentatively, suppose it to be extent, or duration, of Movement.\n\nNow, to begin with, Movement, even continuous, has no unchanging extent [as Time the equable has], since, even in space, it may be faster or slower; there must, therefore, be some unit of standard outside it, by which these differences are measurable, and this outside standard would more properly be called Time.\n\nAnd failing such a measure, which extent would be Time, that of the fast or of the slow- or rather which of them all, since these speed-differences are limitless?\n\nIs it the extent of the subordinate Movement [= movement of things of earth]?\n\nAgain, this gives us no unit since the movement is infinitely variable; we would have, thus, not Time but Times.\n\nThe extent of the Movement of the All, then?\n\nThe Celestial Circuit may, no doubt, be thought of in terms of quantity.\n\nIt answers to measure- in two ways.\n\nFirst there is space; the movement is commensurate with the area it passes through, and this area is its extent.\n\nBut this gives us, still, space only, not Time.\n\nSecondly, the circuit, considered apart from distance traversed, has the extent of its continuity, of its tendency not to stop but to proceed indefinitely: but this is merely amplitude of Movement; search it, tell its vastness, and, still, Time has no more appeared, no more enters into the matter, than when one certifies a high pitch of heat; all we have discovered is Motion in ceaseless succession, like water flowing ceaselessly, motion and extent of motion.\n\nSuccession or repetition gives us Number- dyad, triad, etc.- and the extent traversed is a matter of Magnitude; thus we have Quantity of Movement- in the form of number, dyad, triad, decade, or in the form of extent apprehended in what we may call the amount of the Movement: but, the idea of Time we have not."

