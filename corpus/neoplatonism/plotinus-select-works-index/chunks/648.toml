[content]
body = "In so doing, we shall not withhold Identity and Difference from the subsequents of the Intellectual order; the thing of Sense has, it is clear, a particular identity and a particular difference, but Identity and Difference have the generic status independently of the particular.\n\nThey will, moreover, be primary genera, because nothing can be predicated of them as denoting their essential nature.\n\nNothing, of course we mean, but Being; but this Being is not their genus, since they cannot be identified with any particular being as such.\n\nSimilarly, Being will not stand as genus to Motion or Stability, for these also are not its species.\n\nBeings [or Existents] comprise not merely what are to be regarded as species of the genus Being, but also participants in Being.\n\nOn the other hand, Being does not participate in the other four principles as its genera: they are not prior to Being; they do not even attain to its level.\n\nNext: Section 9"

