[content]
body = "Sacred Texts Classics Index Previous Next Section 4 4.\n\nWe are told that number is Quantity in the primary sense, number together with all continuous magnitude, space and time: these are the standards to which all else that is considered as Quantity is referred, including motion which is Quantity because its time is quantitative- though perhaps, conversely, the time takes its continuity from the motion.\n\nIf it is maintained that the continuous is a Quantity by the fact of its continuity, then the discrete will not be a Quantity.\n\nIf, on the contrary, the continuous possesses Quantity as an accident, what is there common to both continuous and discrete to make them quantities?\n\nSuppose we concede that numbers are quantities: we are merely allowing them the name of quantity; the principle which gives them this name remains obscure.\n\nOn the other hand, line and surface and body are not called quantities; they are called magnitudes: they become known as quantities only when they are rated by number-two yards, three yards.\n\nEven the natural body becomes a quantity when measured, as does the space which it occupies; but this is quantity accidental, not quantity essential; what we seek to grasp is not accidental quantity but Quantity independent and essential, Quantity-Absolute.\n\nThree oxen is not a quantity; it is their number, the three, that is Quantity; for in three oxen we are dealing with two categories.\n\nSo too with a line of a stated length, a surface of a given area; the area will be a quantity but not the surface, which only comes under that category when it constitutes a definite geometric figure.\n\nAre we then to consider numbers, and numbers only, as constituting the category of Quantity?\n\nIf we mean numbers in themselves, they are substances, for the very good reason that they exist independently.\n\nIf we mean numbers displayed in the objects participant in number, the numbers which give the count of the objects- ten horses or ten oxen, and not ten units- then we have a paradoxical result: first, the numbers in themselves, it would appear, are substances but the numbers in objects are not; and secondly, the numbers inhere in the objects as measures [of extension or weight], yet as standing outside the objects they have no measuring power, as do rulers and scales.\n\nIf however their existence is independent, and they do not inhere in the objects, but are simply called in for the purpose of measurement, the objects will be quantities only to the extent of participating in Quantity.\n\nSo with the numbers themselves: how can they constitute the category of Quantity?\n\nThey are measures; but how do measures come to be quantities or Quantity?\n\nDoubtless in that, existing as they do among the Existents and not being adapted to any of the other categories, they find their place under the influence of verbal suggestion and so are referred to the so-called category of Quantity.\n\nWe see the unit mark off one measurement and then proceed to another; and number thus reveals the amount of a thing, and the mind measures by availing itself of the total figure.\n\nIt follows that in measuring it is not measuring essence; it pronounces its \"one\" or \"two,\" whatever the character of the objects, even summing contraries.\n\nIt does not take count of condition- hot, handsome; it simply notes how many.\n\nNumber then, whether regarded in itself or in the participant objects, belongs to the category of Quantity, but the participant objects do not.\n\n\"Three yards long\" does not fall under the category of Quantity, but only the three.\n\nWhy then are magnitudes classed as quantities?\n\nNot because they are so in the strict sense, but because they approximate to Quantity, and because objects in which magnitudes inhere are themselves designated as quantities.\n\nWe call a thing great or small from its participation in a high number or a low."

