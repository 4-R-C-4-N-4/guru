[content]
body = "All this is the doing of man knowing no more than to live the lower and outer life, and never perceiving that, in his weeping and in his graver doings alike, he is but at play; to handle austere matters austerely is reserved for the thoughtful: the other kind of man is himself a futility.\n\nThose incapable of thinking gravely read gravity into frivolities which correspond to their own frivolous Nature.\n\nAnyone that joins in their trifling and so comes to look on life with their eyes must understand that by lending himself to such idleness he has laid aside his own character.\n\nIf Socrates himself takes part in the trifling, he trifles in the outer Socrates.\n\nWe must remember, too, that we cannot take tears and laments as proof that anything is wrong; children cry and whimper where there is nothing amiss.\n\nNext: Section 16"

