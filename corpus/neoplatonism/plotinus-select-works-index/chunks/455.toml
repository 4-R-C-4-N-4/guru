[content]
body = "At one and the same moment it postulates and denies a soul, it tells of an All that is partial, of a something which is at once distinct and not distinct, of a nothingness which is no nothingness, of a complete thing that is incomplete: the hypothesis therefore must be dismissed; no deduction is possible where a thesis cancels its own propositions.\n\nNext: SIXTH TRACTATE"

