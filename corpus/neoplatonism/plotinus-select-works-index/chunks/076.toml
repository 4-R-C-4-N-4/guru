[content]
body = "Sacred Texts Classics Index Previous Next Section 9 9. But is there not something to be said for the memory of the various forms of beauty? That is the resource of a man whose life is without beauty in the present, so that, for lack of it now, he grasps at the memory of what has been. Next: Section 10"

