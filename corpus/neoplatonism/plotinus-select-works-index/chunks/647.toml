[content]
body = "Sacred Texts Classics Index Previous Next Section 8 8.\n\nWe cannot indeed escape positing these three, Being, Motion, Stability, once it is the fact that the Intellect discerns them as separates; and if it thinks of them at all, it posits them by that very thinking; if they are thought, they exist.\n\nThings whose existence is bound up with Matter have no being in the Intellect: these three principles are however free of Matter; and in that which goes free of Matter to be thought is to be.\n\nWe are in the presence of Intellect undefiled.\n\nFix it firmly, but not with the eyes of the body.\n\nYou are looking upon the hearth of Reality, within it a sleepless light: you see how it holds to itself, and how it puts apart things that were together, how it lives a life that endures and keeps a thought acting not upon any future but upon that which already is, upon an eternal present- a thought self-centred, bearing on nothing outside of itself.\n\nNow in the Act of Intellect there are energy and motion; in its self-intellection Substance and Being.\n\nIn virtue of its Being it thinks, and it thinks of itself as Being, and of that as Being, upon which it is, so to speak, pivoted.\n\nNot that its Act self-directed ranks as Substance, but Being stands as the goal and origin of that Act, the object of its contemplation though not the contemplation itself: and yet this Act too involves Being, which is its motive and its term.\n\nBy the fact that its Being is actual and not merely potential, Intellect bridges the dualism [of agent and patient] and abjures separation: it identifies itself with Being and Being with itself.\n\nBeing, the most firmly set of all things, that in virtue of which all other things receive Stability, possesses this Stability not as from without but as springing within, as inherent.\n\nStability is the goal of intellection, a Stability which had no beginning, and the state from which intellection was impelled was Stability, though Stability gave it no impulsion; for Motion neither starts from Motion nor ends in Motion.\n\nAgain, the Form-Idea has Stability, since it is the goal of Intellect: intellection is the Form's Motion.\n\nThus all the Existents are one, at once Motion and Stability; Motion and Stability are genera all-pervading, and every subsequent is a particular being, a particular stability and a particular motion.\n\nWe have caught the radiance of Being, and beheld it in its three manifestations: Being, revealed by the Being within ourselves; the Motion of Being, revealed by the motion within ourselves; and its Stability revealed by ours.\n\nWe accommodate our being, motion, stability to those [of the Archetypal], unable however to draw any distinction but finding ourselves in the presence of entities inseparable and, as it were, interfused.\n\nWe have, however, in a sense, set them a little apart, holding them down and viewing them in isolation; and thus we have observed Being, Stability, Motion- these three, of which each is a unity to itself; in so doing, have we not regarded them as being different from each other?\n\nBy this posing of three entities, each a unity, we have, surely, found Being to contain Difference.\n\nAgain, inasmuch as we restore them to an all-embracing unity, identifying all with unity, do we not see in this amalgamation Identity emerging as a Real Existent?\n\nThus, in addition to the other three [Being, Motion, Stability], we are obliged to posit the further two, Identity and Difference, so that we have in all five genera."

