[content]
body = "The entire intellectual order may be figured as a kind of light with the One in repose at its summit as its King: but this manifestation is not cast out from it: we may think, rather, of the One as a light before the light, an eternal irradiation resting upon the Intellectual Realm; this, not identical with its source, is yet not severed from it nor of so remote a nature as to be less than Real-Being; it is no blind thing, but is seeing and knowing, the primal knower.\n\nThe One, as transcending Intellect, transcends knowing: above all need, it is above the need of the knowing which pertains solely to the Secondary Nature.\n\nKnowing is a unitary thing, but defined: the first is One, but undefined: a defined One would not be the One-absolute: the absolute is prior to the definite.\n\nNext: Section 13"

