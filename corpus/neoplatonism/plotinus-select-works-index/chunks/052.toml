[content]
body = "For, on this admission, its perfection cannot reside in any such planning and providing: its perfection will be something quite different, something of quite another class: Reason cannot be itself one of those first needs of nature; it cannot even be a cause of those first needs of nature or at all belong to that order: it must be nobler than any and all of such things: otherwise it is not easy to see how we can be asked to rate it so highly.\n\nUntil these people light upon some nobler principle than any at which they still halt, they must be left where they are and where they choose to be, never understanding what the Good of Life is to those that can make it theirs, never knowing to what kind of beings it is accessible.\n\nWhat then is happiness?\n\nLet us try basing it upon Life.\n\nNext: Section 3"

