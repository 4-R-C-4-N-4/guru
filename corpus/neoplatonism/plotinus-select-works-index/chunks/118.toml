[content]
body = "But how can air, the yielding element, contain earth?\n\nFire, again: is earth perhaps necessary there since fire is by its own nature devoid of continuity and not a thing of three dimensions?\n\nSupposing it does not possess the solidity of the three dimensions, it has that of its thrust; now, cannot this belong to it by the mere right and fact of its being one of the corporeal entities in nature?\n\nHardness is another matter, a property confined to earth-stuff.\n\nRemember that gold- which is water- becomes dense by the accession not of earth but of denseness or consolidation: in the same way fire, with Soul present within it, may consolidate itself upon the power of the Soul; and there are living beings of fire among the Celestials.\n\nBut, in sum, do we abandon the teaching that all the elements enter into the composition of every living thing?\n\nFor this sphere, no; but to lift clay into the heavens is against nature, contrary to the laws of her ordaining: it is difficult, too, to think of that swiftest of circuits bearing along earthly bodies in its course nor could such material conduce to the splendour and white glint of the celestial fire.\n\nNext: Section 7"

