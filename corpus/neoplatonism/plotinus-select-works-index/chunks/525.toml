[content]
body = "Given its intellection identical with intellectual object and the object identical with the Principle itself, it cannot but have self-knowledge: its intellection operates by the intellectual act which is itself upon the intellectual object which similarly is itself.\n\nIt possesses self-knowing, thus, on every count; the act is itself; and the object seen in that act- self, is itself.\n\nNext: Section 6"

