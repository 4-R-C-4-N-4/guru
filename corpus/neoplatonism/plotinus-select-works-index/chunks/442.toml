[content]
body = "The punishments of wrong-doing are like the treatment of diseased parts of the body- here, medicines to knit sundered flesh; there, amputations; elsewhere, change of environment and condition- and the penalties are planned to bring health to the All by settling every member in the fitting place: and this health of the All requires that one man be made over anew and another, sick here, be taken hence to where he shall be weakly no longer.\n\nNext: FIFTH TRACTATE"

