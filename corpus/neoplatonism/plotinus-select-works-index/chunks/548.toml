[content]
body = "How does the Intellectual-Principle come to meet with them as it travels round; what keeps each true to its character; what gives them enduring identity; what conceivable shape or character can they have?\n\nThey are being presented to us as some collection of figures, in gold or some other material substance, the work of some unknown sculptor or graver: but at once the Intellectual-Principle which contemplates them becomes sense-perception; and there still remains the question how one of them comes to be Justice and another something else.\n\nBut the great argument is that if we are to allow that these objects of Intellection are in the strict sense outside the Intellectual-Principle, which, therefore, must see them as external, then inevitably it cannot possess the truth of them.\n\nIn all it looks upon, it sees falsely; for those objects must be the authentic things; yet it looks upon them without containing them and in such knowledge holds only their images; that is to say, not containing the authentic, adopting phantasms of the true, it holds the false; it never possesses reality.\n\nIf it knows that it possesses the false, it must confess itself excluded from the truth; if it fails of this knowledge also, imagining itself to possess the truth which has eluded it, then the doubled falsity puts it the deeper into error.\n\nIt is thus, I suppose, that in sense-perception we have belief instead of truth; belief is our lief; we satisfy ourselves with something very different from the original which is the occasion of perception.\n\nIn fine, there would be on the hypothesis no truth in the Intellectual-Principle.\n\nBut such an Intellectual-Principle would not be truth, nor truly an Intellectual-Principle.\n\nThere would be no Intellectual-Principle at all [no Divine Mind]: yet elsewhere truth cannot be.\n\nNext: Section 2"

