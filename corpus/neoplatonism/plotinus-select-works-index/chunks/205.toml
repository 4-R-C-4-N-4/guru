[content]
body = "Now, if the sight of Beauty excellently reproduced upon a face hurries the mind to that other Sphere, surely no one seeing the loveliness lavish in the world of sense- this vast orderliness, the Form which the stars even in their remoteness display- no one could be so dull-witted, so immoveable, as not to be carried by all this to recollection, and gripped by reverent awe in the thought of all this, so great, sprung from that greatness.\n\nNot to answer thus could only be to have neither fathomed this world nor had any vision of that other.\n\nNext: Section 17"

