[content]
body = "In a word; all that is truly good in a Soul acting to the purposes of nature and within its appointed order, all this is Real-Being: anything else is alien, no act of the Soul, but merely something that happens to it: a parallel may be found in false mentation, notions behind which there is no reality as there is in the case of authentic ideas, the eternal, the strictly defined, in which there is at once an act of true knowing, a truly knowable object and authentic existence- and this not merely in the Absolute, but also in the particular being that is occupied by the authentically knowable and by the Intellectual-Principle manifest in every several form.\n\nIn each particular human being we must admit the existence of the authentic Intellective Act and of the authentically knowable object- though not as wholly merged into our being, since we are not these in the absolute and not exclusively these- and hence our longing for absolute things: it is the expression of our intellective activities: if we sometimes care for the partial, that affection is not direct but accidental, like our knowledge that a given triangular figure is made up of two right angles because the absolute triangle is so.\n\nNext: Section 8"

