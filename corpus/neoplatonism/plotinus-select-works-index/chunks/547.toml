[content]
body = "Sacred Texts Classics Index Previous Next Section 1 1.\n\nThe Intellectual-Principle, the veritably and essentially intellective, can this be conceived as ever falling into error, ever failing to think reality?\n\nAssuredly no: it would no longer be intelligent and therefore no longer Intellectual-Principle: it must know unceasingly- and never forget; and its knowledge can be no guesswork, no hesitating assent, no acceptance of an alien report.\n\nNor can it call on demonstration or, we are told it may at times act by this or, I method, at least there must be something patent to it in virtue of its own nature.\n\nIn actual fact reason tells us that all its knowledge is thus inherent to it, for there is no means by which to distinguish between the spontaneous knowledge and the other.\n\nBut, in any case, some knowledge, it is conceded, is inherent to it.\n\nWhence are we to understand the certainty of this knowledge to come to it or how do its objects carry the conviction of their reality?\n\nConsider sense-knowledge: its objects seem most patently certified, yet the doubt returns whether the apparent reality may not lie in the states of the percipient rather than in the material before him; the decision demands intelligence or reasoning.\n\nBesides, even granting that what the senses grasp is really contained in the objects, none the less what is thus known by the senses is an image: sense can never grasp the thing itself; this remains for ever outside.\n\nNow, if the Intellectual-Principle in its act- that is in knowing the intellectual- is to know these its objects as alien, we have to explain how it makes contact with them: obviously it might never come upon them, and so might never know them; or it might know them only upon the meeting: its knowing, at that, would not be an enduring condition.\n\nIf we are told that the Intellectual-Principle and the Intellectual Objects are linked in a standing unity, we demand the description of this unity.\n\nNext, the intellections would be impressions, that is to say not native act but violence from without: now how is such impressing possible and what shape could the impressions bear?\n\nIntellection, again, becomes at this a mere handling of the external, exactly like sense-perception.\n\nWhat then distinguishes it unless that it deals with objects of less extension?\n\nAnd what certitude can it have that its knowledge is true?\n\nOr what enables it to pronounce that the object is good, beautiful, or just, when each of these ideas is to stand apart from itself?\n\nThe very principles of judgement, by which it must be guided, would be [as Ideas] excluded: with objects and canons alike outside it, so is truth.\n\nAgain; either the objects of the Intellectual-Principle are senseless and devoid of life and intellect or they are in possession of Intellect.\n\nNow, if they are in possession of Intellect, that realm is a union of both and is Truth.\n\nThis combined Intellectual realm will be the Primal Intellect: we have only then to examine how this reality, conjoint of Intellectual-Principle and its object, is to be understood, whether as combining self-united identity with yet duality and difference, or what other relation holds between them.\n\nIf on the contrary the objects of Intellectual-Principle are without intelligence and life, what are they?\n\nThey cannot be premises, axioms or predicates: as predicates they would not have real existence; they would be affirmations linking separate entities, as when we affirm that justice is good though justice and good are distinct realities.\n\nIf we are told that they are self-standing entities- the distinct beings Justice and Good- then [supposing them to be outside] the Intellectual Realm will not be a unity nor be included in any unity: all is sundered individuality.\n\nWhere, then, are they and what spatial distinction keeps them apart?"

