[content]
body = "It is lifeless objects that deal the severest blows; they hit hardest and hurt most; where there is life- that is to say participation in Being- there is beneficence towards the environment, all the greater as the measure of Being is fuller.\n\nAgain, Movement, which is a sort of life within bodies, an imitation of true Life, is the more decided where there is the least of body a sign that the waning of Being makes the object affected more distinctly corporeal.\n\nThe changes known as affections show even more clearly that where the bodily quality is most pronounced susceptibility is at its intensest- earth more susceptible than other elements, and these others again more or less so in the degree of their corporeality: sever the other elements and, failing some preventive force, they join again; but earthy matter divided remains apart indefinitely.\n\nThings whose nature represents a diminishment have no power of recuperation after even a slight disturbance and they perish; thus what has most definitely become body, having most closely approximated to non-being lacks the strength to reknit its unity: the heavy and violent crash of body against body works destruction, and weak is powerful against weak, non-being against its like.\n\nThus far we have been meeting those who, on the evidence of thrust and resistance, identify body with real being and find assurance of truth in the phantasms that reach us through the senses, those, in a word, who, like dreamers, take for actualities the figments of their sleeping vision.\n\nThe sphere of sense, the Soul in its slumber; for all of the Soul that is in body is asleep and the true getting-up is not bodily but from the body: in any movement that takes the body with it there is no more than a passage from sleep to sleep, from bed to bed; the veritable waking or rising is from corporeal things; for these, belonging to the Kind directly opposed to Soul, present to it what is directly opposed to its essential existence: their origin, their flux, and their perishing are the warning of their exclusion from the Kind whose Being is Authentic.\n\nNext: Section 7"

