[content]
body = "Sacred Texts Classics Index Previous Next Section 10 10.\n\nAs regards Quality, the source of what we call a \"quale,\" we must in the first place consider what nature it possesses in accordance with which it produces the \"qualia,\" and whether, remaining one and the same in virtue of that common ground, it has also differences whereby it produces the variety of species.\n\nIf there is no common ground and the term Quality involves many connotations, there cannot be a single genus of Quality.\n\nWhat then will be the common ground in habit, disposition, passive quality, figure, shape?\n\nIn light, thick and lean?\n\nIf we hold this common ground to be a power adapting itself to the forms of habits, dispositions and physical capacities, a power which gives the possessor whatever capacities he has, we have no plausible explanation of incapacities.\n\nBesides, how are figure and the shape of a given thing to be regarded as a power?\n\nMoreover, at this, Being will have no power qua Being but only when Quality has been added to it; and the activities of those substances which are activities in the highest degree, will be traceable to Quality, although they are autonomous and owe their essential character to powers wholly their own!\n\nPerhaps, however, qualities are conditioned by powers which are posterior to the substances as such [and so do not interfere with their essential activities].\n\nBoxing, for example, is not a power of man qua man; reasoning is: therefore reasoning, on this hypothesis, is not quality but a natural possession of the mature human being; it therefore is called a quality only by analogy.\n\nThus, Quality is a power which adds the property of being qualia to substances already existent.\n\nThe differences distinguishing substances from each other are called qualities only by analogy; they are, more strictly, Acts and Reason-Principles, or parts of Reason-Principles, and though they may appear merely to qualify the substance, they in fact indicate its essence.\n\nQualities in the true sense- those, that is, which determine qualia- being in accordance with our definition powers, will in virtue of this common ground be a kind of Reason-Principle; they will also be in a sense Forms, that is, excellences and imperfections whether of soul or of body.\n\nBut how can they all be powers?\n\nBeauty or health of soul or body, very well: but surely not ugliness, disease, weakness, incapacity.\n\nIn a word, is powerlessness a power?\n\nIt may be urged that these are qualities in so far as qualia are also named after them: but may not the qualia be so called by analogy, and not in the strict sense of the single principle?\n\nNot only may the term be understood in the four ways [of Aristotle], but each of the four may have at least a twofold significance.\n\nIn the first place, Quality is not merely a question of action and passion, involving a simple distinction between the potentially active [quality] and the passive: health, disposition and habit, disease, strength and weakness are also classed as qualities.\n\nIt follows that the common ground is not power, but something we have still to seek.\n\nAgain, not all qualities can be regarded as Reason-Principles: chronic disease cannot be a Reason-Principle.\n\nPerhaps, however, we must speak in such cases of privations, restricting the term \"Quantities\" to Ideal-Forms and powers.\n\nThus we shall have, not a single genus, but reference only to the unity of a category.\n\nKnowledge will be regarded as a Form and a power, ignorance as a privation and powerlessness.\n\nOn the other hand, powerlessness and disease are a kind of Form; disease and vice have many powers though looking to evil.\n\nBut how can a mere failure be a power?"

