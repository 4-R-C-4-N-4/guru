[content]
body = "Sacred Texts Classics Index Previous Next Section 6 6.\n\nthe Intellectual Essence, wholly of the order of Ideal-form, must be taken as impassive has been already established.\n\nBut Matter also is an incorporeal, though after a mode of its own; we must examine, therefore, how this stands, whether it is passive, as is commonly held, a thing that can be twisted to every shape and Kind, or whether it too must be considered impassive and in what sense and fashion so.\n\nBut in engaging this question and defining the nature of matter we must correct certain prevailing errors about the nature of the Authentic Existent, about Essence, about Being.\n\nThe Existent- rightly so called- is that which has authentic existence, that, therefore, which is existent completely, and therefore, again, that which at no point fails in existence.\n\nHaving existence perfectly, it needs nothing to preserve it in being; it is, on the contrary, the source and cause from which all that appears to exist derives that appearance.\n\nThis admitted, it must of necessity be in life, in a perfect life: if it failed it would be more nearly the nonexistent than the existent.\n\nBut: The Being thus indicated is Intellect, is wisdom unalloyed.\n\nIt is, therefore, determined and rounded off; it is nothing potentially that is not of the same determined order, otherwise it would be in default.\n\nHence its eternity, its identity, its utter irreceptivity and impermeability.\n\nIf it took in anything, it must be taking in something outside itself, that is to say, Existence would at last include non-existence.\n\nBut it must be Authentic Existence all through; it must, therefore, present itself equipped from its own stores with all that makes up Existence so that all stands together and all is one thing.\n\nThe Existent [Real Being] must have thus much of determination: if it had not, then it could not be the source of the Intellectual Principle and of Life which would be importations into it originating in the sphere of non-Being; and Real Being would be lifeless and mindless; but mindlessness and lifelessness are the characteristics of non-being and must belong to the lower order, to the outer borders of the existent; for Intellect and Life rise from the Beyond-Existence [the Indefinable Supreme]- though Itself has no need of them- and are conveyed from It into the Authentic Existent.\n\nIf we have thus rightly described the Authentic Existent, we see that it cannot be any kind of body nor the under-stuff of body; in such entities the Being is simply the existing of things outside of Being.\n\nBut body, a non-existence?\n\nMatter, on which all this universe rises, a non-existence?\n\nMountain and rock, the wide solid earth, all that resists, all that can be struck and driven, surely all proclaims the real existence of the corporeal?\n\nAnd how, it will be asked, can we, on the contrary, attribute Being, and the only Authentic Being, to entities like Soul and Intellect, things having no weight or pressure, yielding to no force, offering no resistance, things not even visible?\n\nYet even the corporeal realm witnesses for us; the resting earth has certainly a scantier share in Being than belongs to what has more motion and less solidity- and less than belongs to its own most upward element, for fire begins, already, to flit up and away outside of the body-kind.\n\nIn fact, it appears to be precisely the most self-sufficing that bear least hardly, least painfully, on other things, while the heaviest and earthiest bodies- deficient, falling, unable to bear themselves upward- these, by the very down-thrust due to their feebleness, offer the resistance which belongs to the falling habit and to the lack of buoyancy."

