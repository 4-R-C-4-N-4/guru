[content]
body = "We teach that Virtue is not the Absolute Good and Beauty, because we know that These are earlier than Virtue and transcend it, and that it is good and beautiful by some participation in them.\n\nNow as, going upward from virtue, we come to the Beautiful and to the Good, so, going downward from Vice, we reach Essential Evil: from Vice as the starting-point we come to vision of Evil, as far as such vision is possible, and we become evil to the extent of our participation in it.\n\nWe are become dwellers in the Place of Unlikeness, where, fallen from all our resemblance to the Divine, we lie in gloom and mud: for if the Soul abandons itself unreservedly to the extreme of viciousness, it is no longer a vicious Soul merely, for mere vice is still human, still carries some trace of good: it has taken to itself another nature, the Evil, and as far as Soul can die it is dead.\n\nAnd the death of Soul is twofold: while still sunk in body to lie down in Matter and drench itself with it; when it has left the body, to lie in the other world until, somehow, it stirs again and lifts its sight from the mud: and this is our \"going down to Hades and slumbering there.\" Next: Section 11"

