[content]
body = "If then the future is present, it must be present as having been foreconceived for later coming to be; at that divine stage therefore it lacks nothing and therefore can never lack; all existed, eternally and in such a way that at the later stage any particular thing may be said to exist for this or that purpose; the All, in its extension and so to speak unfolding, is able to present succession while yet it is simultaneous; this is because it contains the cause of all as inherent to itself.\n\nNext: Section 2"

