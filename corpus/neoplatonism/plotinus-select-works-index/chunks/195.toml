[content]
body = "Sacred Texts Classics Index Previous Next Section 9 9.\n\nWealth and poverty, and all inequalities of that order, are made ground of complaint.\n\nBut this is to ignore that the Sage demands no equality in such matters: he cannot think that to own many things is to be richer or that the powerful have the better of the simple; he leaves all such preoccupations to another kind of man.\n\nHe has learned that life on earth has two distinct forms, the way of the Sage and the way of the mass, the Sage intent upon the sublimest, upon the realm above, while those of the more strictly human type fall, again, under two classes, the one reminiscent of virtue and therefore not without touch with good, the other mere populace, serving to provide necessaries to the better sort.\n\nBut what of murder?\n\nWhat of the feebleness that brings men under slavery to the passions?\n\nIs it any wonder that there should be failing and error, not in the highest, the intellectual, Principle but in Souls that are like undeveloped children?\n\nAnd is not life justified even so if it is a training ground with its victors and its vanquished?\n\nYou are wronged; need that trouble an immortal?\n\nYou are put to death; you have attained your desire.\n\nAnd from the moment your citizenship of the world becomes irksome you are not bound to it.\n\nOur adversaries do not deny that even here there is a system of law and penalty: and surely we cannot in justice blame a dominion which awards to every one his due, where virtue has its honour, and vice comes to its fitting shame, in which there are not merely representations of the gods, but the gods themselves, watchers from above, and- as we read- easily rebutting human reproaches, since they lead all things in order from a beginning to an end, allotting to each human being, as life follows life, a fortune shaped to all that has preceded- the destiny which, to those that do not penetrate it, becomes the matter of boorish insolence upon things divine.\n\nA man's one task is to strive towards making himself perfect- though not in the idea- really fatal to perfection- that to be perfect is possible to himself alone.\n\nWe must recognize that other men have attained the heights of goodness; we must admit the goodness of the celestial spirits, and above all of the gods- those whose presence is here but their contemplation in the Supreme, and loftiest of them, the lord of this All, the most blessed Soul.\n\nRising still higher, we hymn the divinities of the Intellectual Sphere, and, above all these, the mighty King of that dominion, whose majesty is made patent in the very multitude of the gods.\n\nIt is not by crushing the divine unto a unity but by displaying its exuberance- as the Supreme himself has displayed it- that we show knowledge of the might of God, who, abidingly what He is, yet creates that multitude, all dependent on Him, existing by Him and from Him.\n\nThis Universe, too, exists by Him and looks to Him- the Universe as a whole and every God within it- and tells of Him to men, all alike revealing the plan and will of the Supreme.\n\nThese, in the nature of things, cannot be what He is, but that does not justify you in contempt of them, in pushing yourself forward as not inferior to them."

