[content]
body = "Why else do certain groupments, in contradistinction to others, terrify at sight though there has been no previous experience of evil from them?\n\nIf some men are alarmed by a particular groupment and others by quite a different one, the reason can be only that the configurations themselves have efficacy, each upon a certain type- an efficacy which cannot fail to reach anything naturally disposed to be impressed by it, so that in one groupment things attract observation which in another pass without effect.\n\nIf we are told that beauty is the motive of attraction, does not this mean simply that the power of appeal to this or that mind depends upon pattern, configuration?\n\nHow can we allow power to colour and none to configuration?\n\nIt is surely untenable that an entity should have existence and yet have no power to effect: existence carries with it either acting or answering to action, some beings having action alone, others both.\n\nAt the same time there are powers apart from pattern: and, in things of our realm, there are many powers dependent not upon heat and cold but upon forces due to differing properties, forces which have been shaped to ideal-quality by the action of Reason-Principles and communicate in the power of Nature: thus the natural properties of stones and the efficacy of plants produce many astonishing results.\n\nNext: Section 36"

