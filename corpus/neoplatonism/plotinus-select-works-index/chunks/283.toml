[content]
body = "The affective phase of the Soul or Mind will be the operative cause of all affection; it originates the movement either under the stimulus of some sense-presentment or independently- and it is a question to be examined whether the judgement leading to the movement operates from above or not- but the affective phase itself remains unmoved like Melody dictating music.\n\nThe causes originating the movement may be likened to the musician; what is moved is like the strings of his instrument, and once more, the Melodic Principle itself is not affected, but only the strings, though, however much the musician desired it, he could not pluck the strings except under dictation from the principle of Melody.\n\nNext: Section 5"

