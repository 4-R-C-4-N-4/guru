[content]
body = "Sacred Texts Classics Index Previous Next Section 17 17.\n\nPerhaps the hate of this school for the corporeal is due to their reading of Plato who inveighs against body as a grave hindrance to Soul and pronounces the corporeal to be characteristically the inferior.\n\nThen let them for the moment pass over the corporeal element in the Universe and study all that still remains.\n\nThey will think of the Intellectual Sphere which includes within itself the Ideal-Form realized in the Kosmos.\n\nThey will think of the Souls, in their ordered rank, that produce incorporeal magnitude and lead the Intelligible out towards spatial extension, so that finally the thing of process becomes, by its magnitude, as adequate a representation as possible of the principle void of parts which is its model- the greatness of power there being translated here into greatness of bulk.\n\nThen whether they think of the Kosmic Sphere [the All-Soul] as already in movement under the guidance of that power of God which holds it through and through, beginning and middle and end, or whether they consider it as in rest and exercising as yet no outer governance: either approach will lead to a true appreciation of the Soul that conducts this Universe.\n\nNow let them set body within it- not in the sense that Soul suffers any change but that, since \"In the Gods there can be no grudging,\" it gives to its inferior all that any partial thing has strength to receive and at once their conception of the Kosmos must be revised; they cannot deny that the Soul of the Kosmos has exercised such a weight of power as to have brought the corporeal-principle, in itself unlovely, to partake of good and beauty to the utmost of its receptivity- and to a pitch which stirs Souls, beings of the divine order.\n\nThese people may no doubt say that they themselves feel no such stirring, and that they see no difference between beautiful and ugly forms of body; but, at that, they can make no distinction between the ugly and the beautiful in conduct; sciences can have no beauty; there can be none in thought; and none, therefore, in God.\n\nThis world descends from the Firsts: if this world has no beauty, neither has its Source; springing thence, this world, too, must have its beautiful things.\n\nAnd while they proclaim their contempt for earthly beauty, they would do well to ignore that of youths and women so as not to be overcome by incontinence.\n\nIn fine, we must consider that their self-satisfaction could not turn upon a contempt for anything indisputably base; theirs is the perverse pride of despising what was once admired.\n\nWe must always keep in mind that the beauty in a partial thing cannot be identical with that in a whole; nor can any several objects be as stately as the total.\n\nAnd we must recognize, that, even in the world of sense and part, there are things of a loveliness comparable to that of the Celestials- forms whose beauty must fill us with veneration for their creator and convince us of their origin in the divine, forms which show how ineffable is the beauty of the Supreme since they cannot hold us but we must, though in all admiration, leave these for those.\n\nFurther, wherever there is interior beauty, we may be sure that inner and outer correspond; where the interior is vile, all is brought low by that flaw in the dominants."

