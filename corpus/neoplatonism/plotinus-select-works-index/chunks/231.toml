[content]
body = "If things took the contrary course, if all the modes of folly and wickedness brought no trouble in life- then indeed we might complain of the indifference of a Providence leaving the victory to evil.\n\nBad men rule by the feebleness of the ruled: and this is just; the triumph of weaklings would not be just.\n\nNext: Section 9"

