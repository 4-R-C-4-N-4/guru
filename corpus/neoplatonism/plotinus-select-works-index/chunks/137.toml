[content]
body = "All that is graceless is admixture.\n\nFor the Universe is in truth a thing of blend, and if we separate from it that separable Soul, the residue is little.\n\nThe All is a God when the divine Soul is counted in with it; \"the rest,\" we read, \"is a mighty spirit and its ways are subdivine.\" Next: Section 10"

