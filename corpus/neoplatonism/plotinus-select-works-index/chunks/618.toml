[content]
body = "And even if Ideal Forms of qualities are not posited, yet once the term \"habit\" is used in reference to Intellect, the question arises whether there is anything common to that habit and the habit we know in the lower.\n\nWisdom too is generally admitted to exist There.\n\nObviously, if it shares only its name with our wisdom, it is not to be reckoned among things of this sphere; if, however, the import is in both cases the same, then Quality is common to both realms- unless, of course, it be maintained that everything There, including even intellection, is Substance.\n\nThis question, however, applies to all the categories: are the two spheres irreconcilable, or can they be co-ordinated with a unity?\n\nNext: Section 13"

