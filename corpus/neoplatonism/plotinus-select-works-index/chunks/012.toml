[content]
body = "Another passage from the work of Longinus, dealing with Amelius, Plotinus, and other metaphysicians of the day, must be inserted here to give a complete view of the opinion formed upon these philosophers by the most authoritative and most searching of critics.\n\nThe work was entitled On the End: in Answer to Plotinus and Gentilianus Amelius .\n\nIt opens with the following preface: 'In our time, Marcellus, there have been many philosophers--especially in our youth--for there is a strange scarcity at present.\n\nWhen I was a boy, my parents' long journeys gave me the opportunity of seeing all the better-known teachers; and in later life those that still lived became known to me as my visits to this and that city and people brought me where they happened to live.\n\n'Some of these undertook the labour of developing their theories in formal works and so have bequeathed to the future the means of profiting by their services.\n\nOthers thought they had done enough when they had convinced their own immediate hearers of the truth of their theories..\n\n'First of those that have written.\n\n'Among the Platonists there are Euclides, Democritus, Proclinus the philosopher of the Troad, and the two who still profess philosophy at Rome, Plotinus and his friend Gentilianus Amelius.\n\nAmong the Stoics there are Themistocles and Phoibion and the two who flourished only a little while ago, Annius and Medius.\n\nAnd there is the Peripatetic, Heliodorus of Alexandria.\n\n'For those that have not written, there are among the Platonists Ammonius and Origen, two teachers whose lectures I myself attended during a long period, men greatly surpassing their contemporaries in mental power; and there are the Platonic Successors at Athens, Theodotus and Eubulus.\n\n'No doubt some writing of a metaphysical order stands to the credit of this group: Origen wrote On Spirit-Beings, Eubulus On the Philebus and Gorgias, and the objections urged by Aristotle to Plato's Republic ; but this is not enough to class either of them with systematic authors.\n\nThis was side-play; authorship was not in the main plan of their careers.\n\n'Among Stoic teachers that refrained from writing we have Herminus and Lysimachus, and the two living at Athens, Musonius and Athenaeus; among Peripatetics, Ammonius and Ptolemaeus.\n\n'The two last were the most accomplished scholars of their time, Ammonius especially being unapproached in breadth of learning; but neither produced any systematic work; we have from them merely verses and duty-speeches; and these I cannot think to have been preserved with their consent; they did not concern themselves about formal statement of their doctrine, and it is not likely they would wish to be known in after times by compositions of so trivial a nature.\n\n'To return to the writers; some of them, like Euclides, Democritus, and Proclinus, confined themselves to the mere compilation and transcription of passages from earlier authorities.\n\nOthers diligently worked over various minor points in the investigations of the ancients, and put together books dealing with the same subjects.\n\nSuch were Annius, Medius, and Phoibion, the last especially choosing to be distinguished for style rather than for systematic thinking.\n\nIn the same class must be ranked Heliodorus; his writings contribute nothing to the organization of the thought which he found to his hand in the teaching of earlier workers.\n\n'Plotinus and Gentilianus Amelius alone display the true spirit of authorship; they treat of a great number of questions and they bring a method of their own to the treatment."

