[content]
body = "Any that have seen know what I have in mind: the soul takes another life as it approaches God; thus restored it feels that the dispenser of true life is There to see, that now we have nothing to look for but, far otherwise, that we must put aside all else and rest in This alone, This become, This alone, all the earthly environment done away, in haste to be free, impatient of any bond holding us to the baser, so that with our being entire we may cling about This, no part in us remaining but through it we have touch with God.\n\nThus we have all the vision that may be of Him and of ourselves; but it is of a self-wrought to splendour, brimmed with the Intellectual light, become that very light, pure, buoyant, unburdened, raised to Godhood or, better, knowing its Godhood, all aflame then- but crushed out once more if it should take up the discarded burden.\n\nNext: Section 10"

