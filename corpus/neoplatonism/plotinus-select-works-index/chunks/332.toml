[content]
body = "The Intellectual-Principle on the other hand was never merely the Principle of an inviolable unity; it was a universal as well and, being so, was the Intellectual-Principle of all things.\n\nBeing, thus, all things and the Principle of all, it must essentially include this part of itself [this element-of-plurality] which is universal and is all things: otherwise, it contains a part which is not Intellectual-Principle: it will be a juxtaposition of non-Intellectuals, a huddled heap waiting to be made over from the mass of things into the Intellectual-Principle!\n\nWe conclude that this Being is limitless and that, in all the outflow from it, there is no lessening either in its emanation, since this also is the entire universe, nor in itself, the starting point, since it is no assemblage of parts [to be diminished by any outgo].\n\nNext: Section 9"

