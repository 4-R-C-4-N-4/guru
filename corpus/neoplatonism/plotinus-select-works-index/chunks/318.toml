[content]
body = "Therefore over against that higher life there must be another life, known by the same name as the more veritable life of the Soul; over against that movement of the Intellectual Soul there must be the movement of some partial phase; over against that identity, unchangeableness and stability there must be that which is not constant in the one hold but puts forth multitudinous acts; over against that oneness without extent or interval there must be an image of oneness, a unity of link and succession; over against the immediately infinite and all-comprehending, that which tends, yes, to infinity but by tending to a perpetual futurity; over against the Whole in concentration, there must be that which is to be a Whole by stages never final.\n\nThe lesser must always be working towards the increase of its Being, this will be its imitation of what is immediately complete, self-realized, endless without stage: only thus can its Being reproduce that of the Higher.\n\nTime, however, is not to be conceived as outside of Soul; Eternity is not outside of the Authentic Existent: nor is it to be taken as a sequence or succession to Soul, any more than Eternity is to the Divine.\n\nIt is a thing seen upon Soul, inherent, coeval to it, as Eternity to the Intellectual Realm.\n\nNext: Section 12"

