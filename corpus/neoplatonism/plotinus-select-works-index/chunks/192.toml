[content]
body = "As a matter of fact the ancient doctrine of the Divine Essences was far the sounder and more instructed, and must be accepted by all not caught in the delusions that beset humanity: it is easy also to identify what has been conveyed in these later times from the ancients with incongruous novelties- how for example, where they must set up a contradictory doctrine, they introduce a medley of generation and destruction, how they cavil at the Universe, how they make the Soul blameable for the association with body, how they revile the Administrator of this All, how they ascribe to the Creator, identified with the Soul, the character and experiences appropriate to partial be beings.\n\nNext: Section 7"

