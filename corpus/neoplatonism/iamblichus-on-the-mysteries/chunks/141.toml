[content]
body = "You say, therefore, “ that according to many of the Egyptians, that which is in our power depends on the motion of the stars .” What the truth, however, is respecting this, it is necessary to unfold to you from the Hermaic conceptions. For man, as these writings say, has two souls. And one, indeed, is derived from the first intelligible, and participates of the power of the Demiurgus; but the other is imparted from the circulation of the celestial bodies, to which the soul that sees God returns. These things, therefore, thus subsisting, the soul that descends to us from the worlds follows the periods of the worlds; but that which is intelligibly present from the intelligible, transcends the genesiurgic motion, and through this a liberation from fate, and the ascent to the intelligible Gods, are affected. Such theurgy, likewise, as leads to an unbegotten nature is perfected conformably to a life of this kind. 309"

