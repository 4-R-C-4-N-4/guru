[content]
body = "It is now, however, time for me to pass on to the next doubt which you propose, viz. “ Why it is requisite that the inspector [who presides over sacred rites] ought not to touch a dead body, though most sacred operations are performed through dead bodies? ” Again, therefore, that we may dissolve this doubt, we shall direct our attention to this apparent opposition; for there is not in reality any, but these things alone seem to subsist contrarily. For if the laws of sacred rites ordered that the same dead bodies should not be touched and should be touched, this would be a thing contrary to itself. But if they order that some dead bodies should be abstained from as impure, but that others which are consecrated should be touched, this is not attended with any contrariety. Farther still, it is not lawful to touch human bodies when the soul has left them, since a certain vestige, image, or representation of divine 276 life is extinguished in the body by death. But it is no longer unholy to touch other dead bodies, because they did not [when living] participate of a more divine life. To other Gods, therefore, who are pure from matter, our not touching dead bodies is adapted; but to those Gods who preside over animals, and are proximately connected with them, invocation through animals is properly made. According to this, therefore, no contrariety takes place."

