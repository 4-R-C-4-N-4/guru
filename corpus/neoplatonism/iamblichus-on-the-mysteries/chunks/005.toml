[content]
body = "This, therefore, subsists contrarily to what you suppose, for the purpose of discovering the peculiarity which you now investigate.\n\nIn short, whether you think that there is one genus of the Gods, one of dæmons, and in a similar manner of heroes, and souls essentially incorporeal; or whether you admit that these are severally many, you inquire what the difference of them is according to peculiarities.\n\nFor if you apprehend that each of these is one [and the same genus] the whole arrangement of scientific theology is confounded.\n\nBut if, as truth requires, you admit that they are genetically distinguished, and that there is not in them one common essential definition, but that those of them which are prior, are exempt from those that are inferior, it is not possible to discover their common boundaries.\n\nAnd even if 30 this were possible, this very thing would destroy their peculiarities.\n\nIn this way, therefore, the object of investigation cannot be found.\n\nHe, however, he who directs his attention to the analogous sameness which exists in superior natures, as, for instance, in the many genera of the Gods, and again in dæmons and heroes, and, in the last place, in souls, will be able to define their peculiarities.\n\nHence through this, it is demonstrated by us what the rectitude is of the present inquiry, and what its [accurate] distinction, and also in what manner it is impossible, and in what manner it is possible, for it to subsist."

