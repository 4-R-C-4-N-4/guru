[content]
body = "It is also necessary to demonstrate to you, in what dæmons, heroes, and souls differ from each other, and whether this difference is according to essence, or according to power, or according to energy. I say, therefore, that dæmons are produced according to the generative and demiurgic powers of the Gods, in the most remote termination of progression, and ultimate distribution into parts. But heroes are produced according to the reasons [or effective principles], of life in divine natures; and from these, the first and perfect measures of souls receive their termination and distribution into parts. Since, however, the nature of dæmons and heroes is thus generated from different causes, it is also necessary that the essence of the one should be different from that of the other. Hence, the essence of dæmons is effective, and perfective of mundane natures, and gives completion to the superintendence of generated individuals. 83 But the essence of heroes is vital and rational, and is the leader of souls. And, with respect to the powers of each, those of dæmons must be defined to be prolific, inspective of nature, and of the bond by which souls are united to bodies. But it is requisite to attribute to heroes vivific powers, which are the leaders of men, and are liberated from generation."

