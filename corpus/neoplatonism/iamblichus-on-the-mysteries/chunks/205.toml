body = "v.) the crocodile brings forth sixty eggs of a white colour and sits on them for sixty days.\n\n98 .\n\n“Isis,” says Gale, “is the moon.\n\nAnd a dog attended Isis when she was diligently seeking her husband Osiris.\n\nBut the moon perpetually seeks the sun, and therefore that sagacious animal, the dog, accords with Isis.\n\nIn the solemnities, also, of Isis, dogs preceded the procession.” After this manner others besides Gale; who have not penetrated the depths of the philosophy and theology of Plato, would doubtless explain what is fabulously said of Isis.\n\nIn reality, however, Isis is not the moon, but one of the divinities that revolve in the lunar sphere as an attendant on the moon, and who, in modern language, is one of the satellites of that planet.\n\nFor, as I have shown from Proclus, in the Introduction to my translation of the Timæus of Plato, every planetary sphere is an ολοτης , or a part of the universe having a total subsistence , i.\n\ne.\n\nranking as a whole , and is surrounded with a number of satellites analogous to the choir of the fixed stars.\n\nOf these satellites, likewise, the leaders of which are the planets, the first in order are Gods; after these, dæmons revolve in lucid orbicular bodies; and these are followed by partial souls, such as ours.\n\nSee Proclus in Tim.\n\np.\n\n275 and p.\n\n279· This theory, as I have elsewhere observed, is the grand key to the theology and mythology of the ancients, as it shows at one view why the same God is so often celebrated with the names of other Gods; which induced Macrobius to think that all the Gods were nothing more than different powers of the sun.\n\nThe English reader will find an abundant confirmation of what is here said in the fourth book of my translation of the above mentioned admirable work of Proclus.\n\n99 .\n\n“The Egyptians,” says Horapollo, lib.\n\ni.\n\n“wishing to signify the moon, paint a cynocephalus, because this animal is variously affected by the course of the moon.” 100 .\n\nIn the original μυγαλη .\n\n“This word,” says Gale, “is written variously, viz.\n\nas μυγάλη , μυγαλὴ , and μυγαλῆ .\n\nIt is also variously translated, for it is either rattus , or mus araneus .” Plutarch, in the fourth book of his Symposiacs, Quest.\n\n5, says, “that the Egyptians were of opinion that darkness was prior to light, and that the latter was produced from mice in the fifth generation, at the time of the new moon.\n\nAnd further still, they assert that the liver of the weasel diminishes in the wane of the moon.” 101 .\n\nWith the Egyptians many animals were sacred; for the worship of which the following admirable apology is made by Plutarch in his treatise of Isis and Osiris: “It now remains that we should speak of the utility of these animals to man, and of their symbolical meaning; some of them partaking of one of these only, but many of them of both.\n\nIt is evident, therefore, that the Egyptians worshiped the ox, the sheep, and the ichneumon, on account of their use and benefit, as the Lemnians did larks, for discovering the eggs of caterpillars and breaking them; and the Thessalians storks, because, as their land produced abundance of serpents, the storks destroyed all of them as soon as they appeared.\n\nHence, also, they enacted a law, that whoever killed a stork should be banished."

