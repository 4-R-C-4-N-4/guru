[content]
body = "But when she places herself on the seat of the God, she becomes coadapted to his stable prophetic power: and from both these preparatory operations she becomes wholly possessed by the God.\n\nAnd then, indeed, he is present with and illuminates her in a separate manner, and is different from the fire, the spirit, the 144 proper seat, and, in short, from all the visible apparatus of the place, whether physical or sacred.\n\nThe prophetic woman too in Brandchidæ, whether she holds in her hand a wand, which was at first received from some God, and becomes filled with a divine splendour, or whether seated on an axis, she predicts future events, or dips her feet or the border of her garment in the water, or receives the God by imbibing the vapour of the water; by all these she becomes adapted to partake externally of the God.\n\nBut the multitude of sacrifices, the sacred law of the whole sanctimony, and such other things as are performed in a divine manner, prior to the prophetic inspiration, viz.\n\nthe baths of the prophetess, her fasting for three whole days, her retiring into the adyta, and there receiving a divine light, and rejoicing for a considerable time—all these evince that the God is entreated by prayer to approach, that 145 he becomes externally present, and that the prophetess, before she comes to her accustomed place, is inspired in a wonderful manner; and that, in the spirit which rises from the fountain, another more ancient God, who is separate from the place, shines forth to the view, and who is also the cause of the place, of the country, and of the whole divination."

