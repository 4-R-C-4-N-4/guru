[content]
body = "In the next place you inquire “ concerning the mode of divination, what it is, and what the quality is by which it is distinguished ,” which we have already explained, both generally and particularly.\n\nBut you, in the first place, represent diviners as asserting, “ that all of them obtain a foreknowledge of future events through Gods or dæmons, and that it is not possible for 159 any others to know that which is future, than those who are the lords of futurity .” Afterwards you doubt, “ whether divinity is so far subservient to men, as not to be averse to some becoming diviners from meal .” You do not, however, properly apprehend the abundance of the power of the Gods, their transcendent goodness, and the cause which comprehends all things, when you denominate their providential care and defence of us subserviency.\n\nAnd, besides this, you are ignorant of the mode of divine energy, that it is not drawn down and converted to us, but that it has a separate precedency, and gives itself, indeed, to its participants, yet neither departs from itself, nor becomes diminished, nor is ministrant to those that receive it; but, on the contrary, uses all things as subservient to itself.\n\nThe present doubt also appears to me to be erroneous in another respect, for supposing the works of the Gods to be like those of men, it inquires how they are effected.\n\nFor because we are converted to our works, and sometimes adhere to the passions of the things which we providentially attend to, on this account you badly conjecture that the power of the Gods is subservient to the natures which are governed by them.\n\nBut this power is never drawn down to its participants either in the production of 160 the worlds, or in the providential inspection of the realms of generation, or in predicting concerning it.\n\nFor it imparts to all things good, and renders all things similar to itself.\n\nIt likewise benefits the subjects of its government most abundantly, and without envy, and by how much the more it abides in itself, by so much the more it is filled with its own proper perfection.\n\nAnd it does not itself, indeed, become any thing belonging to its participants, but it causes the things which receive it to partake of its peculiarities, and preserves them in an all perfect manner.\n\nIt also abides at the same time perfectly in itself, and comprehends them at once in itself, but is neither vanquished nor comprehended by any one of them.\n\nIn vain, therefore, are men disturbed by a suspicion of this kind.\n\nFor divinity is not divided together with the above mentioned modes of divination, but produces all of them impartibly.\n\nNor does he effect different things at a different time, in a distributed manner, but produces all of them according to one energy, collectively and at once.\n\nNor is he detained about signs, being comprehended in, or divided about, them; but contains them in himself, and in one order, and comprehends them in unity, and produces them from himself, according to one invariable will.\n\n161 If, also, the power of the Gods proceeds in premanifestation as far as to things inanimate, such as pebble stones, rods, pieces of wood, stones, corn, or wheat, this very thing is most admirable in the presignification of divine prophesy; because it imparts soul to things inanimate, motion to things immoveable, and makes all things to be clear and known, to partake of reason, and to be defined by the measures of intellection, though possessing no portion of reason from themselves.\n\nAnother divine miracle 162 also divinity appears to me to exhibit through signs in these things."

