[content]
body = "Proceeding, therefore, to other peculiarities of them, we say, that with the Gods, indeed, there is acuteness and rapidity in the energies, which shine forth with greater celerity than those of intellect itself, though in themselves they are immoveable and stable.\n\nWith archangels, the celerities are, in a certain respect, mingled with efficacious energies.\n\nThose of angels partake of a certain motion, and do not, similarly with archangels, possess a power which is effective by speaking.\n\nThe operations of dæmons appear to be more rapid than they are in reality.\n\nIn the motions of the heroic phasmata, a certain magnificence presents itself to the view; but in accomplishing what they wish to effect, their energies are not so rapid as those of dæmons.\n\nIn the phasmata of archons, the first energies appear to be most excellent and authoritative; but the second have a more abundant representation, yet in actions fall short of the end.\n\nAnd the phasmata of souls are seen to be more moveable, yet are more imbecile, than those of heroes.\n\nIn addition to these things also, the magnitude of the epiphanies [or manifestations] in the Gods, indeed, is so great as sometimes to 90 conceal all heaven, the sun and the moon; and the earth itself, as the Gods descend, is no longer able to stand still.\n\nWhen archangels appear, certain parts of the world are moved, and a divided forerunning light precedes them.\n\nBut they exhibit a magnitude of light commensurate to the magnitude of their domination.\n\nThe angelic light is less than the archangelic, and more divided, but in dæmons it is still more divided, and the magnitude of the manifestation is not always equal in them.\n\nThe manifestation of heroes is still less than that of dæmons, but exhibits more of an elevated condition.\n\nAgain, the manifestation of such archons as preside over mundane forms, presents itself to the view as above measure great; but such of them as are distributed about matter, exhibit in their manifestations an abundance of pride and arrogance.\n\nThose of souls are not all of them seen to be equal, but appear to be less than those of heroes.\n\nAnd, in short, the magnitude of the manifestation is appropriately present in each of these, according to the magnitude of their powers, and the amplitude of the empire through which they extend themselves, and in which they exercise their authority.\n\nAfter these things, therefore, we shall define the reasons of the self-apparent statues [or 91 images].\n\nHence, in the forms of the Gods which are seen by the eyes, the most clear spectacles of truth itself are perceived, which are also accurately splendid, and shine forth with an evolved light.\n\nThe images of archangels present themselves to the view true and perfect; but those of angels preserve, indeed, the same form, but fail in plenitude of indication.\n\nThe images of dæmons are obscure; and those of heroes are seen to be still inferior to these.\n\nWith respect, also, to archons, the images of such as are mundane, are clear; but of such as are material, obscure.\n\nBoth, however, are seen to be of an authoritative nature.\n\nAnd the images of souls appear to be of a shadowy form.\n\nIn a similar manner, likewise, we must determine concerning the light of these powers.\n\nFor the images of the Gods, indeed, are replete with a fulgid light.\n\nThose of archangels are full of supernatural light.\n\nThose of angels are luminous; but dæmons present themselves to the view with a turbid fire.\n\nThe light of heroes is mingled with many things."

