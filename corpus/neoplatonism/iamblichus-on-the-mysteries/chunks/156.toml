[content]
body = "I wish, in the next place, to reply to such assertions as calumniate divine prediction. For you compare with it “ certain other methods which are conversant with the prediction of future events .” To me, however, it does not appear to be any thing honourable if a certain natural aptitude is ingenerated in us to the indication of the future, just as in animals there is a foreknowledge of earthquakes, or winds, or tempests. For an innate presage of this kind is the consequence of acuteness of sensation, or sympathy, or some other conjoint motion of the physical powers, and is not attended with any thing venerable and supernatural. Nor if some one, by human reasoning, 330 or artificial observation, conjectures from signs those things of which the signs are indicative (as physicians foreknow that a fever will take place from the systole and torpor of the pulse), neither does he appear to me to possess any thing honourable and good. For he conjectures after a human manner, and concludes from our reasoning power about things which are acknowledged to be effected naturally, and forms a judgment not very remote from the corporeal-formed order. Hence, if there is in us a certain natural presentiment of the future, in the same manner as in all other animals, this power is clearly seen to energize; this presentiment does not in reality possess any thing which is most blessed. For what is there among the things which are implanted in us by nature in the realms of generation that is a genuine, perfect, and eternal good?"

