[content]
body = "Nor is that which so greatly disturbs you, and for which you so strenuously contend, attended with any difficulty, I mean abstinence from animals, [95] if it is rightly understood.\n\nFor those who worship the Gods do not abstain from animals, lest the Gods should be defiled by the vapours arising from them.\n\nFor what exhalation from bodies can approach those who, before any thing material can come into contact with their power, intangibly amputate matter?\n\nNor is it the power of the Gods only that abolishes all bodies, and causes them to vanish, 229 without any approximation to them; but a celestial body, also, is unmingled with all the material elements; [96] nor does it receive into itself any thing extraneous, nor impart any portion of itself to things of a foreign nature.\n\nHow, therefore, can any terrestrial vapour, which is not elevated five stadia from the earth before it again flows down to the earth, either nourish a circulating and immaterial body, or, in short, produce in it a certain defilement, or any other passion?\n\nFor it is acknowledged that an etherial body is void of all contrariety, is liberated from all mutation, is entirely pure from the possibility of being transmuted into any thing else, and is perfectly free from a tendency to, and from the middle, because it is either without any tendency, or is convolved in a circle.\n\nHence, it is not possible that bodies, which consist of different powers and motions, which are all-variously changed, and are moved either upwards or downwards, should have any communion of nature or power with celestial bodies, or that any exhalation of the former should be mingled with the latter.\n\nAs the former, therefore, are entirely separated 230 from the latter, they will not effect any thing in them.\n\nFor celestial bodies being unbegotten, are not capable of receiving any mutation from generated natures.\n\nHow, therefore, can the Gods be defiled by such like vapours, who suddenly, as I may say, at one stroke, amputate the vapours ascending from all matter and material bodies?\n\nThis, therefore, it is not fit to suspect of the Gods [ viz.\n\nthat they can be defiled by vapours]; but it is much more requisite to think that things of this kind are foreign to us and to our nature.\n\nFor things which are divided, and also material and kindred natures, are able to have a certain communion with each other in acting and suffering; but things which are essentially different, and such as are entirely transcendent, and which employ other natures and powers, these cannot act on or receive any thing from each other.\n\nThe defilement, therefore, produced by material natures, falls on things which are detained by a material body; and from these it is necessary those should be purified who are capable of being defiled by matter.\n\nBut how can those beings be defiled by material essences who neither have a divisible nature nor possess the power of receiving in themselves the passions of matter?\n\nHow, likewise, can divinity, who has nothing in common 231 with us, in consequence of antecedently existing superior to human imbecility, be polluted by my passions, or by those of any other man?\n\nNeither of these, therefore, at all pertains to the Gods; neither our being filled with material bodies; (for there is nothing, in short, of this kind with them, nor are they defiled by our stains, since they are entirely pure and incorruptible), nor if there are certain material vapours of bodies which are emitted about the earth; for these vapours are most remote from the essence and power of the Gods.\n\nHence the whole hypothesis of contrariety is subverted if no part of it pertains to the Gods."

