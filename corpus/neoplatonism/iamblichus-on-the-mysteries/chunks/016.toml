[content]
body = "“ How therefore ,” you ask, “ are many things performed to them in sacred operations, as if they were passive?\n\n” I reply, that this is asserted through an ignorance of sacerdotal mysticism.\n\nFor of the things which are perpetually effected in sacred rites, some have a certain arcane cause, and which is more excellent than reason; others are consecrated from eternity to the 52 superior genera, as symbols; others preserve a certain other image, just as nature, which is effective of invisible reasons, expresses certain visible formations; others are adduced for the sake of honour, or have for their end some kind of similitude, or familiarity and alliance; and some procure what is useful to us, or in a certain respect purify and liberate our human passions, or avert some other of those dire circumstances which happen to us.\n\nIt must not, however, be on this account granted, that a certain portion of sacred institutions is employed in the service of Gods or dæmons, as if they were passive.\n\nFor an essence which is by itself perpetual and incorporeal, is not naturally adapted to receive a certain mutation from bodies.\n\nNor, even though we should admit that this essence is especially in want of such things, will it require the aid of men to a sacred worship of this kind; since it is itself filled from itself, and from the nature of the world, and the perfection which is in generation; and, if it be lawful so to speak, prior to being in want it receives the self-sufficient, through the never failing wholeness of the world and its own proper plenitude, and because all the more excellent genera are full of appropriate good.\n\nLet this, therefore, be a lenitive for us 53 in common, concerning the worship of the undefiled genera, as being appropriately coadapted to the beings that are more excellent than we, and because pure things are introduced to pure, and impassive things to impassive, natures.\n\nBut directing our attention to particulars, we say that the erection of the phalli is a certain sign of prolific power, which, through this, is called forth to the generative energy of the world.\n\nOn which account, also, many phalli are consecrated in the spring, because then the whole world receives from the Gods the power which is productive of all generation.\n\nBut I am of opinion, that the obscene language which then takes place, affords an indication of the privation of good about matter, and of the deformity which is in material subjects, prior to their being adorned.\n\nFor these being indigent of ornament, by so much the more aspire after it, as they in a greater degree despise their own deformity.\n\nAgain therefore, they pursue the causes of forms, and of what is beautiful and good, recognizing baseness from base language.\n\nAnd thus, indeed, the thing itself, viz.\n\nturpitude, is averted, but the knowledge of it is rendered manifest through words, and those that employ them transfer their desire to that which is contrary to baseness.\n\n54 Another reason, also, of these things may be assigned.\n\nThe powers of the human passions that are in us, when they are entirely restrained, become more vehement; but when they are called forth into energy, gradually and commensurately, they rejoice in being moderately gratified, are satisfied; and from hence, becoming purified, they are rendered tractable, and are vanquished without violence.\n\nOn this account, in comedy and tragedy, by surveying the passions of others, we stop our own passions, cause them to be more moderate, and are purified from them.\n\nIn sacred ceremonies, likewise, by certain spectacles and auditions of things base, we become liberated from the injury which happens from the works effected by them."

