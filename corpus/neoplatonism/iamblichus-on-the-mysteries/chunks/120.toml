[content]
body = "The same things also may be learned from the distribution of the Gods according to places; and from this, and the partible dominion over each particular thing, it may be seen how many allotments, greater or less, superior beings are assigned according to their different orders. For it is evident, that to the Gods who preside over certain places, the things produced by them are most appropriately offered in sacrifice; and that what pertains to the governed is most adapted to be sacrificed to the governors. For always to makers their own works are particularly grateful; and to those who primarily produce certain things, such things are primarily acceptable. Whether, therefore, certain animals, or plants, or any other productions of the earth, are governed by superior beings, at one and the same time, they participate of their inspective care, and impart to us an indivisible communion with the Gods. Some things, therefore, of this kind, if they are carefully preserved, increase the familiarity of those that retain them with the Gods; and these are such as by remaining entire, preserve the communion between Gods and men. Of this kind are some of the animals in Egypt, and man, 269 who is everywhere sacred. But some things, when consecrated, produce a more manifest familiarity; and these are such as by an analysis into the principle of the first elements, effect an alliance more sacredly adapted to superior causes. For the more perfect this alliance is, the more perfect always is the good which is imparted by it."

