[content]
body = "It is better, therefore, to assign as the cause of the efficacy of sacrifices friendship and familiarity, and a habitude which binds fabricators to the things fabricated, and generators to the 241 things generated. Hence when, this common principle preceding, we take a certain animal, or any thing which germinates in the earth, and which genuinely and purely preserves the will of its maker; then, through a thing of this kind, we appropriately move the demiurgic cause, which presides over it in an undefiled manner. But these causes being many, and some, as the dæmoniacal causes, having a proximate arrangement; but others, as divine causes, being arranged above these; and farther still, one most ancient and venerable cause being the leader of these; all the causes are moved in conjunction by a perfect sacrifice. Each thing, likewise, is in a kindred manner adapted to the sacrifice, according to the order which it is allotted. But if any sacrifice is imperfect, it proceeds to a certain extent, but is not capable of proceeding any further. Hence many are of opinion that sacrifices are to be offered to good dæmons, many to the last powers of the Gods, and many to the mundane or terrestrial powers of dæmons or Gods. These things, therefore, as being a part of sacrifices, are not falsely asserted; but they do not comprehend the whole of the power of sacrifice, and all the goods it contains, which extend to every thing divine. 242"

