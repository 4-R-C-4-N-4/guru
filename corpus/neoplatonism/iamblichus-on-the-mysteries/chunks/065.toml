[content]
body = "Another contest, however, awaits us, not less than that in which we have been before engaged, and which you immediately announce, concerning the causes of divination, “ whether a God, an angel, or a dæmon, or some other power, is present in manifestations, or divinations, or certain other sacred energies .” But our reply to your question is simply this, that it is not possible for any thing to be performed in a manner adapted to sacred concerns in divine works, without the presence of some one of the more excellent natures, as inspecting and giving completion to the sacred energy. And where the felicitous operations are perfect, sufficient to themselves, and unindigent, of these the Gods are the leaders. But where they are media, and in a small degree fall short 164 of the extremes, they have angels as the powers that perfect and unfold them into light. And it is the province of dæmons to effect those operations which rank as the last. But the right performance of actions which are effected in a divine manner, is entirely to be ascribed to some one of the more excellent natures. For since it is not possible to speak rightly about the Gods without the Gods, much less can any one perform works which are of an equal dignity with divinity, and obtain the foreknowledge of every thing without [the inspiring influence of] the Gods. For the human race is imbecile, and of small estimation, sees but a little, and possesses a connascent nothingness; and the only remedy of its inherent error, perturbation, and unstable mutation, is its participation, as much as possible, of a certain portion of divine light. But he who excludes this, does the same thing as those who attempt to produce soul from things inanimate, or to generate intellect from things unintelligent. For without the cooperation of a cause, he constitutes divine works from things which are not divine. Let it be granted, therefore, that a God, a dæmon, or an angel, gives completion to more excellent works, yet we must not on this account admit what you adduce as a thing acknowledged, 165 “ that they affect these things, in consequence of being drawn through us by the necessities with which invocation is attended .” For divinity is superior to necessity, and this is likewise the case with all the choir of more excellent natures that is suspended from him. Nor is he alone exempt from the necessity which is introduced by men, but also from that which comprehends in itself the world; because it is not the province of an immaterial nature, and which does not receive any adventitious order, to be subservient to any necessity introduced from any thing else. And in the next place, invocation, and the things performed by a scientific operator, accede and are conjoined to more excellent natures through similitude and alliance, and do not accomplish their energies through violence. Hence, the effects which are seen to take place in diviners, do not happen as you think, from the scientific theurgist being passively affected; nor is divination thus effected through necessity, passion preoccupying the predictor; for these things are foreign from, and incongruous to, the essence of more excellent natures. 166"

