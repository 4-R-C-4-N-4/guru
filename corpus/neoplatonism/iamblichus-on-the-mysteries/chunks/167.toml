[content]
body = "So that all things are full of divine natures; terrestrial natures receiving the plenitude of such as are celestial, but celestial of supercelestial essences; while every order of things proceeds gradually, in a beautiful descent, from the highest to the lowest.\n\nFor whatever particulars are collected into one above the order of things, are afterwards dilated in descending, various souls being distributed under their various ruling divinities.\n\n“In the next place, there are many solar animals, such as lions and cocks, which participate, according to their nature, of a certain solar divinity; whence it is wonderful how much inferiors yield to superiors in the same order, though they do not yield in magnitude and power.\n\nHence it is said, that a cock is very much feared, and, as it were, reverenced, by a lion; the reason of which we cannot assign from matter or sense, but from the contemplation alone of a supernal order.\n\nFor thus we shall find that the presence of the solar virtue accords more with a cock than with a lion.\n\nThis will be evident from considering that the cock, as it were, with certain hymns, applauds and calls to the rising sun, when he bends his course to us from the antipodes; and that solar angels sometimes appear in forms of this kind, who, though they are without shape, yet present themselves to us, who are connected with shape, in some sensible form.\n\nSometimes, too, there are dæmons with a leonine front, who when a cock is placed before them, unless they are of a solar order, suddenly disappear; and this because those natures which have an inferior rank in the same order 346 always reverence their superiors; just as many, on beholding the images of divine men, are accustomed, from the very view, to be fearful of perpetrating any thing base.\n\n“In fine, some things turn round correspondent to the revolutions of the sun, as the plants which we have mentioned, and others after a manner imitate the solar rays, as the palm and the date; some the fiery nature of the sun, as the laurel; and others a different property.\n\nFor, indeed, we may perceive that the properties which are collected in the sun, are every where distributed to subsequent natures constituted in a solar order, that is, to angels, dæmons, souls, animals, plants, and stones.\n\nHence the authors of the ancient priesthood discovered from things apparent the worship of superior powers, while they mingled some things and purified others.\n\nThey mingled many things indeed together, because they saw that some simple substances possessed a divine property (though not taken singly) sufficient to call down that particular power, of which they were participants.\n\nHence, by the mingling of many things together, they attracted upon us a supernal influx; and by the composition of one thing from many, they produced an assimilation to that one which is above many; and composed statues from the mixture of various substances conspiring in sympathy and consent.\n\nBesides this, they collected composite odours, by a divine art, into one, comprehending a multitude of powers, and symbolizing with the unity of a divine essence; considering that division debilitates each of these, but that mingling them together restores them to the idea of their exemplar.\n\n“But sometimes one herb, or one stone, is sufficient to a divine operation.\n\nThus a thistle is sufficient to procure the sudden appearance of some superior power; but a laurel, raccinum (or a thorny kind of sprig), the land and sea onion, the coral, the diamond, and the jasper, operate as a safeguard.\n\nThe heart of a mole is subservient to divination, but sulphur and marine water to purification."

