body = "Proclus, in his MS.\n\nCommentary on the First Alcibiades of Plato, observes, “that in the mysteries some one of the more imperfect dæmons assumes the appearance of one that is more perfect, and draws down to himself souls that are not yet purified, and separates them from the Gods.\n\nHence, in the most holy of the mysteries [ i.\n\ne.\n\nin the Eleusinian mysteries], prior to the manifest presence of the God [who is invoked], certain terrene dæmons present themselves to the view, disturbing those that are initiated, divulsing them from undefiled good, and exciting them to matter.\n\nOn this account the Gods [in the Chaldean oracles] order us not to behold them, till we are guarded by the powers imparted by the mysteries.\n\nFor they say, Ου γαρ χρη κεινους σε βλεπειν πριν σωμα τελεσθεις .\n\ni.\n\ne.\n\nIt is not proper you should behold them till your body is purified by initiation.\n\nAnd they add the reason, Οτι τας ψυχας θελγοντες αει τελετων απαγουσι , i.\n\ne.\n\nFor these dæmons alluring souls, always draw them away from the mysteries.\n\nConformably to this, also, Proclus in Plat.\n\nTheol.\n\np.\n\n7, says, ωσπερ εν ταις των τελετων αγιωταταις φασι τους μυστας, την μεν πρωτην πολυειδεσι, και πολυμορφοις των θεων προβεβλημενοις γενεσιν απανταν, εισιοντας δε, ακλινεις, και ταις τελεταις πεφραγμενους, αυτην την θειαν ελλαμψιν ακραιφνως εγκολπιζεσθαι, και γυμνιτας (ως αν εκεινοι φαιεν) του θειου μεταλαμβανειν, τον αυτον οιμαι τροπον και εν τη θεωριᾳ των ολων .\n\ni.\n\ne.\n\n“As in the most holy of the mysteries, they say, that the mystics at first meet with the multiform and many shaped genera [ i.\n\ne."

