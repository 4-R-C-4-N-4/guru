[content]
body = "Farther still, therefore, we must not disdain to add what follows; that we frequently perform something to the Gods who are the inspective guardians of body, and to good dæmons, for the sake of the necessary use of the body; as, for instance, when [by sacrifices] we purify it from ancient stains, or liberate it from diseases, and fill it with health, or remove from it heaviness and torpor, or procure for it any other good. In this case, therefore, we evidently 253 must not busy ourselves with the body in an intellectual and incorporeal manner. For the body is not adapted to participate of modes of this kind; but, obtaining things which are allied to itself, it is meliorated and purified by bodies. The rites of sacrifices, therefore, will necessarily, for a purpose of this kind, be corporeal-formed; partly cutting off what is superfluous in us; partly supplying us with that of which we are in want; and partly leading into symmetry and order such things in us as are immoderately disturbed. We also frequently engage in sacred operations, entreating superior beings to grant us such things as are adapted to the wants of human life. And these are such as preserve the body in health, or pertain to those things which we procure for the sake of the body."

