[content]
body = "I think, therefore, that all who are lovers of the contemplation of theurgic truth will acknowledge this, that the piety which pertains to divine natures ought not to be exercised towards them partially or imperfectly. Hence, since prior to the appearance of the Gods, all such powers as are presubjacent to them are moved, and when the Gods are about to descend to the earth, precede them as in a solemn procession; he who does not distribute to all these powers that which is adapted to them, 261 and does not honour each in an appropriate manner, will depart imperfect, and destitute of the participation of the Gods. But he who propitiates all of them, and offers to each acceptable gifts, and such as are to the utmost of his power adapted to them, will always remain secure and irreprehensible, giving completion in a proper manner to the perfect and entire receptacle of the divine choir. Since this, therefore, is the case, whether is it necessary that the mode of sanctity should be simple, and consist of a certain few things, or that it should be multiform and all-harmonic, and mingled, as I may say, from every thing contained in the world? If, indeed, the power which is invoked, and is excited in the performance of sacred rites, was simple, the mode of sacrifice should necessarily be simple. But if the multitude of powers which are excited when the Gods descend and are moved, is not to be comprehended by any one, except theurgists alone, who accurately know this through experience in sacred operations; if this be the case, they alone are capable of knowing what the perfection is of the sacrific art; and they also know that the omission, though of a few things, subverts the whole work of religion; just as in harmony, from the bursting of one 262 chord, the whole becomes dissonant and incommensurate. As, therefore, in the visible descents of the Gods, a manifest injury is sustained by those who leave some one of the more excellent genera unhonoured, thus also 263 in the invisible appearances of the Gods in sacrifices, it is not proper to honour one of them, and not honour another, but it is entirely requisite to honour each of them according to the order which he is allotted. But he who leaves some one of them unhonoured, confounds the whole work of piety, and divulses the one and whole orderly distribution of it; not, in so doing, as some one may think, imperfectly receiving the Gods, but entirely subverting all the ceremonies of religion."

