[content]
body = "We may, however, beginning from another hypothesis, demonstrate the same thing. We must admit that the corporeal parts of the universe are neither sluggish nor destitute of power, but as much as they excel our concerns in perfection, beauty, and magnitude, by so much also is the power which is present with them greater. Each, likewise, by itself is capable of effecting different things, and produces certain different energies. They are also capable of effecting things much more numerous on each other. And besides this, a certain multiform production extends to parts from wholes; partly from sympathy, through similitude of powers, and partly from the aptitude of the agent to the patient. If, therefore, certain evils and destructions happen to parts, they are salutary and good as with reference to wholes and the harmony of the universe, but to parts they introduce a necessary corruption, either from not being able to bear the energies of wholes, or from a certain other commixture and temperament of their own imbecility, or, in the third place, from the privation of symmetry in the parts to each other. 216"

