[content]
body = "Those assertions, also, of yours pertain to the same thing, in which you say, “ that the science of the Gods is sacred and useful, and call the ignorance of things honourable and beautiful darkness, but the knowledge of them light; and also add, that the ignorance of these things fills men with all evils, through inerudition and audacity, but the knowledge of them is the cause of all good .” For all these assertions tend to the same thing with the preceding, and obtain together with them an appropriate discussion.\n\nIt is necessary, therefore to omit them, and to pass on to the inquiries concerning divination, and concisely dissolve them.\n\n112 SECTION III."

