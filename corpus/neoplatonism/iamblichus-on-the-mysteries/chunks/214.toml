body = "65, when he says, “The cathartic prayer is that which is offered for the purpose of averting diseases originating from pestilence, and other contagious distempers, such as we have written in our temples .” Καθαρτικαι δε (ευχαἰ, επι αποτροπαις λοιμικων νοσημοτων, ἢ παντοιων μολυσμων’ οιας δε και εν τοις ιεροις εχομεν αναγεγραμμενας.\n\n130 .\n\nPorphyry, in lib.\n\nii.\n\nDe Abstinentia, mentions Seleucus the theologist, and Suidas says that Seleucus the Alexandrian wrote 100 books concerning the Gods .\n\n131 .\n\nThese books ( βιβλοι ) were most probably nothing more than short discourses, such as the treatises now are which are circulated as written by Hermes, and which, as Iamblichus informs us, contain Hermaic doctrines.\n\n132 .\n\nA great priest, a scribe of the Adyta in Egypt, by birth a Sebanite, and an inhabitant of Heliopolis, as he relates of himself.\n\n133 .\n\nIn the original, πρωτος και του πρωτου θεου και βασιλεως , which Gale translates, prior etiam primo Deo, et rege [sole].\n\nBut the addition of sole in his translation is obviously most unappropriate and false: for Iamblichus is evidently speaking of a deity much superior to the sun.\n\n134 .\n\nFor Ημηφ here, Gale conjectures that we should read Κνηφ Kneph : for Plutarch says that the unbegotten Kneph was celebrated with an extraordinary degree of veneration by the Egyptian Thebans.\n\n135 .\n\nHence the moon is said by Proclus to be αυτοπτον της φυσεως αγαλμα , the self-visible statue or image of nature.\n\n136 .\n\nProclus in Tim.\n\np.\n\n117, cites what is here said as the doctrine of the Egyptians, and also cites for it the authority of Iamblichus.\n\nBut his words are, και μην και η των Αιγυπτιων παραδοσις τα αυτα περι αυτης (της υλης) φησιν.\n\nο γε τοι θειος Ιαμβλιχος ιστορησεν οτι και Ερμης εκ της ουσιοτητος την υλοτητα παραγεσθαι βουλεται.\n\n, i.\n\ne.\n\n“Moreover the doctrine of the Egyptians asserts the same things concerning matter.\n\nFor the divine Iamblichus relates that Hermes also produces matter from essentiality.” 137 .\n\nThis is most probably the Chæremon who is said by Porphyry, in lib.\n\niv."

