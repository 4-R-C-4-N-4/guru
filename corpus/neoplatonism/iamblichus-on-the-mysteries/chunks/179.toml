[content]
body = "Hence the Emperor Julian, in the fragments of his treatise against the Christians, preserved by Ciryl, says, speaking of the Christians, “If any one wishes to consider the truth respecting you, he will find that your impiety consists of the Judaic audacity, and the indolence and confusion of the heathens .\n\nFor deriving from both, not that which is most beautiful, but the worst, you have fabricated a web of evils.——Hence, from the innovation of the Hebrews, you have seized blasphemy towards the venerable Gods; but from our religion you have cast aside reverence to every nature more excellent than man, and the love of paternal institutes.” Το γαρ αληθες ει τις υπερ υμων εθελοι σκοπειν, ευρησει την υμετεραν ασεβειαν, εκ τε της Ιουδαϊκης τολμης και της παρα τοις εθνεσιν αδιαφοριας και χυδαιοτητος συγκειμενην.\n\nεξ αμφοιν γαρ ουτι το καλλιστον αλλα το χειρον ελκυσαντες, παρυφην κακων ειργασασθε.——Απο μεν ουν της Εβραιων καινοτομιας το βλασφημειν τιμωμενους θεους ηρπασατε· απο δε της παρ’ ημιν θρησκειας το μεν ευλαβες τε ομου προς απασαν την κρειττονα φυσιν, και των πατριων αγαπητικον, απολελοιπατε.\n\nP.\n\n122 .\n\nPrior to truly existing beings, and total principles , &c.\n\nOf the two most ancient principles of all things 362 mentioned in this chapter, as celebrated by Hermes, the first corresponds to the one itself of Plato, and the second to being itself , or superessential being, the summit of the intelligible triad; which two principles are beautifully unfolded by Proclus in the second and third books of his treatise on the Theology of Plato.\n\nP.\n\n122 .\n\nHe arranges the God Eneph prior to, and as the leader of, the celestial Gods.—But prior to this he arranges the impartible one, which he says is the first paradigm, and which he denominates Eicton.\n\nIt appears to me that the former of these two divinities is the same with Saturn, who is the summit of the intellectual order of Gods; and that the latter is the animal itself of Plato, or the Phanes of Orpheus, who subsists at the extremity of the intelligible triad.\n\nFor the God Eneph is said by Iamblichus to be an intellect intellectually perceiving itself, and converting intellections to itself; and these are the characteristics of Saturn."

