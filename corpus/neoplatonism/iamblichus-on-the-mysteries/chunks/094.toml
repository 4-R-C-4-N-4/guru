[content]
body = "Consider, therefore, also another genus of causes; how a stone or a herb frequently possess from themselves a nature corruptive, or again collective of generated natures. For this is not only the case with these, but this physical power is also in greater natures and greater things, which those who are not able to infer by a reasoning process, will perhaps transfer the works and energies of nature to more excellent beings [ i. e. to Gods, angels, and dæmons]. Now, therefore, it is acknowledged that the tribe of evil dæmons has a very extended 224 power in generation, in human affairs, and in such things as subsist about the earth. Hence, why is it wonderful that a tribe of this kind should effect such works as these? For every man is not able to distinguish a good from an evil dæmon, or by what peculiarities the one is separated from the other. Hence those, who are not able to perceive the difference between the two, absurdly reason concerning the cause of them, and refer this cause to genera superior to nature and the dæmoniacal order. If, also, certain powers of a partial soul are assumed in order to effect these things, whether such a soul is detained in body, or has left the testaceous and terrestrial body, but wanders about the places of generation in a turbid and humid spirit; this, indeed, will be a true opinion, but separates the cause of these things at the greatest distance from more excellent natures. By no means, therefore, is that which is divine, or any good dæmon, subservient to the illegal desires of men in venereal concerns. For of these things there are many other causes. 225 SECTION V."

