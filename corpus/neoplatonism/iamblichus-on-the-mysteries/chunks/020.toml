[content]
body = "Farther still, with respect to “ what are called the necessities of the Gods ,” the whole truth of this is, that necessities are peculiar to, and subsist in such a way as accords with the nature of, the Gods. [34] Hence they do not subsist as if they were externally derived, or were the effect of violence, but after such a manner as the good ought to be from necessity, so the Gods entirely exist, and are by no means otherwise disposed. This necessity, therefore, is mingled with beneficent will, and is the friend of love; through an order adapted to the Gods, possesses identity and immutability; and because it is contained in one boundary, abides in this, and never departs from it. Hence, 60 through all these particulars, the contrary to what you infer takes place. For it happens that a divine nature is incapable of being allured, is impassive and uncompelled, if there are in reality such powers in theurgy, as we have demonstrated there are."

