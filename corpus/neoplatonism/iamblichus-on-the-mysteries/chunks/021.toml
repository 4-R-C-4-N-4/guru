[content]
body = "After this, you pass on to another division into contraries, viz.\n\nthe division of Gods with reference to dæmons.\n\nFor you say, “ that the Gods are pure intellects ;” but you propose this opinion as an hypothesis, or you narrate it as a dogma adopted by certain persons.\n\nAnd you infer, “ that dæmons are psychical essences participating of intellect .” Neither, therefore, am I ignorant that this is the opinion of many philosophers; but to you, I do not think it is proper to conceal what appears to me to be the truth.\n\nFor all such opinions are full of confusion; since they wander from dæmons to souls, which also participate of intellect; and from the Gods to an immaterial intellect in energy, which the Gods entirely excel by a priority of nature.\n\nWhy, therefore, is it requisite 61 to attribute to them these peculiarities, which are by no means appropriate?\n\nAnd thus much concerning this division, for it would be superfluous to make any further mention of it.\n\nBut it is requisite that your doubts respecting this distinction should be properly considered, as the discussion of them pertains to the sacerdotal province.\n\nFarther still, having said “ that pure intellects are inflexible , [i.\n\ne.\n\nnot to be changed or altered ] and unmingled with sensibles ,” you doubt, “ whether it is requisite to pray to them .” But I think it is necessary to pray to no others than these.\n\nFor that in us which is divine, intellectual, and one, or intelligible, if you are willing so to call it, is most clearly excited in prayer; and, when excited, vehemently seeks that which is similar to itself, and becomes copulated to perfection itself.\n\nBut if it should appear to you to be incredible, that an incorporeal nature can be capable of hearing sounds, and it should be urged by you, that for this purpose the sense of hearing is requisite, that it may apprehend what is said by us in prayer; you willingly forget the excellency of primary causes, which consists in both knowing and 62 comprehending in themselves at once the whole of things.\n\nThe Gods, therefore, do not receive prayers in themselves, through any corporeal powers or organs, but rather contain in themselves the energies of pious invocations; and especially of such as, through sacred ceremonies, are established in, and united to, the Gods.\n\nFor then, in reality, a divine nature is present with itself, and does not communicate with the intellectual conceptions in prayer, as different from its own.\n\n“ Supplications, however ,” you say, “ are too foreign to the purity of intellect to be offered to the Gods .” But this is by no means the case.\n\nFor on this very account, because we fall short of the Gods in power, purity, and every thing else, we shall act in the most opportune manner, by invoking them with the most vehement supplications.\n\nFor the consciousness of our own nothingness, when we compare ourselves, with the Gods, causes us to betake ourselves spontaneously to suppliant prayer.\n\nBut from supplication, we are in a short time led to the object of supplication, acquire its similitude from intimate converse, and gradually obtain divine perfection, instead of our own imbecility and imperfection.\n\nIf, indeed, it is considered that sacred prayers 63 are sent to men from the Gods themselves, that they are certain symbols of the divinities, and that they are only known to the Gods, with whom, in a certain respect, they possess the same power,—how can it any longer be justly apprehended, that a supplication of this kind is sensible, and not divine and intellectual?"

