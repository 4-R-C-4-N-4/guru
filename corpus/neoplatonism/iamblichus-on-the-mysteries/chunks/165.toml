[content]
body = "“The divine Iamblichus, however, doubts how the Gods are said to be allotted certain places according to definite times, as, by Plato in the Timæus, Minerva is said to have been first allotted the guardianship of Athens, and afterwards of Saïs.\n\nFor if their allotment commenced from a certain time, it will also at a certain time cease.\n\nFor every thing which is measured by time is of this kind.\n\nAnd farther still, was the place which at a certain time they are allotted, without a presiding deity prior to this allotment, or was it under the government of other Gods?\n\nFor if it was without a presiding deity, how is it to be admitted that a certain part of the universe was once entirely destitute of divinity?\n\nHow can any place remain without the guardianship of superior beings?\n\nAnd if any place is sufficient to the preservation of itself, how does it afterwards become the allotment of some one of the Gods?\n\nBut if it should be said, that it is afterwards under the government of another God, of whom it becomes the allotment, this also is absurd.\n\nFor the second God does not divulse the government and allotment 343 of the former, nor do the Gods alternately occupy the places of each other, nor dæmons change their allotments.\n\nSuch being the doubts on this subject, he solves them by saying, that the allotments of the Gods remain perpetually unchanged, but that the participants of them at one time, indeed, enjoy the beneficent influence of the presiding powers, but at another are deprived of it.\n\nHe adds, that these are the mutations measured by time, which sacred institutes frequently call the birthday of the Gods .\n\nP.\n\n23 .\n\nWhich also the art of divine works perceiving, &c.\n\nThis art of divine works is called theurgy , in which Pythagoras was initiated among the Syrians, as we are informed by Iamblichus in his Life of that philosopher.\n\n(See p.\n\n9 of my translation of that work.) Proclus also was skilled in this art, as may be seen in the Life of him by Marinus.\n\nPsellus, in his MS.\n\ntreatise on Dæmons, says, as we have before observed, “that magic formed the last part of the sacerdotal science”; in which place by magic he doubtless means that kind of it which is denominated theurgy.\n\nAnd that theurgy was employed by the ancients in their mysteries, I have fully proved in my treatise on the Eleusinian and Bacchic Mysteries.\n\n[152] This theurgy, too, is doubtless the same as the magic of Zoroaster, which Plato in the First Alcibiades says, consisted in the worship of the Gods; on which passage the following account of theurgy by Proclus was, I have no doubt, originally part of a commentary.\n\nFor the MS.\n\nCommentary of Proclus, which is extant on this dialogue, does not extend to more than a third part of it; and this Dissertation on Theurgy, which is only extant in Latin, was published by Ficinus the translator, immediately after his Excerpta, from this Commentary.\n\nSo that it seems highly probable that the manuscript from which Ficinus translated his Excerpta, was much more perfect than that which has been preserved to us, in consequence of containing this account of the theurgy of the ancients.\n\n“In the same manner as lovers gradually advance from that beauty which is apparent in sensible forms, to that which is divine; so the ancient priests, when they considered that there is a certain alliance and sympathy in natural things to each other, and of things manifest to occult powers; and discovered that all things subsist in all, they 344 fabricated a sacred science from this mutual sympathy and similarity."

