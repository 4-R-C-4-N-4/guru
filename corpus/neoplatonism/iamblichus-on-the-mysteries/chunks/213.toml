body = "of my translation of Plato, where many of these names are beautifully unfolded from the MS.\n\nScholia of Proclus on the Cratylus.\n\n127 .\n\nSee the additional notes at the end of vol.\n\nv.\n\nof my translation of Plato, and also the notes to my translation of Aristotle de Interpretatione, in which the reader will find a treasury of recondite information concerning names, from Proclus and Ammonius.\n\n128 .\n\nMost historians give the palm of antiquity to the Egyptians.\n\nAnd Lucian, in lib.\n\nDe Syria Dea, says, “that the Egyptians are said to be the first among men that had a conception of the Gods, and a knowledge of sacred concerns.——They were also the first that had a knowledge of sacred names.” Αιγυπτιοι πρωτοι ανθρωπων λεγονται θεων τε εννοιην λαβειν και ιρα εισασθαι——πρωτοι δε και ονοματα ιρα εγνωσαν.\n\nConformably to this, also, an oracle of Apollo, quoted by Eusebius, says that the Egyptians were the first that disclosed by infinite actions the path that leads to the Gods.\n\nThis oracle is as follows: Αιπεινη γαρ οδος, μακαρων, τρηχειατε πολλον, Χαλκοδετοις τα πρωτα διοιγομενη πυλεωσιν.\n\nΑτραπιτοι δε εασσιν αθεσφατοι εγγεγαυιαι Ας πρωτοι μεροπων επ’ απειρονα πρηξιν εφηναν, Οι το καλον πινοντες υδωρ Νειλωτιδος αιης· Πολλας και Φοινικες οδους μακαρων εδαησαν, Ασσυριοι, Λυδοιτε, και Εβραιων (lege Χαλδαιων ) γενος ανδρων .\n\ni.e.\n\n“The path by which to deity we climb, Is arduous, rough, ineffable, sublime; And the strong massy gates, through which we pass In our first course, are bound with chains of brass.\n\nThose men the first who of Egyptian birth Drank the fair water of Nilotic earth, Disclosed by actions infinite this road, And many paths to God Phœnicians show’d.\n\nThis road th’ Assyrians pointed out to view, And this the Lydians and Chaldeans knew.” For Εβραιων in this oracle I read Χαλδαιων , because I have no doubt that either Aristobulus the Jew, well known for interpolating the writings of the Heathens, or the wicked Eusebius as he is called by the Emperor Julian, have fraudulently substituted the former word for the latter.\n\n129 .\n\nPrayers of this kind are such as those of which Proclus speaks in Tim.\n\np."

