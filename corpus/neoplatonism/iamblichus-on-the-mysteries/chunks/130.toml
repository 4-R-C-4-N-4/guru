[content]
body = "Or this thing may likewise be explained as follows: Dæmons preside with a guardian power over arcane mysteries, and this in so remarkable a degree, because the orderly distribution of things in the universe is primarily contained in dæmons. For the parts of the universe remain in order, because the beneficent power of Osiris continues sacred and undefiled, and is not mingled with any opposing error and perturbation. The life of all things likewise remains pure and incorruptible, because the occult vivific beauties of the productive principles in Isis do not descend into body which is born along, [120] and is the object of sight. But all things continue immoveable and perpetual, because the course of the sun is never stopped. And all things remain perfect and entire, because the arcana in the adytum [121] are never disclosed. Hence, in those particulars in which the whole of things possesses its safety, I mean in arcana being always preserved occult, and in the ineffable essence of the Gods, never receiving a contrary condition; in these, terrestrial dæmons cannot endure, even 283 in words, to hear that they subsist otherwise than they do, or that they become profaned; and on this account threatening language has a certain power when employed against them. No one, however, threatens the Gods, nor is such a mode of invocation addressed to them. Hence with the Chaldeans, by whom words used to the Gods alone are preserved distinct and pure, no threats are employed. But the Egyptians, mingling dæmoniacal words with divine signatures, sometimes employ threats. You have, therefore, an answer to these doubts, concise indeed, but I think sufficiently free from error. 284 SECTION VII."

