[content]
body = "Let us now, therefore, to the utmost of our power, endeavour to discuss the manifold doubt concerning the peculiar dæmon, and which also is subject to various objections. Since, however, to speak summarily, the consideration of the peculiar dæmon is twofold, the one being theurgic, but the other artificial; and the one drawing this dæmon down from supernal causes, but the other from the visible periods in generation; and the one making no use whatever of the calculation of nativities, but the other meddling with methods of this kind; and the one worshiping this dæmon in a way more universal and supernatural, but the other partibly conformable to nature; this being the case, you appear to me to have absurdly transferred a more perfect sacred operation to one that is human, and in this to have exercised your inquiries. 314"

