body = "Robertson in thinking that Thomson was really more competent in prose than in poetry.”— The Speaker.\n\nCATALOGUE OF A COLLECTION OF PRIVATELY PRINTED BOOKS COMPILED AND ANNOTATED BY BERTRAM DOBELL Parts I.\n\nto III.\n\nnow ready.\n\nPrice One Shilling each.\n\nTo be completed in five or six parts.\n\n“Mr.\n\nBertram Dobell has now issued the second part of his ‘Catalogue of Privately Printed Books,’ coming down to the letter N.\n\nThis consists, it may be as well to state, entirely of such books as are in Mr.\n\nDobell’s own possession; but as he has been collecting them for many years past, and as he appends copious notes to the titles, the work will always possess a permanent bibliographical value.\n\nWe observe that he describes a large number of pieces printed at the private press of Charles Clark, of Great Totham, Essex, which possess little interest beyond curiosity; but he seems to have none of the dialect specimens of Prince L.\n\nL.\n\nBuonaparte, and the only examples of Mr.\n\nDaniel’s Oxford Press, that we have found are under the head of Canon Dixon [others have since been noticed].\n\nThe Appleton Press of Mr.\n\nW.\n\nJ.\n\nLinton is fairly represented, and so is that of the late Halliwell-Phillipps.\n\nAltogether the curious reader will find here much to interest him in one of the by-paths of literature.”— The Academy.\n\nTRANSCRIBER’S NOTES Silently corrected obvious typographical errors and variations in spelling.\n\nRetained archaic, non-standard, and uncertain spellings as printed."

