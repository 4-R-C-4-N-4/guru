[content]
body = "The hostile opposition, therefore, in the things that are now proposed, may be easily dissolved by demonstrating the dignity of wholes with 226 respect to parts, and by recalling to your recollection the exempt transcendency of the Gods above men. But what I mean is this, that the soul, which ranks as a whole, presides over all the mundane body, [94] and that the 227 celestial Gods ascend, as into a vehicle, into a celestial body, neither receiving any injury from thence, nor any impediment in their intellections. But to a partial soul, the communion with body is noxious in both these respects. If, therefore, some one perceiving this, should nevertheless introduce such a doubt as the following, that if the body is a bond to our soul, it will also be a bond to the soul of the universe, and that if a partial soul is converted to the body on account of generation, in a similar manner the power of the Gods is converted to generation; in answer to this every one may reply, that he who thus doubts does not know how much superior beings transcend men, and wholes parts. Since, therefore, the objections pertain to things different from each other, they do not produce any ambiguity."

