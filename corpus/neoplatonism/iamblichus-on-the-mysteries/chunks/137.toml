[content]
body = "Prior to truly existing beings and total principles [or principles that rank as wholes], there is one God, prior to [that deity who is generally believed to be] the first God and king, [133] immoveable, and abiding in the solitude of his own unity. For neither is the intelligible connected with him, nor any thing else; but he is established as the paradigm of the God who is the father of himself, is self begotten, is father alone, and is truly good. For he is something even greater and prior to this, is the fountain of all things, and the root of the first intelligible forms. But from this one deity, the God who is sufficient to himself unfolds himself, into light. For this divinity, also, is the principle and God of Gods, a monad from the one , prior to essence, and the principle of essence. For from him entity and essence are derived; and hence, also, he is denominated the principle of intelligibles. These, therefore, are the most ancient principles of all things, which Hermes 302 arranges prior to the etherial, empyrean, and celestial Gods. He likewise delivered to us the history of the empyrean Gods in one hundred books; of the etherial in an equal number; and of the celestial in a thousand books."

