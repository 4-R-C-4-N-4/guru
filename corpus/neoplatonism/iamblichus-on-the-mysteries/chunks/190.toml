[content]
body = "But Pythagoras, as he was astronomizing, happened to meet with the Phrygian piper at an unseasonable time of night, and persuaded him to change his Phrygian for a spondaic song; through which the fury of the lad being immediately repressed, he returned home in an orderly manner, though a little before this he could not be in the least restrained, nor would, in short, bear any admonition; and even stupidly insulted Pythagoras when he met him.\n\nWhen a certain youth, also, rushed with a drawn sword on Anchilus, the host of Empedocles, because, being a judge, he had publicly condemned his father to death, and would have slain him as a homicide, Empedocles changed the intention of the youth, by singing to his lyre that verse of Homer, Nepenthe, without gall, o’er every ill Oblivion spreads.\n\nOdyss.\n\nlib.\n\n4.\n\nAnd thus snatched his host Anchilus from death, and the youth from the crime of homicide.\n\nIt is also related, that the youth from that time became the most celebrated of the disciples of Pythagoras.\n\nFarther still, the whole Pythagoric school produced, by certain appropriate songs, what they called exartysis , or adaptation; synarmoga , or elegance of manners; and epaphe , or contact, usefully conducting the dispositions of the soul to passions contrary to those which it before possessed.\n\nFor when they went to bed, they purified the reasoning power from the perturbations and noises to which it had been exposed during the day, by certain odes and peculiar songs, and by this means procured for themselves tranquil sleep, and few and good dreams.\n\nBut when they rose from bed, they again liberated themselves from the torpor and heaviness of sleep, by songs of another kind.\n\nSometimes, also, by musical sounds alone, unaccompanied with words, they healed the passions of the soul and certain diseases, enchanting, as they say, in reality.\n\nAnd it is probable that from hence this name epode , i.\n\ne.\n\nenchantment, came to be generally used.\n\nAfter this manner, therefore, Pythagoras, through music, produced the most beneficial correction of human manners and lives.” Proclus also, in his MS.\n\nCommentary on the First Alcibiades of Plato, observes, “that of musical instruments some are repressive, and others motive; some are adapted to rest, and others to motion.\n\nThe repressive, therefore, are most useful for education, leading our manners into order, repressing the turbulency of youth, and bringing its agitated nature to quietness and temperance.\n\nBut the motive instruments are adapted to enthusiastic energy; and hence, in the mysteries and mystic sacrifices, the pipe is useful; for the motive power of it is employed for the purpose of exciting the reasoning power to a divine nature.\n\nFor here it is requisite that the irrational part should be laid asleep, and the rational excited.\n\nHence those that instruct youth use repressive instruments, but initiators such as are motive.\n\nFor that which is disciplined is the irrational part; but it is reason which is initiated, and which energizes enthusiastically.” See, likewise, on this subject, Ptolem.\n\nHarmonic, lib.\n\niii.\n\ncap.\n\n7 and 8, who observes among other things, “that our souls directly sympathize with the energies of melody, recognizing, as it were, their alliance to them—and that at one time the soul is changed to a quiet and repressed condition, but at another to fury and enthusiasm."

