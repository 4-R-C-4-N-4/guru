[content]
body = "the musical, the telestic, the prophetic, and the amatory, previous to the discussion of each, we must first speak about enthusiasm, and show to what part of the soul the enthusiastic energy pertains; whether each part of it possesses this energy; if all enthusiasm is from the Gods; and in what part of the soul it is ingenerated; or whether it subsists in something else more excellent than soul.\n\nWhere, then, does that which is properly and primarily called enthusiasm subsist, and what is it?\n\nOf the rational soul there are two parts, one of which is dianoia , but the other opinion .\n\nAgain, however, of dianoia, one part is said to be the lowest, and is properly dianoia, but another part of it is the highest, which is said to be the intellect of it, according to which the soul especially becomes intellectual, and which some call intellect in capacity.\n\nThere is also another thing above this, which is the summit of the whole soul, and most allied to the one , which likewise wishes well to all things, and always gives itself up to the Gods, and is readily disposed to do whatever they please.\n\nThis, too, is said to be the one of the soul, bears the image of the superessential one, and unites the whole soul.\n\nBut that these things necessarily thus subsist, we may learn as follows: The rational soul derives its existence from all the causes prior to itself, i.\n\ne.\n\nfrom intellect and the Gods.\n\nBut it subsists also from itself: for it perfects itself.\n\nSo far, therefore, as it subsists from the Gods, it possesses the one , which unites all its powers, and 351 all the multitude of itself, and conjoins them to the one itself , and is the first recipient of the goods imparted by the Gods.\n\nIt likewise makes all the essence of the soul to be boniform, according to which it is connected with the Gods, and united to them.\n\nBut so far as it subsists from intellect it possesses an intellectual nature, according to which it apprehends forms, by simple projections, or intuitions, and not discursively; and is conjoined to the intellect which is above itself.\n\nAnd so far as it constitutes itself, it possesses the dianoetic power, according to which it generates sciences and certain theorems, energizes discursively, and collects conclusions from propositions.\n\nFor that it constitutes or gives subsistence to itself, is evident from its imparting perfection to itself; since that which leads itself to perfection, and imparts to itself well-being, will much more impart to itself existence.\n\nFor well-being is a greater thing than being.\n\nIf, therefore, the soul imparts that which is greater to itself, it will much more impart that which is less.\n\nHence that which is primarily, properly, and truly enthusiasm from the Gods, is effected according to this one of the soul, which is above dianoia, and above the intellect of the soul; which one is at another time in a relaxed and dormant state.\n\nThis one, likewise, becoming illuminated [by the Gods], all the life of the soul is illuminated, and also intellect, dianoia, and the irrational part, and the resemblance of enthusiasm is transmitted as far as to the body itself.\n\n“Other enthusiasms, therefore, are produced about other parts of the soul, [155] certain dæmons exciting them, [156] or the Gods also, though not without the intervention of dæmons.\n\nFor dianoia is said to energize enthusiastically, when it discovers sciences and theorems in a very short space of time, and in a greater degree than other men."

