[content]
body = "If, however, it be requisite to unfold to you the truth concerning the peculiar dæmon, we must say that he is not distributed to us from one part of the heavens, or from some one of the visible elements; but that from the whole world, the all-various life contained in it, and the all-various body through which the soul descends into generation, a certain peculiar portion is distributed to each of the parts in us, according to a peculiar prefecture. This dæmon, therefore, is established in the paradigm before the soul descends into generation; and when the soul has received him as its leader, the dæmon immediately presides over the soul, gives completion to its lives, and binds it to body when it descends. He likewise governs the common animal of the soul, directs its peculiar life, and imparts to us the principles of all our thoughts and reasonings. We also perform such things as he suggests to our intellect, and he continues to govern us till, through sacerdotal theurgy, we obtain a God for the inspective guardian and leader of the soul. For then the dæmon either yields or delivers his government to a more excellent nature, or is 322 subjected to him, as contributing to his guardianship, or in some other way is ministrant to him as to his lord."

