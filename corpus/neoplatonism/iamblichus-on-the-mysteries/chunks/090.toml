[content]
body = "After the body of the universe, also, many things are generated by the nature of it. For the concord of similars, and the contrariety of dissimilars, effect not a few things. Farther still, the assemblage of many things into the one animal of the universe, and the powers in the world, whatever the number and quality of them may be, effect, in short, one thing in wholes and another in parts, on account of the divided imbecility of parts. Thus, for instance, the friendship, love, and contention which subsist in energy in the universe, become passions in the partial natures by which they are participated. Those things, likewise, that are preestablished in forms and pure reasons in the nature of wholes, participate of a certain material indigence, and privation of morphe , in things which subsist according to a part. And things which are conjoined to each other in wholes are separated in parts. Hence partible natures, which participate of wholes in conjunction with matter, degenerate from them in all things, and also from what is beautiful and perfect. But some parts are corrupted, in order that wholes may be preserved in a condition 217 conformable to nature. Sometimes, likewise, parts are compressed and weighed down, though at the same time wholes remain impassive to a molestation of this kind."

