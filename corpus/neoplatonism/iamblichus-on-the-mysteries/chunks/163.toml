body = "The fifth according to body, which is called corporeal-formed.\n\nAnd the sixth according to matter, and this is denominated material.” Olympiodorus adds, “or after another manner it may be said, that some of these are celestial, others etherial, others aerial, others aquatic, others terrestrial, and others subterranean.\n\nWith respect to this division also, it is evident that it is derived from the parts of the universe.\n\nBut irrational dæmons originate from the aerial governors, whence, also, the Chaldean Oracle says, Ηεριων ελατηρα κυνων χθονιων τε και υγρων.\n\n340 i.\n\ne.\n\nbeing the charioteer of the aerial, terrestrial, and aquatic dogs.” Our guardian dæmons, however, belong to that order of dæmons which is arranged under the Gods that preside over the ascent and descent of souls.\n\nFor a more copious account of dæmons see the notes on the First Alcibiades in vol.\n\ni.\n\nof my translation of Plato.\n\nP.\n\n22 .\n\nOne and the best solution will be obtained by surveying the mode of divine allotment.\n\nThe manner in which divine allotments subsist is admirably unfolded by Proclus in Tim.\n\np.\n\n43 , as follows: “Since, according to a division of the universe into two parts, we have distributed allotments into the celestial and sublunary, there can be no doubt what the former are, and whether they possess an invariable sameness of subsistence.\n\nBut the sublunary allotments are deservedly a subject of admiration, whether they are said to be perpetual or not.\n\nFor since all things in generation are continually changing and flowing, how can the allotments of the providential rulers of them be said to be perpetual?\n\nFor things in generation are not perpetual.\n\nBut if their allotments are not perpetual, how is it possible to suppose that divine government can subsist differently at different times?\n\nFor an allotment is neither a certain separate energy of the Gods, so that sublunary natures changing, we might say that it is exempt, and remains immutable, nor is it that which is governed alone, so that no absurdity would follow from admitting that an allotment is in a flowing condition, and is conversant with all-various mutations; but it is a providential inspection, and unrestrained government of divinity over sublunary concerns.\n\nSuch being the doubts with which this subject is attended, the following appears to be a solution of the difficulty.\n\n“We must say, then, that it is not proper to consider all the natures that are in generation, and generation itself, as alone consisting of things mutable and flowing, but that there is also something immutable in these, and which is naturally adapted to remain perpetually the same.\n\nFor the interval which receives and comprehends in itself all the parts of the world, and which has an arrangement through all bodies, is immoveable, lest, being moved, it should require another place, and thus should proceed from one receptacle to another, ad infinitum .\n\nThe etherial vehicles, also, of divine souls, with which they are circularly invested, and which imitate the lives in the heavens, have a perpetual 341 essence, and are eternally suspended from these divine souls themselves, being full of prolific powers, and performing a circular motion, according to a certain secondary revolution of the celestial orbs.\n\nAnd, in the third place, the wholeness ( ολοτης ) of the elements has a permanent subsistence, though the parts are all-variously corrupted."

