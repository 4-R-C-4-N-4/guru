[content]
body = "What then [it may be said], does not the summit of the sacrific art recur to the most principal one of the whole multitude of Gods, and at one and the same time worship the many essences and principles that are [rooted and concentred] in it? Entirely so, but this happens at the latest period, and to a very few, and we must be satisfied if it takes place when the sun of life is setting. Our present discussion, however, 264 does not ordain laws for a man of this kind; for he is superior to all law; but it promulgates a law such as that of which we are now speaking, to those who are in want of a certain divine legislation. It says, therefore, that as the world has one coarrangement from many orders, thus also it is necessary that the consummation of sacrifices, being never failing and entire, should be conjoined to the whole order of more excellent natures. If, however, the world is multiform, and all perfect, and is united from many orders, it is also necessary that sacred operations should imitate its omniform variety through the whole of the powers which they employ. Hence, in a similar manner, since the things which surround us are all-various, it is not fit that we should be connected with the divine causes 265 that preside over them, from a certain part which they contain. Nor is it proper that we should ascend imperfectly to the primordial causes of them."

