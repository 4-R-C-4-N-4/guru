[content]
body = "We shall collect, therefore, what happens from these conclusions. For if certain invocators employ the physical or corporeal powers of the universe, an involuntary gift of energy [from these powers], and which is without vice, takes place. He, likewise, who uses this gift [sometimes] perverts it to things of a contrary nature, and to base purposes. And the gift, indeed, is moved contrarily together with the passions, and sympathetically through similitude; but he who uses the thing which is imparted, deliberately draws it, contrary to justice, to what is evil and base. And the gift, indeed, causes things which are most remote to cooperate through the one harmony of the world. But if some one understanding this to be the case should iniquitously endeavour to draw certain portions of the universe to other parts, 218 these parts are not the cause of the evil that ensues; but the audacity of men, and the transgression of the order in the world, pervert things that are beautiful and legal. Hence neither do the Gods effect what appears to be base, but this is accomplished by the natures and bodies that proceed from them; nor do these very natures and bodies impart improbity from themselves, as it is thought they do; but they send their proper effluxions to places about the earth, for the salvation of wholes, and those who receive them transmute them by their commixture and perversion, and transfer what is given to a purpose different from that for which it was imparted. From all these particulars, therefore, it is demonstrated that a divine nature is not the cause of evils and unjust deeds."

