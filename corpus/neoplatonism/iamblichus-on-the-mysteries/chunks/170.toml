body = "the connective, perfective, demiurgic, assimilative, and such others as are celebrated posterior to these; so that all are in all, and yet each is at the same time separate and distinct.\n\n“Indeed we obtain this knowledge of their union and characteristics from the natures by which they are participated.\n\nFor, with respect to the visible Gods, we say that there is one soul of the sun, and another of the earth, directing our attention to the visible bodies of these divinities, which possess much variety in their essence, powers, and dignity among wholes.\n\nAs, therefore, we apprehend the difference of incorporeal essences from sensible inspection, in like manner from the variety of incorporeal essences, we are enabled to know something of the unmingled distinction of the first and superessential unities, and of the characteristics of each.\n\nFor each unity has a multitude suspended from its nature, which is either intelligible alone; or intelligible, and at the same time intellectual; or intellectual alone; and this last is either participated, or not participated; and this again, is either supermundane, or mundane.\n\nAnd thus far does the progression of the unities extend.” Shortly after he adds, “As trees by their extremities are rooted in the earth, and through this are earthly in every part, in the same manner divine natures are rooted by their summits in the one , and each is a unity and one , through its unconfused union with the one itself .” See more on this most important of all subjects in the notes to my translation of the Parmenides.\n\nP.\n\n50 .\n\nFor as in all other things, such as are principal, primarily begin from themselves, &c.\n\nHence every God begins his own energy from himself, which Proclus thus demonstrates in Prop.\n\n131 of his Elements of Theology.\n\n“For every God first exhibits the peculiarity of his presence with secondary natures in himself; because he imparts himself to other things also according to his own exuberant plenitude.\n\nFor neither is deficiency adapted to the Gods, nor fulness alone.\n\nFor every thing deficient is imperfect, and not being itself perfect, it is impossible it should make another thing to be perfect.\n\nBut that which is full is alone sufficient to itself, and is not yet prepared to communicate.\n\nIt is necessary, therefore, that the nature which fills other things, and which extends to other things the communications of itself, should be superplenary, 350 or exuberantly full.\n\nHence, if a divine nature fills all things from itself with the good which it contains in itself, it is exuberantly full.\n\nAnd if this be the case, establishing first in itself the peculiarity which it imparts to others, it will extend to them the communications of superplenary goodness.\n\nP.\n\n59 .\n\nIt is requisite also to know what enthusiasm is, and how it is produced.\n\nThe following account of enthusiasm, and of the different kinds of mania mentioned by Plato in the Phædrus, from the Scholia of Hermeas on that dialogue, is extracted from the additional notes to my translation of Proclus on the Timæus, and is given in this place for the sake of the Platonic English reader, who may not have that translation in his possession, as a valuable addition to what is here said by Iamblichus on this subject.\n\n“Since Plato here delivers four kinds of mania, by which I mean enthusiasm, and possession or inspiration from the Gods, viz."

