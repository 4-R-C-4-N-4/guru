[content]
body = "After these things, you again subjoin another division for yourself, “ in which you separate the essences of the more excellent genera by the difference of passive and impassive .” But neither do I admit this division.\n\nFor no one of the more excellent genera is passive, nor yet impassive in such a way as to be contradistinguished from that which is passive; nor is naturally adapted to receive passions, but liberated from them through virtue, or some other worthy condition of being.\n\nBut because they are entirely exempt from the contrariety of action and passion; and because they are not at all adapted to suffer, and have essentially an 49 immutable firmness, on this account I place the impassive and the immutable in all the divine genera.\n\nFor consider, if you are willing, the last of divine natures, viz.\n\na soul purely liberated from bodies.\n\nWhat does such a soul want with the generation which is in pleasure, or the restitution which is in it to a natural condition, since such a soul is above nature, and lives an unbegotten life?\n\nWhy, also, should it participate of the pain which leads to corruption and dissolves the harmony of the body, since it is beyond all body, and the nature which is divided about body, and is entirely separate from the harmony which descends from the soul into the body?\n\nBut neither is it in want of the passions which precede sensation: for neither is it detained in body, nor inclosed by it, so as to require corporeal organs, in order to apprehend certain other bodies which are external to these organs.\n\nAnd, in short, being impartible, and abiding in one and the same form, and also being essentially incorporeal, and having no communication with a generated and passive body, it cannot suffer any thing either according to division, or according to a change in quality, nor can have any thing which is allied to any kind of mutation or passion.\n\nBut neither does the [rational] soul, when it 50 accedes to body, either itself suffer, or the reasons which it imparts to the body.\n\nFor these reasons are forms , and being simple and uniform, they receive no perturbation in themselves, and no departure from their proper mode of subsistence.\n\nThat which remains, therefore [or the participant of the rational soul], becomes the cause of suffering to the composite.\n\nCause, however, is not the same with its effect.\n\nHence, as soul is the first origin of generable and corruptible composite animals, but is itself by itself ingenerable and incorruptible; thus, also, though the participants of the soul suffer, and do not wholly [ i.\n\ne.\n\ntruly] possess life and existence, but are complicated with the indefiniteness and diversity of matter, yet the soul is itself by itself immutable, as being essentially more excellent than that which suffers, and not as possessing impassivity, in a certain deliberate choice, which verges both to the impassive and the passive, nor as receiving an adscitious immutability in the participation of habit or power.\n\nSince, therefore, we have demonstrated that it is impossible for even the last genus of the more excellent order of beings, viz.\n\nthe soul, to participate of suffering, how can it be proper to adapt this participation to dæmons and heroes, who are perpetual, and the attendants 51 of the Gods, and who always invariably preserve the same divine order, and never desert it?\n\nFor we know this indeed, that passion is something disorderly, confused, and unstable, never having any proper authority of its own, but being devoted to that by which it is detained, and to which it is subservient for the purposes of generation."

