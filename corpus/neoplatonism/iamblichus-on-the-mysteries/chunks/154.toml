[content]
body = "It now remains, in the last place, that we should speak concerning felicity, about which you make various inquiries, first of all proposing objections, afterwards doubting, and then interrogating. Adducing, therefore, all that is said by you, we shall answer it appropriately. You inquire, then, “ whether there is not some other latent way to felicity .” But how, in that path which recedes from the Gods, is it probable there can be an ascent to felicity? For if the essence and perfection of all good are comprehended in the Gods, and the first and ancient power of them is with us priests, and if by those who similarly adhere to more excellent natures, and genuinely obtain a union with them, the beginning and end of all good is earnestly pursued; if this be the case, here the contemplation of truth, and the possession 328 of intellectual science are to be found. [148] And a knowledge of the Gods is accompanied with a conversion to, and the knowledge of, ourselves."

