[content]
body = "[31] Things of this kind, therefore, are introduced for the sake of our soul, and of the diminution of the evils which adhere to it 55 through generation, and of a solution and liberation from its bonds.\n\nOn this account, also, they are very properly called by Heraclitus remedies , as healing things of a dreadful nature, and saving souls from the calamities with which the realms of generation are replete."

