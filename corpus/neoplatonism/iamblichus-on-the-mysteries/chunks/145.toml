[content]
body = "In the next place, here also you appear to me to have cut off only a certain small part of the discussion concerning the peculiar dæmon. For since it is usual with those who artificially operate about nature to invoke this dæmon in an orderly manner from the decans, from the dispensators of influxes, from the signs of the zodiac, the stars, the sun and moon, from the greater and lesser bear, from the whole elements, and from the world, this being the case, you do not act rightly in assuming one, and that the smallest part of all these, viz. the lord of the geniture, and making your inquiries about this alone. Here, likewise, again from one of the things proposed to be considered, you inquire “ how the lord of the geniture gives the peculiar dæmon, and according to what kind of efflux, or life, or power, it descends to us from him .” You also speak concerning the calculation of nativities, and ask “ whether there is any reality in it or not ;” and likewise concerning the invention of the lord of the geniture, “ whether it is impossible to be found, or possible .” In what respect, however, do these things pertain to the domination of the dæmon? For it is evident that our knowledge 315 of the manner in which he subsists, contributes nothing to his essence and the cause of his existence. For in things which belong to the empire of nature, such as are generated in the universe have a proper stability of their own essence, though we should be ignorant how they are produced. In this way, therefore, we reply in common to your doubts. But directing our attention particularly to the subjects of your inquiry, we shall endeavour to give you solutions of them."

