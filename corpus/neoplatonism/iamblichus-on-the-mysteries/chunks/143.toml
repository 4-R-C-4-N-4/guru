[content]
body = "What then, is it not possible for a man to liberate himself [from fate] through the Gods that revolve in the heavens, and to consider the same as the leaders of fate, and yet as 311 those that bind our lives with indissoluble bonds? Perhaps nothing prevents this from being the case. For if the Gods comprehend in themselves many essences and powers, there are also in them other immense differences and contrarieties. Moreover, this also may be said, that in each of the Gods, though such as are visible, there are certain intelligible principles through which a liberation to souls from mundane generation is effected. But if some one leaves only two genera of Gods, viz. the mundane and supermundane, the liberation to souls will be effected through the supermundane Gods. These things, therefore, are more accurately discussed in our treatise Concerning the Gods , in which it is shown who are the anagogic Gods, and according to what kind of powers they are so; how they liberate from fate, and through what sacred regressions; and what the order is of mundane nature, and how the most perfect intellectual energy rules over this. So that what you add from Homer, “that the Gods are flexible,” it is not holy to assert. For the works of the sacred ceremonies of religion have long since been defined by pure and intellectual laws. Subordinate natures, also, are liberated through a greater order and power; and when we abandon inferior natures, we are transferred into a more excellent allotment. 312 This, however, is not effected contrary to any original sacred law, so as to cause the Gods to be changed, through a sacred operation being afterwards performed; but from the first divinity sent souls hither, in order that they might again return to him. Neither, therefore, is any mutation produced through a reascent of this kind, nor do the descents and ascents of souls oppose each other. For as generation and this universe are suspended from an intellectual essence; thus, also, in the orderly distribution of souls, the liberation from generation accords with the care employed by them about generation. 313 SECTION IX."

