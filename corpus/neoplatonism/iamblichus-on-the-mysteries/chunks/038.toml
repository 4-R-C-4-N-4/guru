[content]
body = "Moreover, the gifts arising from the manifestations are not all of them equal, nor have the same fruits. But the presence of the Gods, indeed, imparts to us health of body, virtue of soul, purity of intellect, and in one word elevates every thing in us to its proper principle. And that, indeed, in us which is cold and destructive it annihilates; that which is hot it increases, and renders more powerful and predominant; and causes all things to accord with soul and intellect. It also emits a light, accompanied with intelligible harmony, and 96 exhibits that which is not body as body to the eyes of the soul, through those of the body. The presence of archangels imparts likewise the same things, except that it does not impart them always, nor in all things, nor does it bestow goods which are sufficient, perfect, and incapable of being taken away; nor is their appearance accompanied with a light equal to that of the Gods. The presence of angels imparts divisibly still more partible goods, and the energy through which it becomes visible falls very short of comprehending in itself a perfect light. That of dæmons renders the body, indeed, heavy, afflicts with diseases, draws down the soul to nature, does not depart from bodies, and the sense allied to bodies, and detains about this terrestrial place those who are hastening to divine fire, and does not liberate from the bonds of Fate. The presence of heroes is in other respects similar to that of dæmons, but is attended with this peculiarity, that it excites to certain generous and great undertakings. The appearance which is visible by itself, of the mundane archons, imparts mundane goods, and every thing pertaining to human life; but that of the material archons extends material benefits, and such works as are terrestrial. Moreover, the vision of souls that are undefiled, and established in the order 97 of angels, is anagogic, and the saviour of the soul, is accompanied with sacred hope, and imparts those goods which sacred hope vindicates to itself. But the vision of other souls draws down to generation, corrupts the fruits of [sacred] hope, and fills the spectators with passions which fix them to body."

