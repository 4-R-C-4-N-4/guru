[content]
body = "In order, therefore, that from an abundance of arguments we may contend against the objection which is now adduced, we will grant, if you please, the contrary to what we have asserted, viz. that certain unjust things are performed in this business of invocations. That the Gods, however, are not to be accused as the causes of these is immediately manifest. For those that are good are the causes of good; and the Gods possess good essentially. They do nothing, therefore, that is unjust. Hence other causes of guilty deeds must be investigated. And if we are not able to discover these causes, it is not proper to throw away 213 the true conception respecting the Gods, nor on account of the doubts whether these unjust deeds are performed, and how they are effected, to depart from notions concerning the Gods which are truly clear. For it is much better to acknowledge the insufficiency of our power to explain how unjust actions are perpetrated, than to admit any thing impossible and false respecting the Gods; since all the Greeks and Barbarians truly opine the contrary to be the case with divine natures. After this manner, therefore, the truth respecting these particulars subsists."

