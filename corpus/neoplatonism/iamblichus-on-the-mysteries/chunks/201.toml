body = "Prior, there are three orders of dæmons, the first of which are more intellectual , the second are of a more rational nature , and the third, of which Iamblichus is now speaking, are various, more irrational, and more material .\n\n86 .\n\nCharonea is a country of Asia Minor, bordering on the river Meander; and in it there are spiracles which exhale a foul odour.\n\nAccording to Pliny, there are places of this kind in Italy, in the country of Puteoli, now Puzzulo.\n\nIn Amsanctus, also, a place in the middle of Italy, in the country of the Samnites, there were sulphureous waters, the steams of which were so pestilential, that they killed all who came near them.\n\nHence Cicero, in lib.\n\ni.\n\nDe Divin.\n\n“Quid enim?\n\nNon videmus, quam sint varia terrarum genera?\n\nEx quibus et mortifera quædam pars est, ut et Amsancti in Hirpinis, et in Asia Plutonia.” 87 .\n\nAnd these irrational spirits, so far as they contribute to wholes, are more excellent than we are, though through being irrational they are inferior to us.\n\n88 .\n\nSee the justice of providence in this respect most admirably defended by Plotinus, in the first of his treatises on Providence, which treatise forms one of the five books of Plotinus translated by me, in 8vo.\n\n1794.\n\n89 .\n\nIn the original, την ιδιαν της ψυχης αυτοπραγιαν , which Gale very inadequately translates proprium animæ officium .\n\n90 .\n\nSee my translation of Proclus on the Subsistence of Evil, at the end of my translation of his six books on the Theology of Plato.\n\n91 .\n\nSee cap.\n\n40, 41, 42, of Eunead iv.\n\nlib.\n\niv.\n\nof Plotinus, from which the doctrine of this chapter is derived.\n\n92 .\n\nAgreeably to this, Plotinus, also, in Eunead iv.\n\nlib.\n\niv.\n\ncap.\n\n32, says, παν τουτο το εν, και ως ζωον εν ζωον τε οντος, και εις εν τελουντος, ουδεν ουτω πορρω τοπου ως μη εγγυς ειναι τη του ενος ζωου προς το συμπαθειν ψυσει , i.\n\ne.\n\n“This universe is one, and is as one animal.\n\nBut being an animal and completely effecting one thing, nothing in it is so distant in place as not to be near to the nature of the one animal, on account of its sympathy with the whole of itself.” 93 .\n\nThis art is no other than magic, of which the following account, from a very rare Greek manuscript of Psellus, On Dæmons according to the Dogmas of the Greeks , will, I doubt not, be acceptable to the reader, as it illustrates what is here said by Iamblichus, and shows that magic is not an empty name, but possesses a real power, though at present this art seems to be totally lost.\n\nFicinus published some extracts from this manuscript in Latin; but Gale does not appear to have had it in his possession."

