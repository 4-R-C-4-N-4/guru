[content]
body = "Let us, however, now proceed to the appearances of the Gods and their perpetual attendants, and show what the difference is in their appearance.\n\nFor you inquire, “ by what indication the presence of a God, or an angel, or an archangel, or a dæmon, or a certain archon [i.\n\ne.\n\nruler ], or a soul, may be known .” In one word, therefore, I conclude that their appearances accord with their essences, powers, and energies.\n\nFor such as they are, such also do they appear to those that invoke them, and they exhibit energies and ideas consentaneous to themselves, and proper indications of themselves.\n\nBut that we may descend to particulars, the phasmata, or luminous appearances, of the Gods are uniform; those of dæmons are various; those of angels are more simple than those of dæmons, but are subordinate to those 86 of the Gods; those of archangels approximate in a greater degree to divine causes; but those of archons, if these powers appear to you to be the cosmocrators, who govern the sublunary element, will be more various, but adorned in order; but if they are the powers that preside over matter, they will indeed be more various, and more imperfect, than those of the archons [properly so called]; and those of souls will appear to be all-various.\n\nAnd the phasmata, indeed, of the Gods will be seen shining with salutary light; those of archangels will be terrible, and at the same time mild; those of angels will be more mild; those of dæmons will be dreadful; those of heroes (which you have omitted in your inquiry, but to which we shall give an answer for the sake of truth) are milder than those of dæmons; but those of archons, if their dominion pertains to the world, produce astonishment, but if they are material, they are noxious and painful to the spectators; and those of souls are similar to the heroic phasmata, except that they are inferior to them.\n\nAgain, therefore, the phasmata of the Gods are entirely immutable, according to magnitude, 87 morphe,[A] and figure, and according to all things pertaining to them; those of archangels approximate to those of the Gods, but fall short of the sameness of them; those of angels are subordinate to these, but are immutable; and those of dæmons are at different times seen in a different form, and appear at one time great, but at another small, yet are still recognized to be the phasmata of dæmons.\n\nMoreover, those of such archons as are leaders are immutable; but those of such as are material are multiformly changed; those of heroes are similar to those of dæmons; and those of souls imitate in no small degree the dæmoniacal mutation.\n\nFarther still, order and quiet pertain to the Gods; but with archangels, there is an efficacy of order and quiet.\n\nWith angels, the adorned and the tranquil are present, but not unattended with motion.\n\nPerturbation and disorder follow the dæmoniacal phasmata; but spectacles attend the archons, conformable to each of the particulars which we have already mentioned; the material archons, indeed, being borne along tumultuously; but those of a leading characteristic, presenting themselves to the view, firmly established in themselves.\n\nThe phasmata of heroes are subject to motion and mutation; but those of souls resemble, indeed, [Sidenote A: Morphe pertains to the colour, figure, and magnitude of superficies.] 88 the heroic, but at the same time are less than these."

