[content]
body = "The doubts also that follow in the next place require for their solution the assistance of the same divinely-wise Muse. But I am desirous, previous to this, to unfold to you the peculiarity of the theology of the Egyptians. For they, imitating the nature of the universe, and the fabricative energy of the Gods, exhibit certain images through symbols of mystic, occult, and invisible intellections; just as nature, after a certain manner, expresses invisible reasons [or productive powers] through visible forms. But the fabricative energy of the Gods delineates the truth of forms, through visible images. Hence the Egyptians, perceiving that all superior natures rejoice in the similitude to them of inferior beings, and thus wishing to fill the latter with good, through the greatest possible imitation of the former, very properly exhibit a mode of theologizing adapted to the mystic doctrine concealed in the symbols. 285"

