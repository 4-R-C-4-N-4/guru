[content]
body = "Omitting, therefore, these things, we may reasonably adduce a second cause, assigned by you, of the above mentioned particulars: viz. “ that the soul says and imagines these things, and that they are the passions of it, excited from small incentives .” Neither, however, does nature possess these passions, nor does reason admit them. For every thing which is generated is generated from a certain cause, and that which is of a kindred nature derives its completion from a kindred nature. But a divine work is neither casual, for a thing of this kind is without a cause, and is not entirely arranged, nor is it produced by a human cause. For this is a thing foreign and subordinate; but that which is more perfect cannot be produced from the imperfect. All works, 170 therefore, which have a similitude to divinity germinate from a divine cause. For the human soul is contained by one form, and is on all sides darkened by body, which he who denominates the river of Negligence, or the water of Oblivion, or ignorance and delirium, [80] or a 171 bond through passions, [81] or the privation of life, or some other evil, will not by such appellations sufficiently express its turpitude. How, therefore, is it possible that the soul, which is detained by so many evils, can ever become sufficient to an energy of this kind? It is, indeed, by no means reasonable to suppose that she can. For if at any time we appear to be capable of effecting this, it is alone through participating of, and being illuminated by, the Gods, that we enjoy the divine energy. Hence the soul does not participate of divine works, so far as she possesses her own proper virtue and wisdom; though if works of this kind pertained to the soul, every soul would perform them, or that soul alone which possessed its proper perfection. Now, however, neither of these is sufficiently prepared for this purpose; but even the perfect soul is imperfect as with reference to divine energy. The theurgic energy, 172 therefore, is a different thing, and the felicitous accomplishment of divine works is imparted by the Gods alone. For if this were not the case, the worship of the Gods would not, in short, be requisite, but divine goods might be present with us from ourselves, without the exercise of religion. If, therefore, these opinions are insane and stupid, it is proper to abandon an hypothesis of this kind, as not affording a cause which deserves to be mentioned of the accomplishment of divine works."

