[content]
body = "And secondary genera, indeed, remain with invariable sameness in the one of such as are primary; but the primary impart from themselves union to the secondary genera, and all of them possess in each other the communion of an indissoluble connexion.\n\nFrom this cause, therefore, the perfectly incorporeal Gods are united to the sensible Gods that have bodies.\n\nFor the visible Gods also are external to bodies, and on this account are in the intelligible world; and the intelligible Gods, through their infinite union, comprehend in themselves the visible Gods; and both are established according to a common union and one energy.\n\nIn a similar manner, also, this is the illustrious prerogative of the cause and orderly distribution of the Gods, on which account the same union of all the divinities extends from on high, as far as to the end of the divine order.\n\nBut if this deserves to be doubted, the contrary would be wonderful, viz.\n\nthat there should not be this union of the visible and intelligible Gods.\n\nAnd thus much concerning the contact with, and establishment of, the sensible in the intelligible Gods.\n\n76"

