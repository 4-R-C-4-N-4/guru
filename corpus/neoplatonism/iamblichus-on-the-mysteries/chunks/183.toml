body = "Cathartic virtue, therefore, alone must be called the salvation of souls; since this cuts off, and vehemently obliterates, material natures, and the passions which adhere to us from generation; separates the soul and leads it to intellect; and causes it to leave on earth the vehicles with which it is invested.\n\nFor souls in descending receive from the elements different vehicles, aerial, aquatic, and terrestrial; and thus at last enter into this gross bulk.\n\nFor how, without a medium, could they proceed into this body from immaterial spirits?” THE END.\n\n366 Printed by Ballantyne, Hanson & Co.\n\nEdinburgh and London 1 .\n\nAccording to this theology, as I have elsewhere shown, in every order of things, a triad is the immediate progeny of a monad.\n\nHence the intelligible triad proceeds immediately from the ineffable principle of things.\n\nPhanes, or intelligible intellect, who is the last of the intelligible order, is the monad, leader, and producing cause of a triad, which is denominated νοητος και νοερος , i.\n\ne.\n\nintelligible, and at the same time intellectual .\n\nIn like manner the extremity of this order produces immediately from itself the intellectual triad, Saturn, Rhea, and Jupiter.\n\nAgain, Jupiter, who is also the Demiurgus, is the monad of the supermundane triad.\n\nApollo, who subsists at the extremity of the supermundane order, produces a triad of liberated Gods.\n\n( Θεοι απολυτοι.\n\n) And the extremity of the liberated order becomes the monad of a triad of mundane Gods.\n\nThis theory, too, which is the progeny of the most consummate science, is in perfect conformity with the Chaldean theology.\n\nAnd hence it is said in one of the Chaldean oracles, “ In every world a triad shines forth, of which a monad is the ruling principle .” ( Παντι γαρ εν κοσμῳ λαμπει τριας ης μονας αρχει ).\n\nI refer the reader, who is desirous of being fully convinced of all this, to my translation of Proclus on the Theology of Plato.\n\n2 .\n\nViz.\n\nThe Philosophical Works of Proclus, together with those of Plotinus, Porphyry, Iamblichus, Syrianus, Ammonius, Damascius, Olympiodorus, and Simplicius.\n\n3 .\n\nΕνα ιδοις αν εν πασα γῃ ομοφωνον νομον και λογον, οτι θεος εις παντων βασιλευς και πατηρ, και θεοι πολλοι, θεου παιδες, συναρχοντες θεῳ.\n\nταυτα και ο ελλην λεγει, και ο βαρβαρος λεγει, και ο ηπειρωτης και ο θαλαττιος, και ο σοφος και ο ασοφος."

