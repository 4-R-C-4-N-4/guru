[content]
body = "Of the extremes, therefore, one is supreme, transcendent, and perfect; but the other is last in dignity, deficient, and more imperfect. And the former, indeed, is capable of accomplishing all things at once, uniformly in an instant; but the latter is neither able to effect all things, nor at once, nor suddenly, nor impartibly. The former also generates and governs all things, without being inclined towards them; but the latter is naturally disposed to verge, and be converted to the things which it generates and governs. And the former, indeed, as primordial and cause, precedes all things in power; but the latter, being suspended from the will of the Gods, as from a cause, is from eternity consubsistent with it. The former, likewise, according to one vigorous acme, comprehends the ends of all energies and essences; but the latter passes from some things to others, 37 and proceeds from the imperfect to the perfect. Farther still, to the former that which is highest and that which is incomprehensible pertain, and also that which is better than all measure, and is in such a manner formless, as not to be circumscribed by any form; but the latter is vanquished by inclination, habitude, and propensity; and is detained by appetites directed to that which is less excellent, and by familiarity with secondary natures. Hence, in the last place, it is formalized by all-various measures derived from them. Intellect, therefore, which is the leader and king of all beings, and which is the demiurgic art of the universe, is always present with the Gods with invariable sameness, perfectly, and without indigence, being purely established in itself, according to one energy. But soul participates of a partible and multiform intellect, having its attention directed to the government of the whole. It also providentially attends to inanimate natures, becoming at different times ingenerated in different forms. From the same causes, therefore, order and beauty itself are consubsistent with the more excellent genera; or, if some one had rather admit it, the cause of these is consubsistent with them. But with soul, the participation of intellectual order and divine beauty is always present. And with the former, indeed, the 38 measure of wholes, or the cause of this, perpetually concurs. But soul is terminated by the divine boundary, and participates of this in a partible manner. To the former, also, empire over all beings, through the power and domination of cause, may be reasonably ascribed. But soul has certain distinct boundaries, as far as to which it is able to have dominion. Such, therefore, being the different peculiarities in the extremes, it will not be difficult to understand what we have now said, and to perceive the middle peculiarities of dæmons and heroes, which are allied to each of the extremes, possessing a similitude, to each, departing from both to the medium, and embracing a concordant communion comingled from them, and connected with it in appropriate measures. Such, therefore, must be conceived to be the peculiarities of the first divine genera."

