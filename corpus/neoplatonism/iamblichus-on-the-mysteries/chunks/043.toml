[content]
body = "For if these are not true, but other things are so which have a real existence, thus also in the appearances of spirits, they seem to be such as things which are true beings; at the same time they participate of falsehood and deception, in the same manner as the forms which present themselves to the view in mirrors; and thus vainly attract the mind about things which never take place in any of the more excellent genera.\n\nThese phantasms, likewise, will consist in deceptive perversions.\n\nFor that which is an imitation of [real] being, and is an obscure assimilation, and becomes the cause of deception, pertains to no one of the true and clearly existing genera.\n\nBut the Gods, indeed, and those powers that follow the 107 Gods, reveal true images of themselves, but by no means extend phantasms of themselves, such as exist in water, or in mirrors.\n\nFor on what account should they exhibit these?\n\nShall we say, as bringing with them an indication of their own essence and power?\n\nThis, however, is by no means the case.\n\nFor these phantasms become the cause of deception to those that believe in them, and withdraw the spectators from the true knowledge of the Gods.\n\nShall we say, then, that it is because they afford a certain utility to those that behold them?\n\nBut what advantage can be derived from falsehood?\n\nIf, therefore, this is not the case, may it not be natural to divinity to extend a phantasm from itself?\n\nBut how can that which is firmly established in itself, and which is the cause of essence and truth, produce in a foreign seat a certain deceitful imitation of itself?\n\nBy no means, therefore, does divinity either transform himself into phantasms, nor extend these from himself to other things, but emits, by illumination, true representations of himself, in the true manners of souls.\n\nConformably to this, also, the attendants of the Gods are emulous of the self-visible truth of the Gods.\n\nBut that which you now say, “ that it is common to Gods and dæmons, and the rest of the more excellent genera, to produce fictitious images, and to speak boastingly 108 of themselves ,” confounds all the genera of superior beings in each other, and leaves no difference whatever between them.\n\nFor thus all things will be common to them, and nothing singularly excellent will be given to transcendent natures.\n\nIt will, therefore, be more just to ask, in opposition to you, in what will the genus of the Gods be superior to that of dæmons?\n\nThese genera, however, have nothing in common, nor is the communion between them phantastic, nor is it fit from such natures as are last, and from the errors which take place in them, to estimate first essences, and the true impressions of forms which are in them.\n\nFor by thus thinking concerning these essences, we shall think justly, and in a way pleasing to the Gods."

