body = "De Abstinentia, “to be a lover of truth, an accurate writer, and very conversant with the Stoic philosophy.” Τοιαυτα μεν τα κατ’ Αιγυπτιους υπ’ ανδρος φιλαληθους τε και ακριβους, εντε τοις Στωϊκοις πραγματικωτατα φιλοσοφησαντος μεμαρτυρημενα.\n\n138 .\n\nThis was the ninth king in the twenty-sixth dynasty of the Saitan kings.\n\n139 .\n\nThis city is mentioned by Plato in the Timæus, who represents Critias as saying “that there is a certain region of Egypt, called Delta, about the summit of which the streams of the Nile are divided, and in which there is a province called Saitical.” He adds, “of this province the greatest city is Saïs, from which also King Amasis derived his origin.\n\nThe city has a presiding divinity, whose name is, in the Egyptian tongue, Neith, but in the Greek Athena, or Minerva.” It is singular that Gale, who is not deficient in philology, though but a smatterer in philosophy, should have omitted to remark in his notes this passage of Plato.\n\n140 .\n\nProclus, in MS.\n\nComment, in Alcibiad.\n\ncites one of the Chaldean oracles, which says, —— πορθμιον ουνομα το δ’ εν απειροις Κοσμοις ενθρωσκον.\n\ni.\n\ne.\n\n“There is a transmitting name which leaps into the infinite worlds.” And in his MS.\n\nScholia in Cratyl.\n\nhe quotes another of these oracles, viz.\n\nΑλλα εστιν ουνομα σεμνον ακοιμητῳ στροφαλιγγι, Κοσμοις ενθρωσκον, κραιπνην δια πατρος ενιπην.\n\ni.\n\ne.\n\n“There is a venerable name with a sleepless revolution, leaping into the worlds through the rapid reproofs of the father.” 141 .\n\nFor εχεται in this place, I read περιεχεται .\n\n142 .\n\nGale, in his translation of this part, has entirely mistaken the meaning of Iamblichus, which he frequently does in other places.\n\nFor the words of Iamblichus are, οταν γαρ δη τα βελτιονα των εν ημιν ενεργῃ, και προς τα κρειττονα αναγεται αυτης η ψυχη ; and the version of Gale is “quando enim pars nostri melior operari incipiat, et ad sui portionem meliorem recolligatur anima.” For τα κρειττονα is not the better part of the soul; but when the better parts of the soul energize, the soul is then intimately converted to itself, and through this conversion is elevated to superior natures.\n\n143 .\n\nViz.\n\nThe science of calculating nativities.\n\n144 .\n\ni.\n\ne."

