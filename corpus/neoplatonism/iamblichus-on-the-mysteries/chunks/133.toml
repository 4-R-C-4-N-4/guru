[content]
body = "Since, however, every part of the heavens, every sign of the zodiac, [123] all the motion of the heavens, every period of time according to which the world is moved, and all things contained in the wholes of the universe, receive the powers which descend from the sun, some of which are complicated with these wholes, but others transcend a commixture with them, the symbolical mode of signification represents these also, indicating “ that the sun is diversified according to the signs of the zodiac, and that every hour he changes his form .” At the same time, also, it indicates his immutable, stable, never failing, and at once collected communication of good to the whole world. But since the recipients of the impartible gift of the God are variously affected towards it, and receive multiform powers, from the sun, according to their peculiar motions, hence the symbolical doctrine evinces through the multitude of the gifts, that the God is one, and exhibits his one power through multiform powers. Hence, likewise, it says that he is one and the 289 same, but that the vicissitudes of his form, and his configurations, must be admitted to exist in the recipients. On this account it asserts “that he is changed every hour, according to the signs of the zodiac,” in consequence of these being variously changed about the God, according to the many modes by which they receive him. The Egyptians use prayers to the sun, conformable to these assertions, not only in visions which are seen by the bodily eyes, but also in their more common supplications, all which have such a meaning as this, and are offered to the God conformably to a symbolic and mystic doctrine of this kind. Hence it would not be reasonable in any one to undertake a defence of them."

