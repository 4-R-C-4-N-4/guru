[content]
body = "Thus, for instance, if the allotment of the soul was as far as to philosophy, the soul would be able, though it should not choose a philosophic but some other life, to energize in that life somewhat philosophically.\n\nThere are also said to be certain supermundane souls.\n\nAnd thus we have shown how the soul energizes enthusiastically.\n\nBut how are statues said to have an enthusiastic energy?\n\nMay we not say, that a statue being inanimate, does not itself energize about divinity, but the telestic art, purifying the matter of which the statue consists, and placing round it certain characters and symbols, in the first place renders it, through these means, animated, and causes it to receive a certain life from the world; and, in the next place, after this, it prepares the statue to be illuminated by a divine nature, through which it always delivers oracles, as long as it is properly adapted.\n\nFor the statue, when it has been rendered perfect by the telestic art, remains afterwards [endued with a prophetic power] till it becomes entirely unadapted to divine illumination; but he who receives the inspiring influence of the Gods receives it only at certain times, and not always.\n\nBut the cause of this is, that the soul, when filled with deity, energizes about it.\n\nHence, in consequence of energizing above its own power, it becomes weary.\n\nFor it would be a God, and similar to the souls of the stars, if it did not become weary.\n\nBut the statue, conformably to its participations, remains illuminated.\n\nHence the inaptitude of it entirely proceeds into privation, unless it is again, de novo , perfected and animated by the mystic operator.\n\nWe have sufficiently shown, therefore, that enthusiasm, properly so called, is effected about the one of the soul, and that it is an illumination of divinity.\n\n354 “In the next place, let us discuss the order and the use of the four manias, and show why the philosopher makes mention of these alone.\n\nIs it because there are no other than these, or because these were sufficient for his purpose?\n\nThat there are, therefore, many other divine inspirations and manias Plato himself indicates as he proceeds, and prior to this, he makes mention of the inspiration from the Nymphs.\n\nBut there are also inspirations from Pan, from the mother of the Gods, and from the Corybantes, which are elsewhere mentioned by Plato.\n\nHere, however, he alone delivers these four manias; in the first place, because these alone are sufficient to the soul, in the attainment of its proper apocatastasis, as we shall afterwards show; and in the next place, because he delivers the proximate steps of ascent to the soul.\n\nFor the gifts of the Gods to all beings are many and incomprehensible.\n\nBut now he delivers to us the energies of the Gods which are extended to souls.\n\nHe delivers, however, these four manias, not as if one of them was not sufficient, and especially the amatory, to lead back the soul to its pristine felicity; but at present the series and regular gradation of them, and the orderly perfection of the soul, are unfolded."

