[content]
body = "Concerning another kind of divination, also, you say as follows: “ Others who are conscious what they are doing in other respects, are divinely inspired according to the phantastic part, some indeed receiving darkness for a cooperator, others certain potions, but others in cantations and compositions. And some energize according to the imagination through water, others in a wall, others in the open air, 151 and others in the light of the sun, or some other celestial body. ” The whole, however, of this kind of divination of which you now speak, since it is multiform, may be comprehended in one power, which may be called the eduction of light. But this illuminates with divine light the etherial and luciform vehicle with which the soul is surrounded, from which divine visions occupy our phantastic power, these visions being excited by the will of the Gods. For the whole life of the soul and all the powers that are in it, being in subjection to the Gods, are moved in such a way as the Gods, the leaders of the soul, please. 152 And this takes place in a twofold manner, either from the Gods being present with the soul, or imparting to the soul from themselves a certain forerunning light; but, according to each of these modes, the divine presence and the illumination have a separate subsistence. The attentive power, therefore, and dianoia of the soul, are conscious of what is effected, since the divine light does not come into contact with these; but the phantastic part is divinely inspired, because it is not excited to the modes of imaginations by itself, but by the Gods, the phantasy being then entirely changed from human custom. Since, however, a contrary is receptive of a contrary, according to a mutation and departure from itself, and that which is allied to another thing, and familiar with it through similitude, is capable of receiving it, hence the illuminators 153 receive darkness as a cooperator, and employ in illuminating the light of the sun, or of the moon, or, in short, of the air. Sometimes, likewise, they use collocations of such things as are adapted to the Gods that are about to descend, or they employ incantations or compositions, and these appropriately prepared for the reception, presence, and manifestation of the Gods. And again, sometimes they introduce light through water, because this being diaphanous, is aptly disposed to the reception of light. But at other times, they cause light to shine forth on a wall, having previously prepared the wall for the reception of light in the best manner by the sacred descriptions of characters; and, at the same time, they fix the light in a certain solid place, so that it may not be widely diffused. Many other modes, also, of introducing light might be mentioned; but all of them may be referred to one mode, that of irradiation, wherever it may be effected, and through whatever instruments the Gods may illuminate. Since, therefore, this illumination accedes externally, and has every thing which it possesses subservient to the will and intelligence alone of the Gods, and as the greatest thing pertaining to it, possesses a sacred irradiating light, either supernally derived from ether, or from the air, 154 or the moon, or the sun, or from some other celestial sphere,—this being the case, it is evident from all these particulars, that such a mode of divination as this is unrestrained, primordial, and worthy of the Gods."

