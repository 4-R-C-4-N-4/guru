body = "The German editor of these Scholia, instead of πρακτικῃ which is the true reading in this place, and which he found in the manuscript, absurdly substitutes for it πυκτικῃ , as if Hercules was a pugilist.\n\nSee my translation of the Dissertation at Maximus Tyrius, on the Practic and Theoretic Life.\n\n163 .\n\nVid.\n\nOlympiodor.\n\nin Aristot.\n\nMeteor.\n\nBOOKS PUBLISHED BY BERTRAM DOBELL In Two Volumes.\n\nPost 8vo.\n\nPrice 12s.\n\n6d.\n\nTHE POETICAL WORKS OF JAMES THOMSON (“BYSSHE VANOLIS”) Edited by BERTRAM DOBELL With a Memoir and Portraits of the Author “‘The City of Dreadful Night’ ranks with Omar Khayyam’s Rubaiyat as a lyrical expression of despair, and it strikes a deeper note.”— Daily News.\n\n“Thomson’s work ...\n\nhas intensity, it has grip, it has that power of imaginative realism which gives to conceptions, embodied in words, the arresting quality of objects present to sense....\n\nHe was a creator and a singer, and in his creation and in his song his powers were finely co-ordinated to imaginative ends.\n\nEven his most repellently pessimistic verse has the fascination of gloomy grandeur, and when, as in such poems as ‘The Happy Poet’ and ‘Sunday up the River,’ he rises into an ampler ether, a diviner air, his verse has not only the impressiveness of power, but the witchery of delight.”— Westminster Gazette.\n\n“Messrs.\n\nReeves & Turner and Mr.\n\nDobell have published in two volumes the collected works of James Thomson, the poet of that ‘melancholia which transcends all wit,’ as he terms it himself.\n\nThe sad story of his life is told with sympathy and fairness in a memoir by Mr.\n\nBertram Dobell, who has edited the work.\n\nThe pessimistic and heterodox utterances of the author of ‘The City of Dreadful Night’ were never likely to be very popular, but this excellent edition will be very welcome to many who know the strength and true poetry of many of his writings.”— Daily Telegraph.\n\nCrown 8vo, pp.\n\n334.\n\nPrice 7s.\n\n6d.\n\nTHE LIFE OF JAMES THOMSON By HENRY S.\n\nSALT WITH A PORTRAIT “Such is the story which Mr.\n\nSalt tells, and tells simply and sympathetically.\n\nHe ‘had not the advantage of personal acquaintance with James Thomson,’ but he writes as if he had.\n\nThere is a brighter side to the picture, and to this also the biographer does justice.\n\nHe throws into relief the brighter qualities of this unhappy man; his social gifts, his brilliant talk, his capacity of friendship, receptivity and humour, and above all, his popularity.\n\nWe are treated to plenty of his letters, and these really are a treat....\n\nBut whatever the demerits of Mr.\n\nSalt’s criticism, this seems certain: that the perusal of his ‘Life of James Thomson’ will prove in most cases a prelude to the perusal of James Thomson’s works.”— Scots Observer.\n\nCrown 8vo, pp.\n\n282.\n\nPrice 6s.\n\nPOEMS, ESSAYS, AND FRAGMENTS By JAMES THOMSON (“B.V.”) “Of the essays in this volume, the principal are those on Emerson, Burns, Shelley, Blake, and Walt Whitman.\n\nAll these contain solid, though unequal work,—the first named, for instance, reproducing Emerson’s peculiar staccato style too closely to be pleasant.\n\nThose on Blake and Walt Whitman are, we think, his best, though we are not sure that we agree with Mr."

