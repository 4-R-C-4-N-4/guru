[content]
body = "For how, in short, can that which is not possess in itself a certain contest [with any thing]?\n\nYou in vain, therefore, suspect things of this kind to be absurd, and you adduce doubts unworthy of the Gods, since they cannot be reasonably applied even to good men.\n\nFor no man who possesses intellect, and is free from passion, would ever permit himself to be allured by the exhalation of vapours, and much less would any one of the beings more excellent than man suffer himself to be thus allured.\n\nThese things, however, will be discussed shortly after.\n\nBut now, since this contrariety is, through many solutions, subverted, we shall here finish what we have to say about the first doubt.\n\n232"

