[content]
body = "You say, however, “ that the makers of images observe the motion of the celestial bodies, and can tell from the concurrence of what star, with a certain star or stars, predictions will be true or false; and also whether the things that are performed will be inanities, or significant and efficacious .” But neither will these phantasms, on this account, possess any thing divine. For the last of the things which are in generation are moved in conjunction with the celestial courses, and are copassive with the effluxions which descend from the heavenly bodies. Moreover, if any one considers these things accurately, he will find that they demonstrate the contrary to what is here asserted. For how is it possible that things which are in every respect mutable, and this with facility, and which are all-variously turned by external motions, so as to become inefficacious, or prophetic, or significant, or effective, or at different times different, should contain in themselves, by participation, any portion, however small, of divine power? What then, are the powers which are inherent in matter the elements of dæmons? By no means: for no partial sensible bodies generate dæmons; but much more are these 198 generated and guarded by dæmons. Neither is any man able to fashion, as by a machine, certain forms of dæmons; but, on the contrary, he is rather fashioned and fabricated by them, so far as he participates of a sensible body. But neither is a certain dæmoniacal multitude generated from the elements of sensibles; since, on the contrary, this multitude is simple, and energizes uniformly about composite natures. Hence, neither will it have sensibles more ancient, or more stable than itself; but being itself more excellent than sensibles, both in dignity and power, it imparts to them the permanency which they are able to receive. Unless indeed, you denominate idols dæmons, not rightly employing an appellation of this kind. For the nature of dæmons is one thing, and that of idols another. The order of each, likewise, is very different. Moreover, the leader of idols is different from the great leader of dæmons. And this, also, you admit. For you say, “ that no God or dæmon is drawn down by idols .” What, therefore, will be the worth of a sacred deed, or of the foreknowledge of what is future, if it is entirely destitute of divinity and a dæmon? So that it is requisite to know what the nature is of this wonder-working art, but by no means to use or confide in it. 199"

