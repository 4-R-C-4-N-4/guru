[content]
body = "112 .\n\nProclus on the First Alcibiades observes, “that about every God there is an innumerable multitude of dæmons, who have the same appellations with their leaders.\n\nAnd that these are delighted when they are called by the names of Apollo or Jupiter, because they express in themselves the characteristic peculiarity of their leading Gods.” In the same admirable commentary, also, he says, “that in the most holy of the mysteries [ i.\n\ne.\n\nin the Eleusinian mysteries], prior to the appearance of divinity, the incursions of certain terrestrial dæmons present themselves to the view, alluring the souls of the spectators from undefiled good to matter.” 113 .\n\nIt is beautifully observed by Simplicius on Epictetus, “that as if you take away letters from a sentence, or change them, the form of the sentence no longer remains, thus also in divine works or words, if any thing is deficient, or is changed, or is confused, divine illumination does not take place, but the indolence of him who does this dissolves the power of what is effected.” Ωσπερ γαρ εαν στοιχεια του λογου αφελῃς, ἢ υπαλλαξης, ουκ επιγινεται το του λογου ειδος, ουτω και των θειων εργων ἢ λογων ει ελλειπει τι, ἢ υπηλλακται, ἢ συγκεχυται, ουκ επιγινεται η του θειου ελλαμψις, αλλα και εξυδαροι την των γινομενων δυναμιν η του ποιουντος ραθυμια.\n\n114 .\n\nConformably to this, Servius, in his Annotations on the words Diique, deæque omnes— in the sixth book of the Æneid observes, “more pontificum, per quos ritu veteri in omnibus sacris post speciales Deos, quos ad ipsum sacrum, quod fiebat necesse erat invocari, generaliter omnia numina invocabantur.” i.\n\ne."

