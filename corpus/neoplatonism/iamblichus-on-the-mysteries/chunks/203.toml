[content]
body = "και αετοι μεν, και δρακοντες, βιωσιμοι αυτοις προς υγειαν υποθεσις´ αιλουροι δε και κυνες, και κορακες αγρυπνητικα συμβολα.\n\nκηρος δε και πηλος εις τας των μοριων συμπλασεις παραλαμβανονται.\n\nφανταζει δε πολλακις, και πυρος ουρανιου εδοσεις, και διαμειδιωσι επι τουτων αγαλματα· πυρί δε αυτοματῳ λαμπαδες αναπτονται .\n\ni.\n\ne.\n\n“ Goeteia , or witchcraft , is a certain art respecting material and terrestrial dæmons, whose images it causes to become visible to the spectators of this art.\n\nAnd some of these dæmons it leads up, as it were from Hades, but others it draws down from on high; and these, too, such as are of an evil species.\n\nThis art, therefore, causes certain phantastic images to appear before the spectators.\n\nAnd before the eyes of some, indeed, it pours exuberant streams; but to others it promises freedom from bonds, delicacies, and favours.\n\nThey draw down, too, powers of this kind by songs and incantations.\n\nBut magic , according to the Greeks, is a thing of a very powerful nature.\n\nFor they say that this forms the last part of the sacerdotal science.\n\nMagic, indeed, investigates the nature, power, and quality of every thing sublunary; viz.\n\nof the elements, and their parts, of animals, all-various plants and their fruits, of stones, and herbs: and in short, it explores the essence and power of every thing.\n\nFrom hence, therefore, it produces its effects.\n\nAnd it forms statues which procure health, makes all-various figures, and things which become the instruments of disease.\n\nIt asserts, too, that eagles and dragons contribute to health; but that cats, dogs, and crows are symbols of vigilance, to which, therefore, they contribute.\n\nBut for the fashioning of certain parts wax and clay are used.\n\nOften, too, celestial fire is made to appear through magic; and then statues laugh, and lamps are spontaneously enkindled.” This curious passage throws light on the following extract from the first book of the Metaphorsis of Apuleius: “Magico susurranime, amnes agiles reverti, mare pigrum colligari, ventos inanimes expirare, solem inhiberi, lunam despumari, stellas evelli, diem tolli, noctem teneri.” i.\n\ne.\n\n“By magical incantation rapid rivers may be made to run back to their fountains, the sea be congealed, winds become destitute of spirit, the sun be held back in his course, the moon be forced to scatter her foam, the stars be torn from their orbits, the day be taken away, and the night be detained.” For it may be inferred from Psellus, that witches formerly were able to cause the appearance of all this to take place."

