[content]
body = "Let us, therefore, now direct our attention to another species of divination, which is not public, but of a private nature, concerning 147 which you say, “ that some become enthusiastic by standing on characters, as those that are filled from the intromission of spirits .” This species, therefore, through those who badly use it, cannot easily be comprehended in one definition. But it is obvious and superficial, and known to many, and employs a falsehood and deception which are not to be endured; nor is it at all attended with the presence of a certain divinity, but it produces a certain motion of the soul, which is adverse to the Gods, and attracts from them an obscure and adumbrative representation, which, through the evanescent nature of its power, is usually disturbed by dæmoniacal depraved spirits. That, however, which is truly a representation of the Gods, is in other respects genuine and pure, immutable and true, and is inaccessible to, and unimpeded by, spirits of a contrary nature. For, as darkness is not adapted to sustain the splendour of the glittering light of the sun, but suddenly becomes totally invisible, entirely recedes, and immediately vanishes; thus, also, when the power of the Gods, which fills all things with good, abundantly shines forth, no place is left for the tumult of evil spirits, nor can it present itself to the view; but, as if it was nothing, it departs into nonentity, not being able to be at all moved, when more excellent natures are present, 148 or to disturb such natures in their illuminations. 149 Since, therefore, these differ so greatly, I shall not use any other indications, in order to distinguish them, than those which are adduced by you. For when you say, “ some standing on characters ,” you seem to signify nothing else than the cause of all the evils pertaining to these things. For there are some who, neglecting the whole business of the telesiurgic theory, both concerning the invoking [priest] and the inspector ( εποπτης ), and also despising the order of religion, and the most holy endurance of labours for a long time, and rejecting the sacred laws and ordinances, and other religious ceremonies, think that the standing on characters is alone sufficient, and that by doing 150 this for one hour, they can cause a certain spirit to enter; though how is it possible that any thing beautiful or perfect can be effected by these? Or how, by ephemeral works, can a contact he produced with the eternal and true essence of the Gods in sacred deeds? Through these things, therefore, it appears that such like rash men entirely err, and that they do not deserve to be ranked among diviners."

