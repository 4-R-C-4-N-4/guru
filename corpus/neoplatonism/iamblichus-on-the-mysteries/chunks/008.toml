[content]
body = "What, therefore, shall we say concerning the media? I think, indeed, that from what has been before said, they will be manifest to every one; for these give completion to the indivisible connexion of the extremes. Nevertheless, it is necessary to be more explicit. I consider, therefore, the dæmoniacal tribe to be multiplied, but, unitedly, to be comingled, but in an unmingled manner, and to comprehend all other 35 things of a subordinate nature, according to the idea of that which is more excellent. But again, the tribe of heroes supernally presides over a more obvious division and multitude, and likewise over motion, commixture, and things allied to these. It also receives gifts of a more excellent nature, concealed as it were inwardly; I mean union, purity, a firm establishment, impartible sameness, and a transcendency above other things. For one of these middle genera is proximate to the first, but the other to the last, of the extremes. But it reasonably follows, according to continuity of alliance, that the medium which begins from the most excellent natures, should proceed to such as are less excellent; but that the medium which primarily produces a contact with the last of things, should also in a certain respect communicate with the natures that transcend it. From these media, also, the completion may be seen of the first and last genera, and this entirely connascent, in a similar manner, in existence, in power, and in energy. As we have, therefore, in these two ways, perfectly completed the division of the four genera, we shall deem it sufficient in the others, to exhibit the extreme peculiarities alone, for the sake of conciseness, and because what remains, i. e. the comprehension of the media, is in a certain 36 respect evident. But the media themselves, as being known from the extremes, we shall omit; making a definition of the extremes in the shortest way, as follows."

