[content]
body = "Moreover, in the manifestations there is an indication of the order which the powers that are seen possess. For the Gods are surrounded by either Gods or angels; but archangels have angels either preceding or coarranged with them, or following them behind, or are accompanied by a certain other multitude of angels, who attend on them as guards. Angels exhibit, together with themselves, the peculiar works of the order to which they belong. Good dæmons permit us to survey, in conjunction with themselves, their own works, and the benefits which they impart; but avenging dæmons exhibit the species of punishments [which they inflict]; and such other dæmons as are depraved are surrounded by certain noxious, 98 blood-devouring, and fierce wild beasts. Archons [of the first rank] exhibit, together with themselves, certain portions of the world; but other archons attract to themselves the inordination and confusion of matter. With respect to soul, if it ranks as a whole, and does not belong to any particular species, it presents to the view a formless fire, extended through the whole world, which is indicative of the total, one, indivisible, and formless soul of the universe; but a purified soul exhibits a fiery form, and a pure and unmingled fire. Then, also, the most inward light of it is seen, and an undefiled and stable form, and it most willingly and joyfully follows its elevating leader, and unfolds, by its works, its own appropriate order. But the soul which verges downward draws along with it the signs of bonds and punishments, is heavy with material spirits, is detained by the anomalous tumults of matter, and exhibits before itself, genesiurgic presiding dæmons. And, in short, all these genera exhibit their proper orders; viz. the aerial genera exhibit aerial fire; the terrestrial 99 a terrestrial and blacker fire; and the celestial a more splendid fire. But in these three boundaries all the genera are distributed according to a triple order of beginning, middle, and end. And the Gods, indeed, exhibit the supreme and most pure causes of this triple order. But the genera of angels depend on those of archangels. The genera of dæmons appear to be subservient to those of angels; and in a similar manner to these, the genera of heroes are ministrant. They are not, however, subservient to angels in the same way as dæmons. Again, the genera of archons, whether they preside over the world or over matter, exhibit the order which is adapted to them. But all the genera of souls present themselves to the view as the last of more excellent natures. Hence, also, they exhibit places in conjunction with themselves; souls of the first rank primary, but those of the second rank secondary, places, and the rest conformably to their arrangement, in each of these three genera."

