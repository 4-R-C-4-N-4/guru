[content]
body = "Let us, therefore, pass on to the mode of divination which is effected through human art, and which possesses much of conjecture and opinion. But concerning this you say as follows: “ Some also establish the art of the investigation of futurity through the viscera, through birds, and through the stars .” And there are, indeed, many other arts of this kind, but the above are sufficient to exhibit the whole artificial species of divination. Universally, therefore, this art employs certain divine signs, which derive their completion from the Gods, according to various modes. But from divine portents, according to an alliance of things to the signs which are exhibited, art in a certain respect decides, and from certain probabilities conjecturally predicts. The Gods, therefore, produce the signs, either through nature, which is subservient both generally and particularly to the generation of effects; or through genesiurgic 155 dæmons, who presiding over the elements of the universe, partial bodies, and every thing contained in the world, conduct with facility the phænomena, conformably to the will of the Gods. But these signs symbolically premanifest the decrees of divinity and of futurity, as Heraclitus says, “neither speaking nor concealing, but signifying;” because they express the mode of fabrication through premanifestation. As, therefore, the Gods generate all things through forms , in a similar manner they signify all things through signs, impressed as it were by a seal ( δια συνθηματων ). Perhaps, likewise, they render by this mean our intelligence more acute. And thus much has been said by us in common concerning the whole of this kind of human art."

