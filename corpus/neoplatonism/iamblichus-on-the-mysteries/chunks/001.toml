[content]
body = "Hermes, the God who presides over language, was formerly very properly considered as common to all priests; and the power who presides over the true science concerning the Gods 18 is one and the same in the whole of things. Hence our ancestors dedicated the inventions of their wisdom to this deity, inscribing all their own writings with the name of Hermes. If, therefore, we participate of a portion of this God, adapted and commensurate to our powers, you do well to propose your theological doubts to the priests, as friends, and to make these doubts known to them. I also very properly conceiving that the epistle sent to my disciple Anebo was written to me, shall give you a true answer to your inquiries. For it would not be becoming, that Pythagoras and Plato, Democritus and Eudoxus, and many other of 19 the ancient Greeks, should have obtained appropriate instruction from the sacred scribes of their time, but that you who are our contemporary, and think conformably to those ancients, should be frustrated of your wish by those who are now living, and who are called common preceptors. I, therefore, thus betake myself to the present discussion; and do you, if you please, conceive that the same person to whom you sent the letter returns you an answer. Or, if it should seem fit to you, admit it to be me who discourses with you in writing, or some other prophet of the Egyptians, for this is of no consequence. Or, which I think is still better, dismiss the consideration whether the speaker is an inferior or a superior character, but direct your attention to what is said, so as readily to excite your mind to survey whether what is asserted is true or false. In the first place, therefore, we shall divide the genera of the proposed problems, in order that we may know the quantity and quality of them. And, in the next place, we shall show from what theologies the doubts are assumed, and according to what sciences they are investigated. For some things that are badly confused, require a certain distinction; others are conversant with the cause through which 20 they subsist, and are apprehended; others, which we propose according to a certain contrariety, draw our decision on both sides; and some things require from us the whole development of mystic doctrines. Such, therefore, being the nature of the subjects of discussion, they are assumed from many places, and from different sciences. For some things introduce animadversions from what the wise men of the Chaldeans have delivered; others produce objections from what the prophets of the Egyptians teach; and there are some that, adhering to the theory of philosophers, make inquiries conformably to them. There are now likewise some, that from other opinions, which do not deserve to be mentioned, elicite a certain dubitation; and others originate from the common conceptions of mankind. These things, therefore, are of themselves variously disposed, and are multiformly connected with each other. Hence, through all these causes, a certain discussion is requisite for the management of them in a becoming manner. 21"

