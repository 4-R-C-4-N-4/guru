[content]
body = "Hear, therefore, the intellectual interpretation of symbols, according to the conceptions of the Egyptians; at the same time removing from your imagination and your ears the image of things symbolical, but elevating yourself to intellectual truth. By “ mire ,” therefore, understand every thing corporeal-formed and material; or that which is nutritive and prolific; or such as the material species of nature is, which is borne along in conjunction with the unstable flux of matter; or a thing of such a kind as that which the river of generation receives, and which subsides together with it; or the primordial cause of the elements, and of all the powers distributed about the elements, and which must be antecedently conceived to exist analogous to a foundation. Being, therefore, a thing of this kind, the God who is the cause of generation, of all nature, and of all the powers in the elements, as transcending these, and as being immaterial, incorporeal, and supernatural, unbegotten and impartible, wholly derived from himself, and concealed in himself,—this God precedes all things, and comprehends all things in himself. And because, indeed, he comprehends all things, and imparts himself to all 286 mundane natures, he is from these unfolded into light. Because, however, he transcends all things, and is by himself expanded above them, on this account he presents himself to the view as separate, exempt, elevated, and expanded by himself above the powers and elements in the world. The following symbol, likewise, testifies the truth of this. For by the God “ sitting above the lotus ,” a transcendency and strength which by no means come into contact with the mire, are obscurely signified, and also indicate his intellectual and empyrean empire. For every thing belonging to the lotus is seen to be circular, viz. both the form of the leaves and the fruit; and circulation is alone allied to the motion of intellect, which energizes with invariable sameness, in one order, and according to one reason. But the God is established by himself, and above a dominion and energy of this kind, venerable and holy, superexpanded, and abiding in himself, which his being seated is intended to signify. When the God, also, is represented as “ sailing in a ship ,” [122] it exhibits to us the power which 287 governs the world. As, therefore, the pilot being separate from the ship presides over the rudder of it, thus the sun having a separate subsistence, governs the helm of the whole world. And as the pilot directs all things from the stem, giving from himself a small principle of motion to the vessel; thus, also, by a much greater priority, the God indivisibly imparts supernally from the first principles of nature, the primordial causes of motions. These particulars, therefore, and still more than these, are indicated by the God sailing in a ship. 288"

