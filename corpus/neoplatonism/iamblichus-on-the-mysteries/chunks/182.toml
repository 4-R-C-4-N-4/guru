[content]
body = "Hence some of them preside over men, others over lions or other animals, and others over plants; and still more partially, some are the inspective guardians of the eye, others of the heart, and others of the liver.” He adds, “all things, however, are full of Gods, some of whom exert their providential energies immediately, but others through dæmons as media: not that the Gods are incapable of being present to all things, but that ultimate are themselves unable to participate primary natures.” Hence it must be said that there is one principal dæmon, who is the guardian and governor of every thing that is in us, and many dæmons subordinate to him, who preside over our parts.\n\nP.\n\n134 .\n\nHence it is requisite to consider how he may be liberated from these bonds.\n\n“The one salvation of the soul herself,” says Proclus in Tim.\n\nlib.\n\nv.\n\np.\n\n330, “which is extended by the Demiurgus, and which liberates her from the circle of generation, from abundant wanderings, and an inefficacious life, is her return to the intellectual form, and a flight from every thing which naturally adheres to us from generation.\n\nFor it is necessary that the soul, which is hurled like seed into the realms of generation, should lay aside the stubble and bark, as it were, which she obtained from being disseminated into these fluctuating realms; and that purifying herself from every thing circumjacent, she should become an intellectual flower and fruit, delighting in an intellectual life, instead of doxastic nutriment, and pursuing the uniform and simple energy of the period of sameness, instead of the abundantly wandering motion of the period which is characterized by difference.\n\nFor she contains each of these circles, and twofold powers.\n\nAnd of her horses one is good, but the other the contrary [as is said in the Phædrus].\n\nAnd one of these leads her to generation, but the other from generation to true being.\n\nThe one also leads her round the genesiurgic, but the other round the intellectual circle.\n\nFor the period of the same and the similar elevates to intellect, and an intelligible nature, and to the 365 first and most excellent habit.\n\nBut this habit is that according to which the soul being winged governs the whole world, becoming assimilated to the Gods themselves.\n\nAnd this is the universal form of life in the soul, just as that is the partial form, when she falls into the last body, and becomes something belonging to an individual, instead of belonging to the universe.\n\nThe middle of these, also, is the partial universal, when she lives in conjunction with her middle vehicle, as a citizen of generation.\n\nDismissing, therefore, her first habit, which subsists according to an alliance to the whole of generation, and laying aside the irrational nature which connects her with generation, likewise governing her irrational part by reason, and extending opinion to intellect, she will be circularly led to a happy life from the wanderings about the regions of sense; which life those that are initiated by Orpheus in the mysteries of Bacchus and Proserpine, pray that they may obtain, together with the allotments of the [celestial] sphere, and a cessation of evil.\n\nBut if our soul necessarily lives well, when living according to the circle of sameness, much more must this be the case with divine souls.\n\nIt is, however, possible for our soul to live according to the circle of sameness, when purified, as Plato says."

