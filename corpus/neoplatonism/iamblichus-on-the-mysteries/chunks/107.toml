[content]
body = "It appears to me, also, that the present question errs in another respect. For it is ignorant that the offering of sacrifices through fire has the power of consuming and destroying the matter of them in a greater degree; that it assimilates this matter to itself, but is not itself assimilated to the matter; and that it elevates to divine, celestial, and immaterial fire, but does not tend downwards to matter and generation. For if the enjoyment of the vapours from matter allured dæmons, it would be requisite that the matter should be pure and entire; since thus there would be a more abundant efflux from it to its participants. But now all the matter is enkindled and consumed, and is changed into the purity and tenuity of fire; which is itself a clear indication of the contrary to what you assert. For superior beings [ i. e. dæmons] are impassive, and they are delighted to amputate matter through fire, and render us impassive. They likewise assimilate whatever is in us to the Gods, in the same manner as fire [107] assimilates all solid and resisting substances 246 to luminous and attenuated bodies. And they elevate us through sacrifices and the sacrifice fire to the fire of the Gods, in the same manner as fire elevates to fire, and draws upward gravitating and resisting substances to divine and celestial natures."

