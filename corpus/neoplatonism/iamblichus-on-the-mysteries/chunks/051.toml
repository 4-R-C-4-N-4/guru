[content]
body = "That, however, which is the greatest thing is this, that he who [appears to] draw down a certain divinity, sees a spirit descending and entering into some one, recognizes its magnitude and quality, and is also mystically persuaded and governed by it. But a species of fire is seen by the recipient, prior to the spirit being received, which sometimes becomes manifest to all the spectators, either when the divinity is descending, or when he is departing. And from this spectacle the greatest truth and power of the God, and especially the order he 125 possesses, as likewise about what particulars he is adapted to speak the truth, what the power is which he imparts, and what he is able to effect, become known to the scientific. Those, however, who, without these blessed spectacles, draw down spirits invisibly, are without vision, as if they were in the dark, and know nothing of what they do, except some small signs which become visible through the body of him who is divinely inspired, and certain other things which are manifestly seen, but they are ignorant of all the most important particulars of divine inspiration, which are concealed from them in the invisible. But to return from this digression: if the presence of the fire of the Gods, and a certain ineffable species of light, externally accede to him who is possessed, and if they wholly fill him, have dominion over and circularly comprehend him on all sides, so that he is not able to exert any one proper energy, what sense, or animadversion, or appropriate projection of intellect, can there be in him who receives a divine fire? What human motion, likewise, can then intervene, or what human reception of passion or ecstasy, or of aberration of the phantasy, or of any thing else of the like kind, such as is apprehended by the multitude, can take place? Let such, therefore, be the divine indications 126 of true inspiration from the Gods, which he who attends to will not wander from a right knowledge concerning it."

