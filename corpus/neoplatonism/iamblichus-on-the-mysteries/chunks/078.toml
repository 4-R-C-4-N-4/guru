[content]
body = "Why, therefore, does the maker of images, who effects these things, desert himself, though he is better than these images, and consists of 195 things of a more excellent nature, and confide in inanimate idols, which are inspired with the representation alone of life, contain a renovated harmony, and which is externally multiform, and are in reality diurnal? Shall we say that something genuine and true is inherent in them? Nothing, however, which is fashioned by human art is genuine and pure. But you will say, that simplicity and uniformity of energy predominate in the whole of their composition. This is very far from being the case. For the idol, according to its visible composition, is mingled from all-various and contrary qualities. Shall we say then, that a certain pure and perfect power is manifest in them? By no means. For a thing of this kind possesses an adventitious multitude of effluxions, collected from many places, and which shows itself to be imbecile and evanescent. But if these particulars, which we have enumerated, are not found to take place in images, is stability present with them, as it is said to be [by the patrons of these images]? By no means, likewise, is this the case. For these idols are extinguished with much greater rapidity than the images which are seen in mirrors. For they are immediately formed by the accession of fumigations from exhaling vapours; but when the fumigation is mingled with, and diffused through, 196 the whole air, then the idol is likewise immediately dissolved, and is not naturally adapted to remain for the smallest portion of time. Why, therefore, should the man who is a lover of truth, pay attention to these useless delusions? I, indeed, do not think them to be of any value. For if the makers of these images know that the fictions about which they are busily employed, are nothing more than the formations of passive matter, the evil arising from an attention to them will be simple. But in addition to this, these idol-makers are similar to the images in which they confide. And if they pay attention to these idols as if they were Gods, the absurdity will be so great, as neither to be effable by words, nor to be endured in deeds. For a certain divine splendour never illuminates a soul of this kind, because it is not adapted to be imparted to things which are entirely repugnant to it; neither have those things which are detained by dark phantasms a place for its reception. This delusive formation, therefore, of phantasms, will be conversant with shadows, which are very remote from the truth. 197"

