[content]
body = "The difference which separates “ Gods from dæmons by the corporeal and incorporeal ,” is the next thing that follows in what you have written; this being much more common than the former difference, and yet it is so far from expressing the peculiarities of their essence, that it does not afford a conjectural knowledge of them, nor of any accidents which pertain to them. For neither is it possible from these things to apprehend whether they are animals or not, and whether they are deprived of life, or are not at all in want of it. Farther still, neither is it easy to conjecture how these names are predicated, whether in common, or of many different things. For if in common, it is absurd that a line and time, God and dæmons, fire and water, should be under the same incorporeal genus. But if of many things, what reason is there when you speak of the incorporeal, 65 that you should rather manifest by it Gods than points; or when you speak of the corporeal, that you should not be thought to speak of the earth rather than of dæmons? For neither is this very thing defined, whether Gods and dæmons have bodies, or are carried in bodies, as in a vehicle, or use them, or comprehend them, or are alone the same with body. But, perhaps, it is not proper to examine this distinction very minutely. For you do not propose it as your own decision, but you exhibit it as the opinion of others."

