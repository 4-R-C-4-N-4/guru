[content]
body = "Moreover, with respect to the tenuity and subtilty of light, the Gods extend a light so subtle that corporeal eyes cannot sustain it, 100 but are affected in the same manner as fishes, when they are drawn upward from turbid and thick water into attenuated and diaphanous air. For men who survey divine fire are not able to breathe, through the subtilty of it, but become languid as soon as they perceive it, and are deprived of the use of their connascent spirit. Archangels, also, emit a light which is intolerable to respiration, yet their splendour is not equally pure with that of the Gods, nor similarly overpowering. The presence of angels renders the temperature of the air tolerable, so that theurgists are capable of being united to it. But when dæmons are present, the whole air is not at all affected; nor does the air, which surrounds them, become more attenuated; nor does a light precede them, in which, being previously received and preoccupied by the air, they unfold the form of themselves; nor are they surrounded by a certain splendour, which diffuses its light everywhere. When heroes appear, certain parts of the earth are moved, and sounds are heard around them; but, in short, the air does not become more attenuated, nor incommensurate to theurgists, so as to render them unable to receive it. But when archons are present, an assemblage of many luminous appearances runs round them, difficult to be borne, whether these appearances 101 are mundane or terrestrial. They have not, however, a supermundane tenuity, nor even that of the supreme elements. And to the psychical appearances the air is more allied, and, being suspended from them, receives in itself their circumscription."

