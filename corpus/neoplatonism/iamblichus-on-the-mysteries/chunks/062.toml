[content]
body = "Descending, however, to particulars, the soul of animals, the dæmon who presides over them, the air, the motion of the air, and the circulation of the heavens, variously change the viscera, 156 conformably to the will of the Gods. But an indication that they are so changed is this, that they are frequently found without a heart, or deprived of the most principal parts, without which it is not at all possible for animals to be supplied with life. With respect to birds, likewise, the impulse of their proper soul moves them, and also the dæmon who presides over animals; and, together with these, the revolution of the air, and the power of the heavens which descends into the air, accord with the will of the Gods, and consentaneously lead the birds to what the Gods ordained from the first. Of this the greatest indication is, that birds frequently precipitate themselves to the earth, and destroy themselves, which it is 157 not natural for any thing to do; but this is something supernatural, so that it is some other thing which produces these effects through birds. Moreover, the lations of the stars approximate to the eternal circulations of the heavens, not only locally, but also in powers, and the irradiations of light. But these are moved conformably to the mandates of the celestial Gods. For the most pure, agile, and supreme part of the air, is adapted to be enkindled [ i. e. is most inflammable], so that when the Gods assent, it is immediately set on fire. And if some one thinks that certain effluxions of the celestial bodies are imparted to the air, his opinion will not be discordant with what is frequently effected by the divine art. The union, also, and sympathy of the universe, and the simultaneous motion of the most remote parts, as if they were near, and belonged to one animal, cause these signs to be sent from the Gods to men in the most luminous manner, primarily, indeed, through the heavens, but afterwards through the air. From all that has been said, therefore, this becomes manifest, that the Gods, employing many instruments as media, send indications to men; and that they also use the ministrant aid of dæmons and souls, and the whole of 158 nature, and of every thing in the world which is willingly obedient to them, they being the primordial leaders of all these, and transmitting the motion which descends from them wherever they please. Hence, they being separate from all things, and liberated from all habitude and coarrangement with things in generation, lead all that generation and nature contains, according to their own proper will. This explanation, therefore, of divination accords with the doctrine of the fabricative energy and providence of the Gods. For it does not draw down the intellect of more excellent natures to sublunary concerns and to us, but this intellect being established in itself, converts to itself signs and the whole of divination, and discovers that these proceed from it."

