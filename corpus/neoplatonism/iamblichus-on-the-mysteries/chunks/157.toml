[content]
body = "Divine divination, therefore, which is conjoined with the Gods, alone truly imparts to us a divine life; since it participates of [divine] foreknowledge, and divine intellections, and renders us in reality divine. It likewise causes us to be genuine participants of the good , because 331 the most blessed intellectual perception of the Gods is filled with all good. Hence those who possess this divination “ do not ,” as you conjecture, “ foresee future events, and are nevertheless unhappy .” For all divine foreknowledge is boniform. Nor “ do they foresee, indeed, what is future, but do not know how to use this knowledge properly .” For, together with the foreknowledge, they receive the beautiful itself, and true and appropriate order: and utility is also present with it. For the Gods, in conjunction with it, deliver a transcendent power of defence against the inconveniences which accede from nature. And when it is necessary to exercise virtue, and the ignorance of future events contributes to this, then the Gods conceal what will be for the sake of rendering the soul better. But when the ignorance of what is future does not at all contribute to this, and foreknowledge is advantageous to souls, for the sake of their salvation and reascent [to divinity], then the Gods insert the foreknowledge which pertains to divination in the penetralia of the essences of souls. 332"

