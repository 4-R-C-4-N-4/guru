[content]
body = "After this, you again resume the same inquiries, of which what has been already said may be considered as a sufficient solution. Since, however, it is necessary, according to the proverb, frequently to speak of and consider things that are beautiful, neither shall we pass over these particulars, as if they had been now sufficiently answered, but by repeatedly discussing them we may, perhaps, obtain from all of them a certain perfect and great scientific good. For you doubt “ what it is which distinguishes dæmons from the visible and invisible Gods, since the visible are conjoined with the invisible divinities .” But I, beginning from this as the first thing, shall demonstrate what it is in which they differ. For, because the visible are united to the intelligible Gods, and have the same idea with them, but dæmons are far distant from them, according to essence, and scarcely adumbrate them through similitude, on this account they are separated from the visible Gods; and they differ from the invisible Gods, according to the difference itself of the invisible. For dæmons, indeed, are invisible, 77 and by no means to be apprehended by sense; but the Gods transcend rational knowledge and material intelligence. And, because they are unknown and unapparent to these, they are thus denominated; but are said to be invisible in a way very different from that in which this is asserted of dæmons. What, therefore, have the invisible Gods, so far as they are invisible, more excellent than the visible Gods? Nothing. For that which is divine, wherever it may be, and whatever allotment it may possess, has the same power and dominion over all the natures that are arranged under it. Moreover, though the invisible Gods should become visible, yet they rule over invisible dæmons. For neither the place, which is the recipient of divinity, nor a certain part of the world, produces any mutation in the dominion of the Gods. But the whole essence of the Gods remains everywhere the same, indivisible and immutable, which all subordinate beings similarly venerate, in the order assigned them by nature. By the assistance also of this reasoning, we may discover another difference between Gods and dæmons. For both the visible and invisible Gods, indeed, comprehend in themselves the whole government of whatever is contained 78 in all heaven and the world, and in the total invisible powers in the universe. But those powers that are allotted a dæmoniacal prefecture, distributing certain divisible portions of the world, govern these, and have themselves a partible form of essence and power. They are, likewise, in a certain respect, connascent with, and inseparable from, the subjects of their government. But the Gods, though they may ride in bodies, are entirely separated from them. The providential attention, therefore, to bodies, produces no diminution in those to whom body is subservient: for it is connectedly contained by a more excellent nature, is converted to it, and is not the cause of any impediment to it. But the adhering to a genesiurgic nature, and the being divided about it, necessarily give to dæmons a more subordinate condition. In short, that which is divine is of a ruling nature, and presides over the different orders of beings; but that which is dæmoniacal is of a ministrant nature, and receives whatever the Gods may announce, promptly employing manual operation, as it were, in things which the Gods intellectually perceive, wish, and command. The Gods, therefore, are liberated from the powers which verge to generation; but dæmons are not entirely purified from 79 these. And thus much concerning this distinction; and we trust, that from the former and the present exposition, the difference between Gods and dæmons will become more known."

