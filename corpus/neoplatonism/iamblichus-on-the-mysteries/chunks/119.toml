[content]
body = "The various mode, therefore, of sanctity in sacred operations partly purifies and partly perfects some one of the things that are in us or about us. And some things, indeed, it restores to symmetry and order; but others it liberates from mortal-formed error. But it renders all things familiar and friendly to all the natures that are superior to us. Moreover, when divine causes, and human preparations which are assimilated to them conspire in one and the same, then the perfection of sacred operations imparts all the perfect and great benefits of sacrifice. It will not be amiss, also, to add such particulars as the following, in order to the accurate comprehension of these things. An exuberance of power is always present with the highest causes, and at the same time that this power transcends all things, it is equally present with all with unimpeded energy. Hence, conformably to this, the first illuminate the last of things, and immaterial are present with material 266 natures immaterially. Nor should it be considered by any one as wonderful, if we say that there is a certain pure and divine matter. For matter being generated by the father and demiurgus of wholes, receives a perfection adapted to itself, in order to its becoming the receptacle of the Gods. At the same time nothing prevents more excellent beings from being able to impart their light to subordinate natures. Neither, therefore, is matter separated from the participation of better causes; so that such matter as is perfect, pure, and boniform, is not unadapted to the reception of the Gods. For, since it is requisite that terrestrial natures should by no means be destitute of divine communion, the earth also receives a certain divine portion from it, sufficient for the participation of the Gods. The theurgic art, therefore, perceiving this to be the case, and thus having discovered in common, appropriate receptacles, conformably to the peculiarity 267 of each of the Gods, it frequently connects together stones, herbs, animals, aromatics, and other sacred, perfect, and deiform substances of the like kind; and afterwards, from all these, it produces an entire and pure receptacle. For it is not proper to despise all matter, but that alone which is foreign from the Gods. But that matter is to be chosen which is adapted to them, as being able to accord with the edifices of the Gods, the dedication of statues, and the sacred operations of sacrifices. For no otherwise can a participation of superior beings be obtained by places in the earth, or by men that dwell in it, unless a foundation of this kind is first established. It is also requisite to be persuaded by arcane assertions, that a certain matter is imparted by the Gods, through blessed visions. This matter, therefore, is doubtless connascent with those by whom it is imparted. Hence, does it not follow that the sacrifice of a matter of this kind excites the Gods to present themselves to the view, immediately calls forth the participation of them, receives them when they accede, and perfectly unfolds them into light? 268"

