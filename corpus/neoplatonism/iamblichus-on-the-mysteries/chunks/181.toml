[content]
body = "ελευθεροι δε οντες υπερανω παντων, ωσπερ φυλακες και επισκοποι ακριβεις του παντος, περιεχονται τῳ νυχθημερῳ το παν.——εχουσι προς ημας την μεγιστην δυναμιν.\n\ni.\n\ne.\n\n“We say, O son, that the body [of the universe] is comprehensive of all things.\n\nConceive, therefore, this to be as it were of a circular form.——But under the circle of this body the thirty-six decans are arranged, as the media of the whole circle of the zodiac.——These, likewise, must be understood to preside as guardians over every thing in the world, connecting and containing all things——and preserving the established order of all things.——Farther still, understand, O Tat, that these decans are impassive to the things which the other stars suffer.\n\nFor neither being detained, do they stop their course, nor being impeded do they recede, nor are they, like the other stars, concealed as with a veil by the light of the sun.\n\nBut being liberated above all things, they comprehend the universe as the guardians and accurate inspectors of it, in the Nycthemeron [or the space of night and day].——They also possess, with respect to us, the greatest power.” P.\n\n125 .\n\nSo that what you add from Homer, “that the Gods are flexible,” it is not holy to assert.\n\nThe words of Homer are στρεπτοι δε τε και θεοι αυτοι , and are to be found in Iliad ix.\n\nv.\n\n493.\n\nBut when Iamblichus says, it is not holy to assert the Gods are flexible, he means that it is not holy according to the literal signification of the words; divine flexibility indicating nothing more than this, that those who through depravity were before unadapted to receive the illuminations of the Gods, and in consequence of this were subject to the power of avenging dæmons; when afterwards they obtain pardon of their guilt through prayers and sacrifices, and through methods of this kind apply a remedy to their vices, again become partakers of the goodness of the Gods.\n\nSo that divine flexibility is a resumption of the participation of divine light and goodness by those who through inaptitude were before deprived of it.\n\n364 P.\n\n130 .\n\nDæmons preside over the parts of our body.\n\nProclus in the fragments of his Ten Doubts concerning Providence, preserved by Fabricius in the eighth vol.\n\nof his Bibliotheca Græca, observes, “That the Gods, with an exempt transcendency, extend their providence to all things, but that dæmons, dividing their superessential subsistence, receive the guardianship of different herds of animals, distributing the providence of the Gods, as Plato says, as far as to the most ultimate division."

