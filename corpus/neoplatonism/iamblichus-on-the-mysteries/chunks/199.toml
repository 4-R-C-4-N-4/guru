[content]
body = "“The soul is bound to the body, by a conversion to the passions arising from her union with it.” And, “the soul binds herself in the body.” Philolaus also says, that the ancient theologists and prophets asserted, ως δια τινας τιμωριας α ψυχα τῳ σωματι συνεζευκται, και καθαπερ εν σαματι τουτῳ τεθαπται , “that the soul is conjoined to the body on account of certain punishments, and that it is buried in it as in a sepulchre.” 82 .\n\nThis assertion, that the nature which is perfectly exempt can never become one with that which departs from itself, is opposed by Gale, who says that man is composed of soul and body, and yet the latter is far inferior to, and less excellent than, the former.\n\nBut in adducing this instance, he clearly shows that he does not understand what Iamblichus says.\n\nFor the human soul being a medium between a certain impartible and partible essence, so far as it partakes of the partible essence, has a certain alliance with body, and is not perfectly exempt from it.\n\nBut this is not the case with divine inspiration and our soul: for the former in a perfectly exempt manner transcends the latter.\n\nLet it, therefore, be granted him that, as Psellus says, “hypostatic union conducts different essences or natures to one hypostasis,” yet such a union can never take place between two things, one of which has no habitude, proximity, or alliance to the other.\n\nGale was led into this mistake by not properly attending to the words perfectly exempt , το παντελως εξῃρημενον , which are here employed by Iamblichus.\n\nBut such mistakes are usual with Gale, from his inaccurate and rambling manner of thinking.\n\nHe likewise forgot, at the time he was writing notes on Iamblichus, that he was the master of a grammar school, and not a philosopher.\n\nFrom what has been said, the absurdity, also, of their opinion is immediately obvious, who fancy that the divine essence can be mingled and united with the mortal nature.\n\nFor if such a union were possible, it would benefit and exalt the latter, but injure and degrade the former.\n\nJust as in the union of the rational soul with the body (as Proclus beautifully observes in Tim.\n\np.\n\n339), “the former, by verging to a material life, kindles indeed a light in the body, but becomes herself situated in darkness; and by giving life to the body, destroys both herself and her own intellect [in as great a degree as these are capable of receiving destruction].\n\nFor thus the mortal nature participates of intellect, but the intellectual part of death, and the whole, as Plato observes in the Laws, becomes a prodigy composed of the mortal and the immortal, of the intellectual and that which is deprived of intellect.\n\nFor this physical law which binds the soul to the body is the death of the immortal life, but vivifies the mortal body.” 83 .\n\nHere again Gale, from not understanding, opposes Iamblichus.\n\nFor he says, “sed nec hoc sequitur.\n\nS.\n\nMaximus, ubi hypostaticam unionem declarat; hæc inquit, cernuntur in corpore et anima.\n\nUna ex utroque confit hypostasis composita.\n\nServat autem in se naturam perfectam utriusque sc."

