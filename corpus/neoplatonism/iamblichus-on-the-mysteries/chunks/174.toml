[content]
body = "As, therefore, it is possible for the tyrannic life, when suddenly changed, to become aristocratic, through employing strenuous promptitude and a divine allotment, but the gradual ascent is from a tyrannic to a democratic, and from this to an oligarchic life, afterwards to a timocratic, and at last to an aristocratic life, but the descent and lapse are vice versa; thus also here, the soul being about to ascend, and be restored to its former felicity, is in the first place possessed with the musical mania, afterwards with the telestic, then with the prophetic, and, in the last place, with the amatory mania.\n\nThese inspirations, however; conspire with, and are in want of, each other; so abundant is their communion.\n\nFor the telestic requires the prophetic mania; since the latter interprets many things pertaining to the former.\n\nAnd again, the prophetic requires the telestic mania.\n\nFor the telestic mania perfects and establishes oracular predictions.\n\nFarther still, the prophetic uses the poetic and musical mania.\n\nFor prophets, as I may say, always speak in verse.\n\nAnd again, the musical uses the prophetic mania spontaneously, as Plato says.\n\nBut what occasion is there to speak about the amatory and musical 355 manias?\n\nFor nearly the same persons exercise both these, as, for instance, Sappho, Anacreon, and the like, in consequence of these not being able to subsist without each other.\n\nBut it is very evident that the amatory mania contributes to all these, since it is subservient to enthusiasm of every kind: for no enthusiasm can be effected without amatory inspiration.\n\nAnd you may see how Orpheus appears to have applied himself to all these, as being in want of, and adhering to, each other.\n\nFor we learn that he was most telestic, and most prophetic, and was excited by Apollo; and besides this, that he was most poetic, on which account he is said to have been the son of Calliope.\n\nHe was likewise most amatory, as he himself acknowledges to Musæus, extending to him divine goods, and rendering him perfect.\n\nHence he appears to have been possessed with all the manias, and this by a necessary consequence.\n\nFor there is an abundant union, conspiration, and alliance with each other, of the Gods who preside over these manias, viz.\n\nof the Muses, Bacchus, Apollo, and Love.\n\n“It remains, therefore, that we should unfold the nature of each of the manias, previously observing that those which are internal, and originate from the soul itself, and give perfection to it, are of one kind; but the external energies of them, and which preserve the outward man, and our nature, are of another.\n\nThe four external, however, are analogous to the four internal manias.\n\nLet us consider, therefore, in the first place, the internal, and which alone originate from the soul itself, and let us see what they effect in the soul.\n\nIn order, likewise, that this may become manifest, and also their arrangement, let us survey from on high, the descent, as Plato says, and defluxion of the wings of the soul.\n\nFrom the beginning, therefore, and at first, the soul was united to the Gods, and its unity to their one.\n\nBut afterwards the soul departing from this divine union descended into intellect, and no longer possessed real beings unitedly, and in one, but apprehended and surveyed them by simple projections, and, as it were, contacts of its intellect."

