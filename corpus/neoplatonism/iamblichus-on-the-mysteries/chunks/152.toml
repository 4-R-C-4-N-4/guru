[content]
body = "After this, therefore, you also mention another disquisition concerning the peculiar dæmon, which represents “ some as worshiping two, but others three, dæmons of this kind .” The whole of this, however, is erroneous. For it is a false mode of proceeding to divide the causes that preside over us, and not refer them to one; since this wanders from the union which has dominion over all things. The opinion, likewise, which distributes this dæmon into body, and the government of body, draws down his domination to a certain most minute part. So that what necessity is there for those who embrace this opinion to direct their attention to sacred operations, the first principle of them being futile? There is, therefore, of each of us one peculiar presiding dæmon; but it is not proper to think that this dæmon is common to all men; nor again, that he is common, but is peculiarly present with each individual. For division, according to species and difference of matter, do not receive the communion and sameness of things essentially incorporeal. “ Why then [you say] is the peculiar dæmon invoked by a common mode by all men? ” Because the invocation of him is effected through one 325 God, who is the lord of dæmons; who from the first defined to every one his peculiar dæmon; and who, in sacred operations, unfolds to every one his proper dæmon, according to his own proper will. For always in the theurgic order secondary are invoked through primary natures. Among dæmons, therefore, one common leader of the cosmocrators about generation sends to each of us his peculiar dæmon. Hence, when the peculiar dæmon is present with each of us, he then unfolds the worship which is proper to be paid to him and his name, and likewise delivers the proper mode of invoking him."

