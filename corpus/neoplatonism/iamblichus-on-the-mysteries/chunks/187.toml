[content]
body = "The following testimony of an anonymous Greek writer, prefixed to the manuscript of this treatise, which Gale published, proves that this work was written by Iamblichus: Ιστεον οτι ο φιλοσοφος Προκλος υπομνηματιζων τας του μεγαλου Πλωτινου εννεαδας, λεγει οτι ο αντιγραφων εις την προκειμενην του Πορφυριου επιστολην, ο θεσπεσιος εστιν Ιαμβλιχος· και δια το της υποθεσεως οικειον και ακολουθον, υποκρινεται προσωπον Αιγυπτιου τινος Αβαμωνος· αλλα και το της λεξεως κομματικον και αφοριστικον, και το των εννοιων πραγματικον, και γλαφυρον, και ενθουν, μαρτυρει τον Προκλον καλως και κριναντα, και ιστορησαντα.\n\ni.\n\ne.\n\n“It is requisite to know that the philosopher Proclus, in his Commentary on the Enneads of the great Plotinus, says that it is the divine Iamblichus who answers the prefixed Epistle of Porphyry, and who assumes the person of a certain Egyptian of the name of Abammon, through the affinity and congruity of the hypothesis.\n\nAnd, indeed, the conciseness and definiteness of the diction, and the efficacious, elegant, and divine nature of the conceptions, testify that the decision of Proclus is just.” That this, indeed, was the opinion of Proclus, is evident from a passage in his Commentaries on the Timæus of Plato, which has escaped the notice of Gale, and which the reader will find in a note on the fourth chapter of the eighth section of the following translation.\n\n23 .\n\nIn the original κατα τας κοινας εννοιας , which Gale erroneously translates contra communes opiniones .\n\n24 .\n\nDamascius περι αρχων says, “that difference not existing, there will not be knowledge.” And, “that the contact as of one with one is above knowledge.” Likewise, “that the intellectual perception of the first intelligible is without any difference or distinction.\n\nετεροτητος μη ουσης, μηδε γνωσις εσται.\n\nEt συναφη ως ενος προς εν, υπερ γνωσιν .\n\nAlibi, διακριτος η του πρωτου νοητου νοησις .\n\n25 ."

