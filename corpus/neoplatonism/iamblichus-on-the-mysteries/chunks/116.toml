[content]
body = "Being impelled, therefore, from another principle, viz. from the world and the mundane Gods, from the arrangement of the four elements in the world, and the association of the elements according to [appropriate] measures, and also 259 from the orderly circulation of bodies about centres, we shall have an easy ascent to the truth of the piety respecting sacrifices. For if we are in the world, are contained as parts in the universe, are primarily produced by it, and perfected by the total powers that are in it, and if we consist of its elements, and receive from it a certain portion of life and nature; if this be the case, it is not proper to pass beyond the world and the mundane orders. We must admit, therefore, that in each part of the world there is this visible body, and that there are also incorporeal powers, which are divided about bodies. Hence the law of religion distributes similars to similars, and thus extends from on high, through wholes, as far as to the last of things; assigning, indeed, incorporeals to incorporeals, but bodies to bodies, and this commensurately to the nature of each. If, however, some theurgist should participate of the supermundane Gods, which is the rarest of all things, he, indeed, in the worship of the Gods will transcend both bodies and matter; being united to the Gods by a supermundane power. But that which happens to one person with difficulty and late, and at the end of the sacerdotal office, ought not to be promulgated as common to all men; nor ought it to be made a thing common to those who are commencing 260 theurgic operations, nor to those who have made a middle proficiency in it. For these, after a manner, pay a corporeal-formed attention to sanctity."

