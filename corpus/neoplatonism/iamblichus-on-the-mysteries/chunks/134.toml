[content]
body = "But the inquiries which follow in the next place, require a more abundant doctrine, in order to their elucidation. At the same time, however, it is necessary to discuss the truth concerning them with brevity. For you inquire “ what efficacy there is in names that are not significant .” [124] They are not, however, as 290 you think, without signification; but let them be indeed unknown to us (though some of them are known to us, the explications of which we receive from the Gods), yet to the Gods all of them are significant, though not according to an effable mode; nor in such a way as that which is significant and indicative with men through imaginations; but either intellectually, conformably to the divine intellect which is in us; or ineffably, and in a way more excellent and simple, and conformably to the intellect which is united to the Gods. It is requisite, therefore, to take away all conceptions derived by an abstraction from sensibles, and all logical evolutions from divine names; [125] and likewise the connascent physical 291 similitudes of language to things which exist in nature. But the intellectual and divine 292 symbolical character of divine similitude must be admitted to have a subsistence in names. And, moreover, though it should be unknown to us, yet this very circumstance is that which is most venerable in it, for it is too excellent to be divided into knowledge. But in those 293 names which we can, scientifically analyze, [126] we possess a knowledge of the whole divine essence, power, and order, comprehended in the name. And farther still, we preserve in the soul collectively the mystic and arcane image of the Gods, and through this we elevate the soul to the Gods, and when elevated conjoin it as much as possible with them. But you ask, “ Why, of significant names, we prefer such as are Barbaric to our own? ” Of this, also, there is a mystic reason. For because the Gods have shown that the whole dialect of sacred nations such as those of the Egyptians and Assyrians, is adapted to sacred concerns; on this account we ought to think it necessary that our conference with the Gods should be in a language allied to them. Because, likewise, such a mode of speech is the first and most ancient. And especially because those who first learned the names of the Gods, having mingled them with their own proper tongue, delivered them to us, that we might always preserve immoveable the sacred law of tradition, in a language peculiar and adapted to them. 294 For if any other thing pertains to the Gods, it is evident that the eternal and immutable must be allied to them."

