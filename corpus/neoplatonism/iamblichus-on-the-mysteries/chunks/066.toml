[content]
body = "But neither does the cause [of the energies] of more excellent natures subsist as a certain middle instrument, [77] nor does he who invokes operate through him who prophesies; for to assert these things is impious. And it is much more true to say, that God is all things, is able to effect all things, and that he fills all things with himself, and is alone worthy of sedulous attention, [78] esteem, the energy of reason, and 167 felicitous honour; that which is human being vile, of no account, and ludicrous, when compared with that which is divine. Hence I laugh, when I hear it said, that divinity is spontaneously present with certain persons or things, 168 either through the period of generation, or through other causes. For thus that which is unbegotten will no longer be more excellent, if it is led by the period of generation; nor will it be primarily the cause of all things, if it is coarranged with certain things, according to other causes. These assertions, therefore, are unworthy of the conceptions which we should frame of the Gods, and foreign from the works which are effected in theurgy. [79] But an investigation of this kind suffers the same thing as the multitude suffer, about the fabrication of the universe and providence. For not being able to learn what the mode is in which these are effected, and refusing to ascribe human cares and reasonings to the Gods, they wholly abolish the providential and fabricative energy of divinity. As, therefore, we are accustomed to answer these, that the divine mode of production and providential inspection is very different from that which is human, and which it is not proper wholly to reject through 169 ignorance, as if it had not from the first any subsistence; thus, also, it may be justly contended against you, that all prediction, and the performance of divine works, are the works of the Gods, as they are not effected through other and these human causes, but through such as are alone known to the Gods."

