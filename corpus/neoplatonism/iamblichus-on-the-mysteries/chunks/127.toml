[content]
body = "It is necessary, however, to think that the soul which uses divination of this kind, not only becomes an auditor of the prediction, but also contributes in no small degree from itself to the consummation of it, and of what pertains to its operations. For this soul is coexcited and cooperates, and at the same time foreknows, through a certain necessary sympathy. Such a mode, therefore, of divination as this is entirely different from the divine and true mode, being alone able to predict respecting small and diurnal concerns, viz. respecting such as being placed in a divided nature, are borne 279 along about generation, and which impart motions from themselves to those things that are able to receive them, and produce multiform passions in things which are naturally adapted to be copassive. Perfect foreknowledge, however, can never be effected through passion. For that which is itself especially immutable, immaterial, and entirely pure, is accustomed to apprehend the future; but that which is mingled with the most irrational and dark nature of a corporeal-formed and material essence is filled with abundant ignorance. An artificial apparatus, therefore, of this kind does not deserve to be called divination; nor is it proper to bestow much attention upon it, nor to believe in any other person who uses it, as if it possessed in itself a certain clear and known indication of truth. And thus much concerning divination of this kind."

