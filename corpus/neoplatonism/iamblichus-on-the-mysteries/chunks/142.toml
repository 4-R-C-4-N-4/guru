[content]
body = "Hence that of which you are dubious is not true, “ that all things are bound with the indissoluble bonds of Necessity ,” which we call Fate. For the soul has a proper principle of circumduction to the intelligible, and of a separation from generated natures; and also of a contact with real being, and that which is divine. “ Nor must we ascribe fate to the Gods, whom we worship in temples and statues, as the dissolvers of fate. ” For the Gods, indeed, dissolve fate; but the last natures which proceed from them, and are complicated with the generation of the world and with body, give completion to fate. Hence we very properly worship the Gods with all possible sanctity, and the observance of all religious rites, in order that they may liberate us from the evils impending from fate, as they alone rule over necessity through intellectual persuasion. But neither are all things comprehended [141] in the nature of fate, but there is another principle of the soul, which is superior to all nature and generation, and through which we are capable of being united to the Gods, of transcending 310 the mundane order, and of participating eternal life, and the energy of the supercelestial Gods. Through this principle, therefore, we are able to liberate ourselves from fate. For when the more excellent parts of us energize, and the soul is elevated to natures better than itself, [142] then it is entirely separated from things which detain it in generation, departs from subordinate natures, exchanges the present for another life, and gives itself to another order of things, entirely abandoning the former order with which it was connected."

