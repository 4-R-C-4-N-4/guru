[content]
body = "Moreover, after it has conjoined the soul to the several parts of the universe, and to the total divine powers which pass through it; then it leads the soul to, and deposits it in, the whole Demiurgus, and causes it to be independent of all matter, and to be counited with the eternal reason alone. But my meaning is, that it peculiarly connects the soul with the self begotten and self-moved God, and with the all-sustaining, intellectual, and all-adorning powers of the God, and likewise with that power of him which elevates to truth, and with his self-perfect, effective, and other demiurgic powers; so that the theurgic soul becomes perfectly established in the energies and demiurgic intellections of these powers. Then, also, it inserts the soul in the whole demiurgic God. And this is the end with the Egyptians of the sacerdotal elevation of the soul to divinity. 335"

