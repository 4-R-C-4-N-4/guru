[content]
body = "The variety, however, of such like energies, and the composition of a multitude of material powers, are not only entirely separated from divine fabrication, but also from natural production.\n\nFor nature produces her proper works collectively, and at once, and accomplishes all things by simple and incomposite energies.\n\nHence it remains that a commixture of this kind, about the last and manifest celestial effluxion, and about the things which are moved by a celestial nature, is artificial."

