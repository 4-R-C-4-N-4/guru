[content]
body = "And this order is adapted to dæmons; one part of it being allied to those that are invoked; another being derived from more ancient causes; and the third part effecting a common completion from both the others. Do not, therefore, assimilate divine invocations to such as are human, nor those that are ineffable to those that are effable; nor compare those that are prior to every boundary, and every indefinite mode, to those that are defined by men, or to indefinite actions. For our concerns have nothing 326 in common with theirs, whose whole genus and whole order transcend and govern the whole of our essence and nature. But here, especially, the greatest errors happen to men, when from human imbecility they infer any thing concerning the domination of dæmons, and from things which are small, of no worth, and distributed into parts, form a conjecture of great, excellent, and perfect natures. And thus much in answer to you concerning the peculiar dæmon, in addition to what has been before said. 327 SECTION X."

