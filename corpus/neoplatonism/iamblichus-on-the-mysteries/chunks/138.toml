[content]
body = "According to another order, however, he arranges the God Emeph prior to, and as the leader of, the celestial Gods. And he says that this God is an intellect, itself intellectually perceiving itself, and converting intellections to itself. But prior to this, he arranges the impartible one, which he says is the first paradigm, and which he denominates Eicton . In this, also, is contained that which is first intellective, and the first intelligible, and which is to be worshiped through silence alone. Besides these, also, other leaders preside over the fabrication of visible natures. For the demiurgic intellect, who is the curator of truth and wisdom, descending into generation, and leading the power; of occult reasons into light, is called in 303 the Egyptian tongue Amon; but in consequence of perfecting all things with veracity and artificially, he is called Ptha. The Greeks, however, assume Ptha for Vulcan, solely directing their attention to the artificial peculiarity of the God. So far, also, as he is effective of good he is called Osiris; and he has other appellations through other powers and energies. With the Egyptians, therefore, there is another domination of the whole elements in generation, and of the powers contained in them; four of these powers being male and four female, which they attribute to the sun. And there is, likewise, another government of the whole of nature about generation, which they assign to the moon. But dividing the heavens into two, or four, or twelve, or six-and-thirty parts, or the doubles of these, they give to the parts a greater or less number of rulers. And over all these they place one ruler, who transcends all the rest. Thus, therefore, the doctrine of the Egyptians concerning principles, proceeding from on high as far as to the last of things, begins from one principle, and descends to a multitude which is governed by this one; and every where an indefinite nature 304 is under the dominion of a certain definite measure, and of the supreme unical cause of all things. But God produced matter by dividing materiality from essentiality; and this being vital, the Demiurgus receiving, fabricated from it the simple and impassive spheres. But he distributed in an orderly manner the last of it into generable and corruptible bodies."

