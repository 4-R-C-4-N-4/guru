[content]
body = "The nature of the one , as it is all-receptive , and all-productive ( πανδεχης και παντοφυης ) exhibits in itself a certain representation and indication of multitude; for it is all things prior to all.\n\n40 .\n\nFor the Gods are essentialized in the one ; or, as Damascius observes, speaking Chaldaically, in the paternal peculiarity.\n\nFor in every God there is father, power, and intellect; father being the same as hyparxis and the one .\n\n41 .\n\nViz.\n\nAccording to the difference which there is between the invisibility of Gods and the invisibility of dæmons.\n\n42 .\n\nThe cosmocrators , or governors of the world, are the planets .\n\nSee the fourth book of my translation of Proclus on the Timæus of Plato.\n\n43 .\n\nFor πυριως in this place, I read εμπυριως .\n\nFor the empyrean world, according to the Chaldeans, is above the material worlds, and emits a supermundane fire or light.\n\n44 .\n\nFor περιουσια here, it is necessary to read παρουσια .\n\n45 .\n\nThese are terrestrial dæmons, to whom the Chaldean oracle alludes, which says, “The wild beasts of the earth shall inhabit thy vessel,” i.\n\ne.\n\nas Psellus explains it, the composite temperature of the soul.\n\n46 .\n\nFor πεπλανημενην here, it seems requisite to read πεπλασμενην .\n\nGale also, in his version, in this place has fictum.\n\n47 .\n\ni.\n\ne.\n\nThe inexplicable theurgic signs or symbols.\n\n48 .\n\nFor υπνος here, it is necessary to read αυπνος .\n\nFor Iamblichus has before shown that divine dreams are not produced in sleep, but either when sleep leaves us, or between sleeping and waking, or when we are perfectly awake.\n\nThe necessity of this emendation is also evident from what Iamblichus shortly after adds, viz.\n\nthat we must take away from divine dreams the being asleep ; i.\n\ne.\n\nthe being in a profound sleep.\n\n49 .\n\nIn the original there is nothing more than λεγουσι δε ταδε in this place; but the sense requires that we should read λεγουσι δε οι σοφοι ταδε .\n\nAnd this emendation is confirmed by the versions of Scutellius and Gale.\n\n50 .\n\nFor κατα τα μεταξυ διαλαμβανομενα κ.\n\nλ , I read μετα κ.\n\nλ .\n\n51 .\n\n“Among the deeds of Pythagoras,” says Iamblichus, in his Life of that father of philosophy, (chap.\n\nxxv.) “it is said, that once through the spondaic [ i.\n\ne.\n\nDoric] song of a piper he extinguished the rage of a Tauromenian lad, who had been feasting by night, and intended to burn the vestibule of his mistress, in consequence of seeing her coming from the house of his rival.\n\nFor the lad was inflamed and excited [to this rash attempt] by a Phrygian song; which, however, Pythagoras most rapidly suppressed."

