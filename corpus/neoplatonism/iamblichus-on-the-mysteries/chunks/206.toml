[content]
body = "But the Egyptians honoured the asp, the weasel, and the beetle, in consequence of observing in them certain dark resemblances of the power of the Gods, like that of the sun in drops of water.\n\nFor at present, many believe and assert that the weasel engenders by the ear, and brings forth by the mouth, being thus an image of the generation of reason [or the productive principle of things].\n\nBut the genus of beetles has no female; and all the males emit their sperm into a sphericle piece of earth, which they roll about, thrusting it backwards with their hind feet, while they themselves move forward; just as the sun appears to revolve in a direction contrary to that of the heavens, in consequence of moving from west to east.\n\nThey also assimilated the asp to a star, as being exempt from old age, and performing its motions, unassisted by organs, with agility and ease.\n\nNor was the crocodile honoured by them without a probable cause; but is said to have been considered by them as a resemblance of divinity, as being the only animal that is without a tongue.\n\nFor the divine reason is unindigent of voice, and proceeding through a silent path, and accompanied with justice, conducts mortal affairs according to it.\n\nThey also say it is the only animal living in water that has the sight of its eyes covered with a thin and transparent film, which descends from his forehead, so that he sees without being seen, which is likewise the case with the first God.\n\nBut in whatever place the female crocodile may lay her eggs, this may with certainty be concluded to be the boundary of the increase of the Nile.\n\nFor not being able to lay their eggs in the water, and fearing to lay them far from it, they have such an accurate presensation of futurity, that though they enjoy the benefit of the river in its access, during the time of their laying and hatching, yet they preserve their eggs dry and untouched by the water.\n\nThey also lay sixty eggs, are the same number of days in hatching them, and those that are the longest lived among them live just so many years, which number is the first of the measures employed by those who are conversant with the heavenly bodies.\n\n“Moreover, of those animals that were honoured for both reasons, we have before spoken of the dog.\n\nBut the ibis, killing indeed all deadly reptiles, was the first that taught men the use of medical evacuation, in consequence of observing that she is after this manner washed and purified by herself.\n\nThose priests, also, that are most attentive to the laws of sacred rites, when they consecrate water for lustration, fetch it from that place where the ibis had been drinking; for she will neither drink nor come near unwholesome or infected water; but with the distance of her feet from each other and her bill she makes an equilateral triangle.\n\nFarther still, the variety and mixture of her black wings about the white represents the moon when she is gibbous.\n\n“We ought not, however, to wonder if the Egyptians love such slender similitudes, since the Greeks also, both in their pictures and statues, employ many such like resemblances of the Gods.\n\nThus in Crete there was a statue of Jupiter without ears.\n\nFor it is fit that he who is the ruler and lord of all things should hear no one.\n\nPhidias also placed a dragon by the statue of Minerva, and a snail by that of Venus at Elis, to show that virgins require a guard, and that keeping at home and silence become married women.\n\nBut the trident of Neptune is a symbol of the third region of the world, which the sea possesses, having an arrangement after the heavens and the air.\n\nHence, also, they thus denominated Amphitrite and the Tritons."

