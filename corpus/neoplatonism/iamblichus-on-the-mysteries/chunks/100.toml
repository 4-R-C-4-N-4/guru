[content]
body = "Your next inquiry is of greater consequence, and is concerning things of a greater nature. How, therefore, shall I be able, briefly and sufficiently, to give you an answer to a question which is extremely difficult, and requires a long explanation? Nevertheless I will answer it, and without failing in alacrity. I will also endeavour to follow what you have concisely indicated and tacitly signified. But I will unfold to you my dogma concerning sacrifices [which is as follows]. It is by no means requisite that sacrifices should be offered for the sake of honour alone, in the same manner as we honour benefactors; nor for the sake of returning thanks for the goods imparted to us by the Gods; nor yet for the sake of first fruits, or as a remuneration by certain gifts of more venerable goods bestowed on us by the Gods. For these things are also common to men, and are assumed from the common polity of mankind, but by no means preserve the transcendency of the Gods and the order of them as exempt causes. 233"

