[content]
body = "In what follows, in which you think that ignorance and deception about these things are impiety and impurity, and in which you exhort us to the true developement of these particulars, is not, indeed, attended with any ambiguity, but is acknowledged by all men.\n\nFor who will not grant that the science which apprehends real being, is most adapted to a divine cause, 109 but that ignorance which is hurried along to nonbeing, since it is most remote from a divine cause, falls off from truly existing forms?\n\nSince, however, what is said by you is not sufficient, I will add what is wanting; and because what you assert is rather philosophical and logical, than conformable to the efficacious art of priests, on this account I think it is necessary to say something more theurgical about these particulars.\n\nFor, let “ ignorance and deception be error and impiety ,” yet it does not follow that, on this account, things which are offered to the Gods, and divine works, are false.\n\nFor a conception of the mind does not conjoin theurgists with the Gods; since, if this were the case, what would hinder those who philosophize theoretically, from having a theurgic union with the Gods?\n\nNow, however, in reality, this is not the case.\n\nFor the perfect efficacy of ineffable works, which are divinely performed in a way surpassing all intelligence, and the power of inexplicable symbols, which are known only to the Gods, impart theurgic union.\n\nHence, we do not perform these things through intellectual perception; since, if this were the case, the intellectual energy of them would be imparted by us; neither of which is true.\n\nFor when we do not energize intellectually, the 110 synthemata themselves perform by themselves their proper work, and the ineffable power of the Gods itself knows, by itself, its own images.\n\nIt does not, however, know them, as if excited by our intelligence; for neither is it natural that things which comprehend should be excited by those that are comprehended, nor perfect by imperfect natures, nor wholes by parts.\n\nHence, neither are divine causes precedaneously called into energy by our intellections; but it is requisite to consider these, and all the best dispositions of the soul, and also the purity pertaining to us, as certain concauses; the things which properly excite the divine will being divine synthemata themselves.\n\nAnd thus, things pertaining to the Gods, are moved by themselves, and do not receive from any inferior nature a certain principle in themselves of their own proper energy.\n\nI have, however, been thus prolix, in order that you may not think all the authority of the energy in theurgic operations is in our power, and that you may not suppose the true work of them consists in our conceptions, or the falsehood of them in our deception.\n\nFor though we may know the peculiarities which are consequent to each genus, yet we may not obtain 111 the truth which is in their works.\n\nNevertheless, efficacious union [with divine natures] is not effected without knowledge; yet knowledge does not possess a sameness with this union.\n\nSo that neither is divine purity obtained through right knowledge, as neither is purity of body procured through health; but divine purity is more undefiled than knowledge, and is more transcendently united.\n\nHence neither this, nor any thing of the like kind which is in us, and is human, cooperates any thing to the end of divine actions.\n\nAccept, therefore, this, which is said indeed incidentally, but is a sufficient reply to the whole of your conception concerning the theurgic art."

