[content]
body = "In the next place, departing from intellect, and descending into reasoning and dianoia, it no longer apprehended real beings by simple intuitions, but syllogistically and transitively, proceeding from one thing to another, from propositions to conclusions.\n\nAfterwards, abandoning true reasoning, and the dissolving peculiarity, it descended into generation, and became filled with much irrationality and perturbation.\n\nIt is necessary, therefore, that it should recur 356 to its proper principles and again return to the place from whence it came.\n\nTo this ascent and apocatastasis, however, these four manias contribute.\n\nAnd the musical mania, indeed, leads to symphony and harmony, the agitated and disturbed nature of the parts of the soul, which were hurried away to indefiniteness and inaptitude, and were filled with abundant tumult.\n\nBut the telestic mania causes the soul to be perfect and entire, and prepares it to energize intellectually.\n\nFor the musical mania alone harmonizes and represses the parts of the soul; but the telestic causes the whole of it to energize, and prepares it to become entire, so that the intellectual part of it may energize.\n\nFor the soul, by descending into the realms of generation, resembles a thing broken and relaxed.\n\nAnd the circle of the same , or the intellectual part of it, is fettered; but the circle of the different , or the doxastic part, sustains many fractures and turnings.\n\nHence, the soul energizes partially, and not according to the whole of itself.\n\nThe Dionysiacal inspiration, therefore, after the parts of the soul are coharmonized, renders it perfect, and causes it to energize according to the whole of itself, and to live intellectually.\n\nBut the Apolloniacal mania converts and coexcites all the multiplied powers, and the whole of the soul, to the one of it.\n\nHence Apollo is denominated as elevating the soul from multitude to the one .\n\nAnd the remaining mania, the amatory, receiving the soul united, conjoins this one of the soul to the Gods, and to intelligible beauty.\n\nAs the givers, therefore, of these manias are transcendently united, and are in each other, the gifts also on this account participate of, and communicate with, each other, and the recipient, which is the soul, possesses an adaptation to all the gifts.\n\nThis, therefore, is the order, and these are the energies and powers within the soul itself, of these four manias.\n\n“But let us also consider their external energies on man, and what they outwardly effect about us.\n\nThe musical mania, therefore, causes us to speak in verse, and to act and be moved rythmically, and to sing in metre, the splendid deeds of divine men, and their virtues and pursuits; and, through these, to discipline our life, in the same manner as the inward manias coharmonize our soul.\n\nBut the telestic mania, expelling every thing foreign, contaminating, and noxious, preserves our life perfect and innoxious, and banishing an insane and diabolical phantasy, causes us to be sane, entire, and perfect, just as the internal telestic mania makes the soul to be perfect and entire.\n\nAgain, the prophetic 357 mania contracts into one the extension and infinity of time, and sees, as in one present now, all things, the past, the future, and the existing time.\n\nHence it predicts what will be, which it sees as present to itself."

