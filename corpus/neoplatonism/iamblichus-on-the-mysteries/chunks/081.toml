[content]
body = "Hence this genus of divination is undefiled and sacerdotal, and is truly divine.\n\nThis, also, does not, as you say it does, require me, or any other as an arbiter, in order that I may prefer it to a multitude of other things; but it is itself exempt from all things, is supernatural, and has an eternal preexistence, neither 202 receiving a certain opposition, nor a certain transcendency, which has a prearrangement in many things, because it is of itself liberated, and uniformly precedes all things.\n\nAnd to this it is requisite that you, and every one who is a genuine lover of the Gods, should give himself wholly; since by this mean irreprehensible truth will be obtained in divinations, and perfect virtue in souls; and through both these, an ascent will be afforded to theurgists to intelligible fire, which ought to be preestablished as the end of all foreknowledge, and of every theurgic operation.\n\nHence you in vain adduce the opinion of those who think that divination is effected by an evil dæmon, since these do not deserve to be mentioned in speculations concerning the Gods.\n\nAt the same time, likewise, they are ignorant of the means of distinguishing truth from falsehood, because they are from the beginning nourished in darkness, and are wholly incapable of knowing the principles from which these are produced.\n\nHere, therefore, we shall terminate our discussion concerning the mode of divination.\n\n203 SECTION IV."

