[content]
body = "It is, necessary, however, to discuss these things particularly, and to show how they subsist, and what reason they possess. It is requisite, therefore, to understand that the universe is one animal; and that the parts in it are, indeed, separated by places, but through the possession of one nature hasten to each other. [92] The whole collective power, however, and the cause of mixture, spontaneously draws the 220 parts to a mingling with each other. But it is also possible for this spontaneous attraction to be excited and extended by art more than is fit. The cause itself, therefore, of this mixture extending from itself to the whole world, is good, and the source of plenitude; has the power of harmonically procuring communion, consent, and symmetry; and inserts, by union, the indissoluble principle of love, which principle retains and preserves both things that are in existence, and such as are becoming to be. But in the parts, through their separation from each other and from wholes, and because, from their own proper nature, they are imperfect, indigent, and imbecile, their mutual connection is accompanied with passion; by which, in most of them, desire and a connascent appetite are inherent. Art [93] therefore, 221 perceiving this innate desire thus implanted by nature, and distributed about it 222 (art itself also being multiformly distributed about nature), variously attracts and derives it as through a channel. Hence it transfers that which in itself is orderly and arranged into the privation of order, and fills that which is beautiful and commensurate with deformity. But the venerable end in each particular thing, which is connascent with union, it transfers to another indecorous plenitude, which is an 223 assemblage of different things according to a common passion. It likewise imparts a matter from itself, which is unadapted to the whole generation of what is beautiful, either because it does not entirely receive it, or because it transfers it to other things. It also mingles many different physical powers, which it manages as it pleases for the purposes of generation. Hence we have universally shown, that the apparatus of a venereal connexion of this kind proceeds from a certain human art, and not from a certain dæmoniacal or divine necessity."

