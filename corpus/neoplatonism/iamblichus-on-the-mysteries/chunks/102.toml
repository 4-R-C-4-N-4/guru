[content]
body = "The discussion therefore requires that we should show what it is through which sacrifices are effective of things, and are suspended from the Gods, the precedaneous causes of 234 effects. If then we say that the communion of similar powers, or the dissension of contraries, or a certain aptitude of the agent to the patient in the universe, as in one animal, every where possessing one and the same life, coexcites adapted similars, pervading with invariable sameness according to one sympathy, and existing most near in things most remote: if we should say this, we should thus assert something of what is true, and which necessarily accompanies sacrifices, yet we should not demonstrate the true mode of their subsistence. For the essence of the Gods is not placed in nature and in physical necessities, so as to be coexcited by physical passions, or by the powers which extend through all nature; but independently of these, it is defined by itself, having nothing in common with them, neither according to essence, nor according to power, nor any thing else."

