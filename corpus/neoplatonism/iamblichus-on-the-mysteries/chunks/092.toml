[content]
body = "Moreover, you inquire, and at the same time doubt, “ how it comes to pass that the Gods do not hear him who invokes them, if he is impure from venereal connexions; but, at the same time, they do not refuse to lead any one to illegal venery .” You have, indeed, a clear solution of these things from what has been before said; 219 if they are done contrary to [human] laws, but are effected according to another order and cause more excellent than laws. Or if it happens that things of this kind are conformable to the mundane harmony and friendship, yet produce a conflict in parts through a certain sympathy. Or if the communication of good, which is beautifully imparted, is perverted by those that receive it to the contrary."

