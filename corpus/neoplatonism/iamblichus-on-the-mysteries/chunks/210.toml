body = "“This is spoken after the manner of the pontiffs, by whom, according to ancient rites, in all sacrifices, after the appropriate Gods whom it was necessary to invoke to the sacrifice, all the divinities were invoked in general.” And in his Annotations on the seventh of the Æneid he informs us, “that king Œneus offered a sacrifice of first fruits to all the divinities but Diana, who being enraged sent a boar [as a punishment for the neglect].” With respect to this anger, however, of Diana, it is necessary to observe with Proclus, “that the anger of the Gods does not refer any passion to them, but indicates our inaptitude to participate of them.” Ο γαρ των θεων χολος, ουκ εις εκεινας αναπεμπει τι παθος, αλλα την ημων δεικνυσι ανεπιτηδειοτητα της εκεινων μεθεξεως.\n\n115 .\n\nPlotinus was a man of this description, to whom, most probably, Iamblichus alludes in what he now says.\n\n116 .\n\nIn the original θυμον τινος : but it is doubtless requisite to read with Gale, θεσμον τινος .\n\nThis I have translated a certain divine legislation , because we are informed by Proclus, in Platon.\n\nTheol.\n\nlib.\n\niv.\n\np.\n\n206, “that θεσμος is connected with deity, and pertains more to intelligibles; but that νομος , which unfolds intellectual distribution, is adapted to the intellectual fathers.” Ο γαρ θεσμος συμπλεκεται τῳ θεῳ, και προσηκει μαλλον τοις νοητοις ο δε νομος την νοεραν εμφαινων διανομην, οικειος εσι τοις νοεροις πατρασι.\n\n117 .\n\n“Perhaps,” says Proclus, in MS.\n\nComment, in Parmenid.\n\n“it is necessary that, as in souls, natures, and bodies, fabrication does not begin from the imperfect; so likewise in matter, prior to that which is formless, and which has an evanescent being, there is that which is in a certain respect form, and which is beheld in one boundary and permanency.” This, therefore, will be the pure and divine matter of which Iamblichus is now speaking.\n\nDamascius also says, that matter is from the same order whence form is derived.\n\n118 .\n\nThis particular respecting the apples of gold is added from the version of Scutellius, who appears to have translated this work from a more perfect manuscript than that which was used by Gale.\n\n119 .\n\nThe conjecture of Gale, that for ἢ το εν Αβυδῳ in this place, we should read ἢ το εν αδυτῳ , is, I have no doubt, right.\n\nFor the highest order of intelligibles is denominated by Orpheus the adytum , as we are informed by Proclus in Tim."

