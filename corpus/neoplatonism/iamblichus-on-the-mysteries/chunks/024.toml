[content]
body = "We will exchange, therefore, this division for the doubt which may be adduced by you against the present opinion. “ For ,” it may be said by you, “ how, conformably to what we assert, can the sun and moon, and the visible natures in the heavens, be Gods, if the Gods are alone incorporeal? ” To this we reply, that the celestial divinities are not comprehended by bodies, but contain bodies in their divine lives and 66 energies; that they are not themselves converted to body, but they have a body which is converted to its divine cause; and that body does not impede their intellectual and incorporeal perfection, nor occasion them any molestation by its intervention. Hence it does not require an abundant attention, but follows the divinities spontaneously, and after a certain manner, self-motively, not being in want of manual direction; but, through an anagogic tendency, being itself uniformly coelevated by itself, to the one of the Gods. It may also, if requisite, be said that a celestial body is most allied to the incorporeal essence of the Gods. For as the latter is one, so the former is simple; as the latter is impartible, so the former is indivisible; and as that is immutable, so this is unchanged in quality. If, likewise, it is admitted that the energies of the Gods are uniform, a celestial body also, has one circulation. To which may be added, that it imitates the sameness of the Gods, by a perpetual motion, which is invariably the same, and which subsists according to one reason 67 and one order. It also imitates a divine life, by the life which is connascent with etherial bodies. Hence, this celestial body does not consist of things contrary and different, as is the case with our body; nor does the soul of the celestial Gods coalesce with the body into one animal from two things; but the celestial animals of the Gods are entirely similar and counited, and are throughout wholes, uniform, and incomposite. For things of a more excellent nature are always transcendent in them, after the same manner; and things of an inferior nature are suspended from the dominion of such as are prior, yet so as never to draw down this dominion to themselves. But all these are congregated into one coarrangement and perfection; and, after a certain manner, all things in the celestial Gods are incorporeal, and wholly Gods; because the divine form which is in them predominates, and inserts every where throughout one total essence. Thus, therefore, the visible celestials are all of them Gods, and after a certain manner incorporeal. 68"

