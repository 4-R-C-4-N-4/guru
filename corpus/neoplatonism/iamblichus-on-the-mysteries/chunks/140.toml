[content]
body = "This deific and anagogic path Hermes, indeed, narrated, but Bitys, the prophet of King Ammon, explained it, having found it in the adyta of Saïs in Egypt, written in hieroglyphics; 307 and the same prophet also delivered the name of God, which pervades through the whole world. But there are, likewise, many other coarrangements of the same things; so that you do not appear to me to act rightly in referring all things with the Egyptians to physical causes. For there are, according to them, many principles and many essences; and also supermundane powers, which they worship through sacerdotal sanctimony. To me, therefore these things appear to afford common auxiliaries to the solution of all the remaining 308 inquiries. But since it is necessary not to leave any one of them uninvestigated, we shall add them to these problems, and examine them on all sides, in order that we may see where there is any thing futile in your opinions."

