[content]
body = "We shall begin, however, the elucidation of this subject in the best possible manner, if we demonstrate that the sacred law of sacrifices is connected with the order of the Gods. In the first place, therefore, we say, that of the Gods some are material, but others immaterial. And the material, indeed, are those that comprehend matter in themselves, and adorn it; but the immaterial are those that are perfectly exempt from, and transcend, matter. But, according to the sacrific art, it is requisite to begin sacred operations from the material Gods for the ascent to the immaterial Gods will not otherwise be effected. The material Gods, therefore, have a certain communion with matter, so far as they preside over it. Hence they have dominion over things which happen about matter, such as the division, percussion, repercussion, mutation, generation, and corruption of all material bodies. He, therefore, who wishes to worship these theurgically, in a manner adapted to them, and to the dominion which they are allotted, should, as they are material, employ a material mode of worship. For thus we shall be wholly led to a familiarity with them, and worship them in an allied and 250 appropriate manner. Dead bodies, therefore, and things deprived of life, the slaying of animals, and the consumption of victims, and, in short, the mutation of the matter which is offered, pertain to these Gods, not by themselves, but on account of the matter over which they preside. For though they are in the most eminent degree separate from it, yet at the same time they are present with it. And though they comprehend matter in an immaterial power, yet they are coexistent with it. Things that are governed, also, are not foreign from their governors; and things which are subservient as instruments, are not unadapted to those that use them. Hence, it is foreign to the immaterial Gods, to offer matter to them through sacrifices, but this is most adapted to all the material Gods."

