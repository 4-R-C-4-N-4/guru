[content]
body = "Again, therefore, still worse than this is the explanation of sacred operations, which assigns as the cause of divination, “ a certain genus of dæmons, which is naturally fraudulent, omniform, and various, and which assumes the appearance of Gods and dæmons, and the souls of the deceased .” I shall, therefore, relate to you, in answer to this, what I once heard from the prophets of the Chaldeans.\n\nSuch Gods as are truly divinities, are alone the givers of good; alone associate with good men, and with those that are purified by the sacerdotal art, and from these amputate all vice, and every passion.\n\nWhen these, also, impart their light, that which is evil, and at the same time dæmoniacal, vanishes from before more excellent natures, in the same manner as darkness when light is present; nor is it able to disturb theurgists in the smallest degree, who receive from this light every virtue, obtain worthy manners, become orderly and elegant in their actions, are liberated from passions, and purified from every disorderly motion, and from atheistical and unholy conduct.\n\nBut those who are themselves flagitious, and who leap, as it were, to things of a divine nature in 200 an illegal and disorderly manner, these, through the imbecility of their proper energy, or through indigence of inherent power, are not able to associate with the Gods.\n\nBecause, likewise, they are excluded, through certain defilements, from an association with pure spirits, they become connected with evil spirits, are filled from them with the worst kind of inspiration, are rendered depraved and unholy, become replete with intemperate pleasures, and every kind of vice, are emulous of manners foreign to the Gods, and, in short, become similar to the depraved dæmons, with whom they are connascent.\n\nThese, therefore, being full of passions and vice, attract to themselves, through alliance, depraved spirits, and are excited by them to every kind of iniquity.\n\nThey are also increased in wickedness by each other, like a circle conjoining the beginning to the end, and similarly making an equal compensation.\n\nHence deeds which are the nefarious offences of impiety, which are introduced into sacred works in a disorderly manner, and which are also confusedly performed by those who betake themselves to such works, and at one time, as it seems, cause one divinity to be present instead of another, and again, introduce depraved dæmons instead of Gods, whom they call equal to the Gods ( αντιθεους )—such deeds as these you 201 should never adduce in a discourse concerning sacerdotal divination.\n\nFor good is more contrary to evil than to that which is not good.\n\nAs, therefore, the sacrilegious are in the most eminent degree hostile to the religious cultivation of the Gods; thus, also, those who are conversant with dæmons who are fraudulent, and the causes of intemperance, are undoubtedly hostile to theurgists.\n\nFor from these every depraved spirit departs, and when they are present, is entirely subverted.\n\nEvery vice, too, and every passion, are by these perfectly amputated: for a pure participation of good is present with the pure, and they are supernally filled with truth from a divine fire.\n\nThese, therefore, suffer no impediment from evil spirits, nor are these spirits any obstacles to the goods of their souls.\n\nNor are theurgists disturbed by pride, or flattery, or the enjoyment of exhalations, or any violence; but all these, as if struck by lightning, yield and recede, without touching the theurgist, or being able to approach to them."

