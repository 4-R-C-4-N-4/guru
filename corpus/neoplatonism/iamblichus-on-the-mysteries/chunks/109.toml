[content]
body = "Subverting, therefore, in this manner the common absurd opinions concerning sacrifices, we shall introduce in their place true conceptions about them; omitting the particular discussion of each species of sacrifice, which the peculiar and distinct consideration of sacrifices requires, because this pertains to another inquiry, and because, at the same time, every one who is intelligent may be able to accomplish this from what has been already said, and from one thing may extend his reasoning power to many, and may easily know what is omitted from what has been discussed. And I, indeed, think that these things have been sufficiently explained, both in other respects and because the explanation pays attention in a becoming manner to the purity of the Gods. Because, however, it may perhaps appear to others to be incredible, and not sufficiently manifest, and the veracity of it may be suspected, as not exciting the discursive energy of reason, I wish to consider these things a little more fully; and, if possible, to add arguments more evident than those which have been adduced. 249"

