[content]
body = "Let us then, in the next place, direct our attention to that which accords with what has been before said, and with our twofold condition of being. For there is a time when we become wholly soul, are out of the body, and sublimely revolve on high, in conjunction with all the immaterial Gods. And there is also a 251 time when we are bound in the testaceous body, are detained by matter, and are of a corporeal-formed nature. Again, therefore, there will be a twofold mode of worship. For one mode, indeed, will be simple, incorporeal, and pure from all generation, and this mode pertains to undefiled souls. But the other is filled with bodies, and every thing of a material nature, and is adapted to souls which are neither pure nor liberated from all generation. We must admit, therefore, that there are twofold species of sacrifices; one kind, indeed, pertaining to men who are entirely purified, which, as Heraclitus says, rarely happens to one man, or to a certain easily to be numbered few of mankind; but the other kind, being material and corporeal-formed, and consisting in mutation, is adapted to souls that are still detained by the body. Hence, to cities and people not yet liberated from genesiurgic fate and the impeding communion of bodies, if such a mode of sacrifice as this latter is not permitted, they will wander both from immaterial and material good. For they will not be able to receive the former, and to the latter they will not offer what is appropriate. At the same time, likewise, every one in sacrificing performs the sacrifice with reference to what he is, and not with reference to what he is not. It is not 252 proper, therefore, that the sacrifice should transcend the proper measure of him by whom it is offered. The same thing will also be said by me concerning the connexion which appropriately coadapts the men who worship and the powers that are worshiped. For this connexion requires that a mode of worship should be chosen adapted to itself; viz. an immaterial connexion, a mode of worship immaterially mingled, and purely conjoining by pure incorporeal powers, incorporeal natures to themselves; but a corporeal-formed connexion, a corporeal-formed mode which depends on bodies, and is mingled with the essences that preside over bodies."

