[content]
body = "The Pythagoreans, likewise, adorned numbers and figures with the appellations of the Gods.\n\nFor they called the equilateral triangle, Minerva Coryphagenes, or begotten from the summit, and Tritogeneia because it is divided by three perpendiculars drawn from the three angles.\n\nBut they called the one Apollo, being persuaded to this by the obvious meaning of the word Apollo [which signifies a privation of multitude] and by the simplicity of the monad [104] .\n\nThe duad they denominated strife and audacity, and the triad justice.\n\nFor since injuring and being injured are two extremes subsisting according to excess and defect, justice, through equality, has a situation in the middle.\n\nBut what is called the tetractys, being the number 36, was, as is reported, their greatest oath, and was denominated the world.\n\nFor this number is formed from the composition of the four first even and the four first odd numbers, collected into one sum.\n\n[105] If, therefore, the most approved of the philosophers did not think it proper to neglect or despise any occult signification of a divine nature when they perceived it even in things which are inanimate and incorporeal, it appears to me that they, in a still greater degree, venerated those peculiarities depending on manners which they saw in such natures as had sense, and were endued with soul, with passion, and ethical habits.\n\nWe must embrace, therefore, not those who honour these things, but those who reverence divinity through these, as through most clear mirrors, and which are produced by nature, in a becoming manner, conceiving them to be the instruments or the art of the God by whom all things are perpetually adorned.\n\nBut we ought to think that no inanimate being can be more excellent than one that is animated, nor an insensible than a sensitive being, not even though some one should collect together all the gold and emeralds in the universe.\n\nFor the divinity is not ingenerated either in colours, or figures, or smoothness; but such things as neither ever did, nor are naturally adapted to participate of life, have an allotment more ignoble than that of dead bodies.\n\nBut the nature which lives and sees, and has the principle of motion from itself, and a knowledge of things appropriate and foreign to its being, has certainly derived an efflux and portion of that wisdom which, as Heraclitus says, considers how both itself and the universe is governed.\n\nHence the divinity is not worse represented in these animals than in the workmanships of copper and stone, which in a similar manner suffer corruption and decay, but are naturally deprived of all sense and consciousness.\n\nThis then I consider as the best defence that can be given of the adoration of animals by the Egyptians.” 102 .\n\nInstead of και δικης , I read και μετα δικης .\n\n103 .\n\ni.\n\ne.\n\nShould be perfectly impartial.\n\n104 .\n\nInstead of διπλοτατοις μοναδος as in the original, which is nonsense, it is necessary to read, as in the above translation, απλοτητι της μοναδος .\n\n105 .\n\nFor 2 + 4 + 6 + 8 = 20; and 1 + 3 + 6 + 7 = 16; and 20 + 16 = 36.\n\n106 .\n\nThe cock was sacred to Apollo, and therefore its heart was believed to be the instrument of divination in sacrifices.\n\nThe chemic Olympiodorus says, “that the cock obscurely signifies the essence of the sun and moon.” See, in the additional notes, what is said by Proclus concerning the cock, in his treatise On Magic.\n\n107 ."

