[content]
body = "With respect to the good , likewise, they conceive that one kind is divine, and this is the God who is prior to the intelligible; but that the other is human, and is a union with the former. And these two kinds of good Bitys has unfolded from the Hermaic books. This part, therefore, is not, as you suspect, omitted by the Egyptians, but is divinely delivered by them. Nor do “ theurgists disturb the divine intellect about trifling concerns ;” but they consult it about things which pertain to the purification, liberation, and salvation of the soul. Neither do they studiously employ themselves in things which are indeed difficult, yet useless to mankind; but, on the contrary, they direct their attention to things which are of all others most beneficial to the soul. Nor, in the last place, are “ they deceived by a certain fraudulent dæmon ,” who, having vanquished a fallacious and dæmoniacal nature, ascend to an intelligible and divine essence. 336"

