[content]
body = "It follows, therefore, that in the next place we should define the energies of them. And those of dæmons, indeed, must be surveyed as occupied about the world, and more widely extended in their effects; but those of heroes as less extended, and as converted to the order of souls. Hence, these being thus distinguished, soul succeeds, which proceeds as far as to the end of the divine orders; and, being allotted from these two genera certain portions of powers, is redundant with partible additions, and other prerogatives derived from itself. It also produces at different times different forms and reasons and manners, which originate from different sources; and, according to each part of the world, employs various lives and ideas; 84 becoming, connascent with, and likewise receding from, whatever natures it pleases; being, assimilated to all things, and at the same time, through difference, being separated from them; drawing forth reasons allied to real beings and generated natures; and connecting itself with the Gods, according to other harmonies of essences and powers, than those by which, dæmons and heroes are united to the divinities. It likewise possesses the eternity of a similar life and energy in a less degree than dæmons and heroes; yet, through the beneficent will of the Gods, and the illumination imparted by them, it frequently proceeds higher, and is elevated to a greater, i. e. to the angelic, order; when it no longer remains in the boundaries of soul, but the whole of it is perfected into an angelic soul and an undefiled life. Hence, also, soul appears to comprehend in itself all-various essences and reasons, and forms or species of every kind. If, however, it be requisite to speak the truth, soul is always defined according to one certain thing, but adapting itself to precedaneous causes, it is at different times conjoined to different causes. So great, therefore, being the difference between the energies of dæmons, heroes, and souls throughout, it is no longer proper to doubt, what it is which separates them from 85 each other; but they are to be distinguished by the peculiar nature of each. And so far as they are able to form one conjunction, so far the communion of them must be surveyed. For thus it will be possible truly to comprehend and define separately the conception which ought to be formed of them."

