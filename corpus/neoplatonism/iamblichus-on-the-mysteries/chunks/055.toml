[content]
body = "Let us, however, discuss what pertains to divination more particularly; not asserting this, that nature leads each thing to its like; for the enthusiastic energy is not the work of nature; nor again asserting that the temperature of the air, and of that which surrounds us, produces also a different temperature in the body of those that energize enthusiastically; since inspiration, which is the work of the Gods, is not changed by corporeal powers or temperaments. Nor must we say, that the much celebrated inspiration of divinity is adapted to passions and generated natures. For the gift of the proper energy of the Gods to men is impassive and superior to all generation. But since the power of the Corybantes is, in a certain respect, of a guardian and efficacious 135 nature, and that of Sabazius appropriately pertains to Bacchic inspiration, the purifications 136 of souls, and the solutions of ancient divine anger, on this account the inspirations of them entirely differ from each other. 137 With respect, however, to the mother of the Gods, you, indeed, seem to think that those 138 who are possessed by the Goddess are males; for, conformably to this, you denominate them Metrizantes. But the thing is not truly so. For those who are precedaneously inspired by the mother of the Gods are women; but the males that are thus inspired are very few in number, and such as are more effeminate. 139 This enthusiasm, however, has a vivific and replenishing power, on which account, also, it in a remarkable degree differs from all other mania. Proceeding, therefore, in this way, in what remains of the present discussion, and fitly distinguishing the inspirations of the Nymphs, or of Pan, and the other differences of them, according to the powers of the Gods, we shall separate them conformably to their appropriate peculiarities; and we shall also be able to explain through what cause they leap and dwell in mountains, why some of them appear to be bound, and why they are worshiped through sacrifices. All these, likewise, we shall ascribe to divine causes, as containing in themselves all the authority of these particulars; but we shall not say that either a certain collected redundancy of body or soul requires to be purified, or that the periods of the seasons are the causes of such like passions, or that the reception of the similar, and the ablation of the dissimilar, bring with them a certain 140 remedy for an excess of this kind. For all such like particulars are corporeal-formed, and are entirely separated from a divine and intellectual life. But each thing energizes conformably to its nature; so that the spirits which are excited by the Gods, and which produce in men Bacchic inspiration, expel every other human and physical motion; and it is not proper to assimilate their energies to those which are usually exerted after our manner; but it is fit to refer them to perfectly different and primordial divine causes. One species, therefore, of divine inspiration is of this kind, and is after this manner produced."

