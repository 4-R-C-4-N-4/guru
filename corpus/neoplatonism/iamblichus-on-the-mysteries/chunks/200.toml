body = "corporis et animæ, και την τουτων διαφοραν ασυμφυρτον και τα ιδιωματα ασυμφυρτα και ασυγχυτα .” i.\n\ne.\n\n“But neither does this follow.\n\nS.\n\nMaximus, where he unfolds hypostatic union, says these things are perceived in the soul and body.\n\nOne composite hypostasis is produced from both.\n\nBut this hypostasis preserves in itself the perfect nature of each, and likewise the difference of these unmingled, end the peculiarities unmingled and unconfused.” This hypostatic union, however; as we have before observed, cannot take place between divine inspiration and the soul, because the former is perfectly exempt from the latter.\n\nGale adds, “Quæro autem quid velit Iamblichus per αμφοιν ?\n\nOpinor, ψυχην et την εξωθεν θειαν επιπνοιαν .\n\nNon facile evincet επιπνοιαν esse αιδιον τι , utpote quæ sit transiens dei actio.” i.\n\ne.\n\n“I ask what Iamblichus means by both .\n\nI think the soul and divine inspiration externally derived.\n\nBut he will not easily prove that inspiration is something eternal, because it is a transient energy of God.” Gale is right in his conjecture, that Iamblichus by the word both in this place, means the soul and divine inspiration externally derived; for it can admit of no other meaning; but when he adds, that inspiration cannot be something eternal, because it is a transient energy of divinity, he shows himself to be as bad a theologist as he is a philosopher.\n\nFor God being an eternal, or rather a supereternal nature, his energies have nothing to do with time and its transitive progressions, but are stably simultaneous; so that transition does not exist in his inspiring influence, but in the recipients of it, these being of a temporal and mutable nature.\n\nHence it is just as absurd to call any energy of divinity transient, as it would be to say that the light of the sun is transient, because it shines through diaphanous, but not through opaque, substances.\n\n84 .\n\nHippocrates was of opinion that physicians ought to be skilled in astronomy.\n\nAnd Galen derides those physicians who deny that astronomy is necessary to their art.\n\nSee his treatise entitled Si quis sit Medicus eundem esse philosophum.\n\nAnd in lib.\n\nviii.\n\ncap.\n\n20, of his treatise De Ingenio Sanitatis, he calls physicians that are ignorant of astronomy homicides.\n\nBut by astronomy here, both Hippocrates and Galen intended to signify what is now called astrology.\n\nRoger Bacon also, in his Epistle to Pope Clement, says, “Opera quæ fiunt hic inferius, variantur secundum diversitatem cœlestium constellationum, ut opera medicinæ et alkimiæ.” i.\n\ne.\n\n“The works which are performed in these inferior realms are varied according to the diversity of the celestial constellations, as, for instance, the works of medicine and alchemy.” If, however, as Galen says, and doubtless with great truth, physicians that are ignorant of this are homicides, how numerous must the medical homicides be of the present age!\n\n85 .\n\nAccording to Proclus, in Alcibiad."

