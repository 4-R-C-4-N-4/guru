[content]
body = "In the next place we shall explain how divination is effected through sacred animals, such, for instance, as hawks. We must never say, therefore, that the Gods accede through bodies that are thus procured, being employed. For they do not preside over animals, either partibly, or proximately, or materially, or with a certain habitude towards them. But to dæmons and these such as are very much divided, to different orders of whom different animals are allotted, and who proximately exercise a government of this kind, and do not obtain their proper dominion in a way perfectly independent and immaterial, such a contact with the organs of divination must be ascribed. Or, if some one is willing so to admit, a seat must be attributed to them, through which we may be able to associate with and employ them. It is necessary, therefore, to think that this seat should be pure from bodies. For there can be no communion whatever between the pure 278 and its contrary; but it is reasonable to admit that this seat is conjoined with men, through the soul of animals. For this soul has a certain alliance to men, through homogeneity of life; but it is allied to dæmons, because, being liberated from body, it has in a certain respect a separate subsistence. Hence, being a medium between both, it is subservient to its presiding dæmon, but announces to those who are yet detained in body that which its prefect commands. And it imparts to both these a common bond with each other."

