[content]
body = "I consider you, therefore, as asking, for it is your inquiry, “ Why, since the Gods dwell in the heavens alone, there are invocations by theurgists of terrestrial and subterranean Gods?\n\n” For 45 what you assert in the beginning is not true, that the Gods circumvolve in the heavens alone: since all things are full of them.\n\nYou also inquire, “ How some of the Gods are said to be aerial, and different Gods are allotted different places, and circumscribed portions of bodies, though they possess infinite, impartible, and incomprehensible power?\n\nAnd how, likewise, there will be a union of them with each other, as they are separated by divisible circumscriptions of parts, and by difference of places and subject bodies?\n\n” Of all these, therefore, and an infinite number of other similar questions, one and the best solution will be obtained by surveying the mode of divine allotment.\n\nA divine nature, therefore, whether it is allotted certain parts of the universe, such as heaven or earth, or sacred cities and regions, or certain groves, or sacred statues, externally [29] illuminates all these, in the same manner as the sun externally irradiates all things with his rays.\n\nHence, as light comprehends the things which are illuminated by it, thus also the power of the Gods externally comprehends its participants.\n\nAs, likewise, the solar light is present with the air in an unmingled manner; but this is manifest from no light being left 46 in the air, when once that which illuminated it has departed, though heat is still present with it, when that which heated it is entirely withdrawn; thus also the light of the Gods illuminates separately, and being firmly established in itself, wholly proceeds through all beings.\n\nMoreover, the light which is the object of sensible perception, is one, continuous, and every where the same, whole; so that it is not possible for any part of it to be separate and cut off from the whole, nor to be inclosed in a circle, nor at any time to depart from its illuminating source.\n\nAfter the same manner, therefore, the whole world being partible, is divided about the one and impartible light of the Gods.\n\nBut this light is every where one and the same whole, and is impartibly present with all things that are able to participate of it; through an all perfect power fills all things, and by a certain causal comprehension, incloses and terminates the whole of things in itself, and is every where united to itself, and conjoins ends to beginnings.\n\nThis too, all heaven and the world imitating, revolve with a circular motion, are united to themselves, and lead the elements which are carried round in a circle.\n\nHence the world causes all things to be in each other, and to tend to each other, makes the end of one thing to coalesce with the beginning of another, 47 as, for instance, earth with heaven, and produces one connexion and concord of wholes with wholes.\n\nWill not, therefore, he who surveys this conspicuous statue of the Gods, thus united to itself, be ashamed to have a different opinion of the Gods, who are the causes of it, so as to introduce among them sections, and separations, and corporeal-formed circumscriptions?\n\nI, indeed, should think, that every one would be thus disposed.\n\nFor if there is no ratio, no habitude of symmetry, no communion of essence, nor a connexion either in capacity or in energy, between that which is adorned and the adorning cause; if this be the case, there will neither be found in the world a certain extension according to interval, nor local comprehension, nor partible interception, nor any other such like connascent equalization in the presence of the Gods [with mundane natures]."

