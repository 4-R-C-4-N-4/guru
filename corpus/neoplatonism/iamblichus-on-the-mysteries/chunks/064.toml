[content]
body = "For, as he sometimes makes some stupid man to speak wisely, through which it becomes manifest to every one, that this is not a certain human but a divine work; thus, also, he reveals through things which are deprived of knowledge, conceptions which precede all knowledge.\n\nAnd, at the same time, he declares to men that the signs which are exhibited are worthy of belief, and that they are superior to nature, from which he is exempt.\n\nThus he makes things to be known which are naturally unknown, and things which are without knowledge gnostic.\n\nThrough them, also, he inserts in us wisdom, and through every thing which is in the world excites our intellect to the truth of real beings, of things which are in generation, and of future events.\n\nFrom these things, therefore, I think it is manifest, that the mode of divination is perfectly contrary to what you suspected it to be.\n\nFor it is of a ruling and primordial nature, of an unrestrained power, and transcendent nature, comprehending in itself all things, but not being comprehended by any thing, nor enclosed by its participants.\n\nFor it ascends into, and rules over, all things simultaneously, and without circumscription, and collectively signifies future events.\n\nHence, from what has 163 been said, you may easily dissolve these vulgar doubts, which disturb most men, and may in a becoming manner elevate yourself to the intellectual, divine, and irreprehensible presignification of the Gods from all things.\n\nThrough this, therefore, we have evinced, that divinity is not drawn down to the signs employed by divination."

