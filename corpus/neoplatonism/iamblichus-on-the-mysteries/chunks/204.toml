body = "It must also be observed, that this MS.\n\nof Psellus On Dæmons forms no part of his treatise On the Energy of Dæmons , published by Gaulminus; for it never was published.\n\n94 .\n\nHence Iamblichus (apud Stob.\n\nEclog.\n\nPhys.\n\np.\n\n114), says, Ουχ η αυτη εστι πασων ψυχων κοινωνια προς τα σωματα.\n\nαλλ’ η μεν ολη ωσπερ Πλωτινῳ δοκει, προσιον εαυτῃ το σωμα εχει εν εαυτῃ, αλλ’ ουκ αυτη προσεισι τῳ σωματι, ουδε περιεχεται υπ’ αυτου.\n\nαι δε μερισται προσερχονται τοις σωμασι, και των σωματων γιγνονται.\n\ni.\n\ne.\n\n“There is not the same communion of all souls with bodies; but the soul which ranks as a whole (as it also appeared to Plotinus), approaching to itself, contains body in itself, but does not itself approach to body, nor is comprehended by it.\n\nPartible souls, however, accede to bodies, and give themselves up to them.” Conformably to this Porphyry also, in his Αφορμαι προς τα νοητα , No.\n\n30, says, “No whole and perfect essence is converted to its own progeny; but all perfect natures are led back to the causes by which they were generated, even as far as to the mundane body.\n\nFor this body, being perfect, is elevated to the mundane soul which is intellectual, and through this is circularly moved.\n\nBut the soul of this body is elevated to intellect, and intellect to that which is first.\n\nAll things, therefore, extend themselves to this, beginning from that which is last, according to the peculiar ability of each.\n\nBut the reduction to that which is first is either proximate or remote.\n\nHence these are not only said to aspire after divinity, but also to enjoy him as far as they are able.\n\nBut in partial natures, and which are able to verge to many things, a conversion to their progeny belongs.\n\nHence in these guilt, in these disgraceful perfidy, is found.\n\nMatter, therefore, defiles these, because they decline to it, at the same time that they possess the power of converting themselves to a divine nature.” 95 .\n\nIamblichus here alludes to the excellent treatise of Porphyry, περι της των εμψυχων αποχης , On Abstinence from Animal Food , from which work the English reader will find several admirable extracts in one of the Introductory Dissertations prefixed to my translation of Proclus on Euclid.\n\n96 .\n\nA celestial body, as is beautifully shown by Proclus in Tim.\n\nlib.\n\niii.\n\ncontains the summits of all the elements, but is characterized by vivific unburning fire; so that, in short, it is vitalized extension.\n\n97 .\n\nThe number sixty is no less manifest in the crocodile than in the sun.\n\nFor according to Aristotle (in Hist.\n\nAnim.\n\nlib."

