body = "with evil dæmons], which are hurled forth before the Gods, but on entering the interior parts of the temple, unmoved, and guarded by the mystic rites, they genuinely receive in their bosom divine illumination, and divested of their garments, as they would say, participate of a divine nature; the same mode, as it appears to me, takes place in the speculation of wholes.” That mitred sophist, Warburton, as I have elsewhere called him, from not understanding the former part of this latter extract from Proclus, ridiculously translates the words πολυειδεσι και πολυμορφοις των θεων προβεβλημενοις γενεσιν , “multiform shapes and species, that prefigure the first generation of the Gods.” See his Divine Legation of Moses, book ii.\n\np.\n\n152, 8vo.\n\na work replete with distorted conceptions and inaccurate translations.\n\nAnd yet, as great a sophist as Warburton was, and notwithstanding the work I have just mentioned abounds with false opinions, and such as are of the most pernicious kind, yet he is compelled by truth to acknowledge, in book ii.\n\np.\n\n172, “that the wisest and best men in the Pagan world are unanimous in this, that the mysteries were instituted pure, and proposed the noblest end by the worthiest means.” But this by the way.\n\n67 .\n\nThis divination according to the imagination through water, may be illustrated by the following extract from Damascius (apud Photium): Γυνη ιερα θεομοιρον εχουσα φυσιν παρᾳλογοτατην.\n\nυδωρ γαρ εγχεασα ακραιφνες ποτηριῳ τινι των υαλινων, εωρα κατα του υδατος εισω του ποτηριου τα φασματα των εσομενων πραγματων, και προυλεγεν απο της οψεως αυτα απερ εμελλεν εσεσθαι παντως.\n\nη δε πειρα του πραγματος ουκ ελαθεν ημας .\n\ni.\n\ne.\n\n“There was a sacred woman who possessed in a wonderful manner a divinely gifted nature.\n\nFor pouring pure water into a certain glass cup, she saw in the water that was within the cup the luminous appearances of future events, and from the view of these she entirely predicted what would happen.\n\nBut of this experiment we also are not ignorant.” 68 .\n\n“The Platonists,” says Psellus (ad Nazianzenum) “assert that light is spread under divine substances, and is rapidly seized, without any difficulty, by some who possess such an excellent nature as that which fell to the lot of Socrates and Plotinus.\n\nBut others, at certain periods, experience a mental alienation about the light of the moon.” 69 .\n\nConcerning this vehicle, in which the phantastic power resides, see vol.\n\nii.\n\nof my translation of Proclus on the Timæus of Plato, p."

