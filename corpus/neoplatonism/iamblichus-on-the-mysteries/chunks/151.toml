[content]
body = "Afterwards, abandoning these particulars, you pass on to the opinion of philosophy. But you subvert the whole hypothesis concerning the peculiar dæmon. For if [as you say] “ this dæmon is a part of the soul ,” such, for instance, as the intellectual part, “ and he is happy who is in possession of a wise intellect ,” there will no longer be any other more excellent or dæmoniacal order, presiding over, as transcending the human soul. But certain parts of the soul, or a certain divided power, will have dominion over many of the forms of life that are in us; and will rule over these, not connascently, but as naturally exempt, and as transcending the whole of our composition. 324"

