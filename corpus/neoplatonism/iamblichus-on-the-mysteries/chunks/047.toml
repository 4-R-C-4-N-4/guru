[content]
body = "Concerning the divination, therefore, which takes place in sleep, you say as follows: “ We frequently obtain through dreams, when we are asleep, a knowledge of future events, not being in an ecstasy, through which we are much agitated, for the body is quiet, but we do not apprehend what we see in the same clear manner as when we are awake .” It is usual, however, for what you here say, to happen in human dreams, and in dreams which are excited by the soul, or by some of our conceptions, or by reason, or by imaginations, or certain diurnal cares. And these, indeed, are sometimes true and sometimes false; and in some things they apprehend reality, but in many deviate from it. But the dreams which are denominated theopemptoi , or sent from God , do not subsist after the manner which you mention; but they take place either when sleep is leaving us, and we are beginning to awake, and then we hear a certain voice, which concisely tells us what is to be done; or voices are heard by us, between sleeping and waking, or when we are perfectly awake. And sometimes, indeed, an invisible and incorporeal spirit surrounds the recumbents, 116 so as not to be perceived by the sight, but by a certain other cosensation and intelligence. The entrance of this spirit, also, is accompanied with a noise, and he diffuses himself on all sides without any contact, and effects admirable works conducive to the liberation of the passions of the soul and body. But sometimes a bright and tranquil light shines forth, by which the sight of the eyes is detained, and which occasions them to become closed, though they were before open. The other senses, however, are in a vigilant state, and in a certain respect have a cosensation of the light unfolded by the Gods; and the recumbents hear what the Gods say, and know, by a consecutive perception, what is then done by them. This, however, is beheld in a still more perfect manner, when the sight perceives, when intellect, being corroborated, follows what is performed, and this is accompanied with the motion of the spectators. Such, therefore, and so many being the differences of these dreams, no one of them is similar to human dreams. But wakefulness, [48] a detention of the eyes, a 117 similar oppression of the head, a condition between sleeping and waking, an instantaneous excitation, or perfect vigilance, are all of them divine indications, and are adapted to the reception of the Gods. They are also sent by the Gods, and a part of divine appearances antecedes according to things of this kind. Take away, therefore, from divine dreams, among which also divination is contained, “ the being asleep ,” and also the assertion, “ that we do not apprehend what we see in sleep, in the same clear manner as when we are awake .” For the Gods are no less clearly present with us in these dreams than when we are awake. And, if it be requisite to speak the truth, the presence of the Gods, in the former case, is necessarily clearer and more accurate, and produces a more perfect perception than in the latter. Some, therefore, not knowing these indications of prophetic dreams, and conceiving that they have something in common with human dreams, rarely and casually obtain a foreknowledge of futurity, and in consequence of this, reasonably doubt how dreams contain any truth. And this, also, appears to me to disturb you, in consequence 118 of your not knowing the true indications of dreams. It is necessary, however, that, admitting these to be the elements of the true knowledge of dreams, you should attend to the whole of the discussion concerning divination in sleep."

