[content]
body = "Opinion, likewise, and the phantasy, are said thus to energize when they discover arts, and accomplish admirable works, such, for instance, as Phidias effected in the formation of statues, and another in another art, as also Homer says [157] of him who made the belt of Hercules, ‘that he neither did nor would artificially produce such another.’ Anger, likewise, is said 352 to energize enthusiastically, when in battle it energizes supernaturally.\n\nLike Mars, when brandishing his spear, he raged.\n\n[158] But if some one, yielding to desire, should eat of that which reason forbids, and through this should unexpectedly become well, you may say that desire also, in this instance, energized enthusiastically, though obscurely; so that enthusiasm is likewise produced about the other parts of the soul.\n\nEnthusiasm, however, properly so called, is when this one of the soul, which is above intellect, is excited to the Gods, and is from thence inspired.\n\nBut at different times it is possessed about the aptitudes of itself, by different Gods; and is more or less possessed when intellect or dianoia is that which is moved.\n\nAs, therefore, when we inquire what philosophy is, we do not always accurately define it, but frequently, from an improper use of the word, call mathematics or physics philosophy and science; we do the like also with respect to enthusiasm.\n\nFor though it should be the phantasy which is excited, we are accustomed to call the excitation enthusiasm.\n\nMoreover, those who ascribe enthusiasm to the temperatures of bodies, or the excellent temperament of the air, or the ascendency of exhalations, or the aptitudes of times and places, or the agency of the bodies that revolve in the heavens, speak rather of the cooperating and material causes of the thing than of the causes of it properly so called.\n\nYou have, therefore, for the producing cause of enthusiasm, the Gods; for the material cause, the enthusiastically energizing soul itself, or the external symbols; for the formal cause, the inspiration of the Gods about the one of the soul; and for the final cause, good.\n\n“If, however, the Gods always wish the soul what is good, why does not the soul always energize enthusiastically?\n\nMay we not say, that the Gods indeed always wish the soul what is good, but they are also willing that the order of the universe should prevail, and that the soul, through many causes, is not always adapted to enthusiasm, on which account it does not always enthusiastically energize?\n\nBut some say that the telestic art extends as far as to the sublunary region.\n\nIf, therefore, they mean that no one of the superlunary and celestial natures energizes in the sublunary region, they evidently assert what is absurd.\n\n353 But if they mean that the Telestæ, or mystic operators, are not able to energize above the lunar sphere, we say, that if all the allotments of souls are sublunary, their assertion will be true; but if there are also allotments of souls above the moon, as there are (for some are the attendants of the sun, others of the moon, and others of Saturn, since the Demiurgus disseminated some of them into the earth, others into the moon, and others elsewhere), this being the case, it will be possible for the soul to energize above the moon.\n\nFor what the whole order of things impacts to the soul for a very extended period of time, this the soul is also able to impart to itself for a short space of time, when assisted by the Gods through the telestic art.\n\nFor the soul can never energize above its own allotment, but can energize to the extent of it."

