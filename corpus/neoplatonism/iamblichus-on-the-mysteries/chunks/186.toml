[content]
body = "και ων εννοουμεν αγαθων τα σεμνοτατα, και αγιωτατα, και πρωτουργα, και ονοματα και πραγματα αυτῳ ανατιθεντας ειδεναι βεβαιως, οτι μηδεν ανατεθεικαμεν αξιον.\n\nαρκει δε ημιν εις συγγνωμην, το μηδεν εχειν εκεινων υπερτερον.\n\nSimplic.\n\nin Epict.\n\nEnchir.\n\np.\n\n207.\n\nLond.\n\n1670.\n\n8vo.\n\n15 .\n\nOf the first principles, says Damascius in MS.\n\nπερι αρχων , the Egyptians said nothing, but celebrated it as a darkness beyond all intellectual conception, a thrice unknown darkness.\n\nΠρωτην αρχην ανυμνηκασιν, σκοτος υπερ πασαν νοησιν, σκοτος αγνωστον τρις τουτο επιφημιζοντες.\n\n16 .\n\nFor farther particulars respecting this most extraordinary man, see the introduction to my translation of his Life of Pythagoras, and my History of the Restoration of the Platonic Theology.\n\n17 .\n\nIliad, lib.\n\nx.\n\nv.\n\n493.\n\n18 .\n\nGale has omitted to give the original of the sentence contained in the brackets; the translation of which I have added from the answer of Iamblichus to this epistle.\n\n19 .\n\nHere also the original is omitted by Gale, and the translation of it is given by me from the text of Iamblichus.\n\n20 .\n\nThe paragraph within the brackets is omitted in the original; but I have supplied it from the following answer of Iamblichus to this Epistle.\n\nThis omission is not noticed by Gale.\n\n21 .\n\nHere likewise the words within the brackets, which are omitted in the original, are added from Iamblichus; but the omission is not noticed by Gale.\n\n22 ."

