[content]
body = "On this subject, however, there is also the following division. Of divine essences and powers some have [a genesiurgic] soul and nature subject and ministrant to their fabrications, whenever they wish to use them. But others are entirely separate from soul and nature, I mean from a divine, and not only from a mundane and genesiurgic soul and nature. And others are the media between these, and afford to the extremes a communion with each other, either according to an exuberant participation of greater good, or according to an unimpeded reception of less good, or according to a concord which binds together both the extremes. When, therefore, we worship the Gods who 258 reign over soul and nature, it is not foreign to these to offer to them physical powers, and bodies which are governed by nature. For all the works of nature are subservient to them, and contribute to their government. But when we undertake to honour those Gods who are essentially uniform, then it is requisite to venerate them with liberated honours. Hence, intellectual gifts are adapted to these, and things which pertain to an incorporeal life, together with the fruits of virtue and wisdom, and whatever perfect and total goods of the soul there may be. Moreover, to the Gods who subsist as media, and who are the leaders of goods of a middle nature, sometimes twofold gifts will be adapted, and sometimes such as have a communication with both these; or such as are separated from inferiors, and pertain to more elevated natures; or, in short, such as in one of the modes give completion to the medium."

