[content]
body = "Your next inquiry doubts, “ how some of the Gods are beneficent, but others malefic .” This opinion, therefore, is assumed from the predictors of nativities.\n\nIt is, however, entirely remote from the truth.\n\nFor all the Gods are good, and invariably the causes of good; and all of them are uniformly convolved to one good, according to the beautiful and good alone.\n\nThe bodies, likewise, which are subject to them possess immense powers; some of which are firmly established in the divine bodies themselves, but others proceed from them into the nature of the world, and into the world itself, descending in an orderly manner through the whole of generation, and extending without impediment as far as to things which have a partial subsistence.\n\nWith respect to the powers, therefore, which remain in the heavens in the divine bodies themselves, there can be no doubt that all of them are similar.\n\nHence, it remains that we should discuss those powers which are thence transmitted to us, and are mingled with generation.\n\nThese, therefore, descend with invariable sameness for the salvation of the universe, 69 and connectedly contain the whole of generation after the same manner.\n\nThey are likewise impassive and immutable, though they proceed into that which is mutable and passive.\n\nFor generation being multiform, and consisting of different things, receives the one of the Gods, and that in them which is without difference, with hostility and partibility, conformably to its own contrariety and division.\n\nIt also receives that which is impassive, passively; and, in short, participates of them according to its own proper nature, and not according to their power.\n\nAs, therefore, that which is generated [or has a subsistence in becoming to be,] participates of being generatively, and body participates of the incorporeal, corporeally; thus, also, the physical and material substances which are in generation, participate of the immaterial and etherial bodies, which are above nature and generation, in a confused and disorderly manner.\n\nHence they are absurd who attribute colour, figure, and contact to intelligible forms, because the participants of them are things of this kind; as likewise are those who ascribe depravity to the celestial bodies, because their participants sometimes produce evils.\n\nFor the participation from the first could not be a thing of this kind, unless the recipient had some mutation.\n\n70 But if that which is participated is received as in another and different thing, this other thing in terrene natures is evil and disorderly.\n\nThe participation, therefore, becomes the cause of the abundant difference in secondary natures, and also the commixture of material substances with immaterial effluxions; and besides these, another cause is this, that what is imparted in one way, is received in another by terrestrial substances.\n\nThus, for instance, the efflux of Saturn is constipative, but that of Mars is motive; but the passive genesiurgic receptacle in material substances receives the former according to congelation and refrigeration, but the latter according to an inflammation which transcends mediocrity.\n\nDo not, therefore, the corruption and privation of symmetry arise from an aberration which is effective of difference, and which is material and passive?\n\nHence the imbecility of material and terrene places, not being able to receive the genuine power and most pure life of the etherial natures, transfers its own passion to first causes.\n\nJust as if some one having a diseased body, and not being able to bear the vivific heat of the sun, should falsely dare to say, in consequence of looking to his own maladies, that the sun is not useful to health or life."

