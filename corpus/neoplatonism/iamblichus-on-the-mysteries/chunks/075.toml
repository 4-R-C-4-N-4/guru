[content]
body = "It is requisite, however, not only to preassume this, but also to define what the inspiration of divine origin is, which produces divine divination.\n\nFor if this is not done, we shall not previously know what its peculiarity is, in consequence of not attributing to it its proper character, and adapting this to it as a certain seal.\n\nAnd this, indeed, has been accurately done by us a little before.\n\n191"

