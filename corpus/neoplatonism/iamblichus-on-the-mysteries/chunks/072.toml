[content]
body = "That which follows in the next place, descends from a divine alienation of mind to an ecstasy of the reasoning power which leads it to a worse condition, and absurdly says, “ that the cause of divination is the mania which happens in diseases .” For, as we may conjecture, it assimilates enthusiasm to the redundancy of the black bile, to the aberrations of intoxication, and to the fury which happens from mad dogs. It is necessary, therefore, from the beginning, to divide ecstasy into two species, one of which leads to a worse condition of being, and fills us with stupidity and folly; but the other imparts goods which are more honourable than human temperance. One species 183 also deviates to a disorderly, confused, and material motion; but the other gives itself to the cause which rules over the orderly distribution of things in the world. And the one, indeed, as being deprived of knowledge, wanders from wisdom; but the other conjoins with natures that transcend all our wisdom. The one, likewise, is unstable, but the other is immutable. The one is preternatural, but the other is above nature. The one draws down the soul, but the other elevates it. And the one entirely separates us from a divine allotment, but the other connects us with it. Why, therefore, does your assertion so much wander from the proposed hypothesis, as to decline from things primary and good to the last evils of insanity? For in what is enthusiasm similar to melancholy, or intoxication, or any other delirium excited by the body? Or what prediction can ever be produced from diseases of the body? Is not a derivation of this kind a perfect corruption, but divine inspiration the perfection and salvation of the soul? And does not depraved enthusiasm take place through imbecility, but the enthusiasm which is more excellent through a plenitude of power? In short, the latter being quiescent, according to its own proper life and intelligence, gives itself to be used by another 184 [power which is superior to itself]; but the former, energizing according to its proper energies, renders these most depraved and turbulent. This, therefore, is a difference the most manifest of all others, because all the works of divine natures differ [in a transcendent degree] from the works of other beings. For as the more excellent genera are exempt from all others, thus also their energies do not resemble those of any other nature. Hence, when you speak of divine mania, immediately remove from it all human perversions. And if you ascribe a sacred “ sobriety and vigilance ” to divine natures, you must not consider human sobriety and vigilance as similar to it. But by no means compare the diseases of the body, such as suffusions, and the imaginations excited by diseases, with divine imaginations. For what have the two in common with each other? Nor again, must you compare “ an ambiguous state ,” such as that which takes place between a sober condition of mind and ecstasy, with sacred visions of the Gods, which are defined by one energy. But neither must you compare the most manifest surveys of the Gods with the imaginations artificially procured by enchantment. For the latter have neither the energy, nor the essence, nor the truth of the things that are seen, but extend 185 mere phantasms, as far as to appearances only. All such doubts as these, however, which are adduced foreign to the purpose, and tend from contraries to contraries, we do not consider as pertinent to the present hypothesis. Hence, as we have shown the unappropriateness of them, we do not think it requisite to discuss them any further, because they are contentiously introduced, and not with philosophical investigation."

