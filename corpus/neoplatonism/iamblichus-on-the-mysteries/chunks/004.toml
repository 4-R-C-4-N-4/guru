[content]
body = "With respect to your inquiry, “ what the peculiarities are in each of the more excellent genera, by which they are separated from each other?\n\n” if you understand by peculiarities the specific differences under the same genus, which are distinguished by opposite qualities, as the rational and irrational under animal; we by no means admit peculiarities of this kind, in things which neither have one common essence, nor an equal contradistinction, nor receive a composition from something common, which is indefinite, and defines the peculiarity.\n\nBut if you apprehend the peculiarity to be, as in prior and secondary natures, differing in their whole essence and whole genus, a certain simple condition of being, definite in itself; in this case, 27 your conception of peculiarities will be reasonable.\n\nFor these peculiarities of things, which have an eternal subsistence, are simple, and entirely exempt.\n\nThe inquiry, however, proceeds imperfectly.\n\nFor it was necessary, in the first place, to inquire what the peculiarities are of the more excellent genera, according to essence; in the next place, what they are according to power; and thus afterwards, what they are according to energy.\n\nBut, as your question now stands, with respect to the peculiarities by which these genera are separated, you alone speak of the peculiarities of energies.\n\nHence you inquire concerning the difference in the last things pertaining to them; but you leave uninvestigated such things as are first, and most honourable in them, and which are the elements of their difference.\n\nIn the same place, also, something is added concerning “ efficacious and passive motions ,” which is a division by no means adapted to the difference of the more excellent genera.\n\nFor the contrariety of action and passion is not inherent in any one of them; but their energies are unrestrained, immutable, and without habitude to their opposites.\n\nHence, neither must we admit in them motions of such a kind as arise from action and passion.\n\nFor neither do we admit in the soul a self-motion, which consists 28 of the mover and that which is moved; but we conceive that it is a certain simple essential motion, subsisting from itself, and not possessing a habitude to another thing, and exempt from acting on, and suffering from, itself.\n\nWho, therefore, can endure that the peculiarities of the genera superior to the soul, should be distinguished according to active or passive motions?\n\nThat also which is added by you, “ or of accidents ,” is foreign from these genera.\n\nFor in composites, and things which exist together with, or in others, or are comprehended by others, some things are conceived to be precedaneous, but others consequent; and some as essences, but others, as afterwards acceding to essences.\n\nFor there is a certain coarrangement of them, and incongruity and interval intervenes.\n\nBut, in the more excellent genera, all things must be conceived in τῳ ειναι , i.\n\ne.\n\nin merely existing ; and wholes have a precedaneous subsistence, are separate by themselves, and have not their hypostasis from, or in others; so that there is not any thing in them which is accidental.\n\nHence the peculiarity of them is not characterized from accidents.\n\nAt the end, likewise, of your inquiry, you 29 introduce a distinction according to nature.\n\nFor your question asks, “ How essences are known by energies, by physical motions, and by accidents?\n\n” The very contrary, however, to all this takes place.\n\nFor if energies and motions were constitutive of essences, they would be the lords of the difference which is between them.\n\nBut if essences generate energies, the former being separate prior to the latter, will impart to motions, energies, and accidents, that by which they differ from each other."

