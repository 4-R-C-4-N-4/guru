[content]
body = "Hence you in vain doubt, “ that it is not proper to look to human opinions .” For what leisure can he have whose intellect is directed to the Gods to look downward to the praises of men? Nor do you rightly doubt in what follows, viz. “ that the soul devises great things from casual circumstances .” For what principle of fictions can there be in truly existing beings? Is it not the phantastic power in us which is the maker of images? But the phantasy is never excited when the intellectual life energizes perfectly. And is not truth essentially coexistent with the Gods? Is it not, likewise, concordantly established in intelligibles? It is in vain, therefore, that things of this kind are disseminated by you and others. But neither do those 329 things for which certain futile and arrogant men calumniate the worshipers of the Gods, the like to which have been asserted by you, at all pertain to true theology and theurgy. And if certain things of this kind germinate in the sciences of divine concerns, as in other arts evil arts blossom forth; these are doubtless more contrary to such sciences than to any thing else. For evil is more hostile to good than to that which is not good."

