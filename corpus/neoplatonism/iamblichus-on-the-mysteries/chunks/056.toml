[content]
body = "Another species of divine divination which is much celebrated, most manifest and manifold, is that of oracles, about which you say as follows: “ There are some who drink water, as the priest of Clarius, in Colophon; [59] but others are seated at the mouth [of a cavern], as those who prophesy at Delphi; and others imbibe the vapour from water, as the prophetesses in 141 Brandchidæ .” [60] You have, therefore, made mention of these three oracles by name, not that there are only these, for there are many more which you have omitted, but as these are more celebrated than the rest, and, at the same time, because through these you may be sufficiently instructed in the mode of divination sent to men from the Gods, hence, as it appears to me, you were satisfied with these.\n\nWe, therefore, likewise shall discuss these three, omitting to speak about the many other oracles that exist.\n\nIt is acknowledged then by all men, that the oracle in Colophon gives its answers through the medium of water.\n\nFor there is a fountain in a subterranean dwelling from which the prophetess drinks; and on certain established nights, after many sacred rites have been previously performed, and she has drank of the fountain, she delivers oracles, but is not visible to those that are present.\n\nThat this water, therefore, is prophetic, is from hence manifest.\n\nBut how it becomes so, this, according to the proverb, is not for every man to know.\n\nFor it appears as if a certain prophetic spirit pervaded through the water.\n\nThis is not, however, in reality the case.\n\nFor a divine nature does not 142 pervade through its participants in this manner, according to interval and division, but comprehends as it were externally, and illuminates the fountain, [61] and fills it from itself with a prophetic power.\n\nFor the inspiration which the water affords is not the whole of that which proceeds from a divine power, but the water itself only prepares us, and purifies our luciform spirit, [62] so that we may be able to receive the divinity; while, in the mean time, there is a presence of divinity prior to this, and illuminating from on high.\n\nAnd this, indeed, is not absent from any one, who through aptitude is capable of being united to it.\n\nBut this divine illumination is immediately present, and uses the prophetess as an instrument; she neither being any longer mistress of herself, nor capable of attending to what she says, nor perceiving where she is.\n\nHence, after prediction, she is scarcely able to recover herself.\n\nAnd before she drinks the water, she abstains from food for a whole day and night; and retiring to certain sacred places, inaccessible to the 143 multitude, begins to receive in them the enthusiastic energy.\n\nThrough her departure, therefore, and separation from human concerns, she renders herself pure, and by this means adapted to the reception of divinity: and from hence she possesses the inspiration of the God, shining into the pure seat of her soul, becomes full of an unrestrained afflatus, and receives the divine presence in a perfect manner, and without any impediment.\n\nBut the prophetess in Delphi, whether she gives oracles to mankind through an attenuated and fiery spirit, bursting from the mouth of the cavern, or whether being seated in the adytum on a brazen tripod, or on a stool with four feet, she becomes sacred to the God; whichsoever of these is the case, she entirely gives herself up to a divine spirit, and is illuminated with a ray of divine fire.\n\nAnd when, indeed, fire ascending from the mouth of the cavern circularly invests her in collected abundance, she becomes filled from it with a divine splendour."

