[content]
body = "Moreover, neither is it sufficient to assert, “ that nature, art, and the sympathy of things in the universe, as if they were the parts of one animal, contain premanifestations of certain 188 things with reference to each other; nor that bodies are so prepared, that there is a presignification of some by others .” For these things, which are very clearly seen, exhibit a certain divulsed vestige of divine prediction, in a greater or less degree; since it is not possible for any thing to be perfectly destitute of divine divination.\n\nBut as in all things the image of good exhibits a similitude of divinity; thus, likewise, in all things a certain obscure or more manifest image of divine prediction shines forth to the view.\n\nNevertheless, no one of these is such as the divine species of divination; nor must the one, divine, and unmingled form of it be characterized from the many phantasms which proceed from it into generation.\n\nNor, if there are certain other false and deceitful resemblances, which are still more remote from reality, is it fit to adduce these in forming a judgment of it.\n\nBut the divine form or species of divination is to be apprehended according to one intelligible and immutable truth; and the mutation which subsists differently at different times is to be rejected as unstable and unadapted to the Gods.\n\nIf, therefore, that which is truly divination is a thing of this kind, i.\n\ne.\n\nis a divine work, who would not blush to ascribe it to nature, which produces its effects without reason and intellect, as if 189 nature elaborated in us a certain prophetic apparatus, and inserted this aptitude in some things in a greater but in others in a less degree?\n\nFor in those things in which men receive auxiliaries from nature in the attainment of their proper perfection, in these, also, certain aptitudes of nature precede; but in things in which no human work is proposed [to be effected], in these neither does the end pertain to us.\n\nAnd when a certain good, which is more ancient than our nature, has a prior arrangement, it is not possible in this case that a certain natural excellence should become the prepared subject of it.\n\nFor in those things of which there are perfections, in these imperfect preparations are ingenerated; but both these are the habits of men [and not of Gods].\n\nHence, of those things which are not present with us, so far as we are men, there will not be a preparative from nature.\n\nThere is not, therefore, a natural seed in us of divine prediction.\n\nIf some one, however, should in a more general way assert, that there is a certain human divination, of this there will be a certain physical preparation.\n\nBut with respect to that which may be truly denominated divination, and which pertains to the Gods, it is not proper to think that this is ingrafted by nature.\n\nFor both other things, and also the indefinite, according 190 to the more and the less, are the attendants on this.\n\nHence it is separated from divine divination, which abides in stable boundaries.\n\nOn this account, also, it is requisite strenuously to contend against him who asserts that divination originates from us.\n\nYou likewise adduce clear indications of this from the works performed in predicting what is future.\n\nFor you say, “ that those who invoke [the divinities for the purposes of divination] have about them stones and herbs, bind certain sacred bonds, which they also dissolve, open places that are shut, and change the deliberate intentions of the recipients, so as to render them worthy, though they were before depraved .” All these particulars, therefore, signify that the inspiration accedes externally."

