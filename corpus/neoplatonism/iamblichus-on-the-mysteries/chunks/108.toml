[content]
body = "For, in short, the vehicle [108] which is subservient to dæmons neither consists of matter, nor of the elements, nor of any other of the bodies known to us. What perfect supply of food, therefore, can there be from one essence to another [specifically different]? Or what enjoyment can accede from foreign to foreign natures? There cannot be any. But much more, as the Gods by the fire of lightning divide matter, and separate from it things which are essentially 247 immaterial, but which are vanquished and bound by it, and render them impassive from being passive; thus also the fire that is with us, imitating the energy of divine fire, destroys every thing which is material in sacrifices, purifies the things which are offered, liberates them from the bonds of matter, and renders them, through purity of nature, adapted to the communion of the Gods. It likewise liberates [109] us after the same manner from the bonds of generation, assimilates us to the Gods, causes us to be adapted to their friendship, and conducts our material nature to an immaterial essence. 248"

