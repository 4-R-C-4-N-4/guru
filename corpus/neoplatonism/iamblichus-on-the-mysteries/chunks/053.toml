[content]
body = "If, therefore, true divination was a solution of the divine part of the soul from the other parts of it, or if it was a separation of intellect, or a certain extension of it; or if it was a vehemence 128 and extension of energy or passion, or an acuteness and motion of dianoia, or a fervour of intellect; then, since all such like particulars are excited by our soul, enthusiasm might be reasonably supposed to be the offspring of the soul. If, however, the body, on account of certain temperaments, whether they are such as are melancholic, or any other, or, to speak more particularly, on account of heat, or cold, or moisture, or a certain specific quality of these, or the mixture or temperature of these in a certain proportion, or the pneumatic part of the soul, or the more and the less of these; if any one of these is established as the cause of enthusiastic alienation, in this case, the alienation will be a corporeal passion, and will be excited by physical motions. But if its excitation originates from both the soul and the body, so far as these coalesce with each other, a motion of this kind will be common to the animal [produced by the union of the two]. The enthusiastic energy, however, is not the work either of the body or the soul, or of both conjoined. For these do not contain in themselves a certain cause of divine alienation, nor are things of a more excellent nature adapted to be generated by such as are less excellent. But it is necessary to investigate the causes of divine mania. And these are the illuminations 129 proceeding from the Gods, the spirits imparted by them, and the all perfect domination of divinity, which comprehends indeed every thing in us, but exterminates entirely our own proper consciousness and motion. This divine possession, also, emits words which are not understood by those that utter them; for they pronounce them, as it is said, with an insane mouth, and are wholly subservient, and entirely yield themselves to the energy of the predominating God. The whole of enthusiasm is a thing of this kind, and is effected by these causes, though this must not be considered as asserted with consummate accuracy."

