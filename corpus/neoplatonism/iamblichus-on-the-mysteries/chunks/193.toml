[content]
body = "Moreover, if it should happen that the whole race of some one successively use land which had originally been plundered, in this case, the injury in the first place becomes immanifest, and on this account is more difficult to be cured; and, in the next place, time causes the evil to become as it were natural.\n\nHence the Gods frequently predict to men that they should go to such or such places, and that an apology should be made to this man, who was never known to them, and that he should be appeased, in order that thus they may obtain a remedy and be liberated from their difficulties, and that the punishments inflicted on them by the Furies may cease.\n\nThe Gods, however, predict, not for the purpose of taking away punishment, but in order that justice may be done, and that we may be amended.\n\nThe telestic art, therefore, renders him better who possesses the mania which it imparts, and through him saves also many others.\n\nThus, for instance, it is related of one who was cutting down an oak, and though he was called on by a Nymph not to cut it down, yet persisted in felling it, that he was punished for so doing by the avenging Furies, that he was in want of necessary food, and that if at any time he met with it, it was immediately taken from him, till one who possessed the telestic art told him to raise an altar and sacrifice to this Nymph, for thus he would be liberated from his calamities.\n\nAnother person, likewise, who had slain his mother, was freed from the punishment inflicted on him by the Furies by migrating to another country, conformably to the mandate of divinity, and there fixing his abode.” 58 .\n\nThis is because Rhea, the mother of the Gods, is a vivific Goddess, being filled indeed (says Proclus, in Plat.\n\nTheol.\n\nlib.\n\nv.\n\nc.\n\nxi.) from the father prior to her [ i.\n\ne.\n\nfrom Saturn] with intelligible and prolific power, but filling the Demiurgus [Jupiter], who derives his existence from her, with vivific abundance.\n\n59 .\n\nSee, concerning this oracle, Scholiastes Apollonii ad i.\n\nlibrum, et Tacitus ii.\n\nAnnal.\n\n60 .\n\nThis oracle is mentioned by Herodotus, l.\n\ni., by Strabo, l.\n\nxiv.\n\nand by Ammian.\n\nMarcell.\n\nlib.\n\nxxix.\n\n61 .\n\nSee Plutarch in his treatise De Defectu Oraculorum.\n\n62 .\n\nSee Plutarch in the above mentioned treatise.\n\nConcerning this luciform spirit, or vehicle, which is immortal, and which is called by Olympiodorus αυγοειδες χιτων , a luciform vestment , see my Translation of the fifth book of Proclus on the Timæus.\n\n63 .\n\nIt was usual for those who prophesied to carry a wand.\n\nTiresias had a sceptre, and Abaris an arrow.\n\nThe Scholiast on Nicander says, that the Egyptian and Scythian magi, and also many of those in Europe, prophesied with wands.\n\nAnd Eustathius on the Odyssey, p.\n\n1657, observes, “that there is a certain magic in divine wands,” esse in ραβδοις θειοις τινα μαγειαν .\n\n64 .\n\nThat is, to partake of an illumination, which has no σχεσις , or habitude , to any thing material.\n\n65 .\n\nFor ἡ προιουσα here, it seems necessary to read ἢ προιουσα .\n\n66 ."

