body = "But, in consequence of her alliance to this order, she produces twofold guardian triads, one in conjunction with her father, but the other herself by and from herself, imitating in this respect the whole vivific Goddess [Rhea] who constitutes the first Curetes.” 54 .\n\nThese Gods are called unpolluted , because they are the causes of purity .\n\nFor every God begins his own energy from himself, and is that primarily which his effects are secondarily.\n\n55 .\n\nFor περιοδοις here, it is necessary to read προοδοις .\n\n56 .\n\nServius, in commenting on the “Mystica vannus Iacchi” of Virgil, observes, that the sacred rites of Bacchus pertained to the purification of souls, “Liberi patris sacra ad purgationem animarum pertinebant.” And elsewhere he says, “Animæ aere ventilantur, quod erat in sacris Liberi purgationis genus.” Euripides also, in Bacchis, exclaims, Ω μακαρ οστις ευδαιμων τελετας Θεων Ειδως, βιοταν αγιστευει, Και θιασευεται ψυχαν, Εν ορεσι βακχευων Οσιοισι καθαρμοις.\n\ni.\n\ne.\n\n“O blessed and happy he, who knowing the mysteries of the Gods, sanctifies his life, and purifies his soul, celebrating orgies in the mountains, with holy purifications.” 57 .\n\n“In the greatest diseases and labours (says Plato in the Phædrus) to which certain persons are sometimes subject through the ancient indignation of the Gods, in consequence of former guilt , mania when it takes place, predicting what they stand in need of, discovers a liberation from such evils by flying to prayer and the worship of the Gods.\n\nHence, obtaining by this means purifications and the advantages of initiation, it renders him who possesses it free from disasters both for the present and future time, by discovering to him who is properly insane, and possessed by divinity, a solution of the present evils.” And the Platonic Hermias beautifully unfolds the meaning of this ancient indignation of the Gods, through former guilt, as follows: “Offences which have been committed for a great length of a time, are more difficult to be washed away, and a liberation from them can alone be effected by the telestic art; but those that have been committed for a shorter time are more easily cured.\n\nThus, also, we see in the medical art, that maladies which have existed but for a little time, if they are paid attention to at their commencement, are easily remedied, but that when they are of long standing, they are more difficultly healed.\n\nFor the evil in this case becomes as it were natural and confirmed by habit, and resembles an indurated ulcer.\n\nA similar thing to this, therefore, takes place in guilty conduct.\n\nHence, if he who has committed an injury, immediately repents, and acknowledges his guilt to him whom he has injured, he dissolves the injury, and renders himself no longer obnoxious to justice.\n\nBut when some one dissolves an injury committed by his father, by restoring, for instance, land which he had unjustly taken, he then makes himself to be unobnoxious to justice, and lightens and benefits the soul of his father.\n\nThese things, however, the telestic art more swiftly remedies."

