body = "It is well observed by Ficinus, in lib.\n\ni.\n\nEunead.\n\nii.\n\nPlotin.\n\n“that the fire which is enkindled by us is more similar to the heavens than other terrestrial substances.\n\nHence it participates of light, which is something incorporeal, is the most powerful of all things, is as it were vital, is perpetually moved, divides all things, without being itself divided, absorbs all things in itself, and avoids any foreign mixture: and lastly, when the fuel of it is consumed, it suddenly flies back again to the celestial fire, which is every where latent.” 108 .\n\nFor this vehicle is luciform, and consists of pure, immaterial, unburning, and vivific fire.\n\nSee the fifth book of my translation of Proclus on the Timæus.\n\n109 .\n\nProclus in Tim.\n\nlib.\n\nv.\n\nobserves concerning the telestic art, or the art which operates through mystic ceremonies, “that, as the oracles teach, it obliterates through divine fire all the stains produced by generation.” Η τελεστικη δια του θειου πυρος αφανιζει τας εκ της γενεσεως απασας κηλιδας, ως τα λογια διδασκει.\n\nHence another Chaldean oracle says, τῳ πυρι γαρ βροτος εμπελασας θεοθεν φαος εξει .\n\ni.\n\ne.\n\n“The mortal who approaches to fire will have a light from divinity.” Hercules, as we also learn from Proclus, was an example of this telestic purification.\n\nFor he says, Ηρακλης δια τελεστικης καθῃραμενος, και των αχραντων καρπων μετασχων, τελειας ετυχε εις τους θεους αποκαταστασεως , in Plat.\n\nPolit.\n\np.\n\n382.\n\ni.\n\ne.\n\n“Hercules being purified through the telestic art, and participating of undefiled fruits, obtained a perfect restoration to the Gods.” 110 .\n\nIn the original, λεγω δε της θειας ψυχης τε και φυσεως, αλλ’ ουχι της περικοσμιου τε και γενεσιουργου .\n\nBut it appears to me that we should here read, conformably to the above translation, λεγω δε της θειας, ψυχης τε και ψυσεως, αλλ’ ουχι μονου της περικοσμιου τε και γενεσιουργου .\n\n111 .\n\nThese media consist of the order of Gods denominated αρχαι , or rulers , and of those called απολυτοι , or liberated ; the former of which also are denominated supermundane , and the latter supercelestial , in consequence of existing immediately above the celestial Gods.\n\nSee, concerning these media, the sixth book of my translation of Proclus on the Theology of Plato."

