[content]
body = "The wise, therefore, speak as follows: The soul having a twofold life, one being in conjunction with body, but the other being separate from all body; when we are awake we employ, for the most part, the life which is common with the body, except when we separate ourselves entirely from it by pure intellectual and dianoetic energies. But when we are asleep, we are perfectly liberated, as it were, from certain surrounding bonds, and use a life separated from generation. Hence, this form of life, whether it be intellectual or divine, and whether these two are the same thing, or whether each is peculiarly of itself one thing, is then excited in us, and energizes in a way 119 conformable to its nature. Since, therefore, intellect surveys real beings, but the soul contains in itself the reasons of all generated natures, it very properly follows that, according to a cause which comprehends future events, it should have a foreknowledge of them, as arranged in their precedaneous reasons. And it possesses a divination still more perfect than this, when it conjoins the portions of life and intellectual energy to the wholes from which it was separated. For then it is filled from wholes with all scientific knowledge, so as for the most part to attain by its conceptions to the apprehension of every thing which is effected in the world. Indeed, when it is united to the Gods, by a liberated energy of this kind, it then receives the most true plenitudes of intellections, from which it emits the true divination of divine dreams, and derives the most genuine principles of knowledge. But if the soul connects its intellectual and divine part with more excellent natures, then its phantasms will be more pure, whether they are phantasms of the Gods, or of beings essentially incorporeal, or, in short, of things contributing to the truth of intelligibles. If, also, it elevates the reasons of generated natures, contained in it to the Gods, the causes of them, it receives power from them, and a knowledge which 120 apprehends what has been, and what will be; it likewise surveys the whole of time, and the deeds which are accomplished in time, and is allotted the order of providentially attending to and correcting them in an appropriate manner. And bodies, indeed, that are diseased it heals; but properly disposes such things as subsist among men erroneously and disorderly. It likewise frequently delivers the discoveries of arts, the distributions of justice, and the establishment of legal institutions. Thus in the temple of Esculapius, diseases are healed through divine dreams; and, through the order of nocturnal appearances, the medical art is obtained from sacred dreams. Thus, too, the whole army of Alexander was preserved, which would otherwise have been entirely destroyed in the night, in consequence of Bacchus appearing in sleep, and pointing out a solution of the most grievous calamities. The city Aphutis, likewise, when besieged by King Lysander, was saved through a dream sent to him by Jupiter Ammon. For afterwards, he most rapidly withdrew his army from thence, and immediately raised the siege. What occasion, however, is there to be prolix in mentioning every particular of things which happen daily, and which exhibit an energy superior to all language? What, therefore, 121 has been said concerning divine divination in sleep is sufficient to show what it is, how it is effected, and what advantage it affords to mankind."

