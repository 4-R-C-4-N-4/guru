[content]
body = "In the first place, therefore, you ask me to explain to you distinctly, “ what that is which is effected in the foreknowledge of future events? ” Immediately, however, that which you endeavour to learn is impossible. For, according to the meaning of your question, you think that foreknowledge is something which is generated, or subsists in becoming to be, and pertains to things which have a natural subsistence. It is not, however, one of the things which have their existence in becoming to be, nor is it effected after the manner of physical mutation, nor is it invented and devised as something useful for the purposes of life, nor in short, is it a human work, but is divine and supernatural, and is supernally sent to us from the heavens. It is also unbegotten and eternal, and spontaneously has a precedaneous subsistence. The greatest remedy, therefore, for all such doubts is this, to know the principle of divination, 113 that it neither originates from bodies, nor from the passions about bodies, nor from a certain nature, and the powers about nature, nor from any human apparatus, or the habits pertaining to it. But neither does it originate from a certain art, externally acquired, about a certain part of such things as are subservient to life. For the whole authority of it pertains to the Gods, and is imparted by them; it is also effected by divine works, or signs; and it possesses divine spectacles, and scientific theorems. All other things, however, are subjected as instruments to the gift of foreknowledge transmitted from the Gods; viz. such things as pertain to our soul and body, and such as are in the nature of the universe, or are inexistent in particular natures. But some things are previously subjacent, as in the order of matter, such as places, or certain other things of the like kind. If some one, however, dismissing primordial causes, should refer divination to secondary offices, such as the motions of bodies, or the mutations of passions, or certain other motions, or the energies of human life, or animal or physical reasons, and should think that in so doing he asserts something manifest; or if, considering the symmetries of these with reference to each other, as causes, he should apprehend 114 that he can assign something accurate concerning divination, he wholly deviates from the truth. But the one right boundary, and the one principle of all these particulars, is by no means to produce without a cause the foreknowledge of futurity, from things which have no prescience in themselves, but to survey from the Gods who contain in themselves the terminations of all the knowledge of beings, divination distributed about the whole world, and about all the natures that are separately contained in it. For such a cause as this is primordial, and is especially most common, containing in itself primarily those things which it gives to its participants, and particularly imparting truth, of which divination is in want; and antecedently comprehending the essence and cause of future events, from which foreknowledge necessarily and incessantly proceeds. Let such a principle as this, therefore, be the origin in common of all divination, from which it is possible to discover scientifically all the species of it; which we shall now unfold, conformably to the questions proposed by you. 115"

