[content]
body = "Here, therefore, the same reasoning is likewise sufficient. For with us the enjoyment of bodies which once were united to soul, impresses in us heaviness and defilement, ingenerates in us voluptuousness, and produces many other diseases in the soul. But with the Gods, and with mundane and total causes, this is by 228 no means the case. For the exhalation which ascends after a divine manner from animals that are sacrificed, as it is comprehended by, and does not comprehend, the Gods, and as it is also connected with the universe, but does not conjoin wholes and the Gods to itself, is in consequence of this coadapted to superior beings and to total causes, but does not restrain them and coadapt them to itself."

