[content]
body = "Leaving, therefore, these particulars, you wish in the next place that I would unfold to you “ What the Egyptians conceive the first cause to be; whether intellect, or above intellect; whether alone, or subsisting with some other or others; whether incorporeal, of corporeal; and whether it is the same with the Demiurgus, or is prior to the Demiurgus? Likewise, whether all things are from one principle, or from many principles; whether they have a knowledge of matter, or of primary corporeal qualities; and whether they admit matter to be unbegotten, or to be generated? ” I, therefore, will in the first place relate to you the cause why in the books of the ancient writers of sacred concerns many and various opinions concerning these things are circulated, and also why among those that are still living, and are renowned for their wisdom, the opinion on this subject is not simple and one. I say then, that as there are 300 many essences, and these differing from each other, the all-various multitude of the principles of these, and which have different orders, were delivered by different ancient priests. As Seleucus narrates, therefore, Hermes described the principles that rank as wholes in two myriads of books; or, as we are informed by Manetho , he perfectly unfolded these principles in three myriads six thousand five hundred and twenty five volumes. But different ancient writers differently explained the partial principles of essences. It is necessary, however, by investigation to discover the truth about all these principles, and concisely to unfold it to you as much as possible. And, in the first place, hear concerning that which is the first subject of your inquiry. 301"

