[content]
body = "In addition also to these peculiarities, divine beauty, indeed, shines with an immense splendour as it were, fixes the spectators in astonishment, imparts a divine joy, presents itself to the view with ineffable symmetry, and is exempt from all other species of pulchritude.\n\nBut the blessed spectacles of archangels have indeed themselves the greatest beauty, yet are not so ineffable and admirable as those of the Gods.\n\nThose of angels divide, in a partible manner, the beauty which they receive from archangels.\n\nBut the dæmoniacal and heroical self-visive spirits, have both of them beauty in definite forms, yet the former is adorned in reasons which define the essence, and the latter exhibits fortitude.\n\nThe phasmata of archons may be divided in a twofold respect.\n\nFor some of them exhibit a beauty which is spontaneous, and of a ruling characteristic; but others, an elegance of form which is fictitious and renovated.\n\nAnd the phasmata of souls are, indeed, adorned in definite reasons, but these reasons are more divided than those in heroes, are partibly circumscribed, and are vanquished by one form.\n\nIf, however, it be requisite to define all of them in common, I say that each participates of beauty according to its arrangement, the peculiar nature which it possesses, and its allotment.\n\n89"

