[content]
body = "In the last place, the dispositions of the soul of those that invoke the Gods to appear receive, when they become visible, a liberation from the passions, a transcendent perfection, and an energy entirely more excellent, and participate of divine love and an immense joy. But when archangels appear, these dispositions receive a pure condition of being, intellectual contemplation, and an immutable power. When angels appear, they participate of intellectual wisdom and truth, pure virtue, stable knowledge, and a commensurate order. But when dæmons are seen, they receive the appetite of generation and a desire of nature, together with a wish to accomplish the works of Fate, and a power effective of things of this kind. If heroes are seen, they derive from the vision other such like manners and many impulses, which contribute to the communion of souls. But when 102 these dispositions come into contact with archons, mundane or material, motions are excited in conjunction with the soul. And, together with the vision of souls, the spectators derive genesiurgic tendencies and connascent providential inspections, for the sake of paying attention to bodies, and such other peculiarities as are allied to these. In addition to these things, also, the manifestation of the Gods imparts truth and power, rectitude of works, and gifts of the greatest goods; but the manifestation of other powers is appropriately accompanied by such things as are commensurate to their several orders. Thus the manifestation of archangels imparts truth, not simply about all things, but definitely of certain things; and this not always, but sometimes; nor indefinitely to all, or every where, but with limitation, in a certain place, or to a certain individual. In like manner it does not impart a power effective of all things, nor always without distinction, nor every where; but a power which is effective sometimes, and in a certain place. But the manifestation of angels, in a still greater degree than that of archangels, divides, in imparting good, the circumscriptions which are always defined by them in more contracted boundaries. Again, the manifestation of dæmons does not impart 103 the goods of the soul, but either those of the body, or goods pertaining to the body. And they impart these when the order of the world permits them. After the same manner, likewise, the manifestation of heroes imparts second and third goods, and regards as its scope the whole terrestrial and mundane polity of souls. With respect to archons, the manifestation of some of these imparts mundane benefits, and all the goods of life; but that of others of an inferior rank imparts not a few of the prerogatives of material natures. And souls, when they appear, procure for those that behold them things which contribute to the benefit of human life. Thus, therefore, we have appropriately defined the gifts of these powers, conformably to the proper order of each; and the particulars in the manifestations about which you inquired, have received a fit reply. And thus much for these questions."

