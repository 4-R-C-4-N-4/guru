body = "Lond.\n\n1676.\n\np.\n\n211.\n\n7 .\n\nArrian.\n\nde Exped.\n\nAlex.\n\nl.\n\niv.\n\net Curt.\n\nlib.\n\nviii.\n\n8 .\n\nVit.\n\nArtaxerx.\n\nÆlian.\n\nVar.\n\nHist.\n\nlib.\n\ni.\n\nc.\n\n21.\n\n9 .\n\nJustin.\n\nlib.\n\nvi.\n\n10 .\n\nPanegyr.\n\n11 .\n\nLib.\n\nvii.\n\n12 .\n\nLib.\n\nvi.\n\ncap.\n\niii.\n\n13 .\n\nΚαι κολασεως δε ειδος ειναι αθειαν ουκ απεικος.\n\nτους γαρ γνοντας θεους, και καταφρονησαντας, ευλογον εν ετερῳ βιῳ και της γνωσεως στερεσθαι, και τους εαυτων βασιλεας ως θεους τιμησαντας, εδει την δικην αυτων ποιησαι των θεων εκπεσειν.\n\nCap.\n\nxviii.\n\n14 .\n\nκαι χρη τον επι τας αρχας αναβαινοντα ζητειν, ει δυνατον ειναι τι κρειττον της υποτεθεισης αρχης κᾳν ευρεθῃ, παλιν επ’ εκεινου ζητειν, εως αν εις τας ακροτατας εννοιας ελθωμεν, ων ουκετι σεμνοτερας εχομεν· και μη στησαι την αναβασιν.\n\nουδε γαρ ευλαβητεον μη κενεμβατωμεν, μειζονα τινα και υπερβαινοντα τας πρωτας αρχας περι αυτων εννοουντες.\n\nου γαρ δυνατον τηλικουτον πηδημα πηδησαι τας ημετερας εννοιας, ως παρισωθηναι τῃ αξιᾳ των πρωτων αρχων, ου λεγω και υπερπτηναι.\n\nμια γαρ αυτη προς θεον ανατασις αριστη, και ως δυνατον απταιστος."

