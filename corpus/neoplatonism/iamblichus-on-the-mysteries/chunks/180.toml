[content]
body = "And the God Eicton is said to be the first paradigm, and this is also asserted of Phanes.\n\nP.\n\n123 .\n\nFor the books which are circulated under the name of Hermes, contain Hermaic opinions, though they frequently employ the language of the philosophers: for they were translated from the Egyptian tongue by men who were not unskilled in philosophy.\n\nA few only of these books are now extant, but what is here said by Iamblichus sufficiently proves their authenticity, and that they contain the genuine doctrines of Hermes.\n\nThey have doubtless, however, been occasionally interpolated by some of the early Christians, though not to that extent which modern critics, and that mitred sophist Warburton, suppose.\n\nP.\n\n123 .\n\nAnd such as have written concerning the decans.\n\nThe twelve parts, mentioned in the preceding chapter, into which the Egyptians divide the heavens, are the twelve signs of the zodiac.\n\nBut the thirty-six parts are the twelve houses of the planets, divided into three other portions, which they call decans.\n\nPtolemy, however, in his Quadripartite, subverts this doctrine of the Egyptians.\n\nConcerning these decans, see Scaliger ad Manilium, Kircher II.\n\nparte Oedipi, and Salmasius de Annis climactericis.\n\nGale also gives the following extract from Hermes relative to the decans, which had not been before published, and which he derived from a MS.\n\ncopy of Stobæus in the possession of Vossius.\n\n363 Φαμεν ω τεκνον, περιεκτικον των απαντων ειναι το σωμα.\n\nεννοησον ουν αυτο ωσπερ κυκλοειδες σχημα——υπο δε τον κυκλον του σωματος τουτου τεταχθαι τους λϛ δεκανους, μεσους του παντος κυκλου του ζωδιακου.——νοησωμεν ωσπερει φυλακας αυτους προϊστασθαι των εν κοσμῳ απαντων παντα συνεχοντας——και τηρουντας την των παντων ευταξιαν.——ετι δε νοησον ω Τατ, οτι απαθεις εισιν ων οι αλλοι αστερες πασχουσιν.\n\nουτε γαρ επεχομενοι τον δρομον στηριζουσιν, ουτε κωλυομενοι αναποδιζουσιν, αλλ’ ουδε μην απο του φωτος του ηλιου σκεπονται, απερ πασχουσιν οι αλλοι αστερες."

