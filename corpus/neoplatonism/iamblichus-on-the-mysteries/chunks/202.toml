[content]
body = "Η γοητεια δε εστι τεχνη τις περι τους ενυλους και χθονιους δαιμονας φαντασιοσκοπουσα τοις εποπταις τα τουτων ειδωλα.\n\nκαι τους μεν ωσπερ εξ αδου αναγουσα, τους δε υψοθεν καταγουσα, και τουτους κακωτικους.\n\nκαι ειδωλα αττα υφιστησι φαντασματα τοις θεωροις των τουτων.\n\nκαι τοις μεν ρευματα τινα εκειθεν κυμαινοντα επαφιησι· τοις δε δεσμων ανεσεις και τρυφας, και χαριτας επαγγελλεται.\n\nεπαγεται δε τας τοιαυτας δυναμεις, και ασμασι και επασμασιν.\n\nη δε μαγεια πολυδυναμον τι χρημα τοις Ελλησιν εδοξε.\n\nμεριδα γουν ειναι ταυτην φασιν εσχατην της ιερατικης επιστημης.\n\nανιχνευουσα γαρ των υπο την σεληνην παντων την τε ουσαν και φυσιν, και δυναμιν και ποιοτητα.\n\nλεγω δε στοιχειων και των τουτων μεριδων, ζωων, παντοδαπων φυτων, και των εντευθεν καρπων, λιθων, βοτανων, και απλως ειπειν, παντος πραγματος, υποστασιν τε και δυναμιν.\n\nεντευθεν αρα τα εαυτης εργαζεται.\n\nαγαλματα τε υφιστησιν υγειας περιποιητικα, και σχηματα ποιειται παντοδαμα· και νοσοποια δεμιουργηματα ετερα."

