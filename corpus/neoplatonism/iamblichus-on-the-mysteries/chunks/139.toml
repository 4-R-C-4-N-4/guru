[content]
body = "These things, therefore, having been accurately discussed, the solution of the doubts which you have met with in certain books will be manifest. For the books which are circulated under the name of Hermes contain Hermaic opinions, though they frequently employ the language of the philosophers: for they were translated from the Egyptian tongue by men who were not unskilled 305 in philosophy. But Chæremon, and any others who have at all discussed the first causes of mundane natures, have unfolded the last rulers of these. And such as have written concerning the planets, the zodiac, the decans, horoscopes, and what are called powerful and leading planets, these have unfolded the partible distributions of the rulers. The particulars, also, contained in the Calendars comprehend a certain very small part of the Hermaic arrangements. And the causes of such things as pertain to the phases or occultations of the stars, or to the increments and decrements of the moon, are assigned by the Egyptians the last of all. The Egyptians, likewise, do not say that all things are physical. For they separate the life of the soul and the intellectual life from nature, not only in the universe, but also in us. And admitting intellect and reason to subsist by themselves, they say that generated essences were thus fabricated. They likewise arrange the Demiurgus as the primary father of things in generation; and they acknowledge the existence 306 of a vital power, prior to the heavens, and subsisting in the heavens. They also establish a pure intellect above the world, and one impartible intellect in the whole world, and another which is distributed into all the spheres. And these things they do not survey by mere reason alone, but through the sacerdotal theurgy, they announce that they are able to ascend to more elevated and universal essences, and to those that are established above Fate, viz. to God and the Demiurgus; neither employing matter, nor assuming any other thing besides, except the observation of a suitable time."

