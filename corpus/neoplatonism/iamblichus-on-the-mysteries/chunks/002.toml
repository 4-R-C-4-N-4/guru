[content]
body = "We shall, therefore, deliver to you the peculiar dogmas of the Assyrians; and also clearly develop to you our own opinions; collecting some things from the infinite writings of the ancients, but others from those particulars which were comprehended by the ancients in one treatise, and pertain to the whole knowledge of divine natures. If also you should propose any philosophic inquiry, we shall discuss it for you, according to the ancient pillars of Hermes, which Plato and Pythagoras knew before, and from thence constituted their philosophy. But such things as exhibit foreign inquiries, or which are contradictory and contentious, we shall assist mildly and aptly, or we shall demonstrate their absurdity. Such, likewise, as proceed conformably to common conceptions, we shall endeavour to discuss in a way perfectly known and clear. And things, indeed, which require the experience of divine operations to an accurate knowledge of them, we shall explain, as far as this is possible to be effected by words alone; but such as are 22 full of intellectual theory, we shall develop with a view to the purification of the soul. But indications of this theory worthy of notice may be mentioned, by which it is possible for you, and those who resemble you, to be conducted by intellect to the essence of [real] beings. And with respect to such things as become known by a reasoning process, we shall leave no one of these without a perfect demonstration. But in all things we shall give to each that which is appropriate. And such questions, indeed, as are theological, we shall answer theologically; such as are theurgic, theurgically; but such as are philosophical, we shall, in conjunction with you, philosophically explore. Of these, also, such as extend to first causes, we shall unfold into light, by following them conformably to first principles. But such as pertain to morals, or to ends, we shall fitly discuss, according to the ethical mode. And, in a similar manner, we shall examine other things methodically and appropriately. Let us, therefore, now betake ourselves to your inquiries. 23"

