[content]
body = "What, therefore, shall we derive from the Gods who are entirely exempt from all human generation, with respect to sterility, or abundance or any thing else pertaining to [the mortal] life? Nothing whatever. For it is not the province of those who are liberated from all things to meddle with gifts of this kind. 254 But if some one should say that the perfectly immaterial comprehend in themselves the material Gods, and that through this they also contain in themselves their gifts according to one first cause; such a one will also say, that in consequence of this an abundance of divine gifts descend from the immaterial Gods. It must not, however, be granted to any one to say that the immaterial Gods bestow these gifts by proximately interfering with the actions of human life. For such an administration of our affairs is partible, is accomplished with a certain conversion [to the subjects of its care], is not entirely separate from bodies, and is incapable of receiving a pure and undefiled domination. Will not, therefore, that mode of sacrifice in works of this kind be most appropriate which is mingled with bodies, and adheres to generation; and not that which is entirely immaterial and incorporeal? For the pure mode of sacrifice is perfectly transcendent and incommensurate [with our concerns]. But the mode which employs bodies, and the powers that subsist through bodies, is in the most eminent degree allied to human affairs. It is also capable of producing a certain prosperous condition of things, and of imparting symmetry and temperament to the mortal race. 255"

