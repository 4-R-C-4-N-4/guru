[content]
body = "From these things, therefore, it is easy to answer your next question. For the peculiar dæmon does not rule over one of the parts in us, but, in short, over all the parts at once, and extends to every principle within us, in the same manner as he was distributed to us from the total orders in the universe. For that which it appears to you proper to add as an indication “ that dæmons preside over the parts of our body, so that one is the guardian of health, another of the form of the body, and another of the corporeal habits, and that there is one dæmon who presides in common over all these ;” this you should consider as an argument that there is one dæmon who is the guardian and governor of every thing that is in us. You must not, therefore, distribute one dæmon to the body, but another to the soul, and another to intellect: for it is absurd that the animal should be one, but the dæmon that presides over it multiform. For every where the natures that 323 govern are more simple than the natures that are governed. And it will be still more absurd if the many dæmons that rule over the parts are not connascent, but separated from each other. But you also make contrariety among them. For you speak as if “ some of them were good, but others bad .” Evil dæmons, however, have no where a ruling allotment, nor are they oppositely divided to such as are good with equal authority and power."

