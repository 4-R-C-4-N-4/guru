[content]
body = "In the next place, therefore, we shall answer your question, “ What it is which conjoins the Gods that have a body in the heavens with the incorporeal Gods.\n\n” What this is, therefore, is evident from what has been before said.\n\nFor 72 if these Gods, as incorporeal, intelligible, and united, ride in the celestial spheres, they have their principles in the intelligible world, and intellectually perceiving the divine forms of themselves, they govern all heaven according to one infinite energy.\n\nAnd if they are present with the heavens in a separate manner, and lead the perpetual circulations of them by their will alone, they are themselves unmingled with a sensible nature, and exist together with the intelligible Gods.\n\nIt will be better, however, to answer you more particularly, as follows: I say, therefore, that the visible statues of the Gods originate from divine intelligible paradigms, and are generated about them.\n\nBut being thus generated, they are entirely established in them, and being also extended to, they possess an image which derives its completion from them.\n\nThese images likewise fabricate another order; sublunary natures are in continuity with them, according to one union; and the divine intellectual forms, which are present with the visible bodies of the Gods, exist prior to them in a separate manner.\n\nBut the unmingled and supercelestial intelligible paradigms of them, abide by themselves in unity, and are at once 73 all things, according to the eternal transcendency of themselves.\n\nThere is, therefore, one common indivisible bond of them according to intellectual energies; and there is also this bond according to the common participations of forms, since there is nothing which intercepts these, nor any thing which comes between them.\n\nFor indeed, an immaterial and incorporeal essence itself, being neither separated by places, nor by subjects, nor defined by the divisible circumscriptions of parts, immediately concurs, and is connascent with sameness.\n\nThe progression also, from, and the regression of all things to, the one , and the entire domination of the one , congregates the communion of the mundane Gods with the Gods that preexist in the intelligible world.\n\nFarther still, the intellectual conversion of secondary to primary natures, and the gift of the same essence and power imparted by the primary to the secondary Gods, connects the synod of them in indissoluble union.\n\nFor in things of different essences, such as soul and body, and also in those of a dissimilar species, such as material forms, and those which are in any other way separated from each other, the connascent adventitious union is derived from supernal causes, and is lost in 74 certain definite periods of time.\n\nBut by how much the higher we ascend, and elevate ourselves to the sameness both in form and essence, of first natures, and proceed from parts to wholes, by so much the more shall we discover the union which has an eternal existence, and survey the essence, which has a precedaneous and more principal subsistence, and possesses about, and in itself, difference and multitude.\n\nSince, however, the order of all the Gods is profoundly united, and the first and second genera of them, and all the multitude which is spontaneously produced about them, are consubsistent in unity, and also every thing which is in them is one,—hence the beginning, middles, and ends in them are consubsistent according to the one itself ; so that in these, it is not proper to inquire, whence the one accedes to all of them.\n\nFor the very existence in them, whatever it may be, is this one of their 75 nature."

