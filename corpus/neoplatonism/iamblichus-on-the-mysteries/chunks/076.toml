[content]
body = "You adduce, however, as a thing by no means to be despised, “ the artificers of efficacious images .” But I should wonder if these were admitted by any one of the theurgists who survey the true forms of the Gods.\n\nFor why should any one exchange truly existing beings for images, and descend from the first to the last of things?\n\nOr do we not know that all things effected by an adumbration of this kind, have an obscure subsistence, are the phantasms only of that which is true, and appear to be good, but in no respect are so?\n\nOther things, also, of this kind that accede, are borne along in a flowing condition of being; but obtain nothing genuine, or perfect, or manifest.\n\nBut this is evident from the mode of their production: for not divinity, but man is the maker of them.\n\nNor are they produced from uniform and intelligible essences, but from matter, which is assumed for this purpose.\n\nWhat good, therefore, can germinate from matter, and from the material and corporeal-formed powers which are in bodies?\n\nOr is not that which derives its subsistence from human art, more imbecile than men themselves, who impart existence to it?\n\nBy what kind of art, likewise, is this image 192 fashioned?\n\nFor it is said, indeed, to be fashioned by demiurgic art; but this is effective of true essences, and not of certain images.\n\nHence the image-producing art is distant by a great interval from the seminal production of realities.\n\nBesides, neither does it preserve a certain analogy with divine fabrication.\n\nFor divinity does not fabricate all things, either through the celestial physical motions, or through a partial matter, or through powers thus divided; but he produces the worlds by conceptions, will, and immaterial forms, and through an eternal and supermundane soul.\n\nThe maker of images, however, is said to elaborate them through the revolving stars.\n\nBut the thing does not in reality subsist so as it appears to do.\n\nFor since there are certain infinite powers in the celestial Gods, the last genus of all the powers in them is physical.\n\nBut again, of this power one portion being inherent in spermatic reasons [or productive powers], and prior to these reasons being established in immoveable natures, essentially precedes generation.\n\nBut another portion being inherent in sensible and visible motions and powers, and in celestial effluxions and qualities, has dominion over the whole visible order of things.\n\nThis last power, therefore, in all these rules over the circumterrestrial manifest generation in places about 193 the earth.\n\nMany other arts, however, as for instance, the medical [84] and gymnastic, use this power, which has dominion over visible generation, and the qualities of the effluxions sent from the heavens employ it, and likewise all such arts as in their operations communicate with nature.\n\nAnd moreover, the image-making art attracts a certain very obscure genesiurgic portion from the celestial effluxions.\n\nSuch, therefore, as the truth is, such also it is requisite to unfold it to others.\n\nIt must be said, then, that the maker of images neither uses the celestial circulations, nor the powers which are inherent in them, nor those powers 194 which are naturally established about them; nor, in short, is it possible to come into contact with them.\n\nBut he artificially, and not theurgically, applies himself to the last effluxions which openly proceed from the nature of them, about the last part of the universe.\n\nFor these effluxions, I think, being mingled with a partial matter, are capable of being changed and transformed differently at different times.\n\nThey likewise receive the transposition, from some things to others, of the powers which are in partial natures."

