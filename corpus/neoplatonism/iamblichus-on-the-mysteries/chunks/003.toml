[content]
body = "In the first place, therefore, you say, “ it must be granted that there are Gods .” Thus to speak, however, is not right on this subject. For an innate knowledge of the Gods is coexistent with our very essence; and this knowledge is superior to all judgment and deliberate choice, and subsists prior to reason and demonstration. It is also counited from the beginning with its proper cause, and is consubsistent with the essential tendency of the soul to the good . If, indeed, it be requisite to speak the truth, the contact with divinity is not knowledge. For knowledge is in a certain respect separated [from its object] by otherness . But prior to the knowledge, which as one thing knows another, is the uniform connexion with divinity, and which is suspended from the Gods, is spontaneous and inseparable from them. Hence, it is not proper to grant this, as 24 if it might not be granted, nor to admit it as ambiguous (for it is always unically established in energy); nor are we worthy thus to explore it, as if we had sufficient authority to approve or reject it. For we are comprehended in it, or rather we are filled by it, and we possess that very thing which we are, [or by which our essence is characterized] in knowing the Gods. I shall likewise say the same thing to you, concerning the more excellent genera that follow the Gods, I mean dæmons, heroes, and undefiled souls. For it is necessary to understand respecting these, that there is always in them one definite reason of essence, and to remove from them the indefiniteness and instability of the human condition. It is likewise requisite to separate from them that inclination 25 to one side of an argument rather than another, arising from the equilibrium of a reasoning process. For a thing of this kind is foreign from the principles of reason and life, and rather tends to secondary natures, and to such things as pertain to the power and contrariety of generation. But it is necessary that the more excellent genera should be apprehended uniformly. The connascent perception, therefore, of the perpetual attendance of the Gods, will be assimilated to them. Hence, as they have an existence which is always invariably the same, thus also the human soul is conjoined to them by knowledge, according to a sameness of subsistence; by no means pursuing through conjecture, or opinion, or a syllogistic process, all which originate in time, an essence which is above all these, but through the pure and blameless intellections which the soul received from eternity from the Gods, becoming united to them. You, however, seem to think, that there is the same knowledge of divine natures as of any thing else, and that one thing, rather than another, may be granted from opposites, in the same manner as it is usual to do in dialectic discussions. There is, however, no similitude whatever between the two kinds of knowledge. For the knowledge of divine natures is different from that of other 26 things, and is separated from all opposition. It likewise neither subsists in being now granted, or in becoming to be, but was from eternity, uniformly consubsistent with the soul. And thus much I say to you concerning the first principle in us, from which it is necessary those should begin who speak or hear any thing about the natures that are superior to us."

