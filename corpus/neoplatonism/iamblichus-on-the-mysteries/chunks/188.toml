[content]
body = "Between souls that always abide on high with purity, such as the souls of essential heroes, and those that descend into the regions of mortality, and are defiled with vice, such as the souls of the greater part of mankind, the class of undefiled souls subsists.\n\nThese descend into the realms of generation, partly from that necessity by which all human souls are, at times, drawn down to the earth, and partly for the benevolent purpose of benefiting those of an inferior class.\n\nBut they descend without being defiled with vice.\n\nThey are also called heroes, κατα σχεσιν , i.\n\ne.\n\naccording to habitude , in order to distinguish them from essential heroes.\n\nAnd, in the Pythagoric Golden Verses, they are denominated the terrestrial heroes.\n\n26 .\n\nFor αυτην εαυτοις ουσαν in this place, it is necessary to read αυτην εαυτης ουσαν .\n\n27 .\n\nFor εποχη here, I read μετοχη .\n\n28 .\n\nViz.\n\nIn the plenitudes, or total perfections, of the Gods.\n\n29 .\n\ni.\n\ne.\n\nWithout habitude, proximity, or alliance to the things which it illuminates.\n\n30 .\n\nWhat is here asserted by Iamblichus is perfectly true, and confirmed by experience, viz.\n\nthat the passions, when moderately gratified, are vanquished without violence.\n\nBut Gale, not understanding this, says, “Hoc adeo verum est, ac si dixisset, ignem extingues, oleum addendo camino.” For a moderate gratification of the passions does not resemble the pouring of oil on fire; since this similitude is only applicable to them when they are immoderately indulged.\n\n31 .\n\nSee my Dissertation on the Eleusinian and Bacchic Mysteries.\n\n32 .\n\nIn the original, Και δη, και “αι της μηνιδος εξιλασεις” εσονται σαφεις, εαν την μηνιν των δεων καταμαθωμεν , which Gale most erroneously translates as follows: “Sed et ratio possit reddi supplicationum, quibus divinam iram procuramus , si recte intelligamus, qualis sit deorum ira.” 33 .\n\nViz.\n\nPunishments produced by the realms of generation, or the sublunary region.\n\n34 .\n\nIt is well observed by Proclus, “that divine necessity concurs with the divine will.” Θεια αναγκη συντρεχει τῃ θειᾳ βουλησει.\n\nProcl.\n\nin Tim.\n\nlib.\n\ni.\n\n35 .\n\nFor νοητον here, it is obviously necessary to read νοερον .\n\n36 .\n\nFor τουτο here, it is necessary to read ταυτο .\n\n37 .\n\nFor as a celestial body consists of light so pure and simple, that, compared with a terrestrial body, it may be said to be immaterial; hence, like the light of the sun, it cannot be divided, or in other words, one part of it cannot be separated from another.\n\n38 .\n\nFor προς αυτην in this place, I read προς αυτα .\n\n39 ."

