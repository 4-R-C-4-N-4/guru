[content]
body = "Dissolving, however, the doubts in a way still more true, we think it requisite, in invoking superior natures, to take away the evocations 208 which appear to be directed to them as to men, and also the mandates in the performance of works, which are given with great earnestness. For if the communion of concordant friendship, and a certain indissoluble connexion of union, are the bonds of sacerdotal operations, in order that these operations may be truly divine, and may transcend every common action known to men, no human work will be adapted to them; nor will the invocations of the priest resemble the manner in which we draw to ourselves things that are distant; nor are his mandates directed as to things separated from him, in the way in which we transfer one thing from others. But the energy of divine fire shines forth voluntarily, and in common, and being self-invoked and self-energetic, energizes through all things with invariable sameness, both through the natures which impart, and those that are able to receive, its light. This mode of solution, therefore, is far superior, which does not suppose that divine works are effected through contrariety, or discrepance, in the way in which generated natures are usually produced; but asserts that every such work is rightly accomplished through sameness, union, and consent. Hence, if we separate from each other that which invokes and that which is invoked, that which commands and that which is 209 commanded, that which is more and that which is less excellent, we shall, in a certain respect, transfer the contrariety of generations to the unbegotten goods of the Gods. But if we despise all such things, as it is just we should, as of an earth-born nature, and ascribe that which is common and simple, as being more honourable, to the powers who transcend the variety which is in the realms of generation, the first hypothesis of these questions will be immediately subverted, so that no reasonable doubt concerning them will be left."

