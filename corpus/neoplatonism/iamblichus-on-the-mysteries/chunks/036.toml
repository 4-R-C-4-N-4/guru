[content]
body = "And, with respect to archons, the light of those that have the government of the world is more pure; but of those that preside over matter, exhibits itself mingled from things of a dissimilar and contrary nature.\n\nAnd the light of souls manifests 92 itself to be partibly filled with many of the mixtures which exist in generation.\n\nConformably, also, to what has been said, the fire of the Gods, indeed, shines forth with an indivisible and ineffable light, and fills all the profundities of the world, in an empyrean, [43] but not in a mundane, manner.\n\nBut the fire of archangels is impartible indeed, but is seen to possess about itself an abundant multitude, either preceding or following after itself.\n\nThe fire of angels is divided, except that it exhibits itself in the most perfect ideas.\n\nThat of dæmons is still more shortly circumscribed by a distribution into parts, is effable, and does not astonish the sight of those that have seen more excellent natures.\n\nThe fire of heroes has, after a certain manner, the same things as that of dæmons, but at the same time falls short of the most accurate similitude to it.\n\nMoreover, with respect to archons, the fire of those that are of a more elevated order, is more pellucid; but of those that are material, is more dark.\n\nAnd the fire of souls is seen to be much divided and multiform, and is comingled from many of the natures that are in the world.\n\nAgain, the fire of the Gods appears to be entirely stable.\n\n93 That of archangels is tranquil; but that of angels is stably moved.\n\nThe fire of dæmons is unstable; but that of heroes is, for the most part, rapidly moved.\n\nThe fire of those archons that are of the first rank is tranquil; but of those that are of the last order is tumultuous.\n\nAnd the fire of souls is transmuted in a multitude of motions."

