[content]
body = "Or what passion can accede to a thing of this kind, the purity of which the most worthy human manners cannot easily equal?\n\nYou say, however, “ that the things which are offered in supplications are offered as to sensitive and psychical natures .” And, indeed, if the offerings consisted of corporeal and composite powers alone, or of such things as are merely subservient to corporeal organs, your assertion would be true.\n\nBut as the offerings participate of incorporeal forms, of certain reasons, and more simple measures, the aptitude of them is to be surveyed according to this alone.\n\nAnd if a certain alliance, or similitude, is present, which is either proximate or remote, it is sufficient to effect the contact of which we are now speaking.\n\nFor there is not any thing which in the smallest degree is adapted to the Gods, to which the Gods are not immediately present, and with which they are not conjoined.\n\nThe connexion, therefore, of supplications with the Gods, is not as with sensitive or psychical 64 natures, but as with divine forms, and with the Gods themselves [as Gods, i.\n\ne.\n\nas superessential hyparxes].\n\nSo that we have sufficiently spoken in opposition to this division."

