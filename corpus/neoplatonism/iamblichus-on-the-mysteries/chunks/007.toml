[content]
body = "Again, however, according to another mode of considering the subject, it is necessary to ascribe to the Gods the whole of that which is united, of whatever kind it may be; that which is firmly established in itself, and which is the cause of impartible essences; the immoveable, which also is to be considered as the cause of all motion, and which transcends the whole of things, and has nothing in common with them; and the unmingled and the separate, understood in common in essence, power and energy, and every thing else of this kind.\n\nBut that which 34 is now separated into multitude, and is able to impart itself to other things, and which receives from others bound in itself, and is sufficient in the distributions of partible natures, so as to give completion to them; which also participates of the primarily operative and vivific, having communion with all real and generated beings; receives a commixture from all things, imparts a contemperation to all things from itself, and extends these peculiarities through all the powers, essences, and energies, in itself; all this we shall truly ascribe to souls, by asserting that it is naturally implanted in them."

