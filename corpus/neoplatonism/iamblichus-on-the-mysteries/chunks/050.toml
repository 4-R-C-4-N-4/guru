[content]
body = "There are, therefore, many species of divine possession, and divine inspiration is multifariously excited; whence, also, the signs of it are many and different. For either the Gods are different, by whom we are inspired, and thus produce a different inspiration; or the mode of enthusiasms being various, produces a different afflatus. For either divinity possesses us, or we give up ourselves wholly to divinity, or we have a common energy with him. And sometimes, indeed, we participate of the last power of divinity, sometimes of his middle, and sometimes of his first power. Sometimes, also, there is a participation only, at other times communion likewise, and sometimes a union of these divine inspirations. Again, either the soul alone enjoys the inspiration, or the soul receives it in conjunction with the body, or it is also participated by the common animal. From these things, therefore, the signs of those that are inspired are multiform. For the inspiration is indicated by the motions of the [whole] body, and of certain parts of it, by the perfect rest of the body, by harmonious orders and dances, and by elegant sounds, or the 124 contraries of these. Either the body, likewise, is seen to be elevated, or increased in bulk, or to be borne along sublimely in the air, or the contraries of these, are seen to take place about it. An equability, also, of voice, according to magnitude, or a great variety of voice after [50] intervals of silence, may be observed. And again, sometimes the sounds have a musical intension and remission, and sometimes they are strained and relaxed after a different manner."

