body = "For these conceptions and these works teach us, that in reality we, through sacred operations, approach to divinity, but that divinity does not draw near to us.\n\nHence Proclus in Alcibiad.\n\nεν ταις κλησεσι, και εν ταις αυτοψιαις προσιεναι πως ημιν φαινεται το θειον, ημων επανατεινομενων επ’ αυτο .\n\ni.\n\ne.\n\n“In invocations of the Gods, and when they are clearly seen, divinity, in a certain respect, appears to approach to us, though it is we that are extended to him.” 80 .\n\nGale, in his note on these words, after having observed that Porphyry says, that ignorance, darkness, and folly attend the soul in its lapse into body; and that, according to Servius, the soul, when it begins to descend into body, drinks of folly and oblivion, quotes also Irenæus (lib.\n\nii.\n\nc.\n\n59), who makes the following stupid remark: “Souls entering into this life [it is said] drink of oblivion, before they enter into bodies, from the dæmon who is above this ingress.\n\nBut whence do you know this, O Plato, since your soul also is now in body?\n\nFor if you remember the dæmon, the cup, and the entrance, it is likewise requisite that you should know the rest.” To this it is easy to reply, that a soul purified and enlightened by philosophy, like that of Plato, is able to recognise many things pertaining to its preexistent state, even while in the present body, in consequence of partially emerging from corporeal darkness and oblivion; but that it is not capable of knowing every thing distinctly , till it is perfectly liberated from the delirium of the body.\n\nAnd Gale, no less sillily, adds, “respondebunt Platonici hæc omnia cognovisse Platonem ex narratione, quæ circumferebatur de Ere Armenio, qui Lethes aquam non biberat.” i.\n\ne.\n\n“The Platonists will answer that Plato knew all these things from the narration of the Armenian Erus [in the Republic] who did not drink of the water of Lethe.” For Plato did not obtain this knowledge from any historical narration, but from possessing in a transcendent degree the cathartic and theoretic virtues, and from energizing enthusiastically (or according to a divinely inspired energy) through the latter of these virtues.\n\n81 .\n\nAgreeably to this, Porphyry says in his Αφορμαι προς τα νοητα , or Auxiliaries to Intelligibles , ψυχη καταδειται προς το σωμα, τῃ επιστροφη τῃ προς τα παθη τα απ’ αυτου .——And ψυχη εδησεν εαυτην εν τῳ σωματι .\n\ni.\n\ne."

