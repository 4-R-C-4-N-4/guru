[content]
body = "According to another division, therefore, the numerous herd [or the great mass] of men is arranged under nature, is governed by physical powers, looks downward to the works of nature, gives completion to the administration of Fate, and to things pertaining to Fate, because it belongs to the order of it, and always employs practical reasoning about such particulars alone as subsist according to nature. But there are a certain few who, by employing a certain supernatural power of intellect, are removed indeed from nature, but are conducted to a separate and unmingled intellect; and these, at the same time, become superior to physical powers. Others again, who are the media between these, tend to things which subsist between nature and a pure intellect. And of these, some indeed equally follow both nature and an immaculate intellect; others embrace a life which is mingled from both; and others are liberated from things subordinate, and betake themselves to such as are more excellent. This division, therefore, being made, that which follows will most manifestly take place. For those who are governed by the nature of 256 the universe, who lived conformably to this, and employ the powers of nature, these should embrace a mode of worship adapted to nature, and to the bodies that are moved by nature, and should choose for this purpose appropriate places, air, matter, the powers of matter, bodies, and the habits of bodies, qualities, and proper motions, the mutations of things in generation, and other things connected with these, both in other parts of piety and in that part of it which pertains to sacrifice. But those who live conformably to intellect alone, and to the life of intellect, and are liberated from the bonds of nature, these should exercise in all the parts of theurgy the intellectual and incorporeal mode of worship. And those who are the media between these, should labour differently in the paths of piety, conformably to the differences of this middle condition of life, either by embracing both modes of piety, or separating themselves from one of the modes [and adhering to the other], or receiving both these modes as the foundation of things of a more honourable nature. For without these they never can arrive at things supereminent. Or, in some other way, they should thus, in a becoming manner, labour in the paths of sanctity. 257"

