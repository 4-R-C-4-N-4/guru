[content]
body = "It appears, therefore, that the divination of oracles accords with all the hypotheses which we have before adduced concerning prediction. For if a power of this kind was inseparable from the nature of places, and of the bodies which are the subjects of it, or proceeded [65] according to a motion defined by number, it would not be able to foreknow, with invariable sameness, things which exist every where and always. But being separate and liberated from places and things which are measured by the numbers of time, and also from those which are detained in place, it is equally present with all things wherever they may be, and subsists simultaneously with all the natures that are produced 146 according to time. It likewise comprehends in one the truth of all things, through its separate and transcendent essence. Hence, if this is rightly asserted by us, the prophetic power of the Gods is not partibly comprehended by any place, or partible human body, nor by the soul, which is detained in one certain species of divisible natures; but being separate and indivisible, it is wholly every where present with the natures which are capable of receiving it. It likewise externally illuminates and fills all things, pervades through all the elements, comprehends earth and air, fire and water, and leaves nothing destitute of itself, neither animals nor any of the productions of nature, but imparts from itself a certain portion of foreknowledge, to some things in a greater, and to others in a less, degree. Moreover, existing itself prior to all things, by its own separate nature, it becomes sufficient to fill all things, so far as each is able to partake of it."

