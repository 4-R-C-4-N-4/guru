[content]
body = "Moreover, “ the pacifications of anger ” will become manifest, if we understand what the anger of the Gods is. This, therefore, is not, as it appears to be to some, a certain ancient and inveterate rage, but an abandonment of the beneficent care of the Gods, from which we turn ourselves away, withdrawing, as it were, 58 from meridian light, hiding ourselves in darkness, and depriving ourselves of the beneficent gift of the Gods. Hence pacification is able to convert us to the participation of divinity and the providential care of the Gods, from which we were divulsed, and to bind together, commensurately, participants and the participated natures. So far, therefore, is pacification from accomplishing its work through passion, that it separates us from the passive and tumultuous abandonment of the Gods. But “ the oblation of victims ,” when some evil is present in places about the earth, procures a remedy for the evil, and secures us from the incursion of any mutation or passion. Hence, whether a thing of this kind is effected through Gods or dæmons, it invokes these as the expellers of evil, and [our true] saviours, and through them exterminates all the injury which may accede from the calamities. Those powers, also, who avert genesiurgic and physical punishments, do not expel them through passions. And if some one should think that the suppression of the guardian care of the Gods, introduces a certain spontaneous injury, in this case the persuasion arising from pacification 59 recalls the benevolence of the more excellent genera, to a providential attention to our affairs, and takes away our privation of good, being itself perfectly pure and immutable."

