[content]
body = "Hence the ancient priests, by the mutual relation and sympathy of things to each other, collected their virtues into one, but expelled them by repugnancy and antipathy; purifying when it was requisite with sulphur and bitumen, and sprinkling with marine water.\n\nFor sulphur purifies, from the sharpness of its odour; but marine water on account of its fiery portion.\n\nBesides this, in the worship of the Gods, they offered animals, and other substances congruous to their nature; and received, in the first place, the powers of 347 dæmons, as proximate to natural substances and operations; and by these natural substances they convoked into their presence those powers to which they approached.\n\nAfterwards they proceeded from dæmons to the powers and energies of the Gods; partly, indeed, from dæmoniacal instruction, but partly by their own industry, interpreting appropriate symbols, and ascending to a proper intelligence of the Gods.\n\nAnd lastly, laying aside natural substances and their operations, they received themselves into the communion and fellowship of the Gods.” The Emperor Julian alludes to this theurgical art, in the following extract from his Arguments against the Christians, preserved by Cyril.\n\nΤο γαρ εκ θεων εις ανθρωπους αφικνουμενον πνευμα, σπανιακις μεν και εν ολιγοις γινεται, και ουτε παντα ανδρα τουτου μετασχειν ρᾳδιον, ουτε εν παντι καιρῳ.\n\nταυτῃ το και το παρ’ Εβραιοις επελιπεν, ουκουν ουδε παρ’ Αιγυπτιοις εις τουτο σωζεται.\n\nΦαινεται δε και τα αυτοφυη χρηστηρια ταις των χρονων εικοντα περιοδοις.\n\nὃ δε φιλανθρωπος ημων δεσποτης και πατηρ Ζευς εννοησας, ως αν μη πανταπασι της προς τους θεους αποστερηθωμεν κοινωνιας δεδωκεν ημιν δια των ιερων τεχνων επισκεψιν, υφ’ ης προς τας χρειας εξομεν την αποχρωσαν βοηθειαν.\n\ni.\n\ne.\n\n“For the inspiration which arrives to men from the Gods is rare, and exists but in a few.\n\nNor is it easy for every man to partake of this, nor at every time.\n\nThis has ceased among the Hebrews, nor is it preserved to the present time among the Egyptians.\n\nSpontaneous oracles, also, are seen to yield to temporal periods."

