body = "The joint risings and settings.\n\n145 .\n\ni.\n\ne.\n\nThrough a period of 300,000 years; and Procl.\n\nin Tim.\n\nlib.\n\niv.\n\np.\n\n277, informs us that the Chaldeans had observations of the stars which embraced whole mundane periods.\n\nWhat Proclus likewise asserts of the Chaldeans is confirmed by Cicero in his first book on Divination, who says that they had records of the stars for the space of 370,000 years; and by Diodorus Siculus, Bibl.\n\nlib.\n\nxi.\n\np.\n\n118, who says that their observations comprehended the space of 473,000 years.\n\n146 .\n\n“We say,” says Hephestion, “that a star is the lord of the geniture, which has five conditions of the lord of the nativity in the horoscope; viz.\n\nif that star receives the luminaries in their proper boundaries, in their proper house, in their proper altitude, and in the proper triangle.” He also adds, “and if besides it has contact, effluxion, and configuration.” See likewise Porphyry in Ptolemæum, p.\n\n191.\n\n147 .\n\nAccording to the Egyptians every one received his proper dæmon at the hour of his birth; nor did they ascend any higher, in order to obtain a knowledge of it.\n\nFor they alone considered the horoscope.\n\nSee Porphyry apud Stobæum, p.\n\n201, and Hermes in Revolut.\n\ncap.\n\niv.\n\n148 .\n\nIn the original ενταυθα δε ουν και η της αληθειας παρεστι θεα, και η της νοερας επιστημης .\n\nBut instead of η της νοερας απιστημης , which appears to me to be defective, I read η κτησις της νοερας επιστημης .\n\n149 .\n\nFor θεωτος here, I read θεωτερος .\n\n150 .\n\nIn the original, by a strange mistake, των θνητων is inserted here instead of των νοητων , which is obviously the true reading.\n\nThe version of Gale also has intelligibilium .\n\n151 .\n\ni.\n\ne.\n\nMan, considered as a rational soul, connected with the irrational life; for this man has dominion in the realms of generation.\n\n152 .\n\nSee the second edition of this work in Nos.\n\nXV.\n\nand XVI.\n\nof the Pamphleteer.\n\n153 .\n\ni.\n\ne.\n\nOf natures which are not connected with body.\n\n154 .\n\nFor in these, all are in each, but not all in all.\n\n155 .\n\nBy an unaccountable mistake here του σωματος is inserted instead of της ψυχης ; but the mistake is not noticed by the German editor of these Scholia.\n\n156 .\n\nAnd in consequence of this mistake, for αυτο in this place, we must read αυτα .\n\n157 .\n\nOdyss.\n\nxi.\n\n612.\n\n158 .\n\nIliad xv.\n\n605.\n\n159 .\n\nFor μουσικης here, it is necessary to read μαντικης .\n\n160 .\n\nAnd for μαντικην read μαντικη .\n\n161 .\n\nFor υπο here, it is necessary to read υπερ .\n\n162 ."

