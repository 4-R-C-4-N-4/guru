[content]
body = "Ταις ενεργειαις της μελῳδιας συμπασχειν ημων αντικρυς τας ψυχας, την συγγενειαν ωσπερ επιγινωσκουσας ——et, ποτε μεν εις ησυχιαν και κατασολην τρεπεσθαι, ποτε δε εις οἱσρον και ενθυσιασμον.\n\nAnd, in the last place, see Plato in his Io, and Aristotle in his Politics.\n\n52 .\n\nProclus in Polit.\n\np.\n\n865, says, “that the melodies of Olympus were the causes of ecstasy.” Τα του Ολυμπου μελη εκσατικα.\n\n53 .\n\nThe nature of the Corybantes, and the order to which they belong, is unfolded as follows by Proclus, in Plat.\n\nTheol.\n\nlib.\n\nvi.\n\ncap.\n\n13.\n\n“To what has been said we shall add the theory pertaining to the unpolluted Gods among the ruling divinities [ i.\n\ne.\n\namong the divinities that subsist immediately after the intellectual Gods].\n\nFor Plato also gives us an opportunity of mentioning these, since it is necessary that the rulers and leaders of wholes should subsist analogous to the intellectual kings, though they make their progression in conjunction with division, and a separation into parts.\n\nFor as they imitate the paternal generative and convertive powers of the intellectual kings, thus also it is necessary that they should receive the immutable monads in themselves, according to the ruling peculiarity, and establish over their own progressions secondary causes of a guardian characteristic.\n\nAnd the mystic tradition, indeed, of Orpheus makes mention of these more clearly.\n\nBut Plato being persuaded by the mysteries, and by what is performed in them, indicates concerning these unpolluted Gods.\n\nAnd in the Laws, indeed, he reminds us of the inflation of the pipe by the Corybantes, which represses every inordinate and tumultuous motion.\n\nBut in the Euthydemus, he makes mention of the collocation on a throne, which is performed in the Corybantic mysteries; just as in other dialogues he mentions the Curetic order, speaking of the armed sports of the Curetes.\n\nFor the Curetes are said to surround and to dance round the Demiurgus of wholes, when he was unfolded into light from Rhea.\n\nIn the intellectual Gods, therefore, the first Curetic order is allotted its hypostasis.\n\nBut the order of the Corybantes, which precedes Core [ i.\n\ne.\n\nProserpine], and guards her on all sides, as the theology says, is analogous to the Curetes in the intellectual order.\n\nIf, however, you are willing to speak conformably to Platonic custom, because these divinities preside over purity, and preserve the Curetic order undefiled, and also preserve immutability in their generations, and stability in their progressions into the worlds, on this account they were called Corybantes.\n\nFor το κορον , to koron , is every where significant of purity, as Socrates says in the Cratylus; since, also, you may say that our mistress Core was no otherwise denominated than from purity and an unpolluted life."

