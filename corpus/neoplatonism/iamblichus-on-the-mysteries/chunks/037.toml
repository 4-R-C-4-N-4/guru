[content]
body = "Moreover, that which purifies souls is perfect in the Gods; but in archangels it is anagogic. Angels alone dissolve the bond of generation. Dæmons draw souls down into nature; but heroes lead them to a providential attention to sensible works. Archons either deliver to them the government of mundane concerns, or the inspection of material natures. And souls, when they become apparent, tend in a certain respect to generation. Farther still, consider this, also, that you should attribute everything which is pure and stable in the visible image to the more excellent genera. Hence, you should ascribe to the Gods that which in the image is transcendently splendid, and which is firmly established in itself. That which is splendid, but is established 94 as in another thing, you should give to archangels; but that which remains in another to angels. To all these, therefore, you should oppose, that which is rashly borne along, is unestablished, and filled with foreign natures, the whole of which is adapted to inferior orders. These, also, may now be divided according to the difference of commixture. For mundane vapours are mingled with dæmons, and are unstably borne along, contrary to the motion of the world. Genesiurgic compositions of pneumatic substances are mingled with heroes, about which substances, also, they are moved. The archons of the world remain invariably the same, exhibiting the mundane nature which they possess. But the archons of matter are full of material substances. And souls are filled with an abundance of stains and foreign spirits, together with which, when they become visible, each of these genera presents itself to the view. The following, also, will be no small indications to you [of the difference of these powers]. With the Gods matter is immediately consumed. With archangels it is consumed in a short time. With angels there is a solution of, and elevation from, matter. By dæmons matter is elegantly adorned. With heroes there is a coadaptation to it, in appropriate measures, 95 and a skilful providential attention to it. And with respect to archons, those that are the governors of the world are present with matter in a transcendent manner, and in this way unfold themselves into light. But those that are material, exhibit themselves as entirely replete with matter. With respect to souls, also, those that are pure, present themselves to the view out of matter, but those of a contrary description are seen surrounded with it."

