[content]
body = "Thus they recognised things supreme in such as are subordinate, and the subordinate in the supreme: in the celestial regions, terrene properties subsisting in a causal and celestial manner; and in earth celestial properties, but according to a terrene condition.\n\nFor how shall we account for those plants called heliotropes, that is, attendants on the sun, moving in correspondence with the revolution of its orb, but selenitropes, or attendants on the moon, turning in exact conformity to her motion?\n\nIt is because all things pray, and hymn the leaders of their respective orders; but some intellectually, and others rationally; some in a natural, and others after a sensible, manner.\n\nHence the sunflower, as far as it is able, moves in a circular dance towards the sun; so that if any one could hear the pulsation made by its circuit in the air, he would perceive something composed by a sound of this kind, in honour of its king, such as a plant is capable of framing.\n\nHence, too, we may behold the sun and moon in the earth, but according to a terrene quality; but in the celestial regions, all plants, and stones, and animals, possessing an intellectual life according to a celestial nature.\n\nNow the ancients, having contemplated this mutual sympathy of things, applied for occult purposes, both celestial and terrene natures, by means of which, through a certain similitude, they deduced divine virtues into this inferior abode.\n\nFor, indeed, similitude itself is a sufficient cause of binding things together in union and consent.\n\nThus, if a piece of paper is heated, and afterwards placed near a lamp, though it does not touch the fire, the paper will be suddenly inflamed, and the flame will descend from the superior to the inferior parts.\n\nThis heated paper we may compare to a certain relation of inferiors to superiors; and its approximation to the lamp, to the opportune use of things according to time, place, and matter.\n\nBut the procession of fire into the paper, aptly represents the presence of divine light to that nature which is capable of its reception.\n\nLastly, the inflammation of the paper may be compared to the deification of mortals, and to the illumination of material natures, which are afterwards carried upwards, like the enkindled paper, from a certain participation of divine seed.\n\n“Again, the lotus, before the rising of the sun, folds its leaves into itself, but gradually expands them on its rising: unfolding them in proportion to the sun’s ascent to the zenith; but as gradually contracting them as that luminary 345 descends to the west.\n\nHence this plant, by the expansion and contraction of its leaves, appears no less to honour the sun, than men by the gesture of their eyelids, and the motion of their lips.\n\nBut this imitation and certain participation of supernal light is not only visible in plants, which possess nothing more than a vestige of life, but likewise in particular stones.\n\nThus the sun-stone, by its golden rays, imitates those of the sun; but the stone called the eye of heaven, or of the sun, has a figure similar to the pupil of an eye, and a ray shines from the middle of the pupil.\n\nThus, too, the lunar stone, which has a figure similar to the moon when horned, by a certain change of itself, follows the lunar motion.\n\nLastly, the stone called helioselenus, i.\n\ne.\n\nof the sun and moon, imitates, after a manner, the congress of those luminaries, which it images by its colour."

