[content]
body = "You say then, in your epistle, “ that the discovery of the lord or lords of the geniture, if there are more than one in a nativity, can scarcely be obtained, and by astrologers themselves is confessed to be unattainable; and yet they say that the peculiar dæmon is from thence to be known .” But how can astrologers confess that the knowledge of the lord of the geniture is not to be obtained by them, when they deliver clear methods for the discovery of it, and teach us rules by which we may discover the doubts; some, indeed, giving us five, others more and others less than five rules? Omitting this, however, let us direct our attention to a thing of greater consequence, viz. the accidents pertaining 320 to both these. For if it is possible to discover the lord of the geniture, the dæmon imparted by him will be known; but if this knowledge is unattainable, we shall be ignorant of the lord of the geniture according to this hypothesis, and yet, nevertheless, he will have an existence, and also the dæmon imparted by him. What therefore hinders, but that the discovery of him may be difficult through prediction from the nativity, and yet through sacred divination, or theurgy, there may be a great abundance of scientific knowledge on this subject? In short, the dæmon is not alone imparted by the lord of the geniture, but there are many other principles of it more universal than this. And farther still, a method of this kind introduces a certain artificial and human disquisition concerning the peculiar dæmon. Hence, in these doubts of yours there is nothing sane. 321"

