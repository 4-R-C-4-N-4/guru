[content]
body = "And, in the third and last place, it may easily be conceived from hence how prayer and sacrifice mutually corroborate and confer on each other a sacred and perfect power in divine concerns.\n\nHence, since it appears that there is a perfect conspiration and cooperation of the sacerdotal discipline with itself, and that the parts of it are more connascent than those of any animal, being entirely conjoined through one 274 connexion; this being the case, it is not by any means proper to neglect this concord, nor to admit some of its parts and reject others; but it is fit that all of them should be exercised in a similar manner, and that those should be perfected through all of them who wish to be genuinely conjoined to the Gods.\n\nThese things therefore, cannot subsist otherwise.\n\n275 SECTION VI."

