[content]
body = "And thus we have answered, to the utmost of our ability, your inquiries concerning divination and theurgy.\n\nIt remains, therefore, at the end of this discussion, that I should beseech the Gods to afford me an immutable guard of true conceptions, to insert in me truth eternally, and to supply me abundantly with the participation of more perfect conceptions of the Gods, in which the most blessed end of our good is posited, and the confirmation of our concordant friendship with each other.\n\n337 ADDITIONAL NOTES.\n\nPage 9 .\n\nAnebo.\n\nPorphyry in his Life of Plotinus, and also in the second book of his Treatise on Abstinence from Animals, informs us that he was familiar with a certain Egyptian priest, who, as Gale conjectures, is probably the priest to whom Porphyry now writes.\n\nThe diction, indeed, as Gale observes, denotes that the person to whom this Epistle is addressed was a very great prophet , who, nevertheless, is afterwards said to be a priest .\n\nThis, however, is not any thing novel or incongruous.\n\nFor by Apuleius in Metamorph.\n\nlib.\n\nxi.\n\nthe Egyptian Zaclas is said to be propheta primarius et sacerdos , a chief prophet and priest .\n\nPage 9 .\n\nHermes the God who presides over language.\n\nThe Egyptians celebrated two Hermes, the former of which is here signified by Iamblichus.\n\nThis deity is the source of invention , and hence he is said to be the son of Maia ; because search , which is implied by Maia , leads invention into light.\n\nHe bestows too mathesis on souls, by unfolding the will of his father Jupiter; and this he accomplishes as the angel or messenger of Jupiter.\n\nProclus in MS.\n\nComment.\n\nin Alcibiad.\n\nobserves, “that this deity is the inspective guardian of gymnastic exercises ; and hence hermæ , or carved statues of Mercury, were placed in the Palæstræ; of music , and hence he is honoured as the lyrist λυραιος among the celestial constellations; and of disciplines , because the invention of geometry, reasoning, and discourse is referred to this God.\n\nHe presides, therefore, over every species of erudition, leading us to an intelligible essence from this mortal abode, governing the different herds of souls, and dispersing the sleep and oblivion with which they are oppressed.\n\nHe is likewise the supplier of recollection, the end of which is a genuine intellectual apprehension of divine natures.” P.\n\n10 .\n\nThe ancient pillars of Hermes.\n\nThese pillars, according to Amm.\n\nMarcellinus, lib.\n\nxxii.\n\nwere concealed prior to the deluge in certain caverns, which were called 338 συριγγες , syringes , not far from the Egyptian Thebes.\n\nThe second Hermes interpreted these pillars, and his interpretation formed many volumes, as Iamblichus informs us in Section viii.\n\nof this work.\n\nThese pillars are mentioned by Laertius in his Life of Democritus; by Dio Chrysostom in Orat.\n\n49; by Achilles Tatius on Aratus; and by others of the ancients.\n\nP.\n\n15 .\n\nThere is, therefore, the good itself which is beyond essence, and there is that good which subsists according to essence.\n\nThere are three orders of good; viz.\n\nthat which is imparticipable and superessential; that which is imparticipable and essential; and that which is essential and participable.\n\nOf these, the last is such as our nature contains; the good which ranks among forms is essential; and that which is beyond essence is superessential."

