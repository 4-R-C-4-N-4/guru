[content]
body = "You also say, “ that invocations are directed to the Gods as to beings that are passive, so that not only dæmons are passive, but likewise the Gods .” This, however, is not the case. For the illumination which takes place through invocations, is spontaneously visible and self-perfect; is very remote from all downward attraction; proceeds into visibility through divine energy and perfection, and as much surpasses our voluntary motion as the divine will of the good transcends a deliberately chosen life. Through this will, therefore, the Gods, being benevolent and propitious, impart their light to theurgists in unenvying abundance, calling upwards their souls to themselves, procuring them a union with themselves, and accustoming them, while they are yet in body, 56 to be separated from bodies, and to be led round to their eternal and intelligible principle. But it is evident, from the effects themselves, that what we now say is the salvation of the soul. For the soul in contemplating blessed spectacles, acquires another life, energizes according to another energy, and is then rightly considered as no longer ranking in the order of man. Frequently, likewise, abandoning her own life, she exchanges it for the most blessed energy of the Gods. If, therefore, the ascent through invocations imparts to the priests purification from passions, a liberation from generation, and a union with a divine principle, how is it possible to connect with it any thing of passion? For an invocation of this kind does not draw down the impassive and pure Gods, to that which is passive and impure; but, on the contrary, it renders us, who have become passive through generation, pure and immutable. Neither do the invocations which implore the Gods to incline to us, conjoin the priests to them through passion; but procure for them the communion of an indissoluble connexion, through the friendship which binds all things together. Hence, it does not, as the name seems to imply, incline the intellect of the 57 Gods to men; but, according to the decision of truth, renders the will of man adapted to the participation of the Gods, elevates it to them, and coharmonizes the former with the latter, through the most appropriate persuasion. On this account also, such names of the Gods as are adapted to sacred concerns, and other divine symbols, are able, as they are of an anagogic or elevating nature, to connect invocations with the Gods themselves."

