[content]
body = "Moreover, it is necessary to add the causes whence evils sometimes arise, and to show how many and of what kind they are. For the form of them is not simple; but, being various, is the leader of the generation of various evils. For if what we a little before said, concerning images and evil dæmons, who assume the appearance of Gods and good dæmons, is true, an abundant evil-producing tribe, about which a 214 contrariety of this kind usually happens, will from hence appear to flow. For an evil dæmon requires that his worshipper should be just, because he assumes the appearance of one belonging to the divine genus; but he is subservient to what is unjust, because he is depraved. The same thing, likewise, that is said of good and evil may be asserted of the true and the false. As, therefore, in divinations we attribute true predictions to the Gods alone, but when we detect any falsehood in predictions we refer this to another genus of cause, viz. that of dæmons; thus, also, in things just and unjust, the beautiful and the just are to be alone ascribed to Gods and good dæmons; but such dæmons as are naturally depraved, perpetrate what is unjust and base. And that, indeed, which consents and accords with itself, and always subsists with invariable sameness, pertains to more excellent natures; but that which is hostile to itself, which is discordant, and never the same, is the peculiarity in the most eminent degree of dæmoniacal dissension, about which it is not at all wonderful that things of an opposing nature should subsist; but perhaps the very contrary, that this should not be the case, would be more wonderful. 215"

