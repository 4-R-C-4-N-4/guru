[content]
body = "The animadversions which are after this adduced, at first, indeed, doubt about the mode of divination, but as they proceed, endeavour entirely to subvert it. We shall, therefore, discuss both these. And, in the first place, we shall begin to dissolve the former of these doubts. “ For in sleep, when we are not employed about any thing, we sometimes obtain a knowledge of the future. ” Not that the cause of divination is derived both from us and externally: for in things the principle of which definitely subsists in us, and that which is consequent is externally derived, if these two have a coarrangement and connexion with each other, in this case the works of the two are definitely 180 effected, and the things which are suspended from them follow their precedaneous causes. But when the cause is independent of us, and preexists by itself, the end is not defined on account of us, but the whole depends on things external to us. Now, therefore, since the truth which is in dreams does not entirely concur with our works, but frequently shines forth from itself, it shows that divination is externally derived from the Gods, that it possesses an independent power, and that it benevolently unfolds futurity when it pleases, and in such a way as it pleases. These things, therefore, should have an answer of this kind."

