[content]
body = "I am a prince, the son of a prince, a sacred essence which hath preceded from God.\n\nI am a great one, the son of a great one, and my father planned my name; I have multitudes of names and multitudes of forms, and my existence is in every god.\n\nI have been proclaimed by the heralds Tmu and Horus, and my father and my mother uttered my name; but it hath been hidden within me by him that begat me, who would not that the words of power of any seer should have dominion over me.\n\nI came forth to look upon that which I had made, I was passing through the world which I had created, when lo!\n\nsomething stung me, but what I know not.\n\nIs it fire?\n\nIs it water?\n\nMy heart is on fire, my flesh quaketh, and trembling hath seized all my limbs.\n\nLet there be brought unto me the children of the gods with healing words and with lips that know, and with power which reacheth unto heaven.\" The children of every god came unto him in tears, Isis came with her healing words and with her mouth full of the breath of life, with her enchantments which destroy sickness, and with her words of power which make the dead to live.\n\nAnd she spake, saying, \"What hath come to pass, O holy father?\n\nWhat hath happened?\n\nA serpent hath bitten thee, and a thing which thou hast created hath lifted up his head against thee.\n\nVerily it shall be cast forth by my healing words of power, and I will drive it away from before the sight of thy sunbeams.\" The holy god opened his mouth and said, \"I was passing along my path, and I was going through the two regions of my lands according to my heart's desire, to see that which I had created, when lo!\n\nI was bitten by a serpent which I saw not.\n\nIs it fire?\n\nIs it water?\n\nI am colder than water, I am hotter than fire.\n\nAll my flesh sweateth, I quake, my eye hath no strength, I cannot see the sky, and the sweat rusheth to my face even as in the time of summer.\" Then said Isis unto Ra, \"O tell me thy name, holy father, for whosoever shall be delivered by thy name shall live.\" [And Ra said], \"I have made the heavens and the earth, I have ordered the mountains, I have created all that is above them, I have made the water, I have made to come into being the great and wide sea, I have made the 'Bull of {p.\n\nxci} Legend of Ra and Isis.\n\nhis mother,' from whom spring the delights of love.\n\nI have made the heavens, I have stretched out the two horizons like a curtain, and I have placed the soul of the gods within them.\n\nI am he who, if he openeth his eyes, doth make the light, and, if he closeth them, darkness cometh into being.\n\nAt his command the Nile riseth, and the gods know not his name.\n\nI have made the hours, I have created the days, I bring forward the festivals of the year, I create the Nile-flood.\n\nI make the fire of life, and I provide food in the houses.\n\nI am Khepera in the morning, I am Ra at noon, and I am Tmu at even.\" Meanwhile the poison was not taken away from his body, but it pierced deeper, and the great god could no longer walk.\n\nThen said Isis unto Ra, \"What thou hast said is not thy name."

