body = "O tell it unto me, and the poison shall depart; for he shall live whose name shall be revealed.\" Now the poison burned like fire, and it was fiercer than the flame and the furnace, and the majesty of the god said, \"I consent that Isis shall search into me, and that my name shall pass from me into her.\" Then the god hid himself from the gods, and his place in the boat of millions of years was empty.\n\nAnd when the time arrived for the heart of Ra to come forth, Isis spake unto her son Horus, saying, \"The god hath bound himself by an oath to deliver up his two eyes\" ( i.e.\n\n, the sun and moon).\n\nThus was the name of the great god taken from him, and Isis, the lady of enchantments, said, \"Depart, poison, go forth from Ra.\n\nO eye of Horus, go forth from the god, and shine outside his mouth.\n\nIt is I who work, it is I who make to fall down upon the earth the vanquished poison; for the name of the great god hath been taken away from him.\n\nMay Ra live!\n\nand may the poison die, may the poison die, and may Ra live!\" These are the words of Isis, the great goddess, the queen of the gods, who knew Ra by his own name.[1] Thus we see that even to the great god Ra were attributed all the weakness and frailty of mortal man; and that \"gods\" and \"goddesses\" were classed with beasts and reptiles, which could die and perish.\n\nAs a result, it seems that the word \"God\" should be reserved to express the name of the Creator of the Universe, and that neteru , usually rendered \"gods,\" should be translated by some other word, but what that word should be it is almost impossible to say.[2] The belief in One God.\n\nFrom the attributes of God set forth in Egyptian texts of all periods, Dr.\n\nBrugsch, de Rougé, and other eminent Egyptologists have come to the opinion that the dwellers in the Nile valley, from the earliest times, knew and worshipped one God, nameless, incomprehensible, and eternal.\n\nIn 1860 de Rougé wrote:--\"The [1.\n\nThe hieratic text of this story was published by Pleyte and Rossi, Le Papyrus de Turin , 1869-1876, pll.\n\n31-77, and 131-138; a French translation of it was published by M.\n\nLefébure, who first recognized the true character of the composition, in Aeg.\n\nZeitschrift , 1883, p.\n\n27 ff; and a German translation by Wiedemann is in his collection of \"Sonnensagen,\" Religion der alten Aegypter , Münster, 1890, p.\n\n29 ff.\n\n2 A similar difficulty also exists in Hebrew, for elomhim means both God and \"gods\"; compare Psalm lxxxii., i.] {p."

