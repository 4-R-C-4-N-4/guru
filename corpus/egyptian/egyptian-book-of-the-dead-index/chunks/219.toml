[content]
body = "(16) I have not added unto nor have I minished the offerings which are due.\n\nI have not stolen from the orchards; nor have I trampled down the fields.\n\nI have not added to the weight of the balance; (17) nor have I made light the weight in the scales.\n\nI have not snatched the milk from the mouth of the babe.\n\nI have not (18) driven the cattle from their pastures.\n\nI have not snared the water-fowl of the gods.\n\nI have not caught fishes (19) with bait of their own bodies.\n\nI have not turned back water at its springtide.\n\nI have not broken the channel of running water.\n\nI have not quenched the flame (20) in its fulness.\n\nI have not disregarded the seasons for the offerings which are appointed; I have not turned away the cattle set apart for sacrifice.\n\nI have not thwarted the processions of the god.\n\n(21) 1 am pure.\n\nI am pure.\n\nI am pure.\n\nI am pure.\n\nI am pure with the purity of the great Bennu bird which is in Suten-henen; for, lo!\n\nI am the nostrils of (22) the lord of the winds who maketh all men to live on the day when the eye of the sun becometh full in Annu, in the second month of the season of coming forth until the end thereof, (23) in the presence of the lord of this earth.\n\nI behold the eye of the sun wax full in Annu.\n\nMay no evil happen unto me in this land in the (24) Hall of Double Right and Truth, because I know, even I, the names of the gods who live therein and who are the followers of the great god.\" Next: Plates XXXI.\n\nand XXXII."

