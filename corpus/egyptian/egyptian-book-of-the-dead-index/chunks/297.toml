body = "lxxvi} apparel which they wear,[1] the white linen and sandals;[2] he is clothed in white,[3] and \"he goeth to the great lake in the midst of the Field of Peace whereon the great gods sit; and these great and never failing gods give unto him [to eat] of the tree of life of which they themselves do eat that he likewise may live.\"[4] The bread which he eats never decays and his beer never grows stale.[5] He eats of the \"bread of eternity\" and drinks of the \"beer of everlastingness\" which the gods eat and drink;[6] and he nourishes himself upon that bread which the Eye of Horus has shed upon the branches of the olive tree.[7] He suffers neither hunger nor thirst like the gods Shu and Tefnut, for he is filled with the bread of wheat of which Horus himself has eaten; and the four children of Horus, Hapi, Tuamautef, Qebhsennuf and Amset, have appeased the hunger of his belly and the thirst of his lips.[8] He abhors the hunger which he cannot satisfy, and he loathes the thirst which he cannot slake;[9] but he is delivered from the power of those who would steal away his food.[10] He is washed clean, and his ka is washed clean, and they eat bread together for ever.[11] He is one of the four children of Horus who live on right and truth,[12] and they give him his portion of the food with which they have been so abundantly supplied by the god Seb that they have never yet known what it is to hunger.\n\nHe goes round about heaven even as they do, and he partakes of their food of figs and wine.[13] [1.\n\n###.\n\nRecueil de Travaux , t.\n\nv., p.\n\n190 (l.\n\n180).\n\n2.\n\n###.\n\nIbid.\n\n, t.\n\nv., p.\n\n163 (l.\n\n408).\n\n3.\n\nIbid.\n\n, t.\n\niv., p.\n\n45 (l.\n\n394).\n\n4.\n\nIbid.\n\n, t.\n\nvii., p.\n\nj65 (l.\n\n430).\n\n5.\n\n###.\n\nIbid.\n\n, t.\n\nv., p.\n\n412 (l.\n\n288), and t.\n\nvii., p.\n\n167 (l.\n\n442).\n\n6.\n\n###.\n\nIbid.\n\n, t.\n\nvii., p.\n\n160 (l.\n\n390).\n\n7.\n\nIbid.\n\n, t.\n\niii., p.\n\n199 (1.\n\n200).\n\n8.\n\nIbid.\n\n, t.\n\nv., p.\n\n10 (l.\n\n54 ff.).\n\n9.\n\nIbid.\n\n, t.\n\niii., p.\n\n199 (1.\n\n195 f.) 10.\n\nIbid.\n\n, t.\n\niv., p.\n\n48 (l.\n\n429).\n\n11.\n\nIbid.\n\n, t.\n\nv., p.\n\n167 (l.\n\n66).\n\n12 Ibid.\n\n, t.\n\nviii., p.\n\n106 (l.\n\n673).\n\n13 ###.\n\nIbid.\n\n, t.\n\nviii., p 110 (l.\n\n692).] {p.\n\nlxxvii} Those who would be hostile to the deceased become thereby foes of the god Tmu, and all injuries inflicted on him are inflicted on that god;[1] he dwells without fear under the protection of the gods,[2] from whose loins he has come forth.[3] To him \"the earth is an abomination, and he will not enter into Seb; for his soul hath burst for ever the bonds of his sleep in his house which is upon earth.\n\nHis calamities are brought to an end, for Unas hath been purified with the Eye of Horus; the calamities of Unas have been done away by Isis and Nephthys."

