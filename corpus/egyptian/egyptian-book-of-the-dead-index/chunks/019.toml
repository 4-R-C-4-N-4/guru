body = "The broken mummy of this king, together with fragments of its bandages, was found lying on the floor.\n\n5.\n\nSee Vyse, Pyramids of Gizeh , vol.\n\niii., p.\n\n5 6.\n\nIt had been partially opened by Mariette in May, 1880, but the clearance of sand was not effected until early in 1881.\n\n7.\n\nThe full text is given by Maspero in Recueil de Travaux , t.\n\nv., pp.\n\n157-58, Paris, 1884; t.\n\nvii., pp.\n\n145-76, Paris, 1886; and t.\n\nviii., pp.\n\n87-120, Paris, 1886.\n\n8.\n\nIt was opened early in January, 1880, by Mariette, who seeing that the sarcophagus chamber was inscribed, abandoned his theory that pyramids never contained inscriptions, or that if they did they were not royal tombs.\n\nThe hieroglyphic texts were published by Maspero in Recueil de Travaux , t.\n\nix., pp.\n\n177-91, Paris, 1887; t.\n\nX, pp.\n\n1-29, Paris, 1388; and t.\n\nxi., pp.\n\n1-31, Paris, 1889.\n\nThe alabaster vase in the British Museum, NQ 4493, came from this pyramid.\n\n9.\n\nThis pyramid is a little larger than the others of the period, and is built in steps of small stones; it is commonly called by the Arabs Haram el Mastabat , because it is near the building usually called Mastabat el-Far'ûn .\n\nSee Vyse, Pyramids , vol.\n\niii., p.\n\n52.\n\nThe hieroglyphic texts are published by Maspero in Recueil de Travaux , t.\n\nxii., pp.\n\n53-95, and pp.\n\n136-95, Paris, 1892; and t.\n\nxiv., pp.\n\n125-52, Paris, 1892.\n\nThere is little doubt that this pyramid was broken into more than once in Christian times, and that the early collectors of Egyptian antiquities obtained the beautiful alabaster vases inscribed with the cartouches and titles of Pepi II.\n\nfrom those who had access to the sarcophagus chamber.\n\nAmong such objects in the British Museum collection, Nos.\n\n4492, 22,559, 22,758 and 22,817 are fine examples.] {p.\n\nxxiv} Summary of the monumental evidence.\n\nThus we have before the close of the VIth dynasty five copies of a series of texts which formed the Book of the Dead of that period, and an extract from a well-known passage of that work on the wooden coffin of Mycerinus; we have also seen from a number of mastabas and stelæ that the funeral ceremonies connected with the Book of the Dead were performed certainly in the IInd, and with almost equal certainty in the Ist dynasty.\n\nIt is easy to show that certain sections of the Book of the Dead of this period were copied and used in the following dynasties down to a period about A.D.\n\n200.\n\nThe Book of the Dead a collection of separate works.\n\nThe fact that not only in the pyramids of Unas and Teta, but also in those of Pepi I.\n\nand his immediate successors, we find selected passages, suggests that the Book of the Dead was, even in those early times, so extensive that even a king was fain to make from it a selection only of the passages which suited his individual taste or were considered sufficient to secure his welfare in the next world.\n\nIn the pyramids of Teta, Pepi I., Mer-en-Ra and Pepi II.\n\nare found many texts which are identical with those employed by their predecessors, and an examination of the inscription of Pepi II."

