body = "See Lanzone, op.\n\ncit.\n\n, tav.\n\n147.\n\n2 Recueil de Travaux , iv., t.\n\np.\n\n45 (l.\n\n394).\n\n3.\n\nIbid., op.\n\ncit.\n\n, tav.\n\n353.\n\n4 Also read Min and Khem.] {p.\n\ncxxii} him with the god Pan, and called the chief city where his worship was celebrated Khenimis,[l] after one of his names.\n\nHe is depicted usually in the form of a man standing upon; and he has upon his head the plumes and holds the flail in his right hand, which is raised above his shoulder.[2] Neb-er-tcher , a name which originally implied the \"god of the universe,\" but which was subsequently given to Osiris, and indicated the god after the completed reconstruction of his body, which had been hacked to pieces by Set.\n\nUn-nefer a name of Osiris in his capacity of god and judge of the dead in the underworld.\n\nSome make these words to mean the \"good being,\" and others the \"beautiful hare.\" Astennu a name given to the god Thoth.\n\nMert or Mer-sekert the lover of silence,\" is a name of Isis or Hathor as goddess of the underworld.\n\nShe is depicted in the form of a woman, having a disk and horns upon her head.[3] Serq or Selk is a form of the goddess Isis.\n\nShe is usually depicted in the form of a woman, with a scorpion upon her head; occasionally she appears as a scorpion with a woman's head surmounted by disk and horns.[4] Ta-urt , the Thoueris of the Greeks, was identified as the wife of Set or Typhon; she is also known under the names Apt and Sheput.\n\nHer common titles are \"mistress of the gods and \"bearer of the gods\".\n\nShe is depicted in the form of a hippopotamus standing on her hind legs, with distended paunch and hanging breasts, and one of her forefeet rests upon ###; sometimes she has the head of a woman, but she always wears the disk, horns, and plumes[4].\n\nUatchit was a form of Hathor, and was identified with the appearance of the sky in the north when the sun rose.\n\nShe is either depicted in the form of a woman, having upon her head the crown of the north and a sceptre, around which a serpent is twined, or as a winged uræus wearing the crown of the north.\n\n[1.\n\nIn Egyptian the town is called Apu.\n\n2.\n\nSee Lanzone, op.\n\ncit.\n\n, tav.\n\n332.\n\n3.\n\nIbid.\n\n, tav 124.\n\n4.\n\nIbid.\n\n, op.\n\ncit.\n\n, tav.\n\n362.] {p.\n\ncxxiii} Beb , Bebti , Baba , or Babu , mentioned three times in the Book of the Dead, is the \"firstborn son of Osiris,\" and seems to be one of the gods of generation.\n\nHapi is the name of the great god of the Nile who was worshipped in Egypt under two forms, i.e.\n\n, \"Hapi of the South,\" and \"Hapi of the North,\"; the papyrus was the emblem of the one, and the lotus of the other.\n\nFrom the earliest times the Nile was regarded by the Egyptians as the source of all the prosperity of Egypt, and it was honoured as being the type of the life-giving waters out of the midst of which sprang the gods and all created things."

