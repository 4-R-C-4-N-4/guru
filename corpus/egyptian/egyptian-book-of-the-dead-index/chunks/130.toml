[content]
body = "The eastern and the western parts of heaven come to thee with homage, and give forth sounds of joy at thy rising.\n\nO Ra, thou who art Heru-khuti (Harmachis), the mighty man-child, the heir of eternity, self-begotten and self-born, king of earth, prince of the netherworld, governor of the mountains of Aukert ( i.e.\n\n, the netherworld), thou dost rise in the horizon of heaven and sheddest upon the world beams of emerald light; thou art born from the {p.\n\n252} water, thou art sprung from Nu, who fostereth thee and ordereth thy members.\n\nO thou who art crowned king of the gods, god of life, lord of love, all the nations live when thou dost shine.\n\nThe goddess Nut doeth homage unto thee, and the goddess Maat embraceth thee at all times.\n\nThey who are in thy following sing unto thee with joy and bow down to the earth when they meet thee, the god of heaven, the lord of earth, the king of right and truth, the god of eternity, the everlasting ruler, the prince of all the gods, the god of life, the creator of eternity, the maker of heaven by whom is established all that therein is.\n\nThe company of the gods rejoice at thy rising, the earth is glad when it beholdeth thy rays; the peoples that have been long dead come forth with cries of joy to see thy beauties.\n\nThou goest forth over heaven and earth, made strong each day by thy mother Nut.\n\nThou passest through the uppermost heaven, thy heart swelleth with joy; and the Lake of Testes is content thereat.\n\nThe Enemy hath fallen, his arms are hewn off, the knife hath cut asunder his joints.\n\nRa liveth in Maa[1] the beautiful.\n\nThe sektet boat draweth on and cometh into port; the south, the north, the west and the east turn to praise thee, O thou unformed substance of the earth, who didst create thyself.\n\nIsis and Nephthys salute thee, they sing unto thee in thy boat hymns of joy, they shield thee with their hands.\n\nThe souls of the East follow thee, the souls of the West praise thee.\n\nThou art the ruler of all gods and thou hast joy of heart within thy shrine; for the Serpent Nak is condemned to the fire, and thy heart shall be joyful for ever.\n\nThy mother Nut is adjudged to thy father Nu.\" Next: Plate II."

