body = "For the variant vignettes see Naville, Todtenbuch , Bd.\n\nL, Bl.\n\n8o.\n\n2.\n\nOne of the two variant vignettes shows the deceased in the act of adoring Ra, and in the other the deceased kneels before Ra, Thoth, and Osiris; see Naville, Todtenbuch , Bd.\n\nI., B1.\n\n83.] {p.\n\nxxxviii} Theban version: list of chapters.\n\nVignette: The deceased standing before the door of a tomb.\n\nChapter LXXVI.\n\nThe Chapter of [a man] changing into whatsoever form he pleaseth.\n\nThis Chapter has no vignette.\n\nChapter LXXVII.\n\nThe Chapter of changing into a golden hawk.\n\nVignette: A golden hawk Chapter LXXVIII.\n\nThe Chapter of changing into a divine hawk.\n\nVignette: A hawk.\n\nChapter LXXIX.\n\nThe Chapter of being among the company of the gods, and of becoming a prince among the divine powers.\n\nVignette: The deceased adoring three gods.\n\nChapter LXXX.\n\nThe Chapter of changing into a god, and of sending forth light into darkness.\n\nVignette: A god.\n\nChapter LXXXI A .\n\nThe Chapter of changing into a lily.\n\nVignette: A lily.\n\nChapter LXXXI B .\n\nThe Chapter of changing into a lily.\n\nVignette: The head of the deceased rising out of a lily.\n\nChapter LXXXII.\n\nThe Chapter of changing into Ptah, of eating cakes, of drinking ale, of unloosing the body, and of living in Annu (On).\n\nVignette: The God Ptah in a shrine.\n\nChapter LXXXIII.\n\nThe Chapter of changing into a phÅnix.\n\nVignette: A phoenix.\n\nChapter LXXXIV.\n\nThe Chapter of changing into a heron.\n\nVignette: A heron.\n\nChapter LXXXV.\n\nThe Chapter of changing into a soul, of not going into the place of punishment: whosoever knoweth it will never perish.\n\nThis Chapter has no vignette.\n\nChapter LXXXVI.\n\nThe Chapter of changing into a swallow.\n\nVignette: A swallow.\n\nChapter LXXXVII.\n\nThe Chapter of changing into the serpent Sa-ta.\n\nVignette: A serpent.\n\nChapter LXXXVIII.\n\nThe Chapter of changing into a crocodile.\n\nVignette: A crocodile.\n\nChapter LXXXIX.\n\nThe Chapter of making the soul to be united to its body.\n\nVignette: The soul visiting the body, which lies on a bier.\n\n{p.\n\nxxxix} Theban version: list of chapters.\n\nChapter XC.\n\nThe Chapter of giving memory to a man.\n\nVignette: A jackal.\n\nChapter XCI.\n\n'The Chapter of not allowing the soul of a man to be shut in.\n\nVignette: A soul standing on a pedestal.\n\nChapter XCII.\n\nThe Chapter of opening the tomb to the soul and shadow of a man, so that he may come forth and may gain power over his legs.\n\nVignette: The soul of the deceased flying through the door of the tomb.\n\nChapter XCIII.\n\nThe Chapter of not sailing to the east in the underworld.\n\nVignette: The hands of a buckle grasping the deceased by his left arm.\n\nChapter XCIV.\n\nThe Chapter of praying for an ink jar and palette.\n\nVignette: The deceased sitting before a stand, upon which are an ink jar and palette.\n\nChapter XCV.\n\nThe Chapter of being near Thoth.\n\nVignette: The deceased standing before Thoth.\n\nChapters XCVI., XCVII.\n\nThe Chapter of being near Thoth, and of giving .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nVignette: The deceased standing near Thoth.\n\nChapter XCVIII.\n\n[The title of this chapter is incomplete.] Chapter XCIX."

