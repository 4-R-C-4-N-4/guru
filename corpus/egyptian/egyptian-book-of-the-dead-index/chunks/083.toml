body = "One scene makes the morning and evening boats of Ra to sail along the back of Nut;[3] another depicts Shu holding up the boat of the sun wherein is the disk on the horizon.[4] A third from the sarcophagus of Seti I.\n\nrepresents Nu the god of the primeval water holding up the boat of the sun, wherein we see the beetle with the solar disk facing it accompanied by Isis and Nephthys, who stand one on each side; behind Isis stand the gods Seb, Shu, Hek, Hu, and Sa, and behind Nephthys are three deities who represent the doors through which the god Tmu has made his way to the world.[5] The Tuat , or abode of the dead.\n\nWithin the two bowed female figures which represent the day and the night sky, and which have been referred to above (Fig.\n\n2), is a third figure which is bent [1.\n\nLanzone, op.\n\ncit.\n\n, tav.\n\n155.\n\n2.\n\nLe Livre de ce qu'il y a dans l'Hadès , p.\n\n3 3 Ibid., tav.\n\n157.\n\n4.\n\nIbid., tav.\n\n158.\n\n5 Brugsch, Religion und Mythologie , p.\n\n216.] {p.\n\nciv} The Egyptian heaven.\n\nround in a circle; the space enclosed by it represents according to Dr.\n\nBrugsch the Tuat [1]or Egyptian underworld, wherein dwelt the gods of the dead and the departed souls.\n\nThis view is supported by the scene from the sarcophagus of Seti I.\n\n(Fig.\n\n1).\n\nIn the watery space above the bark is the figure of the god bent round in a circle with his toes touching his head, and upon his head stands the goddess Nut with outstretched hands receiving the disk of the sun.[2] In the space enclosed by the body of the god is the legend, \"This is Osiris; his circuit is the Tuat.\"[3] Though nearly all Egyptologists agree about the meaning of the word being \"the place of departed souls,\" yet it has been translated in various ways, different scholars locating the Tuat in different parts of creation.\n\nDr.\n\nBrugsch and others place it under the earth,[4] others have supposed it to be the space which exists between the arms of Shu and the body of Nut,[5] but the most recent theory put forth is that it was situated neither above nor below the earth, but beyond Egypt to the north, from which it was separated by the mountain range which, as the Egyptians thought, supported the sky.[6] The region of the Tuat was a long, mountainous, narrow valley with a river running along it; starting from the east it made its way to the north, and then taking a circular direction it came back to the east.\n\nIn the Tuat lived all manner of fearful monsters and beasts, and here was the country through which the sun passed during the twelve hours of the night; according to one view he traversed this region in splendour, and according to another he died and became subject to Osiris the king, god and judge of the kingdom of the departed.\n\nThe Fields of Aaru and Hetep.\n\nThe souls of the dead made their way to their abode in the \"other world\" by a ladder, according to a very ancient view, or through a gap in the mountains of Abydos called Peka according to another; but, by whichever way they passed from earth, their destination was a region in the Tuat which is called in the pyramid and later texts Sekhet-Aaru,[7] which was situated in the [1.\n\nBrugsch, op.\n\ncit.\n\n, p.\n\n211.\n\n2.\n\nThe legend reads \"This is Nut, she receiveth Ra.\" 3.\n\n###.\n\n4.\n\nWörterbuch , p.\n\n1622."

