body = "In the papyrus of Ani there is no vignette, and it is remarkable that this Chapter follows immediately after Chapter 1.\n\nChapter XXIII.\n\n\"The Chapter of opening the mouth of Osiris, the scribe Ani.\" (See pp.\n\n84, 306, and pl.\n\n15.) Chapter XXIV.\n\n\"The Chapter of bringing charms unto Osiris Ani in Neter-khert.\" (See pp.\n\n85, 306, and pl.\n\n15.) As with other ancient Theban papyri, the papyrus of Ani gives no Vignette.\n\nChapter XXVI.\n\n\"The Chapter of giving a heart unto Osiris Ani in Neter-khert.\" (See pp.\n\n88, 308, and pl.\n\n15.) The vignette is probably unique.\n\nChapter XXVII.\n\n\"The Chapter of not letting the heart of a man be taken away from him in Neter-khert.\" (See pp.\n\n100, 312, and pl.\n\n15.) The vignette is unusual.\n\nChapter XXIX.\n\n\"The Chapter of not letting the heart of a man be taken away from him in Neter-khert.\" (See pp.\n\n97, 311, and pl.\n\n15.) No other copy of this Chapter is at present known.\n\nChapter XXIX B .\n\n\"The Chapter of a heart of carnelian.\" (See pp.\n\n228, 359, and pl.\n\n33.) Chapter XXX B .\n\n\"The Chapter of not letting the heart of Osiris Ani be driven away from him in Neter-khert.\" (See pp.\n\nI 1, 90, 258, 309, and pl.\n\n15-) Chapter XLII.\n\nThis Chapter is without title (see pp.\n\n213, 353, and pl.\n\n32), but in other ancient papyri it is called \"Repulsing of slaughter in Suten-henen.\" Chapter XLIII.\n\n\"The Chapter of not letting the head of a man be cut off from him in Neter-khert.\" (See pp.\n\n111, 317, and pl.\n\n17.) {p.\n\ncxlix} List of Chapters.\n\nAs in other ancient Theban papyri, this Chapter is without vignette.\n\nChapter XLIV.\n\n\"The Chapter of not dying a second time in Neter-khert.\" (See pp.\n\n105, 315, and pl.\n\n16.) The vignette is peculiar to the papyrus of Ani.\n\nChapter XLV.\n\n\"The Chapter of not suffering corruption in Neter-khert.\" (See pp.\n\n106, 315, and pl.\n\n16.) Only one other copy of the text of this Chapter is known.[1] Among Theban papyri the vignette is peculiar to the papyrus of Ani.\n\nChapter XLVI.\n\n\"The Chapter of not perishing and of becoming alive in Neter-khert.\" (See pp.\n\n107, 316, and pl.\n\n16.) Only one other copy of the text of this Chapter is known (B.M.\n\nNo.\n\n9900).\n\nAmong Theban papyri the vignette is peculiar to the papyrus of Ani.\n\nChapter XLVIII.\n\n\"Another Chapter of one who cometh forth by day against his foes in Neter-khert.\" (See pp.\n\n123, 321, and pl.\n\n18.) Only one other copy of the text of this Chapter is known (B.M.\n\nNo.\n\n9900).\n\nAmong Theban papyri the vignette is peculiar to the papyrus of Ani.\n\nChapter L.\n\n\"The Chapter of not entering in unto the block.\" (See pp.\n\n108, 315, and pl.\n\n16.) The text of this Chapter agrees rather with the second version in the papyrus of Nebseni than with that in B.M.\n\npapyrus No.\n\n9964.\n\nAs the Ani papyrus is of Theban origin this was to be expected.\n\nChapter LIV."

