body = "A Hymn of praise to Ra when he setteth in the land of life.\n\nVignette: The deceased adoring Ra.\n\nChapter XV B .\n\n2.\n\nA Hymn of praise to Ra-Harmachis when he setteth in the western horizon of heaven.\n\nVignette: The deceased adoring Ra.\n\nChapter XV B .\n\n3.\n\nAnother hidden Chapter of the tuat , and of passing through the secret places of the underworld, and of seeing the Disk when he setteth in Amentet.\n\nVignette: The god or the deceased spearing a serpent.\n\nChapter XVI A .\n\n[No text: being only a vignette.] {p.\n\nxxxiii} Theban version: list of chapters.\n\nScene of the worship of the rising sun by mythological beings.\n\nChapter XVI B .\n\nWithout title or text.\n\nVignette: Scene of the worship of the setting sun by mythological beings.\n\nChapter XVII.\n\nHere begin the praises and glorifyings of coming out from, and going into, the underworld in the beautiful Amenta; of coming out by day, and of making transformations and of changing into any form which he pleaseth; of playing at draughts in the seh chamber; and of coming forth in the form of a living soul: to be said by the deceased after his death.\n\nVignette: The deceased playing at draughts; the deceased adoring the lion-gods of yesterday and to-day; the bier of Osiris with Isis and Nephthys at the foot and head respectively; and a number of mythological beings referred to in the text.\n\nChapter XVIII.\n\nWithout title.\n\nVignette: The deceased adoring the groups of gods belonging to various cities.\n\nChapter XIX.* The Chapter of the crown(?) of victory.\n\nThis Chapter has no vignette.\n\nChapter XX.\n\nWithout title.\n\nThis Chapter has no vignette.\n\nChapter XXI.* The Chapter of giving a mouth to a man in the underworld.\n\nThis Chapter has no vignette.\n\nChapter XXII.\n\nThe Chapter of giving a mouth to the deceased in the underworld.\n\nVignette: The guardian of the scales touching the mouth of the deceased.\n\nChapter XXIII.\n\nThe Chapter of opening the mouth of the deceased in the underworld.\n\nVignette: The sem priest touching the mouth of the deceased with the instrument ###.\n\nChapter XXIV.\n\nThe Chapter of bringing words of magical power to the deceased in the underworld.\n\nThis Chapter has no vignette.\n\nChapter XXV.\n\nThe Chapter of causing a man to remember his name in the underworld.\n\nVignette: A priest holding up ### before the deceased.\n\nChapter XXVI.\n\nThe Chapter of giving a heart to the deceased in the underworld.\n\nVignette: Anubis holding out a heart to the deceased in the underworld.\n\nChapter XXVII.\n\nThe Chapter of not allowing the heart of a man to be taken from him in the underworld.\n\n{p.\n\nxxxiv} Theban version: list of chapters.\n\nVignette: A man tying a heart to the statue of the deceased.[1] Chapter XXVIII.\n\n[The Chapter of] not allowing the heart of a man to be taken from him in the underworld.\n\nVignette: The deceased with his left hand touching the heart upon his breast, kneeling before a demon holding a knife.\n\nChapter XXIX A .\n\nThe Chapter of not carrying away the heart of a man in the underworld.\n\nThis Chapter has no vignette.\n\nChapter XXIX B .\n\nAnother Chapter of a heart of carnelian.\n\nVignette: The deceased sitting on a chair before his heart, which rests on a stand.\n\nChapter XXX A .\n\nThe Chapter of not allowing the heart of a man to be driven away from him in the underworld.\n\nVignette: A heart.[2] Chapter XXX B .\n\nThe Chapter of not allowing the heart of a man to be driven away from him in the underworld."

