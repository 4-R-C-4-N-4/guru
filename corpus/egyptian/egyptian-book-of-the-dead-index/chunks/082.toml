body = "Sacred Texts Egypt Index Previous Next THE ABODE OF THE BLESSED.\n\nThe Egyptian heaven.\n\nThe gods of the Egyptians dwelt in a heaven with their ka's , and khu's , and shadows, and there they received the blessed dead to dwell with them.\n\nThis heaven was situated in the sky, which the Egyptians believed to be like an iron ceiling, either flat or vaulted, and to correspond in extent and shape with the earth beneath it.\n\nThis ceiling was rectangular, and was supported at each corner by a pillar; in this idea, we have, as M.\n\nMaspero has observed, a survival of the roof-tree of very primitive nations.\n\nAt a very early date the four pillars were identified with \"the four ancient khu's who dwell in the hair of Horus,\"[1] who are also said to be \"the four gods who stand by the pillar-sceptres of heaven.\"[2] These four gods are \"children of Horus,\"[3] and their names are Amset, Hapi, Tuamautef, and Qebhsennuf.[4] They were supposed to preside over the four quarters of the world, and subsequently were acknowledged to be the gods of the cardinal points.\n\nThe Egyptians named the sky or heaven pet .\n\nA less primitive view made the heavens in the form of the goddess Nut who was represented as a woman with bowed body whose hands and feet rest on the earth.\n\nIn this case the two arms and the two [1.\n\n###.\n\nRecueil de Travaux , t.\n\niv., p.\n\n55 (l.\n\n473); and compare ###.\n\nIbid.\n\n, t.\n\nv.\n\np.\n\n186 (l.\n\n171).\n\n2.\n\nIbid.\n\n, t.\n\nv., p.\n\n27 (1.\n\n233).\n\n3.\n\nIbid., p.\n\n39 (l.\n\n281).\n\n4 Ibid., p.\n\n10 (l.\n\n60).] {p.\n\ncii} The Egyptian heaven.\n\nlegs form the four pillars upon which the heavens are supported.\n\nNut, the sky goddess, was the wife of Seb, the earth god, from whose embrace she was separated by Shu, the god of the air; when this separation was effected, earth, air, and sky came into being.\n\nSignor Lanzone has collected a number of illustrations of this event from papyri and other documents,[1] wherein we have Seb lying on the ground, and Shu uplifting Nut with his outstretched hands.\n\nThe feet of the goddess rested on the east, and her hands on the west this is shown by the scene wherein Shu is accompanied by two females who have on their heads \"east\" and, \"west\" respectively.[2] The child of the union of Seb and Nut was the Sun, who was born in the east in the morning, and who made [1.\n\nDizionario di Mitologia Egizia , tavv.\n\ni 150 ff.\n\n2.\n\nIbid.\n\n, tav.\n\n158.] {p.\n\nciii} The Egyptian heaven.\n\nhis course along his mother's body, until he set in the west in the evening.\n\nThe moon followed the sun's course along his mother's body, but sometimes a second female is represented bowed beneath Nut [1] (Fig.\n\n2), and this is believed to signify the night sky across which the moon travels.\n\nIn an interesting picture which M.\n\nJéquier has published[2] the goddess is depicted lying flat with her arms stretched out at full length above her head; on her breast is the disk of the sun, and on her stomach the moon.\n\nThose who believed that the sky was an iron plane imagined that the stars were a numbers of lamps which were hung out therefrom, and those who pictured the sky as a goddess studded her body with stars."

