body = "358} Text: [CHAPTER CLV.] (1) THE CHAPTER OF A TET OF GOLD: Osiris Ani, triumphant, saith: \"Thou risest, O still heart!\n\n(2) Thou shinest, O still heart!\n\nPlace thou thyself upon my side.\n\nI have come arid I have brought unto thee a tet of gold; rejoice thou in it.\" Appendix: In the late recension of this chapter (Lepsius, Todtenbuch , Bl.\n\n75) the rubric is divided into two parts, which read: \"To be recited over a Tet of gold inlaid (?) in sycamore wood, and placed on the neck of the shining one; and he shall pass in through the doors of the underworld by the might of the words here spoken.\n\nIt shall set him in his place on the day of the new year among the followers of Osiris.\n\n\"If this chapter be known by the deceased he shall become perfect in the underworld.\n\nHe shall not be thrust back at the doors of Amentet; cakes and ale and meat offerings shall be offered unto him upon the altars of Ra, or (as some say) of Osiris Un-nefer; and he shall triumph over his foes in the underworld for ever and for ever.\" Vignette: A buckle, or tie.\n\nText: [CHAPTER CLVI.].\n\n(1) THE CHAPTER OF A BUCKLE OF CARNELIAN.[1] Saith Osiris Ani, triumphant: \"The blood of Isis, the charms of Isis, (2) the power of Isis, are a protection unto me, the chief, and they crush that which I abhor.\" Appendix: Rubric: [2] This chapter shall be said over a buckle of red jasper[3] ( or carnelian) which hath been dipped in water of ankham flowers and inlaid in sycamore wood, and hath been placed on the neck of the shining one.\n\nIf this chapter be inscribed upon it, it shall become the power of Isis, and it shall protect him; and Horus, the son of Isis, shall rejoice when he seeth it.\n\nNo way shall be impassable to him, and one hand shall extend unto heaven, and the other unto earth.\n\nIf this chapter be known [by the [1.\n\nThe Nebseni papyrus adds the words, \"to be placed near the neck of this shining one.\" 2.\n\nSee Maspero, Mémoire sur Quelques Papyrus du Louvre , p.\n\n8.\n\n3.\n\nThe amulet of the buckle is usually made of carnelian, red jasper, red porphyry, red glass, or red faïence , but examples in grey and black stone and wood are also known at times it was made entirely of gold, but it was frequently set in gold only.\n\nLarge wooden models of the buckle were placed in the wooden hands which were fastened on the breasts of coffins; they usually lay upon the left breast, and the tee on the right.\n\nIn the fine collection of buckles in the British Museum the following are of interest: No.\n\n20,641, pendent buckle of red glass inscribed with the Chapter of the Buckle No.\n\n20,621, black stone pendent buckle, with hollow loop, inscribed with the Chapter of the Buckle; No.\n\n20,646, grey stone buckle inscribed ###.\n\nNo.\n\n20,619, red glass (?) buckle set in a gold frame, and inscribed with a few words of the Chapter of the Buckle, and the name of Aah-mes the scribe; No.\n\n8258, mottled glass buckle having the loop inlaid with blue composition; No.\n\n8259, red faïence double buckle, pierced lengthwise for threading in a necklace.] {p."

