[content]
body = "I have made Osiris, the overlord of the netherworld, to be victorious over his enemies; and I have carried away all his foes to the place of slaughter in the East; they shall never come forth from the durance of the god Seb therein.\n\n(79) I have made those who stand up against Ra to be still, and [I have] made him to be victorious.\n\nI have come even as a scribe, and I have made all things plain.\n\nI have caused the god to have the power of his legs.\n\nI have come into the house of him that is upon his hill,[8] and I have seen him that is ruler in the sacred hall.\n\n(80) I have gone into Re-stau; I have hidden myself, and I have found out the way; I have travelled unto An-rutf.\n\nI have clothed those who are naked.\n\n(81) I have sailed up to Abtu; I have praised the gods Hu and Sau.\n\n(82) 1 have entered into the house of Astes, I have made supplication to the gods Khati and Sekhet in the house of Neith,\" or, as others say, \"the rulers.\n\nI have entered into Re-stau; I have hidden myself, [1.\n\nSee Lepsius, Todtenbuch , pl.\n\nLXIV.\n\n2.\n\nI.e.\n\n, \"Devourer.\" 3.\n\nI.e.\n\n, \"Born of peace.\" 4.\n\nI.e.\n\n, \"Who giveth birth to fire.\" 5 I.e.\n\n, \"Strong of mouth.\" 6 I.e.\n\n, \"Opener of ways.\" 7 I.e.\n\n, \"Olive tree.\" 8 I.e.\n\n, Anubis, the god of the dead.] {p.\n\n300} and I have found out the way; I have travelled unto An-rutf.\n\n(83) I have clothed him who was naked.\n\nI have sailed up to Abtu; I have glorified Hu and Sau.\n\n(84) I have received my crown at my rising, and I have power to sit upon my throne, upon the throne of my father and of the great company of the gods.\n\nI have adored the meskhen of Ta-sert.\n\n(85) My mouth uttereth words with right and with truth.\n\nI have drowned the serpent Akhekh.\n\nI have come into the great hall which giveth strength unto the limbs; and it hath been granted to me to sail along in the boat of Hai.\n\nThe fragrance of anti unguent ariseth from the hair of him who hath knowledge.\n\n(86) I have entered into the house of Astes, and I have made supplication to the gods Khati and Sekhet within the House of the Prince.\n\n(87) I have arrived as a favoured one in Tattu.\" Vignette [1] [CHAPTER XVIII.--INTRODUCTION] (Upper register): The priest[2] An-maut-f, who has on the right side of his head the lock of Heru-pa-khrat, or Horus the Child, and who wears a leopard's skin, introducing Ani and his wife to the gods whose names are given in Plates XIII.\n\nand XIV.\n\nText: An-maut-f saith: \"I have come unto you, O mighty and godlike rulers who are in heaven and in earth and under the earth; (2) and I have brought unto you Osiris Ani.\n\nHe hath not sinned against any of the gods."

