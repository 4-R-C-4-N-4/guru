[content]
body = "The next part of the ceremony, i.e.\n\n, \"the opening of the mouth and eyes,\" is performed by the Sem priest, who addresses the deceased: \"I have come to embrace thee, I am thy son Horus, I have pressed thy mouth; I am thy son, I love thee.\n\nHis mother beats her breast and weeps for him, and those who are in chains with him ( i.e.\n\n, Isis and Nephthys) beat their breasts.\n\nThy mouth was closed, but I have set in order for [1.\n\nThe slaughter of the antelope and duck typified the destruction of the enemies of the deceased; for, when Horus destroyed the enemies of his father Osiris, \"he cut off their heads [which took] the form of ducks in the sky, making them to fall headlong to the ground in the form of antelopes, and into the water in the form of fishes,\" For the text, see Schiaparelli,.\n\nIl Libro dei Funerali degli Antichi Egiziani (in Atti della R.\n\nAccademia dei Lincei ; Rome, 1883 and 1890), p.\n\n94; Naville, Todtenbuch , chap.\n\n134.] {p.\n\n267} \"thee thy mouth[1] and thy teeth.\" The Kher-heb next calls on the Sem priest four times: \"O Sem , take the Seb-ur [2] (Fig.\n\n5) and open the mouth and the eyes\"; and while the Sem priest is performing the ceremony the Kher-heb continues: \"Thy mouth was closed, but I have set in order for thee thy mouth and thy teeth.\n\nI open for thee thy mouth, I open for thee thy two eyes.\n\nI have opened for thee thy mouth with the instrument of Anubis.\n\nI have opened thy mouth with the instrument of Anubis, with the iron tool with which the mouths of the gods were opened.\n\nHorus, open the mouth, Horus, open the mouth.\n\nHorus hath opened the mouth of the dead, as he whilom opened the mouth of Osiris, with the iron which came forth from Set, with the iron tool (Fig.\n\n6) with which he opened the mouths of the gods.\n\nHe hath opened thy mouth with it.\n\nThe dead shall walk and shall speak, and his body shall [be] with the great company of the gods in the Great House of the Aged one in Annu, and he shall receive there the ureret crown from Horus, the lord of mankind.\" The Kher-heb next says: \"Let the Ami-Khent priest (Fig.\n\n7) stand behind him ( i.e.\n\n, the deceased), and say, 'My father, my father,' four times.\" The eldest son of the deceased then stands behind the deceased, and in his name the Kher-heb says: \"His mother beateth her breast and weepeth for him, and those who are in chains with him also beat their breasts.\" Another priest, called Am-Khent-Heru , takes up the same position and says: \"Isis goeth unto Horus, who embraceth his father.\" A priestly official belonging to the mesenti class then goes behind the deceased, and the Sem , Smer and Kher-heb priests stand in front, and the Sem priest and the Kher-heb , personifying Horus and Sut, respectively cry: \"I am Horus, I am Sut; I will not let thee illumine the head of my father.\" The Sem priest then leaves the Ka -chapel and returns, leading in the Se-mer-f , i.e."

