body = "Sacred Texts Egypt Index Previous Next PLATE XV.\n\nVignette: A seated statue of Ani, the scribe, upon which the ceremony of opening the mouth\"[4] un re , is being performed by the sem [5] priest, clad in a panther's skin and holding in his right hand the instrument Ur heka [6] i.e.\n\n, \"mighty one of enchantments.\" In front of the statue are: the [1.\n\nVar.\n\narit xeperuf .\n\n2.\n\nThe Papyrus of Nebseni has the better reading ufa pu tep ta , \"he shall be in a good state upon earth.\" 3.\n\nBrugsch renders em shes maat by \"sicut oequum et justum est\"; Wörterbuch (Supp.), p.\n\n1203.\n\n4.\n\nFor a description of this ceremony, see above, pp.\n\n264-270.\n\n5.\n\nCompare ### Naville, Todtenbuch , Bd.\n\nI., Bl.\n\n34.\n\nIn British Museum papyrus No.\n\n10,470, sheet 8, the god Horus performs this ceremony upon the deceased, who is upon a stool.\n\n6.\n\nSee above, p.\n\n264.] {p.\n\n306} sepulchral chest, the instruments Seb-ur, Tun-tet, and Temanu, and the object Pesh-en-kef.[1] Text [CHAPTER XXIII.]: (I) THE CHAPTER OF OPENING THE MOUTH OF OSIRIS, THE SCRIBE ANI.\n\nTo be said:[2] \"May Ptah open my mouth, and may the god of my town[3] loose the swathings, even the swathings[4] which are over my mouth (2).\n\nMoreover, may Thoth, being filled and furnished with charms, come and loose the bandages, the bandages of Set which fetter my mouth (3); and may the god Tmu hurl them' at those who would fetter [me] with them, and drive them back.\n\nMay my mouth be opened, may my mouth be unclosed by Shu[6] (4) with his iron[7] knife, wherewith he opened the mouth of the gods.\n\nI am Sekhet,[8] and I sit upon the great western side of heaven.\n\n(5) 1 am the great goddess Sah[9] among the souls of Annu.\n\nNow as concerning every charm and all the words which may be spoken against me (6), may the gods resist them, and may each and every one of the company of the gods withstand it them.\"[10] Text [CHAPTER XXIV.]: (I) THE CHAPTER OF BRINGING CHARMS UNTO OSIRIS ANI [IN NETER-KHERT].\n\n[He saith]: \"I am Tmu[11]-Khepera, who gave birth unto himself upon the thigh of his divine mother.[12] Those who are in Nu[13]are made wolves, and those who are among the godlike rulers (3) are become [1.\n\nSee above, p.\n\n264.\n\n2.\n\nVar.\n\n\"he saith.\" 3.\n\nVar., \"By Amen, the god of my town\"; Lepsius, Todtenbuch , Pl.\n\nxiv.\n\n4.\n\nVar., netiu .\n\n5.\n\nVar., May Tmu give me my hand to shoot them at those who fetter [me].\n\nMay my mouth be given to me, may my mouth be opened.\" 6.\n\nVar., O Ptah.\n\n7.\n\nLiterally \" iron of heaven \" ( baat en pet = Copt.\n\n###); for discussions on the word, see Dümichen, Aeg.\n\nZeit.\n\n, 1874, p.\n\n49, and the authorities quoted by Brugsch, Wörterbuch (Suppl.), p.\n\n416.\n\n8."

