body = "The reader has now before him the main points of the evidence concerning the Egyptians' notions about God, and the cosmic powers and their phases, and the anthropomorphic creations with which they peopled the other world, all of which have been derived from the native literature of ancient Egypt.\n\nThe different interpretations which different Egyptologists have placed upon the facts demonstrate the difficulty of the subject.\n\nSpeaking generally, the interpreters may be divided into two classes: those who credit the Egyptians with a number of abstract ideas about God and the creation of the world and the future life, which are held to be essentially the product of modern Christian nations; and those who consider the mind of the Egyptian as that of a half-savage being to whom occasional glimmerings of spiritual light were vouchsafed from time to time.\n\nAll eastern nations have experienced difficulty in separating spiritual from corporeal conceptions, and the Egyptian is no exception to the rule; but if he preserved the gross idea of a primeval existence with the sublime idea of God which he manifests in writings of a later date, it seems that this is due more to his reverence for hereditary tradition than to ignorance.\n\nWithout attempting to decide questions which have presented difficulties to the greatest thinkers among Egyptologists, it may safely be said that the Egyptian whose mind conceived the existence of an unknown, inscrutable, eternal and infinite God, who was One-whatever the word One may mean here and who himself believed in a future life to be spent in a glorified body in heaven, was not a being whose spiritual needs would be satisfied by a belief in gods who could eat, and drink, love and hate, and fight and grow old and die.\n\nHe was unable to describe the infinite God, himself being finite, and it is not surprising that he should, in some respects, have made Him in his own image.\n\n[1.\n\nThe variant version has, \"I brought into my own mouth my name as a word of power, and I straightway came into being.\" 2 The papyrus from which these extracts are taken is in the British Museum, No.\n\n10188.\n\nA hieroglyphic transcript and translation will be found in Archæologia , vol.\n\nlii., pp.\n\n440-443.\n\nFor the passages quoted see Col.\n\n26, l.\n\n22; Col.\n\n27, l.\n\n5; and Col.\n\n28, l.\n\n20; Col.\n\n29, l.\n\n6.] {p.\n\nci} THE ABODE OF THE BLESSED.\n\nThe Egyptian heaven.\n\nThe gods of the Egyptians dwelt in a heaven with their ka's , and khu's , and shadows, and there they received the blessed dead to dwell with them.\n\nThis heaven was situated in the sky, which the Egyptians believed to be like an iron ceiling, either flat or vaulted, and to correspond in extent and shape with the earth beneath it.\n\nThis ceiling was rectangular, and was supported at each corner by a pillar; in this idea, we have, as M.\n\nMaspero has observed, a survival of the roof-tree of very primitive nations.\n\nAt a very early date the four pillars were identified with \"the four ancient khu's who dwell in the hair of Horus,\"[1] who are also said to be \"the four gods who stand by the pillar-sceptres of heaven.\"[2] These four gods are \"children of Horus,\"[3] and their names are Amset, Hapi, Tuamautef, and Qebhsennuf.[4] They were supposed to preside over the four quarters of the world, and subsequently were acknowledged to be the gods of the cardinal points.\n\nThe Egyptians named the sky or heaven pet .\n\nA less primitive view made the heavens in the form of the goddess Nut who was represented as a woman with bowed body whose hands and feet rest on the earth.\n\nIn this case the two arms and the two [1.\n\n###."

