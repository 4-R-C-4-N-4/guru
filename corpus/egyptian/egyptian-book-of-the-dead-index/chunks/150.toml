body = "\"(37) O ye who open the way and lay open the paths to perfected souls in the Hall of (38) Osiris, open ye the way and lay open the paths (39) to the soul of Osiris, the scribe and steward of all the divine offerings, Ani (40) [who is triumphant] with you.\n\nMay he enter in with a bold heart and may he come forth in peace from the house of Osiris.\n\nMay he not (41) be rejected, may he not be turned back, may he enter in [as he] pleaseth, may he come forth [as he] (42) desireth, and may he be victorious.\n\nMay his bidding be done in the house of Osiris; may he (43) walk, and may he speak with you, and may he be a glorified soul along with you.[5] He hath not been found wanting (44) there,[6] and the Balance is rid of [his] trial.\"[6] Appendix : After the First Chapter M.\n\nNaville has printed in his Todtenbuch the text of a composition which also refers to the funeral, and which he has designated Chapter 1 B .\n\nIt is entitled \"Chapter of making the [1.\n\nThe day of the festival of Seker was celebrated in the various sanctuaries of Egypt at dawn, \"at the moment when the sun casts its golden rays upon the earth.\" The hennu boat was drawn round the sanctuary (see Lanzone, Dizionario , pp.\n\n1117-1119.).\n\nThe Serapeum was called Pa-hennu .\n\n2.\n\nM.\n\nPierret renders, \"Je reçois l'office de laboureur,\" but the variants given by M.\n\nNaville show that some digging instrument is intended.\n\n3 I.e.\n\n, Het-suten-henen , the Heracleopolis Magna of the Greeks, the ### of the Copts, and ### of the Arabs.\n\nSee Brugsch, Dict.\n\nGéog.\n\n, p.\n\n601.\n\n4.\n\nBritish Museum papyrus No.\n\n9901 adds, \"in the Temple of Osiris.\" 5.\n\nI.e.\n\n, in the Hall of Double Truth.\n\n6.\n\nFor a translation of the remainder of the chapter according to the Saïtic recension, see Pierret, Le Livre des Morts , pp.\n\n7, 8.] {p.\n\n274} mummy to go into the underworld on the day of the funeral.\" The text is, however, mutilated in places; and the following version has been made by the help of the two copies of the text published by Pleyte, Chapitres Supplémentaires au Livre des Morts , p.\n\n182 ff.; and by Birch, Proc.\n\nSoc.\n\nBibl.\n\nArch.\n\n, 1885, p.\n\n84 f.\n\n[Chapter I B .] \" Homage to thee,[1] O thou who livest in Set-Sert of Amenta.\n\nOsiris the scribe Nekht-Amen, triumphant, knoweth thy name.\n\nDeliver thou him from the worms which are in Re-stau, and which feed upon the bodies of men and drink their blood.\n\nOsiris, the favoured one of his divine city, the royal scribe Nekht-Amen, triumphant, is known unto you [ye worms] and he knoweth your names.\n\nThis is the first bidding of Osiris, the Lord of All, who hath completed all his hidden works: 'Give thou breath [unto them] who fear those who are in the Bight of the Stream of Amenta.' He hath ordered the plans of .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nHis throne is placed within the darkness, and there is given unto him glory in Re-stau."

