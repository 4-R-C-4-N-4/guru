body = "When Pepi standeth upon the north of heaven with Ra, he becometh lord of the universe like unto the king of the gods.\"[2] To the deceased Horus gives his own ka ,[3] and also drives away the ka's of the enemies of the deceased from him, and hamstrings his foes.[4] By the divine power thus given to the deceased he brings into subjection the ka's of the gods[5] and other ka's ,[6] and he lays his yoke upon the ka's of the triple company of the gods.[7] He also becomes Thoth,[8] the intelligence of the gods, and he judges hearts;[9] and the hearts of those who would take away his food and the breath from his nostrils become the prey of his hands.[10] The heavenly life of the blessed.\n\nThe place of the deceased in heaven is by the side of God[11] in the most holy place,[12] and he becomes God and an angel of God;[13] he himself is triumphant,[14] [1.\n\n###.\n\nRecueil de Travaux, t.\n\nv., p.\n\n23, (l.\n\n197).\n\n2.\n\nIbid.\n\n, t.\n\nv., p.\n\n17, (l.\n\n91 ff.).\n\n3.\n\n###.\n\nIbid.\n\n, t.\n\nv., p.\n\n33 (l.\n\n265).\n\n4 Ibid.\n\n, t.\n\nV., p.\n\n40 (l.\n\n287).\n\n5.\n\n###.\n\nIbid.\n\n, p.\n\n45 (l.\n\n306).\n\n6.\n\n###.\n\nIbid.\n\n, t.\n\niv., p.\n\n51 (l.\n\n451); iii., p.\n\n208 (l.\n\n234).\n\n7.\n\nIbid.\n\n, t.\n\nv., p.\n\n460.\n\n(l.\n\n307).\n\n8.\n\nIbid.\n\n, t.\n\nvii., p.\n\n168 (l.\n\n452).\n\n9.\n\nIbid.\n\n, t.\n\niii., p.\n\n208 (l.\n\n233), ###.\n\n10.\n\nIbid.\n\n, t.\n\niv., p.\n\n49 (l.\n\n430), ###.\n\n11.\n\n### un-k ar kes neter ; ibid.\n\n, t.\n\niii., p.\n\n202 (l.\n\n209).\n\n12.\n\n###.\n\nIbid.\n\n, t.\n\nv., p.\n\n89 (l.\n\n178).\n\n13.\n\n###.\n\nIbid.\n\n, t.\n\nv., p.\n\n187 (l.\n\n175).\n\n14.\n\n### maa-xeru ; ibid.\n\n, t.\n\nv., p.\n\n186 (l.\n\n172).\n\nThese words are in later times always added after the name of the deceased, and seem to mean something like \"he whose voice, or speech, is right and true\"; the expression has been rendered by \"disant la vérité,\" \"véridique,\" \"juste,\" \"justifié,\" \"vainqueur,\" \"waltend des Wortes,\" \"mächtig der Rede,\" \"vrai de voix,\" \"juste de voix,\" \"victorious,\" \"triumphant,\" and the like.\n\nSee on this subject Maspero, Études de Mythologie et d'Archéologie , t.\n\ni., pp.\n\n93-114; Devéria, L'Expression Màà-xerou (in Recueil de Travaux , t.\n\ni., p.\n\n10 ff.).\n\nA somewhat different view of the signification of maakheru is given by Virey (Tombeau de Rekhmara, Paris, 1889, p.\n\n101.\n\nPublished in Mémoires publiés par les Membres de la Miss.\n\nArch.\n\nFrançaise au Caire , t.\n\nv., fasc.\n\ni.).\n\nThe offerings which were painted on the walls of the tomb were actually enjoyed by the deceased in his new state of being."

