body = "318} Text [CHAPTER LXXXIX.]: (1) THE CHAPTER OF CAUSING THE SOUL TO BE UNITED TO ITS BODY IN THE UNDERWORLD.\n\nSaith Osiris Ani: \"Hail, thou god Annitu!\n\nHail, O Runner, (2) dwelling in thy hall!\n\nO thou great god, grant thou \" that my soul may come unto me from wheresoever it may be.\n\nIf it would tarry, then bring thou unto me (3) my soul from wheresoever it may be.\n\n[ If] thou findest [me], O Eye of Horus, make thou me to stand up like those beings who are like unto Osiris and who never lie down in death.\n\nLet not (4) Osiris Ani, triumphant, triumphant, lie down in death in Annu, the land wherein souls are joined unto their bodies, even in thousands.\n\nMy soul doth bear away with it my victorious spirit (5) whithersoever it goeth[1] .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n(6) If it would tarry, grant thou that my soul may look upon my body.\n\n[If] thou findest [me], O Eye of Horus, make thou me to stand up like unto those[1] .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n(7) Hail, ye gods, who row in the boat of the lord of millions of years, who tow it (8) above the underworld, who make it to pass over the ways of Nu, who make souls to enter into their glorified bodies, (9) whose hands are filled with righteousness, and whose fingers grasp your sceptres, destroy ye (10) the foe.\n\nThe boat of the Sun rejoiceth, and the great god advanceth in peace.\n\nBehold [ye gods], grant that this soul of Osiris Ani (11) may come forth triumphant before the gods, and triumphant before you, from the eastern horizon of heaven, to follow unto the place where it was yesterday, in peace, in peace, in Amenta.\n\n(12) May he behold his body, may he rest in his glorified frame, may he never perish, and may his body never see corruption.\" Rubric: To be said over a golden [figure of a] soul inlaid with precious stones, which is to be placed on the neck of Osiris.\n\nVignette: Ani's soul, in the form of a human-headed bird, standing in front of a pylon.[2] [1.\n\nSome words are omitted here.\n\n2.\n\nThe three following variants show: (1) the soul flying through the door of the tomb to the deceased; (2) the deceased, accompanied by his soul, standing at the open door of the tomb; and (3) the deceased, with his soul hovering over him, standing with his back to the door of the tomb, upon which is the disk of the rayed sun.\n\n{Illustrations} ] {p.\n\n319} Text [CHAPTER XCI.]: (I) THE CHAPTER OF NOT LETTING THE SOUL OF A MAN BE CAPTIVE IN THE UNDERWORLD.\n\nSaith Osiris Ani: \"Hail thou who art exalted, thou who art adored, (2) thou mighty one of souls, thou Ram (or Soul), possessor of terrible power, who dost put fear of thee into the hearts of the gods, thou who art crowned upon thy mighty throne!\n\nIt is he who maketh the path for the khu and for (3) the soul of Osiris Ani."

