body = "May the Shenit ,[2] who make men to stand fast, not cause my name to stink.\"[3] Vignette: Ani holding his soul in the form of a human-headed bird.\n\nText: [CHAPTER LXI.] (I) CHAPTER OF NOT LETTING THE SOUL OF A MAN BE TAKEN AWAY FROM HIM IN THE UNDERWORLD.\n\nOsiris the scribe Ani saith: \"I, even I, am he (2) who came forth from the water-flood which I make to overflow and which becometh mighty as the River [Nile].\" Appendix; In many early papyri the text of Chapter LXI.\n\nforms part of a longer composition which M.\n\nNaville calls Chapters LXI.,[4] LX.,[5] and LXII.,[6] and which reads:-- (1) CHAPTER OF DRINKING WATER IN THE UNDERWORLD.\n\n[He saith]: \"I, even I, am he who cometh forth from (2) Seb.\n\nThe flood hath been given unto him, [1.\n\nThis chapter is usually accompanied by a vignette.\n\nIn that in the papyrus of Nebseni the deceased is being weighed against his own heart; an ape, \"Thoth, lord of the Balance,\" seated on a pedestal, holds the tongue of the balance.\n\nIn British Museum Papyrus No.\n\n9964 the deceased is also weighed against his own heart, but at the same time a figure of himself is also watching the process.\n\nIn the papyrus of Sutimes a square weight lies in each pan of the scales.\n\nOther vignettes have simply a scarab, or the deceased addressing his heart, which rests on a standard.\n\nSee Naville, Todtenbuch , Bd.\n\nI., Bl.\n\n43.\n\n2.\n\nA class of divine beings.\n\n3.\n\nThe chapter as here given is incomplete; the missing words are: \"pleasant for us, pleasant is the hearing, and there is gladness of heart at the weighing of words.\n\nLet not lies be spoken against me near the god, in the presence of the great god, the lord of Amentet.\n\nVerily, how great shalt thou be when thou risest up in triumph!\" 4.\n\nThe vignette represents the deceased on his knees embracing his soul.\n\n5.\n\nVignette: a man kneeling and holding a lotus.\n\n6.\n\nVignettes: the deceased scooping water with his hands out of a tank.] and he hath gotten power over it as Hapi.\n\nI, even I, open the (3) two doors of heaven: and the two doors of the watery abyss have been opened unto me by Thoth and by Hapi, the divine twin sons of heaven, (4) who are mighty in splendours.\n\nO grant ye that I may gain power over the water, even as Set overcame his foes on the day(?) (5) when he terrified the world.\n\nI have passed by the great ones shoulder against shoulder, even as they have passed by that great and splendid god who is (6) provided [with all things] and whose name is unknown.\n\nI have passed by the mighty one of the shoulder.\n\n(7) The flood of Osiris hath been passed through by me, and Thoth-Hapi-Tmu, the lord of the horizon, hath opened unto me the flood in his name, 'Thoth, the cleaver of the earth.' (8) I have gained power over the water, even as Set gained power over his foes.\n\nI have sailed over heaven.\n\nI am Ra.\n\nI am the Lion-god.\n\nI am the young bull (9).\n\nI have devoured the Thigh, I have seized the flesh.\n\nI have gone round about the streams in Seket-Aru."

