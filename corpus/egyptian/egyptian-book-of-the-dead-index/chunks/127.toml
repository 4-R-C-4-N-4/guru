body = "I., Pl.\n\nxiv.\n\nII.\n\nNaville, Todtenbuch , Bd.\n\nI., Pl.\n\nxv.; III.\n\nBritish Museum Papyrus No.\n\n9901 and IV.\n\nBritish Museum Papyrus No.\n\n10,471.\n\nI.\n\n(1) A HYMN OF PRAISE TO RA WHEN HE RISETH IN THE EASTERN PART OF HEAVEN.\n\nBehold Osiris, Qenna the merchant, (2) who saith: \"Homage to thee, in thy rising thou Tmu in thy crowns of beauty.\n\nThou risest, thou risest, thou Ra shinest, (3) thou shinest, at dawn of day.\n\nThou art crowned like unto the king of the gods, and the goddess Shuti doeth homage unto thee.\n\n(4) The company of the gods praise thee from the double-dwelling.\n\nThou goest forth over the upper air and thy heart is filled with gladness.\n\n(5) The sektet boat draweth onward as [Ra] cometh to the haven in the atet boat with fair winds.\n\nRa rejoiceth, Ra rejoiceth.\n\n(6) Thy father is Nu, thy mother is Nut, and thou art crowned as Ra-Harmachis.\n\nThy sacred boat advanceth in peace.\n\nThy foe hath been cast down and his (7) head hath been cut off; the heart of the Lady of life rejoiceth in that the enemy of her lord hath been overthrown.\n\nThe mariners of Ra have content of heart and Annu rejoiceth.\" (8) The merchant Qenna saith: \"I have come to thee, O Lord of the gods, Tmu-Harmachis, who passest over the earth .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n(9) I know that by which thou dost live.\n\nGrant that I may be like unto one of those who are thy favoured (10) ones [among the followers] of the great god.\n\nMay my name be proclaimed, may it be found, may it be lastingly renewed with .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n(11) The oars are lifted into the sektet boat, and the sacred boat cometh in peace.\n\n(12) May I see Ra when he appeareth in the sky at dawn, and when his enemies have fallen at the block.\n\n(13) May I behold [Horus] guiding the rudder and steering with [his] two hands.\n\n(14) May I see the abtu fish at the moment of his creation; and may I see the ant fish when he maketh himself manifest at creation, and the ant boat upon its lake.\n\nO thou Only One, O thou Mighty One, thou Growing One, (15) who dost never wax faint, and [1.\n\nA name of the boat of the rising sun.] {p.\n\n250} from whom power cannot be taken.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nthe devoted (17) servant of \"the lord of Abtu.\" \"The merchant Qenna saith: (18) \"Homage to thee Heru-Khuti-Tmu, Heru-Khepera, mighty hawk, who dost cause the body [of man] to make merry, beautiful of face by reason of thy two great plumes.\n\nThou (19) wakest up in beauty at the dawn, when the company of the gods and mortals sing songs of joy unto thee; hymns of praise are offered unto thee at eventide.\n\nThe (20) starry deities also adore thee.\n\nO thou firstborn, who dost lie without movement, (21) arise; thy mother showeth loving kindness unto thee every day.\n\nRa liveth and the fiend Nak is dead; thou dost endure for ever, and the (22) fiend hath fallen."

