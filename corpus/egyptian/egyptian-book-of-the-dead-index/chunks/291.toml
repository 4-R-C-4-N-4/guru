body = "i-nek sexem-k am xu Cometh to thee thy sekhem among the khu's.[6] [1.\n\nI.e.\n\n, Horus.\n\n2 Recueil de Travaux , t.\n\nv., p.\n\n19 (l.\n\n174).\n\n3.\n\nRecueil de Travaux , t.\n\nv., p.\n\n41 (l.\n\n289).\n\n4.\n\nSee below, p.\n\n117.\n\n5.\n\nSee below, p.\n\n115.\n\n6.\n\nRecueil de Travaux , t.\n\nv., p.\n\n160 (l.\n\n13).] {p.\n\nlxix} 2.\n\nUda sexem-k am xu Pure is thy sekhem among the khu's.[1] 3.\n\naha uab-k uab ka-k uab ba-k uab Thou art pure, pure is thy ka , pure is thy soul, pure is sexem-k thy sekhem.[1] A name of Ra was[3] sekhem ur , the \"Great Sekhem,\" and Unas is identified with him and called:-- sexem ur sexem em sexemu Great sekhem , sekhem among the sekhemu .[4] The ren or name Finally, the name, ren , of a man was believed to exist in heaven, and.\n\nin the pyramid texts we are told that nefer en Pepi pen hena ren-f anx Pepi pen hena ka-f Happy is Pepi this with his name, liveth Pepi this with his ka .[5] Thus, as we have seen, the whole man consisted of a natural body, a spiritual body, a heart, a double, a soul, a shadow, an intangible ethereal casing or spirit, a form, and a name.\n\nAll these were, however, bound together inseparably, and the welfare of any single one of them concerned the welfare of all.\n\nFor the well-being of the spiritual parts it was necessary to preserve from decay the natural body; and [1.\n\nRecueil de Travaux , t.\n\nv., p.\n\n175 (l.\n\n113).\n\n2.\n\nRecueil de Travaux , p.\n\n175, 1.\n\n112.\n\n3.\n\nIbid.\n\n, t.\n\niv., p.\n\n44,1.\n\n393.\n\n4.\n\nIbid.\n\n, p.\n\n60, ll.\n\n514, 515 5.\n\nIbid.\n\n, t.\n\nv., p.\n\n183, l.\n\n169.] {p.\n\nlxx} certain passages in the pyramid texts seem to show that a belief in the resurrection of the natural body existed in the earliest dynasties.[1] The texts are silent as to the time when the immortal part began its beatified existence; but it is probable that the Osiris[2] of a man only attained to the full enjoyment of spiritual happiness after the funeral ceremonies had been duly per formed and the ritual recited.\n\nComparatively few particulars are known of the manner of life of the soul in heaven, and though a number of interesting facts may be gleaned from the texts of all periods, it is very difficult to harmonize them.\n\nThis result is due partly to the different views held by different schools of thought in ancient Egypt, and partly to the fact that on some points the Egyptians them selves seem to have had no decided opinions.\n\nWe depend upon the pyramid texts for our knowledge of their earliest conceptions of a future life.\n\nThe existence in heaven.\n\nThe life of the Osiris of a man in heaven is at once material and spiritual and it seems as if the Egyptians never succeeded in breaking away from their very ancient habit of confusing the things of the body with the things of the soul."

