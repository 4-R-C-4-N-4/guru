[content]
body = "12) with the instrument ###[1], and the Kher-heb at the same time says: \"O Sem priest, lay the pesh-en-kef upon his mouth, and say, 'I have stablished for thee thy two jaw-bones in thy face which was divided into two parts.'\" The Sem priest next makes an offering of grapes (Fig.\n\n13), the Kher-heb saying: \"O Sem priest, place the grapes upon his mouth and say, 'He bringeth to thee the eye of Horus, he graspeth it; do thou also grasp it.'\" After an ostrich feather has been offered (Fig.\n\n14) by the Sem priest, and a number of the ceremonies described above have been repeated, and other animals slaughtered, the Kher-heb addresses the Sem priest, and says: \"Take the instrument Tun-tet [2] (thrice) and open the mouth and the eyes\" (four times).\n\nHe then continues: \"O Sem priest, take the iron instrument of Anubis, Tun-tet (thrice).\n\nOpen the mouth and the two eyes (four times), and say, 'I open for thee thy mouth with the iron instrument of Anubis with which he opened the mouths of the gods.\n\nHorus openeth the mouth, Horus openeth the mouth, Horus openeth the mouth with the iron which cometh forth from Set, wherewith he hath opened the mouth of Osiris.\n\nWith the iron tool ( meskhet ) wherewith he opened the mouths of the gods doth he open the mouth.\n\nHe [the deceased] shall go in and he shall speak [again], and his body shall dwell with the company of the great gods in Annu, wherein he hath received the ureret crown from Horus, lord of men.\n\nHail, Horus openeth thy mouth and thy two eyes with the instrument Seb-ur or Teman ,[3] with the instrument Tun-tet of the Opener of the Roads ( i.e.\n\n, Anubis) wherewith he opened the mouth of all the gods of the North.\n\nHorus the Great[4] cometh to embrace thee.\n\nI, thy son who loveth thee, have opened thy mouth and thy two eyes.\n\nHis mother beateth her breast in grief while she embraceth him, and the two sisters ( i.e.\n\n, Isis and Nephthys), who are one, strike themselves in grief.\n\nAll the gods open thy mouth according to the book of the service.\"' The Kher-heb next instructs the Sem priest to clothe the mummy or statue of the deceased with the nemes [1.\n\nIt is called Pesh-en-kef .\n\nSee Dümichen, Der Grabpalast des Patuamenap , Abth.\n\nI, pp.\n\n18, 19.\n\n2.\n\n###.\n\n3.###.\n\n4 Heru-ur, the Heroeris of the Greeks.] {p.\n\n270} band or fillet (Fig.\n\n15), and to say: \"Lo!\n\nthe nemes fillet, the nemes fillet, which cometh as the light, which cometh as the light; it cometh as the eye of Horus, the brilliant; it cometh forth from Nekheb.\n\nThe gods were bound therewith; bound round is thy face with it in its name of Hetch ( i.e.\n\n, light, or brilliance), coming forth from Nekheb.\n\n\"All that could do harm to thee upon earth is destroyed.\" The Sem priest, holding a vase of ointment in his left hand, and smearing the mouth with his fore-finger (Fig.\n\n16), says: \"I have anointed thy face with ointment, I have anointed thine eyes.\n\nI have painted thine eye with uatch and with mestchem ."

