body = "I have sailed on its Lake that I may come unto its cities, and I have drawn nigh It unto the city Hetep.[3] For behold, I repose at the seasons [of Horus].\n\nI have passed through the region of the company of the gods who are aged and venerable.\n\n(7) 1 have pacified the two holy Fighters[4] who keep ward upon life.\n\nI have done that which is right and fair, and I have brought an offering and have pacified the two holy Fighters.\n\nI have cut off the (9) hairy scalp of their adversaries, and I have made aft end of the (10) woes which befel [their] children; (11) I have done away all the evil which came against their souls; I have gotten dominion over it, (12) 1 have knowledge thereof.\n\nI have sailed forth on the waters [of the lake] (13) that I may come unto the cities thereof.\n\nI have power (14) over my mouth, being furnished [with] charms; let not.\n\n[the fiends] get the mastery over me, (16) let them not have dominion over me.\n\nMay I be equipped in thy Fields of Peace.\n\nWhat thou wishest that shalt thou do, [saith the god].\" Vignette: The Sekhet-hetepet or \"Fields of Peace,\" surrounded and intersected with streams.\n\nThey contain the following: ( a.\n\n) Thoth, the scribe of the gods, holding pen and palette, introduces Ani, who is making an offering, and his ka to three gods who have the heads of a hare, serpent, and bull respectively, and are entitled pauti , \" the company of the gods.\" Ani and a table of offerings in a boat.\n\nAni addressing a hawk standing [1.\n\nReading, with the Nebseni papyrus, ma Akeru .\n\n2.\n\nAdding from the Nebseni papyrus: as kua xenen-a uaa pen aa em Se-Hetep .\n\n3.\n\nAdding from the Nebseni papyrus: renp-th renp-th xen-na em se-s er sper-a er nut-s xent-a er Hetep-sen entet .\n\n4.\n\nI.e.\n\n, Horus and Set.] {p.\n\n364} on a pylon-shaped pedestal, before which are an altar and a god.\n\nThree ovals.[1] The legend reads un em hetep sexet nifu er fent , \"Being at peace in the Field [of Peace], and having air for the nostrils.\" ( b.\n\n) Ani reaping wheat, with the words asex Ausar , \"Osiris reaps\"; guiding the oxen treading out the corn; standing with hands and holding the kherp sceptre, and kneeling before two vessels of red barley and wheat.\n\nThe hieroglyphics seem to mean, \"the food of the shining ones.\" Three ovals.[2] ( c.\n\n) Ani ploughing[3] with oxen in a part of the Fields of Peace called \"Sekhet-aanre\"; with the word sekau , to plough.\n\nThe two lines of hieroglyphics read:-- re en hete'et atru 1000 em au-f an t'et usex-f an un remu neb am-f an hefau nebt am-f.\n\nChapter of the River-horse.\n\nThe river is one thousand [cubits] in its length.\n\nNot can be told its width.\n\nNot exist fishes any in it, not [exist] serpents any in it.\n\n[1.\n\nIn the Nebseni papyrus they are called Qetqetmu, Hetepmu, and Urmu.\n\n2."

