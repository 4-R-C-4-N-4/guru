[content]
body = "[He saith]: \"My heart, my mother; my heart, my mother.\n\nMy heart of my life upon earth.\n\nMay naught rise up (3) against me in judgment in the presence of the lord of the trial; let it not be said concerning me and of that which I have done.\n\n'He hath done deeds against that which is right and true'; may naught be against me in the presence of the great god, the lord of Amenta.\n\nHomage to thee, O my heart!\n\nHomage to thee, O my heart!\n\nHomage to you, O my reins![3] Homage to you, O ye gods who rule over the divine clouds, and who (5) are exalted by reason of your sceptres; speak ye comfortably unto Ra, and make me to prosper before Nehebka.\" And behold him, even though he be joined to the earth in the innermost parts thereof, and though he be laid upon it, he is not dead in Amenta, but is a glorified being therein.\n\nVignette: The deceased holding his heart to his breast with his left hand, and kneeling before a monster with a knife in its hand.\n\nText [CHAPTER XXVIII.]: (1) [THE CHAPTER OF] NOT LETTING THE HEART OF THE DECEASED BE CARRIED AWAY IN THE UNDERWORLD.\n\n[Saith he]: (2) \"Hail, Lion-god!\n\nI am Un.[4] That which I hate is the block of the god.\n\nLet not this my heart be taken away from me by (3) the Fighter[5] in Annu.\n\nHail thou who dost bind Osiris, and who hast seen Set!\n\nHail thou who returnest after smiting and destroying him.\n\n(4) This heart sitteth and weepeth in the presence of Osiris; it hath with it the staff for which it entreated him.\n\nMay there be given unto me for it, may there be decreed unto me for it the hidden things[6] of the heart in the (5) house of Usekh-hra; may [1.\n\nSee Naville, Todtenbuch , Bd.\n\nI., Bl.\n\n40.\n\n2.\n\nUnderstanding some word like ###; see the text in Lepsius.\n\n3.\n\nBrugsch believes that the word means the liver or kidneys, or some special organ.; see Wörterbuch , p.\n\n421.\n\n4.\n\nReading; another variant has \"I am Ra.\" 5 I.e.\n\n, the being represented in the vignette.\n\n6 Var.\n\nta ab , \"warmth of heart.\"] {p.\n\n314} there be granted unto it food at the bidding of the Eight.[1] Let not this my heart be \"taken from me!\n\nI make thee to dwell in thy place, joining together hearts in (6) Sekhet-hetepu, and years of strength in all places of strength, carrying away food (?) at thy it moment with thy hand according to thy great strength.\n\nMy heart is placed upon the altars of Tmu (7), who leadeth it to the den of Set; he hath given unto me my heart, whose will hath been done by the godlike rulers in Neter-khert.\n\nWhen they find the leg[2] and the swathings they bury them.\" Vignette: Ani and his wife Thuthu, each holding the emblem of air in the left hand, and drinking water with the right from a pool, on the borders of which are palm trees laden with fruit.\n\nText [CHAPTER LVIII.]: (1) THE CHAPTER OF BREATHING THE AIR AND OF HAVING POWER OVER THE WATER IN THE UNDERWORLD.\n\nSaith Osiris Ani: \"Open to me!\n\nWho art thou then, and whither dost thou fare?"

