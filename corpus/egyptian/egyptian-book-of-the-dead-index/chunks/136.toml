body = "The palettes of the Egyptian scribe were rectangular, and were made of wood, stone, basalt, ivory (see Nos.\n\n5512a, 5513, 5525a, and 12,779, etc., in the British Museum).\n\nThey measure from 10 to 17 inches in length, and from 2 to 3 inches in width.\n\nThey usually contain two round cavities to hold red and black ink, and a groove to hold the reed-pens.\n\nThe inscriptions on them, which usually have reference to Thoth, are cut, or written in ink, or inlaid in colour; the name of the owner of the palette is generally added.\n\nThe colours with which the Egyptians wrote were made of vegetable substances, coloured earths, and preparations of copper.\n\n4 She is also called \"Devourer of Amenta\" (i.e., the underworld), and Shai (see Lanzone, Dizionario , p.\n\n129).\n\nIn the British Museum papyrus No.\n\n9901 she is described as hat en emsuh; pehu-s em tebt her-ab-set em ma \"the fore-part of a crocodile; her hind-quarters are those of a hippopotamus; her middle part [is that] of a lion.\" {footnote p.\n\n258} The Devourer usually stands near the balance instead of behind Thoth; but there is one papyrus quoted by Naville, (Todtenbuch, Bd.\n\nI., Bl.\n\n136) in which she is shown crouching beside the lake of fire in the infernal regions.\n\n] {p.\n\n258} Text: [Chapter XXX B .] Osiris, the scribe Ani, saith:[1] \"My heart my mother, my heart my mother, my heart my coming into being!\n\nMay there be nothing to resist me at [my] judgment; may there be no opposition to me from the Tchatcha ;[2] may there be no parting of thee from me in the presence of him who keepeth the scales!\n\nThou art my ka within my body [which] knitteth[3] and strengtheneth my limbs.\n\nMayest thou come forth to the place of happiness to which[4] I am advancing.\n\n\"May the Shenit [5] not cause my name to stink, and may no lies be spoken against me in the presence of the god![6] Good is it for thee to hear.\"[7] .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nThoth, the righteous judge of the great company of the gods who are in the presence of the god Osiris, saith: \"Hear ye this judgment.\n\nThe heart of Osiris hath in very truth been weighed, and his soul hath stood as a witness for him; it hath been found true by trial in the Great Balance.\n\nThere hath not been found any wickedness in him; he hath not wasted the offerings in the temples; he hath not done harm by his deeds; and he uttered no evil reports while he was upon earth.\" The great company of the gods reply to Thoth dwelling in Khemennu: \"That which cometh forth from thy mouth hath been ordained.\n\nOsiris, the scribe [1.\n\nAni's speech forms the text of Chapter XXX B .\n\nas numbered by M.\n\nNaville ( Todtenbuch , Bd.\n\nI., Bl.\n\n43).\n\n2.\n\nThe four gods of the cardinal points, Mestha, Hapi, Tuamautef, and Qebhsennuf (see Naville, Todtenbuch Einleitung , p.\n\n164).\n\nSome copies read, \"Thou art my ka within my body, the god Khnemu ( i.e."

