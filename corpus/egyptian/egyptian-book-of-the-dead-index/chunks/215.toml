body = "Sacred Texts Egypt Index Previous Next PLATES XXIX.\n\nAND XXX.\n\nVignette (PLATE XXIX.): Ani and his wife standing with hands raised in adoration before the god Thoth, who has ankh , \"life,\" upon his knees, and is seated on a pylon-shaped throne.\n\nText [CHAPTER CLXXV.]: (1) THE CHAPTER OF NOT DYING A SECOND TIME.\n\nSaith Osiris Ani, triumphant: \"(2) Hail, Thoth!\n\nWhat is it that hath happened unto the holy children of Nut?\n\n(3) They have done battle, they have upheld {p.\n\n342} strife, they have done evil, (4) they have created the fiends, they have made slaughter, they have caused (5) trouble; in truth, in all their doings the mighty have worked against the weak.\n\n(6) Grant, O might of Thoth, that that which the god Tmu hath decreed [may be done]!\n\nAnd thou regardest not evil, nor art thou (7) provoked to anger when they bring their years to confusion and throng in and push to disturb their months; for in all that they have done (8) unto thee they have worked iniquity in secret.\n\nI am thy writing palette, O Thoth, and I have brought unto thee thine ink jar.\n\nI am not (9) of those who work iniquity in their secret places; let not evil happen unto me.\" Saith Osiris, the scribe Ani: (10) \"Hail, Tmu!\n\nWhat manner [of land] is this into which I have come?\n\nIt hath not water, it hath not air; it is deep unfathomable, (11) it is black as the blackest night, and men wander helplessly therein.\n\nIn it a man may not live in quietness of heart; nor may the longings of love be satisfied therein.\n\n(12) But let the state of the shining ones be given unto me for water and for air and for the satisfying of the longings of love, and let quietness of heart be given unto me for bread (13) and for ale.\n\nThe god Tmu hath decreed that I shall see his face, and that I shall not suffer from the things which pain him.\n\nMay the gods hand on (14) their thrones for millions of years.\n\nThy throne hath descended unto thy son Horus.\n\nThe god Tmu hath decreed that his course shall be among the holy princes.\n\n(15) In truth, he shall rule over thy throne, and he shall be heir of the throne of the dweller in the Lake of Fire.\n\nIt hath been decreed that in me he shall see his likeness, and that (16) my face shall look upon the lord Tmu.\n\nHow long then have I to live?\n\nIt is decreed that thou shalt live for millions of millions of years, a life of millions of years.\n\n(17) May it be granted that I pass on unto the holy princes, for I am doing away with all that I did when this earth came into being from Nu (18), and when it sprang from the watery abyss even as it was in the days of old.\n\nI am Fate (?) and Osiris, and I have changed my form into the likeness of divers serpents (19).\n\nMan knoweth not, and the gods cannot see, the two-fold beauty which I have made for Osiris, who is greater than all the gods.\n\nI have granted that he [shall rule] in the mount of the dead (20).\n\nVerily his son Horus is seated upon the throne of the dweller in the double Lake of Fire, as his heir.\n\nI have set his throne in (21) the boat of millions of years."

