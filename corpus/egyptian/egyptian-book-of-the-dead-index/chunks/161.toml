body = ", who are these gods?] Mestha, Hapi[1] Tuamautef, and Qebhsennuf.\n\n(83) \"Homage to you, O ye lords of right and truth, and ye holy ones who [stand] behind Osiris, who utterly do away with (84) sins and crime, and [ye] who are in the following of the goddess Hetep-se(85)-khus, grant that I may come unto you.\n\nDestroy ye all the faults which (86) are within me, even as ye did for the seven Shining Ones (87) who are among the followers of their lord Sepa.[1] (88) Anubis appointed their place on the day [when was said], 'Come therefore thither.'\" What then (89) is this?\n\nThese lords of right and truth are Thoth and (90) Astes, lord of Amenta.\n\nThe holy ones who stand behind Osiris, even Mestha, (91) Hapi, Tuamautef, and Qebhsennuf, are they who are (92) behind the Thigh[2] in the northern sky.\n\nThey who do away with (93) sins and crime and who are in the following of the goddess Hetep-se-khus (94) are the god Sebek in the waters.\n\nThe goddess Hetep-se-khus is the eye of (95) Ra, or (as others say), It is the flame which followeth after Osiris to burn up (96) the souls of his foes.\n\nAs concerning all the faults which are (97) in Osiris, the scribe of the holy offerings of all the gods, Ani, triumphant, [they are all that he hath done against the lords of eternity][3] since he came forth (98) from his mother's womb.\n\nAs concerning (99) the seven Shining Ones, even Mestha, Hapi, Tuamautef, Qebhsennuf, (100) Maa-atef-f, Kheri-beq-f, and Horus-Khenti-maa, Anubis appointed (101) them protectors of the body of Osiris, or (as others say), (102) [set them] behind the place of purification of Osiris; or (as others say), Those seven glorious ones are (103) Netcheh-netcheh, Aqet-qet, An-erta-nef-bes-f-khenti-heh-f,[4] (104) Aq-her-unnut-f,[5] Tesher-maa-ammi (105) -het-Anes,[6] [1.\n\nBritish Museum papyrus No.\n\n10,477 reads ### which agrees with many of the variants given in Naville, Todtenbuch , Bd.\n\nII., P1.\n\nliii.\n\nThe papyrus of Nebseni agrees with that of Ani; No.\n\n19,471 has the curious reading, ###.\n\n2.\n\nThe Egyptian name for the constellation of the Great Bear.\n\nSee Brugsch, Astronomische und Astrologische Inschriften , p.\n\n123.\n\n3.\n\nSome such words as have been omitted.\n\nSee Naville, Todtenbuch , Bd.\n\nIL, Pl.\n\nlv.\n\n4.\n\nI.e.\n\n, \"He doth not give his flame, he dwelleth in the fire.\" 5.\n\nI.e.\n\n, \"He goeth in at his hour.\" 6.\n\nI.e.\n\n, \"He that hath two red eyes, the dweller in Het-Anes.\" According to Brugsch (Dict.\n\nGéog., p.\n\n64), Het-Anes, i.e.\n\n, the \"house of cloth,\" was a district belonging to the temple of Suten-henen or Heracleopolis in Upper Egypt.] {p."

