[content]
body = "(15) Hail, lord of Right and Truth, who comest forth from Maati, I have not laid waste the ploughed lands.\n\n(16) Hail, Strider, who comest forth from Bast, I have not been an eavesdropper.\n\n(17) Hail, Aaati, who comest forth from Annu, I have not set my lips in motion against any man.\n\n(18) Hail, thou god of two-fold evil, who comest forth from Ati, I have not been angry without a cause.\n\n(19) Hail, thou god who art in the likeness of a serpent, who comest forth from the torture-chamber, I have not committed adultery with the wife of any man.\n\n(20) Hail, thou who regardest that which is brought before thee, who comest forth from Pa-Amsu, I have not polluted myself (21) Hail, thou mighty Chief, who comest forth from the city of acacia trees, I have not caused terror.\n\n(22) Hail, Khemi, who comest forth from Kesui, I have not done that which is abominable.\n\n(23) Hail, thou who orderest speech, who comest forth from Urib, I have never uttered fiery words.\n\n(24) Hail, thou Babe, who comest forth from the Heq-at nome, I have not stopped my ears against the words of Right and Truth.\n\n(25) Hail, thou who orderest speech, who comest forth from Unes, I have not stirred up strife.\n\n(26) Hail, Bast, who comest forth from the secret city, I have not caused [any] to weep.\n\n(27) Hail, thou whose face is turned behind thee, I have not lusted, nor have I committed fornication, nor have I done any other abominable thing.\n\n(28) Hail, Blazing feet, who comest forth from the darkness, I have not avenged myself (29) Hail, Kenemti, who comest forth from Kenemti, I have never worked grief.\n\n(30) Hail, thou who bringest thy offering, who comest forth from Sau, I have not acted insolently.\n\n(31) Hail, lord of faces, who comest forth from Tchefet, I have never judged hastily.\n\n(32) Hail, Sekheriu, who comest forth from Unth, I have not transgressed, nor have I vexed or angered God.\n\n(33) Hail, lord of the two horns, who comest forth from Saui, I have not multiplied my speech overmuch.\n\n(34) Hail, Nefer-Tmu, who comest forth from Het-Ptah-ka, I have done no harm nor have I done [1.\n\nVar.\n\n\"I have or worked deceit in the place of Right and Truth.\" See Naville, Todtenbuch , Bd.\n\nII., p.\n\n292.\n\n2.\n\nOne variant has, \"who comest forth from Seshet\" and another, \"who comest forth from Annu\"; see Naville, Todtenbuch , Bd.\n\nII., Bl.\n\n292; Lepsius, Todtenbuch, Bl.\n\n47, 1.\n\n21.] {p.\n\n351 } evil.\n\n(35) Hail, Tmu in thine hour, who comest forth from Tattu, I have not worked treason.\n\n(36) Hail, thou who workest in thy heart, who comest forth from Tebtu, I have never befouled the water.\n\n(37) Hail, thou bearer of the sistrum, who comest forth from Nu, I have not spoken scornfully."

