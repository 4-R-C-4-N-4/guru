[content]
body = "The unclean man who would walk thereover doth fall down among the knives; or (as others say), His name is \"Mathes,\"[2] and he is the watcher of the door of Amenta; or (as others say), His name is \"Heri-sep-f.\" \"Hail, Lord of terror, chief of the lands of the North and South, lord of the red glow, who preparest the slaughter-block, and who dost feed upon the inward parts!\" Who then is this?\n\nThe guardian of the Bight of Amenta.\n\nWhat then is this?\n\nIt is the heart of Osiris, which is the devourer of all slaughtered things.\n\nThe urerit crown hath been given unto him with swellings of the heart as lord of Suten-henen.\n\nWhat then is this?\n\nHe to whom hath been given the urerit crown with swellings of-the heart as lord of Suten-henen is Osiris.\n\nHe was bidden to rule among the gods on the day of the union of earth with earth in the presence of Neb-er-tcher.\n\nWhat then is this?\n\nHe that was bidden to rule among the gods is [Horus] the son of Isis, who was appointed to rule in the place of his father Osiris.\n\nAs to the day of the union of earth with earth, it is the mingling of earth with earth in the coffin of Osiris, the Soul that liveth in Suten-henen, the giver of meat and drink, the destroyer of wrong, and the guide of the everlasting paths.\n\nWho then is this?\n\nIt is Ra himself.\n\n\"Deliver thou [me] from the great god who carrieth away souls, and who devoureth filth and eateth dirt, the guardian of the darkness [who himself \" liveth] in the light.\n\nThey who are in misery fear him.\" As concerning the souls within the (113) tchafi [they are those which are] with the god who carrieth away the soul, who eateth hearts, and who feedeth (114) upon offal, the guardian of the darkness who is within the seker boat; they who live in (115) crime fear him.\n\nWho then is this?\n\nIt is Suti, or (as others say), It is Smam-ur,[3] (116) the soul of Seb.\n\n\"Hail, Khepera in thy boat, the twofold company of the gods is thy body.\n\nDeliver thou Osiris (117) Ani, triumphant, from the watchers who give judgment, [1.\n\nReading se en Unt .\n\n2 The one with a knife.\n\n3 I.e.\n\n, Great Slayer.] {p.\n\n290} who have been appointed by Neb-er(118)-tcher to protect him and to fasten the fetters on his foes, and who slaughter in the shambles (119); there is no escape from their grasp.\n\nMay they never stab me with their knives, (120) may I never fall helpless in their chambers of torture.\n\n(121) Never have the things which the gods hate been done by me, for I am pure within the Mesqet.\n\n(122) Cakes of saffron have been brought unto him in Tanenet.\" Who then is this?\n\n(123) It is Khepera in his boat.\n\nIt is Ra himself.\n\nThe watchers (124) who give judgment are the apes Isis and Nephthys.\n\nThe things which the gods hate (125) are wickedness and falsehood; and he who passeth through the place of purification within the Mesqet is Anubis, who is (126) behind the chest which holdeth the inward parts of Osiris."

