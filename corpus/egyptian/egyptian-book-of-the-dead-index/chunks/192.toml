body = "Sacred Texts Egypt Index Previous Next PLATE XVIII.\n\nMy soul (5) seeth the great god within the boat of Ra on the day of souls.\n\nMy soul is (6) in the front among those who tell the years.\n\nCome; the eye of Horus, which stablisheth glories (7) upon the brow of Ra and rays of light upon the faces of those who are with the limbs of Osiris, hath delivered my soul.\n\n(8) O shut ye not in my soul, fetter ye not my shade (9) may it behold the great god [1.\n\nSee Plate XVIII.\n\n2 The reading of the Nebseni papyrus is ###.\n\n3 Adding ### from the Nebseni papyrus.] {p.\n\n320} within the shrine on the day of the judgment of souls, may it repeat the words of Osiris.\n\n(10) May those beings whose dwelling-places are hidden, who fetter the limbs of Osiris, who fetter the souls of the khu, who shut in (11) the shade[s] of the dead and can do evil unto me-may they do no evil unto me, may they turn away their path from me.\n\nThy heart (12) is with thee; may my soul and my khu be prepared against their attack.\n\nMay I sit down among the great rulers who (13) dwell in their abodes; may my soul not be set in bondage by those who fetter the limbs of Osiris, and who fetter souls, and who shut in (14) the shade[s] of the dead.\n\nThe place which thou possessest, is it not Heaven?\n\n\" Rubric: If this chapter be known, he shall come forth by day and his soul shall not be shut in.\n\nVignette: Ani kneeling, with both hands raised in adoration, by the side of the Seker[1] boat placed upon its sledge.\n\nText [CHAPTER LXXIV.]: (I) THE CHAPTER OF WALKING WITH THE TWO LEGS, AND OF COMING FORTH UPON EARTH.\n\nSaith Osiris Ani: \"Thou hast done all thy work, O Seker, thou hast done all thy work, O Seker, in thy dwelling place within my legs in the (2) underworld.\n\nI shine above the Leg[2] of the Sky, I come forth from heaven; I recline with the glorified (3) spirits.\n\nAlas!\n\nI am weak and feeble; alas!\n\nI am weak and feeble.\n\nI walk.\n\nI am weak and feeble in the (4) presence of those who gnash with the teeth in the underworld, I Osiris, the scribe Ani, triumphant in peace.\" Vignette: The emblem of Amenta and Ani standing with a staff in his left hand.\n\nText [CHAPTER VIII.]: (I) THE CHAPTER OF PASSING THROUGH AMENTA, AND OF COMING FORTH BY DAY.\n\nSaith Osiris Ani: \"The hour (?) openeth; (2) the head of Thoth is sealed up; perfect is the eye of Horus.\n\nI have delivered the eye of Horus which shineth with splendours on the forehead of Ra, (3) the father of the gods.\n\nI am the same Osiris, dwelling in Amenta.\n\nOsiris knoweth his day and that he shall not live therein; nor shall I live therein.\n\n(4) I am the Moon among the gods; I shall not come to an end.\n\nStand up, therefore, O Horus; Osiris hath counted thee among the gods.\" [1.\n\nThe god Seker was a form of the night sun, like Ptah, Osiris and Tanen; see Lanzone, Dizionario , P.\n\n1113."

