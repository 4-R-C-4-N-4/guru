body = "Behind them, upon a cubit-shaped base, is a house with four windows in its upper half, and upon the roof two triangular projections similar to those which admit air into modern houses in the East.\n\nBefore the door are a sycamore (?) tree and a palm tree, with clusters of fruit; on the left is the god Osiris on his throne, and behind him stands \"Maat, mistress of the two countries, daughter of Ra,\" above whom are two outstretched female arms proceeding from a mountain and holding a disk between the hands.\n\nIn the centre, between Osiris and the deceased, is a pool of water with three sycamore (?) trees on each side, and at each corner a palm tree bearing clusters of dates; and from it there springs a vine laden with bunches of grapes.\n\nIn British Museum papyrus No.\n\n10,472 the god seated in the shrine wears the crown of the god Tanen, and is called \"Ptah-Seker-Ausar, within the hidden place, great god, lord of Ta-sert, king of eternity, prince of the everlasting.\" Text: Saith Horus, the son of Isis: \"I have come unto thee, O Unnefer, and I have brought the Osiris Ani unto thee.\n\nHis heart is [found] righteous coming forth from the balance, and it hath not sinned against god or goddess.\n\nThoth hath weighed it according to the decree uttered unto him by the company {p.\n\n261} of the gods; and it is very true and righteous.\n\nGrant him cakes and ale; and let him enter into the presence of Osiris; and may he be like unto the followers of Horus for ever.\" Behold, Osiris Ani saith: \"O Lord of Amentet (the underworld), I am in thy presence.\n\nThere is no sin in me, I have not lied wittingly, nor have I done aught with a false heart.\n\nGrant that I may be like unto those favoured ones who are round about thee, and that I may be an Osiris, greatly favoured of the beautiful god and beloved of the lord of the world, [I] the royal scribe indeed, who loveth him Ani, triumphant before the god Osiris.\" Appendix: The usual title of this chapter [XXX B .] is, \"Chapter of not allowing the heart of [the deceased] to be driven away from him in the underworld.\"[1] it is an address by the deceased to his own heart, which he calls his ka or \"double\" within his body.\n\nIt should be accompanied by a vignette of the trial of the heart in which the heart is weighed against the dead man himself, as in the ancient Nebseni papyrus.\n\nIn the Ani papyrus, however, it will be observed that the heart is being weighed against the feather of the Law, Maat, a scene which often accompanies Chapter CXXV.\n\nInteresting variants of the vignettes of Chapter XXX B .\n\nare given by Naville ( Todtenbuch , Bd.\n\nI., Bl.\n\n43), where we find the deceased addressing either his heart placed on a stand, or a beetle, or a heart to which are attached the antennæ of a beetle.\n\nIn certain papyri this chapter is followed by a rubric:--\"[This chapter is] to be said over a scarab[2] of green stone encircled with smu metal, and [having] a ring of silver, which is to be placed upon the neck of the dead.\n\nThis chapter was found in Khemennu.[3] [1.\n\n### 2.\n\nChapter XXX A .\n\nis never found inscribed upon scarabs.\n\n3.\n\nI.e."

