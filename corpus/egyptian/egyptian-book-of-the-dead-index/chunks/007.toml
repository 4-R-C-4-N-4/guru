body = "3333), and Teta, Pepi I., Mer-en-Ra, and Pepi II.\n\n(kings of the VIth dynasty, about B.C.\n\n3300-3166), it would seem that, even at that remote date, the scribes were perplexed and hardly understood the texts which they had before them.[2] The most moderate estimate makes certain sections of the Book of the Dead as known from these tombs older than three thousand years before Christ.\n\nWe are in any case justified in estimating the earliest form of the work to be contemporaneous with the foundation of the civilization[3] which we call Egyptian in the valley of [1.\n\n\"Les textes des Pyramides .\n\n.\n\n.\n\n.\n\n.\n\n.\n\nnous reportent si loin dans le passé que je n'ai aucun moyen de les dater que de dire qu'elles étaient dejà vieilles cinq mille ans avant notre ère.\n\nSi extraordinaire que paraisse ce chiffre, il faudra bien nous habituer à le considérer comme représentant une évaluation à minima toutes les fois qu'on voudra rechercher les origines de la religion Égyptienne.\n\nLa religion et les textes qui nous la font connaître étaient déjà constitués avant la I re dynastie: c'est à nous de nous mettre, pour les comprendre, dans l'état d'esprit où était, il y a plus de sept mille ans, le peuple qui les a constitués.\n\nBien entendu, je ne parle ici que des systèmes théologiques: si nous voulions remonter jusqu'à l'origine des é1éments qu'ils ont mis en Åuvre, il nous faudrait reculer vers des ages encore plus lointains.\" Maspero, La Mythologie Égyptienne (in Revue de l'Histoire des Religions , t.\n\nxix., p.\n\n12; and in Études de Mythologie et d'Archéologie Égyptiennes , t.\n\nii., p.\n\n2 36).\n\nCompare also \"dass die einzelnen Texte selbst damals schon einer alten heiligen Litteratur angehörten, unterliegt keinem Zweifel, sie sind in jeder Hinsicht alterthümlicher als die ältesten uns erhaltenen Denkmäler.\n\nSie gehören in eine für uns 'vorhistorische' Zeit und man wird ihnen gewiss kein Unrecht anthun, wenn man sie bis in das vierte Jahrtausend hinein versetzt.\" Erman, Das Verhältniss des aegyptischen zu den semitischen Sprachen, in Z.D.M.G., Bd.\n\nXLVI., p.\n\n94.\n\n2.\n\n\"Le nombre des prières et des formules dirigées contre les animaux venimeux montre quel effroi le serpent et le scorpion inspirait aux Égyptiens.\n\nBeaucoup d'entre elles sont écrites dans une langue et avec des combinaisons de signes qui ne paraissent plus avoir été complètement comprises des scribes qui les copiaient sous Ounas et sous Pepi.\n\nJe crois, quant à moi, qu'elles appartiennent an plus vieux rituel et remontent an delà du règne de Mînî.\" Maspero, La Religion Égyptienne (in Revue de l'Histoire des Religions , t.\n\nxii., p.\n\n125).\n\nSee also Recueil de Travaux , t.\n\niv., p.\n\n62.\n\n3."

