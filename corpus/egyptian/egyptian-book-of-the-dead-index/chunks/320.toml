body = "Having gone to the north of the Aaru Field he makes his way to the eastern portion of the tuat , where according to one legend he becomes like the morning star, near[6] his sister Sothis.[7] Here he lived in the form of the star Sothis, and \"the great and little companies of the gods purify him in the Great Bear.\" The Egyptian theologians, who conceived that a ladder was necessary to enable the soul to ascend to the next world, provided it also with an address which it was to utter when it reached the top.\n\nAs given in the pyramid of Unas it reads as follows':--\"Hail to thee, O daughter of Amenta, mistress of Peteru(?) of heaven, thou gift of Thoth, thou mistress of the two sides of the ladder, open a way to Unas, let Unas pass.\n\nHail to thee, O Nau, who art [seated] upon the brink of the Lake of Kha, open thou a way to Unas, let Unas pass.\n\nHail to thee, O thou bull of four horns, thou who hast one horn to the west, and one to the east, and one to the north, and one to the south, .\n\n.\n\n.\n\n.\n\n.\n\n.\n\nlet Unas pass, for he is a being from the purified Amenta, who goeth forth from the country of Baqta.\n\nHail to thee, O Sekhet-Hetep, hail to thee, and to the fields which are in thee, the fields of Unas are in thee, for pure offerings are in thee.\" [1.\n\nI.e.\n\n, the Field of Peace.\n\n2.\n\nRecueil de Travaux , t.\n\nv., p.\n\n191 (l.\n\n182).\n\n3.\n\nIbid.\n\n, p.\n\n50 (l.\n\n262).\n\n4.\n\nIbid.\n\n, t.\n\nvii., p.\n\n163 (1.\n\n402).\n\n5.\n\nIbid.\n\n, t.\n\niv., p.\n\n49.\n\n(l.\n\n432).\n\n6.\n\nIbid.\n\n, t.\n\nv., p.\n\n186 (ll.\n\n80, 170, 177).\n\n7.\n\nIbid.\n\n, t.\n\niv., p.\n\n55 (l.\n\n475).\n\n8.\n\nIbid.\n\n, t.\n\niv., p.\n\n68 (l.\n\n567).\n\n9 Ibid.\n\n, t.\n\niv., p.\n\n69 (l.\n\n576 ff.).] {p.\n\ncvi} Power of the gods of Annu."

