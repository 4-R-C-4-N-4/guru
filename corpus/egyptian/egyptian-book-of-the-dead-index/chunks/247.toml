body = "The rubric on the coffin of Queen Menthu-hetep, which ascribes the chapter to Hesep-ti, states that \"this chapter was found in the foundations beneath the hennu boat by the foreman of the builders in the time of the king of the North and South, Hesep-ti, triumphant\";[2] the Nebseni papyrus says that this chapter was found in the city of Khemennu (Hermopolis) on a block of ironstone (?) written in letters of lapis-lazuli, under the feet of the god\";[3] and the Turin papyrus (XXVIth dynasty or later) adds that the name of the finder was Heru-ta-ta-f, the son of Khufu or Cheops,[4] the second king of the IVth dynasty, about B.C.\n\n3733, who was at the time making a tour of inspection of the temples.\n\nBirch[5] and Naville[6] consider the chapter one of [1.\n\nChabas, Voyage d'un Égyptien , p.\n\n46.\n\nAccording to M.\n\nNaville (Einleitung, p.\n\n138), who follows Chabas's opinion, this chapter is an abridgement of the whole Book of the Dead; and it had, even though it contained not all the religious doctrine of the Egyptians, a value which was equivalent to the whole.\n\n2.\n\nSee Goodwin, Aeg.\n\nZeitschrift , 1866, p.\n\n55, and compare the reading from the Cairo papyrus of Mes-em-neter given by Naville ( Todtenbuch , ii-, p.\n\n139) 3 Naville, Todtenbuch , Bd.\n\nI., B1.\n\n76, L 52.\n\n4 Lepsius, Todtenbuch , Bl.\n\n25, 1.\n\n31.\n\n6 \"The most remarkable chapter is the 64th .\n\n.\n\n.\n\n.\n\n.\n\nIt is one of the oldest of all, and is attributed, as already stated, to the epoch of king Gaga-Makheru or Menkheres .\n\n.\n\n.\n\n.\n\n.\n\nThis chapter enjoyed a high reputation till a late period, for it is found on a stone presented to General Perofski by the late Emperor Nicholas, which must have come from the tomb of Petemenophis,[*] in the El-Assasif[+] and was made during the XXVIth dynasty Some more recent compiler of the Hermetic books has evidently paraphrased it for the Ritual of Turin.\" Bunsen, Egypt's Place in Universal History , London, 1867, p.\n\n1142.\n\nThe block of stone to which Dr.\n\nBirch refers is described by Golénischeff, Inventaire de la Ermitage Impérial, Collection Égyptienne , No.\n\n1101, pp.\n\n169, 170.\n\nM.\n\nMaspero thinks it was meant to be a \"prétendu fac-similé\" of the original slab, which, according to the rubric, was found in the temple of Thoth, Revue de l'Histoire des Religions , t.\n\nXV., p.\n\n299, and Études de Mythologie , t i., p.\n\n368.\n\n6 Todtenbuch (Einleitung), p.\n\n139.\n\nMr.\n\nRenouf also holds this opinion, Trans.\n\nSee.\n\nBibl.\n\nArch., 1803, p.\n\n6.\n\n* I.e.\n\n, the \"chief reader.\" Many of the inscriptions on whose tomb have been published by Dümichen, Der Grabpalast des Patuamenap; Leipzig, 1884, 1885.\n\n+ I.e."

