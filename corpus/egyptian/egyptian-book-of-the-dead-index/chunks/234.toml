[content]
body = "(5, 6) Thou hast been made victorious in (7) Nut, and thou art mighty to prevail with the gods.\" [Nephthys saith:] \"(2) I have gone round about to protect thee, brother Osiris; (3) 1 have come to be a protector unto thee.\n\n[My strength shall be behind thee, my strength shall be behind thee, for ever.\n\nRa hath heard thy cry, and the gods have granted that thou shouldst be victorious.\n\nThou art raised up, and thou art victorious over that which hath been done unto thee.\n\nPtah hath thrown down thy foes, and thou art Horus, the son of Hathor.]\"[1] [1.\n\nIn Ani the text is corrupt, and the passage within brackets is translated from the following version (Naville, Todtenbuch, Bd.\n\nII., Bl.\n\n428): maket-d ha-k sep sen t'etta setem nas-k an Ra smaaxeru an neteru thes-tu semaaxeru-k her arit erek xer en Ptah xeft-k entek Heru sa Het-Heru .] {p.\n\n361} [The flame of Isis saith:] \"I protect thee with this flame, and I drive away him (the foe) from the valley of the tomb, and I drive away the sand from thy feet.\n\nI embrace Osiris Ani, who is triumphant in peace and in right and truth.\"[1] [The flame of Nephthys saith:] \"I have come to hew in pieces.\n\nI am not hewn in pieces, nor will I suffer thee to be hewn in pieces.\n\nI have come to do violence, but I will not let violence be done unto thee, for I am protecting thee.\" [The Tet saith:] \"I have come quickly, and I have driven back the footsteps of the god whose face is hidden.[2] I have illumined his sanctuary.\n\nI stand behind the sacred Tet or, the day of repulsing disaster.[3] I protect thee, O Osiris.\" [Mestha saith:] I am Mestha, thy son, O Osiris Ani, triumphant.\n\nI have come to protect thee, and I will make thine abode to flourish everlastingly.\n\nI have commanded Ptah, even as Ra himself commanded him.\" [Hapi saith:] \"I am Hapi thy son, O Osiris Ani, triumphant.\n\nI have come to protect thee.\n\nThy head and thy limbs are knit together; and I have smitten down thine enemies beneath thee.\n\nI have given unto thee thy head for ever and for ever, O Osiris Ani, triumphant in peace.\" [Tuamautef saith:] \"I am thy beloved son Horus.\n\nI have come to avenge thee, O my father Osiris, upon him that did evil unto thee; and I have put him under thy feet for ever, and for ever, and for ever; O Osiris Ani, triumphant in peace.\" [1.\n\nThe text here is corrupt.\n\nBrit.\n\nMus.\n\npapyrus, No.\n\n10,010 (Naville, Todtenbuch , Bd.\n\nII., Bl.\n\n429) reads nuk ahu sa er teb ament xesef-a xesef su er teka set au seset-na set au setenem-na uat au-a em sa , \"I surround with sand the hidden tomb, and drive away the violent one therefrom.\n\nI lighten the valley of the tomb, I cast light therein, I traverse the ways, and I protect [Osiris].\" 2 Reading i-a em heh xesef nemmat kep-hra-f sehet' kep-f .\n\nSee Naville, Todtenbuch , Bd.\n\nII., Bl.\n\n428."

