[content]
body = "Text [CHAPTER CXXXIII.]: (1) TO BE SAID ON THE DAY OF THE MONTH.[2] (2) Osiris Ani, the scribe, triumphant in peace, triumphant, saith: \"Ra riseth (2) in his horizon, and the company of his gods follow after the god when he appeareth from his secret place, when he showeth strength and bringeth himself forth (3) from the eastern horizon of heaven at the word of the goddess Nut.\n\nThey rejoice at the journeyings of Ra, the Ancient One; the Great One (4) rolleth along in his course.\n\nThy joints are knitted together,[3] O Ra, within thy shrine.\n\nThou breathest the winds, thou drawest in the breezes, (5) thou makest thy jaw-bones to cat in thy dwelling on the day when thou dost scent right and truth.\n\nThou turnest aside the godlike followers (6) [who] sail after the sacred boat, in order that they may return again unto the mighty ones according to thy word.\n\nThou numberest thy bones, thou gatherest together thy members; (7) thou turnest thy face towards the beautiful Amenta; thou comest thither renewed [1.\n\nIn the Nebseni papyrus the god is seated on a throne, and he holds the sceptre in his right hand; in the Turin papyrus (Lepsius, Bl.\n\n54) the god is seated within a shrine.\n\n2.\n\nThis chapter is generally entitled \"The Book of making perfect (or strong) the khu in the netherworld, in the presence of the great company of the gods.\n\n3.\n\nOr, \"thou art exalted.\"] {p.\n\n328} day by day.\n\nBehold, thou Image of gold, who possessest the splendours (8) of the Disk of heaven, thou lord of terror; thou rollest along and art renewed day by day.\n\nHail, there (9) is rejoicing in the heavenly horizon, and shouts of joy are It raised to the ropes which tow thee along.\n\nMay the gods who dwell in (10) heaven ascribe praises unto Osiris Ani, when they behold him in triumph, as unto Ra.\n\nMay Osiris, the scribe Ani, be a prince (11) who is known by the ureret crown; and may the meat offerings and the drink offerings of Osiris Ani, triumphant, be apportioned unto him; may he wax exceeding strong in his body; and may he be the (12) chief of those who are in the presence of Ra.\n\nMay Osiris, the scribe Ani, triumphant, be strong upon earth and in the world under the earth; and (13) O Osiris, scribe Ani, triumphant, mayest thou rise up strengthened like unto Ra day by day.\n\nOsiris Am, triumphant, shall not tarry, (14) nor shall he rest without motion in the earth for ever.\n\nClearly, clearly shall he see with his two eyes, and with his two ears shall be hear what is right and true.\n\n(15) Osiris, the scribe Ani, triumphant, cometh back, cometh back from Annu; Osiris Ani, triumphant, is as Ra when he rangeth the oars (16) among the followers of Nu.\n\nNext: Plate XXII."

