body = "500, Paris, 1879, p.\n\n27.\n\n4 Pyramid of Unas, l.\n\n564.] {p.\n\ncxxvi} Disguised in female forms, the four goddesses go to the house of Ra-user, and, professing to have a knowledge of the art of midwifery, they are admitted to the chamber where the child is about to be born; Isis stands before the woman, Nephthys behind her, and Heqet accelerates the birth.\n\nWhen the child is born Meskhenet comes and looking upon him says, \"A king; he shall rule throughout this land.\n\nMay Khnemu give health and strength to his body.\"[1] The word meskhenet is as old as the pyramid times, and seems then to have had the meaning of luck, destiny, etc.\n\n[2] The god Amen , his wife Mut and their associate Khonsu have nothing whatever to do with the Book of the Dead; but Amen, the first member of this great Theban triad, must be mentioned with the other gods, because he was usually identified with one or more of them.\n\nThe name Amen means the \"hidden one,\" and the founding of the first shrine of the god recorded in history took place at Thebes during the XIIth dynasty; from that time until the close of the XVIIth dynasty, Amen was the chief god of Thebes and nothing more.\n\nWhen, however, the last kings of the XVIIth dynasty had succeeded in expelling the so-called Hyksos and had delivered the country from the yoke of the foreigner, their god assumed an importance hitherto unknown, and his priests endeavoured to make his worship the first in the land.\n\nBut Amen was never regarded throughout the entire country as its chief god, although his votaries called him the king of the gods.\n\nThe conception which the Thebans had of their god as a god of the underworld was modified when they identified him with Ra and called him \"Amen-Ra\"; and, speaking generally, in the time of the XVIIIth dynasty and onwards the god became the personification of the mysterious creating and sustaining power of the universe, which in a material form was typified by the sun.\n\nBy degrees all the attributes of the old gods of Egypt were ascribed to him, and the titles which among western nations are given to God were added to those pantheistic epithets which Amen had usurped.\n\nThe following extracts from a fine hymn[3] will set forth the views of the priesthood of Amen-Ra concerning their god.\n\n[1.\n\nErman, Die Märchen des Papyrus Westcar , Berlin, 1890, Bl.\n\n10, 11.\n\n13, 14.\n\n2.\n\nCompare ###, \"the night of thy birth, and the day of thy meskhenet \"; see Recueil de Travaux , t.\n\nvii., p.\n\n161 (l.\n\n397).\n\n3 See Grébaut, Hymne à Ammon-Ra , Paris, 1874; and Wiedemann, Die Religion , p.\n\n64 ff.] {p.\n\ncxxvii} \"Adoration to thee, O Amen-Ra, the bull in Annu, the ruler of all the gods, the beautiful and beloved god who givest life by means of every kind of food and fine cattle.\n\n\"Hail to thee, O Amen-Ra, lord of the world's throne, thou dweller in Thebes, thou bull of thy mother that livest in thy field, that extendest thy journeys in the land of the south, thou lord of those who dwell in the west, thou governor of Punt, thou king of heaven and sovereign of the earth, thou lord of things that exist, thou stablisher of creation, thou supporter of the universe."

