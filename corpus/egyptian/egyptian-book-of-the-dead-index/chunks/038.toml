[content]
body = "In course of time he became king of Egypt, and devoted himself to civilizing his subjects and to teaching them the craft of the husbandman; he established a code of laws and bade men worship the gods.\n\nHaving made Egypt peaceful and flourishing, he set out to instruct the other nations of the world.\n\nDuring his absence his wife Isis so well ruled the state that Typhon [Set], the evil one, could do no harm to the realm of Osiris.\n\nWhen Osiris came again, Typhon plotted with seventy-two comrades, and with Aso, the queen of Ethiopia, to slay him; and secretly got the measure of the body of Osiris, and made ready a fair chest, which was brought into his banqueting hall when Osiris was present together with other guests.\n\nBy a ruse Osiris was induced to lie down in the chest, which was immediately closed by Typhon and his fellow conspirators, who conveyed it to the Tanaitic mouth of the Nile.[4] These things happened on the seventeenth day of [1.\n\nFor the text see De Iside et Osiride , ed.\n\nDidot (Scripta Moralia, t.\n\niii., pp.\n\n429-69), Â§ xii.\n\nff.\n\n2.\n\nThe days are called in hieroglyphics ###, \"the five additional days of the year,\" e?pago'menai!hme'rai pe'nte ; see Brugsch, Thesaurus Inscriptionum Aegytiacarum , Abt.\n\nii.\n\n( Kalendarische Inschriften ), Leipzig, 1883, pp.\n\n479, 480; Brugsch, Aegyptologie , p.\n\n361 Chabas, Le Cálendrier , Paris (no date), p.\n\n99 ff.\n\n3.\n\nOsiris was born on the first day, Horus on the second, Set on the third, Isis on the fourth, and Nephthys on the fifth; the first, third, and fifth of these days were considered unlucky by the Egyptians.\n\n4.\n\nThe mouths of the Nile are discussed and described by Strabo, XVII., i., 18 (ed.\n\nDidot, p.\n\n681) and by Diodorus, I., 33, 7 (ed.\n\nDidot, p.\n\n26).] {p.\n\nl} Plutarch's version.\n\nthe month Hathor,[1] when Osiris was in the twenty-eighth year either of his reign or of his age.\n\nThe first to know of what had happened were the Pans and Satyrs, who dwelt hard by Panopolis; and finally the news was brought to Isis at Coptos, whereupon she cut off a lock of hair[2] and put on mourning apparel.\n\nShe then set out in deep grief to find her husband's body, and in the course of her wanderings she discovered that Osiris had been united with her sister Nephthys, and that Anubis, the offspring of the union, had been exposed by his mother as soon as born.\n\nIsis tracked him by the help of dogs, and bred him up to be her guard and attendant.\n\nSoon after she learned that the chest had been carried by the sea to Byblos, where it had been gently laid by the waves among the branches of a tamarisk tree ({Greek e?pei'khj tini` }), which in a very short time had grown to a magnificent size and had enclosed the chest within its trunk.\n\nThe king of the country, admiring the tree, cut it down and made a pillar for the roof of his house of that part which contained the body of Osiris."

