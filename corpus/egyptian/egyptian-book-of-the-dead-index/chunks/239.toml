[content]
body = "(6) May Osiris Ani, triumphant, be born upon your thighs; may he be like unto one (7) Of you for ever and for ever; and may he become a glorious being (8) in the beautiful Amenta.\" [ Address to the Rudders ]: \"(1) Hail, thou beautiful Power,[1] thou beautiful it rudder of the northern heaven.\" \"(2) Hail, thou who goest round about heaven, thou pilot of the world, thou beautiful rudder of the western heaven.\" \"(3) Hail, thou shining one, who livest[2] in the temple wherein are the gods in visible forms, thou beautiful rudder of the eastern heaven.\" \"(4) Hail, thou who dwellest in the temple of the bright-faced ones,[3] thou it beautiful rudder[4] of the southern heaven.\" [ Address to the four Triads [5]]: \"(5) Hail, ye gods who are above the earth, ye pilots of the underworld.\" \"(6) Hail, ye mother-gods who are above the earth, who are in the underworld, and who are in the House of Osiris.\" \"(7) Hail, ye gods, ye pilots of Tasert, ye who are above the earth, ye pilots of the underworld.\" \"(8) Hail, ye followers of Ra, who are in the train of Osiris.\" Vignette: Ani standing before a table of offerings, with both hands raised in adoration.\n\nBehind him is his wife, wearing a lotus-flower and a cone upon her head, and holding a sistrum.\n\nand lotus-flower in her left hand.\n\nText: [CHAPTER CLXXXV.\n\n(?)] (I) A HYMN OF PRAISE TO OSIRIS THE DWELLER IN AMENTET, UN-NEFER WITHIN ABTU, Osiris Ani, triumphant, saith: Hail, O my lord, who dost traverse (2) eternity, and whose existence endureth for ever.\n\nHail, Lord of Lords, King of Kings, Prince, the God of gods who (3) live with Thee, I have come unto Thee Make thou for me a seat with those who are in the underworld, and who adore (4) the images of thy ka (5) and who are among those who [endure] for (6) millions of millions of years [1.\n\nVariant ka-f nefer \"his beautiful ka .\" 2.\n\nReading xenti her ab .\n\n3.\n\nReading her abu het teser .\n\n4.\n\nIn the Turin and the older papyri each rudder is accompanied by an utchat .\n\n5.\n\nIn the Turin papyrus the four children of Horus take the place of these triads.] {p.\n\n368} .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n[1] (10) May no delay arise for me in Ta-mera.\n\nGrant thou (11) that they all may come unto me, great (12) as well as small.\n\nMayest thou grant unto the ka of Osiris Ani [the power] to go into and to come forth (13) from the underworld; and suffer him not to be driven back at the gates of the Tuat.\" Next: Plate XXXVII."

