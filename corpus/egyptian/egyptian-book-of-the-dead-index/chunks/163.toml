[content]
body = "As concerning [the words] \"that night of the reckoning of destruction,\" it is the night of the burning of the damned, and of the overthrow of the wicked at [the sacred] block, and of the slaughter of souls.\n\nWho then is this?\n\nIt is Nemu, the headsman of Osiris; or (as others say), It is Apep when he riseth up with one head bearing maat ( i.e.\n\n, right and truth) [upon it]; or (as others say), It is Horus when he riseth up with two heads, whereof the one beareth maat and the other wickedness.\n\nHe bestoweth wickedness on him that worketh wickedness, and maat on him that followeth after righteousness and truth; or (as others say), It is the great Horus who dwelleth in [Se] khem; or (as others say), It is Thoth; or (as others say), It is Nefer-Tmu, [or] Sept,[1] who doth thwart the course of the foes of Neb-er-tcher.\n\n\"Deliver me from the Watchers who bear slaughtering knives, and who have cruel fingers,[2] and who slay those who are in the following of Osiris.\n\nMay they never overcome me, may I never fall under their knives.\" \"What then is this?\n\nIt is Anubis, and it is Horus in the form of Khent-en-maa; or (as others say), It is the Divine Rulers who thwart the works of their [weapons]; it is the chiefs of the sheniu chamber.\n\n\"May their knives never get the mastery over me, may I never fall under their instruments of cruelty, for I know their names, and I know the being Matchet[3] Who is among them in the house of Osiris, shooting rays of light from [his] eye, but he himself is unseen.\n\nHe goeth round about heaven robed in the flame of his mouth, commanding Hapi, but remaining himself unseen.\n\nMay I be strong upon earth before Ra, may I come happily into haven in the presence of Osiris.\n\nLet not your offerings be hurtful to me, O ye who preside over your altars, for I am among those who follow after Neb-er-tcher according to the writings of Khepera.\n\nI fly as a hawk, I cackle as a goose; I ever slay, even as the serpent goddess Nehebka.\" What then is this?\n\nThey who preside at the altars are the similitude of the eye of Ra and the similitude of the eye of Horus.\n\n\"O Ra-Tmu, lord of the Great House, prince, life, strength and health of all the gods, deliver thou [me] from the god whose face is like unto that of a dog, whose brows are as those of a man, and who feedeth upon the dead, who watcheth [1.\n\nMany papyri read, \"Nefer-Tmu, son of Bast, and the tchatcha .\" 2.\n\nOr instruments of death.\n\n3.\n\nI.e.\n\n, the \"Oppressor.\"] {p.\n\n289} at the Bight of the Fiery Lake, and who devoureth the bodies of the dead and swalloweth hearts, and who shooteth forth filth, but he himself remaineth unseen.\" Who then is this?\n\n\"Devourer for millions of years\" is his name, and he dwelleth in the Lake of Unt.[1] As concerning the Fiery Lake, it is that which is in Anrutf, hard by the Shenit chamber."

