body = "Saith Osiris Ani: \"O thou who art without motion like unto Osiris!\n\nO thou who art without motion like unto Osiris!\n\n(2) O thou whose [1.\n\nI.e.\n\n, Hermopolis.\n\n2.\n\nFor an account of the manner in which altars and other objects were represented on Egyptian monuments, see Borchardt, Die Darstellung innen verzierter Schalen aus Aegyptischen Denkmätern (in Aeg.\n\nZeitschrift , Bd.\n\nXXXI., 1893, p.\n\n1).\n\n3.\n\nFor a kherp sceptre in bronze, see No.\n\n22,842 in the 2nd Egyptian Room.\n\n4.\n\nChapters CLXXV.\n\nand CLXXVI.\n\nbear the same title.\n\nFor Chapter CLXXV.\n\nsee Plate XXIX.\n\nChapter CLXXVI.\n\n(Naville, Todtenbuch, Bd.\n\nI., Pl.\n\ncc.) reads:-- \"What I hate is the land of Abydos.\n\nMay I never enter into the den, and may there never be done unto me any of those things which the gods hate, for I am .\n\n.\n\n.\n\n.\n\npure within the Mesqet.\n\nMay Neb-er-tcher give unto me his splendours on the day of the funeral in the presence of the Lord of Things.\" \"If this chapter be known [he] shall be in the condition of one who is acquitted in the underworld.\"] {p.\n\n316} limbs are without motion like unto [those of] Osiris!\n\nLet not thy limbs be (3) without motion, let them not corrupt, let them not pass away, let them not decay; let it be (4) done unto me even as if I were the god Osiris.\" Rubric: If this chapter be known by the Osiris Ani, he shall not corrupt in the underworld.\n\nVignette: A doorway.\n\nBy one post stands the soul of Ani in the form of a human-headed hawk and by the other the bird.\n\nText: [CHAPTER XLVI.] (I) THE CHAPTER OF NOT PERISHING AND OF BECOMING ALIVE IN THE UNDERWORLD.\n\nSaith Osiris Ani: \"Hail, (2) children of:' Shu!\n\nHail, children of Shu, [children of] the place of the dawn, who as the children of light have gained possession of his crown.\n\nMay I rise up and may I fare forth like Osiris.\" Vignette: Ani the scribe standing with his back to a block and knife Text: [CHAPTER XL.] (I) THE CHAPTER OF NOT ENTERING IN UNTO THE BLOCK.\n\nSaith Osiris Ani: \"The four bones[1] of my neck and of my back are joined together for me in heaven by Ra, the guardian of the earth.\n\n(2) This was granted on the day when my rising up out of weakness upon my two feet was ordered, on the day (3) when the hair was cut off.\n\nThe bones of my neck and of my back have been joined together by Set and by the company of the gods, even as they were (4) in the time that is past; may nothing happen to break them apart.\n\nMake ye [me] strong against my father's murderer.\n\nI have gotten power over the two earths.\n\nNut hath joined together my bones, and [I] behold [them] as they were in the time that is past [and I] see [them] even in the same order as they were [when] the gods had not come into being (6) in visible forms.[2] I am Penti, I, Osiris the scribe Ani, triumphant, am the heir of the great gods.\" Next: Plate XVII."

