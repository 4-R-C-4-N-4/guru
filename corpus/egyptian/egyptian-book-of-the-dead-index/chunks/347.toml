[content]
body = "Thou art stablished among the gods thy brethren, thy head is purified for thee with natron, thy bones are washed clean with water, and thou thyself art made perfect with all that belongeth unto thee.\n\nO Osiris, I have given unto thee the Eye of Horus, thy face is filled therewith, and the perfume thereof spreadeth over thee.\n\n\"Hail, Unas, thy two jaws are unlocked.[5] Hail, Unas, the two gods have opened thy mouth.[6] O Unas, the Eye of Horus hath been given unto thee, and Horus cometh thereunto; it is brought unto thee, and placed in thy mouth.[7] Hail, Unas, the nipples of the bosom of Horus have been given unto thee, and thou hast taken in thy mouth[8] the breast of thy sister Isis, and the milk which floweth from thy mother is poured into thy mouth.[9] \"Thou hast gotten possession of the two eyes of Horus, the white and the black, thou hast taken them unto thyself and they illumine thy face.[10] The day hath made an offering unto thee in heaven, and the East and the West are at peace with thee; the night hath made an offering[11] unto thee, and the North and the South are at peace with thee.\n\nThese are the offerings which are brought unto thee, the offerings which thou seest, the offerings which thou hearest, the offerings which are before thee, the offerings which are behind thee, the offerings which are with thee.\n\nO Osiris Unas, the white teeth of Horus are given unto thee that thou mayest fill thy mouth therewith.[12] A royal offering to the ka of Unas.[13].\n\nO Osiris Unas, the Eye of Horus hath been given unto thee, and thou livest, and a thou art.[14] O Osiris Unas, the Eye of Horus which strove with Set hath been [*.\n\n###, the followers of Horus\" [Addressing the statue of the decease the setem priest says] 1.\n\nHere [offer] perfume of the south, three grains.\n\n2.\n\nRepeat four times.\n\n3.\n\nHere [offer] natron of the north.\n\n4 Here [burn] one grain of incense.\n\n5.\n\nHere [bring] the Pesesh-kef .\n\n6.\n\nHere [offer] two pieces of iron of the north and south.\n\n7.\n\nHere [offer] unguent of the north, and unguent of the south.\n\n8.\n\nHere [offer] milk.\n\n9.\n\nHere [offer] two vases of milk.\n\n10.\n\nHere bring two black and white pitchers.\n\n11.\n\nHere [offer] a cake.\n\n12.\n\nHere [offer] two baskets of onions.\n\n13.\n\nRepeat four times.\n\n14.\n\nHere [offer] a cake.] {p.\n\nxcli} given unto thee, and thou hast lifted it[1] to thy lips, and thy mouth is opened thereby.\n\nO Osiris Unas, thy mouth is opened by that with which thou art filled.[2] O Osiris Unas, that which hath distilled from thee hath been given unto thee.[3] O Ra, may all the praise which thou receivest in heaven be in praise of Unas, and may all that belongeth unto thy body belong unto the ka of Unas, and may all that belongeth unto his body belong unto thee.[4] O Unas, the Eye of Horus hath been given unto thee, that thou mayest be able to taste,[5] and that thou mayest illumine the night."

