body = "Akert is the country of which Osiris was the prince; and it is mentioned as connected with Stat and Neter-khert , each of which is a name of the great necropolis on the western bank of the Nile.\n\nSee Brugsch, Dict.\n\nGéog ., p.\n\n75; Lepsius, Todtenbuch , chap.\n\n165, 1.\n\n6; Naville, La Litanie du Soleil , p.\n\n98.\n\n8.\n\nAn or Ani, a name or form of Ra, the Sun-god (compare \"Ani at the head of the cycle of the gods,\" Grébaut, Hymne , p.\n\n22), and also of Osiris.\n\nAni is also identified with the Moon-god; compare {footnote p.\n\n255} [*] \"Hail, Ani, thou shinest upon us from heaven every day.\n\nMay we never cease to behold thy rays!\n\nThoth protecteth thee and maketh thy soul to stand up in the maat boat in thy name of Moon.\" For the identification of Ani with Horus, see Naville, La Litanie du Soleil , p.\n\n99, note 10.\n\nThe god Ani is also addressed as \"Eye of Horus \" by the deceased in the 39th chapter of the Book of the Dead, which refers to the \"uniting of a soul to its body in the underworld.\" * For the hieratic text, see De Horrack, Lamentations d'Isis et de Nephthys , p.\n\n4, II.\n\n1-3.] {p.\n\n255} beautiful in countenance in Ta-sert.[1] Grant thou to the ka of Osiris, the scribe Ani, splendour in heaven and might upon earth and triumph in Neter-khert;[1] and that I may sail down to (11) Tattu like a living soul and up to (13) Abtu like a bennu (phÅnix); and that I may go in and come out without repulse at (15) the pylons of the Tuat.[1] May there be given unto (16) me loaves of bread in the house of coolness, and (17) offerings of food in Annu, (18) and a homestead for ever in Sekhet-Aru[2] with wheat and barley (20) therefor.\" Next: Plate III."

