[content]
body = "Text [CHAPTER LVI.]: CHAPTER OF SNIFFING THE AIR UPON EARTH.\n\n[He saith]: \"(2) Hail, Tmu, grant thou unto me the sweet breath which is in thy two nostrils.\n\nI embrace the mighty throne which is in Unnu,[4] and I watch and guard the Egg of the Great Cackler.\n\nI grow, and it groweth; it groweth, and I grow; I live, and it liveth; I sniff the air, and it sniffeth the air.\" Vignette: Ani standing, with a staff in his left hand.\n\nText [CHAPTER XXIX.]: (I) THE CHAPTER OF NOT LETTING THE HEART OF A MAN BE TAKEN AWAY FROM HIM IN THE UNDERWORLD.\n\nSaith Osiris Ani, triumphant: \"Turn thou back, O messenger of all the gods.\n\n(2) Is it that thou art come to carry away[5] this my heart which liveth?\n\nMy heart which liveth [1.\n\nThe text of Lepsius gives \"I guard that great egg,\" etc.\n\n2.\n\nThe variant text given by Naville indicates by that these words are the name or title of a god.\n\nBirch translates them by \"Discriminator of Purity,\" and Pierret by \"le sauvé dont le nom est pur.\" 3.\n\nFor the texts see Naville, Todtenbuch , Bd.\n\nI., Bll.\n\n67, 68, 69.\n\n4.\n\nHermopolis.\n\n5.\n\nIn a variant vignette given by Naville the deceased holding his heart in both hands offers it to three gods; and in another a man is about to fasten a necklace with a pendent heart to the statue of the deceased.] shall not be given unto thee.\n\n(3) [As I] advance, the gods give ear unto my supplications, and they fall down upon their faces wheresoever they be.\" Next: Plate XVI."

