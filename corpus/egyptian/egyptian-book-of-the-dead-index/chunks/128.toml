[content]
body = "\"Thou sailest over the sky with life and strength.\n\nThe goddess Nehebka is in (23) the atet boat; the sacred boat rejoiceth.\n\nThy heart is glad and thy brow is wreathed with the twin serpents.\" II.\n\n(I) A HYMN OF PRAISE TO RA WHEN HE RISETH IN THE EASTERN PART OF HEAVEN.\n\nBehold Osiris, Qenna the merchant, triumphant, who saith: (2) \"Homage to thee, O thou who risest in Nu, and who at thy birth dost make the world bright with light; all the company of the gods (3) sing hymns of praise unto thee.\n\nThe beings who minister unto Osiris cherish him as King of the North and of the South, the beautiful and beloved man-child.\n\nWhen (4) he riseth, mortals live.\n\nThe nations rejoice in him, and the Spirits of Annu sing unto him songs of joy.\n\nThe Spirits of the towns of Pe and Nekhen (5) exalt him, the apes of dawn adore him, and all beasts and cattle praise (6) him with one accord.\n\nThe goddess Seba overthroweth thine enemies, therefore rejoice (7) within thy boat; and thy mariners are content thereat.\n\nThou hast arrived in the atet boat, and thy heart swelleth with joy.\n\nO Lord of the gods, when thou (8) dost create them, they ascribe praises unto thee.\n\nThe azure goddess Nut doth compass thee on every side, and the god Nu floodeth thee with his rays of light.\n\n(9) O cast thou thy light upon me and let me see thy beauties, me, the (10) Osiris Qenna the merchant, triumphant!\n\nWhen thou goest forth over the earth I will sing praises unto thy fair (11) face.\n\nThou risest in the horizon of heaven, and [thy] disk is adored [when] it resteth upon the mountain to give life unto the world.\" Saith Qenna the merchant, triumphant: (12) \"Thou risest, thou risest, coming forth from the god Nu.\n\nThou dost become young again and art the same as thou wert yesterday, O mighty youth who hast created thyself.\n\nNot .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nmy hand.\n\n(13) Thou hast come with thy splendours, and thou hast made heaven and earth bright with thy rays of pure emerald light.\n\nThe land of Punt is (14) established for the perfumes which thou smellest with thy nostrils.\n\n(15) Thou risest, O thou marvellous Being, in heaven, the twin serpents are placed upon thy brow, and thou art lord of the world and the inhabitants (16) thereof; [the company] of the gods and Qenna the merchant, triumphant, adore thee.\" III.\n\n(1, 2) A HYMN OF PRAISE TO RA WHEN HE RISETH IN THE EASTERN PART OF HEAVEN.\n\n(3) Behold Osiris Hunefer, triumphant, who saith: \"Homage to thee, O thou who art Ra when thou (4) risest and Tmu when thou settest.\n\nThou risest, thou risest; thou shinest, (5) thou shinest, thou who art crowned king of the {p.\n\n251} gods.\n\nThou art the lord of heaven, [thou art] the lord of earth, [thou art] the creator of those who dwell in the heights (6) and of those who dwell in the depths.\n\n[Thou art] the One god who came into (7) being in the beginning of time."

