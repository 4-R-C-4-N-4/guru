body = "Sacred Texts Egypt Index Previous Next PLATE XXVII.\n\nlife.\n\nO, I have made them to know the plans of the gods which Horus hath devised (55) at the bidding of his father Osiris.\n\nHail, lord, thou most terrible {p.\n\n336} and mighty soul!\n\nLet me come, even me, (56) let me lift myself up!\n\nI have opened and passed through the underworld.\n\nI have opened the paths of the warders (57) of heaven and of the warders of the earth.\n\nI have not been driven back by them; and I have lifted up thy face, O lord of eternity.\" Appendix: The following is the end of the LXXVIIIth chapter according to the Paris papyrus quoted by Naville ( Todtenbuch , Bd.\n\nI., Bl.\n\n89, ll.\n\n43-48):-- \"Thou art exalted upon thy throne, O Osiris.\n\nThou hearest joyful things, O Osiris.\n\nThy, strength is vigorous, O Osiris.\n\nThy head is bound to thy body, O Osiris.\n\nThy brow is made firm, O Osiris.\n\nThy heart is joyful.\n\nO be thou pleased to establish gladness for thy servants.\n\nThou art stablished as a bull of Amenta.\n\nThy son Horus is crowned king upon thy throne; all life is with him.\n\nUnto thy son are given millions of years, and the fear of him shall endure for untold ages.\n\nThe company of the gods shall fear him.\n\nUnto thy son is given .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nof the company of the gods; he changeth not his word.\n\nHorus is the food and the altar.\n\nI go to unite myself unto [my] father; and deliverance cometh from [my] father, from [my] brother, and from the friend of Horus.\n\nHorus is in the following of his father.\n\nHe dwelleth amid decay.\n\nHe ruleth Khem.\n\nTo thy son have the gods given the crown of millions of years, and for millions of years it maketh him to live in the eye [of Horus], the single eye of the god [which is called] Nebt-er-tcher, the queen of the gods.\" Vignette: The deceased kneeling, with both hands raised in adoration, before three gods.\n\nText [CHAPTER LXXIX.]: (I) THE CHAPTER OF BEING AMONG THE COMPANY OF THE GODS AND OF BEING CHANGED INTO THE (2) PRINCE OF THE GODLIKE RULERS.\n\n[The deceased] saith: \"Homage to thee, O Tmu, (3) lord of heaven, thou creator of things which are and which come forth from the earth; who makest to come into being that which is sown, the lord of things which shall be, the begetter of the gods, the great god (4) who made himself, the lord of life who maketh mankind to flourish.\n\nHomage to you, O ye lords of creation, ye pure being whose abodes (5) are hidden.\n\nHomage to you, O ye lords of eternity, whose forms are hidden, and whose dwelling-places are unknown.\n\n(6) Homage to you, O ye gods who dwell in the abode (?) of the flooded lands.\n\nHomage to you, O ye gods who live in the underworld.\n\nHomage to you, O ye gods who dwell in heaven.\n\n(7) Grant ye that I may come [unto you], for I know you.\n\nI am pure, I am holy, I am mighty, I have a soul, (8) 1 have become powerful, I am glorious; I have brought unto you perfume and incense, and natron."

