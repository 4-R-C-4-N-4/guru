body = "xi.) that the Prisse papyrus was copied about the period of the XVIIth dynasty and that the works in it only date from the XIIth dynasty; but many Egyptologists assign the composition of the work to the age of Assa.\n\nSee Wiedemann, Aegyptische Geschichte , p.\n\n201; Petrie, History of Egypt , p.\n\n81.] {p.\n\nlxxxv} Views held in the first six dynasties.\n\n1.\n\nan rex-entu xepert arit neter Not known are the things which will do God.[1] 2.\n\nam-k ari her em reth xesef neter Thou shalt not cause terror in men and women, [for] is opposed God [thereto].[2] 3.\n\nau am ta xer sexer neter The eating of bread is according to the plan of God.[3] 4.\n\nar seka-nek ter em sexet ta set neter If thou art a farmer, labour (?) in the field which hath given God [to thee].[4] 5.\n\nar un-nek em sa aqer ari-k sa en smam neter If thou wouldst be like a wise man, make thou [thy] son to be pleasing unto God.[5] 6.\n\nsehetep aqu-k em xepert nek xepert en Satisfy those who depend on thee, so far as it may be done by thee; it should be done by hesesu neter those favoured of God.[6] [1.\n\nPlate ii., l.\n\n2.\n\n2.\n\nPlate iv., line 8.\n\n3.\n\nPlate vii., l.\n\n2.\n\n4 Plate vii., l.\n\n5.\n\n5.\n\nPlate vii., l.\n\n11.\n\n6.\n\nPlate xi., l.\n\n1.] {p.\n\nlxxxvi} Views held in the first six dynasties.\n\n7.\n\nIf, having been of no account, thou hast become great, and if, having been poor, thou hast become rich, when thou art governor of the city be not hard-hearted on account of thy advancement, because xeper-nek mer septu neter thou hast become the guardian of the provisions of God.[1] 8.\n\nmertu neter pu setem an setem en mesetu neter What is loved of God is obedience; disobedience hateth God.[2] 9.\n\nmak sa nefer en tata neter Verily a good son is of the gifts of God.[3] Passing from the Prisse papyrus, our next source of information is the famous papyrus[4] containing the \"Maxims of Ani,\" which are well known through the labours of de Rougé,[5] Maspero,[6] Chabas[7] and Amélineau.[8] We should speak of them, however, more correctly as the Maxims of Khonsu-hetep.[9] The papyrus [1.\n\nPlate xiii., l.\n\n8.\n\n2.\n\nPlate xvi., l.\n\n7.\n\n3.\n\nPlate xix., l.\n\n6.\n\n4.\n\nIt was found in a box laid upon the floor of the tomb of a Christian monk at Dêr el-Medinet, The text was given by Mariette in Papyrus Égyptiens du Musée de Boulaq, publiés en fac-simile sous les auspices de S.A.\n\nIsmaïl-Pacha, Khédive d'Égypte .\n\n5.\n\nIn the Moniteur, 15 Août, 1861; and in Comptes Rendus des séances de l'Académie des Inscriptions et Belles Lettres , Paris, 1871, pp.\n\n340-50.\n\n6."

