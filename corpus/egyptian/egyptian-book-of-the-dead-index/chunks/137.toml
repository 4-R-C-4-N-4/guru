body = ", \"Moulder\"), who uniteth (or formeth) and strengtheneth my limbs.\" Khnemu was called \"builder of men, maker of the gods, the father from the beginning; creator of things which are,\" etc.\n\n4 British Museum papyrus No.\n\n9901 has \"place of happiness to which thou goest with me.\" 5 A class of divine beings.\n\n6 I.e.\n\n, \"the great god, lord of Amenta.\" 7.\n\nThis sentence appears to be unfinished; see the Egyptian text, p.\n\n12.] {p.\n\n259} Ani, triumphant, is holy and righteous.\n\nHe hath not sinned, neither hath he done evil against us.\n\nLet it not be given to the devourer Amemet to prevail over him.\n\nMeat-offerings and entrance into the presence of the god Osiris shall be granted unto him, together with a homestead for ever in Sekhet-hetepu, as unto the followers of Horus.\" Next: Plate IV."

