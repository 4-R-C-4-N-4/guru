body = "16.) The text of this Chapter agrees rather with the second version in the papyrus of Nebseni than with that in B.M.\n\npapyrus No.\n\n9964.\n\nAs the Ani papyrus is of Theban origin this was to be expected.\n\nChapter LIV.\n\n\"The Chapter of giving breath in Neter-khert.\" (See pp.\n\n94, 310, and pl.\n\n15.) Only one other copy of this Chapter is known, and it is without vignette.[2] Chapter LVIII.\n\n\" The Chapter of breathing the air, and of having power over the water in Neter-khert.\" (See pp.\n\n103, 314, and pl.\n\n16.) No other copy of this Chapter is known.\n\nChapter LIX.\n\n\"The Chapter of breathing the air, and of having power over the water in Neter-khert.\" (See pp.\n\n104, 315, and pl.\n\n16.) Only one other copy of this Chapter is known.[2] Chapter LXI.\n\n\"The Chapter of not letting the soul of a man be taken away from him in Neter-khert.\" (See pp.\n\n91, 309, and pl.\n\n15.) The vignette is similar to that in the papyrus of Sutimes, which M.\n\nNaville believes to be no older than the XIXth dynasty.[3] [1.\n\nNaville, Einleitung , p.\n\n134.\n\n2.\n\nIbid.\n\n, p.\n\n136.\n\n3.\n\nIbid.\n\n, p.\n\n100.] {p.\n\ncl} List of Chapters Chapter LXXII.--Rubric.\n\n(See pp.\n\n26, 275, and pl.\n\n6.) Chapter LXXIV.\n\n\"The Chapter of walking with the legs and of coming forth upon earth.\" (See pp.\n\n118, 320, and pl.\n\n18.) Chapter LXXVII.\n\n\" The Chapter of changing into a golden hawk .\" (See pp.\n\n152, 332, and pl.\n\n25.) Chapter LXXVIII.\n\n\"The Chapter of changing into a divine hawk.\" (See pp.\n\n154, 333, and pl.\n\n25, 26.) Chapter LXXX.\n\n\"The Chapter of changing into the god who giveth light in the darkness.\" (See pp.\n\n182, 341, and pl.\n\n28.) Chapter LXXXI A .\n\n\"The Chapter of changing into a lotus.\" (See pp.\n\n181, 340, and pl.\n\n28.) The pool of water in the vignette is uncommon.\n\nChapter LXXXII.\n\n\"The Chapter of changing into Ptah.\" (See pp.\n\n170, 337, and pl.\n\n27.) As in other XVIIIth dynasty papyri, this Chapter has a vignette.\n\nChapter LXXXIII.\n\n\"The Chapter of changing into a bennu bird\" (phÅnix?).\n\n(See pp.\n\n176, 339, and pl.\n\n27.) Like other XVIIIth dynasty papyri, this Chapter lacks the addition which is found in the papyrus of Sutimes.\n\nChapter LXXXIV.\n\n\"The Chapter of changing into a heron.\" (See pp.\n\n178, 339, and pl.\n\n28.) Chapter LXXXV.\n\n\" The Chapter of changing into the soul of Tmu.\" (See pp.\n\n172, 338, and pl.\n\n27.) The vignette to this Chapter is similar to that of the papyrus of Tura, surnamed Nefer-uben-f, of the XVIIIth dynasty.' Chapter LXXXVI.\n\n\"The Chapter of changing into a swallow.\" (See pp.\n\n250, 331, and pl.\n\n25.) Chapter LXXXVII.\n\n\"The Chapter of changing into Seta.\" (See pp.\n\n169, 337, and pl.\n\n27.) Chapter LXXXVIII.\n\n\"The Chapter of changing into a crocodile.\" (See pp.\n\n170, 337, and pl."

