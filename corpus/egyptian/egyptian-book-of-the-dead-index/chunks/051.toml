body = "When there were neither material offerings nor painted similitudes to feed upon, it seems as if the ka must have perished; but the texts are not definite on this point.\n\nA prayer of the ka.\n\nThe following is a specimen of the ka's petition for food written in the XVIIIth dynasty:-- \"May the gods grant that I go into and come forth from my tomb, may the Majesty refresh its shade, may I drink water from my cistern every day, may all my limbs grow, may Hapi give unto me bread and flowers of all kinds in their season, may I pass over my estate every day without, ceasing, may my soul [1.\n\n###.\n\nl.\n\n483.\n\n2.\n\nRecueil de Travaux , t.\n\nv., p.\n\nx 66, 1.\n\n67.\n\n3 Ibid., 1.\n\n112.] {p.\n\nlxiv} alight upon the branches of the groves which I have planted, may I make myself cool beneath my sycamores, may I eat the bread which they provide.\n\nMay I have my mouth that I may speak therewith like the followers of Horus, may I come forth to heaven, may I descend to earth, may I never be shut out upon the road, may there never be done unto me that which my soul abhorreth, let not my soul be imprisoned, but may I be among the venerable and favoured ones, may I plough my lands in the Field of Aaru, may I arrive at the Field of Peace, may one come out to me with vessels of ale and cakes and bread of the lords of eternity, may I receive meat from the altars of the great, I the ka of the prophet Amsu.\"[1] The ba or soul.\n\nTo that part of man which beyond all doubt was believed to enjoy an eternal existence in heaven in a state of glory, the Egyptians gave the name ba , a word which means something like \"sublime,\" \"noble,\" and which has always hitherto been translated by \"soul.\" The ba is not incorporeal, for although it dwells in the ka , and is in some respects, like the heart, the principle of life in man, still it possesses both substance and form: in form it is depicted as a human-headed hawk, and in nature and substance it is stated to be exceedingly refined or ethereal.\n\nIt revisited the body in the tomb and re-animated it, and conversed with it; it could take upon itself any shape that it pleased; and it had the power of passing into heaven and of dwelling with the perfected souls there.\n\nIt was eternal.\n\nAs the ba was closely associated with the ka , it partook of the funeral offerings, and in one aspect of its existence at least it was liable to decay if not properly and sufficiently nourished.\n\nIn the pyramid texts the permanent dwelling place of the ba or soul is heaven with the gods, whose life it shares 1.\n\nsek Unas per em hru pen em aru maa en Behold Unas cometh forth on day this in the form exact of ba anx a soul living.[2] [1.\n\nSee Trans.\n\nSoc.\n\nBib.\n\nArch.\n\n, vol.\n\nvi., pp.\n\n307, 308.\n\n2.\n\nRecueil de Travaux , t.\n\niv., p.\n\n52 (l.\n\n455).] {p.\n\nlxv} 2.\n\nba-sen met Unas Their soul[1] is in Unas.[2] 3.\n\naha ba-k emma neteru Standeth thy soul among the gods.[3] 4.\n\nha Pepi pu i-nek maat Heru metu-s thu Hail, Pepi this!\n\ncometh to thee the eye of Horus, it speaketh with thee."

