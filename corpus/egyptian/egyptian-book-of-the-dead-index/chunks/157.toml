body = "The draught-board of the ancient Egyptians is often a rectangular wooden box, the top divided into squares, containing a drawer in which the men are kept (British Museum, No.\n\n21,576).\n\nDraught-boards were also made of blue glazed faïence , and bone or ivory (British Museum, No.\n\n21,577).\n\nThe draughtsmen n are of wood, bone, ivory, glazed faïence , or stone, and have at times the heads of lions 1) (British Museum, Nos.\n\n13,417, 21,580, 21,581); jackals (British Museum, Nos.\n\n604 b , 24,660-66); and of the god Bes (British Museum, Nos.\n\n6413 c , 24,667-75).\n\nNo.\n\n6414 a is inscribed with the prenomen of Necho II.\n\n2, I.e.\n\n, the Sun-god when he sets and rises.\n\n3.\n\nSupplied from the Papyrus of Nebseni.\n\nSee British Museum papyrus No.\n\n9900; Naville, Todtenbuch , Bd.\n\nII., Pl.\n\nxxxi.\n\n4 See supra , p.\n\n273, note 3.\n\n5.\n\nAdding ### or ### from the variant readings given by Naville.\n\n6.\n\nSome papyri read Unnu ; on this town, see Brugsch, Dict.\n\nGéog.\n\n, p.\n\n146.\n\n7.\n\nShu was the son of Ra and Hathor and the twin-brother of Tefnut.\n\nHe typified the sunlight, and separated the earth from the sky, which he established and supported.\n\nFor a drawing of Shu and his four supports, see Lanzone, Dizionario , tav.\n\n385.\n\n8.\n\nSee Brugsch, Dict.\n\nGéog.\n\n, p.\n\n749.\n\n9.\n\nI.e.\n\n, \" substance of the gods.\"] {p.\n\n282} (13) Who then is this?\n\nIt is Tmu in his disk, or (as others say), It is Ra in (14) his rising in the eastern horizon of heaven.\n\n\"I am Yesterday; I know (15) Tomorrow.\" Who then is this?\n\nYesterday is Osiris, and (16) Tomorrow is Ra, on the day when he shall destroy the (17) enemies of Neb-er-tcher, and when he shall stablish as prince and ruler (18) his son Horus, or (as others say), on the day when we commemorate the festival (19) of the meeting of the dead Osiris with his father Ra, and when the battle of the (20) gods was fought in which Osiris, lord of Amentet, was the leader.\n\nWhat then is this?\n\n(21) It is Amentet, [that is to say] the creation of the souls of the gods when Osiris was leader in Set-Amentet; or (22) (as others say), Amentet is that which Ra hath given unto me; when any god cometh, he doth arise and (23) doeth battle for it.\n\n\"I know the god who dwelleth therein.\" (24) Who then is this?\n\nIt is Osiris,\" or (as others say), Ra is his name, even Ra (25) the self-created.\n\n\"I am the bennu [1] bird (26) which is in Annu, and I am the keeper of the volume of the book of things[2] which are and of things which shall be.\" Who (27) then is this?\n\nIt is Osiris, or (as others say), It is his dead body, or (as others say), (28) It is his filth.\n\nThe things which are are and the things which shall be are his dead body; or (as others say), (29) They are eternity and everlastingness."

