body = "The god Tmu, seated within the Sun-disk in the boat of the setting sun, facing a table of offerings.\n\n6.\n\nThe god Rehu, in the form of a lion (to illustrate line 133).\n\n7.\n\nThe serpent Uatchit, the lady of flame, a symbol of the eye of Ra, coiled round a lotus flower.\n\nAbove is the emblem of fire.\n\nText: [Chapter XVII.] (1.) HERE BEGIN THE PRAISES AND GLORIFYINGS[2] OF COMING OUT FROM AND GOING INTO (2) THE GLORIOUS NETER-KHERT IN THE BEAUTIFUL AMENTA, OF COMING OUT BY DAY[3] IN ALL THE FORMS OF EXISTENCE WHICH [1.\n\nCompare the following variant from a papyrus in Dublin.\n\nIn the papyrus of Hunefer, before the scene of the Cat cutting off Apepi's head, is one in which the deceased is represented kneeling in adoration before five ram-headed gods, whose names are Ra, Shu, Tefnut, Seb and Ba-[neb]-Tattu.\n\n2.\n\nPierret renders, résurrection des mânes.\" See Le Livre des Morts , p.\n\n53.\n\n3.\n\nSome copies read, \"to be with the followers of Osiris, and to feed upon the food of Un-nefer, to come forth by day\"; and others, \"may I drink water at the sources of the streams, and be among the followers of Un-nefer; may I see the disk every morning.\" For the texts, see Naville, Todtenbuch , Bd.\n\nII., Bl.\n\n29.] {p.\n\n281} PLEASE HIM ( i.e.\n\n, THE DECEASED), OF PLAYING AT DRAUGHTS' AND SITTING IN THE (3) SEH HALL, AND OF COMING FORTH AS A LIVING SOUL.\n\nBehold Osiris, the scribe Ani, after (4) he hath come to his haven [of rest].\n\nThat which hath been done upon earth [by Ani] being blessed, all (5) the words of the god Tmu come to pass.\n\n\"I am the god Tmu in [my] rising;[2] I am the only One.\n\nI came into existence in Nu.\n\n(6) I am Ra who rose in the beginning.\n\n[He hath ruled that which he made.][3]\" (7) Who then is this?\n\nIt is Ra who rose for the first time in the city of (8) Suten-henen[4] [crowned][5] as a king in [his] rising.[6] The pillars of Shu[7] were not as yet created, when he was upon the (9) high place of him who is in Khemennu.[8] \"I am the great god who gave birth to himself, even Nu, (10) [who] created his name Paut Neteru [9] as god.\" Who then (11) is this?\n\nIt is Ra, the creator of the name[s] of his limbs, which came into being (12) in the form of the gods in the train of Ra.\n\n\"I am he who is not driven back among the gods.\" [1.\n\nFor accounts of the way in which draughts were played by the Egyptians, see Birch, in Revue Archéologique , 1864, p.\n\n56 ff.; Birch, in Aeg.\n\nZeitschrift , 1866, p.\n\n97; Birch, in Trans.\n\nBoy.\n\nSon Literature, New Series, vol.\n\nix., p.\n\n256; and Falkner, Oriental Games , London, 1892."

