body = "Nationale , Paris, 1879, foll.\n\n14, 15); lines 166 ff.\n\nare found on the stele of Nehi (see Mariette, Notice des Mon.\n\nà Boulaq , p.\n\n190; Maspero, Recueil , t.\n\niii., p.\n\n195); and lines 576-83 on the coffin of Sebek-Aa (see Lepsius, Aelteste Texte , Bl.\n\n37; Maspero, Recueil , t.\n\niv., p.\n\n68).\n\nIn the XVIIIth dynasty line 169 was copied on a wall in the temple of Hatshepset at Dêr el-baharî (see Dümichen, Hist.\n\nInschriften , Bll.\n\n25-37; Maspero, Recueil , t.\n\ni., p.\n\n195 ff.); and copies of lines 379-99 occur in the papyri of Mut-hetep (British Museum, No.\n\n10,010) and Nefer-uten-f (Paris, No.\n\n3092, See Naville, Todtenbuch , Bd.\n\nI., Bl.\n\n197; Aeg.\n\nZeitschrift , Bd.\n\nXXXII., p.\n\n3; and Naville, Einleitung, pp.\n\n39, 97).\n\nIn the XXVIth dynasty we find texts of the Vth dynasty repeated on the walls of the tomb of Peta-Amen-apt, the chief kher-heb at Thebes (see Dümichen, Der Grabpalast des Patuamenap in der Thebanischen Nekropolis , Leipzig, 1884-85); and also upon the papyrus written for the lady Sais ###, about A.D.\n\n200 (see Devéria, Catalogue des MSS.\n\nÉgyptiens , Paris, 1874, p.\n\n170 No.\n\n3155).\n\nSignor Schiaparelli's words are:--\"Esso è scritto in ieratico, di un tipo paleografico speciale: l' enorme abbondanza di segni espletivi, la frequenza di segni o quasi demotici o quasi geroglifici, la sottigliezza di tutti, e l'incertezza con cui sono tracciati, che rivela una mano più abituata a scrivere in greco che in egiziano, sono altrettanti caratteri del tipo ieratico del periodo esclusivamente romano, a cui il nostro papiro appartiene senza alcun dubbio.\" Il Libro dei Funerali , p.\n\n19.\n\nOn Devéria's work in connection with this MS., see Maspero, Le Rituel du sacrifice Funéraire (in Revue de l'Histoire des Religions , t.\n\nxv., p.\n\n161).] {p.\n\nx} II.\n\nThe Theban version, which was commonly written on papyri in hieroglyphics and was divided into sections or chapters, each of which had its distinct title but no definite place in the series.\n\nThe version was much used from the XVIIIth to the XXth dynasty.\n\nIII.\n\nA version closely allied to the preceding version, which is found written on papyri in the hieratic character and also in hieroglyphics.\n\nIn this version, which came into use about the XXth dynasty, the chapters have no fixed order.\n\nIV.\n\nThe so-called Saïte version, in which, at some period anterior probably to the XXVIth dynasty, the chapters were arranged in a definite order.\n\nIt is commonly written in hieroglyphics and in hieratic, and it was much used from the XXVIth dynasty to the end of the Ptolemaic period.\n\nEarly forms of the Book of the Dead.\n\nThe Book of the Dead."

