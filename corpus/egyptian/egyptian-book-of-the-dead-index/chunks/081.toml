body = ", p.\n\n160.\n\n9.\n\nIbid.\n\n, p.\n\n161.\n\n10.\n\nIbid.\n\n, p.\n\n163.\n\n11.\n\nIbid.\n\n, p.\n\n187.\n\n12 The variant version says, \"I developed myself from the primeval matter which I had made.\" and adds, \"My name is Osiris, ###, the substance of primeval matter.\"] {p.\n\nc} \"none other who worked with me.\n\nI laid the foundations of all things by my will, and all things evolved themselves therefrom.[1] I united myself to my shadow, and I sent forth Shu and Tefnut out from myself; thus from being one god I became three, and Shu and Tefnut gave birth to Nut and Seb, and Nut gave birth to Osiris, Horus-Khent-an-maa, Sut, Isis, and Nephthys, at one birth, one after the other, and their children multiply upon this earth.\"[2] Summary of theories.\n\nThe reader has now before him the main points of the evidence concerning the Egyptians' notions about God, and the cosmic powers and their phases, and the anthropomorphic creations with which they peopled the other world, all of which have been derived from the native literature of ancient Egypt.\n\nThe different interpretations which different Egyptologists have placed upon the facts demonstrate the difficulty of the subject.\n\nSpeaking generally, the interpreters may be divided into two classes: those who credit the Egyptians with a number of abstract ideas about God and the creation of the world and the future life, which are held to be essentially the product of modern Christian nations; and those who consider the mind of the Egyptian as that of a half-savage being to whom occasional glimmerings of spiritual light were vouchsafed from time to time.\n\nAll eastern nations have experienced difficulty in separating spiritual from corporeal conceptions, and the Egyptian is no exception to the rule; but if he preserved the gross idea of a primeval existence with the sublime idea of God which he manifests in writings of a later date, it seems that this is due more to his reverence for hereditary tradition than to ignorance.\n\nWithout attempting to decide questions which have presented difficulties to the greatest thinkers among Egyptologists, it may safely be said that the Egyptian whose mind conceived the existence of an unknown, inscrutable, eternal and infinite God, who was One-whatever the word One may mean here and who himself believed in a future life to be spent in a glorified body in heaven, was not a being whose spiritual needs would be satisfied by a belief in gods who could eat, and drink, love and hate, and fight and grow old and die.\n\nHe was unable to describe the infinite God, himself being finite, and it is not surprising that he should, in some respects, have made Him in his own image.\n\n[1.\n\nThe variant version has, \"I brought into my own mouth my name as a word of power, and I straightway came into being.\" 2 The papyrus from which these extracts are taken is in the British Museum, No.\n\n10188.\n\nA hieroglyphic transcript and translation will be found in Archæologia , vol.\n\nlii., pp.\n\n440-443.\n\nFor the passages quoted see Col.\n\n26, l.\n\n22; Col.\n\n27, l.\n\n5; and Col.\n\n28, l.\n\n20; Col.\n\n29, l.\n\n6.] {p.\n\nci} Next: The Abode Of The Blessed."

