[content]
body = "O god of light, come thou down unto me and swallow up the worms which are in Amenta, The great god who dwelleth within Tattu, whom he seeth not, heareth his prayers.\n\nThey who are in affliction fear him [the god] who cometh forth with the sentence at the sacred block.\n\nOsiris, the royal scribe Nekht-Amen, cometh with the decree of the Lord of All, and Horus hath taken possession of his throne for him.\n\nHe cometh with tidings; [may he enter in] according to his word and may he see Annu.\n\nThe nobles have stood up on the ground before him, and the scribes magnify him.\n\nThe princes bind his swathings, and make festivals for him in Annu.\n\nFor him hath heaven been led captive; he hath seized the inheritance of the earth in his grasp.\n\nNeither heaven nor earth can be taken away from him, for, behold, he is Ra, the first-born of the gods.\n\nHis mother suckleth him, she giveth her breast from the sky.\" [ Rubric .] The words of this chapter are to be said after [the deceased] is laid to rest in Amenta, etc.\n\nText: [Chapter XXII.][2] (1) CHAPTER OF GIVING A MOUTH (2) TO OSIRIS ANI, THE SCRIBE AND TELLER OF THE HOLY OFFERINGS OF ALL THE GODS.\n\nMAY HE BE VICTORIOUS IN NETER-KHERT!\n\n(3) \"I rise out of the egg in the hidden land.\n\nMay my mouth be given (4) unto me that I may speak with it before the great god, the lord of the underworld.\n\n(5) May my hand and my arm not be forced back by the holy (6) ministers of any god.\n\nI am Osiris, the lord of the mouth of the tomb; and Osiris, the victorious scribe Ani, hath a portion 3 with him (7) who is upon the [1.\n\nThe god addressed is Anubis, who in the vignette is shown standing by the bier.\n\n2 The Nebseni papyrus here has a vignette in which the \"Guardian of the Balance\" is shown touching the mouth of the deceased.\n\nIn other instances the deceased touches his own mouth.\n\n3 The Nebseni papyrus has: \"Osiris, lord of Re-stau, is the being who is on the top of the steps,\" The Ani papyrus incorrectly reads \"his top.\"] {p.\n\n275} top of the steps.\n\nAccording to the desire of my heart, I have come from the Pool of Fire,[1] and I have quenched it.\n\n(8) Homage to thee,[2] O thou lord of brightness, thou who art at the head[3] of the Great House, and who dwellest in night (9) and in thick darkness; I have come unto thee.\n\nI am glorious, I am pure; my arms (10) support thee.\n\nThy portion shall be with those who have gone before.\n\nO grant unto me my mouth that I may speak (11) therewith; and that I may follow my heart when it passeth through the fire and darkness.\"[4] [ Rubric of Chapter LXXII.] (I).\n\nIf this writing be (2) known [by the deceased] upon earth, and this chapter be done into writing upon [his] coffin, he shall come forth by (3) day in all the forms of existence which he desireth, and he shall enter into [his] place and shall not be rejected.\n\n(4) Bread and ale and meat shall be given unto Osiris, the scribe Ani, upon the altar of Osiris."

