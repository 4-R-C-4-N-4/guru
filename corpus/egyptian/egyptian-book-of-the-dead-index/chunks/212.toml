[content]
body = "I grow young in (12) the cities, I grow youthful in my homestead, my name is 'My name decayeth not.' I am the Soul, the creator of Nu, who maketh his dwelling-place in (13) Neter-khert.\n\nMy nest is not seen, my egg is not broken.\n\nI am the lord of millions of years.\n\nI make my nest in the limits of heaven.\n\nI descend unto the earth of Seb (14).\n\nI do away with my faults.\n\nI behold my father, the lord of Mash; and his body breatheth in Annu.\n\nI am provided with what I need 05) by Khnemu and Khui in the place of burial in Amenta .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nVignette: A bennu bird Text [CHAPTER LXXXIII.]: (1) THE CHAPTER OF CHANGING INTO A bennu .\n\nSaith Osiris, the scribe Ani, triumphant in peace: \"I came into being from unformed matter, (2) I created myself in the image of the god Khepera, and I grew in the form of plants.\n\nI am hidden in the likeness of the Tortoise.\n\nI am formed out of the atoms of all the gods.\n\n(3) I am the yesterday of the four [quarters of the world], and I am the seven uræi which came into existence in the East, the mighty one who illumineth the nations (4) by his body.\n\nHe is god in the likeness of Set; and Thoth dwelleth in the midst of them by (5) judgment of the dweller in Sekhem and of the spirits of Annu.\n\nI sail (6) among them, and I come; I am crowned, I am become a shining one, (7) I am mighty, I am become holy among the gods.\n\nI am the god Khonsu who driveth back all that opposeth him.\" Appendix: The following rubric to this chapter is found in a papyrus at Paris; see Naville, Todtenbuch , Bd.\n\nII., Bl.\n\n185:-- If this chapter be known, the purified one shall come forth by day after his burial, and he shall change his forms at his heart's desire.\n\nHe shall dwell among the servants of Un-nefer, and he shall be satisfied with the food of Osiris, and with the meals of the tomb.\n\nHe shall behold the disk of the Sun, and shall travel over the earth with Ra.\n\nHe shall be triumphant before Osiris, and there shall no evil thing get dominion over him for ever and for all eternity and for ever.\n\nNext: Plate XXVIII."

