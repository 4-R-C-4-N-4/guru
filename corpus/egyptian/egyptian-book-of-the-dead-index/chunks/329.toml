body = "The natural opposition of the day and night was at an early period confounded with the battle which took place between Horus, the son of Isis, and Set, wherein Isis intervened, and it seems that the moral idea of the battle of right against wrong[3] became attached to the latter combat, which was undertaken by Horus to avenge his father's murder by Set.\n\nNebt-het or Nephthys the last member of the company of the gods of Annu, was the daughter of Seb and Nut, the sister of Osiris and Isis, and the [1.\n\n###.\n\nLedrain, Monuments Égyptiens , pl.\n\nXXV., ll.\n\n2, 3.\n\n2.\n\nIn the pyramid of Unas, l.\n\n190, they are called the ### or \"two combatants \"; and see pyramid of Teta, l.\n\n69, where we have the spelling ###.\n\n3.\n\nOn the personification of evil by Set, see Wiedemann, Die Religion , p.\n\n117.] {p.\n\ncxvii} sister and wife of Set.\n\nWhen the sun rose at the creation out of the primeval waters, Nephthys occupied a place in his boat with Isis and other deities; as a nature goddess she either represents the day before sunrise or after sunset, but no portion of the night.\n\nShe is depicted in the form of a woman, having upon her head the hieroglyphics which form her name, \"lady of the house\".\n\nA legend preserved by Plutarch[1] makes her the mother of Anpu or Anubis by Osiris.\n\nIn Egyptian texts Anpu is called the son of Ra.[2] In religious texts Nephthys is made to be the companion of Isis in all her troubles, and her grief for her brother's death is as great as that of his wife.\n\nAnpu , or Anubis, the son of Osiris or Ra, sometimes by Isis and sometimes by Nephthys, seems to represent as a nature god either the darkest part of the twilight or the earliest dawn.\n\nHe is depicted either in human form with a jackal's head, or as a jackal.\n\nIn the legend of Osiris and Isis, Anubis played a prominent part in connexion with the dead body of Osiris, and in papyri we see him standing as a guard and protector of the deceased lying upon the bier; in the judgment scene he is found as the guard of the balance, the pointer of which he watches with great diligence.\n\nHe became the recognized god of the sepulchral chamber, and eventually presided over the whole of the \"funeral Mountain.\" He is always regarded as the messenger of Osiris.\n\nAnother form of Anubis was the god Ap-uat , the ### of the pyramid texts,[3] or \"Opener of the ways,\" who also was depicted in the form of a jackal; and the two gods are often confounded.\n\nOn sepulchral stelæ and other monuments two jackals are frequently depicted; one of these represents Anubis, and the other Ap-uat, and they probably have some connexion with the northern and southern parts of the funereal world.\n\nAccording to M.\n\nMaspero, the god Anubis led the souls of the dead to the Elysian Fields in the Great Oasis.[4] Among the primeval gods are two, Hu and Saa who are seen in the boat of the sun at the creation.\n\nThey are the children of Tmu or Tmu-Ra, but the exact part which they play as nature gods has not yet, it seems, been satisfactorily made out.\n\nThe first mention of them in the pyramid texts records their subjugation by the deceased,[5] but in the Theban Book of the Dead [1."

