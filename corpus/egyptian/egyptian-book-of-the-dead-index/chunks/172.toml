[content]
body = "\"Lo, the Lover of fire, the purifier of sinners (?), the lover of slaughter, the chief of those who adore, the lady of the temple, the slaughterer of the fiends in the night.\n\nShe judgeth the feeble bandaged one.\" THE NINETEENTH PYLON.\n\n\"Lo, the Dispenser of light while she liveth, the mistress of flames, the lady of the strength and of the writings of Ptah himself.\n\nShe maketh trial of the swathings of Pa-an.\" THE TWENTIETH PYLON.\n\n\"Lo, she who is within the cavern of her lord, Clother is her name; she hideth what she hath made, she carrieth away hearts and greedily drinketh water.\n\nShe judgeth the feeble swathed one.\" THE TWENTY-FIRST PYLON.\n\n\"Lo, the knife which cutteth when [its name] is uttered, and slayeth those who advance towards its flames.\n\nIt hath secret plots and counsels.\" {p.\n\n299} In the late recensions of the Book of the Dead,[1] the text referring to the twenty-first Pylon reads:-- (71) \"Hail,\" saith Horus, \"O twenty-first pylon of the Still-Heart.\n\n(72) I have made the way, I know thee, I know thy name, I know the name of the goddess who guardeth thee: 'Sword that smiteth at the utterance of its [own] name, the unknown (?) goddess with back-turned face, the overthrower of those who draw nigh unto her flame' is her name.\n\nThou keepest the secret things of the avenger of the god whom thou guardest, and his name is Amem.[2] (73) He maketh it to come to pass that the persea trees grow not, that the acacia trees bring not forth, and that copper is not begotten in the mountain.\n\nThe godlike beings of this pylon are seven gods.\n\n(74) Tchen or At is the name of the one at (?) the door; Hetep-mes[3] is the name of the second one; Mes-Sep[4] is the name of the third one Utch-re[5] is the name of the fourth one; \"Ap-uat[6] is the name of the fifth one; Beq[7] is the name of the sixth one; Anubis is the name of the seventh one.\" (75) \"I have made the way.\n\nI am Amsu-Horus, the avenger of his father, the heir of his father Un-nefer.\n\nI have come and I have overthrown all foes of my father Osiris.\n\nI have come day by day with victory, doing myself the worship of the god, (76) in the house of his father Tmu, lord of Annu, triumphant in the southern sky.\n\nI have done what is right and true to him that hath made right and truth; I have made the Haker festival for the lord thereof; I have led the way in the festival; (77) I have made offerings of cakes to the lords of the altars; and I have brought offerings and oblations, and cakes and ale, and oxen and ducks, to my father Osiris Un-nefer.\n\nI rise up in order that my soul may be made one wholly; I cause the bennu bird to come forth at [my] words.\n\nI have come daily into the holy house to make offerings of incense.\n\n(78) I have brought garments of byssus.\n\nI have set forth on the lake in the boat."

