body = "(38) Hail, thou who dost make mankind to flourish, who comest forth from thy hall, I have not cursed God.\n\n(39) Hail, Neheb-nefert, who comest forth from .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nI have not behaved myself with arrogance (?).\n\n(40) Hail, Neheb-kau, who comest forth from thy city, I have not been overweeningly proud.\n\n(40) Hail, Tcheser-tep, who comest forth from thy hiding place, I have never magnified my condition beyond what was fitting.\n\n(42) Hail, thou who bringest thine arm, who comest forth from Aukert, I have never slighted the god in my town.\" In the Nebseni papyrus (Naville, Todtenbuch , Bd.\n\nI., Bll.\n\n137, 138), the CXXVth Chapter ends as follows:-- (2) \"Homage to you, O ye gods, I know You, (3) and I know your names.\n\nCast me not down to your (4) knives of slaughter, and bring not my wickedness into the presence of the god whom ye follow, (5) and let not the time of my failings come before you.\n\nI pray you, declare me right and true in the presence of the (6) universal God, because I have done that which is right and true in Ta-mera; I have not cursed the god .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n\"Homage to you, O ye gods who live in your hall Of (7) Right and Truth, and who have no evil in your bodies, who feed on your own substance in (8) the presence of Horus who liveth in his disk, deliver ye me from Baabi, who feedeth on the inwards of the mighty ones on the day of the great judgment which shall be holden by you.\n\n(9) I have come unto you; I have committed no faults; I have not sinned; I have done no evil; I have accused no man falsely; therefore let nothing be done against me.\n\nI live in right and truth, (10) and I feed my heart upon right and truth.\n\nThat which men have bidden I have done, and the gods are satisfied thereat.\n\nI have pacified the god, for I have done his (11) will.\n\nI have given bread unto the hungry and water unto those who thirst, clothing unto the naked, and a boat unto the shipwrecked mariner.\n\n(12) I have made holy offerings unto the gods; and I have given meals of the tomb to the sainted dead.\n\nO, then, deliver ye me, and protect me; accuse me not before the great god.\n\n(13) I am pure of mouth, and I am pure of hands.\n\nMay those who see me say, 'Come in peace, come in peace.' For I have heard the speech which the Ass held with the Cat in the House of Hept-re.\n\n(14) 1 have borne witness before him [the god] and he hath given judgment.\n\nI have beheld the dividing of the persea trees (15) within Re-stau.\n\nI offer up prayers in the presence of the gods, knowing that which concerneth them.\n\nI have come forward to make a declaration of right and truth, and to place (16) the balance upon its supports within the groves of amaranth."

