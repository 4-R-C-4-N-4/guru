body = "The Australian blacks kill a man, cut out his caul-fat, and rub themselves with it, \"the belief being that all the qualifications, both physical and mental of the previous owner of the fat, were communicated to him who used it\"; see Fraser, Golden Bough , vol.\n\nii., p.\n\n88.] Next: The Egyptians' Ideas Of God."

