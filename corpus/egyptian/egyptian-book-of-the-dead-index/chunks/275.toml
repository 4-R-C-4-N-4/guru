[content]
body = "The chief gods mentioned in the pyramid texts are identical with those whose names are given on tomb, coffin and papyrus in the latest dynasties; and if the names of the great cosmic gods, such as Ptah and Khnemu, are of rare occurrence, it should be remembered that the gods of the dead must naturally occupy the chief place in this literature which concerns the dead.\n\nFurthermore, we find that the doctrine of eternal life and of the resurrection of a glorified or transformed body, based upon the ancient story of the resurrection of Osiris after a cruel death and horrible mutilation, inflicted by the powers of evil, was the same in all periods, and that the legends of the most ancient times were accepted without material alteration or addition in the texts of the later dynasties.\n\n[1.\n\nLe Christianisme chez les anciens Coptes , in Revue des Religions , t, xiv., Paris, 1886, PP, 308-45 2.\n\nI.e., ###.\n\n3.\n\nSee St.\n\nMatthew xi., 23; Acts ii., 27, etc.] {p.\n\nxlix} Plutarch's version of the legend.\n\nThe story of Osiris is nowhere found in a connected form in Egyptian literature, but everywhere, and in texts of all periods, the life, sufferings, death and resurrection of Osiris are accepted as facts universally admitted.\n\nGreek writers have preserved in their works traditions concerning this god, and to Plutarch in particular we owe an important version of the legend as current in his day.\n\nIt is clear that in some points he errs, but this was excusable in dealing with a series of traditions already some four thousand years old.[1] According to this writer the goddess Rhea [Nut], the wife of Helios [Ra], was beloved by Kronos [Seb].\n\nWhen Helios discovered the intrigue, he cursed his wife and declared that she should not be delivered of her child in any month or in any year.\n\nThen the god Hermes, who also loved Rhea, played at tables with Selene and won from her the seventieth part of each day of the year, which, added together, made five whole days.\n\nThese he joined to the three hundred and sixty days of which the year then consisted.[2] Upon the first of these five days was Osiris brought forth;[3] and at the moment of his birth a voice was heard to proclaim that the lord of creation was born.\n\nIn course of time he became king of Egypt, and devoted himself to civilizing his subjects and to teaching them the craft of the husbandman; he established a code of laws and bade men worship the gods.\n\nHaving made Egypt peaceful and flourishing, he set out to instruct the other nations of the world.\n\nDuring his absence his wife Isis so well ruled the state that Typhon [Set], the evil one, could do no harm to the realm of Osiris.\n\nWhen Osiris came again, Typhon plotted with seventy-two comrades, and with Aso, the queen of Ethiopia, to slay him; and secretly got the measure of the body of Osiris, and made ready a fair chest, which was brought into his banqueting hall when Osiris was present together with other guests.\n\nBy a ruse Osiris was induced to lie down in the chest, which was immediately closed by Typhon and his fellow conspirators, who conveyed it to the Tanaitic mouth of the Nile.[4] These things happened on the seventeenth day of [1.\n\nFor the text see De Iside et Osiride , ed.\n\nDidot (Scripta Moralia, t.\n\niii., pp.\n\n429-69), Â§ xii.\n\nff.\n\n2."

