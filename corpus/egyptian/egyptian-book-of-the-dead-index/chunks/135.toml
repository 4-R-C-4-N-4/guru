[content]
body = "Four goddesses bore the name of Meskhen, and they were supposed to assist the resurrection of Osiris; they were associated with Tefnut, Nut, Isis, and Nephthys (see Lepsius, Denkmäler , iv., Bl.\n\n59a; and Mariette, Dendérah , iv., pl.\n\n74 a ).\n\nEach wore upon her head the object ###, which is said by some to represent the blossoms of palm trees (Lanzone, Dizionario , p.\n\n329).\n\nExamples of this as an amulet, in hard stone, in the British Museum, are Nos.\n\n8158, 8159, 8161, 20,618, and, in porcelain, No.\n\n15,963.] {p.\n\n257} presiding over the birth-chamber, and Renenet[1] probably superintending the rearing of children.\n\nBehind the meskhen is the soul of Ani in the form of a human-headed bird standing on a pylon.\n\nOn the right of the balance, behind Anubis, stands Thoth,[2] the scribe of the gods, with his reed-pen and palette[3] containing black and red ink, with which to record the result of the trial.\n\nBehind Thoth stands the female monster Amam[4], the \"Devourer,\" or Am-mit, the eater of the Dead.\" [1.\n\nThe name of this goddess is probably connected with the word renen , \"to suckle.\" M.\n\nPierret identifies her with the goddess of that name who presided over harvests, and is described as the \"lady of the offerings of all the gods\" ( Panthéon , p.\n\n61), having a snake's head, which in some instances is surmounted by the disk, horns and feathers of the goddess Hathor (see Lanzone, Dizionario , tav.\n\n188, No.\n\n2).\n\n2 Thoth was the personification of intelligence.\n\nHe was self-created and self-existent, and was the \"heart of Ra.\" He invented writing, letters, the arts and sciences, and he was skilled in astronomy and mathematics.\n\nAmong his many titles are \"lord of Law,\" \"maker of Law,\" and \"begetter of Law.\" He justified Osiris against his enemies, and he wrote the story of the fight between Horus, the son of Osiris, and Set.\n\nAs \"lord of Law\" he presides over the trial of the heart of the dead, and, as being the justifier of the god Osiris against his enemies, he is represented in funereal scenes as the justifier also of the dead before Osiris (see Lanzone, Dizionario , p.\n\n1264 ff., and tav.\n\ncccciv., No.\n\ni; Pierret, Panthéon, pp.\n\n10-14; and Brugsch, Religion und Mythologie , p.\n\n439 ff.).\n\nBrugsch connects the name Tehuti (Thoth) with the old Egyptian word tehu , \"ibis,\" and he believes that it means the \"being who is like an ibis.\" The word tex also means \"to measure,\" \"to compute,\" \"to weigh\"; and as this god is called \"the counter of the heavens and the stars, and of all that therein is,\" the connexion of the name Thoth with tex is evident.\n\nBronze and faïence figures of the god represent him with the head of an ibis, and holding an utchat in his hands (see Nos.\n\n481, 490a, and 11,385 in the British Museum).\n\nThe utchat , or eye of the sun, has reference to the belief that Thoth brought back each morning the light of the sun which had been removed during the night.\n\n3."

