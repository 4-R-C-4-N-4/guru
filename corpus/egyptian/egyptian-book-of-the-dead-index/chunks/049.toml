body = "nuk sah em ba-f I am a sah with his soul.[3] In the late edition of the Book of the Dead published by Lepsius the deceased is said to \" look upon his body and to rest upon his sahu ,\"[4] and souls are said \"to enter into their sahu \";[5] and a passage extant both in this and the older Theban edition makes the deceased to receive the sahu of the god Osiris.[6] But that Egyptian writers at times confused the khat with the sahu is clear from a passage in the Book of Respirations, where it is said, \"Hail Osiris, thy name endureth, thy body is stablished, thy sahu germinateth\";[7] in other texts the word \"germinate\" is applied only to the natural body.\n\nThe ab or heart.\n\nIn close connection with the natural and spiritual bodies stood the heart, or rather that part of it which was the seat of the power of life and the fountain of good and evil thoughts.\n\nAnd in addition to the natural and spiritual bodies, man also bad an abstract individuality or personality endowed with all his characteristic attributes.\n\nThis abstract personality had an absolutely independent existence.\n\nIt could move freely from place to place, separating itself from, or uniting itself to, [1.\n\nRecueil de Travaux , t.\n\nv., p.\n\n59 (l.\n\n384).\n\n2.\n\nIbid., t.\n\niv., p.\n\n61 (1.\n\n521).\n\n3.\n\nBook of the Dead, Chapter I.XXVIII., 1.\n\n14.\n\n4.\n\n###.\n\nChapter LXXXIX., 1.\n\n6.\n\n5.\n\nIbid., 1.\n\n5.\n\n6.\n\n###.\n\nChapter CXXX., 1.\n\n38 (ed.\n\nNaville).\n\n7.\n\n###.\n\nSee Brugsch, Liber Metempsychosis , p.\n\n15.] {p.\n\nlxii} The ka or double.\n\nthe body at will, and also enjoying life with the gods in heaven.This was the ka ,[1] a word which at times conveys the meanings of its Coptic equivalent {Coptic kw }, and of {Greek ei?'dwlon }, image, genius, double, character, disposition, and mental attributes.\n\nThe funeral offerings of meat, cakes, ale, wine, unguents, etc.\n\n, were intended for the ka ; the scent of the burnt incense was grateful to it.\n\nThe ka dwelt in the man's statue just as the ka of a god inhabited the statue of the god.\n\nIn this respect the ka seems to be identical with the sekhem or image.\n\nIn the remotest times the tombs had special chambers wherein the ka was worshipped and received offerings.\n\nThe priesthood numbered among its body an order of men who bore the name of \"priests of the ka and who performed services in honour of the ka in the \" ka chapel\".\n\nIn the text of Unas the deceased is said to be \"happy with his ka\"[2] in the next world, and his ka is joined unto his body in \"the great dwelling\"; [3] his body [1.\n\nThe first scholar who seriously examined the meaning of the word was Dr.\n\nBirch, who collected several examples of the use and discussed them in his Mèmoire sur une Patère Égyptienne du Musée du Louvre , Paris, 1858, p.\n\n59 ff.\n\n(Extrait du t.\n\nxxiv.\n\ndes Mémoires de la Société impériale des Antiquaires de France ).\n\nDr.\n\nBirch translated the word by être, personne, emblème, divin, génie, principe, esprit.\n\nIn September, 1878, V."

