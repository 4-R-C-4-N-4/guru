body = "Chapp.\n\n30B, 164, 37B and 148.\n\nAlthough these chapters were found at Hermopolis, the city of Thoth, it does not follow that they were drawn up there.\n\n5.\n\nSee Birch, in Bunsen, Egypt's Place in Universal History , vol.\n\nV., p.\n\n125; Naville, Todtenbuch (Einleitung), p.\n\n26.\n\n6.\n\nStromata , VI., 4, 35, ed.\n\nDindorff, t.\n\niii., p.\n\n155.\n\n7.\n\nOn the sacred books of the Egyptians see also Iamblichus, De Mysteriis , ed.\n\nParthey, Berlin 1857, pp.\n\n260, 261; Lepsius, Chronologie , p.\n\n45 ff.; and Brugsch, Aegyptologie , p.\n\n149.\n\n8.\n\n###.\n\n9.\n\n###.\n\n10.\n\n###.] {p.\n\nxxvii} Influence of the priests of Annu on its compilation.\n\npyramid texts are versions of ancient religious compositions which the priests of the college or school of Annu[1] succeeded in establishing as the authorized version of the Book of the Dead in the first six dynasties.\n\nRa, the local form of the Sun-god, usurps the place occupied by the more ancient form Tmu; and it would seem that when a dogma had been promulgated by the college of Annu, it was accepted by the priesthood of all the great cities throughout Egypt.\n\nThe great influence of the Annu school of priests even in the time of Unas is proved by the following passage from the text in his pyramid: \"O God, thy Annu is Unas; O God, thy Annu is Unas.\n\nO Ra, Annu is Unas, thy Annu is Unas, O Ra.\n\nThe mother of Unas is Annu, the father of Unas is Annu; Unas himself is Annu, and was born in Annu.\"[2] Elsewhere we are told that Unas \"cometh to the great bull which cometh forth from Annu,[3] and that he uttereth words of magical import in Annu.\"[4] In Annu the god Tmu produced the gods Shu and Tefnut,[5] and in Annu dwelt the great and oldest company of the gods, Tmu, Shu, Tefnut, Seb, Nut, Osiris, Isis, Set and Nephthys.[6] The abode of the blessed in heaven was called[7] Annu, and it was asserted that the souls of [1 Annu , the metropolis of the thirteenth nome of Lower Egypt; see Brugsch, Dict.\n\nGéog.\n\n, p.\n\n41; de Rougé, Géographie Ancienne de la Basse-Égypte , p.\n\n81; and Amélineau, La Géographie de Égypte a l'Époque Copte , p.\n\n287.\n\nAnnu is ###, Genesis xli., 45; ###, Genesis xli., 50; ### Ezekiel xxx., 17; and Beth Shemesh, ### 4:11 Jeremiah xliii., 13; and the Heliopolis of the Greek writers ( H?liou'polis , Strabo, XVII., 1., Â§Â§ 27, 28; Herodotus, II., 3; Diodorus, I., 57, 4).\n\n2.\n\n###.\n\nMaspero, Unas, II.\n\n591, 592; and compare Pepi I., II.\n\n690, 691.\n\n3.\n\nSee line 596.\n\n4.\n\n###.\n\n5.\n\n###.\n\nMaspero, Pepi I.\n\n, 1.\n\n465, 466."

