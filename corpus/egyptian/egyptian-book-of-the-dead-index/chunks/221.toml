[content]
body = "348} (11) \"Hall, Qerer, who comest forth from Amentet, I have not committed fornication.\" (12) \"Hail, thou whose face is turned back, who comest forth from thy hiding place, I have not caused shedding of tears.\" (13) \"Hail, Bast, who comest forth from the secret place, I have not dealt deceitfully.\" (14) \"Hail, thou whose legs are of fire, who comest forth out of the darkness, I have not transgressed.\" (15) \"Hail, Devourer of Blood, who comest forth from the block of slaughter, I have not acted guilefully.\" (16) \"Hail, Devourer of the inward parts, who comest forth from Mabet, I have not laid waste the ploughed land.\" (17) \"Hail, Lord of Right and Truth, who comest forth from the city of Right and Truth, I have not been an eavesdropper.\" (18) \"Hail, thou who dost stride backwards, who comest forth from the city of Bast, I have not set my lips in motion [against any man].\" (19) \"Hail, Sertiu, who comest forth from Annu, I have not been angry and wrathful except for a just cause.\" (20) \"Hail, thou.\n\nbeing of two-fold wickedness, who comest forth from Ati (?) I have not defiled the wife of any man.\" (21) \"Hail, thou two-headed serpent, who comest forth from the torture-chamber, I have not defiled the wife of any man.\" (22) \"Hail, thou who dost regard what is brought unto thee, who comest forth from Pa-Amsu, I have not polluted myself.\" (23) \"Hail, thou Chief of the mighty, who comest forth from Amentet, I have not caused terror.\" (24) \"Hail, thou Destroyer, who comest forth from Kesiu, I have not transgressed.\" (25) \"Hail, thou who orderest speech, who comest forth from Urit, I have not burned with rage.\" (26) \"Hail, thou Babe, who comest forth from Uab, I have not stopped my ears against the words of Right and Truth.\" (27) \"Hail, Kenemti, who comest forth from Kenemet, I have not worked grief\" (28) \"Hail, thou who bringest thy offering, I have not acted with insolence.\" (29) \"Hail, thou who orderest speech, who comest forth from Unaset, I have not stirred up strife.\" {p.\n\n349} (30) \"Hail, Lord of faces, who comest forth from Netchfet, I have not judged hastily.\" (31) \"Hail, Sekheriu, who comest forth from Utten, I have not been an eavesdropper.\" (32) \"Hail, Lord of the two horns, who comest forth from Saïs, I have not multiplied words exceedingly.\" (33) \"Hail, Nefer-Tmu, who comest forth from Het-Ptah-ka, I have done neither harm nor ill.\" Next: Plate XXXII."

