body = "The name of (2) the doorkeeper is Un-hat[4]; (3) the name of the watcher is (4) Seqet-hra; the name of the herald is Uset.[5] (6) Saith Osiris Ani, when he cometh unto this Arit; \"He sitteth to do his heart's desire, and he weigheth (7) words as the second of Thoth.\n\nThe strength of Thoth[6] humbleth the (8) hidden Maata gods[7] who feed upon Maat throughout the years [of their lives].[8] I make offerings at the (9) moment when [he] passeth on his way; I pass on and enter on the way; Grant thou that I may pass through and that I may gain sight of Ra together with those who make offerings.\" [1.\n\nBirch: \"Pure Spirits.\" Pierret: \"Intelligents.\" 2.\n\nI.e.\n\n, the Arit .\n\n3 Literally standard or perch.\n\nVar.\n\n###.\n\n4 Var.\n\n###.\n\n5 Var.\n\n###.\n\n6.\n\nVar.\n\n\"the strength of Osiris is the strength of Thoth.\" 7 Varr.\n\nNemasa , and Sah , \"Orion.\" The reading in Lepsius is Masti , \"gods of the thigh.\" 8.\n\nVar.\n\n\"their years are the years of Osiris.\" 9.\n\nThe text here differs from all others and may be corrupt.] {p.\n\n293} Vignette III.\n\n: The third Arit, guarded by three gods; the first with the head of a jackal, the second the head of a dog, and the third the head of a serpent.\n\nThe first holds an ear of corn (?), and each of the others a knife.\n\nText: (1) THE THIRD ARIT.\n\nThe name of the (2) doorkeeper is Qeq-hauau-ent-pehui;[1] the name of the (4) watcher is Se-res-hra;[2] the name of the herald is Aaa.[3] Saith Osiris Ani, [when he cometh to this Arit]: (6) \"I am hidden [in] the great deep, [I am] the judge of the Rehui.[4] I have come and I have done away with the offences of Osiris.\n\nI am building up the standing place (7) which cometh forth from his urerit (?) crown.\n\nI have done his business in Abtu, I have opened the way in Re-stau, I have (8) eased the pain which was in Osiris.\n\nI have made straight his standing place, and I have made [his] path.[5] He shineth in Re-stau.\" Vignette IV.\n\n: The fourth Arit, guarded by three gods; the first with the head of a man, the second the head of a hawk, and the third the head of a lion.\n\nThe first holds an ear of corn and each of the others a knife.\n\nText: (1) THE FOURTH ARIT.\n\nThe name of the (2) doorkeeper is Khesef-hra-asht- (3) kheru;[6] the name of the (4) watcher is Seres-tepu;[7] (5) the name of the herald is (6) Khesef-At.[8] Saith Osiris, the scribe Ani, triumphant, [when he cometh to this Arit]: \"I am the [mighty] bull, the (7) son of the ancestress of Osiris.\n\nO grant ye that his father, the lord of his godlike (8) companions, may bear witness for him.\n\nHere the guilty are weighed in judgment."

