[content]
body = "My head is like unto the head of Ra; when my limbs are gathered {p.\n\n338} together, I am like unto Tmu.\n\nThe four regions of Ra are the limits of the earth.\n\nI come forth; my tongue (10) is like unto the tongue of Ptah, my throat is even as that of Hathor, and I tell forth the words of my father Tmu with my lips.\n\nHe it is who constrained (11) the handmaid, the wife of Seb; and unto him are bowed [all] heads, and there is fear of him.\n\nHymns of praise are sung in honour of my mighty deeds (12), and I am accounted the heir of Seb, the lord of the earth, the protector.\n\nThe god Seb giveth cool water, he maketh his dawnings to be mine.\n\nThey who dwell in (13) Annu bow down their heads before me, for I am their bull.\n\nI grow strong from moment to moment; my loins are made strong for millions of years.\" Vignette: A Ram.\n\nText [CHAPTER LXXXV.]: (1) THE CHAPTER OF CHANGING INTO THE SOUL OF Tmu.\n\nSaith Osiris Ani, triumphant: (2) \"I have not entered into the house of destruction; I have not been brought to naught, I have not known decay.\n\nI am (3) Ra who come forth from Nu, the divine Soul, the creator of his own limbs.\n\nSin is an abomination unto me, (4) and I look not thereon; I cry not out against right and truth, but I have my being (5) therein.\n\nI am the god Hu, and I never die (6) in my name of 'Soul.' I have brought myself into being together with Nu in my name of (7) 'Khepera.' In their forms have I come into being in the likeness of Ra.\n\nI am the lord of light.\" Appendix: In other ancient papyri the LXXXVth Chapter of the Book of the Dead ends as follows (Naville, Todtenbuch, Bd.\n\nI., Bl.\n\n97):-- \"What I hate shall be buried (5).\n\nLet me not enter into the secret place of the god Tuaa.\n\nI ascribe glory unto Osiris, and I pacify the heart of those who dwell in the god of creation, who love me, who spread (6) abroad fear of me, and who strike terror of me into those who dwell in their own places.\n\nBehold me, for I am exalted upon my resting-place, Nu, (7) upon the place which is adjudged unto me.\n\nI am Nu, and those who work evil shall not overthrow me.\n\nI am the eldest and the first-born son of matter; my (8) soul is the gods, who are the eternal souls.\n\nI am the creator of darkness who maketh his dwelling-place in the limits of the regions of heaven.\n\nI come, and my soul advanceth (9) over the way of the Ancient Ones.\n\nI cause darkness in the limits of the sky, and at my will I come unto the boundaries thereof I walk upon my feet, I am strong (10) to pass over the sky, and I fetter with bonds the darkness and the worm that hideth therein.\n\nI make my steps to advance unto the lord of the two hands (?) My soul (11) and the soul of my body are the uræi, and I live for {p.\n\n339} ever, the lord of years, and the prince of eternity.\n\nI am exalted as lord of the earth, I am exalted (?)."

