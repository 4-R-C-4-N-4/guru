body = "This chapter was found inscribed upon one of the linen wrappings of the mummy of Thothmes III., and a copy of the text is given by Naville (Todtenbuch, Bd.\n\nL, Bl.\n\n179); for a later version see Lepsius, Todtenbuch, Bl.\n\n75, where many interesting variants occur.\n\n3.\n\n###.\n\nChapter LXXXIII., 3.\n\n4.\n\n###.\n\nChapter LXIV., 1.\n\n49.\n\n(Naville, Todtenbuch , Bd.\n\nI., Bl.\n\n76.) 5.\n\n###.\n\nChapter CLIV.\n\n(Lepsius, Todtenbuch , 75.)] himself without diminution, and without defect, like unto Ra for ever and ever.\" The word sahu though at times written with the determinative of a mummy lying on a bier like khat , \"body,\" indicates a body which has obtained a degree of knowledge and power and glory whereby it becomes henceforth lasting and incorruptible.\n\nThe body which has become a sahu has the power of associating with the soul and of holding converse with it.\n\nIn this form it can ascend into heaven and dwell with the gods, and with the sahu of the gods, and with the souls of the righteous.\n\nIn the pyramid texts we have these passages:-- 1.\n\nThes-thu Teta pu un-thu aaa peh-tha hems-k Rise up thou Teti, this.\n\nStand up thou mighty one being strong.\n\nSit thou xent neteru ari-k ennu ari en Ausar em Het-aa amt Annu with the gods, do thou that which did Osiris in the great house in Annu.\n\nsesep-nek sah-k an t'er ret-k em pet an Thou hast received thy sah , not shall be fettered thy foot in heaven, not xesef-k em ta shalt thou be turned back upon earth. 2.\n\nanet' hra-k Teta em hru-k pen aha tha xeft Ra Hail to thee, Teta, on this thy day [when] thou art standing before Ra [as] [1.\n\nBrugsch, Liber Metempsychosis , p.\n\n22.\n\n2.\n\nCompare Coptic ###, \"magister.\" 3.\n\nRecueil de Travaux , t.\n\nv., p.\n\n36 (1.\n\n271).\n\nFrom line 143 of the same text it would seem that a man had more than one sahu , for the words \"all thy sahu ,\" occur.\n\nThis may, however, be only a plural of majesty.] per-f em aabt t'eba-tha em sah-k pen am baiu he cometh from the cast, [when] thou art endued with this thy sah among the souls. 3.\n\nahau pa neheh t'er-f pa t'etta em sah-f [His] duration of life is eternity, his limit of life is everlastingness in his sah . 4."

