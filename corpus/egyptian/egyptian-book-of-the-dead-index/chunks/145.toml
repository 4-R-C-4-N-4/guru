body = ", \"the son who loveth him\"; whereupon the Kher-heb says: \"O Sem, let the Se-mer-f come into the tomb in order that he may see the god.\" The Sem priest holding him by the arm then leads forward the Se-mer-f , who addresses the deceased: \"I have come, I have brought [1.\n\nSee Schiaparelli, Il Libro dei Funerali degli Antichi Egiziani ; Maspero, Le Rituel du Sacrifice Funéraire (in Revue de L'Histoire des Religions , 1887, p.\n\n159 ff.).\n\n2.\n\n###.\n\nFor a complete list of these instruments, see Schiaparelli, Il Libro dei Funerali degli Antichi Egiziani , p.109.] {p.\n\n268} unto thee thy son who loveth thee; he shall open for thee thy mouth and thine eyes.\" (Fig.\n\n8).\n\nA tomb-official, Am-as , then takes up his position behind the deceased, and the Se-mer-f and the Kher-heb stand in front; the Kher-heb repeating four times: \"The Se-mer-f openeth the mouth and the two eyes of the deceased, first with a needle of iron, then with a rod of smu metal\"; the Am-as addressing the deceased: \"Behold the Se-mer-f \"; and the Kher-heb saying, in the name of the Se-mer-f : \"I have pressed for thee thy mouth, even as thy father pressed it in the name of Seker.\n\nHail, Horus hath pressed thy mouth for thee, he hath opened thine eyes for thee; Horus hath opened thy mouth for thee, he hath opened for thee thine eyes; they are firmly stablished.\n\nThy mouth was closed; I have ordered thy mouth and thy teeth for thee in their true order.\n\nThou hast [again] opened thy mouth; Horus hath opened thy mouth.\n\nI have stablished thy mouth firmly.\n\nHorus hath opened for thee thy mouth, Horus hath opened for thee thy two eyes.\" The Kher-heb then speaks on behalf of the Sem priest: \"Thy mouth was closed up.\n\nI have ordered aright for thee thy mouth and thy teeth.\n\nThy mouth is firmly stablished.\n\nThy mouth was tightly closed.\n\nHis mouth is firmly stablished, and [his] two eyes are firmly stablished.\" The Sem priest next presents to the deceased (Fig.\n\n9) a cone-shaped offering,[2] and at the same time the Kher-heb says: \"Open the mouth and the two eyes, open the mouth and the two eyes.\n\nThou hadst tightly closed thy mouth, thou hast [again] opened thy two eyes.\" Then the Kher-heb says, on behalf of the Smer (Fig.\n\n10) priest who stands behind the deceased: \"One cometh unto thee for thy purification.\" Next the Se-mer-f comes forward with four boxes (Fig.\n\n11) in his hands, and the Kher-heb says: \"O se-mer-f , take the four boxes of purification, press the mouth and the two eyes, and open the mouth and the two eyes with each of them four times, and say, 'Thy mouth and thy two eyes are firmly stablished, and they are restored aright,' and say also, 'I have firmly pressed thy mouth, I have opened thy mouth, I have opened thy two eyes by means of the four boxes of purification.\"' The Sem priest then approaches [1.\n\n### t'ettef .\n\n2.\n\nA large collection of such offerings is exhibited in the Third Egyptian Room.] {p.\n\n269} the deceased (Fig."

