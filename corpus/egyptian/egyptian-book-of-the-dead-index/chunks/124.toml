body = ", resurrection] as a living soul to see Horus of the two horizons[6] to the [1.\n\nThe numbers in parentheses indicate the lines of the papyrus.\n\n2.\n\nThe god Khepera is usually represented with a beetle for a head; and the scarab, or beetle, was sacred to him.\n\nThe name means \"to become, to turn, to roll,\" and the abstract noun kheperu may be rendered by \"becomings,\" or \"evolutions.\" The god was self-created, and was the father of all the other gods; men and women sprang from the tears which fell from his eyes; and the animal and vegetable worlds owed their existence to him.\n\nKhepera is a phase of Tmu, the night-sun, at the twelfth hour of the night, when he \"becomes\" the rising sun or Harmachis ( i.e.\n\n, Horus in the horizon).\n\nHe is also described as \" Khepera in the morning, Ra at mid-day, and Tmu in the evening.\" See Lanzone, Dizionario , p.\n\n927 ff.; Grébaut, Hymne à Ammon-Ra , p.\n\n264, note 2; Pierret, Panthéon, pp.\n\n74, 75; Lefébure, Traduction Comparée des Hymnes au Soleil , p.\n\n39; De Rougé, Inscription d'Ahmés , p.\n\n110; Archaeologia , vol.\n\n52, p.\n\n541 ff.; Wiedemann, Die Religion der Alten Aegypter , p.\n\n17; Brugsch, Religion und Mythologie , p.\n\n245, etc .\n\n3.\n\nThe goddess Nut represented the sky, and perhaps also the exact place where the sun rose.\n\nShe was the wife of Seb, the Earth-god, and gave birth to Isis, Osiris, and other gods.\n\nOne of her commonest titles is \"mother of the gods.\" She is depicted as a woman bearing a vase upon her head, and sometimes wears the disk and horns usually characteristic of Isis and Hathor.\n\nShe was the daughter and mother of Ra.\n\nSee Lanzone, Dizionario, p.\n\n392; Pierret, Panthéon , pp.\n\n34, 36; Brugsch, Religion und Mythologie , pp.\n\n603-610.\n\n4.\n\nManu is the name given to the mountains on the western bank of the Nile, opposite Thebes, wherein was situated tu Manu , \"the mountain of Manu,\" the chief site of rock-hewn tombs.\n\nSee Brugsch, Dict.\n\nGéog ., p.\n\n259.\n\n5.\n\nMaat, \"daughter of the Sun, and queen of the gods,\" is the personification of righteousness and truth and justice.\n\nIn many papyri she is represented as leading the deceased into the Hall of Double Maat, where his heart is to be weighed against her emblem.\n\nShe usually wears the feather, emblematic of Truth, and is called the \"lady of heaven\": see Lanzone, Dizionario , p.\n\n276 (and tav.\n\n109, where the twin-goddesses Maat are shown); Pierret, Panthéon , p.\n\n2011.\n\nShe is sometimes represented blind-fold: see Wiedemann, Religion der alten Aegypter, p.\n\n78.\n\nFor figures of the goddess in bronze and stone, see Nos.\n\n380, 383, 386, II, 109, and II, 114 in the British Museum.\n\n6 Heru-khuti , i.e."

