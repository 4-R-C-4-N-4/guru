body = "The god Nu appeareth with the breath of the north wind in this hidden god who maketh for untold millions of men the decrees which abide for ever; his decrees [1.\n\nLiterally \"his heart,\" ab-f .\n\n2 I.e.\n\n, Shu and Tefnut.\n\n3 I.e.\n\n, the Sun and the Moon, ut'ati .\n\n4.\n\nnehep ; other examples of the use of this word are given by Brugsch, Wörterbuch (Suppl., p.\n\n690).] {p.\n\nxcvii} \"are gracious and well doing, and they fall not to the ground until they have fulfilled their purpose.\n\nHe giveth long life and multiplieth the years of those who are favoured by him, he is the gracious protector of him whom he setteth in his heart, and he is the fashioner of eternity and everlastingness.\n\nHe is the king of the North and of the South, Amen-Ra, king of the gods, the lord of heaven, and of earth and of the waters and of the mountains, with whose coming into being the earth began its existence, the mighty one, more princely than all the gods of the first company thereof.\" Theories of the origin of the gods.\n\nWith reference to the origin of the gods of the Egyptians much useful information may be derived from the pyramid texts.\n\nFrom them it would seem that, in the earliest times, the Egyptians had tried to think out and explain to themselves the origin of their gods and of their groupings.\n\nAccording to M.\n\nMaspero[1] they reduced everything to one kind of primeval matter which they believed contained everything in embryo; this matter was water, Nu, which they deified, and everything which arose therefrom was a god.\n\nThe priests of Annu at a very early period grouped together the nine greatest gods of Egypt, forming what is called the paut neteru or \"company of the gods,\" or as it is written in the pyramid texts, paut aat , \"the great company of gods\"; the texts also show that there was a second group of nine gods called paut net'eset or \"lesser company of the gods\"; and a third group of nine gods is also known.\n\nWhen all three pauts of gods are addressed they appear as ###.[2] The great cycle of the gods in Annu was composed of the gods Tmu, Shu, Tefnut, Seb, Nut, Osiris, Isis, Set and Nephthys; but, though paut means \" nine,\" the texts do not always limit a paut of the gods to that number, for sometimes the gods amount to twelve, and sometimes, even though the number be nine, other gods are substituted for the original gods of the paut .\n\nWe should naturally expect Ra to stand at the head of the great paut of the gods; but it must be remembered that the chief local god of Annu was Tmu, and, as the priests of that city revised and edited the pyramid texts known to us, they naturally substituted their own form of the god Ra, or at best united him with Ra, and called him Tmu-Ra.\n\nIn the primeval matter, or water, lived the god Tmu, and when he rose for the first time, in the form of the sun, he created the world.\n\nHere at once we have Tmu assimilated with Nu.\n\nA curious passage in the pyramid of Pepi I.\n\nshows that while as yet there was neither [1.\n\nLa Mythologie Égyptienne ( Études , t.\n\nii., p.\n\n237).\n\n2.\n\nSee Pyramid of Teta, l.\n\n307 (Maspero, Recueil de Travaux , t.\n\nv., p.\n\n46).] {p."

