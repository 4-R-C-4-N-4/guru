body = "2 The name of a constellation.] {p.\n\n321} Text [CHAPTER II.\n\n(1) THE CHAPTER OF COMING FORTH BY DAY, AND OF LIVING AFTER DEATH.\n\nSaith Osiris Ani: \"Hail, Only One, shining from the Moon!\n\n(2) Hail, Only One, shining from the Moon!\n\nGrant that this Osiris Ani may come forth among the multitudes which are round about thee; (3) let him be established as a dweller among the shining ones; and let the underworld be opened unto him.\n\nAnd behold Osiris, (4) Osiris Ani shall come forth by day to do his will upon earth among the living.\" Vignette: Ani, standing with both hands raised in adoration before a ram crowned with plumes and disk; in front of the ram is a table, upon which are a libation vase and a lotus flower.\n\nText [CHAPTER IX.]: (1) THE CHAPTER OF COMING FORTH BY DAY, HAVING PASSED THROUGH THE TOMB.\n\nSaith Osiris Ani: \"Hail Soul, thou mighty one of strength!\n\n(2) Verily I am here, I have come, I behold thee.\n\nI have passed through the underworld, I have seen [my] father (3) Osiris, I have scattered the gloom of night.\n\nI am his beloved one.\n\nI have come; I behold my father (4) Osiris.\n\nI have stabbed Set to the heart.\n\nI have done the things [needed] by my father Osiris.\n\n(5) I have opened every way in heaven and upon earth.\n\nI am the son beloved of his father Osiris (6).\n\nI have become a ruler, I have become glorious, I am furnished [with what I need].\n\nHail, all ye gods, and all ye shining ones, make ye a way for me, the Osiris, the scribe Ani, triumphant.\" Vignette: Ani, with a staff in his left hand, standing before a door.\n\nText [CHAPTER CXXXII.]: THE CHAPTER OF MAKING A MAN TO RETURN TO SEE AGAIN HIS HOME UPON EARTH.\n\nSaith Osiris Ani: \"I am the Lion-god (2) coming forth with strides.\n\nI have shot forth arrows, I have wounded [the prey], I have wounded the prey.\n\nI am the Eye of Horus; I have opened the (3) eye of Horus in his hour.\n\nI am come unto the furrows.\n\nLet Osiris Ani come in peace.\" Vignette: Ani piercing a serpent.\n\nText [CHAPTER X.\n\n[XLVIII.]: ANOTHER CHAPTER OF ONE WHO COMETH FORTH BY DAY AGAINST HIS FOES IN THE UNDERWORLD.\n\nSaith Osiris Ani: \"I have divided the heavens, (2) I have passed through the horizon, I have traversed the earth, [following] upon his footsteps.\n\nI am borne away by the mighty and shining ones because, behold, (3) I am furnished with millions of years which {p.\n\n322} have magic virtues.\n\nI eat with my mouth, I chew with my jaws; and, behold, (4) I am the god who is the lord of the underworld: May there be given unto me, Osiris Ani, that which abideth for ever without corruption.\" Next: Plate XIX."

