body = "386, and Records of the Past , 1st ed., vol.\n\niv., p.\n\n117.\n\n3 According to the Westcar papyrus, Herutataf informed his father Khufu of the existence of a man 110 years old who lived in the town of Tettet-Seneferu: he was able to join to its body again a head that had been cut off, and possessed influence over the lion, and was acquainted with the mysteries of Thoth.\n\nBy Khufu's command Herutataf brought the sage to him by boat, and, on his arrival, the king ordered the head to be struck off from a prisoner that Tetteta might fasten it on again.\n\nHaving excused himself from performing this act upon a man, a goose was brought and its head was cut off and laid on one side of the room and the body was placed on the other.\n\nThe sage spake certain words of power whereupon the goose stood up and began to waddle, and the head also began to move towards it; when the head had joined itself again to the body the bird stood up and cackled.\n\nFor the complete hieratic text, transcript and translation, see Erman, Die Märchen des Papyrus Westcar , Berlin, 1890, p.\n\nit, plate 6.] {p.\n\nxvi} The Book of the Dead in the IInd dynasty.\n\nPassing from the region of native Egyptian tradition, we touch firm ground with the evidence derived from the monuments of the IInd dynasty.\n\nA bas-relief preserved at Aix in Provence mentions Âasen and Ankef,[1] two of the priests of Sent or Senta, the fifth king of the IInd dynasty, about B.C.\n\n4000; and a stele at Oxford[2] and another in the Egyptian Museum at Gizeh[3] record the name of a third priest, Shera or Sheri, a \"royal relative\" On the stele at Oxford we have represented the deceased and his wife seated, one on each side of an altar,[4] which is covered with funeral offerings of pious relatives; above, in perpendicular lines of hieroglyphics in relief, are the names of the objects offered,[5] and below is an inscription which reads,[6] \"thousands of loaves of bread, thousands of vases of ale, thousands of linen garments, thousands of changes of wearing apparel, and thousands of oxen.\" Now from this monument it is evident that already in the IInd dynasty a priesthood existed in Egypt which numbered among its members relatives of the royal family, and that a religious system which prescribed as a duty the providing of meat and drink offerings for the dead was also in active operation.\n\nThe offering of specific objects goes far to prove the existence of a ritual or service wherein their signification would be indicated; the coincidence of these words and the prayer for \"thousands of loaves of bread, thousands of vases of ale,\" etc., with the promise, \"Anpu-khent-Amenta shall give thee thy thousands of loaves of bread, thy thousands of vases of ale, thy thousands of vessels [1.\n\nWiedemann, Aegyptische Geschichte , p.\n\n170.\n\nIn a mastaba at Sakkara we have a stele of Sheri, a superintendent of the priests of the ka , whereon the cartouches of Sent and Per-ab-sen both occur.\n\nSee Mariette and Maspero, Les Mastaba de l'ancien Empire , Paris, 1882, p.\n\n92.\n\n2.\n\nSee Lepsius, Auswahl , Bl.\n\n9.\n\n3.\n\nSee Maspero, Guide du Visiteur au Musée de Boulaq , 1883, pp.\n\n31, 32, and 213 (No.\n\n1027)."

