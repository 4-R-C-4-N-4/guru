body = "The priests of Annu at a very early period grouped together the nine greatest gods of Egypt, forming what is called the paut neteru or \"company of the gods,\" or as it is written in the pyramid texts, paut aat , \"the great company of gods\"; the texts also show that there was a second group of nine gods called paut net'eset or \"lesser company of the gods\"; and a third group of nine gods is also known.\n\nWhen all three pauts of gods are addressed they appear as ###.[2] The great cycle of the gods in Annu was composed of the gods Tmu, Shu, Tefnut, Seb, Nut, Osiris, Isis, Set and Nephthys; but, though paut means \" nine,\" the texts do not always limit a paut of the gods to that number, for sometimes the gods amount to twelve, and sometimes, even though the number be nine, other gods are substituted for the original gods of the paut .\n\nWe should naturally expect Ra to stand at the head of the great paut of the gods; but it must be remembered that the chief local god of Annu was Tmu, and, as the priests of that city revised and edited the pyramid texts known to us, they naturally substituted their own form of the god Ra, or at best united him with Ra, and called him Tmu-Ra.\n\nIn the primeval matter, or water, lived the god Tmu, and when he rose for the first time, in the form of the sun, he created the world.\n\nHere at once we have Tmu assimilated with Nu.\n\nA curious passage in the pyramid of Pepi I.\n\nshows that while as yet there was neither [1.\n\nLa Mythologie Égyptienne ( Études , t.\n\nii., p.\n\n237).\n\n2.\n\nSee Pyramid of Teta, l.\n\n307 (Maspero, Recueil de Travaux , t.\n\nv., p.\n\n46).] {p.\n\nxcviii} heaven nor earth, and when neither gods had been born, nor men created, the god Tmu was the father of human beings,[1] even before death came into the world.\n\nThe first act of Tmu was to create from his own body the god Shu and the goddess Tefnut;[2] and afterwards Seb the earth and Nut the sky came into being.\n\nThese were followed by Osiris and Isis, Set and Nephthys.\n\nDr.\n\nBrugsch's version of the origin of the gods as put forth in his last work on the subject[3] is somewhat different.\n\nAccording to him there was in the beginning neither heaven nor earth, and nothing existed except a boundless primeval mass of water which was shrouded in darkness and which contained within itself the germs or beginnings, male and female, of everything which was to be in the future world.\n\nThe divine primeval spirit which formed an essential part of the primeval matter felt within itself the desire to begin the work of creation, and its word woke to life the world, the form and shape of which it had already depicted to itself.\n\nThe first act of creation began with the formation of an egg[4] out of the primeval water, from which broke forth Ra, the immediate cause of all life upon earth.\n\nThe almighty power of the divine spirit embodied itself in its most brilliant form in the rising sun.\n\nWhen the inert mass of primeval matter felt the desire of the primeval spirit to begin the work of creation, it began to move, and the creatures which were to constitute the future world were formed [1.\n\nRecueil de Travaux , t.\n\nviii., p.\n\n104 (l.\n\n664)."

