body = "see also Maspero, Hymne au Nil, publié et traduit d'après les deux textes A Musée Britannique , Paris, 1868.\n\n4to.\n\n2 Pyramid of Unas, l.\n\n219; Pyramid of Teta, ll.\n\n60, 286; Pyramid of Pepi I., ll.\n\n444, 593, etc.\n\n3.\n\nPyramid of Pepi I., l.\n\n593.\n\n4.\n\nRecueil de Travaux , t.\n\niii., p.\n\n905 (l.\n\n219 f.).\n\n5.\n\nIbid.\n\n, t.\n\nvii., p.\n\n150 (ll.\n\n261-63).\n\n6 Ibid.\n\n, t.\n\nv., p.\n\n10 (ll.\n\n59 ff.).\n\n7.\n\n###.\n\nIbid.\n\n, t.\n\nviii., p.\n\n91 (l.\n\n593).\n\n8.\n\nIbid.\n\n, t.\n\nvii., p.\n\n167 (l.\n\n444).\n\n9.\n\nIbid.\n\n, t.\n\nvii., p.\n\n150 (l.\n\n261).] {p.\n\ncxxv} body separately, and they placed them in four jars, each of which was devoted to the protection of one of the children of Horus, i.e.\n\n, to the care of one of the gods of the four cardinal points.\n\nThe god of the north protected the small visceræ, the god of the east the heart and lungs, the god of the south the stomach and large intestines, and the god of the west the liver and gall-bladder.\n\nWith these four gods four goddesses were associated, viz., Nephthys, Neith, Isis, and Selk or Serq.\n\nConnected with the god Horus are a number of mythological beings called Heru shesu [1] (or shemsu , as some read it), who appear already in the pyramid of Unas in connection with Horus and Set in the ceremony of purifying and \"opening the mouth\"; and in the pyramid of Pepi I.\n\nit is they who wash the king and who recite for him the \"Chapter of those who come forth,\" and the \"[Chapter of] those who ascend.\"[2] In the judgment scene in the Book of the Dead, grouped round the pan of the balance which contains the heart of the deceased (see Plate III.), are three beings in human form, who bear the names Shai , Renenet , and Meskhenet .\n\nShai is the personification of destiny, and Renenet fortune; these names are usually found coupled.\n\nShai and Renenet are said to be in the hands of Thoth, the divine intelligence of the gods; and Rameses II.\n\nboasts that he himself is \"lord of Shai and creator of Renenet.\"[3] Shai was originally the deity who \"decreed\" what should happen to a man, and Renenet, as may be seen from the pyramid texts,[4] was the goddess of plenty, good fortune, and the like; subsequently no distinction was made between these deities and the abstract ideas which they represented.\n\nIn the papyrus of Ani, Shai stands by himself near the pillar of the Balance, and Renenet is accompanied by Meskhenet , who appears to be the personification of all the conceptions underlying Shai and Renenet and something else besides.\n\nIn the story of the children of Ra, as related in the Westcar papyrus, we find the goddess Meskhenet mentioned with Isis, Nephthys, Heqet, and the god Khnemu as assisting at the birth of children.\n\n[1.\n\nRecueil de Travaux , t.\n\niii., p.\n\n182 (l.\n\n17).\n\n2.\n\n###, etc.\n\nIbid.\n\n, t.\n\nvii., p.\n\n170 (l.\n\n463).\n\n3.\n\nSee Maspero, Romans et Poésies du Papyrus Harris , No."

