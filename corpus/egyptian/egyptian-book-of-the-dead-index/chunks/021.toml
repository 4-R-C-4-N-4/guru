body = "This text has been treated by Erman ( Z.D.M.G.\n\n, Bd.\n\nXLVI., 1892, p.\n\n574 ff.), who first pointed out the reference to the pigmy in the pyramid texts, and by Maspero in Revue Critique, Paris, 1892, p.\n\n366.\n\n2 See Erman in Aeg.\n\nZeitschrift , Bd.\n\nXXXI., p.\n\n65 ff.\n\n3 On the pigmy see Stanley, Darkest Africa , vol.\n\ni., p.\n\n198; vol.\n\nii., p.\n\n40f; Schweinfurth, Im Herzen von Africa , Bd.\n\nII., Kap.\n\n16, p.\n\n131 ff.\n\nThat the pigmies paid tribute to the Egyptians is certain from the passage \"The pigmies came to him from the lands of the south having things of service for his palace\"; see Dümichen, Geschichte des alten Aegyptens , Berlin, 1887, p.\n\n7.\n\n4.\n\n###.] {p.\n\nxxvi} of the god [Osiris] before his great throne.\n\n.\n\n.\n\n.\n\nThe two beings who are over the throne of the great god proclaim Pepi to be sound and healthy, [therefore] Pepi shall sail in the boat to the beautiful field of the great god, and he shall do therein that which is done by those to whom veneration is due.\"[1] Here clearly we have a reference to the historical fact of the importation of a pigmy from the regions south of Nubia; and the idea which seems to have been uppermost in the mind of him that drafted the text was that as the pigmy pleased the king for whom he was brought in this world, even so might the dead Pepi please the god Osiris[2] in the next world.\n\nAs the pigmy was brought by boat to the king, so might Pepi be brought by boat to the island wherein the god dwelt; as the conditions made by the king were fulfilled by him that brought the pigmy, even so might the conditions made by Osiris concerning the dead be fulfilled by him that transported Pepi to his presence.\n\nThe wording of the passage amply justifies the assumption that this addition was made to the text after the mission of Assa, and during the VIth dynasty.[3] Authorship of the Book of the Dead.\n\nLike other works of a similar nature, however, the pyramid texts afford us no information as to their authorship.\n\nIn the later versions of the Book of the Dead certain chapters[4] are stated to be the work of the god Thoth.\n\nThey certainly belong to that class of literature which the Greeks called \"Hermetic,\"[5] and it is pretty certain that under some group they were included in the list of the forty-two works which, according to Clement of Alexandria,[6] constituted the sacred books of the Egyptians.[7] As Thoth, whom the Greeks called Hermes, is in Egyptian texts styled \"lord of divine books,\"[8] \"scribe of the company of the gods,\"[9] and \"lord of divine speech,\"[10] this ascription is well founded.\n\nThe [1.\n\nFor the hieroglyphic text see Maspero, Recueil de Travaux , t.\n\nvii., pp.\n\n162, 163; and t.\n\nxi., p.\n\nii.\n\n2 Pietschmann thinks ( Aeg.\n\nZeitschrift , Bd.\n\nXXXI., p.\n\n73 f) that the Satyrs, who are referred to by Diodorus (i., XVIII) as the companions and associates of Osiris in Ethiopia, have their origin in the pigmies.\n\n3.\n\nThe whole question of the pigmy in the text of Pepi I.\n\nhas been discussed by Maspero in Recueil de Travaux , t.\n\nxiv., p.\n\n186 ff.\n\n4."

