[content]
body = "Thou didst create the earth, (8) thou didst fashion man, thou didst make the watery abyss of the sky, thou didst form Hapi [the Nile], and thou art the maker of streams and of the (9) great deep, and thou givest life to all that is therein.\n\nThou hast knit (10) together the mountains, thou has made mankind and the beasts of the field, thou hast created the heavens and the earth.\n\nWorshipped be thou whom the goddess Maat embraceth at morn and at eve.\n\nThou dost travel across the (11) sky with heart swelling with joy; the Lake of Testes is at peace.\n\nThe fiend Nak hath fallen and his two arms are cut off.\n\nThe sektet boat receiveth fair winds, and the heart of him that is in his shrine rejoiceth.\n\nThou (12) art crowned with a heavenly form, the Only one, provided [with all things].\n\nRa cometh forth from Nu in triumph.\n\nO thou mighty youth, thou everlasting son, self-begotten, who didst give thyself birth, (13) O thou mighty One, of myriad forms and aspects, king of the world, Prince of Annu, lord of eternity and ruler of the everlasting, the company of the gods rejoice when thou risest and when thou sailest (14) across the sky, O thou who art exalted in the sektet boat.\n\nHomage to thee, O Amen-Ra, thou who dost rest upon Maat, thou who passest over the heaven, and every face seeth thee.\n\nThou dost wax great as thy (15) Majesty doth advance, and thy rays are upon all faces.\n\nThou art unknown and canst not be searched out .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nhis fellow except thyself; thou art (16) the Only One .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n[Men] praise thee in thy name [Ra], and they swear by thee, for thou art lord over them.\n\nThou hast heard (17) with thine ears and thou hast seen with thine eyes.\n\nMillions of years have gone over the world; I cannot tell the number of them, through which thou hast passed.\n\nThy heart hath decreed a day of happiness in thy name [of Ra].\n\nThou dost pass over (18) and travellest through untold spaces of millions and hundreds of thousands of years; thou settest out in peace, and thou steerest thy way across the watery abyss to the place which thou lovest; this thou doest in one (19) little moment of time, and thou dost sink down and makest an end of the hours.\" Osiris, the governor of the palace of the lord of the two lands ( i.e.\n\n, Seti I.), Hunefer, triumphant, saith: (20) Hail my lord, thou that passest through eternity and whose being is everlasting.\n\nHail thou Disk, lord of beams of light, thou risest and thou makest all mankind to live.\n\nGrant thou that I may behold thee at dawn each day.\" IV.\n\nA HYMN OF PRAISE TO RA by Nekht, the royal scribe, captain of soldiers, who saith: \"Homage to thee, O thou glorious Being, thou who art provided [with all things].\n\nO Tmu-Heru-khuti, when thou risest in the horizon of heaven, a cry of joy cometh out of the mouth of all peoples.\n\nO thou beautiful Being, thou dost renew thyself in thy season in the form of the Disk within thy mother Hathor; therefore in every place every heart swelleth with joy at thy rising, for ever."

