body = "In the Journal de Paris , 15 Mars, 1871; and in the Academy , Aug.\n\n1, No.\n\n29, p.\n\n386, 1871.\n\n7.\n\nL'Égyptologie , Série I., tt.\n\ni., ii., Chalons-sur-Saône and Paris, 40., 1876-78.\n\nThis work contains the hieratic text divided into sections for analysis, and accompanied by a hieroglyphic transcript, commentary, etc.\n\n8.\n\nLa Morale Égyptienne quinze siècles avant notre ère--Étude sur le Papyrus de Boulaq , No.\n\n4, Paris, 1892.\n\nThis work contains a more accurate hieroglyphic transcript of the hieratic text, full translation, etc .\n\n9.\n\nMaspero, Lectures Historiques , p.\n\n16; Amélineau, op.\n\ncit.\n\n, p.\n\nix.] {p.\n\nlxxxvii} Views held in the XVIIIth dynasty.\n\nwas probably copied about the XXIInd dynasty; but the work itself may date from the XVIIIth.\n\nThe following are examples of the use of neter :-- 1.\n\nPa neter er seaaaua ren-f The God is for magnifying his name.[1] 2.\n\nxennu en neter betu-tuf pu sehebu senemehu-nek The house of God what it hates is much speaking.\n\nPray thou em ab mert au metet-f nebt amennu ari-f with a loving heart the petitions of which all are in secret.\n\nHe will do xeru-tuk setemu-f a t'et-tuk sesep utennu tu-k thy business, he will hear that which thou sayest and will accept thine offerings.[2] 3.\n\nau tau neter-kua unnu Giveth thy God existence.[3] 4.\n\nPa neter aput pa maa The God will judge the right.[4] 5.\n\nutennu neter-ku sau-tu er na betau-tuf In offering to thy God guard thou against the things which He abominateth.\n\n[1.\n\nAmélineau, La Morale , p.\n\n13.\n\n2.\n\nIbid.\n\n, p.\n\n36.\n\n3 Ibid.\n\n, p.\n\n103.\n\n4 Ibid.\n\n, p.\n\n138.] {p.\n\nlxxxviii} Views held in the XVIIIth dynasty.\n\na ennu maat-k er paif sexeru qentet emtuk O behold with thine eye His plans.\n\nDevote thyself senenti-tu ent ren-f su tat baiu heh en aaru to adore His name.\n\nIt is He who giveth souls to millions of forms, se-aaaua pa enti seaaaua-f ar neter ta pen and He magnifieth whosoever magnifieth him.\n\nNow the God of this earth en pa Suu her xut du nai-f matui is the sun who is the ruler of the horizon, [and] his similitudes are her tep ta tata-tha neter sentra em kai-set emment upon earth is given incense with their food offerings to these daily.[1] 6.\n\nfaau-s aaui-set en pa neter emtuf setemu If she ( i.e.\n\n, thy mother) raiseth her hands to God, he will hear sebehu-set her prayers[2] [and rebuke thee].\n\n7.\n\namma su en pa neter sauu-k su emment en Give thyself to God, keep thou thyself daily for pa neter au tuauu ma qeti pa haru God; and let to-morrow be as to-day.[3] [1.\n\nAmélineau, La Morale , p."

