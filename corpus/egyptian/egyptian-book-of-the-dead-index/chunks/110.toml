body = "Originally four animals or four geese were sacrificed, one to each god, but subsequently East and North, and West and South were paired, and two bulls (or birds) only were sacrificed, one of which was called the Bull of the North,[*] and the other the Bull of the South.\n\nThe custom of four-fold repetition continued to the Ptolemaïc times[+] and even later.\n\nThe priest whose official title was kher heb , recited the prayers, and the sem or setem priest presented the prescribed offerings.\n\nThe rubrical directions are given on the margin for the sake of clearness.\n\n\"O Osiris,[++] all that is hateful in Unas hath been brought unto thee,[1] and all the evil words which have been spoken in his name.\n\nCome, O Thoth, and take them unto Osiris, bring all the evil words which have been spoken and place them in the hollow of thy hand;[2] thou shalt not escape therefrom, thou shalt not escape therefrom.\n\nWhosoever marcheth, marcheth with his ka .\n\nHorus marcheth with his ka , Set marcheth with his ka , Thoth marcheth with[3] his ka , Sep marcheth with his ka , Osiris marcheth with his ka , Khent-maati marcheth with his ka ; and thy tet shall march with thy ka .\n\nHail, Unas, the hand of thy ka is before thee.\n\nHail, Unas, the hand of thy ka is behind thee.\n\nHail, Unas, the leg of thy ka is before thee.\n\nHail, Unas, the leg of thy ka is behind thee.\n\nOsiris Unas, I have given unto thee the Eye of Horus, and thy face is filled therewith, and the perfume thereof spreadeth over thee.\n\nThe libations which are poured[4] out by thy son, which are poured out by Horus, are for thee, O Osiris, and they are for thee O Unas.\n\nI have come, and I have brought unto thee the Eye of Horus that thou mayest refresh thy heart therewith, I have placed it beneath thy feet, and I give unto thee whatsoever hath come forth from thy body that thy heart may not cease to beat through [the want] thereof.[5] Thy voice shall never depart from thee, thy voice shall never depart from thee.\n\n[*.\n\nThis subject has been lucidly discussed by Maspero, Recueil de Travaux, t.\n\nxii., pp.\n\n78, 79.\n\n+.\n\nSee Archæologia , vol.\n\nlii., p.\n\n453, at the foot.\n\n++.\n\nFor the text and French translation, see Maspero, Recueil de Travaux , t.\n\niii., p.\n\n179 ff.\n\n1.\n\nHere water shall be sprinkled.\n\n2.\n\nRepeat four times.\n\n3.\n\nRepeat four times and burn incense.\n\n4.\n\nHere [pour out] fresh water, and [burn] two portions of incense.\n\n5.\n\nRepeat four times.] {p.\n\ncxi} \"[Here is] unguent, [here is] unguent.\n\nOpen thy mouth, O Unas,[1] and taste the taste of the scent which is in the holy habitations."

