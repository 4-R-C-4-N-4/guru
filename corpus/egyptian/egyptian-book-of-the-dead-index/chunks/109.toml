body = "Sacred Texts Egypt Index Previous Next FUNERAL CEREMONIES.\n\nIn illustration of the ceremonies which accompanied the burial of the dead the reader will find extracts from different texts printed in the Appendix on p.\n\n264 ff.\n\nTo these may be added an extract from the curious ritual which was in vogue in the Vth and VIth dynasties, and which commemorated the ceremonies which were performed for the god Osiris.\n\nIt is to be noticed how closely the deceased is identified with Osiris, the type of incorruptibility.\n\nOsiris takes upon himself \"all that is hateful\" in the dead : that is, he adopts the burden of his sins; and the dead is purified by the typical sprinkling of water.\n\nWhile the gods are only accompanied by their ka 's, the deceased, in right of his identification with a higher power, is accompanied by his Tet[1] also, that is, by his Osiris.\n\nThroughout the ceremony, the Eye of Horus,[2] which is represented by various substances, plays a prominent part, for it is that which gives vigour to the heart of the dead and leads him to the god.\n\nThat portion of the ceremony which was believed to procure the unlocking of the jaws and the opening of the mouth of the deceased, or of the statue which sometimes represented him, was performed after the purification by water and incense had been effected; and hereby was he enabled to partake of the meat and drink offerings, wherein the friends and relatives also participated, in order that they might cement and seal their mystic unity with the dead and with the god with whom he was identified.[3] [1.\n\nSome fifty years ago, M.\n\nReuvens expressed his belief that the ### represented the four quarters of the world, and according to M.\n\nMaspero it unites in itself the four pillars which support the sky and Osiris, whom they preserve from chaos; see Recueil de Travaux , t.\n\nxii., p.\n\n79, note 3; and Études de Mythologie , t.\n\nii., p.\n\n359.\n\n2.\n\nOn the eyes of Horus, see Lefébure, Le Mythe Osirien--Les Yeux d'Horus , Paris, 1874; and Grébaut, Les deux yeux du Disque Solaire ( Recueil de Travaux t.\n\ni., pp.\n\n72, 87, 112-131).\n\n3.\n\nTo discuss the origin and development of animal sacrifice among the early Egyptians lies outside the scope of this work.\n\nFor information on the significance of sacrifice among the Semites, in whose customs many originally Egyptian ideas probably survived, see Robertson Smith, Religion of the Semites , p.\n\n294 ff.\n\nOn the origin of sacrificial acts, see Max Müller, Natural Religion , London, 1889, p.\n\n184; and E.\n\nB.\n\nTylor, Primitive Culture , vol.\n\nii., p.\n\n340.\n\nWhether the Egyptians regarded the sacrifice of bulls, geese, etc., at the tomb as expiatory offerings, can hardly yet be decided.] {p.\n\ncxxxix} Certain formulae were directed to be repeated four times: a direction which takes us back to the time when the Egyptians first divided the world into four parts, each corresponding to one of the four pillars which held up the sky, that is to say, to one of the four cardinal points, East, South, West, and North, presided over by a special god.\n\nThe deceased sought to obtain the assistance of each of the four gods of the cardinal points, and to have the right to roam about in his district; hence the formula was repeated four times."

