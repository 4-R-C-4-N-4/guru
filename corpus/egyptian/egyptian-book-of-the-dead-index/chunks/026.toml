body = "The vignettes too are additions to the work; but, although they depict scenes in the life beyond the grave, they do not seem to form a connected series, and it is doubtful if they are arranged on any definite plan.\n\nA general idea of the contents of this version may be gathered from the following list of chapters[1]:-- Theban version: list of chapters.\n\nChapter I.\n\nHere begin the Chapters of \"Coming forth by day,\" and of the songs of praise and glorifying,[2] and of coming forth from, and going into, the underworld.[3] Vignette: The funeral procession from the house of the dead to the tomb.\n\nChapter I B .\n\nThe Chapter of making the mummy to go into the tuat [4] on the day of the burial.[5] Vignette: Anubis standing by the bier upon which the mummy of the deceased is laid.\n\nChapter II.\n\n[The Chapter of] coming forth by day and of living after death.\n\nVignette: A man standing, holding a staff.\n\nChapter III.* Another Chapter like unto it ( i.e.\n\n, like Chapter II).[6] This Chapter has no vignette.\n\nChapter IV.* Another Chapter of passing along the way over the earth.\n\nThis Chapter has no vignette.\n\n[1.\n\nThe various chapters of the Book of the Dead were numbered by Lepsius in his edition of tile Turin papyrus in 1842.\n\nThis papyrus, however, is a product of the Ptolemaic period, and contains a number of chapters which are wanting in the Theban version.\n\nFor convenience, Lepsius' numbers are retained, and the chapters which belong to the Saïte version are indicated by an asterisk.\n\nFor the hieroglyphic text see Naville, Einleitung, p.\n\n193 ff.\n\n2.\n\nAnother title reads:--\"The Chapter of going in to the divine chiefs of Osiris on the day of the burial, and of going in after coming forth.\" This chapter had to be recited on the day of the burial.\n\n3.\n\nneter xert , the commonest name for the tomb.\n\n4.\n\nThe Egyptian underworld.\n\n5.\n\nsam ta , \"the union with the earth.\" 6.\n\nIn some papyri Chapters II.\n\nand III.\n\nare united and have only one title; see Naville, Todtenbuch , Bd.\n\nI., B1.\n\n6.] {p.\n\nxxxii} Theban version: list of chapters.\n\nChapter V.\n\nThe Chapter of not allowing the deceased to do work in the underworld.\n\nVignette: The deceased kneeling on one knee.\n\nChapter VI.\n\nThe Chapter of making ushabtiu figures do work for a man in the underworld.\n\nVignette: An ushabti figure Chapter VII.\n\nThe Chapter of passing over the back of Apep, the evil one.\n\nVignette: The deceased spearing a serpent.\n\nChapter VIII.\n\nAnother Chapter of the tuat , and of coming forth by day.\n\nVignette: The deceased kneeling before a ram.\n\nChapter IX.\n\nThe Chapter of passing through the tuat.\n\nVignette: The deceased kneeling before a ram.\n\nChapter X.\n\n(This Chapter is now known as Chapter XLVIII.) Chapter XI.* The Chapter of coming forth against his enemies in the underworld.\n\nThis Chapter has no vignette.\n\nChapter XII.\n\nAnother Chapter of going into, and coming forth from, the underworld.\n\nThis Chapter has no vignette.\n\nChapter XIII.\n\nThe Chapter of going into, and of coming forth, from Amentet.\n\nThis Chapter has no vignette.\n\nChapter XIV.\n\nThe Chapter of driving away shame from the heart of the deceased.\n\nThis Chapter has no vignette.\n\nChapter XV.\n\nA Hymn of praise to Ra when he riseth in the eastern horizon of heaven.\n\nVignette: The deceased adoring Ra.\n\nChapter XV B .\n\n1."

