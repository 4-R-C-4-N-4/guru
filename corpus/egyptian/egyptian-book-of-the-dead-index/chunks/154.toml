body = "Sacred Texts Egypt Index Previous Next PLATES VII.-X.\n\nVignette : The vignette of these plates, forming one composition, runs along the top of the text.\n\nThe subjects are:- Plate VII.\n\ni.\n\nAni and his wife in the seh hall;[1] he is moving a piece on a draught-board [2] (to illustrate lines 3 and 4 of the text).\n\n2.\n\nThe souls of Ani and his wife standing upon a pylon-shaped building.\n\nThe hieroglyphics by the side of Ani's soul read ba en Ausar , \"the soul of Osiris.\" [1.\n\nIn the papyrus of Hunefer the first scene in this vignette is composed of Amenta, and the signs ### and ###, emblematic of food and drink.\n\nOn each side is a figure of the deceased, but that on the left faces to the left and that on the right faces to the right.\n\n(1) Compare also the variant from the papyrus of Mut-em-uaa.\n\n(2) 2.\n\nSee page 281, note i.] {p.\n\n277} 3.\n\nA table of offerings, upon which are laid a libation vase, plants, and lotus flowers[1].\n\n4.\n\nTwo lions seated back to back and supporting the horizon, over which extends the sky.\n\nThe lion on the right is called Sef , i.e.\n\n, \"Yesterday,\" and that on the left Tuau , i.e.\n\n, \"Tomorrow\" (to illustrate lines 13-16).\n\n5.\n\nThe bennu bird,[2] and a table of offerings (to illustrate lines 26-30).\n\n6.\n\nThe mummy of Ani lying on a bier within a funereal shrine; the head and foot are Nephthys and Isis in the form of hawks.\n\nBeneath the bier are vases painted to imitate variegated marble or glass,[3] a funereal box, Ani's palette, etc.[4] Plate VIII.\n\nI.[5] The god Heh \"Millions of years,\" wearing the emblem of \"years\" ( upon his head, and holding a similar object in his right hand; he is [1.\n\nIn many papyri a figure of the deceased, kneeling in adoration before the lions supporting the horizon, takes the place of the table of offerings.\n\nHere the artist probably intended to represent the souls of Ani and his wife making these offerings to the lion-gods.\n\n2 The name of the sanctuary in which the bennu bird was worshipped was Het-bennu.\n\nGreek writers called this bird the phoenix, and the Egyptians considered it as a symbol of Osiris.\n\nIn a text quoted by Brugsch ( Wörterbuch , p.\n\n397), it is said to have created itself.\n\nThe bennu was also worshipped at Diospolis Parva in Upper Egypt; and it was asserted that the thigh of Osiris was preserved in one of its sanctuaries, and his phallus in another.\n\n3 For examples of such vases see Nos.\n\n4875, 4879, 4887, 9529, in the Fourth Egyptian Room.\n\n4 In many papyri the soul of the deceased in the form of a human-headed bird is seen hovering over the dead body.\n\n(Fig.\n\n1.) 6 The papyrus of Ani omits the two uræi which are referred to in lines 33-36.\n\nAccording to the papyrus of Hunefer (British Museum papyrus No.\n\n9901) they represent the North and the South.\n\n(Fig.\n\n2.) ] {p.\n\n278} kneeling and extends his left hand over a pool (?) in which is an eye (to illustrate line 46).\n\n2."

