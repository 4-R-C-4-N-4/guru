body = "I have brought unto (9) his nostrils eternal life.\n\nI am the son of Osiris, I have made the way, I have passed thereover into Neter-khert.\" PLATE XII.-- Vignette V.: The fifth Arit, guarded by three gods; the first with the head of a hawk, the second the head of a man, and the third the head of a snake.\n\nEach holds a knife.\n\n[1.\n\nI.e.\n\n, \"Eater of his own filth.\" 2.\n\nI.e.\n\n, \"Making to lift up his face.\" 3.\n\nI.e.\n\n, \"Great One.\" 4.\n\nI.e.\n\n, Horus and Set.\n\n5.\n\nVar.\n\n###.\n\nSee the end of the speech of the Osiris at the first arit .\n\n6.\n\nI.e.\n\n, \"Repulsing the face, great of speech.\" 7 Var.\n\n### 8.\n\nI.e.\n\n, \"Repulser of the crocodile.\"] {p.\n\n294} Text: (1) THE FIFTH ARIT.\n\nThe (2) name of the doorkeeper is Ankh-f-em-fent;[1] the name of the (3) watcher is Shabu; the name of the herald is Teb-hra-keha-kheft.[2] Saith Osiris, the scribe Ani, triumphant, [when he cometh to this Arit]: I have brought unto thee the bones of thy jaws in Re-stau, I have brought thee thy backbone in Annu, (7) gathering together all thy members there.\n\n(8) I have driven back Apep for thee.\n\nI have poured water upon the wounds; I have made a path among you.\n\nI am the Ancient One among the gods.\n\nI have[3] made the offering of Osiris, who hath triumphed with victory, gathering his bones and bringing together all his limbs.\" Vignette VI.: The sixth Arit, guarded by three gods; the first with the head of a jackal, and the second and third the head of a dog.\n\nThe first holds an ear of corn (?), and each of the others a knife.\n\nText: (I) THE SIXTH ARIT.\n\n(2) The name of the doorkeeper is Atek-au-kehaq-kheru;[4] the name of the (4) watcher is An-hri; (5) the name of the herald is Ates-hra.\n\nSaith Osiris, the scribe Ani, [when he cometh to this Arit]: \"I have come (7) daily, I have come daily.\n\nI have made the way; I have passed along that which was created by Anubis.\n\nI am the lord of the (8) urerit crown .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nmagical words.\n\nI, the avenger of right and truth, have avenged his eye.\n\nI have swathed the eye of Osiris, [I have] made the way]; Osiris Ani hath passed along [it] with you .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nVignette VII.: The seventh Arit, guarded by three gods; the first with the head of a hare, the second the head of a lion, and the third the head of a man.\n\nThe first and second hold a knife, and the third an ear of corn (?).\n\nText: (1) THE SEVENTH ARIT.\n\nThe name of (2) the doorkeeper is Sekhem-Matenu-sen;[5] the name Of (4) the watcher is Aa-maa-kheru,[6] (5) and the name of the herald is Khesef-khemi."

