body = "Sacred Texts Egypt Index Previous Next PLATE XVII.\n\nVignette: Ani standing in adoration before three gods, each of whom holds a sceptre in his left hand, and the symbol of life in his right.\n\n[1.\n\nAdding thest ftu , from the papyrus of Nebseni.\n\n2.\n\nVar.\n\n### axemu .\n\nthis word see Brugsch, Wörterbuch (Suppl.), p.\n\n279.] {p.\n\n317} Text [CHAPTER XCIII.]: (I) THE CHAPTER OF NOT LETTING A MAN PASS OVER TO THE EAST IN THE UNDERWORLD.\n\nSaith Osiris Ani: \"Hail, manhood of (2) Ra, which advanceth and beateth down opposition; things which have been without movement for millions of years come into being through the god Baba.\n\nHereby am I made stronger than (3) the strong, and hereby have I more power than they who are mighty.\n\nAnd therefore neither shall I be borne away nor carried by force to the East, to take part in the festivals of the fiends; (4) nor shall there [be given unto me] cruel gashes with knives, nor shall I be shut in on every side, nor gored by the horns [of the god Khepera]\".\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.[1] Vignette: Ani adoring a god in a boat whose head is turned face backwards.\n\nText [CHAPTER XCIII A .]: ANOTHER CHAPTER.[2] [Saith Osiris Ani]: \"So then shall no evil things be done unto me by the fiends, neither shall I (6) be gored by the horns [of Khepera]; and the manhood of Ra, which is the head of Osiris, shall not be swallowed up.\n\nBehold me, (7) I enter into my homestead, and I reap the harvest.\n\nThe gods speak with me.\n\n(8) Gore thou not them, O Ra-khepera.\n\nIn very truth sickness shall not arise in the eye of Tmu nor shall it (9) be destroyed.\n\nLet me be brought to an end, may I not be carried into the East to take part in the festivals of the fiends who are my enemies (10); may no cruel gashes be made in me.\n\nI, Osiris, the scribe Ani, the teller of the divine offerings of all the gods, triumphant with happy victory, the lord to be revered.\n\nam not carried away into the East.\" Text [CHAPTER XLIII.]: (1) THE CHAPTER OF NOT LETTING THE HEAD OF A MAN BE CUT OFF FROM HIM IN THE UNDERWORLD.\n\nSaith Osiris Ani: (2) \"I am the great One, son of the great One; I am Fire, the son of Fire, to whom was (3) given his head after it had been cut off.\n\nThe head of Osiris was not carried away from him; let not the head of Osiris Ani (4) be carried away from him.\n\nI have knit together my bones, I have made myself whole and sound; I have become young once more; I am Osiris, the Lord of eternity.\" Vignette: The mummy of Ani lying on a bier; above is his soul in the form of a human-headed bird, holding shen , the emblem of eternity, in its claws.\n\nAt the head and foot stands an incense burner with fire in it.\n\n[1.\n\nThe text of the rest of this chapter is corrupt.\n\n2.\n\nIn other early papyri these two chapters form one; the division probably arose from a blunder on the part of the scribe.] {p."

