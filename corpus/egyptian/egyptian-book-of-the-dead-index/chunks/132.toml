body = "Erpat is a very ancient word, and was probably in use in Egypt before suten , the common word for \"king.\" For a discussion on this point see Maspero, Un Manuel de Hiérarchie Égyptienne , p.\n\n15 ff.; Brugsch, Aegyptologie , p.\n\n210.\n\n2 Osiris, the night sun, was the son of Ra, and the father and son of Horus.\n\nHe is always represented as a mummy holding in his hands the sceptre ### crook ### and flail ###.\n\nSee Lanzone, Dizionario , p.\n\n690 ff.; Wiedemann, Religion , p.\n\n123 ff.; Brugsch, Religion und Mythologie , p.\n\n611 ff.] {p.\n\n254} in the mountain of Amenta be content, for thy son Horus is stablished upon thy throne.\n\n(4) Thou art crowned lord of Tattu[1] and ruler in Abtu.[2] Through thee the world waxeth green (5) in triumph before the might of Neb-er-tcher.[3] He leadeth in his train that which is and that which is not yet, in his name (6) Ta-her-seta-nef;[4] he toweth along the earth in triumph in his name Seker.[6] He is (7) exceeding mighty and most terrible in his name Osiris.\n\nHe endureth for ever and for ever in his name Un-nefer.[6] (8) Homage to thee, King of kings, Lord of lords, Prince of princes, who from the womb of Nut hast possessed the world (9) and hast ruled all lands and Akert.[7] Thy body is of gold, thy head is of azure, and emerald light encircleth thee.\n\nO An[8] of millions of years, (10) all-pervading with thy body and [1.\n\nThe name Tettet or Tattu was borne by two towns in Lower Egypt: Busiris, the metropolis of the 9th nome, and Mendes, the metropolis of the 16th nome.\n\nSee Brugsch, Dict.\n\nGéog ., p.\n\n978, and De Rougé, Géographie Ancienne de la Basse Égypte , p.\n\n58.\n\n2.\n\nBoth Busiris and Abydos claimed to be the resting place of the body of Osiris.\n\n3.\n\nA name of Osiris when his scattered limbs had been brought together and built up again into a body by Isis and Nephthys: see Lanzone, Dizionario , p.\n\n714.\n\nThe name means \"lord of entirety.\" 4.\n\nI.e.\n\n, The one who draws the world.\n\n5.\n\nSeker is, like Ptah, Osiris, and Tenen, a form of the night sun.\n\nAt the festival of this god, the Hennu boat, a symbol of the god Seker of Memphis, was drawn round the sanctuary at dawn at the moment when the sun casts its golden rays upon the earth.\n\nFor a list of Seker's shrines, see Lanzone, Dizionario , pp.\n\n1117-1119.\n\nSee also Wiedemann, Religion , p.\n\n75; Pierret, Panthéon , p.\n\n66.\n\n6.\n\nA name of Osiris which, as an important name, is written at times in a cartouche, e.g.\n\n, ###, ###.\n\nIt is usually explained to mean \"the Good Being,\" although it has been suggested ### ( Proc.\n\nSoc.\n\nBibl.\n\nArch.\n\n, 1886) that \"beautiful hare\" is its signification.\n\n7.\n\nA general term for a necropolis."

