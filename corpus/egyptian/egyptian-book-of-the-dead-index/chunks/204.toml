[content]
body = "I, Osiris Ani, triumphant, come even as one who is equipped for the journey.\n\nThou raisest up [right and truth] (2 1) for those who love them.\n\nI am a shining one clothed in power, mightier than any other shining one.\" Next: Plate XXV."

