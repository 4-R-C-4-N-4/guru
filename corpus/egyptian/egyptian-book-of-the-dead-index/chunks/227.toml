[content]
body = "My reins (8) are the reins of the lords of Kher-aba.\n\nMy breast is the breast of the awful and terrible One.\n\nMy belly and my backbone are the belly and backbone of Sekhet.\n\nMy buttocks (9) are the buttocks of [1.\n\nFor the text, see Naville, Todtenbuch , Bd.\n\nI., Bl.\n\n56.\n\n2.\n\nVarr.\n\nKhentet-khas, Khentet-khaset, and Khenti-sekhem.] the eye of Horus.\n\nMy hips and thighs are the hips and thighs of Nut.\n\nMy feet are the feet of Ptah.\n\nMy fingers and leg-bones arc the fingers and leg-bones of the living (10) uræi.\n\nThere is no member of my body which is not the member of some god.\n\nThoth shieldeth my body altogether, and I am [like] unto Ra every day.\n\n(11) None shall seize me by mine arms; none shall drag me away by my hand.\n\nAnd there shall do me hurt neither men, nor gods, nor sainted dead, nor they who have perished, nor any one of those of olden times, (12) nor any mortal, nor human being.\n\nI come forth and advance, and my name is unknown.\n\nI am yesterday, and my (13) name is 'Seer of millions of years.' I travel, I travel along the path of Horus the judge.\n\nI am the lord of eternity; I feel and I have power to perceive.\n\nI am the lord of the red crown.\n\nI am the Sun's eye, yea, (14) I am in my egg, in my egg.\n\nIt is granted unto me to live therewith.\n\nI am in the Sun's eye, when it closeth, and I live by the strength thereof I come forth and I shine; (15) I enter in and I come to life.\n\nI am in the Sun's eye, my seat is on my throne, and I sit thereon within the eye.\n\nI am Horus who pass through millions of years.\n\n(16) I have governed my throne and I rule it by the words of my mouth; and whether [I] speak or whether [I] keep silence, I keep the balance even.\n\nVerily my forms are changed.\n\nI am the (17) god Unen, from season unto season; what is mine is within me.\n\nI am the only One born of an only One, who goeth round about in his course; (18) 1 am within the eye of the Sun.\n\nThings are not evil nor hostile unto me, nor are they against me.\n\nI open the door of heaven.\n\nI govern my throne, and I give [new] birth to myself on this day.\n\n[I am] not the Child who trod (19) the path of yesterday, but I am 'To-day' for untold nations.\n\nIt is I who make you strong for millions of years, whether ye be in the heaven, or (20) in the earth, or in the south, or in the north, or in the west or in the east; fear of me is in your hearts.\n\nI am the pure one who dwell within the sacred eye.\n\nI shall not die (21) again.\n\nMy hour resteth with you, but my forms are within my dwelling-place.\n\nI am he who is unknown, and the gods with rose-bright countenances are (22) with me.\n\nI am the unveiled one.\n\nThe season wherein [the god] created heaven for me and enlarged the bounds of the earth and made great the progeny thereof cannot be found Out.\n\n(23) My name setteth itself apart and removeth from all evil things through the words which I speak unto you."

