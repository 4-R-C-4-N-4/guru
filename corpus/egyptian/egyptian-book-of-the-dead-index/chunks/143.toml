[content]
body = "In the upper part of it the deceased is shown adoring Osiris, and below is the legend,[3] \"Hail, Osiris, the chief of Amenta, the lord of eternity, [1.\n\nThis instrument is called ### ur hekau , and is made of a sinuous piece of wood, one end of which is in the form of a ram's head surmounted by a uræus (Fig.\n\n1).\n\n2.\n\nIn the Neb-seni papyrus the \"Guardian of the Scale\" opens the mouth of the deceased (Fig.\n\n2).\n\n3.\n\n###.] {p.\n\n265} spreading out in everlastingness, lord of adorations, chief of the company of his gods; and hail, Anubis [dweller] in the tomb, great god, chief of the holy dwelling.\n\nMay they grant that I may go into and come out from the underworld, that I may follow Osiris in all his festivals at the beginning of the year, that I may receive cakes, and that I may go forth into the presence of [Osiris]; I, the double ( ka ) of Osiris, the greatly favoured of his god, Hu-nefer.\" In the upper register of this section of the papyrus is the text of the \"Chapter of opening the mouth of the statue of Osiris.\" The complete scene, including this stele and vignette, appears in the tomb of Pe-ta-Amen-Apt.\n\nIn the vignette of the first chapter of the Book of the Dead in the papyrus of Neb-qet[1] the soul of the deceased is represented descending the steps of the tomb to carry food to its mummy in the underground chamber (Fig.\n\n2).\n\nThe ceremonies[2] which took place at the door of the tomb in an Egyptian funeral are of considerable interest.\n\nThe priest called Kher-heb , holding the Sem priest by the arm, gives directions for the slaughter of \"a bull of the South.\" The slaughterer, standing on the bull, cuts off a fore-leg (Fig.\n\n3) and takes out the heart.\n\nA woman, called the Tcherauur , who personifies Isis, then whispers in the deceased's ear, \"Behold, thy lips are set in order for thee, so that thy mouth may be opened.\" Next, an antelope[3] and a duck[4] [1.\n\nDevéria and Pierret, Papyrus Funéraire de Neb-set , plate 3.\n\n2.\n\nThe following description of them is based upon the chapters on this subject in Dümichen, Der Grabpalast des Patuamenap , Abth.\n\nii I, plates x ff., pp.\n\n3 ff.\n\n3.\n\n### ari .\n\n4.\n\n### smennu .] {p.\n\n266} are brought by order of the Kher-heb , and their heads are cut off.[1] The Kher-heb then addresses the Sem priest: \"I have seized them for thee, I have brought unto thee thine enemies.\n\nHis hands bring his head [as] his gift.\n\nI have slain them for thee, O Tmu; let not his enemies rise up against this god.\" The slaughterer then presents the thigh to the Kher-heb , and the heart to an official whose title was Smer , and all three then \"place the thigh and the heart upon the ground before this god\" ( i.e.\n\n, Osiris).\n\nThe Kher-heb then says to the deceased, represented by his mummy or statue: I have brought unto thee the thigh (Fig.\n\n4) as the Eye of Horus.\n\nI have brought unto thee the heart; let there be no rising up against this god.\n\nI have brought unto thee the antelope, his head is cut off; I have brought unto thee the duck, his head is cut off.\" Here the sacrifice ends."

