body = "The Chapter of going into the great house ( i.e.\n\n, tomb).\n\nVignette: The soul of the deceased standing before a tomb.\n\nChapter CXXIV.\n\nThe Chapter of going in to the princes of Osiris.\n\nVignette: The deceased adoring Mestha, Hapi, Tuamautef and Qebbsennuf.\n\nChapter CXXV.\n\nThe words which are to be uttered by the deceased when he cometh to the hall of Maati, which separateth him from his sins, and which maketh him to see God, the Lord of mankind.\n\nVignette: The hall of Maati, in which the heart of the deceased is being weighed in a balance in the presence of the great gods.\n\nChapter CXXVI.\n\n[Without title.] Vignette: A lake of fire, at each corner of which sits an ape.\n\nChapter CXXVII A .\n\nThe book of the praise of the gods of the qerti .\n\nThis Chapter has no vignette.\n\nChapter CXXVII B .\n\nThe Chapter of the words to be spoken on going to the chiefs of Osiris, and of the praise of the gods who are leaders in the tuat .\n\nThis Chapter has no vignette.\n\nChapter CXXVIII.* The Chapter of praising Osiris.\n\nVignette: The deceased adoring three deities.\n\nChapter CXXIX.\n\n(This Chapter in now known as Chapter C.) Chapter CXXX.\n\nThe Chapter of making perfect the khu .\n\nVignette: The deceased standing between two boats.\n\nChapter CXXXI.* The Chapter of making a man go into heaven to the side of Ra.\n\nThis Chapter has no vignette.\n\nChapter CXXXII.\n\nThe Chapter of making a man to go round about to see his house.\n\nVignette: A man standing before a house or tomb.\n\nChapter CXXXIII.\n\nThe Chapter of making perfect the khu in the under world in the presence of the great company of the gods.\n\nVignette: The deceased adoring Ra, seated in a boat.\n\nChapter CXXXIV.\n\nThe Chapter of entering into the boat of Ra, and of being among those who are in his train.\n\nVignette: The deceased adoring Shu, Tefnut, Seb, Nut, Osiris, Isis, Horus, Hathor.\n\n{p.\n\nxlii} Theban version: list of chapters.\n\nChapter CXXXV.* Another Chapter, which is to be recited at the waxing of the moon [each] month.\n\nThis Chapter has no vignette.\n\nChapter CXXXVI A .\n\nThe Chapter of sailing in the boat of Ra.\n\nVignette: The deceased standing with hands raised in adoration.\n\nChapter CXXXVI B .\n\nThe Chapter of sailing in the great boat of Ra, to pass round the fiery orbit of the sun.\n\nThis Chapter has no vignette.\n\nChapter CXXXVII A .\n\nThe Chapter of kindling the fire which is to be made in the underworld.\n\nThis Chapter has no vignette.\n\nChapter CXXXVII B .\n\nThe Chapter of the deceased kindling the fire.\n\nVignette: The deceased seated, kindling a flame.\n\nChapter CXXXVIII.\n\nThe Chapter of making the deceased to enter into Abydos.\n\nVignette: The deceased adoring the standard ###.\n\nChapter CXXXIX.\n\n(This Chapter is now known as Chapter CXXIII.) Chapter CXL.* The Book which is to be recited in the second month of pert , when the utchat is full in the second month of pert .\n\nVignette: The deceased adoring Anpu, the utchat , and Ra.\n\nChapters CXLI-CXLIII.\n\nThe Book which is to be recited by a man for his father and for his son at the festivals of Amentet.\n\nIt will make him perfect before Ra and before the gods, and he shall dwell with them."

