[content]
body = "Next, he was delivered over to merciless tormentors, who tortured him in a place where there were multitudes of savage beasts; and, when he had been cast into the place of outer darkness, he saw a ditch more than two hundred feet deep filled with reptiles, each of which had seven heads, and all their bodies were covered as it were with scorpions.\n\nHere also were serpents, the very sight of which terrified the beholder, and to one of them which had teeth like iron stakes was the wretched man given to be devoured; for five days in each week the serpent crushed him with his teeth, but on the Saturday and Sunday there was respite.\n\nAnother picture of the torments of Hades is given in the Martyrdom of Macarius of Antioch, wherein the saint, having restored to life a man who had been dead six hours, learned that when he was about to die he was surrounded by fiends, some of whom had the faces of dragons, others of lions, others of crocodiles, and others of bears.\n\nThey tore his soul from his body with great violence, and they fled with it over a mighty river of fire, in which they plunged it to a depth of four hundred cubits; then they took it out and set it before the judge of Truth.\n\nAfter hearing the sentence of the judge the fiends took it to a place of outer darkness where no [1.\n\nSee Amélineau, Monuments pour servir à l'Histoire de Égypte Chrétienne , p.\n\n167.\n\n2 ###.\n\n3 See Amélineau, Étude sur le Christianisme en Égypte au Septième Siècle , Paris, 1887, p.\n\n147.] {p.\n\ncxxxii} light came, and they cast it into the cold where there was gnashing of teeth.\n\nThere it beheld a snake which never slept, with a head like that of a crocodile, and which was surrounded by reptiles which cast souls before it to be devoured, when the snake's mouth was full it allowed the other reptiles to eat, and though they rent the soul in pieces it did not die.\n\nAfter this the soul was carried into Amenta for ever.\n\nThe martyr Macarius suffered in the reign of Diocletian, and the MS.\n\nfrom which the above extract is taken was copied in the year of the Martyrs 634 = A.D.\n\n918.\n\nThus, the old heathen ideas of the Egyptian Tuat were applied to the construction of the Coptic Hell.\n\n[1.\n\nSee Hyvernat, les Actes des Martyrs de Égypte , Paris, 1886, pp.\n\n56, 57.] THE PRINCIPAL GEOGRAPHICAL AND MYTHOLOGICAL PLACES IN THE BOOK OF THE DEAD.\n\nAbtu , the Abydos of the Greeks (Strabo, XVII., i., 42), the capital of the eighth nome of Upper Egypt."

