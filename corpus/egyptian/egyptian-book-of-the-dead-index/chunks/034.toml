body = "Chapter CLXV.* The Chapter of arriving in port, of not becoming unseen, and of making the body to germinate, and of satisfying it with the water of heaven.\n\nVignette: The god Min or Amsu with beetle's body, etc.\n\nChapter CLXVI.\n\nThe Chapter of the pillow.\n\nVignette: A pillow.\n\nChapter CLXVII.\n\nThe Chapter of bringing the utchat .\n\nThis Chapter has no vignette.\n\nChapter CLXVIII A .\n\n[Without title.] Vignette: The boats of the sun, etc.\n\nChapter CLXVIII B .\n\n[Without title.] Vignette: Men pouring libations, gods, etc.\n\nChapter CLXIX.\n\nThe Chapter of setting up the offering chamber.\n\nThis Chapter has no vignette.\n\nChapter CLXX.\n\nThe Chapter of the roof of the offering chamber.\n\nThis Chapter has no vignette.\n\nChapter CLXXI.\n\nThe Chapter of tying the abu .\n\nThis Chapter has no vignette.\n\nChapter CLXXII.\n\nHere begin the praises which are to be recited in the underworld.\n\n{p.\n\nxlv} Theban version: list of chapters.\n\nThis Chapter has no vignette.\n\nChapter CLXXIII.\n\nAddresses by Horus to his father.\n\nVignette: The deceased adoring Osiris.\n\nChapter CLXXIV.\n\nThe Chapter of causing the khu to come forth from the great gate of heaven.\n\nVignette: The deceased coming forth from a door.\n\nChapter CLXXV.\n\nThe Chapter of not dying a second time in the underworld.\n\nVignette: The deceased adoring an ibis-headed god.\n\nChapter CLXXVI.\n\nThe Chapter of not dying a second time in the underworld.\n\nThis Chapter has no vignette.\n\nChapter CLXXVII.\n\nThe Chapter of raising up the khu , and of making the soul to live in the underworld.\n\nThis Chapter has no vignette.\n\nChapter CLXXVIII.\n\nThe Chapter of raising up the body, of making the eyes to see, of making the ears to hear, of setting firm the head and of giving it its powers.\n\nThis Chapter has no Vignette.\n\nChapter CLXXIX.\n\nThe Chapter of coming forth from yesterday, of coming forth by day, and of praying with the hands.\n\nThis Chapter has no vignette.\n\nChapter CLXXX.\n\nThe Chapter of coming forth by day, of praising Ra in Amentet, and of ascribing praise unto those who are in the tuat.\n\nVignette: The deceased adoring Ra.\n\nChapter CLXXXI.\n\nThe Chapter of going in to the divine chiefs of Osiris who are the leaders in the tuat .\n\nVignette: The deceased adoring Osiris, etc.\n\nChapter CLXXXII.\n\nThe Book of stablishing the backbone of Osiris, of giving breath to him whose heart is still, and of the repulse of the enemies of Osiris by Thoth.\n\nVignette: The deceased lying on a bier in a funeral chest, surrounded by various gods.\n\nChapter CLXXXIII.\n\nA hymn of praise to Osiris; ascribing to him glory, and to Un-nefer adoration.\n\nVignettes: The deceased, with hands raised in adoration, and the god Thoth.\n\nChapter CLXXXIV.\n\nThe Chapter of being with Osiris.\n\nVignette: The deceased standing by the side of Osiris.\n\n{p.\n\nxlvi} Theban version: list of chapters.\n\nChapter CLXXXV.\n\nThe ascription of praise to Osiris, and of adoration to the everlasting lord.\n\nVignette: The deceased making adoration to Osiris.\n\nChapter CLXXXVI.\n\nA hymn of praise to Hathor, mistress of Amentet, and to Meh-urt.\n\nVignette: The deceased approaching the mountain of the dead, from which appears the goddess Hathor.\n\nThe version akin to the Theban.\n\nPalæography."

