body = "Every khu and every god stretcheth out his hand unto this Pepi when he cometh forth into heaven by the Ladder of God .\n\n.\n\n.\n\n.\n\nthat which he seeth and that which he heareth make him wise, and serve as food for him when he cometh forth into heaven by the Ladder of God.\n\nPepi riseth up like the uræus which is on the brow of Set, and every khu and every god stretcheth out his hand unto Pepi on the Ladder.\n\nPepi hath gathered together his bones, he hath collected his flesh, and Pepi hath gone straightway into heaven by means of the two fingers of the god who is the Lord of the Ladder.\"[3] Elsewhere we are told that Khonsu and Set \"carry the Ladder of Pepi, and they set it up.\" When the Osiris of a man has entered into heaven as a living soul,[4] he is regarded as one of those who \"have eaten the eye of Horus he walks among [1.\n\nRecueil de Travaux , t.\n\nv., p.\n\n190, ll.\n\n181, 182.\n\n2.\n\nIbid.\n\n, t.\n\niv., p.\n\n70, l.\n\n579 ff 3..\n\nÉtudes de Mythologie et d'Archéologie , t.\n\ni., p.\n\n344, note 1.\n\n4 ###.\n\nRecueil de Travaux , t.\n\nv., p.\n\n52 (1.\n\n456).\n\n5.\n\n###.\n\nIbid.\n\n, t.\n\niii., p.\n\n165 (l.\n\n169).] {p.\n\nlxxii} The deification of the spiritual body.\n\nliving ones,[1] he becomes \"God, the son of God,\"[2] and all the gods of heaven become his brethren.[3] His bones are the gods and goddesses of heaven;[4] his right side belongs to Horns, and his left side to Set;[5] the goddess Nut makes him to rise up as a god without an enemy in his name \"God\";[6] and God calls him by his name.[7] His face is the face of Ap-uat, his eyes are the great ones among the souls of Annu, his nose is Thoth, his mouth is the great lake, his tongue belongs to the boat of right and truth, his teeth are the spirits of Annu, his chin is Khert-khent-Sekhem, his backbone is Sema, his shoulders are Set, his breast is Beba.[8] etc.\n\n; every one of his members is identified with a god.\n\nMoreover, his body as a whole is identified with the God of Heaven.\n\nFor example it is said concerning Unas:-- t'et-k t'et ent Unas pen af-k af en Unas pen Thy body is the body of Unas this.\n\nThy flesh is the flesh of Unas this.\n\nkesu-k kesu Unas pen seb-k seb Unas pen Thy bones are the bones of Unas this.\n\nThy passage is the passage of Unas this.\n\nseb Unas pen seb-k The passage of Unas this is thy passage.[9] [1.\n\nRecueil de Travaux , t.\n\nv., p.\n\n183 (l.\n\n166).\n\n2 ###.\n\nIbid.\n\n, t.\n\nviii., p.\n\n89 (t.\n\n574).\n\n3.\n\n###.\n\nSee pyramid of Teta, (Recueil, t.\n\nv.), ll.\n\n45, 137, 197, 302.\n\n4.\n\n###.\n\nIbid.\n\n, t.\n\niii., p.\n\n202 (1.\n\n209).\n\n5 Ibid.\n\n, t.\n\nv., p.\n\n23 (l.\n\n198), 6 Ibid.\n\n, t.\n\nv., p.\n\n38, (l.\n\n279).\n\n7.\n\nIbid.\n\n, p.\n\n26 (l."

