body = "But side by side with neter , whatever it may mean, we have mentioned in texts of all ages a number of beings called neteru which Egyptologists universally translate by the word \"gods.\" Among these must be included the great cosmic powers and the beings who, although held to be supernatural, were yet finite and mortal, and were endowed by the Egyptians with love, hatred, and passions of every sort and kind.\n\nThe difference between the conceptions of neter the one supreme God and the neteru is best shown by an appeal to Egyptian texts.\n\nIn the pyramid of Unas it is said to the deceased, un-k ar kes neter Thou existest at the side of God.[3] In the pyramid of Teta it is said of the deceased, ut'a-f met neter as set'em-nef metu He weigheth words, and, behold, God hearkeneth unto the words.[3] nas en Teta neter God hath called Teta[4] (in his name, etc.).\n\n[1.\n\nDie thätige Kraft, welche in periodischer Wiederkehr die Dinge erzeugt und erschafft, ihnen neues Leben verleiht und die Jugendfrische zurückgiebt.\" Religion und Mythologie , p.\n\n93.\n\n2.\n\nMaspero, Recueil de Travaux , t.\n\niii., p.\n\n202 (l.\n\n209).\n\n3.\n\nIbid.\n\n, t.\n\nv., 27 (ll.\n\n231, 232).\n\n4.\n\nIbid.\n\n, p.\n\n26 (l.\n\n223).] {p.\n\nlxxxiv} Views held in the first six dynasties.\n\nIn the pyramid of Pepi I.\n\nan address to the deceased king says, sesep-nek aru neter aaa-k am xer neteru Thou hast received the form of God, thou hast become great therewith before the gods.[1] ta en mut-k Nut un-nek em neter en xeft-k em ren-k en nefer Hath placed thy mother Nut thee to be as God to thine enemy in thy name of God.[2] tua Pepi pen neter Adoreth this Pepi God.[3] Pepi pu ar neter sa neter Pepi this is then God, the son of God.[4] All these extracts are from texts of the Vth and VIth dynasties.\n\nIt may be urged that we might as well translate neter by \"a god\" or \"the god,\" but other evidence of the conception of neter at that early date is afforded by the following passages from the Prisse papyrus,[5] which, although belonging at the earliest to he XIth dynasty, contains copies of the Precepts of Kaqemna, written in the reign of Seneferu, a king of the IVth dynasty, and the Precepts of Ptah-hetep, written during the reign of Assa, a king of the Vth dynasty.[6] [1.\n\nRecueil de Travaux , t.\n\nv., p.\n\n160 (l.\n\n19).\n\n2.\n\nIbid.\n\n, p.\n\n162 (l.\n\n33).\n\n3.\n\nIbid.\n\n, p.\n\n191 (l.\n\n185).\n\n4.\n\nIbid.\n\n, t.\n\nviii., p.\n\n89 (l.\n\n574).\n\n5.\n\nSee Fac-simile d'un papyrus Égyptien en caractères hiératiques , trouvé à Thèbes, donné à la Bibliothèque royale de Paris et publié par E.\n\nPrisse d'Avennes, Paris, 1847, fol.\n\nThe last translation of the complete work is by Virey, Études sur le Papyrus Prisse , Paris, 1887.\n\n6.\n\nM.\n\nAmélineau thinks ( La Morale Égyptienne , p."

