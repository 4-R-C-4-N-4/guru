body = "May I enter into the presence of Ra daily to hear his words, and may I sit down among the (8) mighty gods of Nut.\n\nMay a homestead be made ready for me, and may offerings of food and drink be put before me therein.\n\nMay I eat therein; (9) may I become a shining one therein; may I be filled therein to, my heart's fullest desire; may sacred wheat be given unto me to eat.\n\nMay I, by myself, get power over the guardian of my head.\" Vignette: A green hawk, holding a flail, and standing upon a pylon-shaped pedestal.\n\n[1.\n\nSee Lepsius, Todtenbuch , Bl.\n\n32.] {p.\n\n333} Text [CHAPTER LXXVIII.]: (1) THE CHAPTER OF CHANGING INTO A SACRED HAWK.\n\nSaith Osiris Ani: (2) \"Hail, thou mighty one, come unto Tattu.\n\nMake thou my paths, and let me pass round [to visit] my (3) thrones.\n\nMake me to renew myself and make me to wax strong.\n\n(4) Grant that I may be feared, and make me to be a terror.\n\nMay the gods of the underworld fear me, and may they fight for me in their (5) habitations.\n\nLet not him that would do harm unto me draw nigh unto me.\n\nLet me walk through the house of darkness.\n\nMay I (6), the feeble, clothe and cover myself; and may they ( i.e.\n\n, the gods) not do the like unto me.\n\nHail, ye gods who hear my speech!\n\nHail, ye rulers who are among the followers of Osiris.\n\nBe ye therefore silent, O ye gods, [when] the god speaketh with me; he heareth what is right and (7) true.\n\nWhat I speak unto him, do thou also speak, O Osiris.\n\nGrant thou that I may go round my course according to the order which cometh forth from thy mouth concerning me.\n\nMay I see thy forms; (8) may I be able to understand thy will.\n\nGrant that I may come forth, that I may get power over my legs, and that I may be like unto Neb-er-tcher (9) upon his throne.\n\nMay the gods of the underworld fear me, and may they fight for me in their habitations.\n\nGrant thou that I may pass on my way with the godlike ones who rise up (10).\n\nMay I be set up upon my resting-place like unto the Lord of Life; may I be joined unto Isis, the divine Lady.\n\nMay the gods (11) make me strong against him that would do harm unto me, and may no one come to see me fall helpless.\n\nMay I pass over the paths (12), may I come into the furthermost parts of heaven.\n\nI entreat for speech with Seb, I make supplication unto Hu (13) and unto Neb-er-tcher that the gods of the underworld may fear me, and that they may fight for me in their habitations, when they see that thou hast (14) provided me with the fowl of the air and the fish of the sea.\n\n\"I am one of those shining ones who live in rays of light.\n\n(15) 1 have made my form like unto the form [of the god] who cometh out and manifesteth himself in Tattu; for I have become worthy of honour by reason of his honour, (16) and he hath spoken unto thee of the things which concern me.\n\nSurely he hath made the fear of me [to go forth], and hath created terror of me!\n\nThe gods of the { continued next plate } Next: Plate XXVI."

