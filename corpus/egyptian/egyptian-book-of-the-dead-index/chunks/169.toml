body = "Saith Osiris, [the scribe] Ani, [when he cometh to this Arit]: (6) \"I have come [1.\n\nI.e.\n\n, \"He liveth upon worms.\" 2.\n\nVar.\n\n###.\n\n3.\n\nFor what follows of this speech Naville gives no equivalent.\n\n4.\n\nVar.\n\nSeket-tau-keha-kheru.\n\n5.\n\nAtes-sen.\n\n6 Var.\n\nAa-kheru.] {p.\n\n295} unto thee, O Osiris, who art cleansed of [thine] impurities.\n\nThou goest round about heaven, thou seest Ra, thou seest the beings who have knowledge.\n\nHail (7) Only One!\n\nbehold, thou art in the sektet boat,[1] He goeth round the horizon of heaven.\n\nI speak what I will unto his[2] body; (8) it waxeth strong and it cometh to life, as he spake.\n\nThou turnest back his face.\n\nProsper thou for -me all the ways [which lead] unto thee!\" Vignette I.: Ani and his wife Thuthu, with hands raised in adoration, approaching the first Sebkhet or Pylon, which is guarded by a bird-headed deity wearing a disk on his head, and sitting in a shrine the cornice of which is decorated with khakeru ornaments.\n\nText: [CHAPTER CXLVI.] THE FIRST PYLON.\n\nWORDS TO BE SPOKEN WHEN [ANI] COMETH UNTO THE FIRST PYLON.\n\nSaith Osiris Ani, triumphant: \"Lo, the lady of terrors, with lofty walls, the sovereign lady, the mistress of destruction, who uttereth the words which drive back the destroyers, who delivereth from destruction him that travelleth along the way.\n\nThe name of the doorkeeper is Neruit.\" Vignette II.: The second Pylon, which is guarded by a lion-headed deity seated in a shrine, upon the top of which is a serpent.\n\nText: WORDS TO BE SPOKEN WHEN [ANI] COMETH UNTO THE SECOND PYLON.\n\nSaith Osiris, the scribe Ani, triumphant: \"Lo, the lady of heaven, the mistress of the world, who devoureth with fire, the lady of mortals; how much greater is she than all men!\n\nThe name of the doorkeeper is Mes-Ptah.\" Vignette III.: The third Pylon, which is guarded by a man-headed deity seated in a shrine, the upper part of which is ornamented with the two utchats and the emblems of the orbit of the sun and of water.\n\nText: WORDS TO BE SPOKEN WHEN [ANI] COMETH UNTO THE THIRD PYLON OF THE HOUSE OF OSIRIS.\n\nSaith the scribe Ani, triumphant: \"Lo, the lady of the [1.\n\nVar.\n\n\"Thou invokest Ra in the sektet boat of heaven.\" 2 Reading with Naville ###.] {p.\n\n296} altar, the mighty one to whom offerings are made, the beloved[1] (?) of every god, who saileth up to Abtu.\n\nThe name of the doorkeeper is Sebaq.\" Vignette IV.: The fourth Pylon, which is guarded by a cow-headed deity seated in a shrine, the cornice of which is ornamented with uræi wearing disks.\n\nText: WORDS TO BE SPOKEN WHEN [ANI] COMETH UNTO THE FOURTH PYLON."

