body = "xcii} unity of a supreme and self-existent being, his eternity, his almightiness, and external reproduction thereby as God; the attributing of the creation of the world and of all living beings to this supreme God; the immortality of the soul, completed by the dogma of punishments and rewards: such is the sublime and persistent base which, notwithstanding all deviations and all mythological embellishments, must secure for the beliefs of the ancient Egyptians a most honourable place among the religions of antiquity.\"[1] Nine years later he developed this view, and discussed the difficulty of reconciling the belief in the unity of God with the polytheism which existed in Egypt from the earliest times, and he repeated his conviction that the Egyptians believed in a self-existent God who was One Being, who had created man, and who had endowed him with an immortal soul.[2] In fact, de Rougé amplifies what Champollion-Figeac (relying upon his brother's information) wrote in 1839: \"The Egyptian religion is a pure monotheism, which manifested itself externally by a symbolic polytheism.\"[3] M.\n\nPierret adopts the view that the texts show us that the Egyptians believed in One infinite and eternal God who was without a second, and he repeats Champollion's dictum.[4] But the most recent supporter of the monotheistic theory is Dr.\n\nBrugsch, who has collected a number of striking passages from the texts.\n\nFrom these passages we may select the following:-- God is one and alone, and none other existeth with Him--God is the One, the One who hath made all things--God is a spirit, a hidden spirit, the spirit of spirits, the great spirit of the Egyptians, the divine spirit--God is from the beginning, and He hath been from the beginning, He hath existed from old and was when nothing else had being.\n\nHe existed when nothing else existed, and what existeth He created after He had come into being, He is the Father of beginnings--God is the eternal One, He is eternal and infinite and endureth for ever and aye--God is hidden and no man knoweth His form.\n\nNo man hath been able to seek out His likeness; He is hidden to gods and men, and He is a mystery unto His creatures.\n\nNo man knoweth how to know Him--His name remaineth hidden; His name is a mystery unto His children.\n\nHis names are innumerable, they are manifold and none knoweth their number--God is truth and He liveth by truth and He feedeth thereon.\n\nHe is the king of truth, and He hath stablished the earth thereupon--God is life and through Him [1.\n\nÉtudes des Rituel Funéraire des Anciens Égyptiens (in Revue Archéologique ), Paris, 1860, p.\n\n72.\n\n2.\n\nLa croyance à l'Unité du Dieu suprême, à ses attributs de Créateur et de Législateur de l'homme, qu'il a doué d'une âme immortelle; voilà les notions primitives enchâssées comme des diamants indestructibles au milieu des superfétations mythologiques accumulées par les siècles qui ont passé sur cette vieille civilization.\n\nSee Conference sur la Religion des anciens Égyptiens (in Annales de Philosophic Chrétienne , 5 ième Série, t.\n\nxx., Paris, 1869, pp.\n\n325-337).\n\n3.\n\nÉgypte , Paris, 1839, p.\n\n245, col.\n\n1.\n\n4.\n\nLe Panthéon Égyptien , Paris, 1881, p.\n\n4.] {p.\n\nxciii} only man liveth."

