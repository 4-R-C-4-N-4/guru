body = "18.) As a separate composition, this Chapter is found in only two other papyri of the XVIIIth dynasty.[1] Chapter IX.\n\n\"The Chapter of coming forth by day, having passed through the tomb.\" (See pp.\n\n120, 321, and pl.\n\n18.) The vignette in the papyrus of Ani is similar to that which stands at the head of Chapters VIII.\n\nand IX.\n\nin other papyri of this period.\n\nChapter X.\n\n[See Chapter XLVIII., pp.\n\n123, 321, and pl.\n\n18.] Chapter XV.\n\n1.\n\n\"A hymn of praise to Ra when he riseth in the eastern sky.\" (See pp.\n\n1, 236, and pl.\n\nI.) This version is found in no other papyrus.\n\nChapter XV.\n\n2.\n\n\"A hymn of praise to Osiris Unnefer, the great god in Abydos,\"[2] etc.\n\n(See pp.\n\n8, 253, and pl.\n\n2.) Chapter XV.\n\n3.\n\n\"A hymn of praise to Ra when he riseth in the eastern sky, and when he setteth in the [land of] life.\" (See pp.\n\n123, 322, and pl.\n\n18-21.) The Litany to Osiris (pl.\n\n19) and the hymn to Ra (pll.\n\n24, 25) which follow are variants of the XVth Chapter, similar to those published by M.\n\nNaville.[3] Chapter XVI A .\n\nconsists of a vignette only.\n\n(See p.\n\n252, and pl.\n\n2.) Strictly speaking, it should form the vignette of the XVth Chapter, or of that part of it which refers to the rising sun.\n\nLike many other ancient papyri, the papyrus of Ani has no vignette referring to the sunset.\n\nChapter XVII.\n\n\"Here begin the praises and glorifyings of coming out from and of going into the glorious Neter-khert in the beautiful Amenta, of coming forth by day in all the transformations which please him, of playing at draughts, and of sitting in the Sekh hall, and of coming forth as a living soul.\" (See pp.\n\n27, 280, and Pll.\n\n7-10.) This is one of the oldest and most important of all the Chapters in the Book of the Dead, and it contains the most complete statements concerning the Egyptian cosmogony as formulated by the college of priests of Heliopolis.\n\nThe scribe seems to have accidentally omitted a large section.\n\nChapter XVIII.\n\nThis Chapter has no title.\n\n[1.\n\nI.e.\n\n, in British Museum papyrus, No.\n\n9964, and in a papyrus in Rome; see Naville, Einleitung, p.\n\n118.\n\n2.\n\nThis hymn may form no part of the XVth chapter, and may have been inserted after the hymn to Ra on account of Ani's official connection with the ecclesiastical endowments of Abydos.] {p.\n\ncxlviii} List of Chapters.\n\nThe papyrus of Ani contains two copies of this Chapter.\n\nIn the first the gods of the localities are grouped separately, and it is preceded by a very rare introduction, in which the An-mut-f and Sa-mer-f priests introduce Ani to the gods, whom he addresses in two speeches.\n\n(See p.\n\n71, 301, and pll.\n\n12-14.) In the second the text is not divided into distinct sections, and the gods are not grouped.\n\n(See p.\n\n330, and pll.\n\n23-24.) Chapter XXII., \"The Chapter of giving a mouth to Osiris Ani, the scribe It and teller of the holy offerings of all the gods.\" (See pp.\n\n25, 274, and pl."

