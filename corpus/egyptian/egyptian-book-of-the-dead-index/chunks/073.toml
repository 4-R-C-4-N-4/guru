body = "As a result, it seems that the word \"God\" should be reserved to express the name of the Creator of the Universe, and that neteru , usually rendered \"gods,\" should be translated by some other word, but what that word should be it is almost impossible to say.[2] The belief in One God.\n\nFrom the attributes of God set forth in Egyptian texts of all periods, Dr.\n\nBrugsch, de Rougé, and other eminent Egyptologists have come to the opinion that the dwellers in the Nile valley, from the earliest times, knew and worshipped one God, nameless, incomprehensible, and eternal.\n\nIn 1860 de Rougé wrote:--\"The [1.\n\nThe hieratic text of this story was published by Pleyte and Rossi, Le Papyrus de Turin , 1869-1876, pll.\n\n31-77, and 131-138; a French translation of it was published by M.\n\nLefébure, who first recognized the true character of the composition, in Aeg.\n\nZeitschrift , 1883, p.\n\n27 ff; and a German translation by Wiedemann is in his collection of \"Sonnensagen,\" Religion der alten Aegypter , Münster, 1890, p.\n\n29 ff.\n\n2 A similar difficulty also exists in Hebrew, for elomhim means both God and \"gods\"; compare Psalm lxxxii., i.] {p.\n\nxcii} unity of a supreme and self-existent being, his eternity, his almightiness, and external reproduction thereby as God; the attributing of the creation of the world and of all living beings to this supreme God; the immortality of the soul, completed by the dogma of punishments and rewards: such is the sublime and persistent base which, notwithstanding all deviations and all mythological embellishments, must secure for the beliefs of the ancient Egyptians a most honourable place among the religions of antiquity.\"[1] Nine years later he developed this view, and discussed the difficulty of reconciling the belief in the unity of God with the polytheism which existed in Egypt from the earliest times, and he repeated his conviction that the Egyptians believed in a self-existent God who was One Being, who had created man, and who had endowed him with an immortal soul.[2] In fact, de Rougé amplifies what Champollion-Figeac (relying upon his brother's information) wrote in 1839: \"The Egyptian religion is a pure monotheism, which manifested itself externally by a symbolic polytheism.\"[3] M.\n\nPierret adopts the view that the texts show us that the Egyptians believed in One infinite and eternal God who was without a second, and he repeats Champollion's dictum.[4] But the most recent supporter of the monotheistic theory is Dr.\n\nBrugsch, who has collected a number of striking passages from the texts.\n\nFrom these passages we may select the following:-- God is one and alone, and none other existeth with Him--God is the One, the One who hath made all things--God is a spirit, a hidden spirit, the spirit of spirits, the great spirit of the Egyptians, the divine spirit--God is from the beginning, and He hath been from the beginning, He hath existed from old and was when nothing else had being.\n\nHe existed when nothing else existed, and what existeth He created after He had come into being, He is the Father of beginnings--God is the eternal One, He is eternal and infinite and endureth for ever and aye--God is hidden and no man knoweth His form.\n\nNo man hath been able to seek out His likeness; He is hidden to gods and men, and He is a mystery unto His creatures."

