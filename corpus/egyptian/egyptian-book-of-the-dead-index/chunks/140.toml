body = ", Hermopolis Magna, the metropolis of Un, the 15th nome of Upper Egypt, the city called ### by the Copts, and Eshmûnên, ### by the Arabs.\n\nIt was the abode of the \"eight\" ( xemennu ) great primeval gods, and of Thoth, the scribe of the gods.\n\n(See Meyer and Dümichen, Geschichte des alten Agyptens , p.\n\n185.)] {p.\n\n262} written upon a slab of steel of the South, in the writing of the god himself, under the feet of the majesty of the god, in the time of the majesty of Men-kau-Ra,[1] the king of the North and of the South, triumphant, by the royal son Heru-tata-f[2] who found it while he was journeying to inspect the temples.\"[3] The scarabs which are found in the mummies, or lying upon the breast just above the position of the heart, form an interesting section of every large Egyptian collection.\n\nIn the British Museum series every important type of the funereal scarab is represented.\n\nThey are made of green basalt, green granite (Nos.\n\n7894 and 15,497), white limestone (Nos.\n\n7917, 7927, 15,508), light green marble (No.\n\n7905), black stone (Nos.\n\n7907, 7909, 7913), blue paste (Nos.\n\n7904, 14,549), blue glass (No.\n\n22,872), and purple, blue, or green glazed faïence (Nos.\n\n7868, 7869).\n\nThey vary in size from 5 inches to 2 inches in length.\n\nOn the hard stone examples the text of the Chapter of the Heart, more or less complete, is usually cut on the base in outline; but it is sometimes traced in red ink (No.\n\n7915), or in gold (No.\n\n15,518).\n\nIncuse hieroglyphics are sometimes filled with gold (No.\n\n7881).\n\nThe name of the person with whom the scarab was buried usually precedes the text of the Chapter of the Heart; but in many instances blank spaces are found left without insertion of the name--a proof that i, these amulets were bought ready-made.\n\nThe base however is often quite plan (Nos.\n\n7965, 7966), or figures of Osiris, Isis, and Nephthys occupy the place of the usual inscription (Nos.\n\n15,500, 15,507).\n\nThe backs of scarabs are generally quite plain, but we find examples inscribed with figures of the boat of the Sun Osiris, with flail and crook the bennu bird, and the u'tat (No.\n\n7883), Ra and Osiris (No.\n\n15,507), and the bennu bird with the inscription neteri ab en Ra , \"the mighty heart of Ra\" (No.\n\n7878).\n\nA finehard, green stone scarab of the Greek or Roman period has upon the back the figures of four Greek deities (No.\n\n7966).\n\nIn rare instances, the beetles have a human face (Nos.\n\n7876, 15,516) or head (No.\n\n7999).\n\nCarefully made scarabs have usually a band of gold across and down the back where the wings join: an example of the late period (No.\n\n7977) has the whole of the back gilded.\n\nThe scarab was set in a gold oval ring, at one end of which was a smaller ring for suspension from the neck or for attachment to the bandages of the mummy (No.\n\n15,504).\n\nThe green glazed faïence scarab of Thothmes III.\n\n(No.\n\n18,190) was suspended by a gold chain from a bronze torque."

