body = "In turn it was identified with all the gods of Egypt, new or old, and its influence was so great upon the minds of the Egyptians that from the earliest days they depicted to themselves a material heaven wherein the Isles of the Blest were laved by the waters of the Nile, and the approach to which was by the way of its stream as it flowed to the north.\n\nOthers again lived in imagination on the banks of the heavenly Nile, whereon they built cities; and it seems as if the Egyptians never succeeded in conceiving a heaven without a Nile and canals.\n\nThe Nile is depicted in the form of a man, who wears upon his head a clump of papyrus or lotus flowers; his breasts are those of a woman, indicating fertility.\n\nLanzone reproduces an interesting scene[1] in which the north and south Nile gods are tying a papyrus and a lotus stalk around the emblem of union to indicate the unity of Upper and Lower Egypt, and this emblem is found cut upon the thrones of the kings of Egypt to indicate their sovereignty over the regions traversed by the South and North Niles.\n\nIt has already been said that Hapi was identified with all the gods in turn, and it follows as a matter of course that the attributes of each were ascribed to him; in one respect, however he is different from them all, for of him it is written an mehu en aner tut her uah set sexet aarat He cannot be sculptured in stone; in the images on which men place crowns and uræi an qemuh entuf an baka an xerpu tuf an he is not made manifest; service cannot be rendered nor offerings made to him; not [1.\n\nDizionario , tav.\n\n198.] {p.\n\ncxxiv} seset-tu em setau an rex-tu bu entuf an can he be drawn from [his] mystery; not can be known the place where he is; not qem tephet anu.\n\nis he found in the painted shrine.[1] Here the scribe gave to the Nile the attributes of the great and unknown God its Maker.\n\nIn the pyramid texts we find a group of four gods with whom the deceased is closely connected in the \"other world\"; these are the four \"children of Horus\" whose names are given in the following order:-- Hapi , Tua-mautef , Amset and Qebhsennuf .[2] The deceased is called their \"father.\"[3] His two arms were identified with Hapi and Tuamautef, and his two legs with Amset and Qebhsennuf;[4] and when he entered into the Sekhet-Aaru they accompanied him as guides, and went in with him two on each side.[5] They took away all hunger and thirst from him,[6] they gave him life in heaven and protected it when given,[7] and they brought to him from the Lake of Khemta the boat of the Eye of Khnemu.[8] In one passage they are called the \"four Khu 's of Horus\",[9] and originally they represented the four pillars which supported the sky or Horus.\n\nEach was supposed to be lord of one of the quarters of the world, and finally became the god of one of the cardinal points.\n\nHapi represented the north, Tuamautef the east, Amset the south, and Qebhsennuf the west.\n\nIn the XVIIIth dynasty the Egyptians originated the custom of embalming the intestines of the [1.\n\nFor the hieratic text from which this extract is taken see Birch, Select Papyri , pll.\n\n20 ff.\n\nand 134 ff."

