body = "Or \"grandmothers.\" Isis was the \" greater tcherti,\" and Nephthys the \"lesser tcherti.\" On the word, see Brugsch, Wörterbuch , Supp., p.\n\n11335.\n\n2.\n\nThe chief variant readings are ###.\n\n3.\n\nBritish Museum papyrus No.\n\n9900 has, \"I rise up in my land, I come into (or from) mine eye.\" The papyrus of Kenna at Leyden has the same reading as that of Ani.\n\n4.\n\nThe papyrus of Kenna has \"the hind-parts.\" 5.\n\nThe chief variants are ### and ###.\n\nSee Naville, Todtenbuch , Bd.\n\nII., Pl.\n\nxvii.] {p.\n\n284} [nest], (46) \"Green Lake\"[1] is the name of the other; a pool of natron, and a pool of nitre (47); or (as others say), \"The Traverser of Millions of Years\" is the name of the one, \"Great Green Lake\" (48) is the name of the other; or (as others say), \" The Begetter of Millions of Years\" is the name of the one, \"Green Lake\" is (49) the name of the other.\n\nNow as concerning the great god who is in it, it is Ra himself.\n\n(50) \"I pass over the way, I know the head[2] of the Pool of Maata.\"[3] (51) What then is this?\n\nIt is Re-stau;[4] that is to say, it is the underworld on the (52) south of Naarut-f,[5] and it is the northern door[6] of the tomb.\n\nNow as concerning (53) She-Maaat,[7] it is Abtu; or (as others say), It is the road by which his (54) father Tmu travelleth when he goeth to Sekhet-Aaru,[8] (55) which bringeth forth the food and nourishment of the gods behind the shrine.\n\n(56) Now the Gate of Sert[9] is the gate of the pillars of Shu, (57) the northern gate of the underworld; or (as others say), It is the two leaves of the door through (58) which the god Tmu passeth when he goeth forth in the eastern horizon of heaven.\n\n(59) \"O ye gods who are in the presence[10] (of Osiris), grant me your arms, for I am the god (60) who shall come into being among you.\" [1.\n\nAccording to Brugsch ( Dict.\n\nGéog.\n\n, p.\n\n179), \"Green Lake\" is the name of one of the two sacred lakes of Heracleopolis Magna.\n\n2.\n\nLiterally \"heads.\" 3.\n\nFor the locality of this name in Egypt, see Brugsch, Dict.\n\nGéog.\n\n, p.\n\n248.\n\n4.\n\nI.e.\n\n, \" the door of the passages of the tomb.\" 5.\n\nThe chief variants in Naville are ###.\n\n6.\n\nVariants ###.\n\n7.\n\nI.e.\n\n, the \"Pool of Double Truth.\" 8.\n\nAfter the name Sekhet-Aaru, British Museum papyrus No.\n\n9900 has \"I come forth to the land of the .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nI come forth from the gate Ser.\" \"What then is this?\" The papyrus of Ani omits this passage.\n\n9 According to Brugsch ( Die biblischen sieben jahre der Hungersnoth , p.\n\n13) should be read T'eser .\n\nIn 1867 Dr.\n\nBirch translated, \"I go from the Gate of the Taser\" (Bunsen, Egypt's Place , Vol.\n\nV., p.\n\n174).\n\n10."

