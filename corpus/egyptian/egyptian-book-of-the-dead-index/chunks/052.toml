body = "i-nek ba-k am neteru Cometh to thee thy soul which is among the gods.[4] 5.\n\nuab ba-k am neteru Pure is thy soul among the gods.[5] 6.\n\nanx Ausar anx ba din Netat anx Pepi pen As liveth Osiris, and as liveth the soul in Netat, so liveth Pepi this.[6] 7.\n\nta-s baiu-k Pepi pen xent paut neteru em It[7] placeth thy soul Pepi this among the greater and lesser cycles of the gods in tut arat am-tha hat-k the form of the uræi [which] are on thy brow.[8] [1.\n\nI.e.\n\n, the soul of the gods.\n\n2 Recueil de Travaux , t.\n\niv., p.\n\n61 (l.\n\n522).\n\n3 Recueil de Travaux , t.\n\nv-, p.\n\n55 (l.\n\n350), and see Pepi I., ll.\n\n19, 20.\n\n4 Ibid.\n\n, t.\n\nv., p.\n\n16o (l.\n\n13).\n\n5 Recueil de Travaux , t.\n\nv., p.\n\n175 0.\n\n113).\n\n6 Ibid.\n\n, t.\n\nv., p.\n\n183 (l.\n\n166).\n\n7 I.e.\n\n, the Eye of Horus.\n\n8 Ibid.\n\n, t.\n\nv., p.\n\n184 (l.\n\n167).] {p.\n\nlxvi} 8.\n\nha Pepi pen ba-k baiu Annu as ba-k baiu Behold Pepi this, thy soul is the soul of Annu; behold thy soul is the soul Nexen as ba-k baiu Pe as ba-k seb anx as of Nekhen; behold thy soul is the soul of Pe; behold thy soul is a star living, behold, xent senu-f among its brethren.[1] The khaibit or shadow.\n\nIn connection with the ka and ba must be mentioned the khaibit or shadow of the man, which the Egyptians regarded as a part of the human economy.\n\nIt may be compared with the {Greek skia' } and umbra of the Greeks and Romans.\n\nIt was supposed to have an entirely independent existence and to be able to separate itself from the body; it was free to move wherever it pleased, and, like the ka and ba , it partook of the funeral offerings in the tomb, which it visited at will.\n\nThe mention of the shade, whether of a god or man, in the pyramid texts is unfrequent, and it is not easy to ascertain what views were held concerning it; but from the passage in the text of Unas,[2] where it is mentioned together with the souls and spirits and bones of the gods, it is evident that already at that early date its position in relation to man was well defined.\n\nFrom the collection of illustrations which Dr.\n\nBirch appended to his paper On the Shade or Shadow of the Dead ,[3] it is quite clear that in later times at least the shadow was always associated with the soul and was believed to be always near it; and this view is [1.\n\nRecueil de Travaux , t.\n\nv., p.\n\n184 (l.\n\n168).\n\n2.\n\nRecueil de Travaux , p.62 (l.\n\n523).\n\n3.\n\nSee Trans.\n\nSoc.\n\nBibl.\n\nArch.\n\n, vol.\n\nviii., p.\n\n386-97.] {p."

