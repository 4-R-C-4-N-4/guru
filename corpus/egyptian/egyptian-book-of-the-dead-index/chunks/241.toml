body = "Sacred-Texts Ancient Egypt Book of the Dead Index Book of the Dead Translation THE BOOK OF THE DEAD The Papyrus of Ani IN THE BRITISH MUSEUM.\n\nTHE EGYPTIAN TEXT WITH INTERLINEAR TRANSLITERATION AND TRANSLATION, A RUNNING TRANSLATION, INTRODUCTION, ETC.\n\nby E.\n\nA.\n\nWALLIS BUDGE Late keeper of Assyrian and Egyptian Antiquities in the British Museum [1895] scanned at www.sacred-texts.com, Oct-Dec 2000.\n\nPREFACE.\n\nThe Papyrus of Ani, which was acquired by the Trustees of the British Museum in the year 1888, is the largest, the most perfect, the best preserved, and the best illuminated of all the papyri which date from the second half of the XVIIIth dynasty (about B.C.\n\n1500 to 1400).\n\nIts rare vignettes, and hymns, and chapters, and its descriptive and introductory rubrics render it of unique importance for the study of the Book of the Dead, and it takes a high place among the authoritative texts of the Theban version of that remarkable work.\n\nAlthough it contains less than one-half of the chapters which are commonly assigned to that version, we may conclude that Ani's exalted official position as Chancellor of the ecclesiastical revenues and endowments of Abydos and Thebes would have ensured a selection of such chapters as would suffice for his spiritual welfare in the future life.\n\nWe may therefore regard the Papyrus of Ani as typical of the funeral book in vogue among the Theban nobles of his time.\n\nThe first edition of the Facsimile of the Papyrus was issued in 1890, and was accompanied by a valuable Introduction by Mr.\n\nLe Page Renouf, then Keeper of the Department of Egyptian and Assyrian Antiquities.\n\nBut, in order to satisfy a widely expressed demand for a translation of the text, the present volume has been prepared to be issued with the second edition of the Facsimile.\n\nIt contains the hieroglyphic text of the Papyrus with interlinear transliteration and word for word translation, a full description of the vignettes, and a running translation; and in the Introduction an attempt has been made to illustrate from native {p.\n\nvi} Egyptian sources the religious views of the wonderful people who more than five thousand years ago proclaimed the resurrection of a spiritual body and the immortality of the soul.\n\nThe passages which supply omissions, and vignettes which contain important variations either in subject matter or arrangement, as well as supplementary texts which appear in the appendixes, have been, as far as possible, drawn from other contemporary papyri in the British Museum.\n\nThe second edition of the Facsimile has been executed by Mr.\n\nF.\n\nC.\n\nPrice.\n\nE.\n\nA.\n\nWALLIS BUDGE.\n\nBRITISH MUSEUM.\n\nJanuary 25, 1895.\n\nCONTENTS.\n\nPREFACE v.\n\nINTRODUCTION:-- THE VERSIONS OF THE BOOK OF THE DEAD ix THE LEGEND OF OSIRIS xlviii THE DOCTRINE OF ETERNAL LIFE lv EGYPTIAN IDEAS OF GOD lxxxii THE ABODE OF THE BLESSED ci THE GODS OF THE BOOK OF THE DEAD cvii GEOGRAPHICAL AND MYTHOLOGICAL PLACES cxxxiii FUNERAL CEREMONIES cxxxviii THE PAPYRUS OF ANI cxlii TABLE OF CHAPTERS cliii THE HIEROGLYPHIC TEXT OF THE PAPYRUS OF ANI, WITH INTERLINEAR TRANSLITERATION AND WORD FOR WORD TRANSLATION 1-242 TRANSLATION 245-369 BIBLIOGRAPHY 371-377 INTRODUCTION.\n\nTHE VERSIONS OF THE BOOK OF THE DEAD.\n\nThe four great Versions of the Book of the Dead."

