[content]
body = "(38) 'I will not open unto thee, and I will not let thee pass over me,' saith the dweller at the door, 'unless thou tell my name.' 'Arm of Shu that placeth itself to protect Osiris' (39) is thy name.\n\n'We will not let thee pass by us,' say the posts of the door, 'unless thou tell our names.' 'Serpent children of Rennut' are your names.\n\n'Thou (40) knowest us, pass thou by us.' 'Thou shalt not tread upon me,' saith the floor of the hall, I unless thou tell my name.' 'I am silent, I am pure.' 'I know not (41) [the names of] thy two feet with which thou wouldst walk upon me; tell them unto me.' '.\n\n.\n\n.\n\n.\n\n.\n\nbefore Amsu' is the name of my right foot, 'Grief of Nephthys' is the name Of (42) my left foot.\n\n'Tread thou upon me, for thou knowest me.' 'I will not question thee,' saith the warder of the door of the hall, unless thou tell my name.' 'Discerner of hearts, (43) searcher of reins' is thy name.\n\nI will question thee now.\n\nWho is the god that liveth in his hour?\n\nSay thou.' The teller of the two lands.\n\n'Who then is the teller (44) of the two lands?' It is Thoth.\n\n'Come then,' saith Thoth, 'come hither (?).' And I come forward to the test.\n\n'What, now, is thy condition?' I am pure from (45) all evil, I am shielded from the baleful acts of those who live in their days, and I am not among them.\n\n'I have tried thee.\n\n(46) Who is he that goeth down into the fire, the walls whereof are [crowned] {p.\n\n353} with uræi, and whose paths are in the lake [of fire]?' He who passeth through it (47) is Osiris.\n\n'Advance thou, in very truth thou hast been tested.\n\nThy bread is in the utchat , thine ale is in the utchat , and meals of the tomb are brought forth unto thee upon earth from the utchat .\n\nThis hath been decreed for thee.'\" PLATE XXXII.\n\n(continued).\n\nVignette: The god Nu.\n\nText: (1) The hair of Osiris Ani, triumphant, is the hair of Nu.\n\nVignette: Ra, hawk-headed, and wearing a disk.\n\nText: (2) The face of Osiris, the scribe Ani, is the face of Ra.\n\nVignette: The goddess Hathor, wearing disk and horns.\n\nText: (3) The eyes of Osiris Ani, triumphant, are the eyes of Hathor.\n\nVignette: The god Ap-uat and standard.\n\nText: (4) The ears of Osiris Ani, triumphant, are the ears of Ap-uat.\n\nVignette: The god Anpu, jackal-headed.\n\nText: (5) The lips of Osiris Ani, triumphant, are the lips of Anpu.\n\nVignette: The scorpion Serqet, holding the shen , and ankh .\n\nText: (6) The teeth of Osiris Ani, triumphant, are the teeth of Serqet.\n\nVignette: The goddess Isis.\n\nText: (7) The neck of Osiris Ani, triumphant, is the neck of Isis.\n\nVignette: The ram-headed god, with uræus between the horns."

