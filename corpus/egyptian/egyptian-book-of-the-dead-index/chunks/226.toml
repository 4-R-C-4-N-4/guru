body = "Vignette: The goddess Neith.\n\nText: (11) The fore-arms of Osiris Ani, triumphant, are the fore-arms of the lady of Sais.\n\nVignette: The god Sut.\n\nText: (12) The backbone of Osiris Ani, triumphant, is the backbone of Sut.\n\nVignette: A god.\n\nText: (13) The chest of Osiris Ani, triumphant, is the chest of the lords of Kher-aba.\n\nVignette: A god.\n\nText: (14) The flesh of Osiris Ani, triumphant, is the flesh of the Mighty One of terror.\n\nVignette: The goddess Sekhet, lion-headed, wearing a disk.\n\nText: (15) The reins and back of Osiris Ani, triumphant, are the reins and back of Sekhet.\n\nVignette: An utchat upon a pylon.\n\nText: (16) The buttocks of Osiris Ani, triumphant, are the buttocks of the Eye of Horus.\n\nVignette: Osiris, wearing the atef crown and holding the flail and crook.\n\nText: (17) The privy member of Osiris Ani, triumphant, is the privy member of Osiris.\n\nVignette: The goddess Nut.\n\nText: (18) The legs of Osiris Ani, triumphant, are the legs of Nut.\n\nVignette: The god Ptah.\n\nText: (19) The feet of Osiris Ani, triumphant, are the feet of Ptah.\n\nVignette: The star Orion.\n\nText: (20) The fingers of Osiris Ani, triumphant, are the fingers of Saah (Orion).\n\nVignette: Three Uræi.\n\nText: (21) The leg-bones of Osiris Ani, triumphant, are the leg-bones of the living uræi.\n\nAppendix: The complete version of the XLIInd Chapter of the Book of the Dead, referring to the identification of the body of Osiris with those of the gods, reads as follows:-- (1) [CHAPTER XLII.] THE CHAPTER OF DRIVING BACK SLAUGHTER IN SUTENHENEN.\n\nSaith Osiris: \"O land of the sceptre!\n\n(2) O white crown of the divine Form!\n\nO holy resting place!\n\nI am the Child.\n\nI am the Child.\n\nI am the Child.\n\nI am the Child.\n\nHail, thou goddess Aburt!\n\nThou sayest daily, 'The slaughter block is (3) made ready as thou knowest, and thou who wert mighty hast been brought to decay.' I establish those who praise me.\n\nI am the holy knot within the tamarisk tree, more beautiful (4) in brightness than yesterday.\" To be said four times.\n\nI am Ra who establish those who praise him.\n\nI am the knot within the tamarisk tree, more beautiful in brightness than the disk of yesterday.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n(5) going forth on this.\n\nday.\n\nMy hair is the hair of Nu.\n\nMy face is the face of Ra.\n\nMine eyes are the eyes of Hathor.\n\nMine ears are the ears of Ap-uat.\n\n(6) My nose is the nose of Khent-sheps. My lips are the lips of Anpu.\n\nMy teeth are the teeth of Khepera.\n\nMy neck is the neck of Isis, the divine lady.\n\n(7) My hands are the hands of Khnemu, the lord of Tattu.\n\nMy fore-arms are the fore-arms of Neith, the lady of Saïs.\n\nMy backbone is the backbone of Sut.\n\nMy privy member is the privy member of Osiris."

