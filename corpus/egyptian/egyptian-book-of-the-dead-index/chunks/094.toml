body = "De Iside et Osiride , Â§ 14.\n\n2.\n\nSee Lanzone, op.\n\ncit.\n\n, p.\n\n65.\n\n3 Pyramid of Unas , l.\n\n187.\n\n4 See Le Nom antique de la Grande-Oasis (in Journal Asiatique , IX e Série, to i., pp.\n\n233-40).\n\n6 ###.\n\nPyramid of Unas, l.\n\n439.] {p.\n\ncxviii} they appear among the company of the gods who are present when the soul of the deceased is being weighed in the balance.\n\nTehuti or Thoth represented the divine intelligence which at creation uttered the words that were carried into effect by Ptah and Khnemu.\n\nHe was self produced, and was the great god of the earth, air, sea and sky; and he united in himself the attributes of many gods.\n\nHe was the scribe of the gods, and, as such, he was regarded as the inventor of all the arts and sciences known to the Egyptians; some of his titles are \"lord of writing,\" \"master of papyrus,\" \"maker of the palette and the ink-jar,\" \"the mighty speaker,\" \"the sweet tongued\"; and the words and compositions which he recited on behalf of the deceased preserved the latter from the influence of hostile powers and made him invincible in the \"other world.\" He was the god of right and truth, wherein he lived, and whereby he established the world and all that is in it.\n\nAs the chronologer of heaven and earth, he became the god of the moon; and as the reckoner of time, he obtained his name Tehuti , i.e.\n\n, \"the measurer\"; in these capacities he had the power to grant life for millions of years to the deceased.\n\nWhen the great combat took place between Horus, the son of Isis, and Set, Thoth was present as judge, and he gave to Isis the cow's head in the place of her own which was cut off by Horus in his rage at her interference; having reference to this fact he is called Ap-rehui, \"The judge of the two combatants.\" One of the Egyptian names for the ibis was Tekh , and the similarity of the sound of this word to that of Tehu, the name of the moon as a measurer of time, probably led the Egyptians to depict the god in the form of an ibis, notwithstanding the fact that the dog-headed ape was generally considered to be the animal sacred to him.\n\nIt has been thought that there were two gods called Thoth, one being a form of Shu; but the attributes belonging to each have not yet been satisfactorily defined.\n\nIn the monuments and papyri Thoth appears in the form of a man with the head of an ibis, which is sometimes surmounted by the crown ###, or ###, or ###, or by disk and horns ###, or ###, and he holds in his left hand the sceptre ### and in the right {the ankh} ###; sometimes he is depicted holding his ink-jar and the crescent moon, and sometimes he appears in the form of an ape holding a palette full of writing-reeds.' Thoth is mentioned in the pyramid texts[2] as the brother of Osiris, but whether he is the [1.\n\nSee Lanzone, op.\n\ncit.\n\n, tav.\n\n304, No.\n\n1.\n\n2.\n\nPyramid of Unas , l.\n\n236.] {p.\n\ncxix} same Thoth who is called the \"Lord of Khemennu\" and the \"Scribe of the gods\" is doubtful.\n\nMaat , the wife of Thoth, was the daughter of Ra, and a very ancient goddess; she seems to have assisted Ptah and Khnemu in carrying out rightly the work of creation ordered by Thoth."

