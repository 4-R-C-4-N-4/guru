body = "The days are called in hieroglyphics ###, \"the five additional days of the year,\" e?pago'menai!hme'rai pe'nte ; see Brugsch, Thesaurus Inscriptionum Aegytiacarum , Abt.\n\nii.\n\n( Kalendarische Inschriften ), Leipzig, 1883, pp.\n\n479, 480; Brugsch, Aegyptologie , p.\n\n361 Chabas, Le Cálendrier , Paris (no date), p.\n\n99 ff.\n\n3.\n\nOsiris was born on the first day, Horus on the second, Set on the third, Isis on the fourth, and Nephthys on the fifth; the first, third, and fifth of these days were considered unlucky by the Egyptians.\n\n4.\n\nThe mouths of the Nile are discussed and described by Strabo, XVII., i., 18 (ed.\n\nDidot, p.\n\n681) and by Diodorus, I., 33, 7 (ed.\n\nDidot, p.\n\n26).] {p.\n\nl} Plutarch's version.\n\nthe month Hathor,[1] when Osiris was in the twenty-eighth year either of his reign or of his age.\n\nThe first to know of what had happened were the Pans and Satyrs, who dwelt hard by Panopolis; and finally the news was brought to Isis at Coptos, whereupon she cut off a lock of hair[2] and put on mourning apparel.\n\nShe then set out in deep grief to find her husband's body, and in the course of her wanderings she discovered that Osiris had been united with her sister Nephthys, and that Anubis, the offspring of the union, had been exposed by his mother as soon as born.\n\nIsis tracked him by the help of dogs, and bred him up to be her guard and attendant.\n\nSoon after she learned that the chest had been carried by the sea to Byblos, where it had been gently laid by the waves among the branches of a tamarisk tree ({Greek e?pei'khj tini` }), which in a very short time had grown to a magnificent size and had enclosed the chest within its trunk.\n\nThe king of the country, admiring the tree, cut it down and made a pillar for the roof of his house of that part which contained the body of Osiris.\n\nWhen Isis heard of this she went to Byblos, and, gaining admittance to the palace through the report of the royal maidens, she was made nurse to one of the king's sons, Instead of nursing the child in the ordinary way, Isis gave him her finger to suck, and each night she put him into the fire to consume his mortal parts, changing herself the while into a swallow and bemoaning her fate.\n\nBut the queen once happened to see her son in flames, and cried out, and thus deprived him of immortality.\n\nThen Isis told the queen her story and begged for the pillar which supported the roof.\n\nThis she cut open, and took out the chest and her husband's body,[3] and her lamentations were so terrible that one of the royal children died of fright.\n\nShe then brought the [1.\n\nIn the Calendar in the fourth Sallier papyrus (No.\n\n10,184) this day is marked triply unlucky, and it is said that great lamentation by Isis and Nephthys took place for Un-nefer (Osiris) thereon.\n\nSee Chabas, Le Calendrier , p.\n\n50.\n\nHere we have Plutarch's statement supported by documentary evidence.\n\nSome very interesting details concerning the festivals of Osiris in the month Choiak are given by Loret in Recueil de Travaux , t.\n\niii., p.\n\n43 ff; t.\n\niv., p."

