body = "It reapeth the wheat, it cutteth the barley, and it giveth it unto thee.\n\nNow, therefore, O Pepi, he that hath given unto thee life and all power and eternity and the power of speech and thy body is Ra.\n\nThou hast endued thyself with the forms of God, and thou hast become magnified thereby before the gods who dwell in the Lake.\n\nHail, Pepi, thy soul standeth among the gods and among the shining ones, and the fear of thee striketh into their hearts.\n\nHail, Pepi, thou placest thyself upon the throne of Him that dwelleth among the living, and it is the writing which thou hast [that striketh terror] into their hearts.\n\nThy name shall live upon earth, thy name shall flourish upon earth, thou shalt neither perish nor be destroyed for ever and for ever.\" Corporeal pleasures.\n\nSide by side, however, with the passages which speak of the material and spiritual enjoyments of the deceased, we have others which seem to imply that the Egyptians believed in a corporeal existence,[1] or at least in the capacity for corporeal enjoyment, in the future state.\n\nThis belief may have rested upon the view that the life in the next world was but a continuation of the life upon earth, which it resembled closely, or it may have been due to the survival of semi-savage gross ideas incorporated into the religious texts of the Egyptians.\n\nHowever this may be, it is quite certain that in the Vth dynasty the deceased king Unas eats with his mouth, and exercises other natural functions of the body, and gratifies his passions.[2] But the most remarkable passage in this connection is one in the [1.\n\nCompare: \"O flesh of Teta, rot not, decay not, stink not.\" Recueil de Travaux , t.\n\nv., p.\n\n55 (l.\n\n347).\n\n\"Pepi goeth forth with his flesh\"; ibid.\n\n, t.\n\nv., p.\n\n185 (1.\n\n169).\n\n\"thy bones shall not be destroyed, and thy flesh shall not perish\"; ibid.\n\n, p.\n\n55 (l.\n\n353).\n\n2.\n\nCompare the following passages:-- ( a ) ###.\n\nIbid.\n\n, t.\n\niv., p.\n\n76 (ll.\n\n628, 629).\n\n( b ) ###.\n\nIbid.\n\n, t.\n\nv., p.\n\n37 (l.\n\n277).\n\n( c ) Ibid.\n\n, t.\n\niii., p.\n\n197 (1.\n\n182 f).\n\n( d ) Ibid., t.\n\nV., p.\n\n40 (1.\n\n286), and see M.\n\nMaspero's note on the same page.] {p.\n\nlxxix} Old tradition of hunting and devouring the gods.\n\npyramid of Unas.\n\nHere all creation is represented as being in terror when they see the deceased king rise up as a soul in the form of a god who devours \"his fathers and mothers\"; he feeds upon men and also upon gods.\n\nHe hunts the gods in the fields and snares them; and when they are tied up for slaughter he cuts their throats and disembowels them.\n\nHe roasts and eats the best of them, but the old gods and goddesses are used for fuel.\n\nBy eating them he imbibes both their magical powers, and their khu's .\n\nHe becomes the \"great Form, the form among forms, and the god of all the great gods who \"exist in visible forms,\"[1] and he is at the head of all the sahu , or spiritual bodies in heaven.\n\nHe carries off the hearts of the gods, and devours the wisdom of every god; therefore the duration of his life is everlasting and he lives to all eternity, for the souls of the gods and their khu's are in him."

