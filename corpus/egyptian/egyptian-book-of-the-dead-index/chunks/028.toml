body = "Vignette: The deceased being weighed against his heart in the balance in the presence of Osiris, \"the great god, the prince of eternity.\" Chapter XXXI.\n\nThe Chapter of repulsing the crocodile which cometh to carry the magical words ### from a man in the underworld.\n\nVignette: The deceased spearing a crocodile.\n\nChapter XXXII.\n\n[The Chapter of] coming to carry the magical words from a man in the underworld.\n\nThis Chapter has no vignette.\n\nChapter XXXIII.\n\nThe Chapter of repulsing reptiles of all kinds.\n\nVignette: The deceased attacking four snakes with a knife in each hand.\n\nChapter XXXIV.\n\nThe Chapter of a man not being bitten by a serpent in the hall of the tomb.[3] This Chapter has no vignette.\n\nChapter XXXV.\n\nThe Chapter of not being eaten by worms in the underworld.\n\n[1.\n\nTwo variants (Naville, Todtenbuch , Bd.\n\nI., Bl.\n\n38) show the deceased sitting before his heart, and the deceased presenting his heart to a triad of gods.\n\n2.\n\nOr the deceased adoring his heart; see also Naville, Todtenbuch , Bd.\n\nI., Bl.\n\n42.\n\n3 ### amihat .] {p.\n\nxxxv} Theban version: list of chapters.\n\nVignette: Three serpents.\n\nChapter XXXVI.\n\nThe Chapter of repulsing the tortoise.\n\n( apsai ).\n\nVignette: The deceased spearing a beetle.[1] Chapter XXXVII.\n\nThe Chapter of repulsing the two merti .\n\nVignette: Two uræi, which represent the two eyes of Ra.\n\nChapter XXXVIII A .\n\nThe Chapter of living upon the air which is in the underworld.\n\nVignette: The deceased holding a sail, emblematic of air.\n\nChapter XXXVIII B .\n\nThe Chapter of living upon air and of repulsing the two merti .\n\nVignette: The deceased attacking three serpents, a knife in his right hand and a sail in his left.\n\nChapter XXXIX.\n\nThe Chapter of repulsing the serpent in the underworld.\n\nVignette: The deceased spearing a serpent.\n\nChapter XL.\n\nThe Chapter of repulsing the eater of the ass.\n\nVignette: The deceased spearing a serpent which is biting the neck of all ass.\n\nChapter XLI.\n\nThe Chapter of doing away with the wounding of the eyes in the underworld.\n\nVignette: The deceased holding a knife in the right hand and a roll in the left.\n\nChapter XLII.\n\n[The Chapter] of doing away with slaughter in Suten-henen.\n\nVignette: A man holding a serpent.[2] Chapter XLIII.\n\nThe Chapter of not allowing the head of a man to be cut off from him in the underworld.\n\nThis Chapter has no vignette.\n\nChapter XLIV.\n\nThe Chapter of not dying a second time.\n\nThis Chapter has no vignette.\n\nChapter XLV.\n\nThe Chapter of not seeing corruption.\n\nThis Chapter has no vignette.\n\nChapter XLVI.\n\nThe Chapter of not decaying, and of living in the underworld.\n\nThis Chapter has no vignette.\n\nChapter XLVII.\n\nThe Chapter of not carrying off the place (or seat) of the throne from a man in the underworld.\n\n[1.\n\nOr the deceased holding a knife and staff and standing before ###.\n\n2.\n\nFor the variant vignettes see Naville, Todtenbuch , Bd.\n\nI., III.\n\n57.] {p.\n\nxxxvi} Theban version: list of chapters.\n\nThis Chapter has no vignette.\n\nChapter XLVIII.\n\n[The Chapter of a man coming against] his enemies.\n\nThis Chapter has no vignette.\n\nChapter XLIX.* The Chapter of a man coming forth against his enemies in the underworld.\n\nVignette: A man standing with a staff in his hand.\n\nChapter L."

