body = "au am-nef saa en neter neb ahau pa neheh t'er-f He[4] hath eaten the knowledge of god every, [his] existence is for all eternity pa t'etta em sah-f pen en merer-f ari-f mest'et'-f and to everlasting in his sah [5] this; what he willeth he doeth, [what] he hateth an ari-nef not doth he do.[6] [1.\n\nRecueil Travaux , t.\n\niii., p.\n\n208 (ll.\n\n232, 233).\n\n2.\n\nRecueil de Travaux , t.\n\niii., p.\n\n209 (l.\n\n240) 3.\n\nIbid.\n\n, t.\n\niv., p.\n\n50 (l.\n\n445).\n\nThe allusion here is to the setting of the sun.\n\n4.\n\nI.e.\n\n, Unas.\n\n5.\n\nSee page lix.\n\n6.\n\nRecueil de Travaux , t.\n\niv., p.\n\n61 (ll.\n\n520, 521).] {p.\n\nlvii} 6.\n\nanx anx an mit-k Live life, not shalt thou die.[1] The doctrine of eternal life in the XVIIIth dynasty.\n\nIn the papyrus of Ani the deceased is represented as having come to a place remote and far away, where there is neither air to breathe nor water to drink, but where he holds converse with Tmu.\n\nIn answer to his question, \"How long have I to live?\"[2], the great god of Annu answers:-- auk er heh en heh aha en heh Thou shalt exist for millions of millions of years, a period of millions of years.\n\nIn the LXXXIVth Chapter, as given in the same papyrus, the infinite duration of the past and future existence of the soul, as well as its divine nature, is proclaimed by Ani in the words:-- nuk Su paut ba-a pu neter ba-a pu heh I am Shu [the god] of unformed matter.\n\nMy soul is God, my soul is eternity.[3] When the deceased identifies himself with Shu, he makes the period of his existence coeval with that of Tmu-Ra, i.e.\n\n, he existed before Osiris and the other gods of his company.\n\nThese two passages prove the identity of the belief in eternal life in the XVIIIth dynasty with that in the Vth and VIth dynasties.\n\nBut while we have this evidence of the Egyptian belief in eternal life, we are nowhere told that man's corruptible body will rise again; indeed, the following extracts show that the idea prevailed that the body lay in the earth while the soul or spirit lived in heaven.\n\n1.\n\nba ar pet sat ar ta Soul to heaven, body to earth.[4] (Vth dynasty.) [1.\n\nRecueil de Travaux , t.\n\nv., p.\n\n170 (Pepi, 1.\n\n85).\n\n2.\n\n###.\n\nPlate XIX., l.\n\n16 (Book of the Dead, Chapter CLXXV.).\n\n3.\n\nPlate XXVIII., 1.\n\n15.\n\n4 Recueil de Travaux , t.\n\niv., p.\n\n71 (l.\n\n582).] {p.\n\nlvii} 2.\n\nmu-k er pet xa-k er ta Thy essence is in heaven, thy body to earth.[1] (VIth dynasty.) 3.\n\npet xer ba-k ta xeri tut-k Heaven hath thy soul, earth hath thy body.[2] (Ptolemaic period.) Constancy in the belief in the resurrection.\n\nThere is, however, no doubt that from first to last the Egyptians firmly believed that besides the soul there was some other element of the man that would rise again."

