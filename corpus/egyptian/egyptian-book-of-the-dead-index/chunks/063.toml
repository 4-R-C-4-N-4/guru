[content]
body = "The whole passage reads:--[2] \"(496) The heavens drop water, the stars throb, (497) the archers go round about, the (498) bones of Akeru tremble, and those who are in bondage to them take to flight when they see (499) Unas rise up as a soul, in the form of the god who liveth upon his fathers and who maketh food of his (500) mothers.\n\nUnas is the lord of wisdom, and (501) his mother knoweth not his name.\n\nThe gifts of Unas are in heaven, and he hath become mighty in the horizon (502) like unto Tmu, the father that gave him birth, and after Tmu gave him birth (503) Unas became stronger than his father.\n\nThe ka's of Unas are behind him, the sole of his foot is beneath his feet, his gods are over him, his uræi are [seated] (504) upon his brow, the serpent guides of Unas are in front of him, and the spirit of the flame looketh upon [his] [1.\n\n###.\n\nPyramid of Teta, 1.\n\n327; ibid.\n\n, t.\n\nv., p.\n\n50.\n\n2.\n\nSee Maspero, Recueil , t.\n\niv., p.\n\n59, t.\n\nv., p.\n\n50; and Revue de l'Histoire des Religions , t.\n\nxii, p.\n\n128.] {p.\n\nlxxx} soul.\n\nThe (505) powers of Unas protect him; Unas is a bull in heaven, he directeth his steps where he will, he liveth upon the form which (506) each god taketh upon himself, and be eateth the flesh of those who come to fill their bellies with the magical charms ill the Lake of Fire.\n\nUnas is (507) equipped with power against the shining spirits thereof, and he riseth up in the form of the mighty one, the lord of those who dwell in power (?).\n\nUnas hath taken his seat with his side turned towards Seb.\n\n(508) Unas hath weighed his words with the hidden god (?) who hath no name, on the day of hacking in pieces the firstborn.\n\nUnas is the lord of offerings, the untier of the knot, and he himself maketh abundant the offerings of meat and drink.\n\n(509) Unas devoureth men and liveth upon the gods, he is the lord to whom offerings are brought, and he counteth the lists thereof.\n\nHe that cutteth off hairy scalps and dwelleth in the fields hath netted the gods in a snare; (510) he that arrangeth his head hath considered them [good] for Unas and hath driven them unto him; and the cord-master hath bound them for slaughter.\n\nKhonsu the slayer of [his] lords hath cut their throats (511) and drawn out their inward parts, for it was he whom Unas sent to drive them in; and Shesem hath cut them in pieces and boiled their members in his blazing caldrons.\n\n(512) Unas hath eaten their magical powers, and he hath swallowed their spirits; the great ones among them serve for his meal at daybreak, the lesser serve for his meal at eventide, and the least among them serve for his meal in the night.\n\n(513) The old gods and the old goddesses become fuel for his furnace."

