[content]
body = "I shall not die (21) again.\n\nMy hour resteth with you, but my forms are within my dwelling-place.\n\nI am he who is unknown, and the gods with rose-bright countenances are (22) with me.\n\nI am the unveiled one.\n\nThe season wherein [the god] created heaven for me and enlarged the bounds of the earth and made great the progeny thereof cannot be found Out.\n\n(23) My name setteth itself apart and removeth from all evil things through the words which I speak unto you.\n\nI am he who riseth and shineth; the wall of walls; the only One, [son] of an only One.\n\nRa (24) never lacketh his form, he never passeth away, he never passeth away.\n\nVerily, I say: I am the plant which cometh forth from Nu, and my mother is Nut.\n\nHail, (25) O my Creator, I am he who hath no power to walk, the great knot within yesterday.\n\nMy power is in my hand.\n\nI am not known, [but] I am he who knoweth (26) thee.\n\nI cannot be held with the hand, but I am he who can hold thee in his hand.\n\n[Hail] O Egg!\n\n[Hail] O Egg!\n\nI am Horus who live for millions of years, whose flame lighteth upon your faces and (27) blazeth in your hearts.\n\nI have the command of my throne, and I advance in mine hour.\n\nI have opened the paths, I have turned myself away from all evil.\n\nI am (28) the ape of gold, three palms and two fingers [high], which is without legs and without arms, and which dwelleth in the House of Ptah.\n\nI go forth even as goeth forth the ape Of (29) gold three palms and two fingers [high], which hath neither legs nor arms, and which dwelleth in the house of Ptah.\" When [thou] hast said this chapter thou shalt open a way and enter thereon.\n\n{p.\n\n357} Next: Plate XXXIII."

