body = "I am Thoth, who have made (12) Osiris victorious over his enemies on the day of weighing of words in the (13) great House of the mighty Ancient One in Annu.[4] I am Tetteti,[5] the son of Tetteti; I was (14) conceived in Tattu, I was born in (15) Tattu.[6] I am with those who weep and with the women who bewail (16) Osiris in the double land (?) of Rechtet;[7] and I make Osiris to be victorious over his enemies.\n\n(17) Ra commanded Thoth to make Osiris victorious over his enemies; and that which was (18) bidden for me Thoth did.\n\nI am with Horus on the day of the clothing of (19) Teshtesh[9] and of the opening of the storehouses of water for the purification of the god whose heart moveth not, and (20) of the unbolting of the door of concealed things in Re-stau.[10] I am with Horus who (21) guardeth the left shoulder of Osiris in [1.\n\nThe papyrus of Ani reads ### as do Pf, Pj, Pk, and Pl.\n\nSee Naville, Todtenbuch , Bd., I., Bl, p.\n\n2.\n\n2.\n\nI.e.\n\n, Mestha, Hapi, Tuamautef, Qebhsennuf, the gods of the cardinal points.\n\n3.\n\nCompare the use of ### in 2 Samuel, iii.\n\n13.\n\n4.\n\nA name of the temple of Ra in Heliopolis.\n\nSee Brugsch, Dict.\n\nGéog.\n\n, p.\n\n153.\n\n5.\n\nI.e.\n\n, the god of Tettetu, or Busiris, a town which was believed to contain the body of Osiris.\n\n6 See Brugsch, Dict.\n\nGéog.\n\n, p.\n\n978.\n\n7.\n\nThe reading ### .\n\n.\n\n.\n\n.\n\nRextet is given by British Museum papyrus No.\n\n9964.\n\nSee also Brugsch, Dict.\n\nGéog ., p.\n\n392.\n\n8.\n\nThe translation here follows the variant reading given by Pierret ### utu en Ra er semaaxeru Ausar .\n\nSee Aeg.\n\nZeitschrift , 1869, p.\n\n139; and Le Livre des Morts, p.\n\n10.\n\n9.\n\nA name of Osiris.\n\nSee Lanzone, Dizionario, p.\n\n1262.\n\n10.\n\nI.e.\n\n, \"the door of the passages of the tomb.\" A picture of Re-stau ### is given on Plate VIII.] {p.\n\n272} Sekhem,[1] and I (22) go into and come out from the divine flames[2] on the day of the destruction (23) of the fiends in Sekhem.\n\nI am with Horus on the day of the (24) festivals of Osiris, making the offerings on the sixth day of the festival,[3] [and on] the Tenat[4] festival in (25) Annu.\n\nI am a priest in Tattu, I Rere (?) in \"the temple of Osiris,[6] [on the day of] casting Up (26) the earth.[7] I see the things which are concealed in Re-stau.\n\n(27) I read from the book of the festival of the Soul [which is] in Tattu.[8] I am the Sem [9] priest (28), and I perform his course.\n\nI am the great chief of the work [10] on the day of the placing of the hennu [1."

