[content]
body = "It shall be recited on the ninth day of the festival.\n\nVignette: The deceased making offerings before a god.\n\nChapter CXLIV.\n\nThe Chapter of going in.\n\nVignette: Seven pylons.\n\nChapter CXLV A .\n\n[Without title.] This Chapter has no vignette.\n\nChapter CXLV B .\n\n[The Chapter] of coming forth to the hidden pylons.\n\nThis Chapter has no vignette.\n\nChapter CXLVI.\n\n[The Chapter of] knowing the pylons in the house of Osiris in the Field of Aaru.\n\nVignette: A series of pylons guarded each by a god.\n\nChapter CXLVII.\n\n[A Chapter] to be recited by the deceased when he cometh to the first hall of Amentet.\n\n{p.\n\nxliii} Theban version: list of chapters.\n\nVignette: A series of doors, each guarded by a god.\n\nChapter CXLVIII.\n\n[The Chapter] of nourishing the khu in the underworld, and of removing him from every evil thing.\n\nThis Chapter has no vignette.\n\nChapter CXLIX.\n\n[Without title.] Vignette: The divisions of the other world.\n\nChapter CL.\n\n[Without title.] Vignette: Certain divisions of the other world.\n\nChapter CLI.\n\n[Without title.] Vignette: Scene of the mummy chamber.\n\nChapter CLI A .\n\n[Chapter] of the hands of Anpu, the dweller in the sepulchral chamber, being upon the lord of life ( i.e.\n\n, the mummy).\n\nVignette: Anubis standing by the bier of the deceased.\n\nChapter CLI B .\n\nThe Chapter of the chief of hidden things.\n\nVignette: A human head.\n\nChapter CLII.\n\nThe Chapter of building a house in the earth.\n\nVignette: The deceased standing by the foundations of his house.\n\nChapter CLIII A .\n\nThe Chapter of coming forth from the net.\n\nVignette: A net being drawn by a number of men.\n\nCLIII B .\n\nThe Chapter of coming forth from the fishing net.\n\nVignette: Three apes drawing a fishing net.\n\nChapter CLIV.\n\nThe Chapter of not allowing the body of a man to decay in the tomb.\n\nThis Chapter has no vignette.\n\nChapter CLV.\n\nThe Chapter of a Tet of gold to be placed on the neck of the khu .\n\nVignette: A Tet.\n\nChapter CLVI.\n\nThe Chapter of a buckle of amethyst to be placed on the neck of the khu.\n\nVignette: A Buckle.\n\nChapter CLVII*.\n\nThe Chapter of a vulture of gold to be placed on the neck of the khu .\n\nVignette: A vulture.\n\nChapter CLVIII.* The Chapter of a collar of gold to be placed on the neck of the khu .\n\nVignette: A collar.\n\n{p.\n\nxliv} Theban version: list of chapters.\n\nChapter CLIX.* The Chapter of a sceptre of mother-of-emerald to be placed on the neck of the khu .\n\nVignette: A sceptre.\n\nChapter CLX.\n\n[The Chapter] of placing a plaque of mother-of-emerald.\n\nVignette: A plaque.\n\nChapter CLXI.\n\nThe Chapter of the opening of the doors of heaven by Thoth, etc.\n\nVignette: Thoth opening four doors.\n\nChapter CLXII.* The Chapter of causing heat to exist under the head of the khu .\n\nVignette: A cow.\n\nChapter CLXIII.* The Chapter of not allowing the body of a man to decay in the underworld.\n\nVignette: Two utchats , and a serpent on legs.\n\nChapter CLXIV.* Another Chapter.\n\nVignette: A three-headed goddess, winged, standing between two pigmies."

