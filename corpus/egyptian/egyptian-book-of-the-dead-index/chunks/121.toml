body = "27.) Chapter LXXXIX.\n\n\"The Chapter of causing the soul to be united to its body in Neter-khert.\" (See pp.\n\n112, 318, and pl.\n\n17.) The two incense burners which stand, one at the head and one at the foot of the bier, are peculiar to the papyrus of Ani.\n\n[1.\n\nNaville, Einleitung , p.\n\n97.] {p.\n\ncli} List of Chapters.\n\nChapter XCI.\n\n\"The Chapter of not letting the soul of a man be captive in Neter-khert.\" (See pp.\n\n114, 319, and pl.\n\n17.) Chapter XCII.\n\n\"The Chapter of opening the tomb to the soul and the shadow, of coming forth by day, and of getting power over the legs.\" (See pp.\n\n115, 319, and pl.\n\n17.) The vignette of this Chapter is unusual and of great interest, for in it Ani's soul accompanies his shadow.\n\nChapter XCIII.\n\n\"The Chapter of not letting a man pass over to the east in Neter-khert.\" (See pp.\n\n109, 317, and pl.\n\n17-) The vignette as here given is peculiar to the papyrus of Ani.\n\nChapter XCIII A .\n\n\"Another Chapter.\" (See pp.\n\n110, 317, and pl.\n\n17.) Chapter CX.\n\n\"Here begin the Chapters of the Sekhet-hetepu, and the Chapters of coming forth by day, and of going into and coming out from Neter-khert, and of arriving in the Sekhet-Aanru, and of being in peace in the great city wherein are fresh breezes.\" (See pp.\n\n236, 362, and pl.\n\n34.) The text is here incomplete.\n\nChapter CXXIV.\n\n\"The Chapter of going unto the divine chiefs of Osiris.\" (See pp.\n\n146, 330, and pl.\n\n24.) In the vignette we should expect four, instead of three, gods.\n\nChapter CXXV.\n\n\"The Chapter of entering into the Hall of double Right and Truth: a hymn of praise to Osiris.\" (See pp.\n\n189, 344, and pl.\n\n30.) The Introduction to this Chapter as found in the papyrus of Ani is not met with elsewhere; the text which usually follows the \"Negative Confession\" is however omitted.\n\nThe vignette as here given is peculiar to the papyrus of Ani.\n\nChapter CXXXII.\n\n\"The Chapter of making a man to return to see again his home upon earth.\" (See pp.\n\n121, 321, and pl.\n\n18.) Chapter CXXX III.\n\n\"[A Chapter] to be said on the day of the month.\" (See pp.\n\n138, 327, and pl.\n\n21.) Chapter CXXXIII.--Rubric.\n\n(See pp.\n\n142, 328, and pl.\n\n22.) Chapter CXXXIV.\n\n\"A hymn of praise to Ra on the day of the month wherein he saileth in the boat.\" (See pp.\n\n142, 329, and pl.\n\n22.) Chapter CXLVI.\n\n\"The Chapter of renewing the pylons in the House of Osiris which is in the Sekhet-Aanru.\" (See pp.\n\n63, 295, and pll.\n\n11, 12.) Chapter CXLVII.\n\n\"A Chapter to be said when Ani cometh to the first Aril.\" (See pp.\n\n56, 291, and pll.\n\n11, 12.) Chapter CXLVIII.\n\nWithout title.\n\nSee pp.\n\n239, 366, and pl.\n\n35.) {p.\n\nclii} List of Chapters.\n\nChapter CLI.\n\nScene in the mummy chamber.\n\n(See pp.\n\n229, 360, and Pll.\n\n33, 34.) Chapter CLV.\n\n\"The Chapter of a Tet of gold.\" (See pp."

