body = "She is depicted in the form of a woman, having upon her head the shuttle or arrows, or she wears the crown and holds arrows, a bow, and a sceptre in her left hand; she also appears in the form of a cow.[5] Sekhet was in Memphis the wife of Ptah, and the mother of Nefer-Tmu and of I-em-hetep.\n\nShe was the personification of the burning heat of the sun, and as such was the destroyer of the enemies of Ra and Osiris.\n\nWhen Ra determined to punish mankind with death, because they scoffed at him, he sent Sekhet, his \"eye,\" to perform the work of vengeance; illustrative of this aspect of her is a figure wherein she is depicted with the sun's eye for a head.[5] Usually [1.\n\nA good set of illustrations of this goddess will be found in Lanzone, op.\n\ncit.\n\n, tav.\n\n314 f.\n\n2.\n\n###.\n\nRecueil de Travaux , t.\n\niv., p.\n\n48 (l.\n\n427).\n\n3.\n\nPleyte, Chapitres supplémentaires du Livre des Morts (Chapp.\n\n162, 162,* 163), p.\n\n26.\n\n4.\n\nRecueil de Travaux , t.\n\niv., p.\n\n76 (l.\n\n627).\n\n5.\n\nSee Lanzone, op.\n\ncit.\n\n, tav.\n\n177.\n\n6.\n\nIbid.\n\n, op.\n\ncit.\n\n, tav.\n\n364.] {p.\n\ncxxi} she has the head of a lion surmounted by the sun's disk, round which is a uræus; and she generally holds a sceptre, but sometimes a knife.\n\nBast , according to one legend, was the mother of Nefer-Tmu.\n\nShe was the personification of the gentle and fructifying heat of the sun, as opposed to that personified by Sekhet.\n\nThe cat was sacred to Bast, and the goddess is usually depicted cat-headed.\n\nThe most famous seat of her worship was the city of Bubastis, the modern Tell Basta, in the Delta.\n\nNefer-Tmu was the son either of Sekhet or Bast, and he personified some form of the sun's heat.\n\nHe is usually depicted in the form of a man, with a cluster of lotus flowers upon his head, but sometimes he has the head of a lion; in the little faïence figures of him which are so common, he stands upon the back of a lion.[1] He no doubt represents the sun-god in the legend which made him to burst forth from a lotus, for in the pyramid of Unas the king is said to xaa em, Nefer-Tmu em sessen er sert Ra Rise like Nefer-Tmu from the lotus (lily) to the nostrils of Ra,\" and to \"come forth on the horizon every day.\"[2] Neheb-ka is the name of a goddess who is usually represented with the head of a serpent, and with whom the deceased identifies himself.\n\nSebak a form of Horus the sun-god, must be distinguished from Sebak the companion of Set, the opponent of Osiris; of each of these gods the crocodile was the sacred animal, and for this reason probably the gods themselves were confounded.\n\nSebak-Ra, the lord of Ombos, is usually depicted in human form with the head of a crocodile, surmounted by ###, ###, or ###, or ###.[3] Amsu or Amsi is one of the most ancient gods of Egypt.\n\nHe personified the power of generation, or the reproductive force of nature; he was the \"father of his own mother,\" and was identified with \"Horus the mighty,\" or with Horus the avenger of his father Un-nefer or Osiris.\n\nThe Greeks identified [1."

