[content]
body = "May Ani (21) advance, even as thou dost advance; may he never cease [to go forward], even as thy majesty ceaseth not [to go forward], even though it be for a moment; for with strides dost thou (22) in one little moment pass over the spaces which would need hundreds of thousands and millions of years [for man to pass over; this] thou doest, and then dost thou sink down.\n\nThou (23) puttest an end to the hours of the night, and thou dost number them, even thou; thou endest them in thine own appointed season, and the earth becometh light.\n\n(24) Thou settest thyself before thy handiwork[1] in the likeness of Ra;[1] thou risest in the horizon.\" [1.\n\nThere is a play on the words ### and ###.] {p.\n\n326} Osiris, the scribe Ani, triumphant, declareth his (25) praise of thee when thou shinest, and when thou risest at dawn he crieth in his joy at thy birth: (26) \"Thou art crowned with the majesty of thy beauties; thou mouldest thy limbs as thou dost advance, and thou bringest them forth without birth-pangs in the form of Ra (27), as thou dost climb up into the upper air.\n\nGrant thou that I may come unto the heaven which is everlasting, and unto the mountain [where dwell] thy favoured ones.\n\n(28) May I be joined unto those shining beings, holy and perfect, who are in the underworld; and may I come forth with them to behold thy beauties when thou shinest (29) at eventide and goest to thy mother Nut.\n\nNext: Plate XXI."

