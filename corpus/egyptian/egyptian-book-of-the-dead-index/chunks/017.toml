body = "Birch he was of opinion that the coffin certainly belonged to the IVth dynasty, and adduced in support of his views the fact of the existence of portions of a similar coffin of Seker-em-sa-f, a king of the VIth dynasty.\n\nRecently, however, an attempt has again been made ( Aeg.\n\nZeitschrift , Bd.\n\nXXX., p.\n\n94 ff.) to prove by the agreement of the variants in the text on the coffin of Mycerinus with those of texts of the XXVIth dynasty, that the Mycerinus text is of this late period, or at all events not earlier than the time of Psammetichus.\n\nBut it is admitted on all hands that in the XXVIth dynasty the Egyptians resuscitated texts of the first dynasties of the Early Empire, and that they copied the arts and literature of that period as far as possible, and, this being so, the texts on the monuments which have been made the standard of comparison for that on the coffin of Mycerinus may be themselves at fault in their variants.\n\nIf the text on the cover could be proved to differ as much from an undisputed IVth dynasty text as it does from those even of the VIth dynasty, the philological argument might have some weight; but even this would not get rid of the fact that the cover itself is a genuine relic of the IVth dynasty.] {p.\n\nxxii} Evidence of the texts of the pyramid of Unas.\n\ncelebration of funeral rites; but a text forming the Book of the Dead as a whole does not occur until the reign of Unas (B.C.\n\n3333), the last king of the dynasty, who according to the Turin papyrus reigned thirty years.\n\nThis monarch built on the plain of Sakkâra a stone pyramid about sixty-two feet high, each side measuring about two hundred feet at the base.\n\nIn the time of Perring and Vyse it was surrounded by heaps of broken stone and rubbish, the result of repeated attempts to open it, and with the casing stones, which consisted of compact limestone from the quarries of Tura.[1] In February, 1881, M.\n\nMaspero began to clear the pyramid, and soon after he succeeded in making an entrance into the innermost chambers, the walls of which were covered with hieroglyphic inscriptions, arranged in perpendicular lines and painted in green.[2] The condition of the interior showed that at some time or other thieves had already succeeded in making an entrance, for the cover of the black basalt sarcophagus of Unas had been wrenched off and moved near the door of the sarcophagus chamber; the paving stones had been pulled up in the vain attempt to find buried treasure; the mummy had been broken to pieces, and nothing remained of it except the right arm, a tibia, and some fragments of the skull and body.\n\nThe inscriptions which covered certain walls and corridors in the tomb were afterwards published by M.\n\nMaspero.[3] The appearance of the text of Unas[4] marks an era in the history of the Book of the Dead, and its translation must be regarded as one of the greatest triumphs of Egyptological decipherment, for the want of determinatives in many places in the text, and the archaic spelling of many of the words and passages presented difficulties which were not easily overcome.[6] Here, for the first time, it was shown that the Book of the Dead was no compilation of a comparatively late period in the history of Egyptian civilization, but a work belonging to a very remote antiquity; and it followed naturally that texts which were then known, and which were thought to be themselves original ancient texts, proved to be only versions which had passed through two or more successive revisions.\n\n[1.\n\nVyse, Pyramids of Gizeh , p.\n\n51 2."

