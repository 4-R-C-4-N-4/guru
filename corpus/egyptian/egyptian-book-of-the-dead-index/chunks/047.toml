body = "The never ending existence of the soul is asserted in a passage quoted above without reference to Osiris; but the frequent mention of the uniting of his bones, and of the gathering together of his members,[3] and the doing away with all corruption from his body, seems to show that the pious Egyptian connected these things with the resurrection of his own body in some form, and he argued that what had been done for him who was proclaimed to be giver and source of life must be necessary for mortal man.\n\nThe khat or physical body.\n\nThe physical body of man considered as a whole was called khat , a word which seems to be connected with the idea of something which is liable to decay.\n\nThe word is also applied to the mummified body in the tomb, as we know from the words \"My body ( khat ) is buried.\"[4] Such a body was attributed to the god Osiris;\" in the CLXIInd Chapter of the Book of the Dead \"his great [1.\n\nRecueil de Travaux , t.\n\nv., p.\n\n43 (l.\n\n304).\n\n2.\n\nHorrack, Lamentations d'Isis et de Nephthys , Paris, 1866, p.\n\n6.\n\n3.\n\nAlready in the pyramid texts we have \"Rise up, O thou Teta!\n\nThou hast received thy head, thou hast knitted together thy bones, thou hast collected thy members.\" Recueil de Travaux , t.\n\nv., p.\n\n40 (1.\n\n287).\n\n3.\n\nBook of the Dead, Chapter LXXXVI., 1.\n\n11.\n\n4.\n\nPapyrus of Ani, pl.\n\nvii., 1.\n\n28, and pl.\n\nxix., 1.\n\n8.] {p.\n\nlix} divine body rested in Annu.\"[1] In this respect the god and the deceased were on an equality.\n\nAs we have seen above, the body neither leaves the tomb nor reappears on earth; yet its preservation was necessary.\n\nThus the deceased addresses Tmu[2]: \"Hail to thee, O my father Osiris, I have come and I have embalmed this my flesh so that my body may not decay.\n\nI am whole, even as my father Khepera was whole, who is to me the type of that which passeth not away.\n\nCome then, O Form, and give breath unto me, O lord of breath, O thou who art greater than thy compeers.\n\nStablish thou me, and form thou me, O thou who art lord of the grave.\n\nGrant thou to me to endure for ever, even as thou didst grant unto thy father Tmu to endure; and his body neither passed away nor decayed.\n\nI have not done that which is hateful unto thee, nay, I have spoken that which thy ka loveth: repulse thou me not, and cast thou me not behind thee, O Tmu, to decay, even as thou doest unto every god and unto every goddess and unto every beast and creeping thing which perisheth when his soul hath gone forth from him after his death, and which falleth in pieces after his decay .\n\n.\n\n.\n\n.\n\n.\n\nHomage to thee, O my father Osiris, thy flesh suffered no decay, there were no worms in thee, thou didst not crumble away, thou didst not wither away, thou didst not become corruption and worms; and I myself am Khepera, I shall possess my flesh for ever and ever, I shall not decay, I shall not crumble away, I shall not wither away, I shall not become corruption.\" The sahu or spiritual body.\n\nBut the body does not lie in the tomb inoperative, for by the prayers and ceremonies on the day of burial it is endowed with the power of changing into a sahu , or spiritual body."

