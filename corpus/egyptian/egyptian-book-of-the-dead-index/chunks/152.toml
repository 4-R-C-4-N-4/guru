body = "He shall (5) enter into the Fields of Aaru in peace, to learn the bidding of him who dwelleth in Tattu; (6) there shall wheat and barley be given unto him; there shall he flourish as he did upon (7) earth; and he shall do whatsoever pleaseth him, even as [do] the gods who are in the underworld, (8) for everlasting millions of ages, world without end.\n\nAppendix: The text of Chapter LXXII.\n\ndoes not occur in the Papyrus of Ani.\n\nIt is given by M.\n\nNaville (see Todtenbuch , I., Bl.\n\n84) from, a papyrus in the Louvre.\n\nIn the vignettes which accompany it, the deceased is represented as adoring three gods, who are either standing in a shrine or are seated upon it.\n\nIn other instances, the deceased stands by a sepulchral chest or outside a pylon with hands raised in adoration.\n\nThe following is a translation of the Louvre text:-- (1) CHAPTER OF COMING FORTH BY DAY AND OF PASSING THROUGH THE AMMAHET.\n\n(2) \"Homage to you, O ye lords of kas , ye lords of right and truth, infallible, who shall endure for ever and shall exist through countless ages, grant that (3) 1 may enter into your [presence].\n\nI, even I, am pure and holy, and I have gotten power over the spells which are mine.\n\njudgment (4) hath been passed [1.\n\nA variant gives the reading ### (Naville, Todtenbuch , Bd.\n\nIL, Bl.\n\n84).\n\nFor the situation of the pool, see Brugsch, Dict.\n\nGéog , p.\n\n359.\n\n2 The following lines of text form the XXIst chapter of the Saïte recension of the Book of the Dead.\n\nSee Lepsius, Todtenbuch , plate xiv.; and Pierret, Le Livre des Morts , p.\n\n91.\n\n3 Compare ###.\n\n4 The chapter which Lepsius has numbered XXIII., as being most closely connected with the XXIInd chapter, and which refers to the opening of the mouth of the deceased, follows on Plate XV.] {p.\n\n276} upon me in my glorified form.\n\nDeliver ye me from the crocodile which is in the place of the lords of right and truth.\n\nGrant ye unto me (5) my mouth that I may speak therewith.\n\nMay offerings be made unto me in your presence, for I know you and I know your names, and I know (6) the name of the great god.\n\nGrant ye abundance of food for his nostrils.\n\nThe god Rekem passeth through the western horizon of heaven.\n\nHe (7) travelleth on, and I travel on he goeth forth, and I go forth.\n\nLet me not be destroyed in the place Mesqet let not the Fiend get the mastery over me; let me not be driven back from your gates; (8) let not your doors be shut against me; for I have [eaten] bread in Pe and I have drunken ale in Tepu.\n\nIf my arms be fettered in the (9) holy habitation, may my father Tmu stablish for me my mansion in the place above [this] earth where there are wheat and barley in abundance which cannot be told.\n\nMay feasts be made for me there, for my soul and for my (10) body.\n\nGrant me even offerings of the dead, bread, and ale, and wine, oxen, and ducks, linen bandages and incense, wax, and all the good and fair and pure things whereby the gods do live.\n\nMay I rise again in all the forms which (11) I desire without fail and for ever."

