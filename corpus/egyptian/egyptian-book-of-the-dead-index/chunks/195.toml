[content]
body = "Shine with thy rays of light upon my body day by day, upon me, (15) Osiris, the scribe, the teller of the divine offerings it of all the gods, the overseer of the granary of the lords of Abydos, the royal it scribe in truth, who loveth him ( i.e.\n\n, Ra); Ani, triumphant in peace.\" Vignette: Ani, standing with both hands raised in adoration.\n\nBehind him is his wife: Ausar nebt per qematet en Amen Thuthu.\n\nOsiris, the lady of the house, priestess of Amen, Thuthu.\n\nText [CHAPTER XV.]: (1) A HYMN OF PRAISE.\n\n\"O OSIRIS, lord of eternity, Un-nefer, Horus of the two horizons, whose forms are manifold, whose creations are without number, (2) Ptah-Seker-Tem in Annu, the lord of the tomb, and the creator of Memphis and of the gods, the guide of the underworld, whom [the gods] (3) glorify when thou settest in Nut.\n\nIsis embraceth thee in peace, and she driveth away the fiends from the mouth of (4) thy paths.\n\nThou turnest thy face upon Amenta, thou makest the world to shine as with smu metal.\n\nThe dead rise up to behold thee, they breathe the (5) air and they look upon thy face when the disk shineth on its horizon; their hearts are at peace for that they behold thee, O thou who art eternity and everlastingness.\" [Litany]: (1) \"Homage to thee, [O lord of] starry deities in An, and of heavenly beings in Kher-aba; thou god Unti, who art more glorious than the gods who are hidden in Annu.\n\n\"(2) Homage to thee, O An in Antes (?), Horus, thou dweller in both horizons, with long strides thou stridest over heaven, O thou who dwellest in both horizons.\n\n\"(3) Homage to thee, O soul of everlastingness, thou Soul who dwellest in Tattu, Un-nefer, son of Nut; thou art lord of Akert.\n\n\"(4) Homage to thee in thy dominion over Tattu; the urerit crown is established upon thy head; thou art the One whose strength is in himself, and thou dwellest in peace in Tattu.\n\n\"(5) Homage to thee, O lord of the acacia tree, the Seker boat is set upon its sledge; thou turnest back the Fiend, the worker of evil, and thou causest the utchat to rest upon its seat.\n\n\"(6) Homage to thee, O thou who art mighty in thine hour, thou great and mighty god, dweller in An-rut-f, lord of eternity and creator of everlastingness; thou art the lord of Suten-henen.\n\n\"(7) Homage to thee, O thou who restest upon Right and Truth, thou art the lord of Abtu, and thy limbs are joined unto Ta-sertet; thou art he to whom fraud and guile are hateful.\n\n\"(8) Homage to thee, O thou who art within thy boat, thou bringest Hapi ( i.e.\n\n, the Nile) forth from his source; the light shineth upon thy body, and thou art the dweller in Nekhen.\n\n\"(9) Homage to thee, O creator of the gods, thou King of the North and of the South; O Osiris, victorious, ruler of the world in thy gracious seasons; thou art the lord of the world."

