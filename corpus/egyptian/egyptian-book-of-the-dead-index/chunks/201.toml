[content]
body = "Sacred Texts Egypt Index Previous Next PLATE XXII.\n\n\"Osiris Ani, triumphant, hath not revealed what he hath seen,(17) he hath not, he hath not told again what he hath heard in the house which is hidden.\n\nHail, there are shouts of joy to Osiris Ani, triumphant, (18) for he is a god and the flesh of Ra, he is in the boat of Nu, and his ka is well pleased according to the will of the god.\n\n(19) Osiris Ani, triumphant, is in peace, he is triumphant like unto Horus, and he is mighty because he hath divers forms.\" Vignette: Ra seated in a boat, sailing across the sky towards the starstudded heaven.\n\nRubric: These words shall be recited over a boat (20) seven cubits in length, and painted green for the godlike rulers.\n\nThen shalt thou make a heaven of stars (21) washed and purified with natron and incense.\n\nBehold, thou shalt make an image (22) of Ra upon a table of stone painted yellow (?), and it shall be placed in the fore-part of the boat.\n\n(23) Behold, thou shalt make an image of the dead man whom thou wilt make perfect in strength (24) in the boat; and thou shalt make it to travel in the divine boat of Ra, (25) and Ra himself will look upon it therein.\n\nThou shalt show it to no man but thyself, (26) or to thy father or to {p.\n\n329} thy son; let them watch with their faces, and he shall be seen in the underworld as a messenger of Ra.\n\nVignette: Ra, hawk-headed, with a disk upon his head, seated in a boat; before him is a large disk.\n\nText [CHAPTER CXXXIV.]: (I) A HYMN OF PRAISE TO RA ON THE DAY OF THE MONTH WHEREON HE SAILETH IN THE BOAT.\n\n[Osiris, the scribe Ani, saith]: \"Homage to thee, O thou who art in thy boat!\n\nThou risest, thou risest, (2) thou shinest with thy rays, and thou hast made mankind to rejoice for millions of years according to thy will.\n\nThou showest thy face unto the beings whom thou hast created, O Khepera, (3) in thy boat.\n\nThou hast overthrown Apepi.\n\nO ye children of Seb, overthrow ye the foes of Osiris (4) Ani, triumphant, destroy ye the adversaries of righteousness from the boat of Ra.\n\nHorus shall cut off your (5) heads in heaven in the likeness of ducks; ye shall fall down upon the earth and become beasts, and into the water in the likeness of fishes.\n\n[Osiris, the scribe Ani,] destroyeth every hostile fiend, male (6) and female, whether he passeth through heaven, [or] appeareth (7) upon earth, or cometh forth upon the water, or passeth along before the starry deities; and Thoth strengtheneth them .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n(8) coming forth from Anreti.\n\nOsiris, the scribe Ani, is silent, and becometh the second of Ra.\n\nBehold thou the god, the great slaughterer, (9) greatly to be feared, he washeth in your blood, he batheth in your gore; Osiris, (10) the scribe Ani, destroyeth them from the boat of his father Ra-Horus."

