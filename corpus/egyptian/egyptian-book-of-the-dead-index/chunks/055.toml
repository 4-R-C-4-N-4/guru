body = "They believed in an incorporeal and immortal part of man, the constituent elements of which flew to heaven after death and embalmment; yet the theologians of the VIth dynasty had decided that there was some part of the deceased which could only mount to heaven by means of a ladder.\n\nIn the pyramid of Teta it is said, \"When Teta hath purified himself on the borders of this earth where Ra hath purified himself, he prayeth and setteth up the ladder, and those who dwell in the great place press Teta forward with their hands.\"[3] In the pyramid of Pepi I.\n\n[1.\n\nE.g.\n\n, \"This Pepi goeth forth with his flesh.\" Recueil de Travaux , t.\n\nv., p.\n\n185, l.\n\n169.\n\n2.\n\nThe Osiris consisted of all the spiritual parts of a man gathered together in a form which resembled him exactly.\n\nWhatever honour was paid to the mummified body was received by its Osiris, the offerings made to it were accepted by its Osiris, and the amulets laid upon it were made use of by its Osiris for its own protection.\n\nThe sahu , the ka , the ba , the khu , the khaibit , the sekhem , and the ren were in primeval times separate and independent parts of man's immortal nature; but in the pyramid texts they are welded together, and the dead king Pepi is addressed as \"Osiris Pepi.\" The custom of calling the deceased Osiris continued until the Roman period.\n\nOn the Osiris of a man, see Wiedemann, Die Osirianische Unsterblichkeitslehre (in Die Religion der alten Aegypter , p.\n\n128).\n\n3.\n\n###.\n\nMaspero, Recueil de Travaux , t.\n\nv., p.\n\n7, l.\n\n36.] {p.\n\nlxxi} the king is identified with this ladder: \"Isis saith, 'Happy are they who see the 'father,' and Nephthys saith, 'They who see the father have rest,' speaking unto the father of this Osiris Pepi when he cometh forth unto heaven among the stars and among the luminaries which never set.\n\nWith the uræus on his brow, and his book upon both his sides, and magic words at his feet, Pepi goeth forward unto his mother Nut, and he entereth therein in his name Ladder.\"[1] The gods who preside over this ladder are at one time Ra and Horus, and at another Horus and Set.\n\nIn the pyramid of Unas it is said, \"Ra setteth upright the ladder for Osiris, and Horus raiseth up the ladder for his father Osiris, when Osiris goeth to [find] his soul; one standeth on the one side, and the other standeth on the other, and Unas is betwixt them.\n\nUnas standeth up and is Horus, he sitteth down and is Set.\"[2] And in the pyramid of Pepi I.\n\nwe read, \"Hail to thee, O Ladder of God, hail to thee, O Ladder of Set.\n\nStand up, O Ladder of God, stand up, O Ladder of Set, stand up, O Ladder of Horus, whereon Osiris went forth into heaven .\n\n.\n\n.\n\n.\n\n.\n\n.\n\nThis Pepi is thy son, this Pepi is Horus, thou hast given birth unto this Pepi even as thou hast given birth unto the god who is the lord of the Ladder.\n\nThou hast given him the Ladder of God, and thou hast given him the Ladder of Set, whereon this Pepi hath gone forth into heaven .\n\n.\n\n.\n\n.\n\n.\n\n."

