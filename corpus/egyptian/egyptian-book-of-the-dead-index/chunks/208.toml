[content]
body = "335} done unto me holy (37) hidden rites, I shall see what is there; my words shall make full the majesty of Shu, and they shall drive away evil hap.\n\n(38) I, even I, am Horus who dwell in splendours.\n\nI have gained power over his crown, I have gained power over his radiance (39), and I have travelled over the remotest parts of heaven.\n\nHorus is upon his throne, Horus is upon his seat.\n\nMy (40) face is like unto that of a divine hawk.\n\nI am one who hath been armed by his lord.\n\nI have come forth from Tattu.\n\nI have seen Osiris, I have risen up on (41) either side of him.\n\nNut [hath shrouded me].\n\nThe gods behold me, and I have beheld the gods.\n\nThe eye of Horus hath consumed me, who dwell in darkness.\n\nThe gods (42) stretch forth their arms unto me.\n\nI rise up, I get the mastery, and I drive back evil which opposeth me.\n\nThe gods open unto me the holy (43) way, they see my form, and they hear my words which I utter in their presence.\n\nO ye gods of the underworld, who set yourselves up against me, (44) and who resist the mighty ones, the stars which never set have led me on my way.\n\nI have passed along the holy paths of the hemtet chamber unto your lord, (45) the exceedingly mighty and terrible Soul.\n\nHorus hath commanded that ye lift up your faces to (46) look upon me.\n\nI have risen up in the likeness of a divine hawk, and Horus hath set me apart in the likeness of his own soul, to take possession of that which belongeth unto Osiris in the underworld.\n\n(47) I have passed along the way, I have travelled on and I have come even among those who live in their hiding places and who guard the house of Osiris.\n\n(48) 1 speak unto them of his power and I make them to know the terrible power of him that is provided with two horns [to fight] against Sut; and they (49) know who hath carried off the sacred food which the power (?) of Tmu had brought for him.\n\nThe gods of the underworld have proclaimed (50) a happy coming for me.\n\nO Ye who live in your hiding places and who guard the house of Osiris, and who have magnified your names, (51) grant ye that I may come unto you.\n\nI bind together and I gather up your powers, and I order the strength of the paths of those who guard the (52) horizon of the hemtet of heaven.\n\nI have stablished their habitations for Osiris, I have ordered his ways, I have done what hath been bidden.\n\n(53) I have come forth from Tattu, I have beheld Osiris, I have spoken unto him concerning the things of his son, the divine Prince whom he loveth.\n\nThere is a wound in the heart of Set, (54) and I have seen him who is without Next: Plate XXVII."

