body = "The Chapter of not going in to the divine block a second time.\n\nVignette: A man standing with his back to the block.[1] Chapter LI.\n\nThe Chapter of not walking upside down in the underworld.\n\nVignette: A man standing.\n\nChapter LII.* The Chapter of not eating filth in the underworld.\n\nThis Chapter has no vignette.\n\nChapter LIII.\n\nThe Chapter of not allowing a man to eat filth and to drink polluted water in the underworld.\n\nThis Chapter has no vignette.\n\nChapter LIV.\n\nThe Chapter of giving air in the underworld.\n\nThis Chapter has no vignette.\n\nChapter LV.\n\nAnother Chapter of giving air.\n\nVignette: The deceased holding a sail in each hand.[2] Chapter LVI.\n\nThe Chapter of snuffing the air in the earth.\n\nVignette: The deceased kneeling, and holding a sail to his nose.\n\nChapter LVII.\n\nThe Chapter of snuffing the air and of gaining the mastery over the waters in the underworld.\n\nVignette: A man holding a sail, and standing in a running stream.\n\nChapter LVIII.* The Chapter of snuffing the air and of gaining power over the water which is in the underworld.\n\nVignette: The deceased holding a sail.\n\nChapter LIX.\n\nThe Chapter of snuffing the air and of gaining power over the water which is in the underworld.\n\nVignette: The deceased standing with his hands extended.\n\nChapters LX., LXI., LXII.\n\nThe Chapters of drinking water in the under world.\n\n[1.\n\nLepsius, Todtenbuch , Bl.\n\n21.\n\n2.\n\nA variant vignette of Chapters LV.\n\nand XXXVIII.\n\nrepresents the deceased being led into the presence of Osiris by Anubis; see Naville, Todtenbuch , Bd.\n\nI., Bl.\n\n68.] {p.\n\nxxxvii} Theban version: list of chapters.\n\nVignettes: The deceased holding a lotus; the deceased holding his soul in his arms; and the deceased scooping water into his mouth from a pool.\n\nChapter LXIII A .\n\nThe Chapter of drinking water, and of not being burnt with fire.\n\nVignette: The deceased drinking water from a stream.\n\nChapter LXIII B .\n\nThe Chapter of not being boiled (or scalded) in the water.\n\nVignette: The deceased standing by the side of two flames.\n\nChapter LXIV.\n\nThe Chapter of coming forth by day in the underworld.\n\nVignette: The deceased adoring the disk, which stands on the top of a tree.\n\nChapter LXV.\n\n[The Chapter of] coming forth by day, and of gaining the mastery over foes.\n\nVignette: The deceased adoring Ra.\n\nChapter LXVI.\n\n[The Chapter of] coming forth by day.\n\nThis Chapter has no vignette.\n\nChapter LXVII.\n\nThe Chapter of opening the doors of the tuat and of coming forth by day.\n\nThis Chapter has no vignette.\n\nChapter LXVIII.\n\nThe Chapter of coming forth by day.\n\nVignette: The deceased kneeling by the side of a tree before a goddess.[1] Chapter LXIX.\n\nAnother Chapter.\n\nChapter LXX.\n\nAnother Chapter.\n\nChapter LXXI.\n\nThe Chapter of coming forth by day.\n\nVignette: The deceased with both hands raised in adoration kneeling before the goddess Meh-urt.[2] Chapter LXXII.\n\nThe Chapter of coming forth by day and of passing through the hall of the tomb.\n\nVignette: The deceased adoring three gods.\n\nChapter LXXIII.\n\n(This Chapter is now known as Chapter IX.) Chapter LXXIV.\n\nThe Chapter of lifting up the legs and coming forth upon earth.\n\nVignette: The deceased standing upright.\n\nChapter LXXV.\n\nThe Chapter of travelling to Annu (On), and of receiving an abode there.\n\n[1."

