body = "Sacred Texts Egypt Index Previous Next PLATES XXXI.\n\nAND XXXII.\n\nVignettes: The Hall of Double Right and Truth, wherein Ani has to address severally the forty-two gods, who are seated in a row in the middle of the, hall.\n\nAt each end is a door that on the right is called \"Neb-Maat-heri-tep-retui-f\" and that on the left \"Neb-pehti-thesu-menment.\" On the centre of the roof, which is crowned with {p.\n\n347} a series of uræi and feathers emblematic of Maat, is a seated deity with hands extended, the right over the eye of Horus and the left over a pool (see the Vignette of Plate VIII.\n\nabove, p.\n\n278).[1] On the right, at the end of the hall (Plate XXXII.), are four small vignettes, in which are depicted: (1) Two seated figures of the goddess Maat, with emblematic of Right and Truth, on the head, and sceptres and emblems of life in the right and left hands.\n\n(2) Osiris, seated, wearing the atef crown, and holding in his hands the crook and flail.\n\nBefore him, by the side of an altar of offerings, stands Ani, with both hands raised in adoration.\n\n(3) A balance with the heart, symbolizing the conscience of Ani, in one scale, and emblematic of Right and Truth, in the other.\n\nBeside the balance is the tri-formed monster Amemit.\n\n(4) Thoth, ibis-headed, seated on a pylon-shaped pedestal, painting a large feather of Maat.\n\nText: [THE NEGATIVE CONFESSION.] (1) Ani saith: \"Hail, thou whose strides are long, who comest forth from Annu, I have not done iniquity.\" (2) \"Hail, thou who art embraced by flame, who comest forth from Kheraba, I have not robbed with violence.\" (3) \"Hail, Fentiu, who comest forth from Khemennu, I have not stolen.\" (4) \"Hail, Devourer of the Shade, who comest forth from Qernet, I have done no murder; I have done no harm.\" (5) \"Hail, Nehau, who comest forth from Re-stau, I have not defrauded offerings.\" (6) \"Hail, god in the form of two lions, who comest forth from heaven, I have not minished oblations.\" (7) \"Hail, thou whose eyes are of fire, who comest forth from Saut, I have not plundered the god.\" (8) \"Hail, thou Flame, which comest and goest, I have spoken no lies.\" (9) \"Hail, Crusher of bones, who comest forth from Suten-henen, I have not snatched away food.\" (10) \"Hail, thou who shootest forth the Flame, who comest forth from Het-Ptah-ka, I have not caused pain.\" [1.\n\nIn the Nebseni Papyrus a dog-headed ape and a balance are represented on each side of the seated deity, and at each end of the roof; and each uræus wears a disk and horns.] {p."

