body = "Sacred Texts Egypt Index Previous Next PLATE XIX.\n\nVignette: Ani standing, with both hands raised in adoration, before Ra, hawk-headed and seated in a boat floating upon the sky.\n\nOn the bows sits Heru-pa-khrat (Harpocrates) or, \"Horus the child\"; and the side is ornamented with feathers of Maat, and the utchat .\n\nThe handles of the oars and the tops of the rowlocks are shaped as hawks' heads, and on the blades of the oars are ###.\n\nText [CHAPTER XV.]: (I) A HYMN OF PRAISE TO RA WHEN HE RISETH UPON THE HORIZON, AND WHEN HE SETTETH IN THE [LAND OF] LIFE.\n\nSaith Osiris, the scribe Ani: \"Homage to thee, O Ra, (2) when thou risest [as] Tmu-Heru-khuti (Harmachis), Thou art adored [by me] when thy beauties are before mine eyes, and when thy shining rays (3) [fall] upon my body.\n\nThou goest forth in peace in the Sektet boat with [fair] winds, and thy heart is glad; [thou goest forth] in the Atet boat, (4) and its heart is glad.\n\nThou stridest over the heavens in peace, and thy foes are cast down; the never-resting stars (5) sing hymns of praise unto thee, and the stars which never set glorify thee as thou (6) sinkest in the horizon of Manu, O thou who art beautiful in the two parts of heaven, thou lord who livest and art established, O my lord!\n\nHomage to thee, O thou who art Ra when thou risest, and Tmu (7) when thou settest in beauty.\n\nThou risest and shinest upon the back of thy mother [the sky], O thou who art crowned king (8) of the gods.\n\nNut doth homage unto thee, and everlasting and never-changing order embraceth thee at morn and at eve.\n\nThou stridest over the heaven, being glad of heart, and the Lake (9) Testes is at peace.\n\nThe Fiend hath fallen to the ground; his arms and his hands have been hewn off, and the knife hath severed the joints of his body.\n\nRa hath a fair wind (10); the Sektet boat goeth forth and sailing along it cometh into port.\n\nThe gods of the south and of the north, of the west and of the east praise thee, (11) from whom all forms of life came into being.\n\nThou sendest forth the word, and the earth is flooded with silence, O thou only One, who livedst in heaven before ever the earth and the mountains were made.\n\n(12) O Runner, Lord, only One, thou maker of things which are, thou hast moulded the tongue of the company of the gods, thou hast drawn forth whatsoever cometh from the waters, and thou springest up from them over the flooded land of the Lake of Horus (13).\n\nMake me to sniff the air which cometh forth from thy nostrils, and the north wind which cometh forth from thy mother [the Sky].\n\nMake thou glorious my shining form, O Osiris, make thou (14) strong my soul.\n\nThou art worshipped in peace, O lord of the gods, thou art exalted by reason of thy wondrous works."

