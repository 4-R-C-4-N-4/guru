[content]
body = "He to whom saffron cakes have been brought in (127) Tanenet is Osiris; or (as others say), The saffron cakes (128) in Tanenet are heaven and earth, or (as others say), They are Shu, strengthener of the two lands in (129) Suten-henen.\n\nThe saffron cakes are the eye of Horus; and Tanenet is the grave (110) of Osiris.\n\nTmu hath built thy house, and the two-fold Lion-god hath founded thy habitation; (131) lo!\n\ndrugs are brought, and Horus purifieth and Set strengtheneth, and Set purifieth and Horus strengtheneth.\n\n(132) \"The Osiris, the scribe Ani, triumphant before Osiris, hath come into the land, and hath possessed it with his feet.\n\nHe is Tmu, and he is in the city.\" (133) \"Turn thou back, O Rehu, whose mouth shineth, whose head moveth, turn thou back from before his strength\"; or (as others say), Turn thou back from him who keepeth watch (134) and is unseen.\n\n\"The Osiris Ani is safely guarded.\n\nHe is Isis, and he is found (135) with [her] hair spread over him.\n\nI shake it out over his brow.\n\nHe was conceived in Isis and begotten in (136) Nephthys; and they cut off from him the things which should be cut off.\" Fear followeth after thee, terror is upon thine (137) arms.\n\nThou art embraced for millions of years in the arms [of the nations]; mortals go round about thee.\n\nThou smitest down the mediators of thy (138) foes, and thou seizest the arms of the powers of darkness.\n\nThe two sisters ( i.e.\n\n, Isis and Nephthys) are given to thee for thy delight.\n\n(139) Thou hast created that which is in Kheraba, and that which is in Annu.\n\nEvery god feareth thee, for thou art exceeding great and terrible; thou [avengest] every (140) god on the man that curseth him, and thou shootest out arrows .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nThou livest according to thy will; thou art Uatchit, the Lady of Flame.\n\nEvil cometh (141) among those who set themselves up against thee.\n\n{p.\n\n291} What then is this?\n\nThe hidden in form, granted of Menhu, (142) is the name of the tomb.\n\nHe seeth [what is] in [his] hand, is the name of the shrine, or (143) (as others say), the name of the block.\n\nNow he whose mouth shineth and whose head moveth is (144) a limb of Osiris, or (as others say), of Ra.\n\nThou spreadest thy hair and I shake it out over his brow (145) is spoken concerning Isis, who hideth in her hair and draweth her hair over her.\n\nUatchi, the Lady of Flames, is the eye of Ra.[1] Next: Plates XI.\n\nand XII."

