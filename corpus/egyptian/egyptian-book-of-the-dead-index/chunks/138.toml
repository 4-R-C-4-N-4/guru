[content]
body = "Sacred Texts Egypt Index Previous Next PLATE IV.\n\nVignette: Ani, found just, is led into the presence of Osiris.\n\nOn the left the hawk-headed god Horus, the son of Isis, wearing the double crown of the North and the South, takes Ani by the hand and leads him forward towards \"Osiris, the lord of eternity\" Ausar neb t'etta , who is enthroned on the right within a shrine in the form of a funereal chest.\n\nThe god wears the atef crown with plumes; a menat (see p.\n\n245, note 2) hangs from the back of his neck; and he holds in his hands the crook, sceptre, and flail, emblems of sovereignty and dominion.\n\nHe is wrapped in bandages ornamented with scale work.\n\nThe side of his throne is painted to resemble the doors of the tomb.\n\nBehind him stand Nephthys on his right hand and Isis on his left.\n\nFacing him, and standing on a lotus flower, are the four \"children of Horus ( or Osiris),\" or gods of the cardinal points.\n\nThe first, Mestha, has the head of a man; the second, Hapi, the head of an ape; the third, Tuamautef, the head of a jackal; and the fourth, Qebhsennuf, the head of a hawk.\n\nSuspended near the lotus is an object which is usually called a panther's skin,[1] but is more probably a bullock's hide.\n\nThe roof of the shrine is supported on pillars with lotus capitals, and is surmounted by a figure of Horus-Sept or Horus-Seker and rows of uræi.\n\nIn the centre Ani kneels before the god upon a reed mat, raising his right hand in adoration, and holding in his left hand the kherp sceptre.\n\nHe wears a whitened wig surmounted by a \"cone,\" the signification of which is unknown.\n\nRound his neck is a deep collar of precious stones.\n\nNear him stands a table of offerings of meat, fruit, flowers, etc., and in the compartments above are a number of vessels for wine, beer, oil, wax, etc., together with bread, cakes, ducks, a wreath, and single flowers.\n\n[1.\n\nOn the bullock's hide, in which the deceased, or the person who represented him, was supposed to wrap himself, see Virey, Tombeau de Rekhmara , p.\n\n50, and plate 26, lower register.] {p.\n\n260} Appendix: The shrine is in some instances represented in the shape of a pylon, the cornice of which is ornamented either with uræi, or with the disk of the sun and feathers, emblematic of Maat.\n\nIt usually rests upon a base made in the shape of a cubit, The throne upon which Osiris sits is placed upon reed mats (British Museum papyrus No.\n\n10,471), or upon the cubit-shaped base, or in a pool of water, from which springs a lotus flower with buds and having the four gods of the cardinal points (see British Museum papyrus No.\n\n9901) standing upon it.\n\nIn some of the oldest papyri the body of Osiris is painted white, and he stands upright.\n\nIsis is described as \"great lady, divine mother,\" and Nephthys as \"the mistress of the underworld.\" In British Museum papyrus No.\n\n10471 the scene of the presentation of the deceased to Osiris is unusual and of interest.\n\nOn the right the scribe Nekht and his wife Thuau stand with both hands raised in adoration of Osiris."

