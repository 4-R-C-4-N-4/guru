body = "Sacred Texts Egypt Index Previous Next PLATES V.\n\nAND VI.\n\nVignettes: The funereal procession to the tomb; running the length of the two plates.\n\nIn the centre of Plate V.\n\nthe mummy of the dead man is seen lying in a chest or shrine mounted on a boat with runners, which is drawn by oxen.\n\nIn the boat, at the head and foot of the mummy, are two small models of Nephthys and Isis.\n\nBy the side kneels Ani's wife Thuthu, lamenting.\n\nIn front of the boat is the Sem priest burning incense in a censer,[3] and pouring out a libation from a vase; he wears his characteristic dress, a panther's skin.\n\nEight mourners follow.\n\none of whom has his hair whitened.\n\nIn the rear a sepulchral ark or chest[4] surmounted.\n\nby a figure of Anubis and ornamented with emblems of \"protection\" and \"stability,\" is drawn on a sledge by four attendants, and is followed by two others.\n\nBy their side walk other attendants carrying Ani's palette, boxes, chair, couch, staff, etc.\n\nIn Plate VI.\n\nthe procession is continued up to the tomb.\n\nIn the centre is a [1.\n\n\"Thou goest forth over heaven in three-fold peace [in] thy sektet boat; when thou showest thy face .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nthee.\" 2.\n\n\"He giveth to thee thine eyes to see therewith, and thine cars [to hear therewith].\" 3.\n\nFor a bronze censer similar in shape, see No.\n\n5296 a, Fourth Egyptian Room.\n\n4.\n\nIt is similar in shape to the chests which held the four jars containing the mummied intestines of the deceased.\n\nFor examples of them see Nos.\n\n8543a, 8543b in the Third Egyptian Room.] {p.\n\n264} group of wailing women, followed by attendants carrying on yokes boxes of flowers, vases of unguents, etc.\n\nIn the right centre are a cow with her calf, chairs of painted wood with flowers upon them, and an attendant with shaven head, carrying a haunch, newly cut, for the funereal feast.\n\nThe group on the right is performing the last rites.\n\nBefore the door of the tomb stands the mummy of Ani to receive the final honours; behind him, embracing him, stands Anubis, the god of the tomb; and at his feet, in front, kneels Thuthu to take a last farewell of her husband's body.\n\nBefore a table of offerings stand two priests: the Sem priest, who wears a panther's skin, holding in his right hand a libation vase, and in his left a censer; and a priest holding in his right hand an instrument[1] with which he is about to touch the mouth and eyes of the mummy, and in his left the instrument for \"opening the mouth.\"[2] Behind or beside them on the ground, in a row, lie the instruments employed in the ceremony of \"opening the mouth,\"[2] etc., the mesxet instrument, the sepulchral box, the boxes of purification, the bandlet, the libation vases, the ostrich feather and the instruments called Seb-ur , Temanu or Tun-tet , and the Pesh-en-kef .\n\nThe Kher-heb priest stands behind reading the service of the dead from a papyrus.\n\nAppendix: In the papyrus of Hunefer a slab or stele with rounded top is placed by the door of the tomb (Fig.\n\n1, p.\n\n265)."

