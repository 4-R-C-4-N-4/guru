[content]
body = "(PLATE XXIX.): Ani and his wife Thuthu standing, with hands raised in adoration to Osiris, before a table of offerings.\n\nText [CHAPTER CXXV.]: (1) THE CHAPTER OF ENTERING INTO THE HALL OF DOUBLE RIGHT AND TRUTH: A HYMN OF PRAISE TO OSIRIS, THE DWELLER IN AMENTET.\n\nOsiris, the scribe Ani, triumphant, saith: (2) \"I have come and I have drawn nigh to see thy beauties; my two hands are raised in adoration of thy name Right and Truth.\n\nI have drawn nigh unto the place where the acacia tree groweth not, (3) where the tree thick with leaves existeth not, and where the ground yieldeth neither herb nor grass.\n\nAnd I have entered in unto the place of secret and hidden things, (4) 1 have held converse with the god Sut .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nOsiris, the scribe Ani, hath entered into the House of Osiris, and he hath seen the hidden (5) and secret things which are therein.\n\nThe holy rulers of the pylons are in the form of shining ones.\n\n(6) Anubis spake unto him with the speech of man when he came from Ta-mera, saying, 'He knoweth our paths and our cities, I have been pacified, (7) and the smell of him is to me even as the smell of one of you.'\" Ani saith unto him: \"I am Osiris, the scribe Ani, triumphant in peace, triumphant!\n\n(8) I have drawn nigh to behold the great gods, and I feed upon the meals of sacrifice whereon their kas feed.\n\nI have been to the boundaries [of the {p.\n\n345} lands] (9) of the Ram, the lord of Tattu, and he hath granted that I may come forth as a bennu bird and that I may have the power of speech.\n\nI have passed through the river-flood.\n\nI have made (10) offerings with incense.\n\nI have made my way by the side of the thick-leaved tree of the children (?).\n\nI have been in Abtu in the House of Satet.\n\n(11) I have flooded and I have sunk the boat of my enemies.\n\nI have sailed forth upon the Lake in the neshem boat.\n\nI have seen the noble (12) ones of Kam-ur.\n\nI have been in Tattu, and I have constrained myself to silence.\n\nI have set the divine Form upon his two feet.\n\n(13) I have been with the god Pa-tep-tu-f, and I have seen the dweller in the Holy Temple.\n\nI have entered into the House (14) Of Osiris, and I have arrayed myself in the apparel of him who is therein.\n\nI have entered into Re-stau, and I have beheld the hidden things (15) which are therein.\n\nI have been swathed, but I found for myself a thoroughfare.\n\nI have entered into An-aarut-f, and I have clothed my body with the apparel (16) which is therein.\n\nThe antu unguent of women hath been given unto me .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n."

