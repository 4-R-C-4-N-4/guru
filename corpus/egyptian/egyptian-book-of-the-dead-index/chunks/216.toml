[content]
body = "Horus is established upon his throne, amid the friends [of Osiris] and all that belonged unto him.\n\nVerily the soul of Sut, which (22) is greater than all the gods, hath departed to [Amenta].\n\nMay it be granted that I bind his soul in the divine boat (23) at my will .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\nO my Osiris, thou hast done for me that which thy father {p.\n\n343} Ra did for thee.\n\nMay I abide upon the earth lastingly; (24) may I keep possession of my throne; may my heir be strong; may my tomb and my friends who are upon earth flourish; (25) may my enemies be given over to destruction and to the shackles of the goddess Serq!\n\nI am thy son, and Ra is my father (26).\n\nFor me likewise hast thou made life, strength and health.\n\nHorus is established upon his throne.\n\nGrant that the days of my life may come unto worship and honour.\" Appendix: From the fragmentary copy of this chapter which M.\n\nNaville has published in his Todtenbuch , Bd.\n\nL, Bll.\n\n198, 199, it is clear that the text given in the papyrus of Ani forms only about one-half of it, and that its contents refer to the glorious state of the deceased, who lives again in the form of Horus.\n\nHe enters among the revered dead; shouts of joy ascend in Suten-henen, and gladness reigns in Naarutef he hath inherited the throne of Osiris, and ruleth the whole earth, and the company of the gods are content thereat; the god Sut feareth him; all sorts and conditions of men both dead and living come before him, and bow down in homage when they behold him; the god hath made all to fear him; Sut cometh unto him with head bent low to the earth; the deceased breaketh and turneth up the earth in blood in Suten-henen; (compare Chap.\n\nXVIII., Â§G); his name shall endure for millions of millions of years; his name shall abide in Suten-henen, and he shall wear the mighty atef crown upon his head for millions, and hundreds of thousands, and tens of thousands, and thousands, and hundreds, and tens of years; bread, ale, oxen, wild fowl, all good and pure things and fresh water from the river shall in abundance be offered unto him, etc.\n\nFrom the concluding lines we find that the chapter was to be recited over a figure of the god Horus made of lapis-lazuli, which was to be placed near the neck of the deceased, and which was supposed to give him power upon earth with men, gods, and the shining spirits; the effect upon him would, moreover, be exceedingly beneficial if it were recited in the underworld.\n\n{p.\n\n344} Vignette I.\n\n(PLATE XXX.): The god Osiris, bearded and wearing the id white crown, stands in a shrine the roof of which is surmounted by a hawk's head and uræi; at the back of his neck hangs the menat (see above p.\n\n245), and in his hands he holds the crook, sceptre, and flail, emblems of royalty, power, and dominion.\n\nBehind him stands the goddess Isis, who rests her right hand upon his right shoulder; in her left hand she holds the sign of life.\n\nBefore Osiris, upon a lotus flower, stand the four children of Horus, the gods of the cardinal points, Mestha, Hapi, Tuamautef, and Qebhsennuf.\n\nVignette II."

