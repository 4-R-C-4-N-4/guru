body = "Sacred Texts Egypt Index Previous Next PLATE XXVIII.\n\nVignette: A heron.\n\nText [CHAPTER LXXXIV.]: (I) THE CHAPTER OF CHANGING INTO A HERON.\n\nSaith Osiris, the scribe Ani: (2) \"I have gotten dominion over the beasts which are brought for sacrifice, with the knife held at their heads and their hair, (3) for {p.\n\n340} those who dwell in their emerald [fields], the ancient and the shining ones who make ready (4) the hour of Osiris Ani, triumphant in peace.\n\nHe maketh slaughter upon earth, and I make slaughter upon earth.\n\nI am strong, and I have passed along the (5) lofty path [which leadeth] unto heaven.\n\nI have made myself pure, with long strides I have gone unto my city, holding on my way to Sepu (?).\n\n(6) I have stablished [the one who is] in Unnu.\n\nI have set the gods upon their places, and I have made glorious the temples of those who live in their shrines.\n\n(7) I know the goddess Nut, I know the god Tatunen, I know Teshert, I have brought with me their horns.\n\nI know (8) Heka, I have heard his words, I am the red calf which is limned with the pen.\n\nWhen they hear [my words], the gods say: (9) 'Let us bow down our faces, and let him come unto us; the light shineth beyond you.' My hour is within my body.\n\n(10) I have not spoken [evil] in the place of right and truth, and each day I advance in right and truth.\n\nI am shrouded in darkness when I sail up to celebrate the festival of the (11) dead one, and to embalm the Aged one, the guardian of the earth--I the Osiris, the scribe Ani, triumphant!\n\nI have not entered into (12) the hiding places of the starry deities.\n\nI have ascribed glory unto Osiris.\n\nI have pacified the heart of the gods who follow after him.\n\nI have not felt fear (13) Of those who cause terror, even those who dwell in their own lands.\n\nBehold, I am exalted (14) upon [my] resting place upon my throne.\n\nI am Nu, and I shall never be overthrown by the Evil-doer.\n\nI am the god Shu (15) who sprang from unformed matter.\n\nMy soul is god; my soul is eternity.\n\nI am the creator of darkness, and I (16) appoint unto it a resting place in the uttermost parts of heaven.\n\nI am the prince of eternity, I am the exalted one [in] Nebu.\n\nI grow young in [my] city, ( 17) I grow young in my homestead.\n\nMy name is 'Never-failing.' My name is 'Soul, Creator of Nu, who maketh (18) his abode in the underworld.' My nest is not seen, and I have not broken my egg.\n\nI am lord of millions of years- I have made my nest (19) in the uttermost parts of heaven.\n\nI have come down unto the earth of Seb.\n\nI have done away with my faults.\n\nI have seen my father (20) as the lord of Shautat.\n\nAs concerning Osiris Ani, may his body dwell in Annu; may it be manifested unto those who are with the Shining One in the place of burial in Amenta.\n\n.\n\n.\n\n.\n\n.\n\n.\" Vignette: A human head springing from a lotus in a pool of water.\n\nText [CHAPTER LXXXI A .]: (1) [THE CHAPTER OF] CHANGING INTO A LOTUS."

