[content]
body = "Saith Osiris Ani, triumphant: \"Lo, she who is chiefest, the lady of strength, who giveth quiet of heart to her lord.\n\nHer girth is three hundred and fifty measures; she is clothed with mother-of-emerald of the south; and she raiseth up the godlike form and clotheth the feeble one The name of the doorkeeper is Ari-su-tchesef.\"[2] Vignette X.: The tenth Pylon, which is guarded by a ram-headed deity wearing the atef crown and holding a besom, seated in a shrine, upon the top of which are two serpents.\n\nText: WORDS TO BE SPOKEN WHEN [ANI] COMETH UNTO THE TENTH PYLON.\n\nSaith Osiris Ani, [triumphant]: \"Lo, she who is loud of voice, she who causeth those to cry who entreat her, the fearful one who terrifieth, who feareth none that are therein.\n\nThe name of the doorkeeper is Sekhen-ur.\" [1.\n\nI.e.\n\n, \"Protecting his body.\" 2 I.e.\n\n, \"He maketh himself.\"] {p.\n\n298} Appendix: The several \"texts\" of the next eleven Pylons are wanting in this papyrus.\n\nTranslations of them are here given as they are found in a papyrus published by Naville, Todtenbuch , Bd.\n\nI., 131.\n\n161, 162.\n\nIt will be observed that the names of the doorkeepers are wanting, and also that each text, except in the case of the twenty-first Pylon, ends with words which refer to the examination of the dead at each gate.\n\nTHE ELEVENTH PYLON.\n\n\"Lo, she who repeateth slaughter, the burner up of fiends, It she who is terrible at every gateway, who rejoiceth on the day of darkness.\n\nShe judgeth the feeble swathed one.\" THE TWELFTH PYLON.\n\n\"Lo, the invoker of the two lands, who destroyeth with flashings and with fire those who come, the lady of splendour, who obeyeth her lord daily.\n\nShe judgeth the feeble swathed one.\" THE THIRTEENTH PYLON.\n\n\"Lo, Isis, who hath stretched forth her hands and arms over it, and hath made Hapi to shine in his hidden place.\n\nShe judgeth the feeble swathed one.\" THE FOURTEENTH PYLON.\n\n\"Lo, the lady of the knife, who danceth in blood; she maketh [the festival of] the god Hak on the day of judgment.\n\nShe judgeth the feeble swathed one.\" THE FIFTEENTH PYLON.\n\n\"Lo, the Bloody Soul, who searcheth out and putteth to the test, who maketh inquiry and scrutiny, who cometh forth by night, and doth fetter the Fiend in his lair; may her hands be given to the Still-Heart in his hour, and may she make him to advance and come forth unto her.\n\nShe judgeth the feeble swathed one.\" THE SIXTEENTH PYLON.\n\nSaith Osiris, when he cometh unto this pylon: \"Lo, the Terrible one, the lady of the rain storm, who planteth ruin in the souls of men, the devourer of the dead bodies of mankind, the orderer and creator of slaughters, who cometh forth.\n\nShe judgeth the feeble swathed one.\" THE SEVENTEENTH PYLON.\n\n\"Lo, the Hewer-in-pieces in blood, .\n\n.\n\n.\n\n.\n\n.\n\n.\n\nthe lady of flame.\n\nShe judgeth the feeble swathed one.\" THE EIGHTEENTH PYLON."

