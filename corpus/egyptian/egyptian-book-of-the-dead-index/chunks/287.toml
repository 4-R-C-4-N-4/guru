[content]
body = "(Extrait du t.\n\nxxiv.\n\ndes Mémoires de la Société impériale des Antiquaires de France ).\n\nDr.\n\nBirch translated the word by être, personne, emblème, divin, génie, principe, esprit.\n\nIn September, 1878, V.\n\nMaspero explained to the Members of the Congress of Lyons the views which he held concerning this word, and which he had for the past five years been teaching in the Collège de France, and said, \"le ka est une sorte de double de la personne humaine d'une matière moins grossière que la matière dont est formé le corps, mais qu'il fallait nourrir et entretenir comme le corps lui-même; ce double vivait dans le tombeau des offrandes qu'on faisait aux fêtes canoniques, et aujourd'hui encore un grand nombre des génies de la tradition populaire égyptienne ne sent que des doubles , devenus démons au moment de la conversion des fellahs an christianisme, puis à l'islamisme.\" These views were repeated by him at the Sorbonne in February, 1879.\n\nSee Comptes Rendus du Congrès provincial des Orientalistes , Lyons, 1878, t.\n\ni., pp.\n\n235-263; Revue Scientifique de la France et de l'Étranger , 2 e série, 8 e année, No.\n\n35, March, 1879, pp.\n\n816-820; Bulletin de l'Association Scientifique de France , No.\n\n594, 1879, t.\n\nxxiii., p.\n\n373-384; Maspero, Études de Mythologie et d'Archéologie , t.\n\ni., pp.\n\n1, 35, 126.\n\nIn March, 1879, Mr.\n\nRenouf read a paper entitled \"On the true sense of an important Egyptian word\" ( Trans.\n\nSoc.\n\nBibl.\n\nArch.\n\n, vol.\n\nvi., London, 1979, pp.\n\n494-508), in which he arrived at conclusions similar to those of M.\n\nMaspero; and in September of the same year M.\n\nMaspero again treated the subject in Recueil de Travaux , t.\n\ni., p.\n\n152 f.\n\nThe various shades of meaning in the word have been discussed subsequently by Brugsch, Wörterbuch (Suppl.), pp.\n\n997, 1230; Dümichen, Der Grabpalast des Patuamenap , Abt.\n\ni., p.\n\n10; Bergmann, Der Sarkophag des Panehemisis (in Jahrbuch der Kunsthistorischen Sammlungen des allerhöchsten Kaiserhauses , Vienna, 1883, p.\n\n5); Wiedemann, Die Religion der alten Aegypter , p.\n\n126.\n\n2.\n\n###, l.\n\n472.\n\n3.\n\n###, l.\n\n482.] {p.\n\nlxiii} having been buried in the lowest chamber, \"his ka cometh forth to him.\"[1] Of Pepi I.\n\nit is said:-- ai su ka-k hems ka-k am ta hena-k at ur Washed is thy ka , sitteth thy ka [and] it eateth bread with thee unceasingly en t'et t'etta forever.'[2] aha uab-k uab ka-k uab ba-k uab sexem-k Thou art pure, thy ka is pure, thy soul is pure, thy form is pure.[3] The ka , as we have seen, could eat food, and it was necessary to provide food for it."

