body = "the walls of tombs,[1] stelæ, and papyri[2] of the XVIIIth dynasty; and these prove that the Egyptians ascribed the attributes of the Creator to the creature.\n\nThe religious ideas which we find in these writings in the XVIIIth dynasty are, no doubt, the outcome of the religion of earlier times, for all the evidence now available shows that the Egyptians of the later periods invented comparatively little in the way of religious literature.\n\nWhere, how, and in what way they succeeded in preserving their most ancient texts, are matters about which little, unfortunately, is known.\n\nIn course of time we find that the attributes of a certain god in one period are applied to other gods in another; a new god is formed by the fusion of two or more gods; local gods, through the favourable help of political circumstances, or the fortune of war, become almost national gods; and the gods who are the companions of Osiris are endowed by the pious with all the attributes of the great cosmic gods--Ra, Ptah, Khnemu, Khepera, and the like.\n\nThus the attributes of Ra are bestowed upon Khnemu and Khepera; the god Horus exists in the aspects of Heru-maati, Heru-khent-an-maa, Heru-Khuti, Heru-nub, Heru-behutet, etc.\n\n, and the attributes of each are confounded either in periods or localities: Tmu-Ra, and Menthu-Ra, and Amen-Ra are composed of Tmu and Ra, and Menthu and Ra, and Amen and Ra respectively, and we have seen from the hymn quoted above (p.\n\nlii.) that already in the XVIIIth dynasty the god Osiris had absorbed the attributes which belonged in the earlier dynasties to Ra alone.\n\nHistory of the god Amen.\n\nStill more remarkable, however, is the progress of the god Amen in Egyptian theology.\n\nIn the early empire, i.e.\n\n, during the first eleven dynasties, this god ranked only as a local god, although his name is as old as the time of Unas;[3] and [1.\n\nE.g.\n\n, the litany from the tomb of Seti I., published by Naville, La Litanie du Soleil , Leipzig, 1875, p.\n\n13 ff.\n\n2.\n\nE.g.\n\n, Hymn to Amen-Ra, translated by Goodwin from papyrus No.\n\n17, now preserved in the Gizeh Museum (see Les Papyrus Égyptiens du Musée de Boulaq , ed.\n\nMariette, Paris, 1872, pll.\n\n1-13; Records of the Past , vol.\n\ni., p.\n\n127 f., and Trans.\n\nSoc.\n\nBibl.\n\nArch.\n\n, vol.\n\nii., p.\n\n250), and by Grébaut, Hymne à Ammon-Ra , Paris, 1874); Hymns to Amen , translated by Goodwin (see Records of the Past , vol.\n\nvi., p.\n\n97 f.; Trans.\n\nSoc.\n\nBibl.\n\nArch.\n\n, vol.\n\nii., p.\n\n353), and Chabas ( Mélanges Égyptologiques , 1870, p.\n\n117); Hymn to Osiris , translated by Chabas ( Revue Archéologique , t.\n\nxiv., Paris, 1857, p.\n\n65 ff.), and Goodwin ( Records of the Past , vol.\n\niv., p.\n\n97 ff.).\n\nThe various versions of the XVth Chapter of the Book of the Dead, which consists of a series of hymns, are given in the Theban edition by Naville ( Todtenbuch , Bd.\n\nI., Bll."

