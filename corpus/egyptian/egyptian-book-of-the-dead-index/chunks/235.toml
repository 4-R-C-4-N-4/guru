[content]
body = "3 Variant hru xesef sat , \"day of driving back slaughter.\"] {p.\n\n362} [Qebhsennuf saith:] \"I am thy son, O Osiris Ani, triumphant.\n\nI have come to protect thee.\n\nI have collected thy bones, and I have gathered together thy members.\n\n[I have brought thy heart and I have placed it upon its throne within thy body.\n\nI have made thy house to flourish after thee, O thou who livest for ever.]\"[1] [The bird which faceth the setting sun saith]: \"Praise be to Ra when he setteth in the western part of heaven.\n\nOsiris Ani, triumphant in peace in the underworld, saith: 'I am a perfected soul,'\" [The bird which faceth the rising sun saith]: \"Praise be to Ra when he riseth in the eastern part of heaven from Osiris Ani, triumphant.\" [The Perfected Soul saith]: \"I am a perfected soul in the holy egg of the abtu fish.\n\nI am the great cat which dwelleth in the seat of right and truth wherein riseth the god Shu.\" [The text near the Ushabti Figure (Chapter VI.) reads]: Osiris Ani, the overseer, triumphant, saith: \" Hail, shabti figure!\n\nIf it be decreed that Osiris [Ani] shall do any of the work which is to be done in the underworld, let all that standeth in the way be removed from before him; whether it be to plough the fields, or to fill the channels with water, or to carry sand from [the East to the West].\" The shabti figure replies: \"I will do [it]; verily I am here [when] thou callest.\" Vignette: Ani, with both hands raised in adoration, standing before a table of offerings; behind him is his wife holding lotus and other flowers in her left hand.\n\nText: [Chapter CX.] (1) HERE BEGIN THE CHAPTERS OF THE SEKHET-HETEPU, AND THE CHAPTERS OF COMING FORTH BY DAY, AND OF GOING INTO AND OF COMING OUT FROM THE UNDERWORLD, AND OF ARRIVING IN THE SEKHET(2) AANRU, AND OF BEING IN PEACE IN THE GREAT CITY WHEREIN ARE FRESH BREEZES.\n\nLet me have power there.\n\nLet me become strong to plough there.\n\n(3) Let me reap there.\n\nLet me eat there.\n\nLet me drink there.\n\n[Let me woo there.][2] And let me do all these things there, even as they are done upon earth.\n\n[1.\n\nIn the papyrus of Ani the text of the end of the speech of Qebbsennuf appears to be corrupt the words within brackets are translated from other papyri, and the Egyptian would run as follows: an-na nek ab-k ta-a nek su her auset-f em xat-k serut-na pa-k emxet-k anx-tha t'etta .\n\n2.\n\nReading, with the Nebseni papyrus, nehep am .] {p.\n\n363} Saith Osiris Ani, triumphant: (4) \"Set hath carried away Horus to see what is being built in the Field of Peace, and he spreadeth the air over (5) the divine soul within the egg in its day.\n\nHe hath delivered the innermost part of the body of Horus from the holy ones of Akert (?).[1] Behold I have sailed in the mighty boat on the Lake of Peace.[2] I, even I, have crowned him in the House of (6) Shu.\n\nHis starry abode reneweth its youth, reneweth its youth."

