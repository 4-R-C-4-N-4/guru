body = "9, 900) 3.\n\nLe Papyrus de Neb-Qued , ed.\n\nDevéria, Paris, 1872.\n\nM.\n\nPierret, its translator, says, \"Il appartient la plus ancienne époque des exemplaires sur papyrus.\" 4 Papyrus Égyptien Funéraire Hiéroglyphique (t.\n\nii.), ed.\n\nLeemans, Leyden, 1882.] {p.\n\ncxlvi} The text.\n\nThe text may be divided into two parts.\n\nThe first part contains unusual versions of two hymns to Ra and Osiris, the vignette of the sunrise (Chapter XVI A .), and the judgment Scene accompanied by texts, some of which occur in no other papyrus.\n\nThe second part comprises about sixty-two Chapters of the Theban edition of the Book, in the following order:--I., XXII.\n\nLXXII., rubric, XVII., CXLVII., CXLVI., XVIII., XXIII., XXIV., XXVI.\n\nXXX B ., LXI., LIV., XXIX., XXVII., LVIII., LIX., XLIV., XLV., XLVI., L., XCIII., XLIII., LXXXIX., XCI., XCII., LXXIV., VIII., II., IX., CXXXII., X., [XLVIII.], XV., CXXXIII., CXXXIV., XVIII., CXXIV., LXXXVI., LXXVII., LXXVIII., LXXXVII., LXXXVIII., LXXXII., LXXXV., LXXXIII., LXXXIV., LXXXI A ., LXXX., CLXXV., CXXV.\n\nIntroduction and Negative Confession, XLII., CXXV., Rubric, CLV., CLVI., XXIX B ., CLXVI., CLI., VI., CX., CXLVIII., CLXXXV., and CLXXXVI.\n\nThe titles of these Chapters arranged according to the numeration introduced by Lepsius are as follows :-- List of Chapters.\n\nChapter I.\n\n\"Here begin the chapters of 'coming forth by day,' and of the songs of praise and of glorifying, and of coming forth from and of going into the glorious Neter-khert in the beautiful Amenta; to be said on the day of the burial going in after coming forth.\" (See pp.\n\n19, 270 and pll.\n\n5, 6.) The papyri belonging to the early part of the XVIIth dynasty call this Chapter the \"Chapter of going in to the divine chiefs of Osiris,\" ###.\n\nThe large numbers of the men attending the bier and of the weeping women are peculiar to the Ani papyrus.\n\nChapter II.\n\n\"The Chapter of coming forth by day and of living after death.\" (See pp.\n\n120, 321, and pl.\n\n18.) This Chapter is found only in one other papyrus of the Theban period (British Museum, No.\n\n9964).\n\nAnother copy of it is inscribed upon a mummy bandage preserved in the Louvre, No.\n\n3097.' Chapter VI.--[See Chapter CLI., of which it forms a part, pp.\n\n233, 362, and pl.\n\n32.] In the papyrus of Nebseni (British Museum, No.\n\n9900) this Chapter stands by itself, and is entitled \"Chapter of making the ushabti figures to perform work for a man in the Neter-khert,\" [1.\n\nSee Naville, Einleitung , p.\n\n103.] {p.\n\ncxlvii} Chapter VIII.\n\n\"The Chapter of passing through Amenta, and of coming forth by day.\" (See pp.\n\n119, 320, and pl."

