body = "They are exhibited in the First Egyptian Room, Case A, and the fragments of the coffin in Wall Case No.\n\n1 (No.\n\n6647) in the same room.\n\n3.\n\nSee Lepsius, Auswahl , Taf.\n\n7.\n\n4.\n\nOr suten bat ; see Sethe, Aeg.\n\nZeitschrift , Bd.\n\nXXVIII., p.\n\n125; and Bd.\n\nXXX, p.\n\n113; Max Müller, Aeg.\n\nZeitschrift , Bd.\n\nXXX., p.\n\n56; Renouf, Proc.\n\nSon Bibl.\n\nArch.\n\n, 1893, pp.\n\n219, 220; and Lefébure, Aeg.\n\nZeitschrift , Bd.\n\nXXXI., p.\n\n114 ff.\n\n5.\n\nIt seems that we should read this god's name Keb (see Lefébure, Aeg.\n\nZeitschrift , Bd.\n\nXXXI., p.\n\n12 5); for the sake of uniformity the old name is here retained.] {p.\n\nxxi} em ren-s en seta pet ertat-nes un-k em neter in her name of \"mystery of heaven,\" she granteth that thou mayest exist as a god an xeft-k suten net Men-kau-Ra anx t'etta without thy foes, O King of the North and South, Men-kau-Ra, living for ever!\n\nNow it is to be noted that the passage, \"Thy mother Nut spreadeth herself over thee in her name of 'Mystery of Heaven,' she granteth that thou mayest be without enemies,\" occurs in the texts which are inscribed upon the pyramids built by the kings of the VIth dynasty,[1] and thus we have evidence of the use of the same version of one religious text both in the IVth and in the VIth dynasties.[2] Even if we were to admit that the coffin is a forgery of the XXVIth dynasty, and that the inscription upon it was taken from an edition of the text of the Book of the Dead, still the value of the monument as an evidence of the antiquity of the Book of the Dead is scarcely impaired, for those who added the inscription would certainly have chosen it from a text of the time of Mycerinus.\n\nThe Book of the Dead in the Vth dynasty.\n\nIn the Vth dynasty we have--in an increased number of mastabas and other monuments--evidence of the extension of religious ceremonials, including the [1.\n\nSee the texts of Teta and Pepi I.\n\nin Maspero, Recueil de Travaux , t.\n\nV., pp.\n\n20, 38 (ll.\n\n175, 279), and pp.\n\n165, T73 (ll.\n\n60, 103), etc.\n\n2.\n\nSo far back as 1883, M.\n\nMaspero, in lamenting (Guide du Visiteur de Boulaq, p.\n\n310) the fact that the Bûlâq Museum possessed only portions of wooden coffins of the Ancient Empire and no complete example, noticed that the coffin of Mycerinus, preserved in the British Museum, had been declared by certain Egyptologists to be a \"restoration\" of the XXVIth dynasty, rather than the work of the IVth dynasty, in accordance with the inscription upon it; but like Dr.\n\nBirch he was of opinion that the coffin certainly belonged to the IVth dynasty, and adduced in support of his views the fact of the existence of portions of a similar coffin of Seker-em-sa-f, a king of the VIth dynasty.\n\nRecently, however, an attempt has again been made ( Aeg.\n\nZeitschrift , Bd.\n\nXXX., p."

