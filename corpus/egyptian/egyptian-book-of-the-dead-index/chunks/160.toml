body = "A variant has \"who are in his following.\" See Naville, Todtenbuch , Bd.\n\nII., Pl.\n\nxlix.] {p.\n\n285} What then is this?\n\nIt is the drops of blood (61) which fell from Ra when he went forth (62) to cut himself.\n\nThey sprang into being as the gods Hu and Sa, who are in the (63) following of Ra and who accompany Tmu (64) daily and every day.\n\n\"I, Osiris, Ani (65) the scribe, triumphant, have filled up for thee the utchat [1] after it was darkened (66)[2] on the day of the combat of the Two Fighters.\"[3] What then (67) is this?\n\nIt is the day on which Horus fought with (68) Set, who cast filth in the face of Horus, and when Horus destroyed the (69) powers of Set.\n\nThoth did this with his own hand.\n\n(70) \"I lift the hair[-cloud][4] when there are storms in the sky.\" What then is this?\n\n(71) It is the right eye of Ra, which raged against [Set] when (72) he sent it forth.\n\nThoth raiseth up the hair[-cloud], and bringeth the eye (73) alive, and whole, and sound, and without defect to [its] lord; or (as others say), It is the eye of Ra when it is sick and when it (74) weepeth for its fellow eye; then Thoth standeth up to cleanse it.\n\n(75) \"I behold Ra who was born yesterday from the (76) buttocks[5] of the cow Meh-urt;[6] his strength is my strength, and my strength is his strength.\" What then (77) is this?\n\nIt is the water of heaven, or (as others say), (78) It is the image of the eye of Ra in the morning at his daily birth.\n\n(79) Meh-urt is the eye of Ra.\n\nTherefore Osiris, the (80) scribe Ani, triumphant, [is] a great one among the gods (81) who are in the train of Horus.\n\nThe words are] spoken for him that loveth his lord.[7] [1.\n\nI.e.\n\n, the eye of the Sun.\n\n2.\n\nSome variants give \"pierced.\" 3.\n\nRehui was a name given in the first instance to Horus and Set, but subsequently it was applied to any two combatants (see the passages quoted by Brugsch, Wörterbuch , Suppl., p.\n\n734).\n\nBritish Museum papyrus No.\n\n10,184 (Sallier IV.), states that the battle between Horus and Set took place on the 26th day of the month of Thoth, i.e.\n\n, October (see Chabas, Le Calendrier , p.\n\n28).\n\n4.\n\nThe scribe has omitted the words em utchat , \"from the eye of the sun.\" The word shen is a name for the clouds which cover the eye of the sun, and which are in appearance like hair.\n\nBrugsch in his Wörterbuch (Suppl.), p.\n\n1193, gives the word as meaning \"tempest.\" 5.\n\nThe papyrus has ###.\n\n6.\n\nFor figures of this goddess, see Lanzone, Dizionario , plate 131.\n\n7.\n\nThe meaning of this passage is doubtful.\n\nBirch renders, \"one of the gods who belong to Horus, whose words exceed the wish of his Lord\"; and Pierret, \"un de ces dieux qui suivent Horus, et parlent selon la volonté de leur seigneur.\"] {p.\n\n286} (82) What then is this?\n\n[ i.e."

