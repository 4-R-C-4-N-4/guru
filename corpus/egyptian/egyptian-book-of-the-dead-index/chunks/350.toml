body = "30), the word ### is written twice, probably, however, with the view of filling up the line; in Chapter CLI.\n\n(Pl.\n\n34) the name is written crookedly, and the determinative is omitted; and in Chapters XVIII.\n\n(Introduction, pl.\n\n12) and CXXXIV.\n\n(pl.\n\n22).\n\nthe scribe has, in two spaces, omitted to write the name.\n\nIt seems tolerably certain that all the sections of the papyrus were written about the same time, and that they are the work of scribes of the same school; the variations in the depth of the space occupied by the text and the difference in the colours of the border only show that even the best scribes did not tie themselves to any one plan or method in preparing a copy of the Book of the Dead.\n\nThe text has many serious errors: by some extraordinary oversight it includes two copies of the XVIII th Chapter, one with an unusual introduction and the other without introduction; and a large section of the XVIIth Chapter, one of the most important in the whole work, has been entirely omitted.\n\nSuch mistakes and omissions, however, occur in papyri older than that of Ani, for in the papyrus of Nebseni (B.M., No.\n\n9900), which was written at Memphis early in the XVIIIth dynasty, of Chapters L., LVI., LXIV., CLXXX., two copies each, of [1.\n\nSee Chapter XXVI, l.\n\n1 (pl.\n\n15); Chapter XLV., l.\n\n1 (pl.\n\n16); Chapter IX, 1.\n\n6 (pl.\n\n18); Chapter CXXXIV., 1.\n\n15 (pl.\n\n22); Chapter LXXVIII., l.\n\n1 (p.\n\n25); Chap.\n\nLXXX., l.\n\n1 (pl.\n\n28); Chapter CLXXXV., l.\n\n15 (pl.\n\n36).] {p.\n\ncxliv} Chapters C.\n\nand CVI., three copies, and of Chapter XVII.\n\ntwo extracts are given in different parts of the papyrus.[1] Ani's rank.\n\nThe papyrus of Ani is undated, and no facts are given in it concerning the life of Ani, whereby it would be possible to fix its exact place in the series of the illustrated papyri of the Theban period to which it belongs.\n\nHis full titles are:-- suten in maa an hesb hetep neter en neteru nebu Royal scribe veritable, scribe and accountant of the divine offerings ( i.e.\n\n, revenues) of all the gods.\n\nmer tenti en nebu Abtu an hetep neter en The governor of the granary of the lords of Abydos, scribe of the divine offerings (i.e., revenues) of nebu Uast.\n\nthe lords of Thebes; and he is said to be \"beloved of the lord of the North and South\" and to \"love him\".\n\nThe name of the king thus referred to cannot be stated.\n\nThat Ani's rank of \"royal scribe\" [2] was not titular only is shown by the addition of the word \"veritable,\" and his office of scribe and accountant of all the gods was probably one of the highest which a scribe could hold.[3] His other offices of \"governor of the granary of the lords of Abydos,\" and \"scribe of the sacred property of the lords of Thebes,\" further prove his rank and importance, for Abydos and Thebes were the most ancient and sacred cities of Egypt.\n\nAni's wife.\n\nAni's wife Thuthu is described as \"the lady of the house, the qematet of Amen\".[4] What the title \"lady of the house [1.\n\nNaville, Einleitung , pp.\n\n48-54.\n\n2."

