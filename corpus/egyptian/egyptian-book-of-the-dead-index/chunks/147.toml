body = "May no ill-luck happen through the dethronement of his two eyes in his body, even as no evil fortune came to Horus through the overthrow of his eye in his body.\n\nThy two eyes are decked therewith in its name of Uatch , which maketh thee to give forth fragrance, in its name of \"Sweet-smelling.\" A number of scented unguents and perfumes are brought forward, and at the presentation of each a short sentence is recited by the Kher-heb having reference to the final triumph of the deceased in the underworld and to the help which the great gods will render to him.\n\nText: [Chapter I.][2] (1) HERE BEGIN THE CHAPTERS OF COMING FORTH BY DAY,[3] AND OF THE SONGS OF PRAISE[4] AND (2) GLORIFYING,[4] AND OF COMING FORTH FROM AND GOING INTO THE GLORIOUS NETER-KHERT IN THE BEAUTIFUL [1.\n\n###.\n\n2 The text accompanying Plates 5 and 6 represents Chapter I., Chapter XXII., and the Rubric of Chapter LXXII., of Lepsius's numeration.\n\n3.\n\nIn Egyptian Per em hru .\n\nThis title has been translated and explained in various ways, as e.g.\n\n, \"Coming forth from [or as] the Day\" (Birch, in Bunsen's Egypt's Place , vol.\n\nv., p.\n\n161) The departure from the-day\" (Birch, Papyrus of Nas-khem , p.\n\n3); \"Sortir du jour\" (Devéria, Catalogue ; 1874, p.\n\n49); \"Sortir du jour\" (Naville, Einleitung , p.\n\n23); \"Sortie de la journée\" (Pierret, Le Papyrus de Neb-Qed ; 1872, p.\n\n2); \"Ausgang bei Tage\" (Brugsch, Aegyptologie , p.\n\n155).\n\nAnother fairly common title for the Book of the Dead is \"Chapter of making perfect the blessed dead\" (see Naville, Einleitung , pp.\n\n24, 25).\n\n4.\n\nFor other examples of the use of the words settes and sexu , see Brugsch, Wörterbuch , pp.\n\n133, 1165.] {p.\n\n271} AMENTA; TO BE SAID ON (3) THE DAY OF THE BURIAL: GOING IN AFTER COMING FORTH.\n\nOsiris Ani, (4) Osiris, the scribe Ani, saith: \"Homage to thee, O bull of Amenta, Thoth the (5) king of eternity is with me.\n\nI am the great god in[1] the boat of the Sun; I have (6) fought for thee.\n\nI am one of the gods, those holy princes[2] who make Osiris (7) to be victorious over his enemies on the day of weighing of words.[3] (8) I am thy mediator, O Osiris.\n\nI am [one] of the gods (9) born of Nut, those who slay the foes of Osiris (10) and hold for him in bondage the fiend Sebau.\n\nI am thy mediator, O Horus.\n\n(11) I have fought for thee, I have put to flight the enemy for thy name's sake."

