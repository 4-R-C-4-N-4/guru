body = "386-97.] {p.\n\nlxvii} supported by a passage in the XCIInd Chapter of the Book of the Dead,[1] where it is said:-- em xena ba-a sauti xaibit-a un uat Let not be shut in my soul, let not be fettered my shadow, let be opened the way en ba-d en xaibit-a maa-f neter aa for my soul and for my shadow, may it see the great god.\n\nAnd again, in the LXXXIXth Chapter the deceased says:-- maa-a ba-a xaibit-a May I look upon my soul and my shadow.[2] the khu or intelligence.\n\nAnother important and apparently eternal part of man was the khu , which, judging from the meaning of the word, may be defined as a \"shining\" or translucent, intangible casing or covering of the body, which is frequently depicted in the form of a mummy.\n\nFor want of a better word khu has often been translated \"shining one,\" \"glorious,\" \"intelligence,\" and the like, but in certain cases it may be tolerably well rendered by \"spirit.\" The pyramid texts show us that the khu's of the gods lived in heaven, and thither wended the khu of a man as soon as ever the prayers said over the dead body enabled it to do so.\n\nThus it is said, \"Unas standeth with the khu's ,\"[3] and one of the gods is asked to \"give him his sceptre among the khu's ; \"[4] when the souls of the gods enter into Unas, their khu's are with and round about him.[6] To king Teta it is said:-- [1.\n\nNaville, Todtenbuch , Bd.\n\nI., Bl.\n\n104, ll.\n\n7, 8.\n\n2.\n\nIbid.\n\n, Bd.\n\nI., Bl.\n\n101.\n\n3.\n\nRecueil de Travaux , t.\n\niii., p.\n\nx 88 (1.\n\n71).\n\n4.\n\nIbid.\n\n, t.\n\niii., p.\n\n215 (l.\n\n274).\n\n5.\n\nIbid., t iv., p.\n\n61 (1.\n\n522).] {p.\n\nlxviii} nehem-nef maat-f maf er ta-nef nek seba-k He[1] hath plucked his eye from himself, he hath given it unto thee to strengthen thee am-s sexem-k am-s xent xu therewith, that thou mayest prevail with it among the khu's .[2] And again, when the god Khent-mennut-f has transported the king to heaven, the god Seb, who rejoices to meet him, is said to give him both hands and welcome him as a brother and to nurse him and to place him among the imperishable khu's .[1] In the XCIInd Chapter the deceased is made to pray for the liberation of his soul, shadow, and khu from the bondage of the tomb, and for deliverance from those \"whose dwellings are hidden, who fetter the souls, who fetter souls and khu's cc and who shut in the shadows of the dead\";[4] and in the XC Ist Chapter[5] is a formula specially prepared to enable the khu to pass from the tomb to the domains where Ra and Hathor dwell.\n\nThe sekhem or form.\n\nYet another part of a man was supposed to exist in heaven, to which the Egyptians gave the name sekhem.\n\nThe word has been rendered by \"power,\" \"form,\" and the like, but it is very difficult to find any expression which will represent the Egyptian conception of the sekhem .\n\nIt is mentioned in connection with the soul and khu , as will be seen from the following passages from the pyramid texts 1."

