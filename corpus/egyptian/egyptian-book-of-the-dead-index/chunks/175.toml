[content]
body = "Sacred Texts Egypt Index Previous Next PLATE XIII.\n\nVignettes (Upper register): A pylon, or gateway, surmounted by the feathers of Maat and uræi wearing disks.\n\n(Lower register): A pylon, surmounted by Anubis and an utchat .\n\nText [CHAPTER XVIII.]: [\" (1) Hail Thoth, who madest Osiris (2) victorious over his enemies, make thou Osiris [the scribe Ani] to be victorious over his enemies, as thou didst make Osiris victorious over his enemies' in the presence of (3) the godlike rulers who are with Ra and Osiris in Annu, on the night of 'the things for the night,'[2] and on the night of battle, and (4) on the shackling of the fiends, and on the day of the destruction of Neb-er-tcher.\"][3] Â§A.\n\nVignette: The gods Tmu, Shut Tefnut, Osiris,[4] and Thoth.\n\nText: (1) The great godlike rulers in Annu are Tmu, Shu, Tefnut [Osiris, and Thoth], (2) and the shackling of the Sebau signifieth the destruction of the fiends of Set when he worketh evil (3) a second time.\n\n\"Hail, Thoth, who madest Osiris victorious over his enemies, make thou the Osiris (4) Ani to be victorious over his enemies in the presence of the great divine beings who are in Tattu, on the night of making the Tat to stand up in Tattu.\" [1.\n\nI.e.\n\n, the Fields of Peace.\n\n2.\n\nThe words are explained to mean, \"the daybreak on the sarcophagus of Osiris.\" 3.\n\nThis section, omitted in the Ani papyrus, is supplied from the papyrus of Nebseni.\n\n4.\n\nThis god is omitted from the copy of this chapter given on Plate XXIII.] {p.\n\n302} Â§B.\n\nVignette: The gods Osiris, Isis, Nephthys, and Horus.\n\nText: (1) The great godlike rulers in Tattu are Osiris, Isis, Nephthys, and Horus, the avenger of his father.\n\nNow the \"night of making the Tat to stand (2) Up in Tattu\" signifieth [the lifting up of] the arm and shoulder of Osiris, lord of Sekhem; and these gods stand behind Osiris [to protect him] even as the swathings; which clothe[1] him.\n\n(3) \"Hail, Thoth, who madest Osiris victorious over his enemies, make thou the Osiris Ani triumphant over his enemies (4) in the presence of the great godlike rulers who are in Sekhem, on the night of the things of the night [festival] in Sekhem.\" Â§C.\n\nVignette: The gods Osiris and Horus, two utchats upon pylons, and the god Thoth.\n\nText: (1) The great godlike rulers who are in Sekhem are Horus, who is without sight, and Thoth, who is with the godlike rulers in Naarerutf.\n\n(2) Now the \"night of the things of the night festival in Sekhem\" signifieth the light of the rising sun on the coffin of Osiris."

