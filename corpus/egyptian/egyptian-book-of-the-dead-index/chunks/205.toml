body = "Sacred Texts Egypt Index Previous Next PLATE XXV.\n\nVignette: A swallow perched on a conical object painted red and green.\n\nText [CHAPTER LXXXVI.]: (I) HERE BEGIN THE CHAPTERS OF MAKING TRANSFORMATIONS.\n\nTHE CHANGING INTO A SWALLOW.\n\n(2) Saith Osiris Ani, triumphant: \"I am the swallow, [I am] the swallow, [I am] the scorpion, the daughter of Ra.\n\nHail, ye gods, whose scent is sweet; hail, ye gods, whose scent is sweet!\n\nHail, thou Flame, which comest forth from (4) the horizon!\n\nHail, thou who art in the city.\n\nMay the Guardian of the Bight lead me on.\n\nO stretch out up unto me (5) thine bands that I may be able to pass my days in the Island of Flame.\n\nI have fared forth with my warrant.\n\nI have come with the power thereof.\n\nLet the doors be opened unto me (6).\n\nHow shall I tell what I have seen therein?\n\nHorus was like unto the prince of the sacred bark, and the throne of his father was given unto him.\n\nSut, the son of Nut, also hath gotten the fall which he (7) wrought for Horus.\n\nHe who is in Sekhem passed judgment upon me.\n\nI stretched out my hands and my arms unto Osiris.\n\nI have passed on {p.\n\n332} to judgment, (8) and I have come that I may speak; grant that I may pass on and deliver my message.\n\nI enter in, having been judged; I come out (9) at the door of Neb-er-tcher magnified and glorified.\n\nI am found pure at the Great place of passage [of souls].\n\nI have put away my faults.\n\n(10) I have done away mine offences.\n\nI have cast out the sins which were a part of me.\n\nI, even I, am pure, (11) I, even I, am mighty.\n\nO ye doorkeepers, I have made my way [unto you].\n\nI am like unto you.\n\nI have come forth by day.\n\nI have walked with my legs, and I have gotten the power of the footstep wherewith do walk the shining ones of light (12).\n\nI, even I, know the hidden ways to the doors of the Field of Aaru; and (13), though my body be buried, yet let me rise up; and may I come forth and overthrow all my foes upon earth.\" Appendix [1]: Rubric .\n\nIf this chapter be known [by the deceased], he shall come forth by day in Neter-khert, and he shall go in again after he hath come forth.\n\nif this chapter be not known, he shall not enter in after he hath come forth, nor shall he come forth by day.\n\nVignette: A golden hawk holding a flail, emblem of rule.\n\nText [CHAPTER LXXVII.]: (1) CHAPTER OF CHANGING INTO A GOLDEN HAWK.\n\nSaith Osiris Ani: \"(2) May I, even I, arise in the seshet chamber, like unto a hawk of gold (3) coming forth from his egg.\n\nMay I fly and may I hover as a hawk, with a back seven (4) cubits wide, and with wings made of emeralds of the South.\n\nMay I come forth from the sektet boat (5), and may my heart be brought unto me from the mountain of the east.\n\nMay I alight on the atet boat, and may those who are in (6) their companies be brought unto me, bowing down as they come.\n\nMay I rise, may I gather myself together (7) as the beautiful golden hawk [which hath] the head of a bennu bird."

