body = "Sacred Texts Egypt Index Previous Next THE PRINCIPAL GEOGRAPHICAL AND MYTHOLOGICAL PLACES IN THE BOOK OF THE DEAD.\n\nAbtu , the Abydos of the Greeks (Strabo, XVII., i., 42), the capital of the eighth nome of Upper Egypt.\n\nIt was the seat of the worship of Osiris, and from this fact was called Per-Ausar or Busiris, \"the house of Osiris \"; the Copts gave it the name ###.[1] Egyptian tradition made the sun to end his daily course at Abydos, and to enter into the Tuat at this place through a \"gap\" in the mountains called in Egyptian peq .[2] These mountains lay near to the town; and in the XIIth dynasty it was believed that the souls of the dead made their way into the other world by the valley which led through them to the great Oasis, where some placed the Elysian Fields.[3] Amenta or Amentet , or was originally the place where the sun set, but subsequently the name was applied to the cemeteries and tombs which were usually built or hewn in the stony plateaus and mountains on the western bank of the Nile.\n\nSome believe that Amenta was, at first, the name of a small district, without either funereal or mythological signification.\n\nThe Christian Egyptians or Copts used the word Amend to translate the Greek word Hades, to which they attributed all the ideas which their heathen ancestors had associated with the Amenta of the Book of the Dead.\n\nAnnu , the Heliopolis of the Greeks (Herodotus, II., 3, 7, 8, 9, 59, 93; Strabo, XVII., I, 27 ff ), and the capital of the thirteenth nome of Lower Egypt.\n\n[1.\n\nSee Amélineau, la Géographie de l'Égypte, à l'Époque Copte , p.\n\n155.\n\n2.\n\nSee Brugsch, Dict.\n\nGéog.\n\n, p.\n\n227.\n\n3.\n\nSee Maspero, Études de Mythologie , t.\n\ni., p.\n\n345.] {p.\n\ncxxxiv} The Hebrews called it On (Genesis xli., 45, 50; xlvi., 20), Aven (Ezekiel xxx., 17), and Bêth-Shemesh (Jeremiah xliii., 13); this last name is an exact translation of the Egyptian per Ra , \"house of the sun,\" which was also a designation of Annu.\n\nThe Copts have preserved the oldest name of the city under the form ###.[1] A Coptic bishop of this place was present at the Council of Ephesus.\n\nThe city of Annu seems to have become associated with the worship of the sun in prehistoric times.\n\nAlready in the Vth dynasty its priesthood had succeeded in gaining supremacy for their religious views and beliefs throughout Egypt, and from first to last it maintained its position as the chief seat of theological learning in Egypt.\n\nThe body of the Aged One, a name of Osiris, reposed in Annu, and there dwelt the Eye of Osiris.\n\nThe deceased made his way to Annu, where souls were joined unto bodies in thousands, and where the blessed dead lived on celestial food for ever.\n\nAn-rutf or Naarutf , is a section or door of the Tuat which lies to the north of Re-stau; the meaning of the word is \"it never sprouteth.\" An-tes (?) (see within, p.\n\n323), an unknown locality where a light tower (?), was adored."

