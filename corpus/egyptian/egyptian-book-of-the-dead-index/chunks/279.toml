[content]
body = "\"(1) Hail to thee, Osiris, lord of eternity, king of the gods, thou who hast many names, thou disposer of created things, thou who hast hidden forms in the temples, thou sacred one, thou KA who dwellest in Tattu, thou mighty (2) one in Sekhem, thou lord to whom invocations are made in Anti, thou who art over the offerings in Annu, thou lord who makest inquisition in two-fold right and truth, thou hidden soul, the lord of Qerert, thou who disposest affairs in the city of the White Wall, thou soul of Ra, thou very body of Ra who restest in (3) Suten-henen, thou to whom adorations are made in the region of Nart, thou who makest the soul to rise, thou lord of the Great House in Khemennu, thou mighty of terror in Shas-hetep, thou lord of eternity, thou chief of Abtu, thou who sittest upon thy throne in Ta-tchesert, thou whose name is established in the mouths of (4) men, thou unformed matter of the world, thou god Tum, thou who providest with food the ka's who are with the company of the gods, thou perfect khu among khu's , thou provider of the waters of Nu, thou giver of the wind, thou producer of the wind of the evening from thy nostrils for the satisfaction of thy heart.\n\nThou makest (5) plants to grow at thy desire, thou givest birth to .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n.\n\n; to thee are obedient the stars in the heights, and thou openest the mighty gates.\n\nThou art the lord to whom hymns of praise are sung in the southern heaven, and unto thee are adorations paid in the northern heaven.\n\nThe never setting stars (6) are before thy face, and they are thy thrones, even as also are those that never rest.\n\nAn offering cometh to thee by the command of Seb.\n\nThe company of the gods adoreth thee, the stars of the tuat bow to the earth in adoration before thee, [all] domains pay homage to thee, and the ends of the earth offer entreaty and supplication.\n\nWhen those who are among the holy ones (7) see thee they tremble at thee, and the whole world giveth praise unto thee when it meeteth thy majesty.\n\nThou art a glorious sahu among the sahu's , upon thee hath dignity been conferred, thy dominion is eternal, O thou beautiful Form of the company of the gods; thou gracious one who art beloved by him that (8) seeth thee.\n\nThou settest thy fear in all the world, and through love for thee all proclaim thy name before that of all other gods.\n\nUnto thee are offerings made by all mankind, O thou lord to whom commemorations are made, both in heaven and in earth.\n\nMany are the shouts of joy that rise to thee at the Uak[*] festival, and cries of delight ascend to thee from the (9) whole world with one voice.\n\nThou art the chief and prince of thy brethren, thou art the prince of the company of the gods, thou stablishest right and truth everywhere, thou placest thy son upon thy throne, thou art the object of praise of thy father Seb, and of the love of thy mother Nut.\n\nThou art exceeding mighty, thou overthrowest those who oppose thee, thou art mighty of hand, and thou slaughterest thine (10) enemy.\n\nThou settest thy fear in thy foe, thou removest his boundaries, thy heart is fixed, and thy feet are watchful."

