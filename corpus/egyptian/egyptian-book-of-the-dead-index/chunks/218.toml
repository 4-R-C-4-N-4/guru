[content]
body = "Verily, Sut spake unto me (17) the things which concern himself, and I said, I Let the thought of the trial of the balance by thee be even within our hearts.'\" The majesty of the god Anubis saith: (18) \"Dost thou know the name of this door to declare it unto me?\" Osiris, the scribe Ani, triumphant, (19) triumphant in peace, saith: \"'Driven away of Shu' is the name of this (20) door.\" Saith the majesty of the god Anubis: (21) \"Dost thou know the name of the upper (22) leaf and of the lower leaf thereof?\" [Osiris, the scribe Ani, triumphant in peace saith]:\"' Lord of right and truth, [standing] (23) upon his 'two feet' is the name of the upper (24) leaf, and 'Lord of might and power, dispenser of (25) cattle' [is the name of the lower leaf].\" [The majesty of the god Anubis saith]: \"Pass thou, for thou knowest [the names] (26), O Osiris, the scribe, teller (27) of the divine offerings of all the gods of Thebes, Ani, triumphant, lord to be revered.\" Appendix: The usual introduction to the CXXVth Chapter reads (see Naville, Todtenbuch , Bd.\n\nI., Bl.\n\n133) as follows:-- I.\n\n(1) THE FOLLOWING SHALL BE SAID BY A MAN WHEN HE COMETH UNTO THE HALL OF DOUBLE RIGHT AND TRUTH, WHEREIN HE IS PURGED (2) OF ALL THE SINS WHICH HE HATH DONE, AND WHEREIN HE SEETH THE FACES OF ALL THE GODS: Hail to thee, great god, the lord of Right and Truth!\n\nI have come unto thee, O my lord, (3) and I have drawn nigh that I may look upon thy beauties.\n\nI know thee, and I know the names of the forty-two gods who dwell with thee in this (4) Hall of Double Right and Truth, and that they may set the sinners in the gives, who live and who feed upon their blood on the day (5) when the natures of men are accounted before Un-neferu.\n\n{p.\n\n346} In very truth 'Rekhti-merti-f-ent-Maat' is thy name.\n\nVerily (6) I have come unto thee, and I bring before thee Right and Truth.\n\nFor thy sake I have rejected wickedness.\n\nI have done no hurt unto man, nor have I wrought harm unto beasts.\n\nI have committed no crime (7) in the place of Right and Truth.\n\nI have had no knowledge of evil; nor have I acted (8) wickedly.\n\nEach day have I laboured more than was required of me.\n\n(9) My name hath not come forth to the boat of the Prince.\n\nI have not despised God.\n\n(10) I have not caused misery; nor have I worked affliction.\n\nI have done not (11) that which God doth abominate.\n\nI have caused no wrong to be done to the servant by his master.\n\nI have (12) caused none to feel pain.\n\nI have made [no man] to weep.\n\n(13) I have not committed murder; nor have I ever bidden any man \"to slay on my behalf.\n\nI have not wronged the people.\n\nI have not filched that which hath been offered in (14) the temples; nor have I purloined the cakes of the gods.\n\nI have not carried away the (15) offerings made unto the blessed dead.\n\nI have not committed fornication, nor have I defiled my body."

