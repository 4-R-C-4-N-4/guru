body = "Sacred Texts Egypt Index Previous Next PLATES XI.\n\nAND XII.\n\nVignette I.\n\n: Ani and his wife Thuthu approaching the first Arit,[3] the cornice of which is ornamented with ### i.e.\n\n, emblems of power, life, and stability.\n\nAt the entrance sit three gods, the first having the head of a hare, the second the head of a serpent, and the third the head of a crocodile.\n\nThe first holds an ear of corn (?), and each of the others a knife.\n\nText [CHAPTER CXLVII.]: (I) THE FIRST ARIT.\n\nThe name of the doorkeeper is Sekhet-hra-asht-aru[3]; the name of the (2) watcher is Meti-heh (?)[4]; the name of the herald is Ha-kheru.[5] [WORDS TO BE SPOKEN WHEN OSIRIS COMETH TO THE FIRST ARIT IN AMENTA.[6]] Saith (3) Ani, triumphant, when he cometh to the first Arit: \"I am the mighty one who createth his own light.\n\n(4) I have come unto thee, O Osiris, and, purified from that which defileth thee, I adore thee.\n\nLead on; (5) name not the name [1.\n\nLepsius ( Todtenbuch , Bl.\n\nXI.) adds, after this: \"Now those who rise up against me and among whom is evil [see above, l.\n\n141] are the powers of darkness of the god Sut, when there is strife among them, for strife is flame.\" 2.\n\n\"May it be granted to [the dead] by the decree of [the gods] who are in Tattu to destroy the souls of his foes!\" 2 House or mansion.\n\nin the upper line of Plates XI.\n\nand XII.\n\nthere is a series of seven Arits , or mansions, through which the deceased is supposed to pass.\n\nIn the lower line are the ten Sebkhets , or pylon-shaped gateways.\n\n3 \"Reversed of face: of many forms.\" Var.\n\n###.\n\n4 Var.\n\n###.\n\n5 \"The voice that travelleth.\" Var.\n\n###.\n\n\"The high-voiced.\" 6 Supplied from Naville, Todtenbuch , 1.\n\n165.] {p.\n\n292} of Re-stau unto me.\n\nHomage to thee, O Osiris, in thy might and in thy strength (6) in Re-stau.\n\nRise up and conquer, O Osiris, in Abtu.\n\nThou goest round about heaven, thou sailest in the presence of Ra, (7) thou seest all the beings who have knowledge.[1] Hail Ra, who circlest in [the sky].\n\nVerily I say [unto thee], O Osiris, I am a (8) godlike ruler.\n\n(9) Let me not be driven hence[2] (10) nor from the wall of burning coals.\n\n[I have] opened the way in Re-stau; (11) I have eased the pain of Osiris; [I have] embraced that which the balance I hath weighed; [I have] made a path for him in the great valley, it and [he] maketh a path.\n\nOsiris shineth(?).\" Vignette II.\n\n: The second Arit, guarded by three gods; the first of whom has the head of a lion, the second the head of a man, and the third the head of a dog.\n\nEach one holds a knife.\n\nText: (1) THE SECOND ARIT."

