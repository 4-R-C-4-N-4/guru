body = "A thick gold wire to fit the neck is attached to No.\n\n24,401.\n\nThe base of the scarab is sometimes in the form of a heart (Nos.\n\n7917, 7925).\n\nA remarkable example of this variety is No.\n\n7925, in which are [1.\n\nThe fifth king of the IVth dynasty.\n\n2.\n\nThis prince is said to have been a very learned man, whose speech was difficult to be understood (see Wiedemann, Aeg.\n\nGeschichte ., p.\n\n191).\n\n3.\n\nFor the hieroglyphic text, see pp.\n\n13-15.\n\nThis rubric was published by Birch, Aeg.\n\nZeitschrift , p.\n\n54; and by Rosellini, Breve Notizia interno un frammento di Papiro funebre Egizio essistente nel ducale museo di Parma ; Parma, 1839, 8vo.] {p.\n\n263} the emblems of \"life,\" \"stability,\" and \"protection,\" engraved on the upper part of the base.\n\nAcross the back of this scarab is -- ###;[1] On the right wing:-- ### and on the left ###[2].\n\nA highly polished, fine green basalt scarab with human face (No.\n\n7876) is set in a gold base, upon the face and edges of which are cut part of the Chapter of the Heart.\n\nAt a period subsequent to the XXIInd dynasty inscribed funereal scarabs in marble, paste, etc., were set in pylon-shaped pectorals made of Egyptian porcelain, glazed blue, green, or yellow, which were sewed to the mummy bandages over the heart.\n\nOn such pectorals the boat of the Sun is either traced in colours or worked in relief, and the scarab is placed so as to appear to be carried in the boat; on the left stands Isis, and on the right Nephthys (Nos.\n\n7857, 7864, 7866).\n\nNext: Plates V.\n\nand VI."

