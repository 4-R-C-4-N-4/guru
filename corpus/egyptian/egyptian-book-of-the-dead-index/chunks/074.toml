[content]
body = "No man knoweth how to know Him--His name remaineth hidden; His name is a mystery unto His children.\n\nHis names are innumerable, they are manifold and none knoweth their number--God is truth and He liveth by truth and He feedeth thereon.\n\nHe is the king of truth, and He hath stablished the earth thereupon--God is life and through Him [1.\n\nÉtudes des Rituel Funéraire des Anciens Égyptiens (in Revue Archéologique ), Paris, 1860, p.\n\n72.\n\n2.\n\nLa croyance à l'Unité du Dieu suprême, à ses attributs de Créateur et de Législateur de l'homme, qu'il a doué d'une âme immortelle; voilà les notions primitives enchâssées comme des diamants indestructibles au milieu des superfétations mythologiques accumulées par les siècles qui ont passé sur cette vieille civilization.\n\nSee Conference sur la Religion des anciens Égyptiens (in Annales de Philosophic Chrétienne , 5 ième Série, t.\n\nxx., Paris, 1869, pp.\n\n325-337).\n\n3.\n\nÉgypte , Paris, 1839, p.\n\n245, col.\n\n1.\n\n4.\n\nLe Panthéon Égyptien , Paris, 1881, p.\n\n4.] {p.\n\nxciii} only man liveth.\n\nHe giveth life to man, He breatheth the breath of life into his nostrils--God is father and mother, the father of fathers, and the mother of mothers.\n\nHe begetteth, but was never begotten; He produceth, but was never produced; He begat himself and produced himself.\n\nHe createth, but was never created; He is the maker of his own form, and the fashioner of His own body--God Himself is existence, He endureth without increase or diminution, He multiplieth Himself millions of times, and He is manifold in forms and in members--God hath made the universe, and He hath created all that therein is; He is the Creator of what is in this world, and of what was, of what is, and of what shall be.\n\nHe is the Creator of the heavens, and of the earth, and of the deep, and of the water, and of the mountains.\n\nGod hath stretched out the heavens and founded the earth-What His heart conceived straightway came to pass, and when He hath spoken, it cometh to pass and endureth for ever--God is the father of the gods; He fashioned men and formed the gods--God is merciful unto those who reverence Him, and He heareth him that calleth upon Him.\n\nGod knoweth him that acknowledgeth Him, He rewardeth him that serveth Him, and He protecteth him that followeth Him.[1] Monotheism and polytheism coexistent.\n\nBecause, however, polytheism existed side by side with monotheism in Egypt, M.\n\nMaspero believes that the words \"God One\" do not mean \"One God\" in our sense of the words; and Mr.\n\nRenouf thinks that the \"Egyptian nutar never became a proper name.\"[2] Whether polytheism grew from monotheism in Egypt, or monotheism from polytheism we will not venture to say, for the evidence of the pyramid texts shows that already in the Vth dynasty monotheism and polytheism were flourishing side by side."

