body = "Sacred Texts Egypt Index Previous Next PLATE XVI.\n\nVignette: Ani standing, with both hands raised in prayer, before four gods who are seated on a pedestal in the form of Maat; before him is his heart set upon a pedestal.\n\nText [CHAPTER XXVII.]: (I) THE CHAPTER OF NOT LETTING THE HEART OF A MAN BE TAKEN AWAY FROM HIM IN THE UNDERWORLD.[1] Saith Osiris Ani: \"Hail, ye who carry away hearts, [hail] ye who steal hearts!\n\n(2) ye have done.[2] Homage to you, O ye lords of eternity, ye possessors of everlastingness, \" take ye not away this heart of Osiris Ani (3) in your grasp, this heart of Osiris.\n\nAnd cause ye not evil words to spring up against it; because this heart of Osiris Ani is the heart of the one of many names, the mighty one whose words are his limbs, and who sendeth forth his heart to dwell in (4) his body.\n\n{???} heart of Osiris Ani is pleasant unto the gods; he is victorious, he hath {???} gotten power over it; he hath not revealed what hath been done unto it.\n\nHe {???} gotten power (5) over his own limbs.\n\nHis heart obeyeth him, he is the lord thereof, it is in his body, and it shall never fall away therefrom.\n\nI, Osiris, the scribe Ani, victorious in peace, and triumphant in the beautiful Amenta and on the mountain of eternity, bid thee be obedient unto me in the underworld.\" Appendix: The three following chapters, which do not occur in the Ani papyrus, form part of the group of the chapters relating to the heart.\n\nThey are here supplied from Naville, Todtenbuch , Bd.\n\nI., Pl.\n\nxl., xlii., xxxix.\n\n[1.\n\nIn Naville's edition there follow the words hab-nef ab-f xenti xat-f temam ab-f er neteru sexem am-f , \"his heart goeth to inhabit his body; his heart is perfect before the gods, he gaineth possession of it.\" 2.\n\nThe reading of Naville's edition is better here.\n\n\"Ye who steal hearts, and who make the heart of a man to come into existence according to that which hath been done by him; may it ( i.e.\n\n, his heart) be made strong by you.\"] {p.\n\n313} Text [CHAPTER XXIX A .]:[1] (1) THE CHAPTER OF THE HEART NOT BEING CARRIED AWAY IN THE UNDERWORLD.\n\nHe saith: \"My heart (2) is with me, and it shall never come to pass that it shall be carried away.\n\nI am the lord of hearts, the slayer of the heart.\n\n(3) I live in right and in truth, and I have my being therein.\n\nI am Horus, a pure heart (4) within a pure body.\n\nI live by my word, and my heart doth live.\n\nLet not my heart be taken away (5), let it not be wounded, and may no wounds or gashes be dealt upon me because it hath been taken away[2] from me.\n\n(6) May I exist in the body of my father Seb, and in the body of my mother Nut.\n\nI have not done evil (7) against the gods; I have not sinned with boasting.\" Vignette: The deceased adoring a heart.\n\nText [CHAPTER XXX A .]: (I) THE CHAPTER OF NOT (2) LETTING THE HEART OF A MAN BE DRIVEN AWAY FROM HIM IN THE UNDERWORLD."

