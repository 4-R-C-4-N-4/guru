body = "\"Hail, Thoth, who madest Osiris victorious (3) over his enemies, make thou the Osiris Ani (triumphant before Osiris) victorious over his enemies in the presence of the great godlike rulers who are in (4) Re-stau, on the night when Anubis lay with his arms and his hands over the things behind Osiris, and it when Horus was made to triumph over his enemies.\" Â§J.\n\nVignette: The gods Horus, Osiris, Isis, and .\n\n.\n\n.\n\n.\n\n(?) [1.\n\nVar.\n\nen seseta aa aru , \"of making to be hidden the one mighty of forms\" ( i.e.\n\n, Osiris).\n\nSee Naville, Todtenbuch , Bd.\n\nII., Bl.\n\n81.\n\n2 Also written ###; see Brugsch, Wörterbuch , p.\n\n387; Lanzone, Dizionario , p.\n\n197.\n\n3 Var.\n\n### Ababi.] {p.\n\n305} Text: (1) The great godlike rulers in Re-stau are Horus, Osiris, and Isis.\n\nThe heart of Osiris rejoiceth, and the heart of Horus (2) is glad; and therefore are the east and the west at peace.\n\n\"Hail Thoth, who madest Osiris victorious over his enemies, (3) make thou the Osiris Ani, the scribe and teller of the divine offerings of all the gods, to triumph over his enemies in the presence of the ten (4) companies of great godlike rulers who are with Ra and with Osiris and with every god and goddess in the presence of Neb-er-tcher.\n\nHe hath destroyed his (5) enemies, and he hath destroyed every evil thing belonging unto him.\" Rubric: This chapter being recited, the deceased shall come forth by day, purified after death, and [he shall make all] the forms[1] (or transformations) which his heart shall dictate.\n\nNow if this chapter be recited over him, he shall come forth[2] upon earth, he shall escape from every fire; and none of the foul things which appertain unto him shall encompass him for everlasting[3] and for ever and for ever.\n\nNext: Plate XV."

