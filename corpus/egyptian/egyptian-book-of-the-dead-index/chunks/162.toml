[content]
body = "287} Ubes-hra-per-em-khet khet,[l] and Maa (106) -em-qerh-an-nef-em-hru.[2] The chief of the holy ones (107) who minister in his chamber is Horus, the avenger of his father.\n\nAs to the day (108) [upon which was said] \" Come therefore thither,\" it concerneth the words, \"Come (109) then thither,\" which Ra spake unto Osiris.\n\nLo, may this be decreed for me in Amentet.\n\n\"I am the soul which dwelleth in the two (110) tchafi .\" What then is this?\n\nIt is Osiris [when] he goeth into Tattu (111) and findeth there the soul of Ra; there the one god (112) embraceth the other, and souls spring into being within the two tchafi .[3] [\"I am the Cat which fought (?) by the Persea tree hard by in Annu, on the night when the foes of Neb-er-tcher were destroyed.\"] What then is this?\n\nThe male cat is Ra himself, and he is called Maau[4] by reason of the speech of the god Sa [who said] concerning him: \"He is like ( maau ) unto that which he hath made, and his name became Maau\"; or (as others say), It is Shu who maketh over the possessions of Seb to Osiris.\n\nAs to the fight (?) by the Persea tree hard by, in Annu, it concerneth the children of impotent revolt when justice is wrought on them for what they have done.\n\nAs to [the words] \"that night of the battle,\" they concern the inroad [of the children of impotent revolt] into the eastern part of heaven, whereupon there arose a battle in heaven and in all the earth.\n\n\"O thou who art in the egg (i.e., Ra), who shinest from thy disk and risest in thy horizon, and dost shine like gold above the sky, like unto whom there is none among the gods, who sailest over the pillars of Shu ( i.e.\n\n, the ether), who givest blasts of fire from thy mouth, [who makest the two lands bright with thy radiance, deliver] the faithful worshippers from the god whose forms are hidden, whose eyebrows are like unto the two arms of the balance on the night of the reckoning of destruction.\" [1.\n\nI.e.\n\n, \"Blazing-face coming forth, going back.\" 2 I.e.\n\n, \"The one who seeth by night, and leadeth by day.\" 3 This reading differs from that of any other papyrus of this period.\n\nAfter the words, \"spring into being within the two tchafi ,\" the papyrus of Nebseni has, \"It is Horus, the avenger of his father, and Horus-khenti-en-maa,\" or (as others say), \"'the two souls within the tchafi' are the soul of Ra [and] the soul of Osiris, [or] the soul which is in Shu and the soul which is in Tefnut, that is, the two souls which are in Tattu.\" It appears that the scribe of the Ani papyrus has here accidentally omitted a long section; the text is therefore supplied within brackets from the Nebseni papyrus, plate xiv., 1.\n\n16 ff.\n\n4.\n\nNote the play upon the words maau , \"cat,\" and maau , \"like.\"] {p.\n\n288} Who then is this?\n\nIt is An-a-f, the god who bringeth his arm."

