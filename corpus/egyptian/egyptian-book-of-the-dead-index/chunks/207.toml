body = "Sacred Texts Egypt Index Previous Next PLATE XXVI.\n\nunderworld fear me, and they (17) fight for me [in their habitations].\n\nI, in very truth I am a shining one and a dweller in light, who hath been created and who hath come into being (18) from the body of the god.\n\nI am one of the shining {p.\n\n334} ones who dwell in light, whom (19) Tmu himself hath created, and who have.(come into being from the eyelashes of his eye.\n\nHe doth create and glorify and make noble the faces of those who live with him.\n\n(20) Behold, the only One in Nu!\n\nThey do homage unto him as he cometh forth from the horizon, and they strike fear of him into the gods (21) and into the shining ones who have come into being with him.\n\n\"I am the One among the worms which the eye of the Lord, the only One, hath created.\n\nAnd lo!\n\n(22) before Isis was, and when Horus was not yet, I had waxed strong, and flourished.\n\nI had grown old, and I had become greater (23) than they who were among the shining ones who had come into being with him, and I, even I, arose in the form of a sacred hawk (24), and Horus made me worthy in the form of his own soul, to take possession of all that belongeth unto Osiris in the underworld.\n\nThe double Lion-god, (25) the warder of the things that belong to the house of the nemmes crown which is in his hiding place, saith unto me: 'Get thee back to the heights of heaven, seeing that through Horus (26) thou hast become glorified in thy form; the nemmes crown is not for thee; thou hast speech even unto the ends (27) of heaven.' I, the guardian, take possession of the things which belong to Horus and Osiris in the underworld.\n\nHorus telleth aloud unto me that which (28) his father had said concerning me in years [gone by], on the day of the burial [of Osiris].\n\nI have given unto thee the nemmes of the double Lion-god which I possess, (29) that thou mayest pass onward and mayest travel over the path of heaven, and that they who dwell on the confines of the horizon may see thee, and that the gods of the underworld may fear thee (30) and may fight for thee in their habitations.\n\nThe god Auhet is of them.\n\nThe gods, the lords of the boundaries of heaven, they who are the warders (31) of the shrine of the lord, the only One, have fallen before my words, have fallen down before [my] words.\n\nHail!\n\nHe that is exalted upon his tomb is on my side, and he hath bound upon my head the nemmes crown.\n\n(32) The double Lion-god hath decreed it, the god Auhet hath made a way for me.\n\nI, even I, am exalted, and the double Lion-god hath bound the nemmes crown on me, and (33) my head covering hath been given unto me.\n\nHe hath stablished my heart through his strength and through his great might, and I shall not (34) fall through Shu.\n\nI am Hetep, the lord of the two uræi, the being who is adored.\n\nI know the shining god, (35) and his breath is in my body.\n\nI shall not be driven back by the Bull which causeth men to tremble, but I shall come daily into the house of the double Lion-god, and I shall come forth therefrom into the house of Isis.\n\nI shall behold sacred things which are hidden, there shall be {p."

