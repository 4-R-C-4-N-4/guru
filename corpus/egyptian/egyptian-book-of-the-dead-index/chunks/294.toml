body = "222) 8.\n\nIbid.\n\n, t.\n\nviii., p.\n\n88 (l.\n\n565 ff.).\n\n9.\n\nIbid.\n\n, t.\n\niii., p.\n\n214 (l.\n\n268).] {p.\n\nlxxiii} Further, this identification of the deceased with the God of Heaven places him in the position of supreme ruler.\n\nFor example, we have the prayer that Unas \"may rule the nine gods and complete the company of the nine gods,\"[1] and Pepi I., in his progress through heaven, comes upon the double company of the gods, who stretch out their hands, entreating him to come and sit down among them.[2] Identification with Horus.\n\nAgain, the deceased is changed into Horus, the son of Osiris and Isis.\n\nIt is said of Pepi I., \"Behold it is not Pepi who entreateth to see thee in the form in which thou art ###, O Osiris, who entreateth to see thee in the form in which thou art, O Osiris; but it is thy son who entreateth to see thee in the form in which thou art, O Osiris, it is Horus who entreateth to see thee in the form in which thou art\";[3] and Horus does not place Pepi at the head of the dead, but among the divine gods.[4] Elsewhere we are told that Horus has taken his Eye and given it to Pepi, and that the odour of Pepi's body is the odour of the Eye of Horus.[5] Throughout the pyramid texts the Osiris of the deceased is the son of Tmu, or Tmu-Ra, Shu, Tefnut, Seb, and Nut, the brother of Isis, Nephthys, Set, and Thoth, and the father of Horus;[6] his hands, arms, belly, back, hips and thighs, and legs are the god Tmu, and his face is Anubis.[7] He is the brother of the moon,[8] he is the child of the star Sothis,[9] he revolves in heaven like Orion and Sothis,[10] and he rises in his place like a star.[11] The gods, male and [1.\n\nRecueil de Travaux , t.\n\niii., p.\n\n217 (l.\n\n283).\n\n2.\n\nIbid.\n\n, ###.\n\nt.\n\nvii., p.\n\n150 (l.\n\n263).\n\n3.\n\nIbid.\n\n, t.\n\nvii., p.\n\n155 (l.\n\n315 f.) 4.\n\n###.\n\nt.\n\nv., p.\n\n194 (p.\n\n190).\n\n5 Ibid.\n\n, t.\n\nvii., p.\n\n169 (1.\n\n457).\n\n6 Ibid.\n\n, t.\n\niii., pp.\n\n209-211.\n\n7 Ibid.\n\n, p.\n\n201 (l.\n\n207).\n\n8.\n\n###.\n\nIbid.\n\n, t.\n\nv., p.\n\n198 (l.\n\n203).\n\n9.\n\nIbid.\n\n, t.\n\niv., p.\n\n44 (l.\n\n391).\n\n10.\n\nIbid.\n\n, t.\n\niii., p.\n\n205 (l.\n\n221).\n\n10.\n\nIbid.\n\n, t.\n\niv., p.\n\n44 (l.\n\n391).] {p.\n\nlxxiv} female, pay homage to him,[1] every being in heaven adores him; and in one interesting passage it is said of Pepi I.\n\nthat \"when he hath come forth into heaven he will find Ra standing face to face before him, and, having seated himself upon the shoulders of Ra, Ra will not let him put himself down again upon the ground; for he knoweth that Pepi is more shining than the shining ones, more perfect than the perfect, and more stable than the stable ones .\n\n.\n\n.\n\n.\n\n."

