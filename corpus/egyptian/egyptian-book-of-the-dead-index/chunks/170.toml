[content]
body = "Saith Osiris, the scribe Ani, [triumphant]: \"Lo, she who prevaileth with knives, mistress of the world, destroyer of the foes of the Still-Heart, she who decreeth the escape of the needy from evil hap.\n\nThe name of the doorkeeper is Nekau.\" Vignette V.: The fifth Pylon, which is guarded by the hippopotamus deity, with her fore-feet resting upon the buckle, the emblem of protection, seated in a shrine, the cornice of which is ornamented with ###, emblematic of flames of fire.\n\nText: WORDS TO BE SPOKEN WHEN [ANI] COMETH UNTO THE FIFTH PYLON.\n\nSaith Osiris, the scribe Ani, triumphant: \"Lo, the flame, the lady of breath (?) for the nostrils; one may not advance to entreat her shall not come into her presence.\n\nThe name of the doorkeeper is Hentet-Arqiu.\" Vignette VI.: The sixth Pylon, which is guarded by a deity in the form of a man holding a knife and a besom and seated in a shrine, above which is a serpent.\n\nText: WORDS TO BE SPOKEN WHEN [ANI] COMETH UNTO THE SIXTH PYLON.\n\nSaith Osiris, the scribe Ani, triumphant: \"Lo, the lady of light, the mighty one, to whom men cry aloud; man knoweth neither her breadth nor her height; there was never found her like from the beginning (?).\n\nThere is a serpent thereover whose size is not known; it was born in the presence of the Still-Heart.\n\nThe name of the doorkeeper is Semati.\" Vignette VII.: The seventh Pylon, which is guarded by a ram-headed deity holding a besom and seated in a shrine, the cornice of which is decorated with khakeru ornaments.\n\n[1.\n\nThe principal variants are \"every god uniteth with her\"; \"the heart of every god rejoiceth in her.\" See Naville, Todtenbuch , Bd.\n\nII., Bl.\n\n371.] {p.\n\n297} Text: WORDS TO BE SPOKEN WHEN [ANI] COMETH UNTO THE SEVENTH PYLON.\n\nSaith Osiris, the scribe Ani, triumphant: \"Lo, the robe which doth clothe the feeble one ( i.e.\n\n, the deceased), weeping for what it loveth and shroudeth.\n\nThe name of the doorkeeper is Sakti-f.\" Vignette VIII.: The eighth Pylon, which is guarded by a hawk wearing the crowns of the North and South, seated on a sepulchral chest with closed doors; before him is a besom, and behind him is the utchat .\n\nAbove the shrine are two human-headed hawks, emblems of the souls of Ra and Osiris, and two emblems of life.\n\nText: WORDS TO BE SPOKEN WHEN [ANI] COMETH UNTO THE EIGHTH PYLON.\n\nSaith Osiris, the scribe Ani, triumphant: \"Lo, the blazing fire, the flame whereof cannot be quenched, with tongues of flame which reach afar, the slaughtering one, the irresistible, through which one may not pass by reason of the hurt which it doeth.\n\nThe name of the doorkeeper is Khu-tchet-f.\"[1] Vignette IX: The ninth Pylon, which is guarded by a lion-headed deity wearing a disk and holding a besom, seated in a shrine, the cornice of which is ornamented with uræi wearing disks.\n\nText: WORDS TO BE SPOKEN WHEN [ANI] COMETH UNTO THE NINTH PYLON."

