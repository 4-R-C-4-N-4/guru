[content]
body = "Sacred Texts Egypt Index Previous Next PLATE XXXII.\n\n(34) \"Hail, Tmu in thine hour, who comest forth from Tattu, I have never cursed the king.\" (35) \"Hail, thou who workest with thy will, who comest forth from Tebu, I have never fouled the water.\" (36) \"Hail, thou bearer of the sistrum, who comest forth from Nu, I have not spoken scornfully.\" (37) \"Hail, thou who makest mankind to flourish, who comest forth from Saïs, I have never cursed God.\" (38) \"Flail, Neheb-ka, who comest forth from thy hiding place, I have not stolen.\" (39) \"Hail, Neheb-nefert, who comest forth from thy hiding place, I have not defrauded the offerings of the gods.\" (40) \"Hail, thou who dost set in order the head, who comest forth from thy shrine, I have not plundered the offerings to the blessed dead.\" (40 \"Hail, thou who bringest thy arm, who comest forth from the city of Maati, I have not filched the food of the infant, neither have I sinned against the god of my native town.\" (42) \"Hail, thou whose teeth are white, why comest forth from Ta-she, I have not slaughtered with evil intent the cattle of the god.\" Appendix: The following version of the Negative Confession is given in the Nebseni Papyrus (Naville, Todtenbuch , Bd.\n\nI., Bll.\n\n134, 135), showing important variations in the text and in the order in which the gods are addressed.\n\n\"(1) Hail, thou whose strides are long, who comest forth from Annu, I have not done iniquity.\n\n(2) Hail, thou who art embraced by flame, who comest forth from Kher-aba, I have not robbed with violence.\n\n(3) Hail Fenti who comest forth from {p.\n\n350} Khemennu, I have not made any to suffer pain.\n\n(4) Hail, Devourer of Shades, who comest forth from [thy] retreat, I have not robbed.\n\n(5) Hail, thou whose limbs are terrible to look upon, who comest forth from Restau, I have done no murder.\n\n(6) Hail, thou god who art in the form of two lions, who comest forth from heaven, I have not defrauded offerings.\n\n(7) Hail, thou god whose two eyes are of fire, who comest forth from Sekhem, I have not done harm.[1] (8) Hail, Fiery god, who comest and goest,[2] I have not robbed God.\n\n(9) Hail, Crusher of Bones, who comest forth from Suten-henen, I have told no lies.\n\n(10) Hail, thou who shootest thyself forth from the flame, who comest forth from Het-Ptah-ka, I have not snatched away food.\n\n(11) Hail, Qerti, who comest forth from Amentet, I have not worked affliction.\n\n(12) Hail, thou whose teeth are white, who comest forth from Ta-she, I have not transgressed.\n\n(13) Hail, Devourer of blood, who comest forth from the block, I have not slaughtered the cattle which are set apart for the gods.\n\n(14) Hail, Devourer of the inward parts, who comest forth from Mabit, I have done no evil."

