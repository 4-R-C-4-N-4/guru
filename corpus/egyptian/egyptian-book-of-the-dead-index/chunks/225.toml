[content]
body = "Hail, thou who art exalted upon thy resting place, thou lord of the atef crown, who declarest thy name as the lord of the (17) winds, deliver thou me from thine angels of destruction, who make dire deeds to happen and calamities to arise, and (18) who have no covering upon their faces, because I have done right and truth, O thou Lord of right and truth.\n\nI am pure, in my fore-parts have I been made clean, and in my hinder parts have I (19) been purified; my reins have been bathed in the Pool of right and {p.\n\n352} truth, and no member of my body was wanting.\n\nI have been purified in the pool of the south.\n\nI have rested in Hemet, on the north of the (20) field of the grasshoppers, wherein the holy mariners do purify themselves in the night season, that they may pacify (?) the heart of the gods after I have passed over it (21) by night and by day.\n\nMay the gods say unto me, 'We let him come,' and they say unto me, 'Who art thou, and what is thy name?' My name is 'I grew among (22) the flowers, dwelling in the olive tree.' Then shall they say unto me, 'Pass on straightway.' I have passed by the city on the north of the groves, and the gods say, 'What didst thou see there?' [I saw] the Leg and the Thigh.\n\n(23) 'What hadst thou to do with them?' I saw rejoicings in the lands of the Fenkhu.\n\n'What did they give thee?' They gave me a (24) flame of fire together with a crystal tablet.\n\n'What didst thou therewith?' I burned it at the place of Maati together with the things of the night.\n\n'What didst thou (25) find there at the place of Maati?' A sceptre of flint which maketh a man to prevail.\n\n'What then is [the name] of this sceptre of flint?' 'Giver of winds' is its name.\n\n'What then didst thou unto the flame of fire with the tablet of (26) crystal after thou didst bury it?' I uttered words over it, I made (27) adjuration thereby, I quenched the fire, and I used the tablet to create (28) a pool of water.\n\n'Come, then, pass through the door of this Hall of two-fold Maati, for thou (29) knowest us.' 'I will not let thee enter in over me,' saith the bolt of the door, (30) 'unless thou tell my name.' 'Weight of the place of right and truth' is thy name.\n\nI will not let thee (31) pass in by me,' saith the right post of the door, 'unless thou tell my name.' (32) 'Weigher of the labours of right and truth' is thy name.\n\n'I will not let thee enter in by me,' saith the left Post (33) of the door, 'unless thou tell my name.' 'judge of (34) wine' (?) is thy name.\n\n'I will not let thee pass,' saith the threshold of the door, (35) unless thou tell my name.' 'Ox of Seb' is thy name.\n\n'I will not open unto thee,' (36) saith the bolt-socket of the door, 'unless thou tell my name.' 'Flesh of his (37) mother' is thy name.\n\nI will not open unto thee,' saith the lock of the door, 'unless thou tell my name.' The utchat of Sebek, the Lord of Bakhan, liveth' is thy name."

