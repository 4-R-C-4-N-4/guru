body = "The charms against serpents in the pyramid texts of the Vth and VIth dynasties have their equivalents in the XXXIst and XXXIIIrd Chapters of the Book of the Dead, which are found on coffins of the XIth and XIIth dynasties;[2] and in the XVIIIth dynasty we find vignettes in which the deceased is depicted in the act of spearing a crocodile[3] and of slaughtering serpents.[4] In the Theban and Saïte versions are several small chapters[5] the recital of which drove away reptiles; and of these the most important is the XXXIXth Chapter, which preserved the deceased from the attack of the great serpent Apef or Apep, who is depicted with knives stuck in his folds.[7] In the period of the later dynasties a service was performed daily in th temple of Amen-Ra at Thebes to deliver the Sun-god from the assault of this fiend and on each occasion it was accompanied by a ceremony in which a waxen figure of Apep was burnt in the fire; as the wax melted, so the power of Apep was destroyed.\n\nAnother name of Apep was Nak, who was pierced by the lance of th eye of Horus and made to vomit what he had swallowed.[9] The Devourer of the Dead The judgment scene in the Theban edition of the Book of the Dead reveal the belief in the existence of a tri-formed monster, part crocodile, part lion, and [1.\n\nMaspero, Recueil de Travaux , t.\n\niii., p.\n\n220.\n\n2.\n\nGoodwin, Aeg.\n\nZeitschrift , 1866, p.\n\n54; see also Lepsius, Aelteste Texte , Bl.\n\n35, l.\n\n1 ff.\n\n3.\n\nNaville, Todtenbuch , Bd.\n\nI., Bl.\n\n44.\n\n4.\n\nIbid.\n\n, Bd.\n\nI., Bl.\n\n46.\n\n5.\n\nI.e.\n\n, chapp.\n\n32, 34, 35, 36, 37, 38, etc.\n\n6.\n\nFor the text see Naville, Todtenbuch , Bd.\n\nI., Bl.\n\n53; and Lepsius, Todtenbuch , Bl.\n\n18.\n\n7.\n\nSee Lanzone, Dizionario , p.\n\n121.\n\n8.\n\nThe service for the Overthrowing of Apepi is printed in Archæologia , vol.\n\nlii., pp.\n\n393-608.\n\n9.\n\n###.\n\nGrébaut, Hymne, p.\n\n10.] {p.\n\ncxxx} part hippopotamus, whom the Egyptians called Am-mit, i.e.\n\n, \"the eater of the Dead,\" and who lived in Amenta; her place is by the side of the scales wherein the heart is weighed, and it is clear that such hearts as failed to balance the feather of Maat were devoured by her.\n\nIn one papyrus she is depicted crouching by the side of a lake.[1] Other types of evil were the insect Apshai, [2]confounded in later times with the tortoise[3], which dies as Ra lives;[4] the crocodile Sebak, who afterwards became identified with Ra; the hippopotamus, the ass, etc .\n\nThe devils of the underworld."

