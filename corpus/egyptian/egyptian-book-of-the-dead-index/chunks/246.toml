body = "xiii} the Nile.[1] To fix a chronological limit for the arts and civilization of Egypt is absolutely impossible.[2] Evidence of the antiquity of certain chapters.\n\nThe oldest form or edition of the Book of the Dead as we have received it supplies no information whatever as to the period when it was compiled; but a copy of the hieratic text inscribed upon a coffin of Menthu-hetep, a queen of the XIth dynasty,[3] about B.C.\n\n2500, made by the late Sir J.\n\nG.\n\nWilkinson,[4] informs us that the chapter which, according to the arrangement of Lepsius, bears the number LXIV.,[5] was discovered in the reign of Hesep-ti,[6] the fifth king of the Ist dynasty, about B.C.\n\n4266.\n\nOn this coffin are two copies of the chapter, the one immediately following the other.\n\nIn the rubric to the first the name of the king during whose reign the chapter is said to have been \"found\" is given as Menthu-hetep, which, as Goodwin first pointed out,[7] is a mistake for Men-kau-Ra,[8] the fourth king of the IVth dynasty, about B.C.\n\n3633;[9] but in the rubric to the second the king's name is given as Hesep-ti.\n\nThus it appears that in the period of the XIth dynasty it was believed that the chapter might alternatively be as old as the time of the Ist dynasty.\n\nFurther, it is given to Hesep-ti in papyri of the XXIst dynasty,[10] a period when particular attention was paid to the history of the Book of the Dead; and it thus appears that the Egyptians of the Middle Empire believed the chapter to date from the more [1.\n\nThe date of Mena, the first king of Egypt, is variously given B.C.\n\n5867 (Champollion), B.C.\n\n5004 (Mariette), B.C.\n\n5892 (Lepsius), B.C.\n\n4455 (Brugsch).\n\n2 See Chabas, Aeg.\n\nZeitschrift , 1865, p.\n\n95.\n\nOn the subject of the Antiquity of Egyptian Civilization generally, see Chabas, Études sur l'Antiquité Historique d'après les Sources Égyptiennes , Paris, 1873--Introduction, p.\n\n9.\n\n3 The name of the queen and her titles are given on p.\n\n7 (margin) thus:-- ###.\n\n4 It was presented to the British Museum in 1834, and is now in the Department of Egyptian and Assyrian Antiquities.\n\nTodtenbuch , Bl.\n\n23-25.\n\n6.\n\nthe Ou?safaï's ui!o's of Manetho.\n\n7 Aeg.\n\nZeitschrift , 1866, p.\n\n54.\n\n8.\n\nSee Guieyesse, Rituel Funéraire Égyptien , chapitre 64 e , Paris, 1876, p.\n\n10, note 2.\n\n9.\n\nThe late recension of the Book of the Dead published by Lepsius also gives the king's name as Men-kau-Ra ( Todtenbuch , Bl.\n\n25, l.\n\n30.\n\nIn the same recension the CXXXth Chapter is ascribed to the reign of Hesep-ti (131.\n\n53, l.\n\n28).\n\n10.\n\nNaville, Todtenbuch (Einleitung), pp.\n\n33, 139] {p.\n\nxiv} remote period.\n\nTo quote the words of Chabas, the chapter was regarded as being \"very ancient, very mysterious, and very difficult to understand\" already fourteen centuries before our era.[1] Antiquity of Chapter LXIV."

