[content]
body = "Sacred Texts Egypt Index Previous Next PLATE XX.\n\nVignette: Osiris and Isis in a sepulchral shrine.\n\nText [CHAPTER XV.]: (I) A HYMN OF PRAISE To RA WHEN HE RISETH IN THE EASTERN PART OF THE HEAVEN.\n\nThey who are in (2) his train rejoice, and lo!\n\nOsiris Ani in triumph saith \"Hail, thou Disk, thou lord of rays, who risest (3) in the horizon day by day.\n\nShine thou with thy beams of light upon the face of Osiris Ani, who is victorious: for he singeth hymns of praise unto thee at (4) dawn, and he maketh thee to set at eventide with words of adoration.\n\nMay the soul of Osiris Ani, the triumphant one, come forth with (5) thee from heaven, may he go forth in the matet boat, may he come into port in the sektet boat, may he cleave his path among the (6) never resting stars in the heavens.\" Osiris Ani, being at peace and in triumph, adoreth his lord, the lord of (7) eternity, saying: \"Homage to thee, O Horus of the two horizons, who art {p.\n\n325} Khepera the self-created; when thou risest on the horizon and (8) sheddest thy beams of light upon the lands of the North and the South thou art beautiful, yea beautiful, and all the gods rejoice when they behold thee, (9) the King of heaven.\n\nThe goddess Nebt-Unnet is stablished upon thy head; her portions of the south and of the north are upon thy brow (10); she taketh her place before thee.\n\nThe god Thoth is stablished in the bows of thy boat to destroy utterly all thy foes.\n\n(11) Those who dwell in the underworld come forth to meet thee, bowing in homage as they come towards thee, and to behold [thy] beautiful (12) Image.\n\nAnd I have come before thee that I may be with thee to behold thy Disk every day.\n\nMay I not be shut in the tomb, may I not be turned back (13), may the limbs of my body be made new again when I view thy beauties, even as do all thy favoured ones, {14) because I am one of those who worshipped thee whilst they lived upon earth.\n\nMay I come in unto the land of eternity, may I come even (15) unto the everlasting land, for behold, O my lord, this hast thou ordained for me.\" And lo, Osiris Ani, triumphant in peace, the triumphant one, saith (16) Homage to thee, O thou who risest in thy horizon as Ra, thou art stablished by a law which changeth not nor can it be altered.\n\nThou passest over the sky, and every face watcheth thee (17) and thy course, for thou hast been hidden from their gaze.\n\nThou dost show thyself at dawn and at eventide day by day.\n\n(18) The Sektet boat, wherein is thy majesty, goeth forth with might; thy beams shine upon [all] faces; [the number] of thy yellow rays cannot be known, nor can thy bright beams (19) be told.\n\nThe lands of the gods, and the colours of the eastern lands of Punt, must be seen, ere that which is hidden (20) [in thee] may be measured [by man].\n\nAlone and by thyself thou dost manifest thyself [when] thou comest into being above Nu."

