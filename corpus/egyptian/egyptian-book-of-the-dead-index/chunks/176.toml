[content]
body = "\"Hail, Thoth, who madest Osiris victorious (3) over his enemies, make thou the Osiris Ani triumphant over his enemies in the presence of the great godlike rulers in Pe and Tep,[2] on the (4) night of setting up the columns of Horus, and of making him to be established the heir of the things which belonged to his father.\" Â§D.\n\nVignette: The gods Horus, Isis, Mestha and Hapi.\n\nText: (1) The great divine rulers who are in Pe and Tep are Horus, Isis, Mestha, and Hapi.\n\nNow setting up the columns (2) of Horus [signifieth] the command given by Set unto his followers: \"Set up columns upon it.\" \"Hail, Thoth, who madest Osiris victorious over his enemies (3), make thou the Osiris-Ani triumphant over his enemies in the presence of the great godlike [1.\n\nThe papyrus of Nebseni reads \"Now the setting up of the double Tat signifieth the two shoulders and arms of Horus, lord of Sekhem; and they stand behind Osiris even as the swathings which clothe him.\" 2 See Brugsch, Dict.\n\nGéog.\n\n, p.\n\n213.] {p.\n\n303} it rulers in .\n\n.\n\n.\n\n.\n\nRekhit, on the (4) night when Isis lay down to keep watch in It order to make lamentation for her brother Osiris.\" Â§E.\n\nVignette: (1) The gods Isis, Horus, Anubis,[1] Mesthi, and Thoth.\n\nText: (1) The great godlike rulers who are in.\n\n.\n\n.\n\n.\n\nRekhit are Isis, Horus, and Mestha.\n\n\"Hail, Thoth, who madest Osiris victorious (2) over his enemies, make thou the Osiris, the scribe Ani (triumphant in peace!), to be victorious over his enemies in the presence of the great godlike ones (3) who are in Abtu, on the night of the god Naker, at the separation of the wicked dead, at the judgment of spirits made just, (4) and at the arising of joy in Tenu.\"[2] Next: Plate XIV."

