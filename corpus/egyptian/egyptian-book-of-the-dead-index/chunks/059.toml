body = "The Egyptians called them \" per kheru ,\" that is to say, \" the things which the word or the demand made to appear ,\" or \" per hru kheru ,\" that is to say, \" the things which presented themselves at the word \" or \" at the demand \" of the deceased.\n\nThe deceased was then called \" maa kheru ,\" that is to say, \" he who realizes his word ,\" or \" he who realizes while he speaks ,\" or \" whose voice or demand realizes ,\" or \" whose voice or demand makes true, or makes to be really and actually \" that which only appears in painting on the walls of the tomb.\n\nM.\n\nAmélineau combats this interpretation, and agrees with M.\n\nMaspero's rendering of \"juste de voix\"; see Un Tombeau Égyptien (in Revue de l'Histoire des Religions ), t.\n\nxxiii, pp.\n\n153, 154.\n\nIt is possible that maa-kheru may mean simply \"blessed.\"] {p.\n\n1xxv} and his ka is triumphant.[1] He sits on a great throne by the side of God.[2] The throne is of iron ornamented with lions' faces and having the hoofs of bulls.[3] He is clothed in the finest raiment, like unto the raiment of those who sit on the throne of living right and truth.[4] He receives the urerit crown from the gods,[5] and from the great company of the gods of Annu.[6] He thirsts not, nor hungers, nor is sad;[7] he eats the bread of Ra and drinks what he drinks daily,[8] and his bread also is that which is spoken by Seb, and that which comes forth from the mouth of the gods.[9] He eats what the gods eat, he drinks what they drink, he lives as they live, and he dwells where they dwell;[10] all the gods give him their food that he may not die.[11] Not only does he eat and drink of their food, but he wears the [1.\n\nRecueil de Travaux , t.\n\nv., p.\n\n189 (l.\n\n179).\n\n2.\n\n###.\n\nIbid.\n\n, t.\n\ni,., p.\n\n58 (l.\n\n494).\n\n3 ###.\n\nIbid.\n\n, t.\n\nvii., p.\n\n154 (ll.\n\n309, 310).\n\n4.\n\nIbid.\n\n, t.\n\nv., p.\n\n148 (1.\n\n239).\n\n5.\n\nIbid.\n\n, t.\n\niv., p.\n\n56 (l.\n\n480).\n\n6.\n\nIbid.\n\n, t.\n\nv., p.\n\n176 (1.\n\n117).\n\n7.\n\nIbid.\n\n, t.\n\niii., p.\n\n195 (l.\n\n172).\n\n8 Ibid.\n\n, t.\n\nv., p.\n\n52 (l.\n\n335) 9 ###.\n\nIbid.\n\n, t.\n\niii., p.\n\n208 (1.\n\n234).\n\n10.\n\nIbid.\n\n, t.\n\niii., p.\n\n198 (1.\n\n191 f.).\n\n11.\n\nIbid., t.\n\nv., p.\n\n164 (1.\n\n56).] {p."

