[content]
body = "Blot out from your hearts (9) whatsoever ye have in them against me.\n\nI have come, having done away all the evil which dwelleth in your hearts against me, I have made an end of all the sin which I committed (10) against you; I have brought unto you that which is good, I have made to come unto you that which is right and true.\n\nI, even I, know (11) you, I know your names, I know your forms which are not known, which come into being (12) with you.\n\nI have come unto you.\n\n{p.\n\n337} I have risen among men like unto the god, living among the (13) gods.\n\nI am strong before you like unto the god who is exalted upon his resting-place; when he cometh the gods rejoice, and goddesses and mortal women (14) are glad when they behold him.\n\nI have come unto you.\n\nI have risen (15) upon the throne of Ra, I sit upon my seat in the horizon.\n\nI receive offerings upon my altar, (16) 1 drink drink-offerings at eventide as one made noble by the lord of mortals.\n\nI am exalted (17) even as the holy god, the lord of the great House.\n\nThe gods rejoice when they see him in his (18) beautiful manifestation on the body of Nut, who giveth birth unto him daily.\" Vignette: The serpent Seta, with human legs.\n\nText [CHAPTER LXXXVI L]: (1) THE CHAPTER OF CHANGING INTO SETA.\n\nOsiris Ani, triumphant, saith: \"I am the serpent Seta, whose years are many.\n\nI lie down and I am born day by day.\n\nI am (3) the serpent Seta, which dwelleth in the limits of the earth.\n\nI lie down, I am born, (4) I renew myself, I grow young day by day.\" Vignette: A crocodile upon a pylon or doorway.\n\nText [CHAPTER LXXXVIII.]: (1) THE CHAPTER OF CHANGING INTO A CROCODILE.\n\nSaith Osiris Ani, triumphant: (2) \"I am the crocodile which dwelleth in terror, I am the sacred crocodile and I cause destruction.\n\n(3) I am the great fish in Kamui.\n\nI am the lord to whom homage (4) is paid in Sekhem; and Osiris Ani is the lord to whom homage is paid in Sekhem.\" Vignette: The god Ptah in a shrine, before which is a table of offerings.\n\nText [CHAPTER LXXXII.]: (1) THE CHAPTER OF CHANGING INTO PTAH.\n\nSaith Osiris Ani, triumphant: \"I eat bread, (2) I drink ale, I put on apparel, (3) I fly like a hawk, I cackle like a goose, and I alight upon the path (4) hard by the hill of the dead on the festival of the great Being.\n\nThat which is abominable, that which is abominable, have I not eaten; and that which (5) is foul have I not swallowed.\n\nThat which my ka doth abominate hath not entered into my body.\n\nI have lived according to the (6) knowledge of the glorious gods.\n\nI live and I get strength from their bread, I get strength when I eat it beneath the (7) shade of the tree of Hathor, my lady.\n\nI make an offering, and I make bread in Tattu, and oblations in (8) Annu.\n\nI array myself in the robe of the goddess Matait, and I rise up and I sit me down wheresoever my heart desireth (9)."

