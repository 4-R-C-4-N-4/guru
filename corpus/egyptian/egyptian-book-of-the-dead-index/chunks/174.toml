[content]
body = "Grant ye that he may be with you for all time.\" (1) The adoration of Osiris, lord of Re-stau, and of the great company of the gods who are in the netherworld beside Osiris, the scribe Ani, who saith: (2) \"Homage to thee, O ruler of Amenta, Unnefer within Abtu!\n\nI have come unto thee, and my heart holdeth right and truth.\n\n(3) There is no sin in my body; nor have I lied wilfully, nor have I done aught with a false heart.\n\nGrant thou to me food in the tomb, (4) and that I may come into [thy] presence at the altar of the lords of right and truth, and that I may enter into and come forth from the netherworld (my soul not being turned back), and that I may behold the face of the Sun, and that I may behold the Moon (5) for ever and ever.\" Vignette (Lower register): The priest Se-mer-f[3] who has on the right side of his head the lock of Heru-pa-khrat and wears a leopard's skin, introducing Ani and his wife to the gods whose names are given in Plates XIII.\n\nand XIV.\n\n[1.\n\nThis and its companion vignette and the vignettes of Plates XIII.-XIV.\n\nform one composition.\n\n2.\n\nOsiris is also called An-maut-f; see Lepsius, Todtenbuch , chap.\n\ncxlii., 1.\n\n7.\n\n3.\n\nFor the functions of this priest see above, p.\n\n268.] {p.\n\n301} Text: Se-mer-f saith (1) I have come unto you, O godlike rulers who are in Re-stau, and I have brought unto you Osiris Ani.\n\nGrant ye [to him], as to the followers of Horus, cakes and water, and air, and a homestead in Sekhet-Hetep.\"[l] (1) The adoration of Osiris, the lord of everlastingness, and of all the godlike rulers of Re-stau, by Osiris, [the scribe Ani], who (2) saith: \"Homage to thee, O king of Amenta, prince of Akert, I have come unto thee.\n\nI know thy ways, (3) I am furnished with the forms which thou takest in the underworld.\n\nGrant thou to me a place in the underworld near unto the lords (4) of right and truth.\n\nMay my homestead be abiding in Sekhet-hetep, and may I receive cakes in thy presence.\" Next: Plate XIII."

