body = "7.\n\nLitanies of Seker , col.\n\nxviii.\n\n8.\n\n###.\n\nFestival Songs , vi., 1.\n\n9.\n\n###.\n\nIbid.\n\n, iii., 18.\n\n10.\n\n###.\n\nIbid.\n\n, ix., 26.] {p.\n\nlv} THE DOCTRINE OF ETERNAL LIFE.\n\nEgyptian belief in a future life.\n\nThe doctrine of eternal life in the VIth dynasty.\n\nThe ideas and beliefs which the Egyptians held in reference to a future existence are not readily to be defined, owing to the many difficulties in translating religious texts and in harmonizing the statements made in different works of different periods.\n\nSome confusion of details also seems to have existed in the minds of the Egyptians themselves, which cannot be cleared up until the literature of the subject has been further studied and until more texts have been published.\n\nThat the Egyptians believed in a future life of some kind is certain; and the doctrine of eternal existence is the leading feature of their religion, and is enunciated with the utmost clearness in all periods.\n\nWhether this belief had its origin at Annu, the chief city of the worship of the sun-god, is not certain, but is very probable; for already in the pyramid texts we find the idea of everlasting life associated with the sun's existence, and Pepi I.\n\nis said to be \"the Giver of life, stability, power, health, and all joy of heart, like the Sun, living for ever.\"[1] The sun rose each day in renewed strength and vigour, and the renewal of youth in a future life was the aim and object of every Egyptian believer.\n\nTo this end all the religious literature of Egypt was composed.\n\nLet us take the following extracts from texts of the VIth dynasty as illustrations:-- 1.\n\nha Unas an sem-nek as met-th sem-nek anxet Hail Unas, not hast thou gone, behold, [as] one dead, thou hast gone [as] one living hems her xent Ausar.\n\nto sit upon the throne of Osiris.[2] [1.\n\n### Recueil de Travaux , t.\n\nv., p.\n\n167 (1.\n\n65).\n\n2.\n\nRecueil Travaux , t.\n\niii., p.\n\n201 (1.\n\n206).\n\nThe context runs \"Thy Sceptre is in thy hand, and thou givest commands unto the living ones.\n\nThe Mekes and Nehbet sceptres are in thy hand, and thou givest commands unto those whose abodes are secret.\"] {p.\n\nlvi} 2.\n\nO Ra-Tum i-nek sa-k i-nek Unas .\n\n.\n\n.\n\n.\n\n.\n\n.\n\nsa-k pu en O Ra-Turn, cometh to thee thy son, cometh to thee Unas .\n\n.\n\n.\n\n.\n\n.\n\nthy son is this of t'et-k en t'etta thy body for ever.[1] 3.\n\nTem sa-k pu penen Ausar ta-nek set'eb-f anx-f anx-f O Turn, thy son is this Osiris; thou hast given his sustenance and he liveth; he liveth, anx Unas pen an mit-f an mit Unas pen and liveth Unas this; not dieth he, not dieth Unas this.[2] 4.\n\nhetep Unas em anx em Amenta Setteth Unas in life in Amenta.[3] 5."

