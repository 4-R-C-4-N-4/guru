body = "Sacred Texts Egypt Index Previous Next PLATE III.\n\nVignette: Scene of the weighing of the Heart of the Dead.\n\nAni and his wife enter the Hall of Double Law or Truth, wherein the heart, emblematical of the conscience, is to be weighed in the balance against the feather, emblematical of law.\n\nAbove, twelve gods, each holding a sceptre are seated upon thrones before a table of offerings of fruit, flowers, etc.\n\nTheir names are: Harmachis, \"the great god within his boat\"; Tmu; Shu; Tefnut, \"lady of heaven\"; Seb; Nut, \"lady of Heaven\" Isis; Nephthys; Horus, \"the great god\"; Hathor, \"lady of Amenta\"; and Sa.\n\nUpon the beam of the scales sits the dog-headed ape which was associated [1.\n\nA name of the underworld.\n\n2.\n\nOr Sexet-Anru , a division of the Sexet-hetepu (see Plate XXXV.), the Elysian fields wherein the souls of the blessed were supposed to reap and sow.\n\n3.\n\nIn British Museum papyrus No.\n\n9901 the goddess Maat is seated on the centre of the beam of the balance.\n\nThe double Maat goddesses are at times represented standing beside the balance to watch the result of the weighing, and at the same time Maat is also placed in the scale to be weighed against the heart of the deceased (Fig.\n\nx) (see Naville, Todtenbuch , Bd.\n\nI., Bl.\n\n136, Pa.).\n\n{footnote page 256} In the papyrus of Qenna the head of Anubis is on the beam, and the ape, wearing disk and crescent, is seated upon a pylon-shaped pedestal beside the balance (Fig.\n\n2).\n\nAnother vignette shows Horus holding Maat in his band, weighing the heart in the presence of the Maat goddesses, and Anubis, holding the deceased by the hand, presents the heart to Osiris while Isis and Nephthys in the form of apes sit near (Fig.\n\n3).\n\n] {p.\n\n256} with Thoth,[1] the scribe of the gods.\n\nThe god Anubis, jackal-headed, tests the tongue of the balance, the suspending bracket of which is in the form of the feather The inscription above the head of Anubis reads:--\"He who is in the tomb saith, pray thee, O weigher of righteousness, to guide (?) the balance that it may be stablished.'\" On the left of the balance, facing Anubis, stands Ani's \"Luck\" or \"Destiny,\" Shai and above is the object called mesxen which has been described[2] as \"a cubit with human head,\" and which is supposed to be connected with the place of birth.\n\nBehind these stand the goddesses Meskhenet and Renenet: Meskhenet[3] [1.\n\nIn the papyrus of Sutimes (Naville, Todtenbuch , Bd.\n\nI., Bl.\n\n43) the ape is called neb xemennu ut a maa , \"Lord of Khemennu, just weigher\"; and in British Museum papyrus No.\n\n9900, \"Thoth, lord of the scales.\" 2.\n\nBirch, in Bunsen's Egypt's Place, vol.\n\nv., p.\n\n259.\n\nIn the papyrus of Anhai (British Museum, No.\n\n10,472) there is a meskhen on each side of the upright of the balance: one is called Shai and the other Renen.\n\n3."

