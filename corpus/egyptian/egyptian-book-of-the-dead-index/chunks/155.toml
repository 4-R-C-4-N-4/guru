body = "The god Uatch-ura , \"Great Green Water,\" with each hand extended over a pool; that under his right hand is called She en hesmen , \"Pool of Natron,\" and that under his left hand She en Maaat , \"Pool of Nitre or Salt\" (to illustrate lines 47-50).\n\n3.\n\nA pylon with doors, called Re-stau , \"Gate of the funereal passages\" (to illustrate lines 56-58).\n\n4.\n\nThe utchat facing to the left above a pylon (to illustrate line 73).\n\n5.\n\nThe cow (Fig.\n\n1) Mehurt maat Ra , \"Mehurt, the eye of Ra,\" with a flail and having on her head a disk and horns and round her neck the collar and menat (to illustrate lines 75-79).[1] 6.\n\nA funereal chest from which emerge the head of Ra, and his two arms and hands, each holding the emblem of life.\n\nThe chest, which is called aat Abtu , \"the district of Abydos,\" or the \"burial place of the East,\" has upon its side figures of the four children of [1.\n\nIn the papyrus of Hunefer (British Museum papyrus No.\n\n9902) the god Thoth is represented offering the utchat to the Mehurt cow.\n\n(Fig.\n\n2.) ] {p.\n\n279] Horus who protect the intestines of Osiris or the deceased.\n\nOn the right stand Tuamautef and Qebhsennuf, and on the left Mestha and Hapi (to illustrate lines 82, 83).\n\nPlate IX.\n\n1.\n\nFigures of three gods who, together with Mestha, Hapi, Tuamautef, and Qebhsennuf, are the \"seven shining ones\" referred to, in line 99.\n\nTheir names are: Maa-atef-f, Kheri-beq-f, and Heru-khent-maati.\n\n2.\n\nThe god Anpu (Anubis), jackal-headed.\n\n3.\n\nFigures of seven gods, whose names are Netchehnetcheh, Aaqetqet, Khenti-heh-f[1], Ami-unnut-f[2], Tesher-maa,[3], Bes-maa-em-kerh,[4] and An-em-hru[5] (to illustrate lines 99-106).\n\n4.\n\nThe soul of Ra, and the soul of Osiris in the form of a human-headed bird wearing the crown conversing in Tattu a scene of very rare occurrence, and illustrating lines 111, 112.\n\n[1.\n\nI.e.\n\n, \"He dwelleth in his flame.\" 2.\n\nI.e.\n\n, \" He who is in his hour.\" 3.\n\nI.e.\n\n, \" Red of both eyes.\" 4.\n\nI.e.\n\n, \"Flame seeing in the night.\" 5.\n\nI.e.\n\n, \" Bringing by day.\"] {p.\n\n280} Plate X.\n\nI.\n\nThe Cat, i.e.\n\n, the Sun, which dwelleth by the persea tree in Heliopolis, cutting off the head of the serpent Apepi, emblematic of his enemies.[1] 2.\n\nThree seated deities holding knives.\n\nThey are probably Sau, Horus of Sekhem, and Nefer-Tmu.\n\n3.\n\nAni and his wife Thuthu, who holds a sistrum, kneeling in adoration before the god Khepera, beetle-headed, who is seated in the boat of the rising sun (to illustrate lines 116 ff.).\n\n4.\n\nTwo apes, emblematic of Isis and Nephthys (to illustrate lines 124, 125).\n\n5."

