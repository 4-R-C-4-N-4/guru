[content]
body = "O Unas, the Eye of Horus hath been given to thee that it may embrace thee.[6] O Unas, the Eye of Horus which strove with Set hath been, given unto thee, in order that the opening of thy mouth may be caused thereby.[7] O Unas, that which flowed from Osiris hath been given unto thee.[8] O Unas, the Eye of Horus hath been given unto thee, in order that without the help of iron thy mouth may be set free.[9] O Unas, the Eye of Horus hath been given unto thee, in order that thy face may be adorned therewith.[10] O Osiris Unas, the Eye of Horus hath sprinkled oil upon thee.[11] O Osiris Unas, that which hath been pressed out of thy face hath been given unto thee.[12] O Osiris Unas, the Eye of Horus hath been given unto thee, in order that it may shave (?) thee.[13] O Osiris Unas, the Eye of Horus hath been given unto thee, in order that it may anoint thee.[14] O Osiris Unas, the Eye of Horus hath been given unto thee, in order that it may lead thee unto the gods.[15] O all ye unguents, be ye laid out before your Horus,[16] and make ye him strong.\n\nCause him to gain the mastery over his body, and make his eyes to be opened.\n\nMay all the shining beings see him, may they hear his name, for the Eye of Horus hath been brought, in order that it may be placed before Osiris Unas.[17] O Osiris Unas, the two Eyes of Horus have been laid like paint upon thy face.[18] \"O clothe thyself in peace!\n\nPut thou on thy apparel in peace!\n\nMay Tatet put on[19] apparel in peace!\n\nHail, Eye of Horus, in Tep, in peace!\n\nHail, Eye of Horus, in the houses of Nit, in peace.\n\nReceive thou white apparel.\n\nO grant that the two lands which rejoiced to do homage unto Horus may do homage unto Set; and grant that the two lands which stood in awe of Set may stand in awe of Unas.\n\nDwell thou with Unas as his god, open thou a path for him among the, shining ones, and stablish thou him among them.\" [1.\n\nHere [offer] two pitchers of white wine.\n\n2.\n\nHere [offer] two pitchers of black wine.\n\n3.\n\nHere [offer] a vase of black beer.\n\n4.\n\nHere [offer] an altar.\n\n5.\n\nHere [offer] a cake.\n\n6.\n\nHere [offer] a breast.\n\n7.\n\nHere [offer] a pitcher of white wine.\n\n8.\n\nHere [offer] a vase of black beer.\n\n9.\n\nHere [offer] a vase of beer of iron 10.\n\nHere [offer] a vase of beer.\n\n11.\n\nRepeat four times and [offer] unguent of the festival.\n\n12.\n\nHere [offer] heken oil.\n\n13.\n\nHere [offer] a pitcher of seft .\n\n14.\n\nHere [offer] nish-nem oil.\n\n15.\n\nHere [offer] a pitcher of tuat .\n\n16.\n\nHere [offer] ash unguent.\n\n17.\n\nHere [offer] unguent.\n\n18.\n\nHere [offer] stibium and copper.\n\n19.\n\nHere bring two garments.] {p.\n\ncxlii} THE PAPYRUS OF ANI.\n\nGeneral Description The papyrus of Ani, was found at Thebes, and was purchased by the Trustees of the British Museum in 1888."

