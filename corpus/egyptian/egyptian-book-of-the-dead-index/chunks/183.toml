body = "Boundless eternity hath been granted unto me, and, behold, (10) I am the heir of eternity; to me hath been given everlastingness.\" Closely connected with the above chapter are the two following short chapters:--[1] Vignette: The deceased drinking water from a running stream.\n\nText [CHAPTER LXIII A .]: (I) THE CHAPTER OF DRINKING WATER AND OF NOT BEING BURNED IN THE FIRE.\n\n[The deceased] saith: \"Hail, Bull of Amenta.\n\nI am brought unto thee, I am the oar of Ra (3) wherewith he ferried over the aged ones; let me not be buried nor consumed.\n\nI am Beb,[2] (4) the first-born son of Osiris, who doth wash every god within his eye in Annu.\n\nI am the Heir, (5) the exalted (?), the mighty one, the Still [of Heart].\n\nI have made my name to flourish, and I have delivered [it], that I may make myself to live [in remembrance] on this day.\" Vignette: The deceased standing near flames of fire.\n\nText [CHAPTER LXIII B .]: (I) THE CHAPTER OF NOT BEING SCALDED WITH WATER.\n\n[He saith]: \"I am the oar (2) made ready for rowing, wherewith Ra ferried over the Aged godlike ones.\n\n(3) I carry the moistures of Osiris to the lake away from the flame which cannot be passed (4); he is turned aside from the path thereof and he is not burned in the fire.\n\nI lie down with the hamemu ; (5) I come unto the Lion's lair, killing and binding; and I follow the path by which he came forth.\" Vignette: Ani carrying a sail, emblematic of breath and air.\n\nText [CHAPTER LIV.]: (1) CHAPTER OF GIVING BREATH IN THE UNDERWORLD.\n\nSaith Osiris Ani: \"I am the Egg of the Great Cackler, and I watch and guard that [1.\n\nFor the texts see Naville, Todtenbuch , Bd.\n\nI., Bll.\n\n73, 74.\n\n2.\n\nThe variants are ### and ###.] {p.\n\n311} great place[1] (2) which the god Seb hath proclaimed upon earth.\n\nI live; and it liveth; I grow strong, I live, I sniff the air.\n\nI am (3) Utcha-aab,[2] and I go round behind [to protect] his egg.\n\nI have thwarted the chance of Set, the mighty one of strength.\n\n(4) Hail thou who makest pleasant the world with tchefa food, and who dwellest in the blue [sky]; watch over the babe in his cot when he cometh forth unto thee.\" Appendix: The two following chapters, which are closely connected with the preceding chapter, are respectively supplied from Naville, Todtenbuch , Bd.\n\nI., 131.\n\n67, and the Nebseni Papyrus.\n\nVignette: Anubis leading the deceased into the presence of Osiris.\n\nText: [CHAPTER LV.]: (I) ANOTHER CHAPTER OF GIVING BREATH.\n\n[He saith]: \"I am Sabsabu.\n\nI am Shu.\n\n(2) I draw in the air in the presence of the god of sunbeams as far as the uttermost ends of heaven, as far as the ends of the earth, as far as the bounds of Shu (3); and I give breath unto those who become young [again].\n\nI open my mouth, and I see with mine eyes.\"[3] Vignette: A man holding a sail in his left hand."

