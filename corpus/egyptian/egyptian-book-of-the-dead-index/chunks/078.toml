[content]
body = "His name is gracious, and the love of him is sweet; and at the dawn all people make supplication unto him through his mighty power and terrible strength, and every god lieth in fear of him.\n\nHe is the young bull that destroyeth the wicked, and his strong arm fighteth against his foes.\n\nThrough him did the earth come into being in the beginning.\n\nHe is the Soul which shineth through his divine eyes,[3] he is the Being endowed with power and the maker of all that hath come into being, and he ordered the world, and he cannot be known.\n\nHe is the King who maketh kings to reign, and he directeth the world in his course; gods and goddesses bow down in adoration before his Soul by reason of the awful terror which belongeth unto him.\n\nHe hath gone before and hath stablished all that cometh after him, and he made the universe in the beginning by his secret counsels.\n\nHe is the Being who cannot be known, and he is more hidden than all the gods.\n\nHe maketh the Disk to be his vicar, and he himself cannot be known, and he hideth himself from that which cometh forth from him.\n\nHe is a bright flame of fire, mighty in splendours, he can be seen only in the form in which he showeth himself, and he can be gazed upon only when he manifesteth himself, and that which is in him cannot be understood.\n\nAt break of day all peoples make supplication unto him, and when he riseth with hues of orange and saffron among the company of the gods he becometh the greatly desired one of every god.\n\nThe god Nu appeareth with the breath of the north wind in this hidden god who maketh for untold millions of men the decrees which abide for ever; his decrees [1.\n\nLiterally \"his heart,\" ab-f .\n\n2 I.e.\n\n, Shu and Tefnut.\n\n3 I.e.\n\n, the Sun and the Moon, ut'ati .\n\n4.\n\nnehep ; other examples of the use of this word are given by Brugsch, Wörterbuch (Suppl., p.\n\n690).] {p.\n\nxcvii} \"are gracious and well doing, and they fall not to the ground until they have fulfilled their purpose.\n\nHe giveth long life and multiplieth the years of those who are favoured by him, he is the gracious protector of him whom he setteth in his heart, and he is the fashioner of eternity and everlastingness.\n\nHe is the king of the North and of the South, Amen-Ra, king of the gods, the lord of heaven, and of earth and of the waters and of the mountains, with whose coming into being the earth began its existence, the mighty one, more princely than all the gods of the first company thereof.\" Theories of the origin of the gods.\n\nWith reference to the origin of the gods of the Egyptians much useful information may be derived from the pyramid texts.\n\nFrom them it would seem that, in the earliest times, the Egyptians had tried to think out and explain to themselves the origin of their gods and of their groupings.\n\nAccording to M.\n\nMaspero[1] they reduced everything to one kind of primeval matter which they believed contained everything in embryo; this matter was water, Nu, which they deified, and everything which arose therefrom was a god."

