body = "(2) I am one of you.\n\nWho is it with thee?\n\nIt is Merti.\n\nSeparate thou from him, each from each, when thou enterest the Mesqen.\n\nHe letteth me sail to the temple of the divine beings who have found their faces(?).\n\n(4) The name of the boat is 'Assembler of Souls'; the name of the oars is 'Making the hair to stand on end'; the name it of the hold is 'Good'; (5) and the name of the rudder is 'Making straight for the middle' .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n[3] .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n(6) Grant ye to me vessels of milk together with cakes, loaves of bread, cups of drink, and flesh in the temple of (7) Anubis.\" Rubric: If this chapter be known [by Ani] he shall go in after having come forth from the underworld.\n\nVignette: Ani kneeling beside a pool of water, where grows a sycamore tree; in the tree appears the goddess Nut pouring water into Ani's hands from a vessel [1.\n\nVar.\n\nRe xemennu , \"Mouth of Hermopolis.\" 2.\n\nThis meaning is indicated by the determinative in the variant given by Naville, Todtenbuch , Bd.\n\nII., Bl.\n\n95.\n\nThe whole sentence may be a rubrical direction.\n\n3 The text here appears to be corrupt, or at least some words have been omitted, for the equivalent passage in Lepsius reads ###.\n\nThe variant reading indicated by ki t' et shows that this passage offered difficulties to the ancient Egyptian readers.] {p.\n\n315} Text [CHAPTER LIX.]: (I) THE CHAPTER OF SNIFFING THE AIR, AND OF GETTING POWER OVER THE WATERS IN THE UNDERWORLD.\n\nSaith Osiris Ani: \"Hail, sycamore tree of the goddess Nut!\n\nGrant thou to me of the water and the air which are in (2) thee.\n\nI embrace thy throne which is in Unnu,[l] and I watch and guard (3) the egg of the Great Cackler.\n\nIt groweth, I grow; it liveth, I live; (4) it sniffeth the air, I sniff the air, I the Osiris Ani, in triumph.\" Vignette: Ani seated upon a chair before a table of offerings; [2] in his right hand he holds the kherp sceptre[3] and in his left a staff.\n\nText [CHAPTER XLIV]: (I) THE CHAPTER OF NOT DYING A SECOND TIME IN THE UNDERWORLD.[4] Saith Osiris Ani: \"My place of hiding is opened, my place of hiding is revealed!\n\nLight hath shone (2) in the darkness.\n\nThe eye of Horus hath ordered my coming into being, and the god Apuat hath nursed me.\n\nI have hidden (3) myself with you, O ye stars that never set.\n\nMy brow is like unto that of Ra; my face is open; (4) my heart is upon its throne; I utter words, and I know; in very truth, I am Ra himself.\n\nI am not treated with scorn, (5) and violence is not done unto me.\n\nThy father, the son of Nut, liveth for thee.\n\nI am thy first-born, (6) and I see thy mysteries.\n\nI am crowned like unto the king of the gods, and I shall not die a second time in the underworld.\" Vignette: The mummy of Ani embraced by Anubis, the god of the dead.\n\nText [CHAPTER XLV.]: (I) THE CHAPTER OF NOT CORRUPTING IN THE UNDERWORLD."

