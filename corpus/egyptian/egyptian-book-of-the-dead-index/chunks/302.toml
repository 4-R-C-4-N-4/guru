body = "The Australian blacks kill a man, cut out his caul-fat, and rub themselves with it, \"the belief being that all the qualifications, both physical and mental of the previous owner of the fat, were communicated to him who used it\"; see Fraser, Golden Bough , vol.\n\nii., p.\n\n88.] THE EGYPTIANS' IDEAS OF GOD.\n\nThe word neter and its meaning.\n\nTo the great and supreme power which made the earth, the heavens, the sea, the sky, men and women, animals, birds, and creeping things, all that is and all that shall be, the Egyptians gave the name neter .\n\nThis word survives in the Coptic ###, but both in the ancient language and in its younger relative the exact meaning of the word is lost.\n\nM.\n\nPierret,[2] following de Rougé, connects it with the word ### and says that it means \"renovation\" ( renouvellement ), but Brugsch[3] renders it by \"göttlich,\" \"heilig,\" \"divin,\" \"sacré,\" and by three Arabic words which mean \"divine,\" \"sacred or set apart,\" and \"holy\" respectively.\n\nBy a quotation from the stele of Canopus he shows that in Ptolemaic times it meant \"holy\" or \"sacred\" when applied to the animals of the gods.\n\nMr.\n\nRenouf[4] says that \"the notion expressed by nutar as a noun, and nutra as an adjective or verb, must be sought in the Coptic ###, which in the translation of the Bible corresponds to the Greek words {Greek du'namis , i?sxu's , i?sxuro's , i?sxupo'w } 'power,' 'force,' 'strong,' 'fortify,' 'protect,'\"[5] and he goes on to show that the word neter means \"strong\" or \"mighty.\" M.\n\nMaspero, however, thinks that the Coptic nomti has nothing in common with meter, the Egyptian word for God, and that the passages quoted by Mr.\n\nRenouf in support of his theory can be otherwise explained.[6] His own opinion is that the signification \"strong,\" if it ever existed, is a derived and not an original meaning, and he believes that the word is [1.\n\nSeveral examples of the different ways in which the word is spelt are given by Maspero, Notes sur différent point de Grammaire (in Mélanges d'Archéologie , t.\n\nii., Paris, 1873, p.\n\n140).\n\n2.\n\nPierret, Essai sur la Mythologie Égyptienne , Paris, 1879, p.\n\n8.\n\n3.\n\nWörterbuch , p.\n\n825.\n\n4.\n\nHibbert Lectures , p.\n\n95.\n\n5.\n\nA number of examples are given in Tatham, Lexicon , Oxford, 1835, pp.\n\n310 806.\n\n6 La Mythologie Égyptienne , t.\n\nii., p.\n\n215.] {p.\n\nlxxxiii} so old that its first sense is unknown to us.\n\nThe fact that the Coptic translators of the Bible used the word nouti to express the name of the Supreme Being shows that no other word conveyed to their minds their conception of Him, and supports M.\n\nMaspero's views on this point.\n\nAnother definition of the word given by Brugsch makes it to mean \"the active power which produces and creates things in regular recurrence; which bestows new life upon them, and gives back to them their youthful vigour,\"[1] and he adds that the innate conception of the word completely covers the original meaning of the Greek {Greek fu'sis } and the Latin natura .\n\nNeteru , the gods."

