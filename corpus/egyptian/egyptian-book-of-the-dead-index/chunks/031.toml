body = "The Chapter of bringing a boat in the underworld.\n\nVignette: A boat.\n\nChapter C.\n\nThe Chapter of making perfect the khu , and of making it to enter into the boat of Ra, together with his divine followers.\n\nVignette: A boat containing a company of gods.\n\nChapter CL.* The Chapter of protecting the boat of Ra.\n\nVignette: The deceased in the boat with Ra.\n\nChapter CII.\n\nThe Chapter of going into the boat of Ra.\n\nVignette: The deceased in the boat with Ra.\n\nChapter CIII.\n\nThe Chapter of being in the following of Hathor.\n\nVignette: The deceased standing behind Hathor.\n\nChapter CIV.\n\nThe Chapter of sitting among the great gods.\n\nVignette: The deceased seated between two gods.\n\nChapter CV.\n\nThe Chapter of satisfying the ka .\n\nVignette: The deceased burning incense before his ka .\n\nChapter CVI.\n\nThe Chapter of causing joy each day to a man in Het-ka-Ptah (Memphis).\n\nVignette: An altar with meat and drink offerings.\n\nChapter CVII.* The Chapter of going into, and of coming forth from, the {p.\n\nxl} Theban version: list of chapters.\n\ngate of the gods of the west among the followers of the god, and of knowing the souls of Amentet.\n\nVignette: Three deities: Ra, Sebek, and Hathor.\n\nChapter CVIII.\n\nThe Chapter of knowing the souls of the West.\n\nVignette: Three deities: Tmu, Sebek, and Hathor.\n\nChapter CIX.\n\nThe Chapter of knowing the souls of the East.\n\nVignette: The deceased making adoration before Ra-Heru-khuti.\n\nChapter CX.\n\nThe beginning of the Chapters of the Fields of Peace, and of the Chapters of coming forth by day, and of going into, and of coming forth from, the underworld, and of attaining unto the Fields of Reeds, and of being in the Fields of Peace.\n\nVignette: The Fields of Peace.\n\nChapter CXI.\n\n(This Chapter is now known as Chapter CVIII.) Chapter CXII.\n\nThe Chapter of knowing the souls of Pe.\n\nVignette: Horus, Mesthi, and Ha-pi.\n\nChapter CXIII.\n\nThe Chapter of knowing the souls of Nekhen.\n\nVignette: Horus, Tuamautef, and Qebhsennuf.\n\nChapter CXIV.\n\nThe Chapter of knowing the souls of Khemennu (Hermopolis).\n\nVignette: Three ibis-headed gods.\n\nChapter CXV.* The Chapter of coming forth to heaven, of passing through the hall of the tomb, and of knowing the souls of Annu.\n\nVignette: The deceased adoring Thoth, Sau and Tmu.\n\nChapter CXVI.\n\n[The Chapter of] knowing the souls of Annu.\n\nVignette: The deceased adoring three ibis-headed gods.\n\nChapter CXVII.\n\nThe Chapter of taking a way in Re-stau.\n\nVignette: The deceased, holding a staff in his hand, ascending the western hills.\n\nChapter CXVIII.\n\nThe Chapter of coming forth from Re-stau.\n\nVignette: The deceased holding a staff in his left hand.\n\nChapter CXIX.\n\nThe Chapter of knowing the name of Osiris, and of going into, and of coming forth from, Re-stau.\n\nVignette: The deceased adoring Osiris.\n\nChapter CXX.\n\n(This Chapter is now known as Chapter XII.) Chapter CXXI.\n\n(This Chapter is now known as Chapter XIII.) Chapter CXXII.* The Chapter of the deceased going in after coming forth from the underworld.\n\n{p.\n\nxli} Theban version: list of chapters.\n\nVignette: The deceased bowing before his tomb, which is on a hill.\n\nChapter CXXIII."

