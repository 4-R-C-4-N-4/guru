[content]
body = "I am furnished [with that which I need], I am a khu furnished [with that which I need], I have made my way unto the place wherein are Ra and Hathor.\" Rubric: If this chapter be known, Ani shall become like unto a shining being fully equipped in the underworld.\n\nHe shall not be stopped at any door in the underworld from going in and coming out millions of times.\n\nVignette: [1] Ani standing at the doorway of the tomb; and Ani's shadow, accompanied by his soul.\n\nText [CHAPTER XCII.]: (I) THE CHAPTER OF OPENING THE TOMB TO THE SOUL OF THE SHADOW, OF COMING FORTH BY DAY, AND OF GETTING POWER OVER THE LEGS.\n\nSaith Osiris, the scribe Ani, triumphant: \"(2) The place of bondage is opened, that which was shut is opened,[2] and; the place of bondage is opened unto my soul [according to the bidding of][3] the eye of Horus.\n\nI have bound and stablished (3) glories upon the brow of Ra.\n\n[My] steps are made long, [my] thighs are lifted up; I have passed along the great path, and my limbs are strong.\n\n(4) 1 am Horus, the avenger of his father, and I bring the ureret crown to rest upon its place.\n\nThe path of souls is opened [to my soul].\" Next: Plate XVIII."

