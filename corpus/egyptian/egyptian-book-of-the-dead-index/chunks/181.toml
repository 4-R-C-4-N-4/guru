body = "308} coloured beads, the clasp of which is in the shape of a pylon or gateway, and to which is attached a pectoral bearing a representation of the boat of the sun, wherein is set a scarab, emblematic of the Sun.[1] Text [CHAPTER XXVII: (1) CHAPTER OF GIVING A HEART UNTO OSIRIS ANI (2) IN THE UNDERWORLD.\n\n[Ani saith]: \"May my heart be with me in the House of Hearts.[2] May my heart be with me, and may it rest in [me], or I shall not eat of the cakes of Osiris on the eastern[3] side of the Lake of Flowers,[4] (3) [neither shall I have] a boat wherein to go down the Nile, and another wherein to go up, nor shall I go forward in the boat with thee.\n\nMay my mouth be given unto me that I may (4) speak with it, and my two feet to it walk withal, and my two hands and arms to overthrow my foe.\n\nMay the doors of heaven be opened unto me[5](5); may Seb, the Prince of the gods, open wide his two jaws unto me; may he open my two eyes which are blinded; may he cause me to stretch out my (6) feet which are bound together; and may Anubis make my legs firm that I may stand upon them.\n\nMay the goddess Sekhet make me to rise (7) so that I may ascend unto heaven, and there may that be done which I command in the House of the Ka of Ptah.[6] I know my heart, I have gotten the mastery over (8) my heart, I have gotten the mastery over my two hands and arms, I have gotten the mastery over my feet, and I have gained the power to do whatsoever my ka pleaseth.\n\n(9) My soul shall not be shut off from my body at the gates of the underworld; but I shall enter in peace, and I shall come forth in peace.\" [1.\n\nA very fine set of examples of blue, green, and yellow glazed faïence pectorals inlaid with scarabs is exhibited in the Fourth Egyptian Room.\n\n2.\n\nI.e.\n\n, the judgment hall of Osiris, in which hearts were weighed.\n\n3.\n\nVar.\n\n\"West.\" 4.\n\nOn the word ### see Brugsch, Wörterbuch (Suppl.), p.\n\n1289, and Stern, Glossarium , p.\n\n19, col.\n\n2, where the various kinds of this sweet-smelling plant are enumerated.\n\n5 Var.\n\n### \"May my two hands open [my] mouth in the earth\": Naville, Todtenbuch , Bd.\n\n11., Bl.\n\n90.\n\n6.\n\nI.e.\n\n, the heavenly Memphis.] {p.\n\n309} Text: [CHAPTER XXX B .].\n\n(I) THE CHAPTER[1] OF NOT LETTING (2) THE HEART OF OSIRIS, THE SCRIBE OF THE SACRED OFFERINGS OF ALL THE GODS, ANI, TRIUMPHANT, BE DRIVEN FROM HIM IN THE UNDERWORLD.\n\nAni saith: \"My heart, my mother; my heart, my mother (3).\n\nMy heart whereby I come into being.\n\nMay there be nothing to withstand me at [my] judgment; may there be no, resistance against me by the Tchatcha; may there be no parting of thee from me in the presence of him who keepeth the Scales!\n\nThou art my ka within (4) my body, [which] knitteth and strengtheneth my limbs.\n\nMayest thou come forth in the place of happiness [to which] I advance."

