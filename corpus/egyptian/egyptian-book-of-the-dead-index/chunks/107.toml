body = "Apu , the Panopolis of the Greeks ({Greek Panw^n po'lis }, Strabo, XVII., i., 41), the metropolis of the ninth nome of Upper Egypt, and the seat of the worship of the god ###, whose name is variously read Amsu, Khem, and Min.\n\nIn ancient days it was famous as the centre for stone cutting and linen weaving, and the latter industry still survives among the modern Coptic population, who, following their ancestors, call their city ###, which the Arabs have rendered by Akhmîm.\n\nAqert , a common name for the abode of the dead.\n\nBast , more fully Pa-Bast or Per-Bast, the Bubastis of the Greek writers (Herodotus, II., 59, 137, 156, 166; Strabo, XVII., 1, 27), the metropolis of the eighteenth nome of Lower Egypt, and the seat of the worship of Bast, a goddess who was identified with the soul of Isis, ba en Auset .\n\nThe city is mentioned in the Bible under the form ### (Ezekiel xxx., 17), Pi-beseth, [1.\n\nSee Amélineau, op.\n\ncit.\n\n, p.\n\n287.] {p.\n\ncxxxv} which the Copts have preserved in their name for the city, ###; the Arabs call the place Tell Basta.\n\nHet-benbent , the name given to many sun-shrines in Egypt, and also to one of the places in the other world where the deceased dwelt.\n\nHet-Ptah-ka , the sacred name of the city of Memphis, the metropolis of the first nome of Lower Egypt; it means the \"House of the ka of Ptah,\" and was probably in use in the period of the Ist dynasty.\n\nOther names for Memphis were Aneb-het'et, \"the city of the white wall\", Men-nefer and Kha-nefert.\n\nKem-ur a name given to the district of the fourth and fifth nomes of Upper Egypt.\n\nKhemennu , i.e.\n\n, the city of the eight great cosmic gods, the Hermopolis of the Greek writers ({Greek E?'rmopolitikh` fulakh` }, Strabo, XVII., I, 41), and the metropolis of the fifteenth nome of Upper Egypt.\n\nThe old Egyptian name for the city is preserved in its Coptic and Arabic names, ### and Eshmûnên.\n\nKher-aba , a very ancient city which was situated on the right bank of the Nile, a little to the south of Annu, near the site of which the \"Babylon of Egypt\"[1] (the {Greek Babulw'n, frou'rion e?rumno'n } of Strabo, XVII., I, 30), was built.\n\nManu is the name given to the region where the sun sets, which was believed to be exactly opposite to the district of Bekha, where he rose in the east; Manu is a synonym of west, just as Bekha is a synonym of east.[2] Nekhen , the name of the shrine of the goddess Nekhebet, which is supposed to have been near to Nekheb, the capital of the third nome of Upper Egypt and the Eileithyiapolis of the Greeks.\n\nNeter-khertet , a common name for the abode of the dead; it means the \"divine subterranean place.\" [1.\n\nSee Amélineau, op.\n\ncit., p.\n\n75.\n\n2 See Brugsch, Diet.\n\nGéog., pp.\n\n199, 260; Maspero, Études de Mythologie , t.\n\ni., p.\n\n332; and Aeg."

