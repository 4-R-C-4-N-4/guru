body = "Sekhem is the metropolis of ### or ### Khens , the Greek Letopolites, the 2nd nome of Lower Egypt; it is the ###, or ### of the Coptic writers, and was situated about twenty-five miles north of Memphis.\n\nAccording to a text at Edfu, the neck of Osiris, ### maxaq , was preserved there.\n\nThe god Horus, under the form of a lion, was worshipped at Sekhem.\n\nSee Brugsch, Aeg.\n\nZeitschrift , 1879, pp.\n\n33-36; Brugsch, Dict.\n\nGéog.\n\n, p.\n\n738; and De Rougé, Géographie Ancienne , p.\n\n8.\n\n2.\n\nThe chief variants are ###, (see Naville, Todtenbuch , Bd.\n\nII, Bl.\n\n8.) On this passage see Devéria, Aeg.\n\nZeitschriff , 1870, p.\n\n60.\n\n3.\n\nI.e.\n\n, the day of the festival of Osiris who is called \"Lord of the Festival of the Sixth Day.\" A list of the festivals of the month is given by Brugsch, Matériaux pour servir à la reconstruction du Calendrier ; Leipzig, 1864, plate iv.\n\n4.\n\nI.e.\n\n, the festival on the 7th day of the month.\n\nSee Brugsch, op.\n\ncit.\n\n, plate iv.\n\n5.\n\nVar.\n\n### Tatau .\n\n6.\n\nThe reading of the text is not usual.\n\nBritish Museum papyrus No.\n\n9901 has, after Tattu , ### and according to this text we should read, \"I am a priest in Tattu, exalting him that is upon the steps (Pierret, \"degrés de l'initiation\"); I am a prophet in Abtu on the day of casting up the earth.\" 7.\n\nAccording to Devéria ( Aeg.\n\nZeitschrift , 1870, p.\n\n61), \"casting up the earth\" means the day of digging the grave.\n\n8 Var.\n\n### \"The Ram, lord of Tattu,\" i.e.\n\n, Osiris.\n\n9 Or setem ###, a priest of Ptah at Memphis.\n\n10 ### ur xerp ab (or hem ), the name of the chief priest of Ptah at Memphis (see Brugsch, Wörterbuch , Supp., p.\n\n392; and Brugsch, Aegytologie , p.\n\n218).\n\nThe position of this official is described by Maspero, Un Manuel de Hiérarchie Étgyptienne , p.\n\n53.\n\nThe title was in use in the earliest times (see De Rougé, Six Premières Dynasties , pp.\n\n110, 111).] {p.\n\n273} boat of Seker (29) upon its sledge.[1] I have grasped the spade[2] (30) on the day of digging the ground in Suten-henen.[3] O ye who make (31) perfected souls to enter into the Hall of Osiris, may ye cause the perfected soul of Osiris, the scribe (32) Ani, victorious [in the Hall of Double Truth], to enter with you into the house of Osiris.\n\nMay he hear as ye hear; may he (33) see as ye see; may he stand as ye stand; may he sit as (34) ye sit![4] \"O ye who give bread and ale to perfected souls in the Hall of (35) Osiris, give ye bread and ale at the two seasons to the soul of Osiris Ani, who is (36) victorious before all the gods of Abtu, and who is victorious with you."

