[content]
body = "Saith Osiris Ani: \"I am the (2) pure lotus which cometh forth from the {p.\n\n341 } god of light, the guardian of the nostrils of Ra, the guardian (3) of the nose of Hathor.\n\nI advance and I hasten (4) after him who is Horus.\n\nI am, the pure one who cometh forth from the field.\" Vignette: A god with a disk upon his head.\n\nText [CHAPTER LXXX.]: (I) [Tim, CHAPTER OF] CHANGING INTO THE GOD WHO GIVETH LIGHT IN THE DARKNESS.\n\nSaith Osiris, the scribe Ani, triumphant: I am (2) the girdle of the robe of the god Nu, which shineth and sheddeth light, which abideth in his presence and sendeth forth light into the darkness, which knitteth together the two fighters (3) who live in my body through the mighty spell of the words of my mouth, which raiseth up him that hath fallen--for (4) he who was with him in the valley of Abtu hath fallen--and I rest.\n\nI have remembered him.\n\n(5) I have carried away the god Hu from my city wherein I found him, (6) and I have led away the darkness captive by my might.\n\nI have upheld the Eye [of the Sun] when its power waned (7) at the coming of the festival of the, fifteenth day, and I have weighed Sut in the heavenly mansions beside the Aged one who is with him.\n\nI have endowed (8) Thoth in the House of the Moon-god with all that is needful for the coming of the festival of the fifteenth day.\n\nI have carried off the ureret crown; right and truth are in my body.\n\n(9) The months are of emerald and crystal.\n\nMy homestead is among the sapphire furrows.\n\n(10) I am the lady who sheddeth light in darkness.\n\nI have come to give forth light in darkness, and lo!\n\nit is lightened and made bright.\n\nI have illumined the blackness (11) and I have overthrown the destroyers.\n\nI have made obeisance unto those who are in darkness, and I have raised up (12) those who wept and who had bidden their faces and had sunk down.\n\nThen did they look upon me.\n\nI am the Lady, and I will not let you hear concerning me.\" Next: Plates XXIX.\n\nand XXX."

