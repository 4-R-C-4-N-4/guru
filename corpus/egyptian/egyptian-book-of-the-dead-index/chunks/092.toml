body = "Horus , the son of Osiris and Isis, appears in Egyptian texts usually as Heru-p-khart, \" Horus the child,\" who afterwards became the \"avenger of his father Osiris,\" and occupied his throne, as we are told in many places in the Book of the Dead.\n\nIn the pyramid texts the deceased is identified with Heru-p-khart, and a reference is made to the fact that the god is always represented with a finger in his mouth.[4] The curious legend which Plutarch relates concerning Harpocrates and the cause of his lameness' is probably [1.\n\nA very interesting figure of this god represents him holding his eyes in his hands; see Lanzone, op.\n\ncit.\n\n, p.\n\n618.\n\n2 I.e.\n\n, Horus between the mountains of Bekhatet and Manu, the most easterly and westerly points of the sun's course, and the places where he rose and set.\n\n3.\n\nFor figures of these various forms of Horus, see Lanzone, op.\n\ncit.\n\n, tav.\n\n214 ff.\n\n4.\n\n###.\n\nRecueil de Travaux , t.\n\nv., p.\n\n44 (l.\n\n301).\n\n5.\n\n{Greek Th`n d?\n\nI?^sin meta` th`n teleuth`n e!ks O?si'ridos suggenome'nou, tekei^n h?lito'mhnou, kai` a?ðenh^ toi^s ka'twðen gyi'ois to`n A!rpokra'thn .} De Iside et Osiride , Â§ xix.] {p.\n\ncxvi} based upon the passage in the history of Osiris and Isis given in a hymn to Osiris of the XVIIIth dynasty.[1] Set or Sutekh the eighth member of the company of the gods of Annu, was the son of Seb and Nut, and the husband of his sister Nephthys.\n\nThe worship of this god is exceedingly old, and in the pyramid texts we find that be is often mentioned with Horus and the other gods of the Heliopolitan company in terms of reverence.\n\nHe was also believed to perform friendly offices for the deceased, and to be a god of the Sekhet-Aaru, or abode of the blessed dead.\n\nHe is usually depicted in human form with the head of an animal which has not yet been identified; in later times the head of the ass was confounded with it, but the figures of the god in bronze which are preserved in the British Museum and elsewhere prove beyond a doubt that the head of Set is that of an animal unknown to us.\n\nIn the early dynasties he was a beneficent god, and one whose favour was sought after by the living and by the dead, and so late as the XIXth dynasty kings delighted to call themselves \"beloved of Set.\" About the XXIInd dynasty, however, it became the fashion to regard the god as the origin of all evil, and his statues and images were so effectually destroyed that only a few which escaped by accident have come down to us.\n\nOriginally Set, or Sut, represented the natural night and was the opposite of Horus;[2] that Horus and Set were opposite aspects or forms of the same god is proved by the figure given by Lanzone ( Dizionario , tav.\n\n37, No.\n\n2), where we see the head of Set and the head of Horus upon one body."

