[content]
body = "The mother Isis giveth birth unto Osiris, the scribe (11) Ani, triumphant, whose heart liveth, and Nephthys nurseth him (12); even as they did for Horus, who drove back the fiends of Sut.\n\nThey saw (13) the urertu crown stablished upon his head, and they fell down upon their faces.\n\nBehold, O ye shining ones, ye men (14) and gods, ye damned ones, when ye behold Osiris Ani, triumphant like unto Horus and adored (15) by reason of the ureret crown, fall ye down upon your faces; for Osiris Ani is victorious (16) over his foes in the heavens above and [on the earth] beneath, in the presence of the godlike rulers (17) Of all the gods and goddesses.\" Rubric: These words shall be recited over a great hawk which hath the white crown set upon his head.\n\nThen shall the names of Tmu, (18) Shu, Tefnut, Seb, Nut, Osiris, Isis, Nephthys, be written with green colour upon a (19) new table, anointed with unguents and placed in a boat together with a figure of the dead man (20).\n\nThen shall they put incense upon the fire, and set ducks to {p.\n\n330} be roasted (21).\n\nThis is a rite of Ra when his boat cometh; and it shall cause the dead man to go with Ra into every place whithersoever he saileth, and the foes of Ra shall be (22) slaughtered in very truth.\n\nThe Chapter of the sektet boat shall be recited on the sixth day of the festival.\n\nVignette: The ladder by which the soul passes from the underworld to the body.[1] Next: Plate XXIII.\n\nand Plate XXIV."

