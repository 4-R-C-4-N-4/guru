body = "See Brugsch, Aegyptologie , p.\n\n223.\n\n3.\n\nIn the list of the high officers of the priesthood given by Brugsch ( Aegyptologie , p.\n\n218), we meet with an official whose title is ###, \"the scribe set over the sacred property of the gods\"; Ani held a similar appointment.\n\n4 Plate 19; her name is nowhere else mentioned in the papyrus.] {p.\n\ncxlv} means has not yet been decided, but qemat is the title applied to the noble ladies who sang or played on an instrument in the temple of a god.[1] The lady Thuthu belonged to the number of the priestesses of the god Amen-Ra at Thebes, and she always carries in her hands the sistrum.\n\nand the instrument menat , the emblems of her office.\n\nThus Ani and his wife were high ecclesiastical dignitaries connected with the famous confraternity of the priests of Amen.\n\nCopies of the Book of the Dead in the Theban period.\n\nAge of the papyrus.\n\nAn examination of the papyri of the Theban period preserved in the British Museum shows that two distinct classes of Book of the Dead papyri existed in the XVIIIth dynasty.\n\nIn the first both text and vignettes are traced in black outline,[2] the rubrics, catchwords, etc.\n\n, alone being in red colour; in the second the text only is black, the rubrics, etc.\n\n, being red, and the vignettes beautifully painted in a number of bright colours.\n\nTo the latter class the papyrus of Ani belongs, but, if the text and vignettes be compared with those found in any other early Theban papyri, it will be seen that it occupies an independent position in all respects.\n\nThough agreeing in the main with the papyri of the XVIIIth dynasty in respect of textual readings, the papyrus of Ani has peculiarities in spelling, etc.\n\n, which are not found in any of them.\n\nThe handwriting of the first section at least suggests the best period of the XVIIIth dynasty; but as the scribe forms some of the characters in a way peculiarly his own, the palæographic evidence on this point is not decisive.\n\nThat the papyrus belongs to the period which produced such documents as the papyrus of Neb-qet,[3] and the papyrus of Qenna,[4] i.e.\n\n, to some period of the XVIIIth dynasty, is tolerably certain; and we may assume that it is older than the papyrus of Hunefer, which was written during the reign of Seti I.; for, though belonging to the same class of highly decorated papyri, the execution of the vignettes is finer and more careful, and the free, bold forms of the hieroglyphics in the better written sections more closely resemble those of the texts inscribed in stone under the greatest kings of the XVIIIth dynasty.\n\nThe \"lord of the two lands,\" i.e.\n\n, of Upper and Lower Egypt, or the North and South, mentioned in pl.\n\n4, is probably one of the Thothmes or Amenhetep kings, and accordingly we may place the period of our papyrus between 1500 and 1400 years B.C.\n\n[1.\n\nIn the stele of Canopus, is rendered by {Greek ta`s i'era`s parðe'nous }; see Brugsch, Wörterbuch, P.\n\n1454.\n\n2.\n\nCompare the papyrus of Nebseni (British Museum, No.\n\n9, 900) 3.\n\nLe Papyrus de Neb-Qued , ed.\n\nDevéria, Paris, 1872.\n\nM."

