body = "Sacred Texts Egypt Index Previous Next PLATE XIV.\n\nÂ§F.\n\nVignette: The gods Osiris, Isis, and Ap-uat, and the TET.\n\nText [CHAPTER XVIII.]: (1) The great godlike rulers who are in Abtu are Osiris, Isis, and Ap-uat.\n\n\"Hail, Thoth, who madest Osiris victorious (2) over his enemies, make thou the Osiris Ani, the scribe and teller of the sacred offerings of all the gods, to be victorious (3) over his enemies in the presence of the godlike rulers who judge the dead, on the night of (4) the condemnation of those who are to be blotted out.\" Â§G.\n\nVignette: The gods Thoth, Osiris, Anubis, and Astennu.[2] Text: (1) The great godlike rulers in the judgment of the dead are Thoth, Osiris, Anubis, and Astennu.\n\nNow (2) the \"condemnation of those who are to be blotted out\" is the withholding of that which is so needful to the souls of the children of impotent revolt.\n\n\"(3) Hail, Thoth, who madest Osiris victorious over his enemies, make thou the Osiris, the scribe Ani (triumphant!), to be victorious over his enemies in the [1.\n\nOmitted on Plate XXIV.\n\n2.\n\n###, the capital of the eighth nome of Upper Egypt, situated near Abydos, and probably represented by the modem village of Kûm es-Sultân.\n\nIt is the ### of the Coptic writers.\n\nSee Brugsch, Dict.\n\nGéog.\n\n, p.\n\n951; and Amélineau, La Géographie de l'Égypte , p.\n\n500.] presence of the great godlike rulers, (4) on the festival of the breaking and turning up of the earth in Tattu, on the night of the breaking and turning up of the earth in their blood and of making Osiris to be victorious over his enemies.\" Â§H.\n\nVignette: The three gods of the festival of breaking up the earth in Tattu.\n\nText: (1) When the fiends of Set come and change themselves into beasts, the great godlike rulers, on the festival of the breaking and turning up of the earth in Tattu, (2) slay them in the presence of the gods therein, and their blood floweth among them as they are smitten down.\n\n(3) These things are allowed to be done by them by the judgment of those who are in Tattu.\n\n\"Hail, Thoth, who madest Osiris victorious over his enemies, make thou the Osiris Ani to be victorious over his enemies in the presence of the godlike rulers (4) who are in Naarutef, on the night of him who concealeth himself in divers forms, even Osiris.\"[1] Â§1.\n\nVignette: The gods Ra, Osiris, Shu, and Bebi,[2] dog-headed.\n\nText: (1) The great godlike rulers who are in Naarutef are Ra, Osiris, Shu, and Bebi.[3] Now the night of him who concealeth himself in divers forms, even Osiris,\" is when the thigh [and the head], and the heel, and the leg, are brought nigh unto the coffin of Osiris Un-nefer."

