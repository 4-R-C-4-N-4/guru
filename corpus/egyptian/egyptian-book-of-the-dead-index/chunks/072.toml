[content]
body = "Verily it shall be cast forth by my healing words of power, and I will drive it away from before the sight of thy sunbeams.\" The holy god opened his mouth and said, \"I was passing along my path, and I was going through the two regions of my lands according to my heart's desire, to see that which I had created, when lo!\n\nI was bitten by a serpent which I saw not.\n\nIs it fire?\n\nIs it water?\n\nI am colder than water, I am hotter than fire.\n\nAll my flesh sweateth, I quake, my eye hath no strength, I cannot see the sky, and the sweat rusheth to my face even as in the time of summer.\" Then said Isis unto Ra, \"O tell me thy name, holy father, for whosoever shall be delivered by thy name shall live.\" [And Ra said], \"I have made the heavens and the earth, I have ordered the mountains, I have created all that is above them, I have made the water, I have made to come into being the great and wide sea, I have made the 'Bull of {p.\n\nxci} Legend of Ra and Isis.\n\nhis mother,' from whom spring the delights of love.\n\nI have made the heavens, I have stretched out the two horizons like a curtain, and I have placed the soul of the gods within them.\n\nI am he who, if he openeth his eyes, doth make the light, and, if he closeth them, darkness cometh into being.\n\nAt his command the Nile riseth, and the gods know not his name.\n\nI have made the hours, I have created the days, I bring forward the festivals of the year, I create the Nile-flood.\n\nI make the fire of life, and I provide food in the houses.\n\nI am Khepera in the morning, I am Ra at noon, and I am Tmu at even.\" Meanwhile the poison was not taken away from his body, but it pierced deeper, and the great god could no longer walk.\n\nThen said Isis unto Ra, \"What thou hast said is not thy name.\n\nO tell it unto me, and the poison shall depart; for he shall live whose name shall be revealed.\" Now the poison burned like fire, and it was fiercer than the flame and the furnace, and the majesty of the god said, \"I consent that Isis shall search into me, and that my name shall pass from me into her.\" Then the god hid himself from the gods, and his place in the boat of millions of years was empty.\n\nAnd when the time arrived for the heart of Ra to come forth, Isis spake unto her son Horus, saying, \"The god hath bound himself by an oath to deliver up his two eyes\" ( i.e.\n\n, the sun and moon).\n\nThus was the name of the great god taken from him, and Isis, the lady of enchantments, said, \"Depart, poison, go forth from Ra.\n\nO eye of Horus, go forth from the god, and shine outside his mouth.\n\nIt is I who work, it is I who make to fall down upon the earth the vanquished poison; for the name of the great god hath been taken away from him.\n\nMay Ra live!\n\nand may the poison die, may the poison die, and may Ra live!\" These are the words of Isis, the great goddess, the queen of the gods, who knew Ra by his own name.[1] Thus we see that even to the great god Ra were attributed all the weakness and frailty of mortal man; and that \"gods\" and \"goddesses\" were classed with beasts and reptiles, which could die and perish."

