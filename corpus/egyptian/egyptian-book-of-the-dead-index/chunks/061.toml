body = "Unas is in heaven, Unas is in heaven, in the form of air, in the form of air; he perisheth not, neither doth anything which is in him perish.[4] He is firmly stablished in heaven, and he taketh his pure seat in the bows of the bark of Ra.\n\nThose who row Ra up into the heavens row him also, and those who row Ra beneath the horizon row him also.\"[5] The life which the deceased leads is said to be generally that of him \"who entereth into the west of the sky, and who cometh forth from the east thereof.\"[6] In brief, the condition of the blessed is summed up in the following extract from the pyramid of Pepi I.:-- \"Hail, Pepi, thou hast come, thou art glorious, and thou hast gotten might like the god who is seated upon his throne, that is Osiris.\n\nThy soul is with thee in thy body, thy form of strength is behind thee, thy crown is upon thy head, thy head-dress is upon thy shoulders, thy face is before thee, and those who sing songs of joy are upon both sides of thee; those who follow in the train of God are behind thee, and the divine forms who make God to come are upon each side of thee.\n\nGod cometh, and Pepi hath come upon the throne of Osiris.\n\nThe shining one who dwelleth in Netat, the divine form that dwelleth in Teni, hath come.\n\nIsis speaketh unto thee, Nephthys holdeth converse with thee, and the shining ones come unto thee bowing down even to the ground in adoration at thy feet, by reason of the writing which thou hast, O Pepi, in the region of Saa.\n\nThou comest forth to thy mother Nut, and she strengtheneth thy arm, and she maketh a way for thee through the sky to the place where Ra abideth.\n\nThou hast opened the gates of the sky, thou hast opened the doors of the celestial deep; thou hast found Ra and he watcheth over thee, he hath taken thee by thy hand, he hath led thee into the two regions of heaven, and he hath placed thee on the throne of Osiris.\n\nThen hail, O Pepi, for the Eye of Horus came to hold converse with thee; thy soul which was among the gods came unto thee; thy form of power which was dwelling among the shining ones came unto thee.\n\nAs a son fighteth for his father, and as Horus avenged Osiris, even so doth Horus defend Pepi against his enemies.\n\nAnd thou [1.\n\nRecueil de Travaux , t.\n\niv., p.\n\n74 (1.\n\n602).\n\n2.\n\nRecueil de Travaux , t.\n\niv., p.\n\n46 (l.\n\n405).\n\n3.\n\nIbid.\n\n, t.\n\niii., p.\n\n202 (1.\n\n209).\n\n4.\n\nIbid.\n\n, t.\n\niv., p.\n\n51 (1.\n\n447 f.).\n\n5.\n\nIbid.\n\n, t.\n\nv., p.\n\n53 (l.\n\n340).\n\n6.\n\n###.\n\nIbid.\n\n, t.\n\n8, p.\n\n104 (l.\n\n665).\n\n7.\n\nIbid.\n\n, t.\n\nv., p.\n\n159, (ll.\n\n1-21).] {p.\n\nlxxviii} \"standest avenged, endowed with all things like unto a god, and equipped with all the forms of Osiris upon the throne of Khent-Amenta.\n\nThou doest that which he doeth among the immortal shining ones; thy soul sitteth upon its throne being provided with thy form, and it doeth that which thou doest in the presence of Him that liveth among the living, by the command of Ra, the great god."

