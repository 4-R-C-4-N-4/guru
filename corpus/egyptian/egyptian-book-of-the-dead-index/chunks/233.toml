body = "Sacred Texts Egypt Index Previous Next PLATES XXXIII AND XXXIV.\n\nVignette: The mummy-chamber, arranged as a plan, representing the floor and walls laid flat, in fifteen compartments.\n\nIn the centre, under a canopy, is place d the bier bearing the mummy of Ani, beside which stands the god Anubis,[1] [1.\n\nIn the Nebseni papyrus the text referring to Anubis reads: \"Anubis, who dwelleth in the region of the embalmed, the chief of the holy house, layeth his hands upon the lord of life ( i.e.\n\n, the mummy), It and provideth him with all that belongeth unto him, and saith: 'Flail to thee, thou beautiful one, the lord!\n\nThou hast been gazed upon by the Sun's eye, thou hast been bound up by Ptah-Seker, thou hast been made whole by Anubis; breath hath been given unto thee by Shu, and thou hast been raised up by the fair one, the prince of eternity.\n\nThou hast thine eyes.\n\nThy right eye is in the sektet boat, and thy left eye is in the sektet boat.\n\nThine eye-brows appear fair before the company of the gods.\n\nThy brow is in the charge of Anubis.\n\nThe back of thy head is in good case in tile presence of the sacred hawk.\n\nThy fingers are stablished by written decree in the presence of the lord of Khemennu, and Thoth giveth unto thee the speech of the sacred books.\n\nThy hair is in good case in the presence of Ptah-Seker.\n\nOsiris is in bliss, and reverence is done unto him before the company of the great gods.\n\nHe looketh upon the great god, he is led on fair paths, he is made strong with meals of the tomb, and his enemies are cast down beneath him in presence of the company of the great gods who are in the great house of the aged one in Annu.'\"] {p.\n\n360} with hands outstretched over the body.\n\nAt the foot of the bier kneels the goddess Isis, and at the head the goddess Nephthys, each being accompanied by a flame of fire, which is placed in the compartment immediately behind her.\n\nThe Tet occupies the compartment immediately above the bier, and the jackal--emblematic of Anubis or Ap-uat--couchant on the tomb, with a sceptre having pendent menats --occupies the compartment below.\n\nThe four children of Horus, or gods of the cardinal points--Mestha, Hapi, Tuamautef, and Qebhsennuf--stand in the corners of the four adjoining compartments.\n\nIn each of the two upper and outer compartments is the human-headed bird emblematic of the soul, standing on a pylon, the one on the right being turned to the west or setting sun, the other on the left facing the east or rising sun.\n\nIn the right lower compartment stands the figure of the Perfected Soul; in the corresponding compartment on the left is a Ushabti figure.\n\nText [CHAPTER CLI.] [Isis saith:] \"I have come to be a protector unto thee.\n\nI waft (2) unto thee air for thy nostrils, and the north wind, which cometh forth from the god Tmu, unto thy nose (3)- 1 have made whole thy lungs.\n\nI have made thee (4) to be like unto a god.\n\nThine enemies have fallen beneath thy feet."

