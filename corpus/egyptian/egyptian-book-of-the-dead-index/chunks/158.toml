body = "Eternity is the day, and everlastingness (30) is the night.\n\n\"I am the god Amsu[3] in his coming-forth; may his (31) two plumes be set upon my head.\" [1.\n\nSee above, p.\n\n277, note 2.\n\n2.\n\nOr, \"I am he that presideth over the arrangement (or ordering) of things,\" etc.\n\nBirch renders it, \"The Creator of beings and existences,\" and Pierret, \"La loi de 1'existence et des êtres.\" In a hymn Ra is called neb enti , \"lord of things which are,\" and ari enti , \"maker of things which are,\" and ari unenet , \"maker of things which shall be.\" See Grébaut, Hymne à Ammon-Ra , pp.\n\n5, 16, 27, who, however, believes to mean inanimate objects; see p.\n\n130.\n\n3.\n\nThe name of this god was first read Khem, and then Min, but it has been proved ( Aeg.\n\nZeitschriff , 1877, p.\n\n98, and Trans.\n\nSoc.\n\nBibl.\n\nArch.\n\n, Vol.\n\nVIII., p.\n\n204, note 2) that the correct {footnote page 283} reading is Amsu (compare the variants in Naville, Todtenbuch , Bd.\n\nII., Bl.\n\n41).\n\nThis god was associated with Amen-Ra, and represented the power of reproduction (see Pierret, Panthéon , p.\n\n39; and Lanzone, Dizionario , p.\n\n935).\n\nThe seat of his worship was Apu, the Panopolis of the Greeks, and the Akhmîm of Arabic writers.\n\nFor the forms of the name of the town, see Brugsch, Dict.\n\nGéog.\n\n, p.\n\n19.\n\nFigures of Amsu, in bronze and faïence , are common, and good examples are Nos.\n\n43, 44, 45, 46, 47 a , and 13,520 in the Third Egyptian Room.] {p.\n\n283} Who then is this?\n\nAmsu is Horus, the (32) avenger of his father, and his coming-forth is his birth.\n\nThe (33) plumes upon his head are Isis and Nephthys when they go forth to set themselves (34) there, even as his protectors,[1] and they provide that which (35) his head lacketh,[2] or (as others say), They are the two exceeding great uræi which are upon the head of their (36) father Tmu, or (as others say), His two eyes are the two plumes.\n\n(37) \"Osiris Ani, the scribe of all the holy offerings, riseth up in his place in triumph; he cometh into (38) his city.\"[3] What then is this?\n\nIt is the horizon of his father Tmu.\n\n(39) \"1 have made an end of my shortcomings, and I have put away my faults.\" What then (40) is this?\n\nIt is the cutting off of the corruptible[4] in the body of Osiris, the scribe Ani, (41) triumphant before all the gods; and all his faults are driven out.\n\n(42) What then is this?\n\nIt is the purification [of Osiris] on the day of his birth.\n\n(43) \"I am purified in my exceeding great double nest[5] which is in Suten henen, (44) on the day of the offerings of the followers of the great god who is therein.\" (45) What then is this?\n\n\"Millions of years\" is the name of the one [1."

