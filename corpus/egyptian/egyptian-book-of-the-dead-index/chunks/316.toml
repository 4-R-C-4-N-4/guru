body = "These eight elements were called Nu and Nut,[1] Heh and Hehet,[2] Kek and Keket,[3] and Enen and Enenet,[4] or Khemennu, the \"Eight,\" and they were considered as primeval fathers and mothers.[5] They are often represented in the forms of four male and four female apes who stand in adoration and greet the rising sun with songs and hymns of praise,[6] but they also appear as male and female human forms with the heads of frogs or serpents.[7] The birth of light from the waters, and of fire from the moist mass of primeval matter, and of Ra from Nu, formed the starting point of all mythological speculations, conjectures, and theories of the Egyptian priests.[8] The light of the sun gave birth to itself out of chaos, and the conception of the future world was depicted in Thoth the divine intelligence; when Thoth gave the word, what he commanded at once took place by means of Ptah and Khnemu, the visible representatives of the power which turned Thoth's command into deed.\n\nKhnemu made the egg of the sun,[9] and Ptah gave to the god of light a finished body.[10] The first paut of the gods consisted of Shu, Tefnut, Seb, Nut, Osiris, Isis, Set, Nephthys and Horus, and their governor Tmu or Atmu.[11] Egyptian account of the Creation.\n\nIn a late copy of a work entitled the \"Book of knowing the evolutions of Ra, the god Neb-er-tcher, the \"lord of the company of the gods,\" records the story of the creation and of the birth of the gods:--\"I am he who evolved himself under the form of the god Khepera, I, the evolver of the evolutions evolved myself, the evolver of all evolutions, after many evolutions and developments which came forth from my mouth.[12] No heaven existed, and no earth, and no terrestrial animals or reptiles had come into being.\n\nI formed them out of the inert mass of watery matter, I found no place whereon to stand .\n\n.\n\n.\n\n.\n\n.\n\nI was alone, and the gods Shu and Tefnut had not gone forth from me; there existed [1.\n\nBrugsch, Religion , pp.\n\n128, 129.\n\n2.\n\nIbid.\n\n, p.\n\n132.\n\n3.\n\nIbid.\n\n, p.\n\n140.\n\n4.\n\nIbid.\n\n, p.\n\n142.\n\n5.\n\nIbid.\n\n, p.\n\n148.\n\n6.\n\nIbid.\n\n, pp.\n\n149, 152.\n\n7.\n\nIbid.\n\n, p.\n\n158.\n\n8.\n\nIbid.\n\n, p.\n\n160.\n\n9.\n\nIbid.\n\n, p.\n\n161.\n\n10.\n\nIbid.\n\n, p.\n\n163.\n\n11.\n\nIbid.\n\n, p.\n\n187.\n\n12 The variant version says, \"I developed myself from the primeval matter which I had made.\" and adds, \"My name is Osiris, ###, the substance of primeval matter.\"] {p.\n\nc} \"none other who worked with me.\n\nI laid the foundations of all things by my will, and all things evolved themselves therefrom.[1] I united myself to my shadow, and I sent forth Shu and Tefnut out from myself; thus from being one god I became three, and Shu and Tefnut gave birth to Nut and Seb, and Nut gave birth to Osiris, Horus-Khent-an-maa, Sut, Isis, and Nephthys, at one birth, one after the other, and their children multiply upon this earth.\"[2] Summary of theories."

