[content]
body = ", \"Horus of the two horizons,\" the Harmachis of the Greeks, is the day-sun from his rising in the eastern horizon to his setting in the western horizon; for the various forms in which he is represented, see Lanzone, Dizionario , tav.\n\n129.\n\nStrictly speaking, he is the rising sun, and is one of the most important forms of Horus.\n\nAs god of mid-day and evening he is called Ra-Harmachis and Tmu-Harmachis respectively.\n\nThe sphinx at Gizeh was dedicated to him.] {p.\n\n247} ka [1] of Osiris,[2] the scribe Ani, triumphant[3] before Osiris, (6) who saith: Hail all ye gods of the Temple of the Soul,[4] who weigh heaven and earth in the balance, and who provide food and abundance of meat.\n\nHail Tatunen,[5] One, (7) creator of mankind and of the substance of the gods of the south and of the north, of the west and of the east.\n\nAscribe [ye] praise unto Ra, the lord of heaven, the (8) Prince, Life, Health, and Strength, the Creator of the gods, and adore ye him in his beautiful Presence as he riseth in the atet [6] boat.\n\n(9) They who dwell in the heights and they who dwell in the depths worship thee.\n\nThoth[7] and Maat both are thy recorders.\n\nThine enemy[8] is given to the (10) fire, the evil one hath fallen; his arms are bound, and his legs hath Ra taken from him.\n\nThe children of (11) impotent revolt shall never rise up again.\n\n[1.\n\nAccording to the Egyptian belief man consisted of a body xa , a soul ba , an intelligence xu , and ka , The word ka means \"image,\" the Greek ei?'dolon (compare Coptic kau Peyron, Lexicon , p.\n\n61).\n\nThe ka seems to have been the \"ghost,\" as we should say, of a man, and it has been defined as his abstract personality, to which, after death, the Egyptians gave a material form.\n\nIt was a subordinate part of the human being during life, but after death it became active; and to it the offerings brought to the tomb by the relatives of the dead were dedicated.\n\nIt was believed that it returned to the body and had a share in its re-vivification.\n\nSee Birch, Mémoire sur une patère Égyptienne (in Trans.\n\nSoc.\n\nImp.\n\ndes Antiquaires de France , 1858; Chabas, Papyrus Magique , pp.\n\n28, 29; Maspero, Étude sur quelques peintures , p.\n\n191 ff.; Trans.\n\nSoc.\n\nBibl.\n\nArch ., vol.\n\nvi., p.\n\n494 ff.; Brugsch, Aegyptologie , p.\n\n181; Wiedemann, Religion der alien Aegypter , p.\n\n126 f.).\n\n2 The deceased is always identified with Osiris, or the sun which has set, the judge and god of the dead.\n\nAs the sun sets in the west and rises again in the cast, so the dead man is laid in his tomb on the western bank of the Nile, and after being acquitted in the Hall of judgment, proceeds to the east to begin a new existence.\n\n3.\n\nmaaxeru or maatxeru .\n\nOn this word, see Naville, Litanie du Soleil , p.\n\n74; Devéria, L'Expression Mââ-xerou (in Recueil de Travaux , tom.\n\ni., p.\n\n10 ff.).\n\n4.\n\nCompare ### and ### Brugsch, Dict.\n\nGéog ., pp.\n\n185, 186.\n\n5."

