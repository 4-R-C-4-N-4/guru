body = "Tatunen, or Tenen was, like Seb with whom he was identified, the god of the earth; his name is often joined to that of Ptah, and he is then described as the creator of gods and men, and the maker of the egg of the sun and of the moon.\n\nSee Lanzone, Dizionario , p.\n\n1259; Wiedemann, Religion , p.\n\n74; Pierret, Panthéon , p.\n\n6; and Naville, La Litanie du Soleil , pp.\n\n118, 119, and plate xxiv., 1.\n\n3.\n\nThis god was, in one aspect, a destroyer of created things; compare ###, Naville, op.\n\ncit ., p.\n\n89.\n\n6.\n\nA name for the boat of the evening sun.\n\n7.\n\nSee infra , p.\n\n257, note 2.\n\n8 The enemy of Ra was darkness and night, or any cloud which obscured the light of the sun.\n\nThe darkness personified was Apep, Nak, etc., and his attendant fiends were the mesu betesh , or 'children of unsuccessful revolt.'] {p.\n\n248} The House of the Prince[1] keepeth festival, and the sound of those who rejoice is in the (12) mighty dwelling.\n\nThe gods are glad [when] they see Ra in his rising; his beams flood the world with light.\n\n(13) The majesty of the god, who is to be feared, setteth forth and cometh unto the land of Manu; he maketh bright the earth at his birth each day; he cometh unto the place where he was yesterday.\n\n(14) O mayest thou be at peace with me; may I behold thy beauties; may I advance upon the earth; may I smite the Ass; may I crush (15) the evil one; may I destroy Apep[2] in his hour[3]; may I see the abtu [4] fish at the time of his creation, and the ant fish in his creation, and the (16) ant [4] boat in its lake.\n\nMay I see Horus in charge of the rudder, with Thoth [1.\n\n###, more fully ### \"the great house of the old man,\" i.e.\n\n, the great temple of Ra at Heliopolis: see Brugsch, Dict.\n\nGéog ., p.\n\n153.\n\n2 Apep, the serpent, personifying darkness, which Horus.\n\nor the rising sun must conquer before he can re-appear in the East.\n\n3 Compare the following scenes which represent Apep in the form of a serpent and crocodile and ass being pierced by the deceased.\n\n4 The abtu and the ant fishes are sometimes depicted on coffins swimming at the bows of the boat of the sun.] {p.\n\n249} and Maat beside him; may I grasp the bows of the (17) seket [1]boat, and the stern of the atet boat.\n\nMay he grant unto the ka of Osiris Ani to behold the disk of the Sun and to see the Moon-god without ceasing, every day; and may my soul (18) come forth and walk hither and thither and whithersoever it pleaseth.\n\nMay my name be proclaimed when it is found upon the board of the table of (22) offerings; may offerings be made unto me in my (24) presence, even as they are made unto the followers of Horus; may there be prepared for me a seat in the boat of the Sun on the day of the going forth of the (26) god; and may I be received into the presence of Osiris in the land (28) of triumph!\n\nAppendix : The following versions of this chapter are taken from: I.\n\nNaville, Todtenbuch , Bd."

