[content]
body = "Sacred Texts Egypt Index Previous Next PLATE XXI.\n\n\"Thou dost place thy disk in the west, and my two hands are [raised] in adoration [of thee] when thou settest (30) as a living being.\n\nBehold, thou art the maker of eternity, and thou art adored [when] thou settest in the heavens.\n\nI have given my heart unto thee without wavering, (31) O thou who art mightier than the gods.\" Osiris Ani, triumphant, saith: \"A hymn of praise to thee, O thou who risest (32) like unto gold, and who dost flood the world with light on the day of thy birth.\n\nThy mother giveth thee birth upon [her] hand, and thou dost give light unto the course of the Disk.\n\n(33) O thou mighty Light, who shinest in the heavens, thou dost strengthen the generations of men with the Nile-flood, and dost cause gladness in all lands, and in all (34) cities, and in all the temples.\n\nThou art glorious by reason of thy splendours, and thou makest strong thy ka with hu and tchefau foods.\n\nO thou who art the mighty one of victories, (35) thou who art the Power of [all] Powers, who dost make strong thy throne against the powers of wickedness, who art glorious in majesty in the sektet boat, and who art exceeding (1-6) mighty in the atet boat, make thou glorious Osiris Ani with victory in the netherworld; grant thou that in the underworld he may be void of (37) sin.\n\nI pray thee to put away [his] faults behind thee; grant that he may be one of thy venerable (38) servants who are with the shining ones; may he be joined unto the souls which are in Ta-sertet; and may he journey into the Sekhet-Aaru (39) by a prosperous and happy path, he the Osiris, the scribe Ani, triumphant.\n\n\"(40) Thou shalt come forth into heaven, thou shalt pass over the sky, thou shalt be joined unto the starry deities.\n\n(41) Praises shall be offered unto thee in thy boat, thou shalt be hymned in the diet boat, (42) thou shalt behold Ra within {p.\n\n327} his shrine, thou shalt set together with his disk day by day, thou shalt see (43) the ant fish when it springeth into being in the waters of turquoise, and thou shalt see (44) the abtu fish in his hour.\n\nMay it come to pass that the Evil One shall fall when he layeth a snare to destroy me, (45) and may the joints of his neck and of his back be cut in sunder.\" \"Ra [saileth] with a fair wind, and the sektet boat draweth on (46) and cometh into port.\n\nThe mariners of Ra rejoice, and the heart of Nebt-ankh (47) is glad, for the enemy of her lord hath fallen to the ground.\n\nThou shalt behold Horus on the watch [in the Boat], and Thoth and Maat upon either side of him.\n\n(48) All the gods rejoice when they behold Ra coming in peace (49) to make the hearts of the shining ones to live.\n\nMay Osiris Ani, triumphant, the scribe of the divine offerings of the lords of Thebes, be with them.\" Vignette: Ra, hawk-headed, with the disk upon his head and the emblem of life upon his knees, seated in the solar bark;[1] before him stands Ani with both hands raised in adoration."

