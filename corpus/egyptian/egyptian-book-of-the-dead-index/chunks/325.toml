[content]
body = "From a natural point of view the sun was synonymous with movement, and hence typified the life of man; and the setting of the one typified the death of the other.\n\nUsually Ra is depicted in human form, sometimes with the head of a hawk, and sometimes without[3], As early as the time of the pyramid texts we find Ra united with Tmu to form the chief god of Annu, and at the same period a female counterpart Rat was assigned to him.[4] Shu , the second member of the company of the gods of Annu, was the firstborn son of Ra, Ra-Tmu, or Tum, by the goddess Hathor, the sky, and was the twin brother of Tefnut.\n\nHe typified the light, he lifted up the sky, Nut, from the earth, Seb, and placed it upon the steps which were in Khemennu.\n\n[1.\n\nSee Lanzone, op.\n\ncit.\n\n, tav.\n\n398.\n\n2.\n\nIbid.\n\n, p.\n\n1255- 3.\n\nIbid.\n\n, tav.\n\n78.\n\n4.\n\nPyramid of Unas, l.\n\n253.] {p.\n\ncxii} He is usually depicted in the form of a man, who wears upon his head a feather or feathers and holds in his hand the sceptre.\n\nAt other times he appears in the form of a man with upraised arms; on his head he has the emblem ###, and he is often accompanied by the four pillars of heaven, i.e.\n\n, the cardinal points.[1] Among the many faïence amulets which are found in tombs are two which have reference to Shu: the little models of steps typify the steps upon which Shu rested the sky in Khemennu; and the crouching figure of a god supporting the sun's disk symbolizes his act of raising the sun's disk into the space between sky and earth at the time when he separated Nut from Seb.\n\nTefnut , the third member of the company of the gods of Annu, was the daughter of Ra, Ra-Tmu, or Tmu, and twin-sister of Shu; she represented in one form moisture, and in another aspect she seems to personify the power of sunlight.\n\nShe is depicted in the form of a woman, usually with the head of a lioness surmounted by a disk or uræus , or both;[2] in faïence , however, the twin brother and sister have each a lion's head.\n\nIn the pyramid texts they play a curious part, Shu being supposed to carry away hunger from the deceased, and Tefnut his thirst.[3] Seb or Qeb , the fourth member of the company of the gods of Annu, was the son of Shu, husband of Nut, and by her father of Osiris, Isis, Set, and Nephthys.\n\nOriginally he was the god of the earth, and is called both the father of the gods, and the \" erpa ( i.e.\n\n, the tribal, hereditary head) of the gods.\" He is depicted in human form, sometimes with a crown upon his head and sceptre I in his right hand; and sometimes he has upon his head a goose,[4] which bird was sacred to him.\n\nIn many places he is called the \"great cackler\" and he was supposed to have laid the egg from which the world sprang.\n\nAlready in the pyramid texts he has become a god of the dead by virtue of representing the earth wherein the deceased was laid.\n\n[1.\n\nSee Lanzone, op.\n\ncit.\n\n, tav.\n\n385.\n\n2.\n\nSee Lanzone, op.\n\ncit.\n\n, tav.\n\n395.\n\n3.\n\nRecueil de Travaux , t.\n\nv., p.\n\n10 (l.\n\n61).\n\n4 See Lanzone op.\n\ncit."

