[content]
body = "Sacred Texts Egypt EHH Index Index Previous Next TENTH DIVISION OF THE TUAT.\n\nII.\n\nKINGDOM OF TEMU-KHEPERA-RA ACCORDING TO THE BOOK OF GATES.\n\nIn the TENTH DIVISION, or HOUR, which AFU-RA enters so soon as he has passed through its Gate, which is called TCHESERIT, and is guarded by the monster p.\n\n187 serpent SETHU, it seems that the reconstitution of the Sun-god took place.\n\nThe god AFU-RA is towed by gods of the Tuat as before, and in this DIVISION all danger appears to have been removed from his path.\n\nFirst stands UNTI, with two stars, and he lights up the upper heaven; next come four deities of flame and fire, who travel with AFU-RA and give him light.\n\nThese are followed by three star-gods, who draw towards them a small boat containing a face which is intended for ATEN, or the Sun's Disk.\n\nThe winged serpent SEMI acts as a guide for the god; BESI, the Flame-god, collects fire to put in the new sun; ANKHI, the god of Time, in the form of a serpent, with two faces which look in opposite directions, decrees the length of the new Sun's life; the four goddesses cry \"Enter in, O Ra!\n\nHail, come, O Ra!\" and the MEHEN serpent surmounted by the god HORUS-SET, with one bow in the dark, and the other in the light, leads the god into the East of heaven (vol.\n\nii., pp.\n\n266, 267).\n\nOn the right of the path of AFU-RA are the twelve AKHEMU-SEKU gods, each with his paddle; they are born each day, and after the new Sun-god has entered his boat they join him, and act as his mariners.\n\nBeyond these are twelve goddesses who help to tow the Boat of AFU-RA just before dawn, and then come a god of the Gates of the Tuat, the captain of the gods in the Boat, two gods who order the courses of the stars, a star-god in the form of an ape, the Eye of RA, which unites itself to the face of RA, and the guardian of the p.\n\n188 [paragraph continues] Gate of this DIVISION, who does not leave his place.\n\nAll the other gods travel onwards to the day with AFU-RA.\n\n(vol.\n\nii., pp.\n\n273-278).\n\nOn the left of the path of AFU-RA we again see the serpent APEP.\n\nTo his neck is attached a chain, which is grasped by the hands of the Four SETEFIU gods and the Twelve TCHATIU gods, and by the colossal hand AMEN-KHAT, and passing over five serpents, to each of which it is attached by a small chain, it disappears into the ground at the feet of the god KHENTI-AMENTI.\n\nAttached to the five small chains are figures of Seb and of the four children of Horus or Osiris, viz., MEST, HAPI, TUAMUTEF, and QEBHSENNUF.\n\nClose to the body of APEP, and lying by the chain which is tied to him, is the goddess SERQ.\n\nIn front APEP is attacked by the ANTIU and HENATIU gods, who are armed with knives and sticks having curled ends.\n\nWe have seen that in the NINTH DIVISION Apep was stupefied by the SAIU and other workers of magic, but here it is clear the defeat of this monster is nearly complete."

