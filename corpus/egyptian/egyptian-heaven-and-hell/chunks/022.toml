body = "38 In addition to the Seven Arits, and the Ten, Fourteen, or Twenty-one Gates (according to the manuscript authority followed), the Sekhet-Hetepet possessed Fourteen or Fifteen Aats, or Regions, each of which was presided over by a god.\n\nTheir names, as given in the Papyrus of Nu, 1 are as follows:-- Aat I.\n\nAMENTET wherein a man lived on cakes and ale; its god was AMSU-QET, or MENU-QET.\n\nAat II.\n\nSEKHET-AARU.\n\nIts walls are of iron.\n\nThe wheat here is five cubits high, the barley Click to view Aat I .\n\nClick to view Aat II .\n\nis seven cubits high, and the Spirits who reap them are nine cubits high.\n\nThe god of this Aat is RA-HERUKHUTI.\n\nAat III.\n\nAATENKHU.\n\nIts god was OSIRIS or RA.\n\nAat IV.\n\nTUI-QAUI-AAUI.\n\nIts god was SATI-TEMUI.\n\nAat V.\n\nAATENKHU.\n\nThe Spirits here live upon the inert and feeble.\n\nIts god was probably OSIRIS.\n\np.\n\n39 Click to view Aat III .\n\nClick to view Aat IV .\n\nClick to view Aat V .\n\nAat VI.\n\nAMMEHET, which is presided over either by SEKHER-AT or SEKHER-REMUS.\n\nThis was sacred to the gods, the Spirits could not find it out, and it was accursed for the dead.\n\nAat VII.\n\nASES, a region of burning, fiery flame, wherein the serpent REREK lives.\n\nAat VIII.\n\nHA-HETEP, a region containing roaring torrents of water, and ruled over by a god called QA-HA-HETEP.\n\nA variant gives the name of this Aat as HA-SERT, and that of its god as FA-PET.\n\nClick to view Aat VI .\n\nClick to view Aat VII .\n\nClick to view Aat VIII .\n\np.\n\n40 Click to view Aat IX .\n\nClick to view Aat X .\n\nAat IX.\n\nAKESI, a region which is unknown even to the gods; its god was MAA-THETEF, and its only inhabitant is the \"god who dwelleth in his egg.\" Aat X.\n\nNUT-ENT-QAHU, i.e., the city of Qahu.\n\nIt was also known by the name APT-ENT-QAHU.\n\nThe gods of this region appear to have been NAU, KAPET, and NEHEB-KAU.\n\nAat XI.\n\nATU, the god of which was SEPT (Sothis).\n\nAat XII.\n\nUNT, the god of which was HETEMET-BAIU; also called ASTCHETET-EM-AMENT.\n\nClick to view Aat XI .\n\nClick to view Aat XII .\n\np.\n\n41 Aat XIII.\n\nUART-ENT-MU: its deity was the hippopotamus-god called HEBT-RE-F.\n\nAat XIV.\n\nThe mountainous region of KHER-AHA, the god of which was HAP, the Nile.\n\nA brief examination of this list of Aats, or Regions, suggests that the divisions of Sekhet-hetepet given in it are arranged in order from south to north, for it is well known that Amentet, the first Aat, was entered from the neighbourbood of Thebes, and that the last-mentioned Aat, i.e., Kher-aha, represents a region quite Click to view Aat XIII .\n\nClick to view Aat XIV ."

