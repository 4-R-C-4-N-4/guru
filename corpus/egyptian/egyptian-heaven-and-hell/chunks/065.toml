body = "Sacred Texts Egypt EHH Index Index Previous Next p.\n\n140 CHAPTER IX.\n\nFOURTH DIVISION OF THE TUAT.\n\nII.\n\nTHE KINGDOM OF KHENTI-AMENTI-OSIRIS ACCORDING TO THE BOOK OF GATES.\n\nTHE pictures and texts of this DIVISION, or HOUR, in the BOOK OF GATES vary considerably from those in the BOOK-AM-TUAT.\n\nThe god AFU-RA.\n\nappears in his Boat as before with SA and HEKAU, and four gods tow him on his way; he has passed through the Gate which is called NEBT-TCHEFAU, and its guardian serpent TCHETBI has in no way resisted his progress.\n\nThe region now entered by AFU-RA has no connexion with the Land of Seker, and it appears to be a continuation of the dominions Of KHENTI-AMENTI.\n\nImmediately in front of the boat are nine sepulchres, each containing a god in mummied form; these are the \"gods who are in the following of Osiris, who dwell in their caves\" (vol.\n\nii., p.\n\n123).\n\nNext come the twelve Hour-goddesses who stand in two groups; between the groups is the monster serpent HERERET, which spawns twelve serpents to be consumed by the Twelve Hour-goddesses.\n\nAs AFU-RA goes on his way he adjures the Tuat gods to take p.\n\n141 him to the eastern part of heaven, so that he may visit the habitations of the god ARES, (or SAR), and when he has come to them, he orders the doors to open, and raises up the beings therein whose \"souls are broken,\" and allots to them meat and drink.\n\nThe Hour-goddesses are the daughters of RA, and their work is to guide their father through the night; six of them represent the first six hours of the night, and the other six the last six.\n\nThese are here (vol.\n\nii., p.\n\n123) depicted together, whilst in the BOOK AM-TUAT each appears in the boat of AFU-RA in the Hour to which she belongs.\n\nOn the right of AFU-RA are the Twelve gods who \"carry their doubles\" (vol.\n\nii., p.\n\n131) and who live upon the offerings which are made to them and upon what is given to them by TESERT-BAIU, i.e., the place of holy souls.\n\nTheir duty is to offer their kau or doubles to the god, whom they address as the \"lord of years and of everlastingness which hath no diminution\" (vol.\n\nii., p.\n\n130).\n\nBeyond these gods are two lakes, viz., the LAKE OF LIFE, and the LAKE OF THE LIVING URAEI.\n\nRound the LAKE OF LIFE stand twelve jackal-headed gods who invite AFU-RA to bathe in it, even as the \"lord of the gods\" did, and who state that the souls of the dead do not come near it because it is holy.\n\nWhen he passes out of this DIVISION they lift up their voices in lamentation (vol.\n\nii., p.\n\n132).\n\nThe LIVING URAEI turn back the souls from their Lake, and the mere sound of p.\n\n142 the words which they utter destroys the shadows of the dead who have succeeded in coming near it.\n\nThey preserve with great care the flames and fire which are in them, so that they may hurl them at the enemies of AFU-RA.\n\nIn the course of his journey through this HOUR AFU-RA passes the shrine of KHENTI-AMENTI, the ancient god of Abydos, which is seen on the left (vol.\n\nii., p."

