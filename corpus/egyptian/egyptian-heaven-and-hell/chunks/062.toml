body = "Sacred Texts Egypt EHH Index Index Previous Next FIFTH DIVISION OF THE TUAT.\n\nI.\n\nTHE KINGDOM OF SEKER ACCORDING TO THE BOOK AM-TUAT.\n\nThis DIVISION, or HOUR, or CIRCLE, as it is described in the text, is called AMENT, and it contains the secret ways, and the doors of the hidden chamber of the holy place of the Land of SEKER, and his flesh, and his members, and his body, in the forms which they had in primeval times; the main gate is called AHA-NETERU, the gods are called BAIU-AMMIU-TUAT, and the goddess of the HOUR is SEMIT-HER-ABT-UAA-S.\n\nThe Boat of AFU-RA is towed by seven gods and seven goddesses, and is preceded by a few gods who are led by Isis (vol.\n\ni., pp.\n\n87, 91, 95, 99, 100, 107, 111); the texts make it clear that AFU-RA continues his journey by the help of KHEPERA.\n\nThe corridor of RE-STAU through which he travels now bends upwards, and passing by p.\n\n135 the secret abode of SEKER, by which it is hidden, once more descends to its former level.\n\nThe Land of Seker is in the form of an elongated ellipse, and is enclosed by a wall of sand; it rests upon the backs of two man-headed sphinxes, each of which is called AF and lives upon the voice, or word, of the great god.\n\nThe duty of these is to guard the Image of Seker.\n\nThe form in which this god is depicted is that of a hawk-headed man, who stands between a pair of wings that project from the back of a huge serpent having two heads and necks, and a tail terminating in a bearded human head.\n\nThe Land of Seker is covered by a pyramid having its apex in the form of the head of a goddess, and above it is the vault of night, from which emerges the Beetle of KHEPERA When the Boat of AFU-RA comes to the pyramid, the Beetle ceases to converse with the goddess of the apex, whose duty it is to pass on its words to SEKER, and betakes itself to the Boat, and begins the revivification of AFU-RA, who is led on without delay to the end of RE-STAU, where he is received by the MORNING STAR and the light of a new day.\n\nThe IMAGE of Seker, which has been described above, lives in thick darkness, and any light which is seen there proceeds from the \"eyes of the heads of the great god whose flesh sendeth forth light,\" and the god himself lives upon the offerings which are made to the god TEMU upon earth.\n\nWhen AFU-RA has passed by in his boat there is heard in the Land of p.\n\n136 [paragraph continues] Seker a mighty noise which is like unto that heard in the heights of heaven when they are disturbed by a storm.\n\nOn one side of the Land of Seker is the serpent TEPAN (vol.\n\ni., p.\n\n95), which presents to the god the offerings made to him daily; on the other is the serpent ANKHAAPAU, which lives upon its own fire, and remains always on guard.\n\nClose by are the emblems of the various forms of Seker.\n\nBehind the serpent TEPAN is a lake of boiling water, from which project the heads of those who are being boiled therein.\n\nThis lake or stream is called NETU, and it is situated in the region of the kingdom of Seker which is called AMMAHET, the unfortunate beings who are in the boiling water weep when the Boat of AFU-RA has passed them by."

