[content]
body = "The men are called HERU-METU-HEKAIU, i.e., \"those who are over the words (which have) magical power\"; the apes are called SAIU, i.e., producers of magical effects by making knots in ropes, over which they whisper incantations; and the women are called SAIT, and work the same kind of magic as the apes.\n\nThe object which each member of these three groups holds with both hands above his, or her, head is probably a net and, as M.\n\nLefébure has pointed out, it is actually so represented in the tomb of Rameses VI.\n\n(?).\n\nIn the Babylonian legend of the fight between Marduk and Tiamat, the great she-monster of the deep, the god is made to provide himself with a net with which to entangle her feet.\n\nIn the Book of the Dead (Chapter cliii.\n\nB.) we read of the net ANQET, and in the vignette we see three apes working it, and securing the fish which are caught inside it.\n\nAs Apep was a monster of the deep, to make use of nets in his capture was a wise decision on the part of the friends of AFU-RA.\n\nClick to view The Apes working the net .\n\nHaving taken up their positions for attacking Apep the men with the harpoons work the rope which is attached to AM, the goddesses and the apes shake out p.\n\n185 their rope nets over their heads, and recite their spells, and the men who know the proper words of power shake out their nets and recite the formulae which shall have the effect of throwing APEP and SESSI into the state of stupefaction wherein it will be easy to slay them.\n\nThe spells and words of power have their proper effect, the monsters are fascinated and slain, and the path of AFU-RA is clear.\n\nOn the right of the Boat of AFU-RA is the huge serpent KHEPRI, with a head and a pair of human legs at each end of his body; one head faces north ( or , west), and the other south ( or , east).\n\nBehind each head is a uraeus, and between the uraei stands \"HORUS OF THE TUAT,\" wearing the crowns of the South and North (vol.\n\nii., p.\n\n257).\n\nA rope passes under KHEPRI, and on one side is hauled by Eight Powers (SEKHEMIU), and on the other by the \"Souls of Ament,\" who are man-headed; by the \"Followers of Thoth,\" who are ibis-headed; by the \"Followers of Horus,\" who are hawk-headed; and by the \"Followers of RA,\" who are ram-headed (vol.\n\nii., pp.\n\n255, 256, 258).\n\nIt will be noted that the two pairs of legs of KHEPRI face in opposite ways, so that in whichever direction he moves one pair must walk backwards; the Eight Powers have overcome the resistance of the sixteen gods, and the face of Horus of the Tuat is towards the rising sun.\n\nOn the left of the path of AFU-RA we see a hawk-headed lion called HERU-AM-UAA, i.e., \"Horus in the Boat,\" wearing the Crown of the South; on his back p.\n\n186 stands the two-headed god HORUS-SET (vol.\n\nii., p.\n\n247), whose faces typify Day and Night, and Light and Darkness, and the Sun-gods of the South and North."

