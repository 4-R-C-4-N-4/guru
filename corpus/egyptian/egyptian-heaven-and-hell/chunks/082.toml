[content]
body = "Before these is a huge serpent called KHETI, belching fire into the faces of the enemies of Osiris; in each of the seven undulations of the serpent stands a god, who is adjured by Horus to aid in the work of destruction.\n\nFrom the text we learn that the chief offences with which these enemies are charged is the \"putting of secret things behind p.\n\n171 them, the dragging forth of the sacred object sekem from the secret place, or sanctuary, and the profanation of certain of the hidden things of the Tuat\"; because of these things they are doomed to have their bodies first hacked in pieces, and then burned, and their souls utterly annihilated.\n\nNext: Chapter XII.\n\nTenth Division of the Tuat.\n\nI.\n\nKingdom of Temu-Khepera-Ra According to the Book Am-Tuat"

