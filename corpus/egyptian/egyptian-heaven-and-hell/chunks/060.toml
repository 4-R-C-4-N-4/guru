body = "Sacred Texts Egypt EHH Index Index Previous Next p.\n\n131 CHAPTER VIII.\n\nFOURTH DIVISION OF THE TUAT.\n\nI.\n\nTHE KINGDOM OF SEKER ACCORDING TO THE BOOK AM-TUAT.\n\nTHE Boat of AFU-RA has now passed out of the dominions of KHENTI-AMENTI, the ancient god of the dead of the city of Abydos, and has entered the kingdom of SEKER, who is probably the oldest of all the gods of the dead in Egypt.\n\nThe dominions Of SEKER were situated in the deserts round about Memphis, and were supposed to cover a large extent of territory, and their characteristics were entirely different from those of the regions ruled over by KHENTI-AMENTI near Abydos, and from those of the kingdom of Osiris, the lord of Busiris and Mendes, in the Delta.\n\nThe kingdom of SEKER was shrouded in thick darkness, and, instead of consisting of fertile plains and fields, intersected by streams of running water, was formed of bare, barren, sandy deserts, wherein lived monster serpents of terrifying aspect, some having two, and some three heads, and some having wings.\n\nThis region offered so many difficulties to the passage of the boat of AFU-RA, that special means had to be found for overcoming them, and p.\n\n132 for enabling the god and his followers to proceed northwards to the House of Osiris.\n\nAs there was no river in the land of SEKER a boat was useless to AFU-RA, and as the god was unable to travel through the FOURTH DIVISION boldly, and to allow himself to be seen by all the inhabitants thereof, it was arranged that he should pass through a series of narrow corridors, which were provided with doors.\n\nThe pictures which illustrate the passage of the god through this DIVISION, or HOUR, are arranged in three registers, but the actual corridors through which he travelled are drawn across these obliquely.\n\nThe main corridor is called RE-STAU.\n\nAt the end of the first section of it is the door MATES-SMA-TA (Vol.\n\ni., p.\n\n63), at the end of the second section is the door MATES-MAU-AT (vol.\n\ni., p.\n\n71), and at the end of the third section is the door MATES-EN-NEHEH (vol.\n\ni., p.\n\n75).\n\nAn inscription in this last tells us that it is the road by which the body of SEKER enters and that his form is neither seen nor perceived; hence it is clear that the road by which AFU-RA passed through this DIVISION was supposed to be high up above the dominions Of SEKER, and that he never saw that god at all.\n\nThe name given to this DIVISION, or \"CIRCLE,\" as it is called in the Summary, is ANKHET-KHEPERU, and that of its Gate is AMENT-SETHAU.\n\nthe goddess of the Hour is called URT-EM-SEKHEMU-S.\n\nWe may now consider the means employed by AFU-RA p.\n\n133 for passing through this HOUR.\n\nLooking at the middle register (vol.\n\ni., p.\n\n63) we see that the god has discarded his ordinary boat, and that he and his crew are standing in a boat which is formed of a two-headed serpent; a serpent was the best means of transport for the god, because it could glide easily along the sandy floor of the rocky corridor.\n\nFrom the \"mouth of the boat,\" which is drawn by four gods, rays of light are emitted; this light is not strong enough to enable AFU-RA to see the beings who are on each side of him (vol.\n\ni., p.\n\n66), but knowing they are there, he cries out to them, and they hear him."

