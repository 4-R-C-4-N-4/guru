body = "The ape may be the equivalent of the dog-headed ape which sits on the beam of the Balance in the pictures in the Theban papyri, and the pig may represent the Eater of the Dead; but at present these are matters of conjecture.\n\nWith reference to the pig it is interesting to note that p.\n\n161 Click to view The Judgement Hall of Osiris according to the Book of Gates.\n\n(From Champollion, Monuments de l'Égypte , tom.\n\niii, pl.\n\ncclxxii.) p.\n\n163 in the Papyrus of Nekht the deceased is seen grasping a chain by which a serpent is fettered, and spearing a pig.\n\nThe chief point of interest in the whole scene is the fact that the Judgment here depicted is of a more primitive character than that given in the Book of the Dead.\n\nThe Boat of AFU-RA, having passed through or by the Hall of Osiris, now enters the abode of the blessed, and the pictures of the SIXTH DIVISION are intended to show us the occupations of those who have been declared to be \"right and true.\" The Boat is towed through this DIVISION by four gods of the Tuat and immediately in front of it is a series of jackal-headed sceptres of SEB, to each of which two enemies are tied; by the side of each sceptre is a god, who takes care that the punishments which have been decreed by Osiris are duly executed.\n\nIt is noteworthy that the two eyes of Ra are placed between the first two sceptres (vol.\n\nii., p.\n\n172).\n\nThe Egyptian text (vol.\n\nii., p.\n\n183) makes it quite clear that the enemies of Osiris are tied to the standards of SEB according to the god's decree, and preparatory to slaughter in the Hall of Ra.\n\nClick to view Nekht spearing the pig of evil .\n\nTo the right of the path of AFU-RA are twelve MAATI gods who carry MAAT, and twelve HETEPTIU p.\n\n164 gods who carry provisions.\n\nThese are they who offered up incense to the gods, and whose kau or \"doubles have been washed clean, whose iniquities have been done away, and who were right in the judgement.\" Therefore has Osiris decreed them to be \"Maat of Maat,\" i.e., most \"righteous,\" and he has given them a place of abode in his own presence with peace and the food of Maat thereon to live (vol.\n\nii., pp.\n\n177, .186).\n\nTo the left of the path of AFU-Ra are twelve gods, each of whom is tending a colossal ear of wheat, and twelve gods provided with sickles, engaged in reaping.\n\nThe ears of wheat here growing are the \"members of Osiris,\" ( hat Sar ), that is, they are regarded as parts of the god's own body, 1 and the inhabitants of the Kingdom of Osiris and human beings on earth alike ate the body of the god when they ate bread of wheat.\n\nThe wheat which grew in the kingdom of Osiris was, of course, larger, and finer in every respect than that which grew on earth, and it is expressly said that the \"Khu,\" i.e., beatified spirits, feed upon the divine grain (NEPRA) in the land of the Light-god (vol.\n\nii., p.\n\n188).\n\nTherefore since the divine grain is here a form of Osiris, the Khu live upon the god himself, and eat him daily; this is exactly the kind of belief which we should expect the primitive Egyptians at one period to possess.\n\nThe idea of a heaven wherein p."

