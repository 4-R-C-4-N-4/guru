[content]
body = "69 children, and his beloved ones, and his foster-parents, and his kinsfolk, and his [grown-up] sons and daughters, and his concubines, whom it is his heart's desire [to meet], and his friends, and those who have worked for him upon earth; and if he shall rejoin all his ancestors in heaven, and on earth, and in Neter-kher, and in the sky, and in Aakeb (i.e., a region of the sky), and in Hap (the Nile), and in Akeb (i.e.\n\nthe watery abyss of the sky), and in Het-ur-kau, and in Tetu, and in Tetet (?), and in Pa-ur, and in Abakher, and in Abtu: then verily the bread-cakes shall be shattered, and the white bread-cakes shall be broken in pieces, and verily the meat offerings shall be cut up in the divine chamber of sacrifice, and verily ropes shall be coiled, and verily boats shall be manned, and verily the Boat of Ra shall journey on its way, being rowed by the mariners of the AKHEMU-SEKU and the AKHEMU-URTCHU; now his name is unknown, his name is unknown.\n\n\"The goddess Hathor surroundeth Sepa with the magical protection of life, but it is Seb who equippeth him.\n\n1 The sister of Sepa [and] wife [is] the guardian of the wood of the Great Field.\n\n2 And, moreover, p.\n\n70 the sister of Sepa, the guardian of the wood of the Great Field, saith, 'Verily thou shalt come with rejoicing, and thy heart shall be glad, and there shall be food to Sepa, and winds shall be given unto thee, yea, thy ancestors have commanded this [to be done]'; therefore shall Sepa come with gladness, and his heart shall be glad, and his ancestors shall be given unto him.\n\nAnd the great ones of the ancestors of Sepa shall come [to meet him] with joy, and their hearts shall be glad when they meet him; and they shall bear in their hands their staves, and their mattocks, and their tools for ploughing, and their metal weapons of the earth, and shall deliver him from the things which the goddess .\n\n.\n\n.\n\n.\n\n.\n\n.\n\ndoeth, and from the actions (?) of Nut, and from the mighty things which the Two-Lion 1 God doeth to every soul, and to every god.\n\nThe ancestors of Sepa shall make him to be delivered .\n\n.\n\n.\n\n.\n\n.\n\n[RUBRIC].\n\nMay be rejoined ancestors, and father, and mother, and foster-parents, and kinsfolk, and young children, and wives, and concubines, and beloved ones (i.e., friends) male and female, and servants (i.e., slaves), and the property of every kind which belongeth to a man, to him in Neter-kher (the Underworld).\" The Rubric ends with the words, \"rope of Maat, millions of times,\" which indicate that the whole Chapter, probably including the Rubric, was to be said by the person who wished to rejoin his friends in the p.\n\n71 [paragraph continues] Underworld regularly and unceasingly for millions of times.\n\nThe phrases shes maat heh en sep occur very often in the Theban Recension of the Book of the Dead, and a full list of the passages will be found in the Vocabulary to my edition of that work, page 328."

