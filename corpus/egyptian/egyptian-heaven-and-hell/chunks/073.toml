[content]
body = "154-156); next come twelve goddesses of the hours, who face in the opposite direction, and are entreated to guide \"the god who is on the horizon to the beautiful Amentet in peace.\" Beyond these is the great Crocodile, called ABSHE-AM-TUAT, which is stretched out at full length over the tomb of Osiris; as the Boat of AFU-RA passes it, the god addresses words to Osiris, who for a season puts forth his head, which disappears as soon as the Boat has entered the next DIVISION.\n\nOn the left of AFU-RA we have also a number of gods and goddesses who belong to this DIVISION, and among them may be specially noticed the serpent MEHEN, the lord of this region; his body is bent in the form of a canopy, and beneath is the \"Flesh of Osiris\" p.\n\n154 in the form of a god (AFU-ASAR) seated on a throne (vol.\n\ni., p.\n\n149).\n\nIn front of it are a number of the enemies of Osiris, some decapitated by the LYNX-GODDESS, and some in fetters which are held in the hands of the god ANKU (vol.\n\ni., pp.\n\n149, 150).\n\nBeyond these are three living souls, representatives of the blessed dead in this region, and the \"Flesh of Tem\" (AFU-TEM) in the form of a god seated on the back of a huge serpent resembling MEHEN (Vol.\n\ni., p.\n\n151).\n\nFootnotes 152:1 This statement is found in the SUMMARY.\n\nNext: Eighth Division of the Tuat.\n\nI.\n\nKingdom of Osiris According to the Book Am-Tuat"

