[content]
body = "The MAATIU beings have this name given to them because, as the text says, \"they spoke Maat ,\" i.e., what is true, \"upon earth\"; moreover, \"they did not approach the neterit .\" Now the word neterit usually means \"goddesses,\" but here it has an unusual determinative, which, however, suggests that it is used to express some idea of \"evil\" in connexion with the gods or goddesses, such as blasphemy, or contempt, or apostacy.\n\nOn the whole it seems most likely that neterit means \"false gods,\" that is to say, gods whom Ra would not recognize as such, and that the feminine form of the word, with the unusual determinative, indicates they were weak and miserable beings.\n\nAs a reward for their veracity and orthodoxy (?) upon earth, the food on which they live is Maat , i.e., truth, and they themselves become Maat , or TRUTH itself, and they are permitted to invoke the god in the Gate.\n\nRa, moreover, gives them the mastery over the waters of the region, which, though cool and refreshing to the MAATIU beings p.\n\n119 themselves, become \"waters of fire\" (vol.\n\nii., p.\n\n95) to those who are sinners and are involved in wickedness.\n\nWe have already seen that the wicked were not allowed to enter this Division, therefore it appears that it was held to be possible for the dead round about it to attempt to drink of the cool waters, which straightway turned into fire and consumed them.\n\nTurning now to those beings who stand to the left of the Boat (vol.\n\nii., pp.\n\n96-99), we see that they are twenty-four in number; of these four lie dead, or helpless, and are called ENENIU, i.e., the \"Inert,\" and twenty stand with their backs bowed, and their arms tied at their elbows behind them, in an agonizing position.\n\nHere, it is clear, are beings who are fettered and stand awaiting their doom.\n\nThe charges made against them are to the effect that: 1.\n\nThey blasphemed Ra upon earth.\n\n2.\n\nThey invoked evil upon him that was in the Egg.\n\n3.\n\nThey thrust aside the right.\n\n4.\n\nThey spoke against KHUTI.\n\nThe god referred to as being \"in the Egg\" is, of course, a form of the Sun-god, and we know from the LIVth Chapter of the Book of the Dead, that the EGG was laid by KENKENUR, or the \"Great Cackler.\" The good KHUTI is the form of the Sun-god at sunrise and sunset, and thus we see that all the sins which were committed by the ENENIU and their fettered companions were against Ra, and against forms of him.\n\nThe name given to these is \"STAU,\" i.e., \"Apostates of the Hall of Ra,\" and sentence of doom is passed upon them by TEMU on behalf of Ra; it is p.\n\n120 decreed that their arms shall never be untied again, that their bodies shall be cut to pieces, and that their souls shall cease to exist (vol.\n\nii., p.\n\n97).\n\nSuch are the things which take place in the Second Division of the Tuat according to the BOOK OF GATES, and, view them in whatever way we may, it is impossible not to conclude that the Egyptians thought that those who praised and worshipped Ra upon earth were rewarded with good things, whilst those who treated him lightly were punished.\n\nIt is evident also that the offering up of propitiatory sacrifices and making of peace offerings were encouraged by the religion of Osiris, as being good both for gods and men.\n\nNext: Chapter VII.\n\nThird Division of the Tuat.\n\nI."

