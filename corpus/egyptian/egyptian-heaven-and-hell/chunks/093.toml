body = "Sacred Texts Egypt EHH Index Index Previous Next ELEVENTH DIVISION OF THE TUAT.\n\nII.\n\nKINGDOM OF TEMU-KHEPERA-RA ACCORDING TO THE BOOK OF GATES.\n\nThe gate which leads into the ELEVENTH DIVISION, or HOUR, is called SHETAT-BESU, and the name of the p.\n\n189 monster serpent which guards it is AM-NETU-F.\n\nMummied forms guard the corridor between the walls .of the outworks, but the place of the company of gods who usually stand outside is occupied by two sceptres, or standards, one of which represents SAR, i.e., Osiris, and the other HORUS.\n\nThe god AFU-RA enters this DIVISION in the form in which he has hitherto appeared, and he is towed by four gods who belong to it; we see, however, that APEP has not been wholly removed from the path of the god.\n\nThe serpent lies here (vol.\n\nii., p.\n\n287) in fetters, and a company of the servants of AFU-RA who live in this DIVISION stand ready to attack him with the knives which they hold in their hands; their sceptres betoken their position as chiefs in the DIVISION.\n\nNext come four apes, each holding a large hand, and these stand, according to the text, two on the right and two on the left of the abode of the god; they hold up the Disk of the god, and sing praises to his soul when it looks upon them.\n\nIn front of these are the goddesses AMENTET and HERIT, and the god SEBEKHTI, who presides over the entrance into the vestibule of the world of light.\n\nOn the right of the path of the Boat of AFU-RA are gods and goddesses of the South and North who stablish crowns on the head of Ra when he appears in the sky; gods who give names to Ra and all his forms; gods and goddesses who lament when Ra has gone out from Ament, and who drive away Set; and gods with bowed heads who sing praises to Ra and keep guard p.\n\n190 over the Hidden Door.\n\nThe souls of these gods follow after Ra, and accompany him on his way, but their bodies stay always where we see them.\n\nTheir guardian is (vol.\n\nii., pp.\n\n296-299) the god called MATI, who has the head of a cat or lion.\n\nOn the left of the path of the Boat of AFU-RA is a company of his ministers who perform various important duties for him.\n\nFour of them carry disks, and give the command to the Gate of AKERT So that the god may be allowed to pass through and set himself in the sky.\n\nThe mention of AKERT in the text which refers to these is interesting, for it shows that the ELEVENTH DIVISION of the BOOK OF GATES represents a portion of the Kingdom of the Sun-god of Heliopolis.\n\nFour other gods carry stars, and when AFU-RA passes out of this DIVISION, and is received into the arms of Nu, the Sky-god, they shout hymns of praise.\n\n1 Before these are twelve gods with sceptres, four having human heads, four the heads of rams, and four the heads of hawks.\n\nThe first four are the lords of the region, and stablish the domains of Ra in the sky; the second four provide offerings of bread and water for the god; and the third four set the shrine of Ra in the Matet-Sektet Boat, and place in it the paddles whereby it is to be paddled across the sky.\n\nThe eight star-goddesses who sit upon uraei belong to the abode of the great god, four coming from the East and four from the West; p."

