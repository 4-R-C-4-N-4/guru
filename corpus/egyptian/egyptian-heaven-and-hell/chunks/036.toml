body = "decorated his red granite sarcophagus with scenes relating to the course of the sun in the Other World.\n\n4 This sarcophagus is preserved in the Museum p.\n\n83 of the Louvre in Paris, and its cover is in the Fitzwilliam Museum, Cambridge.\n\nAmong other sarcophagi inscribed with text and pictures from the BOOK AM-TUAT may be mentioned those of: 1.\n\nHorus, son of Tarut-en-Sekhet; 1 2.\n\nTchet-hra, a priest of Ptah; 2 3.\n\nQem-Hap, 3 the son of Takhaau; and Nekht-neb-f.\n\nNow, whilst on the walls of tombs, and on the side of sarcophagi, divisions Nos.\n\nI.-XI.\n\nare found, the only divisions which are met with on papyrus are Nos.\n\nIX.-XII.\n\nThus the Louvre Papyrus, No.\n\n3071, which formed the subject of a special study by Devéria 4 and Pierret, 5 and the Turin Papyrus, published by Lanzone 6 and the Leyden Papyrus T.\n\n71, 7 contain each the last four divisions only.\n\nThe Leyden Papyrus T.\n\n72 8 contains divisions X., XL, and XII., the Berlin Papyrus No.\n\n3001 contains divisions IX., X.\n\nand XII., and the Berlin Papyrus No.\n\n3005 contains divisions X.\n\nand XI.\n\nonly.\n\nThere are several papyri in the British Museum inscribed with similar selections.\n\np.\n\n84 The principal authorities for the text of the SUMMARY of AM-TUAT are those which M.\n\nJéquier consulted when preparing his edition, viz., the Berlin Papyrus No.\n\n3001, the Leyden Papyrus T.\n\n71, the Louvre Papyrus No.\n\n3071, the Papyrus of Turin, published by Lanzone, and, of course, the tomb of Seti I., which gives the text of the first six divisions.\n\nThe most valuable of all these is the Leyden Papyrus T.\n\n71, of which an excellent fac-simile, with a complete translation, was published by Drs.\n\nPleyte and Boeser in 1894; 1 in this papyrus the text of the SUMMARY only fills 119 short columns, and the great popularity of the work is attested by the fact that the priests of Amen were induced to compress all the most important portions of Am-Tuat into so small a compass.\n\nSimilar in many details, but widely different from the BOOK AM-TUAT in point of fundamental doctrine, is the great funeral work to which the names \"Book of the Lower Hemisphere,\" 2 \"Book of Hades,\" \"Livre de l'Enfer,\" have been given.\n\nA glance at the pictures which accompany the texts of this Book is sufficient to show that it deals with the passage of the Sun-god through the Other World during the hours of the night, but, as M.\n\nMaspero pointed out long ago, it is wrong to p.\n\n85 call the region through which the god passes by the name of \"Lower Hemisphere,\" for it suggests that it is below the surface of our earth, which is not the case.\n\nThere is much to be said also against the titles \"Book of Hades,\" and \"Book of Hell,\" and as among the prominent characteristics which distinguish it from the BOOK AM-TUAT is a series of gates, it will be convenient and more correct to call it the \"BOOK OF GATES.\" The form in which we first know this work is, clearly, not older than the XVIIIth or XIXth Dynasty, but many parts of it are very much more ancient."

