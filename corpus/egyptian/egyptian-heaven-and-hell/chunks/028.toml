body = "In the second division it may be noted that Nebseni is seen laying both hands on the back of the Bennu bird; there is no authority for this in the older copy of the picture.\n\nIn the illustration on p.\n\n55 , which is reproduced from the coffin of Sen, in the British Museum (No.\n\n30,841), a still simpler form of Sekhet-hetepet is seen; here we have only nine eyots, which are grouped together, and no inscription of any kind.\n\nStill further modifications were introduced into the pictures of Sekhet-hetepet drawn in later times, and, in order that the reader may be enabled to trace some of the most striking of these, copies of Sekhet-hetepet from the Papyrus of Anhai (about B.C.\n\n1040), and from that of Auf-ankh (Ptolemaïc Period), are reproduced on pp.\n\n59 and 61 .\n\nFootnotes 28:1 British Museum, No.\n\n10,477, sheet 26 (Chapter cxliv.).\n\n31:1 Sheet 25.\n\n35:1 The names of the gatekeepers of Gates XL-XXI.\n\nare not given in the papyri.\n\n38:1 Sheets 28, 29, and 30.\n\n43:1 British Museum, No.\n\n9,900, sheet 17.\n\n48:1 Probably the marauding seamen who traded on the coasts of the Mediterranean, and who sometimes landed and pillaged the region near which the primitive Elysian Fields were supposed to have been situated.\n\n51:1 Ani was the receiver of the ecclesiastical revenues of the gods of Thebes and Abydos, and the meaning here is that he did not divert, to his own use any portion of the goods he received.\n\nNext: Chapter III.\n\nThe Reunion of the Beatified and Their Recognition of Each Other in the Other World"

