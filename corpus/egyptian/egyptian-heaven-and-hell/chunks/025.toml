[content]
body = "May I gain dominion over the great and mighty word which is in my body in this my place, and by it I shall have memory and not forget.\" The pools and places in Sekhet-hetepet which the deceased mentions as having a desire to visit are UNEN-EM-HETEP, the first large division of the region; NEBT-TAUI, a pool in the second division; NUT-URT, a pool in the first division; UAKH, a pool in the second division, where the kau , or \"doubles,\" dwell; TCHEFET, a portion of the third division, wherein the deceased arrays himself in the apparel of Ra; UNEN-EM-HETEP, the birthplace of the Great God; QENQENTET, a pool in the first division, where he sees his father, and p.\n\n49 looks upon his mother, and has intercourse with his wife, and where he catches worms and serpents and frees himself from them; the Lake of TCHESERT, wherein he plunges, and so cleanses himself from all impurities; HAST, where the god ARI-EN-AB-F binds on his head for him; USERT, a pool in the first division, and SMAM, a pool in the third division of Sekhet-hetepet.\n\nHaving visited all these places, and recited all the words of power with which he was provided, and ascribed praises to the gods, the deceased brings his boat to anchor, and, presumably, takes up his abode in the Field of Peace for ever.\n\nFrom the extract from the Chapter of Sekhet-Aaru and Sekhet-hetepet given above, it is quite clear that the followers of Osiris hoped and expected to do in the next world exactly what they had done in this, and that they believed they would obtain and continue to live their life in the world to come by means of a word of power; and that they prayed to the god Hetep for dominion over it, so that they might keep it firmly in their memories, and not forget it.\n\nThis is another proof that in the earliest times men relied in their hope of a future life more on the learning and remembering of a potent name or formula than on the merits of their moral and religious excellences.\n\nFrom first to last throughout the chapter there is no mention of the god Osiris, unless he be the \"Great God\" whose birthplace is said to be in the region Unen-em-hetep, and nowhere in it is there any suggestion that the p.\n\n50 permission or favour of Osiris is necessary for those who would enter either Sekhet-Aaru or Sekhet-hetep.\n\nThis seems to indicate that the conceptions about the Other World, at least so far as the \"realms of the blest\" were concerned, were evolved in the minds of Egyptian theologians before Osiris attained to the high position which he occupied in the Dynastic Period.\n\nOn the other hand, the evidence on this point which is to be deduced from the Papyrus of Ani must be taken into account.\n\nAt the beginning of this Papyrus we have first of all Hymns to Ra and Osiris, and the famous Judgment Scene which is familiar to all.\n\nWe see the heart of Ani being weighed in the Balance against the symbol of righteousness in the presence of the Great Company of the Gods, and the weighing takes place at one end of the house of Osiris, whilst Osiris sits in his shrine at the other.\n\nThe \"guardian of the Balance\" is Anubis, and the registrar is Thoth, the scribe of the gods, who is seen noting the result of the weighing.\n\nIn the picture the beam of the Balance is quite level, which shows that the heart of Ani exactly counterbalances the symbol of righteousness."

