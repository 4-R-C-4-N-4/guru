[content]
body = "The hidden gods who march in front of the boat are few in number, and the names of many of them are unfamiliar; some of them are connected with Osiris, and all of them are under the control of ANPU, or ANUBIS, and perform some act which helps the boat along.\n\nAmong them may be specially noted Thoth and Horus, above whose outstretched hands is the Eye which is here identified with SEKRI (vol.\n\ni., p.\n\n75).\n\nAs AFU-RA journeys on his way there are on his right three serpents, a scorpion, a uraeus serpent, a three-headed serpent with wings and human legs, a few of the gods of the HOUR, a serpent with two necks and heads proceeding from one body, and a tail which terminates in another head (vol.\n\ni., pp.\n\n67, 71, 75, 79).\n\nOn his left are a few more gods and goddesses, the serpents HETCH-NAU, AMEN, HEKENT, and the terrible three-headed serpent MENMENUT, the face of which illumines the chamber in which KHEPERA is born daily (vol.\n\ni., p.\n\n134 p.\n\n79).\n\nOver the back of the last-named serpent are fourteen heads, which, as M.\n\nMaspero has well shown, re resent the gods of the first fourteen days of the month, and they are being carried by the serpent to fill the EYE which THOTH and HORUS are bringing through RE-STAU.\n\nThe beings to the right and left of AFU-RA are ancient gods of the kingdom of SEKER, and each guards some door or corridor in it which leads to the hidden chamber of SEKER himself.\n\nNext: Fifth Division of the Tuat.\n\nI.\n\nThe Kingdom of Seker According to the Book Am-Tuat"

