body = "The copy of the work in the tomb of Amen-hetep III., written in hieratic, was well preserved in Champollion's time, but is now illegible; see Champollion, Lettres , 13 e Lettre; and Champollion, Monuments , iii.\n\n232-234.\n\nThe text of the Third Hour was published by Lepsius, Denkmäler , iii.\n\n78 and 79.\n\nSee also Description de l'Égypte , Antiq.\n\ntom.\n\niii.\n\n193, tom.\n\nx., 218, and plates, tom.\n\nii., 80, 81; and Lefébure in Mémoires Mission Arch.\n\nFrançaise , tom.\n\niii., p.\n\n172.\n\n82:1 See Mémoires publiés par les membres de la Miss.\n\nArch.\n\nFrançaise , tom.\n\nii., Paris, 1886.\n\n82:2 See Études de Mythologie et d'Archéologie Egyptiennes , in Bibliothèque Égyptologique , tom.\n\nii., p.\n\n1 ff., Paris, 1893.\n\n82:3 See Lefébure, op.\n\ncit.\n\n, tom.\n\niii., fasc.\n\n1, p.\n\n48 ff.\n\n82:4 See E.\n\nde Rougé, Notice Sommaire des Monuments Égyptiens exposés dans les Galeries du Musée du Louvre , Paris, 1876, p.\n\n51.\n\n83:1 See E.\n\nde Rougé, Notice Sommaire , p.\n\n52.\n\nIt contains the figures of the eleven divisions, with very few inscriptions; see Jéquier, Le Livre de ce qu'il y a dans l'Hades , p.\n\n25.\n\n83:2 See E.\n\nde Rougé, Notice Sommaire , p.\n\n52.\n\nThis sarcophagus is made of basalt, is beautifully cut, and was brought to France by Champollion.\n\nSee also Sharpe, Egyptian Inscriptions , vol.\n\nii., plates 1-24.\n\n83:3 See Schäfer in Jéquier, op.\n\ncit.\n\n, p.\n\n26, notes 3 and 4.\n\n83:4 See Catalogue des Manuscrits Égyptiens , Paris, 1881, p.\n\n15.\n\n83:5 See Pierret, Études Égyptologiques , tom.\n\nii., p.\n\n103-148.\n\n83:6 See Lanzone, Le Domicile des Esprits , Paris, 1879, folio.\n\n83:7 See Catalogue du Musée Égyptien de Leyde , pp.\n\n253-255.\n\n83:8 See Jéquier, op.\n\ncit.\n\n, p.\n\n27.\n\n84:1 Papyrus Funéraire Hiéroglyphique, Sha-am-Tua (T.\n\n71).\n\nPublié dans la 32ième Livraison des Monuments Égyptiens du Musée , Leyden, 1894.\n\n84:2 See Devéria, Catalogue, Sect.\n\nii., Le Livre de L'Hémisphère Inférieur .\n\n85:1 See The Alabaster Sarcophagus of Oimenepthah I., King of Egypt, now in Sir John Soane's Museum, Lincoln's Inn Fields, drawn p.\n\n86 by Joseph Bonomi, and described by Samuel Sharpe , London, 1864.\n\nA description of the pictures and texts was given by M.\n\nPierret in the Revue Archéologique for 1870; small portions of the text were discussed by Goodwin and Renouf in Aeg.\n\nZeit.\n\n, 1873, p.\n\n138, and 1874, p.\n\n101; and an English rendering of the whole text was given by E.\n\nLefébure, in the Records of the Past , vol."

