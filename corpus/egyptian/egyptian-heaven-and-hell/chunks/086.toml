[content]
body = "The region to the left of the Boat is one of fire, and representations of it which we have in the BOOK AM-TUAT and the BOOK OF GATES may well have suggested the beliefs in a fiery hell that have come down through the centuries to our own time.\n\nQuite near the Boat stands Horus, holding in the left hand the snake-headed boomerang, with which he performs deeds of magic; in front of him is the serpent SET-HEH, i.e., the Everlasting Set, his familiar and messenger (vol.\n\ni., p.\n\n249).\n\nHorus is watching and directing p.\n\n178 the destruction of the bodies, souls, shadows, and heads of the enemies of RA, and of the damned who are in this DIVISION, which is taking place in five pits of fire.\n\nA lioness-headed goddess stands by the side of the first pit which contains the enemies of RA; the fire with which they are consumed is supplied by the goddess, who vomits it into one corner of the pit.\n\nThe next four pits contain the bodies, souls, shades, and heads respectively, of the damned, the fire being supplied by the goddesses in charge.\n\nIn the pit following are four beings who are immersed, head downwards, in the depths of its fires (vol.\n\ni., pp.\n\n249-253).\n\nThe texts which refer to the pits of fire show that the beings who were unfortunate enough to be cast into them were hacked in pieces by the goddesses who were over them, and then burned in the fierce fire provided by SET-HEH and the goddesses until they were consumed.\n\nThe pits of fire were, of course, suggested by the red, fiery clouds which, with lurid splendour, often herald the sunrise in Egypt.\n\nAs the sun rose, dispersing as he did so the darkness of night, and the mist and haze which appeared to cling to him, it was natural f or the primitive peoples of Egypt to declare that his foes were being burned in his pits or lakes of fire.\n\nThe redder and brighter the fiery glare, the more effective would the burning up of the foes be thought to be, and it is not difficult to conceive the horror which would rise in the minds of superstitious folk when they p.\n\n179 saw the day open with a dull or cloudy sky, with no evidence in it that the Sun had defeated the powers of darkness, and had suffered no injury during the night.\n\nThe presence of the pits of fire in this DIVISION suggests that we have now practically arrived at the end of the Tuat, and, according to the views of those who compiled the original description of AKERT, this is indeed the case.\n\nWe have, in the Boat of AFU-RA, now passed through the Tuat of Khenti-Amenti, the Tuat of Seker, the Tuat of Osiris, lord of Mendes and Busiris, and the Tuat of TEMU-KHEPERA-RA, lord of ANNU, i.e., the four great Tuats which comprised all the great abodes of the dead of all Egypt.\n\nNow to enter this group of Tuats it was necessary to pass through a forecourt or antechamber, which for purposes of convenience has been called a DIVISION of the Tuat, and before AFU-RA can emerge from the last of the group of Tuats into the light of a new day, he must pass through a region which corresponds to the forecourt of the Tuats, and serves actually as a forecourt of the world of light.\n\nIn the forecourt of the Tuats the darkness became deeper and deeper the further it was penetrated, but in the forecourt of the world of light the darkness becomes less and less dense as the day is approached."

