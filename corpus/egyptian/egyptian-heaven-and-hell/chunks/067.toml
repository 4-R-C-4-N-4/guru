body = "Sacred Texts Egypt EHH Index Index Previous Next FIFTH DIVISION OF THE TUAT.\n\nII.\n\nTHE KINGDOM OF KHENTI-AMENTI-OSIRIS ACCORDING TO THE BOOK OF GATES.\n\nThe FIFTH, like the FOURTH DIVISION of the BOOK OF GATES, in no way resembles that in the BOOK AM-TUAT, and it has nothing whatsoever to do with the kingdom of SEKER.\n\nThe god AFU-RA, having passed through the Gate of the DIVISION or HOUR, which is called ARIT, and which has been opened by the monster serpent TEKA-HRA that guarded it, is towed along by four of the gods of this section of the p.\n\n144 [paragraph continues] Tuat.\n\nThe ministers of the god consist of nine gods whose hands and arms are covered, and twelve gods who are under the direction of HERI-QENBET-F; the nine gods are called KHERU-ENNUTCHI, i.e., \"those who hold the serpent ENNUTCHI,\" and the twelve gods BAIU RETH AMMIU TUAT, i.e., the \"souls of men who dwell in the Tuat\" (vol.\n\nii., pp.\n\n144, 145).\n\nThe exact functions of Ennutchi are not known, but his presence is baleful, and AFU-RA straightway calls upon the group of gods to destroy him; the god would press on to the next Gate, NEBT-AHAU, but ENNUTCHI can travel to that point, and he must therefore be removed.\n\nThe next group of gods is of peculiar interest, for they represent the souls of those who have spoken \"what is right and true upon earth, and who have magnified the forms of the god RA.\" In return for such moral rectitude and piety, AFU-RA orders HERI-QENBET-F to invite them to \"sit at peace in their habitations in the corner of those who are with myself,\" where praises shall be sung to their souls, and where they shall have air in abundance to breathe; they shall, moreover, have joints of meat to eat in SEKHET-AARU.\n\nBesides this, offerings shall be made to them upon earth, even as they are to the god HETEPI, the lord of SEKHET-HETEPET (vol.\n\nii., pp.\n\n145, 146).\n\nNow from these statements some very interesting deductions may be made.\n\nIn the first place, it is now certain that there was a place specially set apart for the souls of men in the Tuat, and that those who were allowed to enter it p.\n\n145 had lived a life of moral rectitude, and had followed after righteousness and integrity when they were upon earth.\n\nSecondly, they were allowed to live in the corner of the SEKHET-HETEPET with the great god himself, in the place where, as we know from the Papyrus of Ani (see above, p.\n\n44 ), most wonderful grain grew.\n\nThirdly, an everlasting supply of offerings made upon earth was assured them, and in this respect they were coequal with HETEPI, the chief god of the Field of Peace (or, Field of Offerings).\n\nThus the religion of Osiris undoubtedly taught that those who were good on this earth were rewarded in the next world.\n\nOn the right of AFU-RA are the twelve gods called HENIU-AMMIU-TUAT, i.e., \"those who sing praises in the Tuat,\" and the twelve gods called KHERU-ENNUHU-EM-UAT, i.e., \"those who hold the cord in the Tuat,\" and the four HENBIU gods (vol.\n\nii., pp.\n\n148-150)."

