body = "Sacred Texts Egypt EHH Index Index Previous Next SEVENTH DIVISION OF THE TUAT.\n\nI.\n\nKINGDOM OF OSIRIS ACCORDING TO THE BOOK AM-TUAT.\n\nThe name of this DIVISION, or HOUR, is THEPHET-SHETAT, the name of the Gate is RUTI-ASAR, and the goddess of the Hour is KHEFTES-HAU-HESQ-NEHA-HRA.\n\nOn looking at the \"secret path of AMENTET\" wherein AFU-RA is still travelling, we note that the face of the god is turned in another direction, that the crew is increased by Isis and by SER, whose name has also been read SEMSU, and that the canopy under which AFU-RA stands is formed of the body of the serpent p.\n\n152 [paragraph continues] MEHEN (Vol.\n\ni., p.\n\n140).\n\nThere is a good reason for these changes, for the god has now to traverse a region where there is not sufficient water to float his boat or to permit of its being towed; moreover, his way is blocked by a monster serpent called NEHA-HRA, which lies on a sand bank 450 cubits long.\n\n1 In other words, the Boat of AFU-RA has arrived at a region of sandbanks and shallows, where serpents and crocodiles live; but the words of power of Isis, the great sorceress, and of SER, and of the god himself protect him from mishap, and eventually he passes through this division by taking upon himself the form of the serpent MEHEN in which he glides onwards.\n\nThe region of the Tuat where the serpent APEP or NEHA-HRA lives is called TCHAU, and it is 440 cubits long, and 440 cubits wide; his head and his tail are caught in fetters by SERQET and HER-TESU-F respectively, and these gods have transfixed him to the ground with six huge knives (vol.\n\ni., p.\n\n142).\n\nWhen the body of the serpent has been removed, AFU-RA advances, and, passing four goddesses each armed with a knife, arrives at four rectangular buildings.\n\nInside each building (vol.\n\ni., p.\n\n144) is a mound of sand, and at each end of each building is the head of a man.\n\nThese buildings are the tombs wherein the four chief forms of the Sun-god have been buried, the first containing the \"Form of TEM,\" the second the \"Form of KHEPERA,\" the third p.\n\n153 the \"Form of RA,\" and the fourth the \"Form of OSIRIS.\" The heads which appear at the ends of the tombs are those of the enemies who were slain at the tombs, and were buried in the foundations in order to drive away evil spirits.\n\nThe texts which refer to these scenes state that the four goddesses join in slaying APEP, that the human heads appear as soon as any one comes to the tombs; and that as soon as they have heard the voice of AFU-RA, and he has gone by, they \"eat their own forms,\" i.e., they disappear until Ra again comes (vol.\n\ni., p.\n\n145).\n\nOn the right of the Boat of AFU-RA, and facing it, are HORUS, and the twelve gods of the hours, who protect the tombs of Osiris, and assist RA in his journey (vol.\n\ni., pp."

