body = "close to Heliopolis; if this be so, Sekhet-Aaru was probably situated at no great distance from Abydos, near which was the famous \"Gap\" in the mountains, whereby the spirits of the dead entered the abode set apart for them.\n\nWe see from this list also that the heaven provided for the blessed was one such as an agricultural population would expect to have, and a nation of farmers would revel in the idea of living among fields of wheat and barley, the former being p.\n\n42 between seven and eight feet, and the latter between nine and ten feet high.\n\nThe spirits who reaped this grain are said to have been nine cubits, i.e., over thirteen feet, in height, a statement which seems to indicate that a belief in the existence of men of exceptional height in very ancient days was extant in Egypt traditionally.\n\nOther facts to be gleaned from the list of Aats concerning Sekhet-Aaru are that:--1.\n\nOne section at least was filled with fire.\n\n2.\n\nAnother was filled with rushing, roaring waters, which swept everything away before them.\n\n3.\n\nIn another the serpent Rerek lived.\n\n4.\n\nIn another the Spirits lived upon the inert and the feeble.\n\n5.\n\nIn another lived the \"Destroyer of Souls.\" 6.\n\nThe great antiquity of the ideas about the Aats is proved by the appearance of the names of Hap, the Nile-god, Sept, or Sothis, and the Hippopotamus-goddess, Hebt-re-f, in connection with them.\n\nThe qualification for entering the Aats was not so much the living of a good life upon earth as a knowledge of the magical figures which represented them, and their names; these are given twice in the Papyrus of Nu, and as they are of great importance for the study of magical pictures they have been reproduced above.\n\nOf the general form and the divisions of Sekhet-Aaru, or the \"Field of Reeds,\" and Sekhet-hetepet, or the \"Field of Peace,\" thanks to the funeral papyri of the XVIIIth Dynasty, much is known, and they p.\n\n43 may now be briefly described.\n\nFrom the Papyrus of Nebseni 1 we learn that Sekhet-hetep was rectangular in shape, and that it was intersected by canals, supplied from the stream by which the whole region was enclosed.\n\nIn one division were three pools of water, Click to view Sekhet-Hetepet (Papyrus of Nebseni, British Museum, No.\n\n9900, sheet 17) .\n\nin another four pools, and in a third two pools; a place specially set apart was known as the \"birthplace of the god of the region,\" and the \"great company of the p.\n\n44 gods in Sekhet-hetep\" occupied another section of it.\n\nAt the end of a short canal was moored a boat, provided with eight oars or paddles, and each end of it terminated in a serpent's head; in it was a flight of steps.\n\nThe deceased, as we see, also possessed a boat wherein he sailed about at will, but its form is different from that of the boat moored at the end of the canal.\n\nThe operations of ploughing, and of seed-time and harvest, are all represented.\n\nAs to the deceased himself, we see him in the act of offering incense to the \"great company of the gods,\" and he addresses a bearded figure, which is intended probably to represent his father, or some near relation; we see him paddling in a boat, and also sitting on a chair of state smelling a flower, with a table of offerings before him."

