body = "Sacred Texts Egypt EHH Index Index Previous Next p.\n\n27 CHAPTER II.\n\nTHE EARLIEST EGYPTIAN CONCEPTION OF THE OTHER WORLD.\n\nHAVING briefly referred to the origin and development of the magical, religious, and purely funeral texts which, sometimes with and sometimes without illustrations, formed the \"Guides\" to the Ancient Egyptian Underworld, the form of the conceptions concerning the place of departed spirits as it appears in the Recensions of the XVIIIth and XIXth Dynasties must now be considered.\n\nTo reconstruct the form which they took in the Predynastic Period is impossible, for no materials exist, and the documents of the Early Empire are concerned chiefly with providing the deceased with an abundance of meat, drink, and other material comforts, and numbers of wives and concubines, and a place in Sekhet-Aaru, a division of Sekhet-hetepet, to which the name \"Elysian Fields\" has not inaptly been given.\n\nIn later times Sekhet-Aaru, or Sekhet-Aanru, comprised all Sekhet-hetepet.\n\nOf Sekhet-hetepet as a whole the earliest known pictures are those which are painted on the coffins of p.\n\n28 Al-Barsha, and of no portion of this region have we any detailed illustrations of the occupations of its inhabitants older than the XVIIIth Dynasty.\n\nTo the consideration of Sekhet-Aaru, which was the true heaven of every faithful worshipper of Osiris, from the time when he became the judge and benevolent god and friend of the dead down to the, Ptolemaïc Period, that is to say, for a period of four thousand years at least, the scribes and artists of the XVIIIth Dynasty devoted much attention, and the results of their views are set forth in the copies of PER-EM-HRU, or the Theban Book of the Dead, which have come down to us.\n\nIn one of the oldest copies of PER-EM-HRU, i.e., in the Papyrus of Nu, 1 is a vignette of the Seven Arits , or divisions of Sekhet-Aaru; the portion shown of each Arit is the door, or gate, which is guarded by a gatekeeper, by a watcher, who reports the arrival of every comer, and by a herald, who receives and announces his name.\n\nAll these beings save two have the head of an animal, or bird, on a human body, a fact which indicates the great antiquity of the ideas that underlie this vignette.\n\nTheir names are:-- Arit I.\n\nGatekeeper .\n\nSEKHET-HRA-ASHT-ARU.\n\nWatcher .\n\nSEMETU.\n\nHerald .\n\nHU-KHERU.\n\np.\n\n29 Click to view The Seven Arits, each with its Gatekeeper, its Watcher, and its Herald .\n\np.\n\n31 Arit II.\n\nGatekeeper .\n\nTUN-HAT.\n\nWatcher .\n\nSEQET-HRA.\n\nHerald .\n\nSABES.\n\nArit III.\n\nGatekeeper .\n\nAM-HUAT-ENT-PEHUI-FI.\n\nWatcher .\n\nRES-HRA.\n\nHerald .\n\nUAAU.\n\nArit IV.\n\nGatekeeper .\n\nKHESEF-HRA-ASHT-KHERU.\n\nWatcher .\n\nRES-AB.\n\nHerald .\n\nNETEKA-HRA-KHESEF-ATU.\n\nArit V.\n\nGatekeeper .\n\nANKH-EM-FENTU.\n\nWatcher .\n\nASHEBU.\n\nHerald .\n\nTEB-HER-KEHAAT.\n\nArit VI.\n\nGatekeeper .\n\nAKEN-TAU-K-HA-KHERU.\n\nWatcher .\n\nAN-HRA.\n\nHerald .\n\nMETES-HRA-ARI-SHE.\n\nArit VII.\n\nGatekeeper .\n\nMETES-SEN.\n\nWatcher .\n\nAAA-KHERU.\n\nHerald .\n\nKHESEF-HRA-KHEMIU."

