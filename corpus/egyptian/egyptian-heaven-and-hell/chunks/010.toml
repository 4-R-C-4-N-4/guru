[content]
body = "As this was the case, we need not wonder that all magnificence disappeared from funeral rites and ceremonies, and that the tombs of the period were small and unimportant.\n\nThe gods were worshipped and the dead were buried as matters of course, but it goes without saying that kings, whose authority was not consolidated, and whose power was ineffective except in the immediate neighbourhood of the towns in which they lived, who were unable to wage wars in Syria and Sinai and to bring back much spoil, could neither establish Colleges of priests nor endow new temples; for in ancient Egypt, as elsewhere, the fortunes of the gods and the wealth of their sanctuaries increased or declined according as the inhabitants of the land were prosperous or otherwise.\n\nSimilarly also, when the community was suffering from the evil effects of a long period of civil wars, and business was at a standstill, and farmers were unable to carry on the usual agricultural operations on which both the government and the priesthood ultimately depended for support, it was impossible for men to bury their dead with all the pomp and ceremony which were the characteristics of funerals in times of peace and prosperity.\n\nThe innate conservatism of the Egyptians made them cling to their ancient beliefs during this period of stress, but p.\n\n7 no important pyramids were built, and very few private funeral chapels were maintained at expensive rates, and the souls of the dead were committed to such protection as could be obtained by the prayers of their relatives and friends, and by the utterance of religious formulae, and by inexpensive amulets.\n\nWith the rise to power of the Princes of Thebes, things took a turn for the better so far as worship in the temples and the care for the dead were concerned.\n\nSo soon as they had overcome their enemies the Princes of Herakleopolis, and their confederates the Princes of Asyut, and had firmly established themselves on the throne of Egypt, they sent men to reopen the quarries in the First Cataract and in the Wadi Hammamat near Coptos.\n\nThis is a sure proof that the new line of kings, most of whom bear the name of Menthu-hetep, had need of large quantities of granite, and of sandstone of various kinds, and such materials can only have been required for the building of temples and palaces, and funeral altars and stelae, sarcophagi, &c.\n\nThe fact that the work was begun again in the quarries also proves that the authority of the Menthu-heteps was well established.\n\nMenthu-hetep II., we are told by an inscription set up in the Wadi Hammamat by his officer Amen-em-hat, caused to be quarried a block of stone which measured eight cubits, by four cubits, by two cubits, i.e., about thirteen feet six inches long, six feet six inches wide, and three feet six inches thick, and it is probable that he required p.\n\n8 this for a sarcophagus.\n\nThis king is also famous as the maker of a well in the desert, the mouth of which was about sixteen feet six inches square; and at one time he employed several thousands of men, including three thousand carriers or boatmen, in his stone-works.\n\nHis successor, Menthu-hetep III., continued the work in the quarries, and built himself a pyramid, called Khu-ast, in the mountain of Tchesert at Thebes, which may now be identified with that portion of the great Theban cemetery to which the name Der al-Bahari was given by the Arabic-speaking Egyptians.\n\nThis building is mentioned in the great Abbott Papyrus preserved in the British Museum (No."

