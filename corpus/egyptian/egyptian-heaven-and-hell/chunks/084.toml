[content]
body = "Who the beings in the water are it is impossible exactly to say, but it is clear that they were supposed to have the power to hinder the progress of the Boat of AFU-RA, for Horus propitiates them with promises of health and strength, as we have seen above.\n\nA little beyond the lakes are four goddesses who \"shed light upon the road of RA in the thick darkness,\" and in front of them, is the mystic sceptre which represents \"SET the Watcher,\" who \"waketh up and travelleth with the god.\" To the left of the path of AFU-RA we see first the god P-ANKHI, i.e., \"he who is endowed with the property of life,\" and KHEPER-ANKH, in the form of a beetle, who is pushing before him an oval of sand, which either contains his germ, or is intended to represent the ball of eggs which the Scarabaeus sacer rolls before him, and which he wishes to take through the DIVISION into the Eastern Horizon of the sky (vol.\n\ni., p.\n\n216).\n\nThen we have the two serpents Menenui supporting a disk, and goddesses of the North and South p.\n\n175 [paragraph continues] (vol.\n\ni., p.\n\n217).\n\nTo the right of these are the goddesses NETHETH and KENAT, who spring from the axe SETFIT, which supports a disk.\n\nThese four goddesses gather together souls on earth, and they purify the mighty spirits in the Tuat; they only become visible when AFU-RA appears, and so soon as he has passed them by they vanish.\n\nBeyond these is a long procession of deities who assist AFU-RA in his journey.\n\nThe first eight, who are goddesses, stand before the Ape-god called AF-ERMEN-MAAT-F, who holds the Eye of Horus, and it is their duty to recite the words of power which shall cause splendour to issue from the Eye of Horus each day, and to sing praises to it (vol.\n\ni., pp.\n\n219-221).\n\nThe other deities only come into being when AFU-RA utters their names; they live in the shades which are in the mouth of the great god, and then their souls travel with him.\n\nTheir work is to strip the dead of their swathings, and to break in pieces the enemies of Ra, and to order their destruction.\n\nNext: Eleventh Division of the Tuat.\n\nI.\n\nKingdom of Temu-Khepera-Ra According to the Book Am-Tuat"

