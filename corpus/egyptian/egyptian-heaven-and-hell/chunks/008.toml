body = "Sacred Texts Egypt EHH Index Index Previous Next p.\n\n1 THE EGYPTIAN HEAVEN AND HELL CHAPTER I.\n\nORIGIN OF ILLUSTRATED GUIDES TO THE OTHER WORLD.\n\nTHE inhabitants of Egypt during the Dynastic Period of their history possessed, in common with other peoples of similar antiquity, very definite ideas about the abode of departed spirits, but few, if any, ancient nations caused their beliefs about the situation and form, and divisions, and inhabitants of their Heaven and Hell, or \"Other World,\" to be described so fully in writing, and none have illustrated the written descriptions of their beliefs so copiously with pictorial representations of the gods and devils, and the good and evil spirits and other beings, who were supposed to exist in the kingdom of the dead.\n\nIt is now generally admitted that Egyptian Dynastic History covers a period of nearly five thousand years, but it must not p.\n\n2 be assumed for one moment that it is at present possible to describe in a connected or complete form all the views and opinions about their Other World which were held by the theologians and the uneducated classes of Egypt during this long space of time, and it must be said at once that the materials for such a work are not forthcoming.\n\nAll that can be done is to collect from the copies that have come down to us of the books which relate to the state and condition of the dead, and to the abode of departed spirits, the beliefs which are enunciated or referred to therein, and, taking them so far as possible in chronological order, to piece them together and then make deductions and draw general conclusions from them.\n\nWe must always remember that the texts of the various Books of the Dead are far older than the illustrations found in the later recensions of them which are now in our hands, and that such illustrations, in matters of detail at least, reflect the opinions of the priestly class that held religious supremacy at the time when they were drawn or painted.\n\nIn cases where archetypes were available the artist was careful to follow in all general matters the ancient copies to which he had access, but when new beliefs and new religious conceptions had to be illustrated, he was free to treat them pictorially according to his own knowledge, and according to the wishes of those who employed him.\n\nThe oldest Books of the Dead known to us, that is to say, the religious compositions which are inscribed p.\n\n3 on the walls of the chambers and corridors of the pyramids of kings Unas, Teta, Pepi I., Mer-en-Ra, and Pepi II., are without illustrations of any sort or kind, and it is not easy to account for this fact.\n\nThat the Egyptians possessed artistic skill sufficient to illustrate the religious and general works which their theologians wrote or revised, under their earliest dynasties of kings of all Egypt, is evident from the plain and coloured bas-reliefs which adorn the walls of their mastabas , or bench-shaped tombs, and we can only point out and wonder at the fact that the royal pyramids contain neither painted nor sculptured vignettes, especially as pictures are much needed to break the monotony of the hundreds of lines of large hieroglyphics, painted in a bluish-green colour, which must have dazzled the eyes even of an Egyptian.\n\nThe reason, however, why such early texts are not illustrated is probably not far to seek.\n\nProfessor Maspero has proved that the \"pyramid texts\" contain formulae and paragraphs which, judging from the grammatical forms that occur in them, it is easy to see must have been composed, if not actually written down, in the earliest times of Egyptian civilization."

