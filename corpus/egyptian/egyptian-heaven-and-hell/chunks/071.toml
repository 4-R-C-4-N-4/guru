[content]
body = "In each sepulchre is an \"image\" of Ra, i.e., a human head, a hawk's wing, and a hind-quarter of a lion, and these appear to be symbols under which the god was worshipped in and around Annu, or Heliopolis.\n\nOn the left of AFU-RA are eight gods and four goddesses, whose duty it is to accompany his Boat, and to escort the souls and shadows of men through the Division, and to provide the spirits with food and water.\n\nNext is the p.\n\n151 monster serpent \"AM-KHU,\" i.e., \"Eater of the Spirits,\" whose duty it is to devour the shadows of the dead, and to eat up the spirits of the foes of Ra; from his back spring the heads of the Four Children of Horus, and they come into being when they hear the voice of AFU-RA.\n\nBeyond these are four Osiris forms, \"which stand though they are seated, and move though they are motionless,\" and nine serpents armed with knives, which represent the ancient gods, TA-THENEN, TEMU, KHEPERA, SHU, SEB, ASAR (OSIRIS), HERU, APU, and HETEPUI.\n\nThese gods had faces of fire, and lived in the water of TATHENEN, and they only came to life by virtue of the words of power of AFU-RA, who is now to be regarded as KHEPERA.\n\nFootnotes 150:1 See above, p.\n\n66.\n\nNext: Seventh Division of the Tuat.\n\nI.\n\nKingdom of Osiris According to the Book Am-Tuat"

