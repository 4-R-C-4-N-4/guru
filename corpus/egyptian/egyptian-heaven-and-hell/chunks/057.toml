body = "Sacred Texts Egypt EHH Index Index Previous Next THIRD DIVISION OF THE TUAT.\n\nII.\n\nTHE KINGDOM OF KHENTI-AMENTI-OSIRIS ACCORDING TO THE BOOK OF GATES.\n\nBefore AFU-RA can pass into the THIRD DIVISION it is necessary for him to pass through a Gate which is protected by two strong walls, with a passage running between them.\n\nThis passage is swept by flames of fire which proceed from two uraei; each end of it is guarded by a warder in mummied form, and on the inner side of the inner wall is a company of gods.\n\nThe Gate is called SEPTET-UAUAU, and the name of its monster serpent is AQEBI.\n\nSo soon as the Boat enters the DIVISION or HOUR four of the gods of the region appear, and take it in tow; the god is in the same form as before, and has in no way suffered by his passage through the Gate, because at the word of SA the Gate opened, the flames which swept between the walls ceased, and the warders of the passage and the guardian gods withdrew their opposition.\n\nIn this DIVISION a serious obstacle had to be overcome.\n\nImmediately in the fair way of the course of AFU-RA is a group of eight gods, called FAIU-NETERU, who bear on their shoulders a long pole-like object, each end of which terminates in a bull's head.\n\nThis object is, p.\n\n126 intended to represent the long tunnel in the earth, each end of which was guarded by a bull, through which, according to one tradition, the night-Sun passed on his journey from the place of sunset to the place of sunrise.\n\nAt intervals on the tunnel are seated seven gods called NETERU-AMIU, i.e., the \"gods who are within,\" and they are intended to represent the guardians of the seven portions into which the tunnel was divided; the name given to the tunnel is \"UAA-TA,\" i.e., \"Boat of the Earth,\" but there is no doubt that it originally represented Click to view The Boat of the Earth .\n\na kind of Tuat which was complete in itself, as the bulls' heads, one at each end of it, prove.\n\nThe difficulty of passing through the \"Boat of the Earth\" is soon overcome, for the gods of the Tuat tow AFU-RA through it, and we see them at the other end of the Division still holding the tow-line in their hands.\n\nIn front of them are the four gods, whose arms and hands are covered (vol.\n\nii., p.\n\n107), whom we have already seen in the BOOK AM-TUAT (Vol.\n\ni., p.\n\n48), where they were in charge of the four boats which filled the p.\n\n127 picture.\n\nIt is not difficult to explain why the \"Boat of the Earth\" was omitted by the Theban priests from their composition; had they kept it in it they would have been obliged to make their god AFU-RA, the night form of AMEN-RA, to submit to being towed through an inferior Tuat, and to being absorbed by the earth-god."

