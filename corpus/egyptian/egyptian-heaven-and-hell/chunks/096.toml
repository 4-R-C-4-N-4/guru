[content]
body = "The mummified form in which the dead Sun-god travelled through the Tuat is now useless, and we see it cast aside and lying against the wall which divides the Tuat from this world; that there shall be no doubt about this it is described by the words \"Image (or, form) Of AF.\" Turning now to the beings who are on the right and left of the path of the god, we see in the upper register twelve goddesses, each of whom bears on her shoulders a serpent which produces light by belching fire from its mouth (vol.\n\ni., pp.\n\n265, 266); these drive away APEP, and frighten the beings of darkness by their fires.\n\nNext to these are twelve gods who sing praises at dawn to the god, whom they assert to be \"self-begotten\" and the author of his own being, and they rejoice because at his new birth his soul will be in heaven, and his body on earth.\n\nThese gods are indeed spirits of the East, and they are declared to have jurisdiction over the gods of the \"land of the turquoise,\" i.e., Sinai.\n\nIn the lower register we have a company of twenty-three gods (vol.\n\ni., pp.\n\n271-274) who stand in the sky ready to receive Ra when he appears, and to praise him; some of them drive APEP to \"the p.\n\n195 back of the sky,\" some support the Great Disk in the sky, and the duty of one of them, who is called SENMEKHEF and appears in the form of a serpent, is to burn up the enemies of Ra at dawn.\n\nThus the Sun-god passed out of the Tuat even as he entered it, with praises, and as he did so he bade farewell to Osiris, the Lord of the Tuat, under one of whose forms he had completed successfully his journey, in these words:--\"Life to thee, O thou who art over the darkness!\n\nLife [to thee]!\n\nin all thy majesty.\n\nLife to thee!\n\nO KHENTI-A-AMENTET-OSIRIS, who art over the beings of Amentet.\n\nLife to thee!\n\nLife to thee O thou who art over the Tuat.\n\nThe winds of Ra are in thy nostrils, and the nourishment of Khepera is with thee.\n\nThou livest, and ye live.\n\nHail to Osiris, the lord of the living, that is to say, of the gods who are with Osiris, and who came into being with him the first time.\" Next: Twelfth Division of the Tuat.\n\nII.\n\nEastern Vestibule of the Tuat According to the Book of Gates"

