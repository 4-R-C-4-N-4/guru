[content]
body = "Above the hind-quarters of the lion is the head of the god ANA (?), wearing the Crown of the South; on the one side we have four gods of the South assisting in the raising of a column surmounted by the Crown of the South, and on the other four gods of the North assisting in the raising of a column surmounted by the Crown of the North.\n\nThese ceremonies appear to have some connexion with the magical rites which were performed in Egypt in primitive times in the making ready of the crowns for the Sun-god to wear on his rising.\n\nBeyond these gods are: 1.\n\nThe serpent SHEMTI, with four heads at each end of his body, and his warder APU.\n\n2.\n\nThe serpent BATA, with a head at each end of his body.\n\n3.\n\nThe serpent TEPI, with four human heads and bodies at each end of his body, and his warder ABETH.\n\nThese are faced by two gods who are about to attack these serpents with nets, and who assist Horus by reciting words of power for him.\n\nNext: Tenth Division of the Tuat.\n\nII.\n\nKingdom of Temu-Khepera-Ra According to the Book of Gates"

