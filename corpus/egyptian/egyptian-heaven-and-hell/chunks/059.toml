[content]
body = "The dwellers in the LAKE OF BOILING WATER entreat AFU-RA to come to them, saying, \"Send forth thy light upon us, O thou great god who hast fire in thine eye\" (vol.\n\nii., p.\n\n113).\n\nIn answer, the god decrees that their food shall consist of loaves of bread and green, herbs, and that their beer shall be made from the kemtet plant.\n\nThis plant has not as yet been accurately identified, but it is tolerably certain that it belonged to a species which was characteristic of the neighbourhood of the Lake.\n\nThe beings who stand on the left hand of AFU-RA are divided into two groups: the first consists of nine men, and the second of nine gods, and each group is under the command of TEMU.\n\nBetween TEMU and the first company, who are called TCHATCHA we see (vol.\n\nii., p.\n\n114) coiled the monster serpent APEP which has p.\n\n130 collapsed as a result of the utterance of the word of power by TEMU.\n\nThis serpent tried to envelop the boat of AFU-RA with its folds, and then to force a way into his boat; but the TCHATCHA, i.e., \"Great Chiefs,\" cut open its head, and slit its body in many places, and its destruction was finished by TEMU.\n\nThese TCHATCHA live upon the same food as Ra, but they also partake of the offerings made upon earth to KHENTI-AMENTI, the ancient god of the dead of Abydos.\n\nThe nine gods who follow these are called NEBU-KHERT, and their duty is to repulse the serpents SEBA and AF (vol.\n\nii., p.\n\n115), and to enchant and to render helpless and motionless APEP when he attempts to force the gates of KHENTI-AMENTI.\n\nTheir food is the same as that of the TCHATCHA, but they possess a power of a remarkable character (which is represented by the words \"maat kheru\"), for they know how to utter words in such a way, and with such a tone of voice, that the effect which they wish them to have must of necessity take place.\n\nEverything which Osiris possessed as god and judge of the dead he owed to the \" maat kheru,\" or \"word of maat .\" As the god AFU-RA passes out of the THIRD DIVISION both the TCHATCHA and the NEBU-KHERT give themselves up to lamentation, and they return to the entrance, and wait for the re-appearance of his boat on the following night, when they will again attack SEBA, and AF, and APEP, and overcome them.\n\nThe exact place which was set apart for the souls of human beings is nowhere described in the texts.\n\nNext: Chapter VIII.\n\nFourth Division of the Tuat.\n\nI.\n\nThe Kingdom of Seker According to the Book Am-Tuat"

