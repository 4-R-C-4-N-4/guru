body = "137); he is in mummied form, wears the white crown, as befits a god of the South, and stands on a serpent.\n\nImmediately before the shrine is the Flame-goddess NESERT.\n\nBefore and behind the shrine are twelve gods, at the head of the first company being HERU-UR, or \"Horus the Aged.\" HERU-UR addresses the god in the shrine by the names \"Osiris\" and \"Khenti-Amenti,\" and declares that he has performed the magical ceremonies which have made KHENTI-AMENTI to be the \"Governor of the Tuat,\" to such purpose that the spirits of the blessed ( khu ) look upon him with awe, and the dead, i.e., the damned, ( mit ) are in terror of him.\n\nHere we have the proof of the existence of the belief that Osiris was enabled to travel safely through the Tuat by means of the spells, and incantations, and magical formulae, and words of power which were uttered by HERU-UR.\n\nThe Twelve gods who are in front of the shrine ascribe praise and dominion to KHENTI-AMENTI, and declare that his son Horus has restored to him his crown, and crushed his p.\n\n143 enemies, and made strong OSIRIS-KHENTI-AMENTI.\n\nTo these AFU-RA makes no answer, but he calls upon Horns to avenge him on those who work against him, and to cast them to the Master of the lords of the pits, so that they may be destroyed.\n\nNow the pits here referred to are four in number (vol.\n\nii., p.\n\n137), and they are filled with fire; into these the enemies of the god are cast, and the keepers of them are adjured by Horus to watch and tend the fires.\n\nWho the plotters against the god may be it is impossible to say, but it is quite clear that one portion of the FOURTH DIVISION OF THE TUAT was a fiery hell wherein all the wicked were consumed.\n\nIt is interesting to note that of the beings who are to the left of the Boat of AFU-RA Horus is the only one whom the god addresses.\n\nNext: Fifth Division of the Tuat.\n\nII.\n\nThe Kingdom of Khenti-Amenti-Osiris According to the Book of Gates"

