body = "From another place in the same papyrus, 1 and from other papyri, we learn that the \"Secret Gates of the House of Osiris in Sekhet-Aaru\" were twenty-one in number; the Chapter (CXLVI.) gives the name of each Gate, and also that of each Gatekeeper up to No.\n\nX., thus:-- I.\n\nGate .\n\nNEBT-SETAU-QAT-SEBT-HERT-NEBT-KHEBKHEBT-SERT-METU-KHESEFET-NESHENIU-NEHEMET-UAI-EN-I-UAU.\n\np.\n\n32 Gatekeeper .\n\nNERI.\n\nII.\n\nGate .\n\nNEBT-PET-HENT-TAUI-NESBIT-NEBT-TEMEMU-TENT-BU-NEBU.\n\nGatekeeper .\n\nMES-PEH.\n\n(or, MES-PTAH).\n\nClick to view Gate I .\n\nClick to view Gate II .\n\nIII.\n\nGate .\n\nNEBT-KHAUT-AAT-AABET-SENETCHEMET-NETER-NEB-AM-S-HRU-KHENT-ER-ABTU.\n\nGatekeeper .\n\nERTAT-SEBANQA.\n\nIV.\n\nGate .\n\nSEKHEMET-TESU-HENT-TAUI-HETCHET-KHEFTI-NU-URT-AB-ARIT-SARU-SHUT-EM-AU.\n\nGatekeeper .\n\nNEKAU.\n\np.\n\n33 Click to view Gate III .\n\nClick to view Gate IV .\n\nV.\n\nGate .\n\nNEBT-REKHU-RESHT-TEBHET-TATU-AN-AQ-ERES-UN-TEP-F.\n\nGatekeeper .\n\nHENTI-REQU.\n\nClick to view Gate V .\n\nClick to view Gate VI .\n\np.\n\n34 VI.\n\nGate .\n\nNEBT-SENKET-AAT-HEMHEMET-AN-REKH-TU-QA-S-ER-USEKH-S-AN-QEMTU-QET-S-EM-SHAA-AU-HEFU-HER-S-AN-REKH-TENNU-MES-EN-THU-KHER-HAT-URTU-AB.\n\nGatekeeper .\n\nSMAMTI.\n\nClick to view Gate VII .\n\nClick to view Gate VIII .\n\nVII.\n\nGate .\n\nAKKIT-HEBSET-BAK-AAKEBIT-MERT-SEHAP-KHAT.\n\nGatekeeper .\n\nAKENTI.\n\nVIII.\n\nGate .\n\nREKHET-BESU-AKHMET-TCHAFU-SEPT-PAU-KHAT-TET-SMAM-AN-NETCHNETCH-ATET-SESH-HER-S-EN-SENT-NAH-S.\n\nGatekeeper .\n\nKHU-TCHET-F.\n\np.\n\n35 IX.\n\nGate .\n\nAMT-HAT-NEBT-USER-HERT-AB-MESTET-NEB-S-KHEMT-SHAA-.\n\n.\n\n.\n\n.-EM-SHEN-S-SATU-EM-UATCHET-QEMA-THESET-BES-HEBSET-BAK-FEQAT-NEB-S-RA-NEB.\n\nGatekeeper .\n\nTCHESEF.\n\nClick to view Gate IX .\n\nClick to view Gate X .\n\nX.\n\nGate .\n\nQAT-KHERU-NEHESET-TENATU-SEBHET-ER-QA-EN-KHERU-S-NERT-NEBT-SHEFSHEFT-AN-TER-S-NETET-EM-KHENNU-S.\n\nGatekeeper .\n\nSEKHEN-UR.\n\nXI.\n\nGate .\n\nNEMT-TESU-UBTET-SEBAU-HENT-ENT-SEBKHET-NEBT-ARU-NES-AHEHI-HRU-EN-ANKHEKH.\n\n1 p.\n\n36 XII.\n\nGate ."

