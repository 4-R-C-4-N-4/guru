body = "99 Hour-goddess --TUATET-MAKTET-EN-NEB-S.\n\nDivision X.\n\nName --METET-QA-UTCHEBU.\n\nName of the Gate --AA-KHEPERU-MES-ARU.\n\nHour-goddess --TENTENIT-UHETES-KHAK-AB.\n\nDivision XI.\n\nName --RE-EN-QERERT-APT-KHATU.\n\nName of the Gate --SEKHEN-TUATIU.\n\nHour-goddess --SEBIT-NEBT-UAA-KHESFET-SEBA-EM-PERT-F.\n\nDivision XII.\n\nName --KHEPER-KEKIU-KHAU-MEST.\n\np.\n\n100 Name of the Gate --THEN-NETERU.\n\nHour-goddess --MAA-NEFERT-RA.\n\nThe divisions of the Tuat according to the BOOK OF GATES are usually marked by Gates, which are guarded by serpents; they are as follows:-- Division I.\n\nName of Guardian Gods .--SET and TAT.\n\nName of the Region .--SET-AMENTET, Western Vestibule.\n\nDivision II.\n\nName of the Serpent --SAA-SET.\n\nDivision III.\n\nName of the Serpent --AQEBI.\n\nName of the Gate --SEPTET-UAUAU.\n\nDivision IV.\n\nName of the Serpent --TCHETBI.\n\nName of the Gate --NEBT-S-TCHEFAU.\n\np.\n\n101 Division V.\n\nName of the Serpent --TEKA-HRA.\n\nName of the Gate --ARIT.\n\nDivision VI.\n\nAt the entrance to this division is the Judgment Hall of Osiris.\n\nName of the Serpent --SET-EM-MAAT-F.\n\nName of the Gate --NEBT-AHA.\n\nDivision VII.\n\nName of the Serpent --AKHA-EN-MAAT.\n\nName of the Gate --PESTIT.\n\nDivision VIII.\n\nName of the Serpent --SET-HRA.\n\nName of the Gate --BEKHKHI.\n\nDivision IX.\n\nName of the Serpent --AB-TA.\n\nName of the Gate --AAT-SHEFSHEFT.\n\nDivision X.\n\nName of the Serpent --SETHU.\n\nName of the Gate --TCHESERIT.\n\np.\n\n102 Division XI.\n\nName of the Serpent--AM-NETU-F.\n\nName of the Gate--SHETAT-BESU.\n\nDivision XII.\n\nNames of the Serpents--SEBI, and RERI.\n\nName of the Gate--TESERT-BAIU, Eastern Vestibule.\n\nFrom the above lists it is clear that in the BOOK AM-TUAT the actual divisions of the Tuat are considered without any reference to Gates, even if such existed in the scheme of the priests of Amen-Ra, and that according to the Book of Gates, the Gates of the divisions in the Tuat are the most important and most characteristic features.\n\nThe absence of Gates in the BOOK AM-TUAT is not difficult to explain; the compilers of this work, wishing to exalt Amen-Ra, did away with the Gates, which were the most important features of the kingdom of Osiris, so that the necessity for Amen-Ra to seek permission of their warders, who were appointed by Osiris, was obviated.\n\nFootnotes 81:1 The tombs of Amen-hetep II.\n\nand Thothmes III.\n\nwere discovered by M.\n\nLoret in 1898, and, according to the description of them published in the French journals, the copies of Am-Tuat on their walls were in a good state of preservation."

