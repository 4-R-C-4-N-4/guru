body = "191 they invoke the Spirits of the East, and join with them in singing hymns to the god, and in praising him after he has appeared in the sky.\n\nAt the head of the whole .\n\ncompany stands a god with the head of a crocodile (vol.\n\nii., pp.\n\n290-293).\n\nThe Kingdom of TEMU-KHEPERA-RA.\n\ndiffers from other Tuats from the fact that, according to the BOOK OF GATES, it contains no place specially set apart for the punishment of the enemies of Osiris and Ra, and of the damned.\n\nThe pictures which illustrate it supply us with representations of the enemies of the Sun-god and of the beings who vanquish them, and secure his triumphant progress.\n\nHaving arrived at the end of the ELEVENTH DIVISION the Boat comes to the end of the Fourth Tuat; 1 AFU-RA has effected his transformation as KHEPERA, and is now ready to appear in the sky of this world as RA.\n\nHow he effects this we shall see from the next DIVISION.\n\nFootnotes 190:1 Compare Job xxxviii.\n\n7--\"When the morning stars sang together, and all the sons of God shouted for joy.\" 191:1 The Four Tuats are the Kingdoms of Khenti-Amenti-Osiris, Seker, Osiris of Mendes and Busiris, and Temu-Khepera-Ra.\n\nNext: Chapter XIV.\n\nTwelfth Division of the Tuat.\n\nI.\n\nEastern Vestibule of the Tuat, or the Antechamber of the World of Light According to the Book Am-Tuat"

