body = "30,840.) p.\n\n55 Click to view Sekhet-hetepet, showing the Sekhet-Aaru with the magical boat, the nine lakes, the birthplace of the gods, &c.\n\n(From the outer coffin of Sen, British Museum, No.\n\n30,841.) p.\n\n57 development in religious thought, which took place in the interval between the periods when the papyri were written, cannot be said.\n\nThere is abundant evidence in the Papyrus of Ani that Ani himself was a very religious man, and we are not assuming too much when we say that he was the type of a devout worshipper of Osiris, whose beliefs, though in some respects of a highly spiritual character, were influenced by the magic and gross material views which seem to have been inseparable from the religion of every Egyptian.\n\nThough intensely logical in some of their views about the Other World, the Egyptians were very illogical in others, and they appear to have seen neither difficulty nor absurdity in holding at the same time beliefs which were inconsistent and contradictory.\n\nIt must, however, in fairness be said that this characteristic was due partly to their innate conservatism in religious matters, and their respect for the written word, and partly to their fear that they might prejudice their interests in the future life if they rejected any scripture or picture which antiquity, or religious custom, or tradition had sanctioned.\n\nCertain examples, however, prove that the Egyptians of one period were not afraid to modify or develop ideas which had come down to them from another, as may be seen from the accompanying illustration.\n\nThe picture which is reproduced on p.\n\n53 is intended to represent Sekhet-hetepet, and is taken from the inner coffin of Kua-Tep, which was found at Al-Barsha, and is now p.\n\n58 in the British Museum (No.\n\n30,840); it dates front the period of the XIth Dynasty.\n\nFrom this we see that the country of the blessed was rectangular in shape, and surrounded by water, and intersected by streams, and that, in addition to large tracts of land, there were numbers of eyots belonging to it.\n\nIn many pictures these eyots are confounded with lakes, but it is pretty clear that the \"Islands of the Blessed\" were either fertile eyots, or oases which appeared to be green islands in a sea of sand.\n\nNear the first section were three, near the second four, near the third four, three, being oval, and one triangular; the fourth section was divided into three parts by means of a canal with two arms, and contained the birthplace of the god, and near it were seven eyots; the fifth is the smallest division of all, and has only one eyot near it.\n\nEach eyot has a name which accorded with its chief characteristic; the dimensions of three of the streams or divisions are given, the region where ploughing takes place is indicated, and the positions of the staircase and the mystic boat are clearly shown.\n\nThe name of the god Hetep occurs twice, and that of Osiris once.\n\nIf now we compare this picture with that front the Papyrus of Nebseni we shall find that the actual operations of ploughing, reaping, and treading out of the corn are depicted on the Papyrus, and that several figures of gods and the deceased have been added.\n\nThe text speaks of offerings made by the deceased, and of his sailing in a boat, &c., therefore the artist p.\n\n59 Click to view Sekhet-hetepet.\n\n(From the Papyrus of Anhai--XXIInd Dynasty.) p.\n\n61 Click to view Sekhet-hetepet.\n\n(From the Turin Papyrus-Ptolemaïc Period.) p.\n\n63 added scenes in which he is depicted doing these things; and the lower part of the picture in the Papyrus has been modified considerably."

