[content]
body = "On each half of the mountain is a sceptre, one having the head of a jackal, and the other that of a ram; each sceptre is supported by the god TAT and the god SET, the personifications of the Tuat and the Mountain respectively.\n\nOne sceptre is mentioned in the text, which is somewhat obscure in meaning; it seems, however, that the jackal-headed sceptre uttered words on behalf of the god AFU-RA, and that the other p.\n\n110 typified him, taking the place of the ram-headed god with a human body which we have in the BOOK AM-TUAT.\n\nOn each side of the Boat are twelve gods, who presumably represent the Twelve Hours of the Day, and the Twelve Hours of the Night; one group is called \"Neteru Set\" ( or Semt), i.e., \"Gods of the Mountain,\" and the other \"Neteru Set-Amentet,\" i.e., \"Gods of the Mountain of the Hidden Land.\" The gods of the Mountain are the offspring of Ra himself, and they \"emerged from his eye\" (vol.\n\nii., p.\n\n85), and to them has Amentet been given as an abode.\n\nNext: Chapter VI.\n\nSecond Division of the Tuat.\n\nI.\n\nThe Kingdom of Khenti-Amenti-Osiris According to the Book Am-Tuat"

