[content]
body = "None of the inscriptions mentions Sekhet-Aaru, but it is distinctly said that the reaping of the grain by the deceased is taking place in Sekhet-hetep, or Sekhet-hetepet.\n\nIn chronological order the next picture of Sekhet-hetepet to be considered is that from the Papyrus of Ani, and it will be seen at a glance that in details it differs from that already described.\n\nAni adores the gods in the first division, but he burns no incense; the boat in which he paddles is loaded with offerings, and he is seen dedicating an offering to the bearded figure.\n\nThe legend reads, \"Living in peace in Sekhet--winds for the nostrils.\" The second division contains scenes p.\n\n45 Click to view Sekhet-Hetepet (Papyrus of Ani, British Museum, No.\n\n10,740, sheet 32) .\n\np.\n\n47 of' reaping and treading out of corn, but only three pools of water instead of four.\n\nIn the third division we see An!\n\nploughing the land by the side of a stream of untold length and breadth, which is said to contain neither fish nor worms.\n\nIt is important to note that this division is described as SEKHET-AANRU.\n\nThe eyot which represents the birthplace of the god of the city has no title, and the larger island, which is separated from it by a very narrow strip of ground, contains a flight of steps, but no gods.\n\nIn the left-hand corner is a place which is described as \"the seat of the Spirits, who are seven cubits in height\"; the \"grain is three cubits high, and it is the perfect Spirits who reap it.\" In the other portion of this section are two boats instead of one as in the Papyrus of Nebseni.\n\nIn connection with the two pictures of Sekhet-hetepet described above, it is important to consider the text which accompanies the older of them, i.e., that of the Papyrus of Nebseni.\n\nThe deceased is made to say that he sails over the Lake of Hetep (i.e., Peace) in a boat which he brought from the house of Shu, and that he has come to the city of Hetep under the favour of the god of the region, who is also called Hetep.\n\nHe says, \"My mouth is strong, I am equipped [with words of power to use as weapons] against the Spirits let them not have dominion over me.\n\nLet me be rewarded with thy fields, O thou god Hetep.\n\nThat p.\n\n48 which is thy wish do, O lord of the winds.\n\nMay I become a spirit therein, may I eat therein, may I drink therein, may I plough therein, may I reap therein, may I fight therein, may I make love therein, may my words be powerful therein, may I never be in a state of servitude therein, and may I be in authority therein .\n\n.\n\n.\n\n.\n\n.\n\n.\n\n[Let me] live with the god Hetep, clothed, and not despoiled by the 'lords of the north,' 1 and may the lords of divine things bring food unto me.\n\nMay he make me to go forward and may I come forth; may he bring my power to me there, may I receive it, and may my equipment be from the god Hetep."

