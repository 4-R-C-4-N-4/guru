body = "It occurs twice in the PER-EM-HRU, viz., in Chapter LII., line 6, and Chapter CLXXXIX., line 7, 1 and was translated \"persons\" by me in 1896; the oldest example of the use of the word was published by M.\n\nP.\n\nLacau in Recueil , 1904, p.\n\n67.\n\nThe very short form of the prayer of the deceased that he may enjoy the companionship of his father and mother in Sekhet.-hetep is the outcome of a belief which is very ancient; and it finds its fullest expression in an p.\n\n67 important Chapter, which M.\n\nLacau has published 1 according to the texts on two coffins of the XIth Dynasty, which were found at Al-Barsha, and are now in the Egyptian Museum at Cairo.\n\n2 This Chapter supplies us with some valuable information concerning the reunion and recognition of relatives and friends in Sekhet-hetep, and M.\n\nLacau's excellent edition of the text is a useful contribution to the literature which specially concerns Sekhet-hetep.\n\nThe words which stand at the head of the Chapter read, \"THE GATHERING TOGETHER OF THE ANCESTORS OF A MAN TO HIM IN NETER KHER,\" 3 and the text begins: \"Hail, Ra!\n\nHail, Tem!\n\nHail, Seb!\n\nHail, Nut!\n\nGrant ye unto Sepa that he may traverse the heavens (or sky), that he may traverse the earth, that he may traverse the waters, that he may meet his ancestors, may meet his father, may meet his mother, may meet his grown up sons and daughters, and his brethren, and his sisters, may meet his friends, both male and female, may meet those who have been as parents to him, 4 and his kinsfolk (cousins?), 5 and those who have worked for him upon earth, both male and female, and may meet the concubine whom he loved and knew.\" p.\n\n68 \"Behold, O Qema-ur (i.e., Great Creator), make Sepa to rejoin his grown up sons and daughters, and his concubines whom it is his heart's desire [to meet], and make thou Sepa to rejoin his friends, both male and female, and those who have worked for him upon earth.\" \"And if it happen that his father should be turned aside, or opposed or removed, when he would appear to him, or his mother when she would reveal herself to him, when Sepa wisheth to rejoin his ancestors, and his father and his mother, and his men and his women, and if it happen that there should be turned aside or opposed, or done away the reunion of Sepa with his little children, or his reunion with his brethren and sisters, and with his friends, and with his foster-parents, and with his kinsfolk, and with those who have worked for him upon earth: then verily the heart which is provided [with words of power] shall be removed from Ra, and the choice oxen for sacrifice shall be driven away from the altars of the gods, and the bread-cakes shall not be shattered, and the white bread-cakes shall not be broken in pieces, the meat-offering shall not be cut up in the divine chamber of sacrifice, and for you ropes shall not be coiled, and for you boats shall not be manned.\n\n\"But if he shall be with his father when he appeareth, and if he shall receive his mother when she maketh herself visible, and if he shall be rejoined to his ancestors and to his fathers and his mothers, and his men and his women, and his little p."

