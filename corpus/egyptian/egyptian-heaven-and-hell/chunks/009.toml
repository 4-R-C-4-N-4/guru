[content]
body = "These formulae, &c., are interspersed with others of later periods, and it seems as if, at the time when the \"pyramid texts\" were cut into stone, these religious compositions were intended to contain expressions of pious thought about the hereafter which would satisfy both those who accepted the ancient indigenous beliefs, p.\n\n4 and those who were prepared to believe the doctrines which had been promulgated by the priests of the famous brotherhood of Ra, the Sun-god, who had made their head-quarters in Egypt at Annu, i.e., On, or Heliopolis.\n\nThe old native beliefs of the country were of a more material character than the doctrines which the priests of Heliopolis taught, but it was found impossible to eradicate them from the minds of the people, and the priests therefore framed religious works in such a manner that they might be acceptable both to those who believed in the old animal-gods, tree-gods, plant-gods, &c., of Egypt, and those who preferred a purely solar cult, such as that of the worship of the Sun-god Ra.\n\nThe oldest Books of the Dead, in fact, represent the compromise arrived at under the IVth, Vth, and VIth Dynasties, between the priests of the old and the new religions.\n\nThis being so, the religious texts of the period represent too much a patch-work belief for purposes of systematic illustration, and in the result, and perhaps also through the funeral customs of the day, the growth in men's minds of the wish for illustrated guides to the Underworld was retarded.\n\nWhen the glory of sovereignty departed from the kings who held court at Memphis after the end of the rule of the VIth Dynasty, the system of solar theology, which had been promulgated in Lower Egypt by the priests of Heliopolis, began to make its way into Upper Egypt, and wherever it came it assumed a p.\n\n5 leading position among the religious systems of the day.\n\nThe kings of the VIIth and VIIIth Dynasties, like those of the IIIrd, IVth, and VIth, came from Memphis, but they had comparatively little power in the land, and, so far as we know, they did not build for themselves pyramids for tombs, and there is no evidence forthcoming to show that they filled the walls of their sepulchres with religious texts.\n\nThey carried on neither wars nor building operations of any importance, and it seems that their tombs were neither large nor magnificent.\n\nOwing to their feeble rule the governors of Suten-henen, or Herakleopolis, and those who ruled in the provinces near that city, succeeded in gaining their independence, and the kings of the IXth and Xth Dynasties were Herakleopolitans; their rule gradually extended to the south, and the religious influence of their priests was so great that they succeeded in forcing many of their mythological legends and beliefs into the accepted religion of the country, and these subsequently became part and parcel of the great Recension of the Theban Book of the Dead.\n\nThe dominion of the Herakleopolitans, however, was of comparatively short duration, and it collapsed under the attacks of the bold and vigorous governors of the Thebaïd, whose capital was at Thebes.\n\nJudging from the historical evidence concerning the period which lies between the VIth and the XIth Dynasties, neither the two last Memphitic nor the two Herakleopolitan Dynasties of kings did anything to p.\n\n6 improve the general condition of the country, and it seems as if they found it necessary to employ all their energies to maintain their position and the little real power in the country which they possessed."

