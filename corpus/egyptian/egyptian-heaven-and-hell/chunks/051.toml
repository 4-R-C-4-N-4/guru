[content]
body = "The texts giving these facts are most important, for they prove that in early times the abode of the blessed was believed to be in URNES, and that the making of offerings to the dead was inculcated as a meritorious act, and that it was believed to bring blessings upon him that made the offering even whilst he was upon earth.\n\nIt may also be noted in passing p.\n\n116 that the heaven URNES was somewhat exclusive, for only the followers of Osiris and RA were admitted.\n\nFootnotes 113:1 This is a name given to the serpent which is seen attacking an ass in the XIth Chapter of the Book of the Dead, and which is a form of the god Set; the Ass is probably a form of the sun-god RA.\n\nTHE EATER OF THE GREAT PHALLUS, i.e., the Ass, was also a power of evil, yet here he is found seated among beneficent gods.\n\n115:1 See within, page 126.\n\nNext: Second Division of the Tuat.\n\nII.\n\nThe Kingdom of Khenti-Amenti-Osiris According to the Book of Gates"

