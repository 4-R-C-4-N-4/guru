body = "23 [paragraph continues] Underworld.\n\nIn other words, the priests of Amen asserted the absolute sovereignty of their god, and their own religious supremacy.\n\nIt is, however, interesting to note that certain kings did not entirely shake off their belief in Osiris, and in the efficacy of the Chapters of the Book of Coming Forth by Day, for Thothmes III.\n\nwas swathed in a linen sheet on which was written a copy of the CLIVth Chapter, and Amen-hetep III.\n\nwas rolled up in sheets whereon extracts from several Chapters of that work were inscribed.\n\nSeti I.\n\nwent a good deal further, for although fully illustrated copies of Divisions I.-XI.\n\nof the Book \"Am-Tuat\" were painted on the walls of his tomb, he took care to have a complete copy of the Book of Gates, 1 with full illustrations, and copies of the LXXIInd and LXXXIXth Chapters of the Book of Coming Forth by Day cut on his alabaster sarcophagus.\n\nThe Chapter which Thothmes III.\n\nbelieved to be all-powerful is entitled \"Chapter of not letting the body perish,\" and if its words really express his convictions, he must have been terrified at the idea of his material body falling into dust and decay, and must have hoped for its resurrection through Osiris.\n\nThe Chapters which Seti I.\n\nhad cut on his sarcophagus are entitled the \"Chapter of Coming Forth by Day, and of making a way through Ammehet,\" and the \"Chapter of causing the soul to be united to its body in the Underworld.\" In the former he declares that p.\n\n24 he knows the names of the gods who preside over the Other World, and also the proper words of power, and because he has this knowledge he demands admission into Sekhet-Aaru, a portion of Osiris's kingdom of Sekhet-hetepet, and a constant and abundant supply of wheat (for bread), barley (for beer), incense, unguents, &c., and the power to assume any form he pleases at will.\n\nIn the latter he calls upon certain gods to make his soul rejoin its body, and, addressing the gods who tow the Boat of Millions of Years, he asks them to cause him to be born from the womb of the Sky-goddess Nut in the eastern horizon of heaven, [daily,] for ever.\n\nIt has already been said that a complete illustrated copy of the Book of Gates was also inscribed on the sarcophagus of Seti I., and it is not easy to explain this fact until we remember the important position which it makes Osiris to hold in the Other World.\n\nThat the book is formed of very ancient materials is evident from the last sections, which certainly contain magical texts and pictures specially prepared with the object of making the sun to rise, and there is little doubt that the latter are representations of the ceremonies which the, primitive Egyptians actually, performed to produce that most desirable effect.\n\nThe earlier sections of the Book are, full of magical ideas, but scattered among them are expressions of beliefs which, it seems, must belong to a later period of civilization, and passages which impress the reader p.\n\n25 with the idea that they were composed by men who believed that the righteous would be rewarded and the wicked punished in the world to come.\n\nSpecial prominence is given to the conception of the Judgment, wherein Osiris is the Judge of the dead.\n\nAs the result of this Judgment the righteous have allotments of land meted out to them, which vary in size according to their deserts, and the wicked are slain, and their bodies cut in pieces, and their souls destroyed.\n\nIn many particulars the views of the Book of Gates concerning the future state agree closely with those of the Book of Coming Forth by Day."

