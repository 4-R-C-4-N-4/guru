body = "Sacred Texts Egypt EHH Index Index Previous Next p. xvii CONTENTS CHAP . PAGE I. ORIGIN OF ILLUSTRATED GUIDES TO THE OTHER WORLD p. 1 II. THE EARLIEST EGYPTIAN CONCEPTION OF THE OTHER WORLD p. 27 III. THE REUNION OF THE BEATIFIED AND THEIR RECOGNITION OF EACH OTHER IN THE OTHER WORLD p. 64 APPENDIX:--THE CHAPTER OF THE GATHERING TOGETHER OF A MAN'S ANCESTORS TO HIM IN NETER-KHER p. 75 IV. THE BOOK AM-TUAT AND THE BOOK OF GATES p. 80 V. THE BOOK AM-TUAT AND THE BOOK OF GATES COMPARED--THE WESTERN VESTIBULE OF THE TUAT p. 103 VI. SECOND DIVISION OF THE TUAT p. 111 VII. THIRD DIVISION OF THE TUAT p. 121 VIII. FOURTH AND FIFTH DIVISIONS OF THE TUAT. FROM THE BOOK AM-TUAT p. 131 IX. FOURTH AND FIFTH DIVISIONS OF THE TUAT. FROM THE BOOK OF GATES p. 140 X. SIXTH, SEVENTH, EIGHTH, AND NINTH DIVISIONS OF THE TUAT. FROM THE BOOK AM-TUAT p. 148 p. xviii XI. SIXTH, SEVENTH, AND EIGHTH DIVISIONS OF THE TUAT. FROM THE BOOK OF GATES p. 158 XII. TENTH AND ELEVENTH DIVISIONS OF THE TUAT. FROM THE BOOK AM-TUAT p. 172 XIII. NINTH, TENTH, AND ELEVENTH DIVISIONS OF THE TUAT. FROM THE BOOK OF GATES p. 182 XIV. THE EASTERN VESTIBULE OF THE TUAT p. 192 LIST OF ILLUSTRATIONS. PAGE SCENE FROM THE PAPYRUS OF NEKHT Frontispiece THE SEVEN ARITS AND THEIR WARDERS p. 29 THE TEN GATES AND THEIR WARDERS p. 32 -35 THE FOURTEEN AATS p. 38 -41 SEKHET-HETEP. FROM THE PAPYRUS OF NEBSENI p. 43 SEKHET-HETEP. FROM THE PAPYRUS OF ANI p. 45 SEKHET-HETEP. FROM THE PAPYRUS OF KUA-TEP p. 53 SEKHET-HETEP. FROM THE COFFIN OF SEN p. 55 SEKHET-HETEP. FROM THE PAPYRUS OF ANHAI p. 59 SEKHET-HETEP. FROM THE PAPYRUS OF PTOLEMAÏC PERIOD p. 61 NEKHT SPEARING THE EATER OF THE ASS. p. 113 THE BOAT OF THE EARTH p. 126 THE SERPENT ASHT-HRAU p. 149 NEBSENI BEING WEIGHED AGAINST HIS HEART p. 159 THE SCALES OF OSIRIS, WITH WEIGHTS p. 159 THE JUDGMENT HALL OF OSIRIS p. 161 NEKHT SPEARING THE PIG OF EVIL p. 163 THE APES WORKING THE NET p. 184 Next: Chapter I. Origin of Illustrated Guides to the Other World"

