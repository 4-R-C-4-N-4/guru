body = "Sacred Texts Egypt EHH Index Index Previous Next EIGHTH DIVISION OF THE TUAT.\n\nII.\n\nKINGDOM OF OSIRIS ACCORDING TO THE BOOK OF GATES.\n\nThe Boat of AFU-RA next passes through the Gate of Bekhkhi, which is guarded by the monster serpent p.\n\n169 [paragraph continues] SET-HRA, and is towed over this DIVISION, or HOUR, by the gods of the Tuat.\n\nThe region is a remarkable one, and it certainly forms part of the Kingdom of the Sun-god of ANNU, or Heliopolis.\n\nAt one end of the long Lake, or Pool, which represents the celestial waters of Nu (vol.\n\nii., pp.\n\n225, 226) stands the god \"who dwelleth in Nu,\" and in the Lake itself we see four groups of beings in human forms who are called \"Bathers\" (Herpiu), \"Floaters\" (Akiu), \"Swimmers\" (Nubiu), and \"Divers\" (Khepau).\n\nThe gods who tow the Boat call on the dwellers in this DIVISION to praise the soul of RA, which is in heaven, and his body, which is on earth; for heaven is made young again by his soul, and earth by his body.\n\nThen, addressing the god in the Boat, they declare that they will make his paths straight in AKERT, and that they will make his Boat to pass over the beings who are immersed in the waters of the Lake.\n\nThe god \"who dwelleth in Nu\" then calls upon the beings in the water to pay homage to Ra, and he promises that they shall enjoy breath for their nostrils, and peace in their cisterns of water.\n\nTheir souls, which are upon earth, shall enjoy offerings in abundance and shall never die, and shall be as fully provided with food as is Ra, whose body is on earth, but whose soul is in heaven.\n\nOn the left of the path of AFU-RA are twelve TCHATCHA, or \"Great Chiefs,\" and nine SOULS, who are adoring a god (vol.\n\nii., pp.\n\n227, 231); before each Soul are a loaf of bread and some sekemu herbs.\n\nThe TCHATCHA p.\n\n170 perform a very important duty in this DIVISION, for they distribute to the SOULS who have been ordered by RA, to live by the fiery Lake SERSER the food which has been allotted to them; in other words, they give the SOULS the portion of food which it has been decreed they should receive daily, and no more and no less, and the SOULS receive their destined allowance, and have to be content therewith.\n\nJudging from the texts here and elsewhere in the BOOK OF GATES it seems that there was some power in the Tuat, probably KHENTI-AMENTI, or OSIRIS KHENTI-AMENTI, who decreed that the beings therein should receive a regular, fixed, and unalterable allowance of food-each day, and who appointed ministers, who are here called TCHATCHA, to see that each being received his \"ration,\" without addition, and without diminution.\n\nThe Sun-god in passing through the Tuat confirms the \"ration,\" and orders its continuance to each being therein.\n\nOn the right of the path of AFU-RA is HORUS THE AGED, leaning on a staff, and addressing a company of twelve of the enemies of Osiris (vol.\n\nii., pp.\n\n232-234), who stand with their arms tied together behind their backs in very painful attitudes."

