body = "Sacred Texts Egypt EHH Index Index Previous Next ELEVENTH DIVISION OF THE TUAT.\n\nI.\n\nKINGDOM OF TEMU-KHEPERA-RA ACCORDING TO THE BOOK AM-TUAT.\n\nThe name of this DIVISION, or HOUR, Or CITY, is RE-EN-QERERT-APT-KHATU, i.e., \"Mouth of the Circle which judgeth bodies,\" the name of its Gate is SEKHEN-TUATIU, i.e., \"Embracer of the gods of the Tuat,\" and p.\n\n176 the Hour-goddess is SEBIT-NEBT-UAA-KHESEFET-SEB-EM-PERT-F, i.e., \"Star, lady of the Boat which repulseth Seba at his appearance.\" This DIVISION of the TUAT was very near the Mountain of the Sunrise, from which the newly-born Sun-god would appear soon after day-break, and the knowledge of the gods in it, and of their forms and names, was believed to ensure to its possessor the power to emerge from the Tuat as a spirit equipped for travelling with the Sun-god over the sky.\n\nThe Boat of AFU-RA makes its way through this region, and on looking at it (vol.\n\ni., p.\n\n233) we see on its prow a disk of light encircled by a serpent; the disk is that of the Star PESTU, and it \"guideth this great god into the ways of the darkness which gradually lighteneth, and illumineth those who are on the earth.\" The Boat is now towed by twelve gods, who employ as a rope the immensely long serpent MEHEN, the tail of which is supposed to be fastened to the front of the Boat (vol.\n\ni., p.\n\n235); so soon as they have towed the god to the end of this DIVISION, and he has set himself in the horizon, they return to their own places.\n\nImmediately in front of these gods are two Crowns, the White and the Red (vol.\n\ni., p.\n\n237), which rest each on the back of a uraeus; so soon as AFU-RA comes three human heads look forth, one from each side of the White Crown, and one from the Red Crown, and they disappear when he has passed by.\n\nThe leaders of this remarkable procession are four forms of the goddess NEITH Of Saïs, who spring into life so soon as p.\n\n177 the sound of the voice of AFU-RA is heard; these are Neith the Child, Neith of the White Crown, Neith of the Red Crown, and Neith of the phallus.\n\nThese goddesses \"guard the holy gate of the city of Saïs, which is unknown, and can neither be seen nor looked at.\" On the right of the path of AFU-RA we see the two-headed god APER-HRA-NEB-TCHETTA, with the Crown of the South on one head, and the Crown of the North on the other.\n\nNext come the god TEMU, his body, and his soul, the former in the shape of a serpent with two pairs of human legs and a pair of wings, and the latter in that of a man, with a disk on his head, and his hands stretched out to the wings (vol.\n\ni., p.\n\n242).\n\nIn front of these are the body and soul of the Star-god SHETU, who follows AFU-RA and casts the living ones to him every day.\n\nAll the other deities here represented assist the god in his passage, and help him to arrive on the Horizon of the East."

