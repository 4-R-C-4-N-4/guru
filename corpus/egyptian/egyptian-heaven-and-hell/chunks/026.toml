[content]
body = "This result Thoth announces to the gods in the following words, \"In very truth the heart of Osiris hath been weighed, and his soul hath stood as a witness for him; its case is right (i.e., it hath been found true by trial) in the Great Balance.\n\nNo wickedness hath been found in him, he hath not purloined the offerings in the p.\n\n51 temples, 1 and he hath done no evil by deed or word whilst he was upon earth.\" The gods in their reply accept Thoth's report, and declare that, so far as they are concerned, Ani has committed neither sin nor evil.\n\nFurther, they go on to say that he shall not be delivered over to the monster Amemet, and they order that he shall have offerings, that he shall have the power to go into the presence of Osiris, and that he shall have a homestead, or allotment, in Sekhet-hetepet for ever.\n\nWe next see Ani being led into the presence of Osiris by Horus, the son of Isis, who reports that the heart of Ani hath sinned against no god or goddess; as it hath also been found just and righteous according to the written laws of the gods, he asks that Ani may have cakes and ale given to him, and the power to appear before Osiris, and that he may take his place among the \"Followers of Horus,\" and be like them for ever.\n\nNow from this evidence it is clear that Ani was considered to have merited his reward in Sekhet-hetepet by the righteousness and integrity of his life upon earth as regards his fellow-man, and by the reverence and worship which he paid to every god and every goddess; in other words, it is made to appear that he had earned his reward, or had justified himself by his works.\n\nBecause his heart had emerged p.\n\n52 triumphantly from its trial the gods decreed for him the right to appear in the presence of the god Osiris, and ordered him to be provided with a homestead in Sekhet-hetep.\n\nThere is no mention of any repentance on Ani's part for wrong done; indeed, he says definitely, \"There is no sin in my body.\n\nI have not uttered wittingly that which is untrue, and I have committed no act having a double motive [in my mind].\" As he was troubled by no remembrance of sin, his conscience was clear, and he expected to receive his reward, not as an act of mercy on the part of the gods, but as an act of justice.\n\nThus it would seem that repentance played no part in the religion of the primitive inhabitants of Egypt, and that a man atoned for his misdeeds by the giving of offerings, by sacrifice, and by worship.\n\nOn the other hand, Nebseni is made to say to the god of Sekhet-hetep, \"Let me be rewarded with thy fields, O Hetep; but do thou according to thy will, O lord of the winds.\" This petition reveals a frame of mind which recognizes submissively the omnipotence of the god's will, and the words \"do thou according to thy will\" are no doubt the equivalent of those which men of all nations and in every age have prayed--\"Thy will be done.\" The descriptions of the pictures of Sekhet-hetep given above make it evident that the views expressed in the Papyrus of Nebseni differ in some important details from those which we find in the Papyrus of Ani, but whether this difference is due to some general p.\n\n53 Click to view Sekhet-hetepet, showing the Sekhet-Aaru, with the magical boat and flight of steps, the birthplace of the gods, &c.\n\n(From the inner coffin of Kua-tep, British Museum, No."

