[content]
body = "The net result of the facts stated in the last two paragraphs proves that Seti I.\n\nrelied for salvation upon the protection, part magical and part religious, afforded by the sacred writings of two great schools of religious thought, the leaders of which in his day preached opposing and contradictory doctrines.\n\nIt may be argued that by filling the walls of his tomb and sarcophagus with the texts of such books he was merely acting from the point of view of religious expediency, wishing to indicate his impartiality in respect of the followers of Amen and the followers of Osiris, and his respect for the ancient traditional beliefs, however material, crude, and impossible they may have appeared to him personally.\n\nThis, however, is unlikely to have been the case, and it is far more probable that he believed every religious or funeral text to have its own special value as a means of p.\n\n26 salvation, and that he selected for inscribing on the walls of his tomb and sarcophagus those which he thought would bc the most likely to secure for him in the next world an existence which would be at once happy and everlasting.\n\nTherefore Seti I.\n\nprovided himself with amulets, ushabtiu figures, magical formulae, pictures of gods and fiends to be used in working sympathetic magic, religious formulae and copies of hymns and funeral works, an inscribed tomb and sarcophagus, &c.; in fact, he was painfully anxious to omit nothing from the inscriptions in his tomb which would propitiate any god, or appease the wrath and turn aside the opposition of any of the fiends wherewith he had filled his Underworld.\n\nFootnotes 8:1 See a letter in the Times of June 22nd, 1905 (p.\n\n4), on the \"Most Ancient Temple at Thebes,\" by Prof.\n\nE.\n\nNaville and Mr.\n\nIf.\n\nR.\n\nHall.\n\n11:1 See Birch, Ancient Egyptian Texts front the Coffin of Amamu in the British Museum , London, 1886.\n\n12:1 Schack-Schackenburg, Das Buch von den Zwei Wegen des Seligen Toten , Leipzig, 1903.\n\n13:1 See page 49, l.\n\n9-p.\n\n51, l.\n\n11.\n\n13:2 See page 49, ll.\n\n4-9.\n\n17:1 See Maspero's Recueil de Travaux , tom.\n\nxxvii., p.\n\n67.\n\n17:2 According to M.\n\nLegrain, the IIIrd Dynasty ( Recueil , tom.\n\nxxvii., p.\n\n67).\n\n23:1 See within, Chapter IV., p.\n\n85 .\n\nNext: Chapter II.\n\nThe Earliest Egyptian Conception of the Other World."

