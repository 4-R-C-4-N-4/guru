[content]
body = "It is tolerably certain that the form in which they depicted it is much shorter than that in which it existed originally, and that the attributes and duties of many of the gods have been changed to suit the necessities of the cults of Osiris and Amen-Ra.\n\nSuch changes have resulted in great confusion, and at the present time it is impossible p.\n\n139 to reduce these most interesting, but at the same time most difficult, scenes and texts to their original forms.\n\nThe priests of Amen-Ra found it to be impossible to ignore entirely SEKER and his Land, when they were depicting the various Underworlds of Egypt, but it is very suggestive that they make the path of AFU-RA to be over and not through his kingdom, and that AFU-RA had to go on his way without entering the pyramid beneath which reposed the IMAGE of SEKER in the deepest darkness of night, in fact without seeing SEKER at all.\n\nOn the other hand, they attached the greatest importance to the knowledge of the pictures of the FOURTH and FIFTH DIVISIONS, and they believed that it would enable the body of a man to rejoin his soul, and prevent the goddess KHEMIT, from hacking it in pieces, and would secure for the believer a share of the offerings made to Seker.\n\nNext: Chapter IX.\n\nFourth Division of the Tuat.\n\nII.\n\nThe Kingdom of Khenti-Amenti-Osiris According to the Book Of Gates"

