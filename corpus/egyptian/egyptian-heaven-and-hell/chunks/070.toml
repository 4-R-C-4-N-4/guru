body = "Sacred Texts Egypt EHH Index Index Previous Next p.\n\n148 CHAPTER X.\n\nSIXTH DIVISION OF THE TUAT.\n\nI.\n\nKINGDOM OF OSIRIS ACCORDING TO THE BOOK AM-TUAT.\n\nTHIS DIVISION, or HOUR, is the first of four which are devoted to the Kingdom of Osiris; its name is METCHET-MU-NEBT-TUAT, its Gate is called SEPT-METU, and the Hour-goddess is MESPERIT-AR-AT-MAATU.\n\nHere we see at once that the god AFU-RA has re-entered his boat, and that he has discarded the serpent-boat in which he travelled through the Land of Seker; the boat advances by means of paddling and not by towing.\n\nThe greater part of the road of AFU-RA in this DIVISION is occupied by a very long building--or series of houses, or chambers, set close together--which contains the forms of Osiris.\n\nHere are four representatives of each of four classes of beings, viz., the SUTENIU, or kings of Upper Egypt, the BATIU, or kings of Lower Egypt, the HETEPTIU, or those who have been abundantly supplied with offerings, and the KHU, or spirits of the beatified dead.\n\nThus it seems that the first mansion of the House of Osiris contains royal folk, the rich, and the superlatively good (vol.\n\ni., p.\n\n117-120); as AFU-RA passes these by he p.\n\n149 salutes them, and wishes them an abundant supply of offerings, and entreats them to hack APEP in pieces for him.\n\nImmediately beyond these we see represented the transformation of AFU-RA into the living Sun-god.\n\nHere is the five-headed serpent ASHT-HRAU, and on his back lies the dead Sun-god; with his right hand, which is raised above his head, he is drawing to himself the Beetle of KHEPERA, which is the type of regeneration, Click to view The Serpent Asht-hrau .\n\nor new birth, or resurrection.\n\nThis is the equivalent of the scene in the BOOK AIM-TUAT where the Beetle descends from the vault of night, and joining itself to the Boat of AFU-RA revivifies the dead Sun-god (see vol.\n\ni., p.\n\n103).\n\nThat this revivification of AM-RA should take place at the end of the SIXTH DIVISION is quite correct, for at this point the god arrives at the most northerly limit of his course.\n\nHe has travelled due north from Thebes and Abydos, and has occupied p.\n\n150 six hours in performing the journey; he must now alter his course and travel towards the East so that he may appear at BAKHAU, the Mountain of Sunrise.\n\nThe path over which he now journeys is called the \"secret path of Amentet,\" and he who knoweth it, and the names of those who are on it, and their forms, shall partake of the offerings made to the gods of Osiris, and receive the gifts which his relatives ( abt 1 ) shall make upon earth.\n\nOn the right of AFU-RA are a company of gods and goddesses, and a group of sceptres surmounted by crowns and uraei, and provided with knives; these are the beings who hold and cultivate the territory in this DIVISION, or HOUR, and minister to the wants of the followers of Osiris.\n\nBeyond these we have a lion, the two Eyes of Horus, three deities, and three small sepulchres,, into each of which, through an opening under the roof, a serpent is belching fire (vol.\n\ni., pp.\n\n124-130)."

