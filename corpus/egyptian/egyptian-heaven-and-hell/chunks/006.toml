[content]
body = "xiv [paragraph continues] Egyptians believed in the reconstitution of family life in the Other World, and thought that every man, and woman, and child would possess such a measure of individuality that they would know their relatives and friends in the Other World, and would be known by them (see within, Chapter III).\n\nThe first translation of the BOOK AM-TUAT was published by Prof.\n\nG.\n\nMaspero in the Revue des Religions , 1888, tom.\n\nxvii., pp.\n\n251-310; tom.\n\nxviii., pp.\n\n1-67.\n\nThis has been reprinted, with certain modifications and additions, in his Bibliothèque Égyptologique , tom.\n\nii., pp.\n\n1-181, Paris, 1893.\n\nThe text chosen by him for elucidation was that published by M.\n\nG.\n\nLefébure in his edition of the tomb of Seti I., and this he supplemented with extracts from other versions of the work given on sarcophagi, papyri, etc.\n\nThe \"Summary,\" or Short Form of AM-TUAT, was first published in a complete form, with variant readings, by M.\n\nG.\n\nJéquier (see his Le Livre de ce qu'il y a dans l'Hades , Paris, 1894).\n\nIn Prof.\n\nMaspero's work mentioned above he also discussed and analysed the earlier sections of the BOOK OF GATES, of which M.\n\nE.\n\nLefébure published a translation of the texts, as found on the sarcophagus of Seti I., in the Records of the Past, vol.\n\nx., pp.\n\n79-134, London, 1878, and vol.\n\nxii., pp.\n\n1-35, London, 1881.\n\nIn preparing the present edition of the two great Books of the Other World I have availed myself of these works, and also of the valuable editions of the texts from the royal tombs at Thebes, p.\n\nxv which M.\n\nE.\n\nLefébure has published in the first and second fasciculi of the third volume of the Mémoires de la Mission Archéologique Française au Caire , Paris, 1889.\n\nE.\n\nA.\n\nWALLIS BUDGE.\n\nLONDON, October , 1905.\n\nNext: Contents"

