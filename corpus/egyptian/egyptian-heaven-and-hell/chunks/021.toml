body = "NAST-TAUI-SI-SEKSEKET-NEMMATU-EM-NEHEPU-QAHIT-NEBT-KHU-SETEMTH-KHERU-NEB-S.\n\nXIII.\n\nGate .\n\nSTA-EN-ASAR-AAUI-F-HER-S-SEHETCHET-HAP-EM-AMENT-F.\n\nXIV.\n\nGate .\n\nNEBT-TENTEN-KHEBT-HER-TESHERU-ARU-NES-HAKER-HRU-EN-SETEMET-AU.\n\nXV.\n\nGate .\n\nBATI-TESHERU-QEMHUT-AARERT-PERT-EM-KERH-SENTCHERT-SEBA-HER-QABI-F-ERTAT-AAUI-S-EN-URTU-AB-EM-AT-F-ART-ITET-SHEM-S.\n\nXVI.\n\nGate .\n\nNERUTET-NEBT-AATET-KHAA-KHAU-EM-BA-EN-RETH-KHEBSU-MIT-EN-RETH-SERT-PER-QEMAMET-SHAT.\n\nXVII.\n\nGate .\n\nKHEBT-HER-SENF-AHBIT-NEBT-UAUIUAIT.\n\nXVIII.\n\nGate .\n\nMER-SETAU-AB-ABTU-MERER-S-SHAT-TEPU-AMKHIT-NEBT-AHA-UHSET-SEBAU-EM-MASHERU.\n\nXIX.\n\nGate .\n\nSERT-NEHEPU-EM-AHA-S-URSH-SHEMMET-NEBT-USERU-ANU-EN-TEHUTI-TCHESEF.\n\nXX.\n\nGate .\n\nAMT-KHEN-TEPEH-NEB-S-HEBS-REN-S-AMENT-QEMAMU-S-THETET-HATI-EN-AM-S.\n\nXXI.\n\nGate .\n\nTEM-SIA-ER-METUU-ARI-HEMEN-HAI-NEBAU-S.\n\nFrom the above lists, and from copies of them which are found in the Papyrus of Ani, and other p.\n\n37 finely illustrated Books of the Dead, it is quite clear that, according to one view, Sekhet-Aaru, the land of the blessed, was divided into seven sections, each of which was entered through a Gate having three attendants, and that, according to other traditions, it had sections varying in number from ten to twenty-one, for each of the Gates mentioned above must have been intended to protect a division.\n\nIt will be noted that the names of the Ten Gates are in reality long sentences, which make sense and can be translated, but there is little doubt that under the XVIIIth Dynasty these sentences were used as purely magical formulae, or words of power, which, provided the deceased knew how to pronounce them, there was no great need to understand.\n\nIn other words, it was not any goodness or virtue of his own which would enable him to pass through the Gates of Sekhet-Aaru, and disarm the opposition of their warders, but the knowledge of certain formulæ, or words of power, and magical names.\n\nWe are thus taken back to a very remote period by these ideas, and to a time when the conceptions as to the abode of the blessed were of a purely magical character; the addition of pictures to the formulae, or names, belongs to a later period, when it was thought right to strengthen them by illustrations.\n\nThe deceased, who not only possessed the secret name of a god or demon, but also a picture of him whereby he could easily recognize him when he met him, was doubly armed against danger.\n\np."

