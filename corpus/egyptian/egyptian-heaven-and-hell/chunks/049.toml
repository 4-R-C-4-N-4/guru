body = "Sacred Texts Egypt EHH Index Index Previous Next p.\n\n111 CHAPTER VI.\n\nSECOND DIVISION OF THE TUAT.\n\nI.\n\nTHE KINGDOM OF KHENTI-AMENTI-OSIRIS ACCORDING TO THE BOOK AM-TUAT.\n\nTHE god AFU-Ra now enters the region URNES which derives its name from that of the river flowing through it; it is 309, or 480 atru or leagues in length, and 120 wide.\n\nURNES is a portion of the dominions of OSIRIS-KHENTI-AMENTI, the great god of Abydos, and it, no doubt, formed a section of the SEKHET-HETEPET according to the old theology of Egypt.\n\nThe Boat Of AFU-Ra is now under the direction of the goddess of the second hour of the night, SHESAT-MAKET-NEB-S, and the uraei of Isis and Nephthys have been added to its crew.\n\nImmediately in front of it are four boats, which move by themselves; the first contains the full moon, of which Osiris was a form, the second the emblem of a deity of harvest, the third the symbols of another agricultural deity, and the fourth the Grain-god personified.\n\nAll four boats contain either forms or symbols of Osiris, in his different aspects, as the god of ploughing, sowing, and reaping, and of the p.\n\n112 grain from the time when it germinates to the season of harvest.\n\nWhen AFU-RA has come into URNES, he addresses the gods of the region, who are called \"BAIU-TUATIU,\" and tells them to open their doors so that they may receive air, and fresh food, and fresh water, in return for the deeds of valour which they have done on behalf of AFU-RA.\n\nIt seems that at one portion of this Division the followers of Osiris and RA had to do battle against Apep and his friends, and that in return for their services the god gave them places here in which to dwell, with an abundance of wheat and barley, etc.\n\nThe gods in reply welcome AFU-RA, and beg him to dissipate the darkness in Amenti, and to slay the serpents HAU and NEHA-HRA (vol.\n\ni., p.\n\n40); they promise that those who guide his boat shall destroy APEP, that Osiris shall come to meet him and shall avenge him, and that he shall rest in Ament, and shall appear in the East the following morning under the form of KHEPERA.\n\nAfter this speech they lead AFU-RA into a state of peace in SEKHET-EN-PERTIU, the \"Field of the Gods of grain,\" wherein are the boats of the Grain-gods already described.\n\nIn this fair haven AM-RA rests, and every follower of Osiris hoped to follow his example.\n\nIf we consider for a moment the group of divine beings which stands on each bank of the river URNES it becomes evident that each god or goddess belongs to p.\n\n113 the company of Osiris.\n\nTo the right of the boat stand six gods, who either hold or wear an ear of corn and are connected with the growth of the grain (vol.\n\ni., p.\n\n31), gods armed with knives, and connected with the harvest, gods of the seasons, each holding a notched palm-stick, the god of the year, the gods of SOTHIS and ORION (vol.\n\ni., p.\n\n32) Osiris-Unnefer, Akhabit, Anubis, the \"Eater of the Ass,\" 1 etc.\n\nTo the left of the Boat are six deities, each with a phallus in the form of a knife, the double god HORUS-SET (Vol."

