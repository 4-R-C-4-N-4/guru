[content]
body = "Sacred Texts Egypt EHH Index Index Previous Next p.\n\n121 CHAPTER VII.\n\nTHIRD DIVISION OF THE TUAT.\n\nI.\n\nTHE KINGDOM OF KHENTI-AMENTI-OSIRIS, ACCORDING TO THE BOOK AM-TUAT.\n\nTHE Boat of AFU-RA, leaving the abode of the SOULS OF THE TUAT, now enters that of the BAIU-SHETAIU, or the \"SECRET SOULS,\" and we find that a change has taken place as regards the crew.\n\nThe goddess of the hour called TENT-BAIU has taken charge of the Boat, a hawk-headed god acts as steersman, and the number of the other gods is reduced to four.\n\nThe region now entered by Afu-Ra is called NET-NEB-UA-KHEPER-AUT, and it is 309 (or 480) atru or leagues in length, and 120 in width; it is, in fact, a continuation of the domains of Osiris, and in it is the House of Tet wherein the great god of the dead himself dwells.\n\nThe Boat of AFU-RA is preceded by three boats (vol.\n\ni., pp.\n\n45-47) of a mystical character, containing hawk-gods, and mummied forms of gods who are akin to Osiris.\n\nFacing the boats are four forms of Osiris, with their arms and hands covered.\n\nHaving arrived in this Division, AFU-RA cries out to its god, Osiris, who straightway creates these secret boats and sends them p.\n\n122 to bring AFU-RA to the place where he is.\n\nThe abode of Osiris is situated on the NET-ASAR i.e., the \"Stream of Osiris,\" a name given to the river of the Tuat in the THIRD DIVISION, and it is at the head of this river that the throne of Osiris rests according to some copies of the Theban Recension of the Book of the Dead.\n\nThe inhabitants who are seen on both banks of the stream are called PERTIU, and they live on lands which have been allotted to them by Afu-Ra; in return for these they serve Osiris and defend him from the attacks of all his enemies.\n\nAs the boat in which AFU-RA stands and the three other boats move on, the gods on the banks move with them and guard them, and when they have escorted the great god to the end of their territory, they return to their old places and await his coming on the following night.\n\nOn the right of AFU-RA are twenty-six gods, and of these eight are forms of Osiris, four of Osiris of the North, and four of Osiris of the South; all are under the rule of KHETRA, who is the \"Warder of this Field\" (vol.\n\ni., p.\n\n60), but it is only when they hear the words of AFU-RA that they come to life.\n\nThe work which they do in this region is to hew and hack souls in pieces, to imprison the shadows of the dead, and to carry out the sentence of death on those who are doomed to destruction in a place of fire; they cause fires to come into being, and flames to burst forth on the wicked.\n\np.\n\n123 [paragraph continues] Now in this case also the beings who are doomed to be burned in a place specially set apart for this purpose cannot be of the number of the gods who protect Osiris, for they were created by Ra to serve this god in this Division of the Tuat, and to attend upon himself as he made his journey through it each day!"

