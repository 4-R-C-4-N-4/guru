body = "p.\n\n308 p.\n\n309 VÂ G ASANEYI-SA M HITÂ-UPANISHAD, SOMETIMES CALLED Î S ÂVÂSYA OR Î S Â-UPANISHAD p.\n\n310 p.\n\n311 VÂ G ASANEYI-SA M HITÂ-UPANISHAD.\n\n1.\n\nALL this, whatsoever moves on earth, is to be hidden in the Lord (the Self).\n\nWhen thou hast surrendered all this, then thou mayest enjoy.\n\nDo not covet the wealth of any man!\n\n2.\n\nThough a man may wish to live a hundred years, performing works, it will be thus with him; but not in any other way: work will thus not cling to a man.\n\n3.\n\nThere are the worlds of the Asuras 1 covered with blind darkness.\n\nThose who have destroyed their self (who perform works, without having arrived at a knowledge of the true Self ), go after death to those worlds.\n\n4.\n\nThat one (the Self), though never stirring, is swifter than thought.\n\nThe Devas (senses) never reached it, it walked 2 before them.\n\nThough standing still, it overtakes the others who are running.\n\nMâtarisvan (the wind, the moving spirit) bestows powers 3 on it.\n\np.\n\n312 5.\n\nIt stirs and it stirs not; it is far, and likewise near 1 .\n\nIt is inside of all this, and it is outside of all this.\n\n6.\n\nAnd he who beholds all beings in the Self, and the Self in all beings, he never turns away from it 2 .\n\n7.\n\nWhen to a man who understands, the Self has become all things, what sorrow, what trouble can there be to him who once beheld that unity?\n\n8.\n\nHe 3 (the Self) encircled all, bright, incorporeal, scatheless, without muscles, pure, untouched by evil; a seer, wise, omnipresent, self-existent, he disposed all things rightly for eternal years.\n\n9.\n\nAll who worship what is not real knowledge (good works), enter into blind darkness: those who delight in real knowledge, enter, as it were, into greater darkness.\n\n10.\n\nOne thing, they say, is obtained from real knowledge; another, they say, from what is not knowledge.\n\nThus we have heard from the wise who taught us this 4 .\n\n11.\n\nHe who knows at the same time both knowledge and not-knowledge, overcomes death through not-knowledge, and obtains immortality through knowledge.\n\n12.\n\nAll who worship what is not the true cause, p.\n\n313 enter into blind darkness: those who delight in the true cause, enter, as it were, into greater darkness.\n\n13.\n\nOne thing, they say, is obtained from (knowledge of) the cause; another, they say, from (knowledge of) what is not the cause.\n\nThus we have heard from the wise who taught us this.\n\n14.\n\nHe who knows at the same time both the cause and the destruction (the perishable body), overcomes death by destruction (the perishable body), and obtains immortality through (knowledge of ) the true cause.\n\n15.\n\nThe door of the True is covered with a golden disk 1 .\n\nOpen that, O Pûshan, that we may see the nature of the True 2 .\n\n16.\n\nO Pûshan, only seer, Yama (judge), Sûrya (sun), son of Pra g âpati, spread thy rays and gather them!\n\nThe light which is thy fairest form, I see it.\n\nI am what He is (viz.\n\nthe person in the sun) 3 .\n\n17.\n\nBreath 4 to air, and to the immortal!\n\nThen this my body ends in ashes.\n\nOm!\n\nMind, remember!\n\nRemember thy deeds!\n\nMind, remember!"

