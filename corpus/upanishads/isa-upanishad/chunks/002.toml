[content]
body = "Remember thy deeds 5 !\n\n18.\n\nAgni, lead us on to wealth (beatitude) by a good path, thou, O God, who knowest all things!\n\np.\n\n314 [paragraph continues] Keep far from us crooked evil, and we shall offer thee the fullest praise!\n\n(Rv.\n\nI, 189, 1.)"

