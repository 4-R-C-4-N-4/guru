[content]
body = "And I shall answer that I may say to them, I know not you who ye are, those who work the unlawfulness with the evil, even until now.\n\nBecause of this go unto the Darkness which is outer.\n\nAnd in that hour they will go unto the Darkness which is outer, the Place in which is the weeping with the gnashing of 160 the teeth.\n\nBecause of this therefore preach to all the World, say unto them: Strive, renounce all the World with all the matter which is in it, and receive the mysteries of the Light, before that was completed the number of the perfect souls, that they should not put you at the door of the gate of the Light, and betake you unto the Darkness which is outer.\n\nNow therefore he who hath ear to hear, let him hear.\n\nThese therefore having said them the Saviour, sprang up also forward [287 ] Maria, said she, My Lord not only (is it) that hath ear my Light-dweller, but heard my soul and understood every word which thou sayest.\n\nNow therefore, my Lord, concerning the words which thou saidst, Preach to the men of the World say unto them, Strive, receive the mysteries of the Light in this time which is troublous, that ye should inherit the kingdom of the Light.\n\nAdded also Maria, said she to Jesus, My Lord, then the Darkness which is outer of what type is it being, or otherwise rather, there are how many Places of punishment in it?\n\nBut answered Jesus, said he to Maria, The Darkness which is outer is a great dragon, with his tail within his mouth, being outside all the World and going round all the World with a multitude of places of judgment within it, being of twelve [287 ] chambers of the punishments cruel, with a Ruler in every chamber (the chamber the chamber, MS ) with the faces of the Rulers different from one another.\n\nBut the first Ruler who becometh in the first (hath) a face of crocodile, with his tail within his mouth: with all ice coming out of his mouth of the dragon, with at every time with all cold with all sicknesses which are various, this (one) they are wont to call his original name in his Place, Enkhthonin: and the Ruler who becometh in the second chamber, a face of cat is his original face.\n\nThis they are wont to call him in their Place Kharakhar.\n\nAnd the Ruler who becometh in the third chamber, a face of a dog is his original face.\n\nThis they are wont to call him in their Place, Arkharokh.\n\n[288 ] And the Ruler who becometh in the fourth chamber, a face of snake is his original face, this (one) they are wont to call him in their Place, Akhrokhar.\n\nAnd the Ruler who becometh in the fifth chamber, a face of black calf is his original face, this (one) they are wont to call him in their Place, Markhour.\n\nAnd the Ruler who becometh in the sixth chamber, a face of sow of mountain is his original face, this (one) they call him in their Place, Lamkhamor.\n\nAnd the Ruler of the seventh chamber, a face of bear is his original face, this (one) they are wont to call him in his original name in their Place, Lukhar.\n\nAnd the Ruler of the eighth chamber a face of a 161 gryphus is his original face, this (one) they are wont to call his name in their Place, Laraokh.\n\nAnd the Ruler of the ninth [288 ] chamber a face of a basilisk is his original face, this (one) they are wont to call his name in their Place, Arkheokh."

