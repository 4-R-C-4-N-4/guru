[content]
body = "Now therefore whenever should become completed the time of that man, at first indeed is wont to come out the Fate and lead the man [260 ] in unto the death by the Rulers with their bonds, these in which they were bound by the Destiny: and afterwards are wont to come the Contentious Receivers, and bring that soul out of the body, and afterwards are wont the Contentious Receivers they are wont to spend three days going about with that soul in all the Places, sending it unto all the Aeons of the World: (while) followeth after that soul the counterfeit spirit with the Fate, and is wont the power to withdraw (close) to the Virgin of the Light.\n\nAnd after the three days are wont the Contentious Receivers they are wont to bring that soul down down unto Amente of the Chaos.\n\nAnd whenever they should bring her down unto the Chaos they are wont to deliver her to those who punish.\n\nAnd are wont the [260 ] Receivers to 143 withdraw unto their Places according to the arrangement of the works of the Rulers, because of the coming out of the souls.\n\nAnd is wont the counterfeit spirit, it is wont to become Receiver of the soul, allotting her, convicting her according to the punishment, because of the sins which it caused her to do.\n\nAnd it is wont to become in a great enmity towards the soul, and whenever the soul should complete the punishments in the Chaoses according to the sins which she did, is wont the counterfeit to bring her up from the Chaoses allotting her, convicting her from Place to Place because of the sins which she did.\n\nAnd is wont to bring her out on the road of the Rulers of the Middle.\n\nAnd whenever he should reach them, they are wont to seek from her the mysteries of the Fate.\n\nAnd if she did not find them, they are wont to seek from their Fate.\n\nAnd are wont those Rulers, they are wont to punish that soul [261 ] according to the sins for which she is worthy (to be punished).\n\nThese I shall say unto you, viz.: the type of their punishment in the Distribution of the Universe.\n\nWhenever therefore it should happen, whenever should be completed the time of the punishment of that soul in the judgments of the Rulers of the Middle, is wont the counterfeit spirit, it is wont to bring the soul up from all the Places of the Rulers of the Middle, it is wont to take her up before the light of the sun according to the commandment of the first man Ieou: and it is wont to take her (close) to the judge the Virgin of the Light.\n\nShe is wont to prove that soul, and find it being a sinful soul.\n\nAnd she is wont to cast her power of light in unto her, because of setting up the soul and the body and the sharing of the perception.\n\nThese I shall say, viz.: their type, unto you in the Distribution of the Universe.\n\n[261 ] And is wont the Virgin of the Light, she is wont to seal that soul and lay her on one of her Receivers, and causeth them to cast her (him, MS ) into a body worthy of the sins which she did: and Amen I say unto you that she shall not release that soul from the changes of the body, having not given her last cycle (of changes) according to the (things) which are worthy (for her).\n\nThese all therefore I shall say their type unto you with the type of the bodies unto which they shall cast them according to the sins of every soul, these I shall say unto you all (of them), whenever I should finish saying to you the Distribution of the Universe."

