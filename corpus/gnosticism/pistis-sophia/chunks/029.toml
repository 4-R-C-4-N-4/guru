[content]
body = "But answered Philippos, said he to Jesus, My Lord, hear that I may say the explanation of her repentance: for thy Power prophesied concerning it by David once saying in the eighty-seventh [67 ] psalm; O Lord God of my salvation I cried up unto thee in the day with the night: let my prayer come in to thy presence.\n\nIncline thine ear, O Lord, unto my supplication, because my soul was filled with evil, my life draweth near into Amente, they numbered me with those who are going down unto the pit.\n\nI became as a man who hath not helper: free among those who are dead as wounded (ones), being cast (away) sleeping in the tombs, these whom 37 thou rememberedst not any more, and they, they perished out of thy hands.\n\nThey put me in a pit below, in darkness with the shade of the death thy wrath was firm upon me, and all thy cares came upon me.\n\nDiapsalma.\n\nThou causedst those who know me to be distant from me, thou lettest me be to them for abomination: [68 ] they left me and I went not (away).\n\nMine eye is weak out of my poverty: I cried up unto thee O Lord, all the day.\n\nI spread my hands up unto thee.\n\nWilt thou make thy wonder in those who are dead?\n\nAre not the physicians those who will arise and confess to thee?\n\nWill they be saying thy name in the tombs and thy righteousness in a land which thou forgottest?\n\nBut I cried up unto thee, O Lord, and my prayer will catch thee at the hour of early (day).\n\nTurn not thy face away from me because I am poor; beg in tribulations since my youth.\n\nBut having been exalted, I humbled myself and I arose.\n\nThine angers came upon me, and thy fears disturbed me.\n\nThey surrounded me as water, they laid hold on me all the day: they caused my fellows to be distant from me, and those who [68 ] know me, away from my misery.\n\nThis therefore is the explanation of the mystery of the fifth repentance which said the Pistis Sophia, they having afflicted her in the Chaos.\n\nIt happened therefore, Jesus having heard these words, saying them Philippos, said he, Well (done) Philippos the beloved.\n\nNow therefore come, sit (down) and write thy part of every word which I shall say, and with the things which I shall do, with everything which thou wilt see.\n\nAnd at that hour sat down Philippos, he wrote.\n\nIt happened also after these (things), Jesus added also in the word, said he to his disciples, Then cried up unto the Light the Pistis Sophia.\n\nIt forgave her sin, because she forsook her Place, she came down unto the darkness, she said the [69 ] sixth Repentance, saying thus, I hymned up unto thee, O Light, in the darkness below: hear my repentance, and let thy light take heed unto the shout of my prayer.\n\nO Light, if thou shouldest remember my sin I shall not be able to come toward thee, and thou wilt forsake me: because thou, O Light, art my deliverer, because of the light of thy name.\n\nI believed thee, O Light, and my power believed thy mystery, and also my power trusted unto the light which becometh in the (things) of the Height, and it trusted unto him, being in the Chaos below.\n\nLet every power which (is) in me trust unto the Light while I am in the darkness below."

