[content]
body = "And if that soul received her number of cycles, is wont the Virgin of the Light, she is wont to prove her, she is not wont to let them punish her, because that she received the number of cycle: but she is wont to deliver her unto the seven Virgins of the Light.\n\nAnd are wont the seven Virgins of the Light, they are wont to prove that soul, and they are wont to baptise her with their baptisms, and give to her the spiritual chrism, and take her unto the Treasury of the Light, and put her in the last array of the Light, until the catching up of all the perfect souls.\n\nAnd whenever they should prepare for drawing away 165 the veils [295 ] of the Place of those on the Right (hand), they are wont to purify that soul again and cleanse her and put her in the arrays of the first Saviour, he who (is) in the Treasury of the Light.\n\nIt happened therefore, the Saviour having finished saying these words unto his disciples, answered Mariham, said she to Jesus, My Lord, I heard thee saying, He who will receive the mysteries of the Ineffable, or he who will receive the mysteries of the First Mystery, they are wont to make beams of light with effluence of light, and pass through every Place, even until they go unto the Place of their inheritance.\n\nAnswered the Saviour, said he to Maria, Whenever they should receive the mystery yet being alive, and whenever they should come out of body, they are wont to make beams of light with effluence of light and pass [295 ] through every Place, even until they go unto the Place of their inheritance.\n\nBut if being sinners indeed, having come out of the body, having not repented, and ye make for them the mystery of the Ineffable, that they should remove them out of all the punishments, and cast them unto a righteous body, that he may inherit the kingdom of the Light, or otherwise indeed they should take him unto the last array of the Light, they are not wont to be able to prevail to pass through the Places, because they are not those who make the mystery: but are wont the Receivers of Melkhisedek, they are wont to come after them and take them (close) to the Virgin of the Light, and a multitude of times are wont the Ministers of the Judges of the Rulers, they are wont to hasten and take those souls, and deliver them unto one (to) another, even until [296 ] they take her (close) to the Virgin of the Light.\n\nAdded also Maria, said she to the Saviour, My Lord, then a man who received the mysteries of the Light, those which (are) in the first Space reckoning from without, and having been completed the time of the mysteries up to which they extend, and that man added not again to receive mystery in the mysteries which are toward the interior of the mysteries which he finished receiving, and also was negligent that man, having not prayed the prayer which is wont to take away the wickedness of the meats which he eateth with those which he drinketh, and through the wickedness of the meats they bound him in unto the Pole of the Destiny of the Rulers, and by the compulsion of the elements he did sin again after the completion [296 ] of the time up to which the mystery extendeth, because he was negligent, having not prayed in the prayer, this which is wont to take away the wickedness of the souls, and to cleanse them."

