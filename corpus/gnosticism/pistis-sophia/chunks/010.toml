[content]
body = "And the Adamas the great Tyrant with all the Tyrants who become in all the Aeons began to war without cause against the light and they knew not [24 ] with whom they are warring, because that they were not seeing anyone except the light which surpassed greatly.\n\nIt happened therefore, they having warred against the light, they all burned one with another and fell down in the Aeons, they became as the earth-beings who are dead, no breath being in them.\n\nAnd I took away a third part of all their powers, that they should not work in their evil doings, and that whenever the men who (are) in the World should invoke them in their mysteries, these who brought them down even 13 the Angels who transgressed—these which were their magic, that therefore whenever they should invoke them in their evil doings, they should not be able to accomplish them: and the Destiny with the Sphere which is lord unto them I removed, [24 ] and I caused them to spend six months turned to the Left (hand) and they fulfilling their influences, and six months, looking to the Right (hand) fulfilling their influences: but (it was) through the command of the First precept, and through the command of the First Mystery, Ieou the overseer of the light, put them looking to the left every hour fulfilling their influences and with their doings.\n\nIt happened therefore, I having come unto their place, they were refractory and they warred against the light: I took away the third part of their power, that they should not be able to prevail in fulfilling their evil doings; and the Destiny with the Sphere [25 ] which is lord unto them I removed, and I put them looking to the Left for six months, fulfilling their influences, and I put them for six other months turned to the Right, fulfilling their influences.\n\nThese therefore having said unto his disciples, said he to them, He who hath ear to hear let him hear.\n\nIt happened therefore, Mariham having heard these words, saying them the Saviour, she gazed in the air for the time of an hour.\n\nSaid she, My Lord command to me that I may speak in boldness.\n\nAnswered Jesus the merciful, said he to Mariham, Mariham the happy, this whom I shall complete in all the mysteries [25 ] of the (things) of the Height.\n\nSpeak in boldness, because thou art she whose heart straineth toward the Kingdom of the heavens more than all thy brothers.\n\nThen said she, Mariham to the Saviour, My Lord, the word which thou saidst to us, He who hath ear to hear let him hear, art thou saying that we should understand the word which thou saidst?\n\nHear, therefore, my Lord and I (will) say in boldness.\n\nThe word which thou saidst that I took away the third part from the power of the Rulers of all the Aeons; and that I removed their Destiny with their Spheres, these which are for lord unto them, that whenever the race of the men should invoke them in their mysteries, these which taught them the Angels, who transgressed, unto the accomplishment of their evil [26 ] works and unlawful, in the mystery of their magic; in order that they should not be able to prevail any more from this hour to accomplish their unlawful works, because that thou tookest away their power from them: with their hour-setters, with their enquirers, with those who are wont to show to the men, who are in the World, everything which will happen, that they should not understand from this hour to show to them any 14 thing which will happen, because thou removedst their Spheres; and thou causedst them to spend six months turned to the left, fulfilling their influences, and other six months looking to the right, fulfilling their influences."

