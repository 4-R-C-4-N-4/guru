[content]
body = "And also are wont these Receivers, they are wont to take that soul up to the Virgin of the Light, and also is wont that soul, she is wont to give to the Virgin of the Light the seals with the glory of the hymn.\n\nAnd is wont [265 ] the Virgin of the Light and with the other seven Virgins of the Light, they are all wont to prove that soul, and all to find their signs in her, with their seals with their baptisms with their chrisms.\n\nAnd is wont the Virgin of the Light, she is wont to seal that soul; and the Receivers of the Light are wont to baptise that soul, and give to her the chrism spiritual.\n\nAnd are wont each of the Virgins of the Light, they are wont to seal her with their seals, and also are wont the Receivers of the Light, they are wont to deliver her up to the great Sabaoth the good, this who (is) at the gate of the Life in the Place of those of the Right (hand), this whom they are wont to call, The Father.\n\nAnd is wont that soul, she is wont to give the glory of the hymn with his seals with his defences.\n\nAnd [266 ] is wont Sabaoth the great, good, he is wont to seal her with his seals.\n\nAnd is wont the soul, she is wont to give her knowledge with the glory of the hymns with the seals of every Place of those of the Right (hand), they are all wont to seal her with their seals.\n\nAnd is wont Melkhisedek the great Receiver of the Light, this who (is) in the Place of those of the Right (hand), he is wont to seal that soul.\n\nAnd are wont the Receivers of Melkhisedek, they are wont to seal that soul, and to receive her unto the Treasury of the Light.\n\nAnd she is wont to give the glory with the honour with the respect of the hymns with all the seals of all the Places of the Light.\n\nAnd are wont those of all the Places of the Treasury of the Light, they are wont to seal her with their seals.\n\nAnd she is wont to go unto the Place of her inheritance.\n\n[266 ] These therefore the Saviour having said them unto his disciples, said he to 147 them, Understand ye in what manner I am speaking with you?\n\nSprang up again Maria, said she, Yea, my Lord, I understand in what manner thou art speaking with me, and I shall comprehend all of them.\n\nNow therefore concerning these words which thou sayest my understanding maketh four meanings in me, and my Light-dweller, it led and it was glad, it boiled in me wishing to come out of me and to go in unto thee.\n\nNow therefore, My Lord, hear that I may say unto thee the four meanings which became in me.\n\nThe first meaning indeed which happened in me (is) concerning the word which thou saidst, Now therefore is wont the soul, she is wont to give the defence with the seal to all the Rulers who (are) in the Place of the King, the Adamas, and she is wont to give the defence [267 ] with the honour with the glory of all their seals with the hymn of the Places of the Light.\n\nConcerning this word therefore which thou saidst unto us once, they having brought to thee the stater, thou sawest it being of silver and brass, thou soughtest, That of whom is this image?\n\nSaid they, That of the King it is.\n\nBut thou having seen it, that it was mixed in silver and brass, saidst thou, Give the part, that of the King to the King."

