[content]
body = "And all the Angels with their Archangels and with all the Powers of the Height were all hymning unto the inner part of the inner parts.\n\nSo that all the earth heard their voices, not ceasing even unto the nine of the morrow.\n\nBut the disciples were sitting with one another being in 4 fear, and they had been disturbed [7 ] greatly greatly, but they were fearing because of the great earthquake which becometh, and they were weeping with one another, saying, What then is it that will happen?\n\nPerhaps the Saviour is about to overturn all the Places.\n\nThese therefore they are saying, weeping toward one another.\n\nAt the hour of nine of the morrow the heavens opened, and they saw Jesus coming down, enlightening greatly greatly, there being no measure for his light in which he is becoming, for he was enlightening more than the hour in which he went up unto the heavens, so that it was not possible for world-men to speak of the light which was being from him: and he was casting out beams of [7 ] light greatly greatly, there being no measure for his beams; and his light was not being equal with itself (one another), but it was being of different kinds, and it was being of different types, some more excellent than one another at a time; and all the light was in itself different; it was being of three manners and one more excellent than one at a time; the second which is in the middle was being more excellent than the first which is below, and the third which is above them all was more excellent than the two which (are) below.\n\nAnd the first ray placed below them all, being of the kind of light which [8 ] came upon Jesus before that he went up unto the heavens, and being equal to it only in his light.\n\nAnd the three lights were being of different kinds of light, and they were being of different types, some more excellent than some at a time.\n\nBut it happened, (that) the disciples having seen these they feared greatly and were disturbed.\n\nJesus therefore the merciful and the sweet (of) heart, having seen his disciples that they were disturbed in a great disturbance spake with them, saying, Be confident of heart, I am, fear not.\n\nIt happened therefore, the disciples having heard this word said they, Lord if thou art, draw away unto thee thy light of glory, that [8 ] we may be able to stand, otherwise our eyes are darkened, and we were disturbed, and also was disturbed all the World out of the great light which becometh from thee.\n\nThen Jesus drew away unto him the glory of his light, and this having happened were confident of heart all the disciples, they came up to foot of Jesus, they prostrated all, at once, they worshipped to him rejoicing in great joy.\n\nSaid they to him, Hrabbei, whither wentest thou, or what is thy Service which thou wentest (upon), or in what indeed were all these disturbances with all these earthquakes which happened?\n\nThen said he to them Jesus, the merciful, Rejoice and be glad from 5 this hour, because [9 ] I went even to the Places out of which I came.\n\nFrom to-day, therefore, henceforth I shall speak with you in boldness from the beginning of the Truth even to its end, and I shall speak with you face to face without parable, I shall not hide anything from you, from this hour, of the (things) of the Height and the (things) of the Place of the Truth; for they gave authority from the Ineffable and from the First Mystery of all the mysteries for me to speak with you from the beginning even to the Pleroma, and from within even to without and from without even to within.\n\nHear therefore that I may say unto you everything."

