[content]
body = "Answered the Saviour, said he to Maria, If a sinner, he is being worthy of the Darkness which is outer, or otherwise indeed he did sin according to the punishment, the rest also of the punishments; and this (one) did not repent, or otherwise indeed (he is) a man sinner who completed his number of cycle in the changes of the body and this (one) did not repent, whenever those men therefore, these whom I said, whenever they should come out of the body, and they should take them unto the Darkness which is outer.\n\nNow therefore if ye wish to remove them out of the punishments of the Darkness which is outer with all the judgments, and they remove [293 ] them unto a righteous body, this (one) being about to find the mysteries of the Light, that he may go unto the Height and inherit the kingdom of the Light, do the same mystery of the Ineffable, this which is wont to forgive sin at every time: and whenever ye should finish doing the mystery, say, The soul of such or such a man of whom I thought in my heart, if she is in the Place of the punishments of the chambers of the Darkness which is outer, even if it is in the rest also of 164 the punishments of the chambers of the Darkness which is outer, with the rest also of the punishments of the dragon, they shall remove her out of the all: and if she should not complete the number of the cycles in the changes (of the body) they shall take her (close) to the Virgin of the Light, and the Virgin of the Light (will) seal her (him, MS ) with the seal of the Ineffable [293 ] and cast it in the same month unto a righteous body, this in whom she will find the mysteries of the Light, and that she may become good and go unto the Height and inherit the kingdom of the Light.\n\nAnd also if she completed the cycles of the changes, they shall take that soul up to the seven Virgins of the Light, these who are over the baptism, and they (will) put it upon that soul, and seal her with the sign of the kingdom of the Ineffable and take her (him, MS ) among the arrays of the Light, these I will say whenever ye should complete the mysteries.\n\nAmen I say to you, The soul (for) which ye will pray, if indeed she is in the dragon of the Darkness which is outer, he will liberate his tail out of his mouth and vomit out that soul.\n\nAnd also if she is in [294 ] any (every, MS ) Place of the judgments of the Rulers, Amen I say unto you, Will carry her off in a haste the Receiver of Melkhisedek, if should have vomited her the dragon, or otherwise indeed she is in the judgments of the Rulers, in one word, will carry her off the Receivers of Melkhisedek from any (every, MS ) Place in which she is in.\n\nAnd they will take her unto the Place of the Middle (close) to the Virgin of the Light.\n\nAnd is wont the Virgin of the Light, she is wont to prove her, and see the sign of the kingdom of the Ineffable being in that soul, and if she hath not yet completed the number of cycles in the changing of the soul, or in (the changing) of the body, is wont the Virgin of the Light, she is wont to seal her with a seal more excellent, and [294 ] hasten to make them cast her in the same month unto a righteous body, this which is about to find the mysteries of the Light, and about to be good, that he may go unto the Height unto the kingdom of the Light."

