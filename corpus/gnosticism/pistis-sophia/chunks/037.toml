[content]
body = "Now therefore, O Light of the Lights, let them not take away my light from me, and let them not say within them, Our power was satisfied with her light, and let them not say, (We) swallowed (down) her power, but let darkness rather come upon them, and let them be powerless, those who wish to take away my light from me: and let them clothe them with Chaos and darkness, those who say, We shall take away her light with her power.\n\nNow therefore deliver me that I may rejoice, because I wish for the thirteenth Aeon the Place of the righteousness.\n\nAnd I shall say at every time, Shall make more light the light of Ieou thy angel, because 47 I long for the light, [85 ] and my tongue will hymn unto thee in thy knowledge in all my time in the thirteenth Aeon.\n\nIt happened, Jesus having finished saying these words unto his disciples, said he to them, He who is sober among you, let him utter their explanation.\n\nCame forward Iakobos.\n\nHe kissed the breast of Jesus, said he, My Lord, was sober in me thy spirit, and I am ready to utter their explanation.\n\nConcerning this indeed thy power prophesied once by David in the thirty-fourth psalm, saying thus concerning the ninth repentance of the Pistis Sophia.\n\nGive judgment, O Lord, unto those who illtreat me, fight with those who fight with me: lay hold on a weapon with a shield and arise to help me.\n\nDraw out a sword [86 ] and shut off (the way) in the presence of those who afflict me.\n\nSay to my soul, I am thy salvation: let them be ashamed and be disgraced those who seek after my soul.\n\nLet them turn them back and be ashamed those who think unto me evil (things).\n\nLet them be as the dust before a wind and the angel of the Lord persecuting them.\n\nLet their road become darkness and slippery and the angel of the Lord afflicting them.\n\nBecause they hid unto me a snare without cause unto their own destruction.\n\nAnd they reproached my soul with that which is vain.\n\nLet come to them the snare which they know not, and let seize them the trap which they hid for me, and they will fall into this snare.\n\nBut my soul will be glad over the Lord, and [86 ] it will be cheerful over its salvation.\n\nAll my bones will say, O Lord, who is he who will be able to be like thee?\n\nThou savest the poor (one) from the hand of him who is stronger than he, and thou deliverest a poor (one) with a miserable (one) from those who spoil him.\n\nArose witnesses of violence; they questioned me about the things which I know not: they repaid to me evil (things) instead of good, (things) and childlessness to my soul.\n\nBut I, they having annoyed me, I clothed me with a sackcloth and I humbled my soul in a fasting, my prayer will turn (back) into my bosom.\n\nI was pleasing to thee, as he who is my neighbour, and as my brother; and I humbled my(self) as he who lamenteth, and as he who mourneth.\n\nThey delighted [87 ] over me, and they were ashamed.\n\nScourges collected upon me, and I knew not.\n\nThey were separated, and they were not pained at heart.\n\nThey tempted me and they derided me in derision, they gnashed their teeth upon me.\n\nO Lord, when wilt thou look upon me?\n\nSet up my soul out of their evil works, and deliver mine only sonship from the lions.\n\nI shall manifest to thee, O Lord, 48 in a congregation which is many, and I shall bless thee in a people which hath not number."

