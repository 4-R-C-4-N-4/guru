[content]
body = "And they took away their eyes up, they saw a great light which is much greatly, native of earth shall not be able to speak of it.\n\nSaid he also to them again, Look out on the Light, see what ye see.\n\nSaid they, We are seeing a fire with water with wine with blood.\n\nSaid [331 ] Jesus, who Aberamentho is, toward his disciples, Amen I say to you, I brought not anything unto the World, while coming, except this fire with this water with this wine with this blood.\n\nI brought the water with the fire from the Place of the Light of the Lights from the Treasury of the Light.\n\nI brought the wine with the blood from the Place of the Barbelos, and after a little time my Father dispatched to me the spirit which is holy in the type of a dove: but the fire with the water with the wine they became unto a purifying of the world.\n\nThe blood also became to me for sign, because of the body of the mankind, this which I took from the Place of the Barbelos, the great power of the Invisible God.\n\nThe 189 spirit also is drawing in front of every soul, taking them [332 ] unto the Place of the Light.\n\nBecause of this I said to you, I came to cast a fire upon the earth, which is this, that I came to purify the sins of all the World in fire.\n\nAnd because of this I said to the Samaritan woman, Thou wast not knowing the free-gift of God, and who it is who saith to thee, Give me that I may drink: Thou wast asking him and he (would) give to thee water living, and it (would) become to thee for a fountain in thee, springing up unto a life of unto age.\n\nAnd also because of this I took a cup of wine, I blessed it I gave it to you, because this is the blood, the Covenant which they will shed for you unto the forgiving of your sins.\n\nAnd also because of this they thrust the spear in unto my side, came out water with blood.\n\nBut these are the mysteries of the Light which are wont to forgive sins, which are those, the appellations and (with, MS ) [332 ] the names of the Light.\n\nIt happened therefore after these (things), commanded Jesus, Let all the powers of the Left (hand) come unto their Places.\n\nAnd Jesus with his disciples remained upon the mountain of the Galilaia.\n\nAdded also the disciples, they prayed him, How long therefore dost not thou cause them to forgive our sins which we did with our unlawfulness, and make us worthy of the kingdom of thy Father.\n\nBut Jesus, said he to them, Amen I say to you, Not only shall I purify your sins, but I shall make you worthy of the kingdom of my Father.\n\nAnd I shall give to you the mystery of the forgiving of sin upon the earth, that that which ye will forgive upon the earth, they shall forgive to him in the heavens, and that which ye will bind upon the earth it will become being bound in the heavens.\n\nI shall give to you the mystery of the kingdom of the heavens that ye also [333 ] shall do them to the men.\n\nBut Jesus, said he to them, Bring to me fire with some wood of vine.\n\nThey brought them to him, he offered up the Oblation: he put the two jars of wine one on the right hand and the other on the left of the Oblation.\n\nHe put the Oblation in front of them.\n\nHe put a cup of water by the vessel of wine which (is) on the right, and he put a cup of wine by the vessel of wine which (is) on the left, and he put some cakes according to the number of the disciples in the midst of the cups.\n\nHe put a cup of water behind the cakes."

