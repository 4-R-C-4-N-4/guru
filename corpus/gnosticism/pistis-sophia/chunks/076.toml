[content]
body = "And the Saviour of the emanations of the fourth Voice of the Treasury of the Light [177 ] will become in the Place of the souls of those who receive the Fourth Mystery of the First Mystery in the Inheritances of the Light.\n\nAnd the fifth [ sic ] Saviour of the fifth Voice of the Treasury of the Light will become in the Place of the souls of those who receive the Fifth mystery of the First Mystery in the Inheritances of the Light.\n\nAnd the sixth Saviour of the emanations of the sixth Voice of the Treasury of the Light will become in the Place of the souls of those who receive the Sixth mystery of the First Mystery.\n\nAnd the seventh Saviour of the emanations of the seventh Voice of the Treasury of the Light will become in the Place of the souls [178 ] of those who receive the Seventh mystery of the First Mystery in the Treasury of the Light.\n\nAnd the eighth Saviour, namely, the Saviour of the emanations of the first Tree of the Treasury of the Light will become in the Place of the souls of those who receive the Eighth mystery of the First Mystery in the Inheritances of the Light.\n\nAnd the ninth Saviour, namely, the Saviour of the emanations of the second Tree of the Treasury of the Light will become in the Place of the souls of those who receive the Ninth mystery of the First Mystery in the Inheritances of the Light.\n\nAnd the tenth Saviour of the emanations of the third Tree of the Treasury of the Light will [178 ] become in the Place of the 96 souls of those who receive the Tenth mystery of the First Mystery in the Inheritances of the Light.\n\nLikewise also the eleventh Saviour, namely, the Saviour of the fourth Tree of the Treasury of the Light will become in the Place of the souls of those who receive the Eleventh mystery of the First Mystery in the Inheritances of the Light.\n\nAnd the twelfth Saviour, namely, the Saviour of the emanations of the fifth Tree of the Treasury of the Light will become in the Place of the souls of those who receive the Twelfth mystery of the First Mystery in the Inheritances of the Light.\n\nAnd the seven (seventh, MS ) Amens with the five (fifth, MS ) Trees with the three [179 ] Amens will become on right-hand of me being King in the Inheritance of the Light.\n\nAnd the Twin-saviours, namely, the child of the child and with the nine Guards, they indeed will remain also on left of me being King in the Inheritance of the Light.\n\nAnd every Saviour will be King over the arrays of his emanations in the Inheritances of the Light, as also they are in the Treasury of the Light.\n\nAnd the nine Guards of the Treasury of the Light will become, being preferable unto the Saviours in the Inheritances of the Light.\n\nAnd the Twin-saviours will become preferable unto the nine Guards in the Kingdom.\n\nAnd [179 ] the three Amens will become preferable unto the Twin-saviours in the Kingdom.\n\nAnd the five Trees will become preferable unto the five Amens in the Inheritances of the Light.\n\nAnd Ieou with the Guard of the Veil of the great Light with the Receivers of Light with the great two Chief Captains with the great Sabaoth, the good, they will become being King in the first Saviour of the first Voice of the Treasury of the Light, this which will become in the Place of those who receive the First Mystery of the First Mystery.\n\nBecause that Ieou with the Guard of the Place of those on Right (hand) with Melkhisedek the great Receiver of the Light, with the great [180 ] two Chief Captains who came out of the Light which is choice, which is pure, greatly, of the First Tree even unto the fifth."

