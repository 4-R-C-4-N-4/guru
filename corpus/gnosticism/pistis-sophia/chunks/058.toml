[content]
body = "And the word which thy power of light said by David, Nevertheless thou wilt fill thy sight with them, and thou wilt see the recompense of the 73 sinners, because thou, O Lord, art my helper, namely, the word that the Pistis Sophia filled her sight with her enemies which are the emanations of the Self-willed, those all of which fell (down) upon one another: [135 ] not only she filled her sight with them in this, but thou also, my Lord, the First Mystery, thou tookest away the power of light which becometh in the power of face of lion, and also thou tookest away the power of all the emanations of the Self-willed, and also thou heldest them down in Chaos for them to go unto their Place from that hour.\n\nBecause of this therefore the Pistis Sophia filled her sight with her enemies, namely, the emanations of the Self-willed in every thing, which prophesied David about the Pistis Sophia, saying, Nevertheless thou wilt fill thy sight with them, and thou wilt see the recompense of the sinners.\n\nNot only that she filled her sight with them, they fell upon one another in the Chaos, but she saw [135 ] also their recompense also this which they repaid to them: according as the emanations of the Self-willed thought to take away the light of the Pistis Sophia from her, thou repaidest to them, and thou recompensed to them.\n\nAnd thou tookest away the power of light which (is) in them instead of the light of the Sophia, this (one) who believed the light of the Height.\n\nAnd according as thy power of light said by David, Thou placedst him who is high for thee for place of refuge: there is not evil (which) will be able to approach thee, and there is not scourge (which) will approach in unto thy place of dwelling, namely, that when the Pistis Sophia had believed (closely) in the Light, and when she had been oppressed she hymned up unto him, were not able to do anything of evil to her the emanations of the Self-willed, [136 ] nor were they able to hurt her, and they were not able to approach her at all.\n\nAnd the word which thy power of light said by David, He will order to his angels concerning thee, that they should guard thee in all thy ways, and lift thee upon their hands lest-at-any-time thou should dash against a stone with thy foot.\n\nThat also is the word that thou orderest to Gabriel with Mikhael for them to steer the Pistis Sophia through all the Places of the Chaos, until they brought her up and raised her in their hands, that her feet should not touch the darkness below, and (should not) also lay hold on her those of the darkness below.\n\nAnd the word which thy power of light [136 ] said by David, Thou wilt trample upon a serpent with a basilisk, and thou wilt trample upon a lion with a dragon.\n\nBecause he trusted unto me I shall save him and I shall make shadow unto him, because he knew my name, namely, the word that when the Pistis Sophia came, coming up from the Chaos, 74 she trampled upon the emanations of the Self-willed, she trampled upon those who have face of serpent, and upon those who have face of basilisk of serpent having seven heads.\n\nAnd she trampled upon the power of face of lion, with that which hath face of dragon, because that she believed the Light she was delivered from them all.\n\nThis is, my Lord, the explanation of the words which thou saidst."

