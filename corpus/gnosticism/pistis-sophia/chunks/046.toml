[content]
body = "But answered Maria the mother of Jesus, said she, My Lord, thy power of light prophesied about these [106 ] words once by Solomon in his nine(teenth) ode and said it, The Lord upon my head as a crown, and I shall not become 58 outside of him.\n\nThey planted for me the crown of the truth and he caused thy branches to burst forth in me: because he is not being like to a crown drying up, which is not wont to burst forth; but thou art living upon my head and thou bursteth forth over me, thy fruits are full and they are completed, being full of thy salvation.\n\nIt happened therefore, Jesus having heard these words, which is saying Maria his mother, said he to her, Well (done and) fairly.\n\nAmen, amen I say to thee, Will call thee happy from (one) end of the world even unto (the other) end, because [106 ] sojourned with thee the pledge (of) the First Mystery: and through that pledge are about to be delivered all the (things) of the earth with all the (things) of the Height.\n\nAnd that pledge itself is the beginning and the end.\n\nBut added also Jesus in the word, said he to his disciples, It happened, having said the thirteenth repentance the Pistis Sophia, from that hour indeed was completed the precept of all the afflictions, these which they ordered unto the Pistis Sophia because of the completion of the First Mystery, this which becometh from at first; and came the time for them to deliver her from the Chaos [107 ] and to bring her up from all the darknesses: for was received (they received, MS ) from her her repentance by the First Mystery.\n\nAnd himself that Mystery, dispatched to me a great power of Light out of the Height for me to help the Pistis Sophia and to bring her up out of her Chaos.\n\nBut I looked at the Height of Aeons, I saw the power of Light which the First Mystery dispatched to me, that I should deliver the Sophia from the Chaos.\n\nIt happened therefore, I having seen it coming out of the Aeons and rushing toward me, but I, I was being over the Chaos, another power of Light came out of me also, that it should help also the Pistis Sophia.\n\nAnd the power of [107 ] Light which came out of the Height by the First Mystery came down upon the power of Light which came out of me, and they met one another, they made a great effluence of light.\n\nThese therefore having said them Jesus to his disciples, said he, Do ye understand in what manner I am speaking with you?\n\nSprang up again Mariham, said she, My Lord I understand what thou art saying concerning the explanation of this word: thy power of light prophesied once by David in the eighty-fourth psalm, saying, The mercy with the truth met one another, and the righteousness with the peace kissed one another.\n\nThe truth burst forth out [108 ] of the earth and the righteousness looked out of the heaven.\n\nThe mercy therefore is the power of Light which came by the First Mystery, because he heard the Pistis Sophia, the First 59 Mystery, he had mercy on her in all her afflictions.\n\nThe truth also is the power which came out of thee, because that thou completedst the truth, for thee to deliver her from the Chaos.\n\nAnd again the righteousness is the power which came by the First Mystery which will steer the Pistis Sophia: and again the peace is the power which came out of thee, because that it will go toward the emanations of the Self-willed, and take away from them the lights, which they took away from the Pistis Sophia, namely, that thou may gather them into the Sophia [108 ] and make them at peace with her power."

