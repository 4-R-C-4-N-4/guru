[content]
body = "It happened therefore having come upon their veils, they drew (away) of their own (accord), they opened to me, 22 I came [40 ] in unto the thirteenth of the Aeon ( MS.\n\nAeons), I found the Pistis Sophia being below the thirteenth Aeon, she by herself, being none of them with her.\n\nBut she was sitting at that place grieving and making lament, because they took her not unto the thirteenth Aeon, her Place which is at the Height.\n\nAnd also she was grieving concerning the tribulations which did to her the Self-willed (one), this who is one of the three Triple powers.\n\nBut these whenever I should speak with you concerning their distribution, I shall say unto you the mystery, how these became.\n\nIt happened therefore, she having seen me, the Pistis Sophia, as I am enlightening greatly greatly, there being not measure unto the light which is from me, she became in great disturbance [41 ], and she looked in the light of my vesture, she saw the mystery of her name in my vesture, and all the glory of its mystery: because she was becoming at first in the Place of the Height in the thirteenth Aeon.\n\nBut she was wont to hymn the light which (is) at the Height, this which she saw in the veil of the Treasury of the Light.\n\nIt happened therefore, she having continued hymning the Light which is at the Height, all the Rulers looked, who (are) together with the great two Triple powers and with her Invisible, who is joined unto her, and the other twenty-two emanation Invisibles.\n\nSince the Pistis Sophia with her partner, they with the other twenty-two emanations are wont to make (up) twenty-four emanations, [41 ] these which emanated them out the great Forefather Invisible, he with the great two Triple powers.\n\nIt happened therefore while Jesus saith these (things) unto his disciples came forward Mariham, said she, My Lord I heard thee once saying, The Pistis Sophia is not herself One out of the twenty-four emanations, and how she becometh not in their Place.\n\nBut thou saidst that I found her being below the thirteenth Aeon.\n\nAnswered Jesus, said he to his disciples, It happened while the Pistis Sophia (was) in the thirteenth of the Aeons in the Place of all her brothers the Invisibles, namely twenty-four emanations of the great Invisible, it happened [42 ] therefore by the precept of the First Mystery, looked unto the Height the Pistis Sophia, she saw the light of the veil of the Treasury of the Light, and she desired to go unto that Place: and she could not prevail to go unto that Place.\n\nBut she ceased doing the mystery of the thirteenth Aeon.\n\nBut she was hymning unto the Light of the Height, that which she saw in the light of the veil of the Treasury of the Light.\n\nIt 23 happened therefore while she is hymning unto the Place of the Height, all the Rulers who become in the twelve Aeons hated her, these who (are) below, because that she ceased from their mysteries, and because that she wished to go unto the Height and be above them all.\n\nBecause of this, therefore, they were angry against her and they hated her."

