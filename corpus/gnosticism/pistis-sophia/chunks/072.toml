[content]
body = "Those who sit in the darkness with the shadow of the death, those who are bound in a poverty with the iron; because he exasperated the word of God, they irritated the counsel of him who is exalted: their heart was humbled in their tribulations; they became weak and there was not he who helped them.\n\nThey cried up unto the Lord in their being distressed; he delivered them out of their necessity, he brought them out of the darkness with the shadow of the death, and he burst their bonds.\n\nLet them manifest to the Lord in his mercies, and his wonders for the sons [168 ] of the men: because he broke gates of brass, he shattered bars of iron: he received them unto him in the road of their unlawfulness; for they were humiliated because of their unlawfulness: their heart abhorred every (kind) of meat, they approached unto the gates of the death.\n\nThey cried up unto the Lord in their being distressed, he delivered them out of their necessity: he sent his word, he healed them, and he saved them out of their tribulation.\n\nLet them manifest to the Lord in his mercy and his wonders among the sons of the men.\n\nThis therefore, my Lord is the explanation of the hymn which said the Sophia.\n\nHear therefore, my Lord that I may say it plainly.\n\nThe word indeed which said David, Manifest [169 ] to the Lord because he is kind, because an eternal is his mercy.\n\nThat is the word which said the Sophia, I shall manifest to thee, O Light, because thou art a Saviour, and thou art a redeemer at every time.\n\nAnd the word which said David, Let those whom the Lord redeemed say this, He redeemed them out of the hand of their enemies.\n\nThat is the 91 word which said the Sophia, I shall say this hymn unto the Light, He delivered me; and he delivered me out of the hand of the Rulers mine enemies, with the rest also of the psalm.\n\nThis therefore, my Lord is the explanation of the hymn which said the Sophia in the midst of the twenty-four Invisibles, wishing for them to know [169 ] all the wonders which I did with her, and she wished for them to know, that thou gavest thy mysteries of the race of the mankind.\n\nIt happened therefore, Jesus having heard these words, saying them Philippos, said he, Well (done), O happy Philippos, this is the explanation of the hymn which said the Sophia.\n\nIt happened therefore also after all these (things) came forward Mariham, she worshipped at the feet of Jesus, said she, My Lord, be not angry with me seeking from thee, because we are seeking after every thing in an exactness with a certainty, for thou saidst unto us once, Seek that ye may find and knock that they may open to you.\n\nFor every one who seeketh will find, and every one who knocketh [170 ] in, they will open to him.\n\nNow therefore, my Lord, who is he whom I shall find, or who is he unto (whom) we shall knock, or who, rather, is he for whom it is possible to say unto us the answer to the words about which we shall seek (from) thee, or who, rather, is he who knoweth the power of the words after which we shall seek, because that in a mind thou gavest mind to us of the Light, and thou gavest to us perception with a thought being exalted greatly?\n\nConcerning this therefore there is not anyone becoming in the World of the mankind, nor becoming in the Height of the Aeons, for whom it is possible to say unto us the answer to the words which we seek after, except thee alone, this who knoweth the Universe and who is complete in the Universe."

