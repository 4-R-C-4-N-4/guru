[content]
body = "[71 ] Because of this word therefore thy power of light prophesied once by David, saying in the four-twentieth with one psalm, God will sit in the assembly of the gods and (will) give judgment unto the gods.\n\nSaid he to her Jesus, Well (done) Maria.\n\nAdded also Jesus in the word, said he to his disciples, It happened, the Pistis Sophia having finished saying the sixth repentance concerning the forgiveness of her transgression, she turned also unto the Height to see whether they forgave to her her sins, and to see if they will bring her up from the Chaos.\n\nAnd they did not yet hear her by the command of the First Mystery for them to forgive her sin and bring her up from the Chaos.\n\nShe having turned therefore unto the Height to see whether they [72 ] received her repentance from her, she saw all the Rulers of the twelve Aeons mocking at her, and rejoicing at her, because that they received not her repentance from her.\n\nShe having seen therefore them mocking at her, she was grieved greatly, she lifted up her voice unto the Height saying in the seventh Repentance, O Light, I lifted up my power unto thee; my Light, I believed thee: let me not be despised, and let them not rejoice at me the Rulers of the twelve Aeons, these who hate me: for every one who believeth thee will not be ashamed: shall remain in darkness those who took away my power, and will not make gain of it, but it will be taken from them.\n\nO Light, show to me thy ways, and I shall be delivered from them and [72 ] show me thy paths, that I should be delivered from the Chaos, and guide me in thy light.\n\nAnd let me know, O Light, that thou art my deliverer, I shall trust unto thee in all my time.\n\nGive heed for to deliver me, O Light, because thy mercifulness becometh even unto age: because of my transgression which I did from at first in my ignorance, reckon it not unto me, O Light, but deliver me rather in thy great mystery of forgiver of sin: because of thy goodness, O Light, because good (and) straight is the Light: because of this thou wilt give thy way to me for to be delivered from my transgression, and my powers 40 which were diminished by the fear of the material emanations [73 ] of the Self-willed, it will draw them near by its precept; and my powers which were diminished by the unmerciful (ones) it will teach them his knowledge: because all the knowledges of the Light are deliverances, and are mysteries for everyone who seeketh for the Places of his inheritance with his mysteries.\n\nBecause of the mystery of thy name O Light, forgive my transgression, because it is great.\n\nEvery one who trusteth unto the Light will give to himself the mystery which he willeth, and his soul will become in the Place of the Light, and his power will inherit the Treasury of the Light.\n\nThe Light is that which giveth power to those who believe it, and the name of his mystery is that of those who trust unto him, and he will show to them the Place of the inheritance [73 ] which is in the Treasury of the Light.\n\nBut I, I believed the Light at every time, because it is he who will deliver my feet out of the bonds of the darkness.\n\nGive heed unto me, O Light, and deliver me.\n\nFor I, they took away my name from me in the Chaos.\n\nBeyond all the emanations, were multiplied greatly my afflictions with my oppressions.\n\nDeliver me out of my transgressions, and with this darkness, and see the tribulation of my oppression, and forgive my transgression."

