[content]
body = "This is the baptism of the First Oblation which guideth in unto the Place of the truth, and in [335 ] unto the Place of the Light.\n\nAfter these (things) also said they his disciples, Rabbei reveal to us the mystery of the Light of thy Father, since we knew thee while thou sayest, that there is also baptism of Fire, and there is also baptism of Spirit, being holy, of the Light, and there is a spiritual anointing, these which are wont to take the souls unto the Treasury of the Light.\n\nSay therefore unto us their mystery, that we may inherit also the kingdom of thy Father.\n\nSaid Jesus to them, These mysteries after which ye seek?\n\nThere is not mystery more excellent than they, which is about to take your souls unto the Light of the Lights, unto the Places of the truth with the goodness, of the Place of him who is holy of all those who are holy, unto the Place in which there is not woman, nor is there male, nor is there shape in that Place, but [336 ] a light is being steadfast ineffable: there is not that which is more excellent therefore than those mysteries after which ye seek, except the mystery of the Seven Voices with their forty nine powers, and their tickets, and with the Name which is more excellent than all of them, the Name in which is becoming every name, and every light and every power.\n\nHe who knoweth that Name, whenever he should come out of the body of the matter, shall not any smoke nor any darkness nor authority nor Ruler of the Sphere of the Destiny, nor Angel nor Archangel nor power, they shall not be able to hold back the soul which knoweth that Name.\n\nBut whenever he should come out of the World and (should) say that Name unto the fire, it is wont to be quenched, and is wont the darkness to withdraw.\n\nAnd whenever he should say unto the demons with the Receivers [336 ] of the Darkness which is outer, with their Rulers with their authorities with their powers, they will all perish and their flame burn and they (will) cry out, Thou art holy, thou art holy, he who is holy of all those who are holy.\n\nAnd whenever they should say that Name unto the Receivers of the judgments which are evil, with their authorities with all their powers, and the Barbelo also with the Invisible God with the three Triple-powered Gods, at the hour in which they will say this Name in those Places, they will fall all of them 192 one upon another and be dissolved and perish, and they (will) cry out, O Light of every Light which becometh in the Boundless Light, remember us also and purify us.\n\nBut having finished saying these words Jesus, cried out all his disciples, they wept in a great cry, saying, ( Four leaves wanting.\n\n) 193"

