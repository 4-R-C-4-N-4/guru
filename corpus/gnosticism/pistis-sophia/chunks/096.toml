[content]
body = "He who also receiveth out of the three mysteries of the Ineffable, whenever also he should come out of body he will inherit unto the kingdom of that mystery, and those three mysteries are equal with one another, they are in the kingdom and they are more excellent and they are higher than the five Mysteries of the Ineffable in the kingdom.\n\nBut they are not equal with the one (only) mystery of the Ineffable.\n\nHe who receiveth also the one (only) mystery of the Ineffable will inherit the Place of the whole kingdom, according as I finished saying unto you all his glory another time.\n\nAnd every one who will receive the mystery, which is in the Space of the Universe of the Ineffable with all the other mysteries, which are joined in the members of the Ineffable [224 ], these concerning which I did not yet speak with you with their distribution with the manner in which they stand, and with the type of each as it is, and because of what they called him, The Ineffable, or because of what he stood being distributed with all his members, and how many members there are becoming in him, with all his arrangements, these which I shall not say unto you now, but whenever I should be about (to say) unto you the Distribution of the Universe, I shall say unto you all one after another, indeed his distributions with his form of words (speaking of himself) as he is with the joining of all his members, belonging to the arrangement of the only one God of the truth, inaccessible.\n\nThe Place therefore unto which each will receive mystery in the Space of the Ineffable, he will inherit unto [224 ] the Place which he received.\n\nAnd those of the whole Place of the Space of the Ineffable are not wont to give answer at every Place, nor are they wont to give defence nor are they wont to give symbol for ones without symbol are they; and they have not Receiver, but they are wont to pass through all the Places, until they go unto the Place of the kingdom of the mystery which they received.\n\nLikewise also those who will receive mystery in the second Space have not answer nor defence, for ones without symbol they are in that World, 122 that is the Space of the first mystery of the First Mystery: and those of the third Space also which is the outside, namely, the third Space also from the outside, each Place hath in that Space its Receivers with its answer [225 ] with its defence with its symbol, these which I shall say unto you in the time (in) which I shall say unto you that mystery, namely, whenever I should finish saying unto you the Distribution of the Universe.\n\nNevertheless in the dissolution of the Universe, namely, whenever should be completed the number of the perfect souls, and (should) be completed the mystery this (through) which the Universe entirely became, I shall spend (a) thousand years according to the years of the Light reigning over all the emanations of the Light with all the number of the perfect souls, these which received all the mysteries.\n\nIt happened, Jesus having finished saying these words unto his disciples, came forward Maria the Magdalene, said she, My Lord, how many years in the years of this World is a year of the Light?\n\nAnswered Jesus, said he to Maria [225 ], A day of the light is ten hundred years of the World, so that thirty-six ten thousand years with another half ten thousand years of the World is (only) one year of the Light.\n\nI shall spend therefore ten hundred years of the Light, reigning in the midst of the last Helper, reigning over all the emanations of the Light and over all the number of the perfect souls, these which received the mysteries of the Light."

