[content]
body = "But I, I trusted unto the Light, I shall rejoice and hymn, because thou hadst compassion upon me, and thou gavest heed unto the straits in which I become, and thou deliveredst me: and also thou wilt save my power out of Chaos, and thou didst not leave me in hand of the power of face of lion, but thou broughtest me unto a Place which is not oppressing.\n\nThese therefore, Jesus having said unto his disciples, he answered also, said he to them, It happened therefore having known the power of face of lion that they brought not the Pistis Sophia up from the Chaos altogether (that power) came also with all the other material emanations of the Self-willed, [79 ] they oppressed also the Pistis Sophia.\n\nIt happened therefore, they having oppressed her, she cried out in the same Repentance, saying, Have compassion upon me, O Light, because they oppressed me also.\n\nWas disturbed because of thy precept the light which is in me.\n\nAnd my power and my mind: my power began to fail, while I become in these oppressions; and the number of my time while I become in Chaos.\n\nMy light was diminished because they took away my power from me, and shook all the powers which (are) in me.\n\nI became powerless beyond all the Rulers of the Aeons, these who hate me, and beyond the twenty-four emanations, these in whose Place I was becoming.\n\nAnd feared to help me my brother, my partner, because of [79 ] the (things) in which they planted me.\n\nAnd all the Rulers of the Height reckoned me unto them as matter in which is not light.\n\nI became as a material power, which fell out of the Rulers, and said all those who are in the Aeons, She became Chaos.\n\nAnd after these (things) surrounded me the merciless powers, and they said about taking away all my light which is in me.\n\nBut I, I trusted unto thee, O Light, and I said, Thou art my Saviour.\n\nAnd my precept which thou orderedst unto me being in thy hands.\n\nDeliver me from the emanations of the Self-willed these which oppress me and which persecute me.\n\nSend thy light upon me, because I am nothing with thee.\n\nAnd deliver me in thy [80 ] compassion: let me not be despised, because thou art he whom I hymned, O Light: the Chaos will cover over the emanations of the Self-willed, and take them below unto the darkness.\n\nLet be shut the mouth of those who wish to swallow me (down) in guile, these who say, Let us take away all the light which is in her, to whom I did not anything evil.\n\nBut these having said them Jesus, came forward Maththaios said he, My Lord, thy spirit moved me, and sober in me is thy light for me to utter the eighth repentance of the Pistis Sophia.\n\nFor thy 44 power prophesied about her once by David in the thirtieth psalm, saying, I confide in thee, O Lord, let me not be ashamed [80 ] for ever.\n\nSave me in thy righteousness.\n\nIncline thy ear unto me.\n\nHasten and save me.\n\nBecome to me a God of defence, and a house of refuge, to save me: because thou art my firmness and my refuge, because of thy name thou wilt guide me and nourish me and thou wilt bring me out of this snare, this which they hid from me: because thou art my defence.\n\nI shall deposit my spirit into thy hands.\n\nThou redeemedst me, O Lord, the God of the truth."

