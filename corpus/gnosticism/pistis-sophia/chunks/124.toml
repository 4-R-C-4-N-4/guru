[content]
body = "Added also Maria, said she, 155 My Lord, then every man who received the mysteries of the First Mystery with the mysteries of the Ineffable, these having not transgressed, but their faith in the mysteries (is) in a directness without hypocrisy, these therefore through the compulsion of the Destiny, and also they did sin, and also they turned, they repented and also [279 ] they prayed in their mysteries, (after) their mysteries, will they forgive to them for about how many times?\n\nBut answered the Saviour, said he to Maria in the midst of the disciples, Amen amen I say unto you, Every man who will receive the mysteries of the Ineffable, and also with the mysteries of the First Mystery, these by the compulsion of the Destiny did sin every time, and yet being alive they turn and they repent and also they remain in their mystery, they will forgive to them every time, because those mysteries are merciful, forgivers they are at every time.\n\nBecause of this therefore I said unto you once, Those mysteries not only that they will forgive to them their sins which they did from at first, but (and, MS ) they are not wont to reckon them unto him from that hour, those whom I said unto you that they are wont to take repentance at every time.\n\n[279 ] And they will forgive also the sins which they are wont to do repeatedly.\n\nIf however those who receive mystery in the mysteries of the Ineffable with the mysteries of the First Mystery, and they (should) turn (away) and do sin, and they (should) come out of body having not repented, they also are about to become also as those who transgressed (and) they repented not.\n\nTheir dwelling place indeed also is the midst of the mouth of the dragon in the Darkness which is outer, and they will consume away and become without existence unto age.\n\nBecause of this I said to you, Every man who will receive the mysteries, if they knew the time in which they are coming out of the body, they would govern them(selves) and not do sin, that they should inherit the kingdom of the Light unto age.\n\nThese therefore having said them the Saviour unto his disciples, said he to them, Understand ye in what manner I am speaking with you?\n\n[280 ] Answered Maria, said she, Yea, my Lord, In an exactness I exact every word which thou sayest.\n\nConcerning this word therefore which thou saidst unto us once, If had known the lord of the house in what hour the thief would come in the night to dig through the house he would have kept vigil also, and not have let man dig through his house.\n\nThis therefore having said Maria, said he, the Saviour: Well (done), the spiritual Maria, this is the word.\n\nAdded also the Saviour said he to his disciples, Now therefore, preach to every man who will receive mystery in the Light: say to them, 156 saying, Take heed to your(selves), do not sin, lest at any time ye cast an evil after an evil and ye come out of the body having not repented, and ye be alien unto the kingdom of the Light unto age.\n\nThese [280 ] having said them the Saviour, answered Maria, said she, My Lord, Much is the mercifulness of these mysteries which forgive sin at every time.\n\nAnswered the Saviour, said he to Maria in the midst of the disciples, If a king to-day being a man of this World giveth a free-gift to the men of his manner, and forgiveth also the murderers with the sleepers with male with the rest also of the sins which are grievous greatly, these being worthy of the death."

