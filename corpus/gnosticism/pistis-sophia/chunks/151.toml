[content]
body = "Again also he added in the word, said he to his disciples, The fifth array, of which they are wont to call its Ruler, Iakhthanabas, being a strong Ruler, being under him many other demons: they are those who are wont to go in unto the men, and cause them to become acceptors of person, wronging the righteous, and they are accepting person of the sinners, receiving gifts against [329 ] the true judgment, they are destroying it (judgment), they are forgetting the poor with those who are in want, they are increasing the forgetfulness in their soul with the care in which there is not profit, that they should not remember their life, that whenever they should come out of the body they should take away by robbery the souls: (and those) which will take away by robbery this Ruler, they are wont to become in his punishments for hundred fifty years with eight months; and they are wasted away by his smoke of darkness with his evil fire, afflicting them greatly by the flame of his fire.\n\nAnd whenever the Sphere should turn round, and (should) come the little Sabaoth, the good, this whom they are wont to call in the World, Zeus, unto the eleventh Aeon of the Sphere, this which they are wont to call, The water-bearer, and (should) come the Bubasti unto the fifth Aeon [330 ] of the Sphere, this which they are wont to call, The lion, they are wont to draw (back) the veils, which are between those of the Left with those of the Right, and (is wont) to look out of the height the great Iao, the good, he of the Middle, down upon the Places of Iakhthanabas whose Places dissolve and perish, and they take away all the souls which are in his punishments, and they throw them back unto the Sphere again, because that they were destroyed by his punishments.\n\nThese therefore are the actions of the roads of the Middle of which ye sought (from) me.\n\nBut having heard these (things) the disciples, they 188 prostrated, they worshipped to him, saying, Help us, our Lord, and have compassion upon us, that we should be saved from these punishments which are evil, which are prepared for the sinners!\n\nWoe to them, Woe to them, the sons of men, because they are being [330 ] like to blind (men) groping in the darkness and seeing not!\n\nHave compassion on us, O Lord, in this great blindness in which we are in, and have mercy on all the race of the mankind, because they laid snares for the souls as the lions for a prey, which they prepare for food for their punishments by the forgetfulness and the ignorance which is in them.\n\nHave compassion therefore upon us, our Lord, our Saviour, and have mercy on us and deliver us in this great bewilderment.\n\nSaid Jesus to his disciples, Be of good cheer, fear not because ye are happy: because I shall make you for lord over all these, and I shall make them all subject to you.\n\nRemember that I finished saying to you before that they crucified me, that I shall give to you the keys of the kingdom of the heavens.\n\nNow also I say to you [331 ] that I shall give them to you.\n\nThese therefore having said them Jesus, he hymned in the great name.\n\nWere hidden the Places of the road of the Middle and Jesus with his disciples remained upon air of light which is much greatly.\n\nSaid Jesus to his disciples, Draw near unto me.\n\nAnd they drew near unto him: he turned unto the four corners of the World, he said the great name over their head: he blessed them, he breathed in unto their eyes.\n\nSaid Jesus to them, Look up, see what ye see."

