[content]
body = "Concerning this word therefore my Lord, which thou saidst unto us once, (Become) being reconciled with thine enemy while thou art on the road with him, lest-haply thine enemy should give thee to the judge, and the judge should give thee to the officer and the officer should cast thee unto the prison, and thou shalt not come out of that place, having not given the last smallest coin (lypton, MS ), namely, the word (said) plainly, Every soul which cometh out of the body, and walketh on the road with the counterfeit spirit, and findeth not the mystery of the loosening of all the seals, with all the bonds, and (yet) is loosened from the counterfeit spirit, which is bound unto her; then that soul having [269 ] not received mystery of (in, MS ) the Light, having not found the mysteries of the loosening of the counterfeit spirit, which is bound unto her.\n\nShe therefore finding it not, is wont the counterfeit spirit, it 149 is wont to take that soul (close) to the Virgin of the Light; and is wont the Virgin of the Light, and that judge, she is wont to deliver that soul unto one of her Receivers, and is wont her Receiver, he is wont to cast her unto the Sphere of Aeons, and she is not wont to come out of the changes of the body, having not given the last Cycle which is reckoned unto her.\n\nThis therefore my Lord, is the fourth meaning.\n\nIt happened therefore, Jesus having heard these words, saying them Maria, said he, Well (done) O happy Maria, the spiritual.\n\nThese are the explanations of the words which I said.\n\nAnswered Maria, said she, My Lord, yet I seek from thee [270 ] because that from now I am about to begin to seek thee of everything in an exactness.\n\nBecause of this therefore My Lord, be long suffering with us, and reveal to us everything, about which we shall seek thee, concerning the manner also in which my brothers will preach to the race of all the mankind.\n\nBut these she having said them to the Saviour, answered also the Saviour, said he to her becoming in a great mercy in unto her, Amen I say to you, Not only shall I reveal to you every thing ye will seek after, but from now also I shall reveal to you these other (things) which ye understood not to seek after them; these mounted not upon the heart of the men, these which knew not all the Gods also who (are) among the men.\n\nNow therefore, thou Maria, seek after that which thou art seeking after, [270 ] and I shall reveal it to thee face to face, without parable.\n\nBut answered Maria, said she, My Lord, then in what type are wont the baptisms to forgive sin?\n\nI heard thee saying, Are wont the Contentious Ministers, they are wont to follow after the soul, being witness unto her of every sin which she did, that they should convict her in the judgments.\n\nNow therefore, My Lord, are wont the mysteries of the baptisms, are they wont to blot out the sins, which are with the Contentious Ministers, because they indeed are wont to make their forgetfulness?\n\nNow therefore My Lord, say unto us the type (by) which they are wont to forgive sin, but we wish to know them in an exactness.\n\nBut answered the Saviour, said he to Maria, Fairly indeed thou saidst, the Ministers however at least they are not (those) who are wont to bear witness of every sin, but [271 ] they are wont to remain also among the judgments holding on to the souls, convicting all the souls of the sinners, these who received not mystery, and they are wont to hold them down in the Chaoses punishing them."

