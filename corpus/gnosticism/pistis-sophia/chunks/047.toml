[content]
body = "The truth also is the power which came out of thee, thou being in the Place below of the Chaos.\n\nBecause of this, thy power said by David, The truth burst forth out of the earth, because that thou art in the Place below of the Chaos.\n\nThe righteousness also which looked out of the heaven, that is the power which came out of the Height by the First Mystery, this which went into the Sophia.\n\nIt happened therefore, Jesus having heard these words, said he, Well (done), Mariham the happy, this (One) who will inherit all the kingdom of the Light.\n\nAfter these (things) there came also forward Maria the mother of Jesus, said she, My Lord [109 ] and my Saviour, command to me also, for me to say this word of answer?\n\nSaid he, Jesus, He whose spirit will become understanding I forbid him not, but I urge him the more for to say the meaning which moved him.\n\nNow therefore Maria my mother according to the matter in which I sojourned I command to thee, for thee to say also the meaning of the word.\n\nBut answered Maria, said she, My Lord, concerning the word which thy power prophesied by David, The mercy with the truth met one another, the righteousness with the peace, they kissed one another, the truth burst forth in the earth, and the righteousness looked out of the heaven.\n\nThy power prophesied this word once concerning thee, thou being yet little, before [109 ] the spirit came upon thee, thou being in a vineyard with Ioseph came the spirit out of the Height, he came to me into my house, being like to thee, and I was not knowing him, and I was thinking that (it) is thou.\n\nAnd said to me the spirit, Where is Jesus my brother that I may meet him?\n\nAnd he having said this to me, I was puzzled, and I was thinking that (it) is a phantasm to the tempting me.\n\nBut I took him up I bound him unto the foot of my place of lying which is in my house, until I should come to you out unto the field, thou with Ioseph.\n\nAnd I having found thee in the vineyard, while Ioseph giveth the vineyard unto the reed, it happened therefore, thou having 60 heard me saying the word to Ioseph, thou understoodest the word, thou rejoicedst, and saidst thou, Where is he that I may see him or else I am remaining [110 ] for him in this place?\n\nBut it happened, Ioseph having heard thee saying these words he was disturbed, and we came up together, we went into the house: we found the spirit bound unto the place of lying, and we looked at thee with him, we found thee being like to him, and was loosened he who was bound unto the bed, he embraced thee, he kissed thee, and thou also thou kissedst him, ye became only one.\n\nThis therefore is the word with its explanation.\n\nThe mercy is the spirit which came out of the Height by the First Mystery: because that he had mercy on the race of the men, he dispatched his spirit for to forgive the sins of all the world, and for them to receive mystery and inherit the kingdom of the light.\n\nThe truth also is the power which sojourned in me, having come [110 ] out of the Barbelo, it became for thee for body material and it preached of the Place of the truth.\n\nThe righteousness is thy spirit, this which brought the mysteries out of the Height for him to give them to the race of the mankind."

