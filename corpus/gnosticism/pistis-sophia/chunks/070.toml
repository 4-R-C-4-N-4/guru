[content]
body = "But answered the First Mystery, said he to Martha, I command to thee Martha for to utter the 88 explanation of the words, these which said the Sophia in her hymn.\n\nBut answered Martha said she, My Lord, these are the words which thy power of light prophesied once by David in the seventh psalm, God is a judge of truth, strong, compassionate, being not wont to bring his anger day by day: if ye turn not yourselves he will whet his sword, he stretched his bow, he made (it) ready: he made ready in it [164 ] weapons of death, his arrows he fashioned for those whom they will burn.\n\nBehold, the violence travailed, he conceived trouble he brought forth unlawfulness, he dug a pit, he excavated it, he will fall down unto the hole which he fashioned, his trouble will turn upon his head and his violence (is) coming upon the middle of his head.\n\nBut these having said them Martha, said he to her the First Mystery who looketh outwards, Well (done and) fairly, Martha, the happy.\n\nIt happened therefore, Jesus having finished saying unto his disciples all the things which happened to the Pistis Sophia, being in the Chaos, and with the manner (in) which she hymned up unto the Light, until he delivered her and brought her up from the Chaos, [164 ] and brought her in unto the twelve Aeon, and with the manner (in) which he delivered her out of all her oppressions, with which oppressed her the Rulers of the Chaoses, because that she lusted to go (close) to the Light.\n\nAdded again in the word Jesus, said he to his disciples, It happened therefore after all these (things) I took away the Pistis Sophia, I brought her in unto the thirteenth Aeon, I, shining greatly greatly, there being not measure unto the light which was becoming from me, I came in unto the Place of the twenty-four (fourth, MS ) Invisibles, I, shining greatly greatly; and they were disturbed with great disturbance: they looked, they saw the Sophia who was being with me, they recognised her.\n\n[165 ] But I, they recognised me not who I (was), but they were thinking of me as of an emanation of the land of the Light.\n\nIt happened therefore, the Sophia having seen her fellow Invisibles, she rejoiced in great joy, and she was delighted greatly; she wished to show to them the wonders which I did with her below in the land of the mankind, until I delivered her.\n\nShe came up unto the midst of the Invisibles, she hymned unto me in their midst, saying, I shall manifest to thee, O Light, because thou art a Saviour, and thou art a redeemer at every time: I shall hymn this hymn unto the Light because he delivered me: and he delivered out of the hand of the Rulers [165 ] mine enemies.\n\nAnd thou deliveredst me in all the Places, and thou deliveredst me from 89 the exaltation and the humiliation of the Chaoses, and from the Aeons of the Rulers of the Sphere.\n\nAnd I having come out of the Height, I went astray in Places, there being not light in them.\n\nI could not return into the thirteenth Aeon my dwelling, because there is not light in me nor power, my power was defective altogether, and the Light delivered me from all my afflictions.\n\nI hymned up unto the Light, he heard me, they having afflicted me.\n\nHe guided me in the creation of the Aeons, for him to bring me up unto the thirteenth Aeon, my dwelling."

