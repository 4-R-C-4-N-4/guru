[content]
body = "And thou also art he who will deliver me from all their threats which are cruel.\n\nAnd also the word which said thy power by David, He will make shadow unto thee under his (thy, MS ) breast, and thou wilt trust under his wing, namely, that the Pistis Sophia became in the light of the effluence of Light, this which came out of thee, and she remained confident of heart, for the light which (is) on left of her [132 ] with that which (is) on right of her, namely the wings of the effluence of Light.\n\nAnd the word which thy 72 power of light prophesied by David, The truth will surround thee as armour (a weapon, MS ), that is the light of the effluence of Light, that which surrounded the Pistis Sophia on every side of her as armour.\n\nAnd the word which thy power said, He will not fear for a fear of night, namely, that the Pistis Sophia feared not for the fears with the disturbances, these in which they planted her in the Chaos which is the night.\n\nAnd the word which thy power said, He will not fear [133 ] for an arrow flying in the day, namely, that the Pistis Sophia did not fear for the power, this which the Self-willed dispatched out of the Height at the last, this which came unto the Chaos, being as an arrow flying, which thy power therefore of light said, Thou wilt not fear for an arrow flying in the day.\n\nBecause that power came out of the thirteenth Aeon, that is (that) which is lord over the twelve Aeons, and that is (that) which enlighteneth unto all the Aeons.\n\nBecause of this therefore he said, The day.\n\nAnd the word also which thy power said, He will not fear [133 ] for a thing, walking in the darkness, namely, that the Sophia did not fear for the emanation of face of lion (serpent, MS ) which was giving fear to the Pistis Sophia in the Chaos, namely, the darkness.\n\nAnd the word which thy power said, He will not fear for an accident with a demon of the hour of mid-day, namely, that the Pistis Sophia did not fear for the emanation demonic of the Adamas, the tyrant, this which thrust the Pistis Sophia down in great calamity, this which came from Adamas out of the twelve Aeons.\n\nBecause of this therefore said thy power, He will not fear [134 ] for a calamity of demon of the time of mid-day.\n\nThe time of mid-day is because it came out of the twelve Aeons, namely, the time of mid-day.\n\nAnd also Night, because it came out of the Chaos, namely, the night, and it came out of the twelve Aeons, which are between the two.\n\nBecause of this thy power of light said, The time of mid-day because the twelve Aeons are between the thirteenth Aeon and between the Chaos.\n\nAnd the word also which thy power of light said by David, There are thousand (who) will fall on left of him and a ten thousand on right of him; and they will not approach him, namely, [134 ] that when the emanations of the Self-willed One, these which are numerous greatly, they having not been able to support the great light of the effluence of Light, a multitude among them fell on left of the Pistis Sophia.\n\nAnd a multitude fell on right of her.\n\nAnd they were not being able to approach her to hurt her."

