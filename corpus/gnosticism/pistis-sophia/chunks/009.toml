[content]
body = "For I was enlightening in the Destiny more than the Sphere forty-nine of double of time.\n\nAnd were disturbed all the Rulers with [21 ] all those who become in the Destiny, and they fell upon one another, they became in great fear greatly, seeing the great light becoming from me.\n\nAnd they looked at my vesture of light, they saw the mystery of their name in my vesture, and they were made more disturbed, they became in great fear saying, In what manner did the Lord of the Universe pass through us, while we know (it) not?\n\nAnd were loosened all their bonds of their Places with their arrays with their houses: they came all together, they prostrated they worshipped at my presence, and they hymned all together unto the inward part of the inward parts, becoming in great fear with great disturbance.\n\nAnd I left that Place behind me, I came unto the great Aeons of the Rulers, [22 ] I came at their veils and with their gates, enlightening greatly greatly, and there being no measure unto the light which becometh from me.\n\nIt happened therefore when I had reached unto the twelve Aeons, were disturbed one upon another their veils and with their gates: drew (away) of themselves the veils, and their gates opened one upon another, and I went in unto their Aeons enlightening greatly greatly, there being no measure unto the light which becometh from me: more than the light in which I enlightened in the houses of the Destiny forty-nine of double of time: and all the Angels of the Aeons with their Archangels with their Rulers (Another (2nd) hand begins here.) with their Gods with their Lords 12 with their [22 ] Authorities and their Tyrants with their powers with their sparks with their luminaries, with their Unpaired-ones, with their Invisibles and with their Forefathers, with their Triple-powered-ones, they saw me enlightening greatly, there being no measure unto the light which becometh from me: and they were disturbed one upon another, and great fear fell upon them, seeing the great light which was becoming from me.\n\nAnd their great disturbance with their great fear reached even unto the Place of the great invisible Forefather, and with the three great Triple-powered-ones.\n\nBut through the great fear of their disturbance continued running hither and thither in his Place the great Forefather, [23 ] he with the three Triple-powered-ones.\n\nAnd they were not able to shut all their Places because of the great fear in which they were becoming: and moved all their Aeons together, with all their Spheres with all their orderings, fearing and being disturbed greatly because of the great light which was becoming from me, not as once was becoming from me being upon the earth of the mankind, having come upon me the vesture of light, for it was not possible for the World to endure the light, as it was in its truth, otherwise the World would have dissolved with all those who (are) upon it together.\n\nBut the light which was becoming from me in the twelve Aeons [23 ] was greater than that which became from me in the World together with you (of) eight thousand with seven hundred of ten thousand of double of time.\n\nIt happened therefore all those who become in the twelve Aeons, having seen the great light which was becoming from me, they were all disturbed one upon another, and they ran hither and thither in the Aeons, and moved one upon another all the Aeons with all the heavens with all their ordering, because of the great fear which became to them, because that they knew not the great mystery which became."

