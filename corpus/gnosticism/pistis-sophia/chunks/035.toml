[content]
body = "Thou hatedst those who keep that which is vain without cause; but I, I trusted, I shall be glad about the Lord, and I shall be delighted over thy mercy: because thou lookedst upon my humility and thou savedst my soul out of the necessities, and thou shutest not me up in the hands of the darkness, thou madest stand my feet in a [81 ] wide place: have mercy on me, O Lord, because I am afflicted.\n\nMine eyes were disturbed in the anger, and my soul with my belly.\n\nBecause my years failed in pain of heart, and my life failed in groanings.\n\nMy power was weakened in poverty, and were disturbed my bones.\n\nI became for reproach to all my enemies, and those who are near unto me.\n\nI became for fear to those who know me.\n\nAnd those who see me they ran away from me.\n\nThey forgot me as a corpse in their heart, and I was as a vessel which perished.\n\nBecause I heard the contempt of multitudes surrounding me round about me, in their gathering upon me together.\n\nThey counselled to take away my soul from me.\n\nBut I trusted unto thee, O Lord.\n\nI said, Thou art my God [81 ] my lot is being in thy hands.\n\nDeliver me from the hand of mine enemies and save me from those who persecute me.\n\nManifest thy face upon thy servant, and save me in thy mercy, O Lord.\n\nLet me not be ashamed because I cried up unto thee, let them be ashamed, the impious (ones), and (let) them turn them unto Amente.\n\nLet be silenced the lips of guile, those who utter unlawfulness at the just in pride with contempt.\n\nBut Jesus having heard these words, said he, Fairly (said) Maththaios.\n\nNow therefore, Amen I say to you, Whenever should be completed the perfect number, and the Universe be caught up, I shall sit in the Treasury of the Light, and ye also ye will sit upon twelve powers of light until we shall [82 ] restore all the arrays of the twelve Saviours unto the Place of the inheritance of each of them.\n\nBut these having said them, said he, Understand ye what I am saying?\n\nCame forward Maria, said she, O Lord, because of this 45 indeed thou saidst unto us once in a parable, Ye, ye were patient with me in the temptations, I shall establish with you a kingdom according as my Father established with me, that ye should eat and drink upon my table in my kingdom, and ye, ye will sit upon twelve thrones and judge the twelve tribes of the Israel.\n\nSaid he to her, Well (done) Maria.\n\nAdded also Jesus, said he to his disciples [82 ].\n\nIt happened therefore also after these (things), having oppressed the Pistis Sophia in the Chaos, the emanations of the Self-willed, she said the ninth Repentance, saying, O Light, Smite those who took away my power from me, and take away the power of those who took away mine from me, because I am thy power with thy light.\n\nCome and deliver me.\n\nLet a great darkness cover over those who oppress me.\n\nSay to my power, I am he who will deliver thee.\n\nLet them be diminished of their power, all these who wish to take away my light from me altogether.\n\nLet them turn them unto the Chaos, and let them be powerless, those who wish to take away my light from me altogether.\n\nLet their power become as dust, and let smite them Ieou thy [83 ] angel; and whenever they should set out to come unto the Height, let darkness catch them, and let them slide down, and let them turn them unto the Chaos.\n\nAnd let persecute them Ieou thy angel, and send them unto the darkness below."

