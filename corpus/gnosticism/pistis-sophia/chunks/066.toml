[content]
body = "He brought my soul up from the pit of the misery with the mire of the filth, he set my feet upon a rock, and he directed my footsteps.\n\nHe cast unto my mouth a new song, a blessing for our God.\n\nThere are many (who) will see and they (will) fear, and they (will) hope in the Lord.\n\nIt happened therefore, Andreas having uttered the meaning of the Pistis Sophia, said he to him the First Mystery, Well (done) Andrea the happy.\n\nBut added also in the word, said he to the disciples, These are all the words which happened to the Pistis Sophia.\n\nIt happened therefore, I having brought her unto the Place which is below of the [154 ] thirteenth Aeon.\n\nI came being about to go unto the Light, and cease (being) with her, said she to me, O Light of the Lights, being thou about to go unto the Light and cease from being with me: and (is about to) know the Adamas the tyrant, that thou ceasedst being with me, and to know that becometh not he who will deliver me: he cometh also unto me unto this Place, he with all his Rulers who hate me.\n\nAnd also the Self-willed will give power to his emanation of face of lion, and all (will) come and all oppress me at once, and (will) take away all my light from me, and I (shall) become powerless.\n\nAnd also I (shall) become lightless.\n\nNow therefore, O Light [155 ] and my Light, take away the power of their light from them, that they may not be able to prevail to oppress me from this hour.\n\nIt happened therefore, I having heard these words saying them the Pistis Sophia, I answered to her, saying, Not yet did my Father command to me, he who emanated me out, for to take away their light from them.\n\nBut I shall seal (up) their Places of the Self-willed with all his Rulers, these which hate thee, because thou believedst the Light.\n\nAnd also I shall seal (up) the Places of the Adamas with his Rulers, that they should not be able to war with thee, until their time is fulfilled, and until [155 ] cometh the season, and commandeth to me my Father, that I should take away their light from them.\n\nBut afterwards also said I to her.\n\nHear and I (will) speak with thee of their time in which these (things) will happen, namely, these which I said to thee, They are about to happen whenever (the) three times should be fulfilled.\n\nAnswered the Pistis Sophia, said she to me, O Light, whereby shall I know when (will) happen the three times, that I might be glad and rejoice because approached the time for thee to lead me unto my Place, and also I shall rejoice because came the time (when) thou wilt take away the powers of light from all those who hate 84 me, because I [156 ] believed thy light?\n\nBut I, I answered, said I to her, Whenever thou wilt see the gate of the Treasury of the great Light, this which is open unto the thirteenth Aeon, namely the Left, whenever they should open that gate, then were fulfilled the three times.\n\nAnswered also the Sophia, said she, O Light, whereby shall I know, being in this Place, that they opened that gate?\n\nBut I, I answered, said I to her, Whenever they open that gate, will know those who become in all the Aeons, because of the great light which will become in all their Places: nevertheless therefore, behold, I appointed that they should not dare (to do) unto thee anything of evil, until were fulfilled [156 ] the three times."

