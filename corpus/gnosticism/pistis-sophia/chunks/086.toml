[content]
body = "It happened therefore, the disciples having heard these words which said Jesus, they drew back and they were silent altogether.\n\nCame forward Maria the Magdalene, she prostrated at the feet of Jesus, she worshipped unto them, she cried out, she wept, said she, Have mercy on me, my Lord, or did my brothers hear and they were silent [201 ] at the words which thou sayest.\n\nNow therefore, my Lord concerning the knowing of all these words which thou saidst, becoming in the Mystery of the Ineffable; but I heard thee saying, From now I am about to begin speaking with you of all the knowledge of the Mystery of the Ineffable, This word therefore which thou sayst, didst not thou, then, 109 approach unto completing the word?\n\nBecause of this therefore my brothers heard, they were silent, they ceased perceiving how thou art speaking with them concerning the words which thou sayest to them.\n\nNow therefore, my Lord, if the knowledge of all these (things) is becoming in that Mystery, then who is the man who (is) in the World who [202 ] is able to understand that Mystery with all his knowledges, and the type of all these words concerning which thou saidst them.\n\nIt happened therefore, Jesus having heard these words which said Maria, he knew that having heard the disciples, they began to be silent, he encouraged them, said he to them, Grieve not therefore, my disciples, concerning the Mystery of the Ineffable, which ye think that ye will not understand.\n\nAmen I say to you, Yours is that Mystery, and that of every one who will hearken to you and renounce all the World with all the matter which (is) in it, and renounce all evil thoughts which become in them, and renounce all the cares of [202 ] this Aeon.\n\nNow therefore I say to you, Every one who will renounce all the World with all the (things) which (are) in it, and submit to the Godhead, that Mystery is easy for them more than all the Mysteries of the kingdom of the Light, and is fit to understand more than all of them, and is light ( levis ) more than all of them.\n\nHe who will come in unto the knowledge of that Mystery is wont to renounce all this World with all the cares which (are) in it.\n\nBecause of this therefore I said unto you once, Every one who is under care, and who toileth under his burden, come ye (close) to me that I may give rest to you, for light is my burden [203 ] and gentle is my yoke.\n\nNow therefore he who will receive that Mystery is wont to renounce all the World and with the care of all the matter which (is) in it.\n\nBecause of this therefore my disciples grieve not at your thoughts that that Mystery ye will not understand.\n\nAmen I say to you, That Mystery is fit to understand more than all the Mysteries: and Amen I say to you that that Mystery is yours with every one who will renounce all the World with all the matter which (is) in it.\n\nNow therefore hear, my disciples, and my friends and my brothers that I may urge you unto the knowledge of the Mystery of the Ineffable.\n\nThese (things) I speak with you [203 ], because I have come to say unto you the whole knowledge about the Distribution of the Universe, because the Distribution is (his) knowledge.\n\nBut now therefore hear that I may speak with you in advance concerning the knowledge of that Mystery: because that Mystery indeed is that which knoweth because 110 of what despoiled themselves the five Helpers, and because of what they proceeded out of the Fatherless (ones)."

