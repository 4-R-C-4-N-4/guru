[content]
body = "But answered the Saviour, said he to Iohannes in the midst of the disciples, [248 ] Whenever ye know in an exactness that that man renounced all the World with all its cares with all its life (politeia, MS ) with all its sins, and ye know in truth that he becometh not in guile nor was he becoming in hypocrisy, nor was he becoming curious that he should know the (things) of the mysteries that they are being of what kind; but he is wishing for God in truth, this of this kind, hide them not from him, but give to him out of the mysteries of the second Space with the third.\n\nAnd ye also (shall) prove that he is worthy of which mystery: and that which he is worthy of, give to him and hide not from him: (for) otherwise whenever ye 136 should hide (them) from him, ye are guilty of a great offence.\n\n[248 ] If ye should give to him once in the second Space or in the third, and he (should) turn also and do sin, ye shall continue also the second time until as far as the third time.\n\nIf also he should sin, ye shall not continue to give to him, because those three mysteries will become to him witness in his last repentance, and Amen I say unto you, He who will give mystery to that man again in the second Space or in the third, he is guilty of a great offence.\n\nBut let him become with you as transgressor and as scandal.\n\nAnd Amen I say unto you, That man they have not to cast back his soul unto the World from this hour, but his [249 ] dwelling place is in the midst of the mouth of the dragon of the Darkness which is outer, the place of the weeping with the gnashing of the teeth.\n\nAnd in the dissolution of the World his soul will become petrified and consumed by the cold which is cruel with the fire which is cruel greatly, and it will become non-existent unto age.\n\nBut if also yet whenever he should turn and renounce all the World with all its cares with all its sins, and become in a great life (politeia, MS ) with a great repentance, no mystery having been received from his repentance, nor they having heard of it, for them to have mercy on him and receive from him his repentance and forgive to him his sins, except the mystery of the First Mystery, and with the mystery of the Ineffable.\n\nThese only are they who will receive the repentance of that man [249 ] from him and will forgive his sins, because that compassions of mercy are those Mysteries, and they are forgivenesses of sin at every time.\n\nBut these having said them the Saviour, continued also Iohannes, said he, My Lord, suffer me seeking from thee, and be not angry with me, for I am seeking after every thing in an exactness with a certainty, concerning the manner (in) which we shall preach to the men of the World.\n\nBut answered the Saviour, said he to Iohannes, Seek after every thing which thou seekest after, and I shall reveal to thee more and more in boldness without parable, or in an exactness."

