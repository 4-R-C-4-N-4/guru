[content]
body = "And ye will become in a great wonder greatly greatly.\n\nAnd whenever I should take you unto the Place of the (Rulers of the) Destiny 93 [173 ] ye will see the glory in which they become, and out of their great glory which is preferable, ye will reckon this World with you as darkness of darkness: and ye will look out upon all the World of the mankind, being about to become the size of a speck of dust with you, from the great distance which it is distant from it greatly greatly, with the great size which it is great(er) than it greatly.\n\nAnd whenever I should take you unto the twelve Aeons, ye will see the glory in which they become, and from the great glory the Place of the Rulers of the Destiny will be reckoned with you as the darkness of the darknesses; and it will become the size of a speck of dust with you from the great distance which it is distant from it greatly, with the great size in which it is great(er) than [173 ] it greatly, according as I finished saying unto you another time.\n\nAnd again whenever I should take you unto the thirteenth Aeon, and ye will see the glory in which it becometh, the twelve Aeons will be reckoned with you of the darkness of the darknesses: and ye will look out upon the twelve Aeons being about to become the likeness of a speck of dust with you from the great distance which it is distant from it greatly, with the greatness of size in which it is great(er) than it greatly.\n\nAnd whenever I should take you unto the Place of the Middle, ye will see the glory in which they are, the thirteenth Aeon will be reckoned with you as the darkness of the darknesses.\n\nAnd also ye will look upon the twelve Aeons and with all the Destiny and all the arrangement, and with all the Spheres [174 ] with all their arrays in which they become, they will be the size of a speck of dust with you from the great distance which it is distant from it, and the great size (in) which it is great(er) than it greatly.\n\nAnd whenever I should take you unto the Place of those of the Right (hand), ye will see the glory in which they become, the Place of the Middle will be reckoned with you as the night which is in the World of the mankind: and if ye should look out upon the Middle, it will become the size of a speck of dust with you, from the great distance which the Place of those of the Right (hand) are distant from it greatly.\n\nAnd if I should take you unto the Land of the Light, namely, the Treasury of the Light, and ye (will) see the glory in which it becometh, [174 ] the Place of those of the Right (hand) will be reckoned with you as the light of the hour of mid-day in the World of the mankind, the sun being not out (of cloud): and if ye should look upon the Place of those of the Right (hand), it will be the size of a speck of dust with you, from the great distance which is distant from it greatly, the Treasury of the Light.\n\nAnd 94 whenever I should take you unto the Place of those who received the Inheritance, of those who received the mysteries of the Light, and ye (will) see the glory of the light in which they become, the Land of the Light will be reckoned with you as the light of the sun which is in the World of the mankind: and if ye should look [175 ] upon the Land of the Light, it will be reckoned with you as a speck of dust, from the great distance which is distant from it, the Land of the Light, and from the greatness which it is great(er) than it greatly."

