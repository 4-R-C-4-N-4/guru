[content]
body = "They will give to them the mysteries of the Light of the Height, these who were entrusted with the effluence of the Light.\n\nAnd also according as said thy power, They turned [122 ] lips which were dry, namely, Gabriel with Mikhael took not away for themselves the light of the Pistis Sophia, these which they snatched from the emanations of the Self-willed, but they cast them in unto the 67 Pistis Sophia.\n\nAnd also the word which it said, Received a cheerfulness of heart those who were dissolved, namely, that all the other powers of the Pistis Sophia, these which took not away the emanations of the Self-willed were cheerful very, and they were filled with light out of the other light, because they cast it in unto them.\n\nAnd the word which thy power said, They vivified souls giving-up the breath, that they should not die, [123 ] namely, that they having cast the lights in unto the Pistis Sophia they vivified the body of her matter, this from which they took away its light at first, this which was about to perish.\n\nAnd also the word which thy power said, They set up limbs which fell, (or that they should not fall), namely, that they having cast in unto her her lights, they set up all her powers, these which were about to be dissolved.\n\nAnd also according as thy power of light said, They gave a power to their boldness, namely, that they took again their light, and they became as they were being at first.\n\nAnd also the word which [123 ] said, They gave a light unto their eyes, namely, that they received perception from the light, and they knew the effluence of Light, that it is belonging unto the Height.\n\nAnd also the word which it said, They all knew them in the Lord, namely, that all the powers of the Pistis Sophia knew one another by the effluence of Light.\n\nAnd also the word which it said, They were delivered by a water of life eternal, namely, that they were delivered by the whole the effluence of Light.\n\nAnd the word which it said, Drew them all the effluence of Light.\n\nAnd it drew them toward the Temple, namely, that the effluence of Light [124 ] having taken up all the lights of the Pistis Sophia and having snatched them from the emanations of the Self-willed, it cast them in unto the Pistis Sophia and it returned, it came out of the Chaos, it came upon thee, who thyself art the Temple.\n\nThis is the explanation of all the words, these which said thy power of light by the Ode of Solomon.\n\nIt happened therefore, the First Mystery having heard these words, saying them Petros, said he to him, Well (done), O happy Petros, this is the explanation of the words which they said.\n\nBut added also in the word the First Mystery said he, It happened therefore, I having not yet brought the Pistis Sophia up from the Chaos, because that they had not yet commanded to me by my Father, [124 ] the First Mystery who looked inward.\n\nThen therefore after these (things) having known the emanations of the Self-willed that my effluence of Light took away the powers of light from them, these which they took away from the Pistis Sophia, it cast them in unto the Pistis Sophia, and also they saw the 68 Pistis Sophia becoming light as she was being from at first, they were angry with the Pistis Sophia, and also they cried up against their Self-willed for to come and help them and take away the powers which (are) in the Sophia another time."

