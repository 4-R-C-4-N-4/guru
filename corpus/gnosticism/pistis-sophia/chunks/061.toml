[content]
body = "And the word which thy power said, I became prevailing in thy truth, and cleansed in thy righteousness.\n\nThat is the word which said the Pistis Sophia, I became prevailing by thy light.\n\nAnd I am becoming light which is purified by thy effluence.\n\nAnd the word which thy power said, Were distant from me those who fight against me.\n\nThat is the word which said the Pistis Sophia, Were distant from me the emanations of the Self-willed, these which were oppressing me.\n\nAnd the word which thy power of light said by Solomon, And I was justified in thy kindness, because thy rest becometh [142 ] even unto age of age.\n\nThat is the word which said the Pistis Sophia, I was delivered in thy kindness, because thou, thou art wont to deliver every one.\n\nThis therefore, my Lord is all the explanation of the repentance 77 which said the Pistis Sophia, she having been delivered from the Chaos, and she was loosened out of the bonds.\n\nIt happened therefore, the First Mystery having heard Thomas saying these words, said he to him, Well (done and) fairly, Thomas, the happy: this (is) the explanation of the hymn which said the Pistis Sophia.\n\nBut he added also the First Mystery, said he to the disciples, But [143 ] added also the Pistis Sophia, she hymned up unto me saying, I hymn up unto thee this, through thy precept; thou broughtest me from the Aeon which is high, which (is) the upper part, and thou broughtest me down unto the Places which (are) below.\n\nAnd also by thy precept thou deliveredst me out of the Places which (are) below.\n\nAnd through thyself thou tookest away the matter there which becometh in my powers of light, and I saw it.\n\nAnd thou art he who scatterest away from me the emanations of the Self-willed these which were oppressing me, and being enemies unto me.\n\nAnd thou gavest to me the authority for to loosen [143 ] the bonds of the emanations of the Adamas, and thou struckest the serpent of basilisk, that of the seven heads: thou castest him out of my hands, and thou madest me stand upon his matter, thou destroyedst it, that this seed should not rise (up) from this hour.\n\nAnd thou art he who was being with me, giving power to me in all these (things).\n\nAnd thy light surrounded me in every Place.\n\nAnd through thyself thou madest all the emanations of the Self-willed powerless: because thou tookest away the power of their light from them.\n\nAnd thou directedst my way to bring me out of the Chaos.\n\nAnd thou removedst me out of the material darkness, and thou tookest away all my powers from them, [144 ] these (powers) whose light they took away.\n\nThou castest in unto them a light being purified, and all my members, these in which there is not light, thou gavest to them a light being purified out of the light of the Height.\n\nAnd thou directedst the way for them.\n\nAnd the light of thy face, it became to me manifest incorruptible.\n\nThou broughtest me up to that which is above the Chaos, the Place of the Chaos with the destruction, that should be dissolved all the matters which (are) in it, these which become in that Place and became new all my powers by thy light, and thy light became in them all: thou puttest the light of thy effluence in me, I became light being purified.\n\n[144 ] This again is the second hymn which said the Pistis Sophia.\n\nHe who understandeth therefore this repentance, let him come forward and say it."

