[content]
body = "And that Mystery indeed is that which knoweth because of what the Slander became, and because of what the Word which is good [194 ] became: and that Mystery indeed is that which knoweth because of what the Obedience became, and because of what the Disregard of man became.\n\nAnd that Mystery indeed is that which knoweth because of what the Murmuring became, and because of what became the Innocence with the humility.\n\nAnd that Mystery indeed is that which knoweth because of that became the Sinfulness, and because of what became the Purity.\n\nAnd that Mystery indeed is that which knoweth because of what became the Strength, and because of what became the Weakness.\n\nAnd that Mystery indeed is that which knoweth because of what became the Movement of the body, and because of what became its usefulness.\n\nAnd that Mystery indeed is that which knoweth because of what became the Poverty, and because of what became [194 ] the Wealth.\n\nAnd that Mystery indeed is that which knoweth because of what became the Wealth of the World, and because of what became the Slavery.\n\nAnd that Mystery indeed is that which knoweth because of what became the Death, and because of what became the Life.\n\nIt happened therefore, Jesus having finished saying these 105 words unto his disciples they rejoiced in great joy and they were delighted, hearing Jesus saying these words.\n\nAdded also Jesus in the word, said he to them: Yet therefore my disciples, hear now that I may speak with you concerning all the knowledge of the Mystery of the Ineffable, because the Mystery of that Ineffable indeed is that which knoweth because of what became the Mercilessness, and because of what became the Mercy.\n\nAnd that Mystery [195 ] indeed is that which knoweth because of what became the Destruction, and because of what became the Always eternal.\n\nAnd that Mystery indeed is that which knoweth because of what became the creeping things, and because of what they will be dissolved.\n\nAnd that Mystery indeed is that which knoweth because of what will become the Wild-beasts and because of what they will be dissolved.\n\nAnd that Mystery indeed is that which knoweth because of what became the Beasts, and because of what became the Birds.\n\nAnd that Mystery indeed is that which knoweth because of what became the Mountains, and because of what became the Precious stones which (are) in them.\n\nAnd that Mystery indeed is that which knoweth because of what became the Matter of the Gold, and because of what became the Matter of the Silver.\n\nAnd that Mystery [195 ] indeed is that which knoweth because of what became the Matter of the Brass, and because of what became also the Matter of the Iron with the Steel.\n\nAnd that Mystery indeed is that which knoweth because of what became the Matter of the Tin, and because of what became the Matter of the Lead.\n\nAnd that Mystery indeed is that which knoweth because of what became the Matter of the Glass, and because of what became the Matter of the Wax.\n\nAnd that Mystery indeed is that which knoweth because of what became the Grass, namely, the Vegetables.\n\nAnd because of what became all the Matters.\n\nAnd that Mystery indeed is that which knoweth because of what became the Waters of the earth and every thing which (is) in them, and because of what the Earth also became.\n\nAnd that Mystery indeed is that [196 ] which knoweth the Seas became because of what, with the Waters, and because of what became the Wild-beasts in the Sea.\n\nAnd that Mystery indeed is that which knoweth because of what became the Matter of the World, and because of what it will be dissolved altogether."

