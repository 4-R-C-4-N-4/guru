[content]
body = "These (things) therefore while the First Mystery is saying unto the disciples, that they happened to the Pistis Sophia in the Chaos, answered, said he to them, Do ye understand in what manner I am speaking with you?\n\nCame forward [120 ] Petros, said he, My Lord, concerning the explanation of the words which thou saidst, thy power of light prophesied about them once by Solomon in his Odes, Came out an effluence it made a great river being wide, it drew all (things) and it turned itself toward the Temple.\n\nThey were not able to lay hold on it with strong-banks, with places built: nor were able to lay hold on it the arts of those who lay hold on the waters: they brought it over all the earth, and it laid hold on all.\n\nDrank those who became upon the sand which is dry: their thirst was dissolved and it was quenched, they having given to them the drink from that which is exalted: happy (ones) are the deacons [120 ] of that drink, those who were entrusted with the water of the Lord: they turned lips which were dry, took a cheerful heart those who were brought low: they laid hold on souls giving up the 66 breath, that they should not die: they set up the limbs which fell, they gave power to their boldness, and they gave light to their eyes: because they all knew themselves in the Lord, and they were delivered through a water of life eternal.\n\nHear therefore, my Lord and I (shall) utter the word in boldness, according as thy power prophesied by Solomon.\n\nAn effluence came out it became a great river being wide, namely, that the effluence of Light was wide [121 ] out in the Chaos in all the Places of the emanations of the Self-willed.\n\nAnd the word also which thy power said by Solomon, It drew all (things), it brought them toward the Temple, namely, that it drew all the powers of light out of the emanations of the Self-willed, these which they took away from the Pistis Sophia, and it cast them in unto the Pistis Sophia another time.\n\nAnd the word also which thy power said, Were not able to lay hold on it strong-banks with places built, namely, that the emanations of the Self-willed were not able to lay hold on the effluence of Light in the wall of the darkness of the Chaos.\n\nAnd the word [121 ] also which it said, They brought it over all the earth, and it filled every thing, namely, that Gabriel with Mikhael they having brought it upon the body of the Pistis Sophia, it cast in unto her all the lights, these which took away from her the emanations of the Self-willed and became light the body of her matter.\n\nAnd the word which it said, Drank those who become upon the sand which is dry, namely, that received light all those which become in the Pistis Sophia, these whose light they took away at first.\n\nAnd the word which it said, Their thirst was dissolved and it was quenched, namely, that her power ceased being diminished of light and they were satisfied with light, because they gave (back) to them their light [122 ] which they took away from them.\n\nAnd also according as also said thy power, They gave to them the drink through him who is exalted, namely, that they gave the Light to them through the effluence of Light, this which came out of me, I the First Mystery.\n\nAnd according as said thy power of light, Happy are the deacons of that drink, namely, the word which thou saidst, Mikhael with Gabriel, these who served they took the effluence of Light unto the Chaos, and also they brought it up (from Chaos)."

