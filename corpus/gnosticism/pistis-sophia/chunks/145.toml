[content]
body = "A PART OF THE BOOKS OF THE SAVIOUR [318 ] It happened therefore, they having crucified our Lord Jesus, He rose out of those who are dead on his third day, gathered unto him his disciples, they prayed him, saying, Our Lord be compassionate to us, because we forsook father and mother with all the World, we followed thee.\n\nThen Jesus stood (up) with his disciples at the water of the Ocean and he invoked with this prayer saying, Hear me, my Father, the Father of every fatherhood, the boundless Light: a e ē i o u ō i a o a o i ō i a psinother— ther(i)nops—nōpsither—zagourē—pagouri—nethmomaoth— nepsiomaoth—marakhakhtha—thobarraban—tharnakhakhan— zorokothora—Ieou—sabaoth: But these saying them Jesus, Thomas with Andreas with Iakobos with Simon the Kananites they were being on the west, their faces being turned unto the east.\n\n[319 ] But Philippos with Bartholomaios, they were being on the south, being turned unto north.\n\nBut the remainder of disciples with the women disciples, they were standing behind Jesus.\n\nBut Jesus was standing at the altar, and cried out Jesus, turned him(self) about it unto the four corners of the World with his disciples, all being wrapped in linen garments, saying, i a o i a o (written above) i a o.\n\nThis is its (his, MS ) interpretation i ō t a, The Universe came out alpha, They will turn them.\n\nō, Will become the completion of all the completions.\n\nBut these he having said them Jesus, said he, Iaphtha iaphtha mounaēr, mounaēr, ermanouēr, ermanouēr, which is this, O Father of every fatherhood of the Boundless Ones, thou shalt hear me concerning my disciples whom I brought into thy presence, because that they shall believe every word of thy truths: [319 ] and do thou everything which I shall cry up unto thee concerning them: because I know the name of the Father of the Treasury of the Light.\n\nAgain also cried out Jesus, who Aberamenthō is, saying the name of the Father of the Treasury of the Light, and said he, Let all the mysteries of the Rulers with the authorities, with the Angels with the Archangels, with every power, with every work of the invisible God ag(x corrected)rammakhamar(inserted)ei with the Barbēlo 181 the bdella, let them draw near apart and separate them(selves) on (the) right (hand).\n\nBut at that hour all the heavens came unto the west with all the Aeons with the Sphere with their Rulers with all their powers, they ran all unto the west on (the) left (hand) of the disk of the sun with the disk of the moon.\n\nBut the disk of the sun was being a great dragon with his tail within his mouth, being mounted on [320 ] seven powers of the Left, and drawing under him viz.: four powers being in the likeness of white horses: but the going (basis, MS ) of the moon was being of the type of a ship, with a dragon male with a dragon female being for rudder unto it, with two calves of white drawing under it, with the likeness of a child behind the moon steering the dragons who rob the light of the Rulers from them: with a face of cat in front of him.\n\nAnd all the World with the mountains with the seas ran all of them unto the west unto the left."

