[content]
body = "Now therefore say unto them, If ye knew the face of the heaven with the earth out of the winds, Whenever some therefore now should come up (close) to you and preach to you a Godhead, and ye know in an exactness that their words agreed and suited (to) all your words, these which I said unto you by witnessings two up to three, and they have agreed in the constitution of the air with the heavens with the cycles with the stars (aster) with the planet (phoster) with all the earth with all which are in it with all the waters also with all which are in them, say unto them, Those who come [315 ] unto you and their words suit and agree in all the knowledge which I said unto you, then receive them (as) belonging unto us.\n\nThese are the (things) which ye will say unto the men to whom ye preach, that they should keep them(selves) from the teachings of error.\n\nNow therefore because of the sinners I despoiled my(self) I came unto the World, 178 that I should deliver them, because that the righteous (ones) indeed, these who did not do any of evil ever, and these who did not do sin at all, it is necessary for them to find the mysteries, these which (are) in the Book of Ieou, these which I caused Enokh to write in the paradisos, while speaking with him out of the Tree of the Knowledge and out of the Tree of the life.\n\nAnd I caused him to put them in the rock of Ararad.\n\nAnd I put Kalapatauroth, the Ruler who (is) over Ghemmout, this (one) upon whom are the feet [316 ] of Ieou, and he it is who goeth round all the Aeons with the Destinies.\n\nThat Ruler I put him being vigilant unto the Books of Ieou because of the Flood, and that no Ruler should envy them and should destroy them.\n\nThese which I shall give to you whenever I finish saying unto you the Distribution of the Universe.\n\nThese therefore having said them the Saviour, answered Maria, said she, My Lord, then who therefore also is the man who is upon the World, who sinned not at all, this (one) being sound from unlawfulness?\n\nFor whenever he should be sound from one he will not be able to be sound from another, that he should find the mysteries which are in the Books of Ieou.\n\nFor I say that there is not man upon the World who will be able to be sound from sin.\n\nFor whenever he should be able to be sound from one he would not be able to be sound from another.\n\nAnswered the Saviour, said he to Maria, I [316 ] say to you that they will find one in thousand, two in ten thousand because of the completion of the mystery of the First Mystery, these which I shall say whenever I should finish Distributing to you the Universe.\n\nBecause of this therefore I despoiled my(self) I brought the mysteries unto the World, because they become all under the sin, and they all come short of the free-gift of the mysteries.\n\nAnswered Maria, said she to the Saviour, My Lord, before that thou camest unto the Place of the Rulers, and before that thou camest into the World did no soul go unto the Light?\n\nAnswered the Saviour said he to Maria, Amen amen I say unto you, Before that I came unto the world not any soul went in unto the Light.\n\nAnd now therefore I having come, I opened the gates of the Light, and I opened the roads which take in unto the Light.\n\nAnd now therefore [317 ] he who will do that which is worthy of the mysteries, let him receive the mysteries and go unto the Light."

