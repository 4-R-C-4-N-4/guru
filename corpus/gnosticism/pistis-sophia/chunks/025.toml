[content]
body = "This therefore is the explanation of the third repentance which said the Pistis Sophia hymning unto the Height.\n\nIt happened therefore, Jesus having heard Martha saying these words, said he, Well done, Martha, and fairly (said).\n\nAdded also [59 ] Jesus in the word, said he to his disciples, Added also the Pistis Sophia saying in the fourth Repentance, before that afflicted her the second time, for to take away all her 32 other light which is in her, even the power of face of lion with all the material emanations which (are) with her, these which the Self-willed sent unto the Chaos.\n\nShe said therefore this repentance thus, O Light unto which I trusted, hear my repentance and let my shout come in unto thy abode.\n\nTurn not thy image of light away from me, but take heed unto me, whenever they should afflict me.\n\nHasten, deliver me at the time when I shall cry up unto thee.\n\n[59 ] Because my time failed as a breath, and I became matter.\n\nThey took away my light from me.\n\nAnd my power dried up.\n\nI forgot my mystery this which I was wont to do at first.\n\nFrom the shout of the fear with the power of the Self-willed my power failed in me—I became as a mere demon, dwelling in matter in which there is not light.\n\nAnd I became as a counterfeit spirit, being in a material body in which there is not power of light.\n\nAnd I became as a dekan, being over the air, alone.\n\nAfflicted me greatly the emanations of the Self-willed, and had said in him(self) my partner.\n\nInstead of the light which is in her, they filled her with Chaos.\n\nI swallowed (down) the sweat [60 ] of my own matter and with the anguish of the tears of the matter (deleted in MS.\n\n) of mine eyes, lest they should take away these also, those who afflict me.\n\nAll these (things), O Light, happened to me through thy precept and with thy commandment.\n\nAnd thy precept is for me to become in these (things): thy precept brought me down, and I came down as a power of the Chaos.\n\nAnd my power was benumbed in me.\n\nBut thou O Lord art Light unto age, and thou art wont to visit those who are afflicted at every time.\n\nNow therefore, O Light, arise and seek after my power with the soul which is in me.\n\nCompleted was thy precept which thou orderedst unto me in my afflictions.\n\nMy time became for thee to seek after my power with my soul.\n\nAnd this is the [60 ] time which thou orderedst to seek after me, because thy redeemers sought after the power which is in my soul: because completed was the number, and (the time) for them to deliver her matter also.\n\nAnd then at that time all the Rulers of the material Aeons they will fear thy Light, and all the emanations of the thirteenth material Aeon they will fear the mystery of thy light, to cause the others to put on the purification of their light.\n\nBecause the Lord will seek after the power of your soul: he manifested his mystery, that he should look at the repentance of those who become in the Places below, and he did not forsake their repentance.\n\nThis therefore is that mystery [61 ] this which became type for the race which they are about to beget, and the race which 33 they are about to beget will hymn unto the Height: because the Light looked out the Height of his Light, he will look over all the matter to hear the groan of those who are bound, to let loose the power of the souls, those whose power they bound, for him to put his name in the soul and his mystery in the power."

