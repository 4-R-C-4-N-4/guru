[content]
body = "Answered also the Saviour, said he to Iohannes, Not only forgive to him as far as seven times, but Amen I say to you, Forgive him as far as seven times of a multitude of times: and give to him every time the mysteries from the beginning, these which are in the first Space from without (the outward part, MS ): perhaps indeed ye will gain the soul of that brother, and he (will) inherit the kingdom of the Light.\n\nBecause of this when ye had asked me once, saying, Whenever [244 ] our brother should sin against us, wishest thou for us to forgive to him as far as seven times?\n\nI answered, I said to you in a parable, saying, Not only as far as seven times, but as far as seven of seventy times.\n\nNow therefore forgive to him a multitude of times, and give to him every time the mysteries which (are) on the outward part, these which are in the first Space: perhaps indeed ye (will) gain the soul of that brother, and he (will) inherit the kingdom of the Light.\n\nAmen, amen I say to you, He who will vivify one soul, and deliver it, beside the glory which he hath in the kingdom of the Light he will receive other glory on account of the soul which he delivered: so that he who will deliver a multitude of souls, beside the glory which he hath in (the kingdom of the Light) [244 ] he will receive other multitude of glory on account of the souls which he delivered.\n\nThese therefore having said them the Saviour, sprang up Iohannes said he, My Lord, bear with me, seeking from thee, for from now I am about to begin to seek from thee concerning everything, concerning the manner in which we are to preach to the mankind.\n\nIf therefore that brother, whenever I should give to him a mystery among the mysteries of the beginning, these which become in the first Space from without (the outward part, MS ), whenever I should give to him a multitude of mysteries, and he doeth not that which is worthy of the kingdom of the heavens, wishest thou for us to 134 pass him on in unto the mysteries of the second Space, perhaps we (shall) gain the soul of that brother, and he (will) turn and repent and inherit the kingdom of the Light?\n\nWishest thou for us to pass him on in [245 ] unto the mysteries or otherwise, these which (are) in the second Space?\n\nBut answered the Saviour said he to Iohannes, If a brother is being not hypocritical, but wisheth for God in truth, ye having given to him a multitude of times the mysteries of the beginning, and this because of the compulsion of the elements of the Destiny, he having not done that which is worthy of the mysteries of the kingdom of the Light, forgive to him, pass him on in, give to him the first mystery which is in the second Space: perhaps indeed ye (will) gain the soul of that brother.\n\nAnd if, having not done that which is worthy of the mysteries of the Light, and he did the transgression with every sin (the sins the sins, MS ) and also after these he turned, he became in a great repentance, and he renounced all the World, and he ceased from all the sins of the World, and ye knew in an exactness that [245 ] he was not being hypocritical, but wishing for God in truth, turn again, forgive to him, pass him on inwards, give to him the second mystery in the second Space of the First Mystery: perhaps indeed ye (will) gain the soul of that brother and he (will) inherit the kingdom of the Light."

