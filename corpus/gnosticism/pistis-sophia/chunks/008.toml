[content]
body = "Hasten therefore put this vesture on thee, come even unto us because we (may) wait for thee, for us to put on thee thy two vestures by the command of the First Mystery (Margin: these which become to thee from the first together with the First Mystery) until the time is fulfilled, this which is defined by the Ineffable.\n\nBehold, therefore, was fulfilled the time.\n\nCome therefore unto us in haste that we may put them on thee, until thou completest all the service of the completion of the First Mystery, this (service) which is defined by the Ineffable.\n\nCome, therefore, unto us quickly that we may put them on thee according to the command of the First Mystery.\n\nFor yet other little time is very short: thou comest up to us and thou wilt cease (being) in the World [19 ].\n\nCome, therefore, quickly that thou mayest receive all thy glory, which is the glory of the First Mystery.\n\nIt happened therefore, I, having seen the mystery of all these words in the vesture which he dispatched to me, I put it on me in that hour: and I enlightened greatly greatly, and I flew unto the Height, and I came at the gate of the firmament enlightening greatly greatly, there being no measure unto the light with which I was becoming.\n\nAnd were disturbed upon one another the gates of the firmament, all were opened at once, and all the Rulers with all the Authorities, with all the Angels who (were) in it, they were all disturbed together because of the great light which becometh from me.\n\nAnd they looked at the vesture of light which (was) on me, which [20 ] enlighteneth, they saw the mystery on which is being their name, they feared greatly greatly, and were loosened all their bonds, these in which they are bound, and each one ceased from his array.\n\nAnd they prostrated all before my presence, they worshipped, saying, In what manner passed through us the Lord of the Universe, while we knew (it) not?\n\nAnd they all hymned together unto the inward part of the inward parts.\n\nBut I, they were seeing me not, but they were seeing the light only, and they were becoming in great fear and they were disturbed greatly, and they hymned unto the inward part of the inward parts: but I left that Place, I came up unto the first Sphere enlightening greatly greatly, more than as I enlightened [20 ] in the firmament forty-nine of double of time.\n\nIt happened therefore, I having reached the gate of the first Sphere, were disturbed its gates and they opened themselves at once.\n\nI came into the houses of the Sphere enlightening 11 greatly greatly, there being no measure unto the light which becometh from me; and were disturbed upon one another all the Rulers with all those who become in that Sphere, and they saw the great light which becometh from me, and they looked at my vesture, they saw the mystery of their name in it and they were disturbed and they became in great fear, saying, How did the Lord of the Universe pass through us while we knew (it) not?\n\nAnd were loosened all their bonds and with their Places [21 ] with their arrays.\n\nAnd each ceased in his array.\n\nThey prostrated all together, they worshipped at my presence or at presence of my vesture and they hymned all together unto the inward part of the inward parts, becoming in great fear with great disturbance.\n\nAnd I left that place behind me, I came even unto the gate of the second Sphere, this, namely, the Destiny.\n\nBut were disturbed all her gates, and they were opened one on another, and I went in unto the houses of the Destiny enlightening greatly greatly, there being no measure unto the light which becometh from me."

