[content]
body = "They (the souls) are wont to spend hundred thirty three years with nine months in the punishment of her Places, while she tormenteth them in the fire of her evil doing.\n\nIt is 185 wont to happen therefore after all these times, whenever the Sphere should turn round and the little Sabaoth the Zeus cometh unto the first of the Aeons of the Sphere, this (one) whom they are wont to call in the World the Ram of the Bubasti, namely the Aphrodite.\n\n[326 ] Whenever (Aphrodite) should come unto the seventh House of the Sphere, namely, the Balance, they are wont to draw (away) the veils which are between those on the Left with those on the Right, and is wont to look out of the Height among those on the Right the great Sabaoth the good, and all the World with all the Sphere (are troubled) before that he looked: and he looked down upon the Places of the Paraplex, and her Places dissolved and perished.\n\nAnd all the souls which (are) in her punishments, they are wont to take them away and throw them back unto the Sphere another time, because that they were (being) destroyed in the punishments of the Paraplex.\n\nHe added also in the word, said he, (The Ruler of) the second array they are wont to call him Ariuth the Ethiopian-woman, being a woman Ruler being quite black, with fourteen other demons under her, they ruling over many other demons.\n\n[326 ] And these demons which are there, who are under Ariuth the Ethiopian-woman, they are those which are wont to go in unto the men quarrelsome, until they excite the wars and killings which happen; and give hardness to their heart and anger, for killings to happen.\n\nAnd the souls, which this authority will take away by robbery are wont to spend hundred with thirteen years in her Places, she is tormenting them by her smoke of darkness with her evil fire, and they draw near unto destruction.\n\nAnd after these (things) whenever the Sphere should turn round, and (should) come the little Sabaoth the good, this whom they are wont to call in the World Zeus; whenever he should come unto the fourth Aeon of the Sphere which the Crab is, and (should) come the Bubasti, this whom they are wont to call in the World, The aphrodite, and she (should) come unto the [327 ] tenth House (Aeon, MS ) of the Sphere, this which they are wont to call, The He-goat, then they are wont to draw (back) the veils which are between those of the Left with those of the Right, and Ieou (should) look out on the Right and all the World should be disturbed, and (should) be moved with all the Aeons of the Sphere and (should) look upon the dwelling places of Ariuth the Ethiopian-woman and her Places (should) be dissolved and be destroyed, and they should take away all the souls which are in her punishments, and (they) should throw them (back) unto the Sphere another 186 time, because that they perished by her smoke of darkness with her evil fire.\n\nAdded also said he, The (Ruler of the) third array they are wont to call, The hecate the three of face, but there are twenty seven other demons under her authority: they are those which are wont to go in unto the men and they cause them to swear false(ly) and [327 ] they lie, and love that which is not their own."

