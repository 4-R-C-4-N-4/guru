[content]
body = "And 166 that man came out of the body before that he repented again and received mystery again in the mysteries, those which (are) within the mysteries which he finished receiving, these which they are wont to receive again for the repentance, and they forgive the sins; and he having come out of the body we knew in an exactness that they took him away in unto the midst of the dragon of the Darkness which is outer on account of the sins which he did.\n\nAnd that man hath not helper upon the World nor compassionate (one) for him to make the mystery of the Ineffable, even until they should remove him out of the midst of the dragon of the Darkness which is outer, and take him in unto the kingdom of the Light.\n\nNow therefore, my Lord, [297 ] then what is that which he will do until he is delivered from the punishments of the dragon of the Darkness which is outer?\n\nNay, O Lord, forsake him not because he suffered in the persecutions and in the whole Godhead in which he becometh.\n\nNow therefore O Saviour, have mercy on me, lest at any time any one of our kindred should become in this type of this kind.\n\nAnd have mercy on all the souls who will become in this type, because thou art our key which openeth (the) door of the Universe and which shutteth (the) door of the Universe, and thy mystery is that which extendeth to them all.\n\nAio, O Lord, have mercy on the souls of this kind, because they named indeed thy mysteries on one day, and they believed them truly, and because they were not becoming in hypocrisy.\n\nAio, O Lord, give to them a free-gift in thy goodness, and give to them a rest which is in [297 ] thy mercifulness.\n\nThese therefore having said them Maria, called her happy the Saviour greatly greatly on account of the words which she saith.\n\nAnd became in great mercy the Saviour, said he to Maria, Every man who will become in this type which thou sayest, yet being alive, give to them the mystery of one of the twelve names of the chambers of the dragon of the Darkness which is outer, these which I shall give to you whenever I should finish distributing to you the Universe from within out and from without in.\n\nAnd every man who will find the mystery of one of the twelve names of that dragon of the Darkness which is outer, and every man even though they are sinners greatly, and having received the mysteries of the Light at first (but) afterwards they transgressed, or otherwise indeed they did not do any mystery at all.\n\nThese whenever they should complete [298 ] their cycle in the changes (of body).\n\nAnd these of this kind, when they should come out of body having not repented again, and they take them unto the punishments which are in the midst of the dragon of the 167 Darkness which is outer, and are left in the cycles, and are left in the punishments which (are) in the midst of the dragon, and these knowing the mystery of one of the twelve names of the Angels, being alive, being become in the World, and they say one of their names, being within in the midst of the punishments of the dragon, (and the hour (in) which they will say it, is wont to shake the whole dragon, M ), and he is wont to be disturbed greatly greatly.\n\nAnd the chambers in which are in the souls of those men is wont to open its doors toward the heaven, and is wont the Ruler of the chamber in which become those men, and he is wont to cast the souls of those men [298 ] out of the midst of the dragon of the Darkness which is outer, because they found the mystery of the name of the dragon."

