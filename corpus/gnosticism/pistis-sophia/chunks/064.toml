[content]
body = "But added also the First Mystery, said he, But added also the Pistis Sophia in this hymn, said she, I [149 ] shall say, Thou art the Light, that which is high, because thou deliveredst me; and thou broughtest me (close) to thee; and thou causedst them not to take away my light, even the emanations of the Self-willed, these which are enemy unto me: O Light of the Lights I hymned up at thee, thou deliveredst me, O Light, thou broughtest my power up from the Chaos.\n\nThou deliveredst me from those who went down unto the darkness.\n\nThese words also said the Pistis Sophia.\n\nNow therefore he whose mind became intelligent, having understood the words which said the Pistis Sophia, let him come forward and utter their explanation.\n\nIt happened therefore, the First Mystery having finished saying these words unto the disciples, came forward Maria, said she, My Lord, my mind intelligent is at every time, for me to come forward at every moment and utter the explanation of the words which she said.\n\nBut [150 ] I am fearing Petros, because he is wont to threaten me, and he hateth our sex.\n\nBut these she having said them, said he to her the First Mystery, Every one who will be filled with the spirit of light for to come forward, and utter the explanation of the things 81 which I say, there is not anyone (who) will be able to prevent him.\n\nNow therefore, thou O Maria, utter the explanation of the words, these which said the Pistis Sophia.\n\nAnswered therefore Maria, said she to the First Mystery in the midst of the disciples, My Lord, concerning the explanation of the words which said the Pistis Sophia, thy power of light prophesied them once by David, I shall exalt thee, O Lord, because thou acceptedst me, and thou didst not cause to rejoice my enemies over me.\n\nO Lord my God, I [150 ] cried up unto thee and thou healedst me.\n\nO Lord, thou broughtest my soul up from Amente, thou savedst me from those who went down unto the pit.\n\nThese having said them Maria, said he to her, the First Mystery, Well (done and) fairly, Maria the happy.\n\nBut he added also in the word, said he to the disciples, Added also the Pistis Sophia in this hymn, said she, The Light became to me for deliverer, and turned my darkness for me unto light, and it rent asunder the Chaos, which surroundeth me, he girded me with light.\n\nIt happened therefore when the First Mystery finished saying these words, came in front Martha, said she, My Lord thy power prophesied once [151 ] by David concerning these words, The Lord became to me helper, he turned my mourning for me unto joy, he rent asunder my sackcloth he girded me with gladness.\n\nBut it happened, the First Mystery having finished hearing these words, saying them Martha, said he, Well (done and) fairly, Martha.\n\nBut added also the First Mystery, said he to the disciples.\n\nAdded also in the hymn the Pistis Sophia and said she, My power hymn unto the light, and forget not all the powers of the light, these which he gave to thee; and all the powers which (are) in thee hymn unto the name of his mystery which is holy.\n\nHe who forgiveth all thy transgression.\n\nHe who delivereth thee [151 ] out of all their oppressions, those with which afflicted thee the emanations of the Self-willed.\n\nHe who delivered thy light out of the emanations of the Self-willed, these which belonged unto the destruction.\n\nHe who gave a crown of light unto thy head in his compassion until he delivered thee."

