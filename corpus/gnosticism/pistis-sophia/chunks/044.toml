[content]
body = "But added also Jesus in the word, said he to his disciples, It happened therefore, the Pistis Sophia having said these words, completed was the time for bringing her up from the Chaos, and through my own self, without the First Mystery I brought a power of light out of myself; I sent it down unto the Chaos for it to bring the Pistis Sophia up from the Place which is deep of the Chaos [101 ], and bring her unto the Place which (is) upper of the Chaos, until the command (should) come out from the First Mystery for them to bring her up from the Chaos absolutely.\n\nAnd my power of light brought the Pistis Sophia up unto the Places which (are) upward of the Chaos.\n\nIt happened therefore, the emanations of the Self-willed having known that they brought the Pistis Sophia up unto the Places which (are) upward of the Chaos they again persecuted her unto the high (part), wishing to take her again unto the Places which (are) of the Chaos below.\n\nAnd was enlightening greatly my power of light, this which I sent to bring the Pistis Sophia up from the Chaos.\n\nIt happened therefore, having persecuted the Sophia, the emanations [102 ] of the Self-willed, they having brought her unto the Places which (are) upward of the Chaos, she hymned again, and she cried up at me saying, I shall hymn up unto thee, O Light, because I wished to come (close) to thee.\n\nI shall hymn up unto thee, O Light, because thou art my deliverer: leave me not in the Chaos: deliver me, O Light of the Height, because thou art he unto whom I hymned: thou dispatched to me thy light through thyself and thou deliveredst me: thou broughtest me unto the Places 56 which (are) upward of the Chaos.\n\nLet them fall therefore below unto the Places which (are) beneath of the Chaos, the emanations of the Self-willed, these which are persecuting me: and let them not come unto the Places which (are) upward, for to [102 ] see me.\n\nAnd let great darkness cover over them, and let come to them an obscurity of darkness: and let them not see me in the light of thy power, this which thou dispatchedst to me to deliver me, that they should not lay hold upon me: and their plot which they thought for to take away my power, let it not happen for them: and according as they spake of me to take away my light from me, take away theirs also instead of mine.\n\nAnd they said to take away all my light, and they were not able to take it away, because thy power of light becometh indeed with me, because they plotted without thy precept, O Light, because of this they were not able to take away my [103 ] light, because that I believed the light, and I shall not fear; and the light is my deliverer, and I shall not fear.\n\nNow therefore he whose power is exalted, let him say the explanation of the words which said the Pistis Sophia.\n\nBut it happened, Jesus having finished saying these words unto his disciples, came forward Salome, said she, My Lord, my power forced me for to say the explanation of the words which said the Pistis Sophia.\n\nThy power prophesied once by Solomon saying, I shall manifest to thee, O Lord, because thou art my God.\n\nLeave me not, O Lord, because [103 ] thou art my hope: thou gavest to me thy judgment without a cause, and I was delivered through thee.\n\nLet fall those who are persecuting me; and let them not see me."

