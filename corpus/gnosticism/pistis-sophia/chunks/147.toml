[content]
body = "And he arranged the turning about of his array thus, for him to spend thirteen months in Aeon (after) Aeon standing still, that every Ruler upon whom he cometh should liberate (from) the wickedness of their evil doing.\n\nAnd he gave to him the two Aeons for dwellingplace in the presence of those of the hermes.\n\nI said unto you at the first time the names of these five great Rulers, these in which are wont the men of the World to call them: hear also now that I may say unto you also their incorruptible names, which are these, Orimuth for Kronos, Munikhunaphōr for Ares, Tarpetanuph for Hermes, Khōsi for the aphrodite, Khōnbal for Zeus, namely their incorruptible names.\n\nBut having heard [322 ] these (words) the disciples, they prostrated, they worshipped Jesus, said they, Happy are we, we, beyond every man, because thou revealedst to us these great wonders.\n\nThey added also, they prayed him, saying, We pray thee, reveal to us, About (in, MS ) what also are these roads.\n\nDrew near in unto him Mariham, she prostrated, she worshipped unto his feet, and she kissed his hands, said she, Yea, my Lord, reveal to us, What is the need of the roads of the Middle: for we heard thee that they are put over great punishments: what therefore is the manner, our Lord, (in) which we shall escape?\n\nor (in) which we shall be quit of them?\n\nor are they wont to 183 lay hold on the souls in what manner?\n\nor are they (the souls) wont to spend how much time in their punishments.\n\nHave compassion upon us, our Lord, our Saviour, that should not take away our souls the Receivers of the judgments of the roads of the Middle.\n\nAnd that they should not judge [323 ] us, in their punishments which are evil, that we may inherit also the Light of thy Father, that we should not become being poor and cut away from thee.\n\nThese therefore saying them Mariham weeping, answered Jesus in great compassion, said he to them, Truly, my brothers and my beloved, these who have forsaken father and mother because of my name, that I should give to you every mystery with every knowledge, I shall give to you the mystery of the twelve Aeons of the Rulers with their seals with their tickets with the manner of invoking them to go unto their Places.\n\nAnd I shall give to you the mystery of the thirteenth (thirteen, MS ) Aeon with the manner of invoking to go unto its Place (their Places, MS ).\n\nAnd I shall give to you their tickets with their seals.\n\nAnd I shall give to you the mystery of the baptism of those of the Middle with the manner of invoking to go unto their Place and their [323 ] tickets with their seals, I shall show to you them.\n\nAnd I shall give to you the baptism of those of the Right, our Place, with his tickets with his seals, and with the manner of invoking to go thither.\n\nAnd I shall give to you the great mystery of the Treasury of the Light and with the manner of invoking to go thither.\n\nI shall give to you every mystery with every knowledge, that they should call you, The sons of the Pleroma which is complete in every knowledge and every mystery.\n\nYe are happy indeed beyond every man who (is) upon the earth, because the sons of the Light came in your time."

