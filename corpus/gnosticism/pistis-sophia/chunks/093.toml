[content]
body = "And each will remain in his Place in the Light of my kingdom.\n\nAnd each will be the authority unto the array which is below him; but [217 ] he will not be the authority to go unto the array which is above him, but he is going to remain in the Place of the Inheritance of the Light of my kingdom, becoming in a great light for which there is not measure by the Gods with all the Invisibles, and he (will) become in great joy with great delight.\n\nNow therefore also hear that I may speak with you concerning the glory of those who will also receive the mystery of the First Mystery.\n\nHe who will receive therefore the mystery of that First Mystery, will become at the time (at) which he cometh out of the body of the matter of the Rulers, come the Receivers of the Contentious (ones), and bring the soul of that man out of the body; and that soul will become a great overflow of light among the Receivers of Contentious (ones): and those Receivers will fear before [218 ] the light of that soul, and that soul will go unto the Height, and pass through all the Places of the Rulers, with all the Places of the emanations of the Light: and it will not give answer nor defence nor symbol in any Place of the Light, nor in any Place 118 of the Rulers; but it will pass through in all the Places and it will surpass all, and go and reign over all the Places of the First Saviour.\n\nLikewise also he who will receive the second mystery of the First Mystery with the third with the fourth even until he receive the twelfth mystery of the First Mystery, whenever he should become in the time (at) which they come out of the body of the matter of the Rulers, come the Receivers [218 ] of Contentious (ones) and bring the soul of that man out of the body of the matter, and those souls will become a great overflow of light among the Receivers of Contentious (ones).\n\nAnd those Receivers will fear before the light of that soul, and they will be weakened and fall upon their face.\n\nAnd those souls will fly unto the Height at the hour and pass over all the Places of the Rulers, and in all the Places of the emanations of the Light, and they will not give answer nor defence in any Place nor symbol: but it will pass through in all the Places and they surpass all within, and they will reign over all the Places of the twelve Saviours, so that those who receive the second [219 ] mystery of the First Mystery will reign over all the Places of the second Saviour in the Inheritances of the Light.\n\nLikewise also those who receive the third mystery of the First Mystery with the fourth with the fifth with the sixth even until the twelfth, each will reign over all the Places of the Saviour, who received the mystery unto him.\n\nAnd he who will receive twelve (twelfth, MS ) mysteries one after (upon, MS ) another of the First Mystery, namely, the absolute Mystery, this concerning which I speak with you.\n\nAnd he who will receive therefore those twelve (twelfth, MS ) mysteries these which are reckoned unto the First Mystery, whenever he should come out of the World, he will pass through all the Places of the Rulers, with all the Places of the Light, being with a great effluence of the Light [219 ].\n\nAnd also he will reign over all the Places of the twelve Saviours.\n\nBut they will not be equal with those who receive the one Mystery of the Ineffable, but he who will receive that Mystery will remain in those arrays, because that they surpass, and he will remain in the arrays of the twelve Saviours."

