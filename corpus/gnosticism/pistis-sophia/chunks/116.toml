[content]
body = "And whenever the soul, whenever she should say the mystery of the loosening of the seals, and immediately is wont to be loosened the counterfeit spirit; and it is wont to cease coming in against the soul, and it ceaseth from allotting the soul.\n\nAnd immediately is wont to say a mystery, the soul, and hold down the counterfeit spirit with the Fate and dismiss them from following her.\n\nBut there is not any of them being in their (own) authority: but she is being in her (their, MS ) authority: and immediately are wont the Receiver of that soul and the mysteries which she received, they are wont to come and snatch away that soul from [264 ] the Contentious Receiver.\n\nAnd are wont the Receivers, they are wont to withdraw unto the works of the Rulers in regard to the arrangement for the bringing out of the souls.\n\nAnd are wont the Receivers also of that soul, these which belong unto the Light, they are wont to become wing of light unto that soul, and she becometh vesture of light unto her(self).\n\nAnd they are not wont to take her out of the Chaoses, because it is not right to take a soul having received mystery out of the Chaoses, but they are wont to take her by the road of the Rulers of the Middle: and whenever she should arrive at the Rulers of the Middle, are wont to come out to meet the soul those Rulers, becoming in a great fear with a flame which is fierce with varied faces, in one word, being in a great fear, there being not measure unto it.\n\nAnd immediately is wont the soul, she is wont to say the mystery of their defence.\n\nAnd they are wont to fear greatly and (to) fall upon their face being in fear [264 ] before the mystery which she said, and before her defence.\n\nAnd is wont that soul, she is wont to dismiss them to their Fate, saying to them, Receive to you your Fate.\n\nI am not coming unto your Place from this hour.\n\nI became strange unto you unto age, being about to go unto the Place of mine inheritance.\n\nBut these whenever should finish saying them the soul, are wont the Receivers of the Light, they are wont to fly with her unto the Height, and they are wont to take her out of the Aeons of the Destiny, she giving the defence of the Place to it with its seal, these which I shall say unto you in the Distribution of the mysteries.\n\nAnd she is wont to give to the Rulers the counterfeit spirit, and she is wont to say unto them the mystery of the bonds with which they bound it in unto her (him, MS ).\n\nAnd she is wont to say to them, Come 146 (take) your counterfeit spirit.\n\nI am not coming unto your Place from this hour, I became strange unto you unto age.\n\nAnd she is wont to give the seal of each [265 ] to him with his defence.\n\nBut these whenever should finish saying the soul, are wont the Receivers of the Light, they are wont to fly with her unto the Height, and they are wont to take her out of the Aeons of the Destiny, and they are wont to take her up in all the Aeons, she giving the defence of each Place to it, with the defence of all the Places, with the seals of (with, MS ) the Tyrants of the King the Adamas.\n\nAnd she is wont to give the defence to all the Rulers of all the Places of the Left, these which I shall say unto you all their defences with their seals, at the time (in) which I shall say unto you at the Distribution of the mysteries."

