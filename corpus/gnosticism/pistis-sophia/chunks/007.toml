[content]
body = "Now therefore we all together we wait for thee at the last Boundary, namely, the last mystery (reckoning) from within, he also is a part of us.\n\nNow therefore we have dispatched to thee thy vesture [17 ] which is thy very own from at first, this which thou left in the last Boundary, namely, the 9 Last mystery from within, until his time is completed according to the command of the First Mystery.\n\nBehold, having been completed his time, put it on.\n\nCome even unto us, we all wait for thee, for us to put on thee the First Mystery with all his glory through his own command, the First Mystery having given him to us being two vestures for us to put on thee, beside this which we dispatched to thee, because thou art worthy of them, since thou (art) he who preceded us and thou becomest before us.\n\nBecause of this, therefore, the First Mystery dispatched to thee through us the mystery of all his glory, being two vestures.\n\n(The) First indeed being [17 ] in it all the glory of all names of all the mysteries with all the emanations of the arrays of the Spaces of the Ineffable.\n\nAnd the second clothing, being in it all the glory of all the names of all the mysteries with all the emanations, these which become in the arrays of the two Spaces of the First Mystery.\n\nAnd this vesture which we dispatched to thee now, being in it the glory of the name of the mystery of the Herald, namely, the First precept, and the mystery of the five Marks, and the mystery of the great Legate of the Ineffable, namely, the great Light and with the mystery of the five Leaders, these who are the five Companions; and also becometh in that vesture the glory [18 ] of the name of the mysteries of all the arrays of the emanations of the Treasury of the Light and with their Saviours, and with the arrays of the arrays, namely, the seven Amens, and, namely, the seven Voices and with the five Trees, and with the three Amens and with the Twin Saviour, namely, the child of the child, and with the mystery of the nine Guards of the three Gates of the Treasury of the Light, and also being in it all the glory of the name of all those who (are) on (the) Right (hand) with all those who become in the Middle, and also being in it all the glory of the name of the great Invisible, namely, the great Forefather, and with the mysteries of the three Triple-powers, and with the mysteries of all their Places, [18 ] and with the mysteries of all their Invisibles, with all those who become in the thirteenth of the Aeons, and with the name of the twelve Aeons and with all their Rulers, and with all their Archangels and with all their Angels, and with all those who become in the twelve Aeons: and all the mysteries of the names of all those who become in the Destiny, with all the heavens, and all the mysteries of the names of all those who become in the Sphere, and with their firmaments, with all those who (are) in them, and with all their Places.\n\nBehold, therefore, we dispatched to thee that vesture, which no one 10 knew from the First precept downwards, because that the glory of his light [19 ] was being hid in it, and the Spheres with all the Places (knew it not)."

