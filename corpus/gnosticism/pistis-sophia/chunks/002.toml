[content]
body = "Because of this therefore they were thinking of that Mystery that it is the completion of all completions; and that it is the head of the Universe; and that [4 ] it is the whole Pleroma: since Jesus is wont to say unto his disciples that that Mystery (is) that which surroundeth the Universe of all which I said unto you from the day when I met you even unto to-day.\n\nBecause of this therefore the disciples were thinking that there is not anything becoming within that mystery.\n\nIt happened therefore while the disciples are sitting with one another upon the mountain of the Olives saying these words and rejoicing in great joy and being very glad, and saying to one another, We happy are beyond all men who (are) upon the earth, because the [4 ] Saviour revealed these (things) to us, and we received the Pleroma with all the completion.\n\nWhile these they are saying unto one another Jesus is sitting, being distant from them a little (way).\n\nBut it happened on the fifteenth day of the month of Tōbe, namely the day in which the moon is wont to be full, on that day therefore the sun having come out in his course, (there) came out after him a great power of light enlightening greatly greatly, (there) being no measure for the light which was made, for it came out of 3 the Light of the lights, and it came out of the Last mystery, namely the twenty-fourth mystery (reckoning) from within [5 ] unto without, these (mysteries) which become in the array of the second Space of the First Mystery.\n\nBut that power indeed of light came upon Jesus and surrounded him altogether, while sitting at a distance from his disciples, and he was enlightening greatly greatly, (there) being no measure for the light which was becoming.\n\nAnd the disciples had not seen Jesus from the great light in which he was being, or which was being (from) him; for their eyes had been darkened from the great light in which he was being.\n\nBut they were only seeing the light casting out beams of light which are great.\n\nAnd not equal with one another [5 ] were the beams of light; and the light was being of different kinds, and it was being of different types (reaching) from below to above, one being more excellent than one at a time in a great glory of light immeasurable, it was reaching from below on the earth even up to the heavens.\n\nAnd the disciples having seen that light, they became in great fear and in great disturbance.\n\nIt happened therefore when the power of that light came upon Jesus, it surrounded him entirely (by) little (and) little.\n\nThen Jesus mounted up, or flew, unto the Height having enlightened greatly greatly in light for which there is not measure.\n\nAnd the disciples were looking [6 ] at him, none of them speaking until he went up unto the heaven, but they were all being in great silence.\n\nThese (things) therefore happened on the fifteen of the moon, the day on which is wont to be completed the month of Tōbe.\n\nIt happened therefore Jesus having gone into the heaven, after three hours were disturbed all the powers of the heavens, and they all quaked against one another, they with all their Aeons with all their Places and with all their arrays; and all the earth was moved with all those who dwell upon it.\n\nAnd were disturbed all the men who (are) in the World with the disciples also, and they were all thinking that perhaps [6 ] will be rolled up the World.\n\nAnd had not ceased all the powers which (are) in the heavens being disturbed, they with all the World, and they were all being moved upon one another from three of the fifteen of the moon of Tōbe even unto nine of the morrow."

