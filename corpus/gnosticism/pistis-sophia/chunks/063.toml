[content]
body = "That is the word which said the Pistis Sophia, And thou struckest the serpent, he of the seven heads through my hands.\n\nAnd thou settest me up upon his matter, thou destroyedst him that his seed should not rise up from this hour.\n\nAnd the word which thy power said, And thou wast being with me, and thou wast helping me.\n\nThat is the word which said the [147 ] Pistis Sophia, And thou wast being with me, thou art helping me in all these (things).\n\nAnd the word which thy power said, And thy name surrounded me in every Place.\n\nThat is the word which said the Pistis Sophia, And thy light surrounded me in all their Places.\n\nAnd the word which said thy power, And thy right (hand) destroyed the poison of the evil speaker.\n\nThat is the word which said the Pistis Sophia, And through thee were made powerless the emanations of the Self-willed, because thou tookest away the light of their power from them.\n\nAnd the word which thy power said, Thy hand opened the road of thy faithful (ones).\n\nThat is the word which said the Pistis Sophia, Thou directedst my road to bring me out of the Chaos, because I believed thee.\n\nAnd the word which thy power said, Thou redeemedst them out of the tombs, and thou removedst them out of the midst of the embalmed-corpses.\n\nThat is the word which said [148 ] the Pistis Sophia, And thou redeemedst me out of the Chaos, and thou removedst me out of the material darkness, namely, the emanations of darkness which (are) in the Chaos, these whose light thou tookest away from them.\n\nAnd the word which thy power said, Thou tookest away bones being dead, thou clothedst them with a body, and those which move not, thou gavest to them an energy of life.\n\nThat is the word which said the Pistis Sophia, And thou tookest away all my powers, these in which there is not light, thou puttest in unto them a light being purified.\n\nAnd all my members in which there is not light moving, thou gavest to them a light of life from thy Height.\n\nAnd the word which thy power said, Thy road 80 became uncorruptness, with thy face.\n\n[148 ] That is the word which said the Pistis Sophia, And thou directedst thy road for me and (with, MS) the light of thy face became to me a life indestructible.\n\nAnd the word which thy power said, Thou broughtest thy Aeon upon the destruction, that they should loosen all the bonds.\n\nThat is the word which said the Pistis Sophia, Thou broughtest me even me, thy power, upon the Chaos and upon the destruction, that should be loosened all the matter which becometh in that Place, and should be made new all my powers by the light.\n\nAnd the word which thy power said, And thy light maketh foundation for them all.\n\nThat is the word which said the Pistis Sophia, And thy light became in them [149 ] all.\n\nAnd the word which thy power of light said by Solomon, Thou puttest thy richness upon him.\n\nAnd he made a dwelling being holy.\n\nThat is the word which said the Pistis Sophia, Thou strengthenest the light of thy effluence upon me, and I became light, being purified.\n\nThis therefore, my Lord, is the explanation of the hymn which said the Pistis Sophia.\n\nIt happened therefore, the First Mystery having heard these words, saying them Mathaios, said he, Well (done) Mathaios and fairly, the beloved.\n\nThis is the explanation of the hymn which said the Pistis Sophia."

