[content]
body = "And after these (things) I shall [76 ] fill you with all the light and with all the power of the spirit that ye should understand from this hour all the (things) which they will say unto you, and with the (things) which they will see.\n\nYet a little other time (and) I shall speak with you all the (things) of the Height from outward even unto inward, and from inward even unto outward.\n\nAdded also Jesus in the word, said he to the disciples.\n\n42 It happened therefore, having said her seventh repentance in the Chaos the Pistis Sophia, and not yet the command came to me through the First Mystery, for me to deliver her and bring her up from the Chaos.\n\nBut I through my own self in mercifulness, without [77 ] command I brought her unto a Place widened a little in the Chaos.\n\nAnd having known the material emanations of the Self-willed, that they brought her unto a Place widened a little in the Chaos, they ceased oppressing her for a little, thinking that they are going to bring her up from the Chaos altogether.\n\nThese (things) therefore having happened was not knowing the Pistis Sophia that I it (is) who helpeth her, nor was she knowing me at all; but she was wont to continue hymning unto the light of the Treasury, this which she saw at the time, and this which she believed: and she was thinking that he also it (is) who helpeth her, and he it (is) unto whom she was hymning, thinking that it is the Light [77 ] of the truth.\n\nBut since she believed the Light, this which belongeth unto the truth of the Treasury, because of this they will bring her up from the Chaos, and receive her repentance from her: but not yet had been fulfilled the precept of the First Mystery for them to receive her repentance from her.\n\nNevertheless therefore hear that I may say unto you all the words which happened to the Pistis Sophia.\n\nIt happened I having brought her unto a Place widened a little in the Chaos, ceased oppressing her entirely the emanations of the Self-willed, thinking that they are going to bring her up from the Chaos altogether.\n\nIt happened therefore, having known the emanations of the Self-willed, that they brought not the Pistis Sophia up from the Chaos, they turned also (back) oppressing her greatly.\n\nBecause of [78 ] this therefore she said the eighth Repentance, because they had (before) ceased oppressing her, and also they turned (back) they oppressed her unto the end.\n\nShe said this repentance, saying thus, I confided in unto thee, O Light, leave me not in the Chaos, redeem me and deliver me in thy knowledge.\n\nI confided in thee and thou deliverest me: become for me deliverer, O Light, and deliver me and bring me (close) to thy light: because thou art my Saviour, and thou wilt bring me (close) to thee.\n\nAnd because of the mystery of thy name guide me, and give to me thy mystery: and thou wilt deliver me from this power of face of lion which ensnared me; because thou art my Saviour, and I shall give the purgation of my light unto thy hands.\n\nThou [78 ] deliveredst me, O Light, by thy knowledge.\n\nThou wast angry with those who are watchful against me, these who will not be able to lay hold on me 43 for ever."

