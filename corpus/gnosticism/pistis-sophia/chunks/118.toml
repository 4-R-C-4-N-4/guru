[content]
body = "And that of the God to the God, namely, whenever the soul should receive mystery she is wont to give the defence to all the Rulers with the Place of the King, the Adamas.\n\nAnd the soul is wont to give the honour with the glory to those of all the Places of the Light.\n\nAnd the word, It shone when thou hadst seen it, being of silver and brass.\n\nThat is the type of this, the power of the Light being in it, namely, the silver [267 ] which is choice.\n\nAnd being in her the counterfeit spirit, namely, the material brass.\n\nThen this, my Lord, is the first meaning.\n\nThe second meaning also which thou finishedst saying to us now concerning the soul which receiveth mystery, whenever it should come unto the Place of the Rulers of the road of the Middle, and they are wont to come out before her in a great fear greatly greatly, and is wont the soul, she is wont to give to them (him, MS ) the mystery of the fear.\n\nAnd they (she, MS ) are wont to fear before her, and she is wont to give the Fate unto her Place, and she is wont to give the counterfeit spirit unto its Place, and she is wont to give the defence with the seals to each of the Rulers who (are) upon the roads, and she is wont to give the honour with the glory with the respect of the seals with the hymns to those of all the Places of the Light.\n\nConcerning this word, my Lord, [268 ] which thou saidst by the mouth of Paulos our brother once, Give the tribute to him of the tribute, and give the fear to him of the fear, give the custom to him 148 of the custom, and give the honour to him of the honour, and give the respect to him of the respect, and do not owe anything to anyone.\n\nWhich (is) this My Lord, The soul who receiveth mystery is wont to give the defence to all the Places, This is, my Lord, the second meaning.\n\nThe third meaning also concerning the word which thou saidst unto us once, The counterfeit spirit is wont to become enemy unto the soul, causing it to do all the sins and all the passions, and it is wont to convict her in the punishment concerning all the sins which it caused her to do, in one word, it is wont to be enemy unto the soul in every form.\n\nConcerning this word therefore which thou saidst unto us once, The enemies of the man are his domestics [268 ] namely the domestics of the soul are the counterfeit spirit with the Fate, these which are enemy unto the soul at every time causing her to do every sin with every wickedness.\n\nThen this, my Lord, is the third meaning.\n\nThe fourth meaning also concerning the word which thou saidst, If the soul should come out of the body, and walk in the road of the counterfeit spirit, and whenever it should not find the mystery of the loosening of all the bonds with the seals, these which are bound to the counterfeit spirit, and (yet) it should cease to be allotted unto her.\n\nIf therefore she should not find it, is wont the counterfeit spirit, it is wont to take the soul (close) to the Virgin of the Light, the judge: and is wont the judge, the Virgin of the Light, she is wont to prove the soul and find about her, she having done sin; and having not also found the mysteries of the Light with her.\n\nAnd she is wont to give [269 ] her to one of her Receivers, and is wont her Receiver, he is wont to bring her and cast her unto the body, and she is not wont to come out of the changes with the body, having not given the last Cycle."

