[content]
body = "My mouth was full of glory, that I should say the mystery of thy [54 ] greatness at every time.\n\nNow therefore, O Light, leave me not in the Chaos for the completion of all my time.\n\nLeave me not behind thee O Light, because they took away all my power of light in me, and surrounded me all the emanations of the Self-willed.\n\nThey wished to take away all my light in me for ever, and they watched my power, saying to one another at once, that the light forsook me, Lay hold on her and, let us take away all the light which is in her.\n\nBecause of this therefore, O Light, cease not from me: turn thee, O Light, and deliver me from the unmerciful (ones).\n\nLet them fall and be powerless, these who wish to take away my power.\n\nLet them wrap them up in the darkness, and become in [54 ] powerlessness, these who wish to take away my power of light in me.\n\nThis therefore is the second Repentance which said the Pistis Sophia hymning up unto the Light.\n\nIt happened therefore, Jesus having finished saying these words unto his disciples, said he, Understand ye in what manner I am speaking with you.\n\nSprang up Petros, said he to Jesus, My Lord, we are not able to bear with this woman, saying instead of us; and she let not any of us speak, but she is speaking many times.\n\nAnswered Jesus, said he to his disciples, He in whom the power of his spirit will bubble up in him to cause him to understand that which I say, let him come forward and speak.\n\n[55 ] Nevertheless therefore, thou Petros I see thy power in thee understanding the explanation of the mystery of the repentance, which said the Pistis Sophia.\n\nNow therefore thou Petros, say the meaning of her repentance in the midst of thy brothers.\n\nBut answered Petros, said he to Jesus, O Lord hear, that I may say the meaning of her repentance about which 30 prophesied thy power once by David the prophet, saying her repentance in the seventieth psalm, O Lord my God I trusted unto thee.\n\nLet me not be ashamed for ever.\n\nSave me in thy righteousness and deliver me.\n\nIncline thy ear unto me and save [55 ] me.\n\nBecome to me unto a God of trust, and unto a Place firm unto the salvation, because thou art my firmness and my place of refuge: my God save me from the hand of the sinner, and out of the hand of the law-breaker with the impious.\n\nBecause thou art the lord of my patience, O Lord thou art my hope from my youth; I leaned upon thee from the belly; thou, thou broughtest me out of the belly of my mother.\n\nMy remembrance in thee will be at every time.\n\nI became as the fools to many.\n\nThou art my helper and my firmness.\n\nThou art my Saviour, O Lord.\n\nMy mouth was filled with blessing, that I should bless the glory of thy greatness all the day long.\n\nCast me not away unto a time of old age, in the failing of my soul; [56 ] forsake me not.\n\nBecause mine enemies say evil against me, and those who watch for my soul, they took counsel against my soul, saying together, The God forsook him, run and catch him, because there is not he who will deliver him.\n\nO God take heed unto my help.\n\nLet them be ashamed and fail, those who slander my soul.\n\nLet them wrap them in shame with ignominy, those who seek after evil (things) against me.\n\nThis therefore is the explanation of the second repentance which said the Pistis Sophia."

