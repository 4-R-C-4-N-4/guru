[content]
body = "Added also Maria, said she, My Lord, but I heard that the prophets went unto the Light.\n\nAdded also the Saviour said he to Maria, Amen amen I say to thee, Not any prophet went unto the Light.\n\nBut the Rulers of the Aeons who spake with them out of the Aeons, they gave to them the mystery 179 of the Aeons; and I having come unto the Place of the Aeons, Helias—I turned him, I dispatched him unto the body of Iohannes the baptist.\n\nBut the rest also I turned them unto righteous bodies, these who will find the mysteries of the Light, and go unto the Height and inherit the kingdom of the Light, Abraham indeed with Isaak with Iakob, I forgave to them all their sins with all their unlawfulnesses, and I gave to them the mysteries of the Light in the Aeons, and I put [317 ] them in the Place of Iabraoth with all the Rulers who repented: and while I go unto the Height, and come, being about to go unto the Light, I shall take away their souls with me unto the Light.\n\nBut Amen I say to thee Maria: He (they, MS ) will not go unto the Light, I not having taken away thy soul, thine with that of all thy brothers unto the Light.\n\nBut the rest also of the patriarchs with the righteous since the time of Adam even until now, those who are in the Aeons with all the arrays of the Rulers: I having come unto the Place of Aeons, I caused these, the Virgin of the Light to turn them unto all bodies being about to become righteous (ones), these (are those) who will find all the mysteries of the Light and go in and inherit the kingdom of the Light.\n\nAnswered Maria, said she, We are happy beyond every man for these greatnesses which thou revealedst to us.\n\nAnswered the Saviour, said he to [318 ] Maria with all the disciples.\n\nYet I shall reveal to you all the greatnesses of the Height from inward part of the inward parts even until the outward part of the outward parts, that ye may become being complete in every knowledge and with every pleroma with the height of the heights with the depth of the depths.\n\nContinued also Maria, said she to the Saviour, My Lord, behold, we knew in boldness in an exactness plainly that thou broughtest the keys of the Mysteries of the kingdom of the Light, these which are wont to forgive the sins of the souls and purify them, and make them pure light and take them unto the Light.\n\n[Half this line is ornament, two lines of ornament follow, and the title of the Fourth Document follows with ornament below.] 180"

