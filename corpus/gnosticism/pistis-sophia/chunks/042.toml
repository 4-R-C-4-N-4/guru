[content]
body = "He clothed him(self) with the darkness as clothing, and it went into his belly as water, and it went into all 53 his powers as oil.\n\n[96 ] Let him wrap him(self) up in the Chaos as in a garment, and (let) him bind him(self) with the darkness as with a girdle of leather at every time.\n\nThese (things) are happening to those who brought these upon me because of the light, and those who said, Let us take away all her power.\n\nBut, thou, O Light, have compassion on me because of the mystery of thy name; and save me in the kindness of thy mercy: because that they took away my light with my power, and my power was shaken within me, and I was not able to stand in their midst.\n\nI was as matter which fell; they cast me unto this part and that, as a demon being in the air.\n\nMy power perished, because I have not mystery; and my matter is worn out (?) because of my light, because they took it away.\n\nAnd I, they were deriding me, [97 ] they are wont to look at me beckoning unto me.\n\nHelp me according to thy compassion.\n\nNow therefore he whose spirit is ready, let him come forward and say the explanation of the twelfth repentance of the Pistis Sophia.\n\nBut came forward Andreas, said he, My Lord, the Saviour, thy power of light prophesied once by David concerning this repentance which said the Pistis Sophia.\n\nAnd it said in the hundred with eight psalm, O God be not silent unto my blessing, because the mouth of the sinner with the guile, they opened their mouth upon me: they spake at me in a tongue of guile; and they surrounded me in words [97 ] of hatred, and they fight with me without a cause: instead of loving me.\n\nThey slandered me, but I, I was praying.\n\nThey established against me evil (things) instead of good (things), and a hatred instead of my love.\n\nSet up a sinner over him, and let the Accuser stand at his right (hand).\n\nWhenever they should give judgment unto him, let him (come) out being condemned, and let his prayer become unto a sin.\n\nLet his days be shortened, and let another take his episcopate.\n\nLet his sons be orphans, and let his wife be widow.\n\nLet them turn out his children, and let them remove them away, and (let) them beg.\n\nLet them cast them out of their houses.\n\nLet the usurer demand [98 ] all the (things) which become to him; and let strangers rob all his toils.\n\nLet there not become him who will help him; nor let compassion become to his orphans.\n\nLet them blot his sons out, and let them blot his name out in one generation.\n\nLet them remember the sin of his fathers in presence of the Lord, and let them not blot out the unlawfulness of his mother.\n\nLet them become in presence of the Lord at every time.\n\nLet them scatter his remembrance out of the earth.\n\nBecause that he remembered not to do a mercy, 54 and on the contrary he persecuted a poor man and miserable, and he persecuted after one being [98 ] pained at heart unto putting him to death.\n\nHe loved the curse, and it shall come to him.\n\nHe did not wish the blessing, it shall be far from him.\n\nHe clothed him with the curse as a tunic, and it went unto his inside as water, it was as oil in his bones.\n\nLet it become to him as vesture which he will wrap about him, and as a girdle, being about to gird him with it at every time."

