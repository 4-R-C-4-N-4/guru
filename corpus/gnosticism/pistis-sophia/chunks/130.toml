[content]
body = "This therefore is the manner which becometh the Darkness which is outer, namely the dragon.\n\nThese therefore having said them the Saviour, answered Maria, said she to the Saviour, My Lord, then the punishment of that dragon (is) cruel greatly, beyond the punishment of all the judgment.\n\nAnswered the Saviour, said he to Maria, Not only also that they are painful beyond all the punishments of the judgments; but every soul which they will take unto the Place they will numb it in the cold which is cruel, and with the hails and with the fire which is cruel greatly: these [291 ] which become in that Place.\n\nBut in the dissolution of the World, namely, in the catching up of the Universe, those souls will be wasted away by the cold which is cruel, and with the fire which is cruel greatly, and they will be without existence unto age.\n\nAnswered Maria, said she, Then woe to the souls of the sinners.\n\nNow therefore my Lord, the flame which (is) in the place of the mankind is being hot or the fire which (is) in Amente is hot?\n\nAnswered the Saviour, said he to Maria, Amen I say to thee, Hot is being the fire which (is) in Amente more than the fire which is in mankind nine times.\n\nAnd the fire which is in the punishment of the great Chaos is cruel, more than that which (is) in Amente nine times: and the fire which (is) in the judgment of the Rulers, who are on the road [291 ] of the Middle, is cruel, more than the fire of the punishment which is in the great Chaos nine times: and the fire which is in the dragon of the Darkness which is outer with all the judgments which (are) in it, are cruel more than the fire which (is) in all the punishments which (are) in the judgments of the Rulers, these who (are) on the road of the Middle, is cruel more than 163 them seventy times.\n\nBut these having said them the Saviour unto Maria she smote on her breast, she cried out, she wept, she with all the disciples at once, said she, Woe to the sinners because many are their judgments greatly.\n\nCame in front Mariham, she prostrated upon the feet of Jesus, she worshipped them, said she, My Lord, bear with me, seeking from thee, and be not angry with me because I molest thee many [292 ] times, for from now I am about to begin to seek from thee concerning every thing in an exactness.\n\nAnswered the Saviour, said he to Maria, Seek after every thing which thou wishest to seek after, and I shall reveal them to thee in boldness, without parable.\n\nAnswered Maria said she, My Lord, then a man, good, having completed all the mysteries, having a kinsman, in one word, having a man, and that man being impious, having done every sin which are worthy of the Darkness which is outer, and he did not repent, or otherwise, having completed his number of cycle in the changes of the body, and being not profitable at all, that man, having come out of the body, and we knew securely that he sinned, worthy of the Darkness which is outer, then what is that which we shall do, until we deliver [292 ] him from the punishments of the dragon of the Darkness which is outer, and remove him unto a righteous body, being about to find the mysteries of the kingdom of the Light, and that he may become good and go unto the Height and inherit the kingdom of the Light."

