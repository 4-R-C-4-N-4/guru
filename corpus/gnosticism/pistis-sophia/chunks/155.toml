[content]
body = "( Title and eight pages wanting ) [345 ] fire and punish her in them for six other months with eight days.\n\nAfter these (things) they (will) take her upon the road of the Middle, and each of the Rulers of the road of the Middle (will) punish her in his punishments for six other months with eight days.\n\nAfter these things they (will) take her to the Virgin of the Light, this who is wont to judge the good and (with, MS ) the evil, that she may judge her.\n\nAnd whenever the Sphere should turn round she is wont to deliver them up to her Receivers, that they may cast her unto the Aeons of the Sphere.\n\nAnd are wont the Ministers of the Sphere to take her out unto water which is below the Sphere; and it is (wont) to become a fire boiling and eating into her, until it purifieth her entirely.\n\nAnd is wont to come Ialouham ( Eight lines wanting ) the Receiver of Sabaoth, the Adamas, this who is wont to give the cup of forgetfulness to the souls, and to bring a [345 ] cup being full of the water of the forgetfulness and give it to the soul: and she (is wont to) drink it and forget every place (coptic word) with every Place unto which she went: and cast her into a body, which is about to spend its time (in which) he is wont to pain his heart continually.\n\nThis is the punishment of the man who curseth.\n\nAdded further Mariham, said she, My Lord Jesus, then the man (a) slanderer continually, whenever he should come out of body whither is he about to go, or what is his punishment?\n\nSaid Jesus, A man (a) slanderer continually, whenever should be completed his time by the Sphere for him to come out of body, are wont to come after him Abiout with Kharmon the Receivers of Ariel, and they bring his soul out of body, and spend three days going with her teaching her the creatures of the World.\n\nAnd after these (things) [346 ] they take her down unto Amente (close) to Ariel, and he (is wont) to punish her in his punishments eleven months with twenty one days.\n\nAnd afterwards they 194 take her unto the Chaos (close) to Ialdabaoth with his forty nine demons, and each one of his demons goeth out upon her for another eleven months with other twenty one days, scourging her with whips of smoke.\n\nAnd after these they take her into the rivers of smoke with seas of fire boiling, and they punish her in them other eleven months with twenty one days.\n\nAnd after these they are wont to take her away upon the road of the Middle, and each of the Rulers in the road of the Middle punisheth her in his punishments other eleven months with twenty one days.\n\nAfter [346 ] these they are wont to take her away to the Virgin of the Light, this who is wont to judge the righteous with the sinners, that she may judge her.\n\nAnd whenever the Sphere should turn round, she is wont to deliver her up to her Receivers, that they may cast her out unto the Aeons of the Sphere.\n\nAnd the Ministers of the Sphere take her out unto water below the Sphere, and it becometh a smoke boiling and it eateth in at her, until it purifieth her entirely.\n\nAnd bringeth the cup of forgetfulness Ialouham, the Receiver of Sabaoth, the Adamas, and he giveth it to the soul: and she drinketh it and forgetteth every place (coptic word) with every thing with every Place unto which she went: and they give her into a body being about to spend his time being oppressed."

