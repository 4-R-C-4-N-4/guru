[content]
body = "And ye became in great tribulations with great afflictions in the change in bodies various of the World.\n\nAnd after all these tribulations through your own selves ye agonised and ye fought having renounced all the World with all the matter which is in it: and ye did not cease from seeking, even until ye found all the mysteries of the kingdom of the Light, these which purified you, they made you pure light, purified greatly; and ye became light purified.\n\nBecause of this therefore I said unto you once, Seek that ye may find the (things) which I said unto you.\n\nI said unto you, Ye shall seek after [230 ] the mysteries of the Light, these which are wont to purify the body of the matter, and make it pure light, purified greatly.\n\nAmen I say unto you, Because of the race of the mankind, because they are material I despoiled myself I brought all the mysteries to them of the Light, that I should purify them, because they are the dregs of all the matter of their matter.\n\nOtherwise not any soul in all the race of the mankind would be saved.\n\nAnd they would not inherit the kingdom of the Light, except that I brought to them the mysteries of purification.\n\nFor the emanations of the Light need not the mysteries, for they are purified, but the race of the mankind, they (are) those who need them, because that they are all material dregs.\n\nBecause of this therefore I said unto you once, [231 ] Those who are at ease need not the physician, but those who become badly, namely, Those of the Light need not the mysteries, because they are light being purified: but the race of the mankind, they are those who need them, because material dregs they are.\n\nBecause of this therefore, preach to all the race of the mankind, Desist not from seeking in the day with the night, even until ye should find the mysteries of purification.\n\nAnd say to the race of the mankind, Renounce all the World with all the matter which is in it: otherwise he who receiveth and he who giveth in the World and who eateth and who drinketh in his matter and who liveth in all his cares with all his life (politia, MS ) gathering in for himself matters (close) to [231 ] his other matter: because that all this World with all the (things) which are in it with all its life (politia, MS ) are material dregs, and they will ask them each concerning their cleansing.\n\nBecause of this therefore I said unto you once, Renounce all the World with all the matter which is in it, that ye should not gather in for you other matter unto your other matter which is in them.\n\nBecause of this therefore, 126 preach to all the race of the mankind, Renounce all the World with all its life (politia, MS ), that ye should not gather in for you other matter unto your other matter which is in you.\n\nAnd say unto them, Desist not seeking in the day with the night and renew (your seeking) not yourselves, until ye [232 ] find the mysteries of purification, these which will purify you and make you pure light; and ye (will) go unto the Height, and ye (will) inherit the Light of my kingdom.\n\nNow therefore, thou also, Andreas with all thy brothers, thy fellow-disciples, concerning your renunciations with all your tribulations which ye received from Place to Place, and with your changes in bodies various, and with all your afflictions, and after all these ye received the mysteries of purification, ye became pure light purified greatly.\n\nBecause of this therefore ye will go unto the Height and make entrance to all the Places of (the) emanations of the Light; and ye [232 ] (will) become being Kings in the kingdom of the Light unto age."

