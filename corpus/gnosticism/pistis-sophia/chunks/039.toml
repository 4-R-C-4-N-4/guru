[content]
body = "But I came out of all their midst, not any power knew (it), neither those of the inward part of the inward parts, nor those of the outward part of the outward, except the First Mystery only.\n\nIt happened therefore, I having come unto the Chaos to help her, she saw me, I being comprehensible and enlightening greatly, becoming in mercifulness toward her.\n\nFor I was not being self-willed as the power of face of lion, this which took away the power of light from the Sophia, and also this which oppressed her to take away all the light which (is) in her.\n\n[90 ] Saw therefore me enlightening, the Sophia, more than the power of face of lion a number of ten thousand times, and I am becoming in great mercifulness toward her.\n\nAnd she knew that I am out of the Height of the Heights, this whose light she believed from at first.\n\nWas confident of heart the Pistis Sophia, and she said the tenth Repentance, saying, I cried up unto thee, O Light of the Lights, in my being oppressed, thou heardest me.\n\nO Light, deliver my power out of lips of violence and the unlawful, and out of snares of guile, O Light, that which they will take away from me by a snare of guile, they would not have brought it to thee.\n\nFor the snares of the Self-willed are spread abroad and with the traps of the unmerciful (ones).\n\nWoe [90 ] to me indeed, because my place of dwelling was distant, and I became in the places of dwelling of the Chaos: my power became in Places which are not mine; and I flattered those unmerciful (ones): and whenever I should flatter them they are wont to fight against me without a cause.\n\nThese therefore Jesus having said them to his disciples, said he to them, Now therefore he whose spirit moveth him, let him come forward and say the explanation of the tenth repentance of the Pistis Sophia.\n\nAnswered Petros, said he, O Lord, concerning this also thy power of light prophesied by David once, saying in the 50 hundred and nineteenth psalm, I cried up unto thee, O Lord, in my being oppressed, thou heardest me, O Lord, deliver my soul [91 ] out of lips of violence and from a tongue of guile.\n\nWhat will they give to thee, and what will they add unto thee with a tongue of guile?\n\nThe arrows of the strong one are sharp with the coals of the desert.\n\nWoe to me because my place of dwelling became far away.\n\nI dwelt in the places of dwelling of Kedar.\n\nMy soul was made sojourner in a multitude of places.\n\nI was being peaceable with those who hate the peace, whenever I should speak with them they are wont to fight with me without a cause.\n\nThis therefore now, O Lord, is the explanation of the tenth repentance of the Pistis Sophia, that which she said while are oppressing her the material emanations of the Self-willed, they with his power of face of lion afflicted her greatly.\n\nSaid he [91 ] to him Jesus, Well (done) Petros and fairly (said).\n\nThis is the explanation of the tenth repentance of the Pistis Sophia.\n\nAdded also Jesus in the word, said he to his disciples, It happened therefore, having seen me the power of face of lion, I having come near unto the Pistis Sophia enlightening greatly, it was angry unto the more, and it emanated out of it other multitudes of emanations being fierce greatly.\n\nThese therefore having become, said the eleventh Repentance the Pistis Sophia saying, Why exalted itself the power of the strong (one) among evils?"

