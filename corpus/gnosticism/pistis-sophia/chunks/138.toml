[content]
body = "But these having said them Salome, the power of light which (is) in Maria the Magdalene boiled up within her, said she to the Saviour, My Lord, command to me that I may speak with my sister Salome, that I may say unto her the explanation of the word which she said.\n\nIt happened therefore, the Saviour having heard these words, saying them Maria, he called her happy greatly greatly.\n\nAnswered 172 the Saviour, said he to Maria: I command to thee Maria for to say the explanation of the word which said Salome.\n\nBut these having said them the Saviour, Maria sprang up toward Salome she saluted her, said she, My sister Salome because of the word [306 ] which thou saidst, It is written in the Law of Moyses, He who will forsake his father with his mother in a death let him die.\n\nNow therefore my sister Salome, the Law did not say this concerning the soul, nor concerning the body, nor concerning the counterfeit spirit, for these all the sons are of the Rulers, and ones out of them are, but the Law did say this concerning the power which came out of the Saviour, this which is Light-dweller within us to-day.\n\nThe Law also said, Every one who will remain outside of the Saviour with his mysteries, his parents, not only that in a death he will die, but in a perishing he will perish.\n\nThese therefore having said them Maria, Salome sprang up toward Maria, she saluted her again, said she, Salome, There is a power [307 ] of the Saviour making me understanding as thee also.\n\nIt happened the Saviour having heard the words of Maria he called her happy greatly greatly.\n\nAnswered also the Saviour, said he to Maria in the midst of the disciples.\n\nHear therefore Maria, Who it is who compelleth the man, even until he should do sin.\n\nNow therefore are wont the Rulers, they are wont to seal the counterfeit spirit in unto the soul, that it should not shake her at every hour, for her to do every sin with every unlawfulness: and also they are wont to order unto the counterfeit spirit, saying to it, Whenever the soul (psykikon, MS ) should come out of the body, shake her not, being imparted unto her, convicting her in all the Places of the judgments, according to Places, because of all the sins which thou causedst her to do, that they should punish her in all the Places [307 ] of the judgments, that she should not be able to go unto the Light, that she should cause them to turn her in unto the change of the body, in one word, they are wont to order the counterfeit spirit, Do not shake her at all in any hour except she should say mystery and loosen all the seals with all the bonds, in which we bound thee in unto her.\n\nAnd whenever she should say the mysteries and loosen all her seals with all the bonds with the defence of the Place, and whenever she should go, allow her to come, she having been reckoned unto those of the Light of the Height, and she was alien unto us and unto thee, and thou wilt be able to lay hold on her from that hour.\n\nIf indeed she should not say the mysteries of the loosening of thy bonds with thy seals with the defence of the Place, lay hold on her, dismiss her not, thou shalt convict 173 [308 ] her in the punishments with all the Places of the judgments concerning every sin which thou caused her to do: and after these take them (close) to the Virgins of the Light, this who is wont to dispatch them unto the cycle another time."

