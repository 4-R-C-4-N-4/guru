[content]
body = "Let a cloud of smoke cover over their eyes, and a mist of air let it make darkness unto them: and let them not see the day, that they should not lay hold on me.\n\nLet become powerless their plot, and the (things) which they plotted let them come upon themselves they deliberated unto a plot, and it did not happen for them: and they conquered them though being mighty; and the (things) which they prepared evilly fell down upon them.\n\nMy hope (is) being in the Lord, and I shall not fear: because thou art my God, [104 ] my Saviour.\n\nIt happened therefore, Salome having finished saying these words, said he to her, Jesus, Well (done) Salome and fairly: this is the explanation of the words which said the Pistis Sophia.\n\nBut added also Jesus in the word, said he to his disciples, It happened therefore, the Pistis Sophia having finished saying these words in the Chaos, I caused the power of Light which 57 I sent to her for to deliver her, I caused it to make a crown of light unto her head, that should not be able to prevail against her from this hour the emanations of the Self-willed.\n\nAnd it having made a crown of light unto her head, moved all the matter which (are) evil, which (are) in her, and they were all purged from her [104 ], they perished and they became in the Chaos, looking at them the emanations of the Self-willed, and rejoicing at them.\n\nAnd the purities of true light which (are) in the Sophia, her true light combined to give power with the light of my power of Light, this which made a crown for her head.\n\nIt happened therefore also, while (my power) surroundeth the true light which (is) in the Sophia, her true light did not become outside of the crown of the power of the flame of light, that should not steal it, the emanations of the Self-willed.\n\nThese (things) therefore having happened to her, the power of true light which (is) in the Sophia began (and) hymned.\n\nBut she hymned unto my power of Light which became for a crown unto her head: [105 ] but she hymned saying, The Light becometh for a crown unto my head, and I shall not become outside it, that should not rob me the emanations of the Self-willed: and (even) if should move all the matters, but I shall not be moved: and (even) if should perish all my matters, and remain in the Chaos, these which were seen by the emanations of the Self-willed.\n\nBut I shall not perish, because the light becometh with me, and I also become with the light.\n\nBut these words said the Pistis Sophia.\n\nNow therefore he who understandeth the meaning of these words, let him come forward and utter their explanation.\n\nBut came forward Maria the mother of Jesus, said she, My son according to the world, [105 ] my God and my Saviour according to the Height, command to me and (let) me utter the explanation of the words which said the Pistis Sophia.\n\nBut answered Jesus, said he, Thou also Maria, this (one) who tookest form which (is) in the Barbelo according to the matter, and thou tookest likeness which (is) in the Virgin of the Light according to the Light, thou with the other Mariham the happy.\n\nAnd the darkness became because of thee, and also came out of thee the body of the matter in which I am becoming, this which I cleansed and I purified it.\n\nNow therefore I command to thee for to utter the explanation of the words, these which said the Sophia."

