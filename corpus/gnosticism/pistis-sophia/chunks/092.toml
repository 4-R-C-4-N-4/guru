[content]
body = "Now therefore not only ye will reign with me, but every man who will receive the Mystery of the Ineffable, they will become ruling with me in my kingdom, and I am them, and they are I: but my throne will become more excellent than they, because that ye will suffer in the World beyond every man, even until ye preach every word which I shall say unto you: but your thrones will become fastened unto mine in my kingdom.\n\nBecause of this I said [215 ] unto you once, The place in which I shall become, will become with me also my twelve Deacons: but Maria the Magdalene with Iohannes the Virgin will become excelling all my disciples.\n\nAnd every man who will receive Mystery of the Ineffable, they will become on my left and on my right, and I am they and they are I.\n\nAnd they will be equal with you in every thing.\n\nBut nevertheless your thrones will become excelling theirs, and my throne even mine will become excelling yours.\n\nAnd every man who will find the word of the Ineffable, Amen I say unto you, The men will know that word, they will know the knowledge of all these words which I said unto you, those of the depth and those of the height, those of the length with those of [216 ] the breadth, in one word, they will know the knowledge of all these words which I said unto you, and those which I said not unto you, these I shall say unto you according to Place and according to array in the Distribution of the Universe.\n\nAnd Amen I say unto you, They will know in what sort the World is placed, and they will know in what type all the things of the Height are placed, and they will know because of what thing the Universe became.\n\nThese therefore having said them the Saviour, sprang up Maria the Magdalene, said she, My Lord bear with me, and be not angry with me seeking after every thing in an exactness with a certainty.\n\nNow therefore, my Lord, then is one the word of the Mystery of the Ineffable and one the word of the knowledge of the Universe [216 ]?\n\nAnswered the Saviour, said he, Yea one (is) the Mystery of the Ineffable and one is 117 the word the knowledge of the Universe.\n\nBut also answered Maria, said she to the Saviour, My Lord, bear with me, seeking from thee, and be not angry with me.\n\nNow therefore, my Lord, except we live and know all the word of the Ineffable, shall we not be able to inherit the kingdom of the Light?\n\nBut answered the Saviour, said he to Maria, Yea, for every one who will receive the Mystery of the kingdom of the Light, each will go and inherit even unto the Place unto which he received mystery; but he will not know the knowledge of the Universe because of what all these (things) became, except he should know the one word of the Ineffable namely, the knowledge of the Universe.\n\nAnd also openly [217 ] I am the knowledge of the Universe.\n\nAnd also it is impossible to know the one word of the knowledge, except forsooth he receive the First Mystery of the Ineffable: but every man who will receive mystery in the Light will go each and inherit unto the Place unto which he received mystery.\n\nBecause of this I said unto you once, He who believeth a prophet will receive the reward of a prophet, and he who believeth a righteous (man) will receive the reward of a righteous man, namely, even unto the Place which each receiveth mystery he will go unto it.\n\nHe who receiveth, being prepared is going to inherit the mystery which is less, and he who will receive mystery being more excellent he is going to inherit the Places which are exalted."

