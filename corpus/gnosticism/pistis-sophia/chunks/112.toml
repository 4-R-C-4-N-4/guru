[content]
body = "He who taketh up a mystery and completeth it, afterwards therefore whenever he should ask any (every) thing, poverty and riches, weakness and strength, disease and sound body, with every healing of the body, and with the raising of the dead, and to cure the lame with the blind with the deaf with the dumb, with every sickness with every pain, in one word, he who will complete that mystery and ask (every) thing which I said, it will [256 ] happen to him instantly.\n\nThese therefore having said them the Saviour, came forward the disciples, they cried out all one after (upon, MS ) another, saying, O Saviour, thou distracted us greatly with the greatnesses which thou sayest to us, and because thou tookest away our souls, and they became compelled to come out of us in unto thee, (for) because that ones out of thee they are.\n\nNow therefore because of these greatnesses were distracted our souls these which thou sayest unto us, and they were pressed greatly greatly unto a wishing to come out of us unto the Height unto the Place of thy kingdom.\n\nThese therefore having said them the disciples, added also the Saviour, said he to his disciples, Whenever ye should go to cities or kingdoms or countries, preach to them at first, saying, Seek at every hour, and [257 ] leave not off even until ye find the mysteries of the Light, these which will take you in unto the kingdom of the Light.\n\nSay unto them, Take heed unto you of the teachings of error, otherwise there are a multitude coming in my name saying, I am, being not I, and they will deceive a multitude.\n\nNow therefore every man who cometh (close) to you and believe you, and hearken unto your words, and do that (which is) 141 worthy of the mysteries of the Light, then give to them the mysteries of the Light, and hide not them from them: and he who is worthy of the mysteries which are high, give them to him, and he who is worthy of the mysteries which are lower, give them to him, and hide not any from any.\n\nThe mystery indeed of the raising the dead and curing the sicknesses, give it not to any, nor teach in it: because that mystery is the (mystery) of the Rulers, it with all its namings.\n\nBecause of this therefore [257 ] give it not to any, nor teach in it, even until ye establish the faith in all the World: that whenever ye should come into cities or countries and they do not receive you unto them, and they believe you not and they hearken not unto your words, and ye should raise dead (ones) in those places, and cure the lame with the blind with the sicknesses which are various in those places: and through you all these of this kind they will believe you, that ye are preaching the God of the Universe, and they (will) believe every word from you: because of this therefore I gave to you that mystery, even until ye establish the faith in all the World.\n\nThese therefore having said them the Saviour, he added also in the word, said he to Maria, Now therefore hear, Maria, concerning [258 ] the word of which thou sought from me, What it is which compelleth the man even until he doeth sin."

