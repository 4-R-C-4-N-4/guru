[content]
body = "But if it is proper for him being man of the World having done this, very much more therefore the Ineffable with the First Mystery, these who are lord over the Universe are having the authority in everything to do that which they will, for them to forgive everyone who receiveth mystery?\n\nOr otherwise indeed if a king to-day putteth vesture of king upon a soldier, and sendeth him unto other places, and he doeth [281 ] murders with sins which are grievous being worthy of the death, and they are not wont to be able to do anything evil to him because the vesture of the king put upon him, very much more therefore those who wear the mysteries of the vestures of the Ineffable with those of the First Mystery, these which are lord over all those of the Height with all those of the Depth.\n\nAfter these (things) Jesus saw a woman having come to repent, he baptised her three times, and she did not do that which is worthy of the baptism.\n\nAnd the Saviour wished to tempt Petros to see if he became merciful and forgiving according as he ordered unto them, said he toward Petros, Behold three times I baptised this soul, and in these (this, MS ) three times she did not that which is worthy of the mysteries of the Light.\n\nBecause of what therefore [281 ] doth she render useless also the body?\n\nNow therefore Petros, perform the mystery of the Light, this which is wont to cut away the souls from the inheritance of the Light.\n\nPerform that mystery, and cut away the soul of this woman from the inheritances of the Light.\n\nThese therefore having said them the Saviour he tempted to see whether he became merciful and forgiving.\n\nThese therefore having said them the Saviour, said he, Petros, My Lord, leave her this time also, that we may give to her the mysteries which are high, and whenever she should become profitable thou lettest her, she inherited the kingdom of the Light, but if she should not become profitable, thou cuttest her away from the kingdom of the Light.\n\nThese therefore having said them Petros, knew the Saviour that Petros became merciful 157 (like) his manner and forgiving.\n\nAll these therefore having happened, said he the Saviour [282 ] to his disciples, Understand ye all these words with the type of this woman?\n\nAnswered Maria, said she, My Lord, I understand the mysteries of the words which happened to this woman.\n\nConcerning the words therefore which happened to her, which thou saidst unto us once in a parable, saying, A man had a fig-tree in his vineyard, but he came seeking after his fruit, and he found not any on it.\n\nSaid he to his gardener, Behold, three years I come, I seek after fruit in this fig-tree, and I find not any in it, cut it (down), therefore, because of what rendereth it useless also the ground.\n\nBut he answered, said he to him, My Lord, bear with it this year also, until I shall dig around it, and put dung to it.\n\nBut if it should send forth another year, thou lettest it (be), but if thou findest not any, thou cuttest it (down).\n\nBehold [282 ] this, my Lord, is the explanation of the word.\n\nAnswered the Saviour, said he to Maria, Well (done) O spiritual (one) this is the word."

