[content]
body = "This is the work of those who slander with the Lord and those who say contrary to lawful (things) against my soul.\n\nBut thou, O Lord, do mercy with me because of thy name.\n\nSave me because I am poor and I am miserable: my heart was disturbed in my inward part, they took me away from the midst, as a shadow which declined.\n\nThey drive me away [99 ] as locusts.\n\nMy knees weakened in the fasting, and my flesh changed because of (the want of) the oil.\n\nBut I, I became to them for reproach: they saw me, they moved their heads.\n\nHelp me, O Lord God, and save me according to thy mercy.\n\nLet them know that this is thy hand, and thou, thou fashionedst it, O Lord.\n\nThis therefore is the explanation of the twelfth repentance, this which said the Pistis Sophia being in the Chaos.\n\nBut added again Jesus in the word, said he to his disciples, It happened also after these (things), cried up at me the Pistis Sophia, saying, O Light of the Lights, I transgressed in the twelve [99 ] Aeons, I came down from them.\n\nBecause of this I said twelve Repentances according to each one of the Aeons.\n\nNow therefore, O Light of the Lights, forgive to me my transgressions, because great greatly it is, because I forsook the Place of the Height, I came, I dwelt in the Place of the Chaos.\n\nThese therefore, having said them the Pistis Sophia, she added also in the thirteenth Repentance, saying, Hear me while I hymn unto thee, O Light of the Lights.\n\nHear me saying the Repentance of the thirteenth Aeon, the Place out of which I came down, that should be completed the thirteenth Repentance of [100 ] the thirteenth Aeon: these Aeons which I transgressed, I came down out of them.\n\nNow therefore, O Light of the Lights, hear me while I hymn unto thee in the thirteenth Aeon, my Place out of which I came.\n\nDeliver me, O Light, in thy great mystery, and forgive my transgression in thy forgivingness.\n\nAnd give to me the baptisms and forgive my sins, and cleanse me out of my transgression.\n\nAnd my own transgression is the power of face of lion, this which shall not be hidden from thee in every time, because I came down because of it.\n\nAnd I, I transgressed alone among the Invisibles, 55 in whose Place I become.\n\nI came down unto the Chaos, [100 ] I transgressed before thee, that thy precept should be completed.\n\nThese therefore said the Pistis Sophia.\n\nNow therefore, he whose spirit moveth him for to understand her words, let him come forward and utter their meaning.\n\nCame forward Martha, said she, O Lord, my spirit moveth me for to utter the explanation of those (words) which said the Pistis Sophia.\n\nThy power prophesied once concerning them by David in the fiftieth psalm, saying thus, Have mercy upon me, O God, according to thy great mercy.\n\nAccording to the multitude of thy compassions blot out my sin.\n\nWash me greatly out of my unlawfulness.\n\nAnd my sin is in my presence [101 ] at every time: that thou shouldst be justified in thy words, and conquer in thy giving judgment unto me.\n\nThis is the explanation of the words which said the Pistis Sophia.\n\nSaid he to her, Jesus, Well (done) (and) fairly, Martha the happy."

