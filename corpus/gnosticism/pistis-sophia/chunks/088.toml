[content]
body = "And that Mystery [206 ] indeed is that which knoweth because of what despoiled themselves the Boundless (ones) and because of what they set them up being twelve Boundless Spaces, and they placed them being three arrays of Spaces according to the arrangement of the Only One, the Ineffable, and because of what they proceeded out of the Fatherless (ones).\n\nAnd that Mystery indeed is that which knoweth because of what despoiled themselves the twelve Uncontainable (ones) these which belong to (the) arrays of the Only One, the Ineffable One, and because of what indeed they proceeded out of the Fatherless (ones), until they bring them indeed unto the Space of the First Mystery, namely, the second Space.\n\nAnd that Mystery indeed is that which knoweth because of what despoiled themselves [206 ] the twenty-four ten thousand of hymners, and because of what indeed they distributed them outside of the Veil of the First Mystery, namely, the twin Mysteries of the Only One, the Ineffable, that (One) which looketh inward and that (One) which looketh outward, and because of what indeed they proceeded out of the Fatherless (ones).\n\nAnd that Mystery indeed is that which knoweth because of what despoiled themselves all the Uncontainable (ones), these whom I finished saying, these which (are) in the Places of the second Space of the Ineffable, namely, the Space of the First Mystery, and because of what those Uncontainable (ones) with those Boundless (ones) proceeded out of the Fatherless (ones).\n\nAnd that Mystery indeed is that which knoweth because of [207 ] what despoiled themselves, the twenty-four Mysteries of the first Triple spirit, and because of what they called them, The twenty-four Spaces 112 of the first Triple spirit, and because of what they proceeded out of the second Triple spirit.\n\nAnd that Mystery indeed is that which knoweth because of what despoiled themselves the twenty-four Mysteries of the second Triple spirit, and because of what they proceeded out of the third Triple spirit.\n\nAnd that Mystery indeed is that which knoweth because of what despoiled themselves the twenty-four Mysteries of the third Triple spirit, namely, the twenty-four Spaces of the third Triple spirit, and [207 ] because of what they proceeded out of the Fatherless (ones).\n\nAnd that Mystery indeed is that which knoweth because of what despoiled themselves the five Trees of the first Triple spirit, and because of what they distributed them standing one after another, and also being bound in unto one another, with all their arrays, and because of what they proceeded out of the Fatherless (ones).\n\nAnd that Mystery indeed is that which knoweth because of what despoiled themselves the five Trees of the second Triple spirit, and because of what they proceeded out of the Fatherless (ones).\n\nAnd that Mystery indeed is that which knoweth because of what despoiled themselves the five Trees of the third Triple spirit, and because of what they proceeded [208 ] out of the Fatherless (ones).\n\nAnd that Mystery indeed is that which knoweth because of what despoiled themselves the Pre-Uncontainable (ones) of the first Triple spirit, and because of what they proceeded out of the Fatherless (ones).\n\nAnd that Mystery indeed is that which knoweth because of what despoiled themselves the Pre-Uncontainable (ones) of the second Triple spirit, and because of what they proceeded out of the Fatherless (ones).\n\nAnd that Mystery indeed is that which knoweth because of what despoiled themselves all the Pre-Uncontainable (ones) of the third Triple spirit, and because of what they proceeded out of the Fatherless (ones)."

