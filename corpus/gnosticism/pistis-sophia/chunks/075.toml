[content]
body = "It happened therefore, Jesus having finished saying these words unto his disciples, sprang up Maria the Magdalene, said she, My Lord, be not angry with me, seeking (from) thee, because that we are seeking after every thing in an exactness.\n\nBut, answered Jesus, said he to Maria, Seek after that which thou wishest to seek after, and I, I shall reveal it to thee boldly without parable.\n\nAnd every thing which thou seekest after, I shall say to thee in an exactness with a certainty, and I shall complete you with every power [175 ] with every Pleroma, from the inward part of the inward parts as far as the outward part of the outward parts, from the Ineffable even unto the darkness of the darknesses, that they should call of (against you, MS), the Pleromas which are complete in every knowledge.\n\nNow therefore, Maria, seek that which thou art seeking after, and I shall reveal it to thee in great joy with great delight.\n\nIt happened therefore, Maria having heard these words, speaking them the Saviour, she rejoiced in great joy greatly and she was delighted, said she, My Lord, then the men of the World, these who received the mysteries of the Light, will they become preferable to the emanations of the Treasury in thy kingdom?\n\n[176 ] Because that I heard thee saying, Whenever I should take you unto the Place of those who receive the Mysteries, the Place, the Land of the Light will be reckoned with you as a speck of dust, from the great distance which it is distant from it, and with the great glory in which it becometh, namely the Land of the Light of the Treasury, the Place of the emanations, then therefore, my Lord will the men who receive the mysteries become preferable to (those who belong to) the Land of the Light, and become preferable to them in the Kingdom of the Light?\n\nBut answered Jesus, said he to Maria, Fairly, however, at least thou seekest after everything in an exactness with a certainty: but hear, Maria, that I may speak with thee upon the Consummation of the Aeon with the catching-up [176 ] of the Universe.\n\nIt shall not happen thus, but I said unto you, Whenever I should take you unto the Place of the Inheritance of those who receive the 95 mystery of the Light, the Treasury of the Light, the Place of the emanations, it will be reckoned with you as a speck of dust, and as the light of the sun of the day only.\n\nThey said therefore, These will happen in the time of the consummation of the catching-up of the Universe.\n\nThe twelve Saviours of the Treasury with the twelve arrays of each of them, namely, the emanations of the seven Voices with the five Trees will become with me in the Place of the Inheritances of the Light, being Kings with me: each one of them being King [177 ] over his emanations: and also each one of them is becoming King according to his glory: the great according to his greatness, the small according to his smallness: and the Saviour of the emanations of the first Voice, they will become in the Place of the souls of those who received the First Mystery of the First Mystery in my Kingdom: and the Saviour of the emanations of the second Voice will become in the Place of the souls of those who received the Second Mystery of the First Mystery.\n\nLikewise also the Saviour of the emanations of the third Voice will become in the Place of the souls of those who receive the Third Mystery of the First Mystery in the Inheritances of the Light."

