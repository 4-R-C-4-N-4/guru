[content]
body = "Answered the Saviour, said he to Maria, Whenever the light of the sun is out, it is wont to cover with darkness the dragon: but if the sun should be down from the World, is wont the darkness to remain as curtain for the sun; and is wont the cloud (breath, MS ) of the darkness to come in unto the World in the form of a (pillar of) smoke in the night, namely, whenever the sun should draw unto him(self) his rays: for it is impossible for the World to endure the darkness of the dragon in its truth of shape, otherwise it is wont to be dissolved and perish at once.\n\nThese when had said them the Saviour, added also Maria, said she to the Saviour, My Lord, yet I seek from thee, and hide not from me.\n\nNow therefore, my Lord, Who is he who will compel the man, even until he doth sin?\n\nAnswered [301 ] the Saviour said he to Maria, The Rulers of the Destiny they are those who compel the man, even until he should do sin.\n\nAnswered Maria, said she to the Saviour, My Lord, Are not indeed wont the Rulers, they are wont to come down unto the World and compel the man, even until he should do sin?\n\nAnswered the Saviour, said he (to) Maria, They are not wont thus to come down unto the World, but are wont the Rulers of the Destiny whenever an ancient soul should come, coming down from them, are wont the Rulers 169 of that great Destiny, this which (is) in the Place of the head of the Aeons, which Place is that which they are wont to call, The Place of the kingdom of the Adamas, and that Place indeed is that which is in presence of the Virgin of the Light, are wont the Rulers of the Place [301 ] of that head they (he, MS ) are wont to give to the ancient soul a cup of forgetfulness out of the seed of the wickedness filled with all lusts which are various, and with every forgetfulness: and as soon as that soul will drink from the cup, she is wont to forget every Place unto which she went, with all the punishments in which she went (through); and is wont that cup of water of forgetfulness, it is wont to become body outside of the soul, and it is wont to become being like to the soul in every form, and being like unto her namely it is this which they are wont to call, The counterfeit spirit.\n\nIf however it is a new soul they are wont to take out of the sweat of the Rulers, and out of the tears of their eyes, or otherwise indeed out of the breath of their mouth, in one word, if one out of the [302 ] new souls or one of the souls of this kind, if one out of the sweat it is, are wont the great Rulers of the great Destiny, they are wont to take away of the sweat of all the Rulers of their Aeons, and knead them with one another at once, and divide it and make it into soul, or otherwise indeed if it is dregs of the purifying of the Light, is wont Melkhisedek to take it away from the Rulers; are wont the five great Rulers of the great Destiny, they are wont to knead the dregs upon one another, and divide it and make it into soul after soul, that each of the Rulers of the Aeons, each of them should put his portion in the soul.\n\nBecause of this therefore they are kneading them up one on another, that they all should belong to the soul.\n\nAnd [302 ] are wont the five great Rulers, whenever they should divide them and make them into souls, they are taking them out the sweat of the Rulers."

