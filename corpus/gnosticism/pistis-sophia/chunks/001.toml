[content]
body = "But it happened after that Jesus rose out of those who (are) dead, and he spent eleven years speaking with his disciples, and teaching them only as far as the Places of the First precept (Law?), and as far as the Places of the First Mystery, this which (is) the inward of the veil which (is) within the First precept, namely the twenty-fourth mystery out(side) and below; these (Places) which become in the second Space of the First Mystery which (is) before every mystery, the Father in the form of dove.\n\nJesus is saying to his disciples, I came out of that First Mystery, namely [1 ] the Last mystery which is the twenty-fourth, and which the disciples knew not and understood not that there is anything within that mystery; but they were thinking of that mystery that it is the head of the Universe, and the head of all those which become.\n\nAnd they were thinking that it is the completion of all the completions because that Jesus was saying to them concerning that mystery that it (is) that which surroundeth the first precept with the five Marks and with the great Light and with the five Helpers and with all the Treasury of the Light.\n\nAnd also Jesus had not said unto his disciples all the distribution [2 ] of all the Places of the great Invisible with the three Triple Powers with the twenty-four Invisibles with all their Places with their Aeons with all their arrays as they are distributed, these namely the emanations of the great Invisible and with their Unbegotten (ones) and with their Self begotten (ones) and with their Begotten (ones) and with their luminaries and with their Unpaired (ones) and with their Rulers with their Authorities with their Lords with their Archangels with their Angels with their Dekans with their Ministers with all the houses of their Spheres, and [2 ] with all the arrays each one of them.\n\nAnd Jesus had not said unto his disciples all the distribution of the emanations of the Treasury nor their arrays as they are 2 distributed: nor had he said unto them their Saviours according to the array of each one as they are.\n\nNor had he said unto them what Guardian is at each (door) of the Treasury of the Light.\n\nNor had he said unto them the Place of the Twin Saviour, namely the child of the child.\n\nAnd he had not said unto them the Place of the three Amens in what Place they are distributed [3 ].\n\nAnd he had not said unto them in what Place the five Trees are distributed, nor the other seven Amens, namely, the seven Voices, what is their Place according as they are distributed.\n\nAnd Jesus had not said unto his disciples of what type are the five Helpers, or in what Place they were brought.\n\nNor had he said unto them in what manner the great Light was distributed, or in what Place it was brought.\n\nNor had he said unto them the five Marks, nor concerning the First precept in what Place it was brought.\n\nBut he was only speaking [3 ] with them simply, teaching them that they exist (become).\n\nBut their distribution with the array of their Places he had not said unto them according as they exist.\n\nBecause of this indeed they knew not that there are other Places becoming the inward of that Mystery.\n\nAnd he had not said unto his disciples out of what Place I came until I came into that Mystery, until I came forth out of it.\n\nBut he was wont to say to them, teaching them that I came out of that Mystery."

