[content]
body = "Answered Jesus, said he to Maria in the midst of the disciples, Amen, amen I say to you, The second Helper is distant from the first Helper in a great distance immeasurable in reference to the height above and beneath, in reference to the depth and in reference to the length with the breadth: for he is being distant from him greatly greatly in a great (amount) immeasurable by the Angels with the Archangels and by the Gods with all the Invisibles: and greater he is than him greatly greatly [187 ] immeasurable by the angels with the archangels and by (the) Gods with all the Invisibles, and he shineth more than him immeasurable greatly greatly there not being measure unto the light which becometh from him, being immeasurable by the Angels with the Archangels and by the Gods with all the Invisibles as I finished saying to you another time.\n\nLikewise also the third Helper with the fourth with the fifth, one being great(er) than one infinitely, and he shineth more than him, and he is distant from him in a great distance immeasurable by the Angels with the Archangels with the Gods with all the Invisibles, according as [188 ] I finished saying to you another time.\n\nAnd also I shall say unto you the type of each in their Distribution.\n\nIt happened therefore, Jesus having finished saying these words unto his disciples, 101 came again forward Maria the Magdalene, she added, said she to Jesus, My Lord, then those who receive the mystery of the Light will become in what type in the midst of the last Helper?\n\nBut answered Jesus, said he to Maria in the midst of the disciples.\n\nThose who received the mysteries of the Light, whenever they should come out of the body of the matter of the Rulers, each according to the mysteries which he received, being about to become in his array.\n\nThose who receive mystery also which is high, they will remain in the array which is high.\n\nThose who receive also the mysteries which are lower they will become in the array which is lower, in one word [188 ] the Place (in) which each received mystery, even unto it will he remain in his array in the Inheritance of the Light.\n\nBecause of this therefore I said unto you once.\n\nThe Place (in) which your heart is about to become, there your treasure; namely, that the Place (in) which each received mystery even unto it is about to become there.\n\nIt happened, Jesus having finished saying these words unto his disciples, came forward Iohan(nes), said he to Jesus, My Lord and my Saviour, command to me also, that I may speak in thy presence, and be not angry with me seeking after everything in an exactness with a certainty, because that, my Lord, in a promise thou promisedst to me to reveal everything which I shall seek from thee.\n\nNow therefore my Lord, hide not anything from us at all in [189 ] the thing which we shall seek from thee.\n\nBut answered Jesus in great mercy, said he to Iohannes, Thou also, the happy Iohannes and the beloved, I command to thee for to say the word which thou willest, and I shall reveal to thee in face against face without parable, and I shall say to thee every thing which thou wilt seek after (them) in an exactness with a certainty.\n\nAnswered Iohannes, said he to Jesus, My Lord, then the Place in which each received the mystery even unto it he is about to remain, and he hath not authority to go in unto another array which (is) above him, nor hath he authority to come unto the arrays which (are) below him."

