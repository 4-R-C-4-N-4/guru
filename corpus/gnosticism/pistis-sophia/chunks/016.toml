[content]
body = "But I shortened the periods with the times because of the perfect number of the souls, which will receive mysteries, namely the chosen (ones): and if I did not shorten their times, there is not any material soul (which) will be saved.\n\nBut they would have been consumed in the fire, this which becometh in the flesh of the Rulers.\n\nThis therefore is the word about which thou enquirest of me in accuracy.\n\n[38 ] But it happened, Jesus having finished saying these words unto his disciples, they all prostrated together, they worshipped to him, and said they to him, We are happy (ones) beyond every man, thou having revealed to us these great grandeurs.\n\nAdded also Jesus in the word, said he to his disciples, Hear, hear concerning the words which became to me among 21 the Rulers of the twelve Aeons, with all their Rulers, with their Lords, with their Authorities, with their Angels with their Archangels.\n\nThey having seen therefore the vesture of light which (is) upon me, they with their Unpaired (ones) every one of them saw the mystery of their name becoming in my vesture of light, this [39 ] which (is) upon me, they prostrated all one after another, they worshipped to the vesture of light which (is) upon me, and they all cried out together, saying, How did the Lord of the Universe pass through us, we having not known (it).\n\nAnd they all hymned together unto the inward part of the inward parts.\n\nAnd all their Triple powers, with their great Forefather and their Unbegotten (ones) with their Self-begotten (ones) with their Begotten (ones) with their Gods with their sparks with their luminaries, in one word, with all their great (ones) they saw the Tyrants of their Places abiding in feebleness, having their power diminished in them, and they became themselves in great weakness, and they became also in great fear, there being no measure unto it.\n\nAnd they were [39 ] beholding the mystery of their name in my vesture, and they had begun to come and worship the mystery of their name, which (is) in my vesture: and they were not able to prevail because of the great light which becometh with me.\n\nBut they worshipped distant from me a little: but they worshipped the light of my vesture, and they all cried out together hymning unto the inward part of the inward parts.\n\nIt happened therefore, these having happened, to the Tyrants, who become among the Rulers, they were all weakened, they fell down in their Aeons, and they became as the men of the world who are dead, having not breath in them, as also they did at the hour (in) which I took away their power from them.\n\nIt happened therefore after these (things) I having come out to those Aeons, each [40 ] one of all those who become in the twelve Aeons, they were all bound in unto their arrays, and they completed their works according as I put them, for to spend six months turned to the Left, doing their works in their four-corners with their three-corners, with those who (are) in front of them.\n\nAnd again to spend another six months beholding the Right in their three-corners and in their four-corners, with those who are in front of them.\n\nThus also will move, those who become in the Destiny with the Sphere.\n\nIt happened therefore after these (things) I came unto the Height even unto the veils of the thirteenth Aeon ( MS.\n\nAeons)."

