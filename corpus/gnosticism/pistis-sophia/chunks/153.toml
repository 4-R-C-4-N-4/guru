[content]
body = "Stood (up) Jesus in front of the Oblation: he put the disciples behind him, all being wrapped in garment of linen, with the ticket of the name of the Father of the Treasury of the Light in their hands.\n\nHe cried out thus, saying, Hear me, my [333 ] Father, the Father of 190 every fatherhood, the boundless Light Iao iuo iaō aoi uia psinother theropsin (n)opsither nephthomaoth nephiomaōth marakhakhtha marmarakhtha ieanamenaman amaneitououranou israi amen amen soubaibai appaap amen amen deraaraiapaou amen amen sarsasartou amen amen koukiaminmiai amen amen iai iai touap amen amen amen main mari marie marei amen amen amen.\n\nHear me, my Father, the Father of every kingdom, I invoke you also the forgivers, the purifiers of the unlawfulness, forgive the sins of the souls of these disciples who followed me, and purify their unlawfulness, and cause them to be worthy of being numbered in unto the kingdom of my [334 ] Father, the Father of the Treasury of the Light, because they followed me and kept my commandments.\n\nNow therefore my Father, Father of every fatherhood, let come the forgivers, whose names are these ghiphirepsnijiet—zenei berimou—sokhabrikher euthari nanei dieis balmerikh Meuni poskhirie entair mouthiour cmour peukher oouskhous minionor isokhobor tha.\n\nHear me invoking you, forgive the sins of these souls and blot out their unlawfulness: let them be worthy of being numbered in unto the kingdom of my Father the Father of the Treasury of the Light: because I know thy great powers and I invoke them Ayer bebrō athroni eoureph eone souphen knitou sokhreoph mayoubi mneyor sououi khokheteoph khōkhe [334 ] eteoph memōkh aneuph.\n\nForgive the sins of these souls, blot out their unlawfulness, those which they did knowing, and those which they did not knowing, those which they did in fornication with adultery even until to-day: forgive them to them, and cause them to be worthy of being numbered in unto the kingdom of my Father, and be worthy of receiving out of this Oblation, my Father who (art) holy.\n\nIf therefore my Father thou heardest me and forgavest the sins to these souls and blottedst out their unlawfulness, and thou causedst them to be worthy of being numbered in unto thy kingdom, thou shalt give to me a sign in this Oblation.\n\nAnd happened the sign which Jesus said.\n\nSaid Jesus toward his disciples, Rejoice and be glad; because they forgave your sins, they blotted out your unlawfulness [335 ] and ye were numbered in unto the kingdom of my Father.\n\nBut these having said them, the disciples rejoiced in great joy, said Jesus to them, This is the manner and this is the mystery which ye will do for the men who will believe you, having not guile in them, and hearkening to you in every word which is good.\n\nAnd their sins with their unlawfulness they 191 will blot them out unto the day (in) which ye did this mystery.\n\nBut hide this mystery, give it not to every man except him who will do every thing which I said to you in my commandments.\n\nThis therefore is the mystery of the truth of the baptism of those who will forgive their sins, and those who will cover over their unlawfulnesses."

