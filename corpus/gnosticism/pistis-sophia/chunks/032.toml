[content]
body = "Give heed unto the Rulers of the twelve Aeons, these which hated me in jealousy.\n\nBe watchful with my power and deliver me, and let me not remain in this darkness: because I believed thee, and they made me foolish greatly because I believed [74 ] thee, O Light.\n\nNow therefore, O Light, deliver my powers up from the emanations of the Self-willed, these in which I am oppressed.\n\nNow therefore he who is sober let him be sober.\n\nThese therefore Jesus having said them unto his disciples came forward Thomas, said he, My Lord, I am sober I become soberer and my spirit is ready in me, and I am glad greatly, because thou revealedst to us these words: nevertheless therefore I am bearing with my brothers up till now, that I should not be angry with them.\n\nBut I bear with each of them, coming forward to thee, saying the explanation of the repentance of the Pistis Sophia.\n\nNow therefore, my Lord, concerning the explanation of the seventh repentance of the Pistis Sophia, [74 ] thy power of light prophesied about it by David the prophet, saying thus in the twenty-fourth psalm, O Lord, I lifted my soul up unto thee, my God, I confided in thee, let me not be ashamed, nor let mine enemies mock at me.\n\nFor even every one who is patient with thee, they will not be ashamed.\n\nThey shall be ashamed, those who are unlawful 41 without a cause.\n\nO Lord, show to me thy ways and teach me thy paths guide me in the way of thy truth and teach me: because thou art my God my Saviour, I will have patience with thee all the day.\n\nRemember thy compassions, O Lord, and thy [75 ] mercies because they become from age.\n\nThe sins of my youth with my ignorance remember not; remember me rather according to the multitude of thy mercy, because of thy kindness, O Lord: kind and being straight is the Lord, because of this he will teach the sinners on the road: he will guide the meek in judgment, he will teach the meek his roads.\n\nAll the roads of the Lord mercies are and truth, to those who seek for his righteousness and his testimonies: because of thy name, O Lord, forgive my sin to me which is plentiful greatly.\n\nWho is the man who feareth the Lord?\n\nHe will establish law for him on the road which he wished.\n\nHis soul [75 ] will dwell in goods, and his seed will inherit the earth.\n\nThe Lord is the firmness of those who fear him, and the name of the Lord is that of those who fear him, to show to them his covenant.\n\nMine eyes are gazing at the Lord at every time; because he it is who will draw my feet out of the snare.\n\nLook upon me, and have mercy upon me, because I am orphan, I am poor, indeed.\n\nThe afflictions of my heart widened.\n\nBring me out of my necessities.\n\nSee my humility with my tribulations and forgive all my sins.\n\nSee mine enemies because they increased; and they hated me in a hatred of violence.\n\nGuard my soul [76 ] and save me.\n\nLet me not be ashamed because I hoped unto thee.\n\nThe innocent (ones) with those who are straight clave unto me, because I have patience unto thee, Lord God, redeem the Israel out of all his afflictions.\n\nBut Jesus having heard the words of Thomas, said he to him, Well (done) Thomas and fairly.\n\nThis is the explanation of the seventh repentance of the Pistis Sophia.\n\nAmen, amen I say to you, Will call you happy upon the earth all the generations of the World, because I revealed these (things) to you, and ye received out of my spirit, and ye became understanding and spiritual (ones), understanding the (things) which I say."

