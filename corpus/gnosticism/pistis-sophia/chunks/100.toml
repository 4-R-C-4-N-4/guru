[content]
body = "This is the answer of the words after which ye seek.\n\nNow therefore also, Andreas, yet art thou being in unbelief and with ignorance?\n\nBut whenever ye should come out of the body and go unto the Height, and arrive at the Place of the Rulers, all the Rulers will take shame before you; because ye are the dregs of their matter, and ye became Light purified more than they all.\n\nAnd whenever ye should arrive at the Place of the great Invisibles with the Place of those of the Middle, with those of (the) Right (hand), with the Place of all the great emanations of the Light, ye will take glory together with them all, because ye are the dregs of their matter, and ye became [233 ] light excellent more than they all.\n\nAnd all the Places will hymn before you, even until ye go unto the Places of the kingdom.\n\nThese therefore saying them the Saviour, knew Andreas clearly not only he, but knew all the disciples in directness that they will inherit the kingdom of the Light.\n\nThey prostrated all one after (upon, MS ) another at the feet of Jesus, they cried out, they wept, they besought the Saviour, saying, O Lord, forgive the sin of the ignorance of our brother.\n\nAnswered the Saviour, said he, I forgive and I shall forgive.\n\nBecause of this therefore dispatched me the First Mystery for me to forgive the sins of everyone.\n\n[Half this last line is ornament: more ornament follows, and the title of the Third Document finishes the column.] 127"

