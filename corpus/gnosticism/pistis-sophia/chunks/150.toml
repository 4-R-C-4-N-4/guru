[content]
body = "The souls therefore which will take away by robbery the hekate, she is wont to deliver them unto her demons which are under her to torment them by her smoke of darkness with her evil fire: they are afflicting them greatly by the demons, and they are wont to spend hundred with five years with six months punishing them in her punishments evil.\n\nBut they are wont to begin to be destroyed and to perish.\n\nAnd after these (things) whenever the Sphere should turn round and (should) come the little Sabaoth the good, he of the Middle, this (one) whom they are wont in the World to call, Zeus, and he (should) come unto the eighth House (Aeon, MS ) of the Sphere, this which they are wont to call, The scorpion, and (should) come the Bubasti, this whom they are wont to call, The aphrodite, and she (should) come unto the second House (Aeon, MS ) of the Sphere, this which they are wont to call, [328 ] The bull, they are wont to draw (back) the veils between those of the Left with those of the Right, and (to) look out of the Height the Zorokothora Melkhisedek, and the World is (wont to) be moved with the mountains, and the Rulers are (wont to) be disturbed: and he is (wont to) look out upon all the Places of the hecate, and her Places are (wont to) be dissolved and perish; and they take away all the souls which (are) in her punishments, and throw them (back) unto the Sphere another time, because that they were destroyed in the fire of her punishments.\n\nHe added also, said he, The (Ruler of the) fourth array which they are wont to call, The Assessor of the Typhon, being a strong Ruler, becoming under his authority thirty two demons: they are those who are wont to go into the men and cause them to lust and fornicate and commit adultery and to become doing [328 ] the intercourse continually.\n\nThe souls therefore which will take away by robbery this Ruler, they are wont to spend hundred thirty eight years in his Places, are tormenting them his demons by his smoke of darkness with his evil fire, and they begin to be wasted away and to perish.\n\nIt is wont to happen therefore whenever the Sphere should turn (round), and (should) come the little Sabaoth, the good, he of the Middle, this whom they are wont to call, Zeus, whenever he should come unto the ninth Aeon of the 187 Sphere, this which they are wont to call, The archer, and the Bubasti, this whom they are wont to call in the World, The aphrodite and she (should) come unto the third Aeon of the Sphere, this which they are wont to call, The twin, they are wont to draw (back) the veils which are between those of the Left with those of the Right, and is (wont to) look out [329 ] Zarazaz, this whom the Rulers are wont to call in the name of a strong Ruler of their Places, Maskelli.\n\nAnd he is (wont to) look upon the dwelling places of the Assessor the Typhon, and his Places are (wont to) be dissolved and perish: and they take away all the souls which (are) in his punishments and throw them (back) unto the Sphere another time, because that they were diminished by his (her, MS ) smoke of darkness and by his evil fire."

