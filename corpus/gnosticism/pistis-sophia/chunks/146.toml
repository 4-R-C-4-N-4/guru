[content]
body = "And Jesus with his disciples remained in the midst of the aëry Place in the roads of the road of the Middle, this which is below the Sphere.\n\nAnd they came unto the first array of the road (added in margin, MS ) which is in the Middle.\n\nBut Jesus stood (up) in the air of her (of the road) Place with his disciples.\n\nSaid the disciples of Jesus to him, What is this Place in which we are?\n\n[320 ] Said Jesus, These are the Places of the road of the Middle: for it happened, having been disorderly the Rulers of the Adamas, they continued working intercourse, begetting Rulers and Archangels and Angels and Ministers and Dekans.\n\nCame out on (the) Right Ieou the Father of my Father, he bound them in a Destiny of the Sphere: for there are twelve Aeons becoming, Sabaoth the Adamas ruling over six, and Iabraoth his brother ruling over other six.\n\nThen therefore Iabraoth believed the mysteries of the Light with his Rulers, and he worked in the mysteries of the Light, he forsook the mysteries of the intercourse.\n\nBut Sabaoth indeed the Adamas remained working in the intercourse with his Rulers.\n\nAnd Ieou the Father of my father, having seen, that believed Iabraoth, he took him away with all the Rulers who believed [321 ] with him: he received (him) unto him(self) from the Sphere, he took him unto a (Place of) air, which was purified in the presence of the light of the sun, between the Places of those of the Middle, and between the Places of the invisible God.\n\nHe put him there with the Rulers who believed him.\n\nAnd he took away Sabaoth the Adamas with his Rulers, these who worked not in the mysteries of the Light, but who continued working in the mysteries of the intercourse.\n\nHe bound them in unto the Sphere.\n\nHe bound eighteen hundred Rulers in every Aeon: 182 he put three hundred and sixty over them.\n\nHe put another five great Rulers ruling over the three hundred sixty and over all the Rulers who are bound, these whom they are wont to call in all the World of the mankind by these names: the first they are wont to call him, Kronos; the second, Ares; the third, The hermes; the fourth, The aphrodite; the fifth, [321 ] The zeus.\n\nContinued further Jesus, said he, Hear also that I may say unto you their mystery.\n\nIt happened therefore, Ieou, having bound them thus, he drew a power out of the great Invisible, he bound it in this which they are wont to call it, Kronos.\n\nAnd also he drew another power out of Ipsantakhounkhainkhoukheokh, who is one among the three triple-powered gods, he bound it in Ares: and he drew a power out of Khainkhōōōkh, being one also among the three triple-powered gods.\n\nHe bound it in the hermes.\n\nAgain also he drew a power out of the Pistis the Sophia, the daughter of the Barbēlōs, he bound it in Aphrodite.\n\nAnd also he noticed that they needed a rudder for him to steer the World and (with, MS ) the Aeons of the Sphere, that they should not destroy it in their evil doing, he went up unto the Middle, he drew a power out of [322 ] the Little Sabaoth the good, he of the Middle, he bound it in Zeus, because that good is (he), for him to steer them in his goodness."

