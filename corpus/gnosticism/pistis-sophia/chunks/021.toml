[content]
body = "Now therefore let all the gates rejoice.\n\nSeek ye all after the Light, that may live the power of your soul which is in you: because the Light heard the (things of) matter and it would not leave any matter which it did not purge.\n\nLet the souls with the (things of) matter bless the Lord of all Aeons, with the matter, with all those who are in them: because God will deliver their souls out of every matter, and they will prepare a city in the Light: and all the souls who will be delivered will dwell in that city, and 27 inherit it: and the souls of [49 ] those who will receive mystery will be in that Place, and those who receive mystery in his name will become in it.\n\nIt happened therefore, while Jesus is saying these words unto his disciples, said he to them, This is the hymn which said the Pistis Sophia in her first repentance, repenting because of her sin, and saying everything which happened to her.\n\nNow therefore he who hath ear to hear let him hear.\n\nCame forward again Maria, said she, My Lord, my companion of light hath ear, and I hear in my power of light, and was wakeful in me thy spirit which (is) with me, hear, therefore, that I may speak concerning the repentance which said the Pistis Sophia, saying her sin with all the (things) which happened to her.\n\nThy power [50 ] of Light prophesied about her once through David the prophet in the sixty-eighth psalm.\n\nO God, save me because waters came in unto my soul.\n\nI sank, or I was drowned, in the mire of the abyss and there was not strength (left): I came unto the depths of the sea.\n\nA whirlwind it is which drowned me.\n\nI toiled, crying out, my throat is that which flew away, mine eyes fail while I trust unto God: were multiplied more than the hairs of my head those who hate me without cause: prevailed my enemies, those who pursued me in violence: the (things) which I did not rob, they required them of me: O God thou knewest my foolishness and [50 ] my sins they hid them not from thee: let them not be ashamed because of me, those who wait for thee, O Lord.\n\nO Lord of the powers cause them not to be disgraced because of me, those who seek for thee, O Lord the god of Israel, O God of the powers!\n\nFor because of thee I took up unto me reproach, the shame covered over my face, I was alien unto my brothers, strange unto the sons of my mother: because the zeal of thy house is that which ate me; the reproaches of those who reproached thee they fell upon me; I bowed my soul in fasting, it became for me unto reproach; I put a sackcloth upon me, I became to them for proverb.\n\nThey lifted up their voice upon me, those who sit [51 ] in the gates; and were singing at me, those who drink the wine.\n\nBut I was praying in my soul up unto thee, O Lord; the time of thy will it is, O God.\n\nIn the multitude of thy mercy listen unto my salvation in truth.\n\nSave me from this mire, that I should not sink in it, (that) I should be saved from those who hate me, and out of the depth of the waters.\n\nLet not a flood of water drown me, let not the pit swallow me (down), let not a well take hold with mouth upon me.\n\nHear me, O Lord, because kind is thy mercy.\n\n28 According to the multitude of thy compassion look upon me.\n\nTurn not thy face away from thy servant because I am afflicted.\n\nHear me quickly, [51 ] take heed unto my soul and redeem it."

