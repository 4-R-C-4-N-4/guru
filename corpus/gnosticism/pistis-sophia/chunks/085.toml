[content]
body = "And that Mystery indeed is that which knoweth because of what the Dissension became, and because of what became the Reconciliation.\n\nAnd that Mystery indeed is that which knoweth because of what became the Covetousness, and because of what all the Renunciation of the all became, [199 ] and because of what became the love of Wealth.\n\nAnd that Mystery indeed is that which knoweth because of what the Love of self became, and because of what became the Satiety.\n\nAnd that Mystery indeed is that which knoweth because of what became the Partners, and because of what became the Separated Partners.\n\nAnd that Mystery indeed is that which knoweth because of what became the Godlessness (added in margin), and because of what became the Love of God (in lower margin).\n\nAnd that Mystery indeed is that which knoweth because of what became the Phoster (Planets) and because of what became the Sparks (Fixed Stars).\n\nAnd that Mystery indeed is that which knoweth because of what became the Triple powers, and because of what became the Invisibles.\n\nAnd that Mystery indeed is that which knoweth [199 ] because of what became the Forefather, and because of what became the Pure (Lights).\n\nAnd that Mystery indeed is that which knoweth because of what became the great Self-willed, and because of what became his Believers.\n\nAnd that Mystery indeed is that which knoweth because of what became the great Triple powered, and because of what became the great Forefather invisible.\n\nAnd that Mystery indeed is that which knoweth because of what became the Thirteenth Aeon, and because of what became the Place of the Middle (plural, MS ).\n\nAnd that Mystery indeed is that which knoweth because of what became the Receiver of the Middle, and 108 because of what became the Virgins of the Light.\n\nAnd that Mystery indeed is that which knoweth because of [200 ] what became the Deacons of the Middle, and because of what became the Angels of the Middle.\n\nAnd that Mystery indeed is that which knoweth because of what became the Land of the Light, and because of what became the great Receiver of the Light.\n\nAnd that Mystery indeed is that which knoweth because of what became the Guards of the Place of those of the Righthand, and because of what became the Chief Captains of these.\n\nAnd that Mystery indeed is that which knoweth because of what became the Gate of the life, and because of what became Sabaoth the good.\n\nAnd that Mystery indeed is that which knoweth because of what became the Place of those of the Righthand, and because of what became the Land of the Light, namely, the Treasury of the Light: and that Mystery [200 ] indeed is that which knoweth because of what became the emanations of the Light, and because of what became the twelve Saviours.\n\nAnd that Mystery indeed is that which knoweth because of what became the Three Gates of the Treasury of the Light, and because of what became the nine Guards.\n\nAnd that Mystery indeed is that which knoweth because of what became the Twin-saviours, and because of what became the three Amens.\n\nAnd that Mystery indeed is that which knoweth because of what became the five Trees, and because of what became the seven Amens.\n\nAnd that Mystery indeed is that which knoweth because of what became the Confusion [201 ] which becometh not, and because of what was purified.\n\nAdded Jesus, said he to his disciples, Yet my disciples, be sober and let each one (added in lower margin) of you bring the power of the perception of the Light in front of him, and listen out of an exactness: for from now I am about to speak with you of the whole Place of the truth, of the Ineffable, and with the manner of which it is (being)."

