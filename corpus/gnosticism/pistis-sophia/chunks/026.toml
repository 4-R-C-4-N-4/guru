[content]
body = "But it happened while Jesus is saying these words unto his disciples saying to them, This is the fourth repentance which said the Pistis Sophia.\n\nNow therefore he who understandeth, let him understand.\n\nIt happened therefore, Jesus having said these words, came forward Iohannes, he worshipped unto the breast of Jesus, said he, My Lord command to me also, and allow to me for to say the explanation of the fourth repentance, [61 ] this which said the Pistis Sophia.\n\nSaid Jesus to Iohannes, I command to thee and I allow to thee, for to say the explanation of the repentance which said the Pistis Sophia.\n\nAnswered Iohannes, said he, My Lord, the Saviour, concerning this repentance which said the Pistis Sophia, prophesied once concerning it thy power of Light which (was) in David in the hundred and first psalm, O Lord hear my prayer and let my shout come even unto thee, turn not thy face away from me, incline thine ear unto me at the day in which I shall be afflicted.\n\nHasten, hear me in the day (in) which I shall cry up unto thee.\n\nBecause my days failed as a smoke, and my bones burned as a stone.\n\nI was scorched as grass, and my heart dried up so that I forgot [62 ] to eat my bread, out of the shout of my groan my bone clave to my flesh, I was as a pelican in the desert, I became as an owl in a house.\n\nI spent night in watching: I was as a sparrow on a roof alone.\n\nMine enemies reproached me all the day, and those who honour me were swearing at me.\n\nBecause I ate ash instead of my bread, I mingled that which I shall drink with tears at presence of thy anger with thy wrath; because thou tookest me up, thou sentest me down.\n\nMy days inclined as a shadow, and I was dried as grass.\n\nBut thou, O Lord, thou becometh even unto age, and thy remembrance even unto a generation of a generation.\n\nArise thou and have compassion on Sion, because the time became of having compassion on her: because the season came.\n\nThy servants wish (for) her stones, and they [62 ] will have compassion on her earth, and the heathen (will) fear the name of the Lord, and the kings of the earth will fear thy glory: because the Lord will build Sion and manifest in his glory.\n\nHe looked upon the prayer of those who are humble and he despised not their supplication.\n\nLet them 34 write this unto another generation, and the people whom they will create will bless the Lord: because he looked out upon his Height which is holy, the Lord looked out of the heaven upon the earth to hear the groan of those who are bound, to unloose the sons of those whom they put to death, to say the name of the Lord in Sion and his blessing in Jerusalem.\n\nThis is, my Lord, [is] the explanation of the mystery (M) of the repentance which said the Pistis Sophia.\n\nIt happened therefore, Iohannes having finished saying these words unto Jesus in the midst [63 ] of his disciples, said he to him: Well (done) Iohannes the Virgin, this who will rule in the kingdom of the Light.\n\nBut added also Jesus in the word, said he to his disciples, It happened also thus: the emanations of the Self-willed afflicted also the Pistis Sophia in the Chaoses, they wished to take away all her light: and was not yet completed her precept to bring her up from the Chaos, and the command had not yet come to me from the First Mystery, for me to deliver her from the Chaos."

