[content]
body = "Because they ensnared me with a power of face of lion, I having not done evil to them, this (power) from which they will take away its light: they oppressed the power which (is) in me, this which they will not be able to take away.\n\nNow therefore, O Light, take away the purgations of the light of the power of face of lion, it having not known: and the thought which thought the Self-willed to take away my light, take away his own also; and let them take away the light of the power of face of lion, this which ensnareth me.\n\nMy power itself will be cheerful in the light, and it will rejoice because thou wilt deliver it.\n\nAnd will say all parts of my power, There is not other deliverer except thee; because thou [83 ] art he who will deliver me from the power of face of lion, this which took away my power and my light from me, and thou art he who delivereth me from those who took away my power from me with my light.\n\nBecause they stood against me, lying about me and saying, I know the mystery of the Light which (is) in the Height, this which I believed, and they compelled me, saying, Say unto us the mystery of the Light which is in the Height, this indeed which I know not.\n\nAnd they repaid to me all these evils, because that I believed 46 the Light of the Height.\n\nAnd they made my power lightless.\n\nBut I, they having compelled me, I sat down in the darkness, my soul being humbled in a lamentation.\n\nAnd, O Light, because of whom I hymn up unto thee, Deliver me.\n\nI know that thou wilt deliver me, because that I was doing thy wish since [84 ] becoming in my Aeon.\n\nI was doing thy wish as the Invisibles who become in my Place, and as my partner, and I was lamenting, gazing, seeking after thy Light.\n\nNow therefore surrounded me all the emanations of the Self-willed, and they rejoiced over me, and they oppressed me greatly, while I know not (the cause?).\n\nAnd they ran (away) they ceased from me, and they had not mercy upon me, they turned (back) also, they tempted me, and they oppressed me in the great oppression: they gnashed their teeth at me, wishing to take away my light from me altogether.\n\nHow long therefore, O Light, art thou bearing with them oppressing me?\n\nDeliver my power out of their evil thoughts, and deliver me from the power of face of lion, because I alone among the Invisibles am that which becometh in this [84 ] Place.\n\nI shall hymn unto thee, O Light, being in the midst of all those who collected unto me, and I shall cry up at thee in the midst of all those who oppress me.\n\nNow therefore, O Light, let not rejoice at me those who hate me, and who wish to take away my power from me, these who hate me; who move their eyes at me, I having not done anything to them.\n\nBecause they were flattering me indeed in words fair, seeking from me the mysteries of the Light, these which I know not; saying unto me, being crafty unto me, and being angry with me because I believed the Light which (is) in the Height.\n\nThey opened their mouth against me, said they, Yea, we shall take away her light.\n\nNow therefore, O Light, thou knewest their guile.\n\nBear not with them, and let not thy help be far away [85 ] from me.\n\nHasten, O Light.\n\nDo my judgment with my avenging, and give judgment unto me in thy goodness."

