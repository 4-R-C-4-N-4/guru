[content]
body = "Answered further Jesus, said he to her, Well (done), O pure spiritual Maria, this is the explanation of the word.\n\nIt happened therefore also after all these words, added Jesus in the word, said he to his disciples, [185 ] Hear that I may speak with you concerning the glory of those of the Height as they become, according as I was speaking with you unto to-day.\n\nNow therefore whenever I should take you unto the Place of the last Helper, this who surroundeth the Treasury of the Light, and whenever I should take you unto the Place of that last Helper, and ye (should) see the glory in which he is, the Place of the Inheritance of the Light, (it) will be reckoned with you of the size of a city only of the World from the greatness in which becometh the last Helper, and with the great light in which it is: and after these I shall speak with you also of the glory of the Helper who is above the lesser [185 ] Helper, nor shall I speak with you of the Place of these who are above all the Helpers, for there is not a kind of word unto them in this World, for there is not likeness in this World being like to them, that I should compare it unto them.\n\nNor is there size, nor is there light which is comparable unto them, that I should speak of them.\n\nNot only in this World, but also they have not likeness also in those of the Height of the Righteousness from their Place downward.\n\nBecause of this therefore in fact there is not the manner of word for them in this World from the great glory of those of the Height, and there is not the great and immeasurable size.\n\nBecause of this therefore there is not the manner of word for it in this World.\n\nIt happened therefore, Jesus having finished saying these words unto his disciples, came forward [186 ] Maria the Magdalene, said she to Jesus, My Lord, Be not angry with me, seeking from thee, because that I molest thee in a multitude of times.\n\nNow therefore, my Lord, be not angry with me seeking after every thing in an exactness with a certainty, because my brothers preach them in the race 100 of the mankind, that they should hear and repent and be delivered from the judgments which are cruel of the wicked Rulers, and go unto the Height and inherit the kingdom of the Light: because that, my Lord, not only are we compassionate of ourselves, but we are compassionate of all the race of the mankind, that they should be delivered from all the judgments which are cruel.\n\nNow therefore, my Lord, concerning this we are seeking after everything in [186 ] an exactness, because my brothers preach them to all the race of the men that they should not come unto hands of the Rulers which are cruel, of the Darkness, and that they should be delivered from the hands of the Receivers which are cruel of the Darkness which is without.\n\nIt happened, Jesus having heard these words, saying them Maria, answered the Saviour becoming in great mercy in unto her.\n\nSaid he to her, Seek after that which thou wishest to seek after it, and I shall reveal to thee in an exactness and a certainty without parable.\n\nIt happened therefore, Maria having heard these words, saying them the Saviour, she rejoiced in great joy, and she delighted greatly, said she to Jesus, My Lord, then the second [187 ] Helper is great(er) than the first Helper?\n\nAbout how much of size, and he is distant from him about how much distance, or otherwise he is shining more than he about how many times?"

