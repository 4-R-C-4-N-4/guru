[content]
body = "And I, the First Mystery, I stood upon it, and I took away all the powers which (are) in it, and I destroyed all its matter, that seed from it should not rise up from this hour.\n\nBut these while the First Mystery is saying unto the disciples, he answered saying, Understood ye in what manner I am speaking [130 ] with you.\n\nCame forward Iakkobos said he, My Lord, concerning the explanation therefore of the words which thou saidst, prophesied about them once thy power of light by David in the ninetieth psalm, He who dwelleth under the help of him who is high shall abide under the shadow of the God of the heaven.\n\nHe will say to the Lord, Thou art my accepter, and my place of refuge: my God I am trusting unto him; because he it is who will save me from the snare of the snarer, and from a word being cruel.\n\nHe will make shadow unto thee under his (thy, MS ) breast, and thou wilt trust under his wing.\n\nHis [130 ] truth will surround thee as an armour (weapon, MS ).\n\nThou wilt not fear for a fear of night, and for an arrow which flieth in the day, for a thing which moveth 71 in the darkness; for a calamity of demon of the hour of mid-day.\n\nThere are a thousand (who) will fall on left of thee and ten thousand on right of thee; but they will not approach unto thee.\n\nNevertheless thou wilt fill thy sight with them, thou wilt see the recompense of the sinners: because thou art, O Lord my hope; thou placest for thee that which is high for place of refuge: there is not evil (which) will approach unto thee; there is not scourge (which) will approach in unto thy place of abiding: because he will order unto [131 ] his angels because of thee, for to keep thee in all thy ways; and they (will) lift thee upon their hands lest-at-any-time thou should dash against a stone with thy foot.\n\nThou wilt mount upon a serpent with a basilisk, and trample upon a lion with a dragon.\n\nBecause he trusted unto me I will save him; I will make shadow unto him, because he knew my name: he will cry up unto me, and I, I shall hear him, I am with him in his affliction, and I shall save him and (I shall) give glory to him; and (I shall) increase him in a multitude of days, and (I shall) teach him of my salvation.\n\nThis is, O Lord, the explanation of the words which thou saidst.\n\nHear therefore that I may say them in boldness.\n\nThe word therefore which [131 ] thy power said by David, He who dwelleth under the help of him who is high, will abide under the shadow of the God of the heaven, namely, that when the Pistis Sophia had trusted unto the Light she abode under the light of the effluence of Light.\n\nThis which came from the Height through thee.\n\nAnd the word which thy power said by David, I shall say to the Lord, Thou art my accepter and my place of refuge, my God I trusted unto him.\n\nThat is the word with which hymned the Pistis Sophia, Thou art my accepter and I am coming (close) to thee.\n\nAnd also the word which thy power said, My God unto whom I am trusting, thou art [132 ] he who will save me from the snare of the snarers, and from a word being cruel.\n\nThat is that which said the Pistis Sophia, O Light I am believing thee, because thou art he who will deliver me from the emanations of the Self-willed, and with those of the Adamas the tyrant."

