[content]
body = "And also let them trust unto him, if they should come unto the Place of the Height: because it (is) he who will see and redeem us, 38 and there is a great mystery [69 ] of deliverance in him: and he is he who will deliver all the powers out of the Chaos, because of my transgression: because I forsook my Place, I came down unto the Chaos.\n\nNow therefore he who whose mind is exalted, let him understand.\n\nIt happened therefore, Jesus having finished saying these words unto his disciples, said he to them, Understand ye that I am speaking with you in what manner?\n\nCame forward Andreas, said he, My Lord, concerning the explanation of the sixth repentance of the Pistis Sophia thy power of light prophesied once by David in the hundred and twenty-ninth psalm saying, I cried up unto thee, O Lord, in those which are deep, hear my shout.\n\nLet thine ears give heed unto the shout of my supplication, O Lord, if thou should give heed unto the [70 ] unlawfulness, who is he who will be able to stand?\n\nBecause the forgiveness is being from thee.\n\nBecause of thy name I had patience unto thee, O Lord.\n\nMy soul had patience unto thy word.\n\nMy soul hoped in the Lord from morning even unto evening, Let the Israel hope in the Lord from morning unto evening.\n\nBecause the mercy is being from the Lord.\n\nAnd there is a great redemption with him, and he it (is) who will redeem the Israel out of all his unlawfulness.\n\nSaid to him Jesus, Well (done), Andreas, the happy, this is the explanation of her repentance.\n\nAmen amen I say to you, I shall fill you with all the mysteries of the Light and with all knowledge, from the inward part of the inward parts, even unto the outward part of the outward parts, from the Ineffable even unto the darkness of the darknesses, [70 ] and from the Light of Lights unto the matter (haab) of the matter, from all the Gods even unto the Demons, from all the Lords even unto the Dekans, from all the Authorities even unto the Ministers, from the fashioning of the men unto that of the wild-beasts with the beasts with the creeping things: because they shall call you the perfect (ones) who are completed with every Pleroma.\n\nAmen, amen I say to you, The Place in which I shall become in the kingdom of my Father ye also shall become there with me.\n\nAnd if should be fulfilled the perfect number for the Confusion to be dissolved, I shall command that they shall bring all the tyrant Gods these who gave not the purification of their light.\n\nAnd I shall command the discerning fire (wise fire), [71 ] this which are wont the perfect (ones) to pass across, for it to eat into those Tyrants, until they give (up) the remainder (last) of the purification of their light.\n\nIt happened therefore, Jesus having finished saying these 39 words unto his disciples, said he to them, Ye understand in what manner I am speaking with you?\n\nSaid Maria: Yea, O Lord, I understood the word which thou sayest.\n\nConcerning the word therefore which thou saidst, In the dissolving of all the Confusion thou wilt sit upon a power of light, and thy disciples, namely we, (will) sit on right of thee, and thou (wilt) give judgment upon the tyrant Gods, these who gave not the purification of their light.\n\nAnd the discerning fire will eat after them until they give the remainder (last) of light which is in them."

