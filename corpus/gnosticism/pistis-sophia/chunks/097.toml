[content]
body = "And ye, my disciples, with every one who will receive the mysteries of the Ineffable will remain with me on my right (hand) and on my left reigning with me in my kingdom.\n\nAnd those also who receive the three mysteries of the five mysteries of that Ineffable will be fellow-Kings with you in the kingdom of the Light.\n\nAnd they [226 ] will not be equal with you, (but) ye with those who receive the mystery of the Ineffable are about to remain also after you reigning.\n\nAnd those who receive the five mysteries of the Ineffable are about to remain also after (those who receive) the three mysteries, reigning also.\n\nAnd also those who receive the twelve (twelfth, MS ) mysteries of the First Mystery are about to remain also further after (those who receive) the five mysteries of the Ineffable and reigning also according to the array of each of them.\n\nAnd all those who receive the mysteries in all the Places of the Space of the Ineffable, will reign also and remain also within those who receive also the mysteries of the First Mystery, being distributed according to the glory of each of them.\n\nSo that those who receive the mystery which is (more) excellent will remain in the Place which is more excellent.\n\nThose who 123 receive the mystery which is lower, they will remain in the Place which is lower, [226 ] reigning in the Light of my kingdom.\n\nThese only are the lots of the kingdom of the first Space of the Ineffable, those who receive also all the mysteries of the second Space, namely, the Space of the First Mystery, they will remain also in the Light of my kingdom, being distributed according to the glory of each of them, each of them becoming in the (Place of the) mystery unto which he received.\n\nAnd those who receive the mysteries which are more excellent will remain also in the Place which is high, and those who receive the mysteries which are lower, being about to remain in the Place which is lower in the Light of my kingdom.\n\nThis is the lot of the second kingdom (King, MS ) of those who receive the mystery of the second Space of the First Mystery.\n\nThose who receive also the mysteries of the second Space, [227 ] (of the First Mystery) namely, the first Space (reckoning) from without, those also, they will remain after the second kingdom (King, MS ) being distributed also in the Light of my kingdom according to the glory of each of them, (they) will remain in the Place unto which they received mysteries so that those who receive the mysteries which are high, will remain also in the Places which are high, And those who receive the Mysteries which are lower, they will remain also in the Places which are lower.\n\nThese are the three lots of the kingdom of the Light, the mysteries of these three lots of the Light they are numerous greatly greatly: ye will find them in the great two books of Ieou, but I shall give to you, and I shall say unto you the great mysteries of each lot, these which are more excellent than each Place, namely, the heads in every [227 ] Place and in every array, these which will take the whole race of the mankind in unto the Places which are high according to the Space of the Inheritance.\n\nThe remainder therefore of the Mysteries which are lower ye need them not, but ye will find them in the two books of Ieou, these which wrote Enokh, while I was speaking with him out of the Tree of the Knowledge, and out of the Tree of the Life in the paradisos of Adam."

