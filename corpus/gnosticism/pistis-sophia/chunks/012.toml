[content]
body = "But it happened, Jesus having finished saying these words, added again Maria, said she, My Lord, then the hour-setters, with the enquirers, then they will not show to the men that which will happen to them from this hour?\n\nBut answered Jesus, said he to Maria: If the hour-setters—if they should find the Destiny, with the Sphere turned [29 ] to the Left according to their first distribution, their words are wont to come (right), and they will say that which it is right to become; but if they come (upon) the Destiny or the Sphere turned to the Right, they are not wont to say anything true, because that I turned their influences with their four-corners with their three-corners with their eight-forms.\n\nSince were being constant their influences from at first (so long as they were) turned to the Left, with their four-corners, with their three-corners, with their eight-forms.\n\nBut now I caused them to spend six months turned to the Left and six months turned to the Right: he who will find their numbering from the time which I [29 ] altered them; having put them for to spend six months looking unto their Left paths, and six months unto their Right paths, he who attendeth therefore to them thus, he will know their influences in accuracy, and he will utter every thing which they will do.\n\nLikewise also the enquirers if they should invoke the name of the Rulers, and come upon them looking to the Left, everything concerning which they will seek of their Dekans they will tell them in accuracy.\n\nIf however should their enquirers invoke their names looking to the Right, they will not hear them, because that they are looking another form contrary to their first precept (position) in which settled them Ieou; since some of their names [30 ] 16 are turned to the Left and other of their names are turned to the Right: and if they should invoke them turned to the Right, they will not say unto them the truth, but in confusion they will confuse them and in a threat they will threaten them.\n\nThose who know not therefore their direction turned to the Right, and with their three-corners, and with their four-corners, with all their figures, they will find nothing true, but they will be confused in great confusion, and they will become in a great error, and they will stray in great straying (from the truth): because that the works which they were wont to do once in their four-corners turned to the Left and in their three-corners and in their eight-figure, these in which they were being constant, [30 ] doing them turned to the Left.\n\nI altered them now, and I caused them to spend six months doing all their forms turned to the Right, that they might be confused in confusion in all their circuit; and further I cause them to spend six months turned to the Left, doing the works of their influences with all their forms, that in confusion should be confused and in an error should err the Rulers who become in the Aeon and in their Spheres and in their heavens and in all their Places, that they should not understand their own movements.\n\nIt happened therefore, Jesus having finished saying these words, Philippos (was) sitting, writing every word which Jesus is saying; [31 ] it happened therefore after these (things) Philippos came forward he prostrated, he worshipped unto the feet of Jesus, saying, My Lord, the Saviour, give authority to me for me to speak in thy presence and ask thee this word before that thou spakest with us of the Places unto which thou wentest because of thy service.\n\nAnswered the Saviour merciful, said he to Philippos, The authority is given to thee to utter the word which thou art willing (to say)."

