[content]
body = ") feared and it cried up unto its God Self-willed, for him to help it: and at that hour looked out of the thirteenth Aeon the God Self-willed, he looked down unto the Chaos being angry greatly, wishing to help his power of face of lion, and at that hour surrounded the Pistis Sophia the power of face of lion, itself with all its emanations, wishing to take away all the light which (is) in the Sophia.\n\nIt happened therefore, they having oppressed the Sophia, she cried up unto the Height, crying up unto me for to help her.\n\nIt happened therefore, she having looked unto the Height she saw the Self-willed being angry greatly, and she feared, she said the twelfth [94 ] Repentance concerning the Self-willed (God) with his 52 emanations.\n\nBut she cried up against me saying thus, Forget not, O Light, my hymn; because opened mouths upon me the Self-willed with his power of face of lion: they make guile unto me, and they surrounded me wishing to take away my power; and they hated me because I hymned unto thee.\n\nInstead of loving me, they slandered me.\n\nBut I, I was hymning, they plotted for to take away my power because I hymned unto thee, O Light; and they hated me because I loved thee.\n\nLet the darkness come upon the Self-willed, and let remain at his right (hand) the Ruler of the Darkness which (is) outer: and in thy giving judgment unto him [95 ] take away his power from him: and the work which he thought unto himself to take away my light from me, thou shalt take away his own from him: and let fail all his powers of his lights which (are) in him.\n\nAnd let another take his greatness among the three Triple-powered: Let become lightless all the powers of his emanations, and (let) his matter become having not light in it.\n\nLet his emanations remain in the Chaos, and (let) them not allow them to go unto their Place: let their light fail which (is) in them, and allow them not to go up unto the thirteenth Aeon their Place.\n\nLet [95 ] the Receiver, the purifier of the lights, purify all the lights which become in the Self-willed, and let him take them from him (them?).\n\nLet them lay hold upon his emanations, the Rulers of the Darkness below; and let not any (one) accept him in his Place, and let not any obey the power of his emanations in the Chaos: let them take away the light which is in his emanations and (let) them blot out their name in the thirteenth Aeon, and his own also (let) them take away his name out of that Place for ever: and the power of face of lion let them bring upon it the sin of him who emanated it in presence of the Light, and (let) them not blot out the unlawfulness of the matter which he sent out, (the Self-willed); [96 ] and their sin altogether shall become in presence of the Light for ever; and (let) them not allow them to see out; and (let) them take away their name from every Place.\n\nBecause that they spared me not, and they oppressed her (his, MS ) whose light they took away with her (his MS.\n\n) power.\n\nAnd furthermore those in whom they planted me they wished to take away all my light from me: they loved to come down unto the Chaos; they shall become in it, and they shall not bring them up from this hour.\n\nThey wished not the place of dwelling of the Place of the righteousness, and they shall not receive them unto it from this hour."

