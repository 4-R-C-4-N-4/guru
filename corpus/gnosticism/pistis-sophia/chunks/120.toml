[content]
body = "And are not wont those Contentious (ones) they are not wont to prevail to pass through the Chaoses, for them to come unto the arrays which are above the Chaoses, and 150 convict the souls which come out of those Places.\n\nNow therefore the souls which receive mysteries, it is not allowed for them to overpower them, and take them out of the Chaos, that should convict them the Contentious Ministers, but are wont the Contentious Ministers, they are wont to convict the souls of the sinners, and lay hold on these which received not mysteries, these which are wont to bring from the Chaoses.\n\nThe souls however who receive mysteries have not (any) work (for which) to convict them, because they are not wont to come out of their Places.\n\n[271 ] And also whenever they should come, they are not able to prevail to stand up before them, nevertheless indeed they are not wont to be able to take them in those Chaoses.\n\nHear, also, that I may say unto you the word in truth in what type is wont the mystery of the baptism to forgive sin.\n\nNow therefore whenever the souls should do sin, yet being upon the World are wont to come however at least the Contentious Ministers, and bear witness to all the sins which the soul did, lest haply indeed they should come out of the Place of the Chaos, that they should convict her in the judgments, these which are out(side) of the Chaoses.\n\nAnd is wont the counterfeit spirit, it is wont to bear witness of all the sins which did the soul, that also he should convict her in the judgments, these which are out(side) of the Chaoses.\n\nAnd not only because it beareth witness of them, but every sin of the souls it is wont to seal [272 ] the sins, and affix them in unto the soul, that all the Rulers of the judgments of the sinners should recognise her, that she is a sinful soul, and that they should know the number of the sins which she did from the seals which affixed unto her the counterfeit spirit, that they should punish her according to the number of the sins which she did.\n\nThis is the manner in which they are wont to do to every soul of sinner.\n\nNow therefore he who will receive the mysteries of the baptisms, are wont the mysteries of those, they are (it is, MS ) wont to become in a great fire being fierce greatly (and) wise, and it burneth the sins: and they are wont to go in unto the soul in concealment, and it eateth in after all the sins, these which affixed in unto it the counterfeit spirit, they are wont to go also [272 ] in unto the body in concealment, and pursue all the pursuers in concealment, and separate them on each side of the body; for it is wont to pursue the counterfeit spirit and (with, MS ) the Fate, and separate them outside the power and (with, MS ) the soul, and them on (one) side of the body, so that the counterfeit spirit with the Fate with the body it is wont to separate them unto one part: the 151 soul also with the power it is wont to separate them unto another part.\n\nThe mystery also of the baptism is wont to remain in the midst of the two, and remain separating them from one another, that it should cleanse them and purify them, that they should not be defiled by the matter.\n\nNow therefore Maria, this is the manner in which are wont the mysteries of the baptisms to forgive sin and with every unlawfulness.\n\nThese then having said them the Saviour, said he to his disciples, Understand ye in what manner I am speaking with you?\n\nSprang up Maria, said she [273 ]: Yea, My Lord, truly I fully take in every word which thou sayest."

