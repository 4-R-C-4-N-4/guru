[content]
body = "And whenever should the Sphere turn round, she is wont to give her to her Receivers, that they may cast her unto the Aeons of the Sphere, that the Ministers of the Sphere may take her unto water being below the Sphere, that it may become [349 ] smoke boiling, that it may eat in at her, until it purify her entirely.\n\nAfter these (things) is wont to come Ialouham the Receiver of Sabaoth, the Adamas, and he bringeth the cup of the forgetfulness, and he giveth it to the soul that she may drink it, and she forgetteth every thing with every Place unto which she went: and they cast her unto a body lame and maimed and blind.\n\nThis is the punishment of the man, (a) robber.\n\nAnswered Andreas, said he, A man proud, (a) despiser whenever he should come out of body, what will they do to him?\n\nSaid Jesus, This of this kind whenever his time should be completed by the Sphere, are wont to come after him the 196 Receivers of Ariel and take his soul, and they spend three days going about in the World teaching her the creatures of [349 ] the World.\n\nAfter these (things) they are wont to take her down unto Amente, up to Ariel that he may punish her in his punishments for twenty months.\n\nAfter these (things) they are wont to take her unto the Chaos up to Ialdabaoth with his forty nine demons, and that he may punish her with his demons one by one for other twenty months.\n\nAfter these (things) they are wont to take her up on the road of the Middle, that each of the Rulers of the road of the Middle may punish her for other twenty months.\n\nAnd after these (things), they are wont to take her to the Virgin of the Light that she may judge her.\n\nAnd whenever should the Sphere turn round, she is wont to give her to her Receivers, that they may cast her unto Aeons of the Sphere.\n\nAnd are wont the Ministers of the Sphere to take her out unto water being underneath the Sphere, that it may become a smoke boiling that it may eat in [350 ] at her until it purifieth her.\n\nAnd is wont to come Ialouham the Receiver of Sabaoth, the Adamas, and bringeth the cup of forgetfulness, and he giveth it to the soul that she may drink it, and she forgetteth every thing with every Place unto which she went: and they cast her down unto a body dumb, deformed, that every one may remain despising him.\n\nThis is the punishment of the man proud (a) despiser.\n\nSaid he, Thomas, A man blasphemer continually, what is his punishment?\n\nSaid Jesus, This of this kind whenever should his time be completed by the Sphere, are wont to come after him the Receivers of Ialdabaoth and bind him with his tongue to a great demon with face of horse, and they spend three days going about with him in the World and punish him.\n\nAfter these (things) they are wont to take him [350 ] out unto the place of the cold with the snow to punish him for eleven years.\n\nAfter these (things) they are wont to take him down unto the Chaos (close) to Ialdabaoth with his forty nine demons, that each of the demons may punish him other eleven years.\n\nAfter these (things) they are wont to take him out unto the Darkness which is outer, until the day (in) which they will judge the great Ruler of face of dragon which goeth round the Darkness, and is wont that soul, she is wont to be numbed and to waste away and to be dissolved.\n\nThis is the judgment of the man blasphemer."

