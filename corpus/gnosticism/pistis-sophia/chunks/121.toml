[content]
body = "Concerning the word therefore of the forgiveness of the sins which thou saidst unto us once in a parable, saying, I came to cast fire upon the earth; and also, What is that which I wish, except that it should be kindled: and also thou separatedst plainly, saying, I have a baptism to be baptised in it; and how shall I endure, until it should be completed?\n\nYe are thinking that I came to cast peace upon the earth?\n\nNay but a division is that which I shall send.\n\nFor from now there are five (who) will become in one house, there are three (who) will be upon two and two upon three.\n\nThis, my Lord, is the word which thou saidst plainly.\n\nThe word indeed which thou saidst, I came to cast a fire upon the earth and what is that which [273 ] I wish, except that it should be kindled, which (is) this, my Lord, that thou broughtest the mysteries of the baptisms unto the world?\n\nAnd what is that which thou willest, except that it should eat in after all the sins of the soul and purify them.\n\nAnd also afterwards thou separatedst plainly saying, I have a baptism to be baptised in it, and how shall I endure, even until it should be completed, namely, that thou wilt not remain in the World, even until the baptisms should be completed, and purify the perfect souls.\n\nAnd also the word which thou saidst unto us once, Ye are thinking that I came to cast peace upon the earth?\n\nnay, but division is that which I came to cast: because from now there are five (who) will become in one house; there are three (who) will be divided upon two and two upon three, namely, the mysteries of the baptisms [274 ] which thou broughtest unto the World, it having made a division in the bodies of the World: because that the counterfeit spirit with the body with the Fate, it separated them unto one part, the soul also with the power it separated them unto another part, namely, that there are three who will be divided upon two and two upon three.\n\nBut these having said them Maria, said he the Saviour, Well (done), O spiritual (one) of pure Light, Maria, this is the explanation 152 of the word.\n\nAnswered also Maria, said she, My Lord yet also I am about to add in seeking from thee.\n\nNow therefore, my Lord, bear with me seeking from thee.\n\nBehold indeed in boldness we knew the type (in) which are wont the baptisms to forgive sin: now also the mystery of these (this, MS ) three Spaces with the mysteries of this First Mystery with the mysteries of the Ineffable, in what type are they wont to forgive sin [274 ]?\n\nAre they wont to forgive in the type of the baptism, or otherwise?\n\nAnswered also the Saviour, said he, Otherwise but all the mysteries of the three Spaces are wont to forgive to (in, MS ) the soul in (dative, MS ) all the Places of the Rulers all the sins which did the soul from at first; they are wont to forgive to her, and further they are wont to forgive, those which she will do after these, even until the time unto which each of the mysteries will dominate: these I shall say unto you in the Distribution of the Universe viz.: the time up to which each of the mysteries will dominate.\n\nAnd also the mystery of the First Mystery with the mysteries of the Ineffable they are wont to forgive to the soul in all the Places of the Rulers, every sin with every unlawfulness which did the soul."

