[content]
body = "And the tenth chamber there are many Rulers in it seven heads of dragon to each of them in their original face, and he who is over them all they are wont to call his name in their Place, Xarmarokh.\n\nAnd eleventh chamber, there are many Rulers of that Place (coptic word, MS ) with seven heads of cat to each of them in their original face, and the great (one) who is over them, they are wont to call him in his Place, Rokhar.\n\nAnd the twelfth chamber there are many Rulers in it, they being many exceedingly, with seven heads of face of a dog to each of them in their original face.\n\nAnd the great (one) who is over them they are wont to call him in [289 ] their Place, Khremaor.\n\nThese Rulers therefore of these twelve chambers being within the dragon of the Darkness which is outer, and each of them having a name according to hour.\n\nAnd is wont each of them to change his face according to hour.\n\nAnd these twelve chambers have each of them a door open unto the Height, so that the dragon of the Darkness which is outer hath twelve chambers of Darkness, there being a door to every chamber (the chamber the chamber, MS ) open unto the Height.\n\nAnd there is an Angel of the Height being vigilant unto each of the doors of the chambers.\n\nThese who Ieou the first man, the overseer of the Light, the Legate of the First precept, he is he who put them being vigilant unto the dragon that he should not be disorderly with all the Rulers of his chambers which are in him.\n\n[289 ] These therefore having said them the Saviour, answered Maria the Magdalene, said she, My Lord, then the souls indeed which they take unto that Place are they not indeed wont to take them through these twelve doors of the chambers, each according to the judgment of which it is worthy?\n\nAnswered the Saviour, said he to Maria, They are not wont to take any soul in unto the dragon through these doors, but the soul of the blasphemers, and those who become with teaching of error, with every one who giveth teaching in the error, and with the sleepers with male, and with the (soul) of the men who are polluted, and with the impious, with every man atheist, and the murderers, with the adulterers, and with the sorcerers.\n\nAll the souls therefore of this kind whenever they should not repent, yet being alive, but remaining in their sin steadfast, with all the souls also, these [290 ] who were left outside of this, namely, who received their number of cycles 162 which is reckoned unto them in the Sphere, they having not repented, but in their last cycle they will take those souls, those with all the souls which I finished saying them, they will take them through the mouth of the tail of the dragon in unto the chambers of the Darkness which is outer.\n\nAnd whenever they should finish taking the souls in unto the Darkness which is outer in the mouth of his tail, he is wont to bring round again his tail in unto his own mouth and shut them (in).\n\nThis is the manner (in) which they will take the souls in unto the Darkness which is outer.\n\nAnd the dragon of the Darkness, which is outer, hath twelve original names, these which (are) in his mouths, a name according to each of the doors of the chambers.\n\nAnd these (this, MS ) [290 ] twelve names are various with one another, but being with (in, MS ) one another twelve, so that he who will say one of the names is saying all the names.\n\nThis therefore I shall say unto you in the Distribution of (the) Universe."

