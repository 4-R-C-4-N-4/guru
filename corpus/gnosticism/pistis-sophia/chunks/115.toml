[content]
body = "Added also Jesus in the word, said he, If also a soul is which is not wont to hearken unto the counterfeit spirit (in) all his works, and this (soul) became good, she received the mysteries of the Light, these which (are) in the second Space, or indeed these [262 ] which (are) in the third Space, these which (are) from within 144 (on the inward part, MS ): whenever should be completed the time of that soul (of coming) out of the body; and is wont the counterfeit spirit, it is wont to follow that soul, it with the Fate, it is wont to follow in the road by which it will go unto the Height.\n\nAnd having not yet been distant from the Height, she is wont to say the mystery of the loosing of her seals, with all the bonds of the counterfeit spirit, these with which the Rulers bound it in unto the soul.\n\nAnd whenever they should say them, are wont to be loosed the bonds of the counterfeit spirit, and it is (wont) to cease coming in unto that soul, and it is wont to release the soul according to the commands which ordered unto it the Rulers of the great Destiny, saying to it, Release not this soul except she say unto thee the mystery of the loosing of every seal, these in which we bound thee in unto [262 ] the soul.\n\nWhenever it should happen therefore, whenever the soul, whenever she should say the mystery of the loosing of the seals with all the bonds of the counterfeit spirit, and (whenever) it ceaseth coming in unto the soul, and ceaseth being bound in unto her, and in that hour it is wont to say a mystery and dismiss the Fate unto her Place (close) to the Rulers which (are) in the road of the Middle.\n\nAnd she is wont to say the mystery, and dismiss the counterfeit spirit (close) to the Rulers of the Destiny unto the Place in which they bound it unto her.\n\nAnd in that hour she is wont to become a great effluence of light, becoming of light greatly greatly, and are wont the Contentious Receivers, these which brought her out of the body, they are wont to fear before the light of that soul, and fall down upon their face.\n\nAnd in that hour is wont that soul, she is wont to become a great effluence of light, and she is wont to [263 ] become wing of light all of her, and to pass through every Place of the Rulers with all the arrays of the Light, even until she goeth unto the Place of her kingdom unto which she received mystery.\n\nIf also it is a soul, having received mystery in the first Space, reckoning from without (which is from without, MS ), and after receiving the mysteries and completing them, and turned (not M ) and committed sin again, after the completion of the mysteries; and also if should be completed the time of the coming out of that soul, are wont to come the Contentious Receivers and bring that soul out of the body: and is wont the Fate with the counterfeit spirit, they are wont to follow that soul because that the counterfeit spirit is being bound in unto her with the seals and the bonds of the Rulers, it is wont to follow after that soul walking on the roads of the counterfeit spirit: she is wont to say the mystery of the loosening [263 ] of all the bonds 145 and all the seals with which the Rulers bound the counterfeit spirit in unto the soul.\n\nAnd whenever should the soul say the mystery of the loosening of the seals, immediately are wont to be loosened the bonds of the seals, these which bound the counterfeit spirit in unto the soul."

