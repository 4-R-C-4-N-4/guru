[content]
body = "And Jesus having finished saying these words, sprang up Philippos, he stood up, he put down the book which (is) in his hand; for he it is who writeth every word which Jesus was saying, and with all the (things) which he is doing: came therefore forward Philippos, [65 ] said he to him, My Lord, Am I not alone he to whom thou gavest for me to take care of the World, and to write every word which thou wilt say, and with those which thou wilt do.\n\nAnd thou lettest me not come forward, that I may say the explanation of the mysteries of the repentance of the Pistis Sophia?\n\nFor my spirit bubbled in me for many times, and was unloosed and compelled me greatly for to come forward that I may say the explanation of the repentance of the Pistis Sophia, and I was not able to come forward, because that I am he who writeth every word.\n\nIt happened therefore, Jesus having heard Philippos, said he to him, Hear O Philippos the happy, that I may speak with thee, because thou with Thomas with Maththaios are those to whom it was given by the First Mystery to write every word which I shall say, [66 ] with the (things) which I shall do, and with every thing which ye will see.\n\nBut as for thee, was not yet completed until now the number of the 36 words which thou wilt write.\n\nWhenever therefore they should be completed, thou wilt come forward and utter that which thou willest.\n\nNow therefore ye are the three, those who will write every word which I shall say, with the (things) which I shall do, with the (things) which I shall see, and that I may bear witness of everything of the kingdom of the heavens.\n\nThese therefore having said them Jesus, said he to his disciples, He who hath ear to hear let him hear.\n\nSprang up again in front Mariham, she came unto the midst, she stood by Philippos, said she to Jesus, My Lord, hath ear my companion of light, and I prepare me to hear out of my power, and I understood the words [66 ] which thou saidst.\n\nNow therefore, My Lord, hear that I may say it boldly.\n\nThou saidst to us, He who hath ear to hear let him hear.\n\nConcerning the word which thou saidst unto Philippos, Thou with Thomas with Maththaios are those three to whom it was given by the First Mystery to write every word of the kingdom of the Light, and (to) bear witness to them: hear therefore that I may utter the explanation of this word, this (is) that which thy power of light prophesied once by Mōysēs, that by witness (of) two and three every thing will be established.\n\nThe three witnesses are Philippos with Thomas with Maththaios.\n\nIt happened therefore, Jesus having heard this word, said he, Well (done) Maria, this is the explanation [67 ] of the word.\n\nNow therefore thou Philippos, Come forward and utter the explanation of the mystery of the fifth repentance of the Pistis Sophia.\n\nAnd afterwards sit (down) and write every word which I shall say, until is completed the number of thy part which thou wilt write in the words of the kingdom of the Light.\n\nAfter these (things) thou shalt come forward and say that which thy spirit will understand.\n\nNevertheless therefore now utter the explanation of the mystery of the fifth repentance of the Pistis Sophia."

