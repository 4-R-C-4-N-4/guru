[content]
body = "This is the judgment of the man, (the) slanderer.\n\nSaid she, Mariham, Woe woe to the sinners.\n\nAnswered [347 ] also Salome, said she, My Lord, Jesus, a man, murderer having not done sin ever except killing, whenever he should come out of body, what is his punishment?\n\nAnswered Jesus, said he, A man killer, having not done sin ever except killing, whenever his time should be completed by the Sphere for him to come out of body, are wont to come the Receivers of Ialdabaoth, and bring his soul out of body, and bind her by her feet behind a great demon of face of horse, and he spendeth three days going round with her in the World.\n\nAfter these (things) they are wont to take her out unto the Place of the cold with the snow and punish her there for three years with six months.\n\nAfter these they (are wont to) take her down unto the Chaos (close) to Ialdabaoth with his forty nine demons, and scourge [347 ] her his demons other three years for each (demon) with six months.\n\nAfter these (things) they are wont to take her unto the Chaos (close) to the Persephone, and punish her in her punishments other three years with six months.\n\nAfter these (things) they are wont to take her away upon the road of the Middle, and each of the Rulers of the road of the Middle punisheth her in the punishments of his Places for other three years with six months.\n\nAnd after these they take her to the 195 Virgin of the Light, this who is wont to judge the righteous with the sinners that she may judge her, and whenever the Sphere should turn round she is wont to command, that they cast her unto the Darkness which is outer, until the time (in) which they will take away the Darkness of the Middle she is wont to be destroyed and dissolved.\n\nThis is the punishment of the man, (a) killer.\n\nSaid he, Petros, My Lord, [348 ] Let the women be content unto seeking, that we also may seek.\n\nSaid Jesus to Mariham with the women, Leave the place for your brothers, (the) male that they also may seek.\n\nAnswered Petros said he, My Lord, then a man, (a) thief, (a) robber, his sin being this continually, whenever he should come out of body, what is his punishment?\n\nSaid Jesus, This of this kind whenever his time should be completed by the Sphere, are wont to come after him the Receivers of Adonis, and bring his soul out of body and spend three days going round with her teaching her the creatures of the World.\n\nAfter these (things) they are wont to take her down unto Amente (close) to Ariel that he may punish her in his punishments for three months with eight days with hours two.\n\n[348 ] And after these (things) they take (her) unto the Chaos (close) to Ialdabaoth, with his forty nine demons, that each of his demons should punish her other three months with eight days with hours two.\n\nAfter these (things) they are wont to take her down upon the road of the Middle, that each of the Rulers of the road of the Middle should punish her by his smoke of darkness with his evil fire for other three months with eight days with hours two.\n\nAfter these (things) they are wont to take her up to the Virgin of the Light, this who is wont to judge the righteous and the sinners, that she may judge her."

