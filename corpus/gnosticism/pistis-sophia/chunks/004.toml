[content]
body = "It happened while I am sitting being distant from you [9 ] a little upon the mountain of the Olives, thinking of the arrangement of the service concerning which they sent me, that it was finished: and the Last mystery dispatched not to me my vesture, namely the twenty-fourth mystery (reckoning) from within even to without, these which become in the second Space of the First Mystery in the array of that Space.\n\nIt happened therefore, I having known that was finished the arrangement of the service, concerning which I came, and not yet that Mystery dispatched to me my vesture this which I left in it, until was finished his time.\n\nThese (things) therefore thinking, sitting [10 ] upon the mountain of the Olives distant from you a little, it happened as the sun came up in the Places of rising, afterward therefore through the First Mystery, this which was becoming from at first, this because of whom the Universe became, this out of which I also came now, not at the time before they crucified me, but now.\n\nIt happened by the commandment of that Mystery, he dispatched to me my vesture of light, this which he gave for me from (at) first, this which I left in the Last mystery, namely the twenty-fourth mystery (reckoning) from within out, these which become in the arrays of the second Space of the First [10 ] Mystery.\n\nThat vesture of light therefore, that which I, I left in the Last mystery, until finished the time for me to put it on, and to begin for me to speak with the race of mankind, and reveal to them all from the beginning of the Truth even unto its end, and speak with them from the inward part of the inward parts even unto the outward part of the outward parts, and from the outward part of the outward parts even unto the inward part of the inward parts.\n\nRejoice therefore with gladness and make more joy, because ye are those to whom they gave it for me to speak with you at first from the beginning of the Truth [11 ] even unto its end.\n\nBecause of this indeed I chose you from at first through the First Mystery.\n\nRejoice therefore and be glad, because having come, coming out unto 6 the World from at first I brought twelve powers with me according as I said unto you from at first, which I received from the twelve Saviours of the Treasury of Light, according to the commandment of the First Mystery.\n\nThese therefore I cast unto the womb of your mother, from when I come unto the World, these which (are) in your body to-day, for they gave these powers unto you beyond all the World, because ye are those who will save all the World; and that ye should [11 ] prevail to endure the threat of the Rulers of the World with the toils of the World with their dangers and with their persecutions, all which will bring upon you the Rulers of the Height.\n\nFor I said to you many times that the power which becometh within you, this which I brought out of the twelve Saviours, these who become in the Treasury of the Light.\n\nBecause of this indeed I said to you from at first that ye are not (such as are) out of the World, this I also, I am not out of it, for every man who (is) in the World received soul out of the Rulers of the Aeons, but the power which becometh [12 ] in you is (something) from me.\n\nBut ye, your souls are numbered unto the Height.\n\nI brought twelve powers of 12 Saviours to the Treasury of the Light, which I took out of the part of my power, that which I took at first."

