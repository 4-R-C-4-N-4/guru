[content]
body = "And he hath the authority for to move about in all the arrays of the Inheritances of the Light, for to move about in them from without out unto within and from within in unto without and from above unto below and from below unto above, and from the height unto the depth, and from the depth unto the height, and from the length unto the breadth, and from the breadth unto the length, in one word, he hath the authority to move about in all the Places of the Inheritances of the Light.\n\nAnd he hath the authority for to remain in the Place which he willeth in the Inheritance of the Kingdom of the Light.\n\nAnd Amen I say unto you that man in the dissolution of the World will become [192 ] reigning over all the arrays of the Inheritance.\n\nAnd he who will receive the Mystery of the Ineffable, that one which is I.\n\nThat Mystery, indeed, is that which knoweth because of what the Darkness became, and because of what became the Light.\n\nAnd that Mystery indeed is that which knoweth because of what the Darkness of the Darknesses became, and because of what the Light of the Lights became.\n\nAnd that Mystery indeed is that which knoweth because of what the Chaoses became, and because of what became the Treasury of the Light.\n\nAnd that Mystery indeed is that which knoweth because of what the Judgments became, and because of what became the Land of the Light with the Place of the Inheritances of the Light.\n\nAnd that Mystery indeed is that which [192 ] knoweth because of what the Punishments of the sinners became, and because of what became the Repose of the Kingdom of the Light.\n\nAnd that Mystery indeed is that which knoweth because of what the sinners became, and because of what became the Inheritances of the Light.\n\nAnd that Mystery indeed is that which knoweth because of what became the impious, and because of what became the good.\n\nAnd that Mystery is that which knoweth because of what the Judgments of the Punishments became, and because of what became all the emanations of the Light.\n\nAnd that Mystery indeed is that which knoweth because of what the Sin became, and because of what became the Baptisms with the Mystery of the Light.\n\nAnd that Mystery indeed is that which knoweth because of what became the fire of the Punishment, and because of what [193 ] became the Seals of the Light, that the Fire should not hurt them.\n\nAnd 104 that Mystery indeed is that which knoweth because of what became the Anger, and because of what became the Peace.\n\nAnd that Mystery indeed is that which knoweth because of what the Blasphemy became, and because of what became the Hymns of the light.\n\nAnd that Mystery indeed is that which knoweth because of what the Prayers of the Light became.\n\nAnd that Mystery indeed is that which knoweth because of what the Curse became, and because of what became the Blessing.\n\nAnd that Mystery indeed is that which knoweth because of what the Wickedness became, and because of what became the Deceit.\n\nAnd that Mystery indeed is that which [193 ] knoweth because of what the Murder became, and because of what became Vivifying of the souls.\n\nAnd that Mystery indeed is that which knoweth because of what became the Adultery with the Fornication, and because of what became the Purity.\n\nAnd that Mystery indeed is that which knoweth because of what became the Intercourse, and because of what became the Continence.\n\nAnd that Mystery indeed is that which knoweth because of what became the Pride with the Boasting, and because of what became the Humility with the Meekness.\n\nAnd that Mystery indeed is that which knoweth because of what the Weeping became, and because of what became the Laughter."

