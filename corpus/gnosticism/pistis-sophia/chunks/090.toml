[content]
body = "And he who will receive the one word of that mystery, this which I shall say unto you now with all its (his, 114 MS thus again) types with all its figures, with the manner of completing its mystery: because that ye are the perfect of all-perfect.\n\nAnd ye are that which will complete all knowledge [211 ] of that mystery with all its arrangement with its...: because ye are those to whom they entrusted every mystery.\n\nHear therefore now, that I may say unto you that mystery which is this, He who will receive therefore the one word of the mystery, this which I said unto you, whenever he should come out the body of the matter of the Rulers, and should come the Receivers of Contentious (ones), and they should loosen him out of the body of the matter of the Rulers of the Receivers of Contentious (ones), namely, they are wont to loosen every soul which cometh out of the body.\n\nIf therefore the Receivers of Contentious (ones) should loosen the soul which received this one mystery of the Ineffable this which I finished saying unto you now [211 ] and in the hour they will loosen it from the body of the matter it will become a great effluence of light in the middle of those Receivers and will fear greatly the Receivers before the light of that soul, and will be weakened the Receivers and fall and be silent altogether, out of the fear of the great light which they saw.\n\nAnd the soul which receiveth this mystery of the Ineffable will fly unto the Height becoming a great effluence of light.\n\nAnd will not seize it the Receivers, and they will not know what is the road in which it will go, because that it became a great Beam of light, and it flieth unto the Height: and not [212 ] any power is wont to be able to hold it down at all, nor indeed shall they be able to approach it at all; but it is wont to pass through all the Places of the Rulers, with all the Places of the emanations of the Light, and it is not wont to give answer in any Place, nor is it wont to give defence, nor is it wont to give symbol: for not even shall any power of the Rulers be able, nor shall any power of the emanations of the Light, they shall not be able to approach that soul, but all the Places of the Rulers, with all the Places of the emanations of the Light are wont each to hymn unto it in their Places, being in fear before the Light of the effluence which envelopeth the soul, even until [212 ] it passeth through them all, and goeth unto the Place of the Inheritance of the mystery which it received, namely, the mystery of the Only One, the Ineffable and it becometh joined in unto his members.\n\nAmen I say to you, It will become in all the Places in the time of a man shooting an arrow.\n\nNow therefore also, Amen I say to you, Every man who will receive that Mystery of the Ineffable and is complete or fulfilleth (it) in all its types with all its 115 figures, is a man being in the World, but he excelleth all Angels and he will excel more than they all, he is a man being upon the World, but he excelleth all the Archangels, and he will excel more than they all.\n\n[213 ] He is a man being upon the World, but he excelleth all the Tyrants, and he will be exalted over them all.\n\nHe is a man being upon the World, but he excelleth all the Lords, and he will be exalted over them all."

