[content]
body = "It happened therefore, the First Mystery having finished saying these words, came 78 forward Mathaios, said he, I understood the explanation of the hymn, this which said the Pistis Sophia, now therefore command to me that I may say it boldly.\n\nBut answered the First Mystery, said he, I command to thee Mathaios for to utter the explanation of the hymn which said the Pistis Sophia.\n\nBut answered Mathaios, said he, Concerning the explanation of the hymn which said the Pistis Sophia, thy power of light [145 ] prophesied about it once, the Ode of Solomon.\n\nIt is he who brought me down from the Places which are high above, and he brought me up from the Places which are at the bottom below.\n\nHe who there took away the (things) which are in the Middle, and he taught me them.\n\nHe who scattered away mine enemies with my adversaries.\n\nHe who gave to me authority over bonds to loosen them.\n\nHe who struck the serpent which hath seven heads with my hands, He made me stand upon his root, that I should blot out his seed.\n\nAnd thou wast being with me, thou art helping me in every Place.\n\nSurrounded me thy name.\n\nThy right hand destroyed the poison of the evil [145 ] speaker.\n\nThy hand opened the road for thy faithful (ones).\n\nThou redeemedst them out of the tombs, and thou removedst them out of the midst of the embalmed-corpses.\n\nThou tookest bones being dead, thou clothedst them with a body; and those which move not, thou gavest to them an energy of life.\n\nThy road became uncorruptness and with thy face.\n\nThou broughtest thine Aeon upon the corruption, that they should all be dissolved and made new and thy light should be foundation to them all.\n\nThou buildest thy richness on them, and they became a dwelling being holy.\n\nThis therefore, my Lord, is the explanation of the hymn which said the Pistis Sophia.\n\nHear therefore, that I may say manifestly.\n\nThe word which thy power said by Solomon, [146 ] He who brought me down out of the Places which are high above, and also thou broughtest me up from the places which are in the bottom below.\n\nThat is the word which said the Pistis Sophia, I hymn up unto thee, this through whose precept thou broughtest me out of this Aeon which is high above, and thou broughtest me unto the Places below.\n\nAnd also thou deliveredst me by thy precept, thou broughtest me up from the Places which are below.\n\nAnd the word which thy power said by Solomon, He who there took away those which are in the Middle and he taught me them.\n\nThat is the word which said the Pistis Sophia.\n\nAnd also through thyself thou causedst to be purified the matter which is in the midst of my power, and I saw [146 ] it.\n\nAnd also the word which thy power said by Solomon, He who 79 scattered away mine enemies with mine adversaries.\n\nThat is the word which said the Pistis Sophia, And thou art he who scattered away from me all the emanations of the Self-willed, these which were oppressing me, and these which were becoming enemy unto me.\n\nAnd the word which thy power said, He who gave to me his wisdom over bonds to loosen them.\n\nThat is the word which said the Pistis Sophia, And he gave to me his wisdom, for me to be loosened from the bonds of those emanations.\n\nAnd the word which thy power said, He who struck the serpent which hath seven heads with my hands, [147 ] and he made me stand upon his root, that I should blot out his seed."

