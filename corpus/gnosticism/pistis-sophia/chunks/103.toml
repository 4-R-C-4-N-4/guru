[content]
body = "Say unto them, Renounce the villainies, and be worthy of the mysteries of the Light, and be delivered from all the [237 ] demons of Ialtabaoth with all his punishments.\n\nSay unto them, Renounce the senselessness, and be worthy of the mysteries of the Light, and be delivered from the seas of pitch of Ialtabaoth which are boiling.\n\nSay unto them, Renounce the adulteries, and be worthy of the mysteries of the Light, and be delivered from the seas of sulphur and pitch of the face of lion.\n\nSay unto them, Renounce the murders, and be worthy of the mysteries of the Light, and be delivered from the Ruler of face of crocodile, this who (is) in the cold, the first chamber which is in the Darkness which is outer.\n\nSay unto them, Renounce the unmercifulnesses with the impiousnesses, and be worthy of the mysteries of the Light, and be delivered from the Rulers of the Darkness which is outer.\n\nSay unto them, Renounce the godlessnesses [238 ] and be worthy of the 130 mysteries of the Light, and be delivered from the weeping with the gnashing of the teeth.\n\nSay unto them, Renounce the witchcraft, and be worthy of the mysteries of the Light, and be delivered from the great cold with the hail of the Darkness which is outer.\n\nSay unto them, Renounce the blaspheming, and be worthy of the mysteries of the Light, and be delivered from all the punishments of the great dragon of the Darkness which is outer.\n\nSay unto them, Renounce the teaching of error, and be worthy of the mysteries of the Light, and be delivered from all the punishments of the great dragon of the Darkness which is outer.\n\nSay unto those who teach in the teachings of error, with every one who learneth through them, Woe to you, ye, because if ye do not repent and forsake [238 ] your error, ye will go unto the punishments of the great dragon with the Darkness which is outer, this which is cruel greatly, and they will not cast you unto the World for unto age, but ye will become existenceless outside.\n\nSay unto those who will forsake the teaching of the truth of the First Mystery, Woe to you, ye, because your punishment is evil beyond (that of) all men.\n\nFor ye will remain in the great cold, the ice with the hail in the midst of the dragon with the Darkness which is outer, and they will not cast you unto the World from this hour unto age, but ye will become petrified at that place.\n\nAnd in the dissolution of the Universe ye will be wasted away, and ye will become without existence unto age.\n\nSay also further unto the men [239 ] of the World, Be quiet and receive the mysteries of the Light and go unto the Height of the kingdom of the Light.\n\nSay unto them, Do love of man, and be worthy of the mysteries of the Light, and go unto the Height of the kingdom of the Light.\n\nSay unto them, Be meek and receive the mysteries of the Light, and go unto the Height unto the kingdom of the Light.\n\nSay unto them, Be peaceable and receive the mysteries of the Light, and go unto the Height unto the kingdom of the Light.\n\nSay unto them, Be merciful and receive the mysteries of the Light, and go unto the Height unto the kingdom of the Light.\n\nSay unto them, Do alms and receive the mysteries of the Light, and go unto the Height unto the kingdom of the Light.\n\nSay unto them, [239 ] Minister unto the poor with those who are sick, with those who are paralysed, and receive the mysteries of the Light, and go unto the Height unto the kingdom of the Light."

