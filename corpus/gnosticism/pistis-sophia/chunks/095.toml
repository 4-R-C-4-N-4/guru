[content]
body = "Amen I say unto you, That man whenever he should come out of the body, they are not wont to judge him in any Place of the Rulers, nor will they be able to punish him in any Place, 120 nor the fire will touch him through the great mystery of the Ineffable, which becometh with him: and they will hasten quickly, and deliver him up to one another, and steer him along (from Place to Place) and from array to array, even until they take him (close) to the Virgin of the Light, all the Places fearing before the mystery with the sign of the kingdom of the Ineffable, this which becometh with him: and whenever they should take it (close) to the Virgin of the Light, the Virgin will see the sign of the mystery of the kingdom [222 ] of the Ineffable, becoming with him, is wont to wonder the Virgin of the Light, and she is wont to prove him.\n\nBut she is not wont to cause them to take him unto the Light, until he completeth all the duties (politia) of the Light of that mystery, which are these the purifications of the renunciation of the World and with all the matter which is in it.\n\nThe Virgin of the Light is wont to seal him with a seal more excellent, which is this, (the form of the seal is not given), and to cause them to cast him in any month in which he came out of the body of the matter unto a body being about to become righteous, this being about to find the Godhead of the truth, with the mysteries which are high, and (to) inherit them, and (to) inherit the Light unto age, namely, the free-gifts of the second mystery of the First Mystery of the Ineffable.\n\nThe third [222 ] Mystery also of that Ineffable, the man indeed who will complete that mystery, not only because whenever he should come out of the body being about to inherit the kingdom of the mystery, but whenever he should perform and complete it with all its figures, which is this, that whenever he should do that mystery and complete it well, and mention by name that mystery over a man coming out of the body, having known that mystery, this (man) who having delayed, or rather did not delay this (man) who becometh in the punishments which are cruel of the Rulers, and with their judgments which are cruel with their fires which are various: Amen I say to you, The man who cometh out of the body, whenever they should name this mystery for his sake, they will hasten quickly and remove him and deliver [223 ] him up to one another, even until they take him (close) to the Virgin of the Light, and the Virgin of the Light will seal him with a seal being more excellent, which is this (the form of the seal is not given): and in any month she will cause them to cast him unto the body of (a) righteous (man), this who will find the Godhead of the truth with the mystery which is more excellent, and he (will) inherit the kingdom of the Light.\n\nThis therefore is the free-gift of 121 the third mystery of the Ineffable.\n\nNow therefore every one who will receive (one) out of the five mysteries of the Ineffable, this whenever he should come out of the body and inherit unto the Place of that mystery (and the kingdom of those five mysteries) [223 ] they are equal with one another in their kingdom, but they are not equal with the three mysteries of the Ineffable."

