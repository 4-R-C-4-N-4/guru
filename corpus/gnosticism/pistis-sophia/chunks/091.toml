[content]
body = "He is a man being upon the World, but he excelleth all the Gods, and he will be exalted over them all.\n\nHe is a man being upon the World, but he excelleth all the luminaries (phoster), and he will be exalted over them all.\n\nHe is a man being upon the World, but he excelleth all the pure (lights), and he will be exalted over them all.\n\nHe is a man being upon the World, but he excelleth all the Triple powers, and he will be exalted over them all.\n\nHe is a man being upon the World, but he excelleth all the Forefathers, and he will be exalted [213 ] over them all.\n\nHe is a man being upon the World, but he excelleth all the Invisibles, and he will be exalted over them all.\n\nHe is a man being upon the World, but he excelleth the great Forefather invisible, and he will also be exalted over him.\n\nHe is a man being upon the World, but he excelleth all those of the Middle, and he will be exalted over them all.\n\nHe is a man being upon the World, but he excelleth the emanations of the Treasury of the Light, and he will be exalted over them all.\n\nHe is a man being upon the World, but he excelleth the Confusion, and he will be exalted over all of it.\n\nHe is a man being upon the World, but he excelleth the whole Place of the Treasury, and he will be exalted over all of it.\n\nHe is a man being upon the World, but he will become King with me in my kingdom.\n\nHe is a man [214 ] being upon the World, but he becometh King in the Light.\n\nHe is a man being upon the World, but not one (out) of the World is he, and Amen I say to you, That man is I and I am that man: and in the dissolution of the World, namely, whenever the Universe should be caught-up and whenever should be caught-up all the number of the perfect souls, and I become ruling in the midst of the last Helpers, ruling over all the emanations of the Light, and ruling over the seven Amens, with the five Trees, with the three Amens, with the nine Guards, and ruling over the child of the child, namely the [214 ] Twin-saviours, and ruling over the twelve Saviours, with all the number of the perfect souls, these which will receive the mystery of the Light.\n\nAnd every man who will receive the mystery in the Ineffable will become fellow-King with me, they will sit on my right (hand) and on my left in my kingdom.\n\nAnd Amen 116 I say to you, Those men are I, and I am those.\n\nBecause of this therefore I said unto you once, Ye will sit upon your thrones on my right (hand) and on my left in my Kingdom and ye will reign with me.\n\nBecause of this therefore I did not spare, nor was I ashamed, calling you, My brothers and my [215 ] friends, because that ye will become fellow-Kings with me in my kingdom.\n\nThese therefore I am saying them unto you, I am knowing that I shall give to you the Mystery of the Ineffable, which Mystery is I, and I am that Mystery."

