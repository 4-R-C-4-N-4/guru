[content]
body = "But answered Philippos, said he to Jesus, My Lord, because of which mystery removedst thou the binding of the Rulers with their Aeons, with their Destiny, with their Sphere, with all their Places, and in confusion thou causedst them to be confused in their paths, and they erred [31 ] in their course.\n\nDidst thou this therefore to them because of the salvation of the World or otherwise?\n\nBut answered Jesus, said he to Philippos with the disciples all together: I altered their path unto salvation of all the souls, Amen amen I say to you that except that I altered their path, they would have destroyed a multitude of souls, and they would have spent much time, having not been 17 dissolved the Rulers of the Aeons, and the Rulers of the Destiny with the Sphere, and with all their Places, with all their heavens with all their Aeons.\n\nAnd the souls would have spent a great amount of [32 ] time outside this (place ?); and they would have delayed from completion the number of the perfect souls, these which will be reckoned unto the inheritance of the Height by the mysteries, and become in the Treasury of the Light.\n\nBecause of this, therefore, I altered their path that they should be confused and be disturbed, and put away the power, this which becometh in the matter of their World, this which is wont to make the souls, that they should purify them quickly, and they should be lifted up to those who will be saved, they with all the power; and be dissolved quickly those who will not be saved.\n\nIt happened therefore, Jesus having finished saying these words unto his disciples, came forward Maria, she who is beautiful in her speaking, and the happy (one) she prostrated at the feet of Jesus.\n\n[32 ] Said she, My Lord bear with me that I may speak in thy presence, and be not angry unto me because I add trouble unto thee for many times enquiring of thee.\n\nAnswered the Saviour in compassion, said he to Maria, Say the word which thou art willing (to say), and I, I shall reveal it to thee in boldness.\n\nBut answered Maria, said she to Jesus, My Lord, in what manner will the souls be delaying outside of this (place)?\n\nor in what form will they be purifying them indeed quickly?\n\nBut answered Jesus, said he to Maria, Well (done) Maria, thou enquirest aright in the enquiring which is good, and thou givest light upon everything in accuracy and in exactness.\n\nNow therefore I shall not hide anything from you from this hour, but I shall reveal [33 ] everything to you in accuracy and in boldness.\n\nHear therefore, Maria and listen all ye disciples.\n\nBefore that I preached to all the Rulers of the Aeons and with all the Rulers of the Destiny with the Sphere, they were all being bound in their bonds and in their Spheres and in their seals, according as bound them from at first Ieou the overseer of the Light: and each of them was continuing in his array, and each one was walking according to his course, according as put them Ieou the overseer of the Light: and whenever should come the time of the number of Melkhisedek, the great Receiver of Light is wont to come unto [33 ] the midst of the Aeons with all the Rulers who are bound in the Sphere and in the Destiny, and he is wont to take away the purgation of the light from all the Rulers of the Aeons and from 18 all the Rulers of the Destiny with those of the Sphere.\n\nFor he was wont to take away there that which disturbed them."

