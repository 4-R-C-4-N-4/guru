[content]
body = "The truth also is the power which (is) in Elisabet, namely Iohannes, this who came, he preached of the way of the truth, namely thee: who preached before thee.\n\nAnd again the mercy with the truth which met one another, are thou my Lord who met Iohannes on the day, thou being about to receive baptism (and Iohannes himself).\n\nBut thou also with Iohannes [113 ] are the righteousness with the peace who kissed one another.\n\nThe truth burst forth out of the earth, and the righteousness looked out of the heaven, namely, the time (at) which thou ministeredst to thy own self: thou madest form of Gabriel, thou lookedst out upon me out of the heaven, thou spakest with me, and thou having spoken with me, thou burstedst forth in me, namely the truth, namely the power of Sabaoth 62 the good, this which becometh in thy material body, namely the truth which burst forth out of the earth.\n\nIt happened therefore, [114 ] Jesus having heard these words, saying them Maria his mother, said he: Well (done and) fairly.\n\nThis is the explanation of all the words, these which my power of light prophesied about them once by David the prophet.\n\n[ Written on the vacant page between the 1st and 2nd Documents.\n\n] [114 ] But these are the names which I shall give from the Boundless (One downwards).\n\nWrite them with a sign, that the sons of God should be manifested from this place (onwards).\n\nThis is the name of the Deathless (One) ααα ωωω.\n\nAnd this is the name of the sound by which the Perfect Man was moved ιιι.\n\nBut these are the interpretations of the names of these Mysteries.\n\nThe first is ααα.\n\nIts interpretation is φφφ.\n\nThe second is μμμ or is ωωω.\n\nIts interpretation is ααα.\n\nThe third is ψψψ.\n\nIts interpretation is οοο.\n\nThe fourth is φφφ.\n\nIts interpretation is ννν.\n\nThe fifth is δδδ.\n\nIts interpretation is ααα.\n\nHe who (is) upon the throne is ααα.\n\nThis is the interpretation of the second αααα αααα αααα.\n\nThis is the interpretation of the whole name.\n\n63"

