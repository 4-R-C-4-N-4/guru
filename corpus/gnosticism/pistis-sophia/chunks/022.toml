[content]
body = "Deliver me because of my enemies; for thou art (he) who knoweth my reproach with my shame and my disgrace: all those who afflict me (are) in thy presence.\n\nMy heart looked out for a reproach with wretchedness; I looked out for him who will grieve with me, I found him not, and he who will comfort me I discovered him not.\n\nThey gave gall for my food; they gave me to drink vinegar in my thirst.\n\nLet their table become in their presence unto a snare with a trap and a recompense with a scandal; and bow (down) their back every time.\n\nPour upon them thy wrath and the anger of [52 ] thy wrath let it catch them.\n\nLet their abode be made desert; and let there be not him who dwelleth in their abodes.\n\nBecause he whom thou smotest they pursued him; they added upon the pain of his wounds, they added unlawfulness upon their unlawfulnesses; and let them not come in unto thy righteousness; let them wipe them out of the book of those who live, and let them not write them with the righteous.\n\nI am a poor (one) suffering also pains; the salvation of thy face, O God, is that which accepted me.\n\nT shall bless the name of God in a song, and I shall exalt him in a blessing.\n\nIt will please God more than a new calf which putteth forth horn and hoof.\n\nLet the poor [52 ] see and be glad.\n\nSeek after God that your souls may live.\n\nBecause the Lord heard the poor (ones) and he despised not those who are in fetters of brass.\n\nLet the heavens with the earth bless the Lord, the sea with all the (things) which (are) in it, because the Lord will deliver Sion; and they will build the cities of the Ioudaia and dwell there and inherit it.\n\nThe seed of his servants will possess it, and those who love his name will dwell in it.\n\nIt happened therefore, Mariham having finished these words unto Jesus in the midst of the disciples, said she to him, My Lord, this is the explanation (of the) mystery (in margin) of the repentance of the Pistis Sophia.\n\nIt happened therefore, Jesus having heard Mariham saying [53 ] these words, said he to her, Well (done) Mariham the happy, the Pleroma, or the all-blessed of Pleroma, this (woman) whom they will call happy in every generation.\n\nAdded also Jesus in the word, said he, Added also the Pistis Sophia she hymned in a second Repentance saying thus, O Light of the Lights I believed thee, leave me not in the darkness even unto the completion of my time, help me and deliver me through thy mysteries.\n\nIncline thine ear unto me and 29 deliver me.\n\nLet the power of thy light deliver me and take me away unto the Aeons which are on high; because thou art he who will deliver me and take me unto the Height [53 ] of thy Aeons.\n\nDeliver me, O Light from this power of face of lion, and from the emanations of the Self-willed of the Gods.\n\nBecause thou, O Light, art he whose light I believed, and whose light I trusted indeed from at first.\n\nAnd I believed him from the hour (in) which he emanated me, and thou indeed art he who caused them to emanate me, and I myself, I believed thy light from at first.\n\nAnd having believed thee, were not mocking me the Rulers of the Ages saying, She ceased from her mystery?\n\nThou (art) he who will deliver me, and thou art my Saviour, and thou art my mystery, O Light."

