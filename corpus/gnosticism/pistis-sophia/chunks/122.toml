[content]
body = "And also that (not only) are they wont to forgive all of them to her, [275 ] but they are not wont to reckon sin unto her from this hour, even until unto age of age, because of the free-gift of that great mystery with its (their, MS ) glory which is much, greatly greatly.\n\nThese therefore having said them the Saviour, said he to his disciples, Understand ye in what manner I am speaking with you?\n\nAnswered also Maria, said she, Yea, my Lord, I finished carrying off every word which thou sayest.\n\nNow therefore my Lord, concerning the word which thou sayest, Are wont all the mysteries of the three Spaces they are wont to forgive sin and cover over their unlawfulness which prophesied once about this word David the prophet, saying: Happy are those whose sin they forgave with those whose unlawfulness they covered over.\n\nHe prophesied [275 ] about this word once, and the word which thou saidst, The mystery of the First Mystery with the mystery of the Ineffable, that every man who will receive those mysteries, not only that they are wont to forgive the sins, which they did from at first, but also they are not wont to make the reckoning indeed of them from that time unto age.\n\nBecause of this word also prophesied about it once David saying, Happy are they unto whom the Lord the God will not reckon sin, namely, they will not reckon sin unto him from this time (viz.) those who receive the mysteries of the First Mystery with those who receive the mysteries of the Ineffable.\n\nSaid he: Well 153 (done), the spiritual of pure Light Maria, this is the explanation of the word.\n\nAdded also Maria, said she, My Lord, Then whenever the man shall receive mystery in the mysteries of the First Mystery, [276 ] and also should turn (away) and do sin and transgress.\n\nAnd also, after these should turn and repent and pray in his mystery (after) his mystery, will they forgive to him or otherwise?\n\nAnswered the Saviour, said he to Maria, Amen amen I say to you, Every one who will receive the mysteries of the First Mystery, and also turneth (away) and transgresseth twelve times and also repenteth twelve times praying in the mysteries of the First Mystery they will forgive to him.\n\nAnd also should he (they, MS ) transgress after the twelve times, and turn (away) and transgress they will not forgive to him unto age, for him to turn unto his mystery (after) his mystery, and this (one) hath not repentance except he should receive the mysteries of the Ineffable, that which is wont to be merciful at every time, and, also, he forgiveth at every time.\n\nAdded also Maria, said she, My Lord, but if however those who receive the mysteries of the First Mystery, and they should turn (away) and transgress and come out [276 ] of (the) body, having not repented, will they inherit the kingdom or otherwise?\n\nBecause they received indeed the free-gift of the First Mystery?\n\nAnswered the Saviour, said he to Maria, Amen amen I say to you, Every man who receiveth mystery in the First Mystery, having transgressed the first time with the second with the third, and this (one) should come out of body, having not repented, his judgment surpasseth much beyond every judgment.\n\nFor his dwelling place is in the midst of the mouth of the dragon of the Darkness which is outer, and at end of all these he will be petrified in the punishments, and he will be consumed unto age, because he received in the free-gift of the First Mystery, he remained not in it."

