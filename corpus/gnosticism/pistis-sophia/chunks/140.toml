[content]
body = "Are wont the Ministers to bring the two parts to one another, and also are wont the Ministers to hold back the blood of every meat of the woman which she will eat, with the (things) which she drinketh, they are wont to hold them back in the belly of the woman, even until forty days: they are wont to knead the blood of the power of the meats, they are wont to knead it well in the womb of the woman: after the forty days they are wont to spend thirty other days building (up) his members in the image of the body of the man, is wont each to build (up) a member, these (of) which I shall say unto you which Dekans will build it, I shall say them unto you in the Distribution of the Universe.\n\nIf therefore it should happen after these, the Ministers should complete all the body with all its members in [310 ] seventy days.\n\nAnd after these, are wont the Ministers they are wont to call in unto the body which they built (up): first indeed they are wont to call the counterfeit spirit, afterwards they are wont to call the soul within them, and afterwards they are wont to call the mixture of the power in unto the soul: and the Fate they are wont to put it outside of all (but) not mixing in with them, following them at a distance after them: and after these are wont the Ministers, they are wont to seal them in unto one another with all the seals which gave to them the Rulers, and they are wont to seal (added in lower margin) on the day (in) which they settled in the belly of the woman, they are wont to seal him in unto the left hand of the (human) form; and they are wont to seal on the day in which they completed the body on the right hand: and they are wont to seal on the day in which the Rulers delivered them unto them in the middle of the skull of the body of the (human) form: and they are wont to seal on the [311 ] day (in) which the soul cometh out of 175 the Rulers, they are wont to seal him on the skull of the (human) form.\n\nAnd they are wont to seal on the day (in) which they kneaded the members, and separated unto (one) soul, they are wont to seal him in the skull on right (hand) of the form.\n\nAnd the day (in) which they bound the counterfeit spirit unto her (the soul) they are wont to seal him behind the head of the form: and the day in which breathed the power in unto the body the Rulers, they sealed him on the cerebellum which is in the middle of the head of the form, and also on the heart of the form: and also the number of years which will spend the soul in the body, they are wont to seal him on the forehead, this which is in the form: so that all these seals they are wont to seal on [311 ] the form: all these seals I shall say their name unto you at the Distribution of the Universe.\n\nAnd after the Distribution of the Universe I shall say unto you because of what thing all these became.\n\nAnd if ye wish to understand, I am that Mystery."

