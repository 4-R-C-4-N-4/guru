[content]
body = "Say unto them, Renounce the listening that ye may be worthy of the mysteries of the Light (Schm.\n\nsupplies this), and be delivered from the judgments of the face of a dog.\n\nSay unto them, Renounce litigiousness, and be worthy of the mysteries of the Light, and be delivered from the punishments of Ariel.\n\nSay unto them, Renounce the false calumny, that ye may be worthy of the mysteries of the Light, and be delivered from the rivers of fire of the face of a dog.\n\nSay unto them, Renounce the false witnessings, and be worthy of the mysteries of the Light, that ye may escape, that ye may be delivered from the river of fire of the face of a dog.\n\nSay unto them, Renounce the boastings with the prides, that ye may be worthy of the mysteries of the Light, and be delivered from the pits of fire of Ariel.\n\nSay unto them, Renounce the gluttony (self-lovings, MS ) that ye may be [236 ] worthy of the mysteries of the Light, and be delivered from the judgments of Amente.\n\nSay unto them, Renounce the garrulity that ye may be worthy of the mysteries of the Light, and be delivered from the fire of Amente.\n\nSay unto them, Renounce the wiles which are evil, and be worthy of the mysteries of the Light, and be delivered from the punishments which (are) in Amente.\n\nSay unto them, Renounce the lovings of the greater portion, that ye may be worthy of the mysteries of the Light, and be delivered from the rivers of flame of the face of a dog.\n\nSay unto them, Renounce the lovings of the world that ye may be worthy of 129 the mysteries of the Light, and be delivered from the vesture of pitch and fire of the face of a dog.\n\nSay unto them, Renounce the robberies, that ye may be worthy of the mysteries of the Light and be delivered from the rivers [236 ] of flame of Ariel.\n\nSay unto them, Renounce the words which are evil, that ye may be worthy of the mysteries of the Light, and be delivered from the punishments of the rivers of flame.\n\nSay unto them, Renounce the wickednesses, and be worthy of the mysteries of the Light, and be delivered from the seas of fire of Ariel.\n\nSay unto them, Renounce the unmercifulnesses, and be worthy of the mysteries of the Light, and be delivered from the judgments of the faces of the dragon.\n\nSay unto them, Renounce the angers, and be worthy of the mysteries of the Light, and be delivered from the rivers of flame of the faces of the dragons.\n\nSay unto them, Renounce the curse, and be worthy of the mysteries of the Light, and be delivered from the fire of the seas of the faces of the dragons.\n\nSay unto them, Renounce the blasphemy, and be worthy [237 ] of the mysteries of the Light, and be delivered from the seas which boil of the faces of the dragons.\n\nSay unto them, Renounce the thievings, and be worthy of the mysteries of the Light, and be delivered from Ialtabaoth.\n\nSay unto them, Renounce the slander, and be worthy of the mysteries of the Light, and be delivered from the rivers of fire of the face of lion.\n\nSay unto them, Renounce the fightings and the quarrellings, and be worthy of the mysteries of the Light, and be delivered from the rivers which are boiling of Ialtabaoth.\n\nSay unto them, Renounce the ignorance, and be worthy of the mysteries of the Light and be delivered from the ministers of Ialtabaoth, with the fires of the seas."

