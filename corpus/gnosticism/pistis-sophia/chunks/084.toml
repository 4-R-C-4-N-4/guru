[content]
body = "And added also Jesus, said he to his disciples, Yet therefore my Disciples and my friends and my brothers, let each be sober of the spirit which (is) in him that ye may listen and understand every word which I shall say to you, because from now I shall begin to speak with you concerning all the knowledge 106 of the Ineffable, because that Mystery indeed is that which knoweth because of [196 ] what became the West and because of what became the East.\n\nAnd that Mystery indeed is that which knoweth because of what became the South, and because of what became the North.\n\nYet therefore also my disciples, hear and continue and be sober and hear all the knowledge of the Mystery of the Ineffable, because that Mystery indeed is that which knoweth because of what became the demons and because of what became the mankind.\n\nAnd that Mystery indeed is that which knoweth because of what became the Heat, and because of what became the Air which is wholesome.\n\nAnd that Mystery indeed is that which knoweth because of what became the Stars [197 ], and because of what became the Clouds.\n\nAnd that Mystery indeed is that which knoweth because of what the earth became Deep, and because of what the Water came over it.\n\nAnd that Mystery indeed is that which knoweth because of what the earth dried up and the water of rain came upon it.\n\nAnd that Mystery indeed is that which knoweth because of what became the Famines, and because of what became the Abundance.\n\nAnd that Mystery indeed is that which knoweth because of what became the Frost, and because of what became the Dew which is good.\n\nAnd that Mystery indeed is that which knoweth because of what became the Dust, and because of what became the Cooling which is sweet.\n\nAnd that Mystery indeed is that which knoweth because of what became the Hail, and [197 ] because of what became the Snow which is wholesome.\n\nAnd that Mystery indeed is that which knoweth because of what became the Wind of the West, and because of what became the Wind of the East.\n\nAnd that Mystery indeed is that which knoweth because of what became the Fire of the height, and because of what became also the Waters.\n\nAnd that Mystery indeed is that which knoweth because of what became the Wind of West, and because of what became the Wind of East.\n\nAnd that Mystery indeed is that which knoweth because of what became the Wind of South, and because of what became the Wind of North.\n\nAnd that Mystery indeed is that which knoweth because of what became the Stars of the heaven and with the Disks of the phoster (planets) and because of what became the [198 ] Firmament with all its Veils.\n\nAnd that Mystery indeed is that which knoweth because of what became the Rulers of the Spheres, and because of what became the Sphere with all its types.\n\nAnd that Mystery indeed is that which knoweth because of what became the Rulers of the Aeons, and because of what became the Aeons with their 107 Veils.\n\nAnd that Mystery indeed is that which knoweth because of what became the Rulers of the tyrant Aeons, and because of what became the Rulers who repented.\n\nAnd that Mystery indeed is that which knoweth because of what became the Ministers and because of what became the Dekans.\n\nAnd that Mystery indeed is that which knoweth because of [198 ] what became the Angels, and because of what became the Archangels.\n\nAnd that Mystery indeed is that which knoweth because of what became the Lords, and because of what became the Gods.\n\nAnd that Mystery indeed is that which knoweth because of what also the Jealousy became in the height, and because of what also became the Absence of Jealousy.\n\nAnd that Mystery indeed is that which knoweth because of what became the Hate, and because of what became the Love."

