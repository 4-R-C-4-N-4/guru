[content]
body = "And having come, coming unto the World I came unto the midst of the Rulers of the Sphere, I was the likeness of Gabriel the angel of the Aeons, and knew me not the Rulers of the Aeons.\n\nBut they were thinking that I am Gabriel the angel.\n\nIt happened therefore, having come unto the midst of the Rulers of the Aeons, I looked down unto the World of the mankind by the command of the First Mystery, I found Elisabet the mother of Iohannes, [12 ] the baptist, before that that (woman) yet conceived him, I sowed a power into her, this which I received from the little Iao, the good, he who (is) in the Middle, that he should prevail to preach in front of us, and prepare my road and baptise in water for forgiving sin.\n\nThat power therefore, that (is) that which becometh in the body of Iohannes, and also in the Place of the soul of the Rulers, destined to receive it, I found the soul of Helias the prophet in the Aeons of the Sphere, and I took him in, and I took his soul also, I brought it to the Virgin of the Light and she gave it to her Receivers, they brought it unto the Sphere of the [13 ] Rulers and they cast it into the womb of Elisabet.\n\nBut the power of the little Iao, he of the Middle, and the soul of Helias the prophet, they (are) those which are bound in the body of Iohannes the baptist.\n\nBecause of this therefore ye doubted, at the time I having said to you, that Iohannes said, I am not the Christ, and ye said to me, It is written in the 7 Scripture that if the Christ should come, he coming, cometh Helias before him and prepareth his road.\n\nBut I, ye having said to me these (things) I said to you, Came indeed Helias, and he prepared everything according as it is written, and they did to him as they are willing (to do).\n\nAnd having known that ye did not understand that I said to you [13 ] concerning the soul of Helias which is bound in Iohannes the baptist, I answered to you in the word in boldness of face with face, If ye are willing to receive (it) Iohannes the baptist, he is Helias, he whom I said that he cometh.\n\nAdded also Jesus in the word, said he, It happened therefore after these (things), by the command of the First Mystery I looked also down upon the World of the mankind I found Maria this whom they are wont to call my mother according to the body of the matter.\n\nI spake also with her according to the form of Gabriel, and she having turned herself unto the Height unto me I cast in unto her the first power that which I took from the Barbelo, [14 ] namely, the body which I wear in the Height and in the place (Coptic) of the soul I cast in unto her the power, that which I took from the great Sabaoth, the good, this who becometh in the Place of the Right (hand), and the twelve powers of the twelve Saviours of the Treasury of the Light, those which I took from the twelve Deacons which (are) in the Middle, I cast them unto the Sphere of the Rulers, and the Dekan of the Rulers with their Ministrants, they were thinking that souls they were of the Rulers, and brought them the Ministrants, I bound them in the body of your mother."

