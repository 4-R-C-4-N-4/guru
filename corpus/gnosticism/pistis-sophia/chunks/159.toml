[content]
body = "Then she is wont to take away that righteous soul and deliver her up to her Receivers and cast her unto the Aeons of the Sphere, that the Ministers of the Sphere may take her out unto water being underneath the Sphere, that it may become a smoke [353 ] boiling, that it may eat in at her until it should purify her entirely.\n\nAnd is wont to come Ialouham the Receiver of Sabaoth, the Adamas, this who is wont to give the cup of forgetfulness to the souls.\n\nAnd he is wont to bring the water of forgetfulness, and give it to the soul and she forgetteth every thing with every Place unto which she went.\n\nAfterwards is wont to come a Receiver of the little Sabaoth, the good, he of the Middle, he is wont to bring also a cup, full of the understanding and wiseness and with watchfulness in it, and giveth it to the soul, and they cast her unto a body, that she will not be able to sleep nor will she be able to forget, because of the cup of the watchfulness which they gave to her, but it will become beating her heart continually, seeking after the mysteries of the Light, [353 ] until she find them by the precept of the Virgin of the Light, and inherit the Light eternal (of-unto-age, MS ).\n\nSaid Mariham, Then a man having done every sin and every unlawfulness, having not found the mysteries of the Light is he about to receive all his punishments at one time?\n\nSaid Jesus, Yea, he is about to receive them.\n\nIf also those which he did (were) three he is about to receive three punishments.\n\nSaid Iohannes, Then a man having done every sin and every unlawfulness, but at the last he found the mysteries of the Light is it possible for him to be saved?\n\nSaid Jesus, This of this kind who did every sin and every unlawfulness, and found the mysteries of the Light, and did them and completed them, and did not cease, nor did sin, he is about to inherit the Treasury of the Light.\n\nSaid Jesus to his disciples, If should [354 ] the Sphere turn round and (if) Kronos with Ares should come behind the Virgin of the Light; and Zeus with the Aphrodite should come in the presence of the Virgin, being in their own Aeons, they are wont to draw (away) the veils of the Virgin; she is wont to become cheerful in that hour, seeing these two stars of light in her presence.\n\nAnd every soul which she will cast unto the cycle of the Aeons of the Sphere at that hour, for them 199 to come out unto the world, they are wont to become righteous and good, and they are wont to find the mysteries of the Light at this time.\n\n(Or if not) she is wont to dispatch them another time, that they may find the mysteries of the Light.\n\nIf Ares also with Kronos should come to the presence of the Virgin, Zeus with the Aphrodite beg behind her, not seeing them, every soul which she will cast [354 ] unto the creatures of the Sphere at that hour, they are wont to become evil and wrathful, and they are not wont to find the mysteries of the Light.\n\nThese therefore while Jesus is saying them to his disciples in the Middle of Amente, cried out, wept the disciples, Woe woe to the men the sinners, these upon whom the neglect lieth and the forgetfulness of the Rulers, until they come out of body and they take them unto these punishments.\n\nHave mercy on us, have mercy on us, the Son of him who is holy, and have compassion on us, that we should be saved from these punishments and these judgments, which are prepared for the sinners."

