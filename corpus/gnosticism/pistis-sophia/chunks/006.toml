[content]
body = "And when your time was finished they produced you in [14 ] the World, there not being soul of the Rulers in you; and ye took your part out of the power, this which breathed in unto the Confusion the last Helper, this (power) which is mixed with all the Invisibles with all the Rulers, with all the Aeons, once simply being mixed in the World of the corruption which is the Confusion: this (power) which I brought out of me from at first, I cast it in unto the First precept, and the First precept cast a part from it in unto the great Light, and the great Light cast a part from that which he received in unto the five Helpers, and the last Helper received a part from that which he received he cast it in unto the Confusion, [15 ] and it became in all (things) those which become in the Confusion, according as I have already said to you.\n\nThese therefore Jesus is saying to his disciples upon the mountain of the Olives.\n\nAdded Jesus also in the word with his disciples, Rejoice and be glad and add joy upon your joy because fulfilled were 8 the times for me to put on my vesture, this which was being prepared for me from at first, this which I left in the Last mystery even unto the time of its fulfilment.\n\nBut the time of its fulfilment is the time which they will command by the First mystery for me to speak with you from the beginning of the Truth even unto its end, and from the inward part [15 ] of the inward parts, because that the World will be delivered by you.\n\nRejoice therefore and be glad because ye are happy beyond all the men who (are) upon the earth, because ye are those who will deliver all the World.\n\nIt happened therefore, Jesus having finished saying these words unto his disciples, he added also in the word, said he to them, Behold therefore I wore my vesture, and they gave to me all authorities by the First Mystery.\n\nYet a little more time is, and I shall say unto you the mystery of the all with the Pleroma of the all; and I shall hide nothing from you from this hour, but in a fulfilment I shall fulfil you in every Pleroma and in every completion and in every mystery, namely the completion of all completions, and [16 ] the Pleroma of all the Pleromas and the knowledge of all the knowledges these which become in my vesture I shall say unto you all the mysteries from the outward part of the outward parts unto the inward part of the inward parts.\n\nNevertheless, hear, that I may say unto you everything which happened to me.\n\nIt happened therefore the sun having come up in the places (Coptic) of rising, (there) came down a great power of light, my vesture being in it, this which I left in the twenty-fourth Mystery according as I have already said to you now, and I found a mystery in my vesture, written in the sort of, the writing of the (things) of the Height zama zama ozza rakhama ozai , namely, its interpretation, The mystery which is outside of the World, this [16 ] because of which the Universe became.\n\nThis is with the whole (going) out the whole taking away up, this which distributed all the distributions with all those which are in them, and this because of which every mystery became and with all their Places.\n\nCome up even unto us, because we (are) thy fellow members, but we all (are) with thyself also, we (are) One of One and thou art One of One, that is the First Mystery which became from at first in the Ineffable before that he came forth, and the name of that (One) we all (are)."

