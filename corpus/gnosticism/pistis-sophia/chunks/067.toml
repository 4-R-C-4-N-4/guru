[content]
body = "But thou, thou shalt become having the authority to go up unto their twelve Aeons at the time which thou wishest, and also thou (wilt) return and come unto thy Place, this which is below the thirteenth Aeon, this in which thou art becoming now.\n\nBut thou wilt not have authority to go in unto the gate of the Height, this which becometh in the thirteenth Aeon, for thee to go in unto thy Place, this out of which thou camest.\n\nNevertheless therefore whenever should be fulfilled the three times, will oppress thee the Self-willed with all his Rulers, for them to take away thy light from thee, [157 ] he being angry with thee, thinking that thou, thou restrained his power in the Chaos, and he is thinking that thou, thou tookest away its light from it: he will be exasperated against thee, for him to take away thy light from thee, that he should send it unto the Chaos, and give it in unto his emanation which is there, that it should be able to come up from the Chaos and come unto his Place.\n\nBut these will begin the Adamas.\n\nBut I, I shall take away all thy powers from him and give them to thee.\n\nAnd I shall come and take them away.\n\nNow therefore whenever they should oppress thee at that time, hymn up unto the Light, and I, I shall not fail thee for to help thee.\n\nAnd I am coming (close) to thee quickly out of the Places which are below.\n\n[157 ] And I am coming down unto their Places and take away their light from them.\n\nI am coming unto this Place in which I put thee, this which is below the thirteenth Aeon, until I lead thee unto thy Place, this out of which thou camest.\n\nIt happened therefore, the Pistis Sophia having heard these words, I saying them to her, she rejoiced in great joy.\n\nBut I, I left her in the Place which is below the thirteenth Aeon.\n\nI went unto the light, I ceased from being with her.\n\nBut all these words was the First Mystery saying to the disciples, that they happened to the Pistis Sophia.\n\nAnd he was sitting 85 upon the hill of the Olives, saying all these words in the midst of the disciples.\n\nBut he added also, said he to them, But it happened also [158 ] after all these (things) while I am being in the World of the mankind, sitting by the road which is this Place, which is the mountain of the Olives, before that they dispatched my vesture, this which I left in the twenty-fourth Mystery (reckoning) from within, but the First itself it is (reckoning) from without, this which is that, the great Uncontainable, this in which I shone, and before that I went unto the Height to receive my other two vestures: sitting by you in this Place, namely, the mountain of the Olives, was fulfilled the time which I said to the Pistis Sophia, Will oppress thee the Adamas with all his Rulers.\n\nIt happened therefore, having happened that [158 ] time, but I, I was becoming in the World of the mankind, sitting by you in this place which is the mountain of the Olives, looked the Adamas out of the twelve Aeons, he looked down unto the Place of the Chaos, he saw his power demonic which (is) in the Chaos, in which there is not light at all, because I had taken away its light from it: and he saw it being darkness, and it was not possible to come unto his Place which is the twelve Aeons.\n\nRemembered also the Adamas (about) the Pistis Sophia, and he was angry with her greatly greatly, thinking that it (is) she who restrained his power in the Chaos."

