[content]
body = "And the Self-willed dispatched out of the Height in the thirteenth Aeon, he dispatched another great power of light, it came down unto the Chaos as an [125 ] arrow flying, that he should help his emanations, and take away the lights of the Pistis Sophia another time.\n\nAnd having come down that power of light, the emanations of the Self-willed, these which become in the Chaos, which afflicted the Pistis Sophia, they were confident of heart greatly, and again they persecuted the Pistis Sophia with great fear and in a great disturbance; and they afflicted her some among the emanations of the Self-willed, one indeed among them changed himself unto a form of great serpent, another also changed himself unto a form of serpent of basilisk having seven heads: another also changed himself unto a form of dragon, and also the first [125 ] power of the Self-willed which is of face of lion, and also all his emanations which are many greatly came together they oppressed the Pistis Sophia, and also they brought her into the Places which are below (of) the Chaos, and also they disturbed her greatly.\n\nIt happened therefore, they having disturbed her, she ran from them, she came unto the Places which (are) of the upper part of the Chaos, and ran after her the emanations of the Self-willed, they disturbed her greatly.\n\nIt happened therefore after these (things), looked out of the twelve Aeons the Adamas the tyrant, this (one) also was being angry with the Pistis Sophia, because that she was wishing to go unto the Light of the Lights, this who was being above all of them: [126 ] because of this he was angry with her.\n\nIt happened therefore, the Adamas the tyrant having looked out of the twelve Aeons, he saw the emanations of the Self-willed oppressing the Pistis Sophia, until they take away all the lights in her.\n\nBut it happened the power of the Adamas having come down unto the Chaos (close) to all the emanations of the Self-willed, it happened therefore, that demon having come down unto the Chaos he thrust the Pistis Sophia down, and the power of face of lion, with the face of serpent, and with the face of basilisk serpent, and with the face of dragon, and with all the other emanations of the Self-willed which are [126 ] many greatly, they all surrounded the Pistis Sophia, wishing to take away her powers which (are) in her another time.\n\nAnd they oppressed the Pistis Sophia greatly, and they threatened her.\n\nIt happened therefore, they having oppressed her and having 69 disturbed her greatly, she cried again up towards the Light and she hymned saying, O Light thou (art) he who helped me: let thy light come upon me, because thou art my accepter, and I am coming (close) to thee, O Light.\n\nI am believing thee, O Light, because thou art my deliverer of me from the emanations of the Self-willed and with the Adamas the tyrant; and thou (art) he who delivereth me from all his [127 ] threats which are cruel.\n\nBut these having said the Pistis Sophia, then also by the command of my Father the First Mystery which looked inward, I sent also Gabriel with Mikhael with the ten (?) great effluences of Light, that they should help the Pistis Sophia.\n\nAnd I ordered unto Gabriel with Mikhael, that they should take away the Pistis Sophia upon their hands, that her feet should not touch the darkness below: and also I ordered unto them for to steer her from the Places of the Chaos, into those which they are about to bring her."

