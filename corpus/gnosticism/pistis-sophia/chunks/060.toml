[content]
body = "Thy right (hand) is that which exalted me, and thou tookest the weakness [139 ] away from me, I became prevailing in thy truthfulness, being cleansed in thy righteousness.\n\nWere distant away from me those who fight against me.\n\nAnd I was justified in thy kindness, because thy rest becometh ever unto age of the age.\n\nThis therefore, O my Lord, is the explanation of the repentance which said the Pistis Sophia, having been delivered from the Chaos.\n\nHear therefore, that I may say in boldness.\n\nThe word therefore which thy power of light said by Solomon, I was delivered out of the bonds I ran (close) to thee, O Lord.\n\nThat is the word which said the Pistis Sophia, I was loosened from the bonds of the darkness, I came (close) to thee, O Light.\n\n[140 ] And the word which said thy power, Thou becamest to me on (the) right, thou art delivering me and thou art helping me.\n\nThat also is the word which said the Pistis Sophia, Thou becamest light on every part of me, and thou art helping me.\n\nAnd the word which thy power of light said, Thou preventedst those who fight against me, and they were not manifested.\n\nThat is the word which said the Pistis Sophia.\n\nAnd the emanations of the Self-willed, these which fight against me, thou preventedst them by thy light, and they were not able to approach in unto me.\n\nAnd the word which thy power said, Thy face was becoming with me in thy grace.\n\nThat is the word which said [140 ] the Pistis Sophia.\n\nThy light was becoming with me delivering me by thy effluence of Light.\n\nAnd the 76 word which thy power said, I was insulted before a multitude and they cast me out.\n\nThat is the word which said the Pistis Sophia.\n\nOppressed me the emanations of the Self-willed.\n\nAnd they took away my power from me, and I was despised with them.\n\nAnd they cast me out in the Chaos there being not light in me.\n\nAnd the word which thy power of light said, I became as lead before them.\n\nThat is the word which said the Pistis Sophia, they having taken away my light from me I became as matter being heavy with them [141 ].\n\nAnd the word also which thy power said, And became to me a power from thee, helping me.\n\nThat also is the word which said the Pistis Sophia, And after these (things) a power of light came to me from thee, delivering me.\n\nAnd the word which thy power said, Thou puttest torches on the right of me and on the left of me, that not anything about me should become being lightless.\n\nThat is the word which said the Pistis Sophia, Thy power made light on right of me and left of me and (was) surrounding me on every part, that not anything about me should become lightless.\n\nAnd the word which thy power said, Thou shelteredst me [141 ] in the shadow of thy mercy.\n\nThat also is the word which said the Pistis Sophia.\n\nAnd thou coveredst over me with the light of thy effluence.\n\nAnd the word which thy power said, I became above the coats of skin.\n\nThat also is the word which said the Pistis Sophia, And they purged away from me all my matters evil.\n\nAnd I was exalted above them through thy light.\n\nAnd the word which thy power said by Solomon, Thy right (hand) is that which exalted me, and it took the weakness away from me.\n\nThat is the word which said the Pistis Sophia, And thine effluence of Light, that is that which exalted me by thy light, and it took away from me the emanations of Self-willed [142 ], these which were afflicting me."

