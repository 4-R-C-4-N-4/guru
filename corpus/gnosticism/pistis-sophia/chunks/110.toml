[content]
body = "But if yet in a time of repentance they should renounce [252 ] all the World, with all the 138 matter which is in it, with all the sins of the world, and they (are they) who become in all the subjection to the mysteries of the Light, not any Mystery heard them, nor have they forgiven their sins except by the one mystery of the Ineffable, this which is wont to be merciful to every one and forgiveth the sins of every one.\n\nIt happened, Jesus having finished saying these words unto his disciples, worshipped Maria unto the feet of Jesus, she kissed them said she, Maria, My Lord suffer me seeking from thee, and be not angry with me.\n\nAnswered the Saviour, said he to Maria, Seek after that which thou wishest to seek after, and I shall reveal it to thee boldly.\n\nBut answered Mariham, said she, My Lord, [252 ] then if a brother good (agathos) and who is good (coptic word), we having filled him with all mysteries of the Light, and that brother having a brother or a kinsman, in one word, being a man anyhow, and this (one) being a sinner and being impious, or otherwise, he being not a sinner, and this one of this kind came out of the body, and the heart of the brother good, being pained and being grieved for him because he becometh in judgments with punishments.\n\nNow therefore, my Lord, what is that which we shall do until they remove him out of the punishments with the judgments which (are) cruel?\n\nBut answered the Saviour, said he to Maria, Because of this word therefore I said unto you at another time, but hear therefore that I may say in answer that ye may become, [253 ] (that) ye should fulfil every mystery, that they should call of [against] you, Those who are completed with every mystery.\n\nNow therefore every man sinner, or otherwise being not sinners, not only that whenever ye should wish for them to take them from the judgments with the punishments which (are) cruel, but (also) for them to remove them unto a righteous body, this which will find the mysteries of the Godhead, and go unto the Height and inherit the kingdom of the Light, do the third mystery of the Ineffable and say ye, Take away the soul of these manhoods, this (man) which we think of in our heart, take him out of every punishment of the Rulers, and hasten quickly, and take it (close) to the Virgin of the Light: and in the same month, the Virgin of the Light (will) seal [253 ] him with a seal more excellent, and in the same month, let the Virgin of the Light cast him unto a body about to become righteous and become good, and he (will) go unto the Height and inherit the kingdom of the Light.\n\nBut these whenever ye should say them, Amen I say unto you, They are wont to hasten all those who work in all the array of the judgments of the Rulers, and give that soul unto hands 139 of one another, even until they take it up to the Virgin of the Light, and the Virgin of the Light is wont to seal it with a sign of the kingdom of the Ineffable, and is wont to give it to her Receivers, and the Receivers to cast it unto a body being about to be righteous, and he being about to find the mysteries of the Light and become good, and go unto the Height [254 ] and inherit the kingdom of the Light.\n\nBehold, this is (that) which ye ask me of."

