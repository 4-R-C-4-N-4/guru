[content]
body = "It happened therefore, having afflicted her all the material emanations of the Self-Willed, she cried out, saying the fifth Repentance, saying: O Light of my salvation, I hymn unto thee in the Place of the Height, and also [63 ] in the Chaos.\n\nI shall hymn unto thee in my hymn.\n\nI hymned unto thee in the Height, and that in which I hymned unto thee while I am being in the Chaos, let it come before thy face; and take heed, O Light, unto my repentance, because my power was full of darkness and my light came down unto the Chaos.\n\nI became also as the Ruler of the Chaos, those who are going unto the darkness below.\n\nI became as a material body which has not him who will deliver him in the Height.\n\nI became also as (things of) matter from which they took away their power, casting in the Chaos these which thou didst not deliver, and they perished by thy precept.\n\nNow therefore, they put me in the darkness (M) below, in darknesses and in (things of) matter being dead, and there being not power in them.\n\nThou broughtest thy precept upon me, and with every [64 ] thing which thou orderest: and thy spirit ran (away), it left me, and also through thy precept helped me not the emanations of my Aeon, and they hated me and they ceased from me; and also I perished, not for ever; and my light was diminished in me: and I cried up unto the Light in all the light which is in me, and I spread my hands up unto thee.\n\nNow therefore, O Light, wilt thou not complete thy precept in the Chaos?\n\nAnd the deliverers those who are coming according to thy precept, will they not 35 arise in the darkness and come and be disciples to thee?\n\nWill they not say the mystery of thy name in the Chaos (or otherwise rather will they say thy name in a matter of Chaos) this in which thou wilt not purify?\n\nBut I [64 ] hymned up unto thee, O Light and my repentance will attain thee up unto the Height.\n\nLet thy Light come upon me, because they took away my light from me.\n\nAnd I became in tribulations because of the light, since the time (in) which they emanated me.\n\nAnd I having looked at the Height unto the light, I looked down unto the power of light which (is) in the Chaos.\n\nI arose I came down: thy precept came upon me, and the fears which thou orderedst unto me disturbed me, and they surrounded me being numerous as water, they laid hold on me together in all my time: and by thy precept thou didst not let my fellow emanations to help me, and thou didst not let my partner to deliver me out of my afflictions.\n\nThis [65 ] therefore is the fifth repentance which said the Pistis Sophia in the Chaos, they having finished afflicting her, all the material emanations of the Self-willed.\n\nThese therefore, while Jesus is saying unto his disciples said he to them, He who hath ear to hear let him hear, and he whose spirit is bubbling in him, let him come forward and say the explanation of the meaning of the fifth repentance of the Pistis Sophia."

