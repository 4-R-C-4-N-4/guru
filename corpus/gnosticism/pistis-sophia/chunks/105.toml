[content]
body = "[242 ] And they are not wont to take it out of the Aeons, that the Rulers of their Aeon should not take it away in the firmaments, but they are wont to take it through the road of the light of the sun and take it up (close) to the Virgin of the Light, until she should prove it and find it free from sin, and she is not wont to cause them to take it unto the Light, because the sign of the kingdom of the Mystery is not becoming with it, but she is wont to seal it in a seal which is excellent, and cause them to cast it unto the body among the Aeons of the righteousness: this body which is about to become good, and find the sign of the mysteries of the Light and inherit the kingdom of the Light unto age.\n\nIf that (one) sinneth once or twice or thrice, this, also, they will reject unto the World according to the type of the sins which he did, these of which I shall say their types unto you, [242 ] whenever I should finish saying unto you the Distribution of the Universe.\n\nBut Amen, amen I say unto you, Even if a man (is) righteous having not done any sin at all, it is impossible for them to take him unto the kingdom of the Light, because that the sign of the kingdom, of the mysteries is not becoming with him, in one word, it is impossible to take the soul unto the Light without the mysteries of the kingdom of the Light.\n\nIt happened therefore, Jesus having finished saying these words unto his disciples, came forward Iohannes, said he, My Lord, then if a man, sinner, lawbreaker, being complete in every unlawfulness; and he ceased from all of them, because of the kingdom of the heavens, and he renounced all the World with all its matter which (is) in it; and we give to him from the beginning the mysteries [243 ] of the Light, these which (are) in the first Space from without (the outward part, MS ); and whenever he should receive the mysteries, after a little more time he turned and transgressed, and also after these he turned and ceased from every sin; and he turned and renounced all the World with all the matter which is in it, and cometh also, and becometh in a great repentance; and we know in truth that he wisheth for God; and we give to him the second mystery of the first Space, these which are on the outward 133 part: likewise also again he turned and transgressed, and became also in the sins of the World; and also after these he turned and ceased from the sins of the World, and further he renounced all the World with all the matter which is in it; and further he became in a great repentance; and we knew in an exactness, and [243 ] not being hypocritical; and we turned and gave to him the mysteries of the beginning, these (which) become in the first Space from without (the outward part, MS ).\n\nLikewise also he turned and sinned and became in every type (type type, MS ), wishest thou for us to forgive him until as far as seven times, and we (should) give to him the mysteries, these which are in the first Space from within (the inward part, MS ) until as far as seven times, or otherwise."

