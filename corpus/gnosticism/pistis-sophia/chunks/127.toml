[content]
body = "These therefore having said them the Saviour, sprang up forward Maria, said she, My Lord, there is ear of my Light-dweller, and I understood all the word which thou saidst: concerning this word therefore which thou saidst unto us once in a parable [284 ], The servant who knew the wish of his lord and prepared not, nor did the wish of his lord, he will receive great stripes, but he who knew not and did not, he will be worthy of little (stripes): because every one to whom they entrusted more they will seek after more from him, and unto whom they committed many (things) they will require of him many, namely, my Lord, he who knoweth the Deity and he found the mystery of the Light, (and) he transgressed, they will punish him in a great judgment more than him who knew not the Godhead.\n\nThis my Lord is the explanation of the word.\n\nAdded also Maria, said she to the Saviour, My Lord, if the faith with the mysteries come to manifestation, now therefore whenever souls, whenever they should come unto the world for many of cycles, and they neglect to [285 ] receive mystery, trusting that whenever they should come unto the 159 world for another cycle they will receive them, then indeed do they not run risk of not attaining to receive the mysteries?\n\nAnswered the Saviour, said he to his disciples, Preach to all the world, saying to the men, strive that ye receive the mysteries of the Light at this time which is troublous and go in unto the kingdom of the Light.\n\nDo not cast a day in unto a day or a cycle in unto a cycle, and trust that ye attain unto receiving the mysteries, whenever we should come unto the world for another cycle: and these know not when is about to become the number of the perfect souls, for whenever should become the number of the perfect souls I shall shut therefore the gate of the Light.\n\nAnd there is not any (who) will go in from this hour, nor is there any (who) cometh out afterwards.\n\n[285 ] Because that was completed the number of the perfect souls, and was completed the mystery of the First Mystery, this because of which the Universe became, which is I, that Mystery.\n\nAnd from this hour there is not any (who) will go in unto the Light, and there is not any who will be able to come out: because in the completion of the time of the number of the perfect souls, before that I put forth the fire unto the World for to purify the Aeons with the veils with the firmaments with all the earth all the other matter which (is) upon it, yet also are becoming the mankind.\n\nIn that time therefore will be more manifested the faith with the mysteries in those days: and there are many souls coming by the cycle of the change of the body, and they are coming unto the World, some of them being in this present [286 ] time, having heard me teaching: in the completion of the number of the perfect souls they will find the mysteries of the Light and receive them: and they (will) come up to the gate of the Light and find it, having been completed the number of the perfect souls, namely, the completion of the First Mystery, and that is the knowing of the Universe.\n\nAnd they will find it, I having shut up the gate of the Light.\n\nAnd it is not possible for any to come in, or for any to come out from this hour.\n\nThese souls therefore will knock in unto the gate of the Light, saying, Lord open to us.\n\nI shall answer that I may say to them, I know you not whence ye are.\n\nAnd they will say to me, We received out of thy mysteries, and we completed all thy teaching, and thou [286 ] taughtest to us in the highways."

