[content]
body = "He who filled thee with light being purified; and thy beginning will become new as an Invisible of the Height.\n\nThese words the Pistis having hymned (with) them, because she was delivered, and remembering all the things which I gave to her: it happened therefore, the First Mystery having finished uttering these words unto the disciples, said he to them, He who understandeth the explanation of these words, let him come forward, and say them in boldness.\n\n82 [152 ] Came again forward Maria, said she, My Lord, concerning these words with which hymned the Pistis Sophia, thy power of light prophesied them by David, My soul, bless the Lord, all those which (are) in my inward part bless his name which is holy.\n\nMy soul, bless the Lord and forget not all his recompenses: he who forgiveth all thy unlawfulness; he who healeth all thy sicknesses.\n\nHe who redeemeth thy life out of the destruction.\n\nHe who giveth a crown of mercy upon thy head and (of) compassion.\n\nHe who satiateth thy wish with good; thy youth (he) will make new as that of an eagle, namely, that the Sophia will become as the Invisibles which are at the Height: [152 ] having said therefore, As an eagle, because that the dwelling of the eagles is being in the height, and the Invisibles (are) also in the Height, namely, that the Sophia will become light as the Invisibles, as she was from her beginning.\n\nIt happened therefore, the First Mystery having heard these words, saying them Maria, said he, Well (done), O Maria the happy.\n\nIt happened therefore after these things added also in the word the First Mystery, said he to the disciples, I took away the Pistis Sophia, I brought her up unto a Place being below the thirteenth Aeon, and I gave to her a new mystery of the light which is not that of her Aeon, the Place of the Invisibles.\n\nAnd also I gave [153 ] to her a hymn of the light, that should not be able to prevail against her from this hour the Rulers of the Aeons.\n\nAnd I put her in that Place, until I come for her and take her unto her Place which is at the Height.\n\nIt happened therefore, I having put her in that Place, she said also this hymn saying thus, In faith I believed the Light, and he remembered me, he heard my hymn: he brought my power up from the Chaos with the darkness below of all the matter.\n\nAnd he brought me up, he put me in an Aeon being exalted, and being firm.\n\nHe put me on the road which goeth unto my Place, and he gave to me a new mystery which not my Aeon is, and he gave to me [153 ] a hymn of the light.\n\nNow therefore, O Light, all the Rulers will see the (things) which thou diddest with me, and they (will) fear, and they (will) believe the Light.\n\nThis hymn therefore said the Pistis Sophia, rejoicing because they brought her up from the Chaos.\n\nAnd they brought her unto the Place which (is) below the thirteenth Aeon.\n\nNow therefore he whose mind moveth him, understanding the explanation of the meaning of the hymn, that which said the Pistis Sophia, let him come forward and say it.\n\nCame forward Andreas, said he, My Lord, this is that which thy power of light prophesied about it once by David: In patience I had 83 patience with the Lord, [154 ] he gave heed unto me, and he heard my supplication."

