[content]
body = "Said Bartholomaios, A man who sleeper with male, What is his punishment?\n\nSaid he, Jesus: The man sleeping with male with the man who will sleep with him (there shall be the same measure) [351 ] as the man blasphemer: whenever the 197 time therefore should be completed by the Sphere, are wont to come after their souls the Receivers of Ialdabaoth that he may punish them with his forty nine demons for eleven (added in margin) years.\n\nAfter these (things) they are wont to take them out unto rivers of smoke with seas of pitch boiling, full of demons of face of swine, they are wont to eat in at them and punish them in the rivers of smoke for other eleven years.\n\nAfter these (things) they are wont to take them out in the Darkness which is outer, until the day of the judgment (in) which they will Judge the great Darkness, they are wont to be dissolved and perish.\n\nSaid Thomas, We heard that there are some upon the earth who are wont to take away the sperma of the males with the menstruum [351 ] of the woman and give them unto a (mess of) lentil and eat it, while they say, We are believing Esau with Iakob.\n\nIs it a thing which is right or otherwise?\n\nBut Jesus was angry with the World at that hour, and said he to Thomas, Amen I say that every sin and every unlawfulness—this sin surpasseth them—these of this kind.\n\nThey are about to take them immediately unto the Darkness which is outer, nor shall they throw them back unto the Sphere again.\n\nBut they are not about to be wasted away and destroy them in the Darkness which is outer, the place in which there is not mercy nor is there light, but the weeping is, and the gnashing of the teeth is (there).\n\nAnd every soul which they will take unto the Darkness which is outer, they are not wont to throw them back again, but they are wont to perish and be dissolved.\n\nAnswered Iohannes, Then a man [352 ] having not done sin but being become good continually, but having not found thy mysteries for him to pass through the Rulers, whenever he should come out of body, what will they do to him?\n\nSaid Jesus, The man of this kind whenever should his time be completed by the Sphere, are wont to come after his soul the Receivers of Bainkhoookh, being one among the Triple-powered Gods, that they may take his soul in a joy with a gladness, and spend three days going round with her teaching her the creatures of the World in joy with gladness.\n\nAfter these (things) they are wont to take her down unto Amente and teach her the punishment-places, those which (are) in Amente, but they would not be about to punish her in them, but they are about to teach her only of them.\n\nAnd the steam of the flame of the punishments [352 ] is wont to become touching her only a little.\n\nAfter these (things) they take her away up on the road of the Middle, and teach her the punishments of the roads of the Middle, while the steam of the flame toucheth her a 198 little.\n\nAnd after these (things) they take her to the Virgin of the Light, that she may judge her before the little Sabaoth the good, he of the Middle, until the Sphere should turn round, that Zeus with Aphrodite may come in the presence of the Virgin of the Light, that the Kronos with Ares may come behind her."

