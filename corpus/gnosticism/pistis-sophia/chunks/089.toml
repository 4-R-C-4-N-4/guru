[content]
body = "And that Mystery indeed is that which knoweth because of what despoiled himself [208 ] the first Triple spirit from below this, which belongeth to the arrays of the Only One, the Ineffable, and because of what they proceeded out of the second Triple spirit.\n\nAnd that Mystery indeed is that which knoweth because of what despoiled himself the third Triple spirit, namely, the first Triple spirit from the Height, and because of what he proceeded out of the twelfth Triple spirit, this which (is) the last Place of the Fatherless (ones).\n\nAnd that Mystery indeed is that which knoweth because of what were distributed all the Places, which (are) in the Space of the Ineffable, and with those who are in them all, and because of what they proceeded out of the last member [209 ] of the 113 Ineffable One.\n\nAnd that Mystery indeed is that which knoweth his own self, because of what he despoiled himself, for him to proceed out of the Ineffable who is he who ruleth over all of them, and it is he who distributed all of them according to their arrays.\n\nThese therefore all I shall say unto you in the Distribution of the Universe, in one word, all the (things) which I said unto you, those which will happen, with those which will come, these which emanate and which proceed, and with those which (are) outside of them, and with those which are implanted in them, these which will contain the Place (coptic) of the First Mystery, and with those which (are) in the Space of the Ineffable, these which I shall say unto you, because that I shall reveal them to you, and I shall say them unto [209 ] you according to Places and according to arrays in the Distribution of the Universe.\n\nAnd I shall reveal to you all their mysteries which rule over them all, with their pre-triple spirits, with their hyper-triple spirits, these which rule over their mysteries with their arrays.\n\nNow therefore the Mystery of the Ineffable is he who knoweth because of what all these became, of those which I said, and in boldness, because of which all these became.\n\nAnd he is the Mystery which (is) in all these, and he is all their coming out, and he is all their catching up, and he is all their setting up.\n\nAnd the Mystery of the Ineffable, he is the Mystery which is in all these, which I said unto [210 ] you, and with those which I shall say unto you in the Distribution of the Universe, and he is the Mystery which is in all these: and he is the only Mystery of the Ineffable, and the knowledge of all these (things) which I said to you, and with those which I shall say unto you: with those which I said not unto you, all these I shall say unto you in the Distribution of the Universe, with all their knowledge one upon another, because of what they became.\n\nThat is the one word of the Ineffable.\n\nAnd I shall say unto you the Distribution of all their mysteries, with the type of each of them, with the manner of their completing in all their figures, and I shall say unto you the mystery of the Only One [210 ], the Ineffable, with all its (his, MS thus again) types, with all its figures; and with all its arrangements, because of what indeed it proceeded out of the last limb of the Ineffable, because that mystery is all their setting up.\n\nAnd that mystery of the Ineffable is also (the) one only word which also becometh in the language of the Ineffable, and that is the arrangement of the explanation of every word which I said unto you."

