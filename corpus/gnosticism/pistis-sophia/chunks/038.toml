[content]
body = "Let them not rejoice at me, those who are enemies unto me in violence, those who hate me without a cause, and they are winking with their eyes.\n\nBecause I indeed, they are wont to speak with me in words of peace, and they are [87 ] wont to think in anger in guiles.\n\nThey widened their mouth upon me, and they said, Well (done) our eyes were full of sight of him.\n\nThou sawest, O Lord.\n\nBe not silent, O Lord, withdraw not thee from me.\n\nArise, O Lord, and give heed unto my judgment.\n\nGive heed unto my avenging, my God and my Lord.\n\nJudge me, O Lord, according to my righteousness: let them not rejoice at me, my God, nor let them say, Well (done), our soul!\n\nLet them not say, We swallowed him (up).\n\nLet them be ashamed and be disgraced together, those who rejoice over my evil.\n\nLet them clothe them with shame with disgrace, those who say great words against me.\n\nLet them be glad and be joyful, those who wish my righteousness [88 ] and let them say, Let the Lord be great and be exalted.\n\nLet them be exalted, those who wish the peace of his servant.\n\nMy tongue will be glad for thy righteousness with thy honour in all the day.\n\nThese therefore having said them Iakobos, said he Jesus, Well (and) fairly (done), Iakobos: this is the explanation of the ninth repentance of the Pistis Sophia.\n\nAmen, amen I say to you, Ye will be first in unto the kingdom of the heavens before all the Invisibles with all the Gods with all the Rulers, these which become in the thirteenth Aeon and in the twelve Aeons.\n\nBut ye, not ye alone, [88 ] but every one also who will do my mysteries.\n\nBut these having said them, said he to them, Understand ye in what manner I am speaking with you?\n\nSprang up again Mariham, said she, Yea, O Lord, This is that which thou saidst to us once, The last (ones) will be first, and the first (will) be last.\n\nThe first (ones) therefore (are those) whom they fashioned before us, the Invisibles.\n\nSince they it is, who became before the mankind, they with the Rulers, and the men who will receive mysteries, will be first (before) them in unto the kingdom of the heavens.\n\nSaid he to her Jesus, Well (done), Mariham.\n\nAdded also Jesus, said he to his disciples, It happened therefore, she having uttered [89 ] the ninth repentance the Pistis Sophia, oppressed her again the power of face of lion, wishing to take away every power from her.\n\nShe cried also up unto the Light, saying, O Light, whom I believed from at first, because of whom I suffered these great tribulations, help me.\n\n49 And they accepted from her her repentance at that hour: heard her the First Mystery and they dispatched me by his command, I came to help her, I brought her up from the Chaos, because she repented, and also because that she believed the Light, she suffered these great tribulations with these great dangers, (she was deceived) by the Self-willed God, and she was not deceived by any work except [89 ] by a power of light, because of the likeness to the light which she believed.\n\nBecause of this therefore they dispatched me by the command of the First Mystery for me to help her in concealment: but that I should not yet come unto the Place of the Aeons altogether."

