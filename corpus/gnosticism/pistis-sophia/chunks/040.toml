[content]
body = "Its thought is taking away the light from me at every time; and as iron they are cutting, [92 ] they took away a power from me.\n\nI loved to come down unto the Chaos, more than to remain in the Place of the thirteenth Aeon the Place of the righteousness; and they wished to take me by guile, for to swallow down all my light.\n\nBecause of this therefore the Light will take away all their light, and (will) be overthrown all their other matter and it will take away their light, and not let them dwell in the thirteenth Aeon their place of dwelling, and not leave their name in the Place of those who will live: and will see the (things) which happened to thee O power of face of lion, the twenty-four emanations, and they (will) fear and not be disobedient, but they (will) give up the purgation of their light, and they will see thee, and (will) rejoice over thee, and (will) say, Behold, an emanation [92 ] which did not give up the purgation of its light, that it should be delivered, but it boasteth itself in the multitude of the light of its power, because that it did not emanate out of the power which is in it, and it said, I shall take away the light of the Pistis Sophia, this which they will not take from her.\n\nNow therefore he whose power was exalted in 51 him let him come forward and utter the explanation of the eleventh repentance of the Pistis Sophia.\n\nThen came forward Salome, said she, My Lord, concerning this thy power of light prophesied once by David, saying in the fiftieth with one psalm, Why doth the powerful boast himself in his wickedness?\n\nThy tongue meditateth the violence all the day; as a razor [93 ] being sharp thou didst beguile.\n\nThou lovedst the evil more than the good.\n\nThou lovedst the violence more than speaking of the righteousness.\n\nThou lovedst all the words of the deceit with a tongue of guile.\n\nBecause of this God will overthrow thee for ever, he will pluck thee up, and he (will) drag thee out of thy abode: and he will tear (away) thy root, and he (will) cast it outside of those who live.\n\nDiapsalma.\n\nThe righteous will see and they (will) fear and they will mock at him and they (will) say, Behold a man who put not God to him for helper.\n\nBut he trusted upon his wealth which is much, and he presumed upon his vanity.\n\nBut I, I am being as a tree of olive yielder of fruit in the house of the God, I trusted unto the mercy of God even unto age of the age.\n\n[93 ] And I shall manifest to thee because thou workedst with me, and I have patience upon thy name because kind it is in presence of thy holy (ones).\n\nThis therefore now, my Lord, is the explanation of the eleventh repentance of the Pistis Sophia, thy power of light having moved me, I said it according to thy wish.\n\nIt happened therefore, Jesus having heard these words which said them Salome, said he, Well (done) Salome.\n\nAmen, amen I say to you, I shall complete you in every mystery of the kingdom of the light.\n\nBut added also Jesus in the word, said he to his disciples, It happened therefore after these (things) I drew near unto the Chaos enlightening greatly greatly, that I should take away the light of that power of face of lion: while I am enlightening [94 ] greatly, it (she MS."

