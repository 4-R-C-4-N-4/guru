[content]
body = "Answered the Saviour, said he to Petros, Well (said), Petros, this is the explanation of her repentance.\n\nYe are happy (ones) beyond every man who is upon the earth, because [56 ] I revealed unto you these mysteries.\n\nVerily verily I say to you, I shall complete you with every Pleroma from the mysteries of the inward part even unto the mysteries of the outward part; and I shall fill you with the spirit, that they should call you the spiritual (ones), completed with every Pleroma.\n\nAnd verily verily I say to you, that I shall give to you all the mysteries of all the Places of my Father, and of all the Places of the First Mystery, that that which ye will accept upon the earth, they shall accept unto the Light of the Height, and they whom ye will reject upon the earth, they will reject in the kingdom of my Father which is in the heavens.\n\nNevertheless therefore hear and listen [57 ] unto all the repentances, these which said the Pistis Sophia.\n\nShe added also, she said the third Repentance, saying, O Light of the powers, take heed and deliver me: let them be diminished and be in the darkness, these who wish to take away my light in me.\n\nLet them turn them unto the Chaos and be 31 ashamed, those who wish to take away my power.\n\nLet them turn them unto the darkness quickly, these who afflict me, who say, We are lords over her.\n\nLet them rejoice indeed and be cheerful, every one who seeketh for the Light, and let them say in every time, Let the Mystery be exalted, those who wish (for) thy mystery.\n\nMe therefore now, O Light, deliver me, because I diminished (in) my light which they took away, and I am [57 ] lacking in my power which they took away from me.\n\nThou therefore, O Light, thou art my Saviour and thou art my deliverer, O Light, Hasten and deliver me from this Chaos.\n\nBut it happened, Jesus having finished saying these words unto his disciples, saying, This is the third repentance which said the Pistis Sophia: said he to them, He in whom was exalted the spirit of perception, let him come forward and say the meaning of the repentance which said the Pistis Sophia.\n\nIt happened therefore, before that finished speaking Jesus, came forward Martha, she prostrated at his feet, she kissed them, she cried out, she wept in a cry, and in humility saying My Lord have mercy on me and pity me, and let me [58 ] say the explanation of the repentance which said the Pistis Sophia.\n\nAnd Jesus helped Martha, he said he to her, Happy is every man who is wont to humble himself, because he is he on whom they will have mercy.\n\nNow therefore Martha thou art happy.\n\nNevertheless therefore utter the explanation of the meaning of the repentance of the Pistis Sophia.\n\nBut answered Martha, said she to Jesus in the midst of the disciples, Concerning the repentance which said, O my Lord Jesus, the Pistis Sophia, prophesied once thy power of Light which (is) in David in the sixty-ninth psalm saying, O Lord God take heed unto my help.\n\nLet them [58 ] be ashamed and disgraced, those who seek after my soul.\n\nLet them turn them henceforth and be ashamed, those who say to me, Well (done).\n\nWell (done)!\n\nLet them be glad and delighted over me, every one who seeketh after thee, and say at every time, Let God be exalted, even those who love thy salvation.\n\nBut I am poor I am miserable, O Lord help me.\n\nThou art my helper and my trust, O Lord, tarry not."

