[content]
body = "And that Mystery indeed is that which knoweth because of what despoiled himself him the great Light of the Lights, and because of what he (they, MS ) proceeded out of the Fatherless (ones), and that Mystery indeed is that which knoweth because of what despoiled himself the First precept, and because of what he separated the seven Mysteries, and because of what also they called it (him, MS ), the First [204 ] precept.\n\nAnd because of what he (they, MS ) proceeded out of the Fatherless (ones).\n\nAnd that Mystery indeed is that which knoweth because of what despoiled himself the great Light of the Marks of Light, and because of what he stood (up) without emanation, and because of what he (they, MS ) proceeded out of the Fatherless (ones).\n\nAnd that Mystery indeed is that which knoweth because of what despoiled himself the First Mystery, namely, the twenty-fourth Mystery (reckoning) outward, and because of what he counterfeits within him the twelve Mysteries according to the number of the numbering of the Boundless Uncontainable (ones), and because of what he proceeded out of the Fatherless (ones).\n\nAnd that Mystery indeed is that which knoweth because of what despoiled themselves the twelve [204 ] Immoveable (ones), and because of what indeed they set them up with all their arrays, and because of what they proceeded out of the Fatherless (ones).\n\nAnd that Mystery indeed is that which knoweth because of what despoiled themselves the Unshakeable (ones), and because of what they set them up divided unto twelve arrays, and because of what they proceeded out of the Fatherless (ones) these which belong unto (the) arrays of the Space of the Ineffable.\n\nAnd that Mystery indeed is that which knoweth because of what they despoiled them the Inconceivable (ones) which belong (to) the second (two, MS ) Space of the Ineffable, and because of what they proceeded out of the Fatherless (ones).\n\nAnd that Mystery indeed is that which knoweth because of what despoiled [205 ] themselves the twelve Undesignated (ones), and because of what they set them up after all their arrays of the Unrevealed (ones), namely also, some Uncontainable (ones) of the Boundless (ones), and because of what indeed they proceeded out of the Fatherless (ones).\n\nAnd that Mystery indeed is that which knoweth because of what despoiled themselves the Unrevealed (ones) these which did not reveal themselves, nor brought they them unto that which manifesteth according to the arrangement of the Only One, the Ineffable, and because of what they proceeded out of the Fatherless (ones).\n\nAnd that Mystery 111 indeed is that which knoweth because of what despoiled themselves the Most profound (ones), and because of what they distributed them being one only array, and because of what they [205 ] proceeded out of the Fatherless (ones).\n\nAnd that Mystery indeed is that which knoweth because of what despoiled themselves the twelve arrays of the Unspeakable (ones), and because of what indeed they separated them, being three Parts, and because of what indeed they proceeded out of the Fatherless (ones).\n\nAnd that Mystery indeed is that which knoweth because of what despoiled themselves all that Incorruptible (ones), being twelve Places, and because of what they placed them being distributed one after another in one only array, and because of what also they separated them and they made them diverse arrays, being themselves Uncontainable (ones) and Boundless (ones), and because of what they proceeded out of the Fatherless (ones)."

