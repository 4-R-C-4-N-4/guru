[content]
body = "Ieou indeed he is the Overseer of the Light who came forth first from the pure light of the first Tree.\n\nThe Guard also of the Veil of those of (the) Right (hand) who came forth out of the second Tree.\n\nAnd the two Chief Captains came forth also out of the pure light choice greatly of the third Tree with the fourth in the Treasury of the Light.\n\nBut Melkhisedek also came forth out of the fifth Tree.\n\nSabaoth the great also (the) good, this whom I called, my Father, [180 ] he came forth out of Ieou the Overseer of the Light.\n\nThese six therefore by the command of the First Mystery, the last Helper caused to become in 97 the Place of those of (the) Right (hand) for the arrangement of the collection of the Light which is of the Height of the Aeons of the Rulers, and in the World with every race which is in them.\n\nThese which I shall say unto you of the work of each over which they put him in the Distribution of the Universe.\n\nBecause of the height therefore of the work in which he put him, they will become fellow-kings in the First Mystery of the first Voice of the Treasury of the Light, this which will become in the Place of the souls of those who receive the First Mystery of the First Mystery.\n\nAnd the Virgin of the Light with the great [181 ] Captain of the Middle, this who were wont the Rulers of the Aeons to call, The great Iao, according to the name of a great Ruler who (is) in their Place; he, with the Virgin of the Light, with his twelve Deacons, this from whom ye received shape, and ye received the power out of them, they will also all become Kings: with the first Saviour of the first Voice in the Place of the souls of those who will receive the First Mystery of the First Mystery in the Inheritances of the Light.\n\nAnd with the fifteen Helpers of the seven Virgins of the Light, these who become in the Middle will be distributed in the Places of the twelve Saviours, [181 ] with the others also, Angels of the Middle, each according to his glory, and (shall) be kings with me in the Inheritances of the Light.\n\nAnd I, I shall rule over all of them in the Inheritances of the Light.\n\nThese therefore, all which I said to you will not happen in this time, but they are about to happen in the Consummation of the Aeon, namely, the dissolution of the Universe.\n\nAnd that is the whole dissolution of the numbering of the perfect souls of the Inheritances of the Light.\n\nBefore therefore the Consummation these (things) which I said to you will not happen.\n\nBut each will happen in his Place in which they put him from at first, until they complete the numbering of the collection [182 ] of the perfect souls.\n\nThe seven (seventh, MS ) Voices with the five (fifth, MS ) Trees, and with the three Amens, and with the Twin-saviours with the nine Guards, and with the twelve Saviours, and with those of the Place of those of the Right (hand), and with those of the Place of the Middle, each will remain in the Place in which they put them, until mount up all the numbering of the perfect of the souls of the Inheritances of the Light.\n\nAnd all the Rulers also who repented, they will remain also in the Place in which they put them, until mount up all the numbering of the souls of the Light: they are coming all each in their time in which she receives Mystery.\n\nAnd they will precede all the Rulers 98 who repented."

