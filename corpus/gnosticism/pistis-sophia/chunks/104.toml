[content]
body = "Say unto them, Do love of God and receive the mysteries of the Light, and go unto the Height unto the kingdom of the Light.\n\nSay unto them, Be righteous and receive the mysteries, and go unto the Height unto the kingdom of the Light.\n\nSay unto them, Be good and 131 receive the mysteries, and go unto the Height unto the kingdom of the Light.\n\nSay unto them, Renounce the Universe, and receive the mysteries of the Light, and go unto the Height unto the kingdom of the Light.\n\nThese are all the limits of the roads for those who are worthy of the mysteries of the Light.\n\nThese therefore of this kind who renounced this renunciation, give to them [240 ] the mysteries of the Light, and hide them not from them at all, even if they are sinners and they became in every sin with every unlawfulness, all which I said unto you of the World, that they should turn and repent and should become in the submission which I say to you now, Give to them the mysteries of the kingdom of the Light, do not hide them from them at all, for because of the sinfulness I (we, MS ) brought the mysteries unto the World, that I should forgive all their sins which they did from the first.\n\nBecause of this therefore I said unto you once, I came not to invite the righteous.\n\nNow therefore I brought the mysteries, that they should forgive the sins of every one, and take them unto the kingdom of the Light: for the mysteries, they [240 ] are the free-gift of the First Mystery, for him to blot out the sins with the unlawfulness of all the sinners.\n\nIt happened therefore, Jesus having finished saying these words unto his disciples, came forward Maria, said she to the Saviour, My Lord, then there is man righteous, being complete in all the righteousness, and that man having not any sin at all.—Such a one they will torment him in the punishments with the judgments, or otherwise?\n\nOr otherwise rather, that man they will take away in unto the kingdom of the heavens, or not?\n\nAnswered the Saviour, said he to Maria, A man righteous, this being complete in all the righteousness, and he did not any sin [241 ] ever, and such a one having not received any mystery of the Light ever, whenever should happen the time (of his) coming out of the body, immediately are wont to come the Receivers of the one of the great Triple powers, these in whom there is a great (one), and they (will) carry off the soul of that man from the Receivers of Contentious (ones), and spend three days moving round with it in all creations of the World.\n\nAfter the three days they are wont to take it down unto the Chaos, and take it through in all the punishments of the judgments, and send it unto all the judgments.\n\nAnd the fires of the Chaos are not wont to molest it greatly, but [241 ] in part they are wont to molest it for a little time: and in haste quickly they are wont to have mercy on it and bring it up from the Chaoses, and take it on the road of the Middle through 132 all those Rulers.\n\nAnd they are not wont to punish it in their judgments which (are) cruel, but the fires of their Places are wont to molest it in part: and whenever they should take it unto the Place of Iakhthanabas the unmerciful, they are not wont to be able to punish it, indeed at least in his evil judgments, but he is wont to hold it down for a little time, while the fire of his punishments molesteth it in part.\n\nAnd also speedily they are wont to have mercy on it in those their Places."

