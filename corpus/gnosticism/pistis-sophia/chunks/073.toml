[content]
body = "[170 ] Because that I was not seeking after the manner (in) which seek the men of the World; but we are seeking indeed in the knowledge of the Height, this which thou gavest to us, and we are seeking also in the type of the search which is preferable, this which thou taughtest us for to seek in it.\n\nNow therefore, my Lord, be not angry with me, but reveal to me the word about which I shall ask thee.\n\nIt happened therefore, Jesus having heard these words, saying them Maria, the Magdalene, answered then (but, MS) Jesus, said he to her, Seek after that which thou wishest to seek after, and I shall reveal it to thee in an exactness with a certainty, Amen, amen I say to you, Rejoice in great joy and be [171 ] glad greatly greatly, ye are seeking after every thing in an exactness, and I shall be glad greatly greatly, because ye seek after every 92 thing in an exactness.\n\nAnd ye seek after the manner (in) which it is worthy to seek.\n\nNow therefore, seek after that which thou seekest after, and I shall reveal it to thee in joy.\n\nIt happened therefore, Maria having heard these words, saying them the Saviour, she rejoiced in great joy, and she was glad for her greatly greatly.\n\nSaid she to Jesus, My Lord and my Saviour, then of what kind are the twenty-four Invisibles, and being, also, of what type: or otherwise rather of what nature: or, then, being of what nature is their light?\n\nBut answered Jesus, said he [171 ] to Maria, What is that which is in this World being like to them: or what, rather, of Place which is in this World is that which is resembling unto them?\n\nNow therefore unto what shall I compare them: or, rather, is that which I shall say concerning them: for there is not any one in this World unto whom I shall be able to compare them; and there is not any of appearance in it unto whom I shall be able to liken them?\n\nNow therefore there is not any in this World being of the nature of the heaven, Amen I say to you, Each Invisible, is great(er) than the heaven with the Sphere which is upon it, and with the twelve Aeons together nine times, according as I finished saying to you another time.\n\nAnd there is not any light in this World being preferable unto the light [172 ] of the sun.\n\nAmen, amen I say to you: The twenty-four Invisibles are of light more than the light of the sun which is in this World ten thousand times according as I finished saying to you another time.\n\nBecause that the light of the sun in his truth of shape is not in this Place.\n\nBecause that his light passeth through many veils of Places.\n\nBut the light of the sun in his truth of shape, this which becometh in the Place of the Virgin of the Light shineth more than the twenty-four Invisibles and with the great Forefather invisible and with also the great Triple-powered God a ten thousand times, according as I finished saying to you another time.\n\n[172 ] Now therefore, Maria, there is not any appearance in this world, nor is there light, nor is there shape comparable to the twenty-four Invisibles, that I should compare them unto them: but yet another little time, thou with thy brothers of fellow-disciples, I shall take you unto all the Places of the Height, and I shall take you unto the three Spaces of the First Mystery, until the Places only of the Space of the Ineffable.\n\nAnd ye will see all their shape in truth without comparison.\n\nAnd whenever I should take you unto the Height, ye will see the glory of those of the Height."

