[content]
body = "His disciples questioned him and said to him, \"Do you want us to fast? How shall we pray? Shall we give alms? What diet shall we observe?\" Jesus said, \"Do not tell lies, and do not do what you hate, for all things are plain in the sight of heaven. For nothing hidden will not become manifest, and nothing covered will remain without being uncovered.\""

