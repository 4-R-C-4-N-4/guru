[content]
body = "Jesus said, \"The kingdom is like a man who had a hidden treasure in his field without knowing it. And after he died, he left it to his son. The son did not know (about the treasure). He inherited the field and sold it. And the one who bought it went plowing and found the treasure. He began to lend money at interest to whomever he wished.\""

