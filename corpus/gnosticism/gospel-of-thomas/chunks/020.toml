[content]
body = "The disciples said to Jesus, \"Tell us what the kingdom of heaven is like.\" He said to them, \"It is like a mustard seed. It is the smallest of all seeds. But when it falls on tilled soil, it produces a great plant and becomes a shelter for birds of the sky.\""

