[content]
body = "<They saw> a Samaritan carrying a lamb on his way to Judea. He said to his disciples, \"That man is round about the lamb.\" They said to him, \"So that he may kill it and eat it.\" He said to them, \"While it is alive, he will not eat it, but only when he has killed it and it has become a corpse.\" They said to him, \"He cannot do so otherwise.\" He said to them, \"You too, look for a place for yourself within repose, lest you become a corpse and be eaten.\""

