[content]
body = "Jesus saw infants being suckled. He said to his disciples, \"These infants being suckled are like those who enter the kingdom.\" They said to him, \"Shall we then, as children, enter the kingdom?\" Jesus said to them, \"When you make the two one, and when you make the inside like the outside and the outside like the inside, and the above like the below, and when you make the male and the female one and the same, so that the male not be male nor the female female; and when you fashion eyes in the place of an eye, and a hand in place of a hand, and a foot in place of a foot, and a likeness in place of a likeness; then will you enter the kingdom.\""

