[content]
body = "Jesus said, \"I took my place in the midst of the world, and I appeared to them in flesh. I found all of them intoxicated; I found none of them thirsty. And my soul became afflicted for the sons of men, because they are blind in their hearts and do not have sight; for empty they came into the world, and empty too they seek to leave the world. But for the moment they are intoxicated. When they shake off their wine, then they will repent.\""

