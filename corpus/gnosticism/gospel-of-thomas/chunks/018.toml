[content]
body = "The disciples said to Jesus, \"Tell us how our end will be.\" Jesus said, \"Have you discovered, then, the beginning, that you look for the end? For where the beginning is, there will the end be. Blessed is he who will take his place in the beginning; he will know the end and will not experience death.\""

