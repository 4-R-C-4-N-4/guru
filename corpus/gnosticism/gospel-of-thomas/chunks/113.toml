[content]
body = "His disciples said to him, \"When will the kingdom come?\" <Jesus said,> \"It will not come by waiting for it. It will not be a matter of saying 'here it is' or 'there it is.' Rather, the kingdom of the father is spread out upon the earth, and men do not see it.\""

