[content]
body = "TRUTH MADE NAMES Truth made names in the world, and without them we can’t think.\n\nTruth is one and is many, teaching one thing through the many.\n\nRULERS The rulers wanted to fool us, since they saw we were connected with the good.\n\nThey took the names of the good and gave them to the not good so with names they could trick and rope us to the not good.\n\nAs though doing us a favor, they took names from the not good and placed them on the good.\n\nThey knew what they were doing.\n\nThey wanted to grab those of us who were free and make us eternal slaves.\n\nFORCES There are forces that don’t want us to be saved.\n\nThey act for their own sake.\n\n.\n\n.\n\n.\n\nIf we are saved there will be no sacrifices, no animals offered to the forces.\n\nYes, they made sacrifices to the animals.\n\nThey were alive when they offered them, and then they died.\n\nThey offered us dead to god, and we lived.\n\nONCE THERE WAS NO BREAD Before Christ came there was no bread in the world, just as paradise, with its Adam, had many trees for nourishing animals but no wheat for humans.\n\nOnce we nourished ourselves like animals, but when the perfect Christ came, he carried bread down from heaven so we could eat like humans.\n\nRULERS AND THE HOLY SPIRIT The rulers thought they had done everything alone, but in secret the holy spirit on her own accomplished it all.\n\nSOWING TRUTH Truth from the beginning is sown everywhere.\n\nMany see it sown.\n\nFew see it reaped.\n\nMARY AND THE HOLY SPIRIT Some say the holy spirit inseminated Mary.\n\nThey are wrong and don’t know what they are saying.\n\nWhen did a woman ever get a woman pregnant?\n\nMary is a virgin and no powers dirtied her.\n\nShe is a great repugnance to the Jews who are apostolic, who are the messengers.\n\nNo powers dirtied the virgin.\n\nThey dirtied themselves.\n\nTHE LORD’S FATHER The lord would never say, “My father who is in heaven” unless he had another father elsewhere.\n\nHe would have simply said, “My father.” POSSESSIONS The lord said to the students, “From every house you are in, take out possessions, but take things into the father’s house and do not steal what is inside and run off.” JESUS IS A HIDDEN NAME Jesus is a hidden name, Christ is an open one.\n\nSo Jesus is not a word in any tongue but a name they call him.\n\nIn Syriac the Christ is messias, in Greek he is christos.\n\nAll languages have their own way of calling him.\n\nNazarene is the revealed name for what is secret.\n\nWHAT IS CHRIST?\n\nIn himself Christ has everything, be it human or angel or mystery and the father.\n\nTHE LORD ASCENDING Some say the lord died first and then ascended.\n\nThey are wrong.\n\nHe rose first and then he died.\n\nUnless you are first resurrected, you will not die.\n\nAs god lives, you would already be dead.\n\nPENNY AND SOUL No one would hide a beautiful and valuable object under a lovely cover, but often vast monies are held in a bag worth only a penny.\n\nConsider the soul.\n\nIt is a precious spirit and it came in a contemptible body.\n\nSOME ARE AFRAID Some are afraid that they will ascend from death naked, and they want to climb back to life in their flesh.\n\nThey are unaware that those who wear their flesh are naked, and those who strip are not naked.\n\n“Flesh and blood cannot inherit the kingdom of god.” What will we not inherit?\n\nThe flesh we wear on us.\n\nBut what then will we inherit as our own?\n\nThe body of Jesus and his blood."

