[content]
body = "And Jesus said, “Whoever will not eat my flesh and drink my blood has no life within him.” What does he mean?\n\nHis flesh is the word and blood the holy spirit.\n\nWho has received these has food and drink and clothing.\n\nI condemn those who say the flesh won’t rise.\n\nThen both are wrong.\n\nYou say the flesh won’t ascend.\n\nTell me, what will rise so I can honor you?\n\nYou say spirit in the flesh and light in the flesh.\n\nWhat is the flesh?\n\nYou say there is nothing outside the flesh.\n\nThen rise in the flesh, since everything exists in it.\n\nIn this world those wearing garments are better than garments.\n\nIn heaven the garments are better than the wearers.\n\nTHROUGH WATER AND FIRE Through water and fire this wide realm is purified, and the visible cleaned by the visible, and the hidden by the hidden, but there are elements concealed in the visible.\n\nThere is water within water and fire in the oil of chrism.\n\nJESUS TRICKED EVERYONE Jesus tricked everyone.\n\nHe did not appear as he was but in a way not to be seen.\n\nYet he appeared to all of them.\n\nTo the great he appeared as great, to the small as small.\n\nTo angels he appeared as an angel, and to humans as a human.\n\nAnd he hid his word from everyone.\n\nSome looked at him and thought they saw themselves.\n\nWhen before his students he appeared gloriously on the mountain, he was not small.\n\nNo, he became great, and he made his students grow so they would know his immensity.\n\nUNION WITH ANGELS On the day of thanksgiving prayer he said, “You who have joined perfect light with holy spirit, join the angels with us as a single image.” THE LAMB Don’t hate the lamb.\n\nWithout the lamb you can’t see the king.\n\nMEETING THE KING You don’t meet the king if you are naked.\n\nCONCEIVING WITH A KISS The heavenly man has more children than a man on earth.\n\nIf the offspring of Adam are many and die, how many more are the offspring of perfect beings who do not die and are born each second?\n\nThe father makes a child.\n\nThe child cannot make a son.\n\nHe has not the power to make children.\n\nOne recently born is not a parent.\n\nThe son has brothers and sisters, not children.\n\nIn this world there is a natural order to birth, and one is nourished by ordinary means.\n\nWe are nourished by the promise of heaven, from the mouth of the word.\n\nIf the word emanated from the mouth, it is perfect.\n\nBy a kiss the perfect conceive and give birth.\n\nThat is why we kiss.\n\nFrom the grace in others we conceive.\n\nTHREE MARYS Three Marys walked with the lord: His mother, his sister, and Mary of Magdala, his companion.\n\nHis sister and mother and companion were Mary.\n\nTHE HOLY SPIRIT Father and son are single names.\n\nHoly spirit is a double name and everywhere: above and below, hidden and revealed.\n\nThe holy spirit lives in the revealed.\n\nIt is concealed below.\n\nIt is above.\n\nBLINDERS Even evil powers serve the saints.\n\nThe holy spirit blinds the powers who suppose they are treating a simple man when they are treating saints.\n\nASK YOUR MOTHER A student once asked the lord for something from the world, and he said, “Ask your mother, and she will give you something from another realm.” SOPHIA AND SALT The messengers said to the students, “Let our offering all be for obtaining salt.” Salt is what they called Sophia.\n\nWithout salt no offering is acceptable.\n\nBut Sophia is barren.\n\nShe has no child, and so she is called a trace of salt.\n\nYet wherever others are will be the holy spirit.\n\nHer children are many.\n\nFATHER AND CHILD What a father has belongs to his child, but not while the child is still little."

