[content]
body = "If we know the truth, we shall find the fruits of the truth within us.\n\nIf we join it, it will fulfill us.\n\nTHE STRONG AND WEAK, THE MANIFEST AND HIDDEN Now we have the manifest things of creation.\n\nWe say, “The strong are they who are held in high regard, and the obscure are the weak who are despised.” Contrast the manifest things of truth: they are weak and despised, whereas the hidden things are strong and held in high regard.\n\nThe mysteries of truth are revealed, though, in type and image.\n\nThe bridal chamber remains hidden.\n\nIt is the holy in the holy.\n\nThe veil at first concealed how god controls creation, but when the veil is torn and things inside are revealed, this house will be left desolate, or rather it will be destroyed.\n\nBut the whole inferior godhead will not flee from these places into the holies of the holies, for it cannot mix with the pure light and the perfect fullness.\n\nRather, it will be under the wings of the cross and under its arms.\n\nThis ark will be the salvation of people when the floodwater surges over them.\n\nSECRET OF THE TRUTH If some belong to the order of the priesthood, they will be able to go within the veil with the high priest.\n\nSo the veil was not torn at the top, since it would have been open only to those above.\n\nNor was it torn at the bottom, since it would have been revealed only to those below.\n\nBut it was rent from top to bottom.\n\nThose above opened to us who are below, that we may go in to the secret of the truth.\n\nThe truth is what is held in high regard, since it is strong.\n\nBut we shall go in there by means of lowly types and forms of weakness.\n\nThey are lowly when compared with the perfect glory.\n\nThere is glory that surpasses glory.\n\nThere is power that surpasses power.\n\nTherefore, the perfect things have opened to us together with the hidden things of truth.\n\nThe holies of the holies has been revealed, and the bridal chamber has invited us in.\n\nTHE PERFECT LIGHT As long as the seed is hidden, wickedness is ineffectual, but it has not yet been removed from the midst of the seed of the holy spirit.\n\nEveryone is a slave of evil.\n\nBut when the seed is revealed, the perfect light will flow out on everyone.\n\nAnd all those who are in the light will receive the chrism.\n\nThen the slaves will be free and the captives ransomed.\n\n“Every plant that my heavenly father has not planted will be uprooted.” Those who are separated will be joined and filled.\n\nEveryone who enters the bridal chamber will kindle the light, for it burns just as in marriages performed, though they happen at night.\n\nThat fire burns only at night and is put out.\n\nYet the mysteries of this marriage are perfected rather in the day and the light.\n\nNeither that day nor its light ever sets.\n\nIf you become an attendant of the bridal chamber, you will receive the light.\n\nIf you do not receive it while in those places, you cannot receive it in the other place.\n\nYou who receive the light will not be seen nor detained.\n\nAnd no one will be able to torment you even while you live in the world.\n\nAnd when you leave the world you have already received the truth in the images.\n\nThe world has become the eternal realm, because the eternal realm is fullness for you.\n\nThis is the way it is.\n\nIt is revealed to you alone, not hidden in the darkness and the night but in a perfect day and a holy light.\n\nThe Gospel According to Philip | Nag Hammadi Library | Gnostic Society Library | Gnosis Archive |"

