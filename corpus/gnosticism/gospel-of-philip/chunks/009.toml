[content]
body = "His seed was Jesus, and the plant was the cross.” The tree of life in the middle of that garden of paradise is an olive tree, and from the olive tree comes chrism, and from that oil comes the resurrection.\n\nTHE WORLD EATS BODIES The world eats bodies, and everything eaten in the world dies.\n\nTruth eats life, but no one fed on truth will find death.\n\nJesus came and he carried food, giving life to whoever wanted it so they might not die.\n\nADAM IN PARADISE God planted a garden, and humans were placed in the garden.\n\nThey lived among many trees with the blessing and in the image of god.\n\nThe things in it I will eat as I wish.\n\nHere in this garden they will tell me, “Eat this or do not eat that, just as you wish.” Here I will eat all things, where the tree of knowledge is.\n\nThat tree killed Adam, but here the tree of knowledge made us alive.\n\nThe law was the tree.\n\nIt has the power to give knowledge of good and evil.\n\nIt did not remove me from evil or set me among the good.\n\nIt created death for those who ate it.\n\nWhen they said, “Eat this or do not eat that,” death began.\n\nSUPERIORITY OF CHRISM TO BAPTISM The chrism is superior to baptism.\n\nFrom the word chrism we have been called Christians, and surely not from the word baptism.\n\nAnd because of the chrism Christ has his name.\n\nThe father anointed the son, and the son anointed the messengers, and the messengers anointed us.\n\nWho has been anointed possesses everything: resurrection, light, cross, holy spirit.\n\nThe father gave him this in the bridal chamber.\n\nHe merely accepted the gift.\n\nThe father was in the son and the son in the father.\n\nThis is the kingdom of heaven.\n\nLAUGHING CHRIST The lord said it perfectly: “Some have entered the kingdom of heaven laughing, and they have come out laughing.” They do not remain there: one because he is not a Christian, another because he laments his later acts.\n\nAs soon as Christ went down into the water he came out laughing at everything in this world, not because he thought it a trifle, but out of contempt.\n\nWhoever wants to enter the kingdom of heaven will do so.\n\nWhoever despises everything of this world, scorns it as a trifle, will emerge laughing.\n\nSo with the bread and the cup and the oil, for above is one superior to all these.\n\nCREATION The world came into being through error.\n\nThe agent who made it wanted it to be imperishable and immortal.\n\nHe failed.\n\nHe came up with less than his desire.\n\nThe world was never incorruptible, nor was its maker.\n\nThings are not imperishable, but children are.\n\nNothing can endure that is not first a child.\n\nWhoever cannot receive surely will be unable to give.\n\nCUP OF PRAYER The cup of prayer holds wine and water.\n\nIt is appointed for the blood for which thanks is given.\n\nIt is filled with holy spirit and is of the perfect human.\n\nWhen we drink, we drink the perfect human.\n\nLIVING WATER The living water is a body.\n\nWe must put on the living human.\n\nWhen you go into the water, you strip naked and put on the living human.\n\nA HORSE SIRES A HORSE A horse sires a horse, a human gives birth to a human, a god engenders a god.\n\nCompare the bridegroom and the bride.\n\nTheir children were born in the chamber.\n\nNo Jew was ever born to Greek parents as long as the world has existed.\n\nAnd as Christians, we do not descend from the Jews.\n\nThere was another people.\n\nThese blessed ones were the chosen ones, the chosen people of the living god; and then the true man, the earthly son, and the seed of the earthly son."

