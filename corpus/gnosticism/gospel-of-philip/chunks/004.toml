[content]
body = "When the child is grown, however, then the father turns over all he possesses.\n\nTHE LOST Those who have gone astray are those born of the spirit.\n\nAnd they are usually lost because of the spirit.\n\nSo from one single breath of spirit the fire blazes and is blackened.\n\nWISDOM AND THE WISDOM OF DEATH Echamoth is one thing and Echmoth another.\n\nEchamoth is simply wisdom, but Echmoth is the wisdom of death, who is the one who knows death, who is called little wisdom.\n\nDOMESTIC ANIMALS AND BEASTS Domestic animals may be the bull and the donkey and other species.\n\nOthers are wild and live in the deserts.\n\nA man plows the field with a domestic animal, and from the fruit of his labor he feeds himself and the animals, tame or wild.\n\nCompare the perfect human.\n\nThrough submissive powers he plows and prepares for everything to come into being.\n\nSo his world holds together, good or evil, the right and the left.\n\nThe holy spirit shepherds everyone and rules all the powers, those tame and wild and running loose.\n\nHe gathers them and shuts them in so, like it or not, they cannot escape.\n\nCAIN The one who has been created is beautiful, and you would expect his sons to be noble creations.\n\nIf one was not created but engendered, you would find his seed was noble, but now he was created and he engendered.\n\nIs this nobility?\n\nAdultery came into being, then murder.\n\nOne was engendered in adultery, since he was the child of the serpent.\n\nSo like his father he too became a murderer and killed his brother.\n\nEvery sexual act between unlike persons is adultery.\n\nGOD IS A DYER God is a dyer.\n\nThe good dyes, true dyes, dissolve into things dyed in them.\n\nSo too for things god has dyed.\n\nHis dyes are imperishable because of their colors.\n\nWhat god dips he dips in water.\n\nSEEING It is impossible to see anything in the real realm unless you become it.\n\nNot so in the world.\n\nYou see the sun without being the sun, see sky and earth but are not them.\n\nThis is the truth of the world.\n\nIn the other truth you are what you see.\n\nIf you see spirit, you are spirit.\n\nIf you look at the anointed, you are the anointed.\n\nIf you see the father, you will be father.\n\nIn this world you see everything but yourself, but there, you look at yourself and are what you see.\n\nFAITH AND LOVE Faith receives, love gives.\n\nNo one receives without faith.\n\nNo one gives without love.\n\nTo receive, believe; to love, give.\n\nIf you give without love, no one derives a thing from what is given.\n\nWhoever has not accepted the lord is still a Jew.\n\nNAMES OF JESUS The messengers who were before us had these names for him: Jesus, the Nazorean, messiah, that is, Jesus, the Nazorean, the Christ.\n\nThe last name is Christ, the first is Jesus, the middle name is the Nazarene.\n\nMessiah has two meanings, both “Christ” and “measured.” Jesus in Hebrew is “redemption.” Nazara is “truth.” Christ has been measured.\n\nThe Nazarene and Jesus are they who have been measured.\n\nPEARL IN THE MUD If a pearl is thrown into mud, it loses no value, and if rubbed with balsam oil, it gains no value.\n\nIt always is precious in its owner’s eyes.\n\nWherever they are, the children of god are precious in the eyes of the father.\n\nJEW, ROMAN, GREEK, CHRISTIAN If you say, “I am a Jew,” no one will be moved."

