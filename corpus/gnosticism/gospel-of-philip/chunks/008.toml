[content]
body = "Now the woman and man are one in the chamber with the bed, and those so joined will not come apart again.\n\nEve and Adam separated because when they joined it was not in the chamber with the bed.\n\nADAM’S SOUL The soul of Adam came into being through a breath blowing into him.\n\nBreath is spirit.\n\nThe element given him is his mother.\n\nSoul became spirit.\n\nWhen he was joined to spirit, he spoke words incomprehensible to the powers.\n\nThey envied him, excluded from the union of the spirit.\n\nTheir exclusion spurred them into fashioning the bridal chamber where lovers would come and be defiled.\n\nJESUS AT THE JORDAN Jesus appeared at the Jordan River with the fullness of the kingdom of heaven.\n\nHe was born before there was birth.\n\nHe was anointed once and was anointed anew.\n\nHe who was redeemed redeemed the world.\n\nMYSTERY It is good to speak of mystery, especially because the father of all joined with the virgin who came down, and on that day a fire shone over him.\n\nHe came to the bridal chamber.\n\nSo on that very day his body came into being.\n\nAnd on that day he left the chamber with the splendor of what passed between the bride and bridegroom.\n\nThrough this force Jesus did everything.\n\nIt is good for each of his students to go into the chamber and rest.\n\nVIRGIN BIRTHS Adam came into being from two virgins: from the spirit and from the virgin earth, and Christ was born of a virgin to heal the initial fall.\n\nTWO TREES OF PARADISE Two trees are growing in paradise.\n\nOne bears animals, the other bears people.\n\nAdam ate from the tree that bore animals and became an animal and brought forth animals, and so Adam’s children worship animals.\n\nThe tree whose fruit Adam ate is the tree of knowledge.\n\nSo his sins increased.\n\nIf he had eaten fruit from the tree of life, the one bearing people, the gods would worship man and woman, for in the beginning god created man and woman.\n\nNow they create god.\n\nIn the world humans make gods and worship their creation.\n\nIt would be better if the gods worshiped them!\n\nA MAN AND HIS CHILDREN A man does what he has the skills to do.\n\nHe has the ability to make children.\n\nHe does it easily in a few seconds.\n\nHis accomplishment shows in his children.\n\nThey are the image.\n\nHe was also made after the image, doing things with his physical strength and producing his children with ease.\n\nSLAVES AND THE FREE In this world the slaves serve the free.\n\nIn the kingdom of heaven the free will serve the slaves, and the attendants of the bridal chamber will minister to the wedding guests.\n\nThe attendants of the bridal chamber have one name, rest, and need take no other form because they meditate and comprehend by insight.\n\nThey are many, since they do not store their treasures in things below, despicable things, but in unknown glory.\n\nINTO THE WATER It was necessary for Jesus to descend into the water so that he could perfect and consecrate it.\n\nSo also they who have received baptism in his name may be perfect.\n\nHe said, “It is right in this way to perfect all that is just.” BAPTISM When you say you will die first and then rise, you are wrong.\n\nIf you are not resurrected in life, you will receive nothing when you are dead.\n\nGreat is baptism.\n\nEnter the water and live.\n\nJOSEPH AND THE WOODEN CROSS Philip the messenger said, “Joseph the carpenter planted a garden of paradise because he needed wood for his trade.\n\nHe made the cross from the trees he planted, and his seed hung from what he planted."

