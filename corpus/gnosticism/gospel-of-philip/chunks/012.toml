[content]
body = "Now they say, “He who creates engenders,” but his so-called offspring is merely a creature; therefore his children are not offspring but creatures.\n\nHe who creates works openly and is visible.\n\nHe who engenders does so in private.\n\n.\n\n.\n\n.\n\nMYSTERY OF UNDEFILED MARRIAGE No one can know when the husband and wife have sex except those two.\n\nMarriage in the world is a mystery for those who are married.\n\nIf there is a hidden defilement in the marriage, how much greater is the true mystery of the undefiled marriage!\n\nIt is not fleshly but pure.\n\nIt belongs not to desire but to the will.\n\nIt belongs not to the darkness of the night but to the day and the light.\n\nIf a marriage is open to the public, it has become prostitution, and the bride plays the harlot not only when impregnated by another man but even if she slips out of her bedroom and is seen.\n\nLet her show herself only to her father and her mother and to the friend and attendants of the bridegroom.\n\nThey are permitted to enter every day into the bridal chamber.\n\nBut let the others yearn just to listen to her voice and to enjoy her fragrant ointments, and let them feed on the crumbs falling from the table, like dogs.\n\nBridegrooms and brides belong to the bridal chamber.\n\nNo one shall be able to see the bridegroom or bride unless one becomes a bridegroom or bride.\n\nABRAHAM’S CIRCUMCISION When Abraham rejoiced in seeing what he was to see, he circumcised the flesh of his foreskin, teaching us that it is proper to destroy the flesh.\n\nHIDDEN PARTS ARE UPRIGHT As long as they are hidden, most things in the world are upright and live.\n\nIf they are revealed they die, as is clear by the example of the visible person: as long as the intestines are hidden, a person is alive.\n\nWhen the intestines are exposed and come out, the person will die.\n\nSo also with a tree.\n\nWhile its root is hidden, it sprouts and grows.\n\nIf its root is exposed, the tree dries up.\n\nSo it is with every birth that is in the world, not only with the revealed but also the hidden.\n\nAs long as the root of wickedness is hidden, it is powerful.\n\nBut when it is recognized, it is dissolved.\n\nWhen it is revealed, it perishes.\n\nThat is why the word says, “Even now the ax lies set against the root of the trees.” It will not merely cut—what is cut sprouts again— but the ax penetrates deeply until it brings up the root.\n\nROOT OF EVIL Jesus pulled out the root of the whole place while others did it only partially.\n\nAs for us, let each one dig down after the root of evil that is within us and pluck it out of our heart from the root.\n\nIt will be uprooted if we recognize it.\n\nBut if we are ignorant of it, it takes root in us and produces fruit in our heart.\n\nIt masters us.\n\nWe are its slaves.\n\nIt takes us captive to make us do what we do not want; and what we do want we do not do.\n\nIt is powerful because we have not recognized it.\n\nWhile it exists it is active.\n\nIGNORANCE Ignorance is the mother of all evil.\n\nIgnorance will eventuate in death, because those who come from ignorance neither were nor are nor will be.\n\nBut those who are in the truth will be perfect when all the truth is revealed.\n\nFor truth is like ignorance: while hidden it rests in itself, but when revealed and recognized, it is praised in that it is stronger than ignorance and error.\n\nIt gives freedom.\n\nThe word said, “If you know the truth, the truth will make you free.” Ignorance is a slave, knowledge is freedom."

