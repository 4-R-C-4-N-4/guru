[content]
body = "In the world these are the true people.\n\nThey are the attendants of the bridal chamber.\n\nPOWER AND WEAKNESS In this world, power and weakness mingle when man and woman have sex.\n\nJoining is different in the eternal realm, though we use the same names to speak of it.\n\nThere are names beyond the ordinary ones and stronger than showy brute strength.\n\nYet all is the same, and this is incomprehensible to hearts of flesh.\n\nKNOWLEDGE OF SELF Should you who possess everything not know yourself?\n\nIf you do not know yourself, you will not enjoy what you own.\n\nBut know yourself and what you have enjoy.\n\nGARMENT OF LIGHT The perfect human can neither be restrained nor seen.\n\nIf they see him, they can stop him, so there is no way to grace but to put on the perfect light and become perfect.\n\nAll who put on that garment will enter the kingdom.\n\nThis is the perfect light.\n\nWe must become perfect before leaving this world.\n\nWho is rich and has not thrown it off will not share in the kingdom but will go as imperfect into the middle.\n\nOnly Jesus knows where that will end.\n\nTHE HOLY PERSON The priest is fully holy, including his body.\n\nDoes one take bread and make it holy?\n\nOr the cup or anything drunk?\n\nAre they sanctified?\n\nIf so, why not the body too?\n\nBAPTISM AND DEATH By perfecting the water of baptism, Jesus emptied it of death.\n\nWe go into the water but not into death, so we are not poured out into the wind of the world.\n\nWhenever that wind blows, winter comes.\n\nWhen the holy spirit breathes, summer blows in.\n\nKNOWLEDGE AND LOVE Whoever has knowledge of the truth is a free being, but the free human doesn’t sin.\n\n“Whoever sins is the slave of sin.” Truth is the mother, knowledge the father.\n\nThose who think that sinning does not apply to them are called free by the world.\n\nKnowledge of the truth can make one arrogant, giving meaning to the words “being free.” It makes them feel superior to the world.\n\nBut love builds up.\n\nWho is really free through knowledge is a slave because of love for those who have not yet attained the freedom of knowledge.\n\nKnowledge makes them capable of freedom.\n\nLove never calls something its own, yet it too may possess the same thing.\n\nLove never says, “This is mine,” or “That is mine,” but “All these are yours.” SPIRITUAL FRAGRANCE Spiritual love is wine and fragrance.\n\nThose nearby also enjoy it from those who are anointed.\n\nBut if the anointed withdraw and leave, then those unanointed, who are hanging around, remain in their bad odor.\n\nThe Samaritan gave nothing but wine and oil to the wounded.\n\nOnly the ointment.\n\nIt healed the wounds, for “love covers a multitude of sins.” CHILDREN AND ADULTERY The children a woman gives birth to resemble the man who loves her.\n\nIf her husband loves her, then they are like her husband.\n\nIf affections comes from an adulterer, then the children are like him.\n\nOften, if a woman sleeps with her husband out of need, while her heart is with the adulterer with whom she also has sex, her child will look like the adulterer.\n\nYou who live together with the son of god, love not the world but the lord, so your children will look not like the world but like the lord.\n\nSEX AND SPIRIT Humans have sex with humans, horses with horses, donkeys with donkeys.\n\nThose of one sort usually linger with those like them.\n\nSo spirit mingles with spirit and thought consorts with thought and light shares light.\n\nIf you are born a person, a person will love you.\n\nIf you become a spirit, a spirit will join with you.\n\nIf you become thought, thought will mingle with you."

