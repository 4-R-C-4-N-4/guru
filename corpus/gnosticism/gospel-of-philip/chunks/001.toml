body = "(Above image of the Gospel of Thomas courtesy of the Institute for Antiquity and Christianity, Claremont Graduate University) Visit the Bookstore for a complete selection of translations and books about The Nag Hammadi Library The Nag Hammadi Library The Gospel of Philip Translated by Willis Barnstone This original translation of The Gospel of Philip (Nag Hammadi Codex II, 3) is presented in the Gnostic Society Library by permission and under license from Dr.\n\nWillis Barnstone, who retains all copyright.\n\nDr.\n\nBarnstone's translations of the Nag Hammadi texts are published in The Gnostic Bible , © 2003, Willis Barnstone & Marvin Meyer.\n\nHeadings in bold type have been added to the text for clarity by the translator.\n\n_____________________________________ The Gospel of Philip CONVERTS A Jew makes a Jew whom we call a convert.\n\nA convert makes no convert.\n\nSome are and make others like them, while others simply are.\n\nSLAVES A slave longs for freedom and doesn’t hope to own a master’s estate.\n\nA child claims the father’s legacy, but those who inherit the dead are dead.\n\nHeirs to the living are alive and are heirs to life and death.\n\nThe dead are heirs to nothing.\n\nHow can the dead inherit?\n\nYet if the dead inherits the living, the living won’t die and the dead will survive.\n\nGENTILES, JEWS, CHRISTIANS A gentile doesn’t die, never having been alive to die.\n\nYou who find truth are alive; another may die, being alive.\n\nSince Christ came the world was made, cities adorned, and the dead buried.\n\nWhen we were Jews we were orphans with only a mother.\n\nWhen we turned Christian we had a father and a mother.\n\nSOWING IN SEASON Those who sow in winter reap in summer.\n\nLet us sow in the world to reap in summer.\n\nWinter is the world, summer the other realm.\n\nIt is wrong to pray in winter.\n\nFrom winter comes summer.\n\nIf you reap in winter you will not reap.\n\nYou will pull up young plants.\n\nAt the wrong season no crop is yours.\n\nEven on the days of the Sabbath the field is barren.\n\nCHRIST AND THE SOUL Christ came to buy.\n\nHe rescued and redeemed, redeeming aliens.\n\nHe made strangers his own.\n\nHe brought his own and made promises, construing a strategy, and gave his life when he appeared and when the world began.\n\nThen he came and took back what he promised, which fell into the hands of thieves.\n\nThey captured it, but he rescued it back.\n\nThen he redeemed both the good and evil people in the world.\n\nLIGHT AND DARKNESS Light and darkness, life and death, on the right and left, these are children, they are inseparably together.\n\nBut the good are not good, the wicked not wicked, life not life, death not death.\n\nEach element fades to an original source.\n\nBut those who live above the world cannot fade.\n\nThey are eternal.\n\nNAMES The names of earthly things are illusory.\n\nWe stray from the real to the unreal.\n\nIf you hear the word “god,” you miss the real and hear the unreal.\n\nFather, son, holy spirit, life, light, resurrection, church.\n\nThese words are not real.\n\nThey are unreal but refer to the real, and are heard in the world.\n\nThey fool us.\n\nIf those names were in the eternal realm, they would never be heard on earth.\n\nThey were not assigned to us here.\n\nTheir end dwells in the eternal realm.\n\nTHE NAME NOT UTTERED Only one name is not uttered in the world: the name the father gave the son.\n\nAbove the name of all others is the father’s name.\n\nThe son would not be father without wearing the father’s name.\n\nThose with his name know it but do not speak it.\n\nThose without his name do not think it."

