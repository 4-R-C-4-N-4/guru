[content]
body = "THINGS BELOW LIKE THINGS ABOVE The lord said, “I came to make things below like things above, and the outside like the inside.\n\nI came to join them in one place.” He revealed who he is through types and images.\n\nThose who say, “There is a heavenly person and one even higher,” are wrong.\n\nWho is seen in heaven is the heavenly person, who is called “the one below,” and the one to whom the hidden belongs is called “higher.” It is best to say “inner” and “outer” and “what is beyond the outer.” So the lord called destruction “the outer darkness.” There is nothing beyond.\n\nHe said, “My father who is in secret.” He said, “Go into the chamber and shut the door behind you, and pray to your father who is in secret,” the one who is innermost.\n\nBut what is within them all is the fullness.\n\nBeyond it there is nothing inside.\n\nThis is the place they call “the uppermost.” PLACES OF THE SPIRIT Before Christ, some came from a realm they could not reenter, and they went where they could not come out.\n\nThen Christ came.\n\nThose who went in he took out.\n\nThose who went out he took in.\n\nEVE IN ADAM When Eve was in Adam there was no death.\n\nWhen she was cut from him, death came into being.\n\nIf he enters what he was and takes her in him fully, death will disappear.\n\nCRUCIFIXION “My god, my god, O lord, why have you abandoned me?” He said these words on the cross.\n\nBut not from that place.\n\nHe was already gone.\n\n.\n\n.\n\n.\n\nRISING FROM THE DEAD The lord rose from the dead.\n\nHe became as he was, but now his body was perfect.\n\nHe possessed flesh, but this was true flesh.\n\nOur flesh isn’t true.\n\nOurs is only an image of the true.\n\nBEDROOM Animals don’t have a bridal bedroom, nor do slaves or dirtied women.\n\nBedrooms are for free men and virgins.\n\nBORN AGAIN Through the holy spirit we are again engendered, but conceived through Christ.\n\nWe are anointed in the spirit.\n\nWhen we were conceived we were united.\n\nNo one will be able to look at oneself either in water or in a mirror without light, nor see in light without water or mirror.\n\nSo it is fitting to baptize in light and water.\n\nNow the light is the chrism.\n\nTHREE BUILDINGS IN JERUSALEM There were three buildings in Jerusalem, one facing west called “the holy,” another facing south called “the holy of the holy.” The third facing east was called “the holy of the holies,” where only the high priest enters.\n\nBaptism is the holy building.\n\nRedemption is the holy of the holy.\n\nThe holy of the holies is the bridal chamber.\n\nBaptism includes resurrection and redemption.\n\nRedemption happens in the bridal chamber, but the bridal chamber is part of something superior to it and the others because you will find nothing like it.\n\nThose familiar with it are those who pray in spirit and in truth for they do not pray in Jerusalem.\n\nThere are some who pray in Jerusalem, awaiting the kingdom of heaven, called the holy of the holies.\n\nBefore the veil was rent we had no bridal chamber but the image of the bridal chamber above.\n\nSo its veil was torn from top to bottom.\n\nIt was right for some below to ascend.\n\nGARMENT OF LIGHT The rulers do not see you who wear the perfect light, and they cannot seize you.\n\nYou put on the light in the mystery of union.\n\nREUNION IN THE BEDROOM If the woman and man had not come apart, they would not know death.\n\nChrist came to repair the split, there from the beginning, and join the two and give them life who had died because of separation."

