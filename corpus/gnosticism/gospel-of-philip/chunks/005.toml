[content]
body = "If you say, “I am a Roman,” no one will be upset.\n\nIf you say, “I am Greek, a barbarian, a slave, a freeman,” no one will be troubled.\n\nBut if you say, “I am a Christian,” they will tremble.\n\nI wish I had that title.\n\nThe world will not endure it when hearing the name.\n\nGOD IS A MAN-EATER God is a man-eater.\n\nSo people are sacrificed to him.\n\nBefore humans were sacrificed, it was animals, because those they were eaten by were not gods.\n\nGLASS AND EARTH Glass decanters and earthenware jugs are both made with fire.\n\nWhen a glass decanter breaks, it is redone, since it was made through a breath.\n\nWhen earthenware jugs break, they are destroyed, since they were born without a breath.\n\nDONKEY AND MILLSTONE A donkey turning a millstone walked a hundred miles.\n\nWhen it was set loose, it found itself in the same place.\n\nSome people travel long but go nowhere.\n\nAt twilight they have seen no cities or villages, no human constructions or phenomena of nature, no powers or angels.\n\nThese miserable ones have labored in vain.\n\nTHE EUCHARIST IS JESUS The eucharist is Jesus.\n\nIn Syriac it is called pharisatha, which is “one who is spread out,” since Jesus came to crucify the world.\n\nTHE LORD IN THE DYE WORKS OF LEVI The lord went into the dye works of Levi and took seventy-two different colors and threw them into a vat.\n\nHe drew them out perfectly white.\n\nHe said, “In this way the earthly son has come as a dyer.” WISDOM, MOTHER OF THE ANGELS Wisdom, who is called “barren,” is mother of the angels.\n\nThe companion is Mary of Magdala.\n\nJesus loved her more than his students.\n\nHe kissed her often on her face, more than all his students, and they said, “Why do you love her more than us?” The savior answered, saying to them, “Why do I not love you like her?\n\nIf a blind man and one who sees are together in darkness, they are the same.\n\nWhen light comes, the one who sees will see light.\n\nThe blind man stays in darkness.” BEING The lord said, “Blessings on you who were before you came into being.\n\nWhoever is, was, and will be.” HUMANS AND ANIMALS The superiority of humans is not obvious to the eye but lies in what is hidden.\n\nConsequently they have mastery over animals who are stronger and larger in ways apparent and hidden.\n\nSo the animals survive.\n\nWhen humans withdraw, the animals slay and devour each other, because they do not find food.\n\nNow they have food because humans plow the soil.\n\nWATER AND MYSTERY If you go down into the water and come up, receiving nothing, and say, “I am a Christian,” you have borrowed the name at interest.\n\nBut if you receive the holy spirit, you have the name as a gift.\n\nAnd a gift you do not pay back.\n\nBut if you have borrowed at interest, you must pay.\n\nSo it works when you have passed through mystery.\n\nMARRIAGE Great is the mystery of marriage!\n\nWithout it, the world would not be.\n\nThe existence of the world depends on marriage.\n\nThink of sex.\n\nIt possesses deep powers, though its image is filthy.\n\nBRIDAL CHAMBER AND ANDROGYNY Among the forms of unclean spirits are male and female ones.\n\nMales have sex with souls who inhabit a female shape, and females mingle promiscuously with souls in a male form.\n\nNo one escapes those spirits: they seize you, unless you take on the power of male or female, of groom and bride.\n\nThis power resides in the mirrored bridal chamber."

