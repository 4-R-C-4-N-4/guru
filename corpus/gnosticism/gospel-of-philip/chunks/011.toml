[content]
body = "If you become light, light will share you.\n\nIf you are of those from above, one of those from above will rest in you.\n\nIf you become a horse or a donkey or bull or dog or sheep or another animal that is wild or tame, then neither a person nor spirit nor thought nor light can love you.\n\nNone of those from above or within can rest in you, and you have no part in them.\n\nSLAVES AND FREEDOM Those who are enslaved against their will can be free.\n\nThose who are freed by favor of a master but have sold themselves into slavery can no longer be free.\n\nFARMING Farming in this world demands four elements.\n\nA harvest is collected and taken into the barn as a result of water, earth, wind, and light.\n\nGod’s farming also has four elements: faith, hope, love, and knowledge.\n\nFaith is our earth in which we take root.\n\nHope is the water through which we are nourished.\n\nLove is the wind through which we grow.\n\nKnowledge is the light through which we ripen.\n\nGrace exists in four ways: earthborn, heavenly, from highest heaven, and living in truth.\n\nBLESSINGS ON ONE WHO NEVER HARMS A SOUL Blessings on one who never harms a soul.\n\nThat person is Jesus Christ.\n\nHe came to the whole earth and distressed no one.\n\nBlessings on one like him, the perfect person.\n\nThis is the word.\n\nTell us about the word, since it is hard to define.\n\nHow shall we be able to accomplish such a feat?\n\nHow will he comfort everyone?\n\nEspecially, it is improper to cause anyone distress, whether that person be great or small, infidel or believer.\n\nIt is improper to comfort only those who enjoy good deeds.\n\nSome find it useful to comfort one who is lucky.\n\nYou who do good deeds cannot comfort them, for it goes against your will.\n\nYou cannot cause them distress, since you are not afflicting them.\n\nYet you who are lucky in life sometimes cause distress unintentionally.\n\nbut the source is not you but the other person’s wickedness.\n\nWhoever has the qualities of the perfect human is happy in the good.\n\nYet some are enormously put out by these distinctions.\n\nA HOUSEHOLDER WITH EVERYTHING There was a householder who had every possible thing, be it son or slave or cattle or dog or pig or wheat or barley or chaff or grass or castor oil or meat or acorn.\n\nHe was sensible and knew what each one’s food was.\n\nHe served children bread and meat.\n\nHe served slaves castor oil and meal.\n\nHe threw barley and chaff and grass to the cattle.\n\nHe threw bones to the dogs, and to pigs he threw acorns and scraps of bread.\n\nCompare the student of god.\n\nIf you are sensible, you understand the nature of learning.\n\nBodily forms will not deceive you, since you will look at the condition of each person’s soul and speak with that form.\n\nThere are many animals on earth in human form.\n\nWhen you identify them, then you throw acorns to swine, barley and chaff and grass to cattle, and bones to the dogs.\n\nTo slaves you will give only what is preliminary, but to children you give what is complete.\n\nTHE EARTHLY SON AND HIS SON There is the earthly son, and there is the son of the earthly son.\n\nThe lord is the earthly son, and the son of the earthly son is he who is created through the earthly son.\n\nThe earthly son received the capacity to create from god.\n\nHe also had the ability to engender.\n\nHe who has the ability to create is a creature.\n\nHe who has the ability to engender is an offspring.\n\nBut he who creates cannot engender.\n\nHe who engenders also has the power to create."

