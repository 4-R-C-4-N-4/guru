[content]
body = "When wanton women see a man sitting alone, the man is overcome.\n\nThey fondle him and pollute him.\n\nWhen wanton men see a beautiful woman sitting alone, they overcome her, and she is violated and polluted.\n\nBut when spirits see a man and his wife sitting together, the female spirits cannot enter the male, nor the male the woman.\n\nWhen the image and angel are joined, none can force themselves on the man and woman.\n\nLEAVING THE WORLD When you leave the world, nothing can stop you because you were in the world.\n\nYou are above desire and fear.\n\nYou are master of envy.\n\nIf someone does not leave the world, the forces grab and choke him.\n\nHow can one escape those great grasping rulers?\n\nHow can one hide from them?\n\nSome say, “We were faithful,” to escape the filthy spirits and demons.\n\nBut if they had the holy spirit, nothing filthy would cleave to them.\n\nHave no fear of the flesh.\n\nDon’t love it.\n\nIf you are fearful, it will gain mastery over you.\n\nIf you love the flesh, it will swallow and paralyze you.\n\nIN THIS WORLD OR THE RESURRECTION Either someone will be in this world or in the resurrection or in the middle place.\n\nGod forbid that I be found in the middle!\n\nIn this world there is good and evil.\n\nIts good is not good, and evil not evil.\n\nBut there is evil after this world that is truly evil—which is called the middle.\n\nThe middle is death.\n\nWhile we are in this world it is best to acquire resurrection for ourselves so when we strip off the flesh we may rest and not walk in the middle.\n\nMany go astray on the way.\n\nWILL AND SIN It is good to leave the world before one has sinned.\n\nSome have neither the will nor the ability to act.\n\nOthers, even if they have the will, are better off if they do not act, for the act of the will makes them sinners.\n\nBut even if they have no will to act, justice may be concealed from them, whether they have the will or not.\n\nWill, not action, is always primary.\n\nHELL A messenger in a vision saw people locked up in a house of fire and bound with fiery chains, lying in a flaming ointment.\n\nHe asked them, “Why can’t they be saved?” “We did not desire it,” they told the messenger, “but we got this place of punishment.\n\nIt is the outer darkness, and we are in it.” KINDS OF FIRE Soul and spirit came into being from water and fire.\n\nFrom water and fire and light came the attendant in the bridal chamber.\n\nFire is chrism.\n\nLight is fire.\n\nI am not referring to flame, which has no form, but to another kind of fire, whose appearance is white, which is luminous and beautiful and gives beauty.\n\nTRUTH AND NAKEDNESS Truth didn’t come into the world naked but in types and images.\n\nTruth is received only that way.\n\nThere is rebirth and its image.\n\nThey must be reborn through image.\n\nWhat is the resurrection?\n\nImage must rise again through image.\n\nThe bridegroom and image enter through image into truth, which is restoration.\n\nIt is right that those who don’t have it take on the name of the father and son and the holy spirit.\n\nBut they have not done so on their own.\n\nIf you do not take on the names for yourself, the name “Christian” will be taken from you.\n\nYou receive them in the oil of the chrism, the aromatic unction of the power of the cross.\n\nThe messengers called this power “the right and left.” You are no longer a Christian but Christ.\n\nFIVE SACRAMENTS The lord did everything through mystery: baptism and a chrism and a eucharist and a redemption and a bridal chamber."

