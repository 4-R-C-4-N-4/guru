[content]
body = "p. 35\n\nPORTENTS AT JOHN'S BIRTH (§ 18). 1\n\nIn the Name of Great Life may hallowed Light be glorifed.\n\nA CHILD was planted out of the height, a mystery revealed in Jerusalem. 2 The priests saw dreams; chill seized on their children, chill seized on\nJerusalem.\n\nEarly in the morning he 3 went to the temple. He\nopened his mouth in blasphemy and his lips of lying. He opened his mouth in\nblasphemy and spake to all of the priests:\n\n\"In my vision of the night I beheld, [I beheld] in my vision. When I\nlay there, I slept not and rested not, and sleep came not to me by night. I\nslept not and rested not, [and I beheld] that a star appeared and stood over\nEnishbai. 4 Fire burned in Old Father (Abā Sābā) Zakhriā; 5 three heaven-lights\nappeared. 6 The p. 36 sun sank and the lights rose.\nFire lit up the house of the people (synagogue), smoke rose over the temple.\nA quaking quaked in the Throne-chariot, 1 so that Earth removed\nfrom her seat. A star flew down into Judća, a star flew down into Jerusalem.\nThe sun appeared by night, and the moon rose by day.\"\n\nWhen the priests heard this, they cast dust on their head. Yaqif the\npriest weeps and Beni-Amin's tears flow. 2 Shilai and Shalbai 3 cast dust on their heads. Elizar 4 [the chief priest]\nopened his mouth and spake unto all of the priests: \"Yaqif interprets dreams,\nbut as yet he has no understanding of these. Beni-Amin interprets dreams; is\nhe not a man who discloses your p. 37 secrets? Ṭāb-Yōmīn 1 gives us no revelation, though you deem he can give information on all that\nis and [that] is not.\n\nEarth groans out of season and is sent a-whirl through the\nheaven-spheres. Earth 2 opens her mouth and speaks to Elizar: \"Go to Lilyukh, 3 that he may interpret\nthe dreams you have seen,\" Thereon Elizar opened his mouth and spake unto all\nof the priests: \"Who goes to Lilyukh, that he may interpret the dreams you\nhave seen?\" Then wrote they a letter and put it in the hand of Ṭāb-Yōmīn.\nṬāb-Yōmīn took the letter and betook himself to Lilyukh, Lilyukh lay on his\nbed; sleep had not yet flown from him. A quaking came into his heart,\nshivered his heart and brought it down from its stay, Ṭāb-Yōmīn drew near to\nLilyukh, Ṭāb-Yōmīn stepped up to Lilyukh, shook him out of his sleep and\nspake to him: \"The priests saw dreams, . . . [the above paragraph is repeated\nverbally down to] . . . and the moon rose by day.\""

