[content]
body = "6 A cryptic\nsentence referring to the 'fornicators' who are not true to the True Religion\nof MM.; 'she' = the soul.\n\n7 That is the\nworld-house illuminated by the Sun.\n\n8 Sc . hell.\n\n9 Sc . God,\nas in the thought-sphere of Philo's Therapeuts.\n\n10 After\nrenouncing heretical views.\n\n11 That is from\nthe body.\n\n1 Miryai is the\npersonification of the first Mand. community among the Jews. She is presumably\nnot to be confounded in any way with Miriam, the mother of Išū Mšīhā (Jesus\nMessiah), who is called Miryam (not Miryai) in § 30 ;\nbut this requires further investigation.\n\n2 'Jewels,'\n'pearls' and 'gold' are presumably the figures of spiritual riches."

