[content]
body = "[? Gnosis of Life speaks (cp. § 29):]\n\n\"Let me warn you, my brothers, let me warn you, my beloved! Let me warn\nyou, my brothers, against the . . . who are like unto the cross. They lay it\non the walls; then stand there and bow down to the block. Let me warn you, my\nbrothers, of the god which the carpenter has joinered together. If the\ncarpenter has joinered together the god, who then has joinered together the\ncarpenter?\"\n\nPraisčd be Life, and Life is victorious.\n\n(For those who are not familiar with the atmosphere of bitter inner and\nouter theological strife of the times, it is as well to note that the last two\npieces are in the form of haggadic controversy between the followers of John and Jesus respectively.)\n\nJOHN'S MARRIAGE (§ 31).\n\nYahyā proclaims in the nights, Yōhānā on the Night's\nevenings.\n\nYAHYĀ proclaims in the nights and speaks: \"The [heavenly] wheels and\nchariots 3 quaked. Sun and Moon weep and the eyes of Rūhā 4 shed tears.\"\n\nHe 5 says: \"Yahyā, thou art like to a scorched mountain, which brings forth no\ngrapes in this world. Thou art like to a dried-up stream, on whose banks no\nplants are raised. Thou hast become a land without a lord, a house without\nworth. A false p. 53 prophet hast thou become, who\nhast left no one to remember thy name. Who will provide thee with provision,\nwho with victuals, and who will follow to the grave after thee?\"\n\nWhen Yahyā heard this, a tear gathered in his eye; a tear in his eye\ngathered, and he spake: \"It would be pleasant to take a wife, and delightul\nfor me to have children. But only if I take no woman,—and then comes sleep,\ndesire for her seizes me and I neglect my night-prayer. If only desire does\nnot wake in me, and I forget my Lord out of my mind. If only desire does not\nwake in me, and I neglect my prayer every time.\"\n\nWhen Yahyā said this, there came a Letter from the House of Abathur: \"Yahyā,\ntake a wife and found a family, and see that thou dost not let this world\ncome to an end. On the night of Monday and on the night of Tuesday go to thy\nfirst 1 bedding. On the night of Wednesday and on the night of Thursday devote\nthyself to thy hallowed praying. On the night of Friday and on the night of\nSaturday go to, thy first bedding. On the night of Sunday and (? yea) on the\nnight of the Day devote thyself to thy hallowed praying. On Sunday, take\nthree and leave three, take three and leave three. 2 See that thou dost not\nlet the world come to an end.\""

