[content]
body = "p. 49\n\n1 This makes it\nclear that the strict observance of a sabbath (Sunday) by the MM. was\nnot taken over from the Christians, as Brandt supposes.\n\n2 Cp. the Joshua\nben Perachiah Jesus story in the Talmūd ( B. Sanhedrin 107b, Sota 47a): Joshua replied [to Jeshu]: \"Thou godless one, dost thou occupy thyself\nwith such things?—directed that 400 horns should be brought and put him under\nstrict excommunication.\" (Mead, D.J.L. 100 B.C.? pp. 137 and 146f.).\n\n3 The Man 'with\nthe Scales'—the Avestan Rashnu {?}—who weighs the good and bad deeds of the\ndeparted (J.B. xxix. f.).\n\n4 Generally\nmeaning an unmarried man.\n\np. 50\n\n1 Presumably her\nspiritual children.\n\n2 Meaning God.\n\n3 L. thinks that\nby zanḍīq (heretic) is meant a Zoroastrian or Manichćan who comes down from\nthe mountains to join the Mandćans who live in the plains. This seems to me\nentirely mistaken. The Z.'s and M.'s lived as well on plains as on mountains.\nIn every probability it means the Mount of Darkness on which the Seven\nassemble to plot against the righteous. The Seven are the lords of all the\nfalse religions. For the Mount of Hades, the Prison Mount of the Underworld in\nBab. tradition, see my paper 'New-found Fragments of a Babylonian Mystery-play\nand the Passion-story,' Quest , Jan. 1922, p. 173.\n\np. 51"

