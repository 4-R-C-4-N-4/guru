[content]
body = "Yahyā proclaims in the nights, Yōhānā on the Night's\nevenings. 4\n\nYAHYĀ proclaims in the nights and says: \"Through my Father's discourses\nI give light and through the praise of the Man, my creator, I have freed my\nsoul from the world and from the works that are hateful and wrong. The Seven 5 put question to me, the Dead who have not seen Life, and they say: \"In whose\nstrength dost thou stand there, and with p. 41 whose praise dost thou make\nproclamation?\" Thereon I gave to them answer: \"I stand in the strength of my\nFather and with the praise of the Man, my creator. I have built no house in\nJudća, have set up no throne in Jerusalem. I have not loved the wreath of the\nroses, not commerce with lovely women. I have not loved the defective, 1 not loved the cup of the drunkards. I have loved no food of the body, and\nenvy has found no place in me. I have not forgotten my night-prayer, not\nforgotten wondrous Jordan. I have not forgotten my baptizing, not [forgotten]\nmy pure sign. I have not forgotten Sun-day, 2 and the Day's evening\nhas not condemned me. I have not forgotten Shilmai and Nibdai, 3 who dwell in the House of the Mighty. 4 They clear me and let\nme ascend; they know no fault, no defect is in me.\"\n\nWhen Yahyā said this, Life rejoiced over him greatly. The Seven sent\nhim their greeting and the Twelve 5 made obeisance before\nhim. They said to him: \"Of all these words which thou hast spoken, thou hast\nnot said a single one falsely. Delightful and fair is thy voice, and none is\nan equal to thee. Fair is thy discourse in thy mouth and precious thy speech,\nwhich has been bestowed upon thee. The vesture which First Life did give unto\nAdam, the Man, 6 the vesture which First Life did give unto Rām, 7 p. 42 the Man, the vesture which\nFirst Life did give unto Shurbai, 1 the Man, the vesture\nwhich First Life did give unto Shum bar Nū, 2 —has He given now unto\nthee. He hath given it thee, O Yahyā, that thou mayest ascend, and with thee\nmay those ascend *   *   *   *   *   *   The house of defect 3 will be left behind in the desert. 4 Everyone who shall be\nfound sinless, will ascend to thee to the Light's region; he who is not found\nsinless, will be called to account in the guard-houses.\" 5\n\nAnd Life is victorious.\n\nJOHN'S LIGHT-SHIP (§ 20).\n\nYahyā proclaims in the nights, Yōhānā on the Night's\nevenings.\n\nYAHYĀ proclaims in the nights and says: \"In the name of Him who is\nwondrous and all-surpassing! The Sun sat in his Court (? Corona), and the\nMoon sat in the Dragon. The Four p. 43 Winds of the House get them\ngone on their wings and blow not.\" 1"

