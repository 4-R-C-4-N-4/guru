[content]
body = "When Messiah said this, Yahyā cries aloud; tears come to him without\nceasing, and he speaks: \"[God] forbid that the high King of Light should look\nfor lot in deceivers. The soul is not like the blood, that it should become\nheated in the body and come to a stop, The soul is not like the dew, that it\nshould fall on the fruit and be lost. The soul is not like the wind, that it\nshould fare to the mountains and come to a stop. Firmly developed has the\nsoul been brought into the vain body. If the soul has kept herself perfect,\nshe ascends in a garment of glory.\n\n\"Ṣauriēl's knife consists of three flames. 2 When he (Ṣ) drives her\n(the soul) to hasten, so as to bear her away, he lets loose the three flames\nagainst her. One he lets loose against her in the evening, the other at\ncock-crow; the third lets he loose 'gainst her at the coming-forth of the\nrays. If the fire begins to be fierce, the soul slips out of the feet and the\nknees. Out of the feet and the knees slips she, and draws nigh to the hips.\nThereon leaves she the hips, reaches the heart, and seeks to keep there her\nground. Then falls she into the breast, and it squeezes ... ... The eyes, the\nface and the lips of the man twitch, and the tongue twists hither and\nthither.\n\n\"Then Ṣauriēl sits on the eyebrows; [he sits] and speaks to her: 'Go\nhence, O Soul! Why dost thou still watch over the body?'—Then says she to\nhim: 'Thou wilt hale me, Ṣauriēl, out of the body. First show me my vesture\n[and clothe me therewith]; then hale me out and hence bring me.'—'First bring\nme p. 61 thy works and thy wage,' makes\nhe answer to her; 'then will I show thee thy vesture and clothe thee.'—'I\nknew not, O Ṣauriēl,' says she to him, 'that my time is come, and they then\nsend quickly for me, for doing good works, so that thou mayest bring me my\nvesture and clothe me therewith.'—Natheless he made answer unto her: 'Has no\none yet died before thee and have they not yet carried forth anyone to the\ngraveyard?'—Thereon she says to him: 'Through the power of him who has died\nbefore me, and through the power of him whom they have carried forth to the\ngraveyard 1 . . .   . . . ."

