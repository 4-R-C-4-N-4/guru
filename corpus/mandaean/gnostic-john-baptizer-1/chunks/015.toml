[content]
body = "When the youth saw her alone, he set himself free and fell down from\nthe cloud. He set himself free and fell down from the cloud and kissed the\nmouth of Enishbai. When Anōsh, the treasure, saw him [do this], he spake unto\nYahyā in Jerusalem: \"Stands it for thee written in thy book, is it declared\nunto thee p. 59 on thy page, to kiss her alone,\non the mouth?\"—Thereon answered Yahyā and spake unto Anōsh, the treasure, in\nJerusalem: \"Nine months I abode in her womb, 1 so long as all other\nchildren abide there, without any reluctance on her part; therefore is it no\ncharge against me now to kiss her alone, on the mouth. Nay, hail and again\nhail to the man who repays father and mother in full. A man who recompenses\nfather and mother, has not his like in the world.\"\n\nWhen Yahyā said this, Anōsh, the treasure, knew that Yahyā is wise.\nThereon Anōsh, the treasure, spake to the Sun in Jerusalem: \"Take for me care\nof the youth, the Man, who is sent by the King. Take for me care of the\nyouth, until we ask for him.\" Then Anōsh, the treasure, spake to the Moon in\nJerusalem: \"Take for me care of the youth, the Man, who is sent by the King.\nTake for me care of the youth, until we ask for him.\"\n\nLife is exalted and is victorious, and victorious is the\nMan who has come hither.\n\nJOHN'S ANSWER TO JESUS CONCERNING THE ANGEL OF DEATH (§\n33).\n\nYahyā proclaims in the nights, Yōhānā on the Night's\nevenings.\n\nYAHYĀ proclaims and speaks: \"Stand I not alone? Because of my voice the\n[heavenly] wheels quake and the chariots capsize. The tempest became silent\nand settled down in the world's deserts. Sun and Moon wail, and Earth and\nHeaven mourn.\"\n\nMessiah opened his mouth and spake to Yahyā in Jerusalem: p. 60 \"I asked thee, Yahyā, by Great\nLife and by Sunday, whose name is dear. I asked thee Yahyā, by the Way,\nwhereby the Men of piety put to the test go without hindrance. Tell me: To\nwhat is the shape of Ṣauriēl's 1 knife like? Tell me:\nIf the soul leaves the body, with what is it clothed, and to what is it like\nin the vain body? Surely the soul is not possibly like the blood, that it\nshould become heated in the body and come to a stop in it? Surely the soul is\nnot possibly like the wind, that it should fare to the mountains, be lost\nthere and come to a stop? Surely the soul is not possibly like the dew, that\nit should fall on the fruit and be lost?\""

