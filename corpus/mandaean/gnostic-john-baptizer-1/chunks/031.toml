[content]
body = "3 Presumably\nbefore his birth, and perhaps dedicating him to God as a Nazīr.\n\n4 This phrase is\nmost probably a late interpolation.\n\n1 Cp. Pistis\nSophia (p. 115; Mead 2 , p. 97), where Jesus is made to say to\nhis mother: \"Thou, also, Mary, hast received form which is in Barbēlō [the\nGreat Mother], according to matter, and hast received likeness which is in the\nVirgin of Light, according to light . . . ; and on thy account the darkness\nhath arisen, and moreover out of thee did come forth the material body in\nwhich I am, which I have purified and refined.\" Again (p. 120; M. p. 100):\n\"Mary, my mother according to matter, thou in whom I have sojourned.\" And\nagain, Mary speaking (p. 120; M. p. 103): \"'Grace and Truth met together,'—it\nis I, Mary, thy mother, and Elizabeth, mother of John, whom I have met.\n'Grace' then is the power of Sabaōth in me, which went forth out of me, which\nthou art. . . . . 'Truth' on the other hand is the power in Elizabeth, which\nis John, who did come and hath made proclamation concerning the way of Truth\n[the M. Kushṭā] which thou art,—who hath made proclamation before thee.\"\n\n1 The Angel of\nDeath, as with the Jews. Cp, the knife, sword or scymytar of the Ophite\nDiagram in Origen's reply to Celsus.\n\n2 Cp. the flaming\nsword of the Hebrew form of the Paradise-myth.\n\n1 Here something\nseems to have fallen out. The following recital of the soul describes a burial\nwhich has taken place.\n\n2 Unexplained; it\nmay possibly mean two female and two male professional mourners."

