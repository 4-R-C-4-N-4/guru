body = "1 The 'merchants'\nand 'fishers' in all probability mean the Seven, as in the 'Fisher of Souls'\npiece.\n\n2 The MM. wear\nwhite robes.\n\n3 Sc . of\nthe temple; cp. the miraculous spiritual outpouring of the Last Days expected\nby John, based on O.T. prophecies, as set forth in the previous introductory\nstudy; also one of the Odes of Solomon , quoted in the Pistis Sophia (ch. 65, pag. 131, Mead p. 110): \"A stream came forth and became a great wide\nflood. It tore away all to itself and turned itself against the temple,\" etc.\nThe whole Ode is most instructive in this connection, and the Odes in general\nmove in a very similar atmosphere to the John-lore. (See for Trans. from\nSyriac, Rendel Harris and Mingana, The Odes and Psalms of Solomon ,\nManchester, 1920). The 'fish' and 'birds' of the next sentences are the\nfaithful.\n\np. 46\n\n1 Tibil; L.\nfrequently retains this as a proper name— e.g. 'in the Tibil'—and\nalternates it with the common noun 'world.' Whether there is a distinction in\nthe original I do not know, it seems to be simply the Heb. tebel ( =\nworld, earth). Where L. has Tibil, I shall render it by 'this world.'\n\n2 Cp. the\nMessianic Marriage Feast parable (Mt.\n22:4) : \"My oxen and my fatlings are killed . . .: come to the mariage-feast.\"\n\n3 Kushṭā is the\ngeneral term for the religious ideal of the MM.; it is elastic in meaning and\ncannot be translated by a single rigid concept. The original sense seems to\nhave been 'Truth,' 'Righteousness' and perhaps 'Order' (cp. the Avestan Asha\nand the Vedic Ṛita). It thus means the true religion, loyalty, trust and faith\n(see J.B. xvii.f.). Kushtā is fem. It is to be noted that in Avestan\nliterature Ashi (fem.) is the heavenly impersonation of rectitude, fortune,\nchastity, riches (cp. ūthrā's ), and Chisti (fem.) of religious wisdom\n(? = gnōsis)—see M. N. Dhalla, Zoroastrian Civilization . New York,\n1922, pp. 45, 51f., 68, 77, 84. With the frequent recurrence of the\nletter-symbol in M. scripture, cp. the Syriac 'Hymn of the Soul,' or 'of the\nPearl,' which belengs to the same main stream of the Gnosis (see my Hymn of\nthe Robe of Glory , 'Echoes from the Gnosis' series, vol. x., London,\n1908).\n\n4 Presumably the\nheavenly messengers.\n\np. 47\n\n1 Sc . Life\nor perhaps rather the Man."

