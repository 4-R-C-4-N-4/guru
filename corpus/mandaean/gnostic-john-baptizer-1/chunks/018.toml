[content]
body = "6 Cp. the more\nconcrete three Magi motive. It should, however, be noted that Origen (1st half\nof 3rd cent.) is the first of the Fathers to state that the number of the Magi\nwas 3; Chrysostom, 150 years later, gives their number as 12 (see Lynn\nThorndike, A History of Magic and Experimental Science London, 1923, i.\n472ff.).\n\n1 Merkabah; here\npresumably meaning heaven generally.\n\n2 The narrative is\nlargely in the familiar style of Danielic and Talmūdic chronological\ncamouflage; the Daniel Book ( c . 164 B.C.) throws back the religio-political\nconflict of the Jews with the kingdorn and Hellenistic religion of Antiochus\nEpiphanes to the days of Nebuchhadnezzar ( c . 600 B.C.), and the Talmūd\nJesus stories, for instance, throw back the setting to some 100 years B.C. or\nadvance it to some 100 years A.D. See my Did Jesus Live 100 B.C.?—An\nEnquiry into the Talmūd-Jesus Stories, the Toldoth Jushu and Some Curious\nStatements of Epiphanius—Being a Contribution to the Study of Christian\nOrigins (London, 1903). It is to be noted that the Talmūd knows nothing of\nJohn; it evidently regards the John-Jesus movement as one and the same kind of\nheresy. Y. and B. may perhaps be personified types of members of certain\ncontemporary communities or mystical groups. In §54 Y. and B. are called the\n'Two Gold-sons.' This reminds us of alchemical symbolism; see my tracing of\n'psychical' alchemy to Babylon in The Doctrine of the Subtle Body in\nWestern Tradition (London, 1919), Proem, pp. 25ff. They may have belonged\nto the early 'Sons of the Sun' tradition—the later Sampsćans of Epiphanius,\nstill later in wider distribution known to the Moslim historians as Shemsīyeh\n(Shamish = the Sun). This hypothesis is strengthened by the apparently cryptic\ngloss Beni-Amin, 'Sons of (the) Amēn' (cp. Rev. iii. 14: These things saith\nthe Amēn, the faithful and true witness, the beginning of the creation of\nGod.\"). I have no space here to follow up this conjecture; but L. seems to me\nto be, not only nodding, but fast asleep, when he assumes that the Mandćan\nwriters were simply ignoramuses who mistook Ben-Yamin for Beni-Amin. The Heb.\nderivation of Benjamin is given very variously In the Apocrypha and\nPseudepigrapha of the O.T. L. refers to Yaqif (clearly Jacob) as Joseph.\n\n3 Of whom we have\nno further information."

