[content]
body = "\"[The women] who wept ran hither and thither and [the men] who wailed\nran hither and thither, as long as the body lay there before them. When the\nsoul leaves the body, four 2 go forth to the\ngraveyard. [The women] who wept ran hither and thither. the men who wailed\nran hither and thither; and they ran hither and thither crying, until they\nlowered it into the pit. When they had lowered the vain body and covered it\nover [ sc . with earth], then the women ceased fram their death-wail.\nThey filled up the pit, and the men went away... ... . In haste left they the\nbody and grave and went away; they took hold of cup and ate bread and forgot\nthe vain body.—Now, an thou wilt, Ṣauriēl, let me stay here still two days.\nThen will I sell the whole of my goods and share out among my sons, and will\ntake my vesture with me, the robe that ascends to Light's region.'\n\n\"Natheless Ṣauriēl returned answer unto her: 'Is there a child that has\nleft the womb of its mother, and that they shall have brought back again into\nits mother, that I should leave thee in the Wicked Ones' 3 Dwelling, so that thou mayest see after a sharing among thy sons? I will lead\nthee hence and put the robe of darkness upon [thee], for that thou hast not\nlet thyself be warned in this world, and hast not loved thy way to Light's\nregion. Therefore shalt thou be put in ward in the House of the Wicked, till\nHeaven and Earth pass away.'\"\n\nAnd praisčd be Life.\n\np. 35\n\n1 Because Yōhānā\nis mentioned only once in the Genzā , Brandt supposes that the John-Book\npieces must be later in date. But surely this is not a scientific conjecture.\nIt is rather to be supposed that the John-pieces were naturally gathered\ntogether from the general mass of material when the collection-process began.\nThough Yahyā is the Arabic form of the name, Yōhānā alternates with it; this\nshows a later redaction in the Mohammedan period, when the people vulgarly\nspoke Arabic, but says nothing as to the date of earlier writings from which\nthe pieces were copied out.\n\n2 Ur-ashlam ,\na mock-name or derisive caricature-permutation = 'Ur perfected' it. Ur is\noriginally the Chaldćan Deus Lunus; he is the eldest son of Rūhā, the\nWorld-Mother, and corresponds in some respects with the Yaldabaōth of 'Ophite'\ngnosticism.\n\n3 Who it was is\nnot disclosed. The dreamer's report is at first utterly discredited.\n\n4 The Elizabeth of\nLuke. The name may be some mystical echo of Elisheba, the wife of Aaron, the\nfirst priest, just as the Miriam of the Jesus birth-story reminds us of Miriam\nthe prophetess, the sister of Moses, the first prophet. If the pre-Christian\nPalestinian Dorshē Reshumōth may be thought incapable of going so far, the\nAlexandrian Jewish allegorists, to whose school Philo belonged, would, and\ndid, sublimate the sister or wife of a sage into a figure of his spiritual\nvirtue or power. This will become clearer later on.\n\n5 The Zacharias of\nLuke."

