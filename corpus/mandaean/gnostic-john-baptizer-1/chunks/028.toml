[content]
body = "5 Who, is not\nclear; perhaps Gnosis of Life, the M. Saviour.\n\n1 That is, after\nthe marriage-ceremony.\n\n2 This is\nunexplained, Lidzbarski thinks it means three births; but more probably it\nmeans three hours for sleep and three hours for prayer, and three again\nrepeated.\n\n3 Presumably the\nDivine Powers.\n\n4 That is, those\nfaithful to Truth. It refers to the M. Abode of the Blessed, Mshunē Kushṭā.\nShe is thus the personified Mother of the wife of Yahyā.\n\n5 These are\nelsewhere mostly names of heavenly beings and are in part to be paralleled\nwith the children of Eve (Hawwā) in the Genzā (R. 108). Handan is\notherwise unknown. Shar-rath may be Shar. who is elsewhere called \"the great,\nhidden First Vine, who bears a thousand times a thousand fruits and ten\nthousand times ten thousand shoots.\" Bihrām is a later form of the Avestan\nVerethragna; he is generally called 'the Great.' R'himath-Haiyē = the Living\nor Life's R. In the Qolastā or Liturgies there is a R'hum-Hai twice\nmentioned; he is 'Life's Beloved,' one of the four Sons of Light, or\nalternately of Salvation. Nṣab is elsewhere (§ 4, 8) called N. Zīwā, that is\nRadiant N.; he is regarded as the Great Watcher (§ 9), and his name means\n'Planter,' 'Fashioner.' Sām is also called S.-Haiyē. S. the Living; he too is\n'Watcher of the ćons' (G. R. 313, 12ff.), and his name means 'Stablisher.'\nAnhar-Zīwā or the Radiant A. is feminine (cp. § 69, 7); Anhar is elsewhere\ncalled the 'Hidden Light,' and her name means 'Lightener.' Can she then have\nany connection with the Iexai or Yechai, the complement of Elxai (the 'Hidden\nPower'), mentioned by Epiphanius? The muddled-up account of the Eschasćans in\nthe heresiological Fathers seems to me to have a close connection with the\nMandćan notions (see my D. J. L. 100 B.C.? —ch. xviii, 'Concerning the\nBook of Elxai,' pp. 365-387 (London, 1903), and Brandt's study, Elchasai:\nein Religionsstifter und sein Werk (Leipzig, 1912). The second Sherrath is\nevidently a doublet.\n\n1 That is,\nspiritual sense."

