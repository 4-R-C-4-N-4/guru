[content]
body = "Thereon they 3 fashioned for Yahyā a wife out of thee, thou Region of the Faithful. 4 From the first conception were Handan and Sharrath born. From the middle\nconception were Birhām and R'himath-Haiyē born. From the last conception were\nNṣab, Sām, Anhar-Zīwā <and Sharrath> born. 5 These three\nconceptions took place in thee, thou Ruins, Jerusalem.\n\nYahyā opened his mouth and spake to Anhar in Jerusalem: p. 54 \"Instruct thy daughter, that\nshe may not perish; and I will enlighten my sons and teach [them], that they\nmay not be hindered.\" Thereon Anhar opened her mouth and spoke to Yahyā in\nJerusalem. \"I have borne sons in this world,\" said she to him, \"yet have I\nnot given birth to [their] heart 1 in the world. If they\nlet themselves be instructed, then will they ascend to Light's region; if\nthey let not themselves be instructed, then will the blazing fire consume\nthem.\"\n\nJOHN ON HIS OWN PASSING (§ 31 CONTD.).\n\nYahyā opened his mouth and spake to Anhar in Jerusalem: \"If I leave the\nworld, tell me, what wilt thou do after me?\"—\"I will not eat and will not\ndrink,\" she answered him, \"until I see thee again.\"—\"A lie hast thou spoken,\nAnhar, and thy word has come forth in deception. If a day comes and goes,\nthou eatest and drinkest and forgettest me out of thy mind. I asked thee\nrather, by Great Life and by the eve of the Day whose name is dear: If I\nleave the world, tell me, what wilt thou do after me?\"—\" I will not wash and\nI will not comb me,\" says she to him, \"until I see thee again.\"—\"Again hast\nthou spoken a lie and thy word has come forth in deception. If a month comes\nand a month goes, thou washest and combest thee and forgettest me out of thy\nmind. Again did I ask thee, Anhar, by the first bed in which we both lie: If\nI leave my body, tell me, what wilt thou do after me?\"—\"I will put on no new\ngarments,\" she answers him, \"until I see thee again.\"—\"Again hast thou spoken p. 55 a lie, Anhar, and thy word has\ncome forth in deception. If a year comes and a year goes, thou puttest new\ngarments on thee and forgettest me out of thy mind.\"\n\n\"Why dost thou not tell me all, Yahyā,\" says she to him; \"and how\nsorely thou bruisest the whole of my body! If thou dost depart, when wilt\nthou return, that my eyes may fall upon thine?\"—\"If a woman in labour\ndescends into Sheōl 1 and a bell is hung up for her in the graveyard. If they paint a picture in\nSheōl, and she then goes forth and they give a feast in the graveyard. If a\nbride parades round in Sheōl, and they celebrate marriage in the graveyard.\nIf the wedding-companions borrow in Sheōl, and the paying-back takes place in\nthe graveyard.\" 2\n\nThen answered she him: \"My lord, how shall it be that a woman in labour\n. . . \"[and so on, repeating the above]."

