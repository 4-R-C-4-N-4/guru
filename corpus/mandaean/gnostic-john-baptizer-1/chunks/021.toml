[content]
body = "1 A technical\nterm—the things that 'fall short' as compared with the 'fulness' of\nperfection; cp. the plērōma and hysterēma of numerous Greek Gnostic documents.\n\n2 Brandt (Art. E.R.E. ) apologetically conjectures that this observance of Sun-day ( hab\nšabbā ) was taken over from Syro-Christian usage. But reverence for Sun-day\nis fundamental with the MM., and it is one of their celestial\npersonifications. The MM. loathed idolatry and sun-worship; they worshipped\nLife and Light, but may have venerated the light as the symbol of that Light.\nThe same puzzle occurs with the prayer-custom of the Essenes, who turned to\nthe rising sun in their morning orisons. The problem we have here to face is\nthe existence of a pre-Christian Sun-day as rigidly observed as the Jews and\nothers kept the Sabbath, and not a 'Pagan' holy-day.\n\n3 The twin\nJordan-Watchers.\n\n4 Sc . Life.\n\n5 The powers of\nthe Cosmic Animal-life Circle or Zodiac, which were held by the MM. to be\nequally inimical with the Seven. Both orders were sons of the World-mother\nNamrūs, generally called Rūhā, i.e. Spirit, the World-spirit, spirit\nhere being used in the wide-spread sense of the lower, animal spirit.\n\n6 Sc . the\nCelestial Man or Adam of Light.\n\n7 Rām the Great,\ncoupled also with Bīhrām (presumably the Pahlavi or Later Persian form, also\nBahrām = Avestan Verethragna).\n\n1 Not identified."

