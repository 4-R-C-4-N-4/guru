[content]
body = "YAHYĀ proclaims and speaks: \"Ye nobles, who lie there, ye ladies, who\nwill not awaken,—ye who lie there, what will you do on the Day of the\nJudgment? When the soul strips off the body, on Judgment-Day what will you\ndo? O thou distracted, jumbled-up world in ruin! Thy men die, and thy false\nscriptures are closed. Where is Adam, the First Man, who was here head of the p. 46 ćon? Where is Hawwā (Eve), his\nwife, out of whom the world was awakened to life? Where is Shit-il (Seth),\nson of Adam, out of whom worlds and ćons arose? Where is Rām and Rūd, who\nbelonged to the Age of the Sword? Where are Shurbai and Shar-hab-ēl, who\nbelonged to the Age of the Fire? Where is Shum bar Nū (Shem, son of Noah),\nwho belonged to the Age of the Flood? All have departed and have not returned\nand taken their seats as Guardians in this world. 1 [The Last Day] is like\na feast-day, for which the worlds and the ćons are waiting. The Planets are\n[like] fatted oxen, who stand there for the Day of the Slaughter. The\nchildren of this world are [like] fat rams, who stand in the markets for\nsale. 2 But as for my friends, who pay homage to Life, their sins and trangressions\nwill be forgiven them.\"\n\nAnd Life is victorious.\n\nTHE LETTER OF TRUTH (§ 26).\n\n[The introductory formula and beginning of this piece are missing from\nthe MSS.]\n\n*      *      *      *      *      *\n\n[Yōhānā is apparently speaking.]\n\nI TAKE no delight in the ćons, I take no delight in all of the worlds,\nI take no delight in the ćons   *   *   *\n*   *   *   *   *   *\n*   *   *   by the Letter of Truth 3 which has come hither.\n\nThey 4 took the Letter and put it in the hand of the Jews. p. 47 These open it, read in it and\nsee that it does not contain what they would, that it does not contain what\ntheir soul wills. They took the letter and put it in the hand of Yōhānā.\n\"Take, Rab Yōhānā,\" say they to him, \"Truth's Letter, which has come here to\nthee from thy Father.\" 1 Yōhānā opened it and read it and saw in it a wondrous writing. He opened it\nand read in it and became full of life. 2 \"This is,\" says he,\n\"what I would, and this does my soul will.\"\n\nYōhānā has left his body 3 ; his brothers make\nproclamations, his brothers proclaim unto him on the Mount, on Mount Karmel. 4 They 5 took the Letter and brought it to the Mount, to Mount Karmel. They read out\nof the Letter to them 6 and explain to them the writing,—to Yaqif and Beni-Amin and Shumēl. 7 They assemble on Mount Karmel.\n\n*      *      *      *      *      *"

