[content]
body = "JOHN AND THE BAPTISM OF JESUS (§ 30).\n\nYahyā proclaims in the nights, Yōhānā on the Night's\nevenings.\n\nYAHYĀ proclaims in the nights.—Glory rises over the worlds.\n\nWho told Yeshu (Eshu)? Who told Yeshu Messiah, son of Miryam, who told\nYeshu, so that he went to the shore of the Jordan and said [unto Yahyā]: \"Yahyā,\nbaptize me with thy baptizing and utter o'er me also the Name thy wont is to\nutter. If I show myself as thy pupil, I will remember thee then in my\nwriting; p. 49 I attest not myself as thy\npupil, then wipe out my name from thy page,\"\n\nThereon Yahyā answered Yeshu Messiah in Jerusalem: \"Thou hast lied to\nthe Jews and deceived the priests. Thou hast cut off their seed from the men\nand from the women bearing and being pregnant. The sabbath, which Moses made\nbinding, hast thou relaxed 1 in Jerusalem. Thou\nhast lied unto them with horns 2 and spread abroad\ndisgrace with the shofar.\"\n\nThereon Yeshu Messiah answered Yahyā in Jerusalem: \"If I have lied to\nthe Jews, may the blazing fire consume me. If I have deceived the priests, a\ndouble death will I die. If I have cut off their seed from the men, may I not\ncross o'er the End-Sea. If I have cut off from the women birth and being\npregnant, then is in sooth a judge raised up before me. If I have relaxed the\nsabbath, may the blazing fire consume me. If I have lied to the Jews, I will\ntread on thorns and thistles. If I have spread disgrace abroad with\nhorn-blowing, may my eyes then not light on Abathur. 3 So baptize me then\nwith thy baptizing, and utter o'er me the Name thy wont is to utter. If I\nshow myself as thy pupil, I will remember thee then in my writing; if I\nattest not myself as thy pupil, then wipe out my name from thy page.\"\n\nThen spake Yahyā to Yeshu Messiah in Jerusalem: \"A stammerer becomes\nnot a scholar, a blind man writes no letter. A desolate house 4 mounts not to the height, and a widow becomes not a virgin. Foul water\nbecomes not tasty, and a stone does not with oil soften.\"\n\nThereon Yeshu Messiah made answer to Yahyā in Jerusalem: \"A stammerer a\nscholar becomes, a blind man writes a letter. A desolate house mounts unto\nthe height, and a widow becomes a virgin. Foul water becomes tasty, and a\nstone with oil softens.\"\n\nThereon spake Yahyā unto Yeshu Messiah in Jerusalem: \"If p. 50 thou givest me illustration for\nthis, thou art [really] a wise Messiah.\"\n\nThereon Yeshu Messiah made answer to Yahyā in Jerusaem: \"A stammerer a\nscholar becomes: a child who comes from the bearer, blooms and grows big.\nThrough wages and alms he comes on high; he comes on high through wages and\nalms, and ascends and beholds the Light's region."

