[content]
body = "Then all of the priests arose and said to Old Father Zakhriā, [they\nsaid] in reproach: \"Be at rest and keep thy seat, Old Father, and let the\ncalm of the Good (pl.) rest upon thee. Old p. 39 Father, if there were no dreams\nin Judća, then would all that Mīshā has said, be lying. Rather shall thy word\nand our word be made good, and the dreams we have seen. Yōhānā will receive\nJordan and be called prophet in Jerusalem.\"\n\nThereon Old Father removed himself from their midst, and Elizar\nfollowed him. Then were seen three lights (lit. lamps) which companied with\nhim (Z.). They (the priests) ran up, caught Old Father by the hem of his robe\nand said to him: \"Old Father, what is 't that goes before thee, and what is\n't that follows thee?\" Then answered he them: \"O Elizar, thou great house,\nthou head of all of the priests, I know not whom the lights guard which go\nbefore me. I know not with whom the fire goes which follows me. [But] neither\nthrough me nor through you will Enishbai bear a child.\"\n\nThen all the priests rose and said to Old Father Zakhriā, [they said]\nin reproach: \"Old Father Zakhriā, be at peace, firm and decided, for the\nchild will be planted from out of the most high height and be given to thee\nin thy old age. Yōhānā will be born, Yōhānā will receive Jordan and be called\nprophet in Jerusalem. We will be baptized with his baptizing and with his\npure sign [will we] be signed. We will take his bread and drink his drink and\nwith him ascend to Light's region.\"\n\nAll the priests arose and said to Old Father Zakhriā, [they said] in\nreproach: \"Old Father! We will enlighten thee as to thy race 1 and thy fathers, from whom thou hast come forth. . . . [there follows a list\nof prophets and sages, beginning with Moses, which I omit, as it requires a\nlengthy commentary for which space here does not serve,—ending with]. . .\nṬāb-Yōmīn and the school-teachers have come forth from thy race. The blessed\nprinces, who are thy forbears, Old Father, all of them have taken no wife and\nbegotten no sons. 2 Yet in their old age 3 each of them p. 40 had a son. 1 They had sons, and they were prophets in Jerusalem. If now out of thee as\nwell a prophet comes forth, thou dost then revive this race again. Yea,\nYōhānā will be born and will be called prophet in Jerusalem.\"\n\nThen Elizar opened his mouth and said to Old Father: \"Old Father! If\nYōhānā receives Jordan, then will I be his servant, be baptized with his\nbaptizing and signed with his pure sign. We will take his bread and drink his\ndrink and with him ascend to Light's region.\" Then Old Father opened his\nmouth and said unto all of the priests: \"If the child comes out of the most\nhigh height, what then will you do in Jerusalem?\"\n\nThey 2 have taken the child out of the basin of Jordan and laid him in the womb of\nEnishbai.\n\nLife is victorious and victorious is the Man 3 who has come hither.\n\nJOHN'S PROCLAMATION CONCERNING HIMSELF AND HIS ASSUMPTION\nOF THE PROPHET'S MANTLE (§ 19)."

