[content]
body = "1 Sc . the\nrace of the righteous, of the spiritual or perfect. It has many names in\nmystical literature of the first centuries, as for instance in Philo, who\ndistinguishes 'race' and 'kin' of God from 'people' of God. See for references\nand quotations my Thrice-greatest Hermes (London, 1906), Index s.v. 'Race.'\n\n2 The same mystic\nidea underlies the words of Philo about the women Therapeuts ( D.V.C. ):\n\"Their longing is not for mortal children, but for a deathless progeny which\nthe soul that is in love with God can alone bring forth.\" See my translation\nin Fragments of a Faith Forgotten (London, 2nd ed., 1906), p. 75. It is\nthe Melchisedec motive also.\n\n3 The Later\nPlatonists glossed 'old age' as used by Plato to signify the age of wisdom.\n\n1 The prophets are\ngod-sons of their god-parents; father and son are the usual terms for the\nrelationship between master and pupil in sacred things.\n\n2 That is, the\nheavenly messengers.\n\n3 The Heavenly Man\nof Light. The Man-doctrine is an essential element of the Gnosis, as it was\nalso with Jesus. ('Son of Man' is the Aramćan idiom for 'Man' simply.) See\nReitzenstein's Poimandres (Leipzig, 1904), my Thrice-greatest Hermes (1906), and Bousset, op. cit. (1907), indexes.\n\n4 This\nintroductory formula, as is the case with other headings and conclusions, is\ndue to the collectors and editors. It is unexplained, but seems to refer to\nthe dark period before the dawn of the Day of Light which was expected. The\ndays of this age are spiritual nights. N.B. (a prophet\n'proclaims,' he does not 'preach.'\n\n5 This-World-rulers or Archontes, the Planets or Planetary Spirits, which the\nMM. regarded as evil powers. They are the 'Dead' as having no spiritual Life."

