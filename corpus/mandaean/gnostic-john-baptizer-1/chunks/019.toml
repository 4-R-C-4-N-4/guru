[content]
body = "4 Can this be\ncamouflage for Rabbi Eliazer ben Hyrcanus, the founder of the famous\nRabbinical school at Lud (Lydda) and teacher of Akiba? He flourished 70-100\nA.D. R. Eliazer was imprisoned for heresy; the Talmūd account connects this\naccusation of heresy with an interview between him and a certain Jacob of\nKephar Sechania, a city in lower Galilee, who is said to have been one of the\ndisciples of Jeshu ha-Notzri, i.e. J. the Nāzōrćan (see D.J.L. 100\nB.C.? —pp. 216 ff. for reference and discussion). But Eliazer is a name of\ngreat distinction in Pharisaic priestly tradition, especially that of the\nMaccabćan proto-martyr priest, the teacher of the martyred Seven Sons and the\nMother in IV. Maccabees .\n\np. 37\n\n1 Unidentified by\nL. Can it be camouflage for Tabbai, father of R. Jehuda, who was 'pair' to\nSimeon ben Shetach, in the Pal. Talmūd Jesus-story ( Chag . 77d), see\nMead, op. cit. , pp. 148f.\n\n2 The source of\nE.'s inspiration is the Earth; the source of John's is the Sun (see below §20— p. 43 ).\n\n3 This is most\nprobably Elijah (the Eliyahū of the O.T.); I owe this illuminating conjecture\nto Dr. M. Gaster. Is there here also a hidden reference to an existing 'School\nof the Prophets'?\n\np. 38\n\n1 This is the same\nmotive as that in the Talmūd Jesus-stories and Toldoth. It is the language of\npopular, Bazaar theological controversy, and is in keeping with Jewish\nfigurative diction in which 'fornication' is the general term for all lapses\nfrom right religious beliefs and views.\n\n2 ? in vision.\n\n3 Moses, son of 'Amram.\n\n4 Elsewhere we\nlearn that Zakhriā was 99 and Enishbai 88 at John's birth and that John\nhimself began his ministry at the age of 22. A mystic psephology is here\nclearly employed."

