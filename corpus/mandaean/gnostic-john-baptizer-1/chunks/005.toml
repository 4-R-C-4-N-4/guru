[content]
body = "The Sun opened his mouth and spake unto Yahyā: 2 \"Thou hast three\n[head-] bands [and] a crown which equals in worth the whole world. Thou hast\na ship of mashklil , 3 which sails about here\non the Jordan. Thou hast a great vessel which sails about here 'twixt the\nwaters. 4 If thou goest to the House of the Great [One], remember us in the Great's\npresence.\" Thereon Yahyā, opened his mouth and spake to the Sun in Jerusalem:\n\"Thou enquirest about the [head-] bands, may the Perfect (pl.) watch o'er thy\ncrown. This mashklil -ship they have carpentered together 5 with glorious splendour. On the vessel that sails 'twixt the waters, the seal\nof the King has been set. She 6 who in thy house 7 plays the wanton, goes hence and approaches the dung-house; 8 she seeks to have children from her own proper spouse, 9 and she does not find\nthem. If she then 10 has fulfilled her vow, and she departs, 11 she is unworthy for\nthe House of the Life and will not he alotted to the Light Dwelling.\n\nAnd praisčd be Life.\n\nJOHN THE ASCETIC (§ 21).\n\nYahyā proclaims in the nights, Yōhānā on the Night's\nevenings.\n\nYAHYĀ proclaims in the nights and speaks: \"Stand not I here alone? I go\nto and fro. Where is a prophet equal to me? Who makes proclamation equal to\nmy proclamations, and who doth discourse with my wondrous voice?\"\n\nWhen Yahyā thus spake, the two women weep. Miryai 1 and Enishbai weep, and for both tears flow. They say: \"We will go hence, and\ndo thou stay here; see that thou dost not bring us to stumble.—I (M.) will go\nhence, and do thou stay here; see that thou dost not bring me to stumble.—I\n(E.) will go hence, and do thou stay here; see that thou dost not fill me\nwith sorrow.\"\n\nThen Yahyā opened his mouth and spake to Enishbai in Jerusalem: \"Is\nthere any who could take my place in the height? Is there any who could take\nmy place in the height, so that thou mayest pay for me ransom? If thou canst\npay for me ransom, then bring thy jewels and ransom me. If thou canst pay for\nme ransom, then bring thy pearls and ransom me. If thou canst pay for me\nransom, then bring thy gold and ransom me.\" 2"

