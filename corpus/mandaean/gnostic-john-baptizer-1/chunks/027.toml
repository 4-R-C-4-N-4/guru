[content]
body = "1 The Lower\nSpirit, the This-World-Mother.\n\n2 Sc . of\nlight; cp. the great light that shone on Jordan at the baptizing of Jesus in\n'The Gospel according to the Hebrews,' Tatian's Diatessaron (Syriac,\n2nd half of 2nd cent.) also preserves this feature. Bar Ṣalibi ({d.} 1171)\nglosses this as follows: \"And immediately, as the Gospel of the Diatessaron\ntestifies, a mighty light flashed upon Jordan and the river was girdled with\nwhite clouds, and there appeared his many hosts that were uttering praise in\nthe air; and Jordan stood still from its flowing, though its waters were not\ntroubled, and a pleasant odour therefrom was wafted.\" There is a strong\nMandćan flavour about this gloss, which doubtless rested on early tradition.\nSee F. C. Burkitt, Evangelion da-Mepharreshe (Cambridge, 1904), ii.\n115. This is the Christian and not the M. 'cross,' as e.g. used in the\nbaptismal ceremony, which is made of a number of long sticks or wands, the\nends of which are stuck in the ground and the tops crossed one over the other\nto represent rays of light.\n\n3 The Jordan is\nwhite for the MM.; the various colours signify heresies.\n\n4 L. thinks that\nthis stands for Paul, and this is very probably so. But at the same time he\ninforms us that 'Paulus,' as Lorsback has shewn, is the equivalent of a\nPersian word meaning 'Deceiver.' It therefore may mean simply the Messiah\nDeceiver.\n\n5 Evidently a\n'font.'\n\np. 52\n\n1 The original\nsuggests a head-covering.\n\n2 We should have\nexpected 'crosier.' Is there word-play in all these terms?\n\n3 The celestial\nspheres.\n\n4 The\nWorld-Mother-Spirit."

