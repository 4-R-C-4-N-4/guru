[content]
body = "1 Zatan-Eṣṭūnā, a\nname found also in § 35— p. 67.\n\n2 Jesus is\nsometimes in the Talmūd referred to simply as 'a certain one' or 'that one.'\n\n3 Enoch.\n\n4 Uthra ( ūtrā )\nis a frequently occurring general term in Mandćan, of which the precise\nmeaning has not yet been determined; L. leaves it untranslated. Uthra means literally 'Riches,' 'Wealth'; and may very well then stand for the\nnotion of Treasure. It might even convey the idea of Fulness (Gk. Plērōma ),\nbut this is hazardous. The difficulty with Treasure is that there are also two\ntechnical M. terms for Treasure, Treasury or Treasure-house ( sc . of\nLife, cp. § 57, forewords). Uthra seems sometimes to equate with Angel;\nbut again this has a term for itself ( malaka ). In any case it means a\nheavenly or spiritual being, excarnate or incarnate, and therefore the phrase\nsignifies the Heavenly or Spiritual Enoch. See L.'s dissertation. ' Uthra\nund Malaka ,' in Orientalische Studien Theodor Nöldtke zum siebzigsten\nGeburtstag (12 Marz, 1906) gewidmet (Giesgen, 1906), pp. 537-545.\n\n5 Cp. with the\nabove threat of killing and the removal of the child the 'Slaughter of the\nInnocents' and the 'Flight into Egypt' motives of the parallel Chriatian\nstories. The 'little ones' is elsewhere found frequently in Mandćan as a\ntechnicnl term for the initiates of the community. The sacred drink, the mambūhā of the M. 'eucharist,' doubtless throws back to the Mazda-yasnian haōma . Parwan is mentioned only in this passage. It may, however, be a\nclerical error; for occasionally mention is made of a land called the 'pure\nTarwan.' Or is it Mt. Karmel?\n\n6 The numbers 99,\n88, and 22 seem to belong to some system of mystic psephology, Or gematria as the Kabbalists afterwards called it. Cp. the 888 value of the name of\nChrist in the second-century system of the Gnostic Markos and the 666 of the\nBeast in the Apacalypse. I would suggest, though with hesitation, that 10's,\nl00's and 1000's represent 'powers,' i.e. so-called higher or wider\nplanes of activity or development, and digits certain fundamental\ncharacteristics. In this connection it is of interest to note that such\nnumbers as 1111, 2222, occur in classical Pythagorean psephology.\n\n1 This is a\nreference to the heavenly cloud or surround; e.g. Enoch dwells in a\ncloud and from its matter fashions the body in which he appears upon earth or\nelsewhere in man-form.\n\n2 This spiritual\ngirdle is symbolized by the M. sacred cord of 60 threads; cp. the Parsī cord\nor kusti , composed of 72 strands and wound three times round the body,\nand also the Brāhmanical sacred thread."

