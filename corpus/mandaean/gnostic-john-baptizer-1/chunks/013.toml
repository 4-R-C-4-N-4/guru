[content]
body = "\"If thou knowest,\" he makes answer unto her, \"that this does never\nhappen, why dost thou press me with asking: When dost thou return? I go hence\nand return not. Happy the day when thou dost still see me. If there were a\ngoing-away and returning, then would no widow be found in this world. If\nthere were a going-away and returning, then would no fatherless be found in\nthe world. If there were a going-away and returning, then no Nazōrćans would\nbe found in the world.\"\n\nThereon Anhar opened her mouth and spake to Yahyā in Jerusalem: \"I will\nbuy thee for dear gold a brick grave 3 and have a boxing of\nwood 4 joinered together for thee in the graveyard.\" But Yahyā opened his mouth and\nspake to Anhar in Jerusalem: \"Why wilt thou buy a brick grave for dear gold\nand have a boxing of wood joinered for me in the graveyard? Art sure that I\nam p. 56 returning, that thou dost say:\nNo dust shall fall on him? Instead of buying a brick grave for dear gold, go\nrather and share out for me bread. Instead of getting a boxing joinered\ntogether, go rather and read for me masses for the departed.\"\n\nThereon Anhar opened her mouth and spake to Yahyā in Jerusalem: \"Thou\ndost go hence and forget me, and I shall be cut off in the Sinners'\nDwelling.\" 1\n\n[But Yahyā answered her:] \"If I forget thee, may the Light Dwelling\nforget me. If I forget thee, may my eyes not fall on Abathur. If I ascend to\nLife's House, thy wailing will arise in the graveyard.\"\n\nPraisčd be Life, and Life is victorious.\n\nJOHN'S BIRTH, UPBRINGING AND FIRST APPEARANCE (§ 32).\n\nYahyā proclaims in the nights, Yōhānā on the Night's\nevenings.\n\nYAHYĀ proclaims in the nights and speaks: \"The [heavenly] wheels and\nchariots quaked. Earth and Heaven weep and the tears of the Clouds flow\ndown.\"\n\n\"My father,\" says Yahyā, \"was ninety and nine and my mother eighty and\neight years old. Out of the basin of Jordan they 2 took me. They bore me\nup and laid me in the womb of Enishbai. 'Nine months,' said they, 'thou shalt\nstay in her womb, as do all other children.' 3 No wise woman,\" 4 said he, \"brought me into the world in Judća, and they have not cut my cord\nin Jerusalem. They made for me no picture of lies, and for me hung up no bell\nof deceit. 5 I was born from Enishbai in the region of Jerusalem.\"\n\nThe region of Jerusalem quakes and the wall of the priests rocks.\nElizar, the great house, stands there and his body trembles. The Jews gather\ntogether, come unto Old Father Zakhriā and they speak to him: \"O Old Father\nZakhriā, thou art to have a son. Tell us now, what name shall we give him?\nShall we give p. 57 him for name 'Yaqif of Wisdom,'\nthat he may teach the Book in Jerusalem? Or shall we give him for name 'Zatan\nthe Pillar.' 1 so that the Jews may swear by him and commit no deceit?\""

