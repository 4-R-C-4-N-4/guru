[content]
body = "\"A blind man who writes a letter: a villain who has become virtuous. He\nabandoned wantonness and abandoned theft and reached unto faith in almighty\nLife.\n\n\"A desolate house who ascends again to the height: one of position who\nhas become humble. He quitted his palaces and quitted his pride and built a\nhouse on the sea [-shore]. A house he built on the sea [-shore], and into it\nopened two doors, so that he might bring in unto him whoever lay down there\nin misery,—to him he opened the door and took him within to himself. If he\nwould eat, he laid for him a table with Truth, If he would drink, he mixed\nfor him [wine-] cups [with Truth], If he would lie down, he spread a bed for\nhim in Truth. If he would depart, he led him forth on the way of Truth. He\nled him forth on the way of Truth and of faith, and then he ascends and\nbeholds the Light's region.\n\n\"A widow who a virgin becomes: a woman who already in youth has been\nwidowed. She kept her shame closed, and sat there till her children were\ngrown. 1 If she passes over, her face does not pale in her husband's 2 presence.\n\n\"Foul water that is made tasty: a girl wanton who has got back her\nhonour: she went up a hamlet and she went down a hamlet without taking her\nveil from her face.\n\n\"A stone with oil softens: a heretic who has come down from the\nmountain. 3 He abandoned magic and sorcery and made p. 51 confession to almighty Life. He\nfound a fatherless and filled him full and filled full the widow's pockets.\n\n\"Therefor baptize me, O Yahyā, with thy baptizing and utter o'er me the\nName thy wont is to utter. If I show myself as thy pupil, I will remember\nthee in my writing; if I attest not myself as thy pupil, then wipe out my\nname from thy page. Thou wilt for thy sins be haled to account, and I for my\nsins will be haled to account.\"\n\nWhen Yeshu Messiah said this, there came a Letter out of the House of\nAbathur: \"Yahyā, baptize the deceiver in Jordan. Lead him down into the\nJordan and baptize him, and lead him up again to the shore, find there set\nhim.\"\n\nThen Rūhā 1 made herself like to a dove and threw a cross 2 over the Jordan. A\ncross she threw over the Jordan and made its water to change into various\ncolours. 3 \"O Jordan,\" she says, \"thou sanctifiest me and thou sanctifiest my seven\nsons.\"\n\n[Then follows what, from its animadversion on Christian institutions\nand especially on the use of the crucifix, is plainly a later addition. Rūhā\nis apparently still speaking; she is the Mother of all heresies.]\n\n\"The Jordan in which Messiah Paulis 4 was baptized, have I\nmade into a 'trough.' 5 The bread which Messiah Paulis receives, p. 52 have I made into a 'sacrament.'\nThe drink which Messiah Paulis receives, have I made into a 'supper.' The\nhead-band which Messiah Paulis receives, have I made into a 'priest-hood.' 1 The staff which Messiah Paulis receives, have I made into a 'dung [-stick].'\" 2"

