body = "2 Shem, son of\nNoah. The first age or world-period was that of Adam; the second, of Rām and\nRūd (fem.); the third, of Shurbai and Sharhab-ēl; the fourth, that of the\nFlood. The second generation perished by the sword and pestilence, the third\nby fire (cp. § 25 below ). The Indian yugas came\nfrom the same source. As to the prophetica1 vesture in this special\nconnection, apart from the more general wide-spread notion of the garment of\nlight or robe of glory, cp. the Rabbinical tradition in the medićval Yaschar or Sepher Hai-yaschar ( The Book of the Just , more\ncommonly known as The Book of the Generations of Adam or The Book of\nthe History of Man ) which contains ancient material, translated into\nFrench by Chevalier P. L. B. Drach: \"After the death of Adam and Eve the coats\n[ sc . of skin—see R. Eisler's brilliant conjecture that J. the B.\noutwardly assumed his camel's hair robe in memory of the first garments of the\nfallen protoplasts, as a sign of repentance, in the preceding study] were\ngiven to Enoch, son of Jared. Enoch, at the time of his being taken to God,\ngave them to his son Methusaleh. After the death of Methusaleh, Noah took them\nand hid them in the Ark. Ham stole them, and hid them so successfully that his\nbrethren were unable to find them. Ham gave them secretly to his eldest son,\nChus, who made a mystery of it to his brothers and sons. When Nimrod [ =\nZoroaster, see Bousset, op. cit. , index] reached the age of 20 years,\nhe (Chus) clothed him with the vesture, which gave him extraordinary strength\"\nMigne, Dic. des Apocryphes , ii. 1102, 1150; and see my World-Mystery (London, 2nd ed., 1907), § 'The Soul-Vestures,' pp. 115ff.). It would not be\ndifficult to penetrate under the camouflage of the Rabbinic tradition,\nbut space does not serve.\n\n3 Sc . the\nbody.\n\n4 Mystice 'this world'?\n\n5 The\nprison-houses of the Seven and Twelve.\n\np. 43\n\n1 All was at\npeace, the Sun shining brightly, the Moon sunk in the darkness beneath. Cp.\n'The Mystic Hymnody' at the end of 'The Secret Sermon on the Mountain' ( Corp.\nHerm. xiii-xiv., Mead ii. 230): \"Ye Heavens open, and ye Winds stay still;\n[and] let God's Deathless Sphere receive my word!\"\n\n2 Note that it is\nthe Earth that speaks to Elizar (§ 18— p. 37 ),\nsignifying the lower source of his inspiration.\n\n3 Meaning not yet\ndetermined; L. thinks it means some sort of wood, but this does not seem to be\nvery appropriate.\n\n4 Sc . the\nwaters above and the waters below the firmament.\n\n5 For the\nCarpenter-motive in connection with the John-Noah hewing of the timber for the\nsalvation-ark-building see the previous study and especially the Samaritan\nMidrash concering the S. Ta'eb (Deliverer or Messiah) and the mystic ark of\nconversion (pp. 8 and 21f.)."

