[content]
body = "2 This seems\ncryptically to refer to some Gnostic scripture prior to John.\n\n3 Sc . in\ntrance.\n\n4 Ṣúfis would at\nonce conclude that this refers to the Dīvān, the nightly Meeting of the\nPerfect in spirit presided over by the Quṭb (Pillar or Axis), the Head of the\nage. Mt. Karmel is identified with the story of Elijah and has always\ncontinued to be a sacred mount. Doubtless communities of 'Sons of the\nProphets' and the rest had coutinuously there their retreats. Can it be that\nṬāb Yōmīn went to Mt. Karmel to find Lilyukh (Eli-yahu)? Karmel = the Garden\nor Garden-land. It had been a sacred spot long before the days of Elijah, who\nhid there from his pursuors in its numerous grottos. The Arabs still call it\nJebal Mar Elyas (Mount Lord Elijah). Yamblichus in his Life of the sage\nsays that Pythagoras visited it.\n\n5 Sc . the\nheavenly messengers.\n\n6 Sc . the\nbrethren who had equally 'left the body.'\n\n7 Plainly Samuel.\n\n8 Mandā d'Haiyē,\nthe M. Saviour; he is 'far from the height' because he is the Exile, the\nStranger, in this world.\n\n9 The higher\nOgdoad; I conjucture, therefore, that this is a more ancient piece. The\nJohn-gnosis had depressed the Eight and the Seven and Twelve to the infernals,\nyet retained memory of a Great Eight and the rest.\n\np. 48\n\n1 Clearly Gnosis\nof Life, the Son of God and Father of John."

