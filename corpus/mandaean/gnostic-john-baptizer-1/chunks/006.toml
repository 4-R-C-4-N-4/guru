[content]
body = "Thereon Enishbai opened her mouth and spake to Yahyā in Jerusalem: \"Who\nis thy equal in Judća, who is thy equal in Jerusalem, that I should look on\nhim and forget thee?\"—\"Who is my equal, who is my equal, that thou shouldst\nlook on him and forget me? Before my voice and the voice of my proclamations\nthe Torah disappeared in Jerusalem. Before the voice of my discourse the\nreaders read no more in Jerusalem. The wantons cease from their lewdness, and\nthe women go not forth to the . . . . Hither [to me] come the brides in their\nwreaths, and their tears flow down to the earth. The child in the womb of his\nmother heard my voice and did weep. The merchants trade not in Judća, p. 45 and the fishers fish not in\nJerusalem. 1 The women of Israel dress not in dresses of colour, 2 the brides wear no\ngold and the ladies no jewels. Women and men look no more at their face in a\nmirror. Before my voice and the voice of my proclamations the water rose up\nto the pillars. 3 Because of my voice and the voice of my proclamations the fish brought to me\ntheir greetings. Before my voice and the voice of my proclamations the birds\nmade obeisance and said: \"Well for thee, and again well for thee, Yahyā, and\nwell for the Man whom thou dost worship. Thou hast set thyself free and won\nthy release, O Yahyā, and left the world empty. The women have not led thee\naway with their lewdness, and their words have not made thee distracted.\nThrough sweet savours and scents thou hast not forgotten thy Lord from thy\nmind. Thou has not made thyself drunken with wine and hast done no deeds of\nimpiety. No backsliding has seized on thee in Jerusalem. Thou hast set\nthyself free and won thy release and set up thy throne for thee in Life's\nHouse.\"\n\nAnd Life is victorious.\n\nOF JUDGMENT-DAY (§ 25).\n\nYahyā proclaims in the nights, Yōhānā on the Night's\nevenings."

