[content]
body = "[What follows is presumably the beginning of the Letter.]\n\nGnosis of Life 8 who is far from the height [writes]:\n\n\"I have come unto thee, O Soul, whom Life has sent into this world. In\nrobes of the Eight 9 went I into the world. I went in the vesture of Life and came into the world.\nThe vesture I brought of the Seven, I went as far as the Eight. The vesture\nof the Seven I took and took hold of the Eight with my hand. [I have p. 48 taken them] and I take them,\nand I will take them and not let them go. I have taken them and hold them\nfast, and the wicked spirits shall change into good.\n\n\"Wherefor do ye weep, generations, wherefor weep ye, O peoples?\nWherefor fadeth your splendour? For you have I brought my Image, I betook\nmyself into the world.\"\n\nAnd Life is victorious.\n\nJOHN'S INVULNERABILITY (§ 27).\n\nYahyā proclaims in the nights, Yōhānā on the Night's\nevenings.\n\nYAHYĀ proclaims in the nights and speaks: \"Is there anyone greater than\nI? They measure my works; my wage is assayed and my crown, and my praise\nbrings me on high in peace.\"   *   *   *\n\nYaqif leaves the house of the people, Beni-Amin leaves the temple,\nElizar, the great house, leaves the dome of the priests. The priests spake\nunto Yahyā in Jerusalem: \"Yahyā, go forth from our city! Before thy voice\nquaked the house of the people, at the sound of thy proclamations the temple\ndid quake, at the sound of thy discourse quaked the priests' dome.\" Thereon\nYahyā answered the priests in Jerusalem: \"Bring fire and burn me; bring sword\nand hew me in pieces.\" But the priests in Jerusalem answered to Yahyā: \"Fire\ndoes not burn thee, O Yahyā, for Life's Name has been uttered o'er thee. A\nsword does not hew thee in pieces, O Yahyā, for Life's Son 1 rests here upon thee.\"\n\nAnd Life is victorious."

