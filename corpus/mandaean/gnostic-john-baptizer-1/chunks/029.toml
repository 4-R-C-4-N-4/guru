[content]
body = "1 That is, dies.\n\n2 It was the\npopular custom apparently, which, however, the Mandćans did not follow, when a\nwoman was in labour, to ring a bell to ward off evil influences (cp. the\nEgyptian sistrum); and a picture (or pantacle) also, with a similar apotropaic\npurpose, was painted. If the birth was successful, a birth-feast was given. It\nwas also the custom, when bride and groom were poor, for their friends to\nborrow money or to bail for the expenses of the wedding-festivities.\n\n3 L. prefers to\ntranslate this as 'vault,' but he seems to me to miss the meaning and that too\nin face of his own note, where he admits that the first word simply means\n'brick.'\n\n4 Both references\nseem to refer to Egyptian motives in burial customs. For the extraordinarily\ninteresting deduction to be made from this hint in connection with a striking\nphrase in one of the following Miryai-pieces (§ 35) see the note appended\nthere ( p. 69, n. 3 ).\n\np. 56\n\n1 That is the\nDwelling of the Seven Rulers, and therefore this world.\n\n2 Sc . the\nheavenly messengers.\n\n3 This is perhaps\nto guard against docetism.\n\n4 Presumably =\nmidwife.\n\n5 See above § 31,— p. 55, n. 2 ."

