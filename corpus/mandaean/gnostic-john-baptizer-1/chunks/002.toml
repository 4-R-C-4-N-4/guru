[content]
body = "When Lilyukh heard this, he cast dust on his head. Naked, Lilyukh rose\nfrom his bed and fetched the dream-book. He opens it and reads in it and\nlooks for what stands there written. He opens it and reads therein and\ninterprets the dreams in silence without reading aloud. He writes them in a\nletter and expounds them on a leaf. In it he says to them: \"Woe unto you, all\nof you priests, for Enishbai shall bear a child. Woe unto you, ye rabbis, for\na child shall be born in Jerusalem. Woe unto you, ye teachers and pupils, for\nEnishbai shall bear a child, woe unto you, Mistress Torah (the Law), for\nYōhānā shall be born in Jerusalem.\"\n\nLilyukh writes unto them in the letter and says to them: \"The star,\nthat came and stood over Enishbai: A child will be planted out of the height\nfrom above; he comes and will be given unto Enishbai. The fire, that burned\nin Old Father Zakhriā: Yōhānā will be born in Jerusalem.\"\n\nṬāb-Yōmīn took the letter and in haste made off to Jerusalem. p. 38 He came and found all the\npriests sitting in sorrow. He took the letter and laid it in the hand of\nElizar. He (E.) opens it and reads it and finds in it wondrous discourses. He\nopens it and reads it and sees what stands therein written. He reads it in\nsilence and gives them no decision about it. Elizar then took it and laid it\nin the hand of Old Father Zakhriā. He (Z.) opens it and reads it and sees\nwhat stands therein written. He reads it in silence and gives no decision\nabout it. Elizar now opened his mouth and spake to Old Father Zakhriā: \"Old\nFather, get thee gone from Judća, lest thou stir up strife in Jerusalem.\" Old\nFather then raised his right hand and smote on the head Elizar: \"Elizar, thou\ngreat house, thou head of all the priests! If thou in thy inner [part]\nknewest thy mother, thou wouldst not dare come into our synagogue. If thou in\nthy inner [part] knewest, thou wouldst not dare read the Torah. For thy\nmother was a wanton. 1 A wanton was she, who did not match with the house of her husband's father.\nAs thy father had not the hundred gold staters for writing her the bill of\ndivorcement, he abandoned her straightway and enquired not for her. Is there\na day when I come and look forth, 2 and see not Mīshā bar\nAmrā? 3 Yea, is there a day when I come without praying in your synagogue, that you\n(pl.) should be false and dishonest and say a word which you have ne'er heard\nabout me? Where is there a dead man who becomes living again, that Enishbai\nshould bear a child? Where is there a blind man who becomes seeing, where is\nthere a lame man for whom his feet [walk again], and where is there a mute\nwho learns [to read in] a book, that Enishbai should bear a child? It is two\nand twenty years 4 to-day that I have seen no wife. Nay, neither through me nor through you will\nEnishbai bear a child.\""

