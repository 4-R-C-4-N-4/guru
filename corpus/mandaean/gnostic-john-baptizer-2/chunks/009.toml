[content]
body = "5 'Fishes' and\n'birds' are the new 'hearers' of the faith.\n\n1 Presumably kept\nhidden, or made conditions concerning their revelation.\n\n2 Compare with the\nabove eloquent invitation to return the similar motive in the Talmūd Jesus\nstories: (1) \"When King Jannai directed the destruction of the Rabbis. R.\nJoshua ben Perachiah and Jeshu went to Alexandria. When security returned, R.\nSimeon ben Shetach sent him a letter to this effect: From me, Jerusalem the\nholy city, to thee, Alexandria in Egypt, my sister. My spouse tarries in thee,\nand I dwell desolate'\" ( Bab. Sandedrim , 107b, Sota , 47a). (2)\n\"The inhabitants of Jerusalem intended to appoint Jehuda ben Tabbai as Nasi\n[Prince or President of the Sanhedrim] in Jerusalem. He fled and went away to\nAlexandria, and the inhabitants of Jerusalem wrote: 'From Jerusalem the Great\nto Alexandria the Little: How long lives my betrothed with thee, whilst I am\nsitting grieving for him?'\" ( Pal. Chagiga , 77d). See my D. J. L. 100\nB.C.? —pp. 137ff., 148ff.—for a discussion of these passages. Can Tabbai\npossibly in any way connect with the Ṭāb-Yōmīn of the Portents-piece § 18 ?\n\n1 Clearly\nindicating that the Mandā was originally not Jewish.\n\n2 Heb. ḥallah ,\nthe priests' share of the dough, Cp.\nLev. 15:20, 21: \"Of the first of your dough (marg. coarse meal) ye shall\noffer up a cake for a heave-offering.\""

