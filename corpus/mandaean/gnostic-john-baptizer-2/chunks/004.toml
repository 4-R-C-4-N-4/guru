[content]
body = "Then made he answer unto them: \"You had better not to have known, my\nbrothers, what has become of those birds. Slingshots drove them far from me;\ntheir wings broke; torn off were they, broken off; they went hence and relied\non the bird-catchers. 1 The harrier and hawk wheeled round them, tore pieces out of their flesh and\nfed on those who were fat. Woe to those who fell prey to the water, 2 if there was no portion for them at the crossing. Well for you, ye birds, who\nhold fast to this vine [here]; you became a companionship of Miryai, the\nvine, who stands at the mouth of Euphrates. See and satisfy yourselves, ye\nbirds, that I have come to you. I have come to my brothers to be a support\nfor them in this world. I have come to heal Miryai, [come] to bring water to\nthe good, beloved plants, to the vines, who stand at the mouth of Euphrates.\nIn a white 3 pail I draw water and bring it to my plants. I bear and I hold [it] on the\narms of glory which are my own. I bear and I hold [it] and give [them] to\ndrink. Well for him who has drunk of my water. He drinks, finds healing and\nconfirmation, and grows to double [his stature]. The vines who drank water,\nbrought forth good fruit. Their leaves turned on high and made a brave show.\nThe branches which drank no water, brought forth bitter herbs and worm-wood\n(?). Woe to those who have not gone forward upon the Way; woe to those who\nhave not passed on by the way-stone! They hated Life's Treasure-House, 4 Miryai, the dear Truth.\n\n\"My brothers, hold fast, be a companionship of Miryai. I will look\nround in the world, let Life's call sound forth and rouse the sleeping and\nwake [them].\"\n\nThe eagle flew off from the tree; he wheeled round and instructed his\nfriends. He speaks to them: \"Give ear to me, my p. 67 brothers! Stay fast and endure\npersecution. Be a companionship to Miryai. Woe to the Jews, who were a\npersecution for Miryai! Woe to Elizar, the great house, the pillar that props\nthe temple! Woe to Zatan, the pillar, 1 who has witnessed lies\nagainst Miryai!\"\n\nTHE JEWS PERSECUTE THE MANDĆANS (§ 35 CONTD.).\n\nALL the Jews gathered together, the teachers, the great and the little;\nthey came [together] and spake of Miryai: \"She ran away from the priests,\nfell in love with a man, and they took hold of each other's hands. Hold of\neach other's hands they took, went forth and settled at the mouth of\nEuphrates. We will slay them and make Miryai scorned in Jerusalem. A stake 2 will we set up for the man who has ruined Miryai and led her away. There\nshall be no day in the world when a stranger 3 enters Jerusalem.\"\n\nThey split open their fellings and catch the doves in Jerusalem. 4\n\nTHEY BEG THEM TO RETURN (§ 35 CONTD.)."

