[content]
body = "p. 62\n\nMIRYAI IS EXPELLED FROM JEWRY (§ 34).\n\nIn the Name of Great Life, may hallowed Light be glorified.\n\nMIRYAI am I, of the Kings of Babel 1 a daughter, a daughter\nof Jerasalem's mighty rulers. They have given me birth; the priests brought\nme up. In the fold of their robe they carried me up into the dark house, into\nthe temple. Adonai laid a charge on my hands and on my two arms: I must scour\nand cleanse the house [that is] without firmness. There is naght therein for\nsupporting the poor, naught to revive the tormented souls.\n\nMy father went to the house of the people, my mother went to the\ntemple. My father went out and said to me, and my mother went out and charged\nme: \"Miryai, close thy inner doors and bolt the bar. See that thou goest not\nforth into the main streets and that the suns of my Lord 2 fall not upon thee.\"\n\nBut I, Miryai, listened not to what my mother did tell me, and\nhearkened not with the ear to what my father did charge me. I opened the\ninner doors, and the outer let I stand open. Out went I into the main streets\nand the suns of my Lord fell upon me. To the house of the people would\nI not go, but my way bore me unto the temple [ sc . of the Mandćans]. I\nwent and I found my brothers and sisters, how they stand and carry on\nproclamations. My brothers carry on proclamations and my sisters throw out\nexplanations. 3 With the voice of their proclamations and with the voice of their\nexplanations I became drowsy and laid me down on the spot. 4 My brothers went forth and did not wake me, and my sisters withdrew and\nroused me not. But thou, my sister in Truth, 5 dost rouse me from\nsleep and dost say: \"Arise, arise, Miryai, before the day breaks and the cock\nlets crow his morn-call, before the sun shines and his glory rises over the p. 63 worlds, before the priests and\nthe priests' sons go forth and sit them down in the shade of the\nRuins—Jerusalem, before thy father comes and brings upset upon thee such as\nthou never hast had.\"\n\nI, Miryai, keep secret my prayers and utterly secret keep my\ndiscourses.\n\nEarly, day began to dawn, early the cock let crow his call, early the\nsun shone and his glory rose over the worlds. The priests and priests' sons\nwent out and sat them down in the shade of the Ruins—Jerusalem. Then came my\nbodily father and brought on me upset such as I never have had. He spake:\n\n\"Where hast come from, thou debauched trough, whom [? locks] and bars\n[cannot keep in]? Where hast thou come from? Woe [unto thee], thou bitch in\nheat, who [? mindest] not [door-] pins and lockings! Where hast thou come\nfrom? Woe, woe [unto thee], thou bit of coarse stuff that has been patched on\nmy robe!\"\n\n\"If I am a debauched trough, I will burst thy [boltings] and bars. If I\nam a bitch in beat, I will draw back the pins and the lockings. If I am a bit\nof coarse stuff that has been patched on thy robe, then out of thy robe cut\nand rip me.\""

