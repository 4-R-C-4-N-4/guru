body = "2 Presumably\nAdonai; M.'s Lord is (below) the King of Light and later on her Lord is Gnosis\nof Life.\n\n3 Cp. the\nprophesyings and interpretations of Early Christendom and the 'glossolaly' of\nthe earliest Pauline communities.\n\n4 M. became\nentranced.\n\n5 Presumably a\nheavenly visitant.\n\np. 63\n\n1 Ṭuṭiftā =\nHeb. tefillīm .\n\n2 Cp. § 22, 'the\npure burzinqā ,' and J. B., pp. 30 1 and 50 1 .\n\np. 65\n\n1 The whole\ndescription is intentionally symbolic or allegorical.\n\n2 The White Eagle\nis manifestly Gnosis of Life."

