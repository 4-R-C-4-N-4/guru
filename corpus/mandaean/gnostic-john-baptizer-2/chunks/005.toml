[content]
body = "ALL the Jews gathered together and followed after Miryai. They went and\nfound that a throne was set up for Miryai on the bank of Euphrates. A white\nstnndard was for her unfurled and a book stood upright on her lap. She reads\nin the Books of Truth and rouses all worlds from their sleep. She holds in\nher hand the staff of Life's water; the girdle is bound round her loins.\nMiryai in humbleness prays and proclaims with wondrous voice. The fishes\ngather out of the sea, the birds 5 from the mouth of\nEuphrates. They come to hear Miryai's voice, and no more long to lie down to\nsleep. They breathe in the sweet scent around her and forget the world. p. 68 When the Jews saw this, they\nstood up before her. They felt shamed, doubled their fists, smote on the\nfore-court of their breast and lamented. The mother of Miryai spoke, and\ntears streamed into her bosom.\n\n\"Look on me, Miryai, my daughter,\" says she unto her; \"look on me who\nam thy mother! My daughter art thou and the daughter of all of the priests.\nThy head is the great chief of the temple. Rememberest thou not, Miryai, that\nthe Torah lay on thy lap? Thou didst open it, read therein and knewest what\nstands in it. The outer keys lay in thy hands, and the inner thou didst put\nin chains. 1 All the priests and priests' sons came and kissed thy hand. For whom thou\nwouldst, thou didst open the door; whom thou wouldst not, must turn and go\nback to his seat. A thousand stand there and two thousand sit there. They\nsubmit themselves to thee, as a eunuch-made slave, and they give ear to thy\nword in Jerusalem. Why didst thou forget thy brothers and thy heart abandon\nthe priests? Lo, the brides weep in Judća, the women and men in Jerusalem.\nTheir beloved gold have they cast from them, and they give themselves up to\nwailing and mourning for thee. They say: 'We will make away with our goods,\nuntil Miryai returns. Gold forge we [? no longer], and cast away fair\nraiments of silk and bracelets (?).' They stand on the roofs and look out,\nthat they may see thee again in Jerusalem. For thee they make vows, if thou\ncomest to me and we go hence. My daughter, arise, come back to thy\ndwelling-place, the city Jerusalem. Come, light up thy lamps, which have been\nput out from the day when thou withdrewest thyself. 2 Have no longing after\nthis man, who has prisoned thee and taken thee off. Leave p. 69 the man, who is not of thy\ndwelling-place, 1 alone by himself in the world. Let him not say: I have gone and carried off\nMiryai from her place. Come, teach the children, so that they may learn. Lay\nthe Torah in thy lap and let us hear thy voice as it used to be. From the\nmoment and the day when thou didst detach the dough 2 has it been covered up\n... ....\"\n\nWhen Miryai heard this from her mother, she laughed and rejoiced in her\nmind. \"It surely could not be the Jews,\" says she unto her, \"the\ninfamous, worthless priests! It surely would not be the Jews who stand there\nand bow down to a brick-grave! 3 They shall be buried\nin the Darkness."

