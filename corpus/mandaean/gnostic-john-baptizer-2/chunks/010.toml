body = "3 Cp. L.'s note\n(p. 114 2 ), referring to the above-quoted (p. 68, n. 2) Talmūd\npassage (1), where the same bowing down is recorded of Jeshu, namely: \"he set\nup a brick-bat and worshipped it.\" L. again prefers to render the two words\nhere as 'vault' simply. The Talmūd puzzle has never been solved; but the\npassage of the J. B. above ( p. 55 ) connects\nit with a coffin, and strongly suggests an Egyptian atmosphere. Cp. now what\nJosephus ( Antiqq . I. ii.; Cory's An. Fragg . pp. 171, 172),\nHebraďzing the Egyptian tradition, says of the Sons of Sēth ( = Sōthis =\nSirius), how \"they made two [kinds of] monuments, one of brick and the other\nof stone, and on each engraved their discoveries.\" This passage is from\nManetho's lost work Sothis , on the authenticity of which and its\nimplications, I would refer the reader to my lengthy researches in Thrice-greatest Hermes , i. 99-127: the above passage will be found on p.\n114. From this I would venture to suggest that the Talmūd charge against Jeshu\nof learning 'magic' in Egypt is reflected in the queer term 'brick-bat' or\n'bricking.' According to Manetho's legend or tradition the most ancient lore\nof the priests, of the period of the First Thoth or Hermes, before the Flood,\nwas preserved in the most primitive brick pyramids. The pyramids were\noriginally tombs. That my suggested version is in the right direction is borne\nout by the following sentence of the text: \"They shall be buried in the\nDarkness.\"\n\n4 A common Gnostic\nfigure, appearing frequently in Manichćism. In the Christianized Gnosis it is\nthe technical term for the unripe birth from Achamōth, the Wisdom Without. For\nthe most interesting echo in the N.T. cp. Paul's famous utterance: \"And last\nof all he appeared unto me also, as unto 'the Abortion'\"— sc . of whom\nyou have all heard.\n\n5 This is\npresumably ironical = \"who thought that ye were not of this world.\"\n\n1 That is,\npresumably, fill the whole of the worlds in their span.\n\n2 The MM.\nevidently believed that the destruction of Jerusalem was a retribution for the\npersecution of their community."

