[content]
body = "Thou hast won the victory, Gnosis of Life, and helped all thy friends\nto victory.\n\nAnd Life is victorious.\n\nTHE EXILED COMMUNITY SETTLE ON THE EUPHRATES (§ 35).\n\nIn the Name of Great Life, may hallowed Light be glorified.\n\nMIRYAI am I, a vine, a tree, who stands at the mouth of Eu-phrates (Frash).\nThe tree's leaves are precious stones, the tree's fruits pearls. The\nvine-tree's foliage is glory, its shoots precious light. Among the trees its\nscent it diffuses, and it spreads over all the worlds. The birds of the air\nscented it; a flock settled down on the tree. A flock on it down-settled, and\nthey would build their nest there. They flutter about in it and settle not\ndown in it firmly. Of its foliage they eat . . . from its inner part they\ndrink wine. They eat what is not to be cast away, and drink what was not\nwine. 1\n\nWhile the birds sat on the vine, winds and tempests broke loose. They\nshook the good birdlets awake, they smote 'gainst the tree; on all sides they\nscattered the leaves of the vine-tree and scared the birds out of their\nplace. Many a bird there was who flew not away, but held on fast with claws\nand with wings, till the winds and the tempests were over. Many again held\nnot on fast and were hurried away ... . Woe unto those who did not hold fast,\nbut were dashed from the tree and flew off. How fair is the tree of Life and\nfair the birds who dwell on it!\n\nThe winds and the tempests passed and rest came over the world.\n\nAs the birds sit there and chirp and would be a-building their nest, as\nthe birds sit on the vine, an eagle wheeled and flew hither. A white\neagle-bird 2 came, looked down and caught sight of the birds. Round wheeled he, sped down\non them with his wings, and came and sat on the tree. In converse with him\njoined the birds, and said to him:\n\n\"By thy Life, Eagle! On this tree were we birds without number.—But\nthere broke loose against them the winds, and on the tree came raging\ntempests. They shook them off from the tree, so that they tore their wings\nfrom them [nearly]. Many a one held fast, whom the winds and tempests could\nnot tear away; but many a one flew off at top speed.—We speak to thee,\ntherefore, p. 66 O Eagle, we ask thee respecting\nthe birds, because thou art sharp of sight and dost see all in this world:\nWhat have the winds and the tempests done with those birds, our brothers?\nWhat spyest thou out (?) over them?\""

