[content]
body = "\"Go, go,\" says she unto them, \"ye fools, ye abortions, 4 ye who were not of the world. 5 I am no woman who is\nstripped for wantoning; and it is not that I have fallen in love with a man.\nStripped am I not for returning to you and for again seeing you, doming of\nblasphemy. Go, go hence from me, ye who have witnessed falsehood and lying\nagainst me. Against me ye witnessed p. 70 wantonness and thieving, and\nheld me up as ye are yourselves. Blessed be the Man who freed me from my\nfetters and planted my feet here. No wantonness have I committed with him and\nattempted no theft in the world. Instead of the witness ye have witnessed\nagainst me, there come to me prayer and praise-giving.\"\n\nAs the priests stand there and speak with Miryai at the mouth of\nEuphrates, there came a pure eagle-bird, whose wings are the fulness of\nworlds. 1 He flew down on the Jews, dashed at them with his wings, bound them and sank\nthem down unto the water's bottom, deeper [down] than the foul-smelling mud.\nHe sank them deeper down than the blazing [water], that is inside the dark\nwater. He sank their ships down to the blazing water's bottom. He destroyed\nthe temple and laid fire to Jerusalem. 2\n\nHe brought down all upon them and in Jerusalem slew the disciples.\n\nHe descended unto her (Miryai), folded before her his wings, settled\ndown by her, narrated and proclaimed to her; and they held out the loved hand\nof Truth to each other. He embraced her in potent embracing, forced her down\nand set her on the throne.\n\n\"Miryai,\" he speaks to her, \"with favour look upon me, remember me in\nthe Life's presence. I am thy Good Messenger, the Man, who gives ear to thy\ndiscourse. I beseech thee for the high Truth, the Truth which the Jordans\nhave chosen.\"\n\n\"O Good Treasure,\" she makes answer unto him, \"Treasure whom Life has\nsent! Thy glory and thy light has risen upon us, and thy honour is approved\nin Light's region. Everyone who gives ear to thy voice, will be in the pure\nregion included. In Life's Treasury will he be included and thy rays will\nrise [over him] twofold. For everyone who gives not ear to thy voice, waking\nand sleep will be wiped out. Let him belong to the Jews, to the slaves and\nall of the priests, the sons of the Harlot. I and thou will circle aloft and\nvictorious mount to Light's region.\"\n\nMay Life be our pledge, and Life is victorious."

