[content]
body = "p. 66\n\n1 Presumably the\nSeven.\n\n2 Presumably the\nEnd-Sea.\n\n3 White for\npurity, the M. colour par excellence . The water is of course the Living\nWater or Water of Life.\n\n4 Or Treasury,\nSīmath-Haiyē, a feminine personification, called elsewhere the Mother of all\nthe [Light] Kings'; she is par excellence the Treasure or Treasury of\nLight.\n\np. 67\n\n1 Mentioned also\nin § 32 , but unexplained.\n\n2 In the Lud (cp.\nnote on R. Eliezar, founder of the Lud school in § 18, p. 34) Ben Stada Talmūd\nJesus stories, Jeshu is stoned and hanged on a stake afterwards (see D. J.\nL. 100 B.C.? —pp. 176ff.). It was the custom for the dead body after the\nstoning ( e.g. of an adulterer, or of a fornicator— i.e. heretic)\nto be exposed on a stake or post.\n\n3 Gnosis of Life\nis called the Stranger ( sc . to the world) par excellence .\n\n4 The MM. were\nbitterly persecuted. The fellings or slaughterings of the 'trees' and the\nsnaring or imprisonment of the 'doves' refer to the martyrdom of the faithful.\nCp. the hewing-down of the 'trees' in the Synoptic John-sermon and also the\nJohn-Jonah (Dove) word-play."

