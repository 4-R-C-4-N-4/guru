[content]
body = "Thereon he cried: \"Come (pl.), look on Miryai, who has left Jewry and\ngone to make love with her lord. Come, look on Miryai, who has left off\ncoloured raiment and gone to make love with her lord. She forsook gold and\nsilver and went to make love with her lord. She forsook the phylacteries 1 and went to make love with the man with the head-band.\" 2\n\nThen Miryai makes answer unto him: \"Far lies it from me to love him\nwhom I have hated. Far lies it from me to hate him whom I have loved. Nay,\nfar from me lies it to hate my Lord, the Life's Gnosis, who is for me in the\nworld a support. A support is he in the world for me and a helper in the\nLight's region. Dust in the mouth of the Jews, ashes in the mouth of all of\nthe priests! May the dung that is under the feet of the horses, come on the\nhigh ones and Jerusalem's mighty rulers.\"\n\nLife is exalted and is victorious, and victorious is the\nMan who has come hither.\n\nA VARIANT OF THE ABOVE FROM THE OXFORD MS. (L.'s J. B., pp.\n123-125).\n\nIn the name of Great Life, may hallowed Light be glorified.\n\nAT the door of the house of the people her mother came upon Miryai. Her\nmother came upon Miryai and put question to her: \"Whence com'st thou, my\ndaughter, Miryai, whose face gathers roses? Roses gathers thy face and of\nsleep are thy eyes full. Full of sleep are thy eyes, and upon thy forehead\nlies slumber.\"\n\nThereon she made answer: \"It is two,—three days to-day that my brothers\nsat down in the house of my Father. In my Father's house sat down my brothers\nand let wonderful proclamations be heard. Because of the voice and the\nringing of the proclamation of the treasures, my brothers, there comes no\nsleep over my eyes. Sleep comes not over my eyes, nor slumber upon my\nforehead.\"\n\n\"Hast thou not heard, Miryai, my daughter, what the Jews are saying\nabout thee? The Jews are saying: Thy daughter has fallen in love with a man.\nShe has gotten hate against Jewry and love for Nazōrćanity. Hate has she\ngotten against the house of the people and love for the door of the temple ( sc .\nof the MM.). Hate has she gotten against the phylacteries and love for the\nflaunting wreaths. Work does she on Sabbath; on Sunday she keeps her hands\nstill. Miryai has cast aside straightway the Law that the Seven have laid\n[upon us].\"\n\nAs Miryai stands there, she puts dust on her feet, and speaks: \"Dust in\nthe mouth of the Jews and ashes in the mouth of all of the priests! May the\ndung that lies under the horses, come on the elders who are in Jerusalem! I\ncannot hate him whose love I have won, nor love him 'gainst whom I have\ngotten hate. Yea, I have won the love of my Lord the Life's Gnosis, [and\nhope] that in him a helper will for me arise, a helper and a support from the\nregion of Darkness unto Light's region.\""

