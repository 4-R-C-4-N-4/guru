[content]
body = "p. 71\n\n1 This section is\nthe most difficult of all to translate owing to the abundance of technical\nfishing terms. In spite of marvellous philological industry and wide-flung\nenquiries L. has been unable to identify a number of words.\n\n2 Sc . the\nfaithful.\n\np. 72\n\n1 Sc . the\nSeven.\n\n2 Lit. 'on the\nhigh seas' L. glosses this as meaning that they are not river fish; but this\nseems to me unnecessary, as my rendering suggests.\n\n3 Used apparently\nby the fish-seller for advertising his wares.\n\np. 73\n\n1 Evidently a\nwind-instrument of some kind.\n\n2 Presumably a\nwater-bird."

