[content]
body = "My sons! See that you are not hinters and that your eyes make no\nsuggestions [ sc . to women]. For the hinters and wink-givers will be\nassigned to the guard-stations. To the guard-stations will they be assigned\nand be judged with stern justice.\n\nMy sons! See that you eat not up interest and interest on interest,\nelse in the dark mountain will you receive judgment.\n\nMy sons! See that you pay no homage to the idols, the satans and\ndemons, to the worship of idols and to the lusts of this world; for on the\ngodlings and satans will a stern judgment fall, and they who pray to them\nwill not ascend to Life's house and not look on Light's region.\n\nGive heed to what I have charged you, and let no evidence be given of\ncrime and of lying; on evidence of crime and of lying you will be haled to\naccount 'fore the judge. You will be haled to p. 93 account 'fore the judge who\njudges all worlds. He judges each one according to his works and his merit.\n\nMy sons! All that is hateful to you, do not to your neighbours; for in\nthe world into which you have come, is a heavy justice and judgment. Heavy\njustice and judgment is there therein, and every day will minds made secure\nin it be chosen. For everyone who is laden, mounts upward; but he who is\nempty is judged here. Woe to the empty, who stands empty there in the house\nof the collectors of taxes. When he had it in his hand, he gave nothing;\nthere will he search in his pocket and he will find nothing. The wicked and\nliars will be hurled into the Darkness. They will into the blazing fire cast,\ninto the blazing fire will they cast him into whose ears the call has been\nmade, but he woald not give ear. I showed it him unto his eye, but he would\nnot see; I showed it him, but he would not see with his eye.\n\nLife is victorious, and victorious is the Man who has come\nhither.\n\nThe Mandæans possess a rich collection of liturgical songs and hymns\nwhich Lidzbarski has translated for the first time in his excellent edition of\nthem ( Mandäische Liturgien , Berlin, 1920). From these 236 hymns we\nchoose one of the most typical as a specimen, and as perhaps of more than\nordinary interest to the general reader who may have puzzled over the\nunqualified beatitude \"Blessed are the poor.\" It is taken from the Oxford\nCollection (Bk. I., No. lvi.) and may be entitled:\n\nTHE SONG OF THE POOR'S EXALTATION.\n\nIn the Name of Great Life may hallowed Light be glorified."

