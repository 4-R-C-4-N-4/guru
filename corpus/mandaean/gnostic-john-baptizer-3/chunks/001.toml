[content]
body = "p. 71\n\nUNDER the first two headings readers have been made acquainted with all\nthose pieces from the Mandæan John-Book that can be held to have in any sense\na historic intention. To these are now added a few extracts of such specimens\nof the rest of the contents as do not require a commentary.\n\nWe will begin with 'The Fisher of Souls' tractate from the John-Book. It\nseems to me to throw great light on the symbolic phrase of the gospels, indeed\nto give it a background, and not to be explained in reverse order as the\nMandæan expansion of an isolated Christian expression.\n\nTHE FISHER OF SOULS SAGA (§§ 36-39) 1 .\n\nIn the Name of Great Life may hallowed Light be glorified.\n\nA FISHER am I, a Fisher who elect is among fishers. A Fisher am I who\namong the fishers is chosen, the Head of all catchers of fish. I know the\nshallows of the waters, the inner . . . and the . . . I fathom; I come to the\nnet-grounds, to the shallows and all fishing-spots, and search the marsh in\nthe dark all over. My boat is not cut off [from the others] and I shall not\nbe stopped in the night.\n\nI see the fish 2 in (? on) the dike. I pressed forward on the way with a . . . that was not of\niron. I covered (?) the . . . which was for us an obstruction. Aside did I\npush the swimmers p. 72 who hinder Life's way. On my\nhead I set up a . . . in whose shadow the fish sit. The fisher-trident which\nI have in my hand, is instead a margnā select, a staff of pure water,\nat whose sight tremble the fishers.\n\nI sit in a boat of glory and come into this world (Tibil) of the\nfleeting. I come to the water's surface; thither to the surface of the water\nI drew, and I drew to the crossing's surface. I come in a . . . , in slow,\nsteady course. The water by my boat is not ruffled, and no sound of my boat\nis heard. Before me stands Hibil (Abel), at my side Shitil (Seth) of sweet\nname is to be seen, close by me, close in front of me, Anōsh (Enoch) sits and\nproclaims.\n\nThey say: \"O Father, Good Fisher, hallo! O Fisher of loveable name!\"\n\nClose by me, close near my boat, I hear the uproar (?) of the fishers,\nthe fishers who eat fish, 1 and their stench\nrushes on me,—the uproar of the fishers and the uproar of their mongers who\nrevile and curse one another. Everyone accuses the other. The buyer says to\nthe fisher: \"[Take back?] thy fish! They are stinking already, and no one\nwants to buy them off of me. Thou makest the catch far out at sea, 2 so that loss falls on the buyer.\""

