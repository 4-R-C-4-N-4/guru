[content]
body = "3 Sc . Life.\nThe concluding paragraph runs on without break in the German, being assigned\nto the same speaker; but the subject is clearly changed and the whole spirit\nis different. The Good Shepherd now seeks for the lost sheep and does not\nleave it to perish.\n\n1 In § 9 ( p. 39 ) N. is called the Watcher who has his\nstation in every region, i.e. the Great Watcher.\n\n1 Y. is the Helper\nor Saviour. The shekīnah or celestial abode of Yawar, the Chosen, is the Home\nof the Blessed ( cp . J.B. 189 4 ).\n\n1 Kannā . L.\nleaves this technical term untranslated; but in note 4 to p. 4 he shows that\nit frequently means a wine-cup or wine-bowl. I would therefore venture to\nconnect it with the widespread notion of the kratēr or mixing-bowl of\nsouls as handed on, for instance, by Plato in the Timæus, presumably from\nHither Asian sources. One of the treatises of the Corpus Hermeticum is\ncalled 'The Cup' or 'The Bowl,' or alternatively 'The Monad.' It was not only\nthe source of souls, but also the Mind into which they had to be dowsed for\nspiritual baptism or regeneration.\n\n2 Presumably the\nrays of glory, signifying a state of contemplation.\n\n3 The supernal\npowers.\n\n4 I can find no\nexplanation of this occasionally recurring figure; it indubitably goes back to\nsome ancient myth."

