[content]
body = "But I made answer unto them: \"O ye fishers, who lap up your filth, no\nfisher am I who fishes for fish, and I was not formed for an eater of filth.\nA Fisher am I of souls who bear witness to Life. A Poor Fisher am I who calls\nto the souls, collects them together and gives them instruction. He calls to\nthem and bids them come and gather together unto him. He says unto them: If\nye . . . come, ye shall be saved from the foul-smelling birds I will save my\nfriends, bring them on high and in my ship make them stand upright. I will\nclothe them with vestures of glory and with precious light will enwrap them.\nI will put a crown of æther upon them and what else for them the Greatness\nerects on their head. Then sit they on thrones and in precious light do they\nglisten. I bear them thither and raise them aloft; but ye Seven shall stay\nhere behind. The portion of filth and of filthy p. 75 doings shall be your portion.\nOn the day when the Light ascends, the Darkness will return to its region. I\nand my disciples will ascend and behold the Light's region.\"\n\nLife is exalted and is victorious, and victorious is the\nMan who has come hither.\n\nTHE LIGHT-SHIP OF THE FISHER (§ 37).\n\nIn the Name of Great Life may hallowed Light be glorified.\n\nA FISHER am I of Great Life, a Fisher am I of the Mighty; a Fisher am I\nof Great Life, an Envoy whom Life has sent. It (Life) spake unto me: \"Go,\ncatch fish who do not eat filth, fish who do not eat water-fennel and reek\nnot of foul-smelling fennel. They do not come nigh to devour bad dates and\nget caught in the nets of the marsh.\"\n\nLife knotted for me a noose and built for me a ship that fades not,—a\nship whose wings are of glory, that sails along as in flight, and from it the\nwings will not be torn off. 'Tis a well-furnished ship and sails on in the\nheart of the heaven. Its ropes are ropes of glory and a rudder of Truth is\nthere to it. Sunday takes hold of the pole, Life's Son seized the rudder.\nThey draw thither to the shekīnahs and dispense Light among the treasures.\nThrones in them ( sc . the shekīnahs) they set up, and long drawn out\ncome the Jordans upon them. On the bow are set lamps that in the wildest of\ntempests are not put out. All ships that sight me, make obeisance\nsubmissively to me. Submissively they make me obeisance and come to show\ntheir devotion unto me.\n\nIn the bows stands the Fisher and delivers wondrous discourses. [There\nare] lamps [there], whose wicks shift not hither and thither, and a . . . is\nnot by him. He wears no ring of Deception, and with white robes is he clad.\nHe calls to the fish of the sea and speaks to them: \"Give heed to yourselves\nin the world! Beware of the foul-smelling birds who are above you. If you\ngive heed to yourselves my brothers, I will for you p. 76 be a succour,—a succour and a\nsupport out of the regions of Darkness unto Light's region.\"\n\nLife is exalted and is victorious, and victorious is the\nMan who has come hither."

