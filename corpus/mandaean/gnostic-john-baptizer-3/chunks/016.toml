[content]
body = "That the moral instruction given to the Mandæans is excellent may be\nseen in almost any piece; but there are distinctive collections of ethical\nexhortation of which the following is an example.\n\nEXHORTATIONS (§ 47).\n\nFROM the Light-region have I (Life's Gnosis) come forth, from thee,\nthou glorious dwelling. With vestures of glory have I been clad and a crown\nof victory on my head has been set. I came and found the Nazōræans, how they\nstand on the shore of the Jordan. I set up my throne and sat down, as a\nfather who sits 'midst his sons.\n\nThe Good sits there and teaches his sons all truth, in which is no\nerror.\n\nMy sons! See that you commit no adultery; see that you no theft commit.\nThey who commit adultery and who steal, mount not up to Life's house. They\nmount not up to Life's house and do not behold Light's region.\n\nMy sons! See that you practise no magic and afflict not the soul in the\nbody. The magicians and falsificators are hurled into seething pots and fire\nis their judge.\n\nMy sons! See that ye remove not the boundaries, that the boundary-stone\nyou displace not. The eye of those who remove boundaries looks not on the\nLight.\n\nMy sons! See that you do not abandon the slave to the hands of his\nmaster and the slave-girl to the hands of her mistress; abandon not the weak\nto the strong. [He who acts otherwise] will be fettered in a distant region,\nin the tax-gatherers' house; 1 his eyes behold only\nthe Darkness and his foot finds no firm ground.\n\nMy sons! See that you take not [to wife] a slave-girl who has not been\nmade free, and thereby bring your sons into the house of a master. For if the\nslave one day sins, then on the day when his master passes judgment upon him,\nwill the sins which the slave commits, fall on the head of his father."

