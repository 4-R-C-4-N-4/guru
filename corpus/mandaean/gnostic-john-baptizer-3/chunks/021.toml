[content]
body = "p. 81\n\n1 The salt,\nbitter, water of the sea of death and destruction, as opposed to the fresh,\nsweet water, the living water or water of Life.\n\n2 Equating with\nthe Heavenly Jordan.\n\n3 All symbolic\nobjects in the cult.\n\n4 Sc . the\nknife or sword of the Angel of Death.\n\np. 82\n\n1 This may mean at\na certain period or appointed time.\n\n2 The faithful are\nfigured as birds as well as sheep.\n\n3 An\nuntranslatable idiom.\n\n4 Sc . of\nthis world."

