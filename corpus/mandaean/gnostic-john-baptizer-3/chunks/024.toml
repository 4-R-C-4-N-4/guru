body = "1 In a number of\nthe Gnostic systems of the Early Christian period the body of the first man is\nsaid to lie like a log till the light-spark is breathed into him.\n\n2 Sc . the\nheavenly powers.\n\n3 Presumably Adam\n\n1 The region of\nthe lower world-rulers.\n\n1 Or \"One of the\nPoor am I,\" Compare the Ebionīm or Poor of early Christianity; the Poor\n(spiritually) are those who have voluntarily renounced this world's goods."

