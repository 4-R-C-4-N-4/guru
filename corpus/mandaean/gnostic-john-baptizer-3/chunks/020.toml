[content]
body = "1 The Mandæan\ncolour is white.\n\n2 In the M. text,\n146, 12, this is given as Sidmā. L. thinks it is a water-fowl of some kind.\n\n3 Presumably\nbecause it is always diving after its prey.\n\n4 Sc . the\nSeven.\n\n1 Sc . to\nfrighten the fish into the nets.\n\n2 The\nJordan-Watchers.\n\n1 Bait of some\nkind presumably.\n\n2 Detailing\nprobably the remaining two of the four objects referred to."

