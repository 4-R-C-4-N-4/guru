[content]
body = "The Treasury am I, Life's Treasury. A crown I became for Life's Gnosis.\nHe bestowed on me the rulership over the treasures and the shekīnahs which\nare there [yonder].\n\nThe Treasury am I, Life's Treasury. Of the light-worlds was I the\nenlightener. Day in and day out they sing praise to Great [Life], and through\nme they mount upward and behold the Light's region.\n\nThe Treasury am I, Life's Treasury. A vesture for the light-worlds\nbecame I.\n\n[The Treasury] am I, Life's Treasury. A King for the Nazōræans became\nI. I became a King for the Nazōræans, who through my Name find praise and\nassurance. Praise and assurance they find through my Name, and on my Name\nthey mount up and behold the Light's region. For the Men of purity put to the\ntest—[for them] their eye became full of Light. Full of Light was their eye,\nand in their heart Life's Gnosis took seat. Whoever of me, Life's Treasury,\nmakes his investment, loves not gold and silver, loves not gold and\npossessions, [loves not] food of the body, and envy with him has no place.\nEnvy found with him no place, and he did not forget his night-prayer. He\nforgot not the discourses and writings, and he forsook not his Lord's word.\nHe forsook not the prayer of his Father, Life's Gnosis; wherefor into the\ngreat End-Sea he falls not. He forgot not Sunday, nor did he neglect the\nDay's evening. He forgot not the way of Great [Life, the way] of wages and\nalms. He will be rapt away in the night-prayer, he will be rapt away in\nshining vestures which have come from Great [Life]. Treasures for him fill up\nwhat falls short, and what is empty they load for him full. If he bears a\npure load, he is counted with the Men of piety put to the test who separate\nthemselves [from the world] in the Name of Yawar. 1 Life's p. 88 Treasury rested upon them, to\ntheir form it gave light, and for them a way to Great [Life's] House has been\nestablished.\n\nI have called with clear voice and directed hereto the disciples: \"The\nvine who bears fruit, doth ascend; who bears none will here be cut off.\nWhosoever lets himself be enlightened through me and instructed, ascends and\nbeholds the Light's region; whoever does not let himself be enlightened\nthrough me and instructed, is cut off and falls into the great End-Sea.\"\n\nLife is exalted and is victorious, and victorious is the\nMan who has come hither."

