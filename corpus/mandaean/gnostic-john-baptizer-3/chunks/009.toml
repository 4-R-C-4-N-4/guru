[content]
body = "When they heard this from the Fisher who has come hither, and\nunderstood, they spake to him: \"Have compassion, forbearance and mercy on us\nand forgive us our sins and transgressions. We are thy slaves, show thyself\nindulgent towards us. We will look after thy fish that none of them fails. We\nwill be the servants of thy disciples, who name thy Name in Truth. We will\ncontinue to look after all who name thy Name.\"\n\nLife is exalted and is victorious, and victorious in the\nMan who has come hither.\n\nOther pieces set forth such figures as those of 'The p. 81 Heavenly Plough' and of 'The\nSowers'; but perhaps the most interesting is the saga of 'The Good Shepherd.'\nHere again it is difficult to believe that it was derived from Christian\nsources; it seems to be as independent as the 'Fisher of Souls' figure. The\n'discourse' runs as follows:\n\nTHE GOOD SHEPHERD (§ 11).\n\nIn the Name of Great Life may hallowed Light be glorified.\n\nA SHEPHERD am I who loves his sheep; sheep and lambs I watch over.\nRound my neck [I carry] the sheep; and the sheep from the hamlet stray not. I\ncarry them not to the sea-shore, that they see not the whirl of the water,\nmay not be afraid of the water, and if they are thirsty may not drink of the\nwater. 1 I bear them away [from the sea], and water them with the cup of my hand,\nuntil they have drunken their fill. I bring them unto the good fold; and they\nfeed by my side. From the mouth of Euphrates, from the mouth of Euphrates the\nRadiant, 2 things of marvellous goodness I brought them. I brought them myrtle, white\nsesame brought them and brought them bright standards. 3 I cleansed them and\nwashed them and made them to smell the sweet odour of Life. I put round them\na girdle, at sight of which the wolves tremble. No wolf leaps into our fold;\nand of no fierce lion need they be alarmed. Of the tempest they need not be\nfrightened; and no thief can break in upon us. A thief breaks not into their\nfold; and of a knife 4 they need not be anxious. When my sheep were quietly laid down and my head\nlay there on the threshold, a rift was rent in the height and thunder did\nthunder behind me. The clouds seized hold one of another, p. 82 and unchained were the raging\ntempests. Rain poured down in sheets and hail that smites elephants low, hail\nthat shatters the mountains. And the tempests unchain themselves in an hour. 1 Seas burst forth; they flooded the whole of the world. There, under the\nwater, no one escaped, once he sank from the height as into a gulf. The water\nswept off everyone who had no wings or no feet. 2 He speeds on, and\nknows not he speeds; he goes, and knows not he goes. Thereupon I sprang up\nand I entered the fold to bear my sheep forth from their place. I saw my eyes\nfull. 3 I saw the sea, I saw the fierce-raging tempest, I saw the storm-clouds that\nsend forth no [friendly] greeting the one to the other. Ten-thousand times\nten-thousand dragons are in each single cloud. I weep for my sheep, and my\nsheep weep for themselves. The little lambs are lamenting who cannot come out\nof the fold's door."

