[content]
body = "When the Fisher heard this, he stamped on the bows of the ship. The\nFisher stamped on the ships of the fishers; the fishers lie in the shallows\nclose crowded together, tied up together like bundles of wheat, and cannot\nrise up. The reeds swish ..., 3 and the fish of the\nsea lie over the fishers. They snarl in the marsh and the water rings them\nround in its circle (?).\n\nThen shrilling he spake with his voice. He discoursed with his voice\nsublime and spake to the catchers of fish: \"Off from me, p. 78 ye foul-smelling fishers, ye\nfishers who mix poison. Begone, begone, catch fish, who [eat?] your own\nfilth. Down with you to your ... and go to the end of the crossing. I am no\nFisher who catches fish, and my fish are tested. They are not caught by the\nhook with bad dates, a mess which [my?] fish do not eat. They fall not into\nthe nets that are coloured 1 and turn not to the\nlamps of the Lie. They sink not down through the mud of the water, and go not\nafter the ... of Deception. They (? the nets) divide not the water * * * * *\n*, that shall fall on the good. If the fishers cast o'er them the cast-net,\nthey tear asunder the net and set themselves free. There will be no day in\nthis world on which the fishers catch [my?] fish. There will be no day in\nthis world on which the dove loves the ravens. Accursèd be ye, ye\nfoul-smelling birds, and accursèd your nest, so that it may not be filled.\nWoe to your father Sirmā, 2 whose bed is in the\nreeds. Woe to thee, hungry Safnā, whose wings do not dry in this world. 3 Woe to thee, foul-smelling Sagiā, thou who seest the fish and sighest [for\nthem]. He shrieks and cries bitterly, when he strikes for the fish and misses\nthem. Woe to thee, Arbānā ..., thou who haulest the fish out of the deeps.\nWell for him who frees himself from the talons of those who catch fish. Well\nfor him who frees himself from the men who are watchers of this world. Begone,\nbegone with you, ye Planets, be of your own houses a portion. Water does not\nmix with pitch, and the Light is not reckoned as Darkness. The perfect ones'\npartner cannot be called your partner. The good (sing.) cannot belong to the\nwicked (pl.) nor the bad to the good. Your ship cannot be tied up with mine,\nnor your ring (?) be laid on my ring. There, is the head of all of you; count\nyourselves unto his realm! This your crass father stays stuck in the\nblack water. Your mother, who nets nets and heavy double machines, have I\nbeaten with the staff of (living) water and smashed a hole in her head. I\nlead on my friends, raise them on high in my ship and guide them past all the\ntax-gatherers. 4 I guide them through the passage of outrage, p. 79 the region where the fishes are\ntaken. I make them escape the filth-eaters. But ye will come to an end in\nyour dwellings. I and my friends of the Truth will find a place in Life's\nshekīnah. Into the height will I bear them on thrones surrounded with\nstandards of glory."

