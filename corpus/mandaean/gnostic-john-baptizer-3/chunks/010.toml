[content]
body = "When then * * * * * *, I entered the house, 4 I mounted up to the\nhighest place [in it], and I call to my sheep. To the sheep in my care do I\ncall. I pipe to them; I get them to hear, so that they come unto me. To them\nI pipe on my pipe, and beat on my tabour (?), [leading them] to the water. 5 I call to them: \"My little sheep, little sheep, come! Rise up at my call!\nCome, rise at my call; then will you 'scape the cloud-dragons. Come, come\nunto me! I am a shepherd whose boat is soon coming. My boat of glory is\ncoming; and I come with it, and bring my sheep and lambs in aboard it. Every\none who gives ear to my call and heed gives unto my voice, and who turns his\ngaze unto me, of him take I hold with my hands and bring him unto me inboard\nmy boat.\" But every lamb, male and female, that suffered himself to be\ncaught, the water-whirl carried away, the greedy water did swallow. Whoever\ngave no ear to my call, sank under. To the highest part of the vessel I went.\nThe bows stand up with the bow-post. 6 I say: How woeful am I\nfor my sheep who p. 83 because of the mud have sunk\nunder. The water-whirl sank them away from my reach, the swirling whirl of\nthe water. How grieved am I for the rams whose fleece on their sides has\ndragged them down into the deep. How grieved am I for the lambkins whose\nbellies have not [yet] been filled full of milk. Of a thousand, one I\nrecovered; of a whole generation I found again two. Happy is he who [stood\nup?] in the water, and in whose ears no water has entered. Happy the great\nrams who have stamped with their feet. Happy is he who has escaped from the\nSeven and Twelve, the sheep-stealers. Happy is he who has not couched down,\nhas not lain down, has not loved to sleep deeply. Happy is he who in this\ndefective age of Bishlom 1 has stayed whole. Happy are they who free themselves from the snares of Rūhā\n(the Mother World-Spirit), from the filth and the shame and the bondage that\nhave no end. My chosen! whoever shall live at the end of this age of Nirig\n(Mars), for him let his own conscience be a support. He will come and mount\nup to the Radiant Dwelling, to the region whose sun never sets, and whose\nlight-lamps 2 never darken.\n\nLife is exalted and is victorious, and victorious is the\nMan who has come hither.\n\nTHE LOVING SHEPHERDS OF THE GOOD SHEPHERD (§ 12).\n\nIn the Name of Great Life may hallowed Light be glorified.\n\nA TREASURE calls from without hither and speaks:\n\n\"Come, be for me a loving shepherd and watch me a thousand out of ten\nthousand.\"—\n\n\"So then will I be a loving shepherd for thee and watch thee a thousand\nout of ten thousand. But how full is the world of vileness and sown full of\nthorns and of thistles!\"—"

