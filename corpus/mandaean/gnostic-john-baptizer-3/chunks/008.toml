[content]
body = "The Seven are vanquished and the Stranger-Man stays victorious. The Man\nof piety put to the test was victorious and helped the whole of his race unto\nvictory.\n\nLife is exalted and is victorious, and victorious is the\nMan who has come hither.\n\nTHE FINAL SUBMISSION OF THE EVIL FISHERS (§ 39).\n\nIn the Name of Great Life may hallowed Light be glorified.\n\n'TIS the voice of the Pure Fisher who calls and instructs the fish of\nthe sea in the shallows. He speaks to them: \"Raise your ... up, on the\nsurface of the water stand upright; then will your force be double as great.\nGuard yourselves from the fishers who catch the fish and beat on the Jordan. 1 Shilmai and Nidbai 2 curse them, and they depart and settle themselves down behind me a mile off.\nThe fish curse their casting-net in their place.\"\n\nWhen the Fisher thus spake, warning all [of the fish, when] the fishers\nhis voice heard, they came up and gathered around him. They put themselves\nforward to ask of him questions, and knew not whence he came. \"Where wast\nthou, Fisher,\" they ask him, \"that we heard not thy voice in the marsh? Thy\nship is not like our ship, and thy ... is not * * * * * *. Thy ship is not\ntarred over with pitch, and thou art not like the fishers of this world.\"\n\nThe fishers see him, become scarlet for shame and remain standing in\ntheir places. They say to him: \"Whence comes it p. 80 that thou dost fish without\nfinding? Thy ship is not like our ship; it shines by night like the sun. Thy\nship is perfected in æther, and wondrous standards are unfurled above it. Our\nship sails along in the water, but thy ship between the waters. Our reeds (?\nrods) grumble at one another and break into pieces. Among them is the\nfish-trident of wrath, on which ... and ... ... are not. Thy ... ... O\nFisher, is such that when the fish see it, they take themselves off. We have\nnot yet seen any fishers which are like unto thee. The wind wafts thy ship\non, the mast ... ... for the fisher and a rudder that gleams in the\nwater-shallows. On thy cast-net is no cord, and they have not laid ... ... 1 round it. There are no ... in it, which are a cunning device against the fish\nof the ... ... ... . Thou keepest thy yarn and hast no clapper and no\nhatchet. Thy yarn ( = net) fishes not in the water and is not coloured for\ncatching fish.\"\n\nWhen the fishers thus spake, the Fisher made answer unto them: \"Have\ndone, ye fishers and fishers' sons; off, get you gone from me! Off, go up to\nyour village, the Ruins, Jerusalem. Ask about me of your father, who knows\nme, ask of your mother, who is my maid-servant. Say to him: There is a Fisher\nin the boat, in which are four ... . [There is] a rudder, and it stands\nthere, and a mast ... ... ... ... 2 and redemptions. They\nlay waste the land of Jerusalem.\""

