[content]
body = "3 Sc . to\ndry in the sun.\n\n1 K. is the\ninfernal river which the souls have to cross after death; its waters are\nfigured as dragons and its waves as scorpions (§ 51). Ulai is also a river. If\nit is in any way connected with the Eulæus from which the Kings of Persia are\nfabled to have drunk, the sense is hard to find. It is more probably an\ninfernal stream, at any rate one from which the evil fishers drank.\n\n1 Uncertain. Père\nAnastase of Baghdad informs L. that now-a-days a bell is attached to the\nrudder-bar; but here it seems to have some connection with the axe.\n\n1 L. suggests so\nas to seek the spawning places or in order to hide themselves.\n\n2 The numerous\ngaps which have to be left owing to uncertainty of translation make a number\nof the above sentences unintelligible. The concluding paragraphs are\npresumably an allegory of the attractions of false religions, and can hardly\nbe thought to be part of the speech of the fishers.\n\n3 Presumably as\nthe waves made by the foundering ships reach the shore."

