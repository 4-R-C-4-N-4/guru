[content]
body = "\"Who will come, who tell me what was before this? When the heaven was\nnot yet outspread and stars were not yet in it figured, when the earth was\nnot yet condensed and into the water no condensation had fallen, when sun and\nmoon came not as yet into this world, how was the soul then?\"\n\n\"When the soul still sat in the Bowl, 1 she felt neither\nhunger nor thirst. When the soul still sat in the Bowl, she had no pains and\nno faults. When the soul still sat in the Bowl, she felt no cold and no heat.\nWhen she still sat in the Bowl, the locks on her forehead 2 were incurled, and an æther-crown sat on her head. Her eyes were light-rays\n(?), and they gazed on the region of the House of Great [Life]. Her mouth was\nof pure[st] perfection, and sang the praise of the King of Light's region.\n\n\"From the day when the Wicked began to think, evil pictured itself\nforth in him. He fell into great wrath and ventured a fight with the Light.\nThe Envoy was sent to tread down the power of the rebels.\n\n\"They 3 brought living water and into the muddy water they poured it. They brought\nlight-giving light and into the gloomful darkness they cast it. They brought\nthe delightsome wind and into the frantic wind cast it. They brought the\nliving fire and into the consuming fire cast it. They brought the soul, the\npure mind, and into the vain body cast it.\n\n\"Out of fire and of water was the one heaven spread out. Out of fire\nand of water have they made dense the earth on the anvil. 4 Out of fire and of water fruits, grapes and trees did arise. Out of fire and\nof water was imaged the corporeal Adam.\n\n\"They fashioned the Envoy and to be head of the generations p. 91 they sent him. With heavenly\nvoice he called hence into the worlds' disquiet. At the call of the Envoy\nAdam, who lay there, 1 awoke. Adam, who lay there, awoke and went forth to meet the Envoy: 'Come in\npeace, O Envoy, Life's Messenger, who hast come from the House of my Father.\nHow firmly is planted withal dear, beautiful Life in his region! But how\n[meanly] for me has a stool been set up and my dark form sits on it\nlamenting.\"\n\n\"Thereon the Envoy made answer and spake to the corporeal Adam: 'Thy\nthrone has been set up in beauty, O Adam; and 't is thy form sits here\nlamenting. All 2 were mindful of thee for thy good and fashioned and sent me to thee. I am\ncome and will give thee instruction, O Adam, and free thee from this world.\nGive ear and hearken and get thee instructed, and mount to Light's region\nvictorious.\"\n\nAdam gave ear and had faith.—Hail to him who gives ear after thee 3 and has faith! Adam received the Truth.—Hail to him who receives the Truth\nafter thee! Adam looked up full of hope and ascended.—Hail to him who ascends\nafter thee!\n\nGive ear and hearken and let yourselves be instructed, ye perfect, and\nascend to Light's region victorious.\n\nAnd praisèd be Life."

