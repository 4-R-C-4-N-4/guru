[content]
body = "Thereon speaks the fisher and makes the man, his customer, hear: \"A\ncurse on thee, a curse on thy buyers, a curse on thy bell, 3 a curse on thy boat for not filling up. Thou hast brought no salt and\nsprinkled it over thy fish which thou boughtest, so that the fish of thy boat\nwill not be stinking and thou then canst sell for hard cash. Next, hast thou\nno meal and no dates brought, no salt . . . hast thou brought. If then thou\ncomest with empty hands, one who is of fair favour has no dealing with thee.\nGo, go, thou godless [fellow], buy not from us to do business with thy\nfraudulent scales. Thou holdest them down to buy at false weight, [then in\nselling] keepest them up with thy elbow and gettest ten for five. Now does\nthy buying flee away, and thy buyer, and is as though it never had been. Thou\ndost complain of the . . . of men and dost cherish no noble thought.\"\n\nWhen the Chief Fisher, the Head of the race of the Living, the highest\nof all catchers of fish, heard this, he said to him (? Anōsh): \"Bring me my .\n. . , hand me the squbrā , 1 that I may make a call\nsound forth into the marsh, that I may warn the fish of the depths and scare\naway the foul-smelling birds that pursue after my fish. I will catch the\ngreat sidmā , 2 and tear off his wings on the spot. I will take from him * * * and will blow\ninto my squbrā . A true squbrā is it, so that the water may not\nmix with pitch.\"\n\nWhen the fishers heard the call, their heart fell down from its stay.\nOne calls to the other and speaks to him: \"Go into thy inner ground. For\nthere is the call of the Fisher, the Fisher who eats no fish. His voice is\nnot like that of a fisher, his squbrā not like our squbrā . His\nvoice is not like our voice, his discourse not like to this world.\"\n\nBut the fishers stand there; they seek not shelter in their inner\nground. As the fishers stand there and are thinking it over, the Fisher came\nswiftly upon them; he opened the cast-net, divided ... . He cast them bound\ninto the ... . He tied them up with knots. They speak to him: \"Free us from\nour bonds, so that thy fish may not leap up to our boat. We catch not those\nwho name thy Name.\""

