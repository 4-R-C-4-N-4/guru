[content]
body = "That the Mandæan religion preserves echoes of a wealth of ancient\nmythical elements found in Iranian, Babylonian and Semitic traditions is\nevident on all hands. A process of syncretism had presumably gone on for\ngenerations before an impulse from within caused the blending to assume a\ndistinctively Mandæan form; and when this emerged, the preservation of the\nmemory of the process had no interest for the faith and fell back into the\ndepths of the subconscious. At any-rate the writers or recorders of the\ntractates throughout seem honestly persuaded of the complete independence of\ntheir tradition from every other form of religion. They are for ever\nproclaiming the blessings of loyalty to what they claim to be the original,\nthe one and only, revelation of Truth vouchsafed to the world throughout the\nages, and declaring that continued spiritual contact with instructors from on\nhigh who mediated this divine wisdom, was still possible. They certainly do\nnot give one the idea of being intellectualists consciously at work on a\nsyncretic synthesis of prior material; on the contrary they seem to live and\nmove in a milieu of prophetical outpourings and to have been extremely\nsensitive to psychical impressions. Inspirational discourses and intuitive\ninterpretations of prophetical p. 89 utterances seem to have been\ntheir delight. The following piece may enable the reader to sense somewhat of\nthe peculiar atmosphere of mystical expectancy in which they sought\ninstruction. The topic is one of the chief points of their questioning—the\nconflict that arose between the Light and the Darkness in the beginnings and\nhow victory is to be achieved. They were not of course absolute Dualists, for\nalways and everywhere victory lies with Life Everlasting, who transcends not\nonly the Darkness but also the Light.\n\nIN THE BEGINNING (§ 13).\n\nIn the Name of Great Life may hallowed Light be glorified.\n\nTo you I say and declare, ye chosen and perfect, ye who dwell in the\nworld: Become not of the Darkness a portion, but lift up your eyes to Light's\nregion. From the Evil unto the Good separate yourselves out; from the sinful\nevil of the region of Darkness separate yourselves out. Love and instruct one\nanother, that your sin and [your] guilt be forgiven you. See and hear and get\nyou instructed, that ye may ascend to Light's region victorious.\n\nThe good sit there and are in search; and all who are understanding let\nthemselves be instructed. The good speak, take counsel together and say: \"Who\nwill come, who tell me, who will set [it] forth for me, who give me\ninstruction? Who will come, who will tell me whether there was one King or two [in the beginning]?\" The good speak and let themselves be\ninstructed.\n\n\" Two Kings were there, two natures were fashioned—a King\nof this world and a King from outside of the worlds. The King of this age\ngirt on a sword and [put on] a crown of Darkness. A crown of Darkness he put\non his head, and took a sword in his right hand. A sword he took in his right\nhand; he stands there and slaughters his sons, and his sons slaughter each\nother. The King from outside of the worlds set a crown of Light on his head.\nA crown of Light he set on his head, and took Truth in his right hand. Truth\nin his right hand he took, and stands there and p. 90 instructs his sons. He stands\nthere and instructs his sons, and his sons instruct one another.\""

