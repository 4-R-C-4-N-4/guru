[content]
body = "Life is exalted and is victorious, and victorious is the\nMan who has come hither.\n\nThe next piece I have selected, treats of the source of all glory and\nenlightenment, called the Treasury of Life, that in which all spiritual powers\nand blessings are stored. The origin of the motive is without doubt the\nIranian concept of the ḥvareno , the divine and kingly glory. In the\nMandæan tradition it has become highly developed and is frequently personified\nas a female greatness. Thus in the Oxford MS. F. it is spoken of as \"the\nMother of all the Kings [of the Light], from whom all worlds have come forth,\nwho separated herself from the fervency of the Hidden Mysteries.\" Many rôles are assigned to this Light of Life in the complexities of the\ncelestial and cosmic dramas; and in the human stage it shines forth as the\nglory with which the perfected are vestured and p. 86 crowned. I have chosen the\nsimplest of the narratives or discourses on the topic. In the still more\ncomplex system of the phase of development represented by the Pistis Sophia collection there is no mention of the Treasury of Life, but the Treasury of\nLight is one of its most important conceptions. The Mandæan tradition\nconserves the echoes of an earlier phase, for it is indubitably less\nover-worked.\n\nTHE TREASURY OF LIFE (§ 57).\n\nIn the Name of Great Life may hallowed Light be glorified.\n\nTHE Treasury am I, Life's Treasury (Sīmath-Haiyē); the Treasury am I,\nthe Mighty One's Treasury; the Treasury am I, Life's Treasury. A crown was I\nfor the Mighty from everlasting. The Treasury am I, Life's Treasury. Ever did\nI give light to the treasures and to the shekīnahs, and was for adornment to\nJordan. For adornment became I to Jordan, who was from everlasting, through\nwhom the treasures give light. Great [Life] made me limpid and lucent and\nmade me into a vesture. He made me into his vesture, which day in and day out\nsings measureless praise of the Æther.\n\nThe Treasury am I, Life's Treasury. To the King of the Splendour became\nI a crown. The treasures shine through my glory and praise my form beyond\nmeasure.\n\nThe Treasury am I, Life's Treasury—I who as adornment settled down on\nthe King of the Splendour, so that he shone in his mind, that he became\nbright and shining, and his form glittered more than the [light-] worlds. As\nI (lit. it) gave light and enlightenment unto the treasures and to the\nshekīnahs [e'en] in the Æther, the King laid me as vesture round N e ṣab\nthe Radiant. 1 N e ṣab the Radiant then took me, brought me and laid me as vesture\no'er Jordan. As vesture o'er Jordan he laid me, through whom the treasures\nshine beyond measure.\n\nThe Treasury am I, Life's Treasury. The wicked are blind p. 87 and see not. I call them unto\nthe Light, yet they busy themselves with the Darkness. \"O ye wicked,\" I unto\nthem cry, \"ye who sink down in the Darkness, arise and fall not into the\ndeep.\" I cry unto them; yet the wicked hear not and sink into the great Sea\nof the Ending. Therefore was Jordan made a bridge for the treasures; a bridge\nfor the treasures became he, while he cut off the wicked and hurled them into\nthe great Sea of the Ending."

