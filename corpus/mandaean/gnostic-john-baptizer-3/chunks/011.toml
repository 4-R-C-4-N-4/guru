[content]
body = "\"Come, be for me a loving shepherd and watch me a thousand p. 84 out of ten thousand. I will\nbring thee then sandals of glory, with them canst thou tread down the thorns\nand the thistles. Earth and heaven decay, but the sandals of glory decay not.\nSun and moon decay, but the sandals of glory decay not. The stars and\nheaven's zodiacal circle decay, but the sandals of glory decay not. The four\nwinds of the [world-] house decay, but the sandals of glory decay not. Fruits\nand grapes and trees decay, but the sandals of glory decay not. All that is\nmade and engendered decays, but the sandals of glory decay not. So then be\nfor me a loving shepherd and watch me a thousand out of ten thousand.\"—\n\n\"I will then be a loving shepherd for thee and watch thee a thousand\nout of ten thousand. But if a lion comes and carries off one, how am I to\nretrieve him? If a thief come and steals one away, how am I to retrieve him?\nIf one falls into the fire and is burnt, how am I to retrieve him? If one\nfalls into the water and drowns, how am I to retrieve him? If one stays\nbehind in the pen, how am I to retrieve him?\"—\n\n\"Natheless, come therefore, be for me a loving shepherd and watch me a\nthousand out of ten thousand. If a lion comes and carries off one, let him go\nhis way and fall a prey to the lion. Let him go his way and fall a prey to\nthe lion, in that he bows himself down to the sun. If a wolf comes and\ncarries off one let him go his way and fall a prey to the wolf, in that he\nbows himself down to the moon. If a thief comes and steals away one, then let\nhim go his way and fall a prey to the thief. Let him go his way and fall a\nprey to the thief, in that he bows himself down before Nirig (Mars). If one\nfalls into the fire and is burnt, let him go his way and fall a prey to the\nfire. Let him go his way and fall a prey to the fire, in that he bows himself\ndown to the fire. If one falls into the mud and stays stuck there, then let\nhim go his way and fall a prey to the mud. Let him go his way and fall a prey\nto the mud, in that he bows himself down to Messiah. If one falls into the\nwater and drowns, then let him go his way and fall a prey to the sea. Let him\ngo his way and fall a prey to the sea, in that he bows himself down to the\nseas. If one stays behind in the pen, let him go his way and fall a prey to\nthe pen-demon. 1 Let him go p. 85 his way and fall prey to the\npen-demon, in that he bows himself down to the idols. ... ... 1 Come, be for me a loving shepherd and watch me a thousand out of ten\nthousand.\" 2 —\n\n\"So will I then be for thee a loving shepherd and watch thee a thousand\nout of ten thousand. I will watch a thousand of thousands, yea of ten\nthousand those who adore him.\" 3\n\n\"But some of them wander from me. I went up into high mountains and\nwent down into deep valleys. I went and found him where he can crop nothing.\nOf each single sheep I took hold with my right hand and on the scale did I\nlay him. A thousand among ten thousand have the [right] weight.\""

