[content]
body = "THE Fisher clad him with vestures of glory, and an axe hung from his\nshoulder ... ... and commotion of mischief, and a bell is not on the handle. 1 When the fishers caught sight of the Fisher, they came and gathered around\nhim. \"Thou art,\" say they unto him, \"a ... Fisher, thou who hast caught no\nfish of the marsh. Thou hast not seen the ... ... in which the fish gather\n... ... ... ... . We will make thee familiar with the fishers; be our great\npartner and take a share as we [do]. Grant us a share in thy ship, and take\nthou a share in our ship. A bargain! Take from us as partner and grant us a\nshare in thy ship. Grant us a share, and we will give thee a share in what we\npossess. Join thy ship with ours and clothe thee in black as we [do], so\nthat, if thou holdest thy lantern on high, thou mayst find something, that\nthe fish may not see thy glory and thy ship may take in fish. If thou dost\ngive ear (to us), thou shalt catch fish, throw them into thy ship and do\nbusiness. If thou givest no ear to our discourse, thou shalt eat salt; but if\nthou doest our works, thou shalt eat oil and honey. Thou stirrest a broth,\nthou fillest a bowl and sharest it with all of the fishers. We appoint thee\nas head over all of us. The fishers gather together beside thee, the first\nfollow behind thee; they will be thy slaves, and thou takest three shares of\nwhat falls to our share. Our father shall be thy servant and we will call\nourselves thy bondsmen. Our mother shall sit on thy couch (?) p. 77 and net nets, she shall be thy\nmaid-servant and knit for thee yarns of all kinds. She shall space out the\nfloats of cedar and put the lead-sinkers into the meshes,—meshes, meshes\nwhich are then more heavy than all of the world. She shall divide the water\nby means of the yarns, and when the fish run into them they shall be stopped.\nThen they know not the way that they seek, and have no wit to turn back to\ntheir way. Like walls that collapse, they (the nets) come and fall on the\ngood. They do not let the fish rise, nor turn their face to the boulders. 1 They make them sink deep under the mud and shut them into ... ... ... ... .\nThey collect them into heaps and shake them (?) out of the ... ... . There is\nthere a ... ..., into which the fish dash and are stopped. On the ... of the\n... wattle-work is set up between two machines. Nets are laid down and ...\n..., which are filled with bad dates as bait, which cause them to eat death.\nWoe to the fish who is blinded by them, whose eye sees not the Light. Wise\nare the fish who know them. They pass by all of the baits. [The others]\nrepair thither and ..., and the nets will be for them there a lodging. One of\na thousand sees it and of two thousand two see it. Its ... is closed, and a\nbell is hung on its side-door,—a bell that is forged in mischief and catches\nthe whole of the world. There, is the water mingled with fennel ... ... ...\n... the pegs (?) of death. Woe to the fish who fall into them.\" 2"

