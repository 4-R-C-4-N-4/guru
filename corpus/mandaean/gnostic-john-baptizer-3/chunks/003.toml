[content]
body = "When the fishers thus spake to me, I smote them with a club made of\niron. I bound their traders on the shore which lends not . . . (?). I roped\nthem with ropes of bast and broke up their ships * * * * . I burnt up the\nwhole of their netting and the . . . which holds the nets together. I threw\nchains round them and hung them up aft on my ship's stern. I made them take\nan oath, took from them their mystery, in order that they may not catch the\ngood fish,—that they may not steal them from me, stick them on a cane, hang\nthem up, 3 I cut them in pieces and throw them into baskets (?) with laurel and aloe.\nThey (the fishers) are laid low and cannot rise up. The nets ... ..., and\nthey no longer stab the fisher-trident into the Jordan. They do not cut off *\n* * * * * and stand not in the river-lands p. 74 and make not their catch in the\nshallows. They cast not the cast-net therein and take not . . . and aloe.\n\nI spake to those who eat the . . . of the fish whose name is eel. They\neat the eel and the . . . , which stands upright on its forefeet. They eat\nthe ... ... ... ... . I bound them in the marshes of Deception, and they were\ncaught and were tied up. Water from the Ulai they drink not and know not the\nway to the Kshash river. 1 I bound them fast in their ships, and threw out my ropes to the good ones. To\nthem I speak: \"Draw your boat up here, so that it runs not into the dike.\"\n\nAs the Chief of the fish-catchers thus spake, the fishers made answer\nunto him and said; \"Blessed be thou, a Fisher, and blessed be thy boat and\nthy bark. How fair is thy cast-net, how fair the yarn that is in it. Fair is\nthy cord and thy lacing, thou who art not like the fishers of this world. On\nthy meshes are no shell-fish, and thy trident catches no fish. Whence art\nthou come hither? Tell us! We will be thy hired servants. We will bake and\nstir about broth and bring it before thee. Eat, and the crumbs which fall\nfrom thy hand,—these will we eat and therewith be filled.\""

