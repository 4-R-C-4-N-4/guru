[content]
body = "Thou wert never seen or heard of When the earth was first created, When were made the ether-spaces, When the air was crystal-pillared, When the Moon was placed in orbit, When the silver Sun was planted, When the Bear was firmly stationed, When the skies with stars were sprinkled.\" Then in anger Youkahainen Answered ancient Wainamoinen: \"Then, sir, since I fail in wisdom, With the sword I offer battle; Come thou, famous bard and minstrel, Thou the ancient wonder-singer, Let us try our strength with broadswords, let our blades be fully tested.\" Spake the ancient Wainamoinen: \"Not thy sword and not thy wisdom, Not thy prudence, nor thy cunning, Do I fear a single moment.\n\nLet who may accept thy challenge, Not with thee, a puny braggart, Not with one so vain and paltry, Will I ever measure broadswords.\" Then the youthful Youkahainen, Mouth awry and visage sneering, Shook his golden locks and answered: \"Whoso fears his blade to measure, Fears to test his strength at broadswords, Into wild-boar of the forest, Swine at heart and swine in visage, Singing I will thus transform him; I will hurl such hero-cowards, This one hither, that one thither, Stamp him in the mire and bedding, In the rubbish of the stable.\" Angry then grew Wainamoinen, Wrathful waxed, and fiercely frowning, Self-composed he broke his silence, And began his wondrous singing.\n\nSang he not the tales of childhood, Children's nonsense, wit of women, Sang he rather bearded heroes, That the children never heard of, That the boys and maidens knew not Known but half by bride and bridegroom, Known in part by many heroes, In these mournful days of evil, Evil times our race befallen.\n\nGrandly sang wise Wainamoinen, Till the copper-bearing mountains, And the flinty rocks and ledges Heard his magic tones and trembled; Mountain cliffs were torn to pieces, All the ocean heaved and tumbled; And the distant hills re-echoed.\n\nLo!\n\nthe boastful Youkahainen Is transfixed in silent wonder, And his sledge with golden trimmings Floats like brushwood on the billows; Sings his braces into reed-grass, Sings his reins to twigs of willow, And to shrubs his golden cross-bench.\n\nLo!\n\nhis birch-whip, pearl-enameled, Floats a reed upon the border; Lo!\n\nhis steed with golden forehead, Stands a statue on the waters; Hames and traces are as fir-boughs, And his collar, straw and sea-grass.\n\nStill the minstrel sings enchantment, Sings his sword with golden handle, Sings it into gleam of lightning, Hangs it in the sky above him; Sings his cross-bow, gaily painted, To a rainbow o'er the ocean; Sings his quick and feathered arrows Into hawks and screaming eagles; Sings his dog with bended muzzle, Into block of stone beside him; Sings his cap from off his forehead, Sings it into wreaths of vapor; From his hands he sings his gauntlets Into rushes on the waters; Sings his vesture, purple-colored, Into white clouds in the heavens; Sings his girdle, set with jewels, Into twinkling stars around him; And alas!\n\nfor Youkahainen, Sings him into deeps of quick-sand; Ever deeper, deeper, deeper, In his torture, sinks the wizard, To his belt in mud and water."

