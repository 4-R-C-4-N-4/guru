[content]
body = "Leave thy station for the borders, I will hunt thine ancient mother, Sing thine origin of evil, How arose thy head of horror; Suoyatar, thine ancient mother, Thing of evil, thy creator!\" \"Suoyatar once let her spittle Fall upon the waves of ocean; This was rocked by winds and waters, Shaken by the ocean-currents, Six years rocked upon the billows, Rocked in water seven summers, On the blue-back of the ocean, On the billows high as heaven; Lengthwise did the billows draw it, And the sunshine gave it softness, To the shore the billows washed it, On the coast the waters left it.\n\n\"Then appeared Creation's daughters, Three the daughters thus appearing, On the roaring shore of ocean, There beheld the spittle lying, And the daughters spake as follows: 'What would happen from this spittle, Should the breath of the Creator Fall upon the writhing matter, Breathe the breath of life upon it, Give the thing the sense of vision?\n\n\"The Creator heard these measures, Spake himself the words that follow: 'Evil only comes from evil, This is the expectoration Of fell Suoyatar, its mother; Therefore would the thing be evil, Should I breathe a soul within it, Should I give it sense of vision.' \"Hisi heard this conversation, Ever ready with his mischief, Made himself to be creator, Breathed a soul into the spittle, To fell Suoyatar's fierce anger.\n\nThus arose the poison-monster, Thus was born the evil serpent, This the origin of evil.\n\n\"Whence the life that gave her action'?\n\nFrom the carbon-pile of Hisi.\n\nWhence then was her heart created?\n\nFrom the heart-throbs of her mother Whence arose her brain of evil?\n\nFrom the foam of rolling waters.\n\nWhence was consciousness awakened?\n\nFrom the waterfall's commotion.\n\nWhence arose her head of venom?\n\nFrom the seed-germs of the ivy.\n\nWhence then came her eyes of fury?\n\nFrom the flaxen seeds of Lempo.\n\nWhence the evil ears for hearing?\n\nFrom the foliage of Hisi.\n\nWhence then was her mouth created?\n\nThis from Suoyatar's foam-currents Whence arose thy tongue of anger r From the spear of Keitolainen.\n\nWhence arose thy fangs of poison?\n\nFrom the teeth of Mana's daughter.\n\nWhence then was thy back created?\n\nFrom the carbon-posts of Piru.\n\nHow then was thy tail created?\n\nFrom the brain of the hobgoblin.\n\nWhence arose thy writhing entrails?\n\nFrom the death-belt of Tuoni.\n\n\"This thine origin, O Serpent, This thy charm of evil import, Vilest thing of God's creation, Writhing, hissing thing of evil, With the color of Tuoni, With the shade of earth and heaven, With the darkness of the storm-cloud.\n\nGet thee hence, thou loathsome monster, Clear the pathway of this hero.\n\nI am mighty Lemminkainen, On my journey to Pohyola, To the feastings and carousals, In the halls of darksome Northland.\" Thereupon the snake uncoiling, Hundred-eyed and heinous monster, Crawled away to other portals, That the hero, Kaukomieli, Might proceed upon his errand, To the dismal Sariola, To the feastings and carousals In the banquet-halls of Pohya."

