[content]
body = "Thereupon the ancient minstrel Quick returning, heavy-hearted, To his native halls and hamlets, Thus addressed his brother-heroes: \"Woman, he without his weapons, With no implements, a weakling!\n\nSun and Moon have I discovered, But I could not force the Portals Leading to their rocky cavern In the copper bearing mountain.\n\nSpake the reckless Lemminkainen \"O thou ancient Wainamoinen, Why was I not taken with thee To become, thy war-companion?\n\nWould have been of goodly service, Would have drawn the bolts or broken, All the portals to the cavern, Where the Sun and Moon lie hidden In the copper-bearing mountain!\" Wainamoinen, ancient minstrel, Thus replied to Lemminkainen: \"Empty Words will break no portals, Draw no bolts of any moment; Locks and bolts are never broken.\n\nWith the words of little wisdom!\n\nGreater means than thou commandest Must be used to free the sunshine, Free the moonlight from her dungeon.\" Wainamoinen, not discouraged, Hastened to the forge and smithy, Spake these words to Ilmarinen: \"O thou famous metal-artist, Forge for me a magic trident, Forge from steel a dozen stout-rings, Master-keys, a goodly number, Iron bars and heavy hammers, That the Sun we may uncover In the copper-bearing mountain, In the stone-berg of Pohyola.\" Then the blacksmith, Ilmarinen, The eternal metal-worker, Forged the needs of Wainamoinen, Forged for him the magic trident, Forged from steel a dozen stout-rings, Master-keys a goodly number, Iron bars and heavy hammers, Not the largest, nor the smallest, Forged them of the right dimensions.\n\nLouhi, hostess of Pohyola, Northland's old and toothless wizard, Fastened wings upon her shoulders, As an eagle, sailed the heavens, Over field, and fen, and forest, Over Pohya's many, waters, To the hamlets of Wainola, To the forge of Ilmarinen.\n\nQuick the famous metal-worker Went to see if winds were blowing; Found the winds at peace and silent, Found an eagle, sable-colored, Perched upon his window-casement.\n\nSpake the artist, Ilmarinen: \"Magic bird, whom art thou seeking, Why art sitting at my window?\" This the answer of the eagle: \"Art thou blacksmith, Ilmarinen, The eternal iron-forger, Master of the magic metals, Northland's wonder-working artist?\" Ilmarinen gave this answer: \"There is nothing here of wonder, Since I forged the dome of heaven, Forged the earth a concave cover!\" Spake again the magic eagle: Why this ringing of thine anvil, Why this knocking of thy hammer, Tell me what thy hands are forging?\" This the answer of the blacksmith: \"'Tis a collar I am forging For the neck of wicked Louhi, Toothless witch of Sariola, Stealer of the silver sunshine, Stealer of the golden moonlight; With this collar I shall bind her To the iron-rock of Ehstland!\" Louhi, hostess of Pohyola, Saw misfortune fast approaching, Saw destruction flying over, Saw the signs of bad-luck lower; Quickly winged her way through ether To her native halls and chambers, To the darksome Sariola, There unlocked the massive portals Where the Sun and Moon were hidden, In the rock of many colors, In the cavern iron-banded, In the copper-bearing mountain."

