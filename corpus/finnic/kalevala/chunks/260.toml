[content]
body = "OF THE SUN AND MOON.\n\nThus has Fire returned to Northland But the gold Moon is not shining, Neither gleams the silver sunlight In the chambers of Wainola, On the plains of Kalevala.\n\nOn the crops the white-frost settled, And the cattle died of hunger, Even birds grew sick and perished.\n\nMen and maidens, faint and famished, Perished in the cold and darkness, From the absence of the sunshine, From the absence of the moonlight.\n\nKnew the pike his holes and hollows, And the eagle knew his highway, Knew the winds the times for sailing; But the wise men of the Northland Could not know the dawn of morning, On the fog-point in the ocean, On the islands forest-covered.\n\nYoung and aged talked and wondered, Well reflected, long debated, How to live without the moonlight, Live without the silver sunshine, In the cold and cheerless Northland, In the homes of Kalevala.\n\nLong conjectured all the maidens, Orphans asked the wise for counsel.\n\nSpake a maid to Ilmarinen, Running to the blacksmith's furnace: \"Rise, O artist, from thy slumbers, Hasten from thy couch unworthy; Forge from gold the Moon for Northland, Forge anew the Sun from silver Cannot live without the moonlight, Nor without the silver sunshine!\" From his couch arose the artist, From his couch of stone, the blacksmith, And began his work of forging, Forging Sun and Moon for Northland.\n\nCame the ancient Wainamoinen, In the doorway sat and lingered, Spake, these Words to Ilmarinen: \"Blacksmith, my beloved brother, Thou the only metal-worker, Tell me why thy magic hammer Falls so heavy on thine anvil?\" Spake the youthful Ilmarinen: \"Moon of gold and Sun of silver, I am forging for Wainola; I shall swing them into ether, Plant them in the starry heavens.\" Spake the wise, old Wainamoinen: \"Senseless blacksmith of the ages, Vainly dost thou swing thy hammer, Vainly rings thy mighty anvil; Silver will not gleam as sunshine, Not of gold is born the moonlight!\" Ilmarinen, little heeding, Ceases not to ply his hammer, Sun and Moon the artist forges, Wings the Moon of Magic upward, Hurls it to the pine-tree branches; Does not shine without her master.\n\nThen the silver Sun he stations In an elm-tree on the mountain.\n\nFrom his forehead drip the sweat-drops, Perspiration from his fingers, Through his labors at the anvil While the Sun and Moon were forging; But the Sun shone not at morning From his station in the elm-tree; And the Moon shone not at evening From the pine-tree's topmost branches.\n\nSpake the ancient Wainamoinen: \"Let the Fates be now consulted, And the oracles examined; Only thus may we discover Where the Sun and Moon lie hidden.\" Thereupon old Wainamoinen, Only wise and true magician, Cut three chips from trunks of alder, Laid the chips in magic order, Touched and turned them with his fingers, Spake these words of master-magic: \"Of my Maker seek I knowledge, Ask in hope and faith the answer From the great magician, Ukko: Tongue of alder, tell me truly, Symbol of the great Creator, Where the Sun and Moon are sleeping; For the Moon shines not in season, Nor appears the Sun at midday, From their stations in the sky-vault.\n\nSpeak the truth, O magic alder, Speak not words of man, nor hero, Hither bring but truthful measures."

