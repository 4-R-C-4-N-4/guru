[content]
body = "At thy cups, if thou wert injured, Thou shalt here have better treatment Thou shalt have the cup thy father Brought me from the hero-castle.\" Spake the reckless Lemminkainen: \"Worthy mother, thou that nursed me, If I had been maimed at drinking, I the landlord would have worsted, Would have slain a thousand heroes, Would have taught them useful lessons.\" Lemminkainen's mother answered: \"Wherefore then art thou indignant, Didst thou meet disgrace and insult, Did they rob thee of thy courser?\n\nBuy thou then a better courser With the riches of thy mother, With thy father's horded treasures.\" Spake the hero, Lemminkainen: \"Faithful mother of my being, If my steed had been insulted, If for him my heart was injured, I the landlord would have punished, Would have punished all the horsemen, All of Pohya's strongest riders.\" Lemminkainen's mother answered: \"Tell me then thy dire misfortune, What has happened to my hero, On his journey to Pohyola?\n\nHave the Northland maidens scorned thee, Have the women ridiculed thee?\n\nIf the maidens scorned thy presence.\n\nIf the women gave derision, There are others thou canst laugh at, Thou canst scorn a thousand women.\" Said the reckless Lemminkainen: \"Honored mother, fond and faithful, If the Northland dames had scorned me Or the maidens laughed derision, I the maidens would have punished, Would have scorned a thousand women.\" Lemminkainen's mother answered: \"Wherefore then are thou indignant, Thus annoyed, and heavy-hearted, On returning from Pohyola?\n\nWas thy feasting out of season, Was the banquet-beer unworthy, Were thy dreams of evil import When asleep in darksome Northland?\" This is Lemminkainen's answer: \"Aged women may remember What they dream on beds of trouble; I have seen some wondrous visions, Since I left my Island-cottage.\n\nMy beloved, helpful mother, Fill my bag with good provisions, Flour and salt in great abundance, Farther must thy hero wander, He must leave his home behind him, Leave his pleasant Island-dwelling, Journey from this home of ages; Men are sharpening their broadswords, Sharpening their spears and lances, For the death of Lemminkainen.\" Then again the mother questioned, Hurriedly she asked the reason: \"Why the men their swords were whetting, Why their spears are being sharpened.\" Spake the reckless Lemminkainen, Handsome hero, Kaukomieli: \"Therefore do they whet their broadswords, Therefore sharpen they their lances: It is for thy son's destruction, At his heart are aimed their lances.\n\nIn the court-yard of Pohyola, There arose a great contention, Fierce the battle waged against me; But I slew the Northland hero, Killed the host of Sariola; Quick to arms rose Louhi's people, All the spears and swords of Northland Were directed at thy hero; All of Pohya turned against me, Turned against a single foeman.\" This the answer of the mother: \"I had told thee this beforehand, I had warned thee of this danger, And forbidden thee to journey To the hostile fields of Northland.\n\nHere my hero could have lingered, Passed his life in full contentment, Lived forever with his mother, With his mother for protection, In the court-yard with his kindred; Here no war would have arisen, No contention would have followed."

