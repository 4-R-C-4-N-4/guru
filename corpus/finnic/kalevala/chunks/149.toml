[content]
body = "\"Bride of Beauty from the Northland, Thou wilt learn this home to manage, Learn to labor with thy kindred; Good the home for thee to dwell in, Good enough for bride and daughter.\n\nAt thy hand will rest the milk-pail, And the churn awaits thine order; It is well here for the maiden, Happy will the young bride labor, Easy are the resting-benches; Here the host is like thy father, Like thy mother is the hostess, All the sons are like thy brothers, Like thy sisters are the daughters.\n\n\"Shouldst thou ever have a longing For the whiting of the ocean, For thy, father's Northland salmon, For thy brother's hazel-chickens, Ask them only of thy husband, Let thy hero-husband bring them.\n\nThere is not in all of Northland, Not a creature of the forest, Not a bird beneath the ether, Not a fish within the waters, Not the largest, nor the smallests That thy husband cannot capture.\n\nIt is well here for the maiden, Here the bride may live in freedom, Need not turn the heavy millstone, Need not move the iron pestle; Here the wheat is ground by water, For the rye, the swifter current, While the billows wash the vessels And the surging waters rinse them.\n\nThou hast here a lovely village, Finest spot in all of Northland, In the lowlands sweet the verdure, in the uplands, fields of beauty, With the lake-shore near the hamlet, Near thy home the running water, Where the goslings swim and frolic, Water-birds disport in numbers.\" Thereupon the bride and bridegroom Were refreshed with richest viands, Given food and drink abundant, Fed on choicest bits of reindeer, On the sweetest loaves of barley, On the best of wheaten biscuits, On the richest beer of Northland.\n\nMany things were on the table, Many dainties of Wainola, In the bowls of scarlet color, In the platters deftly painted, Many cakes with honey sweetened, To each guest was butter given, Many bits of trout and whiting, Larger salmon carved in slices, With the knives of molten silver, Rimmed with gold the silver handles, Beer of barley ceaseless flowing, Honey-drink that was not purchased, In the cellar flows profusely, Beer for all, the tongues to quicken, Mead and beer the minds to freshen.\n\nWho is there to lead the singing, Lead the songs of Kalevala?\n\nWainamoinen, old and truthful, The eternal, wise enchanter, Quick begins his incantations, Straightway sings the songs that follow.\n\n\"Golden brethren, dearest kindred, Ye, my loved ones, wise and worthy Ye companions, highly-gifted, Listen to my simple sayings: Rarely stand the geese together, Sisters do not mate each other, Not together stand the brothers, Nor the children of one mother, In the countries of the Northland.\n\n\"Shall we now begin the singing, Sing the songs of old tradition?\n\nSingers can but sing their wisdom, And the cuckoo call the spring-time, And the goddess of the heavens Only dyes the earth in beauty; So the goddesses of weaving Can but weave from dawn till twilight, Ever sing the youth of Lapland In their straw-shoes full of gladness, When the coarse-meat of the roebuck, Or of blue-moose they have eaten.\n\nWherefore should I not be singing, And the children not be chanting Of the biscuits of Wainola, Of the bread of Kalew-waters?\n\nEven Sing the lads of Lapland In their straw-shoes filled with joyance, Drinking but a cup of water, Eating but the bitter tan-bark."

