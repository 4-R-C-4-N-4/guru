[content]
body = "Neither clouds on the horizon, Nor the dawning of the morning; It is ancient Wainamoinen, The renowned and wise enchanter, Riding on his way to Northland; On his steed, the royal racer, Magic courser of Wainola.\" Quickly now young Youkahainen, Lapland's vain and evil minstrel, Filled with envy, grasps his cross-bow, Makes his bow and arrows ready For the death of Wainamoinen.\n\nQuick his aged mother asked him, Spake these words to Youkahainen: \"For whose slaughter is thy cross-bow, For whose heart thy poisoned arrows?\" Youkahainen thus made answer: \"I have made this mighty cross-bow, Fashioned bow and poisoned arrows For the death of Wainamoinen, Thus to slay the friend of waters; I must shoot the old magician, The eternal bard and hero, Through the heart, and through the liver, Through the head, and through the shoulders, With this bow and feathered arrows Thus destroy my rival minstrel.\" Then the aged mother answered, Thus reproving, thus forbidding.\n\nDo not slay good Wainamoinen, Ancient hero of the Northland, From a noble tribe descended, He, my sister's son, my nephew.\n\nIf thou slayest Wainamoinen, Ancient son of Kalevala, Then alas!\n\nall joy will vanish, Perish all our wondrous singing; Better on the earth the gladness, Better here the magic music, Than within the nether regions, In the kingdom of Tuoni, In the realm of the departed, In the land of the hereafter.\" Then the youthful Youkahainen Thought awhile and well considered, Ere he made a final answer.\n\nWith one hand he raised the cross-bow But the other seemed to weaken, As he drew the cruel bow-string.\n\nFinally these words he uttered As his bosom swelled with envy: \"Let all joy forever vanish, Let earth's pleasures quickly perish, Disappear earth's sweetest music, Happiness depart forever; Shoot I will this rival minstrel, Little heeding what the end is.\" Quickly now he bends his fire-bow, On his left knee rests the weapon, With his right foot firmly planted, Thus he strings his bow of envy; Takes three arrows from his quiver, Choosing well the best among them, Carefully adjusts the bow-string, Sets with care the feathered arrow, To the flaxen string he lays it, Holds the cross-bow to his shoulder, Aiming well along the margin, At the heart of Wainamoinen, Waiting till he gallops nearer; In the shadow of a thicket, Speaks these words while he is waiting \"Be thou, flaxen string, elastic; Swiftly fly, thou feathered ash-wood, Swiftly speed, thou deadly missile, Quick as light, thou poisoned arrow, To the heart of Wainamoinen.\n\nIf my hand too low should hold thee, May the gods direct thee higher; If too high mine eye should aim thee, May the gods direct thee lower.\" Steady now he pulls the trigger; Like the lightning flies the arrow O'er the head of Wainamoinen; To the upper sky it darteth, And the highest clouds it pierces, Scatters all the flock of lamb-clouds, On its rapid journey skyward.\n\nNot discouraged, quick selecting, Quick adjusting, Youkahainen, Quickly aiming shoots a second.\n\nSpeeds the arrow swift as lightning; Much too low he aimed the missile, Into earth the arrow plunges, Pierces to the lower regions, Splits in two the old Sand Mountain.\n\nNothing daunted, Youkahainen, Quick adjusting shoots a third one."

