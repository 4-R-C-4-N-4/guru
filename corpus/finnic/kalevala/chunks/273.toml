[content]
body = "Lak'ka.\n\nMother of Ilmarinen.\n\nLak-ko.\n\nThe hostess of Kalevala.\n\nLem'min-kai'nen.\n\nOne of the brothers of Wainamoinen; a son of Lempi.\n\nLem'pi-bay.\n\nA bay of Finland.\n\nLem'po.\n\nThe Evil Principle; same as Hisi, Piru, and Jutas.\n\nLin'nun-ra'ta (Bird-way).\n\nThe Milky-way.\n\nLou'hi.\n\nThe hostess of Pohyola.\n\nLow-ya'tar.\n\nTuoni's blind daughter, and the originator of the Plagues.\n\nLu'on-no'tar.\n\nOne of the mystic maidens, and the nurse of Wainamoinen.\n\nLu'o-to'la.\n\nA bay of Finland, named with Joukola.\n\nLy-lik'ki (Lyylik'ki).\n\nMaker of the snow-shoe.\n\nMaan-e'mo (man-e'mo).\n\nThe mother of the Earth.\n\nMa'hi-set (Maa'hi-set).\n\nThe invisibly small deities of Finnish mythology.\n\nMam'me-lai'nen.\n\nThe goddess of hidden treasures.\n\nMa'na.\n\nA synonym of Tuoni, the god of death.\n\nMan'a-lai'nen.\n\nThe same as Mana.\n\nMasr'i-at'ta (marja, berry).\n\nThe Virgin Mary of Finnish mythology.\n\nMat'ka-Tep'po.\n\nThe road-god.\n\nMeh'i-lai'nen.\n\nThe honey-bee.\n\nMel'a-tar.\n\nThe goddess of the helm.\n\nMet'so-la.\n\nThe same as Tapiola, the abode of the god of the forest, Mie-lik'ki.\n\nThe hostess of the forest.\n\nMi-merk'ki.\n\nA synonym of Mielikki.\n\nMosk'va.\n\nA province of Suomi.\n\nMu-rik'ki (Muurik'ki).\n\nThe name of the cow.\n\nNe'wa.\n\nA river of Finland.\n\nNy-rik'ki.\n\nA son of Tapio.\n\nOs'mo.\n\nThe same as Osmoinen.\n\nOs-noi'nen.\n\nA synonym of Wainola's hero.\n\nOs'mo-tar.\n\nThe daughter of Osmo; she directs the brewing of the beer for Ilmarinen's wedding-feast.\n\nO-ta'va.\n\nThe Great Bear of the heavens.\n\nOt'so.\n\nThe bear of Finland.\n\nPoe'ivoe.\n\nThe Sun, and the Sun god.\n\nPai'va-tar.\n\nThe goddess of the summer.\n\nPak'ka-nen.\n\nA synonym of Kura.\n\nPal-woi'nen.\n\nA synonym of Turi, and also of Wirokannas.\n\nPa'nu.\n\nThe Fire-Child, born from the sword of Ukko.\n\nPa'ra.\n\nA tripod-deity, presiding over milk and cheese.\n\nPel'ler-woi'nen.\n\nThe sower of the forests.\n\nPen'i-tar.\n\nA blind witch of Pohyola; and the mother of the dog.\n\nPik'ku Mies.\n\nThe water-pigmy that felled the over-spreading oak-tree for Wainamoinen.\n\nPil'a-ya'tar (Pilaja'tar).\n\nThe daughter of the Aspen; and the goddess of the Mountain-ash.\n\nPilt'ti.\n\nThe maid-servant of Mariatta.\n\nPi'men-to'la.\n\nA province of Finland; another name for Pohyola.\n\nPi'ru.\n\nThe same as Lempo, Jutas, and Hisi.\n\nPi'sa.\n\nA mountain of Finland.\n\nPoh'ya (Poh'ja).\n\nAn abbreviated form for Pohyola.\n\nPoh-yo'la (Poh-jo'la).\n\nThe Northland; Lapland.\n\nPok-ka'nen."

