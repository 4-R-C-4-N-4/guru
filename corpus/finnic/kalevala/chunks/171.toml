[content]
body = "ISLE OF REFUGE.\n\nLemminkainen, full of joyance, Handsome hero, Kaukomieli, Took provisions in abundance, Fish and butter, bread and bacon, Hastened to the Isle of Refuge, Sailed away across the oceans, Spake these measures on departing: \"Fare thee well, mine Island-dwelling, I must sail to other borders, To an island more protective, Till the second summer passes; Let the serpents keep the island, Lynxes rest within the glen-wood, Let the blue-moose roam the mountains, Let the wild-geese cat the barley.\n\nFare thee well, my helpful mother!\n\nWhen the warriors of the Northland, From the dismal Sariola, Come with swords, and spears, and cross-bows, Asking for my head in vengeance, Say that I have long departed, Left my mother's Island-dwelling, When the barley had been garnered.\" Then he launched his boat of copper, Threw the vessel to the waters, From the iron-banded rollers, From the cylinders of oak-wood, On the masts the sails he hoisted, Spread the magic sails of linen, In the stern the hero settled And prepared to sail his vessel, One hand resting on the rudder.\n\nThen the sailor spake as follows, These the words of Lemminkainen: \"Blow, ye winds, and drive me onward, Blow ye steady, winds of heaven, Toward the island in the ocean, That my bark may fly in safety To my father's place of refuge, To the far and nameless island!\" Soon the winds arose as bidden, Rocked the vessel o'er the billows, O'er the blue-back of the waters, O'er the vast expanse of ocean; Blew two months and blew unceasing, Blew a third month toward the island, Toward his father's Isle of Refuge.\n\nSat some maidens on the seaside, On the sandy beach of ocean, Turned about in all directions, Looking out upon the billows; One was waiting for her brother, And a second for her father, And a third one, anxious, waited For the coming of her suitor; There they spied young Lemminkainen, There perceived the hero's vessel Sailing o'er the bounding billows; It was like a hanging cloudlet, Hanging twixt the earth and heaven.\n\nThus the island-maidens wondered, Thus they spake to one another: \"What this stranger on the ocean, What is this upon the waters?\n\nArt thou one of our sea-vessels?\n\nWert thou builded on this island?\n\nSail thou straightway to the harbor, To the island-point of landing That thy tribe may be discovered.\" Onward did the waves propel it, Rocked his vessel o'er the billows, Drove it to the magic island, Safely landed Lemminkainen On the sandy shore and harbor."

