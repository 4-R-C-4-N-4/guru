[content]
body = "\"Hostess of Pohyola, tell me Whither thou hast sent my hero; I shall burst thy many garners, Shall destroy the magic Sampo, If thou dost not tell me truly Where to find my Lemminkainen.\" Spake the hostess of Pohyola: \"I have well thy hero treated, Well my court has entertained him, Gave him of my rarest viands, Fed him at my well-filled tables, Placed him in a boat of copper, Thus to float adown the current, This the last of Lemminkainen; Cannot tell where he has wandered.\n\nWhether in the foam of waters, Whether in the boiling torrent, Whether in the drowning whirlpool.\" Lemminkainen's mother answers: Thou again art speaking falsely; Tell me now the truth I pray thee, Make an end of thy deception, Where is now my Lemminkainen, Whither hast thou sent my hero, Young and daring son of Kalew?\n\nIf a third time thou deceivest, I will send thee plagues, unnumbered, I will send thee fell destruction, Certain death will overtake thee.\" Spake the hostess of Pohyola: \"This the third time that I answer, This the truth that I shall tell thee: I have sent the Kalew-hero To the Hisi-fields and forests, There to hunt the moose of Lempo; Sent him then to catch the fire-horse, Catch the fire-expiring stallion, On the distant plains of Juutas, In the realm of cruel Hisi.\n\nThen I sent him to the Death-stream, In the kingdom of Tuoni, With his bow and but one arrow, There to shoot the swan as dowry For my best and fairest daughter; Have not heard about thy hero Since he left for Tuonela; May in misery have fallen, May have perished in Manala; Has not come to ask my daughter, Has not come to woo the maiden, Since he left to hunt the death-swan.\" Now the mother seeks her lost one, For her son she weeps and trembles, Like the wolf she bounds through fenlands, Like the bear, through forest thickets, Like the wild-boar, through the marshes, Like the hare, along the sea-coast, To the sea-point, like the hedgehog Like the wild-duck swims the waters, Casts the rubbish from her pathway, Tramples down opposing brush-wood, Stops at nothing in her journey Seeks a long time for her hero, Seeks, and seeks, and does not find him.\n\nNow she asks the trees the question, And the forest gives this answer: \"We have care enough already, Cannot think about thy matters; Cruel fates have we to battle, Pitiful our own misfortunes!\n\nWe are felled and chopped in pieces, Cut in blocks for hero-fancy, We are burned to death as fuel, No one cares how much we suffer.\" Now again the mother wanders, Seeks again her long-lost hero, Seeks, and seeks, and does not find him."

