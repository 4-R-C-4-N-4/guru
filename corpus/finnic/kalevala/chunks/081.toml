[content]
body = "Then the mother spake as follows: \"I have found the long-sought balsam, Found the remedy of Ukko, Where-with God anoints his people, Gives them life, and faith, and wisdom, Heals their wounds and stills their anguish, Makes them strong against temptation, Guards them from the evil-doers.\" Now the mother well anointing, Heals her son, the magic singer, Eyes, and ears, and tongue, and temples, Breaks, and cuts, and seams, anointing, Touching well the life-blood centres, Speaks these words of magic import To the sleeping Lemminkainen: \"Wake, arise from out thy slumber, From the worst of low conditions, From thy state of dire misfortune!\" Slowly wakes the son and hero, Rises from the depths of slumber, Speaks again in magic accents, These the first words of the singer: \"Long, indeed, have I been sleeping, Long unconscious of existence, But my sleep was full of sweetness, Sweet the sleep in Tuonela, Knowing neither joy nor sorrow!\" This the answer of his mother: \"Longer still thou wouldst have slumbered, Were it not for me, thy, mother; Tell me now, my son beloved, Tell me that I well may hear thee, Who enticed thee to Manala, To the river of Tuoni, To the fatal stream and whirlpool?\" Then the hero, Lemminkainen, Gave this answer to his mother: \"Nasshut, the decrepit shepherd Of the flocks of Sariola, Blind, and halt, and poor, and wretched, And to whom I did a favor; From the slumber-land of envy Nasshut sent me to Manala, To the river of Tuoni; Sent a serpent from the waters, Sent an adder from the death-stream, Through the heart of Lemminkainen; Did not recognize the serpent, Could not speak the serpent-language, Did not know the sting of adders.\" Spake again the ancient mother: \"O thou son of little insight, Senseless hero, fool-magician, Thou didst boast betimes thy magic To enchant the wise enchanters, On the dismal shores of Lapland, Thou didst think to banish heroes, From the borders of Pohyola; Didst not know the sting of serpents, Didst not know the reed of waters, Nor the magic word-protector!\n\nLearn the origin of serpents, Whence the poison of the adder.\n\n\"In the floods was born the serpent, From the marrow of the gray-duck, From the brain of ocean-swallows; Suoyatar had made saliva, Cast it on the waves of ocean, Currents drove it outward, onward, Softly shone the sun upon it, By the winds 'twas gently cradled, Gently nursed by winds and waters, By the waves was driven shoreward, Landed by the surging billows.\n\nThus the serpent, thing of evil, Filling all the world with trouble, Was created in the waters Born from Suoyatar, its maker.\" Then the mother of the hero Rocked her son to rest and comfort, Rocked him to his former being, To his former life and spirit, Into greater magic powers; Wiser, handsomer than ever Grew the hero of the islands; But his heart was full of trouble, And his mother, ever watchful, Asked the cause of his dejection.\n\nThis is Lemminkainen's answer: \"This the cause of all my sorrow; Far away my heart is roaming, All my thoughts forever wander To the Northland's blooming virgins, To the maids of braided tresses."

