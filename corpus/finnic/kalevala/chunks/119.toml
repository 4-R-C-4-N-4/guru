[content]
body = "'S WEDDING-FEAST.\n\nLouhi, hostess of the Northland, Ancient dame of Sariola, While at work within her dwelling, Heard the whips crack on the fenlands, Heard the rattle of the sledges; To the northward turned her glances, Turned her vision to the sunlight, And her thoughts ran on as follow: \"Who are these in bright apparel, On the banks of Pohya-waters, Are they friends or hostile armies?\" Then the hostess of the Northland Looked again and well considered, Drew much nearer to examine, Found they were not hostile armies, Found that they were friends and suitors.\n\nIn the midst was Ilmarinen, Son-in-law to ancient Louhi.\n\nWhen the hostess of Pohyola Saw the son-in-law approaching She addressed the words that follow: \"I had thought the winds were raging, That the piles of wood were falling, Thought the pebbles in commotion, Or perchance the ocean roaring; Then I hastened nearer, nearer, Drew still nearer and examined, Found the winds were not in battle, Found the piles of wood unshaken, Found the ocean was not roaring, Nor the pebbles in commotion, Found my son-in-law was coming With his heroes and attendants, Heroes counted by the hundreds.\n\n\"Should you ask of me the question, How I recognized the bridegroom Mid the hosts of men and heroes, I should answer, I should tell you: 'As the hazel-bush in copses, As the oak-tree in the forest, As the Moon among the planets; Drives the groom a coal-black courser, Running like the famished black-dog, Flying like the hungry raven, Graceful as the lark at morning, Golden cuckoos, six in number, Twitter on the birchen cross-bow; There are seven bluebirds singing On the racer's hame and collar.\" Noises hear they in the court-yard, On the highway hear the sledges, To the court comes Ilmarinen, With his body-guard of heroes; In the midst the chosen suitor, Not too far in front of others, Not too far behind his fellows.\n\nSpake the hostess of Pohyola: \"Hie ye hither, men and heroes, Haste, ye watchers, to the stables, There unhitch the suitor's stallion, Lower well the racer's breast-plate, There undo the straps and buckles, Loosen well the shafts and traces, And conduct the suitor hither, Give my son-in-law good welcome!\" Ilmarinen turned his racer Into Louhi's yard and stables, And descended from his snow-sledge.\n\nSpake the hostess of Pohyola: \"Come, thou servant of my bidding, Best of all my trusted servants, Take at once the bridegroom's courser From the shafts adorned with silver, From the curving arch of willow, Lift the harness trimmed in copper, Tie the white-face to the manger, Treat the suitor's steed with kindness, Lead him carefully to shelter By his soft and shining bridle, By his halter tipped with silver; Let him roll among the sand-hills, On the bottoms soft and even, On the borders of the snow-banks, In the fields of milky color.\n\n\"Lead the hero's steed to water, Lead him to the Pohya-fountains, Where the living streams are flowing, Sweet as milk of human kindness, From the roots of silvery birches, Underneath the shade of aspens."

