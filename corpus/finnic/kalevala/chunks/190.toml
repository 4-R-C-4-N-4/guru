[content]
body = "It shall never go to Mana, Never go to feed the stranger, Never to the village-lover; Neither shall it feed the forest, Nor be lost upon the mountains, Neither sprinkled in the woodlands, Nor be mingled with the waters; It is needed for our tables, Worthy food for all our children.' Summer-daughter, maid of beauty, Southern daughter of Creation, Give Suotikki tender fodder, To Watikki, give pure water, To Hermikki milk abundant, Fresh provisions to Tuorikki, From Mairikki let the milk flow, Fresh milk from my cows in plenty, Coming from the tips of grasses, From the tender herbs and leaflets, From the meadows rich in honey, From the mother of the forest, From the meadows sweetly dripping, From the berry-laden branches, From the heath of flower-maidens, From the verdure, maiden bowers, From the clouds of milk-providers, From the virgin of the heavens, That the milk may flow abundant From the cows that I have given To the keeping of Kullervo.\n\n\"Rise thou virgin of the valley, From the springs arise in beauty, Rise thou maiden of the fountain, Beautiful, arise in ether, Take the waters from the cloudlets, And my roaming herds besprinkle, That my cows may drink and flourish, May be ready for the coming Of the shepherdess of evening.\n\n\"O Millikki, forest-hostess, Mother of the herds at pasture, Send the tallest of thy servants, Send the best of thine assistants, That my herds may well be guarded, Through the pleasant days of summer, Given us by our Creator.\n\n\"Beauteous virgin of the woodlands, Tapio's most charming daughter, Fair Tellervo, forest-maiden, Softly clad in silken raiment, Beautiful in golden ringlets, Do thou give my herds protection, In the Metsola dominions, On the hills of Tapiola; Shield them with thy hands of beauty, Stroke them gently with thy fingers, Give to them a golden lustre, Make them shine like fins of salmon, Grow them robes as soft as ermine.\n\n\"When the evening star brings darkness, When appears the hour of twilight, Send my lowing cattle homeward, Milk within their vessels coursing, Water on their backs in lakelets.\n\nWhen the Sun has set in ocean, When the evening-bird is singing, Thus address my herds of cattle: \"Ye that carry horns, now hasten To the sheds of Ilmarinen; Ye enriched in milk go homeward, To the hostess now in waiting, Home, the better place for sleeping, Forest-beds are full of danger; When the evening comes in darkness, Straightway journey to the milkmaids Building fires to light the pathway On the turf enriched in honey, In the pastures berry-laden!\n\n\"Thou, O Tapio's son, Nyrikki, Forest-son, enrobed in purple, Cut the fir-trees on the mountains, Cut the pines with cones of beauty, Lay them o'er the streams for bridges, Cover well the sloughs of quicksand, In the swamps and in the lowlands, That my herd may pass in safety, On their long and dismal journey, To the clouds of smoke may hasten, Where the milkmaids wait their coming.\n\nIf the cows heed not this order, Do not hasten home at evening, Then, O service-berry maiden, Cut a birch-rod from the glenwood, From the juniper, a whip-stick, Near to Tapio's spacious mansion, Standing on the ash-tree mountain, Drive my wayward, lowing cattle, Into Metsola's wide milk-yards, When the evening-star is rising."

