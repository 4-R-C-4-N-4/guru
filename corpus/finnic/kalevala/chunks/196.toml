[content]
body = "But I hear a bugle sounding, 'Tis the playing of my herdsman, Playing on a magic cow-horn, Bursting all our ears with music!\" Kullerwoinen, drawing nearer, To the hostess spake as follows: \"Found the bugle in the woodlands, And the flute among the rushes; All thy herd are in the passage, All thy cows within the hurdles, This the time to build the camp-fire, This the time to do the milking!\" Ilmarinen's wife, the hostess, Thus addressed an aged servant: \"Go, thou old one, to the milking, Have the care of all my cattle, Do not ask for mine assistance, Since I have to knead the biscuit.\" Kullerwoinen spake as follows: \"Always does the worthy hostess, Ever does the wisdom-mother Go herself and do the milking, Tend the cows within the hurdles!\" Then the wife of Ilmarinen Built a field-fire in the passage, Went to milk her cows awaiting, Looked upon her herd in wonder, Spake these happy words of greeting: \"Beautiful, my herd of cattle, Glistening like the skins of lynxes, Hair as soft as fur of ermine, Peaceful waiting for the milk-pail!\" On the milk-stool sits the hostess, Milks one moment, then a second, Then a third time milks and ceases; When the bloody wolves disguising, Quick attack the hostess milking, And the bears lend their assistance, Tear and mutilate her body With their teeth and sharpened fingers.\n\nKullerwoinen, cruel wizard, Thus repaid the wicked hostess, Thus repaid her evil treatment.\n\nQuick the wife of Ilmarinen Cried aloud in bitter anguish, Thus addressed the youth, Kullervo: \"Evil son, thou bloody herdsman, Thou hast brought me wolves in malice, Driven bears within my hurdles!\n\nThese the words of Kullerwoinen: \"Have I evil done as shepherd, Worse the conduct of the hostess; Baked a stone inside my oat-cake, On the inside, rock and tan-bark, On the stone my knife, was broken, Treasure of my mother's household, Broken virtue of my people!\" Ilmarinen's wife made answer: \"Noble herdsman, Kullerwoinen, Change, I pray thee, thine opinion, Take away thine incantations, From the bears and wolves release me, Save me from this spell of torture I will give thee better raiment, Give the best of milk and butter, Set for thee the sweetest table; Thou shalt live with me in welcome, Need not labor for thy keeping.\n\nIf thou dost not free me quickly, Dost not break this spell of magic, I shall sink into the Death-land, Shall return to Tuonela.\" This is Kullerwoinen's answer: \"It is best that thou shouldst perish, Let destruction overtake thee, There is ample room in Mana, Room for all the dead in Kalma, There the worthiest must slumber, There must rest the good and evil.\" Ilmarinen's wife made answer: \"Ukko, thou O God in heaven, Span the strongest of thy cross-bows, Test the weapon by thy wisdom, Lay an arrow forged from copper, On the cross-bow of thy forging; Rightly aim thy flaming arrow, With thy magic hurl the missile, Shoot this wizard through the vitals, Pierce the heart of Kullerwoinen With the lightning of the heavens, With thine arrows tipped with copper.\" Kullerwoinen prays as follows: \"Ukko, God of truth and justice."

