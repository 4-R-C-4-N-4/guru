[content]
body = "If ye do not heed this order, Ye shall badly fare as maidens; I shall sing to war your suitors, Sing them under spear and broadsword, That for months, and years, and ages, Never ye will see their faces, Never hear their merry voices, Never will they tread these uplands, Never will they join these dances, Never will they drive these highways.\" Sad the wailing of Kyllikki, Sad the weeping flower of Sahri!\n\nListen to her tearful pleading: \"Give, O give me back my freedom, Free me from the throes of thralldom, Let this maiden wander homeward, By some foot-path let me wander To my father who is grieving, To my mother who is weeping; Let me go or I will curse thee!\n\nIf thou wilt not give me freedom, Wilt not let me wander homeward, Where my loved ones wait my coming, I have seven stalwart brothers, Seven sons of father's brother, Seven sons of mother's sister, Who pursue the tracks of red-deer, Hunt the hare upon the heather; They will follow thee and slay thee, Thus I'll gain my wished-for freedom.\" Lemminkainen, little heeding, Would not grant the maiden's wishes, Would not heed her plea for mercy.\n\nSpake again the waiting virgin, Pride and beauty of the Northland: \"Joyful was I with my kindred, Joyful born and softly nurtured Merrily I spent my childhood, Happy I, in virgin-freedom, In the dwelling of my father, By the bedside of my mother, With my lineage in Sahri; But alas!\n\nall joy has vanished, All my happiness departed, All my maiden beauty waneth Since I met thine evil spirit, Shameless hero of dishonor, Cruel fighter of the islands, Merciless in civil combat.\" Spake the hero, Lemminkainen, These the words of Kaukomieli: \"Dearest maiden, fair Kyllikki, My sweet strawberry of Pohya, Still thine anguish, cease thy weeping, Be thou free from care and sorrow, Never shall I do thee evil, Never will my hands maltreat thee, Never will mine arms abuse thee, Never will my tongue revile thee, Never will my heart deceive thee.\n\n\"Tell me why thou hast this anguish, Why thou hast this bitter sorrow, Why this sighing and lamenting, Tell me why this wail of sadness?\n\nBanish all thy cares and sorrows, Dry thy tears and still thine anguish, I have cattle, food, and shelter, I have home, and friends, and kindred, Kine upon the plains and uplands, In the marshes berries plenty, Strawberries upon the mountains I have kine that need no milking, Handsome kine that need no feeding, Beautiful if not well-tended; Need not tie them up at evening, Need not free them in the morning, Need not hunt them, need not feed them, Need not give them salt nor water.\n\n\"Thinkest thou my race is lowly, Dost thou think me born ignoble, Does my lineage agrieve thee?"

