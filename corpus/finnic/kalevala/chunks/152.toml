[content]
body = "Never was there in Wainola, Never will there be in Northland, Such a company assembled; All the children speak in joyance, All the aged move sedately; Dressed in white are all the maidens, Like the hoar-frost of the morning, Like the welcome dawn of spring-time, Like the rising of the daylight.\n\nSilver then was more abundant, Gold among the guests in plenty, On the hills were money, pockets, Money-bags along the valleys, For the friends that were invited, For the guests in joy assembled.\n\nAll the friends have now been lauded, Each has gained his meed of honor.\" Wainamoinen, old and truthful, Song-deliverer of Northland, Swung himself upon the fur-bench Or his magic sledge of copper, Straightway hastened to his hamlet, Singing as he journeyed onward, Singing charms and incantations, Singing one day, then a second, All the third day chanting legends.\n\nOn the rocks the runners rattled, Hung the sledge upon a birch-stump, Broke it into many pieces, With the magic of his singing; Double were the runners bended, All the parts were torn asunder, And his magic sledge was ruined.\n\nThen the good, old Wainamoinen Spake these words in meditation: \"Is there one among this number, In this rising generation, Or perchance among the aged, In the passing generation, That will go to Mana's kingdom, To the empire of Tuoni, There to get the magic auger From the master of Manala, That I may repair my snow-sledge, Or a second sledge may fashion?\" What the younger people answered Was the answer of the aged: \"Not among the youth of Northland, Nor among the aged heroes, Is there one of ample courage, That has bravery sufficient, To attempt the reckless journey To the kingdom of Tuoni, To Manala's fields and castles, Thence to bring Tuoni's auger, Wherewithal to mend thy snow-sledge, Build anew thy sledge of magic.\" Thereupon old Wainamoinen, The eternal wisdom-singer, Went again to Mana's empire, To the kingdom of Tuoni, Crossed the sable stream of Deathland, To the castles of Manala, Found the auger of Tuoni, Brought the instrument in safety.\n\nStraightway sings old Wainamoinen, Sings to life a purple forest, In the forest, slender birches, And beside them, mighty oak-trees, Shapes them into shafts and runners, Moulds them by his will and power, Makes anew his sledge of magic.\n\nOn his steed he lays the harness, Binds him to his sledge securely, Seats himself upon the cross-bench, And the racer gallops homeward, To the manger filled and waiting, To the stable of his master; Brings the ancient Wainamoinen, Famous bard and wise enchanter, To the threshold of his dwelling, To his home in Kalevala."

