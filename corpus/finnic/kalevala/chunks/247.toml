[content]
body = "Does the hostess of the woodlands, Give to thee the lynx and adder, Since thou comest home rejoicing, Playing, singing, on thy snow-shoes?\" Wainamoinen, ancient minstrel, Gave this answer to his people: \"For his songs I caught the adder, Caught the serpent for his wisdom; Therefore do I come rejoicing, Singing, playing, on my snow-shoes.\n\nNot the mountain lynx, nor serpent, Comes, however, to our dwellings; The Illustrious is coming, Pride and beauty of the forest, 'Tis the Master comes among us, Covered with his friendly fur-robe.\n\nWelcome, Otso, welcome, Light-foot, Welcome, Loved-one from the glenwood!\n\nIf the mountain guest is welcome, Open wide the gates of entry; If the bear is thought unworthy, Bar the doors against the stranger.\" This the answer of the tribe-folk: \"We salute thee, mighty Otso, Honey-paw, we bid thee welcome, Welcome to our courts and cabins, Welcome, Light-foot, to our tables Decorated for thy coming!\n\nWe have wished for thee for ages, Waiting since the days of childhood, For the notes of Tapio's bugle, For the singing of the wood-nymphs, For the coming of dear Otso, For the forest gold and silver, Waiting for the year of plenty, Longing for it as for summer, As the shoe waits for the snow-fields, As the sledge for beaten highways, As the maiden for her suitor, And the wife her husband's coming; Sat at evening by the windows, At the gates have, sat at morning, Sat for ages at the portals, Near the granaries in winter, Vanished, Till the snow-fields warmed and Till the sails unfurled in joyance, Till the earth grew green and blossomed, Thinking all the while as follows: \"Where is our beloved Otso, Why delays our forest-treasure?\n\nHas he gone to distant Ehstland, To the upper glens of Suomi?\" Spake the ancient Wainamoinen: \"Whither shall I lead the stranger, Whither take the golden Light-foot?\n\nShall I lead him to the garner, To the house of straw conduct him?\" This the answer of his tribe-folk: \"To the dining-hall lead Otso, Greatest hero of the Northland.\n\nFamous Light-foot, Forest-apple, Pride and glory of the woodlands, Have no fear before these maidens, Fear not curly-headed virgins, Clad in silver-tinselled raiment Maidens hasten to their chambers When dear Otso joins their number, When the hero comes among them.\" This the prayer of Wainamoinen: \"Grant, O Ukko, peace and plenty Underneath these painted rafters, In this ornamented dweling; Thanks be paid to gracious Ukko!\" Spake again the ancient minstrel: \"Whither shall we lead dear Otso, 'Whither take the fur-clad stranger?\n\nThis the answer of his people: \"Hither let the fur-robed Light-foot Be saluted on his coming; Let the Honey-paw be welcomed To the hearth-stone of the penthouse, Welcomed to the boiling caldrons, That we may admire his fur-robe, May behold his cloak with joyance."

