[content]
body = "Feasted all the old magicians, Feasted all the younger heroes, Feasted all the men and maidens; On the rocks were left the fish-bones, Only relics of their feasting.\n\nWainamoinen, ancient minstrel, Looked upon the pile of fragments, On the fish-bones looked and pondered, Spake these words in meditation: \"Wondrous things might be constructed From the relies of this monster, Were they in the blacksmith's furnace, In the hands of the magician, In the hands of Ilmarinen.\" Spake the blacksmith of Wainola: \"Nothing fine can be constructed From the bones and teeth of fishes By the skillful forger-artist, By the hands of the magician.\" These the words of Wainamoinen: \"Something wondrous might be builded From these jaws, and teeth, and fish-bones; Might a magic harp be fashioned, Could an artist be discovered That could shape them to my wishes.\" But he found no fish-bone artist That could shape the harp of joyance From the relies of their feasting, From the jaw-bones of the monster, To the will of the magician.\n\nThereupon wise Wainamoinen Set himself at work designing; Quick became a fish-bone artist, Made a harp of wondrous beauty, Lasting joy and pride of Suomi.\n\nWhence the harp's enchanting arches?\n\nFrom the jaw-bones of the monster.\n\nWhence the necessary harp-pins?\n\nFrom the pike-teeth firmly fastened.\n\nWhence the sweetly singing harp-strings?\n\nFrom the tail of Lempo's stallion.\n\nThus was born the harp of magic From the mighty pike of Northland, From the relies from the feasting Of the heroes of Wainola.\n\nAll the young men came to view it, All the aged with their children, Mothers with their beauteous daughters, Maidens with their golden tresses; All the people on the islands Came to view the harp of joyance, Pride and beauty of the Northland.\n\nWainamoinen, ancient minstrel, Let the aged try the harp-strings, Gave it to the young magicians, To the dames and to their daughters, To the maidens, silver-tinselled, To the singers of Wainola.\n\nWhen the young men touched the harp-strings, Then arose the notes of discord; When the aged played upon it, Dissonance their only music.\n\nSpake the wizard, Lemminkainen: \"O ye witless, worthless children, O ye senseless, useless maidens, O ye wisdom-lacking heroes, Cannot play this harp of magic, Cannot touch the notes of concord!\n\nGive to me this thing or beauty, Hither bring the harp of fish-bones, Let me try my skillful fingers.\" Lemminkainen touched the harp-strings, Carefully the strings adjusted, Turned the harp in all directions, Fingered all the strings in sequence, Played the instrument of wonder, But it did not speak in concord, Did not sing the notes of joyance.\n\nSpake the ancient Wainamoinen: \"There is none among these maidens, None among these youthful heroes, None among the old magicians That can play the harp of magic, Touch the notes of joy and pleasure.\n\nLet us take the harp to Pohya, There to find a skillful player That can touch the strings in concord.\" Then they sailed to Sariola, To Pohyola took the wonder, There to find the harp a master.\n\nAll the heroes of Pohyola, All the boys and all the maidens, Ancient dames, and bearded minstrels, Vainly touched the harp of beauty."

