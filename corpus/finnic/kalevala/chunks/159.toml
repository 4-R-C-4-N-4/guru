[content]
body = "Little heeding, Lemminkainen Cries aloud in prayer to Ukko: \"Ukko, thou O God above me, Dear Creator, omnipresent, From the north-west send a storm-cloud, From the east, dispatch a second, From the south send forth a third one; Let them gather from the south-west, Sew their edges well together, Fill thou well the interspaces, Send a snow-fall high as heaven, Let it fall from upper ether, Fall upon the flaming fire-pit, On the cataract and whirlpool!\" Mighty Ukko, the Creator, Ukko, father omnipresent, Dwelling in the courts of heaven, Sent a storm-cloud from the north-west, From the east he sent a second, From the south despatched a third one, Let them gather from the south-west, Sewed their edges well together, Filled their many interspaces, Sent a snow-fall high as heaven, From the giddy heights of ether, Sent it seething to the fire-pit, On the streams of burning matter; From the snow-fall in the fire-pond, Grows a lake with rolling billows.\n\nQuick the hero, Lemminkainen, Conjures there of ice a passage From one border to the other, Thus escapes his second danger, Thus his second trouble passes.\n\nThen the reckless Lemminkainen Raised his pearl-enamelled birch-rod, Snapped his whip above his racer, And the steed flew onward swiftly, Galloped on his distant journey O'er the highway to Pohyola; Galloped fast and galloped faster, Galloped on a greater distance, When the stallion loudly neighing, Stopped and trembled on the highway, Then the lively Lemminkainen Raised himself upon the cross-bench, Looked to see what else had happened; Lo I a wolf stands at the portals, in the passage-way a black-bear, At the high-gate of Pohyola, At the ending of the journey.\n\nThereupon young Lemminkainen, Handsome hero, Kaukomieli, Thrusts his fingers in his pockets, Seeks his magic pouch of leather, Pulls therefrom a lock of ewe-wool, Rubs it firmly in his fingers, In his hands it falls to powder; Breathes the breath of life upon it, When a flock of sheep arises, Goats and sheep of sable color; On the flock the black-wolf pounces, And the wild-bear aids the slaughter, While the reckless Lemminkainen Rushes by them on his journey; Gallops on a little distance, To the court of Sariola, Finds the fence of molten iron, And of steel the rods and pickets, In the earth a hundred fathoms, To the azure sky, a thousand, Double-pointed spears projecting; On each spear were serpents twisted, Adders coiled in countless numbers, Lizards mingled with the serpents, Tails entangled pointing earthward, While their heads were skyward whirling, Writhing, hissing mass of evil."

