[content]
body = "Bridegroom, thou beloved hero, Brave descendant of thy fathers, When thou goest on a journey, When thou drivest on the highway, Driving with the Rainbow-daughter, Fairest bride of Sariola, Do not lead her as a titmouse, As a cuckoo of the forest, Into unfrequented places, Into copses of the borders, Into brier-fields and brambles, Into unproductive marshes; Let her wander not, nor stumble On opposing rocks and rubbish.\n\nNever in her father's dwelling, Never in her mother's court-yard, Has she fallen into ditches, Stumbled hard against the fences, Run through brier-fields, nor brambles, Fallen over rocks, nor rubbish.\n\n\"Magic bridegroom of Wainola, Wise descendant of the heroes, Never let thy young wife suffer, Never let her be neglected, Never let her sit in darkness, Never leave her unattended.\n\nNever in her father's mansion, In the chambers of her mother, Has she sat alone in darkness, Has she suffered for attention; Sat she by the crystal window, Sat and rocked, in peace and plenty, Evenings for her father's pleasure, Mornings for her mother's sunshine.\n\nNever mayest thou, O bridegroom, Lead the Maiden of the Rainbow To the mortar filled with sea-grass, There to grind the bark for cooking, There to bake her bread from stubble, There to knead her dough from tan-bark Never in her father's dwelling, Never in her mother's mansion, Was she taken to the mortar, There to bake her bread from sea-grass.\n\nThou shouldst lead the Bride of Beauty To the garner's rich abundance, There to draw the till of barley, Grind the flour and knead for baking, There to brew the beer for drinking, Wheaten flour for honey-biscuits.\n\n\"Hero-bridegroom of Wainola, Never cause thy Bride of Beauty To regret her day of marriage; Never make her shed a tear-drop, Never fill her cup with sorrow.\n\nShould there ever come an evening When thy wife shall feel unhappy, Put the harness on thy racer, Hitch the fleet-foot to the snow-sled; Take her to her father's dwelling, To the household of her mother; Never in thy hero-lifetime, Never while the moonbeams glimmer, Give thy fair spouse evil treatment, Never treat her as thy servant; Do not bar her from the cellar, Do not lock thy best provisions Never in her father's mansion, Never by her faithful mother Was she treated as a hireling.\n\nHonored bridegroom of the Northland, Proud descendant of the fathers, If thou treatest well thy young wife, Worthily wilt thou be treated; When thou goest to her homestead, When thou visitest her father, Thou shalt meet a cordial welcome.\n\n\"Censure not the Bride of Beauty, Never grieve thy Rainbow-maiden, Never say in tones reproachful, She was born in lowly station, That her father was unworthy; Honored are thy bride's relations, From an old-time tribe, her kindred; When of corn they sowed a measure, Each one's portion was a kernel; When they sowed a cask of flax-seed, Each received a thread of linen.\n\nNever, never, magic husband, Treat thy beauty-bride unkindly, Teach her not with lash of servants, Strike her not with thongs of leather; Never has she wept in anguish From the birch-whip of her mother."

