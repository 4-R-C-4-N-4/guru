[content]
body = "Instantly the prancing racer Springs away upon his journey; On he, restless, plunges northward, All day long be onward gallops, All the next day, onward, onward, So the third from morn till evening, Till the third day twilight brings him To the meadows of Wainola, To the plains of Kalevala.\n\nAs it happened, Wainamoinen, Wainamoinen, the magician, Rode that sunset on the highway, Silently for pleasure driving Down Wainola's peaceful meadows, O'er the plains of Kalevala.\n\nYoukahainen, young and fiery, Urging still his foaming courser, Dashes down upon the singer, Does not turn aside in meeting, Meeting thus in full collision; Shafts are driven tight together, Hames and collars wedged and tangled, Tangled are the reins and traces.\n\nThus perforce they make a stand-still, Thus remain and well consider; Water drips from hame and collar, Vapors rise from both their horses.\n\nSpeaks the minstrel, Wainamoinen: \"Who art thou, and whence?\n\nThou comest Driving like a stupid stripling, Wainamoinen and Youkahainen.\n\nCareless, dashing down upon me.\n\nThou hast ruined shafts and traces; And the collar of my racer Thou hast shattered into ruin, And my golden sleigh is broken, Box and runners dashed to pieces.\" Youkahainen then make answer, Spake at last the words that follow: \"I am youthful Youkahainen, But make answer first, who thou art, Whence thou comest, where thou goest, From what lowly tribe descended?\" Wainamolinen, wise and ancient, Answered thus the youthful minstrel: \"If thou art but Youkahainen, Thou shouldst give me all the highway; I am many years thy senior.\" Then the boastful Youkahainen Spake again to Wainamoinen: \"Young or ancient, little matter, Little consequence the age is; He that higher stands in wisdom, He whose knowledge is the greater, He that is the sweeter singer, He alone shall keep the highway, And the other take the roadside.\n\nArt thou ancient Wainamoinen, Famous sorcerer and minstrel?\n\nLet us then begin our singing, Let us sing our ancient legends, Let us chant our garnered wisdom, That the one may hear the other, That the one may judge the other, In a war of wizard sayings.\" Wainamoinen, wise and ancient, Thus replied in modest accents: \"What I know is very little, Hardly is it worth the singing, Neither is my singing wondrous: All my days I have resided In the cold and dreary Northland, In a desert land enchanted, In my cottage home for ayes; All the songs that I have gathered, Are the cuckoo's simple measures, Some of these I may remember; But since thou perforce demandest, I accept thy boastful challenge.\n\nTell me now, my golden youngster, What thou knowest more than others, Open now thy store of wisdom.\" Thus made answer Youkahainen, Lapland's young and fiery minstrel: \"Know I many bits of learning This I know in perfect clearness: Every roof must have a chimney, Every fire-place have a hearth-stone; Lives of seal are free and merry, Merry is the life of walrus, Feeding on incautious salmon, Daily eating perch and whiting; Whitings live in quiet shallows, Salmon love the level bottoms; Spawns the pike in coldest weather, And defies the storms of winter."

