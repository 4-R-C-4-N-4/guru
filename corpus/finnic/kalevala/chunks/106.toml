[content]
body = "In the field were countless vipers, Serpents there of every species, Crawling, writhing, hissing, stinging, Harmless all against the hero, Thus he stills the snakes of Lempo: \"Vipers, ye by God created, Neither best nor worst of creatures, Ye whose wisdom comes from Ukko, And whose venom comes from Hisi, Ukko is your greater Master, By His will your heads are lifted; Get ye hence before my plowing, Writ-he ye through the grass and stubble, Crawl ye to the nearest thicket, Keep your heads beneath the heather, Hunt our holes to Mana's kingdom If your poison-heads be lifted, Then will mighty Ukko smite them 'With his iron-pointed arrows, With the lightning of his anger.\" Thus the blacksmith, Ilmarinen, Safely plows the field of serpents, Lifts the vipers in his plowing, Buries them beneath the furrow, Harmless all against his magic.\n\nWhen the task had been completed, Ilmarinen, quick returning, Thus addressed Pohyola's hostess: \"I have plowed the field of Hisi, Plowed the field of hissing serpents, Stilled and banished all the vipers; Give me, ancient dame, thy daughter, Fairest maiden of the Northland.\n\nSpake the hostess of Pohyola: \"Shall not grant to thee my daughter, Shall not give my lovely virgin, Till Tuoni's bear is muzzled, Till Manala's wolf is conquered, In the forests of the Death-land, In the boundaries of Mana.\n\nHundreds have been sent to hunt him, So one yet has been successful, All have perished in Manala.\" Thereupon young Ilmarinen To the maiden's chamber hastens, Thus addresses his affianced: \"Still another test demanded, I must go to Tuonela, Bridle there the bear of Mana, Bring him from the Death-land forests, From Tuoni's grove and empire!\n\nThis advice the maiden gives him: \"O thou artist, Ilmarinen, The eternal metal-worker, Forge of steel a magic bridle, On a rock beneath the water, In the foaming triple currents; Make the straps of steel and copper, Bridle then the bear of Mana, Lead him from Tuoni's forests.\" Then the blacksmith, Ilmarinen, Forged of steel a magic bridle, On a rock beneath the water, In the foam of triple currents; Made the straps of steel and copper, Straightway went the bear to muzzle, In the forests of the Death-land, Spake these words in supplication: \"Terhenetar, ether-maiden, Daughter of the fog and snow-flake, Sift the fog and let it settle O'er the bills and lowland thickets, Where the wild-bear feeds and lingers, That he may not see my coming, May not hear my stealthy footsteps!\" Terhenetar hears his praying, Makes the fog and snow-flake settle On the coverts of the wild-beasts; Thus the bear he safely bridles, Fetters him in chains of magic, In the forests of Tuoni, In the blue groves of Manala."

