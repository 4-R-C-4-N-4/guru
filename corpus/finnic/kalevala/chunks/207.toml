[content]
body = "thy brother too has perished, Dead he lies within the forest, Manalainen's trumpet called him; Home return and do him honor, Lay him in the lap of Kalma.\" Kullerwoinen thus replying: \"Has my hero-brother perished, There is home a sable stallion That will take him' to his slumber, Lay him in the lap of Kalma.\" Young Kullervo journeyed onward Over vale and over mountain, Playing on his reed of battle, Till a messenger appearing Brought the warrior these tidings: \"Lo!\n\nthy sister too has perished, Perished in the crystal fountain, Where the waters flow in beauty, Like a silver serpent winding Through the valley to the ocean; Home return and do her honor, Lay her in the lap of Kalma.\" These the words of Kullerwoinen: \"Has my beauteous sister perished, Fallen from my race forever, There is home a sable filly That will take her to her resting, Lay her in the lap of Kalma.\" Still Kullervo journeyed onward, Through the fens he went rejoicing, Sounding war upon his bugle, Till a messenger appearing Brought to him these words of sorrow: \"Lo!\n\nthy mother too has perished, Died in anguish, broken-hearted; Home return and do her honor, Lay her in the lap of Kalma.\" These the measures of Kullervo: \"Woe is me, my life hard-fated, That my mother too has perished, She that nursed me in my cradle, Made my couch a golden cover, Twirled for me the spool and spindle!\n\nLo!\n\nKullervo was not present When his mother's life departed; May have died upon the mountains, Perished there from cold and hunger.\n\nLave the dead form of my mother In the crystal waters flowing; Wrap her in the robes of ermine, Tie her hands with silken ribbon, Take her to the grave of ages, Lay her in the lap of Kalma.\n\nBury her with songs of mourning, Let the singers chant my sorrow; Cannot leave the fields of battle While Untamo goes unpunished, Fell destroyer of my people.\" Kullerwoinen journeyed onward, Still rejoicing, to the combat, Sang these songs in supplication: \"Ukko, mightiest of rulers, Loan to me thy sword of battle, Grant to me thy matchless weapon, And against a thousand armies I will war and ever conquer.\" Ukko, gave the youth his broadsword, Gave his blade of magic powers To the wizard, Kullerwoinen.\n\nThus equipped, the mighty hero Slew the people of Untamo, Burned their villages to ashes; Only left the stones and ovens, And the chimneys of their hamlets.\n\nThen the conqueror, Kullervo, Turned his footsteps to his home-land, To the cabin of his father; To his ancient fields and forests.\n\nEmpty did he find the cabin, And the forests were deserted; No one came to give him greeting, None to give the hand of welcome; Laid his fingers on the oven, But he found it cold and lifeless; Then he knew to satisfaction That his mother lived no longer; Laid his hand upon the fire-place, Cold and lifeless were the hearth-stones; Then he knew to satisfaction That his sister too had perished; Then he sought the landing-places, Found no boats upon the rollers; Then he knew to satisfaction That his brother too had perished; Then he looked upon the fish-nets, And he found them torn and tangled; And he knew to satisfaction That his father too had perished."

