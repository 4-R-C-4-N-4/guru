[content]
body = "Stand before her like a rampart, Be to her a strong protection, Do not let thy mother chide her, Let thy father not upbraid her, Never let thy guests offend her; Should thy servants bring annoyance, They may need the master's censure; Do not harm the Bride of Beauty, Never injure her thou lovest; Three long years hast thou been wooing, Hoping every mouth to win her.\n\n\"Counsel with the bride of heaven, To thy young wife give instruction, Kindly teach thy bride in secret, In the long and dreary evenings, When thou sittest at the fireside; Teach one year, in words of kindness, Teach with eyes of love a second, In the third year teach with firmness.\n\nIf she should not heed thy teaching, Should not hear thy kindly counsel After three long years of effort, Cut a reed upon the lowlands, Cut a nettle from the border, Teach thy wife with harder measures.\n\nIn the fourth year, if she heed not, Threaten her with sterner treatment, With the stalks of rougher edges, Use not yet the thongs of leather, Do not touch her with the birch-whip.\n\nIf she does not heed this warning, Should she pay thee no attention, Cut a rod upon the mountains, Or a willow in the valleys, Hide it underneath thy mantle, That the stranger may not see it, Show it to thy wife in secret, Shame her thus to do her duty, Strike not yet, though disobeying.\n\nShould she disregard this warning, Still refuse to heed thy wishes, Then instruct her with the willow, Use the birch-rod from the mountains In the closet of thy dwelling, In the attic of thy mansion; Strike, her not upon the common, Do not conquer her in public, Lest the villagers should see thee, Lest the neighbors hear her weeping, And the forests learn thy troubles.\n\nTouch thy wife upon the shoulders, Let her stiffened back be softened.\n\nDo not touch her on the forehead, Nor upon the ears, nor visage; If a ridge be on her forehead, Or a blue mark on her eyelids, Then her mother would perceive it, And her father would take notice, All the village-workmen see it, And the village-women ask her 'Hast thou been in heat of battle, Hast thou struggled in a conflict, Or perchance the wolves have torn thee, Or the forest-bears embraced thee, Or the black-wolf be thy husband, And the bear be thy protector?'\" By the fire-place lay a gray-beard, On the hearth-stone lay a beggar, And the old man spake as follows: \"Never, never, hero-husband, Follow thou thy young wife's wishes, Follow not her inclinations, As, alas!\n\nI did, regretful; Bought my bride the bread of barley, Veal, and beer, and best of butter, Fish and fowl of all descriptions, Beer I bought, home-brewed and sparkling, Wheat from all the distant nations, All the dainties of the Northland; All of this was unavailing, Gave my wife no satisfaction, Often came she to my chamber, Tore my sable locks in frenzy, With a visage fierce and frightful, With her eyeballs flashing anger, Scolding on and scolding ever, Ever speaking words of evil, Using epithets the vilest, Thought me but a block for chopping."

