[content]
body = "\"Let from these arise a mountain From the bottom of the deep-sea, Let a rock arise in water, That the war-ship of Pohyola, With her thousand men and heroes, May be wrecked upon the summit, By the aid of surging billows.\" Instantly a reef arises, In the sea springs up a mountain, Eastward, westward, through the waters.\n\nCame the war-ship of the Northland, Through the floods the boat came steering, Sailed against the mountain-ledges, Fastened on the rocks in water, Wrecked upon the Mount of Magic.\n\nIn the deep-sea fell the topmasts, Fell the sails upon the billows, Carried by the winds and waters O'er the waves of toil and trouble.\n\nLouhi, hostess of Pohyola, Tries to free her sinking vessel, Tries to rescue from destruction; But she cannot raise the war-ship, Firmly fixed upon the mountain; Shattered are the ribs and rudder, Ruined is the ship of Pohya.\n\nThen the hostess of the Northland, Much disheartened, spake as follows: \"Where the force, in earth or heaven, That will help a soul in trouble?\" Quick she changes form and feature, Makes herself another body; Takes five sharpened scythes of iron, Also takes five goodly sickles, Shapes them into eagle-talons; Takes the body of the vessel, Makes the frame-work of an eagle; Takes the vessel's ribs and flooring Makes them into wings and breastplate; For the tail she shapes the rudder; In the wings she plants a thousand Seniors with their bows and arrows; Sets a thousand magic heroes In the body, armed with broadswords In the tail a hundred archers, With their deadly spears and cross-bows, Thus the bird is hero-feathered.\n\nQuick she spreads her mighty pinions, Rises as a monster-eagle, Flies on high, and soars, and circles With one wing she sweeps the heavens, While the other sweeps the waters.\n\nSpake the hero's ocean-mother: \"O thou ancient Wainamoinen, Turn thy vision to the north-east, Cast thine eyes upon the sunrise, Look behind thy fleeing vessel, See the eagle of misfortune!\" Wainamoinen turned as bidden, Turned his vision to the north-east, Cast his eyes upon the sunrise, There beheld the Northland-hostess, Wicked witch of Sariola, Flying as a monster-eagle, Swooping on his mighty war-ship; Flies and perches on the topmast, On the sail-yards firmly settles; Nearly overturns the vessel Of the heroes of Wainola, Underneath the weight of envy.\n\nThen the hero, Ilmarinen, Turned to Ukko as his refuge, Thus entreated his Creator: \"Ukko, thou O God in heaven, Thou Creator full of mercy, Guard us from impending danger, That thy children may not perish, May not meet with fell destruction.\n\nHither bring thy magic fire-cloak, That thy people, thus protected, May resist Pohyola's forces, Well may fight against the hostess Of the dismal Sariola, May not fall before her weapons, May not in the deep-sea perish!\" Then the ancient Wainamoinen Thus addressed the ancient Louhi: \"O thou hostess of Pohyola, Wilt thou now divide the Sampo, On the fog-point in the water, On the island forest-covered?"

