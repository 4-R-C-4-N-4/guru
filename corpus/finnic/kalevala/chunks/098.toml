[content]
body = "These the words of Wainamoinen: \"Come, O maiden, to my vessel, In my magic ship be seated, Then I'll give thee truthful answer.\" Thus Annikki, silver-tinselled, Answers ancient Wainamoinen: \"With the winds I'll fill thy vessel, To thy bark I'll send the storm-winds And capsize thy ship of magic, Break in pieces its forecastle, If the truth thou dost not tell me, If thou dost not cease thy falsehoods, If thou dost not tell me truly Whither sails thy magic vessel.\" These the words of Wainamoinen: \"Now I make thee truthful answer, Though at first I spake deception: I am sailing to the Northland To the dismal Sariola, Where the ogres live and flourish, Where they drown the worthy heroes, There to woo the Maid of Beauty Sitting on the bow of heaven, Woo and win the fairy virgin, Bring her to my home and kindred, To the firesides of Walnola.\" Then Aunikki, graceful maiden, Of the Night and Dawn, the daughter, As she heard the rightful answer, Knew the truth was fully spoken, Straightway left her coats unbeaten, Left unwashed her linen garments, Left unrinsed her silks and ribbons On the highway by the sea-shore, On the bridge of scarlet color On her arm she threw her long-robes, Hastened off with speed of roebuck To the shops of Ilmarinen, To the iron-forger's furnace, To the blacksmith's home and smithy, Here she found the hero-artist, Forging out a bench of iron, And adorning it with silver.\n\nSoot lay thick upon his forehead, Soot and coal upon his shoulders.\n\nOn the threshold speaks Annikki, These the words his sister uses: \"Ilmarinen, dearest brother, Thou eternal artist-forger, Forge me now a loom of silver, Golden rings to grace my fingers, Forge me gold and silver ear-rings, Six or seven golden girdles, Golden crosslets for my bosom, For my head forge golden trinkets, And I'll tell a tale surprising, Tell a story that concerns thee Truthfully I'll tell the story.\" Then the blacksmith Ilmarinen Spake and these the words he uttered: \"If thou'lt tell the tale sincerely, I will forge the loom of silver, Golden rings to grace thy fingers, Forge thee gold and silver ear-rings, Six or seven golden girdles, Golden crosslets for thy bosom, For thy head forge golden trinkets; But if thou shouldst tell me falsely, I shall break thy beauteous jewels, Break thine ornaments in pieces, Hurl them to the fire and furnace, Never forge thee other trinkets.\" This the answer of Annikki: \"Ancient blacksmith, Ilmarinen, Dost thou ever think to marry Her already thine affianced, Beauteous Maiden of the Rainbow, Fairest virgin of the Northland, Chosen bride of Sariola?\n\nShouldst thou wish the Maid of Beauty, Thou must forge, and forge unceasing, Hammering the days and nights through; Forge the summer hoofs for horses, Forge them iron hoofs for winter, In the long nights forge the snow-sledge, Gaily trim it in the daytime, Haste thou then upon thy journey To thy wooing in the Northland, To the dismal Sariola; Thither journeys one more clever, Sails another now before thee, There to woo thy bride affianced, Thence to lead thy chosen virgin, Woo and win the Maid of Beauty; Three long years thou hast been wooing."

