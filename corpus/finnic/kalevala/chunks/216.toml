[content]
body = "'S SAILING.\n\nWainamoinen, old and faithful, Spake these words to Ilmarinen: \"O thou wonder-working brother, Let us go to Sariola, There to gain the magic Sampo, There to see the lid in colors.\" Ilmarinen gave this answer: \"Hard indeed to seize the Sampo, Neither can the lid be captured From the never-pleasant Northland, From the dismal Sariola.\n\nLouhi took away the Sampo, Carried off the lid in colors To the stone-mount of Pohyola; Hid it in the copper mountain, Where nine locks secure the treasure.\n\nMany young roots sprout around it, Grow nine fathoms deep in sand-earth, One great root beneath the mountain, In the cataract a second, And a third beneath the castle Built upon the mount of ages.\" Spake the ancient Wainamoinen: \"Brother mine, and wonder-worker, Let us go to Sariola, That we may secure the Sampo; Let us build a goodly vessel, Bring the Sampo to Wainola, Bring away the lid in colors, From the stone-berg of Pohyola, From the copper-bearing mountain.\n\nWhere the miracle lies anchored.\" Ilmarinen thus made answer: \"By the land the way is safer, Lempo travels on the ocean, Ghastly Death upon his shoulder; On the sea the waves will drift us, And the storm-winds wreck our vessel; Then our bands must do the rowing, And our feet must steer us homeward.\" Spake the ancient Wainamoinen: \"Safe indeed by land to journey, But the way is rough and trying, Long the road and full of turnings; Lovely is the ship on ocean, Beautiful to ride the billows, Journey easy o'er the waters, Sailing in a trusty vessel; Should the West-wind cross our pathway, Will the South-wind drive us northward.\n\nBe that as it may, my brother, Since thou dost not love the water, By the land then let us journey.\n\nForge me now the sword of battle, Forge for me the mighty fire-sword, That I may destroy the wild-beasts, Frighten all the Northland people, As we journey for the Sampo To the cold and dismal village, To the never-pleasant Northland, To the dismal Sariola.\" Then the blacksmith, Ilmarinen, The eternal forger-artist, Laid the metals in the furnace, In the fire laid steel and iron, In the hot-coals, gold and silver, Rightful measure of the metals; Set the workmen at the furnace, Lustily they plied the bellows.\n\nLike the wax the iron melted, Like the dough the hard steel softened, Like the water ran the silver, And the liquid gold flowed after.\n\nThen the minstrel, Ilmarinen, The eternal wonder-forger, Looks within his magic furnace, On the border of his oven, There beholds the fire-sword forming, Sees the blade with golden handle; Takes the weapon from the furnace, Lays it on his heavy anvil For the falling of the hammer; Forges well the blade of magic, Well the heavy sword be tempers, Ornaments the hero-weapon With the finest gold and silver.\n\nWainamoinen, the magician, Comes to view the blade of conquest, Lifts admiringly the fire-sword, Then these words the hero utters: \"Does the weapon match the soldier, Does the handle suit the bearer?"

