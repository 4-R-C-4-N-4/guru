[content]
body = "Quick the heavens are burst asunder, Quick the vault of Ukko opens, Downward drops the wayward Fire-child, Downward quick the red-ball rushes, Shoots across the arch of heaven, Hisses through the startled cloudlets, Flashes through the troubled welkin, Through nine starry vaults of ether.\n\nThen the ancient Wainamoinen Spake and these the words he uttered: \"Blacksmith brother, Ilmarinen, Let us haste and look together, What the kind of fire that falleth, What the form of light that shineth From the upper vault of heaven, From the lower earth and ocean.\n\nHas a second moon arisen, Can it be a ball of sunlight?\n\nThereupon the heroes wandered, Onward journeyed and reflected, How to gain the spot illumined, How to find the sacred Fire-child.\n\nCame a river rushing by them, Broad and stately as an ocean.\n\nStraightway ancient Wainamoinen There began to build a vessel, Build a boat to cross the river.\n\nWith the aid of Ilmarinen, From the oak he cut the row-locks, From the pine the oars be fashioned, From the aspen shapes the rudder.\n\nWhen the vessel they had finished, Quick they rolled it to the current, Hard they rowed and ever forward, On the Nawa-stream and waters, At the head of Nawa-river.\n\nIlmatar, the ether-daughter, Foremost daughter of creation, Came to meet them on their journey, Thus addressed the coming strangers: \"Who are ye of Northland heroes, Rowing on the Nawa-waters?\" Wainamoinen gave this answer: \"This the blacksmith, Ilmarinen, I the ancient Wainamoinen.\n\nTell us now thy name and station, Whither going, whence thou comest, Where thy tribe-folk live and linger?\n\nSpake the daughter of the Ether: \"I the oldest of the women, Am the first of Ether's daughters, Am the first of ancient mothers; Seven times have I been wedded.\n\nTo the heroes of creation.\n\nWhither do ye strangers journey?\n\nAnswered thus old Wainamoinen: \"Fire has left Wainola's hearth-stones, Light has disappeared from Northland; Have been sitting long in darkness, Cold and darkness our companions; Now we journey to discover What the fire that fell from heaven, Falling from the cloud's red lining, To the deeps of earth and ocean.\" Ilmatar returned this answer: \"Hard the flame is to discover, Hard indeed to find the Fire-child; Has committed many mischiefs, Nothing good has he accomplished; Quick the fire-ball fell from ether, From the red rims of the cloudlets, From the plains of the Creator, Through the ever-moving heavens, Through the purple ether-spaces, Through the blackened flues of Turi, To Palwoinen's rooms uncovered.\n\nWhen the fire had reached the chambers Of Palwoinen, son of evil, He began his wicked workings, He engaged in lawless actions, Raged against the blushing maidens, Fired the youth to evil conduct, Singed the beards of men and heroes.\n\n\"Where the mother nursed her baby, In the cold and cheerless cradle, Thither flew the wicked Fire-child, There to perpetrate some mischief; In the cradle burned the infant, By the infant burned the mother, That the babe might visit Mana, In the kingdom of Tuoni; Said the child was born for dying, Only destined for destruction, Through the tortures of the Fire-child."

