[content]
body = "\"If thou shouldst not heed this order, Shouldst not leave me to my freedom, Know I still another kingdom, Know another spot of resting; I shall drive thee to the summer, Lead thy tongue to warmer climates, There a prisoner to suffer, Never to obtain thy freedom Till thy spirit I deliver, Till I go myself and free thee.\" Wicked Frost, the son of Winter, Saw the magic bird of evil Hovering above his spirit, Straightway prayed for Ahti's mercy, These the words the Frost-fiend uttered: \"Let us now agree together, Neither one to harm the other, Never in the course of ages, Never while the moonlight glimmers On the snow-capped hills of Northland.\n\nIf thou hearest that I bring thee Cold to freeze thy feet and fingers, Hurl me to the fiery furnace, Hammer me upon the anvil Of the blacksmith, Ilmarinen; Lead my tongue to warmer climates, Banish me to lands of summer, There a prisoner to suffer, Nevermore to gain my freedom.\" Thereupon wild Lemminkainen Left his vessel in the ocean, Frozen in the ice of Northland, Left his warlike boat forever, Started on his cheerless journey To the borders of Pohyola, And the mighty Tiera followed In the tracks of his companion.\n\nOn the ice they journeyed northward Briskly walked upon the ice-plain, Walked one day, and then a second, Till the closing of the third day, When the Hunger-land approached them, When appeared Starvation-island.\n\nHere the hardy Lemminkainen Hastened forward to the castle, This the hero's prayer and question; \"Is there food within this castle, Fish or fowl within its larders, To refresh us on our journey, Mighty heroes, cold and weary?\n\nWhen the hero, Lemminkainen, Found no food within the castle, Neither fish, nor fowl, nor bacon, Thus he cursed it and departed: \"May the fire destroy these chambers, May the waters flood this dwelling, Wash it to the seas of Mana!\" Then they hastened onward, onward, Hastened on through field and forest, Over by-ways long untrodden, Over unknown paths and snow-fields; Here the hardy Lemminkainen, Reckless hero, Kaukomieli, Pulled the soft wool from the ledges, Gathered lichens from the tree-trunks, Wove them into magic stockings, Wove them into shoes and mittens, On the settles of the hoar-frost, In the stinging cold of Northland.\n\nThen he sought to find some pathway, That would guide their wayward footsteps, And the hero spake as follows: \"O thou Tiera, friend beloved, Shall we reach our destination, Wandering for days together, Through these Northland fields and forests?\n\nKura thus replies to Ahti: \"We, alas!\n\nhave come for vengeance, Come for blood and retribution, To the battle-fields of Northland, To the dismal Sariola, Here to leave our souls and bodies, Here to starve, and freeze, and perish, In the dreariest of places, In this sun-forsaken country!\n\nNever shall we gain the knowledge, Never learn it, never tell it, Which the pathway that can guide us To the forest-beds to suffer, To the Pohya-plains to perish, In the home-land of the ravens, Fitting food for crows and eagles."

