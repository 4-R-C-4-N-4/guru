[content]
body = "'S WOOING.\n\nIlmarinen, hero-blacksmith, The eternal metal-worker, Hastens forward to the court-room Of the hostess of Pohyola, Of the master of the Northland, Hastens through the open portals Into Louhi's home and presence.\n\nServants come with silver pitchers, Filled with Northland's richest brewing; Honey-drink is brought and offered To the blacksmith of Wainola, Ilmarinen thus replying: \"I shall not in all my life-time Taste the drink that thou hast brought me, Till I see the Maid of Beauty, Fairy Maiden of the Rainbow; I will drink with her in gladness, For whose hand I journey hither.\" Spake the hostess of Pohyola: \"Trouble does the one selected Give to him that wooes and watches; Not yet are her feet in sandals, Thine affianced is not ready.\n\nOnly canst thou woo my daughter, Only canst thou win the maiden, When thou hast by aid of magic Plowed the serpent-field of Hisi, Plowed the field of hissing vipers, Touching neither beam nor handles.\n\nOnce this field was plowed by Piru, Lempo furrowed it with horses, With a plowshare made of copper, With a beam of flaming iron; Never since has any hero Brought this field to cultivation.\" Ilmarinen of Wainola Straightway hastens to the chamber Of the Maiden of the Rainbow, Speaks these words in hesitation: \"Thou of Night and Dawn the daughter, Tell me, dost thou not remember When for thee I forged the Sampo, Hammered thee the lid in colors?\n\nThou didst swear by oath the strougest, By the forge and by the anvil, By the tongs and by the hammer, In the ears of the Almighty, And before omniscient Ukko, Thou wouldst follow me hereafter, Be my bride, my life-companion, Be my honored wife forever.\n\nNow thy mother is exacting, Will not give to me her daughter, Till by means of magic only, I have plowed the field of serpents, Plowed the hissing soil of Hisi.\" The affianced Bride of Beauty Gives this answer to the suitor: \"O, thou blacksmith, Ilmarinen, The eternal wonder-forger, Forge thyself a golden plowshare, Forge the beam of shining silver, And of copper forge the handles; Then with ease, by aid of magic, Thou canst plow the field of serpents, Plow the hissing soil of Hisi.\" Ilmarinen, welcome suitor, Straightway builds a forge and smithy, Places gold within the furnace, In the forge he lays the silver, Forges then a golden plowshare, Forges, too, a beam of silver, Forges handles out of copper, Forges boots and gloves of iron, Forges him a mail of metal, For his limbs a safe protection, Safe protection for his body.\n\nThen a horse of fire selecting, Harnesses the flaming stallion, Goes to plow the field of serpents, Plow the viper-lands of Hisi."

