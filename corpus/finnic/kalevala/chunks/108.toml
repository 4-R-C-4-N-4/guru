[content]
body = "Quick the giant fish endangered, Darts and flounders in the river, Dragging down the mighty eagle, Lashing up the very bottom To the surface of the river; When the mighty bird uprising Leaves the wounded pike in water, Soars aloft on worsted pinions To his home in upper ether; Soars awhile, and sails, and circles, Circles o'er the reddened waters, Swoops again on lightning-pinions, Strikes with mighty force his talons Into the shoulder of his victim; Strikes the second of his talons On the flinty mountain-ledges, On the rocks with iron hardened; From the cliffs rebound his talons, Slip the flinty rocks o'erhanging, And the monster-pike resisting Dives again beneath the surface To the bottom of the river, From the talons of the eagle; Deep, the wounds upon the body Of the monster of Tuoni.\n\nStill a third time soars the eagle, Soars, and sails, and quickly circles, Swoops again upon the monster, Fire out-shooting from his pinoins, Both his eyeballs flashing lightning; With his beak of steel and copper Grasps again the pike of Mana Firmly planted are his talons In the rocks and in his victim, Drags the monster from the river, Lifts the pike above the waters, From Tuoni's coal-black river, From the blue-back of Manala.\n\nThus the third time does the eagle Bring success from former failures; Thus at last the eagle catches Mana's pike, the worst of fishes, Swiftest swimmer of the waters, From the river of Tuoni; None could see Manala's river, For the myriad of fish-scales; Hardly could one see through ether, For the feathers of the eagle, Relicts of the mighty contest.\n\nThen the bird of copper talons Took the pike, with scales of silver, To the pine-tree's topmost branches, To the fir-tree plumed with needles, Tore the monster-fish in pieces, Ate the body of his victim, Left the head for Ilmarinen.\n\nSpake the blacksmith to the eagle: \"O thou bird of evil nature, What thy thought and what thy motive?\n\nThou hast eaten what I needed, Evidence of my successes; Thoughtless eagle, witless instinct, Thus to mar the spoils of conquest!\" But the bird of metal talons Hastened onward, soaring upward, Rising higher into ether, Rising, flying, soaring, sailing, To the borders of the long-clouds, Made the vault of ether tremble, Split apart the dome of heaven, Broke the colored bow of Ukko, Tore the Moon-horns from their sockets, Disappeared beyond the Sun-land, To the home of the triumphant.\n\nThen the blacksmith, Ilmarinen, Took the pike-head to the hostess Of the ever-dismal Northland, Thus addressed the ancient Louhi: \"Let this head forever serve thee As a guest-bench for thy dwelling, Evidence of hero-triumphs; I have caught the pike of Mana, I have done as thou demandest, Three my victories in Death-land, Three the tests of magic heroes; Wilt thou give me now thy daughter, Give to me the Maid of Beauty?\" Spake the hostess of Pohyola: \"Badly is the test accomplished, Thou has torn the pike in pieces, From his neck the head is severed, Of his body thou hast eaten, Brought to me this worthless relic!\n\nThese the words of Ilmarinen: \"When the victory is greatest, Do we suffer greatest losses!\n\nFrom the river of Tuoni, From the kingdom of Manala, I have brought to thee this trophy, Thus the third task is completed."

