[content]
body = "UNWELCOME GUEST.\n\nI have brought young Kaukomieli, Brought the Islander and hero, Also known as Lemminkainen, Through the jaws of death and ruin, Through the darkling deeps of Kalma, To the homesteads of Pohyola, To the dismal courts of Louhi; Now must I relate his doings, Must relate to all my bearers, How the merry Lemminkainen, Handsome hero, Kaukomieli, Wandered through Pohyola's chambers, Through the halls of Sariola, How the hero went unbidden To the feasting and carousal, Uninvited to the banquet.\n\nLemminkainen full of courage, Full of life, and strength, and magic.\n\nStepped across the ancient threshold, To the centre of the court-room, And the floors of linwood trembled, Walls and ceilings creaked and murmured.\n\nSpake the reckless Lemminkainen, These the words that Ahti uttered: \"Be ye greeted on my coming, Ye that greet, be likewise greeted!\n\nListen, all ye hosts of Pohya; Is there food about this homestead, Barley for my hungry courser, Beer to give a thirsty stranger?\n\nSat the host of Sariola At the east end of the table, Gave this answer to the questions: \"Surely is there in this homestead, For thy steed an open stable, Never will this host refuse thee, Shouldst thou act a part becoming, Worthy, coming to these portals, Waiting near the birchen rafters, In the spaces by the kettles, By the triple hooks of iron.\" Then the reckless Lemminkainen Shook his sable locks and answered: \"Lempo may perchance come hither, Let him fill this lowly station, Let him stand between the kettles, That with soot he may be blackened.\n\nNever has my ancient father, Never has the dear old hero, Stood upon a spot unworthy, At the portals near the rafters; For his steed the best of stables, Food and shelter gladly furnished, And a room for his attendants, Corners furnished for his mittens, Hooks provided for his snow-shoes, Halls in waiting for his helmet.\n\nWherefore then should I not find here What my father found before me?\" To the centre walked the hero, Walked around the dining table, Sat upon a bench and waited, On a bench of polished fir-wood, And the kettle creaked beneath him.\n\nSpake the reckless Lemminkainen: \"As a guest am I unwelcome, Since the waiters bring no viands, Bring no dishes to the stranger?\" Ilpotar, the Northland hostess, Then addressed the words that follow: \"Lemminkainen, thou art evil, Thou art here, but not invited, Thou hast not the look of kindness, Thou wilt give me throbbing temples, Thou art bringing pain and sorrow.\n\nAll our beer is in the barley, All the malt is in the kernel, All our grain is still ungarnered, And our dinner has been eaten; Yesterday thou shouldst have been here, Come again some future season.\" Whereupon wild Lemminkainen Pulled his mouth awry in anger, Shook his coal-black locks and answered: \"All the tables here are empty, And the feasting-time is over; All the beer has left the goblets, Empty too are all the pitchers, Empty are the larger vessels."

