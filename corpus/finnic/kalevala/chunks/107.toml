[content]
body = "When this task had been completed, Ilmarinen, quick returning, Thus addressed the ancient Louhi: \"Give me, worthy dame, thy daughter, Give me now my bride affianced, I have brought the bear of Mana From Tuoni's fields and forests.\" Spake the hostess of Pohyola To the blacksmith, Ilmarinen: \"I will only give my daughter, Give to thee the Maid of Beauty, When the monster-pike thou catchest In the river of Tuoni, In Manala's fatal waters, Using neither hooks, nor fish-nets, Neither boat, nor fishing-tackle; Hundreds have been sent to catch him, No one yet has been successful, All have perished in Manala.\" Much disheartened, Ilmarinen Hastened to the maiden's chamber, Thus addressed the rainbow-maiden: \"Now a third test is demanded, Much more difficult than ever; I must catch the pike of Mana, In the river of Tuoni, And without my fishing-tackle, Hard the third test of the hero!\n\nThis advice the maiden gives him: \"O thou hero, Ilmarinen, Never, never be discouraged: In thy furnace, forge an eagle, From the fire of ancient magic; He will catch the pike of Mana, Catch the monster-fish in safety, From the death-stream of Tuoni, From Manala's fatal waters.\" Then the suitor, Ilmarinen, The eternal artist-forgeman, In the furnace forged an eagle From the fire of ancient wisdom; For this giant bird of magic Forged he talons out of iron, And his beak of steel and copper; Seats himself upon the eagle, On his back between the wing-bones, Thus addresses he his creature, Gives the bird of fire, this order: \"Mighty eagle, bird of beauty, Fly thou whither I direct thee, To Tuoni's coal-black river, To the blue deeps of the Death-stream, Seize the mighty fish of Mana, Catch for me this water-monster.\" Swiftly flies the magic eagle, Giant-bird of worth and wonder, To the river of Tuoni, There to catch the pike of Mana; One wing brushes on the waters, While the other sweeps the heavens; In the ocean dips his talons, Whets his beak on mountain-ledges.\n\nSafely landing, Ilmarinen, The immortal artist-forger, Hunts the monster of the Death-stream, While the eagle hunts and fishes In the waters of Manala.\n\nFrom the river rose a monster, Grasped the blacksmith, Ilmarinen, Tried to drag him to his sea-cave; Quick the eagle pounced upon him, With his metal-beak he seized him, Wrenched his head, and rent his body, Hurled him back upon the bottom Of the deep and fatal river, Freed his master, Ilmarinen.\n\nThen arose the pike of Mana, Came the water-dog in silence, Of the pikes was not the largest, Nor belonged he to the smallest; Tongue the length of double hatchets, Teeth as long as fen-rake handles, Mouth as broad as triple streamlets, Back as wide as seven sea-boats, Tried to snap the magic blacksmith, Tried to swallow Ilmarinen.\n\nSwiftly swoops the mighty eagle, Of the birds was not the largest, Nor belonged he to the smallest; Mouth as wide as seven streamlets, Tongue as long as seven javelins, Like five crooked scythes his talons; Swoops upon the pike of Mana."

