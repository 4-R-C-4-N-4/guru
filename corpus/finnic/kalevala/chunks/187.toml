[content]
body = "Then the wizard spake as follows: \"This the proper work of Lempo, Let dire Hisi fell the forest!\" In the birch he sank his hatchet, Made an uproar in the woodlands, Called aloud in tones, of thunder, Whistled to the distant mountains, Till they echoed to his calling, When Kullervo spake as follows: \"May the forest, in the circle Where my voice rings, fall and perish, In the earth be lost forever!\n\nMay no tree remain unlevelled, May no saplings grow in spring-time, Never while the moonlight glimmers, Where Kullervo's voice has echoed, Where the forest hears my calling; Where the ground with seed is planted, And the grain shall sprout and flourish, May it never come to ripeness, Mar the ears of corn be blasted!\" When the strong man, Untamoinen, Went to look at early evening, How Kullervo was progressing, In his labors in the forest; Little was the work accomplished, Was not worthy of a here; Untamoinen thus reflected: \"Young Kullervo is not fitted For the work of clearing forests, Wastes the best of all the timber, To my lands he brings destruction; I shall set him making fences.\" Then the youth began the building Of a fence for Untamoinen; Took the trunks of stately fir-trees, Trimmed them with his blade for fence-posts, Cut the tallest in the woodlands, For the railing of his fences; Made the smaller poles and cross-bars From the longest of the lindens; Made the fence without a pass-way, Made no wicket in his fences, And Kullervo spake these measures.\n\n\"He that does not rise as eagles, Does not sail on wings through ether, Cannot cross Kullervo's pickets, Nor the fences he has builded.\" Untamoinen left his mansion To inspect the young boy's labors, View the fences of Kullervo; Saw the fence without a pass-way, Not a wicket in his fences; From the earth the fence extended To the highest clouds of heaven.\n\nThese the words of Untamoinen: \"For this work he is not fitted, Useless is the fence thus builded; Is so high that none can cross it, And there is no passage through it: He shall thresh the rye and barley.\" Young Kullervo, quick preparing Made an oaken flail for threshing, Threshed the rye to finest powder, Threshed the barley into atoms, And the straw to worthless fragments.\n\nUntamoinen went at evening, Went to see Kullervo's threshing, View the work of Kullerwoinen; Found the rye was ground to powder, Grains of barley crushed to atoms, And the straw to worthless rubbish.\n\nUntamoinen then grew angry, Spake these words in bitter accents: \"Kullerwoinen as a workman Is a miserable failure; Whatsoever work he touches Is but ruined by his witchcraft; I shall carry him to Ehstland, In Karyala I shall sell him To the blacksmith, Ilmarinen, There to swing the heavy hammer.\" Untamoinen sells Kullervo, Trades him off in far Karyala, To the blacksmith, Ilmarinen, To the master of the metals, This the sum received in payment: Seven worn and worthless sickles, Three old caldrons worse than useless, Three old scythes, and hoes, and axes, Recompense, indeed, sufficient For a boy that will not labor For the good of his employer."

