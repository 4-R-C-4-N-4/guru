[content]
body = "'S EVIL DEEDS.\n\nKullerwionen, youthful wizard, In his blue and scarlet stockings, Henceforth lingered with his parents; But he could not change his nature, Could not gain a higher wisdom, Could not win a better judgment; As a child he was ill-nurtured, Early rocked in stupid cradles, By a nurse of many follies, By a minister of evil.\n\nTo his work went Kullerwoinen, Strove to make his labors worthy; First, Kullervo went a-fishing, Set his fishing-nets in ocean; With his hands upon the row-locks, Kullerwoinen spake as follows: \"Shall I pull with all my forces, Pull with strength of youthful heroes, Or with weakness of the aged?\" From the stern arose a gray-beard, And he answered thus Kullervo: \"Pull with all thy youthful vigor; Shouldst thou row with magic power, Thou couldst not destroy this vessel, Couldst not row this boat to fragments.\" Thereupon the youth, Kullervo, Rowed with all his youthful vigor, With the mighty force of magic, Rowed the bindings from the vessel, Ribs of juniper he shattered, Rowed the aspen-oars to pieces.\n\nWhen the aged sire, Kalervo, Saw the work of Kullerwoinen, He addressed his son as follows: \"Dost not understand the rowing; Thou hast burst the bands asunder, Bands of juniper and willow, Rowed my aspen-boat to pieces; To the fish-nets drive the salmon, This, perchance, will suit thee better.\" Thereupon the son, Kullervo, Hastened to his work as bidden, Drove the salmon to the fish-nets, Spake in innocence as follows: \"Shall I with my youthful vigor Scare the salmon to the fish-nets, Or with little magic vigor Shall I drive them to their capture?\n\nSpake the master of the fish-nets: \"That would be but work of women, Shouldst thou use but little power In the frighting of the salmon!\" Kullerwoinen does as bidden, Scares the salmon with the forces Of his mighty arms and shoulders, With the strength of youth and magic, Stirs the water thick with black-earth, Beats the scare-net into pieces, Into pulp he beats the salmon.\n\nWhen the aged sire, Kalervo, Saw the work of Kullerwoinen, To his son these words he uttered: \"Dost not understand this labor, For this work thou art not suited, Canst not scare the perch and salmon To the fish-nets of thy father; Thou hast ruined all my fish-nets, Torn my scare-net into tatters, Beaten into pulp the whiting, Torn my net-props into fragments, Beaten into bits my wedges.\n\nLeave the fishing to another; See if thou canst pay the tribute, Pay my yearly contribution; See if thou canst better travel, On the way show better judgment!\" Thereupon the son, Kullervo, Hapless youth in purple vestments, In his magic shoes of deer-skin, In his locks of golden color, Sallied forth to pay the taxes, Pay the tribute for his people.\n\nWhen the youth had paid the tribute, Paid the yearly contribution, He returned to join the snow-sledge, Took his place upon the cross-bench, Snapped his whip above the courser, And began his journey homeward; Rattled on along the highway, Measured as he galloped onward Wainamoinen's hills and valleys, And his fields in cultivation."

