[content]
body = "'S RESTORATION.\n\nLemminkainen's aged mother Anxious roams about the islands, Anxious wonders in her chambers, What the fate of Lemminkainen, Why her son so long has tarried; Thinks that something ill has happened To her hero in Pohyola.\n\nSad, indeed, the mother's anguish, As in vain she waits his coming, As in vain she asks the question, Where her daring son is roaming, Whether to the fir-tree mountain, Whether to the distant heath-land, Or upon the broad-sea's ridges, On the floods and rolling waters, To the war's contending armies, To the heat and din of battle, Steeped in blood of valiant heroes, Evidence of fatal warfare.\n\nDaily does the wife Kyllikki Look about her vacant chamber, In the home of Lemminkainen, At the court of Kaukomieli; Looks at evening, looks at morning, Looks, perchance, upon his hair-brush, Sees alas!\n\nthe blood-drops oozing, Oozing from the golden bristles, And the blood-drops, scarlet-colored.\n\nThen the beauteous wife, Kyllikki, Spake these words in deeps of anguish: \"Dead or wounded is my husband, Or at best is filled with trouble, Lost perhaps in Northland forests, In some glen unknown to heroes, Since alas!\n\nthe blood is flowing From the brush of Lemminkainen, Red drops oozing from the bristles.\" Thereupon the anxious mother Looks upon the bleeding hair-brush And begins this wail of anguish: \"Woe is me, my life hard-fated, Woe is me, all joy departed!\n\nFor alas!\n\nmy son and hero, Valiant hero of the islands, Son of trouble and misfortune!\n\nSome sad fate has overtaken My ill-fated Lemminkainen!\n\nBlood is flowing from his hair-brush, Oozing from its golden bristles, And the drops are scarlet-colored.\" Quick her garment's hem she clutches, On her arm she throws her long-robes, Fleetly flies upon her journey; With her might she hastens northward, Mountains tremble from her footsteps, Valleys rise and heights are lowered, Highlands soon become as lowlands, All the hills and valleys levelled.\n\nSoon she gains the Northland village, Quickly asks about her hero, These the words the mother utters: \"O thou hostess of Pohyola, Where hast thou my Lemminkainen?\n\nTell me of my son and hero!\" Louhi, hostess of the Northland, Gives this answer to the mother: \"Nothing know I of thy hero, Of the hero of the islands; Where thy son may be I know not, Cannot lend the information; Once I gave thy son a courser, Hitched the racer to his snow-sledge, This the last of Lemminkainen; May perchance be drowned in Wuhne, Frozen In the icy ocean, Fallen prey to wolves in hunger, In a bear's den may have perished.\" Lemminkainen's mother answers: \"Thou art only speaking falsehoods, Northland wolves cannot devour us, Nor the bears kill Kaukomieli; He can slay the wolves of Pohya With the fingers of his left hand; Bears of Northland he would silence With the magic of his singing."

