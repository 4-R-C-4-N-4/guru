[content]
body = "Long ago my hero-father Tested well this sword in battle, Never failing in a conflict.\n\nShould his son be found less worthy?\" Then he grasped his mighty broadsword, Drew the fire-blade from the scabbard Hanging from his belt of copper.\n\nStanding on their hilts their broadswords, Carefully their blades were measured, Found the sword of Northland's master Longer than the sword of Ahti By the half-link of a finger.\n\nSpake the reckless Lemminkainen.\n\n\"Since thou hast the longer broadsword, Thou shalt make the first advances, I am ready for thy weapon.\" Thereupon Pohyola's landlord With the wondrous strength of anger, Tried in vain to slay the hero, Strike the crown of Lemminkainen; Chipped the splinters from the rafters, Cut the ceiling into fragments, Could not touch the Island-hero.\n\nThereupon brave Kaukomieli, Thus addressed Pohyola's master: \"Have the rafters thee offended?\n\nWhat the crimes they have committed, Since thou hewest them in pieces?\n\nListen now, thou host of Northland, Reckless landlord of Pohyola, Little room there is for swordsmen In these chambers filled with women; We shall stain these painted rafters, Stain with blood these floors and ceilings; Let us go without the mansion, In the field is room for combat, On the plain is space sufficient; Blood looks fairer in the court-yard, Better in the open spaces, Let it dye the snow-fields scarlet.\" To the yard the heroes hasten, There they find a monstrous ox-skin, Spread it on the field of battle; On the ox-skin stand the swordsmen.\n\nSpake the hero, Lemminkainen: \"Listen well, thou host of Northland, Though thy broadsword is the longer, Though thy blade is full of horror, Thou shalt have the first advantage; Use with skill thy boasted broadsword Ere the final bout is given, Ere thy head be chopped in pieces; Strike with skill, or thou wilt perish, Strike, and do thy best for Northland.\" Thereupon Pohyola's landlord Raised on high his blade of battle, Struck a heavy blow in anger, Struck a second, then a third time, But he could not touch his rival, Could Dot draw a single blood-drop From the veins of Lemminkainen, Skillful Islander and hero.\n\nSpake the handsome Kaukomieli: \"Let me try my skill at fencing, Let me swing my father's broadsword, Let my honored blade be tested!\" But the landlord of Pohyola, Does not heed the words of Ahti, Strikes in fury, strikes unceasing, Ever aiming, ever missing.\n\nWhen the skillful Lemminkainen Swings his mighty blade of magic, Fire disports along his weapon, Flashes from his sword of honor, Glistens from the hero's broadsword, Balls of fire disporting, dancing, On the blade of mighty Ahti, Overflow upon the shoulders Of the landlord of Pohyola.\n\nSpake the hero, Lemminkainen: \"O thou son of Sariola, See!\n\nindeed thy neck is glowing Like the dawning of the morning, Like the rising Sun in ocean!\" Quickly turned Pohyola's landlord, Thoughtless host of darksome Northland, To behold the fiery splendor Playing on his neck and shoulders."

