[content]
body = "Thus they asked the hero-stranger.\n\n\"Magic swimmer of the Northland, Son of evil, what the message That thou bringest from thy people, What thy mission to Pohyola?\" Wainamoinen, old and truthful, Thus addressed the hosts of Louhi: \"For the Sun I come to Northland, Come to seek the Moon in Pohya; Tell me where the Sun lies hidden, Where the golden Moon is sleeping.\" Spake the evil sons of Pohya: \"Both the Sun and Moon are hidden In the rock of many colors, In the copper-bearing mountain, In a cavern iron-banded, In the stone-berg of Pohyola, Nevermore to gain their freedom, Nevermore to shine in Northland!\" Spake the hero, Wainamoinen: \"If the Sun be not uncovered, If the Moon leave not her dungeon, I will challenge all Pohyola To the test of spear or broadsword, Let us now our weapons measure!\" Quick the hero of Wainola Drew his mighty sword of magic; On its border shone the moonlight, On its hilt the Sun was shining, On its back, a neighing stallion, On its face a cat was mewing, Beautiful his magic weapon.\n\nQuick the hero-swords are tested, And the blades are rightly measured Wainamoinen's sword is longest By a single grain of barley, By a blade of straw, the widest.\n\nTo the court-yard rushed the heroes, Hastened to the deadly combat, On the plains of Sariola.\n\nWainamoinen, the magician, Strikes one blow, and then a second, Strikes a third time, cuts and conquers.\n\nAs the house-maids slice the turnips, As they lop the heads of cabbage, As the stalks of flax are broken, So the heads of Louhi's heroes Fall before the magic broadsword Of the ancient Wainamoinen.\n\nThen victor from Wainola, Ancient bard and great magician, Went to find the Sun in slumber, And the golden Moon discover, In the copper-bearing Mountains, In the cavern iron-banded, In the stone-berg of Pohyola.\n\nHe had gone but little distance, When he found a sea-green island; On the island stood a birch-tree, Near the birch-tree stood a pillar Carved in stone of many colors; In the pillar, nine large portals Bolted in a hundred places; In the rock he found a crevice Sending forth a gleam of sunlight.\n\nQuick he drew his mighty broadsword, From the pillar struck three colors, From the magic of his weapon; And the pillar fell asunder, Three the number of the fragments.\n\nWainamoinen, old and faithful, Through the crevice looked and wondered.\n\nIn the center of the pillar, From a scarlet-colored basin, Noxious serpents beer were drinking, And the adders eating spices.\n\nSpake the ancient Wainamoinen: \"Therefore has Pohyola's hostess Little drink to give to strangers, Since her beer is drank by serpents, And her spices given to adders.\" Quick he draws his magic fire-blade, Cuts the vipers green in pieces, Lops the heads off all the adders, Speaks these words of master-magic: Thus, hereafter, let the serpent Drink the famous beer of barley, Feed upon the Northland-spices!\" Wainamoinen, the magician, The eternal wizard-singer, Sought to open wide the portals With the hands and words of magic; But his hands had lost their cunning, And his magic gone to others."

