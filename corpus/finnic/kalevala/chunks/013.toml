[content]
body = "Now it was that Youkahainen Comprehended but too clearly What his folly, what the end was, Of the journey he had ventured, Vainly he had undertaken For the glory of a contest With the grand, old Wainamoinen.\n\nWhen at last young Youkahainen, Pohyola's old and sorry stripling, Strives his best to move his right foot, But alas!\n\nthe foot obeys not; When he strives to move his left foot, Lo!\n\nhe finds it turned to flint-stone.\n\nThereupon sad Youkahainen, In the deeps of desperation, And in earnest supplication, Thus addresses Wainamoinen: \"O thou wise and worthy minstrel, Thou the only true, magician, Cease I pray thee thine enchantment,.\n\nOnly turn away thy magic, Let me leave this slough of horror, Loose me from this stony prison, Free me from this killing torment, I will pay a golden ransom.\" Spake the ancient Wainamoinen: \"What the ransom thou wilt give me If I cease from mine enchantment, If I turn away my magic, Lift thee from thy slough of horror, Loose thee from thy stony prison, Free thee from thy killing torment?\" Answered youthful Youkahainen: \"Have at home two magic cross-bows, Pair of bows of wondrous power, One so light a child can bend it, Only strength can bend the other, Take of these the one that pleases.\" Then the ancient Wainamoinen: \"Do not wish thy magic cross-bows, Have a few of such already, Thine to me are worse than useless I have bows in great abundance, Bows on every nail and rafter, Bows that laugh at all the hunters, Bows that go themselves a-hunting.\" Then the ancient Wainamoinen Sang alas!\n\npoor Youkahainen Deeper into mud and water, Deeper in the slough of torment.\n\nYoukahainen thus made answer: \"Have at home two magic shallops, Beautiful the boats and wondrous; One rides light upon the ocean, One is made for heavy burdens; Take of these the one that pleases.\" Spake the ancient Wainamoinen: \"Do not wish thy magic shallops, Have enough of such already; All my bays are full of shallops, All my shores are lined with shallops, Some before the winds are sailors, Some were built to sail against them.\" Still the Wainola bard and minstrel Sings again poor Youkahainen Deeper, deeper into torment, Into quicksand to his girdle, Till the Lapland bard in anguish Speaks again to Wainamoinen: \"Have at home two magic stallions, One a racer, fleet as lightning, One was born for heavy burdens; Take of these the one that pleases.\" Spake the ancient Wainamoinen: \"Neither do I wish thy stallions, Do not need thy hawk-limbed stallions, Have enough of these already; Magic stallions swarm my stables, Eating corn at every manger, Broad of back to hold the water, Water on each croup in lakelets.\" Still the bard of Kalevala Sings the hapless Lapland minstrel Deeper, deeper into torment, To his shoulders into water."

