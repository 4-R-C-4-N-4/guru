[content]
body = "I will send thee nine diseases, Each more fatal than the other, That will sicken all thy people, Make thy children sink and perish, Nevermore to visit Northland, Never while the moonlight glimmers On the plains of Kalevala!\" Thus the ancient bard made answer: \"Not a Laplander can banish Wainamoinen and his people; Never can a Turyalander Drive my tribes from Kalevala; God alone has power to banish, God controls the fate of nations, Never trusts the arms of evil, Never gives His strength to others.\n\nAs I trust in my Creator, Call upon benignant Ukko, He will guard my crops from danger Drive the Frost-fiend from my corn-fields, Drive great Otso to his caverns.\n\n\"Wicked Louhi of Pohyola, Thou canst banish evil-doers, In the rocks canst hide the wicked, In thy mountains lock the guilty; Thou canst never hide the moonlight, Never bide the silver sunshine, In the caverns of thy kingdom.\n\nFreeze the crops of thine own planting, Freeze the barley of thy sowing, Send thine iron-hail from heaven To destroy the Lapland corn-fields, To annihilate thy people, To destroy the hosts of Pohya; Send great Otso from the heather, Send the sharp-tooth from the forest, To the fields of Sariola, On the herds and flocks of Louhi!\" Thus the wicked hostess answered: \"All my power has departed, All my strength has gone to others, All my hope is in the deep-sea; In the waters lies my Sampo!\" Then the hostess of Pohyola Home departed, weeping, wailing, To the land of cold and darkness; Only took some worthless fragments Of the Sampo to her people; Carried she the lid to Pohya, In the blue-sea left the handle; Hence the poverty of Northland, And the famines of Pohyola.\n\nWainamoinen, ancient minstrel, Hastened to the broad-sea's margin, Stepped upon the shore in joyance; Found there fragments of the Sampo, Fragments of the lid in colors, On the borders of the waters, On the curving sands and sea-sides; Gathered well the Sampo-relics From the waters near the fog-point, On the island forest-covered.\n\nSpake the ancient Wainamoinen, Spake these words in supplication: \"Grant, O Ukko, our Creator, Grant to us, thy needful children, Peace, and happiness, and plenty, That our lives may be successful, That our days may end in honor, On the vales and hills of Suomi, On the prairies of Wainola, In the homes of Kalevala!\n\n\"Ukko, wise and good Creator, Ukko, God of love and mercy, Shelter and protect thy people From the evil-minded heroes, From the wiles of wicked women, That our country's plagues may leave us, That thy faithful tribes may prosper.\n\nBe our friend and strong protector, Be the helper of thy children, In the night a roof above them, In the day a shield around them, That the sunshine may not vanish, That the moonlight may not lessen, That the killing frosts may leave them, And destructive hail pass over.\n\nBuild a metal wall around us, From the valleys to the heavens; Build of stone a mighty fortress On the borders of Wainola, Where thy people live and labor, As their dwelling-place forever, Sure protection to thy people, Where the wicked may not enter, Nor the thieves break through and pilfer, Never while the moonlight glistens, And the Sun brings golden blessings To the plains of Kalevala.\""

