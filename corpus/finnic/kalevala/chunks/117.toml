[content]
body = "Is not like the smoke of camp-fires, Is too large for fires of shepherds!\" Lemminkainen's ancient mother Journeyed in the early morning For some water to the fountain, Saw the smoke arise to heaven, In the region of Pohyola, These the words the mother uttered: \"'Tis the smoke of battle-heroes, From the beat of warring armies!\" Even Ahti, island-hero, Ancient wizard, Lemminkainen, Also known as Kaukomieli, Looked upon the scene in wonder, Thought awhile and spake as follows: \"I would like to see this nearer, Learn the cause of all this trouble, Whence this smoke and great confusion, Whether smoke from heat of battle, Or the bonfires of the shepherds.\" Kaukomieli gazed and pondered, Studied long the rising smoke-clouds; Came not from the heat of battle, Came not from the shepherd bonfires; Heard they were the fires of Louhi Brewing beer in Sariola, On Pohyola's promontory; Long and oft looked Lemminkainen, Strained in eagerness his vision, Stared, and peered, and thought, and wondered, Looked abashed and envy-swollen, \"O beloved, second mother, Northland's well-intentioned hostess, Brew thy beer of honey-flavor, Make thy liquors foam and sparkle, For thy many friends invited, Brew it well for Lemminkainen, For his marriage in Pohyola With the Maiden of the Rainbow.\" Finally the beer was ready, Beverage of noble heroes, Stored away in casks and barrels, There to rest awhile in silence, In the cellars of the Northland, In the copper-banded vessels, In the magic oaken hogsheads, Plugs and faucets made of copper.\n\nThen the hostess of Pohyola Skilfully prepared the dishes, Laid them all with careful fingers In the boiling-pans and kettles, Ordered countless loaves of barley, Ordered many liquid dishes, All the delicacies of Northland, For the feasting of her people, For their richest entertainment, For the nuptial songs and dances, At the marriage of her daughter With the blacksmith, Ilmarinen.\n\nWhen the loaves were baked and ready.\n\nWhen the dishes all were seasoned, Time had gone but little distance, Scarce a moment had passed over, Ere the beer, in casks imprisoned, Loudly rapped, and sang, and murmured: \"Come, ye heroes, come and take me, Come and let me cheer your spirits, Make you sing the songs of wisdom, That with honor ye may praise me, Sing the songs of beer immortal!\" Straightway Louhi sought a minstrel, Magic bard and artist-singer, That the beer might well be lauded, Might be praised in song and honor.\n\nFirst as bard they brought a salmon, Also brought a pike from ocean, But the salmon had no talent, And the pike had little wisdom; Teeth of pike and gills of salmon Were not made for singing legends.\n\nThen again they sought a singer, Magic minstrel, beer-enchanter, Thus to praise the drink of heroes, Sing the songs of joy and gladness; And a boy was brought for singing; But the boy had little knowledge, Could not praise the beer in honor; Children's tongues are filled with questions, Children cannot speak in wisdom, Cannot sing the ancient legends."

