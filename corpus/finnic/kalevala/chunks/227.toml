[content]
body = "From his eves the tear-drops started, Flowed adown his furrowed visage, Falling from his beard in streamlets, Trickled on his heaving bosom, Streaming o'er his golden girdle, Coursing to his garment's border, Then beneath his shoes of ermine, Flowing on, and flowing ever, Part to earth for her possession, Part to water for her portion.\n\nAs the tear-drops fall and mingle, Form they streamlets from the eyelids Of the minstrel, Wainamoinen, To the blue-mere's sandy margin, To the deeps of crystal waters, Lost among the reeds and rushes.\n\nSpake at last the ancient minstrel: \"Is there one in all this concourse, One in all this vast assembly That can gather up my tear-drops From the deep, pellucid waters?\" Thus the younger heroes answered, Answered thus the bearded seniors: \"There is none in all this concourse, None in all this vast assembly, That can gather up thy tear-drops From the deep, pellucid waters.\" Spake again wise Wainamoinen: \"He that gathers up my tear-drops From the deeps of crystal waters Shall receive a beauteous plumage.\" Came a raven, flying, croaking, And the minstrel thus addressed him: \"Bring, O raven, bring my tear-drops From the crystal lake's abysses; I will give thee beauteous plumage, Recompense for golden service.\" But the raven failed his master.\n\nCame a duck upon the waters, And the hero thus addressed him: \"Bring O water-bird, my tear-drops; Often thou dost dive the deep-sea, Sink thy bill upon the bottom Of the waters thou dost travel; Dive again my tears to gather, I will give thee beauteous plumage, Recompense for golden service.\" Thereupon the duck departed, Hither, thither, swam, and circled, Dived beneath the foam and billow, Gathered Wainamoinen's tear-drops From the blue-sea's pebbly bottom, From the deep, pellucid waters; Brought them to the great magician, Beautifully formed and colored, Glistening in the silver sunshine, Glimmering in the golden moonlight, Many-colored as the rainbow, Fitting ornaments for heroes, Jewels for the maids of beauty.\n\nThis the origin of sea-pearls, And the blue-duck's beauteous plumage."

