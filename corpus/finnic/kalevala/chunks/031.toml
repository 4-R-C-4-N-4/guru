[content]
body = "What will happen if I perish, If I sink below the billows, Perish here from cold and hunger?\" Thus the bird of Ether answered \"Be not in the least disheartened, Place thyself between my shoulders, On my back be firmly seated, I will lift thee from the waters, Bear thee with my pinions upward, Bear thee wheresoe'er thou willest.\n\nWell do I the day remember Where thou didst the eagle service, When thou didst the birds a favor.\n\nThou didst leave the birch-tree standing, When were cleared the Osmo-forests, From the lands of Kalevala, As a home for weary song-birds, As a resting-place for eagles.\" Then arises Wainamoinen, Lifts his head above the waters, Boldly rises from the sea-waves, Lifts his body from the billows, Seats himself upon the eagle, On the eagle's feathered shoulders.\n\nQuick aloft the huge bird bears him, Bears the ancient Wainamoinen, Bears him on the path of zephyrs, Floating on the vernal breezes, To the distant shore of Northland, To the dismal Sariola, Where the eagle leaves his burden, Flies away to join his fellows.\n\nWainamoinen, lone and weary, Straightway fell to bitter weeping, Wept and moaned in heavy accents, On the border of the blue-sea.\n\nOn a cheerless promontory, With a hundred wounds tormented, Made by cruel winds and waters, With his hair and beard dishevelled By the surging of the billows.\n\nThree long days he wept disheartened Wept as many nights in anguish, Did not know what way to journey, Could not find a woodland foot-print, That would point him to the highway, To his home in Kalevala, To his much-loved home and kindred.\n\nNorthland's young and slender maiden, With complexion fair and lovely, With the Sun had laid a wager, With the Sun and Moon a wager, Which should rise before the other, On the morning of the morrow.\n\nAnd the maiden rose in beauty, Long before the Sun had risen, Long before the Moon bad wakened, From their beds beneath the ocean.\n\nEre the cock had crowed the day-break, Ere the Sun had broken slumber She had sheared six gentle lambkins, Gathered from them six white fleeces, Hence to make the rolls for spinning, Hence to form the threads for weaving, Hence to make the softest raiment, Ere the morning dawn had broken, Ere the sleeping Sun had risen.\n\nWhen this task the maid had ended, Then she scrubbed the birchen tables, Sweeps the ground-floor of the stable, With a broom of leaves and branches From the birches of the Northland, Scrapes the sweepings well together On a shovel made of copper, Carries them beyond the stable, From the doorway to the meadow, To the meadow's distant border, Near the surges of the great-sea, Listens there and looks about her, Hears a wailing from the waters, Hears a weeping from the sea-shore, Hears a hero-voice lamenting."

