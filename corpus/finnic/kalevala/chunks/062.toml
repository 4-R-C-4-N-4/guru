[content]
body = "Now the minstrel, Lemminkainen, Changes both his form and stature, Passes through the inner door-ways, Enters he the spacious court-hall, And these words the hero utters: \"Fine the singing quickly ending, Good the song that quickly ceases; Better far to keep thy wisdom Than to sing it on the house-tops.\" Comes the hostess of Pohyola, Fleetly rushing through the door-way, To the centre of the court-room, And addresses thus the stranger: Formerly a dog lay watching, Was a cur of iron-color, Fond of flesh, a bone-devourer, Loved to lick the blood of strangers.\n\nWho then art thou of the heroes, Who of all the host of heroes, That thou art within my court-rooms, That thou comest to my dwelling, Was not seen without my portals, Was not scented by my watch-dogs?\n\nSpake the reckless Lemminkainen: \"Do not think that I come hither Having neither wit nor wisdom, Having neither art nor power, Wanting in ancestral knowledge, Lacking prudence of the fathers, That thy watch-dogs may devour me.\n\n\"My devoted mother washed me, When a frail and tender baby, Three times in the nights of summer, Nine times in the nights of autumn, That upon my journeys northward I might sing the ancient wisdom, Thus protect myself from danger; When at home I sing as wisely As the minstrels of thy hamlet.\" Then the singer, Lemminkainen, Ancient hero, Kaukomieli, Quick began his incantations, Straightway sang the songs of witchcraft, From his fur-robe darts the lightning, Flames outshooting from his eye-balls, From the magic of his singing From his wonderful enchantment.\n\nSang the very best of singers To the very worst of minstrels, Filled their mouths with dust and ashes, Piled the rocks upon their shoulders, Stilled the best of Lapland witches, Stilled the sorcerers and wizards.\n\nThen he banished all their heroes, Banished all their proudest minstrels, This one hither, that one thither, To the lowlands poor in verdure, To the unproductive uplands, To the oceans wanting whiting, To the waterfalls of Rutya, To the whirlpool hot and flaming, To the waters decked with sea-foam, Into fires and boiling waters, Into everlasting torment.\n\nThen the hero, Lemminkainen, Sang the foemen with their broadswords?\n\nSang the heroes with their weapons, Sang the eldest, sang the youngest, Sang the middle-aged, enchanted; Only one he left his senses, He a poor, defenseless shepherd, Old and sightless, halt and wretched, And the old man's name was Nasshut.\n\nSpake the miserable shepherd: \"Thou hast old and young enchanted, Thou hast banished all our heroes, Why hast spared this wretched shepherd?\" This is Lemminkainen's answer: \"Therefore have I not bewitched thee: Thou art old, and blind, and wretched Feeble-minded thou, and harmless, Loathsome now without my magic."

