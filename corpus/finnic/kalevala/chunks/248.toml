[content]
body = "Have no care, thou much-loved Otso, Let not anger swell thy bosom As thy coat we view with pleasure; We thy fur shall never injure, Shall not make it into garments To protect unworthy people.\" Thereupon wise Wainamoinen Pulled the sacred robe from Otso, Spread it in the open court-yard, Cut the members into fragments, Laid them in the heating caldrons, In the copper-bottomed vessels— O'er the fire the crane was hanging, On the crane were hooks of copper, On the hooks the broiling-vessels Filled with bear-steak for the feasting, Seasoned with the salt of Dwina, From the Saxon-land imported, From the distant Dwina-waters, From the salt-sea brought in shallops.\n\nReady is the feast of Otso; From the fire are swung the kettles On the crane of polished iron; In the centers of the tables Is the bear displayed in dishes, Golden dishes, decorated; Of the fir-tree and the linden Were the tables newly fashioned; Drinking cups were forged from copper, Knives of gold and spoons of silver; Filled the vessels to their borders With the choicest bits of Light-foot, Fragments of the Forest-apple.\n\nSpake the ancient Wainamoinen \"Ancient one with bosom golden, Potent voice in Tapio's councils Metsola's most lovely hostess, Hostess of the glen and forest, Hero-son of Tapiola, Stalwart youth in cap of scarlet, Tapio's most beauteous virgin, Fair Tellervo of the woodlands, Metsola with all her people, Come, and welcome, to the feasting, To the marriage-feast of Otso!\n\nAll sufficient, the provisions, Food to eat and drink abundant, Plenty for the hosts assembled, Plenty more to give the village.\" This the question of the people: \"Tell us of the birth of Otso!\n\nWas he born within a manger, Was he nurtured in the bath-room Was his origin ignoble?\" This is Wainamoinen's answer: \"Otso was not born a beggar, Was not born among the rushes, Was not cradled in a manger; Honey-paw was born in ether, In the regions of the Moon-land, On the shoulders of Otava, With the daughters of creation.\n\n\"Through the ether walked a maiden, On the red rims of the cloudlets, On the border of the heavens, In her stockings purple-tinted, In her golden-colored sandals.\n\nIn her hand she held a wool-box, With a hair-box on her shoulder; Threw the wool upon the ocean, And the hair upon the rivers; These are rocked by winds and waters, Water-currents bear them onward, Bear them to the sandy sea-shore, Land them near the Woods of honey, On an island forest-covered.\n\n\"Fair Mielikki, woodland hostess, Tapio's most cunning daughter, Took the fragments from the sea-side, Took the white wool from the waters, Sewed the hair and wool together, Laid the bundle in her basket, Basket made from bark of birch-wood, Bound with cords the magic bundle; With the chains of gold she bound it To the pine-tree's topmost branches.\n\nThere she rocked the thing of magic, Rocked to life the tender baby, Mid the blossoms of the pine-tree, On the fir-top set with needles; Thus the young bear well was nurtured, Thus was sacred Otso cradled On the honey-tree of Northland, In the middle of the forest."

