[content]
body = "Slowly perches swim in Autumn, Wry-backed, hunting deeper water, Spawn in shallows in the summer, Bounding on the shore of ocean.\n\nShould this wisdom seem too little, I can tell thee other matters, Sing thee other wizard sayings: All the Northmen plow with reindeer, Mother-horses plow the Southland, Inner Lapland plows with oxen; All the trees on Pisa-mountain, Know I well in all their grandeur; On the Horna-rock are fir-trees, Fir-trees growing tall and slender; Slender grow the trees on mountains.\n\nThree, the water-falls in number, Three in number, inland oceans, Three in number, lofty mountains, Shooting to the vault of heaven.\n\nHallapyora's near to Yaemen, Katrakoski in Karyala; Imatra, the falling water, Tumbles, roaring, into Wuoksi.\" Then the ancient Wainimoinen: \"Women's tales and children's wisdom Do not please a bearded hero, Hero, old enough for wedlock; Tell the story of creation, Tell me of the world's beginning, Tell me of the creatures in it, And philosophize a little.\" Then the youthful Youkahainen Thus replied to Wainamoinen: \"Know I well the titmouse-fountains, Pretty birdling is the titmouse; And the viper, green, a serpent; Whitings live in brackish waters; Perches swim in every river; Iron rusts, and rusting weakens; Bitter is the taste of umber; Boiling water is malicious; Fire is ever full of danger; First physician, the Creator; Remedy the oldest, water; Magic is the child of sea-foam; God the first and best adviser; Waters gush from every mountain; Fire descended first from heaven; Iron from the rust was fashioned; Copper from the rocks created; Marshes are of lands the oldest; First of all the trees, the willow; Fir-trees were the first of houses; Hollowed stones the first of kettles.\" Now the ancient Wainamoinen Thus addresses Youkahainen: \"Canst thou give me now some wisdom, Is this nonsense all thou knowest?\" Youkahainen thus made answer: \"I can tell thee still a trifle, Tell thee of the times primeval, When I plowed the salt-sea's bosom, When I raked the sea-girt islands, When I dug the salmon-grottoes, Hollowed out the deepest caverns, When I all the lakes created, When I heaped the mountains round them, When I piled the rocks about them.\n\nI was present as a hero, Sixth of wise and ancient heroes, Seventh of all primeval heroes, When the heavens were created, When were formed the ether-spaces, When the sky was crystal-pillared, When was arched the beauteous rainbow, When the Moon was placed in orbit, When the silver Sun was planted, When the Bear was firmly stationed, And with stars the heavens were sprinkled.\" Spake the ancient Wainamoinen: \"Thou art surely prince of liars, Lord of all the host of liars; Never wert thou in existence, Surely wert thou never present, When was plowed the salt-sea's bosom, When were raked the sea-girt islands, When were dug the salmon-grottoes, When were hollowed out the caverns, When the lakes were all created, When were heaped the mountains round them, When the rocks were piled about them."

