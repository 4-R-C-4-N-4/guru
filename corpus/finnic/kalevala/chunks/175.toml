[content]
body = "Dost thou leave from inattention, Is there here a dearth of maidens, Have our greetings been unworthy?\" Sang the magic Lemminkainen To the maids as he was sailing, This in answer to their calling: \"Leaving not for want of pleasure, Do not go from dearth of women Beautiful the island-maidens, Countless as the sands their virtues.\n\nThis the reason of my going, I am longing for my home-land, Longing for my mother's cabins, For the strawberries of Northland, For the raspberries of Kalew, For the maidens of my childhood, For the children of my mother.\" Then the merry Lemminkainen Bade farewell to all the island; Winds arose and drove his vessel On the blue-back of the ocean, O'er the far-extending waters, Toward the island of his mother.\n\nOn the shore were grouped the daughters Of the magic Isle of Refuge, On the rocks sat the forsaken, Weeping stood the island-maidens, Golden daughters, loud-lamenting.\n\nWeep the maidens of the island While the sail-yards greet their vision, While the copper-beltings glisten; Do not weep to lose the sail-yards, Nor to lose the copper-beltings; Weep they for the loss of Ahti, For the fleeing Kaukomieli Guiding the departing vessel.\n\nAlso weeps young Lemminkainen, Sorely weeps, and loud-lamenting, Weeps while he can see the island, While the island hill-tops glisten; Does not mourn the island-mountains, Weeps he only for the maidens, Left upon the Isle of Refuge.\n\nThereupon sailed Kaukomieli On the blue-back of the ocean; Sailed one day, and then a second, But, alas!\n\nupon the third day, There arose a mighty storm-wind, And the sky was black with fury.\n\nBlew the black winds from the north-west, From the south-east came the whirlwind, Tore away the ship's forecastle, Tore away the vessel's rudder, Dashed the wooden hull to pieces.\n\nThereupon wild Lemminkainen Headlong fell upon the waters; With his head he did the steering, With his hands and feet, the rowing; Swam whole days and nights unceasing, Swam with hope and strength united, Till at last appeared a cloudlet, Growing cloudlet to the westward, Changing to a promontory, Into land within the ocean.\n\nSwiftly to the shore swam Ahti, Hastened to a magic castle, Found therein a hostess baking, And her daughters kneading barley, And these words the hero uttered: \"O, thou hostess, filled with kindness, Couldst thou know my pangs of hunger, Couldst thou guess my name and station, Thou wouldst hasten to the storehouse, Bring me beer and foaming liquor, Bring the best of thy provisions, Bring me fish, and veal, and bacon, Butter, bread, and honeyed biscuits, Set for me a wholesome dinner, Wherewithal to still my hunger, Quench the thirst of Lemminkainen.\n\nDays and nights have I been swimming, Buffeting the waves of ocean, Seemed as if the wind protected, And the billows gave me shelter,\" Then the hostess, filled with kindness, Hastened to the mountain storehouse, Cut some butter, veal, and bacon, Bread, and fish, and honeyed biscuit, Brought the best of her provisions, Brought the mead and beer of barley, Set for him a toothsome dinner, Wherewithal to still his hunger, Quench the thirst of Lemminkainen."

