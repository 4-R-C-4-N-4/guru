[content]
body = "\"Now I take the eyes of Otso, Lest he lose the sense of seeing, Lest their former powers shall weaken; Though I take not all his members, Not alone must these be taken.\n\n\"Now I take the ears of Otso, Lest he lose the sense of hearing, Lest their former powers shall weaken; Though I take not all his members, Not alone must these be taken.\n\n\"Now I take the nose of Otso, Lest he lose the sense of smelling, Lest its former powers shall weaken; Though I take not all his members, Not alone must this be taken.\n\n\"Now I take the tongue of Otso, Lest he lose the sense of tasting Lest its former powers shall weaken; Though I take not all his members, Not alone must this be taken.\n\n\"Now I take the brain of Otso, Lest he lose the means of thinking, Lest his consciousness should fail him, Lest his former instincts weaken; Though I take not all his members, Not alone must this be taken.\n\n\"I will reckon him a hero, That will count the teeth of Light-foot, That will loosen Otso's fingers From their settings firmly fastened.\" None he finds with strength sufficient To perform the task demanded.\n\nTherefore ancient Wainamoinen Counts the teeth of sacred Otso; Loosens all the claws of Light-foot, With his fingers strong as copper, Slips them from their firm foundations, Speaking to the bear these measures: \"Otso, thou my Honey-eater, Thou my Fur-ball of the woodlands, Onward, onward, must thou journey From thy low and lonely dwelling, To the court-rooms of the village.\n\nGo, my treasure, through the pathway Near the herds of swine and cattle, To the hill-tops forest covered, To the high and rising mountains, To the spruce-trees filled with needles, To the branches of the pine-tree; There remain, my Forest-apple, Linger there in lasting slumber, Where the silver bells are ringing, To the pleasure of the shepherd.\" Thus beginning, and thus ending, Wainamoinen, old and truthful, Hastened from his emptied tables, And the children thus addressed him: \"Whither hast thou led thy booty, Where hast left thy Forest-apple, Sacred Otso of the woodlands?\n\nHast thou left him on the iceberg, Buried him upon the snow-field?\n\nHast thou sunk him in the quicksand, Laid him low beneath the heather?\" Wainamoinen spake in answer: \"Have not left him on the iceberg, Have not buried him in snow-fields; There the dogs would soon devour him, Birds of prey would feast upon him; Have not hidden him in Swamp-land, Have not buried him in heather; There the worms would live upon him, Insects feed upon his body.\n\nThither I have taken Otso, To the summit of the Gold-hill, To the copper-bearing mountain, Laid him in his silken cradle In the summit of a pine-tree, Where the winds and sacred branches Rock him to his lasting slumber, To the pleasure of the hunter, To the joy of man and hero.\n\nTo the east his lips are pointing, While his eyes are northward looking; But dear Otso looks not upward, For the fierceness of the storm-winds Would destroy his sense of vision.\" Wainamoinen, ancient minstrel, Touched again his harp of joyance, Sang again his songs enchanting, To the pleasure of the evening, To the joy of morn arising."

