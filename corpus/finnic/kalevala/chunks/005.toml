[content]
body = "Wainamoinen, old and trusty, Thought awhile, and well considered, How to kill the mighty oak-tree, First created for his pleasure, How to fell the tree majestic, How to lop its hundred branches.\n\nSad the lives of man and hero, Sad the homes of ocean-dwellers, If the sun shines not upon them, If the moonlight does not cheer them Is there not some mighty hero, Was there never born a giant, That can fell the mighty oak-tree, That can lop its hundred branches?\n\nWainamoinen, deeply thinking, Spake these words soliloquizing: \"Kape, daughter of the Ether, Ancient mother of my being, Luonnotar, my nurse and helper, Loan to me the water-forces, Great the powers of the waters; Loan to me the strength of oceans, To upset this mighty oak-tree, To uproot this tree of evil, That again may shine the sunlight, That the moon once more may glimmer.\" Straightway rose a form from oceans, Rose a hero from the waters, Nor belonged he to the largest, Nor belonged he to the smallest, Long was he as man's forefinger, Taller than the hand of woman; On his head a cap of copper, Boots upon his feet were copper, Gloves upon his hands were copper, And its stripes were copper-colored, Belt around him made of copper, Hatchet in his belt was copper; And the handle of his hatchet Was as long as hand of woman, Of a finger's breadth the blade was.\n\nThen the trusty Wainamoinen Thought awhile and well considered, And his measures are as follow: \"Art thou, sir, divine or human?\n\nWhich of these thou only knowest; Tell me what thy name and station.\n\nVery like a man thou lookest, Hast the bearing of a hero, Though the length of man's first finger, Scarce as tall as hoof of reindeer.\" Then again spake Wainamoinen To the form from out the ocean: \"Verily I think thee human, Of the race of pigmy-heroes, Might as well be dead or dying, Fit for nothing but to perish.\" Answered thus the pigmy-hero, Spake the small one from the ocean To the valiant Wainamoinen \"Truly am I god and hero, From the tribes that rule the ocean; Come I here to fell the oak-tree, Lop its branches with my hatchet.\" Wainamoinen, old and trusty, Answers thus the sea-born hero: \"Never hast thou force sufficient, Not to thee has strength been given, To uproot this mighty oak-tree, To upset this thing of evil, Nor to lop its hundred branches.\" Scarcely had he finished speaking, Scarcely had he moved his eyelids, Ere the pigmy full unfolding, Quick becomes a mighty giant.\n\nWith one step he leaves the ocean, Plants himself, a mighty hero, On the forest-fields surrounding; With his head the clouds he pierces, To his knees his beard extending, And his locks fall to his ankles; Far apart appear his eyeballs, Far apart his feet are stationed.\n\nFarther still his mighty shoulders.\n\nNow begins his axe to sharpen, Quickly to an edge he whets it, Using six hard blocks of sandstone, And of softer whetstones, seven."

