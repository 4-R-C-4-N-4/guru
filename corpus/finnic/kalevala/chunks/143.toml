[content]
body = "Now I leave these friends of childhood, Journey southward with my husband, To the arms of Night and Winter, O'er the ice-grown seas of Northland.\n\n\"Should I once again, returning, Pay a visit to my tribe-folk, Mother would not hear me calling, Father would not see me weeping, Calling at my mother's grave-stone, 'Weeping o'er my buried father, On their graves the fragrant flowers, Junipers and mournful willows, Verdure from my mother's tresses, From the gray-beard of my father.\n\n\"Should I visit Sariola, Visit once again these borders, No one here would bid me welcome.\n\nNothing in these hills would greet me, Save perchance a few things only, By the fence a clump of osiers, And a land-mark at the corner, Which in early youth I planted, When a child of little stature.\n\n\"Mother's kine perhaps will know me, Which so often I have watered, Which I oft have fed and tended, Lowing now at my departure, In the pasture cold and cheerless; Sure my mother's kine will welcome Northland's daughter home returning.\n\nFather's steeds may not forget me, Steeds that I have often ridden, When a maiden free and happy, Neighing now for me departing, In the pasture of my brother, In the stable of my father; Sure my father's steeds will know me, Bid Pohyola's daughter welcome.\n\nBrother's faithful dogs may know me, That I oft have fed and petted, Dogs that I have taught to frolic, That now mourn for me departing, In their kennels in the court-yard, In their kennels cold and cheerless; Sure my brother's dogs will welcome Pohya's daughter home returning.\n\nBut the people will not know me, When I come these scenes to visit, Though the fords remain as ever, Though unchanged remain the rivers, Though untouched the flaxen fish-nets On the shores await my coming.\n\n\"Fare thou well, my dear old homestead, Fare ye well, my native bowers; It would give me joy unceasing Could I linger here forever.\n\nNow farewell, ye halls and portals, Leading to my father's mansion; It would give me joy unceasing Could I linger here forever.\n\nFare ye well, familiar gardens Filled with trees and fragrant flowers; It would give me joy unceasing, Could I linger here forever.\n\nSend to all my farewell greetings, To the fields, and groves, and berries; Greet the meadows with their daisies, Greet the borders with their fences, Greet the lakelets with their islands, Greet the streams with trout disporting, Greet the hills with stately pine-trees, And the valleys with their birches.\n\nFare ye well, ye streams and lakelets, Fertile fields, and shores of ocean, All ye aspens on the mountains, All ye lindens of the valleys, All ye beautiful stone-lindens, All ye shade-trees by the cottage, All ye junipers and willows, All ye shrubs with berries laden, Waving grass and fields of barley, Arms of elms, and oaks, and alders, Fare ye well, dear scenes of childhood, Happiness of days departed!\" Ending thus, Pohyola's daughter Left her native fields and fallows, Left the darksome Sariola, With her husband, Ilmarinen, Famous son of Kalevala."

