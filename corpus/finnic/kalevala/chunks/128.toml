[content]
body = "Differently I had thought it, I had hoped for greater pleasures, I had hoped to sing as cuckoos, On the hill-tops call and echo, When I had attained this station, Reached at last the goal expectant; But I am not like the cuckoo, Singing, merry on the hill-tops; I am like the songless blue-duck, As she swims upon the waters, Swims upon the cold, cold ocean, Icicles upon her pinions.\n\n\"Ancient father, gray-haired mother, Whither do ye wish to lead me, Whither take this bride, thy daughter, That this sorrow may pass over, Where this heavy heart may lighten, Where this grief may turn to gladness?\n\nBetter it had been, O mother, Hadst thou nursed a block of birch-wood, Hadst thou clothed the colored sandstone, Rather than this hapless maiden, For the fulness of these sorrows, For this keen and killing trouble.\n\nMany sympathizers tell me: 'Foolish bride, thou art ungrateful, Do not grieve, thou child of sorrow, Thou hast little cause for weeping.' \"O, deceive me not, my people, Do not argue with me falsely, For alas!\n\nI have more troubles Than the waterfalls have pebbles, Than the Ingerland has willows, Than the Suomi-hills have berries; Never could the Pohya plow-horse Pull this mighty weight of sorrow, Shaking not his birchen cross-bar, Breaking not his heavy collar; Never could the Northland reindeer Heavy shod and stoutly harnessed, Draw this load of care and trouble.\" By the stove a babe was playing, And the young child spake as follows: \"Why, O fair bride, art thou weeping, Why these tears of pain and sadness?\n\nLeave thy troubles to the elk-herds, And thy grief to sable fillies, Let the steeds of iron bridles Bear the burden of thine anguish, Horses have much larger foreheads, Larger shoulders, stronger sinews, And their necks are made for labor, Stronger are their bones and muscles, Let them bear thy heavy burdens.\n\nThere is little good in weeping, Useless are thy tears of sorrow; Art not led to swamps and lowlands, Nor to banks of little rivers; Thou art led to fields of flowers, Led to fruitful trees and forests, Led away from beer of Pohya To the sweeter mead of Kalew.\n\nAt thy shoulder waits thy husband, On thy right side, Ilmarinen, Constant friend and life-protector, He will guard thee from all evil; Husband ready, steed in waiting, Gold-and-silver-mounted harness, Hazel-birds that sing and flutter On the courser's yoke and cross-bar; Thrushes also sing and twitter Merrily on hame and collar, Seven bluebirds, seven cuckoos, Sing thy wedding-march in concord.\n\n\"Be no longer full of sorrow, Dry thy tears, thou bride of beauty, Thou hast found a noble husband, Better wilt thou fare than ever, By the side of Ilmarinen, Artist husband, metal-master, Bread-provider of thy table, On the arm of the fish-catcher, On the breast of the elk-hunter, By the side of the bear-killer.\n\nThou hast won the best of suitors, Hast obtained a mighty hero; Never idle is his cross-bow, On the nails his quivers hang not, Neither are his dogs in kennel, Active agents is his bunting."

