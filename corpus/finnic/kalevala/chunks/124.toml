[content]
body = "BRIDE S FAREWELL.\n\nWhen the marriage was completed, When the many guests had feasted, At the wedding of the Northland, At the Dismal-land carousal, Spake the hostess of Pohyola To the blacksmith, Ilmarinen: \"Wherefore, bridegroom, dost thou linger, Why art waiting, Northland hero?\n\nSittest for the father's pleasure, For affection of the mother, For the splendor of the maidens, For the beauty of the daughter?\n\nNoble son-in-law and brother, Wait thou longer, having waited Long already for the virgin, Thine affianced is not ready, Not prepared, thy life-companion, Only are her tresses braided.\n\n\"Chosen bridegroom, pride of Pohya, Wait thou longer, having waited Long already for the virgin, Thy beloved is preparing, Only is one hand made ready.\n\n\"Famous artist, Ilmarinen, Wait still longer, having waited Long already for the virgin, Thy beloved is not ready, Only is one foot in fur-shoes,\" Spake again the ancient Louhi: \"Chosen suitor of my daughter, Thou hast thrice in kindness waited, Wait no longer for the virgin, Thy beloved now is ready, Well prepared thy life-companion, Fairy Maiden of the Rainbow.\n\n\"Beauteous daughter, join thy suitor, Follow him, thy chosen husband, Very near is the uniting, Near indeed thy separation.\n\nAt thy hand the honored bridegroom, Near the door he waits to lead thee, Guide thee to his home and kindred; At the gate his steed is waiting, Restless champs his silver bridle, And the sledge awaits thy presence.\n\n\"Thou wert anxious for a suitor, Ready to accept his offer, Wert in haste to take his jewels, Place his rings upon thy fingers; Now, fair daughter, keep thy promise; To his sledge, with happy footsteps, Hie in haste to join the bridegroom, Gaily journey to the village With thy chosen life-companion, With thy suitor, Ilmarinen.\n\nLittle hast thou looked about thee, Hast not raised thine eyes above thee, Beauteous maiden of the Northland, Hast thou made a rueful bargain, Full of wailing thine engagement, And thy marriage full of sorrow, That thy father's ancient cottage Thou art leaving now forever, Leaving also friends and kindred, For the, blacksmith, Ilmarinen?\n\n\"O how beautiful thy childhood, In thy father's dwelling-places, Nurtured like a tender flower, Like the strawberry in spring-time Soft thy couch and sweet thy slumber, Warm thy fires and rich thy table; From the fields came corn in plenty, From the highlands, milk and berries, Wheat and barley in abundance, Fish, and fowl, and hare, and bacon, From thy father's fields and forests.\n\n\"Never wert thou, child, in sorrow, Never hadst thou grief nor trouble, All thy cares were left to fir-trees, All thy worry to the copses, All thy weeping to the willows, All thy sighing to the lindens, All thy thinking to the aspens And the birches on the mountains, Light and airy as the leaflet, As a butterfly in summer, Ruddy as a mountain-berry, Beautiful as vernal flowers.\n\n\"Now thou leavest home and kindred, Wanderest to other firesides, Goest to another mother, Other sisters, other brothers, Goest to a second father, To the servant-folk of strangers, From thy native hills and lowlands."

