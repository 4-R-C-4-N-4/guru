[content]
body = "\"Straightway I began my singing, Sang the archers with their arrows, Sang the spearmen with their weapons, Sang the swordsmen with their poniards, Sang the singers with their singing, The enchanters with their magic, To the rapids of the rivers, To the highest fall of waters, To the all-devouring whirlpool, To the deepest depths of ocean, Where the wizards still are sleeping, Sleeping till the grass shoots upward Through the beards and wrinkled faces, Through the locks of the enchanters, As they sleep beneath the billows.\" Still entreats the anxious mother, Still beseeches Lemminkainen, Trying to restrain the hero, While Kyllikki begs forgiveness; This the language of the mother: \"Do not go, my son beloved, To the villages of Northland, Nor to Lapland's frigid borders; Dire misfortune will befall thee, Star of evil settle o'er thee, Lemminkainen's end, destruction.\n\n\"Couldst thou speak in tongues a hundred, I could not believe thee able, Through the magic of thy singing, To enchant the sons of Lapland To the bottom of the ocean, Dost not know the Tury-language, Canst but speak the tongue of Suomi, Canst not win by witless magic.\" Lemminkainen, reckless hero, Also known as Kaukomieli, Stood beside his mother, combing Out his sable locks and musing, Brushing down his beard, debating, Steadfast still in his decision, Quickly hurls his brush in anger, Hurls it to the wall opposing, Gives his mother final answer, These the words that Ahti uses: \"Dire misfortune will befall me, Some sad fate will overtake me, Evil come to Lemminkainen, When the blood flows from that hair-brush, When blood oozes from those bristles.\" Thus the warlike Lemminkainen Goes to never-pleasant Lapland, Heeding not his mother's warning, Heeding not her prohibition.\n\nThus the hero, Kaukomieli, Quick equips himself for warfare, On his head a copper helmet, On his shoulders caps of copper, On his body iron armor, Steel, the belt around his body; As he girds himself for battle, Ahti thus soliloquizing: \"Strong the hero in his armor, Strong indeed in copper helmet, Powerful in mail of iron, Stronger far than any hero On the dismal shores of Lapland, Need not fear their wise enchanters, Need not fear their strongest foemen, Need not fear a war with wizards.\" Grasped he then the sword of battle, Firmly grasped the heavy broadsword That Tuoni had been grinding, That the gods had brightly burnished, Thrust it in the leathern scabbard, Tied the scabbard to his armor.\n\nHow do heroes guard from danger, Where protect themselves from evil?\n\nHeroes guard their homes and firesides, Guard their doors, and roofs, and windows, Guard the posts that bold the torch-lights, Guard the highways to the court-yard, Guard the ends of all the gate-ways.\n\nHeroes guard themselves from women, Carefully from merry maidens; If in this their strength be wanting, Easy fall the heroes, victims To the snares of the enchanters.\n\nFurthermore are heroes watchful Of the tribes of warlike giants, Where the highway doubly branches, On the borders of the blue-rock, On the marshes filled with evil, Near the mighty fall of waters, Near the circling of the whirlpool, Near the fiery springs and rapids."

