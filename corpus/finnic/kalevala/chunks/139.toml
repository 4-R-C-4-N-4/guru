[content]
body = "BRIDE'S FAREWELL.\n\nOsmotar, the bride-instructor, Gives the wedding-guests this counsel, Speaks these measures to the bridegroom: \"Ilmarinen, artist-brother, Best of all my hero-brothers, Of my mother's sons the dearest, Gentlest, truest, bravest, grandest, Listen well to what I tell thee Of the Maiden of the Rainbow, Of thy beauteous life-companion Bridegroom, praise thy fate hereafter, Praise forever thy good fortune; If thou praisest, praise sincerely, Good the maiden thou hast wedded, Good the bride that Ukko gives thee, Graciously has God bestowed her.\n\nSound her praises to thy father, Praise her virtues to thy mother, Let thy heart rejoice in secret, That thou hast the Bride of Beauty, Lovely Maiden of the Rainbow!\n\n\"Brilliant near thee stands the maiden, At thy shoulder thy companion, Happy under thy protection, Beautiful as golden moonlight, Beautiful upon thy bosom, Strong to do thy kindly bidding, Labor with thee as thou wishest, Rake the hay upon thy meadows, Keep thy home in full perfection, Spin for thee the finest linen, Weave for thee the richest fabrics, Make for thee the softest raiment, Make thy weaver's loom as merry As the cuckoo of the forest; Make the shuttle glide in beauty Like the ermine of the woodlands; Make the spindle twirl as deftly As the squirrel spins the acorn; Village-maidens will not slumber While thy young bride's loom is humming, While she plies the graceful shuttle.\n\n\"Bridegroom of the Bride of Beauty, Noblest of the Northland heroes, Forge thyself a scythe for mowing, Furnish it with oaken handle, Carve it in thine ancient smithy, Hammer it upon thine anvil, Have it ready for the summer, For the merry days of sunshine; Take thy bride then to the lowlands, Mow the grass upon thy meadows, Rake the hay when it is ready, Make the reeds and grasses rustle, Toss the fragrant heads of clover, Make thy hay in Kalevala When the silver sun is shining.\n\n\"When the time has come for weaving, To the loom attract the weaver, Give to her the spools and shuttles, Let the willing loom be worthy, Beautiful the frame and settle; Give to her what may be needed, That the weaver's song may echo, That the lathe may swing and rattle, Ma y be heard within the village, That the aged may remark it, And the village-maidens question: 'Who is she that now is weaving, What new power now plies the shuttle?' \"Make this answer to the question: 'It is my beloved weaving, My young bride that plies the shuttle.' \"Shall the weaver's weft be loosened, Shall the young bride's loom be tightened?\n\nDo not let the weft be loosened, Nor the weaver's loom be tightened; Such the weaving of the daughters Of the Moon beyond the cloudlets; Such the spinning of the maidens Of the Sun in high Jumala, Of the daughters of the Great Bear, Of the daughters of the Evening."

