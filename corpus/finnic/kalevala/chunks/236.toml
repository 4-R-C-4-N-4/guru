[content]
body = "Thus the Northland hostess answered: \"I will not divide the Sampo, Not with thee, thou evil wizard, Not with wicked Wainamoinen!\" Quick the mighty eagle, Louhi, Swoops upon the lid in colors, Grasps the Sampo in her talons; But the daring Lemminkainen Straightway draws his blade of battle, Draws his broadsword from his girdle, Cleaves the talons of the eagle, One toe only is uninjured, Speaks these magic words of conquest: \"Down, ye spears, and down, ye broadswords, Down, ye thousand witless heroes, Down, ye feathered hosts of Louhi!\" Spake the hostess of Pohyola, Calling, screeching, from the sail-yards: \"O thou faithless Lemminkainen, Wicked wizard, Kaukomieli, To deceive thy trusting mother!\n\nThou didst give to her thy promise, Not to go to war for ages, Not to war for sixty summers, Though desire for gold impels thee, Though thou wishest gold and silver!\n\nWainamoinen, ancient hero, The eternal wisdom-singer, Thinking he had met destruction, Snatched the rudder from the waters, With it smote the monster-eagle, Smote the eagle's iron talons, Smote her countless feathered heroes.\n\nFrom her breast her hosts descended, Spearmen fell upon the billows, From the wings descend a thousand, From the tail, a hundred archers.\n\nSwoops again the bird of Pohya To the bottom of the vessel, Like the hawk from birch or aspen, Like the falcon from the linden; Grasps the Sampo with one talon, Drags the treasure to the waters, Drops the magic lid in colors From the red rim of the war-ship To the bottom of the deep-sea, Where the Sampo breaks in pieces, Scatters through the Alue-waters, In the mighty deeps for ages, To increase the ocean's treasures, Treasures for the hosts of Ahto.\n\nNevermore will there be wanting Richness for the Ahto-nation, Never while the moonlight brightens On the waters of the Northland.\n\nMany fragments of the Sampo Floated on the purple waters, On the waters deep and boundless, Rocked by winds and waves of Suomi, Carried by the rolling billows To the sea-sides of Wainola.\n\nWainamoinen, ancient minstrel, Saw the fragments of the treasure Floating on the billows landward, Fragments of the lid in colors, Much rejoicing, spake as follows: \"Thence will come the sprouting seed-grain, The beginning of good fortune, The unending of resources, From the plowing and the sowing, From the glimmer of the moonlight, From the splendor of the sunshine, On the fertile plains of Suomi, On the meads of Kalevala.\" Louhi, hostess of Pohyola, Thus addressed old Wainamoinen: \"Know I other mighty measures, Know I means that are efficient, And against thy golden moonlight, And the splendor of thy sunshine, And thy plowing, and thy reaping; In the rocks I'll sink the moonbeams, Hide the sun within the mountain, Let the frost destroy thy sowings, Freeze the crops on all thy corn-fields; Iron-hail I'll send from heaven, On the richness of thine acres, On the barley of thy planting; I will drive the bear from forests, Send thee Otso from the thickets, That he may destroy thy cattle, May annihilate thy sheep-folds, May destroy thy steeds at pasture."

