[content]
body = "\"Feed the courser of the suitor, On the sweetest corn and barley, On the summer-wheat and clover, In the caldron steeped in sweetness; Feed him at the golden manger, In the boxes lined with copper, At my manger richly furnished, In the warmest of the stables; Tie him with a silk-like halter, To the golden rings and staples, To the hooks of purest silver, Set in beams of birch and oak-wood; Feed him on the hay the sweetest, Feed him on the corn nutritious, Give the best my barns can furnish.\n\n\"Curry well the suitor's courser With the curry-comb of fish-bone, Brush his hair with silken brushes, Put his mane and tail in order, Cover well with flannel blankets, Blankets wrought in gold and silver, Buckles forged from shining copper.\n\n\"Come, ye small lads of the village, Lead the suitor to my chambers, With your auburn locks uncovered, From your hands remove your mittens, See if ye can lead the hero Through the door without his stooping, Lifting not the upper cross-bar, Lowering not the oaken threshold, Moving not the birchen casings, Great the hero who must enter.\n\n\"Ilmarinen is too stately, Cannot enter through the portals, Not the son-in-law and bridegroom, Till the portals have been heightened; Taller by a head the suitor Than the door-ways of the mansion.\" Quick the servants of Pohyola Tore away the upper cross-bar, That his cap might not be lifted; Made the oaken threshold lower That the hero might not stumble; Made the birch-wood portals wider, Opened full the door of welcome, Easy entrance for the suitor.\n\nSpeaks the hostess of the Northland As the bridegroom freely passes Through the doorway of her dwelling: \"Thanks are due to thee, O Ukko, That my son-in-law has entered!\n\nLet me now my halls examine; Make the bridal chambers ready, Finest linen on my tables, Softest furs upon my benches, Birchen flooring scrubbed to whiteness, All my rooms in perfect order.\" Then the hostess of Pohyola Visited her spacious dwelling, Did not recognize her chambers; Every room had been remodeled, Changed by force of mighty magic; All the halls were newly burnished, Hedge-hog bones were used for ceilings, Bones of reindeer for foundations, Bones of wolverine for door-sills, For the cross-bars bones of roebuck, Apple-wood were all the rafters, Alder-wood, the window-casings, Scales of trout adorned the windows, And the fires were set in flowers.\n\nAll the seats were made of silver, All the floors of copper-tiling, Gold-adorned were all the tables, On the floor were silken mattings, Every fire-place set in copper, Every hearth-stone cut from marble, On each shelf were colored sea-shells, Kalew's tree was their protection.\n\nTo the court-room came the hero, Chosen suitor from Wainola, These the words of Ilmarinen: \"Send, O Ukko, health and pleasure To this ancient home and dwelling, To this mansion richly fashioned!\" Spake the hostess of Pohyola: \"Let thy coming be auspicious To these halls of thee unworthy, To the home of thine affianced, To this dwelling lowly fashioned, Mid the lindens and the aspens."

