[content]
body = "Thus the tearful maiden answered: Therefore do I weep and sorrow, Wretched maiden all my life long, Since poor Aino, thou hast given, Since thy daughter thou hast promised To the aged Wainamoinen, Comfort to his years declining Prop to stay him when he totters, In the storm a roof above him, In his home a cloak around him; Better far if thou hadst sent me Far below the salt-sea surges, To become the whiting's sister, And the friend of perch and salmon; Better far to ride the billows, Swim the sea-foam as a mermaid, And the friend of nimble fishes, Than to be an old man's solace, Prop to stay him when be totters, Hand to aid him when he trembles, Arm to guide him when he falters, Strength to give him when he weakens; Better be the whiting's sister And the friend of perch and salmon, Than an old man's slave and darling.\" Ending thus she left her mother, Straightway hastened to the mountain?\n\nTo the store-house on the summit, Opened there the box the largest, From the box six lids she lifted, Found therein six golden girdles, Silken dresses seven in number.\n\nChoosing such as pleased her fancy, She adorned herself as bidden, Robed herself to look her fairest, Gold upon her throbbing temples, In her hair the shining silver, On her shoulders purple ribbons, Band of blue around her forehead, Golden cross, and rings, and jewels, Fitting ornaments to beauty.\n\nNow she leaves her many treasures, Leaves the store-house on the mountain, Filled with gold and silver trinkets, Wanders over field and meadow, Over stone-fields waste and barren, Wanders on through fen and forest, Through the forest vast and cheerless, Wanders hither, wanders thither, Singing careless as she wanders, This her mournful song and echo: \"Woe is me, my life hard-fated!\n\nWoe to Aino, broken-hearted!\n\nTorture racks my heart and temples, Yet the sting would not be deeper, Nor the pain and anguish greater, If beneath this weight of sorrow, In my saddened heart's dejection, I should yield my life forever, Now unhappy, I should perish!\n\nLo!\n\nthe time has come for Aino From this cruel world to hasten, To the kingdom of Tuoni, To the realm of the departed, To the isle of the hereafter.\n\nWeep no more for me, O Father, Mother dear, withhold thy censure, Lovely sister, dry thine eyelids, Do not mourn me, dearest brother, When I sink beneath the sea-foam, Make my home in salmon-grottoes, Make my bed in crystal waters, Water-ferns my couch and pillow.\" All day long poor Aino wandered, All the next day, sad and weary, So the third from morn till evening, Till the cruel night enwrapped her, As she reached the sandy margin, Reached the cold and dismal sea-shore, Sat upon the rock of sorrow, Sat alone in cold and darkness, Listened only to the music Of the winds and rolling billows, Singing all the dirge of Aino.\n\nAll that night the weary maiden Wept and wandered on the border Through the sand and sea-washed pebbles.\n\nAs the day dawns, looking round her, She beholds three water-maidens, On a headland jutting seaward, Water-maidens four in number, Sitting on the wave-lashed ledges, Swimming now upon the billows, Now upon the rocks reposing.\n\nQuick the weeping maiden, Aino, Hastens there to join the mermaids, Fairy maidens of the waters."

