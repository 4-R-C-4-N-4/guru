[content]
body = "Ancient mother of my being, Name the last of the destructions, Name the third of the destroyers.\" Lemminkainen's mother answered: \"This the third of fatal dangers: Hast thou gone a greater distance, Hast thou travelled one day longer, To the portals of Pohyola, To the narrowest of gate-ways, There a wolf will rise to meet thee, There the black-bear sneak upon thee-, In Pohyola's darksome portals, Hundreds in their jaws have perished, Have devoured a thousand heroes; Wherefore will they not destroy thee, Since thy form is unprotected?\" Spake the reckless Lemminkainen, Handsome hero, Kaukomieli: \"Let them eat the gentle lambkins, Feed upon their tender tissues, They cannot devour this hero; I am girded with my buckler, Girded with my belt of copper, Armlets wear I of the master, From the wolf and bear protected, Will not hasten to Untamo.\n\nI can meet the wolf of Lempo, For the bear I have a balsam, For his mouth I conjure bridles, For the wolf, forge chains of iron; I will smite them as the willow, Chop them into little fragments, Thus I'll gain the open court-yard, Thus triumphant end my journey.\" Lemminkainen's mother answered: \"Then thy journey is not ended, Greater dangers still await thee, Great the wonders yet before thee, Horrors three within thy pathway; Three great dangers of the hero Still await thy reckless footsteps, These the worst of all thy dangers: When thou hast still farther wandered, Thou wilt reach the Court of Pohya, Where the walls are forged from iron, And from steel the outer bulwark; Rises from the earth to heaven, Back again to earth returning; Double spears are used for railings, On each spear are serpents winding, On each rail are stinging adders; Lizards too adorn the bulwarks, Play their long tails in the sunlight, Hissing lizards, venomed serpents, Jump and writhe upon the rampart, Turn their horrid heads to meet thee; On the greensward lie the monsters, On the ground the things of evil, With their pliant tongues of venom, Hissing, striking, crawling, writhing; One more horrid than the others, Lies before the fatal gate-way, Longer than the longest rafters, Larger than the largest portals; Hisses with the tongue of anger, Lifts his head in awful menace, Raises it to strike none other Than the hero of the islands.\" Spake the warlike Lemminkainen, Handsome hero, Kaukomieli: \"By such things the children perish, Such is not the death of heroes; Know I well the fire to manage, I can quench the flames of passion, I can meet the prowling wild-beasts, Can appease the wrath of serpents, I can heal the sting of adders, I have plowed the serpent-pastures, Plowed the adder-fields of Northland; While my hands were unprotected, Held the serpents in my fingers, Drove the adders to Manala, On my hands the blood of serpents, On my feet the fat of adders."

