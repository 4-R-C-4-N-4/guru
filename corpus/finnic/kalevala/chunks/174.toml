[content]
body = "Finally at close of evening, He resolved to leave the island, He resolved to waken early, Long before the dawn of morning; Long before the time appointed, He arose that he might wander Through the hamlets of the island, Bid adieu to all the maidens, On the morn of his departure.\n\nAs he wandered hither, thither, Walking through the village path-ways To the last of all the hamlets; Saw he none of all the castle-, Where three dwellings were not standing; Saw he none of all the dwellings Where three heroes were not watching; Saw he none of all the heroes, Who was not engaged in grinding Swords, and spears, and battle-axes, For the death of Lemminkainen.\n\nAnd these words the hero uttered: \"Now alas!\n\nthe Sun arises From his couch within the ocean, On the frailest of the heroes, On the saddest child of Northland; On my neck the cloak of Lempo Might protect me from all evil, Though a hundred foes assail me, Though a thousand archers follow.\" Then he left the maids ungreeted, Left his longing for the daughters Of the nameless Isle of Refuge, With his farewell-words unspoken, Hastened toward the island-harbor, Toward his magic bark at anchor; But he found it burned to ashes, Sweet revenge had fired his vessel, Lighted by the slighted spinster.\n\nThen he saw the dawn of evil, Saw misfortune hanging over, Saw destruction round about him.\n\nStraightway he began rebuilding Him a magic sailing-vessel, New and wondrous, full of beauty; But the hero needed timber, Boards, and planks, and beams, and braces, Found the smallest bit of lumber, Found of boards but seven fragments, Of a spool he found three pieces, Found six pieces of the distaff; With these fragments builds his vessel, Builds a ship of magic virtue, Builds the bark with secret knowledge, Through the will of the magician; Strikes one blow, and builds the first part, Strikes a second, builds the centre, Strikes a third with wondrous power, And the vessel is completed.\n\nThereupon the ship he launches, Sings the vessel to the ocean, And these words the hero utters: \"Like a bubble swim these waters, Like a flower ride the billows; Loan me of thy magic feathers, Three, O eagle, four, O raven, For protection to my vessel, Lest it flounder in the ocean!\" Now the sailor, Lemminkainen, Seats himself upon the bottom Of the vessel he has builded, Hastens on his journey homeward, Head depressed and evil-humored, Cap awry upon his forehead, Mind dejected, heavy-hearted, That he could not dwell forever In the castles of the daughters Of the nameless Isle of Refuge.\n\nSpake the minstrel, Lemminkainen, Handsome hero, Kaukomieli: \"Leave I must this merry island, Leave her many joys and pleasures, Leave her maids with braided tresses, Leave her dances and her daughters, To the joys of other heroes; But I take this comfort with me: All the maidens on the island, Save the spinster who was slighted, Will bemoan my loss for ages, Will regret my quick departure; They will miss me at the dances, In the halls of mirth and joyance, In the homes of merry maidens, On my father's Isle of Refuge.\" Wept the maidens on the island, Long lamenting, loudly calling To the hero sailing homeward: \"Whither goest, Lemminkainen, Why depart, thou best of heroes?"

