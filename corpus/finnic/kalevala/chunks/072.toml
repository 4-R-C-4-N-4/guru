[content]
body = "I shall never harshly treat thee, Never make thee fly too fleetly, On the way to Sariola, On the tracks of long duration, To the hostess of Pohyola, To her magic courts and stables, Will not lash thee on thy journey; I shall lead thee gently forward, Drive thee with the reins of kindness, Cover thee with silken blankets.\" Then the fire-haired steed of Juutas, Flaming horse of mighty Hisi, Put his bead of shining silver, In the bright and golden bead-stall, In the silver-mounted bridle.\n\nThus the hero, Lemminkainen, Easy bridles Lempo's stallion, Flaming horse of evil Piru; Lays the bits within his fire-mouth, On his silver head, the halter, Mounts the fire-expiring courser, Brandishes his whip of willow, Hastens forward on his journey, Bounding o'er the hills and mountains, Dashing through the valleys northward, O'er the snow-capped hills of Lapland, To the courts of Sariola.\n\nThen the hero, quick dismounting, Stepped within the court of Louhi, Thus addressed the Northland hostess: \"I have bridled Lempo's fire-horse, I have caught the Hisi-racer, Caught the fire-expiring stallion, In the Piru plains and pastures, Ridden him within thy borders; I have caught the moose of Lempo, I have done what thou demandest; Give, I pray thee, now thy daughter, Give to me thy fairest maiden, Bride of mine to be forever.\" Louhi, hostess of Pohyola, Made this answer to the suitor: \"I will only give my daughter, Give to thee my fairest virgin, Bride of thine to be forever, When for me the swan thou killest In the river of Tuoni, Swimming in the black death-river, In the sacred stream and whirlpool; Thou canst try one cross-bow only, But one arrow from thy quiver.\" Then the reckless Lemminkainen, Handsome hero, Kaukomieli, Braved the third test of the hero, Started out to hunt the wild-swan, Hunt the long-necked, graceful swimmer, In Tuoni's coal-black river, In Manala's lower regions.\n\nQuick the daring hunter journeyed, Hastened off with fearless footsteps, To the river of Tuoni, To the sacred stream and whirlpool, With his bow upon his shoulder, With his quiver and one arrow.\n\nNasshut, blind and crippled shepherd, Wretched shepherd of Pohyola, Stood beside the death-land river, Near the sacred stream and whirlpool, Guarding Tuonela's waters, Waiting there for Lemminkainen, Listening there for Kaukomieli, Waiting long the hero's coming.\n\nFinally he hears the footsteps Of the hero on his journey, Hears the tread of Lemminkainen, As he journeys nearer, nearer, To the river of Tuoni, To the cataract of death-land, To the sacred stream and whirlpool.\n\nQuick the wretched shepherd, Nasshut, From the death-stream sends a serpent, Like an arrow from a cross-bow, To the heart of Lemminkainen, Through the vitals of the hero.\n\nLemminkainen, little conscious, Hardly knew that be was injured, Spake these measures as he perished.\n\n\"Ah!\n\nunworthy is my conduct, Ah!\n\nunwisely have I acted, That I did not heed my mother, Did not take her goodly counsel, Did not learn her words of magic."

