[content]
body = "In Manala lived a woman, In the kingdom of Tuoni, Evil witch and toothless wizard, Spinner of the threads of iron, Moulder of the bands of copper, Weaver of a hundred fish-nets, Of a thousand nets of copper, Spinning in the days of summer, Weaving in the winter evenings, Seated on a rock in water.\n\nIn the kingdom of Tuoni Lived a man, a wicked wizard, Three the fingers of the hero, Spinner he of iron meshes, Maker too of nets of copper, Countless were his nets of metal, Moulded on a rock in water, Through the many days of summer.\n\nMana's son with crooked fingers, Iron-pointed, copper fingers, Pulls of nets, at least a thousand, Through the river of Tuoni, Sets them lengthwise, sets them crosswise, In the fatal, darksome river, That the sleeping Wainamomen, Friend and brother of the waters, May not leave the isle of Mana, Never in the course of ages, Never leave the death-land castles, Never while the moonlight glimmers On the empire of Tuoni.\n\nWainamoinen, wise and wary, Rising from his couch of slumber, Speaks these words as he is waking: \"Is there not some mischief brewing, Am I not at last in danger, In the chambers of Tuoni, In the Manala home and household?\" Quick he changes his complexion, Changes too his form and feature, Slips into another body; Like a serpent in a circle, Rolls black-dyed upon the waters; Like a snake among the willows, Crawls he like a worm of magic, Like an adder through the grasses, Through the coal-black stream of death-land, Through a thousand nets of copper Interlaced with threads of iron, From the kingdom of Tuoni, From the castles of Manala.\n\nMana's son, the wicked wizard, With his iron-pointed fingers, In the early morning hastens To his thousand nets of copper, Set within the Tuoni river, Finds therein a countless number Of the death-stream fish and serpents; Does not find old Wainamoinen, Wainamoinen, wise and wary, Friend and fellow of the waters.\n\nWhen the wonder-working hero Had escaped from Tuonela, Spake he thus in supplication: \"Gratitude to thee, O Ukko, Do I bring for thy protection!\n\nNever suffer other heroes, Of thy heroes not the wisest, To transgress the laws of nature; Never let another singer, While he lives within the body, Cross the river of Tuoni, As thou lovest thy creations.\n\nMany heroes cross the channel, Cross the fatal stream of Mana, Few return to tell the story, Few return from Tuonela, From Manala's courts and castles.\" Wainamoinen calls his people, On the plains of Kalevala, Speaks these words of ancient wisdom, To the young men, to the maidens, To the rising generation: \"Every child of Northland, listen: If thou wishest joy eternal, Never disobey thy parents, Never evil treat the guiltless, Never wrong the feeble-minded, Never harm thy weakest fellow, Never stain thy lips with falsehood, Never cheat thy trusting neighbor, Never injure thy companion, Lest thou surely payest penance In the kingdom of Tuoni, In the prison of Manala; There, the home of all the wicked, There the couch of the unworthy, There the chambers of the guilty."

