[content]
body = "From her temples beams the moonlight, From her breast, the gleam of sunshine, From her forehead shines the rainbow, On her neck, the seven starlets, And the Great Bear from her shoulder.\n\n\"Ilmarinen, worthy brother, Thou the only skilful blacksmith, Go and see her wondrous beauty, See her gold and silver garments, See her robed in finest raiment, See her sitting on the rainbow, Walking on the clouds of purple.\n\nForge for her the magic Sampo, Forge the lid in many colors, Thy reward shall be the virgin, Thou shalt win this bride of beauty; Go and bring the lovely maiden To thy home in Kalevala.\" Spake the brother, Ilmarinen: O thou cunning Wainamoinen, Thou hast promised me already To the ever-darksome Northland, Thy devoted head to ransom, Thus to rescue thee from trouble.\n\nI shall never visit Northland, Shall not go to see thy maiden, Do not love the Bride of Beauty; Never while the moonlight glimmers, Shall I go to dreary Pohya, To the plains of Sariola, Where the people eat each other, Sink their heroes in the ocean, Not for all the maids of Lapland.\" Spake the brother, Wainamoinen: \"I can tell thee greater wonders, Listen to my wondrous story: I have seen the fir-tree blossom, Seen its flowers with emerald branches, On the Osmo-fields and woodlands; In its top, there shines the moonlight, And the Bear lives in its branches.\" Ilmarinen thus made answer: \"I cannot believe thy story, Cannot trust thy tale of wonder, Till I see the blooming fir-tree, With its many emerald branches, With its Bear and golden moonlight.\" This is Wainamoinen's answer: \"Wilt thou not believe my story?\n\nCome with me and I will show thee If my lips speak fact or fiction.\" Quick they journey to discover, Haste to view the wondrous fir-tree; Wainamoinen leads the journey, Ilmarinen closely follows.\n\nAs they near the Osmo-borders, Ilmarinen hastens forward That be may behold the wonder, Spies the Bear Within the fir-top, Sitting on its emerald branches, Spies the gleam of golden moonlight.\n\nSpake the ancient Wainamoinen, These the words the singer uttered: Climb this tree, dear Ilmarinen, And bring down the golden moonbeams, Bring the Moon and Bear down with thee From the fir-tree's lofty branches.\" Ilmarinen, full consenting, Straightway climbed the golden fir-tree, High upon the bow of heaven, Thence to bring the golden moonbeams, Thence to bring the Bear of heaven, From the fir-tree's topmost branches."

