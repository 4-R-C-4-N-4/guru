[content]
body = "OF THE RAINBOW.\n\nPohyola's fair and winsome daughter, Glory of the land and water, Sat upon the bow of heaven, On its highest arch resplendent, In a gown of richest fabric, In a gold and silver air-gown, Weaving webs of golden texture, Interlacing threads of silver; Weaving with a golden shuttle, With a weaving-comb of silver; Merrily flies the golden shuttle, From the maiden's nimble fingers, Briskly swings the lathe in weaving, Swiftly flies the comb of silver, From the sky-born maiden's fingers, Weaving webs of wondrous beauty.\n\nCame the ancient Wainamoinen, Driving down the highway homeward, From the ever sunless Northland, From the dismal Sariola; Few the furlongs he had driven, Driven but a little distance, When he heard the sky-loom buzzing, As the maiden plied the shuttle.\n\nQuick the thoughtless Wainamoinen Lifts his eyes aloft in wonder, Looks upon the vault of heaven, There beholds the bow of beauty, On the bow the maiden sitting, Beauteous Maiden of the Rainbow, Glory of the earth and ocean, Weaving there a golden fabric, Working with the rustling silver.\n\nWainamoinen, ancient minstrel, Quickly checks his fleet-foot racer, Looks upon the charming maiden, Then addresses her as follows: \"Come, fair maiden, to my snow-sledge, By my side I wish thee seated.\" Thus the Maid of Beauty answers: \"Tell me what thou wishest of me, Should I join thee in the snow-sledge.\" Speaks the ancient Wainamoinen, Answers thus the Maid of Beauty: \"This the reason for thy coming: Thou shalt bake me honey-biscuit, Shalt prepare me barley-water, Thou shalt fill my foaming beer-cups, Thou shalt sing beside my table, Shalt rejoice within my portals, Walk a queen within my dwelling, In the Wainola halls and chambers, In the courts of Kalevala.\" Thus the Maid of Beauty answered From her throne amid the heavens: \"Yesterday at hour of twilight, Went I to the flowery meadows, There to rock upon the common, Where the Sun retires to slumber; There I heard a song-bird singing, Heard the thrush simple measures, Singing sweetly thoughts of maidens, And the minds of anxious mothers.\n\n\"Then I asked the pretty songster, Asked the thrush this simple question: 'Sing to me, thou pretty song-bird, Sing that I may understand thee, Sing to me in truthful accents, How to live in greatest pleasure, And in happiness the sweetest, As a maiden with her father, Or as wife beside her husband.' \"Thus the song-bird gave me answer, Sang the thrush this information: 'Bright and warm are days of summer, Warmer still is maiden-freedom; Cold is iron in the winter, Thus the lives of married women; Maidens living with their mothers Are like ripe and ruddy berries; Married women, far too many, Are like dogs enchained in kennel, Rarely do they ask for favors, Not to wives are favors given.'\" Wainamoinen, old and truthful, Answers thus the Maid of Beauty: \"Foolish is the thrush thus singing, Nonsense is the song-bird's twitter; Like to babes are maidens treated, Wives are queens and highly honored."

