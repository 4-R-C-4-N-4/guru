[content]
body = "OF THE SAMPO.\n\nWainamoinen, old and truthful, With the blacksmith, Ilmarinen, With the reckless son of Lempo, Handsome hero, Kaukomieli, On the sea's smooth plain departed, On the far-extending waters, To the village, cold and dreary, To the never-pleasant Northland, Where the heroes fall and perish.\n\nIlmarinen led the rowers On one side the magic war-ship, And the reckless Lemminkainen Led the rowers on the other.\n\nWainamoinen, old and trusty, Laid his hand upon the rudder, Steered his vessel o'er the waters, Through the foam and angry billows To Pohyola's place of landing, To the cylinders of copper, Where the war-ships lie at anchor.\n\nWhen they had arrived at Pohya, When their journey they had ended, On the land they rolled their vessel, On the copper-banded rollers, Straightway journeyed to the village, Hastened to the halls and hamlets Of the dismal Sariola.\n\nLouhi, hostess of the Northland, Thus addressed the stranger-heroes: Magic heroes of Wainola, What the tidings ye are bringing To the people of my village?\" Wainamoinen, ancient minstrel.\n\nGave this answer to the hostess: \"All the hosts of Kalevala Are inquiring for the Sampo, Asking for the lid in colors; Hither have these heroes journeyed To divide the priceless treasure.\n\nThus the hostess spake in answer: \"No one would divide a partridge, Nor a squirrel, with three heroes; Wonderful the magic Sampo, Plenty does it bring to Northland; And the colored lid re-echoes From the copper-bearing mountains, From the stone-berg of Pohyola, To the joy of its possessors.\" Wainamoinen, ancient minstrel, Thus addressed the ancient Louhi: \"If thou wilt not share the Sampo, Give to us an equal portion, We will take it to Wainola, With its lid of many colors, Take by force the hope of Pohya.\" Thereupon the Northland hostess Angry grew and sighed for vengeance; Called her people into council, Called the hosts of Sariola, Heroes with their trusted broadswords, To destroy old Wainamoinen With his people of the Northland.\n\nWainamoinen, wise and ancient, Hastened to his harp of fish-bone, And began his magic playing; All of Pohya stopped and listened, Every warrior was silenced By the notes of the magician; Peaceful-minded grew the soldiers, All the maidens danced with pleasure, While the heroes fell to weeping, And the young men looked in wonder.\n\nWainamoinen plays unceasing, Plays the maidens into slumber, Plays to sleep the young and aged, All of Northland sleeps and listens.\n\nWise and wondrous Wainamoinen, The eternal bard and singer, Searches in his pouch of leather, Draws therefrom his slumber-arrows, Locks the eyelids of the sleepers, Of the heroes of Pohyola, Sings and charms to deeper slumber All the warriors of the Northland.\n\nThen the heroes of Wainola Hasten to obtain the Sampo, To procure the lid in colors From the copper-bearing mountains.\n\nFrom behind nine locks of copper, In the stone-berg of Pohyola.\n\nWainamoinen, ancient minstrel, Then began his wondrous singing, Sang in gentle tones of magic, At the entrance to the mountain, At the border of the stronghold; Trembled all the rocky portals, And the iron-banded pillars Fell and crumbled at his singing."

