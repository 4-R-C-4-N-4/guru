[content]
body = "Come, sweet maiden, to my snow-sledge, I am not despised as hero, Not the meanest of magicians; Come with me and I will make thee Wife and queen in Kalevala.\" Thus the Maid of Beauty answered— \"Would consider thee a hero, Mighty hero, I would call thee, When a golden hair thou splittest, Using knives that have no edges; When thou snarest me a bird's egg With a snare that I can see not.\" Wainamoinen, skilled and ancient, Split a golden hair exactly, Using knives that had no edges; And he snared an egg as nicely With a snare the maiden saw not.\n\n\"Come, sweet maiden, to my snow-sledge, I have done what thou desirest.\" Thus the maiden wisely answered: \"Never enter I thy snow-sledge, Till thou peelest me the sandstone, Till thou cuttest me a whip-stick From the ice, and make no splinters, Losing not the smallest fragment.\" Wainamoinen, true magician, Nothing daunted, not discouraged, Deftly peeled the rounded sandstone, Deftly cut from ice a whip-stick, Cutting not the finest splinter, Losing not the smallest fragment.\n\nThen again be called the maiden, To a seat within his snow-sledge.\n\nBut the Maid or Beauty answered, Answered thus the great magician: I will go with that one only That will make me ship or shallop, From the splinters of my spindle, From the fragments of my distaff, In the waters launch the vessel, Set the little ship a-floating, Using not the knee to push it, Using not the arm to move it, Using not the hand to touch it, Using not the foot to turn it, Using nothing to propel it.\" Spake the skilful Wainamoinen, These the words the hero uttered: \"There is no one in the Northland, No one under vault of heaven, Who like me can build a vessel, From the fragments of the distaff, From the splinters of the spindle.\" Then he took the distaff-fragments, Took the splinters of the spindle, Hastened off the boat to fashion, Hastened to an iron mountain, There to join the many fragments.\n\nFull of zeal be plies the hammer, Swings the hammer and the hatchet; Nothing daunted, builds the vessel, Works one day and then a second, Works with steady hand the third day; On the evening of the third day, Evil Hisi grasps the hatchet, Lempo takes the crooked handle, Turns aside the axe in falling, Strikes the rocks and breaks to pieces; From the rocks rebound the fragments, Pierce the flesh of the magician, Cut the knee of Wainamoinen.\n\nLempo guides the sharpened hatchet, And the veins fell Hisi severs.\n\nQuickly gushes forth a blood-stream, And the stream is crimson-colored.\n\nWainamoinen, old and truthful, The renowned and wise enchanter, Thus outspeaks in measured accents: \"O thou keen and cruel hatchet, O thou axe of sharpened metal, Thou shouldst cut the trees to fragments, Cut the pine-tree and the willow, Cut the alder and the birch-tree, Cut the juniper and aspen, Shouldst not cut my knee to pieces, Shouldst not tear my veins asunder.\" Then the ancient Wainamoinen Thus begins his incantations, Thus begins his magic singing, Of the origin of evil; Every word in perfect order, Makes no effort to remember, Sings the origin of iron, That a bolt he well may fashion, Thus prepare a look for surety, For the wounds the axe has given, That the hatchet has torn open."

