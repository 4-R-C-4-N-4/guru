[content]
body = "\"I shall set my forge and bellows Deeper, deeper in thy vitals; I shall swing my heavy hammer, Swing it with a greater power On thy heart, and lungs, and liver; I shall never, never leave thee Till I learn thine incantations, Learn thy many wisdom-sayings, Learn the lost-words of the Master; Never must these words be bidden, Earth must never lose this wisdom, Though the wisdom-singers perish.\" Old Wipunen, wise magician, Ancient prophet, filled with power, Opens fall his store of knowledge, Lifts the covers from his cases, Filled with old-time incantations, Filled with songs of times primeval, Filled with ancient wit and wisdom; Sings the very oldest folk-songs, Sings the origin of witchcraft, Sings of Earth and its beginning Sings the first of all creations, Sings the source of good and evil Sung alas!\n\nby youth no longer, Only sung in part by heroes In these days of sin and sorrow.\n\nEvil days our land befallen.\n\nSings the orders of enchantment.\n\nHow, upon the will of Ukko, By command of the Creator, How the air was first divided, How the water came from ether, How the earth arose from water, How from earth came vegetation, Fish, and fowl, and man, and hero.\n\nSings again the wise Wipunen, How the Moon was first created, How the Sun was set in heaven, Whence the colors of the rainbow, Whence the ether's crystal pillars, How the skies with stars were sprinkled.\n\nThen again sings wise Wipunen, Sings in miracles of concord, Sings in magic tones of wisdom, Never was there heard such singing; Songs he sings in countless numbers, Swift his notes as tongues of serpents, All the distant hills re-echo; Sings one day, and then a second, Sings a third from dawn till evening, Sings from evening till the morning; Listen all the stars of heaven, And the Moon stands still and listens Fall the waves upon the deep-sea, In the bay the tides cease rising, Stop the rivers in their courses, Stops the waterfall of Rutya, Even Jordan ceases flowing, And the Wuoksen stops and listens.\n\nWhen the ancient Wainamoinen Well had learned the magic sayings, Learned the ancient songs and legends, Learned the words of ancient wisdom, Learned the lost-words of the Master, Well had learned the secret doctrine, He prepared to leave the body Of the wisdom-bard, Wipunen, Leave the bosom of the master, Leave the wonderful enchanter."

