[content]
body = "O, ye people of Wainola, People of this generation, And the folk of future ages, Fashion not in emulation, River boat, nor ocean shallop, Boasting of its fine appearance, God alone can work completion, Give to cause its perfect ending, Never hand of man can find it, Never can the hero give it, Ukko is the only Master.\""

