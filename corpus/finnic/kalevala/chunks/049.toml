[content]
body = "On the second day, the blacksmith Downward bent and well examined, On the bottom of the furnace; From the fire, a skiff of metals, Came a boat of purple color, All the ribs were colored golden, And the oars were forged from copper; Thus the skiff was full of beauty, But alas!\n\na thing of evil; Forth it rushes into trouble, Hastens into every quarrel, Hastes without a provocation Into every evil combat.\n\nIlmarinen, metal artist, Is not pleased with this creation, Breaks the skiff in many fragments, Throws them back within the furnace, Keeps the workmen at the bellows, Thus to forge the magic Sampo.\n\nOn the third day, Ilmarinen, First of all the metal-workers, Downward bent and well examined, On the bottom of the furnace; There be saw a heifer rising, Golden were the horns of Kimmo, On her head the Bear of heaven, On her brow a disc of sunshine, Beautiful the cow of magic; But alas!\n\nshe is ill-tempered, Rushes headlong through the forest, Rushes through the swamps and meadows, Wasting all her milk in running.\n\nIlmarinen, the magician.\n\nIs not pleased with this creation, Cuts the magic cow in pieces, Throws them in the fiery furnace, Sets the workmen at the bellows, Thus to forge the magic Sampo.\n\nOn the fourth day, Ilmarinen Downward bent and well examined, To the bottom of the furnace; There beheld a plow in beauty Rising from the fire of metals, Golden was the point and plowshare, And the beam was forged from copper, And the handles, molten silver, Beautiful the plow and wondrous; But alas!\n\nit is ill-mannered, Plows up fields of corn and barley, Furrows through the richest meadows.\n\nIlmarinen, metal artist, Is not pleased with this creation, Quickly breaks the plow in pieces, Throws them back within the furnace, Lets the winds attend the bellows, Lets the storm-winds fire the metals.\n\nFiercely vie the winds of heaven, East-wind rushing, West-wind roaring, South-wind crying, North-wind howling, Blow one day and then a second, Blow the third from morn till even, When the fire leaps through the windows, Through the door the sparks fly upward, Clouds of smoke arise to heaven; With the clouds the black smoke mingles, As the storm-winds ply the bellows.\n\nOn the third night Ilmarinen, Bending low to view his metals, On the bottom of the furnace, Sees the magic Sampo rising, Sees the lid in many colors.\n\nQuick the artist of Wainola Forges with the tongs and anvil, Knocking with a heavy hammer, Forges skilfully the Sampo; On one side the flour is grinding, On another salt is making, On a third is money forging, And the lid is many-colored.\n\nWell the Sampo grinds when finished, To and fro the lid in rocking, Grinds one measure at the day-break, Grinds a measure fit for eating, Grinds a second for the market, Grinds a third one for the store-house.\n\nJoyfully the dame of Northland, Louhi, hostess of Pohyola, Takes away the magic Sampo, To the hills of Sariola, To the copper-bearing mountains, Puts nine locks upon the wonder, Makes three strong roots creep around it; In the earth they grow nine fathoms, One large root beneath the mountain, One beneath the sandy sea-bed, One beneath the mountain-dwelling."

