[content]
body = "At the helm himself be seated, Near the last beam of the vessel, Steered his goodly boat in joyance, Thus addressed the willing war-ship: \"Glide upon the trackless waters, Sail away, my ship of magic, Sail across the waves before thee, Speed thou like a dancing bubble, Like a flower upon the billows!\" Then the ancient Wainamoinen Set the young men to the rowing, Let the maidens sit in waiting.\n\nEagerly the youthful heroes Bend the oars and try the row-locks, But the distance is not lessened.\n\nThen the minstrel, Wainamoinen, Set the maidens to the rowing, Let the young men rest in waiting.\n\nEagerly the merry maidens Bend the aspen-oars in rowing, But the distance is not lessened.\n\nThen the master, Wainamoinen, Set the old men to the rowing, Let the youth remain in waiting.\n\nLustily the aged heroes Bend and try the oars of aspen, But the distance is not lessened.\n\nThen the blacksmith, Ilmarinen, Grasped the oars with master-magic, And the boat leaped o'er the surges, Swiftly sped across the billows; Far and wide the oars resounded, Quickly was the distance lessened.\n\nWith a rush and roar of waters Ilmarinen sped his vessel, Benches, ribs, and row-locks creaking, Oars of aspen far resounding; Flap the sails like wings of moor-cocks, And the prow dips like a white-swan; In the rear it croaks like ravens, Loud the oars and rigging rattle.\n\nStraightway ancient Wainamoinen Sitting by the bending rudder, Turns his magic vessel landward, To a jutting promontory, Where appears a Northland-village.\n\nOn the point stands Lemminkainen, Kaukomieli, black magician, Ahti, wizard of Wainola, Wishing for the fish of Pohya, Weeping for his fated dwelling, For his perilous adventures, Hard at work upon a vessel, On the sail-yards of a fish-boat, Near the hunger-point and island, Near the village-home deserted.\n\nGood the ears of the magician, Good the wizard's eyes for seeing; Casts his vision to the South-east, Turns his eyes upon the sunset, Sees afar a wondrous rainbow, Farther on, a cloudlet hanging; But the bow was a deception, And the cloudlet a delusion; 'Tis a vessel swiftly sailing, 'Tis a war-ship flying northward, O'er the blue-back of the broad-sea, On the far-extending waters, At the helm the master standing, At the oars a mighty hero.\n\nSpake the reckless Lemminkainen: \"Do not know this wondrous vessel, Not this well-constructed war-ship, Coming from the distant Suomi, Rowing for the hostile Pohya.\" Thereupon wild Lemminkainen Called aloud in tones of thunder O'er the waters to the vessel; Made the distant hills re-echo With the music of his calling: \"Whence this vessel on the waters, Whose the war-ship sailing hither?\" Spake the master of the vessel To the reckless Lemminkainen: \"Who art thou from fen or forest, Senseless wizard from the woodlands, That thou dost not know this vessel, Magic war-ship of Wainola?"

