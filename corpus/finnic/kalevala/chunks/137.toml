[content]
body = "From his couch I leaped impulsive, In the coldest night of winter, But the husband fleetly followed, Caught me at the outer portals, Grasped me by my streaming tresses, Tore my ringlets from my forehead, Cast in curls upon the night-winds To the freezing winds of winter.\n\nWhat the aid that I could ask for, Who could free me from my torment?\n\nMade I shoes of magic metals, Made the straps of steel and copper, Waited long without the dwelling, Long I listened at the portals, Hoping he would end his ravings, Hoping he would sink to slumber, But he did not seek for resting, Did not wish to still his fury.\n\nFinally the cold benumbed me; As an outcast from his cabin, I was forced to walk and wander, When I, freezing, well reflected, This the substance of my thinking: 'I will not endure this torture, Will not bear this thing forever, Will not bear this cruel treatment, Such contempt I will not suffer In the wicked tribe of Hisi, In this nest of evil Piru.' \"Then I said, 'Farewell forever!' To my husband's home and kindred, To my much-loved home and husband; Started forth upon a journey To my father's distant hamlet, Over swamps and over snow-fields, Wandered over towering mountains, Over hills and through the valleys, To my brother's welcome meadows, To my sister's home and birthplace.\n\n\"There were rustling withered pine-trees.\n\nFinely-feathered firs were fading, Countless ravens there were cawing, All the jackdaws harshly singing, This the chorus of the ravens: 'Thou hast here a home no longer, This is not the happy homestead Of thy merry days of childhood.' \"Heeding not this woodland chorus, Straight I journeyed to the dwelling Of my childhood's friend and brother, Where the portals spake in concord, And the hills and valleys answered, This their saddened song and echo: 'Wherefore dost thou journey hither, Comest thou for joy or sorrow, To thy father's old dominions?\n\nHere unhappiness awaits thee, Long departed is thy father, Dead and gone to visit Ukko, Dead and gone thy faithful mother, And thy brother is a stranger, While his wife is chill and heartless!' \"Heeding not these many warnings, Straightway to my brother's cottage Were my weary feet directed, Laid my hand upon the door-latch Of my brother's dismal cottage, But the latch was cold and lifeless.\n\nWhen I wandered to the chamber, When I waited at the doorway, There I saw the heartless hostess, But she did not give me greeting, Did not give her hand in welcome; Proud, alas!\n\nwas I unhappy, Did not make the first advances, Did not offer her my friendship, And my hand I did not proffer; Laid my hand upon the oven, All its former warmth departed!\n\nOn the coal I laid my fingers, All the latent heat had left it.\n\nOn the rest-bench lay my brother, Lay outstretched before the fire-place, Heaps of soot upon his shoulders, Heaps of ashes on his forehead.\n\nThus the brother asked the stranger, Questioned thus his guest politely: 'Tell me what thy name and station, Whence thou comest o'er the waters!' This the answer that I gave him: Hast thou then forgot thy sister, Does my brother not remember, Not recall his mother's daughter We are children of one mother, Of one bird were we the fledgelings, In one nest were hatched and nurtured.' \"Then the brother fell to weeping, From his eyes great tear-drops flowing, To his wife the brother whispered, Whispered thus unto the housewife."

