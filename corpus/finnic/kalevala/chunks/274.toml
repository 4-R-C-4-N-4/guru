[content]
body = "The Frost, the son of Puhuri; a synonym of Tiera.\n\nPuh-hu'ri.\n\nThe North-wind; the father of Pokkanen.\n\nRem'men.\n\nThe father of the hop-vine.\n\nRe'mu.\n\nThe same as Remmen.\n\nRu-o'tus.\n\nA persecutor of the Virgin Mariatta.\n\nRut'ya (Rut'ja).\n\nA waterfall of Northland.\n\nSah'ri (Saari).\n\nThe home of Kyllikki.\n\nSam'po.\n\nThe jewel that Ilmarinen forges from the magic metals; a talisman of success to the possessor; a continual source of strife between the tribes of the North.\n\nSamp'sa.\n\nA synonym of Pellerwoinen.\n\nSa'ra.\n\nThe same as Sariola.\n\nSar'i-o'la.\n\nThe same as Pohyola.\n\nSat'ka.\n\nA goddess of the sea.\n\nSa'wa (Sa'wo).\n\nThe eastern part of Finland.\n\nSim'a Pil'li (Honey-flute).\n\nThe flute of Sima-suu.\n\nSim'a-Suu.\n\nOne of the maidens of Tapio.\n\nSin'e-tar.\n\nThe goddess of the blue sky.\n\nSi-net'ta-ret.\n\nThe goddesses of dyeing.\n\nSuk'ka-mie'li.\n\nThe goddess of love.\n\nSuo'mi (swo'mi).\n\nThe ancient abode of the Finns.\n\nSuo'ne-tar (swone-tar).\n\nThe goddess of the veins.\n\nSuo-wak'ko.\n\nAn old wizard of Pohyola.\n\nSuo'ya-tar (Syo'jatar).\n\nThe mother of the serpent.\n\nSu've-tar (Suve, summer).\n\nGoddess of the South-wind Su-wan'to-lai'nen.\n\nAnother name for Wainamoinen.\n\nTaeh'ti.\n\nThe Polar Star.\n\nTa-he'tar.\n\nThe daughter of the Stars.\n\nTai'vas.\n\nThe firmament in general.\n\nTa-ni'ka.\n\nA magic mansion of Pohja.\n\nTa'pi-o.\n\nThe god of the forest.\n\nTel-le'rvo.\n\nA daughter of Tapio.\n\nTer'he-ne'tar.\n\nDaughter of the Fog.\n\nTie'ra.\n\nSame as Kura; the Hoar-frost.\n\nTont'tu.\n\nA little house-spirit.\n\nTu'a-me'tar.\n\nDaughter of the Alder-tree.\n\nTu-le'tar (Tuule'tar).\n\nA goddess of the winds.\n\nTu-lik'ki (Tuullk'ki).\n\nOne of the daughters of Tapio.\n\nTu'o-ne'la.\n\nThe abode of Tuoni.\n\nTuo'nen Poi'ka.\n\nThe son of Tuoni.\n\nTu'o-ne'tar.\n\nThe hostess of Death-land; a daughter of Tuoni.\n\nTu-o'ni.\n\nThe god of death.\n\nTu'ri (Tuuri).\n\nThe god of the Honey-land.\n\nTurja (tur'ya).\n\nAnother name for Pohya.\n\nTur'ya-lan'der.\n\nAn epithet for one of the tribe of Louhi.\n\nTur'ya (Tyrja).\n\nA name for the waterfall of Rutya.\n\nUk'ko.\n\nThe Great Spirit of Finnish mythology; his abode is in Jumala.\n\nUk'on-koi'va (Ukko's dog).\n\nThe messenger of Ukko; the butterfly.\n\nU'lap-pa'la.\n\nAnother term for the abode of Tuoni.\n\nUn'du-tar.\n\nGoddess of the fog.\n\nU'ni.\n\nThe god of sleep.\n\nUn'ta-ma'la.\n\nA synonym for \"the dismal Sariola.\" Un-ta'mo.\n\nThe god of dreams; the dreamer; a brother of Kalervo, and his enemy.\n\nUn'tar."

