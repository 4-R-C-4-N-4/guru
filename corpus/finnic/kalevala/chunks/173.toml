[content]
body = "On the plains he conjured lakelets, Sang the duck upon the waters, Golden-cheeked and silver-headed, Sang the feet from shining copper; And the Island-maidens wondered, Stood entranced at Ahti's wisdom, At the songs of Lemminkainen, At the hero's magic power.\n\nSpake the singer, Lemminkainen, Handsome hero, Kaukomieli: \"I would sing a wondrous legend, Sing in miracles of sweetness, If within some hall or chamber, I were seated at the table.\n\nIf I sing not in the castle, In some spot by walls surrounded Then I sing my songs to zephyrs, Fling them to the fields and forests.\" Answered thus the Island-maidens: \"On this isle are castle-chambers, Halls for use of magic singers, Courts complete for chanting legends, Where thy singing will be welcome, Where thy songs will not be scattered To the forests of the island, Nor thy wisdom lost in ether.\" Straightway Lemminkainen journeyed With the maidens to the castle; There he sang and conjured pitchers On the borders of the tables, Sang and conjured golden goblets Foaming with the beer of barley; Sang he many well-filled vessels, Bowls of honey-drink abundant, Sweetest butter, toothsome biscuit, Bacon, fish, and veal, and venison, All the dainties of the Northland, Wherewithal to still his hunger.\n\nBut the proud-heart, Lemminkainen, Was not ready for the banquet, Did not yet begin his feasting, Waited for a knife of silver, For a knife of golden handle; Quick he sang the precious metals, Sang a blade from purest silver, To the blade a golden handle, Straightway then began his feasting, Quenched his thirst and stilled his hunger, Charmed the maidens on the island.\n\nThen the minstrel, Lemminkainen, Roamed throughout the island-hamlets, To the joy of all the virgins, All the maids of braided tresses; Wheresoe'er he turned his footsteps, There appeared a maid to greet him; When his hand was kindly offered, There his band was kindly taken; When he wandered out at evening, Even in the darksome places, There the maidens bade him welcome; There was not an island-village Where there were not seven castles, In each castle seven daughters, And the daughters stood in waiting, Gave the hero joyful greetings, Only one of all the maidens Whom he did not greet with pleasure.\n\nThus the merry Lemminkainen Spent three summers in the ocean, Spent a merry time in refuge, In the hamlets on the island, To the pleasure of the maidens, To the joy of all the daughters; Only one was left neglected, She a poor and graceless spinster, On the isle's remotest border, In the smallest of the hamlets.\n\n'Then he thought about his journey O'er the ocean to his mother, To the cottage of his father.\n\nThere appeared the slighted spinster, To the Northland son departing, Spake these words to Lemminkainen: \"O, thou handsome Kaukomieli, Wisdom-bard, and magic singer, Since this maiden thou hast slighted, May the winds destroy thy vessel, Dash thy bark to countless fragments On the ocean-rocks and ledges!\" Lemminkainen's thoughts were homeward, Did not heed the maiden's murmurs, Did not rise before the dawning Of the morning on the island, To the pleasure of the maiden Of the much-neglected hamlet."

