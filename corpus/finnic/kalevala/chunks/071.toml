[content]
body = "Then the hunter, Kaukomieli, Stroked his captive's neck in safety, For the moose was well-imprisoned.\n\nThereupon gay Lemminkainen Filled with joyance spake as follows: \"Pride of forests, queen of woodlands, Metsola's enchanted hostess, Lovely forest dame, Mielikki, Mother-donor of the mountains, Take the gold that I have promised, Come and take away the silver; Spread thy kerchief well before me, Spread out here thy silken neck-wrap, Underneath the golden treasure, Underneath the shining silver, that to earth it may not settle, Scattered on the snows of winter.\" Then the hero went a victor To the dwellings of Pohyola, And addressed these words to Louhi: \"I have caught the moose of Hisi, In the Metsola-dominions, Give, O hostess, give thy daughter, Give to me thy fairest virgin, Bride of mine to be hereafter.\" Louhi, hostess of the Northland, Gave this answer to the suitor: \"I will give to thee my daughter, For thy wife my fairest maiden, When for me thou'lt put a bridle On the flaming horse of Hisi, Rapid messenger of Lempo, On the Hisi-plains and pastures.\" Nothing daunted, Lemminkainen Hastened forward to accomplish Louhi's second test of heroes, On the cultivated lowlands, On the sacred fields and forests.\n\nEverywhere he sought the racer, Sought the fire-expiring stallion, Fire out-shooting from his nostrils.\n\nLemminkainen, fearless hunter, Bearing in his belt his bridle, On his shoulders, reins and halter, Sought one day, and then a second, Finally, upon the third day, Went he to the Hisi-mountain, Climbed, and struggled to the summit; To the east he turned his glances, Cast his eyes upon the sunrise, There beheld the flaming courser, On the heath among the far-trees.\n\nLempo's fire-expiring stallion Fire and mingled smoke, out-shooting From his mouth, and eyes, and nostrils.\n\nSpake the daring Lemminkainen, This the hero's supplication: \"Ukko, thou O God above me, Thou that rulest all the storm-clouds, Open thou the vault of heaven, Open windows through the ether, Let the icy rain come falling, Lot the heavy hailstones shower On the flaming horse of Hisi, On the fire-expiring stallion.\" Ukko, the benign Creator, Heard the prayer of Lemminkainen, Broke apart the dome of heaven, Rent the heights of heaven asunder, Sent the iron-hail in showers, Smaller than the heads of horses, Larger than the heads of heroes, On the flaming steed of Lempo, On the fire-expiring stallion, On the terror of the Northland.\n\nLemminkainen, drawing nearer, Looked with care upon the courser, Then he spake the words that follow: \"Wonder-steed of mighty Hisi, Flaming horse of Lempo's mountain, Bring thy mouth of gold, assenting, Gently place thy head of silver In this bright and golden halter, In this silver-mounted bridle."

