[content]
body = "\"Go, thou demon, hence to wander, Flee, thou plague of Northland heroes; Never come again for shelter, Nevermore build thou thy dwelling In the body of Wipunen; Take at once thy habitation To the regions of thy kindred, To thy distant fields and firesides; When thy journey thou hast ended, Gained the borders of thy country, Gained the meads of thy Creator, Give a signal of thy coming, Rumble like the peals of thunder, Glisten like the gleam of lightning, Knock upon the outer portals, Enter through the open windows, Glide about the many chambers, Seize the host and seize the hostess, Knock their evil beads together, Wring their necks and hurl their bodies To the black-dogs of the forest.\n\n\"Should this prove of little value, Hover like the bird of battle, O'er the dwellings of the master, Scare the horses from the mangers, From the troughs affright the cattle, Twist their tails, and horns, and forelocks, Hurl their carcasses to Lempo.\n\n\"If some scourge the winds have sent me, Sent me on the air of spring-tide, Brought me by the frosts of winter, Quickly journey whence thou camest, On the air-path of the heavens, Perching not upon some aspen, Resting not upon the birch-tree; Fly away to copper mountains, That the copper-winds may nurse thee, Waves of ether, thy protection.\n\n\"Didst those come from high Jumala, From the hems of ragged snow-clouds, Quick ascend beyond the cloud-space, Quickly journey whence thou camest, To the snow-clouds, crystal-sprinkled, To the twinkling stars of heaven There thy fire may burn forever, There may flash thy forked lightnings, In the Sun's undying furnace.\n\n\"Wert thou sent here by the spring-floods, Driven here by river-torrents?\n\nQuickly journey whence thou camest, Quickly hasten to the waters, To the borders of the rivers, To the ancient water-mountain, That the floods again may rock thee, And thy water-mother nurse thee.\n\n\"Didst thou come from Kalma's kingdom, From the castles of the death-land?\n\nHaste thou back to thine own country, To the Kalma-halls and castles, To the fields with envy swollen, Where contending armies perish.\n\n\"Art thou from the Hisi-woodlands, From ravines in Lempo's forest, From the thickets of the pine-wood, From the dwellings of the fir-glen?\n\nQuick retrace thine evil footsteps To the dwellings of thy master, To the thickets of thy kindred; There thou mayest dwell at pleasure, Till thy house decays about thee, Till thy walls shall mould and crumble.\n\nEvil genius, thee I banish, Got thee hence, thou horrid monster, To the caverns of the white-bear, To the deep abysm of serpents, To the vales, and swamps, and fenlands, To the ever-silent waters, To the hot-springs of the mountains, To the dead-seas of the Northland, To the lifeless lakes and rivers, To the sacred stream and whirlpool.\n\n\"Shouldst thou find no place of resting, I will banish thee still farther, To the Northland's distant borders, To the broad expanse of Lapland, To the ever-lifeless deserts, To the unproductive prairies, Sunless, moonless, starless, lifeless, In the dark abyss of Northland; This for thee, a place befitting, Pitch thy tents and feast forever On the dead plains of Pohyola."

