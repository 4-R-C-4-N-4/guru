[content]
body = "Quick she journeys to the entrance To the copper-bearing mountain, Speaks these words as she approaches: \"Woe is me, my life hard-fated, Woe to Louhi, broken-hearted!\n\nHere the tracks of the destroyers, All my locks and bolts are broken By the hands of cruel strangers!\n\nBroken are my iron hinges, Open stand the mountain-portals Leading to the Northland-treasure.\n\nHas Pohyola lost her Sampo?\" Then she hastened to the chambers Where the Sampo had been grinding; But she found the chambers empty, Lid and Sampo gone to others, From the stone-berg of Pohyola, From behind nine locks of copper, In the copper-bearing mountain.\n\nLouhi, hostess of the Northland, Angry grew and cried for vengeance; As she found her fame departing, Found her-strength fast disappearing, Thus addressed the sea-fog virgin: \"Daughter of the morning-vapors, Sift thy fogs from distant cloud-land, Sift the thick air from the heavens, Sift thy vapors from the ether, On the blue-back of the broad-sea, On the far extending waters, That the ancient Wainamoinen, Friend of ocean-wave and billow, May not baffle his pursuers!\n\n\"Should this prayer prove unavailing, Iku-Turso, son of Old-age, Raise thy head above the billows, And destroy Wainola's heroes, Sink them to thy deep sea-castles, There devour them at thy pleasure; Bring thou back the golden Sampo To the people of Pohyola!\n\n\"Should these words be ineffective, Ukko, mightiest of rulers, Golden king beyond the welkin, Sitting on a throne of silver, Fill thy skies with heavy storm-clouds, Call thy fleetest winds about thee, Send them o'er the seven broad-seas, There to find the fleeing vessel, That the ancient Wainamoinen May not baffle his pursuers!\" Quick the virgin of the vapors Breathed a fog upon the waters, Made it settle on the war-ship Of the heroes of the Northland, Held the minstrel, Wainamoinen, Anchored in the fog and darkness; Bound him one day, then a second, Then a third till dawn of morning, In the middle of the blue-sea, Whence he could not flee in safety From the wrath of his pursuers.\n\nWhen the third night had departed, Resting in the sea, and helpless, Wainamoinen spake as follows, \"Not a man of strength and courage, Not the weakest of the heroes, Who upon the sea will suffer, Sink and perish in the vapors, Perish in the fog and darkness!\" With his sword he smote the billows, From his magic blade flowed honey; Quick the vapor breaks, and rises, Leaves the waters clear for rowing; Far extend the sky and waters, Large the ring of the horizon, And the troubled sea enlarges.\n\nTime had journeyed little distance, Scarce a moment had passed over, When they heard a mighty roaring, Heard a roaring and a rushing Near the border of the vessel, Where the foam was shooting skyward O'er the boat of Wainamoinen.\n\nStraightway youthful Ilmarinen Sank in gravest apprehension, From his cheeks the blood departed; Pulled his cap down o'er his forehead, Shook and trembled with emotion.\n\nWainamoinen, ancient minstrel, Casts his eyes upon the waters Near the broad rim of his war-ship; There perceives an ocean-wonder With his head above the sea-foam."

