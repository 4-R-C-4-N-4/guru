[content]
body = "Then the stout-heart, Kaukomieli, Deeply thought and long considered: \"It is as my mother told me, This the wall that she predicted, Stretching from the earth to heaven; Downward deep are serpents creeping, Deeper still the rails extending; High as highest flight of eagles, Higher still the wall shoots upward.\" But the hero, Lemminkainen, Little cares, nor feels disheartened, Draws his broadsword from its scabbard, Draws his mighty blade ancestral, Hews the wall with might of magic, Breaks the palisade in pieces, Hews to atoms seven pickets, Chops the serpent-wall to fragments; Through the breach he quickly passes To the portals of Pohyola.\n\nIn the way, a serpent lying, Lying crosswise in the entry, Longer than the longest rafters, Larger than the posts of oak-wood; Hundred-eyed, the heinous serpent, And a thousand tongues, the monster, Eyes as large as sifting vessels, Tongues as long as shafts of javelins, Teeth as large as hatchet-handles, Back as broad as skiffs of ocean.\n\nLemminkainen does not venture Straightway through this host opposing, Through the hundred heads of adders, Through the thousand tongues of serpents.\n\nSpake the magic Lemminkainen: \"Venomed viper, thing of evil, Ancient adder of Tuoni, Thou that crawlest in the stubble, Through the flower-roots of Lempo, Who has sent thee from thy kingdom, Sent thee from thine evil coverts, Sent thee hither, crawling, writhing, In the pathway I would travel?\n\nWho bestowed thy mouth of venom, Who insisted, who commanded, Thou shouldst raise thy head toward heaven, Who thy tail has given action?\n\nWas this given by the father, Did the mother give this power, Or the eldest of the brothers, Or the youngest of the sisters, Or some other of thy kindred?\n\n\"Close thy mouth, thou thing of evil, Hide thy pliant tongue of venom, In a circle wrap thy body, Coil thou like a shield in silence, Give to me one-half the pathway, Let this wanderer pass by thee, Or remove thyself entirely; Get thee hence to yonder heather, Quick retreat to bog and stubble, Hide thyself in reeds and rushes, In the brambles of the lowlands.\n\nLike a ball of flax enfolding, Like a sphere of aspen-branches, With thy head and tail together, Roll thyself to yonder mountain; In the heather is thy dwelling, Underneath the sod thy caverns.\n\nShouldst thou raise thy head in anger, Mighty Ukko will destroy it, Pierce it with his steel-tipped arrows, With his death-balls made of iron!\" Hardly had the hero ended, When the monster, little heeding, Hissing with his tongue in anger, Plying like the forked lightning, Pounces with his mouth of venom At the head of Lemminkainen; But the hero, quick recalling, Speaks the master-words of knowledge, Words that came from distant ages, Words his ancestors had taught him, Words his mother learned in childhood, These the words of Lemminkainen: \"Since thou wilt not heed mine order, Since thou wilt not leave the highway, Puffed with pride of thine own greatness, Thou shall burst in triple pieces."

