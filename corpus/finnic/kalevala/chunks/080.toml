[content]
body = "God anoints his faithful children, With the honey of his wisdom, When they feel the pangs of sorrow, When they meet the powers of evil.\n\nDip thy winglets in this honey, Steep thy plumage in His sweetness, Hither bring the all-sufficient Balsam of the great Creator; This will still my hero's anguish, This will heal his wounded tissues, This restore his long-lost vision, Make the Northland hills re-echo With the magic of his singing, With his wonderful enchantment.\" Thus the honey-bee made answer: \"I can never fly to heaven, To the seventh of the heavens, To the distant home of Ukko, With these wings of little virtue.\" Lemminkainen's mother answered: \"Thou canst surely fly to heaven, To the seventh of the heavens, O'er the Moon, beneath the sunshine, Through the dim and distant starlight.\n\nOn the first day, flying upward, Thou wilt near the Moon in heaven, Fan the brow of Kootamoinen; On the second thou canst rest thee On the shoulders of Otava; On the third day, flying higher, Rest upon the seven starlets, On the heads of Hetewanè; Short the journey that is left thee, Inconsiderable the distance To the home of mighty Ukko, To the dwellings of the blessed.\" Thereupon the bee arising, From the earth flies swiftly upward, Hastens on with graceful motion, By his tiny wings borne heavenward, In the paths of golden moonbeams, Touches on the Moon's bright borders, Fans the brow of Kootamoinen, Rests upon Otava's shoulders, Hastens to the seven starlets., To the heads of Hetewanè, Flies to the Creator's castle, To the home of generous Ukko, Finds the remedy preparing, Finds the balm of life distilling, In the silver-tinted caldrons, In the purest golden kettles; On one side, heart-easing honey, On a second, balm of joyance, On the third, life-giving balsam.\n\nHere the magic bee, selecting, Culls the sweet, life-giving balsam, Gathers too, heart-easing honey, Heavy-laden hastens homeward.\n\nTime had traveled little distance, Ere the busy bee came humming To the anxious mother waiting, In his arms a hundred cuplets, And a thousand other vessels, Filled with honey, filled with balsam, Filled with the balm of the Creator.\n\nLemminkainen's mother quickly Takes them on her, tongue and tests them, Finds a balsam all-sufficient."

