[content]
body = "Came a golden maid to meet him, On her snow-shoes came a virgin, O'er the hills of Wainamoinen, O'er his cultivated lowlands.\n\nQuick the wizard-son, Kullervo, Checked the motion of his racer, Thus addressed the charming maiden \"Come, sweet maiden, to my snow-sledge, In my fur-robes rest and linger!\" As she ran, the maiden answered: \"Let the Death-maid sit beside thee, Rest and linger in thy fur-robes!\" Thereupon the youth, Kullervo, Snapped his whip above the courser; Fleet as wind he gallops homeward, Dashes down along the highway; With the roar of falling waters, Gallops onward, onward, onward, O'er the broad-back of the ocean, O'er the icy plains of Lapland.\n\nComes a winsome maid to meet him, Golden-haired, and wearing snow-shoes, On the far outstretching ice-plains; Quick the wizard checks his racer, Charmingly accosts the maiden, Chanting carefully these measures: \"Come, thou beauty, to my snow-sledge, Hither come, and rest, and linger!\n\nTauntingly the maiden answered: \"Take Tuoni to thy snow-sledge, At thy side let Manalainen Sit with thee, and rest, and linger!\" Quick the wizard, Kullerwoinen, Struck his fiery, prancing racer, With the birch-whip of his father.\n\nLike the lightning flew the fleet-foot, Galloped on the highway homeward; O'er the hills the snow-sledge bounded, And the coming mountains trembled.\n\nKullerwoinen, wild magician, Measures, on his journey homeward, Northland's far-extending borders, And the fertile plains of Pohya.\n\nComes a beauteous maid to meet him, With a tin-pin on her bosom, On the heather of Pohyola, O'er the Pohya-hills and moorlands.\n\nQuick the wizard son, Kullervo, Holds the bridle of his courser, Charmingly intones these measures: \"Come, fair maiden, to my snow-sledge, In these fur-robes rest, and linger; Eat with me the golden apples, Eat the hazel-nut in joyance, Drink with me the beer delicious, Eat the dainties that I give thee.\" This the answer of the maiden With the tin-pin on her bosom: \"I have scorn to give thy snow-sledge, Scorn for thee, thou wicked wizard; Cold is it beneath thy fur-robes, And thy sledge is chill and cheerless.\n\nThereupon the youth, Kullervo, Wicked wizard of the Northland, Drew the maiden to his snow-sledge, Drew her to a seat beside him, Quickly in his furs enwrapped her; And the tin-adorned made answer, These the accents of the maiden: \"Loose me from thy magic power, Let me leave at once thy presence, Lest I speak in wicked accents, Lest I say the prayer of evil; Free me now as I command thee, Or I'll tear thy sledge to pieces, Throw these fur-robes to the north-winds.\" Straightway wicked Kullerwoinen, Evil wizard and magician, Opens all his treasure-boxes, Shows the maiden gold and silver, Shows her silken wraps of beauty, Silken hose with golden borders, Golden belts with silver buckles, Jewelry that dims the vision, Blunts the conscience of the virgin.\n\nSilver leads one to destruction, Gold entices from uprightness.\n\nKullerwoinen, wicked wizard, Flatters lovingly the maiden, One hand on the reins of leather, One upon the maiden's shoulder; Thus they journey through the evening, Pass the night in merry-making."

