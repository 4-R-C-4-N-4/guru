[content]
body = "'S LAMENTATION.\n\nFar and wide the tidings travelled, Far away men heard the story Of the flight and death of Aino, Sister dear of Youkahainen, Fairest daughter of creation.\n\nWainamoinen, brave and truthful, Straightway fell to bitter weeping, Wept at morning, wept at evening, Sleepless, wept the dreary night long, That his Aino had departed, That the maiden thus had vanished, Thus had sunk upon the bottom Of the blue-sea, deep and boundless.\n\nFilled with grief, the ancient singer, Wainamoinen of the Northland, Heavy-hearted, sorely weeping, Hastened to the restless waters, This the suitor's prayer and question: \"Tell, Untamo, tell me, dreamer, Tell me, Indolence, thy visions, Where the water-gods may linger, Where may rest Wellamo's maidens?\" Then Untamo, thus made answer, Lazily he told his dreamings: \"Over there, the mermaid-dwellings, Yonder live Wellamo's maidens, On the headland robed in verdure, On the forest-covered island, In the deep, pellucid waters, On the purple-colored sea-shore; Yonder is the home or sea-maids, There the maidens of Wellamo, Live there in their sea-side chambers, Rest within their water-caverns, On the rocks of rainbow colors, On the juttings of the sea-cliffs.\" Straightway hastens Wainamoinen To a boat-house on the sea-shore, Looks with care upon the fish-hooks, And the lines he well considers; Lines, and hooks, and poles, arid fish-nets, Places in a boat of copper, Then begins he swiftly rowing To the forest-covered island, To the point enrobed In verdure, To the purple-colored headland, Where the sea-nymphs live and linger.\n\nHardly does he reach the island Ere the minstrel starts to angle; Far away he throws his fish-hook, Trolls it quickly through the waters, Turning on a copper swivel Dangling from a silver fish-line, Golden is the hook he uses.\n\nNow he tries his silken fish-net, Angles long, and angles longer, Angles one day, then a second, In the morning, in the evening, Angles at the hour of noontide, Many days and nights he angles, Till at last, one sunny morning, Strikes a fish of magic powers, Plays like salmon on his fish-line, Lashing waves across the waters, Till at length the fish exhausted Falls a victim to the angler, Safely landed in the bottom Of the hero's boat of copper.\n\nWainamoinen, proudly viewing, Speaks these words in wonder guessing: \"This the fairest of all sea-fish, Never have I seen its equal, Smoother surely than the salmon, Brighter-spotted than the trout is, Grayer than the pike of Suomi, Has less fins than any female, Not the fins of any male fish, Not the stripes of sea-born maidens, Not the belt of any mermaid, Not the ears of any song-bird, Somewhat like our Northland salmon From the blue-sea's deepest caverns.\" In his belt the ancient hero Wore a knife insheathed with silver; From its case he drew the fish-knife, Thus to carve the fish in pieces, Dress the nameless fish for roasting, Make of it a dainty breakfast, Make of it a meal at noon-day, Make for him a toothsome supper, Make the later meal at evening."

