[content]
body = "\"Shouldst thou find no means of living, I will banish thee still farther, To the cataract of Rutya, To the fire-emitting whirlpool, Where the firs are ever falling, To the windfalls of the forest; Swim hereafter in the waters Of the fire-emitting whirlpool, Whirl thou ever in the current Of the cataract's commotion, In its foam and boiling waters.\n\nShould this place be unbefitting, I will drive thee farther onward, To Tuoni's coal-black river, To the endless stream of Mana, Where thou shalt forever linger; Thou canst never leave Manala, Should I not thy head deliver, Should I never pay thy ransom; Thou canst never safely journey Through nine brother-rams abutting, Through nine brother-bulls opposing Through nine brother-stallions thwarting, Thou canst not re-cross Death-river Thickly set with iron netting, Interlaced with threads of copper.\n\n\"Shouldst thou ask for steeds for saddle, Shouldst thou need a fleet-foot courser, I will give thee worthy racers, I will give thee saddle-horses; Evil Hisi has a charger, Crimson mane, and tail, and foretop, Fire emitting from his nostrils, As he prances through his pastures; Hoofs are made of strongest iron, Legs are made of steel and copper, Quickly scales the highest mountains, Darts like lightning through the valleys, When a skilful master rides him.\n\n\"Should this steed be insufficient, I will give thee Lempo's snow-shoes, Give thee Hisi's shoes of elm-wood, Give to thee the staff of Piru, That with these thou mayest journey Into Hisi's courts and castles, To the woods and fields of Juutas; If the rocks should rise before thee, Dash the flinty rocks in pieces, Hurl the fragments to the heavens; If the branches cross thy pathway, Make them turn aside in greeting; If some mighty hero hail thee, Hurl him headlong to the woodlands.\n\n\"Hasten hence, thou thing of evil, Heinous monster, leave my body, Ere the breaking of the morning Ere the Sun awakes from slumber, Ere the sinning of the cuckoo; Haste away, thou plague of Northland, Haste along the track of' moonbeams, Wander hence, forever wander, To the darksome fields or Pohya.\n\n\"If at once thou dost not leave me, I will send the eagle's talons, Send to thee the beaks of vultures, To devour thine evil body, Hurl thy skeleton to Hisi.\n\nMuch more quickly cruel Lempo Left my vitals when commanded, When I called the aid of Ukko, Called the help of my Creator.\n\nFlee, thou motherless offendant, Flee, thou fiend of Sariola, Flee, thou hound without a master, Ere the morning sun arises, Ere the Moon withdraws to slumber!\" Wainamoinen, ancient hero, Speaks at last to old Wipunen: \"Satisfied am I to linger In these old and spacious caverns, Pleasant here my home and dwelling; For my meat I have thy tissues, Have thy heart, and spleen, and liver, For my drink the blood of ages, Goodly home for Wainamoinen."

