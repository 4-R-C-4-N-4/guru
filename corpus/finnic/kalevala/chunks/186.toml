[content]
body = "That the boy may sink and perish?\" Then they hung him to an oak-tree, Crucified him in the branches, That the wizard there might perish.\n\nWhen three days and nights had ended, Untamoinen spake as follows: \"It is time to send my heralds To inspect the mighty oak-tree, There to learn if young Kullervo Lives or dies among the branches.\" Thereupon he sent his servants, And the heralds brought this message: \"Young Kullervo has not perished, Has not died among the branches Of the oak-tree where we hung him.\n\nIn the oak he maketh pictures With a wand between his fingers; Pictures hang from all the branches, Carved and painted by Kullervo; And the heroes, thick as acorns, With their swords and spears adjusted, Fill the branches of the oak-tree, Every leaf becomes a soldier.\" Who can help the grave Untamo Kill the boy that threatens evil To Untamo's tribe and country, Since he will not die by water, Nor by fire, nor crucifixion?\n\nFinally it was decided That his body was immortal, Could not suffer death nor torture.\n\nIn despair grave Untamoinen Thus addressed the boy, Kullervo: \"Wilt thou live a life becoming, Always do my people honor, Should I keep thee in my dwelling?\n\nShouldst thou render servant's duty, Then thou wilt receive thy wages, Reaping whatsoe'er thou sowest; Thou canst wear the golden girdle, Or endure the tongue of censure.\" When the boy had grown a little, Had increased in strength and stature, He was given occupation, He was made to tend an infant, Made to rock the infant's cradle.\n\nThese the words of Untamoinen: \"Often look upon the young child, Feed him well and guard from danger, Wash his linen in the river, Give the infant good attention.\" Young Kullervo, wicked wizard, Nurses one day then a second; On the morning of the third day, Gives the infant cruel treatment, Blinds its eyes and breaks its fingers; And when evening shadows gather, Kills the young child while it slumbers, Throws its body to the waters, Breaks and burns the infant's cradle.\n\nUntamoinen thus reflected: \"Never will this fell Kullervo Be a worthy nurse for children, Cannot rock a babe in safety; Do not know how I can use him, What employment I can give him!\" Then he told the young magician He must fell the standing forest, And Kullervo gave this answer: \"Only will I be a hero, When I wield the magic hatchet; I am young, and fair, and mighty, Far more beautiful than others, Have the skill of six magicians.\" Thereupon he sought the blacksmith, This the order of Kullervo: \"Listen, O thou metal-artist, Forge for me an axe of copper, Forge the mighty axe of heroes, Wherewith I may fell the forest, Fell the birch, and oak, and aspen.\" This behest the blacksmith honors, Forges him an axe of copper, Wonderful the blade he forges.\n\nKullerwoinen grinds his hatchet, Grinds his blade from morn till evening, And the next day makes the handle; Then he hastens to the forest, To the upward-sloping mountain, To the tallest of the birches, To the mightiest of oak-trees; There he swings his axe of copper, Swings his blade with might of magic, Cuts with sharpened edge the aspen, With one blow he fells the oak-tree, With a second blow, the linden; Many trees have quickly fallen, By the hatchet of Kullervo."

