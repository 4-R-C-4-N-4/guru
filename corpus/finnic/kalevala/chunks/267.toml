[content]
body = "This the source of all my trouble, Only cause of my dishonor!\" As the mother was relentless, Asked the maiden of her father, This the virgin-mother's pleading: O my father, full of pity, Source of both my good and evil, Build for me a place befitting, Where my troubles may be lessened, And my heavy burdens lightened.\" This the answer of the father, Of the father unforgiving: \"Go, thou evil child of Hisi, Go, thou child of sin and sorrow, Wedded only to dishonor, To the Great Bear's rocky chamber, To the stone-cave of the growler, There to lessen all thy troubles, There to cast thy heavy burdens!\" Mariatta, child of beauty, Thus made answer to her father: \"I am not a child of Hisi, I am not a bride unworthy, Am not wedded to dishonor; I shall bear a noble hero, I shall bear a son immortal, Who will rule among the mighty, Rule the ancient Wainamoinen.\" Thereupon the virgin-mother Wandered hither, wandered thither, Seeking for a place befitting, Seeking for a worthy birth-place For her unborn son and hero; Finally these words she uttered \"Piltti, thou my youngest maiden, Trustiest of all my servants, Seek a place within the village, Ask it of the brook of Sara, For the troubled Mariatta, Child of sorrow and misfortune.\" Thereupon the little maiden, Piltti, spake these words in answer: \"Whom shall I entreat for succor, Who will lend me his assistance?\n\nThese the words of Mariatta: \"Go and ask it of Ruotus, Where the reed-brook pours her waters.\" Thereupon the servant, Piltti, Ever hopeful, ever willing, Hastened to obey her mistress, Needing not her exhortation; Hastened like the rapid river, Like the flying smoke of battle To the cabin of Ruotus.\n\nWhen she walked the hill-tops tottered, When she ran the mountains trembled; Shore-reeds danced upon the pasture, Sandstones skipped about the heather As the maiden, Piltti, hastened To the dwelling of Ruotus.\n\nAt his table in his cabin Sat Ruotus, eating, drinking, In his simple coat of linen.\n\nWith his elbows on the table Spake the wizard in amazement: \"Why hast thou, a maid of evil, Come to see me in my cavern, What the message thou art bringing?\n\nThereupon the servant, Piltti, Gave this answer to the wizard: \"Seek I for a spot befitting, Seek I for a worthy birth-place, For an unborn child and hero; Seek it near the Sara-streamlet, Where the reed-brook pours her waters.\n\nCame the wife of old Ruotus, Walking with her arms akimbo, Thus addressed the maiden, Piltti: \"Who is she that asks assistance, Who the maiden thus dishonored, What her name, and who her kindred?\" \"I have come for Mariatta, For the worthy virgin-mother.\" Spake the wife of old Ruotus, Evil-minded, cruel-hearted: \"Occupied are all our chambers, All our bath-rooms near the reed-brook; in the mount of fire are couches, is a stable in the forest, For the flaming horse of Hisi; In the stable is a manger Fitting birth-place for the hero From the wife of cold misfortune, Worthy couch for Mariatta!\" Thereupon the servant, Piltti, Hastened to her anxious mistress, Spake these measures, much regretting.\n\n\"There is not a place befitting, on the silver brook of Sara."

