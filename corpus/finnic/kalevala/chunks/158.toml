[content]
body = "Then the stout-heart, Lemminkainen, Handsome hero, Kaukomieli, Rose upon his seat in wonder, Craned his neck and looked about him Found it as his mother told him, Found a stream of fire opposing; Ran the fire-stream like a river, Ran across the hero's pathway.\n\nIn the river was a fire-fall, In the cataract a fire-rock, On the rock a fiery hillock, On its summit perched an eagle, From his throat the fire was streaming To the crater far below him, Fire out-shooting from his feathers, Glowing with a fiery splendor; Long he looked upon the hero, Long he gazed on Lemminkainen, Then the eagle thus addressed him: \"Whither art thou driving, Ahti, Whither going, Lemminkainen?\" Kaukomieli spake in answer: \"To the feastings of Pohyola, To the drinking-halls of Louhi, To the banquet of her people; Move aside and let me journey, Move a little from my pathway, Let this wanderer pass by thee, I am warlike Lemminkainen.\" This the answer of the eagle, Screaming from his throat of splendor: \"Though thou art wild Lemminkainen, I shall let thee wander onward, Through my fire-throat let thee journey, Through these flames shall be thy passage To the banquet-halls of Louhi, To Pohyola's great carousal!\" Little heeding, Kaukomieli Thinks himself in little trouble, Thrusts his fingers in his pockets, Searches in his pouch of leather, Quickly takes the magic feathers, Feathers from the hazel-chickens, Rubs them into finest powder, Rubs them with his magic fingers Whence a flight of birds arises, Hazel-chickens from the feathers, Large the bevy of the young birds.\n\nQuick the wizard, Lemminkainen, Drives them to the eagle's fire-mouth, Thus to satisfy his hunger, Thus to quench the fire out-streaming.\n\nThus escapes the reckless hero, Thus escapes the first of dangers, Passes thus the first destroyer, On his journey to Pohyola.\n\nWith his whip he strikes his courser, With his birch-whip, pearl-enamelled; Straightway speeds the fiery charger, Noiselessly upon his journey, Gallops fast and gallops faster, Till the flying steed in terror Neighs again and ceases running.\n\nLemminkainen, quickly rising, Cranes his neck and looks about him, Sees his mother's words were truthful, Sees her augury well-taken.\n\nLo!\n\nbefore him yawned a fire-gulf, Stretching crosswise through his pathway; Far to east the gulf extending, To the west an endless distance, Filled with stones and burning pebbles, Running streams of burning matter."

