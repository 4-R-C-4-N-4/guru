[content]
body = "Cold and still my golden mother Lies beneath the meadow, sleeping, Hears my ancient songs no longer, Cannot listen to my singing; Only will the forest listen, Sacred birches, sighing pine-trees, Junipers endowed with kindness, Alder-trees that love to bear me, With the aspens and the willows.\n\nWhen my loving mother left me, Young was I, and low of stature; Like the cuckoo of the forest, Like the thrush upon the heather, Like the lark I learned to twitter, Learned to sing my simple measures, Guided by a second mother, Stern and cold, without affection; Drove me helpless from my chamber To the wind-side of her dwelling, To the north-side of her cottage, Where the chilling winds in mercy Carried off the unprotected.\n\nAs a lark I learned to wander, Wander as a lonely song-bird, Through the forests and the fenlands Quietly o'er hill and heather; Walked in pain about the marshes, Learned the songs of winds and waters, Learned the music of the ocean, And the echoes of the woodlands.\n\nMany men that live to murmur, Many women live to censure, Many speak with evil motives; Many they with wretched voices Curse me for my wretched singing, Blame my tongue for speaking wisdom, Call my ancient songs unworthy, Blame the songs and curse the singer.\n\nBe not thus, my worthy people, Blame me not for singing badly, Unpretending as a minstrel.\n\nI have never had the teaching, Never lived with ancient heroes, Never learned the tongues of strangers, Never claimed to know much wisdom.\n\nOthers have had language-masters, Nature was my only teacher, Woods and waters my instructors.\n\nHomeless, friendless, lone, and needy, Save in childhood with my mother, When beneath her painted rafters, Where she twirled the flying spindle, By the work-bench of my brother, By the window of my sister, In.\n\nthe cabin of my father, In my early days of childhood.\n\nBe this as it may, my people, This may point the way to others, To the singers better gifted, For the good of future ages, For the coming generations, For the rising folk of Suomi.\n\nGLOSSARY.\n\nAar'ni (Ar'ni).\n\nThe guardian of hidden treasures.\n\nA-ha'va.\n\nThe West-wind; the father of the swift dogs.\n\nAh'ti.\n\nThe same as Lemminkainen.\n\nAh'to.\n\nThe great god of the waters.\n\nAh'to-la.\n\nThe water-castle of Ahto and his people.\n\nAh'to-lai'set.\n\nThe inhabitants of Ahtola.\n\nAi-nik'ki.\n\nA sister of Ahti.\n\nAi'no (i'no).\n\nYoukahainen's sister.\n\nAn'te-ro.\n\nA goddess of the waves.\n\nAi'ue-lake.\n\nThe lake into which the Fire-child falls.\n\nAn-nik'ki.\n\nIlmarinen's sister.\n\nAn'te-ro.\n\nAnother name for Wipanen, or Antero Wipunen.\n\nDus'ter-land.\n\nThe Northland; Pimentola.\n\nEt'e-le'tar.\n\nA daugter of the South-wind.\n\nFire-Child.\n\nA synonym of Panu.\n\nFrost.\n\nThe English for Pakkanen.\n\nHal'lap-yo'ra.\n\nA lake in Finland.\n\nHal'ti-a (plural Haltiat).\n\nThe Genius of Finnish mythology.\n\nHet'e-wa'ne.\n\nThe Finnish name of the Pleiades.\n\nHi'si (original Hiisi).\n\nThe Evil Principle; also called Jutas, Lempo, and Piru.\n\nMon'ja-tar.\n\nThe daughter of the Pine-tree.\n\nHor'na.\n\nA sacred rock in Finland.\n\nI'ku-Tur'so."

