[content]
body = "Neither did the prudent hostess, Beautiful, and full of wisdom, Let the barley sprout too freely, Lest the beer should taste of black-earth, Be too bitter in the brewing, Often went she to the garners, Went alone at hour of midnight, Was not frightened by the black-wolf, Did not fear the beasts of woodlands.\n\n\"Now the hostess I have lauded, Let me praise the favored suitor, Now the honored hero-bridegroom, Best of all the village-masters.\n\nClothed in purple is the hero, Raiment brought from distant nations, Tightly fitting to his body; Snugly sets his coat of ermine, To the floor it hangs in beauty, Trailing from his neck and shoulders, Little of his vest appearing, Peeping through his outer raiment, Woven by the Moon's fair daughters, And his vestment silver-tinselled.\n\nDressed in neatness is the suitor, Round his waist a belt of copper, Hammered by the Sun's sweet maidens, Ere the early fires were lighted, Ere the fire had been discovered.\n\nDressed in richness is the bridegroom, On his feet are silken stockings, Silken ribbons on his ankles, Gold and silver interwoven.\n\nDressed in beauty is the bridegroom, On his feet are shoes of deer-skin, Like the swans upon the water, Like the blue-duck on the sea-waves, Like the thrush among the willows, Like the water-birds of Northland.\n\nWell adorned the hero-suitor, With his locks of golden color, With his gold-beard finely braided, Hero-hat upon his forehead, Piercing through the forest branches, Reaching to the clouds of heaven, Bought with countless gold and silver, Priceless is the suitor's head-gear.\n\n\"Now the bridegroom has been lauded, I will praise the young bride's playmate, Day-companion in her childhood, In the maiden's magic mansion.\n\nWhence was brought the merry maiden, From the village of Tanikka?\n\nThence was never brought the playmate, Playmate of the bride in childhood.\n\nHas she come from distant nations, From the waters of the Dwina, O'er the ocean far-outstretching?\n\nNot from Dwina came the maiden, Did not sail across the waters; Grew as berry in the mountains, As a strawberry of sweetness, On the fields the child of beauty, In the glens the golden flower.\n\nThence has come the young bride's playmate, Thence arose her fair companion.\n\nTiny are her feet and fingers, Small her lips of scarlet color, Like the maiden's loom of Suomi; Eyes that shine in kindly beauty Like the twinkling stars of heaven; Beam the playmate's throbbing temples Like the moonlight on the waters.\n\nTrinkets has the bride's companion, On her neck a golden necklace, In her tresses, silken ribbons, On her arms are golden bracelets, Golden rings upon her fingers, Pearls are set in golden ear-rings, Loops of gold upon her temples, And with pearls her brow is studded.\n\nNorthland thought the Moon was shining When her jeweled ear-ringsglistened; Thought the Sun had left his station When her girdle shone in beauty; Thought a ship was homeward sailing When her colored head-gear fluttered.\n\nThus is praised the bride's companion, Playmate of the Rainbow-maiden.\n\n\"Now I praise the friends assembled, All appear in graceful manners; If the old are wise and silent, All the youth are free and merry, All the guests are fair and worthy."

