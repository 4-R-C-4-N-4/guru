[content]
body = "An evil giant of the sea.\n\nIl'ma-ri'nem.\n\nThe worker of the metals; a brother of Wainamoinen.\n\nIl'ma-tar.\n\nDaughter of the Air, and mother of Wainamoinen.\n\nIl'po-tar.\n\nBelieved to be the daughter of the Snow flake; the same as Louhi.\n\nIm-a'tra.\n\nA celebrated waterfall near Wiborg.\n\nIn'ger-land.\n\nThe present St.\n\nPetersburg.\n\nJa'men (Ya'men).\n\nA river of Finland.\n\nJor'dan.\n\nCuriously, the river of Palestine.\n\nJou'ka-hai'nen (You-ka-hai'nen).\n\nA celebrated minstrel of Pohyola.\n\nJou-ko'la (You-ko'la).\n\nThe home or dwelling of Youkahainen.\n\nJu-ma'la (You-ma'la).\n\nOriginally the heavens, then the god of the heavens, and finally God.\n\nJu'tas (yu'tas).\n\nThe Evil Principle; Hisi, Piru, and Lempo are synonyms, Kai'to-lai'nen.\n\nA son of the god of metals; from his spear came the tongue of the serpent.\n\nKa-ler'vo.\n\nThe father of Kullervo.\n\nKa-le'va (Kalewai'nen).\n\nThe father of heroes; a hero in general.\n\nKal'e-va'la (kaleva, hero, and la, the place of).\n\nThe land of heroes; the name of the epic poem of Finland.\n\nKal'e-va'tar (Kalewa'tar).\n\nDaughter of Kaleva.\n\nKal-e'vo.\n\nThe same as Kaleva.\n\nKa'lew.\n\nOften used for Kaleva.\n\nKal'ma.\n\nThe god of death.\n\nKam'mo.\n\nThe father of Kimmo.\n\nKan'ka-hat'ta-ret.\n\nThe goddesses of weaving.\n\nKa'pe.\n\nA synonym of Ilmatar, the mother of Wainamoinen.\n\nKa'po.\n\nA synonym of Osmotar.\n\nKa-re'len.\n\nA province of Finland.\n\nKar-ja'la, (karya'la).\n\nThe seat of the waterfall, Kaatrakoski.\n\nKat'e-ja'tar (kataya'tar).\n\nThe daughter of the Pine-tree.\n\nKat'ra-kos'ki (Kaatrakos'ki).\n\nA waterfall in Karjala.\n\nKau'ko.\n\nThe same as Kaukomieli.\n\nKau'ko-miel'li.\n\nThe same as Lemminkainen.\n\nKaup'pi.\n\nThe Snowshoe-builder; Lylikki.\n\nKe'mi.\n\nA river of Finland.\n\nKim'mo.\n\nA name for the cow; the daughter of Kammo, the patron of the rocks.\n\nKi'pu-ki'vi.\n\nThe name of the rock at Hell-river, beneath which the spirits of all diseases are imprisoned.\n\nKir'kon-Woe'ki.\n\nChurch dwarfs living under altars.\n\nKnik'ka-no.\n\nSame as Knippana.\n\nKnip'pa-no.\n\nSame as Tapio.\n\nKoot'a-moi'nen.\n\nThe Moon.\n\nKos'ken-nei'ti.\n\nThe goddess of the cataract.\n\nKul-ler'vo.\n\nThe vicious son of Kalervo.\n\nKul'ler-woi'nen.\n\nThe same as Kullervo.\n\nKul'li.\n\nA beautiful daughter of Sahri.\n\nKun.\n\nThe Moon, and the Moon-god.\n\nKun'tar.\n\nOne of the daughters of the Moon.\n\nKu'ra (Kuura).\n\nThe Hoar-frost; also called Tiera, a ball of ice.\n\nKul-lik'ki (also Kyl'li).\n\nThe Sahri-maiden whom Lemminkainen kidnapped."

