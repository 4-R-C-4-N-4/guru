[content]
body = "Yea, the blade and hilt are molded To the wishes of the minstrel.\" On the sword-point gleams the moonlight, On the blade the sun is shining, On the hilt the bright stars twinkle, On the edge a horse is neighing, On the handle plays a kitten, On the sheath a dog is barking.\n\nWainamoinen wields his fire-sword, Tests it on the iron-mountain, And these words the hero utters: \"With this broadsword I could quickly Cleave in twain the mount of Pohya, Cut the flinty rocks asunder.\" Spake the blacksmith, Ilmarinen: \"Wherewith shall I guard from danger, How protect myself from evil, From the ills by land and water?\n\nShall I wear an iron armor, Belt of steel around my body?\n\nStronger is a man in armor, Safer in a mail of copper.\" Now the time has come to journey To the never-pleasant Northland; Wainamoinen, ancient minstrel, And his brother, Ilmarinen, Hasten to the field and forest, Searching for their fiery coursers, In each shining belt a bridle, With a harness on their shoulders.\n\nIn the woods they find a race; In the glen a steed of battle, Ready for his master's service.\n\nWainamoinen, old and trusty, And the blacksmith, Ilmarinen, Throw the harness on the courser, Hitch him to the sledge of conquest, Hasten on their journey Northward; Drive along the broad-sea's margin Till they bear some one lamenting On the strand hear something wailing Near the landing-place of vessels.\n\nWainamoinen, ancient minstrel, Speaks these words in wonder, guessing, \"This must be some maiden weeping, Some fair daughter thus lamenting; Let us journey somewhat nearer, To discover whence this wailing.\" Drew they nearer, nearer, nearer, Hoping thus to find a maiden Weeping on the sandy sea-shore.\n\nIt was not a maiden weeping, But a vessel, sad, and lonely, Waiting on the shore and wailing.\n\nSpake the ancient Wainamoinen: \"Why art weeping, goodly vessel, What the cause of thy lamenting?\n\nArt thou mourning for thy row-locks, Is thy rigging ill-adjusted?\n\nDost thou weep since thou art anchored On the shore in times of trouble?\" Thus the war-ship spake in answer: \"To the waters would this vessel Haste upon the well-tarred rollers, As a happy maiden journeys To the cottage of her husband.\n\nI, alas!\n\na goodly vessel, Weep because I lie at anchor, Weep and wail because no hero Sets me free upon the waters, Free to ride the rolling billows.\n\nIt was said when I was fashioned, Often sung when I was building, That this bark should be for battle, Should become a mighty war-ship, Carry in my hull great treasures, Priceless goods across the ocean.\n\nNever have I sailed to conquest, Never have I carried booty; Other vessels not as worthy To the wars are ever sailing, Sailing to the songs of battle.\n\nThree times in the summer season Come they home with treasures laden, In their hulls bring gold and silver; I, alas!"

