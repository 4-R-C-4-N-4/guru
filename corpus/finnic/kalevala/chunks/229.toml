[content]
body = "Ilmarinen, magic blacksmith, Well anointed all the hinges, All the bars and locks anointed, And the bolts flew back by magic, All the gates unlocked in silence, Opened for the great magician.\n\nSpake the minstrel Wainamoinen: \"O thou daring Lemminkainen, Friend of mine in times of trouble, Enter thou within the mountain, Bring away the wondrous Sampo, Bring away the lid in colors!\" Quick the reckless Lemminkainen, Handsome hero, Kaukomieli, Ever ready for a venture, Hastens to the mountain-caverns, There to find the famous Sampo, There to get the lid in colors; Strides along with conscious footsteps, Thus himself he vainly praises: \"Great am I and full of glory, Wonder-hero, son of Ukko, I will bring away the Sampo, Turn about the lid in colors, Turn it on its magic hinges!\" Lemminkainen finds the wonder, Finds the Sampo in the mountain, Labors long with strength heroic, Tugs with might and main to turn it; Motionless remains the treasure, Deeper sinks the lid in colors, For the roots have grown about it, Grown nine fathoms deep in sand-earth.\n\nLived a mighty ox in Northland, Powerful in bone and sinew, Beautiful in form and color, Horns the length of seven fathoms, Mouth and eyes of wondrous beauty.\n\nLemminkainen, reckless hero, Harnesses the ox in pasture, Takes the master-plow of Pohya, Plows the roots about the Sampo, Plows around the lid in colors, And the sacred Sampo loosens, Falls the colored lid in silence.\n\nStraightway ancient Wainamoinen Brings the blacksmith, Ilmarinen, Brings the daring Lemminkainen, Lastly brings the magic Sampo, From the stone-berg of Pohyola, From the copper-bearing mountain, Hides it in his waiting vessel, In the war-ship of Wainola.\n\nWainamoinen called his people, Called his crew of men and maidens, Called together all his heroes, Rolled his vessel to the water, Into billowy deeps and dangers.\n\nSpake the blacksmith, Ilmarinen: \"Whither shall we take the Sampo, Whither take the lid in colors, From the stone-berg of Pohyola, From this evil spot of Northland?\" Wainamoinen, wise and faithful, Gave this answer to the question: \"Thither shall we take the Sampo, Thither take the lid in colors, To the fog-point on the waters, To the island forest-covered; There the treasure may be hidden, May remain in peace for ages, Free from trouble, free from danger, Where the sword will not molest it.\" Then the minstrel, Wainamoinen, Joyful, left the Pohya borders, Homeward sailed, and happy-hearted, Spake these measures on departing: \"Turn, O man-of-war, from Pohya, Turn thy back upon the strangers, Turn thou to my distant country!\n\nRock, O winds, my magic vessel, Homeward drive my ship, O billows, Lend the rowers your assistance, Give the oarsmen easy labor, On this vast expanse of waters!"

