[content]
body = "Was not born in lofty station, From a tribe of noble heroes, From a worthy race descended; But I have a sword of fervor, And a spear yet filled with courage, Surely these are well descended, These were born from hero-races, Sharpened by the mighty Hisi, By the gods were forged and burnished; Therefore will I give thee greatness, Greatness of my race and nation, With my broadsword filled with fervor, With my spear still filled with courage.\" Anxiously the sighing maiden Thus addresses Lemminkainen: \"O thou Ahti, son of Lempo, Wilt thou take this trusting virgin, As thy faithful life-companion, Take me under thy protection, Be to me a faithful husband, Swear to me an oath of honor, That thou wilt not go to battle, When for gold thou hast a longing, When thou wishest gold and silver?\" This is Lemminkainen's answer: I will swear an oath of honor, That I'll never go to battle, When for gold I feel a longing, When I wish for gold and silver.\n\nSwear thou also on thine honor, Thou wilt go not to the village, When desire for dance impels thee, Wilt not visit village-dances.\" Thus the two made oath together, Registered their vows in heaven, Vowed before omniscient Ukko, Ne'er to go to war vowed Ahti, Never to the dance, Kyllikki.\n\nLemminkainen, full of joyance, Snapped his whip above his courser, Whipped his racer to a gallop, And these words the hero uttered: \"Fare ye well, ye Sahri-meadows, Roots of firs, and stumps of birch-trees.\n\nThat I wandered through in summer, That I travelled o'er in winter, Where ofttimes in rainy seasons, At the evening hour I lingered, When I sought to win the virgin, Sought to win the Maid of Beauty, Fairest of the Sahri-flowers.\n\nFare ye well, ye Sahri-woodlands, Seas and oceans, lakes and rivers, Vales and mountains, isles and inlets, Once the home of fair Kyllikki!\" Quick the racer galloped homeward, Galloped on along the highway, Toward the meadows of Wainola, To the plains of Kalevala.\n\nAs they neared the Ahti-dwellings, Thus Kyllikki spake in sorrow: \"Cold and drear is thy cottage, Seeming like a place deserted; Who may own this dismal cabin, Who the one so little honored?\" Spake the hero, Lemminkainen, These the words that Ahti uttered: \"Do not grieve about my cottage, Have no care about my chambers; I shall build thee other dwellings, I shall fashion them much better, Beams, and posts, and sills, and rafters, Fashioned from the sacred birch-wood.\" Now they reach the home of Ahti, Lemminkainen's home and birthplace, Enter they his mother's cottage; There they meet his aged mother, These the words the mother uses: \"Long indeed hast thou been absent, Long in foreign lands hast wandered, Long in Sahri thou hast lingered!\" This is Lemminkainen's answer: \"All the host of Sahri-women, All the chaste and lovely maidens, All the maids with braided tresses, Well have paid for their derision, For their scorn and for their laughter, That they basely heaped upon me."

