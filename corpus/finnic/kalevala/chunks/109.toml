[content]
body = "Tell me is the maiden ready, Wilt thou give the bride affianced?\n\nSpake the hostess of Pohyola: \"I will give to thee my daughter, Will prepare my snow-white virgin, For the suitor, Ilmarinen; Thou hast won the Maid of Beauty, Bride is she of thine hereafter, Fit companion of thy fireside, Help and joy of all thy lifetime.\" On the floor a child was sitting, And the babe this tale related.\n\n\"There appeared within this dwelling, Came a bird within the castle, From the East came flying hither, From the East, a monstrous eagle, One wing touched the vault of heaven, While the other swept the ocean; With his tail upon the waters, Reached his beak beyond the cloudlets, Looked about, and eager watching, Flew around, and sailing, soaring, Flew away to hero-castle, Knocked three times with beak of copper On the castle-roof of iron; But the eagle could not enter.\n\n\"Then the eagle, looking round him, Flew again, and sailed, and circled, Flew then to the mothers' castle, Loudly rapped with heavy knocking On the mothers' roof of copper; But the eagle could not enter.\n\n\"Then the eagle, looking round him, Flew a third time, sailing, soaring, Flew then to the virgins' castle, Knocked again with beak of copper, On the virgins' roof of linen, Easy for him there to enter; Flew upon the castle-chimney, Quick descending to the chamber, Pulled the clapboards from the studding, Tore the linen from the rafters, Perched upon the chamber-window, Near the walls of many colors, On the cross-bars gaily-feathered, Looked upon the curly-beaded, Looked upon their golden ringlets, Looked upon the snow-white virgins, On the purest of the maidens, On the fairest of the daughters, On the maid with pearly necklace, On the maiden wreathed in flowers; Perched awhile, and looked, admiring, Swooped upon the Maid of Beauty, On the purest of the virgins, On the whitest, on the fairest, On the stateliest and grandest, Swooped upon the rainbow-daughter Of the dismal Sariola; Grasped her in his mighty talons, Bore away the Maid of Beauty, Maid of fairest form and feature, Maid adorned with pearly necklace, Decked in feathers iridescent, Fragrant flowers upon her bosom, Scarlet band around her forehead, Golden rings upon her fingers, Fairest maiden of the Northland.\" Spake the hostess of Pohyola, When the babe his tale had ended: \"Tell me bow, my child beloved, Thou hast learned about the maiden, Hast obtained the information, How her flaxen ringlets nestled, How the maiden's silver glistened, How the virgin's gold was lauded.\n\nShone the silver Sun upon thee, Did the moonbeams bring this knowledge?\" From the floor the child made answer: \"Thus I gained the information, Moles of good-luck led me hither, To the home, of the distinguished, To the guest-room of the maiden, Good-name bore her worthy father, He that sailed the magic vessel; Better-name enjoyed the mother, She that baked the bread of barley, She that kneaded wheaten biscuits, Fed her many guests in Northland."

