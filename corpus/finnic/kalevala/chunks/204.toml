[content]
body = "In the court-yard stood the mother, Thus the wicked son addressed her: \"Faithful mother, fond and tender, Hadst thou slain me when an infant, Smoked my life out in the chamber, In a winding-sheet hadst thrown me To the cataract and whirlpool, In the fire hadst set my cradle, After seven nights had ended, Worthy would have been thy service.\n\nHad the village-maidens asked thee: 'Where is now the little cradle, Wherefore is the bath-room empty?' This had been a worthy answer: 'I have burned the wizard's cradle, Cast the infant to the fire-dogs; In the bath-room corn is sprouting, From the barley malt is brewing.'\" Thereupon the aged mother Asks her wizard-son these questions: \"What has happened to my hero, What new fate has overcome thee?\n\nComest thou as from Tuoni, From the castles of Manala?\" This, Kullervo's frank confession: \"Infamous the tale I bring thee, My confession is dishonor: On the way I met a maiden, Met thy long-lost, wayward daughter, Did not recognize my sister, Fatal was the sin committed!\n\nWhen the taxes had been settled, When the tribute had been gathered, Came a matchless maid to meet me, Whom I witless led to sorrow, This my mother's long-lost daughter.\n\nWhen she saw in me her brother, Quick she bounded from the snow-sledge, Hastened to the roaring waters, To the cataract's commotion, To the fiery stream and whirlpool, Hastened to her full destruction.\n\n\"Now, alas!\n\nmust I determine, Now must find a spot befitting, Where thy sinful son may perish; Tell me, all-forgiving mother, Where to end my life of trouble; Let me stop the black-wolf's howling, Let me satisfy the hunger Of the vicious bear of Northland; Let the shark or hungry sea-dog Be my dwelling-place hereafter!\" This the answer of the mother: \"Do not go to stop the howling Of the hungry wolf of Northland; Do not haste to still the black-bear Growling in his forest-cavern; Let not shark, nor vicious sea-dog Be thy dwelling-place hereafter.\n\nSpacious are the rooms of Suomi, Limitless the Sawa-borders, Large enough to hide transgression, Man's misdeeds to hide for ages, With his sins and evil actions.\n\nSix long years man's sins lie hidden In the border-land of Kalma, Even nine for magic heroes, Till the years bring consolation, Till they quiet all his mourning.\" Kullerwoinen, wicked wizard, Answers thus his grieving mother: \"I can never hide from sorrow, Cannot flee from my misconduct; To the jaws of death I hasten, To the open courts of Kalma, To the hunting-grounds of Pohya, To the battle-fields of heroes.\n\nUntamoinen still is living, Unmolested roams the wicked, Unavenged my father's grievance, Unavenged my mother's tortures, Unavenged the wrongs I suffer!\""

