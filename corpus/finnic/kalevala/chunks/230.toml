[content]
body = "Give me of thine oars, O Ahto, Lend thine aid, O King of sea-waves, Guide as with thy helm in safety, Lay thy hand upon the rudder, And direct our war-ship homeward; Let the hooks of metal rattle O'er the surging of the billows, On the white-capped waves' commotion.\" Then the master, Wainamoinen, Guided home his willing vessel; And the blacksmith, Ilmarinen, With the lively Lemminkainen, Led the mighty host of rowers, And the war-ship glided homeward O'er the sea's unruffled surface, O'er the mighty waste of waters.\n\nSpake the reckless Lemminkainen: \"Once before I rode these billows, There were viands for the heroes, There was singing for the maidens; But to-day I hear no singing, Hear no songs upon the vessel, Hear no music on the waters.\" Wainamoinen, wise and ancient, Answered thus wild Lemminkainen: \"Let none sing upon the blue-sea, On the waters, no rejoicing; Singing would prolong our journey, Songs disturb the host of rowers; Soon will die the silver sunlight, Darkness soon will overtake us, On this evil waste of waters, On this blue-sea, smooth and level.\" These the words of Lemminkainen: \"Time will fly on equal pinions Whether we have songs or silence; Soon will disappear the daylight, And the night as quickly follow, Whether we be sad or joyous.\" Wainamoinen, the magician, O'er the blue backs of the billows, Steered one day, and then a second, Steered the third from morn till even, When the wizard, Lemminkainen, Once again addressed the master: \"Why wilt thou, O famous minstrel, Sing no longer for thy people, Since the Sampo thou hast captured, Captured too the lid in colors?\" These the words of Wainamoinen: \"'Tis not well to sing too early!\n\nTime enough for songs of joyance When we see our home-land mansions, When our journeyings have ended!\" Spake the reckless Lemminkainen: \"At the helm, if I were sitting, I would sing at morn and evening, Though my voice has little sweetness; Since thy songs are not forthcoming Listen to my wondrous singing!\" Thereupon wild Lemminkainen, Handsome hero, Kaukomieli, Raised his voice above the waters, O'er the sea his song resounded; But his measures were discordant, And his notes were harsh and frightful.\n\nSang the wizard, Lemminkainen, Screeched the reckless Kaukomieli, Till the mighty war-ship trembled; Far and wide was heard his singing, Heard his songs upon the waters, Heard within the seventh village, Heard beyond the seven oceans.\n\nSat a crane within the rushes, On a hillock clothed in verdure, And the crane his toes was counting; Suddenly he heard the singing Of the wizard, Lemminkainen; And the bird was justly frightened At the songs of the magician.\n\nThen with horrid voice, and screeching, Flew the crane across the broad-sea To the lakes of Sariola, O'er Pohyola's hills and hamlets, Screeching, screaming, over Northland, Till the people of the darkness Were awakened from their slumbers.\n\nLouhi hastens to her hurdles, Hastens to her droves of cattle, Hastens also to her garners, Counts her herds, inspects her store-house; Undisturbed she finds her treasures."

