[content]
body = "Not to sleep art thou conducted, Not to happiness, nor joyance, Wakefulness, thy night-companion, And thy day-attendant, trouble; Often thou wilt drink of sorrow, Often long for vanished pleasures.\n\n\"When at home thou hadst no head-gear, Thou hadst also little sadness; When thy couch was not of linen, No unhappiness came nigh thee; Head-gear brings but pain and sorrow, Linen breeds bad dispositions, Linen brings but deeps of anguish, And the flax untimely mourning.\n\n\"Happy in her home, the maiden, Happy at her father's fireside, Like the master in his mansion, Happy with her bows and arrows.\n\n'Tis not thus with married women; Brides of heroes may be likened To the prisoners of Moskva, Held in bondage by their masters.\n\n\"As a wife, must weep and labor, Carry trouble on both shoulders; When the next hour passes over, Thou must tend the fire and oven, Must prepare thy husband's dinner, Must direct thy master's servants.\n\nWhen thine evening meal is ready, Thou must search for bidden wisdom In the brain of perch and salmon, In the mouths of ocean whiting, Gather wisdom from the cuckoo, Canst not learn it from thy mother, Mother dear of seven daughters; Cannot find among her treasures Where were born the human instincts, Where were born the minds of heroes, Whence arose the maiden's beauty, Whence the beauty of her tresses, Why all life revives in spring-time.\n\n\"Weep, O weep, my pretty young bride.\n\nWhen thou weepest, weep sincerely, Weep great rivers from thine eyelids, Floods of tears in field and fallow, Lakelets in thy father's dwelling; Weep thy rooms to overflowing, Shed thy tears in great abundance, Lest thou weepest on returning To thy native hills and valleys, When thou visitest thy father In the smoke of waning glory, On his arm a withered tassel.\n\n\"Weep, O weep, my lovely maiden, When thou weepest, weep in earnest, Weep great rivers from thine eyelids; If thou dost not weep sincerely, Thou wilt weep on thy returning To thy Northland home and kindred, When thou visitest thy mother Old and breathless near the hurdles, In her arms a barley-bundle.\n\n\"Weep, O weep, sweet bride of beauty, When thou weepest, weep profusely; If thou dost not weep in earnest, Thou wilt weep on thy returning To thy native vales and highlands, When thou visitest thy brother Lying wounded by the way-side, In his hand but empty honors.\n\n\"Weep, O weep, my sister's daughter, Weep great rivers from thine eyelids; If thou dost not weep sufficient, Thou wilt weep on thy returning To the scenes of happy childhood, When thou visitest thy sister Lying, prostrate in the meadow, In her hand a birch-wood mallet.\" When the ancient maid had ended, Then the young bride sighed in anguish, Straightway fell to bitter weeping, Spake these words in deeps of sorrow: \"O, ye sisters, my beloved, Ye companions of my childhood, Playmates of my early summers, Listen to your sister's counsel: Cannot comprehend the reason, Why my mind is so dejected, Why this weariness and sadness, This untold and unseen torture, Cannot understand the meaning Of this mighty weight of sorrow!"

