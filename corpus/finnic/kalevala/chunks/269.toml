[content]
body = "\"O, thou guiding-star of Northland, Star of hope, by God created, Dost thou know and wilt thou tell me Where my darling child has wandered, Where my holy babe lies hidden?\" Thus the star of Northland answers: \"If I knew, I would not tell thee; 'Tis thy child that me created, Set me here to watch at evening, In the cold to shine forever, Here to twinkle in the darkness.\" Comes the golden Moon to meet her, And the Moon she thus beseeches: \"Golden Moon, by Ukko fashioned, Hope and joy of Kalevala, Dost thou know and wilt thou tell me Where my darling child has wandered, Where my holy babe lies hidden?\n\nSpeaks the golden Moon in answer: \"If I knew I would not tell thee; 'Tis thy child that me created, Here to wander in the darkness, All alone at eve to wander On my cold and cheerless journey, Sleeping only in the daylight, Shining for the good of others.\" Thereupon the virgin-mother Falls again to bitter weeping, Hastens on through fen and forest, Seeking for her babe departed.\n\nComes the silver Sun to meet her, And the Sun she thus addresses: \"Silver Sun by Ukko fashioned, Source of light and life to Northland, Dost thou know and wilt thou tell me Where my darling child has wandered, Where my holy babe lies hidden?\" Wisely does the Sun make answer: \"Well I know thy babe's dominions, Where thy holy child is sleeping, Where Wainola's light lies hidden; 'Tis thy child that me created, Made me king of earth and ether, Made the Moon and Stars attend me, Set me here to shine at midday, Makes me shine in silver raiment, Lets me sleep and rest at evening; Yonder is thy golden infant, There thy holy babe lies sleeping, Hidden to his belt in water, Hidden in the reeds and rushes.\" Mariatta, child of beauty, Virgin-mother of the Northland, Straightway seeks her babe in Swamp-land, Finds him in the reeds and rushes; Takes the young child on her bosom To the dwelling of her father.\n\nThere the infant grew in beauty, Gathered strength, and light, and wisdom, All of Suomi saw and wondered.\n\nNo one knew what name to give him; When the mother named him, Flower, Others named him, Son-of-Sorrow.\n\nWhen the virgin, Mariatta, Sought the priesthood to baptize him, Came an old man, Wirokannas, With a cup of holy water, Bringing to the babe his blessing; And the gray-beard spake as follows: \"I shall not baptize a wizard, Shall not bless a black-magician With the drops of holy water; Let the young child be examined, Let us know that he is worthy, Lest he prove the son of witchcraft.\" Thereupon old Wirokannas Called the ancient Wainamoinen, The eternal wisdom-singer, To inspect the infant-wonder, To report him good or evil.\n\nWainamoinen, old and faithful, Carefully the child examined, Gave this answer to his people: \"Since the child is but an outcast, Born and cradled in a manger, Since the berry is his father; Let him lie upon the heather, Let him sleep among the rushes, Let him live upon the mountains; Take the young child to the marshes, Dash his head against the birch-tree.\" Then the child of Mariatta, Only two weeks old, made answer: \"O, thou ancient Wainamoinen, Son of Folly and Injustice, Senseless hero of the Northland, Falsely hast thou rendered judgment."

