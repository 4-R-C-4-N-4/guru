[content]
body = "SAMPO LOST IN THE SEA.\n\nLouhi, hostess of Pohyola, Called her many tribes together, Gave the archers bows and arrows, Gave her brave men spears and broadswords; Fitted out her mightiest war-ship, In the vessel placed her army, With their swords a hundred heroes, With their bows a thousand archers; Quick erected masts and sail-yards, On the masts her sails of linen Hanging like the clouds of heaven, Like the white-clouds in the ether, Sailed across the seas of Pohya, To re-take the wondrous Sampo From the heroes of Wainola.\n\nWainamoinen, old and faithful, Sailed across the deep, blue waters, Spake these words to Lemminkainen: \"O thou daring son of Lempo, Best of all my friends and heroes, Mount the highest of the topmasts, Look before you into ether, Look behind you at the heavens, Well examine the horizon, Whether clear or filled with trouble.\" Climbed the daring Lemminkainen, Ever ready for a venture, To the highest of the mastheads; Looked he eastward, also westward, Looked he northward, also southward, Then addressed wise Wainamoinen.\n\n\"Clear the sky appears before me, But behind a dark horizon; In the north a cloud is rising, And a longer cloud at north-west.\" Wainamoinen thus made answer: Art thou speaking truth or fiction?\n\nI am fearful that the war-ships Of Pohyola are pursuing; Look again with keener vision.\" Thereupon wild Lemminkainen Looked again and spake as follows: \"In the distance seems a forest, In the south appears an island, Aspen-groves with falcons laden, Alders laden with the wood-grouse.\" Spake the ancient Wainamoinen: \"Surely thou art speaking falsehood; 'Tis no forest in the distance, Neither aspen, birch, nor alders, Laden with the grouse, or falcon; I am fearful that Pohyola Follows with her magic armies; Look again with keener vision.\" Then the daring Lemminkainen Looked the third time from the topmast, Spake and these the words be uttered: \"From the north a boat pursues us, Driven by a hundred rowers, Carrying a thousand heroes!\" Knew at last old Wainamoinen, Knew the truth of his inquiry, Thus addressed his fleeing people: \"Row, O blacksmith, Ilmarinen, Row, O mighty Lemminkainen, Row, all ye my noble oarsmen, That our boat may skim the waters, May escape from our pursuers!\" Rowed the blacksmith, Ilmarinen, Rowed the mighty Lemminkainen, With them rowed the other heroes; Heavily groaned the helm of birch-wood, Loudly rattled all the row-locks; All the vessel shook and trembled, Like a cataract it thundered As it plowed the waste of waters, Tossing sea-foam to the heavens.\n\nStrongly rowed Wainola's forces, Strongly were their arms united; But the distance did not widen Twixt the boat and their pursuers.\n\nQuick the hero, Wainamoinen, Saw misfortune hanging over, Saw destruction in the distance Heavy-hearted, long reflecting, Trouble-laden, spake as follows: \"Only is there one salvation, Know one miracle for safety!\" Then he grasped his box of tinder, From the box he took a flint-stone, Of the tinder took some fragments, Cast the fragments on the waters, Spake these words of master-magic."

