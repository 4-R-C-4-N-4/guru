[content]
body = "\"Sable-bearded god of forests, In thy hat and coat of ermine, Robe thy trees in finest fibers, Deck thy groves in richest fabrics, Give the fir-trees shining silver, Deck with gold the slender balsams, Give the spruces copper belting, And the pine-trees silver girdles, Give the birches golden flowers, Deck their stems with silver fret-work, This their garb in former ages, When the days and nights were brighter, When the fir-trees shone like sunlight, And the birches like the moonbeams; Honey breathed throughout the forest, Settled in the glens and highlands Spices in the meadow-borders, Oil out-pouring from the lowlands.\n\n\"Forest daughter, lovely virgin, Golden maiden, fair Tulikki, Second of the Tapio-daughters, Drive the game within these borders, To these far-extending snow-fields.\n\nShould the reindeer be too sluggish, Should the moose-deer move too slowly Cut a birch-rod from the thicket, Whip them hither in their beauty, Drive the wild-moose to my hurdle, Hither drive the long-sought booty To the hunter who is watching, Waiting in the Hisi-forests.\n\n\"When the game has started hither, Keep them in the proper highway, Hold thy magic hands before them, Guard them well on either road-side, That the elk may not escape thee, May not dart adown some by-path.\n\nShould, perchance, the moose-deer wander Through some by-way of the forest, Take him by the ears and antlers, Hither lead the pride of Lempo.\n\n\"If the path be filled with brush-wood Cast the brush-wood to the road-side; If the branches cross his pathway, Break the branches into fragments; Should a fence of fir or alder Cross the way that leads him hither.\n\nMake an opening within it, Open nine obstructing fences; If the way be crossed by streamlets, If the path be stopped by rivers, Make a bridge of silken fabric, Weaving webs of scarlet color, Drive the deer-herd gently over, Lead them gently o'er the waters, O'er the rivers of thy forests, O'er the streams of thy dominions.\n\n\"Thou, the host of Tapio's mansion, Gracious host of Tapiola, Sable-bearded god of woodlands, Golden lord of Northland forests, Thou, O Tapio's worthy hostess, Queen of snowy woods, Mimerkki, Ancient dame in sky-blue vesture, Fenland-queen in scarlet ribbons, Come I to exchange my silver, To exchange my gold and silver; Gold I have, as old as moonlight, Silver of the age of sunshine, In the first of years was gathered, In the heat and pain of battle; It will rust within my pouches, Soon will wear away and perish, If it be not used in trading.\" Long the hunter, Lemminkainen, Glided through the fen and forest, Sang his songs throughout the woodlands, Through three mountain glens be sang them, Sang the forest hostess friendly, Sang he, also, Tapio friendly, Friendly, all the forest virgins, All of Metsola's fair daughters.\n\nNow they start the herds of Lempo, Start the wild-moose from his shelter, In the realms of evil Hisi, Tapio's highest mountain-region; Now they drive the ranger homeward, To the open courts of Piru, To the hero that is waiting, Hunting for the moose of Juutas.\n\nWhen the herd had reached the castle, Lemminkainen threw his lasso O'er the antlers of the blue-moose, Settled on the neck and shoulders Of the mighty moose of Hisi."

