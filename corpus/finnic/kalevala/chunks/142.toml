[content]
body = "Then I sought for other measures, Used on her my last resources, Cut a birch-whip in the forest, And she spake in tones endearing; Cut a juniper or willow, And she called me 'hero-darling'; When with lash my wife I threatened, Hung she on my neck with kisses.\" Thus the bridegroom was instructed, Thus the last advices given.\n\nThen the Maiden of the Rainbow, Beauteous bride of Ilmarinen, Sighing heavily and moaning, Fell to weeping, heavy-hearted, Spake these words from depths of sorrow: \"Near, indeed, the separation, Near, alas!\n\nthe time for parting, Near the time for my departure; O the anguish of the parting, O the pain of separation, From these walls renowned and ancient, From this village of the Northland, From these scenes of peace and plenty, Where my faithful mother taught me, Where my father gave instruction To me in my happy childhood, When my years were few and tender!\n\nAs a child I did not fancy, Never thought of separation From the confines of this cottage, From these dear old hills and mountains, But, alas!\n\nI now must journey, Since I now cannot escape it; Empty is the bowl of parting, All the farewell-beer is taken, And my husband's sledge is waiting, With the break-board looking southward, Looking from my father's dwelling.\n\n\"How shall I give compensation, How repay, on my departure, All the kindness of my mother, All the counsel of my father, All the friendship of my brother, All my sister's warm affection?\n\nGratitude to thee, dear father, For my former-life and blessings, For the comforts of thy table, For the pleasures of my childhood!\n\nGratitude to thee, dear mother, For thy tender care and guidance, For my birth and for my culture, Nurtured by thy purest life-blood!\n\nGratitude to thee, dear brother, Gratitude to thee, sweet sister, To the servants of my childhood, To my many friends and playmates!\n\n\"Never, never, aged father, Never, thou, beloved mother, Never, ye, my kindred spirits, Never harbor care, nor sorrow, Never fall to bitter weeping, Since thy child has gone to others, To the distant home of strangers, To the meadows of Wainola, From her father's fields and firesides.\n\nShines the Sun of the Creator, Shines the golden Moon of Ukko, Glitter all the stars of heaven, In the firmament of ether, Full as bright on other homesteads; Not upon my father's uplands, Not upon my home in childhood, Shines the Star of Joyance only.\n\n\"Now the time has come for parting From my father's golden firesides, From my brother's welcome hearth-stone, From the chambers of my sister, From my mother's happy dwelling; Now I leave the swamps and lowlands, Leave the grassy vales and mountains, Leave the crystal lakes and rivers, Leave the shores and sandy shallows, Leave the white-capped surging billows, Where the maidens swim and linger, Where the mermaids sing and frolic; Leave the swamps to those that wander, Leave the corn-fields to the plowman, Leave the forests to the weary, Leave the heather to the rover, Leave the copses to the stranger, Leave the alleys to the beggar, Leave the court-yards to the rambler, Leave the portals to the servant, Leave the matting to the sweeper, Leave the highways to the roebuck, Leave the woodland-glens to lynxes, Leave the lowlands to the wild-geese, And the birch-tree to the cuckoo."

