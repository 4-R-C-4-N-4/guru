[content]
body = "Wainamoinen, brave and mighty, Seizes quick the water-monster, Lifts him by his ears and questions: \"Iku-Turso, son of Old-age, Why art rising from the blue-sea?\n\nWherefore dost thou leave thy castle, Show thyself to mighty heroes, To the heroes of Wainola?\" Iku-Turso, son of Old-age, Ocean monster, manifested Neither pleasure, nor displeasure, Was not in the least affrighted, Did not give the hero answer.\n\nWhereupon the ancient minstrel, Asked the second time the monster, Urgently inquired a third time: \"Iku-Turso, son of Old-age, Why art rising from the waters, Wherefore dost thou leave the blue-sea?\n\nIku-Turso gave this answer: For this cause I left my castle Underneath the rolling billows: Came I here with the intention To destroy the Kalew-heroes, And return the magic Sampo To the people of Pohyola.\n\nIf thou wilt restore my freedom, Spare my life, from pain and sorrow, I will quick retrace my journey, Nevermore to show my visage To the people of Wainola, Never while the moonlight glimmers On the hills of Kalevala!\" Then the singer, Wainamoinen, Freed the monster, Iku-Turso, Sent him to his deep sea-castles, Spake these words to him departing: \"Iku-Turso, son of Old-age, Nevermore arise from ocean, Nevermore let Northland-heroes See thy face above the waters I Nevermore has Iku-Turso Risen to the ocean-level; Never since have Northland sailors Seen the head of this sea-monster.\n\nWainamoinen, old and truthful, Onward rowed his goodly vessel, Journeyed but a little distance, Scarce a moment had passed over, When the King of all creators, Mighty Ukko of the heavens, Made the winds blow full of power, Made the storms arise in fury, Made them rage upon the waters.\n\nFrom the west the winds came roaring, From the north-east came in anger, Winds came howling from the south-west, Came the winds from all directions, In their fury, rolling, roaring, Tearing branches from the lindens, Hurling needles from the pine-trees, Blowing flowers from the heather, Grasses blowing from the meadow, Tearing up the very bottom Of the deep and boundless blue-sea.\n\nRoared the winds and lashed the waters Till the waves were white with fury; Tossed the war-ship high in ether, Tossed away the harp of fish-bone, Magic harp of Wainamoinen, To the joy of King Wellamo, To the pleasure of his people, To the happiness of Ahto, Ahto, rising from his caverns, On the floods beheld his people Carry off the harp of magic To their home below the billows.\n\nWainamoinen, ancient minstrel, Heavy-hearted, spake these measures: \"I have lost what I created, I have lost the harp of joyance; Now my strength has gone to others, All my pleasure too departed, All my hope and comfort vanished!\n\nNevermore the harp of fish-bone Will enchant the hosts of Suomi!\" Then the blacksmith, Ilmarinen, Sorrow-laden, spake as follows: \"Woe is me, my life hard-fated!\n\nWould that I had never journeyed On these waters filled with dangers, On the rolling waste before me, In this war-ship false and feeble."

