[content]
body = "'S VICTORY AND DEATH.\n\nKullerwionen, wicked wizard, In his purple-colored stockings, Now prepares himself for battle; Grinds a long time on his broadsword, Sharpens well his trusty weapon, And his mother speaks as follows: \"Do not go, my son beloved, Go not to the wars, my hero, Struggle not with hostile spearsmen.\n\nWhoso goes to war for nothing, Undertakes a fearful combat, Undertakes a fatal issue; Those that war without a reason Will be slaughtered for their folly, Easy prey to bows and arrows.\n\nGo thou with a goat to battle, Shouldst thou go to fight the roebuck, 'Tis the goat that will be vanquished, And the roebuck will be slaughtered; With a frog thou'lt journey homeward, Victor, with but little honor!\" These the words of Kullerwoinen: \"Shall not journey through the marshes, Shall not sink upon the heather, On the home-land of the raven, Where the eagles scream at day-break.\n\nWhen I yield my life forever, Bravely will I fall in battle, Fall upon the field of glory, Beautiful to die in armor, And the clang and clash of armies, Beautiful the strife for conquest!\n\nThus Kullervo soon will hasten To the kingdom of Tuoni, To the realm of the departed, Undeformed by wasting sickness.\" This the answer of the mother: \"If thou diest in the conflict, Who will stay to guard thy father, Who will give thy sire protection?\" These the words of Kullerwoinen: \"Let him die upon the court-yard, Sleeping out his life of sorrow!\" \"Who then will protect thy mother, Be her shield in times of danger?\" \"Let her die within the stable, Or the cabin where she lingers!\" \"Who then will defend thy brother, Give him aid in times of trouble?\" \"Let him die within the forest, Sleep his life away unheeded!\" \"Who will comfort then thy sister, Who will aid her in affliction?\" \"Let her sink beneath the waters, Perish in the crystal fountain, Where the brook flows on in beauty, Like a silver serpent winding Through the valley to the ocean!\" Thereupon the wild Kullervo Hastens from his home to battle, To his father speaks, departing: \"Fare thou well, my aged father!\n\nWilt thou weep for me, thy hero, When thou hearest I have perished, Fallen from thy tribe forever, Perished on the field of glory?\" Thus the father speaks in answer: \"I shall never mourn the downfall Of my evil son, Kullervo; Shall not weep when thou hast perished; Shall beget a second hero That will do me better service, That will think and act in wisdom.\" Kullerwoinen gives this answer: \"Neither shall I mourn thy downfall, Shall not weep when thou hast perished; I shall make a second father, Make the head from loam and sandstone, Make the eyes from swamp-land berries, Make the beard from withered sea-grass, Make the feet from roots of willow, Make the form from birch-wood fungus.\" Thereupon the youth, Kullervo, To his brother speaks as follows: \"Fare thou well, beloved brother!"

