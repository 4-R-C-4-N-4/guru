[content]
body = "Then the mother, well reflecting, Spake these words in bitter weeping: \"From these fragments, with my magic, I will bring to life my hero.\" Hearing this, the raven answered, Spake these measures to the mother: \"There is not in these a hero, Thou canst not revive these fragments; Eels have fed upon his body, On his eyes have fed the whiting; Cast the dead upon the waters, On the streams of Tuonela, Let him there become a walrus, Or a seal, or whale, or porpoise.\" Lemminkainen's mother does not Cast the dead upon the waters, On the streams of Tuonela, She again with hope and courage, Rakes the river lengthwise, crosswise, Through the Manala pools and caverns, Rakes up half the head, a fore-arm, Finds a hand and half the back-bone, Many other smaller portions; Shapes her son from all the fragments, Shapes anew her Lemminkainen, Flesh to flesh with skill she places, Gives the bones their proper stations, Binds one member to the other, Joins the ends of severed vessels, Counts the threads of all the venules, Knits the parts in apposition; Then this prayer the mother offers: \"Suonetar, thou slender virgin, Goddess of the veins of heroes, Skilful spinner of the vessels, With thy slender, silver spindle, With thy spinning-wheel of copper, Set in frame of molten silver, Come thou hither, thou art needed; Bring the instruments for mending, Firmly knit the veins together, At the end join well the venules, In the wounds that still are open, In the members that are injured.\n\n\"Should this aid be inefficient; There is living in the ether, In a boat enriched with silver, In a copper boat, a maiden, That can bring to thee assistance.\n\nCome, O maiden, from the ether, Virgin from the belt of heaven, Row throughout these veins, O maiden, Row through all these lifeless members, Through the channels of the long-bones, Row through every form of tissue.\n\nSet the vessels in their places, Lay the heart in right position, Make the pulses beat together, Join the smallest of the veinlets, And unite with skill the sinews.\n\nTake thou now a slender needle, Silken thread within its eyelet, Ply the silver needle gently, Sew with care the wounds together.\n\n\"Should this aid be inefficient, Thou, O God, that knowest all things, Come and give us thine assistance, Harness thou thy fleetest racer Call to aid thy strongest courser, In thy scarlet sledge come swiftly, Drive through all the bones and channels, Drive throughout these lifeless tissues, Drive thy courser through each vessel, Bind the flesh and bones securely, In the joints put finest silver, Purest gold in all the fissures.\n\n\"Where the skin is broken open, Where the veins are torn asunder, Mend these injuries with magic; Where the blood has left the body, There make new blood flow abundant; Where the bones are rudely broken, Set the parts in full perfection; Where the flesh is bruised and loosened, Touch the wounds with magic balsam, Do not leave a part imperfect; Bone, and vein, and nerve, and sinew, Heart, and brain, and gland, and vessel, Heal as Thou alone canst heal them.\" These the means the mother uses, Thus she joins the lifeless members, Thus she heals the death-like tissues, Thus restores her son and hero To his former life and likeness; All his veins are knit together, All their ends are firmly fastened, All the parts in apposition, Life returns, but speech is wanting, Deaf and dumb, and blind, and senseless."

