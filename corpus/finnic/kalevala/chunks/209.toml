[content]
body = "'S BRIDE OF GOLD.\n\nIlmarinen, metal-worker, Wept one day, and then a second, Wept the third from morn till evening, O'er the death of his companion, Once the Maiden of the Rainbow; Did not swing his heavy hammer, Did not touch its copper handle, Made no sound within his smithy, Made no blow upon his anvil, Till three months had circled over; Then the blacksmith spake as follows: \"Woe is me, unhappy hero!\n\nDo not know how I can prosper; Long the days, and cold, and dreary, Longer still the nights, and colder; I am weary in the evening, In the morning still am weary, Have no longing for the morning, And the evening is unwelcome; Have no pleasure in the future, All my pleasures gone forever, With my faithful life-companion Slaughtered by the hand of witchcraft!\n\nOften will my heart-strings quiver When I rest within my chamber, When I wake at dreamy midnight, Half-unconscious, vainly searching For my noble wife departed.\" Wifeless lived the mourning blacksmith, Altered in his form and features; Wept one month and then another, Wept three months in full succession.\n\nThen the magic metal-worker Gathered gold from deeps of ocean, Gathered silver from the mountains, Gathered many heaps of birch-wood.\n\nFilled with faggots thirty sledges, Burned the birch-wood into ashes, Put the ashes in the furnace, Laid the gold upon the embers, Lengthwise laid a piece of silver Of the size of lambs in autumn, Or the fleet-foot hare in winter; Places servants at the bellows, Thus to melt the magic metals.\n\nEagerly the servants labor, Gloveless, hatless, do the workmen Fan the flames within the furnace.\n\nIlmarinen, magic blacksmith, Works unceasing at his forging, Thus to mould a golden image, Mould a bride from gold and silver; But the workmen fail their master, Faithless stand they at the bellows.\n\nWow the artist, Ilmarinen, Fans the flame with force of magic, Blows one day, and then a second, Blows the third from morn till even; Then he looks within the furnace, Looks around the oven-border, Hoping there to see an image Rising from the molten metals.\n\nComes a lambkin from the furnace, Rising from the fire of magic, Wearing hair of gold and copper, Laced with many threads of silver; All rejoice but Ilmarinen At the beauty of the image.\n\nThis the language of the blacksmith: \"May the wolf admire thy graces; I desire a bride of beauty Born from molten gold and silver!\" Ilmarinen, the magician, To the furnace threw the lambkin; Added gold in great abundance, And increased the mass of silver, Added other magic metals, Set the workmen at the bellows; Zealously the servants labor, Gloveless, hatless, do the workmen Fan the flames within the furnace.\n\nIlmarinen, wizard-forgeman, Works unceasing with his metals, Moulding well a golden image, Wife of molten gold and silver; But the workmen fail their master, Faithless do they ply the bellows.\n\nNow the artist, Ilmarinen, Fans the flames by force of magic; Blows one day, and then a second, Blows a third from morn till evening, When he looks within the furnace, Looks around the oven-border, Hoping there, to see an image Rising from the molten metals.\n\nFrom the flames a colt arises, Golden-maned and silver-headed, Hoofs are formed of shining copper."

