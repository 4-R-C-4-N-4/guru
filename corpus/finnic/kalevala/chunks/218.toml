[content]
body = "a worthy vessel, Many months have lain at anchor, I, a war-ship well constructed, Am decaying in the harbor, Never having sailed to conquest; Worms are gnawing at my vitals, In my hull their dwelling-places, And ill-omened birds of heaven Build their nests within my rigging; Frogs and lizards of the forest Play about my oars and rudder; Three times better for this vessel Were he but a valley birch-tree, Or an aspen on the heather, With the squirrels in his branches, And the dogs beneath them barking!\" Wainamoinen, old and faithfull Thus addressed the ship at anchor: \"Weep no more, thou goodly vessel, Man-of-war, no longer murmur; Thou shalt sail to Sariola, Sing the war-songs of the Northland, Sail with us to deadly combat.\n\nWert thou built by the Creator, Thou canst sail the roughest waters, Sidewise journey o'er the ocean; Dost not need the hand to touch thee, Dost not need the foot to turn thee, Needing nothing to propel thee.\" Thus the weeping boat made answer: \"Cannot sail without assistance, Neither can my brother-vessels Sail unaided o'er the waters, Sail across the waves undriven.\" Spake the ancient Wainamoinen: \"Should I lead thee to the broad-sea, Wilt thou journey north unaided, Sail without the help of rowers, Sail without the aid of south-winds, Sail without the b elm to guide thee?\n\nThus the wailing ship replying: Cannot sail without assistance, Neither can my brother-vessels Sail without the aid of rowers, Sail without the help of south-winds, Nor without the helm to guide them.\" These the words of Wainamoinen: \"Wilt thou run with aid of oarsmen When the south-winds give assistance, Guided by a skillful pilot?\" This the answer of the war-ship: \"Quickly can I course these waters, When my oars are manned by rowers, When my sails are filled with south-winds, All my goodly brother-vessels Sail the ocean with assistance, When the master holds the rudder.\" Then the ancient Wainamoinen Left the racer on the sea-side, Tied him to the sacred birch-tree, Hung the harness on a willow, Rolled the vessel to the waters, Sang the ship upon the broad-sea, Asked the boat this simple question: \"O thou vessel, well-appearing From the mighty oak constructed, Art thou strong to carry treasures As in view thou art commanding?\n\nThus the goodly ship made answer: \"Strong am I to carry treasures, In my hull a golden cargo; I can bear a hundred oarsmen, And of warriors a thousand.\" Wainamoinen, the magician, Then began his wondrous singing.\n\nOn one side the magic vessel, Sang he youth with golden virtues, Bearded youth with strength of heroes, Sang them into mail of copper.\n\nOn the other side the vessel, Sang he silver-tinselled maidens, Girded them with belts of copper, Golden rings upon their fingers.\n\nSings again the great magician, Fills the magic ship with heroes, Ancient heroes, brave and mighty; Sings them into narrow limits, Since the young men came before them."

