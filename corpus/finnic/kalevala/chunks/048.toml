[content]
body = "From her dressing-room she hastens, To the hall she bastes and listens, Full of beauty, full of joyance, Ears erect and eyes bright-beaming, Ruddy cheeks and charming visage, Waiting for the hero-stranger.\n\nLouhi, hostess of Pohyola, Leads the hero, Ilmarinen, To her dwelling-rooms in Northland, To her home in Sariola, Seats him at her well-filled table, Gives to him the finest viands, Gives him every needed comfort, Then addresses him as follows: \"O thou blacksmith, Ilmarinen, Master of the forge and smithy, Canst thou forge for me the Sampo, Hammer me the lid in colors, From the tips of white-swan feathers, From the milk of greatest virtue, From a single grain of barley, From the finest wool of lambkins?\n\nThou shalt have my fairest daughter, Recompense for this thy service.\" These the words of Ilmarinen: \"I will forge for thee the Sampo, Hammer thee the lid in colors, From the tips of white-swan feathers, From the milk of greatest virtue, From a single grain of barley, From the finest wool of lambkins?\n\nSince I forged the arch of heaven, Forged the air a concave cover, Ere the earth had a beginning.\" Thereupon the magic blacksmith Went to forge the wondrous Sampo, Went to find a blacksmith's workshop, Went to find the tools to work with; But he found no place for forging, Found no smithy, found no bellows, Found no chimney, found no anvil, Found no tongs, and found no hammer.\n\nThen the-artist, Ilmarinen.\n\nSpake these words, soliloquizing: \"Only women grow discouraged, Only knaves leave work unfinished, Not the devils, nor the heroes, Nor the Gods of greater knowledge.\" Then the blacksmith, Ilmarinen, Sought a place to build a smithy, Sought a place to plant a bellows, On the borders of the Northland, On the Pohya-hills and meadows; Searched one day, and then a second; Ere the evening of the third day, Came a rock within his vision, Came a stone with rainbow-colors.\n\nThere the blacksmith, Ilmarinen, Set at work to build his smithy, Built a fire and raised a chimney; On the next day laid his bellows, On the third day built his furnace, And began to forge the Sampo.\n\nThe eternal magic artist, Ancient blacksmith, Ilmarinen, First of all the iron-workers, Mixed together certain metals, Put the mixture in the caldron, Laid it deep within the furnace, Called the hirelings to the forging.\n\nSkilfully they work the bellows, Tend the fire and add the fuel, Three most lovely days of summer, Three short nights of bright midsummer, Till the rocks begin to blossom, In the foot-prints of the workmen, From the magic heat and furnace.\n\nOn the first day, Ilmarinen Downward bent and well examined, On the bottom of his furnace, Thus to see what might be forming From the magic fire and metals.\n\nFrom the fire arose a cross-bow, \"With the brightness of the moonbeams, Golden bow with tips of silver; On the shaft was shining copper, And the bow was strong and wondrous, But alas!\n\nit was ill-natured, Asking for a hero daily, Two the heads it asked on feast-days.\n\nIlmarinen, skilful artist, Was not pleased with this creation, Broke the bow in many pieces, Threw them back within the furnace, Kept the workmen at the bellows, Tried to forge the magic Sampo."

