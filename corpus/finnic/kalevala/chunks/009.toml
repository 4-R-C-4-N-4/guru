[content]
body = "AND YOUKAHAINEN.\n\nWainamoinen, ancient minstrel, Passed his years in full contentment, On the meadows of Wainola, On the plains of Kalevala, Singing ever wondrous legends, Songs of ancient wit and wisdom, Chanting one day, then a second, Singing in the dusk of evening, Singing till the dawn of morning, Now the tales of old-time heroes, Tales of ages long forgotten, Now the legends of creation, Once familiar to the children, By our children sung no longer, Sung in part by many heroes, In these mournful days of evil, Evil days our race befallen.\n\nFar and wide the story travelled, Far away men spread the knowledge Of the chanting of the hero, Of the song of Wainamoinen; To the South were heard the echoes, All of Northland heard the story.\n\nFar away in dismal Northland, Lived the singer, Youkahainen, Lapland's young and reckless minstrel, Once upon a time when feasting, Dining with his friends and fellows, Came upon his ears the story That there lived a sweeter singer, On the meadows of Wainola, On the plains of Kalevala, Better skilled in chanting legends, Better skilled than Youkahainen, Better than the one that taught him.\n\nStraightway then the bard grew angry, Envy rose within his bosom, Envy of this Wainamoinen, Famed to be a sweeter singer; Hastes he angry to his mother, To his mother, full of wisdom, Vows that he will southward hasten, Hie him southward and betake him To the dwellings of Wainola, To the cabins of the Northland, There as bard to vie in battle, With the famous Wainamoinen.\n\n\"Nay,\" replies the anxious father, \"Do not go to Kalevala.\" \"Nay,\" replies the fearful mother, \"Go not hence to Wainamoinen, There with him to offer battle; He will charm thee with his singing Will bewitch thee in his anger, He will drive thee back dishonored, Sink thee in the fatal snow-drift, Turn to ice thy pliant fingers, Turn to ice thy feet and ankles.\" These the words of Youkahainen: Good the judgement of a father, Better still, a mother's counsel, Best of all one's own decision.\n\nI will go and face the minstrel, Challenge him to sing in contest, Challenge him as bard to battle, Sing to him my sweet-toned measures, Chant to him my oldest legends, Chant to him my garnered wisdom, That this best of boasted singers, That this famous bard of Suomi, Shall be worsted in the contest, Shall become a hapless minstrel; By my songs shall I transform him, That his feet shall be as flint-stone, And as oak his nether raiment; And this famous, best of singers, Thus bewitched, shall carry ever, In his heart a stony burden, On his shoulder bow of marble, On his hand a flint-stone gauntlet, On his brow a stony visor.\" Then the wizard, Youkahainen, Heeding not advice paternal, Heeding not his mother's counsel, Leads his courser from his stable, Fire outstreaming from his nostrils, From his hoofs, the sparks outshooting, Hitches to his sledge, the fleet-foot, To his golden sledge, the courser, Mounts impetuous his snow-sledge, Leaps upon the hindmost cross-bench, Strikes his courser with his birch-whip, With his birch-whip, pearl-enamelled."

