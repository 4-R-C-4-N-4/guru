[content]
body = "Lemminkainen's anxious mother Takes the magic rake and hastens To the river of Tuoni, Praying to the Sun as follows: \"Thou, O Sun, by God created, Thou that shinest on thy Maker, Shine for me in heat of magic, Give me warmth, and strength, and courage, Shine a third time full of power, Lull to sleep the wicked people, Still the people of Manala, Quiet all Tuoni's empire.\" Thereupon the sun of Ukko, Dearest child of the Creator, Flying through the groves of Northland, Sitting on a curving birch-tree, Shines a little while in ardor, Shines again in greater fervor, Shines a third time full of power, Lulls to sleep the wicked people In the Manala home and kingdom, Still the heroes with their broadswords, Makes the lancers halt and totter, Stills the stoutest of the spearmen, Quiets Tuoni's ghastly empire.\n\nNow the Sun retires in magic, Hovers here and there a moment Over Tuoni's hapless sleepers, Hastens upward to his station, To his Jumala home and kingdom.\n\nLemminkainen's faithful mother Takes the rake of magic metals, Rakes the Tuoni river bottoms, Rakes the cataract and whirlpool, Rakes the swift and boiling current Of the sacred stream of death-land, In the Manala home and kingdom.\n\nSearching for her long-lost hero, Rakes a long time, finding nothing; Now she wades the river deeper, To her belt in mud and water, Deeper, deeper, rakes the death-stream, Rakes the river's deepest caverns, Raking up and down the current, Till at last she finds his tunic, Heavy-hearted, finds his jacket; Rakes again and rakes unceasing, Finds the hero's shoes and stockings, Sorely troubled, finds these relies; Now she wades the river deeper, Rakes the Manala shoals and shallows, Rakes the deeps at every angle; As she draws the rake the third time From the Tuoni shores and waters, In the rake she finds the body Of her long-lost Lemminkainen, In the metal teeth entangled, In the rake with copper handle.\n\nThus the reckless Lemminkainen, Thus the son of Kalevala, Was recovered from the bottom Of the Manala lake and river.\n\nThere were wanting many fragments, Half the head, a hand, a fore-arm, Many other smaller portions, Life, above all else, was missing."

