[content]
body = "Careless thus be hastens homeward, Nears his home with noise and bustle, Reckless drives against the pent-house, Breaks the shafts against the portals, Breaks his handsome sledge in pieces.\n\nThen his mother, quickly guessing, Would have chided him for rashness, But the father interrupted: \"Wherefore dost thou break thy snow-sledge, Wherefore dash thy thills in fragments, Wherefore comest home so strangely, Why this rude and wild behavior?\" Now alas!\n\npoor Youkahainen, Cap awry upon his forehead, Falls to weeping, broken-hearted, Head depressed and mind dejected, Eyes and lips expressing sadness, Answers not his anxious father.\n\nThen the mother quickly asked him, Sought to find his cause for sorrow: \"Tell me, first-born, why thou weepest, Why thou weepest, heavy-hearted, Why thy mind is so dejected, Why thine eyes express such sadness.\" Youkahainen then made answer: \"Golden mother, ever faithful, Cause there is to me sufficient, Cause enough in what has happened, Bitter cause for this my sorrow, Cause for bitter tears and murmurs: All my days will pass unhappy, Since, O mother of my being, I have promised beauteous Aino, Aino, thy beloved daughter, Aino, my devoted sister, To decrepit Wainamoinen, Bride to be to him forever, Roof above him, prop beneath him, Fair companion at his fire-side.\" Joyful then arose the mother, Clapped her hands in glee together, Thus addressing Youkahainen: \"Weep no more, my son beloved, Thou hast naught to cause thy weeping, Hast no reason for thy sorrow, Often I this hope have cherished; Many years have I been praying That this mighty bard and hero, Wise and valiant Wainamoinen, Spouse should be to beauteous Aino, Son-in-law to me, her mother.\" But the fair and lovely maiden, Sister dear of Youkahainen, Straightway fell to bitter weeping, On the threshold wept and lingered, Wept all day and all the night long, Wept a second, then a third day, Wept because a bitter sorrow On her youthful heart had fallen.\n\nThen the gray-haired mother asked her: \"Why this weeping, lovely Aino?\n\nThou hast found a noble suitor, Thou wilt rule his spacious dwelling, At his window sit and rest thee, Rinse betimes his golden platters, Walk a queen within his dwelling.\" Thus replied the tearful Aino: \"Mother dear, and all-forgiving, Cause enough for this my sorrow, Cause enough for bitter weeping: I must loose my sunny tresses, Tresses beautiful and golden, Cannot deck my hair with jewels, Cannot bind my head with ribbons, All to be hereafter hidden Underneath the linen bonnet That the wife.\n\nmust wear forever; Weep at morning, weep at evening, Weep alas!"

