[content]
body = "Straightway as the fish he touches, Touches with his knife of silver, Quick it leaps upon the waters, Dives beneath the sea's smooth surface, From the boat with copper bottom, From the skiff of Wainamoinen.\n\nIn the waves at goodly distance, Quickly from the sea it rises On the sixth and seventh billows, Lifts its head above the waters, Out of reach of fishing-tackle, Then addresses Wainamoinen, Chiding thus the ancient hero: \"Wainamoinen, ancient minstrel, Do not think that I came hither To be fished for as a salmon, Only to be chopped in pieces, Dressed and eaten like a whiting Make for thee a dainty breakfast, Make for thee a meal at midday, Make for thee a toothsome supper, Make the fourth meal of the Northland.\" Spake the ancient Wainamoinen: \"Wherefore didst thou then come hither, If it be not for my dinner?\" Thus the nameless fish made answer: \"Hither have I come, O minstrel, In thine arms to rest and linger, And thyself to love and cherish, At thy side a life-companion, And thy wife to be forever; Deck thy couch with snowy linen, Smooth thy head upon the pillow, Sweep thy rooms and make them cheery, Keep thy dwelling-place in order, Build a fire for thee when needed, Bake for thee the honey-biscuit, Fill thy cup with barley-water, Do for thee whatever pleases.\n\n\"I am not a scaly sea-fish, Not a trout of Northland rivers, Not a whiting from the waters, Not a salmon of the North-seas, I, a young and merry maiden, Friend and sister of the fishes, Youkahainen's youngest sister, I, the one that thou dost fish for, I am Aino whom thou lovest.\n\n\"Once thou wert the wise-tongued hero, Now the foolish Wainamoinen, Scant of insight, scant of judgment, Didst not know enough to keep me, Cruel-hearted, bloody-handed, Tried to kill me with thy fish-knife, So to roast me for thy dinner; I, a mermaid of Wellamo, Once the fair and lovely Aino, Sister dear of Youkahainen.\" Spake the ancient Wainamoinen, Filled with sorrow, much regretting: \"Since thou'rt Youkahainen's sister, Beauteous Aino of Pohyola, Come to me again I pray thee!\" Thus the mermaid wisely answered; Nevermore will Aino's spirit Fly to thee and be ill-treated.\" Quickly dived the water-maiden From the surface of the billow To the many-colored pebbles, To the rainbow-tinted grottoes Where the mermaids live and linger.\n\nWainamoinen, not discouraged, Thought afresh and well reflected, How to live, and work, and win her; Drew with care his silken fish-net, To and fro through foam and billow, Through the bays and winding channels, Drew it through the placid waters, Drew it through the salmon-dwellings, Through the homes of water-maidens, Through the waters of Wainola, Through the blue-back of the ocean, Through the lakes of distant Lapland, Through the rivers of Youkola, Through the seas of Kalevala, Hoping thus to find his Aino.\n\nMany were the fish be landed, Every form of fish-like creatures, But be did not catch the sea-maid, Not Wellamo's water-maiden, Fairest daughter of the Northland."

