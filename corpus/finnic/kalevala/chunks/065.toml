[content]
body = "In this rising generation, That can travel in these snow-shoes, That the right and left can manage.\" To his back he tied the quiver, Placed the bow upon his shoulder, With both hands he grasped his snow-cane, Speaking meanwhile words as follow: \"There is nothing in the woodlands, Nothing in the world of Ukko, Nothing underneath the heavens, In the uplands, in the lowlands, Nothing in the snow-fields running, Not a fleet deer of the forest, That could not be overtaken With the snow-shoes of Lylikki, With the strides of Lemminkainen.\" Wicked Hisi heard these measures, Juntas listened to their echoes; Straightway Hisi called the wild-moose, Juutas fashioned soon a reindeer, And the head was made of punk-wood, Horns of naked willow branches, Feet were furnished by the rushes, And the legs, by reeds aquatic, Veins were made of withered grasses, Eyes, from daisies of the meadows, Ears were formed of water-flowers, And the skin of tawny fir-bark, Out of sappy wood, the muscles, Fair and fleet, the magic reindeer.\n\nJuutas thus instructs the wild-moose, These the words of wicked Hisi: Flee away, thou moose of Juutas, Flee away, thou Hisi-reindeer, Like the winds, thou rapid courser, To the snow-homes of the ranger, To the ridges of the mountains, To the snow-capped hills of Lapland, That thy hunter may be worn out, Thy pursuer be tormented, Lemminkainen be exhausted.\" Thereupon the Hisi-reindeer, Juutas-moose with branching antlers, Fleetly ran through fen and forest, Over Lapland's hills and valleys, Through the open fields and court-yards, Through the penthouse doors and gate-ways, Turning over tubs of water, Threw the kettles from the fire-pole, And upset the dishes cooking.\n\nThen arose a fearful uproar, In the court-yards of Pohyola, Lapland-dogs began their barking, Lapland-children cried in terror, Lapland-women roared with laughter, And the Lapland-heroes shouted.\n\nFleetly followed Lemminkainen, Followed fast, and followed faster, Hastened on behind the wild-moose, Over swamps and through the woodlands, Over snow-fields vast and pathless, Over high uprising mountains, Fire out-shooting from his runners, Smoke arising from his snow-cane: Could not hear the wild-moose bounding, Could not sight the flying fleet-foot; Glided on through field and forest, Glided over lakes and rivers, Over lands beyond the smooth-sea, Through the desert plains of Hisi, Glided o'er the plains of Kalma, Through the kingdom of Tuoni, To the end of Kalma's empire, Where the jaws of Death stand open, Where the head of Kalma lowers, Ready to devour the stranger, To devour wild Lemminkainen; But Tuoni cannot reach him, Kalma cannot overtake him.\n\nDistant woods are yet untraveled, Far away a woodland corner Stands unsearched by Kaukomieli, In the North's extensive, borders, In the realm of dreary Lapland.\n\nNow the hero, on his snow-shoes, Hastens to the distant woodlands, There to hunt the moose of Piru."

