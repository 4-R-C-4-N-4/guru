[content]
body = "\"Thence arose the violation, Thence arose the first destruction, Thence came all the evil-doings: From the neighborhood of wizards, From the homes of the magicians, From the eaves of vicious spirits, From the haunts of fortune-tellers, From the cabins of the witches, From the castles of Tuoni, From the bottom of Manala, From the ground with envy swollen, From Ingratitude's dominions, From the rocky shoals and quicksands, From the marshes filled with danger, From the cataract's commotion, From the bear-caves in the mountains, From the wolves within the thickets, From the roarings of the pine-tree, From the burrows of the fox-dog, From the woodlands of the reindeer, From the eaves and Hisi-hurdles, From the battles of the giants, From uncultivated pastures, From the billows of the oceans, From the streams of boiling waters, From the waterfalls of Rutya, From the limits of the storm-clouds, From the pathways of the thunders, From the flashings of the lightnings, From the distant plains of Pohya, From the fatal stream and whirlpool, From the birthplace of Tuoni.\n\n\"Art thou coming from these places?\n\nHast thou, evil, hastened hither, To the heart of sinless hero, To devour my guiltless body, To destroy this wisdom-singer?\n\nGet thee hence, thou dog of Lempo, Leave, thou monster from Manala, Flee from mine immortal body, Leave my liver, thing of evil, In my body cease thy forging, Cease this torture of my vitals, Let me rest in peace and slumber.\n\n\"Should I want in means efficient, Should I lack the magic power To outroot thine evil genius, I shall call a better hero, Call upon a higher power, To remove this dire misfortune, To annihilate this monster.\n\nI shall call the will of woman, From the fields, the old-time heroes?\n\nMounted heroes from the sand-hills, Thus to rescue me from danger, From these pains and ceaseless tortures.\n\n\"If this force prove inefficient, Should not drive thee from my body, Come, thou forest, with thy heroes, Come, ye junipers and pine-trees, With your messengers of power, Come, ye mountains, with your wood-nymphs, Come, ye lakes, with all your mermaids, Come, ye hundred ocean-spearmen, Come, torment this son of Hisi, Come and kill this evil monster.\n\n\"If this call is inefficient, Does not drive thee from my vitals, Rise, thou ancient water-mother, With thy blue-cap from the ocean, From the seas, the lakes, the rivers, Bring protection to thy hero, Comfort bring and full assistance, That I guiltless may not suffer, May not perish prematurely.\n\n\"Shouldst thou brave this invocation, Kapè, daughter of Creation, Come, thou beauteous, golden maiden, Oldest of the race of women, Come and witness my misfortunes, Come and turn away this evil, Come, remove this biting torment, Take away this plague of Piru.\n\n\"If this call be disregarded, If thou wilt not leave me guiltless, Ukko, on the arch of heaven, In the thunder-cloud dominions, Come thou quickly, thou art needed, Come, protect thy tortured hero, Drive away this magic demon, Banish ever his enchantment, With his sword and flaming furnace, With his fire-enkindling bellows."

