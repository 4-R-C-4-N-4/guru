[content]
body = "Ingerland shall never see me, Will not row upon her rivers, Will not step within her borders; Hunger there, and fell starvation, Wood is absent, fuel wanting, Neither water, wheat, nor barley, Even rye is not abundant.\" Lemminkainen of the islands, Warlike hero, Kaukomieli, Undertakes to win the maiden, Woo and win the Sahri-flower, Win a bride so highly honored, Win the maid with golden tresses, Win the Sahri maid of beauty; But his mother gives him warning: \"Nay,\" replies his gray-haired mother, \"Do not woo, my son beloved, Maiden of a higher station; She will never make thee happy With her lineage of Sahri.\" Spake the hero, Lemminkainen, These the words of Kaukomieli: \"Should I come from lowly station, Though my tribe is not the highest, I shall woo to please my fancy, Woo the maiden fair and lovely, Choose a wife for worth and beauty.\" This the anxious mother's answer: \"Lemminkainen, son beloved, Listen to advice maternal: Do not go to distant Sahri, To her tribe of many branches; All the maidens there will taunt thee, All the women will deride thee.\" Lemminkainen, little hearing, Answers thus his mother's pleading: \"I will still the sneers of women, Silence all the taunts of maidens, I will crush their haughty bosoms, Smite the hands and cheeks of infants; Surely this will check their insults, Fitting ending to derision!\" This the answer of' the mother: \"Woe is me, my son beloved!\n\nWoe is me, my life hard-fated!\n\nShouldst thou taunt the Sahri daughters.\n\nOr insult the maids of virtue, Shouldst thou laugh them to derision, There will rise a great contention, Fierce the battle that will follow.\n\nAll the hosts of Sahri-suitors, Armed in thousands will attack thee, And will slay thee for thy folly.\" Nothing listing, Lemminkainen, Heeding not his mother's warning, Led his war-horse from the stables, Quickly hitched the fiery charger, Fleetly drove upon his journey, To the distant Sahri-village, There to woo the Sahri-flower, There to win the Bride of Beauty.\n\nAll the aged Sahri-women, All the young and lovely maidens Laughed to scorn the coming stranger Driving careless through the alleys, Wildly driving through the court-yard, Now upsetting in the gate-way, Breaking shaft, and hame, and runner.\n\nThen the fearless Lemminkainen, Mouth awry and visage wrinkled, Shook his sable locks and answered: \"Never in my recollection Have I heard or seen such treatment, Never have I been derided, Never suffered sneers of women, Never suffered scorn of virgins, Not in my immortal life-time.\n\nIs there any place befitting On the Sahri-plains and pastures, Where to join in songs and dances?"

