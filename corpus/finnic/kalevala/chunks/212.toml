[content]
body = "'S FRUITLESS WOOING.\n\nIlmarinen, the magician, The eternal metal-artist, Lays aside the golden image, Beauteous maid of magic metals; Throws the harness on his courser, Binds him to his sledge of birch-wood, Seats himself upon the cross-bench, Snaps the whip above the racer, Thinking once again to journey To the mansions of Pohyola, There to woo a bride in honor, Second daughter of the Northland.\n\nOn he journeyed, restless, northward, Journeyed one day, then a second, So the third from morn till evening, When he reached a Northland-village On the plains of Sariola.\n\nLouhi, hostess of Pohyola, Standing in the open court-yard, Spied the hero, Ilmarinen, Thus addressed the metal-worker: \"Tell me how my child is living, How the Bride of Beauty prospers, As a daughter to thy mother.\" Then the blacksmith, Ilmarinen, Head bent down and brow dejected, Thus addressed the Northland hostess: \"O, thou dame of Sariola, Do not ask me of thy daughter, Since, alas I in Tuonela Sleeps the Maiden of the Rainbow, Sleeps in death the Bride, of Beauty, Underneath the fragrant heather, In the kingdom of Manala.\n\nCome I for a second daughter, For the fairest of thy virgins.\n\nBeauteous hostess of Pohyola, Give to me thy youngest maiden, For my former wife's compartments, For the chambers of her sister.\" Louhi, hostess of the Northland, Spake these words to Ilmarinen: \"Foolish was the Northland-hostess, When she gave her fairest virgin, In the bloom of youth and beauty To the blacksmith of Wainola, Only to be led to Mana, Like a lambkin to the slaughter!\n\nI shall never give my daughter, Shall not give my youngest maiden Bride of thine to be hereafter, Life-companion at thy fireside.\n\nSooner would I give the fair one To the cataract and whirlpool, To the river of Manala, To the waters of Tuoni!\" Then the blacksmith, Ilmarinen, Drew away his head, disdainful, Shook his sable locks in anger, Entered to the inner court-room, Where the maiden sat in waiting, Spake these measures to the daughter: \"Come with me, thou bright-eyed maiden, To the cottage where thy sister Lived and lingered in contentment, Baked for me the toothsome biscuit, Brewed for me the beer of barley, Kept my dwelling-place in order.\" On the floor a babe was lying, Thus he sang to Ilmarinen: \"Uninvited, leave this mansion, Go, thou stranger, from this dwelling; Once before thou camest hither, Only bringing pain and trouble, Filling all our hearts with sorrow.\n\nFairest daughter of my mother, Do not give this suitor welcome, Look not on his eyes with pleasure, Nor admire his form and features.\n\nIn his mouth are only wolf-teeth, Cunning fox-claws in his mittens, In his shoes art only bear-claws, In his belt a hungry dagger; Weapons these of blood and murder, Only worn by the unworthy.\" Then the daughter spake as follows To the blacksmith, Ilmarinen: \"Follow thee this maid will never, Never heed unworthy suitors; Thou hast slain the Bride of Beauty, Once the Maiden of the Rainbow, Thou wouldst also slay her sister."

