[content]
body = "In thy years, for greater follies, Greater sins and misdemeanors, Thou wert not unjustly punished.\n\nIn thy former years of trouble, When thou gavest thine own brother, For thy selfish life a ransom, Thus to save thee from destruction, Then thou wert not sent to Swamp-land To be murdered for thy follies.\n\nIn thy former years of sorrow, When the beauteous Aino perished In the deep and boundless blue-sea, To escape thy persecutions, Then thou wert not evil-treated, Wert not banished by thy people.\" Thereupon old Wirokannas, Of the wilderness the ruler, Touched the child with holy water, Crave the wonder-babe his blessing, Gave him rights of royal heirship, Free to live and grow a hero, To become a mighty ruler, King and Master of Karyala.\n\nAs the years passed Wainamoinen Recognized his waning powers, Empty-handed, heavy-hearted, Sang his farewell song to Northland, To the people of Wainola; Sang himself a boat of copper, Beautiful his bark of magic; At the helm sat the magician, Sat the ancient wisdom-singer.\n\nWestward, westward, sailed the hero O'er the blue-back of the waters, Singing as he left Wainola, This his plaintive song and echo: \"Suns may rise and set in Suomi, Rise and set for generations, When the North will learn my teachings, Will recall my wisdom-sayings, Hungry for the true religion.\n\nThen will Suomi need my coming, Watch for me at dawn of morning, That I may bring back the Sampo, Bring anew the harp of joyance, Bring again the golden moonlight, Bring again the silver sunshine, Peace and plenty to the Northland.\" Thus the ancient Wainamoinen, In his copper-banded vessel, Left his tribe in Kalevala, Sailing o'er the rolling billows, Sailing through the azure vapors, Sailing through the dusk of evening, Sailing to the fiery sunset, To the higher-landed regions, To the lower verge of heaven; Quickly gained the far horizon, Gained the purple-colored harbor.\n\nThere his bark be firmly anchored, Rested in his boat of copper; But he left his harp of magic, Left his songs and wisdom-sayings, To the lasting joy of Suomi.\n\nEPILOGUE.\n\nNow I end my measured singing, Bid my weary tongue keep silence, Leave my songs to other singers.\n\nHorses have their times of resting After many hours of labor; Even sickles will grow weary When they have been long at reaping; Waters seek a quiet haven After running long in rivers; Fire subsides and sinks in slumber At the dawning of the morning Therefore I should end my singing, As my song is growing weary, For the pleasure of the evening, For the joy of morn arising.\n\nOften I have heard it chanted, Often heard the words repeated: \"Worthy cataracts and rivers Never empty all their waters.\" Thus the wise and worthy singer Sings not all his garnered wisdom; Better leave unsung some sayings Than to sing them out of season.\n\nThus beginning, and thus ending, Do I roll up all my legends, Roll them in a ball for safety, In my memory arrange them, In their narrow place of resting, Lest the songs escape unheeded, While the lock is still unopened, While the teeth remain unparted, And the weary tongue is silent.\n\nWhy should I sing other legends, Chant them in the glen and forest, Sing them on the hill and heather?"

