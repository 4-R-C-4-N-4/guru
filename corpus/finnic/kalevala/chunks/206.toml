[content]
body = "Wilt thou weep for me departed, Shouldst thou hear that I have perished, Fallen on the field of battle?\" This the answer of the brother: \"I shall never mourn the downfall Of my brother, Kullerwoinen, Shall not weep when thou hast perished; I shall find a second brother; Find one worthier and wiser!\" This is Kullerwoinen's answer: \"Neither shall I mourn thy downfall, Shall not weep when thou hast perished; I shall form a second brother, Make the head from dust and ashes, Make the eyes from pearls of ocean, Make the beard from withered verdure, Make the form from pulp of birch-wood.\" To his sister speaks Kullervo: \"Fare thou well, beloved sister!\n\nSurely thou wilt mourn my downfall, Weep for me when I have perished, When thou hearest I have fallen In the heat and din of battle, Fallen from thy race forever!\" But the sister makes this answer: \"Never shall I mourn thy downfall, Shall not weep when thou hast perished; I shall seek a second brother, Seek a brother, purer, better, One that will not shame his sister!\" Kullerwoinen thus makes answer: \"Neither shall I mourn thee fallen, Shall not weep when thou hast perished; I shall form a second sister, Make the head from whitened marble, Make the eyes from golden moonbeams, Make the tresses from the rainbow, Make the ears from ocean-flowers, And her form from gold and silver.\n\n\"Fare thou well, beloved mother, Mother, beautiful and faithful!\n\nWilt thou weep when I have perished, Fallen on the field of glory, Fallen from thy race forever?\" Thus the mother speaks in answer: \"Canst not fathom love maternal, Canst not smother her affection; Bitterly I'll mourn thy downfall, I would weep if thou shouldst perish, Shouldst thou leave my race forever; I would weep in court or cabin, Sprinkle all these fields with tear-drops, Weep great rivers to the ocean, Weep to melt the snows of Northland, Make the hillocks green with weeping, Weep at morning, weep at evening, Weep three years in bitter sorrow O'er the death of Kullerwoinen!\" Thereupon the wicked wizard Went rejoicing to the combat; In delight to war he hastened O'er the fields, and fens, and fallows, Shouting loudly on the heather, Singing o'er the hills and mountains, Rushing through the glens and forests, Blowing war upon his bugle.\n\nTime had gone but little distance, When a messenger appearing, Spake these words to Kullerwoinen: \"Lo!\n\nthine aged sire has perished, Fallen from thy race forever; Hasten home and do him honor, Lay him in the lap of Kalma.\" Kullerwoinen inade this answer: \"Has my aged father perished, There is home a sable stallion That will take him to his slumber, Lay him in the lap of Kalma.\" Then Kullervo journeyed onward, Calling war upon his bugle, Till a messenger appearing, Brought this word to Kullerwoinen: \"Lo!"

