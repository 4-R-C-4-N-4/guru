[content]
body = "Thou didst, in thy better life-time, When a shepherd filled with malice, Ruin all thy mother's berries, Make thy sister, too unworthy, Ruin all thy brother's cattle, Drive to death thy father's stallions, Through the marshes, o'er the meadows, Through the lowlands, o'er the mountains, Heeding not thy mother's counsel.\" Thereupon the wretched Nasshut, Angry grew and swore for vengeance, Straightway limping through the door-way, Hobbled on beyond the court-yard, O'er the meadow-lands and pastures, To the river of the death-land, To the holy stream and whirlpool, To the kingdom of Tuoni, To the islands of Manala; Waited there for Kaukomieli, Listened long for Lemminkainen, Thinking he must pass this river On his journey to his country, On.\n\nthe highway to the islands, From the upper shores of Pohya, From the dreary Sariola."

