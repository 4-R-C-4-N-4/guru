[content]
body = "OF THE HARP.\n\nWainamoinen, ancient minstrel, Onward steered his goodly vessel, From the isle of Lemminkainen, From the borders of the village; Steered his war-ship through the waters, Sang it o'er the ocean-billows, Joyful steered it to Pohyola.\n\nOn the banks were maidens standing, And the daughters spake these measures: \"List the music on the waters!\n\nWhat this wonderful rejoicing, What this singing on the billows?\n\nFar more beautiful this singing, This rejoicing on the waters, Than our ears have heard in Northland.\" Wainamoinen, the magician, Steered his wonder-vessel onward, Steered one day along the sea-shore, Steered the next through shallow waters, Steered the third day through the rivers.\n\nThen the reckless Lemminkainen Suddenly some words remembered, He had heard along the fire-stream Near the cataract and whirlpool, And these words the hero uttered: \"Cease, O cataract, thy roaring, Cease, O waterfall, thy foaming!\n\nMaidens of the foam and current, Sitting on the rocks in water, On the stone-blocks in the river, Take the foam and white-capped billows In your arms and still their anger, That our ships may pass in safety!\n\nAged dame beneath the eddy, Thou that livest in the sea-foam, Swimming, rise above the waters, Lift thy head above the whirlpool, Gather well the foam and billows In thine arms and still their fury, That our ship may pass in safety!\n\nYe, O rocks beneath the current, Underneath the angry waters, Lower well your heads of danger, Sink below our magic vessel, That our ship may pass in safety!\n\n\"Should this prayer prove inefficient, Kimmo, hero son of Kammo, Bore an outlet with thine auger, Cut a channel for this vessel Through the rocks beneath the waters, That our ship may pass in safety!\n\nShould all this prove unavailing, Hostess of the running water, Change to moss these rocky ledges, Change this vessel to an air-bag, That between these rocks and billows It may float, and pass in safety!\n\n\"Virgin of the sacred whirlpool, Thou whose home is in the river, Spin from flax of strongest fiber, Spin a thread of crimson color, Draw it gently through the water, That the thread our ship may follow, And our vessel pass in safety!\n\nGoddess of the helm, thou daughter Of the ocean-winds and sea-foam, Take thy helm endowed with mercy, Guide our vessel through these dangers, Hasten through these floods enchanted, Passing by the house of envy, By the gates of the enchanters, That our ship may pass in safety!\n\n\"Should this prayer prove inefficient, Ukko, Ruler of creation, Guide our vessel with thy fire-sword, Guide it with thy blade of lightning, Through the dangers of these rapids, Through the cataract and whirlpool, That our ship may pass in safety!\" Thereupon old Wainamoinen Steered his boat through winds and waters, Through the rocky chinks and channels, Through the surges wildly tossing; And the vessel passed in safety Through the dangers of the current, Through the sacred stream and whirlpool.\n\nAs it gains the open waters, Gains at length the broad-lake's bosom, Suddenly its motion ceases, On some object firmly anchored.\n\nThereupon young Ilmarinen, With the aid of Lemminkainen, Plunges in the lake the rudder, Struggles with the aid of magic; But he cannot move the vessel, Cannot free it from its moorings."

