[content]
body = "Wise Wipunen, full of song-charms, Opens wide his mouth and swallows Wainamoinen and his magic, Shoes, and staff, and iron armor.\n\nThen outspeaks the wise Wipunen: \"Many things before I've eaten, Dined on goat, and sheep, and reindeer, Bear, and ox, and wolf, and wild-boar, Never in my recollection, Have I tasted sweeter morsels!\" Spake the ancient Wainamoinen: \"Now I see the evil symbols, See misfortune hanging o'er me, In the darksome Hisi-hurdles, In the catacombs of Kalma.\" Wainamoinen long considered How to live and how to prosper, How to conquer this condition.\n\nIn his belt he wore a poniard, With a handle hewn from birch-wood, From the handle builds a vessel, Builds a boat through magic science; In this vessel rows he swiftly Through the entrails of the hero, Rows through every gland and vessel Of the wisest of magicians.\n\nOld Wipunen, master-singer, Barely feels the hero's presence, Gives no heed to Wainamoinen.\n\nThen the artist of Wainola Straightway sets himself to forging, Sets at work to hammer metals; Makes a smithy from his armor, Of his sleeves he makes the bellows, Makes the air-valve from his fur-coat, From his stockings, makes the muzzle, Uses knees instead of anvil, Makes a hammer of his fore-arm; Like the storm-wind roars the bellows, Like the thunder rings the anvil; Forges one day, then a second, Forges till the third day closes, In the body of Wipunen, In the sorcerer's abdomen.\n\nOld Wipunen, full of magic, Speaks these words in wonder, guessing: \"Who art thou of ancient heroes, Who of all the host of heroes?\n\nMany heroes I have eaten, And of men a countless number, Have not eaten such as thou art; Smoke arises from my nostrils, From my mouth the fire is streaming, In my throat are iron-clinkers.\n\n\"Go, thou monster, hence to wander, Flee this place, thou plague of Northland, Ere I go to seek thy mother, Tell the ancient dame thy mischief; She shall bear thine evil conduct, Great the burden she shall carry; Great a mother's pain and anguish, When her child runs wild and lawless; Cannot comprehend the meaning, Nor this mystery unravel, Why thou camest here, O monster, Camest here to give me torture.\n\nArt thou Hisi sent from heaven, Some calamity from Ukko?\n\nArt, perchance, some new creation, Ordered here to do me evil?\n\nIf thou art some evil genius, Some calamity from Ukko, Sent to me by my Creator, Then am I resigned to suffer God does not forsake the worthy, Does not ruin those that trust him, Never are the good forsaken.\n\nIf by man thou wert created, If some hero sent thee hither, I shall learn thy race of evil, Shall destroy thy wicked tribe-folk."

