[content]
body = "I am weeping for my smallness, Am lamenting for my weakness, Have no sympathy, no pity, Stand here motionless for ages, Stand alone in fen and forest, In these woodlands vast and joyless.\n\nOthers hope for coming summers, For the beauties of the spring-time; I, alas!\n\na helpless birch-tree, Dread the changing of the seasons, I must give my bark to, others, Lose my leaves and silken tassels.\n\nMen come the Suomi children, Peel my bark and drink my life-blood: Wicked shepherds in the summer, Come and steal my belt of silver, Of my bark make berry-baskets, Dishes make, and cups for drinking.\n\nOftentimes the Northland maidens Cut my tender limbs for birch-brooms,' Bind my twigs and silver tassels Into brooms to sweep their cabins; Often have the Northland heroes Chopped me into chips for burning; Three times in the summer season, In the pleasant days of spring-time, Foresters have ground their axes On my silver trunk and branches, Robbed me of my life for ages; This my spring-time joy and pleasure, This my happiness in summer, And my winter days no better!\n\nWhen I think of former troubles, Sorrow settles on my visage, And my face grows white with anguish; Often do the winds of winter And the hoar-frost bring me sadness, Blast my tender leaves and tassels, Bear my foliage to others, Rob me of my silver raiment, Leave me naked on the mountain, Lone, and helpless, and disheartened!\" Spake the good, old Wainamoinen: \"Weep no longer, sacred birch-tree, Mourn no more, my friend and brother, Thou shalt have a better fortune; I will turn thy grief to joyance, Make thee laugh and sing with gladness.\" Then the ancient Wainamoinen Made a harp from sacred birch-wood, Fashioned in the days of summer, Beautiful the harp of magic, By the master's hand created On the fog-point in the Big-Sea, On the island forest-covered, Fashioned from the birch the archings, And the frame-work from the aspen.\n\nThese the words of the magician: \"All the archings are completed, And the frame is fitly finished; Whence the hooks and pins for tuning, That the harp may sing in concord?\" Near the way-side grew an oak-tree, Skyward grew with equal branches, On each twig an acorn growing, Golden balls upon each acorn, On each ball a singing cuckoo.\n\nAs each cuckoo's call resounded, Five the notes of song that issued From the songster's throat of joyance; From each throat came liquid music, Gold and silver for the master, Flowing to the hills and hillocks, To the silvery vales and mountains; Thence he took the merry harp-pins, That the harp might play in concord.\n\nSpake again wise Wainamoinen: \"I the pins have well completed, Still the harp is yet unfinished; Now I need five strings for playing, Where shall I procure the harp-strings?\" Then the ancient bard and minstrel Journeyed through the fen and forest.\n\nOn a hillock sat a maiden, Sat a virgin of the valley; And the maiden was not weeping, Joyful was the sylvan daughter, Singing with the woodland songsters, That the eventide might hasten, In the hope that her beloved Would the sooner sit beside her.\n\nWainamoinen, old and trusted, Hastened, tripping to the virgin, Asked her for her golden ringleta, These the words of the magician."

