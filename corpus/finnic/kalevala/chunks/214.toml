[content]
body = "Happier far my life hereafter, With the cunning fox to wander, Than with this ill-mannered suitor; Reynard's fur to me is finer Than the robes of Ilmarinen.\" Thereupon the metal-worker Shut his lips in sore displeasure, Hastened on the highway homeward; Travelled but a little distance, When again his courser halted.\n\nQuick the maiden looked in wonder, in the snow beheld some foot-prints, Spake these words to the magician: Who again has crossed our pathway?\" \"'Tis the wolf\", said Ilmarinen.\n\nThereupon the fated daughter Fell again to bitter weeping, And Intoned these words of sorrow: \"Woe is me, a hapless maiden!\n\nHappier far my life hereafter, Brighter far would be my future, If these tracks I could but follow; On the wolf the hair is finer Than the furs of Ilmarinen, Faithless suitor of the Northland.\" Then the minstrel of Wainola Closed his lips again in anger, Shook his sable locks, resentful, Snapped the whip above the racer, And the steed flew onward swiftly, O'er the way to Kalevala, To the village of the blacksmith.\n\nSad and weary from his journey, Ilmarinen, home-returning, Fell upon his couch in slumber, And the maiden laughed derision.\n\nIn the morning, slowly waking, Head confused, and locks dishevelled, Spake the wizard, words as follow: \"Shall I set myself to singing Magic songs and incantations?\n\nShall I now enchant this maiden To a black-wolf on the mountains, To a salmon of the ocean?\n\nShall not send her to the woodlands, All the forest would be frighted; Shall not send her to the waters, All the fish would flee in terror; This my sword shall drink her life-blood, End her reign of scorn and hatred.\" Quick the sword feels his intention, Quick divines his evil purpose, Speaks these words to Ilmarinen: \"Was not born to drink the life-blood Of a maiden pure and lovely, Of a fair but helpless virgin.\" Thereupon the magic minstrel, Filled with rage, began his singing; Sang the very rocks asunder, Till the distant hills re-echoed; Sang the maiden to a sea-gull, Croaking from the ocean-ledges, Calling from the ocean-islands, Screeching on the sandy sea-coast, Flying to the winds opposing.\n\nWhen his conjuring had ended, Ilmarinen joined his snow-sledge, Whipped his steed upon a gallop, Hastened to his ancient smithy, To his home in Kalevala.\n\nWainamoinen, old and truthful, Comes to meet him on the highway, Speaks these words to the magician: \"Ilmarinen, worthy brother, Wherefore comest heavy-hearted From the dismal Sariola?\n\nDoes Pohyola live and prosper?\n\nSpake the minstrel, Ilmarinen: \"Why should not Pohyola prosper?\n\nThere the Sampo grinds unceasing, Noisy rocks the lid in colors; Grinds one day the flour for eating, Grinds the second flour for selling, Grinds the third day flour for keeping; Thus it is Pohyola prospers.\n\nWhile the Sampo is in Northland, There is plowing, there is sowing, There is growth of every virtue, There is welfare never-ending.\" Spake the ancient Wainamoinen: \"Ilmarinen, artist-brother, Where then is the Northland-daughter, Far renowned and beauteous maiden, For whose hand thou hast been absent?"

