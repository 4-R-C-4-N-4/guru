[content]
body = "Saw it smiling near the meadow, Like a cranberry in feature, Like a strawberry in flavor; But be Virgin, Mariatta, Could not pluck the woodland-stranger, Thereupon she cut a charm-stick, Downward pressed upon the berry, When it rose as if by magic, Rose above her shoes of ermine, Then above her copper girdle, Darted upward to her bosom, Leaped upon the maiden's shoulder, On her dimpled chin it rested, On her lips it perched a moment, Hastened to her tongue expectant To and fro it rocked and lingered, Thence it hastened on its journey, Settled in the maiden's bosom.\n\nMariatta, child of beauty, Thus became a bride impregnate, Wedded to the mountain-berry; Lingered in her room at morning, Sat at midday in the darkness, Hastened to her couch at evening.\n\nThus the watchful mother wonders: \"What has happened to our Mary, To our virgin, Mariatta, That she throws aside her girdle, Shyly slips through hall and chamber, Lingers in her room at morning, Hastens to her couch at evening, Sits at midday in the darkness?\" On the floor a babe was playing, And the young child thus made answer: \"This has happened to our Mary, To our virgin, Mariatta, This misfortune to the maiden: She has lingered by the meadows, Played too long among the lambkins, Tasted of the mountain-berry.\" Long the virgin watched and waited, Anxiously the days she counted, Waiting for the dawn of trouble.\n\nFinally she asked her mother, These the words of Mariatta: \"Faithful mother, fond and tender, Mother whom I love and cherish, Make for me a place befitting, Where my troubles may be lessened, And my heavy burdens lightened.\" This the answer of the mother: \"Woe to thee, thou Hisi-maiden, Since thou art a bride unworthy, Wedded only to dishonor!\" Mariatta, child of beauty, Thus replied in truthful measures: \"I am not a maid of Hisi, I am not a bride unworthy, Am not wedded to dishonor; As a shepherdess I wandered With the lambkins to the glen-wood, Wandered to the berry-mountain, Where the strawberry had ripened; Quick as thought I plucked the berry, On my tongue I gently laid it, To and fro it rocked and lingered, Settled in my heaving bosom."

