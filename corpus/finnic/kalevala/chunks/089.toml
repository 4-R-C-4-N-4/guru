[content]
body = "FINDS THE LOST-WORD.\n\nWainamoinen, old and truthful, Did not learn the words of magic In Tuoni's gloomy regions, In the kingdom of Manala.\n\nThereupon he long debated, Well considered, long reflected, Where to find the magic sayings; When a shepherd came to meet him, Speaking thus to Wainamoinen: \"Thou canst find of words a hundred, Find a thousand wisdom-sayings, In the mouth of wise Wipunen, In the body of the hero; To the spot I know the foot-path, To his tomb the magic highway, Trodden by a host of heroes; Long the distance thou must travel, On the sharpened points of needles; Then a long way thou must journey On the edges of the broadswords; Thirdly thou must travel farther On the edges of the hatchets.\" Wainamoinen, old and trustful, Well considered all these journeys, Travelled to the forge and smithy, Thus addressed the metal-worker: \"Ilmarinen, worthy blacksmith, Make a shoe for me of iron, Forge me gloves of burnished copper, Mold a staff of strongest metal, Lay the steel upon the inside, Forge within the might of magic; I am going on a journey To procure the magic sayings, Find the lost-words of the Master, From the mouth of the magician, From the tongue of wise Wipunen.\" Spake the artist, Ilmarinen: \"Long ago died wise Wipunen, Disappeared these many ages, Lays no more his snares of copper, Sets no longer traps of iron, Cannot learn from him the wisdom, Cannot find in him the lost-words.\" Wainamoinen, old and hopeful, Little heeding, not discouraged, In his metal shoes and armor, Hastens forward on his journey, Runs the first day fleetly onward, On the sharpened points of needles; 'Wearily he strides the second, On the edges of the broadswords Swings himself the third day forward, On the edges of the hatchets.\n\nWise Wipunen, wisdom-singer, Ancient bard, and great magician, With his magic songs lay yonder, Stretched beside him, lay his sayings, On his shoulder grew the aspen, On each temple grew the birch-tree, On his mighty chin the alder, From his beard grew willow-bushes, From his mouth the dark green fir-tree, And the oak-tree from his forehead.\n\nWainamoinen, coming closer, Draws his sword, lays bare his hatchet From his magic leathern scabbard, Fells the aspen from his shoulder, Fells the birch-tree from his temples, From his chin he fells the alder, From his beard, the branching willows, From his mouth the dark-green fir-tree, Fells the oak-tree from his forehead.\n\nNow he thrusts his staff of iron Through the mouth of wise Wipunen, Pries his mighty jaws asunder, Speaks these words of master-magic: \"Rise, thou master of magicians, From the sleep of Tuonela, From thine everlasting slumber!\" Wise Wipunen, ancient singer, Quickly wakens from his sleeping, Keenly feels the pangs of torture, From the cruel staff of iron; Bites with mighty force the metal, Bites in twain the softer iron, Cannot bite the steel asunder, Opens wide his mouth in anguish.\n\nWainamoinen of Wainola, In his iron-shoes and armor, Careless walking, headlong stumbles In the spacious mouth and fauces Of the magic bard, Wipunen."

