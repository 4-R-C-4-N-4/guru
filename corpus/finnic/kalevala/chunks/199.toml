[content]
body = "I shall never fall and perish On the ice-plains, in the marshes, Never be a bridge in swamp-land, Not while I have arms of virtue That can serve my honored kindred!\" Then Kullervo thought to journey To the village of Untamo, To avenge his father's murder, To avenge his mother's tortures, And the troubles of his tribe-folk.\n\nThese the words of Kullerwoinen: \"Wait, yea wait, thou Untamoinen, Thou destroyer of my people; When I meet thee in the combat, I will slay thee and thy kindred, I will burn thy homes to ashes!\" Came a woman on the highway, Dressed in blue, the aged mother, To Kullervo spake as follows: \"Whither goest, Kullerwoinen, Whither hastes the wayward hero?\n\nKullerwoinen gave this answer: \"I have thought that I would journey To the far-off land of strangers, To the village of Untamo, To avenge my father's murder, To avenge my mother's tortures, And the troubles of my tribe-folk.\" Thus the gray-haired woman answered: \"Surely thou dost rest in error, For thy tribe has never perished, And thy mother still is living With thy father in the Northland, Living with the old Kalervo.\" \"O, thou ancient dame beloved, Worthy mother of the woodlands, Tell me where my father liveth, Where my loving mother lingers!\" \"Yonder lives thine aged father, And thy loving mother with him, On the farthest shore of Northland, On the long-point of the fish-lake!\" \"Tell me, O thou woodland-mother, How to journey to my people, How to find mine honored tribe-folk.\" \"Easy is the way for strangers: Thou must journey through the forest, Hasten to the river-border, Travel one day, then a second, And the third from morn till even, To the north-west, thou must journey.\n\nIf a mountain comes to meet thee, Go around the nearing mountain, Westward bold thy weary journey, Till thou comest to a river, On thy right hand flowing eastward; Travel to the river border, Where three water-falls will greet thee; When thou comest to a headland, On the point thou'lt see a cottage Where the fishermen assemble; In this cottage is thy father, With thy mother and her daughters, Beautiful thy maiden sisters.\" Kullerwoinen, the magician, Hastens northward on his journey, Walks one day, and then a second, Walks the third from morn till evening; To the north-west walks Kullervo, Till a mountain comes to meet him, Walks around the nearing mountain; Westward, westward, holds his journey, Till he sees a river coming; Hastens to the river border, Walks along the streams and rapids Till three waterfalls accost him; Travels till he meets a headland, On the point he spies a cottage, Where the fishermen assemble.\n\nQuick he journeys to the cabin, Quick he passes through the portals Of the cottage on the headland, Where he finds his long-lost kindred; No one knows the youth, Kullervo, No one knows whence comes the stranger, Where his home, nor where he goeth.\n\nThese the words of young Kullervo: \"Dost thou know me not, my mother, Dost thou know me not, my father?"

