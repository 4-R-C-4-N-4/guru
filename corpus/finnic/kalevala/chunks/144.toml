[content]
body = "But the youth remained for singing, This the chorus of the children: \"Hither came a bird of evil' Flew in fleetness from the forest, Came to steal away our virgin, Came to win the Maid of Beauty; Took away our fairest flower, Took our mermaid from the waters, Won her with his youth and beauty, With his keys of ancient wisdom.\n\nWho will lead us to the sea-beach, Who conduct us to the rivers?\n\nNow the buckets will be idle, On the hooks will rest the fish-poles, Now unswept will lie the matting, And unswept the halls of birch-wood, Copper goblets be unburnished, Dark the handles of the pitchers, Fare thou well, dear Rainbow Maiden.\" Ilmarinen, happy bridegroom, Hastened homeward with the daughter Of the hostess of Pohyola, With the beauty of the Northland Fleetly flew the hero's snow-sledge, Loudly creaked, and roared, and rattled Down the banks of Northland waters, By the side of Honey-inlet, On the back of Sandy Mountain.\n\nStones went rolling from the highway, Like the winds the sledge flew onward, On the yoke rang hoops of iron, Loud the spotted wood resounded, Loudly creaked the bands of willow, All the birchen cross-bars trembled, And the copper-bells rang music, In the racing of the fleet-foot, In the courser's gallop homeward; Journeyed one day, then a second, Journeyed still the third day onward, In one hand the reins of magic, While the other grasped the maiden, One foot resting on the cross-bar, And the other in the fur-robes.\n\nMerrily the steed flew homeward, Quickly did the highways shorten, Till at last upon the third day, As the sun was fast declining, There appeared the blacksmith's furnace, Nearer, Ilmarinen's dwelling, Smoke arising high in ether, Clouds of smoke to lofty heaven, From the village of Wainola, From the suitor's forge and smithy, From the chimneys of the hero, From the home of the successful.\n\nTHE KALEVALA THE EPIC POEM OF FINLAND INTO ENGLISH BY JOHN MARTIN CRAWFORD [1888] BOOK II CONTENTS RUNE XXV.\n\nWainamoinen's Wedding-songs RUNE XXVI.\n\nOrigin of the Serpent RUNE XXVII.\n\nThe Unwelcome Guest RUNE XXVIII.\n\nThe Mother's Counsel RUNE XXIX.\n\nThe Isle of Refuge RUNE XXX.\n\nThe Frost-fiend RUNE XXXI.\n\nKullerwoinen, Son of Evil RUNE XXXII.\n\nKullervo as a Shepherd RUNE XXXIII.\n\nKullervo and the Cheat-cake RUNE XXXIV.\n\nKullervo finds his Tribe-folk RUNE XXXV.\n\nKullervo's Evil Deeds RUNE XXXVI.\n\nKullerwoinen's Victory and Death RUNE XXXVII Ilmarinen's Bride of Gold RUNE XXXVIII.\n\nIlmarinen's Fruitless Wooing RUNE XXXIX.\n\nWainamoinen's Sailing RUNE XL.\n\nBirth of the Harp RUNE XLI.\n\nWainamoinen's Harp-songs RUNE XLII.\n\nCapture of the Sampo RUNE XLIII.\n\nThe Sampo lost in the Sea RUNE XLIV.\n\nBirth of the Second Harp RUNE XLV.\n\nBirth of the Nine Diseases RUNE XLVI.\n\nOtso the Honey-eater RUNE XLVII.\n\nLouhi steals Sun, Moon, and Fire RUNE XLVIII.\n\nCapture of the Fire-fish RUNE XLIX.\n\nRestoration of the Sun and Moon RUNE L."

