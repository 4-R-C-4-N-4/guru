[content]
body = "There arose from out the sea-waves, Rose a hero from the waters, On the white-capped, roaring breakers, From the water's broad expanses; Nor belonged he to the largest, Nor belonged he to the smallest; Made his bed within a sea-shell, Stood erect beneath a flour-sieve, Hero old, with hands of iron, And his face was copper-colored; Quick the hero full unfolded, Like the full corn from the kernel.\n\nOn his head a hat of flint-stone, On his feet were sandstone-sandals, In his hand a golden cleaver, And the blade was copper-handled.\n\nThus at last they found a butcher, Found the magic ox a slayer.\n\nNothing has been found so mighty That it has not found a master.\n\nAs the sea-god saw his booty, Quickly rushed he on his victim, Hurled him to his knees before him, Quickly felled the calf of Suomi, Felled the young ox of Karelen.\n\nBountifully meat was furnished; Filled at least a thousand hogsheads Of his blood were seven boatfuls, And a thousand weight of suet, For the banquet of Pohyola, For the marriage-feast of Northland.\n\nIn Pohyola was a guest-room, Ample was the hall of Louhi, Was in length a hundred furlongs, And in breadth was nearly fifty; When upon the roof a rooster Crowed at break of early morning, No one on the earth could hear him; When the dog barked at one entrance, None could hear him at the other.\n\nLouhi, hostess of Pohyola, Hastens to the hall and court-room, In the centre speaks as follows: \"Whence indeed will come the liquor, Who will brew me beer from barley, Who will make the mead abundant, For the people of the Northland, Coming to my daughter's marriage, To her drinking-feast and nuptials?\n\nCannot comprehend the malting, Never have I learned the secret, Nor the origin of brewing.\" Spake an old man from his corner: \"Beer arises from the barley, Comes from barley, hops, and water, And the fire gives no assistance.\n\nHop-vine was the son of Remu, Small the seed in earth was planted, Cultivated in the loose soil, Scattered like the evil serpents On the brink of Kalew-waters, On the Osmo-fields and borders.\n\nThere the young plant grew and flourished, There arose the climbing hop-vine, Clinging to the rocks and alders.\n\n\"Man of good-luck sowed the barley On the Osmo hills and lowlands, And the barley grew and flourished, Grew and spread in rich abundance, Fed upon the air and water, On the Osmo plains and highlands, On the fields of Kalew-heroes.\n\n\"Time had travelled little distance, Ere the hops in trees were humming, Barley in the fields was singing, And from Kalew's well the water, This the language of the trio: 'Let us join our triple forces, Join to each the other's powers; Sad alone to live and struggle, Little use in working singly, Better we should toil together.' \"Osmotar, the beer-preparer, Brewer of the drink refreshing, Takes the golden grains of barley, Taking six of barley-kernels, Taking seven tips of hop-fruit, Filling seven cups with water, On the fire she sets the caldron, Boils the barley, hops, and water, Lets them steep, and seethe, and bubble Brewing thus the beer delicious, In the hottest days of summer, On the foggy promontory, On the island forest-covered; Poured it into birch-wood barrels, Into hogsheads made of oak-wood."

