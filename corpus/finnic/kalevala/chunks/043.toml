[content]
body = "Thus it was be tried the balsam, Thus the magic salve he tested, Touched with it the splintered sandstone, Touched the broken blocks of granite, Touched the fissures in the mountains, And the broken parts united, All the fragments grew together.\n\nThen the young boy quick returning With the balsam he had finished, To the gray-beard gave the ointment, And the boy these measures uttered \"Here I bring the balm of healing, Wonderful the salve I bring thee; It will join the broken granite, Make the fragments grow together, Heat the fissures in the mountains, And restore the injured birch-tree.\" With his tongue the old man tested, Tested thus the magic balsam, Found the remedy effective, Found the balm had magic virtues; Then anointed he the minstrel, Touched the wounds of Wainamoinen, Touched them with his magic balsam, With the balm of many virtues; Speaking words of ancient wisdom, These the words the gray-beard uttered: \"Do not walk in thine own virtue, Do not work in thine own power, Walk in strength of thy Creator; Do not speak in thine own wisdom, Speak with tongue of mighty Ukko.\n\nIn my mouth, if there be sweetness, It has come from my Creator; If my bands are filled with beauty, All the beauty comes from Ukko.\" When the wounds had been anointed, When the magic salve had touched them, Straightway ancient Wainamoinen Suffered fearful pain and anguish, Sank upon the floor in torment, Turning one way, then another, Sought for rest and found it nowhere, Till his pain the gray-beard banished, Banished by the aid of magic, Drove away his killing torment To the court of all our trouble, To the highest hill of torture, To the distant rocks and ledges, To the evil-bearing mountains, To the realm of wicked Hisi.\n\nThen be took some silken fabric, Quick he tore the silk asunder, Making equal strips for wrapping, Tied the ends with silken ribbons, Making thus a healing bandage; Then he wrapped with skilful fingers Wainamoinen's knee and ankle, Wrapped the wounds of the magician, And this prayer the gray-beard uttered \"Ukko's fabric is the bandage, Ukko's science is the surgeon, These have served the wounded hero, Wrapped the wounds of the magician.\n\nLook upon us, God of mercy, Come and guard us, kind Creator, And protect us from all evil!\n\nGuide our feet lest they may stumble, Guard our lives from every danger, From the wicked wilds of Hisi.\" Wainamoinen, old and truthful, Felt the mighty aid of magic, Felt the help of gracious Ukko, Straightway stronger grew in body, Straightway were the wounds united, Quick the fearful pain departed.\n\nStrong and hardy grew the hero, Straightway walked in perfect freedom, Turned his knee in all directions, Knowing neither pain nor trouble.\n\nThen the ancient Wainamoinen Raised his eyes to high Jumala, Looked with gratitude to heaven, Looked on high, in joy and gladness, Then addressed omniscient Ukko, This the prayer the minstrel uttered: \"O be praised, thou God of mercy, Let me praise thee, my Creator, Since thou gavest me assistance, And vouchsafed me thy protection, Healed my wounds and stilled mine anguish, Banished all my pain and trouble, Caused by Iron and by Hisi."

