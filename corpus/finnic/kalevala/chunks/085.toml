[content]
body = "Wainamoinen, brave and ancient, Calls aloud in tones of thunder, To the Tuonela deeps and dungeons, And to Manala's magic castle: \"Bring a boat, Tuoni's daughter, Bring a ferry-boat, O maiden, That may bear me o'er this channel, O'er this black and fatal river.\" Quick the daughter of Tuoni, Magic maid of little stature, Tiny virgin of Manala, Tiny washer of the linen, Tiny cleaner of the dresses, At the river of Tuoni, In Manala's ancient castles, Speaks these words to Wainamoinen, Gives this answer to his calling: \"Straightway will I bring the row-boat, When the reasons thou hast given Why thou comest to Manala In a hale and active body.\" Wainamoinen, old and artful., Gives this answer to the maiden: \"I was brought here by Tuoni, Mana raised me from the coffin.\" Speaks the maiden of Manala: \"This a tale of wretched liars; Had Tuoni brought thee hither, Mana raised thee from the coffin, Then Tuoni would be with thee, Manalainen too would lead thee, With Tuoni's hat upon thee, On thy hands, the gloves of Mana; Tell the truth now, Wainamoinen, What has brought thee to Manala?\" Wainamoinen, artful hero, Gives this answer, still finessing: \"Iron brought me to Manala, To the kingdom of Tuoni.\" Speaks the virgin of the death-land, Mana's wise and tiny daughter: \"Well I know that this is falsehood, Had the iron brought thee hither, Brought thee to Tuoni's kingdom, Blood would trickle from thy vesture, And the blood-drops, scarlet-colored.\n\nSpeak the truth now, Wainamoinen, This the third time that I ask thee.\" Wainamoinen, little heeding, Still finesses to the daughter: \"Water brought me to Manala, To the kingdom of Tuoui.\" This the tiny maiden's answer: \"Well I know thou speakest falsely; If the waters of Manala, If the cataract and whirlpool, Or the waves had brought thee hither, From thy robes the drops would trickle, Water drip from all thy raiment.\n\nTell the truth and I will serve thee, What has brought thee to Manala?\" Then the wilful Wainamoinen Told this falsehood to the maiden: \"Fire has brought me to Manala, To the kingdom of Tuoni.\" Spake again Tuoni's daughter: \"Well I know the voice of falsehood.\n\nIf the fire had brought thee hither, Brought thee to Tuoni's empire, Singed would be thy locks and eyebrows, And thy beard be crisped and tangled.\n\nO, thou foolish Wainamoinen, If I row thee o'er the ferry, Thou must speak the truth in answer, This the last time I will ask thee; Make an end of thy deception.\n\nWhat has brought thee to Manala, Still unharmed by pain or sickness, Still untouched by Death's dark angel Spake the ancient Wainamoinen: \"At the first I spake, not truly, Now I give thee rightful answer: I a boat with ancient wisdom, Fashioned with my powers of magic, Sang one day and then a second, Sang the third day until evening, When I broke the magic main-spring, Broke my magic sledge in pieces, Of my song the fleetest runners; Then I come to Mana's kingdom, Came to borrow here a hatchet, Thus to mend my sledge of magic, Thus to join the parts together."

