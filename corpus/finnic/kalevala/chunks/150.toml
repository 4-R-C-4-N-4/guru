[content]
body = "Wherefore should I not be singing, And the children not be chanting Of the beer of Kalevala, Brewed from barley in perfection, Dressed in quaint and homely costume, As they sit beside their hearth-stones.\n\nWherefore should I not be singing, And the children too be chanting Underneath these painted rafters, In these halls renowned and ancient?\n\nThis the place for men to linger, This the court-room for the maidens, Near the foaming beer of barley, Honey-brewed in great abundance, Very near, the salmon-waters, Near, the nets for trout and whiting, Here where food is never wanting, Where the beer is ever brewing.\n\nHere Wainola's sons assemble, Here Wainola's daughters gather, Here they never eat in trouble, Here they live without regretting, In the life-time of the landlord, While the hostess lives and prospers.\n\n\"Who shall first be sung and lauded?\n\nShall it be the bride or bridegroom?\n\nLet us praise the bridegroom's father, Let the hero-host be chanted, Him whose home is in the forest, Him who built upon the mountains, Him who brought the trunks of lindens, With their tops and slender branches, Brought them to the best of places, Joined them skilfully together, For the mansion of the nation, For this famous hero-dwelling, Walls procured upon the lowlands, Rafters from the pine and fir-tree, From the woodlands beams of oak-wood, From the berry-plains the studding, Bark was furnished by the aspen, And the mosses from the fenlands.\n\nTrimly builded is this mansion, In a haven warmly sheltered; Here a hundred men have labored, On the roof have stood a thousand, As this spacious house was building, As this roof was tightly jointed.\n\nHere the ancient mansion-builder, When these rafters were erected, Lost in storms his locks of sable, Scattered by the winds of heaven.\n\nOften has the hero-landlord On the rocks his gloves forgotten, Left his hat upon the willows, Lost his mittens in the marshes; Oftentimes the mansion-builder, In the early hours of morning, Ere his workmen had awakened, Unperceived by all the village, Has arisen from his slumber, Left his cabin the snow-fields, Combed his locks among the branches, Bathed his eyes in dews of morning.\n\n\"Thus obtained the pleasant landlord Friends to fill his spacious dwelling, Fill his benches with magicians, Fill his windows with enchanters, Fill his halls with wizard-singers, Fill his floors with ancient speakers, Fill his ancient court with strangers, Fill his hurdles with the needy; Thus the Kalew-host is lauded.\n\n\"Now I praise the genial hostess, Who prepares the toothsome dinner, Fills with plenty all her tables, Bakes the honeyed loaves of barley, Kneads the dough with magic fingers, With her arms of strength and beauty, Bakes her bread in copper ovens, Feeds her guests and bids them welcome, Feeds them on the toothsome bacon, On the trout, and pike, and whiting, On the rarest fish in ocean, On the dainties of Wainola.\n\n\"Often has the faithful hostess Risen from her couch in silence, Ere the crowing of the watcher, To prepare the wedding-banquet, Make her tables look attractive.\n\nBrew the honey-beer of wedlock.\n\nExcellently has the housewife, Has the hostess filled with wisdom, Brewed the beer from hops and barley, From the corn of Kalevala, From the wheat-malt honey-seasoned, Stirred the beer with graceful fingers, At the oven in the penthouse, In the chamber swept and polished."

