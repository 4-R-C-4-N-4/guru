[content]
body = "Spake the hero, Lemminkainen: \"There is none in Pohya's hamlets, In the courts of Sariola, That with me can measure broadswords, That can meet this blade ancestral.\" From the nail he took a cross-bow, Took the strongest from the rafters, Spake these words in meditation: \"I shall recognize as worthy, Recognize that one a hero That can bend this mighty cross-bow, That can break its magic sinews, In the hamlets of Pohyola.\" Lemminkainen, filled with courage, Girds himself in suit of battle, Dons his mighty mail of copper, To his servant speaks as follows: \"Trusty slave, and whom I purchased, Whom I bought with gold and silver, Quick prepare my fiery charger, Harness well my steed of battle; I am going to the feasting, To the banquet-fields of Lempo.\" Quick obeys the faithful servant, Hitches well the noble war-horse, Quick prepares the fire-red stallion, Speaks these words when all is I ready: \"I have done what thou hast hidden, Ready harnessed is the charger, Waiting to obey his master.\" Comes the hour of the departing Of the hero, Lemminkainen, Right hand ready, left unwilling, All his anxious fingers pain him, Till at last in full obedience, All his members give permission; Starts the hero on his journey, While the mother gives him counsel, At the threshold of the dwelling, At the highway of the court-yard: \"Child of courage, my beloved, Son of strength, my wisdom-hero, If thou goest to the feasting, Shouldst thou reach the great carousal, Drink thou only a half a cupful, Drink the goblet to the middle, Always give the half remaining, Give the worse half to another, To another more unworthy; In the lower half are serpents, Worms, and frogs, and hissing lizards, Feeding on the slimy bottom.\" Furthermore she tells her hero, Gives her son these sage directions, On the border of the court-yard, At the portals farthest distant: \"If thou goest to the banquet, Shouldst thou reach the great carousal, Occupy but half the settle, Take but half a stride in walking, Give the second half to others, To another less deserving; Only thus thou'lt be a hero, Thus become a son immortal; In the guest-rooms look courageous, Bravely move about the chambers, In the gatherings of heroes, With the hosts of magic valor.\" Thereupon wild Lemminkainen Quickly leaped upon the cross-bench Of his battle-sledge of wonder, Raised his pearl-enamelled birch-rod, Snapped his whip above his charger, And the steed flew onward fleetly, Galloped on his distant journey.\n\nHe had travelled little distance, When a flight of hazel-chickens Quick arose before his coming, Flew before the foaming racer.\n\nThere were left some feathers lying, Feathers of the hazel-chickens, Lying in the hero's pathway.\n\nThese the reckless Lemminkainen Gathered for their magic virtues, Put them in his pouch of leather, Did not know what things might happen On his journey to Pohyola; All things have some little value, In a strait all things are useful.\n\nThen he drove a little distance, Galloped farther on the highway, When his courser neighed in danger, And the fleet-foot ceased his running."

