[content]
body = "Tiera poised his mighty javelin, Launched the spear upon its errand; Hurled the shaft across the pasture, To the border of the forest, O'er the clay-fields of Pohyola, O'er the green and fragrant meadows, Through the distant bills of Northland.\n\nThen great Tiera touched his javelin To the mighty spear of Ahti, Pledged his aid to Lemminkainen, As his combatant and comrade.\n\nThereupon wild Kaukomieli Pushed his boat upon the waters; Like the serpent through the heather, Like the creeping of the adder, Sails the boat away to Pohya, O'er the seas of Sariola.\n\nQuick the wicked hostess, Louhi, Sends the black-frost of the heavens To the waters of Pohyola, O'er the far-extending sea-plains, Gave the black-frost these directions: \"Much-loved Frost, my son and hero, Whom thy mother has instructed, Hasten whither I may send thee, Go wherever I command thee, Freeze the vessel of this hero, Lemminkainen's bark of magic, On the broad back of the ocean, On the far-extending waters; Freeze the wizard in his vessel, Freeze to ice the wicked Ahti, That he never more may wander, Never waken while thou livest, Or at least till I shall free him, Wake him from his icy slumber!\" Frost, the son of wicked parents, Hero-son of evil manners, Hastens off to freeze the ocean, Goes to fasten down the flood-gates, Goes to still the ocean-currents.\n\nAs he hastens on his journey, Takes the leaves from all the forest, Strips the meadows of their verdure, Robs the flowers of their colors.\n\nWhen his journey he had ended, Gained the border of the ocean, Gained the sea-shore curved and endless, On the first night of his visit, Freezes he the lakes and rivers, Freezes too the shore of ocean, Freezes not the ocean-billows, Does not check the ocean-currents.\n\nOn the sea a finch is resting, Bird of song upon the waters, But his feet are not yet frozen, Neither is his head endangered.\n\nWhen the second night Frost lingered, He began to grow important, He became a fierce intruder, Fearless grew in his invasions, Freezes everything before him; Sends the fiercest cold of Northland, Turns to ice the boundless waters.\n\nEver thicker, thicker, thicker, Grew the ice on sea and ocean, Ever deeper, deeper, deeper, Fell the snow on field and forest, Froze the hero's ship of beauty, Cold and lifeless bark of Ahti; Sought to freeze wild Lemminkainen, Freeze him lifeless as his vessel, Asked the minstrel for his life-blood, For his ears, and feet, and fingers.\n\nThen the hero, Lemminkainen, Angry grew and filled with magic, Hurled the black-frost to the fire-god, Threw him to the fiery furnace, Held him in his forge of iron, Then addressed the frost as follows: \"Frost, thou evil son of Northland, Dire and only son of Winter, Let my members not be stiffened, Neither ears, nor feet, nor fingers, Neither let my head be frozen."

