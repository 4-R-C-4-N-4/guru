[content]
body = "Underneath Manala's fire-rock Are their ever-flaming couches, For their pillows hissing serpents, Vipers green their writhing covers, For their drink the blood of adders, For their food the pangs of hunger, Pain and agony their solace; If thou wishest joy eternal, Shun the kingdom of Tuoui!\""

