[content]
body = "Surely would the winds destroy it, Far away the waves would wash it.\" Then the daughter of the Ether, Now the hapless water-mother, Raised her shoulders out of water, Raised her knees above the ocean, That the duck might build her dwelling, Build her nesting-place in safety.\n\nThereupon the duck in beauty, Flying slowly, looking round her, Spies the shoulders of the maiden, Sees the knees of Ether's daughter, Now the hapless water-mother, Thinks them to be grassy hillocks, On the blue back of the ocean.\n\nThence she flies and hovers slowly, Lightly on the knee she settles, Finds a nesting-place befitting, Where to lay her eggs in safety.\n\nHere she builds her humble dwelling, Lays her eggs within, at pleasure, Six, the golden eggs she lays there, Then a seventh, an egg of iron; Sits upon her eggs to hatch them, Quickly warms them on the knee-cap Of the hapless water-mother; Hatches one day, then a second, Then a third day sits and hatches.\n\nWarmer grows the water round her, Warmer is her bed in ocean, While her knee with fire is kindled, And her shoulders too are burning, Fire in every vein is coursing.\n\nQuick the maiden moves her shoulders, Shakes her members in succession, Shakes the nest from its foundation, And the eggs fall into ocean, Dash in pieces on the bottom Of the deep and boundless waters.\n\nIn the sand they do not perish, Not the pieces in the ocean; But transformed, in wondrous beauty All the fragments come together Forming pieces two in number, One the upper, one the lower, Equal to the one, the other.\n\nFrom one half the egg, the lower, Grows the nether vault of Terra: From the upper half remaining, Grows the upper vault of Heaven; From the white part come the moonbeams, From the yellow part the sunshine, From the motley part the starlight, From the dark part grows the cloudage; And the days speed onward swiftly, Quickly do the years fly over, From the shining of the new sun From the lighting of the full moon.\n\nStill the daughter of the Ether, Swims the sea as water-mother, With the floods outstretched before her, And behind her sky and ocean.\n\nFinally about the ninth year, In the summer of the tenth year, Lifts her head above the surface, Lifts her forehead from the waters, And begins at last her workings, Now commences her creations, On the azure water-ridges, On the mighty waste before her.\n\nWhere her hand she turned in water, There arose a fertile hillock; Wheresoe'er her foot she rested, There she made a hole for fishes; Where she dived beneath the waters, Fell the many deeps of ocean; Where upon her side she turned her, There the level banks have risen; Where her head was pointed landward, There appeared wide bays and inlets; When from shore she swam a distance, And upon her back she rested, There the rocks she made and fashioned, And the hidden reefs created, Where the ships are wrecked so often, Where so many lives have perished.\n\nThus created were the islands, Rocks were fastened in the ocean, Pillars of the sky were planted, Fields and forests were created, Checkered stones of many colors, Gleaming in the silver sunlight, All the rocks stood well established; But the singer, Wainamoinen, Had not yet beheld the sunshine, Had not seen the golden moonlight, Still remaining undelivered."

