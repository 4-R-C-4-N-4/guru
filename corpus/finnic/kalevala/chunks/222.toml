[content]
body = "Wainamoinen, old and truthful, Thus addresses his companion: \"O thou hero, Lemminkainen, Stoop and look beneath this war-ship, See on what this boat is anchored, See on what our craft is banging, In this broad expanse of water, In the broad-lake's deepest soundings, If upon some rock or tree-snag, Or upon some other hindrance.\" Thereupon wild Lemminkainen Looked beneath the magic vessel, Peering through the crystal waters, Spake and these the words be uttered: \"Does not rest upon a sand-bar, Nor upon a rock, nor tree-snag, But upon the back and shoulders Of the mighty pike of Northland, On the fin-bones of the monster.\" Wainamoinen, old and trusty, Spake these words to Lemminkainen: \"Many things we find in water, Rocks, and trees, and fish, and sea-duck; Are we on the pike's broad shoulders, On the fin-bones of the monster, Pierce the waters with thy broadsword, Cut the monster into pieces.\" Thereupon wild Lemminkainen, Reckless wizard, filled with courage, Pulls his broadsword from his girdle, From its sheath, the bone-divider, Strikes with might of magic hero, Headlong falls into the water; And the blacksmith, Ilmarinen, Lifts the wizard from the river, Speaks these words to dripping Ahti: \"Accidents will come to mortals, Accidents will come to heroes, By the hundreds, by the thousands, Even to the gods above us!\" Then the blacksmith, Ilmarinen, Drew his broadsword from his girdle, From its sheath his blade of honor, Tried to slay the pike of Northland With the weapon of his forging; But he broke his sword in pieces, Did not harm the water-monster.\n\nWainamoinen, old and trusty, Thus addresses his companions \"Poor apologies for heroes!\n\nWhen occasion calls for victors, When we need some great magician, Need a hero filled with valor, Then the arm that comes is feeble, And the mind insane or witless, Strength and reason gone to others!\" Straightway ancient Wainamoinen, Miracle of strength and wisdom, Draws his fire-sword from his girdle, Wields the mighty blade of magic, Strikes the waters as the lightning, Strikes the pike beneath the vessel, And impales, the mighty monster; Raises him above the surface, In the air the pike he circles, Cuts the monster into pieces; To the water falls the pike-tail, To the ship the head and body; Easily the ship moves onward.\n\nWainamoinen, old and faithful, To the shore directs his vessel, On the strand the boat he anchors, Looks in every nook and corner For the fragments of the monster; Gathers well the parts together, Speaks these words to those about him: \"Let the oldest of the heroes Slice for me the pike of Northland, Slice the fish to fitting morsels.\" Answered all the men and heroes, And the maidens spake, assenting: \"Worthier the catcher's fingers, Wainamoinen's hands are sacred!\" Thereupon the wise magician Drew a fish-knife from his girdle, Sliced the pike to fitting morsels, Spake again to those about him: \"Let the youngest of the maidens Cook for me the pike of Northland, Set for me a goodly dinner!\" All the maidens quick responded, All the virgins vied in cooking; Neither could outdo the other, Thus the pike was rendered toothsome."

