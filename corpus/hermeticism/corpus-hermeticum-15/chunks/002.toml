[content]
body = "269 natures visible—of Fire, and Water, and of Earth, depending from one Root.\n\n1 Whence, too, it 2 is believed to be the Treasury 3 of every matter.\n\nIt sendeth forth of its 4 abundance, and in the place [of what it sendeth forth] receiveth the subsistence from above.\n\n5 For thus the Demiurge 6 —I mean the Sun—eternally doth order Heaven and Earth, pouring down Essence, 7 and taking Matter up, drawing both round Himself and to Himself all things, and from Himself giving all things to all.\n\nFor He it is whose goodly energies extend not only through the Heaven and the Air, but also onto Earth, right down unto the lowest Depth and the Abyss.\n\n6.\n\nAnd if there be an Essence which the mind alone can grasp, 8 this is his Substance, 9 the reservoir 10 of which would be His Light.\n\np.\n\n270 But whence this [Substance] doth arise, or floweth forth, He, [and He] only, knows.\n\n* * * * * Or rather, in space and nature, He is near unto Himself .\n\n.\n\n.\n\nthough as He is not seen by us, .\n\n.\n\n.\n\nunderstand [Him] by conjecture.\n\n1 7.\n\nThe spectacle of Him, however, is not left unto conjecture; nay [for] His very rays, 2 in greatest splendour, shine all round on all the Cosmos that doth lie above and lie below.\n\nFor He is stablished in the midst, wreathed with the Cosmos, 3 and just as a good charioteer, He safely drives the cosmic team, 4 and holds them in unto Himself, 5 lest they should run away in dire disorder.\n\nThe reins are Life, and Soul, and Spirit, Deathlessness, and Genesis.\n\np.\n\n271 He lets it, then, drive [round] not far off from Himself—nay, if the truth be said, together with Himself.\n\n8.\n\nAnd in this way He operates 1 all things.\n\nTo the immortals He distributeth perpetual permanence; and with the upper hemisphere of His own Light—all that he sends above from out His other side, 2 [the side of him] which looks to Heaven—He nourisheth the deathless parts of Cosmos.\n\nBut with that side that sendeth down [its Light], and shineth round all of the hemisphere 3 of Water, and of Earth, and Air, He vivifieth, and by births and changes keepeth in movement to and fro the animals 4 in these [the lower] parts of Cosmos.\n\n.\n\n.\n\n.\n\n9.\n\nHe changes them in spiral fashion, and doth transform them into one another, genus to genus, species into species, their mutual changes into one another being balanced—just as He does when He doth deal with the Great Bodies.\n\nFor in the case of every body, [its] permanence [consists in] transformation.\n\nIn case of an immortal one, there is no p.\n\n272 dissolution; but when it is a mortal one, it is accompanied with dissolution.\n\n1 And this is how the deathless body doth differ from the mortal, and how the mortal one doth differ from the deathless.\n\n10.\n\nMoreover, as His Light’s continuous, so is His Power of giving Life to lives continuous, and not to be brought to an end in space or in abundance."

