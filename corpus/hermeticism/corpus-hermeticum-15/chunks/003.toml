[content]
body = "For there are many choirs of daimons round Him, like unto hosts of very various kinds; who though they dwell with mortals, yet are not far from the immortals; but having as their lot from here unto the spaces of the Gods, 2 they watch o’er the affairs of men, and work out things appointed by the Gods—by means of storms, whirlwinds and hurricanes, by transmutations wrought by fire and shakings of the earth, 3 with famines also and with wars requiting [man’s] impiety,—for this is in man’s case the greatest ill against the Gods.\n\n11.\n\nFor that the duty of the Gods is to give benefits; the duty of mankind is to give worship 4 ; the duty of the daimons is to give requital.\n\nFor as to all the other things men do, through p.\n\n273 error, or foolhardiness, or by necessity, which they call Fate, 1 or ignorance—these are not held requitable among the Gods; impiety alone is guilty at their bar.\n\n12.\n\nThe Sun is the preserver 2 and the nurse of every class.\n\n3 And just as the Intelligible World, 4 holding the Sensible in its embrace, fills it [all] full, distending it with forms of every kind and every shape—so, too, the Sun distendeth all in Cosmos, affording births to all, and strengtheneth them.\n\nWhen they are weary or they fail, He takes them in His arms again.\n\n13.\n\nAnd under Him is ranged the choir of daimons—or, rather, choirs; for these are multitudinous and very varied, ranked underneath the groups of Stars, 5 in equal number with each one of them.\n\nSo, marshalled in their ranks, they are the ministers of each one of the Stars, being in their natures good, and bad, that is, in their activities (for that a daimon’s essence is activity); while p.\n\n274 some of them are [of] mixed [natures], good and bad.\n\n14.\n\nTo all of these has been allotted the authority o’er things upon the Earth; and it is they who bring about the multifold confusion of the turmoils on the Earth—for states and nations generally, and for each individual separately.\n\nFor they do shape our souls like to themselves, and set them moving with them,—obsessing nerves, and marrow, veins and arteries, the brain itself, down to the very heart.\n\n1 15.\n\nFor on each one of us being born and made alive, the daimons take hold on us—those [daimones] who are in service at that moment [of the wheel] of Genesis, who are ranged under each one of the Stars.\n\n2 For that these change at every moment; they do not stay the same, but circle back again.\n\nThese, then, descending through the body 3 to the two parts 4 of the soul, set it 5 awhirling, each one towards its own activity.\n\nBut the soul’s rational part is set above the lordship of the daimons—designed to be receptacle of God.\n\np.\n\n275 16.\n\nWho then doth have a Ray shining upon him through the Sun within his rational part—and these in all are few on them the daimons do not act; for no one of the daimons or of Gods has any power against one Ray of God.\n\nAs for the rest, they are all led and driven, soul and body, by the daimons—loving and hating the activities of these.\n\nThe reason ( logos ), [then,] is not the love that is deceived and that deceives."

