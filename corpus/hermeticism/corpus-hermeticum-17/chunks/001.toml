body = "Index Previous Next Thrice-Greatest Hermes - Volume 2 by G.R.S. Mead p. 285 CORPUS HERMETICUM (XVII.) [OF ASCLEPIUS TO THE KING] (Text: R. 354; Pat. at end of last piece.) * * * * * * * * * * * * * * * * * * * * * * * * * * * * * * Asclepius. If thou dost think [of it], O King, even of bodies there are things bodiless. 1 The King. What [are they]?—(asked the King.) Asc. The bodies that appear in mirrors—do they not seem then to have no body? The King. It is so, O Asclepius 2 ; thou thinkest like a God 3 !—(the King replied.) p. 286 Asc. There are things bodiless as well as these; for instance, forms 1 —do not they seem to thee to have no body, but to appear in bodies not only of the things which are ensouled, but also of those which are not ensouled? The King. Thou sayest well, Asclepius. Asc. Thus, [then,] there are reflexions of things bodiless on bodies, and of bodies too upon things bodiless—that is to say, [reflexions] of the Sensible on the Intelligible World, and of the [World] Intelligible on the Sensible. Wherefore, pay worship to the images, O King, since they too have their forms as from the World Intelligible. (Thereon His Majesty arose and said:) The King. It is the hour, 2 O Prophet, to see about the comfort of our guests. To-morrow, [then,] will we resume our sacred converse. 3 Footnotes 285:1 Cf. Plat., Soph. , 229 D, 240 A, 246 B. 285:2 The corrector of B has changed the name Asclepius into Tat, as he has everywhere in C. H. , ii. (iii.); R. 193, 1. 285:3 θείως. 286:1 Or ideas. 286:2 Cf. Plat., Soph. , 241 B. 286:3 θεολογῄσομεν. Next: Commentary"

