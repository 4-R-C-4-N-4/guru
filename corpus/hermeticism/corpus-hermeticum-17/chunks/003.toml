[content]
body = "Just as the Sun, the nurse of all the things that grow, on his first rising, gathers unto himself the first-fruits of their yield with his most mighty hands, using his rays as though it were for plucking off their fruits—yea, [for] his rays are [truly] hands for him who plucketh first the most ambrosial [essences] of plants—so, too, should we, beginning from the Better [One], and [thus] recipient of His wisdom’s stream, and turning it upon the garden of our souls above the heavens, —we should [direct and] train these [streams] of blessing back again unto their source, [blessing] whose entire power of germination [in us] He hath Himself poured into us.\n\n12.\n\n’Tis fit ten thousand tongues and voices should be used to send His blessings back again unto the all-pure God, who is the Father of our souls; and though we cannot utter what is fit—for we are [far] unequal to the task—[yet will we say what best we can].\n\nFor Babes just born have not the strength to sing their Father’s glory as it should be sung; but they give proper thanks for them, according to their strength, and meet with pardon for their feebleness.\n\nNay, it is rather that God’s glory doth consist in this [one] very thing—that He is greater than His children; and that the prelude and the source, the middle and the end, of blessings, is to confess the Father to be infinitely puissant and never knowing what a limit means.\n\n13.\n\nSo is it, too, in the King’s case.\n\nFor that we men, as though we were the children of the King, feel it our natural duty to give praise to him.\n\nStill must we ask for pardon [for our insufficiency], e’en though ’tis granted by our Sire before we [even] ask.\n\nAnd as it cannot be the Sire will turn from Babes new-born because they are so weak, but rather will rejoice when they begin to recognise [his love] —so also will the Gnosis of the all [rejoice], which doth distribute life to all, and power of giving blessing back to God, which He hath given [us].\n\n14.\n\nFor God, being Good, and having in Himself eternally the limit of His own eternal fitness, and being deathless, and containing in Himself that lot of that inheritance that cannot come unto an end, and [thus] for ever ever-flowing from out that energy of His, He doth send tidings to this world down here [to urge us] to the rendering of praise that brings us home again.\n\nWith Him, therefore, is there no difference with one another; there is no partiality with Him.\n\nBut they are one in Thought.\n\nOne is the Prescience of all.\n\nThey have one Mind—their Father.\n\nOne is the Sense that’s active through them— their passion for each other.\n\n’Tis Love Himself who worketh the one harmony of all.\n\n15.\n\nThus, therefore, let us sing the praise of God.\n\nNay, rather, let us [first] descend to those who have received their sceptres from Him.\n\nFor that we ought to make beginning with our Kings, and so by practising ourselves on them, accustom us to songs of praise, and train ourselves in pious service to the Better [One].\n\n[We ought] to make the very first beginnings of our exercise of praise begin from him, and through him exercise the practice [of our praise], that so there may be in us both the exercising of our piety towards God, and of our praise to Kings.\n\n16.\n\nFor that we ought to make return to them, in that they have extended the prosperity of such great peace to us."

