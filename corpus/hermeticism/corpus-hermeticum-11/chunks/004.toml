[content]
body = "But if He is not only not inactive, but perfect [God], then He doth make all things.\n\nGive thou thyself to Me, My Hermes, for a little while, and thou shalt understand more easily how that God's work is one, in order that all things may be - that are being made, or once have been, or that are going to be made.\n\nAnd this is, My beloved, Life; this is the Beautiful; this is the Good; this, God.\n\n14.\n\nAnd if thou wouldst in practice understand [this work], behold what taketh place with thee desiring to beget.\n\nYet this is not like unto that, for He doth not enjoy.\n\nFor that indeed He hath no other one to share in what He works, for working by Himself, He ever is at work, Himself being what He doth.\n\nFor did He separate Himself from it, all things would [then] collapse, and all must die, Life ceasing.\n\nBut if all things are lives, and also Life is one; then, one is God.\n\nAnd, furthermore, if all are lives, both those in Heaven and those on Earth, and One Life in them all is made to be by God, and God is it <i.e., God is the One Life> - then, all are made by God.\n\nLife is the making-one of Mind and Soul; accordingly Death is not the destruction of those that are at-oned, but the dissolving of their union.\n\n15.\n\nAeon, moreover, is God's image; Cosmos [is] Aeon's; the Sun, of Cosmos; and Man, [the image] of the Sun.\n\nThe people call change death, because the body is dissolved, and life, when it's dissolved, withdraws to the unmanifest.\n\nBut in this sermon (logos), Hermes, My beloved, as thou dost hear, I say the Cosmos also suffers change - for that a part of it each day is made to be in the unmanifest - yet it is ne'er dissolved.\n\nThese are the passions of the Cosmos - revolvings and concealments; revolving is conversion and concealment renovation.\n\n16.\n\nThe Cosmos is all-formed - not having forms external to itself, but changing them itself within itself.\n\nSince, then, Cosmos is made to be all-formed, what may its maker be?\n\nFor that, on the one hand, He should not be void of all form; and, on the other hand, if He's all-formed, He will be like the Cosmos.\n\nWhereas, again, has He a single form, He will thereby be less than Cosmos.\n\nWhat, then, say we He is?\n\n- that we may not bring round our sermon (logos) into doubt; for naught that mind conceives of God is doubtful.\n\nHe, then, hath one idea, which is His own alone, which doth not fall beneath the sight, being bodiless, and [yet] by means of bodies manifesteth all [ideas].\n\nAnd marvel not that there's a bodiless idea.\n\n17.\n\nFor it is like the form of reason (logos) and mountain-tops in pictures.\n\nFor they appear to stand out strongly from the rest, but really are quite smooth and flat.\n\nAnd now consider what is said more boldly, but more truly!\n\nJust as man cannot live apart from Life, so neither can God live without [His] doing good.\n\nFor this is as it were the life and motion as it were of God - to move all things and make them live.\n\n18.\n\nNow some of the things said should bear a sense peculiar to themselves.\n\nSo understand, for instance, what I'm going to say.\n\nAll are in God, [but] not as lying in a place.\n\nFor place is both a body and immovable, and things that lie do not have motion."

