[content]
body = "Now things lie one way in the bodiless, another way in being made manifest.\n\nThink, [then,] of Him who doth contain them all; and think, that than the bodiless naught is more comprehensive, or swifter, or more potent, but it is the most comprehensive, the swiftest, and most potent of them all.\n\n19.\n\nAnd, thus, think from thyself, and bid thy soul go unto any land, and there more quickly than thy bidding will it be.\n\nAnd bid it journey oceanwards; and there, again, immediately 'twill be, not as if passing on from place to place, but as if being there.\n\nAnd bid it also mount to heaven; and it will need no wings, not will aught hinder it, nor fire of sun, nor auther, nor vortex-swirl, nor bodies of the other stars; but, cutting through them all, it will soar up to the last Body [of them all].\n\nAnd shouldst thou will to break through this as well, and contemplate what is beyond - if there be aught beyond the Cosmos; it is permitted thee.\n\n20.\n\nBehold what power, what swiftness, thou dost have!\n\nAnd canst thou do all of these things, and God not [do them]?\n\nThen, in this way know God; as having all things in Himself as thoughts, the whole Cosmos itself.\n\nIf, then, thou dost not make thyself like unto God, thou canst not know Him.\n\nFor like is knowable unto like [alone].\n\nMake, [then,] thyself to grow to the same stature as the Greatness which transcends all measure; leap forth from every body; transcend all time; become Eternity <literally, Aeon>; and [thus] shalt thou know God.\n\nConceiving nothing is impossible unto thyself, think thyself deathless and able to know all - all arts, all sciences, the way of every life.\n\nBecome more lofty than all height, and lower than all depth.\n\nCollect into thyself all senses of [all] creatures - of fire, [and] water, dry and moist.\n\nThink that thou art at the same time in every place - in earth, in sea, in sky; not yet begotten, in the womb, young, old, [and] dead, in after-death conditions.\n\nAnd if thou knowest all these things at once - times, places, doings, qualities, and quantities; thou canst know God.\n\n21.\n\nBut if thou lockest up thy soul within thy body, and dost debase it, saying: I nothing know; I nothing can; I fear the sea; I cannot scale the sky; I know not who I was, who I shall be - what is there [then] between [thy] God and thee?\n\nFor thou canst know naught of things beautiful and good so long as thou dost love thy body and art bad.\n\nThe greatest bad there is, is not to know God's Good; but to be able to know [Good], and will, and hope, is a Straight Way, the Good's own [Path], both leading there and easy.\n\nIf thou but settest thy foot thereon, 'twill meet thee everywhere, 'twill everywhere be seen, both where and when thou dost expect it not - waking, sleeping, sailing, journeying, by night, by day, speaking, [and] saying naught.\n\nFor there is naught that is not image of the Good.\n\n22.\n\nHermes: Is God unseen?\n\nMind: Hush!\n\nWho is more manifest than He?\n\nFor this one reason hath He made all things, that through them all thou mayest see Him.\n\nThis is the Good of God, this [is] His Virtue - that He may be manifest through all."

