[content]
body = "And that all there are subject unto Genesis, My dearest Hermes, thou hast no longer need to learn of Me.\n\nFor that they bodies are, have souls, and they are moved.\n\nBut 'tis impossible for them to come together into one without some one to bring them [all] together.\n\nIt must, then, be that such a one as this must be some one who's wholly One.\n\n9.\n\nFor as the many motions of them [all] are different, and as their bodies are not like, yet has one speed been ordered for them all, it is impossible that there should be two or more makers for them.\n\nFor that one single order is not kept among \"the many\"; but rivalry will follow of the weaker with the stronger, and they will strive.\n\nAnd if the maker of the lives that suffer change and death, should be another <from the maker of the immortals>, he would desire to make the deathless ones as well; just as the maker of the deathless ones, [to make the lives] that suffer death.\n\nBut come!\n\nif there be two - if matter's one, and Soul is one, in whose hands would there be the distribution for the making?\n\nAgain, if both of them have some of it, in whose hands may be the greater part?\n\n10.\n\nBut thus conceive it, then; that every living body doth consist of soul and matter, whether [that body be] of an immortal, or a mortal, or an irrational [life].\n\nFor that all living bodies are ensouled; whereas, upon the other hand, those that live not, are matter by itself.\n\nAnd, in like fashion, Soul when in its self is, after its own maker, cause of life; but the cause of all life is He who makes the things that cannot die.\n\nHermes: How, then, is it that, first, lives subject to death are other than the deathless ones?\n\nAnd, next, how is it that Life which knows no death, and maketh deathlessness, doth not make animals immortal?\n\n11.\n\nMind: First, that there is some one who does these things, is clear; and, next, that He is also One, is very manifest.\n\nFor, also, Soul is one, and Life is one, and Matter one.\n\nHermes: But who is He?\n\nMind: Who may it other be than the One God?\n\nWhom else should it beseem to put Soul into lives but God alone?\n\nOne, then, is God.\n\nIt would indeed be most ridiculous, if when thou dost confess the Cosmos to be one, Sun one, Moon one, and Godhead one, thou shouldst wish God Himself to be some one or other of a number!\n\n12.\n\nAll things, therefore, He makes, in many [ways].\n\nAnd what great thing is it for God to make life, soul, and deathlessness, and change, when thou [thyself] dost do so many things?\n\nFor thou dost see, and speak, and hear, and smell, and taste, and touch, and walk, and think, and breathe.\n\nAnd it is not one man who smells, another one who walks, another one who thinks, and [yet] another one who breathes.\n\nBut one is he who doth all these.\n\nAnd yet no one of these could be apart from God.\n\nFor just as, should thou cease from these, thou wouldst no longer be a living thing, so also, should God cease from them (a thing not law to say), no longer is He God.\n\n13.\n\nFor if it hath been shown that no thing can [inactive] be, how much less God?\n\nFor if there's aught he doth not make (if it be law to say), He is imperfect."

