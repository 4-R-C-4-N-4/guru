[content]
body = "The Corpus Hermeticum translated by G.R.S.\n\nMead XI.\n\nMind Unto Hermes <This complex text is written as a revelation from the divine Mind - the \"Man-Shepherd\" of CH I - to Hermes, concerning the nature of God and the universe.\n\nDifficult enough in its own right, it has been made rather more so by some of Mead's most opaque prose.\n\nI have tried to insert clarifications where these are most needed.\n\n<Some notes on terminology may also be useful.\n\nThe term Aeon here, as in many of the so-called \"Gnostic\" writings, refers to the timeless and spaceless realm of ideal being.\n\nThe word cosmos means both \"order\" and \"beauty\" - the same root appears in the word \"cosmetic\".\n\nAdditionally, the words genesis and becoming in the translation are the same word in the Greek original.\n\n<Finally, the word \"inactive\" in square brackets near the beginning of section 13 is Mead's, intended to fill a lacuna in the text.\n\nThe more usual conjecture, as he comments, is \"apart from God\".\n\n- JMG> 1.\n\nMind: Master this sermon (logos), then, Thrice-greatest Hermes, and bear in mind the spoken words; and as it hath come unto Me to speak, I will no more delay.\n\nHermes: As many men say many things, and these diverse, about the All and Good, I have not learned the truth.\n\nMake it, then, clear to me, O Master mine!\n\nFor I can trust the explanation of these things, which comes from Thee alone.\n\n2.\n\nMind: Hear [then], My son, how standeth God and All.\n\nGod; Aeon; Cosmos; Time; Becoming.\n\nGod maketh Aeon; Aeon, Cosmos; Cosmos, Time; and Time, Becoming <or Genesis>.\n\nThe Good - the Beautiful, Wisdom, Blessedness - is <the> essence, as it were, of God; of Aeon, <the essence is> Sameness; of Cosmos, Order; of Time, Change; and of Becoming, Life and Death.\n\nThe energies of God are Mind and Soul; of Aeon, lastingness and deathlessness; of Cosmos, restoration and the opposite thereof; of Time, increase and decrease; and of Becoming, quality.\n\nAeon is, then, in God; Cosmos, in Aeon; in Cosmos; Time; in Time, Becoming.\n\nAeon stands firm round God; Cosmos is moved in Aeon; Time hath its limits <or is accomplished> in the Cosmos; Becoming doth become in Time.\n\n3.\n\nThe source, therfore, of all is God; their essence, Aeon; their matter, Cosmos.\n\nGod's power is Aeon; Aeon's work is Cosmos - which never hath become, yet ever doth become by Aeon.\n\nTherefore will Cosmos never be destroyed, for Aeon's indestructible; nor doth a whit of things in Cosmos perish, for Cosmos is enwrapped by Aeon round on every side.\n\nHermes: But God's Wisdom - what is that?\n\nMind: The Good and Beautiful, and Blessedness, and Virtue's all, and Aeon.\n\nAeon, then, ordereth [Cosmos], imparting deathlessness and lastingness to matter.\n\n4.\n\nFor its beginning doth depend on Aeon, as Aeon doth on God.\n\nNow Genesis <or Becoming> and Time, in Heaven and upon the Earth, are of two natures.\n\nIn Heaven they are unchangeable and indestructible, but on the Earth they're subject unto change and to destruction.\n\nFurther, the Aeon's soul is God; the Cosmos' soul is Aeon; the Earth's soul, Heaven."

