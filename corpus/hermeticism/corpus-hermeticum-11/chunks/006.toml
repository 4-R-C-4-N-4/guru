[content]
body = "For naught's unseen, even of things that are without a body.\n\nMind sees itself in thinking, God in making.\n\nSo far these things have been made manifest to thee, Thrice-greatest one!\n\nReflect on all the rest in the same way with thyself, and thou shalt not be led astray."

