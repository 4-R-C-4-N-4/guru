[content]
body = "The Corpus Hermeticum translated by G.R.S.\n\nMead XIII.\n\nThe Secret Sermon on the Mountain <This dialogue is in many ways the culmination of the whole Corpus, summing up the theory of the Hermetic system at the same time as it provides an intriguing glimpse at the practice.\n\nThe focus of the dialogue is the experience of Rebirth, which involves the replacement of twelve Tormentors within the self by ten divine Powers, leading to the awakening of knowledge of the self and God.\n\n<The \"Secret Hymnody\" (sections 17-20) is presented as a litany for worship, to be performed twice each day, at sunrise and sunset.\n\nIt's interesting to note that while the sunrise worship is performed facing east, the sunset worship is done to the south; Egyptian tradition from Pharaonic times onward saw the west as the direction of death.\n\n<The usual difficulties with the multiple meanings of the Greek word logos appear in the translation, compounded by Mead's awkward style.\n\nAdditionally, one of Mead's few evasions can be found in section 12, where he relates the twelve Tormentors to the \"twelve types-of-life\".\n\nThis should more simply, and more accurately, have been translated as \"the twelve signs of the Zodiac\".\n\nThe Theosophical distaste for astrology may well have been involved here.\n\n- JMG> 1.\n\nTat: [Now] in the General Sermons, father, thou didst speak in riddles most unclear, conversing on Divinity; and when thou saidst no man could e'er be saved before Rebirth, thy meaning thou didst hide.\n\nFurther, when I became thy Suppliant, in Wending up the Mount, after thou hadst conversed with me, and when I longed to learn the Sermon (Logos) on Rebirth (for this beyond all other things is just the thing I know not), thou saidst, that thou wouldst give it me - \"when thou shalt have become a stranger to the world\".\n\nWherefore I got me ready and made the thought in me a stranger to the world-illusion.\n\nAnd now do thou fill up the things that fall short in me with what thou saidst would give me the tradition of Rebirth, setting it forth in speech or in the secret way.\n\nI know not, O Thrice-greatest one, from out what matter and what womb Man comes to birth, or of what seed.\n\n2.\n\nHermes: Wisdom that understands in silence [such is the matter and the womb from out which Man is born], and the True Good the seed.\n\nTat: Who is the sower, father?\n\nFor I am altogether at a loss.\n\nHermes: It is the Will of God, my son.\n\nTat: And of what kind is he that is begotten, father?\n\nFor I have no share of that essence in me, which doth transcend the senses.\n\nThe one that is begot will be another one from God, God's Son?\n\nHermes: All in all, out of all powers composed.\n\nTat: Thou tellest me a riddle, father, and dost not speak as father unto son.\n\nHermes: This Race, my son, is never taught; but when He willeth it, its memory is restored by God.\n\n3.\n\nTat: Thou sayest things impossible, O father, things that are forced.\n\nHence answers would I have direct unto these things.\n\nAm I a son strange to my father's race?\n\nKeep it not, father, back from me.\n\nI am a true-born son; explain to me the manner of Rebirth.\n\nHermes: What may I say, my son?\n\nI can but tell thee this."

