[content]
body = "But they depart (though not all at once) from him who hath been taken pity on by God; and this it is which constitutes the manner of Rebirth.\n\nAnd...\n\n<lacuna in the original text> the Reason (Logos).\n\n8.\n\nAnd now, my son, be still and solemn silence keep!\n\nThus shall the mercy that flows on us from God not cease.\n\nHenceforth rejoice, O son, for by the Powers of God thou art being purified for the articulation of the Reason (Logos).\n\nGnosis of God hath come to us, and when this comes, my son, Not-knowing is cast out.\n\nGnosis of Joy hath come to us, and on its coming, son, Sorrow will flee away to them who give it room.\n\nThe Power that follows Joy do I invoke, thy Self-control.\n\nO Power most sweet!\n\nLet us most gladly bid it welcome, son!\n\nHow with its coming doth it chase Intemperance away!\n\n9.\n\nNow fourth, on Continence I call, the Power against Desire.\n\n<lacuna in the original text> This step, my son, is Righteousness' firm seat.\n\nFor without judgement <other translators read this \"without effort\"> see how she hath chased Unrighteousness away.\n\nWe are made righteous, son, by the departure of Unrighteousness.\n\nPower sixth I call to us - that against Avarice, Sharing-with-all.\n\nAnd now that Avarice is gone, I call on Truth.\n\nAnd Error flees, and Truth is with us.\n\nSee how [the measure of] the Good is full, my son, upon Truth's coming.\n\nFor Envy is gone from us; and unto Truth is joined the Good as well, with Life and Light.\n\nAnd now no more doth any torment of the Darkness venture nigh, but vanquished [all] have fled with whirring wings.\n\n10.\n\nThou knowest [now], my son, the manner of Rebirth.\n\nAnd when the Ten is come, my son, that driveth out the Twelve, the Birth in understanding <literally \"intellectual birth\", noera genesis > is complete, and by this birth we are made into Gods.\n\nWho then doth by His mercy gain this Birth in God, abandoning the body's senses, knows himself [to be of Light and Life] and that he doth consist of these, and [thus] is filled with bliss.\n\n11.\n\nTat: By God made steadfast, father, no longer with the sight my eyes afford I look on things, but with the energy the Mind doth give me through the Powers.\n\nIn Heaven am I, in earth, in water, air; I am in animals, in plants; I'm in the womb, before the womb, after the womb; I'm everywhere!\n\nBut further tell me this: How are the torments of the Darkness, when they are twelve in number, driven out by the ten Powers?\n\nWhat is the way of it, Thrice-greatest one?\n\n12.\n\nHermes: This dwelling-place through which we have just passed <i.e., the human body>, my son, is constituted from the circle of the twelve types-of-life, this being composed of elements, twelve in number, but of one nature, an omniform idea.\n\nFor man's delusion there are disunions in them, son, while in their action they are one.\n\nNot only can we never part Rashness from Wrath; they cannot even be distinguished.\n\nAccording to right reason (logos), then, they <the Twelve> naturally withdraw once and for all, in as much as they are chased out by no less than ten powers, that is, the Ten.\n\nFor, son, the Ten is that which giveth birth to souls.\n\nAnd Life and Light are unified there, where the One hath being from the Spirit."

