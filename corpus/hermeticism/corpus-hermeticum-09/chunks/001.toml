body = "The Corpus Hermeticum translated by G.R.S.\n\nMead IX.\n\nOn Thought and Sense <This somewhat diffuse essay covers a series of topics, starting with (and to some extent from) the concept that the set of perceptions we call \"thoughts\" and the set we call \"sensory perceptions\" are not significantly different from each other.\n\nThe implications of this idea play a significant role in later Hermetic thought, particularly in the areas of magic and the Art of Memory; in this tractate, though, the issues involved are barely touched, and the argument wanders into moral dualisms and the equally important, but distinct, idea that the Cosmos is itself a divine creative power.\n\n<Section 10, in which understanding is held up as the source and precondition of belief, should probably be seen as part of the same ancient debate on the roles of faith and reason that gave rise to Tertullian's famous credo quia absurdum (\"I believe because it is absurd\").\n\n- JMG> 1.\n\nI gave the Perfect Sermon (Logos) yesterday, Asclepius; today I think it right, as sequel thereunto, to go through point by point the Sermon about Sense.\n\nNow sense and thought do seem to differ, in that the former has to do with matter, the latter has to do with substance.\n\nBut unto me both seem to be at-one and not to differ - in men I mean.\n\nIn other lives <or living creatures> sense is at-oned with Nature, but in men thought.\n\nNow mind doth differ just as much from thought as God doth from divinity.\n\nFor that divinity by God doth come to be, and by mind thought, the sister of the word (logos) and instruments of one another.\n\nFor neither doth the word (logos) find utterance without thought, nor is thought manifested without word.\n\n2.\n\nSo sense and thought both flow together into man, as though they were entwined with one another.\n\nFor neither without sensing can one think, nor without thinking sense.\n\nBut it is possible [they say] to think a thing apart from sense, as those who fancy sights in dreams.\n\nBut unto me it seems that both of these activities occur in dream-sight, and sense doth pass out of the sleeping to the waking state.\n\nFor man is separated into soul and body, and only when the two sides of his sense agree together, does utterance of its thought conceived by mind take place.\n\n3.\n\nFor it is mind that doth conceive all thoughts - good thoughts when it receives the seeds from God, their contraries when [it receiveth them] from the daimonials; no part of Cosmos being free of daimon, who stealthily doth creep into the daimon who's illumined by God's light <i.e., the human soul>, and sow in him the seed of its own energy.\n\nAnd mind conceives the seed thus sown, adultery, murder, parricide, [and] sacrilege, impiety, [and] strangling, casting down precipices, and all such other deeds as are the work of evil daimons.\n\n4.\n\nThe seeds of God, 'tis true, are few, but vast and fair, and good - virtue and self-control, devotion.\n\nDevotion is God-gnosis; and he who knoweth God, being filled with all good things, thinks godly thoughts and not thoughts like the many [think].\n\nFor this cause they who Gnostic are, please not the many, nor the many them.\n\nThey are thought mad and laughted at; they're hated and despised, and sometimes even put to death.\n\nFor we did say that bad must needs dwell on earth, where 'tis in its own place."

