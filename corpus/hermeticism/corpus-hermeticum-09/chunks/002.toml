[content]
body = "Its place is earth, and not Cosmos, as some will sometimes say with impious tongue.\n\nBut he who is a devotee of God, will bear with all - once he has sensed the Gnosis.\n\nFor such an one all things, e'en though they be for others bad, are for him good; deliberately he doth refer them all unto the Gnosis.\n\nAnd, thing most marvelous, 'tis he alone who maketh bad things good.\n\n5.\n\nBut I return once more to the Discourse (Logos) on Sense.\n\nThat sense doth share with thought in man, doth constitute him man.\n\nBut 'tis not [every] man, as I have said, who benefits by thought; for this man is material, that other one substantial.\n\nFor the material man, as I have said, [consorting] with the bad, doth have his seed of thought from daimons; while the substantial men [consorting] with the Good, are saved by God.\n\nNow God is Maker of all things, and in His making, He maketh all [at last] like to Himself; but they, while they're becoming good by exercise of their activity, are unproductive things.\n\nIt is the working of the Cosmic Course that maketh their becomings what they are, befouling some of them with bad and others of them making clean with good.\n\nFor Cosmos, too, Asclepius, possesseth sense-and-thought peculiar to itself, not like that of man; 'tis not so manifold, but as it were a better and a simpler one.\n\n6.\n\nThe single sense-and-thought of Cosmos is to make all things, and make them back into itself again, as Organ of the Will of God, so organized that it, receiving all the seeds into itself from God, and keeping them within itself, may make all manifest, and [then] dissolving them, make them all new again; and thus, like a Good Gardener of Life, things that have been dissolved, it taketh to itself, and giveth them renewal once again.\n\nThere is no thing to which it gives not life; but taking all unto itself it makes them live, and is at the same time the Place of Life and its Creator.\n\n7.\n\nNow bodies matter [-made] are in diversity.\n\nSome are of earth, of water some, some are of air, and some of fire.\n\nBut they are all composed; some are more [composite], and some are simpler.\n\nThe heavier ones are more [composed], the lighter less so.\n\nIt is the speed of Cosmos' Course that works the manifoldness of the kinds of births.\n\nFor being a most swift Breath, it doth bestow their qualities on bodies together with the One Pleroma - that of Life.\n\n8.\n\nGod, then, is Sire of Cosmos; Cosmos, of all in Cosmos.\n\nAnd Cosmos is God's Son; but things in Cosmos are by Cosmos.\n\nAnd properly hath it been called Cosmos [Order]; for that it orders all with their diversity of birth, with its not leaving aught without its life, with the unweariedness of its activity, the speed of its necessity, the composition of its elements, and order of its creatures.\n\nThe same, then, of necessity and propriety should have the name of Order.\n\nThe sense-and-thought, then, of all lives doth come into them from without, inbreathed by what contains [them all]; whereas Cosmos receives them once for all together with its coming into being, and keeps them as a gift from God.\n\n9.\n\nBut God is not, as some suppose, beyond the reach of sense-and-thought.\n\nIt is through superstition men thus impiously speak."

