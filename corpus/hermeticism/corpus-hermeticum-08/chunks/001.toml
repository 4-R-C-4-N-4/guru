[content]
body = "The Corpus Hermeticum translated by G.R.S.\n\nMead VIII.\n\nThat No One of Existing Things doth Perish, but Men in Error Speak of Their Changes as Destructions and as Deaths <The idea of cyclic change central to CH III, \"The Sacred Sermon\", also takes center stage here.\n\nA current of ancient speculation grounded in astrology held that as the planets returned after vast cycles of time to the same positions, so all events on earth would repeat themselves precisely into eternity in the future - and had done so from eternity in the past.\n\nThe technical term for this recurrence, apocatastasis , is the word Mead translates as \"restoration\" in the beginning of section 4.\n\n<Mead footnotes this tractate as \"obscure\" and \"faulty\" in places, and his translation of the beginning of section 3 is conjectural.\n\n- JMG> 1.\n\n[Hermes:] Concerning Soul and Body, son, we now must speak; in what way Soul is deathless, and whence comes the activity in composing and dissolving Body.\n\nFor there's no death for aught of things [that are]; the thought this word conveys, is either void of fact, or [simply] by the knocking off a syllable what is called \"death\", doth stand for \"deathless\".\n\nFor death is of destruction, and nothing in the Cosmos is destroyed.\n\nFor if Cosmos is second God, a life <or living creature> that cannot die, it cannot be that any part of this immortal life should die.\n\nAll things in Cosmos are parts of Cosmos, and most of all is man, the rational animal.\n\n2.\n\nFor truly first of all, eternal and transcending birth, is God the universals' Maker.\n\nSecond is he \"after His image\", Cosmos, brought into being by Him, sustained and fed by Him, made deathless, as by his own Sire, living for aye, as ever free from death.\n\nNow that which ever-liveth, differs from the Eternal; for He hath not been brought to being by another, and even if He have been brought to being, He hath not been brought to being by Himself, but ever is brought into being.\n\nFor the Eternal, in that It is eternal, is the all.\n\nThe Father is Himself eternal of Himself, but Cosmos hath become eternal and immortal by the Father.\n\n3.\n\nAnd of the matter stored beneath it <i.e., beneath the cosmos>, the Father made of it a universal body, and packing it together made it spherical - wrapping it round the life - [a sphere] which is immortal in itself, and that doth make materiality eternal.\n\nBut He, the Father, full-filled with His ideas, did sow the lives <or living creatures> into the sphere, and shut them in as in a cave, willing to order forth the life with every kind of living.\n\nSo He with deathlessness enclosed the universal body, that matter might not wish to separate itself from body's composition, and so dissolve into its own [original] unorder.\n\nFor matter, son, when it was yet incorporate <i.e., not yet formed into bodies>, was in unorder.\n\nAnd it doth still retain down here this [nature of unorder] enveloping the rest of the small lives <or living creatures> - that increase-and-decrease which men call death.\n\n4.\n\nIt is round earthly lives that this unorder doth exist.\n\nFor that the bodies of the heavenly ones preserve one order allotted to them by the Father as their rule; and it is by the restoration of each one [of them] this order is preserved indissolute.\n\nThe \"restoration\" of bodies on the earth is thus their composition, whereas their dissolution restores them to those bodies which can never be dissolved, that is to say, which know no death."

