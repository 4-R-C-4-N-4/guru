[content]
body = "The Corpus Hermeticum translated by G.R.S.\n\nMead V.\n\nThough Unmanifest God Is Most Manifest <This sermon is a fairly straightforward Hermetic version of the \"argument by design\", a standard approach since ancient times to a proof of the existence of God.\n\nTypically, for a Hermetic tractate, its choice of evidence includes a paean on the beauty and perfection of the human form.\n\n- JMG> 1.\n\nI will recount to thee this sermon (logos) too, O Tat, that thou may'st cease to be without the mysteries of the God beyond all name.\n\nAnd mark thou well how that which to the many seems unmanifest, will grow most manifest for thee.\n\nNow were it manifest, it would not be.\n\nFor all that is made manifest is subject to becoming, for it hath been made manifest.\n\nBut the Unmanifest for ever is, for It doth not desire to be made manifest.\n\nIt ever is, and maketh manifest all other things.\n\nBeing Himself unmanifest, as ever being and ever making-manifest, Himself is not made manifest.\n\nGod is not made Himself; by thinking-manifest <i.e., thinking into manifestation>, He thinketh all things manifest.\n\nNow \"thinking-manifest\" deals with things made alone, for thinking-manifest is nothing else than making.\n\n2.\n\nHe, then, alone who is not made, 'tis clear, is both beyond all power of thinking-manifest, and is unmanifest.\n\nAnd as He thinketh all things manifest, He manifests through all things and in all, and most of all in whatsoever things He wills to manifest.\n\nDo thou, then, Tat, my son, pray first unto our Lord and Father, the One-and-Only One, from whom the One doth come, to show His mercy unto thee, in order that thou mayest have the power to catch a thought of this so mighty God, one single beam of Him to shine into thy thinking.\n\nFor thought alone \"sees\" the Unmanifest, in that it is itself unmanifest.\n\nIf, then, thou hast the power, He will, Tat, manifest to thy mind's eyes.\n\nThe Lord begrudgeth not Himself to anything, but manifests Himself through the whole world.\n\nThou hast the power of taking thought, of seeing it and grasping it in thy own \"hands\", and gazing face to face upon God's Image.\n\nBut if what is within thee even is unmanifest to thee, how, then, shall He Himself who is within thy self be manifest for thee by means of [outer] eyes?\n\n3.\n\nBut if thou wouldst \"see\" him, bethink thee of the sun, bethink thee of moon's course, bethink thee of the order of the stars.\n\nWho is the One who watcheth o'er that order?\n\nFor every order hath its boundaries marked out by place and number.\n\nThe sun's the greatest god of gods in heaven; to whom all of the heavenly gods give place as unto king and master.\n\nAnd he, this so-great one, he greater than the earth and sea, endures to have above him circling smaller stars than him.\n\nOut of respect to Whom, or out of fear of Whom, my son, [doth he do this]?\n\nNor like nor equal is the course each of these stars describes in heaven.\n\nWho [then] is He who marketh out the manner of their course and its extent?\n\n4.\n\nThe Bear up there that turneth round itself, and carries round the whole cosmos with it - Who is the owner of this instrument?\n\nWho He who hath set round the sea its bounds?\n\nWho He who hath set on its seat the earth?\n\nFor, Tat, there is someone who is the Maker and the Lord of all these things."

