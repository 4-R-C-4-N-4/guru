[content]
body = "It cound not be that number, place and measure could be kept without someone to make them.\n\nNo order whatsoever could be made by that which lacketh place and lacketh measure; nay, even this is not without a lord, my son.\n\nFor if the orderless lacks something, in that it is not lord of order's path, it also is beneath a lord - the one who hath not yet ordained it order.\n\n5.\n\nWould that it were possible for thee to get thee wings, and soar into the air, and, poised midway 'tween earth and heaven, behold the earth's solidity, the sea's fluidity (the flowings of its streams), the spaciousness of air, fire's swiftness, [and] the coursing of the stars, the swiftness of heaven's circuit round them [all]!\n\nMost blessed sight were it, my son, to see all these beneath one sway - the motionless in motion, and the unmanifest made manifest; whereby is made this order of the cosmos and the cosmos which we see of order.\n\n6.\n\nIf thou would'st see Him too through things that suffer death, both on the earth and in the deep, think of a man's being fashioned in the womb, my son, and strictly scrutinize the art of Him who fashions him, and learn who fashioneth this fair and godly image of the Man.\n\nWho [then] is He who traceth out the circles of the eyes; who He who boreth out the nostrils and the ears; who He who openeth [the portal of] the mouth; who He who doth stretch out and tie the nerves; who He who channels out the veins; who He who hardeneth the bones; who He who covereth the flesh with skin; who He who separates the fingers and the joints; who He who widens out a treading for the feet; who He who diggeth out the ducts; who He who spreadeth out the spleen; who he who shapeth heart like to a pyramid; who He who setteth ribs together; who He who wideneth the liver out; who He who maketh lungs like to a sponge; who He who maketh belly stretch so much; who he who doth make prominent the parts most honorable, so that they may be seen, while hiding out of sight those of least honor?\n\n7.\n\nBehold how many arts [employed] on one material, how many labors on one single sketch; and all exceeding fair, and all in perfect measure, yet all diversified!\n\nWho made them all?\n\nWhat mother, or what sire, save God alone, unmanifest, who hath made all things by His Will?\n\n8.\n\nAnd no one saith a statue or a picture comes to be without a sculptor or [without] a painter; doth [then] such workmanship as this exist without a Worker?\n\nWhat depth of blindness, what deep impiety, what depth of ignorance!\n\nSee, [then] thou ne'er, son Tat, deprivest works of Worker!\n\nNay, rather is He greater than all names, so great is He, the Father of them all.\n\nFor verily He is the Only One, and this is His work, to be a father.\n\n9.\n\nSo, if thou forcest me somewhat too bold, to speak, His being is conceiving of all things and making [them].\n\nAnd as without its maker its is impossible that anything should be, so ever is He not unless He ever makes all things, in heaven, in air, in earth, in deep, in all of cosmos, in every part that is and that is not of everything.\n\nFor there is naught in all the world that is not He.\n\nHe is Himself, both things that are and things that are not."

