[content]
body = "A: Are there, then, O Thrice-greatest one, no such things as an empty cask, for instance, and an empty jar, a cup and vat, and other things like unto them?\n\nH: Alack, Asclepius, for thy far-wandering from the truth!\n\nThink'st thou that things most full and most replete are void?\n\n11.\n\nA: How meanest thou, Thrice-greatest one?\n\nH: Is not air body?\n\nA: It is.\n\nH: And doth this body not pervade all things, and so, pervading, fill them?\n\nAnd \"body\"; doth body not consist from blending of the \"four\" <elements>?\n\nFull, then, of air are all thou callest void; and if of air, then of the \"four\".\n\nFurther, of this the converse follows, that all thou callest full are void - of air; for that they have their space filled out with other bodies, and, therefore, are not able to receive the air therein.\n\nThese, then, which thou dost say are void, they should be hollow named, not void; for they not only are, but they are full of air and spirit.\n\n12.\n\nA: Thy argument (logos), Thrice-greatest one, is not to be gainsaid; air is a body.\n\nFurther, it is this body which doth pervade all things, and so, pervading, fill them.\n\nWhat are we, then, to call that space in which the all doth move?\n\nH: The bodiless, Asclepius.\n\nA: What, then, is Bodiless?\n\nH: 'Tis Mind and Reason (logos), whole out of whole, all self-embracing, free from all body, from all error free, unsensible to body and untouchable, self stayed in self, containing all, preserving those that are, whose rays, to use a likeness, are Good, Truth, Light beyond light, the Archetype of soul.\n\nA: What, then, is God?\n\n13.\n\nH: Not any one of these is He; for He it is that causeth them to be, both all and each and every thing of all that are.\n\nNor hath He left a thing beside that is-not; but they are all from things-that-are and not from things-that-are-not.\n\nFor that the things-that-are-not have naturally no power of being anything, but naturally have the power of the inability-to-be.\n\nAnd, conversely, the things-that-are have not the nature of some time not-being.\n\n14.\n\nA: What say'st thou ever, then, God is?\n\nH: God, therefore, is not Mind, but Cause that the Mind is; God is not Spirit, but Cause that Spirit is; God is not Light, but Cause that the Light is.\n\nHence one should honor God with these two names [the Good and Father] - names which pertain to Him alone and no one else.\n\nFor no one of the other so-called gods, no one of men, or daimones, can be in any measure Good, but God alone; and He is Good alone and nothing else.\n\nThe rest of things are separable all from the Good's nature; for [all the rest] are soul and body, which have no place that can contain the Good.\n\n15.\n\nFor that as mighty is the Greatness of the Good as is the Being of all things that are - both bodies and things bodiless, things sensible and intelligible things.\n\nCall thou not, therefore, aught else Good, for thou would'st imious be; nor anything at all at any time call God but Good alone, for so thou would'st again be impious.\n\n16."

