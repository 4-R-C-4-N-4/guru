[content]
body = "The Corpus Hermeticum translated by G.R.S.\n\nMead II.\n\nTo Asclepius <This dialogue sets forth the difference between the physical and metaphysical worlds in the context of Greek natural philosophy.\n\nSome of the language is fairly technical: the \"errant spheres\" of sections 6 and 7 are the celestial spheres carrying the planets, while the \"inerrant sphere\" is that of the fixed stars.\n\nIt's useful to keep in mind, also, that \"air\" and \"spirit\" are interchangeable concepts in Greek thought, and that the concept of the Good has a range of implications which don't come across in the English word: one is that the good of any being, in Greek thought, was also that being's necessary goal.\n\n<The criticism of childlessness in section 17 should probably be read as a response to the Christian ideal of celibacy, which horrified many people in the ancient world.\n\n- JMG> 1.\n\nHermes: All that is moved, Asclepius, is it not moved in something and by something?\n\nAsclepius: Assuredly.\n\nH: And must not that in which it's moved be greater than the moved?\n\nA: It must.\n\nH: Mover, again, has greater power than moved?\n\nA: It has, of course.\n\nH: The nature, furthermore, of that in which it's moved must be quite other from the nature of the moved?\n\nA: It must completely.\n\n2.\n\nH: Is not, again, this cosmos vast, [so vast] that than it there exists no body greater?\n\nA: Assuredly.\n\nH: And massive, too, for it is crammed with multitudes of other mighty frames, nay, rather all the other bodies that there are?\n\nA: It is.\n\nH: And yet the cosmos is a body?\n\nA: It is a body.\n\nH: And one that's moved?\n\n3.\n\nA: Assuredly.\n\nH: Of what size, then, must be the space in which it's moved, and of what kind [must be] the nature [of that space]?\n\nMust it not be far vaster [than the cosmos], in order that it may be able to find room for its continued course, so that the moved may not be cramped for want of room and lose its motion?\n\nA: Something, Thrice-greatest one, it needs must be, immensely vast.\n\n4.\n\nH: And of what nature?\n\nMust it not be, Asclepius, of just the contrary?\n\nAnd is not contrary to body bodiless?\n\nA: Agreed.\n\nH: Space, then, is bodiless.\n\nBut bodiless must either be some godlike thing or God [Himself].\n\nAnd by \"some godlike thing\" I mean no more the generable [i.e., that which is generated] but the ingenerable.\n\n5.\n\nIf, then, space be some godlike thing, it is substantial; but if 'tis God [Himself], it transcends substance.\n\nBut it is to be thought of otherwise [than God], and in this way.\n\nGod is first \"thinkable\" <or \"intelligible\"> for us, not for Himself, for that the thing that's thought doth fall beneath the thinker's sense.\n\nGod then cannot be \"thinkable\" unto Himself, in that He's thought of by Himself as being nothing else but what He thinks.\n\nBut he is \"something else\" for us, and so He's thought of by us.\n\n6.\n\nIf space is, therefore, to be thought, [it should] not, [then, be thought as] God, but space.\n\nIf God is also to be thought, [He should] not [be conceived] as space, but as energy that can contain [all space]."

