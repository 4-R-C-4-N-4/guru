[content]
body = "Further, all that is moved is moved not in the moved but in the stable.\n\nAnd that which moves [another] is of course stationary, for 'tis impossible that it should move with it.\n\nA: How is it, then, that things down here, Thrice-greatest one, are moved with those that are [already] moved?\n\nFor thou hast said the errant spheres were moved by the inerrant one.\n\nH: This is not, O Asclepius, a moving with, but one against; they are not moved with one another, but one against the other.\n\nIt is this contrariety which turneth the resistance of their motion into rest.\n\nFor that resistance is the rest of motion.\n\n7.\n\nHence, too, the errant spheres, being moved contrarily to the inerrant one, are moved by one another by mutual contrariety, [and also] by the spable one through contrariety itself.\n\nAnd this can otherwise not be.\n\nThe Bears up there <i.e., Ursa Major and Minor>, which neither set nor rise, think'st thou they rest or move?\n\nA: They move, Thrice-greatest one.\n\nH: And what their motion, my Asclepius?\n\nA: Motion that turns for ever round the same.\n\nH: But revolution - motion around same - is fixed by rest.\n\nFor \"round-the-same\" doth stop \"beyond-same\".\n\n\"Beyond-same\" then, being stopped, if it be steadied in \"round-same\" - the contrary stands firm, being rendered ever stable by its contrariety.\n\n8.\n\nOf this I'll give thee here on earth an instance, which the eye can see.\n\nRegard the animals down here - a man, for instance, swimming!\n\nThe water moves, yet the resistance of his hands and feet give him stability, so that he is not borne along with it, nor sunk thereby.\n\nA: Thou hast, Thrice-greatest one, adduced a most clear instance.\n\nH: All motion, then, is caused in station and by station.\n\nThe motion, therefore, of the cosmos (and of every other hylic <i.e., material> animal) will not be caused by things exterior to the cosmos, but by things interior [outward] to the exterior - such [things] as soul, or spirit, or some such other thing incorporeal.\n\n'Tis not the body that doth move the living thing in it; nay, not even the whole [body of the universe a lesser] body e'en though there be no life in it.\n\n9.\n\nA: What meanest thou by this, Thrice-greatest one?\n\nIs it not bodies, then, that move the stock and stone and all the other things inanimate?\n\nH: By no means, O Asclepius.\n\nThe something-in-the-body, the that-which-moves the thing inanimate, this surely's not a body, for that it moves the two of them - both body of the lifter and the lifted?\n\nSo that a thing that's lifeless will not move a lifeless thing.\n\nThat which doth move [another thing] is animate, in that it is the mover.\n\nThou seest, then, how heavy laden is the soul, for it alone doth lift two bodies.\n\nThat things, moreover, moved are moved in something as well as moved by something is clear.\n\n10.\n\nA: Yea, O Thrice-greatest one, things moved must needs be moved in something void.\n\nH: Thou sayest well, O [my] Asclepius!\n\nFor naught of things that are is void.\n\nAlone the \"is-not\" is void [and] stranger to subsistence.\n\nFor that which is subsistent can never change to void."

