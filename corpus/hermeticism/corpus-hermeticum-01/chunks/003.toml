[content]
body = "So he who hath the whole authority o'er [all] the mortals in the cosmos and o'er its lives irrational, bent his face downwards through the Harmony, breaking right through its strength, and showed to downward Nature God's fair form.\n\nAnd when she saw that Form of beauty which can never satiate, and him who [now] possessed within himself each single energy of [all seven] Rulers as well as God's own Form, she smiled with love; for 'twas as though she'd seen the image of Man's fairest form upon her Water, his shadow on her Earth.\n\nHe in turn beholding the form like to himself, existing in her, in her Water, loved it and willed to live in it; and with the will came act, and [so] he vivified the form devoid of reason.\n\nAnd Nature took the object of her love and wound herself completely around him, and they were intermingled, for they were lovers.\n\n15.\n\nAnd this is why beyond all creatures on the earth man is twofold; mortal because of body, but because of the essential man immortal.\n\nThough deathless and possessed of sway o'er all, yet doth he suffer as a mortal doth, subject to Fate.\n\nThus though above the Harmony, within the Harmony he hath become a slave.\n\nThough male-female, as from a Father male-female, and though he's sleepless from a sleepless [Sire], yet is he overcome [by sleep].\n\n16.\n\nThereon [I say: Teach on], O Mind of me, for I myself as well am amorous of the Word (Logos).\n\nThe Shepherd said: This is the mystery kept hid until this day.\n\nNature embraced by Man brought forth a wonder, oh so wonderful.\n\nFor as he had the nature of the Concord of the Seven, who, as I said to thee, [were made] of Fire and Spirit - Nature delayed not, but immediately brought forth seven \"men\", in correspondence with the natures of the Seven, male-female and moving in the air.\n\nThereon [I said]: O Shepherd, ..., for now I'm filled with great desire and long to hear; do not run off.\n\nThe Shepherd said: Keep silence, for not as yet have I unrolled for thee the first discourse (logoi).\n\nLo!\n\nI am still, I said.\n\n17.\n\nIn such wise than, as I have said, the generation of these seven came to pass.\n\nEarth was as woman, her Water filled with longing; ripeness she took from Fire, spirit from Aether.\n\nNature thus brought forth frames to suit the form of Man.\n\nAnd Man from Light and Life changed into soul and mind - from Life to soul, from Light to mind.\n\nAnd thus continued all the sense-world's parts until the period of their end and new beginnings.\n\n18.\n\nNow listen to the rest of the discourse (Logos) which thou dost long to hear.\n\nThe period being ended, the bond that bound them all was loosened by God's Will.\n\nFor all the animals being male-female, at the same time with Man were loosed apart; some became partly male, some in like fashion [partly] female.\n\nAnd straightway God spake by His Holy Word (Logos): \"Increase ye in increasing, and multiply in multitude, ye creatures and creations all; and man that hath Mind in him, let him learn to know that he himself is deathless, and that the cause of death is love, though Love is all.\" 19.\n\nWhen He said this, His Forethought did by means of Fate and Harmony effect their couplings and their generations founded.\n\nAnd so all things were multiplied according to their kind."

