[content]
body = "Know that what sees in thee and hears is the Lord's Word (Logos); but Mind is Father-God.\n\nNot separate are they the one from other; just in their union [rather] is it Life consists.\n\nThanks be to Thee, I said.\n\nSo, understand the Light [He answered], and make friends with it.\n\n7.\n\nAnd speaking thus He gazed for long into my eyes, so that I trembled at the look of him.\n\nBut when He raised His head, I see in Mind the Light, [but] now in Powers no man could number, and Cosmos grown beyond all bounds, and that the Fire was compassed round about by a most mighty Power, and [now] subdued had come unto a stand.\n\nAnd when I saw these things I understood by reason of Man-Shepherd's Word (Logos).\n\n8.\n\nBut as I was in great astonishment, He saith to me again: Thou didst behold in Mind the Archetypal Form whose being is before beginning without end.\n\nThus spake to me Man-Shepherd.\n\nAnd I say: Whence then have Nature's elements their being?\n\nTo this He answer gives: From Will of God.\n\n[Nature] received the Word (Logos), and gazing upon the Cosmos Beautiful did copy it, making herself into a cosmos, by means of her own elements and by the births of souls.\n\n9.\n\nAnd God-the-Mind, being male and female both, as Light and Life subsisting, brought forth another Mind to give things form, who, God as he was of Fire and Spirit, formed Seven Rulers who enclose the cosmos that the sense perceives.\n\nMen call their ruling Fate.\n\n10.\n\nStraightway from out the downward elements God's Reason (Logos) leaped up to Nature's pure formation, and was at-oned with the Formative Mind; for it was co-essential with it.\n\nAnd Nature's downward elements were thus left reason-less, so as to be pure matter.\n\n11.\n\nThen the Formative Mind ([at-oned] with Reason), he who surrounds the spheres and spins them with his whorl, set turning his formations, and let them turn from a beginning boundless unto an endless end.\n\nFor that the circulation of these [spheres] begins where it doth end, as Mind doth will.\n\nAnd from the downward elements Nature brought forth lives reason-less; for He did not extend the Reason (Logos) [to them].\n\nThe Air brought forth things winged; the Water things that swim, and Earth-and-Water one from another parted, as Mind willed.\n\nAnd from her bosom Earth produced what lives she had, four-footed things and reptiles, beasts wild and tame.\n\n12.\n\nBut All-Father Mind, being Life and Light, did bring forth Man co-equal to Himself, with whom He fell in love, as being His own child; for he was beautiful beyond compare, the Image of his Sire.\n\nIn very truth, God fell in love with his own Form; and on him did bestow all of His own formations.\n\n13.\n\nAnd when he gazed upon what the Enformer had created in the Father, [Man] too wished to enform; and [so] assent was given him by the Father.\n\nChanging his state to the formative sphere, in that he was to have his whole authority, he gazed upon his Brother's creatures.\n\nThey fell in love with him, and gave him each a share of his own ordering.\n\nAnd after that he had well learned their essence and had become a sharer in their nature, he had a mind to break right through the Boundary of their spheres, and to subdue the might of that which pressed upon the Fire.\n\n14."

