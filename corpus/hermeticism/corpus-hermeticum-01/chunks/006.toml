[content]
body = "For body's sleep became the soul's awakening, and closing of the eyes - true vision, pregnant with Good my silence, and the utterance of my word (logos) begetting of good things.\n\nAll this befell me from my Mind, that is Man-Shepherd, Word (Logos) of all masterhood, by whom being God-inspired I came unto the Plain of Truth.\n\nWherefore with all my soul and strength thanksgiving give I unto Father-God.\n\n31.\n\nHoly art Thou, O God, the universals' Father.\n\nHoly art Thou, O God, whose Will perfects itself by means of its own Powers.\n\nHoly art Thou, O God, who willeth to be known and art known by Thine own.\n\nHoly art Thou,who didst by Word (Logos) make to consist the things that are.\n\nHoly art Thou, of whom All-nature hath been made an image.\n\nHoly art Thou, whose Form Nature hath never made.\n\nHoly art Thou, more powerful than all power.\n\nHoly art Thou, transcending all pre-eminence.\n\nHoly Thou art, Thou better than all praise.\n\nAccept my reason's offerings pure, from soul and heart for aye stretched up to Thee, O Thou unutterable, unspeakable, Whose Name naught but the Silence can express.\n\n32.\n\nGive ear to me who pray that I may ne'er of Gnosis fail, [Gnosis] which is our common being's nature; and fill me with Thy Power, and with this Grace [of Thine], that I may give the Light to those in ignorance of the Race, my Brethren, and Thy Sons.\n\nFor this cause I believe, and I bear witness; I go to Life and Light.\n\nBlessed art Thou, O Father.\n\nThy Man would holy be as Thou art holy, e'en as Thou gave him Thy full authority [to be]."

