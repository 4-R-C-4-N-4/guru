[content]
body = "The body's senses next pass back into their sources, becoming separate, and resurrect as energies; and passion and desire withdraw unto that nature which is void of reason.\n\n25.\n\nAnd thus it is that man doth speed his way thereafter upwards through the Harmony.\n\nTo the first zone he gives the Energy of Growth and Waning; unto the second [zone], Device of Evils [now] de-energized; unto the third, the Guile of the Desires de-energized; unto the fourth, his Domineering Arrogance, [also] de-energized; unto the fifth, unholy Daring and the Rashness of Audacity, de-energized; unto the sixth, Striving for Wealth by evil means, deprived of its aggrandizement; and to the seventh zone, Ensnaring Falsehood, de-energized.\n\n26.\n\nAnd then, with all the energisings of the harmony stript from him, clothed in his proper Power, he cometh to that Nature which belongs unto the Eighth, and there with those-that-are hymneth the Father.\n\nThey who are there welcome his coming there with joy; and he, made like to them that sojourn there, doth further hear the Powers who are above the Nature that belongs unto the Eighth, singing their songs of praise to God in language of their own.\n\nAnd then they, in a band, go to the Father home; of their own selves they make surrender of themselves to Powers, and [thus] becoming Powers they are in God.\n\nThis the good end for those who have gained Gnosis - to be made one with God.\n\nWhy shouldst thou then delay?\n\nMust it not be, since thou hast all received, that thou shouldst to the worthy point the way, in order that through thee the race of mortal kind may by [thy] God be saved?\n\n27.\n\nThis when He'd said, Man-Shepherd mingled with the Powers.\n\nBut I, with thanks and belssings unto the Father of the universal [Powers], was freed, full of the power he had poured into me, and full of what He'd taught me of the nature of the All and of the loftiest Vision.\n\nAnd I began to preach unto men the Beauty of Devotion and of Gnosis: O ye people, earth-born folk, ye who have given yourselves to drunkenness and sleep and ignorance of God, be sober now, cease from your surfeit, cease to be glamoured by irrational sleep!\n\n28.\n\nAnd when they heard, they came with one accord.\n\nWhereon I say: Ye earth-born folk, why have ye given yourselves up to Death, while yet ye have the power of sharing Deathlessness?\n\nRepent, O ye, who walk with Error arm in arm and make of Ignorance the sharer of your board; get ye out from the light of Darkness, and take your part in Deathlessness, forsake Destruction!\n\n29.\n\nAnd some of them with jests upon their lips departed [from me], abandoning themselves unto the Way of Death; others entreated to be taught, casting themselves before my feet.\n\nBut I made them arise, and I became a leader of the Race towards home, teaching the words (logoi), how and in what way they shall be saved.\n\nI sowed in them the words (logoi) of wisdom; of Deathless Water were they given to drink.\n\nAnd when even was come and all sun's beams began to set, I bade them all give thanks to God.\n\nAnd when they had brought to an end the giving of their thanks, each man returned to his own resting place.\n\n30.\n\nBut I recorded in my heart Man-Shepherd's benefaction, and with my every hope fulfilled more than rejoiced."

