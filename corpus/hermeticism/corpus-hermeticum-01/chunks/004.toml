[content]
body = "And he who thus hath learned to know himself, hath reached that Good which doth transcend abundance; but he who through a love that leads astray, expends his love upon his body - he stays in Darkness wandering, and suffering through his senses things of Death.\n\n20.\n\nWhat is the so great fault, said I, the ignorant commit, that they should be deprived of deathlessness?\n\nThou seem'st, He said, O thou, not to have given heed to what thou heardest.\n\nDid I not bid thee think?\n\nYea do I think, and I remember, and therefore give Thee thanks.\n\nIf thou didst think [thereon], [said He], tell me: Why do they merit death who are in Death?\n\nIt is because the gloomy Darkness is the root and base of the material frame; from it came the Moist Nature; from this the body in the sense-world was composed; and from this [body] Death doth the Water drain.\n\n21.\n\nRight was thy thought, O thou!\n\nBut how doth \"he who knows himself, go unto Him\", as God's Word (Logos) hath declared?\n\nAnd I reply: the Father of the universals doth consist of Light and Life, from Him Man was born.\n\nThou sayest well, [thus] speaking.\n\nLight and Life is Father-God, and from Him Man was born.\n\nIf then thou learnest that thou art thyself of Life and Light, and that thou [happen'st] to be out of them, thou shalt return again to Life.\n\nThus did Man-Shepherd speak.\n\nBut tell me further, Mind of me, I cried, how shall I come to Life again...for God doth say: \"The man who hath Mind in him, let him learn to know that he himself [is deathless].\" 22.\n\nHave not all men then Mind?\n\nThou sayest well, O thou, thus speaking.\n\nI, Mind, myself am present with holy men and good, the pure and merciful, men who live piously.\n\n[To such] my presence doth become an aid, and straightway they gain gnosis of all things, and win the Father's love by their pure lives, and give Him thanks, invoking on Him blessings, and chanting hymns, intent on Him with ardent love.\n\nAnd ere they give up the body unto its proper death, they turn them with disgust from its sensations, from knowledge of what things they operate.\n\nNay, it is I, the Mind, that will not let the operations which befall the body, work to their [natural] end.\n\nFor being door-keeper I'll close up [all] the entrances, and cut the mental actions off which base and evil energies induce.\n\n23.\n\nBut to the Mind-less ones, the wicked and depraved, the envious and covetous, and those who mured do and love impiety, I am far off, yielding my place to the Avenging Daimon, who sharpening the fire, tormenteth him and addeth fire to fire upon him, and rusheth upon him through his senses, thus rendering him readier for transgressions of the law, so that he meets with greater torment; nor doth he ever cease to have desire for appetites inordinate, insatiately striving in the dark.\n\n24.\n\nWell hast thou taught me all, as I desired, O Mind.\n\nAnd now, pray, tell me further of the nature of the Way Above as now it is [for me].\n\nTo this Man-Shepherd said: When the material body is to be dissolved, first thou surrenderest the body by itself unto the work of change, and thus the form thou hadst doth vanish, and thou surrenderest thy way of life, void of its energy, unto the Daimon."

