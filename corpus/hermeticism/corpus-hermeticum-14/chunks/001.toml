body = "Sacred Texts Gnosticism and Hermetica Index Previous Next Buy this Book at Amazon.com Thrice-Greatest Hermes, Vol.\n\n2 , by G.R.S.\n\nMead, [1906], at sacred-texts.com p.\n\n257 CORPUS HERMETICUM XIV.\n\n(XV.) [A LETTER] OF THRICE-GREATEST HERMES TO ASCLEPIUS UNTO ASCLEPIUS GOOD HEALTH OF SOUL!\n\n1 (Text: P.\n\n128-134; Pat.\n\n49, 50.) 1.\n\nSince in thy absence my son Tat desired to learn the nature of the things that are, and would not let me hold it over, as [natural to] a younger son fresh come to gnosis of the [teachings] on each single point,—I was compelled to tell [him] more, in order that the contemplation 2 [of them] might be the easier for him to follow.\n\np.\n\n258 I would, then, choosing out the chiefest heads of what was said, write them in brief to thee, explaining them more mystic-ly, 1 as unto one of greater age and one well versed in Nature.\n\n2.\n\nIf all things manifest have been and are being made, and made things are not made by their own selves but by another; [if] made things are the many ,—nay more, are all things manifest and all things different and not alike; and things that are being made are being made by other [than themselves];—there is some one who makes these things; and He cannot be made, but is more ancient than the things that can.\n\nFor things that can be made, I say, are made by other [than themselves]; but of the things that owe their being to their being made, it is impossible that anything should be more ancient than them all, save only That which is not able to be made.\n\n3.\n\nSo He is both Supreme, and One, and Only, the truly wise in all, as having naught more ancient [than Himself].\n\nFor He doth rule o’er both the number, size and difference of things that are being made, and o’er the continuity of their making [too].\n\nAgain, things makeable are seeable; but He cannot be seen.\n\np.\n\n259 For for this cause He maketh,—that He may not be able to be seen.\n\nHe, therefore, ever maketh 1 ; and therefore can He ne’er be seen.\n\nTo comprehend Him thus is meet; and comprehending, [it is meet] to marvel; and marvelling, to count oneself as blessed, as having learnt to know one’s Sire.\n\n4.\n\nFor what is sweeter than one’s own true Sire?\n\nWho, then, is He; and how shall we learn how to know Him?\n\nIs it not right to dedicate to Him alone the name of God, or that of Maker, or of Father, or rather [all] the three;—God for His Power, and Maker for His Energy, and Father for His Good?\n\nNow Power doth differ from the things which are being made; while Energy consisteth in all things being made.\n\nWherefore we ought to put away verbosity and foolish talk, and understand these two—the made and Maker.\n\nFor that of them there is no middle [term]; there is no third.\n\n5.\n\nWherefore in all that thou conceivest, in all thou nearest, these two recall to mind; and think all things are they, reckoning as doubtful naught, nor of the things above, nor of the things below, neither of things divine, nor things p.\n\n260 that suffer change or things that are in obscuration."

