body = "Behold one and the same man planting the vine, the apple, and [all] other trees!\n\nIn just the selfsame way doth God sow Immortality in Heaven, and Change on Earth, and Life and Motion in the universe.\n\nThese are not many, but few and easy to be numbered; for four in all are they,—and God Himself and Genesis, in whom are all that are.\n\nFootnotes 257:1 εὖ φρονεῖν.\n\nI do not know the exact meaning of this expression.\n\nEverard translates “to be truly wise”; Parthey, “ recte sapere ” following Patrizzi; Ménard, “ sagesse ”; Chambers, “to be rightly wise.” I would suggest that εὖ φρονεῖν was the form used among these disciples of the Inner Way for the usual χαίρειν.\n\nInstead of wishing one another happiness, they wished each other wisdom, good thought, right thinking, good health of soul.\n\n257:2 θεωρία.\n\n258:1 That is to say, more fully and profoundly, as to one more advanced in the mystic science.\n\n259:1 Cf.\n\nC.\n\nH.\n\n, xvi.\n\n18.\n\n260:1 τῶν ἐν μυχῷ.\n\nI do not know what is the exact meaning of this expression.\n\nEverard translates “things that are in darkness or secret”; Parthey, “ quæ sunt in abdito ”; Ménard, “ dans les profondeurs ”; Chambers, “those in secrecy.” I suggest that the technical term μυχός, signifying generally a shut-in or locked-up place ( conclave , as Damascius translates it), is to be referred, along the line of Platonic and Pythagorean tradition, to Pherecydes.\n\nPorphyry ( De Antro Nymph.\n\n, C.\n\n31) tells us that the synonyms “μυχοί (chambers?), recesses (or pits), caverns, doors, gates” were used by Pherecydes as symbolical expressions to signify “the geneses and apogeneses of souls,” whatever these terms may mean exactly.\n\nThe “birth” and “decease” of a soul, in this connection, presumably mean its coming into the world of genesis out of the womb of the World-soul, and its reception back again into the bosom of the great Mother.\n\nIf this be so, our text would seem to indicate that things are in two states,—in a state of change (that is, in the active condition), and again in a passive condition, in the state which Indian philosophers call laya or pralaya.\n\nSee for the μυχοί of Pherecydes Sturz’s Pherecydis Fragmenta , pp.\n\n43 ff.\n\n(Leipzig, 1824).\n\n260:2 Or genesis.\n\n261:1 From here to the end of the sermon, with the exception of the final sentences of § 7 and § 10, and the third sentence of § 9, and with a few very slight verbal variants, is quoted by Cyril, Contra Julianum , ii.\n\n64 (Migne, col.\n\n598 D).\n\n261:2 Cf.\n\nC.\n\nH.\n\n, xvi.\n\n18.\n\n262:1 Or genesis.\n\n263:1 This sentence, which appears to be very tautological, is omitted by Cyril.\n\nNext: Commentary"

