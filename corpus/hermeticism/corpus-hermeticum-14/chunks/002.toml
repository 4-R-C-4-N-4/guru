[content]
body = "1 For all things are [these] twain, Maker and made, and ’tis impossible that one should be without the other; for neither is it possible that “Maker” should exist without the “made,” for each of them is one and the same thing.\n\nWherefore ’tis no more possible for one from other to be parted, than self from self.\n\n6.\n\nNow if the Maker is naught else but That which makes, Alone, Simple, Uncompound, it needs must do this [making] to Itself,—to Which its Maker’s making is “its being made.” 2 And as to all that’s being made,—it cannot be p.\n\n261 [paragraph continues] [so made] by being made by its own self; but it must needs be made by being made by other.\n\nWithout the “Maker” “made” is neither made nor is; for that the one without the other doth lose its proper nature by deprivation of that other.\n\nIf, 1 then, all things have been admitted to be two,—the “that which is being made” and “that which makes,”—[all then] are one in union of these,—the “that which leadeth” and the “that which followeth.” The making God is “that which leadeth”; the “that which is being made,” whatever it be, the “that which followeth.” 7.\n\nAnd do not thou be chary of things made because of their variety, from fear of attribution of a low estate and lack of glory unto God.\n\nFor that His Glory’s one,—to make all things; and this is as it were God’s Body, the making [of them].\n\n2 But by the Maker’s self naught is there thought or bad or base.\n\nThese things are passions which accompany the making process, as rust doth brass and filth doth body; but neither doth the brass-smith p.\n\n262 make the rust, nor the begetters of the body filth, nor God [make] evil.\n\nIt is continuance in the state of being made 1 that makes them lose, as though it were, their bloom; and ’tis because of this God hath made change, as though it were the making clean of genesis.\n\n8.\n\nIs it, then, possible for one and the same painter man to make both heaven, and gods, and earth, and sea, and men, and all the animals, and lifeless things, and trees, and yet impossible for God to make all things?\n\nWhat monstraus lack of understanding; what want of knowledge as to God!\n\n1 For such the strangest lot of all do suffer; for though they say they worship piously and sing the praise of God, yet by their not ascribing unto Him the making of all things, they know not God; and, added unto this not-knowing, they’re guilty even of the worst impiety to Him—passions to Him attributing, or arrogance, or impotency.\n\nFor if He doth not make all things, from arrogance He doth not make, or not being able,—which is impiety [to think].\n\n9.\n\nOne Passion hath God only—Good; and He who’s Good, is neither arrogant nor impotent.\n\nFor this is God—the Good, which hath all power of making all.\n\np.\n\n263 And all that can be made is made by God,—that is, by [Him who is] the Good and who can make all things.\n\n1 But would’st thou learn how He doth make, and how things made are made, thou may’st do so.\n\n10.\n\nBehold a very fair and most resemblant image—a husbandman casting the seed into the ground; here wheat, there barley, and there [again] some other of the seeds!"

