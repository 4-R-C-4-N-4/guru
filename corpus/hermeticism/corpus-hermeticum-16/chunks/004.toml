body = "1 The daimons, therefore, exercise the whole of this terrene economy, 2 using our bodies as [their] instruments.\n\nAnd this economy Hermes has called Heimarmenē.\n\n3 17.\n\nThe World Intelligible, 4 then, depends from God; the Sensible from the Intelligible [World].\n\nThe Sun, through the Intelligible and the Sensible Cosmos, pours forth abundantly the stream from God of Good,—that is, the demiurgic operation.\n\nAnd round the Sun are the Eight Spheres, dependent from Him—the [Sphere] of the p.\n\n276 [paragraph continues] Non-wandering Ones, the Six [Spheres] of the Wanderers, and one Circumterrene.\n\nAnd from the Spheres depend the daimones; and from these, men.\n\nAnd thus all things and all [of them] depend from God.\n\n1 18.\n\nWherefore God is the Sire of all; the Sun’s [their] Demiurge; the Cosmos is the instrument of demiurgic operation.\n\nIntelligible Essence regulateth Heaven; and Heaven, the Gods; the daimones, ranked underneath the Gods, regulate men.\n\nThis is the host 2 of Gods and daimones.\n\n3 Through these God makes all things for His own self.\n\nAnd all [of them] are parts of God; and if they all [are] parts—then, God is all.\n\nThus, making all, He makes Himself; nor ever can He cease [His making], for He Himself is ceaseless.\n\n4 Just, then, as God doth have no end and no beginning, so doth His making have no end and no beginning.\n\n5 * * * * * Footnotes 266:1 At the end after P.\n\nS.\n\nA.\n\n, but the pages are unnumbered.\n\n267:1 This presumably means from the hieroglyphic into the demotic—τῇ πατρῷᾳ διαλέκτῳ ἐρμηνευόμενος.\n\n267:2 Lit.\n\nthe mind.\n\n267:3 Or, perhaps, smartness.\n\n267:4 Make jejune, so to say—ἐξίτηλον ποιήσῃ.\n\n267:5 That is, “words of power,” words that do things.\n\n268:1 Cf.\n\nR.\n\n127, 3; and P.\n\nS.\n\nA.\n\n, i.\n\n1.\n\n268:2 Lit.\n\nmind.\n\n268:3 The construction is very elliptical; ἐκδεξάμενος simply.\n\n268:4 That is, completeness, perfection,—πληρώματος.\n\n268:5 Cf.\n\nPlato, Soph.\n\n, 259 D, E.\n\n269:1 Cf.\n\nP.\n\nS.\n\nA.\n\n, iv.\n\n1.\n\n269:2 Sc.\n\nEarth.\n\n269:3 A magazine, a store-house,—ταμιεῖον.\n\nThe term “treasure” (θησαυρός) is found in most lavish use in the Greek-Coptic Gnostic works, and also in Christian Gnostic literature and Jewish Apocalyptic.\n\n269:4 Sc.\n\nmatter’s.\n\n269:5 τὴν ἄνωθεν ὕπαρξιν,— hyparxis , substance or subsistence, a word of frequent use and highly technical meaning with the last of the Neo-Platonists, especially with Proclus.\n\nCf.\n\nC.\n\nH.\n\n, x.\n\n(xi.) 2.\n\n269:6 Cf.\n\nP.\n\nS.\n\nA.\n\n, xxix.\n\n4.\n\n269:7 Lit."

