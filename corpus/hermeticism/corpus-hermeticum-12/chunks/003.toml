[content]
body = "Now if the Mind co-worketh with [these] impulses, and if the impulses of [lives] irrational be passions, then is Mind also passion, taking its color from the passions.\n\nHermes: Well put, my son!\n\nThou questionest right nobly, and it is just that I as well should answer [nobly].\n\n11.\n\nAll things incorporeal when in a body are subject unto passion, and in the proper sense they are [themselves] all passions.\n\nFor every thing that moves itself is incorporeal; while every thing that's moved is body.\n\nIncorporeals are further moved by Mind, and movement's <i.e., movement is> passion.\n\nBoth, then, are subject unto passion - both mover and the moved, the former being ruler and the latter ruled.\n\nBut when a man hath freed himself from body, then is he also freed from passion.\n\nBut, more precisely, son, naught is impassible, but all are passible.\n\nYet passion differeth from passibility; for that the one is active, while the other's passive.\n\nIncorporeals moreover act upon themselves, for either they are motionless or they are moved; but whichsoe'er it be, it's passion.\n\nBut bodies are invaribly acted on, and therefore they are passible.\n\nDo not, then, let terms trouble thee; action and passion are both the selfsame thing.\n\nTo use the fairer sounding term, however, does no harm.\n\n12.\n\nTat: Most clearly hast thou, father mine, set forth the teaching (logos).\n\nHermes: Consider this as well, my son; that these two things God hath bestowed on man beyond all mortal lives - both mind and speech (logos) equal to immortality.\n\nHe hath the mind for knowing God and uttered speech (logos) for eulogy of Him.\n\nAnd if one useth these for what he ought, he'll differ not a whit from the immortals.\n\nNay, rather, on departing from the body, he will be guided by the twain unto the Choir of Gods and Blessed Ones.\n\n13.\n\nTat: Why, father mine!\n\n- do not the other lives make use of speech (logos)?\n\nHermes: Nay, son; but <i.e., only> use of voice; speech is far different from voice.\n\nFor speech is general among all men, while voice doth differ in each class of living thing.\n\nTat: But with men also, father mine, according to each race, speech differs.\n\nHermes: Yea, son, but man is one; so also speech is one and is interpreted, and it is found the same in Egypt, and in Persia, and in Greece.\n\nThou seemest, son, to be in ignorance of Reason's (Logos) worth and greatness.\n\nFor that the Blessed God, Good Daimon, hath declared: \"Soul is in Body, Mind in Soul; but Reason (Logos) is in Mind, and Mind in God; and God is Father of [all] these.\" 14.\n\nThe Reason, then, is the Mind's image, and Mind God's [image]; while Body is [the image] of the Form; and Form [the image] of the Soul.\n\nThe subtlest part of Matter is, then, Air <or vital spirit>; of Air, Soul; of Soul, Mind; and of Mind, God.\n\nAnd God surroundeth all and permeateth all; while Mind Surroundeth Soul, Soul Air, Air Matter.\n\nNecessity and Providence and Nature are instruments of Cosmos and of Matter's ordering; while of intelligible things each is Essence, and Sameness is their Essence."

