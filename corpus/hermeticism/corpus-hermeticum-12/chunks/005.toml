[content]
body = "For with this life alone doth God consort; by visions in the night, by tokens in the day, and by all things doth He foretell the future unto him - by birds, by inward parts, by wind, by tree.\n\nWherefore doth man lay claim to know things past, things present and to come.\n\n20.\n\nObserve this too, my son; that each one of the other lives inhabiteth one portion of the Cosmos - aquatic creatures water, terrene earth, and aery creatures air; while man doth use all these - earth, water air [and] fire; he seeth Heaven, too, and doth contact it with [his] sense.\n\nBut God surroundeth all, and permeateth all, for He is energy and power; and it is nothing difficult, my son, to conceive God.\n\n21.\n\nBut if thou wouldst Him also contemplate, behold the ordering of the Cosmos, and [see] the orderly behavior of its ordering <this is a play on the word \"cosmos\", which means \"order, arrangement\">; behold thou the Necessity of things made manifest, and [see] the Providence of things become and things becoming; behold how Matter is all-full of Life; [behold] this so great God in movement, with all the good and noble [ones] - gods, daimones and men!\n\nTat: But these are purely energies, O father mine!\n\nHermes: If, then, they're purely energies, my son - by whom, then, are they energized except by God?\n\nOr art thou ignorant, that just as Heaven, Earth, Water, Air, are parts of Cosmos, in just the selfsame way God's parts are Life and Immortality, [and] Energy, and Spirit, and Necessity, and Providence, and Nature, Soul, and Mind, and the Duration <that is, Aeon or Eternity> of all these that is called Good?\n\nAnd there are naught of things that have become, or are becoming, in which God is not.\n\n22.\n\nTat: Is He in Matter, father, then?\n\nHermes: Matter, my son, is separate from God, in order that thou may'st attribute to it the quality of space.\n\nBut what thing else than mass think'st thou it is, if it's not energized?\n\nWhereas if it be energized, by whom is it made so?\n\nFor energies, we said, are parts of God.\n\nBy whom are, then, all lives enlivened?\n\nBy whom are things immortal made immortal?\n\nBy whom changed things made changeable?\n\nAnd whether thou dost speak of Matter, of Body, or of Essence, know that these too are energies of God; and that materiality is Matter's energy, that corporeality is Bodies' energy, and that essentiality doth constituteth the energy of Essence; and this is God - the All.\n\n23.\n\nAnd in the All is naught that is not God.\n\nWherefore nor <i.e., neither> size, nor space, nor quality, nor form, nor time, surroundeth God; for He is All, and All surroundeth all, and permeateth all.\n\nUnto this Reason (Logos), son, thy adoration and thy worship pay.\n\nThere is one way alone to worship God; [it is] not to be bad."

