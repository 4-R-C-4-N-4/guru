[content]
body = "Hermes: All works, my son, are Fate's; and without Fate naught of things corporal - or <i.e., either> good, or ill - can come to pass.\n\nBut it is fated, too, that he who doeth ill, shall suffer.\n\nAnd for this cause he doth it - that he may suffer what he suffereth, because he did it.\n\n6.\n\nBut for the moment, [Tat,] let be the teaching as to vice and Fate, for we have spoken of these things in other [of our sermons]; but now our teaching (logos) is about the Mind: - what Mind can do, and how it is [so] different - in men being such and such, and in irrational lives [so] changed; and [then] again that in irrational lives it is not of a beneficial nature, while that in men it quencheth out the wrathful and the lustful elements.\n\nOf men, again, we must class some as led by reason, and others as unreasoning.\n\n7.\n\nBut all men are subject to Fate, and genesis and change, for these are the beginning and the end of Fate.\n\nAnd though all men do suffer fated things, those led by reason (those whom we said Mind doth guide) do not endure <a> like suffering with the rest; but, since they've freed themselves from viciousness, not being bad, they do not suffer bad.\n\nTat: How meanest thou again, my father?\n\nIs not the fornicator bad; the murderer bad; and [so with] all the rest?\n\nHermes: [I meant not that;] but that the Mind-led man, my son, though not a fornicator, will suffer just as though he had committed fornication, and though he be no murderer, as though he had committed murder.\n\nThe quality of change he can no more escape than that of genesis.\n\nBut it is possible for one who hath the Mind, to free himself from vice.\n\n8.\n\nWherefore I've ever heard, my son, Good Daimon also say - (and had He set it down in written words, He would have greatly helped the race of men; for He alone, my son, doth truly, as the Firstborn God, gazing on all things, give voice to words (logoi) divine) - yea, once I heard Him say: \"All things are one, and most of all the bodies which the mind alone perceives.\n\nOur life is owing to [God's] Energy and Power and Aeon.\n\nHis Mind is good, so is His Soul as well.\n\nAnd this being so, intelligible things know naught of separation.\n\nSo, then, Mind, being Ruler of all things, and being Soul of God, can do whate'er it wills.\" 9.\n\nSo do thou understand, and carry back this word (logos) unto the question thou didst ask before - I mean about Mind's Fate.\n\nFor if thou dost with accuracy, son, eliminate [all] captious arguments (logoi), thou wilt discover that of very truth the Mind, the Soul of God, doth rule o'er all - o'er Fate, and Law, and all things else; and nothing is impossible to it - neither o'er Fate to set a human soul, nor under Fate to set [a soul] neglectful of what comes to pass.\n\nLet this so far suffice from the Good Daimon's most good [words].\n\nTat: Yea, [words] divinely spoken, father mine, truly and helpfully.\n\nBut further still explain me this.\n\n10.\n\nThou said'st that Mind in lives irrational worked in them as [their] nature, co-working with their impulses.\n\nBut impulses of lives irrational, as I do think, are passions."

