body = "The Corpus Hermeticum translated by G.R.S.\n\nMead VI.\n\nIn God Alone Is Good And Elsewhere Nowhere <This sermon on the nature of the Good, like To Asclepius (CH II), relies heavily on the technical language of classical Greek philosophy - a point which some of Mead's translations tend to obscure.\n\n\"The Good,\" in Greek thought, is also the self-caused and self-sufficient, and thus has little in common with later conceptions of \"goodness,\" just as the Latin word virtus and the modern Christian concept of \"virtue\" are very nearly opposites despite their etymological connection.\n\nThe word \"passion\" here also needs to be understood in its older sense, as the opposite of \"action\" (cf.\n\n\"active\" and \"passive\").\n\n<The negative attitude toward humanity and the cosmos which appears in this text contrasts sharply with the more positive assessment found, for example, in the Poemandres (CH I) or in the Asclepius - a reminder that these documents are relics of a diverse and not necessarily consistent school of thought.\n\n- JMG> 1.\n\nGood, O Asclepius, is in none else save in God alone; nay, rather, Good is God Himself eternally.\n\nIf it be so, [Good] must be essence, from every kind of motion and becoming free (though naught is free from It), possessed of stable energy around Itself, never too little, nor too much, an ever-full supply.\n\n[Though] one, yet [is It] source of all; for what supplieth all is Good.\n\nWhen I, moreover, say [supplieth] altogether [all], it is for ever Good.\n\nBut this belongs to no one else save God alone.\n\nFor He stands not in need of any thing, so that desiring it He should be bad; nor can a single thing of things that are be lost to him, on losing which He should be pained; for pain is part of bad.\n\nNor is there aught superior to Him, that He should be subdued by it; nor any peer to Him to do Him wrong, or [so that] He should fall in love on its account; nor aught that gives no ear to Him, whereat He should grow angry; nor wiser aught, for Him to envy.\n\n2.\n\nNow as all these are non-existent in His being, what is there left but Good alone?\n\nFor just as naught of bad is to be found in such transcendent Being, so too in no one of the rest will Good be found.\n\nFor in them are all of the other things <i.e., those things which are not Good> - both in the little and the great, both in each severally and in this living one that's greater than them all and the mightiest [of them] <i.e., the cosmos>.\n\nFor things subject to birth abound in passions, birth in itself being passible.\n\nBut where there's passion, nowhere is there Good; and where is Good, nowhere a single passion.\n\nFor where is day, nowhere is night; and where is night, day is nowhere.\n\nWherefore in genesis the Good can never be, but only be in the ingenerate.\n\nBut seeing that the sharing in all things hath been bestowed on matter, so doth it share in Good.\n\nIn this way is the Cosmos Good; that, in so far as it doth make all things, as far as making goes it's Good, but in all other things it is not Good.\n\nFor it's both passible and subject unto motion, and maker of things passible.\n\n3.\n\nWhereas in man by greater or less of bad is good determined.\n\nFor what is not too bad down here, is good, and good down here is the least part of bad."

