[content]
body = "But they who have received some portion of God's gift, these, Tat, if we judge by their deeds, have from Death's bonds won their release; for they embrace in their own Mind all things, things on the earth, things in the heaven, and things above the heaven - if there be aught.\n\nAnd having raised themselves so far they sight the Good; and having sighted it, they look upon their sojourn here as a mischance; and in disdain of all, both things in body and the bodiless, they speed their way unto that One and Only One.\n\n6.\n\nThis is, O Tat, the Gnosis of the Mind, Vision of things Divine; God-knowledge is it, for the Cup is God's.\n\nT: Father, I, too, would be baptized.\n\nH: Unless thou first shall hate thy Body, son, thou canst not love thy Self.\n\nBut if thou lov'st thy Self thou shalt have Mind, and having Mind thou shalt share in the Gnosis.\n\nT: Father, what dost thou mean?\n\nH: It is not possible, my son, to give thyself to both - I mean to things that perish and to things divine.\n\nFor seeing that existing things are twain, Body and Bodiless, in which the perishing and the divine are understood, the man who hath the will to choose is left the choice of one or the other; for it can never be the twain should meet.\n\nAnd in those souls to whom the choice is left, the waning of the one causes the other's growth to show itself.\n\n7.\n\nNow the choosing of the Better not only proves a lot most fair for him who makes the choice, seeing it makes the man a God, but also shows his piety to God.\n\nWhereas the [choosing] of the Worse, although it doth destroy the \"man\", it doth only disturb God's harmony to this extent, that as processions pass by in the middle of the way, without being able to do anything but take the road from others, so do such men move in procession through the world led by their bodies' pleasures.\n\n8.\n\nThis being so, O Tat, what comes from God hath been and will be ours; but that which is dependent on ourselves, let this press onward and have no delay, for 'tis not God, 'tis we who are the cause of evil things, preferring them to good.\n\nThou see'st, son, how many are the bodies through which we have to pass, how many are the choirs of daimones, how vast the system of the star-courses [through which our Path doth lie], to hasten to the One and Only God.\n\nFor to the Good there is no other shore; It hath no bounds; It is without an end; and for Itself It is without beginning, too, though unto us it seemeth to have one - the Gnosis.\n\n9.\n\nTherefore to It Gnosis is no beginning; rather is it [that Gnosis doth afford] to us the first beginning of its being known.\n\nLet us lay hold, therefore, of the beginning.\n\nand quickly speed through all [we have to pass].\n\n`Tis very hard, to leave the things we have grown used to, which meet our gaze on every side, and turn ourselves back to the Old Old [Path].\n\nAppearances delight us, whereas things which appear not make their believing hard.\n\nNow evils are the more apparent things, whereas the Good can never show Itself unto the eyes, for It hath neither form nor figure.\n\nTherefore the Good is like Itself alone, and unlike all things else; or `tis impossible that That which hath no body should make Itself apparent to a body.\n\n10."

