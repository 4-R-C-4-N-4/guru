body = "The Corpus Hermeticum translated by G.R.S.\n\nMead IV.\n\nThe Cup or Monad <This short text gives an unusually lucid overview of the foundations of Hermetic thought.\n\nThe stress on rejection of the body and its pleasures, and on the division of humanity into those with Mind and those without, are reminiscent of some of the so-called \"Gnostic\" writings of the same period.\n\nThe idea that the division is a matter of choice, on the other hand, is a pleasant variation on the almost Calvinist flavor of writings such as the Apocalypse of Adam .\n\n<Mead speculates that the imagery of the Cup in this text may have a distant connection, by way of unorthodox ideas about Communion, with the legends of the Holy Grail.\n\n- JMG> 1.\n\nHermes: With Reason (Logos), not with hands, did the World-maker make the universal World; so that thou shouldst think of him as everywhere and ever-being, the Author of all things, and One and Only, who by His Will all beings hath created.\n\nThis Body of Him is a thing no man can touch, or see, or measure, a body inextensible, like to no other frame.\n\n'Tis neither Fire nor Water, Air nor Breath; yet all of them come from it.\n\nNow being Good he willed to consecrate this [Body] to Himself alone, and set its Earth in order and adorn it.\n\n2.\n\nSo down [to Earth] He sent the Cosmos of this Frame Divine - man, a life that cannot die, and yet a life that dies.\n\nAnd o'er [all other] lives and over Cosmos [too], did man excel by reason of the Reason (Logos) and the Mind.\n\nFor contemplator of God's works did man become; he marvelled and did strive to know their Author.\n\n3.\n\nReason (Logos) indeed, O Tat, among all men hath He distributed, but Mind not yet; not that He grudgeth any, for grudging cometh not from Him, but hath its place below, within the souls of men who have no Mind.\n\nTat: Why then did God, O father, not on all bestow a share of Mind?\n\nH: He willed, my son, to have it set up in the midst for souls, just as it were a prize.\n\n4.\n\nT: And where hath He set it up?\n\nH: He filled a mighty Cup with it, and sent it down, joining a Herald [to it], to whom He gave command to make this proclamation to the hearts of men: Baptize thyself with this Cup's baptism, what heart can do so, thou that hast faith thou canst ascend to him that hath sent down the Cup, thou that dost know for what thoudidst come into being!\n\nAs many then as understood the Herald's tidings and doused themselves in Mind, became partakers in the Gnosis; and when they had \"received the Mind\" they were made \"perfect men\".\n\nBut they who do not understand the tidings, these, since they possess the aid of Reason [only] and not Mind, are ignorant wherefor they have come into being and whereby.\n\n5.\n\nThe senses of such men are like irrational creatures'; and as their [whole] make-up is in their feelings and their impulses, they fail in all appreciation of <lit.: \"they do not wonder at\"> those things which really are worth contemplation.\n\nThese center all their thought upon the pleasures of the body and its appetites, in the belief that for its sake man hath come into being."

