[content]
body = "But man, in that he's subject both to motion and to death, is evil.\n\n13.\n\nNow then the principles of man are this-wise vehicled: mind in the reason (logos), the reason in the soul, soul in the spirit <or, rather, vital spirits>, and spirit in the body.\n\nSpirit pervading [body] by means of veins and arteries and blood, bestows upon the living creature motion, and as it were doth bear it in a way.\n\nFor this cause some do think the soul is blood, in that they do mistake its nature, not knowing that [at death] it is iteh spirit that must first withdraw into the soul, whereon the blood congeals and veins and arteries are emptied, and then the living creature <or life> is withdrawn; and this is body's death.\n\n14.\n\nNow from one Source all things depend; while Source [dependeth] from the One and Only [One].\n\nSource is, moreover, moved to become Source again; whereas the One standeth perpetually and is not moved.\n\nThree then are they: \"God, the Father and the Good\", Cosmos and man.\n\nGod doth contain Cosmos; Cosmos [containeth] man.\n\nCosmos is e'er God's Son, man as it were Cosmos' child.\n\n15.\n\nNot that, however, God ignoreth man; nay, right well doth He know him, and willeth to be known.\n\nThis is the sole salvation for a man - God's Gnosis.\n\nThis is the Way Up to the Mount.\n\nBy Him alone the soul becometh good, not whiles is good, whiles evil, but [good] out of necessity.\n\nTat: What dost thou mean, Thrice-greatest one?\n\nHermes: Behold an infant's soul, my son, that is not yet cut off, because its body is still small and not as yet come unto its full bulk.\n\nTat: How?\n\nHermes: A thing of beauty altogether is [such a soul] to see, not yet befouled by body's passions, still all but hanging from the Cosmic Soul!\n\nBut when the body grows in bulk and draweth down the soul into its mass, then doth the soul cut off itself and bring upon itself forgetfulness, and no more shareth in the Beautiful and the Good.\n\nAnd this forgetfulness becometh vice.\n\n16.\n\nIt is the same for them who go out from the body.\n\nFor when the soul withdraws into itself, the spirit doth contract itself within the blood, and the soul within the spirit.\n\nAnd then the mind, stripped of its wrappings, and naturally divine, taking unto itself a fiery body, doth traverse every space, after abandoning the soul unto its judgement and whatever chastisement it hath deserved.\n\nTat: What dost thou, father, mean by this?\n\nThe mind is parted from soul and soul from spirit?\n\nWhereas thou said'st the soul was the mind's vesture, and the soul's the spirit.\n\n17.\n\nHermes: The hearer, son, should think with him who speaks and breathe with him; nay, he should have a hearing subtler than the voice of him who speaks.\n\nIt is, son, in a body made of earth that this arrangement of the vestures comes to pass.\n\nFor in a body made of earth it is impossible the mind should take its seat itself by its own self in nakedness.\n\nFor neither is it possible on the one hand the earthly body should contain so much immortality, nor on the other that so great a virtue should endure a body passible in such close contact with it.\n\nIt taketh, then, the soul for as it were an envelope.\n\nAnd soul itself, being too and thing divine, doth use the spirit as its envelope, while spirit doth pervade the living creature."

