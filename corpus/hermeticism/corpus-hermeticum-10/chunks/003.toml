[content]
body = "And this is the most perfect glory of the soul.\n\n8.\n\nBut if a soul on entering the body of a man persisteth in its vice, it neither tasteth deathlessness nor shareth in the Good; but speeding back again it turns into the path that leads to creeping things.\n\nThis is the sentence of the vicious soul.\n\nAnd the soul's vice is ignorance.\n\nFor that the soul who hath no knowledge of the things that are, or knowledge of their nature, or of Good, is blinded by the body's passions and tossed about.\n\nThis wretched soul, not knowing what she is, becomes the slave of bodies of strange form in sorry plight, bearing the body as a load; not as the ruler, but the ruled.\n\nThis [ignorance] is the soul's vice.\n\n9.\n\nBut on the other hand the virtue of the soul is Gnosis.\n\nFor he who knows, he good and pious is, and still while on the earth divine.\n\nTat: But who is such an one, O father mine?\n\nHermes: He who doth not say much or lend his ear to much.\n\nFor he who spendeth time in arguing and hearing arguments, doth shadow-fight.\n\nFor \"God, the Father and the Good\", is not to be obtained by speech or hearing.\n\nAnd yet though this is so, there are in all the beings senses, in that they cannot without senses be.\n\nBut Gnosis is far different from sense.\n\nFor sense is brought about by that which hath the mastery o'er us, while Gnosis is the end <i.e., goal> of science, and science is God's gift.\n\n10.\n\nAll science is incorporeal, the instrument it uses being the mind, just as the mind employs the body.\n\nBoth then come into bodies, [I mean] both things that are cognizable by mond alone and things material.\n\nFor all things must consist out of antithesis and contrariety; and this can otherwise not be.\n\nTat: Who then is this material God of whom thou speakest?\n\nHermes: Cosmos is beautiful, but is not good - for that it is material and freely passible; and though it is the first of all things passible, yet is it in the second rank of being and wanting in itself.\n\nAnd though it never hath itself its birth in time, but ever is, yet is its being in becoming, becoming for all time the genesis of qualities and quantities; for it is mobile and all material motion's genesis.\n\n11.\n\nIt is intelligible rest that moves material motion in this way, since Cosmos is a sphere - that is to say, a head.\n\nAnd naught of head above's material, as naught of feet below's intelligible, but all material.\n\nAnd head itself is moved in a sphere-like way - that is to say, as head should move, is mind.\n\nAll then that are united to the \"tissue\" of this \"head\" (in which is soul) are in their nature free from death - just as when body hath been made in soul, are things that hath more soul than body.\n\nWhereas those things which are at greater distance from this \"tissue\" - there, where are things which have a greater share of body than of soul - are by their nature subject unto death.\n\nThe whole, however, is a life; so that the universe consists of both the hylic and of the intelligible.\n\n12.\n\nAgain, the Cosmos is the first of living things, while man is second after it, though first of things subject to death.\n\nMan hath the same ensouling power in him as all the rest of living things; yet is he not only not good, but even evil, for that he's subject unto death.\n\nFor though the Cosmos also is not good in that it suffers motion, it is not evil, in that it is not subject to death."

