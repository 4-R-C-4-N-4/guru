[content]
body = "The higher, further, have in charge the lower; the gods look after men, men after animals irrational, while God hath charge of all; for He is higher than them all and all are less than He.\n\nCosmos is subject, then, to God, man to the Cosmos, and irrationals to man.\n\nBut God is o'er them all, and God contains them all.\n\nGod's rays, to use a figure, are His energies; the Cosmos's are natures, the arts and sciences are man's.\n\nThe energies act through the Cosmos, thence through the nature-rays of Cosmos upon man; the nature-rays [act] through the elements, man [acteth] through the sciences and arts.\n\n23.\n\nThis is the dispensation of the universe, depending from the nature of the One, pervading [all things] through the Mind, than which is naught diviner nor of greater energy; and naught a greater means for the at-oning men to gods and gods to men.\n\nHe, [Mind,] is the Good Daimon.\n\nBlessed the soul that is most filled with Him, and wretched is the soul that's empty of the Mind.\n\nTat: Father, what dost thou mean, again?\n\nHermes: Dost think then, son, that every soul hath the Good [Mind]?\n\nFor 'tis of Him we speak, not of the mind in service of which we were just speaking, the mind sent down for [the soul's] chastisement.\n\n24.\n\nFor soul without the mind \"can neither speak nor act\".\n\nFor oftentimes the mind doth leave the soul, and at that time the soul neither sees nor understands, but is just like a thing that hath no reason.\n\nSuch is the power of mind.\n\nYet doth it not endure a sluggish soul, but leaveth such a soul tied to the body and bound tight down by it.\n\nSuch soul, my son, doth not have Mind; and therefore such an one should not be called a man.\n\nFor that man is a thing-of-life <or animal> divine; man is not measured with the rest of lives of things upon the earth, but with the lives above in heaven, who are called gods.\n\nNay more, if we must boldly speak the truth, the true \"man\" is e'en higher than the gods, or at the [very] least the gods and men are very whit in power each with the other equal.\n\n25.\n\nFor no one of the gods in heaven shall come down to the earth, o'er-stepping heaven's limit; whereas man doth mount up to heaven and measure it; he knows what things of it are high, what things are low, and learns precisely all things else besides.\n\nAnd greater thing than all; without e'en quitting earth, he doth ascend above.\n\nSo vast a sweep doth he possess of ecstasy.\n\nFor this cause can a man dare say that man on earth is god subject to death, while god in heaven is man from death immune.\n\nWherefore the dispensation of all things is brought about by means of there, the twain - Cosmos and Man - but by the One."

