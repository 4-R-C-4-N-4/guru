[content]
body = "For that the maker is defective for long periods (in which he sometimes makes, and sometimes doth not make) both in the quality and in the quantity [of what he makes]; in that he sometimes maketh them so many and such like, and sometimes the reverse.\n\nBut \"God and Father and the Good\" is [cause] for all to be.\n\nSo are at least these things for those who can see.\n\n4.\n\nFor It doth will to be, and It is both Itself and most of all by reason of Itself.\n\nIndeed, all other things beside are just bacause of It; for the distinctive feature of the Good is \"that it should be known\".\n\nSuch is the Good, O Tat.\n\nTat: Thou hast, O father, filled us so full of this so good and fairest sight, that thereby my mind's eye hath now become for me almost a thing to worship.\n\nFor that the vision of the Good doth not, like the sun's beam, firelike blaze on the eyes and make them close; nay, on the contrary, it shineth forth and maketh to increase the seeing of the eye, as far as e'er a man hath the capacity to hold the inflow of the radiance that the mind alone can see.\n\nNot only does it come more swiftly down to us, but it does us no harm, and is instinct with all immortal life.\n\n5.\n\nThey who are able to drink in a somewhat more than others of this Sight, ofttimes from out the body fall asleep in this fairest Spectacle, as was the case with Uranus and Cronus, our forebears.\n\nmay this be out lot too, O father mine!\n\nHermes: Yea, may it be, my son!\n\nBut as it is, we are not yet strung to the Vision, and not as yet have we the power our mind's eye to unfold and gaze upon the Beauty of the Good - Beauty that naught can e'er corrupt or any comprehend.\n\nFor only then wilt thou upon It gaze when thou canst say no word concerning It.\n\nFor Gnosis of the Good is holy silence and a giving holiday to every sense.\n\n6.\n\nFor neither can he who perceiveth It, perceive aught else; nor he who gazeth on It, gaze on aught else; nor hear aught else, nor stir his body any way.\n\nStaying his body's every sense and every motion he stayeth still.\n\nAnd shining then all round his mond, It shines through his whole soul, and draws it out of body, transforming all of him to essence.\n\nFor it is possible, my son, that a man's soul should be made like to God, e'en while it still is in a body, if it doth contemplate the Beauty of the Good.\n\n7.\n\nTat: Made like to God?\n\nWhat dost thou, father, mean?\n\nHermes: Of every soul apart are transformations, son.\n\nTat: What meanest thou?\n\nApart?\n\nHermes: Didst thou not, in the General Sermons, hear that from one Soul - the All-soul - come all these souls which are made to revovlve in all the cosmos, as though divided off?\n\nOf these souls, then, it is that there are many changes, some to a happier lot and some to [just] the contrary of this.\n\nThus some that were creeping things change into things that in the water dwell, the souls of water things change to earth-dwellers, those that live on earth change to things with wings, and souls that live in air change to men, while human souls reach the first step of deathlessness changed into daimones.\n\nAnd so they circle to the choir of the Inerrant Gods; for of the Gods there are two choirs, the one Inerrant, and the other Errant."

