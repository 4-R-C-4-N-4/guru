[content]
body = "18.\n\nWhen then the mind doth free itself from the earth-body, it straightway putteth on its proper robe of fire, with which it could not dwell in an earth-body.\n\nFor earth doth not bear fire; for it is all set in a blaze even by a small spark.\n\nAnd for this cause is water poured around earth, to be a guard and wall, to keep the blazing of the fire away.\n\nBut mind, the swiftest thing of all divine outthinkings, and swifter than all elements, hath for its body fire.\n\nFor mind being builder doth use the fire as tool for the construction of all things - the Mind of all [for the construction] of all things, but that of man only for things on earth.\n\nStript of its fire the mind on earth cannot make things divine, for it is human in its dispensation.\n\n19.\n\nThe soul in man, however - not every soul, but one that pious is - is a daimonic something and divine.\n\nAnd such a soul when from the body freed, if it have fought the fight of piety - the fight of piety is to know God and to do wrong to no man - such a soul becomes entirely mind.\n\nWhereas the impious soul remains in its own essence, chastised by its own self, and seeking for an earthly body where to enter, if only it be human.\n\nFor that no other body can contain a human soul; nor is it right that any human soul should fall into the body of a thing that doth possess no reason.\n\nFor that the law of God is this: to guard the human soul from such tremendous outrage.\n\n20.\n\nTat: How father, then, is a man's soul chastised?\n\nHermes: What greater chastisement of any human soul can there be, son, than lack of piety?\n\nWhat fire has so fierce a flame as lack of piety?\n\nWhat ravenous beast so mauls the body as lack of piety the very soul?\n\nDost thou not see what hosts of ills the impious soul doth bear?\n\nIt shrieks and screams: I burn; I am ablaze; I know not what to cry or do; ah, wretched me, I am devoured by all the ills that compass me about; alack, poor me, I neither see nor hear!\n\nSuch are the cries wrung from a soul chastised; not, as the many think, and thou, son, dost suppose, that a [man's] soul, passing from body, is changed into a beast.\n\nSuch is a very grave mistake, for that the way a soul doth suffer chastisement is this: 21.\n\nWhen mind becomes a daimon, the law requires that it should take a fiery body to execute the services of God; and entering in the soul most impious it scourgeth it with whips made of its sins.\n\nAnd then the impious soul, scourged with its sins, is plunged in murders, outrage, blasphemy, in violence of all kinds, and all the other things whereby mankind is wronged.\n\nBut on the pious soul the mind doth mount and guide it to the Gnosis' Light.\n\nAnd such a soul doth never tire in songs of praise [to God] and pouring blessing on all men, and doing good in word and deed to all, in imitation of its Sire.\n\n22.\n\nWherefore, my son, thou shouldst give praise to God and pray that thou mayst have thy mind Good Mind.\n\nIt is, then, to a better state the soul doth pass; it cannot to a worse.\n\nFurther there is an intercourse of souls; those of the gods have intercourse with those of men, and those of men with souls of creatures which possess no reason."

