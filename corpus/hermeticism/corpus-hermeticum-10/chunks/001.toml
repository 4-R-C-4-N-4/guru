body = "The Corpus Hermeticum translated by G.R.S.\n\nMead X.\n\nThe Key <This longer tractate presents itself explicitly as a summary or abridgement of the General Sermons (CH II-IX), and discusses the Hermetic view of knowledge and its role in the lives and afterlives of human beings.\n\nThe attentive reader will notice certain contradictions between the afterlife-teachings of this and previous tractates.\n\n<One of the central concepts of The Key , and of Hermetic thought generally, is the distinction between ordinary discursive knowledge which can be expressed in words (in Greek, episteme , which Mead translates somewhat clumsily as \"science\") and transcendent, unitive knowledge which cannot be communicated (in Greek, gnosis , which Mead simply and sensibly leaves untranslated).\n\nThe same distinction can be found in many systems of mystical thought.\n\nUnlike most of these, though, the Hermetic teachings place value on both.\n\n<Readers without much experience in the jargon of Classical philosophy will want to remember that \"hylic\" means \"material\", \"passible\" means \"subject to outside forces or to suffering\", and \"intelligible\" means \"belonging to the realm of the Mind\", and \"motion\" includes all kinds of change.\n\nThe special implications of \"good\" in Greek thought - of self-sufficiency and desirability - should also be kept in mind.\n\n<The delightful irony of the Zen moment early in section 9, when Hermes - in the middle of this very substantial lecture - defines the good and pious man as \"he who doth not say much or lend his ear to much\" and thus rules out both himself and his audience, seems to have been lost on subsequent commentators.\n\n- JMG> 1.\n\nHermes: My yesterday's discourse (logos) I did devote to thee, Asclepius, and so 'tis [only] right I should devote toafy's to Tat; and this the more because 'tis the abridgement of the General Sermons (Logoi) which he has had addressed to him.\n\n\"God, Father and the Good\", then, Tat, hath the same nature, or more exactly, energy.\n\nFor nature is a predicate of growth, and used of things that change, both mobile and immobile, that is to say, both human and divine, each one of which He willeth into being.\n\nBut energy consists in something else, as we have shown in treating of the rest, both things divine and human things; which thing we ought to have in mind when treating of the Good.\n\n2.\n\nGod's energy is then His Will; further His essence is to will the being of all things.\n\nFor what is \"God and Father and the Good\" but the \"to be\" of all that are not yet?\n\nNay, subsistence self of everything that is; this, then, is God, this Father, this the Good; to Him is added naught of all the rest.\n\nAnd though the Cosmos, that is to say the Sun, is also sire himself to them that share in him; yet so far is he not the cause of good unto the lives, he is not even of their living.\n\nSo that e'en if he be a sire, he is entirely so by compulsion of the Good's Good-will, apart from which nor being nor becoming could e'er be.\n\n3.\n\nAgain, the parent is the children's cause, both on the father's and the mother's side, only by sharing in the Good's desire [that doth pour] through the Sun.\n\nIt is the Good which doeth the creating.\n\nAnd such a power can be possessed by no one else than Him alone who taketh naught, but wills all things to be; I will not, Tat, say \"makes\"."

