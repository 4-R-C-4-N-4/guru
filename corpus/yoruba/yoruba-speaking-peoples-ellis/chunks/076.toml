[content]
body = "Prayers are never addressed to it, nor are offerings presented to it; it is merely the instrument or vehicle through which the god from whom it was obtained acts, and by means of which events which affect the wearer of the onde are brought to the knowledge of the god.\n\nAn onde for the protection of the person is worn on the body, being tied round the wrist, neck, or ankle, or placed in the hair.\n\nOthers, for the protection of property, are fastened to houses, or tied to sticks and stumps of trees in cultivated plots of ground.\n\nIn consequence of their being tied on to the person or object they protect, the word edi , which really means the act of tying or binding, has now the meaning of amulet or charm, just as in Ewe the word vo-sesa (amulet) is derived from vo and sa , to tie or bind.\n\nAnother word sometimes used to express amulet is ogun , which, however, more properly means medicinal preparation, poison, or magical drug.\n\nThe following are some examples of current superstitions.\n\n(1) The fur of the choro , a kind of hare, is a charm which protects the house from fire.\n\n(2) A house fumigated with the bark of the crun tree is purged of evil spirits and, consequently, of sickness.\n\nCharcoal made from the wood of this tree is largelyused as a medicine.\n\n(3) Powder made of the leaves of the sensitive plant, is a charm to make the inmates of a house fall into a deep sleep, and is used by thieves.\n\n(4) To kill an ajako , a kind of jackal, brings misfortune upon the slayer.\n\nA proverb says, \"He who kills an ajako will suffer for it.\" (5) The flocking of vultures denotes impending war.\n\nThese birds prey on the slain, and so, by an inversion of ideas, are supposed to cause war.\n\n(6) To break the bones of the crane called agufon causes calamity.\n\n(7) Whoever touches the nest of the bird called ogarodo will die.\n\nThe Yorubas have the same superstitions in regard to the hooded crow, porcupine, tortoise, and wild cat (ogboya) as have the Ewe tribes.[1] By country-custom no Yoruba may milk a cow, and in consequence cows are always tended by foreignborn slaves, usually Fulani.\n\nWe find a curious example of the manner in which objective and subjective connection are confused in the expression, Abede ni ti okira -\" Right through is the cutting of the sword-fish.\" This saying is used as a charm by warriors, and is believed to ensure success, [1.\n\n\"Ewe Speaking Peoples,\" pp."

