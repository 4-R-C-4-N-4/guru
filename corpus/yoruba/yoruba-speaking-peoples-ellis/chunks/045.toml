[content]
body = "28-27.] desire with any woman who takes his fancy, and give his tongue every licence.\n\nThe reason of his being thus honoured for the twenty-four hours before being sacrificed, is that it is believed he will be born again and become a king; and, after the head has been struck off, the corpse is treated with the greatest respect by all.\n\nIn order for this sacrifice to be effective, it is necessary that the war leaders should take the field before the body begins to become offensive.\n\nThe Ibadans, who appear to be rather averse to human sacrifice, always used to perform this duty by deputy, paying the priests of Ife to sacrifice for them a slave in that town.\n\nWhen the war of 1877 began they omitted to do this, thinking that the affair would not be serious; and, attributing their subsequent want of success to the omission, they afterwards sacrificed a slave to Ogun in their camp at Kiji in 1885, they having been prevented from doing it earlier by their leader, a Mohammedan, who died in that year.\n\nThe priests of Ogun usually take out the hearts of human victims, which are dried, reduced to powder, then mixed with rum, and sold to persons who wish to be endowed with great courage, and who drink the mixture.\n\nThe reason of this is that the heart is believed to be the seat of courage and to inherently possess that quality; and that when the heart is devoured or swallowed the quality with which it is inspired is also taken into the system.\n\nNext: Chapter III: Minor Gods."

