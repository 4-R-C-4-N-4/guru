[content]
body = "It was about four miles in circumference, defended by a mud wall, and contained in time of peace about 15,000 inhabitants, all of whom, with the exception of the Awujale and his immediate following, had now fled.\n\nOn the 25th, the Governor arrived from Lagos to conduct the negotiations with the Awujale, who made complete submission, alleging that the young men had fought contrary to his wishes and orders; and, on the 30th and 31st, the expeditionary force, with the exception of three officers and 140 men of the Constabulary, who remained in occupation of Jebu Ode, left for Lagos, one column marching through Sagamu and Ikoradu, and another through Itoike.\n\nThe trade routes on the east were now opened, but those through Egba country still remained closed, and for some time it was thought that a military expedition against Abeokuta would be necessary.\n\nThe ease with which the Jebus, who were considered a very powerful tribe, had been punished, had, however, made a profound impression upon the native mind, and many British subjects of Egba descent at Lagos, fearing that, if the chiefs of Abeokuta maintained their unfriendly attitude, the independence of Egba would be lost, strongly impressed upon their compatriots the necessity of coming to terms.\n\nIn consequence, the Egbas declared their willingness to receive the Governor, Mr.\n\nCarter, and come to some arrangement, with the result that oil the 18th of January, I893, a treaty was signed at Abeokuta.\n\nThe Egbas undertook to refer all disputes between themselves and British subjects to the Governor for settlement, to establish complete freedom of trade between Egba country and Lagos, and to close no trade route without the consent of the Governor.\n\nThey also promised to abolish human sacrifice, and not to cede any portion of Egba territory to a foreign power without the consent of the British.\n\nOn the other hand, Great Britain guaranteed that the independence of Egba should be fully recognised, and no annexation of any portion of it be made without the consent of the Egba authorities.\n\nThere is a considerable difference between the Yoruba-speaking Peoples and the Ewe-speaking Peoples.\n\nWe still find the characteristics which were dominant among the latter, namely, indolence, improvidence, and duplicity, but they are no longer so pronounced, probably, almost certainly, because life and property are more secure.\n\nThe Yoruba has more independence of character tban the Tshis, Gas, or Ewes, and servility is rare, He even has the sentiments of nationality and patriotism, and though these are regarded with disfavour by the Colonial Government, they are none the less tokens of superiority.\n\nHe is a keener trader, is more sociable, and is in all respects socially higher than the tribes of the other three cognate groups."

