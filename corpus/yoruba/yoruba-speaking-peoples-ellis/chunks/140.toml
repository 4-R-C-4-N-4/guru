[content]
body = "A fragment of rock from a boulder inhabited by an indwelling spirit, or a figure carved from wood taken from a tree in a grove inhabited by a spirit, preserves in the minds of the worshippers the subjective connection between the fragment and the boulder, or the figure and the grove; and, by a confusion of ideas which is well known, he thinks that the objective connection is likewise unbroken, and that the god, or spirit, is by means of the simulacrum brought before him.\n\nThis removal, as it were, of a god from his proper dwelling-place, necessarily leads, first, to a weakening of the tie between the god and that which he animates, and, finally, to the nature of the god, as an indwelling spirit of a natural object, being completely lost sight of.\n\nLet us imagine, for example, that the inhabitants of a village who have been in the habit of worshipping the indwelling spirit of a precipitous cliff in the neighbourhood, come to the conclusion that it would be more convenient, and at the same time place them more effectually under the protection of the spirit, if they were to bring him into the village.\n\nThey accordingly make a figure of clay taken from the cliff, and set it up in the village in a miniature hut erected for its protection.\n\nThis hut then becomes the sacred place, and the sacrifices and sacred dances are performed before it, instead of, as heretofore, at the cliff.\n\nThe god, however, is not supposed to have absolutely abandoned the cliff, and persons whose avocations took them to it would still think it necessary to propitiate him with small offering of food.\n\nPractically he is believed to be in the cliff and yet also in the image in the village, for although a man, if asked to explain the seeming impossibility of one and the same person being in two places at once, might say that the god only entered the image in order to receive the offerings and listen to the prayers of the faithful, or that the image merely served as an instrument through which the god could take cognizance of the wants of his followers, yet, as a matter of fact, they never seem to think about the matter at all, and it is taken for granted by the villagers that the god is in their midst.\n\nGenerations are born and die, and are succeeded by others, all of which have been accustomed to perform religious ceremonies before the miniature hut, and the inevitable result is that, sooner or later, the connection of the god with the cliff, of which he was the aniniating principle, is completely lost sight of, and he is regarded as the tutelary deity of the village, pure and simple.\n\nIn this way undoubtedly originated many of the tutelary deities of towns and villages on the Gold Coast, for the process can be seen going on at the present day."

