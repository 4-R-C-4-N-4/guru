[content]
body = "His own proper sacrifices are, as among the Ewe tribes, cocks, dogs and he-goats, chosen on account of their amorous propensities; but on very important occasions a human victim is offered.\n\nIn such a case, after the head has been struck off, the corpse is disembowelled, and the entrails placed in front of the image in a large calabash or wooden dish; after which the body is suspended from a tree, or, if no tree be at hand, from a scaffolding of poles.\n\nTurkeybuzzards are sacred to Elegba and are considered his messengers, no doubt because they devour the entrails and bodies of the sacrifices.\n\nThere is a noted temple Lo Elegba in a grove of palms near Wuru, a village situated about ten miles to the east of Badagry.\n\nThe market of Wuru is under his protection, and each vendor throws a few cowries on the ground as a thank-offering.\n\nOnce a year these cowries are swept up by the priests, and with the sum thus collected a slave is purchased to be sacrificed to the god.\n\nA slave is also sacrificed annually, towards the end of July, to Elegba in the town of Ondo, the capital of the state of the same name.\n\nElegba's principal residence is said to be on a mountain named Igbeti, supposed to be situated near the Niger.\n\nHere he has a vast palace of brass, and a large number of attendants.\n\nCircumcision among the Yorubas, as among the Ewes, is connected with the worship of Elegba, and appears to be a sacrifice of a portion of the organ which the god inspires, to ensure the well-being of the remainder.\n\nTo circumcise is dako (da-oko) da , to be acceptable as a sacrifice, and oko , the foreskin.\n\nCircumcision is ileyika , or ikola , the former of which means \"the circular cutting\" ( ike , the act of cutting, and ikeya , a circuit), and the latter, \"the cutting that saves\" ( ike , the act of cutting, and ola , that which saves).\n\nExcept among the Mohammedans there is no special time for performing the rite of circumcision, it being fixed for each individual by Ifa, after consultation, but usually it is done early in life.\n\nNo woman would have connection with an uncircumcised man.\n\nA similar operation is performed on girls, who are excised, by women operators, shortly before puberty, that is, between the ages of ten and twelve years."

