body = "In this case the sacrifice is probably made to the legion of spirits, mostly evil, who are supposed to haunt the forests and uninhabited tracts of country; and the general belief is that the approaching danger is diverted from the proper road., and turned away from the community which it [1.\n\nWhence it is that tbe verb da , \"to be poured out,\" has also the meaniug \"to be acceptable as a sacrifice.\"] threatened.\n\nIn reference to this practice a proverb says, \"The cross-roads do not dread sacrifices.\"[1] Sometimes, in response to the appeal of the priest, the god answers in a bird-like, twittering voice, first heard whispering at a little distance and then comingnearer.\n\nWhen this occurs, the worshippers lie prone with their faces to the ground, awe-stricken, while the priest carries on a conversation with the spirit voice, and subsequently interprets it to the auditors.\n\nThis conception that a spirit-voice should be a twittering, chirping, or whistling sound is very wide-spread; as Dr.\n\nTyler has shown, it used to exist ainong the Greeks and Romans, and it may at the present day be found aniong the Indian tribes of North America, the Zulus, and the Polynesians.[2] The spirit-voice is no doubt produced by a confederate priest, by incans of a blade of grass, or a leaf, placed between the teeth.\n\nThe image of a god which is merely tutelar to one individual is only treated with respect during the life of that individual, after which it is thrown away.\n\nSince the god is personal to the individual, and has no other purpose than to protect him, the image is only of use as a vehicle of communication between them so long as the man lives.\n\nAfter his death the god no longer enters or animates the image, which in consequelice loses its sacred character, and becomes an ordinary object of no value.\n\nThus, whenever a man dies, his tutelary god, if he had one, is thrown away [1.\n\nThe ancients offered sacrifices -it the cross-roads to Hekate, Goddess of Night.\n\n(Lucian, \"Dialogues of the Dead,\" I.).\n\n2.\n\n\"Primitive Culture,\" vol.\n\ni.\n\np.\n\n452] by the surviving members of the household, and the extraordinary belief, held by some Europeans, that the negro makes and breaks his gods at will, may probably be accounted for as a misconception of this practice.\n\nAlthough human sacrifices occur amongst the Yoruba tribes, we find among them no parallel to the wholesale slaughters which take place, or rather used to take place, in Ashanti and Dahoini."

