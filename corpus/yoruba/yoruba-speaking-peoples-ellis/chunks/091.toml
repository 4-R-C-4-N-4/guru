body = "Sacred Texts Â Africa Â Index Â Previous Â Next Â CHAPTER VIII.\n\nMEASUREMENTS OF TIME.\n\nTHE Yorubas reckon time by moons and weeks.\n\nA moon, or month, is the period of time between one new moon and the next, and, as is the case with all peoples who count by lunar months, the day commences at sunset, that is at the hour at which a new moon would ordinarily be first perceived.\n\nThe custom of measuring time by lunar months appears to be common to all uncivilised peoples, the regular recurrence of the moon at fixed intervals of time affording a natural and easy mode of computing its lapse.\n\nThe measurement of time by weeks, that is, by sub-divisions of the lunar month, seems, in the present state of our knowledge of the modes of measuring time amongst the lower races, to be rather exceptional; but the subject is one that has been much neglected by travellers, and there is but little information from which a conclusion may be drawn.\n\nThe Tshi-tribes of the Gold Coast have (as was stated in the first volume of this series) a seven-day week, or, to be more correct, they have divided the lunar month, which is approximately twenty-nine and a-half days long, into four parts, each of seven days and about nine hours.\n\nHence, as before said,[1] each week commences at a different hour of the day, the reason of this arrangement being that twenty-nine and a-half will not divide exactly into halves and quarters.\n\nThe first day of the first week of the lunar month commences when the new moon is first seen; the first day of the second week commences some nine hours later, and so on.\n\nThe GÃ£-tribes have an exactly similar mode of measuring time, but their names for the days of the week are not the same as those used by the Tshi-tribes.\n\nThey are- 1st.\n\nDsu .\n\n2nd.\n\nDsu-fo .\n\n3rd.\n\nFso .\n\n4th.\n\nSo .\n\n5th.\n\nSo-ha .\n\n6th.\n\nHo .\n\n7th.\n\nHo-gba .\n\nwhich, it will be seen, seem to consist of three pairs and an odd one, the third day.\n\nThe Yoruba week consists of five days, and six of them are supposed to make a lunar month; bnt, as a matter of fact, since the first day of the first week always commences with the appearance of the now moon, the month really contains five weeks of five days' duration, and one of four day-, and a-half, approximately.\n\nThe Benin-tribes to the cast are said to have a similar method, and the Yoruba-tribes have perhaps borrowed the five-day week from them."

