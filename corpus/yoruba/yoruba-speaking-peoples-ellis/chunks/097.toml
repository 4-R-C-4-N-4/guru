body = "Sacred Texts Â Africa Â Index Â Previous Â Next Â CHAPTER IX.\n\nCEREMONIES AT BIRTH, MARRIAGE, AND DEATH.\n\nI.\n\nAT BIRTH.\n\nTHE ceremonies at birth resemble in the main those observed by the Ewe-speaking peoples, and described in the last volume, but there are a few changes which may be attributed to increased priestly influence.\n\nAs soon as the pangs of labour seize a woman a priestess takes charge of her, and has the care of her and the child; while, soon after the child is born, a babalawo appears on the scene to ascertain what ancestral soul has been re-born in the infant.\n\nAs soon as this important point is decided, the parents are informed that the child must conform in all respects to the manner of life of the ancestor who now animates it; and if, as often happens, they profess ignorance, the babalawo supplies the necessary knowledge.\n\nSeven days after birth, if the child be a girl, nine days, if it be a boy, the babalawo comes again and offers a sacrifice of a cock and a hen to Ifa and the Olori, or indwelling spirit of the child's head; after which, in order to prevent Elegba from interfering with the mother and child, the entrails of the two sacrifices are sprinkled with palm-wine, taken outside the house, and placed before his image.\n\nThen follows a ceremony which appears to be one of purification, for here, as among the Tshi and Ewe tribes, the mother and child are considered unclean, as are women during the menses .\n\nThe water which is always in the earthen vessels placed before the images of the gods, is brought to the house and thrown up on the thatched roof, and as it drips down from the eaves the mother and child pass three times through the falling drops.\n\nThe babalawo next makes a water of purification with which he bathes the child's head, he repeats three times the name by which the infant is to be known, and then holds him in his arms so that his feet touch the ground.\n\nAfter these ceremonies have been duly performed the fare is extinguished and the embers carried away; the house is then carefully swept out, live coals are brought, and a fresh fire lighted.\n\nWe thus appear to have a combination of a purification by water and a purification by fire.\n\nAfter the new fire has been kindled, another sacrifice of fowls is made to Ifa, and the proceedings are at an end.\n\nII.\n\nAT MARRIAGE.\n\nWhen a man desires to marry a girl, his parents visit her parents and make proposals of marriage.\n\nIf they are accepted, the suitor sends a present of native cloths and kola-nuts, and, after consulting a babalawo , a day is appointed for the wedding."

