[content]
body = "Some sacrifices are \"unclean\" to all the gods, as the turkey-buzzard ( gunu-gunu ), the vulture ( akala ), and the grey parrot ( ofe ).\n\nAs the two former devour offal and carrion, and are, in fact, scavengers, we can see a reason for considering them unclean; but why the grey parrot should also be so considered is not evident.\n\nThe natives endeavour to account for the \"uncleanliness\" of these birds by two popular sayings, which run as follows:-- \"The turkey-buzzard was required to offer sacrifice, but he refused to do so; the vulture was required to offer sacrifice, but he also refused.\n\nWhen the pigeon was required to offer sacrifice, he did so.\" \"The grey parrot being required to offer sacrifice, refused to offer it; but the green parrot took the sacrifice and offered it.\n\nAfter all, the grey parrot is a citizen of Oyo (the capital of Yoruba) and the green parrot an inhabitant of the country, and yet people thoughit that the grey parrot was not wise.\" As the turkey-buzzard, vulture, and grey parrot refused to offer sacrifice, they became \"unclean,\" while the pigeon and the green parrot, which offered it, remained \"clean.\" The latter part of the second saying appears to be ironical, for the grey parrot, in consequence of its uncleanliness, is never offered up, while the green parrot is sacrificed.\n\nOn important occasions the priest designates to the suppliants the sacrifice which he thinks necessary to induce the god to lend a favourable ear.\n\nThey prostrate themselves before the shrine with cries of \" Toto, toto-huu ,\" an exclamation which denotes humiliation and submission, while the priest, in a long harangue, presents their petition, or case, to the god.\n\nHe usually begins his address by flattering the god, dwelling upon his fame and power, and showing how his humble servitors are entirely dependent upon his good-will.\n\nThen he calls attention to the self-abasement of the god's faithful followers \"So-and-so,\" to the value of the victim which they have brought him, and begs him to be propitious and listen to their humble prayer.\n\nHe then sacrifices the victim, sprinkles some of the blood on the image, pours the remainder on the ground,[1] and places the head and entrails in a shallow earthen vessel in front of the temple.\n\nSacrifices are thus offered in the presence of the god, that is, before his image, which he is supposed to animate for the time being, but there is one exception to this general rule.\n\nThis is, on occasions when sacrifice is made at cross-roads, or at a point where several roads meet, in order to avert an impending calamity."

