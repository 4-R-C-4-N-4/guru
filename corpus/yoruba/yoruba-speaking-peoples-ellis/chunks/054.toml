[content]
body = "When an evening star she is called Irawo-ale, Star of the Evening.\n\nSirius is called Irawo-oko, Canoe Star, because it is believed to be a guide to canoemen.\n\nA proverbial saying likens the stars to chickens following a hen, the Moon; and the Milky Way is called the group of chickens.\" (23) OLORI-MERIN.\n\nOlori-merin, possessor of four heads, is another god whose worship is nearly, if not quite, obsolete.\n\nHe was the tutelary deity of towns, and was represented by a hillock, or, if no hillock existed within the precincts of the town, by an artificial mound.\n\nSacrifice was made to Olori-merin every three months, or four times a year, and always consisted of a new-born child not more than three or four days' old.\n\nThe child's throat was cut by a priest, and the blood, caught in a calabash or earthen vessel, was placed on the summit of the mound, after which the flesh was sliced up into small pieces and buried in the mound.\n\nDuring this dreadful scene the mother had to be present.\n\nThis sacrifice was called Ejodun (Eje-odun), \"The season of blood.\" Olori-merin had, as his name betokens, four heads, with which he watched the four points of the compass from the top of his mound, and it was believed that no war or pestilence could attack a town under his protection.\n\nHe had the legs and feet of a goat.\n\nSometimes, at -night, he appeared in the shape of a venomous serpent.\n\nNext: Chapter IV: Remarks on the Foregoing."

