[content]
body = "Colleges and seminaries for the instruction of novices are numerous, and to each god are attached a number of temple-women, or wives.\n\nAmong the Yoruba tribes priestly organisation is carried still further, and there are three recognised orders of priests, each of which is subdivided into grades.\n\nOn the Gold Coast a priest might officiate indifferently before any god of the locality for which he was, so to speak, ordained; but if a Yoruba priest of Shango were to attempt to consult Ifa there would be as great a commotion as there would be if a Roman Catholic priest were to attempt to preach in a Baptist Chapel.\n\nThere is, in fact, a healthy competition between the priests of the principal gods, and each guard their own privileges very jealously.\n\nReligion, at the stage of growth in which we find it among, these three groups of tribes, has no connection with morals, or the relations of men to one another.\n\nIt consists solely of ceremonial worship, and the gods are only offended when some rite or ceremony has been neglected or omitted.\n\nIf the omission be quite unintentional the result is just the same, as the gods, like uncivilised man, judge by acts and not by motives.\n\nIn all ages man makes God the moral counterpart of himself, and in savage life he only revenges that which affects himself.\n\nWith the wrongs of others he has nothing to do.\n\nIf a man murdered his neighbour and robbed the widow and orphans, that would be a matter that would not concern the gods in the least, and, provided he paid the usual homage expected by gods from their followers, he would be as secure of their favour and protection as if he were perfectly innocent of all crime.\n\nOn the other hand, years of blameless life would not save a man from punishment if he omitted some customary rite, or inadvertently gave offence.\n\nSimilarly, in the Hebrew books, we find that the detestable fraud perpetrated by Jacob upon his brother Esau did not in any way lessen the favour with which he was regarded by the national god; but when the unfortunate Uzzah, with the best intentions in the world, put forth his hand and held the ark to keep it from falling, he was struck dead, because the action implied that the god was not able to protect himself.\n\nSo, too, among the ancient Greeks, the gods took no cognisance of social offences, and only revenged slights offered to themselves; as, when they caused Protesilaus, the husband of Laodamia, to be the first hero slain before Troy, because she, in her eagerness to consummate her marriage, forgot to propitiate them with the usual sacrifices."

