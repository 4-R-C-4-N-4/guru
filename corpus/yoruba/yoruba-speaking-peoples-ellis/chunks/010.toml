[content]
body = "Shortly after 1840 the Ekiti tribes, as they were afterwards termed, that is, the inhabitants of the various towns lying between lbadan and Ijesa, and the adjoining territory to the south, formed a, confederation, which was soon joined by Ife and Ijesa, the ruler of the latter state being elected bead of the confederation.\n\nThe Mohammedans of Ilorin were the first to take alarm at this coalition, and attacked the confederates, destroying or annexing several towns while Ibadan soon followed suit, and after a time succeeded in conquering and annexing Ijesa.\n\nThe result of these various conflicts was that the confederation was entirely subdued, one half passing under the rule of Ilorin and the other under that of Ibadan.\n\nBefore long, however, the inhabitants of the towns which had been annexed to Ilorin applied to Ibadan for assistance, and another war ensued, which resulted in the expulsion of the Ilorins, and the establishment of the rule of Ibadan over the whole Ekiti confederation.\n\nThis was about 1858.\n\nWhile these events were taking place in the interior, Lagos, which, as we have seen, was colonised from Yoruba at the beginning of the century, had become a place of some note as a slave emporium.\n\nThe wars in the north, which had been almost incessant since the rebellion of Afunja about 1807, had resulted in the capture of many thousands of prisoners of war, of both sexes and all ages, and the dregs of these, the men who were of no local importance, and the women who were no longer attractive, were, in accordance with the usual practice, sold to the slave-traders.\n\nLagos was the most convenient port, and they were therefore inarched.\n\ndown there in gangs to await shipment.\n\nThis traffic in slaves, which brought Lagos into some notoriety commenced about the year 1815, and soon attained very large dimensions.\n\nIn 1836 a struggle for the succession broke out in Lagos, and resulted in Kosoko, the legitimate pretender, being expelled the kingdom by his rival Oluwole, who secured the throne for himself.\n\nOluwole died in 18{ ???\n\n}, and was succeeded by Akitoye, who was foolish enough to invite Kosoko, who was still alive and in banishment, to come and live in Lagos.\n\nKosoko readily accepted the invitation, soon began conspiring, and before long found himself sufficiently well supported to rebel.\n\nIn the struggle which ensued the town of Lagos was burned, and Akitoye driven into banishment.\n\nHe found a refuge at Badagry, and, in order to induce the English to espouse his cause, promised that, if he were reinstated at Lagos, he would help to suppress the slave-trade."

