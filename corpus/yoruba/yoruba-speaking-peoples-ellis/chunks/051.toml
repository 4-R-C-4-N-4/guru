[content]
body = "At this festival general licence prevails, the priestesses give themselves indiscriminately to all the male worshippers of the god, and, theoretically, every man has a right to sexual intercourse with every woman he may meet abroad.\n\nSocial prejudices have, however, restricted the application of this privilege, and it is now only slave-girls, or women of the lowest order, who are really at the disposal of the public, and then only if they are consenting parties.\n\nAt this festival all kinds of vegetable productions are cooked and placed in vessels in the streets, for general use.\n\n(12) OSANHIN.\n\nOsanhin ( san , to benefit) is the god of Medicine, and, as he is always applied to in cases of sickness, his worship is very general.\n\nHis emblem is the figure of a bird perched upon an iron bar.\n\n(13) ARONI.\n\nAroni is the Forest-god, and, like the last, has a knowledge of medicine, though the cure of disease is not his special function.\n\nThe name means \"One having a withered limb,\" and Aroni is always represented as of human shape but with only one leg, the head of a dog, and a dog's tail.\n\nAroni seizes and devours those who meet him in the forest and attempt to run away when they see him; but if a man faces him boldly and shows no sign 'of fear, he leads him to his dwelling in the fastnesses of the forest, and keeps him there for two or three months, during which time he teaches him the secrets of the plants and their medicinal properties.\n\nWhen the pupil has no more to learn Aroni dismisses him, giving him a hair from his tail to prove to the incredulous that he has really been initiated.\n\nAn eddy of wind, rushing through the forest and swirling up the dead leaves, is considered a manifestation of Aroni.\n\n(14) AJA.\n\nAja, whose name appears to mean a wild vine, is a deity somewhat similar to Aroni.\n\nLike Aroni, she carries off persons who meet her into the depths of the forest, and teaches them the medicinal properties of plants; but she never harms anyone.\n\nAja is of human shape, but very diminutive, she being only from one to two feet high.\n\nThe aja vine is used by women to cure enflamed breasts.\n\n(15) OYE.\n\nOye, the god of the Harmattan wind, is a giant who, according to some, lives in a cavern to the north of Ilorin, while others say that 'he resides on the mountain named Igbeti, where Elegba is supposed to have his palace.\n\n(16) IBEJI."

