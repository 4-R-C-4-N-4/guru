[content]
body = "Then the goblin said: \"Go and pick three ados .\n\nDo not pick those which cry 'Pick me, pick me, pick me,' but pick those which say nothing.\" The little girl went.\n\nShe found ados which said nothing and she left them alone.\n\nShe found others which cried, \"Pick me, pick me, pick me,\" and she picked three of them.\n\nThen the goblin said to her, \"When you are halfway home break one ado ; when you are at the door break another; and break the third when you are inside the house.\" Half-way home the little girl broke one ado , and behold, numbers of lions, and leopards, and hyenas, and snakes, appeared.\n\nThey ran after her, and harassed her, and bit her till she reached the door of the house.\n\nThen she broke the seeond ado , and behold, more ferocious animals came upon her and bit her and tore her at the door.\n\nThe door was shut, and there was only a deaf person in the house.\n\nThe little girl called to the deaf person to open the door, but he heard her not.\n\nAnd there, upon the threshold, the wild beasts killed the little girl.\n\nII My alo is about a poor young woman.[1] There was a poor young woman who had a child.\n\nShe was so poor that she could not even buy a cloth to wear, and her child was held on her back with a plantain-leaf.\n\nThe poor young woman used to go into the forest to cut fire-wood to sell.\n\nOne day she went there as usual.\n\nThere was a tall tree, and under it she put down her child to sleep in the shade.\n\nNow in this tree there was an aranran ,[2] and while the young woman was cutting fire-wood, the aranran seized the child, and carried it up into the tree.\n\nWhen the young woman had made up her bundle of wood, she came back to the place where she had left her child, and could not find it.\n\n[1.\n\nThis story is also about the discomfiture of an iyale , which is a favourite theme.\n\nThe plot resemblcs the foregoing.\n\n2.\n\nAranran , a bird of prey; probably from ra , to hover.] She looked everywhere, but still could not find it, and she ran to-and-fro, crying bitterly.\n\nAt last she looked up, and then she saw her child in the claws of the aranran , high up in the tree-top.\n\nAnd she began to sing:-- \" Aranran, eiye igbo, igbo ,[1] Give me back my child, oh, igbo .\n\nHere is a rope of tie-tie,[2] igbo ; Quickly let my child down, igbo .\" When the young woman had sung this, the aranran threw down to her a bag of coral beads."

