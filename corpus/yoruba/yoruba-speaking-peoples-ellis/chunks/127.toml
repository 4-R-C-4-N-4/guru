[content]
body = "\"Go quick,\" he said.\n\n\"Go quick, and find the bird.\" He pushed him out of the house.\n\nThe boy made a little drum, and went on the road to the bush.\n\nHe sat down in a place in the bush where the birds were accustomed to come.\n\nHe began to beat on his drum, and the drum said:-- \"Tinliki, thiliki, tinli-puru.\n\nTinli-puru.\" All the birds flocked round, and each danced in turn.\n\nWhen it came to the turn of the kini-kini to dance, the kini-kini did not want to dance.\n\nAll the birds begged him to dance, but he refused.\n\nThen the boy played quicker on the drum.\n\nHe beat, and beat, and beat, while all the birds begged the kini-kini .\n\nAt last the kini-kini began to yield.\n\nHe twisted here and he twisted there.\n\nHe flew three times round the head of the little boy.\n\nThe boy continued beating as if he had not noticed anything, and the kini-kini began to dance.\n\nHe turned here and twisted there.\n\nHe turned, and twisted, and turned, till he came quite close up to the drum.\n\nThen the little boy thrust out his hand and seized the kini-kini by the leg.\n\nAll the other birds flew away.\n\nThe boy brought the kini-kini to his father.\n\n\"I have caught him,\" he said.\n\n\"Here he is.\n\nWon't you do something now to restore my ear?\" Then the king got up.\n\nHe took a dead leaf and put it in the place of the ear.\n\nAnd the dead leaf softened and changed into an ear.\n\nÂ We now come to those tales which may be called \"Tortoise Stories,\" since the tortoise ( awon ) always plays a leading part in them.\n\nThe tortoise has, in these tales, various superhuman powers attributed to him, and, in most, is described as acting craftily or mischievously.\n\nHe, in fact, fills in the folk-lore tales of the Slave Coast the place of the spider ( anansi ) in the tales of the Gold Coast, and which are in consequence known as Anansi 'sem ( Anansi asem ), \"Spider Stories.\" In these the spider is always depicted as showing great skill and craft, and, like the minor gods, is represented as speaking through the nose."

