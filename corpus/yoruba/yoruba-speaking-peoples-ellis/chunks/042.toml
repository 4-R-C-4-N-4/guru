[content]
body = "After this ebullition of anger, Olokun retired once more to his own domains, but the world was nothing but mud, and quite unfit to live in, till Ifa came down from the sky, and, in conjunction with Odudua, once more made it habitable.\n\n(7) ELEGBA.\n\nElegba, or Elegbara (Elegba-Bara), often called Esbu, is the same phallic divinity who was described in the volume on the Ewe-speaking Peoples.\n\nThe name Elegba seems to mean, \"He who seizes\" ( Eni-gba ), and Bara is perhaps Oba-ra , \"Lord of the rubbing\" ( Ra , to rub one thing against another).\n\nEshu appears to be from shu , to emit, throw out, evacuate, The propensity to make mischief, which we noted as a minor characteristic of the Ewe Elegba, is much more prominent in the Yoruba god, who thus more nearly approaches a personification of evil.\n\nHe is supposed always to carry a short knobbed club, which, originally intended to be a rude representation of the phallus , has, partly through want of skill on the part of the modellers of the images, and partly through the growing belief in Elegba's malevolence, come to be regarded as a weapon of offence.[1] Because he bears this club he has the title of Agongo ogo .\n\nOgo is the name of the knobbed club, and is most probably a euphemism for the phallus; it is derived from go , to hide in a bending or stooping posture.\n\nThe derivation of agongo is less easy to determine, but it seems to be from gongo , tip, extremity.\n\nThe image of Elegba, who is always represented naked, seated with his bands on his knees, and with an immensely, disproportionate phallus , is found in front of almost every house, protected by a small hut roofed with palm-leaves.\n\nIt is with reference to this that the proverb says: \"As Eshw has a malicious disposition, his house is made for him in the street\" (instead of indoors).\n\nThe rude wooden representation of the phallus is planted in the earth by the side of the hut, and is seen in almost every public place; while at certain festivals it is paraded in great pomp, and pointed towards the young girls, who dance round it.\n\nElegba, in consequence of the bargain he made with [1.\n\nIn the case of Priapus we find a similar connection between the phallus and a cudgel.\n\nSee Catullus, xx., \"The Garden God.\"] Ifa, receives a share of every sacrifice offered to the other gods."

