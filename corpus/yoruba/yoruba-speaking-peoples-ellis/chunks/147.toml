[content]
body = "The evolution of types has been carried further than among the Ewes, and instead of each hill and mountain having its own indwelling god we have Oke, god of heights in general; while in place of the multitude of local sea-gods found on the Gold Coast and the western half of the Slave Coast, we have one general god of the sea, Olokun.\n\nAroni, god of forests, is another example.\n\nOlosa, the lagoon, Oya, the river Niger, and the two rivers Oshun and Oba, are nature-gods, which, from being strictly local, have now become general.\n\nIfa, god of divination, who is the benefactor of man and the unveiler of the future, was probably originally a ghost-god as no doubt was Osanhin, god of medicine.\n\nOgun, god of iron, and hence of war, may be a personification of iron, but it is just as probable that he was the traditional discoverer of the use of iron, and hence a ghost-god, who has now been raised to the first rank.\n\nIn the general tendency to regard Legba as the evil principle, we perhaps see a first step towards dualism, in which Ifa, for choice, would represent the good principle.\n\nAll the gods are more anthropomorphic than was the case with the Ewe and Tshi tribes.\n\nLooking, then, at these three groups of tribes, we find what seems to be a regular progression from the gods of hamlets and small communities, as among the Tshis, to the gods of a whole people, as among the Yorubas; and from the worship of the indwelling spirits of tangible objects, or objects believed to be tangible, as the sky, and of dead men, to the worship of personified principles.\n\nWith the aggregation of peoples comes the concretion of gods.\n\nOn the Gold Coast the natives dwell in small groups, isolated from one another by large tracts of forest.\n\nThere are no towns, properly speaking, except on the sea-coast, and only a few large villages.\n\nIdeas percolate but slowly, and people live in the narrow circle of their own lives, knowing little or nothing of anything that transpires outside their own hamlet.\n\nTo them their own surroundings are of the first importance, and the local god is the first in their estimation.\n\nThere is no room here for the growth of national and general gods, for everything is narrowed down to the village circle.\n\nAmong those Ewe tribes who inhabit the western and forested portion of the Slave Coast we find much the same condition of affairs; but in the eastern Ewe districts the country is comparitively open, communities are larger, and communication is in every way freer."

