body = "It is very dry, and a proverbial saying, said of a tedious visitor, runs, \"He chokes me like ekuru .\"] stuff them into Tortoise's horn.\" \"Very good,\" said Adun.\n\nShe did as she was told.\n\nThen she took up her bundle and started off.\n\nTortoise took the horn to blow it.\n\nThe ekurus came into his mouth.\n\nHe ate, ate, ate, and Adun ran away.\n\nV.\n\nMy alo is about a maiden named Buje, the slender.\n\nThere was a young maiden named Buje, the slender, whom all the men wanted.\n\nThe rich wanted her, but she refused.\n\nChiefs wanted, and she refused.\n\nThe king wanted her, and she still refused.\n\nTortoise came to the king, and said to him, \"She whom you all want, and cannot get, I will get.\n\nI will have her, I.\" And the king said, \"If you succeed in having her, I will divide my palace into two halves and will give you one half.\" One day, Buje, the slender, took an earthen pot and went to fetch water.\n\nTortoise, seeing this, took his hoe, and cleared the path that led to the spring.\n\nHe found a snake in the grass, and killed it.\n\nThen he put the snake in the middle of the path.\n\nWhen Buje, the slender, had filled her pot, she came back.\n\nShe saw the snake in the path, and called out \"Hi!\n\nhi!\n\nCome and kill this snake.\" Tortoise ran up, with his cutlass in his hand.\n\nHe struck at the snake, and wounded himself in the leg.\n\nThen he cried out \"Buje, the slender, has killed me.\n\nI was cutting the bush, I was clearing the path for her.\n\nShe called to me to kill the snake, and I came quickly.\n\nBuje, the slender, Buje, the slender, I have killed the snake, but I have wounded myself in the leg.\n\nOh, Buje, the slender, Buje, the slender, take me up on your back like a child.\n\nTake me up on your back and hold me close.\" He cried this many times, and at last Buje, the slender, took Tortoise and put him up on her back.\n\nAnd then Tortoise slipped his legs down over her hips, and violated Buje, the slender, from behind.\n\nNext day, as soon as it was light, Tortoise went to the king.\n\nHe said, \"Did I not tell you that I would have Buje, the slender?\n\nCall all the people of the town to assemble on the fifth day, and you will hear what I have to say.\" When it was the fifth day, the king sent out his crier to call all the people together.\n\nThe people came."

