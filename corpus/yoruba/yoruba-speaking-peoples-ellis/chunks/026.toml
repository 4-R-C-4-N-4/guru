body = "He is not in any sense an omnipotent being.\n\nThis is well exemplified by the proverb which says, \"A man cannot cause rain to fall, and Olorun cannot give you a child,\" which means that, just as a man cannot perform the functions of Olorun and cause rain to fall, so Olorun cannot form a child in the womb, that being the function of the god Obatala, whom we shall next describe.\n\nIn fact, each god, Olorun included, has, as it were, his own duties; and while he is perfectly independent in his own domain, he cannot trespass upon the rights of others.\n\n(2) OBATALA.\n\nObatala is the chief god of the Yorubas.\n\nThe name means \"Lord of the White Cloth\" ( Oba-ti-ala .), and is explained by the fact that white is the colour sacred to Obatala, whose temples, images, and paraphernalia are always painted white, and whose followers wear white cloths.\n\nAnother derivation is Oba-ti-ala, \"Lord of Visions,\" and this gains some probability from the fact that Obatala has the epithets of Orisha oj'enia , \"The Orisha who enters man,\" and Alabalese ( Al-ba-ni-ase ),[1] \"He who predicts the future,\" because he inspires the oracles and priests, and unveils futurity by means of visions.\n\n\"Lord of the White Cloth,\" however, is the translation most commonly adopted, and appears to be the correct one.\n\nThe god is always represented as wearing a white cloth.\n\nObatala, say the priests, was made by Olorun, who then handed over to him the management of the firmament and the world, and himself retired to rest.\n\nObatala is thus also a sky-god, but is a more anthropomorphic conception than Olorun, and performs functions which are not in the least connected with the firmament.\n\nAccording to a myth, which is, however, contradicted by another, Obatala made the first man and woman out of clay, on which account he has the title of Alamorere , \"Owner of the best clay;\" and because he kneaded the clay himself he is called Orisha kpokpo , \"The Orisha who kneads clay\" ( kpo , to knead or temper clay).\n\nThough this point is disputed by some natives, all are agreed that Obatala forms the child in the mother's womb, and women who desire to become mothers address their prayers to him; while albinoism and congenital deformities are regarded as his handiwork, done either to punish [1.\n\nAl-oni (one who."

