[content]
body = "There is at the present time no spider-clan among the totem-clans of the Gold Coast, and, as the communities of the Gold Coast are heterogeneous, we cannot suppose that an entire clan has become extinct, unless the extinction took place in the remote past when cominunitics were hornogeneous; in which case there seems no sufficient reason for the memory of the totem-ancestor being preserved, after the disappearance of all those who were supposed to be descended from him.\n\nTortoise Stories.\n\nI.\n\nMy alo is something about a woman named Olu.\n\nOlu had a son named Sigo, and Sigo determined to be a hunter.\n\nHis father gave him a horse, his mother gave him a sheep, and they told him to go and hunt.\n\nSo Sigo took his bow and arrows, mounted the horse, and rode away into the bush.\n\nHe travelled a long way, and at last arrived at the haunt of animals.\n\nThen the sky became overcast, and it grew so dark that Sigo could scarcely see.\n\nSoon the rain poured in torrents.\n\nIt fell so heavily that Sigo was washed by the water into a deep gully.\n\nHe tried to get out, but could not, and remained there weeping and lamenting.\n\nThe rain ceased, and Tortoise, always on the lookout for opportunities, came to the gully.\n\nSigo saw him, and stretched his neck up to the brink of the gully.\n\n\"Hi!\n\nTortoise!\n\nOh!\n\nbald-headed elf!\n\nHi!\" he cried.\n\nTortoise came and leant over the edge of the gully to see who was calling him.\n\n\"What are you doing there?\" he said.\n\n\"The flood of the rain washed me in here,\" said Sigo.\n\nWhat will you give me if I pull you out?\" asked Tortoise.\n\n\"I will be your slave,\" replied Sigo.\n\n\"Very well,\" said Tortoise, the bald-headed elf.\n\nTortoise climbed down into the gully and took Sigo out.\n\nHe said to him, \"I am going to make a large drum, and shall put you inside it.\n\nWhen we come to any house, and I begin playing on the drum, take care that you sing well.\" \"I understand,\" said Sigo.\n\nWhen he reached the town in which he lived, Tortoise, the bald-headed elf, went to the king and boasted of the fine sound of his drum.\n\nThe king ordered Tortoise to bring the drum and beat it in his presence, so that he could hear the sound.\n\n\"Very well,\" said Tortoise, \"send and call all the town to the dance.\" \"Very good,\" said the king, and be sent all through the town to invite the people to come and dance.\n\nWhen all the people had assembled the king sent to call the bald-headed elf.\n\nThe bald-headed elf took his drum, and came into the midst of the assembly."

