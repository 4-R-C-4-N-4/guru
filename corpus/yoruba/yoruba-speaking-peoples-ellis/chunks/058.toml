body = "Another tradition, though it makes Ife the place of origin of the Yoruba tribes, represents it as being colonised by persons migrating from the interior.\n\nThis tradition is perhaps a dim recollection of a historical fact, historical, that is, in so far that the Yoruba tribes probably did in the remote past come [1.\n\nAccording to one Greek myth, Pandora, the first woman, was ruade by HepÃ¦estus out of earth, and, according to anotlier, Prometheus made man out of earth and water.\n\nSee also Lucian, \"Dialogues of the Gods,\" i.] down from the interior, and occupy the territory in which they were found at the commencement of the present century; for the cognate Tshi tribes of the Gold Coast also have a tradition of a migration from the interior.\n\nMost probably the two traditions refer to a great southward movement of the original stock from which the Tshi, GÃ£, Ewe, and Yomba tribes are descended, and which, starting from some central point in the interior, spread out in fan-shape till it reached the sea-coast.\n\nThe tradition of the Yoruba migration is as follows.\n\nLong ago a certain person living in the far interior sent fifteen people from his country to go to the south, and with them came, of his own free will, one named Okambi,[1] who afterwards became the first King of Yoruba.\n\nWhen they were leaving, the person who sent them gave Okambi a slave, a trumpeter named Okinkin,[2] a fowl, and something tied up in a piece of black cloth.\n\nThey journeyed for some time, and when they opened the gate of the south and passed into the unknown country, they found nothing but water spread out before them.\n\nAt first they thought of returning, but fearing the anger of the person who had sent them, they entered the water; and, finding it quite shallow, waded on through it.\n\nThis they did for some time until Okinkin the trumpeter sounded his trumpet, in accordance with the instructions the person had given, and thereby reminded Okambi of the something tied up in black cloth, which was to be opened when the trumpet [1.\n\nThis name means \"an only child.\" Okan , one, and bi , to bear.\n\n2.\n\nOkinkin appears to mean \"owner of a very small portion.\"] sounded.\n\nThe cloth was accordingly untied, and a palm-nut, with some earth fell into the water from it.\n\nThe nut immediately began to grow, and shot up so rapidly that in a few minutes it had become a tall palm with sixteen branches.[1] All the party, being very tired from their long wading climbed up into the tree and rested on the branches till next morning, in which position a certain person named Okiki[2] saw them from the country from which they had been sent out."

