[content]
body = "Thus the ajao , having no relations, remained unburied.[1] IV.\n\nMy alo is something about a certain king.\n\nOne day the king called all the birds to come and clear a piece of ground.\n\nBut be forgot to call kini-kini .\n\n[2] [1.\n\nSee Proverb 179.\n\n2.\n\nA small black and white bird, sometimes called the doctor-bird.\n\nIt is named from its cry, which rescinbles the words kini-kini .] All the birds came.\n\nThey set to work, and they cleared a large piece of ground.\n\nIn the middle of the piece of ground was an odan -tree.[1] At mid-day, when the sun was hot, and all the birds had left their work for the day, kini-kini came and perched on the odan -tree, and began to sing:-- The king sent to invite my companions, Kini-kini .\n\nHe assembled all the children of the folk with wings, Kini-kini .\n\nGrow grass, sprout bush, Kini-kini , Come, let us go to the house, Kini-kini .\n\nAnd there we can dance the bata , Kini-kini .\n\nIf the bata will not sound we will dance the dandun , Kini-kini .\n\nIf the dundun will not sound we will dance the gangan ,[2] Kini-kini .\" Next morning, when the birds came to work, they found the ground they had cleared all grown over with grass and bush.\n\nThey went and told the king.\n\nThe king said, \"That is nothing; clear it again.\" [1.\n\nOdan , a variety of ficus , which is planted in streets and open spaces as a shade-tree.\n\n2.\n\nBata , dundun , and yangan , are the names of different kinds of drums.\n\nThe bata is a tall drum, the dundun is hung with little bells, and the yangan is properly a war-drum.\n\nThese names are onomatopÅic.\n\nEach drum has its own measure and rhythm, and people say \"to dance the bata , to dance the dundun , or to dance the yangan ,\" just as we say, \"to dance a waltz, to dance a polka, or to dance a quadrille.\"] The birds went to work and cleared it again, and at mid-day went away.\n\nThe kini-kini came back and sang his song again, and again the grass and bush sprang up.\n\nNext day the birds, when they saw what had happened, went and informed the king.\n\n\"No matter,\" said the king, \"clear the ground again.\" A third time the birds cleared the ground and went away, and a third time the kini-kini came and sang so that the grass and bush sprang up.\n\nThe next day, when."

