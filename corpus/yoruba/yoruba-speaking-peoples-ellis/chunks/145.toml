[content]
body = "To these characteristics native imagination has added long flowing hair, and long pendent breasts.\n\nSimilarly, Tahbi, the indwelling spirt of the huge mass of black rock on which Cape Coast Castle is built, is of immense size, and black; and Abroh-ku, the surf-god of the landing place, is of the colour of wood ashes, and small and round, like a breaking wave.\n\nAmong the Ewe tribes we find the smae fundamental belief that all nature is animate, and the local nature-gods are as among the Tshi tribes, the indwelling spirits of natural objects and features; but simulacra are much more common on the Slave coast than on the Gold Coast, and, as a consequence, the tie between nature-gods and their habitiats, and between ghost-gods and their human origin, has been more frequently weakened and lost sight of.\n\nHence we find a large increase in the number of tribal and general gods, many of which have now no connection with any natural object or with manes-worship.\n\nConcurrently with the increase in the number of tribal and general gods runs the relegation of the purely local gods to an inferior position.\n\nA god who is worshipped over a large area is naturally believed to be more powerful than one whose area of worship is circumscribed, and the trial and general gods, having each their special functions and attributes, monpolise between them nearly all the phenomena and qualities which excite fear and respect in man.\n\nThe local gods are thus pushed back from the prominent position they are held among the Tshi tribes, with whom to propitiate the local gods was considered all important, and though they are worshipped by small communities and solitary families, the inhabitants of towns do not pay much attention to them.\n\nAlmost every person is enrolled as a follower of one, at least, of the general and tribal gods, and when a man is secure of the favour and protection of the king, the goodwill of the court-underling is no longer of much moment to him.\n\nAmong the general deities of the Ewe tribes, Mawu, the sky-god, whose name also means to stretch over or overshadow, answers to the Nyankuopon of the Tshi tribes, and the silk-cotton tree spirits appear under the names of Huntin and Loko.\n\nThe Ewes have no earthquake-god, probably because the shocks of earthquakes are rarely felt on the Slave Coast, two only being known to have occurred since 1778, whereas slight shocks are experienced on the Gold Coast every two or three years."

