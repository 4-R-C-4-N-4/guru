body = "Sacred Texts Â Africa Â Index Â Previous Â Next Â CHAPTER II CHIEF GODS.\n\nTHE tendency which we noted in the case of the Ewe speaking peoples to replace gods which were purely local, and only worshipped by those dwelling in the vicinity, by tribal gods, and by gods worshipped by an entire people, has in the case of the Yoruba tribes been very fully developed, and all the gods possessing any importance are known to and worshipped by the Yoruba-speaking peoples as a whole.\n\nThe effect of increasing the number of general objects of worship has been to diminish the importance of the local objects of worship, the genii loci , who, except in Jebu and in some of the remoter districts, have been so shorn of their power as now to- be scarcely above the level of the fairies and water-sprites of mediÃ¦val England, or, which is perhaps a closer parallel, of the Naiads and Hama-dryads of ancient Greece.\n\nThis of course is what was to be expected, for the general objects of worship govern, between them, all the phenomena which most nearly affect mankind; and the special function of each genius loci is thus now vested in some other god, who is believed to be more powerful, because he is worshipped over a larger axea and has a more numerous following.\n\nGods, however, which are purely tutelar have not been so much affected, and tutelary dieties of towns and of individuals are still common, because the native, while enrolling himself as a follower of a general god, likes also to have a protector whose sole business is to guard his interests; and who, though his power may be limited, is not likely to be distracted by the claims of others to his attention.\n\nThe term used by the Yoruba tribes to express a superhuman being, or god, is orisha , and as it is used equally to express the images and sacred objects, and also as an adjective with the meaning of sacred or holy, it answers exactly to the Tshi term bohszon, the GÃ£ wong , and the Ewe vodu .\n\nThe word orisha seems to be compounded of ori (summit, top, head) and sha (to select, choose); though some natives prefer to derive it from ri (to see) and isha (selection, choice), and thus to make it mean \"One who sees the cult.\" (1) OLORUN.\n\nOlorun is the sky-god of the Yorubas, that is, he is the deified firmament, or personal sky, just as Nyankupon is to the Tshis, Nyonmo to the Gas, and Mawu to the Ewes."

