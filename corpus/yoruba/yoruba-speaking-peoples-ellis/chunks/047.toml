[content]
body = "A man who should be so ill-advised as to attempt to fish on the bar would run a great risk of being [1.\n\nAnother myth of this nature has been mentioned in Chapter II., under Ifa.] thrown overboard by the other canoemen.\n\nOlokunsu is an example of a local sea-goddess, originally, as on the Gold Coast at the present day, considered quite independent, being attached to the general god of the sea, and accounted for as belonging to him.\n\n(2) OLOSA.\n\nOlosa ( oni-osa , owner of the laaoon) is the goddess of the Lagos Lagoon, and the principal wife of her brother Olokim, the sea-god.\n\nLike her husband she is long-haired.\n\nShe sprang from the body of Yemaja.\n\nOlosa supplies her votaries with fish, and there are several temples dedicated to her along the shores of the lagoon, where offerings of fowls and sheep are made to her to render her propitious.\n\nWhen the lagoon is swollen by rain and overflows its banks she is angry, and if the inundation be serious a human victim is offered to her-, to induce her to return within her proper limits.\n\nCrocodiles ate Olosa's messengers, and may not be molested.\n\nThey are supposed to bear to the goddess the offerings which the faithful deposit on the shores of the lagoon or throw into the sedge.\n\nSome crocodiles, selected by the priests on account of certain marks borne by them, are treated with great veneration; and have rude sheds, thatched with palm leaves, erected for their accommodation near the water's edge.\n\nFood is regagularly supplied to these reptiles every fifth day, or festival, and many of them become sufficiently tame to come for the offering as soon as they see or hear the worshippers gathering on the bank.\n\n(3) SHANKPANNA.\n\nShankpanna, or Shakpana, who also came from the body of Yemaja, is the Small-pox god.\n\nThe name appears to be derived from shan , to daub, smear, or plaster, which probably has reference to the pustules with which a small-pox patient is covered, and akpania ,[1] a man-killer, homicide.\n\nHe is accompanied by an assistant named Buku,[2] who kills those attacked by small-pox by wringing their necks.\n\nShan-kpanna is old and lame, and is depicted as limping along with the aid of a stick.\n\nAccording to a myth he has a withered leg.\n\nOne day, when the gods were all assembled at the palace of Obatala, and were dancing and making merry, Shankpanna endeavoured to join in the dance, but, owing to his deformity, stumbled and fell."

