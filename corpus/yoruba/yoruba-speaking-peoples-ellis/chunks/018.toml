[content]
body = "In 1888, in consequence of the reported intrigues of the French in Abeokuta, who were said to have offered to tolerate slavery, and to pay an annual subsidy, if the Egbas would place themselves under French protection, efforts were made to have the limits of British and French territory and spheres of influence defined, with the result that articles of arrangement for the delimitation of the English and French possessions on the West Coast of Africa were signed at Paris, on August 10th, 1889.\n\nThe fourth article defined the territories and spheres of influence on the Slave Coast, the line of demarcation being the meridian which intersects the territory of Porto Novo at the Ajarra Creek, and extending from the sea to the ninth degree of north latitude.\n\nBy this arrangement the eastern half of Appa, with its capital, and Pokra, became British, while the western half of Appa, together with Ketonu, became French.\n\nEgba and Okeodan fell within the British sphere of influence, and Ketu within that of the French.\n\nThe war between Ibadan and Ilorin still lingered on, and, in 1889, Mr.\n\nMillson, the.\n\nAssistant Colonial Secretary, was sent to the interior to endeavour to arrange a meeting between the Governor of Lagos and the belligerents in order to bring these hostilities to an end, but, as the chiefs declined to enter into any negotiations with the Commissioner, the mission failed.\n\nAlthough Abeokuta had now been definitely placed within the British sphere of influence there was no improvement in the relations between the Egbas and the Lagos government.\n\nIn January, 1891, a great political meeting was held at Abeokuta, at which the old charge that the government connived at or encouraged the annual inroads of Dahomi was revived, and some European missionaries were expelled.\n\nA Commissioner from the government was sent to Abeokuta in August, but achieved no results, and in January, 1892, the Egbas declared all their trade routes, both to the coast and to the interior, closed, and ceased all commercial relations with the colony.\n\nA further attempt on the part of the government to open negotiations was made in the following month, but completely failed, and at a meeting of Egba chiefs, held on the 13th of April, the proposal to reopen the trade routes to Lagos was unanimously negatived.\n\nWhile affairs had been in this unsatisfactory state in the western portion of the sphere of British influence, a dispute with the Jebus had sprung up in the east."

