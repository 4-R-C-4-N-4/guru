[content]
body = "It would certainly appear as if the dead were cognizant of and able to influence the affairs of the living, for it is usual for offerings and prayers to be made to them from time to time; and sometimes the skull of the deceased is exhumed and placed in a small temple, where offerings are made to it.\n\nBefore taking the field for war, too, offerings are made at the graves of warriors of renown, and their assistance in the coming campaign is supplicated.\n\nYet a proverb says, \"As grass cannot grow in the sky, so the dead cannot look out of the grave into the street,\" from which it might be inferred that the dead are not cognizant of what is taking place in the world, or at all events do not know what is occurring till it is made known to them through the medium of sacrifice, and several folk-lore tales point to this conclusion as well.\n\nThe following is an example: A woman, an inhabitant of an inland town, who was going to the sea-shore to make salt by boiling sea-water, a common industry, and who expected to be away from home for some time, gave, on the eve of her departure, and in the presence of witnesses, a necklace of valuable beads to a neighbour, to be kept for her during her absence.\n\nThe neighbour, a woman with two boys, accepted the trust, and, for safe custody, made a hole in the mud wall of her house, into which she put the necklace, and then closed the aperture with fresh mud, which she smoothed down to conform with the wall.\n\nUnfortunately the woman died before the owner of the necklace returned, and the secret of its hiding-place died with her, so that when the owner at last came back and claimed her property, it could not be found.\n\nThe woman made a great commotion about the loss.\n\nShe would not believe the two children when they declared that they had not seen or even heard of the necklace, and she took them before the chief, and charged them with theft.\n\nThe chief heard the case.\n\nThe fact of the necklace having been entrusted to the deceased woman was proved; the boys declared that they knew nothing of it, but the chief held that they were responsible.\n\nIf they had not stolen it they knew where it was.\n\nThey must restore it or pay the value.\n\nSuch was the chief's decision, and in order to compel the elder boy to make restitution, he caused the younger to be \"put in log,\" and threatened to sell him if the missing property were not recovered within a certain time.\n\nIn this dilemma the elder boy, knowing that human agency could avail him nought, souoght assistance from the gods.\n\nHe went to the head priest of the babalawos at the town of Ife, unfolded his tale, and begged for aid."

