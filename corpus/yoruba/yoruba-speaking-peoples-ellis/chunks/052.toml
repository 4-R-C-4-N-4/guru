[content]
body = "lbeji, Twins ( bi , to beget, eji , two) is the tutelary deity of twins, and answers to the god Hoho of the Ewe-tribes.\n\nA small black monkey, generally found amongst mangrove trees, is sacred to Ibeji.\n\nOfferings of fruit are made to it, and its flesh may not be eaten by twins or the parents of twins.\n\nThis monkey is called Edon dudu , or Edun oriokun , and one of twin children is generally named after it Edon , or Edun .\n\nWhen one of twins dies, the mother carries with the surviving child, to keep it from pining for its lost comrade, and also to give the spirit of the deceased child something to enter without disturbing the living child, a small wooden figure, seven or eight inches long, roughly fashioned in human shape, and of the sex of the dead child.\n\nSuch figures are nude, as an infant would be, with beads round the waist.\n\nAt Erapo, a village on the Lagoon between Lagos and Badagry, there is a celebrated temple to Ibeji, to which all twins, and the parents of twins, from a long distance round make pilgrimages.\n\nIt is said to be usual in Ondo to destroy one of twins.\n\nThis is contrary to the practice of the Yorubas, and, if true, the custom has probably been borrowed from the Benin tribes to the east.\n\n(17) OSHUMARE.\n\nOshumare is the Rainbow-god, the Great Snake of the Underneath, who comes up at times above the edge of the earth to drink water from the sky.\n\nThe name is compounded of shu , to gather in dark clouds, to become gloomy, and the word mare , or maye , which occurs in one of the epithets of Olorun, and the meaning of which is uncertain.\n\nThis god is also common to the Ewe-tribes, under the name of Anyiewo, and has been described in \"The Ewe-Speaking People of the Slave Coast of West Africa.\" A variety of the python, called by the Yorubas ere , is the messenger of the rainbow-god, and is sacred to him.\n\n(18) OKE.\n\nOke, mountain, or hill, is the god of Mountains, and is worshipped by those who live in mountainous or rocky country.\n\nIf neglected, he is apt to roll down huge masses of rock upon the habitations of those who have been forgetful of his wants, or to sweep them away by a landslip.\n\nWhen any great mishap of this nature occurs, a human victim is offered up to turn away his anger.\n\nThe falling of boulders or detached pieces of rock is always considered the handiwork of Oke and a sign that something is required."

