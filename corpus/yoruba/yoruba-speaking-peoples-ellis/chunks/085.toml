[content]
body = "Similar conceptions of two entities, the kra , or life-phantom, and the soul, or death-phantom, among the Navajo and Algonquin Indians of North America, the Karens of Burma, and the Fijians, were mentioned in the last volume,[2] but whether these people believe in metempsychosis is uncertain; and to them we may now add the Greenlanders,[3] and the ancient Egyptians, whose ka appears to closely resemble the kra .[4] A correspondent informs me that the Irish peasants of County Mayo also believe in an entity like the kra .\n\nThey call it the \"spirit,\" consider it to be perfectly distinct from the soul, and liable to be stolen by the fairies during the sleep of its possessor, who, on awakening, is ignorant of his loss, but [1.\n\nSee Tibullus , Bohn's Edition, note 1, p.\n\n126.\n\n2.\n\nPp.\n\n16 and 17.\n\n3.\n\nCranz, GrÃ¶nland , p.\n\n251.\n\n4.\n\nS.\n\nLaing, Human Origins , p.\n\n119 gradually fades away and dies.\n\nIt is also liable to be seized by the fairies, at the moment of death of the person whose body it bas tenanted.\n\nThe Yorubas, it seems probable, have arrived at the doctrine of inetempsychosis after having passed through a phase of belief similar to that now held by the Tshi and Ewe tribes.\n\nThe belief in one indwelling spirit has been changed into a belief in three indwelling spirits, and this multiplication has caused confusion.\n\nThese indwelling spirits do not, at the death of the body, enter a new-born human child in the same family, so that the phenomena of heredity cannot be explained as being due to their agency; and the Yorubas have reverted to the theory of metempsychosis to account for them.\n\nThe belief in the spirits called abiku is very probably a corruption of the former kra -a belief, for if a sisa , or disembodied kra , enters a human body it causes sickness and death, just as the abiku does.\n\nThe souls of the dead are sometimes reborn in animals, and occasionally, though but rarely, in plants.\n\nIn the ideas of the natives, animals, though they differ in shape from a man, possess passions and moral qualities identical with those of the human being.\n\nAnimals also possess souls which, like the souls of men, go to Deadland.\n\nHence, as men and animals have so many characteristics in common, it does not require any great stretch of iniagination for the native to fancy that the soul may be re-born in an animal."

