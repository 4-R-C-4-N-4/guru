[content]
body = "The vault of the heaven overhangs every town and hamlet, so that Nyankupon,[1] the god of the sky, which is believed to be solid, and the roof of the world, is universally known.\n\nSimilarly, earthquakes are felt over the whole country, so that Sasabonsum, the earth-god, who is held to produce these phenomena, is also widely known.\n\nSilk-cotton trees are found everywhere, so that Srahmantin, the goddess of these trees, is feared and worshipped everywhere.\n\nWith these three exceptions there are no general gods, that is, no gods known to the Tshi tribes as a whole; and two of them, it may be observed, in accordance with the principle that every man worships that which is most likely to affect his lot, and which is ordinarily near at hand, though known to all, are not paid much regard to, except when they force themselves upon the attention.\n\nNyankupon is generally considered too distant to have much weight in the affairs of mankind, or to take much interest therein, but when he thunders and lightens-for to thunder, lighten, and pour out rain are his functions and thereby reminds men that he has power to injure, they become polite to him, and seek to propitiate him [1.\n\nNyankupon.\n\nNyan means \"to awake,\" but seems primarily to have meant \"to stretch,\" or \"to extend.\" Pon is anything flat, as \"door, table-top \"; po , \"ocean,\" is from the same root.\n\nKu seems to be a euphonic change from kru , \"rounded, curved.\" The word Nyankupon would thus mean \"the stretched-out, curved, flat surface,\" or shortly \"the outspread vault.\"] by flattery and praise.\n\nSasabonsum likewise is not paid much attention to, except when an earthquake happens, and then everybody hastens to offer sacrifices.\n\nAs silk-cotton trees are everywhere close at hand, and a great many pesrions are cushed to death by them-for they seem particularly liable to the ravages of white ants, and then blown down by a very moderate gale of wind-it is considered of some importance to propitiate Srahmantin, who is the only spirit-or class of spirits, for it is not quite clear which it is-that can be said to be generally worshipped by the tribes as a whole.\n\nThe indwelling spirits of natural objects are held to be of human shape, but to possess the more striking characteristics of the objects they animate.\n\nThus, because the silk-cotton tree has a gaunt, greyish-white trunk, which towers high above the other trees of the forest, and often reaches to a height of 100 feet before it throws out a branch, Srahmantin is said to be of gigantic stature and greyish-white in color."

