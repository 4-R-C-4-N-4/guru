[content]
body = "(3) Bi alapata ba pa eran, awon alagbata abu u li ajan .\n\nWhen the butcher kills the animal the retailers cut it into pieces.\" Here the play is upon the words alalgata (butcher) and alagbata (pedlar, retailer, petty trader).\n\n(4) The following is on the words bata (shoes), bata-bata (an onomatopÅic word like our \"patter patter \"), apata (rock), ajulabata (chief drummer), and bata (a long drum):-- Ojo pa bata, bata-bata-bata, li ori apata; li ode ajulabata, bata ni igi, bata li awo .\n\n\"The rain on the bata (shoes), goes patter, patter, patter, as on the apata (rock); in the street of ajulabata , the bata (drum) is wood, the bata (shoes) are of hide.\" (5) Igba dodo li agbado, igba ni?\n\n\"What supports the people if it is not maize?\" Here the play is on igba dodo and agbado .\n\nIt is a favourite game to repeat as fast as possible sentences difficult to pronounce, like the following:-- Iyan mu ire yo; iyan ro ire ru.\n\n\"When there is famine the cricket is fat\" (that is, is considered good enough to eat); \"when the famine is over the cricket is lean\" (i.e., is rejected).\n\nKanakana ba kanakana ja, kanakana da kanakana.\n\n\"The crow met the crow and fought, the crow beat the crow.\" The two following are examples of a play of a different sort:-- (1) The cry of the squirrel sounds like the word korokoro , whence \"It was the squirrel's own mouth that betrayed her, for when she had brought forth two young ones she carried them to the roadside and said, My children are very sound, very sound, very sound ( Omo mi ije korokoro, korokoro, korokoro.\n\n) (2) The cry of the bush-fowl (partridge) resembles the words kiki ora , \"nothing but fat\"; hence the saying, \"With its mouth the bush-fowl declares its fatness, crying, 'Nothing but fat!\n\nNothing but fat.'\" ( Kiki-ora!\n\nKiki-ora .) Riddles are sufficiently common, but few of them are good.\n\nThe following are examples:-- Q.\n\nA small confined room, with hardly anything in it but pegs.\n\nA.\n\nThe mouth, with the teeth.\n\nQ.\n\nAn associate who cannot be tamed.\n\nA.\n\nFire.\n\nQ.\n\nThere is no market in which the dove with the prominent breast has not traded.\n\nA.\n\nThe cowry."

