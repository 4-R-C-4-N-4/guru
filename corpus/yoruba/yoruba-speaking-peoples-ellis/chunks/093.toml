body = "Day of the Secret (sacred to Ifa).\n\n3.\n\nOjo-Ogun.\n\nOgun's Day.\n\n4.\n\nOjo-Shango .\n\nShango's Day.\n\n5.\n\nOjo-Obatala .\n\nObatala's Day.\n\nAko-ojo is a Sabbath, or day of general rest.\n\nIt is considered unlucky, and no business of importance is ever undertaken on it.\n\nOn this day all the temples are swept out, and water, for the use of the gods, is brought in procession.\n\nEach of the other days is a day of rest for the followers of the god to which it is dedicated, and for them only, Ojo-Shango being the Sabbath of the worshippers of the thunder-god, and Ojo-Ogun for those of the god of iron, but Ako-Ojo is a day of rest for all.\n\nA holy day is called Ose ( se , to disallow), and because each holy day recurs weekly, [1.\n\nRaffles' \"History of Java,\" vol.\n\ni.\n\np.\n\n475.] Ose has come also to mean the week of five days, or the period intervening between two holy days.\n\nThere appears to be good reason for supposing that the institution of a general day of rest, not only among the Yorubas, but in most, if not all, other cases, may be referred to moon-worship.\n\nThe first day of the first week of the lunar month is reckoned from the appearance of the new moon, and was, we think, a moon-festival, or holy day sacred to the moon.\n\nThis holy day, before the invention of weeks, recurred monthly, but after the lunar month was subdivided, it recurred weekly, and was held on the first day of the week.\n\nThe Mendis of the hinterland of Sierra Leone, who reckon time bv lunar months, but have not divided the month into weeks, hold a new-moon festival, and abstain from all work on the day of the new moon, alleging that if they infringed this rule corn and rice would grow red, the new moon being a \"day of blood.\" From this we may perhaps infer that it was at one time customary to offer human sacrifices to the new moon.\n\nThe Bechuanas of South Africa keep the twenty-four hours, from the evening on which the new moon appears till the next evening, as a day of rest, and refrain from going to their gardens.[1] These are examples of monthly moon.\n\nSabbaths observed by peoples who do not reckon by weeks.\n\nThe first day of the Tshi week, which in the first week of the lunar month is the day of the new moon, is called Dyo-da ( Adjwo-da ) \"Day of Rest,\" and is a [1.\n\nLivingstone, \"Travels in Sonth Africa,\" p.\n\n235.] general day of rest."

