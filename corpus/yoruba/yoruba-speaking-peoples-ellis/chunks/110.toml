[content]
body = "The bill-hook cuts the bush, but receives no profit from the bush.\n\nIt clears the road, but receives no profit from the road.\n\nThe bill-hook is badly bent, the bill-hook is badly bent.\n\nThe billhook is bent; it pays five cowries to bind its neck (handle) with a ring.\n\nWhen the bill-hook reaches its owner's farm with the ring on its neck, it is girded tightly for new works.\n\n(This saying refers to the labour of slaves, which brings them no remuneration.\n\nIn the original it forms a kind of verse.\n\nThus:-- Ada shan igbo, Ko ri ere igbo.\n\nO ro ona, Ko ri ere ona.\n\nAda da ida kuda, Ada da ida kuda.\n\nAda da; o fi arun gbadi o di oko olowo.\n\nAda li eka oron gbadsa giri-giri.) 130.\n\nThe pot-lid is always badly off, for the pot gets all the sweet and the lid nothing but the steam.\n\n(\"Pot-lid\" is here used to mean \"slave.\") 131.\n\nJob-work is not the slave's first care; the master's work has the first claim on his time.\n\n132.\n\nA slave is not the child of a tree ( i.e.\n\n, made of wood).\n\nWhen a slave dies his mother hears nothing of it, but when a free man dies there is mourning; yet the slave, too, was once a child in his mother's house.\n\n133.\n\nAs the yam-flour was once a soft unripe yam, so was the slave once a child in his father's house.\n\n134.\n\nBirth does not differ from birth; as the free man was born so was the slave.\n\n135.\n\nYou find a hen in the market and hasten to buy her.\n\nHad she been worth keeping the owner would not have sold her.\n\n(This is said in warning to any man who is about to buy a female slave.) 136.\n\nHe who gathers locust-fruit spends the money of death.\n\n(Is used to check rashness.\n\nThe wood of the locust-tree breaks easily, and this proverb contemplates a man perched on a lofty limb to pick the fruit.) 137.\n\nA hunchback is never asked to stand up straight.\n\n(That is, no one expects the impossible.) 138.\n\nHe who has only an eyebrow for a bow can never kill an animal.\n\n139.\n\nYou cannot kill game by looking at it.\n\n140.\n\nWhen the hawk hovers the fowl-owner feels uneasy.\n\n141.\n\nNo one carrying elephant-beef on his head should look for crickets underground.\n\n(Elephant-beef here means the food of the rich, and crickets that of the poor.\n\nThe saying means tbat the rich should not stoop to petty gains.) 142.\n\nNo one should draw water from the spring in order to supply the river."

