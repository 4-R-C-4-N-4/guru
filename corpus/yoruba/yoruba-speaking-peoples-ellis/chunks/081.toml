[content]
body = "A proverb says, \"There is no orisha like the stomach; it receives food every day.\" In some respects hunger ( ebi ) seems to be personified, and to be considered the agent of Ipin ijeun ; for he is said to communicate to the man, by pinching his stomach, the desire of his principal for food.\n\nCuriously enough, Ipin ijeun is connected with fire-worship.\n\nThere is among the Yorubas no god of fire, answering to the Ewe god Dso , but fire ( ina ) was probably once personified, for it is still spoken of as Abanigbele, \"the Inmate.\" It is not clear by what process fire-worship came to be blended with that of the indwelling spirit of the stomach; but the natives explain the connection between the two by saying that fire is necessary for the preparation of food, and food is necessary to Ipin ijeun , therefore he takes fire under his protection, and takes care that it is not extinguished.\n\nA proverbial saying runs, \" Ipin ijeun does not allow fire to depart from the earth.\" When fire could only be produced by the tedious process of rubbing together two sticks, it was no doubt important to keep one or two embers of a fire always smouldering.\n\nIpori , the great toe, is the least important of the three guardian spirits, and sacrifice is rarely offered to him, except when a man is about to set out on a journey; in which case he anoints the great toe with a mixture of fowl's blood and palm-oil.\n\nWaterfowl are apparently \"unclean\" for this purpose, for a proverb says, \"A waterfowl is not fit for the worship of Ipori .\" The ghost-man, or soul, the \"vehicle of individual personal existence,\" is called iwin , or olcan , but the latter also means \"heart.\" Another word is ojiji , or oji , which has the meanings of ghost, shade, or shadow.\n\nAfter the death of the body, the ghost-man goes to Ipo-oku , \"the Land of the Dead\" ( Ipo , place; oku , dead), which is beneath the earth, and where each man does that which he has been accustomed to do, and holds the same social position as he did in the world.\n\nTo enable the ghost to reach this land it is essential that he should have the prescribed funeral rites performed over him."

