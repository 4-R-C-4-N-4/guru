[content]
body = "It would appear that, at first, the community or group was the social unit, and had collective rights and responsibilities, every member of the group having a, right to the protection of the group as a whole, and being in turn responsible individually for the acts or omissions of the group as a whole, or of any member of it.\n\nIf we might speculate on this subject we might say that this condition dated from the time when the group was homogeneous, and had not yet been broken up into different clans by the system of blood-descent through mothers.\n\nEither no notion of blood-descent at all had been formed, or, if formed, the group-tie, the tie of association and comradeship, was considered of more moment than the blood-tie.\n\nThe sole remaining trace of this condition to be found among the three lingual groups under consideration lies in the right which a creditor, whose debtor belongs to another community, has to seize the property of a third party, belonging to the same community as the person indebted, instead of recovering what is due from the latter.\n\nThe group is individually and collectively responsible for debts contracted by any member.\n\nAmong the Tshi, GÃ£, and Ewe tribes the family, connected by uterine ties, is the social unit, and each member of a family is individually.\n\nresponsible for all the others.\n\nThe state, represented by the tribal or village-chief, takes no cognisance of offences unless they are such as directly concern, or are believed to concern, the interests of the community as a whole.\n\nTreason and witchcraft are almost the only offences that the state takes cognisance of.\n\nIn cases of homicide, theft, rape, assault, and injury to the person or property, it is the family of the person who has suffered that alone can demand and exact satisfaction.\n\nNo one else has a right to interfere, and, if the family should choose to forego all demands, no one has a right to say anything.\n\nReparation is not sought directly from the offender, but from the family to which he belongs.\n\nIt is, in fact, a case of one family arrayed against another.\n\nWhere the contending parties cannot come to mutual agreement as to the reparation, the injured party brings the case before the state, that is, the chief, who, until thus called upon to arbitrate, has no power to act.\n\nThere is no fixed scale of punishments or awards; the injured family assesses its damages, and, if the injuring family does not accept the terms or effect a compromise, the dispute is referred to the chief for settlement.\n\nMurder is not necessarily, punished with death, for the family of the deceased may, if they think fit, accept a money-compensation in lieu for the loss of the services of the deceased."

