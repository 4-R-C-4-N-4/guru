[content]
body = "Arogangan had appointed his nephew, Afunja, governor of Ilorin, the north-eastern province, which contained a large number of Hausa refugees, and Afunja, being ambitious, conceived the project of utilising the Hausas in order to dethrone his uncle and make himself Alafin .\n\nHis plans being matured, he raised an insurrection, which met with a measure of success, for Oyo was besieged, and Arogangan, in order to avoid falling into the hands of his nephew, poisoned himself; but Afunja was not able to secure the throne, as the elders of Oyo elected to the monarchy Adebo, the brother of Arogangan, and Afunja had to retire to Ilorin, where he maintained a semi-independent position.\n\nThese events are supposed to have taken place about 1807, and it was about the same time that some of the Yorubas first pushed to the south and colonised Lagros.\n\nThe first chief of Lagos was named Ashipa, and is said to have belonged to the family of the Alafin .\n\nAdebo only reigned about four months, and died suddenly, from which it was supposed that he was poisoned.\n\nHe was succeeded by Maku, who endeavoured to make head against the Mohammedan tribes who were now pressing in from the north, but he was defeated in a great battle, and committed suicide, after a reign of about only three months.\n\nAn interregnum now ensued, during which the reins of power were held by the Oba-shorun , or prime minister, and it was not until five years had elapsed that a new king, named Majotu, was elected.\n\nHe reigned about seven or eight years, committed suicide on account, tradition says, of the misbehaviour of his son, and was succeeded by Amodo.\n\nAfunja had, since 1807, remained in possession of Ilorin, where he had sought to strengthen himself by encouraging Mohammedans to settle, and, about 1825, while Amodo was engaged with the invading tribes from the north, he again made war upon Yoruba.\n\nHe captured and destroyed a number of towns, and was apparently about to carry all before him, when, for some reason that has never transpired, he was conveyed back to the town of Ilorin by those very Hausa mercenaries through whose aid he had hoped to become Alafin, and publicly burned alive.\n\nThe Mohammedan party had for some years been dominant in Ilorin, and now, declaring that it would no longer recognise a pagan king, it elected a Mohammedan to the supreme power, and severed the connection with Yoruba.\n\nIlorin now took the lead in the Mohammedan invasion of Yoruba, and the Yorubas seem to have been invariably worsted."

