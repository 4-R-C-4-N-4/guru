[content]
body = "Here ideas circulate readily, man is constantly meeting with man, and as his mental circle widens, so do his conceptions concerning the nature of gods.\n\nThus, among the eastern Ewe tribes we find many national and tribal gods, and several general gods, while the local gods have sunk in general estimation.\n\nAmong the Yoruba tribes this evolution has been carried still further, the county, except that inhabitated by the Jebus, being fairly open, large towns numerous, and circulation constant.\n\nHere the local god has almost disappeared, and the great majority of the gods are known to, and worshipped by, the whole of the tribes.\n\nThe origin and inception of the nature-gods, as the indwelling spirits of natural objects or phenomena, being generally lost sight of, some explanation of their existence becomes necessary, and, ill consequence, we find a variety of myths dealing with the parentage and adventures of the gods.\n\nAs far as manes-worship alone is concerned-that is, the worship of spirits or gods which are known to have once been men-there is no great difference between the three lingual groups.\n\nAmong the Yorubas it is, if anything, rather less developed than among the Tshis and Ewes, or rather relegated to an inferior position, in consequence of the greater power and sway of the gods generally worshipped.\n\nWhenever, however, the human origin of the ghost-god has been lost sight of, he seems to have conformed to the general rule; that is, where the circumstances have been unfavourable, he has, like the minor local nature-gods, disappeared, or been absorbed in the personality of another god, and where they have been favourable, he has acquired increased renown and area of worship, and become a national or general god.\n\nThat with the nationalisation of gods the priesthood should also become organised and developed is a natural result.\n\nBoth on the Gold and Slave Coasts, and, indeed, everywhere else, the priesthood is a guild, or fraternity, the members of which require a special knowledge; and no man or woman can become a member of it without a preliminary training, or apprenticeship.\n\nOn the Gold Coast, however, there are no distinct orders, or bodies, of priests.\n\nThe gods being infinite in number, and local, the groups of priests are infinite in number, and local, and have no cohesion.\n\nIn every village there will be found three or four priests who know the sacred dances and special ceremonies required for the worship of the gods peculiar to that village, but they know nothing of the rites and ceremonies of the gods of other towns.\n\nOn the Slave Coast, on the other hand, each general god of the Ewe tribes, except Mawu, has in every town and village a considerable number of priests, whose duty it is to minister to him and to him alone."

