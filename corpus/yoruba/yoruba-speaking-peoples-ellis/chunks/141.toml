[content]
body = "By carrying it a little further, tribal or national gods might be similarly produced, but, with two or three exceptions, the Tshi tribes have not progressed so far as that, and most of the gods worshipped by complete tribes are simply the indwelling spirits of very remarkable natural objects situated in the territories occupied by the tribes.\n\nBesides the gods which are the animating principles or indwelling spirits of natural features and objects, and which we may call nature-gods, we have objects of worship of another class, which are the product of manes-worship, and which we may therefore term ghost-gods.\n\nThe ghosts, or souls of deceased men of rank and power, are supplicated and propitiated in the same way and to the same extent as are the nature-gods, and it is often difficult to decide where the one worship begins and the other ends.\n\nManes-worship reaches its fullest development in the royal houses of Ashanti and Dahomi, that is to say, in those situations where the conditions are most favourable for preserving the memory of the wisdom and power of deceased men.\n\nIn both these houses periodical human sacrifices are made on the tombs of the former kings, in addition to the daily minor offerings of food and drink.\n\nWe find the same confusion between objective and subjective connection in the case of these ghost-gods as we do in that of the nature-gods; and the skulls of chiefs and others are often exhumed and placed in small temples adjoining the dwelling-houses, in the idea that the guardian-ghost is thereby brought to the spot.\n\nAt the battle of Dodowah, near Accra, where the Ashantis were defeated in 1826, a head, wrapped in a silk handkerchief, and covered with a leopard-skin, the emblem of royalty, was captured.\n\nThis was the head of the late king, Tutu Kwamina, and his successor had brought it with him, in the idea that he would thereby be able to obtain the support of the gliostly king against his enemies.\n\nBefore the battle offerings were made to it, and the ghost was invoked to cause the heads of all the white men in the field to he beside his before night.\n\nMany tutelary deities of towns, clans, and families doubtless owe their origin to manes-worship.\n\nThe dead are ordinarily, one might almost say invariably, buried in or near to the habitations of the living, and it is certain that in many cases the habit of offering sacrifices at the place of sepulture has been continued, simply through habit, long after the fact that a man was buried there has been forgotten.\n\nIn such a case, the guardian-ghost being lost sight of, the god is simply a tutelary god, whose origin is either unexplained, or which the priests explain in any way that may suit them best."

