body = "Sacred Texts Â Africa Â Index Â Previous Â Next Â CHAPTER VI.\n\nEGUNGUN, ORO, ABIKU, AND VARIOUS SUPERSTITIONS.\n\nEGUNGUN EGUNGUN really means \"bone,\" hence \"skeleton,\" and Egungun himself is supposed to be a man risen from the dead.\n\nThe part is acted by a man disguised in a long robe, usually made of grass, and a mask of wood, which generally represents a hideous human face, with a long pointed nose and thin lips, but sometimes the head of an animal.\n\nEgungun appears in the streets by day or night indifferently, leaping, dancing, or walking grotesquely, and uttering loud cries.\n\nHe is supposed to have returned from the land of the dead in order to ascertain what is going on in the land of the living, and his function is to carry away those persons who are troublesome to their neighbors.\n\nHe may thus be considered a kind of supernatitral inquisitor who appears from time to time to inquire into the general domestic conduct of people, particularly of women, and to punish misdeeds.\n\nAlthough it is very well known that Egungun is only a disguised man, yet it is popularly believed that to touch him, even by accident, causes death.\n\nA crowd always stands round watching, at a respectful distance, the gambols of an Egungun, and one of the chief amusements of the performer is to rush suddenly towards the spectators, who fly before him in every direction in great disorder, to avoid the fatal touch.\n\nTo raise the hand against Egungun is punished with death, and women are forbidden, on pain of death, to laugh at him, speak disparagingly of him, or say he is not one who has risen from the dead.\n\n\"May Egungun cut you in pieces,\" is an imprecation often heard.\n\nEgungun is thus at the present day a sort of \"bogey,\" or make-believe demon, whose chief business is to frighten termagants, busybodies, scandalmongers, and others, but it seems probable that originally he was regarded as the incarnation of the dead, and that the whole custom is connected with manes-worship.\n\nIn June there is an annual feast for Egungun lasting seven days, during which lamentations are made for those who have died within the last few years.\n\nIt is a kind of All-Souls festival, and resembles the Affirah-bi festival of the Tshi tribes, described in the first volume of this series.[1] Moreover, Egungun also appears in connection with funeral ceremonies.\n\nA few days after the funeral an Egungun, accompanied by masked and disguised men, parades the streets of the town at night, and, as in the Roman conclainatio , calls upon the deceased loudly by name."

