[content]
body = "what a fine olu .' She was stooping down to pick it, when the olu began singing~-- 'Do not pluck me, mother, Do not pluck me, mother, Do not pluck me, mother, I'm a lowly plant on the ground.\n\nI went to the village frolic, I went to the village frolic, I'm a lowly plant on the ground.\n\nI was given a thousand cowries, I'm a lowly plant on the ground.\n\n[1.\n\nOlu, an edible fungus.] 'Do not pluck me, mother, Do not pluck me, mother, Do not pluck me, mother, I'm a lowly plant on the ground.\n\n'My brother receivcd a thousand cowries, My brother received a thousand cowries, I'm a lowly plant on the ground.\n\nBut he slew me here for my cowries, I'm a lowly plant on the ground.' \"When the mother heard the olu sing this she ran home, called her husband, and the two returned to the forest.\n\nWhen the man saw the fine olu , he stretched out his hand to gather it, and the olu sang again- 'Do not pluck me, father.' (etc., etc., as before.) The father went to the king of the country, and told him all that had happened.\n\nThe king himself came to see the olu .\n\nHe stooped to pick the olu , and the olu , sang- 'Do not pluck me, oba .'[1] (etc., etc., as before.) Then the king sent and ordered the elder brother to be brought before him.\n\nAnd when the boy beard what the olu had sung he confessed.\n\nThe king said, 'As you took your brother and slew him, so will we now take you and slay you.\n\nThen shall the child come back to life.' \"So the elder brother was killed and the younger came back to life, as the king had said.\" Here the connection between the obu and the dead [1.\n\nOba , king.] child is obvious.\n\nIt sprang from his bones, and was nourished by his decaying body, so that it might well be imagined that the soul of the child, which stayed with the remains instead of proceeding to Deadland, because no funeral rites had been performed, passed into the fungus.\n\nAs we have said, the soul, or ghost-man, after the death of the body, proceeds to Deadland, and food, drink, cowries, and property of various kinds are placed in the grave with the corpse, to equip the ghost for his new sphere; while, before the grave is filled up, a goat is sacrificed to the deceased, and wishes offered for his safe journey, such as \"May you arrive in peace,\" \"May you not stray from the right path,\" &c."

