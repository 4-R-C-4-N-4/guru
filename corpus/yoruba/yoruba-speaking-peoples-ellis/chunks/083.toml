body = "As was mentioned in the volume on the Ewe-speaking peoples,[1] this belief in metempsychosis is probably a result of a confusion between the Ã±oli , or disembodied luko (in Tshi, the sisa ), and the soul or ghostman, and we may here endeavour to sketch in the origin and probable development of these vaxious beliefs.\n\nThere can be little reasonable doubt but that the notion that man possesses a soul, an entity that continues his personality after death, arose from dreams, after the manner shown by Mr.\n\nHerbert Spencer in his \"Principles of Sociology.\" [2] A man dreams that he is going through various adventures, but, as the evidence of his companions shows him that he has not really left their company, he comes to the conclusion that he has a second individuality, something that is himself and yet is detachable, something that can go out of him, and does so go out when he is asleep.\n\nAmong the lower races all over the world, dreams are believed to be the adventures of [1.\n\nPp.\n\n114 and 115.\n\n2.\n\nPp.\n\n148 et seq.\n\n] the spiritual man while detached from the bodily man during sleep.\n\nThen, as he dreams of men whom he knows to be dead and buried, and naturally dreams of them as he was accustomed to see them, he concludes that this second individuality can and does exist, entirely independently of the body, after death, and preserves the appearance and characteristics of the bodily-man.\n\nAt this stage of belief the spiritual-man, or life-phantom, and the soul, or ghost-man, are one and the same.\n\nThen, seemingly, in some cases, this second individuality becomes divided into two separate entities-one, a life-phantom, which enters the body at birth, goes out and indulges in adventures during the sleep of the body, and quits it at death; the other, a soul, or death-phantom, which, after death, continues the life.\n\nand personality of the former bodily-man.\n\nIt is possible that this conception of two different entities was brought about, partly at least, by the desire to explain the reproduction by heredity of physical characteristics.\n\nChildren generally resemble their parents, and frequently reproduce their mannerisms most remarkably.\n\nAs soon as the savage begins to speculate at all, he begins to think of this phenomenon, which cannot fail to arrest his attention.\n\nHe can, and no doubt often does, come to the conclusion that the dead are reborn again in their descendants; he invents the doctrine of metempsychosis; but in some cases, and the negro tribes of the Gold and Slave Coasts seem to be examples, he appears to feel that this explanation is unsatisfactory.\n\nAnd for this reason."

