[content]
body = "The road on which the adire-iranna is eaten must be outside the town and lead away from it, for though the natives believe that Deadland is under the earth, they think that it is necessary to eat the fowl on a road leading into the bush, in order to place it in a proper position for commencing its office of guide to the soul.\n\nThe relations may not wash themselves or comb their hair during the funeral ceremonies, in consequence of which the rites themselves are sometimes styled Ofo , \"Unwashed.\" On the last day they shave their heads, and then pay visits of thanks to those who assisted at the funeral.\n\nThe time of mourning after the conclusion of these ceremonies varies with the rank and influence of the deceased, and with the locality.\n\nThree months is usually considered long enough, but a commemoration-feast is often held a year after the death.\n\nDuring the period of mourning the hair must be left unkempt as it grows, and women [1.\n\nSee p.\n\n128.] must cover the head with a cloth of a dark blue colour.\n\nA widow remains shut up for forty days, and may not wash her cloths during that time.\n\nIt is considered the greatest disgrace to a family not to be able to hold the proper ceremonies at the death of one of their number, a notion which is comprehensible when we remember how much the welfare of the soul of the deceased is supposed to depend upon their performance.\n\nHence families not unfrequently reduce themselves almost to beggary in order to carry them out, or pawn or sell their children to raise the money necessary.\n\nSometimes, too, they conceal the death and bide the body until they have secured the requisite means, and such concealments have been known to last for three or four months.\n\nThe body is treated with resinous herbs so that it becomes desiccated, and while it remains in the house, the soul is believed to abide in its old home, where food and drink are provided for it, till such time as the proper ceremonies can be held, and it be legitimately ushered on its new career.\n\nA common imprecation is Oku igbe , \"Bush death,\" meaning \"May you die in the bush, alone and uncared for, and so receive no funeral-rites.\" A proverb contrasts a man's duties to his relations with those towards the members of any secret society to which he may belong, such as the Ogboni , and insists upon the importance of the former, because of the obligation upon his relations to bury him.\n\nIt runs, \"A man must honestly perform all the duties incumbent on relationship, even though he may belong to a secret society."

