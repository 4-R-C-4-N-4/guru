body = "The belief that religion has no connection with morals thus seems to be inherent in man when in a certain intellectual and social condition, and it is not by any means at once got rid of by the adoption of the religion of a higher race in which the two are associated.\n\nThe uneducated negroes of our colonies, for instance, who have been nominally Christian for some three generations, practically believe that the commission of grave moral offences, and even crimes, will not in the least affect their prospects of future \"salvation,\" provided that they go to church or chapel regularly, and, in fact, pay their god all that ceremonial homage and lip-service which is, in their view, the essence of religion.\n\nOn the Gold and Slave Coasts, there is perfect liberty of thought in inatters of religion, but a man must show outward respect for the gods, because to do otherwise is to provoke calamities.\n\nA man may worship many gods, or none, just as he pleases, but he must not insult any.\n\nIn fact, at this stage, man tolerates any form of religion that tolerates others and as he thinks it perfectly natural that different people should worship different gods, he does not attempt to force his own personal opinions upon anyone, or to establish conformity of ideas.\n\nThe striking resemblance which the Yoruba religious system bears to that of the ancient Greeks can scarcely have escaped notice.\n\nOlorun, the sky-god proper, now being gradually displaced by the more anthropomorphic Obatala, resembles Uranus, who was displaced by Kronos.\n\nIn Greek mythology Kronos married his sister Rhea, the earth, and the Yoruba myth makes Obatala marry Odudua, who also represents the earth, though the qualities of Aphrodite appear to predominate.\n\nOlokun answers to Poseidon, Ogun, worker in iron, to HephÅstus, Orisha Oko to Priapus, Osanhin to Ãsklepius, Orun, the sun, to Helios, and Oshu, the moon, to Selene.\n\nZeus' messenger, Hermes, the lightning, was the protector of plunderers, and Shango is the god of lightning and plunder.\n\nIfa, as the, god of prophecy, and the being who wards off evil and affords help, resembles Apollo, who, in Homer, is perfectly distinct from the sun-god, though identified with him in later times.[1] [1.\n\nIn the Roman mythology Air married Earth,and the marriage was renewed every year in spring.\n\n(Virgil, Georg.\n\nii., 325.) Here, Air (Orungan) marries Water (Yemaja).] The spirits of the trees answer to the Hama-dryads, and we have river-gods and sea-spirits."

