[content]
body = "He left the palace by night, intending to endeavour to reach Tapa, beyond the Niger, which was his mother's native place; and was accompanied only by one wife and one slave, the rest of his household having deserted him.\n\nDuring the night the wife repented of her hasty action, and also left him; so, when in the morning Shango found himself lost in the midst of a pathless forest, he had no one with him but his slave.\n\nThey wandered about without food for some days, seeking in vain for a path which would lead them out of the forest, and at last Shango, left his slave, saying, \"Wait here till I return, and we will then try further.\" After waiting a long time, the slave, as his master did not appear, went in search of him, and before long found his corpse hanging by the neck from an ayan -tree.\n\nEventually the slave succeeded in extricating himself from the forest, and finding himself in a part of the country he knew, made his way towards Oyo, where he told the news.\n\nWhen the chiefs and elders heard that Shango had hanged himself they were much alarmed, fearing that they would be held responsible for his death.\n\nThey went, in company, with the priests, to the place where the slave had left the body, but were unable to find it, for it was no longer on the tree.\n\nThey searched in every direction, and at last found a deep pit in the earth, from which the end of an iron chain protruded.\n\nThey stooped over the pit and listened, and could hear Shango talking down in the earth.\n\nThey at once erected a small temple over the pit, and leaving some priests there to propitiate the new god, and establish a worship, returned to Oyo, where they proclaimed: \"Shango is not dead.\n\nHe has become an orisha .\n\nHe has descended into the earth, and lives among the dead people, with whom we have heard him conversing.\" Some of the townspeople, however, being ignorant and foolish, did not believe the story, and when the criers cried, \"Shango is not dead,\" they laughed and shouted in return, \"Shango is dead.\n\nShango hanged himself.\" In consequence of this wicked conduct, Shango came in person, with a terrific thunderstorm, to punish them for their behaviour; and, in order to show his power, he killed many of the scoffers with his fiery stones, and set the town on fire.\n\nThen the priests and elders ran about -among the burning houses, shouting, \"Shango did not hang himself.\n\nShango has become an orisha .\n\nSee what these bad men have brought upon you by their unbelief."

