[content]
body = "There is none of the publicity and display which we found in Ashanti and Dahoini, and so the people escape the brutalising effect which the frequent spectacle of scenes of bloodshed must produce.\n\nEven the priests, always the last to be influenced by a change of public opinion, seem to regard human sacrifice as something to be deplored, but occasionally necessary.\n\nThe victim is slaughtered almost in secret, and the sound of the temple-drunis and the mournful chants of the assistants alone inform the people of what is taking place.\n\nThe natives avoid any direct reference to the subject.\n\n\"The night is bad,\" they say.\n\nAs on the Gold Coast, the victim is always decapitated in front of the image, so that the blood from the severed arteries may spurt over it.\n\nFor Elegba the body is opened and the entrails placed before him in a shallow dish.\n\nThe body of a man sacrificed to the sea-god Olokun is thrown into the sea, and that of a man offered to Olosa into the lagoon.\n\nThe Commissioners who were sent to the interior in 1886 to break up the camps of the belligerent tribes, succeeded in inducing the rulers of Ijesa and Ekiti to sign an enactment abolishing human sacrifices, both to the gods and at the funeral obsequies of men of rank.\n\nThey endeavoured to obtain a similar undertaking from the Ifes, but here they met with some difficulty, Ife being the home of human sacrifice, and though the chief men promised to put an end to the practice, only four of the eighteen persons who composed the Ife Counoil signed the agreement.\n\nThe Oni of Ife said that sacrifice was made at Ife for the whole human race, the white man not excepted; and that if the sacrifice made on his behalf were to be discontinued, his superior knowled, and the arts derived therefrom, would depart from him.\n\nNext: Chapter VI: Egungun, Oro, Abiku, and Various Superstitions."

