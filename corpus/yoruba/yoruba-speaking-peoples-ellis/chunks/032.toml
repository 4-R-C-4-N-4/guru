[content]
body = "The Yoruba word for lightning is mana-mana ( ma-ina , a making of fire), and has no connection either with iron ( irin ) or a chain ( ewon ); while the name Jakuta shows that Shango is believed to hurl stones and not iron.\n\nThe iron-chain notion, therefore, appears to have been borrowed from some foreign source, and, moreover, not to yet have made much progress.\n\nThe Oni-Shango, or Priests of Shango,[2] in their chants always speak of Shango as hurling stones; and whenever a house is struck by lightning they rush in a body to pillage it and to find the stone, which, as they take [1.\n\nHunting and thunder were likewise the functions of the Aztec god, or goddess, Mixcoatl.\n\n(Nadaillac, \"Prehistoric America,\" p.\n\n298.) 2.\n\nOni, one who possesses or gets.] it with them secretly, they always succeed in doing.\n\nA chant of the Oni-Shango very commonly heard is, \"Oh Shango, thou art the master.\n\nThou takest in thy hand thy fiery stones, to punish the guilty and satisfy thine anger.\n\nEverything that they strike is destroyed.\n\nTheir fire eats up the forest, the trees are broken down, and all living creatures are slain;\" and the lay-worshippers of Shango flock into the streets during a thunderstorm crying, \"Shango, Shango, Great King!\n\nShango is the lord and master.\n\nIn the storm he hurls his fiery stones against his enemies, and their track gleams in the midst of the darkness.\" \"May Shango's stone strike you,\" is a very common imprecation.\n\nAccording to some natives, Oshumare, the Rainbow, is the servant of Shango, his office being to take up water frorn the earth to the palace in the clouds.\n\nHe has a messenger named Ara, \"Thunder-clap,\" whom he sends out with a loud noise.\n\nA small bird called papagori is sacred to Shango, and his worshippers profess to be able to understand its cry.\n\nShango married three of his sisters: Oya, the Niger; Oshun, the river of the same name, which rises in Ijesa and flows into the water-way between Lagos and the Lekki lagoon, near Emina; and Oba, also a river, which rises in Ibadan and flows into the Kradu Water.\n\nAll three accompany their husband when he goes out, Oya taking with her her messenger Afefe (the Wind, or Gale of Wind), and Oshun and Oba carrying his bow and sword.\n\nShaugo's slave Biri (Darkness) goes in attendance."

