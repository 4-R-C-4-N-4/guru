[content]
body = "See Chapter on Language, Verbs (6).] and though, in times of calamity, or affliction, whjen the other gods have turned a deaf ear to his supplications, a native will, perhaps, as a last resource, invoke Olorun, such occasions are rare, and as a general rule the god is not worshipped or appealed to.\n\nThe name Olorun, however, occurs in one or two set phrasesor sentences, which appear to show that at one time greater regard was paid to him.\n\nFor instance, the proper reply to the morning salutation, \"Have you risen well?\" is O yin Olorun , \"Thanks to Olorun;\" and the phrase \"May Olorun protect you\" is sometimes heard as an evening salutation.\n\nThe former seems to mean that thanks are due to the sky for letting the sun enter it; and the latter to be an invocation of the firmament, the roof of the world, to remain above and protect the earth during the night.\n\nSometimes natives will raise their hands and cry, \"Olorun, Olorun!\" just as we say, \"Heaven forbid!\" and with an equal absence of literal meaning.\n\nOlorun has the following epithets:-- (1) Oga-ogo ( Oga , distinguished or brave person; ogo , wonder, praise).\n\n(2) Olowo ( ni-owo ) \"Venerable one.\" (3) Eleda ( da , to cease from raining), \"He who controls the rain.\" (4) Elemi , \"a living man,\" literally \"he who possesses breath.\" It is a title applied to a servant or slave, because his master's breath is at his mercy; and it is in this sense also that it is used to Olorun, because, if he were evilly, disposed, he could let fall the solid firmament and crush the world.\n\n(5) Olodumaye or Olodumare .\n\nThe derivation of this epithet is obscure, but it probably means \"Replenisher of brooks\" ( 0lodo , possessing brooks).\n\nWe find the same termination in Oshumaye or Oshumare , Rainbow, and in Osamaye or Osamare , Water Lily, and it is perhaps compounded of omi , water, and aye , a state of being.alive.\n\nIt may be mentioned that, just as the missionaries have caused Nyankupon, Nyonmo, and Mawu to be confused with the Jehovah of the Christians, by translating these names as \"God,\" so have they done with Olorun, whom they consider to be a survival from a primitive revelation, made to all mankind, in the childhood of the world.\n\nBut Olorun is merely a nature-god, the personally divine sky, and he only controls phenomena connected in the native mind with the roof of the world."

