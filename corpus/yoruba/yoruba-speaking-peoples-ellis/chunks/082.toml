[content]
body = "Should they be omitted, the ghost wanders about the world, cold, hungry, and homeless, and he runs the risk of being seized by some of the evil spirits which roam about the earth in great numbers, and cast by them into Orun-apadi , \"the unseen world of potsherds,\" an uncomfortable place like a pottery furnace, heaped up with charcoal and the dÃ©bris of broken earthen pots.\n\nFuneral rites cannot, of course, be performed at the moment that breath leaves the body, but as an earnest of their intention to perform them, and to prevent the evil spirits from seizing the ghost, the relations at once offer a sacrifice to propitiate them; and when the corpse is buried, a fowl, called Adire-iranna ,[1] \"the fowl that buys the road,\" that is, \"that opens a right of way,\" is sacrificed.\n\nA comparison of the beliefs held by uncivilised peoples concerning the dead, seems to show that when in a very low state of culture, the ghost, no doubt from the association of ideas, is held to remain in the vicinity of the grave in which the body was interred; and that the notion of a distinct and separate place of abode for the dead, or Deadland, is only formed when a higher degree of culture is attained.\n\nThe first belief often lingers on alongside the second, as in England, where the churchyard is considered to be the most likely place in which to see a ghost; and a similar survival among the Yorubas, or a trace of the former belief, is found in the word iboji , \"a grave,\" which means, literally, \"place of the ghost\" ( ibi , place; oji , ghost).\n\nThe dead often return to earth, and are born again in the families to which they belonged in their former life.\n\nIn fact, one might say that they always return, since every mother sends for a babalawo to tell her [1.\n\nAdire , a fowl; iranna , the act of purchasing a right of way, from ra , to buy, and ona , road,] what ancestral ghost has animated her new-born child, and the babalawo always tells her which it is.\n\nAs the births at least equal in number the deaths, and the process of being re-born is supposed to have gone on \"from the beginning,\" logically there ought to be few, if any, departed souls in Deadland; but the natives do not critically examine such questions as this, and they imagine Deadland to be thickly populated, and at the same time every now-born child, or almost every one, to be a re-born ghost."

