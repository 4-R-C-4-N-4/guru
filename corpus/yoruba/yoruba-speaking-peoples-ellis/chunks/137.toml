[content]
body = "He said to him, \"This bald-headed elf says it was you who took him to my plantation, and showed him my store of yams.\" \"I?\" said the lizard.\n\n\"You call see for yourself that it is impossible.\n\nI am not in a state to go out.\n\nI have been sick here for three months, lying on my back.\n\nI do not even know where your plantation is.\" Then the man took Tortoise and smashed him.\n\nAnd Tortoise, groaning and moaning, said in a pitiful voice, \"Cockroach, come and mend me.\n\nAnt, come and mend me.\" And the cockroach and the ant mended him.\n\nAnd the places where they mended him are those parts of Tortoise which are rough.[1] [1.\n\nIn this tale, Tortoise's usual cunning fails him.\n\nIt is to be noted that, whenever be is shown as being over-reached or unsuccessful, the want of success is due to greediness-as in the first tale, where be eats and drinks till he falls asleep, so that Sigo is rescued from the drum; and in the fourth talc, where he is so busily engaged in eating the ekuras placed in the horn, that he forgets to sound it.\n\nHere his greediness wakes him stay behind, to get more yams.] Next: Chapter XV: Conclusions."

