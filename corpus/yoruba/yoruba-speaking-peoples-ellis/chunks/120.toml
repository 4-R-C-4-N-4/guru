body = "Iwin , goblin, spirit, ghost.] Then they went on again a long way, and they came to a river of filth.\n\nAnd the goblin sang:-- \"Oh!\n\nyoung palm-oil seller, You must now turn back.\" And the girl sang: \"Save I get my cowry, I'll not leave your track.\" Then the goblin sang again:-- \"Oh!\n\nyoung palm-oil seller, Soon will lead this track, To the bloody river, Then you must turn back.\" And she:-- \"I will not turn back.\" And he:-- \"See yon gloomy forest?\" And she:-- \"I will not turn back.\" And he:-- \"See yon craggy mountain?\" And she:-- \"I will not turn back.\n\nSave I get my cowry I'll not leave your track.\" Then they walked on again, a long, long way; and at last they arrived at the land of dead people.\n\nThe goblin gave the little girl some palm-nuts, with which to make palm-oil, and said to her: \"Eat the palm-oil and give me the ha-ha .[1] [1.\n\nHa-ha , the stringy remains of the pulp of the nut after the oil has been expressed.] But when the palm-oil was made the little girl gave it to the goblin, and eat the ha-ha herself, and the goblin said, \"Very well.\" By-and-by the goblin gave a banana to the little girl, and said: \"Eat this banana, and give me the skin.\" But the little girl peeled the banana and gave it to the goblin, and eat the skin herself.\n\nThen the goblin said to the little girl: \"Go and pick three ados .[1] Do not pick the ados which cry 'Pick me, pick me, pick me,' but pick those which say nothing, and then return to your home.\n\nWhen you are half-way back break one ado , break another when you are at the house-door, and the third when you are inside the house.\" And the little girl said, \"Very well.\" She picked the ados as she was told, and returned home.\n\nWhen she was half-way she broke one ado , and behold, many slaves and horses appeared, and followed her.\n\nWhen she was at the house-door, the little girl broke the second ado , and behold, many creatures appeared, sheep, and goats, and fowls, more than two hundred, and followed her.\n\nThen, when she had entered the house, the little girl broke the last ado , and at once the house was filled to overflowing with cowries, which poured out of the doors and windows.\n\nThe mother of the little girl took twenty countrycloths, twenty strings of valuable beads, twenty sheep [1."

