body = "Sacred Texts Â Africa Â Index Â Previous Â Next Â CHAPTER XIV.\n\nFOLK-LORE TALES.\n\nTHE Yoruba folk-lore tales are very numerous.\n\nThe word now commonly used to mean one of these popular fables is alo , which more properly means a riddle, or something invented, literally something twisted, or inverted.\n\nA reciter of tales, called an akpalo ( kpa-alo ) \"maker of alo ,\" is a personage highly esteemed, and in great demand for social gatherings.\n\nSome men, indeed, make a profession of story-telling, and wander from place to place reciting tales.\n\nSuch a man is termed an akpalo kpatita , \"one who makes a trade of telling fables.\" As among the Ewe tribes, the professional story-teller very often uses a drum, with the rhythm of which the pauses in the narrative are filled up.\n\nWhen he has gathered an audience around him, he cries out, \"My alo is about so-and-so,\" mentioning the name of the hero or heroine of the tale; or \"My alo is about a man (or woman) who did so-and-so,\" and, after this preface, proceeds with the recital.\n\nThe professional story teller must not be confounded with the arokin , or narrator of the national traditions, several of whom are attached to each king or paramount chief, and who may be regarded as the depositaries of the ancient Chronicles.\n\nThe chief of the arokin is a councillor, bearing the title of Ologbo \"one who possesses the old times,\" and a proverb says \" Ologbo baba arokin \" \"Ologbo is the father of chroniclers.\" I.\n\nMy alo is about a woman whose little girl made palm-oil.\n\nOne day when she had made palm-oil she took it to the market to sell.\n\nShe stayed in the market selling her palm-oil until it was quite dark.\n\nAnd when it was dark, a goblin[1] came to her to buy palm-oil, and paid her with some cowries.\n\nWhen the little girl counted the cowries she found that there was one short, and she asked the goblin for the cowry that was wanting.\n\nThe goblin said that he had no more cowries, and the little girl began crying, \"My mother will beat me if I go home with a cowry short.\" The goblin walked away, and the little girl walked after him.\n\n\"Go away,\" said the goblin; turn back, for no one can enter the country where I live.\" \"No,\" said the little girl; \"wherever you go I will follow, until you pay me my cowry.\" So the little girl followed, followed a long, long way, till they came to the country where the people stand on their heads in their mortars and pound yams with their heads.\n\n[1."

