[content]
body = "Priests of Shango wear necklaces of black, red, and white beads; those of Ogun an iron bracelet on the left arm; and those of Oshun, one of Shango's wives, brass armlets and anklets.\n\nThe third order consists of (1) priests of Orisha Oko, god of Agriculture, and (2) priests of demi-gods, or deified men, such as Huisi, who defended Oya against Shango.\n\nPriests of this order are distinguished by a small white mark painted on the forehead.\n\nThe reason of the Babalawo taking the highest place in the priesthood is that it is through his agency, as the priest of Ifa, the god of divination, that man learns what is necessary to be done to please the other gods.\n\nThe priests of Ifa thus, to a certain extent, control and direct the worship of the other gods, and in time of calamity, war, or pestilence it is their business to declare what ought to be done to make the gods propitious.\n\nThe Magba, or chief priest of Shango, has twelve assistants, who are termed, in order of authority, right-hand ( Oton ), left-hand ( Osin ), third, fourth, fifth, and so on.\n\nThey reside near Kuso, the spot at which Shango is said to have descended into the earth.\n\nThe priests, besides acting as intermediaries between the gods and men, preside at all trials by ordeal, and prepare and sell charms, amulets, &c.\n\nThe priests of Ifa are diviners proper, but other priests also practise divination, though not with palm-nuts and the board peculiar to Ifa.\n\nThe methods are various; one, called keke , is a casting of lots by means of small sticks or stalks of grass, each of which represents a particular individual; another, called gogo , is a drawing of lots.\n\nA certain number of grass stalks, one of which is bent, are held in the band or wrapped in a piece of cloth, so that the ends only show; and each person in turn draws one, the bent stalk indicating the one who is in fault.\n\nThe person of a priest is sacred, and violence offered to one is severely punished.\n\nThe office of priest is hereditary in the families of priests, but members are recruited in other modes.\n\nSeminaries for youths and girls, like those of the kosio of the Ewe tribes, are a regular institution, and in them applicants for the priestly office undergo a novitiate of two or three years, at the end of which they are consecrated and take a new name.\n\nThe ceremony of consecration is very similar to that described in the last volume.[1] [1.\n\nEwe-Speaking Peoples,\" p."

