[content]
body = "Among the Yoruba tribes markets are held weekly, that is, every fifth day.\n\nThe day of the market varies in different townships, but it is never held on the alo-oljo .\n\nFrom this custom of holding markets every fifth day has arisen another mode of computing time, namely, by periods of seventeen days, called eta-di-ogun (three less than twenty).\n\nThis is the outcome of the Esu societies, or subscription clubs, which are general amongst the Yoruba tribes, and still exist, under the same name, among the negroes of Yoruba descent in the Bahamas.\n\nThe members of an Elsu society meet every fifth market-day and pay their subscriptions, each member in turn taking the whole sum contributed at a meeting.\n\nThe first and fifth market-days are counted in, and thus the number seventeen is obtained.\n\nFor instance, supposing the second day of a month to be -a market-day, the second market would fall on the 6th, the third on the 10th, the fourth on the 14th, and the fifth on the 18th.\n\nThe fifth market-day, on which the members meet and pay their subscriptions, is counted again as the first of the next series.\n\nThese clubs or societies are so common that the seventeen-day period has become a kind of auxiliary measure of time.\n\nOsan is day, in contradistinction to oru , night.\n\nThe division of the day and night into hours is not known, but the day is divided into the following periods, viz., kutu-kutu , early morning; owuro , morning, forenoon; gangan , or osan gangan ( gangan , upright, perpendicular), noon; iji-she kpale (shadow-lengthening), afternoon; and ashale , or ashewale , evening, twilight.\n\nThe night is divided into periods of cock-crowing, as akuko-shiwaju (the cock opening the way), first cock-crowing; ada-ji , or ada-jiwa , time of second cock-crowing; and ofere , or ofe , the time of cock-crowing just before sunrise.\n\nOdun means \"Year,\" and, like the word ose , \"week,\" also an annual festival which is celebrated in October, and the period of time intervening between two such festivals.\n\nThe year is divided into seasons Ewo-erun , dry season; Ewo-oye , season of the Harmattan wind; and Ewo-ajo , rainy season.\n\nThe last is again divided into ako-ro , first rains, and aro-kuro , last rains, or little rainy season.\n\nNext: Chapter IX: Ceremonies at Birth, Marriage, and Death."

