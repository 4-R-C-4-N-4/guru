[content]
body = "This interest dated from about 1838, when a number of Egba slaves, who had been liberated at Sierra Leone from captured slave vessels, returned to Abeokuta and asked that missionaries might be sent to them.\n\nA Protestant mission was established there in 1848, and when an attack on the town was threatened by Gezo, King of Dahomi, in 1850, Mr.\n\nBeecroft, the British Consul for the Bights, and Commander Forbes, R.N., were sent to Agbomi to endeavour to persuade the king to abandon his design.\n\nThe mission completely failed, and Gezo attacked Abeokuta on March 3rd, 1851, but was repulsed with some loss.[1] The British occupation of Lagos in 1861 put an end to the friendly feelings of the Egbas, who resented the protection granted by the colonial authorities to fugitive slaves from Abeokuta, and objected to the stoppage of the export slave trade, in which they had been largely engaged.\n\nThey seem also to have had some suspicion that their independence was threatened, for when in May, 1861, it was proposed to send some trained gunners of the 2nd West India Regiment to Abeokuta to instruct the people in the use of some guns that had been presented by the British Government, and to lend aid during another attack that was now threatened by Dahomi, the Egbas made excuse after excuse, and finally declined to receive them.\n\nIn 1862 they further displayed their ill-will by molesting, and plundering several native traders from Lagos, and, as they refused reparation, the Governor of Lagos, in 1863, blockaded all the roads leadina to Abeokuta.\n\nIn 1863, Kosoko, chief of Palma and Lekki, desired [1.\n\n\"Ewe-speaking Peoples,\" pp.\n\n315-6.] to return to Lagos, and, in order to obtain permission, ceded Palma and Lekki to the British.\n\nThe Possu, or chief of Epi, raised objections to this cession.\n\nHe had, it appeared, certain territorial rights over these places, and their cession, moreover, shut him off from the sea.\n\nAs he refused to cede his rights, an expedition, consisting of three officers and 124 men of the 2nd and 3rd West India Regiments, proceeded in H.M.S.\n\nInvestigator to Epi, where the troops and a rocket party of one officer and fourteen seamen landed.\n\nThe natives offered a strenuous resistance, and the expeditionary force suffered a loss of three men killed and three officers and twenty-eight men wounded, but the town was destroyed.\n\nAfter this the chief renounced all further claim to territory south of the lagoon.\n\nIn July, 1863, the chiefs of Badagry likewise ceded all their territory to the British."

