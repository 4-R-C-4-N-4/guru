[content]
body = "143.] The ordinary service of the temples is performed by the dependents of the priesthood, the affiliated youths, and the \"wives\" of the gods, who keep the vessels filled with water, and every fifth day sweep out the temples.\n\nIn the vicinity the affiliated young people practise the religious dances and songs, and for hours together may be heard repeating chants of only two or three notes, till they work themselves up into a state of frenzy, and break out into loud shrieks and cries.\n\nTemples are ordinarily circular huts built of clay, with conical roofs thatched with grass; the interior is usually painted with the colour sacred to the god, and the doors and shutters, and the posts which support the overhanging eaves, are carved.\n\nThe temples of the chief gods are usually situated in groves of fine trees, amongst which one or two large silk-cotton trees ( Bombaces ), which seem to be regarded with veneration throughout all West Africa, tower above the rest.\n\nFrom the summits of the trees, or from tall bamboos, long streamers flutter in the wind and testify to the sanctity of the locality.\n\nSometimes there is a grove only, without any temple, but more frequently the grove or avenue adjoins a shrine.\n\nThese groves are regarded with superstitious reverence, and have proper names; a grove sacred to Ifa and his companion Odu is, for instance, called an Igbodu.\n\nNear the western entrance of the town of Ode Ondo is a celebrated grove or sacred avenue, to one side of which, in the adjoining bush, the sacrifice of human victims and the execution of criminals takes place.\n\nPersons approaching each other in opposite directions are not allowed to pass each other in this avenue, one of them being required to turn back and wait till the path is clear.\n\nThe temples of tutelary deities of towns are usually to be found in the central square of the town, or near the principal gate, and those of the tutelary deities of families or households near the house-door or in the yard.\n\nIn shape and construction they resemble the temples of the chief gods, but those of the pro.\n\ntecting deities of households are mere miniatures, and are sometimes only small sheds, open at the ends and sides.\n\nBesides these structures, which are seen in every street, one often finds larger huts, circular in shape, thatched with grass, and larcre enough to contain a seated man.\n\nThese, which might be mistaken for temples but for the fact that they contain no images, are built for the accommodation of pious persons who wish to meditate and pray."

