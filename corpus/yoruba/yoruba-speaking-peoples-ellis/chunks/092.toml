body = "The Tsbi and GÃ£-tribes thus add a few hours to each seven-day week in order to make four of these periods coincident with a lunar month, and the Yorubatribes deduct about twelve hours from the last five [1.\n\n\"Tshi-speaking Peoples of the Gold Coast\" pp.\n\n215, 216.] day week in order to make six of these periods agree with a lunar month.\n\nThe reason is obvious.\n\nTwenty-nine and a-half will not divide, and the nearest numbers that will are twenty-eight and thirty.\n\nThe Tshi and GÃ£-tribes have adopted the former as the integer to be divided, and consequently have had to add some hours, while the Yorubas have adopted the latter and have had to deduct.\n\nWe have said that to divide the lunar month into weeks appears to be exceptional among the lower races, but we have some examples.\n\nThe Ahantas, who inhabit the western portion of the Gold Coast, divide the lunar month into three periods, two of ten days' duration, and the third lasting till the next new moon appears, that is, for about nine days and a-half.\n\nThe Sofalese of East Africa must have had the same system, for De Faria says that they divided the month into three weeks of ten days each, and that the first day of the first week was the festival of the new moon.[1] When a people has progressed sufficiently far in astronomical knowledge to have adopted the solar year as a measurement of time, the month, for the reason that an exact number of lunar months will not make up a solar year, becomes a civil period or calendar month, and is arbitrarily fixed at a certain number of days, or some months are made of one length and some of another.\n\nWhen this occurs, and the month is disconnected from the moon and its phases, it seems that the week-which was properly a sub-division of the lunar month, and was no doubt [1.\n\nAstley's Collection, vol.\n\niii., p.\n\n397.] designed to mark the chief phases of the moon-also becomes a civil period, and is a sub-division of the civil month.\n\nThe ancient Greeks had a civil month of thirty days, divided into three weeks, each of ten days; and the Javanese, before the seven-day week was adopted from the Mohammedans, had a civil week of five days.[1] The former thus resembled the Ahantas, and the latter the Yorabas, and no doubt when the Greeks and Javanese reckoned time by lunar months instead of by civil, they, like the Ahantas and Yorubas, struck off the superfluous hours from the last sub-division of the month.\n\nThe names of the days of the Yoruba week are as follows:-- 1.\n\nAko-ojo.\n\nFirst day.\n\n2.\n\nOjo-awo."

