[content]
body = "He is angry because they laughed at him, and he has burned your houses with his fiery stones because you did not vindicate his honour.\" Then the populace fell upon the scoffers and beat them to death, so that Shango was appeased, and his anger turned away.\n\nThe place where Shango descended into the earth was called Kuso, and soon became a town, for many people went to dwell there.\n\nPerhaps this myth really does refer to some former King of Oyo, though why such a king should usurp the functions of the thunder-god, is not at all clear.\n\nIt is inconsistent in part, for it makes the chiefs and elders alarmed at the suicide of Shango, because they feared to be held responsible for his death; yet they would have been equally responsible had he complied with established custom, and committed suicide when he received the parrots' eggs they sent him.\n\nThe fact of the ayan being sacred to the god Shango, no doubt caused that tree to be selected for the legendary suicide of the king Shango; and the iron chain which protruded from the hole in the ground was probably suggested by the notion of red-hot chains of lightning.\n\nAs we have said, this myth is rapidly becoming blended with the older ones, and, in consequence of these events having taken place at Kuso, Shango has the title of Oba-Kuso, \"King of Kuso.\" Another myth makes Shango the son of Obatala, and married to the three river goddesses Oya, Oshun, and Oba, but reigning as an earthly king at Oyo.\n\nThe story relates that one day Shango obtained from his father Obatala a powerful charm, which, when eaten, would enable him to vanquish all who opposed him.\n\nShango ate most of the medicament, and then gave the rest to Oya to keep for him; but she, as soon as his back was turned, ate the rest herself.\n\nNext morning the chiefs and elders assembled at the palace as usual, to judge the affairs of the people, and each spoke in his turn; but when it came to Shango's turn to speak, flames burst forth from his mouth, and all fled in terror.\n\nOya, too, when she began to scold ber women in the palace, similarly belched forth flames, so that everybody ran away, and the palace was deserted.\n\nShango now saw that he was, as a god, inferior to none; so calling his three wives to him, and taking in his hand a long iron-chain, he stamped on the earth till it opened under him, and descended into it with his wives.\n\nThe earth closed again over them, after they had gone down, but the end of the chain was left protruding from the ground."

