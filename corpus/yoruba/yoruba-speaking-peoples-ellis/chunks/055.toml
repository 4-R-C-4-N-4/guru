body = "Sacred Texts Â Africa Â Index Â Previous Â Next Â CHAPTER IV.\n\nREMARKS ON THE FOREGOING.\n\nI N the myths of the origin of the various gods described in the last two chapters we probably see the result of the indwelling-spirit theory having been lost sight of.\n\nAs long as a god was accepted to be the animating principle or spiritual entity of some natural object or feature, his origin required no explanation, for his existence was bound up with the feature or object, and, if the question was thought of at all, he must have been, in the native mind, coeval with the origin of the world.\n\nWhen, however, as has been the case with most of the deities worshipped by the Yoruba tribes as a whole, the gods ceased to be identified with local objects or natural phenomena, some other explanation of their origin became necessary; for man, however low he may be in the scale of civilisation, is always desirous of knowing the reasons for everything, and the West African negro in particular is of a very inquisitive turn of mind.\n\nThen, in order to satisfy the natural desire to know who the gods were and whence they came, the myths we have already recounted grew up, and the numerous discrepancies in them appear to show that the process was comparatively recent.\n\nIt looks as if the stories had not yet had sufficient time to become generally known in a commonly accepted version.\n\nThe deities Obatala and Odudua represent, say the priests, Heaven and Earth.\n\nOloran is the real Heaven-god, or Sky-god, answering to the Ewe Mawu, but he is now almost pushed out of sight, and Obatala, a more active agent, acts for him.\n\nThe difference between Olorun and Obatala appears to be that the former is the personal divine firmament, and the latter an anthropomorphic sky-god, a later conception; and we perhaps here see a repetition of the process by which in the religion of ancient Greece Kronos supplanted Uranus.\n\nObatala, or Heaven, marries Odudua, or Earth,[1] and has two children, named Aganju and Yemaja, who, according to the priests, represent Land and Water.\n\nThese two intermarry and have a son, Orungan, \"Air,\" the region between the solid firmament, and the earth.\n\nOrungan ravishes his mother Yemaja, who, while endeavouring to escape from further outrage, falls and bursts open, whereupon a number of gods emerge from her gaping body.\n\nThe gods whose origin is thus accounted for as the offspring of Yemaja, are of various types."

