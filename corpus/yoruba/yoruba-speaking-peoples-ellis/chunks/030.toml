[content]
body = "Orungan fell in love with his mother, and as she refused to listen to his guilty passion, he one day took advantage of his father's absence, and ravished her.\n\nImmediately after the act, Yemaja sprang to her feet and fled from the place wringing her hands and lamenting; and was pursued by Orungan, who strove to console her by saying that no one should know of what had occurred, and declared that he could not live without her.\n\nHe held out to her the alluring prospect of living with two husbands, one acknowledged, and the other in secret; but she rejected all his proposals with loathing, and continued to run away.\n\nOrungan, however, rapidly gained upon her, and was just stretching out his hand to seize her, when she fell backward to the ground.\n\nThen her body immediately began to swell in a fearful manner, two streams of water gushed from her breasts, and her abdomen burst open.\n\nThe streams from Yemaja's breasts joined and formed a lagoon, and from her gaping body came the following:--(l) Dada (god of vegetables), (2) Shango (god of lightning), (3) Ogun (god of iron and war), (4) Olokun (god of the sea), (5) Olosa (goddess of the lagoon), (6) Oya (goddess of the river Niger), (7) Oshun (goddess of the river Oshun), (8) Oba (goddess of the river Oba), (9) Orisha Oko (god of agriculture), (10) Oshosi (god of hunters), (11) Oke (god of mountains), (12) Aje Shaluga (god of wealth), (13) Shankpanna (god of small-pox), (14) Orun (the sun), and (15) Oshu (the moon).[1] To commemorate this event, a town which was given the name of Ife (distention, enlargement, or swelling up), was built on the spot where Yemaja's body burst open, and became the holy city of the Yoruba-speaking tribes.\n\nThe place where her body fell used to be shown, and probably still is; but the town was destroyed in 1882, in the war between the Ifes on the one hand and the Ibadans and Modakekes on the other.\n\nThe myth of Yemaja thus accounts for the origin of several of the gods, by making them the grandchildren of Obatala and Odudua; but there are other gods, who [1."

