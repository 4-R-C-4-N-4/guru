[content]
body = "Ifa, who was in the same straits as the other gods, took to fishing, with, however, but small success; and one day, when he had failed to catch any fish at all, and was very hungry, he consulted the crafty Elegba, who was also in want, as to what they could do to improve their condition.\n\nElegba replied that if he could only obtain the sixteen palm-nuts from the two palms -that Orungan[2] the chief man, had in his plantation, he would show Ifa how to forecast the future; and that he could then use his knowledge in the service of mankind, and so receive an abundance of offerings.\n\nHe stipulated that in return for instructing Ifa in the art of divination, he should always be allowed the first choice of all offerings made.\n\nIfa agreed to the bargain, and going to Orungan, asked for the sixteen palm-nuts, explaining [1.\n\nCompare this with Lucian, \"Zeus in Tragedy,\" where Zeus complains that the sea captain Mnesitheus had, only sacrificed one cock to entertain sixteen gods.\n\n2.\n\nThe son and ravisher of Yemaja is also so named] to him what he proposed to do with them.\n\nOrungan , very eager to know what the future had in store for him, at once promised the nuts, and ran with his wife Orisha-bi, \"Orisha-born,\" to get them.\n\nThe trees, however, were too lofty for them to be able to reach the palm-nuts, and the stems too smooth to be climbed; so they retired to a little distance and drove some monkeys that were in the vicinity into the palms.\n\nNo sooner were the monkeys in the trees than they seized the nuts, and, after eating the red pulp that covered them, threw the bard kernels down on the ground, where Orungan and his wife picked them up.\n\nHaving collected the whole sixteen, Orisha-bi tied them up in a piece of cloth, and put the bundle under her waist-cloth, on her back, as if she were carryino, a child.\n\nThen they carried the palm-nuts to Ifa.\n\nElegba kept his promise and taught Ifa the art of divination, and Ifa in his turn taught Oruno-an, who thus became the first babalawo , It is in memory of these events that when a man wishes to consult Ifa, he takes his wife with him, if he be married, and his mother if he be single, who carries the sixteen palm-nuts, tied up in a bundle, on her back, like a child; and that the babalawo , before consulting the god, always says, \" Orugan, ajuba oh.\n\nOrisha-bi ajuba oh .\" (\"Orungan, I hold you in grateful remembrance."

