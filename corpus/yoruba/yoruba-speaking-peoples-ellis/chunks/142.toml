[content]
body = "We thus have two explanations of the origin of tutelary deities.\n\nThey are either nature-gods who have been severed from their proper surroundings, or ghost-gods whose origin has been forgotten.\n\nOf couse the manes themselves are tuletar.\n\nNature-gods themselves are no doubt in several cases blended with ghost-gods.\n\nThe reverence paid to certain rivers, cliffs, &c., must have often dated from some fatal accident that occurred in connection with them.\n\nIt was this which first attracted attention, and primitive man would not be likely to discriminate between the ghost of the victim, which would haunt the spot where the latter lost its life, and the indwelling spirit of the natural feature.\n\nNevertheless, that the nature-gods are, as a whole, the product of manes-worship, is, we think, a theory not warranted by the evidence, though apparently supported by the high authority of Mr.\n\nHerbert Spencer.\n\nIt often occurs that a family settles near to some river, lake, or hill, and forthwith commences a cult of this indwelling spirit, without any catastrophe having taken place near it.\n\nIn fact, it may be said to be the rule that whenever a Tshi group takes up its abode near any remarkable natural feature of object, it worships and seeks to propitiate its indwelling spirit, fearing that otherwise it may do some harm.\n\nMany of the nature-gods are non-terrestrial, and it is difficult to see by what process they could ever become confused with dead men.\n\nNobody could be buried in the sky, sun, moon, rainbow, or wind; and if these could be conceived to be animate without the intervention of the souls of the dead, why could not terrestrial objects also?\n\nManes-worship is the result of the belief that man has an indwelling spirit which survives after the death of the body, and nature worship is the result of the belief that all nature is animate.\n\nWhich was first in order it would be difficult to determine with absolute certainty, but, from the analogy of the lower animals, it seems probable that the second was.\n\nAnimals regard objects which move as alive, whout having come to the conclusion that they themselves have spiritual second selves, and primitive man, who would know litle more of naturea cuasation than an animal does, probably did also.\n\nWhen a rock slipped, or a tree fell, the unusual behavior suggested animation.\n\nAfterwards, when he had come to believe that he himself possessed an indwelling spirit, he probably conceived the animating entites of natural objects to be somewhat analogous, and made the gods the reflex of his own kra .\n\nObjects made by human hands are not animate, and do not possess indwelling spirits, though they have ghosts, which the souls of the dead are able to make use of in deadland."

