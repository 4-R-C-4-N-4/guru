[content]
body = "He still dreams of persons who are dead, whence he believes that they exist after death; and he must often dream of dead friends or relations whose characteristics have been reproduced in their children, or, since they had a common ancestor, in some collateral member of the same family.\n\nHe cannot, then, in these cases, conclude that the dead have returned to earth in the persons of their descendants; for the evidence of his dreams proves to him that they still exist as ghost-men, and are in every respect as they were when alive in the world.\n\nOn the other hand, the evidence of his eyes shows him that their physical peculiarities are reborn in children now living.\n\nHe therefore divides the second individuality into two -from, so to say, the kra-soul , which was one entity, he makes two, the kra and the soul, the former of which inhabits the body during life, and after death enters a new human body in the same family; while the latter remains dormant, as it were, during life, but after death continues the existence of the man as an individual.\n\nThe reproduction of features, mannerisms, &c., is thus accounted for by the kra , while the theory of the soul satisfactorily accounts for what the uncivilised man believes to be the incontestable evidence of his dreams.[1] If this view be correct it will probably be found that several other races have divided the originally conceived entity into two.\n\nThe genius natalis of the [1.\n\nThe Awunas, an Eastern Ewe tribe, say that the lower jaw is the only part of the body which a child derives from its mother, all the rest being derived from the.\n\nancestral luwoo (the Tshi kra ).\n\nThe father furnishes nothing.] Romans resembled the kra in that it was a gnardian-spirit which entered man at birth, but, unlike the kra , it perished at his death.\n\nIt was certainly quite separate and distinct from the soul, or ghost-man, which went to Hades.\n\nWe say advisedly that the genius natalis dwelt in the man from birth, because to practise abstinence was \"to defraud one's genius ,\" and to eat, drink, and be merry was \"to indulge one's genius ,\" [1] thus showing that the genius was bound up with the man just as is the kra .\n\nAs with the kra , the birthday was particularly set apart for the worship of the genius .\n\nSubsequently, the Romans, under the influence of dualism, just as the GÃ£-tribes have done, divided the genius into two-one of a good disposition and one of a bad."

