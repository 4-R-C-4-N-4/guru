body = "The word nightmare is itself a survival from a similar belief once held by ourselves, mare being the Anglo-Saxon mÃ¦re , elf or goblin.\n\nThe person -who employs Shigidi, and sends him out to kill, must remain awake till the god returns, for if he were to fall asleep Shigidi would at that moment turn back, and the mission would fail.\n\nShigidi either travels on the wind, or raises a wind to waft him along; on this point opinions differ.\n\nThe first symptom of being attacked by Shigidi, is a feeling of heat and oppression at the pit of the stomach, \"like hot, boiled rice,\" said a native.\n\nIf a man experiences this when he is falling asleep, it behoves him to get up at once and seek the protection of the god he usually serves.\n\nHouses and enclosed yards can be placed under the guardianship of Shigidi.\n\nIn order to do this a hole is dug in the earth and a fowl, sheep, or, in exceptional cases, a human victim is slaughtered, so that the blood drains into the hole, and is then buried.\n\nA short, conical mound of red earth is next built over the spot, and an earthen saucer placed on the summit to receive occasional sacrifices.\n\nWhen a site has thus been placed under the protection of Shigidi, he kills, in his typical manner, those who injure the buildings, or who trespass there with bad intentions.\n\n(5) OLAROSA.\n\nOlarosa (?\n\nAlarense , helper) is the tutelary deity of Houses.\n\nHe is represented as armed with a stick or sword, and his image is found in almost every household guarding the entrance.\n\nHis office is to drive away sorcerers and evil spirits, and to keep Elegba from entering the house.\n\n(6) DADA.\n\nDada, more properly Eda, or Ida, is the god of New-born Babes and Vegetables.\n\nThe name appears to mean natural production, anything produced or brought forth by natural process.\n\nDada is repre.\n\nsented by a calabash ornamented with cowries, on which is placed a ball of indigo.\n\nHe is one of those who came from the body of Yemaja.\n\n(7) OYA.\n\nOya is the goddess of the Niger, which is called Odo Oya , the river of Oya.\n\nShe is the chief wife of the thunder-god, Shango, and, as has already been said, her messenger is Afefe, the Wind.\n\nAt Lokoro, near Porto Novo, there is said to be a temple of Oya containing an image of the goddess with eight heads surrounding a central head.\n\nThis is supposed to be symbolical of the numerous outfalls of the Niger through its delta.\n\nOya, and the two following sprang from Yemaja."

