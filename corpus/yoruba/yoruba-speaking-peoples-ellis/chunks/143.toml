[content]
body = "There are, however, many such objects upon which the native sets great value, and as they do not possess guardian-spirits of themselves, he provides them with artificial ones.\n\nThus, just as he kills the wives of his chief, and buries them with him, releasing their ghosts, or souls, from their bodies to enable them to continue their ministrations to their lord, so, perfectly logically, he slays a slave on the family stool, the emblem of office, or upon the great drum of the tribe, releasing the ghost from the body in order to enable it to become the guardian-spirit of the stool or drum.\n\nThis is a luxury that can only be afforded by men of rank, or to ensure the safekeeping of national trophies or emblems, and hence it is only the royal stools of kings and chiefs, or paraphernalia belonging to the tribe as a whole, that are, as a rule, thus protected.\n\nThe victim is decapitated upon the object so that the blood gushes over it, and on the, Gold Coast many tribal stools and drums are clotted thick with the blood of those who have been slain upon them, for it seems to be thought necessary to renew the guardian from time to time.\n\nAs, when a human sacrifice is offered to a god, the victim is similarly slain upon the sacred stool or chair, it seems probable that the ghost is in this case also believed to become a guardian-spirit.\n\nNo doubt the belief that all objects not made by human hands possessed indwelling, or guardian-spirits, suggested the idea of supplying artificial guardian-spirits to objects which did not come under this category.\n\nThe practice is very widespread, and the custom of immolating human victims at the launching of war-canoes in the islands of the Pacific, so that the bows were sprinkled with their blood, and the Dyak practice of crushing a slave-girl to death under the first post erected at the building of a communal house, are cases in point, the sacrifice being in each case designed to provide a guardian-spirit.\n\nWith some two or three exceptions, all the gods worshipped by the Tshi tribes are purely local and have a limited area of worship.\n\nIf they are nature-gods they are bound up with the natural objects they animate, if they are ghost-gods they are localised by the place of sepulture, and if they are tuletary deities, whose origin has been forgotten, their position is necessarily fixed by that of the town, village, or family they protect.\n\nIn any case they are worshipped only by those who live in the neighbourbood.\n\nThe exceptions are the sky-god, the earthquake-god, and the goddess of the silk-cotton trees."

