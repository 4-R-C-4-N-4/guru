[content]
body = "This negotiation coming to the knowledge of Kosoko, he despatched a force to Badagry to attack Akitoye, which burned the town, killed an English trader named Gee, and destroyed a great deal of property belonging to British subjects.\n\nThe senior naval officer upon the station thereupon determined to support Akitoye against Kosoko, and H.M.\n\nsloops Philomel , Harlequin , Niger , and Waterwitch , with the gun vessels Bloodhound and Volcano , assembled off the Lagos bar in -November, 1851, and on the 25th all the ships' boats, towed by the Bloodhound, entered the lagoon and proceeded towards Lagos Island.\n\nAs the British Consul, who was with the flotilla, had hopes that Kosoko would submit to a display of force, flags of truce were kept flying; and although, on rounding the first point, a heavy musketry fire was opened by the natives, the fire was not returned, and the flags were not lowered till the boats were within a mile of the town.\n\nAt this point several guns opened on the boats, so the flags of truce were hauled down and the fire returned.\n\nThe fire from the boats had, however, but little effect on the natives, who were well covered by stockades and mud walls, and a party of one hundred and sixty men was accordingly landed.\n\nThey found themselves in a maze of narrow streets, from every corner of wh_ich they were fired upon by concealed enemies, and after losing two officers killed and several men wounded, they were compelled to retreat to the boats.\n\nThis failure led to a more determined attack in December, on the 26th of which month a considerable force, under the command of Commodore H.\n\nW.\n\nBruce, entered the lagoon in boats.\n\nThe natives offered a stubborn resistance, and had in position several guns, which were exceedingly well served.\n\nThe Teazer got aground abreast of a battery, upon which her own gun could not be brought to bear, and to save her from destruction it became necessary to land a party and carry the battery by assault.\n\nThis was done in gallant style, but with the heavy loss of one officer and thirteen inen killed, and four officers and fifty-eight men wounded.\n\nThe other vessels and boats had in the meantime kept up a vigorous bombardment, which was maintained all that day, and continued next morning from daybreak until about 11 a.m., when a magazine on shore blew up and set fire to the town.\n\nThe flames, fanned by the sea-breeze, spread with remarkable rapidity, and the heat was so intense that the fire of the natives gradually slackened and then finally stopped.\n\nNext morning, Kosoko and his followers havinu abandoned the place, the British landed.\n\nThey found the beach strongly stockaded, and an enfilading piece of ordnance at every promontory."

