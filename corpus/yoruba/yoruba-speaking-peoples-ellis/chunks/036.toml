[content]
body = "This myth well exemplifies the confusion that has now been created in men's minds between the thunder-god proper and the demi-god, the result being a kind of compound Shango, possessing attributes of each.\n\nThe Shango of this story resembles in his marital relations the thunder-god, but the descent into the earth with the iron chain, the end of which is left above ground, is like the legendary descent of the deified king, and is probably only another version of the same event.\n\nIt is probable that contact with Mohammedans has had something to do with the invention of this myth.\n\nThe genii, as we read of them in the \"Arabian Nights,\" are frequently described as breathing forth flames to destroy their opponents; and a descent into the earth, which opens when stamped upon, is a mode of exit often found in the same collection.\n\nThese ideas do not appear to be ones at all likely to have arisen spontaneously in the negro mind, and we find nothing of the sort in the groups cognate to the Yoruba.\n\nMoreover, a thunder-god must, from the very nature of his being, live above the eaxth amongst the clouds; and to make him descend into the bowels of the earth, is to place him in a situation where he could not exercise the functions of his office.\n\nThese remarks equally apply to the following myth.\n\nSince his descent into the earth with his three wives at Oyo, Shango has often come back to the world.\n\nOne day, when down in the earth, he quarrelled with Oya, who had stolen some of his \"medicines;\" and she, terrified at his violence, ran away, and took refuge with her brother the Sea-God (Olokun).\n\nAs soon as Shango discovered where she had gone, he swore a great oath to beat her so that she would never forget it.\n\nNext morning he came up from below with the Sun, and, following him in his course all the day, arrived with him in the evening at the place where the sea and sky join, and so descended with him into the territories of his brother Olokun.\n\nThe Sun had not knowingly shown Shango the road across the sky to Olokun's palace, for Shango had been careful to keep behind him all the time, nearly out of sight, and to hide when the Sun looked round.\n\nWhen Shango reached Olokun's palace and saw his wife Oya there, he made a great noise and commotion.\n\nHe rushed towards her to seize her, but Olokun held him; and while the two were struggling together Oya escaped, and ran to bide with her sister Olosa (the Lagoon).\n\nWhen Olokun saw that Oya had gone he released Shango, who, now more furious than ever, ran after his wife cursing and threatening her."

