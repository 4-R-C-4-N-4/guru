[content]
body = "Food, rum, and cowries are placed in the grave, the body is sprinkled with the blood of a he-goat, sacrificed to propitiate Elegba, a few more cowries are thrown in, and then the grave is filled up amid the wishes for a safe and pleasant journey to which we have already referred.[1] When the grave is full the earth is smoothed down, [1.\n\nChapter vii.] and sometimes, when many articles of value have been entombed, the surface is moistened with water to make the earth settle down, and slaves and dependents are made to sleep on it night after night, for the double purpose of protecting it and of obliterating all trace of its exact position.\n\nAfter the interment, the feast, which had been suspended since the afternoon, recominences; and drinking and shouting.\n\namid the firing of muskets, the jangle of native gongs, and the dull thud of the drums, continues all night.\n\nNext day, about noon, the male relations walk out in a body, and wander about the town, as if looking for the deceased, and chanting \"We look for our father, and cannot find him\"; to which the bystanders reply, \"He has gone to his house.\" Returning from this, the mourners carry on the feast till the evening of the next day, when the bones of the victims that have been sacrificed, and those of the fowls and sheep that have been eaten by the guests, are collected and placed over the grave.\n\nAll the articles which the deceased had in daily use, such as his pipe, the mat on which he slept, the plate or vessel froin which he ate, his calabashes, and other things of sinall value, are carried out into the bush and burned.\n\nUp to this point the soul of the deceased is supposed to have been lingering near his old home, and this destruction of his property is intended to signify to the soul that he must now depart, since there is no longer anything belonging to him.\n\nIn former tinics the destruction of property was carried much further than at present.\n\nUsually the apartment in which the deceased is buried is closed, and never used again, and sometimes the roof is removed.\n\nRich families even abandon the house altogether, and it is said to have been usual in days bygone to burn it.\n\nThe deceased is called three times by name, and adjured to depart, and no longer haunt the dwellings of the living.\n\nAfter this invitation to be gone, the fowl, called adire-iranna ,[1] is sacrificed, which, besides securing a right-of-way for the soul, is supposed also to guide it.\n\nThe feathers.\n\nof the fowl are scattered around the house, and the bird itself carried out to a bush-road, where it is cooked and eaten."

