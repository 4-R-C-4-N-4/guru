[content]
body = "Marriage within the clan is forbidden, and hence a father cannot be related by blood to his children, or be of the same family.\n\nSuccession to property, office, or dignity follows the line of blood-descent, and a man's heir is his brother, or, failing a brother, his sister's son.\n\nAmong the GÃ£ tribes of the Gold Coast descent is also solely and exchisively in the female line, and marriage in the mother's family is forbidden; but here the influence of the father in the household [1.\n\n\"The Primitive Family.\"] [298] has begun to assert itself, and in some cases, chiefly where tho father is a man of some rank and power, office or dignity descends from father to son.\n\nProperty is still considered to be vested in families, rather than in individuals, and succession to property remains in the female line, in the same order as among the Tshi tribes.\n\nAmong the western Ewe tribes the law of blood-descent, and of succession to office or property, is the same as with the GÃ£ tribes; but among the eastern Ewe tribes, in Dahomi, blood-descent is on both sides of the house, and succession in the male line.\n\nThis change has, however, only taken place in the royal family of Dahomi, and among what may be termed the aristocracy, who appear to have followed the lead of their sovereign.\n\nThe lower orders still trace descent in the female line, and that the higher orders used also to do so is shown by the terms in use for expressing relationships.\n\nBrother and sister, for instance, can only be rendered by \"mother's son\" and \"mother's daughter\" respectively.\n\nAmong the Yoruba tribes descent is through both parents with succession in the male line, and marriage is forbidden both in the father's and mother's family so long as relationship can be traced.\n\nA man's heirs are his sons, among whom the property is equally divided.\n\nIf a man have no sons, his brothers inherit.\n\nThe old ideas concerning blood-descent still, however, exercise some influence, and children by the same father, but different mothers, are not generally considered proper blood-relations.\n\nThus, going from the Tshi tribes to the Yoruba, from the least cultured to the most cultured, we find a gradual but regular change from kinship and descent through mothers only, to kinship and descent through both parents.\n\nWe are also able to trace the evolution of society from the stage in which the group, or community, as a whole, protected its own rights and exacted redress for injuries, to that in which the state protects the individual and punishes crime."

