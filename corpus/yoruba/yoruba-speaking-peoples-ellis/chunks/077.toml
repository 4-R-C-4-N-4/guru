body = "95, 97, and 98.] because it is supposed that the sword-fish ( okira ) cuts in two all its foes in the sea.\n\nThe Yorubas have a superstition which has close points of resemblance to the \"changeling\" superstition of Northern Europe.\n\nIt is referred to in many folk-lore tales, and the following is an example.\n\n\"There lived at Otta\" (a village on the River Ibo, which is a tributary of the Ogun) \"a woman named Bola, who had a male child.\n\nWhen the child was small the mother carried him on her back when she went to market, but when he became about nine months old she used to lay him down on a mat in her house, fasten the door, and go to market by herself.\n\nAfter this it always happened that when she returned from the market she found that all the food she had left in the house had disappeared.\n\nThis seemed to her very strange, and she at first suspected her neighbours, but she always found the doorfastening untouched, and was unable to fathom the mystery.\n\n\"One day a neighbour came to her and said, 'I am going to the market at Orichi to-morrow morning early, and therefore must ask you to repay me the string of cowries that you sent your little boy to borrow from me.' Bola, much astonished, declared that she had borrowed no cowries from the woman, and had sent no one to her; but the neighbour persisted that Bola's child had come to her, and had borrowed a string of cowries in the name of his mother.\n\n'Come, then,' said Bola, 'and see my child.' \"The two women went into the house where the child was sleeping on his mat.\n\n'You see him,' said Bola, 'there he is, sleeping.\n\nDo you not see that be is yet too young, to walk?\n\nHow then could he come to you?\n\nAnd how could he ask you for cowries, seeing that he cannot yet talk?\n\n\"The neighbour looked closely at the child, and then solemnly declared that it was really he who had come to her, but that when he came he was much big er than he was now, and had the appearance of a child of about ten years of age.\n\n\"When Bola, heard this she was much distressed.\n\nShe could not doubt her neighbour's word, and she feared that her child must be possessed by an evil spirit.\n\nShe paid the neighbour the string of cowries, and begged her to say, nothing; then, when the child's father came to the house, she told him the whole story.\n\n\"The father and mother decided to search into the mystery.\n\nThe father, therefore, carefully hid himself in the house, one day while the mother and child were out."

