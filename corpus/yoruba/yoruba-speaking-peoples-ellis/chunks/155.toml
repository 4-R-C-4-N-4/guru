[content]
body = "There is, of course, individual property, but it usually is limited to minor articles, such as utensils, weapons, &c.\n\nHouses, the family gold ornaments, insignia, stools, and properties that have been handed down from bygone generations, are vested in the head of the family, and cannot be alienated without the consent of the family as a whole.\n\nAt the demise of the head of the family the next of kin who succeeds has the usufruct of the family property in his turn, and is responsible for its safe custody.\n\nAmong the Yorubas, in consequence of the change in the system of descents, property is vested in households, that is, in a smaller group of kindred, and divided among the heirs, who are the sons, or, in default of sons, brothers.\n\nAs here, equally with the tribes who trace descent solely in the female line, the order of succession is unalterable; property in all cases remains in the family, the only difference being that among the Yorubas it is distributed with each succeeding generation, instead of being kept together; but the tendency of the Yoruba custom undoubtedly is to destroy the notion that property belongs to the group of kindred, and to make it individual.\n\nIn the case of all the tribes land is held in common, and there is no individual property in land, though the notion that land can be the property of the individual, instead of the community, has, as has been said, begun to appear among the Yorubas.\n\nProbably, in early times, moveable as well as immoveable property was once common.\n\nIt still is, to a large extent, common to the family, and, at all earlier stages when the group was homogeneous, it was no doubt common to the group or community; for the custom which allows a creditor to seize the property of a third party belonging to the same community as the debtor, seems to point to a notion that the community as a whole must have benefited by what the debtor received.\n\nIf all property were once common to the group, as land is now, then the following changes probably occurred.\n\nWhen the homogeneous group became heterogeneous, and broke up into clans in consequence of the system of female descents, property became common to the clan.\n\nThen, when the clan became divided into uterine families, property became common to the uterine family, as it still is on the Gold Coast; and, when the uterine families came to an end, owing to the recognition of the blood-tie between father and child, property became vested in households, as it is with the Yorubas.\n\nIn other words, as the units of, which society was originally composed became subdivided into smaller and smaller groups, so did property become vested in a gradually decreasing number of persons, until it finally became individual."

