[content]
body = "The other days of the week are, as with the Yorubas, days of rest also, but only for particular persons, and not for the whole community.\n\nThe second day, Bna-da , is sacred to the sea-gods, and is the fisherman's Sabbath; while the fifth day, Fi-da , is the Sabbath of agriculturists.\n\nThe first clay of the GÃ£ week, which is also a general day of rest, is called Dsu , \"Purification.\" Dsu seems also to have been used as a title of the moon, for we find silver called dsu-etci , \"moon substance,\" or \"moon stone,\" and in the cognate Ewe and Yoruba languages, the moon is called Dsu-nu and Oshu respectively.\n\nOwing to later and more anthropomorphic conceptions of gods moon-worship appears to have died out, though all these peoples salute the now moon respectfully when it is first seen, and a Tshi epithet of the moon is bohsun , \"Sacred,\" or \"God.\" When, however, moon-worship flourished, the moon would undoubtedly have been a general god, worshipped by the community as a whole; and hence the day dedicated to the moon is a general day of rest, and not, like the other days of the week, a day of rest for certain persons only.\n\nIn the case of the Tshi and GÃ£ tribes, we thus have examples of a weekly moon-Sabbath, observed by peoples who reckon by weeks.\n\nIt seems probable that the Jewish Sabbath was also connected primarily with moon-worship, and at first was a monthly festival like that of the Mendis and Bechuanas, but became a weekly festival after the Jews adopted the seven-day week from the Babylonians.\n\nIn the historical books of the Old Testament, viz., Joshua, Judges, the books of Samuel, and the first book of Kings, there is not only no mention of a weekly Sabbath, which is first spoken of in II.\n\nKings iv.\n\n23, but there is evidence that such an institution was unknown; for the encompassing of Jericho,[1] the events described in I.\n\nSamuel xxix.\n\nand xxx., and Solomon's fourteen-day feast,[2] would all have violated the injunction, \"Let no man go out of his place on the seventh day,\"[3] had there been a weekly Sabbath.\n\nBut while the weekly Sabbath is not mentioned we find a new moon festival spoken of."

