[content]
body = "Metamorphosis to a brook, spring, or lagoon is common, and we have one example of a girl, being transformed, like Daphne, into a shrub.\n\nThe gods, when consulted, gave oracular responses that differ in no essential particular from the answers given by the Oracle of Delphi.\n\nThe Yorubas, like the Greeks, offer human sacrifices in time of national need.\n\nDancing was, with the Greeks, intimately connected with worship, as Lucian says: [1] \"You cannot find a single ancient mystery in which there is not dancing;\" and on the Gold and Slave Coasts every god of note has his own dance, which is sacred to him, and known only to the initiated.\n\nThe religion of ancient Greece has been obscured by a great deal of later poetic imagery; but, when we look into it closely, it is found to be similar to that of the Yorubas, and was no doubt produced when the Greeks were in a like intellectual condition.\n\nIt is a pantheon which seems peculiar to a certain stage of culture, and is composed of nature-gods and ghost-gods.\n\nThe Khonds of India have almost exactly the same objects of worship as the Yorubas, their gods being the sun-god, moon-god, earth-god, god of iron and arms, small-pox-god, god of hills, god of streams, forest-god, god of limits, god of fountains, god of rain, god of hunting, god of births, village-god, and tank-god.[2] Similar resemblances are forthcoming from almost every part of [1.\n\nOn \"Dancing,\" c.\n\n15.\n\n2.\n\nLatham, \"Ethnology of the British Colonies,\" p.\n\n140.] the world.\n\nIn fact, the gods are everywhere much the same, because much the same phenomena and natnral objects are found everywhere, and because mankind [1] on the same plane of civilisation has much the same wants and necessities.\n\nFrom a comparison of the systems of consaugainity of these lingual groups we are able to trace the order of evolution of the family, and the results go to show that Dr.\n\nStarcke's [1] theories of the priority of a system of kinship through fathers are incorrect, and that Mr.\n\nMcLennin was right, in his gencral conclusions that descent through mothers was first in order.\n\nAmong the Tshi tribes of the Gold Coast descent is solely and exchisively in the female line.\n\nA family is a number of persons connected by uterine ties, all of whom bear the same clan-name.\n\nThe clan-name is the test of kinship, and a family is a small circle of persons whose exact degrees of consanguinity to each other are known, within the wider circle of more distant relations, that is, the clan at large."

