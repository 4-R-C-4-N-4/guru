[content]
body = "Mawu, like Nyankupon, is considered too distant to interfere in human affairs, and as he no longer thunders and lightens, which phenomena are attributed to a new conception, Khebioso, a bird-like god, who appears to be the personified thunder-cloud, he does nothing but control the rain, and his importance has been thereby lessened.\n\nOther general deities are Aizan, protector of markets and public places, who seems to be a type generalised from the multitudinous tutelary gods of the Gold Coast; Dso, the god of fire, Legba, a phallic divinity, and Sapatan, the small-pox god.\n\nIn this deification, or personification, of fire, love, and pestilence, we see a new departure.\n\nFire is not worshipped on the Gold Coast, and there it is the local gods who inflict pestilence on their worshippers as a punishment for neglect; while love, or desire, is usually stimulated by the ghost-gods, who, as the forefathers of the ghost-gods are believed to take an interest in the propagation of their descendants, though occasionally the exciting of this passion may be found to be one out of the many attributes of a nature-god.\n\nWhen we come to the Yoruba-speaking tribes we find simulacra in universal use, and the belief that nature-gods are the animating principles of natural objects only lingering in places remote from populous centres, and among the Jebus, who live isolated in their forests and shun intercourse with the other tribes.\n\nThere are, in consequence, few local gods proper, but many tutelary deities of tribes, towns, villages, and families, and there is a very large increase in the number of general deities.\n\nOlorun, the sky god, answers to the Ewe Mawu and the Tshi Nyankupon, but he is rapidly being displaced by Obatala, a more anthropomorphic conception, and who very probably was a ghost-god whose origin has been lost sight of.\n\nThe god of thunder and lightning appears under the name of Shango, and that of small-pox under the name of Shan-kpanna.\n\nLegba has become a combination of desire and evil, and Odudua, a goddess, said by the priests to be the earth, presides over the passion of love.\n\nOrisha Oko, who represents natural.\n\nfertility, Aje Shaluga, god of wealth, Shigidi, personified nightmare, and Dada, patron of vegetables, are new conceptions.\n\nA native of the Gold Coast who found his yam-crop thrive would attribute it to the fostering care of the local nature-god, and if he acquired wealth it would probably be considered due to the efforts of his tutelary deity, but here gods appear to have been made out of abstractions."

