body = "Tortoise cried out, \"Everybody wanted Buje, the slender, and Buje refused everybody, but I have had her.\" The king sent a messenger, with his stick, to summon Bujo, the slender.\n\nWhen she came the king said, \"We have heard that Tortoise is your husband; is it so?\" Buje, the slender, was ashamed, and could not answer.\n\nShe covered her head with her cloth, and ran away into the bush.\n\nAnd there she was changed into the plant called Buje.[1] [1.\n\nThere is a version of this story, current among the English and Americans, which makes Buje be ravished by a deformed man, instead of by the Tortoise.\n\nIt is to be found, I believe, in \"Central Africa,\" a work I have not seen, but which was written.\n\nby Mr.\n\nBowen, an American Missionary, and published at Charleston, United States of America.\n\nin 1857.\n\nAll natives are agreed that this version is incorrect, and that Tortise was the ravisher, and the only probable explanation of the mistake seems to be that Mr.\n\nBowen learnt the story from a native who spoke French, and either confused la tortue with le tortu , or concluded that the narrator meant the latter when he said the former.\n\nIf the hearer had never heard of the mythical personage, the antbropomorphic Tortoise, he, thinking it impossible that Buje could be violated by a tortoise, would very naturally suppose that the narrator meant to say le tortu , and erred through an insufficient knowledge of French.\n\nThe pulp of the fruit of the Buje-shrub turns black when exposed to the air, and is used by the natives to stain the skin in imitation of tattooing.\n\nIt leaves marks like lamp-black.] VI.\n\nMy alo is about Tortoise.\n\nThere was a famine, and there was a great scarcity of food all through the country.\n\nOne day the lizard was in a plantation searching for something to eat, when he found a large rock full of yams.\n\nThe owner of the plantation was near the rock.\n\nHe cried \"Rock, open,\" and the rock opened.\n\nHe went in and took yams, and came out again.\n\nThen he said, \"Rock, shut,\" and the rock closed up.\n\nThe lizard saw all this.\n\nHe heard also what the man said, and he went home.\n\nNext morning, at cock-crow, he went to the rock.\n\nHe said, \"Rock, open,\" and the rock opened.\n\nHe went in and carried out yams to take home and eat.\n\nThen he said, \"Rock, shut,\" and the rock shut.\n\nEvery day the lizard did this.\n\nOne day Tortoise, the bald-headed elf, met the lizard on the road carrying yams.\n\nHe said to him, \"Where did yoti get your food from, comrade?"

