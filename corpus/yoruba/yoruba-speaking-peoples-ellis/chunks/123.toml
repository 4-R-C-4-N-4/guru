[content]
body = "The young woman ran to the bag and opened it, but her child was not in it, so she threw the bag down and sang again:-- \" Aranran, eiye igbo, igbo , Give me back my child, oh, igbo .\n\nHere is a rope of tie-tie, igbo ; Quickly let my child down, igbo .\" Then the aranran took all kinds of valuable property, and threw them down to her.\n\nAnd the mother looked here and looked there as the things fell, but her child was still not there, so she sang again, the same song, a third time.\n\nThen the aranran took the child and flew down with it and placed it gently on the ground.\n\nThe young woman ran to her child, took him up, [1.\n\nEiye , bird; igbo , forest, bush.\n\nHence eiye igbo answers to our \"wild bird.\" The native words are here retained in order to preserve the rhythm.\n\n2.\n\nTie-tie is an Anglo-African term for the various kinds of parasitical vines which are used as substitutes for cord.\n\nThey are sometimes called \"bush-rope.\"] and put him on her back.\n\nShe picked up also all the things that the aranran had thrown down to her.\n\nAnd from being poor, she now became rich.\n\nAfter returning home the young woman took twenty strings of coral beads, and went to offer them to the iyale ; but the iyale , when she learned how the young woman had come by the beads, refused them.\n\nThe iyale took a child belonging to one of the other wives and carried it into the bush.\n\nShe put it under the tree of the aranran , and went away to cut wood.\n\nBut while she was away cutting wood the aranran carried off the child, and killed and ate it.\n\nWhen the iyale , returned to the foot of the tree, and could not find the child, she began to sing, as the young woman had done:-- Aranran, eiye igbo, igbo , Give me back my child, oh, igbo .\n\nHere is a rope of tie-tie, igbo ; Quickly let my child down, igbo .\" Then the aranran voided copiously into a bag, tied up the neck of the bag, and throw it down.\n\nThe iyale ran to the bag, picked it up, and untied it.\n\nShe found it full of filth, and she threw it away.\n\nThen she sang again, as before.\n\nThis time the aranran made water in a large calabash, and let it fall, so that it broke upon the woman's head.\n\nAnd the iyale sang a third time:-- Aranran, eiye igbo, igbo , Give me back my child, oh, igbo ."

