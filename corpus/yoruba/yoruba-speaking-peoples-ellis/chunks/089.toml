[content]
body = "The priest consulted the god Ifa, and Ifa replied that in order to know what his mother had done with the necklace, the boy must go to Deadland and ask her.\n\nThe child said he was ready to go, but how was he to get there?\n\nThen the oracle instructed him as follows:-- \"Let the child in search of his mother Offer an ebon sheep to the dead, When night falls in the grove of Ifa.\n\nLet the child in search of his mother Sprinkle his eyes with lustral water, Then shall the dead be visible to him.\n\nLet the child in search of his mother Follow the shadows' noiseless footsteps, So shall he reach the land of the dead.\" The babalawo instructed the boy that, upon making the necessary, payment, the door-keeper of Deadland would allow him to enter, and he warned him not to touch any of the dead, or else he would not be able to return to earth.\n\nSupposing all went well, and he returned again to the grove of Ifa, from which he would set forth, he must again sprinkle his eyes with the water of purification, to restore their natural properties to them, and then offer a living sacrifice to Ifa in gratitude for his assistance.\n\nThe boy followed out his instructions to the letter, and arrived safely in Deadland, where he saw his mother seated near a spring, around which many other dead people were walking slowly or sitting down.\n\nHe approached his mother and called to her, whereupon she rose and came to him, saying, \"What brings thee here my son?\n\nWhy hast thou come to the land of the dead?\" The boy replied, \"The chief has put my brother in log, and will sell him as a slave if the necklace which was given thee to keep is not restored to our neighbour.\n\nIfa the Great, the Unveiler of Futurity, the Governor of Lots, has permitted me to come here to ask thee where it is.\n\nSay, where is it?\" His mother told him that it was hidden in the wall, explaining to him how to find the exact spot, and the boy was so overjoyed that, forgetting the warning of the priest, he tried to embrace her; but she stepped back hastily and avoided him, saying, \"Touch me not my son, or the road to the world will be closed to thee for ever.\n\nGo home and effect thy brother's deliverance, and make frequent offerings to me, for I need them much.\" Then she turned away and went and sat down again by the spring.\n\nThe boy came back to the world, and found himself in the grove of Ifa, where he sprinkled his eyes as directed, and offered sacrifices.\n\nThen he went to the chief and told him what had occurred; so the necklace was found and his brother released.\n\nThe two boys were not neglectful of their mother's last request."

