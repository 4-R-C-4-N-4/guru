[content]
body = "The Ashorin tree is, one which is inhabited by a spirit who, it is believed, would, if its attention were not diverted, drive away anyone who attempted to fell the tree.\n\nThe woodman therefore places a little palm-oil on the ground as a lure, and when the spirit leaves the tree to lick up the delicacy, proceeds to cut down its late abode.\n\nThe Apa , frequently called the African mahogany, is inhabited by an evil spirit, and is commonly seen encircled with palm-leaves, and with an earthen pot at its foot to receive the offerings of woodcutters.\n\nIt is believed to emit a phosphorescent light by night.\n\nThe wood of this tree is in some demand for the construction of drums, which are hollow wooden cylinders covered with hide at one end; but before it can be out down the spirit must be propitiated by an offering, usually consisting of a fowl and some palm-oil.\n\nThe Apa is the emblem of vengeance.\n\nThe Iroko (silk-cotton tree) is also inhabited by a spirit, but it is not very powerful or malicious, and when a man desires to fell such a tree it is sufficient protection for him to invoke the indwelling spirit of his own head by rubbing a little palm-oil on his forehead.\n\nThe Iroko is used chiefly for building, whence probably it comes to be the emblem of refuge.\n\nA proverb, referring to the risks a man runs in cutting down trees inhabited by spirits, says \"The axe that cuts the tree is not afraid, but the woodman covers his head with etu \" (a magic powder).\n\nThese customs may be compared with those of the modern Greeks of Siphinos, one of the Cyclades.\n\nMr.\n\nBent says [1] that when the woodcutters have to cut down a tree they suppose to be inhabited by a spirit (hamadryad), they are exceedingly careful when it falls to prostrate themselves humbly and in silence, lest the spirit should chastise them as it escapes.\n\nCato also [2] instructs a woodcutter that, in order to escape the consequences of thinning a sacred grove, he must sacrifice a hog, and beg permission to thin the grove in order to restrain its overgrowth.\n\nAs is the case among the Ewe tribes of the Slave Coast, wizards and witches are by the Yorubas believed to hold nocturnal meetinus at the foot of trees tenanted by spirits, more especially the Apa , whose indwelling spirit is believed to assist them in their malpractices.\n\nHere, too, the owl again appears, but now, instead of the bird being the messenger or agent of the tree spirit, it is the wizard ( Aje ) himself, who metamorphoses himself into an owl and proceeds on the mission of death."

