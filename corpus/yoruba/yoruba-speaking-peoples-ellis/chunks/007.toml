[content]
body = "The first king of whom the arokbi, or chroniclers, have any knowledge is Ajagbo, who appears to have reigned soon after 1780, and whose name is preserved in the metrical sentence which fixes the rhythm of the ogidigbo drum, as follows: Gbo, Ajagbo, gbo oba gbo, ki emi, ki osi gbo .[1] [1.\n\n\"Grow old, Ajagbo, grow old king, grow old, may I also grow old.\" Each drum has its own measure or rhythm, which is proper to it, and, in order to preserve this rhythm, sentences are invented to call it to mind.\n\nIn this case the rhythm is-- Gbo | Ajegbo | - | gbo | oba gbo | - | ki emi ki osi | gbo.\n\n] In the days of Ajagbo the kingdom of Yoruba consisted of the four following states.\n\n(1) Yoruba proper, whose capital, Old Oyo, or Katunga, was situated some ninety miles to the north of the present town of Oyo.\n\nThe king of this state, whose title was Alafin , or Alawofin , literally \"One who owns the entering of the palace,\" was the ruler over all the Yoruba-speaking tribes.\n\n(2) Egba, which lay to the south and west of the above kingdom.\n\nIts chief town was Ake, and from it the chief took his title of Alake , \"One who owns Ake.\" (3) Ketu.\n\nThis was then, as now, the western province.\n\nIts capital was Ketu, and from it the chief took his title of Alaketu , \"One who owns Ketu.\" (4) Jebu, which lay south and east of Yoruba proper.\n\nIt was divided into Jebu Remu and Jebu Ode, each having its own chief, but the ruler of the latter, called the Awujale , was considered the chief of the whole.\n\nThe rulers of Yoruba, Egba, and Ketu styled each other \"brother.\" Ajagbo was succeeded by Abiodun, who is said to have enjoyed a long and peaceful reign, so that the reign of his brother and successor, Arogangan, can scarcely have commenced before 1800.\n\nIt was during the reign of Arogangan that the Yoruba kingdom commenced to break up.\n\nThe Fulas, it seems, overran the territory of the Hausas, and the latter, driven southward, sought refuge in the northern provinces of Yoruba."

