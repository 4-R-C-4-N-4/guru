[content]
body = "All the gods and goddesses thereupon burst out laughing, and Shankpanna, in revenge, strove to infect them with small-pox, but Obatala came to the rescue, and, seizing his spear, drove Shankpanna away.\n\nFrom that day Shankpanna was forbidden to associate with the other gods, and he became an outcast who has since lived in desolate and uninhabited tracts of country.\n\nTemples dedicated to Shankpanna are always built in the bush, at some little distance from a town or village, with a view to keeping him away from [1.\n\nAkpania , kpa , to kill, and enia , a person.\n\n2.\n\nPerhaps bu , to rot, emit a.stench, and iku , death.] habitations.\n\nHe is much dreaded, and when there is an epidemic of small-pox the priests who serve him are able to impose almost any terms they please upon the terrified people, as the price of their mediation, To whistle by night near one of Shankpanna's haunts is believed to be a certain way of attracting his notice and contracting the disease.\n\nAs is the case with Sapatan, the small-pox god of the Ewe tribes, who have perhaps adopted the notion from the Yorubas, flies and mosquitos are the messengers of Sbankpanna, and his emblem is a stick covered with red and white blotches, symbolic, it seems, of the marks he makes on the bodies of his victims.\n\n(4) SHIGIDI.\n\nShigidi, or Shugudu, is deified nightmare.\n\nThe name appears to mean \"something short and bulky,\" and the god, or demon, is represented by a broad and short head, made of clay, or, more commonly, by a thick, blunted cone of clay, which is ornamented with cowries, and is no doubt emblematic of the head.\n\nShigidi is an evil god, and enables man to gratify his hate in secret and without risk to himself.\n\nWhen a man wishes to revenge himself upon another he, offers a sacrifice to Shigidi, who thereupon proceeds at night to the house of the person indicated and kills him.\n\nHis mode of procedure is to squat upon the breast of his victim and \"press out his breath;\" but it often happens that the tutelary deity of the sufferer comes to the rescue and wakes him, uponwhich Sbigidi leaps off, falls upon the earthen floor, and disappears, for he only has power over man dur ing sleep.\n\nThis superstition still lingers among the negroes of the Bahamas of Yoruba descent, who talk of being \"hagged,\" and believe that nightmare is caused by a demon that crouches upon the breast of the sleeper."

