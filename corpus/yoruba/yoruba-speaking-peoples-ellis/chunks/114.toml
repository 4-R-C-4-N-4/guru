[content]
body = "(Country-cloth, that is, native-made cotton-cloth, is only dyed to disguise its coarseness, and it is here represented as imagining that coloured calico is coloured for the same reason.\n\nThe proverb means that first impressions are often erroneous.) 202.\n\nHe who goes into a river, may fear, but the river does not fear.\n\n203.\n\nNo one confesses that he has eaten yam with a knife that is missing.\n\n204.\n\nA fool of Ika and an idiot of Iluka meet together to make friends.\n\n(\"Birds of a feather flock together.\") 205.\n\nThe palm of the hand deceives no one.\n\n(This answers to our \"A bird in the hand is worth two in the bush.\") 206.\n\nNo matter how well an idol is made, it must have something to stand on.\n\n(Is used like our \"There is no smoke without fire.\") 207.\n\nThough the host may be obliged to eat gbingbindo , the guest expects at least to be given a handful of corn.\n\n(The fruit of the gbingbindo is only eaten in time of famine.\n\nThe proverb is used to check unreasonable demands.) 208.\n\nWhen a fish is killed its tail is put in its mouth.\n\n(Is said of those who reap, the fruit of their own misdeeds.) 209.\n\nThanks are due to the shoulders which keep the shirt from slipping off.\n\n210.\n\nAs one is walking, so is he met.\n\n211.\n\nThe monkey is sure to tear the cloth of anyone who resembles himself.\n\n212.\n\nAn accident is not like a result that is foreseen.\n\n213.\n\nOne lock does not know the wards of another.\n\n214.\n\nIf the stomach is not strong, do not eat cockroaches.\n\n215.\n\nThe pangolin dwelt in a forest, not in a plain.\n\n(This is a mode of saying that a person is bashful.) 216.\n\nIf a man powerful in authority should ill-treat you, smile at him.\n\n217.\n\nHe who claps hands for a fool to dance is no better than the fool.\n\n218.\n\nWhen the agbali is overpowered, there remains only the strength of the arabi to be overcome.\n\n(The agbali and arabi are two insects which, it is popularly believed, are always found in company.) 219.\n\nThe thumb cannot point straight forward.\n\n(Is used when a person has been detected in some deceit.) 220.\n\nTo prostrate oneself and keep the elbows close (to the side) does something for you.\n\n(This resembles our saying about holding a candle to the devil.) 221.\n\nThe trader never acknowledges that he has sold all his goods.\n\nWhen asked, he will only say, \"Trade is a little better.\" 222.\n\nEverything has a price, but who can put a price on blood?\n\n223.\n\nFamine compels one to eat the fruit of all kinds of trees."

