[content]
body = "Everyfifth day they placed fresh offerings on her grave, and kept it always plentifully supplied with fresh water.\n\nIn this story the dead mother evidently did not know what was going on in the world above, for she had to ask her son why he came, yet she was able to reap the advantage of the offerings made on her grave.\n\nOrdinarily, people do not have to undertake the dangerous journey to Deadland in order to consult the dead.\n\nWhen the members of a family wish to know how a departed relative is faring below, they apply to a priest, who takes a young child, bathes his face in water of purification, which, it may be remarked, is prepared with edible snails aud shea-butter, offers a sacrifice in a new earthen vessel, digs a hole in the earth in a sacred grove in the middle of the night, and bids the child look into it.\n\nThrough the magical properties of the lustral water, the child, on looking down into the hole, is able to see into Deadland, and so can tell the priest all that is going on there.\n\nWhen the priest has obtained the information he requires, he again bathes the child's eyes with the water of purification, which causes him instantly to lose all recollection of what he has seen and heard.\n\nThe priest thus remains the sole possessor of the information, and be is able to tell the family that employed him what he pleases.\n\nNext: Chapter VIII: Measurements of Time."

