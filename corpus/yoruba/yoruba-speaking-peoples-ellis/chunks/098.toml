[content]
body = "The marriage-feast is held at the house of the parents of the bridegroom, and the bride is conducted there by a procession of women, who sing an epithalamium.\n\nThe bride is put to bed by a female of the bridegroom's family, who remains concealed in the apartment till the bridegroom has joined the bride; after which she secures the \"tokens of virginity,\" and, coming out of the room, displays them to the assembled company.\n\nShe then carries them to the house of the parents of the bride, who never attend a daughter's wedding-feast, and next morning they are hung on the fence for the edification of the public.\n\nIn this abstention of the bride's parents from the feasting and merrymaking, we perhaps find a lingering survival from marriage by capture.\n\nThe producer of the \"tokens\" is selected from the family of the bridegroom to ensure that there is no deception, because the husband's family has no interest in falsifying the facts, while the wife's family has; but virginity in a bride is only of paramount importance when the girl has been betrothed in childhood.\n\nThe marriage-feast is continued on the next day.\n\nIt is not uncommon for newly-married couples to visit some celebrated shrine and offer sacrifice together, a practice which, together with the fixing of the wedding-day by a babalawo , shows an increasing disposition on the part of the priests to control or interfere with matters which are purely social and quite beyond the domain of religion.\n\nIII.\n\nAT DEATH.\n\nThe ceremonies observed by the Yoruba tribes at death chiefly differ from those of the Ewe tribes in the addition of various religious observances.\n\nWhen the breath has departed from the body there is the usual outburst of exaggerated grief, with loud cries, lamentations, and frenzied gestures, and the eldest son of the deceased, or the brother, if there be no son, at once sends for a babalawo , to ascertain if the deceased died from natural causes, or through the machinations of witches.\n\nThe babalawo , after sacrificing.\n\na fowl, inquires at the oracle of Ifa, by means of the board and sixteen palm-nuts; and if it affirms that the death was caused by witchcraft, further inquiry is made to know if any other member of the family is threatened with a like fate, and also if the soul of the deceased is in danger of further molestation from the evil spirits who have been influenced by the malpractices of the sorcerers.\n\nShould the oracle declare that the soul of the deceased is in danger, a sheep or goat is sacrificed, and the carcass, sprinkled with palm-oil, is carried outside the town, and deposited at a spot where two or more paths meet, which has the effect of causing the evil spirits to disperse in as many directions as there are paths."

