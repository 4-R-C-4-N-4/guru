[content]
body = "(This means that no poor man should stint himself in order to make presents to the rich.) 143.\n\nThe glutton, having eaten his fill, then calls his companions to come also.\n\n144.\n\nIf you are not able to build a house at once, you first build a shed.\n\n145.\n\nIf one has not an adan (a large kind of bat), one sacrifices an ode (small bat).\n\n(Nos.\n\n144 and 145 mean \"Do your best.\") 146.\n\nIf one is carrying water, and it gets spilt, so long as the calabash is not broken one can still get more.\n\n(Is used to encourage those who think a disaster irreparable.) 147.\n\nNo snuff-seller likes to own that she sells bad tobacco, but all profess to sell tobacco as sweet as honey.\n\n(\"No one cries stinking fish.\") 148.\n\nThe esuo (gazelle), claiming relationship with the ekulu (a large antelope), says his mother was the daughter of an ekulu .\n\n149.\n\nIf you abuse the etu , you make the head of the awo ache.\n\n(The etu and the awo are two varieties of guinea-fowl.\n\nThe proverb means that people do not like to hear their relations badly spoken of.) 150.\n\nHe runs away from the sword and hides himself in the scabbard.\n\nThis answers to our \"Out of the frying-pan into the fire,\" as the sword will return to the scabbard.) 151.\n\nThe sword shows no respect for its maker.\n\n152.\n\nThe spoon, seeing death, ventures his head into it.\n\n(That is, into the boiling fluid.\n\nThe proverb is used to check rashness.) 153.\n\nAfter the agbeji has saved men from starving, it is thought only fit to be cut into a common calabash.\n\n(The agbeji is a kind of calabash-gourd, which ripens early in the season, when vegetables are scarce.\n\nWhen over-ripe it is bitter to the taste.\n\nThe saying is used to reprove ingratitude.) 154.\n\nThe agbeji is never bitter in a large family.\n\n(This resembles \"Hunger is the best sauce.\") 155.\n\nLeprosy, desiring to disfigure a man, attacks the tip of his nose.\n\n(Said of one who tells the faults of another in public.) 156.\n\nThe first-born is due to the sheep-owner.\n\n(This answers to \"Give to each one his due.\" It refers to a custom by which, when ewes are put in charge of a shepherd, he receives in payment a certain proportion of the young, after the first-born.) 157.\n\nContraction of words conceals the sense.\n\n(The Yorabas talk habitually with great rapidity, contracting words, and often not giving themselves time to think of the proper word to use."

