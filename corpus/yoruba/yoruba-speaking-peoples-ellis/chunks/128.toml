[content]
body = "The names Tortoise and Spider are in these stories used as the proper names of anthropomorphic personages, and among the Tshi tribes the latter is called Ajya Anansi , \"Father Spider,\" or \"Father Anansi.\" Thus, the Yoruba proverbial saying, Eji Awon ko kon ni li owo , used to convey the meaning that a matter which at first sight appears insignificant may really be one of great importance, should not be translated \"The blood of the tortoise is not a handful\" (literally, does not fill a hand \"), but \"the blood of Awon \" (the mythical personage, or anthropomorphic tortoise) \"is not a handful.\" An epithet of the tortoise is ajapa , \"bald-headed elf,\" or \"hairless elf\" ( aja , elf; pa , to be bald or bare).\n\nThe flickering appearance seen near the ground on sultry days is called \"tortoise-fire,\" and is believed to be caused by a subterranean fire made by the tortoise to destroy the roots of trees.\n\nThe tortoise appears in several proverbial sayings, as \"The tortoise (or Awon ) is always the subject of an alo \" (tale), and \"The house of the tortoise is not large enough for itself.\n\nThe verandah\" (that is, that part of the shell which projects over the tail) \"of a tortoise will not accommodate a guest.\n\nThe tortoise, having built its house, makes the verandah behind it;\" while \"As the tortoise meets with due regard, so also should the snail,\" seems to indicate that the tortoise is regarded with reverence or respect.\n\nIt is possible that totemism lies at the root of these phenomena.\n\nOn the Gold Coast there is a tradition that all mankind are descended from Anansi , and on the Slave Coast the figure of the tortoise is frequently seen carved on the doors of temples, together with the leopard, serpent, and a fish.\n\nOn the whole, however, it seems more probable that the peculiarities which make the spider and the tortoise each in its own way remarkable, have led to their selection for the chief role in the popular fables.\n\nThe tales being largely about animals, those creatures which most excited wonder and speculation in the minds of the natives would be the ones to which the most wonderful attributes would be ascribed; and, in the case, of the spider, the ingenuity and patience displayed by it in the construction of its web would be attributed to the anthropomorphic spider of the stories."

