body = "The other animals were there, looking on, and Tortoise called out to them, \"Did I not say I would ride my father's slave to town?\" When the elephant found that he could not catch the bald-headed elf, he ran away at full speed back to the forest.\n\nWhen he reached there he said to the other elephants, \"Do you know what that broken-back [1] has done to me?\" And he told them the story.\n\nThe other elephants said, \"You were a fool to carry that broken-back to town.\" Since then the elephant has not come to town any more.\n\n[1.\n\nAn epithet of the tortoise.\n\nIt probably refers to the notched appearance of the back.] IV.\n\nMy alo is about a woman named Adun.\n\nAdun was very beautiful, and all the men wanted her.\n\nThey were always entreating her, but she always refused.\n\nOne market-day a person borrowed legs from one, arms from another, and a body from a third.\n\nHe joined all together, and went to the market.\n\nHe wanted Adun, and he would have her.\n\nHis appearance pleased Adun, and they talked together.\n\nAlthough he belonged to a distant country, she consented to go with him.\n\nShe took him to the house and showed him to her mothers.[1] Her mothers said, \"Very well, go with him.\" They went.\n\nOn the road, the master of the legs took away the legs, the master of the arms took away the arms, and the master of the body took away the body.\n\nNothing was left but the head.\n\nAnd the head went on, on, while Adun, nearly dead with fear, could not run away.\n\nThey arrived at the house of the head.\n\nNext morning, before he went to work in his plantation, the head said to Tortoise, \"If Adun tries to run away, sound the horn to warn me.\" The head had scarcely gone out of sight when Adun took her bundle, and began to run away.\n\nThen Tortoise sounded the horn.\n\n\"Head, head,\" he cried, \"Adun is going.\n\nShe has tied up her calabaslies, she has gathered her dishes.\" The head ran up and made big round eyes.\n\n\"Where are you going?\" he asked.\n\n\"I am going to relieve nature,\"[2] said Adun.\n\n\"You are running away,\" said the head.\n\nEvery day Adun tried to run away, but without success.\n\nThen she went to ask the babalawo what she should do.\n\nThe babalawo said, \"Go and buy some ekurus .[3] Buy plenty of them.\n\nSoak them in palm-oil, and [1.\n\nThe wives in the household.\n\n2.\n\nThe ordinary excuse of a native who has no pretext ready.\n\n3.\n\nEkuru is a cake made of the flour of a white bean called ere ."

