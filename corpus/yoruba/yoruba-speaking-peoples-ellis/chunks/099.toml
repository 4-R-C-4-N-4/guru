[content]
body = "The babalawo then prepares the usual water of purification with shea-butter and edible snails, and dipping into the vessel a palm-branch, sacred to Ifa, sprinkles the corpse, the room, and the spectators with the fluid.\n\nAt the same time he invokes the soul of the deceased to leave the house as soon as the funeral rites have been performed, and proceed peacefully to its destination, wishing it a safe journey.\n\nHe says, \"May the road be open to you.\n\nMay nothing evil meet you on the way.\n\nMay you find the road good when you go in peace.\" After these preliminaries, the corpse is washedwith rum, or a decoction of aromatic herbs, and attired in its best clothes.\n\nThe thumbs and the great toes are then tied tocether.\n\nIf the deceased be a man the head is shaved, and the hair, carefully wrapped up in a piece of -white cotton, is buried in the earth behind the house.\n\nIf a woman, the exposed parts of the body are stained with a decoction of the bark of a tree, which gives a reddish hue to the skin.\n\nFinally, the corpse is wrapped up in many native cloths, and placed on a mat at the door of the room.\n\nIn the meantime a death-feast has been prepared, and now commences, while outside the house a continual beating of drunis is kept up, together with frequent discharges of musketry, fired in honour of the deceased.\n\nThe feast, at which intoxicants are used lavishly, soon becomes a veritable orgie, in which, however, the chief mourners, that is, the widows and daughters of the deceased, take no part; for as soon as they have performed the last offices for the dead, and have placed the corpse at the door, they are shut up in an adjacent apartment, where they are compelled by custom to remain during, the three days that a corpse invariably lies in state.\n\nWhile thus immured they are forbidden to wash, and usage requires them to refuse all food, at least for the first twenty-four hours, after which they usually allow themselves to be persuaded to take some nourishment.\n\nThe conventional mourning is the business of the women of the household, who, while the men are feasting utter loud lamentations in the room in which they are confined; and, in consequence of this, the epithet isokun , \"a mourner,\" is often applied to a female child; a male, on the other hand, being sometimes called iwale , \"a digger,\" i.e., of a grave.\n\nA father might thus say that he had begotten two mourners and a digger, meanin, two daughters and a son."

