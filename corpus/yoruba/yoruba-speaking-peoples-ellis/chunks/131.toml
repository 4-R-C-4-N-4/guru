[content]
body = "He cried, as loud as he could, \"Why, when you were eating, did you not give something to eat to the drum?\n\nWhy, when you were drinking, did not you give some of the rum to the drum?\" Tortoise went home.\n\nHe took off the drum-head, and found a crow in the drum.\n\nII.\n\nMy alo is something about a certain king.\n\nThe king had a daughter who was dumb.\n\nThe girl's name was Bola.\n\nThe king did all he could to make his daughter speak.\n\nAll that he did was of no avail, so he did not keep the girl in the town; he sent her into the country.\n\nTortoise, of the thousand cunning tricks, came to the king and said to him, \"What will you give me if I make your child speak.?\" \"I will divide my house into two halves,\" said the king, \"and I will give you one half.\" The bald-headed elf went and bought a bottle of honey, and came to the bush, where the girl was living.\n\nHe put the honey on the ground and went and hid himself.\n\nThe girl came and saw the bottle of honey and put out her hand to it.\n\nTortoise cameout of his hiding-place, came behind the girl, and gave her a slap, crying, \"Thief!\n\nSo it is you who steal my honey and eat it.\" \"I?\" said the young girl.\n\nI have stolen your honey to eat?\n\nI?\" Then Tortoise, the crafty, tied her with a rope, and sang:-- \"Bola stole honey to eat; Kayin, Kayin.* Bola is a cunning cheat; Kayin, Kayin.\n\nBola is a shameless thief; Kayin, Kayin.\n\n\" When Tortoise sung this, the young girl sang:-- \"Into the wood of the elephant I went with the elephant; Kayin, Kayin.\n\nInto the wood of the buffalo I went with the buffalo; Kayin, Kayin.\n\nAnd Tortoise has come to accuse me of stealing honey to eat Kayin, Kayin.\" Tortoise, the mischievous, led the young girl back to [1.\n\nKayin ( ka-iyin ), to celebrate, or sing the praises of.] the town.\n\nHe was singing his song, and she was answering with her song.\n\nIn this manner they arrived before the king), who cried out with astonishment, \"My daughter, who has never been heard to speak, speaks to-day!\" The king divided his palace in half, and gave one half to Tortoise, the bald-headed elf.\n\nThat is how Tortoise succeeds in everything.\n\nIII.\n\nMy alo is about Tortoise and the elephant."

