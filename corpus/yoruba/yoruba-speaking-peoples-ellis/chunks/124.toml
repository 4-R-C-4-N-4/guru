body = "Here is a rope of tie-tie, igbo ; Quickly let my child down, igbo .\" Then the aranran took up the bones of the child and throw thein down -at her.\n\nThe iyale ran and looked at the bones of the child, and she cried out, \"This is not my child.\n\nIt is the child of another woman that this bird has killed, believing it to be mine.\" And she went away.\n\nWhen she reached home, the mother of the child came to the iyale for her little one.\n\nAnd the iyale said that the child was quite well, but was not with her.\n\nMany times the mother came to ask for her child, and when three months had passed and the child had not been restored to her, she carried the case before the king.\n\nShe told the king all that had taken place, that the iyale had taken the child from her hands, and, though three months had passed, had not yet brought it back.\n\nThe king summoned the iyale to his court, and asked her, \"What have you done with the child?\n\nWhere is it?\" And the iyale answered, \"What do you suppose I should do with it?\n\n\" Then the king said to the people who were assembled, \"If this woman belonged to you, what would you do with her?\" And all the people replied, \"If she belonged to us we would put her to death.\" And the king said, \"Let her then be put to death.\" And so the iylale was killed.\n\nIII.\n\nWhy the ajao remained unburied.\n\nMy alo is of the ajao .[1] [1.\n\nAjao, a kind of flying-fox, or large bat.] The ajao lay in his house very sick, and there was no one to tend him.\n\nThe ajao died.\n\nThe neighbours said, \"The ajao is dead; we must call his relatives to come, and perform the funeral ceremonies, and bury him.\" And they went and called the birds, saying \"Your relation is dead.\" The birds came, and when they saw that the deceased was an ajao , they said, \"This is not one of our family.\n\nAll our family wear feathers, and you see the ajao has none.\n\nHe does not belong to us.\" And they went away.\n\nThe neighbours consulted together.\n\nThey said, \"The birds are right.\n\nThe ajao has no feathers, and is not of the family of birds.\n\nHe must be of the family of rats.\" And they went and called the rats, saying, \"Your relation is dead.\" The rats came, but when they saw that the deceased was an ajao they also denied him.\n\nThey said, \"This is not one of our family.\n\nEveryone who is of our family has a tail, and you see the ajao has none.\" And they went away."

