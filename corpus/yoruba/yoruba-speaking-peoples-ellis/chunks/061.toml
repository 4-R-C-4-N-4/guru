[content]
body = "It seems probable that the society was originally intended for the initiation to manhood of youths who had arrived at puberty, like the Boguera of the Beebuanas, the Niamwali of the Manganja, and the ceremony of the Mpongwe, described by Mr.\n\nWinwood Reade,[1] and that its civil and judicial functions are later usurpations.\n\nIf this were so, it would to some extent be connected with phallic worship, and phallic emblems are very commonly seen carved on the doors of Ogboni lodges.\n\nThe name Ogboni is probably derived from Ogba, \"Companion.\" The Alafin of Yoruba is the chief of all the Ogboni, and he thus is able to exert influence beyond the limits of his own kingdom.\n\nIn most states the chief of the Ogboni is the head of the priesthood, and is styled Ekeji Orisha , \"Next to the Gods.\" He convokes councils of priests on extraordinary occasions, and decides disputed points.\n\nIn Jebu every man of rank is an Oshogbo, but in lbadan, as has been said, the Ogboni seem chiefly to exercise the functions of executioners.\n\nCriminals are delivered to them for execution and are put to death secretly in the Ogboni lodge.\n\nThe heads are afterwards fixed to a tree in the market-place, but the bodies are never seen again, and the relatives are thus unable to give them the rites of sepulture, which is considered a great disgrace.\n\nThe Yoruba priesthood ( Olorisha , priest) is divided into three orders, each of which is further subdivided into ranks or classes.\n\nThe first order comprises three ranks, viz.\n\n(1) the Babalawo , or priests of Ifa; (2) priests who practise medicine, and who serve Osanhin and Aroni, gods of medicine; (3) priests of Obatala and Odudua.\n\nWhite [1.\n\n\"Savage Africa,\" p.\n\n246.] is the distinguishing colour of this order, and all priests belonging to it invariably wear white cloths.\n\nThe Babalawo wear armlets made of palm-fibre, and carry a cow-tail ( iruke ), while priests of Obatala are distinguished by necklaces of white beads.\n\nThere are two high priests of this order, one of whom resides at Ife and the other at Ika, some distance to the north.\n\nThe second order comprises (1) the Oni-Shango, or priests of Shango; and (2) priests of all other gods not before mentioned, except Orisha Oko.\n\nRed and white are the distinguishing colours of this order, and all members of it shave the crown of the head."

