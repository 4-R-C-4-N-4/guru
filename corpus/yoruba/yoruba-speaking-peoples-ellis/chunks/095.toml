[content]
body = "[4] In all the later works, written after contact with the Babylonians, we find frequent mention of Sabbaths, but nearly always in connection with new moons, and the day of the new moon was itself observed as a day of rest, or Sabbath.[5] That the Jewish Sabbath should come to be called the seventh day, though originally the day of the new moon, and consequently the first day of the limar month, can be readily understood.\n\nWhen a holy day recurs every seventh day, the day on which it is held is naturally called the seventh day.\n\nThus the day of the Yoruba Sabbath, which recurs every fifth day, is called the fifth day of the week, though the meaning of the name ako-ojo is first day.\n\nThat, on a day dedicated to a god, no manner of work should be done by the followers of that god, seems to be a custom of universal application.\n\nAbstention from work was doubtless considered a mode [1.\n\nJoshua vi.\n\n13-16.\n\nt 2.\n\nI.\n\nKings viii.\n\n65.\n\n3.\n\nExodus xvi.\n\n29.\n\n4.\n\nSamuel xx.\n\n5, 18, 24, 26.\n\n5.\n\nEzekiel xlvi.\n\n1; Amos viii.\n\n5.\n\nSee also Nehemiah x.\n\n23; Isaiah i.\n\n13; 1xvi, 23; Ezekiel x1v.\n\n17; Hosea ii.\n\n11.] of showing respect for the god, and Since a want of respect for a god would be commonly believed to be followed by some punishment inflicted by him, the proposition that it is unlucky to do work on a holy day naturally becomes accepted.\n\nThus the Yorubas consider it unlucky for anyone to work on the alo-ojo , or general Sabbath, and for the followers of the gods to whom the other days are dedicated to work on those days.\n\nFor a follower of a god to violate the day sacred to that god is as serious offence among the Tshi, GÃ£, Ewe, and Yoruba tribes, as to break the Sabbath was among the Jews; and, as with the Jews, is punished with death, the notion being that if the honour of the god is not vindicated by his followers, they will stiffer for the neglect.\n\nThe Sabbath-breaker is, in fact, killed by the other worshippers of the god from motives of self -protection.\n\nOn the Gold Coast any fisherman who dared to put to sea on Bua-da , the fisherman's Sabbath, would inevitably, in the old days, have been put to death.\n\nPersons who were not fisherinen, and who consequently were not followers of the gods of the sea, might do as they pleased; for in that spirit of toleration which always accompanies polytheism, they were held to be only accountable to their own gods."

