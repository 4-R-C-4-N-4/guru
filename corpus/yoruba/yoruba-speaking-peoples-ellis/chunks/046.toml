body = "Sacred Texts Â Africa Â Index Â Previous Â Next Â CHAPTER III.\n\nMINOR GODS.\n\n(1) OLOKUN.\n\nO LOKUN ( oni-okun , he who owns the sea), \"Lord of the Sea,\" is the sea-god of the Yorubas.\n\nHe is one of those who came from the body of Yemaja.\n\nAs man worships that from which he has most to fear, or from which he hopes to receive the greatest benefits, the inland tribes pay little or no attention to Olokun, who is, however, the chief god of fishermen and of all others whose avocations take them upon the sea.\n\nWhen Olokun is angry he causes the sea to be rough and stirs up a raging surf upon the shore; and it is he who drowns men, upsets boats or canoes, and causes shipwrecks.\n\nOlokun is not the personally divine sea but an anthropomorphic conception.\n\nHe is of human shape and black in colour, but with long flowing hair, and resides in a vast palace under the sea, where he is served by a number of sea-spirits, some of whom are human in shape, while others partake more or less of the nature of fish.\n\nOn ordinary occasions animals are sacrificed to Olokun, but when the condition of the surf prevents canoes from putting to sea for many days at a time, a human victim is offered to appease him.\n\nIt is said that such sacrifices have been made in recent times, even at Lagos, by the people of the Isaleko quarter, who are chiefly worshippers of Olokun.\n\nThe sacrifice was of course secret, and according to native report the canoemen used to watch by night till they caught some solitary wayfarer, whom they gagged and conveyed across the lagoon to the sea-shore, where they struck off his head and threw the body into the surf.\n\nA myth says that Olokun, becoming enraged with mankind on account of their neglect of him, endeavoured to destroy them by overflowing the land; and had drowned large numbers when Obatala interfered to save the remainder, and forced Olokun back to his palace, where he bound him with seven iron chains till he promised to abandon his design.\n\nThis, perhaps, has reference to some former encroachment of the sea upon the low-lying sandy shores, which are even now liable to be submerged at spring-tides.[1] Olokun has a wife named Olokun-su, or Elusu, who lives in the harbour bar at Lagos.\n\nShe is white in colour and human in shape, but is covered with fish-scales from below the breasts to the hips.\n\nThe fish in the waters of the bar are sacred to her, and should anyone catch them, she takes vengeance by upsetting canoes and drowning the occupants."

