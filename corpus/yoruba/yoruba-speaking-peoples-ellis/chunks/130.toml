[content]
body = "He beat the drum with the stick, and the drum sounded, saying:-- Sigo is the son of Olu;[1] Ah!\n\nlet me be rescued.\n\nHis mother gave him a sheep, and told him to go and hunt; Ah!\n\nlet me be rescued.\n\nHis father gave him a horse, and told him to go and hunt; Ah!\n\nlet me be rescued.\n\n[1.\n\nThere is perhaps some pun in this.\n\nOlu means a clapper, or anything to strike with, and ilu means a drum.] Listen to what I say.\n\nHe went to the elephant's haunt; Ah!\n\nlet me be rescued.\n\nListen to what I say.\n\nHe went to the buffalo's lair; Ah!\n\nlet me be rescued.\n\nThe flood of the rain wasbed him into the cleft; Ah!\n\nlet me be rescued.\n\nAnd so he became the Tortoise's slave; Ah!\n\nlet me be rescued.\n\nThe people were much astonished, and clapped their hands to their mouths in wonder.\n\nThe king told Tortoise to beat the drum again, and let him hear once more.\n\nTortoise beat his drum a second time, and the people cried out aloud at the marvel.\n\nThen Tortoise returned home.\n\nBefore long the mistresses of the house to which Sigo belonged came to Tortoise, and asked him to come and beat his drum at a dance they were about to have.\n\nThe bald-headed elf said \"Very good.\" He took his drum and he went there.\n\nWhen he arrived the wives made ready some gruel of Indian corn,[1] and bought some rum.\n\nThey asked Tortoise to beat his drum.\n\nTortoise beat his drum, and the drum sang:-- \"Sigo, is the son of Olu; Ah!\n\nlet me be rescued.\n\nHis mother gave him a sheep, and told him to go and hunt; Ah!\n\nlet me be rescued.\n\nHis father gave him a horse, and told him to go and hunt; Ah!\n\nlet me be rescued.\n\nListen to what I say.\n\nHe went to the elephant's haunt; Ah!\n\nlet me be rescued.\n\nListen to what I say.\n\nHe went to the buffalo's lair; Ah!\n\nlet me be rescued.\n\nThe flood of the rain washed him into the cleft; Ah!\n\nlet me be rescued.\n\nAnd so he became the Tortoise's slave; Ah!\n\nlet me be rescued.\n\n[1.\n\nOka.] They gave Tortoise to eat.\n\nTortoise ate.\n\nThey gave him rum to drink.\n\nHe drank, and, becoming drunk, fell asleep.\n\nWhen Tortoise was asleep they took his drum.\n\nThey took off the drum-head, and took Sigo out.\n\nThen they put the head back as it was before.\n\nWhen he awoke, Tortoise took his drum and began beating on it.\n\nA crow croaked in the drum.\n\nTortoise beat harder and quicker, and the crow croaked louder and louder."

