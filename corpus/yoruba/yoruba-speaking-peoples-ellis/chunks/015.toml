[content]
body = "In 1880, the French Roman Catholic missionaries obtained leave to establish a mission in Abeokuta, which thenceforward fell more under the influence of the French.\n\nThe interior continued to be disturbed by inter-tribal wars until about, 1870, when affairs calmed down, but in 1877 the Egbas plundered some Ibadan traders, and the Ibadans sent an army to avenge the outrage.\n\nUpon this the Jebus renewed their former alliance with the Egbas, and Ijesa and the Ekiti tribes, which had now been under the rule of lbadan since 1858, seized the opportunity for rebellion, a step which was soon followed by a declaration of war against Ibadan by Ilorin.\n\nThe Mohammedans of Ilorin rapidly invaded the country and laid siege to Ofa, a town situated some twenty miles to the northeast of the city of Ibadan, and the Ibadans were obliged to withdraw their army of invasion from Egba in order to defend their own territory, which was now threatened from three sides.\n\nThe Egbas, however, did not follow up the retreating force, and, indeed, took no further part in the war, they being held in check by the fear of leaving Abeokuta unprotected against Dahomi, which power had been in the habit of making annual demonstrations in its vicinity for some years past; and the struggle was continued between Ibadan, on the one side, and Ilorin, Ijesa, the Ekiti tribes, and Jebu, on the other.\n\nIbadan secured the support of Modakeke and Ife, two populous towns situated on hills on the opposite sides of a small stream, to the south-west of Ijesa, and the war continued for some years without any great advantage being gained by either side.\n\nThe Modakekes were staunch allies of the Ibadans, but the sympathies of the Ifes were rather with the Ijesa and the Ekiti tribes, with whom they had been in alliance during the war which terminated in 1858.\n\nTheir situation, however, made them afraid of coming to an open rupture with Ibadin, so, in response to the demand of the Ibadans, they sent a contingent to the Ibadan camp, but at the same time also secretly sent an equal force to the camp of the Ijesas and Ekitis.\n\nThis double game could not long escape detection, and in 1882 the Modakekes, assisted by a force of lbadans, attacked Ife, and the town, which was regarded as holy, and the cradle of the Yoruba race, was destroyed."

