[content]
body = "As is the case in the western half of the Slave Coast, erotic dreams are attributed to Elegba, who, either as a female or male, consorts sexually with men and women during their sleep, and so fulfils in his own person the functions of the incubi and succubi of mediaeval Europe.\n\n(8) OGUN.\n\nOgun is the god of iron and of war, and, like Shango, is also a patron of hunters.\n\nIron is sacred to him, and when swearing by Ogun it is usual to touch an iron implement with the Ilorgue.\n\nThe name Ogun seems to mean \"One who pierces\" ( gun , to pierce, or thrust with something pointed).\n\nHe is specially worshipped by blacksmiths, and by those who make use of iron weapons or tools.\n\nAny piece of iron can be used as a symbol of Ogun, and the ground is sacred to him because iron ore is found in it.\n\nHe is one of those who sprang from the body of Yemaja.\n\nThe usual sacrifice offered to Ogun is a dog, together with fowls, palm oil, and minor articles of food.\n\nA proverb says, \"An old dog must be sacrificed to Ogun,\" meaning that Ogun claims the best; and a dog's head, emblematic of this sacrifice, is always to be seen fastened up in some conspicuous part of the workshops of blacksmiths.\n\nOn very important occasions, however, a human victim is offered, and, as in the case of a sacrifice to Elegba, the entrails are exposed before the image and the body suspended from a tree.\n\nThe victim is slain by having his head struck off upon the stool of Ogun, over which the blood is made to gush.\n\nThe reason of this is that the blood is believed to contain the vital principle, and therefore to be an offering, particularly acceptable to the gods.\n\nThis belief appears to be common to most barbarons peoples; the Israelites held it,[1] and blood was considered to be so peculiarly the portion of their national god, that the blood of all animals slain, whether for sacrifice or food, had to be presented as an offering, no one being allowed to eat it under pain of death.[2] When war has been decided upon, a slave is purchased at the expense of the town, or tribe, and offered as a sacrifice to Ogun, to ensure success.\n\nThe day before that on which he is to be immolated, the victim is led with great ceremony through the principal thoroughfares, and paraded in the market, where he is allowed to say or do anything he pleases (short of escaping his impending fate), may gratify his [1.\n\nGenesis ix.\n\n4; Leviticus xvii.\n\n11, 14.\n\n2.\n\nLeviticus xvii.\n\n3,4; iii.\n\n16,17; vii."

