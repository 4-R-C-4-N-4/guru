[content]
body = "In his rage he tore up the trees by their roots, as he ran along, tossing them here and there.\n\nOya, looking out from her sister's house, saw him coming along the banks of the lagoon, and, knowing that Olosa could not protect her, ran out again, and fled along the shores towards the place where the Sun goes down.\n\nAs she was running, and Shango coming behind, roaring and yelling, she saw a house near at hand, and, rushing into it, claimed protection of a man whom she found there, whose name was Huisi.\n\nShe begged Huisi to defend her.\n\nHuisi asked what he, a man, could do against Shango; but Oya gave him to eat of the \"medicines\" she had stolen from her husband, and he, being thus made an orisha , promised to protect her.\n\nAs Shango approached, Huisi ran from his house down to the banks of the lagoon, and tearing up a large tree by the roots, brandished it in the air, and defied Shango.\n\nThere being no other tree there, Shango seized Huisi's canoe, shook it like a club, and the two weapons, striking together, were shattered to pieces.\n\nThen the two oiishas wrestled together.\n\nFlames burst from their mouths, and their feet tore great fissures in the earth as they dragged each other to and fro.\n\nThis struggle lasted a long time without either being able to gain the mastery, and at last Shango, filled with fury at being baffled, and feeling his strength failing, stamped on the earth, which opened under him, and he descended into it, dragging Huisi down with him.\n\nAt the commencement of the combat, Oya had fled to Lokoro;[1] she remained there, and the people built a temple in her honour.\n\nHuisi, who had become a god by virtue of the \"medicine\" he had eaten, also had a temple erected in his honour, on the spot where he had fought with Shango.\n\nIn this myth Oya steals the medicine and gives it to Huisi; in the former one she also stole it, but ate it herself.\n\nIn each case it caused flames to burst from the mouth.\n\n(6) IFA.\n\nIfa, god of divination, who is usually termed the God of Palm Nuts, because sixteen palm-nuts are used in the process of divination, comes after Shango in order of eminence.\n\nThe name Ifa apparently means something scraped or wiped off: he has the title of Gbangba (explanation, demonstration, proof).\n\nIfa's secondary attribute is to cause fecundity: he presides at births, and women pray to him to be made fruitful; while on this account offerings are always made to him before marriage, it being considered a disgrace not to bear children."

