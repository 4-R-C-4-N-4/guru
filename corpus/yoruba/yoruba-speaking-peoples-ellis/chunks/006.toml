[content]
body = "The reason of our having such meagre information of this great West African kingdom is that the Yorubas did not inhabit the territories on the sea-coast, the Ewe tribes occupying the coast-line as far east as Badagry, and the Benin tribes the portion from Badagry to Benin.\n\nThe Ewe tribes had in fact spread along the sea-shore from west to east, and the Benin tribes from east to west, till they met, and covered all the sea frontage of the inland territory occupied by the Yorubas.\n\nThis neglect on the part of the Yorubas to push down to the sea may have been partly due to superstition, for Dalzel says that \"the fetiche of the Eyeos was the sea,\" and that they and their king were threatened with death by their priests if they ever dared to look upon it.\n\nSlave traders and others, who frequented the Slave Coast during the last century, were thus not brought into contact with the Yorubas, and consequently we hear but little of them; while the literature concerning Ashanti and Dahomi, which, like Yoruba, were originally inland powers, but whose invasions of the coast kingdoms brought them into contact with Europeans, is ample.\n\nAs far as can be ascertained, the chief strength of Yoruba lay in its cavalry, which was said to number [1.\n\nThis custom remained in force until quite recent times, if, indeed, it is yet altogether extinct.] 100,000, a manifest exaggeration, for horses have never been numerous in the few districts of West Africa in which it is possible for them to live.\n\nThe report as to the number of cavalry reached the traders through the coast tribe, who owned no horses, and who were no doubt greatly impressed by the spectacle of a few score of mounted men.\n\nAccording to tradition, the following was the method of determining the number of men required for a military expedition.\n\nAn ox-hide was pegged down in front of the general's tent, and the horsemen made to ride over it in succession between two spears.\n\nWhen, by this process,.\n\na hole had been worn in the hide, the number of men was thought sufficient for an ordinary campaign.\n\nFor serious operations two ox-hides were used, one placed over the other.\n\nAlthough as we know from Dalzel's History, Oyo, or Yoruba, was a powerful kingdom at least as early as 1724, Yoruba traditional history carries us back no further than the end of the eighteenth century, a fact which shows what little reliance can be placed upon the traditions of nations who are unacquainted with the art of -writing."

