[content]
body = "Q.\n\nA hen that has many chickens.\n\nA.\n\nThe Milky Way.\n\nQ.\n\nI am long and slim, I am engaged in commerce, and yet I never reach the market.\n\nA.\n\nThe canoe (which carries the goods but stops at the landing-place).\n\nNext: Chapter XIV: Folk-Lore Tales."

