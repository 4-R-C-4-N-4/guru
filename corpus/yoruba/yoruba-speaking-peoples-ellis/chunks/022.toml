[content]
body = "This is in a great measure due to the physical characteristics of the country.\n\nThere being but little forest, except in the eastern districts, communication is easy, and the territory is moreover opened up by several rivers.\n\nInstead, then, of being dispersed in a number of inconsiderable hamlets, which are mere specks in a vast and impenetrable forest, the Yorubas have been able to live in towns, each of which is within easy communication of others.\n\nNo doubt their superior social instincts first caused them to congregate in towns, and now many generations of town life has further developed them.\n\nThere is even a certain amount of loyalty in the Yoruba, a quality for which one might look in vain among the Ewe tribes.\n\nWithout saying that the Yorubas are more intelligent, we can safely say that their intellect is more cultivated; the asperities of savage life are softened, the sharper angles are worn down by frequent intercourse with their fellowmen, and at the present day they are certainly the leading people in West Africa.\n\nNext: Chapter II: Chief Gods."

