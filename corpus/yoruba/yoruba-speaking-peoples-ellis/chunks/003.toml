[content]
body = "(6) Ibadan.\n\nIt lies north of Jebu Ode.\n\n(7) Yoruba proper.\n\nThis kingdom, whose capital is Oyo, lies to the north of lbadan and Egglxt, and towards the west its boundary trends southward to within some twenty-five miles of Abeokuta.\n\n(8) Ijesa, capital Ilesa.\n\nThis state is situated to the sbuth-east of Yoruba proper.\n\n(9) Ife, capital of the same name, lies south-west of Ijesa.\n\n(10) Ondo.\n\nThis kingdom, capital Ondo, is situated south-east of Ife.\n\nIn addition there are several small states, or rather independent townships, consisting of a town and a few outlying villages.\n\nThe principal are Egbado, Okeodan, Ado, Awori, and Igbessa, all of which lie south of Egba.\n\nTheir inhabitants are Egbados, or Southern Egbas ( Egba-odo , Egbas of the coast).\n\nThe inhabitants of all these states speak one language, the, Yoruba.\n\nThey are called Nagos by the French, and by the English are named after their political divisions, as Egbas, Ibadans, Jebus, &c.\n\nThe lagoon system, which in the last volume of this series was noted as commencing a short distance to the west of the Volta River, on the Gold Coast, extends along the whole sea-front of the territory occupied by the Yoruba-speaking tribes, and affords a continuous waterway from Porto Novo to Benin.\n\nThe extension of the continent in a southerly direction, which was mentioned in the last volume as typical of the western half of the Slave Coast, and which may doubtless be attributed to the action of the Guinea current in closing with sand the openings to former indentations which existed in the coast-line, is also equally noticeable in this the eastern half of the Slave Coast; and, generally speaking, the country is open, flat, and devoid of stones.\n\nJebu is an excep tion, being thickly forested; but it appears that less territory has been won from the sea south of Jebu, and cast of Lagos generally, than in the districts to the west, between Lagos and Dahomi.\n\nTo the east of Lagos the old coast-line seems to have been almost conterminous with the northern shores of the Kradu and Lekki lagoons, and the water-way which connects them by way of Epi, while to the west it appears to have trended back northwards bevond the lagoons of Oluge and Porto Novo."

