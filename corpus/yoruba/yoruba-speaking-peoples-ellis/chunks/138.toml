[content]
body = "Sacred Texts Â Africa Â Index Â Previous Â CHAPTER XV.\n\nCONCLUSIONS.\n\nIN the preface to the second volume of this series it was said that, in collecting information concerning the religions of the cognate tribes dealt with, my chief purpose was to endeavour to ascertain to what extent different conditions of culture led to the modifications of religious conceptions.\n\nThree groups of tribes have now been considered, the Tshi, the Ewe, and the Yoruba, who represent three stages of progress, the Tshi being in the lowest stage and the Yoruba in the highest.\n\nAs these tribal groups undoubtedly had a common origin, it is reasonable to suppose that the Yoruba tribes were once in the social and mental condition in which the Tshi tribes are now, and that, in fact, in these groups we find the same race in different states of culture.\n\nAssuming then, as we legitimately may, that the religious beliefs of the Ewes are modifications of earlier belief resembling those now held by the Tshis, and that those of the Yorubas are similarly modifications of beliefs like those now held by the Ewes, we here have an opportunity of observing how the evolution of religion may proceed.\n\nAmong the Tshi-speaking tribes we found that everything in nature is believed to be animated-that is to say, everything not inade by human hands has an animating principle, spiritual second-self, or indwelling spirit, possessing powers which may be beneficial or prejudicial to man, according to whether it is propitiated or neglected.\n\nIt seems probable that the belief in all nature being thus animated was an extension of the belief that man possesses a spiritual second-self, or indwelling spirit, which belief is beyond dispute the result of savage speculation concerning dreams.\n\nMan, having decided that he possessed an indwelling spirit, would extend the same possession to animals, then to vegetable life, and finally to inanimate nature, partly because he does not perceive any strict line of demarcation between these, and partly because he as frequently sees the phantoms of such things in his dreams as he does the phantoms of living men.\n\nHe would be led to extend the indwelling-spirit theory to all nature, because it would account for many things that would otherwise be incomprehensible, since uncivilised man believes that every occurrence is the result of design, and that nothing ever happens by accident.\n\nThe theory that a man who is drowned has been drawn down and strangled by the water-spirit, seems to him much more satisfactory than to suppose that the death was the result of chance circumstances.\n\nAll indwelling spirits are, however, not equally revered.\n\nThose of bushes, grasses, stones, &c., are not much regarded, and the most important are those of rivers, lagoons, the sea, mountains, rocks, and shoals."

