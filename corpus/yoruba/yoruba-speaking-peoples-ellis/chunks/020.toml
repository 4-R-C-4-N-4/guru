[content]
body = "In consequence of these breaches of the treaty, the Inspector- General of the Lagos Constabulary was sent to the Awujale to ask for explanations.\n\nHe landed at Itoike, but was not allowed to proceed any further, the Awujale sending to say that he did not wish \"to palaver\" with the Lagos Government.\n\nThe Home Government now authorised the employment of force.\n\nSpecial-service officers were sent out from England, two officers and 155 men of the Gold Coast Constabulary were ordered from Accra, and three officers and ninety-nine men of the 1st Battalion West India Regiment were despatched from Sierra Leone.\n\nThese, with 165 of the Lagos Constabulary, and an lbadan Contingent of 100 men, making a total combatant force of about 500, left Lagos, under the command of Colonel F.C.\n\nScott, C.B., on the 12th of May, and disembarked at Epi without opposition on the day following.\n\nOn the 16th the column advanced from Epi; there was a slight skirmish at Pobo on the same day, another at Kpashida next day, and on the 18th the force encamped at Majoda.\n\nNext morning the Jebus were found in position, ready to defend the passage of the Oshun River, and an action commenced at 7 a.m.\n\nThe fire of the Jebus not only swept the ford, which they had deepened by digging out the bed of the stream, but also the narrow bush-track which led to it, and was exceedingly heavy and well sustained.\n\nIt was reported that they had offered a human sacrifice to the goddess of the river, to enlist her aid against the invaders, and this had so powerful an effect upon the superstitious minds of the constabulary, that for a full hour they could not be induced to enter the stream; and it was not until the West Indians, who had been held in reserve, were ordered up to lead the way across the Oshun, that the enemy's position was carried.\n\nBetween the river and the village of Magbon, which the victors entered shortly after 10 a.m., was found the camp which the Jebus had occupied the previous night.\n\nIt was estimated to have accommodated from 5,000 to 6,000 persons, and as about half the occupants of a native camp are women and non-combatants, the passage of the river was probably disputed by about 3,000 men.\n\nThe Jebu losses were supposed to be severe, but the British force lost only three killed and twenty-four wounded, exclusive of carriers.\n\nOn the 20th of May the advance was resumed soon after daybreak, and, being met by a flag of truce, the force occupied the town of Jebu Ode the same day without resistance."

