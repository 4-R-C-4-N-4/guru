[content]
body = "Then Bola returned to the house with the child, put him down on the mat, said to him, 'Sleep good while I go to the market,' and then went out, and fastened the door as usual.\n\n\"Scarcely had Bola gone, than the father, from his hiding-place, saw the baby stand up, and begin to grow till he became a big boy.\n\nThen he went to the calabashes where the food was kept, and was beginning to eat it, when the father came out from his hiding-place.\n\n\"Immediately the child saw his father he became a little baby again, and lay on the floor crying.\n\nHe was possessed by a spirit.\n\nHis mother came back, and they beat him to drive the spirit out, so that the spirit fled.\" The parallel between this tale and the changeling stories of Northern Europe is close.\n\nIn the latter, as in the Yoruba version, the changeling, while in the presence of its foster-mother and others, affects to be an infant, but throws off his disguise as soon as he imagines himself to be alone.\n\nSee, for instance, the tale called \"The Father of Eighteen Elves,\" in Arnason's collection of Icelandic legends.[1] The only difference-an important one, it is true-is in the genesis of the changeling.\n\nIn Europe it is an elfin child, who is substituted for a stolen human child, but here it is the child himself who is possessed by an evil spirit, just as an Abiku possesses a child, though with different results.\n\nWe also find a superstition which recalls that of the were-wolf, for the hyena ( Kpelekpe ) is often supposed to be a man who assumes that disguise at night, to prey upon sheep and cattle, and, if the opportunity offers, upon human beings.\n\nSuch man-hyenas are believed to be able, by means of certain howls and cries, to compel people to go out to them in the dark forest to be devoured.\n\nA similar belief is found in Abyssinia.[2] The weird \"laugh\" of the hyena, and its nocturnal habits, no doubt account for this superstition, just as similar causes have led to the owl being universally regarded as a bird of ill omen.\n\nA belief in metamorphosis is universal, and is not [1.\n\nLondon, R.\n\nBentley, 1864.\n\n2.\n\nMansfield Parkyns, \"Life in Abyssinia,\" vol.\n\nii.\n\np.\n\n146.] limited to a change to an animal form, since men and women are sometimes transformed into trees, shrubs, rocks, or natural features.\n\nThe shrub buje , whose fruit is used to stain the skin in imitation of tattoo marks, was a Yoruba belle of that name, who was metamorphosed.\n\nHer story will be found among the Tortoise Stories in the chapter on Folklore."

