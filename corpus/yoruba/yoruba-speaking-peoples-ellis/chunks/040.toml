[content]
body = "Orisha-bi, I hold you in grateful remembrance.\" For the consultation of Ifa a whitened board is employed, exactly similar to those used by children in Moslem schools in lieu of slates, about two feet long and eight or nine inches broad, on which are marked sixteen figures.\n\nThese figures are called \"mothers.\" The sixteen palm-nuts are held loosely in the right hand, and thrown through the half-closed fingers into the left hand.\n\nIf one nut remain in the right hand, two marks are made, thus |Â Â |; and if two remain.\n\none mark, |.[1] In this way are formed the sixteen \"mothers,\" one of which is declared by the babalawo to represent the inquirer; and from the order in which the others are produced he deduces certain results.\n\nThe interpretation appears to be in accordance with established rule, but what that rule is is only known to the initiated.\n\nThe following are the \"mothers\": [1.\n\nThis process is repeated eight times, and the marks are made in succession in two columns of four each.] No.\n\n6 is No.\n\n5 inverted; 8 is 7 inverted; 10, 9 inverted; 13, 12 inverted; and 14, 11 inverted.\n\nMeji means \"two,\" or \"a pair,\" and the following appears to be the meaning of the names:--(1) The close pair ( buru , closely).\n\n(2) The removed pair ( Yekuro , to remove).\n\n(3) The street pair ( Ode , a street).\n\n(4) The closed-up pair ( Di , to close up, make dense).\n\n(5) The squatting-dog pair ( losho , to squat like a dog).\n\n(6) The cross-bow pair ( oron , cross-bow).\n\n(7) The striped pair ( abila , striped).\n\n(8) ?Vulture-pair ( akala , vulture).\n\n(9) The pointing pair ( sha , to point).\n\n(10) The pair ending downward ( Ku , to end, da , to upset on the ground).\n\n(11) ?The top-heavy pair ( Dura , to make an effort to recover from a stumble; opin , end, point).\n\n(12) The tattoo-mark pair ( ture , name of certain tattoo-marks).\n\n(13) The edge pair ( leti , on the edge of).\n\n(14) The folded-up pair ( Ka , to fold or coil).\n\n(15) The opened pair ( shi , to open).\n\n(16) The alternate pair ( fo , to pass over, pass by, jump over, skip)."

