[content]
body = "16.) with the following Yoruba aphorisms:-- 1.\n\nOrdinary people are as common as grass, But good people are dearer than the eye.\n\n2.\n\nA matter dealt with gently is sure to prosper, But a matter dealt with violently causes vexation.\n\n3.\n\nFamiliairity induces contempt, But distance secures respect.\n\n4.\n\nThe public assembly belongs to the town, But a select council belongs to the king.\n\n5.\n\nAnger does nobody good, But patience is the father of kindness.\n\nAnger draws arrows from the quiver, But good words draw kola-nuts from the bag.\n\n6.\n\nA fruitful woman is the enemy of the barren, And an industrious man is the foe of the lazy.\n\n7.\n\nBeg for help, and you will meet with refusers; Ask for alms, and you will meet with misers.\n\n8.\n\nA wild boar in the place of a hog would ravage the town, And a slave, made king, would spare nobody.\n\n9.\n\nWhen there are no elders the town is ruined, And when the master dies the house is desolate.\n\n10.\n\nThe absence of powder converts a gun into a stick, And the death of a father causes the dispersion of his children.\n\n11.\n\nThe sharpness of an arrow is not like that of a razor, And the wickedness of a horse is not like that of a man.\n\n12.\n\nA pistol has not a bore like a cannon, And a poor man has not money like a rich.\n\n13.\n\nSorrow is after weeping, And mortification is after trouble.\n\n14.\n\nTo-day is the elder brother of to-morrow, And a heavy dew is the elder brother of rain.\n\n15.\n\nA ram's mane gives him a noble appearance, And a father's honour makes a son proud.\n\n16.\n\nNo one can separate the agbali from the arabi ,[1] And no one can deprive a man of his inheritance, The Yoruba-speaking peoples are fond of composing punning sentences, made up of words having similar sounds but different meanings.\n\nThus:-- (1) Abebi ni ibe iku.\n\nAbebi ni ibe orun.\n\nBi oru ba inu abebi ni ibe e.\n\nAbebi means a fan, an advocate, or an intercessor, and the above is An intercessor (with the gods) wards off death.\n\nAn advocate (with the judge) wards off punishment.\n\nA fan wards off the heat when it is hot.\n\n[1.\n\nSee Proverb 218.] (2) Igun ti ogun mi ko jo i egun .\n\nStabbing is not like pricking me with a thorn.\" The play here is in the resemblance between the words igun , ogun , and egun ."

