body = "When he saw them, Okiki reminded Okinkin the trumpeter that it was his duty to sound the trumpet again, whereupon he sounded it, and Okambi untied the piece of black cloth a second time.\n\nWhen it was opened, earth fell from it, and, drying up the water, made a small mound.\n\nThe fowl that the personage had given Okambi then flew on to the mound and scratched the earth here and there, and wherever the earth fell it dried up the water.\n\nWhen there was a good space covered with earth, Okambi came down from the tree, bringing with him his trumpeter Okinkin and his slave Tetu.[2] The other persons wished to come down also, but Okambi would not [1.\n\nThis number often recurs in Yoruba myths.\n\nThere were sixteen palm-nuts on the two palms in the garden of Orungan, the chief man, which Ifa obtained for the purpose of divination, and sixteen palm trees grew up from the palm-nut that Ifa planted on the rock at Ado.\n\nSixteen persons, viz.\n\nfifteen and Okambi, commence the journey to the south.\n\n2.\n\nThis name is sometimes given as Okiki-shi.\n\nOkiki means rumour, or report, and Okiki-sbi, \"borrowed from report.\" There is an unintelligible GÃ£ proverb, \"Nobody knows who has born Okaikoi,\" which perhaps refers to the same personage.\n\nTetu means \"executioner.\"] allow them to do so until they had promised to pay him, at stipulated periods of time, a tribute of 200 cowries apiece.\n\nThe place where the palm sprung up from the water afterwards became Ife, and, some time after, three brothers set out from there in different directions, to make fresh discoveries.\n\nWhen they went away they left a slave, named Adimu,[1] to rule Ife during their absence.\n\nThis tradition is vague and meagre of detail, the only points brought out being that a certain number of persons migrated southward from the interior, and found a region covered with water.\n\nThis latter detail, however, strongly supports the theory that a real migration took place; for the large stretches of shallow water of the lagoon system, which during the rainy season are enormously extended by the inundation of the low-lying portions of the surrounding country, could scarcely have failed to excite the wonder of a people accustomed to the plateaus and mountain ranges of the interior, and to leave a lasting impression upon their memories.\n\n[1.\n\nAdimu, a tight grasp, hold-fast.] Next: Chapter V: Priests and Worship."

