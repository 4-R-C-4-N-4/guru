[content]
body = "When a plant is concerned the difference is greater; but if, as we hold, the Yoruba tribes passed through a phase of belief similar to that held by the Tshi tribes at the present day, they at one time believed that trees, shrubs, &c., and, in fact, all things not made by human hands, were animated by kras, which may account for the extension of the doctrine of metempsychosis to objects so unlike man.\n\nThe animal in which human souls are most commonly re-born is the hyena, whose half-human laugh may perhaps account for the belief.\n\nHuman souls are also reborn in different kinds of monkeys, but chiefly in the solitary yellow monkey, called oloyo ; and in these cases the human appearance and characteristics of monkeys no doubt furnishes the key to the belief.\n\nAs has been said, the re-birth of a human soul in a plant is rarely spoken of, and usually we can discover the reason for the supposed transmigration, as in the following tale: \"There were two boys, brothers, who knew and sang the popular songs of the country so well, that they were in great demand for festive occasions.\n\n\"One day they were asked to go to a festival at a neighbouring village, and their mother gave them permission.\n\n\"They went to the village, where the people were assembled to play, and they sang their songs and beat their drums so well that the people rewarded them highly.\n\nThey gave to each boy a thousand cowries, and plenty to eat and drink.\n\nThen they dismissed them next morning to return home.\n\n\"On the way back the elder boy, covetous of the thousand cowries that had been given to the younger, led him off the path into the forest, and murdered him.\n\nThen he took the thousand cowries, added them to those which he already had, and returned home.\n\n\"When he came back alone, his mother asked him where was his brother.\n\n'I left him behind on the road,' said the boy.\n\n\"The day passed, and night began to fall, and still the younger brother had not returned home.\n\nThen his mother and her neighbours went to look for the child, but they could not find him.\n\nThey searched for him for many days, but found him not.\n\nThey concluded that someone had carried him off to sell him.\n\n\"Some months afterwards the mother went into the forest to look for leaves for medicine, and she came to the place where the child had been murdered.\n\nThe body of the boy had already decayed, and from his bones had sprung up an olu .[1] The olu was very fine and large, and when the mother saw it she cried, I Oh!"

