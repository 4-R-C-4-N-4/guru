body = "A superstitious and half -frightened crowd follows, listening for any response that may be given to the weird cries of [1.\n\nSee 61 The Tshi-Speaking Peoples of the Gold Coast,\" p.\n\n227.] the Egungun.\n\nA few days later the Egungun, again accompanied by several followers, proceeds to the house in which the death took place, and brings to the relatives news of the deceased, usually that he has arrived in Deadland safely, and is quite well.\n\nIn return for the good news the family set food, rum, and palm-wine in a room of the house, and inviting the Egungun to partake of it, themselves retire, for to see Egungun eating is death.\n\nWhen Egungun and his followers have consumed everything loud groans are heard to issue from the room, and, this being a sign that be is about to depart, the family re-enter and entrust him with messages for the deceased.\n\nA large proportion of the slaves landed at Sierra Leone, at the beginning of the present century, from slave-ships that had been captured by British cruisers, were Yorubas, and their Christian descendants have preserved the practice of Egungun, who may often be seen performing his antics in the streets of Freetown.\n\nThere, however, his disguise is less elaborate than in Yoruba country, and he appears in a long robe of cotton-print, with a piece of cloth, having apertures for the eyes, covering the face and head.\n\nSpectators soon gather round him, and though, if asked, they will tell you that it is only \"play,\" many of them are half-doubtful, and whenever the Egungun makes a rush forward the crowd flees before him to escape his touch.\n\nORO.\n\nThe word Oro means fierceness, tempest, or provocation, and Oro himself appears to be personified executive power.\n\nOro is supposed to haunt the forest in the neighbourhood of towns, and he makes his approach known by a strange, whirring, roaring noise.\n\nAs soon as this is heard, all women must shut themselves up in their houses, and refrain from looking out on pain of death.\n\nThe voice of Oro is produced by whirling round and round a thin strip of wood, some 21/2 inches broad, 12 inches long, and tapering at both ends, which is fastened to a stick by a long string.\n\nIt is, in fact, the instrument known to English boys as the \"bull-roarer,\" and which Mr."

