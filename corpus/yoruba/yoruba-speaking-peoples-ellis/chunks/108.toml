body = "Frogs' spawn does not attract the attention of the robber.\n\n(Frogs' spawn is supposed to resemble a mass of beads.) 88.\n\nThe white ant may well admire the bird, for it loses its wings only after only one day.\n\n89.\n\nGently!\n\ngently!\n\nstill hurts the snail.\n\n90.\n\nA bribe blinds the judge's eyes, for bribes never speak the truth.\n\n91.\n\nA witness speaks the truth; a witness is not a partisan.\n\n92.\n\nIwo is the home of the grey parrot, Ibara the home of the hawk, but where is the home of the green parrot?\n\n(Is used to persons making false pretences.) 93.\n\nBank rises after bank, and ditch follows after ditch.\n\nWhen the rain falls into the ditch the banks are envious.\n\n(Is said of those who are dissatisfied with their station in life.) 94.\n\nThe strength of a mortar (made of wood) is not like the strength of a pot (made of clay).\n\nPlace a mortar on the fire and it will burn; pound a yam in a pot and it will break.\n\n(Means that there is a proper use for everything.) 95.\n\nWhen the monkey jumps from the tree he jumps into the house.\n\n(Inculcates the danger of leaving one's proper station.) 96.\n\nA tick having fixed itself on the mouth of a jackal, a fowl was asked to take it off; but the fowl knew that she was food for the jackal just as the tick was for her.\n\n97.\n\nGossip is unbecoming in an elder.\n\n98.\n\nThree elders cannot all fail to pronounce the word ekulu ; one may say ekÃºlu , another ekulÃº , but tho third will say ekulu .\n\n(Ekulu is the name of antelope.\n\nThe saying means that there is safety in a number of counsellors.) 99.\n\nThe younger should not thrust himself into the seat of the elders.\n\n100.\n\nThe young cannot teach the elders traditions.\n\n101.\n\nAs a calabash receives the sediment of the water, so inust in elder exercise forbearance.\n\n102.\n\nA man does not run among thorns for nothing.\n\nEither he is pursuing a snake or a snake is pursuing him.\n\n103.\n\nAs no subject may keep a herald, so it is not every man who may own a palace.\n\n104.\n\nEveryone in the assembly has a name, but when you are summoned \"in the name of the assembly\" (instead of in the name of some individual in it) evil awaits you.\n\n105.\n\nA near neighbour need not say good-bye till to-morrow.\n\n106.\n\nA thing thrown forward will surely be overtaken, and a thing put in the ground will be there to be dug up; but if nothing has been thrown forward, what shall be overtaken?\n\nand if nothing has been buried, what shall be dug up?"

