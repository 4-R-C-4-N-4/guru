[content]
body = "Other natives, however, say that she came from Ife, the holy city, in common with most of the other gods, as described in a myth which we shall come to shortly.\n\nOdudua represents the earth, married to the anthropomorphic sky-god.\n\nObatala and Odudua, or Heaven and Earth, resemble, say the priests, two large cut-calabashes, which, when once shut, can never be opened.\n\nThis is symbolised in the temples by two whitened saucer-shaped calabashes, placed one covering the other; the upper one of which represents the concave firmament stretching over and meeting the earth, the lower one, at the horizon.\n\nAccording to some priests, Obatala and Odudua represent one androgynous divinity; and they say that an image which is sufficiently common, of a human being with one arm and leg, and a tail terminating in a sphere, symbolises this.\n\nThis notion, however, is not one commonly held, Obutala and Odudua being generally, and almost universally, regarded as two distinct persons.\n\nThe phallus and yoni in juxtaposition are often seen carved on the doors of the temples both of Obatala and Odudua; but this does not seem to have any reference to androgyny, since they are also found similarly depicted in other places which are in no way connected with either of these deities.\n\nAccording to a myth Odudua is blind.\n\nIn the beginning of the world she and her husband Obatala were shut up in darkness in a large, closed calabash, Obatala being in the upper part and Odudua in the lower.\n\nThe myth does not state how they came to be in this situation, but they remained there for many days, cramped, hungry, and uncomfortable.\n\nThen Odudua began complaining, blaming her husband for the confinement; and a violent quarrel ensued, in the course of which, in a frenzy of rage, Obatala tore out her eyes, because she would not bridle her tongue.\n\nIn return she cursed him, saying \"Naught shalt thou eat but snails,\" which is the reason why snails are now offered to Obatala.\n\nAs the myth does not make Odudua recover her sight, she must be supposed to have remained sightless, but no native regards her as being blind.\n\nOdudua is patroness of love, and many stories are told of her adventures and amours.\n\nHer chief temple is in Ado, the principal town of the state of the same name, situated about fifteen miles to the north of Badagry.\n\nThe word Ado means a lewd person of eithersex, and its selection for the name of this town is accounted for by the following legend."

