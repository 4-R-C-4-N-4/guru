[content]
body = "Shango, for example, is said by some to be of independent origin, like Ifa; and Odudua, the mother of Yemaja, according to the myth, is by others included in the number of those who sprang from Yemaja's body.\n\nNo general consensus of opinion has yet been arrived at, but the myth of Yemaja is the only one that holds the field, and no doubt in course of time the gods whose origin is as yet unexplained would also be held to have come from the daugliter of Obatala, and Odudua.\n\nWe find the same want of accord in the myths of the origin of man.\n\nAccording to some, Obatala made the first man and woman out of clay or mud, whence he has obtained his titles of Alamorere and Orisha Kpokpo; while, according to others, the first pair came, with the gods, from the body of Yemaja.\n\nAlthough the first story somewhat resembles the account of the origin of man given in the Book of Genesis, there is no reason for supposing it to be borrowed.\n\nWhen uncivilised man, after speculating about the origin of mankind, has come to the conclusion that there must have been a first pair, and has accounted for that first pair by the theory that they were made by a superior being out of something; the material which he would be most likely to select for their manufacture is clay or mud, because it is with these that he makes his own first rude attempts to model the human form.\n\nTo make a rude imitation of the figure of a man in clay requires far less skill and far less labour than to carve one out of a block of wood, whence it is that most of the images of the gods are made of clay.\n\nClay figures being primordial, and images being ordinarily made of clay even when the arts have somewhat advanced, this would be the substance which the myth-makers would introduce into their myths describing the origin of the first pair, a connection of ideas between clay and the human form already existing.[1] The second story, which cannot be any older than the myth of Yemaja, of which it is a part, is sufficiently precise to give the name of the first couple, that of the man being Obalofun (Lord of Speech), and that of the woman Iya (Mother).\n\nAfter coming out of the goddess at Ife, they settled there, and had a numerous progeny, which increased and multiplied till the whole earth was populated, hence it is that Ife is considered the cradle of the human race.\n\nOf course Obalofun and Iya were Yorubas, for it is a peculiarity of every uucivilised people to believe that the first man and woman were of their race."

