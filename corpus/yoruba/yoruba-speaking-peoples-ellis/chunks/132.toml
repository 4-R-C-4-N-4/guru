[content]
body = "The bald-headed elf one day told the other animals that he would ride the elephant, but all the animals said: \"No, you can't ride the elephant.\" The bald-headed elf said: \"Well, I will make a wager that I will ride the elephant into town.\" And the other animals agreed to the wager.\n\nTortoise went into the forest and met the elephant.\n\nHe said to him: \"My father, all the animals say you are too stout and big to come to town.\" The elephant was vexed.\n\nIle said: \"The animals are fools.\n\nIf I do not come to town it is because I prefer the forest.\n\nBesides, I do not know the way to town.\" \"Oh!\" said the bald-headed elf, \"then come with me.\n\nI will show you the way to the town, and you can put all the animals to shame.\" So the elephant followed him.\n\nWhen they were near the town the bald-headed elf said: \"My father, I am tired.\n\nWill you kindly allow me to get, on your back.\" \"All right,\" said the elephant.\n\nHe knelt down, and Tortoise climbed -up on his back.\n\nThen they went on along the road.\n\nThe bald-headed elf said: \"My father, when I scratch your back you must run, and when I knock my head against your back you must run faster; then you will make a fine display in the town.\" The elephant said: \"Very well.\" When they came near the town, the bald-headed elf scratched the elephant's back, and he began to run.\n\nHe knocked his back with his head, and the elephant ran faster.\n\nThe animals, when they saw this, were frightened.\n\nThey went into their houses, but they looked out of their windows.\n\nAnd Tortoise called out to them: \"Did I not say I would ride my father's slave to town?\" \"What do you mean by 'your father's slave'?\" said the elephant, growing angry.\n\n\"I am only praising you,\" said Tortoise.\n\nBut the elephant saw the other animals laughing, and grew more angry.\n\n\"I will throw you down on the hard stones here, and break you to pieces,\" he cried.\n\n\"Yes, yes, that is right,\" said the bald-headed elf.\n\n\"Throw me down here.\n\nThat will be all right.\n\n'Then I shall not die; then I shall not be hurt.\n\nIf you really want to kill me, you ought to carry me to a swamp.\n\nThere I shall die at once, for the mud and water will drown me.\" The elephant believed the bald-headed elf.\n\nHe ran to the swamp, and threw Tortoise into the mud.\n\nThen he stretched out his foot to kick him, but the bald-headed elf dived in the mire, and came up in another place."

