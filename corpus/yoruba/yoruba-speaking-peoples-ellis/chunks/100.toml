[content]
body = "Female friends usually come to join in the lamentations, the conventional character of which is referred to in the proverb \"A mourner mourns and goes on her way (without afterthought), but one who ponders over sad memories mourns without ceasing.\" There are also professional mourners, chosen for their poetical turn of expression, whose services are engaged in well-to-do households, and who often contrive to work up the real mourners to a condition of frenzied grief.\n\nA professional mourner sings in a sad tone, which rises and falls in -a modulated wail; \"He is gone, the lion of a man.\n\nHe was not a sapling, or a bush, to be torn out of the earth, but a tree-a tree to brave the hurricane; a, spreading tree, under which the hearts of his family could rest in peace,\" &c.\n\n&c.\n\nwhile the widows and daughters lament their lonely and unprotected state, somewhat as follows:-- \"I go to the market; it is crowded.\n\nThere are many people there, but he is not among them.\n\nI wait, but he comes not.\n\nAh me!\n\nI am alone.\n\n\"Never more shall I see him.\n\nIt is over; he is gone.\n\nI shall see him no more.\n\nAh me!\n\nI am alone.\n\n\"I go into the street.\n\nThe people pass, but he is not there.\n\nNight falls, but he comes not.\n\nAh me!\n\nI am alone.\n\n\"Alas!\n\nI am alone.\n\nAlone in the day-alone in the darkness of the night.\n\nAlas!\n\nmy father (or husband) is dead.\n\nWho will take care of me?\" On the afternoon of the third day of the wake the body is placed on some boards, or on a door taken off its hinges, covered with a rich native cloth, and borne at a trot through the streets by the men.\n\nMale friends and relations accompany the bier, singing the praises of the deceased, and throwing handfuls of cowries among the spectators.\n\nThis procession returns to the house towards evening, and the corpse is then interred in a grave that has been dug in the earthen floor, and which is so contrived that the head of the deceased may project beyond the line of the outer wall of the house.\n\nMost of the cloths in which the corpse is wrapped are taken off, and the body, covered with grass mats so that no earth may soil it, is carefully lowered into the grave.\n\nA coffin is sometimes used, but not often."

