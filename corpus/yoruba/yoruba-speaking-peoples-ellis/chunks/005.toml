[content]
body = "Between 1724 and 1725 the King of Yoruba espoused the quarrel of the King of Ardra, whose kingdom had been overthrown by Dahomi, and sent a large army, chiefly consisting of cavalry, to invade Dahomi.\n\nBy a stratagem[1] the Yorubas were routed, and the king [1.\n\nEwe-speaking Peoples,\" p.\n\n285.] of Dahomi then diplomatically sued for peace, which was granted; but about September, 1728, a new quarrel having arisen, this time in the interests of the King of Whydah, a Yoruba army again invaded Dahomi, and a desultory war lasted until 1730, wlien peace was once inore made.\n\nIn 1738 another Yoruba army invaded Dahomi, defeated the king, and captured and burnt Agbomi, Kalia, and Zassa[1] and from that time forward the Yorubas annually raided into Dahomi, ravaging the country, and retiring again at the commeucement of the rains.\n\nThis state of affairs was brought to an end by a treaty of peace inade in 1747, by which the King of Dahomi undertook to pay a heavy annual tribute to the King of Yoruba.\n\nAfter this we hear no more of the Yorubas in Dalzel's History, which is only carried to 1791, except that, in 1786, they interfered to prevent the Dahomis from attacking Porto -Novo; but the tribute appears to have been paid up to the days of King Gezo of Dahomi (1818).\n\nGovernor Dalzel informs us, however, that when the \"Eyeos\"[2] (Yorubas) were dissatisfied with a king, they sent a deputation to him with a present of parrot's eggs, and a message that they considered he must be fatigued with the cares of government, and that it was time for him to rest and take a little sleep.\n\nUpon receiving this inessage, the king forth with retired to his apartment, as if to sleep, and then gave directions to his women to strangle him, [1.\n\nEwe-speaking Peoples,\" p.\n\n294.\n\n2.\n\nThe Yorubas were called Eyeos or Oyos by old writers, after the name of their capital, Oyo.] which they accordingly did.[1] In 1774, the then king declined to take the hint, and returned the parrot's eggs.\n\nThe chiefs tried to support the custom by force, and Ochemi, the prime minister headed a rebellion, which was, however, crushed, and Ochemi, and all his numerous family were put to death."

