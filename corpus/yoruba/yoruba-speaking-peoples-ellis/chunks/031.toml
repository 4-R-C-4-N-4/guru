[content]
body = "The order, according to some, was Olokun, Oloss, Shango, Oye, Oshun, Oba, Ogun, Dada, and the remainder as above.] do not belong to this family group, and whose genesis is not accounted for in any way.\n\nTwo, at least, of the principal gods are in this category, and we therefore leave for the moment the minor deities who sprung from Yemaja, and proceed with the chief gods, irrespective of their origin.\n\n(5) SHANGO.\n\nShango, the god of thunder and lightning, is, next to Obatala, the most powerful god of the Yorubas; he was the second to spring from the body of Yemaja.\n\nHis name appears to be derived from shan , \"to strike violently,\" and go , \"to bewilder;\" and to have reference to peals of thunder, which are supposed to be produced by violent blows.[1] He has the epithet of Jakuta, \"Hurler of stones,\" or \"Fighter with stones\" ( Ja , to hurl from aloft, or ja , to fight, and okuta , stone); and stone implements, which have long ceased to be used in West Africa, are believed to be his thunderbolts.\n\nTo wield the thunderbolt is certainly one of the proper functions of the sky-god, and the process by which he becomes deprived of it is not by any means clear.\n\nIt does not appear to be the result of advancing culture, for the Zeus of the Greeks and the Jupiter of the Romans, who had respectively the epithets Kerauneios and Tonans , retained it; as do the Nyankupon of the Tshis and the Nyonmo of the Gas; while, like the Ewes and Yorubas, the Aryan Hindus [1.\n\nFor the same notion among the Tshis and Gas, see Note at p.\n\n36.] made another god, namely, Indra, offspring of Dyaus, wield the lightning.\n\nThe notion we found amongst the Ewes that a birdlike creature was the animating entity of the thunderstorm has no parallel here, and Shango is purely anthropomorphic.\n\nHe dwells in the clouds in an immense brazen palace, where he maintains a large retinue and keeps a great number of horses; for, besides being the thunder-god, he is also the god of the chase and of pillage.[1] From his palace, Shango hurls upon those who have offended him red-hot chains of iron, which are forged for him by his brother Ogun, god of the river Ogun, of iron and of war; but this, it should be observed, is seemingly a modern notion, and the red-hot chains furnished by Ogun have a suspicious resemblance to the thundefbolts of Jupiter, forged by Vulcan."

