body = "has); ba (to overtake); ni (to have); ase (a coming to pass), \"One who overtakes the coming to pass.\"] some neglect towards him on the part of the parents, or to remind his worshippers of his power.\n\nObatala is also styled \"Protector of the Town Gates,\" and in this capacity is represented as mounted on a horse, and armed with a spear.\n\nOn the panels of the temple doors rude carvings are frequently seen of a horseman with a spear, surrounded by a leopard, tortoise, fish, and serpent.\n\nAnother epithet of Obatala is Obatala gbingbiniki , \"The enormous Obatala.\" His special offerings are edible snails.\n\nAmongst the Ewe-speaking Peoples at Porto Novo, Obatala determines the guilt or innocence of accused persons by means of an oracle termed Onshe or Onishe (messenger, ambassador).\n\nIt consists of a hollow cylinder of wood, about 31/2 feet in length and 2 feet in diameter, one end of which is covered with draperies and the other closed with shells of the edible snail.\n\nThis cylinder is placed on the head of the accused, who kneels on the ground, holding it firmly on his head with a hand at each side.\n\nThe god, being then invoked by the priests, causes the cylinder to rock backwards and forwards, and finally to fall to the ground.\n\nIf it should fall forward the accused is innocent, if backward guilty.\n\nThe priests say that Obatala, or a subordinate spirit to whom he deputes the duty, strikes the accused, so as to make the cylinder fall in the required direction; but sceptics and native Christians say that a child is concealed in the cylinder and overbalances it in front or behind, according to instructions given beforehand by the priests.\n\nThey add that when a child has served for a year or two and grown too big for the cylinder he is put to death, in order that the secret may be preserved; and is succeeded by another, who, in his turn, undergoes the same fate-but all this is mere conjecture.\n\n(3) ODUDUA.\n\nOdudua, or Odua, who has the title of Iya agbe, The mother who receives,\" is the chief goddess of the Yorubas.\n\nThe name means \"Black One\" (dit, to be black; dudit, black), and the negroes consider a smooth, glossy, black skin a great beauty, and far superior to one of the ordinary cigar-colour.\n\nShe is always represented as a woman sitting down, and nursing a child.\n\nOdudua is the wife of Obatala, but she was coeval with Olorun, and not made by him, as was her husband."

