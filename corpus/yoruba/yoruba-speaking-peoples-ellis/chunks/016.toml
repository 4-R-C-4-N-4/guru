[content]
body = "The Ifes now openly joined the enemies of Ibadan, but most of the tribes had by this time become heartily sick of the prolonged struggle, and in 1883 a body of Jebus who were encamped on the Omi River made peace with the lbadans on their own account, and returned home.\n\nThe Awujale of Jebu Ode, paramount chief of the two Jebu provinces, was so alarmed at this event that he fled from the town of Jebu Ode, which he was by law forbidden to leave, and took refuge at Epi.\n\nHere he was invited by the Jebu elders to commit suicide; he proved docile, and a new Awujale was elected by the peace party.\n\nHis election, however, was not approved by the war party, and a strong force of Jebus, under the seriki , or second war chief, still kept the field against Ibadan.\n\nThe war, which was really only a succession of skirmishes at long intervals, dragged on till 1884, when the Governor of Lagos was asked to mediate and secure a peace.\n\nIn 1886 this request was renewed by all the combatants except Ilorin, and the Governor accordingly acted as mediator, with the result that representatives from the different tribes assembled at Lagos, and on June 4th an agreement was signed, of which the following were the chief points: (1) Ibadan, Ijesa, and the Ekiti tribes to respectively retain their independence.\n\n(2) The four Ekiti towns of Otan, Tresi, Ada, and Igbajo to be ceded to Ibadan, on the understanding that the present inhabitants Were at liberty to leave them.\n\n(3) The town of Modakeke to be reconstructed on territory, between the Oshun and Oba rivers, to the north of its then situation; such of the inhabitants as elected to pass under the rule of lbadan moving to the new site, and those who preferred to become subject to Ife living in Ife territory, but not in Modakeke, which was to be dealt with by the Ifes as they thought fit.\n\nThe belligerents were at this time established in six large camps, the chief being those at Kiji and Oke Afesi, situated about a mile apart upon opposite sides of a mountainous valley in the north of Ijesa, the former occupied by the Ibadans and the latter by the Ijesas and Ekiti tribes.\n\nThe lbadalis had another camp at Ikirun, about fifteen miles west of Kiji, between the two arms of the Erinle River, where they confronted the Ilorins, who were encamped at Ofa, eighteen miles to the north."

