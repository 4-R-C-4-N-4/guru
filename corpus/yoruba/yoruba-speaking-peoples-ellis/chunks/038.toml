[content]
body = "To the native mind there is no conflict of function between Ifa and Obatala, for the former causes the woman to become pregnant, while the latter forms the child in the womb, which is supposed to be a different thing altogether.\n\n[1.\n\nNear Porto Novo.] Ifa first appeared on the earth at Ife, but he did not come from the body of Yemaja, and his parentage and origin are unexplained.\n\nHe tried to teach the inhabitants of Ife how to foretell future events, but they would not listen to him, so he left the town and wandered about the world teaching mankind.\n\nAfter roaming about for a long time, and indulging in a variety of amours, Ifa fixed his residence at Ado, where he planted on a rock a palm-nut, from which sixteen palm-trees grew up at once.\n\nIfa has an attendant or companion named Odu (?\n\nOne who emulates), and a messenger called Opele ( ope , puzzle, or ope , palm-tree).\n\nThe bandicoot ( okete ) is sacred to him, because it lives chiefly upon palm-nuts.\n\nThe first day of the Yoruba week is Ifa's holy day, and is called ajo awo , \"day of the secret.\" On this day sacrifices of pigeons, fowls, and goats are made to him, and nobody can perform any business before accomplishing this duty.\n\nOn very important occasions a human victim is immolated.\n\nA priest of Ifa is termed a babalawo ( baba-ni-awo ), \"Father who has the secret,\" and the profession is very lucrative, as the natives never undertake anything of.importance without consulting the god, and always act in accordance with the answer returned.\n\nHence a proverb says, \"The priest who is more shrewd than another adopts the worship of Ifa.\" As Ifa knows all futurity, and reveals coming events to his faithful followers, he is considered the god of wisdom, and the benefactor of mankind.\n\nHe also instructs man how to secure the goodwill of the other gods, and conveys to him their wishes, His priests pluck all the hair from their bodies and shave their heads, and always appear attired in white cloths.\n\nThe general belief is that Ifa possessed the faculty of divination from the beginning, but there is a myth which makes him acquire the art from the phallic god Elegba.\n\nIn the early days of the world, says the myth, there were but few people on the earth, and the gods found themselves stinted in the matter of sacrifices to such an extent that, not obtaining enough to eat from the offerings made by their followers,[1] they were obliged to have recourse to various pursuits in order to obtain food."

