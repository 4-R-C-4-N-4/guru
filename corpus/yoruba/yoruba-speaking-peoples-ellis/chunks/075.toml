[content]
body = "Witchcraft is, in the minds of the natives, the chief cause of sickness and death.\n\nThey cannot, they think, attribute these evils to the gods, unless they occur in some way special to a god; as, for instance, when a man is struck by lightning, in which case the event would be attributed to Shango-or contracts small-pox, when the disease would be attributed to Shanpanna; for they are very careful to keep on good terms with the gods, by scrupulously [1.\n\n\"The Cyclades,\" p.\n\n27.\n\n2.\n\n\"De Re Rustica,\" 139.] observing their religious duties.\n\nThey consequently attribute sickness and death, other than death resulting from injury or violence, to persons who have for bad purposes enlisted the services of evil spirits, that is to say, to wizards and witches.\n\nWitches are more common than wizards, and here, as elsewhere in the world, it is the oldest and most hideous of their sex who are accused of the crime.\n\nProperly speaking, a person charged with witchcraft should be subjected to trial by ordeal, and then, if found guilty, immediately executed; but the excited populace, filled with superstitious terror, frequently acts without waiting for proof, and puts the accused to death without trial.\n\nCuriously enough, the phenomenon that so frequently occurred in England, when a belief in witchcraft was an article of faith, appears here also; and old women, accused of being witches, very often acknowledge that they are, and charge themselves with deaths which may have recently occurred in the community.\n\nAmulets and charms ( onde ) are numerous and of various kinds.\n\nSome, like the vo-sesao of the Ewe tribes, are really the badges of different gods, such as the ajude , or iron armlet worn by hunters, who are the servitors of Ogun, god of iron, and possess no virtue of themselves, being merely useful as serving to remind the gods that the wearers are under their protection.\n\nOthers are amulets proper, and are believed to derive a protecting power from the gods, from whom they have, through the agency of the priests, been obtained.\n\nAmulets are generally sewn up in leather cases; those obtained from Mohammedans, and which usually consist of a verse from the Koran, always are.\n\nThe name onde means \"one in bondage,\" and is compounded of eni , \"a person,\" or \"one who,\" and ide , \"the act of being confined.\" This name seems to point to the former existence of a belief similar to that now held by the Tshi-tribes in regard to the Suhman ; namely, that the amulet is animated by an indwelling spirit, who has been confined therein by a superior power.\n\nAt the present time, however, the onde cannot be regarded in any way as being animated, or an orisha."

