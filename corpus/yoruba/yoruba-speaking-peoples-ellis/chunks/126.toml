[content]
body = "the birds found the ground covered with bush, they went to the king.\n\nThey asked the king to give them authority to seize the person who had played this trick.\n\nThe king said, \"Very well.\" Then all the birds went back to the piece of ground; they put a great quantity of birdlime on the odan -tree; then they went home.\n\nNext morning they came and cleared the ground again, and at mid-day went and hid in the bush close by.\n\nThe kini-kini came and perched on the odan .\n\nHe sang his song, and the grass and bush grew up.\n\nThen he wanted to fly away, but he found himself held by the birdlime.\n\nThen all the birds flocked to the tree and saw the kini-kini .\n\nThey seized him and brought him to the king.\n\nThey said to the king, \"Behold the one who has caused us so much trouble.\" The king made the kini-kini come near.\n\n\"What have I done to you,\" he asked, \"that you should act thus?\" The kini-kini said, \"When you called all my companions to clear the ground you left me out, therefore I have revenged myself.\" When the king heard this, he raised his hand to give the kini-kini a slap.\n\n\"Pardon, pardon,\" said the kini-kini .\" If I find any cowries I will give them to you.\n\nWhen I get any kola-nuts I will bring them to you.\" The king gave the bird a slap, and the kini-kini voided out cowries till the room was filled.\n\n\"What is this?\" said the king, much astonished, and he raised his hand again to give the kini-kini a slap.\n\n\"I beg pardon,\" said the bird.\n\n\"If I find any cowries I will give them to you.\n\nWhen I get any kola-nuts I will bring them to you.\" The king gave him a slap, and the kini-kini voided from his body still more cowries than the first time.\n\nTile king sent messengers through all the country, and summoned all his people to assemble on the fifth day, to see a marvel.\n\nAll the people promised to come.\n\nThen.the king put the kini-kini in a basket.\n\nHe covered the top of the basket and went out.\n\nHis little son, who wanted to give the kini-kini a slap himself, uncovered the basket, and the bird flew away.\n\nWhen the king came home he went to the basket.\n\nHe found no bird in it, and he called his son.\n\n\"Where is the kini-kini ?\" he asked.\n\nThe little boy answered that he had gone to play with it, and that the bird had flown away.\n\nThe king took the little boy and beat him.\n\nHe beat him-he beat him, and, in his anger, he cut off one of his ears."

