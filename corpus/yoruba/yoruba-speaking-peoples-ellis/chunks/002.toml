body = "Sacred Texts Â Africa Â Index Â Previous Â Next Â THE YORUBA-SPEAKING PEOPLES SLAVE COAST OF WEST AFRICA.\n\nCHAPTER I.\n\nINTRODUCTORY.\n\nTHE portion of the West African coast occupied by the Yoruba-speaking peoples is situated in the eastern half of the Slave Coast, and lies between Badagry, on the west, and the Benin River, on the east.\n\nThe extent of sea-board held by them is thus smaller than that occupied either by the Tshi or by the Ewe tribes; but the Yorubas are really an inland people, and it was not until the beginning of the present century that they moved to the south and colonised Lagos and the adjacent littoral.\n\nThe territory now inhabited by the Yoruba tribes is bounded on the west by Dahomi, on the south-west by Porto Novo and Appa, on the south by the sea, on the east by Benin, and on the north by the Mohammedan tribes from the interior, who have within recent times conquered and annexed the Yoruba province of Ilorin, and whose territory may now be said to extend southward to about 8Âº 30' N.\n\nlatitude.\n\nThe aggressions of these Mohammedan tribes commenced very early in the present century, and it was no doubt this pressure from the north that caused the Yorubas to move to the south and colonise the seaboard.\n\nYoruba country at present comprises the following states, or political units:-- (1) The British colony of Lagos, which covers the whole sea-front between the meridian of the Ajarra Creek and the Benin River, and has absorbed the former native kingdoms of Appa, Pokra, Badagry, Lagos, Palma, Lekki, Ala, hin, Ogbo, and Jakri.\n\n(2) Ketu.\n\nThis is the western state.\n\nIt is bounded on the west by Dahomi, on the south by Porto Novo, and on the east by Egba.\n\nIts northern limits are undefined.\n\n(3) Egba.\n\nIt lies east of Ketu and south-west of Yoruba proper.\n\nIts capital is Abeokuta, \"Under the Rock.\" (4) Jebu.\n\nThis is the south-eastern kingdom, and is divided into two provinces, called Jebu Remo and Jebu Ode.\n\nJebu Ode has for its capital a town of the same name, that of Jebu Remo is called Offin.\n\nThe river Odo Omi is considered the north-western boundary of Jebu, and, roughly speaking, the territory of the Jebus may be said to extend inland to a distance of some fifty miles from the lagoon.\n\n(5) Ekiti Tribes.\n\nThese tribes, which form a confederation, lie to the north-east of Jebu Ode."

