[content]
body = "Sacred-Texts ГӮ African ГӮ Index ГӮ Previous XL TORTOISE AND THE RAIN T ORTOISE and a Cloud once made the following agreement: Whenever Tortoise very much desired fine weather, he was to stand outside his house and call: ГўВҖВңPass!\n\nPass!ГўВҖВқ and then the Cloud would roll away and allow the sun to shine.\n\nAnd when Tortoise desired rain, he was to cry: ГўВҖВңFall!\n\nFall!ГўВҖВқ and the rain would pour down.\n\nIn payment for this service, Tortoise was to place on the ground each time a certain number of cowries.\n\nГўВҖВғTortoise was delighted with this arrangement, and at first he duly placed the sum of money on the ground every time he asked the Cloud for fine or wet weather.\n\nГўВҖВғOne day, the occasion of a ChiefГўВҖВҷs wedding, the sky was very cloudy, and it seemed likely to rain.\n\nTortoise heard the Chief complaining: ГўВҖВңWe have promised the drummers a great deal of money, but if it rains nobody will come to see the maidens dance at my wedding!ГўВҖВқ ГўВҖВғTortoise went to the Chief and said: ГўВҖВңIf you will give me a certain sum, I will hold up the clouds on my hard back and there will be no rain.ГўВҖВқ ГўВҖВғThe Chief readily agreed to pay the cowries Tortoise demanded, and Tortoise stood at the back of his hut and cried to the Cloud: ГўВҖВңPass!\n\nPass!ГўВҖВқ The Cloud rolled back, the sun shone brightly, and the wedding took place with much rejoicing.\n\nГўВҖВғBut Tortoise did not lay any money on the ground, and instead, he kept the whole amount for himself.\n\nГўВҖВғThe next day a man came to TortoiseГўВҖВҷs house and offered him much money if he would cause the rain to fall.\n\nГўВҖВңFor,ГўВҖВқ he said, ГўВҖВңmy fishing-stakes are too high, but if it rains the river will swell and the fish will come into my baskets.ГўВҖВқ ГўВҖВғГўВҖВңVery well,ГўВҖВқ replied Tortoise.\n\nГўВҖВңI will throw a spear into the clouds, and the rain will fall.ГўВҖВқ ГўВҖВғThen he stood at the back of his house, where he could not be seen, and cried to the Cloud: ГўВҖВңFall!\n\nFall!ГўВҖВқ It began to pour with rain.\n\nГўВҖВғBut again he neglected to lay money on the ground and kept it all for himself.\n\nSoon, in this way, he grew rich and famous, and almost every day someone asked for fine or rainy weather.\n\nHe stored many bags of cowries in his house and gave nothing to the Cloud."

