[content]
body = "The Ejinrin market, situated about ten miles east of Epi, was closed by the Awujale of Jebu Ode on account of some disagreement with the people of Lagos; and though, in October, 1890, in consequence of representations made by the government of Lagos, it was formally opened by the Governor and representatives sent by the Awujale, the Jebus made this concession unwillingly, and had no intention whatever of departing from their policy of excluding foreigners from the interior of their country.\n\nConsequently, when, in May, 1891, the Acting Governor, Captain Denton, C.M.G., left Lagos with an escort of Hausas to proceed on a mission to Jebu Ode, with the object of coming to some agreement for the opening of the country to commerce, the Jebus refused to allow the party to enter their territory, on the plea that they feared hostile action.\n\nThe Awujale not only refused to treat, but rejected the presents offered on behalf of the British Government, fearing, no doubt, that to accept them would entail some concession on his part.\n\nUpon this affair being referred to the Home Government, the Governor was instructed to demand an apology from the Jebus for the so-called insult offered to the Acting Governor, and to insist upon a free right of way through Jebu country.\n\nThe Awujale was to be informed that, if these terms were not complied with, force would be used.\n\nIn December, 1891, this ultimatum was conveyed to the Awujale by an officer of the Lagos Constabulary, and the Awujale then consented to send to Lagos representatives fully empowered to make the apology and sign a treaty.\n\nIn January, 1892, the representatives arrived, and on the 21st made a formal apology, and signed an agreement to maintain a free and unrestricted right-of-way for persons and goods through Jebu territory; the Government of the Colony undertaking to pay the Jebus an annual sum of Â£500 in compensation for the duties they had been accustomed to levy on goods.\n\nFor a short time the Jebus observed their treaty engagements, and one member of the Church Missionary Society was allowed to pass through Jebu Ode on his way to the interior; but when, soon afterwards, in the month of February, another missionary attempted to pass through the capital he was ill-used and sent back.\n\nA party of Ibadan carriers, who sought to pass through from the north, was also turned back.\n\nThe Awujale asserted that the Ibadans had been insolent, but it was evident that the young men of the tribe were determined to maintain the old Jebu policy of isolation.\n\nThe Jebus were a turbulent and proud nation, and they considered it disgraceful to observe engagements which had been extorted from them by threats."

