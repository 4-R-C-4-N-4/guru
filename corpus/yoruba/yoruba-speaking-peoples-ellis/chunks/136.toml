[content]
body = "The lizard said, \"If I were to tell you that, and take you to the place, I should be killed.\" The baldheaded elf answered, \"No, I will not say a word to anyone.\n\nPlease take me.\" And the lizard said, \"Very well, then; come and call me to-morrow morning at cock-crow, and we will go together.\" Next morning, long before cock-crow, Tortoise came to the house of the lizard.\n\nHe stood outside the house and cried \"Cock-a-doodle-do.\" [1] Again he cried \"Cock-a-doodle-do.\" Then he went in and woke the lizard.\n\n\"The cock lias crowed,\" he said.\n\n\"Let me sleep,\" said the lizard; \"it is not yet cock-crow.\" \"Very well,\" said Tortoise.\n\nAnd they both went to sleep till cock-crow.\n\nThen the lizard got up, and the two went together.\n\nAs soon as they arrived at the.\n\nplace the lizard said, \"Rock, open,\" and the rock opened.\n\nThe lizard went in, took yams, and came out again.\n\nHe said to Tortoise, \"It is time to go.\n\nTake your yams and come.\" \"Wait a mimite,\" said Tortoise.\n\n\"Very well,\" said the lizard.\n\n\"Rock, shut.\" And he went away without waiting.\n\nTortoise, the bald-headed elf, helped himself to yams.\n\nHe put yams on his back and yams on his head; he put yams on his arms and yams on his legs.\n\n[1.\n\nIn Yoruba, kekere-ke , an onomatopÅic word supposed to resemble the crow of a cock.\n\nIt is from keke, which, like our onomatopÅic word \"cackle,\" means the cry of the hen.] The lizard had already gone home.\n\nHe lighted a fire.\n\nThen he lay on his back, with his feet in the air, as if he were dead; and he remained like that all day.\n\nWhen Tortoise, the bald-headed elf, was ready to go, he wanted to make the rock open.\n\nBut he could not remember what he ought to say.\n\nHe said many many words, but not the right words; and the rock remained shut.\n\nBy-and-bye came the plantation-owner.\n\nHe opened the rock, and found Tortoise inside.\n\nHe took him and beat him.\n\nHe beat him badly.\n\n\"Who brought you here?\" asked the man.\n\n\"It was the lizard who brought me,\" replied Tortoise.\n\nThen the man tied a string to Tortoise, and took him to the lizard.\n\nWhen the man reached the house of the lizard, he found the lizard lying on his back, with his feet in the air, as if he were dead.\n\nHe shook him."

