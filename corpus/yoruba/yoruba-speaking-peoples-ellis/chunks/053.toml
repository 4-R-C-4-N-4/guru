[content]
body = "The emblem of Oke is a stone or fragment of rock.\n\nHe is one of those who sprang from Yemaja.\n\nAt Abeokuta there is a rocky cavern in which Oke is worshipped.\n\nIt is popularly believed by the other tribes that the Egbas, when defeated in war, can retire into this cavern, which then hermetically seats itself till the danger is past.\n\n(19) OSHOSI.\n\nOshosi, who is also one of those who came from Yemaja, is the patron of Hunters.\n\nHe resides in the forest, and drives the game into the snares and pitfalls of his faithful followers, whom he also protects from beasts of prey.\n\nHe is represented as a man armed with a bow, or frequently by a bow alone.\n\nOfferings are made to him of the fruits of the chase, chiefly of antelopes.\n\n(20) AND (21) THE SUN AND THE MOON.\n\nAccording to the myth, the sun, moon, and stars came from the body of Yemaja.\n\nOrun, the Sun, and Oshu, the Moon, are gods, but the stars do not seem to have been deified.\n\nThe worship of the sun and moon is, moreover, now very nearly obsolete, and sacrifices are no longer offered to them, though the appearance of the -new moon is commonly celebrated by a festival.\n\nThe stars are the daughters of the sun and moon.\n\nThe boys, or young suns, on growing up tried to follow their father in his course across the sky to where the sea and the sky meet, and which, say the Yorubas, is the place where the white men go and find all the things with which they fill their ships; but he, jealous of his power, turned upon them and tried to kill them.\n\nSome of them sought refuge with Olosa, some with Olokun, and the remainder with their grandmother, Yemaja, who turned them into fish.\n\nThus all the sons were driven out of the sky, but the daughters remained with their mother and still accompany her by night.\n\nThis myth is virtually the same as that current among the eastern Ewe-tribes, who have almost certainly learnt it from their Yoruba neighbours.\n\nTo see the new moon is lucky, and, just as in England, people wish when they first see it.\n\nAs amongst the Ewe-tribes, an eclipse of the Moon is supposed to indicate that the Sun is beating her, and steps are taken to drive him away, similar to those described in \"The Ewe-Speaking People.\" The Yorubas pay some attention to the heavenly bodies.\n\nThe planet Venus, when near the Moon, is called Aja-Oshu, the Moon's Dog, becauseshe travels with it.\n\nWhen a morning star she is called Ofere, or Ofe, which seems to mean a pale blue colour."

