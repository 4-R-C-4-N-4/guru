body = "Fifty-two guns were captured, but the victory was dearly purchased, as the total loss during the two days' operations amounted to two officers and fifteen men killed, four officers and sixty-eight men wounded, many of them very severely.\n\nAkitoye was now reinstated, and on January 1st, 1852, signed a treaty, undertaking to suppress the export slave trade, and to expel all Europeans engaged in the traffic.\n\nAbout September of the same year some Portuguese slave traders, who had been expelled under this treaty, returned to Lagos, and, with the assistance of some of the chiefs, secretly renewed the traffic.\n\nAkitoye, being informed of what was going on, strove to stop it, whereupon the Portuguese incited the chiefs to rebel, and in August, 1853, Kosoko returned from Epi, where he had taken refuge, to head the movement.\n\nThe British naval autborities again interfered in favour of Akitoye; a party of seamen and marines was landed to support him, and on the 13th of August, after a sharp skirmish, defeated Kosoko and his adherents, who once more fled to the east.\n\nAkitoye died in September, poisoned, it was said, by the slave trade party, and his son Docemo was, through British influence, appointed his successor.\n\nKosoko, who had again found an asylum with the chief of Epi, refused to accept this arrangement, and continued to harass Docemo and the Lagos people until by an agreement made in January, 1854, he was recognised as King of Palma and Lekki, on condition of renouncing all claim to the sovereignty of Lagos.\n\nIn August, 1861, Docemo ceded Lagos to the British in consiaeration of a pension of Â£1,000 a year, and Lagos thus became a British possession; but it is doubtful if the cession was altogether voluntary on Docemo's part, for during the first few years succeeding the signature of the treaty he made several protests against it.\n\nIn 1860 a new war broke out in the interior.\n\nIjaye, an important town of Yoruba, declared itself independent of the Alafin , who called upon the Ibadans to assist him in reducing it to allegiance.\n\nThe Ibadans complied, whereupon the Egbas sided with Ijaye; but these allies sustained a severe defeat at the hands of the Yorubas and lbadans, losing, it is said, 40,000 in killed and prisoners, and Ijaye was destroyed on March 17th, 1862.\n\nUp to this time the Egbas had been considered the protÃ©ges of the British, and great interest had been taken in the welfare of Abeokuta, which was regarded as the bulwark of Christianity in West Africa."

