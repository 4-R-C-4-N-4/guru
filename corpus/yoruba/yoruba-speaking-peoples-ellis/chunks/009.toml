[content]
body = "In 1830, when it was visited by Lander., Old Oyo was still the capital of Yoruba, but between 1833 and 1835 it was captured and destroyed by the Mohammedans, and the Yorubas, flying southwards, founded their present capital Oyo, about ninety miles south of the old one.\n\nThe Egbas, taking advantage of the overthrow of Yoruba, declared themselves independent, but the Yorubas, as soon as they were settled in their new territory, attacked them with vigour, and drove them out of all their northern towns.\n\nA desultory war then lingered till about 1838, when the Egbas abandoned their territory, and moving to the south, founded their present capital, Abeokuta.\n\nThe new town was divided into several distinct quarters, or townships, which were named after an equal number of towns that had been destroyed in the war, and one of them, Ake, still preserves the name of the old Egba capital.\n\nAlthough these events occurred so recently, they have already become clothed with myth; and Lishabe, the chief who led them to Abeokuta, is believed by the Egbas to have been a giant and a demi-god.\n\nAbout the same time, Ibadan, a town of the old province of Egba, situated some thirty-five miles south of Oyo, declared itself independent of Egba; the original Egba inhabitants having been driven out by the Jebus, and the latter, in their turn, by Yoruba refugees.\n\nOther secessions took place, and by 1840 the Yoruba kingdom had split up into the following independent states.\n\n(1) Yoruba, south of Old Yoruba, capital Oyo.\n\n(2) Egba, south and west of Old Egba, capital Abeokuta.\n\n(3) Ketu.\n\n(4) Jebu.\n\n(5) Ibadan, a small state south of Oyo.\n\nIt owned a nominal allegiance to the Alafin, because its inhabitants were Yoruba refugees, but was really independent.\n\n(6) Ijesa, a small state south of Ilorin.\n\nThe ruler was styled the Owa .\n\n(7) Ife, a small state south-west of Ijesa.\n\nThe ruler was styled the Oni .\n\nThe former Yoruba province of Ilorin was now inhabited by Fulas, Bornus, and Hausas, and was said to have a population of 300,000, 80,000 of whom were in the town of Ilorin.\n\nThe Fulas were the dominant race, and the government was in their hands."

