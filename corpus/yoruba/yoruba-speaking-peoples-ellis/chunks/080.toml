body = "Sacred Texts Â Africa Â Index Â Previous Â Next Â CHAPTER VII.\n\nTHE IN-DWELLING SPIRITS AND SOULS OF MEN.\n\nIN the first volume of this series we found that the Tshi-speaking peoples believe that every man has dwelling in him a spirit termed a kra , which enters him at birth and quits him at death, and is entirely distinct from the soul, which, at the death of the body, proceeds to the Land of the Dead, and there continues the life formerly led by the man in the world.\n\nIn the second volume, we found that the Ewe speaking peoples have a similar belief, the indwelling spirit being by them termed a luwo .\n\nThe GÃ£-speaking tribes, situated geographically between the Tshi and Ewe tribes, have modified this belief, and they assign to each individual two indwelling spirits, called kla , one male and one female, the former being of a bad and the latter of a good disposition.\n\nEach kla , like the kra and the luwo , is a guardian-spirit, but-and this is a new departure-they give good or bad advice, and prompt good or bad actions, according to their respective dispositions.\n\nThe Yorubas also have modified what appears to be the original theory of one in-dwelling and guardian-spirit, and they hold that each man has three spiritual inmates, the first of whom, Olori , dwells in the head, the second, Ipin ijeun , in the stomach, and the third, Ipori , in the great toe.\n\nOlori ( Oni-ori , owner, or lord, of the head) sometimes called Ori (head, faculty, talent), seems to be the spirit which answers to the kra or luwo .\n\nHe is the protector, guardian, and guide.\n\nOfferings are made to him, chiefly fowls, as with the kra and luwo , and some of the blood, mixed with palm-oil, is rubbed upon the forehead.\n\nOlori brings good-fortune, whence the proverb, \" Olori causes the owner of the head to prosper, and not the crab on the bank of the river.\" The symbol of Olori is half a calabash studded over with cowries.\n\nIpin ijeun , or ipin ojehun ( ipin , share, portion; ijeun , act of eating, from je ohun , to eat; hence \"he who shares in the food\"), is perhaps considered the most important of the three indwelling spirits, but as he shares in all that the man eats, he has no special sacrifice offered to him."

