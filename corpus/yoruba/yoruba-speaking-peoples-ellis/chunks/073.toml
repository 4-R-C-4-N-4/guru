[content]
body = "To get rid of the indwelling Abiku, and its companions outside, the anxious mother offers a sacrifice of food; and while the Abikus are supposed to be devouring the spiritual part of the food, and to have their attention diverted, she attaches iron rings and small bells to the ankles of the child, and hangs iron chains round his neck.\n\nThe jingling of the iron and the tinkling of the bells is supposed to keep the Abikus at a distance, hence the number of children that are to be seen with their feet weighed down with iron ornaments.\n\nSometimes the child recovers its health, and it is then believed that this procedure has been effective, and that the Abikus have been driven away.\n\nIf, however, no improvement takes place, or the child grows worse, the mother endeavours to drive out the Abiku by making small incisions in the body of the child, and putting therein green peppers or spices, [1.\n\nTshi-Speaking reopies of the Gold Coast,\" chap.\n\nxi.] believing that she will thereby cause pain to the Abiku and make him depart.\n\nThe poor child screams with pain, but the mother hardens her heart in the belief that the Abiku is suffering equally.\n\nShould the child die it is, if buried at all, buried without any funeral ceremony, beyond the precincts of the town or village, in the bush; most other interments being made in the floors of the dwellinghouses.\n\nOften the corpse is simply thrown into the bush, to punish the Abiku, say the natives.\n\nSometimes a mother, to deter the Abiku which has destroyed her child from entering the body of any other infant she may bear in the future, will beat, pound, and mutilate the little corpse, while threatening and invoking every evil upon the Abiku which has caused the calamity.\n\nThe indwelling, Abiku is believed to feel the blows and wounds inflicted on the body, and to hear and be terrified by the threats and curses.\n\nTREE-SPIRITS.\n\nSeveral varieties of trees are believed to be inhabited by indwelling spirits, which are not exactly gods, but answer more to the hama-dryads of Ancient Greece, or to the elves of mediaeval Europe.\n\nFrom the analogy of the Tshi tribes there is little doubt but that these tree-spirits were once gods of the Srahmantin type, i.e.\n\n, of the type of those which on the Gold Coast are believed to animate the gigantic silk-cotton trees; but now, owing to the great increase in the number of general objects of worship, which makes the propitiation of the local object a matter of less importance, they have been shorn of a great deal of their power, and pushed more into the background."

