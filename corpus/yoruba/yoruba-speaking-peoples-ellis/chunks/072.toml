[content]
body = "Abiku, abi , \"that which possesses iku ,\" \"death\"; hence, \"predestined to death\" is a word used to mean the spirits of children who die before reaching puberty, and also a class of evil spirits who cause children to die; a child who dies before twelve years of age being called an Abiku, and the spirit, or spirits, who caused the death being also called Abiku.\n\nThe general idea seems to be that the uninhabited tracts of country abound with numbers of evil spirits or demons, who suffer from hunger, thirst, and cold, since nobody offers sacrifice to them and they have no temples, and who are constantly endeavouring to improve their condition by entering the bodies of new-born babes.\n\nOnly one Abiku can enter and dwell in the body of the same child, and, as there is great competition amongst the Abikus for such a position, an Abiku is only suffered by his companions to enter peaceably, and, in fact, to be recognised as having vested rights in a child, on condition of his promising them a share of the comforts he is about to obtain.\n\nWhen an Abiku has entered a child he takes for his own use, and for the -use of his companions, the greater part of the food that the child eats, who in consequence begins to pine away and become emaciated.\n\nIf an Abiku who had entered a child were not bound to supply the wants of other Abikus who had not succeeded in obtaining human tenements, no great harm would ensue, since the sustenance taken could be made sufficient both for the child and his tenant.\n\nIt is the incessant demands that are made by the hungry Abikus outside, and which the indwelling Abiku has to satisfy, that destroy the child, for the whole of his food is insufficient for their requirements.\n\nWhen a child is peevish and fretful it is believed that the outside Abikus are hurting him in order to make the indwelling Abiku give them more to eat; for everything done to the child is felt by his Abiku.\n\nThe indwelling Abiku is thus, to a great extent, identified with the child himself, and it is possible that the whole superstition may be a corruption of the Gold Coast belief in the sisa .[1] A mother who sees her child gradually wasting away without apparent cause, concludes that an Abiku has entered it, or, as the natives frequently express it, that she has given birth to an Abiku, and that it is being starved because the Abiku is stealing all its nourishment."

