[content]
body = "As was mentioned in the last volume, the general bias of the negro mind has been in favour of selecting the firmament for the chief Nature god, instead of the Sun, Moon, or Earth; and in this respect the natives resemble the Aryan Hindus, Greeks, and Romans, with whom Dyaus pitar, Zeus, and Jupiter equally represented the firmament.[1] [1.\n\nThe Tshis and Gas use the words Nyankupon and Nyonmo to express sky, rain, or thunder and lightning, and the Ewes andYorubas, the words Mawn and Olorun to express the two former.\n\nThe Tshi peoples say Nyankupon lom (Nyankupon knocks); \"It is thundering\"; Nyankupon aba (Nyankupon has come), \"It is raining\"; and the GÃ£ peoples, Nyonmo, knocks (thunders), Nyonmo pours, Nyonmo drizzles, &c., while in just the same way the Ancient Greeks ascribed these phenomena to Zeus, who snowed, rained, hailed, gathered clouds, and thundered.\n\nNyankupon has for epithets the following: Amosu (Giver of Rain); Amovua (Giver of Sunshine); Tetereboensu (Wide-speading Creator of Water), and Tyoduampon , which seems to mean \"Stretched-out Roof\" ( Tyo , to draw or drag, dua , wood, and pon , flat surface).\n\nNyankupon and Nyonmo thunder and lighten as well as pour out rain, but Olorun, like the Ewe Mawu, does not wield the thunderbolt, which has become the function of a special thunder-god, and he consequently has suffered some reduction in importance.\n\nThe name Olorun means \"Owner of the Sky\" ( oni , one who possesses, orun , sky, firmament, cloud[1]), and the sky is believed to be a solid body, curving over the earth so as to cover it with a vaulted roof.\n\nLike Nyankupon, Nyonmo, and Mawu, Olorun is considered too distant, or too indifferent, to interfere in the affairs of the world.\n\nThe natives say that he enjoys a life of complete idleness and repose, a blissful condition according to their ideas, and passes his time dozing or sleeping.\n\nSince he is too lazy or too indifferent to exercise any control over earthly affairs, man on his side does not waste time in endeavouring to propitiate him, but reserves his worship and sacrifice for more active agents.\n\nHence Olorun has no priests, symbols, images, or temples, [1.\n\nThe n in oni , or ni , always changes to l before the vowels a , e , o , and u ."

