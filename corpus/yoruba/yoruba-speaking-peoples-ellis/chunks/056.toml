[content]
body = "The Sea-god (Olokun), the Thunder-god (Shango), the Sun, the Moon, the Lagoon (Olosa), the three river-goddesses Oya, Oshun, and Oba, the god of Mountains (Oke), and Ogun, god of iron and war and of the River Ogun, are all the product of Nature-worship, but are not of one type, for the Sun and Moon belong to the [1.\n\nRhea, bride of Kronos, to some extent represented the earth in Grecian mythology.] old order of things, to the same religious system as Olorun, and are personally divine, while the others belong to the new order, and are anthropomorphic.\n\nShankpanna, god of small-pox, is personified pestilence, and belongs to another type; while Dada, Oshosi, Aje Shaluga, and Orisha Oko, as the respective patrons of vegetable productions, hunters, wealth, and agriculture, may be regarded as the tutelary deities of industries, and as belonging to a third class of religious conceptions.\n\nThe myth thus assigns a common origin alike to the ancient gods and to those which are more modern.\n\nThere are, however, other gods who do not belong to this family circle; that is, they are not descendants of Obatala and Odudua, so the mythological scheme is incomplete, no attempt being made to account for their origin.\n\nThese gods are the God of Divination (Ifa), the Forest-god (Aroni), the Phallic-god (Elegba), the Harmattan Wind (Oye), the Rainbow (Oshumare), the tutelary deity of households (Olarosa), the god of Medicine (Osanhin), and Shigidi.\n\nThese also are of various types.\n\nThe Harmattan Wind and the Rainbow are Nature-gods of the old order, and Aroni, god of forests, of the new.\n\nOlarosa and Osanhin are tutelary deities, and Shigidi is personified nightmare.\n\nIfa was probably originally the God of fecundation, though now his chief function is to foretell the future.\n\nElegba, primarily a phallic divinity, seems to be gradually becoming a personification of evil, and here we perhaps see a tendency towards Dualism, which in the future might, if undisturbed, result in Elegba becoming the Evil Deity, and Obatala or Ifa the Good.\n\nThe incompleteness of the scheme seems, as has been said, to show that the myth of Yemaja is comparatively recent, and this is supported by the fact that the myth itself is not universally accepted in its entirety."

