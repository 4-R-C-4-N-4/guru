[content]
body = "(8) OSHUN.\n\nOshun, goddess of the river of the same name, which is the sacred river of Jebu Ode, is the second wife of Shango.\n\nCrocodiles which bear certain marks are sacred to her, and are considered her messengers.\n\nHuman sacrifices are made to Oshun in time of need.\n\n(9) OBA.\n\nOba, the third wife of Shango, is the goddess of the River Ibu, or Oba.\n\n(10) AJE SHALUGA.\n\nAje Shaluga is the god of Wealth, and confers riches on his worshippers.\n\nThe name appears to mean either \"the gainer who makes to recur,\" or \"the sorcerer who makes to recur.\" ( Aje , sorcerer; aje , earner, or gainer, and shalu , to recur.) His emblem is a large cowry.\n\nOne proverb says, \"Aje Shaluga often passes by the first caravan as it comes to the market, and loads the last with benefits;\" and another, \"He who while walking finds a cowry is favoured by Aje Shaluga.\" The large cowry, emblematic of Aje Shaluga, has no value as.\n\na medium of exchange, the small white cowries being alone used for that purpose.\n\nHe is the patron of dyes and of colours generally.\n\nHe came from the body of Yemaja.\n\n(11) ORISRA OKO.\n\nOrisha Oko ( oko , farm, garden, plantation) is the god of Agriculture, and is one of those who sprang from the body of Yemaja.\n\nAs the natives chiefly depend upon the fruits of the earth for their food, Orisha Oko is much honoured.\n\nThere is scarcely a town or village that has not a temple dedicated to him, and he has a large number of priests and priestesses in his service.\n\nAlthough his first care is to promote the fertility of the earth, he is also -the god of natural fertility in general, for he is a phallic divinity, and his image is always provided with an enormous phallus .\n\nHe thus resembles Priapus, who, although a phallic deity, was, apparently, primarily a garden-god, who fostered and protected crops.\n\n(Catullus, xix.\n\nxx.; Tibullus, I.\n\ni.) An emblem of Orisha Oko is an iron rod, and honey bees are his messengers.\n\nIt is probably with reference to his phallic attributes that he has the title of Eni-duru - \"the erect personage.\" One of his functions is to cure malarial fevers, to which those who disturb the soil in the process of cultivation are particularly liable.\n\nThere is an annual festival to Orisha Oko, held when the yam crop is ripe, and all then partake of new yams."

