[content]
body = "If the family be poor, and that of the murderer rich, they usually deem it better to exact payment than to enjoy the luxury of revenge, which the injurers would only have the effect of depriving of one of their number, without improving the position of the injured.\n\nIn the contrary case the feeling of revenge is allowed to have its way; and when this occurs, the homicide is handed over to the injured family and put to death by them.\n\nIn cases of theft, or injury to property, the stolen goods are returned or the amount of the damage made good, by the family to which the offender belongs; which is also liable to a fine for not having controlled the actions of the guilty member.\n\nThe family itself then deals with its erring member, and punishes or pardons him, just as it thinks fit, that being a matter with which the outside public has nothing to do.\n\nNo distinction is made between crimes and accidents.\n\nMotive is never taken into account, and the harm done is always deliberated upon from the point of view of loss to the family.\n\nIf a man be deliberately murdered, or killed by accident, there is equally a loss of an individual to the family, and they, can in either case take a life in exchange, or accept compensation.\n\nWe saw the reflex of this condition in their religious views, the gods being likewise believed not to take motive into consideration.\n\nAmong the Yorubas, in consequence of the change in the system of blood-descents, the family has lost cohesion.\n\nIt is no longer the powerful organisation it was when it rested upon the basis of the clan; for, instead of being a large group of kindred, it has become a congeries of households, each with two lines of descent, and as the family has weakened, the state has gradually usurped its privileges.\n\nThe state here takes cognisance of serious crimes, and only minor injuries to the person or property are left to the initiative of the family.\n\nThe restoration of the stolen property, and the imposition of a fine on the family, is no longer considered a, sufficient reparation for theft.\n\nTheft has come to be regarded as all offence against social order, in which the whole community is interested, and lience a first offence is punished by flogging or fine, a second by mutilation, and a third by death.\n\nThe family, being no longer collectively responsible for the actions of its several members, is not allowed to deal with the guilty member as it thinks fit.\n\nThe state motes out justice; every man is responsible for his own conduct, and punishment falls upon the guilty individual instead of upon the group of kindred.\n\nWe are also able to trace to some extent the evolution of ideas concerning property.\n\nIn those groups of tribes which trace descent through mothers only, property is vested in families rather than in individuals."

