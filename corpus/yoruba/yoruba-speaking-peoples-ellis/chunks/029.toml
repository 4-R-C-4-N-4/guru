[content]
body = "Odudua was once walking alone in the forest when she met a hunter, who was so handsome that the ardent temperament of the goddess at once took fire.\n\nThe advances which she made to him were favourably received, and they forthwith mutually gratified their passion on the spot.\n\nAfter this, the goddess became still mora enamoured, and, unable to tear herself away from her lover, she lived with him for some weeks in a hut, which they constructed of branches at the foot of a large silk-cotton tree.\n\nAt the end of this time her passion had burnt out, and having become weary of the hunter, she left him; but before doing so she promised to protect him and all others who might come and dwell in the favoured spot wliere she had passed so many pleasant hours.\n\nIn consequence many people came and settled there, and a town gradually grew up, which was named Ado, to commemorate the circumstances of its origin.\n\nA temple was built for the protecting goddess; and there, on her feast days, sacrifices of cattle and sheep are made, and women abandon themselves indiscriminately to the male worshippers in her honour.\n\n(4) AGANJU AND YEMAJA.\n\nBefore her amour with the hunter, Odudua bore to her husband, Obatala, a boy and a girl, named respectively Aganju.\n\nand Yemaja.\n\nThe name Aganju means uninhabited tract of country, wilderness, plain, or forest, and Yemaja, \"Mother of fish\" ( yeye , mother; eja , fish).\n\nThe offspring of the union of Heaven and Earth, that is, of Obatala and Odudua, may thus be said to represent Land and Water.\n\nYemaja is the goddess of brooks and streams, and presides over ordeals by water.\n\nShe is represented by a female figure, yellow in colour, wearing blue beads and a white cloth.\n\nThe worship of Aganju seems to have fallen into disuse, or to have become merged in that of his mother; but there is said to be an open space in front of the king's residence in Oyo where the god was formerly worshipped, which is still called Oju-Aganju -\"Front of Aga-nju.\" Yemaja married her brother Aganju, and bore a son named Orungan.\n\nThis name is compounded of orun, sky, and gan, from ga, to be high; and appears to mean \"In the height of the sky.\" It seems to answer to the khekheme , or \"Free-air Region\" of the Ewe peoples; and, like it, to mean the apparent space between the sky and the earth.\n\nThe offspring of Land and Water would thus be what we call Air."

