[content]
body = "The Iyewa lagoon is also said to have been a woman.\n\nThe story runs that a poor woman, named Iyewa, had two children, whom she had a hard struggle to support; but she used every day to go with them into the forest to gather firewood, which she carried to the town and sold for food.\n\nOne day, when following her customary avocation, she and the children, finding wood scarce, wandered further into the forest than usual, and, when it was time to return, they could not find their way out.\n\nThey walked hither and thither looking for the path, but in vain, and at last, tired out and tormented with thirst, they lay down to rest under a large tree.\n\nThis rested their limbs, but their thirst increased, and the two children filled the forest with their lamentations, crying to their mother for water.\n\nThe poor woman, half distracted, sprang to her feet, and again searched in every direction for the path and for water, but fruitlessly, and when at last she returned to her children she found them almost at the last gasp.\n\nThen, prostrating herself upon the earth, she called upon the gods to come to her assistance and save her children.\n\nThe gods listened to her prayer, and Iyewa was at once changed into a lagoon, at which the children drank and so recovered; while next day they were found by neighbours who had come in search of them, and taken back to the town.\n\nWhen the children grew up they built a house by the side of the lagoon, which, in memory of their mother, they called Odo Iyewa, \"The Lagoon of Iyewa.\" Next: Chapter VII: The In-Dwelling Spirits And Souls of Men."

