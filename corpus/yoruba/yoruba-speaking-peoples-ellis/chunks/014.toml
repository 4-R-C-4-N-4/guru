[content]
body = "The war between the Egbas and Ibadans caused by the affair of Ijaye had been carried on in a desultory manner since 1862; but in 1864, after the repulse of the Dahomis from before Abeokuta on March 15th,[1] the Jebus, who had hitherto adopted the policy of excluding all strangers from their territory, and had lived in complete isolation, shut off by their forests from the rest of the tribes, joined the Egbas, and the war was prosecuted with more vigour.\n\nThe Jebus of Ikoradu, a town at the northern extremity of the Lagos lagoon, refused to join their fellow-tribesmen in the alliance with the Egbas, their reason being that their interests were identified with those of the people [1.\n\n\"Ewe speaking Peoples,\" pp.\n\n322-324.] of Lagos, and that they had suffered equally with them from the cessation of trade caused by the maltreatment of traders by the Egbas.\n\nIn revenge, the Egbas, early in 1865, despatched to Ikoradu an army of 12,000 men, which besieged the town, and, after the native fashion, threw up two entrenched camps against it.\n\nThe Colonial Government, alarmed at the near approach of this force, and appealed to by the Ikoradus for aid, warned the Egbas to desist, and ordered them to return to their own country.\n\nThe Egbas sent insulting messages in reply, and a force of some 280 men, consisting of the 5th West India Reaiment and the Lagos Police, was accordingly sent against them, which stormed the camps and routed the Egbas with heavy loss, on March 29th, 1865.\n\nThis affair of course only served to widen the breach between the British and the Egbas, the latter, besides, conceived that the Colonial Government encouraged the annual raids of Dahomi upon Egba territory; and, in 1867, they expelled all the missionaries from Abeokuta, and cut off all relations with the British.\n\nIt seems that a letter, purporting to be signed by a hostile chief, fell into the hands of the Egbas, who knew that the chief could not write, and fancied they recognised the handwriting as that of a Protestant missionary who had formerly lived in Abeokuta.\n\nThe missionaries in Abeokuta were thereupon accused of betraying the Egbas to their enemies; there was a popular tumult, and the mob howled for their blood.\n\nIt was only with great difficulty that the chiefs and elders succeeded in saving the lives of the accused, who were immediately expelled from the town, and their houses and churches destroyed."

