body = "From these sixteen \"mothers\" a great many combinations can be made by taking a column from two different \"mothers,\" and figures thus formed are called \"children.\" Thus (13) and (2) and (11) and (10) make respectively- As the figures are read from right to left, the system is probably derived from the Mobammedans.\n\nJames Hamilton, indeed, describes[1] a very similar mode of divination which he saw in the oasis of Siwah, where it was called Derb el ful , or Derb el raml , according to whether beans or sand were used.\n\nHe says: \"Seven beans are held in the palm of the left hand, which is struck with a smart blow with the right half-closed fist, so that some of the beans jump into the right hand - if an odd number, one is marked; if even, two.\n\nThe beans are replaced in the left hand, which is again struck with the right, and the result marked below the first.\n\nThis being repeated four times gives the first figure, and the operation is performed until there are obtained four figures, which are placed side by side in a square; these are then read vertically and perpendicularly ( sic ), and also from corner to corner, thus giving in all ten figures.\n\nAs each may contain four odd or four even numbers, they are capable of sixteen permutations, each of which has a separate signification, and a proper house, or part of the square in which it should appear.\" The initiation fee paid to a priest for teaching the art of divination is, it is said, very heavy, and moreover does not cover the whole of the expense; for the Oracle is, like Oracles generally, ambiguous and obscure, and the neophyte finds that he constantly has to refer to the priests for explanations of its meaning, and on each such occasion he is required to pay a consultation fee.\n\nWhen a man is initiated the priest usually informs him that he must [1.\n\n\"Wanderings in North Africa,\" pp.\n\n264-65.] henceforward abstain from some particular article of food, which varies with the individual.\n\nIfa figures in connection with a legendary deluge, the story of which, now adapted to the Yoruba theology, was probably derived from the Mohammedans.\n\nSome time after settling at Ado, Ifa became tired of living in the world, and accordingly went to dwell in the firmament, with Obatala.\n\nAfter his departure, mankind, deprived of his assistance, was unable to properly interpret the desires of the gods, most of whom became in consequence annoyed.\n\nOlokun was the most angry, and in a fit of rage he destroyed nearly all the inhabitants of the world in a great flood, only a few being saved by Obatala, who drew them up into the sky by means of a long iron chain."

