body = "Sacred Texts Â Africa Â Index Â Previous Â Next Â CHAPTER V.\n\nPRIESTS AND WORSHIP.\n\nTHE Yoruba priesthood is divided into recognised orders, but before describing them it will be necessary to give some account of a secret society which is inseparably connected with the priesthood, and which, except in Jebu, Where it is called Oshogbo, is known as the Ogboni Society.\n\nThe Ogboni Society really holds the reins of government, and kings themselves are obliged to submit to its decrees.\n\nThe members are popularly believed to possess a secret from which they derive their power, but their only secret appears to be that of a powerful and unscrupulous organisation, each member of which is bound to assist every other, while all are bound to carry out, and if necessary enforce, the decrees of the body.\n\nEach town and village has its Ogboni \"lodge,\" and the members recognise each other by conventional signs and passwords..\n\nAt their meetings, which are held with a great affectation of mystery, they deliberate upon all matters which interest the tribe or community.\n\nThe decisions of the Ogboni are final, and nothing of importance can be done without their consent When the missionaries wished to establish theniselves at Abeokuta, the king could not grant the necessary permission till the Ogbonis had considered the matter and signified their consent.\n\nThe power of the Ogbonis, however, varies in different states, and in Ibadan they seem to be little more than public executioners.\n\nOf course, since the organization is secret, little can really be known about it.\n\nDeath is said to be the penalty for betraying the secrets of the order.\n\nAccording to native report, a member who has been convicted of such an offence is placed in a narrow cell, with his legs protruding through two holes in the wall into an adjoining cell, where they are fastened to two stakes driven into the earthen floor.\n\nThe executioner sits in this adjoining cell, and the offender is tortured to death by having the flesh scraped from his legs with sharp-edged shells.\n\nWhether this is true or not it is impossible to say.\n\nAccording to some natives the Ogboni Society has for its chief object the preservation of established religious customs, while according to others it is principally occupied with the civil power.\n\nIt really appears to concern itself with every matter of public interest, and seems to resemble in all important particulars a very similar society, called Porro, which is found among the Timnis of Sierra Leone.\n\nWhat is quite certain is that the protecting deity of the Ogboni is the goddess Odudua, who is generally spoken of by members by her title Ile (Earth)."

