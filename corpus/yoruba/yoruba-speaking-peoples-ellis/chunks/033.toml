[content]
body = "The image of Shango generally represents him as a man standing, and is surrounded by images, smaller in size, of his three wives; who are also represented as standing up, with the palms of their hands joined together in front of the bosom.\n\nOxen, sheep, and fowls are the offerings ordinarily made to Shango, and, on important occasions, human beings.\n\nHis colours are red and white.\n\nHe is consulted with sixteen cowries, which are thrown on the ground, those which he with the back uppermost being favourable, and those with the back downward the reverse.\n\nHe usually goes armed with a club called oshe, made of the wood of the ayan tree, which is so hard that a proverb says, \"The ayan tree resists the axe.\" In consequence of his club being made of this wood, the tree is sacred to him.\n\nThe priests and followers of Shango wear a wallet, emblematic of the plundering propensities of their lord, and the chief priest is called Magba , \"The Receiver.\" As amongst the Ewe tribes, a house struck by lightning is at once invaded and plundered by the disciples of the god, and a fine imposed on the occupants, who, it is held, must have offended him.\n\nPersons who are killed by lightning may not, properly speaking, be buried; but if the relations of the deceased offer a sufficient payment, the priests usually allow the corpse to be redeemed and buried.\n\nIndividuals rendered insensible by lightning are at once despatched by the priests, the accident being regarded as proof positive that Shango requires them.\n\nA common idea is that Shango is subject to frequent outbursts of ungovernable temper, during which he thumps and bangs overhead, and hurls down stones at those who have given him cause for offence.\n\nThe foregoing are, with the exception of the myth of the fiery chains, the old ideas respecting Shango; but on to them are now rapidly becoming grafted some later myths, which make Shango, an earthly king who afterwards became a god.\n\nThis Shango was King of Oyo, capital of Yoruba, and became so unbearable through rapacity, cruelty, and tyranny, that the chiefs and people at last sent him a calabash of parrots' eggs, in accordance with the custom that has already been mentioned; with a message that he must be fatigued with the cares of government, and that it was time for him to go to sleep.\n\nOn receiving this intimation, Shango, instead of allowing himself to be quietly strangled by his wives, defied public opinion and endeavoured to assemble his adherents; and, when this failed, sought safety in flight."

