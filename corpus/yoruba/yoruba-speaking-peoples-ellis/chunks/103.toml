[content]
body = "When he has attended to the society he must attend to his relations, because it is they who must bury him when he dies.\" This desire for a very ceremonial funeral, which owes its origin to the native beliefs concerning the soul, lasts long after the negro has been transplanted across the Atlantic, and has lost all notion of its motive.\n\nIn most of the West India Islands, but particularly in the Bahamas, where the bulk of the negro population is of Yoruba descent, a grand funeral is considered the greatest desideratum.\n\nTo attain this end, burial-societies are formed, the members of which pay subscriptions all their lives in order to be buried with pomp.\n\nEvery member of such a society is bound to attend the funeral of another member, and the result is a procession of men in uniforms, more or less grotesque, with banners and various insignia.\n\nOften a band heads the cortÃ©ge , and many a man occupies his last moments in giving directions as to the manner in which the funeral is to take place.\" [1.\n\nSee the following, which appeared in the Nassau Guardian , New Providence, Bahamas, 10th January, 1891:-- NOTICE.\n\nAll to whom it may concern.\n\nDear Friends, Mr.\n\nA- B- had been a member of the Grant's Town Friendly Society for many years, and was financial up to July, 1891.\n\nDuring his illness he requested that the Band of the said Society play the Dead March in Saul wben be died.\n\nThe message came to the President from Mr.\n\nJ- C.\n\nS-, ex-President of the Society.\n\nThe Band, in conjunction with the members, was summoned to meet at the Society's Hall, in uniform, at 3 o'clock sharp.\n\nThe members were present waiting on the Band, but only the Bandmaster and three other members came, and they had to leave the Hall, proceeding to the house of the deceased without the Band.\n\nI am sorry to say that if the Band cannot attend on members (deceased) of the Society to which they belong, it will be best for the Society to do away with the Band.\n\nIf members are paying, their monies towards Band Funds, they should have the use of the Band when required.\n\n(Signed) Z.\n\nC-.\n\nPres.\n\nG.\n\nT.\n\nF.\n\nSociety.] When a man dies abroad his family make the greatest exertions to obtain something belonging to him, over which the usual rites may be held.\n\nHair or nailparings are most sought for this purpose, but, if these cannot be obtained, a portion of the clothing worn by the deceased suffices.\n\nSuch remains are called eta , a word which seems to mean something brought from one place to another.\n\nThrough a confusion between objective and subjective connection, these relics, which bring the deceased to mind, are suppposed to bring the soul to the place where the funeral ceremonies are held."

