[content]
body = "The reason of this, no doubt, is that no loss of life or injury to person or property can be directly connected with a bush, or grass, or a stone, without, at least, the intervention of human agency; while, in the nature of things, men must occasionally be drowned in rivers, canoes capsized in the sea, and property and life destroyed or injured by flood or landslip, or other natural causes.\n\nTimor fecit deos , and those natural features and objects which experience has shown to be more frequently the apparent cause of mishaps, have more regard paid to them, or rather to their animating principles, than those which have proved to be innocuous.\n\nEvery man worships that from which he has most to fear or most to expect, and it is commonly something with which he is daily brought into contact.\n\nThus, fishermen pay most attention to the indwelling spirits of the sea and of the shoals and reefs on which their canoes might be wrecked; while the agriculturist worships the spirit of the stream that flows near his dwelling, or that of the cliff or mass of rock which overhangs his plantation, and those of the gigantic silk-cotton trees, whose downfall so frequently crushes to death the inhabitant of the forest.\n\nObjects of worship are thus local, and are worshipped only by those in the neighbourhood.\n\nIn most cases worship and sacrifice are made in the habitat of the spirit, or god, under the boulder of rock, or on the bank of the, stream or lagoon; and, as the nature of the god is well understood, as he is believed to be the indwelling spirit of the rock or the stream, there is no need for any myth explanatory of his origin, or for an image or tangible representation of him.\n\nThis is the condition in which the great majority of the Tshi tribes are at the present day.\n\nThe first change appears to be caused by the making of an image, or simulacrum , of a god, which has the effect of weakening the tie between the indwelling spirit and the object it animates.\n\nIf the image were kept in the habitat of the local god, the connection of the god with the particular rock, cliff, or stream would not be lost sight of; but it would serve no useful purpose to keep an image there, since the god himself is present, and the only object in making one is to bring the god to some place nearer at hand, which will be more convenient for the worshippers, and at the same time bring the protecting power more directly into contact with them.\n\nTo effect this removal of a god it is a sine qua non that the simulacrum must be made from material obtained from the habitat of the god, or be a portion of that which he animates."

