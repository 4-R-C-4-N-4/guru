[content]
body = "The reason no doubt is, that the Yoruba kings and chiefs are not sufficiently powerful to be able to sacrifice life on a large scale; for the more powerful the monarch, the more he can afford to disregard public opinion, and since the masses supply the victims, human sacrifices are never regarded by them with favour.\n\nWhether, when Yoruba was a homogeneous and powerful state, human sacrifices were a state institution, as they were in Dahomi, we have no means of ascertaining, but all the probabilities point in that direction.\n\nDuring the period that the Yorubas have been known to Europeans no large number of victims has been put to death even on the occasion of the death of a king.\n\nA king of Oyo died on April 27th, 1859, and only four men were sacrificed, but forty-two of his wives poisoned themselves in order to accompany him to the Land of the Dead.\n\nIn Ondo about twenty persons were sacrificed when a king died, and there was an established procedure, one victim having to be immolated when the corpse was washed, four at different entrances to the palace, and a sixth in the market-place.\n\nOn the day of the burial from eight to ten victims, with a cat, were either killed and interred with the corpse or buried alive, and during the three months which are required to elapse before a new king can be installed there were occasional sacrifices.\n\nIn 1882 the king of Ondo entered into an engagement with the government of Lagos to put an end to human sacrifices, but he does not appear to have kept it.\n\nAt the present day, amongst all the tribes, when a king or chief dies it is usual for two of his wives to commit suicide, and should no volunteers be forthcoming, two are selected and put to death.\n\nHorses are often killed and buried with their owners.\n\nThere was until very recently, and perhaps still is, an annual human sacrifice at Abeokuta, called the \"basket-sacrifice,\" a euphemism designed to conceal the real nature of the ceremony.\n\nThe victim was enclosed in a long basket, as in Dabomi, from whence perhaps the custom was adopted, thrown down from a height, and despatched by a mob armed with clubs.\n\nIt was a national offering, but when times were prosperous the victim was often spared and dedicated to a god, whose temple-slave be then became.\n\nThere used also to be an annual sacrifice of one human victim at Ikoradu, and a similar offering every sixth year to the god Ogun at Ikriku.\n\nIn times of great urgency human sacrifices are offered to some of the gods, for example, to Shango, Ifa, Elegba, Ogun, Olokun, and Olosa; but they are nearly always made at night, and the people are required to remain in their houses."

