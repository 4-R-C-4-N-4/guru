body = "The ado is a very small calabash, commonly used for keeping medicinal powders in.] and goats, and twenty fowls, and went to make a present to the head wife.[1] The head wife asked whence all these things came, and when she had been told, she refused to accept them.\n\nShe said she would send her own child to do the same, and that she could easily get as much.[2] Then the head wife made palm-oil, and gave it to her own little girl, and told her to go and sell it in the market.\n\nThe little girl -went to the market.\n\nThe goblin came, bought palin-oil of her, and paid her with cowries.\n\nHe gave the proper number of cowries, but the little girl hid one and pretended that he had not given her enough.\n\n\"What am I to do?\" said the goblin.\n\n\"I have no more cowries.\" \"Oh,\" said the little girl, \"I will follow you to your house, and then you can pay me.\" And the goblin said: \"Very well.\" Then the two walked together, and presently the goblin began singing, as he had done the first time.\n\nHe sang:-- \"Oh young palm-oil seller, You must now turn back.\" [1.\n\nHead wife, Iyale ( Iya-ile , Mistress of the House).\n\nAs already explained, the subordinate wives, of which the mother of the girl in the story was one, are called Iya-wo .\n\n2.\n\nFrom the European point of view this would appear to be a good trait on the part of the iyale , for the inference would be that she did not wish to deprive the sub-wife of so much property, but that is not the native view.\n\nTo the native mind a person only refuses a present when he is nurturing rancour against the donor, and to refuse a gift is regarded is a sign of enmity.] And the little girl sang:-- \"I will not turn back.\" And the goblin:-- You must leave the track.\" And the girl:-- \"I will not turn back.\" Then the goblin said: \"Very well.\n\nCome along.\" And they walked on till they reached the land of dead people.\n\nThe goblin gave the little girl some palm-nuts, and told her to make palm-oil.\n\nHe said: \"When the palm-oil is made, eat it yourself, and bring me the ha-ha .\" And the little girl eat the palm-oil and brought the ha-ha to the goblin.\n\nAnd the goblin said: \"Very well.\" Then the goblin gave a banana to the little girl, and told her to peel it.\n\nHe said: \"Eat the banana yourself and bring me the skin.\" And the little girl eat the banana and carried the skin to the goblin."

