[content]
body = "The Modakekes, with an Ibadan contingent, were at Alodakeke watching the Ifes, who, with the Jebu force under the Serikei , were encamped about two miles to the south.\n\nIn accordance with the terms of the agreement, Commissioners were sent to the interior by the Government of Lagos to take steps to break up the camps.\n\nThese proved to be towns rather than camps, since they consisted of the ordinary mud-walled houses of the natives, were defended by loop-holed mud walls, and contained many thousands of women and children.\n\nThe Ibadan camp at Kiji, which had been in existence for seven years, was estimated to contain between 50,000 and 60,000 inhabitants, at least two-thirds of whom were non-combatants, and the Oke Mesi camp 40,000.\n\nThese two camps were evacuated and burned on September 28th, 1886, their occupants returning to their former homes; but an unexpected obstacle was now offered by the Modakekes, who first asked for a delay, and then positively refused to carry out the agreement and quit their town, alleging that they could not leave the spot where their forefathers were buried.\n\nThe fact was they feared that if they remained on the soil of Ife, the Ifes would revenge themselves upon them for the destruction of the holy city, and that if they moved to lbadan territory the lbadans would enslave them; and after some further delay, the Commissioners, finding there was no prospect of the Modakekes keeping their promise, returned to Lagos.\n\nThe Ilorins had not been parties to the agreement of June 4th, but the Commissioners endeavoured to arrange a peace between them and the Ibadans, and induce them to abandon their camps at Ofa and Ikirun; this, however, did not succeed, and the war between these two tribes continued.\n\nIn the meantime, while the interior had been disturbed by these protracted native wars, the colony of Lagos had received further extensions, Ketonu, a district on the eastern shores of Lake Denham Waters, having at the request of the natives, who feared French aggression, been declared British in January, 1880; while Appa, which lies between Ketonii and Badagry, was placed within the British jurisdiction in 1883.\n\nBy Letters Patent, dated 13th January, 1886, Lagos was made a separate colony, independent of the government of the Gold Coast."

