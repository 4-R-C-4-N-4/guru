[content]
body = "A temple is called Ile Orisha , \"House of the Orisha.\" The Yoruba gods are almost invariably represented by images in human form, which appear grotesque, but are not meant to be so, the grotesqueness being merely the result of want of skill.\n\nThese images are regarded as emblems of absent gods.\n\nThey themselves are not worshipped, and there is no idolatry in the proper sense of the word, though no doubt there is a tendency to confuse the symbol with the god.\n\nLikewise, through a confusion of objective and subjective connection, there is an idea that the god enters into the image to receive the sacrifices offered by his faithful followers, and to listen to their adoration and prayers.\n\nEarthen vessels receive the libations of blood -and palm-oil, while the yolks of eggs, which here, as elsewhere in West Africa, are regarded as offerings peculiarly proper to the gods, are smeared upon the posts, door-sills, and threshold.[1] In important temples, and also in the houses of kings and chiefs of high rank, a tall drum, called a gbedu , is kept.\n\nIt is usually covered with carvings representing animals and birds, and the phallus .\n\nThis drum is only beaten at religious fetes and public ceremonies, and a portion of the blood of the victims immolated is always sprinkled upon the symbolic carvings, upon which palm-wine, the yolks of eggs, and the feathers of sacrificed chickens are also smeared.\n\nIn this case the offering is to the protecting spirit of the drum, which is that of a slave who has been sacrificed on it.\n\nThis plan of supplying an artificial guardian-spirit for objects, other than natural objects, which are considered of importance, is a development of ghostworship, and on the Gold Coast such guardians are provided for the \"stools\" of kings and chiefs, as well as for temple and state drums.\n\nSacrifice is the most important part of ceremonial worship, and no god can be consulted without it, the value of the offering varying with the importance of the occasion.\n\nBesides the offerings thus made for special purposes, or on special occasions, persons who are the followers of a god-that is, those who wear his distinguishing badge and are believed to be under his protection- make, as a rule, daily offerings of small [1.\n\nA purificatory egg was used to propitiate the goddess Isis (Juvenal, Sat.\n\nvi.\n\n518).] value, such as a few cowries, or a little maize-flour, palm-oil, or palm-wine.\n\nAs has already been mentioned, each god has certain animals which it is proper to sacrifice to him; to use the phraseology of the Old Testament, every god has his \"clean\" and his \"unclean\" animals."

