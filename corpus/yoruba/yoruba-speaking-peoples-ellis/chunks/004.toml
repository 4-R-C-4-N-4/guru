[content]
body = "It is only after crossing the narrow lagoon or creek called the Ajarra Creek, which runs in a convex curve from the Porto Novo lagoon to the Okpara, that stones are found in the soil; and about twenty miles to the west of this there appears to have been at one time a great bay, the northern limit of which was the Ko, or Great Marsh, of Dahomi, thirty-five iniles from the present coastline.\n\nThe dotted line in the accompanying map shows the probable position of the ancient coast-line between the Volta River and Lekki.\n\nNorthward of the old coast-line the Yoruba country rises very gradually in a succession of low-lying plateans.\n\ntraversed by a few lines of low hills, or undulations in the groand; but a chain of mountains, whose general direction is east and west, extends, at about eight degrees north latitude, from Dahomi to the northern border of Ijesa, where the country is rugged and difficult.\n\nIsolated and densely-wooded hills, from 800 to 1,200 feet high, are also found in Ife and Ondo.\n\nIn some parts, as at Sakiti, north of Ajarra, and at Abeokuta, isolated masses of granite afford evidence of great denudation.\n\nIn fact the whole western coast of Africa, between the Isles de Los, seventy miles north of Sierra Leone, and Lagos, and probably beyond those limits, shows traces of an enormous denudation.\n\nThe table-topped Kofiu Mountain, which rises sheer from the plain north of the.-Melikuri River to a height of 2,000 feet, is the sole remnant of a vast cap of sandstone that doubtless at one time covered the whole of that part of the country; and the Krobo Mountain, an isolated and precipitous mass, 800 feet high, situated in the Krobo plain on the Gold Coast, together with the table-topped mountains with vertical cliffs in the Ataklu district, to the north of the Quittah (Keta) lagoon, will probably, when geologically examined, prove to be other vestiges of the same sandstone formation.\n\nOf the early history of the Yoruba-speakino, peoples nothing is known, except what can be gleaned from Dalzel's \"History of Dahomey,\" 1793, from which it would appear that, at the beginning of the eighteenth century, all the different tribes were united, and were ruled by a king who resided at Old Oyo, sometimes called Katunga.\n\nThe kingdom of Yoruba also seems to have been more powerful than the other two great African kingdoms, Dahomi and Ashanti."

