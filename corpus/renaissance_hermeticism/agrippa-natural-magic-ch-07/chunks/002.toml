text_name = "Agrippa: The Philosophy of Natural Magic, Chapter VII — Of the Kinds of Compounds, what Relation They Stand in to the Elements, and What Relation There Is Betwixt the Elements Themselves and the Soul, Senses and Dispositions of Men"
section = "Chapter VII, Section 1b"
translator = "Henry Morley; L. W. de Laurence ed."
