[content]
body = "The earth signifies a slow and firm motion; the water signifies fearfulness and sluggishness, and remissness in working; air signifies cheerfulness and an amiable disposition; but fire a fierce, quick and angry disposition.\n\nThe Elements, therefore, are the first of all things, and all things, are of and according to them, and they are in all things, and diffuse their virtues through all things."

