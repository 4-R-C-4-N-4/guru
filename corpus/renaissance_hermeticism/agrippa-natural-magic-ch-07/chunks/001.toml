[content]
body = "CHAPTER VII.\n\nOf the Kinds of Compounds, what Relation They Stand in to the Elements, and What Relation There Is Betwixt the Elements Themselves and the Soul, Senses and Dispositions of Men .\n\nNext after the four simple Elements follow the four kinds of perfect Bodies compounded of them, and they are Stones, Metals, Plants and Animals: and although unto the generation of each of these all the Elements meet together in the composition, yet every one of them follows, and resembles one of the Elements, which is most predominant.\n\nFor all Stones are earthy for they are naturally heavy and descend, and so hardened with dryness that they cannot be melted.\n\nBut Metals are waterish and may be melted, which naturalists confess, and chemists find to be true, viz., that they are generated of a viscous Water or waterish argent vive.\n\nPlants have such an affinity with the Air, that unless they be abroad in the open air, they do neither bud nor increase.\n\nSo also all Animals Have in their Natures a most fiery force, And also spring from a Celestial source.\n\n[paragraph continues] And Fire is so natural to them, that that being extinguished they presently die.\n\nAnd, again, every one of those kinds is distinguished within itself by reason of degrees of the Elements.\n\nFor amongst the Stones they especially are called earthy that are dark and more heavy; and those waterish which are transparent and are compacted of water, as crystal, beryl and pearls in the shells of fishes; and they are called airy which swim upon the water, and are spongeous, as the stones of a sponge, the pumice stone and the stone sophus; and they are called fiery out of which fire is extracted, or which are produced of fire, as thunder-bolts, fire-stones and the stone asbestos.\n\nAlso amongst Metals, lead and silver are earthy; quicksilver is waterish; copper and tin are airy; and gold and iron are fiery.\n\nIn Plants also, the roots resemble the earth by reason of their thickness; and the leaves water, because of their juice; flowers the air, because of their subtility, and the seeds the fire, by reason of their multiplying spirit.\n\nBesides, they are called some hot, some cold, some moist, some dry, borrowing their names from the qualities of the Elements.\n\nAmongst Animals also, some are in comparison of others earthy, and dwell in the bowels of the earth, as worms and moles, and many other small creeping vermin; others are watery, as fishes; others airy, which cannot live out of the air; others also are fiery, living in the fire, as salamanders, and crickets, such as are of a fiery heat, as pigeons, ostriches, lions, and such as the wise men call beasts breathing fire.\n\nBesides, in animals the bones resemble the earth, flesh the air, the vital spirit the fire, and the humors the water.\n\nAnd these humors also partake of the Elements, for yellow choler is instead of fire, blood instead of air, phlegm instead of water, and black choler, or melancholy, instead of earth.\n\nAnd lastly, in the Soul itself, according to Austin, the understanding resembles fire, reason the air, imagination the water, and the senses the earth.\n\nAnd these senses also are divided amongst themselves by reason of the Elements, for the sight is fiery, neither can it perceive without fire and light; the hearing is airy, for a sound is made by the striking of the air; the smell and taste resemble the water, without the moisture of which there is neither smell nor taste; and lastly, the feeling is wholly earthy, and taketh gross bodies for its object.\n\nThe actions, also, and the operations of man are governed by the Elements."

