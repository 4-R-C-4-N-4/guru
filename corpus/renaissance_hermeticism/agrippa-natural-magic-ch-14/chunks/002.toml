[content]
body = "And we know how to do that, and have seen it done; but we could make no more Gold than the weight of that was out of which we extracted the Spirit; for seeing that [ gold ] is an extense form, and not intense, it cannot beyond its own bounds change an imperfect body into a perfect; which I deny not, but may be done by another way."

