[content]
body = "But Hermes describes the most powerful fume to be that which is compounded of the Seven Aromatics, according to the powers of the Seven Planets—for it receives from Saturn, pepper-wort; from Jupiter, nutmeg; from Mars, lignum aloes; from the Sun, mastic; from Venus, saffron; from Mercury, cinnamon; and from the Moon, the myrtle."

