[content]
body = "This is the Catholicum of the Philosophers, by which all these philosophers have attained long life for resisting diseases, and they have attained this end entirely and most effectually, and so, according to their judgment, they named it The Tincture of the Philosophers.\n\nFor what can there be in the whole range of medicine greater than such purgation of the body, by means whereof all superfluity is radically removed from it and transmuted?\n\nFor when the seed is once made sound all else is perfected.\n\nWhat avails the ill-founded purgation of the sophists since it removes nothing as it ought?\n\nThis, therefore, is the most excellent foundation of a true physician, the regeneration of the nature, and the restoration of youth.\n\nAfter this, the new essence itself drives out all that is opposed to it.\n\nTo effect this regeneration, the powers and virtues of the Tincture of the Philosophers were miraculously discovered, and up to this time have been used in secret and kept concealed by true Spagyrists.\n\nHERE ENDS THE BOOK CONCERNING THE TINCTURE OF THE PHILOSOPHERS.\n\nNOTES 1 The Arcanum of a substance is not the virtue ( virtus ) but the essence ( vir ) and the potency ( potentia ), and is stronger than the virtue; nevertheless, an old error of the doctors conferred the name of virtues upon the potential essences.\n\n- Paramirum , Lib.\n\nIV.\n\nMany things are elsewhere set forth concerning the Quintessence, but what is described is really a separation or extraction of the pure from the impure, not a true quintessence, and it is more correctly termed an Arcanum.\n\n- Explicatio Totius Astronomiae .\n\n2 The office of Vulcan is the separation of the good from the bad.\n\nSo the Art of Vulcan, which is Alchemy, is like unto death, by which the eternal and the temporal are divided one from another.\n\nSo also this art might be called the death of things.\n\n- De Morbis Metallicis , Lib.\n\nI., Tract III., c.\n\n1.\n\nVulcan is an astral and not a corporal fabricator.\n\n- De Caduco Matricis , Par.\n\nVI.\n\nThe artist working in metals and other minerals transforms them into other colours, and in so doing his operation is like that of the heaven itself.\n\nFor as the artist excocts by means of Vulcan, or the igneous element, so heaven performs the work of coction through the Sun.\n\nThe Sun, therefore, is the Vulcan of heaven accomplishing coction in the earth.\n\n- De Icteritiis.\n\nVulcan is the fabricator and architect of all things, nor is his habitation in heaven only, that is, in the firmament, but equally in all the other elements.\n\n- Lib.\n\nMeteorum , c.\n\n4.\n\nWhere the three prime principles are wanting, there also the igneous essence is absent.\n\nThe Igneous Vulcan is nothing else but Sulphur, Sal Nitrum, and Mercury.\n\n- Ibid.\n\n, c.5.\n\n3 The Book of the Revelation of Hermes, interpreted by Theophrastus Paracelsus, concerning the Supreme Secret of the World, seems to have been first brought to light by Benedictus Figulus, and appeared as a piece de résistance in his \"Golden and Blessed Casket of Nature's Marvels\", of which an English translation has been very recently published.\n\n(\"A Golden and Blessed Casket of Nature's Marvels\".\n\nBy Benedictus Figulus.\n\nNow first done into English from the German original published at Frankfort in the year 1608.\n\nLondon: James Elliott and Co.\n\n8vo., 1893)."

