[content]
body = "O thou treasure of treasures, mystery of mysteries, called by Avicenna \"an unspeakable substance\", the purest and most perfect soul of the world, than which there is nothing more costly under Heaven, unfathomable in nature and power, wonderful in virtue and works, having no equal among creatures, possessing the virtues of all bodies under Heaven!\n\nFor from it flow the water of life, the oil and honey of eternal healing, and thus hath it nourished them with honey and water from the rock.\n\nTherefore, saith Morienus: \"He who hath it, the same also hath all things\".\n\nBlessed art Thou, Lord God of our Fathers, in that Thou hast given the prophets this knowledge and understanding, that they have hidden these things (lest they should be discovered by the blind, and those drowned in worldly godlessness) by which the wise and the pious have praised Thee!\n\nFor the discoverers of the mystery of this thing to the unworthy are breakers of the seal of Heavenly Revelation, thereby offending God's Majesty, and bringing upon themselves many misfortunes and the punishments of God.\n\nTherefore, I beg all Christians, possessing this knowledge, to communicate the same to nobody, except it be to one living in Godliness, of well-proved virtue, and praising God, Who has given such a treasure to man.\n\nFor many seek, but few find it.\n\nHence the impure and those living in vice are unworthy of it.\n\nTherefore is this Art to be shewn to all God-fearing persons, because it cannot be bought with a price.\n\nI testify before God that I lie not, although it appear impossible to fools, that no one has hitherto explored Nature so deeply.\n\nThe Almighty be praised for having created this Art and for revealing it to God-fearing men.\n\nAmen.\n\nAnd thus is fulfilled this precious and excellent work, called the revealing of the occult spirit, in which lie hidden the secrets and mysteries of the world.\n\nBut this spirit is one genius, and divine, wonderful, and lordly power.\n\nFor it embraces the whole world, and overcomes the Elements and the fifth Substance.\n\nTo our Trismegistus Spagyrus, Jesus Christ, be praise and glory immortal.\n\nAmen."

