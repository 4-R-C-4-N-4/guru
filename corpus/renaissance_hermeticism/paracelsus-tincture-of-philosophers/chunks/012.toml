[content]
body = "This spiritual substance is neither heavenly nor hellish, but an airy, pure, and hearty body, midway between the highest and lowest, without reason, but fruitful in works, and the most select and beautiful of all other heavenly things.\n\nThis work of God is far too deep for understanding, for it is the last, greatest, and highest secret of Nature.\n\nIt is the Spirit of God, which in the Beginning filled the earth and brooded over the waters, which the world cannot grasp without the gracious interposition of the Holy Spirit and instruction from those who know it, which also the whole world desires for its virtue, and which cannot be prized enough.\n\nFor it reaches to the planets, raises the clouds, drives away mists, gives its light to all things, turns everything into Sun and Moon, bestows all health and abundance of treasure, cleanses the leper, brightens the eyes, banishes sorrow, heals the sick, reveals all hidden treasures, and, generally, cures all diseases.\n\nThrough this spirit have the philosophers invented the Seven Liberal Arts, and thereby gained their riches.\n\nThrough the same Moses made the golden vessels in the Ark, and King Solomon did many beautiful works to the honour of God.\n\nTherewith Moses built the Tabernacle, Noah the Ark, Solomon the Temple.\n\nBy this, Ezra restored the Law, and Miriam, Moses' sister, was hospitable; Abraham, Isaac, and Jacob, and other righteous men, have had lifelong abundance and riches; and all the saints possessing it have therewith praised God.\n\nTherefore is its acquisition very hard, more than that of gold and silver.\n\nFor it is the best of all things, because, of all things mortal that man can desire in this world, nothing can compare with it, and in it alone is truth.\n\nHence it is called the Stone and Spirit of Truth; in its works is no vanity, its praise cannot be sufficiently expressed.\n\nI am unable to speak enough of its virtues, because its good qualities and powers are beyond human thoughts, unutterable by the tongue of man, and in it are found the properties of all things.\n\nYea, there is nothing deeper in Nature.\n\nO unfathomable abyss of God's Wisdom, which thus hath united and comprised in the virtue and power of this One Spirit the qualities of all existing bodies!\n\nO unspeakable honour and boundless joy granted to mortal man!\n\nFor the destructible things of Nature are restored by virtue of the said Spirit.\n\nO mystery of mysteries, most secret of all secret things, and healing and medicine of all things!\n\nThou last discovery in earthly natures, last best gift to Patriarchs and Sages, greatly desired by the whole world!\n\nOh, what a wondrous and laudable spirit is purity, in which stand all joy, riches, fruitfulness of life, and art of all arts, a power which to its initiates grants all material joys!\n\nO desirable knowledge, lovely above all things beneath the circle of the Moon, by which Nature is strengthened, and heart and limbs are renewed, blooming youth is preserved, old age driven away, weakness destroyed, beauty in its perfection preserved, and abundance ensured in all things pleasing to men!\n\nO thou spiritual substance, lovely above all things!\n\nO thou wondrous power, strengthening all the world!\n\nO thou invincible virtue, highest of all that is, although despised by the ignorant, yet held by the wise in great praise, honour, and glory, that - proceeding from humours - wakest the dead, expellest diseases, restorest the voice of the dying!"

