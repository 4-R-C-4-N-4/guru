[content]
body = "But at this time, when Theophrastus Paracelsus has arrived as the Monarch of Arcana, the opportunity is at hand for finding out those things which were occult to all Spagyrists before me.\n\nWherefore I say, Take only the rose-coloured blood from the Lion and the gluten from the Eagle.\n\nWhen you have mixed these, coagulate them according to the old process, and you will have the Tincture of the Philosophers, which an infinite number have sought after and very few have found.\n\nWhether you will or not, sophist, this Magistery is in Nature itself, a wonderful thing of God above Nature, and a most precious treasure in this Valley of Sorrows.\n\nIf you look at it from without it seems a paltry thing to transmute another into something far more noble than it was before.\n\nBut you must, nevertheless, allow this, and confess that it is a miracle produced by the Spagyrist, who by the art of his preparation corrupts a visible body which is externally vile, from which he excites another most noble and most precious essence.\n\nIf you, in like manner, have learnt anything from the light of Aristotle, or from us, or from the rules of Serapio, come forth, and bring that knowledge experimentally to light.\n\nPreserve now the right of the Schools, as becomes a lover of honour and a doctor.\n\nBut if you know nothing and can do nothing, why do you despise me as though I were an irrational Helvetian cow, and inveigh against me as a wandering vagabond?\n\nArt is a second Nature and a universe of its own, as experience witnesses, and demonstrates against you and your idols.\n\nSometimes, therefore, the Alchemist compounds certain simples, which he afterwards corrupts according to his need, and prepares thence another thing.\n\nFor thus very often out of many things one is made, which effects more than Nature of herself can do, as in Gastaynum it is perfectly well known that Venus is produced from Saturn; in Carinthia, Luna out of Venus; and in Hungary, Sol out of Luna; to pass over in silence for the time being the transmutations of other natural objects, which were well known to the Magi, and more wonderfully than Ovid narrates in his Metamorphoses do they come to the light.\n\nThat you may rightly understand me, seek your Lion in the East, and your Eagle in the South, for this our work which has been undertaken.\n\nYou will not find better instruments than Hungary and Istria produce.\n\nBut if you desire to lead from unity by duality in trinity with equal permutation of each, then you should direct your journey to the South; so in Cyprus shall you gain all your desire, concerning which we must not dilate more profusely than we have done at present.\n\nThere are still many more of these arcana which exhibit transmutations, though they are known to few.\n\nAnd although these may by the Lord God be made manifest to anyone, still, the rumour of this Art does not on that account at once break forth, but the Almighty gives therewith the understanding how to conceal these and other like arts even to the coming of Elias the Artist, at which time there shall be nothing so occult that it shall not be revealed.\n\nYou also see with your eyes (though there is no need to speak of these things, which may be taken derisively by some) that in the fire of Sulphur is a great tincture for gems, which, indeed, exalts them to a loftier degree than Nature by herself could do.\n\nBut this gradation of metals and gems shall be omitted by me in this place, since I have written sufficiently about it in my Secret of Secrets, in my book on the Vexations of Alchemists, and abundantly elsewhere."

