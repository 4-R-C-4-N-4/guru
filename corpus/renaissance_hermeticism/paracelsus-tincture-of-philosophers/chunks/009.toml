[content]
body = "Among the many writings which have been fabulously attributed to Hermes, there does not seem to be any record of an apocalypse, and it is impossible to say what forged document may have been the subject of interpretation by Paracelsus.\n\nAs the collection of Figulus is now so readily accessible, it is somewhat superfluous to reproduce the treatise here, but since this translation claims to include everything written by the physician of Hohenheim on the subject of Alchemy and the Universal Medicine, it is appended at this point.\n\nIt should be premised that Benedictus Figulus complains bitterly of the mutilation and perversion to which the works of Paracelsus were subjected, and the Revelation of Hermes seems in many parts to betray another hand, especially in its quotation of authorities who are not countenanced by its reputed author.\n\nHermes, Plato, Aristotle, and other philosophers, flourishing at different times, who have introduced the Arts, and more especially have explored the secrets of inferior Creation, all these have eagerly sought a means whereby man's body might be preserved from decay and become endued with immortality.\n\nTo them it was answered that there is nothing which might deliver the mortal body from death; but that there is One Thing which may postpone decay, renew youth; and prolong short human life (as with the patriarchs).\n\nFor death was laid as a punishment upon our first parents, Adam and Eve, and will never depart from all their descendants.\n\nTherefore, the above philosophers, and many others, have sought this One Thing with great labour, and have found that that which preserves the human body from corruption, and prolongs life, conducts itself, with respect to other elements, as it were like the Heavens; from which they understood that the Heavens are a substance above the Four Elements.\n\nAnd just as the Heavens, with respect to the other elements, are held to be the fifth substance (for they are indestructible, stable, and suffer no foreign admixture), so also this One Thing (compared to the forces of our body) is an indestructible essence, drying up all the superfluities of our bodies, and has been philosophically called by the above-mentioned name.\n\nIt is neither hot and dry like fire, nor cold and moist like water, nor warm and moist like air, nor dry and cold like earth.\n\nBut it is a skilful, perfect equation of all the Elements, a right commingling of natural forces, a most particular union of spiritual virtues, an indissoluble uniting of body and soul.\n\nIt is the purest and noblest substance of an indestructible body, which cannot be destroyed nor harmed by the Elements, and is produced by Art.\n\nWith this, Aristotle prepared an apple, prolonging life by its scent, when he, fifteen days before his death, could neither eat nor drink on account of old age.\n\nThis spiritual Essence, or One Thing, was revealed from above to Adam, and was greatly desired by the Holy Fathers; this also Hermes and Aristotle call the Truth without Lies, the most sure of all things certain, the Secret of all Secrets.\n\nIt is the Last and the Highest Thing to be sought under the Heavens, a wondrous closing and finish of philosophical work, by which are discovered the dews of Heaven and the fastnesses of Earth.\n\nWhat the mouth of man cannot utter is all found in this spirit.\n\nAs Morienus says: \"He who has this has all things, and wants no other aid.\n\nFor in it are all temporal happiness, bodily health, and earthly fortune."

