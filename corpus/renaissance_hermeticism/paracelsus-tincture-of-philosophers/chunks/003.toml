[content]
body = "On which account, from my standpoint, many rustics have been ennobled; but, on the other hand, through the speculative and opinionative art of these many nobles have been changed into clowns, and since they carried golden mountains in their head before they had put their hand to the fire.\n\nFirst of all, then, there must be learnt - digestions, distillations, sublimations, reverberations, extractions, solutions, coagulations, fermentations, fixations, and every instrument which is requisite for this work must be mastered by experience, such as glass vessels, cucurbites, circulators, vessels of Hermes, earthen vessels, baths, blast-furnaces, reverberatories, and instruments of like kind, also marble, coals, and tongs.\n\nThus at length you will be able to profit in Alchemy and in Medicine.\n\nBut so long as, relying on fancy and opinion, you cleave to your fictitious books, you are fitted and predestinated for no one of these things.\n\nCHAPTER II.\n\nCONCERNING THE DEFINITION OF THE SUBJECT AND MATTER OF THE TINCTURE OF THE PHILOSOPHERS.\n\nBefore I come, then, to the process of the Tincture, it is needful that I open to you the subject thereof: for, up to the present time, this has always been kept in a specially occult way by the lovers of truth.\n\nSo, then, the matter of the Tincture (when you understand me in a Spagyrical sense) is a certain thing which, by the art of Vulcan2, passes out of three essences into one essence, or it may remain.\n\nBut, that I may give it its proper name, according to the use of the ancients, though it is called by many the Red Lion, still it is known by few.\n\nThis, by the aid of Nature and the skill of the Artist himself, can be transmuted into a White Eagle, so that out of one two are produced; and beyond this the brightness of gold does not shine so much for the Spagyrist as do these two when kept in one.\n\nNow, if you do not understand the use of the Cabalists and the old astronomers, you are not born by God for the Spagyric art, or chosen by Nature for the work of Vulcan, or created to open your mouth concerning Alchemical Arts.\n\nThe matter of the Tincture, then, is a very great pearl and a most precious treasure, and the noblest thing next to the manifestation of the Most High and the consideration of men which can exist upon earth.\n\nThis is the Lili of Alchemy and of Medicine, which the philosophers have so diligently sought after, but, through the failure of entire knowledge and complete preparation, they have not progressed to the perfect end thereof.\n\nBy means of their investigations and experiments, only the initial stage of the Tincture has been given to us; but the true foundation, which my colleagues must imitate, has been left for me, so that no one should mingle their shadows with our good intentions.\n\nI, by right after my long experiences, correct the Spagyrists, and separate the false or the erroneous from the true, since, by long investigations, I have found reasons why I should be able justly to blame and to change diverse things.\n\nIf, indeed, I had found out experiments of the ancients better than my own, I should scarcely have taken up such great labours as, for the sake, the utility, and the advantage of all good Alchemists, I have undergone willingly."

