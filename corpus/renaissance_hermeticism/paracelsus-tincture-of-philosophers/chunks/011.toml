[content]
body = "But in its third nature it appears as an aerial body, of an oily nature, almost freed from all imperfections, in which form it does many wondrous works, producing beauty and strength of body, and (a small quantity being taken in the food) preventing melancholy and heating of the gall, increasing the quantity of the blood and seed, so that frequent bleeding becomes necessary.\n\nIt expands the blood vessels, cures withered limbs, restores strength to the sight, in growing persons removes what is superfluous and makes good defects in the limbs.\n\nIn its fourth nature it appears in a fiery form (not quite freed from all imperfections, still somewhat watery and not dried enough), wherein it has many virtues, making the old young and reviving those at the point of death.\n\nFor if to such an one there be given, in wine, a barleycorn's weight of this fire, so that it reach the stomach, it goes to his heart, renewing him at once, driving away all previous moisture and poison, and restoring the natural heat of the liver.\n\nGiven in small doses to old people, it removes the diseases of age, giving the old young hearts and bodies.\n\nHence it is called the Elixir of Life.\n\nIn its fifth and last nature, it appears in a glorified and illuminated form, without defects, shining like gold and silver, wherein it possesses all previous powers and virtues in a higher and more wondrous degree.\n\nHere its natural works are taken for miracles.\n\nWhen applied to the roots of dead trees they revive, bringing forth leaves and fruit.\n\nA lamp, the oil of which is mingled with this spirit, continues to burn for ever without diminution.\n\nIt converts crystals into the most precious stones of all colours, equal to those from the mines, and does mayn other incredible wonders which may not be revealed to the unworthy.\n\nFor it heals all dead and living bodies without other medicine.\n\nHere Christ is my witness that I lie not, for all heavenly influences are united and combined therein.\n\nThis essence also reveals all treasures in earth and sea, converts all metallic bodies into gold, and there is nothing like unto it under Heaven.\n\nThis spirit is the secret hidden from the beginning, yet granted by God to a few holy men for the revealing of these iches to His Glory - dwelling in fiery form in the air, and leading earth with itself to heaven, while from its body there flow whole rivers of living water.\n\nThis spirit flies through the midst of the Heavens like a morning mist, leads its burning fire into the water, and has its shining realm in the heavens.\n\nAnd although these writings may be regarded as false by the reader, yet to the initiated they are true and possible, when the hidden sense is properly understood.\n\nFor God is wonderful in His works, and His wisdom is without end.\n\nThis spirit in its fiery form is called a Sandaraca, in the aerial a Kybrick, in the watery an Azoth, in the earthly Alcohoph and Aliocosoph.\n\nHence they are deceived by these names who, seeking without instruction, think to find this Spirit of Life in things foreign to our Art.\n\nFor although this spirit which we seek, on account of its qualities, is called by these names, yet the same is not in these bodies and cannot be in them.\n\nFor a refined spirit cannot appear except in a body suitable to its nature.\n\nAnd, by however many names it be called, let no one imagine there be different spirits, for, say what one will, there is but one spirit working everywhere and in all things.\n\nThat is the spirit which, when rising, illumines the Heavens, when setting incorporates the purity of Earth, and when brooding has embraced the Waters.\n\nThis spirit is named Raphael, the Angel of God, the subtlest and purest, whom the others all obey as their King."

