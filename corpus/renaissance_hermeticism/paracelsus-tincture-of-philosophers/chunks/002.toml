[content]
body = "I have a treasure hidden in a certain city called Weinden, belonging to Forum Julii, at an inn, - a treasure which neither you, Leo of Rome, nor you, Charles the German, could purchase with all your substance.\n\nAlthough the signed star has been applied to the arcanum of your names, it is known to none but the sons of the divine Spagyric Art.\n\nSo then, you wormy and lousy Sophist, since you deem the monarch of arcana a mere ignorant, fatuous, and prodigal quack, now, in this mid age, I determine in my present treatise to disclose the honourable course of procedure in these matters, the virtues and preparation of the celebrated Tincture of the Philosophers for the use and honour of all who love the truth, and in order that all who despise the true arts may be reduced to poverty.\n\nBy this arcanum the last age shall be illuminated clearly and compensated for all its losses by the gift of grace and the reward of the spirit of truth, so that since the beginning of the world no similar germination of the intelligence and of wisdom shall ever have been heard of.\n\nIn the meantime, vice will not be able to suppress the good, nor will the resources of those vicious persons, many though they be, cause any loss to the upright.\n\nTHE BOOK CONCERNING THE TINCTURE OF THE PHILOSOPHERS.\n\nCHAPTER I.\n\nI, PHILIPPUS Theophrastus Paracelsus Bombast, say that, by Divine grace, many ways have been sought to the Tincture of the Philosophers, which finally all came to the same scope and end.\n\nHermes Trismegistus, the Egyptian, approached this task in his own method.\n\nOrus, the Greek, observed the same process.\n\nHali, the Arabian, remained firm in his order.\n\nBut Albertus Magnus, the German, followed also a lengthy process.\n\nEach one of these advanced in proportion to his own method; nevertheless, they all arrive at one and the same end, at a long life, so much desired by the philosophers, and also at an honourable sustenance and means of preserving that life in this Valley of Misery.\n\nNow at this time, I, Theophrastus Paracelsus Bombast, Monarch of the Arcana, am endowed by God with special gifts for this end, that every searcher after this supreme philosophic work may be forced to imitate and to follow me, be he Italian, Pole, Gaul, German, or whatsoever or whosoever he be.\n\nCome hither after me, all you philosophers, astronomers, and spagyrists, of however lofty a name ye may be, I will show and open to you, Alchemists and Doctors, who are exalted by me with the most consummate labours, this corporeal regeneration.\n\nI will teach you the tincture, the arcanum1, the quintessence, wherein lie hid the foundations of all mysteries and of all works.\n\nFor every person may and ought to believe in another only in those matters, which he has tried by fire.\n\nIf any one shall have brought forward anything contrary to this method of experimentation in the Spagyric Art or in Medicine, there is no reason for your belief in him, since, experimentally, through the agency of fire, the true is separated from the false.\n\nThe light of Nature indeed is created in this way, that by means thereof the proof or trial of everything may appear, but only to those who walk in this light.\n\nWith this light we will teach, by the very best methods of demonstration, that all those who before me have approached this so difficult province with their own fancies and acute speculations have, to their own loss, incurred the danger of their foolishness."

