body = "As I have begun the process of our ancestors with the Tincture of the Philosophers, I will now perfectly conclude it.\n\nCHAPTER V.\n\nCONCERNING THE CONCLUSION OF THE PROCESS OF THE ANCIENTS, MADE BY PARACELSUS.\n\nLastly, the ancient Spagyrists having placed Lili in a pelican and dried it, fixed it by means of a regulated increase of the fire, continued so long until from blackness, by permutation into all the colours, it became red as blood, and therewith assumed the condition of a salamander.\n\nRightly, indeed, did they proceed with such labour, and in the same way it is right and becoming that everyone should proceed who seeks this pearl.\n\nIt will be very difficult for me to make this clearer to you unless you shall have learnt in the School of the Alchemists to observe the degrees of the fire, and also to change your vessels.\n\nFor then at length you will see that soon after your Lili shall have become heated in the Philosophic Egg, it becomes, with wonderful appearances, blacker than the crow; afterwards, in succession of time, whiter than the swan; and at last, passing through a yellow colour, it turns out more red than any blood.\n\nSeek, seek, says the first Spagyrist, and you shall find; knock, and it shall be opened unto you.\n\nIt would be impious and indecorous to put food in the mouth of a perfidious bird.\n\nLet her rather fly to it, even as I, with others before me, have been compelled to do.\n\nBut follow true Art; for this will lead you to its perfect knowledge.\n\nIt is not possible that anything should here be set down more fully or more clearly than I have before spoken.\n\nLet your Pharisaical schools teach you what they will from their unstable and slippery foundation, which reaches not its end or its aim.\n\nWhen at length you shall have been taught as accurately as possible the Alchemistic Art, nothing in the nature of things shall then at length be so difficult which cannot be made manifest to you by the aid of this Art.\n\nNature, indeed, herself does not bring forth anything into the light which is advanced to its highest perfection, as can be seen in this place from the unity, or the union, of our duality.\n\nBut a man ought by Spagyric preparations to lead it thither where it was ordained by Nature.\n\nLet this have been sufficiently said by me, concerning the process of the ancients and my correction of the Tincture of the Philosophers, so far as relates to its preparation.\n\nMoreover, since now we have that treasure of the Egyptians in our hands, it remains that we turn it to our use: and this is offered to us by the Spagyric Magistery in two ways.\n\nAccording to the former mode it can be applied for the renewing of the body; according to the latter it is to be used for the transmutation of metals.\n\nSince, then, I, Theophrastus Paracelsus, have tried each of them in different ways, I am willing to put them forward and to describe them according to the signs indeed of the work, and as in experience and proof they appeared to me better and more perfectly.\n\nCHAPTER VI.\n\nCONCERNING THE TRANSMUTATION OF METALS BY THE PERFECTION OF MEDICINE.\n\nIf the Tincture of the Philosophers is to be used for transmutation, a pound of it must be projected on a thousand pounds of melted Sol.\n\nThen, at length, will a Medicine have been prepared for transmuting the leprous moisture of the metals.\n\nThis work is a wonderful one in the light of Nature, namely, that by the Magistery, or the operation of the Spagyrist, a metal, which formerly existed, should perish, and another be produced."

