[content]
body = "It is the spirit of the fifth substance, a Fount of all Joys ( beneath the rays of the moon), the Supporter of Heaven and Earth, the Mover of Sea and Wind, the Outpourer of Rain, upholding the strength of all things, an excellent spirit above Heavenly and other spirits, giving Health, Joy, Peace, Love; driving away Hatred and Sorrow, bringing in Joy, expelling all Evil, quickly healing all Diseases, destroying Poverty and misery, leading to all good things, preventing all evil words and thoughts, giving man his heart's desire, bringing to the pious earthly honour and long life, but to the wicked who misuse it, Eternal Punishment\".\n\nThis is the Spirit of Truth, which the world cannot comprehend without the interposition of the Holy Ghost, or without the instruction of those who know it.\n\nThe same is of a mysterious nature, wondrous strength, boundless power.\n\nThe Saints, from the beginning of the world, have desired to behold its face.\n\nBy Avicenna this Spirit is named the Soul of the World.\n\nFor, as the Soul moves all the limbs of the body, so also does this Spirit move all bodies.\n\nAnd as the Soul is in all the limbs of the Body, so also is this Spirit in all elementary created things.\n\nIt is sought by many and found by few.\n\nIt is beheld from afar and found near; for it exists in every thing, in every place, and at all times.\n\nIt has the powers of all creatures; its action is found in all elements, and the qualities of all things are therein, even in the highest perfection.\n\nBy virtue of this essence did Adam and the Patriarchs preserve their health and live to an extreme age, some of them also flourishing in great riches.\n\nWhen the philosophers had discovered it, with great diligence and labour, they straightway concealed it under a strange tongue, and in parables, lest the same should become known to the unworthy, and the pearls be cast before swine.\n\nFor if everyone knew it, all work and industry would cease; man would desire nothing but this one thing, people would live wickedly, and the world be ruined, seeing that they would provoke God by reason of their avarice and superfluity.\n\nFor eye hath not seen, nor ear heard, nor hath the heart of man understood what Heaven hath naturally incorporated with this Spirit.\n\nTherefore have I briefly enumerated some of the qualities of this Spirit, to the Honour of God, that the pious may reverently praise Him in His gifts (which gift of God shall afterwards come to them), and I will herewith shew what powers and virtues it possesses in each thing, also its outward appearance, that it may be more readily recognised.\n\nIn its first state, it appears as an impure earthly body, full of imperfections.\n\nIt then has an earthly nature, healing all sickness and wounds in the bowels of man, producing good and consuming proud flesh, expelling all stench, and healing generally, inwardly and outwardly.\n\nIn its second nature, it appears as a watery body, somewhat more beautiful than before, because (although still having its corruptions) its Virtue is greater.\n\nIt is much nearer the truth, and more effective in works.\n\nIn this form it cures cold and hot fevers and is a specific against poisons, which it drives from heart and lungs, healing the same when injured or wounded, purifying the blood, and, taken three times a day, is of great comfort in all diseases."

