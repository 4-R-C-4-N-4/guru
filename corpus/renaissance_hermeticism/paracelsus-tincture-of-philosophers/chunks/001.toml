[content]
body = "THE BOOK CONCERNING THE TINCTURE OF THE PHILOSOPHERS WRITTEN AGAINST THOSE SOPHISTS BORN SINCE THE DELUGE, IN THE AGE OF OUR LORD JESUS CHRIST, THE SON OF GOD; By PH.\n\nTHEOPHRASTUS BOMBAST, of HOHENHEIM, Philosopher of the Monarchia, Prince of Spagyrists, Chief Astronomer, Surpassing Physician, and Trismegistus of Mechanical Arcana.\n\nPREFACE.\n\nSINCE you, O Sophist, everywhere abuse me with such fatuous and mendacious words, on the ground that being sprung from rude Helvetia I can understand and know nothing: and also because being a duly qualified physician I still wander from one district to another; therefore I have proposed by means of this treatise to disclose to the ignorant and inexperienced: what good arts existed in the first age; what my art avails against you and yours against me; what should be thought of each, and how my posterity in this age of grace will imitate me.\n\nLook at Hermes, Archelaus, and others in the first age: see what Spagyrists and what Philosophers then existed.\n\nBy this they testify that their enemies, who are your patrons, O Sophist, at the present time are but mere empty forms and idols.\n\nAlthough this would not be attested by those who are falsely considered your authentic fathers and saints, yet the ancient Emerald Table shews more art and experience in Philosophy, Alchemy, Magic, and the like, than could ever be taught by you and your crowd of followers.\n\nIf you do not yet understand, from the aforesaid facts, what and how great treasures these are, tell me why no prince or king was ever able to subdue the Egyptians.\n\nThen tell me why the Emperor Diocletian ordered all the Spagyric books to be burnt (so far as he could lay his hands upon them).\n\nUnless the contents of those books had been known, they would have been obliged to bear still his intolerable yoke, - a yoke, O Sophist, which shall one day be put upon the neck of yourself and your colleagues.\n\nFrom the middle of this age the Monarchy of all the Arts has been at length derived and conferred on me, Theophrastus Paracelsus, Prince of Philosophy and of Medicine.\n\nFor this purpose I have been chosen by God to extinguish and blot out all the phantasies of elaborate and false works, of delusive and presumptuous words, be they the words of Aristotle, Galen, Avicenna, Mesva, or the dogmas of any among their followers.\n\nMy theory, proceeding as it does from the light of Nature, can never, through its consistency, pass away or be changed: but in the fifty-eighth year after its millennium and a half it will then begin to flourish.\n\nThe practice at the same time following upon the theory will be proved by wonderful and incredible signs, so as to be open to mechanics and common people, and they will thoroughly understand how firm and immovable is that Paracelsic Art against the triflings of the Sophists: though meanwhile that sophistical science has to have its ineptitude propped up and fortified by papal and imperial privileges.\n\nIn that I am esteemed by you a mendicant and vagabond sophist, the Danube and the Rhine will answer that accusation, though I hold my tongue.\n\nThose calumnies of yours falsely devised against me have often displeased many courts and princes, many imperial cities, the knightly order, and the nobility."

