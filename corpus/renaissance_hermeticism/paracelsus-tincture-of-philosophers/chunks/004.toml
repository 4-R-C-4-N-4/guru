[content]
body = "Since, then, the subject of the Tincture has been sufficiently declared, so that it scarcely could or ought to be exceeded in fidelity between two brothers, I approach its preparation, and after I have laid down the experiences of the first age, I wish to add my own inventions; to which at last the Age of Grace will by-and-by give its adhesion, whichever of the patriarchs, O Sophist, you, in the meantime, shall have made leaders.\n\nCHAPTER III.\n\nCONCERNING THE PROCESS OF THE ANCIENTS FOR THE TINCTURE OF THE PHILOSOPHERS, AND A MORE COMPENDIOUS METHOD BY PARACELSUS.\n\nThe old Spagyrists putrefied Lili for a philosophical month, and afterwards distilled therefrom the moist spirits, until at length the dry spirits were elevated.\n\nThey again imbued the caput mortuum with moist spirits, and drew them off from it frequently by distillation until the dry spirits were all elevated.\n\nThen afterwards they united the moisture that had been drawn off and the dry spirits by means of a pelican, three or four times, until the whole Lili remained dry at the bottom.\n\nAlthough early experience gave this process before fixation, none the less our ancestors often attained a perfect realisation of their wish by this method.\n\nThey would, however, have had a shorter way of arriving at the treasure of the Red Lion if they had learnt the agreement of Astronomy with Alchemy, as I have demonstrated it in the Apocalypse of Hermes3.\n\nBut since every day (as Christ says for the consolation of the faithful) has its own peculiar care, the labour for the Spagyrists before my times has been great and heavy; but this, by the help of the Holy Spirit flowing into us, will, in this last age, be lightened and made clear by my theory and practice, for all those who constantly persevere in their work with patience.\n\nFor I have tested the properties of Nature, its essences and conditions, and I know its conjunction and resolution, which are the highest and greatest gift for a philosopher, and never understood by the sophists up to this time.\n\nWhen, therefore, the earliest age gave the first experience of the Tincture, the Spagyrists made two things out of one simple.\n\nBut when afterwards, in the Middle Age, this invention had died out, their successors by diligent scrutiny afterwards came upon the two names of this simple, and they named it with one word, namely, Lili, as being the subject of the Tincture.\n\nAt length the imitators of Nature putrefied this matter at its proper period just like the seed in the earth, since before this corruption nothing could be born from it, nor any arcanum break forth from it.\n\nAfterwards they drew off the moist spirits from the matter, until at length, by the violence of the fire, the dry were also equally sublimated, so that, in this way, just as the rustic does at the proper time of year, they might come to maturity as one after another is wont to ascend and to fall away.\n\nLastly, as after the spring comes summer, they incorporated those fruits and dry spirits, and brought the Magistery of the Tincture to such a point that it came to the harvest, and laid itself out for ripening.\n\nCHAPTER IV.\n\nCONCERNING THE PROCESS FOR THE TINCTURE OF THE PHILOSOPHERS, AS IT IS SHORTENED BY PARACELSUS.\n\nThe ancient Spagyrists would not have required such lengthened labour and such wearisome repetition if they had learnt and practised their work in my school.\n\nThey would have obtained their wish just as well, with far less expense and labour."

