[content]
body = "This fact has rendered that same Aristotle, with his ill-founded philosophy, fatuous.\n\nFor truly, when the rustics in Hungary cast iron at the proper season into a certain fountain, commonly called Zifferbrunnen, it is consumed into rust, and when this is liquefied with a blast-fire, it soon exists as pure Venus, and never more returns to iron.\n\nSimilarly, in the mountain commonly called Kuttenberg, they obtain a lixivium out of marcasites, in which iron is forthwith turned into Venus of a high grade, and more malleable than the other produced by Nature.\n\nThese things, and more like them, are known to simple men rather than to sophists, namely, those which turn one appearance of a metal into another.\n\nAnd these things, moreover, through the remarkable contempt of the ignorant, and partly, too, on account of the just envy of the artificers, remain almost hidden.\n\nBut I myself, in Istria, have often brought Venus to more than twenty-four (al.\n\n38) degrees, so that the colour of Sol could not mount higher, consisting of Antimony or or Quartal, which Venus I used in all respects as other kinds.\n\nBut though the old artists were very desirous of this arcanum, and sought it with the greatest diligence, nevertheless, very few could bring it by means of a perfect preparation to its end.\n\nFor the transmutation of an inferior metal into a superior one brings with it many difficulties and obstacles, as the change of Jove into Luna, or Venus into Sol.\n\nPerhaps on account of their sins God willed that the Magnalia of Nature should be hidden from many men.\n\nFor sometimes, when this Tincture has been prepared by artists, and they were not able to reduce their projection to work its effects, it happened that, by their carelessness and bad guardianship, this was eaten up by fowls, whose feathers thereupon fell off, and, as I myself have seen, grew again.\n\nIn this way transmutation, through its abuse from the carelessness of the artists, came into Medicine and Alchemy.\n\nFor when they were unable to use the Tincture according to their desire, they converted the same to the renovation of men, as shall be heard more at large in the following chapter.\n\nCHAPTER VII.\n\nCONCERNING THE RENOVATION OF MEN.\n\nSome of the first and primitive philosophers of Egypt have lived by means of this Tincture for a hundred and fifty years.\n\nThe life of many, too, has been extended and prolonged to several centuries, as is most clearly shewn in different histories, though it seems scarcely credible to any one.\n\nFor its power is so remarkable that it extends the life of the body beyond what is possible to its congenital nature, and keeps it so firmly in that condition that it lives on in safety from all infirmities.\n\nAnd although, indeed, the body at length comes to old age, nevertheless, it still appears as though it were established in its primal youth.\n\nSo, then, the Tincture of the Philosophers is a Universal Medicine, and consumes all diseases, by whatsoever name they are called, just like an invisible fire.\n\nThe dose is very small, but its effect is most powerful.\n\nBy means thereof I have cured the leprosy, venereal disease, dropsy, the falling sickness, colic, scab, and similar afflictions; also lupus, cancer, noli-me-tangere, fistulas, and the whole race of internal diseases, more surely than one could believe.\n\nOf this fact Germany, France, Italy, Poland, Bohemia, etc., will afford the most ample evidence.\n\nNow, Sophist, look at Theophrastus Paracelsus.\n\nHow can your Apollo, Machaon, and Hippocrates stand against me?"

