[content]
body = "Hence it was that the first and most wise institutors of religions and ceremonies ordained that prayers, singings and all manner of divine worships whatsoever should not be performed without lighted candles or torches (hence, also, was that significant saying of Pythagoras, \"Do not speak of God without a Light\"), and they commanded that for the driving away of wicked spirits, Lights and Fires should be kindled by the corpses of the dead, and that they should not be removed until the expiations were after a holy manner performed and they buried.\n\nAnd the great Jehovah himself in the old law commanded that all his sacrifices should be offered with Fire, and that Fire should always be burning upon the altar, which custom the priests of the altar did always observe and keep amongst the Romans.\n\nNow the basis and foundation of all the Elements is the Earth, for that is the object, subject, and receptacle of all Celestial rays and influences; in it are contained the seeds and seminal virtues of all things; and therefore it is said to be Animal, Vegetable and Mineral.\n\nIt being made fruitful by the other Elements and the Heavens, it brings forth all things of itself.\n\nIt receives the abundance of all things and is, as it were, the first fountain from whence all things spring.\n\nIt is the center, foundation and mother of all things.\n\nTake as much of it as you please, separated, washed, depurated, subtilized, if you let it lie in the open air a little while, it will, being full and abounding with heavenly virtues, of itself bring forth plants, worms and other living things, also stones, and bright sparks of metals.\n\nIn it are great secrets, if at any time it shall be purified by the help of Fire, and reduced unto its simplicity by a convenient washing.\n\nIt is the first matter of our creation, and the truest medicine that can restore and preserve us."

