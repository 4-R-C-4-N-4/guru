[content]
body = "CHAPTER V.\n\nOf the Wonderful Natures of Fire and Earth .\n\nThere are two things, saith Hermes, viz., Fire and Earth, which are sufficient for the operation of all wonderful things: the former is active, the latter passive.\n\nFire, as saith Dionysius, in all things, and through all things, comes and goes away bright; it is in all things bright, and at the same time occult and unknown.\n\nWhen it is by itself (no other matter coming to it, in which it should manifest its proper action) it is boundless and invisible, of itself sufficient for every action that is proper to it, movable, yielding itself after a manner to all things that come next to it, renewing, guarding Nature, enlightening, not comprehended by lights that are veiled over, clear, parted, leaping back, bending upwards, quick in motion, high, always raising motions, comprehending another, not comprehended itself, not standing in need of another, secretly increasing of itself, and manifesting its greatness to things that receive it; Active, Powerful, Invisibly present in all things at once; it will not be affronted or opposed, but as it were in a way of revenge, it will reduce, on a sudden, things into obedience to itself; incomprehensible, impalpable, not lessened, most rich in all dispensations of itself.\n\nFire, as saith Pliny, is the boundless and mischievous part of the nature of things, it being a question whether it destroys or produceth most things.\n\nFire itself is one, and penetrates through all things, as say the Pythagoreans, also spread abroad in the Heavens, and shining: but in the infernal place straitened, dark and tormenting; in the mid way it partakes of both.\n\nFire, therefore, in itself is one, but in that which receives it, manifold; and in differing subjects it is distributed in a different manner, as Cleanthes witnesseth in Cicero.\n\nThat fire, then, which we use is fetched out of other things.\n\nIt is in stones, and is fetched out by the stroke of the steel; it is in Earth, and makes that, after digging up, to smoke; it is in Water, and heats springs and wells; it is in the depth of the Sea, and makes that, being tossed with winds, warm; it is in the Air, and makes it (as we oftentimes see) to burn.\n\nAnd all animals and living things whatsoever, as also all vegetables, are preserved by heat; and everything that lives, lives by reason of the inclosed heat.\n\nThe properties of the Fire that is above, are heat, making all things fruitful, and light, giving life to all things.\n\nThe properties of the infernal Fire are a parching heat, consuming all things, and darkness, making all things barren.\n\nThe Celestial and bright Fire drives away spirits of darkness; also this, our Fire made with wood, drives away the same in as much as it hath an analogy with and is the vehiculum of that Superior light; as also of him who saith, \"I am the Light of the World,\" which is true Fire, the Father of Lights, from whom every good thing, that is given, comes; sending forth the light of His Fire, and communicating it first to the Sun and the rest of the Celestial bodies, and by these, as by mediating instruments, conveying that light into our Fire.\n\nAs, therefore, the spirits of darkness are stronger in the dark, so good spirits, which are Angels of Light, are augmented, not only by that light, which is Divine, of the Sun, and Celestial, but also by the light of our common Fire."

