[content]
body = "CHAPTER XXII.\n\nHow Inferior Things Are Subjected to Superior Bodies, and How the Bodies, the Actions, and Dispositions of Men Are Ascribed to Stars and Signs .\n\nIt is manifest that all things inferior are subject to the superior, and after a manner (as saith Proclus) they are one in the other, viz., in inferiors are superior and in superiors are inferior: So in the Heaven are things terrestrial, but as in their cause, and in a celestial manner; and in the Earth are things celestial, but after a terrestrial manner, as in an effect.\n\nSo we say that there be here certain things which are Solary and certain which are Lunary, in which the Sun and Moon make a strong impression of their virtues.\n\nWhence it is that these kind of things receive more operations and properties, like to those of the Stars and Signs which they are under.\n\nSo we know that Solary things respect the heart and head by reason that Leo is the house of the Sun, and Aries the exaltation of the Sun.\n\nSo things under Mars are good for the head and secrets by reason of Aries and Scorpio.\n\nHence they whose senses fail and heads ache by reason of drunkenness, find cold water and vinegar good to bathe the head and secrets.\n\nBut in reference to these it is necessary to know how man's body is distributed to Planets and Signs.\n\nKnow, therefore, that according to the doctrine of the Arabians, the Sun rules over the brain, heart, the thigh, the marrow, the right eye, and the spirit; also the tongue, the mouth, and the rest of the organs of the senses, as well internal as external; also the hands, feet, legs, nerves, and the power of imagination.\n\nThat Mercury rules over the spleen, stomach, bladder, womb, and right ear, as also the faculty of the common sense.\n\nThat Saturn rules over the liver and fleshy part of the stomach.\n\nThat Jupiter rules over the abdomen and navel, whence it is written by the Ancients, that the effigy of a navel was laid up in the temple of Jupiter Hammon.\n\nAlso some attribute to him the ribs, breasts, bowels, blood, arms, and the right hand and left ear, and the powers natural.\n\nAnd some set Mars over the blood, the veins, the kidneys, the bag of the gall, the buttocks, the back, motion of the sperm, and the irascible power.\n\nAgain they set Venus over the kidneys, the secrets, the womb, the seed, and concupiscible power; as also the flesh, fat, belly, breast, navel, and the venereal parts and such as serve thereto; as also the os sacrum , the back-bone, and loins; as also the head, and the mouth, with which they give a kiss as a token of love.\n\nNow the Moon, although she may challenge the whole body, and every member thereof according to the variety of the Signs, yet more particularly they ascribe to her the brain, lungs, marrow of the backbone, the stomach, the menstrual and excretory parts, and the left eye, as also the power of increasing.\n\nBut [paragraph continues] Hermes saith: That there are seven holes in the head of an animal, distributed to the seven Planets, viz.: The right ear to Saturn, the left to Jupiter, the right nostril to Mars, the left to Venus, the right eye to the Sun, the left to the Moon, and the mouth to Mercury."

