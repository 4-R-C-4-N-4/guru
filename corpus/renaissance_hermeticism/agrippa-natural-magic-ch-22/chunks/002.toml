[content]
body = "The several Signs, also, of the Zodiac take care of their members: So Aries governs the head and face; Taurus, the neck; Gemini, the arms and shoulders; Cancer, the breast, lungs, stomach and arms; Leo, the heart, stomach, liver and back; Virgo, the bowels and bottom of the stomach; Libra, the kidneys, thighs and buttocks; Scorpius, the secrets; Sagittarius, the thighs and groins; Capricornus, the knees; Aquarius, the legs and shins; Pisces, the feet.\n\nAnd as the triplicities of these Signs answer one the other, and agree in celestials, so also they agree in the members; which is sufficiently manifest by experience, because with the coldness of the feet the belly and breast are affected, which members answer the same triplicity; whence it is, if a medicine be applied to the one it helps the other, as by the warming of the feet the pain of the belly ceaseth.\n\nRemember, therefore, this order, and know that things which are under any one of the Planets have a certain particular aspect or inclination to those members that are attributed to that planet, and especially to the Houses and exaltation's thereof.\n\nFor the rest of the dignities, as those triplicities and marks and face, are of little account in this.\n\nUpon this account, therefore, peony, balm, clove-gilly-flowers, citron-peel, sweet-marjoram, cinnamon, saffron, lignum aloes, frankincense, amber, musk, and myrrh help the head and heart, by reason of the Sun and Aries and Leo.\n\nSo doth ribwort, the herb of Mars, help the head and secrets by reason of Aries and Scorpio; and so of the rest.\n\nAlso all things under Saturn conduce to sadness and melancholy; those under Jupiter to mirth and honor; those under Mars to boldness, contention and anger; those under the Sun to glory, victory and courage; those under Venus to love, lust and concupiscence; those under Mercury to eloquence; those under the Moon to a common life.\n\nAlso all the actions and dispositions of men are distributed according to the Planets; for Saturn governs old men, monks, melancholy men, and hidden treasures and those things which are obtained with long journeys and difficulty; but Jupiter governs those that are religious, prelates, kings and dukes, and such kind of gains that are got lawfully; Mars rules over barbers, chirurgeons, physicians, sergeants, butchers executioners, all that make fires, bakers, and soldiers, who are every where called martial men.\n\nAlso do the other Stars signify their office, as they are described in the books of Astrologers."

