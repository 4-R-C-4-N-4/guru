[content]
body = "Confert is an augury when a man or bird in journeying or flying shall pass behind thee, coming from the left side of thee, and, bending toward thy right, pass out of thy sight, and is an evil sign concerning thy business.\n\nScassarvetus is when thou see a man or a bird pass by thee, and resting in a place on thy left side, is an evil sign to thee.\n\nScassarnova is when thou see a man or a bird pass by thee, and resting in a place on thy right side, is an augury of good to thee.\n\nEmponenthem is when a man or a bird, coming from thy left side, and passing to thy right, goeth out of thy sight without resting, and is a good sign.\n\nHartena or Herrenam is an augury that, if a man or a bird coming from thy right hand, shall pass behind thy back to thy left, and thou shall see him resting anywhere, this is in evil sign.\n\nThe ancients did also prognosticate from sneezings, of which Homer in the seventeenth book of his poem of the Odyssey makes mention, because they, thought that they proceeded from a sacred place, viz., the head, in which the intellect is vigorous and operative.\n\nWhence, also, whatsoever speech came into the breast or mind of a man rising in the morning, unawares, is said to be some presage and an augury."

