[content]
body = "Now the sophists have mixed this counterfeit Venus with twice its weight of Luna, and sold it to the goldsmiths and mint-masters, until at last they have transmuted themselves into false coiners – not only those who sold, but those who bought it.\n\nSome sophists instead of white arsenic take red, and this has turned out false art; because, however it is prepared, it proves to be nothing but whiteness.\n\nSome, again, have gone further and dealt with common sulphur, which, being so yellow, they have boiled in vinegar, lixivium, or sharpest wines, for a day and a night, until it became white.\n\nThen afterwards they sublimated it from common salt and the calx of eggs, repeating the process several times; yet, still, though white, it has been always combustible.\n\nNevertheless, with this they have endeavoured to fix Mercury and to turn it into gold; but in vain.\n\nFrom this, however, comes the most excellent and beautiful cinnabar that I have ever seen.\n\nThis they propose to fix with the oil of sulphur by cementation and fixation.\n\nIt does, indeed, give something of an appearance, but still falls short of the desired object.\n\nOthers have reduced common sulphur to the form of a hepar, boiling it in vinegar with the addition of linseed oil, or laterine oil, or olive oil.\n\nThey then pour it into a marble mortar, and make it into the form of a hepar, which they have first distilled into a citrine oil with a gentle fire.\n\nBut they have found to their loss that they could not do anything in the way of transmuting Luna to Sol as they supposed they would be able.\n\nAs there is an infinite number of metals, so also there is much variety in the preparation of them: I shall not make further mention of these in this place, because each a mould require a special treatise.\n\nBeware also of sophisticated oils of vitriol and antimony.\n\nLikewise be on your guard against the oils of the metals, perfect or imperfect, as Sol or Luna; because although the operation of these is most potent in the nature of things, yet the true process is known, even at this day, to very few persons.\n\nAbstain also from the sophistical preparations of common mercury, arsenic, sulphur, and the like, by sublimation, descension, fixation by vinegar, saltpetre, tartar, vitriol, sal ammoniac, according to the formulas prescribed in the books of the sophists.\n\nLikewise avoid the sophisticated tinctures taken from marcasites and crocus of Mars, and also of that sophistication called by the name of \"a part with a part\", and of fixed Luna and similar trifles.\n\nAlthough they have some superficial appearance of truth, as the fixation of Luna by little labour and industry, still the progress of the preparation is worthless and weak.\n\nBeing therefore moved with compassion towards the well meaning operators in this art, I have determined to lay open the whole foundation of philosophy in three separate arcana, namely, in one explained by arsenic, in a second by vitriol, and in a third by antimony; by means of which I will teach the true projection upon Mercury and upon the imperfect metals.\n\nCHAPTER XI.\n\nCONCERNING THE TRUE AND PERFECT SPECIAL ARCANUM OF ARSENIC FOR THE WHITE TINCTURE.\n\nSome persons have written that arsenic is compounded of Mercury and, Sulphur, others of earth and water; but most writers say that it is of the nature of Sulphur.\n\nBut, however that may be, its nature is such that it transmutes red copper into white.\n\nIt may also be brought to such a perfect state of preparation as to be able to tinge."

