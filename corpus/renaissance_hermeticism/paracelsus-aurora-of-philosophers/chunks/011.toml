[content]
body = "Nature herself is wise, and turns all the waters of vegetables to a lemon colour, and after that into an oil which is very red like blood.\n\nThe reason why this is so slowly accomplished arises from the too great haste of the ignorant operators who distil it, which causes the greenness to be consumed.\n\nThey have not learnt to strengthen Nature with their own powers, which is the mode whereby that noble green colour ought to be rectified into redness of itself.\n\nAn example of this is white wine digesting itself into a lemon colour; and in process of time the green colour of the grape is of itself turned into the red which underlies the coerulean.\n\nThe greenness therefore of the vegetables and minerals being lost by the incapacity of the operators, the essence also and spirit of the oil and of the balsam, which is noblest among arcana, will also perish.\n\nCHAPTER XIII.\n\nSPECIAL INSTRUCTION CONCERNING THE PROCESS OF VITRIOL FOR THE RED TINCTURE.\n\nVitriol contains within itself many muddy and viscous imperfections.\n\nTherefore its greenness must be often extracted with water, and rectified until it puts off all the impurities of earth.\n\nWhen all these rectifications are finished, take care above all that the matter shall not be exposed to the sun, for this turns its greenness pale, and at the same time absorbs the arcanum.\n\nLet it be kept covered up in a warm stove so that no dust may defile it.\n\nAfterwards let it be digested in a closed glass vessel for the space of several months, or until different colours and deep redness shew themselves.\n\nStill you must not suppose that by this process the redness is sufficiently fixed.\n\nIt must, in addition, be cleansed from the interior and accidental defilements of the earth, in the following manner: – It must be rectified with acetum until the earthy defilement is altogether removed, and the dregs are taken away.\n\nThis is now the true and best rectification of its tincture, from which the blessed oil is to be extracted.\n\nFrom this tincture, which is carefully enclosed in a glass vessel, an alembic afterwards placed on it and luted so that no spirit may escape, the spirit of this oil must be extracted by distillation over a mild and slow fire.\n\nThis oil is much pleasanter and sweeter than any aromatic balsam of the drugsellers, being entirely free from all acridity .\n\nThere will subside in tha bottom of the cucurbite some very white earth, shining and glittering like snow.\n\nThis keep, and protect from all dust.\n\nThis same earth is altogether separated from its redness.\n\nThereupon follows the greatest arcanum, that is to say, the Supercelestial Marriage of the Soul, consummately prepared and washed by the blood of the lamb, with its own splendid, shining, and purified body.\n\nThis is the true supercelestial marriage by which life is prolonged to the last and predestined day.\n\nIn this way, then, the soul and spirit of the Vitriol, which are its blood, are joined with its purified body, that they may be for eternity inseparable.\n\nTake, therefore, this our foliated earth in a glass phial.\n\nInto it pour gradually its own oil.\n\nThe body will receive and embrace its soul; since the body is affected with extreme desire for the soul, and the soul is most perfectly delighted with the embrace of the body.\n\nPlace this conjunction in a furnace of arcana, and keep it there for forty days.\n\nWhen these have expired you will have a most absolute oil of wondrous perfection, in which Mercury and any other of the imperfect metals are turned into gold.\n\nNow let us turn our attention to its multiplication."

