body = "THE AURORA OF THE PHILOSOPHERS.\n\nBY THEOPHRASTUS PARACELSUS.\n\nWHICH HE OTHERWISE CALLS HIS MONARCHIA.\n\nCHAPTER I.\n\nCONCERNING THE ORIGIN OF THE PHILOSOPHERS’ STONE.\n\nADAM was the first inventor of arts, because he had knowledge of all things as well after the Fall as before .\n\nThence he predicted the world’s destruction by water.\n\nFrom this cause, too, it came about that his successors erected two tables of stone, on which they engraved all natural arts in hieroglyphical characters, in order that their posterity might also become acquainted with this prediction, that so it might be heeded, and provision made in the time of danger.\n\nSubsequently, Noah found one of these tables under Mount Araroth, after the Deluge.\n\nIn this table were described the courses of the upper firmament and of the lower globe, and also of the planets.\n\nAt length this universal knowledge was divided into several parts, and lessened in its vigour and power.\n\nBy means of this separation, one man became an astronomer, another a magician, another a cabalist, and a fourth an alchemist.\n\nAbraham, that Vulcanic Tubalcain, a consummate astrologer and arithmetician, carried the Art out of the land of Canaan into Egypt, whereupon the Egyptians rose to so great a height and dignity that this wisdom was derived from them by other nations.\n\nThe patriarch Jacob painted, as it were, the sheep with various colours; and this was done by magic: for in the theology of the Chaldeans, Hebrews, Persians, and Egyptians, they held these arts to be the highest philosophy, to be learnt by their chief nobles and priests.\n\nSo it was in the time of Moses, when both thc priests and also thc physicians were chosen from among the Magi – the priests for the judgment of what related to health, especially in the knowledge of leprosy.\n\nMoses, likewise, was instructed in the Egyptian schools, at the cost and care of Pharaoh’s daughter, so that he excelled in all the wisdom and learning of that people.\n\nThus, too, was it with Daniel, who in his youthful days imbibed the learning of the Chaldeans, so that he became a cabalist.\n\nWitness his divine predictions and his exposition of those words, \"Mene, Mene, Tecelphares\".\n\nThese words can be understood by the prophetic and cabalistic Art.\n\nThis cabalistic Art was perfectly familiar to, and in constant use by, Moses and the Prophets.\n\nThe Prophet Elias foretold many things by his cabalistic numbers.\n\nSo did the Wise Men of old, by this natural and mystical Art, learn to know God rightly.\n\nThey abode in His laws, and walked in His statutes with great firmness.\n\nIt is also evident in the Book of Samuel, that the Berelists did not follow the devil’s part, but became, by Divine permission, partakers of visions and veritable apparitions, whereof we shall treat more at large in the Book of Supercelestial Things .\n\nThis gift is granted by the Lord God to those priests who walk in the Divine precepts.\n\nIt was a custom among the Persians never to admit any one as king unless he were a Wise Man, pre-eminent in reality as well as in name.\n\nThis is clear from the customary name of their kings; for they were called Wise Men.\n\nSuch were those Wise Men and Persian Magi who came from the East to seek out thc Lord Jesus, and are called natural priests."

