[content]
body = "CONCERNING INSTRUMENTS AND THE PHILOSOPHIC VESSEL.\n\nSham philosophers have misunderstood the occult and secret philosophic vessel, and worse is that which is said by Aristoteles the Alchemist (not the famous Greek Academic Philosopher), giving it out that the matter is to be decocted in a triple vessel.\n\nWorst of all is that which is said by another, namely, that the matter in its first separation and first degree requires a metallic vessel; in its second degree of coagulation and dealbation of its earth a glass vessel; and in the third degree, for fixation, an earthen vessel.\n\nNevertheless, hereby the philosophers understand one vessel alone in all the operations up to the perfection of the red stone.\n\nSince, then, our matter is our root for the white and the red, necessarily our vessel must be so fashioned that the matter in it may be governed by the heavenly bodies.\n\nFor invisible celestial influences and the impressions of the stars are in the very first degree necessary for the work: Otherwise it would be impossible for the Oriental, Chaldean, and Egyptian stone to be realised.\n\nBy this Anaxagoras knew the powers of the whole firmament, and foretold that a great stone would descend from heaven to earth, which actually happened after his death.\n\nTo the Cabalists our vessel is perfectly well known, because it must be made according to a truly geometrical proportion and measure, and from a definite quadrature of the circle, so that the spirit and the soul of our matter, separated from their body, may be able to raise this vessel with themselves in proportion to the altitude of heaven.\n\nIf the vessel be wider, narrower, higher, or lower than is fitting, and than the dominating operating spirit and soul desire, the heat of our secret philosophic fire (which is, indeed, very severe), will violently excite the matter and urge it on to excessive operation, so that the vessel is shivered into a thousand pieces, with imminent danger to the body and even the life of the operator.\n\nOn the other hand, if it be of greater capacity than is required in due proportion for the heat to have effect on the matter, the work will be wasted and thrown away.\n\nSo, then, our philosophic vessel must be made with the greatest care.\n\nWhat the material of the vessel should be is understood only by those who, in the first solution of our fixed and perfected matter have brought that matter to its own primal quintessence.\n\nEnough has been said on this point.\n\nThe operator must also very accurately note what, in its first solution, the matter sends forth and rejects from itself.\n\nThe method of describing the form of the vessel is difficult.\n\nIt should be such as Nature requires, and it must be sought out and investigated from every possible source, so that, from the height of the philosophic heaven, elevated above the philosophic earth, it may be able to operate on the fruit of its own earthly body.\n\nIt should have this form, too, in order that the separation and purification of the elements, when the fire drives one from the other, may be able to be accomplished, and that each may have power to occupy the place to which it adheres; and also that the sun and the other planets may exercise their operations around the elemental earth, while their course in their circuit is neither hindered nor agitated with too swift a motion.\n\nIn all these particulars which have been mentioned it must have a proper proportion of rotundity and of height.\n\nThe instruments for the first purification of mineral bodies are fusing-vessels, bellows, tongs, capels, cupels, tests, cementatory vessels, cineritiums, cucurbites, bocias for aquafortis and aqua regia; and also the appliances which are required for projection at the climax of the work.\n\nCHAPTER XIX."

