[content]
body = "Moreover, no small error has arisen in the liquid of vegetables, with which a good many have sought to coagulate Mercury , and afterwards to convert it with fixatory waters into Luna, since they supposed that he who in this way could coagulate it without the aid of metals would succeed in becoming the chief master.\n\nNow, although the liquids of some vegetables do effect this, yet the result is due merely to the resin, fat, and earthy sulphur with which they abound.\n\nThis attracts to itself the moisture of the Mercury which rises with the substance in the process of coagulation, but without any advantage resulting.\n\nI am well assured that no thick and external Sulphur in vegetables is adapted for a perfect projection in Alchemy, as some have found out to their cost.\n\nCertain persons have, it is true, coagulated Mercury with the white and milky juice of tittinal, on account of the intense heat which exists therein; and they have called that liquid \"Lac Virginis\"; yet this is a false basis.\n\nThe same may be asserted concerning the juice of celandine, although it colours just as though it were endowed with gold.\n\nHence people conceived a vain idea.\n\nAt a certain fixed time they rooted up this vegetable, from which they sought for a soul or quintessence, wherefrom they might make a coagulating and transmuting tincture.\n\nBut hence arose nothing save a foolish error.\n\nCHAPTER VII.\n\nCONCERNING THE ERRORS OF THOSE WHO SEEK THE STONE IN VEGETABLES.\n\nSome alchemists have pressed a juice out of celandine, boiled it to thickness, and put it in the sun, so that it might coagulate into a hard mass, which, being afterwards pounded into a fine black powder, should turn Mercury by projection into Sol.\n\nThis they also found to be in vain.\n\nOthers mixed Sal Ammoniac with this powder; others the Colcothar of Vitriol, supposing that they would thus arrive at their desired result.\n\nThey brought it by their solutions into a yellow water, so that the Sal Ammoniac allowed an entrance of the tincture into the substance of the Mercury.\n\nYet again nothing was accomplished.\n\nThere are some again who, instead of the abovementioned substances, take the juices of persicaria, bufonaria, dracunculus, the leaves of willow, tithymal, cataputia, flammula, and the like, and shut them up in a glass vessel with Mercury for some days, keeping them in ashes.\n\nThus it comes about that the Mercury is turned into ashes, but deceptively and without any result.\n\nThese people were misled by the vain rumours of the vulgar, who give it out that he who is able to coagulate Mercury without metals has the entire Magistery, as we have said before.\n\nMany, too, have extracted salts, oils, and sulphurs artificially out of vegetables, but quite in vain.\n\nOut of such salts, oils, and sulphurs no coagulation of Mercury, or perfect projection, or tincture, can be made.\n\nBut when the philosophers compare their matter to a certain golden tree of seven boughs, they mean that such matter includes all the seven metals in its sperm, and that in it these lie hidden.\n\nOn this account they called their matter vegetable, because, as in the case of natural trees, they also in their time produce various flowers.\n\nSo, too, the matter of the Stone shews most beautiful colours in the production of its flowers.\n\nThe comparison, also, is apt, because a certain matter rises out of the philosophical earth, as if it were a thicket of branches and sprouts: like a sponge growing on the earth.\n\nThey say, therefore, that the fruit of their tree tends towards heaven."

