[content]
body = "In this way you will have the supreme mystery and arcanum of Nature, to which scarcely any equal can be assigned in the nature of things.\n\nLet these two oils in combination be shut up together in a phial after the manner described, hung on a tripod for a philosophical month, and warmed with a very gentle fire; although, if the fire be regulated in dire proportion this operation is concluded in thirty-one days, and brought to perfection.\n\nBy this, Mercury and any other imperfect metals acquire the perfection of gold.\n\nCHAPTER XV.\n\nCONCERNING THE PROJECTION TO BE MADE BY THE MYSTERY AND ARCANUM OF ANTIMONY.\n\nNo precise weight can be assigned in this work of projection, though the tincture itself may be extracted from a certain subject, in a defined proportion, and with fitting appliances.\n\nFor instance, that Medicine tinges sometimes thirty, forty, occasionally even sixty, eighty, or a hundred parts of the imperfect metal.\n\nSo, then, the whole business hinges chiefly on the purification of the Medicine and the industry of the operator, and, next, on the greater; or lesser cleanliness and purity of the imperfect body taken in hand.\n\nFor instance, one Venus is more pure than another; and hence it happens that no one fixed weight can be specified in projection.\n\nThis alone is worth noting, that if the operator happens to have taken too much of the tincture, he can correct this mistake by adding more of the imperfect metal.\n\nBut if there be too much of the subject, so that the powers of the tincture are weakened, this error is easily remedied by a cineritium, or by cementations, or by ablutions in crude Antimony.\n\nThere is nothing at this stage which need delay the operator; only let him put before himself a fact which has been passed over by the philosophers, and by some studiously veiled, namely, that in projections there must be a revivification, that is to say, an animation of imperfect bodies – nay, so to speak, a spiritualisation; concerning which some have said that their metals are no common ones, since they live and have a soul.\n\nANIMATION IS PRODUCED IN THE FOLLOWING WAY.\n\nTake of Venus, wrought into small plates, as much as you will, ten, twenty, or forty pounds.\n\nLet these be incrusted with a pulse made of arsenic and calcined tartar, and calcined in their own vessel for twenty-four hours.\n\nThen at length let the Venus be pulverised, washed, and thoroughly purified.\n\nLet the calcination with ablution be repeated three or four times.\n\nIn this way it is purged and purified from its thick greenness and from its own impure sulphur.\n\nYou will have to be on your guard against calcinations made with common sulphur.\n\nFor whatever is good in the metal is spoilt thereby, and what is bad becomes worse.\n\nTo ten marks of this purged Venus add one of pure Luna.\n\nBut in order that the work of the Medicine may be accelerated by projection, and may more easily penetrate the imperfect body, and drive out all portions which are opposed to the nature of Luna, this is accomplished by means of a perfect ferment.\n\nFor the work is defiled by means of an impure Sulphur, so that a cloud is stretched out over the surface of the transmuted substance, or the metal is mixed with the loppings of the Sulphur and may be cast away therewith.\n\nBut if a projection of a red stone is to be made, with a view to a red transmutation, it must first fall on gold, afterwards on silver, or on some other metal thoroughly purified, as we have directed above.\n\nFrom thence arises the most perfect gold.\n\nCHAPTER XVI.\n\nCONCERNING THE UNIVERSAL MATTER OF THE PHILOSOPHERS’ STONE."

