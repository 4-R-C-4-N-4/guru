[content]
body = "He says, also, that this is the key and the end of the work, concluding that the ferment is nothing but paste, as that of the sun is nothing but sun, and that of the moon nothing but moon.\n\nOthers affirm that the ferment is the soul, and if this be not rightly prepared from the magistery, it effects nothing.\n\nSome zealots of this Art seek the Art in common sulphur, arsenic, tutia, auripigment, vitriol, etc., but in vain; since the substance which is sought is the same as that from which it has to be drawn forth.\n\nIt should be remarked, therefore, that fermentations of this kind do not succeed according to the wishes of the zealots in the way they desire, but, as is clear from what has been said above, simply in the way of natural successes.\n\nBut, to come at length to the weight; this must be noted in two ways.\n\nThe first is natural, the second artificial.\n\nThe natural attains its result in the earth by Nature and concordance.\n\nOf this, Arnold says: If more or less earth than Nature requires be added, the soul is suffocated, and no result is perceived, nor any fixation.\n\nIt is the same with the water.\n\nIf more or less of this bc taken it will bring a corresponding loss.\n\nA superfluity renders the matter unduly moist, and a deficiency makes it too dry and too hard.\n\nIf there be over much air present, it is too strongly impressed on the tincture; if there be too little, the body will turn out pallid.\n\nIn the same way, if the fire be too strong, the matter is burnt up; if it be too slack, it has not the power of drying, nor of dissolving or heating the other elements.\n\nIn these things elemental heat consists.\n\nArtificial weight is quite occult.\n\nIt is comprised in the magical art of ponderations.\n\nBetween the spirit, soul, and body, say the philosophers, weight consists of Sulphur as the director of the work; for the soul strongly desires Sulphur, and necessarily observes it by reason of its weight.\n\nYou can understand it thus: Our matter is united to a red fixed Sulphur, to which a third part of the regimen has been entrusted, even to the ultimate degree, so that it may perfect to infinity the operation of the Stone, may remain therewith together with its fire, and may consist of a weight equal to the matter itself, in and through all, without variation of any degree.\n\nTherefore, after the matter has been adapted and mixed in its proportionate weight, it should be closely shut up with its seal in the vessel of the philosophers, and committed to the secret fire.\n\nIn this the Philosophic Sun will rise and surge up, and will illuminate all things that have been looking for his light, expecting it with highest hope.\n\nIn these few words we will conclude the arcanum of the Stone, an arcanum which is in no way maimed or defective, for which we give God undying thanks.\n\nNow have we opened to you our treasure, which is not to be paid for by the riches of the whole world.\n\nHERE ENDS THE AURORA OF THE PHILOSOPHERS.\n\nNOTES The work under this title is cited occasionally in other writings of Paracelsus, but is not included in the great folio published at Geneva in 1688.\n\nIt was first issued at Basle in1575, and was accompanied with copious annotations in Latin by the editor, Gerard Dorne.\n\nThis personage was a very persevering collector of the literary remains of Paracelsus, but is not altogether free from the suspicion of having elaborated his original."

