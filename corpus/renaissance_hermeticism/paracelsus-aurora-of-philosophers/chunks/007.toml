[content]
body = "Hence they predicted that, in the last times, there should come a most pure man upon the earth, by whom the redemption of the world should be brought about; and that this man should send forth bloody drops of a red colour, by means of which he should redeem the world from sin.\n\nIn the same way, after its own kind, the blood of their Stone freed the leprous metals from their infirmities and contagion.\n\nOn these grounds, therefore, they supposed they were justified in saying that their Stone was animal.\n\nConcerning this mystery Mercurius speaks as follows to King Calid: – \"This mystery it is permitted only to the prophets of God to know.\n\nHence it comes to pass that this Stone is called animal, because in its blood a soul lies hid.\n\nIt is likewise composed of body, spirit, and soul.\n\nFor the same reason they called it their microcosm, because it has the likeness of all things in the world, and thence they termed it animal, as Plato named the great world an animal\".\n\nCHAPTER IX.\n\nCONCERNING THOSE WHO HAVE SOUGHT THE STONE IN MINERALS.\n\nHereto are added the many ignorant men who suppose the stone to be three-fold, and to be hidden in a triple genus, namely, vegetable, animal, and mineral.\n\nHence it is that they have sought for it in minerals.\n\nNow, this is far from the opinion of the philosophers.\n\nThey affirm that their stone is uniformly vegetable, animal, and mineral.\n\nNow, here note that Nature has distributed its mineral sperm into various kinds, as, for instance, into sulphurs, salts, boraxes, nitres, ammoniacs, alums, arsenics, atraments, vitriols, tutias, haematites, orpiments, realgars, magnesias, cinnabar, antimony, talc, cachymia, marcasites, etc.\n\nIn all these Nature has not yet attained to our matter; although in some of the species named it displays itself in a wonderful aspect for the transmutation of imperfect metals that are to be brought to perfection.\n\nTruly, long experience and practice with fire shew many and various permutations in the matter of minerals, not only from one colour to another, but from one essence to another, and from imperfection to perfection.\n\nAnd, although Nature has, by means of prepared minerals, reached some perfection, yet philosophers will not have it that the matter of the philosophic stone proceeds out of any of the minerals, although they say that their stone is universal.\n\nHence, then, the sophists take occasion to persecute Mercury himself with various torments, as with sublimations, coagulations, mercurial waters, aquafortis, and the like.\n\nAll these erroneous ways should be avoided, together with other sophistical preparations of minerals, and the purgations and fixations of spirits and metals.\n\nWherefore all the preparations of the stone, as of Geber, Albertus Magnus, and the rest, are sophistical.\n\nTheir purgations, cementations, sublimations, distillations, rectifications, circulations, putrefactions, conjunctions, solutions, ascensions, coagulations, calcinations, and incinerations are utterly profitless, both in the tripod, in the athanor, in the reverberatory furnace, in the melting furnace, the accidioneum, in dung, ashes, sand, or what not; and also in the cucurbite, the pelican, retort, phial, fixatory, and the rest."

