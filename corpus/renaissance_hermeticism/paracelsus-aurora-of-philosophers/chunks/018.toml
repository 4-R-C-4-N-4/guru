[content]
body = "CONCERNING THE SECRET FIRE OF THE PHILOSOPHERS.\n\nThis is a well-known sententious saying of the philosophers, \"Let fire and Azoc suffice thee\".\n\nFire alone is the whole work and the entire art.\n\nMoreover, they who build their fire and keep their vessel in that heat are in error.\n\nIn vain some have attempted it with the heat of horse dung.\n\nBy the coal fire, without a medium, they have sublimated their matter, but they have not dissolved it.\n\nOthers have got their heat from lamps, asserting that this is the secret fire of the philosophers for making their Stone.\n\nSome have placed it in a bath, first of all in heaps of ants’ eggs; others in juniper ashes.\n\nSome have sought the fire in quicklime, in tartar, vitriol, nitre, etc.\n\nOthers, again, have sought it in boiling water.\n\nThomas Aquinas speaks falsely of this fire, saying that God and the angels cannot do without this fire, but use it daily.\n\nWhat blasphemy is this!\n\nIs it not a manifest lie that God is not able to do without the elemental heat of boiling water?\n\nAll the heats excited by those means which have been mentioned are utterly useless for our work Take care not to be misled by Arnold de Villa Nova, who has written on the subject of the coal fire, for in this matter he will deceive you.\n\nAlmadir says that the invisible rays of our fire of themselves suffice.\n\nAnother cites, as an illustration, that the heavenly heat by its reflections tends to the coagulation and perfection of Mercury, just as by its continual motion it tends to the generation of metals.\n\nAgain, says this same authority, \"Make a fire, vaporous, digesting, as for cooking, continuous, but not volatile or boiling, enclosed, shut off from the air, not burning, but altering and penetrating.\n\nNow, in truth, I have mentioned every mode of fire and of exciting heat.\n\nIf you are a true philosopher you will understand\".\n\nThis is what he says.\n\nSalmanazar remarks: \"Ours is a corrosive fire, which brings over our vessel an air like a cloud, in which cloud the rays of this fire are hidden.\n\nIf this dew of chaos and this moisture of the cloud fail, a mistake has been committed\".\n\nAgain, Almadir says, that unless the fire has warmed our sun with its moisture, by the excrement of the mountain, with a moderate ascent, we shall not be partakers either of the Red or the White Stone.\n\nAll these matters shew quite openly to us the occult fire of the wise men.\n\nFinally, this is the matter of our fire, namely, that it be kindled by the quiet spirit of sensible fire, which drives upwards, as it were, the heated chaos from the opposite quarter, and above our philosophic matter.\n\nThis heat, glowing above our vessel, must urge it to the motion of a perfect generation, temperately but continuously, without intermission.\n\nCHAPTER XX.\n\nCONCERNING THE FERMENT OF THE PHILOSOPHERS, AND THE WEIGHT.\n\nPhilosophers have laboured greatly in the art of ferments and of fermentations, which seems important above all others.\n\nWith reference thereto some have made a vow to God and to the philosophers that they would never divulge its arcanum by similitudes or by parables.\n\nNevertheless, Hermes, the father of all philosophers, in the \"Book of the Seven Treatises\", most clearly discloses the secret of ferments, saying that they consist only of their own paste; and more at length he says that the ferment whitens the confection, hinders combustion, altogether retards the flux of the tincture, consoles bodies, and amplifies unions."

