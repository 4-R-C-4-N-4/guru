[content]
body = "Man was regarded by Paracelsus as himself in a special manner the true Quintessence.\n\nAfter God had created all the elements, stars, and every other created thing, and had disposed them according to His will, He proceeded, lastly, to the forming of man.\n\nHe extracted the essence out of the four elements into one mass; He extracted also the essence of wisdom, art, and reason out of the stars, and this twofold essence He congested into one mass: which mass Scripture calls the slime of the earth.\n\nFrom that mass two bodies were made – the sidereal and the elementary.\n\nThese, according to the light of Nature, are called the quintum esse .\n\nThe mass was extracted, and therein the firmament and the elements were condensed.\n\nWhat was extracted from the four after this manner constituted a fifth.\n\nThe Quintessence is the nucleus and the place of the essences and properties of all things in the universal world.\n\nAll nature came into the hand of God – all potency, all property, all essence of the superior and inferior globe.\n\nAll these had God joined in His hand, and from these He formed man according to His image.\n\n– Philosophia Sagax , Lib.\n\nI., c.\n\n2.\n\nAll created things proceed from the coagulated, and after coagulation must go on to resolution.\n\nFrom resolution proceed all procreated things.\n\n– De Tartaro (fragment).\n\nAll bodies of minerals are coagulated by salt.\n\n– De Natraralibus Aquis , Lib.\n\nIII., Tract 2.\n\nSo acute is the potency of calcined blood, that if it be poured slowly on iron it produces in the first place a whiteness thereon, and then generates rust.\n\n– Scholia in Libros de Tartaro .\n\nIn Lib.\n\nII., Tract II.\n\nOne recipe for the fixation of arsenic is as follows: – Take equal parts of arsenic and nitre.\n\nPlace these in a tigillum, set upon coals so that they may begin to boil and to evaporate.\n\nContinue till ebullition and evaporation cease, and the substances shall have settled to the bottom of the vessel like fat melting in a frying-pan; then, for the space of an hour and a half (the longer the better), set it apart to settle.\n\nSubsequently pour the compound upon marble, and it will acquire a gold colour.\n\nIn a damp place it will assume the consistency of a fatty fluid.\n\n– De Naturalibus Rebus , c.\n\n9.\n\nAgain: The fixation of arsenic is performed by salt of urine, after which it is converted by itself into an oil.\n\n– Chirurgia Minor , Lib.\n\nII.\n\nConcerning the kinds of arsenic, it is to be noted that there are those which flow forth from their proper mineral or metal, and are called native arsenics.\n\nNext there are arsenics out of metals after their kind.\n\nThen there are those made by Art through transmutation.\n\nWhite or crystalline arsenic is the best for medicine Yellow and red arsenic are utilised by chemists for investigating the transmutation of metals, in which arsenic has a special efficacy.\n\n– De Naturalibus Rebus , c.\n\n9.\n\nThe arcanum of vitriol is the oil of vitriol.\n\nThus: after the aquosity has been removed in coction from vitriol, the spirit is elicited by the application of greater heat.\n\nThe vitriol then comes over pure in the form of water.\n\nThis water is combined with the caput mortuum left by the process, and on again separating in a balneum maris , the phlegmatic part passes off, and the oil, or the arcanum of vitriol, remains at the bottom of the vessel.\n\n– Ibid ."

