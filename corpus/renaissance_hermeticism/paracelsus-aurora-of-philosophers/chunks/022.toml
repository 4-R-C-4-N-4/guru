[content]
body = "So long as the viridity or greenness of vitriol subsists therein, it is of a soft quality and substance.\n\nBut if it be excocted so that it is deprived of its moisture, it is thereby changed into a hard stone from which even fire can be struck.\n\nWhen the moisture is evaporated from vitriol, the sulphur which it contains predominates over the salt, and the vitriol turns red.\n\n– De Pestilitate , Tract I.\n\nThe diagnosis of vitriol is concerned with it both in Medicine and Alchemy.\n\nIn Medicine it is a paramount remedy.\n\nIn Alchemy it has many additional purposes.\n\nThe Art of Medicine and Alchemy consists in the preparation of vitriol, for it is worthless in its crude state.\n\nIt is like unto wood, out of which it is possible to carve anything.\n\nThree kinds of oil are extracted from vitriol – a red oil, by distillation in a retort after an alchemistic method, and this is the most acid of all substances, and has also a corrosive quality – also a green and a white oil, distilled from crude vitriol by descension.\n\n– De Vitriolo .\n\nNor let it be regarded as absurd that we assign such great virtues to vitriol, for therein resides, secret and hidden, a certain peculiar golden force, not corporeal but spiritual, which excellent and admirable virtue exists in greater potency and certainty therein than it does in gold.\n\nWhen this golden spirit of vitriol is volatilized and separated from its impurities, so that the essence alone remains, it is like unto potable gold.\n\n– De Morbis Amentium, Methodus II., c.\n\n1.\n\nAntimony can be made into a pap with the water of vitriol, and then purified by sal ammoniac, and in this manner there may be obtained from it a thick purple or reddish liquor.\n\nThis is oil of antimony, and it has many virtues.\n\n– Chirurgia Magna , Lib.\n\nV.\n\nTake three pounds of antimony and as much of sal gemmae.\n\nDistil them together in a retort for three natural days, and so you will have a red oil, which has incredible healing power in cases of otherwise incurable wounds.\n\n– Chirurgia Minor , Tract II., c.\n\n11.\n\nMan himself was created from that which is termed limbus.\n\nThis limbus contained the potency and nature of all creatures.\n\nHence man himself is called the microcosmus, or world in miniature.\n\n– De Generatione Stultorum .\n\nMan was fashioned out of the limbus, and this limbus is the universal world.\n\n– Paramirum Aliud , Lib.\n\nII., c.\n\n2.\n\nThe limbus was the first matter of man.\n\n...\n\nWhosoever knows the limbus knows also what mam is.\n\nWhatsoever the limbus is, that also is man.\n\n– Paramirum Aliud , Lib.\n\nIV.\n\nThere is a dual limbus, man, the lesser limbus, and that Great Limbus from which he was produced.\n\n– De Podagra , s.\n\nv.\n\nde Limbo .\n\nThe limbus is the seed out of which all creatures are produced and grow, as the tree comes forth from its own special seed.\n\nThe limbus has its ground in the word of God.\n\n– Ibid .\n\nThe limbus of Adam was haven and earth, water and air.\n\nTherefore, man also remains in the limbus, and contains in himself heaven and earth, air and water, and these things he also himself is.\n\n– Paragranum Alterum , Tract II."

