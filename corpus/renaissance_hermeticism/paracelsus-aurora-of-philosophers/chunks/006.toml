[content]
body = "So, then, they put forth that the whole thing hinged upon natural vegetables, though not as to its matter, because their stone contains within itself a body, soul, and spirit, as vegetables do.\n\nCHAPTER VIII.\n\nCONCERNING THOSE WHO HAVE SOUGHT THE STONE IN ANIMALS.\n\nThey have also, by a name based only on resemblances, called this matter Lac Virginis, and the Blessed Blood of Rosy Colour, which, nevertheless, suits only the prophets and sons of God.\n\nHence the sophists gathered that this philosophical matter was in the blood of animals or of man.\n\nSometimes, too, because they are nourished by vegetables, others have sought it in hairs, in salt of urine, in rebis; others in hens’ eggs, in milk, and in the calx of egg shells, with all of which they thought they would be able to fix Mercury.\n\nSome have extracted salt out of foetid urine, supposing that to be the matter of the Stone.\n\nSome persons, again, have considered the little stones found in rebis to be the matter.\n\nOthers have macerated the membranes of eggs in a sharp lixivium, with which they also mixed calcined egg shells as white as snow.\n\nTo these they have attributed the arcanum of fixation for the transmutation of Mercury.\n\nOthers, comparing the white of the egg to silver and the yolk to gold, have chosen it for their matter, mixing with it common salt, sal ammoniac, and burnt tartar.\n\nThese they shut up in a glass vessel, and puri6ed in a Balneum Maris until the white matter became as red as blood.\n\nThis, again, they distilled into a most offensive liquid, utterly useless for the purpose they had in view.\n\nOthers have purified the white and yolk of eggs; from which has been generated a basilisk.\n\nThis they burnt to a deep red powder, and sought to tinge with it, as they learnt from the treatise of Cardinal Gilbert.\n\nMany, again, have macerated the galls of oxen, mixed with common salt, and distilled this into a liquid, with which they moistened the cementary powders, supposing that, by means of this Magistery, they would tinge their metals.\n\nThis they called by the name of \"a part with a part\", and thence came – just nothing.\n\nOthers have attempted to transmute tutia by the addition of dragon’s blood and other substances, and also to change copper and electrum into gold.\n\nOthers, according to the Venetian Art, as they call it, take twenty lizard-like animals, more or less, shut them up in a vessel, and make them mad with hunger, so that they may devour one another until only one of them survives.\n\nThis one is then fed with filings of copper or of electrum.\n\nThey suppose that this animal, simply by the digestion of his stomach, will bring about the desired transmutation.\n\nFinally, they burn this animal into a red powder, which they thought must be gold; but they were deceived.\n\nOthers, again, having burned the fishes called truitas (?\n\ntrouts), have sometimes, upon melting them, found some gold in them; but there is no other reason for it than this: Those fish sometimes in rivers and streams meet with certain small scales and sparks of gold, which they eat.\n\nIt is seldom, however, that such deceivers are found, and then chiefly in the courts of princes.\n\nThe matter of the philosophers is not to be sought in animals: this I announce to all.\n\nStill, it is evident that the philosophers called their Stone animal, because in their final operations the virtue of this most excellent fiery mystery caused an obscure liquid to exude drop by drop from the matter in their vessels."

