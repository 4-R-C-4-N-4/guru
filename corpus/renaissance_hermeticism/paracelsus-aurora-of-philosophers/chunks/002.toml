[content]
body = "The Egyptians, also, having obtained this magic and philosophy from the Chaldeans and Persians, desired that their priests should learn the same wisdom; and they became so fruitful and successful therein that all the neighbouring countries admired them.\n\nFor this reason Hermes was so truly named Trismegistus, because he was a king, a priest, a prophet, a magician, and a sophist of natural things.\n\nSuch another was Zoroaster.\n\nCHAPTER II.\n\nWHEREIN IS DECLARED THAT THE GREEKS DREW A LARGE PART OF THEIR LEARNING FROM THE EGYPTIANS; AND HOW IT CAME FROM THEM TO US.\n\nWhen a son of Noah possessed the third part of the world after the Flood, this Art broke into Chaldaea and Persia, and thence spread into Egypt.\n\nThe Art having been found out by the superstitious and idolatrous Greeks, some of them who were wiser than the rest betook themselves to the Chaldeans and Egyptians, so that they might draw the same wisdom from their schools.\n\nSince, however, the theological study of the law of Moses did not satisfy them, they trusted to their own peculiar genius, and fell away from the right foundation of those natural secrets and arts.\n\nThis is evident from their fabulous conceptions, and from their errors respecting the doctrine of Moses.\n\nIt was the custom of the Egyptians to put forward the traditions of that surpassing wisdom only in enigmatical figures and abstruse histories and terms.\n\nThis was afterwards followed by Homer with marvellous poetical skill; and Pythagoras was also acquainted with it, seeing that he comprised in his writings many things out of the law of Moses and the Old Testament.\n\nIn like manner, Hippocrates, Thales of Miletus, Anaxagoras, Democritus, and others, did not scruple to fix their minds on the same subject.\n\nAnd yet none of them were practised in the true Astrology, Geometry, Arithmetic, or Medicine, because their pride prevented this, since they would not admit disciples belonging to other nations than their own.\n\nEven when they had got some insight from the Chaldeans and Egyptians, they became more arrogant still than they were before by Nature, and without any diffidence propounded the subject substantially indeed, but mixed with subtle fictions or falsehoods; and then they attempted to elaborate a certain kind of philosophy which descended from them to the Latins.\n\nThese in their turn, being educated herewith, adorned it with their own doctrines, and by these the philosophy was spread over Europe.\n\nMany academies were founded for the propagation of their dogmas and rules, so that the young might be instructed; and this system flourishes with the Germans, and other nations, right down to the present day.\n\nCHAPTER III.\n\nWHAT WAS TAUGHT IN THE SCHOOLS OF THE EGYPTIANS.\n\nThe Chaldeans, Persians, and Egyptians had all of them the same knowledge of the secrets of Nature, and also the same religion.\n\nIt was only the names that differed.\n\nThe Chaldeans and Persians called their doctrine Sophia and Magic ; and the Egyptians, because of the sacrifice, called their wisdom priestcraft.\n\nThe magic of the Persians, and the theology of the Egyptians, were both of them taught in the schools of old.\n\nThough there were many schools and learned men in Arabia, Africa, and Greece, such as Albumazar, Abenzagel, Geber, Rhasis, and Avicenna among the Arabians; and among the Greeks, Machaon, Podalirius, Pythagoras, Anaxagoras, Democritus, Plato, Aristotle, and Rhodianus; still there were different opinions amongst them as to the wisdom of the Egyptian on points wherein they themselves differed, and whereupon they disagreed with it."

