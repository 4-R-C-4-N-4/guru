[content]
body = "The Aurora is by some regarded as an instance in point; though no doubt in the main it is a genuine work of the Sage of Hohenheim, yet in some respects it does seem to approximate somewhat closely to previous schools of Alchemy, which can scarcely he regarded as representing the actual standpoint of Paracelsus.\n\nHe who created man the same also created science.\n\nWhat has man in any place without labour?\n\nWhen the mandate went forth: Thou shalt live by the sweat of thy brow, there was, as it were, a new creation.\n\nWhen God uttered His fiat the world was made.\n\nArt, however, was not then made, nor was the light of Nature.\n\nBut when Adam was expelled from Paradise, God created for him the light of Nature when He bade him live by the work of his hands.\n\nIn like manner, He created for Eve her special light when He said to her: In sorrow shalt thou bring forth children.\n\nThus, and there, were these beings made human and earthy that were before like angelicals.\n\n...\n\nThus, by the word were creatures made, and by this same word was also made the light which was necessary to man.\n\n...\n\nHence the interior man followed from the second creation, after the expulsion from Paradise.\n\n...\n\nBefore the Fall, that cognition which was requisite to man had not begun to develop in him.\n\nHe received it from the angel when he was cast out of Paradise.\n\n...\n\nMan was made complete in the order of the body, but not in the order of the arts.\n\n– De Caducis , Par.\n\nIII.\n\nNo work precisely corresponding co this title is extant among the writings of Paracelsus.\n\nThe subjects to which reference is made are discussed in the Philosophia Sagax .\n\nBefore all things it is necessary to have a right understanding of the nature of Celestial Magic.\n\nIt originates from divine virtue.\n\nThere is that magic which Moses practised, and there is the maleficent magic of the sorcerers.\n\nThere are, then, different kinds of Magi.\n\nSo also there is what is called the Magic of Nature; there is the Celestial Magus; there is the Magus of Faith, that is, one whose faith makes him whole.\n\nThere is, lastly, the Magus of Perdition.\n\n– Philosophia Sagax , Lib.\n\nII., c.\n\n6.\n\nLearn, therefore, Astronomic Magic, which otherwise I call cabalistic.\n\n– De Pestilitate , Tract I.\n\nThis art, formerly called cabalistic, was in the beginning named caballa, and afterwards caballia.\n\nIt is a species of magic.\n\nIt was also, but falsely, called Gabanala, by one whose knowledge of the subject was profound.\n\nIt was of an unknown Ethnic origin, and it passed subsequently to the Chaldaeans and Hebrews, by both of whom it was corrupted.\n\n– Philosophia Sagax , Lib.\n\nI., s.\n\nv.\n\nProbatio in Scientiam Nectromantricam .\n\nThe object which received the influence and exhibited the sign thereof appears to have been termed Gamaheu, Gamahey etc.\n\nBut the name was chiefly given to certain stones on which various and wonderful images and figures of men and animals have been found naturally depicted, being no work of man, but the result of the providence and counsel of God.\n\n– De Imaginibus , c.\n\n7 and c.\n\n13.\n\nIt is possible, magically, for a man to project his infiuence into these stones and some other substances.\n\n– Ibid ., c.\n\n13.\n\nBut they also have their own inherent virtue, which is indicated by the shape and the special nature of the impression.\n\n– Ibid ., c.\n\n7.\n\nThere was also an artificial Gamaheus invented and prepared by the Magi, and this seems to have been more powerful.\n\n– De Carduo Angelico ."

