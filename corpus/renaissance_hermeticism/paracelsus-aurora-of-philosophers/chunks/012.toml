body = "Take the corporal Mercury, in the proportion of two parts; pour it over three parts, equal in weight, of the aforesaid oil, and let them remain together for forty days.\n\nBy this proportion of weight and this order the multiplication becomes infinite.\n\nCHAPTER XIV.\n\nCONCERNING THE SECRETS AND ARCANA OF ANTIMONY, FOR THE RED TINCTURE, WITH A VIEW TO TRANSMUTATION.\n\nAntimony is the true bath of gold.\n\nPhilosophers call it the examiner and the stilanx.\n\nPoets say that in this bath Vulcan washed Phoebus, and purified him from all dirt and imperfection.\n\nIt is produced from the purest and noblest Mercury and Sulphur, under the genus of vitriol, in metallic form and brightness.\n\nSome philosophers call it the White Lead of the Wise Men, or simply the Lead.\n\nTake, therefore, of Antimony, the very best of its kind, as much as you will.\n\nDissolve this in its own aquafortis, and throw it into cold water, adding a little of the crocus of Mars, so that it may sink to the bottom of the vessel as a sediment, for otherwise it does not throw off its dregs.\n\nAfter it has been dissolved in this way it will have acquired supreme beauty.\n\nLet it be placed in a glass vessel, closely fastened on all sides with a very thick lute, or else in a stone bocia, and mix with it some calcined tutia, sublimated to the perfect degree of fire.\n\nIt must be carefully guarded from liquefying, because with too great heat it breaks the glass.\n\nFrom one pound of this Antimony a sublimation is made, perfected for a space of two days.\n\nPlace this sublimated substance in a phial that it may touch the water with its third part, in a luted vessel, so that the spirit may not escape.\n\nLet it be suspended over the tripod of arcana, and let the work be urged on at first with a slow fire equal to the sun’s heat at midsummer.\n\nThen at length on the tenth day let it be gradually increased.\n\nFor with too great heat the glass vessels are broken, and sometimes even the furnace goes to pieces.\n\nWhile the vapour is ascending different colours appear.\n\nLet the fire be moderated until a red matter is seen.\n\nAfterwards dissolve in very sharp Acetum, and throw away the dregs.\n\nLet the Acetum be abstracted and let it be again dissolved in common distilled water.\n\nThis again must be abstracted, and the sediment distilled with a very strong fire in a glass vessel closely shut.\n\nThe whole body of the Antimony will ascend as a very red oil, like the colour of a ruby, and will flow into the receiver, drop by drop, with a most fragrant smell and a very sweet taste .\n\nThis is the supreme arcanum of the philosophers in Antimony, which they account most highly among the arcana of oils.\n\nThen, lastly, let the oil of Sol be made in the following way: – Take of the purest Sol as much as you will, and dissolve it in rectified spirit of wine.\n\nLet the spirit be abstracted several times, and an equal number of times let it be dissolved again.\n\nLet the last solution be kept with the spirit of wine, and circulated for a month.\n\nAfterwards let the volatile gold and the spirit of wine be distilled three or four times by means of an alembic, so that it may flow down into the receiver and be brought to its supreme essence.\n\nTo half an ounce of this dissolved gold let one ounce of the Oil of Antimony be added.\n\nThis oil embraces it in the heat of the bath, so that it does not easily let it go, even if the spirit of wine be extracted."

