[content]
body = "There are also two matters of the Stone, Sol and Luna, formed together in a proper marriage, both natural and artificial.\n\nNow, as we see that the man or the woman, without the seed of both, cannot generate, in the same way our man, Sol, and his wife, Luna, cannot conceive or do an thing in the way of generation, without the seed and sperm of both.\n\nHence the philosophers gathered that a third thing was necessary, namely, the animated seed of both, the man and the woman, without which they judged that the whole of their work was fruitless and in vain.\n\nSuch a sperm is Mercury, which, by the natural conjunction of both bodies Sol and Luna, receives their nature into itself in union.\n\nThen at length, and not before, the work is fit for congress, ingress, and generation; by the masculine and feminine power and virtue.\n\nHence the philosophers have said that this same Mercury is composed of body, spirit, and soul, and that it has assumed the nature and property of all elements.\n\nTherefore, with their most powerful genius and intellect, they asserted their Stone to be animal.\n\nThey even called it their Adam, who carries his own invisible Eve hidden in his body, from that moment in which they were united by the power of the Supreme God, the Maker of all creatures.\n\nFor this reason it may be said that the Mercury of the Philosophers is none other than their most abstruse, compounded Mercury, and not the common Mercury.\n\nSo then they have wisely said to the sages that there is in Mercury whatever wise men seek.\n\nAlmadir, the philosopher, says: \"We extract our Mercury from one perfect body and two perfect natural conditions incorporated together, which indeed puts forth externally its perfection, whereby it is able to resist the fire, so that its internal imperfection may be protected by the external perfections\".\n\nBy this passage of the sagacious philosopher is understood the Adamic matter, the limbus of the microcosm , and the homogeneous, unique matter of the philosophers.\n\nThe sayings of these men, which we have before mentioned, are simply golden, and ever to be held in the highest esteem, because they contain nothing superfluous or without force.\n\nSummarily, then, the matter of the Philosophers’ Stone is none other than a fiery and perfect Mercury extracted by Nature and Art; that is, the artificially prepared and true hermaphrodite Adam, and the microcosm: That wisest of the philosophers, Mercurius, making the same statement, called the Stone an orphan.\n\nOur Mercury, therefore, is the same which contains in itself all the perfections, force, and virtues of the Sun, which also runs through all the streets and houses of all the planets, and in its own rebirth has acquired the force of things above and things below; to the marriage of which it is to be compared, as is clear from the whiteness and the redness combined in it.\n\nCHAPTER XVII.\n\nCONCERNlNG THE PREPARATION OF THE MATTER FOR THE PHILOSOPHIC STONE.\n\nWhat Nature principally requires is that its own philosophic man should be brought into a mercurial substance, so that it may be born into the philosophic Stone.\n\nMoreover, it should be remarked that those common preparations of Geber, Albertus Magnus, Thomas Aquinas, Rupescissa, Polydorus, and such men, are nothing more than some particular solutions, sublimations, and calcinations, having no reference to our universal substance, which needs only the most secret fire of the philosophers.\n\nLet the fire and Azoth therefore suffice for you."

