[content]
body = "The same opinion must be passed on the sublimation of Mercury by mineral spirits, for the white and the red, as by vitriol, saltpetre, alum, crocuses, etc., concerning all which subjects that sophist, John de Rupescissa, romances in his treatise on the White and Red Philosophic Stone.\n\nTaken altogether, these are merely deceitful dreams.\n\nAvoid also the particular sophistry of Geber; for example, his sevenfold sublimations or mortifications, and also the revivifications of Mercury, with his preparations of salts of urine, or salts made by a sepulchre, all which things are untrustworthy.\n\nSome others have endeavoured to fix Mercury with: the sulphurs of minerals and metals, but have been greatly deceived.\n\nIt is true I have seen Mercury by this Art, and by such fixations, brought into a metallic body resembling and counterfeiting good silver in all respects; but when brought to the test it has shewn itself to be false.\n\nCHAPTER X.\n\nCONCERNING THOSE WHO HAVE SOUGHT THE STONE AND ALSO PARTICULARS IN MINERALS.\n\nSome sophists have tried to squeeze out a fixed oil from Mercury seven times sublimed and as often dissolved by means of aquafortis.\n\nIn this way they attempt to bring imperfect metals to perfection: but they have been obliged to relinquish their vain endeavour.\n\nSome have purged vitriol seven times by calcination, solution, and coagulation, with the addition of two parts of sal ammoniac, and by sublimation, so that it might be resolved into a white water, to which they have added a third part of quicksilver, that it might be coagulated by water.\n\nThen afterwards they have sublimated the Mercury several times from the vitriol and sal ammoniac, so that it became a stone.\n\nThis stone they affirmed, being conceived of the vitriol, to be the Red Sulphur of the philosophers, with which they have, by means of solutions and coagulations, made some progress in attaining the stone; but in projection it has all come to nothing.\n\nOthers have coagulated Mercury by water of alum into a hard mass like alum itself; and this they have fruitlessly fixed with fixatory waters.\n\nThe sophists propose to themselves very many ways of fixing Mercury, but to no purpose, for therein nothing perfect or constant can be had.\n\nIt is therefore in vain to add minerals thereto by sophistical processes, since by all of them he is stirred up to greater malice, is rendered more lively, and rather brought to greater impurity than to any kind of perfection.\n\nSo, then, the philosophers’ matter is not to be sought from thence.\n\nMercury is somewhat imperfect; and to bring it to perfection will be very difficult, nay, impossible for any sophist.\n\nThere is nothing therein that can be stirred up or compelled to perfection.\n\nSome have taken arsenic several times sublimated, and frequently dissolved with oil of tartar and coagulated.\n\nThis they have pretended to fix, and by it to turn copper into silver.\n\nThis, however, is merely a sophistical whitening, for arsenic cannot be fixed unless the operator be an Artist, and knows well its tingeing spirit.\n\nTruly in this respect all the philosophers have slept, vainly attempting to accomplish anything thereby.\n\nWhoever, therefore, is ignorant as to this spirit, cannot have any hopes of fixing it, or of giving it that power which would make it capable of the virtue of transmutation.\n\nSo, then, I give notice to all that the whitening of which I have just now spoken is grounded on a false basis, and that by it the copper is deceitfully whitened, but not changed."

