[content]
body = "From the fact that the philosophers make mention of certain preparations, such as putrefaction, distillation, sublimation, calcination, coagulation, dealbation, rubification, ceration, fixation, and the like, you should understand that in their universal substance, Nature herself fulfils all the operations in the matter spoken of, and not the operator, only in a philosophical vessel, and with a similar fire, but not common fire.\n\nThe white and the red spring from one root without any intermediary.\n\nIt is dissolved by itself, it copulates by itself, grows white, grows red, is made crocus-coloured and black by itself, marries itself and conceives in itself.\n\nIt is therefore to be decocted, to be baked, to be fused; it ascends, and it descends.\n\nAll these operations are a single operation and produced by the fire alone.\n\nStill, some philosophers, nevertheless, have, by a highly graduated essence of wine, dissolved the body of Sol, and rendered it volatile, so that it should ascend through an alembic, thinking that this is the true volatile matter of the philosophers, though it is not so.\n\nAnd although it be no contemptible arcanum to reduce this perfect metallic body into a volatile, spiritual substance, yet they are wrong in their separation of the elements.\n\nThis process of the monks, such as Lully, Richard of England, Rupescissa, and the rest, is erroneous.\n\nBy this process they thought that they were going to separate gold after this fashion into a subtle, spiritual, and elementary power, each by itself, and afterwards by circulation and rectification to combine them again in one – but in vain.\n\nFor although one element may, in a certain sense, be separated from another, yet, nevertheless, every element separated in this way can again be separated into another element, but these elements cannot afterwards by circulation in a pelican, or by distillation, be again brought back into one; but they always remain a certain volatile matter, and aurum potabile, as they themselves call it.\n\nThe reason why they could not compass their intention is that Nature refuses to be in this way dragged asunder and separated by man’s disjunctions, as by earthly glasses and instruments.\n\nShe alone knows her own operations and the weights of the elements, the separations, rectifications, and copulations of which she brings about without the aid of any operator or manual artifice, provided only the matter be contained in the secret fire and in its proper occult vessel.\n\nThe separation of the elements, therefore, is impossible by man.\n\nIt may appear to take place, but it is not true, whatever may be said by Raymond Lully, and of that famous English golden work which he is falsely supposed to have accomplished.\n\nNature herself has within herself the proper separator, who again joins together what he has put asunder, without the aid of man.\n\nShe knows best the proportion of every element, which man does not know, however miseading writers romance in their frivolous and false recipes about this volatile gold.\n\nThis is the opinion of the philosophers, that when they have put their matter into the more secret fire, and when with a moderated philosophical heat it is cherished on every side, beginning to pass into corruption, it grows black.\n\nThis operation they term putrefaction, and they call the blackness by the name of the Crow’s Head.\n\nThe ascent and descent thereof they term distillation, ascension, and descension.\n\nThe exsiccation they call coagulation; and the dealbation they call calcination; while because it becomes fluid and soft in the heat they make mention of ceration.\n\nWhen it ceases to ascend and remains liquid at the bottom, they say fixation is present.\n\nIn this manner it is the terms of philosophical operations are to bc understood, and not otherwise.\n\nCHAPTER XVIII."

