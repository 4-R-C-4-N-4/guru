[content]
body = "After the mortification of vegetables, they are transmuted, by the concurrence of two minerals, such as Sulphur and Salt, into a mineral nature, so that at length they themselves become perfect minerals.\n\nSo it is that in the mineral burrows and caves of the earth, vegetables are found which, in the long succession of time, and by the continuous heat of sulphur, put off the vegetable nature and assume that of the mineral.\n\nThis happens, for the most part, where the appropriate nutriment is taken away from vegetables of this kind, so that they are afterwards compelled to derive their nourishment from the sulphur and salts of the earth, until what was before vegetable passes over into a perfect mineral.\n\nFrom this mineral state, too, sometimes a perfect metallic essence arises, and this happens by the progress of one degree into another.\n\nBut let us return to the Philosophers’ Stone.\n\nThe matter of this, as certain writers have mentioned, is above all else difficult to discover and abstruse to understand.\n\nThe method and most certain rule for finding out this, as well as other subjects – what they embrace or are able to effect – is a careful examination of the root and seed by which they come to our knowledge.\n\nFor this, before all things else, a consideration of principles is absolutely necessary; and also of the manner in which Nature proceeds from imperfection to the end of perfection.\n\nNow, for this consideration it is well to have it thoroughly understood from the first that all things created by Nature consist of three primal elements, namely, natural Mercury, Sulphur, and Salt in combination, so that in some substances they are volatile, in others fixed.\n\nWherever corporal Salt is mixed with spiritual Mercury and animated Sulphur into one body, then Nature begins to work, in those subterranean places which serve for her vessels, by means of a separating fire.\n\nBy this the thick and impure Sulphur is separated from the pure, the earth is segregated from the Salt, and the clouds from the Mercury, while those purer parts are preserved, which Nature again welds together into a pure geogamic body.\n\nThis operation is esteemed by the Magi as a mixture and conjunction by the uniting of three constituents, body, soul, and spirit.\n\nWhen this union is completed there results from it a pure Mercury.\n\nNow if this, when flowing down through its subterranean passages and veins, meets with a chaotic Sulphur, the Mercury is coagulated by it according to the condition of the Sulphur.\n\nIt is, however, still volatile, so that scarcely in a hundred years is it transformed into a metal.\n\nHence arose the vulgar idea that Mercury and Sulphur are the matter of the metals, as is certainly reported by miners.\n\nIt is not, however, common Mercury and common Sulphur which are the matter of the metals, but the Mercury and the Sulphur of the philosophers are incorporated and inborn in perfect metals, and in the forms of them, so that they never fly from the fire, nor are they depraved by the force of the corruption caused by the elements.\n\nIt is true that by the dissolution of this natural mixture our Mercury is subdued, as all the philosophers say.\n\nUnder this form of words our Mercury comes to be drawn from perfect bodies and from the forces of the earthly planets.\n\nThis is what Hermes asserts in the following terms: \"The Sun and the Moon are the roots of this Art\".\n\nThe Son of Hamuel says that the Stone of the philosophers is water coagulated, namely, in Sol and Luna.\n\nFrom this it is clearer than the sun that the material of the Stone is nothing else but Sol and Luna.\n\nThis is confirmed by the fact that like produces like.\n\nWe know that there are only two Stones, the white and the red."

