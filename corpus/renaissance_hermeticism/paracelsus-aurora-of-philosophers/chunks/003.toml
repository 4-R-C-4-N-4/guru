[content]
body = "For this reason Pythagoras could not be called a wise man, because the Egyptian priestcraft and wisdom were not perpectly taught, although he received therefrom many mysteries and arcana; and that Anaxagoras had received a great many as well, is clear from his discussions on the subject of Sol and its Stone, which he left behind him after his death.\n\nYet he differed in many respects from the Egyptians.\n\nEven they would not be called wise men or Magi; but, following Pythagoras, they assumed the name of philosophy: yet they gathered no more than a few gleams like shadows from the magic of the Persians and the Egyptians.\n\nBut Moses, Abraham, Solomon, Adam, and the wise men that came from the East to Christ, were true Magi, divine sophists and cabalists.\n\nOf this art and wisdom the Greeks knew very little or nothing at all; and therefore we shall leave this philosophical wisdom of the Greeks as being a mere speculation, utterly distinct and separate from other true arts and sciences.\n\nCHAPTER IV.\n\nWHAT MAGI THE CHALDEANS, PERSIANS, AND EGYPTIANS WERE.\n\nMany persons have endeavoured to investigate and make use of the secret magic of these wise men; but it has not yet been accomplished.\n\nMany even of our own age exalt Trithemius, others Bacon and Agrippa, for magic and the cabala – two things apparently quite distinct – not knowing why they do so.\n\nMagic, indeed, is an art and faculty whereby the elementary bodies, their fruits, properties, virtues, and hidden operations are comprehended.\n\nBut the cabala, by a subtle understanding of the Scriptures, seems to trace out the way to God for men, to shew them how they may act with Him, and prophesy from Him; for the cabala is full of divine mysteries, even as Magic is full of natural secrets.\n\nIt teaches of and foretells from the nature of things to come as well as of things present, since its operation consists in knowing the inner constitution of all creatures, of celestial as well as terrestrial bodies: what is latent within them; what are their occult virtues; for what they were originally designed, and with what properties they are endowed.\n\nThese and the like subjects are the bonds wherewith things celestial are bound up with things of the earth, as may sometimes be seen in their operation even with the bodily eyes.\n\nSuch a conjunction of celestial influences, whereby the heavenly virtues acted upon inferior bodies, was formerly called by the Magi a Gamahea , or the marriage of the celestial powers and properties with elementary bodies.\n\nHence ensued the excellent commixtures of all bodies, celestial and terrestrial, namely, of the sun and planets, likewise vegetables, minerals, and animals.\n\nThe devil attempted with his whole force and endeavour to darken this light; nor was he wholly frustrated in his hopes, for he deprived all Greece of it, and, in place thereof, introduced among that people human speculations and simple blasphemies against God and against His Son.\n\nMagic, it is true, had its origin in the Divine Ternary and arose from the Trinity of God.\n\nFor God marked all His creatures with this Ternary and engraved its hieroglyph on them with His own finger.\n\nNothing in the nature of things can be assigned or produced that lacks this magistery of the Divine Ternary, or that does not even ocularly prove it.\n\nThe creature teaches us to understand and see the Creator Himself, as St.\n\nPaul testifies to the Romans.\n\nThis covenant of the Divine Ternary, diffused throughout the whole substance of things, is indissoluble.\n\nBy this, also, we have the secrets of all Nature from the four elements."

