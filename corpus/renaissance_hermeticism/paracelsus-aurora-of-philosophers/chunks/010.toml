[content]
body = "But this is not done in the way pointed out by such evil sophists as Geber in \"The Sum of Perfection\", Albertus Magnus, Aristotle the chemist in \"The Book of the Perfect Magistery\", Rhasis and Polydorus; for those writers, however many they be, are either themselves in error, or else they write falsely out of sheer envy, and put forth receipts whilst not ignorant of the truth.\n\nArsenic contains within itself three natural spirits.\n\nThe first is volatile, combustible, corrosive, and penetrating all metals.\n\nThis spirit whitens Venus and after some days renders it spongy.\n\nBut this artifice relates only to those who practise the caustic art.\n\nThe second spirit is crystalline and sweet.\n\nThe third is a tingeing spirit separated from the others before mentioned.\n\nTrue philosophers seek for these three natural properties in arsenic with a view to the perfect projection of the wise men .\n\nBut those barbers who practise surgery seek after that sweet and crystalline nature separated from the tingeing spirit for use in the cure of wounds, buboes, carbuncles, anthrax, and other similar ulcers which are not curable save by gentle means.\n\nAs for that tingeing spirit, however, unless the pure be separated from the impure in it, the fixed from the volatile, and the secret tincture from the combustible, it will not in any way succeed according to your wish for projection on Mercury, Venus, or any other imperfect metal.\n\nAll philosophers have hidden this arcanum as a most excellent mystery.\n\nThis tingeing spirit, separated from the other two as above, you must join to the spirit of Luna, and digest them together for the space of thirty-two days, or until they have assumed a new body.\n\nAfter it has, on the fortieth natural day, been kindled into flame by the heat of the sun, the spirit appears in a bright whiteness, and is endued with a perfect tingeing arcanum.\n\nThen it is at length fit for projection, namely, one part of it upon sixteen parts of an imperfect body, according to the sharpness of the preparation.\n\nFrom thence appears shining and most excellent Luna, as though it had been dug from the bowels of the earth.\n\nCHAPTER XII.\n\nGENERAL INSTRUCTION CONCERNING THE ARCANUM OF VITRIOL AND THE RED TINCTURE TO BE EXTRACTED FROM IT.\n\nVitriol is a very noble mineral among the rest, and was held always in highest estimation by philosophers, because the Most High God has adorned it with wonderful gifts.\n\nThey have veiled its arcanum in enigmatical figures like the following: \"Thou shalt go to the inner parts of the earth, and by rectification thou shalt find the occult stone, a true medicine\".\n\nBy the earth they understood the Vitriol itself; and by the inner parts of the earth its sweetness and redness, because in the occult part of the Vitriol lies hid a subtle, noble, and most fragrant juice, and a pure oil.\n\nThe method of its production is not to be approached by calcination or by distillation.\n\nFor it must not be deprived on any account of its green colour.\n\nIf it were, it would at the same time lose its arcanum and its power.\n\nIndeed, it should be observed at this point that minerals, and also vegetables and other like things which shew greenness without, contain within themselves an oil red like blood, which is their arcanum.\n\nHence it is clear that the distillations of the druggists are useless, vain, foolish, and of no value, because these people do not know how to extract the bloodlike redness from vegetables."

