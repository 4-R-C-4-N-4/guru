[content]
body = "For the Ternary, with the magical Quaternary, produces a perfect Septenary, endowed with many arcana and demonstrated by things which are known.\n\nWhen the Quaternary rests in the Ternary, then arises the Light of the World on the horizon of eternity, and by the assistance of God gives us the whole bond.\n\nHere also it refers to the virtues and operations of all creatures, and to their use, since they are stamped and marked with their arcana, signs, characters, and figures, so that there is left in them scarcely the smallest occult point which is not made clear on examination.\n\nThen when the Quaternary and the Ternary mount to the Denary is accomplished their retrogression or reduction to unity.\n\nHerein is comprised all the occult wisdom of things which God has made plainly manifest to men, both by His word and by the creatures of His hands, so that they may have a true knowledge of them.\n\nThis shall be made more clear in another place.\n\nCHAPTER V.\n\nCONCERNING THE CHIEF AND SUPREME ESSENCE OF THINGS.\n\nThe Magi in their wisdom asserted that all creatures might be brought to one unified substance, which substance they affirm may, by purifications and purgations, attain to so high a degree of subtlety, such divine nature and occult property, as to work wonderful results.\n\nFor they considered that by returning to the earth, and by a supreme magical separation, a certain perfect substance would come forth, which is at length, by many industrious and prolonged preparations, exalted and raised up above the range of vegetable substances into mineral, above mineral into metallic, and above perfect metallic substances into a perpetual and divine Quintessence , including in itself the essence of all celestial and terrestrial creatures.\n\nThe Arabs and Greeks, by the occult characters and hieroglyphic descriptions of the Persians and the Egyptians, attained to secret and abstruse mysteries.\n\nWhen these were obtained and partially understood they saw with their own eyes, in the course of experimenting, many wonderful and strange effects.\n\nBut since the supercelestial operations lay more deeply hidden than their capacity could penetrate, they did not call this a supercelestial arcanum according to the institution of the Magi, but the arcanum of the Philosophers’ Stone according to the counsel and judgment of Pythagoras.\n\nWhoever obtained this Stone overshadowed it with various enigmatical figures, deceptive resemblances, comparisons, and fictitious titles, so that its matter might remain occult.\n\nVery little or no knowledge of it therefore can be had from them.\n\nCHAPTER VI.\n\nCONCERNING THE DIFFERENT ERRORS AS TO ITS DISCOVERY AND KNOWLEDGE.\n\nThe philosophers have prefixed most occult names to this matter of the Stone, grounded on mere similitudes.\n\nArnold, observing this, says in his \"Rosary\" that the greatest difficulty is to find out the material of this Stone; for they have called it vegetable, animal, and mineral, but not according to the literal sense, which is well known to such wise men as have had experience of divine secrets and the miracles of this same Stone.\n\nFor example, Raymond Lully’s \"Lunaria\" may be cited.\n\nThis gives flowers of admirable virtues familiar to the philosophers themselves; but it was not the intention of those philosophers that you should think they meant thereby any projection upon metals, or that any such preparations should be made; but the abstruse mind of the philosophers had another intention.\n\nIn like manner, they called their matter by the name of Martagon, to which they applied an occult alchemical operation; when, notwithstanding that name, it denotes nothing more than a hidden similitude."

