[content]
body = "And as these resemblances are reflected back to the sight, so also sometimes to the hearing, as is manifest in the Echo.\n\nBut there are more secret arts than these, and such whereby any one may at a very remote distance hear and understand what another speaks or whispers softly.\n\nThere are also, from the airy element, Winds; for they are nothing else but Air moved and stirred up.\n\nOf these there are four that are principal, blowing from the four corners of the Heaven, viz.: Notus from the South, Boreas from the North, Zephyrus from the West, Eurus from the East, which Pontanus comprehending in these verses, saith: Cold Boreas from the top of ’lympus blows, And from the bottom cloudy Notus flows.\n\nFrom setting Phœbus fruitful Zeph’rus flies, And barren Eurus from the Sun's up-rise.\n\nNotus is the Southern Wind, cloudy, moist, warm and sickly, which Hieronymus calls the butler of the rains.\n\nOvid describes it thus: Out flies South-wind with dropping wings, who shrowds His fearful aspect in the pitchie clouds, His white Haire streams, his Beard big-swol’n with showers; Mists binde his Brows, rain from his Bosome powres.\n\nBut Boreas is contrary to Notus , and is the Northern Wind, fierce and roaring, and discussing clouds; makes the Air serene, and binds the Water with frost.\n\nHim doth Ovid thus bring in speaking of himself: Force me befits: with this thick clouds I drive; Toss the blew Billows, knotty Okes up-rive; Congeal soft snow, and beat the Earth with hallo: When I my brethren in the Aire assaile, (For that's our Field) we meet with such a shock, That thundering Skies with our encounters rock And cloud-struck lightning flashes from on high, When through the Crannies of the Earth I flie And force her in her hollow Caves; I make The Ghosts to tremble, and the ground to quake.\n\nAnd Zephyrus , which is the Western Wind, is most soft, blowing from the West with a pleasant gale; it is cold and moist, removing the effects of Winter, bringing forth branches and flowers.\n\nTo this Eurus is contrary, which is the Eastern Wind, and is called Apeliotes; it is waterish, cloudy and ravenous.\n\nOf these two Ovid sings thus: To Persis and Sabea, Eurus flies; Whose gums perfume the blushing Morne’s up-rise: Next to the Evening, and the Coast that glows With setting Phœbus, flow’ry Zeph’rus blows; In Scythia horrid Boreas holds his rain, Beneath Boites, and the frozen Wain; The land to this oppos'd doth Auster steep With fruitful showres and clouds which ever weep."

