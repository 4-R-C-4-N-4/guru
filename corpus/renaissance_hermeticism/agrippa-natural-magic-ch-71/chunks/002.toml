[content]
body = "By the quality, therefore, of this spirit, and by the celestial similitude, thereof (besides those things which have already been spoken of) verses, also, from the opportunity of time, receive from above most excellent virtues; and, indeed, are more sublime and efficacious than spirits, and.\n\nvapors exhaling out of the vegetable life, such as herbs, roots, gums, aromatical things, and fumes and such like.\n\nAnd, therefore, magicians enchanting things, are wont to blow and breathe upon them the words of the verse, or to breathe in the virtue with the spirit, that so the whole virtue of the soul be directed to the thing enchanted, being disposed for the receiving of said virtue.\n\nAnd here it is to be noted that every oration, writing and words, as they induce accustomed motions by their accustomed numbers, proportions, and form, so (besides their usual order) being pronounced, or wrote backwards, move unto unusual effects."

