[content]
body = "CHAPTER LXXIV.\n\nOf the Proportion, Correspondency, and Reduction of Letters to the Celestial Signs and Planets, According to Various Tongues, and a Table Thereof .\n\nGod gave to man a mind and speech, which (as saith Mercurius Trismegistus) are thought to be a gift of the same virtue, power, and immortality.\n\nThe omnipotent God hath by his providence divided the speech of men into divers languages, which languages have, according to their diversity, received divers and proper characters of writing, consisting in their certain order, number, and figure, not so disposed and formed by hap or chance, nor by the weak judgment of man, but from above, whereby they agree with the celestial and divine bodies and virtues.\n\nBut before all notes of languages, the writing of the Hebrews is, of all, the most sacred in the figures of characters, points of vowels, and tops of accents; or consisting in matter, form, and spirit.\n\nThe position of the Stars being first made in the seat of God, which is Heaven, after the figure of them (as the masters of the Hebrews testify) are most fully formed the letters of the Celestial Mysteries, as by their figure, form, and signification, so by the numbers signified by them, and also by the various harmonies of their conjunction.\n\nWhence the more curious Mecubals of the Hebrews do undertake—by the figure of their letters, the forms of characters, and their signature, simpleness or composition, separation, crookedness or directness, defect, abounding, greatness or littleness, crowning, opening or shutting, order, transmutation, joining together, revolution of letters, and of points, and tops, by the supputation of numbers, and by the letters of things signified—to explain all things; how they proceed from the first cause, and are again to be reduced into the same.\n\nMoreover, they divide the letters of the Hebrew alphabet, viz., into twelve simple, seven double, and three mothers, which, they say, signify as characters of things—the Twelve Signs, Seven Planets, and Three Elements, viz., Fire, Water, and Earth; for they account Air no element, but as the glue and spirit of the elements.\n\nTo these, also, they appoint points and tops.\n\nAs, therefore, by the aspects of planets and signs, together with the Elements (the working spirit and truth), all things have been and are brought forth.\n\nSo, by these characters of letters and points, signifying those things that are brought forth, the names of all things are appointed, as certain Signs and vehicles of things explained, carrying with them everywhere their essence and virtues.\n\nThe profound meanings and Signs are inherent in those characters, and figures of them, as also numbers, place, order, and revolution; so that Origenes, therefore, thought that those names, when translated into another idiom, do not retain their proper virtue.\n\nFor only the original names, which are rightly imposed, because they signify naturally and have a natural activity.\n\nIt is not so with them which signify at pleasure, which have no activity as they are signifying, as they are but certain natural things in themselves.\n\nNow, if there be any language whose words have a natural signification, it is manifest that this is the Hebrew; the order of which he that shall profoundly and radically observe, and shall know to resolve proportionably the letters thereof, shall have a rule exactly to find out any idiom.\n\nThere are, therefore, two and twenty letters, which are the foundation of the world, and of creatures that are, and are named in it, and every saying and every creature are of them, and by their revolutions receive their name, being, and virtue."

