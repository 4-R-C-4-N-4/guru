[content]
body = "Also, amongst birds, these are Solary: The phœnix, being but one of that kind; and the eagle, the queen of birds; also the vulture, the swan, and those which sing at the rising Sun and, as it were, call upon it to rise, as the cock and crow; also the hawk, which because it, in the divinity of the Egyptians, is an emblem of the spirit and light, is by Porphyrius reckoned amongst the Solary birds.\n\nMoreover, all such things as have some resemblance of the works of the Sun, as worms shining in the night, and the beetle.\n\nAlso, according to Appious’ interpretation, such things whose eyes are changed according to the course of the Sun are accounted Solary; and things which come of them.\n\nAnd amongst fish, the sea-calf is chiefly Solary, who doth resist lightning; also shell-fish and the fish called Pulmo, both of which shine in the night; and the fish called stella, for his parching heat; and the fish called strombi that follow their king; and margari, which also have a king, and, being dried, are hardened into a stone of a golden color."

