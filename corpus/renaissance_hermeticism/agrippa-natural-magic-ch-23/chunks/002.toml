[content]
body = "Also there is the stone pyrophylus, of a red mixture, which Albertus Magnus saith Æsculapius makes mention of in one of his Epistles unto Octavius Augustus, saying that there is a certain poison so wonderfully cold, which preserves the heart of man (being taken out) from burning, so that if for any time it be put into the fire it is turned into a stone, and this is that stone which is called pyrophylus, from the fire.\n\nIt hath a wonderful virtue against poison, and it makes him that carries it to be renowned and dreadful to his enemies.\n\nBut, above all, that stone is most Solary which Apollonius is reported to have found, and which is called pantaura, which draws other stones to it, as the loadstone doth iron, and is most powerful against all poisons.\n\nIt is called by some pantherus, because it is spotted like the beast called the panther.\n\nIt is therefore also called pantochras, because it contains all colors, and Aaron calls it evanthum.\n\nThere are also other Solary stones, as the topazius, chrysopassus, the rubine, and balagius.\n\nSo also is auripigmentum, and things of a golden color and very lucid.\n\nAmongst plants, also, and trees, those are Solary which turn towards the Sun, as the marigold, and those which fold in their leaves when the Sun is near upon setting, but when it riseth unfold their leaves by little and little.\n\nThe lote-tree also is Solary, as is manifest by the figure of the fruit and leaves.\n\nSo is peony, sallendine, balm, ginger, gentian, and dittany; and vervain, which is of use in prophesying and expiations, as also driving away evil-spirits.\n\nThe bay-tree also is consecrated to Phœbus, so is the cedar, the palm-tree, the ash, the ivy and vine, and whatsoever repel poisons and lightnings, and those things which never fear for the extremities of the winter.\n\nSolary also are mint, mastic, zedoary, saffron, balsam, amber, musk, yellow honey, lignum aloes, cloves, cinnamon, calamus, aromaticus, pepper, frankincense, sweet-marjoram, also libanotis, which Orpheus calls the sweet perfume of the Sun.\n\nAlso amongst animals those are called Solary which are magnanimous, courageous, ambitious of victory and renown—as the lion, king of beasts; the crocodile, the spotted wolf, the ram, the boar; the bull, king of the herd, which was by the Egyptians at Heliopolis dedicated to the Sun, which they called Verites; and an ox was consecrated to Apis in Memphis, and in Herminthus a bull by the name of Pathis.\n\nThe wolf, also, was consecrated to Apollo and Latona.\n\nAlso the beast called baboon is Solary, which twelve times in a day (viz., every hour) barks and in time of Æquinoctium micturateth twelve times every hour; the same also it doth in the night, whence the Egyptians did engrave him upon their fountains."

