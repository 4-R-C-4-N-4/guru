[content]
body = "CHAPTER XXIII.\n\nHow We Shall Know What Stars Natural Things Are Under, and What Things Are Under the Sun, Which Are Called Solary .\n\nNow it is very hard to know what Star or Sign every thing is under; yet it is known through the imitation of their rays, or motion, or figure of the superiors.\n\nAlso some of them are known by their colors and odors; also some by the effects of their operations, answering to some Stars.\n\nSo, then, Solary things, or things under the power of the Sun, are amongst Elements, the lucid flame; in the humors, the purer blood and spirit of life; amongst tastes, that which is quick, mixed with sweetness; amongst metals, gold, by reason of its splendor, and its receiving that from the Sun which makes it cordial; and amongst stones, they which resemble the rays of the Sun by their golden sparklings, as doth the glittering stone aetites, which hath power against the falling sickness and poisons.\n\nSo also the stone which is called the Eye of the Sun, being of a figure like to the apple of the eye, from the middle whereof shines forth a ray; it comforts the brain and strengthens the sight.\n\nSo the carbuncle, which shines by night, hath a virtue against all airy and vaporous poison.\n\nSo the chrysolite stone, which is of a light green color, in which, when it is held against the Sun, there shines forth a golden star; and this comforts those parts that serve for breathing, and helps those that be asthmatical; and if it be bored through, and the hole filled with the mane of an ass, and bound to the left arm, it drives away idle imaginations and melancholy fears, and puts away foolishness.\n\nSo the stone called iris, which is like crystal in color, being often found with six corners; when, under some roof, part of it is held against the rays of the Sun and the other part is held in the shadow, it gathers the rays of the Sun into itself, which, whilst it sends them forth, by way of reflection, makes a rainbow appear on the opposite wall.\n\nAlso the stone heliotrope, green like the jasper or emerald, beset with red specks, makes a man constant, renowned and famous; also it conduceth to long life; and the virtue of it, indeed, is most wonderful upon the beams of the Sun, which it is said to turn into blood ( i.\n\ne.\n\n), to appear of the color of blood, as if the Sun were eclipsed, viz., when it is joined to the juice of a herb of the same name, and be put into a vessel of water.\n\nThere is also another virtue of it more wonderful, and that is upon the eyes of men, whose sight it doth so dim and dazzle that it doth not suffer him that carries it to see it, and this it doth not do without the help of the herb of the same name, which also is called heliotrope ( i.\n\ne.\n\n), following the Sun.\n\nThese virtues doth Albertus Magnus and William of Paris confirm in their writings.\n\nThe stone hyacinth also hath a virtue from the Sun against poisons and pestiferous vapors; it makes him that carries it to be safe and acceptable; it conduceth also to riches and wit; it strengthens the heart; being held in the mouth it doth wonderfully cheer up the mind."

