[content]
body = "A little before the destruction of Leuctra, the Lacedemonians heard a noise of arms in the temple of Hercules, and at the same time in the temple of Hercules the doors that were shut with bars opened themselves, and the arms that were hanged on the wall were found on the ground.\n\nThe like events may be prognosticated of other like things, as oftentimes in times past something hath been foretold of them.\n\nBut concerning these, also, the judgments of the celestial influences must not be neglected, concerning which we shall more largely treat in the following chapters."

