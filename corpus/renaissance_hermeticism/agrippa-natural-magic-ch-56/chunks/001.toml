[content]
body = "CHAPTER LVI.\n\nOf the Soothsayings of Flashes and Lightnings, and how Monstrous and Prodigious Things are to be Interpreted .\n\nNow, the soothsayings of flashes and lightnings, and of wonders, and how monstrous and prodigious things are to be interpreted, the prophets and priests of Hetruscus have taught the art.\n\nFor they have ordained sixteen regions of the heavens and have ascribed Gods to every one of them, besides eleven kinds of lightning, and nine gods which should dart them forth, by showing rules for understanding the signification of them.\n\nBut as often as monstrous, prodigious and wondrous things happen, they do presage, as is most certain, some great matter.\n\nNow, their interpreter must be some excellent conjector of similitudes, as also some curious searcher, and of them who at that time are employed about the affairs of princes and provinces.\n\nFor the celestials take such care only for princes, peoples and provinces that before the rest they might be prefigured and admonished by stars, by constellations and by prodigies.\n\nNow, if the same thing, or the like, hath been seen in former ages, we must consider that very thing and what happened after that, and according to these, to foretell the same, or the like, because the same signs are for the same things, and the like for like.\n\nSo prodigies have come before the birth and death of many eminent men and kings, as Cicero makes mention of Midas, a boy, into whose mouth whilst he was sleeping, the ant put corns of wheat, which was an omen of great riches.\n\nSo bees sat upon the mouth of Plato when he was sleeping in the cradle, by which was foretold the sweetness of his speech.\n\nHecuba, when she was bringing forth Paris, saw a burning torch, which should set on fire Troy and all Asia.\n\nThere appeared unto the mother of Phalaris the image of Mercury pouring forth blood upon the earth, with which the whole house was overflowed.\n\nThe mother of Dionysius dreamed she brought forth a satyr, which prodigious dream the event that followed made good.\n\nThe wife of Tarquinius Priscus, seeing a flame lick the head of Servius Tullius, foretold that he should have the kingdom.\n\n[paragraph continues] In like manner, after Troy was taken, Æneas disputing with Anchises, his father, concerning a fight, there appeared a flame licking the head of the crown of Ascanius and doing him no hurt.\n\nWhich thing, seeing it did portend the kingdom to Ascanius, persuaded him to depart, for monstrous prodigies did forerun great and eminent destruction.\n\nSo we read in Pliny that M.\n\nAttilius and C.\n\nPortius, being consuls, it rained milk and blood, which did presage that a very great pestilence should the next year overspread Rome.\n\nIn Lucania it rained spongeous iron, and in the year before Marcus Crassus was slain in Parthia, with which, also, all the soldiers of Lucania, being a very numerous army, were slain.\n\nL.\n\nPaulus and C.\n\nMarcellus, being consuls, it rained wool about the castle of Corisanum, near which place, a year after, T.\n\nAnnius was slain by Milus.\n\nAnd in the wars of Denmark, the noise of arms and the sound of a trumpet was heard in the air.\n\nAnd Livy, concerning the Macedonian wars, saith, in the year when Annibal died it rained blood for two days.\n\nConcerning the second Punic war, he saith that water mixed with blood came down from heaven like rain at the time when Annibal did spoil Italy."

