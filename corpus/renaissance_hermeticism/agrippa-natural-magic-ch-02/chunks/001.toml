[content]
body = "CHAPTER II.\n\nWhat Magic Is, What Are the Parts Thereof, and How the Professors Thereof Must Be Qualified .\n\nMagic is a faculty of wonderful virtue, full of most high mysteries, containing the most profound contemplation of most secret things, together with the nature, power, quality, substance and virtues thereof, as also the knowledge of whole Nature, and it doth instruct us concerning the differing and agreement of things amongst themselves, whence it produceth its wonderful effects, by uniting the virtues of things through the application of them one to the other, and to their inferior suitable subjects, joining and knitting them together thoroughly by the powers and virtues of the superior Bodies.\n\nThis is the most perfect and chief Science, that sacred and sublimer kind of Philosophy, and lastly the most absolute perfection of all most excellent Philosophy.\n\nFor seeing that all regulative Philosophy is divided into Natural, Mathematical and Theological: (Natural Philosophy teacheth the nature of those things which are in the world, searching and inquiring into their causes, effects, times, places, fashions, events, their whole and parts, also The Number and the Nature of those things, Called Elements—what Fire, Earth, Aire forth brings; From whence the Heavens their beginnings had; Whence Tide, whence Rainbow, in gay colors clad.\n\nWhat makes the Clouds that gathered are, and black, To send forth Lightnings, and a Thund’ring crack; What doth the Nightly Flames, and Comets make; What makes the Earth to swell, and then to quake; What is the Seed of Metals, and of Gold; What Virtues, Wealth, Both Nature's Coffer hold.\n\nAll these things doth Natural Philosophy, the viewer of Nature, contain, teaching us, according to Virgil's Muse: Whence all things flow— Whence Mankind, Beast; whence Fire, whence Rain and Snow; Whence Earthquakes are; why the whole Ocean beats Over its banks and then again retreats; Whence strength of Herbs, whence Courage, rage of Brutes All kinds of Stone, of creeping Things, and Fruits.\n\nBut Mathematical Philosophy teacheth us to know the quantity of natural bodies, as extended into three dimensions, as also to conceive of the motion and course of celestial bodies.\n\nAs in great haste, What makes the golden Stars to march so fast?\n\nWhat makes the Moon sometimes to mask her face, The Sun also, as if in some disgrace?\n\nAnd, as Virgil sings: How th’ Sun doth rule with twelve Zodiac Signs, The Orb that's measur’d round about with Lines— It doth the Heavens' Starry Way make known, And strange Eclipses of the Sun and Moon; Arcturus also, and the Stars of Rain, The Seven Stars likewise, and Charles, his wain; Why Winter Suns make tow’rds the West so fast; What makes the Nights so long ere they be past?\n\nAll which are understood by Mathematical Philosophy.\n\nHence, by the Heavens we may foreknow The Seasons all; times for to reap and sow, And when 'tis fit to launch into the deep, And when to war, and when in peace to sleep; And when to dig up trees, and them again To set, that they may bring forth amain.\n\nNow Theological Philosophy, or Divinity, teacheth what God is, what the Mind, what an Intelligence, what an Angel, what a Devil, what the Soul, what Religion, what sacred Institutions, Rites, Temples, Observations, and sacred Mysteries are."

