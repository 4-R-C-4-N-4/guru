[content]
body = "It instructs us also concerning Faith, Miracles, the virtues of Words and Figures , the secret operations and mysteries of Seals; and, as Apuleius saith, it teacheth us rightly to understand and to be skilled in the Ceremonial Laws, the equity of Holy things and rule of Religions.\n\nBut to recollect myself.) These three principal faculties Magic comprehends, unites and actuates; deservedly, therefore, was it by the Ancients esteemed as the highest and most sacred Philosophy.\n\nIt was, as we find, brought to light by most sage authors and most famous writers, amongst which principally Zamolxis and Zoroaster were so famous that many believed they were the inventors of this Science.\n\nTheir track Abbaris the Hyperborean, Charmondas, Danigeron, Eudoxus, Hermippus followed.\n\nThere were also other eminent, choice men, as Mercurius Tresmegistus, Porphyrius, Iamblicus, Plotinus, Proclus, Dardanus, Orpheus the Thracian, Gog the Grecian, Germa the Babylonian, Apollonius of Tyana.\n\nOsthanes also wrote excellently of this Art, whose books being as it were lost, Democritus of Abdera recovered, and set them forth with his own Commentaries.\n\nBesides, Pythagoras, Empedocles, Democritus, Plato, and many other renowned Philosophers travelled far by sea to learn this Art; and being returned, published it with wonderful devoutness, esteeming of it as a great secret.\n\nAlso it is well known that Pythagoras and Plato went to the Prophets of Memphis to learn it, and travelled through almost all Syria, Egypt, Judea, and the Schools of the Chaldeans that they might not be ignorant of the most sacred Memorials and Records of Magic, as also that they might be furnished with Divine things.\n\nWhosoever, therefore, is desirous to study in this Faculty, if he be not skilled in Natural Philosophy, wherein are discovered the qualities of things, and in which are found the occult properties of every Being, and if he be not skillful in the Mathematics, and in the Aspects, and Figures of the Stars, upon which depend the sublime virtue and property of everything; and if he be not learned in Theology, wherein are manifested those immaterial substances, which dispense and minister all things, he cannot be possibly able to understand the rationality of Magic.\n\nFor there is no work that is done by mere Magic, nor any work that is merely Magical, that doth not comprehend these three Faculties."

