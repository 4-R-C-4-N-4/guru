[content]
body = "CHAPTER XLVII. Of Magical Rings and Their Compositions . Rings , also, which were always much esteemed of by the ancients, when they are opportunely made, do in like manner impress their virtue upon us, in as much as they do affect the spirit of him that carries them with gladness or sadness, and render him courteous or terrible, bold or fearful, amiable or hateful; in as much as they do fortify us against sickness, poisons, enemies, evil spirits, and all manner of hurtful things, or, at least, will not suffer us to be kept under them. Now, the manner of making these kinds of Magical Rings is this, viz.; When any Star ascends fortunately, with the fortunate aspect or conjunction of the Moon, we must take a stone and herb that is under that Star, and make a ring of the metal that is suitable to this Star, and in it fasten the stone, putting the herb or root under it—not omitting the inscriptions of images, names and characters, as also the proper suffumigations; but we shall speak more of these in another place, where we shall treat of Images and Characters. So we read in Philostratus Jarchus that a wise prince of the Indies bestowed seven rings made after this manner (marked with the virtues and names of the seven planets) to Apollonius; of which he wore every day of the week one thereof, distinguishing them in their order according to the name of the days, as is set forth by astrologers, viz., Sunday, the ring marked with the virtues and inscribed with the name and seal of the Sun, that planet which ruleth over Sunday and from which the day taketh its name; Monday, the ring of the virtues, seal and name of the Moon; Tuesday, that inscribed unto Mars; Wednesday, that unto Mercury; Thursday, that inscribed unto Jupiter; Friday, that unto Venus, and Saturday, that unto the planet Saturn, seeing as Saturday is the last day of the week and hath correspondence with the last end of life, and is ruled by Saturn which carries the sickle of death; and, it is said, that Apollonius, by the benefit of these seven magical rings, lived above one hundred and thirty years, as also that he always retained the beauty and vigor of his youth. In like manner Moses, the lawgiver and ruler of the Hebrews, being skilled in the Magic of the Egyptians, is said by Josephus to have made rings of love and oblivion. There was also, as saith Aristotle, amongst the Cireneans, a ring of Battus which could procure love and honor. We read also that Eudamus, a certain philosopher, made rings against the bites of serpents, bewitchings, and evil spirits. The same doth Josephus relate of Solomon. Also we read in Plato that Gygus, the king of Lydia, had a ring of wonderful and strange virtues, the seal of which, when he turned it toward the palm of his hand, rendered him invisible; nobody could see him, but he could see all things; and, by the opportunity of which ring, he deceived the queen and slew the king, his master, and killed whomsoever he thought stood in his way; and in these villainies no one could see him; and, at length, by the benefit of this ring he became king of Lydia himself."

