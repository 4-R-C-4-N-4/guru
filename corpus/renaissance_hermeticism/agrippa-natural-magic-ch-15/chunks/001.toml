[content]
body = "CHAPTER XV.\n\nHow We Must Find Out and Examine the Virtues of Things by Way of Similitude .\n\nIt is now manifest that the occult properties in things are not from the nature of the Elements, but infused from above, hid from our senses, and scarce at last known by our reason, which indeed come from the Life and the Spirit of the World, through the rays of the Stars; and can no otherwise but by experience and conjecture be inquired into by us.\n\nWherefore, he that desires to enter upon this study must consider that every thing moves and turns itself to its like, and inclines that to itself with all its might, as well in property, viz., Occult Virtue, as in quality, viz., Elementary Virtue.\n\nSometimes also in substance itself, as we see in salt, for whatsoever hath long stood with salt becomes salt; for every agent, when it hath begun to act, doth not attempt to make a thing inferior to itself, but, as much as may be, like and suitable to itself.\n\nWhich also we manifestly see in sensible animals, in which the nutritive virtue doth not change the meat into an herb or a plant, but turns it into sensible flesh.\n\nIn what things, therefore, there is an excess of any quality or property, as heat, cold, boldness, fear, sadness, anger, love, hatred, or any other passion or virtue (whether it be in them by nature or, sometimes also, by art or chance, as boldness in a wanton), these things do very much move and provoke to such a quality, passion or virtue.\n\nSo fire moves to fire, and water moves to water, and he that is bold moves to boldness.\n\nAnd it is well known amongst physicians that brain helps the brain, and lungs the lungs.\n\nSo also it is said that the right eye of a frog helps the soreness of a man's right eye, and the left eye thereof helps the soreness of his left eye, if they be hanged about his neck in a cloth of its natural color.\n\nThe like is reported of the eyes of a crab.\n\nSo the feet of a tortoise helps them that have the gout in their being applied thus—as foot to foot, hand to hand, right to right, left to left.\n\nAfter this manner they say that any animal that is barren causeth another to be barren, and of the animal especially the generative parts.\n\nSo they report that a female shall be barren if, betimes, drink be made of a certain sterile animal, or anything steeped therewith.\n\nIf, however, we would obtain any property or virtue, let us seek such animals, or such other things whatsoever, in which such a property is in a more eminent manner than in any other thing, and in these let us take that part in which such a property or virtue is most vigorous; as if at any time we would promote love, let us seek some animal which is most loving, of which kind are pigeons, turtles, sparrows, swallows, wagtails, and in these take those members or parts in which the vital virtue is most vigorous, such as the heart, breast, and also like parts.\n\nAnd it must be done at that time when these animals have this affection most intense, for then they do provoke and draw love.\n\nIn like manner, to increase boldness, let us look for a lion, or a cock, and of these let us take the heart, eyes or forehead.\n\nAnd so we must understand that which Psellus the Platonist saith, viz., that dogs, crows, and cocks conduce much to watchfulness, also the nightingale and bat and horned owl, and in these the heart, head and eyes especially."

