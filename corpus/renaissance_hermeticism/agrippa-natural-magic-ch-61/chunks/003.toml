[content]
body = "Whereof the first is called oblectation, which is a certain quietness or assentation of the mind or will, because it obeys, and not willingly consents to that pleasantness which the senses hold forth; which is, therefore, defined to be an inclination of the mind to an effeminate pleasure.\n\nThe second is called effusion, which is a remission of, or dissolution of the power, viz., when beyond the oblectation, the whole power of the mind and intention of the present good is melted, and diffuseth itself to enjoy it.\n\nThe third is vaunting and loftiness, thinking itself to have attained to some great good, in the enjoyment of which it prides itself and glorieth.\n\nThe fourth and the last is envy, or a certain kind of pleasure or delight at another man's harm, without any advantage to itself.\n\nIt is said to be without any advantage to itself, because, if any one should, for his own profit, rejoice at another man's harm, this would be rather out of love to himself than out of ill will to another.\n\nAnd all these four passions, arising from a depraved appetite for pleasure, the grief or perplexity itself doth also beget very many contrary passions, as horror, sadness, fear, and sorrow at another's good without his own hurt, which we call envy, or sadness at another's prosperity, just as pity is a certain kind of sadness at another's misery."

