[content]
body = "CHAPTER X.\n\nOf the Occult Virtues of Things .\n\nThere are also other virtues in things, which are not from any Element, as to expel poison, to drive away the noxious vapors of minerals, to attract iron or anything else; and these virtues are a sequel of the species and form of this or that thing; whence also they being a little in quantity, are of great efficacy; which is not granted to any Elementary quality.\n\nFor these virtues, having much form and little matter, can do very much; but an Elementary virtue, because it hath more materiality, requires much matter for its acting.\n\nAnd they are called Occult Qualities , because their causes lie hid, and man's intellect cannot in any way reach and find them out.\n\nWherefore philosophers have attained to the greatest part of them by long experience, rather than by the search of reason: for as in the stomach the meat is digested by heat, which we know, so it is changed by a certain hidden virtue which we know not: for truly it is not changed by heat, because then it should rather be changed by the fire-side than in the stomach.\n\nSo there are in things, besides the Elementary qualities which we know, other certain imbred virtues created by Nature, which we admire and are amazed at, being such as we know not, and indeed seldom or never have seen.\n\nAs we read in Ovid of the Phœnix, one only bird, which renews herself: All Birds from others do derive their birth, But yet one Fowle there is in all the Earth, Call’d by th’ Assyrians Phœnix, who the wain Of age repairs, and sows her self again.\n\nAnd in another place— Ægyptus came to see this wondrous sight; And this rare Bird is welcom’d with delight.\n\nLong since Matreas brought a very great wonderment upon the Greeks and Romans concerning himself.\n\nHe said that he nourished and bred a beast that did devour itself.\n\nHence many to this day are solicitous what this beast of Matreas should be.\n\nWho would not wonder that fishes should be digged out of the Earth, of which Aristotle, Theophrastus, and [paragraph continues] Polybius the historian, makes mention?\n\nAnd those things which Pausanius wrote concerning the Singing Stones?\n\nAll these are effects of Occult Virtues.\n\nSo the ostrich concocts cold and most hard iron, and digests it into nourishment for his body; whose stomach, they also report, cannot be hurt with red-hot iron.\n\nSo that little fish, call echeneis, doth so curb the violence of the winds, and appease the rage of the sea, that, let the tempests be never so imperious and raging, the sails also bearing a full gale, it doth notwithstanding by its mere touch stay the ships and makes them stand still, that by no means they can be moved.\n\nSo salamanders and crickets live in the fire; although they seem sometimes to burn, yet they are not hurt.\n\nThe like is said of a kind of bitumen, with which the weapons of the Amazons were said to be smeared over, by which means they could be spoiled neither with sword nor fire; with which also the gates of Caspia, made of brass, are reported to be smeared over by Alexander the Great.\n\nWe read also that Noah's Ark -vas joined together with this bitumen, and that it endured some thousands of years upon the Mountains of Armenia.\n\nThere are many such kind of wonderful things, scarce credible, which notwithstanding are known by experience.\n\nAmongst which Antiquity makes mention of Satyrs, which were animals, in shape half men and half brutes, yet capable of speech and reason; one whereof St."

