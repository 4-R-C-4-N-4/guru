[content]
body = "Hierome reporteth, spake once unto holy Antonius the Hermit, and condemned the error of the Gentiles in worshiping such poor creatures as they were, and desired him that he would pray unto the true God for him; also he affirms that there was one of these Satyrs shewed openly alive, and afterwards sent to Constantine the Emperor."

