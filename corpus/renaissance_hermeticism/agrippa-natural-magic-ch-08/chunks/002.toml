[content]
body = "Also according to orders of Angels, some are fiery, as Seraphim, and Authorities and Powers; earthy, as Cherubim; watery, as Thrones and Archangels; airy, as Dominions and Principalities.\n\nDo we not also read of the original maker of all things, that the earth shall be opened and bring forth a Savior?\n\nIt is not spoken of the same that he shall be a fountain of living Water, cleansing and regenerating?\n\nIs not the same Spirit breathing the breath of life; and the same, according to Moses’ and Paul's testimony, a consuming Fire?\n\nThat Elements, therefore, are to be found everywhere, and in all things after their manner, no man can deny: First in these inferior bodies seculent and gross, and in celestials more pure and clear; but in supercelestials living, and in all respects blessed.\n\nElements, therefore, in the exemplary world are Ideas of things to be produced, in Intelligences are distributed powers, in Heavens are virtues, and in inferior bodies gross forms."

