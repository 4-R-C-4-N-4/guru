[content]
body = "CHAPTER VIII.\n\nHow the Elements Are in the Heavens, in Stars, in Devils, in Angels, and lastly in God Himself .\n\nIt is the unanimous consent of all Platonists, that as in the original and exemplary World, all things are in all; so also in this corporeal world, all things are in all; so also the Elements are not only in these inferior bodies, but also in the Heavens, in Stars in Devils, in Angels, and lastly in God, the maker and original example of all things.\n\nNow in these inferior bodies the Elements are accompanied with much gross matter; but in the Heavens the Elements are with their natures and virtues, viz., after a celestial and more excellent manner than in sublunary things.\n\nFor the firmness of the Celestial Earth is there without the grossness of water; and the agility of the Air without running over its bounds; the heat of Fire without burning, only shining and giving life to all things by its heat.\n\nAmongst the Stars, also, some are fiery, as Mars and Sol; airy, as Jupiter and Venus; watery, as Saturn and Mercury; and earthy, such as inhabit the eighth Orb and the Moon (which, notwithstanding, by many is accounted watery), seeing, as if it were Earth, it attracts to itself the celestial waters, with which, being imbibed, it doth, by reason of its nearness to us, pour out and communicate to us.\n\nThere are, also, amongst the Signs, some fiery, some earthy, some airy, some watery; the Elements rule them also in the Heavens, distributing to them these four threefold considerations of every Element, viz., the beginning, middle and end: So Aires possesseth the beginning of fire, Leo the progress and increase, and Sagittarius the end.\n\nTaurus the beginning of the earth, Virgo the progress, Capricorn the end.\n\nGemini the beginning of the air, Libra the progress, Aquarius the end.\n\nCancer the beginning of water, Scorpius the middle, and Pisces the end.\n\nOf the mixtions, therefore, of these Planets and Signs, together with the Elements, are all bodies made.\n\nMoreover, Devils also are upon this account distinguished the one from the other, so that some are called fiery, some earthy, some airy, and some watery.\n\nHence, also, those four Infernal Rivers—fiery Phlegethon, airy Cocytus, watery Styx, earthy Acheron.\n\nAlso in the Gospel we read of hell fire, and eternal fire, into which the cursed shall be commanded to go; and in the Revelation we read of a lake of fire, and Isaiah speaks of the damned that the Lord will smite them with corrupt air.\n\nAnd in Job, they shall skip from the waters of the snow to extremity of heat; and in the same we read, that the Earth is dark, and covered with the darkness of death and miserable darkness.\n\nMoreover, also, these Elements are placed in the Angels in Heaven and the blessed Intelligences.\n\nThere is in them a stability of their essence, which is an earthly virtue, in which is the steadfast seat of God; also their mercy and piety is a watery cleansing virtue.\n\nHence by the Psalmist they are called Waters, where he, speaking of the Heavens, saith, Who rulest the Waters that are higher than the Heavens.\n\nAlso in them their subtile breath is Air, and their love is shining Fire.\n\nHence they are called in Scripture the Wings of the Wind; and in another place the Psalmist speaks of them, Who makest Angels thy Spirits and thy Ministers a flaming fire."

