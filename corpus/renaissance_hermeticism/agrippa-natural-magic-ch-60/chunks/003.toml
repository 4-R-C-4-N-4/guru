text_name = "Agrippa: The Philosophy of Natural Magic, Chapter LX — Of Madness, and Divinations which are made when men are awake, and of the Power of a Melancholy Humor, by which Spirits are sometimes induced into Men's Bodies"
section = "Chapter LX, Section 1c"
translator = "Henry Morley; L. W. de Laurence ed."
