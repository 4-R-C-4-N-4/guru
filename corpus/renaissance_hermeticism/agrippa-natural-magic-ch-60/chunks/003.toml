[content]
body = "There are also some prognostics which are in the middle, betwixt natural and supernatural divination, as in those who are near to death, and, being weakened with old age, do sometimes foresee things to come, because, as saith Plato, by how much the more men are less hindered by their sense, so much the more accurately they understand, and because they are nearer to the place whither they must go (and their bonds being, as it were, a little loosed, seeing they are no more subject to the body) easily perceive the light of divine revelation."

