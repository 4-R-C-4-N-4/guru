[content]
body = "The eighth is the Taile of the lesser Bear, which, amongst stones, rules over the loadstone; amongst herbs, over succory or chicory, whose leaves and flowers turn towards the north; also mug-wort and the flowers of periwinkle; and, amongst animals, the tooth of a wolf.\n\nThe ninth is called the Wing of the Crow, under which, amongst stones, are such stones as are of the color of the black onyx stone; amongst plants, the bur, quadraginus, henbane and comfrey; and, amongst animals, the tongue of a frog.\n\nThe tenth is called Spica, which hath under it, amongst stones, the emerald; amongst plants, sage, trifoil, periwinkle, mug-wort and mandrake.\n\nThe eleventh is called Alchamech, which, amongst stones, rules over the jasper; amongst plants, the plantain.\n\nThe twelfth is called Elpheia; under this, amongst stones, is the topaz; amongst plants, rosemary, trifoil and ivy.\n\nThe thirteenth is called the Heart of the Scorpion, under which, amongst stones, is the sardonius and amethyst; amongst plants, long aristolochy and saffron.\n\nThe fourteenth is the Falling Vultur, under which, amongst stones, is the chrysolite; amongst plants, succory and fumitory.\n\nThe fifteenth is the Taile of Capricorn, under which, amongst stones, is chalcedony; amongst plants, marjoram, mug-wort, and catnip, and the root of mandrake.\n\nMoreover, this we must know, that every stone or plant or animal, or any other thing, is not governed by one star alone, but many of them receive influence, not separated, but conjoined, from many stars.\n\nSo amongst stones, the chalcedon is under Saturn and Mercury, together with the Taile of Scorpion, and Capricorn.\n\nThe sapphire, under Jupiter, Saturn and the star Alhajoth; tutia is under Jupiter and the Sun and Moon; the emerald, under Jupiter, Venus and Mercury and the star Spica.\n\nThe amethyst, as saith Hermes, is under Mars, Jupiter and the Heart of the Scorpion.\n\nThe jasper, which is of divers kinds, is under Mars, Jupiter and the star Alchamech.\n\nThe chrysolite is under the Sun, Venus and Mercury, as also under the star which is called the Falling Vultur.\n\nThe topaz, under the Sun and the star Elpheia; the diamond, under Mars and the Head of Algol.\n\nIn like manner, amongst vegetables, the herb dragon is under Saturn and the celestial Dragon; mastic and mint are under Jupiter and the Sun, but mastic is also under the Heart of the Lyon, and mint, under the Goat Star.\n\nHellebore is dedicated to Mars and the Head of Algol; moss and sanders to the Sun and Venus; coriander to Venus and Saturn.\n\nAmongst animals, the sea calf is under the Sun and Jupiter; the fox and ape, under Saturn and Mercury; and domestical dogs under Mercury and the Moon.\n\nAnd thus we have shewed more things in these inferiors by their superiors."

