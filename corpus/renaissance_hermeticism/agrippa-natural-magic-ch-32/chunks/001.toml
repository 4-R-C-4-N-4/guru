[content]
body = "CHAPTER XXXII.\n\nWhat Things Are Under the Signs, the Fixed Stars, and Their Images .\n\nThe like consideration is to be had in all things concerning the Figures of the Fixed Stars: Therefore they will have the terrestrial ram to be under the rule of the celestial Aries, and the terrestrial bull and ox to be under the celestial Taurus.\n\nSo also that Cancer should rule over crabs, and Leo over lions; Virgo over virgins, and Scorpio over scorpions; Capricornus over goats, Sagittarius over horses, and Pisces over fishes.\n\nAlso the celestial Ursa over bears, the Hydra over serpents, and the Dog Star over dogs, and so of the rest.\n\nNow, Apuleius distributes certain and peculiar herbs to the Signs and Planets, viz: To Aries, the herb sage; to Taurus, the vervain that grows straight; to Gemini, the vervain that grows bending; to Cancer, comfrey; to Leo, sow-bread; to Virgo, calamint; to Libra, mug-wort; to Scorpio, scorpion-grass; to Sagittarius, pimpernel; to Capricornus, the dock; to Aquarius, dragon's wort; to Pisces, hart-wort.\n\nAnd to the Planets these, viz.: To Saturn, sengreen; to Jupiter, agrimony; to Mars, sulphur-wort; to the Sun, mari-gold; to Venus, wound-wort; to Mercury, mullein; to the Moon, peony.\n\nBut Hermes, whom Albertus follows, distributes to the Planets these, viz.: To Saturn, the daffodil; to Jupiter, henbane; to Mars, rib-wort; to the Sun, knot-grass; to Venus, vervain; to Mercury, cinque-foil; to the Moon, goose-foot.\n\nWe also know by experience that asparagus is under Aries, and garden basil under Scorpio; for of the shavings of ram's-horn, sowed, comes forth asparagus; and garden basil, rubbed betwixt two stones, produceth scorpions.\n\nMoreover, I will, according to the doctrine of Hermes, and of Thebit, reckon up some of the more eminent Stars, whereof the first is called the Head of Algol, and, amongst stones, rules over the diamond; amongst plants, black hellebore and mug-wort.\n\nThe second are the Pleiades, or Seven Stars, which, amongst stones, rule over crystal and the stone diodocus; amongst plants, the herb diacedon, and frankincense and fennel; and amongst metals, quicksilver.\n\nThe third is the star Aldeboran, which hath under it, amongst stones, the carbuncle and ruby; amongst plants, the milky thistle and matry-silva.\n\nThe fourth is called the Goat Star, which rules, amongst stones, the sapphire; amongst plants, horehound, mint, mug-wort and mandrake.\n\nThe fifth is called the great Dog Star, which, amongst stones, rules over the beryl; amongst plants, savin, mug-wort and dragon's-wort; and, amongst animals, the forked tongue of a snake.\n\nThe sixth is called the lesser Dog Star, and, amongst stones, rules over achate or agate; amongst plants, the flowers of marigold and pennyroyal.\n\nThe seventh is called the Heart of the Lyon, which, amongst stones, rules over the granate or garnet; amongst plants, sallendine, mug-wort and mastic."

