[content]
body = "And amongst men the same thing is seen, according as some resemble one species of brute beast and some another: these having something of the quadruped, and those of birds, and, may be, some affinity, which I will not explain, but through which those have been known who are affected by certain sorts of beasts.\n\nNow, it is lawful for the mind which finds itself oppressed by the material conjunction of the soul, to raise itself to the contemplation of another state, to which the soul may arrive, comparing the two, and so through the future despise the present.\n\nIf a beast had a sense of the difference which exists between his own condition and that of man, and the meanness of his own state with the nobility of the human state, which he would deem it not impossible to be able to reach, he would love death, which would open to him that road, more than that life which keeps him in the present state of being.\n\nWhen the soul complains, saying, \"Ah!\n\ndogs of Actæon!\" she is represented as a thing which appears only in the inferior powers, and against which the mind rebels for having taken away the heart with it; that is to [Pg 114] say, the entire affections, with all the army of the thoughts.\n\nSo that, having a knowledge of the present state, and being ignorant of every other, and not believing that others exist about which she can have any knowledge, she complains of her thoughts, which, tardily turning towards her, come rather to draw her up than to make themselves accepted by her.\n\nAnd through the distraction which she endures on account of the ordinary love of the material and of things intelligible, she feels herself lacerated and mangled, so that at last she is forced to yield to the more vigorous impulse.\n\nAnd if, by virtue of contemplation, she rises or is caught up above the horizon of the natural affections, whence with purer eye she learns the difference between the one life and the other, then, vanquished by the lofty thoughts, and, as if dead to the body, she aspires to that which is elevated, and, although alive in the body, she vegetates there as if dead, being present as an animating principle and absent in operative activity; not because she does not act while the body is alive, but that the actions of this mass are intermittent, weak, and, as it were, purposeless.\n\nCic.\n\nThus a certain theologian, who was said to be transported to the third heaven and enchanted with the view of it, said that what he desired was the dissolution of his body.\n\n[Pg 115] Tans.\n\nSo; first complaining of the heart and quarrelling with the thoughts, she now desires to rise on high with them, and exhibits her regret for the connection and familiarity contracted with corporeal matter, and says: \"Leave me life (corporeal), and do not impede my progress upwards to my native home, to my sun.\n\nLeave me now, for no longer do my eyes weep tears; neither because I cannot succour them (the thoughts), nor because I cannot remain divided from my happiness.\n\nLeave me, for it is not fit nor possible that these two streams should run without their source, that is, without the heart.\n\nI will not, I say, make two rivers of tears here below, while my heart, which is the source of such rivers, is flown away on high with its nymphs, which are my thoughts.\" Thus, little by little, from dislike and regret, she proceeds to the hatred of inferior things, which she partly shows, saying, \"When shall this ponderous mass of me dissolve?\" and that which follows.\n\nCic."

