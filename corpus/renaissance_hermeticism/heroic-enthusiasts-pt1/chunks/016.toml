[content]
body = "Hence he cries: \"O mountain of Parnassus, where I abide!\n\nMuses, with whom I converse!\n\nFountain of Helicon, where I am nourished.\n\nMountain, that affordest me a quiet dwelling-place!\n\nMuses, that inspire me with pro [Pg 41] found doctrines.\n\nFountain, that cleanses me!\n\nMountain, on whose ascent my heart uprises!\n\nMuses, that in discourse revive my spirit.\n\nWell, whose arbours cool my brows!\n\nChange my death into life, my cypress to laurels, and my hells into heavens: that is, give me immortality, make me poet, render me illustrious!\" Tans.\n\nWell; because to those whom Heaven favours the greatest evils turn to greatest good, for needs or necessities bring forth labours and studies, and these most often bring the glory of immortal splendour.\n\nCic.\n\nFor to die in one age makes us live in all the rest.\n\nGo on.\n\nTans.\n\nThen follows: 2.\n\nIn form and place like to Parnassus is my heart, And up unto this mount for safety I ascend; My Muses are my thoughts, and they present to me At every hour new beauties counted out.\n\nThe frequent tears that from my eyes do pour, These make my fount of Helicon.\n\nBy such a mount, such nymphs, such floods, As Heaven did please, was I a poet born.\n\nNo king of any kingdom, No favouring hand of emperor, No highest priest nor great pastor, Has given to me such graces, honours, privileges, [Pg 42] As are those laurel leaves with which O'ershadowed are my heart, my thoughts, my tears.\n\nHere he declares his mountain to be the exalted affection of his heart, his Muses he calls the beauties and attributes of the object of his affections, and the fountain is his tears.\n\nIn that mountain affection is kindled; through those beauties enthusiasm is conceived, and by those tears the enthusiastic affection is demonstrated; and he esteems himself not less grandly crowned by his heart, his thoughts, and his tears than others are by the hand of kings, emperors, and popes.\n\nCic.\n\nExplain to me what he means by his heart being in form like Parnassus.\n\nTans.\n\nBecause the human heart has two summits, which terminate in one base or root; and, spiritually, from one affection of the heart proceed two opposites, love and hate; and the mountain of Parnassus has two summits and one base.\n\nCic.\n\nOn to the next!\n\n3.\n\nThe captain calls his warriors to arms, And at the trumpet's sound they all Under one sign and standard come.\n\nBut yet for some in vain the call is heard, Heedless and unprepared, they mind it not.\n\nOne foe he kills, and the insane unborn, He banishes from out the camp in scorn.\n\n[Pg 43] And thus the soul, when foiled her high designs, Would have all those opponents dead or gone; One object only I regard, One face alone my mind does fill, One beauty keeps me fixed and still; One arrow pierced my heart, and one The fire with which alone I burn, And towards one paradise I turn.\n\nThis captain is the human will, which dwells in the depths of the soul with the small helm of reason to govern and guide the interior powers against the wave of natural impulses.\n\nHe, with the sound of the trumpet—that is, by fixed resolve—calls all the warriors or invokes all the powers; called warriors because they are in continual strife and opposition; and their affections, which are all contrary thoughts, some towards one and some towards the other side inclining, and he tries to bring them all under one flag—one settled end and aim."

