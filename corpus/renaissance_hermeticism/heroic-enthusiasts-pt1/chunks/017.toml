[content]
body = "Some are called in vain to put in a ready appearance, and are chiefly those which proceed from the lower instincts, and which obey the reason either not at all, or very little; and forcing himself to prevent their actions and condemn those which cannot be prevented, he shows himself as one who would kill those and banish these, now by the scourge of scorn, now by the sword of anger.\n\nOne only is the object of [Pg 44] his regards, and on this he is intently fixed; one prospect delights and fills his imagination, one beauty pleases, and he rests in that, because the operation of the intelligence is not a work of movement but of quiet; from thence alone he derives that barb which, killing him, constitutes the consummation of perfection.\n\nHe burns with one fire alone; that is, one affection consumes him.\n\nCic.\n\nWhy is love symbolized by fire?\n\nTans.\n\nFor many reasons, but at present let this one suffice thee: that as love converts the thing loved into the lover, so amongst the elements fire is active and potent to convert all the others, simple and composite, into itself.\n\nCic.\n\nGo on.\n\nTans.\n\nHe knows one paradise—that is, one consummation, because paradise commonly signifies the end; which is again distinguished from that which is absolute in truth and essence from that which is so in appearance and shadow or form.\n\nOf the first there can only be one, as there can be only one ultimate and one primal good.\n\nOf the second the modes are infinite.\n\n4.\n\nLove, Fate, Love's object, and cold Jealousy, Delight me, and torment, content me, and afflict.\n\n[Pg 45] The insensate boy, the blind and sinister, The loftiest beauty, and my death alone Show to me paradise, and take away, Present me with all good, and steal it from me, So that the heart, the mind, the spirit, and the soul, Have joy, pain, cold, and weight in their control.\n\nWho will deliver me from war?\n\nWho give to me the fruit of love in peace?\n\nAnd that which vexes that which pleases me (Opening the gates of heaven and closing them) Who will set far apart To make acceptable my fires and tears?\n\nHe shows the reason and origin of passion; and whence it is conceived; and how enthusiasm is born, by ploughing the field of the Muses and scattering the seed of his thoughts and waiting for the fruitful harvest, discovering in himself the fervour of the affections instead of in the sun, and in place of the rain is the moisture of his eyes.\n\nHe brings forward four things: Love, Fate, the Object, and Jealousy.\n\nHere love is not a low, ignoble, and unworthy motor, but a noble lord and chief.\n\nFate is none other than the pre-ordained disposition and order of casualties to which he is subject by his destiny.\n\nThe object is the thing loved and the correlative of the lover.\n\nJealousy, it is clear, must be the ardour of the lover about the thing loved, of which it boots not to speak to him who knows what [Pg 46] love is, and which it is vain to try to explain to others.\n\nLove delights, because to him who loves it is a pleasure to love; and he who really loves would not cease from loving.\n\nThis is referred to in the following sonnet: 5.\n\nBeloved, sweet, and honourable wound, From fairest dart that love did choose, Lofty, most beauteous and potential zeal, That makes the soul in its own flames find weal!"

