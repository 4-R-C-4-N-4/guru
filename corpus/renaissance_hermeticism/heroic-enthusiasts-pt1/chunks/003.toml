[content]
body = "The Waldensians, who had lately been driven out of Piedmont, and had sought a shelter in the Calabrian territory, were hunted down and given over to the executioner.\n\nThe convent was the only refuge from violence, and Bruno, either from religious enthusiasm, or in order to be able to devote himself to study, became a friar at the age of fifteen.\n\nThere, in the quiet cloister of the convent of St.\n\nDominic at Naples, his mind was nourished and his intellect developed; the cloistral and monkish education failed to enslave his thought, and he emerged from this tutelage the boldest and least fettered of philosophers.\n\nEverything about this church and this convent, famous as having been the abode of Thomas Aquinas, was calculated to fire the enthusiasm of Bruno's soul; the leisure and quiet, far from inducing habits of indolence, or the sterile practices of asceticism, were stimulants to austere study, and to the fervour of mystical speculations.\n\nHere he passed nearly thirteen years of early manhood, until his intellect strengthened by study he began to long for independence of thought, and becoming, as he said himself, solicitous about the food of the soul and the culture of the mind, he found it irksome to go through automatically the daily vulgar routine of [Pg 5] the convent; the pure flame of an elevated religious feeling being kindled in his soul, he tried to evade the vain exercises of the monks, the puerile gymnastics, and the adoration of so-called relics.\n\nHis character was frank and open, and he was unable to hide his convictions; he put some of his doubts before his companions, and these hastened to refer them to the superiors; and thus was material found to institute a cause against him.\n\nIt became known, that he had praised the methods used by the Arians or Unitarians in expounding their doctrines, adding that they refer all things to the ultimate cause, which is the Father: this, with other heretical propositions, being brought to the notice of the Holy Office, Bruno found himself in the position of being first observed and then threatened.\n\nHe was warned of the danger that hung over him by some friends, and decided to quit Naples.\n\nHe fled from the convent, and took the road to Rome, and was there received in the monastery of the Minerva.\n\nA few days after his arrival in Rome he learned that instructions for his arrest had been forwarded from Naples; he tarried not, but got away secretly, throwing aside the monk's habiliments by the way.\n\nHe wandered for some days about the Roman Campagna, his destitute condition proving a safeguard against [Pg 6] the bands of brigands that infested those lands, until arriving near Civita Vecchia, he was taken on board a Genoese vessel, and carried to the Ligurian port, where he hoped to find a refuge from his enemies; but the city of Geneva was devastated by pestilence and civil war, and after a sojourn of a few days he pursued once more the road of exile.\n\nSeeking for a place wherein he might settle for a short time and hide from his pursuers, he stayed his steps at Noli, situated at a short distance from Savona, on the Riviera: this town, nestled in a little bay surrounded by high hills crowned by feudal castles and towers, was only accessible on the shore side, and offered a grateful retreat to our philosopher.\n\nAt Noli, Bruno obtained permission of the magistracy to teach grammar to children, and thus secured the means of subsistence by the small remuneration he received; but this modest employment did not occupy him sufficiently, and he gathered round him a few gentlemen of the district, to whom he taught the science of the Sphere."

