[content]
body = "One thing is certain, that he who loves wisely in youth will in age not go astray.\n\nBut derision is for those of mature age, into whose hands Love puts the alphabet.\n\nCic.\n\nTell me now why Fate is called blind and bad.\n\nTans.\n\nAgain, blind and bad is not said of Destiny itself, because it is of the same order and number and measure as the universe; but as to the subjects it is said to be blind, for they are blind to fate, she being so uncertain.\n\nSo also is Fate said to be evil, because every living mortal who laments and complains, blames her.\n\nAs the Apulian poet says: How is it, or what means it, Mæcenas, That none on earth contented with that fate appear, Which Reason or Heaven has assigned to them?\n\nIn the same way he calls the object the highest beauty, as it is that alone which has power of attracting him to itself; and thus he holds it more worthy, more noble, and feels it predominant and superior as he becomes subject and captive to it.\n\n\"My death itself,\" he says of Jealousy, because as Love has no more close companion than she, so also he feels he has no greater enemy; as nothing is [Pg 50] more hurtful to iron than rust, which is produced by it.\n\nCic.\n\nNow, since you have begun so, continue to show bit by bit that which remains.\n\nTans.\n\nSo will I.\n\nHe says next of Love: he shows me Paradise, in order to prove that Love himself is not blind, and does not himself render any lovers blind, except through the ignoble characteristics of the subject; even as the birds of night become blind in the sunshine.\n\nAs for himself, Love brightens, clears, and opens the intellect, permeating all and producing miraculous effects.\n\nCic.\n\nMuch of this, it seems to me, the Nolano demonstrates in another sonnet: 7.\n\nLove, through whom high truth I do discern, Thou openest the black diamond doors; Through the eyes enters my deity, and through seeing Is born, lives, is nourished, and has eternal reign; Shows forth what heaven holds, earth and hell: Makes present true images of the absent; Gains strength: and drawing with straight aim, Wounds, lays bare and frets the inmost heart.\n\nAttend now, thou base hind unto the truth, Bend down the ear to my unerring word; Open, open, if thou canst the eyes, foolish perverted one!\n\nThou understanding little, call'st him child, Because thou swiftly changest, fugitive he seems, Thyself not seeing, call'st him blind.\n\n[Pg 51] Love shows Paradise in order that the highest things may be heard, understood, and accomplished; or it makes the things loved, grand—at least in appearance.\n\nHe says, Fate takes love away; because, often in spite of the lover, it does not concede, and that which he sees and desires is distant and adverse to him.\n\nEvery good he sets before me, he says of the object, because that which is indicated by the finger of Love seems to him the only thing, the principal, and the whole."

