[content]
body = "For love, while it is finite, contented, and fixed in a certain measure, is not in the form of the species of divine beauty, but as it goes on with ever higher aspirations, it may be said to verge towards the infinite.\n\nCic.\n\n.\n\nHow is breathing made to mean aspiring?\n\nWhat relation has desire with the winds?\n\nTans.\n\nWhosoever in this present condition aspires, also sighs, and the same breathes; and therefore the vehemence of the aspiration is noted by the hieroglyph of strong breathing.\n\nCic.\n\nBut there is a difference between sighing and breathing.\n\nTans.\n\nTherefore it is not put as if one stood for the other, or as being identical, but as being similar.\n\nCic.\n\nGo on then with our proposition.\n\nTans.\n\nThe infinite aspiration then, indicated by the sighs and symbolized by the winds, is not under the dominion of Æolus in the Æolic caverns, [Pg 161] but of the aforementioned two lights, which are not only blameless, but benevolent in killing the enthusiast, inasmuch as they cause him to die to every other thing, except the absorbing affection; at the same time, they, being closed and concealed, render him unquiet, and being open, they will tranquillize him, because at this time, when the eyes of the human mind in this body are covered with a nebulous veil, the soul, through such studies, becomes troubled and harassed, and he being thus torn and goaded, will attain only that amount of quiet as will satisfy the condition of his nature.\n\nCic.\n\n.\n\nHow can our finite intellect follow after the infinite ideal?\n\nTans.\n\nThrough the infinite potency it possesses.\n\nCic.\n\nThis would be useless, if ever it came into effect.\n\nTans.\n\nIt would be useless, if it had to do with a finite action, where infinite potency would be wanting, but not with the infinite action where infinite potency is positive perfection.\n\nCic.\n\nIf the human intellect is finite in nature and in act, how can it have an infinite potency?\n\nTans.\n\nBecause it is eternal, and in this ever has delight, so that it enjoys happiness without end or [Pg 162] measure; and because, as it is finite in itself, so it may be infinite in the object.\n\nCic.\n\nWhat difference is there between the infinity of the object and the infinity of the potentiality?\n\nTans.\n\nThis is finitely infinite, and that infinitely infinite.\n\nBut to return to ourselves.\n\nThe legend there says: \"Novæ Liparææ æoliæ,\" because it seems as if we are to believe that all the winds which are in the abysmal caverns of Æolus were converted into sighs, if we include those which proceed from the affection, which aspires continually to the highest good and to the infinite beauty.\n\nXIII.\n\nCic.\n\nHere we see the signification of that burning light around which is written: \"Ad vitam, non ad horam.\" Tans.\n\nPersistence in such a love and ardent desire of true goodness, by which in this temporal state the enthusiast is consumed.\n\nThis, I think, is shown in the following tablet: 37.\n\n[A]What time the day removes the orient vault, The rustic peasant leaves his humble home, And when the sun with fiercer tangent strikes, Fatigued and parched, he sits him in the shade; [Pg 163] Then plods again with hard, laborious toil, Until black night the hemisphere enshrouds.\n\nAnd then he rests.\n\nBut I must ever chafe At morning, noon-day, evening, and at night.\n\nThese fiery rays Which stream from those two arches of my sun, Ne'er fade from the horizon of my soul."

