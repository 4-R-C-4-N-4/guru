[content]
body = "That is a maxim of the Epicureans which, being well understood, would not be considered so unworthy as the ignorant hold it to be, seeing that [Pg 149] it does not detract from what I have called virtue, nor does it impair the perfection of firmness, but it rather adds to that perfection as it is understood by the vulgar, for Epicurus does not hold that, a true and complete strength and firmness which feels and bears inconveniences, but that which bears them and feels them not.\n\nHe does not consider him perfect in divine heroic love, who feels the spur, the check, or remorse or trouble about other love; but him who has no feeling of other affections; so that being fixed in one pleasure, there is no displeasure that has any power to jostle him or dislodge him from his place.\n\nAnd this it is to touch the highest blessedness of this state, to have rapture and no sense of pain.\n\nCic.\n\nThe ignorant do not believe in this meaning of Epicurus.\n\nTans.\n\nBecause they neither read his own books, nor those that report his maxims without invidiousness, but there are those who read the course of his life and the conditions of his death, where with these words he dictated the beginning of his testament: \"Being in the last, and at the same time, the happiest day of our life, we have ordained this with a healthy, tranquil mind at rest; for whatever acute sorrow may torment us from one side, that [Pg 150] torment is entirely annulled by the pleasure of our own inventions and the consideration of our end.\" And it is manifest that he no longer felt more pleasure than sorrow in eating, drinking, repose, and in generating, but in not feeling hunger, nor thirst, nor fatigue, nor sensuality.\n\nFrom this may be understood what is according to us the perfection of firmness; not in this, that the tree neither bends nor breaks, nor is rent, but in that it does not so much as stir, and its prototype keeps spirit, sense, and intellect, fixed there, where the shock of the tempest is not felt.\n\nCic.\n\nDo you then think it is a thing to be desired, to bear shocks in order to prove that you are strong?\n\nTans.\n\nYou say \"to bear;\" and this is a part of firmness, but it is not the whole of that virtue, which consists in bearing strongly, as I say, or in not feeling, as Epicurus said.\n\nNow this loss of feeling is caused by being entirely absorbed in the cultivation of virtue, or of real good and felicity, in such wise that Regulus did not feel the chest, Lucretia the dagger, Socrates the poison, Anaxagoras the mortar, Scævola the fire, Cocles the abyss, and other worthies felt not those things [Pg 151] which would torment and fill with terror the vulgar crowd.\n\nCic.\n\nNow pass on.\n\nX.\n\nTans.\n\nLook at this other who bears the device of an anvil and a hammer, round which is the legend \"ab Aetna!\" But here Vulcan is introduced: 34.\n\nNot now to my Sicilian mount I turn, Where thou dost forge the thunderbolts of Jove, Here, rugged Vulcan will I stay; Here, where a prouder giant moves, Who burns and rages against Heaven in vain, Soliciting new cares and divers trials.\n\nHere is a better smith and Mongibello[A] A better anvil, better forge and hammer; For here behold a bosom full of sighs, Which blows the furnace and the fire revives.\n\nThe soul nor yields nor bends to these rough blows, But bears exulting this long martyrdom, And makes a harmony from these sharp pangs.\n\n[A] Mount Etna."

