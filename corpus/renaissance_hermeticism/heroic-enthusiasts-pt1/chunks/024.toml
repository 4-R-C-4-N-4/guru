[content]
body = "So that, finding himself thus ascending and descending, he feels within his soul the greatest dissension that is possible to be felt, and he remains in a state of confusion through this rebellion of the senses, which urge him thither where reason restrains, and vice versâ .\n\nThis same is thoroughly demonstrated in the following sentences, where the Reason, under the name of \"Filenio\" asks, and the enthusiast replies under the name of \"Shepherd,\" who labours in the care of the flocks and herds of his thoughts, which he nourishes in the submission to and service of his nymph, which is the affection of that object to which he is captive.\n\n11.\n\nFilenio.\n\nShepherd!\n\nShepherd.\n\nWhat wilt thou?\n\nF.\n\nWhat doest thou?\n\nS.\n\nI suffer.\n\nF.\n\nWherefore?\n\nS.\n\nBecause neither life has me for his own, nor death.\n\nF.\n\nWho's to blame?\n\nS.\n\nLove.\n\nF.\n\nThat rascal?\n\nS.\n\nThat rascal.\n\nF.\n\nWhere is he?\n\nS.\n\nHe holds me tight in my heart's core.\n\nF.\n\nWhat does he?\n\nS.\n\nWounds me.\n\nF.\n\nWho?\n\nS.\n\nMe.\n\nF.\n\nThee?\n\nS.\n\nYes.\n\nF.\n\nWith what?\n\nS.\n\nWith the eyes, the gates of heaven and of hell.\n\nF.\n\nDost hope?\n\nS.\n\nI hope.\n\nF.\n\nFor pity?\n\nS.\n\nFor pity.\n\nF.\n\nFrom whom?\n\nS.\n\nFrom him who racks me night and day.\n\nF.\n\nHas he any?\n\nS.\n\nI know not.\n\nF.\n\nThou art a fool.\n\nS.\n\nHow if such folly be pleasing to my soul?\n\nF.\n\nDoes he promise?\n\nS.\n\nNo.\n\nF.\n\nDoes he deny?\n\nS.\n\nNot at all.\n\nF.\n\nIs he silent?\n\nS.\n\nYes, for so much purity ( onestà ) robs me of my boldness.\n\nF.\n\nThou ravest.\n\nS.\n\nHow so?\n\nF.\n\nIn vain efforts.\n\nS.\n\nHis scorn more than my torments do I fear.\n\nHere he says that he craves for love, and he complains of it, yet not because he loves—seeing that to no true lover can love be displeasing; but because he loves unhappily, whilst those beams which are the rays of those lights, and which themselves, according as they are perverse and antagonistic, or really kind and gracious, become the gates which lead towards heaven or towards hell.\n\nIn this way he is kept in hope of future and uncertain mercy, but actually in a state of present and certain torment, and although he sees his folly quite clearly, nevertheless he does not care to correct himself in it, or even to feel displeased with it, but rather does he feel satisfied with it, as he shows when he says: Never let me of Love complain, For Love alone can ease my pain.\n\nHere is shown another species of enthusiasm born from the light of reason, which excites fear and suppresses the aforesaid reason in order not to commit any action which might vex or irritate the thing loved.\n\nHe says, then, that hope rests in the future, without anything being promised or denied; therefore, he is silent and asks nothing, for fear of offending purity ( l'onestade ).\n\nHe does not venture to explain himself and make a proposition, lest he be rejected with repugnance or accepted with reserve; for he thinks the evil that there might be in the one would be over-balanced by the good in the other.\n\nHe shows himself, then, ready to suffer for ever his own torment, rather than to open the door to an opportunity through which the thing loved might be perturbed and saddened.\n\nCic."

