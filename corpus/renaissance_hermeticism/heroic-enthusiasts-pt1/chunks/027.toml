[content]
body = "It is not a fury of black bile which sends him drifting outside of judgment, reason, and acts of prudence, and tossed by the discordant tempest, like those who, having violated certain laws of the divine Adrastia, are condemned to be scourged by the Furies, in order that they may be excited by a dissonance as corporeal [Pg 72] through seditions, destructions, and plagues, as it is spiritual, through the forfeiture of harmony between the perceptive and enjoying powers; but it is aglow kindled by the intellectual sun in the soul, and a divine impetus which lends it wings, with which, drawing nearer and nearer to the intellectual sun, and ridding itself of the rust of human cares, it becomes a gold tried and pure, has the perception of divine and internal harmony, and its thoughts and acts accord with the symmetry of the law, innate in all things.\n\nNot, as drunk from the cups of Circe, does he go dashing and stumbling, now in this and then in that ditch, now against this or that rock, or like a shifting Proteus, changing now to this, now to the other aspect, never finding place, fashion, or ground to stay and settle in; but, without spoiling the harmony, conquers and overcomes the horrid monsters, and however much he may swerve, he easily returns to himself[A] by means of those inward instincts that, like the nine Muses, dance and sing round the splendours of the universal Apollo, and under tangible images and material things, he comes to comprehend divine laws and counsels.\n\nIt is true that [Pg 73] sometimes, having love for his trusty escort, who is double, and because sometimes through occasional impediments he finds himself defrauded of his strength, then, as one insane and furious, he squanders away the love of that which he cannot comprehend; whence, confused by the obscurity of the divinity, he sometimes abandons the work, and then again returns, to force himself with his will thither, where he cannot arrive with the intellect.\n\nIt is true also that he commonly wanders, and transports himself, now into one, now into another form of the double Eros; therefore, the principal lesson that Love gives to him is, that he contemplate the divine beauty in shadow, when he cannot do so in the mirror, and, like the suitors of Penelope, he entertain himself with the maids when he is not permitted to converse with the mistress.\n\nNow, in conclusion, you can comprehend, from what has been said, what is this enthusiast whose picture is put forth, when it is said: 12.\n\nIf towards the shining light the butterfly, Winging his way knows not the burning flame, And if the thirsty stag, unmindful of the dart, Runs fainting to the brook, Or unicorn, unto the chaste breast running, Ignores the snare that is for him prepared, [Pg 74] I, in the light, the fount, the bosom of my love Behold the flames, the arrows, and the chains.\n\nIf it be sweet in plaintiveness to droop, Why does that lofty splendour dazzle me?\n\nWherefore the sacred arrow sweetly wound?\n\nWhy in this knot is my desire involved?\n\nAnd why to me eternal irksomeness Flames to my heart, darts to my breast and snares unto my soul?\n\n[A] Facilmente ritorna al sesso."

