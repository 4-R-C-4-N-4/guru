[content]
body = "He forms intelligible conceptions in his own way and proportions them to his capacity, so that they are received according to the manner of the recipient.\n\nTans.\n\nAnd does he hunt through the operation of the will, by the act of which he converts himself into the object?\n\nCic.\n\nAs I understand: because love transforms and converts into the thing loved.\n\nTans.\n\nWell dost thou know that the intellect learns things intelligibly— i.e.\n\n, in its own way, and the will pursues things naturally, that is, according to the reason that is in themselves.\n\nSo Actæon with those thoughts—those dogs—which hunted outside themselves for goodness, wisdom, and beauty, thus came into the presence of the same, and ravished out of himself by so much splendour, he became the prey, saw himself converted into that for which he was seeking, and perceived, that of his dogs or thoughts, he himself came to be the longed-for prey; for having absorbed the divinity into himself it was not necessary to search outside himself for it.\n\nCic.\n\nFor this reason it is said \"the kingdom of Heaven is in us;\" divinity dwells within through the reformed intellect and will.\n\n[Pg 94] Tans.\n\nIt is so.\n\nSee then, Actæon hunted by his own dogs—pursued by his own thoughts—runs and directs these novel paces, invigorated so as to proceed divinely and \"more easily,\" that is, with greater facility and with refreshed vigour \"towards the denser places,\" to the deserts and the region of things incomprehensible.\n\nFrom being such as he first was, a common ordinary man, he becomes rare and heroic, his habits and ideas are strange, and he leads an unusual life.\n\nHere his great dogs \"give him death,\" and thus ends his life according to the mad, sensual, blind, and fantastic world, and he begins to live intellectually; he lives the life of the gods, fed on ambrosia and drunk with nectar.\n\nNext we see under the form of another similitude the manner in which he arms himself to obtain the object.\n\nHe says: 19.\n\nMy solitary bird!\n\naway unto that region Which overshadows and which occupies my thought, Go swiftly, and there nestle; there every Need of thine be strengthened, There all thy industry and art be spent!\n\nThere be thou born again, and there on high, Gather and train up thy wandering fledglings Since adverse fate has drawn away the bars With which she ever sought to block thy way.\n\n[Pg 95] Go!\n\nI desire for thee a nobler dwelling-place, And thou shalt have for guide a god, Who is called blind by him who nothing sees.\n\nGo!\n\nand ever be by thee revered, Each deity of that wide sphere, And come not back to me till thou art mine.\n\nThe progress symbolized above by the hunter who excites his dogs, is here illustrated by a winged heart, which is sent out of the cage, in which it lived idle and quiet, to make its nest on high and bring up its fledglings, its thoughts, the time being come in which those impediments are removed, which were caused, externally, in a thousand different ways, and internally by natural feebleness.\n\nHe dismisses his heart then to make more magnificent surroundings, urging him to the highest propositions and intentions, now that those powers of the soul are more fully fledged, which Plato signifies by the two wings, and he commits him to the guidance of that god, who, by the unseeing crowd, is considered insane and blind, that is Love, who, by the mercy and favour of heaven, has power to transform him into that nature towards which he aspires, or into that state from which, a pilgrim, he is banished."

