[content]
body = ".\n\nNola, a city founded by the Chalcidian Greeks, at a short distance from Naples and from Vesuvius, was the birth-place of Giordano Bruno.\n\nIt is described by David Levi as a city which from ancient times had always been consecrated to science and letters.\n\nFrom the time of the Romans to that of the Barbarians and of the Middle Ages, Nola was conspicuous for culture and refinement, and its inhabitants were in all times remarkable for their courteous manners, for valour, and for keenness of perception.\n\nThey were, moreover, distinguished by their love for and study of philosophy; so that this city was ever a favourite dwelling-place for the choice spirits of the Renaissance.\n\nIt may also be asserted that Nola was the only city of Magna Græcia which, in spite of the persecutions of Pagan emperors and Christian princes and clergy, always preserved the philosophical traditions of the Pytha goreans, and never was the sacred fire on the altar of Vesta suffered to become entirely extinct.\n\nSuch was the intellectual and moral atmosphere in which Bruno passed his childhood.\n\nHis paternal home was situated at the foot of Mount Cicada, celebrated for its fruitful soil.\n\nFrom early youth his pleasure was to pass the night out on the mountain, now watching the stars, now contemplating the arid, desolate sides of Vesuvius.\n\nHe tells how, in recalling those days—the only peaceful ones of his life—he used to think, as he looked up at the infinite expanse of heaven and the confines of the horizon, with the towering volcano, that this must be the ultimate end of the earth, and it appeared as if neither tree nor grass refreshed the dreary space which stretched out to the foot of the bare smoky mountain.\n\nWhen, grown older, he came nearer to it, and saw the mountain so different from what it had appeared, and the intervening space that, seen from afar, had looked so bare and sterile, all covered with fruit-trees and enriched with vineyards, he began to see how illusory the judgment of the senses may be; and the first doubt was planted in his young soul as he perceived that, while the mind may grasp Nature in her grandeur and majesty, the work of the sage must be to examine her in detail, and penetrate to the cause of things.\n\nWhen he appeared before the tribunal of the Holy Office at Venice, being asked to declare who and what he was, he said: \"My name is Giordano, of the family of Bruno, of the city of Nola, twelve miles from Naples.\n\nThere was I born and brought up.\n\nMy profession has been and is that of letters, and of all the sciences.\n\nMy father's name was Giovanni, and my mother was Francesca Savolini; and my father was a soldier.\n\nHe is dead, and also mother.\n\nI am forty-four years old, having been born in 1548.\" He always regarded Nola with patriotic pride, and he received his first instruction in his father's house and in the public schools.\n\nOf a sad disposition, and gifted with a most lively imagination, he was from his earliest years given to meditation and to poetry.\n\nThe early years of Bruno's life were times of agitation and misfortune, and not propitious to study.\n\nThe Neapolitan provinces were disturbed by constant earthquakes, and devastated by pestilence and famine.\n\nThe Turks fought, and ravaged the country, and made slaves of the inhabitants; the neighbouring provinces were still more harassed by hordes of bandits and outlaws, who invested Calabria, led by a terrible chief called Marcone.\n\nThe Inquisition stood prepared to light its fires and slaughter the heretic."

