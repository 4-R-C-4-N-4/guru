[content]
body = "Herein he proves that his love is truly heroic; because he proposes to himself as the chief aim, not corporeal beauty, but rather the grace of the spirit, and the inclination of the affections in which, rather than in the beauty of the body, that love that has in it the divine, is eternal.\n\nTans.\n\nThou knowest that, as the Platonic ideas are divided into three species, of which one tends to the contemplative or speculative life, one to active morality, and the third to the idle and voluptuous, so are there three species of love, of which one raises itself from the contemplation of bodily form to the [Pg 66] consideration of the spiritual and divine; the other only continues in the delight of seeing and conversing; the third from seeing proceeds to precipitate into the concupiscence of touch.\n\nOf these three modes others are composed, according as the first may be coupled with the second or the third, or as all the three modes may combine together, of which one and all may be divided into others, according to the affections of the enthusiast, as these tend more towards the spiritual object, or more towards the corporeal, or equally towards the one and the other.\n\nHence it comes, that of those who find themselves in this warfare, and are entangled in the meshes of love, some aim at enjoying, and they are incited to pluck the apple from the tree of corporeal beauty, without which acquisition, or at least the hope of it, they hold vain and worthy only of derision every amorous care; and in such-wise run all those who are of a barbarous nature, who neither do nor can seek to exalt themselves by loving worthy things, and aspiring to illustrious things, and higher still to things divine, by suitable studies and exercises, to which nothing can more richly and easily supply the wings than heroic love; others put before themselves the fruit of delight, which they take in the aspect of the beauty and grace of the [Pg 67] spirit, which glitters and shines in the beauty of the body, and certain of these, although they love the body and greatly desire to be united to it, bewailing its absence and being afflicted by separation, at the same time fear, lest presuming in this they may be deprived of that affability, conversation, friendship, and sympathy which are most precious to them; because to attempt this there cannot be more guarantee of success than there is risk of forfeiting that favour, which appears before the eyes of thought as a thing so glorious and worthy.\n\nCic.\n\nIt is a worthy thing, oh Tansillo!\n\nfor its many virtues and perfections, and it behoves human genius to seek, accept, nourish, and preserve a love like that; but one should take great care not to bow down or become enslaved to an object unworthy and base, lest we become sharers of the baseness and unworthiness of the same: appositely the Ferrarese poet says Who sets his foot upon the amorous snare, Lest he besmear his wings, let him beware.\n\nTans.\n\nTo say the truth, that object, which beyond the beauty of the body has no other splendour, is not worthy of being loved otherwise than to make the race; and it seems to me the work of a pig or [Pg 68] a horse to torment one's self about it, and as to myself, never was I more fascinated by such things than I am now fascinated by some statue or picture to which I am indifferent.\n\nIt would then be a great dishonour to a generous soul, if, of a foul, vile, loose, and ignoble nature, although hid under an excellent symbol, it should be said: \"I fear his scorn more than my torment.\" [Pg 69]"

