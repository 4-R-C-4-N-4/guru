[content]
body = "Others esteem him unhappy through this appearance of an evil destiny, as being condemned to these pangs, for he will never cease from acknowledging the obligation he is under to love, nor cease from rendering thanks to him because he has presented before the eyes of his mind such an intelligible conception through which, in this earthly life, shut in this prison of the flesh, wrapped in these nerves and supported by these bones, it is permitted to him to contemplate the divinity in a more suitable manner than if other conceptions and similitudes than these had offered themselves.\n\nCic.\n\nThe divine and living object, then, of which he speaks, is the highest intelligible conception that he has been able to form to himself of the divinity, and is not some corporeal beauty which might overshadow his thought and appear superficially to the senses.\n\nTans .\n\nEven so; because no tangible thing nor conception of such can raise itself to so much dignity.\n\nCic .\n\nWhy, then, does he mention that conception as the object, if, as appears to me, the true object is the divinity itself?\n\nTans .\n\nThe divinity is the final object, the ultimate and most perfect, but not in this state, where we cannot see God except as in a shadow or a mirror, and therefore He cannot be the object except in some similitude, but not in such as may be extracted or acquired from corporeal beauty and excellence, by virtue of the senses, but such as may be formed in the mind, by virtue of the intellect.\n\nIn which state, finding himself, he comes to lose the love and affection for every other thing senseful as well as intellectual, because this, conjoined to that light, itself also becomes light, and in consequence becomes a god: because it contracts the divinity into itself, it being in God through the intention with which it penetrates into the divinity so far as it can, and God being in it, so that after penetrating, it comes to conceive, and so far as it can, receive and comprehend the divinity in its conception.\n\nNow in such conceptions and similitudes the human intellect of this lower world nourishes itself, till such time as it will be lawful to behold with purer eye the beauty of the divinity.\n\nAs happens to him, who, absorbed in the contemplation of some elaborate architectural work, goes on examining one thing after another in it, enchanted and feeding in a wonder of delight; but if it should happen that he sees the lord of all those pictures, who is of a beauty incomparably greater, leaving all care and thought of them, he is turned intently to the examination of him.\n\nHere, then, is the difference between that state where we see divine beauty in intelligible conceptions apart from the effects, labours, works, shadows, and similitudes of it, and that other state in which it is lawful to behold it in real presence.\n\nHe says: \"My pasture is the high emprise,\" because as the Pythagoreans remark, \"The soul moves and turns round God, as the body round the soul.\" Cic .\n\nThen the body is not the habitation of the soul?\n\nTans .\n\nNo; because the soul is not in the body locally, but as intrinsic form and extrinsic framer, as that which forms the limbs indicates the internal and external composition.\n\nThe body, then, is in the soul, the soul in the mind, the mind either is God or is in God, as Plotinus said.\n\nAs in its essence it is in God who is its life, similarly through the intellectual operation, and the will consequent upon such operation, it agrees with its bright and beatific object."

