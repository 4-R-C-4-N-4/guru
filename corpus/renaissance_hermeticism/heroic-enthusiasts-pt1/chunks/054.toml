[content]
body = "So also is the hemisphere of this earth ever equally irradiated, although from the watery surfaces she from time to time sends her splendours unequally to the moon,—which like innumerable other stars we consider as another earth—in the same manner, she also sends hers to the earth, on account of the periodical changes which both experience in finding themselves now the one, now the other, nearer to the sun.\n\nCic.\n\nHow can this intelligence be signified by the moon which lights up the hemisphere?\n\nTans.\n\nAll the intelligences are signified by the moon, in so far as they are sharers in act and in power, in so far as they have the light materially and by participation, receiving it from another; I say that, as not being lights of themselves, nor by their own nature, but by reflection from the sun, which is the first intelligence, which is pure and absolute light, as it is also pure and absolute action.\n\nCic.\n\nAll those things, then, that are dependent, and are not the first act and cause, are they composed of light and shade, of matter and form, of power and action?\n\nTans.\n\nIt is so.\n\nFurthermore this soul of ours, in all its substance, is signified by the moon which shines through the hemisphere of the superior powers, by which it is turned towards the light of the intelligible world, and is dark through the inferior powers, by which it is occupied with material things.\n\nIX.\n\nCic.\n\nIt seems to me that what has just been said has some connection and analogy with the impression that I see on the next shield, where stands a gnarled and rugged oak, against which the wind is raging, and it is circumscribed by the legend, \"ut robori robur,\" and here is the tablet, which says: 33.\n\nOld oak, that spread'st thy branches to the air, And firmly in the earth dost fix thy roots; No shifting of the land, no mighty elements, Which Heaven from the stormy north unlocks; Nor whatso'er the gruesome winter sends, Can tear thee from the spot where thou art chained.\n\nThou art the veritable portrait of my faith, Which, fixed, remains 'gainst every casual chance.\n\nEver the self-same ground dost thou Grasp, cultivate and comprehend; and stretch Thy grateful roots unto the generous breast.\n\nUpon one only object I Have fixed my spirit, sense, and intellect.\n\nTans.\n\nThe legend is clear, by which the enthusiast boasts of having the strength and vigour of the oak, and as before said of being ever the same in respect to the one only ph[oe]nix, and in the next preceding one, conforming himself to that moon which ever shines so brightly and is so beautiful, and also in that he does not resemble this antichthon between our earth and the sun in so far as it changes to our eyes, but in that it ever receives within itself an equal amount of the solar splendour, and through this remains constant and firm against the rough winds and tempests of winter, through the stability that he has in his star, in which he is planted by affection and intention, as the roots of the oak twist and weave themselves into the veins of the earth.\n\nCic.\n\nI hold it better worth living in quiet and without vexation than to be forced to endure so much.\n\nTans."

