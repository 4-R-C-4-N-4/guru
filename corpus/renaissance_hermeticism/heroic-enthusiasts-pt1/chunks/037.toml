[content]
body = "To be infinite, it must be infinitely pursued with that form of pursuit which is not incited physically, but metaphysically, and is not from imperfect to perfect, but goes circulating through the grades of perfection to arrive at that infinite centre which is not form, and is not formed.\n\nCic.\n\nI should like to know how, by circumambulating, one is to arrive at the centre?\n\nTans.\n\nI cannot know that.\n\nCic.\n\nWhy do you say it?\n\nTans.\n\nI can say it, and leave it to you to consider.\n\nCic.\n\nIf you do not mean that he who pursues the infinite is like him who talks about the circumference when he is seeking for the centre, I do not know what you mean.\n\nTans.\n\nQuite the contrary.\n\nCic.\n\nNow if you will not explain yourself, I cannot understand you; but tell me, prythee, what he means by saying the heart is bound by cruel, spiteful bonds.\n\nTans.\n\nHe speaks in similitude or metaphor; as you would say, cruel was one who did not allow a full enjoyment, and who lives more in the desire than in possession, and who, partially possessing, is not content, but desires, faints, and dies.\n\nCic.\n\nWhat are those thoughts that call him back from the noble enterprise?\n\nTans.\n\nThe sensual and natural affections, which regard the government of the body.\n\nCic .\n\nWhat have they to do with it, that in no way can either help or favour it?\n\nTans .\n\nThey have not to do with it, but with the soul, which, being so absorbed in one work or study, becomes remiss and careless in others.\n\nCic .\n\nWhy does he call him insane?\n\nTans .\n\nBecause he surpasses in knowledge.\n\nCic .\n\nIt is usual to call insane those who know nothing.\n\nTans .\n\nOn the contrary.\n\nThose are called insane who know not in the ordinary way, or who rise above the ordinary from having more intellect.\n\nCic .\n\nI perceive that thou sayest truly.\n\nNow tell me what are the pricks, the lightnings, and the chains?\n\nTans .\n\nPricks are those experiences that stimulate and awaken the affection, to make it on the alert; lightnings are the rays of the present beauty, which enlighten those who watch and wait for them; chains are those effects and circumstances which keep fixed the eyes of attention and unite together the object and the powers.\n\nCic .\n\nWhat are the looks, the accents, and the customs?\n\nTans .\n\nLooks are the means by which the object is made present to us; accents are the means through which we are inspired and informed; customs are the circumstances which are most pleasant and agreeable to us.\n\nSo that the heart that gently suffers, patiently burns and constantly perseveres in the work, fears that its hurt will heal, its fire be extinguished, and its bands be loosened.\n\nCic .\n\nNow relate that which follows.\n\nTans .: 21.\n\nLofty, profound, and stirring thoughts of mine, Ye long to sever the maternal ties Of the afflicted soul, and like to proud And able bowmen, draw at the mark, Which is the germ of all your high conceits.\n\nIn those steep paths where cruel beasts may be, Let not heaven leave ye!\n\nRemember to return, and summon back The heart that tarries with the wild wood nymph; Arm ye with love, Warm with the flame of domesticity, And with strong repression guard thy sight, That strangers keep thee not companioned with my heart; At least bring news of that, Which unto him is such delight and joy.\n\nHere he describes the natural solicitude of the attentive soul on the subject, of its inclination towards generation, which it has contracted with matter."

