[content]
body = "Of necessity, one is according to the sum of the other, seeing that where things are finite it may result in this, that it is more wise than beautiful or good, more good and beautiful than wise, more wise and good than powerful, and more powerful than good or wise.\n\nBut where there is infinite wisdom there cannot be other than infinite power, otherwise there would be no infinite knowledge.\n\nWhere there is infinite goodness there must be infinite wisdom, otherwise there would be no infinite goodness.\n\nWhere there is infinite power there must be infinite goodness and wisdom, because there is the being able to know and the knowing to be able.\n\nNow, observe how the object of this enthusiast, who is, as it were, inebriated with the drink of the gods, is incomparably higher than [Pg 158] others which are different.\n\nI mean to say that the divine essence comprehends in the very highest degree perfection of all kinds, so that according to the degree in which this particular form may have participated, he can understand all, do all, and be such an attached friend to one that he may come to feel contempt and indifference towards every other beauty.\n\nTherefore to her should be consecrated the spherical apple as to her who seems to be all in all; not to Venus, who is beautiful but is surpassed in wisdom by Minerva, and by Juno in majesty; not to Pallas than whom Venus is more beautiful, and the other more magnificent; not to Juno, who is not the goddess of intelligence or of love.\n\nCic.\n\nTruly, as are the degrees of Nature and of the essences, so in proportion are the degrees of the intelligible orders and the glories of the amorous affections and enthusiasms.\n\nXII.\n\nCic.\n\nThe following bears a head with four faces, which blow towards the four corners of the heavens, and are four winds in one subject; above these stand two stars, and in the centre the legend [Pg 159] \"Novae ortae aeoliae.\" I would like to know what that signifies.\n\nTans.\n\nI think that the meaning of this device is consequent upon that which precedes it, for, as there the object is declared to be infinite beauty, so here is proposed what may be called a similar aspiration, study, affection, and desire.\n\nI believe that these winds are set to signify sighs; but this we shall see when we come to read the lines: 36.\n\nSons of the Titan Astræus and Aurora, Who trouble heaven, earth, and the wide sea, Leave now this stormy war of elements, And fight anon with the high gods.\n\nNo more in my Æolian caves ye dwell, No more does my restraining power compel; But caught are ye and closed within that breast, With moans and sobs and bitter sighs opprest.\n\nTurbulent brothers of the stars, Companions of the tempests of the seas, Those lights are all that may avail Peace to restore; murderous yet innocent; Which, open or concealed, Will bless with calm, or curse with pride.\n\nEvidently, here, Æolus is introduced as speaking to the winds, which he declares are no longer tempered by him in the Æolian caverns, but by two stars in the breast of this enthusiast.\n\nHere, [Pg 160] the two stars do not mean the two eyes which are in the forehead, but the two appreciable kinds of divine beauty and goodness, of that infinite splendour, which so influences intellectual and rational desire, that it brings him to a condition of infinite aspiration, according to the way and the degree with which he comes to comprehend that glorious light."

