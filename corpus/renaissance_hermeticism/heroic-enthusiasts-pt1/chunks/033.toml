[content]
body = "In which generation finding themselves once more through the changes which permutably succeed, they return again to the superior forms.\n\nCic .\n\nSo that they mean, that souls are impelled by the necessity of fate, and have no proper counsel which guides them at all.\n\nTans .\n\nNecessity, fate, nature, counsel, will, those things, justly and rightfully ordained, all agree in one.\n\nBesides which, as Plotinus relates, some believe that certain souls can escape from their own evil, if knowing the danger, they seek refuge in the mind before the corporeal habit is confirmed; because the mind raises to things sublime, as the imagination lowers to inferior things.\n\nThe mind always understands one, as the imagination is one in movement and in diversity; the mind always understands one, as the imagination is always inventing for itself various images.\n\nIn the midst is the [Pg 89] rational faculty, which is a mixture of all, like that in which the one agrees with the many, sameness with variety, movement with fixedness, the inferior with the superior.\n\nNow these transmutations and conversions are symbolized in the wheel of metamorphosis, where man sits on the upper part, a beast lies at the bottom, a half-man, half-beast descends from the left, and a half-beast, half-man ascends from the right.\n\nThis transmutation is shown where Jove, according to the diversity of the affections and the behaviour of those towards inferior things, invests himself with divers figures, entering into the form of beasts; and so also the other gods transmigrate into base and alien forms.\n\nAnd, on the contrary, through the knowledge of their own nobility, they re-take their own divine form; as the passionate hero, raising himself through conceived kinds of divine beauty and goodness, with the wings of the intellect and rational will, rises to the divinity, leaving the form of the lower subject.\n\nAnd therefore he said, \"I become from subject viler still, a god.\n\nFrom an inferior thing do change me to a god.\" [Pg 90]"

