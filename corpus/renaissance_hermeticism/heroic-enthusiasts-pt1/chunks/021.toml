[content]
body = ".\n\nTansillo.\n\nNow begins the enthusiast to display the affections and uncover the wounds which are for a sign in his body, and in substance or essence in his soul, and he says thus: 9.\n\nOf Love the standard-bearer I; My hopes are ice, and glowing my desires.\n\nAt once I tremble, sparkle, freeze, and burn; Am mute, and fill the air with clamorous plaints.\n\nWater my eyes distil, sparks from my heart.\n\nI live, I die, make merry and lament.\n\nLiving the waters, the burning never dies, For in my eyes is Thetys, and Vulcan in my heart.\n\nOthers I love; myself I hate.\n\nIf I be winged, others are changed to stone; They high as heaven, if I be lowly set.\n\nI cease not to pursue, they ever flee away; If I do call, yet none will answer me.\n\nThe more I search, the more is hid from me.\n\nIn accordance with this, I will continue with that which just before I said to thee, that one should [Pg 55] not strive so hard to prove that which is so very evident—namely, that there is nothing pure and unalloyed; and some have said that no mixed thing is a real entity, as alloyed gold is not real gold, manufactured wine is not real simple wine.\n\nAlmost all things are made up of opposites, whence it comes that the success of our affections, through the mixture that is in things, can afford no pleasure without some bitterness; and more than this, I will say, that were it not for the bitter, there would be no sweet; seeing that it is through fatigue that we find pleasure in repose; separation is the cause of our pleasure in union; and, examining generally, we shall ever find that one opposite is the reason that the other opposite pleases and is desired.\n\nCic.\n\nThen there is no delight without the contrary?\n\nTans.\n\nCertainly not; as without the opposite there is no pain; as is shown by that golden Pythagorean poet when he says: Hinc metuunt cupiuntque, dolent gaudentque, nec Respiciunt, clausæ tenebris, e carcere cæco.\n\nThis, then, is what the mixture of things causes, and hence it is that no one is pleased with his own state, except some senseless blockhead, who is so all the more the deeper is the degree of obscure folly [Pg 56] in which he is sunk; then he has little or no apprehension of pain; he enjoys the actual present without fearing the future; he enjoys that which is and that in which he finds himself, and has neither care nor sorrow for what may be; and, in short, has no sense of that opposition which is symbolized by the tree of the knowledge of good and evil.\n\nCic.\n\nFrom this we see that ignorance is the mother of sensual felicity and beatitude, and this same is the garden of paradise of the animals; as is made clear in the dialogues of the Kabala of the horse Pegasus; and as says the wise Solomon, \"Whoso increases knowledge increases sorrow.\" Tans.\n\nHence it appears that heroic love is a torment, because it does not enjoy the present, as does animal love, but is of the future and the absent; and, on the contrary, it feels ambition, emulation, suspicion and dread.\n\nOne evening, after supper, a certain neighbour of ours said: \"Never was I more jolly than I am now.\" John Bruno, father of the Nolano, answered him: \"Never wert thou more foolish than now.\" Cic.\n\nYou would imply, then, that he who is sad is wise, and that other who is more sad is wiser?\n\nTans."

