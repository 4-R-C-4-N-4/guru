body = "That legend contains all the meaning of the thing in so far as it can be explained, for it means that he turns and is turned, that is to say movement present and accomplished.\n\nCic.\n\nExcellent!\n\nAnd therefore those circles which so ill explain the circumstance of movement and rest, we can say are placed there to [Pg 141] signify the circulation only.\n\nThus am I satisfied with the subject and with the form of the heroic device.\n\nNow read the lines.\n\nTans.\n\n: 31.\n\nMild are thy rays, oh, Sol!\n\nfrom Taurus sent, And from the Lion thy beams mature and burn, And when thy light from pungent Scorpion darts Transcendent is the ardour of thy flames.\n\nFrom fierce Deucalion all is struck with cold, Stiffened the lakes and locked the running streams.\n\nWith spring, with summer, autumn, and with winter, I warm, I kindle, burn and blaze for ever.\n\nSo ardent my desire, The object so supreme for which I burn; Glowing and unencumbered I behold, And make my lightnings flash unto the stars.\n\nNo moment can I count in all the year To change the[A] inexorable cross I bear.\n\nHere observe that the four seasons of the year are signified, not by four movable signs, which are Aries, Cancer, Libra, and Capricorn, but by the four which are called fixed—namely, Taurus, Leo, Scorpio, and Aquarius, to signify the condition, fervour, and perfection of those seasons.\n\nNote further, that in virtue of those apostrophes, which are in the eighth line, you can read: I warm, kindle, burn, blaze; or, be thou warmed, kindled, burning, blazing; or, let him warm, kindle, burn, blaze.\n\n[Pg 142] [A] Sordi affanni.\n\nYou have farther to consider that these are not four synonyms, but four different terms, which signify so many degrees of the effects of the fire, which first warms, secondly kindles, thirdly burns, and fourthly blazes or inflames that which it has warmed, kindled, and burnt.\n\nAnd thus are denoted in the enthusiast, desire, attention, study, affection, in which he never for a moment feels any change.\n\nCic.\n\nWhy does he put them under the title of a cross?\n\nTans.\n\nBecause the object, which is the divine light, is, in this life, more felt as a painful longing than in quiet fruition, because our mind is towards that, as the eyes of night birds to the sun.\n\nCic.\n\nProceed; for from what you have said I understand all.\n\nVIII.\n\nTans.\n\nOn the next crest there is painted a full moon and the legend: \"Talis mihi semper ut astro,\" which means that to the star—that is, to the sun—she is ever such as she here shows herself, full and clear in the entire circumference of the circle, which, in order that you may better understand, I will let you hear that which is written on the tablet.\n\n[Pg 143] 32.\n\nOh, changeful moon, inconstant moon!\n\nWith horns now full, now void, thou wanderest.\n\nMounting, thy sphere now white now dark appears.\n\nThe mountains and the valleys of the north thou brightenest, And turning by thy dust-encumbered steps, Thou lightest in the south the Lybian heights.\n\nMy moon for my continual pain.\n\nIs constant ever, ever full.\n\nSo is my star, Which ever from me takes and nothing gives, For ever burns and ever shines, Cruel always yet always beautiful.\n\nThis noble light of mine Torments me still and still delights me."

