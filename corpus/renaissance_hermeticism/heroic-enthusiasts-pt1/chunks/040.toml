[content]
body = "Behold me, miserable one, deprived of heart, abandoned of thoughts, left by hope, I, who had fixed my all in them.\n\nNothing is left to me but the sense of my poverty, my unhappiness and misery; why does not this too leave me?\n\nWhy does not death succour me, now that I am deprived of life?\n\nTo what use do I possess these natural powers if I be deprived of the use of them?\n\nHow can I alone nourish myself with intelligible conceptions as with intellectual bread, if the substance of this bread be composed of this contingency.\n\nHow can I linger in the intimacy of these friendly and dear members which I have woven round me, adjusting them with the symmetry of the elementary conditions, if my thoughts and all my affections abandon me, intent upon the care of the bread that is immaterial and divine?\n\nUp, up; oh my flying thoughts; up, oh my rebel heart; let live the sense of things that are felt, and the understanding of things intelligible, come to the succour of the body with matter and corporeal subject, and let the understanding delight in its own objects, to the end that this composition of the body may be realized, that this machine dissolve not, in which, by means of the spirit, the soul is united to the body.\n\nWhy, unhappy as I am (more through domestic circumstances than through external violence), am I doomed to see this horrible divorce between my parts and members?\n\nWhy does the intellect trouble itself to give laws to the sense and yet deprive it of its food?\n\nand this, on the other hand, resists; desiring to live according to its own decrees, and not according to the decree of others; for these and not those are able to maintain and bless it, therefore it ought to attend to its own comfort and life, and not to that of others.\n\nThere is no harmony and concord where there is only one, where one individual absorbs the whole being, but where there is order and analogy in things diverse; where each thing serves its own nature.\n\nTherefore let the sense feed according to the law of things that can be felt, the flesh be obedient to the law of the spirit, the reason to its own law.\n\nLet them not be confounded nor mixed.\n\nEnough that one neither mar nor prejudice the law of the other, since it is not just that the sense outrage the law of reason.\n\nAnd verily it is a shameful thing that one should tyrannize over the other, particularly where the intellect is a pilgrim and strange, and the sense is more domesticated and at home.\n\nI am forced by you, my thoughts, to remain at home in charge of the house, while others may wander wherever they will.\n\nThis is a law of Nature, and therefore a law of the author and originator of Nature.\n\nSin on then, now that all of you, seduced by the charm of the intellect, leave the other part of me to the peril of death.\n\nHow have you gotten this melancholy and perverse humour, which breaks the certain and natural laws of the true life, and which is in your own hands, for one, uncertain, and which has no existence except in shadow, beyond the limits of fantastic thought?\n\nSeems it to you a natural thing that they should live divinely and not as animals and humanly, they being not gods, but men and animals?\n\nIt is a law of fate and Nature that everything should adapt itself to the condition of its own being, wherefore then, while you follow after the niggard nectar of the gods, do you lose that which is present and is your own, and trouble yourself about the vain hopes of others?\n\nOught not Nature to refuse to give you the other good, if that which she at present offers to you, you stupidly despise?"

