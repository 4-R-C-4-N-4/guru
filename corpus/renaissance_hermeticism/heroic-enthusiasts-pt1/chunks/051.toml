[content]
body = "This special human intelligence which influences all individuals is like the moon, which partakes of no other species but that one alone which always renews itself by the transmutation caused in it by the sun, which is the primal and universal intelligence; but the human intellect, both individual and collective, turns as do [Pg 138] the eyes towards innumerable and most diverse objects; whence, according to the infinite degrees which exist, it takes on all the natural forms.\n\nHence it is that this particular intellect may be as enthusiastic, vague, and uncertain, as that universal one is quiet, fixed, and certain, whether as regards the desire or the comprehension.\n\nNow therefore, as you may very well perceive for yourself, it means that the nature of the comprehension of sense and its varied appetite, is vague, inconstant, and uncertain, and the conception and definite appetite of the intelligence is firm and stable.\n\nThis is the difference between sensual love, which has no stability nor discretion as to its object, and intellectual love, which aims only at one, sure and fixed, towards which it turns, through which it is illuminated in its conception, by which, being kindled in its affections, it becomes inflamed and brightened, and is maintained in unity and identity of condition.\n\nVII.\n\nCic.\n\nBut what is the meaning of that figure of the sun, with a circle inside and another outside, with the legend \"Circuit.\" Tans.\n\nThe meaning of this I am certain I should never have understood if I had not heard it from [Pg 139] the designer of it himself.\n\nNow you must know that \"Circuit\" has reference to the movement the sun makes round the circle which is drawn inside and outside, in order to signify that the movement both makes and is made; and hence, as a consequence, the sun is to be found in every part of those circles; so that, if he moves and is moved, and is over the whole circumference of the circle equally, then you find in him both movement and rest.\n\nCic.\n\nThis I understood in the dialogues on the infinite universe and the innumerable worlds, where it is declared that the divine wisdom is extremely mobile, as Solomon said, and also that the same is most stable, as all those declare who know.\n\nNow go on and make me understand the proposition.\n\nTans.\n\nIt means that [A]his sun is not like this one, which is commonly believed to go round the earth with the daily movement in twenty-four hours, and with the planetary movement in twelve months, and by which he causes the four seasons of the year to be felt, according as he is found to be in the four cardinal points of the zodiac; but he is such an one, that, being the ethereal eternity itself, and consequently an entire and complete totality, he contains the winter, the spring, the summer, [Pg 140] the autumn, together with the day and the night, for he is all and for all, in all points and places.\n\n[A] Il suo sole.\n\nCic.\n\nNow apply that which you have said to the figure.\n\nTans.\n\nIt being impossible here to design the entire sun in every point of the circle, two circles are delineated; one which contains the sun to signify that the movement is made through him, the other which is contained by the sun to show that he is moved by it.\n\nCic.\n\nBut this explanation is not very clear and appropriate.\n\nTans.\n\nSuffice it that it is the clearest and most appropriate that he was able to make.\n\nIf you can make a better one, you shall have permission to remove this one and put it in its place, for this has only been put in, so that the soul should not be without a body.\n\nCic.\n\nWhat do you say about that \"Circuit?\" Tans."

