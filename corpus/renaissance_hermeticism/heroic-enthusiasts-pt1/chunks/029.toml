[content]
body = "In this disposition, I believe, was the Nolano when he said: 14.\n\nWoe's me!\n\nmy fury forces me To union with the bad within, And makes it seem a love supreme and good.\n\nWearied, my soul cares nought That I opposing counsels entertain, And with the savage tyrant Nourished with want, And made to put myself in exile, More than with liberty contented am.\n\nI spread my sails to the wind, To draw me forth from this detested bliss, And to reclaim me from the cloying hurt.\n\nTans.\n\nThis occurs when spirits are vicious and tinged as with the same hue; since, through conformity, love is excited, enkindled, and confirmed.\n\nThus the vicious easily concur in acts of the same vice; and I will not refrain from repeating that which I know by experience, for although I may have discovered in a soul vices very much abominated by me—as, for instance, filthy avarice, base greediness for money, ingratitude for favours and courtesies received, or a love of quite vile persons, of which this last most displeases, because it takes away the hope from the lover, that [Pg 78] by becoming or making himself more worthy he may become more acceptable—in spite of all this, it is true that I did burn for corporeal beauty.\n\nBut how?\n\nI loved against my will; for, were it not so, I should have been more saddened than cheered by troubles and misfortunes.\n\nCic.\n\nIt is a very proper and nice distinction that is made between loving and liking.\n\nTans.\n\nTruly; because we like many—that is, we desire that they be wise and just; but we love them not because they are unjust and ignorant; many we love because they are beautiful, but we do not like them, because they do not deserve it; and amongst other things of which the lover deems the loved one undeserving, the first is, being loved; and yet, although he cannot abstain from loving, nevertheless he regrets it, and shows his regret like him who said, \"Woe is me!\n\nwho am compelled by passion to coalesce with evil.\" In the opposite mood was he, either through some corporeal object in similitude or through a divine subject in reality, when he said: 15.\n\nAlthough to many pains thou dost subject me, Yet do I thank thee, love, and owe thee much, That thou my breast dost cleave with noble wound, And then dost take my heart and master it.\n\n[Pg 79] Thus true it is, that I, on earth, adore A living object, image most beautiful of God.\n\nLet him who will think that my fate is bad That kills in hope and quickens in desire.\n\nMy pasture is the high emprise, And though the end desired be not attained, And though my soul in many thoughts is spent, Enough that she enkindle noble fire, Enough that she has lifted me on high, And from the ignoble crowd has severed me.\n\nHere his love is entirely heroic and divine, and as such, I wish it to be understood; although he says that through it he is subject to many pangs, every lover who is separated from the thing loved (to which being joined by affection he would also wish to be actually), being in anguish and pain, he torments himself, not forsooth because he loves, since he feels his love is engaged most worthily and most nobly, but because he feels deprived of that fruition which he would obtain if he arrived at that end to which he tends.\n\nHe suffers, not from the desire which animates him, but from the difficulty in the cultivation of it which so tortures him."

