[content]
body = ".\n\nTansillo .\n\nThus is described the discourse of heroic love, in all which tends to its own object, which is the highest good; and heroic intellect, which devotes itself to the study of its own object, which is the primal verity, or absolute truth.\n\nNow the first discourse holds the sum of this and the intention, the order of which is described in five others following: 18.\n\nTo the woods, the mastiffs and the greyhounds young Actæon leads, When destiny directs him into the doubtful and neglected way, Upon the track of savage beasts in forests wild.\n\nAnd here, between the waters, he sees a bust and face more beautiful than e'er was seen By mortal or divine, of scarlet, alabaster, and fine gold; He sees, and the great hunter straight becomes that which he hunts.\n\nThe stag, that towards still thicker shades now goes with lighter steps, [Pg 91] His own great dogs swiftly devour.\n\nSo I extend my thoughts to higher prey, and these Now turning on me give me death with cruel savage bite.\n\nActæon signifies the intellect, intent on the pursuit of divine wisdom and the comprehension of divine beauty.\n\nHe lets loose the mastiffs and the greyhounds, of whom the latter are more swift and the former more strong, because the operation of the intellect precedes that of the will; but this is more vigorous and effectual than that; seeing that, to the human intellect, divine goodness and beauty are more loveable than comprehensible, and love it is that moves and urges the intellect, and precedes it as a lantern.\n\nThe woods, uncultivated and solitary places, visited and penetrated by few, and where there are few traces of men.\n\nThe youth of little skill and practice, as of one of short life and of wavering enthusiasm.\n\nIn the doubtful road of uncertain and distorted reason—a disposition assigned to the character of Pythagoras—where you see the most thorny, uncultivated, and deserted to be the right and difficult path, where he lets loose the greyhounds and the mastiffs upon the track of savage beasts, that is, the intelligible kinds of ideal conceptions, which are occult, followed by few, visited but rarely, and which do not disclose themselves to [Pg 92] all those who seek them.\n\nHere, amongst the waters,—that is, in the mirror of similitude, in those works where shines the brightness of divine goodness and splendour, which works are symbolized by the waters superior and inferior, which are above and below the firmament, he sees the most beautiful bust and face—that is, external power and operation, which it is possible to see, by the habit and act of contemplation and the application of mortal or divine mind, of man or any god.\n\nCic.\n\nI do not believe that he makes a comparison, nor puts as the same kind the divine and the human mode of comprehending, which are very diverse, but as to the subject they are the same.\n\nTans.\n\nSo it is.\n\nHe says \"of red and alabaster and gold,\" because that which in bodily beauty is red, white, and fair, in divinity signifies the scarlet of divine vigorous power, the gold of divine wisdom, the alabaster of divine beauty, through the contemplation of which the Pythagoreans, Chaldeans, Platonists, and others, strive in the best way that they can to elevate themselves.\n\n\"The great hunter saw,\" he understood as much as was possible, and became the hunted.\n\nHe went out for prey, and this hunter became himself the prey, by the operation of the intellect converting the things learned into itself.\n\n[Pg 93] Cic.\n\nI understand."

