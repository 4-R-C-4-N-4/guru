[content]
body = ".\n\nTansillo .\n\nThere are several varieties of enthusiasts, which may all be reduced to two kinds.\n\nWhile some only display blindness, stupidity, and irrational impetuosity, which tend towards savage madness, others by divine abstraction become in reality superior to ordinary men.\n\nAnd these again are of two kinds, for some having become the habitation of gods or divine spirits, speak and perform wonderful things, without themselves understanding the reason.\n\nMany such have been uncultured and ignorant persons, into whom, being void of spirit and sense of their own, as into an empty chamber, the divine spirit and sense intrude, as it would have less power to show itself in those who are full of their own reason and sense.\n\nThis divine spirit often desires that the world should know for certain, that those do not speak from their own knowledge and experience, [Pg 70] but speak and act through some superior intelligence; for such, the mass of men vouchsafe more admiration and faith, while others, being skilful in contemplation and possessing innately a clear intellectual spirit, have an internal stimulus and natural fervour, excited by the love of the divine, of justice, of truth, of glory, and by the fire of desire and the breath of intention, sharpen their senses, and in the sulphur of the cogitative faculty, these kindle the rational light, with which they see more than ordinarily; and they come in the end to speak and act, not as vessels and instruments, but as chief artificers and experts.\n\nCic.\n\nOf these two which dost thou esteem higher?\n\nTans.\n\nThe first have more dignity, power, and efficacy within themselves, because they have the divinity; the second are themselves worthy, potential, and efficacious, and are divine.\n\nThe first are worthy, as is the ass which carries the sacraments; the second are as a sacred thing.\n\nIn the first is contemplated and seen in effect the divinity, and that is beheld, adored, and obeyed; in the second is contemplated and seen the excellency of humanity itself.\n\nBut now to the question.\n\nThese enthusiasms of which we speak, and which we see exemplified in [Pg 71] these sentences, are not oblivion, but a memory; they are not neglect of one's self, but love and desire of the beautiful and good, by means of which we are able to make ourselves perfect, by transforming and assimilating ourselves to it.\n\nIt is not a precipitation, under the laws of a tyrannous fate, into the noose of animal affections, but a rational impetus, which follows the intellectual apprehension of the beautiful and the good, which knows whom it wishes to obey and to please, so that, by its nobility and light, it kindles and invests itself with qualities and conditions through which it appears illustrious and worthy.\n\nHe (the enthusiast) becomes a god by intellectual contact with the divine object, and he has no thought for other than divine things, and shows himself insensible and impassive towards those things which are commonly felt, and about which others are mostly tormented; he fears nothing, and for love of the divine he despises other pleasures and gives no thought to this life."

