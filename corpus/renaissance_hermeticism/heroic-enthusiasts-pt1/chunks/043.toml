[content]
body = "This I understand right well, and also that which you would infer about the principal intention; that is to say, that these are the degrees of the loves, of the affections, and of the enthusiasms, according to the degrees of greater and lesser light, of cognition, and of intelligence.\n\nTans.\n\nThou understandest rightly.\n\nFrom this [Pg 116] thou oughtest to learn that doctrine taken from the Pythagoreans and Platonists, which is, that the soul makes the two progressions of ascent and descent, by the care that it has of itself and of matter; being moved by its own proper love of good, and being urged by the providence of fate.\n\nCic.\n\nBut, prythee, tell me briefly what you mean about the soul of the world, if she can neither ascend nor descend?\n\nTans.\n\nIf you ask of the world, according to the common signification—that is, in so far as it signifies what is called the universe—I say that, being infinite, it has no dimension or measure, is immobile, inanimate, and without form, notwithstanding it is the place of infinite moving worlds and is infinite space, in which are so many large animals that are called stars.\n\nIf you ask according to the signification held by the true philosophers—that is, in so far as it signifies every globe, every star, such as this earth, the body of the sun, moon, and others—I say that such soul does not ascend nor descend, but turns in a circle.\n\nThus, being compounded of superior and inferior powers, with the superior it turns round the divinity, and with the inferior, towards the mass of the worlds, which is by it vivified and maintained between the tropics of generation and [Pg 117] the corruption of living things in those worlds, serving its own life eternally; because the act of the divine providence, always preserves it with divine heat and light, with the same order and measure, in the ordinary and self-same being.\n\nCic.\n\nI have now heard enough upon this subject.\n\nTans.\n\nIt happens then that individual souls come to be influenced differently as to their habits and inclinations, according to the diverse degrees of ascension and descension, and come to display various kinds and orders of enthusiasms, of loves, and of senses, not only in the scale of Nature according to the orders of diverse lives which the soul takes up in different bodies, as is expressly declared by the Pythagoreans, Saduchimi and others, and by implication, Plato, and those who dive more profoundly into it, but still more in the scale of human affections, which has as many degrees as the scale of Nature; for man, in all his powers, displays every species of being.\n\nCic.\n\nTherefore from the affections one may know souls, whether they are going up or down, or whether they are from above or from below, whether they are going on towards becoming beasts or towards divine beings, according to the specific [Pg 118] being as the Pythagoreans understood it; or according to the similitude of the affections only, as is commonly believed, the human soul not being able, (so long as it is truly human) to become soul of a brute, as Plotinus and other Platonists well said, on account of the quality of its beginning.\n\nTans.\n\nNow to come to the proposition: From animal enthusiasm, this soul, as described, is promoted to heroic enthusiasm, saying, \"When shall it be that I rise up to the height of the object, there to dwell in company with my heart and with my fledglings[A] and his?\" This same proposition he continues when he says: 24."

