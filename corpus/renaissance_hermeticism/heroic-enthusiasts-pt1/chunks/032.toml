[content]
body = "Such over-boldness rarely grief escapes.\" \"Fear not the utmost ruin then,\" I said, \"Cleave confident the clouds and die content, That heaven has destined thee to such illustrious death.\" Cic .\n\nI understand when you say: \"Enough that thou hast lifted me on high;\" but not: \"And from the ignoble crowd hast severed me;\" unless it means his having come out from the Platonic groove on account of the stupid and low condition of the crowd; for those that find profit in this contemplation cannot be numerous.\n\nTans .\n\nThou understandest well; but thou mayst also understand, by the \"ignoble crowd,\" the body, and sensual cognition, from which he must arise and free himself who would unite with a nature of a contrary kind.\n\nCic .\n\nThe Platonists say there are two kinds of knots which link the soul to the body.\n\nOne is a certain vivifying action which from the soul descends into the body, like a ray; the other is a certain vital quality, which is produced from that action in the body.\n\nNow this active and most noble number, which is the soul, in what way do you understand that it may be severed from the ignoble number, which is the body?\n\nTans .\n\nCertainly it was not understood according to any of these modes, but according to that mode whereby those powers which are not comprehended and imprisoned in the womb of matter, sometimes as if inebriated and stupefied, find that they also are occupied in the formation of matter and in the vivification of the body; then, as if awakened and brought to themselves, recognizing its principle and genius, they turn towards superior things and force themselves on the intelligible world as to their native abode, and from thence, through their conversion to inferior things, they are thrust into the fate and conditions of generation.\n\nThese two impulses are symbolized in the two kinds of metamorphosis expressed in the following: 17.\n\nThat god who shakes the sounding thunder, Asteria as a furtive eagle saw; Mnemosyne as shepherd; Danae gold; Alcmene as a fish; Antiope a goat; Cadmus and his sister a white bull; Leda as swan, and Dolida as dragon; And through the lofty object I become, From subject viler still, a god.\n\nA horse was Saturn; And in a calf and dolphin Neptune dwelt; Ibis and shepherd Mercury became; Bacchus a grape; Apollo was a crow; And I by help of love, From an inferior thing, do change me to a god.\n\nIn Nature is one revolution and one circle, by means of which, for the perfection and help of others, superior things lower themselves to things inferior, and, by their own excellence and felicity, inferior things raise themselves to superior ones.\n\nTherefore the Pythagoreans and Platonists say it is given to the soul that at certain times, not only by spontaneous will, which turns it towards the comprehension of Nature, but also by the necessity of an internal law, written and registered by the destined decree, they seek their own justly determined fate; and they also say that souls, not so much by determination of their own will as through a certain order, by which they become inclined towards matter, decline as rebels from divinity; wherefore, not by free intention, but by a certain occult consequence, they fall.\n\nAnd this is the inclination that they have to generation, as towards a minor good.\n\nMinor, I say, in so far as it appertains to that particular nature; not in so far as it appertains to the universal nature, where nothing happens without the highest aim, and which disposes of all things according to justice."

