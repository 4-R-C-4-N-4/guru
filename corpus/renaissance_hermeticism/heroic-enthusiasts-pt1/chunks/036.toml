[content]
body = "Whence he says, \"Come not back to me till thou art mine,\" and not unworthily may I say with that other— [Pg 96] Thou has left me, oh, my heart, And thou, light of my eyes, art no more with me.\n\nHere he describes the death of the soul, which by the Kabbalists is called the death by kisses, symbolized in the Song of Solomon, where the friend says: Let him kiss me with the kisses of his mouth, For, when he wounds me, I suffer with a cruel love.\n\nBy others it is called sleep; the Psalmist says: It shall be, that I give sleep unto mine eyes, And mine eyelids shall slumber, And I shall have in him peaceful repose.\n\nThe soul then is said to be faint, because it is dead in itself, and alive in the object: 20.\n\nGive heed, enthusiasts, unto the heart!\n\nFor mine condemns me to a life apart, Bound by unmerciful and cruel ties, He dwells with joy, there where he faints and dies.\n\nAt every hour I call him back by thoughts: A rebel he, like gerfalcon insane, He feels no more the hand that did restrain, And is gone forth not to return again.\n\nThou beauteous beast that dost in punishment Knit up the soul, spirit and heart content'st With pricks, with lightnings, and with chains!\n\n[Pg 97] From looks, from accents, and from usages, Which faint and burn and keep thee bound, Where shall he that heals, that cools, and loosens thee be found?\n\nHere the soul, sorrowful, not from real discontent, but on account of pains which she suffers, directs the discourse to those who are affected by passions similar to her own: as if she had not of her own free will and of her own desire dismissed her heart, which goes running whither it cannot arrive, stretches out to that which it cannot reach, and tries to enfold that which it cannot comprehend, and with this, because he vainly separates from her, ever more and more goes on aspiring towards the infinite.\n\nCic.\n\nWhence comes it, oh Tansillo, that the soul in such progression delights in its own torments?\n\nWhence comes that spur which urges it ever beyond that which it possesses?\n\nTans.\n\nFrom this, which I will tell thee now.\n\nThe intellect being developed to the comprehension of a certain definite and specific form, and the will to a love commensurate with such comprehension; the intellect does not stop there, but by its own light it is prompted to think of this: that it contains within itself the germ of everything intelligible and desirable, until it comes to comprehend with the [Pg 98] intellect the depth of the fountain of ideas, the ocean of every truth and goodness.\n\nSo that it happens, that whatever conception is presented to the mind, and becomes understood by it, from that which is so presented and comprehended it judges, that above it, is other greater and greater, and finds itself ever in a certain way discoursing and moving with it.\n\nBecause it sees that all which it possesses is only a limited thing, and therefore cannot be sufficient of itself, nor good of itself, nor beautiful of itself; because it is not the universal nor the absolute entity; but contracted into being this nature, this species, this form, represented to the intellect and present to the soul.\n\nThen from the beautiful that is understood, and consequently limited, and therefore beautiful through participation, it progresses towards that which is really beautiful, which has no margin, nor any boundaries.\n\nCic.\n\nThis progression appears to me useless.\n\nTans.\n\nNot so.\n\nFor it is not natural nor suitable that the infinite be restricted, nor give itself definitely, for it would not then be infinite."

