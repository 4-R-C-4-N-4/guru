[content]
body = "The life of man is more than an experience or trial; it is an effort, a struggle to reproduce and represent upon earth some of that goodness, beauty, and truth which are diffused over the universe and constitute its harmony.\n\nLong, slow, and full of opposition is this educational process of the soul.\n\nAs the terraqueous globe becomes formed, changed, and perfected, little by little, through the cataclysms and convulsions which, by means of fire, flood, earthquake, and irruptions, transform the earth, so it is with humanity.\n\nThrough struggle is man educated, fortified, and raised.\n\nIn the midst of social cataclysms and revolutions humanity has one guiding star, a beacon which shows its light above the storms and tempests, a mystical thread running through the labyrinth of history—namely, the religion of philosophy and of thought.\n\nThe vulgar creeds would not, and have not dared to reveal the Truth in its purity and essence.\n\nThey covered it with veils with allegories, with myths and mysteries, which they called sacred; they enshrouded thought with a double [Pg 24] veil, and called it Revelation.\n\nHumanity, deceived by a seductive form, adored the veil, but did not lift itself up to the idea behind it; it saw the shadow, not the light.\n\nBut we must return to our wandering hero.\n\nBruno was about thirty-six years old when he left Paris and went to England.\n\nHe was invited to visit the University of Oxford, and opened his lectures there with two subjects which, apparently diverse, are in reality intimately connected with each other—namely, on the Quadruple Sphere and on the Immortality of the Soul.\n\nSpeaking of the immortality of the soul, he maintained that nothing in the universe is lost, everything changes and is transformed; therefore, soul and body, spirit and matter, are equally immortal.\n\nThe body dissolves, and is transformed; the soul transmigrates, and, drawing round itself atom to atom, it reconstructs for itself a new body.\n\nThe spirit that animates and moves all things is one; everything differentiates according to the different forms and bodies in which it operates.\n\nHence, of animate things some are inferior by reason of the meanness of the organ in which they operate; others are superior through the richness of the same.\n\nThus we see that Bruno anticipates the doctrine, proclaimed later [Pg 25] by Goethe and by Darwin, of the transformation of species and of the organic unity of the animal world; and this alternation from segregation to aggregation, which we call death and life, is no other than mutation of form.\n\nAfter having criticised and scourged the religions of chimera, of ignorance, and hypocrisy, in \"Lo Spaccio della Bestia Trionfante\" and in \"L'Asino Cillenico,\" the author, in \"Gli Eroici Furori,\" lays down the basis for the religion of thought and of science.\n\nIn place of the so-called Christian perfections (resignation, devotion, and ignorance), Bruno would put intelligence and the progress of the intellect in the world of physics, metaphysics, and morals; the true aim being illumination, the true morality the practice of justice, the true redemption the liberation of the soul from error, its elevation and union with God upon the wings of thought.\n\nThis idea is developed in the work in question, which is dedicated to Sir Philip Sidney.\n\nAfter treating of the infinite universe, and contemplating the innumerable worlds in other works, he comes, in \"Gli Eroici Furori,\" to the consideration of virtue in the individual, and demonstrates the potency of the human faculties.\n\nAfter the Cosmos, the Microcosm; after the in [Pg 26] finitely great, the infinitely small."

