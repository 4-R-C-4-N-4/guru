[content]
body = "In conclusion, whatever love it may be, it is ever afflicted and tormented in such a way that it cannot fail to supply material for the forge of Vulcan; because the soul, being a divine thing, and by nature, not a servant but the mistress of corporeal matter, she becomes troubled in that she voluntarily serves the body wherein she finds nothing to satisfy her, and albeit, fixed in the thing loved, yet now and then she becomes agitated, and fluctuates amidst the waves of hope, fear, doubt, ardour, conscience, remorse, determination, repentance, and other scourges, which are the bellows, the coals, the forge, the hammer, the pincers, and other instruments which are found in the workshop of the sordid grimy consort of Venus.\n\n[Pg 155] Cic.\n\nEnough has been said upon this subject.\n\nLet us see what follows.\n\nXI.\n\nTans.\n\nHere is a golden apple, rich with various kinds of precious enamel, and there is a legend about it which says, \"Pulchriori detur.\" Cic .\n\nThe allusion to the fact of the three goddesses who submitted themselves to the judgment of Paris is very common.\n\nBut read the lines which more specifically disclose the meaning of the present enthusiast.\n\nTans .: 35.\n\nVenus, the goddess of the third heaven (Mother of the archer blind, who conquers all), She whose father is the head of Zeus, And Juno, most majestic wife of Jove, These call the Trojan shepherd to be judge, And to the fairest give the ruddy sphere.\n\nCompared with Venus, Pallas, and the Queen of Heaven, My perfect goddess bears away the palm.\n\nThe Cyprian queen may boast her royal limbs, Minerva charm with her transcendent wit, And Juno with a majesty supreme; But she who holds my heart all these excels In wisdom, majesty, and loveliness.\n\n[Pg 156] Here he makes a comparison between his object (or ideal) which comprises all circumstances, all conditions, and all kinds of beauty, in one subject, and others which exhibit each only one, and that through various hypotheses, as with corporeal beauty, all the conditions of which Apelles could not find in one, but in many virgins.\n\nNow here, where there are three kinds of the beautiful, although it seems that all of these exist in each of the three goddesses—Venus not being found wanting in wisdom and majesty, Juno not lacking loveliness and wisdom, and Pallas being full of majesty and beauty, in each case it is a fact that one quality exceeds the others, so that it comes to be held as distinctive of the one, and the other as incidental to all, seeing that of those three gifts, one predominates in each and proclaims her sovereign over the others.\n\nAnd the cause of this difference lies in the fact of possessing these qualities, not primarily and in their essence, but by participation and derivation; as in all things which are dependent, their perfection depends upon the degrees of major and minor and more and less.\n\nBut in the simplicity of the divine essence, all exists in totality, and not according to any measure, and therefore wisdom is not greater than beauty and [Pg 157] majesty, and goodness is not greater than strength: not only are till the attributes equal, they are one and the same thing.\n\nAs in the sphere all the dimensions are not only equal, the length being equal to the depth and breadth, but are also identical, seeing that what in a sphere is called deep, may also be called long and wide.\n\nLikewise is it, as to height in divine wisdom, which is the same as the depth of power and the breadth of goodness.\n\nAll these perfections are equal, because they are infinite."

