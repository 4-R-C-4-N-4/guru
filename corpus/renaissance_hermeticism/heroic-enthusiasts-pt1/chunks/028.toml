[content]
body = "Here he shows his love not to be like that of the butterfly, of the stag, and of the unicorn, who would flee away if they had knowledge of the fire, of the arrow, and of the snares, and who have no other sense than that of pleasure; but he is moved by a most sensible and only too evident passion, which forces him to love that fire more than any coolness; more that wound than any wholeness; more those fetters than any liberty.\n\nFor this evil is not absolutely evil, but, through comparison with good (according to opinion), it is deceptive, like the sauce that old Saturn gets when he devours his own sons; for this evil absolutely in the eye of the Eternal, is comprehended either for good, or for guide which conduces to it, since this fire is the ardent desire of divine things, this arrow is the impression of the ray of the beauty of supernal light, these snares are the species of truth which unite our mind to the [Pg 75] primal verity, and the species of good which unite and join to the primal and highest good.\n\nTo that meaning I approached when I said: 13.\n\nWith such a fire and such a noble noose, Beauty enkindles me, and pureness binds, So that in flames and servitude I take delight, Liberty takes flight and dreads the ice.\n\nSuch is the heat, that though I burn yet am I not destroyed, The tie is such, the world with me gives praise.\n\nFear cannot freeze, nor pain unshackle me; For soothing is the ardour, sweet the smart.\n\nSo high the light that burns me I discern, And of so rich a thread the noose contrived That, thought being born, the longing dies.\n\nAnd since, within my heart shines such pure flames, And so supreme a tie compels my will, Let my shade serve, and let my ashes burn.\n\nAll the loves, if they be heroic and not purely animal, or what is called natural, and slaves to generation, as instruments of nature in a certain way, have for object the divinity, tend towards divine beauty, which first is communicated to souls and shines in them, and from them, or rather through them, it is communicated to bodies; whence it is that well-ordered affection loves the body or corporeal beauty, insomuch as it is an indication of beauty of [Pg 76] spirit.\n\nThus that which causes the attraction of love to the body is a certain spirituality which we see in it, and which is called beauty, and which does not consist in major or minor dimensions, nor in determined colours or forms, but in harmony and consonance of members and colours.\n\nThis shows an affinity between the spirit and the most acute and penetrative senses; whence it follows that such become more easily and intensely enamoured, and also more easily and intensely disgusted, which might be through a change of the deformed spirit, which in some gesture and expressed intention reveals itself in such wise that this deformity extends from the soul to the body, and makes it appear no longer beautiful as before.\n\nThe beauty, then, of the body has power to kindle, but not to bind, and the lover, unless aided by the graces of the spirit, such as purity, gratitude, courtesy, circumspection, is unable to escape.\n\nTherefore, said I, beautiful is that fire which burns me, and noble that tie which binds.\n\nCic.\n\nI do not believe it is always like that, Tansillo; because, sometimes, notwithstanding that we discover the spirit to be vicious, we remain heated and entangled; so that, although reason perceives the evil and unworthiness of such a love, [Pg 77] it yet has not power to alienate the disordered appetite."

