[content]
body = "\"Steals it from me,\" he says of Jealousy, not simply in order that it may not be present to me; removing it from my eyesight, but in order that good may not be good, but an acute evil; sweet, not sweet, but an agonized longing; while the heart—that is, the will, has joy by the great force of love, whatever may be the result; the mind—that is, the intellectual part, has pain through the Fear of Fate, which fate does not favour the lover; the spirit—that is, the natural affections, are cold because they are snatched from the object which gives joy to the heart, and which might give pleasure to the mind; the soul—that is, the suffering and sensitive soul, is heavy—that is, finds itself oppressed with the heavy burden of jealousy which torments it.\n\nTo this consideration of his state he adds a tearful lament, and says: \"Who [Pg 52] will deliver me from war, and give me peace?\n\nor who will separate that which pains and injures me from that which I so love, and which opens to me the gates of heaven, so that the fervid flames in my heart may be acceptable, and fortunate the fountains of my tears?\" Continuing this proposition, he adds: 8.\n\nAh me!\n\noppress some other, spiteful Fate!\n\nJealousy, get thee hence—begone!\n\naway!\n\nThese may suffice to show me all the grace Of changeful Love, and of that noble face.\n\nHe takes my life, she gives me death, She wings, he burns my heart, He murders it, and she revives the soul: My succour she, my grievous burden he!\n\nBut what say I of Love?\n\nIf he and she one subject be, or form, If with one empire and one rule they stamp One sole impression in my heart of hearts, Then are they two, yet one, on which do wait The mirth and melancholy of my state!\n\nFour beginnings and extremes of two opposites he would reduce to two beginnings and one opposite: he says, then, oppress others—that is, let it suffice thee, O my Fate!\n\nthat thou hast so much oppressed me; and since thou canst not exist without exercise of thyself, turn elsewhere thy anger.\n\nGet thee hence out of the world, thou Jealousy, because one of those [Pg 53] two others which remain can supply your functions and offices; yet, O Fate!\n\nthou art none other than my love; and thou, Jealousy, art not external to the substance of the same.\n\nHe alone, then, remains to deprive me of life, to burn me, to give me death, and to be to me the burden of my bones; for he delivers me from death—wings, enlivens, and sustains.\n\nThen two beginnings and one opposite he reduces to one beginning and one result, exclaiming: But what do I say of Love?\n\nIf this presence, this object, is his empire, and appears none other than the empire of Love, the rule of Love and its own rule; the impression of Love which appears in the substance of my heart, is then no other impression than its own, and therefore after having said \"Noble face,\" replies \"Inconstant Love.\"[A] [A] Vago amore.\n\n[Pg 54]"

