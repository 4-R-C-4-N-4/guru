[content]
body = "Hence it follows that not less do we desire to see things unknown and unseen than those known and seen.\n\nAnd from this it does not follow that the desire does not proceed from cognition, and that we desire something that is not known; but I say that it is certain and sure that we do not desire unknown things.\n\nBecause, if they [Pg 105] be occult as to particulars, they are not occult as to generals; as in the entire visual power is found the whole of the visible appositely, and in the intellect all the intelligible.\n\nTherefore, as the inclination to the act lies in its appropriateness, the result is that both these powers incline towards the universal action, as to a thing naturally comprehended as good.\n\nThe soul, then, did not speak to the deaf or the blind when she counselled her thoughts to repress the sight, which, although it may not be the immediate cause of the will, is yet the primal and principal cause.\n\nCic .\n\nWhat do you mean by this last saying?\n\nTans .\n\nI mean that it is not the figure or the conception, sensibly or intelligently represented, which of itself moves us; because while one stands beholding the figure manifested to the eyes, he does not yet arrive at loving; but from that instant that the soul conceives within itself that figure, not visible, but thinkable; no longer dividual, but individual; no longer classed among things in general, but among things good and beautiful; then immediately love is born.\n\nNow this is the seeing, from which the soul desires to divert the eyes of her thoughts.\n\nHere the sight usually moves the affection to a greater love than the love of that which is [Pg 106] seen; for, as I have just said, it always considers, through the universal knowledge that it holds of the beautiful and the good, that, besides the degrees of known conceptions of goodness and beauty, there are others and yet others ad infinitum .\n\nCic .\n\nHow is it that after we become informed of that conception of the beautiful which is begotten in the soul, we yet desire to satisfy the exterior vision?\n\nTans .\n\nFrom this, that the soul would ever love that which it loves, and ever see that which it sees.\n\nTherefore she wills that, the conception which has been produced in her through seeing, should not become weakened, enervated and lost; but would ever see more and more, and that which becomes obscure in the interior affection, should be frequently brightened by the exterior aspect, which as it is the principle of being, must also be the principle of conservation.\n\nThis results proportionately in the act of understanding and of considering, for as the sight has reference to visible things, so has the intellect to intelligible things.\n\nI believe now that you understand to what end and in what manner the soul tends, when she says \"repress the sight.\" Cic .\n\nI understand very well.\n\nNow continue to unfold what happens to these thoughts.\n\n[Pg 107] Tans .\n\nNow follows the disagreement between the mother and the aforesaid children, who having, contrary to her orders, opened their eyes, and, having fixed them on the splendour of the object, they remained in company with the heart.\n\n22.\n\nCruel sons are ye to me, me whom ye left Still farther to exasperate my pain; And ever without cease ye weary me, Taking away from me my every hope!\n\nWhy should the sense remain?\n\noh, grasping heavens!\n\nWherefore these broken ruined powers, if not To make me subject and exemplar Of such heavy martyrdom, such lengthened pain?\n\nLeave, dear sons, my winged fire enchained, And let me, some of you once more behold, Come back to me from those retaining claws!\n\nOh, weariness!\n\nnot one returns To bring a late refreshment to my pains."

