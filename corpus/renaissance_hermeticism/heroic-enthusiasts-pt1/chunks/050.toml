[content]
body = "I understand it all; but what is the meaning of, \"May I be happy in this governance and with these bonds, and may that light not cease?\" Tans.\n\nHe means, and he proves, that every sort of love, the greater its dominion and the surer its hold, the more tight are the bonds, and the more firm the yoke, and the more ardent the flames that are felt, as compared with the ordinary princes and tyrants, who adopt a greater rigour wherever they see they have less hold.\n\nCic.\n\nGo on.\n\nVI.\n\nTans.\n\nHere we see described the idea of a flying ph[oe]nix, towards which is turned a boy who is burning in the midst of flames; and there is the legend, \"Fata obstant.\" But in order better to understand it, let us read the tablet: 30.\n\nSole bird of the sun, thou wandering ph[oe]nix!\n\nThat measurest thy days as does the world With lofty summits of Arabia Felix.\n\nThou art the same thou wast, but I what I was not: I through the fire of love, unhappy die; But thee the sun with his warm rays revives; [Pg 136] Thou burn'st in one, and I, in every place; Eros my fire, while thine Apollo gives.\n\nPredestined is the term of thy long life; Short span is mine, And menaced by a thousand ills.\n\nNor do I know how I have lived, nor how shall live, Me does blind fate conduct; But thou wilt come again, again behold thy light.\n\nFrom the meaning of these lines, you will see that in the figure is drawn the comparison between the fate of the ph[oe]nix and that of the enthusiast; and the legend, \"Fata obstant,\" does not signify that the fates are adverse either to the boy, or to the ph[oe]nix, or to both; but that the fatal decrees for each are not the same, but are diverse and opposite.\n\nThe ph[oe]nix is that which it was, because the same matter, by means of the fire, renews itself, and becomes again the body of the ph[oe]nix, and the same spirit and soul come to inhabit it.\n\nThe enthusiast is that which he was not, because the subject, which is a man, was first of some other species, according to innumerable differentiations.\n\nSo that what the ph[oe]nix was, is known, and what it will be, is known; but this subject cannot return, except through many and uncertain means, to invest the same or a similar natural form.\n\nThen the ph[oe]nix, through the sun's presence, changes [Pg 137] death into life, and that other, by the presence of love, transmutes life into death.\n\nThe one kindles his fire on the aromatic altar, the other finds it ever present with him and carries it wherever he goes.\n\nThe one again, has certain conditions of a long life; but the other, through the infinite differences of time and innumerable circumstances, has the mutable conditions of a short life.\n\nThe one kindles with certainty, the other with doubt as to whether he will see the sun again.\n\nCic.\n\nWhat do you think that this means?\n\nTans.\n\nIt means the difference that exists between the lower intellect called the intellect of power, either possible or passive, which is uncertain, multifarious, and multiform, and the higher intellect, which, perhaps, is like that which is said by the Peripatetics to be the lowest of the intelligences, and which exerts an immediate influence over all the individuals of the human species, and is called the active and acting intellect."

