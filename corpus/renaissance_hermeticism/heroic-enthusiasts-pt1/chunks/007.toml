[content]
body = "He was then advised to doff the Dominican habit, which he still wore; this he was quite willing to do, only he had no money to buy other clothing, and was forced to have some made of the cloth of his monkish robes, and his new friends presented him with a sword and a hat; they also [Pg 15] procured some work for him in correcting press errors.\n\nThe term of Bruno's sojourn in Geneva seems doubtful, and the precise nature of his employment when there is also uncertain; but his independent spirit brought him into dispute with the rigid Calvinists of that city, who preached and exacted a blind faith, absolute and compulsory.\n\nBruno could not accept any of the existing positive religions; he professed the cult of philosophy and science, nor was his character of that mould that would have enabled him to hide his principles.\n\nIt was made known to him that he must either adopt Calvinism or leave Geneva: he declined the former, and had no choice as to the latter; poor he had entered Geneva, and poor he left it, and now turned his steps towards France.\n\nHe reached Lyons, which was also at that time a city of refuge against religious persecutions, and he addressed himself to his compatriots, begging for work from the publishers, Aldo and Grifi; but not succeeding in gaining enough to enable him to subsist, after a few days he left, and went on his way to Toulouse, where there was a famous university; and having made acquaintance with several men of intellect, Bruno was invited to lecture on the [Pg 16] Sphere, which he did, with various other subjects, for six months, when the chair of Philosophy becoming vacant, he took the degree of Doctor, and competed for it; and he continued for two years in that place, teaching the philosophy of Aristotle and of others.\n\nHe took for the text of his lectures the treatise of Aristotle, \"De Anima,\" and this gave him the opportunity of introducing and discussing the deepest questions—upon the Origin and Destiny of Humanity; The Soul, is it Matter or Spirit?\n\nPotentiality or Reality?\n\nIndividual or Universal?\n\nMortal or Eternal?\n\nIs Man alone gifted with Soul, or are all beings equally so?\n\nBruno's system was in his mind complete and mature; he taught that everything in Nature has a soul, one universal mind, penetrates and moves all things; the world itself is a sacrum animal .\n\nNothing is lost, but all transmutes and becomes.\n\nThis vast field afforded him scope for teaching his doctrines upon the world, on the movement of the earth, and on the universal soul.\n\nThe novelty and boldness of his opinions roused the animosity of the clergy against him, and after living two years and six months at Toulouse, he felt it wise to retire, and leaving the capital of the Languedoc, he set his face towards Paris.\n\nThe two books—the fruit of his lectures—which [Pg 17] he published in Toulouse, \"De Anima\" and \"De Clavis Magis,\" were lost.\n\nThe title of Doctor, or as he said himself, \"Maestro delle Arti,\" which Bruno had obtained at Toulouse, gave him the faculty of teaching publicly in Paris, and he says: \"I went to Paris, where I set myself to read a most unusual lecture, in order to make myself known and to attract attention.\" He gave thirty lectures on the thirty Divine attributes, dividing and distributing them according to the method of St.\n\nThomas Aquinas: these lectures excited much attention amongst the scholars of the Sorbonne, who went in crowds to hear him; and he introduced, as usual, his own ideas while apparently teaching the doctrines of St.\n\nThomas."

