[content]
body = "But it is not so, if you consider well, for it cannot be that in one instant, which is an atom or point, love persists or endures; therefore one must of necessity understand the instant in another signification.\n\nAnd for the sake of getting out of the mesh, read the stanza: 38.\n\nOne time scatters and one gathers; One builds, one breaks; one weeps, one laughs; One time to sadness, one to gaiety inclines; One labours and one rests; one stands, one sits; One proffers and one takes away; One stays and one removes; one animates, one kills.\n\nIn all the years, the months, the days, the hours, Love waits on me, strikes, binds, and burns.\n\nTo me continual dissolution, Continual weeping holds me and destroys.\n\nAll times to me are full of woe; All things time takes from me, And gives me naught, not even death.\n\nCic.\n\nI understand the meaning quite perfectly, and confess that all things agree very well.\n\nIt is time to proceed to the next.\n\n[Pg 169] XV.\n\nTans.\n\nHere behold a serpent languishing in the snow, where a labourer has thrown it, and a naked child burning in the midst of the fire, with certain other details and circumstances, with the legend which says: \"Idem, itidem non idem.\" This seems more like an enigma than anything else, and I do not feel sure that I can explain it at all; yet I do believe that it means that the same fate vexes, and the same torments both the one and the other—that is, immeasurably, without mercy and unto death, by means of various instruments or contrary principles, showing itself the same whether cold or hot.\n\nBut this, it seems to me, requires longer and special consideration.\n\nCic.\n\nSome other time.\n\nRead the lines: 39.\n\nLimp snake, that writhest in the snow, Twisting and turning here and there To find some ease from the tormenting cold, If the congealing ice could know thy pain, Or had the sense to feel thy smart, And thou couldst find a voice for thy complaint, I do believe thy argument would make it pitiful.\n\nI with eternal fire am scourged, am burnt, and bitten, And in the iciness of my divinity find no deliverance, No pity does she feel, nor can she know, alas!\n\nThe rigorous ardour of my flames.\n\n[Pg 170] 40.\n\nSerpent, thou fain wouldst flee, but canst not; Try for thy hiding-place, it is no more; Recall thy strength, 'tis spent; Wait for the sun, behind thick fog he hides; Cry mercy of the hind, he fears thy tooth.\n\nFortune invoke, she hears thee not, the jade!\n\nNor flight, nor place, nor star, nor man, nor fate Can bring to thee deliverance from death.\n\nThou dost become congealed.\n\nMelting am I.\n\nI like thy rigours, thee my ardour pleases; Help have I none for thee, and thou hast none for me.\n\nClear is our evil fate—all hope resign.\n\nCic .\n\nLet us go, and by the way we will seek to untie this knot—if possible.\n\nTans .\n\nSo be it.\n\nPRINTED BY BALLANTYNE, HANSON AND CO.\n\nLONDON AND EDINBURGH THE APOLOGY OF THE NOLAN TO THE MOST VIRTUOUS AND LOVELY LADIES.\n\nO lovely, graceful nymphs of England!\n\nNot in repugnance nor in scorn Our spirit holds you, Nor would our pen abase you More than it must—to call you feminine!"

