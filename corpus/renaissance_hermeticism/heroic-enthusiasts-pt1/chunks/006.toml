[content]
body = "\"Altiora Peto\" was Bruno's motto, and to realize it he had gone forth with the pilgrim's staff in his hand, sometimes covered with the cowl of the monk, at others wearing the simple habit of a schoolmaster, or, again, clothed with the doublet of the mechanic: he had found no resting-place—nowhere to lay his head, no one who could understand him, but always many ready to denounce him.\n\nHe turned his back at last on his country, crossed the Alps on foot, and directed his steps towards Switzerland.\n\nHe visited the universities in different towns of Switzerland, France, and Germany, and wherever he went he left behind him traces of his visit in some hurried writings.\n\nThe only work of the Nolan, written in Italy, which has survived is \"Il Candelajo,\" which was published in Paris.\n\nLevi, in his Life of Bruno, passes in review his various works; but it will suffice here to reproduce what he says of the [Pg 13] \"Eroici Furori,\" the first part of which I have translated, and to note his remarks upon the style of Bruno, which presents many difficulties to the translator on account of its formlessness.\n\nGoethe says of Bruno's writings: \"Zu allgemeiner Betrachtung und Erhebung der Geistes eigneten sich die Schriften des Jordanus Brunous von Nola; aber freilich das gediegene Gold and Silber aus der Masse jener zo ungleich begabten Erzgänge auszuscheiden und unter den Hammer zu bringen erfordert fast mehr als menschliche Kräfte vermögen.\" I believe that no translation of Giordano Bruno's works has ever been brought out in English, or, at any rate, no translation of the \"Eroici Furori,\" and therefore I have had no help from previous renderings.\n\nI have, for the most part, followed the text as closely as possible, especially in the sonnets, which are frequently rendered line for line.\n\nForm is lacking in the original, and would, owing to the unusual and often fantastic clothing of the ideas, be difficult to apply in the translation.\n\nHe seems to have written down his grand ideas hurriedly, and, as Levi says, probably intended to retouch the work before printing.\n\nFollowing the order of Levi's Life of Bruno, we next find the fugitive at Geneva.\n\nHe was hardly [Pg 14] thirty-one years old when he quitted his country and crossed the Alps, and his first stopping-place was Chambery, where he was received in a convent of the Order of Predicatori; he proposed going on to Lyons, but being told by an Italian priest, whom he met there, that he was not likely to find countenance or support, either in the place he was in or in any other place, however far he might travel, he changed his course and made for Geneva.\n\nThe name of Giordano Bruno was not unknown to the Italian colony who had fled from papal persecution to this stronghold of religious reform.\n\nHe went to lodge at an inn, and soon received visits from the Marchese di Vico Napoletano, Pietro Martire Vermigli, and other refugees, who welcomed him with affection, inquiring whether he intended to embrace the religion of Calvin, to which Bruno replied that he did not intend to make profession of that religion, as he did not know of what kind it was, and he only desired to live in Geneva in freedom."

