[content]
body = "The one surprised the world with the melody of his songs; being, as Dante says, the \"dolce sirena che i marinari in mezzo al mare smaga,\" he lulled the anguish that lacerated Italy, and gilded the chains which bound her; the other tried to shake her; to recall her to life with the vigour of thought, with the force of reason, with the sacrifice of himself.\n\nThe songs of Tasso were heard and sung from one end of Italy to the other, and the poet dwelt in palaces and received the caress and smile of princes; while Bruno, discoursing in the name of reason and of science, was rejected, persecuted, and scourged, and only after three centuries of ingratitude, of calumny, and of forgetfulness, does his country show signs of appreciating him and of doing justice to his memory.\n\nIn Tasso the poet predominates over the philosopher, in Bruno the philosopher predominates over and eclipses the poet.\n\nThe first sacrifices thought to form; the second is careful only of the idea.\n\nAgain, both are full of a conception of the Divine, but the God that the dying Tasso confessed is a god that is expected and comes not; while the god that Bruno proclaims he already finds within himself.\n\nTasso dies in his bed in the cloister, uneasy as on a bed of thorns; Bruno, amidst the flames, stands out as on a pedestal, and dies serene and calm.\n\nWe must now follow our fugitive to Venice.\n\nAt the time Giordano Bruno arrived in Venice that city was the most important typographical centre of Europe; the commerce in books extended through the Levant, Germany, and France, and the philosopher hoped that here he might find some means of subsistence.\n\nThe plague at that time was devastating Venice, and in less than one year had claimed forty-two thousand victims; but Bruno felt no fear, and he took a lodging in that part of Venice called the Frezzeria, and was soon busy preparing for the press a work called \"Segni del Tempo,\" hoping that the sale of it would bring a little money for daily needs.\n\nThis work was lost, as were all those which he published in Italy, and which it was to the interest of Rome to destroy.\n\nDisappointed at not finding work to do in Venice, he next went to Padua, which was the intellectual centre of Europe, as Venice was the centre of printing and publishing; the most celebrated professors of that epoch were to be found in the University of Padua, but at the time of Bruno's sojourn there, Padua, like Venice, was ravaged by the plague; the university was closed, and the printing-house was not in operation.\n\nHe remained there only a few days, lodging with some monks of the Order of St.\n\nDominic, who, he relates, \"persuaded me to wear the dress again, even though I would not profess the religion it implied, because they said it would aid me in my wayfaring to be thus attired; and so I got a white cloth robe, and I put on the hood which I had preserved when I left Rome.\" Thus habited he wandered for several months about the cities of Venetia and Lombardy; and although he contrived for a time to evade his persecutors, he finally decided to leave Italy, as it was repugnant to his disposition to live in forced dissimulation, and he felt that he could do no good either for himself or for his country, which was then overrun with Spaniards and scourged by petty tyrants; and with the lower orders sunk in ignorance, and the upper classes illiterate, uncultivated, and corrupt, the mission of Giordano Bruno was impossible."

