[content]
body = "What power or spell of herb or magic art Can tear thee from the centre of my heart, Since he, who with an ever-growing zest, Tormenting most, yet most does make me blest?\n\nHow can I of this weight unburdened be, If pain the cure, and joy the sore give me?\n\nSweet is my pain: to this world new and rare.\n\nEyes!\n\nye are the bow and torches of my lord!\n\nDouble the flames and arrows in my breast, For languishing is sweet and burning best.\n\nFate vexes and grieves by undesirable and unfortunate events, or because it makes the subject feel unworthy of the object, and out of proportion with the dignity of the latter, or because a perfect sympathy does not exist, or for other reasons and obstacles that arise.\n\nThe object satisfies the subject, which is nourished by no other, seeks no other, is occupied by no other, and banishes every other thought.\n\nJealousy torments, because although she is the daughter of Love, and is derived from him, and is his companion who always goes with him, and is a sign of the same, being understood as a necessary consequence wherever love is found (as may be observed of whole generations who, from the coldness of the region and lateness of development, learn little, love less, and of jealousy know nothing), yet, notwithstanding its kinship, association, and signification, jealousy comes to trouble and poisons all that it finds of beautiful and of good in Love.\n\nTherefore I said in another sonnet: 6.\n\nOh, wicked child of Envy and of Love!\n\nThat turnest into pain thy father's joys, To evil Argus-eyed, but blind as mole to good.\n\nMinister of torment!\n\nJealousy!\n\nFetid harpy!\n\nTisiphone infernal!\n\nWho steals and poisons others' good, Under thy cruel breath does languish The sweetest flower of all my hopes.\n\nProud of thyself, unlovely one, Bird of sorrow and harbinger of ill, The heart thou visitest by thousand doors; If entrance unto thee could be denied, The reign of Love would so much fairer be, As would this world were death and hate away.\n\nTo the above is added, that Jealousy not only is sometimes the ruin and death of the lover, but often kills Love itself, because Love comes to be so much under its influence that it is impelled to despise the object, and in fact becomes alienated from it, especially when it engenders disdain.\n\nCic.\n\nExplain now the ideas which follow.\n\nWhy is Love called the \"insensate boy\"?\n\nTans.\n\nI will tell you.\n\nLove is called the insensate boy, not because he is so of himself, but because he brings certain ones into subjection, and dwells in such subjects, since the more intellectual and speculative one is, the more Love raises the genius and purifies the intellect, rendering it alert, studious, and circumspect, promoting a condition of valorous animosity and an emulation of virtues and dignities by the desire to please and to make itself worthy of the thing loved; others, and they are the largest number, call him mad and foolish, because he drives them distracted, and hurries them into excesses, by which the spirit, soul, and body become sickly, and inept to consider and distinguish that which is seemly from that which is distorted; thus rendering them subject to scorn, derision, and reproach.\n\nCic.\n\nIt is commonly said that love makes fools of the old and makes the young wise.\n\nTans.\n\nThat drawback does not happen to all the aged, nor that advantage to all the young; the one is true of the weak, and the other of the robust."

