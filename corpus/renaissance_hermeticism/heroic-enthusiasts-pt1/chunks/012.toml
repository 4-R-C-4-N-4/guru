[content]
body = "Bruno returned to Paris in 1585, being at that time tutor in the family of Mauvissier, who had been recalled from England by his Sovereign.\n\nDuring Bruno's second sojourn in Paris efforts were made by Mendoza, the Spanish ambassador, and others, to induce him to return to his allegiance to the Church, and to be reconciled to the Pope; but Bruno declined these overtures, and soon after left Paris for Germany, where he arrived on foot, his only burden being a few books.\n\nHe visited Marburg and Wurtemburg, remaining in the latter place two years, earning his bread by teaching.\n\nPrague and Frankfort were next visited; ever the same courage and boldness characterised his teaching, and ever the same scanty welcome was accorded to it, although in every city and university crowds of the intelligent listened to his lectures; but the Church never lost sight of Bruno, he was always under surveillance, and few dared to show themselves openly his friends.\n\nAbsorbed in his studies and intent upon his work, writing with feverish haste, he observed nothing of the invisible net which his enemies kept spread about him, and while his slanderers were busy in doing him injury he was occupied in teaching the mnemonic art, and explaining his system of philosophy to the young Lutherans who attended his lectures; in settling the basis of a new and rational religion, and in writing Latin verses; using ever greater diligence with his work, almost as if he felt that the time was drawing near in which he would be no longer at liberty to work and teach.\n\nIt was during the early part of the pontificate of Gregory XIV.\n\nthat Bruno received letters from Mocenigo in Venice, urging him to return to Italy, and to go and stay with him in Venice, and instruct him in the secrets of science.\n\nBruno was beginning to tire of this perpetually wandering life, and after several letters from Mocenigo, full of fine professions of friendship and protection, Bruno, longing to see his country again, turned his face towards Venice.\n\nIn those days men of superior intellect were often considered to be magicians or sorcerers; Mocenigo, after enticing Bruno to Venice, insisted upon his teaching him \"the secret of memory and other things that he knew.\" The philosopher with untiring patience tried to instil into this dull head the principles of logic, the elements of mathematics, and the rudiments of the mnemonic art; but the pupil hated study, and had no faculty of thought; yet he insisted that Bruno should make science clearly known to him!\n\nBut this was probably only to initiate a quarrel with Bruno, whom he intended afterwards to betray, and deliver into the hands of the Church.\n\nThe Holy Office would have laid hands on Bruno immediately on his arrival in Italy, but being assured by Mocenigo that he could not escape, they left him a certain liberty, so that he might more surely compromise himself, while his enemies were busy collecting evidence against him.\n\nWhen at last his eyes became opened to what was going on about him, and he could no longer ignore the peril of his position, it was too late; Bruno could not get away, and was told by Mocenigo that if he stayed not by his own will and pleasure, he would be compelled to remain where he was.\n\nBruno, however, made his preparations for departure, and sent his things on to Frankfort, intending to leave the next day himself; but in the morning, while he was still in bed, Mocenigo entered the chamber, pretending that he wished to speak with him; then calling his servant Bartolo and five or six gondoliers, who waited without, they forced Bruno to rise, and conducted him to a garret, and locked him in."

