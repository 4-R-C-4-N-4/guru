[content]
body = "Fitly, therefore, this rapture of heroic enthusiasm feeds on such \"high emprise.\" For the object is infinite, and in action most simple, and our intellectual power cannot apprehend the infinite except in speech or in a certain manner of speech, so to say in a certain potential or relative inference, as one who proposes to himself the infinity, so that he may constitute for himself a finality where no finality is.\n\nCic .\n\nFitly so, because the ultimate ought not to [Pg 83] have an end seeing that it is ultimate.\n\nFor it is infinite in intention, in perfection, in essence, and in any other manner whatsoever of being final.\n\nTans .\n\nThou sayest truly.\n\nNow in this life, that food is such that excites more than it can appease, as that divine poet shows when he says: \"My soul is wearied, longing for the living God,\" and in another place; \"Attenuati sunt oculi mei suspicientes in excelsa.\" Therefore he says, \"And though the end desired be not attained, And that my soul in many thoughts is spent, Enough that she enkindle noble fire:\" meaning to say that the soul comforts itself, and receives all the glory which it is able in that state to receive, and that it is a participator in that ultimate enthusiasm of man, in so far as he is a man in this present condition, as we see him.\n\nCic .\n\nIt appears to me that the Peripatetics, as explained by Averroes, mean this, when they say that the highest felicity of man consists in perfection through the speculative sciences.\n\nTans .\n\nIt is true, and they say well; because we, in this state, cannot desire nor obtain greater perfection than that in which we are, when our intellect, by means of some noble and intelligible conception, unites itself either to the substance of things hoped [Pg 84] for, as those say, or to the divine mind, as it is the fashion to say of the Platonists.\n\nFor the present, I will leave reasoning about the soul, or man in another state or mode of being than he can find himself or believe himself to be in.\n\nCic .\n\nBut what perfection or satisfaction can man find in that knowledge which is not perfect?\n\nTans .\n\nIt will never be perfect, so far as understanding the highest object is concerned; but in so far as our intellect can understand it.\n\nLet it suffice that in this and other states there be present to him the divine beauty so far as the horizon of his vision extends.\n\nCic .\n\nBut all men cannot arrive at that, which one or two may reach.\n\nTans .\n\nLet it suffice that all \"run well,\" and that each does his utmost, for the heroic nature is content and shows its dignity rather in falling, or in failing worthily in the high undertaking, in which it shows the dignity of its spirit, than in succeeding to perfection in lower and less noble things.\n\nCic .\n\nTruly a dignified and heroic death is better than a mean, low triumph.\n\nTans .\n\nOn that theme I made this sonnet: [Pg 85] 16.\n\nSince I have spread my wings to my desire, The more I feel the air beneath my feet, So much the more towards the wind I bend My swiftest pinions, And spurn the world and up towards heaven I go.\n\nNot the sad fate of Daedalus's son Does warn me to turn downwards, But ever higher will I rise.\n\nWell do I see, I shall fall dead to earth; But what life is there can compare with this my death?\n\nOut on the air my heart's voice do I hear: \"Whither dost thou carry me, thou fearless one?\n\nTurn back."

