body = "There he passed the first day of that imprisonment which was to last for eight years.\n\nThe next day he went over the lagoon in a gondola, in the company of his jailors, who took him to the prison of the Holy Office, and left him there.\n\nLevi devotes many pages to the accusations brought against Giordano Bruno by the Inquisitors, and the depositions and denunciations made against him by his enemies.\n\nThe Court was opened without delay, and most of the provinces of Italy were represented by their delegates in the early part of the trial; Bruno himself, being interrogated, gave an account in detail of his life, of his wanderings, of his occupations and works: serene and dignified before this terrible tribunal, he expounded his doctrine, its principles, and logical consequences.\n\nHe spoke of the universe, of the infinite worlds in infinite space, of the divinity in all things, of the unity of all things, the dependence and inter-dependence of all things, and of the existence of God in all.\n\nAfter nine months' imprisonment in Venice, towards the end of January 1593, Bruno, in chains, was conveyed from the Bridge of Sighs through the lagoons to Ancona, where he remained incarcerated until the prison of the Roman Inquisition received him.\n\nIf we look upon \"Gli Eroici Furori\" as a prophetical poem, we see that his sufferings in the loneliness of his prison and in the torture-chamber of the Inquisition passed by anticipation before his mind in the book written when he was free and a wanderer in strange lands.\n\n\"By what condition, nature, or fell chance, In living death, dead life I live?\" he writes eight years and more before he ever breathed the stifling air of a dungeon; and again: \"The soul nor yields nor bends to these rough blows, But bears, exulting, this long martyrdom, And makes a harmony of these sharp pangs.\" Further details of the trial of Giordano Bruno are to be found in Levi's book.\n\nIt is well known how he received the sentence of death passed upon him, saying: \"You, O judges!\n\nfeel perchance more terror in pronouncing this judgment than I do in hearing it.\" The day fixed for the burning, which was to take place in the Campo dei Fiori, was the 17th February in the year 1600.\n\nRome was full of pilgrims from all parts, come to celebrate the jubilee of Pope Clement VIII.\n\nBruno was hardly fifty years old at this time; his face was thin and pale, with dark, fiery eyes; the forehead luminous with thought, his body frail and bearing the signs of torture; his hands in chains, his feet bare, he walked with slow steps in the early morning towards the funeral pile.\n\nBrightly shone the sun, and the flames leapt upwards and mingled with his ardent rays; Bruno stood in the midst with his arms crossed, his head raised, his eyes open; when all was consumed, a monk took a handful of the ashes and scattered them in the wind.\n\nA month later, the Bishop of Sidonia presented himself at the Treasury of the Pope, and demanded two scudi in payment for having degraded Fra Giordano the heretic.\n\n\"L'incendio è tal, ch'io m'ardo e non mi sfaccio.\" Eroici Furori.\n\nTHE HEROIC ENTHUSIASTS."

