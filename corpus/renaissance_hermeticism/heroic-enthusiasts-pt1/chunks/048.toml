[content]
body = "Be it far from me to make complaint of love, Love, without whom I will not happy be, And though through him these weary toils I bear.\n\nYet what is given my will shall not reject.\n\nBe clear the sky or dark, burning or cold, To that one ph[oe]nix e'er the same I'll be, No fate nor destiny can e'er untie That knot which death unable is to loose; To heart, to spirit, and to soul, No pleasure is, no liberty, no life, No smile, no rapture, no delight, So sweet, so grateful, so divine, As these hard bonds, this death of mine, To which by fate, by will, by nature I incline.\n\nHere, in the figure, he shows the resemblance [Pg 130] between the enthusiast and the butterfly attracted towards the light; in the sonnet, however, he demonstrates rather difference and dissimilarity; as it is commonly believed, that if the butterfly foresaw its destruction, it would fly from the light more eagerly than it now pursues it, and would consider it an evil to lose its life through being absorbed into that hostile fire.\n\nBut to him (the enthusiast) it is no less pleasing to perish in the flames of amorous ardour than to be drawn to the contemplation of the beauty of that rare splendour, under which, by natural inclination, by voluntary election, and by disposition of fate, he labours, serves, and dies more gaily, more resolutely, and more courageously than under whatsoever other pleasure which may offer itself to the heart, liberty which may be conceded to the spirit, and life which may be discovered in the soul.\n\nCic .\n\nTell me why he says, \"ever the same I'll be?\" Tans .\n\nBecause it seems suitable to bring forward a reason for his constancy, seeing that the sage does not change with the moon, although the fool does so.\n\nThus he is unique, as the ph[oe]nix is unique.\n\nV.\n\nCic .\n\nBut what signifies that branch of palm, around which is the legend, \"Cæsar adest?\" [Pg 131] Tans.\n\nWithout further talk, all may be understood by that which is written on the tablet: 29.\n\nUnconquered victor of Pharsalia, Though all thy warriors be well-nigh spent, At sight of thee they rise once more; Their strength returns, they conquer their proud foes; So does my love—that equals love of heaven— Become a living presence through my thoughts; Thoughts that my haughty soul had killed with scorn, Love brings again stronger than love himself; Thy presence is enough, oh memory!\n\nThese to reanimate in all their strength, And with imperious sov'reignty they rule And govern each opposing force.\n\nMay I be happy in this governance And with these bonds, and may that light ne'er cease.\n\nThere are times when the inferior powers of the soul—like a vigorous and hostile army, which finds itself in its own country practised, expert, and ready—revolt against the foreign adversary, who comes down from the height of the intelligence to curb the people of the valley and of the boggy plains, where, through the baneful presence of the enemies and of such obstacles as deep ditches, advancing they lose themselves, and would be entirely lost, if there were not a certain conversion towards [Pg 132] the splendour of intellectual things through the act of contemplation, by means of which they are converted from inferior degrees to superior ones.\n\nCic.\n\nWhat degrees are these?\n\nTans."

