[content]
body = "It seems to me, that it means that his particular intelligence is to the universal intelligence ever the same—that is to say, the one is ever illuminated by the other, over the whole hemisphere; notwithstanding that to the inferior powers, and according to the influence of his actions, it appears now dark, and now more and less clear.\n\nOr perhaps it means that his speculative intellect, which is ever invariable in its action, is always turned and affected towards the human intelligence signified by the moon.\n\nBecause, as this is said to be the lowest of all the stars, and is nearest to us, so the illuminating intelligence of all of us in this state is the last in order of the other intelligences, as Averroes and the more subtle Peripatetics say.\n\nThat intelligence, in so far as it is not in any act, goes down before, or sets to the potential intellect, or as if so to say, it emerged from the bottom of the occult hemisphere, and showed itself now void, now full, according as it gives more or less light of intelligence.\n\nNow its sphere is dark, now light, because sometimes it shows itself as a shadow, a semblance, and a vestige, and sometimes more and more openly: now it declines towards the south, now it mounts towards the north—that is, now it removes farther and farther away, and now it approaches nearer and nearer.\n\nBut the intellect, active with its continual grief—seeing that it is not through its human condition and nature that it finds itself so wretched, so opposed, courted, solicited, distracted, and, as it were, torn by the inferior powers—sees its object stable, fixed and constant, and ever full, and in the same splendour of beauty.\n\nThus it ever takes away, in so far as it does not concede, and ever gives, in so far as it concedes.\n\nIt ever burns in the affection in so far as it shines in thoughts, and is always cruel in withdrawing itself through that which withdraws itself; as it is always beautiful in communication with that to which it presents itself.\n\nAlways does it torment when it is divided from him by difference of locality, as always it delights him being joined to it by affection.\n\nCic.\n\nNow apply your intelligence to the legend.\n\nTans.\n\nHe says then, \"talis mihi semper;\" that is, because of the continual application of my intellect, my memory, and my will, because I will remember, understand and desire no other; she is ever the same to me, and in so far as I can understand her, she is entirely present, and is not separated from me by any distraction of my thoughts, nor does she become darkened to me through any want of attention, for there is no thought that can divert me from that light nor any necessity of nature which forces me to a less constant attention; \"talis mihi semper\" on her side, because she is invariable in substance, in virtue, in beauty, and in effect, towards those things that are constant and invariable towards her.\n\nShe says further, \"ut astro,\" because in respect of the sun, the illuminator of her, she is ever equally luminous, seeing that she is ever turned equally towards him, and he at the same time diffuses his rays equally.\n\nAs, physically, this moon that we see with the eyes, although towards the earth she appears now dark, now shining, now more, now less illuminated and illuminating, yet is she ever equally irradiated by the sun, because she always reflects his rays over at least the whole of her hemisphere."

