[content]
body = "She dispatches the armed thoughts, which, solicited and urged by disagreement with the inferior nature, [Pg 102] are sent to recall the heart.\n\nThe soul instructs them how they should conduct themselves, so that, being allured and attracted by the object, they do not become induced to remain, they also, captive and companions of the heart.\n\nShe says, then, they are to arm themselves with love, with that love that is fired by the domestic flame; that is, the friend of generation, to whom they are bound, and in whose jurisdiction, ministry, and warfare they find themselves.\n\nAnon she orders them to repress their eyesight and to close their eyes, so that they may not behold other beauty or goodness than that which is present, friend and mother; and concludes at last with this, that if no other reason will cause them to return, they should at least do so, to give account of the discourse and of the state of the heart.\n\nCic .\n\nBefore you proceed further, I would understand from you what is that which the soul means when she tells the thoughts to repress the sight vigorously.\n\nTans .\n\nI will tell thee.\n\nAll love proceeds from seeing: intelligent love, from seeing intelligently; sensuous love, from seeing sensuously.\n\nNow this seeing has two meanings: either it means the visual power, that is the sight, which is the intellect, or truly the sense; or it means the act of that power, [Pg 103] that is, that application which the eye or the intellect makes to the material or intellectual object.\n\nWhen the thoughts are counselled to repress the sight, it is not the first, but the second, mode that is meant, because that is the father of the subsequent affection of the sensuous or intellectual desire.\n\nCic .\n\nThis is what I wished to hear from you.\n\nNow, if the act of the visual power is the cause of the evil or good which proceed from seeing, whence comes it that in things divine we have more love than knowledge?\n\nTans .\n\nWe desire to see, because in some way we perceive the value of seeing.\n\nWe are aware that, through the act of seeing, beautiful things offer themselves to us; and therefore we desire beautiful things.\n\nCic .\n\nWe desire the beautiful and the good; but seeing is not beautiful nor good; rather is it the touchstone or light by which we see, not only the beautiful and good, but also the evil and bad.\n\nTherefore it seems to me that seeing may be equally beautiful or good, as the thing seen may be white or black.\n\nIf, then, the sight, which is an act, is not beautiful nor good, how can it fall into desire?\n\nTans .\n\nIf not for itself, yet certainly for some [Pg 104] other reason, it is desired, seeing that there can be no apprehension of that other without it.\n\nCic .\n\nWhat wilt thou say, if that other is not within the knowledge of the senses nor of the intellect?\n\nHow, I say, can that be desired which is not seen, if there is no knowledge whatever of it—if towards it neither the intellect nor the sense has exercised any act whatever; but, on the contrary, it is even dubious whether it be intellectual or sensuous, whether a thing corporeal or incorporeal, whether it be one or two or more, or of one fashion or of another?\n\nTans .\n\nI answer, that in the sense and the intellect there is one desire and one impulse to the sensuous in general; because the intellect will hear the whole truth, so that it may learn all that is beautiful or good intelligently; the power of the senses will inform itself of all that is sensuous, so that it may know all that is good and beautiful in the world of the senses."

