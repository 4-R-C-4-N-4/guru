[content]
body = "The degrees of contemplation are like the degrees of light, which exist not at all in the darkness, slightly in shade, more in colours, according to their orders, from one opposite which is black to the other which is white; but more fully do they exist in the splendour diffused over pure transparent bodies, as in a looking-glass and in the moon, and still more brightly in the rays diffused by the sun, but principally and most brilliantly in the sun itself.\n\nNow the perceptive and the affectional powers are ordered in this way; the next following always has affinity for the next preceding, and by means of conversion to that which elevates it, it becomes fortified against the inferior, which lowers it; as the reason, through its conversion to the intellect, is not seduced or vanquished by knowledge or comprehension or by passionate affection, but rather, according to the law of the intellect, it is brought to govern and correct the same.\n\nIt comes to this, therefore, that when the rational appetite strives against sensual concupiscence, if, by the act of con version, the intellectual light is presented to the eyes, it causes the above appetite to take up again the lost virtue, and giving fresh strength to the nerves, it alarms and puts to rout the enemy.\n\nCic.\n\nIn what manner do you mean that such a conversion takes place?\n\nTans.\n\nWith three preparatives, which are noted by the contemplative Plotinus in the book of \"Intellectual Beauty;\" and, of these, the first is by proposing to conform himself to a divine pattern, diverting the sight from things which stand between him and his own perfection, and which are common to those things which are equal and inferior.\n\nThe second is by applying himself, with full intention and attention, to superior things.\n\nThe third is by bringing into captivity to God the whole will and affection: for from this it comes to pass that, without doubt, the divinity will influence him; who is everywhere present, and ready to come to the aid of whosoever turns to Him through the act of the intelligence, and who unreservedly presents himself with the affection of the will.\n\nCic.\n\nIt is not then corporeal beauty which can allure such an one?\n\nTans.\n\nNo, certes; because in that there is no true nor constant beauty, and for this reason it cannot evoke true nor constant love.\n\nThat beauty, which is seen in bodies is accidental and transitory, and is like those which are absorbed, changed, and spoiled by the changing of the subject, which very often, from being beautiful, becomes ugly, without any change taking place in the soul.\n\nThe reason then comprehends the truest beauty, through conversion, to that which makes the beauty of the body, and forms it in loveliness—it is the soul which has thus built and designed it.\n\nNow does the intellect rise still higher, and learns that the soul is incomparably more beautiful than any beauty that may be in bodies; but yet it cannot persuade itself that it is beautiful of itself and primarily, for if it be so, what is the cause of that difference which exists in the quality of souls, by which some are wise, amiable, and beautiful, others stupid, odious, and ugly.\n\nWe must then raise ourselves to that superior intellect which is beautiful in itself and good in itself.\n\nThis is that sole supreme captain who alone, placed before the eyes of the militant thoughts, enlivens, encourages, strengthens them, and renders them victorious above the scorn of every other beauty and the repudiation of every other good whatsoever.\n\nThis is the presence which causes every difficulty to be overcome and all opposition to be subdued.\n\nCic."

