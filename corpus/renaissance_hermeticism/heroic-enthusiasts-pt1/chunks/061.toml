[content]
body = "Nec Veneris fructu caret is, qui vitat amorem, Sed potius, quæ sunt, sine poena, commoda sumit.\n\nCic.\n\nWhat is meant by the meridian of the heart?\n\nTans.\n\nThat part or region of the will which is highest and most exalted, and where it becomes most strongly, clearly, and effectually kindled.\n\nHe means that such affection is not as in its beginning, where it stirs, nor as at the end, where it reposes, but as in the middle, where it becomes fervid.\n\nXIV.\n\nCic.\n\nBut what means that glowing arrow, which has flames in place of a hard point, around which [Pg 166] is encircled a noose with the legend: \"Amor instat ut instans\"?\n\nSay, what does it mean?\n\nTans.\n\nIt seems to me to mean that love never leaves him, and at the same time eternally afflicts him.\n\nCic.\n\nI see the noose, the arrow, and the fire.\n\nI understand that which is written: \"Amor instat\"; but that which follows I cannot understand—that is, that love as an instant, or persisting, persists; which has the same poverty of idea as if one said: \"This undertaking he has feigned as a feint; he bears it as he bears it, understands it as he understands it, values it as he values it, and esteems it as he who esteems it.\" Tans.\n\nIt is easy for him to decide and condemn who does not even consider.\n\nThat \"instans\" is not an adjective from the verb \"instare,\" but it is a noun substantive used for the instant of time.\n\nCic.\n\nNow, what is the meaning of the phrase \"love endures as an instant?\" Tans.\n\n.\n\nWhat does Aristotle mean in his book on Time, when he says that eternity is an instant, and that all time is no more than an instant?\n\nCic.\n\nHow can this be, seeing that there is no time so short that it cannot be divided into seconds?\n\nPerhaps he would say that in one instant there is [Pg 167] the Flood, the Trojan war, and we who exist now; I should like to know how this instant is divided into so many centuries and years, and whether, by the same rule, we might not say that the line is a point?\n\nTans .\n\nIf time be one, but in different temporal subjects, so the instant is one in different and all parts of time.\n\nAs I am the same I was, am, and shall be; so I myself am always the same in the house, in the temple, in the field, and wheresoever I am.\n\nCic .\n\nWhy do you wish to make out that the instant is the whole of time?\n\nTans .\n\nBecause if it were not an instant, it would not be time; therefore time in essence and substance is no other than an instant, and let this suffice, if you understand it, because I do not intend to perorate upon the entire physics; so that you must understand that he means to say that the whole of love is no less present than the whole of time; because this \"instans\" does not mean a moment of time.\n\nCic .\n\nThis meaning must be specified in some way, if we do not wish to see the motto invalidated by equivocation, by which we are free to suppose that he meant to say that his love was but for an [Pg 168] instant—that is, for an atom of time, and of nothing more, or that he means that it is as you interpret it, everlasting.\n\nTans.\n\nSurely, if these two contrary meanings were implied, the legend would be nonsense."

