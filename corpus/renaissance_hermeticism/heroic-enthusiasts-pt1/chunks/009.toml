[content]
body = "The primal idea of Pythagoras, which Bruno worked out to a more distinct development is this: numbers are the beginning of things; in other words numbers are the cause of the existence of material things; they are not final, but are always changing position and attributes; they are variable and relative.\n\nBeyond and above this mutability there must be the Immutable, the All, the One.\n\nThe Infinite must be one, as one is the absolute number; in the original One is contained all the numbers; in the One is contained all the elements of the Universe.\n\nThis abstract doctrine required to be elucidated and fixed.\n\nFrom a hypothesis to concentrate and reduce it to a reality was the great work of Bruno.\n\nOne is the perfect number; it is the primitive monad.\n\nAs from the One proceeds the infinite series of numbers which again withdraw and are resolved into the One; so from Substance, which is one, proceed the myriads of worlds; from the worlds proceed myriads of living creatures; and from [Pg 21] the union of one with the diverse is generated the Universe.\n\nHence the progression from ascent to descent, from spirit to that which we call matter; from the cause to the origin, and the process of metaphysics, which, from the finite world of sense rises to the intelligent, passing through the intermediate numbers of infinite substance to active being and cosmic reason.\n\nFrom the absolute One, the sun of the sensible and intellectual world, millions of stars and suns are produced or developed.\n\nEach sun is the centre of as many worlds which are distributed in as many distinct series in an infinite number of concentric centres and systems.\n\nEach system is attracted, repelled, and moved by an infinite, internal passion, or attraction; each turns round its own centre, and moves in a spiral towards the centre of the whole, towards which centre they all tend with infinite passional ardour.\n\nFor in this centre resides the sun of suns, the unity of unities, the temple, the altar of the universe, the sacred fire of Vesta, the vital principle of the universe.\n\nThat which occurs in the world of stars is reflected in the telluric world; everything has its centre, towards which it is attracted with fervour.\n\nAll is thought, passion, and aspiration.\n\n[Pg 22] From this unity, which governs variety, from this movement of every world around its sun, of every sun around its centre sun—the sun of suns—which informs all with the rays of the spirit, with the light of thought—is generated that perfect harmony of colours, sounds, forms, which strike the sight and captivate and enthrall the intellect.\n\nThat which in the heavens is harmony becomes, in the individual, morality, and in companies of human beings, law.\n\nThat which is light in the spheres becomes intelligence and science in the world of the spirit and in humanity.\n\nWe must study this harmony that rules the celestial worlds in order to deduce the laws which should govern civil bodies.\n\nIn the science of numbers dwells harmony, and therefore it behoves us to identify ourselves with this harmony, because from it is derived the harmonic law which draws men together into companies.\n\nThrough the revolution of the worlds through space around their suns, from their order, their constancy and their measure, the mind comprehends the progress and conditions of men, and their duties towards each other.\n\nThe Bible, the sacred book of man, is in the heavens; there does man find written the word of God.\n\nHuman souls are lights, distinct from the [Pg 23] universal soul, which is diffused over all and penetrates everything.\n\nA purifying process guides them from one existence to another, from one form to another, from one world to another."

