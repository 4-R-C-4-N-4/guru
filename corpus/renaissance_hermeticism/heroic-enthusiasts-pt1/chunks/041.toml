[content]
body = "Heaven the second gift denies, To him who does the first despise.\n\nWith these and similar reasons the soul, taking part with the weakest, seeks to recall the thoughts to the care of the body.\n\nAnd these, although late, come and show themselves, but not in that form in which they departed, but only to declare their rebellion, and force her to follow.\n\nAnd the sorrowing one thus laments: 23.\n\nAh, dogs of Actæon, ah, proud ingrates!\n\nWhom to the abode of my divinity I sent; Without hope do ye return to me; And, coming to the mother's side, ye bring Back unto me a too unhappy boon; Ye mangle me, and will that I live not.\n\n[Pg 111] Leave me, life, that I may mount up to my sun, A double streamlet, mad, without my fount!\n\nWhen shall this ponderous mass of me dissolve?\n\nWhen shall it be, that, taking myself hence, And swiftly rising to the heights above, Together with my heart I may abide, And with my thoughts I may be deified?\n\nThe Platonists say that the soul, as to its superior part, always consists in the intellect, in which it has more of understanding than of soul, seeing that it is called soul only in so far as it vivifies the body and sustains it.\n\nSo here, the same essence which nourishes and maintains the thoughts on high, together with the exalted heart, is induced by the inferior part to afflict itself, and recall them as rebels.\n\nCic.\n\nSo that they are not two contrary existences, but one, subject to two contradictory terms?\n\nTans.\n\nSo it is, precisely.\n\nAs the ray of the sun which touches the earth, and is joined to obscure and to inferior things, which it brightens, vivifies, and kindles, and is then joined to the element of fire—that is, to the star, whence it proceeds, and has its beginning, and is diffused, and in which it has its own and original subsistence—so the soul, which is in the horizon of Nature, is corporeal and incorporeal, and contains that with which it rises to superior [Pg 112] things and declines to things inferior.\n\nAnd this, you may perceive, does not happen by reason and order of local motion, but solely through the impulse of one and of another power or faculty.\n\nAs when the sense rises to the imagination, the imagination to the reason, the reason to the intellect, the intellect to the mind, then the whole soul is converted into God, and inhabits the intelligible world; whence, on the other hand, she descends in an inverse manner to the world of feeling, through the intellect, reason, imagination, sense, vegetation.\n\nCic.\n\nIt is true that I have heard that the soul, in order to put itself in the ultimate degree of divine things, descends into the mortal body, and from this goes up again to the divine degrees, which are three degrees of intelligence.\n\nFor there are others in which the intellectual surpasses the animal, which are said to be the celestial intelligences; and others in which the animal surpasses the intellectual, which are the human intelligences; others there are, of which those things are equal, as those of demons or heroes.\n\nTans.\n\nThe mind then cannot desire except that which is near, close, known, and familiar.\n\nThe pig cannot desire to be a man, nor wish for those things that are suitable to the human appetite.\n\nHe likes [Pg 113] better to turn about in mud than in a bed of linen, he would prefer a sow to the most beautiful of women, because the affection follows the reason of the species."

