[content]
body = "Destiny, when, shall I that mountain mount, Which, blissful to the high gates bringing, bring, Where those rare beauties I shall counting, count, When he my pain with comfort comforting, Who my disjointed members joined, And leaves my dying powers not dead?\n\nMy spirit's rival more than rivalled is If, far from sin, it unassailed may sail, If thither tending, it may waiting, wait, And up with that high object rising, rise, And if my good alone, alone I take, For which I sure remove of each defect effect, And so at last may come to enjoy with joy, As he who all foretells can tell.\n\n[Pg 119] [A] Pulcini.\n\nO Destiny!\n\nO Fate!\n\nO divine immutable Providence!\n\nwhen shall it be that I shall climb that mount—that is, that I may arrive at such altitude of mind, as transporting me shall bring me into those outer and inner courts where I may behold and count those rare beauties?\n\nWhen shall it be, that he will effectually comfort my pain, loosening me from the tightened bonds of those cares in which I find myself, he, who formed and united my members, which before were disunited and disjoined: that is Love; he who has joined together these corporeal parts, which were as far divided as one opposite is divided from another; so that these intellectual powers which, through his action he has extinguished, should not be left quite dead, but be again re-animated and made to aspire on high?\n\nWhen, I say, will he fully comfort me, and give my powers free and speedy flight, by which means my substance may go and nestle there, where, by my efforts, I may make amends and correct my defects, and where (if I arrive) my spirit will be made effectual or prevail over my rival, because there, no excess will oppose, no opposition overcome, no error assail?\n\nOh!\n\nif by force he may arrive there, at that height which he is waiting to reach, he will remain on high, at the elevation of his object, and he will take that good [Pg 120] that cannot be comprehended by any other than one, that is, by himself, seeing that every other has it in the measure of his own capacity, and this one alone has it in all its fulness.\n\nThen will happiness come to me in that manner which he says, \"who all foretells\"; that is, at that elevation in which the saying all and the doing all is the same thing; in that manner that he says and does who all foretells, that is, who is sufficient for all things and primary, and whose word and pre-ordaining is the true doing and beginning.\n\nThis is how, in the scale of things superior and inferior, the affection of Love proceeds, as the intellect or sentiment proceeds from these intelligible or knowable objects, to those, or from those to these.\n\nCic.\n\nThus the greater number of sages believe that Nature delights in this changeful circulation which is seen in the whirling of her wheel.\n\n[Pg 121]"

