[content]
body = "There is a sun whose rays extend to the back of the earth, [Pg 124] and there is a legend which says: \"Idem semper ubique totum.\" Cic .\n\nI perceive that the interpretation of it will be difficult.\n\nTans .\n\nThe more excellent the meaning the less obvious is it, and you will see that it is unequalled, unique, and not strained.\n\nYou are to consider that the sun, although with regard to the various regions of the earth he is for each one different as to time, place, and degree, yet in respect of the whole globe as such, he always and in every place accomplishes everything, for in whatever part of the ecliptic he is to be found, he makes winter, summer, autumn, and spring, and makes the whole globe of the earth to receive within itself the aforesaid four seasons; for never is it hot at one side unless it is cold on the other; when it is to us very hot in the tropic of Cancer it is very cold in the tropic of Capricorn; so that for the same reason it is winter in that part when it is summer in this, and to those who are in the middle, it is temperate according to the aspect, vernal or autumnal.\n\nSo the earth always feels the rains, the winds, the heat, the cold; nor would it be damp here if it were not dry in another part, and the sun would not warm it on this side if it had not already left off warming it on the other.\n\n[Pg 125] Cic.\n\nEven before you have finished, I understand what you would say.\n\nYou mean that as the sun gives all the impressions to the earth, and this receives them whole and entire, so the Object of the enthusiast, with its active splendour, makes him the passive subject of tears, which are the waters, of ardours, which are the fires, and of sighs, which are certain vapours, which partake of both, which leave the fire, and go to the waters, or leave the waters and go to the fire.\n\nTans.\n\nThis is well explained below.\n\n26.\n\nWhen as the sun towards Capricorn declines, Then do the rains enrich the streams, As towards the line he goes, or thence returns, More felt is each Æolian messenger, Warming the more with every lengthening day What time towards burning Cancer he remounts.\n\nAnd equal to this heat, this cold, this zeal Are these my tears, my sighs, the ardour that I feel.\n\nMy constant sighs, my never waning flames Are only equal to my tears.\n\nMy floods and flames howe'er intense they be, Are never more so than my sighs; I burn with fervid heat, And, firmly fixed, I ever sigh and weep.\n\nCic.\n\nThis does not so much declare the meaning [Pg 126] of the coat of arms, as the preceding discourse did, but it rather supplements or accompanies that discourse.\n\nTans .\n\nSay, rather, that the figure is latent in the first part, and the legend is well explained in the second; as both the one and the other are very properly signified in the type of the sun and of the earth.\n\nCic .\n\nPass on to the third.\n\nIII.\n\nTans .\n\nThe third bears on his shield a naked child, stretched upon the green turf, who rests his head upon his arm, with his eyes turned towards the sky to certain edifices, towers, gardens, and orchards, which are above the clouds, and there is a castle of which the material is fire, and in the middle is the sign inscribed: \"Mutuo fulcimur.\" Cic .\n\nWhat does that mean?\n\nTans ."

