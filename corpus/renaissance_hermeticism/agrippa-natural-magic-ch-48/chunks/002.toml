[content]
body = "On this account they that endeavor to procure love are wont to bury for a certain time the instruments of their art, whether they be rings, images, looking-glasses, or any other, or hide them in a stew house, so that they will contract some virtue under Venus, the same as those things that stand in stinking places become stinking, and those in an aromatical place become aromatic and of a sweet savor.\n\nThe four corners of the earth also pertain to this matter.\n\nHence they that are to gather a Saturnine, Martial, or Jovial herb must look towards the East or South, partly because they desire to be oriental from the Sun, and partly because of their principal houses, viz.: Aquarius, Scorpio and Sagittarius are Southern Signs, so also are Capricornus and Pisces.\n\nBut they that will gather a Venereal, Mercury or Lunary herb must look towards the West because they delight to be western, or else they must look towards the North because their principal houses—viz., Taurus, Gemini, Cancer, Virgo—are Northern Signs.\n\nSo in any Solary work we must look not only towards the East and South whilst plucking it, but also towards the Solary body and light."

