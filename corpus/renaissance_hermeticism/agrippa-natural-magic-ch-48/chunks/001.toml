[content]
body = "CHAPTER XLVIII.\n\nOf the Virtue of Places, and What Places Are Suitable to Every Star .\n\nThere be wonderful virtues of places accompanying them, either from things there placed, or by the influences of the Stars, or in any other way.\n\nFor, as Pliny relates of a cuckoo, in what place any one doth first hear him, if his right foot-print be marked about and that place dug up, there will no fleas be bred in that place where it is scattered.\n\nSo they say that the dust of the track of a snake, being gathered up and scattered amongst bees, makes them return to their hives.\n\nSo, also, that the dust in which a mule hath rolled himself, being cast upon the body, doth mitigate the heat of passion; and that the dust wherein a hawk hath rolled herself, if it be bound to the body in a bright red cloth, cures the quartan.\n\nSo doth the stone taken out of the nest of a swallow, as they say, presently relieve those that have the falling sickness, and being bound to the party, continually preserves them, especially if it be rolled in the blood or heart of a swallow.\n\nAnd it is reported that if any one shall cut a vein, being fasting, and shall go over a place where any one lately fell with the fit of a falling sickness, that he shall fall into the same disease.\n\nAnd Pliny reports that to fasten an iron nail in that place where he that fell with a fit of the falling sickness first did pitch his head, will free him from his disease.\n\nSo they say that an herb, growing upon the head of any image, being gathered, and bound up in some part of one's garment with a red thread, shall presently allay the headache; and that any herb gathered out of the brooks or rivers before Sunrising, and no body seeing him that gathers it, shall cure the tertian if it be bound to the left arm, the sick party not knowing what is done.\n\nAmongst places that are appropriated to the Stars, all stinking places, and dark, underground, religious, and mournful places, as church-yards, tombs, and houses not inhabited by men; and old, tottering, obscure, dreadful houses; and solitary dens, caves, and pits; also fish-ponds, standing pools, sewers, and such like, are appropriated to Saturn.\n\nUnto Jupiter are ascribed all privileged places, consistories of noblemen, tribunals, chairs, places for exercise, schools, and all beautiful and clean places, and those sprinkled with divers odors.\n\nTo Mars, fiery and bloody places, furnaces, bakehouses, shambles, places of execution, and places where there have been great battles fought and slaughters made, and the like.\n\nTo the Sun, light places, the serene air, kings’ palaces and princes’ courts, pulpits, theaters, thrones, and all kingly and magnificent places.\n\nTo Venus, pleasant fountains, green meadows, flourishing gardens, garnished beds, stews, and, according to Orpheus, the sea, the seashore, baths, dancing places, and all places belonging to women.\n\nTo Mercury, shops, schools, warehouses, exchanges for merchants, and the like.\n\nTo the Moon, wildernesses, woods, rocks, hills, mountains, forests, fountains, waters, rivers, seas, seashores, ships, highways, groves, granaries for corn, and such like."

