[content]
body = "CHAPTER XXXVII.\n\nHow, By Some Certain Natural and Artificial Preparations, We May Attract Certain Celestial and Vital Gifts .\n\nPlatonists , together with Hermes, say, and Jarchus Brachmanus and the Mecubals of the Hebrews confess, that all sublunary things are subject to generation and corruption, and that also there are the same things in the Celestial World, but after a celestial manner, as also in the Intellectual World, but in a far more perfect and better fashion and manner, and in the most perfect manner of all in the Exemplary.\n\nAnd, after this course, that every inferior thing should, in its kind, answer its superior thing, and through this the Supreme Itself, and receive from heaven that celestial power they call the quintessence, or the Spirit of the World, or the Middle Nature; and from the Intellectual World a spiritual and enlivening virtue, transcending all qualities whatsoever; and, lastly, from the Exemplary, or original, World, through the mediation of the other, according to their degree receive the original power of the whole perfection.\n\nHence, every thing may be aptly reduced from these Inferiors to the Stars, from the Stars to their Intelligences, and from thence to the First Cause itself—from the series and order whereof all Magic and all Occult Philosophy flows: For every day some natural thing is drawn by art, and some divine thing is drawn by Nature, which, the Egyptians, seeing, called Nature a Magicianess ( i.\n\ne.\n\n), the very Magical power itself, in the attracting of like by like, and of suitable things by suitable.\n\nNow, such kind of attraction, by the mutual correspondency of things amongst themselves, of superiors with inferiors, the Grecians called sympathies .\n\nSo the earth agrees with cold water, the water with moist air, the air with fire, the fire with the heaven in water; neither is fire mixed with water, but by air; nor the air with the earth, but by water.\n\nSo neither is the soul united to the body, but by the spirit; nor the understanding to the spirit, but by the soul.\n\nSo we see that when Nature hath framed the body of an infant, by this very preparative she presently fetcheth its spirit from the Universe.\n\nThis spirit is its instrument to obtain of God its understanding and mind in its soul and body, as in wood the dryness is fitted to receive oil, and the oil, being imbibed, is food for the fire, the fire is the vehicle of light.\n\nBy these examples you see how by some certain natural and artificial preparations we are in a capacity to receive certain celestial gifts from above.\n\nFor stones and metals have a correspondency with herbs, herbs with animals, animals with the heavens, the heavens with Intelligences, and they with divine properties and attributes and with God himself, after whose image and likeness all things are created.\n\nNow, the first image of God is the world; of the world, man; of man, beasts; of beasts, the zeophyton or zoophyte ( i.\n\ne.\n\n), half animal and half plant; of the zeophyton, plants; of plants, metals; and of metals, stones.\n\nAnd, again, in things spiritual, the plant agrees with a brute in vegetation, a brute with a man in sense, man with an angel in understanding, and an angel with God in immortality.\n\nDivinity is annexed to the mind, the mind to the intellect, the intellect to the intention, the intention to the imagination, the imagination to the senses, and the senses, at last, to things."

