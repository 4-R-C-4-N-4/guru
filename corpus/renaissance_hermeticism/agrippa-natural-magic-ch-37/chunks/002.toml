[content]
body = "For this is the band and continuity of Nature, that all superior virtue doth flow through every inferior with a long and continued series, dispersing its rays even to the very last things; and inferiors, through their superiors, come to the very Supreme of all.\n\nFor so inferiors are successively joined to their superiors, that there proceeds an influence from their head, the First Cause, as a certain string stretched out to the lowermost things of all; of which string, if one end be touched the whole doth presently shake, and such a touch doth sound to the other end; and at the motion of an inferior the superior also is moved, to which the other doth answer, as strings in a lute well tuned."

