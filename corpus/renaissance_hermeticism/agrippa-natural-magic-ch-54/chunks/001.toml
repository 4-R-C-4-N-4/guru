[content]
body = "CHAPTER LIV.\n\nOf Divers Certain Animals, and Other Things, Which Have a Signification in Auguries .\n\nAll the Auspicia, or auspices, which first happen in the beginning of any enterprise are to be taken notice of.\n\nAs, if in the beginning of thy work thou shalt perceive that rats have gnawn thy garments, desist from thy undertakings.\n\nIf going forth thou shalt stumble at the threshhold, or if in the way thou shalt dash thy foot against any thing, forbear thy journey.\n\nIf any ill omen happen in the beginning of thy business, put off thy undertakings, lest thy intentions be wholly frustrated, or accomplished to no purpose, but expect and wait for a fortunate hour for the dispatching of thy affairs with a better omen.\n\nWe see that many animals are, by a natural power im-bred in them, prophetical.\n\nDoth not the cock by his crowing diligently tell you the hours of the night and morning, and, with his wings spread forth, chase away the lion?\n\nMany birds, with their singing and chattering, and flies, by their sharp pricking, foretell rain; and dolphins, by their often leaping above the water, warn of tempests.\n\nIt would be too long to relate all the passages which the Phrygians, Cilicians, Arabians, Umbrians, Tuscians, and other peoples, which follow the auguries, have learned by birds.\n\nThese they have proved by many experiments and examples.\n\nFor in all things the Oracles of things to come are hid, but those are the chiefest which omenal birds shall foretell.\n\nThese are those which the poets relate were turned from men into birds.\n\nTherefore, what the daw declares, hearken unto and mark, observing her setting as she sits; and her manner of flying, whether on the right hand or left; whether clamorous or silent; whether she goes before or follows after; whether she waits for the approach of him that passeth by, or flies from him, and which way she goes.\n\nAll these things must be diligently observed.\n\nArus Apollo saith in his Hieroglyphics that daws that are twins signify marriage, because this bird brings forth two eggs, out of which male and female must be brought forth; but if, which seldom happens, two males be generated, or two females, the males will not go with any other females, nor females with any other males, but will always live without a mate, and solitary.\n\nTherefore they that meet a single daw, divine thereby that they shall live a single life.\n\nThe same also doth a black hen pigeon betoken, for after the death of her mate, she always lives single.\n\nThou shall, also, as carefully observe crows, which are as significant as daws, yea, and in greater matters.\n\nIt was Epictetus the Stoics’ philosopher's judgment, who was a sage author, that if a crow did croak over against any one, it did betoken some evil, either to his body, fortune, honor, wife, or children.\n\nThen thou shall take heed to swans, who foreknow the secrets of the waters, for their cheerfulness doth presage happy events not only to mariners, but all other travelers, unless they be overcome by the coming over of a stronger bird, as of an eagle, who, by the most potent majesty of her sovereignty, makes null the predictions of all other birds if she speaks to the contrary; for she flies higher than all other birds, and is of more acute sight, and is never excluded from the secrets of Jupiter; she portends advancement and victory, but by blood, because she drinks no water but blood."

