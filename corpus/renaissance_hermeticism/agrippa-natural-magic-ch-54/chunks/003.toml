[content]
body = "The hawk is also a foreteller of contention, as Naso sings: We hate the Hawk, because that arms amongst She always lives— Lelius, the embassador of Pompey, was slain in Spain, amongst the purveyors, which misfortune, a hawk flying over the head, is said to foretell.\n\nAnd Almadel saith that these kinds of birds fighting amongst themselves, signify the change of a kingdom; but if birds of another kind shall fight with them and are never seen to come together again, it portends a new condition and state of that country.\n\nAlso, little birds, by their coming to or departing from, foreshew that a family shall be increased or lessened; and their flight, by how much the more serene it is, by so much the more laudable shall the change be.\n\nWhence did Melampus, the Augure, conjecture at the slaughter of the Greeks by the flight of little birds, when he saith: \"Thou see now that no bird takes his flight in fair weather.\" Swallows, because when they are dying they provide a place of safety for their young, do portend a great patrimony or legacy after the death of friends.\n\nA bat, meeting any one running away, signifies an evasion; for, although she have no wings, yet she flies.\n\nA sparrow is a bad omen to one that runs away, for she flies from the hawk and makes haste to the owl, where she is in as great danger; yet in love she is fortunate, for being stirred up with affection she seeks her consort hourly.\n\nBees are a good omen to kings, for they signify an obsequious people.\n\nFlies signify importunity and impudence because being oftentimes driven away they do continually return.\n\nAlso domestic birds are not without some auguries, for cocks, by their crowing, promote hope, and the journey of him that is undertaking it.\n\nMoreover, Livia, the mother of Tiberius, when she was great with him, took a hen's egg and hatched it in her bosom, and at length came forth a cock chick with a great comb, which the auguries interpreted that the child that should be born of her should be a king.\n\nAnd Cicero writes that at Thebais, cocks, by their crowing all night, did presage that the Bæotians would obtain victory against the Lacedæmonians, and the reason is according to the augury's interpretations because that bird when he is beaten is silent, but when he himself hath overcome, crows.\n\nIn like manner, also, omens of events are taken from beasts.\n\nFor the meeting of a weasel is ominous; also, the meeting of a hare is an ill omen to a traveler, unless she be taken.\n\nA mule also is bad because barren.\n\nA hog is pernicious, for such is his nature, and therefore signifies pernicious men.\n\nA horse betokens quarrelings and fightings, whence Anchises, seeing of white horses, cries out in Virgil: With war are Horses arm’d, yea, threaten war.\n\nBut when they are joined together in a chariot, because they draw with an equal yoke, they signify that peace is to be hoped for.\n\nAn ass is an unprofitable creature, yet did Marius good, who, when he was pronounced an enemy to his country, saw an ass disdaining provender that was offered to him, and running to the water, by which augury he, supposing he saw a way of safety showed to him, entreated the aid of his friends that they would convey him to the sea, which being granted, he was set into a little ship, and so escaped the threats of Silla the conqueror."

