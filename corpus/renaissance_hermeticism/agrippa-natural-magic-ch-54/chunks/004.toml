[content]
body = "If the foal of an ass meet any one going to an augury, he signifies labor, patience and hinderances.\n\nA wolf meeting any one is a good sign, the effect whereof was seen in Hiero of Sicilia, from whom a wolf, snatching away a book whilst he was at school, confirmed to him the success of the kingdom, but yet the wolf makes him speechless whom he sees first.\n\nA wolf rent in pieces a watchman of P.\n\nAfricanus and C.\n\nFulvius at Minturn, when the Roman army was overcome by the fugitives in Sicilia.\n\nHe signifies perfidious men, such as you can give no credit to, which was known in the progeny of Romans.\n\nFor the faith which they long since sucked from their mother, the wolf, and kept to themselves from the beginning, as by a certain law of nature, passed over to their posterity.\n\nTo meet a lion, seeing he is amongst animals the strongest and striking terror into all the rest, is good.\n\nBut for a woman to meet a lioness is bad, because she hinders conception, for a lioness brings forth but once.\n\nTo meet sheep and goats is good.\n\nIt is read in the Ostentarian of the Tuscians, if this animal shall wear any unusual color, it portends to the emperor plenty of all things, together with much happiness.\n\nWhence Virgil to Pollio sings thus: But, in the meadows, Rams shall scarlet bear, And changing, sometimes golden fleeces wear.\n\nIt is good also to meet oxen treading out corn, but better to meet them plowing, which although breaking the way, hinder thy journey, yet by the favor of their Auspicium will recompense thee again.\n\nA dog in a journey is fortunate, because Cyrus, being cast into the woods, was nourished by a dog until he came to the kingdom; which, also, the angel, companion of Tobit, did not scorn as a companion.\n\nThe castor, because he biteth himself sorely, so as to be seen by hunters, is an ill omen and portends that a man will injure himself.\n\nAlso, amongst small animals, mice signify danger, for the same day that they did gnaw gold in the capitol, both the consuls were intercepted by Hannibal by way of ambush, near Tarentum.\n\nThe locust making a stand in any place, or burning the place, hinders one from their wishes and is an ill omen; and on the contrary the grasshopper promotes a journey and foretells a good event of things.\n\nThe spider weaving a line downwards, is said to signify hope of money to come.\n\nAlso the ants, because they know how to provide for themselves, and to prepare safe nests for themselves, portend security and riches, and a great army.\n\nHence, when the ants had devoured a tame dragon of Tiberius Cæsar, it was advised that he should take heed of the tumult of a multitude.\n\nIf a snake meet thee, take heed of an ill-tongued enemy; for this creature hath no power but in his mouth.\n\nA snake creeping into the palace of Tiberius, portended his fall.\n\nTwo snakes were found in the bed of Sempronius Gracchus, wherefore a soothsayer told him, if he would let the male or the female escape, either he or his wife would shortly die; and he, preferring the life of his wife, killed the male and let the female go, and within a few days he died.\n\nSo a viper signifies lewd women and wicked children; and an eel signifies a man displeased with everybody, for she lives apart from all other fishes, nor is ever found in the company of any."

