[content]
body = "An eagle flying over the Locresians, fighting against the Crotoniensians, gave them victory; an eagle setting herself unawares upon the target of Hiero, going forth to the first war, betokened that he should be king.\n\nTwo eagles sitting all day upon the house at the birth of Alexander, of Macedonia, did portend to him an omen of two kingdoms, viz., Asia and Europe.\n\nAn eagle, also, taking off the hat of Lucias Tarquinius Priscus, son to Demarathus the Corinthian (and, by reason of some discord, being come into Hetraria and going to Rome) and then flying high with it, and afterwards putting it upon his head again, did portend to him the kingdom of the Romans.\n\nVultures signify difficulty, hardness, and ravenousness, which was verified in the beginning of the building of cities.\n\nAlso they fortell the places of slaughter, coming seven days beforehand; and because they have most respect to that place where the greatest slaughter shall be, as if they gaped after the greatest number of the slain, therefore the ancient kings were wont to send out spies to take notice what place the vultures had most respect to.\n\nThe phœnix promiseth singular good success, which being seen anew, Rome was built very auspiciously.\n\nThe pelican because she hazards herself for her young, signifies that a man should, out of the zeal of his love, undergo much hardship.\n\nThe painted bird gave the name to the city of Pictavia, and foreshowed the lenity of that people by its color and voice.\n\nThe heron is an augury of hard things.\n\nThe stork also is a bird of concord and makes concord.\n\nCranes gives us notice of the treachery of enemies.\n\nThe bird cacupha betokens gratitude, for she alone doth express love to her dam, being spent with old age.\n\nOn the contrary, the hippopotamus, that kills his dam, doth betoken ingratitude for good turns, also injustice.\n\nThe bird origis is most envious, and betokens envy.\n\nAmongst the smaller birds, the pie is talkative and foretells guests.\n\nThe bird albanellus flying by anyone, it from the left to the right, betokens cheerfulness of entertainment; if contrariwise, betokens the contrary.\n\nThe screech owl is always unlucky, so also is the horn owl, who, because she goes to her young by night, unawares, as death comes unawares, is therefore said to foretell death; yet, sometimes, because she is not blind in the dark of the night, doth betoken diligence and watchfulness, which she made good when she sat upon the spear of Hiero.\n\nAnd Dido, when she saw the unlucky owl, pitied Æneas, whence the poet sang: The Owl, sitting on top of the house alone, Sends forth her sad complaints with mournful tone.\n\nAnd in another place, The slothful Owl by mortals is esteemed A fatal omen— The same bird sang in the capitol when the Roman affairs were low at Numantia and when Fregelia was pulled down for a conspiracy made against the Romans.\n\nAlmadel says that owls and night-ravens, when they turn aside to strange countries, or houses, betoken the death of the men of that country and those houses, for those birds are delighted with dead carcasses and perceive them beforehand.\n\nFor men that are dying have a near affinity with dead carcasses."

