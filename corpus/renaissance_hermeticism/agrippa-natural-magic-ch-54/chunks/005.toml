[content]
body = "But, amongst all Auguries and Omens, there is none more effectual and potent than man himself, and none that doth signify the truth more clearly.\n\nThou shalt, therefore, diligently note and observe the condition of the man that meeteth thee, his age, profession, station, stature, gesture, motion, exercise, complexion, habit, name, words, speech, and all such like things.\n\nFor seeing there are in all other animals so many discoveries of presages, without all question these are more efficacious and clear which are infused into man's soul; which Tully himself testifies, saying, that there is a certain Auspicium naturally in men's souls of their eternity, for the knowing of the courses and causes of things.\n\nIn the foundation of the city of Rome the head of a man was found with his whole face, which did presage the greatness of the empire, and gave the name to the Mountain of the Capitol.\n\nThe Brutian soldiers fighting against Octavius and Antonius, found an Æthiopian in the gate of their castle, and though they slew him as a presage of ill success, yet they were unfortunate in battle, and both their generals, Brutus and Cassius, were slain.\n\nThe meeting of monks is commonly accounted an ill omen, and so much the rather if it be early in the morning, because these kind of men live for the most by the sudden death of men, as vultures do by slaughters."

