[content]
body = "They say, also, that a tyke, if it be pulled out of the left ear of a dog, and if be it is altogether black, hath great virtue in the prognosticating of life, for if the sick party shall answer him that brought it in, and who, standing at his feet, shall ask of him concerning his disease, there is certain hope of life; and that he shall die if he make no answer.\n\nThey say, also, that a stone that is bit with a mad dog hath power to cause discord, if it be put in drink, and that lie shall not be barked at by dogs that puts the tongue of a dog in his shoe under his great toe, especially if the herb of the same name, viz., hound's-tongue, be joined with it.\n\nAnd that a membrane of the secondines of a dog doth the same; and that dogs will shun him that hath a dog's heart.\n\nAnd Pliny reports that there is a red toad that lives in briers and brambles, and is full of sorceries and doth wonderful things, for the little bone which is in his left side, being cast into cold water, makes it presently very hot; by which also the rage of dogs is restrained, and their love is procured if it be put in their drink; and, if it be bound to any one, it stirreth up desire.\n\nOn the contrary, the little bone which is on the right side makes hot water cold, and that it can never be hot again unless that be taken out; also it is said to cure quartans if it be bound to the sick in a snake's skin, as also all other fevers, and to restrain love and desire.\n\nAnd that the spleen and heart is an effectual remedy against the poisons of the said toad.\n\nThus much Pliny writes.\n\nAlso, it is said, that the sword with which a man is slain hath wonderful power in sorceries.\n\nFor if the snaffle of the bridle, or spurs, be made of it, they say that with these any horse, though never so wild, may be tamed and gentled; and that if a horse should be shod with shoes made of it, he would be most swift and fleet, and never, though never so hard rode, tire.\n\nBut yet they will that some certain characters and names should be written upon it.\n\nThey say, also, if any man shall dip a sword, wherewith men were beheaded, in wine, and the sick drink thereof, he shall be cured of his quartan.\n\nThey say, also, that a cup of liquor being made with the brains of a bear, and drank out of the skull, shall make him that drinks it be as fierce and as raging as a bear, and think himself to be changed into a bear, and judge all things he sees to be bears, and so to continue in that madness until the force of that draught shall be dissolved, no other distemper being all this while perceived in him."

