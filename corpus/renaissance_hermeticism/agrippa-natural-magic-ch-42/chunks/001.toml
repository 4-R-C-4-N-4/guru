[content]
body = "CHAPTER XLII.\n\nOf the Wonderful Virtues of Some Kinds of Sorceries .\n\nNow I will shew you what some of the Sorceries are, that by the example of these there may be a way opened for the consideration of the whole subject of them.\n\nOf these, therefore, the first is the catamenia, which, how much power it hath in sorcery, we will now consider; for, as they say, if it comes over new wine it makes it sour, and if it doth but touch the vine, it spoils it forever; and, by its very touch, it makes all plants and trees barren, and they that be newly set to die; it burns up all the herbs in the garden and makes fruit fall off from the trees; it darkens the brightness of a looking-glass, dulls the edges of knives and razors, and dims the beauty of ivory.\n\nIt makes iron presently rusty; it makes brass rust and smell very strong; it makes dogs mad if they do but taste of it, and if they, being thus mad, shall bite any one, that wound is incurable.\n\nIt kills whole hives of bees, and drives them from the hives that are but touched with it.\n\nIt makes linen black that is boiled with it; it makes mares cast their foal if they do but touch it, and makes asses barren as long as they eat of the corn that hath been touched with it.\n\nThe ashes of catamenious clothes, if they be cast upon purple garments that are to be washed, change the color of them, and takes away colors from flowers.\n\nThey say that it drives away tertian and quartan agues if it be put into the wool of a black ram, and tied up in a silver bracelet; as, also, if the soles of the patient's feet be anointed therewith, and especially if it be done by the woman herself, the patient not knowing of it.\n\nMoreover, it cures the fits of the falling sickness; but most especially it cures them that are afraid of water, or drink after they are bitten with a mad dog, if only a catamenious cloth be put under the cup.\n\nBesides, they report, that if catamenious persons shall walk, being nude, about the standing corn, they make all cankers, worms, beetles, flies, and all hurtful things, to fall off from the corn; but they must take heed that they do it before sun-rising, or else they will make the corn to wither.\n\nAlso, they say, they are able to expel hail, tempests, and lightnings, more of which Pliny makes mention of.\n\nKnow this, that they are a greater poison if they happen in the decrease of the Moon, and yet much greater if they happen betwixt the decrease and change of the Moon; but if they happen in the eclipse of the Moon or the Sun, they are an incurable poison.\n\nBut they are of the greatest force of all when they happen in the first early years, even in the years of virginity, for if they do but touch the posts of the house there can no mischief take effect in it.\n\nAlso, they say, that the threads of any garment touched therewith cannot be burnt, and if they be cast into the fire it will spread no further.\n\nAlso, it is said, that the root of peony, being given with castor oil smeared over, using the catamenious cloth, cureth the falling sickness.\n\nMoreover, if the stomach of a hart be burnt or roasted, and to it be put a perfuming made with a catamenious cloth, it will make cross-bows useless for the killing of any game."

