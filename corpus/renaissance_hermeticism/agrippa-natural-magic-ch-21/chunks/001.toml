[content]
body = "CHAPTER XXI.\n\nOf the Virtues of Things Which Are in Them Only in Their Life Time, and Such as Remain in Them Even After Their Death .\n\nMoreover , we must know that there are some properties in things only whilst they live, and some that remain after their death.\n\nSo the little fish echeneis stops the ships, and the basilisk and catablepa kill with their sight when they are alive; but when they are dead do no such thing.\n\nSo they say that in the colic, if a live duck be applied to the abdomen it takes away the pain and herself dies.\n\nLike to this is that which Archytas says: If you take a heart, newly taken out of an animal, and, whilst it is yet warm, hang it upon one that hath a quartan fever, it drives it away.\n\nSo if any one swallow the heart of a lapwing, or a swallow, or a weasel, or a mole, whilst it is yet warm with natural heat it shall be helpful to him for remembering, understanding, and for foretelling.\n\nHence is this general rule, viz.: That whatsoever things are taken out of animals, whether they be any member, the hair, nails, or such like, they must be taken from those animals whilst they be yet living; and, if it be possible, that so they may be alive afterwards.\n\nWhence they say, when you take the tongue of a frog, you must put the frog into the water again; and if you take the tooth of a wolf, you must not kill the wolf; and so of the rest.\n\nSo writes Democritus, if any one take out the tongue of a water-frog, yet living, no other part of the body sticking to it, and she be let go into the water again, and lay it upon the place where the heart beats of a woman, she shall answer truly whatsoever you ask her.\n\nAlso they say, that if the eyes of a frog be before sunrising bound to the sick party, and the frog be let go again, blind, into the water, they will drive away tertian ague; as also that they will, being bound with the flesh of a nightingale in the skin of a hart, keep one always watchful without sleep.\n\nAlso the ray of the fork-fish, being bound to the navel, is said to make a woman have an easy travail, if the ray be taken from the fish alive and it put into the sea again.\n\nSo they say the right eye of a serpent, being applied, doth help the watering of the eyes if the serpent be let go alive.\n\nAnd there is a certain fish or great serpent, called Myrus, whose eye, if it be pulled out, and bound to the forehead of the patient, is said to cure the inflammation of the eyes; and that the eye of the fish grows again; and that he is taken blind who will not let the fish go.\n\nAlso the teeth of all serpents, being taken out whilst they are alive, and hanged about the patient, are said to cure the quartan.\n\nSo doth the tooth of a mole, taken out whilst she is alive, being afterwards let go, cure the toothache; and dogs will not bark at those that have the tail of a weasel that is escaped.\n\nAnd Democritus relates that the tongue of a chameleon, if it be taken from her alive, doth conduce to a good success in trials, and is profitable for women that are in travail, if it be about the outside of the house, for you must take heed that it be not brought into the house, because that would be most dangerous.\n\nMoreover, there be some properties that remain after death, and of these the Platonists say, that they are things in which the Idea of the matter is less swallowed up."

