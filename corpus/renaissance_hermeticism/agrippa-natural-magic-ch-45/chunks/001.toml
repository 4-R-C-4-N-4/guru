[content]
body = "CHAPTER XLV.\n\nOf Collyries, Unctions, Love-Medicines, and Their Virtues .\n\nMoreover , collyries and unguents, conveying the virtues of things natural and celestial to our spirit, can multiply, transmute, transfigure, and transform it accordingly, as also transpose those virtues which are in them into it; that so, it cannot act only upon its own body, but also upon that which is near it, and affect that by visible rays, charms, and by touching it with some like quality.\n\nFor because our spirit is the subtile, pure, lucid, airy, and unctuous vapor of the blood, it is therefore fit to make collyries of the like vapors, which are more suitable to our spirit in substance, for then, by reason of their likeness, they do the more stir up, attract, and transform the spirit.\n\nThe like virtues have certain ointments and other confections.\n\nHence by the touch sometimes sickness, poisonings, and love is induced; some things, as the hands or garments, being anointed.\n\nAlso by kisses, some things being held in the mouth, love is induced; as in Virgil we read that Venus prays Cupid That when glad Dido hugs him in her lap At royal feasts, crown’d with the cheering grape, When she, embracing, shall sweet kisses give, Inspire hid flame, with deadly bane deceive, He would—— Now the sight, because it perceives more purely and clearly than the other senses, and fastening in us the marks of things more acutely and deeply, doth most of all and before others, agree with the phantastic spirit, as is apparent in dreams, when things seen do more often present themselves to us than things heard, or any thing coming under the other senses.\n\nTherefore, when collyries or eye-waters transform visual spirits, that spirit doth easily affect the imagination, which indeed being affected with divers species and forms, transmits the same by the spirit unto the outward sense of sight; by which occasion there is caused in it a perception of such species and forms in that manner, as if it were moved by external objects, that there seem to be seen terrible images and spirits and such like.\n\nSo there are made collyries, making us forthwith to see the images of spirits in the air or elsewhere; as I know how to make of the gall of a man, and the eyes of a black cat, and of some other things.\n\nThe like is made also of the blood of a lapwing, of a bat, and a goat; and, they say, if a smooth, shining piece of steel be smeared over with the juice of mug-wort, and made to fume, it will make invoked spirits to be seen in it.\n\nSo, also, there are some suffumigations, or unctions, which make men speak in their sleep, to walk, and to do those things which are done by men that are awake; and sometimes to do those things which men that are awake cannot or dare not do.\n\nSome there are that make us to hear horrid or delectable sounds, and such like.\n\nAnd this is the cause why maniacal and melancholy men believe they see and hear those things without which their imagination doth only fancy within; hence they fear things not to be feared, and fall into wonderful and most false suspicions, and fly when none pursueth them; are also angry and contend, nobody being present, and fear where no fear is.\n\nSuch like passions also can magical confections induce, by suffumigations, by collyries, by unguents, by potions, by poisons, by lamps and lights, by looking-glasses, by images, enchantments, charms, sounds and music."

