[content]
body = "Also by divers rites, observations, ceremonies, religions and superstitions; all which shall be handled in their places.\n\nAnd not only by these kind of arts are passions, apparitions and images induced, but also things themselves, which are really changed and transfigured into divers forms, as the poet relates of Proteus, Periclimenus, Acheloas, and Merra, the daughter of Erisichthon.\n\nSo, also, Circe changed the companions of Ulysses; and of old, in the sacrifices of Jupiter Lycæus, the men that tasted of the inwards of the sacrifices were turned into wolves which, Pliny saith, befell a certain man called Demarchus.\n\nThe same opinion was Austin of, for, he saith, whilst he was in Italy, he heard of some women that by giving sorceries in cheese to travelers, turned them into working cattle, and when they had done such work as they would have them, turned them into men again; and that this befell a certain priest called Prestantius.\n\nThe Scriptures themselves testify that Pharao's sorceries turned their rods into serpents and water into blood, and did other such like things."

