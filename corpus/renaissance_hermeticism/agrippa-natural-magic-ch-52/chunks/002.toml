[content]
body = "Jupiter signifies a man to be of a pale color, darkish red, a handsome body, good stature, bold, of great eyes (not black altogether) with large pupils, short nostrils not equal, great teeth before, curled hair, of good disposition and manners.\n\nMars makes a man red, with red hair, a round face, yellowish eyes, of a terrible and sharp look, jocund, bold, proud and crafty.\n\nThe Sun makes a man of a tawny color, betwixt yellow and black dashed with red, of a short stature yet of a handsome body, without much hair and curly, of yellow eyes, wise, faithful and desirous of praise.\n\nVenus signifies a man to be tending towards blackness, but more white, with a mixture of red, a handsome body, a fair and round face, fair hair, fair eyes, the blackness whereof is more intense, of good manners and honest love; also kind, patient and jocund.\n\nMercury signifies a man not much white, or black, of a long face, high forehead, fair eyes, not black, to have a straight and long nose, thin beard, long fingers, to be ingenious, a subtile inquisitor, a turncoat, and subject to many fortunes.\n\nThe Moon signifies a man to be in color white, mixed with a little red; of a fair stature, a round face, with some marks in it; eyes not fully black, frowning forehead, and kind, gentle and sociable.\n\nThe Signs, also, and the faces of Signs, have their figures and shapes which, he that would know, must seek them out in books of Astrology.\n\nLastly, upon these figures and gestures, both Physiognomy and Metoposcopy, arts of divination, do depend; also Chiromancy, foretelling future events, not as causes but as signs, through like effects, caused by the same cause.\n\nAnd although these divers kinds of divinations may seem to be done by inferior and weak signs, yet the judgments of them are not to be slighted or condemned when prognostication is made by them, not out of superstition but by reason of the harmonical correspondency of all the parts of the body.\n\nWhosoever, therefore, doth the more exactly imitate the celestial bodies, either in nature, study, action, motion, gesture, countenance, passions of the mind, and opportunity of the season, is so much the more like to the heavenly bodies and can receive larger gifts from them."

