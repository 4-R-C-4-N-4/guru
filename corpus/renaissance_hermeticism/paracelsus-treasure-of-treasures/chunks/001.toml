[content]
body = "The Treasure of Treasures for Alchemists.\n\nBy Philippus Theophrastus Bombast, Paracelsus the Great NATURE begets a mineral in the bowels of the earth.\n\nThere are two kinds of it, which are found in many districts of Europe.\n\nThe best which has been offered to me, which also has been found genuine in experimentation, is externally in the figure of the greater world, and is in the eastern part of the sphere of the Sun.\n\nThe other, in the Southern Star, is now in its first efflorescence.\n\nThe bowels of the earth thrust this forth through its surface.\n\nIt is found red in its first coagulation, and in it lie hid all the flowers and colours of the minerals.\n\nMuch has been written about it by the philosophers, for it is of a cold and moist nature, and agrees with the element of water.\n\nSo far as relates to the knowledge of it and experiment with it, all the philosophers before me, though they have aimed at it with their missiles, have gone very wide of the mark.\n\nThey believed that Mercury and Sulphur were the mother of all metals, never even dreaming of making mention meanwhile of a third; and yet when the water is separated from it by Spagyric Art the truth is plainly revealed, though it was unknown to Galen or to Avicenna.\n\nBut if, for the sake of our excellent physicians, we had to describe only the name, the composition; the dissolution, and coagulation, as in the beginning of the world Nature proceeds with all growing things, a whole year would scarcely suffice me, and, in order to explain these things, not even the skins of numerous cows would be adequate.\n\nNow, I assert that in this mineral are found three principles, which are Mercury, Sulphur, and the Mineral Water which has served to naturally coagulate it.\n\nSpagyric science is able to extract this last from its proper juice when it is not altogether matured, in the middle of the autumn, just like a pear from a tree.\n\nThe tree potentially contains the pear.\n\nIf the Celestial Stars and Nature agree , the tree first of all puts forth shoots in the month of March; then it thrusts out buds, and when these open the flower appears, and so on in due order until in autumn the pear grows ripe.\n\nSo is it with the minerals.\n\nThese are born, in like manner, in the bowels of the earth.\n\nLet the Alchemists who are seeking the Treasure of Treasures carefully note this.\n\nI will shew them the way, its beginning, its middle, and its end.\n\nIn the following treatise I will describe the proper Water, the proper Sulphur, and the proper Balm thereof.\n\nBy means of these three the resolution and composition are coagulated into one.\n\nCONCERNING THE SULPHUR OF CINNABAR.\n\nTake mineral Cinnabar and prepare it in the following manner.\n\nCook it with rain water in a stone vessel for three hours.\n\nThen purify it carefully, and dissolve it in Aqua Regis, which is composed of equal parts of vitriol, nitre, and sal ammoniac.\n\nAnother formula is vitriol, saltpetre, alum, and common salt.\n\nDistil this in an alembic.\n\nPour it on again, and separate carefully the pure from the impure thus.\n\nLet it putrefy for a month in horse-dung; then separate the elements in the following manner.\n\nIf it puts forth its sign1, commence the distillation by means of an alembic with a fire of the first degree.\n\nThe water and the air will ascend; the fire and the earth will remain at the bottom.\n\nAfterwards join them again, and gradually treat with the ashes."

