[content]
body = "This work, the Tincture of the Alchemists, need not be one of nine months; but quickly, and without any delay, you may go on by the Spaygric Art of the Alchemists, and, in the space of forty days, you can fix this alchemical substance, exalt it, putrefy it, ferment it, coagulate it into a stone, and produce the Alchemical Phoenix7.\n\nBut it should be noted well that the Sulphur of Cinnabar becomes the Flying Eagle, whose wings fly away without wind, and carry the body of the phoenix to the nest of the parent, where it is nourished by the element of fire, and the young ones dig out its eyes: from whence there emerges a whiteness, divided in its sphere, into a sphere and life out of its own heart, by the balsam of its inward parts, according to the property of the cabalists.\n\nHERE ENDS THE TREASURE OF THE ALCHEMISTS.\n\nNOTES 1 The Sign is nothing else than the mark left by an operation.\n\nThe house constructed by the architect is the sign of his handicraft whereby his skill and art are determined.\n\nThus the sign is the achievement itself.\n\n- De Colica .\n\n2 The earth also has its Astrum, its course, its order, just as much as the Firmament, but peculiar to the element.\n\nSo also there is an Astrum in the water, even as in the earth, and in like manner with air and fire.\n\nConsequently, the upper Astrum has the Astra of the elements for its medium and operates through them by an irresistible attraction.\n\nThrough this operation of the superior and inferior Astra, all things are fecundated, and led on to their end.\n\n- Explicatio Totius Astronomiae .\n\nWithout the Astra the elements cannot flourish.\n\n...\n\nIn the Astrum of the earth all the celestial operations thrive.\n\nThe Astrum itself is hidden, the bodies are manifest.\n\n...\n\nThe motion of the earth is brought about by the Astrum of the earth.\n\n...\n\nThere are four Astra in man (corresponding to those of the four elements), for he is the lesser world.\n\n- De Caducis , Par.\n\nII.\n\n3 Aurum Potabile , that is, Potable Gold, Oil of Gold, and Quintessence of Gold, are distinguished thus.\n\nAurum Potabile is gold rendered potable by intermixture with other substances, and with liquids.\n\nOil of Gold is an oil extracted from the precious metal without the addition of anything.\n\nThe Quintessence of Gold is the redness of gold extracted therefrom and separated from the body of the metal.\n\n- De Membris Contractis , Tract II., c.\n\n2.\n\n4 If copper be pounded and resolved without a corrosive, you have Vitriol.\n\nFrom this may be prepared the quintessence, oil, and liquor thereof.\n\n- De Morbis Tartareis.\n\nCuprine Vitriol is Vitriol cooked with Copper.\n\n- De Morbis Vermium , Par.\n\n6.\n\nChalcanthum is present in Venus, and Venus can by separation be reduced into Chalcanthum.\n\n- Chirurgia Magna .\n\nPars.\n\nIII., Lib.\n\nIV.\n\n5 There is, indeed, diffused through all things a Balsam created by God, without which putrefaction would immediately supervene.\n\nThus in corpses which are anointed with Balsam we see that corruption is arrested and thus in the physical body we infer that there is a certain natural and congenital Balsam, in the absence of which the living and complete man would not be safe from putrefaction.\n\nNothing removes the Balsam but death."

