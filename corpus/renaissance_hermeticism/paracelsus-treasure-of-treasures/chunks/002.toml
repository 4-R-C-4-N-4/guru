[content]
body = "So the water and the air will again ascend first, and afterwards the element of fire, which expert artists recognise.\n\nThe earth will remain in the bottom of the vessel.\n\nThis collect there.\n\nIt is what many seek after and few find.\n\nThis dead earth in the reverberatory you will prepare according to the rules of Art, and afterwards add fire of the first degree for five days and nights.\n\nWhen these have elapsed you must apply the second degree for the same number of days and nights, and proceed according to Art with the material enclosed.\n\nAt length you will find a volatile salt, like a thin alkali, containing in itself the Astrum of fire and earth2.\n\nMix this with the two elements that have been preserved, the water and the earth.\n\nAgain place it on the ashes for eight days and eight nights, and you will find that which has been neglected by many Artists.\n\nSeparate this according to your experience, and according to the rules of the Spagyric Art, and you will have a white earth, from which its colour has been extracted.\n\nJoin the element of fire and salt to the alkalised earth.\n\nDigest in a pelican to extract the essence.\n\nThen a new earth will be deposited, which put aside.\n\nCONCERNING THE RED LION.\n\nAfterwards take the lion in the pelican which also is found [at] first, when you see its tincture, that is to say, the element of fire which stands above the water, the air, and the earth.\n\nSeparate it from its deposit by trituration.\n\nThus you will have the true aurum potabile3.\n\nSweeten this with the alcohol of wine poured over it, and then distil in an alembic until you perceive no acidity to remain in the Aqua Regia.\n\nThis Oil of the Sun, enclosed in a retort hermetically sealed, you must place for elevation that it may be exalted and doubled in its degree.\n\nThen put the vessel, still closely shut, in a cool place.\n\nThus it will not be dissolved, but coagulated.\n\nPlace it again for elevation and coagulation, and repeat this three times.\n\nThus will be produced the Tincture of the Sun, perfect in its degree.\n\nKeep this in its own place.\n\nCONCERNING THE GREEN LION.\n\nTake the vitriol of Venus4, carefully prepared according to the rules of Spagyric Art; and add thereto the elements of water and air which you have reserved.\n\nResolve, and set to putrefy for a month according to instructions.\n\nWhen the putrefaction is finished, you will behold the sign of the elements.\n\nSeparate, and you will soon see two colours, namely, white and red.\n\nThe red is above the white.\n\nThe red tincture of the vitriol is so powerful that it reddens all white bodies, and whitens all red ones, which is wonderful.\n\nWork upon this tincture by means of a retort, and you will perceive a blackness issue forth.\n\nTreat it again by means of the retort, repeating the operation until it comes out whitish.\n\nGo on, and do not despair of the work.\n\nRectify until you find the true, clear Green Lion, which you will recognise by its great weight.\n\nYou will see that it is heavy and large.\n\nThis is the Tincture, transparent gold.\n\nYou will see marvellous signs of this Green Lion, such as could be bought by no treasures of the Roman Leo.\n\nHappy he who has learnt how to find it and use it for a tincture!\n\nThis is the true and genuine Balsam5, the Balsam of the Heavenly Stars, suffering no bodies to decay, nor allowing leprosy, gout, or dropsy to take root.\n\nIt is given in a dose of one grain, if it has been fermented with Sulphur of Gold."

