[content]
body = "Ah, Charles the German, where is your treasure?\n\nWhere are your philosophers?\n\nWhere your doctors?\n\nWhere are your decocters of woods, who at least purge and relax?\n\nIs your heaven reversed?\n\nHave your stars wandered out of their course, and are they straying in another orbit, away from the line of limitation, since your eyes are smitten with blindness, as by a carbuncle, and other things making a show of ornament, beauty, and pomp?\n\nIf your artists only knew that their prince Galen - they call none like him - was sticking in hell, from whence he has sent letters to me, they would make the sign of the cross upon themselves with a fox's tail.\n\nIn the same way your Avicenna sits in the vestibule of the infernal portal; and I have disputed with him about his aurum potabile, his Tincture of the Philosophers, his Quintessence, and Philosophers' Stone, his Mithridatic, his Theriac, and all the rest.\n\nO, you hypocrites, who despise the truths taught you by a true physician, who is himself instructed by Nature, and is a son of God himself!\n\nCome, then, and listen, impostors who prevail only by the authority of your high positions!\n\nAfter my death, my disciples will burst forth and drag you to the light, and shall expose your dirty drugs, wherewith up to this time you have compassed the death of princes, and the most invincible magnates of the Christian world.\n\nWoe for your necks in the day of judgment!\n\nI know that the monarchy will be mine.\n\nMine, too, will be the honour and glory.\n\nNot that I praise myself: Nature praises me.\n\nOf her I am born; her I follow.\n\nShe knows me, and I know her.\n\nThe light which is in her I have beheld in her; outside, too, I have proved the same in the figure of the microcosm, and found it in that universe.\n\nBut I must proceed with my design in order to satisfy my disciples to the full extent of their wish.\n\nI willingly do this for them, if only skilled in the light of Nature and thoroughly practised in astral matters, they finally become adepts in philosophy, which enables them to know the nature of every kind of water.\n\nTake, then, of this liquid of the minerals which I have described, four parts by weight; of the Earth of red Sol two parts; of Sulphur of Sol one part.\n\nPut these together into a pelican, congelate, and dissolve them three times.\n\nThus you will have the Tincture of the Alchemists.\n\nWe have not here described its weight: but this is given in the book on Transmutations6.\n\nSo, now, he who has one to a thousand ounces of the Astrum Solis shall also tinge his own body of Sol.\n\nIf you have the Astrum of Mercury, in the same manner, you will tinge the whole body of common Mercury.\n\nIf you have the Astrum of Venus you will, in like manner, tinge the whole body of Venus, and change it into the best metal.\n\nThese facts have all been proved.\n\nThe same must also be understood as to the Astra of the other planets, as Saturn, Jupiter, Mars, Luna, and the rest.\n\nFor tinctures are also prepared from these: concerning which we now make no mention in this place, because we have already dwelt at sufficient length upon them in the book on the Nature of Things and in the Archidoxies.\n\nSo, too, the first entity of metals and terrestrial minerals have been made, sufficiently clear for Alchemists to enable them to get the Alchemists' Tincture."

