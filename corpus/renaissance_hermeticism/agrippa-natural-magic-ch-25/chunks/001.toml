[content]
body = "CHAPTER XXV. What Things Are Saturnine, or Under the Power of Saturn . Saturnine things, amongst Elements, are earth and also water; amongst humors, black choler that is moist, as well natural as adventitious (adust choler excepted). Amongst tastes, sour, tart, and dead-like. Amongst metals, lead, and gold, by reason of its weight, and the golden marcasite. Amongst stones, the onyx, the ziazza, the camonious, the sapphire, the brown jasper, the chalcedon, the loadstone, and all dark, weighty, earthy things. Amongst plants and trees, the daffodil, dragon's-wort, rue, cummin, hellebore, the tree from whence benzoin comes, mandrake, opium, and those things which are never sown, and never bear fruit, and those which bring forth berries of a dark color and black fruit, as the black fig-tree, the pine-tree, the cypress-tree, and a certain tree used at burials, which never springs afresh with berries, rough, of a bitter taste, of a strong smell, of a black shadow, yielding a most sharp pitch, bearing a most unprofitable fruit, never dies with age, deadly, and dedicated to Pluto. As is the herb pas-flower, with which they were wont, anciently, to strow the graves before they put the dead bodies into them; wherefore it was lawful to make their garlands at feasts with all herbs and flowers besides pas-flowers, because it was mournful and not conducing to mirth. Also all creeping animals, living apart, and solitary, nightly, sad, contemplative, dull, covetous, fearful, melancholy, that take much pains, slow, that feed grossly, and such as eat their young. Of these kinds, therefore, are the mole, the wolf, the ass, the toad, the cat, the hog, the bear, the camel, the basilisk, the hare, the ape, the dragon, the mule, all serpents and creeping things, scorpions, ants, and such things as proceed from putrefaction in the earth, in water, or in the ruins of houses, as mice and many sorts of vermin. 'Amongst birds, those are Saturnine which have long necks and harsh voices, as cranes, ostriches, and peacocks, which are dedicated to Saturn and Juno. Also the screech-owl, the horned-owl, the bat, the lapwing, the crow, the quail, which is the most envious bird of all. Amongst fishes, the eel, living apart from all other fish; the lamprey, the dog-fish, which devours her young; also the tortoise, oysters, cockles, to which may be added sea-sponges and all such things as come of them."

