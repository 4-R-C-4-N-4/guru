[content]
body = "Many, being much moved with these words, went to see, and so it was, as Apollonius said, at which they much wondered.\n\nPhorphyrius, the Platonist, in his third book of sacrifices, saith that there is certainly a swallow language, because every voice of every animal is significative of some passion of its soul, as joy, sadness, or anger, or the like, which voices, it is not so wonderful a thing, could be understood by men conversant about them.\n\nBut Democritus himself declared this art, as saith Pliny, by naming the birds, of whose blood mixed together was produced a serpent, of which whosoever did eat should understand the voices of birds.\n\nAnd [paragraph continues] Hermes saith that if any one shall go forth to catch birds on a certain day of the Kalends of November, and shall boil the first bird that he catcheth with the heart of a fox, that all that shall eat of this bird shall understand the voices of birds and all other animals.\n\nAlso, the Arabians say that they can understand the meaning of brutes who shall eat the heart and liver of a dragon.\n\nProclus, also, the Platonist, believed and wrote that the heart of a mole conduceth to presages.\n\nThere were also divinations and auspices which were taken from the inwards of sacrifices, the inventor whereof was Tages, of whom Lucan sang: And if the Inwards have no credit gained, And if this Art by Tages was but feigned.\n\nThe Roman religion thought that the liver was the head of the inwards.\n\nHence the soothsayers enquiring after future things in the inwards, did first look into the liver, in which were two heads, whereof the one was called the head for the city, the other for the enemy; and the heads of this, or another part, being compared together, they then gave judgment and pronounced for victory; as we read, in Lucan, that the inwards did signify the slaughter of Pompey's men and the victory of Cæsar's, according to these verses: In the inwards all defects are ominous One part and branch of the entrails doth increase, Another part is weak, and flagging lies, Beats, and moves with quick pulse the arteries.\n\nThen, the bowels being finished, they search the heart.\n\nNow, if there were a sacrifice found without a heart, or a head was wanting in the liver, these were deadly presages, and were called piacularia.\n\nAlso, if a sacrifice fled from the altar, or, being smitten, made a lowing, or fell upon any part of his body than he ought to do, it was the like ominous.\n\nWe read that when Julius Cæsar on a day went forth to procession with his purple robe, and sitting in a golden chair and sacrificing, there was twice a heart wanting.\n\nWhen C.\n\nMarius Utica was sacrificing, there was wanting a liver.\n\nAlso when Caius, the prince, and M.\n\nMarcellus, C.\n\nClaudius and L.\n\nPetellius Coss, were offering sacrifices, that the liver was consumed suddenly away and, not long after, one of them died of a disease, another was slain by men of Lyguria, the entrails foretelling so much; which was thought to be done by the power of the Gods, or help of the devil."

