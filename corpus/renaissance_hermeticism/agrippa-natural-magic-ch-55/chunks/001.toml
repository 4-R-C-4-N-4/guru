[content]
body = "CHAPTER LV.\n\nHow Auspicias Are Verified by the Light of Natural Instinct, and of Some Rules of Finding It Out .\n\nAUSPICIA and Auguria, which foretell things to come by animals and birds, Orpheus, the divine, himself, as we read, did teach and show first of all, which afterwards were had in great esteem with all nations.\n\nNow they are verified by the light of natural instinct, as if from this some lights of divination may descend upon four-footed beasts, those winged, and other creatures, by which they are able to presage to us of the events of things; which Virgil seems to be sensible of when he sings: Nor think I Heaven on them such knowledge states, Nor that their prudence is above the Fates.\n\nNow, this Instinct of Nature, as saith William of Paris, is more sublime than all human apprehension, and very near, and most like to prophecy.\n\nBy this instinct there is a certain wonderful light of divination in some animals naturally, as is manifested in some dogs, who know thieves by this instinct and men that are hid, unknown both to themselves and men, and find them out and apprehend them, falling upon them with a full mouth.\n\nBy the like instinct vultures foresee future slaughters in battles, and gather together into places where they shall be, as if they foresaw the flesh of dead carcasses.\n\nBy the same instinct partridges know their dam, whom they never saw, and leave the partridge which stole away her dam's eggs and sate upon them.\n\nBy the same instinct, also, certain hurtful and terrible things are perceived, the soul being ignorant of them, whence terror and horror ceaseth when men think nothing of these things.\n\nSo a thief, lying hid in a house, al- though no one knows or thinks of his being there, strikes fear and terror and a troublesomeness of mind into the inhabitants of that house, although, haply, not of all, because the brightness of this instinct is not common to all men, yet possessed of some of them.\n\nSo an evil person, being hid in some large building, is sometimes perceived to be there by some one that is altogether ignorant of their being there.\n\nIt is mentioned in history that Heraiscus, a certain Egyptian, a man of a divine nature, could discern evil persons, not only by his eyes but also by their voice, he hearing them afar off, and thereupon did fall into a most grievous headache.\n\nWilliam of Paris also makes mention of a certain woman in his time that, by the same instinct, perceived a man whom she loved coming two miles off.\n\nHe relates, also, that in his time a certain stork was convicted of unchastity by the smell of the male, who, being judged guilty by a multitude of storks whom the male gathered together, discovering to them the fault of his mate, was, her feathers being pulled off, torn in pieces by them.\n\nThe same doth Varro, Aristotle and Pliny relate concerning horses.\n\nAnd Pliny makes mention of a certain serpent, called the asp, that did such a like thing, for she, coming to a certain man's table in Egypt, was there daily fed, and she, having brought forth some young, by one of which a son of her host was killed, after she knew of it, killed that young one, and would never return to that house any more.\n\nNow, by these examples, you see how the lights of presage may descend upon some animals, as signs, or marks of things, and are set in their gesture, motion, voice, flying, going, meat, color, and such like."

