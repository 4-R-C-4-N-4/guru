text_name = "Agrippa: The Philosophy of Natural Magic, Chapter LXIV — How the Passions of the Mind Change the Body by Way of Imitation From Some Resemblance; of the Transforming and Translating of Men, and What Force the Imaginative Power Hath, Not Only Over the Body But the Soul"
section = "Chapter LXIV, Section 1b"
translator = "Henry Morley; L. W. de Laurence ed."
