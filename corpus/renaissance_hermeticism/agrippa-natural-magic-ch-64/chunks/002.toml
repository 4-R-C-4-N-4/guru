[content]
body = "We read many other examples by which the power of the soul upon .the body is wonderfully explained, as like that which Avicen describes of a certain man, who, when he pleased, could affect his body with the palsy.\n\nThey report of Gallus Vibius that he did fall into madness, not casually, but on purpose, for, whilst he did imitate madmen, he assimilated their madness to himself and became mad indeed.\n\nAnd Austin makes mention of some men who could move their ears at their pleasure, and some that could move the crown of their head to their forehead and could draw it back again when they pleased, and of another that could sweat at his pleasure.\n\nAnd it is well known that some can weep -at their pleasure, and pour forth abundance of tears; and there are some that can bring up what they have swallowed, when they please, as out of a bag, by degrees.\n\nAnd we see that in these days there are many who can so imitate and express the voices of birds, cattle, dogs, and some men, that they can scarce at all be discerned.\n\nAlso Pliny relates, by divers examples, that women have been turned into men.\n\nPontanus testifieth that in his time, a certain woman called Caietava, and another one called Aemilia, who, many years after they were married, were changed into men.\n\nNow, how much imagination can affect the soul no man is ignorant, for it is nearer to the substance of the soul than the sense is, and therefore acts more upon the soul than the sense doth.\n\nSo women, by certain strong imaginations, dreams, and suggestions, brought in by certain magical arts, do often bind themselves into a strong affection for any one.\n\nSo they say that Medea, by a dream, was filled with love for Jason.\n\nSo the soul sometimes is, by a vehement imagination or speculation, altogether abstracted from the body, as Celsus relates of a certain presbyter, who, as often as he pleased, could make himself senseless and lay like a dead man, so that when any one pricked or burnt him he felt no pain, but lay without any motion or breathing; yet he could, as he said, hear men's voices, as it were, afar off, if they cried out aloud."

