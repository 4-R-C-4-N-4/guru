[content]
body = "CHAPTER LXIV.\n\nHow the Passions of the Mind Change the Body by Way of Imitation From Some Resemblance; of the Transforming and Translating of Men, and What Force the Imaginative Power Hath, Not Only Over the Body But the Soul .\n\nThe foresaid passions sometimes alter the body by reason of the virtue which the likeness of the thing hath to change it, which power the vehement imagination moves, as in setting the teeth on edge at the sight or hearing of something, or because we see, or imagine, another to eat sharp or sour things.\n\nSo he, which sees another gape, gapes also; and some, when they hear any one name sour things, their tongues waxeth tart.\n\nAlso, the seeing of any filthy thing causeth nauseousness.\n\nMany, at the sight of a man's blood, fall into a swoon.\n\nSome, when they see bitter meat given to any, perceive a bitter spittle in their mouth.\n\nAnd William of Paris saith that he saw a man, that at the sight of a medicine, was affected as much as he pleased; when, as neither the substance of the medicine, nor the odor, nor the taste of it came to him, but only a kind of resemblance was apprehended by him.\n\nUpon this account, some that are in a dream think they burn and are in a fire, and are fearfully tormented, as if they did truly burn, when, as the substance of the fire is not near them, but only a resemblance apprehended by their imagination.\n\nAnd sometimes men's bodies are transformed, and transfigured, and also transported; and this oft times when they are in a dream, and sometimes when they are awake.\n\nSo Cyprus, after he was chosen king of Italy, did very much wonder at and meditate upon the fight and victory of bulls, and in the thought thereof did sleep a whole night, and in the morning he was found horned, no otherwise than by the vegetative power, being stirred up by a vehement imagination, elevating cornific humors into his head and producing horns.\n\nFor a vehement cogitation, whilst it vehemently moves the species, pictures out the figure of the thing thought on, which they represent in their blood, and the blood impresseth the figure on the members that are nourished by it; as upon those of the same body, so upon those of anothers.\n\nSo the imagination of a woman with child impresseth the mark of the thing longed for upon her infant, and the imagination of a man, bit with a mad dog, impresseth upon his body the image of dogs.\n\nSo men may grow gray on a sudden.\n\nAnd some, by the dream of one night, have grown up from boys into perfect men.\n\nHereto, also, may be referred those many scars of King Dagobertus, and marks of Franciscus, which they received—the one, whilst he was afraid of correction, and the other, whilst he did wonderfully meditate upon the wounds of Christ.\n\nSo, many are transported from place to place, passing over rivers, fires and unpassable places, viz., when the species of any vehement desire, or fear, or boldness, are impresed upon their spirits, and, being mixed with vapors, do move the organ of the touch in their original, together with phantasy, which is the original of local motion.\n\nWhence they stir up the members and organs of motion to motion, and are moved, without any mistake, unto the imagined place, not out of sight, but from the interior phantasy.\n\nSo great a power is there of the soul upon the body, that whichever way the soul imagines and dreams that it goes, thither doth it lead the body."

