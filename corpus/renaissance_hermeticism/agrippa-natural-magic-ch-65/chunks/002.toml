[content]
body = "For as the smell of musk doth penetrate, so something of either bad or good is derived from anything bad or good by those that are nigh to them; which may continue a long time.\n\nNow, if the foresaid passions have so great a power in the phantasy, they have certainly a greater power in the reason, in as much as the reason is more excellent than the phantasy; and, lastly, they have much greater power in the mind; for this, when it is fixed upon God for any good with its whole intention, doth oftentimes affect another's body, as well as its own, with some divine gift.\n\nBy this means we read that many miracles were done by Apollonius, Pythagoras, Empedocles, Philolaus, and many prophets and holy men of our religion, which things we shall now consider."

