[content]
body = "\"The sun is equal to thy chiefest nymph, By virtue of the everlasting laws, And pauses alternating, Amongst my stars she's equal to the sun.\" [AJ] Plato says that [Greek: Theos] is derived from the verb [Greek: Theein], to move, to run, as the first astronomers who observed the motions of the heavenly bodies called the planets [Greek: Theoi], the gods.—(\"The Secret Doctrine,\" foot note, p.\n\n2, vol.\n\n1.) I believe that I have recalled it entirely.\n\nGiu.\n\nYou can see that no sentence is wanting to [Pg 125] the perfecting of the proposition, nor rhyme to the completion of the stanzas.\n\nNow if I by the grace of heaven have received beauty, a greater favour I consider is mine, in that whatever beauty I may have had it has been in a certain way instrumental in causing that Divine and only one to be found.\n\nI thank the gods, because in that time, when I was so tender (verde), that the amorous flames could not be lighted in my breast, by reason of my intractability, such simple and innocent cruelty was used in order to yield more graces to my lovers than otherwise it would have been possible for them to obtain, through any kindness of mine however great.\n\nLao.\n\nAs to the souls of those lovers, I assure you that as they are not ungrateful to the sorceress Circe for their blindness, grievous thoughts, and bitter trials, by means of which they have reached so great a good, so they can be no less grateful to thee.[AK] Giu.\n\nSo I desire and hope.\n\n[AK] For I reckon that the sufferings of this present time are not worthy to be compared with the glory which shall be revealed in us.—(St.\n\nPaul to the Romans.) Transcriber's Notes: Page 15: The last paragraph had only one double quote.\n\nI added the closing quote, but am not certain about it.\n\nThe line begins: [\"If the love of glory is dear to thy breast,].\n\nUnchanged.\n\nPage 78: LIC is suspected of being a typo for LIB.\n\nNo other occurences.\n\nUnchanged.\n\nPage 79: LAS is suspected to be a typo for LAO, as this name occurs only once.\n\nUnchanged.\n\nPage 109: The term selfsame occurs only once without a hyphen.\n\nUnchanged.\n\nEnd of the Project Gutenberg EBook of The Heroic Enthusiast, Part II (Gli Eroici Furori), by Giordano Bruno"

