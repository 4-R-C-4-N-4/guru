[content]
body = "Solomon calls it furtive waters.\n\nSamuel named it the whisper of a gentle wind.\n\nThe which three significations show with what sweetness, gentleness, and astuteness, in seas, on earth, in sky, does this fellow come and tyrannize over the whole universe.\n\nCes.\n\nThere is no vaster empire, no worse tyranny, no better dominion, no more necessary magistracy, nothing more sweet and dear, no food to be found more hard and bitter, no deity more violent, no god more pleasing, no agent more treacherous and false, no author more regal and faithful, and, in fine, it seems to me that Love is all and does all, of him all may be said, and all may refer itself to him.\n\nMar.\n\nYou say well.\n\nLove then, as he who works [Pg 44] chiefly through the sight, which is the most spiritual of all the senses, and which reaches swiftly the known ends of the earth, and without stretch of time takes in the whole horizon of the visible, comes to be quick, furtive, sudden and instantaneous.\n\nBesides which, we must remember what the ancients say, that Love precedes all the other gods, and therefore it is no use to imagine that Saturn shows him the way except by following him.\n\nNow must we find out, whether Love appears and makes himself known externally, whether his home is the soul itself, his bed the heart itself, and whether he consists of the same composition as our own substance, the same impulse as our own powers.\n\nFinally everything naturally desires the beautiful and the good, and therefore it is useless to argue and discuss, because the affection informs and confirms itself, and in one instant desire joins itself to the desirable, as the sight to the visible.\n\nXI.\n\nCes.\n\nLet us see here, what is the meaning of that burning arrow, around which is the legend: Cui nova plaga loco?\n\nExplain what part does this seek to wound?\n\nMar.\n\nRead the sonnet which says: [Pg 45] — 51.\n\nThat all the ears of corn that may be reaped In burning Apuleia, or sunbrowned Lybia, With all that they unto the winds entrust, Or that the rays from the great planet sent, Should number those sad pains of my glad soul, Which she from those two burning stars receives With mournful joy in sweetest agony, Forbid me Sense and Reason to believe.\n\nWhat would'st thou more, sweet foe?\n\nWhat wish is that which moves thee still to hurt, Since this my heart of but one wound is made?\n\nSo that there lies no part that now may be By thee or others printed, stabbed, or pierced, Turn thee aside, turn otherwhere thy bow, For thou dost waste thy powers, oh beauteous god!\n\nIn slaying him who lies already dead.\n\nThe meaning of all this is metaphorical, like the rest, and may be understood in the same sense as that.\n\nHere the number of darts which have wounded and do wound the heart, signify the innumerable individuals and species of things, in which shine the splendour of Divine Beauty, according to their degrees, and whence the affection for the good, well proposed and well apprehended warms us.\n\nThe which through the causes of potentiality and actuality, of possibility and of effect, crucify and console, give the sense of sweetness and also make the bitter to be felt."

