[content]
body = "But Providence wills that these, instead of rising to the sky, should go together to the shades of Orcus, so that naught is the glory of him who extols and of him [Pg 15] who is extolled; for the one has woven a statue of straw, or carved the trunk of a tree, or cast a piece of chalk, and the other, the idol of shame and infamy, knows not that there is no need to wait for the keen tooth of the age and the scythe of Saturn in order to be put down, for through those self-same praises he gets buried alive then and there, while he is being praised, saluted, hailed, and presented.\n\nJust as it happened in a contrary way, so that much-praised Mœcenatus, who, if he had had no other glory than a soul inclined to protect and favour the Muses, for this alone merited, that the genius of so many illustrious poets should do him homage, and place him in the number of the most famous heroes who have trod this earth.\n\nHis own studies and his own brightness made him prominent and grand, and not the being born of a royal race, and not the being grand secretary and councillor of Augustus.\n\nThat, I say, which made him illustrious was the having made himself worthy to fulfil the promise of that poet who says:— Fortunati ambo, si quid mea carmina possunt, Nulla dies nunquam memori vos eximet aevo, Dum domus Aeneae Capitoli immobile saxum Accolet, imperiumque pater romanus habebit.\n\nMar.\n\nI remember what Seneca says in certain [Pg 16] letters where he refers to the words of Epicurus to a friend, which are these: \"If the love of glory is dear to thy breast, these letters of mine will make thee more famous and known than all those other things which thou honourest, by which thou art honoured, and of which thou mayest boast.\" The same might Homer have said if Achilles or Ulysses had presented themselves before him, or Eneas and his offspring before Virgil; as that moral philosopher well said; Domenea is more known through the letters of Epicurus, than all the magicians, satraps and royalties upon whom depended his title of Domenea and the memory of whom was lost in the depths of oblivion.\n\nAtticus does not survive because he was the son-in-law of Agrippa and ancestor of Tiberius, but through the epistles of Tully; Drusus, the ancestor of Cæsar, would not be found amongst the number of great names if Cicero had not inserted it.\n\nMany, many years may pass over our heads, and in all that time not many geniuses will keep their heads raised.\n\nNow to return to the question of this enthusiast, who, seeing a phœnix set on fire by the sun, calls to mind his own cares, and laments that like the phœnix he sends, in exchange for the light and heat received, a sluggish smoke from the holocaust of [Pg 17] his melted substance."

