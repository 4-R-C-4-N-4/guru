[content]
body = "As he who looks aloft sometimes is overcome by the majesty.[AG] Besides, when he comes to penetrate the Divine species, he passes it like a ray.\n\nWhence say the theologians that the Divine word is more penetrating than sharp point of sword or knife.\n\nHence is derived the form and impression of His own footstep, upon which nothing else can be imprinted and sealed.\n\nTherefore, that form being there confirmed and the new strange one not being able to take its place unless the other yields, consequently he can say, that he has no power of taking any other, if there is one who replaces it or scatters it through the necessary want of proportion.\n\nThe ninth reason is exemplified, by the ninth who is blind through want of confidence, through dejection of spirit, the which is caused and brought about also by a great love which He fears to offend by His temerity.\n\nWhence says the Psalm: \"Averte oculos tuos a me, quia ipsi me avolare fecere.\" And so he suppresses his eyes so as not to see that which most of all he desires, as he keeps his tongue from talking with whom he most wishes to speak, from fear that a defective look or word should humiliate him or bring him in some way into misfortune.\n\nAnd this generally proceeds from the apprehension of the excellence of the object above its potential faculty: whence the most profound and divine theologians say, that God is more honoured and loved by silence than by words; as one sees more by shutting the eyes to the species represented, than by opening them, therefore the negative theology of Pythagoras and Dionysius is more celebrated than the demonstrative theology of Aristotle and the scholastic doctors.\n\n[AG] ...\n\nGaze, as thy lips have said, On God Eternal, Very God!\n\nSee me, see what thou prayest!\n\nO Eyes of God!\n\nO Head!\n\nMy strength of soul is fled.\n\nGone is heart's force, rebuked is mind's desire!\n\nWhen I behold Thee so, With awful brows a-glow, With burning glance, and lips lighted by fire, Fierce as those flames which shall Consume, at close of all, Earth, Heaven!\n\nGod is it I did see, This unknown marvel of Thy Form!\n\nbut fear Mingles with joy!\n\nRetake, Dear Lord!\n\nfor pity's sake, Thine earthly shape, which earthly eyes may bear!\n\n—(\"The Song Celestial.\") (Sir Edwin Arnold's translation.) Min.\n\nLet us go; and we will reason by the way.\n\nSev.\n\nAs you please."

