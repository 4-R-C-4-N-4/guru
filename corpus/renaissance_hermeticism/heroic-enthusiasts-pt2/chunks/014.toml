[content]
body = "Thus everything has an impetus towards its beginning retrogressively, and progressively towards its end and perfection, as Empedocles well said, and from which sentence I think may be inferred that which the Nolan said in this octave: The sun must turn and reach his starting-point, Each wandering light must go towards its source, That which is earth to earth itself reverts, The rivers from the sea to sea return, And thither, whence desires have life and grow Must they aspire as to revered divinity, So every thought born of my lady fair Comes back perforce to her, my goddess dear.\n\nThe intellectual power is never at rest, it is never satisfied with any comprehended truth, but ever proceeds on and on towards that truth which is not comprehended.\n\nSo also the will which follows the apprehension, we see that it is never satisfied with anything finite.\n\nIn consequence of this, the essence of the soul is always referred to the source of its substance and entity.\n\nThen as to the natural powers, by means of which it is turned to the [Pg 33] protection and government of matter, to which it allies itself, and by appulsion benefits and communicates of its perfection to inferior things, through the likeness which it has to the Divine, which in its benignity communicates itself or produces infinitely, i.e.\n\nimparts existence to the universal infinite and to the innumerable worlds in it, or, finitely, produces this universe alone, subject to our eyes and our common reason.\n\nThus then in the one sole essence of the soul are found these two kinds of powers, and as they are used for one's own good and for the good of others, it follows that they are depicted with a pair of wings, by means of which it is potent towards the object of the primal and immaterial potencies, and with a heavy stone, through which it is active and efficacious towards the objects of the secondary and material potencies.\n\nWhence it follows that the entire affection of the enthusiast is bifold, divided, harassed, and placed in a position to incline itself more easily downwards than to force itself upwards: seeing that the soul finds itself in a low and hostile country, and reaches the far-off region of its more natural home where its powers are the weakest.\n\nCes.\n\nDo you think that this difficulty can be overcome?\n\n[Pg 34] Mar.\n\nPerfectly well; but the beginning is most difficult, and according as we make more and more fruitful progress in contemplation we arrive at a greater and greater facility.\n\nAs happens to whoever flys up high, the more he rises above the earth the more air he has beneath to uphold him, and consequently the less he is affected by gravitation; he may even rise so high that he cannot, without the labour of cleaving the air, return downwards, although one might imagine it were more easy to cleave the air downwards towards the earth than to rise on high towards the stars.\n\nCes.\n\nSo that with progress of this kind a greater and greater facility is acquired for mounting on high?\n\nMar.\n\nSo it is; therefore well said Tansillo:— \"The more I feel the air beneath my feet So much the more towards the wind I bend My swiftest pinions And spurn the world and up towards Heaven I go.\" As every part of bodies and of their elements, the nearer they come to their natural place, the greater the impetus and force with which they move, until at last, whether they will or not, they must prevail.\n\nThat which we see then in the parts of bodies and in the bodies themselves we ought also to allow of [Pg 35] intellectual things towards their proper objects, as their proper places, countries, and ends.\n\nWhence you may easily comprehend the entire significance of the figure, the legend, and the verses.\n\nCes."

