[content]
body = "By her finally, they were treated in such a manner that, blind and homeless, with great labour having ploughed the seas, passed over rivers, overcome mountains, traversed plains for the space of ten years, and at the end of which time having arrived under that temperate sky of the British Isles, and come into the presence of the lovely, graceful nymphs of Father Thames, they (the nine), having made humble obeisance, and the nymphs having received them with acts of purest [Pg 116] courtesy, one, the principal amongst them, who later on will be named, with tragic and lamenting accents laid bare the common cause in this manner: Of those, oh gentle Dames, who with closed urn, Present themselves, whose hearts are pierced Not for a fault by nature caused, But through a cruel fate, That in a living death, Does hold them fast, we each and all are blind.\n\nNine spirits are we, wandering many years, Longing to know; and many lands O'ertravelled, one day were surprised By a sore accident, To which if you attend, You'll say, oh worthy, oh unhappy lovers!\n\nAn impious Circe, who presumes to boast Of having for her sire this glorious sun, Welcomed us after many wanderings: Opened a certain urn, With water sprinkled us, And to the sprinkling added an enchantment.\n\nWaiting the finish of this work of hers We all were quiet, mute, attent, Until she said, \"Oh ye unhappy ones, Blind be ye all, Gather that fruit Those get who fix their thoughts on things above.\" Daughter and Mother of horror and darkness and woe They cried, who sudden were struck blind, [Pg 117] It pleased you then, so proud and harsh, To treat these wretched lovers, Who put themselves before you, Ready to consecrate to you their hearts.\n\nBut when the sudden fury somewhat stayed, Which this new case had brought on them, Each one within himself withdrew, While rage to grief gave place; To her they turned for pity, With chosen words companioning their tears.\n\nNow if it please thee, gracious sorceress, If zeal for glory chance to move thy heart, Or milk of kindness soften it, Be merciful to us, And with thy magic herbs, Heal up the wound imprinted on our hearts.\n\nIf wish to succour rules thy beauteous hand, Make no delay, lest some of us Unhappy ones reach death, ere we Praising thy act Can each one say, So much did she torment, yet more did heal.\n\nThen she replied: Oh curious prying minds, Take this my other fatal urn, Which my own hand may not unclose; Over the wide expanse of earth, Wander ye still, Search for and visit all the various kingdoms.\n\nFate hath decreed, it ne'er shall be unclosed Till lofty wisdom, noble chastity [Pg 118] And loveliness with these combined, Shall set their hands to it; All other efforts vain, To make this fluid open to the sky.\n\nThen should it chance to sprinkle beauteous hands, Of those who come anear for remedy, Its god-like virtues you may prove, And turning cruel pain Into a sweet content, Two lovely stars upon the earth you'll see.\n\nMeanwhile be none of you cast down or sad, Although long while in deep obscurity All that the heavens contain remain concealed, For good so great as this, No pain, however sharp, Can be accounted worthy of the cost.\n\nThat Good to which through blindness you are led, Should make appear all other-having, vile, And every torment be as pleasure held, Who, hoping to behold Graces unique and rare, May hold in high disdain all other lights.\n\nAh, weary ones!"

