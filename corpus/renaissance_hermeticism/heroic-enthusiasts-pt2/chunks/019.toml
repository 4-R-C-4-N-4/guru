[content]
body = "But where the entire affection is all turned towards God, that is towards the Idea of Ideas, from the [Pg 46] light of intelligible things, the mind becomes exalted to the super-essential unity, and, all love, all one, it feels itself no longer solicited by various objects, which distract it, but is one sole wound, in the which the whole affection concurs and which comes to be one and the same affection.\n\nThen there is no love or desire of any particular thing, that can urge, nor even present itself before the will; for there is nothing more straight than the straight, nothing more beautiful than beauty, nothing better than goodness, nothing can be found larger than size, nor anything lighter than that light which with its presence darkens and obliterates all lights.\n\nCes.\n\nTo the perfect, if it be perfect, there is nothing that can be added; therefore the will is not capable of any other desire, when that which is of the perfect is present with it, highest and best.\n\nTherefore I understand the conclusion where he says to Love, \"Turn otherwhere thy bow,\" and wherefore should he try to kill him who is already dead, that is, he, who has no more life nor sense about other things, so that he cannot be stabbed or pierced or become exposed to other species.\n\nAnd this lament proceeds from him, who having tasted of the highest unity, desires to be in all things severed and withdrawn from the multitude.\n\nMar.\n\nYou understand quite well.\n\n[Pg 47] XII.\n\nCes.\n\nNow here is a boy in a boat, which little by little is being submerged in the tempestuous waves, and he, languid and tired, has abandoned the oars; around it the legend \"Fronti nulla, fides.\" There is no doubt that this signifies that he was induced, by the serene aspect of the waters, to venture on the treacherous sea, which having suddenly become troubled, the boy, in mortal fear, and in his impotence to still the tempest, has lost his head, his hope, and the power of his arm.\n\nBut let us see the rest:— 52.\n\nOh, gentle boy, that from the shore didst loose The baby bark, and to the slender oar Didst set thy unskilled hand; lured by the sea!\n\nLate hast thou seen the evil of thy plight.\n\nSee there the traitor rolls his fatal waves, The prow of thy frail bark, now sinks, now mounts.\n\nThe soul borne down with anxious cares Prevaileth not against the swollen floods.\n\nThy oars thou yieldst to thy fierce enemy, Waiting for death with calm collected thought, With eyelids closed, lest thou shouldst see him come.\n\nIf thee no friendly aid should quickly reach Thou surely must the full result soon feel, Of thy inquisitive temerity.\n\nMy cruel fate is like unto thine own, For I too, lured, enticed by Love, must feel, [Pg 48] The rigour keen of this most treacherous one.\n\nIn what manner and why Love is a traitor and deceiver we have just seen; but as I see the following without figure or legend, I believe that it must have connection with the above.\n\nTherefore let us go on and read it.\n\n53.\n\nMethought to leave the shelter of my port, And from maturer studies rest awhile: When, looking round me to enjoy my ease, Sudden I saw those unrelenting fates.\n\nThese have inflamed me with so ardent fires.\n\nVainly I strive some safer shores to reach, Vainly from pitying hands invoke some aid, And swift deliverance from my enemies."

