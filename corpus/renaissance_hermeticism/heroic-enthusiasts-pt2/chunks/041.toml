[content]
body = "Sev.\n\nIn a certain way no, and in a certain way yes.\n\nThere is no difference, when the Divine mind through its providence comes to communicate itself without disposition of the subject; I mean to say when it communicates itself because it seeks and elects its subject; but there is a great difference, when it waits and would be sought, and then according to its own good will and pleasure it makes itself to be found.\n\nIn this way it does not appear to all, nor can it appear to others, than to those who seek it.\n\nHence it is said, \"Qui quærunt me, invenient me;\" and again: \"Qui sitit, veniat et bibat!\" Min.\n\nIt is not to be denied, that the apprehension of the second manner is made in Time.\n\n(Comes with time?) Sev.\n\nYou do not distinguish between the disposition towards the Divine light and the apprehension of the same.\n\nCertainly I do not deny that it requires time to dispose oneself, discourse, [Pg 103] study and fatigue; but as we say that change takes place in time, and generation in an instant, and as we see that with time, the windows are opened, but the sun enters in a moment, so does it happen similarly in this case.\n\nThe fourth, represented in the following, is not really unworthy, like that which results from the habit of believing in the false opinions of the vulgar, which are very far removed from the opinions of philosophers, and are derived from the study of vulgar philosophies, which are by the multitude considered the more true, the more they appeal to common sense.\n\nAnd this habit is one of the greatest and strongest disadvantages, because as Alcazele and Averroes showed, it is like that which happens to those persons who from childhood and youth are in the habit of eating poison, and have become such, that it is converted into sweet and proper nutriment, and on the other hand, they abominate those things which are really good and sweet according to common nature; but it is most worthy, because it is founded upon the habit of looking at the true light; the which habit cannot come into use for the multitude, as we have said.\n\nThis blindness is heroic, and is of such a kind that it can worthily satisfy the present heroic [Pg 104] blind man, who is so far from troubling himself about it that he is able to explain every other sight, and he would crave nothing else from the community save a free passage and progress in contemplation, for he finds himself usually hampered and blocked by obstacles and opposition."

