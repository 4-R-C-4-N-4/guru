[content]
body = "Wherefore not only can we never discourse about things divine, but we cannot even think of them without detracting from, rather than adding to the glory of them; so that the best thing to be done with regard to them is, that man, in the presence of other men, should rather praise himself for his earnestness and courage, than give praise to anything, as complete and perfected action; seeing that no such thing can be expected where there is progress towards the infinite, where unity and infinity are the same thing and cannot be followed by the other number, because there is no unity from another unity, nor is there number from another number and unity, because they are not the same absolute and infinite.\n\nTherefore was it well said by a theologian that as the fountain of light far exceeds not only our intellects, but also the divine, it is decorous that one should not discourse with words, but that with silence alone it should be magnified.[D] [D] Now, it may be asked, what is the state of a man who followeth the true Light to the utmost of his power?\n\nI answer truly, it will never be declared aright, for he who is not such a man, can neither understand nor know it, and he who is, knoweth it indeed; but he cannot utter it, for it is unspeakable.—(\"Theologia Germanica.\") [Pg 18] Ces.\n\nNot, verily, with such silence as that of the brutes who are in the likeness and image of men, but of those whose silence is more exalted than all the cries and noise and screams of those who may be heard.[E] [E] \"Speech is of time, silence is of eternity.\"—(\"Sartor Resartus.\") IV.\n\nMar.\n\nLet us go on and see what the rest means.\n\nCes.\n\nSay, if you have seen and considered it, what is the meaning of this fire in the form of a heart with four wings, two of which have eyes and the whole is girt with luminous rays and has round about it this question: Nitimur incassum?\n\nMar.\n\nI remember well, that it signifies the state of the mind, heart and spirit and eyes of the enthusiast, but read the sonnet!\n\n44.\n\n[F]Splendour divine, to which this mind aspires, The intellect alone cannot unveil.\n\nThe heart, which those high thoughts would animate, Makes not itself their lord; nor spirit, which [Pg 19] Should cease from pleasure for a space, Can ever from those heights withdraw.\n\nThe eyes which should be closed at night in sleep, Awake remain, open, and full of tears.\n\nAh me, my lights!\n\nwhere are the zeal and art With which to tranquillize the afflicted sense?\n\nTell me my soul; what time and in what place Shall I thy deep transcendent woe assuage?\n\nAnd thou my heart, what solace can I bring As compensation to thy heavy pain?\n\nWhen, oh unquiet and perturbed mind, Wilt thou the soul for debt and dole receive With heart, with spirit and the sorrowing eyes?\n\n[F] Let no one suppose that we may attain to this true light and perfect knowledge by hearsay, or by reading and study, nor yet by high skill and great learning.—(\"Theologia Germanica.\") The mind which aspires to the divine splendour flees from the society of the crowd and retires from the multitude of subjects, as much as from the community of studies, opinions and sentences; seeing that the peril of contracting vices and illusions is greater, according to the number of persons with whom one is allied.\n\nIn the public shows, said the moral philosopher, by means of pleasure, vices are more easily engendered."

