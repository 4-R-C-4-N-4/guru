[content]
body = "Therefore, in the sistine he would have space made for him to pass; for if anybody should be touched by his fires he would become such that he would have no more feeling of the flames of hell, for their heat would be to him as cold snow.\n\n69.\n\nThe seventh blind man .\n\nBeauty, which through the eyes rushed to the heart, And formed the mighty furnace in my breast, Absorbing first the visual moisture; then, Spouting aloft its grasping flashing flame, Devouring every other fluid, To set the dryer element at rest, Has thus reduced me to a boneless dust, Which now to its own atoms is resolved, If anguish infinite your fears should rouse Make space, give way, oh peoples!\n\nBeware of my fierce penetrating fire, For if it should invade and touch you, ye Would feel and know the fires of hell To be like winter's cold.\n\nThe eighth follows, whose blindness is caused by the dart which love has caused to penetrate from the eyes to the heart.\n\nHence, he laments not only as being blind, but furthermore because he is wounded and burnt so fiercely, that he believes no other can be equally so.\n\nThe sense of it is easily expressed in this sonnet:— 70.\n\nThe eighth blind man .\n\nVile onslaught, evil struggle, unrighteous palm, Fine point, devouring fire, strong nerve, Sharp wound, impious ardour, cruel body, Dart, fire and tangle of that wayward god Who pierced the eyes, inflamed the heart, bound the soul, Made me at once sightless, a lover, and a slave, So that, blind I have at all times, in all ways and places, The feeling of my wound, my fire, my noose.\n\nMen, heroes, and gods!\n\nWho be on earth, or near to Ditis or to Jove, I pray ye say, when, how, and where did ye Feel ever, hear, or see in any place Woes like to these, amongst the oppressed Amongst the damned, 'mongst lovers?\n\nFinally comes the last one, who is also mute through not having been able, or having dared, to say that which he most desired to say, for fear of offending or exciting contempt, and he is deprived of speaking of every other thing: therefore, it is not he who speaks, but his guide who relates the affair, about which I do not speak, but only bring you the sense thereof: 71.\n\nThe guide of the ninth blind man .\n\nHappy are ye, oh all ye sightless lovers, That ye the reason of your pains can tell, By virtue of your tears you can be sure Of pure and favourable receptions.\n\nAmongst you all, the latent fire of him Whose guide I am, rages most fiercely, Though he is mute for want of boldness To make known his sorrows to his deity.\n\nMake way!\n\nopen ye wide the way, Be ye benign unto this vacant face, Oh people full of grievous hindrances, The while this harassed weary trunk Goes knocking at the doors To meet a death less painful, more profound.\n\nHere are mentioned nine reasons, which are the cause that the human mind is blind as regards the Divine object and cannot fix its eyes upon it.\n\nAnd of these, the first, allegorized through the first blind man, is the quality of its own species, which in so far as the degree in which he finds himself admits, he aspires certainly higher, than he is able to comprehend.\n\nMin.\n\nBecause no natural desire is vain, we are able to assure ourselves of a more excellent state which is suitable to the soul outside of this body, in the which it may be possible to unite itself, or to approach more nearly, to its object.\n\nSev."

