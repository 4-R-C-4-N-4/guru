[content]
body = "Maricondo.\n\nHere you see a flaming yoke enveloped in knots round which is written: Levius aura; which means that Divine love does not weigh down, nor carry his servant captive and enslaved to the lowest depths, but raises him, supports him and magnifies him above all liberty whatsoever.\n\nCes.\n\nPrithee, let us read the sonnet, so that we may consider the sense of it in due order with propriety and brevity.\n\nMar.\n\nIt says thus:— 54.\n\nShe who my mind to other love did move, To whom all others vile and vain appear, In whom alone is sovereign beauty seen, And excellence Divine is manifest.\n\nShe from the forest coming, I beheld, Huntress of myself, beloved Artemis, 'Midst beauteous nymphs, with air of nascent bells.\n\nThen said I unto Love: See, I am hers.\n\nAnd he to me: Oh, happy lover thou!\n\nDelectable companion of thy fate!\n\nThat she alone of all the numberless, That hold within their bosom life and death, Who most with virtues high the world adorns, [Pg 52] Thou didst obtain, through will and destiny, Within the Court of Love.\n\nSo happy thou in thy captivity Thou enviest not the liberty of man or God.\n\nSee how contented he is under that yoke, that marriage which has joined him to her whom he saw issuing from the forest, from the desert, from the woods, that is, from parts removed from the crowd, and from the conversation of the vulgar who have but small enlightenment.\n\nDiana, the splendour of the intelligible species, and huntress; because with her beauty and grace she first wounded him, and then bound him and holds him in her power, more contented than otherwise he could possibly have been.\n\nHe speaks of her \"amidst beauteous nymphs,\" that is, the multitude of other species, forms and ideas, and \"air of bells,\" that is the genius and the spirit which displayed itself at Nola, which lies on the plain of the Campanian horizon.[J] He acknowledges her, and she, more than any other, is praised by Love, who considers him so fortunate, because amongst all those present or absent to mortal eyes, she does more highly adorn the world, [Pg 53] and makes man glorious and beautiful.\n\nHence he says that his mind is raised towards the highest love, and that it learns to consider \"every other goddess,\" that is, the care or observation of every other kind, as vile and vain.[K] Now, in saying that she has roused his mind to high love, he takes occasion to magnify the heart through the thoughts, desires and works, as much as possible, and (to say) that we ought not to be entertained with low things which are beneath our faculties, as happens to those who, through avarice or through negligence, or indolence, become in this brief life attached to unworthy things.\n\n[J] Does he allude to the fact that bells were first used in Christian Churches at Nola?—(Tr.) [K] The delights which are perceived in things corporeal are vile; for every delight is such that it becomes viler the more it proceeds to external things, and happier, the more it proceeds to things internal.—(\"Spiritual Torrents.\") Ces.\n\nThere must be artisans, mechanics, agriculturists, servants, trotters, ignoble, low, poor, pedants and such like, for otherwise there could not be philosophers, meditators, cultivators of souls, masters, captains, nobles, illustrious ones, rich, wise, and the rest who may be heroes like to gods."

