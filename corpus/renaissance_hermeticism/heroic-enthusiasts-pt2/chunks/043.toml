[content]
body = "All which you have explained where it says: \"When will the bright spark of the visual ray Darting, spring through each veiling obstacle.\" But let us return.\n\nThe sixth, represented in the following, is caused only by the imbecility and unreality of the body, which is in continual motion, mutation, and change, the operations of which must follow the condition of its faculty, the which is a result of the condition of its nature and being.\n\nHow can immobility, reality, entity, truth be contained in that which is ever different, and always makes and is made, other and otherwise?\n\nWhat truth, what picture can be painted and impressed, where the pupils of the eyes are dispersed in water, the water into steam, the steam into flame, the flame into air, and this in other and other without end: the subject of sense and cognition turns for ever upon the wheel of mutation?\n\nMin.\n\nMovement is change, and that which is changeable works and operates ever differently, because the conception and affection follow the reason and condition of the subject; and he who sees other and other different and differently must necessarily be blind as regards that beauty which is one and alone and is the same unity and entity.\n\nSev.\n\nSo it is.\n\nThe seventh, contained allegorically in the sentiment of the seventh blind man, is the result of the fire of the affections, whence some become impotent and incapable of comprehending the truth, by making the affection precede the intellect.\n\nThere are those who love before they understand: whence it happens that all things appear to them according to the colour of their affections, whereas he who would understand the truth by means of contemplation, ought to be perfectly pure in thought.\n\nMin.\n\nIn truth, one sees how much diversity there is in meditators and inquirers, because some, according to their habits and early fundamental discipline, proceed by means of numbers,[AE] others by means of images, others by means of order and disorder, others through composition and division, others by separation and congregation, others by inquiry and doubt, others by discussions and defi nitions, others by interpretations and decypherings of voices, words, and dialects, so that some are mathematical philosophers, some metaphysicians, others logicians, others grammarians; so there are divers contemplators, who with different affections set themselves to study and apply the meaning of written sentences; whence we find that the same light of truth, expressed in the selfsame book, serves with the same words the proposition of so numerous, diverse, and contrary sects.[AF] [AE] Number is, as the great writer (Balzac) thought, an Entity, and, at the same time, a Breath emanating from what he termed God, and what we call the ALL; the breath which alone could organize the physical kosmos.—(\"The Secret Doctrine.\") [AF] As the Bible serves as the basis for all the different Protestant sects.\n\nSev.\n\nThat is to say, that the affections are very powerful in hindering the comprehension of the Truth, notwithstanding that the person may not himself perceive it; just as it happens to a stupid invalid who does not say that his mouth is bittered but that the food is bitter.\n\nNow that kind of blindness is expressed by him whose eyes are changed and deprived of their natural powers, by that which the heart has given and imprinted upon it, powerful not only to change the sense, but besides that, all the faculties of the soul as the present image shows.\n\nAccording to the meaning of the eighth, the high intelligible object has blinded the intellect, as the high superposed sensible has corrupted the senses.\n\nThus it would happen to him who should see Jove in his majesty, he would lose his life and in consequence his senses."

