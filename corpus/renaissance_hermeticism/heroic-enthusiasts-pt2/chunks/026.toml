[content]
body = "[P] Number is, as the great writer (Balzac) thought, an Entity, and at the same time, a Breath emanating from what he called God, and what we call the ALL, the breath which alone could organize the physical Kosmos.—(\"The Secret Doctrine.\") Anaxagoras and Empedocles considered that the omnipotent and all-producing divinity fills all things, and with them nothing was so small that it did not contain within it the occult in every respect, although they were always progressing onwards to where it was predominant, and where it found a more magnificent and elevated expression.\n\nThe Chaldeans sought for Truth by means of subtraction, not knowing how to affirm anything about it; and proceeded without these dogs of demonstrations and syllogisms, but solely forcing themselves to penetrate by removing and digging and clearing away by means of negations of every kind and discourses both open and secret.\n\nPlato went twisting and turning and tearing to pieces and placing embankments so that the volatile and fugacious species should be as it were caught in a net and held behind the hedges of definitions, and he considered that superior things were, by participation, and according to similitude, reflected in those inferior, and these in those according to their greater dignity and excellence, and that the truth was in both the one and the other, according to a certain analogy, order and scale, in which the lowest of the superior order agrees with the highest of the inferior order.\n\nSo that progress was from the lowest of nature to the highest, as from evil to good, from darkness to light, from the simple power to the simple action.\n\nAristotle boasts of being able to arrive at the desired booty by means of the imprints of tracks and vestiges, while he believes the effects will lead to the cause, although he, above all others who have occupied themselves with this sort of chase, has most deviated from the path, so as to be able hardly to distinguish the footsteps.\n\nTheologians there are, who, nourished in certain sects, seek the truth of nature in all her specific natural forms in which they see the eternal essence, the specific substantial perpetuator of the eternal generation and mutation of things, which are called after their founders and builders and above them all presides the form of forms,[Q] the fountain of light, very truth of very truth, God of gods, through whom all is full of divinity, truth, entity, goodness.\n\nThis truth is sought as a thing inaccessible, as an object not to be objectized, incomprehensible.\n\nBut yet, to no one does it seem possible to see the sun, the universal Apollo, the absolute light through supreme and most excellent species; but only its shadow, its Diana, the world, the universe, nature, which is in things, light which is in the opacity of matter, that is to say, so far as it shines in darkness.\n\n[Q] A discerning of the Infinite in the Finite.—(\"Sartor Resartus.\") Many then wander amongst the aforesaid paths of this deserted wood, very few are those who find the fountain of Diana.\n\nMany are content to hunt for wild beasts and things less elevated, and the greater number do not understand why, having spread their nets to the wind, they find their hands full of flies.\n\nRare, I say, are the Actæons to whom fate has granted the power of contemplating the nude Diana and who, entranced with the beautiful disposition of the body of nature, and led by those two lights, the twin splendour of Divine goodness and beauty become transformed into stags; for they are no longer hunters, but that which is hunted."

