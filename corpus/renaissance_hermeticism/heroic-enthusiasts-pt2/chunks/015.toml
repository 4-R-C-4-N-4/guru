[content]
body = "So much so that whatsoever you might add thereto would appear to me superfluous.\n\nIX.\n\nCes.\n\nLet us see what is here represented by those two radiating arrows upon a target around which is written: Vicit instans.\n\nMar.\n\nThe continual struggle in the soul of the enthusiast, the which, in consequence of the long familiarity which it had with matter was hard and incapable of being penetrated by the rays of the splendour of the Divine intelligence and the species of the Divine goodness; during which time, he says that the heart was enamelled with diamond, that is, the affection was hard and not capable of being heated and penetrated, and it rejected the blows of love which assailed it on innumerable sides.\n\nThat is, it did not feel itself wounded by those wounds of eternal life of which the Psalmist speaks when he says: Vulnerasti cor meum, o dilecta, vulnerasti cor meum.\n\nThe which wounds are not from iron or other material through the vigour and strength of [Pg 36] nerves, but are darts of Diana, or of Phœbus, that is, either from the goddess of the deserts—of contemplation of truth, that is, from Diana, who is the order of the second intelligences, which transfer the splendour received from the first and communicate it to the others, who are deprived of a more open vision; or else from the principal god Apollo, who with his own, and not a borrowed splendour, sends his darts, that is, his rays, so many and from such innumerable points, which are all the species of things, which are indications of Divine goodness, intelligence, beauty, and wisdom, according to the various degrees, from the simple comprehension, to the becoming heroic enthusiasts; because the adamantine subject does not reflect from its surface the impression of the light, but, destroyed and overcome by the heat and light, it becomes in substance luminous—all light—so that it is penetrated within the affection and conception.\n\nThis is not immediately, at the beginning of generation, when the soul comes forth fresh from the intoxication of Lethe, and drenched with the waves of forgetfulness and confusion, so that the spirit comes into captivity to the body, and is put into the condition of growth; but little by little, it goes on digesting, so as to become fitted for [Pg 37] the action of the sensitive faculty, until, through the rational and discursive faculty, it comes to a purer intellectual one, so that it can present itself to the mind, without feeling itself befogged by the exhalations of that humour, which, through the exercise of contemplation, has been saved from putrefaction in the stomach and is duly digested.\n\nIn this state, the present enthusiast shows himself to have remained thirty years, during which time he had not reached that purity of conception which would make him a suitable habitation for the wandering species, which offering themselves to all, equally, knock, ever at the door of the intelligence.\n\nAt last, Love, who in various ways and at different times had assaulted him as it were in vain—as the light and heat of the sun are said to be useless to those who are in the opaque depths and bowels of the earth—having located itself in those sacred lights, that is having shown forth the Divine Beauty through two intelligible species the which bound his intellect through the reasoning of Truth and warmed his affections through the reasoning of Goodness; while the material and sensitive desires became superseded, which aforetime used, as it were, to triumph, remaining intact, notwithstanding the excellence of the soul."

