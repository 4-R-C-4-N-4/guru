[content]
body = "Weary and hoarse I yield me, impotent, And seek no more to elude my destiny, Or make endeavour to escape my death: Let every other life to me be null, And let not the extremest torment fail, Which my hard fate for me prescribed.\n\nType of my own deep ills, Is that which thou for pastime didst entrust To hostile breast.\n\nOh, careless boy.\n\nHere I would not pretend to understand or determine all that the enthusiast means.\n\nYet there is well expressed the strange condition of a soul cast down by the knowledge of the difficulty of the operation, the amount of the labour, the vastness of the work on one side, and on the other the ignorance, want of knowledge of the way, weakness of nerves and [Pg 49] peril of death.\n\nHe has no knowledge suitable to the business, he does not know where and how to turn, no place of flight or refuge presents itself; and he sees that, from every side, the waves threaten, with frightful, fatal impetus.\n\nIgnoranti portum, nullus suus ventus est.\n\nBehold him, who has committed himself indeed to fortuitous things, and has brought upon himself trouble, prison, ruin, and drowning.\n\nSee how fortune deludes us, and that which we put carefully into her hands, she either breaks or lets it fall from her hands, or causes it to be removed by the violence of another, or suffocates and poisons, or taints with suspicion, fear, and jealousy to the great hurt and ruin of the possessor.\n\nFortunae au ulla putatis dona carcere dolis?\n\nFor strength which cannot give proof of itself is dissipated; magnanimity, which cannot prevail, is naught, and vain is study without results; he sees the effects of the fear of evil, which is worse than evil itself.\n\nPeior est morte timor ipse mortis.\n\nHe already suffers, through fear, that which he fears to suffer, terror in the limbs, imbecility in the nerves, tremors in the body, anxiety of the spirit, and that which has not yet appeared becomes present to him, and is certainly worse than whatsoever may happen.\n\nWhat can be more stupid than to be in pain about future [Pg 50] things and absent ones which at present are not felt?\n\nCes.\n\nThese considerations are on the surface and belong to the external of the figure.\n\nBut the proposition of the heroic enthusiast, I think, deals with the imbecility of human nature (ingegno) which, intent on the Divine undertaking, finds itself all at once engulphed in the abyss of incomprehensible excellence, and the sense and the imagination become confused and absorbed, and not knowing how to pass on, nor to go back, nor where to turn, vanishes and loses itself as a drop of water vanishes in the sea, or as a small spirit, becomes attenuated, losing its own substance in the space and immensity of the atmosphere.\n\nMar.\n\nWell.\n\nBut let us go towards our chamber and talk as we go, for it is night.\n\n[Pg 51]"

