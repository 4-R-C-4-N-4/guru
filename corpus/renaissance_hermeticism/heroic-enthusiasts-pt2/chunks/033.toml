[content]
body = "This alone I will not leave (unsaid) that it is not without reason that the affection of the heart is said to be the infinite sea by the apprehension of the eyes.[X] For the object of the mind [Pg 81] being infinite, and no definite object being proposed to the intellect, the will cannot be satisfied by a finite good, but if besides that, something else is found, it is desired and sought for; for, as is commonly said, the apex of the inferior species is the beginning of the superior species, whether the degrees are taken according to the forms, the which we cannot consider as being infinite, or according to the modes and reasons of those, in which way, the highest good being infinite, it would be supposed to be infinitely communicated, according to the condition of the things, over which it is diffused.\n\nHowever, there is no definite species of the universe.\n\nI speak according to the figure and mass; there is no definite species of the intellect; the affections are not a definite species.\n\n[X] Fire, Flame, Day, Smoke, Night, and so on ...\n\nThese are all names of various deities which preside over the Cosmo-psychic Powers.—(\"The Secret Doctrine.\") Lao.\n\nThese two powers of the soul, then, never are nor can be perfect for the object, if they refer to it infinitely?\n\nLib.\n\nSo it would be if this infinite were by negative privation or privative negation of the end, as it is for a more positive affirmation of the end, infinite and endless.[Y] [Y] \"The deity is one, because it is infinite.\n\nIt is triple, because it is ever manifesting.\" This manifestation is triple in its aspects, for it requires, as Aristotle has it, three principles for every natural body to become objective: privation, form and matter.\n\nPrivation meant in the mind of the great philosopher ...\n\nthe lowest plane and world of the Anima Mundi.—(\"The Secret Doctrine.\") [Pg 82] Lao.\n\nYou mean, then, two kinds of affinity; the one privative, the which may be towards something which is power, as, infinite is darkness, the end of which is the position of light; the other perfecting, which tends to the act and perfection, as infinite is the light, the end of which would be privation and darkness.[Z] In this, then, the intellect conceives the light, the good, the beautiful, in so far as the horizon of its capacity extends, and the soul, which drinks of Divine nectar and the fountain of eternal life in so far as its own vessel allows, and one sees that the light is beyond the circumference of his horizon, where it can go and penetrate more and more, and the nectar and fount of living water is infinitely fruitful, so that it can become ever more and more intoxicated.\n\n[Z] \"Darkness adopted illumination in order to make itself visible.\" Darkness in its radical, metaphysical basis, is subjective and absolute light; while the latter, in all its seeming effulgence and glory, is merely a mass of shadows, as it can never be eternal, and is simply an illusion, or Maya.—(\"The Secret Doctrine.\") [Pg 83] Lib.\n\nFrom this it does not follow that there is imperfection in the object, nor that there is little satisfaction in the potency, but that the power is included in the object and beatifically absorbed by it."

