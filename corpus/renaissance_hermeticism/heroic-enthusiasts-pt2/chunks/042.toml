[content]
body = "The fifth results from the disproportion of the means of our cognition to the knowable; seeing that in order to contemplate Divine things, the eyes must be opened by means of images, analogies and other reasonings which by the Peripatetics are comprehended under the name of fancies (fantasmi); or, by means of Being, to proceed to speculate about Essence, by means of its effects and the knowledge of the cause; the which means, are so far from ensuring the attainment of such an end, that it is easier to believe that the highest and most profound cognition of Divine things, is through negation and not through affirmation, knowing that the Divine beauty and goodness is not that which can or does fall within our conception, but that which is above and beyond, incomprehensible; chiefly in that condition called by the philosopher speculation of phantoms, and by the theologian, vision through analogies, reflections and enigmas, because we see, not the true effects and the true species of things, [Pg 105] or the substance of ideas, but the shadows, vestiges and simulacra of them, like those who are inside the cave and have from their birth their shoulders turned away from the entrance of the light, and their faces towards the end, where they do not see that which is in reality, but the shadows of that which is found substantially outside the cave.\n\nTherefore by the open vision which it has lost, and knows it has lost, a spirit similar to or better than that of Plato weeps, desiring exit from the cave, whence, not through reflexion, but through immediate conversion he may see the light again.\n\nMin.\n\nIt appears to me that this blind man does not refer to the difficulty which proceeds from reflective vision, but to that which is caused through the medium between the visual power and the object.\n\nSev.\n\nThese two modes, although they are distinct in the sensitive cognition, or ocular vision, at the same time are united together in the rational or intellectual cognition.\n\nMin.\n\nIt seems to me that I have heard and read that in every vision, the means, or the intermediary is required between the power and the object.\n\nBecause as by means of the light diffused in the air and the figure of the thing, which in a certain way proceeds from that which is seen, to that which [Pg 106] sees, the act of seeing is put into effect, so in the intellectual region, where shines the sun of the intellect, acting between the intelligible species formed as proceeding from the object, our intellect comes to comprehend something of the divinity, or something inferior to it.\n\nBecause, as our eye, when we see, does not receive the light of the fire and of gold, in substance, but in similitude; so the intellect, in whatever state it is found, does not receive the divinity substantially, so that there should be substantially as many gods as there are intelligences, but in similitude; therefore they are not formally gods, but denominatively divine, the divinity and Divine beauty being one, exalted above all things.\n\nSev.\n\nYou say well; but for all your well saying, there is no need for me to retract, because I have never said the contrary.\n\nBut I must declare and explain.\n\nTherefore, first I maintain that the immediate vision, so called and understood by us, does not do away with that sort of medium which is the intelligible species, nor that which is the light; but that which is equal to the thickness and density of the crystalline or opaque intermediate body; as happens to him who sees by means of the waters more or less turbid, or air foggy and cloudy, who [Pg 107] would believe he was looking as without a medium when it was conceded to him to look through the pure air, light and clear."

