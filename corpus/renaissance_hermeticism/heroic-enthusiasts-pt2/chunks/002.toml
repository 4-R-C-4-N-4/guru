[content]
body = ".\n\nInterlocutors: Cesarino.\n\nMaricondo.\n\n1.\n\nCes.\n\nIt is said that the best and most excellent things are in the world when the whole universe responds from every part, perfectly, to those things; and this it is said takes place as the planets arrive at Aries, being when that one of the eighth sphere again reaches the upper invisible firmament, where is also the other Zodiac;[A] and low and evil things prevail when the opposite disposition and order supervene, and thus through the power of change comes the continual mutation of like and unlike, from one opposite to another.\n\nThe revolution then of the great year of the world is that space of time in which, through the most diverse customs and effects, and by the most opposite and contrary means, it returns to the same again.\n\nAs we see in particular years such as that of the sun, where the beginning of an opposite tendency is the end of one year, and the end of this is the beginning of that.\n\nTherefore now that we have been in the dregs of the sciences, which have brought forth the dregs of opinions, which are the cause of the dregs of customs and of works, we may certainly expect to return to the better condition.\n\n[A] Astronomers distinguish between a fixed and intellectual zodiac; and the movable and visible zodiac.\n\nAccording to the former, Aries still stands as the first of the signs; that is to say, the first thirty degrees of the zodiacal circle, reckoning from the equinoctial point in spring, are allotted to Aries in the intellectual zodiac....\n\nAstronomers generally choose to reckon by the fixed and intellectual zodiac.—(Drummond's \"Oedipus Judaicus.\") Maricondo.\n\nKnow, my brother, that this succession and order of things is most true and most certain; but as regards ourselves in all ordinary conditions whatever, the present afflicts more than the past, nor can these two together console, but only the future, which is always in hope and expectation as you may see designated in this figure which is taken from the ancient Egyptians, who made a certain statue which is a bust, upon which they placed three heads, one of a wolf which looks behind, one of a lion with the face turned half round, and the third of a dog who looks straight before him; to signify that things of the past afflict by means of thoughts, but not so much as things of the present which actually torment, while the future ever promises something better; therefore behold the wolf that howls, the lion that roars and the dog that barks (applause).\n\nCes.\n\nWhat means that legend that is written above?\n\nMar.\n\nSee, that above the wolf is Lam, above the lion Modo, above the dog Praeterea, which are words signifying the three parts of time.\n\nCes.\n\nNow read the tablet.\n\nMar.\n\nI will do so.\n\n41.\n\nA wolf, a lion, and a dog appear At dawn, at midday, and dark night.\n\nThat which I spent, retain and for myself procure, So much was given, is given, and may be given; For that which I did, I do, and have to do.\n\nIn the past, in the present and in the future, I do repent, torment myself and re-assure, For the loss, in suffering and in expectation.\n\nWith sour, with bitter and with sweet Experience, the fruits, and hope, Threatens, afflict, and comforts me.\n\nThe age I lived, do live and am to live, Affrights me, shakes me and upholds In absence, presence and in prospect.\n\nMuch, too much and sufficient Of the past, of now, and of to come, Put me in fear, in anguish and in hope.\n\nCes."

