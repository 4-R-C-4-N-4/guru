[content]
body = "The eyes, when they move (the heart), are dry, because they perform the office of a looking-glass, and of a representer; when they are moved, however, they become troubled and perturbed, because they perform the office of a diligent executer, seeing that with the speculating intellect, the beautiful and the good is first seen, then the will [Pg 86] desires it; and later the industrious intellect procures it, follows it, and seeks it.\n\nTearful eyes signify the difficulty of separating the thing wished for from, the wisher, the which in order that it should not pall, nor disgust, presents itself as an infinite longing (studio) which ever has, and ever seeks; seeing that the delight of the gods is ascribed to drinking, not to having tasted ambrosia, and to the continual enjoyment of food and drink, and not in being satiated and without desire for them.\n\nHence they have satiety as it were in movement and apprehension, not in quiet and comprehension; they are not satiated without appetite, nor are they in a state of desire, without being in a certain way satiated.\n\n[AA] \"Deity is an arcane, living (or moving) FIRE, and the eternal witnesses to this unseen Presence are Light, Heat, Moisture,\" this trinity including, and being the cause of every phenomenon in Nature.—(\"The Secret Doctrine.\") Lao.\n\nEsuries satiata, satietas esuriens.\n\nLib.\n\nPrecisely so.\n\nLao: From this I can comprehend how, without blame, but with great truth and understanding, it has been said that Divine love weeps with indescribable groans, because having all it loves all, and loving all has all.\n\nLib.\n\nBut many comments would be necessary if we would understand that Divine love which is deity itself; and one easily understands Divine love, so far as it is to be found in its effects and in the [Pg 87] inferior nature.\n\nI do not say that which from the divinity is diffused into things, but that of things which aspires to the divinity.\n\nLao.\n\nNow of this and of other matters we will discourse more at our ease presently.\n\nLet us go.\n\n[Pg 88]"

