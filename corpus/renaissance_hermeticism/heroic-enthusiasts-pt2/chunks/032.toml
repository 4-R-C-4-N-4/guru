[content]
body = "Why rather stay a pilgrim here below Than open through the air and us a way?\n\nNo spark of fire from that heart Goes out through the wide atmosphere.\n\nBody of dust and ashes is not seen, Nor water-laden smoke ascends on high.\n\nAll is contained entire within itself, And not of flame, is reason, sense, or thought.\n\nLao.\n\nThis proposition is neither more nor less conclusive than the other.\n\nBut let us come at once to the answers if there be any.\n\nLic.\n\nThere are some certainly and full of sap.\n\nListen.\n\n61.\n\nSecond response of the heart to the eyes .\n\nHe is a fool, who that alone believes, Which to the sense appears, who reason scorns.\n\nMy flame could never wing its way above.\n\nThe conflagration infinite remains unseen.\n\nBetween the eyes their waters are contained, One infinite encroaches not upon another.\n\nNature wills not that all should perish.\n\nIf so much fire's enough for so much sphere, Say, say, oh eyes, What shall we do?\n\nhow act [Pg 79] In order to make known, or I, or you, For its deliverance, the sad plight of the soul?\n\nIf one and other of us both be hid, How can we move the beauteous god to pity?\n\nLas.\n\nIf it is not true it is very well imagined: if it is not so, it is yet a very good excuse the one for the other; because where there are two forces, of the which one is not greater than the other, the operation of both must cease, for one resists as much as the other insists, and one assails while the other defends.\n\nIf therefore the sea is infinite and the force of tears in the eyes is immense, it never can be made apparent by speech, nor the impetus of the fire concealed in the heart break forth, nor can they (the eyes) send forth the twin torrent to the sea if the heart shelters them with equal tenacity.\n\nTherefore the beautiful deity cannot be expected to be pitiful towards the afflicted soul because of the exhibition of tears which distil from the eyes, or speech which breaks forth from the breast.\n\nLib.\n\nNow note the answer of the eyes to this proposition:— 62.\n\nSecond response of the eyes to the heart .\n\nAlas!\n\nwe poured into the wavy sea, The strength of our two founts in vain, For two opposing powers hold it concealed, [Pg 80] Lest it go rolling aimlessly adown.\n\nThe strength unmeasured of the burning heart, Withholds a passage to the lofty streams; Barring their twofold course unto the sea, Nature abhors the covered ground.[W] Now say, afflicted heart, what canst thou bring To oppose against us with an equal force?\n\nOh, where is he, will boast himself to be Exalted by this most unhappy love, If of thy pain and mine it can be said, The greater they, the less it may be seen.\n\n[W] Ch'il coperto terren natura aborre.\n\nBoth these evils being infinite, like two equally vigorous opposites they curb and suppress each other: it could not be so if they were both finite, seeing that a precise equality does not belong to natural things, nor would it be so if the one were finite, the other infinite; for of a certainty the one would absorb the other, and they would both be seen, or, at least one, through the other.\n\nBeneath these sentences, there lies hidden, ethical and natural philosophy, and I leave it to be searched for, meditated upon and understood, by whosoever will and can."

