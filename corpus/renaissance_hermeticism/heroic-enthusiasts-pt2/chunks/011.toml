[content]
body = "So that the continual movement of one part supposes and carries with it the movement of the whole, in such a way that the attraction of the posterior parts is consequent upon the repulsion of the anterior parts; thus the movement of the superior parts results of necessity from that of the inferior, and from the raising of one opposite power, follows the depression of the other opposite.\n\nTherefore the heart, which signifies all the affections generally, comes to be concealed and open, held by zeal, raised by magnificent thoughts, sustained by hope, weakened by fear, and in this state and condition will it ever be seen and found.\n\nVI.\n\nCes.\n\nThat is all well.\n\nLet us come to that which follows.\n\nI see a ship floating on the waves; its ropes are attached to the shore and there is the legend: Fluctuat in portu.\n\nDeliberate about the signification of this, and when you are decided about it, explain.\n\nMar.\n\nBoth the legend and the figure have a certain connexion with the present legend and figure, as may be easily understood, if one considers it a little.\n\nBut let us read the sonnet.\n\n46.\n\nIf I by gods, by heroes and by men Be re-assured, so that I not despair, Nor fear, pain, nor the impediments Of death of body, joy and happiness, Yet must I learn to suffer and to feel.\n\nAnd that I may my pathways clearly see, Let doubts arise, and dolour, and the woe Of vanished hopes, of joy and all delight.\n\nBut if he should behold, should grant, and should attend My thoughts, my wishes, and my reasoning, Who makes them so uncertain, hot, and vague, Such dear conceits, such acts and speech, Will not be given nor done to him, who stays From birth, through life, to death in sheltered home.\n\nNon dà, non fa, non ha qualunque stassi De l'orto, vita e morte a le magioni.\n\nFrom what we have considered and said in the preceding discourses one is able to understand these sentiments, especially where it is shown that the sense of low things is diminished and annulled whenever the superior powers are strongly intent upon a more elevated and heroic object.\n\nThe power of contemplation is so great, as is noted by Jamblichus, that it happens sometimes, not only that the soul ceases from inferior acts, but that it leaves the body entirely.\n\nThe which I will not understand otherwise than in such various ways as are explained in the book of thirty seals, wherein are produced so many methods of contraction, of which some infamously, others heroically operate, that one learns not to fear death, suffers not pain of body, feels not the hindrances of pleasures: wherefore the hope, the joy, and the delight of the superior spirit are of so intense a kind that they extinguish all those passions which may have their origin in doubt, in pain and all kinds of sadness.\n\nCes.\n\nBut what is that, of which he requests that it consider those thoughts which it has rendered so uncertain, fulfil those desires which it has made so ardent, and listen to those discourses which it has rendered so vague?\n\nMar.\n\nHe means the Object, which he beholds when it makes itself present; for to see the Divine is to be seen by it, as to see the sun concurs with the being seen of the sun."

