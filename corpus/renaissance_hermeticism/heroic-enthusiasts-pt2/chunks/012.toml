[content]
body = "Equally, to be heard by the Divine, is precisely to listen to it, and to be favoured by it, is the same as to offer to it; for from the one immoveable and the same, proceed thoughts uncertain and certain, desires ardent and appeased, and reasonings valid and vain, according as the man worthily or unworthily puts them before himself, with the intellect, the affections and actions.\n\nAs that same pilot may be said to be the cause of the sinking or of the safety of the ship, according as he is present in it or absent from it; with this difference, that the pilot through his defectiveness or his efficiency ruins or saves the ship; but the Divine potency which is all in all does not proffer or withhold except through assimilation or rejection by oneself.[H] [H] Ask, and it shall be given you; seek, and ye shall find; knock, and it shall be opened unto you.—(\"St.\n\nMatthew.\") VII.\n\nMar.\n\nIt seems to me that the following figure is closely connected and linked with the above; there are two stars in the form of two radiant eyes, with the legend: Mors et vita.\n\nCes.\n\nRead the sonnet!\n\nMar.\n\nI will do so: 47.\n\nWrit by the hand of Love may each behold Upon my face the story of my woes.\n\nBut thou, so that thy pride no curb may know, And I, unhappy one, eternally might rest, Thou dost torment, by hiding from my view Those lovely lights beneath the beauteous lids.\n\nTherefore the troubled sky's no more serene, Nor hostile baleful shadows fall away.\n\nBy thine own beauty, by this love of mine (So great that e'en with this it may compare), Render thyself, oh Goddess, unto pity!\n\nProlong no more this all-unmeasured woe, Ill-timed reward for such a love as this.\n\nLet not such rigour with such splendour mate If it import thee that I live!\n\nOpen, oh lady, the portals of thine eyes, And look on me if thou wouldst give me death!\n\nHere, the face upon which the story of his woes appears is the soul; in so far as it is open to receive those superior gifts, for the which it has a potential aptitude, without the fulness of perfection and act which waits for the dew of heaven.\n\nThus was it well said: Anima mea sicut terra sine aqua tibi; and again: Os meum operui; and again: Spiritum, quia mandata tua desiderabam.\n\nThen \"pride which knows no curb\" is said in metaphor and similitude, as God is sometimes said to be jealous, angry, or that He sleeps, and that signifies the difficulty with which He grants so much even as to show his shoulders, which is the making himself known by means of posterior things and effects.\n\nSo the lights are covered with the eyelids, the troubled sky of the human mind does not clear itself by the removal of the metaphors and enigmas."

