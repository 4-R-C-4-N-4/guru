[content]
body = ".\n\nInterlocutors : Severing.\n\nMinutolo.\n\nSev.\n\nYou will see the origin of the nine blind men, who state nine reasons and special causes of their blindness, and yet they all agree in one general reason and one common enthusiasm.[AB] [AB] May one suggest an analogy between the nine months of gestation, during which time the foetus goes through various stages and conditions to complete the \"individual cycle of evolution,\" and the nine blind men who, at the end of their probation, are brought to see the light—to be born—illuminated?—(\"Translator.\") Min.\n\nBegin with the first!\n\nSev.\n\nThe first of these, notwithstanding that he is blind by nature, yet he laments, saying to the others that he cannot persuade himself that nature has been less courteous to them than to him; seeing that although they do not (now) see, yet they have enjoyed sight, and have had experience of that sense, and of the value of that faculty, of which they [Pg 89] have been deprived, while he came into the world as a mole, to be seen and not to see, to long for the sight of that which he never had seen.\n\nMin.\n\nMany have fallen in love through report alone.\n\nSev.\n\nThey have, says he, the happiness of retaining that Divine image present in the mind, so that, although blind, they have in imagination that which he cannot have.\n\nThen in the sistine he turns to his guide and begs him to lead him to some precipice, so that he may no longer endure this contempt and persecution of nature.\n\nHe says then: 63.\n\nThe first blind man .\n\nYe now afflicted are, who erst were glad, For ye have lost the light that once was yours, Yet happy, for ye have the twin lights known.\n\nThese eyes ne'er lighted were, and ne'er were quenched; But a more grievous destiny is mine Which calls for heavier lamentation.\n\nWho will deny that nature upon me Has frowned more harshly than on you?\n\nConduct me to the precipice, my guide, And give me peace, for there will I a cure For this my dolour and affliction find; For to be seen, yet not to see the light, Like an incapable and sightless mole, [Pg 90] Is to be useless and a burden on the earth.\n\nNow follows the other, who, bitten by the serpent of jealousy, became affected in the organ of sight.\n\nHe wanders without any guide, unless he has jealousy for his escort.\n\nHe begs some of the bystanders, that seeing there is no remedy for his misfortune, they should have pity upon him, so that he should no longer feel it; that he might become as unmanifest to himself as he is to the light, and that they bury him together with his own misfortune.\n\nHe says then: 64.\n\nThe second blind man .\n\nAlecta has torn from out her dreadful hair, The infernal worm that with a cruel bite, Has fiercely fastened on my soul, And of my senses, torn the chief away, Leaving the intellect without its guide.\n\nIn vain the soul some consolation seeks.\n\nThat spiteful, rabid, rancorous jealousy Makes me go stumbling along the way.\n\nIf neither magic spell nor sacred plant, Nor virtue hid in the enchanter's stone, Will yield me the deliverance that I ask: Let one of you, my friends, be pitiful, And put me out, as are put out my eyes, That they and I together be entombed."

