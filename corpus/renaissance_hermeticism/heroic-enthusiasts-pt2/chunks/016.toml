[content]
body = "Because those lights which made present the illuminating, acting intellect and sun of intelligence found easy ingress through his eyes; that of Truth (the intellect of Truth?) through the door of the intellectual faculty; that of Goodness (intellect of Goodness?) through the door of the appetitive faculty, to the heart, that is, the substance of the general affection.\n\nThis was that double ray, which came as from the hand of an irate warrior, who showed himself, now, as ready and as bold, as aforetime he had appeared weak and negligent.[I] Then, when he first felt warmed and illuminated in his conception, was that victorious point and moment of which it is said: Vicit instans.\n\n[I] He takes it by assault, without offering battle: the heart is unable to resist him.—(\"Spiritual Torrents.\") Thus you can understand the sense of the following figure, legend and sonnet, which says:— 49.\n\nI fought with all my strength, 'gainst Love Divine When he assailed with blows from every side This cold, enamelled, adamantine heart, Whence my desires defeated his intent.\n\nAt last, one day, 'twas as the heavens had willed.\n\nEncamped I found him in those holy lights Which, through mine own alone, of all the rest An easy entrance to my heart could find.\n\n'Twas then upon me fell that double bolt, Flung as from hand of irate warrior Who had for thirty years besieged in vain.\n\nHe marked that place and strongly there he held, Planted the trophy there, and evermore He holds my fleet wings in restrainment.\n\nMeanwhile since then with more solemnity of preparation The anger and the ire of my sweet enemy Cease not to wound my heart.\n\nRare moment was that; the end of the beginning and perfection of victory; rare were those two species which amongst all others found easy entrance, seeing that they contain in themselves the efficacy and the virtue of all the others; for what higher and more excellent form can present itself than that of the beauty, goodness and truth, which are the source of every other truth, beauty, and goodness?\n\n\"He marked that place\"—that is, took possession of the affections, noted them, and impressed upon them his own character; \"and strongly there he held;\" he confirmed and established them and sanctified them so that he can never again lose them; for it is not possible that one should turn to love any other thing when once he has conceived in his mind the Divine Beauty, and it is as impossible that he can do other than love it, as it is impossible that his desires should fall otherwise than towards good, or species of good.\n\nTherefore his inclination is in the highest degree towards the primal good.\n\nSo again, the wings, which used to be so fleet to go downwards with the weight of matter, are kept in restrainment, and the sweet augers which are the efficacious assaults of the gracious enemy, who has been for so long time kept back, and excluded, a stranger and a pilgrim, never cease to wound, soliciting the affections and awakening thought.\n\nBut now, the sole and entire possessor and disposer of the soul, for she neither wills nor wishes to will other, nor is she pleased, nor will she that any other please her, whence he often says:— Dolci ire, guerra dolce, dolci dardi, Dolci mie piaghe, miei dolci dolori!\n\nX.\n\nCes.\n\nIt would seem that we have nothing more to consider upon this proposition.\n\nLet us see now, how this quiver and bow of Eros display the sparks around, and the knot of the string, which hangs down with the legend, which is: Subito, clam.\n\nMar."

