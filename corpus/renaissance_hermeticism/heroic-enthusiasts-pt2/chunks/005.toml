[content]
body = "You see, Cesarino, how this enthusiast is justified in his anger against those who reproach him with being in captivity to a low beauty, to which he dedicates his vows, and attributes these forms, so that he is deaf to those voices which call him to nobler enterprises: for these low things are derived from those, and are dependent upon them, so that through these you may gain access to those, according to their own degrees.\n\nThese, if they be not God, are things divine, are living images of Him, in the which, if He sees Himself adored, He is not offended.\n\nFor we have a charge from the supernal spirit which says: Adorate sgabellum pedum eius.\n\nAnd in another place a divine messenger says: Adorabimus ubi steterunt pedes eius.\n\nCes.\n\nGod, the divine beauty, and splendour shines and is in all things; and therefore it does not appear to me an error to admire Him in all things, according to the way in which we have communion with them.\n\nError it would surely be if we should give to another the honour due to Him alone.\n\nBut what means the enthusiast when he says, \"Leave, leave me, every other wish\"?\n\nMar.\n\nThat he banishes every thought presented to him by different objects, which have not the power to move him and which would rob him of the sight of the sun which comes to him through that window more than through others.\n\nCes.\n\nWhy, importuned by thoughts, does he continually gaze at that splendour which destroys him, and yet does not satisfy him, as it torments him ever so fiercely?\n\nMar.\n\nBecause all our consolations in this state of controversy are not without their discouragements, however vast those consolations may be.\n\nJust as the fear of a king for the loss of his kingdom, is greater than that of a mendicant who is in peril of losing ten farthings; and more important is the care of a prince over a republic, than that of a rustic over a herd of swine; as perchance the pleasures and delights of the one are greater than the pleasures and delights of the other.\n\nTherefore the loving and aspiring higher, brings with it greater glory and majesty, with more care, thought, and pain: I mean in this state, where the one opposite is always joined to the other, finding the greatest contrariety always in the same genus, and consequently about the same subject, although the opposites cannot be together.\n\nAnd thus proportionally in the love of the supernal Eros, as the Epicurean poet declares of vulgar and animal desire when he says:— Fluctuat incertis erroribus ardor amantum, Nec constat, quid primum oculis, manibusque fruantur: Quod petiere, premunt arte, faciuntque dolorem Corporis, et dentes inlidunt saepe labellis, Osculaque adfigunt, quia non est pura voluptas, Et stimuli subsunt, qui instigant laedere id ipsum, Quodcunque est, rabies, unde illa haec germina surgunt.\n\nSed leviter poenas frangit Venus inter amorem, Blandaque refraenat morsus admixta voluptas; Namque in eo spes est, unde est ardoris origo, Restingui quoque posse ab eodem corpore flammam.\n\nBehold, then, with what condiments the skill and art of nature works, so that one is wasted with the pleasure of that which destroys him, is happy in the midst of torment, and tormented in the midst of all the satisfactions."

