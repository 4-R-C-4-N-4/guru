[content]
body = "And more than that, they are equal to the ocean, not because they do pour, but because these two springing streams can pour such, and so much, that compared with them the Nile would appear a tiny stream divided into seven streamlets.[T] [T] Is this an allusion to the seven activities or changes which water goes through to produce form; Water being the formative power which Fire, itself formless and the moving power, animates?—(Tr.) Lib.\n\nBe not surprised at that exaggeration nor at that potency without action!\n\nFor you will understand all, after having heard the conclusion of their argument.\n\nNow listen how the heart responds to the proposition of the eyes.\n\nLao.\n\nI pray you, let me hear.\n\nLib.\n\n57.\n\nFirst response of the heart to the eyes .\n\nEyes, if an immortal flame within me burn, And I no other am than burning fire; If to come near me is to feel the blaze, So that the heavens are fervid with my heat; Why does my blazing flame consume you not, But only contrary effects you feel?\n\nWhy saturated and not roasted ye, If not of water but of fire I be?\n\nBelieve ye, oh ye blind, That from such ardent burning is derived The double passage, and those living founts Have had their elements from Vulcan?\n\nAs force sometimes acquires a power When by its contrary it is opposed.\n\nYou see that the heart could not persuade itself that from an opposite cause and beginning, could proceed a force of an opposite effect.\n\nSo that it will not allow the possibility of it, except through antiperistasis, which means the strength which an opposite acquires from that which, flying from the other, comes to unite itself, incorporate itself, insphere itself, or concentrate itself towards the individual, through its own virtue, which, the farther it is removed from the dimensions (dimensioni) the more efficacious it becomes.\n\nLao.\n\nTell me, how did the eyes respond to the heart?\n\n58.\n\nFirst response of the eyes to the heart.\n\nThy passion does confuse thee, on my heart, The path of truth thou hast entirely lost; That which in us is seen—that which is hid— Is seed of oceans.\n\nNeptune, if by fate His kingdom he should lose, would find it here entire.\n\nHow does the burning flame from us derive Who of the sea the double parent are?\n\nSo senseless thou'rt become!\n\nDost thou believe the flame will pass And leave the doors all wet behind That thou may'st feel the ardour of the same?\n\nAs splendour through a glass, dost thou Believe that it through us will penetrate?\n\nNow I will not begin to philosophize about the identity of opposites which I have studied in the book De Principio ed uno, and I will suppose that which is usually received, that the opposites in the same genus are quite separate (distantissimi), so that the meaning of this response is more easily learned where the eyes call themselves the seed or founts in the virtual potentiality of which is the sea; so that if Neptune should lose all the waters, he could recall them into action by their own potentiality, where they are as in the beginning, medium and material.\n\nBut it is not urged as a necessity, when they say it cannot be, that the flame passes over to the heart through their room (stanza e cortile) and courtyard leaving so many waters behind, for two reasons."

