[content]
body = "Besides which, because he does not believe that all which is not, could not be, he prays the divine light, that by its beauty, which ought not to be entirely concealed, at least according to the capacity of whoever beholds it, and by his love, which, perchance, is equal to so much beauty (equal, he means, of the beauty, in so far as he can comprehend it) that it surrender itself to pity, that is, that it should do as those who are compassionate, and who from being capricious and gloomy become gracious and affable and that it prolong not the evil which results from that privation, and not allow that its splendour, for which it is so much desired, should appear greater than that love by means of which it communicates itself, seeing that in it all the perfections are not only equal but are also the same.\n\nIn fine, he begs that it will no further sadden by privation, for it can kill with the glance of its eyes and can also with those same give him life.\n\nCes.\n\nDoes he mean that death of lovers, which comes from intense joy, called by the Kabalists, mors osculi, which same is eternal life, which a man may anticipate in this life and enjoy in eternity?\n\nMar.\n\nHe does.\n\nVIII.\n\nMar.\n\nIt is time to proceed to the consideration of the following design, similar to those previously brought forward, and with which it has a certain affinity.\n\nThere is an eagle, which with two wings cleaves the sky; but I do not know how much and in what manner it comes to be retarded by the weight of a stone which is tied to its leg.\n\nThere is the legend: Scinditur incertum.\n\nIt is certain that it signifies the multitude, number and character (volgo) of the powers of the soul, to exemplify which, that verse is taken: Scinditur incertum studia in contraria vulgus.\n\nThe whole of which character (volgo) in general is divided into two factions; although subordinate to these, others are not wanting, of which some appeal to the high intelligence and splendour of rectitude, while others incite and force in a certain manner to the low, to the uncleanness of voluptuousness and compliance with natural desires.\n\nTherefore says the sonnet: 48.\n\nI would do well—to me 'tis not allowed.\n\nWith me my sun is not, although I be with him, For being with him, I'm no more with myself: The farther from myself—the nearer unto him; The nearer unto him, the farther from myself.\n\nOnce to enjoy, doth cost me many tears, And seeking happiness, I meet with woe.\n\nFor that I look aloft, so blind am I.\n\nThat I may gain my love, I lose myself.\n\nThrough bitter joy, and through sweet pain, Weighted with lead, I rise towards the sky.\n\nNecessity withholds, goodness conducts me on, Fate sinks me down, and counsel raises me, Desire spurs me, fear keeps me in check.\n\nCare kindles and the peril backward draws.\n\nTell me, what power or what subterfuge Can give me peace and bring me from this strife, If one repels, the other draws me on.\n\nThe ascension goes on in the soul through the power and appulsion in the wings, which are the intellect, or intellectual will upon which she naturally depends and through which she fixes her gaze toward God, as to the highest good, and primal truth, as to absolute goodness and beauty."

