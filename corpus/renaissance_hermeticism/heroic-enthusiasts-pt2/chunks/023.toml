[content]
body = "Therefore in this present time it is proper that noble spirits equipped with truth and enlightened with the Divine intelligence, should arm themselves against dense ignorance by climbing up to the high rock and tower of contemplation.[L] [L] If meditation be a nobler thing Than action, wherefore, then, great Keśava!\n\nDost thou impel me to this dreadful fight?\n\n—(\"Song Celestial.\") [Pg 57] To them it is seemly that they hold every other object as vile and vain.\n\nNor should these spend their time in light and vain things; for time flies with infinite velocity; the present rushes by with the same swiftness with which the future draws near.\n\nThat which we have lived is nothing; that which we live is a point; that which we have to live is not yet a point, but may be a point which, together, shall be and shall have been.\n\nAnd with all this we crowd our memories with genealogies: this one is intent upon the deciphering of writings, that other is occupied in multiplying childish sophisms, and we shall see, for example, a volume full of: Cor est fons vitae.\n\nNix est alba, ergo cornix est fons vitae alba, and one prattles about the noun; was it first, or the verb; the other, whether the sea was first or the springs; again, another tries to revive obsolete vocabularies which, because they were once used and approved by some old writer, must now be exalted to the stars.\n\nYet another takes his stand upon the false or the true orthography, and so on, with various similar nonsense only worthy of contempt.\n\nThey fast, they become thin and emaciated, they scourge the skin, and lengthen the beard, they rot, and in these things they place the anchor of their highest good.\n\nThey despise fortune, and put [Pg 58] up these as shield and refuge against the strokes of fate.\n\nWith such-like most vile thoughts they think to mount to the stars, to be equal to gods, and to understand the good and the beautiful which philosophy promises.\n\nCes.\n\nA grand thing, indeed, that time, which does not suffice for necessary things, however carefully we use it, should come to be chiefly consumed about superfluous things, and things vile and shameful.\n\nIs it not rather a thing to laugh at than to praise in Archimedes, that at the time when the city was in confusion, everything in ruins, fire broken out in his room, enemies there at his back who had it in their power to make him lose his brain, his life, his art; that he, meanwhile, having abandoned all desire or intention of saving his life, lost it while he was inquiring, perhaps, into the proportion of the curve to the straight line, of the diameter to the circle, or other similar mathesis, as suitable for youth, as it were unsuitable for one who, being old, should be intent upon things more worthy of being put as the end of human desires?\n\nMar.\n\nIn connection with this I like what you said just now, that there must be all sorts of persons in the world, and that the number of the imperfect, [Pg 59] the ugly, the poor, the unworthy and the villanous, should be the greater, and, in short, it ought not to be otherwise than as it is."

