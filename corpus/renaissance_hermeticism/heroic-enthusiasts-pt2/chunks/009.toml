[content]
body = "If one aspires to the supreme splendour, let him retire as much as he can, from union and support, into himself (Di sorte che non sia simile a molti, per che son molti; e non sia nemico di molti per che son dissimili), so that he be not like unto many, because they are many; and be not adverse to many, because they are dissimilar; if it be possible, let him retain the one and the other; otherwise he will incline to that which seems to him best.\n\nLet him associate either with those whom he can make better or with those through whom he may be made better, through brightness which he may impart to those or that he may receive from them.\n\nLet him be content with one ideal rather than with the inept multitude.\n\nNor will he hold that he has gained little, when he has become such an one who is wise unto himself, remembering what Democritus says: Unus mihi pro populo est, et populus pro uno; and what Epicurus said to a companion of his studies, writing to him: \"Haec tibi, non multis!\n\nSatis enim magnum alter alteri theatrum sumus.\" The mind, then, which aspires high, leaves, for the first thing, caring about the crowd, considering that that divine light despises striving and is only to be found where there is intelligence, and yet not every intelligence, but that which is amongst the few, the chief, the first among the first, the principal one.\n\nCes.\n\nHow do you mean that the mind aspires high?\n\nFor example, by looking at the stars?\n\nAt the empyreal heaven above the ether?\n\nMar.\n\nCertainly not!\n\nbut by plunging into the depths of the mind, for which there is no great need to open the eyes to the sky, to raise the hands, to direct the steps to the temple, nor sing to the ears of statues in order to be the better heard, but to come into the inner self believing that, God is near, present and within, more fully than man himself,[G] being soul of souls, life of lives, essence of essences: for that which you see above or below, or round about, or however you please to say it, of the stars, are bodies, are created things, similar to this globe on which we are, and in which the divinity is present neither more nor less than he is in this globe of ours or in ourselves.\n\nThis is how, then, one must begin to withdraw oneself from the multitude into oneself.\n\nOne ought to arrive at such a point to despise and not to overestimate every labour, so that, the more the desires and the vices contend with each other inwardly and the vicious enemies dispute outwardly, so much the more should one breathe and rise, and with spirit, if possible, surmount this steep hill.\n\nHere there is no need for other arms and shield than the majesty of an unconquered soul and a tolerant spirit, which maintains the quality and meaning of that life which proceeds from science and is regulated by the art of considering attentively things low and high, divine and human, in the which consists that highest good, and in reference to this, a moral philosopher wrote to Lucillus that one must not linger between Scylla and Charybdis, penetrate the wilds of Candavia and the Apennines or lose oneself in the sandy plains, because the road is as sure and as blythe as Nature herself could make it."

