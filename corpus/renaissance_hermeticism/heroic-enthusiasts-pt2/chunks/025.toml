[content]
body = "Now, it must be said that the outcome of the mind is that alone which is always by it desired, sought for, and embraced, and that which is more enjoyed than anything else, with which it is filled, comforted and becomes better,—that is Truth, towards which, in all times, in every state, and in whatsoever condition man finds himself, he always aspires, and for the which he despises every fatigue, attempts every study, makes no account of the body, and hates this life.\n\nTherefore Truth is an incorporeal thing; and neither physics, metaphysics, nor mathematics can be found in the body, because we see that the [Pg 62] eternal human essence is not in individuals, who are born and die.\n\nIt (Truth) is specific unity, said Plato, not the numerical multitude that holds the substance of things.\n\nTherefore he called Idea one and many, movable and immovable because as incorruptible species it is intelligible and one, and as it communicates itself to matter and is subject to movement and generation, it is sensible and many.\n\nIn this second mode it has more of non-entity than of entity; seeing that it is one and another and is ever running but never diminishes.[O] In the first mode it is an entity, and true.\n\nSee now, the mathematicians take it for granted, that the true figures are not to be found in natural bodies, nor can they be there through the power either of nature or of art.\n\nYou know, besides, that the truth (reality) of supernatural substances is above matter.\n\nWe must therefore conclude that he who seeks the truth must rise above the reason of corporeal things.\n\nBesides which it must be considered, that he who feeds has a certain natural memory of his food, especially when it is most required; it leaves in the mind the likeness and species of it, in an elevated manner, according to [Pg 63] the elevation and glory of him who aims, and of that which is aimed at.\n\nHence it is that everything has, innate, the intelligence of those things which belong to the conservation of the individual and species, and furthermore its final perfection depends upon efforts to seek its food through some kind of hunting or chase.\n\nTherefore it is necessary that the human soul should have the light, the genius, and the instruments suitable for its pursuit.\n\nAnd here contemplation comes to aid, and logic, the fittest mode for the pursuit of truth, to find it, to distinguish it, and to judge of it.\n\nSo that one goes rambling amongst the wild woods of natural things, where there are many objects under shadow and mantle, for it is in a thick, dense, and deserted solitude that Truth most often has its secret cavernous retreat, all entwined with thorns and covered with bosky, rough and umbrageous plants; it is hidden, for the most part, for the most excellent and worthy reasons, buried and veiled with utmost diligence, just as we hide with the greatest care the greatest treasures, so that, sought by a great variety of hunters, of whom some are more able and expert, some less, it cannot be discovered without great labour.\n\nPythagoras went seeking for it with his imprints and vestiges impressed upon natural objects, which [Pg 64] are numbers, the which display its progress, reasons, modes and operations in a certain manner, because in the number (of) multitude, the number (of) measures, and the number (of) moment or weight, the truth and Being are found in all things.[P] [O] Atteso che sempre è altro ed altro, e corre eterno per la privazione."

