[content]
body = "First, because such an impediment cannot exist in action, if (equally?) violent opposition is not put into action;[U] second, because in so far as the waters are actually in the eyes, they can give passage to the heat as to the light; for, experience proves that the luminous ray kindles, by means of reflection, any material that becomes opposed to it, without heating the glass; and the ray passes through a glass, crystal or other vase, full of water, and heats an object placed under it, without heating the thick intervening body.\n\nAs it is also true that it causes dry and dusty impressions in the caves of the deep sea.\n\nTherefore by analogy, if not by the same sort of reasons, we may see how it is possible that, through the lubricant and dark passage of the eyes, the affection may be kindled and inflamed by that light, the which for the same reason cannot be in the middle.[V] As the light of the sun, according to other reasoning, is in the middle air, or again in the nearer sense, and again in the common sense, or again in the intellect, notwithstanding that from one mode proceeds the other mode of being.\n\n[U] Prima, per che tal impedimento in atto non puo essere se non posti in atto tali oltraggiosi ripari.\n\nDoes this mean that the opposites which are called into action must be equal in power?—(Translator.) If, when fire is ascending again to its proper sphere, it should meet with obstacles, such as a bit of wood or of straw, it would resume its former activity, and consume this obstacle or hindrance; and the greater the resistance, the more its activity would be increased....\n\nYou will observe that the obstacle which the fire meets with would serve only to increase its velocity, by giving it a new ardour to overcome all obstacles in joining itself to its centre.—(\"Spiritual Torrents,\" Lady Guion.) [V] Nel mezzo.\n\nLao.\n\nAre there any more discourses?\n\nLib.\n\nYes; because both the one and the other are trying to find out in what way it is that it (the heart) contains so many flames and those (the eyes) so many waters.\n\nThe heart then makes the next proposition.\n\n59.\n\nSecond proposition of the heart to the eyes .\n\nIf to the foaming sea the rivers run, And pour their streams into the sea's dark gulf, How does the kingdom of the water-gods, Fed by the double torrent of these eyes, Increase not; since the earth Must lose the glorious overflow?\n\nHow is it that we do not see the day, When from the mount Deukalion returns?\n\nWhere are the lengthening shores, Where is the torrent to put out my flame, Or, failing this, to give it greater power?\n\nDoes drop of water ever fall to earth In such a way as leads me to suppose It is not as the senses show it?\n\nIt asks, what power is this, which is not put into action?\n\nIf the waters are so many, why does Neptune not come to tyrannize over the kingdoms of the other elements?\n\nWhere are the inundated banks?\n\nWhere is he who will give coolness to the ardent fire?\n\nWhere is the drop of water by which I may affirm through the eyes that which the senses deny?\n\nBut the eyes in the same way ask another question.\n\n60.\n\nSecond proposition of the eyes to the heart .\n\nIf matter changed and turned to fire acquires The movement of a lighter element, Rising aloft unto the highest heaven; Wherefore, ignited by the fire of love, Swifter than wind, dost thou not rise and flash.\n\nInto the sun and be incorporate there?"

