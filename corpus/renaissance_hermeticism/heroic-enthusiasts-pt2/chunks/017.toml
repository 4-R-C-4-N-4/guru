[content]
body = "Well do I remember having seen it expressed in the sonnet.\n\nBut let us read it first.\n\n50.\n\nEager to find the much desired food, The eagle towards the sky spreads out his wings And warns of his approach both bird and beast, The third flight bringing him upon the prey.\n\nAnd the fierce lion roaring from his lair Spreads horror all around and mortal fear; And all wild beasts, admonished and forewarned, Fly to the caves and cheat his cruel jaw.\n\nThe whale, ere he the dumb Protean herd Hungry pursues, sends forth his nuncio, From caves of Thetys spouts his water forth.\n\nLions and eagles of the earth and sky, And whales, lords of the seas, come not with treachery, But the assaults of Love come stealing secretly.\n\nThe animal kingdom is divided into three, and is composed of various elements: the earth, the water, the air, and there are three species—beasts, fishes, and birds.\n\nInto three kinds are the principles of nature settled and defined, in the air the eagle, on earth the lion, in the water the whale; of the which, each one, as it displays more strength and command over the others, makes a show of magnanimous action, or apparently magnanimous.\n\nTherefore it is observed, that the lion, before he starts on the hunt trumpets forth his roar, which resounds through the whole forest, like to the poetical description of the fury-hunter.\n\nAt saeva e speculis tempus dea nacta nocendi, Ardua tecta petit, stabuli et de culmine summo Pastorale canit signum, cornuque recurvo Tartaream intendit vocem, qua protinus omne Contremuit nemus, et silvae intonuere profundae.\n\nThe eagle again, before he proceeds to his venery, first rises straight from the nest in a perpendicular line upwards, and generally speaking at the third time he swoops from above with greater impetus and swiftness than if he were flying in a direct line, so that at the time when he is gaining the greatest velocity of flight, he is able also to speculate upon his success with the prey, and after three inspections he knows whether he will succeed or fail.\n\nCes.\n\nCan one imagine why, if at the first his prey presents itself before his eyes, he does not instantly pounce upon it?\n\nMar.\n\nNo; unless it be to see whether anything better, or more easily taken, comes to sight.\n\nAt the same time I do not believe that this is always so, but most often it is.\n\nBut to return.\n\nOf the whale it is manifest that, being such a huge animal, he cannot divide the waters without making his presence known through the repulsion of the waves, besides which there are several species of this fish, that when they move or breathe, spout forth a windy tempest of water.\n\nThus from these three principal species of animals, the inferior kinds have warning to enable them to get away, so that they do not conduct themselves as deceivers and traitors.\n\nBut Love, who is stronger and greater and who has supreme dominion in heaven, on earth, and in the seas, and who in comparison ought perhaps to show greater magnanimity, as he also has more power, does nothing of the kind, but assaults and wounds suddenly and swiftly.\n\nLabitur totas furor in medullas, Igne furtivo populante venas, Nec habet latum data plaga frontem; Sed vorat tectas penitas medullas, Virginum ignoto ferit igne pectus.\n\nAs you perceive, the tragic poet calls him a furtive fire, an unknown flame."

