[content]
body = "For the ultimate and final end of this sport, is to arrive at the acquisition of that fugitive and wild body, so that the thief becomes the thing stolen, the hunter becomes the thing hunted; in all other kinds of sport, for special things, the hunter possesses himself of those things, absorbing them with the mouth of his own intelligence; but in that Divine and universal one, he comes to understand to such an extent, that he becomes of necessity included, absorbed, united.\n\nWhence, from common, ordinary, civil, and popular, he becomes wild, like a stag, an inhabitant of the woods; he lives god-like under that grandeur of the forest; he lives in the simple chambers of the cavernous mountains, whence he beholds the great rivers; he vegetates intact and pure from ordinary greed, where the speech of the Divine converses more freely, to which so many men have aspired who longed to taste the Divine life while upon earth, and who with one voice have said: Ecce elongavi fugiens, et mansi in solitudine.\n\nThus the dogs—thoughts of Divine things—devour Actæon, making him dead to the vulgar and the crowd, loosened from the knots of perturbation of the senses, free from the fleshly prison of matter, whence they no longer see their Diana as through a hole or a window, but having thrown down the walls to the earth, the eye opens to the view of the whole horizon.[R] So that he sees all as one; he sees no more by distinctions and numbers, which, according to the different senses, as through various cracks, cause to be seen and understood in confusion.\n\n[R] For now we see through a glass, darkly; but then face to face.—(\"St.\n\nPaul to the Corinthians.\") He sees Amphitrite, the source of all numbers, of all species, of all reasons, which is the monad, the real essence of the being of all, and if he does not see it in its essence, in absolute light, he sees it in its seed, which is like unto it, which is its image; for from the monad, which is the divinity, proceeds this monad which is nature, the universe, the world, where it is beheld and reflected, as the sun is in the moon by means of which it is illuminated;[S] he finding himself in the hemisphere of intellectual substances.\n\nThis is that Diana, that one who is the same entity, that entity which is comprehensible nature, in which burns the sun and the splendour of the higher nature, according to which, unity is both the generated and the generating, the producer and produced.\n\nThus you can of yourself determine the mode, the dignity, and the success, which are most worthy of the hunter and the hunted.\n\nTherefore the enthusiast boasts of being the prey of Diana, to whom he rendered himself, and of whom he considers himself the accepted consort, and happy as a captive and a subject.\n\nWhy, he envies no man (for there is none that can have more) or any other god that can have that species which is impossible to be obtained by an inferior nature, and therefore is not worthy to be desired, nor can one hunger after it.\n\n[S] There is no potentiality for creation, or self-consciousness, in a pure Spirit on this our plane, unless its too homogeneous, perfect, because Divine, nature is, so to say, mixed with, and strengthened by, an essence already differentiated.\n\nIt is only the lower line of the Triangle—representing the first triad that emanates from the Universal Monad—that can furnish this needed consciousness on the plane of differentiated Nature.—(\"The Secret Doctrine.\") Ces.\n\nI have well understood all that you have said, and you have more than satisfied me."

