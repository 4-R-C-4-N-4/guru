[content]
body = "CHAPTER XXXIII.\n\nOf the Seals and Characters of Natural Things .\n\nAll Stars have their peculiar natures, properties, and conditions, the Seals and Characters whereof they produce, through their rays, even in these inferior things, viz., in elements, in stones, in plants, in animals, and their members; whence every natural thing receives, from a harmonious disposition and from its star shining upon it, some particular Seal, or character, stamped upon it; which Seal of character is the significator of that star, or harmonious disposition, containing in it a peculiar Virtue, differing from other virtues of the same matter, both generically, specifically, and numerically.\n\nEvery thing, therefore, hath its character pressed upon it by its star for some particular effect, especially by that star which doth principally govern it.\n\nAnd these Characters contain and retain in them the peculiar Natures, Virtues, and Roots of their Stars, and produce the like operations upon other things, on which they are reflected, and stir up and help the influences of their Stars, whether they be Planets, or fixed Stars, or Figures, or celestial Signs, viz., as oft as they shall be made in a fit matter, and in their due and accustomed times.\n\nWhich ancient Wise Men considering—such as labored much in the finding out of the occult properties of things—did set down in writing the Images of the Stars, their Figures, Seals, Marks, Characters, such as Nature herself did describe, by the rays of the Stars, in these inferior bodies—some in stones, some in plants, and joints and knots of boughs, and some in divers members of animals.\n\nFor the bay-tree, the lote-tree, and the marigold are Solary Plants, and in their roots and knots, being cut off, shew the Characters of the Sun.\n\nSo also in the bones and shoulder-blades in animals; whence there arose a spatulary kind of divining ( i.\n\ne.\n\n) by the shoulder-blades; and in the stones and stony things the Characters and Images of celestial things are often found.\n\nBut seeing that in so great a diversity of things there is not a traditional knowledge, only in a few things, which human understanding is able to reach: Therefore, leaving those things which are to be found out in plants and stones, and other things, as also in the members of divers animals, we shall limit ourselves to man's nature only, which, seeing it is the most complete Image of the whole Universe , containing in itself the whole heavenly harmony, will, without all doubt, abundantly afford us the Seals and Characters of all the Stars and Celestial Influences, and those, as the more efficacious, which are less differing from the celestial nature.\n\nBut as the number.\n\nof the Stars is known to God alone, so also their effects and Seals upon these inferior things, wherefore no human intellect is able to attain to the knowledge of them.\n\nWhence very few of those things became known to us which the ancient philosophers and chiromancers attained to, partly by reason and partly by experience; and there be many things yet lying hid in the treasury of Nature.\n\nWe shall here, in this place, note some few Seals and Characters of the Planets, such as the ancient chiromancers knew of, in the hands of men.\n\nThese doth Julian call Sacred and Divine Letters, seeing that by them, according to the holy Scripture, is the life of men writ in their hands.\n\nAnd there are in all nations of all languages always the same and like to them, and permanent; to which were added and found out afterwards many more; as by the ancient, so by latter chiromancers.\n\nAnd they that would know them must have recourse to their volumes."

