[content]
body = "CHAPTER LI.\n\nOf Certain Observations, Producing Wonderful Virtues .\n\nThey say that certain acts and observations have a certain power of natural things; that they believe diseases may be expelled, or brought thus and thus.\n\nSo they say that quartanes may be driven away if the parings of the nails of the sick be bound to the neck of a live eel, in a linen cloth, and she be let go into the water.\n\nAnd Pliny saith that the parings of a sick man's nails of his feet and hands being mixed with wax, cure the quartan, tertian, and quotidian ague; and if they be before Sunrising fastened to another man's gate, will cure such like diseases.\n\nIn like manner, let all the parings of the nails be put into the caves of ants, and the first ant that begins to draw at the parings must be taken and bound to the neck of the sick, and by this means will the disease be cured.\n\nThey say that by wood, stricken with lightning, and cast behind the back with one's hands, any disease may be removed; and, in quartanes, a piece of a nail from a gibbet, wrapped up in wool, and hung about the neck, cures them; also, a rope doth the like that is taken from a gallows and hid under ground so that the Sun cannot reach it.\n\nThe throat of him that hath a hard swelling, or imposthume, being touched with the hand of him that died by an immature death, will be cured thereby.\n\nThey say, also, that a woman is presently eased of her hard labor if any one shall put into her bed a stone or dart with which a boar or a bear or man hath been killed with one blow.\n\nThe same doth a spear that is pulled out of the body of a man, if it shall not first touch the ground; also, they say, that arrows, pulled out of the body of a man, if they have not touched the earth, taken and stealthily placed under any one lying down, will procure love.\n\nThe falling sickness is cured by meat made of the flesh of a wild beast, slain in the same manner as a man is slain.\n\nA man's eyes that are washed three times with the water wherein he hath washed his feet shall never be sore or blear.\n\nIt is said that some do cure diseases of the groin with thread taken out of a weaver's loom and tying into it seven or nine knots, the name of some widow being named at every knot.\n\nThe spleen of cattle, extended upon painful spleens, cures them if he that applies it saith that he is applying a medicine to the spleen to cure and ease it.\n\nAfter this, they say, the patient must be shut into a sleeping room, the door being sealed up with a ring, and some verse be repeated over nineteen times.\n\nThe water of a green lizard cures the same disease if it be hanged up in a vessel before the patient's bed-chamber so that he may, as he passes in and out, touch it with his hand.\n\nAnd a little frog climbing up a tree, if any one shall spit in his mouth, and then let him escape, is said to cure the cough.\n\nIt is a wonderful thing, but easy to experience, that Pliny speaks of, that if any one shall be sorry for any blow that he hath given another, afar off or nigh at hand, if he shall presently spit into the middle of that hand with which he gave the blow, the party that was smitten shall presently be freed from pain.\n\nThis hath been approved of in a four-footed beast that hath been sorely hurt.\n\nSome there are that aggravate the blow before they give it."

