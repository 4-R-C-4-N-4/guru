[content]
body = "In these five metals the cold abodes with their regimens are especially found.\n\nHence it happens that Sol can with difficulty be liquefied without the heat of fire, on account of the cold whereof mention has been made.\n\nFor Mercury cannot assist with his natural heat or liquefaction, or defend himself against the cold of the five metals, because the heat of Mercury is not sufficient to retain Sol in a state of liquefaction.\n\nWherefore Sol has to obey the five metals rather than Mercury alone.\n\nMercury itself has no office of itself save always to flow.\n\nHence it happens that in coagulations of the other metals it can effect nothing, since its nature is not to make anything hard or solid, but liquid.\n\nTo render fluid is the nature of heat and life, but cold has the nature of hardness, consolidation, and immobility, which is compared to death.\n\nFor example, the six cold metals, Jupiter, Venus, Saturn, Mars, Venus, Luna, if they are to be liquefied must be brought to that condition by the heat of fire.\n\nSnow or ice, which are cold, will not produce this effect, but rather will harden.\n\nAs soon as ever the metal liquefied by fire is removed therefrom, the cold, seizing upon it, renders it hard, congelated, and immovable of itself.\n\nBut in order that Mercury may remain fluid and alive continually, say, I pray you, whether this will be affected with heat on cold?\n\nWhoever answers that this is brought about by a cold and damp nature, and that it has its life from cold – the promulgator of this opinion, having no knowledge of Nature, is led away by the vulgar.\n\nFor the vulgar man judges only falsely, and always holds firmly on to his error.\n\nSo then let him who loves truth withdraw therefrom.\n\nMercury, in fact, lives not at all from cold but from a warm and fiery nature.\n\nWhatever lives is fire, because heat is life, but cold the occasion of death.\n\nThe fire of Sol is of itself pure, not indeed alive, but hard, and so far shews the colour of sulphur in that yellow and red are mixed therein in due proportion.\n\nThe five cold metals are Jupiter, Mars, Saturn, Venus, and Luna, which assign to Sol their virtues; according to cold, the body itself; according to fire, colour; according to dryness, solidity; according to humidity, weight; and out of brightness, sound.\n\nBut that gold is not burned in the element of terrestrial fire, nor is even corrupted, is effected by the firmness of Sol.\n\nFor one fire cannot burn another, or even consume it; but rather if fire be added to fire it is increased, and becomes more powerful in its operations.\n\nThe celestial fire which flows to us on the earth from the Sun is not such a fire as there is in heaven, neither is it like that which exists upon the earth, but that celestial fire with us is cold and congealed, and it is the body of the Sun.\n\nWherefore the Sun can in no way be overcome by our fire.\n\nThis only happens, that it is liquefied, like snow or ice, by that same celestial Sun.\n\nFire, therefore, has not the power of burning fire, because the Sun is fire, which, dissolved in heaven, is coagulated with us.\n\nGold is in its 1 Celestial Dissolved Essence three- { 2 Elementary} and Fluid fold 3 Metallic is Corporeal.\n\nTHE END OF THE SEVEN CANONS.\n\nTHE COELUM PHILOSOPHORUM.\n\nPART II.\n\nCERTAIN TREATISES AND APPENDICES ARISING OUT OF THE SEVEN CANONS.\n\nGOD AND NATURE DO NOTHING IN VAIN.\n\nTHE eternal position of all things, independent of time, without beginning or end, operates everywhere."

