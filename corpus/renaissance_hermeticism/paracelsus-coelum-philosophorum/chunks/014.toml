[content]
body = "When the occult dispenser of Nature in the prime principles that is to say, the potency called Ares, has produced the gross and rough genera of stones, and no further grossness remains, a diaphanous and subtle substance remains, out of which the Archeus of Nature generates the precious stones or gems.\n\n– De Elemento Aquae , Lib.\n\nIV., Tract IV., c.\n\n10.\n\n12.\n\nThe body f the Emerald is derived from a kind of petrine Mercury.\n\nIt receives from the same its colour, coagulated with spirit of Salt.\n\n– Ibid ., c.\n\n12.\n\n13.\n\nThe most concentrated hardness of all stones combines for the generation of the adamant.\n\nThe white adamant has its body from Mercury, and its coagulation from the spirit of Salt.\n\n– Ibid ., c.\n\n12.\n\n14.\n\nFortified by experience which is the mistress of all things, and by mature theory, based on experience, I affirm that the Magnet is a stone which not only undeniably attracts steel and iron, but has also the same power over the matter of all diseases in the whole body of man.\n\n– De Corallis .\n\nSee Herbarius Theophrasti .\n\n15.\n\nThe Pearl is a seed of moisture.\n\nIt generates milk abundantly in women if they are deficient therein.\n\n– De Aridura .\n\n16.\n\nThe Jacinth, or Hyacinth, is a gem of the same genus as the Carbuncle, but is inferior thereto in its nature.\n\n– De Elemento Aquae , Lib.\n\nIV., Tract IV., c.\n\n11.\n\n17.\n\nIn the matter of body and colour the Sapphire is generated from Mercury (the prime principle).\n\nIt is formed over white Sulphur and white Salt from a pallid petrine Mercury.\n\nHence white Sapphires frequently occur because a white Mercury concurs in the formation.\n\nIn like manner a lute-coloured Mercury sometimes produces a clay-like hue.\n\n– Ibid ., c.\n\n15.\n\n18.\n\nThe Ruby and similar gems possessing a ruddy hue are generated from the red of Sulphur, and their body is of petrine Mercury.\n\nFor Mercury is the body of every precious stone.\n\n– Ibid ., c.\n\n13.\n\n19.\n\nThe Carbuncle is formed of the most transparent matter which is conserved in the three principles.\n\nMercury is the body and Sulphur the colouring thereof, with a modicum of the spirit of Salt, on account of the coagulation.\n\nAll light abounds therein, because Sulphur contains in itself a clear quality of light, as the art of its transmutation demonstrates.\n\n– Ibid ., c.\n\n11.\n\n20.\n\nThere are two species of red Corals – one a dull red, which varies between sub-purple and semi-black; the other a resplendent and brilliant red.\n\nAs the colours differ, so also do the virtues.\n\nThere is also a whitish species which is almost destitute of efficacy.\n\nIn a word, as the Coral diminishes in redness, so it weakens in its qualities.\n\nHerbarius Theophrasti ; De Corallis .\n\n21.\n\nThe gem Chalcedony is extracted from Salt.\n\n– Chirurgia Magna ; De Tumoribus , etc., Morbi Gallici , Lib.\n\nIII., c.\n\n6.\n\n22.\n\nThe Topaz is an extract from the minera of Mars, and is a transplanted Iron.\n\n– Ibid .\n\n23.\n\nThe Amethyst is an extract of Salt, while Marble and Chalcedony are extracted from the same principle through the Amethyst.\n\n– Ibid .\n\n24.\n\nThe origin of Crystals is to be referred to water.\n\nThey contain within them a spirit of coagulation whereby they are coagulated, as water by the freezing and glacial stars.\n\n– Lib.\n\nMeteorum , c.\n\n7."

