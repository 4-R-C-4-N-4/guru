[content]
body = "Venus is the first metal generated by the Archeus of Nature from the three prime principles after the marcasites and cachimiae have been separated from these.\n\nIt is formed of the gross redness which is purged off from the primal Sulphur of the light red expelled in like manner from the Mercury, and of the deep yellow separated in the purification of the prime Salt by this same Archeus.\n\n– Ibid ., c.\n\n3.\n\n7.\n\nLead is the blackness of the three first principles, which, however, is by no means a superfluity, but a peculiar metallic nature in them existing.\n\nFor all metals are latent in Mercury, and they are all only Mercury.\n\nThe same is to be concluded concerning Salt and Sulphur.\n\nThus, as copper is the abundant redness of the three principles, so Lead is their blackness; but, at the same time, there are four colours concealed therein – the blackness, purged off from the three principles; redness, which contains a precipitate out of Mercury; whiteness, from the calcination of Mercury; and a certain yellowness derived from Mercury.\n\nThus the grossness and the colours are alike due to Mercury, and Lead is, in fact, a black Mercury.\n\n– Ibid ., c.\n\n5.\n\n8.\n\nWhen the three prime principles have been purged of their superfluities, and from the said superfluities the imperfect metals have been generated, there remains nothing gross or crude, either in colour or substance, but only a very subtle nature of a white and purple hue.\n\nThis is the most pure quality of Mercury, Salt, and Sulphur, most clear and excellent in form, substance, essence, and colour.\n\nThese two essences, namely, the white and the purple, are separated by the Archeus, and out of the first fixed and coagulated, is formed silver, while from the purple there is generated gold, which is the most noble Sulphur, Salt, and Mercury, separated from all other colours, and consisting of purple alone.\n\nIts clayey or yellow appearance is accounted for by the subtlety and clearness of the metal, because all the dull colours are removed.\n\nIn Silver the most prevalent colours are green and blue, which are respectively derived from the Mercury and the Salt, the Sulphur contributing nothing in the matter of colouring.\n\nOn the other hand, in gold the purple colour is derived from Salt, the pellucid redness from Sulphur, and the yellow from Mercury.\n\n– Ibid ., c.\n\n8.\n\n9.\n\nVerbenas adole pingues, et mascula tura.\n\n– Virg., Ecl.\n\nviii.\n\n65.\n\n10.\n\nAlchemy is, so to speak, a kind of lower heaven, by which the sun is separated from the moon, day from night, medicine from poison, what is useful from what is refuse.\n\n– De Colica .\n\nTherefore learn Alchemy, which is otherwise called Spagyria.\n\nThis teaches you to discern between the true and the false.\n\nSuch a Light of Nature is it that it is a mode of proof in all things, and walks in light.\n\nFrom this light of Nature we ought to know and speak, not from mere phantasy, whence nothing is begotten save the four humours and their compounds, augmentation, stagnation, and decrease, with other trifles of this kind.\n\nThese proceed, not from the clear intellect, that full treasure-house of a good man, but rather are based on a fictitious and insecure foundation.\n\n– Paramirum , Lib.\n\nI., c.\n\n3.\n\n11."

