[content]
body = "Of his own nature Saturn speaks thus: The other six have cast me out as their examiner.\n\nThey have thrust me forth from them and from a spiritual place.\n\nThey have also added a corruptible body as a place of abode, so that I may be what they neither are nor desire to become.\n\nMy six brothers are spiritual, and thence it ensues that so often as I am put in the fire they penetrate my body and, together with me, perish in the fire, Sol and Luna excepted.\n\nThese are purified and ennobled in my water.\n\nMy spirit is a water softening the rigid and congelated bodies of my brothers.\n\nYet my body is inclined to the earth.\n\nWhatever is received into me becomes conformed thereto, and by means of us is converted into one body.\n\nIt would be of little use to the world if it should learn, or at least believe, what lies hid in me, and what I am able to effect.\n\nIt would be more profitable it should ascertain what I am able to do with myself.\n\nDeserting all the methods of the Alchemists, it would then use only that which is in me and can be done by me.\n\nThe stone of cold is in me.\n\nThis is a water by means of which I make the spirits of the six metals congeal into the essence of the seventh, and this is to promote Sol with Luna.\n\nTwo kinds of Antimony are found: one the common black by which Sol is purified when liquefied therein.\n\nThis has the closest affinity with Saturn.\n\nThe other kind is the white, which is also called Magnesia and Bismuth.\n\nIt has great affinity with Jupiter, and when mixed with the other Antimony it augments Luna.\n\nTHE SIXTH CANON.\n\nCONCERNING LUNA AND THE PROPERTIES THEREOF.\n\nThe endeavour to make Saturn or Mars out of Luna involves no lighter or easier work than to make Luna, with great gain, out of Mercury, Jupiter, Mars, Venus, or Saturn.\n\nIt is not useful to transmute what is perfect into what is imperfect, but the latter into the former.\n\nNevertheless, it is well to know what is the material of Luna, or whence it proceeds.\n\nWhoever is not able to consider or find this out will neither be able to make Luna.\n\nIt will be asked, What is Luna?\n\nIt is among the seven metals which are spiritually concealed, itself the seventh, external, corporeal, and material.\n\nFor this seventh always contains the six metals spiritually hidden in itself.\n\nAnd the six spiritual metals do not exist without one external and material metal.\n\nSo also no corporeal metal can have place or essence without those six spiritual ones.\n\nThe seven corporeal metals mix easily by means of liquefaction, but this mixture is not useful for making Sol or Luna.\n\nFor in that mixture each metal remains in its own nature, or fixed in the fire, or flies from it.\n\nFor example, mix, in any way you can, Mercury, Jupiter, Saturn, Mars, Venus, Sol, and Luna.\n\nIt will not thence result that Sol and Luna will so change the other five that, by the agency of Sol and Luna, these will become Sol and Luna.\n\nFor though all be liquefied into a single mass, nevertheless each remains in its nature whatever it is.\n\nThis is the judgment which must be passed on corporeal mixture.\n\nBut concerning spiritual mixture and communion of the metals, it should be known that no separation or mortification is spiritual, because such spirits can never exist without bodies.\n\nThough the body should be taken away from them and mortified a hundred times in one hour, nevertheless, they would always acquire another much more noble than the former."

