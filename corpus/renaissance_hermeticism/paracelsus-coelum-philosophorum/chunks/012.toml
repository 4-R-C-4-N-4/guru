[content]
body = "In the absence of all ordeal by fire, there is no proving of a substance possible.\n\nFor fire tests everything, and when the impure matter is separated the three pure substances are displayed.\n\n– De Origine Morborum ex Tribus Primis Substanstiis – Paramirum , Lib.\n\nI., c.\n\n1.\n\nFire separates that which is constant or fixed from that which is fugitive or volatile.\n\n– De Morbis Metallicis , Lib.\n\nII., Tract I.\n\nFire is the father or active principle of separation.\n\n– \"Third Fragment on Tartar\" from the Fragmenta Medica .\n\n2.\n\nBy the mediation of Vulcan, or fire, any metal can be generated from Mercury.\n\nAt the same time, Mercury is imperfect as a metal; it is semi-generated and wanting in coagulation, which is the end of all metals.\n\nUp to the half way point of their generation all metals are Mercury.\n\nGold, for example, is Mercury; but it loses the Mercurial nature by coagulation, and although the properties of Mercury are present in it, they are dead, for their vitality is destroyed by coagulation.\n\n– De Morbis Metallicis , Lib.\n\nIII., Tract II., c.\n\n2.\n\nThe essences and arcanas which are latent in all the six metals are to be found in the substance of Mercury.\n\n– Ibid ., c.\n\n3.\n\nThere are two genera of Mercury, the fixed Mercury of earth and another kind which descends from the daily constellation.\n\n– Ibid ., Lib.\n\nI., Tract II., c.\n\n4.\n\nAs there is a red and white Sulphur of Marcasites, a yellow, red, and black Sulphur of Talc, a purple and black Sulphur of the Cachimiae, a Sulphur of Cinnabar, and, in like manner, of marble, amethyst, etc., so is there a special Mercury of Copper, Plumbago, Zinc, Arsenic, etc.\n\n– Ibid .\n\nMercury is not Quicksilver, for Mercury is dead, while Quicksilver is living.\n\n– De Hydropisi .\n\n3.\n\nNothing of true value is located in the body of a substance, but in the virtue.\n\nAnd this is the principle of the Quintessence, which reduces, say, 20lbs.\n\ninto a single ounce, and that ounce far exceeds the entire 20lbs.\n\nin potency.\n\nHence the less there is of body, the more in proportion is the virtue.\n\n– De Origine Morborum Invisibilium , Lib.\n\nIV.\n\n4 .Tin or Jupiter, is pure Mercury coagulated with a small quantity of Salt, but combined with a larger proportion of white Sulphur.\n\nIt derives its colours, white, yellow, or red, from its Mercury.\n\nIts sublimation is also by Mercury, and its resolution by Salt, and it is sublimed and resolved by these.\n\n– De Elemento Aquae , Tract III., c.\n\n6.\n\n5.\n\nIn the generation of Iron there is a larger proportion of Salt and Mercury, while the red Sulphur from which copper proceeds is present in a smaller quantity.\n\nIt contains also a cuprine salt, but not in equal proportion with Mercury.\n\nIts constituents are its own body, which preponderates; then comes Salt, afterwards Mercury, and, lastly, Sulphur.\n\nWhen there is more Salt than the composition of Sulphur requires, the metal can in no wise be made, for it depends upon an equal weight of each.\n\nFor fluxibility proceeds from Mercury and coagulation from Salt.\n\nAccordingly, if there be too much Salt it becomes too hard.\n\n– De Elemento Aquae , Lib.\n\nI V., Tract III., c.\n\n4.\n\n6."

