[content]
body = "It is of an obscure and transparent blackness, the colour of iron.\n\nIt is the hardest of all; but is dissolved in the blood of a goat.\n\nIts size at the largest does not exceed that of a hazel nut.\n\nThe Magnet Is an iron stone, and so attracts iron to itself.\n\nThe Pearl .\n\nThe Pearl is not a stone, because it is produced in sea shells.\n\nIt is of a white colour.\n\nSeeing that it grows in animated beings, in men or in fishes, it is not properly of a stony nature, but properly a depraved (otherwise a transmuted) nature supervening upon a perfect work.\n\nThe Jacinth Is a yellow, transparent stone.\n\nThere is a flower of the same name which, according to the fable of the poets, is said to have been a man.\n\nThe Sapphire Is a stone of a celestial colour and a heavenly nature.\n\nThe Ruby Shines with an intensely red nature.\n\nThe Carbuncle .\n\nA solar stone, shining by its own nature like the sun.\n\nThe Coral Is a white or red stone, not transparent.\n\nIt grows in the sea, out of the nature of the water and the air, into the form of wood or a shrub; it hardens in the air, and is not capable of being destroyed in fire.\n\nThe Chalcedony Is a stone made up of different colours, occupying a middle place between obscurity and transparency, mixed also with cloudiness, and liver coloured.\n\nIt is the lowest of all the precious stones.\n\nThe Topaz Is a stone shining by night.\n\nIt is found among rocks.\n\nThe Amethyst Is a stone of a purple and blood colour.\n\nThe Chrysoprasus Is a stone which appears like fire by night, and like gold by day.\n\nThe Crystal Is a white stone, transparent, and very like ice.\n\nIt is sublimated, extracted, and produced from other stones.\n\nAs a pledge and firm foundation of this matter, note the following conclusion.\n\nIf anyone intelligently and reasonably takes care to exercise himself in learning about the metals, what they are, and whence they are produced: he may know that our metals are nothing else than the best part and the spirit of common stones, that is, pitch, grease, fat, oil, and stone.\n\nBut this is least pure, uncontaminated, and perfect, so long as it remains hidden or mixed with the stones.\n\nIt should therefore be sought and found in the stones, be recognised in them, and extracted from them, that is, forcibly drawn out and liquefied.\n\nFor then it is no longer a stone, but an elaborate and perfect metal, comparable to the stars of heaven, which are themselves, as it were, stones separated from those of earth.\n\nWhoever, therefore, studies minerals and metals must be furnished with such reason and intelligence that he shall not regard only those common and known metals which are found in the depth of the mountains alone.\n\nFor there is often found at the very surface of the earth such a metal as is not met with at all, or not equally good, in the depths.\n\nAnd so every stone which comes to our view, be it great or small, flint or simple rock, should be carefully investigated and weighed with a true balance, according to its nature and properties.\n\nVery often a common stone, thrown away and despised, is worth more than a cow.\n\nRegard must not always be had to the place of digging from which this stone came forth; for here the influence of the sky prevails.\n\nEverywhere there is presented to us earth, or dust, or sand, which often contain much gold or silver, and this you will mark.\n\nHERE ENDS THE COELUM PHILOSOPHORUM.\n\nNOTES 1.\n\nThe three prime substances are proved only by fire, which manifests them pure, naked, clean, and simple."

