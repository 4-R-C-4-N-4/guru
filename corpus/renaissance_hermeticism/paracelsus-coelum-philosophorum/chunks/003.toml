[content]
body = "In like manner, they do not much fear those of an inferior order, because they are remote, and none of the living knows their condition or has experienced the misery of their punishment.\n\nFor this cause an infernal spirit is accounted as nothing.\n\nFor more remote objects are on that account held more cheaply and occupy a lower place, since according to the propriety of its position each object turns out better, or is transmuted.\n\nThis can be proved by various examples.\n\nThe more remote, therefore, Jupiter is found to be from Mars and Venus, and the nearer Sol and Luna, the more \"goldness\" or \"silveriness\", if I may so say, it contains in its body, and the greater, stronger, more visible, more tangible, more amiable, more acceptable, more distinguished, and more true it is found than in some remote body.\n\nAgain, the more remote a thing is, of the less account is it esteemed in all the respects aforesaid, since what is present is always preferred before what is absent.\n\nIn proportion as the nearer is clear the more remote is occult.\n\nThis, therefore, is a point which you, as an Alchemist, must seriou(S)ly debate with yourself, how you can relegate Jupiter to a remote and abstruse place, which Sol and Luna occupy, and how, in turn, you can summon Sol and Luna from remote positions to a near place, where Jupiter is corporeally posited; so that, in the same way, Sol and Luna also may really be present there corporeally before your eyes.\n\nFor the transmutation of metals from imperfection to perfection there are several practical receipts.\n\nMix the one with the other.\n\nThen again separate the one pure from the other.\n\nThis is nothing else but the process of permutation, set in order by perfect alchemical labour.\n\nNote that Jupiter has much gold and not a little silver.\n\nLet Saturn and Luna be imposed on him, and of the rest Luna will be augmented.\n\nTHE THIRD CANON.\n\nCONCERNING MARS AND HIS PROPERTIES.\n\nThe six occult metals have expelled the seventh from them, and have made it corporeal, leaving it little efficacy, and imposing on it great hardness and weight.\n\nThis being the case, they have shaken off all their own strength of coagulation and hardness, which they manifest in this other body.\n\nOn the contrary, they have retained in themselves their colour and liquefaction, together with their nobility.\n\nIt is very difficult and laborious for a prince or a king to be produced out of an unfit and common man.\n\nBut Mars acquires dominion.\n\nwith strong and pugnacious hand, and seizes on the position of king.\n\nHe should, however, be on his guard against snares; that he be not led captive suddenly and unexpectedly.\n\nIt must also be considered by what method Mars may be able to take the place of king, and Sol and Luna, with Saturn, hold the place of Mars.\n\nTHE FOURTH CANON.\n\nCONCERNING VENUS AND ITS PROPERTIES.\n\nThe other six metals have rendered Venus an extrinsical body by means of all their colour and method of liquefaction.\n\nIt may be necessary, in order to understand this, that we should show, by some examples, how a manifest thing may be rendered occult, and an occult thing rendered materially manifest by means of fire.\n\nWhatever is combustible can be naturally transmuted by fire from one form into another, namely, into lime, soot, ashes, glass, colours, stones, and earth.\n\nThis last can again be reduced to many new metallic bodies.\n\nIf a metal, too, be burnt, or rendered fragile by old rust, it can again acquire malleability by applications of fire.\n\nTHE FIFTH CANON.\n\nCONCERNING THE NATURE AND PROPERTIES OP SATURN."

