[content]
body = "Note, that Sol and Luna can be made easily from Mercury, Saturn, and Jupiter, but from Mars and Venus with difficulty.\n\nIt is possible to make them, however, but with the addition of Sol and Luna.\n\nOut of Magnesium and Saturn comes Luna, and out of Jupiter and Cinnabar pure Sol takes its rise.\n\nThe skilful artist, however (how well I remember!), will be able by diligent consideration to prepare metals so that, led by a true method of reasoning, he can promote the perfection of metallic transformation more than do the courses of the twelve signs and the seven planets.\n\nIn such matters it is quite superfluous to watch these courses, as also their aspects, good or bad days or hours, the prosperous or unlucky condition of this or that planet, for these matters can do no good, and much less can they do harm in the art of natural Alchemy.\n\nIf otherwise, and you have a feasible process, operate when you please.\n\nIf, however, there be anything wanting in you or your mode of working, or your understanding, the planets and the stars of heaven will fail you in your work.\n\nIf metals remain buried long enough in the earth, not only are they consumed by rust, but by long continuance they are even transmuted into natural stones, and there are a great many of these; but this is known to few.\n\nFor there is found in the earth old stone money of the heathens, printed with their different figures.\n\nThese coins were originally metallic, but through the transmutation brought about by Nature, they were turned into stone.\n\nWHAT ALCHEMY IS.\n\nAlchemy is nothing else but the set purpose, intention, and subtle endeavour to transmute the kinds of the metals from one to another.\n\nAccording to this, each person, by his own mental grasp, can choose out for himself a better way and Art, and therein find truth, for the man who follows a thing up more intently does find the truth.\n\nIt is highly necessary to have a correct estimation of stars and of stones, because the star is the informing spirit of all stones.\n\nFor the Sol and Luna of all the celestial stars are nothing but one stone in itself; and the terrestrial stone has come forth from the celestial stone; through the same fire, coals, ashes, the same expulsions and repurgations as that celestial stone, it has been separated and brought, clear and pure in its brightness.\n\nThe whole ball of the earth is only something thrown off, concrete, mixed, corrupted, ground, and again coagulated, and gradually liquefied into one mass, into a stony work, which has its seat and its rest in the midst of the firmamental sphere.\n\nFurther it is to be remarked that those precious stones which shall forth-with be set down have the nearest place to the heavenly or sidereal ones in point of perfection, purity, beauty, brightness, virtue, power of withstanding fire, and incorruptibility, and they have been fixed with other stones in the earth.\n\nThey have, therefore, the greatest affinity with heavenly stones and with the stars, because their natures are derived from these.\n\nThey are found by men in a rude environment, and the common herd (whose property it is to take false views of things) believe that they were produced in the same place where they are found, and that they were afterwards polished, carried around, and sold, and accounted to be great riches, on account of their colours, beauty, and other virtues.\n\nA brief description of them follows: The Emerald.\n\nThis is a green transparent stone.\n\nIt does good to the eyes and the memory.\n\nIt defends chastity; and if this be violated by him who carries it, the stone itself does not remain perfect.\n\nThe Adamant .\n\nA black crystal called Adamant or else Evax, on account of the joy which it is effectual in impressing on those who carry it."

