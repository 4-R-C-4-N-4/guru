[content]
body = "But what must be done besides to Mercury in order that its moisture and heat may be taken away, and in their place such an extreme cold introduced as to congeal, consolidate, and altogether mortify the Mercury?\n\nDo what follows in the sentence subjoined: Take pure Mercury closely shut up in a silver pixis.\n\nFill a jar with fragments of lead, in the midst of which place the pixis.\n\nLet it melt for twenty-four hours, that is, for a natural day.\n\nThis takes away from Mercury his occult heat, adds an external heat, and contributes the internal coldness of Saturn and Luna (which are both planets of a cold nature), whence and whereby the Mercury is compelled to congeal, consolidate, and harden.\n\nNote also that the coldness (which Mercury needs in its consolidation and mortification) is not perceptible by the external sense, as the cold of snow or of ice is, but rather, externally, there is a certain amount of apparent heat.\n\nJust in the same way is it with the heat of Mercury, which is the cause of its fluidity.\n\nIt is not an external heat, perceptible in the same way as one of our qualities.\n\nNay, externally a sort of coldness is perceptible.\n\nWhence the Sophists (a race which has more talk than true wisdom) falsely assert that Mercury is cold and of a moist nature, so that they go on and advise us to congeal it by means of heat; whereas heat only renders it more fluid, as they daily find out to their own loss rather than gain.\n\nTrue Alchemy which alone, by its unique Art, teaches how to fabricate Sol and Luna from the five imperfect metals, allows no other receipt than this, which well and truly says: Only from metals, in metals, by metals, and with metals, are perfect metals made, for in some things is Luna and in other metals is Sol.\n\nWHAT MATERIALS AND INSTRUMENTS ARE REQUIRED IN ALCHEMY.\n\nThere is need of nothing else but a foundry, bellows, tongs, hammers, cauldrons, jars, and cupels made from beechen ashes.\n\nAfterwards, lay on Saturn, Jupiter, Mars, Sol, Venus, Mercury, and Luna.\n\nLet them operate finally up to Saturn.\n\nTHE METHOD OF SEEKING MINERALS.\n\nThe hope of finding these in the earth and in stones is most uncertain, and the labour very great.\n\nHowever, since this is the first mode of getting them, it is in no way to be despised, but greatly commended.\n\nSuch a desire or appetite ought no more to be done away with than the lawful inclination of young people, and those in the prime of life, to matrimony.\n\nAs the bees long for roses and other flowers for the purpose of making honey and wax, so, too, men – apart from avarice or their own aggrandisement – should seek to extract metal from the earth.\n\nHe who does not seek it is not likely to find it.\n\nGod dowers men not only with gold or silver, but also with poverty, squalor, and misery.\n\nHe has given to some a singular knowledge of metals and minerals, whereby they have obtained an easier and shorter method of fabricating gold and silver, without digging and smelting them, than they were commonly accustomed to, by extracting them from their primitive bodies.\n\nAnd this is the case not only with subterranean substances, but by certain arts and knowledge they have extracted them from the five metals generally (that is to say, from metals excocted from minerals which are imperfect and called metals), viz., from Mercury, Jupiter, Saturn, Mars and Venus, from all of which, and from each of them separately, Sol and Luna can be made, but from one more easily than from another."

