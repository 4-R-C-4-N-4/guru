[content]
body = "These and the like, whereof there are some very far-fetched in Alchemy, are mere incumbrances of work; since even if Sol and Luna could be made by them they rather hinder and delay than further one’s purpose.\n\nBut it is not from these – to say the truth – that the Art of making Sol and Luna is to be learnt.\n\nSo, then, all these things should be passed by, because they have no effect with the five metals, so far as Sol and Luna are concerned.\n\nSomeone may ask, What, then, is this short and easy way, which involves no difficulty, and yet whereby Sol and Luna can be made?\n\nOur answer is, this has been fully and openly explained in the Seven Canons.\n\nIt would be lost labour should one seek further to instruct one who does not understand these.\n\nIt would be impossible to convince such a person that these matters could be so easily understood, but in an occult rather than in an open sense.\n\nTHE ART IS THIS: After you have made heaven, or the sphere of Saturn, with its life to run over the earth, place on it all the planets, or such, one or more, as you wish, so that the portion of Luna may be the smallest.\n\nLet all run, until heaven, or Saturn, has entirely disappeared.\n\nThen all those planets will remain dead with their old corruptible bodies, having meanwhile obtained another new, perfect, and incorruptible body.\n\nThat body is the spirit of heaven.\n\nFrom it these planets again receive a body and life, and live as before.\n\nTake this body from the life and the earth.\n\nKeep it.\n\nIt is Sol and Luna.\n\nHere you have the Art altogether, clear and entire.\n\nIf you do not yet understand it, or are not practised therein, it is well.\n\nIt is better that it should be kept concealed, and not made public.\n\nHOW TO CONJURE THE CRYSTAL SO THAT ALL THINGS MAY BE SEEN IN IT.\n\nTo conjure is nothing else than to observe anything rightly, to know and to understand what it is.\n\nThe crystal is a figure of the air.\n\nWhatever appears in the air, movable or immovable, the same appears also in the speculum or crystal as a wave.\n\nFor the air, the water, and the crystal, so far as vision is concerned, are one, like a mirror in which an inverted copy of an object is seen.\n\nCONCERNING THE HEAT OF MERCURY.\n\nThose who think that Mercury is of a moist and cold nature are plainly in error, because it is by its nature in the highest degree warm and moist, which is the cause of its being in a constant state of fluidity.\n\nIf it were of a moist and cold nature it would have the appearance of frozen water, and be always hard and solid, so that it would be necessary to liquefy it by the heat of fire, as in the case of the other metals.\n\nBut it does not require this, since it has liquidity and flux from its own heat naturally inborn in it, which keeps it in a state of perpetual fluidity and renders it \"quick\", so that it can neither die, nor be coagulated, nor congealed.\n\nAnd this is well worth noticing, that the spirits of the seven metals, or as many of them as have been commingled, as soon as they come into the fire, contend with one another, especially Mercury, so that each may put forth its powers and virtues in the endeavour to get the mastery in the way of liquefying and transmuting.\n\nOne seizes on the virtue, life, and form of another, and assigns some other nature and form to this one.\n\nSo then the spirits or vapours of the metals are stirred up by the heat to operate mutually one upon the other, and transmute from one virtue to another, until perfection and purity are attained."

