[content]
body = "And this is the transposition of the metals from one death to another, that is to say, from a lesser degree into one greater and higher, namely, into Luna; and from a better into the best and most most perfect, that is, into Sol, the brilliant and altogether royal metal.\n\nIt is most true, then, as frequently said above, that the six metals always generate a seventh, or produce it from themselves clear in its esse .\n\nA question may arise: If it be true that Luna and every metal derives its origin and is generated from the other six, what is then its property and its nature?\n\nTo this we reply: From Saturn, Mercury, Jupiter, Mars, Venus, and Sol, nothing and no other metal than Luna could be made.\n\nThe cause is that each metal has two good virtues of the other six, of which altogether there are twelve.\n\nThese are the spirit of Luna, which thus in a few words may be made known.\n\nLuna is composed of the six spiritual metals and their virtues, whereof each possesses two.\n\nAltogether, therefore, twelve are thus posited in one corporeal metal, which are compared to the seven planets and the twelve celestial signs.\n\nLuna has from the planet Mercury, and from Aquarius and Pisces, its liquidity and bright white colour.\n\nSo Luna has from Jupiter, with Sagittarius and Taurus, its white colour and its great firmness in fire.\n\nLuna has from Mars, with Cancer and Aries, its hardness and its clear sound.\n\nLuna has from Venus, with Gemini and Libra, its measure of coagulation and its From Saturn, with Virgo and Scorpio, its homogeneous body, with gravity.\n\nFrom Sol, with Leo and Virgo, its spotless purity and great constancy against the power of fire.\n\nSuch is the knowledge of the natural exaltation and of the course of the spirit and body of Luna, with its composite nature and wisdom briefly summarised.\n\nFurthermore, it should be pointed out what kind of a body such metallic spirits acquire in their primitive generation by means of celestial influx.\n\nFor the metal-digger, when he has crushed the stone, contemptible as it is in appearance, liquefies it, corrupts it, and altogether mortifies it with fire.\n\nThen this metallic spirit, in such a process of mortification, receives a better and more noble body, not friable but malleable.\n\nThen comes the Alchemist, who again corrupts, mortifies, and artificially prepares such a metallic body.\n\nThus once more that spirit of the metal assumes a more noble and more perfect body, putting itself forward clearly into the light, except it be Sol or Luna.\n\nThen at last the metallic spirit and body are perfectly united, are safe from the corruption of elementary fire, and also incorruptible.\n\nTHE SEVENTH CANON.\n\nCONCERNING THE NATURE OF SOL AND ITS PROPERTIES.\n\nThe seventh after the six spiritual metals is corporeally Sol, which in itself is nothing but pure fire.\n\nWhat in outward appearance is more beautiful, more brilliant, more clear and perceptible, a heavier, colder, or more homogeneous body to see?\n\nAnd it is easy to perceive the cause of this, namely, that it contains in itself the congelations of the other six metals, out of which it is made externally into one most compact body.\n\nIts liquefaction proceeds from elementary fire, or is caused by the liquations of Mercury, with Pisces and Aquarius, concealed spiritually within it.\n\nThe most manifest proof of this is that Mercury is easily mingled corporeally with the Sun as in an embrace.\n\nBut for Sol, when the heat is withdrawn and the cold supervenes after liquefaction, to coagulate and to become hard and solid, there is need of the other five metals, whose nature it embraces in itself – Jupiter, Saturn, Mars, Venus, Luna."

