body = "THE COELUM PHILOSOPHORUM, OR BOOK OF VEXATIONS; By PHILIPPUS THEOPHRASTUS PARACELSUS.\n\nTHE SCIENCE AND NATURE OF ALCHEMY, AND WHAT OPINION SHOULD BE FORMED THEREOF.\n\nRegulated by the Seven Rules or Fundamental Canons according to the seven commonly known Metals; and containing a Preface with certain Treatises and Appendices.\n\nTHE PREFACE OF THEOPHRASTUS PARACELSUS TO ALL ALCHEMISTS AND READERS OF THIS BOOK.\n\nYOU who are skilled in Alchemy, and as many others as promise yourselves great riches or chiefly desire to make gold and silver, which Alchemy in different ways promises and teaches; equally, too, you who willingly undergo toil and vexations, and wish not to be freed from them, until you have attained your rewards, and the fulfilment of the promises made to you; experience teaches this every day, that out of thousands of you not even one accomplishes his desire.\n\nIs this a failure of Nature or of Art?\n\nI say, no; but it is rather the fault of fate, or of the unskilfulness of the operator.\n\nSince, therefore, the characters of the sign of the stars and planets of heaven, together with the other names, inverted words, receipts, materials, and instruments are thoroughly well known to such as are acquainted with this art, it would be altogether superfluous to recur to these same subjects in the present book, although the use of such signs, names, and characters at the proper time is by no means without advantage.\n\nBut herein will be noticed another way of treating Alchemy different from the previous method, and deduced by Seven Canons from the sevenfold series of the metals.\n\nThis, indeed, will not give scope for a pompous parade of words, but, nevertheless, in the consideration of those Canons everything which should be separated from Alchemy will be treated at sufficient length, and, moreover, many secrets of other things are herein contained.\n\nHence, too, result certain marvellous speculations and new operations which frequently differ from the writings and opinions of ancient operators and natural philosophers, but have been discovered and confirmed by full proof and experimentation.\n\nMoreover, in this Art nothing is more true than this, though it be little known and gains small confidence.\n\nAll the fault and cause of difficulty in Alchemy, whereby very many persons are reduced to poverty, and others labour in vain, is wholly and solely lack of skill in the operator, and the defect or excess of materials, whether in quantity or quality, whence it ensues that, in the course of operation, things are wasted or reduced to nothing.\n\nIf the true process shall have been found, the substance itself while transmuting approaches daily more and more towards perfection.\n\nThe straight road is easy, but it is found by very few.\n\nSometimes it may happen that a speculative artist may, by his own eccentricity, think out for himself some new method in Alchemy, be the consequence anything or nothing.\n\nHe need do nought in order to reduce something into nothing, and again bring back something out of nothing.\n\nYet this proverb of the incredulous is not wholly false.\n\nDestruction perfects that which is good; for the good cannot appear on account of that which conceals it.\n\nThe good is least good whilst it is thus concealed.\n\nThe concealment must be removed that so the good may be able freely to appear in its own brightness.\n\nFor example, the mountain, the sand, the earth, or the stone in which a metal has grown is such a concealment.\n\nEach one of the visible metals is a concealment of the other six metals.\n\nBy the element of fire all that is imperfect is destroyed and taken away, as, for instance, the five metals, Mercury, Jupiter, Mars, Venus, and Saturn."

