[content]
body = "It works essentially where otherwise there is no hope.\n\nIt accomplishes that which is deemed impossible.\n\nWhat appears beyond belief or hope emerges into truth after a wonderful fashion.\n\nNOTE ON MERCURIUS VIVUS.\n\nWhatever tinges with a white colour has the nature of life, and the properties and power of light, which causally produces life.\n\nWhatever, on the other hand, tinges with blackness, or produces black, has a nature in common with death, the properties of darkness, and forces productive of death.\n\nThe earth with its frigidity is a coagulation and fixation of this kind of hardness.\n\nFor the house is always dead; but he who inhabits the house lives.\n\nIf you can discover the force of this illustration you have conquered.\n\nTested liquefactive powder.\n\nBurn fat verbena.\n\nRecipe.\n\n– Salt nitre, four ounces; a moiety of sulphur; tartar, one ounce.\n\nMix and liquefy.\n\nWHAT IS TO BE THOUGHT CONCERNING THE CONGELATION OF MERCURY.\n\nTo mortify or congeal Mercury, and afterwards seek to turn it into Luna, and to sublimate it with great labour, is labour in vain, since it involves a dissipation of Sol and Luna existing therein.\n\nThere is another method, far different and much more concise, whereby, with little waste of Mercury and less expenditure of toil, it is transmuted into Luna without congelation.\n\nAny one can at pleasure learn this Art in Alchemy, since it is so simple and easy; and by it, in a short time, he could make any quantity of silver and gold.\n\nIt is tedious to read long descriptions, and everybody wishes to be advised in straightforward words.\n\nDo this, then; proceed as follows, and you will have Sol and Luna, by help whereof you will turn out a very rich man.\n\nWait awhile, I beg, while this process is described to you in few words, and keep these words well digested, so that out of Saturn, Mercury, and Jupiter you may make Sol and Luna.\n\nThere is not, nor ever will be, any art so easy to find out and practise, and so effective in itself.\n\nThe method of making Sol and Luna by Alchemy is so prompt that there is no more need of books, or of elaborate instruction, than there would be if one wished to write about last year's snow.\n\nCONCERNING THE RECEIPTS OF ALCHEMY.\n\nWhat, then, shall we say about the receipts of Alchemy, and about the diversity of its vessels and instruments?\n\nThese are furnaces, glasses, jars, waters, oils, limes, sulphurs, salts, saltpetres, alums, vitriols, chrysocollae, copper-greens, atraments, auri-pigments, fel vitri, ceruse, red earth, thucia, wax, lutum sapientiae, pounded glass, verdigris, soot, testae ovorum, crocus of Mars, soap, crystal, chalk, arsenic, antimony, minium, elixir, lazurium, gold-leaf, salt-nitre, sal ammoniac, calamine stone, magnesia, bolus armenus, and many other things.\n\nMoreover, concerning preparations, putrefactions, digestions, probations, solutions, cementings, filtrations, reverberations, calcinations, graduations, rectifications, amalgamations, purgations, etc., with these alchemical books are crammed.\n\nThen, again, concerning herbs, roots, seeds, woods, stones, animals, worms, bone dust, snail shells, other shells, and pitch."

