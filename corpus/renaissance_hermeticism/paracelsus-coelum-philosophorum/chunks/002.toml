[content]
body = "On the other hand, the perfect metals, Sol and Luna, are not consumed in that same fire.\n\nThey remain in the fire: and at the same time, out of the other imperfect ones which are destroyed, they assume their own body and become visible to the eyes.\n\nHow, and by what method, this comes about can be gathered from the Seven Canons.\n\nHence it may be learnt what are the nature and property of each metal, what it effects with the other metals, and what are its powers in commixture with them.\n\nBut this should be noted in the very first place: that these Seven Canons cannot be perfectly understood by every cursory reader at a first glance or a single reading.\n\nAn inferior intelligence does not easily perceive occult and abstruse subjects.\n\nEach one of these Canons demands no slight discussion.\n\nMany persons, puffed up with pride, fancy they can easily comprehend all which this book comprises.\n\nThus they set down its contents as useless and futile, thinking they have something far better of their own, and that therefore they can afford to despise what is here contained.\n\nTHE COELUM PHILOSOPHORUM.\n\nPART I.\n\nTHE SEVEN CANONS OF THE METALS.\n\nTHE FIRST CANON.\n\nCONCERNING THE NATURE AND PROPERTIES OF MERCURY.\n\nAll things are concealed in all.\n\nOne of them all is the concealer of the rest – their corporeal vessel, external, visible, and movable.\n\nAll liquefactions are manifested in that vessel.\n\nFor the vessel is a living and corporeal spirit, and so all coagulations or congelations enclosed in it, when prevented from flowing and surrounded, are not therewith content.\n\nNo name can be found for this liquefaction, by which it may be designated; still less can it be found for its origin.\n\nAnd since no heat is so strong as to be equalised therewith, it should be compared to the fire of Gehenna.\n\nA liquefaction of this kind has no sort of connection with others made by the heat of natural fire, or congelated or coagulated by natural cold.\n\nThese congelations, through their weakness, are unable to obtain in Mercury, and therefore, on that account, he altogether contemns them.\n\nHence one may gather that elementary powers, in their process of destruction, can add nothing to, nor take away anything from, celestial powers (which are called Quintessence or its elements), nor have they any capacity for operating.\n\nCelestial and infernal powers do not obey the four elements, whether they be dry, moist, hot, or cold.\n\nNo one of them has the faculty of acting against a Quintessence; but each one contains within itself its own powers and means of action.\n\nTHE SECOND CANON.\n\nCONCERNING THE NATURE AND PROPERTIES OF JUPITER.\n\nIn that which is manifest (that is to say, the body of Jupiter) the other six corporeal metals are spiritually concealed, but one more deeply and more tenaciously than another.\n\nJupiter has nothing of a Quintessence in his composition, but is of the nature of the four elementaries.\n\nOn this account this liquefaction is brought about by the application of a moderate fire, and, in like manner, he is coagulated by moderate cold.\n\nHe has affinity with the liquefactions of all the other metals.\n\nFor the more like he is to some other nature, the more easily he is united thereto by conjunction.\n\nFor the operation of those nearly allied is easier and more natural than of those which are remote.\n\nThe remote body does not press upon the other.\n\nAt the same time, it is not feared, though it may be very powerful.\n\nHence it happens that men do not aspire to the superior orders of creation, because they are far distant from them, and do not see their glory."

