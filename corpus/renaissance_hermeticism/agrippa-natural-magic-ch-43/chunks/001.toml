[content]
body = "CHAPTER XLIII.\n\nOf Perfumes or Suffumigations; Their Manner and Power .\n\nSome suffumigations, also, or perfumings, that are proper to the Stars, are of great force for the opportune receiving of celestial gifts under the rays of the Stars, in as much as they do strongly work upon the air and breath.\n\nFor our breath is very much changed by such kind of vapors, if both vapors be of another like.\n\nThe air, also, being through the said vapors easily moved, or affected with the qualities of inferiors or those celestial, daily; and, quickly penetrating our breast and vitals, doth wonderfully reduce us to the like qualities.\n\nWherefore, suffumigations are wont to be used by them that are about to soothsay or predict for to affect their fancy or conception; which suffumigations, indeed, being duly appropriated to any certain deities, do fit us to receive divine inspiration.\n\nSo they say that fumes made with linseed, flea-bane seed, roots of violets, and parsley, doth make one to foresee things to come and doth conduce to prophesying.\n\nLet no man wonder how great things suffumigations can do in the air, especially when he shall with Porphyrius consider that by certain vapors, exhaling from proper suffumigations, airy spirits are presently raised, as also thunderings and lightnings, and such like things.\n\nAs the liver of a chameleon, being burnt on top of the house, doth, as is manifest, raise showers and lightnings.\n\nIn like manner the head and throat of the chameleon, if they be burnt with oaken wood, cause storms and lightnings.\n\nThere are also suffumigations under opportune influences of the Stars that make the images of spirits forthwith appear in the air or elsewhere.\n\nSo, they say, that if of coriander, smallage, henbane, and hemlock, be made a fume, that spirits will presently come together; hence they are called spirit's herbs.\n\nAlso, it is said, that fume made of the root of the reedy herb sagapen, with the juice of hemlock and henbane, and the herb tapsus barbatus, red sanders, and black poppy, makes spirits and strange shapes appear; and if smallage be added to them, the fume chaseth away spirits from any place and destroys their visions.\n\nIn like manner, a fume made of calamint, peony, mints, and palma christi, drives away all evil spirits and vain imaginations.\n\nMoreover, it is said, that by certain fumes certain animals are gathered together and also put to flight, as Pliny mentions concerning the stone liparis, that with the fume thereof all beasts are called out.\n\nSo the bones in the upper part of the throat of a hart, being burnt, gather all the serpents together; but the horn of the hart, being burnt, doth with its fume chase them all away.\n\nThe same doth a fume of the feathers of peacocks.\n\nAlso, the lungs of an ass, being burnt, puts all poisonous things to flight; the fume of the burnt hoof of a horse drives away mice; the same doth the hoof of a mule; with which, also, if it be the hoof of the left foot, flies are driven away."

