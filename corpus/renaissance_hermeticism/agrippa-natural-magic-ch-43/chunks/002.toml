[content]
body = "And, they say, if a house or any place be smoked with the gall of a cuttle-fish, made into a confection with red storax, roses, and lignum-aloes, or lignaloes, and if then there be some sea-water, or blood, cast into that place, the whole house will seem to be full of water or blood; and if some earth of plowed ground be cast there, the earth will seem to quake.\n\nNow, such kinds of vapors, we must conceive, do infect any body and infuse virtue into it, which Both continue long, even as any contagious or poisonous vapor of the pestilence, being kept for two years in the wall of a house infects the inhabitants, and as the contagion of pestilence, or leprosy, lying hid in a garment, doth long after infect him that wears it.\n\nTherefore, were certain suffumigations used to affect images, rings, and such like instruments of magic and hidden treasures, and, as Porphyrius saith, very effectually.\n\nSo, they say, if any one shall hide gold or silver, or any other precious thing, the Moon being in conjunction with the Sun, and shall fume the hiding place with coriander, saffron, henbane, smallage, and black poppy, of each alike quantity, bruised together, and tempered with the juice of hemlock, that which is so hid shall never be found or taken away; and that spirits shall continually keep it, and if any one shall endeavor to take it away he shall be hurt by them and shall fall into a frenzy.\n\nAnd Hermes saith that there is nothing like the fume of spermaceti for the raising of spirits.\n\nWherefore, if a fume be made of that and lignum-aloes, red storax, pepper-wort, musk, and saffron, all tempered together, with the blood of a lapwing, it will quickly gather airy spirits together, and if it be used about the graves of the dead, it gathers together spirits and the ghosts of the dead.\n\nSo, as often as we direct any work to the Sun, we must make suffumigations with Solary things, and if to the Moon, with Lunary things, and so of the rest.\n\nAnd we must know that as there is a contrariety and enmity in stars and spirits, so also in suffumigations unto the same.\n\nSo there is also a contrariety betwixt lignum aloes and sulphur, frankincense, and quicksilver; therefore, spirits that are raised by the fume of lignum aloes are allayed by the burning of sulphur.\n\nAs Proclus gives an example of a spirit, which was wont to appear in the form of a lion, but, by the setting of a cock before it, vanished away because there is a contrariety betwixt a cock and a lion, and so the like consideration and practice is to be observed concerning such like things."

