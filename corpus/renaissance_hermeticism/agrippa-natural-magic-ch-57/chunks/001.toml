[content]
body = "CHAPTER LVII.\n\nOf Geomancy, Hydromancy, Aeromancy, and Pyromancy, Four Divinations of Elements .\n\nMoreover , the Elements themselves teach us fatal events; whence those four famous kinds of divinations, Geomancy, Hydromancy, Aeromancy, and Pyromancy, have got their names, of which the sorceress in Lucan seems to boast herself when she saith: The Earth, the Aire, the Chaos, and the Skie, The Seas, the Fields, the Rocks, and Mountains high Foretell the truth—— The first, therefore, is Geomancy, which foreshows future things by the motions of the earth, as also the noise, the swelling, the trembling, the chops, the pits, and exhalation, and other impressions thereof, the art of which Almadel, the Arabian, sets forth.\n\nBut there is another kind of Geomancy which divines by points written upon the earth by a certain power in the fall of it, which is not of present speculation, but of that we shall speak hereafter.\n\nNow Hydromancy doth perform its presages by the impressions of waters, their ebbing and flowing, their increases, and depressions, their tempests, colors and the like; to which, also, are added visions which are made in the waters.\n\nA kind of divination found by the Persians, as Varro reports, was that of a boy who saw in the water the effigies of Mercury, which foretold, in a hundred and fifty verses, all the events of the war of Mithridates.\n\nWe read, also, that Numa Pompilius practiced Hydromancy, for in the water he called up the gods and learned of them things to come.\n\nWhich art also Pythagoras, a long time after Numa, practiced.\n\nThere was of old a kind of Hydromancy had in great esteem amongst the Assyrians, and it was called Lecanomancy, from a skin full of water, upon which they put plates of gold and silver and precious stones written upon with certain images, names and characters.\n\nTo this may be referred that art by which lead and wax, being melted and cast into the water, do express manifest marks of images of those things we desire to know.\n\nThere were also in former years fountains that did foretell things to come, as the fathers' fountain at Achaia, and that which was called the water of Juno, in Epidaurus; but of these more in the following chapter, where we shall speak of Oracles.\n\nHither also may be referred the divination of fishes, of which kind there was use made by the Lycians in a certain place which was called Dina, near the sea; in a wood dedicated to Apollo, was a hollow in the dry sand, into which he that went to consult of future things let down roasted meat, and presently that place was filled with water and a great multitude of fish and strange shapes, unknown to men, did appear; by the forms of which the prophet foretold what should come to pass.\n\nThese things doth Atheneus more at large relate in the history of the Lycians.\n\nAfter the same manner, also, doth Aeromancy divine by airy impressions, by the blowing of the winds, by rainbows, by circles round about the moon and stars, by mists and clouds, and by imagination in clouds and visions in the air.\n\nSo also Pyromancy divines by fiery impressions, and by stars with long tails, by fiery colors, by visions and imaginations in the fire."

