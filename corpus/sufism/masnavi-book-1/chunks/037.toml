[content]
body = "Like as the green thorn which is cropped by the camel, And then yields him pleasure and nutriment; When its greenness has gone and it becomes dry, If the camel crops that same thorn in the desert, It wounds his palate and mouth without pity, As if conserve of roses should turn to sharp swords.\n\nWhen bread is \"substance,\" it is as a green thorn; When 'tis \"form,\" 'tis as the dry and coarse thorn.\n\nAnd thou eatest it in the same way as of yore Thou wert wont to eat it, O helpless being, Eatest this dry thing in the same manner, After the real \"substance\" is mingled with dust; It has become mingled with dust, dry in pith and rind.\n\nO camel, now beware of that herb!\n\nThe Word is become foul with mingled earth; The water is become muddy; close the mouth of the well, Till God makes it again pure and sweet; Yea, till He purifies what He has made foul.\n\nPatience will accomplish thy desire, not haste.\n\nBe patient, God knows what is best.\n\n*NOTES: 1.\n\nMuhammadans think the forbidden fruit to have been wheat.\n\n2.\n\nThe descending node of the moon (see Gulshan i Raz, I.\n\n233)."

