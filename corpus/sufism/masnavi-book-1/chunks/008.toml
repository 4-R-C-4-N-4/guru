body = "If thou neglectest regard and care for it, Thou wilt quench at midnight the lamp of union.\" In one 'twas said, \"Quench that torch without fear, That in lieu of one thou may'st see a thousand joys, For by quenching the light the soul is rejoiced, And thy Laila is then as bold as her Majnun.\n\nWhoso to display his devotion renounces the world, The world is ever with him, before and behind.\" In one 'twas said, \"Whatsoever God has given thee In His creation, that He has made sweet to thee; Yea, pleasant to thee and allowable.\n\nTake it, then, And cast not thyself into the pangs of abstinence.\" In one 'twas said, \"Give up all thou possessest, For to be ruled by covetousness is grievous sin.\" (Ah!\n\nhow many diverse roads are pointed out, And each followed by some sect for dear life!\n\nIf the right road were easily attainable, Every Jew and Gueber would have hit on it!) In one 'twas said, \"The right road is attainable, For the heart's life is the food of the soul.\n\nWhatever is enjoyed by the carnal man Yields no fruit, even as salt and waste land.\n\nIts result is naught but remorse, Its traffic yields only loss.\n\nIt is not profitable in the long run; Its name is called 'bankrupt' in the upshot.\n\nDiscern, then, the bankrupt from the profitable, Consider the eventual value of this and that.\" In one 'twas said, \"Choose ye a wise Director, But foresight of results is not found in dignities.\" (Each sect looked to results in a different way, And so, perforce, became captive to errors.\n\nReal foresight of results is not simple jugglery, Otherwise all these differences would not have arisen.\n\nIn one 'twas said, \"Thyself art thy master, Inasmuch as thou art acquainted with the Master of all; Be a man, and not another man's beast of burden!\n\nFollow thine own way and lose not thy head!\" In one 'twas said, \"All we see is One.\n\nWhoever says 'tis two is suffering from double vision.\" In one 'twas said, \"A hundred are even as one.\"7 But whoso thinks this is a.\n\nmadman.\n\nEach scroll had its contrary piece of rhetoric, In form and substance utterly opposed to it; This contrary to that, from first to last, As if each was compounded of poison and antidotes.\n\n*NOTES: 1.\n\nCompare the story of Zopyrus, Herodotus, iii.\n\n155.\n\n2.\n\nJohn xiv.\n\n26: \"But the Comforter (parakletos) shall teach you all things.\" Mosalmans read periklytos, \"praised\" = Muhammad.\n\n3.\n\nDajjal, i.e., Antichrist.\n\nSale, Prelim.\n\nDiscourse, p.\n\n57.\n\n4.\n\nSaid of the Seven Sleepers in the cave.\n\nKoran xviii.\n\n17; \"Knower\" = the Gnostic who through ecstasy beholds divine verities.\n\n5.\n\nThis was the doctrine of the Jabriyan or extreme predestinarians.\n\n6.\n\ni.e..\n\nHide not thy light (of good works or of self-denial) under a bushel.\n\n7.\n\nAlluding to the doctrine of the Trinity."

