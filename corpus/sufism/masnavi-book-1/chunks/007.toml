[content]
body = "Every night spirits are released from this cage, And set free, neither lording it nor lorded over.\n\nAt night prisoners are unaware of their prison, At night kings are unaware of their majesty.\n\nThen there is no thought or care for loss or gain, No regard to such an one or such an one.\n\nThe state of the \"Knower\" is such as this, even when awake.\n\nGod says,4 \"Thou wouldst deem him awake though asleep, Sleeping to the affairs of the world, day and night, Like a pen in the directing hand of the writer.\n\nHe who sees not the hand which effects the writing Fancies the effect proceeds from the motion of the pen.\n\nIf the \"Knower\" revealed the particulars of this state, 'Twould rob the vulgar of their sensual sleep.\n\nHis soul wanders in the desert that has no similitude; Like his body, his spirit is enjoying perfect rest; Freed from desire of eating and drinking, Like a bird escaped from cage and snare.\n\nBut when he is again beguiled into the snare, He cries for help to the Almighty.\n\nLaila and the Khalifa.\n\nThe Khalifa said to Laila, \"Art thou really she For whom Majnun lost his head and went distracted?\n\nThou art not fairer than many other fair ones.\" She replied, \"Be silent; thou art not Majnun!\" If thou hadst Majnun's eyes, The two worlds would be within thy view.\n\nThou art in thy senses, but Majnun is beside himself.\n\nIn love to be wide awake is treason.\n\nThe more a man is awake, the more he sleeps (to love); His (critical) wakefulness is worse than slumbering.\n\nOur wakefulness fetters our spirits, Then our souls are a prey to divers whims, Thoughts of loss and gain and fears of misery.\n\nThey retain not purity, nor dignity, nor lustre, Nor aspiration to soar heavenwards.\n\nThat one is really sleeping who hankers after each whim And holds parley with each fancy.\n\nThe twelve volumes of theology.\n\nHe drew up a separate scroll to the address of each, The contents of each scroll of a different tenor; The rules of each of a different purport, This contradictory of that, from beginning to end.\n\nIn one the road of fasting and asceticism Was made the pillar and condition of right devotion.\n\nIn one 'twas said, \"Abstinence profits not; Sincerity in this path is naught but charity.\" In one 'twas said, \"Thy fasting and thy charity Are both a making thyself equal with God; Save faith and utter resignation to God's will In weal and woe, all virtues are fraud and snares.\" In one 'twas said, \"Works are the one thing needful; The doctrine of faith without works is a delusion.\" In one 'twas said, \"Commands and prohibitions are Not for observance, but to demonstrate our weakness, That we may see our own weakness (to carry them out), And thereby recognize and confess God's power.\" 5 In one 'twas said, \"Reference to thine own weakness Is ingratitude for God's mercies towards us.\n\nRather regard thy power, for thou hast power from God.\n\nKnow thy power to be God's grace, for 'tis of Him.\" In one 'twas said, \"Leave power and weakness alone; Whatever withdraws thine eyes from God is an idol.\" In one 'twas said, \"Quench not thy earthy torch,6 That it may be a light to lighten mankind."

