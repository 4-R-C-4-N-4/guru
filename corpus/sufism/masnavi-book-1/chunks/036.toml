[content]
body = "That conqueror of hearts cut off a thousand heads, That the heads of his people might rest in peace.\" God's rebuke to Adam for scorning Iblis.\n\nTo whomsoever God's order comes, He must smite with his sword even his own child.\n\nFear then, and revile not the wicked, For the wicked are impotent under God's commands.\n\nIn presence of God's commands bow down the neck of pride.\n\nScoff not nor chide even them that go astray!\n\nOne day Adam cast a look of contempt and scorn Upon Iblis, thinking what a wretch he was.\n\nHe felt self-important and proud of himself, And he smiled at the actions of cursed Iblis.\n\nGod Almighty cried out to him, \"O pure one, Thou art wholly ignorant of hidden mysteries.\n\nIf I were to blab the faults of the unfortunate, I should root up the mountains from their bases, And lay bare the secrets of a hundred Adams, And convert a hundred fresh Iblises into Mosalmans.\" Adam answered, \"I repent me of my scornful looks; Such arrogant thoughts shall not be mine again.\n\nO Lord, pardon this rashness in Thy slave; I repent; chastise me not for these words!\" O Aider of aid-seekers, guide us, For there is no security in knowledge or wealth; \"Lead not our hearts astray after Thou hast guided us,\" 4 And avert the evil that the \"Pen\" has written.\n\nTurn aside from our souls the evil written in our fates, Repel us not from the tables of purity!\n\nO God, Thy grace is the proper object of our desire; To couple others with Thee is not proper.\n\nNothing is bitterer than severance from Thee, Without Thy shelter there is naught but perplexity.\n\nOur worldly goods rob us of our heavenly goods, Our body rends the garment of our soul.\n\nOur hands, as it were, prey on our feet; Without reliance on Thee how can we live?\n\nAnd if the soul escapes these great perils, It is made captive as a victim of misfortunes and fears, Inasmuch as when the soul lacks union with the Beloved, It abides forever blind and darkened by itself.\n\nIf Thou showest not the way, our life is lost; A life living without Thee esteem as dead!\n\nIf Thou findest fault with Thy slaves, Verily it is right in Thee, O Blessed One!\n\nIf Thou shouldst call sun and moon obscure, If Thou shouldst call the straight cypress crooked, If Thou shouldst declare the highest heaven base, Or rich mines and oceans paupers, All this is the truth in relation to Thy perfection!\n\nThine is the dominion and the glory and the wealth!\n\nFor Thou art exempt from defect and not-being, Thou givest existence to things non-existent, and again Thou makest them non-existent.\n\n*NOTES: 1.\n\ni,e., why is the rule \"an eye for an eye\" enjoined in the Koran, ii.\n\n173?\n\n2.\n\nKoran ii, 100.\n\n3.\n\nAlluding to the \"water of life\" in the land of darkness discovered by Khizr.\n\n4.\n\nKoran iii.\n\n6.\n\nEpilogue to Book I.\n\nAlas!\n\nthe forbidden fruits were eaten, And thereby the warm life of reason was congealed.\n\nA grain of wheat eclipsed the sun Of Adam, l Like as the Dragon's tail 2 dulls the brightness of the moon.\n\nBehold how delicate is the heart, that a morsel of dust Clouded its moon with foul obscurity!\n\nWhen bread is \"substance,\" to eat it nourishes us; When 'tis empty \"form,\" it profits nothing."

