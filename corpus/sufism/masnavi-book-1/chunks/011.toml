[content]
body = "Again, know that self-exertion springs from weakness; Relying on other means is a blot upon perfect trust.\n\nSelf-exertion is not more noble than trust in God.\n\nWhat is more lovely than committing oneself to God?\n\nMany there are who flee from one danger to a worse; Many flee from a snake and meet a dragon.\n\nMan plans a stratagem, and thereby snares himself; What he takes for life turns out, to be destruction.\n\nHe shuts the door after his foe is in the house.\n\nAfter this sort were the schemes of Pharaoh.\n\nThat jealous king slew a myriad babes, While Moses, whom he sought, was in his house.\n\nOur eyes are subject to many infirmities; Go!\n\nannihilate your sight in God's sight.\n\nFor our foresight His foresight is a fair exchange; In His sight is all that ye can desire.\n\nSo long as a babe cannot grasp or run, It takes its father's back for its carriage.\n\nBut when it becomes independent and uses its hands, It falls into grievous troubles and disgrace.\n\nThe souls of our first parents, even before their hands, Flew away from fidelity after vain pleasure.\n\nBeing made captives by the command, 'Get down hence,' 3 They became bond-slaves of enmity, lust, and vanity.\n\nWe are the family of the Lord and His sucking babes.\n\nThe Prophet said, 'The people are God's family;' He who sends forth the rain from heaven, Can He not also provide us our daily bread?\" The lion said, \"True; yet the Lord of creatures Sets a ladder before our feet.\n\nStep by step must we mount up to the roof!\n\nThe notion of fatalism is groundless in this place.\n\nYe have feet why then pretend ye are lame?\n\nYe have hands why then conceal your claws?\n\nWhen a master places a spade in the hand of a slave, The slave knows his meaning without being told.\n\nLike this spade, our hands are our Master's hints to us; Yea, if ye consider, they are His directions to us.\n\nWhen ye have taken to heart His hints, Ye will shape your life in reliance on their direction; Wherefore these hints disclose His intent, Take the burden from you, and appoint your work.\n\nHe that bears it makes it bearable by you, He that is able makes it within your ability.\n\nAccept His command, and you will be able to execute it; Seek union with Him, and you will find yourselves united.\n\nExertion is giving thanks for God's blessings; Think ye that your fatalism gives such thanks?\n\nGiving thanks for blessings increases blessings, But fatalism snatches those blessings from your hands.\n\nYour fatalism is to sleep on the road; sleep not Till ye behold the gates of the King's palace.\n\nAh!\n\nsleep not, O unreflecting fatalists, Till ye have reached that fruit-laden Tree of Life Whose branches are ever shaken by the wind, And whose fruit is showered on the sleepers' heads.\n\nFatalism means sleeping amidst highwaymen.\n\nCan a cock who crows too soon expect peace?\n\nIf ye cavil at and accept not God's hints, Though ye count yourselves men, see, ye are women.\n\nThe quantum of reason ye possessed is lost, And the head whose reason has fled is a tail.\n\nInasmuch as the unthankful are despicable, They are at last cast into the fiery pit.\n\nIf ye really have trust in God, exert yourselves, And strive, in constant reliance on the Almighty.\" Wisdom is granted often times to the weak.\n\nHe said, \"O friends, God has given me inspiration.\n\nOften times strong counsel is suggested to the weak.\n\nThe wit taught by God to the bee Is withheld from the lion and the wild ass.\n\nIt fills its cells with liquid sweets, For God opens the door of this knowledge to it."

