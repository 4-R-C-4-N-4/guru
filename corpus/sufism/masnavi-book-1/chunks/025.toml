[content]
body = "I knew of myself what ye thought, But I desired that ye should speak it; As this boasting of yours is very improper, So shall my mercy be shown to prevail over my wrath: O angels, in order to show forth that prevailing, I inspired that pretension to cavil and doubt; If you say your say, and I forbear to punish you, The gainsayers of my mercy must hold their peace.\n\nMy mercy equals that of a hundred fathers and mothers; Every soul that is born is amazed thereat.\n\nTheir mercy is as the foam of the sea of my mercy; It is mere foam of waves, but the sea abides ever!\n\nWhat more shall I say?\n\nIn that earthly shell There is naught but foam of foam of foam of foam!'\" God is that foam; God is also that pure sea, For His words are neither a temptation nor a vain boast.\n\nPlurality and Partial Evil, though seemingly opposed to Unity, subserve Good.\n\nThe story is now concluded, with its ups and downs, Like lovers' musings, without beginning or ending.\n\nIt has no beginning, even as eternity, Nor ending, for 'tis akin to world without end.\n\nOr like water, each drop whereof is at once Beginning and end, and also has no beginning or end.\n\nBut God forbid!\n\nThis story is not a vain fable, 'Tis the ready money of your state and mine, be sure!\n\nBefore every Sufi who is enlightened Whatever is past is never mentioned.\n\nWhen his whole thoughts are absorbed in present ecstasy, No thought of consequences enters his mind.\n\nl0 Arab, water-pot, and angels are all ourselves!\n\n\"Whatsoever turneth from God is turned from Him.\" 11 Know the husband is reason, the wife lust and greed; She is vested with darkness and a gainsayer of reason.\n\nLearn now whence springs the root of this circumstance, From this, that the Whole has parts of divers kinds.\n\nThese parts of the Whole are not parts in relation to it, Not in the way that rose's scent is a part of the rose.\n\nThe beauty of the green shoot is part of the rose's beauty, But the turtle-dove's cooing is a part of that Bulbuls music.\n\nBut if I engage in doubts and answers, How can I give water to thirsty souls?\n\nYet, if you are perplexed by Whole and finite parts, Have patience, for c( patience is the key of joy.\" Be abstinent, abstinent from vague thoughts, Since there are lions in that desert (of thoughts).\n\nAbstinence is the prince of medicines, As scratching only aggravates a scab.\n\nAbstinence is certainly the root of medicine; Practise abstinence, see how it invigorates thy soul!\n\nAccept this counsel and give ear thereto, That it may be to thee as an earring of gold!\n\nNay, not a mere earring, but that thou mayest be a mine of gold, Or that thou mayest surpass moon and Pleiades.\n\nFirst, know creation is in various forms; Souls are as various as the letters from Alif to Ya.\n\nIn this variety of letters there seems disorder, Though in fact they agree in an integral unity.\n\nIn one aspect they are opposed, in another united; In one aspect capricious, in another serious.\n\nThe day of judgment is the day of tho great review; Whoso is fair and enlightened longs for that review; Whoso, like a Hindoo, is black (with sin), The day of review will sound the knell of his disgrace.\n\nSince he has not a face like a sun, He desires only night like to a veil!\n\nIf his thorn puts not forth a single rosebud, The spring in disclosing him is his foe.\n\nBut he who is from head to foot a perfect rose or lily, To him spring brings rejoicing."

