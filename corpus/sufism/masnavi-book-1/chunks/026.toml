[content]
body = "The useless thorn desires the autumn, That autumn may associate itself with the garden; And hide the rose's beauty and the thorn's shame, That men may not see the bloom of the one and the other's shame, That common stone and pure ruby may appear all as one.\n\nTrue, the Gardener knows the difference even in autumn, But the sight of One is better than the world's sight.\n\nThat One Person is Himself the world, as He is the sun, And every star in heaven is a part of the sun.\n\nThat One Person is Himself the world, and the rest Are all His dependents and parasites, O man!\n\nHe is the perfect world, yet He is single; He holds in hand the writing of the whole of existence.\n\nWherefore all forms and colours of beauty cry out, \" Good news!\n\ngood news!\n\nLo!\n\nthe spring is at hand!\" If the blossoms did not shine as bright helmets, How could the fruits display their globes?\n\nWhen the blossoms are shed the fruits come to a head, When tho body is destroyed the soul lifts up its head.\n\nThe fruit is the substance, the blossom only its form, Blossom the good news, and fruit the promised boon.\n\nWhen the blossoms fall the fruit appears, When the former vanish the fruit is tasted.\n\nTill bread is broken, how can it serve as food?\n\nTill the grapes are crushed, how can they yield wine?\n\nTill citrons be pounded up with drugs, How can they afford healing to the sick?\n\n*NOTES: 1.\n\nKoran iii.\n\n12.\n\n2.\n\nKoran iii.\n\n189.\n\n3.\n\nMuhammad said these words to his wife, Ayisha.\n\n4.\n\nCompare the ancient custom of ringing bells to still thunder.\n\n5.\n\nKoran lxxix.\n\n24.\n\nPharaoh's boast.\n\n6.\n\nThe tablet on which God writes His eternal decrees.\n\n7.\n\nKoran ii.\n\n29.\n\n8.\n\nKoran lxxxix.\n\n29.\n\n9.\n\nThe Logos, the first of created beings, was afterwards embodied in Adam, the \"Perfect Man,\" or Microcosm.\n\n10.\n\nHe is the \"son of the time present and instant,\" as said above.\n\n11.\n\nKoran li.\n\n9."

