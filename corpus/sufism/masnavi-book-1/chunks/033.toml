[content]
body = "Counsels of Reserve given by the Prophet to his Freedman Zaid.\n\nAt dawn the Prophet said to Zaid, \"How is it with thee this morning, O pure disciple?\" He replied, \"Thy faithful slave am I.\" Again he said, \"If the garden of faith has bloomed, show a token of it.\" He answered, \"I was athirst many days, By night I slept not for the burning pangs of love; So that I passed by days and nights, As the point of a spear glances off a shield.\n\nFor in that state all faith is one, A hundred thousand years and a moment are all one; World without beginning and world without end are one; Reason finds no entrance when mind is thus lost.\" The Prophet again urged Zaid to deliver to him a present from that celestial region, as a token that he had really been there in the spirit.\n\nZaid answered that he had seen the eight heavens and the seven hells, and the destinies of all men, whether bound to heaven or hell.\n\nThe body, he said, is as a mother, and the soul as her infant, and death is the time of parturition, when it becomes manifest to what class the infant soul belongs.\n\nAs, on the day of judgment it will be manifest to all men whether a soul belongs to the saved or to the lost, so now it was plain and manifest to him.\n\nHe went on to ask the Prophet if he should publish this secret knowledge of his to all men, or hold his peace.\n\nThe Prophet told him to hold his peace.\n\nZaid, however, proceeded to detail the vision of the last judgment, which he had seen when in the spirit; and the Prophet again commanded him to pause, adding that\" God is never ashamed to say the truth,\" l and allows His Prophet to speak forth the truth, but that for Zaid to blab forth the secrets seen in ecstatic vision would be wrong.\n\nZaid replied that it was impossible for one who had once beheld the Sun of \"The Truth\" to keep his vision a secret.\n\nBut the Prophet in reply instructed him that all men are masters of their own wills, and that he must not reveal what God has determined to keep secret till the last day, in order to leave men till then under the stimulus of hope and fear, and to give them the credit of \"believing what is not seen.\" 2 More honour is given to the warder of a castle who faithfully executes his trust at a distance from the court than to those courtiers who serve constantly under the king's own eye.\n\nZaid submitted to tho Prophet's injunctions, and remained self-contained in his ecstatic visions.\n\nAnecdotes of the sage Luqman, of King Solomon, and of a conflagration in the days of the Khalifa 'Omar complete the section.\n\nThe Prophet's final counsels of \"Reserve\".\n\nThe Prophet said, \"My companions are as the stars, Lights to them that walk aright, missiles against Satan.\n\nIf every man had strength of eyesight To look straight at the light of the sun in heaven, What need were there of stars, O humble one, To one who was guided by the light of the sun?\n\nNeither moon nor planets would be needed By one who saw directly the Sun of 'The Truth.' The Moon 3 declares, as also the clouds and shadows, ' I am a man, yet it hath been revealed to me.' 4 Like you, I was naturally dark, 'Twas the Sun's revelation that gave me such light.\n\nI still am dark compared to the Sun, Though I am light compared to the dark souls of men.\n\nTherefore is my light weak, that you may bear it, For you are not strong enough to bear the dazzling Sun.\n\nI have, as it were, mixed honey with vinegar, To succour the sickness of your hearts."

