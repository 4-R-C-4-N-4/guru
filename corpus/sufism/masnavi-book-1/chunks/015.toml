[content]
body = "Omar and the Ambassador.\n\nThe hare, having delivered his companions from the tyranny of the lion, in the manner just described, proceeds to improve the occasion by exhorting them to engage in a greater and more arduous warfare, viz., the struggle against their inward enemy, the lusts of the flesh.\n\nHe illustrates his meaning by the story of an ambassador who was sent by the Emperor of Rum to the Khalifa 'Omar.\n\nOn approaching Medina this ambassador inquired for 'Omar's palace, and learned that 'Omar dwelt in no material palace, but in a spiritual tabernacle, only visible to purified hearts.\n\nAt last he discerned 'Omar lying under a palm-tree, and drew near to him in fear and awe.\n\n'Omar received him kindly, and instructed him in the doctrine of the mystical union with God.\n\nThe ambassador heard him gladly, and asked him two questions, first, How can souls descend from heaven to earth?\n\nand secondly, With what object are souls imprisoned in the bonds of flesh and blood?\n\n'Omar responded, and the ambassador accepted his teaching, and became a pure-hearted Sufi.\n\nThe hare urged his companions to abjure lust and pride, and to go and do likewise.\n\nGod's agency reconciled with man's freewill.\n\nThe ambassador said, \"O Commander of the faithful, How comes the soul down from above to earth?\n\nHow can so noble a bird be confined in a cage?\" He said, \"God speaks words of power to souls, To things of naught, without eyes or ears, And at these words they all spring into motion; At His words of power these nothings arise quickly, And strong impulse urges them into existence.\n\nAgain, He speaks other spells to these creatures, And swiftly drives them back again into Not-being.\n\nHe speaks to the rose's ear, and causes it to bloom; He speaks to the tulip, and makes it blossom.\n\nHe speaks a spell to body, and it becomes soul; He speaks to the sun, and it becomes a fount of light.\n\nAgain, in its ear He whispers a word of power, And its face is darkened as by a hundred eclipses.\n\nWhat is it that God says to the ear of earth, That it attends thereto and rests steadfast?\n\nWhat is it that Speaker says to the cloud, That it pours forth rain-water like a water-skin?\n\nWhosoever is bewildered by wavering will, l In his ear hath God whispered His riddle, That He may bind him on the horns of a dilemma; For he says, 'Shall I do this or its reverse?' Also from God comes the preference of one alternative; 'Tis from God's impulsion that man chooses one of the two.\n\nIf you desire sanity in this embarrassment, Stuff not the ear of your mind with cotton.\n\nTake the cotton of evil suggestions from the mind's ear, 2 That the heavenly voice from above may enter it, That you may understand that riddle of His, That you may be cognisant of that open secret.\n\nThen the mind's ear becomes the sensorium of inspiration; For what is this Divine voice but the inward voice?\n\n3 The spirit's eye and ear possess this sense, The eye and ear of reason and sense lack it.\n\nThe word 'compulsion' makes me impatient for love's sake; 'Tis he who loves not who is fettered by compulsion.\n\nThis is close communion with God, not compulsion, The shining of the sun, and not a dark cloud.\n\nOr, if it be compulsion, 'tis not common compulsion, It is not the domination of wanton wilfulness.\n\nO son, they understand this compulsion For whom God opens the eyes of the inner man.\n\nThings hidden and things future are plain to them; To speak of the past seems to them despicable."

