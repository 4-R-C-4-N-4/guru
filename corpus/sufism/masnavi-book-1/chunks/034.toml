[content]
body = "When you are cured of your sickness, O invalid, Then leave out the vinegar and eat pure honey.\n\nWhen the heart is garnished and swept clear of lust, Therein 'The God of Mercy sitteth on His throne.' 5 Then God rules the heart immediately, When it has gained this immediate connection with Him.\n\nThis subject is endless; but where is Zaid, That I may tell him again not to seek notoriety?\n\n'Tis not wise to publish these mysteries, Since the last day is approaching to reveal all things.\" Now you will not find Zaid, for he is fled, He sprang from the place where the shoes were left, 6 Scattering the shoes in his hurry.\n\nIf you had been Zaid, you too would have been lost, As a star is lost when tho sun shines on it; For then you see no trace or sign of it, No place or track of it in tho milky way.\n\nOur senses and our endless discourses Are annihilated in the light of the knowledge of our King.\n\nOur senses and our reason within us Are as waves on waves \"assembled before us.\" 7 When night returns and 'tis the time of the sky's levee, The stars that were hidden come forth to their work.\n\nThe people of the world lie unconscious, With veils drawn over their faces, and asleep; But when the morn shall burst forth and the sun arise Every creature will raise its head from its couch; To the unconscious God will restore consciousness; They will stand in rings as slaves with rings in ears; Dancing and clapping hands with songs of praise, Singing with joy, \"Our Lord hath restored us to life!\" Shedding their old skins and bones, As horsemen stirring up a cloud of dust.\n\nAll pressing on from Not-being to Being, On the last day, as well the thankful as the unthankful.\n\n*NOTES: 1.\n\nKoran xxxiii.\n\n53.\n\n2.\n\nKoran ii.\n\n2.\n\n3.\n\ni.e., the Prophet.\n\n4.\n\nKoran xviii.\n\n110.\n\n5.\n\nKoran xx.\n\n4.\n\n6.\n\ni.e., the vestibule of the house.\n\n7.\n\nKoran xxxvi.\n\n53."

