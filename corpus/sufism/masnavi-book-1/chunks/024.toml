[content]
body = "When love of God kindles a flame in the inward man, He burns, and is freed from effects.\n\nHe has no need of signs to assure him of love, For love casts its own light up to heaven.\n\nOther details are wanting to complete this subject, But take this much, and all hail to you!\n\nThough reality is exposed to view in this form, Form is at once nigh to and far from reality.\n\nFor instance, these two resemble water and a tree; When you look to their essence they are far apart; Yet see how quickly a seed becomes a high tree Out of water, along with earth and sunshine!\n\nIf you turn your eyes to their real essence, These two are far, far apart from each other!\n\nBut let us quit this talk of essences and properties, And return to the story of those two wealth-seekers.\n\nHow God made Adam superior to the Angels in wisdom and honour.\n\nHe said, \"By Allah, who knoweth hidden secrets, Who created pure Adam out of dust; In the form, three cubits high, which he gave him, He displayed the contents of all spirits, all decrees!\n\nCommunicated to him the indelible tablet of existence, 6 That he might know all that is written on those tablets, A11 that should be first and last to endless eternity He taught him, with the knowledge of his own 'names,' 7 So that the angels were beside themselves at his instruction, And gained more sanctity from his sanctification.\n\nThe expansion of their minds, which Adam brought about, Was a thing unequalled by the expansion of the heavens.\n\nFor the wide expanse of that pure mind The wide space of the seven heavens was not enough.\" The Prophet said that God has declared, \"I am not contained in aught above or below, I am not contained in earth or sky, or even In highest heaven.\n\nKnow this for a surety.\n\nO beloved!\n\nYet am I contained in the believer's heart!\n\nIf ye seek me, search in such hearts!\" He said also, \"Enter the hearts of my servants 8 To gain the paradise of beholding Me, O fearer of God.\" Highest heaven, with all its light and wide expanse, When it beheld Adam, was shaken from its place!\n\nHighest heaven is greatness itself revealed; But what is form when reality draws nigh?\n\nEvery angel declared, \"In times of yore We bore friendship to the plains of earth; We were wont to sow the seed of service on the earth, Wherefore we bore a wondrous attachment to it.\n\nWhat was this attachment to that house of earth When our own natures are heavenly?\n\nWhat was the friendship of lights like us to darkness?\n\nHow can light dwell together with darkness?\n\nO Adam!\n\nthat friendship arose from the scent of thee, Because the earth is the warp and weft of thy body.\n\nThy earthly body was taken from there, Thy pure spirit of light was shed down from here!\n\nBut our souls were enlightened by thy spirit 9 Long, long before earth had diverted it to itself.\n\nWe used to be on earth, ignorant of tho earth, Ignorant of the treasure buried within it.\n\nWhen we were commanded to depart from that place, We felt sorrow at turning our steps away from it.\n\nSo that we raised many questions, saying, ' O Lord!\n\nwho will come to take our place?\n\nWilt Thou barter the glory of our praises and homage For the vain babble (of men)?' The commands of God then diffused joy upon us; He said, 'What are ye saying at such length?\n\nWhat ye give tongue to so foolishly Is as the words of spoiled children to their father."

