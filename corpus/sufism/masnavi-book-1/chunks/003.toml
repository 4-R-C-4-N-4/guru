[content]
body = "The Prince and the Handmaid.\n\nA prince, while engaged on a hunting excursion, espied a fair maiden, and by promises of gold induced her to accompany him.\n\nAfter a time she fell sick, and the prince had her tended by divers physicians.\n\nAs, however, they all omitted to say, \"God willing,1 we will cure her,\" their treatment was of no avail.\n\nSo the prince offered prayer, and in answer thereto a physician was sent from heaven.\n\nHe at once condemned his predecessors' view of the case, and by a very skilful diagnosis, discovered that the real cause of the maiden's illness was her love for a certain goldsmith of Samarcand.\n\nIn accordance with the physician's advice, the prince sent to Samarcand and fetched the goldsmith, and married him to the lovesick maiden, and for six months the pair lived together in the utmost harmony and happiness.\n\nAt the end of that period the physician, by divine command, gave the goldsmith a poisonous draught, which caused his strength and beauty to decay, and he then lost favour with the maiden, and she was reunited to the king.\n\nThis Divine command was precisely similar to God's command to Abraham to slay his son Ishmael, and to the act of the angel in slaying the servant of Moses,2 and is therefore beyond human criticism.\n\nDescription of Love.\n\nA true lover is proved such by his pain of heart; No sickness is there like sickness of heart.\n\nThe lover's ailment is different from all ailments; Love is the astrolabe of God's mysteries.\n\nA lover may hanker after this love or that love, But at the last he is drawn to the KING of love.\n\nHowever much we describe and explain love, When we fall in love we are ashamed of our words.\n\nExplanation by the tongue makes most things clear, But love unexplained is clearer.\n\nWhen pen hasted to write, On reaching the subject of love it split in twain.\n\nWhen the discourse touched on the matter of love, Pen was broken and paper torn.\n\nIn explaining it Reason sticks fast, as an ass in mire; Naught but Love itself can explain love and lovers!\n\nNone but the sun can display the sun, If you would see it displayed, turn not away from it.\n\nShadows, indeed, may indicate the sun's presence, But only the sun displays the light of life.\n\nShadows induce slumber, like evening talks, But when the sun arises the \"moon is split asunder.\" 3 In the world there is naught so wondrous as the sun, But the Sun of the soul sets not and has no yesterday.\n\nThough the material sun is unique and single, We can conceive similar suns like to it.\n\nBut the Sun of the soul, beyond this firmament, No like thereof is seen in concrete or abstract.4 Where is there room in conception for His essence, So that similitudes of HIM should be conceivable?\n\nShamsu-'d-Din of Tabriz importunes Jalalu-'d-Din to compose the Masnavi.\n\nThe sun (Shams) of Tabriz is a perfect light, A sun, yea, one of the beams of God!\n\nWhen the praise was heard of the \"Sun of Tabriz,\" The sun of the fourth heaven bowed its head.\n\nNow that I have mentioned his name, it is but right To set forth some indications of his beneficence."

