[content]
body = "The Merchant and his Clever Parrot.\n\nThere was a certain merchant who kept a parrot in a cage.\n\nBeing about to travel to Hindustan on business, he asked the parrot if he had any message to send to his kinsmen in that country, and the parrot desired him to tell them that he was kept confined in a cage.\n\nThe merchant promised to deliver this message, and on reaching Hindustan, duly delivered it to the first flock of parrots he saw.\n\nOn hearing it one of them at once fell down dead.\n\nThe merchant was annoyed with his own parrot for having sent such a fatal message, and on his return home sharply rebuked his parrot for doing so.\n\nBut the parrot no sooner heard the merchant's tale than ho too fell down dead in his cage.\n\nThe merchant, after lamenting his death, took his corpse out of the cage and threw it away; but, to his surprise, the corpse immediately recovered life, and flew away, explaining that the Hindustani parrot had only feigned death to suggest this way of escaping from confinement in a cage.\n\nSaints are preserved from all harm 1.\n\nAs to a \"man of heart,\" he takes no hurt, Even though he should eat deadly poison.\n\nHe who gains health from practicing abstinence is safe; The poor disciple is safe in the midst of fever.\n\nThe prophet said, \"O disciple, though you be bold, Yet enter not into conflict with every foe.\" Within you is a Nimrod; enter not his fire; But if you must do so, first become an Abraham.\n\n2 If you are neither swimmer nor seaman, Cast not yourself into the sea out of self-conceit.\n\nA swimmer brings pearls from the deep sea; Yea, he plucks gain from the midst of perils.\n\nIf the saint handles earth, it becomes gold; If a sinner handles gold, it turns to dust.\n\nWhereas the saint is well-pleasing to God, In his actions his hand is the hand of God.\n\nBut the sinner's hand is the hand of Satan and demons, Because he is ensnared in falsity and fraud.\n\nIf folly meets him, he takes it for wisdom; Yea, the learning gained by the wicked is folly.\n\nWhatever a sick man eats is a source of sickness, But if a saint imbibe infidelity it becomes faith.\n\nAh!\n\nfootman who contendest with horsemen, Thou wilt not succeed in carrying the day!\n\nThe jealousy of God 3.\n\nThe whole world is jealous for this cause, That God surpasseth the world in jealousy.\n\nGod is as a soul and the world as a body, And bodies derive their good and evil from souls.\n\nHe to whom the sanctuary of true prayer is revealed Deems it shameful to turn back to mere formal religion.\n\nHe who is master of the robes of a king Brings shame on his lord by petty huckstering.\n\nHe who is admitted to the king's presence-chamber Would show disrespect by tarrying at the doorway.\n\nIf the king grants him license to kiss his hand, He would err were he to kiss merely the king's foot.\n\nThough to lay head at the king's feet is due obeisance, In the case supposed it would be wrong to kiss the feet.\n\nThe king's jealousy would be kindled against him Who, after he had seen his face, preferred his mere perfume.\n\nGod's jealousy may be likened to a grain of wheat, But man's jealousy is but empty chaff.\n\nFor know ye that the source of jealousy is in God, And man's jealousy is only an offshoot from God's.\n\nBut, let me now quit this subject, and make complaint Of the severity of That Fickle Fair One.\n\nComplaints of God's harsh dealings with His adoring slaves.\n\n\"Wherefore dost thou abandon thy creed and faith?"

