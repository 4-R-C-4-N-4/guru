[content]
body = "What matters it if it be heathen or true?\n\nWhy hast thou forsaken thy Beloved?\n\nWhat matters it if she be fair or ugly?\" 4 Let me then, I say, make complaint Of the severity of That Fickle Fair One.\n\nI cry, and my cries sound sweet in His ear; He requires from the two worlds cries and groans.\n\nHow shall I not wail under His chastening hand?\n\nHow shall I not be in the number of those bewitched by Him?\n\nHow shall I be other than night without His day?\n\nWithout the vision of His face that illumes the day?\n\nHis bitters are very sweets to my soul, My sad heart is a lively sacrifice to my Beloved.\n\nI am enamoured of my own grief and pain, For it makes me well-pleasing to my peerless King.\n\nI use the dust of my grief as salve for my eyes, That my eyes, like seas, may teem with pearls.\n\nThe tears which are shed because of His chastening Are very pearls, though men deem them mere tears.\n\n'Tis \"The Soul of souls\" of whom I am making complaint; Yet I do not complain; I merely state my case.\n\nMy heart says, \"He has injured me,\" But I laugh at these pretended injuries.\n\nDo me justice, O Thou who art the glory of the just, Who art the throne, and I the lintel of Thy door!\n\nBut, in sober truth, where are throne and doorway?\n\nWhere are \"We\" and \"I?\" There where our Beloved is!\n\nO Thou, who art exempt from \"Us\" and \"Me,\" Who pervadest the spirits of all men and women; When man and woman become one, Thou art that One!\n\nWhen their union is dissolved, lo!\n\nThou abidest!\n\nThou hast made these \"Us\" and \"Me\" for this purpose, To wit, to play chess with them by Thyself.\n\n5 When Thou shalt become one entity with \"Us\" and \"You.\" Then wilt Thou show true affection for these lovers.\n\nWhen these \"We\" and \"Ye\" shall all become one Soul, Then they will be lost and absorbed in the \"Beloved.\" These are plain truths.\n\nCome then, O Lord!\n\nWho art exalted above description and explanation!\n\nIs it possible for the bodily eye to behold Thee?\n\nCan mind of man conceive Thy frowns and Thy smiles?\n\nAre hearts, when bewitched by Thy smiles and frowns, 6 In a fit state to see the vision of Thyself?\n\nWhen our hearts are bewitched by Thy smiles and frowns, Can we gain life from these two alternating states?\n\nThe fertile garden of love, as it is boundless, Contains other fruits besides joy and sorrow.\n\nThe true lover is exalted above these two states, He is fresh and green independently of autumn or spring!\n\nPay tithe on Thy beauty, O Beauteous One!\n\nTell forth the tale of the Beloved, every whit!\n\nFor through coquetry His glances Are still inflicting fresh wounds on my heart.\n\nI gave Him leave to shed my blood, if He willed it; I only said, \"Is it right?\n\n\" and He forsook me.\n\nWhy dost Thou flee from the cries of us on earth?\n\nWhy pourest Thou sorrow on the heart of the sorrowful?\n\nO Thou who, as each new morn dawns from the east, Art seen uprising anew, like a bright fountain!\n\nWhat excuse makest Thou for Thy witcheries?\n\nO Thou whose lips are sweeter than sugar, Thou that ever renewest the life of this old world, Hear the cry of this lifeless body and heart!\n\nBut, for God's sake, leave off telling of the Rose; Tell of the Bulbul who is severed from his Rose."

