body = "But the light that lights the heart is the Light of God, Which is distinct from the light of reason and sense.\n\nAt night there is no light, and colors are not seen; Hence we know what light is by its opposite, darkness.\n\nAt night no colors are visible, for light is lacking.\n\nHow can color be the attribute of dark blackness?\n\nLooking on light is the same as looking on colors; Opposite shows up opposite, as a Frank a Negro.\n\nThe opposite of light shows what is light, Hence colors too are known by their opposite.\n\nGod created pain and grief for this purpose, To wit, to manifest happiness by its opposites.\n\n12 Hidden things are manifested by their opposites; But, as God has no opposite.\n\nHe remains hidden.\n\nGod's light has no opposite in the range of creation Whereby it may be manifested to view.\n\nPerforce \"Our eyes see not Him, though He sees us.\" 13 Behold this in the case of Moses and Mount Sinai.\n\n14 Discern form from substance, as lion from desert, Or as sound and speech from the thought they convey.\n\nThe sound and speech arise from the thought; Thou knowest not where is the Ocean of thought; Yet when thou seest fair waves of speech, Thou knowest there is a glorious Ocean beneath them.\n\nWhen waves of thought arise from the Ocean of Wisdom, They assume the forms of sound and speech.\n\nThese forms of speech are born and die again, These wa,ves cast themselves back into the Ocean.\n\nForm is born of That which is without form, And goes again, for, \"Verily to Him do we return.\" 15 Wherefore to thee every moment come death and \"return.\" Mustafa saith, \"The world endureth only a moment.\" So, thought is an arrow shot by God into the air.\n\nHow can it stay in the air?\n\nIt returns to God.\n\nEvery moment the world and we are renewed, 16 Yet we are ignorant of this renewing forever and aye.\n\nLife, like a stream of water, is renewed and renewed, Though it wears the appearance of continuity in form.\n\nThat seeming continuity arises from its swift renewal, As when a single spark of fire is whirled round swiftly.\n\n17 If a single spark be whirled round swiftly, It seems to the eye a continuous line of fire.\n\nThis apparent extension, owing to the quick motion, Demonstrates the rapidity with which it is moved.\n\nIf ye seek the deepest student of this mystery, Lo!\n\n'tis Husamu-'d-Din, the most exalted of creatures!\n\n*NOTES: 1.\n\n\"Trust in God and keep your powder dry.\" 2.\n\n\"Laborare est orare.\" 3.\n\nKoran ii.\n\n341.\n\n4.\n\n\"And He taught Adam the names of all things\" (Koran ii.\n\n29).\n\n5.\n\nThe angels said, \"We have no knowledge but what thou hast given us to know\" (Koran ii.\n\n30).\n\n6.\n\nSee Gulshan i Raz, I.\n\n543.\n\n7.\n\nKoran xviii.\n\n17.\n\n8.\n\nSee Gulshan i Raz, I.\n\n575: The ocean of Reason is the same as what is elsewhere called the ocean of Being, viz., the Noumenon, or Divine substratum of all phenomenal being and thought.\n\n9.\n\n\"Those arrows were God's, not vours\" (Koran viii.\n\n17); i.e., Man's reason proceeds from God, the \"Only Real Agent.\" 10.\n\nAlluding to the \"Believer's lost camel \" (Book II.\n\nStory XII., infra.).\n\nMen seek wisdom, and do not know that in themselves is the reflected wisdom of God (Gulshan i Raz, I.\n\n435).\n\n11.\n\nThe real Soul, i.e., the spirit which God \"breathed into man\" (Koran xv.\n\n29)."

