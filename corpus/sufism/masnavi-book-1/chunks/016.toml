[content]
body = "They possess freewill and compulsion besides, 4 As in oyster-shells raindrops are pearls.\n\nOutside the shell they are raindrops, great and small; Inside they are precious pearls, big and little.\n\nThese men also resemble the musk deer's bag; Outside it is blood, but inside pure musk; Yet, say not that outside 'twas mere blood, Which on entering the bag becomes musk.\n\nNor say that outside the alembic 'twas mere copper, And becomes gold inside, when mixed with elixir.\n\nIn you freewill and compulsion are vain fancies, But in them they are the light of Almighty power.\n\nOn the table bread is a mere lifeless thing, When taken into the body it is a life-giving spirit.\n\nThis transmutation occurs not in the table's heart, 'Tis soul effects this transmutation with water of life.\n\nSuch is the power of the soul, O man of right views!\n\nThen what is the power of the Soul of souls?\n\n(God).\n\nBread is the food of the body, yet consider, How can it be the food of the soul, O son?\n\nFlesh-born man by force of soul Cleaves mountains with tunnels and mines.\n\nThe might of Ferhad's soul cleft a hill; The might of the Soul's soul cleaves the moon; 5 If the heart opens the mouth of mystery's store, The soul springs up swiftly to highest heaven.\n\nIf tongue discourses of hidden mysteries, It kindles a fire that consumes the world.\n\nBehold, then, God's action and man's action; Know, action does belong to us ; this is evident.\n\nIf no actions proceeded from men, How could you say, 'Why act ye thus?' The agency of God is the cause of our action, Our actions are the signs of God's agency; Nevertheless our actions are freely willed by us, Whence our recompense is either hell or 'The Friend.'\" *NOTES: 1.\n\nThe poet's insistence on the doctrine of God being the Fa'il i Hakiki, or Only Real Agent, without whose word no being and no action can be, leads him to the question of freewill and compulsion of man's will (see Gulshan i Raz, I.\n\n555).\n\n2.\n\nSo Gulshan i Raz, I.\n\n442.\n\n3.\n\nThe leading principle of all mysticism is that, independently of sense and reason, man possesses an inward sense, or intuition, which conveys to him a knowledge of God by direct apprehension (see Gulshan i Raz.\n\nI.\n\n431).\n\n4.\n\nTheir wills are identified with God's will, as in the case of the saint Daquqi (infra, Book III.\n\nStory XII.) 5.\n\nAs a sign of the last day (Koran liv.\n\n1)."

