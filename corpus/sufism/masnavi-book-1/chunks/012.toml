[content]
body = "The skill taught by God to the silkworm Is a learning beyond the reach of the elephant.\n\nThe earthly Adam was taught of God names, 4 So that his glory reached the seventh heaven.\n\nHe laid low the name and fame of the angels, 5 Yet blind indeed are they whom God dooms to doubt!\n\nThe devotee of seven hundred thousand years (Satan) Was made a muzzle for that yearling calf (Adam), 6 Lest he should suck milk of the knowledge of faith, And soar on high even to the towers of heaven.\n\nThe knowledge of men of external sense is a muzzle To stop them sucking milk of that sublime knowledge.\n\nBut God drops into the heart a single pearl-drop Which is not bestowed on oceans or skies!\" \"How long regard ye mere form, O form-worshippers?\n\nYour souls, void of substance, rest still in forms.\n\nIf the form of man were all that made man, Ahmad and Abu Jahl would be upon a par.\n\nA painting on a wall resembles a man, But see what it is lacking in that empty form.\n\n'Tis life that is lacking to that mere semblance of man.\n\nGo!\n\nseek for that pearl it never will find.\n\nThe heads of earth's lions were bowed down When God gave might to the Seven Sleepers' dog.\n\n7 What mattered its despised form When its soul was drowned in the sea of light?\" Human wisdom, the manifestation of divine.\n\nOn his way to the lion the hare lingered, Devising a stratagem with himself.\n\nHe proceeded on his way after delaying long, In order to have a secret or two for the lion.\n\nWhat worlds the principle of Reason embraces!\n\nHow broad is this ocean of Reason!\n\nYea, the Reason of man is a boundless ocean.\n\nO son, that ocean requires, as it were, a diver.\n\n8 On this fair ocean our human forms Float about, like bowls on the surface of water; Yea like cups on the surface, till they are.\n\nfilled; And when filled, these cups sink into the water.\n\nThe ocean of Reason is not seen ; reasoning men are seen; But our forms (minds) are only as waves or spray thereof.\n\nWhatever form that ocean uses as its instrument, Therewith it casts its spray far and wide.\n\n9 Till the heart sees the Giver of the secret, Till it espies that Bowman shooting from afar, It fancies its own steed lost, while in bewilderment It is urging that steed hither and thither; 10 It fancies its own steed lost, when all the while That swift steed is bearing it on like the wind.\n\nIn deep distress that blunder head Runs from door to door, searching and inquiring, \"Who and where is he that hath stolen my steed?\" They say, \"What is this thou ridest on, O master?\" He says, \"True, 'tis a steed; but where is mine?\" They say, \"Look to thyself, O rider; thy steed is there.\" The real Soul is lost to view, and seems far off; 11 Thou art like a pitcher with full belly but dry lip; How canst thou ever see red, green, and scarlet Unless thou seest the light first of all?\n\nWhen thy sight is dazzled by colors, These colors veil the light from thee.\n\nBut when night veils those colors from thee, Thou seest that colors are seen only through light.\n\nAs there is no seeing outward colors without light, So it is with the mental colors within.\n\nOutward colors arise from the light of sun and stars, And inward colors from the Light on high.\n\nThe light that lights the eye is also the heart's Light; The eye's light proceeds from the Light of the heart."

