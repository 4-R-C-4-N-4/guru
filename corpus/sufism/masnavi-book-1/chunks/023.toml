[content]
body = "Woman is a ray of God, not a mere mistress, The Creator's self, as it were, not a mere creature!\n\nMoses and Pharaoh, alike doers of God's will, as Light and Darkness.\n\nPoison and Antidote.\n\nVerily, both Moses and Pharaoh walked in the right way, Though seemingly the one did so, and the other not.\n\nBy day Moses wept before God, At midnight Pharaoh lifted up his cry, Saying, \"What a yoke is this upon my neck, O God!\n\nWere it not for this yoke who would boast, 'I am ?' Because Thou hast made Moses' face bright as the moon, And hast made the moon of my face black in the face.\n\nCan my star ever shine brighter than the moon?\n\nIf it be eclipsed, what remedy have I?\n\nThough princes and kings beat drums, And men beat cymbals because of my eclipse, 4 They beat their brass dishes and raise a clamour, And make my moon ashamed thereby, I, who am Pharaoh, woe is me!\n\nThe people's clamour Confounds my boast, 'I am Lord Supreme!' 5 Moses and I are Thy nurslings both alike, Yet Thy axe cuts down tho branches in Thy woods.\n\nSome of these branches Thou plantest in the ground, Others Thou castest away as useless.\n\nCan branch strive against axe?\n\nNot so.\n\nCan branch elude the power of the axe?\n\nNay, O Lord of the power that dwells in Thy axe, In mercy make these crooked things straight!\" Man and wife types of the spirit and the flesh.\n\nThe dissension of this husband and wife is a parable; They are types of thy animal and rational souls.\n\nThis husband and wife are the reason and the flesh, A couple joined together for good and for evil.\n\nAnd in this earthly house this linked pair Day and night are ever at variance and strife.\n\nThe wife is ever seeking dainties for domestic needs, Namely, bread and meat and her own dignity and position.\n\nLike the wife, the animal soul seeks comfort, Sometimes carnal, sometimes ambitious; Reason has no care for these matters, In its mind is naught but regard to Allah.\n\nThough the secret moral hereof is a bait and snare, Hear its outward form to the end.\n\nIf spiritual manifestations had been sufficient, The creation of the world had been needless and vain.\n\nIf spiritual thought were equivalent to love of God, Outward forms of temples and prayers would not exist.\n\nPresents which friends make one to another Are naught but signs and indications, To give outward testimony and witness Of the love concealed within the heart.\n\nBecause outward attentions are evidence Of secret love, O beloved!\n\nThe witness may be true or false, Now drunk with real wine, now with sour whey; He who drinks fermented whey displays drunkenness, Makes a noise, and reels to and fro.\n\nThat hypocrite in prayers and fasts Displays exceeding diligence, That men may think him drunk with love of God; But if you look into the truth, he is drowned in hypocrisy.\n\nIn fine, outward actions are guides To show the way to what is concealed within.\n\nSometimes the guide is true, sometimes false, Sometimes a help, and at other times a hindrance.\n\nO Lord, grant, in answer to my prayers, discernment, That I may know such false signs from the true!\n\nKnow you how discernment accrues to the sense?\n\n'Tis when sense \"sees by the light of Allah.\" If effects are obscure, still causes testify; Kindred, for instance, shows that there is love.\n\nBut he to whom God's light is the guide Is no longer a slave to effects and causes.\n\nWhen the light of Allah illumes his senses, A man is no longer a slave to effects."

