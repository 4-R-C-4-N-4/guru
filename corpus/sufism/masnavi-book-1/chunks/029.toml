[content]
body = "The Lion who Hunted with the Wolf and the Fox. A lion took a wolf and a fox with him on a hunting excursion, and succeeded in catching a wild ox, an ibex, and a hare. He then directed the wolf to divide the prey. The wolf proposed to award the ox to the lion, the ibex to himself, and the hare to the fox. The lion was enraged with the wolf because he had presumed to talk of \"I\" and \"Thou,\" and \"My share\" and \"Thy share\" when it all belonged of right to the lion, and he slew the wolf with one blow of his paw. Then, turning to the fox, he ordered him to make the division. The fox, rendered wary by the fate of the wolf, replied that the whole should be the portion of the lion. The lion, pleased with his self-abnegation, gave it all up to him, saying, \"Thou art no longer a fox, but myself.\" Till man destroys \"self\" he is no true friend of God. Once a man came and knocked at the door of his friend. His friend said, \"who art thou. O faithful one?\" He said, \"'Tis I.\" He answered, \"There is no admittance. There is no room for the 'raw' at my well-cooked feast. Naught but fire of separation and absence Can cook the raw one and free him from hypocrisy! Since thy 'self' has not yet left thee, Thou must be burned in fiery flames.\" The poor man went away, and for one whole year Journeyed burning with grief for his friend's absence. His heart burned till it was cooked; then he went again And drew near to the house of his friend. He knocked at the door in fear and trepidation Lest some careless word might fall from his lips. His friend shouted, \"Who is that at the door?\" He answered, \"'Tis Thou who art at the door. O Beloved!\" The friend said, \"Since 'tis I, let me come in, There is not room for two 'I's' in one house.\""

