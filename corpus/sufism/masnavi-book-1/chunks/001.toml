[content]
body = "HEARKEN to the reed-flute, how it complains, Lamenting its banishment from its home: \"Ever since they tore me from my osier bed, My plaintive notes have moved men and women to tears.\n\nI burst my breast, striving to give vent to sighs, And to express the pangs of my yearning for my home.\n\nHe who abides far away from his home Is ever longing for the day ho shall return.\n\nMy wailing is heard in every throng, In concert with them that rejoice and them that weep.\n\nEach interprets my notes in harmony with his own feelings, But not one fathoms the secrets of my heart.\n\nMy secrets are not alien from my plaintive notes, Yet they are not manifest to the sensual eye and ear.\n\nBody is not veiled from soul, neither soul from body, Yet no man hath ever seen a soul.\" This plaint of the flute is fire, not mere air.\n\nLet him who lacks this fire be accounted dead!\n\n'Tis the fire of love that inspires the flute,l 'Tis the ferment of love that possesses the wine.\n\nThe flute is the confidant of all unhappy lovers; Yea, its strains lay bare my inmost secrets.\n\nWho hath seen a poison and an antidote like the flute?\n\nWho hath seen a sympathetic consoler like the flute?\n\nThe flute tells the tale of love's bloodstained path, It recounts the story of Majnun's love toils.\n\nNone is privy to these feelings save one distracted, As ear inclines to the whispers of the tongue.\n\nThrough grief my days are as labor and sorrow, My days move on, hand in hand with anguish.\n\nYet,, though my days vanish thus, 'tis no matter, Do thou abide, O Incomparable Pure One!\n\n2 But all who are not fishes are soon tired of water; And they who lack daily bread find the day very long; So the \"Raw\" comprehend not the state of the \"Ripe;\" 3 Therefore it behoves me to shorten my discourse.\n\nArise, O son!\n\nburst thy bonds and be free!\n\nHow long wilt thou be captive to silver and gold?\n\nThough thou pour the ocean into thy pitcher, It can hold no more than one day's store.\n\nThe pitcher of the desire of the covetous never fills, The oyster-shell fills not with pearls till it is content; Only he whose garment is rent by the violence of love Is wholly pure from covetousness and sin.\n\nHail to thee, then, O LOVE, sweet madness!\n\nThou who healest all our infirmities!\n\nWho art the physician of our pride and self-conceit!\n\nWho art our Plato and our Galen!\n\nLove exalts our earthly bodies to heaven, And makes the very hills to dance with joy!\n\nO Iover, 'twas love that gave life to Mount Sinai, 4 When \"it quaked, and Moses fell down in a swoon.\" Did my Beloved only touch me with his lips, I too, like the flute, would burst out in melody.\n\nBut he who is parted from them that speak his tongue, Though he possess a hundred voices, is perforce dumb.\n\nWhen the rose has faded and the garden is withered, The song of the nightingale is no longer to be heard.\n\nThe BELOVED is all in all, the lover only veils Him; 5 The BELOVED is all that lives, the lover a dead thing.\n\nWhen the lover feels no longer LOVE's quickening, He becomes like a bird who has lost its wings.\n\nAlas!\n\nHow can I retain my senses about me, When the BELOVED shows not the light of His countenance?\n\nLOVE desires that this secret should be revealed, For if a mirror reflects not, of what use is it?"

