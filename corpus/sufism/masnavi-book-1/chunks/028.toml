[content]
body = "The courtier who attends in the presence of the king Is served better than the stranger outside the gate.\n\nThe difference between them is beyond calculation; One sees the light, the other on]y the veil.\n\nStrive to obtain entrance within, If thou wouldst not remain as a ring outside the door.\n\nHaving chosen thy Director, be not weak of heart, Nor yet sluggish and lax as water and mud; But if thou takest umbrage at every rub, How wilt thou become a polished mirror?\" *NOTES: 1.\n\ni.e., the Pir, or Perfect Shaikh, or Spiritual Director.\n\nSo St.\n\nJohn of the Cross and St.\n\nTheresa enjoin obedience to the Director (Vaughan, xii.\n\n122).\n\n2.\n\nSee Koran xviii.\n\n77 for the story of Moses and Khizr.\n\nIt is also given in Parnell's 'Hermit.' 3.\n\nKoran xlviii.\n\n10."

