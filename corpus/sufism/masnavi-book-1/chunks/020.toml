[content]
body = "The Harper.\n\nIn the time of the Khalifa 'Omar there lived a harper, whose voice was as sweet as that of the angel Israfil, and who was in great request at all feasts.\n\nBut he grew old, and his voice broke, and no one would employ him any longer.\n\nIn despair he went to the burial-ground of Yathrub, and there played his harp to God, looking to Him for recompense.\n\nHaving finished his melody he fell asleep, and dreamed he was in heaven.\n\nThe same night a divine voice came to 'Omar, directing him to go to the burial-ground, and relieve an old man whom he should find there.\n\n'Omar proceeded to the place, found the harper, and gave him money, promising him more when he should need it.\n\nThe harper cast away his harp, saying that it had diverted him from God, and expressed great contrition for his past sins.\n\n'Omar then instructed him that his worldly journey was now over, and that he must not give way to contrition for the past, as he was now entered into the state of ecstasy and intoxication of union with God, and in this exalted state regard to past and future should be swept away.\n\nThe harper acted on his instructions, and sang no more.\n\nApology for applying the term \"Bride\" to God.\n\nMustafa became beside himself at that sweet call, His prayer failed on \"the night of the early morning halt.\" He lifted not head from that blissful sleep,\" 1 So that his morning prayer was put off till noon.\n\nOn that, his wedding night, in presence of his bride, His pure soul attained to kiss her hands.\n\nLove and mistress are both veiled and hidden, Impute it not as a fault if I call Him \"Bride.\" I would have kept silence from fear of my Beloved, If He had granted me but a moment's respite.\n\nBut He said, \"Speak on, 'tis no fault, 'Tis naught but the necessary result of the hidden decree, 'Tis a fault only to him who only sees faults.\n\nHow can the Pure Hidden Spirit notice faults?\" Faults seem so to ignorant creatures, Not in the sight of the Lord of Benignity.\n\nBlasphemy even may be wisdom in the Creator's si ht, Whereas from our point of view it is grievous sin.\n\nIf one fault occur among a hundred beauties 'Tis as one dry stick in a garden of green herbs.\n\nBoth weigh equally in the scales For the two resemble body and soul.\n\nWherefore the sages have said not idly, \" The bodies of the righteous are as pure souls.\" Their words, their actions, their praises, Are all as a pure soul without spot or blemish.\n\n'Omar rebukes the Harper for brooding over and bewailing the past.\n\nThen 'Omar said to him, \"This wailing of thine Shows thou art still in a state of ' sobriety.\"' Afterwards he thus urged him to quit that state And called him out of his beggary to absorption in God: \"Sobriety savours of memory of the past; Past and future are what veil God from our sight.\n\nBurn up both of them with fire!\n\nHow long Wilt thou be partitioned by these segments as a reed?\n\nSo long as a reed has partitions 'tis not privy to secrets, Nor is it vocal in response to lip and breathing.\n\nWhile circumambulating the house thou art a stranger; When thou enterest in thou art at home.\n\nThou whose knowledge is ignorance of the Giver of knowledge, Thy wailing contrition is worse than thy sin.\n\nThe road of the 'annihilated' is another road; Sobriety is wrong, and a straying from that other road."

