[content]
body = "'Ali's Forbearance.\n\n'Ali, the \"Lion of God,\" was once engaged in conflict with a Magian chief, and in the midst of the struggle the Magian spat in his face.\n\n'Ali, instead of taking vengeance on him, at once dropped his sword, to the Magian's great astonishment.\n\nOn his inquiring the reason of such forbearance, 'Ali informed him that the \"Lion of God\" did not destroy life for the satisfaction of his own vengeance, but simply to carry out God's will, and that whenever he saw just cause, he held his hand even in the midst of the strife, and spared the foe.\n\nThe Prophet, 'Ali continued, had long since informed him that he would die by the hand of his own stirrup-bearer (Ibn Maljun), and the stirrup-bearer had frequently implored 'Ali to kill him, and thus save him from the commission of that great crime; but 'Ali said he always refused to do so, as to him death was as sweet as life, and he felt no anger against his destined assassin, who was only the instrument of God's eternal purpose.\n\nThe Magian chief, on hearing 'Ali's discourse, was so much affected that he embraced Islam, together with all his family, to the number of fifty souls.\n\nHow the Prophet whispered to 'Ali's stirrup-bearer that he would one day assassinate his master.\n\n\"The Prophet whispered in the ear of my servant That one day he would sever my head from my neck.\n\nThe Prophet also warned by inspiration me, his friend, That the hand of my servant would destroy me.\n\nMy servant cried, \"O kill me first, That I may not become guilty of so grievous a sin!\" I replied, \"Since my death is to come from thee, How can I balk the fateful decree?\" He fell at my feet and cried, \"O gracious lord, For God's sake cleave now my body in twain, That such an evil deed may not be wrought by me, And my soul burn with anguish for its beloved.\" I replied, \"What God's pen has written, it has written; In presence of its writings knowledge is confounded; There is no anger in my soul against thee, Because I attribute not this deed to thee; Thou art God's instrument.\n\nGod's hand is the agent.\n\nHow can I chide or fret at God's instrument?\" He said, \"If this be so, why is there retaliation?\" 1 I answered, \"'Tis from God, and 'tis God's secret; If He shows displeasure at His own acts, From His displeasure He evolves a Paradise; He feels displeasure at His own acts, Because He is a God of vengeance as of mercy.\n\nIn this city of events He is the Lord, In this realm He is the King who plans all events.\n\nIf He crushes His own instruments, He makes those crushed ones fair in His sight.\n\nKnow the great mystery of 'whatever verses we cancel, Or cause you to forget, we substitute better for them.' 2 Whatever law God cancels, He makes as a weed, And in its stead He brings forth a rose.\n\nSo night cancels the business of the daytime, When the reason that lights our minds becomes inanimate.\n\nAgain, night is cancelled by the light of day, And inanimate reason is rekindled to life by its rays.\n\nThough darkness produces this sleep and quiet, Is not the 'water of life' in the darkness?\n\n3 Are not spirits refreshed in that very darkness?\n\nIs not that silence the season of heavenly voices?\n\nFor from contraries contraries are brought forth, Out of darkness was created light.\n\nThe Prophet's wars brought about the present peace, The peace of these latter days resulted from those wars."

