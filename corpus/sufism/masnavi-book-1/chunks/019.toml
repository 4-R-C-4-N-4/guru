[content]
body = "My ardour arises not from joy or grief, My sense mates not with illusion and fancy.\n\nMy condition is different, for it is strange.\n\nDeny it not !\n\nGod is all-powerful.\n\nArgue not from the condition of common men, Stumble not at severity and at mercy.\n\nFor mercy and severity, joy and sorrow, are transient, And transient things die; \"God is heir of all.\" 7 \"Tis dawn!\n\nO Protector and Asylum of the dawn!\n\nMake excuse for me to my lord Husamu-'d-Din!\n\nThou makest excuses for c(Universal Reason and Soul; 8 Soul of souls and Gem of life art Thou!\n\nThe light of my dawn is a beam from Thy light, Shining in the morning draught of Thy protection!\n\nSince Thy gift keeps me, as it were, intoxicated, What is this spiritual wine that causes me this joy?\n\nNatural wine lacks the ferment in my breast, The spheres lag behind me in revolutions!\n\nWine is intoxicated with me, not I with it!\n\nThe world takes its being from me, not I from it!\n\nI am like bees, and earthly bodies like wax, 9 I build up these bodies as with my own wax!\n\n*NOTES: 1.\n\nThis is a comment on the saying of Faridu-'d-Din Attar, \"Thou art a man of lusts, O fool!\n\nIn dust eat blood!\n\nbut if a man of heart eats poison, 'tis as honey.\" 2.\n\nSee Koran xxi.\n\n68, and Rodwell's note.\n\n3.\n\nThis is a comment on the Hadis, \"Verily Sa'd is a jealous man, and I am more jealous than he, and God is more jealous than I, and of His jealousy He prohibits 'All pollutions, both outward and inward.'\" (Koran vi.\n\n152.) 4.\n\nThis is a quotation from Hakim Sanai, and forms the text of the following discourse.\n\n5.\n\nSee Gulshan i Raz, I.\n\n140, and Omar Khayyam Quatr., 270.\n\n6.\n\nSee Gulshan i Raz, I.\n\n745: Frowns are the occultation of the Beloved by the veil of phenomena; smiles, the revelation of Absolute Being to its votaries.\n\nSa'di (Gulistan, Book II.\n\nStory XI.) says: \"The vision, of God to the pious consists of manifestation and occultation; He shows Himself, and again withdraws Himself from our sight.\" 7.\n\nKoran xv.\n\n23.\n\n8.\n\ni.e., the Logos, and First Soul, upposed to be referred to in the text: \"O men, fear your Lord, who hath created you from one Soul, and of him created his wife\" (Koran iv.\n\nI).\n\nSee Gulshan i Raz, I.\n\n203.\n\n9.\n\ni.e., in his spiritual exaltation he feels himself as the Logos, where from tho whole material creation emanates."

