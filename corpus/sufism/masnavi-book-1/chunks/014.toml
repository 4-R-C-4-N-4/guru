[content]
body = "\"In yourselves are signs; will ye not behold them?\" (Koran li, 21).\n\n12.\n\nSee Gulshan i Raz, I.\n\n92.\n\nMr.\n\nMansel (Bampton Lectures, p.\n\n49) says: \"A thing can be known as that which it is only by being distinguished from that which it is not.\" But the Infinite Deity ex hypothesi includes all things; so there is nothing to contrast Him with.\n\n13.\n\nKoran vi.\n\n103.\n\n14.\n\nKoran vii.\n\n139: \"He said, 'Thou shalt not see me.'\" 15.\n\nKoran ii.\n\n151.\n\n16.\n\nSee Gulshan i Raz, I.\n\n645: All phenomena are every moment renewed by fresh effluxes of being from the Divine Noumenon.\n\n17.\n\nSee Gulshan i Raz, I.\n\n710."

