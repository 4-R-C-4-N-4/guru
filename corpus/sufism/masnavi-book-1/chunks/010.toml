[content]
body = "The Lion and the Beasts.\n\nIn the book of Kalila and Damna a story is told of a lion who held all the beasts of the neighborhood in subjection, and was in the habit of making constant raids upon them, to take and kill such of them as he required for his daily food.\n\nAt last the beasts took counsel together, and agreed to deliver up one of their company every day, to satisfy the lion's hunger, if he, on his part, would cease to annoy them by his continual forays.\n\nThe lion was at first unwilling to trust to their promise, remarking that he always preferred to rely on his own exertions; but the beasts succeeded in persuading him that he would do well to trust Providence and their word.\n\nTo illustrate the thesis that human exertions are vain, they related a story of a man who got Solomon to transport him to Hindustan to escape the angel of death, but was smitten by the angel the moment he got there.\n\nHaving carried their point, the beasts continued for some time to perform their engagement.\n\nOne day it came to the turn of the hare to be delivered up as a victim to the lion; but he requested the others to let him practice a stratagem.\n\nThey scoffed at him, asking how such silly beast as he could pretend to outwit the lion.\n\nThe hare assured them that wisdom was of God, and God might choose weak things to confound the strong.\n\nAt last they consented to let him try his luck.\n\nHe took his way slowly to the lion, and found him sorely enraged.\n\nIn excuse for his tardy arrival he represented that he and another hare had set out together to appear before the lion, but a strange lion had seized the second hare, and carried it off in spite of his remonstrances.\n\nOn hearing this, the lion was exceeding wroth, and commanded the hare to show him the foe who had trespassed on his preserves.\n\nPretending to be afraid, the hare got the lion to take him upon his back, and directed him to a well.\n\nOn looking down the well, the lion saw in the water the reflection of himself and of the hare on his back; and thinking that he saw his foe with the stolen hare, he plunged in to attack him, and was drowned, while the hare sprang off his back and escaped.\n\nThis folly on the part, of the lion was predestined to punish him for denying God's ruling providence.\n\nSo Adam, though he knew the names of all things, in accordance with God's predestination, neglected to obey a single prohibition, and his disobedience cost him dearly.\n\nTrust in God, as opposed to human exertions.\n\nThe beasts said, \"O enlightened sage, Lay aside caution; it cannot help thee against destiny; To worry with precaution is toil and moil; Go, trust in Providence, trust is the better part.\n\nWar not with the divine decree, O hot-headed one, Lest that decree enter into conflict with thee.\n\nMan should be as dead before the commands of God Lest a blow befall him from the Lord of all creatures.\" He said, \"True; but though trust be our mainstay, Yet the Prophet teaches us to have regard to means.\n\nThe Prophet cried with a loud voice, 'Trust in God, yet tie the camel's leg.' l Hear the adage, 'The worker is the friend of God;'2 Through trust in Providence neglect not to use means.\n\nGo, O Quietists, practice trust with self-exertion, Exert yourself to attain your objects, bit by bit.\n\nIn order to succeed, strive and exert yourselves; If ye strive not for your objects, ye are fools.\" They said, \"What is gained from the poor by exertions Is a fraudulent morsel that will bring ill luck."

