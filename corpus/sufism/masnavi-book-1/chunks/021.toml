[content]
body = "O thou who seekest to be contrite for the past, How wilt thou be contrite for this contrition?\n\nAt one time thou adorest the music of the lute, At another embracest wailing and weeping.\" While the \"Discerner\" reflected these mysteries, The heart of the harper was emancipated.\n\nLike a soul he was freed from weeping and rejoicing, His old life died, and he was regenerated.\n\nAmazement fell upon him at that moment, For he was exalted above earth and heaven, An uplifting of the heart surpassing all uplifting; I cannot describe it ; if you can, say on!\n\nEcstasy and words beyond all ecstatic words; Immersion in the glory of the Lord of glory!\n\nImmersion wherefrom was no extrication, As it were identification with the Very Ocean!\n\nPartial Reason is as naught to Universal Reason, If one impulse dependent on another impulse be naught; But when that impulse moves this impulse, The waves of that sea rise to this point; 2 *NOTES: 1.\n\nThe night of his marriage with Safiyya.\n\n2.\n\ni.e., he is possessed by the Deity as an \"Energumen,\" and the Deity works these ecstatic states in him."

