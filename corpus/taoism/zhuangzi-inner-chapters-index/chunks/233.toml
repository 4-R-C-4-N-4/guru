[content]
body = "That the robber in his recklessness comes to the conclusion that there are valuable deposits in an apartment shows his sageness; that he is the first to enter it shows his bravery; that he is the last to quit it shows his righteousness; that he knows whether (the robbery) may be attempted or not shows his wisdom; and that he makes an equal p.\n\n284 division of the plunder shows his benevolence.\n\nWithout all these five qualities no one in the world has ever attained to become a great robber.' Looking at the subject in this way, we see that good men do not arise without having the principles of the sages, and that Kih could not have pursued his course without the same principles.\n\nBut the good men in the world are few, and those who are not good are many;--it follows that the sages benefit the world in a few instances and injure it in many.\n\nHence it is that we have the sayings, 'When the lips are gone the teeth are cold 1 ;' 'The poor wine of Lû gave occasion to the siege of Han-tan 2 ;' 'When sages are born great robbers arise 3 .' When the stream is dried, the valley is empty; when the mound is levelled, the deep pool (beside it) is filled up.\n\nWhen the sages have died, the great robbers will not arise; the world would be at peace, and there would be no more troubles.\n\nWhile the sagely men have not died, great robbers will not cease to appear.\n\nThe more right that is attached to (the views of) the sagely men for the government of the world, the more advantage will accrue to (such men as) the robber Kih.\n\nIf we make for men pecks and bushels p.\n\n285 to measure (their wares), even by means of those pecks and bushels should we be teaching them to steal 1 ; if we make for them weights and steelyards to weigh (their wares), even by means of those weights and steelyards shall we be teaching them to steal.\n\nIf we make for them tallies and seals to secure their good faith, even by means of those tallies and seals shall we be teaching them to steal.\n\nIf we make for them benevolence and righteousness to make their doings correct, even by means of benevolence and righteousness shall we be teaching them to steal.\n\nHow do I know that it is so?\n\nHere is one who steals a hook (for his girdle);--he is put to death for it: here is another who steals a state;--he becomes its prince.\n\nBut it is at the gates of the princes that we find benevolence and righteousness (most strongly) professed;--is not this stealing benevolence and righteousness, sageness and wisdom?\n\nThus they hasten to become great robbers, carry off princedoms, and steal benevolence and righteousness, with all the gains springing from the use of pecks and bushels, weights and steelyards, tallies and seals:--even the rewards of carriages and coronets have no power to influence (to a different course), and the terrors of the axe have no power to restrain in such cases.\n\nThe giving of so great gain to robbers (like) Kih, and making it impossible to restrain them;--this is the error committed by the sages.\n\n3.\n\nIn accordance with this it is said, 'Fish should p.\n\n286 not be taken from (the protection of) the deep waters; the agencies for the profit of a state should not be shown to men 1 .' But those sages (and their teachings) are the agencies for the profit of the world, and should not be exhibited to it."

