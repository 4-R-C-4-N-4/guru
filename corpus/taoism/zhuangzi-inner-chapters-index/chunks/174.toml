[content]
body = "172:7 Called also Liang from the name of its capital.\n\nWei was one of the three states (subsequently kingdoms), into which the great fief of Zin was divided about B.\n\nC.\n\n400.\n\n173:1 A great and ancient state on the sea-board, north of Yüeh.\n\nThe name remains in the district of Wû-kiang in the prefecture of Sû-kâu.\n\n173:2 The salve gave the troops of Wû a great advantage in a war on the Kiang, especially in winter.\n\n174:1 The Ailantus glandulosa, common in the north of China, called 'the fetid tree,' from the odour of its leaves.\n\n174:2 The bos grunniens of Thibet, the long tail of which is in great demand for making standards and chowries.\n\nNext: Book II: Khî Wû Lun, or 'The Adjustment of Controversies'"

