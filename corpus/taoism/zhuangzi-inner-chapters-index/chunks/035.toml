body = "It is tolerated by the government, but not patronised as it was when emperors and empresses seemed to think more of it than of Confucianism.\n\nIt is by the spread of knowledge, which it has always opposed, that its overthrow and disappearance will be brought about ere long.\n\nFootnotes 12:1 See the Khang-hsî Thesaurus ( ) under .\n\n13:1 Language and Languages, pp.\n\n184, 185.\n\n14:1 Natur.\n\nQuaest.\n\nlib.\n\nII, cap.\n\nxlv.\n\n14:2 Martineau's 'Types of Ethical Theory,' I, p.\n\n286, and his whole 'Conjectural History of Spinoza's Thought.' 14:3 is equivalent to the ἡ ὁδός, the way.\n\nWhere this name for the Christian system occurs in our Revised Version of the New Testament in the Acts of the Apostles, the literal rendering is adhered to, Way being printed with a capital W.\n\nSee Acts ix.\n\n2; xix.\n\n9, 23; xxii.\n\n4; xxiv.\n\n14, 22.\n\n15:1 .\n\nThe Khang-hsî dictionary defines thû by lû, road or way.\n\nMedhurst gives 'road.' Unfortunately, both Morrison and Williams overlooked this definition of the character.\n\nGiles has also a note in loc., showing how this synonym settles the original meaning of Tâo in the sense of 'road.' 17:1 The Tâo Teh King, Ch.\n\n25, and Kwang-dze, XIII, par.\n\n1.\n\n17:2 See 'Strange Stories from a Chinese Studio,' vol.\n\ni, p.\n\ni, note 2.\n\n18:1 Kwang Khäng-dze heads the list of characters in Ko Hung's 'History of Spirit-like Immortals ( ),' written in our fourth century.\n\n'He was,' it is said, 'an Immortal of old, who lives on the hill of M'ung-thung in a grotto of rocks.' 19:1 For this sentence we find in Mr.\n\nBalfour:--'Spirits of the dead, receiving It, become divine; the very gods themselves owe their divinity to its influence; and by it both Heaven and Earth were produced.' The version of it by Mr.\n\nGiles is too condensed:--'Spiritual beings drew their spirituality therefrom, while the universe became what we see it now.' 20:1 Compare also Bk.\n\nXXII, parr.\n\n7, 8, and XXIII, par.\n\n10.\n\n20:2 Mr.\n\nBalfour had given for this sentence:--'In the beginning of all things there was not even nothing.\n\nThere were no names; these arose afterwards.' In his critique on Mr.\n\nBalfour's version in 1882, Mr.\n\nGiles proposed:--'At the beginning of all things there was nothing; but this nothing had no name.' He now in his own version gives for it, 'At the beginning of the beginning, even nothing did not exist.\n\nThen came the period of the nameless;'--an improvement, certainly, on the other; but which can hardly be accepted as the correct version of the text.\n\n21:1 The Tâo Teh King, ch.\n\n14; et al.\n\n21:2 Ch.\n\n50.\n\n22:1 That is, between heaven and earth.\n\n23:1 Quoted in the Amplification of the Sixteen Precepts or Maxims of the second emperor of the present dynasty by his son.\n\nThe words are from Dr.\n\nMilne's version of 'the Sacred Edict,' p.\n\n137.\n\n23:2 In his Index to the Tripitaka, Mr.\n\nBunyio Nanjio (P."

