[content]
body = "With no desire, at rest and still, All things go right, as of their will.' I do not cull any passages from Kwang-dze to illustrate these points.\n\nIn his eleventh Book his subject is Government by 'Let-a-be and the exercise of Forbearance.' 7.\n\nThis Tâo ruled men at first, and then the world was in a paradisiacal state.\n\nNeither of our authorities tells us The paradisiacal state.\n\nhow long this condition lasted, but as Lâo observes in his eighteenth chapter, 'the Tâo ceased to be observed.' Kwang-dze, however, gives us p.\n\n27 more than one description of what he considered the paradisiacal state was.\n\nHe calls it 'the age of Perfect Virtue.' In the thirteenth paragraph of his twelfth Book he says, 'In this age, they attached no value to wisdom, nor employed men of ability.\n\nSuperiors were (but) as the higher branches of a tree; and the people were like the deer of the wild.\n\nThey were upright and correct, without knowing that to be so was Righteousness; they loved one another, without knowing that to do so was Benevolence; they were honest and leal-hearted, without knowing that it was Loyalty; they fulfilled their engagements, without knowing that to do so was Good Faith; in their movements they employed the services of one another, without thinking that they were conferring or receiving any gift.\n\nTherefore their actions left no trace, and there was no record of their affairs.' Again, in the fourth paragraph of his tenth Book, addressing an imaginary interlocutor, he says, 'Are you, Sir, unacquainted with the age of Perfect Virtue?' He then gives the names of twelve sovereigns who ruled in it, of the greater number of whom we have no other means of knowing anything, and goes on:--'In their times the people used knotted cords in carrying on their business.\n\nThey thought their (simple) food pleasant, and their (plain) clothing beautiful.\n\nThey were happy in their (simple) manners, and felt at rest in their (poor) dwellings.\n\n(The people of) neighbouring states might be able to descry one another; the voices of their cocks and dogs might be heard from one to the other; they might not die till they were old; and yet all their life they would have no communication together.\n\nIn those times perfect good order prevailed.' One other description of the primeval state is still more interesting.\n\nIt is in the second paragraph of Bk.\n\nIX: 'The people had their regular and constant nature:--they wove and made themselves clothes; they tilled the ground and got food.\n\nThis was their common faculty.\n\nThey were all one in this, and did not form themselves into separate classes; so were they constituted and left to their natural tendencies.\n\nTherefore in the age of Perfect Virtue men walked along with slow and grave step, and with their p.\n\n28 looks steadily directed forwards.\n\nOn the hills there were no footpaths nor excavated passages; on the lakes there were no boats nor dams.\n\nAll creatures lived in companies, and their places of settlement were made near to one another.\n\nBirds and beasts multiplied to flocks and herds; the grass and trees grew luxuriant and long.\n\nThe birds and beasts might be led about without feeling the constraint; the nest of the magpie might be climbed to, and peeped into.\n\nYes, in the age of Perfect Virtue, men lived in common with birds and beasts, and were on terms of equality with all creatures, as forming one family;--how could they know among themselves the distinctions of superior men and small men?\n\nEqually without knowledge, they did not leave the path of their natural virtue; equally free from desires, they were in the state of pure simplicity."

