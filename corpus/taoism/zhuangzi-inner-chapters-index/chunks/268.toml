body = "Sacred Texts Taoism Index Previous Next p.\n\n345 BOOK XIV.\n\nPART II.\n\nSECTION VII.\n\nThien Yün, or 'The Revolution of Heaven 1 .' 1.\n\nHow (ceaselessly) heaven revolves!\n\nFlow (constantly) earth abides at rest!\n\nAnd do the sun and moon contend about their (respective) places?\n\nWho presides over and directs these (things)?\n\nWho binds and connects them together?\n\nWho is it that, without trouble or exertion on his part, causes and maintains them?\n\nIs it, perhaps, that there is some secret spring, in consequence of which they cannot be but as they are?\n\nOr is it, perhaps, that they move and turn as they do, and cannot stop of themselves?\n\n(Then) how the clouds become rain!\n\nAnd how the rain again forms the clouds!\n\nWho diffuses them so abundantly?\n\nWho is it that, without trouble or exertion on his part, produces this elemental enjoyment, and seems to stimulate it?\n\nThe winds rise in the north; one blows to the west, and another to the east; while some rise upwards, uncertain in their direction.\n\nBy whose breathing are they produced?\n\nWho is it that, without any trouble and exertion of his own, effects all their undulations?\n\nI venture to ask their cause 2 .\n\np.\n\n346 Wû-hsien Thiâo 1 said, 'Come, and I will tell you.\n\nTo heaven there belong the six Extreme Points, and the five Elements 2 .\n\nWhen the Tîs and Kings acted in accordance with them, there was good government; when they acted contrary to them, there was evil.\n\nObserving the things (described) in the nine divisions (of the writing) of Lo 3 , their government was perfected and their virtue was complete.\n\nThey inspected and enlightened the kingdom beneath them, and all under the sky acknowledged and sustained them.\n\nSuch was the condition under the august (sovereigns 4 ) and those before them.' 2.\n\nTang 5 , the chief administrator of Shang 5 , asked Kwang-dze about Benevolence 6 , and the answer was, 'Wolves and tigers are benevolent.' 'What do you mean?' said Tang.\n\nKwang-dze replied, 'Father and son (among them) are affectionate to one another.\n\nWhy should they be considered as not benevolent?' p.\n\n347 'Allow me to ask about perfect benevolence,' pursued the other.\n\nKwang-dze said, 'Perfect benevolence 1 does not admit (the feeling) of affection.' The minister said, 'I have heard that, without (the feeling of) affection there is no love, and without love there is not filial duty;--is it permissible to say that the perfectly benevolent are not filial?' Kwang-dze rejoined, 'That is not the way to put the case.\n\nPerfect Benevolence is the very highest thing;--filial duty is by no means sufficient to describe it.\n\nThe saying which you quote is not to the effect that (such benevolence) transcends filial duty;--it does not refer to such duty at all.\n\nOne, travelling to the south, comes (at last) to Ying 2 , and there, standing with his face to the north, he does not see mount Ming 3 .\n\nWhy does he not see it?\n\nBecause he is so far from it.\n\nHence it is said, \"Filial duty as a part of reverence is easy, but filial duty as a part of love is difficult.\n\nIf it be easy as a part of love, yet it is difficult to forget 4 one's parents.\n\nIt may be easy for me to forget my parents, but it is difficult to make my parents forget me."

