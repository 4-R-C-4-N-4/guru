[content]
body = "A pair of white herons look at each other with pupils that do not move, and impregnation takes place; the male insect emits its buzzing sound in the air above, and the female responds from the air below, and impregnation takes place; the creatures called lêi are both male and female, and each individual breeds of itself 1 .\n\nThe nature cannot be altered; the conferred constitution cannot be changed; the march of the seasons cannot be arrested; the Tâo cannot be stopped.\n\nIf you get the Tâo, there is no effect that cannot be produced; if you miss it, there is no effect that can.' Confucius (after this) did not go out, till at the end of three months he went again to see Lâo Tan, and said, 'I have got it.\n\nRavens produce their young by hatching; fishes by the communication of their milt; the small-waisted wasp by p.\n\n362 transformation 1 ; when a younger brother comes, the elder weeps 2 .\n\nLong is it that I have not played my part in harmony with these processes of transformation.\n\nBut as I did not play my part in harmony with such transformation, how could I transform men?' Lâo-dze said, 'You will do.\n\nKhiû, you have found the Tâo.' Footnotes 345:1 See pp.\n\n145, 146.\n\n345:2 Down to this we have a description of the phenomena of heaven and earth and of nature generally as proceeding regularly p.\n\n346 and noiselessly, without any apparent cause; which is the chief subject of the Book.\n\nAs the description is not assigned to any one, we must suppose it to be from Kwang-dze himself; and that it is he who asks the question in the last three characters.\n\n346:1 This is said by the critics to have been a minister of the Shang dynasty, under Thâi-mâu in the seventeenth century B.\n\nC.; but even Kwang-dze would hardly so violate the unity of time.\n\n346:2 Generally means 'the Five Regular Virtues;' supposed to mean here 'the Five Elements.' 346:3 Probably the 'Nine Divisions of the Great Plan,' in the Shû King, V, iv, fancied to be derived from the writing, which a tortoise from the Lo river exhibited to the great Yü.\n\n346:4 Possibly Fû-hsî, Shän Näng, and Hwang-Tî.\n\n346:5 'Shang' must be taken as the duchy of Sung, assigned by king Wû to the representative of the kings of the dynasty of Shang.\n\n'Tang' would be a principal minister of it in the time of Kwang-dze.\n\n346:6 The chief of all the virtues according to Confucianism.\n\n347:1 A denomination here for the Tâo, employed by Kwang-dze for the purpose of his argument.\n\n347:2 The capital of the state of Khû in the south.\n\n347:3 Name of a hill in the extreme north.\n\n347:4 The Tâo requires such forgetfulness on the part of both giver and receiver; it is a part of its 'doing-nothing.' 347:5 I think this is the meaning.\n\n348:1 The Tâo.\n\n348:2 This free version takes as = .\n\nSo the Khang-list dictionary explains it.\n\n348:3 Only heard of, so far as I know, in this passage.\n\n348:4 The name of Hwang-Tî's music; I do not venture to translate it.\n\nIn his elaborate description of it, our author intended to give an idea of the Tâo, and the effect which the study of it was calculated to produce on the mind; as appears from the concluding sentence of the paragraph."

