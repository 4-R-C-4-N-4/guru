body = "Sacred Texts Taoism Index Previous Next BOOK VI.\n\nTÂ ZUNG SHIH.\n\nSo I translate the title of this Book, taking Zung as a verb, and Zung Shih as = 'The Master who is Honoured.' Some critics take Zung in the sense of 'Originator,' in which it is employed in the Tâo Teh King, lxx, 2.\n\nWhichever rendering be adopted, there is no doubt that the title is intended to be a designation of the Tâo; and no one of our author's Books is more important for the understanding of his system of thought.\n\nThe key to it is found in the first of its fifteen paragraphs.\n\nThere are in man two elements;-the Heavenly or Tâoistic, and the human.\n\nThe disciple of the Tâo, recognising them both, cultivates what he knows as a man p.\n\n135 so as to become entirely conformed to the action of the Tâo, and submissive in all the most painful experiences in his lot, which is entirely ordered by it.\n\nA seal will be set on the wisdom of this course hereafter, when he has completed the period of his existence on earth, and returns to the state of non-existence, from which the Tâo called him to be born as a man.\n\nIn the meantime he may attain to be the True man possessing the True knowledge.\n\nOur author then proceeds to give his readers in five paragraphs his idea of the True Man.\n\nMr.\n\nBalfour says that this name is to be understood 'in the esoteric sense, the partaking of the essence of divinity,' and he translates it by 'the Divine Man.' But we have no right to introduce here the terms 'divine' and 'divinity.' Nan-hwâi (VII, 5b) gives a short definition of the name which is more to the point:--'What we call \"the True Man\" is one whose nature is in agreement with the Tâo ( ) and the commentator adds in a note, 'Such men as Fû-hsî, Hwang-Tî, and Lâo Tan.' The Khang-hsî dictionary commences its account of the character or 'True' by a definition of the True Man taken from the Shwo Wän as a , 'a recluse of the mountain, whose bodily form has been changed, and who ascends to heaven;' but when that earliest dictionary was made, Tâoism had entered into a new phase, different from what it had in the time of our author.\n\nThe most prominent characteristic of the True Man is that he is free from all exercise of thought and purpose, a being entirely passive in the hands of the Tâo.\n\nIn par.\n\n3 seven men are mentioned, good and worthy men, but inferior to the True.\n\nHaving said what he had to say of the True Man, Kwang-dze comes in the seventh paragraph to speak directly of the Tâo itself, and describes it with many wonderful predicates which exalt it above our idea of God;--a concept and not a personality.\n\nHe concludes by mentioning a number of ancient personages who had got the Tâo, and by it wrought wonders, beginning with a Shih-wei, who preceded Fû-hsî, and ending with Fû Yüeh, the minister of p.\n\n136 Wû-ting, in the fourteenth century B.\n\nC., and who finally became a star in the eastern portion of the zodiac.\n\nPhäng Zû is also mentioned as living, through his possession of the Tâo, from the twenty-third century 13.\n\nC.\n\nto the seventh or later.\n\nThe sun and moon and the constellation of the Great Bear are also mentioned as its possessors, and the fabulous Being called the Mother of the Western King."

