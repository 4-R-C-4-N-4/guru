[content]
body = "Tell a man that he is merely following (the opinions) of another, or that he is a flatterer of others, and at once he flushes with anger.\n\nAnd yet all his life he is merely following others, and flattering them.\n\nHis illustrations are made to agree with theirs; his phrases are glossed:--to win the approbation of the multitudes.\n\nFrom first to last, from beginning to end, he finds no fault with their views.\n\nHe will let his robes hang down 2 , display the colours on them, and arrange his movements and bearing, so as to win the favour of his age, and yet not call himself a flatterer.\n\nHe is but a follower of those others, approving and disapproving p.\n\n327 as they do, and yet he will not say that he is one of them.\n\nThis is the height of stupidity.\n\nHe who knows his stupidity is not very stupid; he who knows that he is under a delusion is not greatly deluded.\n\nHe who is greatly deluded will never shake the delusion off; he who is very stupid will all his life not become intelligent.\n\nIf three men be walking together, and (only) one of them be under a delusion (as to their way), they may yet reach their goal, the deluded being the fewer; but if two of them be under the delusion, they will not do so, the deluded being the majority.\n\nAt the present time, when the whole world is under a delusion, though I pray men to go in the right direction, I cannot make them do so;--is it not a sad case?\n\nGrand music does not penetrate the ears of villagers; but if they hear 'The Breaking of the Willow,' or 'The Bright Flowers 1 ,' they will roar with laughter.\n\nSo it is that lofty words do not remain in the minds of the multitude, and that perfect words are not heard, because the vulgar words predominate.\n\nBy two earthenware instruments the (music of) a bell will be confused, and the pleasure that it would afford cannot be obtained.\n\nAt the present time the whole world is under a delusion, and though I wish to go in a certain direction, how can I succeed in doing so?\n\nKnowing that I cannot do so, if I were to try to force my way, that would be another delusion.\n\nTherefore my best course is to let my purpose go, and no more pursue it.\n\nIf I do not pursue it, whom shall 1 have to share in my sorrow 2 ?\n\np.\n\n328 If an ugly man 1 have a son born to him at midnight, he hastens with a light to look at it.\n\nVery eagerly he does so, only afraid that it may be like himself.\n\n15 2 .\n\nFrom a tree a hundred years old a portion shall be cut and fashioned into a sacrificial vase, with the bull figured on it, which is ornamented further with green and yellow, while the rest (of that portion) is cut away and thrown into a ditch.\n\nIf now we compare the sacrificial vase with what was thrown into the ditch, there will be a difference between them as respects their beauty and ugliness; but they both agree in having lost the (proper) nature of the wood.\n\nSo in respect of their practice of righteousness there is a difference between (the robber) Kih on the one hand, and Zäng (Shän) or Shih (Zhiû) on the other; but they all agree in having lost (the proper qualities of) their nature.\n\nNow there are five things which produce (in men) the loss of their (proper) nature."

