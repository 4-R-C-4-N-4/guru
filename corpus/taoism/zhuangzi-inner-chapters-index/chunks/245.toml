body = "297:1 Compare this picture of the times after Yâo and Shun with that given by Mencius in III, ii, ch.\n\n9 et al.\n\nBut the conclusions arrived at as to the causes and cure of their evils by him and our author are very different.\n\n297:2 A quotation, with the regular formula, from the Tâo Teh King, ch.\n\n19, with some variation of the text.\n\n297:3 ?\n\nin B.C.\n\n2678.\n\n297:4 Another imaginary personage; apparently, a personification of the Tâo.\n\nSome say he was Lâo-dze,--in one of his early states of existence; others that he was 'a True Man,' the teacher of Hwang-Tî.\n\nSee Ko Hung's 'Immortals,' I, i.\n\n297:5 Equally imaginary is the mountain Khung-thung.\n\nSome critics find a place for it in the province of Ho-nan; the majority say it is the highest point in the constellation of the Great Bear.\n\n297:6 The original ether, undivided, out of which all things were formed.\n\n298:1 The same ether, now in motion, now at rest, divided into the Yin and Yang.\n\n299:1 It seems very clear here that the earliest Taoism taught that the cultivation of the Tâo tended to prolong and preserve the bodily life.\n\n299:2 A remarkable, but not a singular, instance of Kwang-dze's application of the name 'Heaven.' 300:1 A very difficult sentence, in interpreting which there are great differences among the critics.\n\n300:2 I have preferred to retain Yün Kiang and Hung Mung as if they were the surnames and names of two personages here introduced.\n\nMr.\n\nBalfour renders them by 'The Spirit of the Clouds,' and 'Mists of Chaos.' The Spirits of heaven or the sky have still their place in the Sacrificial Canon of China, as 'the Cloud-Master, the Rain-Master, the Baron of the Winds, and the Thunder Master.' Hung Mung, again, is a name for 'the Great Ether,' or, as Dr.\n\nMedhurst calls it, 'the Primitive Chaos.' 300:3 Literally, 'passing by a branch of Fû-yâo;' but we find fû-yâo in Book I, meaning 'a whirlwind.' The term 'branch' has made some critics explain it here as 'the name of a tree,' which is inadmissible.\n\nI have translated according to the view of Lû Shû-kih.\n\n300:4 Or 'stomach,'--according to another reading.\n\n301:1 Probably, the yin, the yang, wind, rain, darkness, and light; see Mayers, p.\n\n323.\n\n301:2 See introduction, pp.\n\n17 , 18 .\n\n301:3 Compare in Book XXIII, par.\n\nx.\n\n302:1 They never show any will of their own.--On the names Yün Kiang and Hung Mung, Lû Shû-kih makes the following remarks:--'These were not men, and yet they are introduced here as questioning and answering each other; showing us that our author frames and employs his surnames and names to serve his own purpose.\n\nThose names and the speeches made by the parties are all from him.\n\nWe must believe that he introduces Confucius, Yâo, and Shun just in the same way.' 303:1 Meaning eccentric thinkers not Tâoists, like Hui-dze, Kung-sun Lung, and others.\n\n303:2 The construing and connexion of this sentence are puzzling.\n\n304:1 The nine regions' generally means the nine provinces into which the Great Yü divided the kingdom."

