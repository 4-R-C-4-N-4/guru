[content]
body = "Hence he who tries to share his joys with others is not a sagely man; he who manifests affection is not benevolent; he who observes times and seasons (to regulate his conduct) is not a man of wisdom; he to whom profit and injury are not the same is not a superior man; he who acts for the sake of the name of doing so, and loses his (proper) self is not the (right) scholar; and he who throws away his person in a way which is not the true (way) cannot command the service of others.\n\nSuch men as Hû Pû-kieh, Wû Kwang, Po-î, Shû-khî, the count of Kî, Hsü-yü, Kî Thâ, and Shän-thû Tî, all did service for other men, and sought to secure for them what they desired, not seeking their own pleasure 2 .\n\np.\n\n240 4.\n\nThe True men of old presented the aspect of judging others aright, but without being partisans; of feeling their own insufficiency, but being without flattery or cringing.\n\nTheir peculiarities were natural to them, but they were not obstinately attached to them; their humility was evident, but there was nothing of unreality or display about it.\n\nTheir placidity and satisfaction had the appearance of joy; their every movement seemed to be a necessity to them.\n\nTheir accumulated attractiveness drew men's looks to them; their blandness fixed men's attachment to their virtue.\n\nThey seemed to accommodate themselves to the (manners of their age), but with a certain severity; their haughty indifference was beyond its control.\n\nUnceasing seemed their endeavours to keep (their mouths) shut; when they looked down, they had forgotten what they wished to say.\n\nThey considered punishments to be the substance (of government, and they never incurred it); ceremonies to be its supporting wings (and they always observed them); wisdom (to indicate) the time (for action, and they always selected it); and virtue to be accordance (with others), and they were all-accordant.\n\nConsidering punishments to be the substance (of government), yet their generosity appeared in the (manner of their) infliction of death.\n\nConsidering ceremonies to be its supporting wings, they pursued p.\n\n241 by means of them their course in the world.\n\nConsidering wisdom to indicate the time (for action), they felt it necessary to employ it in (the direction of) affairs.\n\nConsidering virtue to be accordance (with others), they sought to ascend its height along with all who had feet (to climb it).\n\n(Such were they), and yet men really thought that they did what they did by earnest effort 1 .\n\n5.\n\nIn this way they were one and the same in all their likings and dislikings.\n\nWhere they liked, they were the same; where they did not like, they were the same.\n\nIn the former case where they liked, they were fellow-workers with the Heavenly (in them); in the latter where they disliked, they were coworkers with the Human in them.\n\nThe one of these elements (in their nature) did not overcome the other.\n\nSuch were those who are called the True men.\n\nDeath and life are ordained, just as we have the constant succession of night and day;--in both cases from Heaven.\n\nMen have no power to do anything in reference to them;--such is the constitution of things 2 .\n\nThere are those who specially regard Heaven 3 as their father, and they still love It (distant as It is) 3 ;--how much more should they love p.\n\n242 That which stands out (Superior and Alone) 1 !\n\nSome specially regard their ruler as superior to themselves, and will give their bodies to die for him; how much more should they do so for That which is their true (Ruler) 1 !"

