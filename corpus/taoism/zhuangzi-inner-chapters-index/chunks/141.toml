[content]
body = "We must give our judgment for the teaching of Confucianism in preference to that of Tâoism, if our author can be regarded as a fair expositor of the latter.\n\nHe is ingenious in his statements and illustrations, but he was, like his master Lâo-dze, only a dreamer.\n\nNext: Book IX: Mâ Thî"

