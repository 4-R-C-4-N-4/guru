[content]
body = "C., the famous Po-î, who died of hunger rather than acknowledge the dynasty of Kâu; and one of a more recent age, the robber Shih, a great leader of brigands, who brought himself by his deeds to an untimely end; and he sees nothing to choose between them.\n\nWe must give our judgment for the teaching of Confucianism in preference to that of Tâoism, if our author can be regarded as a fair expositor of the latter.\n\nHe is ingenious in his statements and illustrations, but he was, like his master Lâo-dze, only a dreamer.\n\nNext: Book IX: Mâ Thî"

