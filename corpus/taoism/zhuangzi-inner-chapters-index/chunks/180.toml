body = "Let us abjure such procedure, and simply rest here 1 .\n\n7.\n\nThe Tâo at first met with no responsive recognition.\n\nSpeech at first had no constant forms of expression.\n\nBecause of this there came the demarcations (of different views).\n\nLet me describe those demarcations:--they are the Left and the Right 2 ; the Relations and their Obligations 3 ; Classifications 4 p.\n\n189 and their Distinctions; Emulations and Contentions.\n\nThese are what are called 'the Eight Qualities.' Outside the limits of the world of men 1 , the sage occupies his thoughts, but does not discuss about anything; inside those limits he occupies his thoughts, but does not pass any judgments.\n\nIn the Khun Khiû 2 , which embraces the history of the former kings, the sage indicates his judgments, but does not argue (in vindication of them).\n\nThus it is that he separates his characters from one another without appearing to do so, and argues without the form of argument.\n\nHow does he do so?\n\nThe sage cherishes his views in his own breast, while men generally state theirs argumentatively, to show them to others.\n\nHence we have the saying, 'Disputation is a proof of not seeing clearly.' The Great Tâo 3 does not admit of being praised.\n\nThe Great Argument does not require words.\n\nGreat Benevolence is not (officiously) benevolent.\n\nGreat Disinterestedness does not vaunt its humility.\n\nGreat Courage is not seen in stubborn bravery.\n\nThe Tâo that is displayed is not the Tâo.\n\nWords that are argumentative do not reach the point.\n\nBenevolence that is constantly exercised does not accomplish its object.\n\nDisinterestedness that vaunts its purity is not genuine.\n\nCourage that is most stubborn p.\n\n190 is ineffectual.\n\nThese five seem to be round (and complete), but they tend to become square (and immovable) 1 .\n\nTherefore the knowledge that stops at what it does not know is the greatest.\n\nWho knows the argument that needs no words, and the Way that is not to be trodden 2 ?\n\nHe who is able to know this has what is called 'The Heavenly Treasure-house 3 .' He may pour into it without its being filled; he may pour from it without its being exhausted; and all the while he does not know whence (the supply) comes.\n\nThis is what is called 'The Store of Light 3 .' Therefore of old Yâo asked Shun, saying, 'I wish to smite (the rulers of) Zung, Kwei, and Hsü-âo 4 .\n\nEven when standing in my court, I cannot get them out of my mind.\n\nHow is it so?' Shun replied, 'Those three rulers live (in their little states) as if they were among the mugwort and other brushwood;--how is it that you cannot get them out of your mind?\n\nFormerly, ten suns came out together, and all things were illuminated by them;--how much should (your) virtue exceed (all) suns!' 8.\n\nNieh Khüeh 5 asked Wang Î 5 , saying, 'Do you know, Sir, what all creatures agree in approving and p.\n\n191 affirming?' 'How should I know it?' was the reply.\n\n'Do you know what it is that you do not know?' asked the other again, and he got the same reply.\n\nHe asked a third time,--'Then are all creatures thus without knowledge?' and Wang Î answered as before, (adding however), 'Notwithstanding, I will try and explain my meaning."

