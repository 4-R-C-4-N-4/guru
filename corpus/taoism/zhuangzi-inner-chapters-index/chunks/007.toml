[content]
body = "In the thirteenth century the Roman Catholic Church sent its earliest missionaries to China, but we hardly know anything of their literary labours.\n\nThe great Romish missions which continue to the present day began towards the end of the sixteenth century; and there exists now in the India Office a translation of the Tâo Teh King in Latin, which was brought to England p.\n\nxiii by a Mr.\n\nMatthew Raper, and presented by him to the Royal Society, of which he was a Fellow, on January 10th, 1788.\n\nThe manuscript is in excellent preservation, but we do not know by whom the version was made.\n\nIt was presented, as stated in the Introduction, p.\n\n12, to Mr.\n\nRaper by P.\n\nde Grammont, 'Missionarius Apostolicus, ex-Jesuita.' The chief object of the translator or translators was to show that 'the Mysteries of the Most Holy Trinity and of the Incarnate God were anciently known to the Chinese nation.' The version as a whole is of little value.\n\nThe reader will find, on pp.\n\n115, 116, its explanation of Lâo's seventy-second chapter;--the first morsel of it that has appeared in print.\n\nProtestant missions to China commenced in 1807; but it was not till 1868 that the Rev.\n\nDr.\n\nChalmers, a member of one of them, published his 'Speculations on Metaphysics, Polity, and Morality of \"The Old Philosopher,\" Lao-Tsze.' Meanwhile, Abel Rémusat had aroused the curiosity of scholars throughout Europe, in 1823, by his 'Memoir on the Life and Opinions of Lâo-Tseu, a Chinese Philosopher of the sixth century before our era, who professed the opinions commonly attributed to Pythagoras, to Plato, and to their disciples.' Rémusat was followed by one who had received from him his first lessons in Chinese, and had become a truly great Chinese scholar,--the late Stanislas Julien.\n\nHe published in 1842 'a complete translation for the first time of this memorable Work, which is regarded with reason as the most profound, the most abstract, and the most difficult of all Chinese Literature.' Dr.\n\nChalmers's translation was also complete, but his comments, whether original or from Chinese sources, were much fewer than those supplied by Julien.\n\nTwo years later, two German versions of the Treatise were published at Leipzig;--by Reinhold von Plänckner and Victor von Strauss, differing much from each other, but both marked by originality and ability.\n\nI undertook myself, as stated above, in 1879 to translate for 'The Sacred Books of the East' the Texts of Tâoism p.\n\nxiv which appear in these volumes; and, as I could find time from my labours on 'The Texts of Confucianism,' I had written out more than one version of Lâo's work by the end of 1880.\n\nThough not satisfied with the result, I felt justified in exhibiting my general views of it in an article in the British Quarterly Review of July, 1883.\n\nIn 1884 Mr.\n\nF.\n\nH.\n\nBalfour published at Shanghai a version of 'Taoist Texts, Ethical, Political, and Speculative.' His Texts were ten in all, the Tâo Teh King being the first and longest of them.\n\nHis version of this differed in many points from all previous versions; and Mr.\n\nH.\n\nA.\n\nGiles, of H.\n\nM.'s Consular Service in China, vehemently assailed it and also Dr.\n\nChalmers's translation, in the China Review for March and April, 1886.\n\nMr."

