[content]
body = "What method have you, moreover, for the government of the world that you (thus) agitate my mind?' (Thien Kän), however, again asked the question, and the nameless man said, 'Let your mind find its enjoyment in pure simplicity; blend yourself with (the primary) ether in idle indifference; allow all things to take their natural course; and admit no personal or selfish consideration:--do this and the world will be governed.' 4.\n\nYang Dze-kü 5 , having an interview with Lao Tan, said to him, 'Here is a man, alert and vigorous p.\n\n262 in responding to all matters 1 , clearsighted and widely intelligent, and an unwearied student of the Tâo;--can he be compared to one of the intelligent kings?' The reply was, 'Such a man is to one of the intelligent kings but as the bustling underling of a court who toils his body and distresses his mind with his various contrivances 2 .\n\nAnd moreover, it is the beauty of the skins of the tiger and leopard which makes men hunt them; the agility of the monkey, or (the sagacity of) the dog that catches the yak, which make men lead them in strings; but can one similarly endowed be compared to the intelligent kings?' Yang dze-kü looked discomposed and said, 'I venture to ask you what the government of the intelligent kings is.' Lâo Tan replied, 'In the governing of the intelligent kings, their services overspread all under the sky, but they did not seem to consider it as proceeding from themselves; their transforming influence reached to all things, but the people did not refer it to them with hope.\n\nNo one could tell the name of their agency, but they made men and things be joyful in themselves.\n\nWhere they took their stand could not be fathomed, and they found their enjoyment in (the realm of) nonentity.' 5.\n\nIn Käng there was a mysterious wizard 3 called p.\n\n263 Ki-hsien.\n\nHe knew all about the deaths and births of men, their preservation and ruin, their misery and happiness, and whether their lives would be long or short, foretelling the year, the month, the decade and the day like a spirit.\n\nWhen the people of Käng saw him, they all ran out of his way.\n\nLieh-dze went to see him, and was fascinated 1 by him.\n\nReturning, he told Hû-dze of his interview, and said, 'I considered your doctrine, my master, to be perfect, but I have found another which is superior to it.' Hû-dze 2 replied, 'I have communicated to you but the outward letter of my doctrine, and have not communicated its reality and spirit; and do you think that you are in possession of it?\n\nHowever many hens there be, if there be not the cock among them, how should they lay (real) eggs 3 ?\n\nWhen you confront the world with your doctrine, you are sure to show in your countenance (all that is in your mind) 4 , and so enable (this) man to succeed in interpreting your physiognomy.\n\nTry and come to me with him, that I may show myself to him.' On the morrow, accordingly, Lieh-dze came with the man and saw Ha-dze.\n\nWhen they went out, the p.\n\n264 wizard said, 'Alas!\n\nyour master is a dead man.\n\nHe will not live;--not for ten days more!\n\nI saw something strange about him;--I saw the ashes (of his life) all slaked with water!' When Lieh-dze reentered, he wept till the front of his jacket was wet with his tears, and told Hû-dze what the man had said."

