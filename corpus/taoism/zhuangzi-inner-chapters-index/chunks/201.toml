[content]
body = "'As a verification of the (power of) the original endowment, when it has been preserved, take the result of fearlessness,-how the heroic spirit of a single brave soldier has been thrown into an army of nine hosts 4 .\n\nIf a man only seeking for fame and able in this way to secure it can produce such an effect, how much more (may we look for a greater p.\n\n226 result) from one whose rule is over heaven and earth, and holds all things in his treasury, who simply has his lodging in the six members 1 of his body, whom his ears and eyes serve but as conveying emblematic images of things, who comprehends all his knowledge in a unity, and whose mind never dies!\n\nIf such a man were to choose a day on which he would ascend far on high, men would (seek to) follow him there.\n\nBut how should he be willing to occupy himself with other men?' 2.\n\nShän-thû Kîa 2 was (another) man who had lost his feet.\n\nAlong with dze-khân 3 of Käng 3 he studied under the master Po-hwän Wû-zän 4 .\n\nDze-khân said to him (one day), 'If I go out first, do you remain behind; and if you go out first, I will remain behind.' Next day they were again sitting together on the same mat in the hall, when Dze-khân spoke the same words to him, adding,' Now I am about to go out; will you stay behind or not?\n\nMoreover, when you see one of official rank (like myself), you do not try to get out of his way;-do you consider yourself equal to one of official rank?' Shän-thû Kîa replied, 'In our Master's school is there indeed such recognition required of official rank?\n\nYou are one, Sir, whose pleasure is in your official rank, and would therefore take precedence of other men.\n\nI p.\n\n227 have heard that when a mirror is bright, the dust does not rest on it; when dust rests on it the mirror is not bright.\n\nWhen one dwells long with a man of ability and virtue, he comes to be without error.\n\nThere now is our teacher whom you have chosen to make you greater than you are; and when you still talk in this way, are you not in error?' Dze-khân rejoined, 'A (shattered) object as you are, you would still strive to make yourself out as good as Yâo!\n\nIf I may form an estimate of your virtue, might it not be sufficient to lead you to the examination of yourself?' The other said, 'Most criminals, in describing their offences, would make it out that they ought not to have lost (their feet) for them; few would describe them so as to make it appear that they should not have preserved their feet.\n\nThey are only the virtuous who know that such a calamity was unavoidable, and therefore rest in it as what was appointed for them.\n\nWhen men stand before (an archer like) Î 1 with his bent bow, if they are in the middle of his field, that is the place where they should be hit; and if they be not hit, that also was appointed.\n\nThere are many with their feet entire who laugh at me because I have lost my feet, which makes me feel vexed and angry.\n\nBut when I go to our teacher, I throw off that feeling, and return (to a better mood);--he has washed, without my knowing it, the other from me by (his instructions in) what is good.\n\nI have attended him now for nineteen years, and have not known that I am without my feet.\n\nNow, you, Sir, and I have for the object of our study the p."

