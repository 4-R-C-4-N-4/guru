[content]
body = "Being in harmony with men is called the joy of men; being in harmony with Heaven is called the joy of Heaven.\n\nKwang-dze said, 'My Master!\n\nmy Master!\n\nHe shall hash and blend all things in mass without being cruel; he shall dispense his favours to all ages without being benevolent.\n\nHe is older than the highest antiquity, and yet is not old.\n\nHe overspreads the heavens and sustains the earth; from him is the carving of all forms without any artful skill 1 !\n\nThis is what is called the Joy of Heaven.\n\nHence it is said, \"Those who know the Joy of Heaven during their life, act like Heaven, and at death undergo transformation like (other) things 2 ; in their stillness p.\n\n333 they possess the quality of the Yin, and in their movement they flow abroad as the Yang.\n\nTherefore he who knows the joy of Heaven has no murmuring against Heaven, nor any fault-finding with men; and suffers no embarrassment from things, nor any reproof from ghosts.\n\nHence it is said, His movements are those of Heaven; his stillness is that of Earth; his whole mind is fixed, and he rules over the world.\n\nThe spirits of his dead do not come to scare him; he is not worn out by their souls.\n\nHis words proceeding from his vacancy and stillness, yet reach to heaven and earth, and show a communication with all things:--this is what is called the joy of Heaven.\n\nThis joy of Heaven forms the mind of the sage whereby he nurtures all under the sky 1 .'\"' 3.\n\nIt was the Way 2 of the Tîs and Kings to regard Heaven and Earth as their Author, the Tâo and its characteristics as their Lord, and Doing-nothing as their constant rule.\n\nDoing-nothing, they could use the whole world in their service and might have done more; acting, they were not sufficient for the service required of them by the world.\n\nHence the men of old held non-inaction in honour.\n\nWhen superiors do nothing and their inferiors also do nothing, inferiors and superiors possess the same virtue; and when inferiors and superiors possess the same virtue, there are none to act as ministers.\n\nWhen inferiors act, and their superiors also act, then superiors and inferiors possess the same Tâo; and when superiors and inferiors possess the same p.\n\n334 [paragraph continues] Tâo, there is none to preside as Lord.\n\nBut that the superiors do nothing and yet thereby use the world in their service, and that the inferiors, while acting, be employed in the service of the world, is an unchangeable principle.\n\nTherefore the ancient kings who presided over the world, though their knowledge embraced (all the operations of) Heaven and Earth, took no thought of their own about them; though their nice discrimination appreciated the fine fashioning of all things, they said not a word about it; though their power comprehended all within the seas, they did nothing themselves.\n\nHeaven produces nothing, yet all things experience their transformations; Earth effects no growth, yet all things receive their nurture; the Tîs and Kings did nothing, yet all the world testified their effective services.\n\nHence it is said, 'There is nothing more spirit-like than Heaven; there is nothing richer than Earth; there are none greater than the Tî s and Kings.' Hence it is said (further), 'The attributes of the Tîs and kings corresponded to those of Heaven and Earth.' It was thus that they availed themselves of (the operations of) Heaven and Earth, carried all things on unceasingly (in their courses), and employed the various classes of men in their service.\n\n4."

