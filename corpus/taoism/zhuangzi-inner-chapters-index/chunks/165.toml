body = "Sacred Texts Taoism Index Previous Next p.\n\n160 BOOK XXXII.\n\nLIEH YÜ-KHÂU.\n\nLieh Yü-khâu, the surname and name of Lieh-dze, with which the first paragraph commences, have become current as the name of the Book, though they have nothing to do with any but that one paragraph, which is found also in the second Book of the writings ascribed to Lieh-dze.\n\nThere are some variations in the two Texts, but they are so slight that we cannot look on them as proofs that the two passages are narratives of independent origin.\n\nVarious difficulties surround the questions of the existence of Lieh-dze, and of the work which bears his name.\n\nThey will be found distinctly and dispassionately stated and discussed in the 146th chapter of the Catalogue of the Khien-lung Imperial Library.\n\nThe writers seem to me to make it out that there was such a man, but they do not make it clear when he lived, or how his writings assumed their present form.\n\nThere is a statement of Liû Hsiang that he lived in the time of duke Ma of Käng (B.C.\n\n627-606); but in that case he must have been earlier than Lâo-dze himself, whom he very frequently quotes.\n\nThe writers think that Lift's 'Mû of Käng' should be Mû of Lû (B.C.\n\n409-377), which would make him not much anterior to Mencius and Kwang-dze; but this is merely an ingenious conjecture.\n\nAs to the composition of his chapters, they are evidently not at first hand from Lieh, but by some one of his disciples; whether they were current in Kwang-dze's days, and be made use of various passages from them, or those passages were Kwang-dze's originally, and taken from him by the followers of Lieh-dze and added to what fragments they had of their master's teaching;--these are points which must be left undetermined.\n\nWhether the narrative about Lieh be from Kwang-dze or not, its bearing on his character is not readily apprehended; but, as we study it, we seem to understand that his master Wû-zän condemned him as not having fully attained to the Tâo, but owing his influence with others p.\n\n161 mainly to the manifestation of his merely human qualities.\n\nAnd this is the lesson which our author keeps before him, more or less distinctly, in all his paragraphs.\n\nAs Lû Shû-kih.\n\nsays:-- 'This Book also sets forth Doing Nothing as the essential condition of the Tâo."

