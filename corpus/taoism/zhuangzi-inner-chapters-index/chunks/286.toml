[content]
body = "What cannot be discoursed about in words, and what cannot be reached by nice discrimination of thought, has nothing to do either with subtilty or grossness.\n\n'Therefore while the actions of the Great Man are not directed to injure men, he does not plume himself on his benevolence and kindness; while his movements are not made with a view to gain, he does not consider the menials of a family as mean; while he does not strive after property and wealth, he does not plume himself on declining them; while he does not borrow the help of others to accomplish his affairs, he does not plume himself on supporting p.\n\n379 himself by his own strength, nor does he despise those who in their greed do what is mean; while he differs in his conduct from the vulgar, he does not plume himself on being so different from them; while it is his desire to follow the multitude, he does not despise the glib-tongued flatterers.\n\nThe rank and emoluments of the world furnish no stimulus to him, nor does he reckon its punishments and shame to be a disgrace.\n\nHe knows that the right and the wrong can (often) not be distinguished, and that what is small and what is great can (often) not be defined.\n\nI have heard it said, \"The Man of Tâo does not become distinguished; the greatest virtue is unsuccessful; the Great Man has no thought of self;\"--to so great a degree may the lot be restricted.' 4.\n\nThe earl of the Ho said, 'Whether the subject be what is external in things, or what is internal, how do we come to make a distinction between them as noble and mean, and as great or small?' Zo of the Northern Sea replied, 'When we look at them in the light of the Tâo, they are neither noble nor mean.\n\nLooking at them in themselves, each thinks itself noble, and despises others.\n\nLooking at them in the light of common opinion, their being noble or mean does not depend on themselves.\n\nLooking at them in their differences from one another, if we call those great which are greater than others, there is nothing that is not great, and in the same way there is nothing that is not small.\n\nWe shall (thus) know that heaven and earth is but (as) a grain of the smallest rice, and that the point of a hair is (as) a mound or a mountain;--such is the view given of them by their relative size.\n\nLooking p.\n\n380 at them from the services they render, allowing to everything the service which it does, there is not one which is not serviceable; and, extending the consideration to what it does not do, there is not one which is not unserviceable.\n\nWe know (for instance) that East and West are opposed to each other, and yet that the one cannot be without (suggesting the idea of) the other;--(thus) their share of mutual service is determined.\n\nLooking at them with respect to their tendencies, if we approve of what they approve, then there is no one who may not be approved of; and, if we condemn what they condemn, there is no one who may not be condemned.\n\nThere are the cases of Yâo and Kieh, each of whom approved of his own course, and condemned the other;--such is the view arising from the consideration of tendency and aim.\n\n'Formerly Yâo and Shun resigned (their thrones), and yet each continued to be Tî; Kih-khwâi 1 resigned (his marquisate) which led to his ruin.\n\nThang and Wû contended (for the sovereignty), and each became king; the duke of Pâi 2 contended (for Khû), which led to his extinction."

