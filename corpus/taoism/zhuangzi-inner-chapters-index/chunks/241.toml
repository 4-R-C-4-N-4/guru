body = "Kwang Khäng-dze was then lying down with his head to the south.\n\nHwang-Tî, with an air of deferential submission, went forward on his knees, twice bowed low with his face to the ground, and asked him, saying, 'I have heard that you, Sir, are well acquainted with the perfect Tâo;--I venture to ask how I should rule my body, in order that it may continue for a long time.' Kwang Khäng-dze hastily rose, and said, 'A good question!\n\nCome and I will tell you the perfect Tâo.\n\nIts essence is (surrounded with) the deepest obscurity; its highest reach is in darkness and silence.\n\nThere is nothing to be seen; nothing to be heard.\n\nWhen it holds the spirit in its arms in stillness, then the bodily form of itself will become correct.\n\nYou must be still; you must be pure; not subjecting your body to toil, not agitating your vital force;--then you may live for long.\n\nWhen p.\n\n299 your eyes see nothing, your ears hear nothing, and your mind knows nothing, your spirit will keep your body, and the body will live long.\n\nWatch over what is within you, shut up the avenues that connect you with what is external;--much knowledge is pernicious.\n\nI (will) proceed with you to the summit of the Grand Brilliance, where we come to the source of the bright and expanding (element); I will enter with you the gate of the Deepest Obscurity, where we come to the source of the dark and repressing (element).\n\nThere heaven and earth have their controllers; there the Yin and Yang have their Repositories.\n\nWatch over and keep your body, and all things will of themselves give it vigour.\n\nI maintain the (original) unity (of these elements), and dwell in the harmony of them.\n\nIn this way 1 have cultivated myself for one thousand and two hundred years, and my bodily form has undergone no decay 1 .' Hwang-Tî twice bowed low with his head to the ground, and said, 'In Kwang Khäng-dze we have an example of what is called Heaven 2 .' The other said, 'Come, and I will tell you:--(The perfect Tâo) is something inexhaustible, and yet men all think it has an end; it is something unfathomable, and yet men all think its extreme limit can be reached.\n\nHe who attains to my Tâo, if he be in a high position, will be one of the August ones, and in a low position, will be a king.\n\nHe who fails in attaining it, in his highest attainment will see the light, but will p.\n\n300 descend and be of the Earth.\n\nAt present all things are produced from the Earth and return to the Earth.\n\nTherefore I will leave you, and enter the gate of the Unending, to enjoy myself in the fields of the Illimitable.\n\nI will blend my light with that of the sun and moon, and will endure while heaven and earth endure.\n\nIf men agree with my views, I will be unconscious of it; if they keep far apart from them, I will be unconscious of it; they may all die, and I will abide alone 1 !' 5.\n\nYün Kiang 2 , rambling to the east, having been borne along on a gentle breeze 3 , suddenly encountered Hung Mung 2 , who was rambling about, slapping his buttocks 4 and hopping like a bird.\n\nAmazed at the sight, Yün Kiang stood reverentially, and said to the other, 'Venerable Sir, who are you?"

