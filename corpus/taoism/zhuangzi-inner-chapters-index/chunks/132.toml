[content]
body = "But had he ever dreamt that he was a butterfly, so as to lose the consciousness of his personal identity as Kwang Kâu?\n\nI do not think so.\n\nOne may, perhaps, lose that consciousness in the state of insanity; but the language of Young is not sufficiently guarded when he writes of 'Dreams, where thought, in fancy's maze, runs mad.' When dreaming, our thoughts are not conditioned by the categories of time and space; but the conviction of our identity is never lost.\n\nNext: Book III.\n\nYang Shang Kû"

