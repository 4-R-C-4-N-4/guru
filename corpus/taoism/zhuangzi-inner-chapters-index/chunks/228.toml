[content]
body = "To the liver are assigned the element 'wood,' and the virtue of benevolence; to the lungs, the element 'metal,' and the virtue of righteousness.\n\n269:1 Black, red, azure (green, blue, or black), white, and yellow.\n\n269:2 The same as the Lî Lâu of Mencius (IV, i, 1),--of the time of Hwang-Tî.\n\nIt is not easy to construe the text here, and in the analogous sentences below.\n\nHsüan Ying, having read on to the as the uninterrupted predicate of the sharp seer, says, 'Is not this a proof of the extraordinary gift?' What follows would be, 'But it was exemplified in Lî Kû.' The meaning that is given in the version was the first that occurred to myself.\n\n269:3 The five notes of the Chinese musical scale.\n\n269:4 There are twelve of these musical notes, determined by the twelve regulating tubes; six, represented here by Hwang-kung, the name of the first tube, giving the sharp notes; and six, represented by Tâ-lü, giving the flat notes.\n\n269:5 See in II, par.\n\n5.\n\n269:6 The famous Zäng-dze, or Zäng Shän, one of Confucius's ablest disciples.\n\n269:7 An officer of Wei in the sixth century B.\n\nC.\n\nHe belonged to a family of historiographers, and hence the surname Shih ( ).\n\nConfucius mentions him in the most honourable terms in the p.\n\n270 Analect XV, vi, by the name Shih Yü.\n\n'Righteousness' was his great attribute.\n\n270:1 The two heresiarchs so much denounced by Mencius.\n\nBoth have appeared in previous Books.\n\n271:1 Those of Hsiâ, Shang, and Kâu;--from the twenty-third century B.\n\nC.\n\nto our author's own time.\n\n273:1 See the Khang-hsî dictionary under the character .\n\n273:2 Playing at some game with dice.\n\n273:3 See VI, par.\n\n3.\n\n273:4 A mountain in the present Shan-hsî, probably in the department of Phû-kâu.\n\n273:5 A strange character, but not historical, represented as a brother of Liû-hsiâ Hui.\n\nSee Bk.\n\nXXIX.\n\n273:6 'The Eastern Height,' = the Thâi mountain in the present Shan-tung.\n\n274:1 Different from Yih-ya, the famous cook of duke Hwan of Khî.\n\nThis is said to have been of the time of Hwang-Tî.\n\nBut there are different readings of the name.\n\nNext: Book IX: Mâ Thî, or 'Horses's Hoofs'"

