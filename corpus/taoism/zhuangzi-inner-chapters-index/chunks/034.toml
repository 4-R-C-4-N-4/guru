[content]
body = "Be not overcome with evil, but overcome evil with good.' We know that the maxim made some noise in its author's lifetime; that the disciples of Confucius consulted him about it, and that he was unable to receive it 1 .\n\nIt comes in with less important matters by virtue of the Tâoistic 'rule of contraries.' I have been surprised to find what little reference to it I have met with in the course of my Chinese reading.\n\nI do not think that Kwang-dze takes notice of it to illustrate it after his fashion.\n\nThere, however, it is in the Tâo Teh King.\n\nThe fruit of it has yet to be developed.\n\nSecond, Lâo laid down the same rule for the policy of the state as for the life of the individual.\n\nHe says in his sixty-first chapter, 'What makes a state great is its being like a low-lying, down-flowing stream;--it becomes the p.\n\n32 centre to which tend all (the small states) under heaven.' He then uses an illustration which will produce a smile:--'Take the case of all females.\n\nThe female always overcomes the male by her stillness.\n\nStillness may be considered (a sort of) abasement.' Resuming his subject, he adds, 'Thus it is that a great state, by condescending to small states, gains them for itself; and that small states, by abasing themselves to a great state, win it over to them.\n\nIn the one case the abasement tends to gaining adherents; in the other case, to procuring favour.\n\nThe great state only wishes to unite men together and nourish them; a small state only wishes to be received by, and to serve, the other.\n\nEach gets what it desires, but the great state must learn to abase itself.' 'All very well in theory,' some one will exclaim, 'but, the world has not seen it yet reduced to practice.' So it is.\n\nThe fact is deplorable.\n\nNo one saw the misery arising from it, and exposed its unreasonableness more unsparingly, than Kwang-dze.\n\nBut it was all in vain in his time, as it has been in all the centuries that have since rolled their course.\n\nPhilosophy, philanthropy, and religion have still to toil on, 'faint, yet pursuing,' believing that the time will yet come when humility and love shall secure the reign of peace and good will among the nations of men.\n\nWhile enjoining humility, Lâo protested against war.\n\nIn his thirty-first chapter he says, 'Arms, however beautiful, are instruments of evil omen; hateful, it may be said, to all creatures.\n\nThey who have the Tâo do not like to employ them.' Perhaps in his sixty-ninth chapter he allows defensive war, but he adds, 'There is no calamity greater than that of lightly engaging in war.\n\nTo do that is near losing the gentleness which is so precious.\n\nThus it is that when weapons are (actually) crossed, he who deplores the (situation) conquers.' There are some other points in the practical lessons of Tâoism to which I should like to call the attention of the reader, but I must refer him for them to the chapters of the Tâo Teh King, and the Books of Kwang-dze.\n\nIts salient features have been set forth somewhat fully.\n\nNotwithstanding p.\n\n33 the scorn poured so freely on Confucius by Kwang-dze and other Tâoist writers, he proved in the course of time too strong for Lâo as the teacher of their people.\n\nThe entrance of Buddhism, moreover, into the country in our first century, was very injurious to Tâoism, which still exists, but is only the shadow of its former self."

