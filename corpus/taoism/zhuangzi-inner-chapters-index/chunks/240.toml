[content]
body = "296 the Literati and the Mohists.\n\nHereupon, complacency in, and hatred of, one another produced mutual suspicions; the stupid and the wise imposed on one another; the good and the bad condemned one another; the boastful and the sincere interchanged their recriminations;--and the world fell into decay.\n\nViews as to what was greatly virtuous did not agree, and the nature with its endowments became as if shrivelled by fire or carried away by a flood.\n\nAll were eager for knowledge, and the people were exhausted with their searchings (after what was good).\n\nOn this the axe and the saw were brought into play; guilt was determined as by the plumb-line and death inflicted; the hammer and gouge did their work.\n\nThe world fell into great disorder, and presented the appearance of a jagged mountain ridge.\n\nThe crime to which all was due was the meddling with and disturbing men's minds.\n\nThe effect was that men of ability and worth lay concealed at the foot of the crags of mount Thâi, and princes of ten thousand chariots were anxious and terrified in their ancestral temples.\n\nIn the present age those Who have been put to death in various ways lie thick as if pillowed on each other; those who are wearing the cangue press on each other (on the roads); those who are suffering the bastinado can see each other (all over the land).\n\nAnd now the Literati and the Mohists begin to stand, on tiptoe and with bare arms, among the fettered and manacled crowd!\n\nAh!\n\nextreme is their shamelessness, and their failure to see the disgrace!\n\nStrange that we should be slow to recognise their sageness and wisdom in the bars of the cangue, and their benevolence and righteousness in the rivets of the fetters and handcuffs!\n\nHow do we know that p.\n\n297 Zäng and Shih are not the whizzing arrows of Kieh and Kih 1 ?\n\nTherefore it is said, 'Abolish sageness and cast away knowledge, and the world will be brought to a state of great order 2 .' 4.\n\nHwang-Tî had been on the throne for nineteen years 3 , and his ordinances were in operation all through the kingdom, when he heard that Kwang Khäng-dze 4 was living on the summit of Khung-thung 5 , and went to see him.\n\n'I have heard,' he said, 'that you, Sir, are well acquainted with the perfect Tâo.\n\nI venture to ask you what is the essential thing in it.\n\nI wish to take the subtlest influences of heaven and earth, and assist with them the (growth of the) five cereals for the (better) nourishment of the people.\n\nI also wish to direct the (operation of the) Yin and Yang, so as to secure the comfort of all living beings.\n\nHow shall I proceed to accomplish those objects?' Kwang Khäng-dze replied, 'What you wish to ask about is the original substance of all things 6 ; what you p.\n\n298 wish to have the direction of is that substance as it was shattered and divided 1 .\n\nAccording to your government of the world, the vapours of the clouds, before they were collected, would descend in rain; the herbs and trees would shed their leaves before they became yellow; and the light of the sun and moon would hasten to extinction.\n\nYour mind is that of a flatterer with his plausible words;--it is not fit that I should tell you the perfect Tâo.' Hwang-Tî withdrew, gave up (his government of) the kingdom, built himself a solitary apartment, spread in it a mat of the white mâo grass, dwelt in it unoccupied for three months, and then went again to seek an interview with (the recluse)."

