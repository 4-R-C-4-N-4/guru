body = "When they wailed, he also wailed, having in himself the reason why he did so.\n\nAnd we all have our individuality which makes us what we are as compared together; but how do we know that we p.\n\n255 determine in any case correctly that individuality?\n\nMoreover you dream that you are a bird, and seem to be soaring to the sky; or that you are a fish, and seem to be diving in the deep.\n\nBut you do not know whether we that are now speaking are awake or in a dream 1 .\n\nIt is not the meeting with what is pleasurable that produces the smile; it is not the smile suddenly produced that produces the arrangement (of the person).\n\nWhen one rests in what has been arranged, and puts away all thought of the transformation, he is in unity with the mysterious Heaven.' 13.\n\nÎ- r Dze 2 having gone to see Hsü Yû, the latter said to him, 'What benefit have you received from Yâo?' The reply was, 'Yâo says to me, You must yourself labour at benevolence and righteousness, and be able to tell clearly which is right and which wrong (in conflicting statements).' Hsü Yû rejoined, 'Why then have you come to me?\n\nSince Yâo has put on you the brand of his benevolence and righteousness, and cut off your nose with his right and wrong 3 , how will you be able to wander in the way of aimless enjoyment, of unregulated contemplation, and the ever-changing forms (of dispute)?' Î- r dze said, 'That may be; but I should p.\n\n256 like to skirt along its hedges.' 'But,' said the other, 'it cannot be.\n\nEyes without pupils can see nothing of the beauty of the eyebrows, eyes, and other features; the blind have nothing to do with the green, yellow, and variegated colours of the sacrificial robes.' Î- r dze rejoined, 'Yet, when Wû-kwang 1 lost his beauty, Kü-liang 1 his strength, and Hwang-Tî his wisdom, they all (recovered them) 2 under the moulding (of your system);--how do you know that the Maker will not obliterate the marks of my branding, and supply my dismemberment, so that, again perfect in my form, I may follow you as my teacher?' Hsû Yü said, 'Ah!\n\nthat cannot yet be known.\n\nI will tell you the rudiments.\n\nO my Master!\n\nO my Master!\n\nHe gives to all things their blended qualities, and does not count it any righteousness; His favours reach to all generations, and He does not count it any benevolence; He is more ancient than the highest antiquity, and does not count Himself old; He overspreads heaven and supports the earth; He carves and fashions all bodily forms, and does not consider it any act of skill;--this is He in whom I find my enjoyment.' 14.\n\nYen Hui said, 'I am making progress.' Kung-nî replied, 'What do you mean?' 'I have ceased to think of benevolence and righteousness,' was the reply.\n\n'Very well; but that is not enough.' Another day, Hui again saw Kung-nî, and said, 'I am making progress.' 'What do you mean?' p."

