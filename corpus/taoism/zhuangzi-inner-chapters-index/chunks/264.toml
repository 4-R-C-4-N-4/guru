[content]
body = "Confucius said, 'The substance of them is occupied with Benevolence and Righteousness.' The other said, 'Let me ask whether you consider Benevolence and Righteousness to constitute the nature of man?' 'I do,' was the answer.\n\n'If the superior man be not benevolent, he will not fulfil his character; if he be not righteous, he might as well not have been born.\n\nBenevolence and Righteousness are truly the nature of man.' Lâo Tan continued, 'Let me ask you what you mean by Benevolence and Righteousness.' Confucius said, 'To be in one's inmost heart in kindly sympathy p.\n\n340 with all things; to love all men; and to allow no selfish thoughts;--this is the nature of Benevolence and Righteousness.' Lâo Tan exclaimed, 'Ah!\n\nyou almost show your inferiority by such words!\n\n\"To love all men!\" is not that vague and extravagant?\n\n\"To be seeking to allow no selfish thoughts!\"--that is selfishness 1 !\n\nIf you, Master, wish men not to be without their (proper) shepherding, think of Heaven and Earth, which certainly pursue their invariable course; think of the sun and moon, which surely maintain their brightness; think of the stars in the zodiac, which preserve their order and courses; think of birds and beasts, which do not fail to collect together in their flocks and herds; and think of the trees, which do not fail to stand up (in their places).\n\nDo you, Master, imitate this way and carry it into practice; hurry on, following this course, and you will reach your end.\n\nWhy must you further be vehement in putting forward your Benevolence and Righteousness, as if you were beating a drum, and seeking a fugitive son, (only making him run away the more)?\n\nAh!\n\nMaster, you are introducing disorder into the nature of man!' 8.\n\nShih-khäng Khî 2 , having an interview with Lâo-dze, asked him, saying, 'I heard, Master, that you were a sage, and I came here, wishing to see you, without grudging the length of the journey.\n\nDuring the stages of the hundred days, the soles of my feet became quite callous, but I did not dare to stop and rest.\n\nNow I perceive that you are not p.\n\n341 a sage.\n\nBecause there was some rice left about the holes of the rats, you sent away your younger sister, which was unkind; when your food, whether raw or cooked, remains before you not all consumed, you keep on hoarding it up to any extent 1 .' Lâo-dze looked indifferent, and gave him no answer.\n\nNext day Khî again saw Lao-dze, and said, 'Yesterday I taunted you; but to-day I have gone back to a better mood of mind.\n\nWhat is the cause (of the change) 2 ?' Lâo-dze replied, 'I consider that I have freed myself from the trammels of claiming to be artfully knowing, spirit-like, and sage.\n\nYesterday if you had called me an ox, you might have done so; or if you had called me a horse, you might have done so 3 .\n\nIf there be a reality (corresponding to men's ideas), and men give it a name, which another will not receive, he will in the sequel suffer the more.\n\nMy manner was what I constantly observe;--I did not put it on for the occasion.' Shih-khäng Khî sidled away out of Lâo's shadow; then he retraced his steps, advanced forward, and asked how he should cultivate himself."

