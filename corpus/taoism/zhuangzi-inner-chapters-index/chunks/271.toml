[content]
body = "If one should again take them, replace them in the box or basket, wrap them up with embroidered cloths, and then in rambling, or abiding at the spot, should go to sleep under them, if he do not get (evil) dreams, he is sure to be often troubled with the nightmare.\n\nNow here is your Master in the same way taking the grass-dogs, presented by the ancient kings, and leading his disciples to wander or abide and sleep under them.\n\nOwing to this, the tree (beneath which they were practising ceremonies) in Sung was cut down 2 ; he was obliged to leave Wei 3 ; he was reduced to extremities in Shang 3 and Kâu 4 :--were not those experiences like having (evil) dreams?\n\nHe was kept in a state of siege between Khän and Zhâi 5 , so that for seven days he had no cooked food to eat, and was in a situation between life and death:--were not those experiences like the nightmare?\n\np.\n\n353 'If you are travelling by water, your best plan is to use a boat; if by land, a carriage.\n\nTake a boat, which will go (easily) along on the water, and try to push it along on the land, and all your lifetime it will not go so much as a fathom or two:--are not ancient time and the present time like the water and the dry land?\n\nand are not Kâu and Lû like the boat and the carriage?\n\nTo seek now to practise (the old ways of) Kâu in Lû is like pushing along a boat on the dry land.\n\nIt is only a toilsome labour, and has no success; he who does so is sure to meet with calamity.\n\nHe has not learned that in handing down the arts (of one time) he is sure to be reduced to extremity in endeavouring to adapt them to the conditions (of another).\n\n'And have you not seen the working of a shadoof?\n\nWhen (the rope of) it is pulled, it bends down; and when it is let go, it rises up.\n\nIt is pulled by a man, and does not pull the man; and so, whether it bends down or rises up, it commits no offence against the man.\n\nIn the same way the rules of propriety, righteousness, laws, and measures of the three Hwangs 1 and five Tîs 1 derived their excellence, not from their being the same as those of the present day, but from their (aptitude for) government.\n\nWe may compare them to haws 2 , pears, oranges, p.\n\n354 and pummeloes, which are different in flavour, but all suitable to be eaten.\n\nJust so it is that the rules of propriety, righteousness, laws, and measures, change according to the time.\n\n'If now you take a monkey, and dress it in the robes of the duke of Kâu, it will bite and tear them, and will not be satisfied till it has got rid of them altogether.\n\nAnd if you look at the difference between antiquity and the present time it is as great as that between the monkey and the duke of Kâu.\n\nIn the same way, when Hsî Shih 1 was troubled in mind, she would knit her brows and frown on all in her neighbourhood.\n\nAn ugly woman of the neighbourhood, seeing and admiring her beauty, went home, and also laying her hands on her heart proceeded to stare and frown on all around her.\n\nWhen the rich people of the village saw her, they shut fast their doors and would not go out; when the poor people saw her, they took their wives and children and ran away from her."

