[content]
body = "Occasionally, the writer pauses over a passage, which, he thinks, has defied all preceding students, and suggests the right explanation of it, or leaves it as inexplicable.\n\nIt only remains for me to refer to the Repertories of 'Elegant Extracts,' called by the Chinese Kû Wän, which abound in their literature, and where the masterpieces of composition are elucidated with more or less of critical detail and paraphrase.\n\nI have consulted nearly a dozen of these collections, and would mention my indebtedness especially to that called Mêi Khwan, which discusses passages from twelve of Kwang-dze's books.\n\nWhen consulting the editions of Lin Hsî-kung and Lû Shû-kih, the reader is surprised by the frequency with which they refer to the 'old explanations' as 'incomplete and unsatisfactory,' often as 'absurd,' or 'ridiculous,' and he p.\n\nxxi finds on examination that they do not so express themselves without reason.\n\nHe is soon convinced that the translation of Kwang-dze calls for the exercise of one's individual judgment, and the employment of every method akin to the critical processes by which the meaning in the books of other languages is determined.\n\nIt was the perception of this which made me prepare in the first place a draft version to familiarise myself with the peculiar style and eccentric thought of the author.\n\nFrom Kwang-dze to the Tractate of 'Actions and their Retributions' the transition is great.\n\nTranslation in the latter case is as easy as it is difficult in the former.\n\nIt was Rémusat who in 1816 called attention to the Kan Ying Phien in Europe, as he did to the Tâo Teh King seven years later, and he translated the Text of it with a few Notes and Illustrative Anecdotes.\n\nIn 1828 Klaproth published a translation of it from the Man-châu version; and in 1830 a translation in English appeared in the Canton Register, a newspaper published at Macao.\n\nIn 1828 Julien published what has since been the standard version of it; with an immense amount of additional matter under the title--'Le Livre Des Récompenses et Des Peines, en Chinois et en Français; Accompagné de quatre cent Légendes, Anecdotes et Histoires, qui font connaître les Doctrines, les Croyances et les Mœurs de la Secte des Tâo-ssé.' In writing out my own version I have had before me:-- First, 'The Thâi Shang Kan Ying Phien, with Plates and the Description of them;' a popular edition, as profusely furnished with anecdotes and stories as Julien's original, and all pictorially illustrated.\n\nThe notes, comments, and corresponding sentences from the Confucian Classics are also abundant.\n\nSecond, 'The Thâi Shang Kan Ying Phien, with explanations collected from the Classics and Histories;' a Cantonese reprint of an edition prepared in the Khien lûng reign by a Hsiâ Kiû-hsiâ.\n\np.\n\nxxii Third, the edition in the Collection of Tâoist Texts described above on p.\n\nxvii; by Hsü Hsiâ-teh.\n\nIt is decidedly Tâoistic; but without stories or pictures.\n\nFourth, 'The Thâi Shang Kan Ying Phien Kû;' by Hui Tung, of the present dynasty.\n\nThe Work follows the Commentary of Wû Khäng on the Tâo Teh King in the Collection of the Yüeh-yâ Hall.\n\nThe preface of the author is dated in 1749.\n\nThe Commentary, he tells us, was written in consequence of a vow, when his mother was ill, and he was praying for her recovery."

