[content]
body = "In that pure simplicity, their nature was what it ought to be.' Such were the earliest Chinese of whom Kwang-dze could venture to give any account.\n\nIf ever their ancestors had been in a ruder or savage condition, it must have been at a much antecedent time.\n\nThese had long passed out of such a state; they were tillers of the ground, and acquainted with the use of the loom.\n\nThey lived in happy relations with one another, and in kindly harmony with the tribes of inferior creatures.\n\nBut there is not the slightest allusion to any sentiment of piety as animating them individually, or to any ceremony of religion as observed by them in common.\n\nThis surely is a remarkable feature in their condition.\n\nI call attention to it, but I do not dwell upon it.\n\n8.\n\nBut by the time of Lâo and Kwang the cultivation of the Tâo had fallen into disuse.\n\nThe simplicity of life The decay of the Tâo before the growth of knowledge.\n\nwhich it demanded, with its freedom from all disturbing speculation and action, was no longer to be found in individuals or in government.\n\nIt was the general decay of manners and of social order which unsettled the mind of Lâo, made him resign his position as a curator of the Royal Library, and determine to withdraw from China and hide himself p.\n\n29 among the rude peoples beyond it.\n\nThe cause of the deterioration of the Tâo and of all the evils of the nation was attributed to the ever-growing pursuit of knowledge, and of what we call the arts of culture.\n\nIt had commenced very long before;--in the time of Hwang-Tî, Kwang says in one place 1 ; and in another he carries it still higher to Sui-zän and Fu-hsî 2 .\n\nThere had been indeed, all along the line of history, a groping for the rules of life, as indicated by the constitution of man's nature.\n\nThe results were embodied in the ancient literature which was the lifelong study of Confucius.\n\nHe had gathered up that literature; he recognised the nature of man as the gift of Heaven or God.\n\nThe monitions of God as given in the convictions of man's mind supplied him with a Tâo or Path of duty very different from the Tâo or Mysterious Way of Lâo.\n\nAll this was gall and wormwood to the dreaming librarian or brooding recluse, and made him say, 'If we could renounce our sageness and discard our wisdom, it would be better for the people a hundredfold.\n\nIf we could renounce our benevolence and discard our righteousness, the people would again become filial and kindly.\n\nIf we could renounce our artful contrivances and discard our (scheming for) gain, there would be no thieves nor robbers 3 .' We can laugh at this.\n\nTâoism was wrong in its opposition to the increase of knowledge.\n\nMan exists under a law of progress.\n\nIn pursuing it there are demanded discretion and justice.\n\nMoral ends must rule over material ends, and advance in virtue be ranked higher than advance in science.\n\nSo have good and evil, truth and error, to fight out the battle on the field of the world, and in all the range of time; but there is no standing still for the individual or for society.\n\nEven Confucius taught his countrymen to set too high a value on the examples of antiquity.\n\nThe school of Lâo-dze fixing themselves in an unknown region beyond antiquity,--a prehistoric time between 'the Grand Beginning of all things' out of nothing, and the unknown commencement of societies of men,--has made no advance p.\n\n30 but rather retrograded, and is represented by the still more degenerate Tâoism of the present day."

