[content]
body = "They know that there is no alternative to their acting as they do, and rest in it as what is appointed; and this is the highest achievement of virtue.\n\nHe who is in the position of a minister or of a son has indeed to do what he cannot but do.\n\nOccupied with the details of the business (in hand), and forgetful of his own person, what leisure has he to think of his pleasure in living or his dislike of death?\n\nYou, my master, may well proceed on your mission.\n\n'But let me repeat to you what I have heard:--In p.\n\n213 all intercourse (between states), if they are near to each other, there should be mutual friendliness, verified by deeds; if they are far apart, there must be sincere adherence to truth in their messages.\n\nThose messages will be transmitted by internuncios.\n\nBut to convey messages which express the complacence or the dissatisfaction of the two parties is the most difficult thing in the world.\n\nIf they be those of mutual complacence, there is sure to be an overflow of expressions of satisfaction; if of mutual dissatisfaction, an overflow of expressions of dislike.\n\nBut all extravagance leads to reckless language, and such language fails to command belief.\n\nWhen this distrust arises, woe to the internuncio!\n\nHence the Rules for Speech 1 say, \"Transmit the message exactly as it stands; do not transmit it with any overflow of language; so is (the internuncio) likely to keep himself whole.\" 4.\n\n'Moreover, skilful wrestlers begin with open trials of strength, but always end with masked attempts (to gain the victory); as their excitement grows excessive, they display much wonderful dexterity.\n\nParties drinking according to the rules at first observe good order, but always end with disorder; as their excitement grows excessive, their fun becomes uproarious 2 .\n\nIn all things it is so.\n\nPeople are at first sincere, but always end with becoming rude; at the commencement things are treated as trivial, p.\n\n214 but as the end draws near, they assume great proportions.\n\nWords are (like) the waves acted on by the wind; the real point of the matters (discussed by them) is lost.\n\nThe wind and waves are easily set in motion; the success of the matter of which the real point is lost is easily put in peril.\n\nHence quarrels are occasioned by nothing so much as by artful words and one-sided speeches.\n\nThe breath comes angrily, as when a beast, driven to death, wildly bellows forth its rage.\n\nOn this animosities arise on both sides.\n\nHasty examination (of the case) eagerly proceeds, and revengeful thoughts arise in their minds;-they do not know how.\n\nSince they do not know how such thoughts arise, who knows how they will end?\n\nHence the Rules for Speech 1 say, \"Let not an internuncius depart from his instructions.\n\nLet him not urge on a settlement.\n\nIf he go beyond the regular rules, he will complicate matters.\n\nDeparting from his instructions and urging on a settlement imperils negotiations.\n\nA good settlement is proved by its lasting long, and a bad settlement cannot be altered;--ought he not to be careful?\n\n\" 'Further still, let your mind find its enjoyment in the circumstances of your position; nourish the central course which you pursue, by a reference to your unavoidable obligations.\n\nThis is the highest object for you to pursue; what else can you do to fulfil the charge (of your father and ruler) 2 .\n\nThe best thing you can do is to be prepared to sacrifice your life; and this is the most difficult thing to do.' p.\n\n215 5.\n\nYen Ho 1 , being about to undertake the office of Teacher of the eldest son of duke Ling of Wei, consulted Kü Po-yü 2 ."

