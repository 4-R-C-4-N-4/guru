[content]
body = "Restrictive, and yet necessary to be multiplied;--such are Ceremonies.\n\nLodged in the centre, and yet requiring to be exalted;--such is Virtue.\n\nAlways One, and yet requiring to be modified;--such is the Tâo.\n\nSpirit-like, and yet requiring to be exercised;--such is Heaven 1 .\n\nTherefore the sages contemplated Heaven, but did not assist It.\n\nThey tried to perfect their virtue, but did not allow it to embarrass them.\n\nThey proceeded according to the Tâo, but did not lay any plans.\n\nThey associated benevolence (with all their doings), but did not rely on it.\n\nThey pursued righteousness p.\n\n306 extensively, but did not try to accumulate it.\n\nThey responded to ceremonies, but did not conceal (their opinion as to the troublesomeness of them).\n\nThey engaged in affairs as they occurred, and did not decline them.\n\nThey strove to render their laws uniform, but (feared that confusion) might arise from them.\n\nThey relied upon the people, and did not set light by them.\n\nThey depended on things as their instruments, and did not discard them 1 .\n\nThey did not think things equal to what they employed them for, but yet they did not see that they could do without employing them.\n\nThose who do not understand Heaven are not pure in their virtue.\n\nThose who do not comprehend the Tâo have no course which they can pursue successfully.\n\nAlas for them who do not clearly understand the Tâo!\n\nWhat is it that we call the Tâo 2 ?\n\nThere is the Tâo, or Way of Heaven; and there is the Tâo, or Way of Man.\n\nDoing nothing and yet attracting all honour is the Way of Heaven; Doing and being embarrassed thereby is the Way of Man.\n\nIt is the Way of Heaven that plays the part of the Lord; it is the Way of Man that plays the part of the Servant.\n\nThe Way of Heaven and the Way of Man are far apart.\n\nThey should be clearly distinguished from each other.\n\nFootnotes 291:1 See pp.\n\n142 , 143 .\n\n292:1 I supply the 'it is as if,' after the example of the critic Lû Shû-kih, who here introduces a in his commentary ( ).\n\nWhat the text seems to state as a fact is only an illustration.\n\nCompare the concluding paragraphs in all the Sections and Parts of the fourth Book of the Lî Kî.\n\n292:2 Our moral instincts protest against Tâoism which thus places in the same category such sovereigns as Yâo and Kieh, and such men as the brigand Kih and Zäng and Shih.\n\n293:1 Here is the Tâoistic meaning of the title of this Book.\n\n294:1 A quotation, but without any indication that it is so, from the Tâo Teh King, ch.\n\n13.\n\n294:2 Probably an imaginary personage.\n\n295:1 I must suppose that the words of Lâo-dze stop here, and that what follows is from Kwang-dze himself, down to the end of the paragraph.\n\nWe cannot have Lâo-dze referring to men later than himself, and quoting from his own Book.\n\n295:2 Hitherto Yâo and Shun have appeared as the first disturbers of the rule of the Tâo by their benevolence and righteousness.\n\nHere that innovation is carried further back to Hwang-Tî.\n\n295:3 See these parties, and the way they were dealt with, in the Shû King, Part II, Book I, 3.\n\nThe punishment of them is there ascribed to Shun; but Yâo was still alive, and Shun was acting as his viceroy."

