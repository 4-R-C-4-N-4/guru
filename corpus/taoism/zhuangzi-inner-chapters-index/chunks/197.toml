body = "'This, indeed,' said he, 'is a tree good for nothing, and it is thus that it has attained to such a size.\n\nAh!\n\nand spirit-like men acknowledge this worthlessness (and its result) 3 .' In Sung there is the district of King-shih 4 , in which catalpae, cypresses, and mulberry trees grow well.\n\nThose of them which are a span or two or rather more in circumference 5 are cut down by persons who want to make posts to which to tie their p.\n\n220 monkeys; those which are three or four spans round are cut down by persons who want beams for their lofty and famous houses; and those of seven or eight spans are cut down by noblemen and rich merchants who want single planks for the sides of their coffins.\n\nThe trees in consequence do not complete their natural term of life, and come to a premature end in the middle of their growth under the axe and bill;--this is the evil that befalls them from their supplying good timber.\n\nIn the same way the Kieh 1 (book) specifies oxen that have white foreheads, pigs that have turned-up snouts, and men that are suffering from piles, and forbids their being sacrificed to the Ho.\n\nThe wizards know them by these peculiarities and consider them to be inauspicious, but spirit-like men consider them on this account to be very fortunate.\n\n8.\n\nThere was the deformed object Shû 2 .\n\nHis chin seemed to hide his navel; his shoulders were higher than the crown of his head; the knot of his hair pointed to the sky; his five viscera were all compressed into the upper part of his body, and his two thigh bones were like ribs.\n\nBy sharpening needles and washing clothes he was able to make a living.\n\nBy sifting rice and cleaning it, he was able to support ten individuals.\n\nWhen the government was calling out soldiers, this poor Shû would bare his arms among the others; when it had any great service to be undertaken, because of his constant ailments, none of the work was assigned to him; when it was p.\n\n221 giving out grain to the sick, he received three kung, and ten bundles of firewood.\n\nIf this poor man, so deformed in body, was still able to support himself, and complete his term of life, how much more may they do so, whose deformity is that of their faculties 1 !\n\n9.\n\nWhen Confucius went to Khû 2 , Khieh-yû, the madman of Khû 3 , as he was wandering about, passed by his door, and said, 'O Phoenix, O Phoenix, how is your virtue degenerated!\n\nThe future is not to be waited for; the past is not to be sought again!\n\nWhen good order prevails in the world, the sage tries to accomplish all his service; when disorder prevails, he may preserve his life; at the present time, it is enough if he simply escape being punished.\n\nHappiness is lighter than a feather, but no one knows how to support it; calamity is heavier than the earth, and yet no one knows how to avoid it.\n\nGive over!\n\ngive over approaching men with the lessons of your virtue!\n\nYou are in peril!\n\nyou are in peril, hurrying on where you have marked out the ground against your advance!\n\nI avoid publicity, I avoid publicity, that my path may not be injured.\n\nI pursue my course, now going backwards, now crookedly, that my feet may not be hurt 4 .\n\np.\n\n222 'The mountain by its trees weakens itself 1 .\n\nThe grease which ministers to the fire fries itself The cinnamon tree can be eaten, and therefore it is cut down.\n\nThe varnish tree is useful, and therefore incisions are made in it."

