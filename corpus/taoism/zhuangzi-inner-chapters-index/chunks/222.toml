[content]
body = "Hû-dze said, 'I showed myself to him with the forms of (vegetation beneath) the earth.\n\nThere were the sprouts indeed, but without (any appearance of) growth or regularity:--he seemed to see me with the springs of my (vital) power closed up.\n\nTry and come to me with him again.' Next day, accordingly, Lieh-dze brought the man again and saw Hû-dze.\n\nWhen they went out, the man said, 'It is a fortunate thing for your master that he met with me.\n\nHe will get better; he has all the signs of living!\n\nI saw the balance (of the springs of life) that had been stopped (inclining in his favour).' Lieh-dze went in, and reported these words to his master, who said, 'I showed myself to him after the pattern of the earth (beneath the) sky.\n\nNeither semblance nor reality entered (into my exhibition), but the springs (of life) were issuing from beneath my feet;--he seemed to see me with the springs of vigorous action in full play.\n\nTry and come with him again.' Next day Lieh-dze came with the man again, and again saw Hû-dze with him.\n\nWhen they went out, the wizard said, 'Your master is never the same.\n\nI cannot understand his physiognomy.\n\nLet him try to steady himself, and I will again view him.' Lieh-dze went in and reported this to Hû-dze, who said, 'This time I showed myself to him after the pattern of the grand harmony (of the two elemental p.\n\n265 forces), with the superiority inclining to neither.\n\nHe seemed to see me with the springs of (vital) power in equal balance.\n\nWhere the water wheels about from (the movements of) a dugong 1 , there is an abyss; where it does so from the arresting (of its course), there is an abyss; where it does so, and the water keeps flowing on, there is an abyss.\n\nThere are nine abysses with their several names, and I have only exhibited three of them.\n\nTry and come with him again.' Next day they came, and they again saw Hû-dze.\n\nBut before he had settled himself in his position, the wizard lost himself and ran away.\n\n'Pursue him,' said Hû-dze, and Lieh-dze did so, but could not come up with him.\n\nHe returned, and told Hû-dze, saying, 'There is an end of him; he is lost; I could not find him.' Hû-dze rejoined, 'I was showing him myself after the pattern of what was before I began to come from my author.\n\nI confronted him with pure vacancy, and an easy indifference.\n\nHe did not know what I meant to represent.\n\nNow he thought it was the idea of exhausted strength, and now that of an onward flow, and therefore he ran away.\n\nAfter this, Lieh-dze considered that he had not yet begun to learn (his master's doctrine).\n\nHe returned to his house, and for three years did not go out.\n\nHe did the cooking for his wife.\n\nHe fed the pigs as if he were feeding men.\n\nHe took no part p.\n\n266 or interest in occurring affairs.\n\nHe put away the carving and sculpture about him, and returned to pure simplicity.\n\nLike a clod of earth he stood there in his bodily presence.\n\nAmid all distractions he was (silent) and shut up in himself.\n\nAnd in this way he continued to the end of his life.\n\n6.\n\nNon-action (makes its exemplifier) the lord of all fame; non-action (serves him as) the treasury of all plans; non-action (fits him for) the burden of all offices; non-action (makes him) the lord of all wisdom 1 ."

