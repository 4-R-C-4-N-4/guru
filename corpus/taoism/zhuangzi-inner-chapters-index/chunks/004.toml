body = "112, 113.\n\n71.\n\nThe Disease of Knowing, p.\n\n113.\n\n72.\n\nLoving One's Self, p.\n\n114.\n\n73.\n\nAllowing Men to take their Course, p.\n\n116.\n\n74.\n\nRestraining Delusion, p.\n\n117.\n\n75.\n\nHow Greediness Injures, pp.\n\n117, 118.\n\n76.\n\nA Warning against (Trusting in) Strength, pp.\n\n118, 119.\n\n77.\n\nThe Way of Heaven, p.\n\n119.\n\n78.\n\nThings to be Believed, p.\n\n120.\n\n79.\n\nAdherence to Bond or Covenant, p.\n\n121.\n\n80.\n\nStanding Alone, p.\n\n122 81.\n\nThe Manifestation of Simplicity, p.\n\n123.\n\nTHE WRITINGS OF KWANG-DZE.\n\nINTRODUCTION.\n\nBRIEF NOTICES OF THE DIFFERENT BOOKS PART I.\n\nBOOK I.\n\ni.\n\nHsiâo-yâo Yû, or Enjoyment in Untroubled Ease 164 II.\n\nii.\n\nKhî Wû Lun, or the Adjustment of Controversies 176 III.\n\niii.\n\nYang Shang Kû, or Nourishing the Lord of Life.\n\n198 IV.\n\niv.\n\nZän Kien Shih, or Man in the World, Associated with other Men.\n\n203 V.\n\nv.\n\nTeh Khung Fû, or the Seal of Virtue Complete 223 VI.\n\nvi.\n\nTâ Zung Shih, or the Great and Most Honoured Master 236 VII.\n\nvii.\n\nYing Tî Wang, or the Normal Course for Rulers and Kings 259 PART II.\n\nVIII.\n\ni.\n\nPhien Mâu, or Webbed Toes 268 IX.\n\nii.\n\nMâ Thî, or Horses's Hoofs 276 X.\n\niii.\n\nKhü Khieh, or Cutting Open Satchels 281 XI.\n\niv.\n\nZâi Yû, or Letting Be, and Exercising Forbearance 291 p.\n\nx BOOK PAGE XII.\n\nV.\n\nThien Tî, or Heaven and Earth 307 XIII.\n\nvi.\n\nThien Tâo, or the Way of Heaven 330 XIV.\n\nvii.\n\nThien Yün, or the Revolution of Heaven 345 XV.\n\nviii.\n\nKho Î, or Ingrained Ideas 363 XVI.\n\nix.\n\nShan Hsing, or Correcting the Nature 368 XVII.\n\nX.\n\nKhiû Shui, or the Floods of Autumn 374 Transliteration of Oriental Alphabets adopted for the Translations of the Sacred Books of the East 393 CORRIGENDUM ET ADDENDUM On page 58, for the third and fourth sentences of the explanatory note to Chapter XIV, substitute the following:--It was but an interesting fancy of the ingenious writer, and the elaborate endeavour of Victor von Strauss to support it in 1870 has failed to make me think more favourably of it.\n\nDr.\n\nEdkins, in an article in the China Review for July and August, 1884, takes a different view of the chapter.\n\nHe reads the monosyllables Î, Hî, and Wei according to his view of the old names of the Chinese characters, and calls them Âi, Kâi, and Mâi, considering them to be representative of one or three names of God.\n\nHe says:--'I am inclined to find here marks of the presence of Babylonian thought .\n\n.\n\n.\n\n.\n\nWe have not the original words for the first trinity of the Babylonian religion.\n\nThey are in the Assyrian or Semitic form Anu, Bel, Nuah.\n\nIn Accadian they were Ilu, Enu, Hia.\n\nOf these Ilu was the supreme God, source of Chaos, in Chinese Hwun tun or Hwun lun."

