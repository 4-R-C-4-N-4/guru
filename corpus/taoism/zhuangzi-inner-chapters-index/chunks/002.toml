body = "Sacred Texts Taoism Index Previous Next p.\n\nvii CONTENTS.\n\nPAGE PREFACE xi INTRODUCTION.\n\nCHAP.\n\nI.\n\nWAS TAOISM OLDER THAN LAO-DZE?\n\n1 Three Religions in China.\n\nPeculiarity of the Tâo Teh King.\n\nII.\n\nTHE TEXTS OF THE TÂO TEH KING AND KWANG-DZE SHÛ, AS REGARDS THEIR AUTHENTICITY AND GENUINENESS, AND THE ARRANGEMENT OF THEM 4 i.\n\nThe Tâo Teh King.\n\nThe evidence of Sze-mâ Khien, the historian; of Lieh-dze, Han Fei-dze, and other Tâoist writers; and of Pan Kû.\n\nThe Catalogue of the Imperial Library of Han; and that of the Sui dynasty.\n\nThe Commentaries of 'the old man of the Ho-side,' and of Wang Pî.\n\nDivision into Parts and Chapters, and number of Characters in the Text.\n\nii.\n\nThe Writings of Kwang-dze.\n\nImportance to Tâoism of those Writings.\n\nThe division of the Books into three Parts.\n\nTheir general Title and its meaning.\n\nIII.\n\nWHAT IS THE MEANING OF THE NAME TAO?\n\nAND THE CHIEF POINTS OF BELIEF IN TAOISM 12 Meaning of the name.\n\nUsage of the term Thien.\n\nPeculiar usage of it by Kwang-dze.\n\nMr.\n\nGiles's view that the name 'God' is the equivalent of Thien.\n\nRelation of the Tâo to the name Tî.\n\nNo idea of Creation-proper in Tâoism.\n\nMan is composed of body and spirit.\n\nThat the cultivation of the Tâo promotes longevity.\n\nStartling results of the Tâo; and how It proceeds by contraries.\n\nThe paradisiacal state.\n\nThe decay of Tâoism before the growth of knowledge.\n\nThe moral and practical teachings of Lâo-dze.\n\nHumility; his three jewels; that good is to be returned for evil.\n\nIV.\n\nACCOUNTS OF LAO-DZE AND KWANG-DZE GIVEN BY SZE-MÂ KHIEN 33 V.\n\nON THE TRACTATE OF ACTIONS AND THEIR RETRIBUTIONS 38 Peculiar style and nature of the Treatise.\n\nIts date.\n\nMeaning of the Title.\n\nWas the old Tâoism a Religion?\n\nThe Kang family.\n\nInfluence of Buddhism on Tâoism.\n\np.\n\nviii THE TÂO TEH KING.\n\nPAGE PART I (Chapters i to xxxvii) 45 to 79 Ch.\n\n1.\n\nEmbodying the Tâo, p.\n\n47.\n\n2.\n\nThe Nourishment of the Person, pp.\n\n47, 48.\n\n3.\n\nKeeping the People at Rest, p.\n\n49.\n\n4.\n\nThe Fountainless, pp.\n\n49, 50.\n\n5.\n\nThe Use of Emptiness, p.\n\n50.\n\n6.\n\nThe Completion of Material Forms, p.\n\n51.\n\n7.\n\nSheathing the Light, p.\n\n52.\n\n8.\n\nThe Placid and Contented Nature, pp.\n\n52, 53.\n\n9.\n\nFulness and Complacency contrary to the Tâo, p.\n\n53.\n\n10.\n\nPossibilities through the Tâo, pp.\n\n53, 54.\n\n11.\n\nThe Use of what has no Substantive Existence, pp.\n\n54, 55.\n\n12.\n\nThe Repression of the Desires, p.\n\n55.\n\n13.\n\nLoathing Shame, p.\n\n56.\n\n14.\n\nThe Manifestation of the Mystery, p.\n\n57.\n\n15.\n\nThe Exhibition of the Qualities of the Tâo, pp.\n\n58, 59.\n\n16.\n\nReturning to the Root, pp.\n\n59, 60.\n\n17.\n\nThe Unadulterated Influence, pp."

