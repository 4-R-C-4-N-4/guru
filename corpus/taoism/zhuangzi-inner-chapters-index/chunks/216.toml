body = "The Shwo Wän dictionary defines the name by , 'a recluse of the mountain, whose bodily form has been changed, and who ascends to heaven;' but when this account was made, Tâoism had entered into a new phase, different from what it had in the time of our author.\n\n237:2 In this description of 'the True Man,' and in what follows, there is what is grotesque and what is exaggerated (see note on the title of the first Book, p.\n\n127).\n\nThe most prominent characteristic of him was his perfect comprehension of the Tâo and participation of it.\n\n237:3 has here the sense of .\n\n238:1 Was not this the state of non-existence?\n\nWe cannot say of Pantâoism.\n\nHowever we may describe that, the Tâo operates in nature, but is not identical with it.\n\n238:2 appears in the common editions as , which must have got into the text at a very early time.\n\n'The mind forgetting,' or 'free from all thought and purpose,' appears everywhere p.\n\n239 in the Book as a characteristic of the True Man.\n\nNot a few critics contend that it was this, and not the Tâo of which it is a quality, that Kwang-dze intended by the 'Master' in the title.\n\n239:1 Such antithetic statements are startling, but they are common with both Lâo-dze and our author.\n\n239:2 The seven men mentioned here are all adduced, I must suppose, as instances of good and worthy men, but still inferior to the True Man.\n\nOf Hû Pû-kieh all that we are told is that he was 'an ancient worthy.' One account of Wû Kwang is that he p.\n\n240 was of the time of Hwang-Tî, with ears seven inches long; another, that he was of the time of Thang, of the Shang dynasty.\n\nPo-î and Shû-khî are known to us from the Analects; and also the count of Khî, whose name, it is said, was Hsü-yü.\n\nI can find nothing about Kî Thâ;--his name in Ziâo Hung's text is Shän-thû Tî was of the Yin dynasty, a contemporary of Thang.\n\nHe drowned himself in the Ho.\n\nMost of these are referred to in other places.\n\n241:1 All this paragraph is taken as illustrative of the True man's freedom from thought or purpose in his course.\n\n241:2 See note 3 on par.\n\n1, p.\n\n236.\n\n241:3 Love is due to a parent, and so such persons should love Heaven.\n\nThere is in the text here, I think, an unconscious reference to the earliest time, before the views of the earliest Chinese diverged to Theism and Tâoism.\n\nWe cannot translate the here.\n\n242:1 The great and most honoured Master,--the Tâo.\n\n242:2 This sentence contrasts the cramping effect on the mind of Confucianism with the freedom given by the doctrine of the Tâo.\n\n242:3 The Tâo does this.\n\nThe whole paragraph is an amplification of the view given in the preceding note.\n\n242:4 The Tâo cannot be taken away.\n\nIt is with its possessor, an ever-during thing.' 243:1 See p.\n\n242, note 4.\n\n243:2 Adopting the reading of for , supplied by Hwâi-nan dze.\n\n243:3 Our author has done with 'the True Man,' and now brings in the Tâo itself as his subject.\n\nCompare the predicates of It here with Bk.\n\nII, par.\n\n2.\n\nBut there are other, and perhaps higher, things said of it here."

