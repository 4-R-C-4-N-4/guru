[content]
body = "There is a short parabolic story of Kwang-dze, intended to represent the antagonism between Tâoism and knowledge, which has always struck me as curious.\n\nThe last paragraph of his seventh Book is this:--'The Ruler (or god Tî) of the Southern Ocean was Shû (that is, Heedless); the Ruler of the Northern Ocean was Hû (that is, Hasty); and the Ruler of the Centre was Hwun-tun (that is, Chaos).\n\nShû and Hû were continually meeting in the land of Hwun-tun, who treated them very well.\n\nThey consulted together how they might repay his kindness, and said, \"Men have all seven orifices for the purposes of seeing, hearing, eating, and breathing, while this (poor) Ruler alone has not one.\n\nLet us try and make them for him.\" Accordingly they dug one orifice in him every day; and at the end of seven days Chaos died.' So it was that Chaos passed away before Light.\n\nSo did the nameless Simplicity of the Tâo disappear before Knowledge.\n\nBut it was better that the Chaos should give place to the Kosmos.\n\n'Heedless' and 'Hasty' did a good deed.\n\n9.\n\nI have thus set forth eight characteristics of the Tâoistic system, having respect mostly to what is peculiar and mystical in it.\n\nI will now conclude my exhibition of it by The practical lessons of Lâo-dze.\n\nbringing together under one head the practical lessons of its author for men individually, and for the administration of government.\n\nThe praise of whatever excellence these possess belongs to Lâo himself: Kwang-dze devotes himself mainly to the illustration of the abstruse and difficult points.\n\nFirst, it does not surprise us that in his rules for individual man, Lâo should place Humility in the foremost place.\n\nA favourite illustration with him of the Tâo is water.\n\nIn his eighth Humility.\n\nchapter he says:--'The highest excellence is like that of water.\n\nThe excellence of water appears in its benefiting all things, and in its occupying, without striving to the contrary, the low ground which all men dislike.\n\nHence (its way) is near to that of the Tâo.' To the same effect in the seventy-eighth p.\n\n31 chapter:--'There is nothing in the world more soft and weak than water, and yet for attacking things that are firm and strong there is nothing that can take precedence of it.\n\nEvery one in the world knows that the soft overcomes the hard, and the weak the strong; but no one is able to carry it out in practice.' In his sixty-seventh chapter Lâo associates with Humility two other virtues, and calls them his three Precious Things or Lao's three Jewels.\n\nJewels.\n\nThey are Gentleness, Economy, and Shrinking from taking precedence of others.\n\n'With that Gentleness,' he says, 'I can be bold; with that Economy I can be liberal; Shrinking from taking precedence of others, I can become a vessel of the highest honour.' And in his sixty-third chapter, he rises to a still loftier height of morality.\n\nHe says, '(It is the way of the Tâo) to act without (thinking of) acting, to conduct affairs without (feeling) the trouble of them; to taste without discerning Rendering good for evil.\n\nany flavour, to consider the small as great, and the few as many, and to recompense injury with kindness.' Here is the grand Christian precept, 'Render to no man evil for evil.\n\nIf thine enemy hunger, feed him; if he thirst, give him drink."

