body = "310 property or money to be any gain; he keeps aloof from riches and honours; he rejoices not in long life, and grieves not for early death; he does not account prosperity a glory, nor is ashamed of indigence; he would not grasp at the gain of the whole world to be held as his own private portion; he would not desire to rule over the whole world as his own private distinction.\n\nHis distinction is in understanding that all things belong to the one treasury, and that death and life should be viewed in the same way 1 .' 3.\n\nThe Master said, 'How still and deep is the place where the Tâo resides!\n\nHow limpid is its purity!\n\nMetal and stone without It would give forth no sound.\n\nThey have indeed the (power of) sound (in them), but if they be not struck, they do not emit it.\n\nWho can determine (the qualities that are in) all things?\n\n'The man of kingly qualities holds on his way unoccupied, and is ashamed to busy himself with (the conduct of) affairs.\n\nHe establishes himself in (what is) the root and source (of his capacity), and his wisdom grows to be spirit-like.\n\nIn this way his attributes become more and more great, and when his mind goes forth, whatever things come in his way, it lays hold of them (and deals with them).\n\nThus, if there were not the Tâo, the bodily form would not have life, and its life, without the attributes (of the Tâo), would not be manifested.\n\nIs not he who preserves the body and gives the fullest development to the life, who establishes the attributes p.\n\n311 of the Tâo and clearly displays It, possessed of kingly qualities?\n\nHow majestic is he in his sudden issuings forth, and in his unexpected movements, when all things follow him!--This we call the man whose qualities fit him to rule.\n\n'He sees where there is the deepest obscurity; he hears where there is no sound.\n\nIn the midst of the deepest obscurity, he alone sees and can distinguish (various objects); in the midst of a soundless (abyss), he alone can hear a harmony (of notes).\n\nTherefore where one deep is succeeded by a greater, he can people all with things; where one mysterious range is followed by another that is more so, he can lay hold of the subtlest character of each.\n\nIn this way in his intercourse with all things, while he is farthest from having anything, he can yet give to them what they seek; while he is always hurrying forth, he yet returns to his resting-place; now large, now small; now long, now short; now distant, now near 1 .' 4.\n\nHwang-Tî, enjoying himself on the north of the Red-water, ascended to the height of the Khwän-lun (mountain), and having looked towards the south, was returning home, when he lost his dark-coloured pearl 2 .\n\nHe employed Wisdom to search for it, but he could not find it.\n\nHe employed (the clear-sighted) Lî Kû to search for it, but he p.\n\n312 could not find it.\n\nHe employed (the vehement debater) Khieh Khâu 1 to search for it, but he could not find it.\n\nHe then employed Purposeless 1 , who found it; on which Hwang-Tî said, 'How strange that it was Purposeless who was able to find it!' 5.\n\nThe teacher of Yâo was Hsü Yû 2 ; of Hsü Yû, Nieh Khüeh 2 ; of Nieh Khüeh, Wang Î 2 ; of Wang Î, Pheî-î 2 ."

