[content]
body = "In the third paragraph of his twentieth chapter, Kwang-dze uses a synonymous phrase instead of Lâo's 'Great Tâo,' calling it the 'Great Thû,' about which there can be no dispute, as meaning 'the Great Path,' 'Way,' or 'Course 1 .' In the last paragraph of his twenty-fifth Book, Kwang-dze again sets forth the metaphorical origin of the name Tâo.\n\n'Tâo,' he says, 'cannot be regarded as having a positive existence; existences cannot be regarded as non-existent.\n\nThe name Tâo is a metaphor used for the purpose of description.\n\nTo say that it exercises some causation, or that it does nothing, is speaking of it from the phase of a thing;--how can such language serve as a designation of it in its greatness?\n\nIf words were sufficient for the purpose, we might in a day's time exhaust the subject of the Tâo.\n\nWords not being sufficient, we may talk about it the whole day, and the subject of discourse will only have been a thing.\n\nTâo is the extreme to which things conduct us.\n\nNeither speech nor silence is sufficient to convey the notion of it.\n\nWhen we neither speak nor refrain from speech, our speculations about it reach their highest point.' The Tâo therefore is a phenomenon; not a positive being, but a mode of being.\n\nLâo's idea of it may become plainer as we proceed to other points of his system.\n\nIn the meantime, the best way of dealing with it in translating is to transfer it to the version, instead of trying to introduce an English equivalent for it.\n\n2.\n\nNext in importance to Tâo is the name Thien, meaning at first the vaulted sky or the open firmament of heaven.\n\nIn the Confucian Classics, and in the speech of the Chinese p.\n\n16 people, this name is used metaphorically as it is by ourselves Usage of the term Thien.\n\nfor the Supreme Being, with reference especially to His will and rule.\n\nSo it was that the idea of God arose among the Chinese fathers; so it was that they proceeded to fashion a name for God, calling Him Tî, and Shang Tî, 'the Ruler,' and 'the Supreme Ruler.' The Tâoist fathers found this among their people; but in their idea of the Tâo they had already a Supreme Concept which superseded the necessity of any other.\n\nThe name Tî for God only occurs once in the Tâo Teh King; in the well-known passage of the fourth chapter, where, speaking of the Tâo, Lâo-dze says, 'I do not know whose Son it is; it might seem to be before God.' Nor is the name Thien very common.\n\nWe have the phrase, 'Heaven and Earth,' used for the two great constituents of the kosmos, owing their origin to the Tâo, and also for a sort of binomial power, acting in harmony with the Tâo, covering, protecting, nurturing, and maturing all things.\n\nNever once is Thien used in the sense of God, the Supreme Being.\n\nIn its peculiarly Tâoistic employment, it is more an adjective than a noun.\n\n'The Tâo of Heaven' means the Tâo that is Heavenly, the course that is quiet and undemonstrative, that is free from motive and effort, such as is seen in the processes of nature, grandly proceeding and successful without any striving or crying.\n\nThe Tâo of man, not dominated by this Tâo, is contrary to it, and shows will, purpose, and effort, till, submitting to it, it becomes 'the Tâo or Way of the Sages,' which in all its action has no striving."

