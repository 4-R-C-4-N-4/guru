[content]
body = "214:2 Not meaning the king of Khû; but the Tâo, whose will was to be found in his nature and the conditions of his lot.\n\n215:1 A member of the Yen family of Lû.\n\nWe shall meet with him again in Books XIX, XXVIII, and XXXII.\n\n215:2 A minister of Wei; a friend and favourite of Confucius.\n\n215:3 Compare in the Kung Yung, ii, ch.\n\n24.\n\n216:1 Equivalent to 'Do not cross him in his peculiarities.' 217:1 The name of a place; of a road; of a bend in the road; of a hill.\n\nAll these accounts of the name are found in different editions of our author, showing that the locality had not been identified.\n\n217:2 No one has thought it worth cutting down.\n\n218:1 This is the indignity intended.\n\n219:1 Probably the Nan-kwo Dze-khî at the beginning of the second Book.\n\n219:2 In the present department of Kwei-teh, Ho-nan.\n\n219:3 A difficult sentence to construe.\n\n219:4 In what part of the duchy we do not know.\n\n219:5 See Mencius, VI, i, 13.\n\n220:1 Probably the name of an old work on sacrifices.\n\nBut was there ever a time in China when human sacrifices were offered to the Ho, or on any altar?\n\n220:2 One of Kwang-dze's creations.\n\n221:1 The deficiency of their faculties--here mental faculties--would assimilate them to the useless trees in the last two paragraphs, whose uselessness only proved useful to them.\n\n221:2 The great state of the south, having its capital in the present Hû-pei.\n\n221:3 See the Analects, XVIII, v.\n\n221:4 The madman would seem to contrast his own course with that of Confucius; but the meaning is very uncertain, and the text cannot be discussed fully in these short notes.\n\nThere is a jingle p.\n\n222 of rhyme also in the sentence, and some critics find something like this in them: 'Ye ferns, ye thorny ferns, O injure not my way!\n\nTo save my feet, I backward turn, or winding stray!' 222:1 Literally, 'robs itself;'--exhausts its moisture or productive strength.\n\nNext: Book V: Teh Khung Fû, or 'The Seal of Virtue Complete'"

