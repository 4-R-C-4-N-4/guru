[content]
body = "Yâo asked Hsü Yû, saying, 'Is Nieh Khüeh fit to be the correlate of Heaven 3 ?\n\n(If you think he is), I will avail myself of the services of Wang Î to constrain him (to take my place).' Hsü Yû replied, 'Such a measure would be hazardous, and full of peril to the kingdom!\n\nThe character of Nieh Khüeh is this;--he is acute, perspicacious, shrewd and knowing, ready in reply, sharp in retort, and hasty; his natural (endowments) surpass those of other men, but by his human qualities he seeks to obtain the Heavenly gift; he exercises his discrimination in suppressing his errors, but he does not know what is the source from which his errors arise.\n\nMake him the correlate of Heaven!\n\nHe would employ the human qualities, so that no regard would be paid to the Heavenly gift.\n\nMoreover, he would assign different functions to the different parts of the one person 4 .\n\np.\n\n313 Moreover, honour would be given to knowledge, and he would have his plans take effect with the speed of fire.\n\nMoreover, he would be the slave of everything he initiated.\n\nMoreover, he would be embarrassed by things.\n\nMoreover, he would be looking all round for the response of things (to his measures).\n\nMoreover, he would be responding to the opinion of the multitude as to what was right.\n\nMoreover, he would be changing as things changed, and would not begin to have any principle of constancy.\n\nHow can such a man be fit to be the correlate of Heaven?\n\nNevertheless, as there are the smaller branches of a family and the common ancestor of all its branches, he might be the father of a branch, but not the father of the fathers of all the branches 1 .\n\nSuch government (as he would conduct) would lead to disorder.\n\nIt would be calamity in one in the position of a minister, and ruin if he were in the position of the sovereign.' 6.\n\nYâo was looking about him at Hwâ 2 , the border-warden of which said, 'Ha!\n\nthe sage!\n\nLet me ask blessings on the sage!\n\nMay he live long!' p.\n\n314 [paragraph continues] Yâo said, 'Hush!' but the other went on, 'May the sage become rich!' Yâo (again) said, 'Hush!' but (the warden) continued, 'May the sage have many sons!' When Yâo repeated his 'Hush,' the warden said, 'Long life, riches, and many sons are what men wish for;--how is it that you alone do not wish for them?' Yâo replied, 'Many sons bring many fears; riches bring many troubles; and long life gives rise to many obloquies.\n\nThese three things do not help to nourish virtue; and therefore I wish to decline them.' The warden rejoined, 'At first I considered you to be a sage; now I see in you only a Superior man.\n\nHeaven, in producing the myriads of the people, is sure to have appointed for them their several offices.\n\nIf you had many sons, and gave them (all their) offices, what would you have to fear?\n\nIf you had riches, and made other men share them with you, what trouble would you have?\n\nThe sage finds his dwelling like the quail (without any choice of its own), and is fed like the fledgling; he is like the bird which passes on (through the air), and leaves no trace (of its flight).\n\nWhen good order prevails in the world, he shares in the general prosperity.\n\nWhen there is no such order, he cultivates his virtue, and seeks to be unoccupied."

