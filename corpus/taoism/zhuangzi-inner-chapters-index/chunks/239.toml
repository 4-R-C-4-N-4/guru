[content]
body = "And not only, when (a performance of them) is once over, do they not have done with them, but they prepare themselves (as) with fasting to describe them, they seem to kneel reverentially when they bring them forward, and they go through them with the excitements of music and singing; and then what can be done (to remedy the evil of them)?\n\nTherefore the superior man, who feels himself constrained to engage in the administration of the world will find it his best way to do nothing 1 .\n\nIn (that policy of) doing nothing, he can rest in the instincts of the nature with which he is endowed.\n\nHence he who will administer (the government of) the world p.\n\n294 honouring it as he honours his own person, may have that government committed to him, and he who will administer it loving it as he loves his own person, may have it entrusted to him 1 .\n\nTherefore, if the superior man will keep (the faculties lodged in) his five viscera unemployed, and not display his powers of seeing and hearing, while he is motionless as a representative of the dead, his dragon-like presence will be seen; while he is profoundly silent, the thunder (of his words) will resound, while his movements are (unseen) like those of a spirit, all heavenly influences will follow them; while he is (thus) unconcerned and does nothing, his genial influence will attract and gather all things round him:--what leisure has he to do anything more for the government of the world?\n\n3.\n\nZhui Khü 2 asked Lâo Tan, saying, 'If you do not govern the world, how can you make men's minds good?' The reply was, 'Take care how you meddle with and disturb men's minds.\n\nThe mind, if pushed about, gets depressed; if helped forward, it gets exalted.\n\nNow exalted, now depressed, here it appears as a prisoner, and there as a wrathful fury.\n\n(At one time) it becomes pliable and soft, yielding to what is hard and strong; (at another), it is sharp as the sharpest corner, fit to carve or chisel (stone or jade).\n\nNow it is hot as a scorching fire, and anon it is cold as ice.\n\nIt is so swift that while one is bending down and lifting up his head, it shall twice p.\n\n295 have put forth a soothing hand beyond the four seas.\n\nResting, it is still as a deep abyss; moving, it is like one of the bodies in the sky; in its resolute haughtiness, it refuses to be bound;-such is the mind of man 1 !' Anciently, Hwang-Tî was the first to meddle with and disturb the mind of man with his benevolence and righteousness 2 .\n\nAfter him, Yâo and Shun wore their thighs bare and the hair off the calves of their legs, in their labours to nourish the bodies of the people.\n\nThey toiled painfully with all the powers in their five viscera at the practice of their benevolence and righteousness; they tasked their blood and breath to make out a code of laws;--and after all they were unsuccessful.\n\nOn this Yâo sent away Hwan Tâu to Khung hill, and (the Chiefs of) the Three Miâo to San-wei, and banished the Minister of Works to the Dark Capital; so unequal had they been to cope with the world 3 .\n\nThen we are carried on to the kings of the Three (dynasties), when the world was in a state of great distraction.\n\nOf the lowest type of character there were Kieh and Kih; of a higher type there were Zäng (Shän) and Shih (Zhiû).\n\nAt the same time there arose the classes of p."

