[content]
body = "But the runner may be snared, the swimmer hooked, and the flyer shot by the arrow.\n\nBut there is the dragon:--I cannot tell how he mounts on the wind through the clouds, and rises to heaven.\n\nTo-day I have seen Lâo-dze, and can only compare him to the dragon.' In this speech of Confucius we have, I believe, the origin of the name Lâo-dze, as applied to the master of Tâoism.\n\nIts meaning is 'The Old Philosopher,' or 'The Old Gentleman 1 .' Confucius might well so style Lî R .\n\nAt the time of this interview he was himself in his thirty-fifth year, and the other was in his eighty-eighth.\n\nKhien adds, 'Lâo-dze cultivated the Tâo and its attributes, the chief aim of his studies being how to keep himself concealed and remain unknown.\n\nHe continued to reside at (the capital of) Kâu, but after a long time, seeing the decay of the dynasty, he left it and went away to the barrier-gate, leading out of the kingdom on the north-west.\n\nYin Hsî, the warden of the gate, said to him, \"You are about to withdraw yourself out of sight.\n\nLet me insist on your (first) composing for me a book.\" On this, Lâo-dze wrote a book in two parts, setting forth his views on the Tâo and its attributes, in more than 5000 characters.\n\nHe then went away, and it is not known where he died.\n\nHe was a superior man, who liked to keep himself unknown.' Khien finally traces Lâo's descendants down to the first century B.C., and concludes by saying, 'Those who attach themselves to the doctrine of Lâo-dze condemn that of the Literati, and the Literati on their part condemn Lâo-dze, verifying the saying, \"Parties whose principles are different cannot take counsel together.\" Lî R taught that by doing nothing others are as a matter of course transformed, p.\n\n36 and that rectification in the same way ensues from being pure and still.' This morsel is all that we have of historical narrative about Lâo-dze.\n\nThe account of the writing of the Tâo Teh King at the request of the warden of the barrier-gate has a doubtful and legendary appearance.\n\nOtherwise, the record is free from anything to raise suspicion about it.\n\nIt says nothing about previous existences of Lâo, and nothing of his travelling to the west, and learning there the doctrines which are embodied in his work.\n\nHe goes through the pass out of the domain of Kâu, and died no one knowing where.\n\nIt is difficult, however, to reconcile this last statement with a narrative in the end of Kwang-dze's third Book.\n\nThere we see Lâo-dze dead, and a crowd of mourners wailing round the corpse, and giving extraordinary demonstrations of grief, which offend a disciple of a higher order, who has gone to the house to offer his condolences on the occasion.\n\nBut for the peculiar nature of most of Kwang's narratives, we should say, in opposition to Khien, that the place and time of Lâo's death were well known.\n\nPossibly, however, Kwang-dze may have invented the whole story, to give him the opportunity of setting forth what, according to his ideal of it, the life of a Tâoist master should be, and how even Lâo-dze himself fell short of it.\n\nSecond, Khien's account of Kwang-dze is still more brief."

