[content]
body = "Of the sounds of Man very little is said, but they form the subject of the next paragraph.\n\nNothing is said in answer to the disciple's inquiry about the notes of Heaven.\n\nIt is intimated, however, that there is no necessity to introduce any foreign Influence or Power like Heaven in connexion.\n\nwith the notes of Earth.\n\nThe term Heaven, indeed, is about to pass with our author into a mere synonym of Tâo, the natural 'course' of the phenomena of men and things.\n\n178:2 Words are the 'sounds' of Man; and knowledge is the 'wind' by which they are excited.\n\n179:1 A true Governor' would be a good enough translation for 'the true God.' But Kwang-dze did not admit any supernatural Power or Being as working in man.\n\nHis true Governor was the Tâo; and this will be increasingly evident as we proceed with the study of his Books.\n\n180:1 The name 'Ruler' is different from 'Governor' above; but they both indicate the same concept in the author's mind.\n\n180:2 The proper reply to this would be that the mind is not dissolved with the body; and Kwang-dze's real opinion, as we shall find, was that life and death were but phases in the phenomenal development.\n\nBut the course of his argument suggests to us the question here, 'Is life worth living?' 181:1 This 'teacher' is 'the Tâo.' 181:2 Expressing the absurdity of the case.\n\nThis is one of the sayings of Hui-dze;--see Book XXXIII, par.\n\n7.\n\n181:3 The successor and counsellor of Shun, who coped with and remedied the flood of Yâo.\n\n182:1 The followers of Confucius.\n\n182:2 The disciples of Mih-dze, or Mih Tî, the heresiarch, whom Mencius attacked so fiercely;--see Mencius, V, 1, 5, e t al.\n\nHis era must be assigned between Confucius and Mencius.\n\n182:3 That is, the perfect mind, the principle of the Tâo.\n\n182:4 As taught by Hui-dze;--see XXXIII, 7; but it is doubtful if the quotation from Hui's teaching be complete.\n\n182:5 Equivalent to the Tâo.\n\nSee on the use in Lâo-dze and Kwang-dze of the term 'Heaven,' in the Introduction, pp.\n\n16-18.\n\n183:1 The language of our author here is understood to have reference to the views of Kung-sun Lung, a contemporary of Hui-dze, and a sophist like him.\n\nOne of his treatises or arguments had the title of 'The White Horse,' and another that of 'Pointing to Things.' If these had been preserved, we might have seen more clearly the appropriateness of the text here.\n\nBut the illustration of the monkeys and their actions shows us the scope of the whole paragraph to be that controversialists, whose views are substantially the same, may yet differ, and that with heat, in words.\n\n184:1 The character in the text means both 'a stalk of grain' and a horizontal beam.' Each meaning has its advocates here.\n\n184:2 A famous beauty, a courtezan presented by the king of Yüeh to his enemy, the king of Wû, and who hastened on his progress to ruin and death, she herself perishing at the same time.\n\n185:1 Literally, 'the Heaven-Mould or Moulder,'--another name for the Tâo, by which all things are fashioned.\n\n185:2 See the same passage in Book XXIII, par.\n\n10."

