[content]
body = "I thought that I had reached a good understanding of every subject; but now that I have heard the words of Kwang-dze, they throw me into a flutter of surprise.\n\nI do not know whether it be that I do not come up to him in the power of discussion, or that my knowledge is not equal to his.\n\nBut now I do not feel able to open my mouth, and venture to ask you what course I should pursue.' Kung-dze Mâu leant forward on his stool, drew a long breath, looked up to heaven, smiled, and p.\n\n388 said, 'Have you not heard of the frog of the dilapidated well, and how it said to the turtle of the Eastern Sea, \"How I enjoy myself?\n\nI leap upon the parapet of this well.\n\nI enter, and having by means of the projections formed by the fragments of the broken tiles of the lining proceeded to the water, I draw my legs together, keep my chin up, (and strike out).\n\nWhen I have got to the mud, I dive till my feet are lost in it.\n\nThen turning round, I see that of the shrimps, crabs, and tadpoles there is not one that can do like me.\n\nMoreover, when one has entire command of all the water in the gully, and hesitates to go forward, it is the greatest pleasure to enjoy one's self here in this dilapidated well 1 ;--why do not you, Master, often come and enter, and see it for yourself?\n\n\"The turtle of the Eastern Sea (was then proceeding to go forward), but before he had put in his left foot, he found his right knee caught and held fast.\n\nOn this he hesitated, drew back, and told (the frog) all about the sea, saying, \"A distance of a thousand lî is not sufficient to express its extent, nor would (a line of) eight thousand cubits be equal to sound its depth.\n\nIn the time of Yü, for nine years out of ten the flooded land (all drained into it), and its water was not sensibly increased; and in the time of Thang for seven years out of eight there was a drought, but the rocks on the shore (saw) no diminution of the water because of it.\n\nThus it is that no change is produced in its waters by any cause operating for a short time or a long, and that they do not advance nor recede for any addition or subtraction, whether great or small; and this is the great pleasure afforded by the Eastern Sea.\" When p.\n\n389 the frog of the dilapidated well heard this, he was amazed and terror-struck, and lost himself in surprise.\n\n'And moreover, when you, who have not wisdom enough to know where the discussions about what is right and what is wrong should end, still desire to see through the words of Kwang-dze, that is like employing a mosquito to carry a mountain on its back, or a millipede 1 to gallop as fast as the Ho runs;--tasks to which both the insects are sure to be unequal.\n\nStill further, when you, who have not wisdom enough to know the words employed in discussing very mysterious subjects, yet hasten to show your sharpness of speech on any occasion that may occur, is not this being like the frog of the dilapidated well?\n\n'And that (Kwang-dze) now plants his foot on the Yellow Springs (below the earth), and anon rises to the height of the Empyrean.\n\nWithout any regard to south and north, with freedom he launches out in every direction, and is lost in the unfathomable.\n\nWithout any regard to east and west, starting from what is abysmally obscure, he comes back to what is grandly intelligible."

