[content]
body = "Doing what other men do, they would have no occasion to blame me.\n\nThis p.\n\n208 is what is called being a fellow-worker with other men.\n\n'Fully declaring my sentiments and substantiating them by appealing to antiquity, I shall be a co-worker with the ancients.\n\nAlthough the words in which I convey my lessons may really be condemnatory (of the ruler), they will be those of antiquity, and not my own.\n\nIn this way, though straightforward, I shall be free from blame.\n\nThis is what is called being a co-worker with antiquity.\n\nMay I go to Wei in this way, and be successful?' 'No indeed!' said Kung-nî.\n\n'How can you do so?\n\nYou have too many plans of proceeding, and have not spied out (the ruler's character).\n\nThough you firmly adhere to your plans, you may be held free from transgression, but this will be all the result.\n\nHow can you (in this way) produce the transformation (which you desire)?\n\nAll this only shows (in you) the mind of a teacher!' 2.\n\nYen Hui said, 'I can go no farther; I venture to ask the method from you.' Kung-nî replied, 'It is fasting 1 , (as) I will tell you.\n\n(But) when you have the method, will you find it easy to practise it?\n\nHe who thinks it easy will be disapproved of by the bright Heaven.' Hui said, 'My family is poor.\n\nFor months together we have no spirituous drink, nor do we taste the proscribed food or any strong-smelling vegetables 2 ;--can this be regarded as fasting?' The reply was, 'It is the fasting appropriate to sacrificing, but it is not the fasting p.\n\n209 of the mind.' 'I venture to ask what that fasting of the mind is,' said Hui, and Kung-nî answered, 'Maintain a perfect unity in every movement of your will.\n\nYou will not wait for the hearing of your ears about it, but for the hearing of your mind.\n\nYou will not wait even for the hearing of your mind, but for the hearing of the spirit 1 .\n\nLet the hearing (of the ears) rest with the ears.\n\nLet the mind rest in the verification (of the rightness of what is in the will).\n\nBut the spirit is free from all pre-occupation and so waits for (the appearance of) things.\n\nWhere the (proper) course is 2 , there is freedom from all pre-occupation;--such freedom is the fasting of the mind.' Hui said 3 , 'Before it was possible for me to employ (this method), there I was, the Hui that I am; now, that I can employ it, the Hui that I was has passed away.\n\nCan I be said to have obtained this freedom from pre-occupation?' The Master replied, 'Entirely.\n\nI tell you that you can enter and be at ease in the enclosure (where he is), and not come into collision with the reputation (which belongs to him).\n\nIf he listen to your counsels, let him hear your notes; if he will not listen, be silent.\n\nOpen no (other) door; employ no other medicine; dwell with him (as with a.\n\nfriend) in the same apartment, and as if you had no other option, and you will not be far from success in your object.\n\nNot to move a step is easy;--to walk without treading on the ground is difficult.\n\nIn acting after the manner of men, it is easy to fall p.\n\n210 into hypocrisy; in acting after the manner of Heaven, it is difficult to play the hypocrite.\n\nI have heard of flying with wings; I have not heard of flying without them."

