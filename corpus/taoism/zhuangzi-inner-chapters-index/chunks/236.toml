body = "Häng did not immediately usurp the marquisate; but he and his successors disposed of it at their pleasure among the representatives of the old House till 386, when Thien Ho was recognised by the king of Kâu as the marquis; and his next successor but one took the title of king.\n\n282:3 The kingdom of Khî came to an end in B.\n\nC.\n\n221, the first year of the dynasty of Khin, after it had lasted through five reigns.\n\nHow Kwang-dze made out his 'twelve generations' we cannot tell.\n\nThere may be an interpolation in his text made in the time of Khin, or subsequently.\n\n283:1 See on Book IV, par.\n\n1.\n\n283:2 See on Book IV, par.\n\n1.\n\n283:3 A historiographer of Kâu, with whom Confucius is said to have studied music.\n\nHe was weakly and unjustly put to death, as here described by king Käng, in B.\n\nC.\n\n492.\n\n283:4 Wû Dze-hsü, the hero of revenge, who fled from Khû to Wû, which he long served.\n\nHe was driven at last to commit suicide, and his body was then put into a leathern wine-sack, and thrown into the Kiang near the present Sû-kâu;--about B.\n\nC.\n\n475.\n\n283:5 See on Book VIII, par.\n\n4.\n\n284:1 This is an instance of cause and effect naturally happening.\n\n284:2 At a meeting of the princes, presided over by king Hsüan of Khû (B.\n\nC.\n\n369-340), the ruler of Lû brought very poor wine for the king, which was presented to him as wine of Kâo, in consequence of a grudge against that kingdom by his officer of wines.\n\nIn consequence of this king Hsüan ordered siege to be laid to Han-tan, the capital of Kâo.\n\nThis is an instance of cause and effect occurring irregularly.\n\n284:3 There seems to be no connexion of cause and effect here; but Kwang-dze goes on in his own way to make out that there is such a connexion.\n\n285:1 The verb 'to steal' is here used transitively, and with a hiphil force.\n\n286:1 See the Tâo Teh King, ch.\n\n36.\n\nOur author's use of it throws light on its meaning.\n\n286:2 Note 1 , p.\n\n186.\n\n286:3 Note 2 , p.\n\n269.\n\n286:4 A skilful maker of arrows of the time of Yâo,--the Kung-kung of the Shû, II, i, 21; V, xxii, 19.\n\n287:1 The Tâo Teh King, ch.\n\n45.\n\n287:2 Note 6 , p.\n\n269.\n\n287:3 Note 7 , p.\n\n269.\n\n287:4 Note 5 , p.\n\n261.\n\n287:5 Of the twelve names mentioned here the reader is probably familiar with those of Fû-hsî and Shan-näng, the first and second of the Tî in chronology.\n\nHsien-yüan is another name for Hwang-Tî, the third of them.\n\nKû-yung was, perhaps, a minister of Hwang-Tî.\n\nHo-hsü has occurred before in Book IV.\n\nOf the other seven, five occur among the fifteen sovereigns placed in the 'Compendium p.\n\n288 of History' between Fû-hsî and Shän-näng.\n\nThe remaining two may be found, I suppose, in the Lû Shih of Lo Pî.\n\n288:1 See the eightieth chapter of the Tâo Teh King."

