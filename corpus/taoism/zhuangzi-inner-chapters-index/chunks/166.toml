[content]
body = "Lieh-dze, frightened at the respect shown to him by the soup-vendors, and yet by his human doings drawing men to him, disowns the rule of the heavenly; Hwan of Käng, thinking himself different from other men, does not know that Heaven recompenses men according to their employment of the heavenly in them; the resting of the sages in their proper rest shows how the ancients pursued the heavenly and not the human; the one who learned to slay the Dragon, but afterwards did not exercise his skill, begins with the human, but afterwards goes on to the heavenly; in those who do not rest in the heavenly, and perish by the inward war, we see how the small men do not know the secret of the Great Repose; Zhâo Shang, glorying in the carriages which he had acquired, is still farther removed from the heavenly; when Yen Ho shows that the sage, in imparting his instructions, did not follow the example of Heaven in diffusing its benefits, we learn that it is only the Doing Nothing of the True Man which is in agreement with Heaven; the difficulty of knowing the mind of man, and the various methods required to test it, show the readiness with which, when not under the rule of Heaven, it seems to go after what is right, and the greater readiness with which it again revolts from it; in Khao-fû, the Correct, we have one indifferent to the distinctions of rank, and from him we advance to the man who understands the great condition appointed for him, and is a follower of Heaven; then comes he who plays the thief under the chin of the Black Dragon, running the greatest risks on a mere peradventure of success, a resolute opponent of Heaven; and finally we have Kwang-dze despising the ornaments of the sacrificial ox, looking in the same way at the worms beneath and the kites overhead, and regarding himself as quite independent p.\n\n162 of them, thus giving us an example of the embodiment of the spiritual, and of harmony with Heaven.' So does this ingenious commentator endeavour to exhibit the one idea in the Book, and show the unity of its different paragraphs.\n\nNext: Book XXXIII.\n\nThien Hsiâ"

