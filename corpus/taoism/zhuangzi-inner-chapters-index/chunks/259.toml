[content]
body = "328:1 should perhaps be translated 'a leper.' The illustration is edited by Kiâo Hung and others as a paragraph by itself; They cannot tell whether it be intended to end the paragraph that precedes or to introduce the one that follows.\n\n328:2 This paragraph must be our author's own.\n\nKhih-kang, of the time of king Wû, could not be criticising the schemes of life propounded by Mo and Yang, whose views were so much later in time.\n\nIt breathes the animosity of Lâo and Kwang against all schemes of learning and culture, as contrary to the simplicity of life according to the Tâo.\n\nNext: Book XIII: Thien Tâo, or 'The Way of Heaven.'"

