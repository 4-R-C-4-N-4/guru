[content]
body = "In this way you will be adding fire to fire, and water to water, increasing, as we may express it, the evils (which you deplore).\n\nTo these signs of deferring to him at the first there will be no end.\n\nYou will be in danger, seeing he does not believe you, of making your words more strong, and you are sure to die at the hands of such a tyrant.\n\n'And formerly Kieh 1 killed Kwan Lung-fäng 2 , and Kâu 3 killed the prince Pî-kan 4 .\n\nBoth of p.\n\n206 these cultivated their persons, bending down in sympathy with the lower people to comfort them suffering (as they did) from their oppressors, and on their account opposing their superiors.\n\nOn this account, because they so ordered their conduct, their rulers compassed their destruction:--such regard had they for their own fame.\n\n(Again), Yâo anciently attacked (the states of) Zhung-kih 1 and Hsü-âo 1 , and Yü attacked the ruler of Hû 1 .\n\nThose states were left empty, and with no one to continue their population, the people being exterminated.\n\nThey had engaged in war without ceasing; their craving for whatever they could get was insatiable.\n\nAnd this (ruler of Wei) is, like them, one who craves after fame and greater substance;--have you not heard it?\n\nThose sages were not able to overcome the thirst for fame and substance;--how much less will you be able to do so!\n\nNevertheless you must have some ground (for the course which you wish to take); pray try and tell it to me.' Yen Hui said, 'May I go, doing so in uprightness and humility, using also every endeavour to be uniform (in my plans of operation)?' 'No, indeed!' was the reply.\n\n'How can you do so?\n\nThis man makes a display 2 of being filled to overflowing (with virtue), and has great self-conceit.\n\nHis feelings are not to be determined from his countenance.\n\nOrdinary men do not (venture to) oppose him, and he proceeds from the way in which he affects them p.\n\n207 to seek still more the satisfaction of his own mind.\n\nHe may be described as unaffected by the (small lessons of) virtue brought to bear on him from day to day; and how much less will he be so by your great lessons?\n\nHe will be obstinate, and refuse to be converted.\n\nHe may outwardly agree with you, but inwardly there will be no self-condemnation;-how can you (go to him in this way and be successful)?' (Yen Hui) rejoined, 'Well then; while inwardly maintaining my straightforward intention, I will outwardly seem to bend to him.\n\nI will deliver (my lessons), and substantiate them by appealing to antiquity.\n\nInwardly maintaining my straightforward intention, I shall be a co-worker with Heaven.\n\nWhen I thus speak of being a co-worker with Heaven, it is because I know that (the sovereign, whom we style) the son of Heaven, and myself, are equally regarded by Heaven as Its sons.\n\nAnd should I then, as if my words were only my own, be seeking to find whether men approved of them, or disapproved of them?\n\nIn this way men will pronounce me a (sincere and simple 1 ) boy.\n\nThis is what is called being a co-worker with Heaven.\n\n'Outwardly bending (to the ruler), I shall be a co-worker with other men.\n\nTo carry (the memorandum tablet to court) 2 , to kneel, and to bend the body reverentially:--these are the observances of ministers.\n\nThey all employ them, and should I presume not to do so?"

