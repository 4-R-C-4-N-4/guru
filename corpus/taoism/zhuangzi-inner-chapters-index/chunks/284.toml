body = "Sacred Texts Taoism Index Previous p.\n\n374 BOOK XVII.\n\nPART II.\n\nSECTION X.\n\nKhiû Shui, or 'The Floods of Autumn 1 .' 1.\n\nThe time of the autumnal floods was come, and the hundred streams were all discharging themselves into the Ho.\n\nIts current was greatly swollen 2 , so that across its channel from bank to bank one could not distinguish an ox from a horse.\n\nOn this the (Spirit-) earl of the Ho 3 laughed with delight, thinking that all the beauty of the world was to be found in his charge.\n\nAlong the course of the river he walked east till he came to the North Sea, over which he looked, with his face to the east, without being able to see where its waters began.\n\nThen he began to turn his face round, looked across the expanse, (as if he were) confronting Zo 3 , and said with a sigh, 'What the vulgar saying expresses about him who has learned a hundred points (of the Tâo), and thinks that there is no one equal to himself, was surely spoken of me.\n\nAnd moreover, I have heard p.\n\n375 parties making little of the knowledge of Kung-nî and the righteousness of Po-î, and at first I did not believe them.\n\nNow I behold the all-but-boundless extent (of your realms).\n\nIf I had not come to your gate, I should have been in danger (of continuing in my ignorance), and been laughed at for long in the schools of our great System 1 .' Zo, (the Spirit-lord) of the Northern Sea, said, 'A frog in a well cannot be talked with about the sea;--he is confined to the limits of his hole.\n\nAn insect of the summer cannot be talked with about ice;--it knows nothing beyond its own season.\n\nA scholar of limited views cannot be talked with about the Tâo;--he is bound by the teaching (which he has received).\n\nNow you have come forth from between your banks, and beheld the great sea.\n\nYou have come to know your own ignorance and inferiority, and are in the way of being fitted to be talked with about great principles.\n\nOf all the waters under heaven there are none so great as the sea.\n\nA myriad streams flow into it without ceasing, and yet it is not filled; and afterwards 2 it discharges them (also) without ceasing, and yet it is not emptied.\n\nIn spring and in autumn it undergoes no change; it takes no notice of floods or of drought.\n\nIts superiority over such streams even as the Kiang and the p.\n\n376 [paragraph continues] Ho cannot be told by measures or numbers; and that I have never, notwithstanding this, made much of myself, is because I compare my own bodily form with (the greatness of) heaven and earth, and (remember that) I have received my breath from the Yin and Yang.\n\nBetween heaven and earth I am but as a small stone or a small tree on a great hill.\n\nSo long as I see myself to be thus small, how should I make much of myself?\n\nI estimate all within the four seas, compared with the space between heaven and earth, to be not so large as that occupied by a pile of stones in a large marsh!\n\nI estimate our Middle States, compared with the space between the four seas, to be smaller than a single little grain of rice in a great granary!\n\nWhen we would set forth the number of things (in existence), we speak of them as myriads; and man is only one of them.\n\nMen occupy all the nine provinces; but of all whose life is maintained by grain-food, wherever boats and carriages reach, men form only one portion.\n\nThus, compared with the myriads of things, they are not equal to a single fine hair on the body of a horse."

