body = "257 [paragraph continues] 'I have lost all thought of ceremonies and music.' 'Very well, but that is not enough., A third day, Hui again saw (the Master), and said, 'I am making progress.' 'What do you mean?' 'I sit and forget everything 1 .' Kung-nî changed countenance, and said, 'What do you mean by saying that you sit and forget (everything)?' Yen Hui replied, 'My connexion with the body and its parts is dissolved; my perceptive organs are discarded.\n\nThus leaving my material form, and bidding farewell to my knowledge, I am become one with the Great Pervader 2 .\n\nThis I call sitting and forgetting all things.' Kung-nî said, 'One (with that Pervader), you are free from all likings; so transformed, you are become impermanent.\n\nYou have, indeed, become superior to me!\n\nI must ask leave to follow in your steps 3 .' 15.\n\nDze-yü 4 and Dze-sang 4 were friends.\n\n(Once), when it had rained continuously for ten days, Dze-yü said, 'I fear that Dze-sang may be in distress.' So he wrapped up some rice, and went to give it to him to eat.\n\nWhen he came to Dze-sang's door, there issued from it sounds between singing and wailing; p.\n\n258 a lute was struck, and there came the words, 'O Father!\n\nO Mother!\n\nO Heaven!\n\nO Men!' The voice could not sustain itself, and the line was hurriedly pronounced.\n\nDze-yü entered and said, 'Why are you singing, Sir, this line of poetry in such a way?' The other replied, 'I was thinking, and thinking in vain, how it was that I was brought to such extremity.\n\nWould my parents have wished me to be so poor?\n\nHeaven overspreads all without any partial feeling, and so does Earth sustain all;--would Heaven and Earth make me so poor with any unkindly feeling?\n\nI was trying to find out who had done it, and I could not do so.\n\nBut here I am in this extremity!--it is what was appointed for me 1 !' Footnotes 236:1 See pp.\n\n134-136.\n\n236:2 Both 'Heaven' and 'Man' here are used in the Tâoistic sense;--the meaning which the terms commonly have both with Lao and Kwang.\n\n236:3 The middle member of this sentence is said to be the practical outcome of all that is said in the Book; conducting the student of the Tâo to an unquestioning submission to the experiences in his lot, which are beyond his comprehension, and approaching nearly to what we understand by the Christian virtue of Faith.\n\n236:4 That is, there may be the conflict, to the end of life, between p.\n\n237 faith and fact, so graphically exhibited in the Book of job, and compendiously described in the seventy-third Psalm.\n\n237:1 Here we meet with the True Man, a Master of the Tâo.\n\nHe is the same as the Perfect Man, the Spirit-like Man, and the Sagely Man (see pp.\n\n127, 128), and the designation is sometimes interchanged in the five paragraphs that follow with 'the Sagely Man.' Mr.\n\nBalfour says here that this name 'is used in the esoteric sense,--\"partaking of the essence of divinity;\"' and he accordingly translates by 'the divine man.' But he might as well translate any one of the other three names in the same way."

