body = "243:4 Men at a very early time came to believe in the existence of their spirits after death, and in the existence of a Supreme Ruler or God.\n\nIt vas to the Tâo that those concepts were owing.\n\n243:5 The primal ether out of which all things were fashioned by the interaction of the Yin and Yang.\n\nThis was something like the p.\n\n244 current idea of protoplasm; but while protoplasm lies down in the lower parts of the earth, the Thâi-kî was imagined to be in the higher regions of space.\n\n244:1 The Tâo is independent both of space and time.\n\n244:2 A prehistoric sovereign.\n\n244:3 A name for the constellation of the Great Bear.\n\n244:4 Name of the spirit of the Khwan-lun mountains in Thibet, the fairy-land of Tâoist writers, very much in Tâoism what mount Sumêru is in Buddhism.\n\n244:5 The spirit presiding over the Yellow River;--see Mayers's Manual, pp.\n\n54, 55.\n\n244:6 Appears here as the spirit of mount Thâi, the great eastern mountain; we met with him in I, 5, but simply as one of Kwang-dze's fictitious personages.\n\n244:7 Appears before in Bk.\n\nII; the first of Sze-mâ Khien's 'Five Tîs;' no doubt a very early sovereign, to whom many important discoveries and inventions are ascribed; is placed by many at the head of Tâoism itself.\n\n244:8 The second of the 'Five Tîs;' a grandson of Hwang-Tî.\n\nI do not know what to say of his 'Dark Palace.' 245:1 The Spirit of the Northern regions, with a man's face, and a bird's body, &c.\n\n245:2 A queen of the Genii on mount Khwän-lun.\n\nSee Mayers's Manual, pp.\n\n178, 179.\n\n245:3 Phäng Zû has been before us in Bk.\n\nI.\n\nShun is intended by 'the Lord of Yü.' The five Chiefs;--see Mencius, VI, ii, 7.\n\n245:4 See the Shû, IV, viii; but we have nothing there of course about the Milky Way and the stars.--This passage certainly lessens our confidence in Kwang-dze's statements.\n\n245:5 Perhaps the same as Nan-po Dze-khî in Bk.\n\nIV, par.\n\n7.\n\n245:6 Must have been a great Tâoist.\n\nNothing more can be said of him or her.\n\n245:7 Only mentioned here.\n\n246:1 So the is explained.\n\n246:2 Standing by himself, as it were face to face with the Tâo.\n\n246:3 Amid all changes, in life and death, the possessor of the Tâo, has peace.\n\n246:4 Meaning writings; literally, 'the son of the assisting pigment.' p.\n\n247 We are not to suppose that by this and the other names that follow individuals are intended.\n\nKwang-dze seems to have wished to give, in his own fashion, some notion of the genesis of the idea of the Tâo from the first speculations about the origin of things.\n\n247:1 We need not suppose that these are the names of real men.\n\nThey are brought on the stage by our author to serve his purpose.\n\nHwâi-nan makes the name of the first to have been Dze-shui ( ).\n\n247:2 Compare the same representation in Bk.\n\nXXIII, par.\n\n10.\n\nKû Teh-kih says on it here, 'The head, the spine, the rump-bone mean simply the head and tail, the beginning and end."

