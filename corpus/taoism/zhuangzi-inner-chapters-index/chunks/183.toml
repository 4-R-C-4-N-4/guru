body = "The harmonising of them is to be found in the invisible operation of Heaven, and by following this on into the unlimited past.\n\nIt is by this method that we can complete our years (without our minds being disturbed) 1 .\n\n'What is meant by harmonising (conflicting opinions) in the invisible operation of Heaven?\n\nThere is the affirmation and the denial of it; and there is the assertion of an opinion and the rejection of it.\n\nIf the affirmation be according to the reality of the fact, it is certainly different from the denial of it:--there can be no dispute about that.\n\nIf the assertion of an opinion be correct, it is certainly different from its rejection:--neither can there be any dispute about that.\n\nLet us forget the lapse of time; let us forget the conflict of opinions.\n\nLet us make our appeal to the Infinite, and take up our position there 2 .' 11.\n\nThe Penumbra asked the Shadow 3 , saying, 'Formerly you were walking on, and now you have stopped; formerly you were sitting, and now you have risen up:--how is it that you are so without stability?' The Shadow replied, 'I wait for the movements of something else to do what I do, and that something else on which I wait waits further p.\n\n197 on another to do as it does 1 .\n\nMy waiting,--is it for the scales of a snake, or the wings of a cicada 2 ?\n\nHow should I know why I do one thing, or do not do another 3 ?\n\n'Formerly, I, Kwang Kâu, dreamt that I was a butterfly, a butterfly flying about, feeling that it was enjoying itself I did not know that it was Kâu.\n\nSuddenly I awoke, and was myself again, the veritable Kâu.\n\nI did not know whether it had formerly been Kâu dreaming that he was a butterfly, or it was now a butterfly dreaming that it was Kâu.\n\nBut between Kâu and a butterfly there must be a difference 4 .\n\nThis is a case of what is called the Transformation of Things 4 .' Footnotes 176:1 See pp.\n\n128-130.\n\n176:2 Nan-kwo, 'the southern suburb,' had probably been the quarter where Dze-khî had resided, and is used as his surname.\n\nHe is introduced several times by Kwang-dze in his writings:--Books IV, 7; XXVII, 4, and perhaps elsewhere.\n\n176:3 We have the surname of this disciple, Yen ( ); his name, Yen ( ); his honorary or posthumous epithet (Khäng); and his ordinary appellation, Dze-yû.\n\nThe use of the epithet shows that he and his master had lived before our author.\n\n176:4 'He had lost himself;' that is, he had become unconscious of all around him, and even of himself, as if he were about to enter p.\n\n177 into the state of Ian Immortal,' a mild form of the Buddhistic samâdhi.\n\nBut his attitude and appearance were intended by Kwang-dze to indicate what should be the mental condition in reference to the inquiry pursued in the Book;--a condition, it appears to me, of agnosticism.\n\nSee the account of Lâo-dze in a similar trance in Book XXI, par.\n\n4.\n\n177:1 The Chinese term here (lâi) denotes a reed or pipe, with three holes, by a combination of which there was formed the rudimentary or reed organ.\n\nOur author uses it for the sounds or notes heard in nature, various as the various opinions of men in their discussions about things.\n\n178:1 The sounds of Earth have been described fully and graphically."

