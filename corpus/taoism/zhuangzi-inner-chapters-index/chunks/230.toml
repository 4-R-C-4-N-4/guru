[content]
body = "But when the sagely men appeared, limping and wheeling about in (the exercise of) benevolence, pressing along and standing on tiptoe in the doing of righteousness, then men universally began to be perplexed.\n\n(Those sages also) went to excess in their performances of music, and in their gesticulations in the practice of ceremonies, and then men began to be separated from one another.\n\nIf the raw materials p.\n\n279 had not been cut and hacked, who could have made a sacrificial vase from them?\n\nIf the natural jade had not been broken and injured, who could have made the handles for the libation-cups from it?\n\nIf the attributes of the Tâo had not been disallowed, how should they have preferred benevolence and righteousness?\n\nIf the instincts of the nature had not been departed from, how should ceremonies and music have come into use?\n\nIf the five colours had not been confused, how should the ornamental figures have been formed?\n\nIf the five notes had not been confused, how should they have supplemented them by the musical accords?\n\nThe cutting and hacking of the raw materials to form vessels was the crime of the skilful workman; the injury done to the characteristics of the Tâo in order to the practice of benevolence and righteousness was the error of the sagely men.\n\n3.\n\nHorses, when living in the open country, eat the grass, and drink water; when pleased, they intertwine their necks and rub one another; when enraged, they turn back to back and kick one another;--this is all that they know to do.\n\nBut if we put the yoke on their necks, with the moonlike frontlet displayed on all their foreheads, then they know to look slily askance, to curve their necks, to rush viciously, trying to get the bit out of their mouths, and to filch the reins (from their driver);--this knowledge of the horse and its ability thus to act the part of a thief is the crime of Po-lâo.\n\nIn the time of (the Tî) Ho-hsü 1 , the people occupied p.\n\n280 their dwellings without knowing what they were doing, and walked out without knowing where they were going.\n\nThey filled their mouths with food and were glad; they slapped their stomachs to express their satisfaction.\n\nThis was all the ability which they possessed.\n\nBut when the sagely men appeared, with their bendings and stoppings in ceremonies and music to adjust the persons of all, and hanging up their benevolence and righteousness to excite the endeavours of all to reach them, in order to comfort their minds, then the people began to stump and limp about in their love of knowledge, and strove with one another in their pursuit of gain, so that there was no stopping them:--this was the error of those sagely men.\n\nFootnotes 276:1 See pp.\n\n140 , 141 .\n\n276:2 Literally, 'righteous towers;' but is very variously applied, and there are other readings.\n\nCompare the name of ling thâi, given by the people to the tower built by king Wän; Shih, III, i, 8.\n\n276:3 A mythical being, the first tamer of horses.\n\nThe name is given to a star, where he is supposed to have his seat as superintendent of the horses of heaven.\n\nIt became a designation of Sun Yang, a famous charioteer of the later period of the Kâu dynasty, but it could not be he whom Kwang-dze had in view.\n\n276:4 Po-lâo set the example of dealing with horses as now described; but the supplement which I have introduced seems to bring out better our author's meaning.\n\n277:1 Compare the same language in the previous Book, par.\n\n3."

