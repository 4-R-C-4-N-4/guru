[content]
body = "Looking at the subject from these examples of striving by force and of resigning, and from the conduct of Yâo (on the one hand) and of Kieh (on the other), we see that there is a time for noble acting, and a time for p.\n\n381 mean;--these characteristics are subject to no regular rule.\n\n5.\n\n'A battering ram may be used against the wall of a city, but it cannot be employed to stop up a hole;--the uses of implements are different.\n\nThe (horses) Khih-kî and Hwâ-liû 1 could in one day gallop 1000 lî, but for catching rats they were not equal to a wild dog or a weasel;--the gifts of creatures are different.\n\nThe white horned owl collects its fleas in the night-time, and can discern the point of a hair, but in bright day it stares with its eyes and cannot see a mound or a hill;--the natures of creatures are different.\n\n'Hence the sayings, \"Shall we not follow and honour the right, and have nothing to do with the wrong?\n\nshall we not follow and honour those who secure good government, and have nothing to do with those who produce disorder?\" show a want of acquaintance with the principles of Heaven and Earth, and with the different qualities of things.\n\nIt is like following and honouring Heaven and taking no account of Earth; it is like following and honouring the Yin and taking no account of the Yang.\n\nIt is clear that such a course cannot be pursued.\n\nYet notwithstanding they go on talking so:--if they are not stupid, they are visionaries.\n\nThe Tî sovereigns resigned their thrones to others in one way, and the rulers of the three dynasties transmitted their thrones to their successors in another.\n\nHe who acts differently from the requirements of his time and contrary to its custom is called an usurper; he who complies with the time p.\n\n382 and follows the common practice is said to be righteous.\n\nHold your peace, O earl of the Ho.\n\nHow should you know what constitutes being noble and being mean, or who are the small and who the great?' 6.\n\nThe earl of the Ho said, 'Very well.\n\nBut what am I to do?\n\nand what am I not to do?\n\nHow am I to be guided after all in regard to what I accept or reject, and what I pursue or put away from me?' Zo of the Northern Sea replied, 'From the standpoint of the Tâo, what is noble?\n\nand what is mean?\n\nThese expressions are but the different extremes of the average level.\n\nDo not keep pertinaciously to your own ideas, which put you in such opposition to the Tâo.\n\nWhat are few?\n\nand what are many?\n\nThese are denominations which we employ in thanking (donors) and dispensing gifts.\n\nDo not study to be uniform in doing so;--it only shows how different you are from the Tâo.\n\nBe severe and strict, like the ruler of a state who does not selfishly bestow his favours.\n\nBe scrupulous, yet gentle, like the tutelary spirit of the land, when sacrifice is offered to him who does not bestow his blessing selfishly.\n\nBe large-minded like space, whose four terminating points are illimitable, and form no particular enclosures.\n\nHold all things in your love, favouring and supporting none specially.\n\nThis is called being without any local or partial regard; all things are equally regarded; there is no long or short among them.\n\n'There is no end or beginning to the Tâo.\n\nThings indeed die and are born, not reaching a perfect state which can be relied on.\n\nNow there is emptiness, and now fulness;--they do not continue in one form.\n\nThe years cannot be reproduced; time p."

