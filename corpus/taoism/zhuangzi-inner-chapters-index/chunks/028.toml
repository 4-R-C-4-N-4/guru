[content]
body = "At the conclusion of his third Book, writing of the death of Lâo-dze, he says, 'When the master came, it was at the proper time; when he went away, it was the simple sequence (of his coming).\n\nQuiet acquiescence in what happens at its proper time, and quietly submitting (to its sequence), afford no occasion for grief or for joy.\n\nThe ancients described (death) as the loosening of the cord on which God suspended (the life).\n\nWhat we can point to are the faggots that have been consumed; but the fire is transmitted elsewhere, and we know not that it is over and ended.' p.\n\n22 It is, however, in connexion with the death of his own wife, as related in the eighteenth Book, that his views most fully--I do not say 'clearly'--appear.\n\nWe are told that when that event took place, his friend Hui-dze went to condole with him, and found him squatted on the ground, drumming on the vessel (of ice), and singing.\n\nHis friend said to him, 'When a wife has lived with her husband, brought up children, and then dies in her old age, not to wail for her is enough.\n\nWhen you go on to drum on the vessel and sing, is it not an excessive (and strange) demonstration?' Kwang-dze replied, 'It is not so.\n\nWhen she first died, was it possible for me to be singular, and not affected by the event?\n\nBut I reflected on the commencement of her being, when she had not yet been born to life.\n\nNot only had she no life, but she had no bodily form.\n\nNot only had she no bodily form, but she had no breath.\n\nSuddenly in this chaotic condition there ensued a change, and there was breath; another change, and there was the bodily form; a further change, and she was born to life; a change now again, and she is dead.\n\nThe relation between those changes is like the procession of the four seasons,--spring, autumn, winter, and summer.\n\nThere she lies with her face up, sleeping in the Great Chamber 1 ; and if I were to fall sobbing and going on to wail for her, I should think I did not understand what was appointed for all.\n\nI therefore restrained myself.' The next paragraph of the same Book contains another story about two ancient men, both deformed, who, when looking at the graves on Kwän-lun, begin to feel in their own frames the symptoms of approaching dissolution.\n\nOne says to the other, 'Do you dread it?' and gets the reply, 'No.\n\nWhy should I dread it?\n\nLife is a borrowed thing.\n\nThe living frame thus borrowed is but so much dust.\n\nLife and death are like day and night.' In every birth, it would thus appear, there is, somehow, a repetition of what it is said, as we have seen, took place at 'the Grand Beginning of all things,' when out of the p.\n\n23 primal nothingness, the Tâo somehow appeared, and there was developed through its operation the world of things,--material things and the material body of man, which enshrines or enshrouds an immaterial spirit.\n\nThis returns to the Tâo that gave it, and may be regarded indeed as that Tâo operating in the body during the time of life, and in due time receives a new embodiment.\n\nIn these notions of Tâoism there was a preparation for the appreciation by its followers of the Buddhistic system when it came to be introduced into the country, and which forms a close connexion between the two at the present day, Tâoism itself constantly becoming less definite and influential on the minds of the Chinese people."

