[content]
body = "Where their utterances are like arrows from a bow, we have those who feel it their charge to pronounce what is right and what is wrong.; where they are given out like the conditions of a covenant, we have those who maintain their views, determined to overcome.\n\n(The weakness of their arguments), like the decay (of things) in autumn and winter, shows the failing (of the minds of some) from day to day; or it is like their water which, once voided, cannot be gathered up again.\n\nThen their ideas seem as if fast bound with cords, showing that the mind is become like an old and dry moat, and that it is nigh to death, and cannot be restored to vigour and brightness.\n\nJoy and anger, sadness and pleasure, anticipation and regret, fickleness and fixedness, vehemence and indolence, eagerness and tardiness;--(all these moods), like music from an empty tube, or mushrooms from the warm moisture, day and night succeed to one another and come before us, and we do not know whence they sprout.\n\nLet us stop!\n\nLet us stop!\n\nCan we expect to find out suddenly how they are produced?\n\nIf there were not (the views of) another, I should not have mine; if there were not I (with my views), his would be uncalled for:--this is nearly a true, statement of the case, but we do not know what it is that makes it be so.\n\nIt might seem as if there would be a true Governor 1 concerned in it, but we do not find p.\n\n180 any trace (of his presence and acting).\n\nThat such an One could act so I believe; but we do not see His form.\n\nHe has affections, but He has no form.\n\nGiven the body, with its hundred parts, its nine openings, and its six viscera, all complete in their places, which do I love the most?\n\nDo you love them all equally?\n\nor do you love some more than others?\n\nIs it not the case that they all perform the part of your servants and waiting women?\n\nAll of them being such, are they not incompetent to rule one another?\n\nor do they take it in turns to be now ruler and now servants?\n\nThere must be a true Ruler (among them) 1 whether by searching you can find out His character or not, there is neither advantage nor hurt, so far as the truth of His operation is concerned.\n\nWhen once we have received the bodily form complete, its parts do not fail to perform their functions till the end comes.\n\nIn conflict with things or in harmony with them, they pursue their course to the end, with the speed of a galloping horse which cannot be stopped;--is it not sad?\n\nTo be constantly toiling all one's lifetime, without seeing the fruit of one's labour, and to be weary and worn out with his labour, without knowing where he is going to:--is it not a deplorable case?\n\nMen may say, 'But it is not death;' yet of what advantage is this?\n\nWhen the body is decomposed, the mind will be the same along with it:--must not the case be pronounced very deplorable 2 ?\n\nIs the life p.\n\n181 of man indeed enveloped in such darkness?\n\nIs it I alone to whom it appears so?\n\nAnd does it not appear to be so to other men?\n\n3.\n\nIf we were to follow the judgments of the predetermined mind, who would be left alone and without a teacher 1 ?\n\nNot only would it be so with those who know the sequences (of knowledge and feeling) and make their own selection among them, but it would be so as well with the stupid and unthinking."

