[content]
body = "Khien seems to say that the worship of these spirits could be traced to Thai Kung, one of the principal ministers of kings Wän and Wû at the rise of the Kâu dynasty in the twelfth century B.\n\nC., and to whom in the list of Taoist writings in the Imperial Library of Han, no fewer than 237 phien are ascribed.\n\n42:1 See Mayers's C.\n\nR.\n\nManual, Part I, article 35.\n\n44:1 Called Khäng Hwang Miâo, 'Wall and Moat Temples,' Palladia of the city.\n\n44:2 See Dr.\n\nEitel's third edition of his 'Three Lectures on Buddhism,' pp.\n\n36-45 (Hongkong: Lane, Crawford & Co., 1884).\n\nThe edition of the Penal Code to which he refers is of 1879.\n\nNext: Chapter 1"

