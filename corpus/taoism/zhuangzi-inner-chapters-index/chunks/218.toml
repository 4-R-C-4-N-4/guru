[content]
body = "All things begin from nothing and end in nothing.\n\nTheir birth and their death are only the creations of our thought, the going and coming of the primary ether.\n\nWhen we have penetrated to the non-reality of life and death, what remains of the body of so many feet?' 247:3 The 'Creator' or 'Maker' ( ) is the Tâo.\n\n248:1 Compare this description of Dze-yü's deformity with that of the poor Shû, in IV, 8.\n\n248:2 Such is the submission to one's lot produced by the teaching of Tâoism.\n\n248:3 Compare the same phraseology in III, par.\n\n4, near the end.\n\nIn correcting Mr.\n\nBalfour's mistranslation of the text, Mr.\n\nGiles himself falls into a mistranslation through not observing that the p.\n\n249 is passive, having the that precedes as its subject (observe the force of the after in the best editions), and not active, or governing the that follows.\n\n249:1 Compare the account of the scene at Lâo-dze's death, in III, par.\n\n4.\n\n249:2 Here comes in the belief in transformation.\n\n249:3 The name of a famous sword, made for Ho-lü, the king of p.\n\n250 Wû (B.\n\nC.\n\n514-494).\n\nSee the account of the forging of it in the , ch.\n\n74.\n\nThe mention of it would seem to indicate that Dze-lâi and the other three men were of the time of Confucius.\n\n250:1 These three men were undoubtedly of the time of Confucius, and some would identify them with the Dze-sang Po-dze of Ana.\n\nVI, i, Mäng Kih-fan of VI, 13, and the Lâo of IX, vi, 4.\n\nThis is very unlikely.\n\nThey were Tâoists.\n\n250:2 Or, 'without end.' 250:3 Or, 'Some time went by silently, and.' 251:1 In accordance with the ancient and modern practice in China of calling the dead back.\n\nBut these were doing so in a song to the lute.\n\n251:2 Or, 'they do not regulate their doings (in the usual way).' 252:1 The idea that the body is composed of the elements of earth, wind or air, fire, and water.\n\n252:2 A strange description of himself by the sage.\n\nLiterally, 'I am (one of) the people killed and exposed to public view by Heaven;' referring, perhaps, to the description of a living man as 'suspended by a string from God.' Confucius was content to accept his life, and used it in pursuing the path of duty, according to his conception of it, without aiming at the transcendental method of the Tâoists.\n\nI can attach no other or better meaning to the expression.\n\n253:1 Misled by the text of Hsüang Ying, Mr.\n\nBalfour here reads instead of .\n\n253:2 Here, however, he aptly compares with the language of Christ in Matthew vii.\n\n28.--Kwang-dze seems to make Confucius praise the system of Tâoism as better than his own!\n\n253:3 Must have been a member of the Ming or Ming-sun family of Lû, to a branch of which Mencius belonged.\n\n254:1 The people set such store by the mourning rites, that Mäng-sun felt he must present the appearance of observing them.\n\nThis would seem to show that Tâoism arose after the earlier views of the Chinese.\n\n254:2 I adopt here, with many of the critics, the reading of instead of the more common .\n\n254:3 This is to me very obscure.\n\n254:4 Are such dreams possible?"

