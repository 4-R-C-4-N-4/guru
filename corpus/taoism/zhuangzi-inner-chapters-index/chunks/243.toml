[content]
body = "All my life I had been seeking for it, and now I have obtained it.' He then bowed twice, with his head to the ground, arose, took his leave, and walked away.\n\n6.\n\nThe ordinary men of the world 1 all rejoice in men's agreeing with themselves, and dislike men's being different from themselves.\n\nThis rejoicing and this dislike arise from their being bent on making themselves distinguished above all others.\n\nBut have they who have this object at heart so risen out above all others?\n\nThey depend on them to rest quietly (in the position which they desire), and their knowledge is not equal to the multitude of the arts of all those others 2 !\n\nWhen they wish again to administer a state for its ruler, they proceed to employ all the methods which the kings of the three dynasties considered profitable without seeing the evils of such a course.\n\nThis is to make the state depend on the peradventure of their luck.\n\nBut how seldom it is that that peradventure does not issue in the ruin of the state!\n\nNot once in ten thousand instances will such men preserve a state.\n\nNot once will they succeed, and in more than ten thousand cases will they p.\n\n304 ruin it.\n\nAlas that the possessors of territory,--(the rulers of states),--should not know the danger (of employing such men)!\n\nNow the possessors of territory possess the greatest of (all) things.\n\nPossessing the greatest of all things,--(possessing, that is, men),--they should not try to deal with them as (simply) things.\n\nAnd it is he who is not a thing (himself) that is therefore able to deal with (all) things as they severally require.\n\nWhen (a ruler) clearly understands that he who should so deal with all things is not a thing himself, will he only rule the kingdom?\n\nHe will go out and in throughout the universe (at his pleasure); he will roam over the nine regions 1 , alone in going, alone in coming.\n\nHim we call the sole possessor (of this ability); and the sole possessor (of this ability) is what is called the noblest of all.\n\nThe teaching of (this) great man goes forth as the shadow from the substance, as the echo responds to the sound.\n\nWhen questioned, he responds, exhausting (from his own stores) all that is in the (enquirer's) mind, as if front to front with all under heaven.\n\nHis resting-place gives forth no sound; his sphere of activity has no restriction of place.\n\nHe conducts every one to his proper goal, proceeding to it and bringing him back to it as by his own movement.\n\nHis movements have no trace; his going forth and his re-enterings have no deviation; his course is like that of the sun without beginning (or ending).\n\np.\n\n305 If you would praise or discourse about his personality, he is united with the great community of existences.\n\nHe belongs to that great community, and has no individual self.\n\nHaving no individual self, how should he have anything that can be called his?\n\nIf you look at those who have what they call their own, they are the superior men of former times; if you look at him who has nothing of the kind, he is the friend of heaven and earth.\n\n7.\n\nMean, and yet demanding to be allowed their free course;--such are Things.\n\nLow, and yet requiring to be relied on;--such are the People.\n\nHidden (as to their issues), and yet requiring to be done;--such are Affairs.\n\nCoarse, and yet necessary to be set forth;--such are Laws.\n\nRemote, and yet necessary to have dwelling (in one's self);--such is Righteousness.\n\nNear, and yet necessary to be widely extended;--such is Benevolence."

