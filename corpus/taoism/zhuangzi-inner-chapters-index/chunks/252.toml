body = "He would treat them as his juniors, belonging himself to the period of the original plastic ether 1 .\n\nHis wish would be that all should agree with the virtue (of that early period), and quietly rest in it.' 11.\n\nDze-kung had been rambling in the south in Khû, and was returning to Zin.\n\nAs he passed (a place) on the north of the Han, he saw an old man who was going to work on his vegetable garden.\n\nHe had dug his channels, gone to the well, and was bringing from it in his arms a jar of water to pour into them.\n\nToiling away, he expended a great deal p.\n\n320 of strength, but the result which he accomplished was very small.\n\nDze-kung said to him, 'There is a contrivance here, by means of which a hundred plots of ground may be irrigated in one day.\n\nWith the expenditure of a very little strength, the result accomplished is great.\n\nWould you, Master, not like (to try it)?' The gardener looked up at him, and said, 'How does it work?' Dze-kung said, 'It is a lever made of wood, heavy behind, and light in front.\n\nIt raises the water as quickly as you could do with your hand, or as it bubbles over from a boiler.\n\nIts name is a shadoof.' The gardener put on an angry look, laughed, and said, 'I have heard from my teacher that, where there are ingenious contrivances, there are sure to be subtle doings; and that, where there are subtle doings, there is sure to be a scheming mind.\n\nBut, when there is a scheming mind in the breast, its pure simplicity is impaired.\n\nWhen this pure simplicity is impaired, the spirit becomes unsettled, and the unsettled spirit is not the proper residence of the Tâo.\n\nIt is not that I do not know (the contrivance which you mention), but I should be ashamed to use it.' (At these words) Dze-kung looked blank and ashamed; he hung down his head, and made no reply.\n\nAfter an interval, the gardener said to him, 'Who are you, Sir?\n\nA disciple of Khung Khiû,' was the reply.\n\nThe other continued, 'Are you not the scholar whose great learning makes you comparable to a sage, who make it your boast that you surpass all others, who sing melancholy ditties all by yourself, thus purchasing a famous reputation throughout the kingdom?\n\nIf you would (only) forget the energy of your spirit, and neglect the care of p.\n\n321 your body, you might approximate (to the Tâo).\n\nBut while you cannot regulate yourself, what leisure have you to be regulating the world?\n\nGo on your way, Sir, and do not interrupt my work.' Sze-kung shrunk back abashed, and turned pale.\n\nHe was perturbed, and lost his self-possession, nor did he recover it, till he had walked a distance of thirty lî.\n\nHis disciples then said, 'Who was that man?\n\nWhy, Master, when you saw him, did you change your bearing, and become pale, so that you have been all day without returning to yourself?' He replied to them,' Formerly I thought that there was but one man 1 in the world, and did not know that there was this man.\n\nI have heard the Master say that to seek for the means of conducting his undertakings so that his success in carrying them out may be complete, and how by the employment of a little strength great results may be obtained, is the way of the sage.\n\nNow (I perceive that) it is not so at all.\n\nThey who hold fast and cleave to the Tâo are complete in the qualities belonging to it."

