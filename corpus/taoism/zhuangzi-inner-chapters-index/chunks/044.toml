[content]
body = "Those manifestoes are published by the mercy of Yü Hwang Shang Tî that men and women may be led to repent of their faults and make atonement for their crimes.\n\nThey emanate from the temples of the tutelary deities 1 which are found throughout the empire, and especially in the walled cities, and are under the charge of Tâoist monks.\n\nA visitor to one of the larger of these temples may not only see the pictures of the purgatorial courts and other forms of the modern superstitions, but he will find also astrologers, diviners, geomancers, physiognomists, et id genus omne, plying their trades or waiting to be asked to do so, and he will wonder how it has been possible to affiliate such things with the teachings of Lâo-dze.\n\nOther manifestoes of a milder form, and more like our tractate, are also continually being issued as from one or other of what are called the state gods, whose temples are all in the charge of the same monks.\n\nIn the approximation which has thus been going on of Tâoism to Buddhism, the requirement of celibacy was long resisted by the professors of the former; but recent editions of the Penal Code 2 contain sundry regulations framed to enforce celibacy, to bind the monks and nuns of both systems to the observance of the Confucian maxims concerning filial piety, and the sacrificial worship of the dead; and also to restrict the multiplication of monasteries and nunneries.\n\nNeither Lâo nor Kwang was a celibate or recommended celibacy.\n\nThe present patriarch, as a married man, would seem to be able still to resist the law.\n\nFootnotes 39:1 Notes on Chinese Literature, p.\n\n179.\n\n40:1 See 'Le Livre des Récompense et des Peines en Chinois et en François' (London, 1835).\n\n40:2 The designation of Lao-dze as Thâi Shang Lâo Kün originated probably in the Thang dynasty.\n\nIt is on record that in 666 Kao Zung, the third emperor, went to Lâo-dze's temple at Po Kâu (the place of Lao's birth, and still called by the same name, in the department of Fäng-yang in An-hui), and conferred on him the title of Thâi Shang Yüan Yüan Hwang Tî, 'The Great God, the Mysterious Originator, the Most High.' 'Then,' says Mayers, Manual, p.\n\n113, 'for the first time he was ranked among the gods as \"Great Supreme, the Emperor (or Imperial God) of the Dark First Cause.\"' The whole entry is (or ) .\n\nLater on, in 1014, we find Kän Zung, the fourth Sung emperor, also visiting Po Kâu, and in Lao's temple, which has by this time become 'the Palace of Grand Purity,' enlarging his title to Thai Shang Lao Kün Hwun Yüan Shang Teh Hwang Tî,' The Most High, the Ruler Lao, the Great God of Grand Virtue at the Chaotic Origin.' But such titles are not easily translated.\n\n41:1 The eight spirits were:--1.\n\nThe Lord of Heaven; 2.\n\nThe Lord of Earth; 3.\n\nThe Lord of War; 4.\n\nThe Lord of the Yang operation; 5.\n\nThe Lord of the Yin operation; 6.\n\nThe Lord of the Moon; 7.\n\nThe Lord of the Sun; and 8.\n\nThe Lord of the Four Seasons.\n\nSee Mayers's C.\n\nR.\n\nManual, pp.\n\n327, 328.\n\nHis authority is the sixth of Sze-ma Khien's monographs."

