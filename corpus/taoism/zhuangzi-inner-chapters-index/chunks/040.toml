[content]
body = "It is interesting in itself, however, and I introduce it here: 'When Kwang-dze was about to die, his disciples signified their wish to give him a grand burial.\n\n\"I shall have heaven and earth,\" he said, \"for my coffin and its shell; the sun and moon for my two round symbols of jade; the stars and constellations for my pearls and jewels;--will not the provisions for my interment be complete?\n\nWhat would you add to them?\" The disciples replied, \"We are afraid that the crows and kites will eat our master.\" Kwang-dze rejoined, \"Above, the crows and kites will eat me; below, the mole-crickets and ants will eat me; to take from those and give to these would only show your partiality.\" Such were among the last words of Kwang-dze.\n\nHis end was not so impressive as that of Confucius; but it was in keeping with the general magniloquence and strong assertion of independence that marked all his course.\n\nFootnotes 34:1 Julien translates this by 'il erre à l'aventure.' In 1861 I rendered it, 'He moves as if his feet were entangled.' To one critic it suggests the idea of a bundle or wisp of brushwood rolled about over the ground by the wind.\n\n35:1 The characters may mean 'the old boy,' and so understood have given rise to various fabulous legends; that his mother had carried him in her womb for seventy-two years (some say, for eighty-one), and that when born the child had the white hair of an old man.\n\nJulien has translated the fabulous legend of Ko Hung of our fourth century about him.\n\nBy that time the legends of Buddhism about Sâkyamuni had become current in China, and were copied and applied to Lao-dze by his followers.\n\nLooking at the meaning of the two names, I am surprised no one has characterized Lao-dze as the Chinese Seneca.\n\n37:1 Khang-sang Dze is evidently the Käng-sang Khû of Kwang's Book XXIII.\n\nWei-lêi Hsü is supposed by Sze-ma Käng of the Thang dynasty, who called himself the Lesser Sze-mâ, to be the name of a Book; one, in that case, of the lost books of Kwang.\n\nBut as we find the 'Hill of Wei-lêi' mentioned in Bk.\n\nXXIII as the scene of Käng-sang Khû's Tâoistic labours and success, I suppose that Khien's reference is to that.\n\nThe names are quoted by him from memory, or might be insisted on as instances of different readings.\n\nNext: Chapter V: On the Tractate of Actions and their Retributions"

