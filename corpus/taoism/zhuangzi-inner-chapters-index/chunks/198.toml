body = "All men know the advantage of being useful, but no one knows the advantage of being useless.' Footnotes 203:1 See pp.\n\n131, 132.\n\n203:2 The favourite disciple of Confucius, styled also Dze-yüan.\n\n203:3 Of course, Confucius;--his designation or married name.\n\n203:4 A feudal state, embracing portions of the present provinces of Ho-nan, Kih-lî, and Shan-tung.\n\nThere was another state, which we must also call Wei in English, though the Chinese characters of them are different;--one of the fragments of the great state of Zin, more to the west.\n\n203:5 At this time the marquis Yüan, known to us by his posthumous title of duke Ling;--see Book XXV, 9.\n\n203:6 Adopting Lin's reading of instead of the common .\n\n204:1 Compare in the Analects, VIII, xiii, 2, where a different lesson is given; but Confucius may at another time have spoken as Hui says.\n\n205:1 The tyrant with whom the dynasty of Hsiâ ended.\n\n205:2 A worthy minister of Kieh.\n\n205:3 The tyrant with whom the dynasty of Shang or Yin ended.\n\n205:4 A half-brother of Kâu, the tyrant of the Yin dynasty.\n\n206:1 See in par.\n\n7, Book II, where Hsü-âo is mentioned, though not Zhung-kih.\n\nSee the Shû, III, ii.\n\n206:2 I take here as = ;--a meaning given in the Khang-hsî dictionary.\n\n207:1 Entirely unsophisticated, governed by the Tâo.\n\n207:2 See the Lî Kî, XI, ii, 16, 11.\n\n208:1 The term is emphatic, as Confucius goes on to explain.\n\n208:2 Such as onions and garlic, with horse, dog, cow, goose, and pigeon.\n\n209:1 The character in the text for 'spirit' here is , 'the breath.' 209:2 The Tâo.\n\n209:3 'Said;' probably, after having made trial of this fasting.\n\n210:1 Often spoken of as Fo-hî, the founder of the Chinese kingdom.\n\nHis place in chronology should be assigned to him more than B.C.\n\n3000 rather than under that date.\n\n210:2 A predecessor of Fû-hsî, a sovereign of the ancient paradisiacal time.\n\n210:3 The name of Sheh remains in Sheh-hsien, a district of the department Nan-yang, Ho-nan.\n\nIts governor, who is the subject of this narrative, was a Shän Kû-liang, styled dze-kâo.\n\nHe was p.\n\n211 not a duke, but as the counts of Khû had usurped the name of king, they gave high-sounding names to all their ministers and officers.\n\n211:1 Or, 'according to the Tâo.' 211:2 As a criminal; punished by his sovereign.\n\n211:3 Anxiety 'night and day,' or 'cold and hot' fits of trouble;--a peculiar usage of Yin Yang.\n\n212:1 The Ming of the text here is that in the first sentence of the Kung Yung.\n\n213:1 Probably a Collection of Directions current at the time; and which led to the name of Yang Hsiung's Treatise with the same name in our first century.\n\n213:2 See the Shih, II, vii, 6.\n\n214:1 See above, on preceding page."

