[content]
body = "Dze-sze 1 , Dze-yü 1 , Dze-1î 1 , and Dze-lâi 1 , these four men, were talking together, when some one said, 'Who can suppose the head to be made from nothing, the spine from life, and the rump-bone from death?\n\nWho knows how death and birth, living on and disappearing, compose the one body?--I would be friends with him 2 .' The four men looked at one another and laughed, but no one seized with his mind the drift of the questions.\n\nAll, however, were friends together.\n\nNot long after Dze-yü fell ill, and Dze-sze went to inquire for him.\n\n'How great,' said (the sufferer), 'is the Creator 3 !\n\nThat He should have made me the deformed object that I am!' He was a crooked hunchback; his five viscera were squeezed into the p.\n\n248 upper part of his body; his chin bent over his navel; his shoulder was higher than his crown; on his crown was an ulcer pointing to the sky; his breath came and went in gasps 1 :--yet he was easy in his mind, and made no trouble of his condition.\n\nHe limped to a well, looked at himself in it, and said, 'Alas that the Creator should have made me the deformed object that I am!' Dze said, 'Do you dislike your condition?' He replied, 'No, why should I dislike it?\n\nIf He were to transform my left arm into a cock, I should be watching with it the time of the night; if He were to transform my right arm into a cross-bow, I should then be looking for a hsiâo to (bring down and) roast; if He were to transform my rump-bone into a wheel, and my spirit into a horse, I should then be mounting it, and would not change it for another steed.\n\nMoreover, when we have got (what we are to do), there is the time (of life) in which to do it; when we lose that (at death), submission (is what is required).\n\nWhen we rest in what the time requires, and manifest that submission, neither joy nor sorrow can find entrance (to the mind) 2 .\n\nThis would be what the ancients called loosing the cord by which (the life) is suspended.\n\nBut one hung up cannot loose himself;--he is held fast by his bonds 3 .\n\nAnd that creatures cannot overcome p.\n\n249 Heaven (the inevitable) is a long-acknowledged fact;-why should I hate my condition?' 10.\n\nBefore long Dze-lâi fell ill, and lay gasping at the point of death, while his wife and children stood around him wailing 1 .\n\nDze-lî went to ask for him, and said to them, 'Hush!\n\nGet out of the way!\n\nDo not disturb him as he is passing through his change.' Then, leaning against the door, he said (to the dying man), 'Great indeed is the Creator!\n\nWhat will He now make you to become?\n\nWhere will He take you to?\n\nWill He make you the liver of a rat, or the arm of an insect 2 ?\n\nDze-lâi replied, 'Wherever a parent tells a son to go, east, west, south, or north, he simply follows the command.\n\nThe Yin and Yang are more to a man than his parents are.\n\nIf they are hastening my death, and I do not quietly submit to them, I shall be obstinate and rebellious."

