[content]
body = "201:1 Then the account that Lâo-dze went westwards, and that nothing is known as to where he died, must be without foundation.\n\n201:2 Nothing more is known of this person.\n\n201:3 Probably the disciples of Lâo-dze.\n\n201:4 Lâo had gone to an excess in his 'doing good,' as if he were seeking reputation.\n\n201:5 Into the world.\n\n201:6 See Kwang-dze's remarks and demeanour on the death of his wife, in Book XVIII.\n\n202:1 This short sentence is remarkable by the use of the character Tî ( ) 'God,' in it, a usage here ascribed to the ancients.\n\n202:2 The concluding sentence might stand as a short paragraph by itself.\n\nThe 'faggots' are understood to represent the body, and the 'fire' the animating spirit.\n\nThe body perishes at death as the faggots are consumed by the fire.\n\nBut the fire may be transmitted to other faggots, and so the spirit may migrate, and be existing elsewhere.\n\nNext: Book IV: Zän Kien Shih, or 'Man in the World, Associated with other Men'"

