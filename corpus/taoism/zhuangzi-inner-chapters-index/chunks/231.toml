[content]
body = "277:2 But the weaver's or agriculturist's art has no more title to be called primitive than the potter's or carpenter's.\n\n277:3 A difficult expression; but the translation, probably, gives its p.\n\n278 true significance.\n\n'Heaven' here is synonymous with 'the Tâo;' but its use shows how readily the minds, even of Lâo and Kwang, had recourse to the earliest term by which the Chinese fathers had expressed their recognition of a Supreme and Controlling Power and Government.\n\n279:1 An ancient sovereign; but nothing more definite can be said about him.\n\nMost of the critics identify him with Shän-näng, the p.\n\n280 Father of Husbandry, who occupies the place in chronological tables after Fû-hsî, between him and Hwang-Tî.\n\nIn the Tables of the Dynastic Histories, published in 817, he is placed seventh in the list of fifteen reigns, which are placed without any specification of their length between Fû-hsî and Shän-näng.\n\nThe name is written as and .\n\nNext: Book X: Khü Khieh, or 'Cutting open Satchels.'"

