[content]
body = "Between these there are fourteen other Treatises, mostly short, five of them being among Mr.\n\nBalfour's 'Tâoist Texts.' The Collection was edited by a Lû Yü; and the Commentary selected by him, in all but the last Treatise, was by a Lî Hsî-yüeh, who appears to have been a recluse in a monastery on a mountain in the department of Pâo-ning, Sze-khwan, if, indeed, what is said of him be not entirely fabulous.\n\nSixth, the Commentary on the Tâo Teh King, by Wû Khäng (A.D.\n\n1249-1333) of Lin Khwan.\n\nThis has been of the highest service to me.\n\nWû Khäng was the greatest of the Yüan scholars.\n\nHe is one of the Literati quoted from occasionally by Ziâo Hung in his 'Wings;' but by no means so extensively as Julien supposes (Observations Détachées, p.\n\nxli).\n\nMy own copy of his work is in the 12th Section of the large Collection of the 'Yüeh-yâ Hall,' published in 1853.\n\nWriting of Wû Khäng in 1865 (Proleg.\n\nto the Shû, p.\n\n36), I said that he was 'a bold thinker and a daring critic, handling his text with a freedom which I had not seen in any other Chinese scholar.' The subsequent study of his writings has confirmed me in this opinion of him.\n\nPerhaps he might be characterised as an independent, rather than as a bold, thinker, and the daring p.\n\nxviii of his criticism must not be supposed to be without caution.\n\n(See Introd., p.\n\n9.) The Writings of Kwang-dze have been studied by foreigners still less than the Treatise of Lâo-dze.\n\nWhen I undertook in 1879 to translate them, no version of them had been published.\n\nIn 1881, however, there appeared at Shanghai Mr.\n\nBalfour's 'The Divine Classic of Nan-hua (Introd., pp.\n\n11, 12), being the Works of Chuang Tsze, Tâoist Philosopher.' It was a 'bold' undertaking in Mr.\n\nBalfour thus to commence his translations of Chinese Books with one of the most difficult of them.\n\nI fancy that he was himself convinced of this, and that his undertaking had been 'too bold,' by the criticism to which his work was subjected in the China Review by Mr.\n\nGiles.\n\nNevertheless, it was no small achievement to be the first to endeavour to lift up the veil from Kwang-dze.\n\nEven a first translation, though imperfect, is not without benefit to others who come after, and are able to do better.\n\nIn preparing the draft of my own version, which draft was finished in April, 1887, I made frequent reference to the volume of Mr.\n\nBalfour.\n\nHaving exposed the errors of Mr.\n\nBalfour, Mr.\n\nGiles proceeded to make a version of his own, which was published last year in London, with the title of 'CHUANG TZU, Mystic, Moralist, and Social Reformer.' It was not, however, till I was well through with the revision of my draft version, that I supplied myself with a copy of his volume.\n\nI did not doubt that Mr.\n\nGiles's translation would be well and tersely done, and I preferred to do my own work independently and without the help which he would have afforded me.\n\nIn carrying my sheets through the press, I have often paused over my rendering of a passage to compare it with his; and I have pleasure in acknowledging the merits of his version.\n\nThe careful and competent reader will see and form his own judgment on passages and points where we differ."

