body = "Sacred Texts Taoism Index Previous Next CHAPTER IV.\n\nACCOUNTS OF LÂO-DZE AND KWANG-DZE GIVEN BY SZE-MÂ KHIEN.\n\nIt seems desirable, before passing from Lâo, and Kwang in this Introduction, to give a place in it to what is said about them by Sze-mâ Khien.\n\nI have said that not a single proper name occurs in the Tâo Teh King.\n\nThere is hardly an historical allusion in it.\n\nOnly one chapter, the twentieth, has somewhat of an autobiographical character.\n\nIt tells us, however, of no incidents of his life.\n\nHe appears alone in the world through his cultivation of the Tâo, melancholy and misunderstood, yet binding that Tâo more closely to his bosom.\n\nThe Books of Kwang-dze are of a different nature, abounding in pictures of Tâoist life, in anecdotes and narratives, graphic, argumentative, often satirical.\n\nBut they are not historical.\n\nConfucius and many of his disciples, Lâo and members of his school, heroes and sages of antiquity, and men of his own day, move across his pages; but the incidents in connexion with which they are introduced are probably fictitious, and devised by him 'to point his moral or adorn his tale.' His names of individuals and places are often like those of Bunyan in his Pilgrim's Progress or his Holy War, emblematic of their characters and the doctrines which he employs p.\n\n34 them to illustrate.\n\nHe often comes on the stage himself, and there is an air of verisimilitude in his descriptions, possibly also a certain amount of fact about them; but we cannot appeal to them as historical testimony.\n\nIt is only to Sze-mâ Khien that we can go for this; he always writes in the spirit of an historian; but what he has to tell us of the two men is not much.\n\nAnd first, as to his account of Lâo-dze.\n\nWhen he wrote, about the beginning of the first century B.C., the Tâoist master was already known as Lâo-dze.\n\nKhien, however, tells us that his surname was Lî, and his name R , meaning 'Ear,' which gave place after his death to Tan, meaning 'Long-eared,' from which we may conclude that he was named from some peculiarity in the form of his ears.\n\nHe was a native of the state of Khû, which had then extended far beyond its original limits, and his birth-place was in the present province of Ho-nan or of An-hui.\n\nHe was a curator in the Royal Library; and when Confucius visited the capital in the year B.C.\n\n517, the two men met.\n\nKhien says that Confucius's visit to Lo-yang was that he might question Lâo on the subject of ceremonies.\n\nHe might have other objects in mind as well; but however that was, the two met.\n\nLî said to Khung, 'The men about whom you talk are dead, and their bones are mouldered to dust; only their words are left.\n\nMoreover, when the superior man gets his opportunity, he mounts aloft; but when the time is against him, he is carried along by the force of circumstances 1 .\n\nI have heard that a good merchant, though he have rich treasures safely stored, appears as if he were poor; and that the superior man, though his virtue be complete, is yet to outward seeming stupid.\n\nPut away your proud air and many desires, your insinuating habit and wild will.\n\nThey are of no advantage to you;--this is all I have to tell you.' Confucius is made to say to his disciples after the interview: 'I know how p.\n\n35 birds can fly, fishes swim, and animals run."

