[content]
body = "complete in those qualities, they are complete in their bodies.\n\nComplete in their bodies, they are complete in their spirits.\n\nTo be complete in spirit is the way of the sage.\n\n(Such men) live in the world in closest union with the people, going along with them, but they do not know where they are going.\n\nVast and complete is their simplicity!\n\nSuccess, gain, and ingenious contrivances, and artful cleverness, indicate (in their opinion) a forgetfulness of the (proper) mind of man.\n\nThese men will not go where their mind does not carry them, and will do p.\n\n322 nothing of which their mind does not approve.\n\nThough all the world should praise them, they would (only) get what they think should be loftily disregarded; and though all the world should blame them, they would but lose (what they think) fortuitous and not to be received;-the world's blame and praise can do them neither benefit nor injury.\n\nSuch men may be described as possessing all the attributes (of the Tâo), while I can only be called one of those who are like the waves carried about by the wind.' When he returned to Lû, (Dze-kung) reported the interview and conversation to Confucius, who said, 'The man makes a pretence of cultivating the arts of the Embryonic Age 1 .\n\nHe knows the first thing, but not the sequel to it.\n\nHe regulates what is internal in himself, but not what is external to himself.\n\nIf he had intelligence enough to be entirely unsophisticated, and by doing nothing to seek to return to the normal simplicity, embodying (the instincts of) his nature, and keeping his spirit (as it were) in his arms, so enjoying himself in the common ways, you might then indeed be afraid of him!\n\nBut what should you and I find in the arts of the embryonic time, worth our knowing?' 12.\n\nKun Mang 2 , on his way to the ocean, met with Yüan Fung 2 on the shore of the eastern sea, and p.\n\n323 was asked by him where he was going.\n\n'I am going,' he replied, 'to the ocean;' and the other again asked, 'What for?' Kun Mâng said, 'Such is the nature of the ocean that the waters which flow into it can never fill it, nor those which flow from it exhaust it.\n\nI will enjoy myself, rambling by it.' Yüan Fung replied, 'Have you no thoughts about mankind 1 ?\n\nI should like to hear from you about sagely government.' Kun Mâng said,' Under the government of sages, all offices are distributed according to the fitness of their nature; all appointments are made according to the ability of the men; whatever is done is after a complete survey of all circumstances; actions and words proceed from the inner impulse, and the whole world is transformed.\n\nWherever their hands are pointed and their looks directed, from all quarters the people are all sure to come (to do what they desire):--this is what is called government by sages.' 'I should like to hear about (the government of) the kindly, virtuous men 2 ,' (continued Yüan Fung).\n\nThe reply was, 'Under the government of the virtuous, when quietly occupying (their place), they have no thought, and, when they act, they have no anxiety; they do not keep stored (in their minds) what is right and what is wrong, what is good and p.\n\n324 what is bad.\n\nThey share their benefits among all within the four seas, and this produces what is called (the state of) satisfaction; they dispense their gifts to all, and this produces what is called (the state of) rest."

