[content]
body = "Ask the other, and you will find that she was amusing herself with some game 2 .\n\nThey were differently occupied, but they equally lose their sheep.\n\n(So), Po-î 3 died at the foot of Shâu-yang 4 to maintain his fame, and the robber Kih 5 died on the top of Tung-ling 6 in his eagerness for gain.\n\nTheir deaths were occasioned by different causes, but they equally shortened their lives and did violence to their nature;--why must we approve of Po-î, and condemn the robber Kih?\n\nIn cases of such sacrifice all over the world, when one makes it for the sake of benevolence and righteousness, the common people style him 'a superior man,' but when another does it for the sake of goods and riches, they style him 'a small man.' The action of sacrificing is the same, and yet we have 'the superior man' and 'the small man!' In the matter of destroying his life, and doing injury to his nature, the robber Kih simply did the same as Po-î;-why must we make the distinction of 'superior man' and 'small man' between them?\n\np.\n\n274 5.\n\nMoreover, those who devote their nature to (the pursuit) of benevolence and righteousness, though they should attain to be like Zäng (Shän) and Shih (Zhiû), I do not pronounce to be good; those who devote it to (the study of) the five flavours, though they attain to be like Shû- r 1 , I do not pronounce to be good; those who devote it to the (discrimination of the) five notes, though they attain to be like Shih Khwang, I do not pronounce to be quick of hearing; those who devote it to the (appreciation of the) five colours, though they attain to be like Lî Kû, I do not pronounce to be clear of vision.\n\nWhen I pronounce men to be good, I am not speaking of their benevolence and righteousness;--the goodness is simply (their possession of) the qualities (of the Tâo).\n\nWhen I pronounce them to be good, I am not speaking of what are called benevolence and righteousness; but simply of their allowing the nature with which they are endowed to have its free course.\n\nWhen I pronounce men to be quick of hearing, I do not mean that they hearken to anything else, but that they hearken to themselves; when I pronounce them to be clear of vision, I do not mean that they look to anything else, but that they look to themselves.\n\nNow those who do not see themselves but see other things, who do not get possession of themselves but get possession of other things, get possession of what belongs to others, and not of what is their own; and they reach forth to what attracts others, and not to that in themselves which should attract them.\n\nBut p.\n\n275 thus reaching forth to what attracts others and not to what should attract them in themselves, be they like the robber Kih or like Po-î, they equally err in the way of excess or of perversity.\n\nWhat I am ashamed of is erring in the characteristics of the Tâo, and therefore, in the higher sphere, I do not dare to insist on the practice of benevolence and righteousness, and, in the lower, I do not dare to allow myself either in the exercise of excess or perversity.\n\nFootnotes 268:1 See pp.\n\n138 , 139 .\n\n268:2 Come out from the nature,' but 'nature' must be taken here as in the translation.\n\nThe character is not Tâo.\n\n268:3 The five viscera are the heart, the liver, the stomach, the lungs, and the kidneys."

