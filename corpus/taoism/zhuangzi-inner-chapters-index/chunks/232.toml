body = "Sacred Texts Taoism Index Previous Next p.\n\n281 BOOK X.\n\nPART II.\n\nSECTION III.\n\nKhü Khieh, or 'Cutting open Satchels 1 .' 1.\n\nIn taking precautions against thieves who cut open satchels, search bags, and break open boxes, people are sure to cord and fasten them well, and to employ strong bonds and clasps; and in this they are ordinarily said to show their wisdom.\n\nWhen a great thief comes, however, he shoulders the box, lifts up the satchel, carries off the bag, and runs away with them, afraid only that the cords, bonds, and clasps may not be secure; and in this case what was called the wisdom (of the owners) proves to be nothing but a collecting of the things for the great thief.\n\nLet me try and set this matter forth.\n\nDo not those who are vulgarly called wise prove to be collectors for the great thieves?\n\nAnd do not those who are called sages prove to be but guardians in the interest of the great thieves?\n\nHow do I know that the case is so?\n\nFormerly, in the state of Khî, the neighbouring towns could see one another; their cocks and dogs never ceased to answer the crowing and barking of other cocks and dogs (between them).\n\nThe nets were set (in the water and on the land); and the ploughs and hoes were employed over more than a space of two thousand lî square.\n\nAll within its four boundaries, the p.\n\n282 establishment of the ancestral temples and of the altars of the land and grain, and the ordering of the hamlets and houses, and of every corner in the districts, large, medium, and small, were in all particulars according to the rules of the sages 1 .\n\nSo it was; but yet one morning, Thien Khäng-dze 2 killed the ruler of Khî, and stole his state.\n\nAnd was it only the state that he stole?\n\nAlong with it he stole also the regulations of the sages and wise men (observed in it).\n\nAnd so, though he got the name of being a thief and a robber, yet he himself continued to live as securely as Yâo and Shun had done.\n\nSmall states did not dare to find fault with him; great states did not dare to take him off; for twelve generations (his descendants) have possessed the state of Khî 3 .\n\nThus do we not have a case in which not only did (the party) steal the state of Khî, p.\n\n283 but at the same time the regulations of its sages and wise men, which thereby served to guard the person of him, thief and robber as he was?\n\n2.\n\nLet me try to set forth this subject (still further).\n\nHave not there been among those vulgarly styled the wisest, such as have collected (their wealth) for the great chief?\n\nand among those styled the most sage such as have guarded it for him?\n\nHow do I know that it has been so?\n\nFormerly, Lung-fäng 1 was beheaded; Pî-kan 2 had his heart torn out; Khang Hung 3 was ripped open; and Dze-hsü 4 was reduced to pulp (in the Kiang).\n\nWorthy as those four men were, they did not escape such dreadful deaths.\n\nThe followers of the robber Kih 5 asked him, saying, 'Has the robber also any method or principle (in his proceedings)?' He replied, 'What profession is there which has not its principles?"

