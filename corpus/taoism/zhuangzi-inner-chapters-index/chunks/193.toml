[content]
body = "I have heard of the knowledge of the wise; I have not heard of the knowledge of the unwise.\n\nLook at that aperture (left in the wall);--the empty apartment is filled with light through it.\n\nFelicitous influences rest (in the mind thus emblemed), as in their proper resting place.\n\nEven when they do not so rest, we have what is called (the body) seated and (the mind) galloping abroad.\n\nThe information that comes through the ears and eyes is comprehended internally, and the knowledge of the mind becomes something external:--(when this is the case), the spiritual intelligences will come, and take up their dwelling with us, and how much more will other men do so!\n\nAll things thus undergo a transforming influence.\n\nThis was the hinge on which Yü and Shun moved; it was this which Fû-hsî 1 and Kî-khü 2 practised all their lives: how much more should other men follow the same rule!' 3.\n\nDze-kâo 3 , duke of Sheh, being about to proceed on a mission to Khî, asked Kung-nî, saying, 'The king is sending me, Kû-liang 3 , on a mission which p.\n\n211 is very important.\n\nKhî will probably treat me as his commissioner with great respect, but it will not be in a hurry (to attend to the business).\n\nEven an ordinary man cannot be readily moved (to action), and how much less the prince of a state!\n\nI am very full of apprehension.\n\nYou, Sir, once said to me that of all things, great or small, there were few which, if not conducted in the proper way 1 , could be brought to a happy conclusion; that, if the thing were not successful, there was sure to be the evil of being dealt with after the manner of men 2 ; that, if it were successful, there was sure to be the evil of constant anxiety 3 ; and that, whether it succeeded or not, it was only the virtuous man who could secure its not being followed by evil.\n\nIn my diet I take what is coarse, and do not seek delicacies,--a man whose cookery does not require him to be using cooling, drinks.\n\nThis morning I received my charge, and in the evening I am drinking iced water;--am I not feeling the internal heat (and discomfort)?\n\nSuch is my state before I have actually engaged in the affair;--I am already suffering from conflicting anxieties.\n\nAnd if the thing do not succeed, (the king) is sure to deal with me after the manner of men.\n\nThe evil is twofold; as a minister, I am not able to bear the burden (of the mission).\n\nCan p.\n\n212 you, Sir, tell me something (to help me in the case)?' Kung-nî replied, 'In all things under heaven there are two great cautionary considerations:--the one is the requirement implanted (in the nature) 1 ; the other is the conviction of what is right.\n\nThe love of a son for his parents is the implanted requirement, and can never be separated from his heart; the service of his ruler by a minister is what is right, and from its obligation there is no escaping anywhere between heaven and earth.\n\nThese are what are called the great cautionary considerations.\n\nTherefore a son finds his rest in serving his parents without reference to or choice of place; and this is the height of filial duty.\n\nIn the same way a subject finds his rest in serving his ruler, without reference to or choice of the business; and this is the fullest discharge of loyalty.\n\nWhen men are simply obeying (the dictates of) their hearts, the considerations of grief and joy are not readily set before them."

