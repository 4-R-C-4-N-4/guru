body = "Sacred Texts Taoism Index Previous Next 72.\n\n72.\n\n1.\n\nWhen the people do not fear what they ought to fear, that which is their great dread will come on them.\n\n2.\n\nLet them not thoughtlessly indulge themselves in their ordinary life; let them not act as if weary of what that life depends on.\n\n3.\n\nIt is by avoiding such indulgence that such weariness does not arise.\n\n4.\n\nTherefore the sage knows (these things) of himself, but does not parade (his knowledge); loves, but does not (appear to set a) value on, himself.\n\nAnd thus he puts the latter alternative away and makes choice of the former.\n\n, 'Loving one's Self,' This title is taken from the expression in par.\n\n4; and the object of the chapter seems to be to show how such loving should be manifested, and to enforce the lesson by the example of the 'sage,' the true master of the Tâo.\n\nIn par.\n\n1 'the great dread' is death, and the things which ought to be feared and may be feared, are the indulgences of the appetites and passions, which, if not eschewed, tend to shorten life and accelerate the approach of death.\n\nPars.\n\n2 and 3 are supplementary to 1.\n\nFor , the second character of Ho-shang Kung's text in par.\n\n2, Wang Pî reads , which has the same name as the other; and according to the Khang-hsî dictionary, the two characters are interchangeable.\n\nI have also followed Wû Khäng in adopting for the former of the two in par.\n\n3.\n\nWû adopted this reading from a commentator Liû of Lü-ling.\n\nIt gives a good meaning, and is supported by the structure of other sentences made on similar lines.\n\np.\n\n115 In par.\n\n4 'the sage' must be 'the ruler who is a sage,' a master of the Tâo, 'the king' of ch.\n\n25.\n\nHe 'loves himself,' i.\n\ne.\n\nhis life, and takes the right measures to prolong his life, but without any demonstration that he is doing so.\n\nThe above is, I conceive, the correct explanation of the chapter; but as to the Chinese critics and foreign translators of it, it may be said, 'Quot homines, tot sententiae.' In illustration of this I venture to subjoin what is found on it in the old version of the Jesuit missionaries, which has not been previously printed:-- Prima explicatio juxta interpretes.\n\n1.\n\nPopulus, ubi jam principis iram non timet, nihil non audet ut jugum excutiat, resque communis ad extremum discrimen adducitur.\n\n2.\n\nAmbitio principis non faciat terram angustiorem, et vectigalium magnitudine alendo populo insufficientem; numquam populus patriae pertaesus alias terras quaeret.\n\n3.\n\nVitae si non taedet, neque patrii soli taedebit.\n\n4.\n\nQuare sanctus sibi semper attentus potentiam suam non ostentat.\n\n5.\n\nQuia vere se amat, non se pretiosum facit; vel quia sibi recte consulit non se talem aestimat cujus felicitati et honori infelices populi unice servire debeant, immo potius eum se reputat qui populorum felicitati totum se debeat impendere.\n\n6.\n\nErgo illud resecat, istud amplectitur.\n\nAlia explicatio.\n\n1.\n\nPopulus si non ita timet principis majestatem, sed facile ad cum accedit, majestas non minuitur, immo ad summum pervenit.\n\n2."

