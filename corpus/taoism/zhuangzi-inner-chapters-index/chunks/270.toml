[content]
body = "Hence the shades of the dead kept in their obscurity; the sun and moon, and all the stars of the zodiac, pursued their several courses.\n\nI made (my instruments) leave off, when (the performance) came to an end, and their (echoes) flowed on without stopping.\n\nYou thought anxiously about it, and were not able to understand it; you looked for it, and were not able to see it; you pursued it, and were not able to reach it.\n\nAll amazed, you stood in the way all open around you, and then you leant against an old rotten dryandra tree and hummed.\n\nThe power of your eyes was exhausted by what you wished to see; your strength failed in your desire to pursue it, while I myself could not reach it.\n\nYour body was but so much empty vacancy while you endeavoured to retain your self-possession 1 :--it was that endeavour which made you weary.\n\n'In the last part (of the performance), I employed notes which did not have that wearying effect.\n\nI blended them together as at the command of spontaneity.\n\nHence they came as if following one another in confusion, like a clump of plants springing from one root, or like the music of a forest produced by no visible form.\n\nThey spread themselves all around without leaving a trace (of their cause); and seemed to issue from deep obscurity where there was no sound.\n\nTheir movements came from nowhere; their home was in the deep darkness;-- p.\n\n351 conditions which some would call death, and some life; some, the fruit, and some, (merely) the flower.\n\nThose notes, moving and flowing on, separating and shifting, and not following any regular sounds, the world might well have doubts about them, and refer them to the judgment of a sage, for the sages understand the nature of this music, and judge in accordance with the prescribed (spontaneity).\n\nWhile the spring of that spontaneity has not been touched, and yet the regulators of the five notes are all prepared;--this is what is called the music of Heaven, delighting the mind without the use of words.\n\nHence it is said in the eulogy of the Lord of Piâo 1 , \"You listen for it, and do not hear its sound; you look for it, and do not perceive its form; it fills heaven and earth; it envelopes all within the universe.\" You wished to hear it, but could not take it in; and therefore you were perplexed.\n\n'I performed first the music calculated to awe; and you were frightened as if by a ghostly visitation, I followed it with that calculated to weary; and in your weariness you would have withdrawn.\n\nI concluded with that calculated to perplex; and in your perplexity you felt your stupidity.\n\nBut that stupidity is akin to the Tâo; you may with it convey the Tâo in your person, and have it (ever) with you.' 4.\n\nWhen Confucius was travelling in the west in Wei, Yen Yüan asked the music-master Kin 2 , saying, p.\n\n352 [paragraph continues] 'How is it, do you think, with the course of the Master?' The music-master replied, 'Alas!\n\nit is all over with your Master!' 'How so?' asked Yen Yüan; and the other said, 'Before the grass-dogs 1 are set forth (at the sacrifice), they are deposited in a box or basket, and wrapt up with elegantly embroidered cloths, while the representative of the dead and the officer of prayer prepare themselves by fasting to present them.\n\nAfter they have been set forth, however, passers-by trample on their heads and backs, and the grass-cutters take and burn them in cooking.\n\nThat is all they are good for."

