body = "Sacred Texts Taoism Index Previous Next CHAPTER V.\n\nON THE TRACTATE OF ACTIONS AND THEIR RETRIBUTIONS.\n\n1.\n\nThe contrast is great between the style of the Tâo Teh King and the Books of Kwang-dze and that of the Peculiar style and nature of the Kan Ying Phien.\n\nKan Ying Phien, a translation of which is now submitted as a specimen of the Texts of Tâoism.\n\nThe works of Lâo and Kwang stand alone in the literature of the system.\n\nWhat p.\n\n39 it was before Lâo cannot be ascertained, and in his chapters it comes before us not as a religion, but as a subject of philosophical speculation, together with some practical applications of it insisted on by Lâo himself.\n\nThe brilliant pages of Kwang-dze contain little more than his ingenious defence of his master's speculations, and an aggregate of illustrative narratives sparkling with the charms of his composition, but in themselves for the most part unbelievable, often grotesque and absurd.\n\nThis treatise, on the other hand, is more of what we understand by a sermon or popular tract.\n\nIt eschews all difficult discussion, and sets forth a variety of traits of character and actions which are good, and a still greater variety of others which are bad, exhorting to the cultivation and performance of the former, and warning against the latter.\n\nIt describes at the outset the machinery to secure the record of men's doings, and the infliction of the certain retribution, and concludes with insisting on the wisdom of repentance and reformation.\n\nAt the same time it does not carry its idea of retribution beyond death, but declares that if the reward or punishment is not completed in the present life, the remainder will be received by the posterity of the good-doer and of the offender.\n\nA place is given to the treatise among the Texts of Tâoism in 'The Sacred Books of the East,' because of its popularity in China.\n\n'The various editions of it,' as observed by Mr.\n\nWylie, 'are innumerable; it has appeared from time to time in almost every conceivable size, shape, and style of execution.\n\nMany commentaries have been written upon it, and it is frequently published with a collection of several hundred anecdotes, along with pictorial illustrations, to illustrate every paragraph seriatim.\n\nIt is deemed a great act of merit to aid by voluntary contribution towards the gratuitous distribution of this work 1 .' 2.\n\nThe author of the treatise is not known, but, as Mr.\n\nWylie also observes, it appears to have been written during The origin of the treatise.\n\nthe Sung dynasty.\n\nThe earliest mention of it which I have met with is in the continuation p.\n\n40 of Ma-twan Lin's encyclopedic work by Wang Khî, first published in 1586, the fourteenth year of the fourteenth emperor of the Ming dynasty.\n\nIn Wang's supplement to his predecessor's account of Tâoist works, the sixth notice is of 'a commentary on the Thâi Shang Kan Ying Phien by a Lî Khang-ling,' and immediately before it is a commentary on the short but well-known Yin Fû King by a Lû Tien, who lived 1042-1102.\n\nImmediately after it other works of the eleventh century are mentioned.\n\nTo that same century therefore we may reasonably refer the origin of the Kan Ying Phien.\n\nAs to the meaning of the title, the only difficulty is with the two commencing characters Thâi Shang.\n\nJulien left The meaning of the title."

