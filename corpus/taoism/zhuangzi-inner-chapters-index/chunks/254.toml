[content]
body = "(The people) grieve (on their death) like babies who have lost their mothers, and are perplexed like travellers who have lost their way.\n\nThey have a superabundance of wealth and all necessaries, and they know not whence it comes; they have a sufficiency of food and drink, and they know not from whom they get it:--such are the appearances (under the government) of the kindly and virtuous.' 'I should like to hear about (the government of) the spirit-like men,' (continued Yüan Fung once more).\n\nThe reply was, 'Men of the highest spirit-like qualities mount up on the light, and (the limitations of) the body vanish.\n\nThis we call being bright and ethereal.\n\nThey carry out to the utmost the powers with which they are endowed, and have not a single attribute unexhausted.\n\nTheir joy is that of heaven and earth, and all embarrassments of affairs melt away and disappear; all things return to their proper nature:--and this is what is called (the state of) chaotic obscurity 1 .' 13.\n\nMän Wû-kwei 2 and Khih-kang Man-khî 2 had been looking at the army of king Wû, when the latter said, 'It is because he was not born in the time of the Lord of Yü 3 , that therefore he is involved p.\n\n325 in this trouble (of war).' Män Wû-kwei replied, 'Was it when the kingdom was in good order, that the Lord of Yü governed it?\n\nor was it after it had become disordered that he governed it?' The other said, 'That the kingdom be in a condition of good order, is what (all) desire, and (in that case) what necessity would there be to say anything about the Lord of Yü?\n\nHe had medicine for sores; false hair for the bald; and healing for those who were ill:--he was like the filial son carrying in the medicine to cure his kind father, with every sign of distress in his countenance.\n\nA sage would be ashamed (of such a thing) 1 .\n\n'In the age of perfect virtue they attached no value to wisdom, nor employed men of ability.\n\nSuperiors were (but) as the higher branches of a tree; and the people were like the deer of the wild.\n\nThey were upright and correct, without knowing that to be so was Righteousness; they loved one another, without knowing that to do so was Benevolence; they were honest and leal-hearted, without knowing that it was Loyalty; they fulfilled their engagements, without knowing that to do so was Good Faith; in their simple movements they employed the services of one another, without thinking that they were conferring or receiving any gift.\n\nTherefore their actions left no trace, and there was no record of their affairs.' 14.\n\nThe filial son who does not flatter his father, p.\n\n326 and the loyal minister who does not fawn on his ruler, are the highest examples of a minister and a son.\n\nWhen a son assents to all that his father says, and approves of all that his father does, common opinion pronounces him an unworthy son; when a minister assents to all that his ruler says, and approves of all that his ruler does, common opinion pronounces him an unworthy minister.\n\nNor does any one reflect that this view is necessarily correct 1 .\n\nBut when common opinion (itself) affirms anything and men therefore assent to it, or counts anything good and men also approve of it, then it is not said that they are mere consenters and flatterers;--is common opinion then more authoritative than a father, or more to be honoured than a ruler?"

