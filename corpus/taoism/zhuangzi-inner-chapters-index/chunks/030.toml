[content]
body = "Its essence is surrounded with the deepest obscurity; its highest reach is in darkness and silence.\n\nThere is nothing to be seen, nothing to be heard.\n\nWhen it holds the spirit in its arms in stillness, then the bodily form will of itself become correct.\n\nYou must be still, you must be pure; not subjecting your body to toil, not agitating your vital force:--then you may live for long.\n\nWhen your eyes see nothing, your ears hear nothing, and your mind knows nothing, your spirit will keep your body, and the body will live long.\n\nWatch over what is within you; shut up the avenues that connect you with what is external;--much knowledge is pernicious.\n\nI will proceed with you to the summit of the Grand Brilliance, where we come to the bright and expanding (element); I will enter with you the gate of the dark and depressing element.\n\nThere heaven and earth have their Controllers; there the Yin and Yang have their Repositories.\n\nWatch over and keep your body, and all things will of themselves give it vigour.\n\nI maintain the (original) unity (of these elements).\n\nIn this way I have cultivated myself for 1200 years, and my bodily form knows no decay.' Add 1200 to 2679, and we obtain 3879 as the year B.C.\n\nof Kwang Khäng-dze's birth!\n\n6.\n\nLâo-dze describes some other and kindred results of cultivating the Tâo in terms which are sufficiently startling, Startling results of the Tâo.\n\nand which it is difficult to accept.\n\nIn his fiftieth chapter he says, 'He who is skilful in managing his life travels on land without having to shun rhinoceros or tiger, and enters a host without having to avoid buff coat or sharp weapon.\n\nThe rhinoceros finds no place in him into which to thrust its horn, nor the tiger a place in which to fix its claws, nor the weapon a place to admit its point.\n\nAnd for what reason?\n\nBecause there is in him no place of death.' To the same effect he says in his fifty-fifth chapter, 'He who has in himself abundantly the attributes (of the Tâo) is like an infant.\n\nPoisonous p.\n\n26 insects will not sting him; fierce beasts will not seize him; birds of prey will not strike him.' Such assertions startle us by their contrariety to our observation and experience, but so does most of the teaching of Tâoism.\n\nWhat can seem more absurd than the declaration that 'the Tâo does nothing, and so there is nothing that it does not do?' And yet this is one of the fundamental axioms of the system.\n\nThe thirty-seventh chapter, which enunciates it, goes on to say, 'If princes and kings were able to maintain (the Tâo), all things would of themselves be transformed by them.' This principle, if we can call it so, is generalised in the fortieth, one of the shortest chapters, and partly in rhyme:-- The movement of the Tâo By contraries proceeds; And weakness marks the course Of Tâo's mighty deeds.\n\nAll things under heaven sprang from it as existing (and named); that existence sprang from it as non-existent (and not named).' Ho-shang Kung, or whoever gave their names to the chapters of the Tâo Teh King, styles this fortieth chapter 'Dispensing with the use (of means).' If the wish to use means arise in the mind, the nature of the Tâo as 'the Nameless Simplicity' has been vitiated; and this nature is celebrated in lines like those just quoted 'Simplicity without a name Is free from all external aim."

