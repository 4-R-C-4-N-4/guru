[content]
body = "The Book which tells us of the death of Kwang-dze's wife concludes with a narrative about Lieh-dze and an old bleached skull 1 , and to this is appended a passage about the metamorphoses of things, ending with the statement that 'the panther produces the horse, and the horse the man, who then again enters into the great machinery (of evolution), from which all things come forth (at birth) and into which they re-enter (at death).' Such representations need not be characterised.\n\n5.\n\nKû Hsî, 'the prince of Literature,' described the main object of Tâoism to be 'the preservation of the breath of The Tâo as promotive of longevity.\n\nlife;' and Liû Mî, probably of our thirteenth century 2 , in his 'Dispassionate Comparison of the Three Religions,' declares that 'its chief achievement is the prolongation of longevity.' Such is the account of Tâoism ordinarily given by Confucian and Buddhist writers, but our authorities, Lâo and Kwang, hardly bear out this representation of it as true of their time.\n\nThere are chapters of the Tâo Teh King which p.\n\n24 presuppose a peculiar management of the breath, but the treatise is singularly free from anything to justify what Mr.\n\nBalfour well calls 'the antics of the Kung-fû, or system of mystic and recondite calisthenics 1 .' Lâo insists, however, on the Tâo as conducive to long life, and in Kwang-dze we have references to it as a discipline of longevity, though even he mentions rather with disapproval 'those who kept blowing and breathing with open mouth, inhaling and exhaling the breath, expelling the old and taking in new; passing their time like the (dormant) bear, and stretching and twisting (their necks) like birds.' He says that 'all this simply shows their desire for longevity, and is what the scholars who manage the breath, and men who nourish the body and wish to live as long as Phäng-zû, are fond of doing 2 .' My own opinion is that the methods of the Tâo were first cultivated for the sake of the longevity which they were thought to promote, and that Lâo, discountenancing such a use of them, endeavoured to give the doctrine a higher character; and this view is favoured by passages in Kwang-dze.\n\nIn the seventh paragraph, for instance, of his Book VI, speaking of parties who had obtained the Tâo, he begins with a prehistoric sovereign, who 'got it and by it adjusted heaven and earth.' Among his other instances is Phäng-zû, who got it in the time of Shun, and lived on to the time of the five leading princes of Kâu,--a longevity of more than 1800 years, greater than that ascribed to Methuselah!\n\nIn the paragraph that follows there appears a Nü Yü, who is addressed by another famous Tâoist in the words, 'You are old, Sir, while your complexion is like that of a child;--how is it so?' and the reply is, 'I became acquainted with the Tâo.' I will adduce only one more passage of Kwang.\n\nIn his eleventh Book, and the fourth paragraph, he tells us of interviews between Hwang-Tî, in the nineteenth year of his reign, which would be 13.\n\nC.\n\n2679, and his instructor Kwang Khäng-dze.\n\nThe Tâoist sage is not readily prevailed on p.\n\n25 to unfold the treasures of his knowledge to the sovereign, but at last his reluctance is overcome, and he says to him, 'Come, and I will tell you about the Perfect Tâo."

