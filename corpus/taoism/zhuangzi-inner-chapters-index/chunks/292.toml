body = "You said to me, \"How do you know what constitutes the enjoyment of fishes?\" You knew that I knew it, and yet you put your question to me;--well, I know it (from our enjoying ourselves together) over the Hâo.' Footnotes 374:1 See pp.\n\n148 , 149 .\n\n374:2 here perhaps means 'turbid.' It has nothing to do with the river King.\n\n374:3 See Mayers's Manual, p.\n\n54.\n\nOur author adopts the common beliefs or superstitions of his time, and after his fashion puts his own reasonings into the mouths of these mythological personages.\n\nIt is more difficult to collect the legends about Zo of the sea, or of the Northern Sea.\n\nSee the Khang-hsî Thesaurus under .\n\n375:1 Thus the Confucian learning and its worthies were to the system of the Tâo only as the waters of the Ho to the great sea.\n\n375:2 I have translated here as if the reading were which is given by Lin Hsî-kung.\n\nThe correct reading, however, so far as depends on editions and dictionaries, is ; which is explained in the Khang-hsî dictionary as 'a great Rock in Fû-sang on the East,' against which the water of the sea collects, and is all evaporated!\n\n380:1 See Mencius II, ii, ch.\n\n8, and I, ii, chaps.\n\n10, 11, with the notes.\n\nis probably a mistake for .\n\n380:2 See the last narrative but one in the Zo Khwan, under the sixteenth year of duke Âi of Lû,--the year in which Confucius died.\n\n'The duke of Pâi' was merely the chief of a district of Khû; but rebelling against the Ruler of the State, he was defeated, and strangled himself.\n\n381:1 Two of king Mu's team of eight famous steeds.\n\n384:1 The khwei is 'a sort of dragon (it may be, a worm) with one foot.' The hsien has many feet; one account calls it 'a centipede.' 384:2 Such is the meaning of the lin or lien.\n\nThe best commentators explain it by hsien (###), 'to covet and desire.' 384:3 Compare Book I, par.\n\n3, towards the end.\n\n385:1 The sagely man is 'the True man,' who embodies the Tâo.\n\nThe Tâo has given to the khwei, the millipede, the serpent, and it may be said also to the wind, their means of progression and action.\n\nNothing is said of the eye and the mind;--it was not necessary to dwell on the Tâo in them.\n\n385:2 See Confucian Analects, IX, v and XI, xxii.\n\nOur author's account of this event is his own, constructed by him to convey his own Tâoistic lessons.\n\n387:1 No doubt the Yang Ho of Analects XVII, i.\n\n387:2 The grandson (Kung-sun) of one of the rulers of Kâo (one of the three states into which the great state of Zin had been broken up).\n\nHe has come down to us as a philosophic sophist, whose views it is not easy to define.\n\nSee Mayers's Manual, p.\n\n288, and Book XXXIII, par.\n\n7.\n\n387:3 Wei was another of the divisions of Zin, and Mâu was one of the sons of its ruler at this time, a great admirer, evidently, of Kwang-dze, and more than a match for the sophist Lung."

