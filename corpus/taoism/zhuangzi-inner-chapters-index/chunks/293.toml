[content]
body = "387:4 Holding, it is supposed, that 'the attributes of material objects, such as hardness and colour, are separate existences:'--so Mayers, after Wylie.\n\n388:1 A passage difficult to construe.\n\n389:1 A different character from that for a millipede in the last paragraph;--a Shang Kü, evidently some small insect, but we cannot tell what.\n\n390:1 A city of Kâo, as Han-tan was its capital.\n\nOf the incident referred to, I have not been able to learn anything.\n\nThe 'were marched' gives my idea of what it may have been.\n\n390:2 A river, which still gives its name to Phû-kâu, department Khao-kâu, Shan-tung.\n\n390:3 Probably king Wei, B.\n\nC.\n\n339-330.\n\n390:4 A good antiquity for Khû!\n\n390:5 ?\n\nA species of Testudo Serpentina, such as is often seen on pieces of Japanese lacquer-ware.\n\n391:1 Another name for Wei, so called from its capital;--in the present department of Khâi-fäng.\n\n391:2 So the critics explain the name.\n\nWilliams thinks the bird may be 'the argus pheasant,' or 'a variety of the peacock.' But what the bird was does not affect the meaning of our author's reference to it.\n\n391:3 One of the Eleococcae, the Dryandra Cordifolia of Thunberg.\n\n391:4 All the editions I have seen give here, which makes no sense.\n\nThe character should doubtless be , with the meaning which I have given; and not 'bamboo,' which is found in the critics.\n\nIt is also called 'the Pride of India.' 391:5 A river in the department and district of Fung-yang, An-hui.\n\n392:1 Surely a captious question.\n\nWe infer the feelings of other creatures from their demonstrations."

