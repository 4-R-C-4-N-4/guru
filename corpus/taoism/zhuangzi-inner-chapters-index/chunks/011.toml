[content]
body = "Before describing the editions of Kwang-dze which I p.\n\nxix have consulted, I must not omit to mention Professor Gabelentz's 'Treatise on the Speech or Style of Kwang-dze,' as 'a Contribution to Chinese Grammar,' published at Leipzig in 1888.\n\nIt has been a satisfaction to me to find myself on almost every point of usage in agreement with the views of so able a Chinese scholar.\n\nThe works which I employed in preparing my version have been:-- First, 'The True King of Nan-hwâ,' in 'The Complete Works of the Ten Philosophers,' which has been described above.\n\nThe Commentary which it supplies is that of Kwo Hsiang (Introd., pp.\n\n9, 10), with 'The Sounds and Meanings of the Characters' from Lû Teh Ming's 'Explanations of the Terms and Phrases of the Classics,' of our seventh century.\n\nAs in the case of the Tâo Teh King, the Ming editor has introduced at the top of his pages a selection of comments and notes from a great variety of scholars down to his own time.\n\nSecond, 'Helps (Wings) to Kwang-dze by Ziâo Hung,' a kindred work to the one with a similar title on Lâo-dze; by the same author, and prefaced by him in 1588.\n\nThe two works are constructed on the same lines.\n\nZiâo draws his materials from forty-eight authorities, from Kwo Hsiang to himself.\n\nHe divides the several Books also into paragraphs, more or fewer according to their length, and the variety of subjects in them; and my version follows him in this lead with little or no change.\n\nHe has two concluding Books; the one containing a collation of various readings, and the other a collection of articles on the history and genius of Kwang-dze, and different passages of his Text.\n\nThird, the Kwang-dze Hsüeh or 'Kwang-dze made like Snow,' equivalent to our 'Kwang-dze Elucidated;' by a Lû Shû-kih of Canton province, written in 1796.\n\nThe different Books are preceded by a short summary of their subject-matter.\n\nThe work goes far to fulfil the promise of its title.\n\nFourth, Kwang-dze Yin, meaning 'The Train of p.\n\nxx [paragraph continues] Thought in Kwang-dze Traced in its Phraseology.' My copy is a reprint, in 1880, of the Commentary of Lin Hsî-kung, who lived from the Ming into the present dynasty, under the editorship of a Lû Khû-wang of Kiang-sû province.\n\nThe style is clear and elegant, but rather more concise than that of the preceding work.\n\nIt leaves out the four disputed Books (XXVIII to XXXI); but all the others are followed by an elaborate discussion of their scope and plan.\n\nFifth, 'The Nan-hwâ Classic of Kwang-dze Explained,' published in 1621, by a Hsüan Ying or Zung , ; the name is printed throughout the book, now in one of these ways, now in the other), called also Mâu-kung.\n\nThe commentary is carefully executed and ingenious; but my copy of the book is so incorrectly printed that it can only be used with caution.\n\nMr.\n\nBalfour appears to have made his version mainly from the same edition of the work; and some of his grossest errors pointed out by Mr.\n\nGiles arose from his accepting without question the misprints of his authority.\n\nSixth, 'Independent Views of Kwang-dze ( );'--by Hû Wän-ying, published in 1751."

