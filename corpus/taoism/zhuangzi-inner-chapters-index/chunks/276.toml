body = "350:1 See the usage of the two characters in the Shih King, I, ii, Ode 3.\n\n351:1 Some sovereign of antiquity, of whom it is difficult to find any other mention but this.\n\nEven in the Lû Shih I have not discovered him.\n\nThe name is said to be pronounced Piâo; in which case it should consist of three , and not of three .\n\n351:2 Only heard of here.\n\n352:1 See the Tâo Teh King, ch.\n\n5.\n\n352:2 Analects III, xxii.\n\n352:3 In consequence of the dissoluteness of the court; Analects VI, xxvi; IX, 17.\n\n352:4 Meaning Sung and Wei.\n\n352:5 Analects XI, ii, i.\n\n353:1 It is impossible to speak definitely of who these three Hwangs (Augustuses) and five Tîs were, or whom the speaker intended by them.\n\nThe former would seem to lead us to the purely fabulous ages, when twelve (or thirteen) Heavenly Hwangs, eleven Earthly, and nine Human ruled over the young world, for a period of 576,000 years.\n\nThere is a general agreement of opinion that the five Tîs ended with Yâo and Shun.\n\n353:2 See Williams's Dictionary, sub voc.\n\nHe says it is the Crataegus p.\n\n354 cuneata and pinnatifida, common in China, and much esteemed for its acidity.\n\n354:1 A famous beauty,--the concubine of king Fû-khâi of Wû.\n\n354:2 The comparisons in this paragraph are not complimentary to Confucius.\n\nOf course the conversation never took place, and must have been made up to ridicule the views of the sage.\n\n354:3 This would be in B.\n\nC.\n\n503 or 502, and Lâo-dze would be more than a hundred years old.\n\n354:4 Probably in what is now the district of Phei, department of Hsü-kâu, Kiang-sû.\n\n355:1 That is, the sage will not deposit it, where it will lie hidden;--compare Analects XVI, vi.\n\n356:1 See the same expression used in Book VI, par.\n\n11, used by Confucius of himself.\n\nComparing the two passages together, I must doubt the correctness of my note there ( 2 , p.\n\n252), that 'Heaven' is used in the Confucian sense of Tî, or God.\n\nThe men here pursued and toiled after the pleasures of the world, rather than the quiet satisfactions of the Tâo.\n\n357:1 See Book XXIII, par.\n\n9.\n\nThe phrase = .\n\n357:2 The common reading is a mistake for .\n\n357:3 Compare the same illustration in the preceding Book, par.\n\n7.\n\n357:4 This illustration is from Book V1, par.\n\n5.\n\n358:1 Dze-kung would seem to have undertaken this expedition to maintain the reputation of the Master and his school;--only to be defeated by Lâo-dze more signally than Confucius had been.\n\n358:2 These are different probably, though the text is not quite certain, from the three Hwangs and five Tîs of par.\n\n3.\n\nThe Hwangs (or August Sovereigns) preceded the Tîs; the Kings (Wangs) came after them.\n\nThe Three Kings are the three lines of kings commencing with the dynasty of Hsü, and following Shun.\n\nFrom the names mentioned by Dze-kung, we ought certainly so to understand the designation here.\n\n359:1 See note 2 , preceding page.\n\n359:2 Referring to some abuses, contrary to the doctrine of relationship."

