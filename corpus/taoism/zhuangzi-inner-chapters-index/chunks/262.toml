[content]
body = "Originating belongs to those in the higher position; details (of work) to those who are in the lower.\n\nThe compendious decision belongs to the lord; the minutiae of execution, to his ministers.\n\nThe direction of the three hosts 1 and their men with the five weapons 2 is but a trifling quality; rewards p.\n\n335 and penalties with their advantages and sufferings, and the inflictions of the five punishments 1 are but trivial elements of instruction; ceremonies, laws, measures, and numbers, with all the minutiae of jurisprudence 2 , are small matters in government; the notes of bells and drums, and the display of plumes and flags are the slightest things in music, and the various grades of the mourning garments are the most unimportant manifestations of grief.\n\nThese five unimportant adjuncts required the operation of the excited spirit and the employment of the arts of the mind, to bring them into use.\n\nThe men of old had them indeed, but they did not give them the first place.\n\nThe ruler precedes, and the minister follows; the father precedes, and the son follows; the elder brother precedes, and the younger follows; the senior precedes, and the junior follows; the male precedes, and the female follows; the husband precedes, and the wife follows.\n\nThis precedence of the more honourable and sequence of the meaner is seen in the (relative) action of heaven and earth, and hence the sages took them as their pattern.\n\nThe more honourable position of heaven and the lower one of earth are equivalent to a designation of their spirit-like and intelligent qualities.\n\nThe precedence of spring and summer and the sequence of autumn and winter mark the p.\n\n336 order of the four seasons.\n\nIn the transformations and growth of all things, every bud and feature has its proper form; and in this we have their gradual maturing and decay, the constant flow of transformation and change.\n\nThus since Heaven and Earth, which are most spirit-like, are distinguished as more honourable and less, and by precedence and sequence, how much more must we look for this in the ways of men!\n\nIn the ancestral temple it is to kinship that honour is given; in court, to rank; in the neighbourhoods and districts, to age; in the conduct of affairs, to wisdom; such is the order in those great ways.\n\nIf we speak of the course (to be pursued in them), and do not observe their order, we violate their course.\n\nIf we speak of the course, and do not observe it, why do we apply that name to it?\n\n5.\n\nTherefore the ancients who clearly understood the great Tâo first sought to apprehend what was meant by Heaven 1 , and the Tâo and its characteristics came next.\n\nWhen this was apprehended, then came Benevolence and Righteousness.\n\nWhen these were apprehended, then came the Distinction of duties and the observance of them.\n\nThis accomplished, there came objects and their names.\n\nAfter objects and their names, came the employment of men according to their qualities: on this there followed the examination of the men and of their work.\n\nThis led to the approval or disapproval of them, which again was succeeded by the apportioning of rewards and penalties.\n\nAfter this the stupid and the intelligent understood what was required of them, and the honourable and the mean occupied their several positions.\n\np.\n\n337 The good and the able, and those inferior to them, sincerely did their best.\n\nTheir ability was distributed; the duties implied in their official names were fulfilled.\n\nIn this way did they serve their superiors, nourish their inferiors, regulate things, and cultivate their persons.\n\nThey did not call their knowledge and schemes into requisition; they were required to fall back upon (the method of) Heaven:--this was what is called the Perfection of the Rule of Great Peace."

