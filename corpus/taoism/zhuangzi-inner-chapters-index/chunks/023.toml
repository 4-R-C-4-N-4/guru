[content]
body = "The indefinite expression Tâo was adopted to denominate an abstract cause, of the initial principle of life and order, to which worshippers were able to assign the attributes of immateriality, eternity, immensity, invisibility.' It was, probably, Julien's reference in his note to the use of the term nature, which suggested to Hardwick his analogy between Lâo-dze's Tâo, and 'the Nature of modern speculation.' Canon Farrar has said, 'We have long personified under the name of Nature the sum total of God's laws as observed in the physical world; and now the notion of Nature as a distinct, living, independent entity seems to be ineradicable alike from our literature and our systems of philosophy 1 .' But it seems to me that this metaphorical or mythological use of the word nature for the Cause and Ruler of it, implies the previous notion of Him, that is, of God, in the mind.\n\nDoes not this clearly appear in the words of Seneca?--'Vis illum (h.e.\n\njovem Deum) naturam p.\n\n14 vocare, non peccabis:--hic est ex quo nata sunt omnia, cujus spiritu vivimus 1 .' In his translation of the Works of Kwang-dze in 1881, Mr.\n\nBalfour adopted Nature as the ordinary rendering of the Chinese Tâo.\n\nHe says, 'When the word is translated Way, it means the Way of Nature,--her processes, her methods, and her laws; when translated Reason, it is the same as lî,--the power that works in all created things, producing, preserving, and life-giving,--the intelligent principle of the world; when translated Doctrine, it refers to the True doctrine respecting the laws and mysteries of Nature.' He calls attention also to the point that 'he uses NATURE in the sense of Natura naturans, while the Chinese expression wan wû (= all things) denotes Natura naturata.' But this really comes to the metaphorical use of nature which has been touched upon above.\n\nIt can claim as its patrons great names like those of Aquinas, Giordano Bruno, and Spinoza, but I have never been able to see that its barbarous phraseology makes it more than a figure of speech 2 .\n\nThe term Nature, however, is so handy, and often fits so appropriately into a version, that if Tâo had ever such a signification I should not hesitate to employ it as freely as Mr.\n\nBalfour has done; but as it has not that signification, to try to put a non-natural meaning into it, only perplexes the mind, and obscures the idea of Lâo-dze.\n\nMr.\n\nBalfour himself says (p.\n\nxviii), 'The primary signification of Tâo is simply \"road.\"' Beyond question this meaning underlies the use of it by the great master of Tâoism and by Kwang-dze 3 .\n\nLet the reader refer to the version of the twenty-fifth chapter of Lâo's treatise, and to p.\n\n15 the notes subjoined to it.\n\nThere Tâo appears as the spontaneously operating cause of all movement in the phenomena of the universe; and the nearest the writer can come to a name for it is 'the Great Tâo.' Having established this name, he subsequently uses it repeatedly; see chh.\n\nxxxiv and liii."

