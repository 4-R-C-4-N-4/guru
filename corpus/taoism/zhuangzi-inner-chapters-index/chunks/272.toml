body = "The woman knew how to admire the frowning beauty, but she did not know how it was that she, though frowning, was beautiful.\n\nAlas!\n\nit is indeed all over with your Master 2 !' 5.\n\nWhen Confucius was in his fifty-first year 3 , he had not heard of the Tâo, and went south to Phei 4 p.\n\n355 to see Lâo Tan, who said to him, 'You have come, Sir; have you?\n\nI have heard that you are the wisest man of the North; have you also got the Tâo?' 'Not yet,' was the reply; and the other went on, 'How have you sought it?' Confucius said, 'I sought it in measures and numbers, and after five years I had not got it.' 'And how then did you seek it?' 'I sought it in the Yin and Yang, and after twelve years I have not found it.' Lâo-dze said, 'Just so!\n\nIf the Tâo could be presented (to another), men would all present it to their rulers; if it could be served up (to others), men would all serve it up to their parents; if it could be told (to others), men would all tell it to their brothers; if it could be given to others, men would all give it to their sons and grandsons.\n\nThe reason why it cannot be transmitted is no other but this,--that if, within, there be not the presiding principle, it will not remain there, and if, outwardly, there be not the correct obedience, it will not be carried out.\n\nWhen that which is given out from the mind (in possession of it) is not received by the mind without, the sage will not give it out; and when, entering in from without, there is no power in the receiving mind to entertain it, the sage will not permit it to lie hid there 1 .\n\nFame is a possession common to all; we should not seek to have much of it.\n\nBenevolence and righteousness were as the lodging-houses of the former kings; we should only rest in them for a night, and not occupy them for p.\n\n356 long.\n\nIf men see us doing so, they will have much to say against us.\n\n'The perfect men of old trod the path of benevolence as a path which they borrowed for the occasion, and dwelt in Righteousness as in a lodging which they used for a night.\n\nThus they rambled in the vacancy of Untroubled Ease, found their food in the fields of Indifference, and stood in the gardens which they had not borrowed.\n\nUntroubled Ease requires the doing of nothing; Indifference is easily supplied with nourishment; not borrowing needs no outlay.\n\nThe ancients called this the Enjoyment that Collects the True.\n\n'Those who think that wealth is the proper thing for them cannot give up their revenues; those who seek distinction cannot give up the thought of fame; those who cleave to power cannot give the handle of it to others.\n\nWhile they hold their grasp of those things, they are afraid (of losing them).\n\nWhen they let them go, they are grieved; and they will not look at a single example, from which they might perceive the (folly) of their restless pursuits:--such men are under the doom of Heaven 1 .\n\n'Hatred and kindness; taking and giving; reproof and instruction; death and life:--these eight things are instruments of rectification, but only those are able to use them who do not obstinately refuse to comply with their great changes.\n\nHence it is said, \"Correction is Rectification.\" When the minds of p."

