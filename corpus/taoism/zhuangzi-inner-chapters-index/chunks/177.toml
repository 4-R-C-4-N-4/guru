[content]
body = "For one who has not this determined mind, to have his affirmations and negations is like the case described in the saying, 'He went to Yüeh to-day, and arrived at it yesterday 2 .' It would be making what was not a fact to be a fact.\n\nBut even the spirit-like Yü 3 could not have known how to do this, and how should one like me be able to do it?\n\nBut speech is not like the blowing (of the wind) the speaker has (a meaning in) his words.\n\nIf, however, what he says, be indeterminate (as from a mind not made up), does he then really speak or not?\n\nHe thinks that his words are different from the chirpings of fledgelings; but is there any distinction between them or not?\n\nBut how can the Tâo be so obscured, that there should be 'a True' and 'a False' in it?\n\nHow can speech be so obscured that there should be 'the Right' and 'the Wrong' about them?\n\nWhere shall the Tâo go to that it will not p.\n\n182 be found?\n\nWhere shall speech be found that it will be inappropriate?\n\nTâo becomes obscured through the small comprehension (of the mind), and speech comes to be obscure through the vain-gloriousness (of the speaker).\n\nSo it is that we have the contentions between the Literati 1 and the Mohists 2 , the one side affirming what the other denies, and vice versâ.\n\nIf we would decide on their several affirmations and denials, no plan is like bringing the (proper) light (of the mind) 3 to bear on them.\n\nAll subjects may be looked at from (two points of view),--from that and from this.\n\nIf I look at a thing from another's point of view, I do not see it; only as I know it myself, do I know it.\n\nHence it is said, 'That view comes from this; and this view is a consequence of that:'--which is the theory that that view and this--(the opposite views)-produce each the other 4 .\n\nAlthough it be so, there is affirmed now life and now death; now death and now life; now the admissibility of a thing and now its inadmissibility; now its inadmissibility and now its admissibility.\n\n(The disputants) now affirm and now deny; now deny and now affirm.\n\nTherefore the sagely man does not pursue this method, but views things in the light of (his) Heaven 5 (-ly nature), and hence forms his judgment of what is right.\n\np.\n\n183 This view is the same as that, and that view is the same as this.\n\nBut that view involves both a right and a wrong; and this view involves also a right and a wrong:--are there indeed, or are there not the two views, that and this?\n\nThey have not found their point of correspondency which is called the pivot of the Tâo.\n\nAs soon as one finds this pivot, he stands in the centre of the ring (of thought), where he can respond without end to the changing views;--without end to those affirming, and without end to those denying.\n\nTherefore I said, 'There is nothing like the proper light (of the mind).' 4."

