[content]
body = "Sacred Texts Taoism Index Previous Next 75. 75. 1. The people suffer from famine because of the multitude of taxes consumed by their superiors. It is through this that they suffer famine. p. 118 2. The people are difficult to govern because of the (excessive) agency of their superiors (in governing them). It is through this that they are difficult to govern. 3. The people make light of dying because of the greatness of their labours in seeking for the means of living. It is this which makes them think light of dying. Thus it is that to leave the subject of living altogether out of view is better than to set a high value on it. , 'How Greediness Injures.' The want of the nothing-doing Tâo leads to the multiplication of exactions by the government, and to the misery of the people, so as to make them think lightly of death. The chapter is a warning for both rulers and people. It is not easy to determine whether rulers, or people, or both, are intended in the concluding sentence of par. 2. Next: Chapter 76"

