body = "Sacred Texts Taoism Index Previous Next p.\n\n307 BOOK XII.\n\nPART II.\n\nSECTION V.\n\nThien Tî, or 'Heaven and Earth 1 .' 1.\n\nNotwithstanding the greatness of heaven and earth, their transforming power proceeds from one lathe; notwithstanding the number of the myriad things, the government of them is one and the same; notwithstanding the multitude of mankind, the lord of them is their (one) ruler 2 .\n\nThe ruler's (course) should proceed from the qualities (of the Tâo) and be perfected by Heaven 3 , when it is so, it is called 'Mysterious and Sublime.' The ancients ruled the world by doing nothing;-simply by this attribute of Heaven 4 .\n\nIf we look at their words 5 in the light of the Tâo, (we see that) the appellation for the ruler of the p.\n\n308 world 1 was correctly assigned; if we look in the same light at the distinctions which they instituted, (we see that) the separation of ruler and ministers was right; if we look at the abilities which they called forth in the same light, (we see that the duties of) all the offices were well performed; and if we look generally in the same way at all things, (we see that) their response (to this rule) was complete 2 .\n\nTherefore that which pervades (the action of) Heaven and Earth is (this one) attribute; that which operates in all things is (this one) course; that by which their superiors govern the people is the business (of the various departments); and that by which aptitude is given to ability is skill.\n\nThe skill was manifested in all the (departments of) business; those departments were all administered in righteousness; the righteousness was (the outflow of) the natural virtue; the virtue was manifested according to the Tâo; and the Tâo was according to (the pattern of) Heaven.\n\nHence it is said 3 , 'The ancients who had the nourishment of the world wished for nothing and the world had enough; they did nothing and all things were transformed; their stillness was abysmal, and the people were all composed.' The Record says 4 , 'When the one (Tâo) pervades it, all business p.\n\n309 is completed.\n\nWhen the mind gets to be free from all aim, even the Spirits submit.' 2.\n\nThe Master said 1 , 'It is the Tâo that overspreads and sustains all things.\n\nHow great It is in Its overflowing influence!\n\nThe Superior man ought by all means to remove from his mind (all that is contrary to It).\n\nActing without action is what is called Heaven(-like).\n\nSpeech coming forth of itself is what is called (a mark of) the (true) Virtue.\n\nLoving men and benefiting things is what is called Benevolence.\n\nSeeing wherein things that are different yet agree is what is called being Great.\n\nConduct free from the ambition of being distinguished above others is what is called being Generous.\n\nThe possession in himself of a myriad points of difference is what is called being Rich.\n\nTherefore to hold fast the natural attributes is what is called the Guiding Line (of government) 2 ; the perfecting of those attributes is what is called its Establishment; accordance with the Tâo is what is called being Complete; and not allowing anything external to affect the will is what is called being Perfect.\n\nWhen the Superior man understands these ten things, he keeps all matters as it were sheathed in himself, showing the greatness of his mind; and through the outflow of his doings, all things move (and come to him).\n\nBeing such, he lets the gold he hid in the hill, and the pearls in the deep; he considers not p."

