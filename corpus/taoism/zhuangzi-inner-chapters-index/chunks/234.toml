[content]
body = "Therefore if an end were put to sageness and wisdom put away, the great robbers would cease to arise.\n\nIf jade were put away and pearls broken to bits, the small thieves would not appear.\n\nIf tallies were burned and seals broken in pieces, the people would become simple and unsophisticated.\n\nIf pecks were destroyed and steelyards snapped in two, the people would have no wrangling.\n\nIf the rules of the sages were entirely set aside in the world, a beginning might be made of reasoning with the people.\n\nIf the six musical accords were reduced to a state of utter confusion, organs and lutes all burned, and the ears of the (musicians like the) blind Khwang 2 stopped up, all men would begin to possess and employ their (natural) power of hearing.\n\nIf elegant ornaments were abolished, the five embellishing colours disused, and the eyes of (men like) Lî Kû 3 glued up, all men would begin to possess and employ their (natural) power of vision.\n\nIf the hook and line were destroyed, the compass and square thrown away, and the fingers of men (like) the artful Khui 4 smashed, all men would begin to possess and employ their (natural) skill;--as it is said, 'The greatest art is p.\n\n287 like stupidity 1 .' If conduct such as that of Zäng (Shän) 2 and Shih (Khiû) 3 were discarded, the mouths of Yang (Kû) 4 and Mo (Tî) gagged, and benevolence and righteousness seized and thrown aside, the virtue of all men would begin to display its mysterious excellence.\n\nWhen men possessed and employed their (natural) power of vision, there would be no distortion in the world.\n\nWhen they possessed and employed their (natural) power of hearing, there would be no distractions in the world.\n\nWhen they possessed and employed their (natural) faculty of knowledge, there would be no delusions in the world.\n\nWhen they possessed and employed their (natural) virtue, there would be no depravity in the world.\n\nMen like Zäng (Shän), Shih (Khiû), Yang (Kû), Mo (Tî), Shih Khwang (the musician), the artist Khui, and Lî Kû, all display their qualities outwardly, and set the world in a blaze (of admiration) and confound it;--a method which is of no use!\n\n4.\n\nAre you, Sir, unacquainted with the age of perfect virtue?\n\nAnciently there were Yung-khäng, Tâ-thing, Po-hwang, Kang-yang, Lî-lû, Lî-khû, Hsien-yüan, Ho-hsü, Zun-lû, Kû-yung, Fû-hsî, and Shän-näng 5 .\n\nIn their times the people made p.\n\n288 knots on cords in carrying on their affairs.\n\nThey thought their (simple) food pleasant, and their (plain) clothing beautiful.\n\nThey were happy in their (simple) manners, and felt at rest in their (poor) dwellings.\n\n(The people of) neighbouring states might be able to descry one another; the voices of their cocks and dogs might be heard (all the way) from one to the other; they might not die till they were old; and yet all their life they would have no communication together 1 .\n\nIn those times perfect good order prevailed."

