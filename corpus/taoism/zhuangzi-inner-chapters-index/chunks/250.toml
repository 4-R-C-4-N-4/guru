[content]
body = "After a thousand years, tired of the world, he leaves it, and ascends among the immortals.\n\nHe mounts on the white clouds, and arrives at the place of God.\n\nThe three forms of evil do not reach him, his person is always free from misfortune;--what obloquy has he to incur?' With this the border-warden left him.\n\nYâo followed him, saying, 'I beg to ask--;' but the other said, 'Begone!' p.\n\n315 7.\n\nWhen Yâo was ruling the world, Po-khäng Dze-kâo 1 was appointed by him prince of one of the states.\n\nFrom Yâo (afterwards) the throne passed to Shun, and from Shun (again) to Yû; and (then) Po-khäng Dze-kâo resigned his principality and began to cultivate the ground.\n\nYü went to see him, and found him ploughing in the open country.\n\nHurrying to him, and bowing low in acknowledgment of his superiority, Yü then stood up, and asked him, saying,' Formerly, when Yâo was ruling the world, you, Sir, were appointed prince of a state.\n\nHe gave his sovereignty to Shun, and Shun gave his to me, when you, Sir, resigned your dignity, and are (now) ploughing (here);--I venture to ask the reason of your conduct.' Dze-kâo said, 'When Yâo ruled the world, the people stimulated one another (to what was right) without his offering them rewards, and stood in awe (of doing wrong) without his threatening them with punishments.\n\nNow you employ both rewards and punishments, and the people notwithstanding are not good.\n\nTheir virtue will from this time decay; punishments will from this time prevail; the disorder of future ages will from this time begin.\n\nWhy do you, my master, not go away, and not interrupt my work?' With this he resumed his ploughing with his head bent down, and did not (again) look round.\n\n8.\n\nIn the Grand Beginning (of all things) there was nothing in all the vacancy of space; there was nothing that could be named 2 .\n\nIt was in this state p.\n\n316 that there arose the first existence 1 ;--the first existence, but still without bodily shape.\n\nFrom this things could then be produced, (receiving) what we call their proper character 2 .\n\nThat which had no bodily shape was divided 3 ; and then without intermission there was what we call the process of conferring 4 .\n\n(The two processes) continuing in operation, things were produced.\n\nAs things were completed, there were produced the distinguishing lines of each, which we call the bodily shape.\n\nThat shape was the body preserving in it the spirit 5 , and each had its peculiar manifestation, which we call its Nature.\n\nWhen the Nature has been cultivated, it returns to its proper character; and when that has been fully reached, there is the same condition as at the Beginning.\n\nThat sameness is pure vacancy, and the vacancy is great.\n\nIt is like the closing of the beak and silencing the singing (of a bird).\n\nThat closing and silencing is like the union of heaven and earth (at the beginning) 6 .\n\nThe union, effected, as it p.\n\n317 is, might seem to indicate stupidity or darkness, but it is what we call the 'mysterious quality' (existing at the beginning); it is the same as the Grand Submission (to the Natural Course).\n\n9."

