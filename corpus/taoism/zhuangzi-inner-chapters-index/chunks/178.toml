[content]
body = "By means of a finger (of my own) to illustrate that the finger (of another) is not a finger is not so good a plan as to illustrate that it is not so by means of what is (acknowledged to be) not a finger; and by means of (what I call) a horse to illustrate that (what another calls) a horse is not so, is not so good a plan as to illustrate that it is not a horse, by means of what is (acknowledged to be) not a horse 1 .\n\n(All things in) heaven and earth may be (dealt with as) a finger; (each of) their myriads may be (dealt with as) a horse.\n\nDoes a thing seem so to me?\n\n(I say that) it is so.\n\nDoes it seem not so to me?\n\n(I say that) it is not so.\n\nA path is formed by (constant) p.\n\n184 treading on the ground.\n\nA thing is called by its name through the (constant) application of the name to it.\n\nHow is it so?\n\nIt is so because it is so.\n\nHow is it not so?\n\nIt is not so, because it is not so.\n\nEverything has its inherent character and its proper capability.\n\nThere is nothing which has not these.\n\nTherefore, this being so, if we take a stalk of grain 1 and a (large) pillar, a loathsome (leper) and (a beauty like) Hsî Shih 2 , things large and things insecure, things crafty and things strange;--they may in the light of the Tâo all be reduced to the same category (of opinion about them).\n\nIt was separation that led to completion; from completion ensued dissolution.\n\nBut all things, without regard to their completion and dissolution, may again be comprehended in their unity;--it is only the far reaching in thought who know how to comprehend them in this unity.\n\nThis being so, let us give up our devotion to our own views, and occupy ourselves with the ordinary views.\n\nThese ordinary views are grounded on the use of things.\n\n(The study of that) use leads to the comprehensive judgment, and that judgment secures the success (of the inquiry).\n\nThat success gained, we are near (to the object of our search), and there we stop.\n\nWhen we stop, and yet we do not know how it is so, we have what is called the Tâo.\n\nWhen we toil our spirits and intelligence, obstinately p.\n\n185 determined (to establish our own view), and do not know the agreement (which underlies it and the views of others), we have what is called 'In the morning three.' What is meant by that 'In the morning three?' A keeper of monkeys, in giving them out their acorns, (once) said, 'In the morning I will give you three (measures) and in the evening four.' This made them all angry, and he said, 'Very well.\n\nIn the morning I will give you four and in the evening three.' His two proposals were substantially the same, but the result of the one was to make the creatures angry, and of the other to make them pleased:--an illustration of the point I am insisting on.\n\nTherefore the sagely man brings together a dispute in its affirmations and denials, and rests in the equal fashioning of Heaven 1 .\n\nBoth sides of the question are admissible.\n\n5.\n\nAmong the men of old their knowledge reached the extreme point.\n\nWhat was that extreme point?\n\nSome held that at first there was not anything.\n\nThis is the extreme point, the utmost point to which nothing can be added 2 .\n\nA second class held that there was something, but without any responsive recognition 3 of it (on the part of men)."

