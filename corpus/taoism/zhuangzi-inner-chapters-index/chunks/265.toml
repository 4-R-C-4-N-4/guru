[content]
body = "The reply was, 'Your demeanour is repelling; you stare with your eyes; your forehead is broad and yet tapering; you bark and growl with your mouth; your appearance is severe and pretentious; you are like a horse held by its tether, you would move, but are restrained, and (if let go) would start off like an p.\n\n342 arrow from a bow; you examine all the minutiae of a thing; your wisdom is artful, and yet you try to look at ease.\n\nAll these are to be considered proofs of your want of sincerity.\n\nIf on the borders one were to be found with them, he would be named a Thief.' 9.\n\nThe Master 1 said, 'The Tâo does not exhaust itself in what is greatest, nor is it ever absent from what is least; and therefore it is to be found complete and diffused in all things.\n\nHow wide is its universal comprehension!\n\nHow deep is its unfathomableness!\n\nThe embodiment of its attributes in benevolence and righteousness is but a small result of its spirit-like (working); but it is only the perfect man who can determine this.\n\nThe perfect man has (the charge of) the world;--is not the charge great?\n\nand yet it is not sufficient to embarrass him.\n\nHe wields the handle of power over the whole world, and yet it is nothing to him.\n\nHis discrimination detects everything false, and no consideration of gain moves him.\n\nHe penetrates to the truth of things, and can guard that which is fundamental.\n\nSo it is that heaven and earth are external to him, and he views all things with indifference, and his spirit is never straitened by them.\n\nHe has comprehended the Tho, and is in harmony with its characteristics; he pushes back benevolence and righteousness (into their proper place), and deals with ceremonies and music as (simply) guests:--yes, the mind of the perfect man determines all things aright.' p.\n\n343 10.\n\nWhat the world thinks the most valuable exhibition of the Tâo is to be found in books.\n\nBut books are only a collection of words.\n\nWords have what is valuable in them;--what is valuable in words is the ideas they convey.\n\nBut those ideas are a sequence of something else;--and what that something else is cannot be conveyed by words.\n\nWhen the world, because of the value which it attaches to words, commits them to books, that for which it so values them may not deserve to be valued;--because that which it values is not what is really valuable.\n\nThus it is that what we look at and can see is (only) the outward form and colour, and what we listen to and can hear is (only) names and sounds.\n\nAlas!\n\nthat men of the world should think that form and colour, name and sound, should be sufficient to give them the real nature of the Tâo.\n\nThe form and colour, the name and sound, are certainly not sufficient to convey its real nature; and so it is that 'the wise do not speak and those who do speak are not wise.' How should the world know that real nature?\n\nDuke Hwan 1 , seated above in his hall, was (once) reading a book, and the wheelwright Phien was making a wheel below it 2 .\n\nLaying aside his hammer and chisel, Phien went up the steps, and said, 'I venture to ask your Grace what words you are reading?' The duke said, 'The words of the sages.' 'Are those sages alive?' Phien continued.\n\np.\n\n344 'They are dead,' was the reply."

