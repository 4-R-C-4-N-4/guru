body = "Among his descendants was a Yo Khän, who learned in Khî 'the words,' that is, the Tâoistic writings 'of Hwang-Tî and Lâo-dze from an old man who lived on the Ho-side.' The origin of this old man was not known, but Yo Khän taught what he learned from him to a Mr.\n\nKo, who again became preceptor to Zhâo Zhan, the chief minister of Khî, and afterwards of the new dynasty of Han, dying in B.C.\n\n190.\n\n5.\n\nReferring now to the catalogue of the Imperial Library of the dynasty of Sui (A.\n\nD.\n\n589-6 18), we find that The catalogue of the Sui dynasty.\n\nit contained many editions of Lâo's treatise with commentaries.\n\nThe first mentioned is 'The Tâo Teh King,' with the commentary of the old man of the Ho-side, in the time of the emperor Wän of Han (B.\n\nC.\n\n179-142).\n\nIt is added in a note that the dynasty of Liang (A.D.\n\n502-556) had possessed the edition of the old man of the Ho-side, of the time of the Warring States; but that with some other texts and commentaries it had disappeared.' I find it difficult to believe that there had been two old men of the Ho-side 1 , both teachers of Tâoism and commentators on our King, but I am willing to content myself with the more recent work, and accept the copy that has been current--say from B.C.\n\n150, when Sze-mâ Khien could have been little more than a boy.\n\nTâoism was a favourite study with many of the Han emperors and their ladies.\n\nHwâi-nan dze, of whose many quotations from p.\n\n8 the text of Lâo I have spoken, was an uncle of the emperor Wän.\n\nTo the emperor King (B.C.\n\n156-143), the son of Wän, there is attributed the designation of Lâo's treatise as a King, a work of standard authority.\n\nAt the beginning of his reign, we are told, some one was commending to him four works, among which were those of Lâo-dze and Kwang-dze.\n\nDeeming that the work of Hwang-dze and Lâo-dze was of a deeper character than the others, he ordered that it should be called a King, established a board for the study of Tâoism, and issued an edict that the book should be learned and recited at court, and throughout the country 1 .\n\nThenceforth it was so styled.\n\nWe find Hwang-fû Mî (A.D.\n\n215-282) referring to it as the Tâo Teh King.\n\nThe second place in the Sui catalogue is given to the text and commentary of Wang Pî or Wang Fû-sze, an The work of Wang Pî.\n\nextraordinary scholar who died in A.\n\nD.\n\n249, at the early age of twenty-four.\n\nThis work has always been much prized.\n\nIt was its text which Lû Teh-ming used in his 'Explanation of the Terms and Phrases of the Classics,' in the seventh century.\n\nAmong the editions of it which I possess is that printed in 1794 with the imperial moveable metal types.\n\nI need not speak of editions or commentaries subsequent to Wang Pî's.\n\nThey soon begin to be many, and are only not so numerous as those of the Confucian Classics.\n\n6.\n\nAll the editions of the book are divided into two Divisions into parts, chapters; and number of characters in the text."

