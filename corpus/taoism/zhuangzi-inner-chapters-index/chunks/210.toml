body = "245 got It, and by It dwelt in the Dark Palace.\n\nYü-khiang 1 got It, and by It was set on the North Pole.\n\nHsî Wang-mû 2 got It, and by It had her seat in (the palace of) Shâo-kwang.\n\nNo one knows Its beginning; no one knows Its end.\n\nPhäng Zû got It, and lived on from the time of the lord of Yü to that of the Five Chiefs 3 .\n\nFû Yüeh 4 got It, and by It became chief minister to Wû-ting 4 , (who thus) in a trice became master of the kingdom.\n\n(After his death), Fû Yüeh mounted to the eastern portion of the Milky Way, where, riding on Sagittarius and Scorpio, he took his place among the stars.\n\n8.\n\nNan-po Dze-khwei 5 , asked Nü Yü 6 , saying, 'You are old, Sir, while your complexion is like that of a child;--how is it so?' The reply was, 'I have become acquainted with the Tâo.' The other said, 'Can I learn the Tâo?' Nü Yü said, 'No.\n\nHow can you?\n\nYou, Sir, are not the man to do so.\n\nThere was Pû-liang Î 7 who had the abilities of a sagely man, but not the Tâo, while I had the Tâo, but not the abilities.\n\nI wished, however, to teach him, if, peradventure, he might p.\n\n246 become the sagely man indeed.\n\nIf he should not do so, it was easy (I thought) for one possessing the Tâo of the sagely man to communicate it to another possessing his abilities.\n\nAccordingly, I proceeded to do so, but with deliberation 1 .\n\nAfter three days, he was able to banish from his mind all worldly (matters).\n\nThis accomplished, I continued my intercourse with him in the same way; and in seven days he was able to banish from his mind all thought of men and things.\n\nThis accomplished, and my instructions continued, after nine days, he was able to count his life as foreign to himself.\n\nThis accomplished, his mind was afterwards clear as the morning; and after this he was able to see his own individuality 2 .\n\nThat individuality perceived, he was able to banish all thought of Past or Present.\n\nFreed from this, he was able to penetrate to (the truth that there is no difference between) life and death;--(how) the destruction of life is not dying, and the communication of other life is not living.\n\n(The Tâo) is a thing which accompanies all other things and meets them, which is present when they are overthrown and when they obtain their completion.\n\nIts name is Tranquillity amid all Disturbances, meaning that such Disturbances lead to Its Perfection 3 .' 'And how did you, being alone (without any teacher), learn all this?' 'I learned it,' was the reply, 'from the son of Fû-mo 4 ; he learned it from p.\n\n247 the grandson of Lo-sung; he learned it from Shan-ming; he learned it from Nieh-hsü; he, from Hsü-yî; he, from Wû-âo; he, from Hsüan-ming; he, from Zhan-liâo; and he learned it from Î-shih.' 9."

