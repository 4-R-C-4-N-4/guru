body = "Sacred Texts Taoism Index Previous Next p.\n\n236 BOOK VI.\n\nPART I.\n\nSECTION VI.\n\nTâ Zung Shih, or 'The Great and Most Honoured Master 1 .' 1.\n\nHe who knows the part which the Heavenly 2 (in him) plays, and knows(also)that which the Human 2 (in him ought to) play, has reached the perfection (of knowledge).\n\nHe who knows the part which the Heavenly plays (knows) that it is naturally born with him; he who knows the part which the Human ought to play (proceeds) with the knowledge which he possesses to nourish it in the direction of what he does not (yet) know 3 :--to complete one's natural term of years and not come to an untimely end in the middle of his course is the fulness of knowledge.\n\nAlthough it be so, there is an evil (attending this condition).\n\nSuch knowledge still awaits the confirmation of it as correct; it does so because it is not yet determined 4 .\n\nHow do we know that what p.\n\n237 we call the Heavenly (in us) is not the Human?\n\nand that what we call the Human is not the Heavenly?\n\nThere must be the True man 1 , and then there is the True knowledge.\n\n2.\n\nWhat is meant by 'the True Man 2 ?' The True men of old did not reject (the views of) the few; they did not seek to accomplish (their ends) like heroes (before others); they did not lay plans to attain those ends 3 .\n\nBeing such, though they might make mistakes, they had no occasion for repentance; though they might succeed, they had no self-complacency.\n\nBeing such, they could ascend the loftiest heights without fear; they could pass through water without being made wet by it; they could go into fire without being burnt; so it was p.\n\n238 that by their knowledge they ascended to and reached the Tâo 1 .\n\nThe True men of old did not dream when they slept, had no anxiety when they awoke, and did not care that their food should be pleasant.\n\nTheir breathing came deep and silently.\n\nThe breathing of the true man comes (even) from his heels, while men generally breathe (only) from their throats.\n\nWhen men are defeated in argument, their words come from their gullets as if they were vomiting.\n\nWhere lusts and desires are deep, the springs of the Heavenly are shallow.\n\nThe True men of old knew nothing of the love of life or of the hatred of death.\n\nEntrance into life occasioned them no joy; the exit from it awakened no resistance.\n\nComposedly they went and came.\n\nThey did not forget what their beginning had been, and they did not inquire into what their end would be.\n\nThey accepted (their life) and rejoiced in it; they forgot (all fear of death), and returned (to their state before life) 1 .\n\nThus there was in them what is called the want of any mind to resist the Tâo, and of all attempts by means of the Human to assist the Heavenly.\n\nSuch were they who are called the True men.\n\n3.\n\nBeing such, their minds were free from all thought 2 ; their demeanour was still and unmoved; p.\n\n239 their foreheads beamed simplicity.\n\nWhatever coldness came from them was like that of autumn; whatever warmth came from them was like that of spring.\n\nTheir joy and anger assimilated to what we see in the four seasons.\n\nThey did in regard to all things what was suitable, and no one could know how far their action would go.\n\nTherefore the sagely man might, in his conduct of war, destroy a state without losing the hearts of the people 1 ; his benefits and favours might extend to a myriad generations without his being a lover of men."

