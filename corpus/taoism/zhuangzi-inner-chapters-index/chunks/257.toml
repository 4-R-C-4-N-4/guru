body = "310:1 Balfour:--'The difference between life and death exists no more;' Gabelentz:--'Sterben und Leben haben gleiche Erscheinung.' 311:1 I can hardly follow the reasoning of Kwang-dze here.\n\nThe whole of the paragraph is obscure.\n\nI have translated the two concluding characters as if they were , after the example of Lin Hsî-yî, whose edition of Kwang-dze was first published in 1261.\n\n311:2 Meaning the Tâo.\n\nThis is not to be got or learned by wisdom, or perspicacity, or man's reasoning.\n\nIt is instinctive to man, as the Heavenly gift or Truth ( ).\n\n312:1 The meaning of the characters shows what is the idea emblemed by this name; and so with Hsiang Wang,--'a Semblance,' and 'Nonentity;' = 'Mindless,' 'Purposeless.' 312:2 All these names have occurred, excepting that of Pheî-î, who heads Hwang-fû Mî's list of eminent Tâoists.\n\nWe shall meet with him again.\n\nHe is to be distinguished from Phû-î.\n\n312:3 'Match Heaven;' that is, be sovereign below, as Heaven above ruled all.\n\n312:4 We are referred for the meaning of this characteristic to , in Bk.\n\nV, Par.\n\n1.\n\n313:1 That is, Nieh might be a minister, but could not be the sovereign.\n\nThe phraseology is based on the rules for the rise of sub-surnames in the same clan, and the consequent division of clans under different ancestors;--see the Lî Kî, Bk.\n\nXIII, i, 10-14, and XIV, 8.\n\n313:2 'Hwâ' is evidently intended for the name of a place, but where it was can hardly be determined.\n\nThe genuineness of the whole paragraph is called in question; and I pass it by, merely calling attention to what the border-warden is made to say about the close of the life of the sage (Tâoist), who after living a thousand years, ascends among the Immortals ( = ), and arrives at the place of God, and is free from the three evils of disease, old age, and death; or as some say, after the Buddhists, water, fire, and wind!\n\n315:1 Some legends say that this Po-khäng Dze-kâo was a pre-incarnation of Mo-dze; but this paragraph is like the last, and cannot be received as genuine.\n\n315:2 This sentence is differently understood, according as it is p.\n\n316 punctuated;-- , or .\n\nEach punctuation has its advocates.\n\nFor myself, I can only adopt the former; the other is contrary to my idea of Chinese composition.\n\nIf the author had wished to be understood so, he would have written differently, as, for instance, .\n\n316:1 Probably, the primary ether, what is called the Thâi Kih.\n\n316:2 This sentence is anticipatory.\n\n316:3 Into what we call the yin and the yang;--the same ether, now at rest, now in motion.\n\n316:4 The conferring of something more than what was material.\n\nBy whom or what?\n\nBy Heaven; the Tâoist understanding by that term the Tâo.\n\n316:5 So then, man consists of the material body and the immaterial spirit.\n\n316:6 The potential heaven and earth, not yet fashioned from the primal ether.\n\n317:1 This 'Master' is without doubt Confucius.\n\n317:2 The meaning and point of Confucius's question are not clear."

