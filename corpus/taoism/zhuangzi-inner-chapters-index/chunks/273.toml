body = "357 some do not acknowledge this, it is because the gate of Heaven 1 (in them) has not been opened.' 6.\n\nAt an interview with Lâo Tan, Confucius spoke to him of benevolence and righteousness.\n\nLâo Tan said, 'If you winnow chaff, and the dust gets into your eyes, then the places of heaven and earth and of the four cardinal points are all changed to you.\n\nIf musquitoes or gadflies puncture your skin, it will keep you all the night 2 from sleeping.\n\nBut this painful iteration of benevolence and righteousness excites my mind and produces in it the greatest confusion.\n\nIf you, Sir, would cause men not to lose their natural simplicity, and if you would also imitate the wind in its (unconstrained) movements, and stand forth in all the natural attributes belonging to you!--why must you use so much energy, and carry a great drum to seek for the son whom you have lost 3 ?\n\nThe snow-goose does not bathe every day to make itself white, nor the crow blacken itself every day to make itself black.\n\nThe natural simplicity of their black and white does not afford any ground for controversy; and the fame and praise which men like to contemplate do not make them greater than they naturally are.\n\nWhen the springs (supplying the pools) are dried up, the fishes huddle together on the dry land.\n\nThan that they should moisten one another there by their gasping, and keep one another wet by their milt, it would be better for them to forget one another in the rivers and lakes 4 .' p.\n\n358 From this interview with Lâo Tan, Confucius returned home, and for three days did not speak.\n\nHis disciples (then) asked him, saying, 'Master, you have seen Lâo Tan; in what way might you admonish and correct him?' Confucius said, 'In him (I may say) that I have now seen the dragon.\n\nThe dragon coils itself up, and there is its body; it unfolds itself and becomes the dragon complete.\n\nIt rides on the cloudy air, and is nourished by the Yin and Yang.\n\nI kept my mouth open, and was unable to shut it;--how could I admonish and correct Lâo Tan?' 7.\n\nDze-kung 1 said, 'So then, can (this) man indeed sit still as a representative of the dead, and then appear as the dragon?\n\nCan his voice resound as thunder, when he is profoundly still?\n\nCan he exhibit himself in his movements like heaven and earth?\n\nMay I, Zhze, also get to see him?' Accordingly with a message from Confucius he went to see Lâo Tan.\n\nLâo Tan was then about to answer (his salutation) haughtily in the hall, but he said in a low voice, 'My years have rolled on and are passing away, what do you, Sir, wish to admonish me about?' Dze-kung replied, 'The Three Kings and Five Tîs 2 ruled p.\n\n359 the world not in the same way, but the fame that has accrued to them is the same.\n\nHow is it that you alone consider that they were not sages?' 'Come forward a little, my son.\n\nWhy do you say that (their government) was not the same?' 'Yâo,' was the reply, 'gave the kingdom to Shun, and Shun gave it to Yü.\n\nYü had recourse to his strength, and Thang to the force of arms.\n\nKing Wän was obedient to Kâu (-hsin), and did not dare to rebel; king Wû rebelled against Kâu, and would not submit to him."

