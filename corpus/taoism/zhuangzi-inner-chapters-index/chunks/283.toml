[content]
body = "368:2 'Vulgar' must mean 'common,' and 'the vulgar learning' is the teaching popular in the time of our author, and which he regarded as contrary to the principles of Tâoism, of which he was an adherent.\n\nThe Chinese critics say that 'vulgar' here is used as the opposite of 'true.' 368:3 is generally explained by , 'to confuse,' but I cannot construe the sentence with that meaning of the term.\n\nIn the Khang-hsî dictionary which I have followed, the character is defined by with special reference to this passage.\n\n368:4 This sentence is the clue to the author's aim in the whole Book.\n\nThe 'knowledge' is defined by , 'the faculty of perception and apprehension.' 369:1 These 'men of old' were what we may call 'primeval men;' men in the lowest stage of development; but which our author considered to be the highest or paradisiacal condition of their nature.\n\n370:1 Kwang-dze gives no hint of how long he considered this highest condition to have lasted.\n\nSui-zän, 'the man of the Burning Speculum,' 'the Fire-producer,' whom Williams calls 'the Prometheus of China,' appears before Fû-hsî, as the first in the line of the Rulers of the world, who broke up the Primal Unity.\n\n370:2 These were Yâo and Shun, named from the principalities over which their fathers ruled.\n\n370:3 'The streams' were the methods of culture that arose after the simple virtues and spontaneity of the Tâo were lost.\n\n371:1 It is the same character in the text which I have been obliged to translate thus differently,-- .\n\n372:1 That is, worldly distinction.\n\n372:2 Because they depend on others.\n\nCompare Mencius VI, i, ch.\n\n17, 2.\n\nNext: Book XVII: Khiû Shui, or 'The Floods of Autumn.'"

