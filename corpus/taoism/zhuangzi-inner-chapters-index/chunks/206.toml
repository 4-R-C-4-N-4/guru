[content]
body = "Shû-shan or Shû hill was, probably, where he dwelt:--'Toeless of Shû hill.' 229:1 'Heaven' here is a synonym of Tâo.\n\nPerhaps the meaning is 'unavoidable;' it is so in the Tâoistic order of things.\n\n229:2 It was in the sixteenth year of duke Âi that Confucius died.\n\nÂi was marquis of Lû from B.C.\n\n494 to 468.\n\n229:3 The account of Âi-thâi Tho is of course Kwang-dze's own fabrication.\n\nÂi-thâi is understood to be descriptive of his ugliness, and Tho to be his name.\n\n229:4 Perhaps this was spoken by his wife before their marriage.\n\n230:1 One sees dimly the applicability of this illustration to the case in hand.\n\nWhat made Âi-thâi Tho so much esteemed was his mental power, quite independent of his ugly person.\n\n231:1 See the Lî Kî VIII, i, 7; but the applicability of these two illustrations is not so clear.\n\n231:2 These two have force as in 'reasoning from the less to the greater.' With the latter of the two compare the mosaical provision in Deuteronomy xxiv.\n\n5.\n\n231:3 'Powers' are the capacities of the nature,--the gift of the Tâo.\n\n'Virtue' is the realisation or carrying out of those capacities.\n\n232:1 Specially the season of complacent enjoyment.\n\n232:2 So, in Lin Hsî-kung; but the meaning has to be forced out of the text.\n\n232:3 The disciple Min Sun or Min Dze-Khien.\n\n233:1 These two men are undoubtedly inventions of Kwang-dze.\n\nThey are brought before us, not by surnames and names, but by their several deformities.\n\n233:2 The first of the five presiding chiefs; marquis of Khî from B.C.\n\n685 to 643.\n\n233:3 Lin Hsî-kung wonders whether the story of the man who was so taken with the charms of a one-eyed courtesan, that he thought other women all had an eye too many, was taken from this!\n\n234:1 Lû Shû-kih maintains here that 'the Tâo' and 'Heaven' have the same meaning; nor does he make any distinction between mâo ( ), 'the personal appearance,' and hsing ( ), 'the figure' or 'bodily form.' 234:2 Compare in the Tâo Teh King expressions in li, 2, and lv, 5.\n\n235:1 Apparently a gross meaning attached by Hui-dze to Kwang-dze's words.\n\n235:2 Kwang-dze beats down his opponent, and contemptuously refers to some of his well-known peculiarities;--as in II, par.\n\n5, XXXIII, par.\n\n7, and elsewhere.\n\nNext: Book VI: Tâ Zung Shih, or 'The Great and Most Honoured Master'"

