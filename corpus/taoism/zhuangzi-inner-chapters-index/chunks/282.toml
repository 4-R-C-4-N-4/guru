[content]
body = "The forms extinguished the (primal) simplicity, till the mind was drowned by their multiplicity.\n\nAfter this the people began to be perplexed and disordered, and had no way by which they might return to their true nature, and bring back their original condition.\n\n3.\n\nLooking at the subject from this point of view, we see how the world lost 1 the (proper) course, and how the course (which it took) only led it further astray 1 .\n\nThe world and the Way, when they came together, being (thus) lost to each other, how could the men of the Way make themselves conspicuous in the world?\n\nand how could the world rise to an appreciation of the Way?\n\nSince the Way had no means to make itself conspicuous in the world, and the world had no means of rising to an appreciation of the Way, though sagely men might not keep among the hills and forests, their virtue was hidden;--hidden, but not because they themselves sought to hide it.\n\nThose whom the ancients called 'Retired Scholars' did not conceal their persons, and not allow themselves to be seen; they did not shut up their words, and refuse to give utterance to them; they did not hide away their knowledge, and refuse to bring it forth.\n\nThe conditions laid on them by the times were very much awry.\n\nIf the conditions of the times had allowed them to act in the world on a great scale, they would have brought back the state of unity without any trace being perceived (of how p.\n\n372 they did so), When those conditions shut them up entirely from such action, they struck their roots deeper (in themselves), were perfectly still and waited.\n\nIt was thus that they preserved (the Way in) their own persons.\n\n4.\n\nThe ancients who preserved (the Way in) their own persons did not try by sophistical reasonings to gloss over their knowledge; they did not seek to embrace (everything in) the world in their knowledge, nor to comprehend all the virtues in it.\n\nSolitary and trembling they remained where they were, and sought the restoration of their nature.\n\nWhat had they to do with any further action?\n\nThe Way indeed is not to be pursued, nor (all) its characteristics to be known on a small scale.\n\nA little knowledge is injurious to those characteristics; small doings are injurious to the Way;--hence it is said, 'They simply rectified themselves.' Complete enjoyment is what is meant by 'the Attainment of the Aim.' What was anciently called 'the Attainment of the Aim' did not mean the getting of carriages and coronets 1 ; it simply meant that nothing more was needed for their enjoyment.\n\nNow-a-days what is called 'the Attainment of the Aim' means the getting of carriages and coronets.\n\nBut carriages and coronets belong to the body; they do not affect the nature as it is constituted.\n\nWhen such things happen to come, it is but for a time; being but for a time, their coming cannot be obstructed and their going cannot be stopped 2 .\n\nTherefore we should not p.\n\n373 because of carriages and coronets indulge our aims, nor because of distress and straitness resort to the vulgar (learning and thinking); the one of these conditions and the other may equally conduce to our enjoyment, which is simply to be free from anxiety.\n\nIf now the departure of what is transient takes away one's enjoyment, this view shows that what enjoyment it had given was worthless.\n\nHence it is said, 'They who lose themselves in their pursuit of things, and lose their nature in their study of what is vulgar, must be pronounced people who turn things upside down.' Footnotes 368:1 See pp.\n\n147 , 148 ."

