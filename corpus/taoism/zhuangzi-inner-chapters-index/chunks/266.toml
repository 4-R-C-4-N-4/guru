body = "'Then,' said the other, 'what you, my Ruler, are reading are only the dregs and sediments of those old men.' The duke said, 'How should you, a wheelwright, have anything to say about the book which I am reading?\n\nIf you can explain yourself, very well; if you cannot, you shall die!' The wheelwright said, 'Your servant will look at the thing from the point of view of his own art.\n\nIn making a wheel, if I proceed gently, that is pleasant enough, but the workmanship is not strong; if I proceed violently, that is toilsome and the joinings do not fit.\n\nIf the movements of my hand are neither (too) gentle nor (too) violent, the idea in my mind is realised.\n\nBut I cannot tell (how to do this) by word of mouth; there is a knack in it.\n\nI cannot teach the knack to my son, nor can my son learn it from me.\n\nThus it is that I am in my seventieth year, and am (still) making wheels in my old age 1 .\n\nBut these ancients, and what it was not possible for them to Convey, are dead and gone:--so then what you, my Ruler, are reading is but their dregs and sediments!' Footnotes 330:1 See pp.\n\n144 , 145 .\n\n330:2 That is, its operation is universal.\n\nThe Chinese critics generally explain 'accumulation' here by 'rest,' which is not quite the idea.\n\n330:3 Such is the meaning here of the as in the Tâo Teh King, chaps.\n\n2, 8, and often.\n\n331:1 here, is contracted in many editions into which some have mistaken for .\n\n331:2 Such are the natural characteristics of the Tâoistic mind.\n\n331:3 Implying cessation from all thought and purpose.\n\n332:1 Compare in Bk.\n\nVI, pars.\n\n13 and 7.\n\n332:2 They do not cease to be, but only become transformed or changed.\n\n333:1 I suppose that from 'It is said' to this is all quotation, but from what book we do not know.\n\n333:2 'The virtue,' or attribute; = the way.\n\n334:1 'Three hosts' constituted the military force of one of the largest states.\n\n334:2 The bow, the club, the spear, the lance, the javelin.\n\nOther p.\n\n335 enumerations of them are given.\n\nSee the 'Officers of Kâu,' Bk.\n\nXXXII.\n\n335:1 Branding, cutting off the nose, cutting off the feet, castration, death.\n\n335:2 I read here (not ) .\n\n336:1 The meaning, probably, is 'spontaneity.' 337:1 We cannot tell what book or books.\n\n338:1 So, in the 'Spring and Autumn' Chronicle, the rightful reigning sovereign is ordinarily designated, 'Heaven's King.' It is not a Tâoistic mode of speaking of him.\n\n338:2 It is supposed that Confucius, disappointed by his want of p.\n\n339 success, wished to deposit the writings or books which he prized so much in the Royal Library, that they might not be lost, and be available for some future teacher, more fortunate than himself.\n\n339:1 The name of the Royal Library ( ); meaning, perhaps, 'Approved.' 339:2 That is, help him to get his books deposited in the Library.\n\n339:3 Meaning, perhaps, the 'Spring and Autumn,' containing a chronicle of twelve marquises of Lû.\n\nWe know of no collection in the time of Confucius which could be styled the 'Twelve Classics.' 339:4 is to be read shui.\n\n340:1 The unselfishness was not spontaneous."

