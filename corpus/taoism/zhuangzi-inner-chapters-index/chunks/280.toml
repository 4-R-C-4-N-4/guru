[content]
body = "These questions we cannot answer.\n\nWe have met indeed already with the same characteristics of the Tâo; but Kwang-Sze is not likely to be quoting p.\n\n365 himself.\n\nOn the 'It is said,' and the five recurrences of the phrase below, Lû Shû-kih says that Kwang-dze is quoting from sentences current among the adherents of Tâoism,--the sentence-makers often drawn on by Lâo-dze; compare the Tâo Teh King, ch.\n\nxli.\n\n365:1 See Book XIII, par.\n\n2.\n\n367:1 Both of the seaboard states of Wû and Yüeh were famous for the swords produced in them.\n\nKan-yüeh appears to have been the name of a valley or place in Wû, famous for the weapons made in it; unless indeed we should read , instead of and take as equivalent to , which is found in the Zo Khwan as the name of Yüeh.\n\n367:2 Might be translated 'the subtle spirit.' 367:3 A very remarkable use of Tî ( ) for the human spirit in the sense of God.\n\nThe subject of the clause, let the reader observe, is that spirit, and not the Tâo.\n\nSee pp.\n\n146, 147, where I have said something about it.\n\n367:4 See the full account of 'the True Man' in Book VI.\n\nNext: Book XVI: Shan Hsing, or 'Correcting the Nature.'"

