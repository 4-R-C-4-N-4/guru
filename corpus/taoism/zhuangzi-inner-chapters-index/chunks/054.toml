[content]
body = "Sacred Texts Taoism Index Previous Next 9. 9. 1. It is better to leave a vessel unfilled, than to attempt to carry it when it is full. If you keep feeling a point that has been sharpened, the point cannot long preserve its sharpness. 2. When gold and jade fill the hall, their possessor cannot keep them safe. When wealth and honours lead to arrogancy, this brings its evil on itself. When the work is done, and one's name is becoming distinguished, to withdraw into obscurity is the way of Heaven. ; but I cannot give a satisfactory rendering of this title. The teaching of the chapter is, that fulness and complacency in success are contrary to the Tâo. The first clauses of the two sentences in par. 1, are instances of the 'inverted' style not uncommon in the oldest composition. The way of Heaven' = 'the Heavenly Tâo' exemplified by man. Next: Chapter 10"

