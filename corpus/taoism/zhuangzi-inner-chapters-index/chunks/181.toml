[content]
body = "How do you know that when I say \"I know it,\" I really (am showing that) I do not know it, and that when I say \"I do not know it,\" I really am showing that I do know it 1 .' And let me ask you some questions:--'If a man sleep in a damp place, he will have a pain in his loins, and half his body will be as if it were dead; but will it be so with an eel?\n\nIf he be living in a tree, he will be frightened and all in a tremble; but will it be so with a monkey?\n\nAnd does any one of the three know his right place?\n\nMen eat animals that have been fed on grain and grass; deer feed on the thickset grass; centipedes enjoy small snakes; owls and crows delight in mice; but does any one of the four know the right taste?\n\nThe dog-headed monkey finds its mate in the female gibbon; the elk and the axis deer cohabit; and the eel enjoys itself with other fishes.\n\nMâo Zhiang 2 and Lî Kî 2 were accounted by men to be most beautiful, but when fishes saw them, they dived deep in the water from them; when birds, they flew from them aloft; and p.\n\n192 when deer saw them, they separated and fled away 1 .\n\nBut did any of these four know which in the world is the right female attraction?\n\nAs I look at the matter, the first principles of benevolence and righteousness and the paths of approval and disapproval are inextricably mixed and confused together:--how is it possible that I should know how to discriminate among them?' Nieh Khüeh said (further), 'Since you, Sir, do not know what is advantageous and what is hurtful, is the Perfect man also in the same way without the knowledge of them?' Wang i replied, 'The Perfect man is spirit-like.\n\nGreat lakes might be boiling about him, and he would not feel their heat; the Ho and the Han might be frozen up, and he would not feel the cold; the hurrying thunderbolts might split the mountains, and the wind shake the ocean, without being able to make him afraid.\n\nBeing such, he mounts on the clouds of the air, rides on the sun and moon, and rambles at ease beyond the four seas.\n\nNeither death nor life makes any change in him, and how much less should the considerations of advantage and injury do so 2 !' 9.\n\nKhü Zhiâo-dze 3 asked Khang-wû Dze 3 , saying, p.\n\n193 'I heard the Master (speaking of such language as the following):--\"The sagely man does not occupy himself with worldly affairs.\n\nHe does not put himself in the way of what is profitable, nor try to avoid what is hurtful; he has no pleasure in seeking (for anything from any one); he does not care to be found in (any established) Way; he speaks without speaking; he does not speak when he speaks; thus finding his enjoyment outside the dust and dirt (of the world).\" The Master considered all this to be a shoreless flow of mere words, and I consider it to describe the course of the Mysterious Way.--What do you, Sir, think of it?' Khang-wû dze replied, 'The hearing of such words would have perplexed even Hwang-Tî, and how should Khiû be competent to understand them?\n\nAnd you, moreover, are too hasty in forming your estimate (of their meaning)."

