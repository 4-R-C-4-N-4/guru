[content]
body = "A third class held that there was such recognition, but there had not begun to be any expression of different opinions about it.\n\np.\n\n186 It was through the definite expression of different opinions about it that there ensued injury to (the doctrine of) the Tâo.\n\nIt was this injury to the (doctrine of the) Tâo which led to the formation of (partial) preferences.\n\nWas it indeed after such preferences were formed that the injury came?\n\nor did the injury precede the rise of such preferences?\n\nIf the injury arose after their formation, Kâo's method of playing on the lute was natural.\n\nIf the injury arose before their formation, there would have been no such playing on the lute as Kâo's 1 .\n\nKâo Wän's playing on the lute, Shih Kwang's indicating time with his staff, and Hui-dze's (giving his views), while leaning against a dryandra tree (were all extraordinary).\n\nThe knowledge of the three men (in their several arts) was nearly perfect, and therefore they practised them to the end of their lives.\n\nThey loved them because they were different from those of others.\n\nThey loved them and wished to make them known to others.\n\nBut as they could not be made clear, though they tried to make them so, they ended with the obscure (discussions) about 'the hard' and 'the White.' And their sons 2 , moreover, with all the threads of their fathers' compositions, yet to the end of their lives accomplished nothing.\n\nIf they, proceeding in this way, could be said to have succeeded, then am I also successful; p.\n\n187 if they cannot be pronounced successful, neither I nor any other can succeed.\n\nTherefore the scintillations of light from the midst of confusion and perplexity are indeed valued by the sagely man; but not to use one's own views and to take his position on the ordinary views is what is called using the (proper) light.\n\n6.\n\nBut here now are some other sayings 1 :--I do not know whether they are of the same character as those which I have already given, or of a different character.\n\nWhether they be of the same character or not when looked at along with them, they have a character of their own, which cannot be distinguished from the others.\n\nBut though this be the case, let me try to explain myself.\n\nThere was a beginning.\n\nThere was a beginning before that beginning 2 .\n\nThere was a beginning previous to that beginning before there was the beginning.\n\nThere was existence; there had been no existence.\n\nThere was no existence before the beginning of that no existence 2 .\n\nThere was no existence previous to the no existence before there was the beginning of the no existence.\n\nIf suddenly there was nonexistence, we do not know whether it was really anything existing, or really not existing.\n\nNow I have said what I have said, but I do not know whether what I have said be really anything to the point or not.\n\np.\n\n188 Under heaven there is nothing greater than the tip of an autumn down, and the Thâi mountain is small.\n\nThere is no one more long-lived than a child which dies prematurely, and Phäng Zû did not live out his time.\n\nHeaven, Earth, and I were produced together, and all things and I are one.\n\nSince they are one, can there be speech about them?\n\nBut since they are spoken of as one, must there not be room for speech?\n\nOne and Speech are two; two and one are three.\n\nGoing on from this (in our enumeration), the most skilful reckoner cannot reach (the end of the necessary numbers), and how much less can ordinary people do so!\n\nTherefore from non-existence we proceed to existence till we arrive at three; proceeding from existence to existence, to how many should we reach?"

