[content]
body = "Hwang Tî, the first year of whose reign is placed in B.C.\n\n2697, is often introduced as a seeker of the Tâo, and is occasionally condemned as having been one of the first to disturb its rule in men's minds and break up 'the State of Perfect Unity.' He mentions several sovereigns of whom we can hardly find a trace in the records of history as having ruled in the primeval period, and gives us more than one description of the condition of the world during that happy time 1 .\n\nI do not think that Kwang-dze had any historical evidence for the statements which he makes about those early days, the men who flourished in them, and their ways.\n\nHis narratives are for the most part fictions, in which the names and incidents are of his own devising.\n\nThey are no more true as matters of fact than the accounts of the characters in Bunyan's Pilgrim's Progress are true, with reference to any particular individuals; but as these last are grandly true of myriads of minds in different ages, so may we read in Kwang-dze's stories the thoughts of Tâoistic men beyond the restrictions of place and time.\n\nHe believed that those thoughts were as old as the men to whom he attributed them.\n\nI find in his belief a ground for believing myself that to Tâoism, as well as to Confucianism, we ought to attribute a much earlier origin than the famous men whose names they bear.\n\nPerhaps they did not differ so much at first as they came afterwards to do in the hands of Confucius and Lâo-dze, both great thinkers, the one more of a moralist, and the other more of a metaphysician.\n\nWhen and how, if they were ever more akin than they came to be, their divergence took place, are difficult questions on which it may be well to make some remarks after we have tried to set forth the most important principles of Tâoism.\n\nThose principles have to be learned from the treatise of Lâo-dze and the writings of Kwang-dze.\n\nWe can hardly p.\n\n4 say that the Tâoism taught in them is the Tâoism now current in China, or that has been current in it for many centuries; but in an inquiry into the nature and origin of religions these are the authorities that must be consulted for Tâoism, and whose evidence must be accepted.\n\nThe treatise, 'Actions and the Responses to them,' will show one of the phases of it at a much later period.\n\nFootnotes 2:1 The sixth chapter of Lao's treatise, that about 'the Spirit of the Valley,' is referred to in Lieh-dze (I, 1 b ), as being from Hwang Tî, from which the commentator Tû Tâo-kien (about A, D.\n\n1300) takes occasion to say: 'From which we know that Lâo-dze was accustomed to quote in his treatise passages from earlier records,--as when he refers to the remarks of \"some sage,\" of \"some ancient,\" of \"the sentence-makers,\" and of \"some writer on war.\" In all these cases he is clearly introducing the words of earlier wise men.\n\nThe case is like that of Confucius when he said, \"I am a transmitter and not a maker,\" &c.' Found in Ziâo Hung, in loc.\n\n3:1 See in Books IX, X, and XII.\n\nNext: Chapter II: The Texts of the Tao Teh King and Kwang Sze Shû, as Regards Their Authenticity and Genuineness, and the Arrangement of Them"

