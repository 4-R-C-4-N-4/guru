body = "Sacred Texts Taoism Index Previous Next BOOK VII.\n\nYING TÎ WANG.\n\nThe first of the three characters in this title renders the translation of it somewhat perplexing.\n\nYing has different meanings according as it is read in the first tone or in the third.\n\nIn the first tone it is the symbol of what is right, or should be; in the third tone of answering or responding to.\n\n1 prefer to take it here in the first tone.\n\nAs Kwo, Hsiang says, 'One who is free from mind or purpose of his own, and loves men to become transformed of themselves, is fit to be a Ruler or a King,' and as Zhui Kwan, another early commentator, says, 'He whose teaching is that which is without words, and makes men in the world act as if they were oxen or horses, is fit to be a Ruler or a King.' This then is the object of the Book--to describe that government which exhibits the Tâo equally in the rulers and the ruled, the world of men all happy and good without purpose or effort.\n\nIt consists of seven paragraphs.\n\nThe first shows us the model ruler in him of the line of Thâi, whom I have not p.\n\n137 succeeded in identifying.\n\nThe second shows us men under such a rule, uncontrolled and safe like the bird that flies high beyond the reach of the archer, and the mouse secure in its deep hole from its pursuers.\n\nThe teacher in this portion is Khieh-yü, known in the Confucian school as 'the madman of Khû,' and he delivers his lesson in opposition to the heresy of a Zäh-kung Shih, or 'Noon Beginning.' In the third paragraph the speakers are 'a nameless man,' and a Thien Kän, or 'Heaven Root.' In the fourth paragraph Lâo-dze himself appears upon the stage, and lectures a Yang Dze-kü, the Yang Kû of Mencius.\n\nHe concludes by saying that 'where the intelligent kings took their stand could not be fathomed, and they found their enjoyment in (the realm of) nonentity.' The fifth paragraph is longer, and tells us of the defeat of a wizard, a physiognomist in Käng, by Hû-dze, the master of the philosopher Lieh-dze, who is thereby delivered from the glamour which the cheat was throwing round him.\n\nI confess to not being able to understand the various processes by which Hû-dze foils the wizard and makes him run away.\n\nThe whole story is told, and at greater length, in the second book of the collection ascribed to Lieh-dze, and the curious student may like to look at the translation of that work by Mr.\n\nErnst Faber (Der Naturalismus bei den alten Chinesen sowohl nach der Seite des Pantheismus als des Sensualismus, oder die Sämmtlichen Werke des Philosophen Licius, 1877).\n\nThe effect of the wizard's defeat on Lieh-dze was great.\n\nHe returned in great humility to his house, and did not go out of it for three years.\n\nHe did the cooking for his wife, and fed the pigs as if he were feeding men.\n\nHe returned to pure simplicity, and therein continued to the end of his life.\n\nBut I do not see the connexion between this narrative and the government of the Rulers and Kings.\n\nThe sixth paragraph is a homily by our author himself on 'non-action.' It contains a good simile, comparing the mind of the perfect man to a mirror, which reflects faithfully what comes before it, but does not retain any image of it, when the mind is gone.\n\np."

