[content]
body = "The characteristics both of Heaven and man are dealt with more fully by Kwang than by Lâo.\n\nIn the conclusion of his eleventh Book, for instance, he says:--'What do we mean by Tâo?\n\nThere is the Tâo (or Way) of Heaven, and there is the Tâo of man.\n\nActing without action, and yet attracting all honour, is the Way of Heaven.\n\nDoing and being embarrassed thereby is the Way of man.\n\nThe Way of Heaven should play the part of lord; the Way of man, the part of minister.\n\nThe two are far apart, and should be distinguished from each other.' p.\n\n17 In his next Book (par.\n\n2), Kwang-dze tells us what he intends by 'Heaven:'--'Acting without action,--this is what is called Heaven.' Heaven thus takes its law from the Tâo.\n\n'The oldest sages and sovereigns attained to do the same,'--it was for all men to aim at the same achievement.\n\nAs they were successful, 'vacancy, stillness, placidity, tastelessness, quietude, silence, and non-action' would be found to be their characteristics, and they would go on to the perfection of the Tâo 1 .\n\nThe employment of Thien by the Confucianists, as of Heaven by ourselves, must be distinguished therefore from the Tâoistic use of the name to denote the quiet but mighty influence of the impersonal Tâo; and to translate it by 'God' only obscures the meaning of the Tâoist writers.\n\nThis has been done by Mr.\n\nGiles in his version of Kwang-dze, which is otherwise for the most part so good.\n\nEverywhere on his pages there appears the great name 'God;'--a blot on his translation more painful to my eyes and ears than the use of' Nature' for Tâo by Mr.\n\nBalfour.\n\nI know that Mr.\n\nGiles's plan in translating is to use strictly English equivalents for all kinds of Chinese terms 2 .\n\nThe plan is good where there are in the two languages such strict equivalents; but in the case before us there is no ground for its application.\n\nThe exact English equivalent for the Chinese thien is our heaven.\n\nThe Confucianists often used thien metaphorically for the personal Being whom they denominated Tî (God) and Shang Tî (the Supreme God), and a translator may occasionally, in working on books of Confucian literature, employ our name God for it.\n\nBut neither Lâo nor Kwang ever attached anything like our idea of God to it; and when one, in working on books of early Tâoist literature, translates thien by God, such a rendering must fail to produce in an English reader a correct apprehension of the meaning.\n\nThere is also in Kwang-dze a peculiar usage of the name Thien.\n\nHe applies it to the Beings whom he introduces as p.\n\n18 Peculiar usage of Thien in Kwang-dze.\n\n[paragraph continues] Masters of the Tâo, generally with mystical appellations in order to set forth his own views.\n\nTwo instances from Book XI will suffice in illustration of this.\n\nIn par.\n\n4, Hwang-Tî does reverence to his instructor Kwang Khäng-dze 1 , saying, 'In Kwang Khäng-dze we have an example of what is called Heaven,' which Mr.\n\nGiles renders 'Kwang Khäng Dze is surely God.' In par."

