[content]
body = "Now-a-days, however, such is the state of things that you shall see the people stretching out their necks, and standing on tiptoe, while they say, 'In such and such a place there is a wise and able man.' Then they carry with them whatever dry provisions they may have left, and hurry towards it, abandoning their parents in their homes, and neglecting the service of their rulers abroad.\n\nTheir footsteps may be traced in lines from one state to another, and the ruts of their chariot-wheels also for more than a thousand lî.\n\nThis is owing to the error of their superiors in their (inordinate) fondness for knowledge.\n\nWhen those superiors do really love knowledge, but do not follow the (proper) course, the whole world is thrown into great confusion.\n\nHow do I know that the case is so?\n\nThe knowledge shown in the (making of) bows, cross-bows, hand-nets, stringed arrows, and contrivances with springs is great, but the birds are troubled by them p.\n\n289 above; the knowledge shown in the hooks, baits, various kinds of nets, and bamboo traps is great, but the fishes are disturbed by them in the waters; the knowledge shown in the arrangements for setting nets, and the nets and snares themselves, is great, but the animals are disturbed by them in the marshy grounds.\n\n(So), the versatility shown in artful deceptions becoming more and more pernicious, in ingenious discussions as to what is hard and what is white, and in attempts to disperse the dust and reconcile different views, is great, but the common people are perplexed by all the sophistry.\n\nHence there is great disorder continually in the world, and the guilt of it is due to that fondness for knowledge.\n\nThus it is that all men know to seek for the knowledge that they have not attained to; and do not know to seek for that which they already have (in themselves); and that they know to condemn what they do not approve (in others), and do not know to condemn what they have allowed in themselves;--it is this which occasions the great confusion and disorder.\n\nIt is just as if, above, the brightness of the sun and moon were darkened; as if, beneath, the productive vigour of the hills and streams were dried up; and as if, between, the operation of the four seasons were brought to an end:--in which case there would not be a single weak and wriggling insect, nor any plant that grows up, which would not lose its proper nature.\n\nGreat indeed is the disorder produced in the world by the love of knowledge.\n\nFrom the time of the three dynasties downwards it has been so.\n\nThe plain and honest-minded people are neglected, and the plausible representations of restless spirits p.\n\n290 received with pleasure; the quiet and unexciting method of non-action is put away, and pleasure taken in ideas garrulously expressed.\n\nIt is this garrulity of speech which puts the world in disorder.\n\nFootnotes 281:1 See pp.\n\n141 , 142 .\n\n282:1 The meaning is plain; but to introduce the various geographical terms would make the translation cumbrous.\n\nThe concluding is perplexing.\n\n282:2 This event is mentioned in the Analects, XIV, xxii, where the perpetrator of the murder is called Khän Khäng-dze, and Khän Häng.\n\nHäng was his name, and Khäng the honorary title given to him after his death.\n\nThe family to which he belonged had originally taken refuge in Khî from the state of Khän in B.\n\nC.\n\n672.\n\nWhy and when its chiefs adopted the surname Thien instead of Khän is not well known.\n\nThe murder took place in 482."

