[content]
body = "Did he mean to object to Lao-dze that all his disquisitions about the Tâo as the one thing to be studied and followed were unnecessary?\n\n317:3 Compare in Bk.\n\nVII, par.\n\n4.\n\n318:1 Their action is like that of Heaven, silent but most effective, without motive from within or without, simply from the impulse of the Tâo.\n\n318:2 These two men are only known by the mention of them here.\n\nThey must have been officers of Lû, Kî Khêh a member of the great Kî or Kî-sun family of that state.\n\nHe would appear also to have been the teacher of the other; if, indeed, they were real personages, and not merely the production of Kwang-dze's imagination.\n\n318:3 That is any lessons or instructions from you, my master, which I should communicate to him.\n\n319:1 The Chinese phrase here is explained by Dr.\n\nWilliams:--'A vivifying influence, a vapour or aura producing things.' 321:1 Confucius.\n\n322:1 The 'arts of the Embryonic Age' suggests the idea of the earliest men in their struggles for support; not the Tâo of Heaven in its formation of the universe.\n\nBut the whole of the paragraph, not in itself uninteresting, is believed to be a spurious introduction, and not the production of Kwang-dze.\n\n322:2 These are not names of men, but like Yün Kiang and Hung Mung in the fifth paragraph of the last Book.\n\nBy Kim Ming, it is said, we are to understand 'the great primal ether,' and by Yüan p.\n\n323 Fung, 'the east wind.' Why these should discourse together as they are here made to do, only Kwang-dze himself could tell.\n\n323:1 Literally, 'men with their cross eyes;' an appellation for mankind, men having their eyes set across their face more on the same plane than other animals;--'an extraordinary application of the characters,' says Lin Hsî-kung.\n\n323:2 The text is simply 'virtuous men;' but the reply justifies us in giving the meaning as 'kindly' as well.\n\nhas often this signification.\n\n324:1 'When no human element had come in to mar the development of the Tâo.\n\n324:2 If these be the names of real personages, they must have been of the time of king Wû, about B.\n\nC.\n\n1122.\n\n324:3 Generally understood to mean 'He is not equal to the Lord of p.\n\n325 Yü,' or Shun.\n\nThe meaning which I have given is that propounded by Hû Wan-ying, and seems to agree better with the general purport of the paragraph.\n\n325:1 Ashamed that he had not been able to keep his father from getting sick, and requiring to be thus attended to.\n\n326:1 We can hardly tell whether this paragraph should be understood as a continuation of Khih-kang's remarks, or as from Kwang-dze himself.\n\nThe meaning here is that every one feels that this opinion is right, without pausing to reason about it.\n\n326:2 See the Yî King, Appendix III, ii, 15, where this letting his robes hang down is attributed to Shun.\n\nOught we to infer from this that in this paragraph we have Khih-kang still speaking about and against the common opinion of Shun's superiority to king Wû?\n\n327:1 The names of two songs, favourites with the common people.\n\n327:2 I shall only feel the more that I am alone without any to sympathise with me, and be the more sad."

