[content]
body = "138 The last paragraph is an ingenious and interesting allegory relating how the gods of the southern and northern seas brought Chaos to an end by boring holes in him.\n\nThereby they destroyed the primal simplicity, and according to Tâoism did Chaos an injury!\n\nOn the whole I do not think that this Book, with which the more finished essays of Kwang-dze come to an end, is so successful as those that precede it.\n\nNext: Book VIII.\n\nPhien Mâu"

