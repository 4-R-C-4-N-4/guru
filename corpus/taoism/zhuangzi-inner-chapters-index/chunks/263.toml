[content]
body = "Hence it is said in the Book 1 , 'There are objects and there are their names.' Objects and their names the ancients had; but they did not put them in the foremost place.\n\nWhen the ancients spoke of the Great Tâo, it was only after four other steps that they gave a place to 'Objects and their Names,' and after eight steps that they gave a place to 'Rewards and Penalties.' If they had all at once spoken of 'Objects and their Names,' they would have shown an ignorance of what is the Root (of government); if they had all at once spoken of 'Rewards and Penalties,' they would have shown an ignorance of the first steps of it.\n\nThose whose words are thus an inversion of the (proper) course, or in opposition to it, are (only fit to be) ruled by others;-how can they rule others?\n\nTo speak all at once of 'Objects and their Names,' and of 'Rewards and Penalties,' only shows that the speaker knows the instruments of government, but does not know the method of it, is fit to be used as an instrument in the world, but not fit to use others as his instruments:--he is what we call a mere sophist, a man of one small idea.\n\np.\n\n338 Ceremonies, laws, numbers, measures, with all the minutiae of jurisprudence, the ancients had; but it is by these that inferiors serve their superiors; it is not by them that those superiors nourish the world.\n\n6.\n\nAnciently, Shun asked Yâo, saying, 'In what way does your Majesty by the Grace of Heaven 1 exercise your mind?' The reply was, 'I simply show no arrogance towards the helpless; I do not neglect the poor people; I grieve for those who die; I love their infant children; and I compassionate their widows.' Shun rejoined, 'Admirable, as far as it goes; but it is not what is Great.' How then,' asked Yâo, 'do you think I should do?' Shun replied, 'When (a sovereign) possesses the virtue of Heaven, then when he shows himself in action, it is in stillness.\n\nThe sun and moon (simply) shine, and the four seasons pursue their courses.\n\nSo it is with the regular phenomena of day and night, and with the movement of the clouds by which the rain is distributed.' Yâo said, 'Then I have only been persistently troubling myself!\n\nWhat you wish is to be in harmony with Heaven, while I wish to be in harmony with men.' Now (the Way of) Heaven and Earth was much thought of of old, and Hwang-Tî, Yâo, and Shun united in admiring it.\n\nHence the kings of the world of old did nothing, but tried to imitate that Way.\n\n7.\n\nConfucius went to the west to deposit (some) writings in the library of Kâu 2 , when Dze-lû counselled p.\n\n339 him, saying, 'I have heard that the officer in charge of this Käng 1 Repository of Kâu was one Lâo Tan, who has given up his office, and is living in his own house.\n\nAs you, Master, wish to deposit these writings here, why not go to him, and obtain his help (to accomplish your object) 2 .' Confucius said, 'Good;' and he went and saw Lâo Tan, who refused his assistance.\n\nOn this he proceeded to give an abstract of the Twelve Classics 3 to bring the other over to his views 4 .\n\nLâo Tan, however, interrupted him while he was speaking, and said, 'This is too vague; let me hear the substance of them in brief'."

