body = "How could I make use of feet?' The serpent said to the wind, 'I get along by moving my backbone and ribs, thus appearing to have some (bodily) means of progression.\n\nBut now you, Sir, rise with a blustering force in the North Sea, and go on in the same way to the South Sea;--seemingly without any such means.\n\nHow does it take place?' The wind said, 'Yes.\n\nWith such a blustering force I rise in the North Sea and go on to the: South Sea.\n\nBut you can point to me, and therein are superior to me, as you are also in treading on me.\n\nYet notwithstanding, it is only I who can break great trees, and blow down great houses.\n\nTherefore he whom all that are small cannot overcome is a great overcomer.\n\nBut it is only he who is the sagely man 1 that is the Great Conqueror (of all).' 9.\n\nWhen Confucius was travelling in Khwang 2 , p.\n\n386 some people of Sung (once) surrounded him (with a hostile intention) several ranks deep; but he kept singing to his lute without stopping.\n\nDze-lû came in, and saw him, and said, 'How is it, Master, that you are so pleased?' Confucius said, 'Come here, and I will tell you.\n\nI have tried to avoid being reduced to such a strait for a long time; and that I have not escaped shows that it was so appointed for me.\n\nI have sought to find a ruler that would employ me for a long time, and that I have not found one, shows the character of the time.\n\nUnder Yâo and Shun there was no one in the kingdom reduced to straits like mine; and it was not by their sagacity that men succeeded as they did.\n\nUnder Kieh and Kâu no (good and able man) in the kingdom found his way to employment; and it was not for (want of) sagacity that they failed to do so.\n\nIt was simply owing to the times and their character.\n\n2.\n\nPeople that do business on the water do not shrink from meeting iguanodons and dragons;--that is the courage of fishermen.\n\nThose who do business on land do not shrink from meeting rhinoceroses and tigers;--that is the courage of hunters.\n\nWhen men see the sharp weapons crossed before them, and look on death as going home;--that is the courage of the determined soldier.\n\nWhen he knows that his strait is determined for him, and that the employment of him by a ruler depends on the character of the time, and then meeting with great distress is yet not afraid;-that is the courage of the sagely man.\n\nWait, my good Yû, and you will see what there is determined for me in my lot.' A little afterwards, the leader of the armed men approached and took his leave, saying, 'We thought you were p.\n\n387 Yang Hû 1 , and therefore surrounded you.\n\nNow we see our mistake.' (With this) he begged to take his leave, and withdrew.\n\n10.\n\nKung-sun Lung 2 asked Mâu of Wei 3 , saying, 'When I was young, I learned the teachings of the former kings; and when I was grown up, I became proficient in the practice of benevolence and righteousness.\n\nI brought together the views that agreed and disagreed; I considered the questions about hardness and whiteness 4 ; I set forth what was to be affirmed and what was not, and what was allowable and what was not; I studied painfully the various schools of thought, and made myself master of the reasonings of all their masters."

