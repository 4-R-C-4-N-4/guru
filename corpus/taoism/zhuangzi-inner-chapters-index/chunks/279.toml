[content]
body = "He responds to the influence acting on him, and moves as he feels the pressure.\n\nHe rises to act only when he is obliged to do so.\n\nHe discards wisdom and the memories of the past; he follows the lines of his Heaven (-given nature); and therefore he suffers no calamity from Heaven, no involvement from things, no blame from men, and no reproof from the spirits of the dead 1 .\n\nHis life seems to float along; his death seems to be a resting.\n\nHe does not indulge any p.\n\n366 anxious doubts; he does not lay plans beforehand.\n\nHis light is without display; his good faith is without previous arrangement.\n\nHis sleep is untroubled by dreams; his waking is followed by no sorrows.\n\nHis spirit is guileless and pure; his soul is not subject to weariness.\n\nVacant and without self-assertion, placid and indifferent, he agrees with the virtue of Heaven.' Therefore it is said (further), 'Sadness and pleasure show a depraving element in the virtue (of those who feel them); joy and anger show some error in their course; love and hatred show a failure of their virtue.\n\nHence for the mind to be free from sorrow and pleasure is the perfection of virtue; to be of one mind that does not change is the perfection of quietude; to be conscious of no opposition is the perfection of vacancy; to have no intercourse with (external) things is the perfection of indifference; and to have no rebellious dissatisfactions is the perfection of purity.' 3.\n\nTherefore it is said (still further), 'If the body be toiled, and does not rest, it becomes worn out; if the spirit be used without cessation, it becomes toiled; and when toiled, it becomes exhausted.\n\nIt is the nature of water, when free from admixture, to be clear, and, when not agitated, to be level; while if obstructed and not allowed to flow, it cannot preserve its clearness;--being an image of the virtue of Heaven.' Hence it is said (once again), 'To be guileless and pure, and free from all admixture; to be still and uniform, without undergoing any change; to be indifferent and do nothing; to move and yet to act like Heaven:--this is the way to nourish the spirit.\n\nNow he who possesses a p.\n\n367 sword made at Kan-yüeh 1 preserves it carefully in a box, and does not dare to use it;--it is considered the perfection of valuable swords.\n\nBut the human spirit 2 goes forth in all directions, flowing on without limit, reaching to heaven above, and wreathing round the earth beneath.\n\nIt transforms and nourishes all things, and cannot be represented by any form.\n\nIts name is \"the Divinity (in man) 3 .\" It is only the path of pure simplicity which guards and preserves the Spirit.\n\nWhen this path is preserved and not lost, it becomes one with the Spirit; and in this ethereal amalgamation, it acts in harmony with the orderly operation of Heaven.' There is the vulgar saying, 'The multitude of men consider gain to be the most important thing; pure scholars, fame; those who are wise and able value their ambition; the sage prizes essential purity.' Therefore simplicity is the denomination of that in which there is no admixture; purity of that in which the spirit is not impaired.\n\nIt is he who can embody simplicity and purity whom we call the True Man 4 .\n\nFootnotes 363:1 See pp.\n\n146 , 147 .\n\n363:2 As did Shän-thû Tî.\n\nSee in Book VI, par.\n\n3.\n\n364:1 This is probably the meaning.\n\nThe text is simply:--'Bear passing, bird-stretching.' 364:2 'It is said:'--where?\n\nand by whom?"

