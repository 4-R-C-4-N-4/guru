[content]
body = "5 gives the gist of the chapter:--Man's always keeping before him the ideal of the Tâo, and, without purpose, simply doing whatever he finds to do; Tâo-like and powerful in all his sphere of action.\n\nI have followed the reading of the last character but one, which is given by Ziâo Hung instead of that found in Ho-shang Kung and Wang Pî.\n\nNext: Chapter 53"

