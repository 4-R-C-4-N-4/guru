body = "parts, the former called Tâo, and the latter Teh, meaning the Qualities or Characteristics of the Tâo, but this distinction of subjects is by no means uniformly adhered to.\n\nI referred already to the division of the whole into eighty-one short chapters (37 + 44), which is by common tradition attributed to Ho-shang Kung, or 'The old man of the Ho-side.' Another very early commentator, called Yen Zun or Yen Kün-phing, made a division into seventy-two chapters (40 + 32), under the influence, no doubt, of some p.\n\n9 mystical considerations.\n\nHis predecessor, perhaps, had no better reason for his eighty-one; but the names of his chapters were, for the most part, happily chosen, and have been preserved.\n\nWû Khäng arranged the two parts in sixty-seven chapters (31 + 36).\n\nIt is a mistake, however, to suppose, as even Mr.\n\nWylie with all his general accuracy did 1 , that Wû 'curtails the ordinary text to some extent.' He does not curtail, but only re-arranges according to his fashion, uniting some of Ho-shang Kung's chapters in one, and sometimes altering the order of their clauses.\n\nSze-mâ Khien tells us that, as the treatise came from Lâo-dze, it contained more than 5000 characters; that is, as one critic says, 'more than 5000 and fewer than 6000.' Ho-shang Kung's text has 5350, and one copy 5590; Wang Pî's, 5683, and one copy 5610.\n\nTwo other early texts have been counted, giving 5720 and 5635 characters respectively.\n\nThe brevity arises from the terse conciseness of the style, owing mainly to the absence of the embellishment of particles, which forms so striking a peculiarity in the composition of Mencius and Kwang-dze.\n\nIn passing on to speak, secondly and more briefly, of the far more voluminous writings of Kwang-dze, I may say that I do not know of any other book of so ancient a date as the Tâo Teh King, of which the authenticity of the origin and genuineness of the text can claim to be so well substantiated.\n\nII.\n\n7.\n\nIn the catalogue of the Han Library we have the entry of 'Kwang-dze in fifty-two books or sections.' By The Books of Kwang-dze.\n\nthe time of the Sui dynasty, the editions of his work amounted to nearly a score.\n\nThe earliest commentary that has come down to us goes by the name of Kwo Hsiang's.\n\nHe was an officer and scholar of the Zin dynasty, who died about the year 312.\n\nAnother officer, also of Zin, called Hsiang Hsiû, of rather an earlier date, had undertaken the same task, but left it incomplete; and his manuscripts coming (not, as it appears, by p.\n\n10 any fraud) into Kwo's hands, he altered and completed them as suited his own views, and then gave them to the public.\n\nIn the short account of Kwo, given in the twentieth chapter of the Biographies of the Zin history, it is said that several tens of commentators had laboured unsatisfactorily on Kwang's writings before Hsiang Hsiû took them in hand.\n\nAs the joint result of the labours of the two men, however, we have only thirty-three of the fifty-two sections mentioned in the Han catalogue.\n\nIt is in vain that I have tried to discover how and when the other nineteen sections were lost."

