[content]
body = "People came to see it in crowds as in a market place, but the mechanic did not look round at it, but held on his way without stopping.\n\nOne of his workmen, however, looked long and admiringly at it, and then ran on to his master, and said to him, 'Since I followed you with my axe and bill, I have never seen such a beautiful mass of timber as this.\n\nWhy would you, Sir, not look round at it, but went on without stopping?' 'Have done,' said Mr.\n\nShih, 'and do not speak about it.\n\nIt is quite useless.\n\nA boat made from its wood would sink; a coffin or shell would quickly rot; an article of furniture would soon go to pieces; a door would be covered with the exuding sap; a pillar would be riddled by insects; the material of it is good for nothing, and hence it is that it has attained to so great an age 2 .' p.\n\n218 When Mr.\n\nShih was returning, the altar-oak appeared to him in a dream, and said, I What other tree will you compare with me?\n\nWill you compare me to one of your ornamental trees?\n\nThere are hawthorns, pear-trees, orange-trees, pummelo-trees, gourds and other low fruit-bearing plants.\n\nWhen their fruits are ripe, they are knocked down from them, and thrown among the dirt 1 .\n\nThe large branches are broken, and the smaller are torn away.\n\nSo it is that their productive ability makes their lives bitter to them; they do not complete their natural term of existence, but come to a premature end in the middle of their time, bringing on themselves the destructive treatment which they ordinarily receive.\n\nIt is so with all things.\n\nI have sought to discover how it was that I was so useless;--I had long done so, till (the effort) nearly caused my death; and now I have learned it:--it has been of the greatest use to me.\n\nSuppose that I had possessed useful properties, should I have become of the great size that I am?\n\nAnd moreover you and I are both things;--how should one thing thus pass its judgment on another?\n\nhow is it that you a useless man know all this about me a useless tree?' When Mr.\n\nShih awoke, he kept thinking about his dream, but the workman said, 'Being so taken with its uselessness, how is it that it yet acts here as the altar for the spirits of the land?' 'Be still,' was the master's reply, 'and do not say a word.\n\nIt simply happened to grow here; and thus those who do not know it do not speak ill of it as an evil thing.\n\nIf it were not used as the altar, would it be in danger of p.\n\n219 being cut down?\n\nMoreover, the reason of its being preserved is different from that of the preservation of things generally; is not your explaining it from the sentiment which you have expressed wide of the mark?' 7.\n\nNan-po Dze-khî 1 in rambling about the Heights of Shang 2 , saw a large and extraordinary tree.\n\nThe teams of a thousand chariots might be sheltered under it, and its shade would cover them all!\n\nDze-khî said, 'What a tree is this!\n\nIt must contain an extraordinary amount of timber!\n\nWhen he looked up, however, at its smaller branches, they were so twisted and crooked that they could not be made into rafters and beams; when he looked down to its root, its stem was divided into so many rounded portions that neither coffin nor shell could be made from them.\n\nHe licked one of its leaves, and his mouth felt torn and wounded.\n\nThe smell of it would make a man frantic, as if intoxicated, for more than three whole days together."

