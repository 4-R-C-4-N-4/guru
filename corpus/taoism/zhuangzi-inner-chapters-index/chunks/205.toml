[content]
body = "What I mean when I say that he is without these is, that this man does not by his likings and dislikings do any inward harm to his body;--he always pursues his course without effort, and does not (try to) increase his (store of) life.' Hui-dze rejoined, 'If there were not that increasing of (the amount) of life, how would he get his body 1 ?' Kwang-dze said, 'The Tâo gives him his personal appearance (and powers); Heaven gives him his bodily form; and he does not by his likings and dislikings do any internal harm to his body.\n\nBut now you, Sir, deal with your spirit as if it were something external to you, and subject your vital powers to toil.\n\nYou sing (your ditties), leaning against a tree; you go to sleep, grasping the stump of a rotten dryandra tree.\n\nHeaven selected for you the bodily form (of a man), and you babble about what is strong and what is white 2 .' Footnotes 223:1 See pp.\n\n133, 134.\n\n223:2 The native state of Confucius, part of the present Shan-tung.\n\n223:3 A Tâoist of complete virtue; but probably there was not really such a person.\n\nOur author fabricates him according to his fashion.\n\n223:4 The character uh ( ) does not say that he had lost both his feet, but I suppose that such is the meaning, because of what is said of Toeless below that 'he walked on his heels to see Confucius.' The feet must have been amputated, or mutilated rather (justly or unjustly), as a punishment; but Kwang-dze wished to say nothing on that point.\n\n223:5 Perhaps a disciple of Confucius;--not elsewhere mentioned as such.\n\n223:6 See the Tâo Teh King, ch.\n\n2.\n\n224:1 Literally, 'the Senior;' often rendered 'Teacher.' 224:2 'That in which there is no element of falsehood' is the Tâo, which also is the 'Author' of all the changes that take place in time and space.\n\nSee the Introductory Note on the title and subject of the Book.\n\n225:1 Wang Thâi saw all things in the Tâo, and the Tâo in all things.\n\nComp.\n\nBook XI, par.\n\n7, et al.\n\n225:2 Notwithstanding his being a cripple.\n\nHe forgets that circumstance himself, and all others forget it, constrained and won by his embodiment of the Tâo.\n\nWhat follows is an illustration of this, exaggerated indeed, but not so extravagantly as in many other passages.\n\n225:3 In the Tâoistic meaning of the term.\n\n225:4 The royal army consisted of six hosts; that of a great feudal prince of three.\n\n'Nine hosts' = a very great army.\n\n226:1 The arms, legs, head, and trunk.\n\n226:2 Another cripple introduced by our author to serve his purpose.\n\n226:3 Kung-sun Khiâo; a good and able minister of Kang, an earldom forming part of the present Ho-nan.\n\nHe was a contemporary of Confucius, who wept when he heard of his death in B.\n\nC.\n\n522.\n\nHe was a scion of the ruling house, which again was a branch of the royal family of Kâu.\n\n226:4 A Tâoist teacher.\n\nSee XXI, par.\n\n9; XXXII, par.\n\n1.\n\n227:1 A famous archer of antiquity in the twenty-second century B.C., or perhaps earlier.\n\n228:1 'Toeless' is a sort of nickname."

