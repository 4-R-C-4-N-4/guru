[content]
body = "230; and Liû An, a scion of the Imperial House of Han, king of Hwâi-nan, and better known to us as Hwâi-nan dze, who also died by his own hand in B.C.\n\n122.\n\nIn the books of all these men we find quotations of many passages that are in our treatise.\n\nThey are expressly said to be, many of them, quotations from Lâo-dze; Han Fei several times all but p.\n\n6 shows the book beneath his eyes.\n\nTo show how numerous the quotations by Han Fei and Liû An are, let it be borne in mind that the Tâo Teh King has come down to us as divided into eighty-one short chapters; and that the whole of it is shorter than the shortest of our Gospels.\n\nOf the eighty-one chapters, either the whole or portions of seventy-one are found in those two writers.\n\nThere are other authors not so decidedly Tâoistic, in whom we find quotations from the little book.\n\nThese quotations are in general wonderfully correct.\n\nVarious readings indeed there are; but if we were sure that the writers did trust to memory, their differences would only prove that copies of the text had been multiplied from the very first.\n\nIn passing on from quotations to the complete text, I will Evidence of Pan Kû clinch the assertion that Khien was well acquainted with our treatise, by a passage from the History of the Former Han Dynasty (B.C.\n\n206-A.D.\n\n24), which was begun to be compiled by Pan Kû, who died however in 92, and left a portion to be completed by his sister, the famous Pan Kâo.\n\nThe thirty-second chapter of his Biographies is devoted to Sze-mâ Khien, and towards the end it is said that 'on the subject of the Great Tâo he preferred Hwang and Lâo to the six King.' 'Hwang and Lâo' must there be the writings of Hwang-Tî and Lâo-dze.\n\nThe association of the two names also illustrates the antiquity claimed for Tâoism, and the subject of note 1, p.\n\n2.\n\n4.\n\nWe go on from quotations to complete texts, and turn, first, to the catalogue of the Imperial Library of Han, as compiled by Liû Hsin, not later than the commencement of our Christian era.\n\nThere are entered in it Tâoist works by Catalogue of the Imperial Library of Han.\n\nthirty-seven different authors, containing in all 993 chapters or sections (phien).\n\nÎ Yin, the premier of Khäng Thang (B.C.\n\n1766), heads the list with fifty-one sections.\n\nThere are in it four editions of Lâo-dze's work with commentaries:--by a Mr.\n\nLin, in four sections; a Mr.\n\nFû, in thirty-seven sections; a Mr.\n\nHsü, in six sections; and by Liû Hsiang, Hsin's own father, in four sections.\n\nAll these four works have since perished, but there they were in the Imperial Library before p.\n\n7 our era began.\n\nKwang-dze is in the same list in fifty-two books or sections, the greater part of which have happily escaped the devouring tooth of time.\n\nWe turn now to the twentieth chapter of Khien's Biographies, in which he gives an account of Yo Î, the scion of a distinguished family, and who himself played a famous part, both as a politician and military leader, and became prince of Wang-kû under the kingdom of Kâo in B.\n\nC.\n\n279."

