[content]
body = "Sacred Texts Taoism Index Previous Next 69. 69. 1. A master of the art of war has said, 'I do not dare to be the host (to commence the war); I prefer to be the guest (to act on the defensive). I do not dare to advance an inch; I prefer to retire a foot.' This is called marshalling the ranks where there are no ranks; baring the arms (to fight) where there are no arms to bare; grasping the weapon where there is no weapon to grasp; advancing against the enemy where there is no enemy. 2. There is no calamity greater than lightly engaging in war. To do that is near losing (the gentleness) which is so precious. Thus it is that when opposing weapons are (actually) crossed, he who deplores (the situation) conquers. , 'The Use of the Mysterious (Tâo).' Such seems to be the meaning of the title. The chapter teaches that, if war were carried on, or rather avoided, according to the Tâo, the result would be success. Lâo-dze's own statements appear as so many paradoxes. They are examples of the procedure of the Tâo by 'contraries,' or opposites. We do not know who the master of the military art referred to was. Perhaps the author only adopted the style of quotation to express his own sentiments. Next: Chapter 70"

