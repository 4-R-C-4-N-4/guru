[content]
body = "See what I have said on II, par.\n\n9.\n\n255:1 This also is obscure; but Confucius is again made to praise the Tâoistic system.\n\n255:2 Î- r is said by Lî Î to have been 'a worthy scholar;' but Î- r is an old name for the swallow, and there is a legend of a being of this name appearing to king Mia, and then flying away as a swallow;--see the Khang-hsî Thesaurus under .\n\nThe personage is entirely fabulous.\n\n255:3 Dismembered or disfigured you.\n\n256:1 Names of parties, of whom we know nothing.\n\nIt is implied, we must suppose, that they had suffered as is said by their own inadvertence.\n\n256:2 We must suppose that they had done so.\n\n257:1 'I sit and forget;'--generally thus supplemented ( ).\n\nHui proceeds to set forth the meaning he himself attached to the phrase.\n\n257:2 Another denomination, I think, of the Tâo.\n\nThe is also explained as meaning, 'the great void in which there is no obstruction ( ).\n\n257:3 Here is another testimony, adduced by our author, of Confucius's appreciation of Tâoism; to which the sage would, no doubt, have taken exception.\n\n257:4 Two of the men in pars.\n\n9, 10.\n\n258:1 Here is the highest issue of Tâoism;--unquestioning submission to what is beyond our knowledge and control.\n\nNext: Book VII: Ying Tî Wang, or 'The Normal Course for Rulers and Kings'"

