body = "Sacred Texts Taoism Index Previous Next p.\n\n198 BOOK III.\n\nPART I.\n\nSECTION III.\n\nYang Shang Kû, or 'Nourishing the Lord of Life 1 .' 1.\n\nThere is a limit to our life, but to knowledge there is no limit.\n\nWith what is limited to pursue after what is unlimited is a perilous thing; and when, knowing this, we still seek the increase of our knowledge, the peril cannot be averted 2 .\n\nThere should not be the practice of what is good with any thought of the fame (which it will bring), nor of what is evil with any approximation to the punishment (which it will incur) 3 :--an accordance with the Central Element (of our nature) 4 is the regular way to preserve the body, to maintain the life, to nourish our parents, and to complete our term of years.\n\n2.\n\nHis cook 5 was cutting up an ox for the ruler Wän-hui 5 .\n\nWhenever he applied his hand, leaned forward with his shoulder, planted his foot, and employed p.\n\n199 the pressure of his knee, in the audible ripping off of the skin, and slicing operation of the knife, the sounds were all in regular cadence.\n\nMovements and sounds proceeded as in the dance of 'the Mulberry Forest 1 ' and the blended notes of 'the King Shâu 1 .' The ruler said, 'Ah!\n\nAdmirable!\n\nThat your art should have become so perfect!' (Having finished his operation), the cook laid down his knife, and replied to the remark, 'What your servant loves is the method of the Tâo, something in advance of any art.\n\nWhen I first began to cut up an ox, I saw nothing but the (entire) carcase.\n\nAfter three years I ceased to see it as a whole.\n\nNow I deal with it in a spirit-like manner, and do not look at it with my eyes.\n\nThe use of my senses is discarded, and my spirit acts as it wills.\n\nObserving the natural lines, (my knife) slips through the great crevices and slides through the great cavities, taking advantage of the facilities thus presented.\n\nMy art avoids the membranous ligatures, and much more the great bones.\n\n'A good cook changes his knife every year;--(it may have been injured) in cutting; an ordinary cook changes his every month;--(it may have been) broken.\n\nNow my knife has been in use for nineteen years; it has cut up several thousand oxen, and yet its edge is as sharp as if it had newly come from the whetstone.\n\nThere are the interstices of the joints, and the edge of the knife has no (appreciable) thickness; when that which is so thin enters where the interstice is, how easily it moves along!\n\nThe p.\n\n200 blade has more than room enough.\n\nNevertheless, whenever I come to a complicated joint, and see that there will be some difficulty, I proceed anxiously and with caution, not allowing my eyes to wander from the place, and moving my hand slowly.\n\nThen by a very slight movement of the knife, the part is quickly separated, and drops like (a clod of) earth to the ground.\n\nThen standing up with the knife in my hand, I look all round, and in a leisurely manner, with an air of satisfaction, wipe it clean, and put it in its sheath.' The ruler Wän-hui said, 'Excellent!\n\nI have heard the words of my cook, and learned from them the nourishment of (our) life.' 3.\n\nWhen Kung-wän Hsien 1 saw the Master of the Left, he was startled, and said, 'What sort of man is this?\n\nHow is it he has but one foot?\n\nIs it from Heaven?"

