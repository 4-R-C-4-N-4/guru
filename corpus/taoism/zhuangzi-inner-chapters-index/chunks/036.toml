[content]
body = "359) assigns Liû Mî and his work to the Yüan dynasty.\n\nIn a copy of the work in my possession they are assigned to that of Sung.\n\nThe author, no doubt, lived under both dynasties,--from the Sung into the Yüan.\n\n24:1 See note on p, 187 of his Kwang-dze.\n\n24:2 See Bk.\n\nXV, par.\n\n1.\n\n29:1 Bk.\n\nXI, par.\n\n5.\n\n29:2 Bk.\n\nXVI, par.\n\n2.\n\n29:3 Tâo Teh King, ch.\n\n19.\n\n31:1 Confucian Analects, XIV, 36.\n\nNext: Chapter IV: Accounts of Lâo-Dze and Kwang-dze Given by Sze-mâ Khien"

