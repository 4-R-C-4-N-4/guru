[content]
body = "(All the while), you, Sir, in amazement, search for his views to examine them, and grope among them for matter for discussion;--this is just like peeping at the heavens through a tube, or aiming at the earth with an awl; are not both the implements too small for the purpose?\n\nGo your ways, Sir.\n\n'And have you not heard of the young learners of p.\n\n390 Shâu-ling 1 , and how they did in Han-tan?\n\nBefore they had acquired what they might have done in that capital, they had forgotten what they had learned to do in their old city, and were marched back to it on their hands and knees.\n\nIf now you do not go away, you will forget your old acquirements, and fail in your profession.' Kung-sun Lung gaped on the speaker, and could not shut his mouth, and his tongue clave to its roof.\n\nHe slank away and ran off.\n\n11.\n\nKwang-dze was (once) fishing in the river Phû 2 , when the king of Khû 3 sent two great officers to him, with the message, 'I wish to trouble you with the charge of all within my territories.' Kwang-dze kept on holding his rod without looking round, and said, 'I have heard that in Khû there is a spirit-like tortoise-shell, the wearer of which died 3000 years ago 4 , and which the king keeps, in his ancestral temple, in a hamper covered with a cloth.\n\nWas it better for the tortoise to die, and leave its shell to be thus honoured?\n\nOr would it have been better for it to live, and keep on dragging its tail through the mud?' The two officers said, 'It would have been better for it to live, and draw its tail after it over the mud 5 .' 'Go your ways.\n\nI will keep on drawing my tail after me through the mud.' p.\n\n391 12.\n\nHui-dze being a minister of state in Liang 1 , Kwang-dze went to see him.\n\nSome one had told Hui-dze that Kwang-dze was come with a wish to supersede him in his office, on which he was afraid, and instituted a search for the stranger all over the kingdom for three days and three nights.\n\n(After this) Kwang-dze went and saw him, and said, 'There is in the south a bird, called \"the Young Phoenix 2 ;\"--do you know it?\n\nStarting from the South Sea, it flies to the Northern; never resting but on the bignonia 3 , never eating but the fruit of the melia azederach 4 , and never drinking but from the purest springs.\n\nAn owl, which had got a putrid rat, (once), when a phoenix went passing overhead, looked up to it and gave an angry scream.\n\nDo you wish now, in your possession of the kingdom of Liang, to frighten me with a similar scream?' 13.\n\nKwang-dze and Hui-dze were walking on the dam over the Hâo 5 , when the former said, 'These thryssas come out, and play about at their ease;--that is the enjoyment of fishes.' The other said, 'You are not a fish; how do you know what p.\n\n392 constitutes the enjoyment of fishes 1 ?' Kwang-dze rejoined, 'You are not I.\n\nHow do you know that I do not know what constitutes the enjoyment of fishes?' Hui-dze said, 'I am not you; and though indeed I do not fully know you, you certainly are not a fish, and (the argument) is complete against your knowing what constitutes the happiness of fishes.' Kwang-dze replied, 'Let us keep to your original question."

