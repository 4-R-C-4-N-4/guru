[content]
body = "The Master 1 asked Lâo Tan, saying, 'Some men regulate the Tâo (as by a law), which they have only to follow;--(a thing, they say,) is admissible or it is inadmissible; it is so, or it is not so.\n\n(They are like) the sophists who say that they can distinguish what is hard and what is white as clearly as if the objects were houses suspended in the sky.\n\nCan such men be said to be sages 2 ?' The reply was, 'They are like the busy underlings of a court, who toil their bodies and distress their minds with their various artifices;--dogs, (employed) to their sorrow to catch the yak, or monkeys 3 that are brought from their forests (for their tricksiness).\n\nKhiû, I tell you this;-it is what you cannot hear, and what you cannot speak of:--Of those who have their heads and feet, and yet have neither minds nor ears, there are multitudes; while of those who have their bodies, and at the same time preserve that which has no bodily form or shape, there are really none.\n\nIt is not in their movements or stoppages, their dying or living, their falling and rising again, that this is to be found.\n\nThe regulation of the course lies in (their dealing with) the human element in them.\n\nWhen they have forgotten external things, p.\n\n318 and have also forgotten the heavenly element in them, they may be named men who have forgotten themselves.\n\nThe man who has forgotten himself is he of whom it is said that he has become identified with Heaven 1 .' 10.\n\nAt an interview with Kî Khêh 2 , Kiang-lü Mien 2 said to him, 'Our ruler of Lû asked to receive my instructions.\n\nI declined, on the ground that I had not received any message 3 for him.\n\nAfterwards, however, I told him (my thoughts).\n\nI do not know whether (what I said) was right or not, and I beg to repeat it to you.\n\nI said to him, \"You must strive to be courteous and to exercise self-restraint; you must distinguish the public-spirited and loyal, and repress the cringing and selfish;--who among the people will in that case dare not to be in harmony with you?\"' Kî Khêh laughed quietly and said, 'Your words, my master, as a description of the right course for a Tî or King, were like the threatening movement of its arms by a mantis which would thereby stop the advance of a carriage;--inadequate to accomplish your object.\n\nAnd moreover, if he guided himself by your directions, it would be as if he were to increase the dangerous height of his towers p.\n\n319 and add to the number of his valuables collected in them;--the multitudes (of the people) would leave their (old) ways, and bend their steps in the same direction.' Kiang-lü Mien was awe-struck, and said in his fright, 'I am startled by your words, Master, nevertheless, I should like to hear you describe the influence (which a ruler should exert).' The other said, 'If a great sage ruled the kingdom, he would stimulate the minds of the people, and cause them to carry out his instructions fully, and change their manners; he would take their minds which had become evil and violent and extinguish them, carrying them all forward to act in accordance with the (good) will belonging to them as individuals, as if they did it of themselves from their nature, while they knew not what it was that made them do so.\n\nWould such an one be willing to look up to Yâo and Shun in their instruction of the people as his elder brothers?"

