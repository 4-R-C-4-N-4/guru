[content]
body = "The presumption is that benevolence and righteousness are not constituents of humanity; for to how much anxiety does the exercise of them give rise!\n\nMoreover when another toe is united to the p.\n\n271 great toe, to divide the membrane makes you weep; and when there is an extra finger, to gnaw it off makes you cry out.\n\nIn the one case there is a member too many, and in the other a member too few; but the anxiety and pain which they cause is the same.\n\nThe benevolent men of the present age look at the evils of the world, as with eyes full of dust, and are filled with sorrow by them, while those who are not benevolent, having violently altered the character of their proper nature, greedily pursue after riches and honours.\n\nThe presumption therefore is that benevolence and righteousness are contrary to the nature of man:--how full of trouble and contention has the world been ever since the three dynasties 1 began!\n\nAnd moreover, in employing the hook and line, the compass and square, to give things their correct form you must cut away portions of what naturally belongs to them; in employing strings and fastenings, glue and varnish to make things firm, you must violently interfere with their qualities.\n\nThe bendings and stoppings in ceremonies and music, and the factitious expression in the countenance of benevolence and righteousness, in order to comfort the minds of men:--these all show a failure in observing the regular principles (of the human constitution).\n\nAll men are furnished with such regular principles; and according to them what is bent is not made so by the hook, nor what is straight by the line, nor what is round by the compass, nor what is square by the carpenter's square.\n\nNor is adhesion effected by p.\n\n272 the use of glue and varnish, nor are things bound together by means of strings and bands.\n\nThus it is that all in the world are produced what they are by a certain guidance, while they do not know how they are produced so; and they equally attain their several ends while they do not know how it is that they do so.\n\nAnciently it was so, and it is so now; and this constitution of things should not be made of none effect.\n\nWhy then should benevolence and righteousness be employed as connecting (links), or as glue and varnish, strings and bands, and the enjoyment arising from the Tâo and its characteristics be attributed to them?--it is a deception practised upon the world.\n\nWhere the deception is small, there will be a change in the direction (of the objects pursued); where it is great, there will be a change of the nature itself.\n\nHow do I know that it is so?\n\nSince he of the line of Yü called in his benevolence and righteousness to distort and vex the world, the world has not ceased to hurry about to execute their commands;--has not this been by means of benevolence and righteousness to change (men's views) of their nature?\n\n4.\n\nI will therefore try and discuss this matter.\n\nFrom the commencement of the three dynasties downwards, nowhere has there been a man who has not under (the influence of external) things altered (the course of) his nature.\n\nSmall men for the sake of gain have sacrificed their persons; scholars for the sake of fame have done so; great officers, for the sake of their families; and sagely men, for the sake of the kingdom.\n\nThese several classes, with different occupations, and different reputations, p.\n\n273 have agreed in doing injury to their nature and sacrificing their persons.\n\nTake the case of a male and female slave 1 ;--they have to feed the sheep together, but they both lose their sheep.\n\nAsk the one what he was doing, and you will find that he was holding his bamboo tablets and reading."

