body = "185:3 The ordinary reading here is fäng ( ) 'a boundary' or 'distinctive limit.' Lin Hsî-hung adopts the reading , 'a response,' and I have followed him.\n\n186:1 Kâo Wän and Shih Kwang were both musicians of the state of Zin.\n\nShih, which appears as Kwang's surname, was his denomination as 'music-master.' It is difficult to understand the reason why Kwang-dze introduces these men and their ways, or how it helps his argument.\n\n186:2 Perhaps we should read here 'son,' with special reference to the son of Hui-Sze.\n\n187:1 Referring, I think, to those below commencing 'There was a beginning.' 187:2 That is, looking at things from the standpoint of an original non-existence, and discarding all considerations of space and time.\n\n188:1 On this concluding clause, Ziâo Hung says:--'Avoiding such procedure, there will be no affirmations and denials (no contraries).\n\nThe phrase occurs in the Book several times, and interpreters have missed its meaning from not observing that serve merely as a final particle, and often have the added to them, without affecting its meaning.' See also Wang Yin on the usages of in the , ch.\n\n1208, art.\n\n6.\n\n188:2 That is, direct opposites.\n\n188:3 Literally 'righteousnesses;' the proper way of dealing with the relations.\n\n188:4 Literally, 'separations.' 189:1 Literally, 'the six conjunctions,' meaning the four cardinal points of space, with the zenith and nadir; sometimes a name for the universe of space.\n\nHere we must restrict the meaning as I have done.\n\n189:2 'The Spring and Autumn;'--Confucius's Annals of Lû, here complimented by Kwang-dze.\n\nSee in Mencius, IV, ii, 21.\n\n189:3 Compare the Tâo Teh King, ch.\n\n25, et al.\n\n190:1 Compare the use of in the Shû King, I, iii, 11.\n\n190:2 The classic of Lâo, in chaps.\n\n1, 2.\n\n190:3 Names for the Tâo.\n\n190:4 Three small states.\n\nIs Yao's wish to smite an instance of the 'quality' of 'emulation' or jealousy?\n\n190:5 Both Tâoistic worthies of the time of Yâo, supposed to have been two of the Perfect Ones whom Yâo visited on the distant hill of Kû-shih (I, par.\n\n6).\n\nAccording to Hwang Mî, Wang Î was the teacher of Nieh Khüeh, and he again of Hsü Yû.\n\n191:1 Compare par.\n\n1 of Book XXII.\n\n191:2 Two famous beauties;--the former, a contemporary of Hsî Shih (par.\n\n4, note 2), and like her also, of the state of Yüeh; the latter, the daughter of a barbarian chief among the Western Jung.\n\nShe was captured by duke Hsien of Zin, in B.\n\nC.\n\n672.\n\nHe subsequently made her his wife,--to the great injury of his family and state.\n\n192:1 Not thinking them beautiful, as men did, but frightened and repelled by them.\n\n192:2 Compare Book 1, pars.\n\n3 and 5.\n\n192:3 We know nothing of the former of these men, but what is mentioned here; the other appears also in Book XXV, 6, q.\n\nv.\n\nIf 'the master' that immediately follows be Confucius they must have been contemporary with him."

